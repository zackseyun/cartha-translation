id: JOL.2.2
reference: Joel 2:2
source:
  edition: WLC
  text: י֧וֹם חֹ֣שֶׁךְ וַ/אֲפֵלָ֗ה י֤וֹם עָנָן֙ וַ/עֲרָפֶ֔ל כְּ/שַׁ֖חַר פָּרֻ֣שׂ עַל
    הֶֽ/הָרִ֑ים עַ֚ם רַ֣ב וְ/עָצ֔וּם כָּמֹ֗/הוּ לֹ֤א נִֽהְיָה֙ מִן הָ֣/עוֹלָ֔ם וְ/אַֽחֲרָי/ו֙
    לֹ֣א יוֹסֵ֔ף עַד שְׁנֵ֖י דּ֥וֹר וָ/דֽוֹר־־־׃
translation:
  text: A day of darkness and gloom, a day of clouds and thick darkness; like dawn
    spread over the mountains, a great and mighty people comes. Nothing like it has
    ever been from of old, and after it there will not again be any, through the years
    of generation after generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like blackness spread over the mountains,' if שַׁחַר is taken in a rarer
      sense; more likely 'like dawn' in keeping with normal Hebrew usage and the image
      of something spreading rapidly across the hills.
    reason: lexical_alternative
  - marker: b
    text: '''A great and mighty people'' may refer to an invading army, a locust swarm
      described in military terms, or a deliberately blended prophetic image.'
    reason: alternative_reading
  - marker: c
    text: Literally 'until years of generation and generation,' an idiom for an indefinitely
      long succession of generations.
    reason: lexical_alternative
lexical_decisions:
- source_word: י֧וֹם
  chosen: day
  alternatives:
  - time
  lexicon: HALOT
  rationale: Basic temporal noun; repeated for poetic emphasis, retained as 'day'
    in both instances to preserve the cadence and prophetic announcement formula.
- source_word: חֹשֶׁךְ
  chosen: darkness
  alternatives:
  - gloom
  lexicon: HALOT
  rationale: Standard rendering for literal or figurative darkness; paired with אֲפֵלָה,
    so 'darkness' here allows the second term to carry the nuance of gloom.
- source_word: אֲפֵלָה
  chosen: gloom
  alternatives:
  - deep darkness
  lexicon: HALOT
  rationale: A stronger darkness term than חֹשֶׁךְ; 'gloom' gives a natural English
    pairing ('darkness and gloom') while preserving the intensification.
- source_word: עָנָן
  chosen: clouds
  alternatives:
  - cloud
  lexicon: HALOT
  rationale: Although singular in Hebrew, English idiom commonly uses the plural in
    weather descriptions; this better matches the parallelism with the following term
    and the scene of enveloping storm-darkness.
- source_word: עֲרָפֶל
  chosen: thick darkness
  alternatives:
  - dark cloud
  - gloom
  lexicon: HALOT
  rationale: This term often denotes dense, obscuring darkness or cloud-mass. 'Thick
    darkness' preserves both opacity and solemnity, and distinguishes it from the
    previous 'clouds'.
- source_word: כְּשַׁחַר
  chosen: like dawn
  alternatives:
  - like blackness
  - like the dawn
  lexicon: HALOT
  rationale: The most common sense of שַׁחַר is 'dawn.' In context the image is of
    something spreading rapidly over the mountains as first light does. Some take
    it differently because of the dark imagery, but 'like dawn' best fits normal usage
    and the participle 'spread.'
- source_word: פָּרֻשׂ
  chosen: spread
  alternatives:
  - stretched out
  - spread out
  lexicon: HALOT
  rationale: Passive participial form describing something extended over the mountains.
    'Spread' is concise and idiomatic in English.
- source_word: עַל הֶהָרִים
  chosen: over the mountains
  alternatives:
  - upon the mountains
  lexicon: HALOT
  rationale: '''Over'' fits the image of dawn or an advancing mass covering the mountain
    range.'
- source_word: עַם
  chosen: people
  alternatives:
  - nation
  - army
  lexicon: HALOT
  rationale: The Hebrew term is 'people.' Although the context is militarized and
    may refer to an invading force, the text itself does not use the more specific
    word 'army,' so 'people' is retained.
- source_word: רַב
  chosen: great
  alternatives:
  - many
  - numerous
  lexicon: HALOT
  rationale: Can denote size or multitude. 'Great' works well with the following 'mighty'
    and preserves the elevated style; the sense of multitude is still implied.
- source_word: עָצוּם
  chosen: mighty
  alternatives:
  - strong
  - powerful
  lexicon: HALOT
  rationale: Conveys strength and formidable power; 'mighty' is a natural collocation
    with 'great people' in prophetic diction.
- source_word: כָּמֹהוּ
  chosen: like it
  alternatives:
  - like him
  - like this
  lexicon: HALOT
  rationale: The pronominal suffix refers back collectively to the invading people/event.
    English idiom prefers 'like it' for the phenomenon as a whole.
- source_word: לֹא נִהְיָה מִן הָעוֹלָם
  chosen: has ever been from of old
  alternatives:
  - has never happened from ancient times
  - has not been from eternity
  lexicon: HALOT
  rationale: עוֹלָם here refers to antiquity or time long past, not metaphysical eternity.
    'From of old' preserves the elevated register and temporal scope.
- source_word: וְאַחֲרָיו לֹא יוֹסֵף
  chosen: after it there will not again be any
  alternatives:
  - after him it will not continue
  - after it it will not be repeated
  lexicon: HALOT
  rationale: 'The idiom with יסף conveys repetition/addition: it will not happen again
    after this. ''There will not again be any'' expresses the sense of non-recurrence.'
- source_word: עַד שְׁנֵי דּוֹר וָדוֹר
  chosen: through the years of generation after generation
  alternatives:
  - to the years of generation and generation
  - for years into generation after generation
  lexicon: HALOT
  rationale: Literally 'until years of generation and generation.' The phrase is idiomatic
    for an indefinitely long succession of generations. 'Generation after generation'
    is the clearest natural English equivalent, with 'through the years of' preserving
    the mention of years.
