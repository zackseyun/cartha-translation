theological_decisions:
- issue: Identity of the 'great and mighty people'
  chosen_reading: Render generically as 'a great and mighty people' without specifying
    whether they are locusts, a human army, or a blended prophetic image.
  alternative_readings:
  - locust swarm described metaphorically as a people
  - human invading army
  - intentionally blended image of locust plague and military invasion
  rationale: The verse itself uses the term 'people' and does not resolve the imagery.
    To preserve theological and interpretive tension, the translation avoids narrowing
    the referent beyond the Hebrew wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
