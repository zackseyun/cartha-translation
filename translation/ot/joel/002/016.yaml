theological_decisions:
- issue: Rendering of cultic summons language
  chosen_reading: Use 'consecrate the assembly' rather than a more secular phrase
  alternative_readings:
  - sanctify the congregation
  - set apart the gathering
  rationale: The verse is part of a solemn communal call to repentance and worship.
    The Hebrew carries sacred, not merely civic, force; 'consecrate' preserves that
    without importing extra ritual detail.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Social sense of זְקֵנִים
  chosen_reading: Render as 'elders'
  alternative_readings:
  - old men
  rationale: The context lists representative groups of the whole community. 'Elders'
    better reflects likely communal office/status rather than merely age, while remaining
    faithful to the Hebrew's common usage in such settings.
  doctrine_reference: Translation philosophy §1
