id: JOL.2.16
reference: Joel 2:16
source:
  edition: WLC
  text: אִסְפוּ עָ֞ם קַדְּשׁ֤וּ קָהָל֙ קִבְצ֣וּ זְקֵנִ֔ים אִסְפוּ֙ עֽוֹלָלִ֔ים וְ/יֹנְקֵ֖י
    שָׁדָ֑יִם יֵצֵ֤א חָתָן֙ מֵֽ/חֶדְר֔/וֹ וְ/כַלָּ֖ה מֵ/חֻפָּתָֽ/הּ־׃
translation:
  text: Gather the people; consecrate the assembly; collect the elders; gather the
    children, even the nursing infants. Let the bridegroom come out from his room,
    and the bride from her bridal chamber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the old men' for 'the elders.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'those nursing at the breasts.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from her canopy'; the Hebrew term can refer to a wedding canopy or bridal
      chamber.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִסְפוּ
  chosen: Gather
  alternatives:
  - Assemble
  - Collect
  lexicon: HALOT
  rationale: Qal imperative plural of אסף, a straightforward summons to bring people
    together. 'Gather' is natural English and preserves the repeated imperative force.
- source_word: עָם
  chosen: the people
  alternatives:
  - a people
  lexicon: HALOT
  rationale: With the imperative context, the noun refers to the covenant community
    being summoned. 'The people' is the idiomatic and contextually specific rendering.
- source_word: קַדְּשׁוּ
  chosen: consecrate
  alternatives:
  - sanctify
  - set apart
  lexicon: HALOT
  rationale: Piel imperative of קדשׁ in a cultic setting. 'Consecrate' best conveys
    formal setting apart for sacred assembly without archaic tone.
- source_word: קָהָל
  chosen: the assembly
  alternatives:
  - the congregation
  lexicon: HALOT
  rationale: קהל commonly denotes an assembled community, especially in worship or
    covenantal contexts. 'Assembly' is clear modern English and preserves the communal
    sense.
- source_word: קִבְצוּ
  chosen: collect
  alternatives:
  - gather together
  - assemble
  lexicon: HALOT
  rationale: Imperative of קבץ, close in meaning to אסף but distinct lexically. 'Collect'
    preserves some variation in English while still fitting the context of summoning
    specific groups.
- source_word: זְקֵנִים
  chosen: the elders
  alternatives:
  - the old men
  lexicon: HALOT
  rationale: Though literally 'old men,' in communal and civic-religious contexts
    this often denotes recognized community leaders. 'Elders' best fits the likely
    social function here.
- source_word: עוֹלָלִים
  chosen: the children
  alternatives:
  - little children
  - infants
  lexicon: HALOT
  rationale: Refers to small children; because the next phrase specifies nursing infants,
    rendering this as 'children' preserves the distinction between young children
    and babies.
- source_word: יֹנְקֵי שָׁדָיִם
  chosen: the nursing infants
  alternatives:
  - those nursing at the breasts
  - sucklings
  lexicon: HALOT
  rationale: Literally 'those sucking the breasts.' 'Nursing infants' is accurate,
    natural, and preserves the image of even the youngest being included.
- source_word: יֵצֵא
  chosen: Let ... come out
  alternatives:
  - must come out
  - should go out
  lexicon: HALOT
  rationale: Jussive/imperfect 3ms in a sequence of summonses. 'Let ... come out'
    captures the hortatory force in idiomatic English.
- source_word: חָתָן
  chosen: the bridegroom
  alternatives:
  - the groom
  lexicon: HALOT
  rationale: '''Bridegroom'' preserves the formal wedding context and pairs well with
    ''bride.'''
- source_word: מֵחֶדְרוֹ
  chosen: from his room
  alternatives:
  - from his chamber
  lexicon: HALOT
  rationale: חדר is an inner room or chamber. 'Room' is more accessible modern English;
    the wedding context is sufficiently clarified by 'bridegroom.'
- source_word: כַלָּה
  chosen: the bride
  lexicon: HALOT
  rationale: Standard and unambiguous rendering in the marriage context.
- source_word: מֵחֻפָּתָהּ
  chosen: from her bridal chamber
  alternatives:
  - from her canopy
  - from her wedding chamber
  lexicon: HALOT
  rationale: חֻפָּה can denote a wedding canopy or chamber. In parallel with 'his
    room' and in this immediate context of bride and bridegroom withdrawing from private
    wedding space, 'bridal chamber' best conveys the likely sense in idiomatic English
    while preserving the marriage setting.
