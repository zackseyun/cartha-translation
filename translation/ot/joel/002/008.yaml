id: JOL.2.8
reference: Joel 2:8
source:
  edition: WLC
  text: וְ/אִ֤ישׁ אָחִי/ו֙ לֹ֣א יִדְחָק֔וּ/ן גֶּ֥בֶר בִּ/מְסִלָּת֖/וֹ יֵֽלֵכ֑וּ/ן
    וּ/בְעַ֥ד הַ/שֶּׁ֛לַח יִפֹּ֖לוּ לֹ֥א יִבְצָֽעוּ׃
translation:
  text: No man crowds his brother; each goes on his own path. Though they fall through
    the weapon, they do not break ranks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they are not cut off' (or 'they are not stopped'). The final clause
      is lexically difficult; the main text reflects the contextual sense of an army
      whose formation is not broken.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אָחִיו
  chosen: No man crowds his brother
  alternatives:
  - No one presses his brother
  - A man does not shove his fellow
  lexicon: HALOT
  rationale: אִישׁ with אָחִיו is a distributive idiom, literally 'a man his brother,'
    expressing mutual non-interference within the group. 'Man' and 'brother' preserve
    the masculine singular forms and the military/comradely sense better than a flattened
    neutral paraphrase.
- source_word: יִדְחָקוּן
  chosen: crowds
  alternatives:
  - presses
  - thrusts
  - jostles
  lexicon: HALOT
  rationale: From דחק, the sense is to press or crowd. 'Crowds' fits the image of
    a tightly ordered advancing force without implying chaotic violence as strongly
    as 'thrusts' or 'shoves'.
- source_word: גֶּבֶר
  chosen: each
  alternatives:
  - every man
  - each warrior
  lexicon: HALOT
  rationale: 'גֶּבֶר resumes the distributive sense: each individual in the host.
    English ''each'' avoids awkward repetition after ''No man'' while preserving the
    singular distributive force. ''Warrior'' is possible contextually but not explicit
    in the noun itself.'
- source_word: בִּמְסִלָּתוֹ
  chosen: on his own path
  alternatives:
  - in his highway
  - on his course
  - in his track
  lexicon: HALOT
  rationale: מְסִלָּה is a raised road, highway, or course. In this military-poetic
    context it refers to each one's assigned line of advance. 'On his own path' is
    natural English and preserves the individual ordered movement.
- source_word: יֵלֵכוּן
  chosen: goes
  alternatives:
  - walks
  - marches
  lexicon: HALOT
  rationale: הלך is the common verb 'go/walk.' Because the context is martial, 'marches'
    is tempting, but the Hebrew itself remains general. 'Goes' keeps the wording closer
    while fitting the distributive singular sense in English.
- source_word: וּבְעַד הַשֶּׁלַח
  chosen: through the weapon
  alternatives:
  - through the dart
  - through the missile
  - amid the weapons
  lexicon: HALOT
  rationale: שֶׁלַח denotes a weapon, often a missile or dart. The preposition בעד
    can mean 'through' or 'past/among.' 'Through the weapon' preserves the vivid image
    of assault without over-specifying the exact implement.
- source_word: יִפֹּלוּ
  chosen: they fall
  alternatives:
  - they plunge
  - they are struck down
  lexicon: HALOT
  rationale: נפל is simply 'fall.' In context it may imply being struck, but the Hebrew
    does not explicitly state that, so the more basic rendering is preferred.
- source_word: לֹא יִבְצָעוּ
  chosen: they do not break ranks
  alternatives:
  - they are not cut off
  - they do not stop
  - they are not wounded
  lexicon: HALOT
  rationale: בצע here is difficult. In context of an unstoppable, disciplined army,
    many understand the clause to mean they are not broken off from their advance
    or formation. 'Break ranks' captures the military sense coherently in English.
    Because the lexeme can carry other senses, an alternative is preserved in a footnote.
