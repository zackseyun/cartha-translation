id: JOL.2.11
reference: Joel 2:11
source:
  edition: WLC
  text: וַֽ/יהוָ֗ה נָתַ֤ן קוֹל/וֹ֙ לִ/פְנֵ֣י חֵיל֔/וֹ כִּ֣י רַ֤ב מְאֹד֙ מַחֲנֵ֔/הוּ כִּ֥י עָצ֖וּם עֹשֵׂ֣ה דְבָר֑/וֹ כִּֽי גָד֧וֹל יוֹם יְהוָ֛ה וְ/נוֹרָ֥א מְאֹ֖ד וּ/מִ֥י יְכִילֶֽ/נּוּ־־׃
translation:
  text: And Yahweh gives his voice before his army, for his camp is exceedingly great; for mighty is the one who does his word. For the day of Yahweh is great and exceedingly dreadful—who can endure it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'utters his voice.' The Hebrew is literally 'gives his voice.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the one who executes his command.' Hebrew 'his word' can imply a command in this context.
    reason: lexical_alternative
  - marker: c
    text: Or 'very terrible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  chosen: And the LORD
  alternatives:
  - And Yahweh
  lexicon: HALOT
  rationale: Rendered the divine name as 'the LORD' per doctrine policy for יְהוָה, with conjunction retained as 'And' to preserve the verse's linkage.
- source_word: נָתַן קוֹלוֹ
  chosen: gives his voice
  alternatives:
  - utters his voice
  - raises his voice
  - sounds his voice
  lexicon: HALOT
  rationale: The Hebrew is literally 'gave/gives his voice.' English idiom allows either 'gives' or 'utters.' I chose 'gives his voice' to stay close to the Hebrew while remaining intelligible and vivid in prophetic style.
- source_word: לִפְנֵי חֵילוֹ
  chosen: before his army
  alternatives:
  - before his force
  - before his host
  lexicon: HALOT
  rationale: חַיִל here refers to an organized military force in the immediate context of invading troops under divine command; 'army' is the clearest modern equivalent.
- source_word: כִּי רַב מְאֹד מַחֲנֵהוּ
  chosen: for his camp is exceedingly great
  alternatives:
  - for his camp is very numerous
  - for his encampment is exceedingly large
  lexicon: HALOT
  rationale: מַחֲנֶה denotes camp/encampment, often with military sense. 'Camp' preserves the imagery distinct from 'army,' while 'exceedingly great' reflects רַב מְאֹד without flattening it to mere size or number.
- source_word: כִּי עָצוּם
  chosen: for mighty
  alternatives:
  - for strong
  - for powerful
  lexicon: HALOT
  rationale: עָצוּם conveys strength/power. 'Mighty' fits the elevated prophetic register and links naturally with the following participial clause.
- source_word: עֹשֵׂה דְבָרוֹ
  chosen: the one who carries out his word
  alternatives:
  - the one who does his word
  - the one who executes his command
  - those who carry out his word
  lexicon: HALOT
  rationale: The singular participle is best rendered as a singular agent, likely a collective singular referring to each/any agent in the army. 'Carries out his word' is idiomatic English for obedient execution of divine command. 'Word' is retained rather than 'command' because דָּבָר is broader, though command is implied in context.
- source_word: כִּי גָדוֹל יוֹם יְהוָה
  chosen: For the day of the LORD is great
  alternatives:
  - For great is the day of the LORD
  lexicon: HALOT
  rationale: A slightly smoother English word order was chosen while preserving the emphatic predicate adjective and the technical prophetic phrase 'the day of the LORD.'
- source_word: וְנוֹרָא מְאֹד
  chosen: and exceedingly dreadful
  alternatives:
  - and very terrible
  - and exceedingly awesome
  lexicon: HALOT
  rationale: נוֹרָא in judgment contexts denotes that which inspires fear/terror. 'Dreadful' better communicates the threatening force here than modern 'awesome,' which can sound positive or weakened.
- source_word: וּמִי יְכִילֶנּוּ
  chosen: who can endure it?
  alternatives:
  - who can bear it?
  - who can contain it?
  - who can survive it?
  lexicon: HALOT
  rationale: The verb conveys being able to endure or withstand. 'Endure it' is the most natural English rendering in context of the overwhelming day of judgment; the suffix refers to the day.
