theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Followed the project's stated default for the Tetragrammaton, preserving covenantal reference without introducing a transliterated form into the main text.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of 'his army' and 'his camp'
  chosen_reading: The invading force is presented as belonging to and being commanded by the LORD.
  alternative_readings:
  - The terms refer only to a locust swarm metaphorically
  - The terms refer to a purely human army apart from divine commissioning
  rationale: The possessive suffixes and the clause about carrying out 'his word' present the force as under divine command. The translation preserves that theological tension without deciding beyond the text whether the imagery is locust, human army, or both.
