id: JOL.2.13
reference: Joel 2:13
source:
  edition: WLC
  text: וְ/קִרְע֤וּ לְבַבְ/כֶם֙ וְ/אַל בִּגְדֵי/כֶ֔ם וְ/שׁ֖וּבוּ אֶל יְהוָ֣ה אֱלֹֽהֵי/כֶ֑ם
    כִּֽי חַנּ֤וּן וְ/רַחוּם֙ ה֔וּא אֶ֤רֶךְ אַפַּ֨יִם֙ וְ/רַב חֶ֔סֶד וְ/נִחָ֖ם עַל
    הָ/רָעָֽה־־־־־׃
translation:
  text: Tear your hearts and not your garments, and return to the LORD your God, for
    he is gracious and compassionate, slow to anger and abundant in steadfast love,
    and relenting concerning the disaster.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rend your hearts.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'relenting concerning the disaster'; that is, withholding threatened
      judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: קִרְעוּ
  chosen: Tear
  alternatives:
  - rend
  lexicon: HALOT
  rationale: Imperative plural of קרע, literally 'tear/rip.' 'Tear' is clear modern
    English; 'rend' is traditional but archaic for the target audience.
- source_word: לְבַבְכֶם
  chosen: your hearts
  alternatives:
  - your heart
  lexicon: HALOT
  rationale: לבב with 2mp suffix. English idiom prefers plural with plural addressees
    here, preserving the metaphor of inward repentance.
- source_word: וְאַל בִּגְדֵיכֶם
  chosen: and not your garments
  alternatives:
  - but not your garments
  - and not your clothes
  lexicon: HALOT
  rationale: אַל negates the implied parallel action. 'Garments' preserves the prophetic
    contrast with ritual mourning practices better than the more generic 'clothes.'
- source_word: וְשׁוּבוּ
  chosen: and return
  alternatives:
  - turn back
  - repent
  lexicon: HALOT
  rationale: שוב commonly means 'return/turn back.' 'Return' preserves the covenantal
    direction toward God without over-specifying the term as only inward repentance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Construct with 2mp suffix; straightforward covenantal address.
- source_word: חַנּוּן
  chosen: gracious
  alternatives:
  - merciful
  lexicon: HALOT
  rationale: Standard rendering in the divine mercy formula; 'gracious' pairs naturally
    with the following term and reflects favor shown by God.
- source_word: רַחוּם
  chosen: compassionate
  alternatives:
  - merciful
  lexicon: HALOT
  rationale: Distinguished from חנון to preserve the twofold description; 'compassionate'
    avoids flattening both adjectives into near-identical English.
- source_word: אֶרֶךְ אַפַּיִם
  chosen: slow to anger
  alternatives:
  - long of nostrils
  - patient
  lexicon: HALOT
  rationale: Established idiomatic equivalent for the Hebrew expression, preserving
    meaning rather than anatomy.
- source_word: רַב חֶסֶד
  chosen: abundant in steadfast love
  alternatives:
  - great in lovingkindness
  - abounding in covenant faithfulness
  - rich in faithful love
  lexicon: HALOT
  rationale: חסד is theologically weighty and broader than mere affection. 'Steadfast
    love' is a well-established rendering that captures loyal, covenantal love in
    accessible English; 'abundant in' reflects רב.
- source_word: וְנִחָם
  chosen: and relenting
  alternatives:
  - and relents
  - and sorry
  - and changing his mind
  lexicon: HALOT
  rationale: Niphal participle of נחם here describes God's disposition in response
    to repentance. 'Relenting' best fits the context of withholding announced judgment
    without implying ignorance or error in God.
- source_word: עַל הָרָעָה
  chosen: concerning the disaster
  alternatives:
  - from sending disaster
  - over the evil
  - concerning the calamity
  lexicon: HALOT
  rationale: רָעָה in judgment contexts commonly denotes calamity/disaster rather
    than moral evil. 'Concerning' reflects על without adding too much interpretation,
    while making clear the object is threatened judgment.
