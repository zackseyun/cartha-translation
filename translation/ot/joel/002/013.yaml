theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the Tetragrammaton as 'the LORD,' following
    Jewish reverence tradition and longstanding English convention while preserving
    covenantal force.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Description of God as וְנִחָם עַל הָרָעָה
  chosen_reading: and relenting concerning the disaster
  alternative_readings:
  - and relents from the disaster
  - and changes his mind about the disaster
  rationale: The Hebrew presents God as one who relents with respect to announced
    judgment. This preserves the text's anthropopathic language without importing
    a stronger claim that God errs or learns. 'Disaster' is chosen over 'evil' because
    the context is punitive calamity, not moral evil in God.
  doctrine_reference: Preserve theological tension rather than resolve it
