id: JOL.2.22
reference: Joel 2:22
source:
  edition: WLC
  text: אַל תִּֽירְאוּ֙ בַּהֲמ֣וֹת שָׂדַ֔י כִּ֥י דָשְׁא֖וּ נְא֣וֹת מִדְבָּ֑ר כִּֽי
    עֵץ֙ נָשָׂ֣א פִרְי֔/וֹ תְּאֵנָ֥ה וָ/גֶ֖פֶן נָתְנ֥וּ חֵילָֽ/ם־־׃
translation:
  text: Do not fear, beasts of the field, for the pastures of the wilderness have
    become green; for the tree bears its fruit, the fig tree and the vine have given
    their strength.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have yielded their produce' or 'have given their full yield.' The Hebrew
      'strength' here likely refers to productive power or abundance.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּירְאוּ
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: Imperative prohibition with ירא. 'Do not fear' is concise, natural, and
    preserves the direct address.
- source_word: בַּהֲמוֹת שָׂדַי
  chosen: beasts of the field
  alternatives:
  - animals of the field
  - livestock of the open country
  lexicon: HALOT
  rationale: בהמות denotes animals/beasts; with שדי the phrase is the familiar expression
    'beasts of the field.' 'Beasts' preserves the elevated prophetic register better
    than 'animals.'
- source_word: דָשְׁאוּ
  chosen: have become green
  alternatives:
  - sprout
  - put forth grass
  - are green
  lexicon: HALOT
  rationale: The verb refers to fresh vegetation/greening. 'Have become green' communicates
    the result in idiomatic English and fits the perfect aspect in context of restoration.
- source_word: נְאֹות מִדְבָּר
  chosen: the pastures of the wilderness
  alternatives:
  - the grazing places of the wilderness
  - the meadows of the wilderness
  - the pastures of the open land
  lexicon: HALOT
  rationale: נאות commonly refers to pastures/grazing places. מִדבר here is best rendered
    'wilderness' rather than 'desert' to avoid implying barren sand rather than uncultivated
    pastureland.
- source_word: עֵץ נָשָׂא פִרְיוֹ
  chosen: the tree bears its fruit
  alternatives:
  - the tree has borne its fruit
  - the trees bear their fruit
  lexicon: HALOT
  rationale: Singular collective usage is possible in Hebrew. Retaining the singular
    'the tree' follows the source closely and reads naturally as a class statement.
    English present 'bears' expresses the restored productivity vividly.
- source_word: תְּאֵנָה וָגֶפֶן
  chosen: the fig tree and the vine
  alternatives:
  - fig tree and vine
  lexicon: HALOT
  rationale: Both are specific agricultural images of covenant blessing and restored
    fertility. Including the articles in English gives a natural generic sense.
- source_word: נָתְנוּ חֵילָם
  chosen: have given their strength
  alternatives:
  - have yielded their wealth
  - have produced their full yield
  - have given their produce
  lexicon: HALOT
  rationale: חיל can denote strength, wealth, or productive power. In this agricultural
    context it refers to the plants' vigor/productive capacity. 'Have given their
    strength' preserves the Hebrew metaphor while remaining intelligible.
