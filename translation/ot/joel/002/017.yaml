id: JOL.2.17
reference: Joel 2:17
source:
  edition: WLC
  text: בֵּ֤ין הָ/אוּלָם֙ וְ/לַ/מִּזְבֵּ֔חַ יִבְכּוּ֙ הַ/כֹּ֣הֲנִ֔ים מְשָׁרְתֵ֖י יְהוָ֑ה
    וְֽ/יֹאמְר֞וּ ח֧וּסָ/ה יְהוָ֣ה עַל עַמֶּ֗/ךָ וְ/אַל תִּתֵּ֨ן נַחֲלָתְ/ךָ֤ לְ/חֶרְפָּה֙
    לִ/מְשָׁל בָּ֣/ם גּוֹיִ֔ם לָ֚/מָּה יֹאמְר֣וּ בָֽ/עַמִּ֔ים אַיֵּ֖ה אֱלֹהֵי/הֶֽם־־־׃
translation:
  text: Let the priests, the ministers of the LORD, weep between the portico and the
    altar, and let them say, “Spare your people, LORD, and do not make your inheritance
    a reproach, a byword among the nations. Why should they say among the peoples,
    ‘Where is their God?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'between the vestibule and the altar' or 'between the porch and the
      altar.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'do not give your inheritance over to disgrace, for the nations to rule
      over them.' The Hebrew phrase may be understood either as becoming a mocking
      byword or as being handed over to foreign domination; the context here favors
      the sense of public taunt.
    reason: alternative_reading
lexical_decisions:
- source_word: בֵּין הָאוּלָם וְלַמִּזְבֵּחַ
  chosen: between the portico and the altar
  alternatives:
  - between the vestibule and the altar
  - between the porch and the altar
  lexicon: HALOT
  rationale: אוּלָם denotes the temple's entrance hall/portico area. 'Portico' is
    clear modern English and more precise than the traditional 'porch,' while preserving
    the cultic setting.
- source_word: יִבְכּוּ
  chosen: let ... weep
  alternatives:
  - shall weep
  - should weep
  lexicon: HALOT
  rationale: The imperfect/jussive form in context functions as an exhortation or
    instruction within the assembly call. 'Let ... weep' best captures the hortatory
    force.
- source_word: הַכֹּהֲנִים מְשָׁרְתֵי יְהוָה
  chosen: the priests, the ministers of the LORD
  alternatives:
  - the priests who minister to the LORD
  - the priests, servants of the LORD
  lexicon: HALOT
  rationale: מְשָׁרְתֵי is a participial designation describing priestly service.
    'Ministers' preserves the formal cultic role without flattening it to generic
    service.
- source_word: יְהוָה
  chosen: the LORD / LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the LXX pattern.
- source_word: חוּסָה
  chosen: Spare
  alternatives:
  - Have pity on
  - Show compassion to
  lexicon: HALOT
  rationale: The imperative asks YHWH to withhold destructive judgment and act compassionately.
    'Spare' is concise, idiomatic, and fits the covenantal plea.
- source_word: עַל עַמֶּךָ
  chosen: your people
  alternatives:
  - on your people
  lexicon: HALOT
  rationale: 'Though עַל is literally ''upon/on,'' English idiom with חוס takes a
    direct object: ''spare your people.'' This is an optimal-equivalence adjustment.'
- source_word: וְאַל תִּתֵּן נַחֲלָתְךָ לְחֶרְפָּה
  chosen: and do not make your inheritance a reproach
  alternatives:
  - and do not give your inheritance over to reproach
  - and do not hand over your inheritance to disgrace
  lexicon: HALOT
  rationale: נָתַן with לְ can mean 'give over/make into' in resultative sense. 'Make
    your inheritance a reproach' reads naturally while preserving the covenantal designation
    'your inheritance' for Israel.
- source_word: נַחֲלָתְךָ
  chosen: your inheritance
  alternatives:
  - your heritage
  - your possession
  lexicon: HALOT
  rationale: The term evokes covenantal possession/inheritance language. 'Inheritance'
    preserves that theological resonance better than the broader 'heritage' or 'possession.'
- source_word: לְחֶרְפָּה
  chosen: a reproach
  alternatives:
  - a disgrace
  - an object of scorn
  lexicon: HALOT
  rationale: חֶרְפָּה often denotes public shame or taunt. 'Reproach' is slightly
    more formal but preserves the biblical register and communal dishonor.
- source_word: לִמְשָׁל בָּם גּוֹיִם
  chosen: a byword among the nations
  alternatives:
  - for the nations to rule over them
  - a proverb among the nations
  - a mockery among the nations
  lexicon: HALOT
  rationale: מָשָׁל can denote a proverb/byword/taunt. In this context, parallel to
    'reproach' and followed by the nations' derisive question, the sense is being
    made an object of mocking proverbial speech, not political rule. 'Byword' captures
    this compactly.
- source_word: גּוֹיִם / בָעַמִּים
  chosen: the nations / the peoples
  alternatives:
  - the Gentiles / the peoples
  - the nations / the nations
  lexicon: HALOT
  rationale: גוֹיִם here refers to foreign nations; 'nations' is standard. עַמִּים
    in the final clause is broader plural 'peoples'; varying the English reflects
    the lexical distinction while keeping the parallelism.
- source_word: לָמָּה יֹאמְרוּ
  chosen: Why should they say
  alternatives:
  - Why will they say
  - Why do they say
  lexicon: HALOT
  rationale: The imperfect in this prayer expresses feared consequence. 'Why should
    they say' communicates the rhetorical appeal to prevent such an outcome.
- source_word: אַיֵּה אֱלֹהֵיהֶם
  chosen: Where is their God?
  alternatives:
  - Where then is their God?
  lexicon: HALOT
  rationale: A straightforward taunt formula questioning the presence or power of
    Israel's God. The simple rendering preserves the force.
