theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD / LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains direct address to Israel's covenant God. Following
    the project's stated default for יְהוָה, the translation uses 'the LORD' in narration
    and 'LORD' in direct address.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of לִמְשָׁל בָּם גּוֹיִם
  chosen_reading: a byword among the nations
  alternative_readings:
  - for the nations to rule over them
  rationale: The immediate context emphasizes public shame and the nations' mocking
    speech ('Where is their God?'). This favors the semantic field of taunt/proverb/byword
    rather than dominion. The chosen reading preserves the theological concern for
    God's reputation among the nations.
