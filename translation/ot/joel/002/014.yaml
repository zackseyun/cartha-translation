theological_decisions:
- issue: Rendering of divine repentance language
  chosen_reading: He may turn and relent
  alternative_readings:
  - He may return and be sorry
  - He may turn back and have compassion
  rationale: The Hebrew presents genuine uncertainty from the human perspective ('Who knows?') and uses standard prophetic language for God's reversal of announced judgment. 'Relent' preserves the theological tension without suggesting that God sinned, erred, or learned new information.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Specificity of מִנְחָה in cultic context
  chosen_reading: an offering
  alternative_readings:
  - a grain offering
  rationale: The context strongly suggests the technical sacrificial sense, likely specifically a grain offering paired with a drink offering. The main text uses the broader 'offering' for readability, while the more specific alternative is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic or academic)
