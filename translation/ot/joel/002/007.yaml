id: JOL.2.7
reference: Joel 2:7
source:
  edition: WLC
  text: כְּ/גִבּוֹרִ֣ים יְרֻצ֔וּ/ן כְּ/אַנְשֵׁ֥י מִלְחָמָ֖ה יַעֲל֣וּ חוֹמָ֑ה וְ/אִ֤ישׁ
    בִּ/דְרָכָי/ו֙ יֵֽלֵכ֔וּ/ן וְ/לֹ֥א יְעַבְּט֖וּ/ן אֹרְחוֹתָֽ/ם׃
translation:
  text: Like warriors they run; like men of war they climb the wall. Each goes in
    his own way, and they do not swerve from their paths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like soldiers' or 'like fighting men' for 'like men of war.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they do not break rank.' The Hebrew verb is rare and may denote not
      deviating from formation or course.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּגִבּוֹרִים
  chosen: Like warriors
  alternatives:
  - like mighty men
  - like heroes
  lexicon: HALOT
  rationale: גִּבּוֹר commonly denotes a strong warrior or mighty man. In this military
    context, 'warriors' best captures the martial sense without sounding archaic.
- source_word: יְרֻצוּן
  chosen: they run
  alternatives:
  - they rush
  - they sprint
  lexicon: HALOT
  rationale: From רוץ, 'run.' The imperfect here describes characteristic action in
    vivid sequence. 'Run' is the most direct and natural rendering.
- source_word: כְּאַנְשֵׁי מִלְחָמָה
  chosen: like men of war
  alternatives:
  - like soldiers
  - like fighting men
  lexicon: HALOT
  rationale: Literally 'like men of war.' Because the Hebrew is explicitly masculine
    and refers to combatants, this preserves the source's gendered expression while
    remaining idiomatic. 'Soldiers' is possible but less formally aligned to the Hebrew
    phrase.
- source_word: יַעֲלוּ חוֹמָה
  chosen: they climb the wall
  alternatives:
  - they go up the wall
  - they scale the wall
  lexicon: HALOT
  rationale: עלה means 'go up, ascend'; with חוֹמָה, the sense is ascending/climbing
    a city wall. 'Climb the wall' is clear modern English; 'scale the wall' is also
    possible but slightly more interpretive.
- source_word: וְאִישׁ בִּדְרָכָיו יֵלֵכוּן
  chosen: Each goes in his own way
  alternatives:
  - and each walks in his own path
  - each marches on his own course
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each one.' דֶּרֶךְ can mean way, road, or
    course. The phrase emphasizes ordered movement by individuals within the larger
    host. Singular 'Each goes' reflects the distributive force better than a flat
    plural.
- source_word: וְלֹא יְעַבְּטוּן
  chosen: they do not swerve
  alternatives:
  - they do not break rank
  - they do not turn aside
  lexicon: HALOT
  rationale: The verb is difficult and relatively rare. In context, it conveys deviation,
    entanglement, or disruption of course. 'Do not swerve' fits the parallel with
    staying in their own ways and preserves the image of disciplined advance without
    over-specifying military rank structure.
- source_word: אֹרְחוֹתָם
  chosen: their paths
  alternatives:
  - their ways
  - their tracks
  lexicon: HALOT
  rationale: אֹרַח denotes a path or track. 'Paths' pairs naturally with 'swerve'
    and distinguishes it slightly from the earlier דֶּרֶךְ while keeping the parallelism.
