theological_decisions:
- issue: Gendered military language
  chosen_reading: Retain 'men of war' and 'his own way' in the distributive clause
  alternative_readings:
  - like soldiers ... each goes their own way
  rationale: The Hebrew uses explicitly masculine forms and a distributive singular
    אִישׁ with 3ms suffix. Per translation philosophy, gender-accurate rendering is
    preferred over neutralization where the source is masculine and representative.
    The context is a military simile, so preserving the masculine wording is warranted.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
