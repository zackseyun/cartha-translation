id: JOL.2.5
reference: Joel 2:5
source:
  edition: WLC
  text: כְּ/ק֣וֹל מַרְכָּב֗וֹת עַל רָאשֵׁ֤י הֶֽ/הָרִים֙ יְרַקֵּד֔וּ/ן כְּ/קוֹל֙ לַ֣הַב
    אֵ֔שׁ אֹכְלָ֖ה קָ֑שׁ כְּ/עַ֣ם עָצ֔וּם עֱר֖וּךְ מִלְחָמָֽה־׃
translation:
  text: Like the sound of chariots, they leap on the tops of the mountains; like the
    sound of a flame of fire consuming stubble; like a mighty people arrayed for battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they skip' or 'they dance'; the Hebrew verb can denote lively springing
      movement. Here it is rendered 'they leap' to fit the military advance imagery.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'on the heads of the mountains.'
    reason: lexical_alternative
  - marker: c
    text: Or 'prepared for war' / 'drawn up for battle.' The Hebrew emphasizes ordered
      military formation.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּקוֹל
  chosen: Like the sound of
  alternatives:
  - Like the noise of
  - As the sound of
  lexicon: HALOT
  rationale: כְּ marks comparison ('like/as'), and קוֹל here denotes audible sound/noise.
    'Like the sound of' is natural English and preserves the simile structure repeated
    through the verse.
- source_word: מַרְכָּבוֹת
  chosen: chariots
  alternatives:
  - war chariots
  lexicon: HALOT
  rationale: The noun normally means 'chariots.' 'War chariots' is contextually possible
    but adds specificity not explicit in the Hebrew.
- source_word: עַל רָאשֵׁי הֶהָרִים
  chosen: on the tops of the mountains
  alternatives:
  - over the mountaintops
  - on the mountain peaks
  lexicon: HALOT
  rationale: Literally 'upon the heads of the mountains.' 'Tops of the mountains'
    preserves the vivid Hebrew idiom while remaining idiomatic English.
- source_word: יְרַקֵּדוּן
  chosen: they leap
  alternatives:
  - they skip
  - they dance
  - they spring
  lexicon: HALOT
  rationale: From רקד, the basic sense is to skip/leap/dance. In this military-theophanic
    simile, 'they leap' best conveys rapid bounding movement over the heights without
    suggesting celebratory dancing.
- source_word: לַהַב אֵשׁ
  chosen: a flame of fire
  alternatives:
  - the crackling flame of fire
  - a blazing fire
  lexicon: HALOT
  rationale: לַהַב is 'flame, blaze.' The construct-like sequence with אֵשׁ is well
    represented by 'a flame of fire.' More interpretive renderings such as 'crackling
    flame' draw from context rather than the noun itself.
- source_word: אֹכְלָה קָשׁ
  chosen: consuming stubble
  alternatives:
  - that consumes stubble
  - devouring straw
  lexicon: HALOT
  rationale: The participial/verbal form with קָשׁ expresses fire actively eating
    up dry stalks. 'Consuming stubble' is concise and vivid; 'straw' is possible,
    but 'stubble' better fits prophetic fire imagery.
- source_word: כְּעַם עָצוּם
  chosen: like a mighty people
  alternatives:
  - like a strong people
  - like a vast people
  lexicon: HALOT
  rationale: עָצוּם can denote strong, mighty, numerous, or powerful. 'Mighty' best
    captures martial force in this context.
- source_word: עֱרוּךְ מִלְחָמָה
  chosen: arrayed for battle
  alternatives:
  - drawn up for battle
  - prepared for war
  - set in battle order
  lexicon: HALOT
  rationale: The passive participle of ערך conveys being arranged or set in order,
    especially in military formation. 'Arrayed for battle' is idiomatic and preserves
    the organized martial image.
