id: JOL.2.19
reference: Joel 2:19
source:
  edition: WLC
  text: וַ/יַּ֨עַן יְהוָ֜ה וַ/יֹּ֣אמֶר לְ/עַמּ֗/וֹ הִנְ/נִ֨י שֹׁלֵ֤חַ לָ/כֶם֙ אֶת
    הַ/דָּגָן֙ וְ/הַ/תִּיר֣וֹשׁ וְ/הַ/יִּצְהָ֔ר וּ/שְׂבַעְתֶּ֖ם אֹת֑/וֹ וְ/לֹא אֶתֵּ֨ן
    אֶתְ/כֶ֥ם ע֛וֹד חֶרְפָּ֖ה בַּ/גּוֹיִֽם־־׃
translation:
  text: Then the LORD answered and said to his people, “Look, I am sending you the
    grain, the new wine, and the fresh oil, and you will be satisfied with it; and
    I will no longer make you a reproach among the nations.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the oil,” likely olive oil; the Hebrew term refers to fresh oil as part
      of the standard agricultural triad of grain, wine, and oil.
    reason: lexical_alternative
  - marker: b
    text: Or “I will no longer make you an object of scorn among the nations.”
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagint pattern.
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: ענה in this narrative formula commonly means 'answered/responded.' 'Answered'
    preserves the idiomatic biblical pattern and fits the context of divine response
    to the people's plea in the preceding verse.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - declared
  lexicon: HALOT
  rationale: אמר is the standard verb 'say.' 'Said' is the most direct and least interpretive
    rendering in this narrative sequence.
- source_word: לְעַמּוֹ
  chosen: to his people
  alternatives:
  - to his nation
  lexicon: HALOT
  rationale: עַם here refers to the covenant people collectively. 'His people' is
    the natural English equivalent and preserves the relational covenant sense.
- source_word: הִנְנִי
  chosen: Look, I am
  alternatives:
  - Behold, I am
  - Here I am, I am
  lexicon: HALOT
  rationale: הִנְנִי is a deictic particle expressing immediacy and emphasis. 'Look,
    I am' conveys the force in readable modern English better than the archaic 'Behold.'
- source_word: שֹׁלֵחַ
  chosen: sending
  alternatives:
  - about to send
  - will send
  lexicon: HALOT
  rationale: The participle after הִנְנִי expresses imminent or certain action. 'I
    am sending' preserves the vividness and immediacy without over-paraphrasing.
- source_word: הַדָּגָן
  chosen: the grain
  alternatives:
  - grain
  - corn
  lexicon: HALOT
  rationale: דָּגָן denotes grain/cereal produce generally, not specifically maize.
    'The grain' fits the agricultural triad and preserves the article present in Hebrew.
- source_word: הַתִּירוֹשׁ
  chosen: the new wine
  alternatives:
  - wine
  - fresh wine
  - sweet wine
  lexicon: HALOT
  rationale: תִּירוֹשׁ commonly refers to freshly produced wine/new wine rather than
    wine in the most general sense. 'New wine' preserves the specific agricultural
    nuance.
- source_word: הַיִּצְהָר
  chosen: the fresh oil
  alternatives:
  - olive oil
  - the oil
  lexicon: HALOT
  rationale: יִצְהָר refers specifically to fresh oil, usually olive oil, as part
    of the standard grain-wine-oil triad. 'Fresh oil' preserves the lexical distinction
    from more general terms for oil; 'olive oil' is possible but slightly more interpretive.
- source_word: וּשְׂבַעְתֶּם אֹתוֹ
  chosen: and you will be satisfied with it
  alternatives:
  - and you will be filled by it
  - and you will have your fill of it
  lexicon: HALOT
  rationale: שׂבע means to be sated/satisfied. The singular pronoun אֹתוֹ likely refers
    collectively to the provision just listed. 'Satisfied with it' is natural English
    and preserves the result of abundance.
- source_word: וְלֹא אֶתֵּן אֶתְכֶם עוֹד
  chosen: and I will no longer make you
  alternatives:
  - and I will no longer give you over as
  - and I will no longer set you as
  lexicon: HALOT
  rationale: נתן plus object and predicate can mean 'make/render' someone into a certain
    state. Here the sense is not literal giving but causing Israel to be regarded
    as a reproach. 'Make you' communicates the idiom clearly.
- source_word: חֶרְפָּה
  chosen: a reproach
  alternatives:
  - disgrace
  - object of scorn
  lexicon: HALOT
  rationale: חֶרְפָּה denotes reproach, disgrace, or taunt. 'A reproach' is a strong,
    fairly formal equivalent that matches prophetic diction while remaining understandable.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the surrounding nations/peoples. In the Hebrew
    Bible context, 'nations' is the most natural rendering; 'Gentiles' would import
    later Jewish/Christian usage less fitting here.
