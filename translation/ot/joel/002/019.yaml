theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH. This preserves established reverential convention without obscuring that
    the covenant God is the speaker.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of the agricultural triad
  chosen_reading: material covenant restoration through agricultural abundance
  alternative_readings:
  - purely symbolic spiritual blessing
  rationale: The verse plainly promises restoration of actual agricultural produce—grain,
    new wine, and oil—within Joel's covenant-judgment context. No additional spiritualizing
    is imported, though such provision may carry broader covenant significance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: Force of חֶרְפָּה בַּגּוֹיִם
  chosen_reading: public shame before other nations
  alternative_readings:
  - mere internal emotional shame
  rationale: The phrase indicates Israel's status as an object of disgrace in the
    sight of surrounding peoples. The translation preserves the communal and international
    dimension of the reproach.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1'
