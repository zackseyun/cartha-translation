id: JOL.2.24
reference: Joel 2:24
source:
  edition: WLC
  text: וּ/מָלְא֥וּ הַ/גֳּרָנ֖וֹת בָּ֑ר וְ/הֵשִׁ֥יקוּ הַ/יְקָבִ֖ים תִּיר֥וֹשׁ וְ/יִצְהָֽר׃
translation:
  text: The threshing floors will be filled with grain, and the vats will overflow
    with new wine and fresh oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the vats will run over with new wine and olive oil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמָלְאוּ
  chosen: will be filled
  alternatives:
  - shall be full
  - will become full
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic context functions
    as a future/result statement. Passive-like English ('will be filled') best conveys
    the state resulting from divine restoration.
- source_word: הַגֳּרָנוֹת
  chosen: the threshing floors
  alternatives:
  - the threshing floors/areas
  lexicon: HALOT
  rationale: גֹּרֶן denotes a threshing floor, the place where grain is processed.
    Plural is retained.
- source_word: בָּר
  chosen: grain
  alternatives:
  - wheat
  - corn
  lexicon: HALOT
  rationale: בָּר here refers broadly to threshed grain rather than specifically wheat.
    'Grain' is the most natural and accurate modern English rendering.
- source_word: וְהֵשִׁיקוּ
  chosen: will overflow
  alternatives:
  - will run over
  - will abound
  lexicon: HALOT
  rationale: The Hiphil of שׁוק/related form here conveys causing to overflow or gush.
    'Will overflow' captures the image of abundance in idiomatic English.
- source_word: הַיְקָבִים
  chosen: the vats
  alternatives:
  - the wine vats
  - the presses
  lexicon: HALOT
  rationale: יֶקֶב denotes a vat associated with pressing/collecting liquid, especially
    from grapes or olives. 'Vats' is concise and allows the following objects to specify
    contents.
- source_word: תִּירוֹשׁ
  chosen: new wine
  alternatives:
  - fresh wine
  - wine
  lexicon: HALOT
  rationale: תִּירוֹשׁ commonly refers to fresh/new wine, not generic wine in the
    abstract. 'New wine' preserves the agricultural and seasonal nuance.
- source_word: וְיִצְהָר
  chosen: fresh oil
  alternatives:
  - olive oil
  - new oil
  lexicon: HALOT
  rationale: יִצְהָר refers to fresh oil, typically olive oil, as an agricultural
    produce. 'Fresh oil' parallels 'new wine' and preserves the sense of newly produced
    abundance.
