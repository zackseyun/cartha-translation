theological_decisions:
- issue: Rendering divine jealousy/zeal
  chosen_reading: Then the LORD became jealous for his land
  alternative_readings:
  - Then the LORD was zealous for his land
  rationale: The Hebrew permits either 'jealous' or 'zealous.' Because קנא often carries
    covenantal exclusivity and possessive concern when used of God, 'jealous' better
    preserves the theological force, while the alternative is preserved in a footnote
    to maintain the semantic range.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
