id: JOL.2.18
reference: Joel 2:18
source:
  edition: WLC
  text: וַ/יְקַנֵּ֥א יְהוָ֖ה לְ/אַרְצ֑/וֹ וַ/יַּחְמֹ֖ל עַל עַמּֽ/וֹ־׃
translation:
  text: Then the LORD became jealous for his land and had compassion on his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, "was zealous for his land." The Hebrew verb can express either jealousy
      or zeal; here it denotes the LORD's ardent covenant concern for what is his.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְקַנֵּא
  chosen: became jealous
  alternatives:
  - was jealous
  - was zealous
  - burned with zeal
  lexicon: HALOT
  rationale: The verb קנא can denote jealousy or zeal. In this context, with לְאַרְצוֹ
    ('for his land'), it expresses YHWH's ardent protective concern for what belongs
    to him. 'Became jealous for' preserves the covenantal/emotive force without flattening
    it to mere enthusiasm. The prefixed waw with imperfect is rendered as a past narrative
    form.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD,' following established reverential convention and the Septuagintal pattern.
- source_word: לְאַרְצוֹ
  chosen: for his land
  alternatives:
  - for his הארץ
  - for his country
  - for his earth
  lexicon: HALOT
  rationale: אֶרֶץ here most naturally refers to the covenant land rather than the
    whole earth. The preposition לְ after קנא is idiomatically rendered 'for,' indicating
    the object of YHWH's jealous concern.
- source_word: וַיַּחְמֹל
  chosen: had compassion
  alternatives:
  - pitied
  - spared
  - showed pity
  lexicon: HALOT
  rationale: חמל conveys pity, compassion, or sparing. 'Had compassion' fits modern
    readable English and matches the emotional-restorative context of Joel 2, while
    avoiding the narrower implication of merely withholding judgment that 'spared'
    can suggest.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  - for
  lexicon: HALOT
  rationale: With חמל, עַל marks the object of compassion. In idiomatic English this
    is best absorbed into 'had compassion on.'
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: עַם in covenant contexts commonly means 'people' in the collective sense
    of God's covenant community. 'Nation' would sound more political and less relational
    than the Hebrew here.
