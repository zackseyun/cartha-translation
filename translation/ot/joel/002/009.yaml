id: JOL.2.9
reference: Joel 2:9
source:
  edition: WLC
  text: בָּ/עִ֣יר יָשֹׁ֗קּוּ בַּֽ/חוֹמָה֙ יְרֻצ֔וּ/ן בַּ/בָּתִּ֖ים יַעֲל֑וּ בְּעַ֧ד
    הַ/חַלּוֹנִ֛ים יָבֹ֖אוּ כַּ/גַּנָּֽב׃
translation:
  text: They rush through the city; they run on the wall; they climb into the houses;
    they enter through the windows like a thief.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the city' for 'through the city'; the Hebrew preposition is literally
      'in,' but the English rendering reflects movement within the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשֹׁקּוּ
  chosen: rush through
  alternatives:
  - run about
  - dart about
  - surge
  lexicon: HALOT
  rationale: The verb denotes rapid, forceful movement in the city setting. 'Rush
    through' conveys urgency and invasion more naturally in English than a more opaque
    literalism such as 'run to and fro,' while preserving the image of chaotic advance.
- source_word: בָּעִיר
  chosen: through the city
  alternatives:
  - in the city
  lexicon: HALOT
  rationale: The preposition ב normally means 'in,' but with a verb of movement English
    idiom often prefers 'through' to express movement within urban space. This reflects
    optimal equivalence without adding content.
- source_word: יְרֻצוּן
  chosen: run
  alternatives:
  - race
  - rush
  lexicon: HALOT
  rationale: From רוץ, the common verb 'run.' 'Run' is the most direct and natural
    rendering here and keeps the parallelism with the surrounding rapid-motion verbs.
- source_word: בַּחוֹמָה
  chosen: on the wall
  alternatives:
  - along the wall
  - upon the wall
  lexicon: HALOT
  rationale: The singular likely functions collectively or representationally for
    the city wall/fortification. 'On the wall' is idiomatic and preserves the vivid
    siege imagery.
- source_word: יַעֲלוּ
  chosen: climb into
  alternatives:
  - go up into
  - climb up into
  lexicon: HALOT
  rationale: The verb means 'go up/ascend.' In context of entering houses by scaling,
    'climb into' makes the implied manner explicit from the context without over-paraphrasing.
- source_word: בַּבָּתִּים
  chosen: the houses
  alternatives:
  - houses
  lexicon: HALOT
  rationale: The article is present in Hebrew. 'The houses' preserves the specificity
    of the scene, though English could omit the article. Retaining it fits the vivid
    description of invasion.
- source_word: בְּעַד הַחַלּוֹנִים
  chosen: through the windows
  alternatives:
  - in through the windows
  - by way of the windows
  lexicon: HALOT
  rationale: בְּעַד commonly means movement through or in through an opening. 'Through
    the windows' is the clearest natural English rendering.
- source_word: יָבֹאוּ
  chosen: enter
  alternatives:
  - come in
  - go in
  lexicon: HALOT
  rationale: The verb is the common 'come/enter.' 'Enter' best fits the hostile intrusion
    into houses and keeps the line concise.
- source_word: כַּגַּנָּב
  chosen: like a thief
  alternatives:
  - as a thief
  lexicon: HALOT
  rationale: The simile emphasizes stealthy, invasive entry. 'Like a thief' is standard
    modern English and preserves the comparison without importing later theological
    associations.
