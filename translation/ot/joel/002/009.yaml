theological_decisions:
- issue: Referent of the invading force
  chosen_reading: Use the generic plural pronoun 'they' without specifying whether
    the referent is locusts, an army, or a blended prophetic image.
  alternative_readings:
  - Interpret explicitly as locusts
  - Interpret explicitly as human soldiers
  rationale: The Hebrew uses third-person plural verbs without an explicit noun in
    this verse, continuing the prior context. The imagery in Joel intentionally sustains
    a vivid overlap between locust plague and military invasion. To preserve that
    tension, the translation leaves the referent implicit rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
