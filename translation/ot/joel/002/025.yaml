theological_decisions:
- issue: Whether the locust terms should be rendered as literal insect designations
    or as purely symbolic military invaders
  chosen_reading: Literal locust plague described with military imagery
  alternative_readings:
  - Entirely metaphorical human army
  rationale: The verse names four specific locust-related terms and then appositionally
    calls them 'my great army,' indicating a literal plague framed in martial language
    under God's sovereignty. The translation preserves both the literal insects and
    the metaphor without collapsing one into the other.
- issue: Divine agency in the disaster
  chosen_reading: God explicitly claims responsibility for sending the plague
  alternative_readings:
  - Permissive agency only
  rationale: The first-person verb 'I sent' should be translated directly. The text
    itself attributes the sending to God, and the translation should not soften that
    claim beyond what the Hebrew states.
