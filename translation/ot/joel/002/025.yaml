id: JOL.2.25
reference: Joel 2:25
source:
  edition: WLC
  text: וְ/שִׁלַּמְתִּ֤י לָ/כֶם֙ אֶת הַ/שָּׁנִ֔ים אֲשֶׁר֙ אָכַ֣ל הָֽ/אַרְבֶּ֔ה הַ/יֶּ֖לֶק
    וְ/הֶ/חָסִ֣יל וְ/הַ/גָּזָ֑ם חֵילִ/י֙ הַ/גָּד֔וֹל אֲשֶׁ֥ר שִׁלַּ֖חְתִּי בָּ/כֶֽם־׃
translation:
  text: I will restore to you the years that the swarming locust has eaten—the hopper,
    the destroyer, and the cutter—my great army that I sent among you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The four Hebrew terms likely refer to kinds or stages of locusts. Their
      exact zoological distinctions are uncertain; alternatives include 'creeping
      locust,' 'devourer,' and 'gnawer.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that I sent against you.' The Hebrew preposition can be understood in
      more than one way here.
    reason: alternative_reading
lexical_decisions:
- source_word: וְשִׁלַּמְתִּי
  chosen: I will restore
  alternatives:
  - I will repay
  - I will make good
  lexicon: HALOT
  rationale: The piel of שלם can mean repay, recompense, or restore/make whole. In
    context, God promises to make up for lost years of agricultural devastation, so
    'restore' communicates restitution in natural English without implying a merely
    financial repayment.
- source_word: לָכֶם
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition ל marks the affected recipients of the promised restoration;
    'to you' is the most straightforward English rendering here.
- source_word: הַשָּׁנִים
  chosen: the years
  alternatives:
  - the years of produce
  - the years' losses
  lexicon: HALOT
  rationale: The direct object is literally 'the years.' The text speaks metonymically
    of the years lost to locust devastation; retaining 'the years' preserves the vivid
    Hebrew expression.
- source_word: אֲשֶׁר אָכַל
  chosen: that ... has eaten
  alternatives:
  - which ... consumed
  - that ... ate up
  lexicon: HALOT
  rationale: The relative clause is straightforward. English present perfect ('has
    eaten') fits the resultative sense of past devastation with present consequences.
- source_word: הָאַרְבֶּה
  chosen: the swarming locust
  alternatives:
  - the locust
  - the great locust
  lexicon: HALOT
  rationale: אַרבה is the common term for locust. 'Swarming locust' distinguishes
    it from the following insect terms and reflects a common lexical nuance without
    overcommitting to a technical species identification.
- source_word: הַיֶּלֶק
  chosen: the hopper
  alternatives:
  - the creeping locust
  - the young locust
  lexicon: HALOT
  rationale: The exact zoological distinction is uncertain. 'Hopper' is a clear modern
    English label often used for a locust stage/type and preserves differentiation
    among the four terms better than flattening them all to 'locust.'
- source_word: וְהֶחָסִיל
  chosen: the destroyer
  alternatives:
  - the devourer
  - the consuming locust
  lexicon: HALOT
  rationale: The noun likely denotes a consuming/destructive locust type or stage.
    'Destroyer' is idiomatic and preserves the destructive force of the term.
- source_word: וְהַגָּזָם
  chosen: the cutter
  alternatives:
  - the gnawer
  - the cutting locust
  lexicon: HALOT
  rationale: The term is traditionally understood as a cutting/gnawing locust. 'Cutter'
    is concise, distinct from the other terms, and avoids false precision about entomological
    taxonomy.
- source_word: חֵילִי הַגָּדוֹל
  chosen: my great army
  alternatives:
  - my great force
  - my mighty army
  lexicon: HALOT
  rationale: חיל commonly means army, force, or host. In Joel, the locust plague is
    portrayed in militarized imagery under divine command, so 'my great army' preserves
    the metaphor and theological force.
- source_word: אֲשֶׁר שִׁלַּחְתִּי בָּכֶם
  chosen: that I sent among you
  alternatives:
  - that I sent against you
  - that I sent into your midst
  lexicon: HALOT
  rationale: The preposition ב can support 'among/in the midst of' and in context
    refers to the plague's incursion into the community/land. 'Among you' is natural
    English and avoids overinterpreting the preposition as overt hostility, though
    that nuance is possible.
