theological_decisions:
- issue: Scope of הָאָרֶץ in the phrase 'inhabitants of the land/earth'
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: Joel can speak both locally of Judah/Zion and more broadly in cosmic terms. In this verse, the immediate references to Zion and the holy mountain favor 'land' as the primary sense, while the eschatological overtones of the day of the LORD make 'earth' a meaningful alternative worth preserving in a footnote rather than resolving dogmatically.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
