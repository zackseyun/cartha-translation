id: JOL.2.1
reference: Joel 2:1
source:
  edition: WLC
  text: תִּקְע֨וּ שׁוֹפָ֜ר בְּ/צִיּ֗וֹן וְ/הָרִ֨יעוּ֙ בְּ/הַ֣ר קָדְשִׁ֔/י יִרְגְּז֕וּ כֹּ֖ל יֹשְׁבֵ֣י הָ/אָ֑רֶץ כִּֽי בָ֥א יוֹם יְהוָ֖ה כִּ֥י קָרֽוֹב־־׃
translation:
  text: Blow a horn in Zion, and sound an alarm on my holy mountain; let all the inhabitants of the land tremble, for the day of Yahweh is coming—indeed, it is near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the inhabitants of the earth.' The Hebrew אֶרֶץ can mean either 'land' or 'earth' depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: תִּקְעוּ
  chosen: Blow
  alternatives:
  - Sound
  lexicon: HALOT
  rationale: Imperative plural of תקע with שׁוֹפָר, denoting the act of blowing/sounding a horn. 'Blow' is idiomatic and direct in English.
- source_word: שׁוֹפָר
  chosen: horn
  alternatives:
  - ram's horn
  - trumpet
  lexicon: HALOT
  rationale: Refers to the shofar, a horn used for alarm/cultic signaling. 'Horn' is concise and accurate in context; 'ram's horn' is more specific but heavier, while 'trumpet' can suggest a metal instrument not required by the Hebrew.
- source_word: בְּצִיּוֹן
  chosen: in Zion
  alternatives:
  - on Zion
  lexicon: HALOT
  rationale: Standard locative use with the place name צִיּוֹן. 'In Zion' is natural English for the city/holy locale.
- source_word: וְהָרִיעוּ
  chosen: raise a battle cry
  alternatives:
  - shout
  - sound an alarm
  - raise a shout
  lexicon: HALOT
  rationale: Hiphil imperative of רוע often denotes raising a loud alarm/shout, especially in military or warning contexts. Given the parallel with blowing the shofar and the impending day of the LORD, 'raise a battle cry' preserves the urgent alarm sense better than the generic 'shout'.
- source_word: בְּהַר קָדְשִׁי
  chosen: on my holy mountain
  alternatives:
  - in my holy mountain
  lexicon: HALOT
  rationale: The preposition with הַר is naturally rendered 'on' in English. The 1cs suffix on 'my holiness/holy' yields 'my holy mountain,' referring to Zion as the LORD's sacred mountain.
- source_word: יִרְגְּזוּ
  chosen: let ... tremble
  alternatives:
  - quake
  - be agitated
  - be terrified
  lexicon: HALOT
  rationale: 'Jussive/imperfect used volitively after the imperatives: a call for the inhabitants to shake in dread. ''Tremble'' captures both physical and emotional disturbance without overinterpreting.'
- source_word: כֹּל יֹשְׁבֵי הָאָרֶץ
  chosen: all the inhabitants of the land
  alternatives:
  - all who dwell in the land
  - all the inhabitants of the earth
  lexicon: HALOT
  rationale: יֹשְׁבֵי הָאָרֶץ is literally 'inhabitants of the land/earth.' In Joel's immediate Zion/Judah setting, 'land' best preserves the likely local-covenantal reference while allowing eschatological resonance. The broader 'earth' remains a viable alternative and is preserved in a footnote.
- source_word: כִּי בָא
  chosen: for ... is coming
  alternatives:
  - for ... comes
  - because ... has come
  lexicon: HALOT
  rationale: The participle-like force of בָא in prophetic discourse often points to imminent arrival. 'Is coming' communicates the impending nature in smooth modern English.
- source_word: יוֹם יְהוָה
  chosen: the day of the LORD
  alternatives:
  - the LORD's day
  lexicon: HALOT
  rationale: Established and accurate rendering of the prophetic phrase. Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and alignment with the stated doctrine.
- source_word: כִּי קָרוֹב
  chosen: indeed, it is near
  alternatives:
  - for it is near
  - because it is near
  lexicon: HALOT
  rationale: The second כִּי can be rendered causally or emphatically. 'Indeed' avoids awkward repetition of 'for' in English while preserving the explanatory-emphatic force of the Hebrew.
