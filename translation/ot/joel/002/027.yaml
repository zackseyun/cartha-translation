id: JOL.2.27
reference: Joel 2:27
source:
  edition: WLC
  text: וִ/ידַעְתֶּ֗ם כִּ֣י בְ/קֶ֤רֶב יִשְׂרָאֵל֙ אָ֔נִי וַ/אֲנִ֛י יְהוָ֥ה אֱלֹהֵי/כֶ֖ם
    וְ/אֵ֣ין ע֑וֹד וְ/לֹא יֵבֹ֥שׁוּ עַמִּ֖/י לְ/עוֹלָֽם־׃ס
translation:
  text: Then you will know that I am in the midst of Israel, and that I am the LORD
    your God, and there is no other; and my people will never again be put to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'my people will not be put to shame forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִידַעְתֶּם
  chosen: Then you will know
  alternatives:
  - And you will know
  - You shall know
  lexicon: HALOT
  rationale: Qal perfect 2mp with prefixed conjunction in prophetic discourse functions
    as a future/result statement following the restoration promises. 'Then' brings
    out the consequential force in context without over-paraphrasing.
- source_word: בְּקֶרֶב
  chosen: in the midst of
  alternatives:
  - among
  - within
  lexicon: HALOT
  rationale: The noun denotes interior presence or being in the middle of a group.
    'In the midst of' preserves the covenantal-immanence nuance more fully than the
    flatter 'among.'
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Standard transliteration of the proper name.
- source_word: אָ֔נִי
  chosen: I am
  alternatives:
  - I
  rationale: 'English requires the copular sense to make the clause natural: ''that
    I am in the midst of Israel.'' The pronoun is emphatic in Hebrew and is retained
    by explicit ''I am.'''
- source_word: וַאֲנִי
  chosen: and that I am
  alternatives:
  - and I am
  - even I am
  rationale: The repeated pronoun is emphatic and coordinates a second object clause
    after 'you will know.' Rendering with 'and that I am' preserves the parallel structure
    and readability.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding covenantal usage.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Construct with 2mp suffix straightforwardly means 'your God,' expressing
    covenant relationship.
- source_word: וְאֵין עוֹד
  chosen: and there is no other
  alternatives:
  - and there is none else
  - and there is no one else
  lexicon: HALOT
  rationale: The idiom asserts exclusivity/uniqueness of YHWH. 'No other' is idiomatic
    modern English and preserves the theological force without adding an explicit
    object not present in Hebrew.
- source_word: וְלֹא יֵבֹשׁוּ
  chosen: will never again be put to shame
  alternatives:
  - will not be ashamed
  - will never be ashamed
  lexicon: HALOT
  rationale: The verb can mean 'be ashamed' or 'be put to shame/disappointed.' In
    this restoration context, passive-like 'be put to shame' better captures public
    disgrace removed by divine vindication. 'Never again' reflects the idiomatic force
    of the following לְעוֹלָם in context of reversal promises.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard covenant expression with 1cs suffix.
- source_word: לְעוֹלָם
  chosen: never again
  alternatives:
  - forever
  - for ever
  lexicon: HALOT
  rationale: Literally 'forever,' but in this repeated Joel refrain after prior shame,
    idiomatic English 'never again' best conveys the enduring negation attached to
    the preceding verb. The more literal alternative is preserved in a footnote.
