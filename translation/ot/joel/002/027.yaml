theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse explicitly names Israel's covenant God. Per doctrine, YHWH
    is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the exclusivity statement וְאֵין עוֹד
  chosen_reading: and there is no other
  alternative_readings:
  - and there is none else
  - and there is no one else
  rationale: The clause affirms the uniqueness of the LORD as Israel's God without
    importing later doctrinal formulations beyond the text. 'No other' preserves the
    monotheistic exclusivity claim in natural English.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: Meaning of the shame formula לֹא יֵבֹשׁוּ עַמִּי לְעוֹלָם
  chosen_reading: my people will never again be put to shame
  alternative_readings:
  - my people will not be ashamed forever
  - my people will never be ashamed
  rationale: The phrase is a restoration promise of permanent reversal of disgrace.
    'Put to shame' preserves the social-vindication dimension; 'never again' expresses
    the enduring future force in idiomatic English while avoiding awkwardness.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #6'
