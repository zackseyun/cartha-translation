theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether שׁוּב should be rendered 'return' or 'repent'
  chosen_reading: return
  alternative_readings:
  - repent
  - turn back
  rationale: The Hebrew verb's primary sense is movement back toward a prior relationship or place. In covenantal contexts it carries repentance, but the text itself specifies 'to me,' so 'return' preserves the metaphor and theological relationality without collapsing it into an abstract doctrinal term.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
