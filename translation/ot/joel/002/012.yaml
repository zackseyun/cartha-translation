id: JOL.2.12
reference: Joel 2:12
source:
  edition: WLC
  text: וְ/גַם עַתָּה֙ נְאֻם יְהוָ֔ה שֻׁ֥בוּ עָדַ֖/י בְּ/כָל לְבַבְ/כֶ֑ם וּ/בְ/צ֥וֹם וּ/בְ/בְכִ֖י וּ/בְ/מִסְפֵּֽד־־־׃
translation:
  text: “Yet even now,” declares Yahweh, “return to me with all your heart, and with fasting, and with weeping, and with mourning.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turn back to me'; the verb can also carry the sense 'repent' in covenant contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: Yet even
  alternatives:
  - And also
  - Even
  lexicon: HALOT
  rationale: The collocation intensifies the appeal and marks a concessive turn after the preceding judgment context. 'Yet even' captures both the connective and emphatic force more naturally than a wooden 'and also.'
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at this time
  lexicon: HALOT
  rationale: Temporal adverb indicating the present moment of opportunity for repentance. 'Now' is idiomatic and concise.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - utterance of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is clear modern English and preserves the solemn prophetic force. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שֻׁבוּ
  chosen: return
  alternatives:
  - turn back
  - repent
  lexicon: HALOT
  rationale: The verb שוב fundamentally means 'turn/return.' 'Return' preserves the relational direction made explicit by 'to me.' 'Repent' is interpretive and narrower; the verse includes embodied signs of repentance but the core command is covenantal return.
- source_word: עָדַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Direct object of relational movement toward God. 'To me' is natural modern English.
- source_word: בְּכָל לְבַבְכֶם
  chosen: with all your heart
  alternatives:
  - with your whole heart
  - with all your inner being
  lexicon: HALOT
  rationale: לבב denotes the inner person, especially will and affections. 'With all your heart' is the established and accurate English equivalent, preserving covenantal resonance.
- source_word: וּבְצוֹם
  chosen: and with fasting
  alternatives:
  - with a fast
  lexicon: HALOT
  rationale: The preposition is repeated for rhetorical accumulation. 'Fasting' is idiomatic in English and conveys the penitential practice.
- source_word: וּבְבְכִי
  chosen: and with weeping
  alternatives:
  - and with crying
  lexicon: HALOT
  rationale: בכי denotes weeping/crying. 'Weeping' better matches the solemn penitential tone.
- source_word: וּבְמִסְפֵּד
  chosen: and with mourning
  alternatives:
  - and with lamentation
  - and with wailing
  lexicon: HALOT
  rationale: מספד often refers to lamentation associated with grief, even funeral mourning. 'Mourning' is broad, natural, and fits the triad of penitential expressions without over-specifying ritual lament.
