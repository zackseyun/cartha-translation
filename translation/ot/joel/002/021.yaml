id: JOL.2.21
reference: Joel 2:21
source:
  edition: WLC
  text: אַל תִּֽירְאִ֖י אֲדָמָ֑ה גִּ֣ילִי וּ/שְׂמָ֔חִי כִּֽי הִגְדִּ֥יל יְהוָ֖ה לַ/עֲשֽׂוֹת־־׃
translation:
  text: Do not fear, O land; rejoice and be glad, for the LORD has done great things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''has acted greatly'' or ''has done great things.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּירְאִי
  chosen: Do not fear
  alternatives:
  - Do not be afraid
  lexicon: HALOT
  rationale: אַל with the imperfect gives a prohibition. 'Fear' is slightly more formal
    and concise, fitting the prophetic address, while 'be afraid' is a natural alternative.
- source_word: אֲדָמָה
  chosen: O land
  alternatives:
  - O ground
  - O earth
  lexicon: HALOT
  rationale: Here the addressee is the land of Judah personified, parallel to the
    following calls to rejoice. 'Land' best fits the agricultural and territorial
    context of Joel 2; 'ground' is too narrow and 'earth' too broad.
- source_word: גִּילִי
  chosen: rejoice
  alternatives:
  - exult
  lexicon: HALOT
  rationale: The verb denotes jubilant rejoicing. 'Rejoice' is clear modern English
    and pairs well with the following imperative; 'exult' is possible but less natural.
- source_word: וּשְׂמָחִי
  chosen: and be glad
  alternatives:
  - and rejoice
  - and be joyful
  lexicon: HALOT
  rationale: Used alongside גִּילִי, this second imperative is rendered distinctly
    to preserve the poetic intensification rather than collapsing both into the same
    English verb.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the exhortation. 'For' is idiomatic in English
    biblical style and keeps the causal link concise.
- source_word: הִגְדִּיל
  chosen: has done great things
  alternatives:
  - has acted greatly
  - has magnified his doing
  lexicon: HALOT
  rationale: The idiom הִגְדִּיל לַעֲשׂוֹת literally means 'has made great to do,'
    functioning as 'has done great things' or 'has acted greatly.' The chosen rendering
    is idiomatic English and matches the sense of mighty action in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' preserving English Bible convention and Jewish reverence tradition
    while signaling the covenant name.
- source_word: לַעֲשׂוֹת
  chosen: done
  alternatives:
  - acted
  lexicon: HALOT
  rationale: Combined with הִגְדִּיל in an idiomatic construction. Rendering it within
    the English verbal phrase 'has done great things' communicates the Hebrew infinitive
    naturally.
