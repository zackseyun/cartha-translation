theological_decisions:
- issue: Scope of cosmic disturbance imagery
  chosen_reading: Render the language as direct cosmic upheaval without reducing it
    to mere metaphor or expanding it into a specific end-times scheme.
  alternative_readings:
  - Purely figurative description of invading army terror
  - Explicitly apocalyptic end-times prediction
  rationale: The verse presents cosmic signs in prophetic poetry. The translation
    should preserve the text's grandeur and ambiguity rather than resolve whether
    the language is metaphorical, historical, or eschatological in a narrowly systematized
    way.
  doctrine_reference: Preserve theological tension rather than resolve it.
