id: JOL.2.10
reference: Joel 2:10
source:
  edition: WLC
  text: לְ/פָנָי/ו֙ רָ֣גְזָה אֶ֔רֶץ רָעֲשׁ֖וּ שָׁמָ֑יִם שֶׁ֤מֶשׁ וְ/יָרֵ֨חַ֙ קָדָ֔רוּ
    וְ/כוֹכָבִ֖ים אָסְפ֥וּ נָגְהָֽ/ם׃
translation:
  text: Before him the earth quakes; the heavens tremble. The sun and the moon grow
    dark, and the stars withdraw their brightness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'At his presence the earth trembles.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the stars gather in their brightness,' that is, they withdraw
      their light.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפָנָיו
  chosen: Before him
  alternatives:
  - At his presence
  - Before his face
  lexicon: HALOT
  rationale: The preposition ל with פָּנִים plus pronominal suffix idiomatically means
    'before him' or 'in his presence.' 'Before him' is natural English and preserves
    the spatial/relational force without over-literalizing 'face.'
- source_word: רָגְזָה
  chosen: quakes
  alternatives:
  - trembles
  - shakes
  lexicon: HALOT
  rationale: The verb רגז can denote trembling, quaking, or agitation. With 'earth'
    as subject, 'quakes' best conveys seismic upheaval in vivid modern English and
    fits the parallel cosmic disturbance.
- source_word: אֶרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Although אֶרֶץ can mean 'land,' the surrounding cosmic language ('heavens,'
    'sun,' 'moon,' 'stars') favors the broader cosmic sense 'earth' rather than a
    localized 'land.'
- source_word: רָעֲשׁוּ
  chosen: tremble
  alternatives:
  - quake
  - shake
  lexicon: HALOT
  rationale: רעשׁ often denotes shaking or quaking. Rendering it 'tremble' avoids
    repeating 'quakes' from the previous clause while preserving the parallelism and
    intensity.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - heaven
  lexicon: HALOT
  rationale: The plural form commonly refers to the heavens/sky. 'The heavens' best
    matches the elevated prophetic register and the cosmic scope of the verse.
- source_word: קָדָרוּ
  chosen: grow dark
  alternatives:
  - are darkened
  - become black
  lexicon: HALOT
  rationale: קדר conveys becoming dark or gloomy. 'Grow dark' is idiomatic and preserves
    the inceptive/resultative sense without sounding overly wooden.
- source_word: אָסְפוּ
  chosen: withdraw
  alternatives:
  - gather in
  - take back
  - withhold
  lexicon: HALOT
  rationale: אָסף literally means 'gather/collect,' but in this idiom with 'brightness'
    it means the stars cease giving light, as if drawing it in. 'Withdraw' communicates
    the idiomatic sense clearly in English.
- source_word: נָגְהָם
  chosen: their brightness
  alternatives:
  - their shining
  - their light
  lexicon: HALOT
  rationale: נֹגַהּ denotes brightness, radiance, or shining. 'Brightness' fits the
    poetic style and pairs naturally with 'withdraw' to express the dimming of the
    stars.
- source_word: שֶׁמֶשׁ וְיָרֵחַ
  chosen: The sun and the moon
  lexicon: HALOT
  rationale: A straightforward rendering preserves the paired celestial bodies in
    the Hebrew poetic sequence.
- source_word: וְכוֹכָבִים
  chosen: and the stars
  lexicon: HALOT
  rationale: Direct rendering of the plural noun maintains the cosmic imagery and
    poetic progression.
