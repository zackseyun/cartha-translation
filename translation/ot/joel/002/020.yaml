theological_decisions:
- issue: Identity of 'the northerner'
  chosen_reading: A personified hostile invader/army removed by God
  alternative_readings:
  - a literal northern wind
  - a specific historical nation such as Assyria or Babylon
  - the locust plague personified
  rationale: The singular Hebrew with body-part imagery ('his front ... his rear')
    favors personification. The immediate Joel context links this figure with the
    plague/invasion complex, but the verse itself does not require naming a specific
    nation or reducing it to a mere wind. The translation therefore preserves the
    personified singular without interpretive narrowing.
- issue: Force of 'he has done great things'
  chosen_reading: Retain the Hebrew idiom in the main text, with contextual possibility
    of arrogant/excessive action noted
  alternative_readings:
  - because he has acted arrogantly
  - because he has done monstrous things
  rationale: The same idiom can be used positively elsewhere, including nearby in
    Joel for the LORD's mighty acts. Here the subject is the judged enemy, so the
    sense is negative in context, but the translation preserves the lexical form rather
    than importing an interpretive adjective into the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
