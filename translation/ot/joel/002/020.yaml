id: JOL.2.20
reference: Joel 2:20
source:
  edition: WLC
  text: וְֽ/אֶת הַ/צְּפוֹנִ֞י אַרְחִ֣יק מֵ/עֲלֵי/כֶ֗ם וְ/הִדַּחְתִּי/ו֮ אֶל אֶ֣רֶץ
    צִיָּ֣ה וּ/שְׁמָמָה֒ אֶת פָּנָ֗י/ו אֶל הַ/יָּם֙ הַ/קַּדְמֹנִ֔י וְ/סֹפ֖/וֹ אֶל
    הַ/יָּ֣ם הָ/אַֽחֲר֑וֹן וְ/עָלָ֣ה בָאְשׁ֗/וֹ וְ/תַ֨עַל֙ צַחֲנָת֔/וֹ כִּ֥י הִגְדִּ֖יל
    לַ/עֲשֽׂוֹת־־־־־׃
translation:
  text: And I will remove the northerner far from you, and I will drive him into a
    dry and desolate land, his front into the eastern sea and his rear into the western
    sea; his stench will rise, and his foul smell will rise, because he has done great
    things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''the northern army.'' Hebrew: ''the northerner,'' a singular, personified
      expression.'
    reason: lexical_alternative
  - marker: b
    text: '''The eastern sea'' likely refers to the Dead Sea, and ''the western sea''
      to the Mediterranean Sea.'
    reason: cultural_note
  - marker: c
    text: Or, 'because he has acted arrogantly.' The Hebrew idiom is literally 'because
      he has done great things,' which here likely carries a negative sense from the
      context.
    reason: alternative_reading
lexical_decisions:
- source_word: הַצְּפוֹנִי
  chosen: the northerner
  alternatives:
  - the northern one
  - the northern army
  lexicon: HALOT
  rationale: Literally 'the northern one.' The term may refer to the invading force
    envisioned as coming from the north; 'the northerner' preserves the Hebrew's singular,
    personified form without over-specifying 'army' in the main text.
- source_word: אַרְחִיק
  chosen: I will remove ... far
  alternatives:
  - I will put far away
  - I will distance
  lexicon: HALOT
  rationale: The Hiphil of רחק conveys causing to be far/removed. 'Remove ... far'
    captures both the causative sense and the explicit spatial element.
- source_word: וְהִדַּחְתִּיו
  chosen: I will drive him
  alternatives:
  - I will thrust him away
  - I will banish him
  lexicon: HALOT
  rationale: The verb נדח in Hiphil suggests driving or thrusting away. 'Drive him'
    is idiomatic and fits the image of expulsion.
- source_word: אֶרֶץ צִיָּה וּשְׁמָמָה
  chosen: a dry and desolate land
  alternatives:
  - a parched and devastated land
  - a dry and waste land
  lexicon: HALOT
  rationale: צִיָּה denotes dryness/parchedness; שְׁמָמָה denotes desolation/wasteland.
    'Dry and desolate' is natural modern English and preserves both descriptors.
- source_word: פָּנָיו
  chosen: his front
  alternatives:
  - his face
  - his vanguard
  lexicon: HALOT
  rationale: Though literally 'his face,' in spatial context with 'his end/rear' it
    refers to the front part of the entity. 'His front' preserves the bodily metaphor
    without forcing a military gloss.
- source_word: הַיָּם הַקַּדְמֹנִי
  chosen: the eastern sea
  alternatives:
  - the front sea
  - the Dead Sea
  lexicon: HALOT
  rationale: Literally 'the eastern sea.' This likely refers geographically to the
    Dead Sea, but the Hebrew expression itself is directional, so the translation
    keeps the source wording; the geographic identification is suitable for a footnote.
- source_word: סֹפוֹ
  chosen: his rear
  alternatives:
  - his end
  - his hind part
  lexicon: HALOT
  rationale: The noun means end/termination; in contrast with 'his front' it naturally
    means the rear or trailing end.
- source_word: הַיָּם הָאַחֲרוֹן
  chosen: the western sea
  alternatives:
  - the hinder sea
  - the westernmost sea
  - the Mediterranean Sea
  lexicon: HALOT
  rationale: Literally 'the rear/last sea,' an idiom for the sea to the west. 'Western
    sea' communicates the directional sense while avoiding over-interpretation in
    the main text.
- source_word: בָאְשׁוֹ
  chosen: his stench
  alternatives:
  - his smell
  - his rottenness
  lexicon: HALOT
  rationale: The noun denotes bad odor/stench. 'Stench' best conveys the negative
    force.
- source_word: צַחֲנָתוֹ
  chosen: his foul smell
  alternatives:
  - his stink
  - his putrid odor
  lexicon: HALOT
  rationale: A near-synonymous term for offensive odor. Rendering it distinctly as
    'foul smell' preserves the Hebrew's parallelism without awkward repetition.
- source_word: כִּי הִגְדִּיל לַעֲשׂוֹת
  chosen: because he has done great things
  alternatives:
  - because he has acted arrogantly
  - because he has magnified himself in doing
  lexicon: HALOT
  rationale: The idiom can mean 'do great things' either positively or negatively
    depending on context. Here, because it refers to the hostile northerner whose
    destruction is described, the sense is likely boastful or excessive action; however,
    the Hebrew wording itself is the same idiom, so 'has done great things' preserves
    the wording while allowing the context to signal its negative force. An alternative
    is preserved in a footnote.
