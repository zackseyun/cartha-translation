theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This follows the doctrine
    file's contested-terms guidance and aligns with longstanding English convention
    while preserving the covenantal reference.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the restoration promise לְעוֹלָם with יֵבֹשׁוּ
  chosen_reading: my people will never again be put to shame
  alternative_readings:
  - my people will never be put to shame forever
  rationale: The Hebrew gives a permanent negation of future shame. 'Never again'
    is an idiomatic English rendering that preserves the enduring restoration promise
    without awkward literalism.
