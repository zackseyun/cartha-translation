id: JOL.2.26
reference: Joel 2:26
source:
  edition: WLC
  text: וַ/אֲכַלְתֶּ֤ם אָכוֹל֙ וְ/שָׂב֔וֹעַ וְ/הִלַּלְתֶּ֗ם אֶת שֵׁ֤ם יְהוָה֙ אֱלֹ֣הֵי/כֶ֔ם
    אֲשֶׁר עָשָׂ֥ה עִמָּ/כֶ֖ם לְ/הַפְלִ֑יא וְ/לֹא יֵבֹ֥שׁוּ עַמִּ֖/י לְ/עוֹלָֽם־־־׃
translation:
  text: You will surely eat and be satisfied, and you will praise the name of the
    LORD your God, who has dealt wondrously with you; and my people will never again
    be put to shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''You shall eat in plenty and be full.'' The Hebrew uses an emphatic
      construction: ''eating you will eat.'''
    reason: lexical_alternative
  - marker: b
    text: Or, 'who has done wondrous things for you.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'and my people shall not be put to shame forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲכַלְתֶּם אָכוֹל
  chosen: You will surely eat
  alternatives:
  - You shall eat in plenty
  - You will eat abundantly
  lexicon: HALOT
  rationale: The finite verb with the infinitive absolute intensifies the action.
    'Surely eat' preserves the emphatic force without importing the specific idea
    of quantity beyond the verb itself. 'In plenty' is interpretive from context and
    is therefore kept as an alternative rather than the main rendering.
- source_word: וְשָׂבוֹעַ
  chosen: and be satisfied
  alternatives:
  - and be full
  lexicon: HALOT
  rationale: The verb denotes being sated or satisfied after eating. 'Be satisfied'
    is natural modern English and preserves the result of fullness without sounding
    wooden.
- source_word: וְהִלַּלְתֶּם
  chosen: and you will praise
  alternatives:
  - and you will give praise
  lexicon: HALOT
  rationale: Piel of הלל here means to praise. 'Praise' is the straightforward rendering
    and fits the covenantal worship context.
- source_word: שֵׁם יְהוָה אֱלֹהֵיכֶם
  chosen: the name of the LORD your God
  alternatives:
  - the name of Yahweh your God
  lexicon: HALOT
  rationale: '''Name'' is retained because it is the Hebrew expression for God''s
    revealed identity and reputation. יְהוָה is rendered ''the LORD'' per doctrine
    guidance on the divine name.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving
    reverential convention and broad English Bible recognizability.
- source_word: אֲשֶׁר עָשָׂה עִמָּכֶם לְהַפְלִיא
  chosen: who has dealt wondrously with you
  alternatives:
  - who has done wondrous things for you
  - who has acted marvelously toward you
  lexicon: HALOT
  rationale: The clause literally speaks of one who 'has done with you wondrously'
    or 'to do wonderfully.' English idiom is best captured by 'dealt wondrously with
    you,' which preserves both divine action and its marvelous character. 'For you'
    is possible, but 'with you' better reflects עִם.
- source_word: וְלֹא יֵבֹשׁוּ עַמִּי
  chosen: and my people will never again be put to shame
  alternatives:
  - and my people will never be ashamed
  lexicon: HALOT
  rationale: בושׁ in this context carries the sense of being shamed or disappointed
    publicly. 'Be put to shame' better captures the covenantal-honor dimension than
    the more internal 'be ashamed.' 'Again' is supplied in English because the broader
    refrain in Joel repeats this restoration formula and it naturally conveys the
    future reversal implied here.
- source_word: לְעוֹלָם
  chosen: never again
  alternatives:
  - forever
  - for ever
  lexicon: HALOT
  rationale: Literally 'forever,' but in this prophetic reassurance after prior disgrace,
    idiomatic English often expresses the force as 'never again.' This communicates
    enduring reversal in a natural way while preserving the permanence of the promise.
