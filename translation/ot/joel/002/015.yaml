id: JOL.2.15
reference: Joel 2:15
source:
  edition: WLC
  text: תִּקְע֥וּ שׁוֹפָ֖ר בְּ/צִיּ֑וֹן קַדְּשׁוּ צ֖וֹם קִרְא֥וּ עֲצָרָֽה־׃
translation:
  text: Blow a trumpet in Zion; consecrate a fast; call a solemn assembly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ram's horn' for 'trumpet' (שׁוֹפָר), emphasizing the specific instrument
      used for alarm or sacred summons.
    reason: lexical_alternative
  - marker: b
    text: Or 'sanctify a fast.' The Hebrew verb means to set apart as holy for a sacred
      purpose.
    reason: lexical_alternative
  - marker: c
    text: Or 'call/proclaim a sacred assembly.' The Hebrew עֲצָרָה denotes a formal
      religious gathering marked by solemnity.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּקְעוּ
  chosen: Blow
  alternatives:
  - Sound
  lexicon: HALOT
  rationale: Qal imperative plural of תקע, used with שׁוֹפָר for sounding/blowing
    a horn. 'Blow' is the most natural English collocation with 'trumpet' and preserves
    the imperative force.
- source_word: שׁוֹפָר
  chosen: trumpet
  alternatives:
  - ram's horn
  - horn
  lexicon: HALOT
  rationale: Refers specifically to the horn used for public alarm or sacred summons.
    'Trumpet' is idiomatic and readable in English, while the more specific 'ram's
    horn' is possible but unnecessarily narrows the term in this context.
- source_word: בְּצִיּוֹן
  chosen: in Zion
  alternatives:
  - on Zion
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in.' 'In Zion' is the standard and
    natural locative rendering for the city/mountain as the covenant center.
- source_word: קַדְּשׁוּ
  chosen: consecrate
  alternatives:
  - sanctify
  - set apart
  lexicon: HALOT
  rationale: Piel imperative plural of קדשׁ, here meaning to set apart as holy for
    a religious purpose. 'Consecrate' communicates formal sacred designation better
    than the more archaic 'sanctify.'
- source_word: צוֹם
  chosen: a fast
  alternatives:
  - fasting
  lexicon: HALOT
  rationale: Noun denoting the fast itself, not merely the act in abstract. 'A fast'
    fits the imperative sequence of proclaiming a specific communal observance.
- source_word: קִרְאוּ
  chosen: call
  alternatives:
  - proclaim
  - summon
  lexicon: HALOT
  rationale: Qal imperative plural of קרא. In context it means to convene or announce
    publicly. 'Call' is concise and works well with 'assembly,' while the public-proclamation
    nuance is preserved by context.
- source_word: עֲצָרָה
  chosen: a solemn assembly
  alternatives:
  - a sacred assembly
  - an assembly of restraint
  lexicon: HALOT
  rationale: Refers to a formal religious gathering, often one marked by sacred solemnity.
    'Solemn assembly' is the established and accurate rendering in prophetic and cultic
    contexts, preserving the gravity of the summons.
