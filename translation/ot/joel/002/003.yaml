id: JOL.2.3
reference: Joel 2:3
source:
  edition: WLC
  text: לְ/פָנָי/ו֙ אָ֣כְלָה אֵ֔שׁ וְ/אַחֲרָ֖י/ו תְּלַהֵ֣ט לֶֽהָבָ֑ה כְּ/גַן עֵ֨דֶן
    הָ/אָ֜רֶץ לְ/פָנָ֗י/ו וְ/אַֽחֲרָי/ו֙ מִדְבַּ֣ר שְׁמָמָ֔ה וְ/גַם פְּלֵיטָ֖ה לֹא
    הָ֥יְתָה לּֽ/וֹ־־־׃
translation:
  text: Before it, fire devours; behind it, a flame blazes. The land before it is
    like the garden of Eden, but behind it is a desolate wilderness; indeed, nothing
    escapes it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no survivor remains for it' / 'there is no escape from it.' The Hebrew
      noun can emphasize either escape or survivor/remnant.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפָנָיו
  chosen: before it
  alternatives:
  - before him
  - in front of it
  lexicon: HALOT
  rationale: Spatial preposition with noun 'face/front' plus 3ms suffix. The referent
    in context is the invading army/swarm treated collectively, so English 'it' is
    more natural than 'him' while preserving the singular Hebrew suffix.
- source_word: אָכְלָה אֵשׁ
  chosen: fire devours
  alternatives:
  - fire has consumed
  - a fire consumes
  lexicon: HALOT
  rationale: Qal perfect 3fs with feminine subject 'fire.' In vivid prophetic description,
    the perfect functions well as a present-like vivid action in English. 'Devours'
    preserves the consuming imagery better than the flatter 'consumes.'
- source_word: וְאַחֲרָיו
  chosen: behind it
  alternatives:
  - after it
  - behind him
  lexicon: HALOT
  rationale: Spatial sense fits the parallelism with 'before it.' 'Behind it' is the
    most idiomatic English rendering in this scene description.
- source_word: תְּלַהֵט לֶהָבָה
  chosen: a flame blazes
  alternatives:
  - a flame burns
  - a blaze flames
  lexicon: HALOT
  rationale: Piel verb conveys intense burning/flaming. 'A flame blazes' gives natural
    English while retaining the heightened imagery of destructive fire.
- source_word: כְּגַן עֵדֶן
  chosen: like the garden of Eden
  alternatives:
  - like Eden's garden
  lexicon: HALOT
  rationale: Construct phrase with prefixed comparison. 'The garden of Eden' is the
    standard transparent English form and preserves the allusion to Genesis.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the ground
  lexicon: HALOT
  rationale: In this agricultural-devastation context, 'land' better fits the local
    terrain being described than the more cosmic 'earth.'
- source_word: מִדְבַּר שְׁמָמָה
  chosen: a desolate wilderness
  alternatives:
  - a wilderness of desolation
  - a desolate wasteland
  lexicon: HALOT
  rationale: The noun plus appositional/qualifying noun expresses utter barrenness.
    'A desolate wilderness' is idiomatic and preserves the force of devastation.
- source_word: וְגַם
  chosen: indeed
  alternatives:
  - and also
  - even
  lexicon: HALOT
  rationale: Adds emphatic force to the final clause. 'Indeed' communicates the climactic
    emphasis more naturally than a wooden 'and also.'
- source_word: פְּלֵיטָה
  chosen: nothing escapes
  alternatives:
  - no survivor
  - no remnant
  - escape
  lexicon: HALOT
  rationale: 'The noun denotes escape/survivor. In English, the clause is most naturally
    rendered verbally: ''nothing escapes it.'' This captures the sense that no one
    and nothing gets away, without over-specifying human survivors alone.'
- source_word: לֹא הָיְתָה לוֹ
  chosen: nothing escapes it
  alternatives:
  - there was no escape for it
  - it had no survivor left behind it
  lexicon: HALOT
  rationale: Literally 'there was not an escape/survivor to it.' The idiomatic sense
    in context is totality of destruction. Rendering the clause as 'nothing escapes
    it' communicates the Hebrew force in clear modern English.
