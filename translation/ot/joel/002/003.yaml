theological_decisions:
- issue: Referent of singular pronominal suffixes in the verse
  chosen_reading: Render with impersonal singular 'it' for the invading force
  alternative_readings:
  - render as 'him' if personifying the army/locust swarm more strongly
  rationale: The Hebrew uses singular suffixes, likely referring collectively to the
    invading force described in the surrounding context. English 'it' preserves the
    collective-singular sense without implying an individual male person.
