theological_decisions:
- issue: Referent of the 3ms suffix in מִפָּנָיו
  chosen_reading: Rendered generically as 'him' without specifying whether the referent
    is the LORD, the day, or the invading army.
  alternative_readings:
  - Before the LORD
  - Before it
  rationale: The immediate context allows the masculine singular referent to point
    to the advancing force described in personal terms, and in Joel's rhetoric that
    force is closely tied to the day of the LORD. The translation preserves the Hebrew
    ambiguity rather than resolving it interpretively.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
