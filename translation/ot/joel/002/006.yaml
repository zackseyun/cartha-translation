id: JOL.2.6
reference: Joel 2:6
source:
  edition: WLC
  text: מִ/פָּנָ֖י/ו יָחִ֣ילוּ עַמִּ֑ים כָּל פָּנִ֖ים קִבְּצ֥וּ פָארֽוּר־׃
translation:
  text: Before him peoples writhe; all faces gather paleness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'At his presence, peoples are in anguish.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all faces gather פָארוּר,' an idiom commonly understood to mean
      that faces turn pale.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפָּנָיו
  chosen: Before him
  alternatives:
  - At his presence
  - From before him
  lexicon: HALOT
  rationale: The preposition מִן with פָּנִים ('face/presence') idiomatically expresses
    proximity to or confrontation with someone's presence. 'Before him' is concise
    and natural in English while preserving the personal force of the suffix. 'At
    his presence' is possible and is preserved as an alternative nuance.
- source_word: יָחִילוּ
  chosen: writhe
  alternatives:
  - are in anguish
  - tremble
  lexicon: HALOT
  rationale: From חול in the Qal, the verb commonly denotes writhing, trembling, or
    being in labor-like anguish. 'Writhe' preserves the vivid bodily distress better
    than the flatter 'tremble,' fitting the terror imagery of the invading army/theophanic
    scene.
- source_word: עַמִּים
  chosen: peoples
  alternatives:
  - nations
  - peoples groups
  lexicon: HALOT
  rationale: The plural refers broadly to human groups. 'Peoples' is a natural plural
    that avoids over-specifying geopolitical 'nations' while preserving the collective
    scope.
- source_word: כָּל פָּנִים
  chosen: all faces
  alternatives:
  - every face
  - all countenances
  lexicon: HALOT
  rationale: A literal rendering is appropriate here. 'All faces' keeps the Hebrew
    collective expression and prepares for the following idiom about facial color.
- source_word: קִבְּצוּ
  chosen: gather
  alternatives:
  - draw in
  - collect
  lexicon: HALOT
  rationale: The verb קבץ normally means 'gather/collect.' In this idiom with the
    object 'paleness,' it conveys that faces take on or draw together into a pale
    appearance. 'Gather' preserves the Hebrew wording without over-paraphrase.
- source_word: פָארוּר
  chosen: paleness
  alternatives:
  - glow
  - redness
  lexicon: HALOT
  rationale: In context the phrase is a recognized idiom for loss of color from the
    face, hence pallor/paleness. Although some have connected the rare noun with a
    ruddy or glowing color, the contextual sense in a terror scene strongly favors
    'paleness.'
