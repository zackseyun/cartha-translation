id: JOL.2.4
reference: Joel 2:4
source:
  edition: WLC
  text: כְּ/מַרְאֵ֥ה סוּסִ֖ים מַרְאֵ֑/הוּ וּ/כְ/פָרָשִׁ֖ים כֵּ֥ן יְרוּצֽוּ/ן׃
translation:
  text: Their appearance is like the appearance of horses, and like horsemen, so they
    run.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its appearance is like the appearance of horses.' The Hebrew uses a
      singular suffix ('his/its appearance'), but the referent is collective, so English
      may render it collectively as 'their appearance.'
    reason: lexical_alternative
  - marker: b
    text: '''Horsemen'' may also be rendered ''mounted riders'' or ''cavalry.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמַרְאֵה
  chosen: like the appearance of
  alternatives:
  - like the look of
  - in appearance like
  lexicon: HALOT
  rationale: מַרְאֶה denotes visible appearance or outward look. Rendering with 'appearance'
    preserves the repeated noun and the simile introduced by כְּ.
- source_word: סוּסִים
  chosen: horses
  lexicon: HALOT
  rationale: Straightforward plural noun meaning 'horses.'
- source_word: מַרְאֵהוּ
  chosen: their appearance
  alternatives:
  - its appearance
  - his appearance
  lexicon: HALOT
  rationale: The singular noun with 3ms suffix is used collectively with the invading
    swarm/army described in context. English idiom naturally renders the collective
    referent as 'their appearance' rather than the more wooden 'its appearance.'
- source_word: וּכְפָרָשִׁים
  chosen: and like horsemen
  alternatives:
  - and like cavalry
  - and like riders
  lexicon: HALOT
  rationale: פָּרָשִׁים refers to horsemen or mounted riders. 'Horsemen' best matches
    the military imagery and keeps the parallel with 'horses.'
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: 'כֵּן marks the comparison''s result: as they appear, so they run. ''So''
    is concise and natural.'
- source_word: יְרוּצוּן
  chosen: they run
  alternatives:
  - they rush
  - they race
  lexicon: HALOT
  rationale: From רוץ, 'to run.' 'They run' is the basic sense and avoids overinterpreting
    the manner beyond the simile itself.
