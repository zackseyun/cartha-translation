id: JOL.3.5
reference: Joel 3:5
source:
  edition: WLC
  text: וְ/הָיָ֗ה כֹּ֧ל אֲשֶׁר יִקְרָ֛א בְּ/שֵׁ֥ם יְהוָ֖ה יִמָּלֵ֑ט כִּ֠י בְּ/הַר
    צִיּ֨וֹן וּ/בִ/ירוּשָׁלִַ֜ם תִּֽהְיֶ֣ה פְלֵיטָ֗ה כַּֽ/אֲשֶׁר֙ אָמַ֣ר יְהוָ֔ה וּ/בַ֨/שְּׂרִידִ֔ים
    אֲשֶׁ֥ר יְהוָ֖ה קֹרֵֽא־־׃
translation:
  text: And it will happen that everyone who calls on the name of the LORD will be
    delivered; for on Mount Zion and in Jerusalem there will be those who escape,
    as the LORD has said, among the survivors whom the LORD calls.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whoever calls upon the name of the LORD will escape.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'there will be פְלֵיטָה,' which can mean 'escape,' 'deliverance,'
      or 'escaped survivors/remnant.'
    reason: lexical_alternative
  - marker: c
    text: The verse holds together both human calling on the LORD and the survivors
      whom the LORD calls.
    reason: cross_reference
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall come to pass
  - Then it will happen
  lexicon: HALOT
  rationale: Introduces a future-result clause in idiomatic but still transparent
    English. 'It shall come to pass' is traditional but archaic; 'And it will happen'
    preserves the discourse function in readable modern English.
- source_word: כֹּל אֲשֶׁר
  chosen: everyone who
  alternatives:
  - whoever
  - all who
  lexicon: HALOT
  rationale: The construction is distributive and personal here. 'Everyone who' is
    natural English and clearly conveys the universal scope of the promise.
- source_word: יִקְרָא בְּשֵׁם יְהוָה
  chosen: calls on the name of the LORD
  alternatives:
  - invokes the name of the LORD
  - calls upon the name of the LORD
  lexicon: HALOT
  rationale: This is a standard idiom for invocation/appeal to YHWH. 'Calls on' is
    idiomatic, clear, and preserves the covenantal/religious sense without over-paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and established English Bible convention.
- source_word: יִמָּלֵט
  chosen: will be delivered
  alternatives:
  - will escape
  - will be saved
  lexicon: HALOT
  rationale: The Niphal of מלט denotes escape/deliverance. 'Will be delivered' captures
    rescue from impending judgment while remaining broad enough not to force a narrower
    merely physical or fully soteriological sense. 'Will be saved' is possible in
    later theological usage but would import stronger doctrinal associations than
    the immediate context requires.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding promise. 'For'
    best preserves the explanatory connection.
- source_word: בְּהַר צִיּוֹן וּבִירוּשָׁלַם
  chosen: on Mount Zion and in Jerusalem
  alternatives:
  - in Mount Zion and in Jerusalem
  lexicon: HALOT
  rationale: Standard English idiom uses 'on' with mountain and 'in' with city. The
    place names are retained without interpretive expansion.
- source_word: תִּהְיֶה פְלֵיטָה
  chosen: there will be those who escape
  alternatives:
  - there will be deliverance
  - there will be an escape/remnant
  lexicon: HALOT
  rationale: פְלֵיטָה can denote escape, deliverance, or escaped survivors. Given
    the following mention of 'survivors,' rendering this clause as the existence of
    escapees/survivors avoids redundancy while preserving the concrete sense of a
    remnant that escapes judgment.
- source_word: כַּאֲשֶׁר אָמַר יְהוָה
  chosen: as the LORD has said
  alternatives:
  - as the LORD said
  - just as the LORD has spoken
  lexicon: HALOT
  rationale: Perfect verb here naturally points to the prior divine declaration. Present
    perfect in English conveys the abiding validity of what was spoken.
- source_word: וּבַשְּׂרִידִים
  chosen: among the survivors
  alternatives:
  - and among the remnant
  - even among the survivors
  lexicon: HALOT
  rationale: שׂרידים refers to those left over, survivors/remnant. 'Among the survivors'
    fits the preposition and links smoothly with the prior clause. 'Remnant' is theologically
    resonant and possible, but 'survivors' is more immediately transparent in context.
- source_word: אֲשֶׁר יְהוָה קֹרֵא
  chosen: whom the LORD calls
  alternatives:
  - whom the LORD is calling
  - whom the LORD has called
  lexicon: HALOT
  rationale: The participle קֹרֵא expresses characteristic or ongoing divine action.
    English simple present best captures this without awkwardness. 'Calls' also preserves
    the theological tension between human calling on the LORD and the LORD's calling
    of the survivors.
