theological_decisions:
- issue: Relationship between human invocation and divine calling in the verse
  chosen_reading: 'Main text preserves both: ''everyone who calls on the name of the
    LORD'' and ''among the survivors whom the LORD calls.'''
  alternative_readings:
  - Interpret the final clause as limiting the first promise only to an elect remnant
  - Interpret the final clause as merely appositional and non-restrictive
  rationale: 'The Hebrew presents both realities without resolving the theological
    tension: universal promise to all who call, and divine calling of the survivors.
    In keeping with the translation philosophy, the wording preserves that tension
    rather than importing a denominational explanation.'
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
- issue: Rendering of פְלֵיטָה in relation to deliverance/salvation
  chosen_reading: Rendered concretely as 'there will be those who escape' rather than
    the more abstract 'there will be deliverance.'
  alternative_readings:
  - there will be deliverance
  - there will be a remnant
  rationale: The context is the day of the LORD and survival through judgment. A concrete
    rendering fits the following 'survivors' and avoids importing a more systematized
    salvation term while still allowing theological extension in later canonical usage.
