id: JOL.3.2
reference: Joel 3:2
source:
  edition: WLC
  text: וְ/גַ֥ם עַל הָֽ/עֲבָדִ֖ים וְ/עַל הַ/שְּׁפָח֑וֹת בַּ/יָּמִ֣ים הָ/הֵ֔מָּה אֶשְׁפּ֖וֹךְ
    אֶת רוּחִֽ/י־־־׃
translation:
  text: And even on the male slaves and on the female slaves, in those days I will
    pour out my Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the slaves and the female servants." The Hebrew terms denote male and
      female persons in servile status; "slaves" is used here to preserve the bonded
      social reality.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And even
  alternatives:
  - And also
  - Even
  lexicon: HALOT
  rationale: Conveys the additive and emphatic force of the conjunction plus adverb,
    linking this line to the preceding promise while stressing inclusion beyond expected
    groups.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: The preposition with 'pour out' naturally yields 'on/upon.' 'On' is slightly
    more natural in contemporary English while preserving the imagery.
- source_word: הָעֲבָדִים
  chosen: the male slaves
  alternatives:
  - the slaves
  - the male servants
  - the male bondservants
  lexicon: HALOT
  rationale: עֶבֶד commonly denotes a servant/slave. In this social-pairing context
    with female slaves, the bonded status is salient, so 'slaves' best reflects the
    source and aligns with the project's guidance to use 'slave' where that nature
    is prominent. 'Male' is supplied to reflect the gender contrast with the following
    feminine term.
- source_word: וְעַל
  chosen: and on
  alternatives:
  - and upon
  lexicon: HALOT
  rationale: Repeats the preposition for Hebrew parallelism; retained in English for
    clarity and rhythm.
- source_word: הַשְּׁפָחוֹת
  chosen: the female slaves
  alternatives:
  - the slave women
  - the maidservants
  - the female servants
  lexicon: HALOT
  rationale: The noun refers specifically to female slaves/servants. 'Female slaves'
    preserves both gender and bonded status, matching the paired structure with הָעֲבָדִים.
- source_word: בַּיָּמִים הָהֵמָּה
  chosen: in those days
  alternatives:
  - during those days
  lexicon: HALOT
  rationale: Standard temporal expression; 'in those days' is idiomatic and preserves
    the prophetic timeframe.
- source_word: אֶשְׁפּוֹךְ
  chosen: I will pour out
  alternatives:
  - I will pour forth
  lexicon: HALOT
  rationale: Future first-person singular of שפך. 'Pour out' is the established and
    natural English equivalent for the metaphor of lavish divine bestowal.
- source_word: אֶת רוּחִי
  chosen: my Spirit
  alternatives:
  - my spirit
  lexicon: HALOT
  rationale: Within Joel's prophetic context, רוּחִי refers to God's own Spirit being
    bestowed, not merely an impersonal disposition or breath. Capitalizing 'Spirit'
    in English signals this referent without adding content beyond the context.
