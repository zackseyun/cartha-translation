theological_decisions:
- issue: Rendering of social-status terms עֲבָדִים / שְׁפָחוֹת
  chosen_reading: male slaves / female slaves
  alternative_readings:
  - servants / female servants
  - slaves / slave women
  rationale: Following the translation philosophy, bonded status should be made explicit
    where salient. Here the oracle emphasizes the surprising breadth of the Spirit's
    outpouring across social and gender lines, so 'slaves' better preserves the force
    than the softer 'servants.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος by analogy of bonded-status rendering
- issue: Referent of רוּחִי
  chosen_reading: my Spirit
  alternative_readings:
  - my spirit
  rationale: In context this is the divine Spirit poured out by God on people, not
    merely God's disposition or breath. Capitalization is an English interpretive
    convention used to reflect that contextual referent.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (preserve tension where
    genuine ambiguity exists); here the context sufficiently favors the personal divine
    referent
