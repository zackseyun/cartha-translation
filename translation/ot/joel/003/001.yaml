id: JOL.3.1
reference: Joel 3:1
source:
  edition: WLC
  text: וְ/הָיָ֣ה אַֽחֲרֵי כֵ֗ן אֶשְׁפּ֤וֹךְ אֶת רוּחִ/י֙ עַל כָּל בָּשָׂ֔ר וְ/נִבְּא֖וּ
    בְּנֵי/כֶ֣ם וּ/בְנֽוֹתֵי/כֶ֑ם זִקְנֵי/כֶם֙ חֲלֹמ֣וֹת יַחֲלֹמ֔וּ/ן בַּח֣וּרֵי/כֶ֔ם
    חֶזְיֹנ֖וֹת יִרְאֽוּ־־־־׃
translation:
  text: And it will happen afterward that I will pour out my Spirit on all flesh;
    and your sons and your daughters will prophesy, your old men will dream dreams,
    your young men will see visions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on all humanity' / 'on all people'; Hebrew 'on all flesh.'
    reason: lexical_alternative
  - marker: b
    text: '''My Spirit'' could also be rendered ''my spirit,'' but the context of
      prophetic empowerment favors the divine Spirit.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall come to pass
  - And it will be
  lexicon: HALOT
  rationale: The idiom introduces a future event formulaically. 'It will happen' preserves
    the predictive force in readable modern English without archaic diction.
- source_word: אַחֲרֵי כֵן
  chosen: afterward
  alternatives:
  - after this
  - after these things
  - after that
  lexicon: HALOT
  rationale: The phrase marks subsequent time. 'Afterward' is concise and natural
    English, preserving temporal sequence without over-specifying.
- source_word: אֶשְׁפּוֹךְ
  chosen: I will pour out
  alternatives:
  - I will pour forth
  lexicon: HALOT
  rationale: The verb שפך commonly means 'pour out.' This is the standard concrete
    metaphor and should be retained rather than paraphrased.
- source_word: רוּחִי
  chosen: my Spirit
  alternatives:
  - my spirit
  lexicon: HALOT
  rationale: Given the prophetic context of divine empowerment resulting in prophecy,
    dreams, and visions, the referent is God's Spirit, not merely disposition or breath.
    Capitalization reflects English convention for the divine Spirit; the Hebrew consonantal
    text itself does not mark capitalization.
- source_word: עַל כָּל בָּשָׂר
  chosen: on all flesh
  alternatives:
  - on all humanity
  - on all people
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh.' Retaining 'all flesh' preserves the
    Hebrew idiom and its broad, embodied scope, while remaining intelligible in English.
    More interpretive alternatives narrow the texture of the phrase.
- source_word: וְנִבְּאוּ
  chosen: will prophesy
  alternatives:
  - shall prophesy
  lexicon: HALOT
  rationale: The Niphal of נבא in this context denotes prophetic speech/inspiration.
    'Will prophesy' is the natural modern rendering.
- source_word: בְּנֵיכֶם וּבְנוֹתֵיכֶם
  chosen: your sons and your daughters
  alternatives:
  - your children
  lexicon: HALOT
  rationale: The Hebrew explicitly names both male and female offspring. Per gender-accurate
    philosophy, both terms should be preserved rather than collapsed into the generic
    'children'.
- source_word: זִקְנֵיכֶם
  chosen: your old men
  alternatives:
  - your elders
  - your older men
  lexicon: HALOT
  rationale: The term here contrasts with 'your young men' in the next clause, so
    age rather than office/status is primary. 'Old men' best preserves the parallelism.
- source_word: חֲלֹמוֹת יַחֲלֹמוּן
  chosen: will dream dreams
  alternatives:
  - will have dreams
  lexicon: HALOT
  rationale: The Hebrew uses cognate accusative for emphasis. 'Dream dreams' preserves
    the form and rhetorical force better than the smoother but less formal 'have dreams.'
- source_word: בַּחוּרֵיכֶם
  chosen: your young men
  alternatives:
  - your youths
  - your chosen men
  lexicon: HALOT
  rationale: In context the word denotes young males, set in contrast to old men.
    'Young men' is the clearest and most natural rendering.
- source_word: חֶזְיֹנוֹת יִרְאוּ
  chosen: will see visions
  alternatives:
  - will behold visions
  lexicon: HALOT
  rationale: This is the standard prophetic expression. 'See visions' is both literal
    and idiomatic in English.
