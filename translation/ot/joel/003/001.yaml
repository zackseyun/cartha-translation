theological_decisions:
- issue: Rendering רוּחִי in a prophetic outpouring context
  chosen_reading: my Spirit
  alternative_readings:
  - my spirit
  rationale: The verse describes a divine outpouring that results in prophetic revelation
    across the covenant community. In this context, the most likely sense is God's
    Spirit as agent of inspiration. The alternative is lexically possible but less
    fitting contextually.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Rendering כָּל בָּשָׂר
  chosen_reading: all flesh
  alternative_readings:
  - all humanity
  - all people
  rationale: The phrase should retain its broad, textually grounded scope without
    prematurely resolving whether the emphasis is universal humanity in general or
    all kinds of people within the addressed community. 'All flesh' preserves that
    theological breadth and tension.
  doctrine_reference: Translation philosophy §3
