theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This also aligns with the prophetic formula 'day of the LORD' familiar in
    English Bible tradition while remaining faithful to the Hebrew referent.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the cosmic imagery
  chosen_reading: Retain literal-apocalyptic wording ('moon to blood') in the main
    text
  alternative_readings:
  - interpretive rendering such as 'moon blood-red'
  rationale: The verse uses prophetic cosmic-sign language. The translation preserves
    the imagery rather than resolving whether it is literal astronomical description
    or figurative apocalyptic symbolism.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
