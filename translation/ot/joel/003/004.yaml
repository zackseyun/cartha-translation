id: JOL.3.4
reference: Joel 3:4
source:
  edition: WLC
  text: הַ/שֶּׁ֨מֶשׁ֙ יֵהָפֵ֣ךְ לְ/חֹ֔שֶׁךְ וְ/הַ/יָּרֵ֖חַ לְ/דָ֑ם לִ/פְנֵ֗י בּ֚וֹא
    י֣וֹם יְהוָ֔ה הַ/גָּד֖וֹל וְ/הַ/נּוֹרָֽא׃
translation:
  text: The sun will be turned to darkness, and the moon to blood, before the coming
    of the great and fearful day of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the moon into blood,' that is, blood-red. The Hebrew expression is literally
      'to blood.'
    reason: lexical_alternative
  - marker: b
    text: '''The LORD'' renders the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
  - marker: c
    text: Or 'the great and awesome day of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֶּׁמֶשׁ
  chosen: the sun
  lexicon: HALOT
  rationale: Definite noun referring to the celestial body; straightforwardly rendered
    'the sun'.
- source_word: יֵהָפֵךְ
  chosen: will be turned
  alternatives:
  - will be changed
  - will turn
  lexicon: HALOT
  rationale: Niphal imperfect of הפך conveys passive/resultative change. 'Will be
    turned' preserves the passive sense better than the more intransitive 'will turn.'
- source_word: לְחֹשֶׁךְ
  chosen: to darkness
  alternatives:
  - into darkness
  lexicon: HALOT
  rationale: The preposition ל marks the resulting state. 'To darkness' is idiomatic
    and keeps the transformation imagery.
- source_word: וְהַיָּרֵחַ
  chosen: and the moon
  lexicon: HALOT
  rationale: Definite noun for the celestial body; rendered plainly and coordinated
    with the prior clause.
- source_word: לְדָם
  chosen: to blood
  alternatives:
  - into blood
  - blood-red
  lexicon: HALOT
  rationale: The Hebrew says literally 'to blood.' This likely denotes bloodlike appearance,
    but the text's stark imagery is best preserved in the main text rather than interpreted
    as 'blood-red.'
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - ahead of
  lexicon: HALOT
  rationale: 'Temporal sense fits the context: these signs occur prior to the day
    of the LORD.'
- source_word: בּוֹא
  chosen: the coming of
  alternatives:
  - the arrival of
  lexicon: HALOT
  rationale: 'Infinitive construct of בוא after לִפְנֵי is naturally rendered as a
    verbal noun: ''before the coming of.'''
- source_word: יוֹם יְהוָה
  chosen: the day of the LORD
  alternatives:
  - the LORD's day
  lexicon: HALOT
  rationale: Established prophetic expression. Per doctrine, יְהוָה is rendered 'the
    LORD' rather than 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and longstanding English convention.
- source_word: הַגָּדוֹל
  chosen: great
  alternatives:
  - great in magnitude
  - mighty
  lexicon: HALOT
  rationale: Standard adjective modifying 'day'; 'great' preserves both scale and
    significance without over-interpretation.
- source_word: וְהַנּוֹרָא
  chosen: fearful
  alternatives:
  - awesome
  - terrible
  - dreadful
  lexicon: HALOT
  rationale: From ירא in the Niphal-derived adjectival form, conveying that the day
    inspires dread/awe. 'Fearful' preserves the solemn terror of judgment better than
    the modern, often positive-only 'awesome,' while avoiding the potentially misleading
    suggestion of moral badness in 'terrible.'
