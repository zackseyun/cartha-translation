theological_decisions:
- issue: Nature of the phenomena described
  chosen_reading: cosmic signs of divine judgment/intervention without specifying
    a narrower eschatological scheme
  alternative_readings:
  - strictly literal meteorological/cosmic events
  - primarily symbolic imagery of upheaval
  rationale: The verse presents portentous phenomena in heaven and earth. The translation
    should preserve the imagery and gravity without resolving whether each element
    is literal, symbolic, or both. This follows the doctrine guideline to preserve
    theological tension rather than over-interpret.
  doctrine_reference: Translation philosophy §3
