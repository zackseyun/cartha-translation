id: JOL.3.3
reference: Joel 3:3
source:
  edition: WLC
  text: וְ/נָֽתַתִּי֙ מֽוֹפְתִ֔ים בַּ/שָּׁמַ֖יִם וּ/בָ/אָ֑רֶץ דָּ֣ם וָ/אֵ֔שׁ וְ/תִֽימֲר֖וֹת
    עָשָֽׁן׃
translation:
  text: 'And I will give wonders in the heavens and on the earth: blood and fire and
    columns of smoke.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pillars of smoke.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will give
  alternatives:
  - And I will set
  - And I will show
  lexicon: HALOT
  rationale: נתן literally means 'give/put/set.' In this prophetic context, 'I will
    give' preserves the Hebrew verb directly while remaining idiomatic in English.
    'Show' is interpretive and less formally tied to the source.
- source_word: מוֹפְתִים
  chosen: wonders
  alternatives:
  - signs
  - portents
  lexicon: HALOT
  rationale: מוֹפְתִים denotes extraordinary signs/portents. 'Wonders' fits the sense
    of miraculous or awe-inspiring phenomena and works naturally with 'in the heavens
    and on the earth.' 'Signs' is possible, but 'wonders' better distinguishes this
    term from אוֹתוֹת in nearby contexts while still conveying marvels.
- source_word: בַּשָּׁמַיִם
  chosen: in the heavens
  alternatives:
  - in heaven
  - in the sky
  lexicon: HALOT
  rationale: The Hebrew is plural, 'the heavens.' Retaining the plural reflects the
    source form and biblical idiom. 'Sky' is too narrow, and singular 'heaven' smooths
    away the Hebrew expression.
- source_word: וּבָאָרֶץ
  chosen: and on the earth
  alternatives:
  - and in the earth
  - and on earth
  lexicon: HALOT
  rationale: With ארץ in contrast to 'the heavens,' 'the earth' is the most natural
    cosmic counterpart. 'On the earth' best fits the sense of phenomena appearing
    in the terrestrial realm.
- source_word: דָּם
  chosen: blood
  lexicon: HALOT
  rationale: The noun straightforwardly means 'blood.' No contextual reason warrants
    a figurative paraphrase.
- source_word: וָאֵשׁ
  chosen: and fire
  lexicon: HALOT
  rationale: The noun means 'fire.' The conjunction is retained for the list structure.
- source_word: וְתִימֲרוֹת עָשָׁן
  chosen: and columns of smoke
  alternatives:
  - and pillars of smoke
  - and billows of smoke
  lexicon: HALOT
  rationale: תימרות refers to rising columns/palms-like shapes, here describing vertical
    masses of smoke. 'Columns of smoke' is clear modern English and preserves the
    imagery. 'Pillars of smoke' is traditional and viable; preserved in a footnote
    as a lexical alternative.
