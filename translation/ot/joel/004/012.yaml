id: JOL.4.12
reference: Joel 4:12
source:
  edition: WLC
  text: יֵע֨וֹרוּ֙ וְ/יַעֲל֣וּ הַ/גּוֹיִ֔ם אֶל עֵ֖מֶק יְהֽוֹשָׁפָ֑ט כִּ֣י שָׁ֗ם אֵשֵׁ֛ב
    לִ/שְׁפֹּ֥ט אֶת כָּל הַ/גּוֹיִ֖ם מִ/סָּבִֽיב־־־׃
translation:
  text: Let the nations awaken and come up to the Valley of Jehoshaphat, for there
    I will sit to judge all the surrounding nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jehoshaphat likely echoes the meaning 'the LORD judges,' reinforcing the
      scene of divine judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵעֹרוּ
  chosen: Let ... awaken
  alternatives:
  - be roused
  - stir themselves
  - wake up
  lexicon: HALOT
  rationale: The jussive/imperfect in context functions as an exhortative summons.
    'Awaken' preserves the metaphor of being stirred for action or battle more closely
    than the flatter 'wake up.'
- source_word: וְיַעֲלוּ
  chosen: and come up
  alternatives:
  - and go up
  - and ascend
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend,' but in English 'come up' works naturally
    with movement toward the divinely designated place of judgment. It preserves the
    directional sense without sounding wooden.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: גוים here refers to the foreign nations gathered for judgment, not specifically
    'Gentiles' in a later Jewish-Christian contrast. 'Nations' is the most natural
    and contextually precise rendering.
- source_word: עֵמֶק יְהוֹשָׁפָט
  chosen: the Valley of Jehoshaphat
  alternatives:
  - the valley of Yahweh judges
  - the Valley of the LORD judges
  lexicon: HALOT
  rationale: Per translation philosophy, personal names are transliterated rather
    than translated. The place name likely carries a wordplay with divine judgment,
    but the main text preserves it as a proper name.
- source_word: כִּי שָׁם
  chosen: for there
  alternatives:
  - because there
  - for in that place
  lexicon: HALOT
  rationale: This introduces the reason the nations are summoned. 'For there' is concise
    and preserves the causal force.
- source_word: אֵשֵׁב
  chosen: I will sit
  alternatives:
  - I will sit down
  - I will take my seat
  - I will dwell
  lexicon: HALOT
  rationale: Although ישב can mean 'dwell,' with the infinitive 'to judge' the judicial
    sense of taking one's seat is primary. 'I will sit' is simple and preserves the
    courtroom imagery.
- source_word: לִשְׁפֹּט
  chosen: to judge
  alternatives:
  - to govern
  - to pronounce judgment on
  lexicon: HALOT
  rationale: שפט here clearly denotes judicial action against the nations. 'To judge'
    is the standard and sufficiently weighty rendering.
- source_word: כָּל הַגּוֹיִם מִסָּבִיב
  chosen: all the surrounding nations
  alternatives:
  - all the nations round about
  - all the nations on every side
  lexicon: HALOT
  rationale: מסביב modifies the nations as those around Israel/Judah. 'Surrounding
    nations' is idiomatic modern English and preserves the spatial sense.
