theological_decisions:
- issue: Rendering the divine place name יְהוֹשָׁפָט
  chosen_reading: Transliterate as 'Jehoshaphat' in the main text while preserving
    the implied meaning in a footnote.
  alternative_readings:
  - translate the name as 'Yahweh judges' or 'the LORD judges'
  rationale: The translation philosophy directs that personal names be transliterated
    by standard conventions. Because the name contributes to the judgment theme, its
    semantic force is worth preserving in a footnote rather than replacing the proper
    name in the main text.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve
    theological tension rather than resolve it.'
