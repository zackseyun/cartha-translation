theological_decisions:
- issue: Metaphorical imagery of harvest and winepress as divine judgment
  chosen_reading: Retain the agricultural metaphors directly rather than interpret
    them in the main text as explicit judgment language.
  alternative_readings:
  - Interpret dynamically as commands to reap and tread the nations in judgment
  rationale: The verse clearly uses harvest and winepress imagery for judgment in
    context, but the Hebrew itself presents the metaphors rather than an explanatory
    paraphrase. Preserving the imagery maintains the prophetic force and avoids importing
    interpretation into the main text.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; optimal equivalence.'
- issue: Meaning of רָעָתָם
  chosen_reading: Moral evil/wickedness
  alternative_readings:
  - calamity/disaster
  rationale: 'Although רעה can denote either moral evil or disaster depending on context,
    here the causal clause explains why judgment imagery is appropriate: their moral
    evil is great. Rendering it as ''calamity'' would invert the logic by making their
    suffering the reason for the harvest/winepress.'
