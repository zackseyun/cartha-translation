id: JOL.4.13
reference: Joel 4:13
source:
  edition: WLC
  text: שִׁלְח֣וּ מַגָּ֔ל כִּ֥י בָשַׁ֖ל קָצִ֑יר בֹּ֤אֽוּ רְדוּ֙ כִּֽי מָ֣לְאָה גַּ֔ת
    הֵשִׁ֨יקוּ֙ הַ/יְקָבִ֔ים כִּ֥י רַבָּ֖ה רָעָתָֽ/ם־׃
translation:
  text: Send in the sickle, for the harvest is ripe. Come, go down, for the winepress
    is full; the vats overflow, for their evil is great.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descend'; some translations render 'tread' because the command likely
      envisions going down into the winepress to trample grapes.
    reason: lexical_alternative
  - marker: b
    text: Or 'their wickedness is great.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁלְחוּ
  chosen: Send in
  alternatives:
  - Put forth
  - Send
  lexicon: HALOT
  rationale: Imperative plural of שלח. In context with 'sickle,' the idiom means to
    apply or send in the harvesting instrument. 'Send in' is natural English and preserves
    the command force.
- source_word: מַגָּל
  chosen: the sickle
  alternatives:
  - a sickle
  lexicon: HALOT
  rationale: Standard term for a harvesting sickle. The definite sense in English
    suits the concrete image of reaping.
- source_word: בָשַׁל
  chosen: is ripe
  alternatives:
  - is ready
  - has ripened
  lexicon: HALOT
  rationale: Though the verb's basic sense is 'to ripen/cook,' with 'harvest' it denotes
    readiness for reaping. 'Is ripe' is idiomatic and vivid.
- source_word: קָצִיר
  chosen: the harvest
  alternatives:
  - grain harvest
  - crop
  lexicon: HALOT
  rationale: General noun for harvest. 'The harvest' preserves the agricultural metaphor
    without over-specifying the crop.
- source_word: בֹּאוּ
  chosen: Come
  alternatives:
  - Enter
  - Come on
  lexicon: HALOT
  rationale: Imperative plural. 'Come' keeps the summons concise and forceful.
- source_word: רְדוּ
  chosen: go down
  alternatives:
  - descend
  - tread
  lexicon: HALOT
  rationale: The verb ירד normally means 'go down/descend.' Although some translations
    render dynamically as 'tread' because of the winepress context, the Hebrew verb
    itself is 'go down,' likely into the press. Optimal equivalence favors retaining
    the source image.
- source_word: גַּת
  chosen: the winepress
  alternatives:
  - the press
  lexicon: HALOT
  rationale: Standard term for a winepress. 'Winepress' makes the imagery explicit
    for modern readers.
- source_word: הֵשִׁיקוּ
  chosen: overflow
  alternatives:
  - are full
  - run over
  lexicon: HALOT
  rationale: The verb conveys reaching or causing to reach the brim; with vats as
    subject, the sense is that they overflow or brim over. 'Overflow' captures the
    result vividly and distinguishes it from the previous 'is full.'
- source_word: יְקָבִים
  chosen: the vats
  alternatives:
  - the wine vats
  - the troughs
  lexicon: HALOT
  rationale: Refers to receptacles associated with the winepress. 'Vats' is concise
    and idiomatic; 'wine' is already implied by 'winepress.'
- source_word: רַבָּה
  chosen: is great
  alternatives:
  - is רבה/much
  - is abundant
  lexicon: HALOT
  rationale: Predicate adjective describing the extent of their evil. 'Is great' is
    natural English and preserves the evaluative force.
- source_word: רָעָתָם
  chosen: their evil
  alternatives:
  - their wickedness
  - their calamity
  lexicon: HALOT
  rationale: In this judgment context, the noun most naturally denotes moral evil/wickedness
    rather than disaster. 'Their evil' is slightly more formal but preserves the lexical
    breadth; 'wickedness' is a viable interpretive alternative.
