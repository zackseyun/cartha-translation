theological_decisions:
- issue: Meaning of נקה with 'blood' in a judgment context
  chosen_reading: 'Judicial vengeance/vindication: God will avenge the bloodshed of
    his people.'
  alternative_readings:
  - God will cleanse their bloodguilt
  - God will declare them innocent
  rationale: The immediate context is eschatological judgment on hostile nations and
    vindication of Judah/Jerusalem. Rendering the verb as 'avenge' preserves that
    judicial-theological context better than 'cleanse' or 'acquit,' which could suggest
    ritual or forensic innocence rather than retributive justice.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Aspect of the second clause
  chosen_reading: 'A prior state now reversed: ''which I have not avenged.'''
  alternative_readings:
  - 'A rhetorical intensification: ''I will surely not leave unpunished'''
  - A statement about acquittal rather than vengeance
  rationale: The Hebrew repetition is terse and somewhat elliptical. The chosen rendering
    keeps the contrast between prior non-avenging and promised action, while the footnote
    preserves the alternative idiomatic sense recognized by many translators.
  doctrine_reference: Translation philosophy §3
