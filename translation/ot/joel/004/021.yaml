id: JOL.4.21
reference: Joel 4:21
source:
  edition: WLC
  text: וְ/נִקֵּ֖יתִי דָּמָ֣/ם לֹֽא נִקֵּ֑יתִי וַֽ/יהוָ֖ה שֹׁכֵ֥ן בְּ/צִיּֽוֹן־׃
translation:
  text: I will avenge their blood, which I have not avenged, and the LORD dwells in
    Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will not leave their blood unpunished.' The Hebrew repeats the same
      verb with negation, allowing either the sense of avenging bloodshed or not leaving
      it unpunished.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנִקֵּיתִי
  chosen: I will avenge
  alternatives:
  - I will acquit
  - I will cleanse
  - I will leave unpunished
  lexicon: HALOT
  rationale: The verb נקה in the Piel can mean to hold innocent/acquit or to leave
    unpunished, but in this context with 'their blood' and the following negated repetition,
    the sense is that YHWH will address bloodguilt by punishing it, hence 'avenge.'
    This best captures the idiom in context and the parallelism with the prior clause.
- source_word: דָּמָם
  chosen: their blood
  alternatives:
  - their bloodguilt
  lexicon: HALOT
  rationale: Literally 'their blood.' In context it refers to bloodshed for which
    vengeance is due; 'their blood' preserves the Hebrew wording while allowing the
    judicial sense to be heard.
- source_word: לֹא נִקֵּיתִי
  chosen: which I have not avenged
  alternatives:
  - which I have not acquitted
  - which I have not left unpunished
  - though I had not avenged it
  lexicon: HALOT
  rationale: 'The repeated verb with negation is difficult. Given the first clause
    and the context of judgment on the nations, the most coherent English is a relative
    clause explaining prior non-vindication: ''which I have not avenged.'' This preserves
    the temporal force without flattening the Hebrew tension.'
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD,' following
    Jewish reverence tradition and common English Bible practice.
- source_word: שֹׁכֵן
  chosen: dwells
  alternatives:
  - is dwelling
  - resides
  lexicon: HALOT
  rationale: The participle expresses ongoing residence. 'Dwells' is natural modern
    English and preserves the durative sense.
- source_word: בְּצִיּוֹן
  chosen: in Zion
  alternatives:
  - on Zion
  lexicon: HALOT
  rationale: The preposition ב normally means 'in.' With Zion as the place of divine
    dwelling, 'in Zion' is the most idiomatic English rendering.
