id: JOL.4.18
reference: Joel 4:18
source:
  edition: WLC
  text: וְ/הָיָה֩ בַ/יּ֨וֹם הַ/ה֜וּא יִטְּפ֧וּ הֶ/הָרִ֣ים עָסִ֗יס וְ/הַ/גְּבָעוֹת֙
    תֵּלַ֣כְנָה חָלָ֔ב וְ/כָל אֲפִיקֵ֥י יְהוּדָ֖ה יֵ֣לְכוּ מָ֑יִם וּ/מַעְיָ֗ן מִ/בֵּ֤ית
    יְהוָה֙ יֵצֵ֔א וְ/הִשְׁקָ֖ה אֶת נַ֥חַל הַ/שִּׁטִּֽים־־׃
translation:
  text: And in that day the mountains will drip sweet wine, and the hills will flow
    with milk, and all the streambeds of Judah will flow with water; and a spring
    will come out from the house of the LORD and will water the Valley of Shittim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the valley of acacias” or “the Wadi of the Acacias.”
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה בַּיּוֹם הַהוּא
  chosen: And in that day
  alternatives:
  - And it will happen in that day
  - And it shall be in that day
  lexicon: HALOT
  rationale: The Hebrew idiom introduces a future eschatological scene. 'And in that
    day' is natural English while preserving the temporal formula without unnecessary
    woodenness.
- source_word: יִטְּפוּ
  chosen: will drip
  alternatives:
  - will drop
  - will distill
  lexicon: HALOT
  rationale: The verb denotes dripping or trickling. 'Will drip' preserves the vivid
    image of abundance better than a flatter 'drop'.
- source_word: עָסִיס
  chosen: sweet wine
  alternatives:
  - new wine
  - fresh wine
  lexicon: HALOT
  rationale: The noun refers to freshly pressed grape juice/wine, often with connotations
    of sweetness and abundance. 'Sweet wine' communicates the sense clearly in modern
    English; 'new wine' is possible but can sound technical or ambiguous.
- source_word: תֵּלַכְנָה
  chosen: will flow
  alternatives:
  - will go
  - will run
  lexicon: HALOT
  rationale: Literally 'will go/walk,' but in context with milk as the object the
    idiomatic sense is movement in abundance. 'Will flow' best conveys the image in
    English.
- source_word: חָלָב
  chosen: milk
  lexicon: HALOT
  rationale: Straightforward lexical rendering; the image is agricultural abundance.
- source_word: אֲפִיקֵי יְהוּדָה
  chosen: the streambeds of Judah
  alternatives:
  - the channels of Judah
  - the wadis of Judah
  lexicon: HALOT
  rationale: אֲפִיקִים refers to channels, ravines, or streambeds. 'Streambeds' is
    concrete and readable, fitting the image of normally dry courses filled with water.
    'Wadis' is geographically precise but less accessible.
- source_word: יֵלְכוּ מָיִם
  chosen: will flow with water
  alternatives:
  - will go with water
  - will run with water
  lexicon: HALOT
  rationale: The Hebrew uses 'go' idiomatically for moving water. 'Will flow with
    water' is idiomatic English and preserves the abundance motif.
- source_word: מַעְיָן
  chosen: a spring
  alternatives:
  - a fountain
  - a source
  lexicon: HALOT
  rationale: The noun denotes a natural spring or fountain. 'Spring' is the clearest
    modern equivalent and avoids potentially archaic resonance of 'fountain'.
- source_word: מִבֵּית יְהוָה
  chosen: from the house of the LORD
  alternatives:
  - from the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת is literally 'house.' Since the phrase refers to the sanctuary,
    'temple' is interpretive; 'house of the LORD' preserves the Hebrew wording and
    cultic resonance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: וְהִשְׁקָה
  chosen: will water
  alternatives:
  - will irrigate
  - will give drink to
  lexicon: HALOT
  rationale: The Hiphil means to give water to or cause to drink. 'Will water' is
    concise, natural, and fits the landscape imagery.
- source_word: נַחַל הַשִּׁטִּים
  chosen: the Valley of Shittim
  alternatives:
  - the Wadi of the Acacias
  - the valley of acacias
  lexicon: HALOT
  rationale: נַחַל can mean wadi, torrent valley, or valley; הַשִּׁטִּים likely refers
    to Shittim as a place name, though it is related to acacia trees. Retaining 'Shittim'
    preserves the probable toponym and avoids over-interpreting the phrase as merely
    botanical.
