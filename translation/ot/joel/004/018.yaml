theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Following the project's doctrinal
    and stylistic standard, it is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether הַשִּׁטִּים is translated as a place name or common noun
  chosen_reading: the Valley of Shittim
  alternative_readings:
  - the valley of acacias
  - the Wadi of the Acacias
  rationale: The form with article can still designate a known location, and many
    interpreters understand it as the place Shittim. Preserving the toponym avoids
    collapsing possible geographic and symbolic resonance into a generic botanical
    phrase; the lexical alternative is preserved in a footnote.
