theological_decisions:
- issue: Intertextual reversal of peace-oracle language
  chosen_reading: Render the verse as a deliberate call to arm for judgment, echoing
    and reversing Isaiah 2:4/Micah 4:3.
  alternative_readings:
  - Render without preserving the recognizable reversal of the earlier prophetic formula
  rationale: The Hebrew wording intentionally mirrors the well-known imagery of beating
    swords into plowshares, but in reverse. Preserving 'plowshares,' 'swords,' 'pruning
    hooks,' and 'spears' in the main text makes the prophetic irony and judgment context
    visible without adding interpretation beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
