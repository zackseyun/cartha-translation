id: JOL.4.10
reference: Joel 4:10
source:
  edition: WLC
  text: כֹּ֤תּוּ אִתֵּי/כֶם֙ לַֽ/חֲרָב֔וֹת וּ/מַזְמְרֹֽתֵי/כֶ֖ם לִ/רְמָחִ֑ים הַֽ/חַלָּ֔שׁ
    יֹאמַ֖ר גִּבּ֥וֹר אָֽנִי׃
translation:
  text: Beat your plowshares into swords, and your pruning hooks into spears; let
    the weak say, “I am a warrior.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This reverses the imagery of Isa 2:4 and Mic 4:3, where weapons are beaten
      into farming tools.
    reason: cross_reference
  - marker: b
    text: Or “I am mighty,” “I am strong.” The Hebrew גִּבּוֹר can denote a mighty
      man, strong man, or warrior; here the military context favors “warrior.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּתּוּ
  chosen: Beat
  alternatives:
  - Hammer
  - Forge
  lexicon: HALOT
  rationale: Imperative plural from כתת, literally to beat/crush. 'Beat' preserves
    the concrete image of hammering agricultural tools into weapons better than a
    more interpretive 'forge.'
- source_word: אִתֵּיכֶם
  chosen: your plowshares
  alternatives:
  - your mattocks
  - your farming tools
  lexicon: HALOT
  rationale: The noun refers to implements used for plowing/tilling. 'Plowshares'
    is the established and contextually fitting rendering, especially in deliberate
    reversal of the peace imagery known from Isa 2:4/Mic 4:3.
- source_word: לַחֲרָבוֹת
  chosen: into swords
  alternatives:
  - for swords
  lexicon: HALOT
  rationale: The prefixed ל marks result/purpose here. 'Into swords' is idiomatic
    English and matches the transformation sense of the command.
- source_word: וּמַזְמְרֹתֵיכֶם
  chosen: and your pruning hooks
  alternatives:
  - and your pruning knives
  lexicon: HALOT
  rationale: The noun denotes pruning implements used in viticulture/agriculture.
    'Pruning hooks' is the standard and clear English equivalent.
- source_word: לִרְמָחִים
  chosen: into spears
  alternatives:
  - for lances
  lexicon: HALOT
  rationale: רמח denotes a spear/lance. 'Spears' is the most natural and broadly understandable
    rendering in modern English.
- source_word: החלש
  chosen: the weak
  alternatives:
  - the feeble
  - the powerless
  lexicon: HALOT
  rationale: Adjectival substantive meaning one who is weak. 'The weak' is concise
    and preserves the representative singular/generic force.
- source_word: יֹאמַר
  chosen: let ... say
  alternatives:
  - shall say
  - must say
  lexicon: HALOT
  rationale: Imperfect/jussive nuance after the imperative sequence is best represented
    in English by 'let ... say,' preserving the exhortational force.
- source_word: גִּבּוֹר
  chosen: a warrior
  alternatives:
  - mighty man
  - strong man
  - hero
  lexicon: HALOT
  rationale: גבור often denotes a mighty warrior or valiant fighter, not merely someone
    physically strong. 'A warrior' best fits the militarization context of the verse.
- source_word: אָֽנִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: Explicit pronoun adds emphasis. English requires the copula, and 'I am'
    preserves the force of the self-assertion.
