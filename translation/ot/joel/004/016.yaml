theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered national designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - children of Israel
  - people of Israel
  rationale: The translation philosophy prefers gender-accurate renderings over gender-neutral ones when the source is grammatically masculine and representative. Here 'sons of Israel' preserves the Hebrew form, while a footnote can note the idiomatic sense.
