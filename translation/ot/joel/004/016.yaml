id: JOL.4.16
reference: Joel 4:16
source:
  edition: WLC
  text: וַ/יהוָ֞ה מִ/צִּיּ֣וֹן יִשְׁאָ֗ג וּ/מִ/ירוּשָׁלִַ֨ם֙ יִתֵּ֣ן קוֹל֔/וֹ וְ/רָעֲשׁ֖וּ שָׁמַ֣יִם וָ/אָ֑רֶץ וַֽ/יהוָה֙ מַֽחֲסֶ֣ה לְ/עַמּ֔/וֹ וּ/מָע֖וֹז לִ/בְנֵ֥י יִשְׂרָאֵֽל׃
translation:
  text: And Yahweh roars from Zion and gives his voice from Jerusalem, and the heavens and the earth quake; but Yahweh is a refuge for his people, and a stronghold for the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'utters his voice.' The Hebrew literally says 'gives his voice,' an idiom for speaking loudly or thunderously.
    reason: lexical_alternative
  - marker: b
    text: Or more idiomatically, 'for the children of Israel' or 'for the people of Israel.' The Hebrew reads 'for the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional English convention for YHWH rather than transliteration.
- source_word: מִצִּיּוֹן
  chosen: from Zion
  lexicon: HALOT
  rationale: Retains the place name by standard transliteration; the preposition מִן is straightforwardly rendered 'from'.
- source_word: יִשְׁאַג
  chosen: roars
  alternatives:
  - roareth
  - utters a roar
  lexicon: HALOT
  rationale: The verb שׁאג is the vivid verb for roaring, often of a lion. 'Roars' preserves the force and imagery in natural modern English.
- source_word: וּמִירוּשָׁלִַם
  chosen: from Jerusalem
  lexicon: HALOT
  rationale: Keeps the parallel structure with 'from Zion'; Jerusalem is transliterated as the standard English place name.
- source_word: יִתֵּן קוֹלוֹ
  chosen: gives his voice
  alternatives:
  - utters his voice
  - raises his voice
  lexicon: HALOT
  rationale: Literally the Hebrew is 'gives his voice.' This is idiomatic in Hebrew for vocal utterance. I preserved the concrete expression in English rather than flattening it entirely, while keeping it readable.
- source_word: וְרָעֲשׁוּ
  chosen: quake
  alternatives:
  - shake
  - tremble
  lexicon: HALOT
  rationale: The verb רעשׁ denotes shaking or quaking, especially in cosmic or seismic contexts. 'Quake' best fits the paired subjects 'the heavens and the earth' and the theophanic setting.
- source_word: שָׁמַיִם וָאָרֶץ
  chosen: the heavens and the earth
  alternatives:
  - heaven and earth
  lexicon: HALOT
  rationale: Hebrew uses the plural שׁמים. 'The heavens and the earth' preserves the Hebrew form and the cosmic scope of the statement.
- source_word: מַחֲסֶה
  chosen: a refuge
  alternatives:
  - shelter
  lexicon: HALOT
  rationale: מַחֲסֶה commonly denotes a place of refuge or shelter. 'Refuge' is the more established and theologically weighty English equivalent in Psalms/prophetic usage.
- source_word: לְעַמּוֹ
  chosen: for his people
  alternatives:
  - to his people
  lexicon: HALOT
  rationale: 'The lamed here is best rendered in English as relational benefit: the LORD is ''a refuge for his people.'''
- source_word: וּמָעוֹז
  chosen: a stronghold
  alternatives:
  - fortress
  - strength
  lexicon: HALOT
  rationale: מָעוֹז denotes a place or source of strength/fortification. 'Stronghold' pairs well with 'refuge' while preserving the protective nuance.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: for the sons of Israel
  alternatives:
  - for the children of Israel
  - for the people of Israel
  lexicon: HALOT
  rationale: Per the project's gender-accurate policy, בְּנֵי is rendered 'sons' rather than neutralizing to 'people.' In this covenantal-national expression, the masculine plural is representative; a footnote preserves a more idiomatic alternative.
