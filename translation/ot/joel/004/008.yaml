id: JOL.4.8
reference: Joel 4:8
source:
  edition: WLC
  text: וּ/מָכַרְתִּ֞י אֶת בְּנֵי/כֶ֣ם וְ/אֶת בְּנֽוֹתֵי/כֶ֗ם בְּ/יַד֙ בְּנֵ֣י יְהוּדָ֔ה
    וּ/מְכָר֥וּ/ם לִ/שְׁבָאיִ֖ם אֶל גּ֣וֹי רָח֑וֹק כִּ֥י יְהוָ֖ה דִּבֵּֽר־־־׃ס
translation:
  text: And I will sell your sons and your daughters into the hand of the sons of
    Judah, and they will sell them to the Sabeans, to a distant nation; for the LORD
    has spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a far-off nation.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to the Sabeans,' that is, the people of Sheba.
    reason: cultural_note
lexical_decisions:
- source_word: וּמָכַרְתִּי
  chosen: And I will sell
  alternatives:
  - And I will hand over
  - And I will deliver for sale
  lexicon: HALOT
  rationale: מכר in the Qal commonly means 'sell.' The commercial/judicial reversal
    is central to the verse's retributive imagery, so 'sell' should be retained rather
    than softened.
- source_word: בְּנֵיכֶם ... בְּנוֹתֵיכֶם
  chosen: your sons and your daughters
  alternatives:
  - your children
  lexicon: HALOT
  rationale: The Hebrew explicitly distinguishes male and female offspring. Following
    the gender-accurate principle, the translation preserves 'sons' and 'daughters'
    rather than neutralizing to 'children'.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: HALOT
  rationale: The idiom literally reads 'into the hand of' and denotes transfer into
    another's control. The literal rendering is clear in English and preserves the
    Hebrew imagery.
- source_word: בְּנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the people of Judah
  - the Judeans
  lexicon: HALOT
  rationale: The phrase is literally 'sons of Judah.' This keeps the Hebrew kinship
    expression and aligns with the following reciprocal sale language. 'Judeans' is
    possible but less transparent to the Hebrew form here.
- source_word: וּמְכָרוּם
  chosen: and they will sell them
  alternatives:
  - and they will market them
  - and they will hand them over
  lexicon: HALOT
  rationale: Same verb as earlier in the verse; consistency favors 'sell.' The suffix
    refers back to the sons and daughters just mentioned.
- source_word: לִשְׁבָאִים
  chosen: to the Sabeans
  alternatives:
  - to Sheba
  - to traders from Sheba
  lexicon: HALOT
  rationale: The form denotes the people of Sheba, conventionally 'Sabeans.' This
    is more precise than the abstract place name and fits the personal object of the
    verb 'sell.'
- source_word: אֶל גּוֹי רָחוֹק
  chosen: to a distant nation
  alternatives:
  - to a far-off nation
  - to a remote people
  lexicon: HALOT
  rationale: גּוֹי is broadly 'nation/people,' and רָחוֹק means 'far, distant.' 'Distant
    nation' is natural modern English while preserving the sense of removal far away.
- source_word: כִּי יְהוָה דִּבֵּר
  chosen: for the LORD has spoken
  alternatives:
  - for the LORD has said
  - because the LORD has spoken
  lexicon: HALOT
  rationale: The clause grounds the certainty of the judgment in YHWH's utterance.
    Per doctrine, יְהוָה is rendered 'the LORD.' 'Has spoken' is a standard and weighty
    rendering of דִּבֵּר here.
