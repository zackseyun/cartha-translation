theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of זָרִים in a holiness/restoration context
  chosen_reading: strangers
  alternative_readings:
  - foreigners
  rationale: The verse emphasizes Jerusalem's sanctity and freedom from profaning intrusion. 'Strangers' preserves the outsider sense without making a stronger ethnic or political claim than the Hebrew requires.
