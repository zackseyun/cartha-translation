id: JOL.4.17
reference: Joel 4:17
source:
  edition: WLC
  text: וִֽ/ידַעְתֶּ֗ם כִּ֣י אֲנִ֤י יְהוָה֙ אֱלֹ֣הֵי/כֶ֔ם שֹׁכֵ֖ן בְּ/צִיּ֣וֹן הַר
    קָדְשִׁ֑/י וְ/הָיְתָ֤ה יְרוּשָׁלִַ֨ם֙ קֹ֔דֶשׁ וְ/זָרִ֥ים לֹא יַֽעַבְרוּ בָ֖/הּ
    עֽוֹד־־־׃ס
translation:
  text: Then you will know that I am the LORD your God, dwelling in Zion, my holy
    mountain. And Jerusalem will be holy, and strangers will pass through her no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'foreigners.' The Hebrew זָרִים refers to outsiders; in this context
      it likely means those who do not belong in the holy city, not necessarily every
      non-Israelite person in every sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִידַעְתֶּם
  chosen: Then you will know
  alternatives:
  - And you will know
  - So you will know
  lexicon: HALOT
  rationale: The prefixed waw on a qatal can carry consequential/sequential force
    in prophetic discourse. 'Then' brings out the resultative sense in context without
    over-paraphrasing; 'you will know' preserves the straightforward cognitive/experiential
    force of ידע in covenantal recognition formulas.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention
    reflecting the Hebrew name.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Construct with 2mp suffix is naturally rendered 'your God.' This preserves
    the covenantal relationship expressed in the Hebrew.
- source_word: שֹׁכֵן
  chosen: dwelling
  alternatives:
  - who dwells
  - inhabiting
  lexicon: HALOT
  rationale: The participle describes the LORD as the one dwelling in Zion. 'Dwelling'
    works smoothly in apposition to 'I am the LORD your God' while preserving the
    participial aspect.
- source_word: בְּצִיּוֹן
  chosen: in Zion
  lexicon: HALOT
  rationale: Standard locative use of ב. 'Zion' is transliterated as a place name
    per translation philosophy.
- source_word: הַר קָדְשִׁי
  chosen: my holy mountain
  alternatives:
  - the mountain of my holiness
  lexicon: HALOT
  rationale: An idiomatic rendering of the construct phrase that preserves both the
    possessive suffix and the holiness language.
- source_word: וְהָיְתָה יְרוּשָׁלִַם קֹדֶשׁ
  chosen: And Jerusalem will be holy
  alternatives:
  - And Jerusalem will be a holy place
  - Then Jerusalem will become holy
  lexicon: HALOT
  rationale: The clause predicates holiness of Jerusalem. 'Will be holy' is the most
    direct and natural English equivalent; adding 'become' would overstate a process
    not explicit in the Hebrew.
- source_word: וְזָרִים
  chosen: and strangers
  alternatives:
  - and foreigners
  - and aliens
  lexicon: HALOT
  rationale: זָרִים denotes outsiders/foreigners. 'Strangers' preserves the broad
    sense of those not belonging, fitting the prophetic holiness context. 'Foreigners'
    is possible, but 'strangers' better matches the exclusion from sacred space rather
    than merely ethnicity.
- source_word: לֹא יַעַבְרוּ בָהּ עוֹד
  chosen: will pass through her no more
  alternatives:
  - will pass through it no longer
  - will enter her again no more
  lexicon: HALOT
  rationale: עבר with ב can mean pass through/traverse. 'Pass through her no more'
    preserves the movement imagery and the adverb עוֹד. 'Her' reflects the feminine
    reference to Jerusalem in English personification.
