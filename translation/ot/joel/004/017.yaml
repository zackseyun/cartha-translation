theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This also aligns with the covenantal formula 'I am the LORD your God.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Referent of זָרִים in a holiness/restoration context
  chosen_reading: strangers
  alternative_readings:
  - foreigners
  rationale: The verse emphasizes Jerusalem's sanctity and freedom from profaning
    intrusion. 'Strangers' preserves the outsider sense without making a stronger
    ethnic or political claim than the Hebrew requires.
