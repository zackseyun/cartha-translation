id: JOL.4.5
reference: Joel 4:5
source:
  edition: WLC
  text: אֲשֶׁר כַּסְפִּ֥/י וּ/זְהָבִ֖/י לְקַחְתֶּ֑ם וּ/מַֽחֲמַדַּ/י֙ הַ/טֹּבִ֔ים הֲבֵאתֶ֖ם
    לְ/הֵיכְלֵי/כֶֽם־׃
translation:
  text: because you took my silver and my gold, and brought my precious treasures
    into your temples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into your palaces.' The Hebrew word can mean either 'temples' or 'palaces';
      'temples' is preferred here because the context suggests cultic appropriation
      of what belongs to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: In context this relative particle introduces the reason for the coming
    judgment in the preceding verse, so a causal rendering is more natural in English
    than a bare relative 'which/that.'
- source_word: כַּסְפִּי
  chosen: my silver
  lexicon: HALOT
  rationale: Straightforward possessive noun; retained literally.
- source_word: וּזְהָבִי
  chosen: and my gold
  lexicon: HALOT
  rationale: Straightforward possessive noun; retained literally and coordinated with
    the previous item.
- source_word: לְקַחְתֶּם
  chosen: you took
  alternatives:
  - you seized
  lexicon: HALOT
  rationale: Qal perfect 2mp of לקח commonly means 'take.' 'Seized' is possible but
    'took' is the more direct and neutral rendering.
- source_word: וּמַחֲמַדַּי
  chosen: and my precious treasures
  alternatives:
  - and my desirable things
  - and my precious things
  lexicon: HALOT
  rationale: The noun denotes desirable/precious objects. Since the following adjective
    'the good ones' intensifies value, 'precious treasures' communicates both desirability
    and material worth in idiomatic English.
- source_word: הַטֹּבִים
  chosen: precious
  alternatives:
  - good
  - fine
  lexicon: HALOT
  rationale: Although literally 'the good ones,' in combination with 'my desirable
    things' it functions qualitatively to describe valuable, choice items. Rendering
    the phrase idiomatically as 'precious treasures' avoids wooden English while preserving
    the sense of high value.
- source_word: הֲבֵאתֶם
  chosen: brought
  alternatives:
  - carried
  lexicon: HALOT
  rationale: Hiphil perfect 2mp of בוא here means to bring something into a place.
- source_word: לְהֵיכְלֵיכֶם
  chosen: into your temples
  alternatives:
  - into your palaces
  lexicon: HALOT
  rationale: היכל can denote temple or palace. In this context, addressing foreign
    nations who plundered what belonged to YHWH and placed it in their own cultic
    buildings, 'temples' best fits the likely sense. The palace sense is preserved
    in a footnote because the term can bear either meaning in Hebrew.
