theological_decisions:
- issue: Sense of הֵיכְלֵיכֶם in relation to the nations' treatment of what belongs
    to God
  chosen_reading: cultic buildings ('your temples')
  alternative_readings:
  - royal buildings ('your palaces')
  rationale: The verse accuses the nations not only of theft but of transferring sacred/valuable
    items into their own sanctuaries, which heightens the sacrilegious force of the
    charge. Since היכל can also mean 'palace,' that alternative is preserved in a
    footnote rather than excluded.
  doctrine_reference: Translation philosophy §3, §5
