id: JOL.4.3
reference: Joel 4:3
source:
  edition: WLC
  text: וְ/אֶל עַמִּ֖/י יַדּ֣וּ גוֹרָ֑ל וַ/יִּתְּנ֤וּ הַ/יֶּ֨לֶד֙ בַּ/זּוֹנָ֔ה וְ/הַ/יַּלְדָּ֛ה
    מָכְר֥וּ בַ/יַּ֖יִן וַ/יִּשְׁתּֽוּ־׃
translation:
  text: And they cast lots for my people; they traded a boy for a prostitute, and
    sold a girl for wine, and drank it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they gave a boy to a prostitute.' The Hebrew verb is literally 'gave,'
      but in context it describes an exploitative exchange.
    reason: lexical_alternative
  - marker: b
    text: Or 'they cast lots over my people.' The Hebrew idiom refers to dividing
      people as spoil by lot.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶל
  chosen: for
  alternatives:
  - over
  - against
  - concerning
  lexicon: HALOT
  rationale: In the idiom ידה גורל אל/על, the preposition marks the object over whom
    lots are cast. English 'cast lots for' is the most natural rendering of the whole
    expression here.
- source_word: עַמִּי
  chosen: my people
  alternatives:
  - my nation
  lexicon: HALOT
  rationale: עַם commonly means 'people' in covenantal/national sense. 'My people'
    preserves both possessive force and covenantal resonance.
- source_word: יַדּוּ גוֹרָל
  chosen: they cast lots
  alternatives:
  - they threw the lot
  - they allotted by lot
  lexicon: HALOT
  rationale: The collocation means to cast lots. This is a standard idiom and should
    be rendered idiomatically in English rather than woodenly.
- source_word: וַיִּתְּנוּ
  chosen: they traded
  alternatives:
  - they gave
  - they exchanged
  lexicon: HALOT
  rationale: 'Although the verb is literally ''they gave,'' the context is transactional:
    a boy is handed over in exchange for sexual services. ''Traded'' makes the exploitative
    exchange explicit without adding content beyond the context.'
- source_word: הַיֶּלֶד
  chosen: a boy
  alternatives:
  - the boy
  - the child
  lexicon: HALOT
  rationale: Though formally definite, Hebrew can use the article generically. In
    this context the sense is not one specific known boy but a representative victim.
    'Boy' fits the male counterpart to 'girl' in the next clause better than the broader
    'child'.
- source_word: בַּזּוֹנָה
  chosen: for a prostitute
  alternatives:
  - for the prostitute
  - for prostitution
  - to a prostitute
  lexicon: HALOT
  rationale: 'The preposition with the noun indicates exchange value: the boy was
    traded for a prostitute, likely meaning in payment for sexual use. ''For a prostitute''
    best preserves the terse, shocking transactional sense.'
- source_word: וְהַיַּלְדָּה
  chosen: and sold a girl
  alternatives:
  - and the girl
  - and a young girl
  lexicon: HALOT
  rationale: יַלְדָּה denotes a girl/young female. Rendering within the clause as
    'and sold a girl' reflects the generic use and parallels 'a boy' in the prior
    clause.
- source_word: מָכְרוּ
  chosen: sold
  alternatives:
  - bartered
  lexicon: HALOT
  rationale: The verb plainly means 'sold.' It should remain direct and stark.
- source_word: בַיַּיִן
  chosen: for wine
  alternatives:
  - for the wine
  lexicon: HALOT
  rationale: The preposition marks the price received in exchange. 'For wine' is idiomatic
    and parallels the previous exchange clause.
- source_word: וַיִּשְׁתּוּ
  chosen: and drank it
  alternatives:
  - and drank
  - and they drank
  lexicon: HALOT
  rationale: 'The object is implicit from context: the wine just mentioned. Supplying
    ''it'' makes the English natural while preserving the sequence of exploitation
    followed by consumption.'
