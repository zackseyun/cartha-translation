id: JOL.4.7
reference: Joel 4:7
source:
  edition: WLC
  text: הִנְ/נִ֣י מְעִירָ֔/ם מִן הַ֨/מָּק֔וֹם אֲשֶׁר מְכַרְתֶּ֥ם אֹתָ֖/ם שָׁ֑מָּ/ה
    וַ/הֲשִׁבֹתִ֥י גְמֻלְ/כֶ֖ם בְּ/רֹאשְׁ/כֶֽם־־׃
translation:
  text: Look, I am stirring them up from the place where you sold them, and I will
    return your recompense on your own head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am rousing them up.' The Hebrew verb can mean 'awaken,' 'rouse,' or
      'stir up.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will repay you'; literally, 'I will return your recompense on your
      head.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Look, I
  alternatives:
  - Behold, I
  - See, I
  lexicon: HALOT
  rationale: Introduces a solemn divine declaration with deictic force. 'Look' preserves
    the attention-getting function in readable modern English better than archaic
    'Behold.'
- source_word: מְעִירָם
  chosen: am stirring them up
  alternatives:
  - am rousing them
  - am awakening them
  lexicon: HALOT
  rationale: From עור in the Hiphil, meaning to arouse/stir up. 'Stirring them up'
    fits the context of God causing the exiles to rise and return from where they
    were sold, without over-specifying military or merely literal waking imagery.
- source_word: מִן הַמָּקוֹם
  chosen: from the place
  alternatives:
  - out of the place
  lexicon: HALOT
  rationale: Straightforward spatial expression; 'from the place' is natural and sufficiently
    formal.
- source_word: אֲשֶׁר מְכַרְתֶּם אֹתָם שָׁמָּה
  chosen: where you sold them
  alternatives:
  - to which you sold them
  - where you had sold them
  lexicon: HALOT
  rationale: The relative clause plus directional adverb literally means 'where/to
    there you sold them.' English idiom is best served by 'where you sold them,' with
    the destination sense retained by context.
- source_word: וַהֲשִׁבֹתִי
  chosen: I will return
  alternatives:
  - I will bring back
  - I will repay
  lexicon: HALOT
  rationale: From שוב in the Hiphil, 'cause to return/turn back.' Here it governs
    'your recompense,' so 'return' preserves the concrete metaphor of requital coming
    back upon the offenders. 'Repay' is interpretive and is therefore left as an alternative
    sense.
- source_word: גְמֻלְכֶם
  chosen: your recompense
  alternatives:
  - your payment
  - what you deserve
  - your dealing
  lexicon: HALOT
  rationale: גמול denotes dealing, recompense, or repayment, often in a retributive
    sense. 'Recompense' preserves the judicial/moral force without flattening it to
    a merely commercial 'payment.'
- source_word: בְּרֹאשְׁכֶם
  chosen: on your own head
  alternatives:
  - upon your head
  lexicon: HALOT
  rationale: A Hebrew idiom for retribution falling back on the guilty party. 'On
    your own head' preserves the idiom and clarifies reflexive force in natural English.
