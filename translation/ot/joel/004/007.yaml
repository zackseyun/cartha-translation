theological_decisions:
- issue: Nature of divine action in מְעִירָם
  chosen_reading: God is declaring that he will actively rouse the dispersed people
    from the place of exile/sale.
  alternative_readings:
  - God will merely awaken them emotionally
  - God will incite them militarily
  rationale: The verb is broad enough to include arousal to movement or action, but
    the immediate context 'from the place where you sold them' points most directly
    to God causing their emergence/return from dispersion. The translation avoids
    narrowing the action to either inner emotion or military mobilization.
- issue: Force of גְמֻלְכֶם בְּרֹאשְׁכֶם
  chosen_reading: 'A statement of just retribution: the offenders'' own deed-recompense
    returns upon themselves.'
  alternative_readings:
  - A purely idiomatic 'I will punish you'
  rationale: The Hebrew uses a concrete recompense idiom rather than a generic punishment
    term. Preserving 'return your recompense on your own head' maintains the moral
    symmetry of divine justice without importing extra doctrinal claims.
