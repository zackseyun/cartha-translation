theological_decisions:
- issue: Meaning of עֵמֶק הֶחָרוּץ
  chosen_reading: the Valley of Decision
  alternative_readings:
  - the Valley of Judgment
  - the Valley of Threshing
  rationale: The Hebrew expression is semantically rich and may evoke both decisive verdict and threshing/judgment imagery. To preserve theological tension rather than flatten it, the main text uses 'Decision' while alternatives are preserved in a footnote. This avoids importing a narrower doctrinal claim than the Hebrew warrants while still giving a clear translation.
