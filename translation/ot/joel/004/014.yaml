id: JOL.4.14
reference: Joel 4:14
source:
  edition: WLC
  text: הֲמוֹנִ֣ים הֲמוֹנִ֔ים בְּ/עֵ֖מֶק הֶֽ/חָר֑וּץ כִּ֤י קָרוֹב֙ י֣וֹם יְהוָ֔ה בְּ/עֵ֖מֶק הֶ/חָרֽוּץ׃
translation:
  text: Multitudes, multitudes in the Valley of Decision! For the day of Yahweh is near in the Valley of Decision.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Valley of Judgment' or 'the Valley of Threshing.' The Hebrew term carries connotations of decisive verdict and may also evoke threshing imagery.
    reason: alternative_reading
lexical_decisions:
- source_word: הֲמוֹנִים
  chosen: Multitudes
  alternatives:
  - Crowds
  - Hordes
  - Tumulting multitudes
  lexicon: HALOT
  rationale: The plural noun denotes a great mass or throng. Repetition heightens urgency and scale, so 'Multitudes, multitudes' preserves both the lexical sense and the rhetorical force better than a more interpretive rendering.
- source_word: בְּעֵמֶק
  chosen: in the Valley
  alternatives:
  - in the vale
  - in the plain of
  lexicon: HALOT
  rationale: עֵמֶק is the common term for a valley. 'In the Valley' is natural English and preserves the concrete geographic imagery.
- source_word: הֶחָרוּץ
  chosen: Decision
  alternatives:
  - Threshing
  - Judgment
  - Sharpness
  lexicon: HALOT
  rationale: חָרוּץ can denote something decided/decreed and in some contexts is associated with sharpness or threshing. In this prophetic setting, the phrase most plausibly refers to a valley of decisive judgment. 'Decision' preserves the established semantic link to decisive determination without over-paraphrasing to 'judgment' in the main text.
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the preceding exclamation. 'For' is concise and fits prophetic discourse well.
- source_word: קָרוֹב
  chosen: is near
  alternatives:
  - is close
  - draws near
  lexicon: HALOT
  rationale: The adjective predicates nearness. 'Is near' is the most idiomatic and direct English rendering.
- source_word: יוֹם יְהוָה
  chosen: the day of the LORD
  alternatives:
  - the LORD's day
  lexicon: HALOT
  rationale: This is the established prophetic expression for divine intervention in judgment. Per doctrine, יְהוָה is rendered 'the LORD.' 'The day of the LORD' preserves the canonical phrase and its theological resonance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
