theological_decisions:
- issue: Cosmic darkening language in prophetic judgment imagery
  chosen_reading: Render the imagery straightforwardly as cosmic signs without specifying
    whether the language is literal, metaphorical, or apocalyptic-symbolic.
  alternative_readings:
  - Literal astronomical darkening
  - Figurative depiction of divine judgment and upheaval
  - Apocalyptic imagery combining literal and symbolic force
  rationale: The Hebrew presents the phenomena poetically and tersely. The translation
    should preserve the prophetic tension rather than resolve the interpretive question
    beyond the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
