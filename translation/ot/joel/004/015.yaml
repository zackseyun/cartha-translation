id: JOL.4.15
reference: Joel 4:15
source:
  edition: WLC
  text: שֶׁ֥מֶשׁ וְ/יָרֵ֖חַ קָדָ֑רוּ וְ/כוֹכָבִ֖ים אָסְפ֥וּ נָגְהָֽ/ם׃
translation:
  text: The sun and the moon grow dark, and the stars withdraw their brightness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the stars gather in their shining,' that is, they withhold their light.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁמֶשׁ
  chosen: the sun
  alternatives:
  - sun
  lexicon: HALOT
  rationale: Standard rendering of the celestial body; English idiom naturally uses
    the article in this poetic context.
- source_word: וְיָרֵחַ
  chosen: and the moon
  alternatives:
  - and moon
  lexicon: HALOT
  rationale: Standard rendering of יָרֵחַ as the lunar body; paired with 'sun' in
    cosmic-judgment imagery, and English idiom favors the article.
- source_word: קָדָרוּ
  chosen: grow dark
  alternatives:
  - are darkened
  - become dark
  - darken
  lexicon: HALOT
  rationale: Qal perfect plural from קדר conveys becoming dark/dim. 'Grow dark' is
    natural modern English and preserves the inchoative sense better than the more
    passive 'are darkened.'
- source_word: וְכוֹכָבִים
  chosen: and the stars
  alternatives:
  - and stars
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun; article added for natural
    English style in a cosmic scene.
- source_word: אָסְפוּ
  chosen: withdraw
  alternatives:
  - gather in
  - take away
  - remove
  - hold back
  lexicon: HALOT
  rationale: The verb אסף literally means gather/collect, but with נָגְהָם ('their
    brightness') the idiomatic sense is that the stars draw in or withhold their shining.
    'Withdraw' communicates this clearly in English without over-paraphrase.
- source_word: נָגְהָם
  chosen: their brightness
  alternatives:
  - their shining
  - their light
  - their radiance
  lexicon: HALOT
  rationale: From נֹגַהּ, meaning brightness/radiance. 'Brightness' is concise and
    fits the image of stars ceasing to shine; 'light' is possible but less specific
    to luminous splendor.
