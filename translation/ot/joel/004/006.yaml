id: JOL.4.6
reference: Joel 4:6
source:
  edition: WLC
  text: וּ/בְנֵ֤י יְהוּדָה֙ וּ/בְנֵ֣י יְרוּשָׁלִַ֔ם מְכַרְתֶּ֖ם לִ/בְנֵ֣י הַ/יְּוָנִ֑ים
    לְמַ֥עַן הַרְחִיקָ֖/ם מֵ/עַ֥ל גְּבוּלָֽ/ם׃
translation:
  text: And the sons of Judah and the sons of Jerusalem you sold to the sons of the
    Greeks, in order to remove them far from their border.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to the sons of the Greeks'; this may also be rendered more idiomatically
      'to the Greeks.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from their territory' for 'from their border.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: and the sons of
  alternatives:
  - and the people of
  - and the children of
  lexicon: HALOT
  rationale: בני literally means 'sons of.' Here it introduces the people belonging
    to Judah and Jerusalem. 'Sons of' preserves the Hebrew familial-national idiom
    more transparently than the smoother but less formal 'people of.'
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard transliteration of the place/people name יהודה.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English form of the city name.
- source_word: מְכַרְתֶּם
  chosen: you sold
  alternatives:
  - you have sold
  lexicon: HALOT
  rationale: Qal perfect 2mp of מכר, 'to sell.' In prophetic accusation, simple past
    English is the most natural rendering.
- source_word: לִבְנֵי הַיְּוָנִים
  chosen: to the sons of the Greeks
  alternatives:
  - to the Greeks
  - to the sons of Javan
  - to the Ionians
  lexicon: HALOT
  rationale: יונים can denote Greeks/Ionians. Given standard English usage and likely
    historical reference, 'Greeks' is clearest. 'Sons of' is retained to mirror the
    Hebrew construction, though English could omit it.
- source_word: לְמַעַן
  chosen: in order to
  alternatives:
  - so that
  - for the purpose of
  lexicon: HALOT
  rationale: למען marks purpose. 'In order to' clearly expresses intentionality.
- source_word: הַרְחִיקָם
  chosen: remove them far
  alternatives:
  - drive them far away
  - send them far away
  lexicon: HALOT
  rationale: Hiphil of רחק means 'cause to be far, remove, put at a distance.' 'Remove
    them far' preserves the causative sense without overinterpreting the mechanism.
- source_word: מֵעַל גְּבוּלָם
  chosen: from their border
  alternatives:
  - from their territory
  - away from their boundary
  lexicon: HALOT
  rationale: גבול commonly means border, boundary, or territory. 'Border' keeps the
    concrete spatial sense and fits the exile/trafficking context.
