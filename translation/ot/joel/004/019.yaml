theological_decisions:
- issue: Referent of the pronominal suffix in בְּאַרְצָם
  chosen_reading: the land belongs to the sons of Judah ('their land')
  alternative_readings:
  - the land belongs to Egypt and Edom
  - the suffix is intentionally ambiguous
  rationale: The nearest and most coherent antecedent is 'the sons of Judah'; the
    verse condemns Egypt and Edom for shedding Judah's innocent blood in Judah's own
    land. This fits the broader context of judgment on nations for violence against
    Judah/Zion.
  doctrine_reference: Preserve theological tension rather than resolve it only where
    the source is genuinely ambiguous; here the contextual reading favors Judah as
    antecedent.
