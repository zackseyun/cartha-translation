id: JOL.4.19
reference: Joel 4:19
source:
  edition: WLC
  text: מִצְרַ֨יִם֙ לִ/שְׁמָמָ֣ה תִֽהְיֶ֔ה וֶ/אֱד֕וֹם לְ/מִדְבַּ֥ר שְׁמָמָ֖ה תִּֽהְיֶ֑ה
    מֵֽ/חֲמַס֙ בְּנֵ֣י יְהוּדָ֔ה אֲשֶׁר שָׁפְכ֥וּ דָם נָקִ֖יא בְּ/אַרְצָֽ/ם־־׃
translation:
  text: Egypt will become a desolation, and Edom a desolate wilderness, because of
    the violence done to the sons of Judah, whose innocent blood they shed in their
    land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the violence against the sons of Judah.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Judah'; this may function collectively for the people
      of Judah.
    reason: lexical_alternative
  - marker: c
    text: Or 'the blood of the innocent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard transliteration/rendering of the place name referring to the
    nation/land of Egypt.
- source_word: לִשְׁמָמָה
  chosen: will become a desolation
  alternatives:
  - will be for a desolation
  - will become desolate
  lexicon: HALOT
  rationale: The preposition ל with שְׁמָמָה plus היה expresses resulting state. 'Become
    a desolation' is natural English while preserving the noun's force better than
    the adjectival 'desolate'.
- source_word: וֶאֱדוֹם
  chosen: and Edom
  lexicon: HALOT
  rationale: Standard rendering of the place name; conjunction retained.
- source_word: לְמִדְבַּר שְׁמָמָה
  chosen: a desolate wilderness
  alternatives:
  - a wilderness of desolation
  - a desolation of wilderness
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness/desert region; שְׁמָמָה qualifies it as devastated.
    'Desolate wilderness' is idiomatic and preserves both elements.
- source_word: מֵחֲמַס
  chosen: because of the violence done to
  alternatives:
  - for the violence against
  - from the violence against
  lexicon: HALOT
  rationale: The preposition מִן here is causal ('because of/on account of'). חָמָס
    is violence, wrong, brutality. 'Done to' makes explicit the object relation in
    natural English.
- source_word: בְּנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the people of Judah
  - the children of Judah
  lexicon: HALOT
  rationale: Gender-accurate rendering of the Hebrew construct. 'Sons of Judah' preserves
    the source form; broader alternatives are possible but less formally precise.
- source_word: אֲשֶׁר שָׁפְכוּ
  chosen: whose ... they shed
  alternatives:
  - because they shed
  - for they shed
  lexicon: HALOT
  rationale: The relative clause modifies the prior offense and identifies the specific
    violence. English requires explicit subject/object arrangement; 'whose ... they
    shed' preserves the relative sense.
- source_word: דָם נָקִיא
  chosen: innocent blood
  alternatives:
  - the blood of the innocent
  lexicon: HALOT
  rationale: Established and accurate rendering of the collocation, referring to bloodshed
    of those not guilty.
- source_word: בְּאַרְצָם
  chosen: in their land
  alternatives:
  - in the land
  - in their own land
  lexicon: HALOT
  rationale: The 3mp suffix most naturally refers to the sons of Judah, i.e., their
    land. 'Their land' preserves the pronominal suffix without over-specifying.
