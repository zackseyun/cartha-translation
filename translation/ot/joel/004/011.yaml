theological_decisions:
- issue: Identity of 'your mighty ones'
  chosen_reading: your mighty ones
  alternative_readings:
  - your warriors
  - your heroes
  - angelic hosts
  rationale: The Hebrew גִּבּוֹרֶיךָ denotes powerful agents belonging to the LORD, but the text itself does not explicitly identify them as human or angelic. The translation preserves that theological openness rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering the divine name יְהוָה
  chosen_reading: O Yahweh
  alternative_readings:
  - O Yahweh
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
