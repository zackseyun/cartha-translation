id: JOL.4.11
reference: Joel 4:11
source:
  edition: WLC
  text: ע֣וּשׁוּ וָ/בֹ֧אוּ כָֽל הַ/גּוֹיִ֛ם מִ/סָּבִ֖יב וְ/נִקְבָּ֑צוּ שָׁ֕מָּ/ה הַֽנְחַ֥ת יְהוָ֖ה גִּבּוֹרֶֽי/ךָ־׃
translation:
  text: Hasten and come, all you nations from every side, and gather yourselves there. Bring down your mighty ones, O Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Make haste and come … and assemble there.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Send down, O LORD, your warriors.' The Hebrew 'your mighty ones' may refer generally to the LORD's powerful agents, without specifying whether they are human or heavenly.
    reason: alternative_reading
lexical_decisions:
- source_word: ע֣וּשׁוּ
  chosen: Hasten
  alternatives:
  - Make haste
  - Come quickly
  lexicon: HALOT
  rationale: The imperative calls for urgent movement. 'Hasten' is concise, natural English and fits the summons to the nations. The rare form is commonly understood in context as an urgency command parallel to 'come.'
- source_word: וָ/בֹ֧אוּ
  chosen: and come
  alternatives:
  - then come
  - come
  lexicon: HALOT
  rationale: 'A straightforward imperative of בוא. Rendering the conjunction preserves the sequence and rhetorical buildup: ''Hasten and come.'''
- source_word: כָֽל הַגּוֹיִם
  chosen: all you nations
  alternatives:
  - all the nations
  - all nations
  lexicon: HALOT
  rationale: The phrase addresses the nations directly in the imperative context. 'All you nations' captures the vocative force more clearly in English than a bare nominal phrase.
- source_word: מִסָּבִיב
  chosen: from every side
  alternatives:
  - from around
  - all around
  lexicon: HALOT
  rationale: This expresses surrounding origin/direction. 'From every side' is idiomatic and preserves the image of nations converging from all around.
- source_word: וְנִקְבָּצוּ
  chosen: and gather yourselves
  alternatives:
  - and assemble
  - and be gathered
  lexicon: HALOT
  rationale: Although morphologically a Niphal form, in this imperative summons context it functions as a command to assemble. 'Gather yourselves' preserves the reflexive/passive nuance better than the flatter 'assemble.'
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to that place
  lexicon: HALOT
  rationale: A simple directional adverb pointing to the divinely appointed place of judgment. 'There' is sufficient and natural.
- source_word: הַנְחַת
  chosen: Bring down
  alternatives:
  - Cause to come down
  - Send down
  lexicon: HALOT
  rationale: Hiphil imperative of נחת/נחתה in context asks YHWH to bring his warriors down to the scene. 'Bring down' is idiomatic and preserves the downward motion implied in the verb.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  - LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: גִּבּוֹרֶיךָ
  chosen: your mighty ones
  alternatives:
  - your warriors
  - your heroes
  lexicon: HALOT
  rationale: The noun can denote mighty men, warriors, or heroes. 'Your mighty ones' preserves the broader sense and leaves open whether these are angelic or heavenly forces without over-specifying.
