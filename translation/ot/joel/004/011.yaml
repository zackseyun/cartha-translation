theological_decisions:
- issue: Identity of 'your mighty ones'
  chosen_reading: your mighty ones
  alternative_readings:
  - your warriors
  - your heroes
  - angelic hosts
  rationale: The Hebrew גִּבּוֹרֶיךָ denotes powerful agents belonging to the LORD,
    but the text itself does not explicitly identify them as human or angelic. The
    translation preserves that theological openness rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - O Yahweh
  rationale: The doctrinal guidance specifies 'the LORD' as the default rendering
    of YHWH. The vocative particle 'O' is added in English because the clause is a
    direct appeal to God.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD'
