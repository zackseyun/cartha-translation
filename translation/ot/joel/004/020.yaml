id: JOL.4.20
reference: Joel 4:20
source:
  edition: WLC
  text: וִ/יהוּדָ֖ה לְ/עוֹלָ֣ם תֵּשֵׁ֑ב וִ/ירוּשָׁלִַ֖ם לְ/ד֥וֹר וָ/דֽוֹר׃
translation:
  text: But Judah will be inhabited forever, and Jerusalem from generation to generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Judah will dwell forever.' The Hebrew verb can be rendered more
      literally as 'dwell' or 'sit,' but in this land/city context it likely means
      'be inhabited' or 'remain inhabited.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִ/יהוּדָה
  chosen: But Judah
  alternatives:
  - And Judah
  - Judah
  lexicon: HALOT
  rationale: The conjunction waw here links this verse contrastively with the preceding
    judgment on hostile nations; 'But Judah' brings out the discourse contrast in
    natural English while preserving the conjunction. 'Judah' is transliterated as
    a place name.
- source_word: לְ/עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for eternity
  - perpetually
  lexicon: HALOT
  rationale: עוֹלָם here denotes enduring continuance into the indefinite future.
    'Forever' is the most natural modern English rendering and fits the prophetic
    promise context.
- source_word: תֵּשֵׁב
  chosen: will be inhabited
  alternatives:
  - will dwell
  - will sit
  - will remain
  lexicon: HALOT
  rationale: The verb ישׁב in the feminine singular agrees with Judah and in land/city
    contexts commonly means 'be inhabited' or 'be settled.' 'Will be inhabited' best
    matches the subject as a territory rather than personifying Judah as the one doing
    the dwelling.
- source_word: וִ/ירוּשָׁלִַם
  chosen: and Jerusalem
  alternatives:
  - but Jerusalem
  - Jerusalem
  lexicon: HALOT
  rationale: The waw here is straightforwardly additive after the first clause. 'Jerusalem'
    is transliterated as a place name.
- source_word: לְ/ד֥וֹר וָ/דֽוֹר
  chosen: from generation to generation
  alternatives:
  - for generation and generation
  - for all generations
  - throughout all generations
  lexicon: HALOT
  rationale: The idiom דּוֹר וָדוֹר expresses continuity across successive generations.
    'From generation to generation' is idiomatic English that preserves the repetitive
    force without sounding wooden.
