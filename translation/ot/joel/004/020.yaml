theological_decisions:
- issue: Nature of the promise regarding Judah and Jerusalem's enduring future
  chosen_reading: Render the verse as a straightforward prophetic promise of enduring
    habitation without specifying whether the fulfillment is exclusively literal,
    typological, or eschatological.
  alternative_readings:
  - A strictly literal geopolitical permanence
  - A primarily symbolic/ecclesiological fulfillment
  rationale: The Hebrew text itself states enduring habitation for Judah and Jerusalem
    but does not define the full mode or horizon of fulfillment. The translation should
    preserve that theological tension rather than importing a specific interpretive
    system.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
