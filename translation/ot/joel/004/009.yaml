theological_decisions:
- issue: Whether to preserve the cultic force of קדשׁ in the war summons
  chosen_reading: Consecrate war
  alternative_readings:
  - Prepare for war
  - Sanctify war
  rationale: The Hebrew uses קדשׁ, a term of setting apart as holy/consecrated. In
    prophetic battle language this can function idiomatically for mustering/preparing,
    but the cultic undertone is significant and should not be erased. 'Consecrate
    war' keeps that tension in the main text, while a footnote preserves the more
    idiomatic alternative.
  doctrine_reference: Translation philosophy §3, §5
