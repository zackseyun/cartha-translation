id: JOL.4.9
reference: Joel 4:9
source:
  edition: WLC
  text: קִרְאוּ זֹאת֙ בַּ/גּוֹיִ֔ם קַדְּשׁ֖וּ מִלְחָמָ֑ה הָעִ֨ירוּ֙ הַ/גִּבּוֹרִ֔ים
    יִגְּשׁ֣וּ יַֽעֲל֔וּ כֹּ֖ל אַנְשֵׁ֥י הַ/מִּלְחָמָֽה־׃
translation:
  text: 'Proclaim this among the nations: Consecrate war; stir up the warriors. Let
    all the men of war draw near; let them come up.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Prepare for war.' Hebrew 'Consecrate war' uses cultic language for setting
      battle apart.
    reason: lexical_alternative
lexical_decisions:
- source_word: קִרְאוּ
  chosen: Proclaim
  alternatives:
  - Call out
  - Announce
  lexicon: HALOT
  rationale: Imperative plural of קרא in a public-declaration context. 'Proclaim'
    best captures a formal summons issued broadly among the nations.
- source_word: זֹאת
  chosen: this
  alternatives:
  - thus
  - this message
  lexicon: HALOT
  rationale: Direct object of the proclamation; the simple deictic 'this' is most
    faithful, with the content following in direct speech.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - in the nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the foreign peoples collectively. 'Among the nations'
    is idiomatic and avoids importing NT-era Jew/Gentile terminology.
- source_word: קַדְּשׁוּ מִלְחָמָה
  chosen: Consecrate war
  alternatives:
  - Prepare for war
  - Sanctify war
  lexicon: HALOT
  rationale: The verb קדשׁ literally means 'set apart/consecrate.' In warfare contexts
    it can denote preparing or mustering for holy war, but 'consecrate war' preserves
    the cultic force better than flattening it to mere preparation. An alternative
    is worth preserving in a footnote because English readers may hear this as unusual.
- source_word: הָעִירוּ
  chosen: stir up
  alternatives:
  - Rouse
  - Awaken
  lexicon: HALOT
  rationale: 'Hiphil imperative of עור, causative: ''arouse/stir up.'' ''Stir up''
    fits the martial summons and reads naturally in modern English.'
- source_word: הַגִּבּוֹרִים
  chosen: the warriors
  alternatives:
  - the mighty men
  - the heroes
  lexicon: HALOT
  rationale: גִּבּוֹרִים in military context denotes strong fighting men. 'Warriors'
    communicates the martial sense more clearly than the traditional but potentially
    misleading 'mighty men.'
- source_word: יִגְּשׁוּ
  chosen: Let ... draw near
  alternatives:
  - Let ... approach
  lexicon: HALOT
  rationale: Jussive/imperfect in a summons sequence. 'Draw near' preserves the formal,
    battle-assembly nuance.
- source_word: יַעֲלוּ
  chosen: let them come up
  alternatives:
  - let them go up
  - let them advance
  lexicon: HALOT
  rationale: עלה literally means 'go up/come up.' In context of assembling for battle,
    'come up' is natural from the speaker's perspective and preserves the directional
    imagery without overinterpreting it as merely 'advance.'
- source_word: כֹּל אַנְשֵׁי הַמִּלְחָמָה
  chosen: all the men of war
  alternatives:
  - all the fighting men
  - all the soldiers
  lexicon: HALOT
  rationale: A standard Hebrew military expression. Per translation philosophy, the
    masculine term is retained as 'men of war' rather than neutralized, since the
    source is explicitly masculine and refers to combatants.
