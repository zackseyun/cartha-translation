id: JOL.4.1
reference: Joel 4:1
source:
  edition: WLC
  text: כִּ֗י הִנֵּ֛ה בַּ/יָּמִ֥ים הָ/הֵ֖מָּה וּ/בָ/עֵ֣ת הַ/הִ֑יא אֲשֶׁ֥ר אשוב אֶת
    שְׁב֥וּת יְהוּדָ֖ה וִ/ירוּשָׁלִָֽם־׃
translation:
  text: For behold, in those days and at that time, when I restore the fortunes of
    Judah and Jerusalem,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when I restore the captivity of Judah and Jerusalem' or 'when I bring
      back the captives of Judah and Jerusalem.' The Hebrew expression is an idiom
      for restoring a people from distress, often with exile in view.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - For
  lexicon: HALOT
  rationale: Introduces an explanation or grounding for what follows from the previous
    context. 'For' preserves the connective force better than omitting it.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: A deictic particle drawing attention to a significant future event. 'Behold'
    preserves the prophetic register and urgency without paraphrase.
- source_word: בַּיָּמִים הָהֵמָּה
  chosen: in those days
  alternatives:
  - in those days then
  lexicon: HALOT
  rationale: Standard temporal expression referring to a future period already framed
    by prophetic discourse. 'In those days' is idiomatic and sufficiently formal.
- source_word: וּבָעֵת הַהִיא
  chosen: and at that time
  alternatives:
  - even at that time
  - and in that time
  lexicon: HALOT
  rationale: Parallel temporal phrase paired with the previous clause. 'At that time'
    is the most natural English equivalent while preserving the Hebrew emphasis.
- source_word: אֲשֶׁר
  chosen: when
  alternatives:
  - that
  - in which
  lexicon: HALOT
  rationale: Here the relative particle introduces a temporal clause tied to the restoration
    event. 'When' communicates the sense more naturally than a wooden 'that'.
- source_word: אשוב
  chosen: I restore
  alternatives:
  - I bring back
  - I return
  lexicon: HALOT
  rationale: From שוב. In this construction with שְׁבוּת, the idiom commonly means
    to restore fortunes/captivity. 'I restore' captures the idiomatic sense in clear
    English.
- source_word: אֶת שְׁבוּת
  chosen: the fortunes
  alternatives:
  - the captivity
  - the exiles
  lexicon: HALOT
  rationale: The phrase שוב את־שבות is a recognized idiom. While literally related
    to 'captivity,' in many contexts it denotes reversal of plight or restoration
    of fortunes. 'Restore the fortunes' best reflects the idiom in contemporary English,
    while preserving the captivity-related alternative in a footnote.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard transliteration of the place/people name.
- source_word: וִירוּשָׁלִָם
  chosen: and Jerusalem
  lexicon: HALOT
  rationale: Standard transliteration of the city name; paired with Judah as the object
    of restoration.
