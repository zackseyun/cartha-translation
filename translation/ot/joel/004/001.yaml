theological_decisions:
- issue: Idiomatic sense of שׁוּב אֶת־שְׁבוּת
  chosen_reading: render as 'restore the fortunes' in the main text
  alternative_readings:
  - restore the captivity
  - bring back the captives
  rationale: The Hebrew idiom can denote restoration from captivity or, more broadly,
    reversal of distress and restoration of well-being. Because the phrase is idiomatic
    and the immediate object is Judah and Jerusalem corporately, 'restore the fortunes'
    best communicates the sense in natural English without denying the exile/restoration
    background. The captivity-oriented alternative is preserved in a footnote to maintain
    transparency and theological-historical resonance.
  doctrine_reference: Translation philosophy §§1, 3, 5
