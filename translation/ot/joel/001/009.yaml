id: JOL.1.9
reference: Joel 1:9
source:
  edition: WLC
  text: הָכְרַ֥ת מִנְחָ֛ה וָ/נֶ֖סֶךְ מִ/בֵּ֣ית יְהוָ֑ה אָֽבְלוּ֙ הַ/כֹּ֣הֲנִ֔ים מְשָׁרְתֵ֖י
    יְהוָֽה׃
translation:
  text: The grain offering and the drink offering are cut off from the house of the
    LORD; the priests mourn, the ministers of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The grain offering and the drink offering have been cut off from the
      house of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house of the LORD'; that is, the temple/sanctuary.
    reason: lexical_alternative
  - marker: c
    text: Or 'those who serve the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָכְרַת
  chosen: are cut off
  alternatives:
  - has been cut off
  - are removed
  lexicon: HALOT
  rationale: 'From כרת in the Hophal, expressing a passive/resultative sense: the
    offerings have been cut off or caused to cease. English present ''are cut off''
    fits the prophetic lament context and idiomatic English while preserving the force
    of cessation.'
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - tribute offering
  lexicon: HALOT
  rationale: In cultic context with נסך and 'from the house of the LORD,' this refers
    specifically to the cereal/grain offering rather than a generic gift. 'Grain offering'
    is the clearest established English equivalent.
- source_word: נֶסֶךְ
  chosen: drink offering
  alternatives:
  - libation
  lexicon: HALOT
  rationale: Standard cultic term for a poured offering. 'Drink offering' is more
    accessible than 'libation' while remaining precise.
- source_word: מִבֵּית יְהוָה
  chosen: from the house of the LORD
  alternatives:
  - from the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' Although it refers to the sanctuary/temple,
    'house of the LORD' preserves the Hebrew expression and its covenantal resonance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אָבְלוּ
  chosen: mourn
  alternatives:
  - lament
  - grieve
  lexicon: HALOT
  rationale: The verb denotes mourning, often in communal or ritual lament. 'Mourn'
    is concise and natural here.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Direct and standard rendering of the plural noun in this temple-service
    context.
- source_word: מְשָׁרְתֵי יְהוָה
  chosen: the ministers of the LORD
  alternatives:
  - those who serve the LORD
  - servants of the LORD
  lexicon: HALOT
  rationale: The participial form identifies the priests by their liturgical function.
    'Ministers' communicates official temple service more precisely than the broader
    'servants,' while retaining the parallelism with 'the priests'.
