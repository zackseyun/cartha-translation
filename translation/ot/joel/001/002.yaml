id: JOL.1.2
reference: Joel 1:2
source:
  edition: WLC
  text: שִׁמְעוּ זֹאת֙ הַ/זְּקֵנִ֔ים וְ/הַֽאֲזִ֔ינוּ כֹּ֖ל יוֹשְׁבֵ֣י הָ/אָ֑רֶץ הֶ/הָ֤יְתָה
    זֹּאת֙ בִּֽ/ימֵי/כֶ֔ם וְ/אִ֖ם בִּ/ימֵ֥י אֲבֹֽתֵי/כֶֽם־׃
translation:
  text: 'Hear this, you elders, and give ear, all inhabitants of the land: Has this
    happened in your days, or in the days of your fathers?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all inhabitants of the earth.' The Hebrew word can mean either 'land'
      or 'earth'; here 'land' best fits the immediate context.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''in the days of your ancestors.'' Hebrew: ''your fathers.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' is the natural concise English imperative
    and pairs well with the following demonstrative 'this.'
- source_word: זֹאת
  chosen: this
  lexicon: HALOT
  rationale: Direct object of the imperative; simple demonstrative retained.
- source_word: הַזְּקֵנִים
  chosen: you elders
  alternatives:
  - elders
  - old men
  lexicon: HALOT
  rationale: Vocative force in context. 'Elders' fits both age and likely community
    leadership better than the narrower 'old men.' 'You' makes the direct address
    clear in English.
- source_word: וְהַאֲזִינוּ
  chosen: and give ear
  alternatives:
  - and listen
  - and pay attention
  lexicon: HALOT
  rationale: The verb האזין is stronger and slightly more marked than שׁמע; 'give
    ear' preserves the rhetorical parallelism without flattening both imperatives
    into the same English verb.
- source_word: כֹּל יוֹשְׁבֵי הָאָרֶץ
  chosen: all inhabitants of the land
  alternatives:
  - all who dwell in the land
  - all inhabitants of the earth
  lexicon: HALOT
  rationale: יוֹשְׁבֵי הָאָרֶץ is a common expression. In Joel's immediate prophetic
    address, 'the land' best fits the likely reference to the people of the land of
    Judah rather than the whole globe. 'Inhabitants' is idiomatic and preserves the
    collective sense.
- source_word: הֶהָיְתָה זֹּאת
  chosen: Has this happened
  alternatives:
  - Has this been
  - Did this occur
  lexicon: HALOT
  rationale: The clause asks whether such an event has ever taken place. English idiom
    prefers 'happened' to a wooden 'has this been.'
- source_word: בִּימֵיכֶם
  chosen: in your days
  alternatives:
  - during your lifetime
  - in your time
  lexicon: HALOT
  rationale: Literal enough to preserve the Hebrew temporal idiom while remaining
    natural English.
- source_word: וְאִם
  chosen: or
  alternatives:
  - or if
  lexicon: HALOT
  rationale: In this interrogative comparison, וְאִם functions idiomatically as 'or'
    introducing the second alternative, not a conditional 'if' in English.
- source_word: בִּימֵי אֲבֹתֵיכֶם
  chosen: in the days of your fathers
  alternatives:
  - in your fathers' days
  - in the days of your ancestors
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the generational comparison. 'Fathers'
    matches the Hebrew and the project's gender-accurate policy; 'ancestors' is possible
    but less exact.
