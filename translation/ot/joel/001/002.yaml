theological_decisions:
- issue: Scope of הָאָרֶץ
  chosen_reading: the land
  alternative_readings:
  - the earth
  rationale: Hebrew אֶרֶץ can mean either 'land' or 'earth.' In Joel 1:2 the address
    is directed to elders and inhabitants in a covenantal-prophetic setting, which
    favors the local/national sense. The broader sense is preserved in a footnote
    because the term can carry wider resonance in prophetic literature.
  doctrine_reference: Translation philosophy §3, §5
- issue: Rendering אֲבֹתֵיכֶם
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The Hebrew is explicitly masculine plural and refers to forefathers.
    Per the gender-accurate policy, the main text keeps 'fathers' rather than neutralizing
    to 'ancestors.'
  doctrine_reference: Translation philosophy §4
