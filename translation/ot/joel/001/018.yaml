theological_decisions:
- issue: Rendering נֶאְשָׁמוּ with respect to animal suffering under divine judgment
  chosen_reading: The sheep 'suffer punishment' or bear the consequences of judgment,
    not that they are morally guilty.
  alternative_readings:
  - the flocks of sheep are made desolate
  - the flocks of sheep are held guilty
  rationale: The immediate context is ecological devastation as covenant judgment
    on the land and people. Applying moral guilt directly to animals would overstate
    the text's claim. The chosen rendering preserves the judicial resonance of אשם
    while avoiding a doctrinally misleading implication that the animals themselves
    are morally culpable.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
