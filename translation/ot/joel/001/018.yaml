id: JOL.1.18
reference: Joel 1:18
source:
  edition: WLC
  text: מַה נֶּאֶנְחָ֣ה בְהֵמָ֗ה נָבֹ֨כוּ֙ עֶדְרֵ֣י בָקָ֔ר כִּ֛י אֵ֥ין מִרְעֶ֖ה לָ/הֶ֑ם
    גַּם עֶדְרֵ֥י הַ/צֹּ֖אן נֶאְשָֽׁמוּ־־׃
translation:
  text: How the animals groan! The herds of cattle wander in confusion, because there
    is no pasture for them; even the flocks of sheep suffer punishment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are bewildered' or 'are perplexed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'bear guilt' / 'are held guilty.' The Hebrew verb can carry judicial
      overtones; here it likely means the sheep suffer the consequences of the devastation.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: How
  alternatives:
  - What
  lexicon: HALOT
  rationale: 'Used as an exclamatory particle introducing lament: ''How the animals
    groan!'' rather than a literal interrogative ''What...?''.'
- source_word: נֶּאֶנְחָה
  chosen: groan
  alternatives:
  - moan
  - sigh
  lexicon: HALOT
  rationale: The verb conveys audible distress or lament. 'Groan' fits the context
    of suffering livestock under drought/judgment.
- source_word: בְהֵמָה
  chosen: the animals
  alternatives:
  - cattle
  - beasts
  lexicon: HALOT
  rationale: A collective singular used generically for livestock/animals. 'The animals'
    communicates the collective sense broadly, while 'cattle' would be too narrow
    since cattle are specified in the next clause.
- source_word: נָבֹכוּ
  chosen: wander in confusion
  alternatives:
  - are perplexed
  - are bewildered
  - are confounded
  lexicon: HALOT
  rationale: The verb denotes being confused, perplexed, or thrown into disorder.
    In context of herds lacking pasture, 'wander in confusion' makes the image concrete
    in natural English while preserving the sense of disorientation.
- source_word: עֶדְרֵי בָקָר
  chosen: the herds of cattle
  alternatives:
  - droves of cattle
  - cattle herds
  lexicon: HALOT
  rationale: A straightforward construct chain; 'herds of cattle' is natural and precise.
- source_word: כִּי אֵין מִרְעֶה לָהֶם
  chosen: because there is no pasture for them
  alternatives:
  - for there is no grazing place for them
  - because they have no pasture
  lexicon: HALOT
  rationale: מִרְעֶה refers to pasture/grazing place. 'No pasture for them' is idiomatic
    and preserves the causal force of כִּי.
- source_word: גַּם
  chosen: even
  alternatives:
  - also
  lexicon: HALOT
  rationale: '''Even'' heightens the lament by extending it to another class of livestock.'
- source_word: עֶדְרֵי הַצֹּאן
  chosen: the flocks of sheep
  alternatives:
  - the sheep flocks
  - the flocks
  lexicon: HALOT
  rationale: Explicitly renders the construct phrase and avoids ambiguity.
- source_word: נֶאְשָׁמוּ
  chosen: suffer punishment
  alternatives:
  - are held guilty
  - are desolated
  - suffer
  - bear guilt
  lexicon: HALOT
  rationale: From אשם, whose core sense involves guilt or incurring liability. In
    this context of innocent animals under covenantal land judgment, the sense is
    not moral culpability of sheep but that they bear the consequences of the disaster.
    'Suffer punishment' preserves the severity without implying personal sin.
