id: JOL.1.19
reference: Joel 1:19
source:
  edition: WLC
  text: אֵלֶ֥י/ךָ יְהוָ֖ה אֶקְרָ֑א כִּ֣י אֵ֗שׁ אָֽכְלָה֙ נְא֣וֹת מִדְבָּ֔ר וְ/לֶ֣הָבָ֔ה לִהֲטָ֖ה כָּל עֲצֵ֥י הַ/שָּׂדֶֽה־׃
translation:
  text: To you, O Yahweh, I call, for fire has devoured the pastures of the wilderness, and flame has scorched all the trees of the field.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
  - marker: b
    text: Or 'grazing places' for 'pastures.'
    reason: lexical_alternative
  - marker: c
    text: Or 'has burned up' for 'has scorched.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶיךָ
  chosen: To you
  alternatives:
  - Unto you
  lexicon: HALOT
  rationale: Directional preposition אֶל with 2ms suffix indicates address toward YHWH; 'To you' is natural modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶקְרָא
  chosen: I call
  alternatives:
  - I cry out
  - I call out
  lexicon: HALOT
  rationale: Qal imperfect 1cs of קרא in prayer context can mean call/cry out. 'I call' preserves the lexical core while remaining idiomatic; the prayerful force is clear from the address to the LORD.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the prophet's appeal. 'For' fits the elevated but readable style of lament.
- source_word: אֵשׁ אָכְלָה
  chosen: fire has devoured
  alternatives:
  - fire has consumed
  - a fire has devoured
  lexicon: HALOT
  rationale: The verb אכל is a common metaphor for destructive consumption by fire. 'Devoured' preserves the vividness of the Hebrew better than the flatter 'consumed.' The anarthrous noun does not require the English article here.
- source_word: נְאוֹת מִדְבָּר
  chosen: the pastures of the wilderness
  alternatives:
  - the grazing places of the wilderness
  - the pastures of the pastureland
  - the meadows of the wilderness
  lexicon: HALOT
  rationale: נָאוֶה/נְאוֹת in this context refers to pasturelands or grazing places, not merely pleasant dwellings. 'Pastures' best matches the agricultural setting of Joel 1. מִדְבָּר here is 'wilderness' in the sense of open range/steppe.
- source_word: וְלֶהָבָה
  chosen: and flame
  alternatives:
  - and a flame
  lexicon: HALOT
  rationale: Coordinates with the previous clause as a parallel image of destructive fire. English can omit the article naturally in poetic style.
- source_word: לִהֲטָה
  chosen: has scorched
  alternatives:
  - has burned up
  - has set ablaze
  - has consumed
  lexicon: HALOT
  rationale: From להט, conveying blazing or scorching heat. 'Has scorched' distinguishes it from the earlier 'devoured' and preserves the poetic parallelism without needless repetition.
- source_word: כָּל עֲצֵי הַשָּׂדֶה
  chosen: all the trees of the field
  alternatives:
  - every tree of the field
  - all the trees of the countryside
  lexicon: HALOT
  rationale: כָּל with plural construct is naturally 'all the trees.' הַשָּׂדֶה is literally 'the field'; this is a standard Hebrew expression for cultivated/open land, and the literal rendering is clear in English.
