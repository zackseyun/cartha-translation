theological_decisions:
- issue: Syntactic scope of the rhetorical question over two coordinated losses
  chosen_reading: The verse asks whether both food and joy/gladness have been cut
    off, with the second phrase elliptically dependent on the same verbal idea.
  alternative_readings:
  - The verse asks about food being cut off and then appositionally names the result
    as loss of joy and gladness from God's house.
  rationale: Hebrew poetry often omits a repeated verb in the second colon. Rendering
    the whole verse as one rhetorical question preserves the parallelism and the lament
    that both daily sustenance and worship celebration have ceased.
