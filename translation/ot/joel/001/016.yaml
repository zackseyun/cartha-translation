id: JOL.1.16
reference: Joel 1:16
source:
  edition: WLC
  text: הֲ/ל֛וֹא נֶ֥גֶד עֵינֵ֖י/נוּ אֹ֣כֶל נִכְרָ֑ת מִ/בֵּ֥ית אֱלֹהֵ֖י/נוּ שִׂמְחָ֥ה
    וָ/גִֽיל׃
translation:
  text: Is not food cut off before our eyes, joy and gladness from the house of our
    God?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the temple of our God.' The Hebrew reads 'from the house of our
      God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'joy and rejoicing.' The second term can carry the sense of exultant
      rejoicing.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  chosen: Is not
  alternatives:
  - Has not
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Is not' preserves
    the interrogative force and natural English idiom.
- source_word: נֶגֶד עֵינֵינוּ
  chosen: before our eyes
  alternatives:
  - in front of our eyes
  - before us
  lexicon: HALOT
  rationale: The phrase is idiomatic for something happening openly and visibly. 'Before
    our eyes' is a standard, natural rendering that preserves the vividness.
- source_word: אֹכֶל
  chosen: food
  alternatives:
  - provision
  - bread
  lexicon: HALOT
  rationale: A general term for food, not specifically bread. 'Food' best matches
    the broad sense in context of agricultural devastation.
- source_word: נִכְרָת
  chosen: cut off
  alternatives:
  - destroyed
  - taken away
  lexicon: HALOT
  rationale: The Niphal of כרת commonly carries the sense 'be cut off.' This preserves
    the concrete verbal imagery and echoes covenantal/judgment diction without overinterpreting.
- source_word: מִבֵּית אֱלֹהֵינוּ
  chosen: from the house of our God
  alternatives:
  - from the temple of our God
  lexicon: HALOT
  rationale: Literally 'from the house of our God.' While it refers to the temple,
    'house' preserves the Hebrew expression and avoids importing a more interpretive
    gloss into the main text.
- source_word: שִׂמְחָה
  chosen: joy
  alternatives:
  - rejoicing
  - gladness
  lexicon: HALOT
  rationale: A common term for joy/rejoicing. 'Joy' is concise and pairs well with
    the following near-synonym.
- source_word: וָגִיל
  chosen: and gladness
  alternatives:
  - and rejoicing
  - and exultation
  lexicon: HALOT
  rationale: The noun denotes exultant joy. 'Gladness' gives a natural English pairing
    with 'joy' while preserving the poetic doublet; 'exultation' is possible but less
    readable.
