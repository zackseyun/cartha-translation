id: JOL.1.14
reference: Joel 1:14
source:
  edition: WLC
  text: קַדְּשׁוּ צוֹם֙ קִרְא֣וּ עֲצָרָ֔ה אִסְפ֣וּ זְקֵנִ֗ים כֹּ֚ל יֹשְׁבֵ֣י הָ/אָ֔רֶץ
    בֵּ֖ית יְהוָ֣ה אֱלֹהֵי/כֶ֑ם וְ/זַעֲק֖וּ אֶל יְהוָֽה־־׃
translation:
  text: Consecrate a fast; call a solemn assembly. Gather the elders, all the inhabitants
    of the land, to the house of the LORD your God, and cry out to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "all the inhabitants of the earth." The Hebrew word can mean either "land"
      or "earth"; here the local sense fits the temple-centered summons in context.
    reason: alternative_reading
lexical_decisions:
- source_word: קַדְּשׁוּ
  chosen: Consecrate
  alternatives:
  - Set apart
  - Sanctify
  lexicon: HALOT
  rationale: The imperative of קדשׁ here calls for formally setting apart the fast
    for sacred purpose. 'Consecrate' preserves the cultic/religious force better than
    the more generic 'set apart,' while remaining readable modern English.
- source_word: צוֹם
  chosen: a fast
  lexicon: HALOT
  rationale: Standard rendering for צום. The indefinite article is natural English
    and reflects the command to appoint an occasion of fasting.
- source_word: קִרְאוּ
  chosen: call
  alternatives:
  - Proclaim
  - Summon
  lexicon: HALOT
  rationale: The verb means to call/proclaim. 'Call' works idiomatically with 'a solemn
    assembly' in English and keeps the imperative concise. 'Proclaim' is possible,
    but the following commands emphasize summoning people together.
- source_word: עֲצָרָה
  chosen: a solemn assembly
  alternatives:
  - an assembly
  - a sacred assembly
  lexicon: HALOT
  rationale: This noun often denotes a sacred or restrained assembly in worship contexts.
    'Solemn assembly' is the established and accurate English equivalent that preserves
    the liturgical gravity without over-paraphrase.
- source_word: אִסְפוּ
  chosen: Gather
  alternatives:
  - Assemble
  - Collect
  lexicon: HALOT
  rationale: Imperative addressed to the hearers to bring people together. 'Gather'
    is natural and fits the direct object sequence that follows.
- source_word: זְקֵנִים
  chosen: the elders
  alternatives:
  - elders
  - the old men
  lexicon: HALOT
  rationale: In context this most naturally refers to community leaders rather than
    merely aged males. 'The elders' captures the likely social role and matches common
    biblical usage.
- source_word: כֹּל יֹשְׁבֵי הָאָרֶץ
  chosen: all the inhabitants of the land
  alternatives:
  - all who dwell in the land
  - all the inhabitants of the earth
  lexicon: HALOT
  rationale: יֹשְׁבֵי הָאָרֶץ can mean inhabitants of the land/earth depending on
    context. In Joel 1 the summons is directed to Judah in a covenantal-locative setting
    centered on the temple, so 'land' is preferable to the more universal 'earth.'
    'Inhabitants' is a natural rendering of the participial construction.
- source_word: בֵּית יְהוָה אֱלֹהֵיכֶם
  chosen: to the house of the LORD your God
  alternatives:
  - at the house of the LORD your God
  - into the house of the LORD your God
  lexicon: HALOT
  rationale: Although no explicit preposition appears before 'house,' English requires
    one to express the gathering's destination. 'To the house' best conveys movement
    implied by the command to gather the people at the temple. YHWH is rendered 'the
    LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English Bible convention.
- source_word: וְזַעֲקוּ
  chosen: and cry out
  alternatives:
  - and call out
  - and cry
  lexicon: HALOT
  rationale: זעק conveys a strong urgent cry, often in distress or supplication. 'Cry
    out' preserves the emotional intensity better than simply 'pray' or 'call.'
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition אֶל marks direction toward the one addressed in supplication.
    'To the LORD' is the natural English rendering and follows the prescribed treatment
    of YHWH.
