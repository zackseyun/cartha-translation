theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's doctrinal
    and stylistic policy, it is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of הָאָרֶץ
  chosen_reading: the land
  alternative_readings:
  - the earth
  rationale: The immediate context is a national call to repentance centered on the
    temple in Judah, so a local/covenantal sense is more likely than a global one.
    This preserves contextual specificity without overstating universality.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, original-language primacy
    over translation tradition
