id: JOL.1.20
reference: Joel 1:20
source:
  edition: WLC
  text: גַּם בַּהֲמ֥וֹת שָׂדֶ֖ה תַּעֲר֣וֹג אֵלֶ֑י/ךָ כִּ֤י יָֽבְשׁוּ֙ אֲפִ֣יקֵי מָ֔יִם
    וְ/אֵ֕שׁ אָכְלָ֖ה נְא֥וֹת הַ/מִּדְבָּֽר־׃פ
translation:
  text: Even the beasts of the field pant for you, because the channels of water have
    dried up, and fire has consumed the pastures of the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward you.' The Hebrew expression can be rendered more literally with
      directional force; 'for you' is chosen because it fits the English idiom 'pant
      for.'
    reason: lexical_alternative
  - marker: b
    text: Or 'watercourses' or 'streams' for 'channels of water.'
    reason: lexical_alternative
  - marker: c
    text: Or 'grazing places' for 'pastures.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: Even
  alternatives:
  - Also
  lexicon: HALOT
  rationale: 'Fronted particle adds emphasis: not only humans, but even the animals
    are affected and turn toward God.'
- source_word: בַּהֲמוֹת שָׂדֶה
  chosen: the beasts of the field
  alternatives:
  - the animals of the field
  - the cattle of the open country
  lexicon: HALOT
  rationale: בהמות is a broad term for beasts/animals; with שדה it denotes wild or
    field animals generally, not merely domesticated livestock. 'Beasts of the field'
    is natural and preserves the biblical imagery.
- source_word: תַּעֲר֣וֹג
  chosen: pant
  alternatives:
  - long
  - cry out
  lexicon: HALOT
  rationale: The verb ערג conveys panting or longing, especially as from thirst (cf.
    Ps 42:1). In this drought context, 'pant' best captures the physical desperation
    while still implying yearning toward God.
- source_word: אֵלֶיךָ
  chosen: for you
  alternatives:
  - to you
  - toward you
  lexicon: HALOT
  rationale: The preposition marks direction toward God. 'For you' idiomatically fits
    English with 'pant,' while preserving the sense of dependence directed to him.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: 'Introduces the reason for the animals'' panting: the drought and fire
    devastation.'
- source_word: יָבְשׁוּ אֲפִיקֵי מָיִם
  chosen: the channels of water have dried up
  alternatives:
  - the streams have dried up
  - the watercourses are dried up
  lexicon: HALOT
  rationale: אפיקים are channels, streambeds, or watercourses. 'Channels of water'
    stays close to the Hebrew while remaining readable; the perfect verb is rendered
    with present-result force in English.
- source_word: וְאֵשׁ אָכְלָה
  chosen: and fire has consumed
  alternatives:
  - and fire has devoured
  lexicon: HALOT
  rationale: אכל with fire is a common idiom for destructive burning. 'Consumed' is
    idiomatic modern English and preserves the totality of the destruction.
- source_word: נְאוֹת
  chosen: the pastures
  alternatives:
  - the grazing places
  - the meadows
  - the habitations
  lexicon: HALOT
  rationale: In this agricultural and drought context, נאות refers to pasturelands
    or grazing places rather than generic dwellings. 'Pastures' best fits the imagery
    of land ruined by drought and fire.
- source_word: הַמִּדְבָּר
  chosen: of the wilderness
  alternatives:
  - of the desert
  - of the pastureland
  lexicon: HALOT
  rationale: מדבר can denote wilderness, steppe, or grazing land. Here it is the uncultivated
    open country affected by drought; 'wilderness' is the most standard and sufficiently
    broad rendering.
