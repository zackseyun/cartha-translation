theological_decisions:
- issue: Referent of the second person suffix in אֵלֶיךָ
  chosen_reading: Addressed to God ('for you')
  alternative_readings:
  - impersonal longing without explicit theological force
  rationale: The verse continues the prayer context of the preceding verse and depicts
    even animals turning toward God in distress. The Hebrew directly addresses a second
    person masculine singular, best understood as God.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    immediate context makes the referent sufficiently clear.
