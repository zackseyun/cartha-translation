id: JOL.1.6
reference: Joel 1:6
source:
  edition: WLC
  text: כִּֽי גוֹי֙ עָלָ֣ה עַל אַרְצִ֔/י עָצ֖וּם וְ/אֵ֣ין מִסְפָּ֑ר שִׁנָּי/ו֙ שִׁנֵּ֣י
    אַרְיֵ֔ה וּֽ/מְתַלְּע֥וֹת לָבִ֖יא לֽ/וֹ־־׃
translation:
  text: For a nation has come up against my land, mighty and without number; its teeth
    are the teeth of a lion, and it has the fangs of a lioness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a people.' The Hebrew גוי is literally 'nation/people' and is used here
      metaphorically for the invading plague.
    reason: lexical_alternative
  - marker: b
    text: Or 'a great lion' or simply 'a lion.' The Hebrew לָבִיא can denote a powerful
      mature lion; many translations render it 'lioness' in this verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the lament/alert in the surrounding context.
    'For' preserves the causal/explanatory force without overinterpreting.
- source_word: גוֹי
  chosen: nation
  alternatives:
  - people
  lexicon: HALOT
  rationale: The noun normally means 'nation/people-group.' In context it metaphorically
    describes the locust swarm as an invading army. 'Nation' preserves the metaphorical
    military-political force better than the more generic 'people.'
- source_word: עָלָה עַל
  chosen: has come up against
  alternatives:
  - has invaded
  - has come up upon
  lexicon: HALOT
  rationale: The idiom literally means 'has gone up against/upon.' 'Has come up against'
    keeps the Hebrew imagery while clearly conveying hostile advance. 'Has invaded'
    is possible but slightly more interpretive.
- source_word: אַרְצִי
  chosen: my land
  alternatives:
  - my הארץ
  - my country
  lexicon: HALOT
  rationale: The 1cs suffix is explicit. 'Land' is the standard rendering and fits
    covenantal/territorial language better than 'country.'
- source_word: עָצוּם
  chosen: mighty
  alternatives:
  - strong
  - powerful
  lexicon: HALOT
  rationale: Describes the invader's formidable strength. 'Mighty' is idiomatic and
    suitably weighty in prophetic diction.
- source_word: וְאֵין מִסְפָּר
  chosen: and without number
  alternatives:
  - and innumerable
  - and there is no number
  lexicon: HALOT
  rationale: This phrase emphasizes countless multitude. 'Without number' is a natural
    English equivalent that remains close to the Hebrew wording.
- source_word: שִׁנָּיו
  chosen: its teeth
  alternatives:
  - his teeth
  lexicon: HALOT
  rationale: The suffix is masculine singular, referring back to the grammatically
    singular גוי used collectively/metaphorically. English idiom prefers 'its' for
    a collective nonhuman/metaphorical invader here.
- source_word: שִׁנֵּי אַרְיֵה
  chosen: the teeth of a lion
  alternatives:
  - lion's teeth
  lexicon: HALOT
  rationale: A genitival comparison. 'The teeth of a lion' preserves the emphatic
    comparison and poetic cadence.
- source_word: מְתַלְּעוֹת
  chosen: fangs
  alternatives:
  - jaw-teeth
  - molars
  lexicon: HALOT
  rationale: Refers to the tearing teeth/jaws used for devouring. 'Fangs' best conveys
    the predatory image in clear modern English, though more literally it denotes
    jaw-teeth.
- source_word: לָבִיא
  chosen: lioness
  alternatives:
  - great lion
  - young lion
  lexicon: HALOT
  rationale: In many contexts לָבִיא denotes a lion/lioness, often with emphasis on
    a strong mature beast. Here 'lioness' is a well-attested and common rendering,
    matching the vivid predatory parallelism. Because the exact zoological nuance
    can be debated, the alternative is preserved in a footnote.
- source_word: לוֹ
  chosen: it has
  alternatives:
  - to it belong
  lexicon: HALOT
  rationale: 'The preposition with pronominal suffix expresses possession: ''it has.''
    This is the most natural English rendering in context.'
