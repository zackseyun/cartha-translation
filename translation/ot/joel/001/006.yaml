theological_decisions:
- issue: Metaphorical identification of the invading 'nation'
  chosen_reading: Retain 'nation' in the main text, allowing the prophetic metaphor
    of locusts as an invading army to stand without flattening it to 'locust swarm.'
  alternative_readings:
  - Translate more explicitly as 'swarm' or 'locust nation'
  rationale: The Hebrew says גוי ('nation'), and the surrounding chapter makes clear
    that Joel depicts the plague in militarized terms. Preserving the metaphor respects
    original-language primacy and avoids importing an interpretive gloss into the
    main text.
  doctrine_reference: Translation philosophy 1, 3, 5
