id: JOL.1.8
reference: Joel 1:8
source:
  edition: WLC
  text: אֱלִ֕י כִּ/בְתוּלָ֥ה חֲגֻֽרַת שַׂ֖ק עַל בַּ֥עַל נְעוּרֶֽי/הָ־־׃
translation:
  text: Wail like a virgin clothed in sackcloth for the husband of her youth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'girded with sackcloth.'
    reason: lexical_alternative
  - marker: b
    text: '''Husband'' may also be understood as ''betrothed,'' since the image is
      poetic and culturally compressed.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלִי
  chosen: Wail
  alternatives:
  - Lament
  - Cry out
  lexicon: HALOT
  rationale: Imperative feminine singular calling for audible mourning. 'Wail' best
    captures the sharp lament force in prophetic diction.
- source_word: כִּבְתוּלָה
  chosen: like a virgin
  alternatives:
  - as a maiden
  - like a young woman
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('like/as'). 'Virgin' is the standard
    sense of בְּתוּלָה and should be preserved rather than softened, since the image
    depends on her unmarried/youthful status.
- source_word: חֲגֻרַת שַׂק
  chosen: clothed in sackcloth
  alternatives:
  - girded with sackcloth
  - wearing sackcloth
  lexicon: HALOT
  rationale: Literally 'girded with sackcloth.' 'Clothed in sackcloth' is natural
    English while retaining the mourning image. The participial/adjectival form describes
    her state.
- source_word: שַׂק
  chosen: sackcloth
  alternatives:
  - coarse mourning cloth
  lexicon: HALOT
  rationale: Established English equivalent for the rough garment associated with
    grief and lament.
- source_word: עַל
  chosen: for
  alternatives:
  - because of
  - over
  lexicon: HALOT
  rationale: In mourning contexts עַל commonly introduces the object/cause of lament.
    'For' is idiomatic in English ('mourn for').
- source_word: בַּעַל
  chosen: husband
  alternatives:
  - master
  - lord
  - betrothed
  lexicon: HALOT
  rationale: Though בַּעַל can mean 'owner/master/lord,' in this relational context
    with 'her youth' it refers to a marital partner. 'Husband' is the clearest English
    rendering. Some understand it as a betrothed husband because of 'virgin,' but
    the Hebrew term itself here is best rendered 'husband,' with the cultural tension
    preserved rather than resolved in the main text.
- source_word: נְעוּרֶיהָ
  chosen: of her youth
  alternatives:
  - from her youth
  - in her youth
  lexicon: HALOT
  rationale: 'Genitival construction modifying ''husband'': ''the husband of her youth,''
    an idiom for the partner bound to her in early life.'
