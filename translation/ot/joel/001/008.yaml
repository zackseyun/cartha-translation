theological_decisions:
- issue: Interpretation of the mourning image involving 'virgin' and 'husband of her
    youth'
  chosen_reading: Retain the Hebrew imagery without harmonizing it to a fully explicit
    modern category.
  alternative_readings:
  - Render בַּעַל as 'betrothed' to avoid apparent tension with 'virgin'
  - Paraphrase the line as a young bride mourning her bridegroom
  rationale: The verse uses compressed poetic imagery. A 'virgin' may refer to a young
    woman, possibly betrothed, and 'husband of her youth' may reflect covenantal/marital
    language without requiring the translator to smooth every cultural nuance. Optimal
    equivalence preserves the tension rather than importing an interpretive resolution
    not explicit in the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
