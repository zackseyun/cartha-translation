id: JOL.1.13
reference: Joel 1:13
source:
  edition: WLC
  text: חִגְר֨וּ וְ/סִפְד֜וּ הַ/כֹּהֲנִ֗ים הֵילִ֨ילוּ֙ מְשָׁרְתֵ֣י מִזְבֵּ֔חַ בֹּ֚אוּ
    לִ֣ינוּ בַ/שַּׂקִּ֔ים מְשָׁרְתֵ֖י אֱלֹהָ֑/י כִּ֥י נִמְנַ֛ע מִ/בֵּ֥ית אֱלֹהֵי/כֶ֖ם
    מִנְחָ֥ה וָ/נָֽסֶךְ׃
translation:
  text: Put on sackcloth and mourn, O priests; wail, you ministers of the altar. Come,
    spend the night in sackcloth, you ministers of my God, because grain offering
    and drink offering are withheld from the house of your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally 'Gird yourselves'; the sense here is to put on sackcloth
      for mourning.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''from the temple of your God.'' Hebrew: ''from the house of your God.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: חִגְרוּ
  chosen: Put on sackcloth
  alternatives:
  - Gird yourselves
  - Dress yourselves
  lexicon: HALOT
  rationale: Literally 'gird yourselves,' but in mourning contexts with the following
    reference to sackcloth, the idiom means to put on mourning garb. Supplying 'sackcloth'
    in English makes the sense clear and is confirmed by the later explicit בַשַּׂקִּים
    in the verse.
- source_word: וְסִפְדוּ
  chosen: and mourn
  alternatives:
  - and lament
  - and wail
  lexicon: HALOT
  rationale: The verb denotes lamentation, often in mourning rites. 'Mourn' fits the
    ritual and emotional sense and pairs naturally with the imperative sequence.
- source_word: הַכֹּהֲנִים
  chosen: O priests
  alternatives:
  - you priests
  lexicon: HALOT
  rationale: Direct address is explicit from the imperative context; 'O priests' preserves
    the vocative force in natural English.
- source_word: הֵילִילוּ
  chosen: wail
  alternatives:
  - howl
  - lament
  lexicon: HALOT
  rationale: The verb is a stronger cry of grief than the previous ספד. 'Wail' preserves
    the heightened intensity without sounding overly archaic.
- source_word: מְשָׁרְתֵי מִזְבֵּחַ
  chosen: you ministers of the altar
  alternatives:
  - servants of the altar
  - those who serve the altar
  lexicon: HALOT
  rationale: A construct phrase identifying priestly function. 'Ministers' is idiomatic
    for cultic service and avoids flattening the formal role.
- source_word: בֹּאוּ
  chosen: Come
  alternatives:
  - Enter
  - Go
  lexicon: HALOT
  rationale: As an imperative introducing the next action, 'Come' is the most natural
    discourse marker in English.
- source_word: לִינוּ
  chosen: spend the night
  alternatives:
  - lodge
  - stay overnight
  lexicon: HALOT
  rationale: The verb means to remain overnight. 'Spend the night' is clear modern
    English and suits the call to prolonged mourning.
- source_word: בַשַּׂקִּים
  chosen: in sackcloth
  alternatives:
  - wearing sackcloth
  lexicon: HALOT
  rationale: The plural noun refers to garments of mourning. English idiom normally
    uses the singular mass noun 'sackcloth.'
- source_word: מְשָׁרְתֵי אֱלֹהָי
  chosen: you ministers of my God
  alternatives:
  - you servants of my God
  - those who minister to my God
  lexicon: HALOT
  rationale: The prophet speaks in the first person singular suffix 'my God.' This
    should be preserved rather than harmonized to the later 'your God.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the mourning commands. 'Because' is clearer
    in contemporary English.
- source_word: נִמְנַע
  chosen: are withheld
  alternatives:
  - has been withheld
  - is prevented
  - is cut off
  lexicon: HALOT
  rationale: The Niphal conveys being restrained or withheld. With the compound subject
    that follows in English, 'are withheld' reads naturally and captures the passive
    sense. 'Cut off' is possible but can suggest destruction rather than cessation
    of supply.
- source_word: מִבֵּית אֱלֹהֵיכֶם
  chosen: from the house of your God
  alternatives:
  - from the temple of your God
  lexicon: HALOT
  rationale: Literally 'from the house of your God.' 'House' preserves the Hebrew
    expression while remaining understandable; 'temple' is interpretive and therefore
    left as an alternative.
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - tribute offering
  lexicon: HALOT
  rationale: In cultic context alongside drink offering, this refers specifically
    to the cereal/grain offering rather than a generic gift. 'Grain offering' is the
    standard precise rendering.
- source_word: וָנָסֶךְ
  chosen: and drink offering
  alternatives:
  - and libation
  lexicon: HALOT
  rationale: The noun denotes a poured offering. 'Drink offering' is clear and standard;
    'libation' is accurate but less accessible for the target audience.
