theological_decisions:
- issue: Rendering of אֱלֹהָי / אֱלֹהֵיכֶם distinction
  chosen_reading: Preserve both 'my God' and 'your God' in the same verse
  alternative_readings:
  - Normalize both to 'our God' for smoother English
  - Repeat 'God' without pronoun distinction
  rationale: The Hebrew intentionally shifts from the prophet's first-person reference
    to the priests' second-person reference. Preserving the distinction maintains
    the rhetoric and avoids interpretive smoothing.
  doctrine_reference: Translation philosophy §1, §3, §5
