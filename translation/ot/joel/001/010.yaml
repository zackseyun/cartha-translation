id: JOL.1.10
reference: Joel 1:10
source:
  edition: WLC
  text: שֻׁדַּ֣ד שָׂדֶ֔ה אָבְלָ֖ה אֲדָמָ֑ה כִּ֚י שֻׁדַּ֣ד דָּגָ֔ן הוֹבִ֥ישׁ תִּיר֖וֹשׁ
    אֻמְלַ֥ל יִצְהָֽר׃
translation:
  text: The field is devastated; the ground mourns, for the grain is devastated, the
    new wine has dried up, the fresh oil has failed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fresh oil has withered' / 'the olive oil has failed.' The Hebrew
      term refers to fresh oil, usually olive oil, as part of the staple produce triad
      'grain, new wine, and oil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֻׁדַּד
  chosen: is devastated
  alternatives:
  - is ruined
  - is laid waste
  - is plundered
  lexicon: HALOT
  rationale: Passive form from שׁדד conveys being violently ruined or laid waste.
    'Is devastated' is natural English and preserves the severity without implying
    only military plunder.
- source_word: שָׂדֶה
  chosen: field
  alternatives:
  - open country
  - farmland
  lexicon: HALOT
  rationale: Standard sense is 'field.' Singular is retained to match the Hebrew and
    likely functions collectively/representatively.
- source_word: אָבְלָה
  chosen: mourns
  alternatives:
  - laments
  - dries up
  lexicon: HALOT
  rationale: From אבל, commonly 'mourn' or 'lament.' Here the land is personified,
    so 'mourns' preserves the poetic image better than a purely agricultural gloss.
- source_word: אֲדָמָה
  chosen: ground
  alternatives:
  - land
  - soil
  lexicon: HALOT
  rationale: '''Ground'' distinguishes אֲדָמָה from שָׂדֶה and fits the personified
    parallelism: field / ground.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the mourning; 'for' is concise and fits the
    poetic register.
- source_word: דָּגָן
  chosen: grain
  alternatives:
  - corn
  - grain crop
  lexicon: HALOT
  rationale: Generic cereal produce is intended. 'Grain' is standard modern English;
    'corn' would be misleading for many readers.
- source_word: הוֹבִישׁ
  chosen: has dried up
  alternatives:
  - is put to shame
  - has withered
  lexicon: HALOT
  rationale: In agricultural context from יבש, the causative/passive-result sense
    points to drying up rather than shame. Present perfect English captures the resulting
    condition.
- source_word: תִּירוֹשׁ
  chosen: new wine
  alternatives:
  - fresh wine
  - wine
  lexicon: HALOT
  rationale: Refers to freshly produced wine/must rather than wine in general. 'New
    wine' is the conventional and accurate rendering.
- source_word: אֻמְלַל
  chosen: has failed
  alternatives:
  - has withered
  - languishes
  - is dried up
  lexicon: HALOT
  rationale: The verb denotes withering or wasting away. For olive oil, 'has failed'
    idiomatically conveys crop failure in English while preserving the sense of depletion.
- source_word: יִצְהָר
  chosen: fresh oil
  alternatives:
  - olive oil
  - new oil
  lexicon: HALOT
  rationale: Refers to fresh oil, typically olive oil, as agricultural produce. 'Fresh
    oil' preserves the triad grain/new wine/fresh oil and avoids over-specifying beyond
    the lexical sense.
