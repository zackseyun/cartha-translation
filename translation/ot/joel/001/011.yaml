id: JOL.1.11
reference: Joel 1:11
source:
  edition: WLC
  text: הֹבִ֣ישׁוּ אִכָּרִ֗ים הֵילִ֨ילוּ֙ כֹּֽרְמִ֔ים עַל חִטָּ֖ה וְ/עַל שְׂעֹרָ֑ה
    כִּ֥י אָבַ֖ד קְצִ֥יר שָׂדֶֽה־־׃
translation:
  text: Be ashamed, farmers; wail, vinedressers, over the wheat and over the barley,
    because the harvest of the field has perished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Be dismayed' or 'Be put to shame.' The Hebrew verb can carry either
      emotional distress or public shame; the main text keeps the direct imperative
      force.
    reason: lexical_alternative
  - marker: b
    text: Or 'howl' for 'wail.' The Hebrew verb denotes a loud cry of grief.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹבִישׁוּ
  chosen: Be ashamed
  alternatives:
  - Be dismayed
  - Be put to shame
  lexicon: HALOT
  rationale: Hiphil imperative plural of בוש can mean to be ashamed or be put to shame.
    Here it functions as a prophetic summons parallel to 'wail,' so 'Be ashamed' preserves
    the imperative force and emotional register without overinterpreting it as merely
    psychological dismay.
- source_word: אִכָּרִים
  chosen: farmers
  alternatives:
  - plowmen
  - husbandmen
  lexicon: HALOT
  rationale: Refers to agricultural workers generally, especially tillers of the soil.
    'Farmers' is clear modern English and fits the grain context better than archaic
    'husbandmen.'
- source_word: הֵילִילוּ
  chosen: wail
  alternatives:
  - howl
  - lament
  lexicon: HALOT
  rationale: Imperative plural of ילל, a strong cry of grief. 'Wail' is natural modern
    English and retains the intensity; 'howl' is possible but can sound less idiomatic
    in contemporary Bible translation.
- source_word: כֹּרְמִים
  chosen: vinedressers
  alternatives:
  - vine-growers
  - vinekeepers
  lexicon: HALOT
  rationale: Literally those who tend vineyards. 'Vinedressers' is a standard, precise
    English rendering and suits the agricultural address in Joel.
- source_word: עַל
  chosen: over
  alternatives:
  - because of
  - for
  lexicon: HALOT
  rationale: In this lament context, עַל introduces the cause or object of grief.
    'Over' idiomatically conveys mourning concerning the wheat and barley.
- source_word: חִטָּה
  chosen: wheat
  lexicon: HALOT
  rationale: Standard rendering of the grain term.
- source_word: שְׂעֹרָה
  chosen: barley
  lexicon: HALOT
  rationale: Standard rendering of the grain term.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the imperatives. 'Because' is slightly clearer
    in modern English than 'for' while preserving the causal sense.
- source_word: אָבַד
  chosen: has perished
  alternatives:
  - is ruined
  - has been destroyed
  lexicon: HALOT
  rationale: Qal perfect of אבד denotes being lost, perishing, or being ruined. 'Has
    perished' preserves the stative/resultative sense and the gravity of total loss.
- source_word: קְצִיר שָׂדֶה
  chosen: the harvest of the field
  alternatives:
  - the field's harvest
  - the harvest of the land
  lexicon: HALOT
  rationale: Construct phrase meaning the harvest belonging to the field. 'The harvest
    of the field' is transparent and formal enough, while 'land' would broaden the
    image beyond the immediate agricultural sense.
