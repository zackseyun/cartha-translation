id: JOL.1.1
reference: Joel 1:1
source:
  edition: WLC
  text: דְּבַר יְהוָה֙ אֲשֶׁ֣ר הָיָ֔ה אֶל יוֹאֵ֖ל בֶּן פְּתוּאֵֽל־־־׃
translation:
  text: The word of the LORD that came to Joel son of Pethuel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The message of the LORD that came to Joel son of Pethuel.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: YHWH; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: דְּבַר
  chosen: word
  alternatives:
  - message
  lexicon: HALOT
  rationale: Construct form with יְהוָה, yielding the standard prophetic formula 'word
    of the LORD.' 'Word' preserves the formal linkage and canonical idiom better than
    the slightly more interpretive 'message.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render YHWH as 'the LORD' in
    small-caps style, following Jewish reverence tradition and common English Bible
    practice rooted in the LXX/NT pattern.
- source_word: אֲשֶׁר הָיָה אֶל
  chosen: that came to
  alternatives:
  - which was to
  - that was to
  - that happened to
  lexicon: HALOT
  rationale: This relative clause plus היה + אל is a standard idiom introducing prophetic
    revelation. 'That came to' is idiomatic English and accurately conveys reception
    of divine revelation without woodenly reproducing 'was to.'
- source_word: יוֹאֵל
  chosen: Joel
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names rather than translate them.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Genealogical marker naturally rendered 'son of.' The article is not present
    in Hebrew, so the simpler English form is preferred.
- source_word: פְּתוּאֵל
  chosen: Pethuel
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
