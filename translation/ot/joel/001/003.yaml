id: JOL.1.3
reference: Joel 1:3
source:
  edition: WLC
  text: עָלֶ֖/יהָ לִ/בְנֵי/כֶ֣ם סַפֵּ֑רוּ וּ/בְנֵי/כֶם֙ לִ/בְנֵי/הֶ֔ם וּ/בְנֵי/הֶ֖ם
    לְ/ד֥וֹר אַחֵֽר׃
translation:
  text: Tell your children about it, and let your children tell their children, and
    their children another generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'your sons ... their sons ... their sons'; here 'children' is used
      because the context is the transmission of memory through successive generations
      generally, not male offspring only.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלֶיהָ
  chosen: about it
  alternatives:
  - of it
  - concerning it
  - about her
  lexicon: HALOT
  rationale: The preposition עַל with 3fs suffix here refers back to the preceding
    calamity/plague described in context. English idiom favors 'tell ... about it'
    rather than the more wooden 'tell of it.' Although the suffix is grammatically
    feminine, the referent is an event, so 'it' is the natural English rendering rather
    than 'her'.
- source_word: לִבְנֵיכֶם
  chosen: your children
  alternatives:
  - your sons
  lexicon: HALOT
  rationale: בנים can denote sons specifically or children more broadly. In this intergenerational
    instruction, the representative sense is primary, so 'your children' best conveys
    the intent in natural English while remaining faithful to the familial language.
- source_word: סַפֵּרוּ
  chosen: Tell
  alternatives:
  - recount
  - declare
  - narrate
  lexicon: HALOT
  rationale: The piel imperative plural calls for deliberate recounting. 'Tell' is
    clear, natural, and fits the instructional chain of transmission in the verse.
- source_word: וּבְנֵיכֶם
  chosen: and let your children tell
  alternatives:
  - and your children
  - and your children shall tell
  lexicon: HALOT
  rationale: Hebrew omits the repeated verb in the subsequent clauses, but English
    normally supplies it for clarity. 'Let your children tell' appropriately carries
    forward the imperative force from סַפֵּרוּ.
- source_word: לִבְנֵיהֶם
  chosen: their children
  alternatives:
  - their sons
  lexicon: HALOT
  rationale: As with בנים earlier in the verse, the sense is generational descendants
    generally, not only male offspring.
- source_word: וּבְנֵיהֶם
  chosen: and their children
  alternatives:
  - and their sons
  lexicon: HALOT
  rationale: Maintains the repeated generational pattern and the broad descendant
    sense of בנים in context.
- source_word: לְדוֹר אַחֵר
  chosen: another generation
  alternatives:
  - a later generation
  - the next generation
  lexicon: HALOT
  rationale: The phrase denotes a subsequent generation beyond the immediately named
    descendants. 'Another generation' is a close and natural rendering; 'next generation'
    could imply only one step ahead, whereas the Hebrew is broader.
