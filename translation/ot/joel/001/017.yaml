id: JOL.1.17
reference: Joel 1:17
source:
  edition: WLC
  text: עָבְשׁ֣וּ פְרֻד֗וֹת תַּ֚חַת מֶגְרְפֹ֣תֵי/הֶ֔ם נָשַׁ֨מּוּ֙ אֹֽצָר֔וֹת נֶהֶרְס֖וּ
    מַמְּגֻר֑וֹת כִּ֥י הֹבִ֖ישׁ דָּגָֽן׃
translation:
  text: The seeds have shriveled beneath their clods; the storehouses are desolate,
    the granaries are torn down, because the grain has dried up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew פְרֻדוֹת is rare and uncertain; it likely refers to seeds or grain
      kernels. Some render it more specifically as 'seed-corns' or 'grains.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew מֶגְרְפֹתֵיהֶם is also uncertain. The translation 'their clods' follows
      the agricultural context ('beneath their clods'), but others render it 'their
      furrows' or even 'their hoes/shovels.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָבְשׁוּ
  chosen: have shriveled
  alternatives:
  - are dried up
  - have withered
  lexicon: HALOT
  rationale: The verb denotes drying up/shriveling. 'Have shriveled' fits the agricultural
    image and pairs naturally with seeds beneath the soil.
- source_word: פְרֻדוֹת
  chosen: seeds
  alternatives:
  - grains
  - seed-corns
  lexicon: HALOT
  rationale: The noun is rare and difficult, but in context it most plausibly refers
    to seed kernels/grains in the ground. 'Seeds' is clear modern English without
    over-specifying.
- source_word: תַּחַת
  chosen: beneath
  alternatives:
  - under
  lexicon: HALOT
  rationale: Standard spatial preposition; 'beneath' reads slightly more naturally
    in this agricultural description.
- source_word: מֶגְרְפֹתֵיהֶם
  chosen: their clods
  alternatives:
  - their furrows
  - their hoes
  - their shovels
  lexicon: HALOT
  rationale: 'This rare form is debated. In context, an agricultural sense referring
    to earth clods covering seed best explains the line: the seeds have shriveled
    beneath them. Instrumental renderings like ''hoes/shovels'' are less coherent
    with ''beneath.'''
- source_word: נָשַׁמּוּ
  chosen: are desolate
  alternatives:
  - are laid waste
  - are appalled
  lexicon: HALOT
  rationale: For buildings/storehouses, 'are desolate' conveys devastation appropriately.
    The passive/resultative sense suits the ruined agricultural infrastructure.
- source_word: אֹצָרוֹת
  chosen: storehouses
  alternatives:
  - treasuries
  - stores
  lexicon: HALOT
  rationale: In this agrarian context the word refers to storage places for produce,
    not monetary treasuries.
- source_word: נֶהֶרְסוּ
  chosen: are torn down
  alternatives:
  - are broken down
  - are destroyed
  lexicon: HALOT
  rationale: The verb commonly means to be pulled down or demolished. 'Are torn down'
    gives a vivid but natural English equivalent.
- source_word: מַמְּגֻרוֹת
  chosen: granaries
  alternatives:
  - barns
  - store-rooms
  lexicon: HALOT
  rationale: This term denotes storage structures for grain. 'Granaries' is more precise
    than 'barns' in this context.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Causal sense is straightforward here, explaining why the storage buildings
    are desolate.
- source_word: הֹבִישׁ
  chosen: has dried up
  alternatives:
  - has failed
  - has withered
  lexicon: HALOT
  rationale: The hiphil here expresses the crop's coming to shame/failure through
    drying up. 'Has dried up' makes the agricultural disaster explicit in idiomatic
    English.
- source_word: דָּגָן
  chosen: grain
  alternatives:
  - corn
  - cereal
  lexicon: HALOT
  rationale: Generic term for grain produce. 'Grain' is standard modern English and
    avoids region-specific 'corn'.
