id: JOL.1.4
reference: Joel 1:4
source:
  edition: WLC
  text: יֶ֤תֶר הַ/גָּזָם֙ אָכַ֣ל הָֽ/אַרְבֶּ֔ה וְ/יֶ֥תֶר הָ/אַרְבֶּ֖ה אָכַ֣ל הַ/יָּ֑לֶק
    וְ/יֶ֣תֶר הַ/יֶּ֔לֶק אָכַ֖ל הֶ/חָסִֽיל׃
translation:
  text: What the cutting locust left, the swarming locust ate; and what the swarming
    locust left, the hopping locust ate; and what the hopping locust left, the devouring
    locust ate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The four Hebrew terms likely refer to kinds or stages of locusts, but their
      exact zoological distinctions are uncertain; possible renderings include 'gnawing,'
      'swarming,' 'hopping,' and 'devouring' locust.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶתֶר
  chosen: what ... left
  alternatives:
  - the remainder of
  - what was left of
  lexicon: HALOT
  rationale: The noun means 'remainder, what is left over.' In this repeated construction,
    idiomatic English is best achieved by rendering it as 'what ... left,' which preserves
    the sense of successive remnants being consumed.
- source_word: גָּזָם
  chosen: cutting locust
  alternatives:
  - gnawing locust
  - shearing locust
  lexicon: HALOT
  rationale: This term denotes a kind of locust or devouring insect, likely characterized
    by cutting off vegetation. 'Cutting locust' preserves the imagery and avoids overclaiming
    a precise zoological identification.
- source_word: אָכַל
  chosen: ate
  alternatives:
  - has eaten
  - consumed
  lexicon: HALOT
  rationale: The qatal form here narrates completed action in a vivid sequence. 'Ate'
    is the most natural English rendering and keeps the repetitive cadence of the
    Hebrew.
- source_word: אַרְבֶּה
  chosen: swarming locust
  alternatives:
  - locust
  - migrating locust
  lexicon: HALOT
  rationale: This is the common term for locust, often associated with swarming behavior.
    'Swarming locust' distinguishes it from the other terms in the verse while remaining
    understandable.
- source_word: יָּלֶק / יֶּלֶק
  chosen: hopping locust
  alternatives:
  - licking locust
  - young locust
  - crawler
  lexicon: HALOT
  rationale: The term refers to another stage or type of locust. Because the exact
    biological distinction is uncertain, 'hopping locust' gives a concrete, readable
    distinction without pretending precision. The spelling variation in the verse
    does not change the sense.
- source_word: חָסִיל
  chosen: devouring locust
  alternatives:
  - destroying locust
  - consuming locust
  lexicon: HALOT
  rationale: This term denotes a consuming or ravaging insect in the locust sequence.
    'Devouring locust' preserves the destructive force and the progression of devastation.
- source_word: וְ
  chosen: and
  alternatives:
  - then
  lexicon: HALOT
  rationale: The repeated conjunction links the clauses in a cumulative sequence.
    'And' best preserves the Hebrew rhythm and piling effect.
