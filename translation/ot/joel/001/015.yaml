id: JOL.1.15
reference: Joel 1:15
source:
  edition: WLC
  text: אֲהָ֖הּ לַ/יּ֑וֹם כִּ֤י קָרוֹב֙ י֣וֹם יְהוָ֔ה וּ/כְ/שֹׁ֖ד מִ/שַׁדַּ֥י יָבֽוֹא׃
translation:
  text: Alas for the day! For the day of the LORD is near, and it comes like destruction
    from the Almighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew has a wordplay: ''like destruction from Shaddai'' (the Almighty).'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲהָהּ
  chosen: Alas
  alternatives:
  - Ah
  - Woe
  lexicon: HALOT
  rationale: An interjection of lament. 'Alas' best conveys grief and alarm in natural
    modern English without over-specifying judgment as 'woe' might.
- source_word: לַיּוֹם
  chosen: for the day
  alternatives:
  - for the day!
  - because of the day
  - the day
  lexicon: HALOT
  rationale: The prefixed ל here is idiomatic after a lament interjection, yielding
    'alas for the day' rather than a more wooden 'alas to the day.'
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the lament. 'For' preserves the explanatory
    force succinctly.
- source_word: קָרוֹב
  chosen: is near
  alternatives:
  - is close
  - draws near
  lexicon: HALOT
  rationale: Predicate adjective indicating imminence. 'Is near' is the most idiomatic
    and standard rendering in prophetic contexts.
- source_word: יוֹם יְהוָה
  chosen: the day of the LORD
  alternatives:
  - the LORD's day
  lexicon: HALOT
  rationale: Established prophetic expression referring to YHWH's decisive intervention
    in judgment. 'The LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible practice.
- source_word: וּכְשֹׁד
  chosen: and it comes like destruction
  alternatives:
  - and like devastation it comes
  - and as destruction it comes
  lexicon: HALOT
  rationale: שֹׁד denotes violent ruin, devastation, or destruction. Rendering the
    clause with an explicit subject in English ('it comes') clarifies the Hebrew verb
    while preserving the simile introduced by כְ.
- source_word: מִשַׁדַּי
  chosen: from the Almighty
  alternatives:
  - from Shaddai
  lexicon: HALOT
  rationale: 'The preposition מִן marks source: the destruction comes from the Almighty.
    ''Almighty'' is the conventional translation of שַׁדַּי and preserves the wordplay
    with שֹׁד without forcing an artificial English pun.'
- source_word: יָבֹוא
  chosen: it comes
  alternatives:
  - it will come
  - it is coming
  lexicon: HALOT
  rationale: The imperfect can express imminent future. Present 'comes' works well
    in English prophetic style after 'is near,' conveying certainty and vividness.
