theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    of YHWH. This also aligns with the prophetic formula 'day of the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Understanding מִשַׁדַּי in relation to שֹׁד
  chosen_reading: from the Almighty
  alternative_readings:
  - from Shaddai
  rationale: The Hebrew likely uses sound-play between שֹׁד ('destruction') and שַׁדַּי
    ('Almighty'). Translating שַׁדַּי as 'the Almighty' preserves meaning in the main
    text; the transliterated form can be preserved in a footnote.
