id: JOL.1.5
reference: Joel 1:5
source:
  edition: WLC
  text: הָקִ֤יצוּ שִׁכּוֹרִים֙ וּ/בְכ֔וּ וְ/הֵילִ֖לוּ כָּל שֹׁ֣תֵי יָ֑יִן עַל עָסִ֕יס
    כִּ֥י נִכְרַ֖ת מִ/פִּי/כֶֽם־־׃
translation:
  text: Wake up, you drunkards, and weep; wail, all you drinkers of wine, over the
    sweet wine, because it has been cut off from your mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'new wine' or 'fresh wine' for the Hebrew עָסִיס.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָקִיצוּ
  chosen: Wake up
  alternatives:
  - Awake
  lexicon: HALOT
  rationale: Imperative plural from קיץ/יקץ meaning to awake from sleep or stupor.
    'Wake up' is natural modern English and preserves the prophetic summons.
- source_word: שִׁכּוֹרִים
  chosen: you drunkards
  alternatives:
  - you drunk ones
  - you who are drunk
  lexicon: HALOT
  rationale: Adjectival plural used vocatively. 'Drunkards' captures the direct address
    and habitual characterization better than a flatter descriptive phrase.
- source_word: וּבְכוּ
  chosen: and weep
  alternatives:
  - and cry
  lexicon: HALOT
  rationale: Common verb for weeping/lamenting. 'Weep' fits the lament context and
    pairs well with the following imperative.
- source_word: וְהֵילִלוּ
  chosen: wail
  alternatives:
  - howl
  - lament loudly
  lexicon: HALOT
  rationale: Imperative of ילל, a stronger public cry of lament. 'Wail' is idiomatic
    and avoids the potentially misleading animal nuance of 'howl' in contemporary
    English.
- source_word: כָּל שֹׁתֵי יָיִן
  chosen: all you drinkers of wine
  alternatives:
  - all who drink wine
  - all wine drinkers
  lexicon: HALOT
  rationale: Participle plus object indicates those characterized by drinking wine.
    The vocative force is preserved with 'all you drinkers of wine.'
- source_word: עַל
  chosen: over
  alternatives:
  - because of
  - for
  lexicon: HALOT
  rationale: Here introduces the object/cause of lament. 'Over' is concise and idiomatic
    in lament contexts.
- source_word: עָסִיס
  chosen: the sweet wine
  alternatives:
  - new wine
  - fresh wine
  - must
  lexicon: HALOT
  rationale: The noun denotes freshly pressed or sweet wine. 'Sweet wine' communicates
    the sense clearly to modern readers without the technical obscurity of 'must';
    'new wine' is possible but can sound like a production stage rather than the pleasurable
    drink in view.
- source_word: נִכְרַת
  chosen: has been cut off
  alternatives:
  - is cut off
  - has perished
  lexicon: HALOT
  rationale: 'Niphal of כרת commonly means ''be cut off.'' The perfect is rendered
    as present-resultative in English: the supply has been removed.'
- source_word: מִפִּיכֶם
  chosen: from your mouth
  alternatives:
  - from your lips
  lexicon: HALOT
  rationale: Literal rendering of 'from your mouth' preserves the vivid image of deprivation.
    'Lips' would be interpretive smoothing.
