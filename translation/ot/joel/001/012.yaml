id: JOL.1.12
reference: Joel 1:12
source:
  edition: WLC
  text: הַ/גֶּ֣פֶן הוֹבִ֔ישָׁה וְ/הַ/תְּאֵנָ֖ה אֻמְלָ֑לָה רִמּ֞וֹן גַּם תָּמָ֣ר וְ/תַפּ֗וּחַ
    כָּל עֲצֵ֤י הַ/שָּׂדֶה֙ יָבֵ֔שׁוּ כִּֽי הֹבִ֥ישׁ שָׂשׂ֖וֹן מִן בְּנֵ֥י אָדָֽם־־־־׃ס
translation:
  text: The vine has dried up, and the fig tree has withered; the pomegranate, also
    the palm and the apple tree—all the trees of the field have dried up. Indeed,
    joy has dried up from the sons of man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the apricot tree'; the precise species denoted by Hebrew tappuach
      is uncertain.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''from humankind'' / ''from humanity.'' Hebrew: ''from the sons of man.'''
    reason: alternative_reading
lexical_decisions:
- source_word: הַגֶּפֶן
  chosen: the vine
  alternatives:
  - the grapevine
  lexicon: HALOT
  rationale: Definite singular noun referring to the cultivated vine as a representative
    crop. 'Vine' is the standard concise English rendering and fits the agricultural
    lament context.
- source_word: הוֹבִישָׁה
  chosen: has dried up
  alternatives:
  - is ashamed
  - has failed
  lexicon: HALOT
  rationale: From יבש/בוש-related form as parsed in the morphology table under lemma
    3001; in this agricultural context the sense is physical drying rather than shame.
    Perfect aspect is naturally rendered with English present perfect in the lament
    sequence.
- source_word: הַתְּאֵנָה
  chosen: the fig tree
  alternatives:
  - the fig
  lexicon: HALOT
  rationale: Though Hebrew can denote the fig plant, English idiom prefers 'fig tree'
    for the crop-bearing plant in a list of trees.
- source_word: אֻמְלָלָה
  chosen: has withered
  alternatives:
  - has languished
  - has faded
  lexicon: HALOT
  rationale: Conveys the plant's enfeebled, shriveled condition. 'Withered' is idiomatic
    and distinct enough from 'dried up' while preserving the parallelism.
- source_word: רִמּוֹן
  chosen: the pomegranate
  alternatives:
  - the pomegranate tree
  lexicon: HALOT
  rationale: English can use the fruit name metonymically for the tree in a crop list.
    The article is not explicit here, but English supplies it naturally in the series.
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - likewise
  lexicon: HALOT
  rationale: Marks continuation/emphasis within the list. 'Also' preserves the additive
    force without overemphasis.
- source_word: תָּמָר
  chosen: the palm
  alternatives:
  - the date palm
  lexicon: HALOT
  rationale: Likely the date palm, but 'palm' is the conventional concise rendering.
    'Date palm' is possible but slightly more technical than needed in the main text.
- source_word: תַפּוּחַ
  chosen: the apple tree
  alternatives:
  - the apricot tree
  - the fruit tree
  lexicon: HALOT
  rationale: Traditional rendering is 'apple tree.' The precise species is debated
    in Hebrew botany, but 'apple tree' remains the most recognizable default; the
    lexical uncertainty is worth preserving in a footnote.
- source_word: כָּל עֲצֵי הַשָּׂדֶה
  chosen: all the trees of the field
  alternatives:
  - every tree of the field
  - all the trees of the countryside
  lexicon: HALOT
  rationale: A comprehensive expression extending beyond the named species. 'Of the
    field' is more formally faithful than 'of the countryside' and preserves biblical
    imagery.
- source_word: יָבֵשׁוּ
  chosen: have dried up
  alternatives:
  - are dried up
  - have withered
  lexicon: HALOT
  rationale: Qal perfect plural describing the condition of all the trees. Repeating
    'dried up' preserves the lexical link with the earlier verb and the cumulative
    effect of devastation.
- source_word: כִּי
  chosen: Indeed
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces an explanatory/resultative statement with rhetorical
    force. 'Indeed' captures the emphatic explanatory transition in natural English;
    'for' is possible but stiffer.
- source_word: הֹבִישׁ
  chosen: has dried up
  alternatives:
  - has withered away
  - has failed
  lexicon: HALOT
  rationale: Applied metaphorically to joy, extending the agricultural drying imagery
    into human experience. Rendering it the same way as earlier preserves the poetic
    linkage.
- source_word: שָׂשׂוֹן
  chosen: joy
  alternatives:
  - gladness
  - rejoicing
  lexicon: HALOT
  rationale: A broad term for gladness or exultation. 'Joy' is the most natural and
    weighty English equivalent here.
- source_word: מִן בְּנֵי אָדָם
  chosen: from the sons of man
  alternatives:
  - from humankind
  - from mankind
  - from humanity
  lexicon: HALOT
  rationale: Per doctrine, אָדָם should be rendered 'man' or 'humankind' according
    to context, with gender-accurate sensitivity. Because the Hebrew explicitly says
    'sons of man/humanity,' the main text preserves that form rather than flattening
    it to an abstract collective; an inclusive alternative is preserved in a footnote.
