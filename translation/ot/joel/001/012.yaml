theological_decisions:
- issue: Rendering of אָדָם in a generic-human expression
  chosen_reading: the sons of man
  alternative_readings:
  - humankind
  - humanity
  rationale: The phrase בְּנֵי אָדָם is a conventional Hebrew expression for human
    beings. Following the project's gender-accurate principle, the translation preserves
    the source's masculine representative form in the main text rather than neutralizing
    it. Because modern readers may hear it narrowly, an inclusive equivalent is preserved
    in a footnote.
  doctrine_reference: 'DOCTRINE.md: ''Gender-accurate over gender-neutral'' and contested
    term אָדָם → ''man / humankind (context)'''
