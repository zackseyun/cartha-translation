id: NUM.4.28
reference: Numbers 4:28
source:
  edition: WLC
  text: זֹ֣את עֲבֹדַ֗ת מִשְׁפְּחֹ֛ת בְּנֵ֥י הַ/גֵּרְשֻׁנִּ֖י בְּ/אֹ֣הֶל מוֹעֵ֑ד וּ/מִ֨שְׁמַרְתָּ֔/ם
    בְּ/יַד֙ אִֽיתָמָ֔ר בֶּֽן אַהֲרֹ֖ן הַ/כֹּהֵֽן־׃פ
translation:
  text: This is the service of the families of the sons of the Gershonite in the tent
    of meeting, and their duty shall be under the hand of Ithamar son of Aaron the
    priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "their charge"; the Hebrew term can denote an assigned responsibility
      or obligation.
    reason: lexical_alternative
  - marker: b
    text: Literally "under the hand of Ithamar," an idiom meaning under his supervision
      or authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: Demonstrative feminine singular introducing the assignment statement;
    'This is' gives natural English while preserving the identificational force.
- source_word: עֲבֹדַת
  chosen: the service
  alternatives:
  - the work
  - the ministry
  lexicon: HALOT
  rationale: עֲבֹדָה here refers to assigned cultic/liturgical labor. 'Service' fits
    the tabernacle context better than the broader 'work' and avoids importing later
    ecclesiastical nuance of 'ministry'.
- source_word: מִשְׁפְּחֹת
  chosen: the families
  alternatives:
  - the clans
  lexicon: HALOT
  rationale: In tribal/genealogical contexts this can be rendered 'families' or 'clans.'
    'Families' is a straightforward rendering of the Hebrew, while the larger tribal
    sense is still clear from context.
- source_word: בְּנֵי הַגֵּרְשֻׁנִּי
  chosen: of the sons of the Gershonite
  alternatives:
  - of the Gershonites
  - of the descendants of Gershon
  lexicon: HALOT
  rationale: Formally the phrase is 'sons of the Gershonite.' Retaining 'sons of'
    preserves the Hebrew construction and lineage emphasis better than the smoother
    collective 'Gershonites.'
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: Standard rendering for the tabernacle phrase. 'In' reflects the Hebrew
    preposition and can denote sphere of service, not merely interior location.
- source_word: וּמִשְׁמַרְתָּם
  chosen: and their duty
  alternatives:
  - and their charge
  - and their responsibility
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת often denotes an assigned obligation, charge, or duty. 'Duty'
    is clear modern English and suits the administrative context of assigned tabernacle
    responsibilities.
- source_word: בְּיַד
  chosen: under the hand of
  alternatives:
  - under the authority of
  - in the charge of
  lexicon: HALOT
  rationale: Literally 'in/under the hand of,' an idiom for supervision or authority.
    The main text preserves the Hebrew image while remaining intelligible in English.
- source_word: אִיתָמָר בֶּן אַהֲרֹן הַכֹּהֵן
  chosen: Ithamar son of Aaron the priest
  alternatives:
  - Ithamar, the son of Aaron the priest
  lexicon: HALOT
  rationale: Standard name transliteration and filial identification. The appositional
    phrase identifies Ithamar by priestly lineage; no need to expand beyond the Hebrew.
