id: NUM.4.38
reference: Numbers 4:38
source:
  edition: WLC
  text: וּ/פְקוּדֵ֖י בְּנֵ֣י גֵרְשׁ֑וֹן לְ/מִשְׁפְּחוֹתָ֖/ם וּ/לְ/בֵ֥ית אֲבֹתָֽ/ם׃
translation:
  text: 'And the numbered men of the sons of Gershon, by their clans and by their
    fathers'' houses:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Gershon'; that is, the Gershonite division descended from
      Gershon.
    reason: lexical_alternative
  - marker: b
    text: Or 'those counted of the sons of Gershon.' The Hebrew expression refers
      to those enrolled in the census.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְקוּדֵי
  chosen: And the numbered men
  alternatives:
  - And those counted
  - And the census of
  - And the appointed ones of
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like nominal form here, referring
    to those enrolled or counted in the census. In this chapter the repeated formula
    introduces the tally for each Levitical division, so 'the numbered men' captures
    the counted persons rather than an abstract 'census.' 'Men' is supplied in English
    because the counted group is the eligible male Levites in context (vv. 34–49),
    and this is gender-accurate rather than gender-neutral.
- source_word: בני גרשון
  chosen: of the sons of Gershon
  alternatives:
  - of the Gershonites
  - of Gershon's sons
  lexicon: HALOT
  rationale: A formally close rendering of the construct chain. 'Gershonites' would
    be smoother English and is contextually accurate, but 'sons of Gershon' preserves
    the Hebrew kinship expression and matches the genealogical style of the passage.
- source_word: למשפחתם
  chosen: by their clans
  alternatives:
  - according to their families
  - by their family groups
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census/genealogical contexts commonly denotes clan-level
    subdivisions within a tribe. 'By their clans' is concise, natural English and
    more precise than the broader 'families.'
- source_word: ולבית אבתם
  chosen: and by their fathers' houses
  alternatives:
  - and by their ancestral houses
  - and by their fathers' households
  lexicon: HALOT
  rationale: בֵּית אָבוֹת is a standard kinship-administrative expression. 'Fathers'
    houses' preserves the idiom with minimal interpretation; 'ancestral houses' is
    possible but less transparent to the source wording. The plural possessive reflects
    the Hebrew suffix.
