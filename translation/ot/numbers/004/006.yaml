id: NUM.4.6
reference: Numbers 4:6
source:
  edition: WLC
  text: וְ/נָתְנ֣וּ עָלָ֗י/ו כְּסוּי֙ ע֣וֹר תַּ֔חַשׁ וּ/פָרְשׂ֧וּ בֶֽגֶד כְּלִ֛יל
    תְּכֵ֖לֶת מִ/לְ/מָ֑עְלָ/ה וְ/שָׂמ֖וּ בַּדָּֽי/ו־׃
translation:
  text: They shall put over it a covering of fine leather, and spread over that a
    cloth wholly of blue, and they shall put its poles in place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew תַּחַשׁ (tahash) is uncertain; it may refer to a particular animal
      skin (traditionally rendered with options such as 'goatskin,' 'porpoise skin,'
      or 'dugong skin').
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתְנוּ
  chosen: they shall put
  alternatives:
  - and they shall place
  - and they shall set
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in procedural instructions is
    naturally rendered with future/modal force in English: ''they shall put.'' ''Put''
    is the most idiomatic for placing a covering over the object.'
- source_word: עָלָיו
  chosen: over it
  alternatives:
  - upon it
  - on it
  lexicon: HALOT
  rationale: The preposition על with suffix indicates placement over the ark. 'Over
    it' fits the layering sequence in context better than the flatter 'on it.'
- source_word: כְּסוּי
  chosen: a covering
  alternatives:
  - covering
  - cover
  lexicon: HALOT
  rationale: Noun meaning a covering. The indefinite article is natural in English
    though absent in Hebrew.
- source_word: עוֹר תַּחַשׁ
  chosen: fine leather
  alternatives:
  - goatskin
  - porpoise skin
  - dugong skin
  - hide of tahash
  lexicon: HALOT
  rationale: The precise animal denoted by תַּחַשׁ is uncertain. Rather than preserve
    a speculative zoological identification, 'fine leather' communicates a durable
    hide covering in readable modern English. Because the term is debated, alternatives
    are preserved in a footnote.
- source_word: וּפָרְשׂוּ
  chosen: and spread
  alternatives:
  - and spread out
  lexicon: HALOT
  rationale: The verb means to spread out a cloth or covering. 'Spread' is concise
    and idiomatic.
- source_word: בֶגֶד
  chosen: a cloth
  alternatives:
  - garment
  - covering
  lexicon: HALOT
  rationale: Although often 'garment,' here the object is something spread over the
    ark as a layer, so 'cloth' best matches the function in context.
- source_word: כְּלִיל
  chosen: wholly
  alternatives:
  - entirely
  - all of
  lexicon: HALOT
  rationale: 'The adjective/adverbial use conveys completeness: the cloth is entirely
    blue. ''Wholly'' preserves the emphasis without sounding overly technical.'
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - blue-purple
  - violet
  lexicon: HALOT
  rationale: The term denotes the characteristic blue/purple dyed color used in tabernacle
    materials. 'Blue' is the standard and clearest rendering in this cultic context.
- source_word: מִלְמָעְלָה
  chosen: over that
  alternatives:
  - from above
  - on top
  lexicon: HALOT
  rationale: Literally 'from above/upward,' but in this layering instruction it indicates
    the upper placement of the blue cloth over the leather covering. 'Over that' makes
    the sequence explicit in natural English.
- source_word: וְשָׂמוּ
  chosen: and they shall put
  alternatives:
  - and they shall set
  - and they shall place
  lexicon: HALOT
  rationale: Common verb for placing or setting. 'Put' keeps the procedural style
    consistent with the first clause.
- source_word: בַּדָּיו
  chosen: its poles in place
  alternatives:
  - its poles
  - its carrying poles
  lexicon: HALOT
  rationale: The noun refers to the carrying poles of the ark. Adding 'in place' makes
    explicit the action implied by 'put' in English, while remaining faithful to the
    ritual procedure.
