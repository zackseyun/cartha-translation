theological_decisions:
- issue: Gendered census terminology
  chosen_reading: their counted men
  alternative_readings:
  - their numbered ones
  - those counted from among them
  rationale: The broader census context in Numbers 4 counts males within a specified
    age range for tabernacle service. Rendering with 'men' reflects the actual referent
    rather than flattening to a gender-neutral expression. This follows the project's
    gender-accurate principle.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
