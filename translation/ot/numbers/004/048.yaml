id: NUM.4.48
reference: Numbers 4:48
source:
  edition: WLC
  text: וַ/יִּהְי֖וּ פְּקֻדֵי/הֶ֑ם שְׁמֹנַ֣ת אֲלָפִ֔ים וַ/חֲמֵ֥שׁ מֵא֖וֹת וּ/שְׁמֹנִֽים׃
translation:
  text: their counted men were eight thousand five hundred and eighty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those numbered from among them' or 'their numbered ones.' The Hebrew
      refers to those enrolled in the census.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - came to be
  - amounted to
  lexicon: HALOT
  rationale: The waw-consecutive form of היה here functions as a simple past/copular
    verb introducing the total number. 'Were' is natural English and sufficiently
    formal for a census total.
- source_word: פְּקֻדֵיהֶם
  chosen: their counted men
  alternatives:
  - those numbered from among them
  - their numbered ones
  - their muster
  lexicon: HALOT
  rationale: From פקד in a census/mustering context, the noun refers to those enrolled
    or counted. Because the immediate context in Numbers 4 concerns eligible Levite
    males for service, 'their counted men' makes explicit the referent while staying
    close to the Hebrew. This is gender-accurate rather than neutral, matching the
    source context.
- source_word: שְׁמֹנַת אֲלָפִים
  chosen: eight thousand
  lexicon: HALOT
  rationale: Standard cardinal number construction; rendered straightforwardly in
    idiomatic English.
- source_word: וַחֲמֵשׁ מֵאוֹת
  chosen: five hundred
  lexicon: HALOT
  rationale: Standard additive numeral sequence following the thousands.
- source_word: וּשְׁמֹנִים
  chosen: and eighty
  lexicon: HALOT
  rationale: Final element in the additive numeral chain; English preserves the cumulative
    count as 'five hundred and eighty'.
