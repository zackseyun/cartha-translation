id: NUM.4.44
reference: Numbers 4:44
source:
  edition: WLC
  text: וַ/יִּהְי֥וּ פְקֻדֵי/הֶ֖ם לְ/מִשְׁפְּחֹתָ֑/ם שְׁלֹ֥שֶׁת אֲלָפִ֖ים וּ/מָאתָֽיִם׃
translation:
  text: And those counted from them by their clans were three thousand two hundred.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: And ... were
  alternatives:
  - and they were
  - now ... were
  lexicon: HALOT
  rationale: The waw-consecutive with היה advances the narrative/result sequence.
    In English, 'And ... were' naturally conveys the continuation without overtranslating
    the verb.
- source_word: פְקֻדֵיהֶם
  chosen: those counted from them
  alternatives:
  - their numbered men
  - their enrollment
  - their appointed ones
  lexicon: HALOT
  rationale: From פקד in this census context, the participial/substantival form refers
    to those who were counted/registered. 'Those counted from them' preserves the
    sense of a census total tied to the group just mentioned, without adding 'men'
    where it is not explicit in this verse.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה commonly denotes a clan/family subdivision within a tribe.
    'By their clans' is concise, natural English and fits the census formula in Numbers.
- source_word: שְׁלֹשֶׁת אֲלָפִים וּמָאתָיִם
  chosen: three thousand two hundred
  alternatives:
  - three thousand and two hundred
  lexicon: HALOT
  rationale: This is the straightforward cardinal total. Modern English normally expresses
    the number as 'three thousand two hundred' rather than the more literal but less
    natural 'three thousand and two hundred.'
