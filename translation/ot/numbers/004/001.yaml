id: NUM.4.1
reference: Numbers 4:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר יְהוָ֔ה אֶל מֹשֶׁ֥ה וְ/אֶֽל אַהֲרֹ֖ן לֵ/אמֹֽר־־׃
translation:
  text: And Yahweh spoke to Moses and to Aaron, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of דבר introduces narrative speech. 'Spoke' is the standard and slightly more formal rendering for divine address, while 'said' is possible but less precise for this verb.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech. 'To' is the natural modern English equivalent; 'unto' is archaic.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
- source_word: וְאֶל
  chosen: and to
  alternatives:
  - to
  lexicon: HALOT
  rationale: The conjunction plus preposition explicitly repeats the addressee marker before Aaron. Rendering both elements preserves the Hebrew coordination and emphasis that both Moses and Aaron are addressed.
- source_word: אַהֲרֹן
  chosen: Aaron
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name אַהֲרֹן.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: The infinitive construct לֵאמֹר functions as the standard speech-introduction formula after 'spoke.' 'Saying' preserves the Hebrew structure cleanly in English.
