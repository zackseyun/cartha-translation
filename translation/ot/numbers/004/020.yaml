theological_decisions:
- issue: Referent of הַקֹּדֶשׁ
  chosen_reading: collective reference to the sacred objects
  alternative_readings:
  - the sanctuary
  - the holy thing in a more abstract sense
  rationale: The immediate context in Numbers 4 concerns the handling and covering
    of the tabernacle furnishings. Rendering the term collectively as 'the holy things'
    best matches the concrete referent and avoids importing a location-focused meaning
    not required by the verse itself.
