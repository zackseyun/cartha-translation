id: NUM.4.20
reference: Numbers 4:20
source:
  edition: WLC
  text: וְ/לֹא יָבֹ֧אוּ לִ/רְא֛וֹת כְּ/בַלַּ֥ע אֶת הַ/קֹּ֖דֶשׁ וָ/מֵֽתוּ־־׃פ
translation:
  text: But they must not go in to look at the holy things even for a moment, or they
    will die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for an instant.' The Hebrew expression is idiomatic and may refer to
      seeing the holy things only briefly, or while they are being covered.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: But ... not
  alternatives:
  - and ... not
  - and they shall not
  lexicon: HALOT
  rationale: The conjunction plus negation continues the instruction with a prohibitive
    force. 'But' fits the warning contrast in English better than a simple 'and,'
    while preserving the negative command.
- source_word: יָבֹאוּ
  chosen: they must not go in
  alternatives:
  - they shall not come
  - they may not enter
  lexicon: HALOT
  rationale: The verb is 'come/go in, enter.' In context it is a prohibition directed
    at the Kohathites, so 'must not go in' expresses the force naturally in modern
    English.
- source_word: לִרְאוֹת
  chosen: to look at
  alternatives:
  - to see
  - to gaze upon
  lexicon: HALOT
  rationale: '''See'' is possible, but ''look at'' better conveys intentional visual
    exposure in this warning context.'
- source_word: כְבַלַּע
  chosen: even for a moment
  alternatives:
  - as the swallowing up
  - when it is swallowed
  - for an instant
  lexicon: HALOT
  rationale: This expression is idiomatic and difficult. In context and traditional
    Hebrew interpretation, it refers to a brief moment or instant, not literally 'swallowing.'
    The sense is that they must not look upon the holy things even briefly while they
    are being covered/handled.
- source_word: אֶת־הַקֹּדֶשׁ
  chosen: the holy things
  alternatives:
  - the holy thing
  - the sanctuary
  - the holy objects
  lexicon: HALOT
  rationale: Although singular in form, the phrase here refers collectively to the
    sacred objects just described in the surrounding context. 'The holy things' communicates
    that collective sense better than the more abstract 'the holy thing' or the location-oriented
    'sanctuary.'
- source_word: וָמֵתוּ
  chosen: or they will die
  alternatives:
  - lest they die
  - and they will die
  lexicon: HALOT
  rationale: The clause gives the consequence of violation. 'Or they will die' is
    clear modern English and preserves the warning force.
