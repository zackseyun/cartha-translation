id: NUM.4.22
reference: Numbers 4:22
source:
  edition: WLC
  text: נָשֹׂ֗א אֶת רֹ֛אשׁ בְּנֵ֥י גֵרְשׁ֖וֹן גַּם הֵ֑ם לְ/בֵ֥ית אֲבֹתָ֖/ם לְ/מִשְׁפְּחֹתָֽ/ם־־׃
translation:
  text: Take a census of the sons of Gershon also, by their fathers' houses, by their
    clans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Lift up the head of the sons of Gershon'; this is an
      idiom meaning to count them or take a census.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשֹׂא
  chosen: Take
  alternatives:
  - Lift up
  - Count
  lexicon: HALOT
  rationale: The idiom נָשָׂא אֶת־רֹאשׁ literally means 'lift up the head' but in
    administrative contexts means to take a count or census. 'Take' preserves the
    imperative force naturally in English when paired with 'a census'.
- source_word: אֶת רֹאשׁ
  chosen: a census
  alternatives:
  - the head
  - the total
  lexicon: HALOT
  rationale: Together with נָשֹׂא this forms a Hebrew idiom for numbering or taking
    a census. Rendering the phrase idiomatically avoids a misleadingly literal 'lift
    up the head' while preserving the administrative sense.
- source_word: בְּנֵי גֵרְשׁוֹן
  chosen: the sons of Gershon
  alternatives:
  - the descendants of Gershon
  - the Gershonites
  lexicon: HALOT
  rationale: '''Sons of Gershon'' is the formal genealogical expression in the Hebrew.
    ''Gershonites'' is possible, but the source text explicitly uses the filial construction,
    and this wording also matches the following lineage markers.'
- source_word: גַּם הֵם
  chosen: also
  alternatives:
  - they too
  - even they
  lexicon: HALOT
  rationale: The phrase marks inclusion in addition to a previous group. 'Also' communicates
    this succinctly in English; the emphatic pronoun is absorbed into natural English
    style.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers' houses
  alternatives:
  - according to their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: This is a standard clan-structure expression referring to paternal households/ancestral
    houses. 'Fathers' houses' is a conventional and sufficiently transparent rendering
    that preserves the patriarchal lineage structure of the Hebrew.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census and tribal contexts often denotes clan subdivisions
    rather than the modern nuclear 'family.' 'Clans' better reflects the social structure
    intended here.
