id: NUM.4.8
reference: Numbers 4:8
source:
  edition: WLC
  text: וּ/פָרְשׂ֣וּ עֲלֵי/הֶ֗ם בֶּ֚גֶד תּוֹלַ֣עַת שָׁנִ֔י וְ/כִסּ֣וּ אֹת֔/וֹ בְּ/מִכְסֵ֖ה
    ע֣וֹר תָּ֑חַשׁ וְ/שָׂמ֖וּ אֶת בַּדָּֽי/ו־׃
translation:
  text: They shall spread over them a cloth of scarlet yarn, and cover it with a covering
    of tahash skin, and put its poles in place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew tahash; the exact animal or material is uncertain. Traditional renderings
      include 'badger skin,' 'porpoise skin,' or more generally 'fine leather.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָרְשׂוּ
  chosen: they shall spread
  alternatives:
  - they shall spread out
  - they shall lay out
  lexicon: HALOT
  rationale: The verb פרשׂ in this ritual context refers to spreading a covering over
    sacred objects. 'They shall spread' is natural English and preserves the concrete
    action.
- source_word: עֲלֵיהֶם
  chosen: over them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: The preposition על with plural suffix indicates placement over the items
    referenced in the previous verse. 'Over them' is idiomatic and sufficiently literal.
- source_word: בֶּגֶד
  chosen: a cloth
  alternatives:
  - a garment
  - a covering
  lexicon: HALOT
  rationale: Although בגד often means 'garment,' here it denotes a textile used to
    cover the table and its vessels. 'Cloth' best fits the cultic furnishing context
    without implying wearable clothing.
- source_word: תּוֹלַעַת שָׁנִי
  chosen: scarlet yarn
  alternatives:
  - scarlet
  - crimson yarn
  - scarlet cloth
  lexicon: HALOT
  rationale: This expression denotes scarlet material/dye associated with fine textile
    work. 'Scarlet yarn' reflects the likely sense of dyed material more precisely
    than the bare color term, while remaining readable.
- source_word: וְכִסּוּ אֹתוֹ
  chosen: and cover it
  alternatives:
  - and they shall cover it
  lexicon: HALOT
  rationale: The singular object suffix refers back to the table as a unit after the
    plural 'them' for the items on/with it. 'Cover it' preserves the shift in number
    found in the Hebrew.
- source_word: בְּמִכְסֵה
  chosen: with a covering
  alternatives:
  - with a cover
  lexicon: HALOT
  rationale: The noun denotes a covering layer. 'With a covering' keeps the formal
    correspondence and avoids sounding overly technical.
- source_word: עוֹר תָּחַשׁ
  chosen: tahash skin
  alternatives:
  - fine leather
  - goatskin
  - porpoise skin
  - durable leather
  lexicon: HALOT
  rationale: The precise animal denoted by תחשׁ is uncertain. To avoid false precision,
    the Hebrew term is transliterated in a minimal explanatory construction, 'tahash
    skin.' This preserves source-language ambiguity better than traditional but speculative
    identifications.
- source_word: וְשָׂמוּ
  chosen: and put
  alternatives:
  - and set
  - and place
  lexicon: HALOT
  rationale: A common verb of placing. 'Put' is simple modern English; the object
    and context clarify the action.
- source_word: אֶת בַּדָּיו
  chosen: its poles in place
  alternatives:
  - its poles
  - the poles for it
  lexicon: HALOT
  rationale: בדים are carrying poles for the sacred furniture. Adding 'in place' makes
    explicit the implied action of fitting/setting them for transport, which is contextually
    warranted by the verb 'put' and the transport instructions in the passage.
