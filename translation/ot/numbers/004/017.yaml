id: NUM.4.17
reference: Numbers 4:17
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר יְהוָ֔ה אֶל מֹשֶׁ֥ה וְ/אֶֽל אַהֲרֹ֖ן לֵ/אמֹֽר־־׃
translation:
  text: Then the LORD spoke to Moses and to Aaron, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... spoke
  alternatives:
  - And ... spoke
  - said
  lexicon: HALOT
  rationale: Wayyiqtol of דבר commonly advances the narrative. 'Then ... spoke' captures
    the sequential force in natural English while preserving the speech-act sense
    more formally than simply 'said.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following longstanding English convention and the reverential pattern reflected
    in Jewish practice and the Septuagintal tradition.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard prepositional sense indicating the addressee of speech; 'to'
    is the natural modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
- source_word: וְאֶל
  chosen: and to
  alternatives:
  - and
  lexicon: HALOT
  rationale: The repeated preposition is retained in English ('and to Aaron') to reflect
    the Hebrew structure and make clear that both Moses and Aaron are direct addressees.
- source_word: אַהֲרֹן
  chosen: Aaron
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name אַהֲרֹן.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: The infinitive formula introducing direct speech is conventionally and
    accurately rendered 'saying,' especially since the content follows in the next
    verse.
