id: NUM.4.13
reference: Numbers 4:13
source:
  edition: WLC
  text: וְ/דִשְּׁנ֖וּ אֶת הַ/מִּזְבֵּ֑חַ וּ/פָרְשׂ֣וּ עָלָ֔י/ו בֶּ֖גֶד אַרְגָּמָֽן־׃
translation:
  text: Then they shall remove the ashes from the altar and spread over it a purple
    cloth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cleanse the altar' / 'remove the fatty ashes from the altar.' The Hebrew
      verb refers specifically to clearing away the altar's ash residue in a sacrificial
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדִשְּׁנוּ
  chosen: they shall remove the ashes
  alternatives:
  - they shall cleanse
  - they shall take away the fat ashes
  - they shall de-ash
  lexicon: HALOT
  rationale: From דשׁן in the Piel, used of clearing away ashes/fatty residue from
    the altar. In this cultic context, the sense is not general 'make fat' but removing
    the ash residue. 'Remove the ashes' is idiomatic modern English and fits the altar-preparation
    procedure.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering of מִזְבֵּחַ in tabernacle sacrificial contexts.
- source_word: וּפָרְשׂוּ
  chosen: and spread
  alternatives:
  - and spread out
  - and lay out
  lexicon: HALOT
  rationale: פרשׂ commonly means to spread out or extend. 'Spread' is natural English
    for placing a cloth over an object.
- source_word: עָלָיו
  chosen: over it
  alternatives:
  - upon it
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix indicates covering the altar.
    'Over it' is natural modern English.
- source_word: בֶּגֶד
  chosen: cloth
  alternatives:
  - garment
  - covering
  lexicon: HALOT
  rationale: Although בגד often means 'garment,' here it refers to a textile used
    to cover cultic furniture. 'Cloth' best matches the immediate function.
- source_word: אַרְגָּמָן
  chosen: purple
  alternatives:
  - purple yarn
  - purple material
  lexicon: HALOT
  rationale: אַרְגָּמָן denotes purple-dyed material. Since בגד already supplies the
    textile idea, 'purple cloth' communicates the sense clearly without over-specifying.
