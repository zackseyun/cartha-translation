theological_decisions:
- issue: Referent of הַקֹּדֶשׁ in the prohibition clause
  chosen_reading: the holy things (the sacred objects)
  alternative_readings:
  - the sanctuary
  rationale: The immediate context concerns covered sacred objects and furnishings
    being transported by the sons of Kohath. Rendering the term concretely avoids
    implying they were forbidden to approach the tabernacle area at all, when the
    specific warning is against direct contact with the sacred items before proper
    covering.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
