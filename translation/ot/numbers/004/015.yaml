id: NUM.4.15
reference: Numbers 4:15
source:
  edition: WLC
  text: וְ/כִלָּ֣ה אַֽהֲרֹן וּ֠/בָנָי/ו לְ/כַסֹּ֨ת אֶת הַ/קֹּ֜דֶשׁ וְ/אֶת כָּל כְּלֵ֣י
    הַ/קֹּדֶשׁ֮ בִּ/נְסֹ֣עַ הַֽ/מַּחֲנֶה֒ וְ/אַחֲרֵי כֵ֗ן יָבֹ֤אוּ בְנֵי קְהָת֙ לָ/שֵׂ֔את
    וְ/לֹֽא יִגְּע֥וּ אֶל הַ/קֹּ֖דֶשׁ וָ/מֵ֑תוּ אֵ֛לֶּה מַשָּׂ֥א בְנֵֽי קְהָ֖ת בְּ/אֹ֥הֶל
    מוֹעֵֽד־־־־־־־־־׃
translation:
  text: When Aaron and his sons have finished covering the sanctuary and all the furnishings
    of the sanctuary, when the camp sets out, after that the sons of Kohath shall
    come to carry them; but they shall not touch the holy things, lest they die. These
    are the burden of the sons of Kohath in the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they shall not touch the sanctuary.' The Hebrew 'the holy' can be understood
      either collectively for the sacred objects or more broadly for the sanctuary.
    reason: alternative_reading
  - marker: b
    text: Or 'and they will die.' The Hebrew wording states the consequence directly.
    reason: lexical_alternative
  - marker: c
    text: Or 'the Kohathites.' Literally, 'the sons of Kohath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִלָּה
  chosen: have finished
  alternatives:
  - has finished
  - finish
  lexicon: HALOT
  rationale: 'Perfect form with Aaron as the first explicit subject, followed by ''and
    his sons''; in English the compound subject is naturally rendered as plural sense:
    ''when Aaron and his sons have finished.'' The verb conveys completion.'
- source_word: לְכַסֹּת
  chosen: covering
  alternatives:
  - to cover
  lexicon: HALOT
  rationale: 'Used with כִלָּה to express completion of the action: ''have finished
    covering.'' English participial form is smoother while preserving the infinitival
    sense.'
- source_word: הַקֹּדֶשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the holy thing
  lexicon: HALOT
  rationale: In this context the term refers collectively to the sacred objects/area
    being covered before transport. 'Sanctuary' best captures the cultic referent
    in idiomatic English for the first occurrence.
- source_word: כָּל כְּלֵי הַקֹּדֶשׁ
  chosen: all the furnishings of the sanctuary
  alternatives:
  - all the vessels of the sanctuary
  - all the holy utensils
  lexicon: HALOT
  rationale: כְּלֵי denotes implements/articles/furnishings. 'Furnishings' is readable
    modern English and fits tabernacle equipment. Repeating 'of the sanctuary' keeps
    the genitival relation clear.
- source_word: בִּנְסֹעַ הַמַּחֲנֶה
  chosen: when the camp sets out
  alternatives:
  - at the setting out of the camp
  - when the camp journeys
  lexicon: HALOT
  rationale: Temporal infinitive construct indicating the time of movement. 'Sets
    out' is natural modern English for camp departure.
- source_word: וְאַחֲרֵי כֵן
  chosen: after that
  alternatives:
  - afterward
  - and after this
  lexicon: HALOT
  rationale: Marks sequence plainly; 'after that' preserves the procedural order.
- source_word: בְנֵי קְהָת
  chosen: the sons of Kohath
  alternatives:
  - the Kohathites
  lexicon: HALOT
  rationale: The Hebrew is literally filial/tribal language. Per translation philosophy,
    names are transliterated and kinship wording is preserved unless context strongly
    favors an ethnicon.
- source_word: לָשֵׂאת
  chosen: to carry them
  alternatives:
  - to bear
  - to carry
  lexicon: HALOT
  rationale: The infinitive expresses their duty in transport. 'Them' is supplied
    in English from the immediately preceding covered sanctuary items.
- source_word: וְלֹא יִגְּעוּ אֶל הַקֹּדֶשׁ
  chosen: but they shall not touch the holy things
  alternatives:
  - but they shall not touch the sanctuary
  - but they shall not touch the holy object
  lexicon: HALOT
  rationale: Here הַקֹּדֶשׁ is best taken concretely of the sacred items just mentioned,
    since the warning concerns handling during transport. Plural 'holy things' makes
    the sense explicit in English.
- source_word: וָמֵתוּ
  chosen: lest they die
  alternatives:
  - and die
  - or they will die
  lexicon: HALOT
  rationale: The clause gives the consequence of prohibited contact. 'Lest they die'
    communicates the warning force idiomatically, though a more formal rendering would
    be 'and they die.'
- source_word: אֵלֶּה מַשָּׂא בְנֵי קְהָת
  chosen: These are the burden of the sons of Kohath
  alternatives:
  - This is the responsibility of the sons of Kohath
  - These are what the sons of Kohath must carry
  lexicon: HALOT
  rationale: מַשָּׂא literally denotes load/burden/carrying duty. 'Burden' preserves
    the concrete sense and the formal tone of the assignment statement.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - for the tent of meeting
  - with respect to the tent of meeting
  lexicon: HALOT
  rationale: The preposition ב can be locative or sphere-related; 'in the tent of
    meeting' is the most straightforward rendering and fits the tabernacle service
    context.
