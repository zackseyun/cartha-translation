id: NUM.4.7
reference: Numbers 4:7
source:
  edition: WLC
  text: וְ/עַ֣ל שֻׁלְחַ֣ן הַ/פָּנִ֗ים יִפְרְשׂוּ֮ בֶּ֣גֶד תְּכֵלֶת֒ וְ/נָתְנ֣וּ עָ֠לָי/ו
    אֶת הַ/קְּעָרֹ֤ת וְ/אֶת הַ/כַּפֹּת֙ וְ/אֶת הַ/מְּנַקִּיֹּ֔ת וְ/אֵ֖ת קְשׂ֣וֹת הַ/נָּ֑סֶךְ
    וְ/לֶ֥חֶם הַ/תָּמִ֖יד עָלָ֥י/ו יִהְיֶֽה׀־־־׃
translation:
  text: And over the table of the Presence they shall spread a blue cloth, and they
    shall place on it the plates, the cups, the bowls, and the jars for the drink
    offering; and the regular bread shall be on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'the table of showbread.' The Hebrew is more literally
      'the table of the Presence.'
    reason: alternative_reading
  - marker: b
    text: Or 'the continual bread.' This refers to the bread regularly kept before
      the LORD on the table.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֻׁלְחַן הַפָּנִים
  chosen: the table of the Presence
  alternatives:
  - the table of showbread
  - the bread of the Presence table
  lexicon: HALOT
  rationale: Literally 'table of the face/presence.' 'Table of the Presence' preserves
    the Hebrew idiom and its cultic sense better than the traditional but interpretive
    'table of showbread.'
- source_word: יִפְרְשׂוּ
  chosen: they shall spread
  alternatives:
  - they shall spread out
  - they shall cover
  lexicon: HALOT
  rationale: The verb means to spread out or spread over. 'Spread' is natural English
    and fits the action of laying a cloth over the table.
- source_word: בֶּגֶד תְּכֵלֶת
  chosen: a blue cloth
  alternatives:
  - a cloth of blue
  - a cloth of violet-blue
  lexicon: HALOT
  rationale: תְּכֵלֶת denotes the distinctive blue/purple-blue fabric color used in
    tabernacle contexts. 'Blue cloth' is clear modern English without over-specifying
    the hue.
- source_word: הַקְּעָרֹת
  chosen: the plates
  alternatives:
  - the dishes
  - the trays
  lexicon: HALOT
  rationale: In tabernacle vessel lists this term refers to flat serving vessels.
    'Plates' is a natural rendering in context.
- source_word: הַכַּפֹּת
  chosen: the cups
  alternatives:
  - the pans
  - the small bowls
  lexicon: HALOT
  rationale: Though the noun can denote spoon-like vessels in some cultic contexts,
    here 'cups' is a broadly intelligible rendering for table vessels without importing
    a more specific shape than the text requires.
- source_word: הַמְּנַקִּיֹּת
  chosen: the bowls
  alternatives:
  - the flagons
  - the pitchers
  lexicon: HALOT
  rationale: This vessel term is traditionally rendered in various ways. 'Bowls' fits
    the likely function among table utensils and avoids archaic 'flagons.'
- source_word: קְשׂוֹת הַנָּסֶךְ
  chosen: the jars for the drink offering
  alternatives:
  - the pitchers for pouring
  - the vessels of libation
  lexicon: HALOT
  rationale: The phrase denotes vessels associated with pouring out the libation.
    'Jars for the drink offering' is readable and preserves the sacrificial function
    of נֶסֶךְ.
- source_word: לֶחֶם הַתָּמִיד
  chosen: the regular bread
  alternatives:
  - the continual bread
  - the perpetual bread
  - the bread of continual offering
  lexicon: HALOT
  rationale: The phrase refers to the bread kept continually before Yahweh on the
    table. 'Regular bread' communicates ongoing prescribed presence in idiomatic English;
    the cultic association is already signaled by 'table of the Presence.'
- source_word: עָלָיו יִהְיֶה
  chosen: shall be on it
  alternatives:
  - shall remain on it
  - shall stay on it
  lexicon: HALOT
  rationale: The clause states that the bread is to be on the table. English future
    'shall be on it' is sufficiently literal; 'remain' would add a nuance not explicit
    in the verb alone.
