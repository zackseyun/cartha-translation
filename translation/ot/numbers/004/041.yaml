id: NUM.4.41
reference: Numbers 4:41
source:
  edition: WLC
  text: אֵ֣לֶּה פְקוּדֵ֗י מִשְׁפְּחֹת֙ בְּנֵ֣י גֵרְשׁ֔וֹן כָּל הָ/עֹבֵ֖ד בְּ/אֹ֣הֶל מוֹעֵ֑ד אֲשֶׁ֨ר פָּקַ֥ד מֹשֶׁ֛ה וְ/אַהֲרֹ֖ן עַל פִּ֥י יְהוָֽה־־׃
translation:
  text: These were the counted men of the families of the sons of Gershon, all who served in the tent of meeting, whom Moses and Aaron counted at the command of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'These are those numbered from the families of the sons of Gershon, all who served in the tent of meeting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These are
  lexicon: HALOT
  rationale: Deictic plural introducing the summary statement. English past tense 'were' fits the narrative census report context better than a present-tense formal rendering.
- source_word: פְקוּדֵי
  chosen: the counted men
  alternatives:
  - those numbered
  - the census of
  - those appointed
  lexicon: HALOT
  rationale: From פקד in a census context, referring to those enrolled/numbered. 'Counted men' captures the result of the census. 'Appointed' is possible for the root in other contexts but not here.
- source_word: מִשְׁפְּחֹת
  chosen: the families
  alternatives:
  - the clans
  lexicon: HALOT
  rationale: Standard rendering for family groupings within Israelite tribal structure. 'Clans' is possible, but 'families' is sufficiently clear and closer to common English Bible usage.
- source_word: בְּנֵי גֵרְשׁוֹן
  chosen: the sons of Gershon
  alternatives:
  - the Gershonites
  lexicon: HALOT
  rationale: Formal kinship expression preserved. 'Gershonites' is idiomatic but less transparent to the Hebrew construction.
- source_word: כָּל הָעֹבֵד
  chosen: everyone serving
  alternatives:
  - all who served
  - everyone who did the work
  lexicon: HALOT
  rationale: The participle denotes those engaged in service. 'Everyone serving' is natural English and preserves the ongoing/service sense.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: Conventional and accurate rendering of the sanctuary designation. 'In' reflects the preposition directly, though the phrase can function more broadly for service connected with the tabernacle.
- source_word: אֲשֶׁר פָּקַד
  chosen: whom ... counted
  alternatives:
  - who were counted by
  - whom ... enrolled
  lexicon: HALOT
  rationale: Relative clause referring back to the counted Gershonites. Repeating 'counted' maintains lexical consistency with פקד in this verse.
- source_word: עַל פִּי יְהוָה
  chosen: at the command of the LORD
  alternatives:
  - according to the mouth of the LORD
  - by the word of the LORD
  lexicon: HALOT
  rationale: Idiomatic rendering of the Hebrew expression meaning by divine command/instruction. This is clearer in modern English while preserving the authority source.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
