id: NUM.4.10
reference: Numbers 4:10
source:
  edition: WLC
  text: וְ/נָתְנ֤וּ אֹתָ/הּ֙ וְ/אֶת כָּל כֵּלֶ֔י/הָ אֶל מִכְסֵ֖ה ע֣וֹר תָּ֑חַשׁ וְ/נָתְנ֖וּ
    עַל הַ/מּֽוֹט־־־־׃
translation:
  text: They shall put it and all its utensils into a covering of fine leather, and
    they shall place it on the carrying pole.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew תַּחַשׁ (tachash) is uncertain; it may refer to a particular animal
      skin or to a kind of durable leather. Traditional renderings include 'porpoise
      skin' or similar identifications.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתְנוּ
  chosen: they shall put
  alternatives:
  - they shall place
  - they shall set
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in procedural instructions is best
    rendered as a future/modal sequence in English ('shall put'). 'Put' fits the first
    action of enclosing the object within a covering.
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - the lampstand
  lexicon: HALOT
  rationale: Feminine singular pronoun refers back to the lampstand from the previous
    verse. 'It' is natural English while preserving the anaphoric reference.
- source_word: כָּל כֵּלֶיהָ
  chosen: all its utensils
  alternatives:
  - all its vessels
  - all its implements
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for articles/equipment. In tabernacle context,
    'utensils' is clear modern English and suitably concrete.
- source_word: אֶל מִכְסֵה
  chosen: into a covering
  alternatives:
  - in a covering
  - inside a covering
  lexicon: HALOT
  rationale: The preposition אֶל after נתן can indicate placing something into or
    within. 'Into a covering' best conveys the act of enclosing the object.
- source_word: עוֹר תַּחַשׁ
  chosen: fine leather
  alternatives:
  - goatskin
  - porpoise skin
  - durable leather
  - tachash skin
  lexicon: HALOT
  rationale: The precise animal denoted by תַּחַשׁ is uncertain. Rather than preserve
    a speculative traditional identification, 'fine leather' communicates a high-quality
    protective hide covering in readable English. Alternatives are worth preserving
    because the term is lexically disputed.
- source_word: וְנָתְנוּ
  chosen: they shall place
  alternatives:
  - they shall put
  - they shall set
  lexicon: HALOT
  rationale: The repeated verb introduces the next step in the procedure. 'Place'
    gives a slightly more specific sense for positioning the wrapped object for transport.
- source_word: עַל הַמּוֹט
  chosen: on the carrying pole
  alternatives:
  - on the pole
  - upon the bar
  - on the carrying frame
  lexicon: HALOT
  rationale: מּוֹט denotes a pole/bar used for carrying. Singular is retained as in
    the Hebrew. 'Carrying pole' makes the transport function explicit without overparaphrasing.
