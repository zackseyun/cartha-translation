id: NUM.4.4
reference: Numbers 4:4
source:
  edition: WLC
  text: זֹ֛את עֲבֹדַ֥ת בְּנֵי קְהָ֖ת בְּ/אֹ֣הֶל מוֹעֵ֑ד קֹ֖דֶשׁ הַ/קֳּדָשִֽׁים־׃
translation:
  text: 'This is the service of the sons of Kohath in the tent of meeting: the most
    holy things.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Holy of Holies' / 'the most holy place.' Here the phrase likely
      refers to the holiest sacred objects rather than only the inner sanctuary.
    reason: alternative_reading
lexical_decisions:
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: Demonstrative feminine singular introducing the clause; in English, 'This
    is' naturally supplies the copula implied in Hebrew.
- source_word: עֲבֹדַת
  chosen: the service
  alternatives:
  - the work
  - the duty
  lexicon: HALOT
  rationale: עֲבֹדָה here denotes assigned cultic labor or duty. 'Service' best captures
    the formal, sacred task without sounding overly mechanical.
- source_word: בְּנֵי קְהָת
  chosen: the sons of Kohath
  alternatives:
  - the descendants of Kohath
  - the Kohathites
  lexicon: HALOT
  rationale: A literal rendering preserves the Hebrew kinship expression. 'Kohathites'
    is possible, but 'sons of Kohath' is more transparent to the source while remaining
    readable.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: Standard rendering for the tabernacle designation. The preposition ב
    here is naturally rendered 'in,' indicating the sphere/location of their service.
- source_word: קֹדֶשׁ הַקֳּדָשִׁים
  chosen: the most holy things
  alternatives:
  - the holy of holies
  - the most holy place
  - the holiest things
  lexicon: HALOT
  rationale: In this context the phrase refers to the holiest sacred objects under
    Kohathite care, not strictly the inner sanctuary as a location. 'The most holy
    things' best fits the immediate context of duties concerning sacred items.
