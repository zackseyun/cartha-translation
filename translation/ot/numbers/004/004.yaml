theological_decisions:
- issue: Referent of קֹדֶשׁ הַקֳּדָשִׁים
  chosen_reading: Refers to the most holy sacred objects entrusted to the Kohathites
  alternative_readings:
  - Refers to the Most Holy Place / Holy of Holies as a location
  rationale: The broader context of Numbers 4 concerns the transport and handling
    of tabernacle furnishings by the Kohathites. Therefore the phrase is best understood
    functionally as the holiest things rather than spatially as the inner room alone.
