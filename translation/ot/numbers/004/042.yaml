id: NUM.4.42
reference: Numbers 4:42
source:
  edition: WLC
  text: וּ/פְקוּדֵ֕י מִשְׁפְּחֹ֖ת בְּנֵ֣י מְרָרִ֑י לְ/מִשְׁפְּחֹתָ֖/ם לְ/בֵ֥ית אֲבֹתָֽ/ם׃
translation:
  text: 'And the numbered men of the clans of the sons of Merari, by their clans,
    by their fathers'' houses:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the census of the clans of the sons of Merari."
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פְקוּדֵי
  chosen: And the numbered men of
  alternatives:
  - And those counted of
  - And the census of
  lexicon: HALOT
  rationale: The construct plural of פקד here refers to those enrolled/counting results
    in the census context of Numbers 4. 'Numbered men' makes explicit the counted
    persons rather than an abstract 'census,' matching the surrounding tally formula.
    'And' preserves the prefixed conjunction.
- source_word: מִשְׁפְּחֹת
  chosen: the clans of
  alternatives:
  - the families of
  lexicon: HALOT
  rationale: מִשְׁפָּחָה commonly denotes a kinship subdivision within a tribe. 'Clans'
    better reflects the social unit in this census context than the more modern-sounding
    'families.'
- source_word: בְּנֵי מְרָרִי
  chosen: the sons of Merari
  alternatives:
  - the descendants of Merari
  lexicon: HALOT
  rationale: A formal rendering is appropriate for the genealogical expression. 'Sons
    of Merari' preserves the Hebrew idiom and its lineage emphasis; 'descendants'
    is possible but less textually transparent.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their clans
  lexicon: HALOT
  rationale: The preposition ל here marks classification. 'By their clans' is concise
    modern English that preserves the organizational sense.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers' houses
  alternatives:
  - according to their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: This is a standard census/genealogical formula. 'Fathers' houses' is
    a conventional and transparent rendering for בית אבות, preserving the patriarchal
    household structure named in the Hebrew.
