id: NUM.4.39
reference: Numbers 4:39
source:
  edition: WLC
  text: מִ/בֶּ֨ן שְׁלֹשִׁ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה וְ/עַ֖ד בֶּן חֲמִשִּׁ֣ים שָׁנָ֑ה
    כָּל הַ/בָּא֙ לַ/צָּבָ֔א לַ/עֲבֹדָ֖ה בְּ/אֹ֥הֶל מוֹעֵֽד־־׃
translation:
  text: from thirty years old and upward, up to fifty years old, everyone who enters
    the service to do the work in the tent of meeting—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone who comes for duty to do the work in the tent of meeting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֶּן שְׁלֹשִׁים שָׁנָה וָמַעְלָה
  chosen: from thirty years old and upward
  alternatives:
  - from thirty years old and above
  - from the age of thirty and upward
  lexicon: HALOT
  rationale: The idiom literally uses 'from a son of thirty years and upward' to mark
    minimum age. 'From thirty years old and upward' is natural English and preserves
    the formal age-range structure.
- source_word: וְעַד בֶּן חֲמִשִּׁים שָׁנָה
  chosen: up to fifty years old
  alternatives:
  - even to fifty years old
  - to the age of fifty years
  lexicon: HALOT
  rationale: This completes the age range. 'Up to' is clear modern English and accurately
    conveys the upper limit without unnecessary archaism.
- source_word: כָּל הַבָּא
  chosen: everyone who enters
  alternatives:
  - all who come
  - everyone who comes
  lexicon: HALOT
  rationale: The participle of בוא literally means 'the one coming/entering.' In this
    census-and-duty context, 'everyone who enters' captures admission into service
    and reads smoothly in English.
- source_word: לַצָּבָא
  chosen: the service
  alternatives:
  - the duty
  - the company
  - the host
  lexicon: HALOT
  rationale: Although צבא often denotes army/host, in Numbers 4 it is used for organized
    Levitical duty. 'Service' best reflects the structured labor without importing
    a strictly military sense, while still preserving the idea of an assigned corps.
- source_word: לַעֲבֹדָה
  chosen: to do the work
  alternatives:
  - for the work
  - for service
  lexicon: HALOT
  rationale: עֲבֹדָה denotes labor/service. Rendering it with 'to do the work' distinguishes
    it from the preceding צבא and avoids flattening both terms into the same English
    gloss.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: This is the standard rendering of the tabernacle designation. 'In' fits
    the Hebrew preposition and the context of work performed in relation to the sanctuary.
