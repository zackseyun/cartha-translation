id: NUM.4.11
reference: Numbers 4:11
source:
  edition: WLC
  text: וְ/עַ֣ל מִזְבַּ֣ח הַ/זָּהָ֗ב יִפְרְשׂוּ֙ בֶּ֣גֶד תְּכֵ֔לֶת וְ/כִסּ֣וּ אֹת֔/וֹ
    בְּ/מִכְסֵ֖ה ע֣וֹר תָּ֑חַשׁ וְ/שָׂמ֖וּ אֶת בַּדָּֽי/ו׀־׃
translation:
  text: And over the gold altar they shall spread a blue cloth, and cover it with
    a covering of fine leather, and put its poles in place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a covering of leather from tachash skin'; the precise animal denoted
      by tachash is uncertain. Proposed renderings include 'fine leather,' 'dugong
      skin,' and similar durable-hide terms.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח הַזָּהָב
  chosen: the gold altar
  alternatives:
  - the golden altar
  lexicon: HALOT
  rationale: 'A straightforward construct phrase: ''altar of the gold'' idiomatically
    means ''the gold altar.'' ''Golden altar'' is also natural English, but ''gold
    altar'' stays slightly closer to the Hebrew wording while remaining readable.'
- source_word: יִפְרְשׂוּ
  chosen: they shall spread
  alternatives:
  - they shall spread out
  lexicon: HALOT
  rationale: The verb פרשׂ commonly means to spread or spread out. 'Spread' is sufficient
    in English and fits the ritual action of laying the cloth over the altar.
- source_word: בֶּגֶד תְּכֵלֶת
  chosen: a blue cloth
  alternatives:
  - a cloth of blue
  - a blue-purple cloth
  lexicon: HALOT
  rationale: בגד is a garment/cloth, and תכלת denotes the distinctive blue/purple-blue
    dyed material used in tabernacle contexts. 'Blue cloth' is clear modern English
    and preserves the cultic color reference without over-specifying the exact ancient
    hue.
- source_word: וְכִסּוּ אֹתוֹ
  chosen: and cover it
  alternatives:
  - and they shall cover it
  lexicon: HALOT
  rationale: The waw plus perfect continues the sequence of instructions. English
    can naturally render this as a coordinated future instruction, 'and cover it,'
    with the subject carried over from the prior verb.
- source_word: בְּמִכְסֵה עוֹר תָּחַשׁ
  chosen: with a covering of fine leather
  alternatives:
  - with a covering of goat/porpoise skin
  - with a covering of dugong skin
  - with a covering of tachash skin
  lexicon: HALOT
  rationale: מכסה is 'covering.' עור is 'skin/leather.' The precise identification
    of תחש is uncertain; rather than falsely specify an animal, 'fine leather' communicates
    a durable outer covering in readable English. Because the underlying animal term
    is debated, alternatives should be preserved in a footnote.
- source_word: וְשָׂמוּ אֶת בַּדָּיו
  chosen: and put its poles in place
  alternatives:
  - and place its poles
  - and set its carrying poles
  lexicon: HALOT
  rationale: בדים are the poles used for carrying tabernacle furnishings. 'Put its
    poles in place' makes explicit the functional sense of the action while remaining
    close to the Hebrew.
