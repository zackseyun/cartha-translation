id: NUM.4.49
reference: Numbers 4:49
source:
  edition: WLC
  text: עַל פִּ֨י יְהוָ֜ה פָּקַ֤ד אוֹתָ/ם֙ בְּ/יַד מֹשֶׁ֔ה אִ֥ישׁ אִ֛ישׁ עַל עֲבֹדָת֖/וֹ
    וְ/עַל מַשָּׂא֑/וֹ וּ/פְקֻדָ֕י/ו אֲשֶׁר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־־־־׃פ
translation:
  text: At the command of the LORD they were counted by the hand of Moses, each man
    according to his service and according to his burden; and his assignment was as
    the LORD had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By the command of the LORD.' Literally, 'Upon the mouth of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'through Moses' for 'by the hand of Moses.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term may also be understood as 'appointment,' 'oversight,' or
      'charge.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל־פִּי יְהוָה
  chosen: At the command of the LORD
  alternatives:
  - According to the mouth of the LORD
  - By the command of the LORD
  lexicon: HALOT
  rationale: The idiom עַל־פִּי literally means 'upon the mouth of,' but in context
    means 'by/at the command of.' 'The LORD' follows the project default for יְהוָה.
- source_word: פָּקַד אֹתָם
  chosen: they were counted
  alternatives:
  - he appointed them
  - he mustered them
  - he numbered them
  lexicon: HALOT
  rationale: פקד has a broad semantic range including count, muster, appoint, and
    attend to. In Numbers 4 the immediate context is the census/registration of Levites
    for assigned duties, so 'were counted' best captures the administrative action
    without overreading appointment as the main verb here.
- source_word: בְּיַד מֹשֶׁה
  chosen: by the hand of Moses
  alternatives:
  - through Moses
  - under Moses' direction
  lexicon: HALOT
  rationale: This Hebrew idiom commonly indicates agency or instrumentality mediated
    through a person. 'By the hand of Moses' preserves the idiom while remaining understandable
    in English.
- source_word: אִישׁ אִישׁ
  chosen: each man
  alternatives:
  - man by man
  - each one
  lexicon: HALOT
  rationale: The distributive repetition emphasizes individual assignment. 'Each man'
    preserves the masculine singular form and distributive force in line with the
    gender-accurate policy.
- source_word: עַל עֲבֹדָתוֹ
  chosen: according to his service
  alternatives:
  - for his service
  - over his work
  lexicon: HALOT
  rationale: עֲבֹדָה here refers to the assigned cultic labor/duty of each Levite
    clan member. 'According to his service' fits the distributive structure introduced
    by אִישׁ אִישׁ.
- source_word: וְעַל מַשָּׂאוֹ
  chosen: and according to his burden
  alternatives:
  - and according to his load
  - and according to what he was to carry
  lexicon: HALOT
  rationale: מַשָּׂא denotes a load or burden, especially what is carried in transport
    of tabernacle items. 'Burden' is concise and traditional, though concrete enough
    in context.
- source_word: וּפְקֻדָיו
  chosen: and his assignment
  alternatives:
  - and his oversight
  - and his appointment
  - and those counted of him
  lexicon: HALOT
  rationale: The form is difficult, deriving from פקד. In this context it most naturally
    refers to the individual's appointed charge/assignment within the census and service
    structure. Singular English fits the attached 3ms suffix and the flow of the sentence.
- source_word: אֲשֶׁר צִוָּה יְהוָה אֶת־מֹשֶׁה
  chosen: was as the LORD had commanded Moses
  alternatives:
  - which the LORD commanded Moses
  - just as the LORD commanded Moses
  lexicon: HALOT
  rationale: This relative clause most naturally qualifies the preceding assignment/counting
    arrangement as conforming to divine command given to Moses. The English supplies
    'was as' for smoothness and clarity.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
