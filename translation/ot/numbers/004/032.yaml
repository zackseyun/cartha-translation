id: NUM.4.32
reference: Numbers 4:32
source:
  edition: WLC
  text: וְ/עַמּוּדֵי֩ הֶ/חָצֵ֨ר סָבִ֜יב וְ/אַדְנֵי/הֶ֗ם וִֽ/יתֵדֹתָ/ם֙ וּ/מֵ֣יתְרֵי/הֶ֔ם
    לְ/כָל כְּלֵי/הֶ֔ם וּ/לְ/כֹ֖ל עֲבֹדָתָ֑/ם וּ/בְ/שֵׁמֹ֣ת תִּפְקְד֔וּ אֶת כְּלֵ֖י
    מִשְׁמֶ֥רֶת מַשָּׂאָֽ/ם־־׃
translation:
  text: and the pillars of the surrounding court, with their bases, their pegs, and
    their cords, with all their equipment and with all their service; and you shall
    assign by name the items of the duty of their burden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more smoothly: ''you shall assign by name the equipment each man is
      responsible to carry.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמּוּדֵי הֶחָצֵר סָבִיב
  chosen: the pillars of the surrounding court
  alternatives:
  - the pillars of the court all around
  - the pillars around the court
  lexicon: HALOT
  rationale: עַמּוּדִים are structural pillars/posts. הֶחָצֵר is 'court/courtyard.'
    סָבִיב functions adverbially/adjectivally, indicating encircling position. 'Surrounding
    court' is concise modern English while preserving the sense of the court's perimeter.
- source_word: אַדְנֵיהֶם
  chosen: their bases
  alternatives:
  - their sockets
  lexicon: HALOT
  rationale: אֶדֶן in tabernacle contexts often refers to a base or socket for a structural
    element. 'Bases' is clearer for modern readers; 'sockets' is a viable more technical
    alternative.
- source_word: יְתֵדֹתָם
  chosen: their pegs
  alternatives:
  - their stakes
  lexicon: HALOT
  rationale: יָתֵד denotes a peg/stake used in securing tent structures. 'Pegs' fits
    the tabernacle hardware context and reads naturally alongside cords.
- source_word: מֵיתְרֵיהֶם
  chosen: their cords
  alternatives:
  - their ropes
  lexicon: HALOT
  rationale: מֵיתָר refers to cord/rope, especially tent cords. 'Cords' is slightly
    more idiomatic in sanctuary/tabernacle descriptions.
- source_word: לְכָל כְּלֵיהֶם
  chosen: with all their equipment
  alternatives:
  - for all their utensils
  - with all their furnishings
  lexicon: HALOT
  rationale: 'כְּלִים is broad: vessels, implements, articles, equipment. Here it
    refers to associated items/hardware rather than cultic vessels specifically, so
    ''equipment'' best captures the practical sense.'
- source_word: וּלְכֹל עֲבֹדָתָם
  chosen: with all their service
  alternatives:
  - for all their work
  - with all their duties
  lexicon: HALOT
  rationale: עֲבֹדָה can mean service, work, duty. In Numbers 4 it often denotes assigned
    Levitical service. 'Service' preserves the formal cultic/assigned-labor nuance.
- source_word: וּבְשֵׁמֹת תִּפְקְדוּ
  chosen: you shall assign by name
  alternatives:
  - you shall appoint by name
  - you shall list by name
  lexicon: HALOT
  rationale: פקד in this stem can mean appoint, assign, muster, take note of. With
    בְשֵׁמוֹת ('by names/name by name'), the sense is individualized designation of
    responsibility, not merely counting. 'Assign by name' best fits the context of
    distributing carrying duties.
- source_word: כְּלֵי מִשְׁמֶרֶת מַשָּׂאָם
  chosen: the items of the duty of their burden
  alternatives:
  - the equipment for the charge of their load
  - the articles of the responsibility of what they carry
  lexicon: HALOT
  rationale: This compressed phrase combines כְּלֵי ('items/articles/equipment'),
    מִשְׁמֶרֶת ('charge, duty, responsibility'), and מַשָּׂא ('load, burden, what
    is carried'). The sense is the specific items each is responsible to carry. The
    chosen rendering stays close to the Hebrew structure while remaining intelligible.
    Because the Hebrew is dense, an alternative smoother rendering is worth preserving
    in a footnote.
