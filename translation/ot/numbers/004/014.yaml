id: NUM.4.14
reference: Numbers 4:14
source:
  edition: WLC
  text: וְ/נָתְנ֣וּ עָ֠לָי/ו אֶֽת כָּל כֵּלָ֞י/ו אֲשֶׁ֣ר יְֽשָׁרְת֧וּ עָלָ֣י/ו בָּ/הֶ֗ם
    אֶת הַ/מַּחְתֹּ֤ת אֶת הַ/מִּזְלָגֹת֙ וְ/אֶת הַ/יָּעִ֣ים וְ/אֶת הַ/מִּזְרָקֹ֔ת
    כֹּ֖ל כְּלֵ֣י הַ/מִּזְבֵּ֑חַ וּ/פָרְשׂ֣וּ עָלָ֗י/ו כְּס֛וּי ע֥וֹר תַּ֖חַשׁ וְ/שָׂמ֥וּ
    בַדָּֽי/ו־־־־־־׃
translation:
  text: 'Then they shall place on it all its utensils with which they minister at
    it: the fire pans, the forks, the shovels, and the basins—all the utensils of
    the altar. Then they shall spread over it a covering of fine leather and put its
    poles in place.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a covering of goatskin,' 'a covering of porpoise skin,' or more generally
      'a covering of durable leather.' The Hebrew term for the animal/hide (taḥash)
      is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתְנוּ
  chosen: Then they shall place
  alternatives:
  - and they shall put
  - and they shall set
  lexicon: HALOT
  rationale: Qal waw-consecutive from נתן in procedural instructions; 'place' is natural
    modern English for arranging sacred objects on the altar while preserving the
    sequential force with 'Then'.
- source_word: עָלָיו
  chosen: on it
  alternatives:
  - upon it
  - over it
  lexicon: HALOT
  rationale: Refers to the altar in context. 'On it' fits the placement of utensils
    onto the altar structure.
- source_word: כָּל כֵּלָיו
  chosen: all its utensils
  alternatives:
  - all its vessels
  - all its implements
  lexicon: HALOT
  rationale: כְּלִי is a broad term for articles/equipment. 'Utensils' suits cultic
    service items in contemporary English better than the more archaic 'vessels,'
    while remaining concrete.
- source_word: אֲשֶׁר יְשָׁרְתוּ עָלָיו בָּהֶם
  chosen: with which they minister at it
  alternatives:
  - with which they serve on it
  - with which they perform service at it
  lexicon: HALOT
  rationale: שרת denotes ministering/serving in cultic context. 'Minister' preserves
    sacred-service nuance. 'At it' is smoother in English than repeating 'on it' for
    the altar.
- source_word: הַמַּחְתֹּת
  chosen: the fire pans
  alternatives:
  - the censers
  - the pans
  lexicon: HALOT
  rationale: מַחְתָּה refers to a pan for carrying coals/fire. In altar context 'fire
    pans' is more precise than 'censers,' which may suggest incense specifically.
- source_word: הַמִּזְלָגֹת
  chosen: the forks
  alternatives:
  - the flesh-hooks
  lexicon: HALOT
  rationale: The implement is fork-like; 'forks' is clear modern English. 'Flesh-hooks'
    is more traditional but overly specific here.
- source_word: הַיָּעִים
  chosen: the shovels
  alternatives:
  - the scoops
  lexicon: HALOT
  rationale: יעים are ash-removal tools; 'shovels' is the standard and clearest rendering
    in altar-service contexts.
- source_word: הַמִּזְרָקֹת
  chosen: the basins
  alternatives:
  - the bowls
  lexicon: HALOT
  rationale: These are vessels for tossing/sprinkling blood or holding liquids. 'Basins'
    better conveys liturgical utility than the more domestic-sounding 'bowls.'
- source_word: כֹּל כְּלֵי הַמִּזְבֵּחַ
  chosen: all the utensils of the altar
  alternatives:
  - all the vessels of the altar
  - every implement of the altar
  lexicon: HALOT
  rationale: Summative apposition restating the listed items. Repeating 'utensils'
    maintains consistency with כֵּלָיו earlier in the verse.
- source_word: וּפָרְשׂוּ עָלָיו
  chosen: Then they shall spread over it
  alternatives:
  - and they shall spread on it
  - and they shall cover it with
  lexicon: HALOT
  rationale: פרשׂ means to spread out. Rendering the verbal idea explicitly avoids
    collapsing it into the following noun 'covering' too early.
- source_word: כְּסוּי
  chosen: a covering
  alternatives:
  - a cover
  lexicon: HALOT
  rationale: Noun from כסה, denoting what covers. 'A covering' is slightly more formal
    and fits tabernacle-inventory style.
- source_word: עוֹר תַּחַשׁ
  chosen: fine leather
  alternatives:
  - goatskin
  - porpoise skin
  - durable leather
  lexicon: HALOT
  rationale: The exact animal denoted by תַּחַשׁ is uncertain. Rather than preserve
    a speculative zoological identification, 'fine leather' communicates a high-quality
    protective hide in readable English. Alternative possibilities are preserved in
    a footnote due to lexical uncertainty.
- source_word: וְשָׂמוּ בַדָּיו
  chosen: and put its poles in place
  alternatives:
  - and set its poles
  - and place its carrying poles
  lexicon: HALOT
  rationale: בַּדִּים are carrying poles for transport. 'In place' clarifies the action
    idiomatically in English, likely meaning insertion/preparation for carrying.
