id: NUM.4.47
reference: Numbers 4:47
source:
  edition: WLC
  text: מִ/בֶּ֨ן שְׁלֹשִׁ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה וְ/עַ֖ד בֶּן חֲמִשִּׁ֣ים שָׁנָ֑ה
    כָּל הַ/בָּ֗א לַ/עֲבֹ֨ד עֲבֹדַ֧ת עֲבֹדָ֛ה וַ/עֲבֹדַ֥ת מַשָּׂ֖א בְּ/אֹ֥הֶל מוֹעֵֽד־־׃
translation:
  text: from thirty years old and upward, up to fifty years old, everyone who comes
    to perform the work of service and the service of carrying loads in the tent of
    meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the work of labor and the labor of bearing burdens.' The Hebrew repeats
      forms of the same noun for emphasis or categorization.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֶּן ... וָמַעְלָה
  chosen: from thirty years old and upward
  alternatives:
  - from the age of thirty and above
  - from thirty years old and over
  lexicon: HALOT
  rationale: The idiom מִן + בֶּן + number + שָׁנָה with מַעְלָה marks a lower age
    limit. 'Years old and upward' preserves the formal structure while remaining natural
    English.
- source_word: וְעַד בֶּן חֲמִשִּׁים שָׁנָה
  chosen: up to fifty years old
  alternatives:
  - even to fifty years old
  - to the age of fifty years
  lexicon: HALOT
  rationale: This phrase sets the upper age limit. 'Up to' is idiomatic and accurately
    conveys the inclusive range without unnecessary stiffness.
- source_word: כָּל הַבָּא
  chosen: everyone who comes
  alternatives:
  - all who enter
  - everyone who comes in
  lexicon: HALOT
  rationale: The participle of בוא here functions substantivally for those presenting
    themselves for duty. 'Everyone who comes' is a natural rendering that preserves
    the participial sense better than a more interpretive 'is qualified' or 'is assigned.'
- source_word: לַעֲבֹד
  chosen: to perform
  alternatives:
  - to serve
  - to do
  lexicon: HALOT
  rationale: The infinitive of עבד here introduces the purpose of coming. 'Perform'
    fits the following work terminology and avoids flattening the distinction between
    the verb and the repeated noun עֲבֹדָה.
- source_word: עֲבֹדַת עֲבֹדָה
  chosen: the work of service
  alternatives:
  - the service work
  - the labor of service
  lexicon: HALOT
  rationale: The doubled construction is somewhat emphatic or idiomatic. Rendering
    it as 'the work of service' preserves both elements without awkward repetition
    like 'service of service.'
- source_word: וַעֲבֹדַת מַשָּׂא
  chosen: and the service of carrying loads
  alternatives:
  - and the work of bearing burdens
  - and the service of transport
  lexicon: HALOT
  rationale: מַשָּׂא denotes a load or burden, especially something carried. 'Carrying
    loads' makes the concrete task clear in contemporary English while retaining the
    connection to service/work.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: This is the standard rendering of the tabernacle designation. 'In' matches
    the Hebrew preposition and suits the sphere of Levitical work, though 'at' would
    also be possible in English.
