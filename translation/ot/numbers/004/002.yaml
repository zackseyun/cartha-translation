id: NUM.4.2
reference: Numbers 4:2
source:
  edition: WLC
  text: נָשֹׂ֗א אֶת רֹאשׁ֙ בְּנֵ֣י קְהָ֔ת מִ/תּ֖וֹךְ בְּנֵ֣י לֵוִ֑י לְ/מִשְׁפְּחֹתָ֖/ם
    לְ/בֵ֥ית אֲבֹתָֽ/ם־׃
translation:
  text: Take a census of the sons of Kohath from among the sons of Levi, by their
    clans, by their fathers’ houses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Lift up the head of the sons of Kohath,' an idiom meaning
      to count or take a census.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשֹׂא
  chosen: Take
  alternatives:
  - Lift up
  - Count
  lexicon: HALOT
  rationale: The idiom נָשָׂא אֶת־רֹאשׁ literally means 'lift up the head,' but in
    administrative/military contexts it means to take a census or count. 'Take' preserves
    the Hebrew idiom's governing verb while allowing the object phrase to carry the
    census sense naturally in English.
- source_word: אֶת רֹאשׁ
  chosen: a census
  alternatives:
  - the head
  - the total
  lexicon: HALOT
  rationale: Together with נָשֹׂא, רֹאשׁ forms an idiom for numbering or mustering
    persons. Rendering the phrase as 'a census' communicates the established sense
    rather than a misleadingly literal 'head.'
- source_word: בְּנֵי קְהָת
  chosen: the sons of Kohath
  alternatives:
  - the Kohathites
  - the descendants of Kohath
  lexicon: HALOT
  rationale: '''Sons of Kohath'' is a transparent, formally close rendering of the
    Hebrew construct and fits the genealogical style of Numbers. ''Kohathites'' is
    possible but slightly less explicit than the source wording.'
- source_word: מִתּוֹךְ
  chosen: from among
  alternatives:
  - out of
  - from the midst of
  lexicon: HALOT
  rationale: This preposition marks selection from within a larger group. 'From among'
    is idiomatic modern English and clearly expresses that the Kohathites are being
    counted as a subgroup within Levi.
- source_word: בְּנֵי לֵוִי
  chosen: the sons of Levi
  alternatives:
  - the Levites
  - the descendants of Levi
  lexicon: HALOT
  rationale: The Hebrew is genealogical rather than adjectival. 'The sons of Levi'
    preserves that form and matches the parallel 'sons of Kohath.' 'Levites' would
    be acceptable but slightly less formally aligned.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  - by their family groups
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census and tribal contexts commonly refers to clan-level
    divisions. 'By their clans' is concise and contextually precise.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - according to their ancestral houses
  - by their family households
  lexicon: HALOT
  rationale: This is a standard Israelite kinship-administrative expression. 'Fathers’
    houses' preserves the patriarchal household structure named in the Hebrew better
    than a flattened 'families' or 'households.'
