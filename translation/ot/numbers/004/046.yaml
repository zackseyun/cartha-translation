id: NUM.4.46
reference: Numbers 4:46
source:
  edition: WLC
  text: כָּֽל הַ/פְּקֻדִ֡ים אֲשֶׁר֩ פָּקַ֨ד מֹשֶׁ֧ה וְ/אַהֲרֹ֛ן וּ/נְשִׂיאֵ֥י יִשְׂרָאֵ֖ל
    אֶת הַ/לְוִיִּ֑ם לְ/מִשְׁפְּחֹתָ֖/ם וּ/לְ/בֵ֥ית אֲבֹתָֽ/ם־־׃
translation:
  text: All those counted, whom Moses and Aaron and the leaders of Israel counted
    among the Levites, by their clans and by their fathers' houses—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those numbered' or 'those registered.' The Hebrew uses census language
      from the verb פקד.
    reason: lexical_alternative
  - marker: b
    text: '''Fathers'' houses'' refers to ancestral households or family divisions
      within the clans.'
    reason: cultural_note
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - The whole number of
  - All of
  lexicon: HALOT
  rationale: Introduces the totality of the group being summarized. 'All' is the most
    natural concise rendering in English.
- source_word: הַפְּקֻדִים
  chosen: those counted
  alternatives:
  - the counted ones
  - those numbered
  - the registered men
  lexicon: HALOT
  rationale: Passive participial form from פקד in a census context. 'Those counted'
    is natural English and preserves the census/register sense without over-specifying
    'men,' which is not explicit here.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  - who
  lexicon: HALOT
  rationale: Relative pronoun introducing the defining clause. 'Whom' fits the object
    function in formal English after 'counted,' though the clause remains readable.
- source_word: פָּקַד
  chosen: counted
  alternatives:
  - numbered
  - registered
  - mustered
  lexicon: HALOT
  rationale: In Numbers 4 the verb refers to taking an official count/census. 'Counted'
    is straightforward modern English and matches the participle earlier for consistency.
- source_word: וּנְשִׂיאֵי יִשְׂרָאֵל
  chosen: the leaders of Israel
  alternatives:
  - the chiefs of Israel
  - the princes of Israel
  lexicon: HALOT
  rationale: נשיאים denotes tribal leaders/chieftains. 'Leaders' is clear modern English
    and avoids the archaic or potentially misleading 'princes.'
- source_word: אֶת הַלְוִיִּם
  chosen: among the Levites
  alternatives:
  - the Levites
  - of the Levites
  lexicon: HALOT
  rationale: The direct-object marker marks 'the Levites' as the group counted. In
    idiomatic English after 'those counted,' 'counted among the Levites' clarifies
    the relationship without awkwardness.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their clans
  - by their families
  lexicon: HALOT
  rationale: משפחה commonly refers to clan-level family grouping. 'By their clans'
    is concise and preserves the organizational sense used in census formulas.
- source_word: וּלְבֵית אֲבֹתָם
  chosen: by their fathers' houses
  alternatives:
  - according to their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: בית אבות is a standard kinship/household unit in Israelite tribal organization.
    'Fathers' houses' is a conventional and sufficiently transparent rendering that
    preserves the source structure.
