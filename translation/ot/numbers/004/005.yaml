id: NUM.4.5
reference: Numbers 4:5
source:
  edition: WLC
  text: וּ/בָ֨א אַהֲרֹ֤ן וּ/בָנָי/ו֙ בִּ/נְסֹ֣עַ הַֽ/מַּחֲנֶ֔ה וְ/הוֹרִ֕דוּ אֵ֖ת פָּרֹ֣כֶת
    הַ/מָּסָ֑ךְ וְ/כִ֨סּוּ בָ֔/הּ אֵ֖ת אֲרֹ֥ן הָ/עֵדֻֽת־׃
translation:
  text: When the camp sets out, Aaron and his sons shall come and take down the veil
    of the screen, and cover the ark of the testimony with it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the ark of the covenant.' The Hebrew here, however,
      says 'testimony.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָא
  chosen: shall come
  alternatives:
  - shall enter
  - must come
  lexicon: HALOT
  rationale: 'Though morphologically singular, with the compound subject ''Aaron and
    his sons'' and following plural verbs, the sense is collective/future-instructional:
    ''Aaron and his sons shall come.'' English uses a plural subject with a plural
    sense naturally.'
- source_word: בִּנְסֹעַ הַמַּחֲנֶה
  chosen: When the camp sets out
  alternatives:
  - at the breaking of camp
  - when the camp journeys
  lexicon: HALOT
  rationale: The infinitive construct with ב marks the time circumstance. 'Sets out'
    is idiomatic modern English for the camp beginning its journey, balancing accuracy
    and readability.
- source_word: וְהוֹרִדוּ
  chosen: take down
  alternatives:
  - bring down
  - remove
  lexicon: HALOT
  rationale: In context of dismantling/packing tabernacle furnishings, 'take down'
    best conveys lowering/removing the curtain from its place.
- source_word: פָּרֹכֶת
  chosen: veil
  alternatives:
  - curtain
  lexicon: HALOT
  rationale: פָּרֹכֶת is the inner veil/curtain associated with the sanctuary partition.
    'Veil' preserves its cultic specificity better than the more generic 'curtain'.
- source_word: הַמָּסָךְ
  chosen: of the screen
  alternatives:
  - for the screen
  - covering
  lexicon: HALOT
  rationale: The construct phrase פָּרֹכֶת הַמָּסָךְ is rendered literally enough
    as 'the veil of the screen.' This preserves the Hebrew wording without over-paraphrasing,
    even if English might otherwise simplify to 'screening veil' or 'curtain.'
- source_word: וְכִסּוּ בָהּ
  chosen: and cover ... with it
  alternatives:
  - and wrap ... in it
  lexicon: HALOT
  rationale: כסה means 'cover.' The feminine pronoun refers back to the veil, so 'with
    it' makes the instrumental sense explicit in English.
- source_word: אֲרֹן הָעֵדֻת
  chosen: the ark of the testimony
  alternatives:
  - the ark of the covenant
  - the ark of the witness
  lexicon: HALOT
  rationale: The Hebrew here is explicitly 'testimony' (עֵדוּת), not 'covenant' (בְּרִית).
    To honor original-language primacy, the translation keeps 'testimony' rather than
    conforming to the more familiar traditional phrase 'ark of the covenant.'
