theological_decisions:
- issue: Traditional rendering of אֲרֹן הָעֵדֻת
  chosen_reading: the ark of the testimony
  alternative_readings:
  - the ark of the covenant
  rationale: The source text uses עֵדוּת ('testimony/witness'), so the translation
    avoids importing the more familiar but different expression 'ark of the covenant.'
    This follows the stated principle of original-language primacy over translation
    tradition.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
