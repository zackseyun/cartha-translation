id: NUM.4.34
reference: Numbers 4:34
source:
  edition: WLC
  text: וַ/יִּפְקֹ֨ד מֹשֶׁ֧ה וְ/אַהֲרֹ֛ן וּ/נְשִׂיאֵ֥י הָ/עֵדָ֖ה אֶת בְּנֵ֣י הַ/קְּהָתִ֑י
    לְ/מִשְׁפְּחֹתָ֖/ם וּ/לְ/בֵ֥ית אֲבֹתָֽ/ם־׃
translation:
  text: So Moses and Aaron and the leaders of the congregation counted the sons of
    the Kohathites by their clans and by their fathers’ houses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'numbered' or 'took a census of.' The Hebrew verb can also mean 'appoint'
      in other contexts, but here it refers to counting for service.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of the Kohathite,' that is, the Kohathite clan-group descended
      from Kohath.
    reason: lexical_alternative
  - marker: c
    text: '''Fathers’ houses'' is a traditional Israelite kinship term for ancestral
      households or family divisions.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּפְקֹד
  chosen: counted
  alternatives:
  - numbered
  - took a census of
  - appointed
  lexicon: HALOT
  rationale: In this census context in Numbers 4, פקד refers to numbering/enrolling
    persons rather than appointing them to office. 'Counted' is natural modern English
    and fits the direct object 'the sons of the Kohathites.'
- source_word: נְשִׂיאֵי הָעֵדָה
  chosen: the leaders of the congregation
  alternatives:
  - the chiefs of the community
  - the princes of the assembly
  lexicon: HALOT
  rationale: נשיאים are recognized tribal/community leaders. 'Leaders' communicates
    the role clearly in modern English; 'congregation' is a standard rendering for
    עֵדָה in Pentateuchal census/wilderness contexts.
- source_word: בְּנֵי הַקְּהָתִי
  chosen: the sons of the Kohathites
  alternatives:
  - the Kohathites
  - the descendants of Kohath
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of the Kohathite/Kohath.' 'Sons of the
    Kohathites' preserves the familial idiom while still reading naturally in English.
    'Kohathites' alone would be slightly smoother but would omit the explicit בני
    construction.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census/genealogical contexts is well rendered as 'clan,'
    indicating a kinship subdivision smaller than tribe. 'By' reflects the classificatory
    force of לְ here.
- source_word: וּלְבֵית אֲבֹתָם
  chosen: and by their fathers’ houses
  alternatives:
  - and according to their ancestral houses
  - and by their family houses
  lexicon: HALOT
  rationale: בֵית אָבוֹת is a technical kinship/genealogical expression in the Torah.
    'Fathers’ houses' preserves the source structure and social concept better than
    flattening it to 'families.'
