id: NUM.4.45
reference: Numbers 4:45
source:
  edition: WLC
  text: אֵ֣לֶּה פְקוּדֵ֔י מִשְׁפְּחֹ֖ת בְּנֵ֣י מְרָרִ֑י אֲשֶׁ֨ר פָּקַ֤ד מֹשֶׁה֙ וְ/אַהֲרֹ֔ן
    עַל פִּ֥י יְהוָ֖ה בְּ/יַד מֹשֶֽׁה־־׃
translation:
  text: These are the counted men of the families of the sons of Merari, whom Moses
    and Aaron counted at the mouth of the LORD, by the hand of Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''at the mouth of the LORD,'' that is, ''by the command of the
      LORD.'''
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''by the hand of Moses,'' that is, ''through Moses.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Standard demonstrative opening introducing the summary statement; 'These
    are' is natural English and preserves the presentational force.
- source_word: פְקוּדֵי
  chosen: the counted men
  alternatives:
  - those numbered
  - the enrollment
  - the appointed ones
  lexicon: HALOT
  rationale: From פקד in this census context, the noun refers to those registered/countable
    in the muster. 'The counted men' fits the military/census setting of Numbers 4
    and avoids the abstractness of 'enrollment.'
- source_word: מִשְׁפְּחֹת
  chosen: of the families
  alternatives:
  - of the clans
  lexicon: HALOT
  rationale: '''Families'' is the most direct rendering; ''clans'' is possible in
    tribal contexts, but ''families'' better matches the construct chain and remains
    readable.'
- source_word: בְּנֵי מְרָרִי
  chosen: of the sons of Merari
  alternatives:
  - of the Merarites
  - of Merari's sons
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew kinship expression.
    'Merarites' is idiomatic but less transparent to the source wording.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: Refers back to persons counted, so 'whom' is the most natural English
    relative pronoun.
- source_word: פָּקַד
  chosen: counted
  alternatives:
  - numbered
  - registered
  - mustered
  lexicon: HALOT
  rationale: Keeps lexical consistency with פְקוּדֵי and suits the census context.
    'Numbered' is also viable, but 'counted' is simpler modern English.
- source_word: עַל פִּי יְהוָה
  chosen: at the mouth of the LORD
  alternatives:
  - by the command of the LORD
  - according to the word of the LORD
  lexicon: HALOT
  rationale: Literally 'upon the mouth of YHWH.' The idiom means by divine command.
    To preserve auditability and the Hebrew imagery, the main text keeps the literal
    expression, while a footnote preserves the idiomatic sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: בְּיַד מֹשֶׁה
  chosen: by the hand of Moses
  alternatives:
  - through Moses
  - by Moses
  lexicon: HALOT
  rationale: This common Hebrew idiom indicates agency/instrumentality. The main text
    preserves the idiom; a footnote can clarify 'through Moses' as the sense.
