id: NUM.4.16
reference: Numbers 4:16
source:
  edition: WLC
  text: וּ/פְקֻדַּ֞ת אֶלְעָזָ֣ר בֶּן אַהֲרֹ֣ן הַ/כֹּהֵ֗ן שֶׁ֤מֶן הַ/מָּאוֹר֙ וּ/קְטֹ֣רֶת
    הַ/סַּמִּ֔ים וּ/מִנְחַ֥ת הַ/תָּמִ֖יד וְ/שֶׁ֣מֶן הַ/מִּשְׁחָ֑ה פְּקֻדַּ֗ת כָּל
    הַ/מִּשְׁכָּן֙ וְ/כָל אֲשֶׁר בּ֔/וֹ בְּ/קֹ֖דֶשׁ וּ/בְ/כֵלָֽי/ו׀־־־־׃ס
translation:
  text: And the oversight of Eleazar son of Aaron the priest shall be the oil for
    the light, the fragrant incense, the regular grain offering, and the anointing
    oil—the oversight of the whole tabernacle and of all that is in it, in the sanctuary
    and in its furnishings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'charge' or 'responsibility' for פְקֻדַּת; the Hebrew term denotes assigned
      supervision.
    reason: lexical_alternative
  - marker: b
    text: '''The regular grain offering'' could also be rendered ''the continual grain
      offering.'''
    reason: lexical_alternative
  - marker: c
    text: '''In the sanctuary'' may also be rendered ''in the holy place,'' though
      here it likely refers more broadly to the holy area and its sacred objects.'
    reason: lexical_alternative
  - marker: d
    text: '''Furnishings'' may also be translated ''vessels'' or ''utensils.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: פְקֻדַּת
  chosen: oversight
  alternatives:
  - charge
  - responsibility
  - appointment
  lexicon: HALOT
  rationale: The noun from פקד here denotes assigned supervision or responsibility.
    'Oversight' fits the administrative/priestly context better than the more abstract
    'appointment' and is smoother in English than repeating 'charge' twice, while
    still preserving the sense of entrusted supervision.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite title identifying Aaron's office; straightforwardly rendered
    'the priest.'
- source_word: שֶׁמֶן הַמָּאוֹר
  chosen: the oil for the light
  alternatives:
  - the lamp oil
  - the oil for lighting
  lexicon: HALOT
  rationale: Literally 'oil of the light.' 'The oil for the light' preserves the Hebrew
    construction and likely refers to the oil used for the lampstand. 'Lamp oil' is
    possible but slightly more interpretive.
- source_word: קְטֹרֶת הַסַּמִּים
  chosen: the fragrant incense
  alternatives:
  - the incense of spices
  - the spiced incense
  lexicon: HALOT
  rationale: The phrase refers to incense compounded from aromatic spices. 'Fragrant
    incense' is idiomatic modern English and conveys the sense without unnecessary
    awkwardness.
- source_word: מִנְחַת הַתָּמִיד
  chosen: the regular grain offering
  alternatives:
  - the continual grain offering
  - the daily grain offering
  lexicon: HALOT
  rationale: מִנְחָה is the grain offering; תָּמִיד denotes regular/continual recurrence.
    'Regular grain offering' is clear and avoids over-specifying 'daily' where the
    Hebrew says 'continual/regular,' though the practice was daily.
- source_word: שֶׁמֶן הַמִּשְׁחָה
  chosen: the anointing oil
  alternatives:
  - the oil of anointing
  lexicon: HALOT
  rationale: Standard and natural rendering of the construct phrase, preserving cultic
    meaning.
- source_word: כָּל הַמִּשְׁכָּן
  chosen: the whole tabernacle
  alternatives:
  - all the tabernacle
  - the entire dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן in Numbers refers to the tabernacle. 'Whole tabernacle' is
    idiomatic and preserves the totalizing force of כָּל.
- source_word: וְכָל אֲשֶׁר בּוֹ
  chosen: and of all that is in it
  alternatives:
  - and everything in it
  lexicon: HALOT
  rationale: This directly renders the relative clause while maintaining formal clarity.
- source_word: בְּקֹדֶשׁ
  chosen: in the sanctuary
  alternatives:
  - in the holy place
  - in holiness
  lexicon: HALOT
  rationale: In this context the phrase is spatial and cultic, not abstract. 'In the
    sanctuary' best captures the referent without restricting it too narrowly to the
    inner room 'Holy Place.'
- source_word: וּבְכֵלָיו
  chosen: and in its furnishings
  alternatives:
  - and its vessels
  - and its utensils
  lexicon: HALOT
  rationale: כֵּלִים can mean vessels, implements, or furnishings. Because the referent
    is the tabernacle and its sacred equipment broadly, 'furnishings' is natural English
    and suitably comprehensive.
