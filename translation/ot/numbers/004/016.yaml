theological_decisions:
- issue: Referent and force of repeated פְּקֻדַּת
  chosen_reading: Eleazar is assigned supervisory responsibility over both the listed
    sacred substances and, more broadly, the whole tabernacle and its contents.
  alternative_readings:
  - 'The second פְּקֻדַּת may be taken appositionally as a summary heading: ''the
    oversight of the whole tabernacle...'''
  - Some translations leave the verbless structure more elliptical without supplying
    'shall be'.
  rationale: The Hebrew is nominal and somewhat appositional. English requires a smoother
    predicative structure, so 'shall be' is supplied to show that these items constitute
    Eleazar's assigned oversight. This does not add doctrine, only clarifies syntax.
  doctrine_reference: Translation philosophy §§1, 5, 6
