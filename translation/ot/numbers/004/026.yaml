id: NUM.4.26
reference: Numbers 4:26
source:
  edition: WLC
  text: וְ/אֵת֩ קַלְעֵ֨י הֶֽ/חָצֵ֜ר וְ/אֶת מָסַ֣ךְ פֶּ֣תַח שַׁ֣עַר הֶ/חָצֵ֗ר אֲשֶׁ֨ר
    עַל הַ/מִּשְׁכָּ֤ן וְ/עַל הַ/מִּזְבֵּ֨חַ֙ סָבִ֔יב וְ/אֵת֙ מֵֽיתְרֵי/הֶ֔ם וְ/אֶֽת
    כָּל כְּלֵ֖י עֲבֹדָתָ֑/ם וְ/אֵ֨ת כָּל אֲשֶׁ֧ר יֵעָשֶׂ֛ה לָ/הֶ֖ם וְ/עָבָֽדוּ־׀׀־־־־־׃
translation:
  text: and the hangings of the court, and the screen for the entrance of the gate
    of the court that is around the tabernacle and around the altar, and their ropes,
    and all the equipment for their service, and all that is to be done with them.
    And they shall serve.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cords' for 'ropes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all that is to be done for them.' The Hebrew may refer either to tasks
      done with these items or tasks done for them in the course of service.
    reason: alternative_reading
lexical_decisions:
- source_word: קַלְעֵי
  chosen: hangings
  alternatives:
  - curtains
  lexicon: HALOT
  rationale: Refers to the fabric hangings forming the court enclosure. 'Hangings'
    is a natural English rendering in tabernacle contexts and distinguishes them from
    interior curtains.
- source_word: חָצֵר
  chosen: court
  alternatives:
  - courtyard
  lexicon: HALOT
  rationale: In tabernacle terminology this denotes the enclosed outer area. 'Court'
    is concise and traditional without being archaic.
- source_word: מָסַךְ
  chosen: screen
  alternatives:
  - covering
  - curtain
  lexicon: HALOT
  rationale: In sanctuary contexts this term commonly denotes a textile screen at
    an entrance. 'Screen' best fits the gate/entrance function here.
- source_word: פֶּתַח שַׁעַר
  chosen: the entrance of the gate
  alternatives:
  - the gate entrance
  - the doorway of the gate
  lexicon: HALOT
  rationale: The construct chain is somewhat redundant in English but emphasizes the
    entryway at the court gate. 'The entrance of the gate' preserves the Hebrew structure
    more closely while remaining understandable.
- source_word: אֲשֶׁר עַל הַמִּשְׁכָּן וְעַל הַמִּזְבֵּחַ סָבִיב
  chosen: that is around the tabernacle and around the altar
  alternatives:
  - which surrounds the tabernacle and the altar
  - which is by the tabernacle and the altar all around
  lexicon: HALOT
  rationale: The relative clause modifies the court gate screen within the larger
    description of the court enclosure situated around both tabernacle and altar.
    Repeating 'around' reflects סָבִיב and clarifies the spatial relation.
- source_word: מֵיתְרֵיהֶם
  chosen: their ropes
  alternatives:
  - their cords
  lexicon: HALOT
  rationale: Refers to the ropes/cords associated with the hangings and screen. 'Ropes'
    is more immediately clear in modern English.
- source_word: כְּלֵי עֲבֹדָתָם
  chosen: all the equipment for their service
  alternatives:
  - all the utensils of their service
  - all the articles for their work
  lexicon: HALOT
  rationale: כְּלִים is broad for implements/articles; 'equipment' is readable modern
    English. 'Service' preserves the cultic/labor sense of עֲבֹדָה.
- source_word: כָּל אֲשֶׁר יֵעָשֶׂה לָהֶם
  chosen: all that is to be done with them
  alternatives:
  - all that shall be done for them
  - everything by which service is performed with them
  lexicon: HALOT
  rationale: The Niphal/passive-like sense indicates whatever tasks are performed
    involving these items. 'With them' best fits the handling/use of the listed objects
    in context.
- source_word: וְעָבָדוּ
  chosen: And they shall serve
  alternatives:
  - and they shall work
  - and they shall perform the service
  lexicon: HALOT
  rationale: This concluding verb states the Merarites' execution of the assigned
    labor. 'Serve' preserves the formal-cultic nuance of עבד in tabernacle duty.
