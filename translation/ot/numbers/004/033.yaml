id: NUM.4.33
reference: Numbers 4:33
source:
  edition: WLC
  text: זֹ֣את עֲבֹדַ֗ת מִשְׁפְּחֹת֙ בְּנֵ֣י מְרָרִ֔י לְ/כָל עֲבֹדָתָ֖/ם בְּ/אֹ֣הֶל
    מוֹעֵ֑ד בְּ/יַד֙ אִֽיתָמָ֔ר בֶּֽן אַהֲרֹ֖ן הַ/כֹּהֵֽן־־׃
translation:
  text: This is the service of the clans of the sons of Merari for all their service
    in the tent of meeting, under the direction of Ithamar son of Aaron the priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'by the hand of Ithamar,' an idiom for supervision or
      administrative direction.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: Demonstrative feminine singular introducing a summary statement; English
    idiom naturally supplies 'is' to make a complete clause.
- source_word: עֲבֹדַת
  chosen: the service of
  alternatives:
  - the work of
  - the duty of
  lexicon: HALOT
  rationale: עֲבֹדָה in this cultic/Levitical context refers to assigned service or
    duty rather than generic labor. 'Service' fits the tabernacle-administrative setting
    and matches the repeated use in the verse.
- source_word: מִשְׁפְּחֹת
  chosen: the clans of
  alternatives:
  - the families of
  lexicon: HALOT
  rationale: In tribal/genealogical contexts מִשְׁפָּחוֹת commonly denotes clan groupings
    within a tribe. 'Clans' is more precise than modern English 'families.'
- source_word: בְּנֵי מְרָרִי
  chosen: the sons of Merari
  alternatives:
  - the descendants of Merari
  lexicon: HALOT
  rationale: A standard genealogical expression. 'Sons of Merari' preserves the Hebrew
    form; because it refers corporately to a lineage group, the preceding 'clans'
    clarifies the collective sense.
- source_word: לְכָל עֲבֹדָתָם
  chosen: for all their service
  alternatives:
  - for all their work
  - according to all their service
  lexicon: HALOT
  rationale: The prefixed ל here marks relation/purpose with respect to the totality
    of their assigned duties. 'For all their service' is concise and natural while
    preserving the repeated עֲבֹדָה terminology.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: Standard rendering of the tabernacle designation. 'In' reflects ב and
    suits the sphere/location of their assigned service.
- source_word: בְּיַד
  chosen: under the direction of
  alternatives:
  - by the hand of
  - under the authority of
  - in the charge of
  lexicon: HALOT
  rationale: The idiom בְּיַד literally means 'by the hand of' but often denotes agency,
    supervision, or administrative control. Here the sense is that the Merarites'
    service was carried out under Ithamar's oversight. 'Under the direction of' communicates
    the idiomatic force in clear modern English.
- source_word: אִיתָמָר בֶּן אַהֲרֹן הַכֹּהֵן
  chosen: Ithamar son of Aaron the priest
  alternatives:
  - Ithamar, the son of Aaron the priest
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. The appositional
    phrase identifies Ithamar by lineage and office-bearing family connection; the
    unpunctuated English is smooth and faithful.
