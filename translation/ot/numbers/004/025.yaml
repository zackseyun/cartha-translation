id: NUM.4.25
reference: Numbers 4:25
source:
  edition: WLC
  text: וְ/נָ֨שְׂא֜וּ אֶת יְרִיעֹ֤ת הַ/מִּשְׁכָּן֙ וְ/אֶת אֹ֣הֶל מוֹעֵ֔ד מִכְסֵ֕/הוּ
    וּ/מִכְסֵ֛ה הַ/תַּ֥חַשׁ אֲשֶׁר עָלָ֖י/ו מִ/לְ/מָ֑עְלָ/ה וְ/אֶ֨ת מָסַ֔ךְ פֶּ֖תַח
    אֹ֥הֶל מוֹעֵֽד־־־־׃
translation:
  text: They shall carry the curtains of the tabernacle, and the tent of meeting with
    its covering, and the covering of fine leather that is over it above, and the
    screen for the entrance of the tent of meeting,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew תַּחַשׁ refers to an uncertain material or animal hide; traditional
      renderings include 'badger skin,' while others transliterate 'tahash.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשְׂאוּ
  chosen: They shall carry
  alternatives:
  - they shall bear
  - they shall lift and carry
  lexicon: HALOT
  rationale: נשא in this transport context refers to bearing/carrying the sanctuary
    materials during movement. 'Carry' is natural modern English and fits the logistical
    sense.
- source_word: יְרִיעֹת הַמִּשְׁכָּן
  chosen: the curtains of the tabernacle
  alternatives:
  - the tabernacle curtains
  - the sheets of the tabernacle
  lexicon: HALOT
  rationale: יְרִיעוֹת are fabric hangings/panels; 'curtains' is the established and
    accurate rendering in tabernacle contexts. מִשְׁכָּן is rendered 'tabernacle'
    here for consistency with Pentateuch sanctuary terminology.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard literal rendering of the sanctuary title, preserving
    both the physical structure ('tent') and its function ('meeting').
- source_word: מִכְסֵהוּ
  chosen: its covering
  alternatives:
  - its outer covering
  lexicon: HALOT
  rationale: The suffix refers back to the tent of meeting. 'Its covering' is sufficiently
    literal without over-specifying which layer, since the next phrase names an additional
    covering.
- source_word: מִכְסֵה הַתַּחַשׁ
  chosen: the covering of fine leather
  alternatives:
  - the covering of tahash skin
  - the covering of durable leather
  lexicon: HALOT
  rationale: תַּחַשׁ is uncertain zoologically; traditional renderings like 'badger
    skins' are too specific. 'Fine leather' communicates a high-quality hide covering
    without claiming an uncertain species.
- source_word: אֲשֶׁר עָלָיו מִלְמָעְלָה
  chosen: that is over it above
  alternatives:
  - which is on top of it
  - that is over it on top
  lexicon: HALOT
  rationale: The phrase specifies the uppermost position of this covering. 'Over it
    above' stays close to the Hebrew while remaining intelligible.
- source_word: מָסַךְ פֶּתַח
  chosen: the screen for the entrance
  alternatives:
  - the curtain for the entrance
  - the screen of the doorway
  lexicon: HALOT
  rationale: מָסָךְ in tabernacle contexts denotes a hanging that functions as a screen.
    'For the entrance' expresses the genitival relationship naturally in English.
