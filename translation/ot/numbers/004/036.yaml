id: NUM.4.36
reference: Numbers 4:36
source:
  edition: WLC
  text: וַ/יִּהְי֥וּ פְקֻדֵי/הֶ֖ם לְ/מִשְׁפְּחֹתָ֑/ם אַלְפַּ֕יִם שְׁבַ֥ע מֵא֖וֹת וַ/חֲמִשִּֽׁים׃
translation:
  text: And those counted from them by their clans were two thousand seven hundred
    and fifty.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: And ... were
  alternatives:
  - and they were
  - now ... were
  lexicon: HALOT
  rationale: The waw-consecutive on היה advances the narrative/result. In English,
    'And ... were' is natural and preserves the simple copular sense without adding
    emphasis.
- source_word: פְקֻדֵיהֶם
  chosen: those counted from them
  alternatives:
  - their numbered men
  - their enrollment
  - their mustered ones
  lexicon: HALOT
  rationale: From פקד in a census/mustering context, the participial/nominal form
    refers to those registered or counted. 'Those counted from them' preserves the
    passive/resultative sense and avoids importing 'men' where the Hebrew here does
    not explicitly state it.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה commonly denotes a clan/family subdivision within Israelite
    tribal structure. 'By their clans' is concise, structurally accurate, and idiomatic
    in census language.
- source_word: אַלְפַּיִם שְׁבַע מֵאוֹת וַחֲמִשִּׁים
  chosen: two thousand seven hundred and fifty
  alternatives:
  - 2,750
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence is rendered in standard English number wording
    for readability while preserving the exact total.
