theological_decisions:
- issue: Whether צבא language should be rendered with explicit military terminology
  chosen_reading: Cultic service language ('perform service') rather than literal
    military wording
  alternative_readings:
  - perform military duty
  - wage warfare
  rationale: Although צבא can denote military service, in Numbers 4 the Levites are
    being assigned tabernacle duties. Rendering it as service preserves the metaphorical/organizational
    force without suggesting actual combat.
