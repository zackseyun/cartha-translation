id: NUM.4.23
reference: Numbers 4:23
source:
  edition: WLC
  text: מִ/בֶּן֩ שְׁלֹשִׁ֨ים שָׁנָ֜ה וָ/מַ֗עְלָ/ה עַ֛ד בֶּן חֲמִשִּׁ֥ים שָׁנָ֖ה תִּפְקֹ֣ד
    אוֹתָ֑/ם כָּל הַ/בָּא֙ לִ/צְבֹ֣א צָבָ֔א לַ/עֲבֹ֥ד עֲבֹדָ֖ה בְּ/אֹ֥הֶל מוֹעֵֽד־־׃
translation:
  text: From thirty years old and upward to fifty years old, you shall count them,
    everyone who comes to perform service, to do the work in the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to do duty'; the Hebrew expression uses military-service language metaphorically
      for organized tabernacle service.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֶּן ... וָמַעְלָה
  chosen: From thirty years old and upward
  alternatives:
  - From the son of thirty years and above
  - From thirty years old and over
  lexicon: HALOT
  rationale: The idiom מִן + בֶּן + age denotes age range ('from X years old'), not
    literal sonship. 'And upward' preserves וָמַעְלָה naturally in English.
- source_word: עַד בֶּן חֲמִשִּׁים שָׁנָה
  chosen: to fifty years old
  alternatives:
  - up to fifty years old
  - until the son of fifty years
  lexicon: HALOT
  rationale: Completes the age range idiomatically. 'To fifty years old' is concise
    and natural while preserving the upper limit.
- source_word: תִּפְקֹד אֹתָם
  chosen: you shall count them
  alternatives:
  - you shall register them
  - you shall muster them
  lexicon: HALOT
  rationale: פקד in census/administrative contexts commonly means count, number, or
    register. 'Count' fits the immediate context of numbering Levites, while remaining
    understandable. 'Register' and 'muster' are possible but more specialized.
- source_word: כָּל הַבָּא
  chosen: everyone who comes
  alternatives:
  - all who enter
  - everyone who is coming
  lexicon: HALOT
  rationale: The participle with כל functions substantivally for each qualifying person.
    'Everyone who comes' is natural English and preserves the inclusive distributive
    sense.
- source_word: לִצְבֹא צָבָא
  chosen: to perform service
  alternatives:
  - to wage service
  - to serve in the company
  - to do duty
  lexicon: HALOT
  rationale: The cognate construction from צבא carries the sense of undertaking organized
    duty/service, often with a military metaphor. In this cultic context, 'perform
    service' communicates assigned duty without importing literal warfare.
- source_word: לַעֲבֹד עֲבֹדָה
  chosen: to do the work
  alternatives:
  - to serve the service
  - to perform the labor
  lexicon: HALOT
  rationale: The infinitive plus cognate noun emphasizes carrying out assigned labor/service.
    'Do the work' is idiomatic and suits the tabernacle-service context.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  - in the meeting tent
  lexicon: HALOT
  rationale: Standard rendering of the tabernacle designation. 'Tent of meeting' preserves
    the established sense of the sacred meeting place without paraphrase.
