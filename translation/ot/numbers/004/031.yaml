id: NUM.4.31
reference: Numbers 4:31
source:
  edition: WLC
  text: וְ/זֹאת֙ מִשְׁמֶ֣רֶת מַשָּׂאָ֔/ם לְ/כָל עֲבֹדָתָ֖/ם בְּ/אֹ֣הֶל מוֹעֵ֑ד קַרְשֵׁי֙
    הַ/מִּשְׁכָּ֔ן וּ/בְרִיחָ֖י/ו וְ/עַמּוּדָ֥י/ו וַ/אֲדָנָֽי/ו־׃
translation:
  text: 'And this is the duty of their burden for all their service in the tent of
    meeting: the frames of the tabernacle, its bars, its pillars, and its bases.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'charge' for 'duty' (מִשְׁמֶרֶת), emphasizing an assigned responsibility.
    reason: lexical_alternative
  - marker: b
    text: Or 'boards of the tabernacle' for 'frames of the tabernacle.' The Hebrew
      term can denote structural boards/planks; 'frames' is chosen to reflect their
      architectural function.
    reason: lexical_alternative
  - marker: c
    text: Or 'sockets' for 'bases' (אֲדָנִים), a more technical term for the foundation
      pieces in the tabernacle structure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֹאת
  chosen: And this is
  alternatives:
  - Now this is
  - This is
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a specification of the
    Merarites' assigned responsibility. 'And this is' preserves the connective force
    and the presentational style of the Hebrew.
- source_word: מִשְׁמֶרֶת
  chosen: duty
  alternatives:
  - charge
  - responsibility
  - obligation
  lexicon: HALOT
  rationale: The noun denotes an assigned charge or responsibility. 'Duty' is concise
    modern English and fits the context of prescribed Levitical tasks. 'Charge' is
    possible but can sound less natural here.
- source_word: מַשָּׂאָם
  chosen: their burden
  alternatives:
  - their load
  - what they must carry
  lexicon: HALOT
  rationale: The term refers to what is borne/carried in transport. 'Burden' preserves
    the concrete sense while also fitting the formal register of the inventory that
    follows. It is not merely abstract labor but the items assigned to them for carrying.
- source_word: לְכָל עֲבֹדָתָם
  chosen: for all their service
  alternatives:
  - for all their work
  - in all their service
  lexicon: HALOT
  rationale: The phrase expresses the scope of their assigned ministry/work. 'Service'
    fits tabernacle-related labor better than the flatter 'work' and preserves the
    cultic nuance without over-sacralizing.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: Standard rendering for the sanctuary designation. 'In' works idiomatically
    with the broader sphere of service, even though the listed objects include structural
    components of the sanctuary complex.
- source_word: קַרְשֵׁי הַמִּשְׁכָּן
  chosen: the frames of the tabernacle
  alternatives:
  - the boards of the tabernacle
  - the planks of the tabernacle
  lexicon: HALOT
  rationale: קֶרֶשׁ in tabernacle contexts refers to the structural frame pieces.
    'Frames' communicates function better in modern English than 'boards,' which may
    suggest simple flat lumber without structural role.
- source_word: בְרִיחָיו
  chosen: its bars
  alternatives:
  - its crossbars
  - its poles
  lexicon: HALOT
  rationale: These are the bars used with the tabernacle frames. 'Bars' is the most
    straightforward rendering; 'crossbars' is possible but slightly more interpretive.
- source_word: עַמּוּדָיו
  chosen: its pillars
  alternatives:
  - its posts
  - its columns
  lexicon: HALOT
  rationale: The word denotes upright supports. 'Pillars' is a natural rendering in
    sanctuary contexts and matches the somewhat elevated but readable style of the
    passage.
- source_word: אֲדָנָיו
  chosen: its bases
  alternatives:
  - its sockets
  - its pedestals
  lexicon: HALOT
  rationale: In tabernacle construction this term refers to the base pieces into which
    the frames or pillars fit. 'Bases' is clear and less technical than 'sockets,'
    while still accurate.
