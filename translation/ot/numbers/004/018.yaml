id: NUM.4.18
reference: Numbers 4:18
source:
  edition: WLC
  text: אַל תַּכְרִ֕יתוּ אֶת שֵׁ֖בֶט מִשְׁפְּחֹ֣ת הַ/קְּהָתִ֑י מִ/תּ֖וֹךְ הַ/לְוִיִּֽם־־׃
translation:
  text: Do not cut off the tribe of the families of the Kohathites from among the
    Levites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not destroy the clan of the families of the Kohathites from among
      the Levites.' The Hebrew verb can mean 'cut off' or 'destroy,' and 'families'
      may also be rendered 'clans.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - You shall not
  lexicon: HALOT
  rationale: Negative particle used for prohibition; 'Do not' gives clear modern English
    imperative force.
- source_word: תַּכְרִיתוּ
  chosen: cut off
  alternatives:
  - destroy
  - wipe out
  - eliminate
  lexicon: HALOT
  rationale: 'From כרת in the Hiphil, here causative: ''cause to be cut off/destroy.''
    ''Cut off'' preserves the idiomatic covenantal/judicial nuance common in Hebrew
    while fitting the immediate warning not to bring about the loss of this clan.'
- source_word: שֵׁבֶט
  chosen: tribe
  alternatives:
  - branch
  - staff
  lexicon: HALOT
  rationale: In this genealogical setting, שֵׁבֶט refers to a tribal subdivision.
    'Tribe' is the standard and most natural rendering in context.
- source_word: מִשְׁפְּחֹת
  chosen: families
  alternatives:
  - clans
  lexicon: HALOT
  rationale: The plural construct with 'the Kohathite' denotes the constituent family
    groups within the Kohathite line. 'Families' is a transparent rendering, though
    'clans' is also possible.
- source_word: הַקְּהָתִי
  chosen: the Kohathites
  alternatives:
  - the Kohathite clan
  - the Kohathite
  lexicon: HALOT
  rationale: Though morphologically singular adjectival/gentilic, in English it naturally
    refers collectively to the Kohathite group. 'The Kohathites' communicates the
    collective sense clearly.
- source_word: מִתּוֹךְ
  chosen: from among
  alternatives:
  - from the midst of
  - out of
  lexicon: HALOT
  rationale: Expresses separation from within a larger group. 'From among' is idiomatic
    modern English and preserves the relational sense.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal name; the Kohathites are a subgroup
    within the Levites.
