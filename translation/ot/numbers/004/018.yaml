theological_decisions:
- issue: Force of the prohibition regarding the Kohathites' fate
  chosen_reading: A warning not to cause the Kohathite family group to be cut off
    from among the Levites, likely by mishandling their sacred duties.
  alternative_readings:
  - A general command not to destroy the Kohathite clan
  rationale: The verse itself states the prohibition without specifying the mechanism;
    the broader context explains that improper exposure to holy things would bring
    death. The translation keeps the wording broad ('cut off') rather than importing
    a narrower interpretive explanation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
