id: NUM.4.30
reference: Numbers 4:30
source:
  edition: WLC
  text: מִ/בֶּן֩ שְׁלֹשִׁ֨ים שָׁנָ֜ה וָ/מַ֗עְלָ/ה וְ/עַ֛ד בֶּן חֲמִשִּׁ֥ים שָׁנָ֖ה
    תִּפְקְדֵ֑/ם כָּל הַ/בָּא֙ לַ/צָּבָ֔א לַ/עֲבֹ֕ד אֶת עֲבֹדַ֖ת אֹ֥הֶל מוֹעֵֽד־־־׃
translation:
  text: From thirty years old and upward, up to fifty years old, you shall count them—everyone
    who enters the service to do the work of the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone who comes for duty.'
    reason: lexical_alternative
  - marker: b
    text: '''Service'' translates a term that can also denote an organized company
      or host; here it refers to assigned Levitical duty.'
    reason: cultural_note
lexical_decisions:
- source_word: מִבֶּן שְׁלֹשִׁים שָׁנָה וָמַעְלָה
  chosen: From thirty years old and upward
  alternatives:
  - From the son of thirty years and upward
  - From thirty years old and above
  lexicon: HALOT
  rationale: The idiom מִן + בֶּן + number + שָׁנָה expresses age range. 'From thirty
    years old and upward' is natural English that preserves the formal age threshold
    without woodenly retaining 'son of.'
- source_word: וְעַד בֶּן חֲמִשִּׁים שָׁנָה
  chosen: up to fifty years old
  alternatives:
  - even to fifty years old
  - and as far as fifty years old
  lexicon: HALOT
  rationale: This completes the age range idiom. 'Up to' is clear modern English and
    accurately reflects וְעַד.
- source_word: תִּפְקְדֵם
  chosen: you shall count them
  alternatives:
  - you shall number them
  - you shall muster them
  lexicon: HALOT
  rationale: פקד in this census context means to count/register for service. 'Count
    them' is straightforward and fits the immediate context of enumerating eligible
    Levites. 'Muster' is possible but slightly more interpretive and military in tone.
- source_word: כָּל הַבָּא
  chosen: everyone who enters
  alternatives:
  - everyone who comes
  - all who enter
  lexicon: HALOT
  rationale: The participle with כָּל denotes each qualifying person. 'Everyone who
    enters' preserves the singular distributive sense while reading naturally in English.
- source_word: לַצָּבָא
  chosen: the service
  alternatives:
  - the duty
  - the company
  - the host
  lexicon: HALOT
  rationale: Though צָבָא often has military associations ('host/army'), in Numbers
    4 it refers to organized Levitical duty. 'Service' best captures the functional
    sense without importing combat imagery, while still reflecting structured assignment.
- source_word: לַעֲבֹד
  chosen: to do
  alternatives:
  - to serve
  - to perform
  lexicon: HALOT
  rationale: In combination with עֲבֹדַת, the infinitive expresses performing the
    assigned labor. Rendering it 'to do the work' avoids awkward repetition such as
    'to serve the service' while preserving the action.
- source_word: עֲבֹדַת
  chosen: the work
  alternatives:
  - the service
  - the labor
  lexicon: HALOT
  rationale: עֲבֹדָה can mean work/service. Here 'the work' pairs well with the preceding
    phrase and distinguishes the task itself from the broader category of 'service'
    in לַצָּבָא.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the Tent of Meeting
  lexicon: HALOT
  rationale: This is the standard rendering of the sanctuary designation. Lowercase
    'tent' follows a non-sacralizing style, while preserving the recognized phrase.
