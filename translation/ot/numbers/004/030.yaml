theological_decisions:
- issue: Potential military nuance of Levitical duty in לַצָּבָא
  chosen_reading: the service
  alternative_readings:
  - the duty
  - the host
  - the warfare/service
  rationale: The verse describes Levites entering organized tabernacle labor, not
    military combat. Rendering צָבָא as 'service' preserves the institutional, ordered
    nature of the work without overstating martial imagery. This maintains the text's
    plain sense and avoids importing symbolism the verse itself does not require.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the text''s plain sense without importing doctrinal claims.'
