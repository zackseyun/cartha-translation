id: NUM.4.29
reference: Numbers 4:29
source:
  edition: WLC
  text: בְּנֵ֖י מְרָרִ֑י לְ/מִשְׁפְּחֹתָ֥/ם לְ/בֵית אֲבֹתָ֖/ם תִּפְקֹ֥ד אֹתָֽ/ם־׃
translation:
  text: As for the sons of Merari, you shall count them by their clans, by their fathers'
    houses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the descendants of Merari' or 'the Merarites.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'by their fathers' houses,' a genealogical expression for paternal
      household groupings.
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי מְרָרִי
  chosen: the sons of Merari
  alternatives:
  - the descendants of Merari
  - the Merarites
  lexicon: HALOT
  rationale: בְּנֵי plus a personal name literally means 'sons of.' In census and
    tribal contexts it denotes lineage descendants. 'Sons of Merari' preserves the
    Hebrew form and familial structure better than the more interpretive 'Merarites,'
    while remaining natural English.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal/census contexts refers to kinship subdivisions
    within a tribe. 'Clans' is clearer in modern English than 'families' and fits
    the administrative setting.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers' houses
  alternatives:
  - according to their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: The phrase is a standard Israelite genealogical expression for paternal
    household groupings. 'Fathers' houses' is a fairly literal rendering that preserves
    the social structure without flattening it to simply 'families.'
- source_word: תִּפְקֹד
  chosen: you shall count
  alternatives:
  - you shall number
  - you shall muster
  lexicon: HALOT
  rationale: פקד in this census context means to take a count or register. 'Count'
    is straightforward modern English; 'muster' could imply military nuance not explicit
    in this immediate clause, and 'number' is slightly less idiomatic.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object pronoun referring back to the sons of Merari; rendered
    explicitly in English as 'them.'
