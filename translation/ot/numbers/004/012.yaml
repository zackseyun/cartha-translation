id: NUM.4.12
reference: Numbers 4:12
source:
  edition: WLC
  text: וְ/לָקְחוּ֩ אֶת כָּל כְּלֵ֨י הַ/שָּׁרֵ֜ת אֲשֶׁ֧ר יְשָֽׁרְתוּ בָ֣/ם בַּ/קֹּ֗דֶשׁ
    וְ/נָֽתְנוּ֙ אֶל בֶּ֣גֶד תְּכֵ֔לֶת וְ/כִסּ֣וּ אוֹתָ֔/ם בְּ/מִכְסֵ֖ה ע֣וֹר תָּ֑חַשׁ
    וְ/נָתְנ֖וּ עַל הַ/מּֽוֹט־־־־־׃
translation:
  text: Then they shall take all the utensils of the service with which they minister
    in the sanctuary, and put them in a blue cloth, and cover them with a covering
    of fine leather, and place them on the carrying frame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew תָּחַשׁ (tahash) is uncertain; it may refer to a particular animal
      skin or to a kind of fine or durable leather.
    reason: lexical_alternative
  - marker: b
    text: Or 'place them on the pole.' The Hebrew uses the singular 'pole/bar,' which
      may stand for the carrying apparatus.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקְחוּ
  chosen: Then they shall take
  alternatives:
  - And they shall take
  - Then they are to take
  lexicon: HALOT
  rationale: Qal waw-consecutive 3cp from לקח in procedural instructions; English
    future-like 'shall take' fits the sequence of ritual actions. 'Then' brings out
    the narrative/procedural progression signaled by waw without over-paraphrasing.
- source_word: כָּל כְּלֵי הַשָּׁרֵת
  chosen: all the utensils of the service
  alternatives:
  - all the service vessels
  - all the ministering implements
  lexicon: HALOT
  rationale: כְּלִי commonly denotes articles, vessels, or utensils; here the objects
    used in tabernacle ministry. 'Utensils of the service' is natural English and
    preserves the cultic function expressed by הַשָּׁרֵת.
- source_word: אֲשֶׁר יְשָׁרְתוּ בָם
  chosen: with which they minister
  alternatives:
  - with which they serve
  - by which they perform the service
  lexicon: HALOT
  rationale: שרת in cultic contexts refers to ministering/serving in sacred duty.
    'Minister' best conveys formal sanctuary service in contemporary English without
    becoming archaic.
- source_word: בַּקֹּדֶשׁ
  chosen: in the sanctuary
  alternatives:
  - in the holy place
  - in the holy place/holy area
  lexicon: HALOT
  rationale: Literally 'in the holy [place/thing].' In this context it refers generally
    to the sacred precinct where these implements are used, not necessarily the inner
    room specifically. 'In the sanctuary' is clear and suitably cultic.
- source_word: בֶּגֶד תְּכֵלֶת
  chosen: a blue cloth
  alternatives:
  - a cloth of blue
  - a blue garment
  lexicon: HALOT
  rationale: בֶּגֶד is a cloth/garment; in this packing context 'cloth' is more idiomatic
    than 'garment.' תְּכֵלֶת denotes the characteristic blue/purple-blue dyed material
    used in tabernacle textiles. 'Blue cloth' is concise and natural.
- source_word: מִכְסֵה עוֹר תָּחַשׁ
  chosen: a covering of fine leather
  alternatives:
  - a covering of tahash skin
  - a covering of durable leather
  - a covering of porpoise skin
  lexicon: HALOT
  rationale: The precise animal denoted by תָּחַשׁ is uncertain. Rather than preserve
    an opaque transliteration in the main text or choose a speculative zoological
    identification, 'fine leather' communicates a high-quality protective hide covering
    appropriate to the context. The lexical uncertainty is preserved in a footnote.
- source_word: וְנָתְנוּ עַל הַמּוֹט
  chosen: and place them on the carrying frame
  alternatives:
  - and put it on the pole
  - and place them on the bar
  - and set them on the carrying pole
  lexicon: HALOT
  rationale: מּוֹט can denote a pole/bar used for carrying. Because the direct object
    is plural ('them,' the utensils) and the phrase likely refers to the carrying
    apparatus collectively rather than a single stick in idiomatic English, 'carrying
    frame' best conveys function. This avoids the awkwardness of English singular
    'pole' with plural objects while remaining faithful to the transport setting.
