id: NUM.4.37
reference: Numbers 4:37
source:
  edition: WLC
  text: אֵ֤לֶּה פְקוּדֵי֙ מִשְׁפְּחֹ֣ת הַ/קְּהָתִ֔י כָּל הָ/עֹבֵ֖ד בְּ/אֹ֣הֶל מוֹעֵ֑ד אֲשֶׁ֨ר פָּקַ֤ד מֹשֶׁה֙ וְ/אַהֲרֹ֔ן עַל פִּ֥י יְהוָ֖ה בְּ/יַד מֹשֶֽׁה־־־׃ס
translation:
  text: These were the counted men of the families of the Kohathites, all who served in the tent of meeting, whom Moses and Aaron counted at the command of Yahweh by the hand of Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through Moses' for 'by the hand of Moses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְקוּדֵי
  chosen: the counted men
  alternatives:
  - those counted
  - the numbered ones
  - the census of
  lexicon: HALOT
  rationale: From פקד in a census/numbering context. The construct with אֵלֶּה introduces the result of the counting. 'Counted men' fits the military/service census context of Numbers 4 better than the more abstract 'census of,' while remaining natural English.
- source_word: מִשְׁפְּחֹת הַקְּהָתִי
  chosen: the families of the Kohathites
  alternatives:
  - the clans of the Kohathites
  - the families of the Kohathite
  lexicon: HALOT
  rationale: מִשְׁפְּחֹת commonly refers to family groups/clans. 'Families' is a standard, readable rendering; 'Kohathites' naturally expresses the collective descendant group.
- source_word: כָּל הָעֹבֵד
  chosen: everyone serving
  alternatives:
  - all who served
  - every worker
  - everyone who did service
  lexicon: HALOT
  rationale: The participle עֹבֵד denotes one engaged in service. 'Everyone serving' captures the collective force of כָּל with the participle in smooth English.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: This is the standard rendering of the tabernacle designation. 'In' reflects בְּ and suits the sphere of Levitical service, though 'at' is possible idiomatically.
- source_word: אֲשֶׁר פָּקַד
  chosen: whom ... counted
  alternatives:
  - who were counted by
  - which ... appointed
  lexicon: HALOT
  rationale: Here פקד again refers to numbering/mustering, not appointing. The relative clause refers back to the counted Kohathite families/persons.
- source_word: עַל פִּי יְהוָה
  chosen: at the command of the LORD
  alternatives:
  - according to the mouth of the LORD
  - according to the command of the LORD
  lexicon: HALOT
  rationale: The idiom literally means 'according to the mouth of.' In English, 'at the command of' clearly conveys divine authorization without wooden literalism.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיַד מֹשֶׁה
  chosen: by the hand of Moses
  alternatives:
  - through Moses
  - by Moses
  lexicon: HALOT
  rationale: This idiom often denotes agency or mediation. 'By the hand of Moses' preserves the Hebrew expression and its formal tone; 'through Moses' is a viable dynamic alternative.
