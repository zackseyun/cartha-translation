id: NUM.4.40
reference: Numbers 4:40
source:
  edition: WLC
  text: וַ/יִּֽהְיוּ֙ פְּקֻ֣דֵי/הֶ֔ם לְ/מִשְׁפְּחֹתָ֖/ם לְ/בֵ֣ית אֲבֹתָ֑/ם אַלְפַּ֕יִם
    וְ/שֵׁ֥שׁ מֵא֖וֹת וּ/שְׁלֹשִֽׁים׃
translation:
  text: And those counted from them, by their clans, by their fathers’ houses, were
    two thousand six hundred and thirty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their numbered men,' 'their enrollment,' or 'their muster.' The Hebrew
      refers to those registered in the census.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - came to be
  - amounted to
  lexicon: HALOT
  rationale: The verb היה here functions as a simple copular/resultative verb in a
    census formula. 'Were' is the most natural English rendering in this enumerative
    context.
- source_word: פְּקֻדֵיהֶם
  chosen: those counted from them
  alternatives:
  - their numbered men
  - their enrollment
  - their muster
  lexicon: HALOT
  rationale: From פקד in the passive/participle sense of those registered or counted
    in a census. 'Those counted from them' preserves the sense that this is the tally
    derived from the group just mentioned, without adding 'men' where it is not explicit
    in this verse.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their clans
  - for their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census contexts refers to kinship subdivisions best rendered
    'clans.' 'By' is idiomatic in English for the basis of enumeration.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - according to their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: This is a standard Israelite genealogical/census expression. 'Fathers’
    houses' is a fairly formal but transparent rendering that preserves the social
    structure indicated by the Hebrew.
- source_word: אַלְפַּיִם וְשֵׁשׁ מֵאוֹת וּשְׁלֹשִׁים
  chosen: two thousand six hundred and thirty
  lexicon: HALOT
  rationale: Straightforward cardinal number sequence rendered in standard contemporary
    English style.
