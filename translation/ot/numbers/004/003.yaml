id: NUM.4.3
reference: Numbers 4:3
source:
  edition: WLC
  text: מִ/בֶּ֨ן שְׁלֹשִׁ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה וְ/עַ֖ד בֶּן חֲמִשִּׁ֣ים שָׁנָ֑ה
    כָּל בָּא֙ לַ/צָּבָ֔א לַ/עֲשׂ֥וֹת מְלָאכָ֖ה בְּ/אֹ֥הֶל מוֹעֵֽד־־׃
translation:
  text: from thirty years old and upward, up to fifty years old, everyone who enters
    the service to do the work in the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone who comes for the duty.' The Hebrew participle 'comes/enters'
      can be rendered more generally as 'comes.'
    reason: lexical_alternative
  - marker: b
    text: '''Service'' translates Hebrew צָבָא, a term that can also mean ''duty,''
      ''company,'' or ''host.'' Here it refers to organized Levitical service.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֶּן שְׁלֹשִׁים שָׁנָה
  chosen: from thirty years old
  alternatives:
  - from the son of thirty years
  - from the age of thirty years
  lexicon: HALOT
  rationale: Hebrew idiom with בֶּן + number + שָׁנָה expresses age. Natural English
    is 'thirty years old,' with 'from' preserving the lower age limit.
- source_word: וָמַעְלָה
  chosen: and upward
  alternatives:
  - and above
  - and older
  lexicon: HALOT
  rationale: Standard age-range formula meaning 'and upward/from there and above.'
    'And upward' is concise and idiomatic in English for census or eligibility formulas.
- source_word: וְעַד בֶּן חֲמִשִּׁים שָׁנָה
  chosen: up to fifty years old
  alternatives:
  - even to fifty years old
  - and as far as fifty years old
  lexicon: HALOT
  rationale: Completes the age range. 'Up to' communicates the upper limit clearly
    in modern English.
- source_word: כָּל בָּא
  chosen: everyone who enters
  alternatives:
  - every one coming
  - all who come
  lexicon: HALOT
  rationale: כָּל with the participle בָּא denotes every qualified person who comes/enters
    for the stated duty. 'Everyone who enters' preserves the participial sense while
    reading naturally.
- source_word: לַצָּבָא
  chosen: the service
  alternatives:
  - the duty
  - the company
  - the host
  - the labor force
  lexicon: HALOT
  rationale: צָבָא can denote service, company, or host; in Numbers 4 it refers to
    organized Levitical duty rather than military combat. 'Service' best captures
    the structured, assigned ministry context without importing warfare language into
    the main text.
- source_word: לַעֲשׂוֹת מְלָאכָה
  chosen: to do the work
  alternatives:
  - to perform work
  - to do the labor
  lexicon: HALOT
  rationale: 'Infinitive + noun expresses purpose: performing assigned work. ''Do
    the work'' is straightforward and preserves the concrete labor sense of מְלָאכָה.'
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: Established rendering of אֹהֶל מוֹעֵד. 'Tent of meeting' reflects the
    Hebrew meaning; 'in' fits the work performed in connection with the sanctuary
    precincts and furnishings.
