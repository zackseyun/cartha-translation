theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew is grammatically masculine plural and functions as the covenantal
    designation of Israel. Following the project's gender-accurate principle, the
    familial expression is preserved rather than neutralized, while alternatives remain
    possible in other contexts for readability.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
