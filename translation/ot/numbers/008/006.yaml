id: NUM.8.6
reference: Numbers 8:6
source:
  edition: WLC
  text: קַ֚ח אֶת הַ/לְוִיִּ֔ם מִ/תּ֖וֹךְ בְּנֵ֣י יִשְׂרָאֵ֑ל וְ/טִהַרְתָּ֖ אֹתָֽ/ם־׃
translation:
  text: Take the Levites from among the sons of Israel and cleanse them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the people of Israel.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח
  chosen: Take
  alternatives:
  - Bring
  - Select
  lexicon: HALOT
  rationale: Imperative 2ms of לקח, here a direct command to Moses to take or set
    apart the Levites. 'Take' is the most straightforward and idiomatic rendering
    in context.
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the descendants of Levi
  lexicon: HALOT
  rationale: Refers to the tribal group designated for tabernacle service. 'The Levites'
    is the standard and precise English rendering.
- source_word: מִתּוֹךְ
  chosen: from among
  alternatives:
  - from the midst of
  - out from among
  lexicon: HALOT
  rationale: The preposition plus noun indicates separation out of a larger group.
    'From among' is natural English and preserves the idea of selection from within
    Israel.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Per the gender-accurate philosophy, the masculine
    form is retained where it refers to the covenant people corporately. 'The sons
    of Israel' also preserves the familial/covenantal nuance better than the more
    generalized 'Israelites.'
- source_word: וְטִהַרְתָּ אֹתָם
  chosen: and cleanse them
  alternatives:
  - and purify them
  - and make them clean
  lexicon: HALOT
  rationale: The verb טהר in this ritual context denotes ceremonial purification.
    'Cleanse' is clear modern English and suitably conveys ritual purification without
    unnecessary technicality.
