id: NUM.8.20
reference: Numbers 8:20
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ מֹשֶׁ֧ה וְ/אַהֲרֹ֛ן וְ/כָל עֲדַ֥ת בְּנֵי יִשְׂרָאֵ֖ל לַ/לְוִיִּ֑ם
    כְּ֠/כֹל אֲשֶׁר צִוָּ֨ה יְהוָ֤ה אֶת מֹשֶׁה֙ לַ/לְוִיִּ֔ם כֵּן עָשׂ֥וּ לָ/הֶ֖ם
    בְּנֵ֥י יִשְׂרָאֵֽל־־־־־׃
translation:
  text: So Moses and Aaron and all the congregation of the sons of Israel did to the
    Levites according to all that the LORD had commanded Moses concerning the Levites;
    so the sons of Israel did to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites.” The Hebrew reads “the sons of Israel,” a standard covenant-community
      expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ / עָשׂוּ
  chosen: did
  alternatives:
  - acted
  - performed
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). Here it governs actions carried out
    for or toward the Levites in fulfillment of prior instructions, so 'did' best
    preserves the Hebrew's generality without over-specifying the ritual acts.
- source_word: עֲדַת
  chosen: congregation
  alternatives:
  - assembly
  - community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the gathered covenant community. 'Congregation'
    preserves the formal communal sense in Pentateuchal usage better than the more
    generic 'community.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Following the project's gender-accurate principle, the literal familial
    expression is retained. 'Israelites' is smoother English but loses the source's
    wording; 'children of Israel' is traditional but less precise in modern English.
- source_word: לַלְוִיִּם
  chosen: to the Levites
  alternatives:
  - for the Levites
  - with respect to the Levites
  lexicon: HALOT
  rationale: The preposition ל here marks the Levites as the object/beneficiaries
    of the actions performed. 'To the Levites' is a natural rendering that preserves
    the Hebrew relation without narrowing it to only benefit ('for') or topic ('with
    respect to').
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as all that
  - in accordance with everything that
  lexicon: HALOT
  rationale: This phrase expresses exact conformity to the divine command. 'According
    to all that' is idiomatic and preserves the comprehensive force of כֹל.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: The command precedes the actions narrated here, so English past perfect
    clarifies the sequence naturally.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD.'
- source_word: אֶת מֹשֶׁה לַלְוִיִּם
  chosen: Moses concerning the Levites
  alternatives:
  - Moses about the Levites
  - Moses for the Levites
  lexicon: HALOT
  rationale: The construction indicates that the LORD's command to Moses pertained
    to the Levites. 'Concerning the Levites' is slightly more formal and precise than
    'about the Levites.'
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: 'כֵּן resumes and emphasizes correspondence: the Israelites acted exactly
    as commanded. ''So'' is concise and natural in modern English.'
