theological_decisions:
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - children of Israel
  rationale: The Hebrew is explicitly masculine plural construct 'sons of Israel.'
    Following the project's gender-accurate policy, the main text preserves that form
    rather than neutralizing it to 'Israelites,' while recognizing that the phrase
    corporately refers to the covenant people as a whole.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
