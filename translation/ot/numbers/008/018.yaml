id: NUM.8.18
reference: Numbers 8:18
source:
  edition: WLC
  text: וָ/אֶקַּח֙ אֶת הַ/לְוִיִּ֔ם תַּ֥חַת כָּל בְּכ֖וֹר בִּ/בְנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: And I took the Levites in place of every firstborn among the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the Israelites.' The Hebrew reads 'among the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶקַּח
  chosen: And I took
  alternatives:
  - And I accepted
  - And I selected
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cs of לקח, the normal narrative form meaning 'and I took.'
    In this context God speaks of appointing or taking the Levites for a role, but
    'took' best preserves the concrete verbal sense without over-interpreting.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  rationale: Marks 'the Levites' as the definite direct object; it has no direct English
    equivalent.
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the tribe of Levi
  lexicon: HALOT
  rationale: Definite plural gentilic/noun referring specifically to the Levites.
    'The Levites' is the standard and precise rendering.
- source_word: תַּחַת
  chosen: in place of
  alternatives:
  - instead of
  - under
  lexicon: HALOT
  rationale: Here תַּחַת expresses substitution or replacement, not spatial position.
    'In place of' clearly conveys the representative exchange in this cultic context.
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: 'With singular בְּכוֹר, כָּל has distributive force: ''every firstborn''
    rather than the collective ''all the firstborn.'''
- source_word: בְּכוֹר
  chosen: firstborn
  alternatives:
  - firstborn male
  lexicon: HALOT
  rationale: The noun means 'firstborn.' Although the broader context concerns firstborn
    males, the Hebrew here simply says 'firstborn,' so the translation should not
    add 'male' in the main text.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - among the Israelites
  - among the children of Israel
  lexicon: HALOT
  rationale: Literally 'among the sons of Israel.' Per the project's gender-accurate
    principle, 'sons of Israel' preserves the source expression. 'Among' is idiomatic
    for the ב preposition in this partitive/social sense.
