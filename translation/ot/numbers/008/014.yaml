theological_decisions:
- issue: Whether to render the Levites' status as simple possession or as cultic consecration
  chosen_reading: the Levites shall be mine
  alternative_readings:
  - the Levites shall belong to me
  - the Levites shall be dedicated to me
  rationale: The Hebrew לִי with היה straightforwardly expresses belonging to Yahweh.
    While the broader context is cultic consecration, this verse itself states possession/belonging
    rather than explicitly using consecration vocabulary. The translation preserves
    that wording and lets the context supply the theological significance.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
