id: NUM.8.14
reference: Numbers 8:14
source:
  edition: WLC
  text: וְ/הִבְדַּלְתָּ֙ אֶת הַ/לְוִיִּ֔ם מִ/תּ֖וֹךְ בְּנֵ֣י יִשְׂרָאֵ֑ל וְ/הָ֥יוּ
    לִ֖/י הַ/לְוִיִּֽם־׃
translation:
  text: So you shall separate the Levites from among the sons of Israel, and the Levites
    shall be mine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set apart' for 'separate.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites'; Hebrew 'the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'shall belong to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִבְדַּלְתָּ
  chosen: So you shall separate
  alternatives:
  - And you shall separate
  - set apart
  lexicon: HALOT
  rationale: Hiphil of בדל means to separate or set apart. 'Separate' is the most
    direct rendering; 'set apart' is possible but slightly more interpretive/cultic.
    The prefixed conjunction is rendered 'So' to reflect the procedural sequence in
    context, though 'And' is also possible.
- source_word: אֶת הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Direct object marker plus the definite plural noun. 'Levites' is the
    standard and transparent transliteration for members of the tribe/clan of Levi.
- source_word: מִתּוֹךְ
  chosen: from among
  alternatives:
  - from the midst of
  - out of the midst of
  lexicon: HALOT
  rationale: The preposition plus noun denotes separation from within a larger group.
    'From among' is idiomatic modern English and preserves the sense of selection
    out of the Israelites.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with the gender-accurate policy,
    the familial expression is preserved rather than flattened to 'people of Israel.'
    'Israelites' is possible, but the more literal rendering better reflects the Hebrew
    form here.
- source_word: וְהָיוּ לִי
  chosen: and ... shall be mine
  alternatives:
  - and ... shall belong to me
  - and ... shall be for me
  lexicon: HALOT
  rationale: The clause expresses possession or special belonging. 'Shall be mine'
    is natural English and preserves the covenantal force without overexpansion.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Repeated for emphasis in Hebrew; retained in English rather than replaced
    with a pronoun, preserving the formal and emphatic structure of the source.
