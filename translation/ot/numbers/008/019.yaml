id: NUM.8.19
reference: Numbers 8:19
source:
  edition: WLC
  text: וָ/אֶתְּנָ֨/ה אֶת הַ/לְוִיִּ֜ם נְתֻנִ֣ים לְ/אַהֲרֹ֣ן וּ/לְ/בָנָ֗י/ו מִ/תּוֹךְ֮
    בְּנֵ֣י יִשְׂרָאֵל֒ לַ/עֲבֹ֞ד אֶת עֲבֹדַ֤ת בְּנֵֽי יִשְׂרָאֵל֙ בְּ/אֹ֣הֶל מוֹעֵ֔ד
    וּ/לְ/כַפֵּ֖ר עַל בְּנֵ֣י יִשְׂרָאֵ֑ל וְ/לֹ֨א יִהְיֶ֜ה בִּ/בְנֵ֤י יִשְׂרָאֵל֙
    נֶ֔גֶף בְּ/גֶ֥שֶׁת בְּנֵֽי יִשְׂרָאֵ֖ל אֶל הַ/קֹּֽדֶשׁ־׀־־־־־׃
translation:
  text: And I have given the Levites as ones given to Aaron and to his sons from among
    the sons of Israel, to do the service of the sons of Israel in the tent of meeting,
    and to make atonement for the sons of Israel, so that there may not be a plague
    among the sons of Israel when the sons of Israel come near to the holy place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Levites, who are given to Aaron and to his sons.' The Hebrew repeats
      the root 'give' for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'from among the Israelites.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the sanctuary.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְּנָה
  chosen: And I have given
  alternatives:
  - And I gave
  lexicon: HALOT
  rationale: Qal wayyiqtol/cohortative-like form of נתן in narrative sequence. English
    present perfect captures the resultative force in this divine speech, though simple
    past is possible.
- source_word: הַלְוִיִּם נְתֻנִים
  chosen: the Levites as ones given
  alternatives:
  - the Levites, given men
  - the Levites as a gift
  - the Levites, who are given
  lexicon: HALOT
  rationale: The participle נְתֻנִים repeats the נתן root for emphasis. Rendering
    it explicitly preserves the Hebrew wordplay/intensification that the Levites are
    themselves 'given' to priestly service.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  chosen: to Aaron and to his sons
  alternatives:
  - for Aaron and for his sons
  lexicon: HALOT
  rationale: ל marks indirect object/beneficiary. 'To Aaron and to his sons' is the
    most straightforward and preserves the familial priestly reference.
- source_word: מִתּוֹךְ בְּנֵי יִשְׂרָאֵל
  chosen: from among the sons of Israel
  alternatives:
  - from among the Israelites
  - out of the sons of Israel
  lexicon: HALOT
  rationale: מִתּוֹךְ indicates selection from within the larger group. 'Sons of Israel'
    preserves the Hebrew expression and the project's gender-accurate policy.
- source_word: לַעֲבֹד אֶת עֲבֹדַת
  chosen: to do the service of
  alternatives:
  - to serve in place of
  - to perform the service of
  - to work the work of
  lexicon: HALOT
  rationale: The infinitive plus cognate noun of עבד emphasizes performance of assigned
    cultic duty. 'Do the service of' is readable while preserving the service-language.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: Standard rendering of the tabernacle designation; 'tent of meeting' is
    established and transparent.
- source_word: וּלְכַפֵּר עַל
  chosen: and to make atonement for
  alternatives:
  - and to purge for
  - and to effect atonement for
  lexicon: HALOT
  rationale: כפר in priestly context denotes atonement/purging. 'Make atonement for'
    is the clearest idiomatic English and preserves the cultic-theological sense without
    over-specifying mechanism.
- source_word: נֶגֶף
  chosen: a plague
  alternatives:
  - an outbreak
  - a blow
  - a deadly affliction
  lexicon: HALOT
  rationale: In sanctuary-violation contexts נֶגֶף commonly denotes a divinely inflicted
    plague or deadly strike. 'Plague' is concise and idiomatic.
- source_word: בְּגֶשֶׁת
  chosen: when ... come near
  alternatives:
  - in approaching
  - at the approach of
  lexicon: HALOT
  rationale: 'Infinitive construct of נגשׁ with prefixed ב conveys temporal circumstance:
    ''when ... come near/approach.'' This is smoother in English than a more wooden
    nominal rendering.'
- source_word: הַקֹּדֶשׁ
  chosen: the holy place
  alternatives:
  - the sanctuary
  - the holy thing
  lexicon: HALOT
  rationale: In this tabernacle context, הַקֹּדֶשׁ refers to the sacred area/sanctuary
    rather than holiness in the abstract. 'Holy place' preserves the concrete cultic
    sense and avoids over-interpretive narrowing.
