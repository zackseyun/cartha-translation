theological_decisions:
- issue: Role of the Levites in relation to Israel and the priests
  chosen_reading: The Levites are given from among Israel to Aaron and his sons to
    perform Israel's service and to make atonement on Israel's behalf.
  alternative_readings:
  - The Levites merely assist with practical duties without any atoning role
  rationale: The verse explicitly assigns both service and atonement-related function
    to the Levites in connection with the tent of meeting. The translation preserves
    this wording without importing later distinctions beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - people of Israel
  rationale: The Hebrew is grammatically masculine plural and functions as the covenant
    people designation. Per the project's gender-accurate policy, the formal expression
    is retained rather than neutralized, while remaining understandable in context.
  doctrine_reference: Gender-accurate over gender-neutral.
