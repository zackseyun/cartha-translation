- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the doctrinally
    specified default for יְהוָה, the main text uses 'the LORD' rather than a direct
    transliteration. This is a translation-policy decision rather than a disputed
    theological claim in the verse itself.
