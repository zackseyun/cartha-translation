id: NUM.8.23
reference: Numbers 8:23
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: Then Yahweh spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then spoke
  alternatives:
  - And spoke
  - said
  lexicon: HALOT
  rationale: Wayyiqtol of דבר introduces the next narrative event. In English, 'Then ... spoke' naturally conveys sequential progression; 'said' is possible, but with the following לֵאמֹר formula, 'spoke ... saying' preserves the Hebrew structure without over-paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition indicating the addressee of speech; 'to' is the natural modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - these words
  lexicon: HALOT
  rationale: Infinitive construct of אמר used as the common speech-introduction formula after 'spoke.' Rendering it 'saying' preserves the formal Hebrew pattern and prepares for the direct speech in the following verse.
