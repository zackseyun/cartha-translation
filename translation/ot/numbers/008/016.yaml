theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - people of Israel
  - Israelites
  rationale: The Hebrew is explicitly the masculine familial expression 'sons of Israel.'
    Following the gender-accurate policy, the translation preserves this form rather
    than neutralizing it, while recognizing that in context it refers corporately
    to Israel.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
