id: NUM.8.16
reference: Numbers 8:16
source:
  edition: WLC
  text: כִּי֩ נְתֻנִ֨ים נְתֻנִ֥ים הֵ֨מָּה֙ לִ֔/י מִ/תּ֖וֹךְ בְּנֵ֣י יִשְׂרָאֵ֑ל תַּחַת֩
    פִּטְרַ֨ת כָּל רֶ֜חֶם בְּכ֥וֹר כֹּל֙ מִ/בְּנֵ֣י יִשְׂרָאֵ֔ל לָקַ֥חְתִּי אֹתָ֖/ם
    לִֽ/י־׃
translation:
  text: For they are wholly given to me from among the sons of Israel; in place of
    everyone who opens the womb, the firstborn of all the sons of Israel, I have taken
    them for myself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'surely given to me' or 'completely given to me'; the Hebrew repeats
      'given' for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'everyone who opens the womb,' an idiom for the firstborn.
    reason: lexical_alternative
  - marker: c
    text: Or 'people of Israel' or 'Israelites'; Hebrew 'sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְתֻנִים נְתֻנִים
  chosen: wholly given
  alternatives:
  - surely given
  - completely given
  - given over
  lexicon: HALOT
  rationale: The doubled passive participle of נתן is emphatic. 'Wholly given' captures
    the intensification in natural English without awkward repetition, while preserving
    the sense that the Levites are specially assigned to God.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The first לִי expresses possession/dedication. 'To me' fits the predicative
    construction 'given to me' in English.
- source_word: מִתּוֹךְ בְּנֵי יִשְׂרָאֵל
  chosen: from among the sons of Israel
  alternatives:
  - from among the people of Israel
  - out of the sons of Israel
  lexicon: HALOT
  rationale: מִתּוֹךְ indicates selection from within a group. 'From among' is idiomatic
    and accurate. 'Sons of Israel' preserves the masculine familial expression in
    line with the gender-accurate policy.
- source_word: תַּחַת
  chosen: in place of
  alternatives:
  - instead of
  - in exchange for
  lexicon: HALOT
  rationale: 'Here תַּחַת marks substitution: the Levites are taken as substitutes
    for the firstborn. ''In place of'' is clear and suitably formal.'
- source_word: פִּטְרַת כָּל רֶחֶם
  chosen: everyone who opens the womb
  alternatives:
  - every opener of the womb
  - every first issue of the womb
  lexicon: HALOT
  rationale: This idiom refers to the one that first emerges from the womb, i.e.,
    the firstborn. Rendering it verbally as 'everyone who opens the womb' preserves
    the Hebrew imagery while remaining understandable.
- source_word: בְּכוֹר כֹּל מִבְּנֵי יִשְׂרָאֵל
  chosen: the firstborn of all the sons of Israel
  alternatives:
  - every firstborn among the sons of Israel
  - all the firstborn of the sons of Israel
  lexicon: HALOT
  rationale: This appositional phrase clarifies the preceding idiom. 'The firstborn
    of all the sons of Israel' preserves the syntax and scope.
- source_word: לָקַחְתִּי אֹתָם לִי
  chosen: I have taken them for myself
  alternatives:
  - I took them to myself
  - I have taken them to me
  lexicon: HALOT
  rationale: The perfect verb with final לִי expresses completed divine appropriation.
    'For myself' brings out the personal claim and sounds natural in English.
