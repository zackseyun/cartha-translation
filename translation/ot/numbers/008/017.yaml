theological_decisions:
- issue: Rendering of אָדָם in a human/animal contrast
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew uses אָדָם as the human category over against beast. Following
    the doctrine's gender-accurate principle, 'man' is retained where it denotes humanity
    generically, while the contrast makes the sense clear.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; אָדָם default
    ''man / humankind (context)''.'
- issue: Sacral force of הִקְדַּשְׁתִּי
  chosen_reading: I consecrated them to myself
  alternative_readings:
  - I sanctified them for myself
  - I set them apart for myself
  rationale: The verse grounds the Levites' substitution in God's prior claim on the
    firstborn as holy to him. 'Consecrated' preserves that theological-sacral force
    without importing later technical terminology beyond the Hebrew.
  doctrine_reference: 'DOCTRINE.md: Preserve theological weight without unnecessary
    jargon.'
