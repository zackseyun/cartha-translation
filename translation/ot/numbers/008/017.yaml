id: NUM.8.17
reference: Numbers 8:17
source:
  edition: WLC
  text: כִּ֣י לִ֤/י כָל בְּכוֹר֙ בִּ/בְנֵ֣י יִשְׂרָאֵ֔ל בָּ/אָדָ֖ם וּ/בַ/בְּהֵמָ֑ה
    בְּ/י֗וֹם הַכֹּתִ֤/י כָל בְּכוֹר֙ בְּ/אֶ֣רֶץ מִצְרַ֔יִם הִקְדַּ֥שְׁתִּי אֹתָ֖/ם
    לִֽ/י־־׃
translation:
  text: For every firstborn among the sons of Israel is mine, among man and among
    beast. On the day I struck every firstborn in the land of Egypt, I consecrated
    them to myself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among humankind and among animals.' The Hebrew uses singular collective
      terms in contrast.
    reason: lexical_alternative
  - marker: b
    text: Or 'I set them apart for myself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the rationale for the preceding statement; 'For' fits the
    explanatory force in context.
- source_word: לִי
  chosen: is mine
  alternatives:
  - belongs to me
  - is for me
  lexicon: HALOT
  rationale: The prepositional phrase expresses possession; idiomatic English requires
    an explicit possessive predicate.
- source_word: כָל בְּכוֹר
  chosen: every firstborn
  alternatives:
  - all the firstborn
  - every firstborn male
  lexicon: HALOT
  rationale: Collective singular is naturally rendered 'every firstborn.' 'Male' is
    not explicitly present in this verse, so it is not added.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - among the Israelites
  - among the children of Israel
  lexicon: HALOT
  rationale: Retains the familial covenantal expression בני ישראל with a relatively
    formal rendering. 'Israelites' is possible, but 'sons of Israel' more closely
    reflects the Hebrew wording.
- source_word: בָּאָדָם
  chosen: among man
  alternatives:
  - from man
  - whether human
  - among humankind
  lexicon: HALOT
  rationale: אָדָם here contrasts humans with animals. Per doctrine, gender-accurate
    rendering is preferred; 'man' here carries the human category sense. 'Among' mirrors
    the repeated ב preposition and preserves the parallelism with the following phrase.
- source_word: וּבַבְּהֵמָה
  chosen: and among beast
  alternatives:
  - and among animals
  - and among livestock
  lexicon: HALOT
  rationale: בְּהֵמָה here denotes animals in contrast with humans. 'Beast' preserves
    the concise category term and matches the singular collective style of the Hebrew.
- source_word: בְּיוֹם
  chosen: On the day
  alternatives:
  - In the day
  - When
  lexicon: HALOT
  rationale: Temporal expression introducing the historical occasion; 'On the day'
    is a natural and sufficiently formal rendering.
- source_word: הַכֹּתִי
  chosen: I struck
  alternatives:
  - I smote
  - I struck down
  lexicon: HALOT
  rationale: From נכה, referring to the plague on Egypt's firstborn. 'I struck' is
    modern and direct; 'struck down' is interpretive since the verb itself need not
    specify death in isolation, though the context implies lethal judgment.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: Preserves the full Hebrew phrase including 'land,' which carries narrative
    and covenantal resonance.
- source_word: הִקְדַּשְׁתִּי אֹתָם לִי
  chosen: I consecrated them to myself
  alternatives:
  - I sanctified them for myself
  - I set them apart for myself
  lexicon: HALOT
  rationale: קדשׁ in the hiphil means to set apart as holy/consecrate. 'Consecrated'
    preserves the sacred dimension better than the more general 'set apart,' while
    'to myself' renders לִי idiomatically.
