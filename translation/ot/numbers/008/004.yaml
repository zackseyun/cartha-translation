id: NUM.8.4
reference: Numbers 8:4
source:
  edition: WLC
  text: וְ/זֶ֨ה מַעֲשֵׂ֤ה הַ/מְּנֹרָה֙ מִקְשָׁ֣ה זָהָ֔ב עַד יְרֵכָ֥/הּ עַד פִּרְחָ֖/הּ
    מִקְשָׁ֣ה הִ֑וא כַּ/מַּרְאֶ֗ה אֲשֶׁ֨ר הֶרְאָ֤ה יְהוָה֙ אֶת מֹשֶׁ֔ה כֵּ֥ן עָשָׂ֖ה
    אֶת הַ/מְּנֹרָֽה־־־־׃פ
translation:
  text: 'Now this was the workmanship of the lampstand: hammered gold, from its base
    to its flower it was hammered work. According to the pattern that the LORD had
    shown Moses, so he made the lampstand.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beaten work'; the Hebrew emphasizes that the lampstand was fashioned
      by hammering. Some also understand the term to imply 'of one piece.'
    reason: lexical_alternative
  - marker: b
    text: '''According to the pattern'' could also be rendered ''according to the
      appearance'' or ''according to the vision'' that the LORD showed Moses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעֲשֵׂה
  chosen: workmanship
  alternatives:
  - construction
  - work
  lexicon: HALOT
  rationale: Conveys the crafted manufacture or manner of construction of the lampstand,
    not merely an abstract 'work.' 'Workmanship' fits the artisan context.
- source_word: הַמְּנֹרָה
  chosen: the lampstand
  alternatives:
  - the menorah
  - the lamp
  lexicon: HALOT
  rationale: Translated rather than transliterated per project philosophy for common
    cultic object names. 'Lampstand' is standard and clear in English.
- source_word: מִקְשָׁה
  chosen: hammered gold / hammered work
  alternatives:
  - beaten work
  - of one piece
  lexicon: HALOT
  rationale: The term denotes something hammered or beaten out by metalwork. Because
    it appears twice, the first instance is expressed adjectivally with 'hammered
    gold' and the second predicatively as 'hammered work' to preserve the repeated
    emphasis while keeping natural English. 'Of one piece' is interpretive and secondary.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material designation.
- source_word: עַד יְרֵכָהּ
  chosen: from its base
  alternatives:
  - to its base
  - as far as its shaft
  lexicon: HALOT
  rationale: Although עַד often means 'up to/as far as,' in English the paired expression
    is best rendered 'from ... to ...' to indicate the whole extent. יָרֵךְ here refers
    to the lower/base part of the lampstand, not a literal 'thigh.' 'Base' is the
    clearest contextual rendering.
- source_word: עַד פִּרְחָהּ
  chosen: to its flower
  alternatives:
  - to its blossoms
  - to its floral part
  lexicon: HALOT
  rationale: Refers to the flower-like ornamentation on the lampstand. Singular 'flower'
    matches the Hebrew form and works idiomatically in English as a collective/design
    feature.
- source_word: כַּמַּרְאֶה
  chosen: according to the pattern
  alternatives:
  - according to the appearance
  - according to the vision
  lexicon: HALOT
  rationale: In this tabernacle-construction context, the sense is the model or form
    shown to Moses, not merely visual appearance. 'Pattern' communicates the intended
    referent clearly and aligns with related sanctuary passages.
- source_word: הֶרְאָה
  chosen: had shown
  alternatives:
  - showed
  - caused to see
  lexicon: HALOT
  rationale: The causative form of ראה means 'show.' English past perfect fits the
    relative clause naturally in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the project's default rendering for the divine name.
- source_word: כֵּן עָשָׂה
  chosen: so he made
  alternatives:
  - thus he made
  - so it was made
  lexicon: HALOT
  rationale: Keeps the demonstrative-correlative force ('according to... so...').
    The subject is most naturally understood as the human maker, left implicit in
    Hebrew.
