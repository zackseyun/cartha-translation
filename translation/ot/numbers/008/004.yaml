theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH and preserves the traditional
    reverential convention without altering the verse's meaning.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Implicit subject of עָשָׂה
  chosen_reading: he made
  alternative_readings:
  - it was made
  - one made
  rationale: Hebrew leaves the subject implicit. Given the immediate context of the
    lampstand's manufacture and the singular verb, English requires an explicit subject.
    'He made' best reflects the likely understood artisan/agent without importing
    a doctrinal claim. Passive 'it was made' would obscure the active verb.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
