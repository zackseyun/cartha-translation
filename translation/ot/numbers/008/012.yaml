id: NUM.8.12
reference: Numbers 8:12
source:
  edition: WLC
  text: וְ/הַ/לְוִיִּם֙ יִסְמְכ֣וּ אֶת יְדֵי/הֶ֔ם עַ֖ל רֹ֣אשׁ הַ/פָּרִ֑ים וַ֠/עֲשֵׂה
    אֶת הָ/אֶחָ֨ד חַטָּ֜את וְ/אֶת הָ/אֶחָ֤ד עֹלָה֙ לַֽ/יהוָ֔ה לְ/כַפֵּ֖ר עַל הַ/לְוִיִּֽם־־־־׃
translation:
  text: Then the Levites shall lay their hands on the heads of the bulls, and you
    shall offer one as a sin offering and the other as a burnt offering to the LORD,
    to make atonement for the Levites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a purification offering' for 'a sin offering.' The Hebrew term חַטָּאת
      can denote the offering associated with sin and purification in priestly contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִסְמְכוּ
  chosen: shall lay
  alternatives:
  - shall lean
  - shall place
  lexicon: HALOT
  rationale: The verb סמך in sacrificial contexts refers to the ritual act of laying
    hands on an offering animal. 'Lay' is idiomatic and precise in English for this
    cultic gesture.
- source_word: יְדֵיהֶם
  chosen: their hands
  lexicon: HALOT
  rationale: Literal rendering preserves the physical ritual action without abstraction.
- source_word: עַל רֹאשׁ הַפָּרִים
  chosen: on the heads of the bulls
  alternatives:
  - on the head of the bulls
  lexicon: HALOT
  rationale: Although ראשׁ is singular in construct, English idiom with a plural object
    is best rendered 'the heads of the bulls,' reflecting distributive sense over
    the two animals.
- source_word: וַעֲשֵׂה
  chosen: and you shall offer
  alternatives:
  - and you shall make
  - and perform
  lexicon: HALOT
  rationale: The addressee is singular, likely Aaron or the officiating priest. In
    sacrificial context, עשה with the offering as object is idiomatically 'offer'
    rather than the overly literal 'make.'
- source_word: חַטָּאת
  chosen: sin offering
  alternatives:
  - purification offering
  lexicon: HALOT
  rationale: In sacrificial legislation חטאת can denote either 'sin' or the offering
    associated with sin/purification. 'Sin offering' is the standard and most immediately
    recognizable rendering here, while 'purification offering' is a viable scholarly
    alternative worth preserving in a footnote.
- source_word: עֹלָה
  chosen: burnt offering
  alternatives:
  - whole burnt offering
  lexicon: HALOT
  rationale: The established cultic term is 'burnt offering.' 'Whole burnt offering'
    is more explicit but less natural in running English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition here is naturally
    expressed as 'to' in the offering formula.
- source_word: לְכַפֵּר
  chosen: to make atonement
  alternatives:
  - to atone
  - to purge
  lexicon: HALOT
  rationale: כפר in priestly sacrificial context is conventionally and accurately
    rendered 'make atonement.' This preserves the cultic-theological force without
    importing a narrower doctrinal theory.
- source_word: עַל הַלְוִיִּם
  chosen: for the Levites
  alternatives:
  - on behalf of the Levites
  - concerning the Levites
  lexicon: HALOT
  rationale: With כפר על, English commonly uses 'for' to express the beneficiaries
    of atonement. This is natural and faithful to the ritual sense.
