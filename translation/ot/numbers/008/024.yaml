id: NUM.8.24
reference: Numbers 8:24
source:
  edition: WLC
  text: זֹ֖את אֲשֶׁ֣ר לַ/לְוִיִּ֑ם מִ/בֶּן֩ חָמֵ֨שׁ וְ/עֶשְׂרִ֤ים שָׁנָה֙ וָ/מַ֔עְלָ/ה
    יָבוֹא֙ לִ/צְבֹ֣א צָבָ֔א בַּ/עֲבֹדַ֖ת אֹ֥הֶל מוֹעֵֽד׃
translation:
  text: 'This is what pertains to the Levites: from twenty-five years old and upward,
    he shall come to serve in the service of the tent of meeting.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to perform duty' / 'to do service'; the Hebrew לִצְבֹא צָבָא uses a
      service-duty idiom with military overtones.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת אֲשֶׁר
  chosen: This is what pertains to
  alternatives:
  - This is what belongs to
  - This is what concerns
  - This is what applies to
  lexicon: HALOT
  rationale: The construction introduces a regulation applying to the Levites. 'Pertains
    to' is natural English that preserves the legal/instructional force without over-paraphrasing.
- source_word: לַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Straightforward rendering of the people group/designation.
- source_word: מִבֶּן חָמֵשׁ וְעֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty-five years old and upward
  alternatives:
  - from the age of twenty-five and up
  - from twenty-five years and above
  lexicon: HALOT
  rationale: This idiom marks the minimum age threshold. 'Years old and upward' is
    idiomatic and close to the Hebrew.
- source_word: יָבוֹא
  chosen: he shall come
  alternatives:
  - he shall enter
  - he shall come in
  lexicon: HALOT
  rationale: The singular verb after a collective subject is naturally rendered with
    generic singular 'he shall come,' preserving the Hebrew number and legal style.
- source_word: לִצְבֹא צָבָא
  chosen: to serve
  alternatives:
  - to perform duty
  - to do service
  - to wage service
  lexicon: HALOT
  rationale: The idiom literally involves rendering service/duty, often with a military
    metaphor. In this cultic context, 'to serve' is the clearest main-text rendering;
    the more literal nuance of duty/service is preserved in the following noun and
    footnote.
- source_word: בַּעֲבֹדַת
  chosen: in the service of
  alternatives:
  - for the work of
  - in the work of
  lexicon: HALOT
  rationale: עֲבֹדָה here denotes assigned labor/service in sanctuary duties. 'In
    the service of' fits the immediate collocation and avoids flattening the formal
    task-oriented sense.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: Standard and accurate rendering of the tabernacle designation in the
    Pentateuch.
