theological_decisions:
- issue: Generic singular verb with collective subject
  chosen_reading: he shall come
  alternative_readings:
  - they shall come
  rationale: The Hebrew uses a singular verb in a legal instruction concerning the
    Levites collectively. Retaining the generic singular better reflects the source
    form and aligns with the project's gender-accurate policy, while the collective
    sense remains clear in context.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
