id: NUM.8.1
reference: Numbers 8:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: And Yahweh spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: And ... spoke
  alternatives:
  - Then ... spoke
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive with דבר commonly advances the narrative with 'and' or 'then.' 'Spoke' is preferred because דבר denotes speaking more generally, while the following לֵאמֹר introduces the specific speech formula. Retaining 'And' reflects Hebrew narrative style without over-paraphrasing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition straightforwardly marks the indirect object of speech. 'To' is the natural modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name, in keeping with the policy to transliterate names rather than translate them.
- source_word: לֵּאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive construct functions as the conventional speech-introduction formula after verbs of speaking. 'Saying' preserves the formal structure and signals that the content follows in the next verse.
