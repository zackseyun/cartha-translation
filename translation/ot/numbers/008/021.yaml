id: NUM.8.21
reference: Numbers 8:21
source:
  edition: WLC
  text: וַ/יִּֽתְחַטְּא֣וּ הַ/לְוִיִּ֗ם וַֽ/יְכַבְּסוּ֙ בִּגְדֵי/הֶ֔ם וַ/יָּ֨נֶף אַהֲרֹ֥ן אֹתָ֛/ם תְּנוּפָ֖ה לִ/פְנֵ֣י יְהוָ֑ה וַ/יְכַפֵּ֧ר עֲלֵי/הֶ֛ם אַהֲרֹ֖ן לְ/טַהֲרָֽ/ם׃
translation:
  text: And the Levites purified themselves and washed their garments, and Aaron presented them as a wave offering before Yahweh, and Aaron made atonement for them to cleanse them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'waved them as a wave offering.' The Hebrew uses the standard ritual expression for presenting something before the LORD as a תְּנוּפָה.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְחַטְּאוּ
  chosen: purified themselves from sin
  alternatives:
  - cleansed themselves
  - purified themselves
  - de-sinned themselves
  lexicon: HALOT
  rationale: The hitpael of חטא in priestly purification contexts means to undergo purification from sin/impurity rather than merely 'sin.' 'Purified themselves from sin' makes the reflexive stem and ritual context clear in natural English.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/clan designation; definite article preserved.
- source_word: וַיְכַבְּסוּ בִּגְדֵיהֶם
  chosen: washed their garments
  alternatives:
  - washed their clothes
  lexicon: HALOT
  rationale: בגד often means garment/clothing. 'Garments' fits the ritual setting slightly better than the more casual 'clothes.'
- source_word: וַיָּנֶף ... תְּנוּפָה
  chosen: presented them as a wave offering
  alternatives:
  - waved them as a wave offering
  - presented them as an elevation offering
  lexicon: HALOT
  rationale: The idiom of נוף with תְּנוּפָה refers to the ritual presentation known traditionally as a 'wave offering.' Since the direct object is the Levites themselves, 'presented them as a wave offering' communicates the ritual act without implying crude physical motion beyond the text's intent. 'Elevation offering' is possible in some contexts but less established here.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard covenantal rendering. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: וַיְכַפֵּר עֲלֵיהֶם
  chosen: made atonement for them
  alternatives:
  - made expiation for them
  - covered them
  lexicon: HALOT
  rationale: כפר in priestly sacrificial contexts is best rendered 'make atonement.' This is the standard accessible English equivalent and preserves the cultic-theological sense.
- source_word: לְטַהֲרָם
  chosen: to cleanse them
  alternatives:
  - to purify them
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result of Aaron's atoning act. 'To cleanse them' is natural English and avoids redundancy with the earlier reflexive purification phrase while preserving ritual purity language.
