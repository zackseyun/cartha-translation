theological_decisions:
- issue: Rendering the ritual language of חטא/טהר/כפר in a way that preserves priestly categories without importing later doctrinal precision
  chosen_reading: Use 'purified themselves from sin,' 'made atonement,' and 'to cleanse them'
  alternative_readings:
  - Use 'cleansed themselves,' 'made expiation,' and 'to purify them'
  rationale: 'The verse describes Levitical consecration and ritual purification. The chosen wording preserves the distinct but related priestly concepts: self-purification, Aaron''s atoning action, and resulting cleansing. It avoids flattening all three verbs into one English term while remaining readable.'
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Divine name rendering
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
