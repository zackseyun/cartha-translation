id: NUM.8.25
reference: Numbers 8:25
source:
  edition: WLC
  text: וּ/מִ/בֶּן֙ חֲמִשִּׁ֣ים שָׁנָ֔ה יָשׁ֖וּב מִ/צְּבָ֣א הָ/עֲבֹדָ֑ה וְ/לֹ֥א יַעֲבֹ֖ד
    עֽוֹד׃
translation:
  text: And from fifty years old he shall withdraw from the service of the work and
    shall work no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he shall return from the service of the work'; the Hebrew verb is literally
      'return/turn back,' here used in the sense of withdrawing from active duty.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבֶּן חֲמִשִּׁים שָׁנָה
  chosen: And from fifty years old
  alternatives:
  - And from the age of fifty years
  - And from fifty years of age
  lexicon: HALOT
  rationale: The idiom מִבֶּן ... שָׁנָה marks age threshold. 'From fifty years old'
    is natural English and preserves the Hebrew sense of beginning at that age.
- source_word: יָשׁוּב
  chosen: he shall withdraw
  alternatives:
  - he shall return
  - he shall turn back
  lexicon: HALOT
  rationale: The verb שוב literally means 'return/turn back,' but in this administrative/service
    context with מן ('from') it denotes ceasing or withdrawing from duty. 'Withdraw'
    communicates the functional sense without over-paraphrasing.
- source_word: מִצְּבָא
  chosen: from the service
  alternatives:
  - from the duty
  - from the company
  - from the labor force
  lexicon: HALOT
  rationale: צָבָא can denote service, duty, or host. In Numbers 4 and 8 it refers
    to the Levites' assigned service rather than military warfare. 'Service' best
    fits the cultic/work context.
- source_word: הָעֲבֹדָה
  chosen: of the work
  alternatives:
  - of the service
  - of the ministry
  lexicon: HALOT
  rationale: עֲבֹדָה denotes work/service. Rendering it distinctly as 'work' avoids
    collapsing it entirely into צָבָא and preserves the Hebrew pairing 'service of
    the work,' an official duty expression.
- source_word: וְלֹא יַעֲבֹד עוֹד
  chosen: and shall work no more
  alternatives:
  - and shall serve no longer
  - and shall not work anymore
  lexicon: HALOT
  rationale: עבד here refers to performing the assigned labor. 'Shall work no more'
    is straightforward modern English and preserves the force of the prohibition on
    continued active duty.
