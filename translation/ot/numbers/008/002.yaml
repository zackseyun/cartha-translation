id: NUM.8.2
reference: Numbers 8:2
source:
  edition: WLC
  text: דַּבֵּר֙ אֶֽל אַהֲרֹ֔ן וְ/אָמַרְתָּ֖ אֵלָ֑י/ו בְּ/הַעֲלֹֽתְ/ךָ֙ אֶת הַ/נֵּרֹ֔ת
    אֶל מוּל֙ פְּנֵ֣י הַ/מְּנוֹרָ֔ה יָאִ֖ירוּ שִׁבְעַ֥ת הַ/נֵּרֽוֹת־־־׃
translation:
  text: Speak to Aaron and say to him, ‘When you set up the lamps, the seven lamps
    shall give light in front of the lampstand.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “When you light the lamps.” The Hebrew verb literally means “cause to
      go up” and in this context may refer either to lighting the lamps or to setting
      them in place so that they shine forward.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Imperative of דבר introducing direct divine instruction to Moses; 'Speak'
    preserves the formal command register better than the more colloquial 'Tell'.
- source_word: וְאָמַרְתָּ אֵלָיו
  chosen: and say to him
  alternatives:
  - and tell him
  lexicon: HALOT
  rationale: Standard Hebrew speech formula. Rendering both verbs distinctly ('speak
    ... and say') reflects the source text rather than collapsing them.
- source_word: בְּהַעֲלֹתְךָ
  chosen: When you set up
  alternatives:
  - when you light
  - when you cause to go up
  lexicon: HALOT
  rationale: The Hiphil of עלה literally means 'cause to go up.' In lamp context it
    can refer to mounting or lighting the lamps. Here, because the following clause
    specifies the direction in which the lamps shine relative to the lampstand, 'set
    up' best captures the act of arranging/positioning the lamps without over-specifying
    ignition. The lighting sense is preserved in a footnote.
- source_word: הַנֵּרֹת
  chosen: the lamps
  alternatives:
  - the lights
  lexicon: HALOT
  rationale: נֵר normally denotes a lamp rather than abstract light; 'lamps' is the
    natural English equivalent in tabernacle furnishing context.
- source_word: אֶל מוּל פְּנֵי הַמְּנוֹרָה
  chosen: in front of the lampstand
  alternatives:
  - toward the front of the lampstand
  - opposite the face of the lampstand
  lexicon: HALOT
  rationale: The phrase combines אֶל, מוּל, and פְּנֵי to indicate orientation toward
    the front/opposite side of the lampstand. 'In front of the lampstand' is idiomatic
    English that preserves the directional sense without wooden literalism.
- source_word: יָאִירוּ
  chosen: shall give light
  alternatives:
  - shall shine
  - shall cast light
  lexicon: HALOT
  rationale: Hiphil of אור is causative, 'give light' or 'cause to shine.' 'Shall
    give light' reflects the causative nuance more clearly than the simpler 'shall
    shine'.
- source_word: שִׁבְעַת הַנֵּרוֹת
  chosen: the seven lamps
  alternatives:
  - all seven lamps
  lexicon: HALOT
  rationale: Construct numeral phrase straightforwardly rendered 'the seven lamps.'
    No need to expand beyond the Hebrew.
- source_word: הַמְּנוֹרָה
  chosen: the lampstand
  alternatives:
  - the menorah
  lexicon: HALOT
  rationale: Per translation philosophy, common cultic object terms are translated
    for meaning rather than transliterated. 'Lampstand' is standard and clear; 'menorah'
    is preserved as a lexical alternative in a footnote-worthy note only if needed,
    but not necessary here.
