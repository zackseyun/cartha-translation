theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The phrase is grammatically masculine plural and refers to the covenant
    people corporately. Following the doctrine's gender-accurate principle, the translation
    preserves the source form rather than neutralizing it in the main text. A more
    idiomatic alternative is worth preserving in a footnote for readability.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over
    gender-neutral)
