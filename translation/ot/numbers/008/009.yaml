id: NUM.8.9
reference: Numbers 8:9
source:
  edition: WLC
  text: וְ/הִקְרַבְתָּ֙ אֶת הַ/לְוִיִּ֔ם לִ/פְנֵ֖י אֹ֣הֶל מוֹעֵ֑ד וְ/הִ֨קְהַלְתָּ֔
    אֶֽת כָּל עֲדַ֖ת בְּנֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: Then you shall bring the Levites before the tent of meeting, and you shall
    assemble the whole congregation of the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “the Israelites.” Hebrew: “the sons of Israel.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתָּ
  chosen: Then you shall bring
  alternatives:
  - and you shall bring near
  - and you shall present
  lexicon: HALOT
  rationale: Hiphil of קרב commonly means to bring near/present. In this ritual context,
    'bring' is natural modern English and preserves the movement toward a sacred location;
    'Then' reflects the sequential waw in procedural instructions.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard ethnic/tribal designation for members of Levi's tribe set apart
    for sanctuary service.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  - before the presence of
  lexicon: HALOT
  rationale: The preposition literally denotes being before/in front of. 'Before'
    is idiomatic in English and can carry the formal sense of appearing in a ritual
    setting.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tent of appointment
  lexicon: HALOT
  rationale: Established and accurate rendering of the sanctuary term. It preserves
    the cultic setting without unnecessary paraphrase.
- source_word: וְהִקְהַלְתָּ
  chosen: and you shall assemble
  alternatives:
  - and you shall gather
  - and you shall convene
  lexicon: HALOT
  rationale: Hiphil of קהל means to assemble/gather a group. 'Assemble' fits the formal
    public action better than the more general 'gather'.
- source_word: כָּל עֲדַת
  chosen: the whole congregation
  alternatives:
  - all the congregation
  - the entire assembly
  lexicon: HALOT
  rationale: עֵדָה often denotes the assembled community of Israel. 'Congregation'
    is a conventional and still understandable rendering in Pentateuchal contexts;
    'whole' conveys כָּל.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural construct is preserved
    as 'sons of Israel.' Although 'Israelites' is smoother, the source expression
    is explicitly filial and masculine in form.
