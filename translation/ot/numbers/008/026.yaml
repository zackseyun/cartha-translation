theological_decisions:
- issue: Distinguishing permitted post-retirement activity from prohibited labor for
    Levites over the age threshold
  chosen_reading: The verse permits continued ministerial assistance/oversight while
    prohibiting the regular labor of tabernacle service.
  alternative_readings:
  - The verse absolutely forbids all service after the age threshold
  - The verse permits only guard duty in a narrow security sense
  rationale: The contrast between שרת ('minister') and עֲבֹדָה...עבד ('service/labor')
    indicates a distinction within Levitical work rather than a total cessation of
    all participation. The translation preserves that tension by using different English
    terms.
