id: NUM.8.26
reference: Numbers 8:26
source:
  edition: WLC
  text: וְ/שֵׁרֵ֨ת אֶת אֶחָ֜י/ו בְּ/אֹ֤הֶל מוֹעֵד֙ לִ/שְׁמֹ֣ר מִשְׁמֶ֔רֶת וַ/עֲבֹדָ֖ה
    לֹ֣א יַעֲבֹ֑ד כָּ֛כָה תַּעֲשֶׂ֥ה לַ/לְוִיִּ֖ם בְּ/מִשְׁמְרֹתָֽ/ם־׃פ
translation:
  text: But he may minister with his brothers in the tent of meeting, to keep the
    duty, but he shall do no service. Thus you shall do for the Levites in their duties.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to keep the charge.' The Hebrew expression לִשְׁמֹר מִשְׁמֶרֶת refers
      to fulfilling an assigned responsibility.
    reason: lexical_alternative
  - marker: b
    text: Or 'but he shall do no labor.' The Hebrew contrasts permitted ministry with
      the regular work/service from which the older Levite is exempt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֵׁרֵת
  chosen: But he may minister
  alternatives:
  - and he shall minister
  - and he may serve
  lexicon: HALOT
  rationale: The verb שרת commonly denotes ministerial/service activity, often in
    sacred contexts. Given the contrast with the following prohibition on עֲבֹדָה/יַעֲבֹד,
    'minister' helps distinguish permitted supportive participation from the heavier
    labor now forbidden. The prefixed conjunction is rendered adversatively ('But')
    because the verse contrasts with the prior retirement from active service.
- source_word: אֶת־אֶחָיו
  chosen: with his brothers
  alternatives:
  - his brothers
  - alongside his fellow Levites
  lexicon: HALOT
  rationale: 'The direct-object marker with ''his brothers'' in context after שרת
    can be represented idiomatically as association in English: he ministers with/alongside
    his fellow Levites. ''Brothers'' preserves the masculine kinship term per gender-accurate
    policy; the referent is the Levitical cohort.'
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: Standard rendering of the tabernacle phrase. 'Tent of meeting' is the
    established literal sense of אֹהֶל מוֹעֵד.
- source_word: לִשְׁמֹר מִשְׁמֶרֶת
  chosen: to keep the duty
  alternatives:
  - to keep the charge
  - to perform guard duty
  - to keep the obligation
  lexicon: HALOT
  rationale: The infinitive plus cognate noun expresses fulfilling an assigned responsibility.
    'Keep the duty' is concise and natural, while preserving the sense of maintaining
    an entrusted charge. 'Charge' is possible, but 'duty' reads more clearly in modern
    English here.
- source_word: וַעֲבֹדָה לֹא יַעֲבֹד
  chosen: but he shall do no service
  alternatives:
  - but he shall not work
  - but he shall do no labor
  lexicon: HALOT
  rationale: The noun עֲבֹדָה with the verb עבד forms an emphatic statement that he
    is not to engage in the regular labor/service proper to younger Levites. 'Do no
    service' preserves the lexical connection while distinguishing it from the earlier
    sacred 'minister'.
- source_word: כָּכָה תַּעֲשֶׂה
  chosen: Thus you shall do
  alternatives:
  - So you shall do
  - In this way you shall deal
  lexicon: HALOT
  rationale: A straightforward instructional formula concluding the regulation.
- source_word: לַלְוִיִּם
  chosen: for the Levites
  alternatives:
  - to the Levites
  - with the Levites
  lexicon: HALOT
  rationale: 'The preposition here is best rendered ''for'' in English idiom: this
    is the rule to be applied for the Levites.'
- source_word: בְּמִשְׁמְרֹתָם
  chosen: in their duties
  alternatives:
  - in their charges
  - in their assigned responsibilities
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת again denotes assigned responsibility/charge. 'Duties' gives
    a natural modern rendering and echoes the earlier phrase without becoming wooden.
