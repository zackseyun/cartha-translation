theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guideline specifies 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: How to express the ritual action involving the Levites
  chosen_reading: present them as a wave offering
  alternative_readings:
  - wave them as a wave offering
  - offer them as a presentation offering
  rationale: The Hebrew uses both the verb נוף and the noun תְּנוּפָה, indicating
    a formal ritual presentation. The chosen rendering preserves the sacrificial category
    without implying a crude physical motion that could obscure the ceremonial meaning
    when applied to persons.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; consistency
    of key terms, or documented exception'
