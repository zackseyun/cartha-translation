id: NUM.8.13
reference: Numbers 8:13
source:
  edition: WLC
  text: וְ/הַֽעֲמַדְתָּ֙ אֶת הַ/לְוִיִּ֔ם לִ/פְנֵ֥י אַהֲרֹ֖ן וְ/לִ/פְנֵ֣י בָנָ֑י/ו
    וְ/הֵנַפְתָּ֥ אֹתָ֛/ם תְּנוּפָ֖ה לַֽ/יהוָֽה־׃
translation:
  text: And you shall set the Levites before Aaron and before his sons, and you shall
    present them as a wave offering to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'wave them as a wave offering to the LORD.' The Hebrew
      uses the verb for ritual waving/presentation together with the noun 'wave offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַעֲמַדְתָּ
  chosen: you shall set
  alternatives:
  - you shall station
  - you shall stand
  lexicon: HALOT
  rationale: Hiphil of עמד here is causative, meaning to cause to stand or place in
    position. 'Set' is natural modern English and fits the ritual context of placing
    the Levites before Aaron and his sons.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal group designation; definite article
    preserved with 'the.'
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: The preposition denotes spatial or formal presentation before someone.
    'Before' is concise and idiomatic in English for ritual setting.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Personal name transliterated according to standard English convention.
- source_word: בָנָיו
  chosen: his sons
  alternatives:
  - his children
  lexicon: HALOT
  rationale: בנים specifically means 'sons' here, referring to Aaron's male priestly
    descendants, so gender-accurate rendering is required.
- source_word: וְהֵנַפְתָּ
  chosen: you shall present
  alternatives:
  - you shall wave
  - you shall offer
  lexicon: HALOT
  rationale: Hiphil of נוף in sacrificial contexts refers to the ritual act of presentation/waving.
    Because English 'wave them' can sound overly literal or awkward when the object
    is persons, 'present' communicates the ritual action clearly while the associated
    noun תְּנוּפָה preserves the technical category.
- source_word: אֹתָם
  chosen: them
  rationale: Direct object pronoun referring to the Levites.
- source_word: תְּנוּפָה
  chosen: as a wave offering
  alternatives:
  - as a presentation offering
  - as an elevation offering
  lexicon: HALOT
  rationale: תְּנוּפָה is the technical term for a 'wave offering' in priestly ritual
    language. Retaining the traditional term preserves cultic specificity; 'as a wave
    offering' makes the syntax natural in English with the verb 'present'.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ל here is
    well represented by 'to' in the context of presentation/offering directed to the
    LORD.
