theological_decisions:
- issue: Nature of the purification language in a Levitical consecration ritual
  chosen_reading: Render טהר language in accessible ritual terms without importing
    later doctrinal categories of moral cleansing alone.
  alternative_readings:
  - Use 'purify' throughout in more technical cultic language
  - Render חטאת here as 'sin offering' and make the water explicitly sacrificial
  rationale: The verse describes a concrete ritual for the Levites. The translation
    should preserve its cultic character while remaining readable. 'Water for purification
    from sin' communicates the relation to impurity/sin without overstating a sacrificial
    interpretation not explicit in the wording of this verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
