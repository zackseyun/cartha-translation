id: NUM.8.7
reference: Numbers 8:7
source:
  edition: WLC
  text: וְ/כֹֽה תַעֲשֶׂ֤ה לָ/הֶם֙ לְ/טַֽהֲרָ֔/ם הַזֵּ֥ה עֲלֵי/הֶ֖ם מֵ֣י חַטָּ֑את וְ/הֶעֱבִ֤ירוּ
    תַ֨עַר֙ עַל כָּל בְּשָׂרָ֔/ם וְ/כִבְּס֥וּ בִגְדֵי/הֶ֖ם וְ/הִטֶּהָֽרוּ־־־׃
translation:
  text: 'And thus you shall do to them to cleanse them: sprinkle on them the water
    for purification from sin, and let them pass a razor over all their flesh, and
    wash their clothes, and so cleanse themselves.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the water of purification'; literally, 'water of sin.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'let them pass a razor over all their flesh,' that is, shave
      their whole body.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹה
  chosen: And thus
  alternatives:
  - And so
  - This is how
  lexicon: HALOT
  rationale: Introduces the prescribed procedure. 'And thus' preserves the instructional
    tone and connection to the preceding context.
- source_word: תַעֲשֶׂה לָהֶם
  chosen: you shall do to them
  alternatives:
  - you shall do for them
  lexicon: HALOT
  rationale: The Hebrew construction is straightforwardly directive; 'to them' reflects
    לָהֶם naturally in English in this ritual context.
- source_word: לְטַהֲרָם
  chosen: to cleanse them
  alternatives:
  - to purify them
  lexicon: HALOT
  rationale: טהר in ritual contexts can be rendered 'cleanse' or 'purify.' 'Cleanse'
    is chosen for readable modern English while still conveying ritual purification.
- source_word: הַזֵּה
  chosen: sprinkle
  alternatives:
  - spatter
  lexicon: HALOT
  rationale: The Hiphil imperative/command sense here refers to ritual sprinkling.
    'Sprinkle' is the standard and clearest English equivalent.
- source_word: עֲלֵיהֶם
  chosen: on them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: A simple prepositional phrase; 'on them' is idiomatic modern English.
- source_word: מֵי חַטָּאת
  chosen: the water for purification from sin
  alternatives:
  - water of purification
  - water of sin offering
  - water for sin purification
  lexicon: HALOT
  rationale: Literally 'water of sin,' but in priestly ritual usage this denotes water
    used for purification associated with removal of impurity/sin. 'Water for purification
    from sin' makes the function clear without overcommitting to 'sin offering,' since
    no sacrificial noun is explicit here.
- source_word: וְהֶעֱבִירוּ תַעַר
  chosen: let them pass a razor
  alternatives:
  - have them shave
  - cause a razor to pass
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'cause a razor to pass.' This rendering
    preserves the concrete imagery while remaining intelligible.
- source_word: עַל כָּל בְּשָׂרָם
  chosen: over all their flesh
  alternatives:
  - over their whole body
  - over all their body
  lexicon: HALOT
  rationale: בשר is literally 'flesh.' In this ritual context it refers to the body
    hair-bearing surface. 'All their flesh' preserves the Hebrew wording; the bodily
    sense remains clear.
- source_word: וְכִבְּסוּ בִגְדֵיהֶם
  chosen: wash their clothes
  alternatives:
  - launder their garments
  - wash their garments
  lexicon: HALOT
  rationale: כבס commonly refers to washing garments. 'Clothes' is more natural modern
    English than 'garments' here.
- source_word: וְהִטֶּהָרוּ
  chosen: and so cleanse themselves
  alternatives:
  - and be clean
  - and purify themselves
  lexicon: HALOT
  rationale: The Hitpael/reflexive nuance is best reflected by 'cleanse themselves.'
    Adding 'so' captures the resultative force after the sequence of ritual actions.
