id: NUM.8.10
reference: Numbers 8:10
source:
  edition: WLC
  text: וְ/הִקְרַבְתָּ֥ אֶת הַ/לְוִיִּ֖ם לִ/פְנֵ֣י יְהוָ֑ה וְ/סָמְכ֧וּ בְנֵי יִשְׂרָאֵ֛ל אֶת יְדֵי/הֶ֖ם עַל הַ/לְוִיִּֽם־־־־׃
translation:
  text: You shall bring the Levites before Yahweh, and the sons of Israel shall lay their hands on the Levites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites.” The Hebrew reads “the sons of Israel,” a standard collective expression for the people of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתָּ
  chosen: You shall bring
  alternatives:
  - You shall present
  - You shall bring near
  lexicon: HALOT
  rationale: The Hiphil of קרב means to bring near or present. 'Bring' is clear modern English and fits the ritual context; 'before the LORD' preserves the directional nuance, while 'present' is possible but slightly more interpretive.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal/clan designation לוי in the plural with article.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is idiomatically 'before' or 'in the presence of.' 'Before the LORD' is the natural English rendering in ritual contexts. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and consistency with the stated doctrine.
- source_word: וְסָמְכוּ
  chosen: shall lay
  alternatives:
  - shall place
  - shall lean
  lexicon: HALOT
  rationale: The verb סמך in this ritual construction with 'hands on' is the standard idiom for laying hands upon someone or something. 'Lay' best matches established English usage without obscuring the physical action.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the people of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with the project's gender-accurate principle, the main text preserves the source expression. 'Israelites' is a smoother collective alternative but less formally transparent.
- source_word: יְדֵיהֶם
  chosen: their hands
  lexicon: HALOT
  rationale: Straightforward plural construct with pronominal suffix.
- source_word: עַל הַלְוִיִּם
  chosen: on the Levites
  alternatives:
  - upon the Levites
  lexicon: HALOT
  rationale: עַל is naturally rendered 'on' here in the laying-on-of-hands formula; 'upon' is more formal but less natural in contemporary English.
