id: NUM.8.3
reference: Numbers 8:3
source:
  edition: WLC
  text: וַ/יַּ֤עַשׂ כֵּן֙ אַהֲרֹ֔ן אֶל מוּל֙ פְּנֵ֣י הַ/מְּנוֹרָ֔ה הֶעֱלָ֖ה נֵרֹתֶ֑י/הָ כַּֽ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־׃
translation:
  text: 'And Aaron did so: toward the front of the lampstand he set up its lamps, just as Yahweh had commanded Moses.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'opposite the front of' or 'facing the front of' the lampstand.
    reason: lexical_alternative
  - marker: b
    text: Or 'he lit its lamps.' The Hebrew verb can be understood as causing the lamps to go up, which in context may refer to setting them up or lighting them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ כֵּן
  chosen: And Aaron did so
  alternatives:
  - And Aaron did thus
  - So Aaron did
  lexicon: HALOT
  rationale: The idiom means Aaron acted in accordance with the prior instruction. 'Did so' is natural modern English and preserves the resumptive force of כֵּן.
- source_word: אֶל מוּל פְּנֵי
  chosen: toward the front of
  alternatives:
  - opposite the front of
  - in front of
  - facing
  lexicon: HALOT
  rationale: The combined prepositional expression indicates orientation toward the face/front of the lampstand. 'Toward the front of' communicates direction without over-specifying spatial geometry.
- source_word: הַמְּנוֹרָה
  chosen: the lampstand
  alternatives:
  - the menorah
  lexicon: HALOT
  rationale: The common English equivalent for מְנוֹרָה in tabernacle contexts is 'lampstand.' 'Menorah' is possible as a transliteration, but the translation philosophy prefers translating common objects rather than transliterating them.
- source_word: הֶעֱלָה
  chosen: he set up
  alternatives:
  - he mounted
  - he caused to go up
  - he lit
  lexicon: HALOT
  rationale: The Hiphil of עלה with lamps can denote causing the lamps to be raised/set up, and by extension kindled. In this immediate context, the focus is their placement/orientation in accord with v. 2. 'Set up' best fits the instruction about the lamps giving light toward the front, without importing more than the Hebrew warrants.
- source_word: נֵרֹתֶיהָ
  chosen: its lamps
  alternatives:
  - its lights
  lexicon: HALOT
  rationale: נֵר refers to a lamp/light. With the feminine singular suffix referring to the lampstand, 'its lamps' is the most concrete and contextually fitting rendering.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: This clause marks exact conformity to divine instruction. The pluperfect 'had commanded' fits the sequence in English, and 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
