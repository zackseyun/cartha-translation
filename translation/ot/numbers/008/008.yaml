id: NUM.8.8
reference: Numbers 8:8
source:
  edition: WLC
  text: וְ/לָֽקְחוּ֙ פַּ֣ר בֶּן בָּקָ֔ר וּ/מִנְחָת֔/וֹ סֹ֖לֶת בְּלוּלָ֣ה בַ/שָּׁ֑מֶן
    וּ/פַר שֵׁנִ֥י בֶן בָּקָ֖ר תִּקַּ֥ח לְ/חַטָּֽאת־־־׃
translation:
  text: Then they shall take one young bull and its grain offering of fine flour mixed
    with oil, and you shall take a second young bull for a sin offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "for a purification offering." The Hebrew term חַטָּאת can denote the
      sin/purification offering in priestly ritual contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקְחוּ
  chosen: Then they shall take
  alternatives:
  - And they shall take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional sequence; rendered
    with future-like modal force ('shall') appropriate to ritual instruction. 'Then'
    brings out the sequential waw in readable English.
- source_word: פַּר בֶּן בָּקָר
  chosen: one young bull
  alternatives:
  - a bull, a son of the herd
  - a bull from the cattle
  lexicon: HALOT
  rationale: The idiom literally means 'bull, son of cattle,' denoting a young bull.
    'One' is supplied in English to distinguish it from the later 'second young bull'
    and reflect the first item in the pair.
- source_word: וּמִנְחָתוֹ
  chosen: and its grain offering
  alternatives:
  - and its offering
  - and its tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes the grain offering rather
    than a generic gift. The 3ms suffix refers to the first bull, i.e., the accompanying
    offering assigned to it.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: Standard cultic term for finely milled flour used in offerings.
- source_word: בְּלוּלָה בַשָּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: Common sacrificial preparation formula; 'mixed' is clear modern English
    while preserving the ritual sense.
- source_word: וּפַר שֵׁנִי בֶן בָּקָר
  chosen: and you shall take a second young bull
  alternatives:
  - and a second young bull you shall take
  lexicon: HALOT
  rationale: The Hebrew shifts to second masculine singular verb תִּקַּח, likely addressing
    Moses/Aaron or the officiant directly. English preserves this shift with 'you
    shall take.' 'Second young bull' reflects the ordinal שֵׁנִי.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a purification offering
  lexicon: HALOT
  rationale: חַטָּאת in priestly sacrificial contexts can denote either 'sin offering'
    or, more specifically, a purification offering. 'Sin offering' is the conventional
    and still accurate rendering in this context; the more technical alternative is
    preserved in a footnote for auditability.
