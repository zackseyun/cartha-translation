theological_decisions:
- issue: Rendering of חַטָּאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The term refers to the well-known priestly sacrifice traditionally called
    the 'sin offering.' While many scholars emphasize its purificatory function, the
    Hebrew term itself can denote both sin and the offering for it. The main text
    keeps the familiar rendering, while the alternative is preserved in a footnote
    to avoid overstating one interpretive nuance.
  doctrine_reference: Translation philosophy §3, §5
