id: NUM.8.22
reference: Numbers 8:22
source:
  edition: WLC
  text: וְ/אַחֲרֵי כֵ֞ן בָּ֣אוּ הַ/לְוִיִּ֗ם לַ/עֲבֹ֤ד אֶת עֲבֹֽדָתָ/ם֙ בְּ/אֹ֣הֶל מוֹעֵ֔ד לִ/פְנֵ֥י אַהֲרֹ֖ן וְ/לִ/פְנֵ֣י בָנָ֑י/ו כַּ/אֲשֶׁר֩ צִוָּ֨ה יְהוָ֤ה אֶת מֹשֶׁה֙ עַל הַ/לְוִיִּ֔ם כֵּ֖ן עָשׂ֥וּ לָ/הֶֽם־־־־׃ס
translation:
  text: And after that the Levites came to do their service in the tent of meeting before Aaron and before his sons. Just as Yahweh had commanded Moses concerning the Levites, so they did to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so they did to them.' The Hebrew is concise and may refer to carrying out the prescribed rites with respect to the Levites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרֵי כֵן
  chosen: And after that
  alternatives:
  - Afterward
  - And afterward
  lexicon: HALOT
  rationale: Temporal sequence marker introducing the next stage after the purification/ordination actions of the preceding context. 'And after that' preserves the connective ו plus the temporal phrase naturally.
- source_word: בָּאוּ
  chosen: came
  alternatives:
  - went in
  - entered
  lexicon: HALOT
  rationale: Common verb of motion. 'Came' is the most straightforward rendering here; 'entered' would over-specify movement into the tent, whereas the infinitive phrase that follows expresses purpose.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard transliteration of the tribal/clan designation; definite article preserved.
- source_word: לַעֲבֹד
  chosen: to perform
  alternatives:
  - to serve
  - to work
  lexicon: HALOT
  rationale: The verb עבד in cultic context denotes carrying out service/duties. Because the direct object is 'their service,' English avoids awkward repetition by rendering the verb as 'perform' rather than 'serve their service.'
- source_word: אֶת עֲבֹדָתָם
  chosen: their service
  alternatives:
  - their work
  - their ministry
  - their duty
  lexicon: HALOT
  rationale: Cultic labor in the sanctuary context is best rendered 'service.' 'Ministry' is possible but can sound anachronistically ecclesial; 'work' is too flat.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: Established rendering of the tabernacle designation. 'In' fits the Hebrew preposition and the idea of service associated with the sanctuary precincts.
- source_word: לִפְנֵי אַהֲרֹן וְלִפְנֵי בָנָיו
  chosen: before Aaron and before his sons
  alternatives:
  - under the oversight of Aaron and his sons
  - in the presence of Aaron and his sons
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in front of.' Here it likely implies service under priestly supervision, but the more literal 'before' preserves the wording without over-interpreting.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  chosen: Just as the LORD had commanded Moses
  alternatives:
  - According as the LORD commanded Moses
  - As the LORD commanded Moses
  lexicon: HALOT
  rationale: כַּאֲשֶׁר introduces comparison/manner. The pluperfect-like English 'had commanded' fits the prior command relative to the Levites' action. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַל הַלְוִיִּם
  chosen: concerning the Levites
  alternatives:
  - about the Levites
  - regarding the Levites
  - for the Levites
  lexicon: HALOT
  rationale: The preposition עַל here marks the subject matter of the command. 'Concerning' is precise and natural. 'For the Levites' is possible but less clear in English.
- source_word: כֵּן עָשׂוּ לָהֶם
  chosen: so they did for them
  alternatives:
  - so they did to them
  - so it was done for them
  lexicon: HALOT
  rationale: The Hebrew is somewhat terse and the subject of עָשׂוּ is not explicitly restated. In context, the sense is that the prescribed actions were carried out with respect to the Levites. 'Did for them' preserves the Hebrew pronoun without forcing an interpretive expansion.
