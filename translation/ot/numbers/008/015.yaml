id: NUM.8.15
reference: Numbers 8:15
source:
  edition: WLC
  text: וְ/אַֽחֲרֵי כֵן֙ יָבֹ֣אוּ הַ/לְוִיִּ֔ם לַ/עֲבֹ֖ד אֶת אֹ֣הֶל מוֹעֵ֑ד וְ/טִֽהַרְתָּ֣
    אֹתָ֔/ם וְ/הֵנַפְתָּ֥ אֹתָ֖/ם תְּנוּפָֽה־־׃
translation:
  text: And after that the Levites shall come to serve at the tent of meeting, and
    you shall cleanse them and wave them as a wave offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purify them.' The Hebrew verb is used for ritual cleansing.
    reason: lexical_alternative
  - marker: b
    text: That is, ceremonially present them before the LORD as a wave offering.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/אַחֲרֵי כֵן
  chosen: And after that
  alternatives:
  - And afterward
  - Then after this
  lexicon: HALOT
  rationale: Temporal sequence marker introducing the next stage after the prior consecration
    rites. 'And after that' is natural English and preserves the explicit progression.
- source_word: יָבֹאוּ
  chosen: shall come
  alternatives:
  - will come
  - shall enter
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come' or 'enter.' Here it marks the Levites'
    approach to begin service. 'Shall come' fits the instructional/future sense in
    context.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal group designated for tabernacle service.
- source_word: לַעֲבֹד
  chosen: to serve
  alternatives:
  - to do service
  - to work
  lexicon: HALOT
  rationale: עבד in cultic contexts often denotes service or ministerial labor. 'To
    serve' is clear modern English and suitably broad for tabernacle duties without
    over-specifying priestly functions.
- source_word: אֶת אֹהֶל מוֹעֵד
  chosen: at the tent of meeting
  alternatives:
  - in the tent of meeting
  - the tent of meeting
  lexicon: HALOT
  rationale: With עבד plus the object marker before 'tent of meeting,' the sense is
    service connected with the tent. English idiom prefers 'serve at the tent of meeting'
    rather than the more wooden 'serve the tent of meeting.' 'At' best conveys location
    and function.
- source_word: וְטִהַרְתָּ אֹתָם
  chosen: and you shall cleanse them
  alternatives:
  - and you shall purify them
  lexicon: HALOT
  rationale: טהר in ritual contexts refers to ceremonial cleansing/purification. 'Cleanse'
    is accessible modern English while still fitting the ritual setting.
- source_word: וְהֵנַפְתָּ אֹתָם תְּנוּפָה
  chosen: and wave them as a wave offering
  alternatives:
  - and present them as a wave offering
  - and wave them for a wave offering
  lexicon: HALOT
  rationale: The Hiphil of נוף with תְּנוּפָה refers to the ritual waving/presentation
    before Yahweh. Because the direct object is 'them' (the Levites), the translation
    preserves the striking literal sense that they themselves are ceremonially presented.
    'Wave them as a wave offering' keeps the cultic imagery without flattening it
    into a generic 'present.'
