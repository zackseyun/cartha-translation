theological_decisions:
- issue: Ritual language for Levite consecration
  chosen_reading: Retain explicit cultic terminology ('cleanse,' 'wave offering')
    rather than paraphrasing into generic commissioning language.
  alternative_readings:
  - '''purify them and present them'''
  - '''consecrate them'''
  rationale: The verse describes specific tabernacle rites, not merely symbolic appointment.
    Preserving the ritual terms maintains the sacrificial and consecratory framework
    of the passage without importing later theological categories.
  doctrine_reference: Translation philosophy §§1, 3, 6
