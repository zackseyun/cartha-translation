id: NUM.8.11
reference: Numbers 8:11
source:
  edition: WLC
  text: וְ/הֵנִיף֩ אַהֲרֹ֨ן אֶת הַ/לְוִיִּ֤ם תְּנוּפָה֙ לִ/פְנֵ֣י יְהוָ֔ה מֵ/אֵ֖ת
    בְּנֵ֣י יִשְׂרָאֵ֑ל וְ/הָי֕וּ לַ/עֲבֹ֖ד אֶת עֲבֹדַ֥ת יְהוָֽה־־׃
translation:
  text: Aaron shall present the Levites as a wave offering before the LORD from the
    sons of Israel, and they shall be for serving the service of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Aaron shall wave the Levites as a wave offering before the LORD.' The
      Hebrew verb is the same root as 'wave offering' and refers to a ritual presentation.
    reason: lexical_alternative
  - marker: b
    text: '''From the sons of Israel'' may also mean ''on behalf of the sons of Israel,''
      indicating that the Levites are presented as representatives of the Israelites
      in the LORD''s service.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהֵנִיף
  chosen: shall present
  alternatives:
  - shall wave
  - shall offer
  lexicon: HALOT
  rationale: The Hiphil of נוּף literally involves waving/presenting. Because the
    direct object is persons (the Levites), a strictly physical 'wave' can sound misleading
    in English; 'present' communicates the ritual act naturally while the associated
    noun תְּנוּפָה preserves the technical 'wave offering' language.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard ethnic/tribal designation; transliterated as a people-group
    name.
- source_word: תְּנוּפָה
  chosen: as a wave offering
  alternatives:
  - as an elevation offering
  - as a presentation offering
  lexicon: HALOT
  rationale: Technical sacrificial term traditionally rendered 'wave offering.' Here
    it describes the Levites' ritual presentation. Retaining the established cultic
    term best reflects the Hebrew while remaining understandable.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard idiom for being in Yahweh's presence. Per doctrine, יְהוָה is
    rendered 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested-terms table for the divine name.
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  chosen: from the sons of Israel
  alternatives:
  - on behalf of the sons of Israel
  - from among the sons of Israel
  lexicon: HALOT
  rationale: 'מֵאֵת here marks source/origin: the Levites are presented from the Israelites,
    that is, taken from them and representing them. ''Sons of Israel'' preserves the
    Hebrew expression with gender-accurate fidelity.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' In keeping with the gender-accurate
    principle, the more literal rendering is retained here rather than flattening
    to a neutral collective.
- source_word: וְהָיוּ
  chosen: and they shall be
  alternatives:
  - so that they may be
  lexicon: HALOT
  rationale: Simple future/resultative sense following the presentation rite.
- source_word: לַעֲבֹד
  chosen: for serving
  alternatives:
  - to serve
  - for ministry
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'For serving' pairs naturally with
    the following cognate noun and preserves the Hebrew's emphasis on assigned service.
- source_word: עֲבֹדַת יְהוָה
  chosen: the service of the LORD
  alternatives:
  - the work of the LORD
  - the ministry of the LORD
  lexicon: HALOT
  rationale: עֲבֹדָה in priestly contexts denotes cultic service/duty. 'Service of
    the LORD' is both clear and suitably formal for tabernacle labor.
