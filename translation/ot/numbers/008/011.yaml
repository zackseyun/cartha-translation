theological_decisions:
- issue: Rendering the ritual involving the Levites as a human 'wave offering'
  chosen_reading: Use 'present ... as a wave offering' rather than a more interpretive
    paraphrase.
  alternative_readings:
  - Aaron shall wave the Levites as a wave offering
  - Aaron shall present the Levites as an offering
  rationale: The text depicts the Levites' consecration in sacrificial/presentation
    terms without implying they are literally sacrificed. The chosen wording preserves
    the cultic metaphor and ritual category while avoiding an English phrasing that
    could sound physically absurd or doctrinally misleading.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew expression is explicitly masculine plural in form and is a
    standard covenantal designation. Following the gender-accurate principle, the
    literal form is retained rather than neutralized, while readers can understand
    it corporately from context.
  doctrine_reference: Translation philosophy §4
