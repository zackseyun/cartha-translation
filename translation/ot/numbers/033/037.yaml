id: NUM.33.37
reference: Numbers 33:37
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/קָּדֵ֑שׁ וַֽ/יַּחֲנוּ֙ בְּ/הֹ֣ר הָ/הָ֔ר בִּ/קְצֵ֖ה אֶ֥רֶץ
    אֱדֽוֹם׃
translation:
  text: They set out from Kadesh and camped at Mount Hor, on the edge of the land
    of Edom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Kadesh''; some translations expand this to ''Kadesh-barnea''
      based on broader context, but the shorter place name is what appears here.'
    reason: alternative_reading
  - marker: b
    text: Hebrew literally, 'at Hor the mountain,' conventionally rendered 'Mount
      Hor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the sense is departure
    from a campsite. 'Set out' is natural modern English and preserves the travel-sequence
    formula better than the more generic 'journeyed'.
- source_word: מִקָּדֵשׁ
  chosen: from Kadesh
  alternatives:
  - from Kadesh-barnea
  lexicon: HALOT
  rationale: The Hebrew text here reads simply 'Kadesh,' so the translation preserves
    the shorter toponym rather than expanding it to the traditional identification
    'Kadesh-barnea,' which is not explicit in this verse.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה, the standard wilderness-travel verb for making camp. 'Camped'
    is readable modern English while remaining faithful to the concrete action.
- source_word: בְּהֹר הָהָר
  chosen: at Mount Hor
  alternatives:
  - at Hor the mountain
  - at Mount Hor
  lexicon: HALOT
  rationale: The place name is conventionally rendered 'Mount Hor.' Although the Hebrew
    is literally 'at Hor the mountain,' English idiom favors the established toponym
    'Mount Hor' as a transliterated place name.
- source_word: בִּקְצֵה
  chosen: on the edge of
  alternatives:
  - at the border of
  - at the extremity of
  lexicon: HALOT
  rationale: קצה denotes an end, edge, or extremity. 'On the edge of' fits the spatial
    sense naturally in English and avoids over-specifying a political boundary where
    the phrase may simply indicate location at the extremity of the territory.
- source_word: אֶרֶץ אֱדוֹם
  chosen: the land of Edom
  alternatives:
  - the territory of Edom
  - the country of Edom
  lexicon: HALOT
  rationale: אֶרֶץ commonly means land/territory. 'The land of Edom' is the most direct
    and idiomatic rendering in biblical narrative.
