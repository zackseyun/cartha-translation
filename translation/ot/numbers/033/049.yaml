id: NUM.33.49
reference: Numbers 33:49
source:
  edition: WLC
  text: וַ/יַּחֲנ֤וּ עַל הַ/יַּרְדֵּן֙ מִ/בֵּ֣ית הַיְשִׁמֹ֔ת עַ֖ד אָבֵ֣ל הַשִּׁטִּ֑ים
    בְּ/עַֽרְבֹ֖ת מוֹאָֽב־׃ס
translation:
  text: And they camped by the Jordan, from Beth-jeshimoth as far as Abel-shittim,
    in the plains of Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the steppes of Moab.' The Hebrew term refers to the flat steppe region
      in Moab.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲנוּ
  chosen: And they camped
  alternatives:
  - And they encamped
  lexicon: HALOT
  rationale: Wayyiqtol of חנה narrates the next stage in Israel's journey. 'Camped'
    is natural modern English; 'encamped' is more formal but less readable.
- source_word: עַל הַיַּרְדֵּן
  chosen: by the Jordan
  alternatives:
  - upon the Jordan
  - along the Jordan
  lexicon: HALOT
  rationale: With a river, עַל can indicate position at or by it rather than literally
    'on.' 'By the Jordan' is idiomatic and fits the camping context.
- source_word: מִבֵּית הַיְשִׁמֹת
  chosen: from Beth-jeshimoth
  alternatives:
  - from Beth Jeshimoth
  lexicon: HALOT
  rationale: 'This is a place name, so it is transliterated per project philosophy.
    The prefixed מִן marks the starting extent of the camp line: ''from Beth-jeshimoth.''
    Hyphenation reflects standard English treatment of compound Hebrew toponyms.'
- source_word: עַד אָבֵל הַשִּׁטִּים
  chosen: as far as Abel-shittim
  alternatives:
  - to Abel-shittim
  - unto Abel-shittim
  lexicon: HALOT
  rationale: עַד marks the endpoint of the geographical extent. 'As far as' makes
    the range explicit in smooth English. The place name is transliterated.
- source_word: בְּעַרְבֹת מוֹאָב
  chosen: in the plains of Moab
  alternatives:
  - in the steppes of Moab
  - on the plains of Moab
  lexicon: HALOT
  rationale: עֲרָבוֹת refers to the steppe/plain region of Moab. 'Plains' is the established
    and clear English rendering here. 'In' fits the locative sense of בְּ.
