id: NUM.33.20
reference: Numbers 33:20
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵ/רִמֹּ֣ן פָּ֑רֶץ וַֽ/יַּחֲנ֖וּ בְּ/לִבְנָֽה׃
translation:
  text: They set out from Rimmon-perez and camped at Libnah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic sense is
    departure from a station. 'Set out' is natural modern English and preserves the
    travel-sequence formula without unnecessary stiffness.
- source_word: מֵרִמֹּן פָּרֶץ
  chosen: from Rimmon-perez
  alternatives:
  - from Rimmon Perez
  lexicon: HALOT
  rationale: A place name introduced by the preposition מִן ('from'). Following the
    translation philosophy, names are transliterated rather than translated. The maqqeph-like
    relation in English is represented with a hyphen to reflect the compound toponym.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה in itinerary contexts, 'camped' is the clearest modern equivalent.
    'Encamped' is more formal but less natural; the meaning is unchanged.
- source_word: בְּלִבְנָה
  chosen: at Libnah
  alternatives:
  - in Libnah
  lexicon: HALOT
  rationale: The preposition ב in travel notices is commonly rendered 'at' for a stopping
    place in English. 'Libnah' is transliterated as a place name.
