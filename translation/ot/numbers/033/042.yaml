id: NUM.33.42
reference: Numbers 33:42
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/צַּלְמֹנָ֑ה וַֽ/יַּחֲנ֖וּ בְּ/פוּנֹֽן׃
translation:
  text: They set out from Zalmonah and camped at Punon.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic sense is
    breaking camp and moving on. 'Set out' is natural modern English and preserves
    the travel-sequence formula better than the more general 'journeyed.'
- source_word: מִצַּלְמֹנָה
  chosen: from Zalmonah
  lexicon: HALOT
  rationale: The prefixed preposition מִן is rendered 'from.' The place name is transliterated
    as 'Zalmonah' in keeping with the policy to transliterate names rather than translate
    them.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה in itinerary contexts, 'camped' is the most readable modern
    English equivalent. 'Encamped' is more formal but less natural; the meaning is
    unchanged.
- source_word: בְּפוּנֹן
  chosen: at Punon
  alternatives:
  - in Punon
  lexicon: HALOT
  rationale: The preposition בְּ with a campsite location is naturally rendered 'at'
    in English for a stop on a journey. The place name is transliterated as 'Punon.'
