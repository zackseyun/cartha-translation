id: NUM.33.40
reference: Numbers 33:40
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֗ע הַֽ/כְּנַעֲנִי֙ מֶ֣לֶךְ עֲרָ֔ד וְ/הֽוּא יֹשֵׁ֥ב בַּ/נֶּ֖גֶב
    בְּ/אֶ֣רֶץ כְּנָ֑עַן בְּ/בֹ֖א בְּנֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: And the Canaanite, the king of Arad, who lived in the Negev in the land of
    Canaan, heard when the sons of Israel came.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''Negev'' may also be rendered ''the south'' or ''the southern region.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - heard of
  - came to hear
  lexicon: HALOT
  rationale: 'Qal wayyiqtol of שׁמע normally means ''heard.'' In context the object
    is implicit and the following infinitive construct marks the occasion: he heard
    when Israel came. ''Heard of'' is possible idiomatic English, but the Hebrew does
    not explicitly include a separate object such as ''news.'''
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanite
  alternatives:
  - a Canaanite
  lexicon: HALOT
  rationale: The article is present, so 'the Canaanite' is the most direct rendering.
    In apposition with 'the king of Arad,' it identifies his ethnic/political identity.
- source_word: מֶלֶךְ עֲרָד
  chosen: the king of Arad
  alternatives:
  - king of Arad
  lexicon: HALOT
  rationale: 'Construct chain naming the ruler and city. English idiom naturally supplies
    the article in apposition: ''the Canaanite, the king of Arad.'''
- source_word: וְהוּא יֹשֵׁב
  chosen: who lived
  alternatives:
  - and he was living
  - and he dwelt
  lexicon: HALOT
  rationale: The pronoun plus participle gives descriptive background information.
    Relative English ('who lived') communicates the appositional/descriptive force
    more naturally than a separate clause while preserving the sense.
- source_word: בַּנֶּגֶב
  chosen: in the Negev
  alternatives:
  - in the south
  - in the southern region
  lexicon: HALOT
  rationale: Negev can denote the southern region, but as a recognized geographic
    designation it is best transliterated here. This preserves the place reference
    more precisely than the generic 'south.'
- source_word: בְּאֶרֶץ כְּנָעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: The full phrase explicitly says 'in the land of Canaan'; retaining 'land'
    preserves the Hebrew wording and geographic emphasis.
- source_word: בְּבֹא
  chosen: when ... came
  alternatives:
  - at the coming of
  - as ... entered
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct of בוא is temporal here:
    ''when [someone] came.'' ''Entered'' is possible in some contexts, but the verse
    does not specify an object such as ''into the land,'' so ''came'' is safer.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Per translation philosophy,
    gender-accurate rendering is preferred where it matches the source. 'The Israelites'
    is smoother but less formally transparent; 'children of Israel' is traditional
    but less precise to בנים.
