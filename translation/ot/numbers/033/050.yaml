id: NUM.33.50
reference: Numbers 33:50
source:
  edition: WLC
  text: וַ/יְדַבֵּ֧ר יְהוָ֛ה אֶל מֹשֶׁ֖ה בְּ/עַֽרְבֹ֣ת מוֹאָ֑ב עַל יַרְדֵּ֥ן יְרֵח֖וֹ
    לֵ/אמֹֽר־־׃
translation:
  text: And the LORD spoke to Moses in the plains of Moab by the Jordan at Jericho,
    saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the steppes of Moab.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: And ... spoke
  alternatives:
  - Then ... spoke
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive with דבר commonly advances narrative. 'And ... spoke'
    preserves the Hebrew narrative flow and distinguishes דבר ('speak') from אמר ('say'),
    which appears in the following infinitive 'saying.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: אֶל
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: Standard directional preposition here marking the addressee of divine
    speech.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בְּעַרְבֹת
  chosen: in the plains
  alternatives:
  - in the steppes
  - in the plains of the Arabah-like lowlands
  lexicon: HALOT
  rationale: ערבות refers to steppe/plains terrain. 'Plains' is natural modern English
    and fits the established geographical expression 'the plains of Moab.'
- source_word: מוֹאָב
  chosen: Moab
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: עַל
  chosen: by
  alternatives:
  - upon
  - beside
  - at
  lexicon: HALOT
  rationale: In this geographical construction, על with the Jordan indicates location
    alongside/near it rather than literal 'upon.' 'By' is idiomatic English and preserves
    the spatial sense.
- source_word: יַרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: English idiom commonly uses 'the Jordan' for the river; 'River' is not
    required for clarity here.
- source_word: יְרֵחוֹ
  chosen: Jericho
  lexicon: HALOT
  rationale: Standard transliteration of the city name.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: Conventional rendering of the infinitive introducing the following divine
    speech in the next verse; retaining it here reflects the Hebrew syntax across
    the verse boundary.
