id: NUM.33.4
reference: Numbers 33:4
source:
  edition: WLC
  text: וּ/מִצְרַ֣יִם מְקַבְּרִ֗ים אֵת֩ אֲשֶׁ֨ר הִכָּ֧ה יְהוָ֛ה בָּ/הֶ֖ם כָּל בְּכ֑וֹר
    וּ/בֵ/אלֹ֣הֵי/הֶ֔ם עָשָׂ֥ה יְהוָ֖ה שְׁפָטִֽים־׃
translation:
  text: while the Egyptians were burying all their firstborn whom the LORD had struck
    down among them; and on their gods the LORD had executed judgments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against their gods the LORD had executed judgments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִצְרַיִם
  chosen: while the Egyptians
  alternatives:
  - and the Egyptians
  - now the Egyptians
  lexicon: HALOT
  rationale: The conjunction with the noun introduces a circumstantial clause explaining
    the timing of Israel's departure. 'While the Egyptians' captures the ongoing background
    action more naturally in English than a simple coordinate 'and.'
- source_word: מְקַבְּרִים
  chosen: were burying
  alternatives:
  - were burying them
  - burying
  lexicon: HALOT
  rationale: The participle denotes ongoing action in past narrative context. English
    past progressive best reflects the sense.
- source_word: אֵת אֲשֶׁר
  chosen: all their firstborn whom
  alternatives:
  - those whom
  - what
  lexicon: HALOT
  rationale: 'The object marker plus relative particle introduces the direct object
    subsequently specified as ''all their firstborn.'' English smooths the construction
    by bringing the specified object forward: ''all their firstborn whom...''.'
- source_word: הִכָּה
  chosen: had struck down
  alternatives:
  - had struck
  - had smitten
  - killed
  lexicon: HALOT
  rationale: The verb נכה commonly means 'strike' and in this context refers to the
    lethal plague on the firstborn. 'Struck down' preserves the verbal imagery while
    making the deadly result clear.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: בָּהֶם
  chosen: among them
  alternatives:
  - in them
  lexicon: HALOT
  rationale: With a plural personal suffix, the preposition here is best rendered
    idiomatically as 'among them,' referring to the Egyptians as the group within
    which the firstborn were struck.
- source_word: כָּל בְּכוֹר
  chosen: all their firstborn
  alternatives:
  - every firstborn
  - all the firstborn
  lexicon: HALOT
  rationale: The phrase denotes the totality of Egypt's firstborn victims. 'All their
    firstborn' makes explicit the relation to the Egyptians already in view.
- source_word: וּבֵאלֹהֵיהֶם
  chosen: and on their gods
  alternatives:
  - and against their gods
  - and among their gods
  lexicon: HALOT
  rationale: The preposition ב on 'their gods' with עשה שפטים is idiomatically rendered
    'on' or 'against.' 'On their gods' stays close to the Hebrew while remaining natural.
- source_word: עָשָׂה ... שְׁפָטִים
  chosen: had executed judgments
  alternatives:
  - had done judgments
  - had brought judgments
  - had carried out judgments
  lexicon: HALOT
  rationale: The idiom 'do/make judgments' means to carry out acts of judgment. 'Had
    executed judgments' is clear, weighty, and idiomatic in English.
