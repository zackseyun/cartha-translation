id: NUM.33.16
reference: Numbers 33:16
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/מִּדְבַּ֣ר סִינָ֑י וַֽ/יַּחֲנ֖וּ בְּ/קִבְרֹ֥ת הַֽתַּאֲוָֽה׃
translation:
  text: They set out from the wilderness of Sinai and camped at Kibroth-hattaavah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kibroth-hattaavah means 'graves of craving.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic travel sense
    is 'set out.' This is natural modern English while remaining close to the repeated
    formula in Numbers 33.
- source_word: מִמִּדְבַּר סִינַי
  chosen: from the wilderness of Sinai
  alternatives:
  - from the desert of Sinai
  - from Sinai Wilderness
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert terrain. 'Wilderness of Sinai'
    preserves the construct relationship and matches common biblical geographic usage
    without over-paraphrase.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה, the standard itinerary verb for making camp. 'Camped' is preferred
    over the more archaic 'encamped' for readable modern English.
- source_word: בְּקִבְרֹת הַתַּאֲוָה
  chosen: at Kibroth-hattaavah
  alternatives:
  - at Kibroth Hattaavah
  - at the graves of craving
  - at the graves of lust
  lexicon: HALOT
  rationale: This is a place name and so is transliterated per translation philosophy.
    The underlying meaning is 'graves of craving,' but because the text uses it as
    a toponym, transliteration is best in the main text; the semantic gloss is worth
    preserving in a footnote.
