id: NUM.33.38
reference: Numbers 33:38
source:
  edition: WLC
  text: וַ/יַּעַל֩ אַהֲרֹ֨ן הַ/כֹּהֵ֜ן אֶל הֹ֥ר הָ/הָ֛ר עַל פִּ֥י יְהוָ֖ה וַ/יָּ֣מָת
    שָׁ֑ם בִּ/שְׁנַ֣ת הָֽ/אַרְבָּעִ֗ים לְ/צֵ֤את בְּנֵֽי יִשְׂרָאֵל֙ מֵ/אֶ֣רֶץ מִצְרַ֔יִם
    בַּ/חֹ֥דֶשׁ הַ/חֲמִישִׁ֖י בְּ/אֶחָ֥ד לַ/חֹֽדֶשׁ־־־׃
translation:
  text: And Aaron the priest went up to Mount Hor at the command of the LORD, and
    he died there, in the fortieth year after the Israelites came out from the land
    of Egypt, in the fifth month, on the first day of the month.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the word of the LORD'; literally, 'upon the mouth of the
      LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  chosen: went up
  alternatives:
  - ascended
  lexicon: HALOT
  rationale: The verb עלה commonly means 'go up/ascend.' 'Went up' is natural modern
    English and preserves the directional sense without sounding overly elevated.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: A straightforward rendering of the title כהן. Retaining the appositional
    title identifies Aaron's office in context.
- source_word: אֶל הֹר הָהָר
  chosen: to Mount Hor
  alternatives:
  - to Hor the mountain
  - to Hor Mountain
  lexicon: HALOT
  rationale: הֹר הָהָר is the established place name 'Mount Hor.' This preserves the
    proper noun while rendering it in standard English geographic form.
- source_word: עַל פִּי יְהוָה
  chosen: at the command of the LORD
  alternatives:
  - by the mouth of the LORD
  - according to the word of the LORD
  lexicon: HALOT
  rationale: The idiom על פי literally means 'upon the mouth of,' but idiomatically
    denotes action in accordance with a command or word. 'At the command of' is clear,
    idiomatic English and preserves divine authorization. יְהוָה is rendered 'the
    LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the stated doctrinal
    default for יְהוָה.
- source_word: וַיָּמָת שָׁם
  chosen: and he died there
  alternatives:
  - and died there
  lexicon: HALOT
  rationale: This directly renders the verb and adverb. Including 'he' reflects the
    Hebrew verbal subject and keeps the clause explicit in English.
- source_word: בִּשְׁנַת הָאַרְבָּעִים
  chosen: in the fortieth year
  alternatives:
  - in year forty
  lexicon: HALOT
  rationale: This is the natural English ordinal rendering of the Hebrew dating formula.
- source_word: לְצֵאת בְּנֵי יִשְׂרָאֵל
  chosen: after the Israelites came out
  alternatives:
  - from the going out of the sons of Israel
  - when the Israelites went out
  lexicon: HALOT
  rationale: 'The infinitive construct with ל marks the reference point for the dating:
    the exodus event. ''After the Israelites came out'' communicates the temporal
    sense clearly. ''Israelites'' is idiomatic for בְּנֵי יִשְׂרָאֵל in this national
    sense.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the Israelites
  alternatives:
  - the sons of Israel
  - the children of Israel
  lexicon: HALOT
  rationale: In this context the phrase denotes the people/nation, not specifically
    male descendants. 'The Israelites' is accurate and natural English.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: This preserves both the preposition and the noun 'land,' matching the
    Hebrew expression with normal English style.
- source_word: בַּחֹדֶשׁ הַחֲמִישִׁי
  chosen: in the fifth month
  lexicon: HALOT
  rationale: A direct rendering of the calendrical phrase.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  chosen: on the first day of the month
  alternatives:
  - on the first of the month
  lexicon: HALOT
  rationale: This Hebrew dating expression is most clearly represented in English
    as 'on the first day of the month,' though 'on the first of the month' is also
    possible.
