id: NUM.33.8
reference: Numbers 33:8
source:
  edition: WLC
  text: וַ/יִּסְעוּ֙ מִ/פְּנֵ֣י הַֽ/חִירֹ֔ת וַ/יַּֽעַבְר֥וּ בְ/תוֹךְ הַ/יָּ֖ם הַ/מִּדְבָּ֑רָ/ה
    וַ/יֵּ֨לְכ֜וּ דֶּ֣רֶךְ שְׁלֹ֤שֶׁת יָמִים֙ בְּ/מִדְבַּ֣ר אֵתָ֔ם וַֽ/יַּחֲנ֖וּ בְּ/מָרָֽה־׃
translation:
  text: They set out from before Hahiroth and passed through the midst of the sea
    into the wilderness, and they went a journey of three days in the wilderness of
    Etham and camped at Marah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from before Hahiroth.'' Exodus more commonly names the site ''Pi-hahiroth'';
      Numbers 33:8 here lacks the element ''Pi-,'' so the shorter form is retained
      rather than harmonized.'
    reason: alternative_reading
  - marker: b
    text: Or 'they went three days' journey in the wilderness of Etham.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: נסע in travel itinerary contexts commonly means to break camp and move
    on. 'Set out' is natural modern English and fits the stage-by-stage itinerary
    style of Numbers 33.
- source_word: מִפְּנֵי הַחִירֹת
  chosen: from before Hahiroth
  alternatives:
  - from Pi-hahiroth
  - from before Pi-hahiroth
  lexicon: HALOT
  rationale: The Hebrew here lacks the element פי found in Exodus references and reads
    literally 'from before Hahiroth.' Because names are transliterated by policy,
    'Hahiroth' is retained rather than harmonizing to the more familiar 'Pi-hahiroth.'
    'From before' preserves the Hebrew preposition plus פנים idiom more closely than
    a simple 'from,' while remaining intelligible.
- source_word: וַיַּעַבְרוּ
  chosen: passed through
  alternatives:
  - crossed
  - went through
  lexicon: HALOT
  rationale: עבר with the following phrase 'in the midst of the sea' naturally conveys
    crossing through. 'Passed through' preserves the motion without over-specifying
    beyond the Hebrew.
- source_word: בְּתוֹךְ הַיָּם
  chosen: through the midst of the sea
  alternatives:
  - through the sea
  - in the midst of the sea
  lexicon: HALOT
  rationale: בתוך explicitly means 'in the midst/middle of.' Rendering it in the English
    phrase preserves the vividness of the route through the sea rather than merely
    beside it.
- source_word: הַמִּדְבָּרָה
  chosen: into the wilderness
  alternatives:
  - to the wilderness
  - toward the wilderness
  lexicon: HALOT
  rationale: The directional he on המדברה indicates motion toward/into the wilderness.
    'Into the wilderness' captures that directional nuance in idiomatic English.
- source_word: וַיֵּלְכוּ דֶּרֶךְ שְׁלֹשֶׁת יָמִים
  chosen: they went a journey of three days
  alternatives:
  - they traveled for three days
  - they went three days' journey
  lexicon: HALOT
  rationale: The construction 'went a הדרך of three days' is an idiom for traveling
    a distance/time span. 'A journey of three days' preserves the Hebrew idiom more
    transparently than the smoother but less formal 'traveled for three days.'
- source_word: בְּמִדְבַּר אֵתָם
  chosen: in the wilderness of Etham
  alternatives:
  - in Etham wilderness
  lexicon: HALOT
  rationale: Construct chain with proper name; standard English is 'the wilderness
    of Etham.' The place name is transliterated.
- source_word: וַיַּחֲנוּ בְּמָרָה
  chosen: camped at Marah
  alternatives:
  - encamped at Marah
  - camped in Marah
  lexicon: HALOT
  rationale: חנה in itinerary contexts means to camp/encamp. 'Camped at Marah' is
    readable modern English; 'at' fits a named stopping place.
