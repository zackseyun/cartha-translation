id: NUM.33.56
reference: Numbers 33:56
source:
  edition: WLC
  text: וְ/הָיָ֗ה כַּ/אֲשֶׁ֥ר דִּמִּ֛יתִי לַ/עֲשׂ֥וֹת לָ/הֶ֖ם אֶֽעֱשֶׂ֥ה לָ/כֶֽם׃פ
translation:
  text: then it will happen that what I planned to do to them, I will do to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what I intended to do to them, I will do to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: then it will happen
  alternatives:
  - and it will be
  - and it shall come to pass
  lexicon: HALOT
  rationale: The idiom with היה introduces the consequence of the preceding warning.
    'Then it will happen' preserves the future-result sense in natural modern English
    without archaic phrasing.
- source_word: כַּאֲשֶׁר
  chosen: that what
  alternatives:
  - just as
  - as
  lexicon: HALOT
  rationale: 'In this construction, כַּאֲשֶׁר links the following clause to the content
    of what was intended. Rendering it within the English clause as ''that what''
    yields a natural sentence: ''that what I planned...'' A more literal ''just as''
    is possible but less idiomatic here.'
- source_word: דִּמִּיתִי
  chosen: I planned
  alternatives:
  - I intended
  - I thought
  lexicon: HALOT
  rationale: The verb דמה in the piel here conveys intention or purpose in context,
    referring to God's resolved action toward the Canaanite inhabitants. 'I planned'
    is concise and clear; 'I intended' is also viable. 'I thought' could sound merely
    contemplative and weaker than the warning context warrants.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to act
  - to deal
  lexicon: HALOT
  rationale: The infinitive of עשה is broad and is best kept with the simple 'to do,'
    allowing the object and context to specify the threatened action.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - against them
  - for them
  lexicon: HALOT
  rationale: The preposition marks the indirect object of the intended action. In
    context the action is punitive, but 'to them' preserves the Hebrew wording without
    over-specifying hostility in the translation itself.
- source_word: אֶעֱשֶׂה
  chosen: I will do
  alternatives:
  - I will act
  - I will deal
  lexicon: HALOT
  rationale: Keeping עשה as 'do' maintains lexical consistency with the preceding
    infinitive and preserves the stark parallelism of the warning.
- source_word: לָכֶם
  chosen: to you
  alternatives:
  - against you
  lexicon: HALOT
  rationale: As with לָהֶם, the simple 'to you' preserves the Hebrew construction
    while the context supplies the punitive force.
