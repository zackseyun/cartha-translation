theological_decisions:
- issue: Force of the warning formula
  chosen_reading: 'A direct divine warning of reciprocal judgment: the same action
    intended for the inhabitants will be done to Israel if they fail to drive them
    out.'
  alternative_readings:
  - A softer statement of consequence without emphasis on divine intention
  rationale: The verse concludes the warning section with a solemn threat. The translation
    preserves the gravity of divine judgment without adding details not explicit in
    the verse itself.
