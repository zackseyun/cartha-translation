id: NUM.33.39
reference: Numbers 33:39
source:
  edition: WLC
  text: וְ/אַהֲרֹ֔ן בֶּן שָׁלֹ֧שׁ וְ/עֶשְׂרִ֛ים וּ/מְאַ֖ת שָׁנָ֑ה בְּ/מֹת֖/וֹ בְּ/הֹ֥ר
    הָ/הָֽר־׃ס
translation:
  text: And Aaron was one hundred twenty-three years old when he died on Mount Hor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/אַהֲרֹן
  chosen: And Aaron
  alternatives:
  - Now Aaron
  lexicon: HALOT
  rationale: The conjunction ו is rendered simply as 'And' to continue the narrative,
    and the proper name is transliterated as 'Aaron' in keeping with the policy to
    transliterate personal names.
- source_word: בֶּן שָׁלֹשׁ וְעֶשְׂרִים וּמְאַת שָׁנָה
  chosen: was one hundred twenty-three years old
  alternatives:
  - was a son of one hundred and twenty-three years
  - was 123 years old
  lexicon: HALOT
  rationale: The Hebrew idiom בן + number + שנה expresses age. Natural English requires
    'was ... years old.' The number order in Hebrew is preserved in sense, not form,
    yielding 'one hundred twenty-three.'
- source_word: בְּ/מֹתוֹ
  chosen: when he died
  alternatives:
  - at his death
  - in his dying
  lexicon: HALOT
  rationale: 'The preposition ב with the infinitive-like noun ''death'' plus suffix
    is most naturally rendered temporally here: ''when he died.'' This is clearer
    in English than the more literal ''at his death'' while preserving the same meaning.'
- source_word: בְּ/הֹר הָהָר
  chosen: on Mount Hor
  alternatives:
  - at Mount Hor
  - on Hor the mountain
  lexicon: HALOT
  rationale: הֹר הָהָר is the place name 'Mount Hor.' English convention uses 'Mount
    Hor,' and 'on' fits the context of dying on the mountain better than the more
    general 'at.'
