id: NUM.33.51
reference: Numbers 33:51
source:
  edition: WLC
  text: דַּבֵּר֙ אֶל בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/אָמַרְתָּ֖ אֲלֵ/הֶ֑ם כִּ֥י אַתֶּ֛ם עֹבְרִ֥ים
    אֶת הַ/יַּרְדֵּ֖ן אֶל אֶ֥רֶץ כְּנָֽעַן־־־׃
translation:
  text: Speak to the sons of Israel and say to them, ‘When you cross the Jordan into
    the land of Canaan,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you are crossing' / 'you are about to cross.' The Hebrew participle
      expresses an imminent crossing.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  - Address
  lexicon: HALOT
  rationale: Piel imperative of דבר, a direct command to communicate. 'Speak' preserves
    the formal force and pairs naturally with the following 'say to them.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Chosen to preserve the gendered familial
    expression in keeping with the gender-accurate policy. 'Israelites' is idiomatic
    but less transparent to the Hebrew wording.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  chosen: and say to them
  alternatives:
  - and tell them
  lexicon: HALOT
  rationale: Standard rendering of אמר with indirect object. Keeping both 'speak'
    and 'say' reflects the two Hebrew verbs rather than collapsing them.
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - Indeed
  - That
  lexicon: HALOT
  rationale: Although כי often means 'for/that,' in this context it introduces the
    content of the speech with a temporal nuance tied to the participle 'you are crossing.'
    English reads most naturally as 'When you cross,' anticipating the instructions
    that follow in the next verse.
- source_word: אַתֶּם עֹבְרִים
  chosen: you cross
  alternatives:
  - you are crossing
  - you are about to cross
  lexicon: HALOT
  rationale: The pronoun plus participle expresses imminent/future action. English
    simple present in a temporal clause ('when you cross') is natural and conveys
    the prospective sense without awkwardness.
- source_word: אֶת הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: The proper name commonly refers to the river; 'the Jordan' is standard
    concise English and sufficient in context.
- source_word: אֶל אֶרֶץ כְּנָעַן
  chosen: into the land of Canaan
  alternatives:
  - to the land of Canaan
  - into Canaan
  lexicon: HALOT
  rationale: '''Into the land of Canaan'' preserves both the preposition אֶל and the
    noun אֶרֶץ, making explicit that this is entry into a defined land.'
