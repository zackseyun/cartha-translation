id: NUM.33.45
reference: Numbers 33:45
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵ/עִיִּ֑ים וַֽ/יַּחֲנ֖וּ בְּ/דִיבֹ֥ן גָּֽד׃
translation:
  text: They set out from Iyyim and camped at Dibon-gad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'encamped.' The Hebrew verb commonly denotes pitching camp in wilderness
      itinerary formulas.
    reason: lexical_alternative
  - marker: b
    text: The place name may also be transliterated 'Iyim' or 'Iim.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the itinerary formula of Numbers, the sense is departure
    from one encampment stage. 'Set out' is natural modern English and preserves the
    movement nuance better than the more formal 'journeyed.'
- source_word: מֵעִיִּים
  chosen: from Iyyim
  alternatives:
  - from Iyim
  - from Iim
  lexicon: HALOT
  rationale: The prefixed preposition מֵ is rendered 'from.' The place name is transliterated
    rather than translated, following the philosophy of transliterating names. 'Iyyim'
    reflects the doubled yod in a standard English transliteration style.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה in travel notices, the meaning is to pitch camp or encamp. 'Camped'
    is readable modern English while remaining faithful to the source.
- source_word: בְּדִיבֹן גָּד
  chosen: at Dibon-gad
  alternatives:
  - in Dibon-gad
  - at Dibon of Gad
  lexicon: HALOT
  rationale: The preposition בְּ with a place in itinerary contexts is naturally rendered
    'at.' The toponym is best taken as the established place name 'Dibon-gad,' preserving
    the Hebrew form rather than unpacking it as a genitive phrase.
