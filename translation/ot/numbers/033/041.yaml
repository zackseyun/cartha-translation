id: NUM.33.41
reference: Numbers 33:41
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵ/הֹ֣ר הָ/הָ֑ר וַֽ/יַּחֲנ֖וּ בְּ/צַלְמֹנָֽה׃
translation:
  text: They set out from Mount Hor and camped at Zalmonah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: The verb נסע in itinerary contexts commonly denotes breaking camp and
    moving on to the next stage. 'Set out' is natural modern English and fits the
    travel-list formula better than the more general 'journeyed.'
- source_word: מֵהֹר הָהָר
  chosen: from Mount Hor
  alternatives:
  - from Hor the mountain
  lexicon: HALOT
  rationale: הֹר הָהָר is the established place name 'Mount Hor.' Although formally
    it reflects 'Hor the mountain,' English idiom and standard transliteration favor
    'Mount Hor' for the toponym.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: חנה in these wilderness itinerary notices means to pitch camp or encamp.
    'Camped' preserves the sense in readable modern English; 'encamped' is more formal
    but less natural.
- source_word: בְּצַלְמֹנָה
  chosen: at Zalmonah
  alternatives:
  - in Zalmonah
  lexicon: HALOT
  rationale: As a place name with ב, the sense is locative. 'At Zalmonah' is the most
    idiomatic English for arrival and encampment at a named stop in a travel itinerary.
