id: NUM.33.9
reference: Numbers 33:9
source:
  edition: WLC
  text: וַ/יִּסְעוּ֙ מִ/מָּרָ֔ה וַ/יָּבֹ֖אוּ אֵילִ֑מָ/ה וּ֠/בְ/אֵילִם שְׁתֵּ֣ים עֶשְׂרֵ֞ה
    עֵינֹ֥ת מַ֛יִם וְ/שִׁבְעִ֥ים תְּמָרִ֖ים וַ/יַּחֲנוּ שָֽׁם־׃
translation:
  text: They set out from Marah and came to Elim. At Elim there were twelve springs
    of water and seventy palm trees, and they camped there.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the itinerary formula, indicating breaking camp and moving
    on. 'Set out' is natural modern English and preserves the travel-sequence sense
    better than the more formal 'journeyed.'
- source_word: מִמָּרָה
  chosen: from Marah
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated in keeping with
    the philosophy of transliterating names.
- source_word: וַיָּבֹאוּ
  chosen: and came
  alternatives:
  - and arrived
  - and entered
  lexicon: HALOT
  rationale: בוא commonly means 'come' or 'arrive.' 'Came' fits the narrative sequence
    smoothly; 'arrived' is possible but slightly more interpretive.
- source_word: אֵילִמָה / בְאֵילִם
  chosen: to Elim / At Elim
  alternatives:
  - to Elim / in Elim
  lexicon: HALOT
  rationale: The directional form first indicates movement to the place, while the
    prepositional phrase later locates what was found there. English naturally renders
    these as 'to Elim' and 'At Elim.' The place name is transliterated.
- source_word: שְׁתֵּים עֶשְׂרֵה
  chosen: twelve
  alternatives:
  - twelve
  lexicon: HALOT
  rationale: Cardinal number rendered idiomatically in English as the compound numeral
    'twelve.'
- source_word: עֵינֹת מַיִם
  chosen: springs of water
  alternatives:
  - water springs
  - fountains of water
  - wells
  lexicon: HALOT
  rationale: עַיִן can denote a spring or fountain as a water source. 'Springs of
    water' is the most natural and precise here; 'wells' would suggest dug sources
    rather than natural springs.
- source_word: וְשִׁבְעִים
  chosen: and seventy
  lexicon: HALOT
  rationale: Straightforward cardinal number joined to the following noun.
- source_word: תְּמָרִים
  chosen: palm trees
  alternatives:
  - date palms
  - palms
  lexicon: HALOT
  rationale: תמרים refers to palm trees, likely date palms. 'Palm trees' is clear
    and idiomatic; 'date palms' is possible but more specific than the text requires.
- source_word: וַיַּחֲנוּ שָׁם
  chosen: and they camped there
  alternatives:
  - and they encamped there
  - and camped there
  lexicon: HALOT
  rationale: חנה in wilderness itinerary contexts means to camp or encamp. 'Camped
    there' is readable modern English while preserving the sense.
