id: NUM.33.7
reference: Numbers 33:7
source:
  edition: WLC
  text: וַ/יִּסְעוּ֙ מֵֽ/אֵתָ֔ם וַ/יָּ֨שָׁב֙ עַל פִּ֣י הַחִירֹ֔ת אֲשֶׁ֥ר עַל פְּנֵ֖י
    בַּ֣עַל צְפ֑וֹן וַֽ/יַּחֲנ֖וּ לִ/פְנֵ֥י מִגְדֹּֽל־־׃
translation:
  text: They set out from Etham and turned back to Pi-hahiroth, which is opposite
    Baal-zephon, and camped before Migdol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'returned' for 'turned back'; the Hebrew verb can denote either returning
      or reversing direction, but here likely describes a change in route.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: נסע in the wilderness itinerary formula commonly denotes breaking camp
    and moving on. 'Set out' is natural modern English and preserves the travel-sequence
    sense better than the more formal 'journeyed.'
- source_word: מֵאֵתָם
  chosen: from Etham
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated per project
    philosophy for names.
- source_word: וַיָּשָׁב
  chosen: and turned back
  alternatives:
  - and returned
  - and turned
  lexicon: HALOT
  rationale: שׁוב literally means 'return/turn back.' In this route description, 'turned
    back' best conveys a change of direction rather than merely arriving again at
    a prior location.
- source_word: עַל־פִּי הַחִירֹת
  chosen: to Pi-hahiroth
  alternatives:
  - at Pi-hahiroth
  - toward Pi-hahiroth
  lexicon: HALOT
  rationale: The phrase uses the place name Pi-hahiroth with the preposition עַל.
    In itinerary English, 'to Pi-hahiroth' communicates destination clearly. A more
    literal 'upon Pi-hahiroth' would be misleading. The place name is transliterated.
- source_word: אֲשֶׁר עַל־פְּנֵי בַּעַל צְפֹן
  chosen: which is opposite Baal-zephon
  alternatives:
  - which is before Baal-zephon
  - which faces Baal-zephon
  lexicon: HALOT
  rationale: עַל־פְּנֵי often indicates spatial relation such as 'in front of/opposite.'
    'Opposite' is idiomatic and fits a geographic notice. Baal-zephon is a place/deity-linked
    toponym and is transliterated.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: חנה means to camp/encamp. 'Camped' is preferred for readable modern English
    while preserving the concrete action.
- source_word: לִפְנֵי מִגְדֹּל
  chosen: before Migdol
  alternatives:
  - in front of Migdol
  - opposite Migdol
  lexicon: HALOT
  rationale: לִפְנֵי marks position relative to Migdol. 'Before' is concise and standard
    in geographic description; 'Migdol' is retained as a proper name rather than translated
    as 'tower,' since it functions here as a toponym.
