id: NUM.33.22
reference: Numbers 33:22
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵ/רִסָּ֑ה וַֽ/יַּחֲנ֖וּ בִּ/קְהֵלָֽתָה׃
translation:
  text: They set out from Rissah and camped at Kehelathah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the sense is departure
    from one station to another. 'Set out' is natural modern English and preserves
    the travel-sequence formula without unnecessary archaism.
- source_word: מֵרִסָּה
  chosen: from Rissah
  rationale: Proper place name with prefixed preposition מִן/מֵ 'from.' Following
    the translation philosophy, names are transliterated rather than translated.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה in itinerary contexts, referring to making camp. 'Camped' is
    clearer and more contemporary than 'encamped' while preserving the concrete action.
- source_word: בִּקְהֵלָתָה
  chosen: at Kehelathah
  alternatives:
  - in Kehelathah
  rationale: Proper place name with prefixed בְּ. In travel-stop formulas, English
    idiom prefers 'at' for a campsite location, though 'in' is possible more formally.
    The name is transliterated.
