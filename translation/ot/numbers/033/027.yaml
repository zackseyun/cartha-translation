id: NUM.33.27
reference: Numbers 33:27
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/תָּ֑חַת וַֽ/יַּחֲנ֖וּ בְּ/תָֽרַח׃
translation:
  text: They set out from Tahath and camped at Terah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the verb denotes breaking
    camp and moving on. 'Set out' is natural modern English and preserves the travel-sequence
    sense better than the more formal 'journeyed.'
- source_word: מִתָּחַת
  chosen: from Tahath
  alternatives:
  - from Tahat
  lexicon: HALOT
  rationale: The prefixed preposition מִן is rendered 'from.' The place name תָּחַת
    is transliterated as 'Tahath' by standard English convention for Hebrew names.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה in itinerary contexts, the verb means to pitch camp. 'Camped'
    is clear modern English; 'encamped' is possible but slightly more archaic.
- source_word: בְּתָרַח
  chosen: at Terah
  alternatives:
  - in Terah
  lexicon: HALOT
  rationale: The preposition בְּ with a campsite location in these travel notices
    is idiomatically rendered 'at.' The place name תָּרַח is transliterated 'Terah'
    in line with standard English usage.
