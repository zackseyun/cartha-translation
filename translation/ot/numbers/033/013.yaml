id: NUM.33.13
reference: Numbers 33:13
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/דָּפְקָ֑ה וַֽ/יַּחֲנ֖וּ בְּ/אָלֽוּשׁ׃
translation:
  text: They set out from Dophkah and camped at Alush.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the sense is departure
    from one encampment to continue the journey. 'Set out' is natural modern English
    and preserves the movement nuance better than the more formal 'journeyed.'
- source_word: מִדָּפְקָה
  chosen: from Dophkah
  alternatives:
  - from Dofqah
  lexicon: HALOT
  rationale: The prefixed מִן marks source ('from'). The place name is transliterated
    rather than translated, following the translation philosophy for names. 'Dophkah'
    reflects a standard English transliteration of the Hebrew proper noun.
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  lexicon: HALOT
  rationale: From חנה in itinerary contexts, the verb denotes making camp. 'Camped'
    is clearer and more contemporary than 'encamped' while preserving the same meaning.
- source_word: בְּאָלוּשׁ
  chosen: at Alush
  alternatives:
  - in Alush
  lexicon: HALOT
  rationale: The preposition ב marks location. In travel-stage formulas with place
    names, English idiom prefers 'at' for a campsite stop. The proper noun is transliterated
    as 'Alush.'
