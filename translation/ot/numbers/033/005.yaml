id: NUM.33.5
reference: Numbers 33:5
source:
  edition: WLC
  text: וַ/יִּסְע֥וּ בְנֵֽי יִשְׂרָאֵ֖ל מֵ/רַעְמְסֵ֑ס וַֽ/יַּחֲנ֖וּ בְּ/סֻכֹּֽת־׃
translation:
  text: The sons of Israel set out from Rameses and camped at Succoth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or traditionally 'the children of Israel.' The Hebrew
      is literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Rameses is also spelled 'Raamses' in some translations.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: set out
  alternatives:
  - journeyed
  - departed
  lexicon: HALOT
  rationale: From נסע in the travel-itinerary sense, referring to breaking camp and
    moving on. 'Set out' is natural modern English and preserves the narrative movement
    better than the more archaic 'journeyed.'
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Given the translation philosophy's preference
    for gender-accurate renderings, the formal expression is retained here rather
    than flattening it to 'Israelites.' 'Children of Israel' is traditional but less
    precise to the Hebrew form.
- source_word: מֵרַעְמְסֵס
  chosen: from Rameses
  alternatives:
  - from Raamses
  lexicon: HALOT
  rationale: The prefixed preposition מִן marks point of departure. The place name
    is transliterated in a standard English form. 'Rameses' is the more familiar conventional
    spelling, while 'Raamses' reflects another transliteration tradition.
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  lexicon: HALOT
  rationale: From חנה, to camp or encamp. 'Camped' is clear modern English; 'encamped'
    is more formal but not necessary here.
- source_word: בְּסֻכֹּת
  chosen: at Succoth
  alternatives:
  - in Succoth
  - at Sukkoth
  lexicon: HALOT
  rationale: The preposition ב marks location. 'At Succoth' fits an itinerary stop
    naturally in English. The place name is transliterated rather than translated.
