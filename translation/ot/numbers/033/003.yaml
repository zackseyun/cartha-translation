theological_decisions:
- issue: Rendering of בְנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is explicitly masculine plural in a representative covenantal
    expression. Following the doctrine's gender-accurate principle, the translation
    preserves the form rather than neutralizing it, while a footnote can note the
    more idiomatic collective sense.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of the idiom בְיָד רָמָה
  chosen_reading: with a high hand
  alternative_readings:
  - boldly
  - triumphantly
  - defiantly
  rationale: The phrase can be interpreted as bold, public, even defiant departure,
    but the text itself uses a concrete idiom. Preserving the idiom avoids importing
    a more specific theological or emotional nuance than the Hebrew requires.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
