id: NUM.33.3
reference: Numbers 33:3
source:
  edition: WLC
  text: וַ/יִּסְע֤וּ מֵֽ/רַעְמְסֵס֙ בַּ/חֹ֣דֶשׁ הָֽ/רִאשׁ֔וֹן בַּ/חֲמִשָּׁ֥ה עָשָׂ֛ר
    י֖וֹם לַ/חֹ֣דֶשׁ הָ/רִאשׁ֑וֹן מִֽ/מָּחֳרַ֣ת הַ/פֶּ֗סַח יָצְא֤וּ בְנֵֽי יִשְׂרָאֵל֙
    בְּ/יָ֣ד רָמָ֔ה לְ/עֵינֵ֖י כָּל מִצְרָֽיִם־־׃
translation:
  text: They set out from Rameses in the first month, on the fifteenth day of the
    first month; on the day after the Passover the sons of Israel went out with a
    high hand before the eyes of all the Egyptians.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''With a high hand'' is a Hebrew idiom meaning openly and boldly, in full
      public view.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: נסע in travel itinerary contexts commonly means to pull up camp and set
    out. 'Set out' is natural English and fits the itinerary formula in Numbers 33.
- source_word: מֵרַעְמְסֵס
  chosen: from Rameses
  alternatives:
  - from Raamses
  lexicon: HALOT
  rationale: A transliterated place name is required by the translation philosophy.
    'Rameses' is the standard English form and is readily recognizable.
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  chosen: in the first month
  lexicon: HALOT
  rationale: A straightforward temporal phrase; 'month' is the plain sense of חֹדֶשׁ
    here.
- source_word: בַּחֲמִשָּׁה עָשָׂר יוֹם לַחֹדֶשׁ הָרִאשׁוֹן
  chosen: on the fifteenth day of the first month
  alternatives:
  - on day fifteen of the first month
  lexicon: HALOT
  rationale: This is the idiomatic English rendering of the Hebrew date expression.
- source_word: מִמָּחֳרַת הַפֶּסַח
  chosen: on the day after the Passover
  alternatives:
  - on the morrow after the Passover
  - the day after Passover
  lexicon: HALOT
  rationale: מָחֳרַת means the next day or morrow. 'The Passover' preserves the article
    in Hebrew and the festival reference.
- source_word: יָצְאוּ
  chosen: went out
  alternatives:
  - came out
  - departed
  lexicon: HALOT
  rationale: יצא is the standard verb 'go out/come out.' 'Went out' matches the narrative
    perspective and preserves the exodus motif.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per translation philosophy, gender-accurate rendering is preferred where
    the source is grammatically masculine and representative. 'The sons of Israel'
    preserves the Hebrew form more transparently than 'Israelites,' while remaining
    understandable.
- source_word: בְּיָד רָמָה
  chosen: with a high hand
  alternatives:
  - boldly
  - triumphantly
  - defiantly
  lexicon: HALOT
  rationale: This Hebrew idiom literally means 'with a raised/high hand' and conveys
    open, bold, public action. The more literal 'with a high hand' preserves the idiom
    and its force; dynamic alternatives are possible but less transparent to the source.
- source_word: לְעֵינֵי כָּל מִצְרָיִם
  chosen: before the eyes of all the Egyptians
  alternatives:
  - in the sight of all the Egyptians
  - before all Egypt
  lexicon: HALOT
  rationale: The phrase is idiomatic for public visibility. 'Before the eyes of all
    the Egyptians' stays close to the Hebrew while remaining clear in English.
