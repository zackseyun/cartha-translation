id: NUM.33.31
reference: Numbers 33:31
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/מֹּסֵר֑וֹת וַֽ/יַּחֲנ֖וּ בִּ/בְנֵ֥י יַעֲקָֽן׃
translation:
  text: They set out from Moseroth and camped at Bene-jaakan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Bene-jaakan is literally 'sons of Jaakan,' but here it functions
      as a place name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: The verb נסע in the wilderness itinerary formula commonly denotes breaking
    camp and moving on. 'Set out' is natural modern English and fits the repeated
    travel formula in Numbers 33.
- source_word: מִמֹּסֵרֹות
  chosen: from Moseroth
  alternatives:
  - from Moserot
  lexicon: HALOT
  rationale: The prefixed preposition מִן is rendered 'from.' The place name is transliterated
    rather than translated, following the philosophy of transliterating names. 'Moseroth'
    follows a conventional English transliteration of the Hebrew plural-form toponym.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: חנה in itinerary contexts means to camp or encamp. 'Camped' is preferred
    as readable modern English; 'encamped' is more formal but not necessary here.
- source_word: בִּבְנֵי יַעֲקָן
  chosen: at Bene-jaakan
  alternatives:
  - at Bene-yaakan
  - among the sons of Jaakan
  lexicon: HALOT
  rationale: Although literally built from 'sons of Jaakan,' this expression functions
    here as a place name in the itinerary list, as also in parallel traditions. Therefore
    it is best transliterated as a toponym rather than translated literally. The preposition
    ב is rendered idiomatically as 'at' with a destination campsite.
