id: NUM.33.46
reference: Numbers 33:46
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/דִּיבֹ֣ן גָּ֑ד וַֽ/יַּחֲנ֖וּ בְּ/עַלְמֹ֥ן דִּבְלָתָֽיְמָ/ה׃
translation:
  text: They set out from Dibon-gad and camped at Almon-diblathaim.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: נסע in the wilderness itinerary formula commonly denotes breaking camp
    and moving on to the next station. 'Set out' is natural modern English and fits
    the repeated travel formula in Numbers 33.
- source_word: מִדִּיבֹן גָּד
  chosen: from Dibon-gad
  alternatives:
  - from Dibon of Gad
  lexicon: HALOT
  rationale: This is a place name, so it is transliterated rather than translated
    per project philosophy. The construct-like sequence is conventionally represented
    as the compound toponym 'Dibon-gad,' matching the itinerary context better than
    the more interpretive 'Dibon of Gad.'
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: חנה in this travel formula means to pitch camp or stop at a campsite.
    'Camped' is clear modern English; 'encamped' is more formal but less natural.
- source_word: בְּעַלְמֹן דִּבְלָתָיְמָה
  chosen: at Almon-diblathaim
  alternatives:
  - at Almon Diblathaim
  lexicon: HALOT
  rationale: This is another place name and is therefore transliterated. The prefixed
    preposition ב is rendered 'at' for location. The compound form with hyphen reflects
    the likely single toponym in English presentation.
