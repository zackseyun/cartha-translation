id: NUM.33.33
reference: Numbers 33:33
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵ/חֹ֣ר הַגִּדְגָּ֑ד וַֽ/יַּחֲנ֖וּ בְּ/יָטְבָֽתָה׃
translation:
  text: They set out from Hor-haggidgad and camped at Jotbathah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic sense is
    departure from one station. 'Set out' is natural modern English and preserves
    the travel-sequence formula without unnecessary stiffness.
- source_word: מֵחֹר הַגִּדְגָּד
  chosen: from Hor-haggidgad
  alternatives:
  - from Hor Hagidgad
  - from Hor of Gidgad
  lexicon: HALOT
  rationale: A place name introduced by the preposition מִן ('from'). Per translation
    philosophy, names are transliterated rather than translated. The maqqeph-like
    relation of the elements is represented with a hyphen in English transliteration.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה in itinerary contexts, 'camped' is the most readable modern
    equivalent. 'Encamped' is more formal but less natural; the meaning is unchanged.
- source_word: בְּיָטְבָתָה
  chosen: at Jotbathah
  alternatives:
  - in Jotbathah
  lexicon: HALOT
  rationale: A place name with בְּ marking location. 'At' fits English idiom for stopping
    at a named station in a travel list better than 'in,' while preserving the locative
    sense. The name is transliterated.
