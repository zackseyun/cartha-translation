id: NUM.33.28
reference: Numbers 33:28
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/תָּ֑רַח וַֽ/יַּחֲנ֖וּ בְּ/מִתְקָֽה׃
translation:
  text: They set out from Terah and camped at Mithkah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic sense is
    departure from a camp or station. 'Set out' is natural modern English and preserves
    the travel-sequence formula without unnecessary paraphrase.
- source_word: מִתָּרַח
  chosen: from Terah
  rationale: The prefixed מִן marks source/origin, here the departure point. תָּרַח
    is a place name in this itinerary and is therefore transliterated as 'Terah' per
    the translation philosophy for names.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה in itinerary contexts, the standard sense is to pitch camp or
    encamp. 'Camped' gives readable modern English while retaining the concrete sense
    of stopping and making camp.
- source_word: בְּמִתְקָה
  chosen: at Mithkah
  alternatives:
  - in Mithkah
  rationale: The prefixed ב marks location. With a campsite/place name in English
    itinerary style, 'at Mithkah' is the most natural rendering. מִתְקָה is transliterated
    as a place name, 'Mithkah'.
