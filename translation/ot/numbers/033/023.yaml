id: NUM.33.23
reference: Numbers 33:23
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/קְּהֵלָ֑תָה וַֽ/יַּחֲנ֖וּ בְּ/הַר שָֽׁפֶר־׃
translation:
  text: They set out from Kehelathah and camped at Mount Shepher.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Mount Shapher.' The place name שָׁפֶר is traditionally rendered this
      way in many English versions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: The wayyiqtol of נסע in itinerary contexts commonly denotes breaking
    camp and moving on. 'Set out' is natural modern English and fits the repeated
    travel formula in Numbers 33.
- source_word: מִקְּהֵלָתָה
  chosen: from Kehelathah
  rationale: Proper place name with prefixed preposition מִן. Following the translation
    philosophy, names are transliterated rather than translated.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: The wayyiqtol of חנה in wilderness itinerary formulas means to pitch
    camp. 'Camped' is more readable modern English than 'encamped' while preserving
    the sense.
- source_word: בְּהַר
  chosen: at Mount
  alternatives:
  - in the hill country of
  - on the mountain
  lexicon: HALOT
  rationale: הַר means 'mountain/hill country,' but with a following proper name in
    a station list, the idiomatic English rendering is 'Mount ...' The preposition
    ב here is naturally rendered 'at' in English for a campsite location.
- source_word: שָׁפֶר
  chosen: Shepher
  alternatives:
  - Shapher
  rationale: Proper place name transliterated. 'Shepher' closely reflects the Hebrew
    consonants and vowels. The traditional English form 'Shapher' is worth preserving
    as an alternative because it appears in many existing translations.
