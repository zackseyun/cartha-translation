id: NUM.33.24
reference: Numbers 33:24
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵֽ/הַר שָׁ֑פֶר וַֽ/יַּחֲנ֖וּ בַּ/חֲרָדָֽה־׃
translation:
  text: They set out from Mount Shepher and camped at Haradah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Shapher' for the place name שָׁפֶר.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic sense is
    departure from one encampment to the next. 'Set out' is natural modern English
    and preserves the movement nuance better than the more formal 'journeyed.'
- source_word: מֵהַר
  chosen: from Mount
  alternatives:
  - from the hill country of
  - from the mountain
  lexicon: HALOT
  rationale: The preposition מן with הַר gives 'from Mount/mountain of.' Because the
    following term is a place name, 'Mount' is the most natural English construction.
- source_word: שָׁפֶר
  chosen: Shepher
  alternatives:
  - Shapher
  lexicon: HALOT
  rationale: This is a place name and so is transliterated rather than translated,
    in keeping with the project's policy for names. 'Shepher' follows a straightforward
    transliteration of the Hebrew consonants and vowels; 'Shapher' is a possible English
    spelling variant worth preserving.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה in itinerary contexts, the sense is taking up camp. 'Camped'
    is clear, contemporary English; 'encamped' is more formal but not necessary here.
- source_word: בַּחֲרָדָה
  chosen: at Haradah
  alternatives:
  - in Haradah
  lexicon: HALOT
  rationale: The preposition ב with a place name in travel notices is commonly rendered
    'at' in English for a stopping place. 'Haradah' is transliterated as a place name.
