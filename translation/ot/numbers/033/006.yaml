id: NUM.33.6
reference: Numbers 33:6
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/סֻּכֹּ֑ת וַ/יַּחֲנ֣וּ בְ/אֵתָ֔ם אֲשֶׁ֖ר בִּ/קְצֵ֥ה הַ/מִּדְבָּֽר׃
translation:
  text: They set out from Sukkoth and camped at Etham, which is at the edge of the
    wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the border of the wilderness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the travel-itinerary sense. 'Set out' is natural modern English
    and preserves the narrative movement better than the more formal 'journeyed.'
- source_word: מִסֻּכֹּת
  chosen: from Sukkoth
  alternatives:
  - from Succoth
  lexicon: HALOT
  rationale: Place name; per philosophy, names are transliterated rather than translated.
    'Sukkoth' reflects a standard transliteration from the Hebrew.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה, to camp. 'Camped' is the readable modern equivalent; 'encamped'
    is more traditional but less natural.
- source_word: בְאֵתָם
  chosen: at Etham
  alternatives:
  - in Etham
  lexicon: HALOT
  rationale: Place name with ב preposition. 'At Etham' fits English idiom for arrival
    at a location in an itinerary.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause describing Etham. 'Which' reads smoothly
    for a non-personal antecedent in modern English.
- source_word: בִּקְצֵה
  chosen: at the edge of
  alternatives:
  - on the edge of
  - at the end of
  - at the border of
  lexicon: HALOT
  rationale: קצה denotes extremity or boundary. 'At the edge of' best conveys the
    geographic sense here without over-specifying a political border.
- source_word: הַמִּדְבָּר
  chosen: the wilderness
  alternatives:
  - the desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes uncultivated wilderness land, not necessarily
    sandy desert. 'Wilderness' is the more accurate and biblically resonant rendering
    in the Exodus itinerary context.
