id: NUM.33.43
reference: Numbers 33:43
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/פּוּנֹ֑ן וַֽ/יַּחֲנ֖וּ בְּ/אֹבֹֽת׃
translation:
  text: They set out from Punon and camped at Oboth.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic sense is
    breaking camp and moving on. 'Set out' is natural modern English and fits the
    repeated travel notices in Numbers better than the slightly more formal 'journeyed.'
- source_word: מִפּוּנֹן
  chosen: from Punon
  lexicon: HALOT
  rationale: The prefixed preposition מִן marks source/origin, so 'from Punon.' The
    place name is transliterated rather than translated, following the project's policy
    for names.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה, the standard sense in itinerary contexts is to pitch camp or
    camp. 'Camped' is preferred as readable modern English; 'encamped' is more traditional
    but less natural.
- source_word: בְּאֹבֹת
  chosen: at Oboth
  alternatives:
  - in Oboth
  lexicon: HALOT
  rationale: The preposition בְּ with a campsite location in travel formulas is naturally
    rendered 'at' in English. 'Oboth' is a place name and is therefore transliterated.
