id: NUM.33.1
reference: Numbers 33:1
source:
  edition: WLC
  text: אֵ֜לֶּה מַסְעֵ֣י בְנֵֽי יִשְׂרָאֵ֗ל אֲשֶׁ֥ר יָצְא֛וּ מֵ/אֶ֥רֶץ מִצְרַ֖יִם
    לְ/צִבְאֹתָ֑/ם בְּ/יַד מֹשֶׁ֖ה וְ/אַהֲרֹֽן־־׃
translation:
  text: These are the stages of the journey of the sons of Israel, who went out from
    the land of Egypt by their companies, under the hand of Moses and Aaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'journeys' or 'departures' for 'stages of the journey.' The Hebrew term
      refers to the successive travel stages in Israel's itinerary.
    reason: lexical_alternative
  - marker: b
    text: Or 'the children of Israel' or 'the Israelites.' The Hebrew is literally
      'the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'according to their armies' or 'in their divisions.' The Hebrew can carry
      an organized, even military, sense.
    reason: lexical_alternative
  - marker: d
    text: 'Hebrew idiom: ''by the hand of Moses and Aaron,'' meaning under their agency
      or leadership.'
    reason: cultural_note
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  - These were
  lexicon: HALOT
  rationale: Standard demonstrative opening introducing the list that follows; English
    idiom naturally supplies 'are' in a heading-like statement.
- source_word: מַסְעֵי
  chosen: the stages of the journey
  alternatives:
  - journeys
  - departures
  - marches
  lexicon: HALOT
  rationale: The noun refers to travel stages or setting-out points in an itinerary.
    'Stages of the journey' communicates the list-like sequence better than the more
    ambiguous 'journeys,' while avoiding the overly narrow 'departures.'
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: A construct phrase literally meaning 'sons of Israel.' Per the project's
    gender-accurate principle, the familial expression is retained rather than flattened
    to 'Israelites,' though that alternative is idiomatic English.
- source_word: אֲשֶׁר יָצְאוּ
  chosen: who went out
  alternatives:
  - who came out
  lexicon: HALOT
  rationale: The relative clause modifies 'the sons of Israel.' 'Went out' matches
    the directional force of יצא from Egypt.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'land,' so it is retained for slightly
    fuller formal correspondence.
- source_word: לְצִבְאֹתָם
  chosen: by their companies
  alternatives:
  - according to their armies
  - by their hosts
  - in their divisions
  lexicon: HALOT
  rationale: צָבָא can denote military array, host, or organized company. Here it
    describes the ordered grouping of Israel in the exodus itinerary. 'By their companies'
    preserves the organized sense without overstating a combat setting, while 'armies'
    remains a viable alternative.
- source_word: בְּיַד
  chosen: under the hand of
  alternatives:
  - by the hand of
  - under the leadership of
  lexicon: HALOT
  rationale: A Hebrew idiom for agency or leadership. 'Under the hand of' preserves
    the idiom more transparently than the interpretive 'under the leadership of,'
    while remaining understandable in context.
- source_word: מֹשֶׁה וְאַהֲרֹן
  chosen: Moses and Aaron
  rationale: Standard English transliterations of the personal names.
