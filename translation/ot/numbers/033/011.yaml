id: NUM.33.11
reference: Numbers 33:11
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/יַּם ס֑וּף וַֽ/יַּחֲנ֖וּ בְּ/מִדְבַּר סִֽין־־׃
translation:
  text: They set out from the Red Sea and camped in the wilderness of Sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the Sea of Reeds.' The Hebrew name yam suf is traditionally rendered
      'Red Sea,' but the more literal rendering is often understood as 'Sea of Reeds.'
    reason: lexical_alternative
  - marker: b
    text: '''Sin'' is the name of a wilderness region, not the moral concept of sin.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the itinerary formula of Numbers 33, the sense is departure
    from a campsite or location. 'Set out' is natural modern English and preserves
    the travel-sequence formula better than the more formal 'journeyed.'
- source_word: מִיַּם סוּף
  chosen: from the Red Sea
  alternatives:
  - from the Sea of Reeds
  lexicon: HALOT
  rationale: The Hebrew phrase yam suf is traditionally rendered 'Red Sea,' and in
    this wilderness itinerary it functions as a geographic name. Although the more
    literal sense 'Sea of Reeds' is lexically possible and often argued, 'Red Sea'
    is the most recognizable English toponym here; the literal alternative is preserved
    in a footnote for auditability.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה, the standard wilderness-itinerary verb for making camp. 'Camped'
    is readable modern English while retaining the concrete sense.
- source_word: בְּמִדְבַּר סִין
  chosen: in the wilderness of Sin
  alternatives:
  - in the desert of Sin
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert terrain. 'Wilderness' fits
    Pentateuchal usage well in English. 'Sin' is a place-name and should be transliterated,
    not translated; it is unrelated to the English word 'sin' in meaning.
