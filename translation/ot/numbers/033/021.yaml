id: NUM.33.21
reference: Numbers 33:21
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/לִּבְנָ֑ה וַֽ/יַּחֲנ֖וּ בְּ/רִסָּֽה׃
translation:
  text: They set out from Libnah and camped at Rissah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the sense is departure
    from one encampment to continue the journey. 'Set out' is natural modern English
    and preserves the movement nuance better than the more formal 'journeyed' or the
    flatter 'departed'.
- source_word: מִלִּבְנָה
  chosen: from Libnah
  lexicon: HALOT
  rationale: The preposition מִן marks source/origin, and לִבְנָה is a place name.
    Following the translation philosophy, names are transliterated rather than translated.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה, the standard itinerary verb for making camp. 'Camped' is clear
    contemporary English; 'encamped' is more formal but adds no needed precision here.
- source_word: בְּרִסָּה
  chosen: at Rissah
  alternatives:
  - in Rissah
  lexicon: HALOT
  rationale: The preposition ב marks location. With a campsite/place name in English
    itinerary style, 'at Rissah' is the most idiomatic rendering. The place name is
    transliterated.
