id: NUM.33.26
reference: Numbers 33:26
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/מַּקְהֵלֹ֑ת וַֽ/יַּחֲנ֖וּ בְּ/תָֽחַת׃
translation:
  text: They set out from Makheloth and camped at Tahath.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic sense is
    departure from one encampment stage. 'Set out' is natural modern English and preserves
    the movement nuance better than the more formal 'journeyed.'
- source_word: מִמַּקְהֵלֹת
  chosen: from Makheloth
  alternatives:
  - from Maqheloth
  lexicon: HALOT
  rationale: A place name, so it is transliterated rather than translated, following
    the project's policy to transliterate names. The prefixed preposition מִן is rendered
    'from.' 'Makheloth' is a standard English transliteration; 'Maqheloth' is a possible
    more phonetic alternative.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה in itinerary contexts, the sense is taking up camp at the next
    location. 'Camped' is clear modern English; 'encamped' is more formal but less
    natural.
- source_word: בְּתָחַת
  chosen: at Tahath
  alternatives:
  - in Tahath
  lexicon: HALOT
  rationale: Another place name with prefixed ב rendered idiomatically as 'at' for
    a campsite location in English. 'Tahath' is transliterated as a proper name rather
    than translated from the common noun/preposition sense of the underlying form.
