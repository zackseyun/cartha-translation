theological_decisions:
- issue: Rendering commands concerning Canaanite cult and population
  chosen_reading: The verse is translated straightforwardly as commands to remove
    the inhabitants and eradicate their idolatrous cult objects/sites, without softening
    either element.
  alternative_readings:
  - Translate the first verb more weakly as 'dispossess' in a purely territorial sense
  - Generalize the cultic terms into broader language about pagan practices
  rationale: The Hebrew explicitly commands removal of the inhabitants and destruction
    of specific cultic items and sites. The translation should not mute the severity
    of either command, but neither should it import theological justification beyond
    the verse itself.
  doctrine_reference: Translation philosophy §§1, 3, 5
