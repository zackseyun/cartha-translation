id: NUM.33.52
reference: Numbers 33:52
source:
  edition: WLC
  text: וְ/ה֨וֹרַשְׁתֶּ֜ם אֶת כָּל יֹשְׁבֵ֤י הָ/אָ֨רֶץ֙ מִ/פְּנֵי/כֶ֔ם וְ/אִ֨בַּדְתֶּ֔ם
    אֵ֖ת כָּל מַשְׂכִּיֹּתָ֑/ם וְ/אֵ֨ת כָּל צַלְמֵ֤י מַסֵּֽכֹתָ/ם֙ תְּאַבֵּ֔דוּ וְ/אֵ֥ת
    כָּל בָּמֹתָ֖/ם תַּשְׁמִֽידוּ־־־־־׃
translation:
  text: and you shall drive out all the inhabitants of the land from before you, and
    you shall destroy all their figured stones, and all their cast-metal images you
    shall destroy, and all their high places you shall demolish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their carved images' for 'their figured stones'; the Hebrew term מַשְׂכִּיּוֹת
      refers to figured representations, and the precise form or material is debated.
    reason: lexical_alternative
  - marker: b
    text: Or 'their molten images.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹרַשְׁתֶּם
  chosen: you shall drive out
  alternatives:
  - you shall dispossess
  - you shall expel
  lexicon: HALOT
  rationale: From ירשׁ in the Hiphil, here meaning to cause the current inhabitants
    to lose possession / be removed. 'Drive out' is natural modern English and fits
    the following phrase 'from before you.' 'Dispossess' is possible but less idiomatic
    in this immediate context.
- source_word: יֹשְׁבֵי הָאָרֶץ
  chosen: the inhabitants of the land
  alternatives:
  - those dwelling in the land
  - the residents of the land
  lexicon: HALOT
  rationale: The participial construction denotes those living in the land. 'Inhabitants'
    is concise and standard without sounding archaic.
- source_word: מִפְּנֵיכֶם
  chosen: from before you
  alternatives:
  - from before your face
  - out of your presence
  lexicon: HALOT
  rationale: This is the idiomatic Hebrew expression. Retaining 'from before you'
    preserves the source imagery while remaining understandable in English.
- source_word: וְאִבַּדְתֶּם
  chosen: you shall destroy
  alternatives:
  - you shall wipe out
  - you shall make perish
  lexicon: HALOT
  rationale: From אבד in the Piel, used here for the destruction of cultic objects.
    'Destroy' is the clearest and most natural rendering.
- source_word: מַשְׂכִּיֹּתָם
  chosen: their figured stones
  alternatives:
  - their carved images
  - their figured objects
  - their imagery
  lexicon: HALOT
  rationale: The noun refers to figured or decorated representations, often associated
    with stone carvings or engraved cultic objects. Because the exact material is
    debated and the next phrase already clearly refers to metal images, 'figured stones'
    preserves a likely concrete sense while distinguishing the two object types.
- source_word: צַלְמֵי מַסֵּכֹתָם
  chosen: their cast-metal images
  alternatives:
  - their molten images
  - their cast images
  lexicon: HALOT
  rationale: צֶלֶם means image/idol, and מַסֵּכָה denotes something cast in metal.
    'Cast-metal images' communicates the manufacturing method in clear modern English.
    'Molten images' is traditional but less natural today.
- source_word: תְּאַבֵּדוּ
  chosen: you shall destroy
  alternatives:
  - you shall make perish
  - you shall wipe out
  lexicon: HALOT
  rationale: A second form of אבד, here continuing the command regarding cultic objects.
    Repeating 'destroy' reflects the Hebrew repetition and preserves rhetorical force.
- source_word: בָּמֹתָם
  chosen: their high places
  alternatives:
  - their shrines on the heights
  - their hilltop sanctuaries
  lexicon: HALOT
  rationale: בָּמוֹת is the standard term for elevated cult sites. 'High places' is
    the established and accurate English rendering, and remains understandable.
- source_word: תַּשְׁמִידוּ
  chosen: you shall demolish
  alternatives:
  - you shall destroy
  - you shall exterminate
  lexicon: HALOT
  rationale: From שׁמד in the Hiphil, here applied to cult sites rather than persons.
    'Demolish' fits the object ('high places') better than the more general 'destroy,'
    while still conveying total removal.
