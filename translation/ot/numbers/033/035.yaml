id: NUM.33.35
reference: Numbers 33:35
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵֽ/עַבְרֹנָ֑ה וַֽ/יַּחֲנ֖וּ בְּ/עֶצְי֥וֹן גָּֽבֶר׃
translation:
  text: They set out from Abronah and camped at Ezion-geber.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic sense is
    departure from one encampment. 'Set out' is natural modern English and preserves
    the movement nuance better than the more formal 'journeyed.'
- source_word: מֵעַבְרֹנָה
  chosen: from Abronah
  lexicon: HALOT
  rationale: The prefixed preposition מֵ is rendered 'from.' עַבְרֹנָה is a place
    name, so it is transliterated rather than translated, in keeping with the translation
    philosophy for names.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה in itinerary contexts, 'camped' is the most readable modern
    equivalent. 'Encamped' is more formal but adds no necessary precision here.
- source_word: בְּעֶצְיוֹן גָּבֶר
  chosen: at Ezion-geber
  alternatives:
  - at Ezion Geber
  lexicon: HALOT
  rationale: The preposition בְּ is rendered 'at' for location. עֶצְיוֹן גָּבֶר is
    a place name and is therefore transliterated. The hyphenated form 'Ezion-geber'
    is a standard English representation of the compound toponym.
