id: NUM.33.18
reference: Numbers 33:18
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵ/חֲצֵרֹ֑ת וַֽ/יַּחֲנ֖וּ בְּ/רִתְמָֽה׃
translation:
  text: They set out from Hazeroth and camped at Rithmah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the sense is departure/breaking
    camp to travel. 'Set out' is natural modern English and preserves the narrative
    movement better than the more formal 'journeyed.'
- source_word: מֵחֲצֵרֹת
  chosen: from Hazeroth
  lexicon: HALOT
  rationale: Proper place name with prefixed preposition מִן ('from'). Following the
    translation philosophy, names are transliterated rather than translated.
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  lexicon: HALOT
  rationale: From חנה, the standard itinerary verb for making camp. 'Camped' is clear
    modern English; 'encamped' is possible but slightly more archaic.
- source_word: בְּרִתְמָה
  chosen: at Rithmah
  alternatives:
  - in Rithmah
  lexicon: HALOT
  rationale: Proper place name with prefixed בְּ marking location. 'At' is the most
    idiomatic English preposition for a campsite location in this travel list.
