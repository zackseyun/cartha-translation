id: NUM.33.30
reference: Numbers 33:30
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵֽ/חַשְׁמֹנָ֑ה וַֽ/יַּחֲנ֖וּ בְּ/מֹסֵרֽוֹת׃
translation:
  text: They set out from Hashmonah and camped at Moseroth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “and encamped at Moseroth.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic sense is
    departure from one station. 'Set out' is natural modern English and preserves
    the travel-sequence formula better than the more formal 'journeyed.'
- source_word: מֵחַשְׁמֹנָה
  chosen: from Hashmonah
  lexicon: HALOT
  rationale: The prefixed preposition מֵ is rendered 'from.' חַשְׁמֹנָה is a place
    name, so per translation philosophy it is transliterated rather than translated.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה in itinerary contexts, the standard sense is to pitch camp or
    encamp. 'Camped' gives readable modern English while preserving the concrete action.
- source_word: בְּמֹסֵרֹת
  chosen: at Moseroth
  alternatives:
  - in Moseroth
  lexicon: HALOT
  rationale: The preposition בְ in travel notices is naturally rendered 'at' for a
    stopping place. מֹסֵרֹת is a place name and is therefore transliterated. 'At'
    is slightly more idiomatic than 'in' in English itinerary style.
