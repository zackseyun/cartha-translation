id: NUM.33.44
reference: Numbers 33:44
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵ/אֹבֹ֑ת וַֽ/יַּחֲנ֛וּ בְּ/עִיֵּ֥י הָעֲבָרִ֖ים בִּ/גְב֥וּל מוֹאָֽב׃
translation:
  text: They set out from Oboth and camped at Iye-abarim, on the border of Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Iyye-abarim"; the Hebrew may reflect a place name whose elements are
      related to "ruins" and "Abarim/regions beyond."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic sense is
    breaking camp and moving on. 'Set out' is natural modern English and preserves
    the travel-sequence formula.
- source_word: מֵאֹבֹת
  chosen: from Oboth
  lexicon: HALOT
  rationale: The prefixed preposition מֵ marks source/origin, and אֹבֹת is a place
    name. Per translation philosophy, names are transliterated rather than translated.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה, the standard wilderness-travel verb for making camp. 'Camped'
    is preferred over the more formal 'encamped' for readable modern English while
    retaining the concrete sense.
- source_word: בְּעִיֵּי הָעֲבָרִים
  chosen: at Iye-abarim
  alternatives:
  - at Iyye-abarim
  - at the ruins of Abarim
  lexicon: HALOT
  rationale: This is conventionally taken as a place name. Although עִיֵּי can be
    related to 'ruins/heaps' and הָעֲבָרִים to 'Abarim/regions beyond,' in itinerary
    contexts the collocation functions as a toponym, so transliteration best follows
    the source without overinterpreting the etymology.
- source_word: בִּגְבוּל
  chosen: on the border of
  alternatives:
  - within the territory of
  - in the border region of
  lexicon: HALOT
  rationale: גְּבוּל denotes border, boundary, or territory. Here, with Moab, the
    locative sense 'on the border of' fits the travel notice most directly and avoids
    overstating that the camp was deep inside Moabite territory.
- source_word: מוֹאָב
  chosen: Moab
  lexicon: HALOT
  rationale: Standard English transliteration of the place/people name.
