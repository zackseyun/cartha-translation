id: NUM.33.14
reference: Numbers 33:14
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵ/אָל֑וּשׁ וַֽ/יַּחֲנוּ֙ בִּ/רְפִידִ֔ם וְ/לֹא הָ֨יָה שָׁ֥ם מַ֛יִם
    לָ/עָ֖ם לִ/שְׁתּֽוֹת־׃
translation:
  text: They set out from Alush and camped at Rephidim, but there was no water there
    for the people to drink.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic sense is
    breaking camp and moving on. 'Set out' is natural modern English and preserves
    the travel-sequence formula.
- source_word: מֵאָלוּשׁ
  chosen: from Alush
  rationale: Toponym; transliterated rather than translated per project philosophy
    for names.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה, the standard wilderness-travel verb for making camp. 'Camped'
    is readable modern English; 'encamped' is more formal but less natural.
- source_word: בִּרְפִידִם
  chosen: at Rephidim
  alternatives:
  - in Rephidim
  rationale: Toponym; transliterated. 'At' fits an encampment location in English
    better than 'in'.
- source_word: וְלֹא הָיָה שָׁם
  chosen: but there was no ... there
  alternatives:
  - and there was no ... there
  - and no ... was there
  lexicon: HALOT
  rationale: The clause states a contrasting circumstance at the campsite. Rendering
    waw as 'but' brings out the adverse sense in context without overstating it.
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: Standard rendering of מים.
- source_word: לָעָם
  chosen: for the people
  alternatives:
  - for the people there
  - for the congregation
  lexicon: HALOT
  rationale: עם here refers to the Israelite people collectively. 'The people' is
    the plain contextual rendering.
- source_word: לִשְׁתּוֹת
  chosen: to drink
  alternatives:
  - for drinking
  lexicon: HALOT
  rationale: 'Infinitive of purpose after ''for the people'': no water for the people
    to drink.'
