id: NUM.33.10
reference: Numbers 33:10
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵ/אֵילִ֑ם וַֽ/יַּחֲנ֖וּ עַל יַם סֽוּף־־׃
translation:
  text: They set out from Elim and camped by the Red Sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Sea of Reeds.' The Hebrew name Yam Suph is traditionally rendered
      'Red Sea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the sense is departure
    from one station. 'Set out' is natural modern English and preserves the travel-sequence
    formula without unnecessary stiffness.
- source_word: מֵאֵילִם
  chosen: from Elim
  rationale: The preposition מִן marks source/origin, and אֵילִם is a place name,
    so it is transliterated as 'Elim' per the translation philosophy for names.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה, the standard itinerary verb for making camp. 'Camped' is more
    readable modern English than 'encamped' while preserving the concrete action.
- source_word: עַל
  chosen: by
  alternatives:
  - 'on'
  - at
  - beside
  lexicon: HALOT
  rationale: Although עַל often means 'on/upon,' with a body of water in a camping
    context it idiomatically indicates location alongside it. 'By' gives the natural
    English sense of camping adjacent to the sea.
- source_word: יַם סוּף
  chosen: the Red Sea
  alternatives:
  - the Sea of Reeds
  lexicon: HALOT
  rationale: The Hebrew expression is traditionally rendered 'Red Sea,' and in this
    itinerary context it functions as a recognized geographical designation. 'Sea
    of Reeds' is a plausible lexical alternative for סוּף and is preserved in a footnote
    for transparency.
