id: NUM.33.36
reference: Numbers 33:36
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵ/עֶצְי֣וֹן גָּ֑בֶר וַ/יַּחֲנ֥וּ בְ/מִדְבַּר צִ֖ן הִ֥וא קָדֵֽשׁ־׃
translation:
  text: They set out from Ezion-geber and camped in the wilderness of Zin (that is,
    Kadesh).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which is Kadesh.' The Hebrew pronoun introduces an identification of
      the location.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: The verb נסע in itinerary contexts commonly denotes breaking camp and
    moving on. 'Set out' is natural modern English and fits the repeated travel formula
    in Numbers 33.
- source_word: מֵעֶצְיוֹן גָּבֶר
  chosen: from Ezion-geber
  alternatives:
  - from Ezion Geber
  lexicon: HALOT
  rationale: A place name, so it is transliterated rather than translated, following
    the translation philosophy for names. The hyphen reflects standard English convention
    for this toponym.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: חנה in wilderness-travel narratives means to pitch camp or encamp. 'Camped'
    is the clearer modern-English equivalent, while preserving the concrete sense.
- source_word: בְמִדְבַּר צִן
  chosen: in the wilderness of Zin
  alternatives:
  - in the desert of Zin
  lexicon: HALOT
  rationale: מִדְבָּר can be rendered 'wilderness' or 'desert.' 'Wilderness' is preferred
    here because it is the established biblical-geographical term and does not over-specify
    terrain beyond the Hebrew.
- source_word: הִוא
  chosen: that is
  alternatives:
  - which is
  - it is
  lexicon: HALOT
  rationale: The pronoun functions appositionally, identifying the preceding location
    with Kadesh. 'That is' communicates the explanatory force idiomatically in English.
- source_word: קָדֵשׁ
  chosen: Kadesh
  lexicon: HALOT
  rationale: A place name, so it is transliterated. The appositional clause identifies
    the wilderness location more specifically as Kadesh.
