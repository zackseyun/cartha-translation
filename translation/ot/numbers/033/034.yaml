id: NUM.33.34
reference: Numbers 33:34
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/יָּטְבָ֑תָה וַֽ/יַּחֲנ֖וּ בְּ/עַבְרֹנָֽה׃
translation:
  text: They set out from Jotbathah and camped at Abronah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic sense is
    departure from one station. 'Set out' is natural modern English and preserves
    the movement nuance better than the more formal 'journeyed' in this brief stage
    notice.
- source_word: מִיָּטְבָתָה
  chosen: from Jotbathah
  alternatives:
  - from Yotbathah
  lexicon: HALOT
  rationale: The prefixed preposition מִן is rendered 'from.' The place name is transliterated
    rather than translated, following the project principle to transliterate names.
    'Jotbathah' follows common English biblical convention.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה in itinerary contexts, the sense is making camp at the next
    location. 'Camped' is clear modern English; 'encamped' is possible but more archaic.
- source_word: בְּעַבְרֹנָה
  chosen: at Abronah
  alternatives:
  - in Abronah
  lexicon: HALOT
  rationale: The prefixed ב is locative. In English itinerary style, 'at Abronah'
    is the most natural rendering for a campsite location. The name is transliterated
    per translation policy.
