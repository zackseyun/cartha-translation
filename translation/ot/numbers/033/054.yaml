id: NUM.33.54
reference: Numbers 33:54
source:
  edition: WLC
  text: וְ/הִתְנַחַלְתֶּם֩ אֶת הָ/אָ֨רֶץ בְּ/גוֹרָ֜ל לְ/מִשְׁפְּחֹֽתֵי/כֶ֗ם לָ/רַ֞ב
    תַּרְבּ֤וּ אֶת נַחֲלָת/וֹ֙ וְ/לַ/מְעַט֙ תַּמְעִ֣יט אֶת נַחֲלָת֔/וֹ אֶל֩ אֲשֶׁר
    יֵ֨צֵא ל֥/וֹ שָׁ֛מָּ/ה הַ/גּוֹרָ֖ל ל֣/וֹ יִהְיֶ֑ה לְ/מַטּ֥וֹת אֲבֹתֵי/כֶ֖ם תִּתְנֶחָֽלוּ־־־־׃
translation:
  text: You shall apportion the land by lot according to your clans. To the larger
    group you shall increase its inheritance, and to the smaller you shall reduce
    its inheritance. Wherever the lot falls for anyone, that shall be his. You shall
    receive your inheritances according to the tribes of your fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Where the lot comes out for him, there it shall be his.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִתְנַחַלְתֶּם
  chosen: You shall apportion
  alternatives:
  - you shall inherit
  - you shall take possession as an inheritance
  lexicon: HALOT
  rationale: The hitpael of נחל here is used in the context of distributing the land
    among Israel, not merely individually inheriting it. 'Apportion' best captures
    the reflexive/distributive sense in idiomatic English while staying close to the
    land-allotment context.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ/land
  lexicon: HALOT
  rationale: Standard rendering in Numbers for the promised territory; 'land' is the
    natural English equivalent.
- source_word: בְּגוֹרָל
  chosen: by lot
  alternatives:
  - by lottery
  - by casting lots
  lexicon: HALOT
  rationale: גורל refers to allocation by lot. 'By lot' is the conventional and precise
    English rendering.
- source_word: לְמִשְׁפְּחֹתֵיכֶם
  chosen: according to your clans
  alternatives:
  - for your families
  - by your families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal census/allotment contexts is more specific than
    the modern nuclear 'family'; 'clans' better reflects the social unit within tribes.
- source_word: לָרַב
  chosen: To the larger group
  alternatives:
  - to the many
  - to the great
  lexicon: HALOT
  rationale: 'The phrase is comparative in allotment context: the more numerous group
    receives more land. ''Larger group'' makes the sense explicit in natural English.'
- source_word: תַּרְבּוּ אֶת נַחֲלָתוֹ
  chosen: you shall increase its inheritance
  alternatives:
  - you shall make his inheritance larger
  - you shall multiply its allotment
  lexicon: HALOT
  rationale: The hiphil of רבה means to make great/increase. 'Inheritance' is retained
    for נַחֲלָה because it is the standard covenant-land term, though in context it
    refers to allotted territory.
- source_word: וְלַמְעַט
  chosen: and to the smaller
  alternatives:
  - and to the few
  - and to the lesser group
  lexicon: HALOT
  rationale: Counterpart to לָרַב; refers to the less numerous group in the allotment
    process.
- source_word: תַּמְעִיט אֶת נַחֲלָתוֹ
  chosen: you shall reduce its inheritance
  alternatives:
  - you shall make his inheritance smaller
  - you shall diminish its allotment
  lexicon: HALOT
  rationale: The hiphil of מעט means to make small/reduce. 'Reduce its inheritance'
    mirrors the previous clause and preserves the legal-allotment sense.
- source_word: אֶל אֲשֶׁר יֵצֵא לוֹ שָׁמָּה הַגּוֹרָל
  chosen: Wherever the lot falls for anyone
  alternatives:
  - To whatever place the lot comes out for him
  - Where the lot comes out for him
  lexicon: HALOT
  rationale: The idiom 'the lot comes out' is naturally rendered 'the lot falls.'
    'Wherever' captures the directional sense of אֶל אֲשֶׁר ... שָׁמָּה in smooth
    English.
- source_word: לוֹ יִהְיֶה
  chosen: that shall be his
  alternatives:
  - it shall belong to him
  - that shall be for him
  lexicon: HALOT
  rationale: Simple possessive/result clause following the lot assignment. 'That shall
    be his' is concise and idiomatic.
- source_word: לְמַטּוֹת אֲבֹתֵיכֶם
  chosen: according to the tribes of your fathers
  alternatives:
  - by your ancestral tribes
  - according to your fathers' tribes
  lexicon: HALOT
  rationale: מַטּוֹת are tribal divisions; אֲבֹתֵיכֶם marks ancestral/paternal lineage.
    The phrase indicates that allotment is structured by tribal ancestry.
- source_word: תִּתְנֶחָלוּ
  chosen: You shall receive your inheritances
  alternatives:
  - you shall inherit
  - you shall take possession as an inheritance
  lexicon: HALOT
  rationale: A second use of נחל concludes the instruction. 'Receive your inheritances'
    fits the plural tribal/clan allotment context and avoids awkward repetition of
    'inherit' after 'apportion' while preserving the land-as-inheritance theme.
