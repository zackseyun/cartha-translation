theological_decisions:
- issue: Rendering of ירשׁ in a land-promise context
  chosen_reading: take possession of / possess
  alternative_readings:
  - inherit
  rationale: The verse concerns Israel's commanded occupation of the promised land
    on the basis of God's gift. While ירשׁ can carry inheritance overtones, the immediate
    context in Numbers 33 emphasizes dispossession of prior inhabitants and actual
    occupation. Therefore 'possess' is preferred in the main text, with 'inherit'
    preserved as a lexical alternative rather than elevated to the main rendering.
  doctrine_reference: Translation philosophy §1, §5
