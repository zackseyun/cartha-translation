id: NUM.33.53
reference: Numbers 33:53
source:
  edition: WLC
  text: וְ/הוֹרַשְׁתֶּ֥ם אֶת הָ/אָ֖רֶץ וִֽ/ישַׁבְתֶּם בָּ֑/הּ כִּ֥י לָ/כֶ֛ם נָתַ֥תִּי
    אֶת הָ/אָ֖רֶץ לָ/רֶ֥שֶׁת אֹתָֽ/הּ־־־׃
translation:
  text: You shall take possession of the land and live in it, because I have given
    the land to you to possess it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inherit it.' The Hebrew verb ירשׁ can carry the sense of inheriting
      as well as taking possession, especially in covenantal land-promise contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹרַשְׁתֶּם
  chosen: you shall take possession of
  alternatives:
  - you shall dispossess
  - you shall drive out and possess
  - you shall inherit
  lexicon: HALOT
  rationale: From ירשׁ in the Hiphil, the verb can denote causing dispossession and
    thereby taking possession. In this verse the direct object is 'the land,' not
    its inhabitants, so English 'take possession of' best captures the result without
    awkwardly implying the land itself is expelled. 'Inherit' is possible in broader
    covenant contexts but is less precise here than the immediate command to occupy.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: Standard rendering for אֶרֶץ here is 'land,' referring to the promised
    territory. 'Country' is possible but less biblically resonant and less tied to
    covenantal land promise language.
- source_word: וִישַׁבְתֶּם בָּהּ
  chosen: and live in it
  alternatives:
  - and settle in it
  - and dwell in it
  lexicon: HALOT
  rationale: ישׁב commonly means dwell, sit, remain, or settle. 'Live in it' is natural
    modern English and adequately conveys settled habitation. 'Dwell' is more formal;
    'settle' emphasizes establishment but can sound narrower than the broader inhabiting
    sense.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'Because' is clearer in contemporary
    English than 'for' while preserving the causal force.
- source_word: לָכֶם
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition marks the recipients of the divine gift. 'To you' reads
    naturally with 'I have given'; 'for you' is possible but slightly less direct
    in English syntax here.
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I give
  - I gave
  lexicon: HALOT
  rationale: The perfect verb presents the gift as an accomplished divine act grounding
    the command. English present perfect preserves that completed-yet-relevant force
    better than simple past, and better than present 'I give' in this context.
- source_word: לָרֶשֶׁת אֹתָהּ
  chosen: to possess it
  alternatives:
  - to inherit it
  - to take possession of it
  lexicon: HALOT
  rationale: Infinitive of ירשׁ expresses purpose/result of the gift. 'To possess
    it' is concise and matches the covenantal land-possession sense. 'Inherit it'
    is a legitimate alternative in promise contexts, but here 'possess' aligns more
    closely with the immediate command and avoids importing inheritance language where
    the verse stresses occupation.
