id: NUM.33.12
reference: Numbers 33:12
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/מִּדְבַּר סִ֑ין וַֽ/יַּחֲנ֖וּ בְּ/דָפְקָֽה־׃
translation:
  text: They set out from the wilderness of Sin and camped at Dophkah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Sin' is the name of a wilderness region and is unrelated to the
      English word 'sin.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic sense is
    breaking camp and moving on. 'Set out' is natural modern English and preserves
    the narrative sequence better than the more formal 'journeyed.'
- source_word: מִמִּדְבַּר
  chosen: from the wilderness of
  alternatives:
  - from the desert of
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert terrain. 'Wilderness' is
    preferred for consistency with Pentateuchal place designations and common English
    Bible usage in Israel's journey narratives.
- source_word: סִין
  chosen: Sin
  lexicon: HALOT
  rationale: This is a place name, not the common noun 'sin.' Per translation philosophy,
    names are transliterated rather than translated.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה, the standard itinerary verb for making camp. 'Camped' is clear
    modern English; 'encamped' is more formal but not necessary here.
- source_word: בְּדָפְקָה
  chosen: at Dophkah
  alternatives:
  - in Dophkah
  lexicon: HALOT
  rationale: The preposition ב marks location. With a campsite/place name in English
    itinerary style, 'at Dophkah' is the most idiomatic rendering. The name is transliterated
    as a place name.
