id: NUM.33.55
reference: Numbers 33:55
source:
  edition: WLC
  text: וְ/אִם לֹ֨א תוֹרִ֜ישׁוּ אֶת יֹשְׁבֵ֣י הָ/אָרֶץ֮ מִ/פְּנֵי/כֶם֒ וְ/הָיָה֙ אֲשֶׁ֣ר
    תּוֹתִ֣ירוּ מֵ/הֶ֔ם לְ/שִׂכִּים֙ בְּ/עֵ֣ינֵי/כֶ֔ם וְ/לִ/צְנִינִ֖ם בְּ/צִדֵּי/כֶ֑ם
    וְ/צָרֲר֣וּ אֶתְ/כֶ֔ם עַל הָ/אָ֕רֶץ אֲשֶׁ֥ר אַתֶּ֖ם יֹשְׁבִ֥ים בָּֽ/הּ־־־׃
translation:
  text: But if you do not drive out the inhabitants of the land from before you, then
    those whom you let remain from among them will become barbs in your eyes and thorns
    in your sides, and they will harass you in the land where you are living.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pricks in your eyes' for 'barbs in your eyes.' The Hebrew noun is rare
      and denotes something sharp that pierces.
    reason: lexical_alternative
  - marker: b
    text: Or 'thorns in your sides' / 'hooks in your sides.' The paired images both
      describe persistent, painful affliction from the remaining inhabitants.
    reason: lexical_alternative
  - marker: c
    text: Or 'they will trouble you' or 'they will oppress you.' The Hebrew verb can
      cover a range of hostile affliction.
    reason: lexical_alternative
lexical_decisions:
- source_word: תוֹרִישׁוּ
  chosen: drive out
  alternatives:
  - dispossess
  - expel
  lexicon: HALOT
  rationale: The Hiphil of ירשׁ here means to cause the current inhabitants to lose
    possession / be removed from the land. 'Drive out' is idiomatic modern English
    and fits the military-settlement context better than the more technical 'dispossess,'
    while preserving the force of removal.
- source_word: יֹשְׁבֵי הָאָרֶץ
  chosen: the inhabitants of the land
  alternatives:
  - those dwelling in the land
  - the residents of the land
  lexicon: HALOT
  rationale: A straightforward rendering of the participial construction. 'Inhabitants'
    is natural and suitably formal for this warning context.
- source_word: מִפְּנֵיכֶם
  chosen: from before you
  alternatives:
  - from your presence
  - before you
  lexicon: HALOT
  rationale: The idiom literally means 'from before you.' Retaining it preserves the
    Hebrew spatial sense of removal in the face of Israel's advance, while remaining
    intelligible in English.
- source_word: תּוֹתִירוּ
  chosen: you let remain
  alternatives:
  - you leave
  - you spare
  lexicon: HALOT
  rationale: The Hiphil of יתר means to leave over / leave remaining. 'Let remain'
    captures the causative nuance better than simply 'leave.' 'Spare' is possible
    in context but adds a mercy nuance not explicit in the verb itself.
- source_word: לְשִׂכִּים
  chosen: barbs
  alternatives:
  - pricks
  - thorns
  lexicon: HALOT
  rationale: This rare noun denotes something sharp that pierces. Because the next
    term also uses thorn imagery, rendering this as 'barbs' preserves the distinction
    between the paired metaphors while keeping the painful sense.
- source_word: בְּעֵינֵיכֶם
  chosen: in your eyes
  alternatives:
  - in your eyesight
  lexicon: HALOT
  rationale: A literal rendering is clear and preserves the vivid bodily metaphor.
- source_word: לִצְנִינִם
  chosen: thorns
  alternatives:
  - hooks
  - pricks
  lexicon: HALOT
  rationale: This noun refers to sharp, piercing objects and is often rendered with
    thorn-language. 'Thorns' is idiomatic in the collocation with 'in your sides'
    and preserves the metaphor's force.
- source_word: בְּצִדֵּיכֶם
  chosen: in your sides
  alternatives:
  - at your sides
  - in your flanks
  lexicon: HALOT
  rationale: '''Sides'' is the most natural and traditional rendering of the body-part
    metaphor; ''flanks'' is possible but less natural in contemporary Bible English.'
- source_word: וְצָרֲרוּ
  chosen: they will harass you
  alternatives:
  - they will trouble you
  - they will oppress you
  lexicon: HALOT
  rationale: The verb צרר can denote showing hostility, harassing, or causing distress.
    'Harass' fits the ongoing nuisance and affliction implied by the preceding metaphors
    without overstating to full-scale oppression.
- source_word: עַל הָאָרֶץ אֲשֶׁר אַתֶּם יֹשְׁבִים בָּהּ
  chosen: in the land where you are living
  alternatives:
  - upon the land in which you dwell
  - in the land where you live
  lexicon: HALOT
  rationale: Although עַל is literally 'upon/on,' English idiom prefers 'in the land.'
    'Where you are living' reflects the participial sense and keeps the warning immediate.
