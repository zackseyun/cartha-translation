id: NUM.33.17
reference: Numbers 33:17
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/קִּבְרֹ֣ת הַֽתַּאֲוָ֑ה וַֽ/יַּחֲנ֖וּ בַּ/חֲצֵרֹֽת׃
translation:
  text: They set out from Kibroth-hattaavah and camped at Hazeroth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kibroth-hattaavah likely means 'Graves of Craving' or 'Graves of Lust.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic sense is
    departure from one station. 'Set out' is natural modern English and preserves
    the travel-sequence formula better than the more formal 'journeyed.'
- source_word: מִקִּבְרֹת הַתַּאֲוָה
  chosen: from Kibroth-hattaavah
  alternatives:
  - from Kibroth Hattaavah
  - from the Graves of Craving
  - from the Graves of Lust
  lexicon: HALOT
  rationale: This is a place name, so per translation philosophy personal/place names
    are transliterated rather than translated. The prefixed מִן is rendered by 'from.'
    A lexical translation of the name is possible but is better preserved in a footnote
    rather than replacing the toponym in the main text.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה in itinerary contexts, 'camped' is the most readable modern
    English equivalent. 'Encamped' is more formal but adds no needed precision here.
- source_word: בַּחֲצֵרֹת
  chosen: at Hazeroth
  alternatives:
  - in Hazeroth
  lexicon: HALOT
  rationale: This is another place name and is therefore transliterated. The preposition
    ב in travel notices is naturally rendered 'at' for arrival/camping at a location
    in English.
