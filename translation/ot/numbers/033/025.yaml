id: NUM.33.25
reference: Numbers 33:25
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵ/חֲרָדָ֑ה וַֽ/יַּחֲנ֖וּ בְּ/מַקְהֵלֹֽת׃
translation:
  text: They set out from Haradah and camped at Makheloth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They journeyed from Haradah and encamped at Makheloth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the sense is departure
    from a campsite. 'Set out' is natural modern English and preserves the movement
    nuance better than the more generic 'journeyed.'
- source_word: מֵחֲרָדָה
  chosen: from Haradah
  lexicon: HALOT
  rationale: The prefixed מֵ marks separation/source, so 'from Haradah.' Haradah is
    a place name and is therefore transliterated rather than translated, in keeping
    with the translation philosophy for names.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה in itinerary contexts, the standard sense is to pitch camp or
    encamp. 'Camped' is preferred as readable modern English; 'encamped' is more formal
    but not necessary here.
- source_word: בְּמַקְהֵלֹת
  chosen: at Makheloth
  alternatives:
  - in Makheloth
  lexicon: HALOT
  rationale: The preposition בְ in travel notices with place names is commonly rendered
    'at' for campsite location in English. Makheloth is a place name and is transliterated
    rather than translated.
