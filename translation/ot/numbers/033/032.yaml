id: NUM.33.32
reference: Numbers 33:32
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/בְּנֵ֣י יַעֲקָ֑ן וַֽ/יַּחֲנ֖וּ בְּ/חֹ֥ר הַגִּדְגָּֽד׃
translation:
  text: They set out from Bene-jaakan and camped at Hor-haggidgad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Bene-jaakan is likely a place name, though the form literally means
      'sons of Jaakan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic sense is
    departure from one station. 'Set out' is natural modern English and preserves
    the travel-sequence formula.
- source_word: מִבְּנֵי יַעֲקָן
  chosen: from Bene-jaakan
  alternatives:
  - from the sons of Jaakan
  - from Bene-yaakan
  lexicon: HALOT
  rationale: This is a place name in the itinerary, corresponding to Beeroth Bene-jaakan
    in Deut 10:6. Although the form literally contains 'sons of Jaakan,' here it functions
    as a toponym, so transliteration is preferable to a literal rendering.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה in the standard itinerary formula for making camp. 'Camped'
    is clear modern English; 'encamped' is more formal but less natural.
- source_word: בְּחֹר הַגִּדְגָּד
  chosen: at Hor-haggidgad
  alternatives:
  - at Hor Hagidgad
  - at Ḥor-haggidgad
  lexicon: HALOT
  rationale: A place name, so transliteration is preferred. The preposition ב marks
    location, best rendered 'at.' The article on הַגִּדְגָּד is retained within the
    conventional transliterated compound form 'haggidgad.'
