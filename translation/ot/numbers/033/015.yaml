id: NUM.33.15
reference: Numbers 33:15
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵ/רְפִידִ֑ם וַֽ/יַּחֲנ֖וּ בְּ/מִדְבַּ֥ר סִינָֽי׃
translation:
  text: They set out from Rephidim and camped in the wilderness of Sinai.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the itinerary formula, the sense is departure from one stage
    of travel. 'Set out' is natural modern English and preserves the movement implied
    by the verb better than the more formal 'journeyed.'
- source_word: מֵרְפִידִם
  chosen: from Rephidim
  lexicon: HALOT
  rationale: The prefixed preposition מ marks source/origin. 'Rephidim' is a place
    name and is therefore transliterated rather than translated, in keeping with the
    translation philosophy.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה, the standard sense in wilderness itinerary contexts is to pitch
    camp or camp. 'Camped' is preferred over 'encamped' for readable modern English
    while preserving the concrete action.
- source_word: בְּמִדְבַּר סִינָי
  chosen: in the wilderness of Sinai
  alternatives:
  - in the desert of Sinai
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert terrain. 'Wilderness' is
    preferred because it is the conventional and contextually fitting rendering in
    the Pentateuch, and it avoids over-specifying aridity. The construct relationship
    is represented by 'of Sinai.' 'Sinai' is transliterated as a place name.
