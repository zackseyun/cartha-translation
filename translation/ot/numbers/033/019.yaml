id: NUM.33.19
reference: Numbers 33:19
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵ/רִתְמָ֑ה וַֽ/יַּחֲנ֖וּ בְּ/רִמֹּ֥ן פָּֽרֶץ׃
translation:
  text: They set out from Rithmah and camped at Rimmon-perez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They journeyed from Rithmah and encamped at Rimmon-perez.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic sense is
    breaking camp and moving on. 'Set out' is natural modern English and preserves
    the travel-sequence formula better than the more formal 'journeyed.'
- source_word: מֵרִתְמָה
  chosen: from Rithmah
  lexicon: HALOT
  rationale: The prefixed preposition מִן marks source/origin, rendered 'from.' The
    place name is transliterated as 'Rithmah' in keeping with the philosophy of transliterating
    names rather than translating them.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה, the standard itinerary verb for making camp. 'Camped' is clear
    modern English; 'encamped' is possible but less natural and slightly archaic.
- source_word: בְּרִמֹּן פָּרֶץ
  chosen: at Rimmon-perez
  alternatives:
  - in Rimmon-perez
  lexicon: HALOT
  rationale: The preposition ב marks location here; 'at' fits an itinerary stop in
    English better than 'in.' The compound place name is transliterated and hyphenated
    to reflect the two-part Hebrew name while treating it as a single toponym.
