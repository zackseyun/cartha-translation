id: NUM.33.47
reference: Numbers 33:47
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵ/עַלְמֹ֣ן דִּבְלָתָ֑יְמָ/ה וַֽ/יַּחֲנ֛וּ בְּ/הָרֵ֥י הָ/עֲבָרִ֖ים
    לִ/פְנֵ֥י נְבֽוֹ׃
translation:
  text: They set out from Almon-diblathaim and camped in the mountains of Abarim,
    before Nebo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'opposite Nebo' or 'in front of Nebo.' The Hebrew preposition indicates
      spatial relation without specifying the exact English nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the itinerary formula of Numbers 33, the idiomatic sense
    is breaking camp and moving on. 'Set out' is natural modern English and preserves
    the travel-sequence formula.
- source_word: מֵעַלְמֹן דִּבְלָתָיְמָה
  chosen: from Almon-diblathaim
  alternatives:
  - from Almon Diblathaim
  lexicon: HALOT
  rationale: A place name, so transliterated rather than translated per project philosophy.
    The maqqef-like connection in English is represented with a hyphen to signal the
    single toponym commonly treated as one location.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה, the standard itinerary verb for making camp. 'Camped' is readable
    modern English; 'encamped' is more formal but less natural.
- source_word: בְּהָרֵי
  chosen: in the mountains of
  alternatives:
  - in the hill country of
  - on the mountains of
  lexicon: HALOT
  rationale: Plural construct of הַר. 'Mountains of' is the most straightforward rendering.
    'In' fits the sense of camping within a mountainous region better than a strictly
    topographical 'on' in English.
- source_word: הָעֲבָרִים
  chosen: Abarim
  alternatives:
  - the Abarim range
  - the regions beyond
  lexicon: HALOT
  rationale: A proper place name here, so transliterated. Although the root relates
    to 'regions beyond,' in this context it functions as the established geographical
    name.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - opposite
  - east of
  - in front of
  lexicon: HALOT
  rationale: The preposition literally means 'before/in front of.' 'Before' preserves
    the spatial relation without over-interpreting the exact orientation. More specific
    options like 'east of' would import geographical precision not explicit in the
    term itself.
- source_word: נְבוֹ
  chosen: Nebo
  lexicon: HALOT
  rationale: Proper place name, transliterated. In this context it likely refers to
    the well-known location associated with the mountain/region of Nebo.
