id: NUM.33.48
reference: Numbers 33:48
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מֵ/הָרֵ֣י הָ/עֲבָרִ֑ים וַֽ/יַּחֲנוּ֙ בְּ/עַֽרְבֹ֣ת מוֹאָ֔ב עַ֖ל
    יַרְדֵּ֥ן יְרֵחֽוֹ׃
translation:
  text: They set out from the mountains of Abarim and camped in the plains of Moab
    by the Jordan at Jericho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the steppes of Moab.' The Hebrew term can denote steppe-land or plains.
    reason: lexical_alternative
  - marker: b
    text: Or 'by the Jordan opposite Jericho.' Some translations take the final phrase
      more specifically as indicating the area across from Jericho.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: The verb נסע in itinerary contexts commonly denotes breaking camp and
    moving on to the next stage. 'Set out' is natural modern English and preserves
    the travel-sequence sense better than the more generic 'journeyed.'
- source_word: מֵהָרֵי הָעֲבָרִים
  chosen: from the mountains of Abarim
  alternatives:
  - from the hill country of Abarim
  - from the mountains of the Abarim range
  lexicon: HALOT
  rationale: הָרֵי is the construct plural of 'mountains/hills.' 'Mountains of Abarim'
    is the most straightforward rendering of the place name phrase and fits the geographical
    itinerary style of Numbers 33. 'Abarim' is transliterated as a proper name per
    translation philosophy.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: חנה in wilderness itinerary formulas means to pitch camp. 'Camped' is
    readable modern English while remaining faithful; 'encamped' is accurate but slightly
    more archaic.
- source_word: בְּעַרְבֹת מוֹאָב
  chosen: in the plains of Moab
  alternatives:
  - in the steppes of Moab
  - in the desert plains of Moab
  lexicon: HALOT
  rationale: עַרְבֹת refers to steppe/plains terrain. 'Plains' is the standard and
    accessible English rendering in this geographical context. 'Moab' is transliterated
    as the proper name.
- source_word: עַל יַרְדֵּן יְרֵחוֹ
  chosen: by the Jordan at Jericho
  alternatives:
  - along the Jordan opposite Jericho
  - by the Jordan of Jericho
  lexicon: HALOT
  rationale: עַל with a waterway and nearby place can indicate location by/alongside.
    'By the Jordan at Jericho' gives clear English sense and reflects the camp's location
    near the Jordan in the Jericho area. 'Opposite Jericho' is possible in some contexts,
    but this verse does not explicitly include a term meaning 'opposite'.
