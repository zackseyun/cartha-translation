id: NUM.33.29
reference: Numbers 33:29
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/מִּתְקָ֑ה וַֽ/יַּחֲנ֖וּ בְּ/חַשְׁמֹנָֽה׃
translation:
  text: They set out from Mithkah and camped at Hashmonah.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: They set out
  alternatives:
  - They journeyed
  - They departed
  lexicon: HALOT
  rationale: From נסע in the wilderness itinerary formula, the idiomatic sense is
    departure from one station to another. 'Set out' is natural modern English and
    preserves the movement sense better than the more formal 'journeyed.'
- source_word: מִמִּתְקָה
  chosen: from Mithkah
  lexicon: HALOT
  rationale: The prefixed preposition מִן is rendered 'from.' מִתְקָה is a place name,
    so it is transliterated rather than translated, in keeping with the policy to
    transliterate names.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  lexicon: HALOT
  rationale: From חנה, the standard itinerary verb for making camp. 'Camped' is clear
    modern English; 'encamped' is more formal but not necessary here.
- source_word: בְּחַשְׁמֹנָה
  chosen: at Hashmonah
  alternatives:
  - in Hashmonah
  lexicon: HALOT
  rationale: The preposition בְּ with a campsite location in itinerary contexts is
    naturally rendered 'at.' חַשְׁמֹנָה is a place name and is therefore transliterated
    as 'Hashmonah.'
