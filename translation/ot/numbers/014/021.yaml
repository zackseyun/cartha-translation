theological_decisions:
- issue: Scope of הָאָרֶץ
  chosen_reading: universal scope ('all the earth')
  alternative_readings:
  - local scope ('all the land')
  rationale: Although אֶרֶץ can mean either 'land' or 'earth,' the oath formula and the statement about the LORD's glory favor a universal declaration rather than a merely territorial one. This preserves the grandeur of the claim without importing later doctrinal formulations.
