id: NUM.14.21
reference: Numbers 14:21
source:
  edition: WLC
  text: וְ/אוּלָ֖ם חַי אָ֑נִי וְ/יִמָּלֵ֥א כְבוֹד יְהוָ֖ה אֶת כָּל הָ/אָֽרֶץ־־־־׃
translation:
  text: But as I live, the glory of Yahweh will fill all the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole land,' if taken with a more local sense of Hebrew אֶרֶץ.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אוּלָם
  chosen: But
  alternatives:
  - Nevertheless
  - Yet
  - However
  lexicon: HALOT
  rationale: Introduces a strong adversative or emphatic contrast with what precedes. 'But' is the most natural modern English rendering here and preserves the force without sounding overly formal.
- source_word: חַי אָ֑נִי
  chosen: as I live
  alternatives:
  - I live
  - by my life
  lexicon: HALOT
  rationale: This is the idiomatic divine oath formula 'as I live.' Rendering it idiomatically in English preserves both the solemnity and the oath-like force better than the more wooden 'I live.'
- source_word: וְ/יִמָּלֵ֥א
  chosen: will fill
  alternatives:
  - shall be filled
  - will be filled with
  lexicon: HALOT
  rationale: The Niphal of מלא can be rendered either as passive ('will be filled') or in an intransitive/resultative sense. With 'the glory of the LORD' as the grammatical subject in Hebrew, 'will fill' gives clear, natural English and conveys the sense that the LORD's glory comes to pervade the whole earth.
- source_word: כְבוֹד
  chosen: glory
  alternatives:
  - honor
  - majesty
  lexicon: HALOT
  rationale: '''Glory'' is the standard and most theologically appropriate rendering for כָּבוֹד in reference to the LORD, preserving the weight of divine presence and renown.'
- source_word: יְהוָ֖ה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is 'the LORD,' following established reverential convention and the Septuagintal pattern.
- source_word: אֶת כָּל הָ/אָֽרֶץ
  chosen: all the earth
  alternatives:
  - the whole earth
  - all the land
  lexicon: HALOT
  rationale: In this context, the scope is universal rather than local, so 'earth' is preferable to 'land.' 'All the earth' is idiomatic and preserves the comprehensive extent of the statement.
