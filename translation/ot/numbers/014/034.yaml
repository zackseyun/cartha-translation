id: NUM.14.34
reference: Numbers 14:34
source:
  edition: WLC
  text: בְּ/מִסְפַּ֨ר הַ/יָּמִ֜ים אֲשֶׁר תַּרְתֶּ֣ם אֶת הָ/אָרֶץ֮ אַרְבָּעִ֣ים יוֹם֒
    י֣וֹם לַ/שָּׁנָ֞ה י֣וֹם לַ/שָּׁנָ֗ה תִּשְׂאוּ֙ אֶת עֲוֺנֹ֣תֵי/כֶ֔ם אַרְבָּעִ֖ים
    שָׁנָ֑ה וִֽ/ידַעְתֶּ֖ם אֶת תְּנוּאָתִֽ/י־־־־׃
translation:
  text: According to the number of the days in which you spied out the land, forty
    days, a day for a year, a day for a year, you shall bear your iniquities forty
    years, and you shall know my opposition.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my alienation,' 'my hostility,' or 'my displeasure.' Traditional English
      versions often have 'my breach of promise,' but the Hebrew term likely refers
      to the LORD's opposition or estrangement toward this rebellious generation rather
      than any failure on God's part.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמִסְפַּר הַיָּמִים
  chosen: According to the number of the days
  alternatives:
  - By the number of the days
  - In proportion to the number of the days
  lexicon: HALOT
  rationale: ב + מִסְפָּר expresses correspondence or proportion. 'According to the
    number of the days' preserves the formal linkage between the duration of spying
    and the duration of punishment while remaining natural English.
- source_word: תַּרְתֶּם
  chosen: you spied out
  alternatives:
  - you explored
  - you surveyed
  lexicon: HALOT
  rationale: The verb from תור in this context refers specifically to the reconnaissance
    mission into Canaan. 'Spied out' is the established and contextually precise rendering,
    stronger than the more neutral 'explored.'
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Numbers, הָאָרֶץ commonly refers to the promised land. 'The land'
    is both idiomatic and contextually specific without over-explicating.
- source_word: אַרְבָּעִים יוֹם
  chosen: forty days
  lexicon: HALOT
  rationale: Straightforward numeral plus noun construction.
- source_word: יוֹם לַשָּׁנָה יוֹם לַשָּׁנָה
  chosen: a day for a year, a day for a year
  alternatives:
  - a day for each year
  - one day for each year
  lexicon: HALOT
  rationale: The repetition is emphatic in Hebrew and should be preserved in English
    rather than collapsed. It explains the symbolic correspondence between the forty
    days and forty years.
- source_word: תִּשְׂאוּ אֶת עֲוֺנֹתֵיכֶם
  chosen: you shall bear your iniquities
  alternatives:
  - you shall bear your guilt
  - you shall suffer for your iniquities
  lexicon: HALOT
  rationale: נשא עון is a weighty idiom meaning to bear guilt/iniquity and its consequences.
    'Bear your iniquities' keeps the concrete and moral force of the Hebrew; 'suffer
    for' is interpretive and less direct.
- source_word: אַרְבָּעִים שָׁנָה
  chosen: forty years
  lexicon: HALOT
  rationale: Direct rendering of the time period of judgment.
- source_word: וִידַעְתֶּם
  chosen: and you shall know
  alternatives:
  - then you shall know
  - and you will experience
  lexicon: HALOT
  rationale: ידע includes experiential knowledge, but 'know' is broad enough to preserve
    both cognition and experience without interpretive expansion.
- source_word: תְּנוּאָתִי
  chosen: my opposition
  alternatives:
  - my alienation
  - my hostility
  - my displeasure
  - my breach of promise
  lexicon: HALOT
  rationale: This rare noun has been understood as denoting opposition, estrangement,
    or frustrated relation. 'My opposition' best fits the immediate judgment context
    and avoids the misleading traditional rendering 'breach of promise,' since the
    text speaks of God's judicial stance toward the rebellious generation, not divine
    unfaithfulness.
