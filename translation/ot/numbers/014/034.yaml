theological_decisions:
- issue: Rendering of תְּנוּאָתִי in a theologically sensitive context
  chosen_reading: my opposition
  alternative_readings:
  - my alienation
  - my hostility
  - my displeasure
  - my breach of promise
  rationale: The traditional 'breach of promise' can wrongly suggest that God is unfaithful
    to his word, which conflicts with the broader canonical portrayal and is not required
    by the Hebrew. The rare noun more naturally conveys estrangement or opposition
    in response to Israel's rebellion. 'My opposition' preserves the severity of divine
    judgment without implying divine covenant unfaithfulness.
  doctrine_reference: Translation philosophy §1, §3
