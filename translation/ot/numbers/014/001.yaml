id: NUM.14.1
reference: Numbers 14:1
source:
  edition: WLC
  text: וַ/תִּשָּׂא֙ כָּל הָ֣/עֵדָ֔ה וַֽ/יִּתְּנ֖וּ אֶת קוֹלָ֑/ם וַ/יִּבְכּ֥וּ הָ/עָ֖ם
    בַּ/לַּ֥יְלָה הַ/הֽוּא־־׃
translation:
  text: Then all the congregation raised their voice and cried out, and the people
    wept that night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'raised [it] up ... and gave their voice,' an idiom for
      a loud communal outcry.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשָּׂא
  chosen: raised
  alternatives:
  - lifted up
  lexicon: HALOT
  rationale: From נָשָׂא, literally 'lift/carry.' In the idiom with 'voice,' English
    'raised' is natural while preserving the image better than a looser paraphrase.
- source_word: כָּל הָעֵדָה
  chosen: all the congregation
  alternatives:
  - the whole congregation
  - all the assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled community of Israel. 'Congregation'
    is a standard and contextually fitting rendering here; 'all' preserves כָּל.
- source_word: וַיִּתְּנוּ אֶת־קוֹלָם
  chosen: cried out
  alternatives:
  - gave their voice
  - raised their voices
  lexicon: HALOT
  rationale: Literally 'gave their voice.' In Hebrew this idiom means to utter a loud
    cry. 'Cried out' communicates the sense in clear modern English without unnecessary
    literalism. The singular suffix on 'voice' is distributive/collective in English.
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: Straightforward rendering of עָם. Though it overlaps referentially with
    'the congregation,' retaining 'the people' reflects the Hebrew variation rather
    than flattening it.
- source_word: וַיִּבְכּוּ
  chosen: wept
  alternatives:
  - cried
  - wept bitterly
  lexicon: HALOT
  rationale: בכה means 'weep/cry.' 'Wept' distinguishes this verb from the earlier
    loud outcry and preserves the emotional nuance.
- source_word: בַּלַּיְלָה הַהוּא
  chosen: that night
  alternatives:
  - in that night
  - during that night
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the temporal phrase 'in/on that night.'
    'That night' is concise and natural.
