theological_decisions:
- issue: Rendering of anthropological idiom with masculine noun
  chosen_reading: as one man
  alternative_readings:
  - all at once
  - as a single person
  rationale: The Hebrew idiom uses masculine singular אִישׁ. Per translation philosophy,
    gender-accurate rendering is preferred where it matches source intent. Here the
    phrase is idiomatic rather than a statement about male persons specifically, but
    'as one man' is a standard, intelligible equivalent that preserves the Hebrew
    form and rhetorical force.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
