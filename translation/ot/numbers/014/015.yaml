id: NUM.14.15
reference: Numbers 14:15
source:
  edition: WLC
  text: וְ/הֵמַתָּ֛ה אֶת הָ/עָ֥ם הַ/זֶּ֖ה כְּ/אִ֣ישׁ אֶחָ֑ד וְ/אָֽמְרוּ֙ הַ/גּוֹיִ֔ם
    אֲשֶׁר שָׁמְע֥וּ אֶֽת שִׁמְעֲ/ךָ֖ לֵ/אמֹֽר־־־׃
translation:
  text: And if you kill this people as one man, then the nations that have heard of
    your fame will say,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'as one man,' an idiom meaning the whole people together or all at
      once.
    reason: lexical_alternative
  - marker: b
    text: Or 'that have heard the report about you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵמַתָּה
  chosen: And if you kill
  alternatives:
  - And you kill
  - And when you put to death
  lexicon: HALOT
  rationale: Hiphil of מות means 'cause to die/kill.' In context Moses is speaking
    conditionally to the LORD, continued from the prior verse, so English supplies
    'if' for natural sense even though the conjunction is simply waw.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this people group
  - this nation
  lexicon: HALOT
  rationale: עָם is 'people' here, referring to Israel collectively. 'This people'
    preserves the demonstrative force and the covenantal/corporate reference better
    than 'this nation' in this immediate context.
- source_word: כְּאִישׁ אֶחָד
  chosen: as one man
  alternatives:
  - all at once
  - as a single man
  lexicon: HALOT
  rationale: The idiom literally means 'as one man,' conveying totality/unity of fate.
    The more dynamic sense is that the whole people would be struck down together.
    The literal idiom is retained in the main text because it is intelligible in English
    and preserves the source texture.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: גּוֹיִם in the Hebrew Bible commonly means 'nations' in contrast to Israel.
    'Gentiles' would import later Jewish/NT associations not required here.
- source_word: אֲשֶׁר שָׁמְעוּ אֶת שִׁמְעֲךָ
  chosen: that have heard of your fame
  alternatives:
  - that have heard your report
  - that have heard the report about you
  lexicon: HALOT
  rationale: שֵׁמַע can denote 'report, news, fame.' In this context of surrounding
    nations hearing about the LORD's acts and reputation, 'your fame' is idiomatic
    and captures the sense of heard renown. A more formal 'your report' is possible
    but less natural in modern English.
- source_word: לֵאמֹר
  chosen: will say,
  alternatives:
  - saying,
  lexicon: HALOT
  rationale: The infinitive introduces the content of the nations' speech in the next
    verse. English renders it naturally with 'will say,' followed by a comma anticipating
    the quotation.
