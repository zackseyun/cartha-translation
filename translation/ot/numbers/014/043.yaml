id: NUM.14.43
reference: Numbers 14:43
source:
  edition: WLC
  text: כִּי֩ הָ/עֲמָלֵקִ֨י וְ/הַ/כְּנַעֲנִ֥י שָׁם֙ לִ/פְנֵי/כֶ֔ם וּ/נְפַלְתֶּ֖ם בֶּ/חָ֑רֶב כִּֽי עַל כֵּ֤ן שַׁבְתֶּם֙ מֵ/אַחֲרֵ֣י יְהוָ֔ה וְ/לֹא יִהְיֶ֥ה יְהוָ֖ה עִמָּ/כֶֽם־־־׃
translation:
  text: For the Amalekites and the Canaanites are there before you, and you will fall by the sword, because you have turned back from following Yahweh, and Yahweh will not be with you.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the warning in the previous verse; 'for' fits the explanatory force at the head of the sentence.
- source_word: הָעֲמָלֵקִי
  chosen: the Amalekites
  alternatives:
  - the Amalekite
  lexicon: HALOT
  rationale: Though morphologically singular collective, in English the people group is most naturally rendered as a plural ethnonym.
- source_word: וְהַכְּנַעֲנִי
  chosen: and the Canaanites
  alternatives:
  - and the Canaanite
  lexicon: HALOT
  rationale: Like 'Amalekite,' this singular form functions collectively for the people group; English idiom prefers the plural ethnonym.
- source_word: שָׁם לִפְנֵיכֶם
  chosen: are there before you
  alternatives:
  - are there in front of you
  - are there ahead of you
  lexicon: HALOT
  rationale: Combines the locative 'there' with the relational phrase 'before you'; this preserves the spatial sense without awkwardness.
- source_word: וּנְפַלְתֶּם
  chosen: and you will fall
  alternatives:
  - and you will be struck down
  lexicon: HALOT
  rationale: The verb נפל commonly means 'fall'; in battle context it implies defeat or death, which is then specified by 'by the sword.'
- source_word: בֶּחָרֶב
  chosen: by the sword
  alternatives:
  - by sword
  - with the sword
  lexicon: HALOT
  rationale: Standard idiomatic English for death in battle caused by armed violence; preserves the instrumental sense.
- source_word: כִּי עַל כֵּן
  chosen: because
  alternatives:
  - for therefore
  - because for this reason
  lexicon: HALOT
  rationale: The phrase gives the causal ground for the coming defeat. A compressed English 'because' communicates the force naturally, while the reason itself is spelled out in the following clause.
- source_word: שַׁבְתֶּם מֵאַחֲרֵי יְהוָה
  chosen: you have turned back from following the LORD
  alternatives:
  - you have turned away from the LORD
  - you have turned back from after the LORD
  lexicon: HALOT
  rationale: שׁוּב with מֵאַחֲרֵי literally means turning back from behind/following. 'From following the LORD' preserves the discipleship/covenant-following imagery better than the flatter 'turned away from the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְלֹא יִהְיֶה יְהוָה עִמָּכֶם
  chosen: and the LORD will not be with you
  alternatives:
  - and the LORD shall not be with you
  lexicon: HALOT
  rationale: Future sense is straightforward. 'Be with you' preserves the covenantal presence motif without embellishment.
