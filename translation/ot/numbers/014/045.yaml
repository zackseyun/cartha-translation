id: NUM.14.45
reference: Numbers 14:45
source:
  edition: WLC
  text: וַ/יֵּ֤רֶד הָ/עֲמָלֵקִי֙ וְ/הַֽ/כְּנַעֲנִ֔י הַ/יֹּשֵׁ֖ב בָּ/הָ֣ר הַ/ה֑וּא
    וַ/יַּכּ֥וּ/ם וַֽ/יַּכְּת֖וּ/ם עַד הַֽ/חָרְמָֽה־׃פ
translation:
  text: Then the Amalekites and the Canaanites who lived in that hill country came
    down and struck them and beat them down as far as Hormah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hormah is a place name; the Hebrew name is related to a word for 'destruction'
      or 'devotion to destruction.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּרֶד
  chosen: came down
  alternatives:
  - went down
  - descended
  lexicon: HALOT
  rationale: The singular verb precedes a compound subject ('the Amalekites and the
    Canaanites'), a common Hebrew construction. In context it describes a downward
    military movement from the hill country; 'came down' is natural English and preserves
    the directional sense.
- source_word: הָעֲמָלֵקִי
  chosen: the Amalekites
  alternatives:
  - the Amalekite
  lexicon: HALOT
  rationale: Although morphologically singular, this ethnonym functions collectively
    here, especially with the following coordinated ethnonym and plural subsequent
    verbs. English idiom prefers the plural collective 'the Amalekites'.
- source_word: וְהַכְּנַעֲנִי
  chosen: and the Canaanites
  alternatives:
  - and the Canaanite
  lexicon: HALOT
  rationale: Like 'the Amalekite,' this singular ethnonym is collective in sense.
    The plural English rendering matches the military group reference and the later
    plural verbs.
- source_word: הַיֹּשֵׁב בָּהָר הַהוּא
  chosen: who lived in that hill country
  alternatives:
  - who dwelt in that mountain
  - who inhabited that hill country
  lexicon: HALOT
  rationale: יֹשֵׁב denotes dwelling/inhabiting. הָר can mean 'mountain' or 'hill
    country'; here the reference is regional terrain from which they descend, so 'hill
    country' best fits the military-geographical context and reads naturally in English.
- source_word: וַיַּכּוּם
  chosen: struck them
  alternatives:
  - defeated them
  - attacked them
  lexicon: HALOT
  rationale: נכה is a broad verb meaning strike/smite/defeat. 'Struck them' preserves
    the concrete verbal force without overinterpreting the extent of the defeat, which
    is then intensified by the next verb.
- source_word: וַיַּכְּתוּם
  chosen: beat them down
  alternatives:
  - crushed them
  - routed them
  - cut them down
  lexicon: HALOT
  rationale: כתת/related usage here conveys a more forceful, crushing pursuit after
    the initial blow. 'Beat them down' preserves the vivid military sense and avoids
    sounding either too weak ('pursued') or too interpretive ('annihilated').
- source_word: עַד הַחָרְמָה
  chosen: as far as Hormah
  alternatives:
  - to Hormah
  lexicon: HALOT
  rationale: The preposition עַד marks extent or limit. Since Hormah is a place name
    here, 'as far as Hormah' clearly expresses the limit of the rout.
- source_word: הַחָרְמָה
  chosen: Hormah
  alternatives:
  - Destruction
  lexicon: HALOT
  rationale: Per translation philosophy, personal and place names are transliterated
    rather than translated in the main text. Because the name is semantically associated
    with 'destruction/devotion to destruction,' that lexical background is worth preserving
    in a footnote rather than replacing the toponym in the text.
