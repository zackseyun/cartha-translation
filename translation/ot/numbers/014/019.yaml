theological_decisions:
- issue: Sense of נָשָׂאתָה in Moses' appeal
  chosen_reading: God's prior action is described as bearing with / carrying the people,
    implying patient forbearance that includes forgiveness but is not reduced to it.
  alternative_readings:
  - God has forgiven this people from Egypt until now
  rationale: 'Because the direct object is ''this people'' rather than ''their iniquity,''
    the broader sense of bearing/carrying/enduring is preferable. This preserves the
    texture of Moses'' appeal: he asks God to forgive now in a manner consistent with
    God''s long history of sustaining and tolerating Israel since Egypt.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
