id: NUM.14.19
reference: Numbers 14:19
source:
  edition: WLC
  text: סְלַֽח נָ֗א לַ/עֲוֺ֛ן הָ/עָ֥ם הַ/זֶּ֖ה כְּ/גֹ֣דֶל חַסְדֶּ֑/ךָ וְ/כַ/אֲשֶׁ֤ר
    נָשָׂ֨אתָה֙ לָ/עָ֣ם הַ/זֶּ֔ה מִ/מִּצְרַ֖יִם וְ/עַד הֵֽנָּה־־׃
translation:
  text: Please forgive the iniquity of this people according to the greatness of your
    steadfast love, just as you have borne with this people from Egypt until now.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'just as you have forgiven this people from Egypt until now.' The Hebrew
      verb can mean 'carry/bear' and, in some contexts, 'forgive.'
    reason: lexical_alternative
lexical_decisions:
- source_word: סְלַח נָא
  chosen: Please forgive
  alternatives:
  - forgive, please
  - pardon, please
  lexicon: HALOT
  rationale: Imperative of סלח with the particle נָא expresses an earnest plea. 'Please
    forgive' captures both the command/request force and the politeness/urgency of
    נָא in natural modern English.
- source_word: לַעֲוֺן
  chosen: the iniquity
  alternatives:
  - the guilt
  - the wrongdoing
  - the sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequences of guilt. Here
    the object of forgiveness is the people's culpable offense; 'iniquity' preserves
    the moral weight without over-specifying either act or consequence.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: עַם is singular collective. 'This people' is the most direct rendering
    and preserves the covenant-community sense better than 'nation'; 'these people'
    would lose the singular collective form.
- source_word: כְּגֹדֶל חַסְדֶּךָ
  chosen: according to the greatness of your steadfast love
  alternatives:
  - according to your great steadfast love
  - in keeping with the greatness of your covenant love
  - according to the greatness of your mercy
  lexicon: HALOT
  rationale: גֹּדֶל is 'greatness,' and חֶסֶד often denotes loyal, covenantal love/mercy.
    'Steadfast love' is a well-established English rendering that preserves the covenantal
    nuance better than bare 'mercy' or generic 'love'.
- source_word: וְכַאֲשֶׁר
  chosen: just as
  alternatives:
  - and as
  - even as
  lexicon: HALOT
  rationale: The conjunction introduces comparison with God's prior action. 'Just
    as' clearly signals the appeal to precedent in idiomatic English.
- source_word: נָשָׂאתָה
  chosen: you have borne with
  alternatives:
  - you have forgiven
  - you have carried
  - you have borne
  lexicon: HALOT
  rationale: נשא literally means 'to lift/carry/bear' and in contexts with sin can
    mean 'forgive.' Here, because the object is the people rather than their iniquity,
    the sense is that God has carried or endured them. 'Borne with' preserves the
    metaphor and fits the context of God's patient forbearance from Egypt onward.
- source_word: מִמִּצְרַיִם וְעַד הֵנָּה
  chosen: from Egypt until now
  alternatives:
  - from Egypt to this place
  - from Egypt even until here
  lexicon: HALOT
  rationale: The phrase marks temporal-spatial continuity from the exodus up to the
    present moment. In English, 'from Egypt until now' communicates the intended duration
    naturally; 'to this place' is possible but less clear in context.
