id: NUM.14.3
reference: Numbers 14:3
source:
  edition: WLC
  text: וְ/לָ/מָ֣ה יְ֠הוָה מֵבִ֨יא אֹתָ֜/נוּ אֶל הָ/אָ֤רֶץ הַ/זֹּאת֙ לִ/נְפֹּ֣ל בַּ/חֶ֔רֶב
    נָשֵׁ֥י/נוּ וְ/טַפֵּ֖/נוּ יִהְי֣וּ לָ/בַ֑ז הֲ/ל֧וֹא ט֦וֹב לָ֖/נוּ שׁ֥וּב מִצְרָֽיְמָ/ה־׃
translation:
  text: And why is the LORD bringing us into this land to fall by the sword? Our wives
    and our little ones will become plunder. Would it not be better for us to return
    to Egypt?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be prey'; the Hebrew can denote being taken as spoil by enemies.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָמָה
  chosen: And why
  alternatives:
  - Why
  lexicon: HALOT
  rationale: Introduces the people's complaint as a continuation of the previous speech,
    so retaining the conjunction with 'And why' reflects the discourse flow better
    than a bare 'Why.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name YHWH is rendered 'the LORD' rather than
    transliterated.
- source_word: מֵבִיא
  chosen: is bringing
  alternatives:
  - brings
  - has brought
  lexicon: HALOT
  rationale: The participle conveys ongoing or imminent action; English progressive
    'is bringing' best captures the sense in this complaint.
- source_word: אֹתָנוּ אֶל הָאָרֶץ הַזֹּאת
  chosen: us into this land
  alternatives:
  - us to this land
  lexicon: HALOT
  rationale: '''Into this land'' fits the motion implied by the verb and preposition
    and sounds natural in English.'
- source_word: לִנְפֹּל בַּחֶרֶב
  chosen: to fall by the sword
  alternatives:
  - to die by the sword
  - to fall by sword
  lexicon: HALOT
  rationale: This is a conventional Hebrew idiom for dying in battle. 'Fall by the
    sword' preserves the idiom while remaining clear in modern English.
- source_word: נָשֵׁינוּ
  chosen: our wives
  alternatives:
  - our women
  lexicon: HALOT
  rationale: In this familial context, 'wives' is the natural and contextually specific
    rendering.
- source_word: וְטַפֵּנוּ
  chosen: our little ones
  alternatives:
  - our children
  - our dependents
  lexicon: HALOT
  rationale: טַף refers especially to small children or dependents. 'Little ones'
    preserves the vulnerability emphasized in the complaint better than the broader
    'children.'
- source_word: יִהְיוּ לָבַז
  chosen: will become plunder
  alternatives:
  - will be prey
  - will become spoil
  lexicon: HALOT
  rationale: בַּז denotes booty/plunder taken by enemies. 'Plunder' is concrete and
    natural; 'prey' is possible but less precise to the warfare context.
- source_word: הֲלוֹא טוֹב לָנוּ
  chosen: Would it not be better for us
  alternatives:
  - Is it not better for us
  - Would it not be good for us
  lexicon: HALOT
  rationale: The interrogative particle with negation introduces a rhetorical question.
    'Would it not be better for us' captures the force idiomatically in English.
- source_word: שׁוּב מִצְרָיְמָה
  chosen: to return to Egypt
  alternatives:
  - to go back to Egypt
  lexicon: HALOT
  rationale: The infinitive 'to return' fits the construction after 'better for us'
    and preserves the thematic language of turning back.
