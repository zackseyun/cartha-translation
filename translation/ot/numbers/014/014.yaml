id: NUM.14.14
reference: Numbers 14:14
source:
  edition: WLC
  text: וְ/אָמְר֗וּ אֶל יוֹשֵׁב֮ הָ/אָ֣רֶץ הַ/זֹּאת֒ שָֽׁמְעוּ֙ כִּֽי אַתָּ֣ה יְהוָ֔ה בְּ/קֶ֖רֶב הָ/עָ֣ם הַ/זֶּ֑ה אֲשֶׁר עַ֨יִן בְּ/עַ֜יִן נִרְאָ֣ה אַתָּ֣ה יְהוָ֗ה וַ/עֲנָֽנְ/ךָ֙ עֹמֵ֣ד עֲלֵ/הֶ֔ם וּ/בְ/עַמֻּ֣ד עָנָ֗ן אַתָּ֨ה הֹלֵ֤ךְ לִ/פְנֵי/הֶם֙ יוֹמָ֔ם וּ/בְ/עַמּ֥וּד אֵ֖שׁ לָֽיְלָה־־־׀׃
translation:
  text: And they will tell the inhabitants of this land, who have heard that you, Yahweh, are in the midst of this people, that you, Yahweh, are seen face to face, and your cloud stands over them, and you go before them in a pillar of cloud by day and in a pillar of fire by night.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you appear face to face'; literally, 'eye to eye you are seen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹשֵׁב הָאָרֶץ הַזֹּאת
  chosen: the inhabitants of this land
  alternatives:
  - those who dwell in this land
  - the people living in this land
  lexicon: HALOT
  rationale: The singular participle with collective force is naturally rendered as a plural collective in English. 'Inhabitants' is idiomatic and preserves the sense of the resident population.
- source_word: שָׁמְעוּ
  chosen: have heard
  alternatives:
  - heard
  lexicon: HALOT
  rationale: The qatal here refers to prior knowledge already possessed by the inhabitants; English present perfect best conveys that existing state resulting from past hearing.
- source_word: יְהוָה
  chosen: Yahweh / Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּקֶרֶב
  chosen: in the midst of
  alternatives:
  - among
  - in the middle of
  lexicon: HALOT
  rationale: '''In the midst of'' preserves the covenantal-immanence nuance and remains readable modern English.'
- source_word: עַיִן בְּעַיִן
  chosen: eye to eye
  alternatives:
  - face to face
  - plainly
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'eye in/with eye.' 'Eye to eye' preserves the imagery and avoids over-interpreting it as the more specific idiom 'face to face.'
- source_word: נִרְאָה
  chosen: are seen
  alternatives:
  - appear
  - are visible
  - are seen clearly
  lexicon: HALOT
  rationale: The Niphal of ראה is passive/reflexive in sense. 'Are seen' keeps the passive force and fits the clause 'you, LORD, are seen eye to eye.'
- source_word: וַעֲנָנְךָ עֹמֵד עֲלֵהֶם
  chosen: your cloud stands over them
  alternatives:
  - your cloud remains over them
  - your cloud is stationed above them
  lexicon: HALOT
  rationale: '''Stands over'' is a natural rendering of עמד על while preserving the concrete image of the cloud''s protective presence.'
- source_word: הֹלֵךְ לִפְנֵיהֶם
  chosen: you go before them
  alternatives:
  - you walk before them
  - you lead them
  lexicon: HALOT
  rationale: '''Go before'' is a close and idiomatic rendering. ''Lead'' is interpretive and less formally tied to the Hebrew verb הלך.'
- source_word: בְּעַמּוּד עָנָן ... וּבְעַמּוּד אֵשׁ
  chosen: in a pillar of cloud ... and in a pillar of fire
  alternatives:
  - by a pillar of cloud ... and by a pillar of fire
  lexicon: HALOT
  rationale: The preposition ב can be rendered instrumentally or locatively here. 'In a pillar' reflects the visible mode of divine guidance and matches common biblical English without obscuring the Hebrew.
- source_word: יוֹמָם ... לָיְלָה
  chosen: by day ... by night
  alternatives:
  - in the daytime ... at night
  lexicon: HALOT
  rationale: These adverbial time expressions are most naturally rendered 'by day' and 'by night' in English.
