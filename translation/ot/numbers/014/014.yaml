theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh / Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of עַיִן בְּעַיִן נִרְאָה
  chosen_reading: you, LORD, are seen eye to eye
  alternative_readings:
  - you appear face to face
  - you are seen plainly
  rationale: The phrase is somewhat idiomatic and could be smoothed interpretively, but the translation preserves the Hebrew tension and imagery rather than resolving it into a more specific theological claim about direct vision.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
