id: NUM.14.13
reference: Numbers 14:13
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר מֹשֶׁ֖ה אֶל יְהוָ֑ה וְ/שָׁמְע֣וּ מִצְרַ֔יִם כִּֽי הֶעֱלִ֧יתָ בְ/כֹחֲ/ךָ֛
    אֶת הָ/עָ֥ם הַ/זֶּ֖ה מִ/קִּרְבּֽ/וֹ־־־׃
translation:
  text: But Moses said to the LORD, “Then the Egyptians will hear, for by your power
    you brought up this people from among them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “And the Egyptians have heard, for by your power you brought up this
      people from among them.” The Hebrew verbal form can be taken as past or as a
      future/result within Moses’ plea; the main text adopts the forward-looking sense
      that fits the surrounding argument.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But Moses said
  alternatives:
  - Then Moses said
  - And Moses said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the discourse
    context because Moses' speech responds to the LORD's announced judgment in the
    preceding verse, marking contrast more clearly than a bare 'and' while remaining
    within optimal equivalence.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint tradition.
- source_word: וְשָׁמְעוּ
  chosen: Then the Egyptians will hear
  alternatives:
  - and the Egyptians will hear
  - the Egyptians have heard
  lexicon: HALOT
  rationale: 'The qatal here is best taken in context as a future/resultative statement
    within Moses'' argument: if the LORD destroys Israel, Egypt will hear of it. Rendering
    with ''Then ... will hear'' makes the implied consequence explicit in natural
    English. A past sense (''have heard'') is possible in isolation, but the following
    verse continues the consequence chain, favoring a prospective reading here.'
- source_word: מִצְרַיִם
  chosen: the Egyptians
  alternatives:
  - Egypt
  - Egyptians
  lexicon: HALOT
  rationale: Although the noun can denote the land or the people, the verb 'hear'
    naturally takes the people as subject in this context. 'The Egyptians' is the
    clearest idiomatic English rendering.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: 'Here כִּי introduces the ground or explanation for why Egypt would hear:
    because the LORD brought Israel up by his power. ''For'' preserves the explanatory
    force in concise literary English.'
- source_word: הֶעֱלִיתָ
  chosen: you brought up
  alternatives:
  - you led up
  - you brought out
  lexicon: HALOT
  rationale: The Hiphil of עלה commonly means 'bring up.' In exodus context, 'brought
    up' preserves the Hebrew idiom, while still communicating deliverance from Egypt.
    'Brought out' is possible but less directly tied to the source verb.
- source_word: בְכֹחֲךָ
  chosen: by your power
  alternatives:
  - with your power
  - in your strength
  lexicon: HALOT
  rationale: The preposition ב plus כוח expresses means or instrument. 'By your power'
    is natural English and preserves the emphasis on divine might.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: The singular noun עם with demonstrative is best rendered 'this people.'
    'Nation' is possible but can sound more political than the Hebrew here; 'these
    people' would incorrectly pluralize the singular collective.
- source_word: מִקִּרְבּוֹ
  chosen: from among them
  alternatives:
  - from his midst
  - from its midst
  - from among it
  lexicon: HALOT
  rationale: The singular pronominal suffix likely refers collectively to Egypt as
    a national entity. In English, 'from among them' communicates the sense clearly
    and idiomatically, referring to the Egyptians from whose midst Israel was brought
    up.
