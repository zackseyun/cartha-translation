id: NUM.14.6
reference: Numbers 14:6
source:
  edition: WLC
  text: וִ/יהוֹשֻׁ֣עַ בִּן נ֗וּן וְ/כָלֵב֙ בֶּן יְפֻנֶּ֔ה מִן הַ/תָּרִ֖ים אֶת הָ/אָ֑רֶץ
    קָרְע֖וּ בִּגְדֵי/הֶֽם־־־־׃
translation:
  text: And Joshua son of Nun and Caleb son of Jephunneh, from those who had spied
    out the land, tore their clothes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among those who had spied out the land.' The Hebrew preposition can
      mark membership within the larger group of scouts.
    reason: lexical_alternative
  - marker: b
    text: Tearing one's clothes was a customary sign of grief, horror, or distress.
    reason: cultural_note
lexical_decisions:
- source_word: וִ/יהוֹשֻׁעַ
  chosen: And Joshua
  alternatives:
  - Now Joshua
  - But Joshua
  lexicon: HALOT
  rationale: The prefixed conjunction is rendered simply as 'And' in straightforward
    narrative sequence. The personal name is transliterated by standard English convention
    per translation philosophy.
- source_word: בִּן נוּן
  chosen: son of Nun
  lexicon: HALOT
  rationale: A formal filial expression identifying Joshua; 'son of' is the standard
    and transparent rendering.
- source_word: וְ/כָלֵב
  chosen: and Caleb
  lexicon: HALOT
  rationale: The conjunction links Caleb with Joshua as joint subjects; the name is
    transliterated.
- source_word: בֶּן יְפֻנֶּה
  chosen: son of Jephunneh
  lexicon: HALOT
  rationale: As with Joshua's patronymic, the construct phrase is best rendered formally
    as 'son of Jephunneh.'
- source_word: מִן הַ/תָּרִים
  chosen: from those who had spied out
  alternatives:
  - among those who had spied out
  - of those who had spied out
  lexicon: HALOT
  rationale: The preposition מִן here is partitive, identifying Joshua and Caleb as
    belonging to the group of scouts. The participle תרים is rendered with an English
    pluperfect relative clause, 'those who had spied out,' to express prior action
    naturally in context.
- source_word: אֶת הָ/אָ֑רֶץ
  chosen: the land
  alternatives:
  - the הארץ / land of Canaan
  lexicon: HALOT
  rationale: Direct-object marker אֶת is untranslated in English. הָאָרֶץ is rendered
    'the land,' referring to the land under discussion without importing a more specific
    designation not stated in the verse.
- source_word: קָרְעוּ
  chosen: tore
  alternatives:
  - rent
  lexicon: HALOT
  rationale: The verb means to tear or rip. 'Tore' is clear modern English; 'rent'
    is traditional but archaic for the target audience.
- source_word: בִּגְדֵי/הֶם
  chosen: their clothes
  alternatives:
  - their garments
  lexicon: HALOT
  rationale: The noun refers to garments/clothing. 'Their clothes' is more natural
    contemporary English, while still conveying the mourning gesture of tearing one's
    clothing.
