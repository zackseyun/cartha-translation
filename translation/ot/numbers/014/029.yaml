id: NUM.14.29
reference: Numbers 14:29
source:
  edition: WLC
  text: בַּ/מִּדְבָּ֣ר הַ֠/זֶּה יִפְּל֨וּ פִגְרֵי/כֶ֜ם וְ/כָל פְּקֻדֵי/כֶם֙ לְ/כָל
    מִסְפַּרְ/כֶ֔ם מִ/בֶּ֛ן עֶשְׂרִ֥ים שָׁנָ֖ה וָ/מָ֑עְלָ/ה אֲשֶׁ֥ר הֲלִֽינֹתֶ֖ם עָלָֽ/י־־׃
translation:
  text: In this wilderness your dead bodies will fall—indeed, all of you who were
    counted according to your whole number, from twenty years old and upward, who
    have grumbled against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your corpses will fall.' The Hebrew is vivid and concrete, emphasizing
      bodily death in the wilderness.
    reason: lexical_alternative
  - marker: b
    text: '''Who were counted'' refers to those enrolled in the census/muster.'
    reason: cultural_note
  - marker: c
    text: Or 'who have murmured against me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּמִּדְבָּר הַזֶּה
  chosen: In this wilderness
  alternatives:
  - In this desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert land. 'Wilderness' fits Pentateuchal
    usage in English and preserves the geographic-theological setting of Israel's
    wandering.
- source_word: יִפְּלוּ
  chosen: will fall
  alternatives:
  - shall fall
  lexicon: HALOT
  rationale: The verb נפל literally means 'fall.' In context it is a solemn idiom
    for dying in the wilderness, but retaining 'fall' preserves the Hebrew imagery
    and lets the following noun specify the result.
- source_word: פִגְרֵיכֶם
  chosen: your dead bodies
  alternatives:
  - your corpses
  - your carcasses
  lexicon: HALOT
  rationale: פגר refers to a corpse/dead body. 'Dead bodies' is clear modern English
    and avoids the harshness of 'carcasses' while still conveying the physicality
    of the judgment.
- source_word: וְכָל פְּקֻדֵיכֶם
  chosen: indeed, all of you who were counted
  alternatives:
  - and all your numbered ones
  - and all your mustered men
  lexicon: HALOT
  rationale: פְּקֻדִים are those enrolled/counted in a census or muster. Because the
    suffix is second person plural, the phrase refers to the counted members of the
    community. 'All of you who were counted' communicates the census background naturally
    in English. 'Indeed' gives the force of waw here as an emphatic continuation rather
    than a mere additive.
- source_word: לְכָל מִסְפַּרְכֶם
  chosen: according to your whole number
  alternatives:
  - by your total number
  - in all your number
  lexicon: HALOT
  rationale: 'This phrase reinforces comprehensiveness: the counted ones are included
    according to the entirety of their census total. ''According to your whole number''
    preserves that formal sense without becoming opaque.'
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמָעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years old and above
  lexicon: HALOT
  rationale: This is the standard age-threshold formula in census contexts. 'And upward'
    is idiomatic and reflects the Hebrew expression.
- source_word: אֲשֶׁר הֲלִינֹתֶם עָלָי
  chosen: who have grumbled against me
  alternatives:
  - who have murmured against me
  - who have complained against me
  lexicon: HALOT
  rationale: The Hiphil of לון in wilderness narratives commonly means to grumble
    or murmur in complaint against God/Moses. 'Grumbled' is natural modern English
    and preserves the rebellious nuance better than the milder 'complained.'
