theological_decisions:
- issue: Nature of the judgment language
  chosen_reading: Retain the concrete wording 'your dead bodies will fall' rather
    than smoothing it to simply 'you will die.'
  alternative_readings:
  - you will die in this wilderness
  rationale: The Hebrew emphasizes bodily death as covenant judgment. Preserving the
    concrete image avoids paraphrase and maintains the severity of the pronouncement.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English without flattening theological weight.'
