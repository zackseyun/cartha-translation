theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Belief language in לֹא יַאֲמִינוּ בִי
  chosen_reading: will they not believe in me
  alternative_readings:
  - will they not trust me
  rationale: The Hebrew can carry both belief and trust nuances. 'Believe in me' preserves the direct lexical sense and the covenantal challenge, while the trust nuance is preserved as a lexical alternative rather than elevated into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension where genuine ambiguity exists
