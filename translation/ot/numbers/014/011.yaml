id: NUM.14.11
reference: Numbers 14:11
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה עַד אָ֥נָה יְנַאֲצֻ֖/נִי הָ/עָ֣ם הַ/זֶּ֑ה וְ/עַד אָ֨נָה֙ לֹא יַאֲמִ֣ינוּ בִ֔/י בְּ/כֹל֙ הָֽ/אֹת֔וֹת אֲשֶׁ֥ר עָשִׂ֖יתִי בְּ/קִרְבּֽ/וֹ־־־־׃
translation:
  text: And Yahweh said to Moses, “How long will this people treat me with contempt? And how long will they not believe in me, despite all the signs that I have done among them?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “How long will this people despise me?”
    reason: lexical_alternative
  - marker: b
    text: Or “How long will they not trust me?”
    reason: lexical_alternative
  - marker: c
    text: Literally “in its midst,” referring to the people as a collective.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַד אָ֥נָה
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic English equivalent for the Hebrew temporal lament/interrogative expression.
- source_word: יְנַאֲצֻנִי
  chosen: will this people treat me with contempt
  alternatives:
  - spurn me
  - despise me
  - reject me
  lexicon: HALOT
  rationale: The verb נאץ conveys contemptuous rejection or spurning. 'Treat me with contempt' captures the relational offense clearly in modern English while preserving the force better than the weaker 'disrespect'.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: Retains the singular collective force of the Hebrew with its distancing tone. 'This people' is natural enough in English and preserves the rhetorical sharpness better than smoothing to 'these people'.
- source_word: וְעַד אָ֨נָה
  chosen: And how long
  alternatives:
  - And until when
  lexicon: HALOT
  rationale: Maintains the repeated rhetorical structure of the Hebrew in idiomatic English.
- source_word: לֹא יַאֲמִינוּ בִי
  chosen: will they not believe in me
  alternatives:
  - will they not trust me
  - will they refuse to believe me
  lexicon: HALOT
  rationale: The Hiphil of אמן with ב marks believing/trusting in someone. 'Believe in me' is the most direct rendering and fits the context of Israel's failure to respond to God's demonstrated power. 'Trust me' is a viable nuance but is preserved as an alternative rather than adopted in the main text.
- source_word: בְּכֹל הָאֹתוֹת
  chosen: despite all the signs
  alternatives:
  - for all the signs
  - in view of all the signs
  - with all the signs
  lexicon: HALOT
  rationale: 'The preposition with ''all the signs'' is contextually concessive: in spite of the many signs already given, they still do not believe. ''Despite all the signs'' makes that relationship explicit in natural English.'
- source_word: הָאֹתוֹת
  chosen: the signs
  alternatives:
  - the miraculous signs
  - the tokens
  lexicon: HALOT
  rationale: אוֹת commonly denotes signs, often miraculous in context. 'Signs' is sufficiently clear and avoids adding 'miraculous' where the Hebrew itself does not explicitly do so.
- source_word: עָשִׂיתִי
  chosen: I have done
  alternatives:
  - I did
  - I performed
  lexicon: HALOT
  rationale: Present perfect English fits the relevance of past acts to the present complaint better than a simple past.
- source_word: בְּקִרְבּוֹ
  chosen: among them
  alternatives:
  - in their midst
  - within it
  lexicon: HALOT
  rationale: Although the suffix is singular ('in its midst'), it refers back to the collective singular 'this people.' 'Among them' is the most natural English rendering while preserving the communal sense.
