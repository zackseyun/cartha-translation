id: NUM.14.44
reference: Numbers 14:44
source:
  edition: WLC
  text: וַ/יַּעְפִּ֕לוּ לַ/עֲל֖וֹת אֶל רֹ֣אשׁ הָ/הָ֑ר וַ/אֲר֤וֹן בְּרִית יְהוָה֙ וּ/מֹשֶׁ֔ה
    לֹא מָ֖שׁוּ מִ/קֶּ֥רֶב הַֽ/מַּחֲנֶֽה־־־׃
translation:
  text: But they presumed to go up to the top of the mountain, though the ark of the
    covenant of the LORD and Moses did not move from the midst of the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they acted presumptuously' or 'they defiantly went up.' The Hebrew
      verb carries the sense of willful, presumptuous action.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the ark of the covenant of the LORD'; alternatively, 'the ark of
      the LORD's covenant.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעְפִּלוּ
  chosen: they presumed
  alternatives:
  - they acted presumptuously
  - they went up defiantly
  - they dared
  lexicon: HALOT
  rationale: The verb עפל in the Hithpael here conveys presumptuous or willful action,
    not merely physical ascent. 'Presumed' captures the moral-rebellious nuance in
    readable English and fits the context of disobeying the LORD's command.
- source_word: לַעֲלוֹת
  chosen: to go up
  alternatives:
  - to ascend
  lexicon: HALOT
  rationale: עלה is the standard verb for upward movement. 'Go up' is natural modern
    English and preserves the directional sense without sounding overly formal.
- source_word: אֶל רֹאשׁ הָהָר
  chosen: to the top of the mountain
  alternatives:
  - to the summit of the hill-country
  - to the head of the mountain
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' idiomatically 'top' or 'summit.' הָהָר
    is singular 'the mountain/hill country'; in this immediate scene, 'the mountain'
    is the clearest rendering.
- source_word: וַאֲרוֹן בְּרִית יְהוָה
  chosen: the ark of the covenant of the LORD
  alternatives:
  - the ark of the LORD's covenant
  lexicon: HALOT
  rationale: This preserves the construct chain straightforwardly. יְהוָה is rendered
    'the LORD' per doctrine. 'Ark of the covenant of the LORD' is transparent and
    traditional without obscuring the Hebrew syntax.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the default rendering for the
    divine name is 'the LORD.'
- source_word: וּמֹשֶׁה
  chosen: and Moses
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: לֹא מָשׁוּ
  chosen: did not move
  alternatives:
  - did not depart
  - did not budge
  lexicon: HALOT
  rationale: מוש here means to move away or depart. 'Did not move' is concise and
    natural, while preserving the narrative point that neither Moses nor the ark accompanied
    the people.
- source_word: מִקֶּרֶב הַמַּחֲנֶה
  chosen: from the midst of the camp
  alternatives:
  - from within the camp
  - from the center of the camp
  lexicon: HALOT
  rationale: קֶרֶב means 'midst' or 'inner part.' 'From the midst of the camp' closely
    reflects the Hebrew while remaining readable.
