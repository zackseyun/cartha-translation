theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in the title 'ark of the covenant
    of the LORD.' Following the doctrinal guideline, the main text uses 'the LORD'
    rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of Israel's action in וַיַּעְפִּלוּ
  chosen_reading: But they presumed to go up
  alternative_readings:
  - But they acted presumptuously in going up
  - But they defiantly went up
  rationale: 'The context is theological as well as narrative: Israel attempts the
    ascent contrary to the LORD''s stated presence and command in the preceding context.
    ''Presumed'' preserves that culpable spiritual presumption without over-interpreting
    beyond the lexical force.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
