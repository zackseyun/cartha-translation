id: NUM.14.27
reference: Numbers 14:27
source:
  edition: WLC
  text: עַד מָתַ֗י לָ/עֵדָ֤ה הָֽ/רָעָה֙ הַ/זֹּ֔את אֲשֶׁ֛ר הֵ֥מָּה מַלִּינִ֖ים עָלָ֑/י
    אֶת תְּלֻנּ֞וֹת בְּנֵ֣י יִשְׂרָאֵ֗ל אֲשֶׁ֨ר הֵ֧מָּה מַלִּינִ֛ים עָלַ֖/י שָׁמָֽעְתִּי־־׃
translation:
  text: How long shall this evil congregation grumble against me? I have heard the
    complaints of the sons of Israel that they are grumbling against me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembly' or 'community' for 'congregation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the children of Israel' or 'the Israelites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד מָתַי
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic temporal question in Hebrew expressing exasperation; 'How long'
    is standard, natural English and preserves the force.
- source_word: לָעֵדָה
  chosen: congregation
  alternatives:
  - community
  - assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled community of Israel. 'Congregation'
    fits the collective sense and matches the formal tone of the context.
- source_word: הָרָעָה הַזֹּאת
  chosen: this evil
  alternatives:
  - this wicked
  - this bad
  lexicon: HALOT
  rationale: The adjective רָעָה here is moral/evaluative, not merely unpleasant.
    'Evil' best preserves the severity of God's assessment.
- source_word: מַלִּינִים
  chosen: grumble
  alternatives:
  - murmur
  - complain
  lexicon: HALOT
  rationale: The Hifil of לון/לין in wilderness narratives often refers to Israel's
    rebellious complaining. 'Grumble' is natural modern English and captures the repeated,
    discontented sense better than the archaic 'murmur.'
- source_word: עָלַי
  chosen: against me
  alternatives:
  - about me
  - to me
  lexicon: HALOT
  rationale: With this verb and context, the preposition conveys opposition directed
    toward God, not merely speech in his presence. 'Against me' preserves the adversative
    force.
- source_word: תְּלֻנּוֹת
  chosen: complaints
  alternatives:
  - grumblings
  - murmurings
  lexicon: HALOT
  rationale: The noun denotes expressed complaints. 'Complaints' is clear modern English;
    the verbal repetition is still preserved by rendering מַלִּינִים as 'grumbling.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural construct is preserved
    as 'sons of Israel.' This also maintains the formal linkage to the Hebrew expression
    while remaining understandable.
- source_word: שָׁמָעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: HALOT
  rationale: The perfect can be rendered as a present-result perfect in English here,
    emphasizing that God has indeed heard their ongoing complaints and is now responding.
