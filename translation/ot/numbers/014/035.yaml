id: NUM.14.35
reference: Numbers 14:35
source:
  edition: WLC
  text: אֲנִ֣י יְהוָה֮ דִּבַּרְתִּי֒ אִם לֹ֣א זֹ֣את אֶֽעֱשֶׂ֗ה לְ/כָל הָ/עֵדָ֤ה הָֽ/רָעָה֙
    הַ/זֹּ֔את הַ/נּוֹעָדִ֖ים עָלָ֑/י בַּ/מִּדְבָּ֥ר הַ/זֶּ֛ה יִתַּ֖מּוּ וְ/שָׁ֥ם יָמֻֽתוּ־׀־׃
translation:
  text: 'I, the LORD, have spoken. Surely I will do this to all this evil congregation
    who have gathered together against me: in this wilderness they will come to an
    end, and there they will die.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembly' or 'community' for 'congregation.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew idiom rendered 'Surely' is literally 'if not,' an oath-like expression
      of strong certainty.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: דִּבַּרְתִּי
  chosen: have spoken
  alternatives:
  - have said
  - spoke
  lexicon: HALOT
  rationale: The perfect verb marks a completed divine utterance with present force
    in context; 'have spoken' preserves the solemnity and supports the following oath-like
    declaration.
- source_word: אִם לֹא
  chosen: Surely
  alternatives:
  - if not
  - indeed
  lexicon: HALOT
  rationale: In oath contexts אִם לֹא functions idiomatically as a strong asseveration
    rather than a literal conditional. 'Surely' conveys the emphatic force in natural
    English.
- source_word: זֹאת אֶעֱשֶׂה
  chosen: I will do this
  alternatives:
  - I will do this very thing
  - this I will do
  lexicon: HALOT
  rationale: A straightforward future rendering preserves the demonstrative emphasis
    without sounding overly wooden.
- source_word: הָעֵדָה
  chosen: congregation
  alternatives:
  - community
  - assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled community of Israel. Here 'congregation'
    fits the corporate sense and the judicial tone of the sentence.
- source_word: הָרָעָה
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: HALOT
  rationale: The adjective carries a moral evaluation, not merely an unfavorable condition.
    'Evil' best reflects the divine judgment on the group's rebellion.
- source_word: הַנּוֹעָדִים עָלַי
  chosen: who have gathered together against me
  alternatives:
  - who have assembled against me
  - who have banded together against me
  lexicon: HALOT
  rationale: The Niphal participle from יעד here describes those convening in opposition
    to the LORD. 'Gathered together against me' captures both the collective action
    and adversative force.
- source_word: בַּמִּדְבָּר הַזֶּה
  chosen: in this wilderness
  alternatives:
  - in this desert
  lexicon: HALOT
  rationale: מִדְבָּר is well rendered 'wilderness' in Pentateuchal narrative, preserving
    both geography and theological resonance.
- source_word: יִתַּמּוּ
  chosen: will come to an end
  alternatives:
  - will be finished
  - will perish
  lexicon: HALOT
  rationale: The verb תמם means to be completed or finished. In this judgment context,
    'will come to an end' communicates the result without collapsing it into the following
    explicit verb for death.
- source_word: וְשָׁם יָמֻתוּ
  chosen: and there they will die
  alternatives:
  - and there they shall die
  lexicon: HALOT
  rationale: The adverb 'there' is retained for emphasis, likely pointing back to
    the wilderness as the place of judgment. The clause is kept distinct from the
    previous verb to preserve the Hebrew parallelism.
