theological_decisions:
- issue: Rendering the divine oath-like formula אִם לֹא
  chosen_reading: An emphatic assertion ('Surely I will do this')
  alternative_readings:
  - A more literal but awkward conditional form ('if not, I will do this')
  rationale: The Hebrew idiom functions as a solemn divine affirmation, not as an
    unresolved condition. Rendering it idiomatically preserves meaning without importing
    extra theological content.
  doctrine_reference: Translation philosophy §1, §6
- issue: Corporate designation of Israel as עֵדָה
  chosen_reading: '''congregation'''
  alternative_readings:
  - '''community'''
  - '''assembly'''
  rationale: The verse judges the gathered people corporately. 'Congregation' preserves
    the formal communal sense without implying later ecclesial structures.
  doctrine_reference: Translation philosophy §5
