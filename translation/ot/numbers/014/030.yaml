theological_decisions:
- issue: Rendering the oath idiom without obscuring divine judgment
  chosen_reading: Surely you shall not come into the land
  alternative_readings:
  - If you come into the land...
  - You shall certainly not come into the land
  rationale: The verse is part of YHWH's judicial pronouncement. Translating the initial
    אִם idiomatically as a strong negation preserves the force of the oath/judgment
    rather than creating a misleading conditional sentence fragment in English.
  doctrine_reference: Translation philosophy §1, §3
