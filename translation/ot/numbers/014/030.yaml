id: NUM.14.30
reference: Numbers 14:30
source:
  edition: WLC
  text: אִם אַתֶּם֙ תָּבֹ֣אוּ אֶל הָ/אָ֔רֶץ אֲשֶׁ֤ר נָשָׂ֨אתִי֙ אֶת יָדִ֔/י לְ/שַׁכֵּ֥ן
    אֶתְ/כֶ֖ם בָּ֑/הּ כִּ֚י אִם כָּלֵ֣ב בֶּן יְפֻנֶּ֔ה וִ/יהוֹשֻׁ֖עַ בִּן נֽוּן־־־־־־׃
translation:
  text: Surely you shall not come into the land in which I raised my hand to settle
    you, except Caleb son of Jephunneh and Joshua son of Nun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the land in which I raised my hand to settle you in it,'
      an oath gesture meaning he swore to give them the land.
    reason: cultural_note
lexical_decisions:
- source_word: אִם אַתֶּם תָּבֹאוּ
  chosen: Surely you shall not come
  alternatives:
  - if you come
  - you shall not come
  lexicon: HALOT
  rationale: Here אִם at the head of a divine oath-like declaration functions idiomatically
    as a strong negation ('surely not,' 'indeed not'), not as a simple conditional
    'if.' English must supply the negative force to reflect the Hebrew idiom in context.
- source_word: אֶל הָאָרֶץ
  chosen: into the land
  alternatives:
  - to the land
  lexicon: HALOT
  rationale: '''Into the land'' fits the motion verb בוא and natural English usage
    for entering a territory.'
- source_word: אֲשֶׁר נָשָׂאתִי אֶת יָדִי
  chosen: in which I raised my hand
  alternatives:
  - about which I lifted my hand
  - which I swore with uplifted hand
  - to which I swore
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of lifting/raising the hand as an oath
    gesture. The main text preserves the image with readable English rather than flattening
    it entirely to 'swore.'
- source_word: לְשַׁכֵּן אֶתְכֶם בָּהּ
  chosen: to settle you
  alternatives:
  - to make you dwell in it
  - to have you live there
  lexicon: HALOT
  rationale: שׁכן in the causative means to cause to dwell or settle. 'Settle you'
    is concise, natural, and preserves the causative sense better than the flatter
    'let you live there.'
- source_word: כִּי אִם
  chosen: except
  alternatives:
  - but only
  - unless it is
  lexicon: HALOT
  rationale: In this exclusionary construction, כִּי אִם introduces the sole exceptions
    to the preceding negation. 'Except' is the clearest English equivalent.
- source_word: כָּלֵב בֶּן יְפֻנֶּה
  chosen: Caleb son of Jephunneh
  alternatives:
  - Caleb the son of Jephunneh
  rationale: Personal names are transliterated by standard convention; 'son of' is
    retained as the normal Hebrew patronymic.
- source_word: וִיהוֹשֻׁעַ בִּן נוּן
  chosen: and Joshua son of Nun
  alternatives:
  - and Joshua the son of Nun
  rationale: Personal names are transliterated; the conjunction is rendered simply
    as 'and,' and the patronymic is kept.
