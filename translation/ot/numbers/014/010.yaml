id: NUM.14.10
reference: Numbers 14:10
source:
  edition: WLC
  text: וַ/יֹּֽאמְרוּ֙ כָּל הָ֣/עֵדָ֔ה לִ/רְגּ֥וֹם אֹתָ֖/ם בָּ/אֲבָנִ֑ים וּ/כְב֣וֹד יְהוָ֗ה נִרְאָה֙ בְּ/אֹ֣הֶל מוֹעֵ֔ד אֶֽל כָּל בְּנֵ֖י יִשְׂרָאֵֽל־־־׃פ
translation:
  text: But all the congregation said to stone them with stones, and the glory of Yahweh appeared in the tent of meeting to all the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'to all the Israelites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל הָעֵדָה
  chosen: all the congregation
  alternatives:
  - the whole community
  - all the assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled community of Israel. 'Congregation' preserves the collective, formal sense without over-paraphrasing.
- source_word: לִרְגּוֹם
  chosen: to stone
  alternatives:
  - to pelt
  - to stone to death
  lexicon: HALOT
  rationale: The verb רגם means to stone. 'To stone' is the direct and standard rendering; 'to death' is implied in many contexts but not explicitly stated here, so it is not added.
- source_word: אֹתָם
  chosen: them
  rationale: Refers to Joshua and Caleb in the immediate context; the pronoun is retained rather than replacing it with names, preserving the Hebrew discourse flow.
- source_word: בָּאֲבָנִים
  chosen: with stones
  alternatives:
  - by stoning
  - with rocks
  lexicon: HALOT
  rationale: The prepositional phrase specifies the means. 'With stones' is idiomatic in English and preserves the Hebrew concreteness.
- source_word: כְבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: כָּבוֹד here denotes the manifest glory/presence of YHWH. Following doctrine, יְהוָה is rendered 'the LORD.' The construct phrase is translated transparently.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נִרְאָה
  chosen: appeared
  alternatives:
  - was seen
  - became visible
  - revealed itself
  lexicon: HALOT
  rationale: The Niphal of ראה here expresses visible manifestation. 'Appeared' is natural English and fits a divine epiphany context.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: This is the standard designation for the tabernacle meeting place. 'In' matches the Hebrew preposition and the scene of divine appearance.
- source_word: אֶל כָּל בְּנֵי יִשְׂרָאֵל
  chosen: to all the sons of Israel
  alternatives:
  - to all the Israelites
  - before all the sons of Israel
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל is literally 'sons of Israel.' Per translation philosophy, gender-accurate renderings are preferred where they match source intent. Here the phrase is the conventional national designation, so the literal form is retained, though 'Israelites' is a viable idiomatic alternative.
