id: NUM.14.37
reference: Numbers 14:37
source:
  edition: WLC
  text: וַ/יָּמֻ֨תוּ֙ הָֽ/אֲנָשִׁ֔ים מוֹצִאֵ֥י דִבַּת הָ/אָ֖רֶץ רָעָ֑ה בַּ/מַּגֵּפָ֖ה לִ/פְנֵ֥י יְהוָֽה־׃
translation:
  text: those men who had brought out a bad report about the land died by the plague before Yahweh.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּמֻתוּ
  chosen: died
  alternatives:
  - and died
  lexicon: HALOT
  rationale: Qal wayyiqtol of מות, straightforward past narrative verb. English omits the conjunction for natural style while preserving the sequence.
- source_word: הָאֲנָשִׁים
  chosen: those men
  alternatives:
  - the men
  lexicon: HALOT
  rationale: Definite plural of אִישׁ. 'Those men' naturally points back to the previously mentioned spies and captures the anaphoric force in context better than a bare 'the men.'
- source_word: מוֹצִאֵי דִבַּת הָאָרֶץ רָעָה
  chosen: who had brought out a bad report about the land
  alternatives:
  - who brought out an evil report about the land
  - who spread a bad report about the land
  lexicon: HALOT
  rationale: The participial construction identifies the men by their prior action. דִבָּה is a report with negative/slanderous force; 'bad report' is idiomatic and fits the context. 'Brought out' preserves the verbal imagery of הוציא better than simply 'spread,' while 'about the land' reflects the genitive relation.
- source_word: רָעָה
  chosen: bad
  alternatives:
  - evil
  lexicon: HALOT
  rationale: Here רָעָה modifies 'report' in a context of harmful falsehood and discouragement. 'Bad' is clear modern English; 'evil' is possible but sounds less idiomatic with 'report' in contemporary usage.
- source_word: בַּמַּגֵּפָה
  chosen: by the plague
  alternatives:
  - in the plague
  - by a plague
  lexicon: HALOT
  rationale: מַגֵּפָה commonly denotes a plague or deadly blow. With בְּ and the article, 'by the plague' best conveys means/instrument in this judgment context.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי expresses presence before YHWH. 'Before the LORD' is concise, idiomatic, and preserves the solemn theological sense of divine immediacy. Per doctrine, יְהוָה is rendered 'the LORD.'
