id: NUM.14.5
reference: Numbers 14:5
source:
  edition: WLC
  text: וַ/יִּפֹּ֥ל מֹשֶׁ֛ה וְ/אַהֲרֹ֖ן עַל פְּנֵי/הֶ֑ם לִ/פְנֵ֕י כָּל קְהַ֥ל עֲדַ֖ת
    בְּנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: Then Moses and Aaron fell on their faces before the whole assembly of the
    congregation of the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Hebrew reads 'the sons
      of Israel.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression 'assembly of the congregation' preserves two related
      communal terms for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֹּל
  chosen: fell
  alternatives:
  - fell down
  - prostrated themselves
  lexicon: HALOT
  rationale: From נפל in the waw-consecutive narrative form; the basic sense is physical
    falling. 'Fell' preserves the Hebrew idiom without over-interpreting, while the
    following phrase 'on their faces' conveys the prostration implied.
- source_word: עַל־פְּנֵיהֶם
  chosen: on their faces
  alternatives:
  - face down
  - to the ground on their faces
  lexicon: HALOT
  rationale: A standard Hebrew idiom for prostration or deep humility. 'On their faces'
    is the most transparent and conventional English equivalent.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: The preposition marks spatial/public presence. 'Before' is concise and
    natural in English while preserving the formal setting.
- source_word: כָּל
  chosen: the whole
  alternatives:
  - all
  lexicon: HALOT
  rationale: With a collective noun, 'the whole' reads more naturally in English than
    'all' while preserving totality.
- source_word: קְהַל
  chosen: assembly
  alternatives:
  - gathering
  lexicon: HALOT
  rationale: קהל commonly denotes an assembled body. 'Assembly' is a clear, established
    rendering in communal/covenantal contexts.
- source_word: עֲדַת
  chosen: congregation
  alternatives:
  - community
  lexicon: HALOT
  rationale: עֵדָה often refers to the congregation/community as an organized body.
    Here retaining both 'assembly' and 'congregation' reflects the Hebrew double expression
    rather than collapsing it.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Israel.' Per the gender-accurate principle,
    this is retained rather than neutralized to 'Israelites,' while still being understandable
    in English.
