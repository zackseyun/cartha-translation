theological_decisions:
- issue: Whether to smooth the double collective expression קְהַל עֲדַת into a single
    English term
  chosen_reading: Retain both terms as 'assembly of the congregation'
  alternative_readings:
  - assembly of the community
  - whole congregation
  - assembled congregation
  rationale: The Hebrew uses two related communal nouns in construct, likely for solemn/public
    emphasis. Preserving both maintains the formal force of the scene and avoids paraphrastic
    flattening.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Whether to render בְּנֵי יִשְׂרָאֵל with gender-neutral language
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The source text is grammatically masculine and ethnically specific. Following
    the gender-accurate principle, the translation keeps the masculine form rather
    than neutralizing it, while not making a doctrinal claim beyond the Hebrew wording.
  doctrine_reference: Translation philosophy §4
