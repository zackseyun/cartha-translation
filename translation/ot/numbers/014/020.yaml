id: NUM.14.20
reference: Numbers 14:20
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֔ה סָלַ֖חְתִּי כִּ/דְבָרֶֽ/ךָ׃
translation:
  text: And Yahweh said, “I have forgiven, according to your word.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I have pardoned, as you have spoken.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves the Hebrew narrative flow in natural English without overinterpreting sequence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: סָלַחְתִּי
  chosen: I have forgiven
  alternatives:
  - I have pardoned
  - I forgive
  lexicon: HALOT
  rationale: The verb סלח denotes forgiveness/pardon. 'I have forgiven' reflects the perfect form naturally in English as a completed act with present relevance. 'Pardoned' is possible but sounds more juridical than the Hebrew requires here.
- source_word: כִּדְבָרֶךָ
  chosen: according to your word
  alternatives:
  - as you have spoken
  - at your word
  lexicon: HALOT
  rationale: Literally 'according to your word.' This preserves the preposition כ and the noun דבר while remaining idiomatic. It clearly ties the forgiveness to Moses' intercession in the preceding context.
