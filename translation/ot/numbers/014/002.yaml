theological_decisions:
- issue: Gendered national designation in בְּנֵי יִשְׂרָאֵל
  chosen_reading: all the sons of Israel
  alternative_readings:
  - all the Israelites
  - all the children of Israel
  rationale: The Hebrew uses the masculine plural construct 'sons of Israel.' Following
    the doctrine's gender-accurate-over-gender-neutral policy, the translation preserves
    the gendered form rather than neutralizing it, while still recognizing that the
    phrase refers to the people as a whole.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
