id: NUM.14.2
reference: Numbers 14:2
source:
  edition: WLC
  text: וַ/יִּלֹּ֨נוּ֙ עַל מֹשֶׁ֣ה וְ/עַֽל אַהֲרֹ֔ן כֹּ֖ל בְּנֵ֣י יִשְׂרָאֵ֑ל וַֽ/יֹּאמְר֨וּ
    אֲלֵ/הֶ֜ם כָּל הָ/עֵדָ֗ה לוּ מַ֨תְנוּ֙ בְּ/אֶ֣רֶץ מִצְרַ֔יִם א֛וֹ בַּ/מִּדְבָּ֥ר
    הַ/זֶּ֖ה לוּ מָֽתְנוּ־־־־־׃
translation:
  text: And all the sons of Israel grumbled against Moses and against Aaron, and the
    whole congregation said to them, “If only we had died in the land of Egypt! Or
    if only we had died in this wilderness!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all the Israelites.” Hebrew “all the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “murmured” or “complained.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלֹּנוּ
  chosen: grumbled
  alternatives:
  - murmured
  - complained
  lexicon: HALOT
  rationale: The verb לון/לין in this wilderness context commonly denotes communal
    complaining or murmuring against leaders. 'Grumbled' is natural modern English
    and preserves the rebellious, discontented sense better than the more archaic
    'murmured.'
- source_word: עַל
  chosen: against
  alternatives:
  - about
  - concerning
  lexicon: HALOT
  rationale: With the verb 'grumble,' עַל marks the object of complaint in an adversative
    sense. 'Against' best reflects the confrontational force directed toward Moses
    and Aaron.
- source_word: כֹּל בְּנֵי יִשְׂרָאֵל
  chosen: all the sons of Israel
  alternatives:
  - all the Israelites
  - all the children of Israel
  lexicon: HALOT
  rationale: Per the project's gender-accurate policy, בְּנֵי is retained as 'sons'
    rather than flattened to 'Israelites.' In this covenantal-national expression,
    'sons of Israel' is formally closer and still understandable in English.
- source_word: כָּל הָעֵדָה
  chosen: the whole congregation
  alternatives:
  - all the congregation
  - the whole community
  - the entire assembly
  lexicon: HALOT
  rationale: עֵדָה in Numbers often refers to the assembled covenant community. 'Congregation'
    preserves that corporate sense and fits Pentateuchal usage better than the more
    generic 'community.' 'Whole' renders כָּל idiomatically.
- source_word: לוּ
  chosen: If only
  alternatives:
  - Would that
  - O that
  lexicon: HALOT
  rationale: לוּ introduces a wish contrary to reality. 'If only' is clear, idiomatic
    modern English that preserves the lament/wish force without archaic diction.
- source_word: מַתְנוּ / מָתְנוּ
  chosen: we had died
  alternatives:
  - we died
  - we were dead
  lexicon: HALOT
  rationale: The qatal following לוּ expresses an unrealized wish about the past.
    English pluperfect 'had died' best captures this counterfactual lament.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: The fuller phrase 'in the land of Egypt' reflects the Hebrew wording
    and preserves the geographic-covenantal framing.
- source_word: בַּמִּדְבָּר הַזֶּה
  chosen: in this wilderness
  alternatives:
  - in this desert
  lexicon: HALOT
  rationale: מִדְבָּר in the Pentateuch is conventionally and accurately rendered
    'wilderness,' evoking the specific setting of Israel's journey better than 'desert,'
    which can sound overly topographical.
