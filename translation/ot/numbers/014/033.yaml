id: NUM.14.33
reference: Numbers 14:33
source:
  edition: WLC
  text: וּ֠/בְנֵי/כֶם יִהְי֨וּ רֹעִ֤ים בַּ/מִּדְבָּר֙ אַרְבָּעִ֣ים שָׁנָ֔ה וְ/נָשְׂא֖וּ
    אֶת זְנוּתֵי/כֶ֑ם עַד תֹּ֥ם פִּגְרֵי/כֶ֖ם בַּ/מִּדְבָּֽר־־׃
translation:
  text: And your sons will be shepherds in the wilderness for forty years, and they
    will bear your acts of sexual unfaithfulness until your dead bodies are finished
    off in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wanderers' for 'shepherds'; the Hebrew word is literally related to
      shepherding/pasturing, but some take it as emphasizing their nomadic wandering.
    reason: lexical_alternative
  - marker: b
    text: '''Acts of sexual unfaithfulness'' translates a term that can also be rendered
      ''whoredom'' or more generally ''unfaithfulness,'' using sexual imagery for
      covenant disloyalty.'
    reason: lexical_alternative
  - marker: c
    text: Or 'until your corpses come to an end in the wilderness.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵיכֶם
  chosen: And your sons
  alternatives:
  - And your children
  lexicon: HALOT
  rationale: בנים in the masculine plural normally means 'sons.' Although it can sometimes
    extend to 'children/descendants,' the gender-accurate policy favors 'sons' unless
    context clearly broadens it.
- source_word: יִהְיוּ
  chosen: will be
  lexicon: HALOT
  rationale: Simple future sense of היה in context of announced judgment.
- source_word: רֹעִים
  chosen: shepherds
  alternatives:
  - pasturing
  - wanderers
  lexicon: HALOT
  rationale: From רעה, literally 'shepherding/shepherds.' While some English versions
    use 'wanderers' to convey the nomadic result, the lexical sense is 'shepherds,'
    likely reflecting a pastoral, unsettled existence in the wilderness. The more
    literal term is retained, with the contextual nuance left implicit.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/pastureland rather than only sandy
    desert. 'Wilderness' fits biblical usage and the setting of Israel's wandering.
- source_word: אַרְבָּעִים שָׁנָה
  chosen: for forty years
  lexicon: HALOT
  rationale: Straightforward duration phrase.
- source_word: וְנָשְׂאוּ
  chosen: and they will bear
  alternatives:
  - and they will suffer for
  - and they will carry
  lexicon: HALOT
  rationale: נשא here means 'bear/carry' in the sense of bearing consequences or guilt.
    'Bear' preserves the idiom and moral weight better than a looser paraphrase.
- source_word: אֶת זְנוּתֵיכֶם
  chosen: your acts of sexual unfaithfulness
  alternatives:
  - your whoredom
  - your unfaithfulness
  - your prostitution
  lexicon: HALOT
  rationale: זְנוּת literally refers to fornication/whoredom, but in covenantal contexts
    often denotes faithless disloyalty expressed with sexualized imagery. 'Acts of
    sexual unfaithfulness' preserves the metaphor's force while remaining readable
    modern English.
- source_word: עַד תֹּם
  chosen: until ... are finished off
  alternatives:
  - until the end of
  - until ... come to an end
  lexicon: HALOT
  rationale: The infinitive/verb form from תמם marks completion or coming to an end.
    In context it refers to the full dying off of the condemned generation. 'Are finished
    off' conveys the judicial finality, though the subject is supplied from the following
    noun phrase.
- source_word: פִּגְרֵיכֶם
  chosen: your dead bodies
  alternatives:
  - your corpses
  - your carcasses
  lexicon: HALOT
  rationale: פגר denotes corpse/carcass. 'Dead bodies' is natural modern English and
    suitably grave without sounding overly harsh or archaic.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: Repeated term retained consistently.
