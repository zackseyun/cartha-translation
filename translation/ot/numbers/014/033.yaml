theological_decisions:
- issue: Whether זְנוּתֵיכֶם should be rendered in a purely literal sexual sense or
    as covenantal unfaithfulness
  chosen_reading: Rendered as 'acts of sexual unfaithfulness' to preserve the sexualized
    metaphor while signaling moral/covenantal infidelity.
  alternative_readings:
  - your whoredom
  - your unfaithfulness
  rationale: The context is Israel's rebellion against the LORD, so a purely literal
    sexual reading would be too narrow; but reducing it to 'unfaithfulness' alone
    would flatten the metaphor. The chosen rendering preserves the theological force
    without overinterpreting.
  doctrine_reference: Translation philosophy §3, §6
- issue: Whether רֹעִים should be interpreted dynamically as 'wanderers'
  chosen_reading: Retained the more literal 'shepherds' in the main text.
  alternative_readings:
  - wanderers
  rationale: The Hebrew participle is lexically tied to shepherding/pasturing. The
    consequence of wandering is contextually present, but the source wording should
    govern unless the plain sense becomes misleading. A footnote preserves the common
    dynamic alternative.
  doctrine_reference: Translation philosophy §1, §5
