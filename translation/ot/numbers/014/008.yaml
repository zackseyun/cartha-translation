id: NUM.14.8
reference: Numbers 14:8
source:
  edition: WLC
  text: אִם חָפֵ֥ץ בָּ֨/נוּ֙ יְהוָ֔ה וְ/הֵבִ֤יא אֹתָ֨/נוּ֙ אֶל הָ/אָ֣רֶץ הַ/זֹּ֔את וּ/נְתָנָ֖/הּ לָ֑/נוּ אֶ֕רֶץ אֲשֶׁר הִ֛וא זָבַ֥ת חָלָ֖ב וּ/דְבָֽשׁ־־־׃
translation:
  text: If Yahweh delights in us, he will bring us into this land and give it to us—a land flowing with milk and honey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is pleased with us' or 'favors us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional statement. Although in some contexts it can shade toward 'if indeed' or 'when,' here Caleb/Joshua are expressing a condition tied to the LORD's favor.
- source_word: חָפֵץ בָּנוּ
  chosen: delights in us
  alternatives:
  - is pleased with us
  - takes pleasure in us
  - favors us
  lexicon: HALOT
  rationale: חפץ conveys pleasure, delight, or favorable disposition. 'Delights in us' preserves the personal and affective sense better than the flatter 'favors us,' while remaining natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְהֵבִיא אֹתָנוּ אֶל הָאָרֶץ הַזֹּאת
  chosen: he will bring us into this land
  alternatives:
  - then he will bring us to this land
  - he will bring us to this land
  lexicon: HALOT
  rationale: The waw plus perfect here continues the consequence of the condition. 'Bring us into this land' fits the context of entering and possessing Canaan better than merely 'to this land.' Future sense is appropriate in English.
- source_word: וּנְתָנָהּ לָנוּ
  chosen: and give it to us
  alternatives:
  - and grant it to us
  lexicon: HALOT
  rationale: נתן commonly means 'give.' The pronominal suffix refers back to 'the land,' so 'it' is explicit in English. 'Grant' is possible but less direct.
- source_word: אֶרֶץ
  chosen: a land
  alternatives:
  - land
  lexicon: HALOT
  rationale: The noun is repeated appositionally after the prior mention of 'this land.' Rendering it as 'a land' preserves the Hebrew restatement and leads naturally into the descriptive relative clause.
- source_word: אֲשֶׁר הִוא זָבַת חָלָב וּדְבָשׁ
  chosen: flowing with milk and honey
  alternatives:
  - that flows with milk and honey
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom describing abundance and fertility. 'Flowing with milk and honey' is both accurate and idiomatic in English; the finite relative clause can be smoothed to a participial phrase without loss of meaning.
