theological_decisions:
- issue: Rendering of divine self-reference and covenantal speech
  chosen_reading: Retain first-person divine speech with 'my glory,' 'my signs,' and
    'my voice' without expanding theological explanation.
  rationale: The verse speaks directly in God's voice and does not require interpretive
    expansion. The translation preserves the gravity of divine self-witness while
    avoiding doctrinal overstatement beyond the Hebrew text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gender rendering of הָאֲנָשִׁים
  chosen_reading: all the men
  alternative_readings:
  - all the people
  rationale: The Hebrew is grammatically and contextually male, referring to the judged
    generation's men rather than humanity in general. This follows the gender-accurate
    policy rather than flattening to a neutral collective.
  doctrine_reference: Translation philosophy §4
