id: NUM.14.22
reference: Numbers 14:22
source:
  edition: WLC
  text: כִּ֣י כָל הָ/אֲנָשִׁ֗ים הָ/רֹאִ֤ים אֶת כְּבֹדִ/י֙ וְ/אֶת אֹ֣תֹתַ֔/י אֲשֶׁר
    עָשִׂ֥יתִי בְ/מִצְרַ֖יִם וּ/בַ/מִּדְבָּ֑ר וַ/יְנַסּ֣וּ אֹתִ֗/י זֶ֚ה עֶ֣שֶׂר פְּעָמִ֔ים
    וְ/לֹ֥א שָׁמְע֖וּ בְּ/קוֹלִֽ/י־־־־׃
translation:
  text: For all the men who have seen my glory and my signs that I did in Egypt and
    in the wilderness, and yet have tested me these ten times and have not listened
    to my voice—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have not obeyed my voice.' The Hebrew idiom 'listen to my voice' can
      carry the sense of heeding or obeying.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - surely
  - indeed
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the preceding divine oath/judgment. 'For' fits
    the explanatory force in context better than a mere asseverative 'surely' or causal
    'because' in English verse flow.
- source_word: כָל הָאֲנָשִׁים
  chosen: all the men
  alternatives:
  - all the people
  - all those men
  lexicon: HALOT
  rationale: אָדָם is not used here; אֲנָשִׁים specifically denotes men/persons, and
    in this narrative context refers to the adult males of the generation under judgment.
    Per gender-accurate policy, 'men' is preferred over a neutral expansion.
- source_word: הָרֹאִים
  chosen: who have seen
  alternatives:
  - seeing
  - who saw
  lexicon: HALOT
  rationale: The participle functions substantivally/descriptively. English perfect
    'who have seen' captures the present relevance of their past experience better
    than a simple past.
- source_word: כְּבֹדִי
  chosen: my glory
  alternatives:
  - my majesty
  - my splendor
  lexicon: HALOT
  rationale: כָּבוֹד in divine contexts commonly denotes manifested glory. 'Glory'
    is the standard and theologically weighty rendering.
- source_word: אֹתֹתַי
  chosen: my signs
  alternatives:
  - my miracles
  - my wonders
  lexicon: HALOT
  rationale: אוֹת refers to signs/tokens; 'signs' preserves the evidential function
    of the acts. 'Miracles' is interpretive, and 'wonders' would overlap with a different
    Hebrew term more naturally.
- source_word: אֲשֶׁר עָשִׂיתִי
  chosen: that I did
  alternatives:
  - that I performed
  - which I did
  lexicon: HALOT
  rationale: A straightforward rendering of עשה. 'Did' is idiomatic and avoids over-specifying
    the manner of the acts.
- source_word: בְמִצְרַיִם וּבַמִּדְבָּר
  chosen: in Egypt and in the wilderness
  alternatives:
  - in Egypt and in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the conventional and contextually apt rendering of
    מִדְבָּר in the Exodus narrative, preserving its theological resonance.'
- source_word: וַיְנַסּוּ אֹתִי
  chosen: have tested me
  alternatives:
  - put me to the test
  - tried me
  lexicon: HALOT
  rationale: נסה here means to test/try. 'Have tested me' is clear modern English
    and matches the experiential accusation. 'Put me to the test' is possible but
    heavier.
- source_word: זֶה עֶשֶׂר פְּעָמִים
  chosen: these ten times
  alternatives:
  - ten times
  - now ten times
  lexicon: HALOT
  rationale: The demonstrative זֶה adds deictic force; 'these ten times' preserves
    that emphasis better than simply 'ten times.'
- source_word: וְלֹא שָׁמְעוּ בְּקוֹלִי
  chosen: and have not listened to my voice
  alternatives:
  - and have not obeyed my voice
  - and have not listened to me
  lexicon: HALOT
  rationale: שׁמע בקול often carries the sense of heeding/obeying, but the more literal
    'listened to my voice' preserves the Hebrew idiom while still implying refusal
    to heed. 'Obeyed' is a valid interpretive alternative worth preserving.
