id: NUM.14.28
reference: Numbers 14:28
source:
  edition: WLC
  text: אֱמֹ֣ר אֲלֵ/הֶ֗ם חַי אָ֨נִי֙ נְאֻם יְהוָ֔ה אִם לֹ֕א כַּ/אֲשֶׁ֥ר דִּבַּרְתֶּ֖ם
    בְּ/אָזְנָ֑/י כֵּ֖ן אֶֽעֱשֶׂ֥ה לָ/כֶֽם־־־׃
translation:
  text: Say to them, ‘As I live, declares the LORD, surely just as you have spoken
    in my hearing, so I will do to you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''As I live ... if not''; the expression is an oath formula meaning
      ''surely'' or ''indeed.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  chosen: Say
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Imperative singular of אמר addressed to Moses; 'Say' is the straightforward
    formal rendering in divine speech introduction.
- source_word: אֲלֵהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Standard prepositional phrase indicating the audience of the command.
- source_word: חַי אָ֨נִי
  chosen: As I live
  alternatives:
  - By my life
  - I live
  lexicon: HALOT
  rationale: This is the common divine oath formula. 'As I live' is idiomatic English
    that preserves the solemn self-oath force better than the less natural 'I live.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic/declarative formula. 'Declares the LORD' is natural
    modern English and preserves the formal divine pronouncement. YHWH is rendered
    'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and broad English Bible recognizability.
- source_word: אִם לֹא
  chosen: surely
  alternatives:
  - indeed
  - if not
  lexicon: HALOT
  rationale: In oath contexts אִם לֹא functions idiomatically as a strong asseveration
    rather than a literal conditional negation. 'Surely' best captures the force in
    idiomatic English.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces the comparison between Israel's words and the LORD's action;
    'just as' brings out the exact correspondence.
- source_word: דִּבַּרְתֶּם
  chosen: you have spoken
  alternatives:
  - you spoke
  - you said
  lexicon: HALOT
  rationale: Perfect 2mp referring to their prior complaint. Present perfect in English
    naturally links their past speech to the impending judgment.
- source_word: בְּאָזְנָי
  chosen: in my hearing
  alternatives:
  - in my ears
  - to my ears
  lexicon: HALOT
  rationale: Literal 'in my ears' is a Hebrew idiom; 'in my hearing' is the clearest
    natural English equivalent without loss of meaning.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: 'Marks the corresponding result: what they said will be matched by what
    God does.'
- source_word: אֶעֱשֶׂה לָכֶם
  chosen: I will do to you
  alternatives:
  - I will do for you
  - I will act toward you
  lexicon: HALOT
  rationale: In this judgment context, ל plus pronoun is best rendered 'to you,' indicating
    action directed upon them, not for their benefit.
