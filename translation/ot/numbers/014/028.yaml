theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This follows the stated doctrine
    and standard English convention while signaling the covenant name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the oath formula חַי אָ֨נִי ... אִם לֹא
  chosen_reading: As I live ... surely
  alternative_readings:
  - As I live ... if not
  - By my life ... indeed
  rationale: The Hebrew combines a self-oath formula with an idiomatic asseverative
    particle sequence. Rendering it as a solemn oath plus 'surely' preserves the gravity
    without woodenly reproducing a misleading English conditional.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English,
    not archaic or academic'
