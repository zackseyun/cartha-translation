id: NUM.14.26
reference: Numbers 14:26
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר יְהוָ֔ה אֶל מֹשֶׁ֥ה וְ/אֶֽל אַהֲרֹ֖ן לֵ/אמֹֽר־־׃
translation:
  text: And the LORD spoke to Moses and to Aaron, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive + דבר introduces a new narrative speech event. 'Spoke'
    is the standard and slightly more formal rendering for דבר in divine-address formulas,
    while 'said' is possible but less precise in this formulaic context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name YHWH
    is 'the LORD,' following established reverential convention and the Septuagintal
    pattern.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the addressee of speech. 'To' is the natural modern
    English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: וְאֶל
  chosen: and to
  alternatives:
  - and unto
  lexicon: HALOT
  rationale: The conjunction plus preposition coordinates Aaron as a second addressee.
    Rendering both elements explicitly preserves the Hebrew structure.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Standard English transliteration of the personal name.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: This infinitive construct functions as the standard speech-introduction
    marker following 'spoke.' 'Saying' preserves the formal linkage to the following
    quoted speech in the next verse.
