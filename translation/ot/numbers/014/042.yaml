theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Expression of divine presence in בְּקִרְבְּכֶם
  chosen_reading: the LORD is not among you
  alternative_readings:
  - the LORD is not in your midst
  - the LORD is not with you
  rationale: The verse warns that Israel should not presume covenantal presence after
    rebellion. 'Among you' preserves the communal-presence sense without importing
    stronger theological claims beyond the Hebrew wording.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #6'
