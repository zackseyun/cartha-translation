id: NUM.14.42
reference: Numbers 14:42
source:
  edition: WLC
  text: אַֽל תַּעֲל֔וּ כִּ֛י אֵ֥ין יְהוָ֖ה בְּ/קִרְבְּ/כֶ֑ם וְ/לֹא֙ תִּנָּ֣גְפ֔וּ
    לִ/פְנֵ֖י אֹיְבֵי/כֶֽם־׃
translation:
  text: Do not go up, for the LORD is not among you, lest you be struck down before
    your enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in your midst.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'lest you be defeated before your enemies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not go
  - You must not
  lexicon: HALOT
  rationale: Negative particle used with the following imperfect/jussive to express
    prohibition. 'Do not' is the natural English equivalent.
- source_word: תַּעֲלוּ
  chosen: go up
  alternatives:
  - ascend
  - march up
  lexicon: HALOT
  rationale: From עלה, literally 'go up/ascend.' In military-geographical context
    it can imply advancing uphill or setting out against the land, but 'go up' preserves
    the Hebrew idiom without over-paraphrasing.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition. 'For' is concise and fits
    the warning structure.
- source_word: אֵין
  chosen: is not
  alternatives:
  - there is no
  - is absent from
  lexicon: HALOT
  rationale: Existential negation. With the following subject and prepositional phrase,
    idiomatic English is 'is not among you.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, YHWH is rendered 'the LORD' rather than transliterated.
- source_word: בְּקִרְבְּכֶם
  chosen: among you
  alternatives:
  - in your midst
  - with you
  lexicon: HALOT
  rationale: Literally 'in your midst.' 'Among you' is clear modern English and preserves
    the sense of divine presence within the community. 'With you' is possible but
    slightly less spatially concrete.
- source_word: וְלֹא
  chosen: lest
  alternatives:
  - and not
  - so that not
  lexicon: HALOT
  rationale: Although formally 'and not,' in this warning context it introduces the
    negative consequence to be avoided. English 'lest' best captures the sense without
    awkwardness.
- source_word: תִּנָּגְפוּ
  chosen: you be struck down
  alternatives:
  - you be defeated
  - you fall
  - you be smitten
  lexicon: HALOT
  rationale: Niphal of נגף often denotes being struck, smitten, or defeated in battle.
    'Be struck down' preserves both the passive form and the military/judicial force
    better than the flatter 'be defeated.'
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - before the face of
  lexicon: HALOT
  rationale: 'Standard rendering in battle contexts: being struck down ''before''
    one''s enemies.'
- source_word: אֹיְבֵיכֶם
  chosen: your enemies
  alternatives:
  - those who hate you
  lexicon: HALOT
  rationale: Regular contextual sense of אויב in military narrative is 'enemy/enemies.'
