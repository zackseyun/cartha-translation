id: NUM.14.36
reference: Numbers 14:36
source:
  edition: WLC
  text: וְ/הָ֣/אֲנָשִׁ֔ים אֲשֶׁר שָׁלַ֥ח מֹשֶׁ֖ה לָ/ת֣וּר אֶת הָ/אָ֑רֶץ וַ/יָּשֻׁ֗בוּ
    ו/ילונו עָלָי/ו֙ אֶת כָּל הָ֣/עֵדָ֔ה לְ/הוֹצִ֥יא דִבָּ֖ה עַל הָ/אָֽרֶץ־־־־־׃
translation:
  text: Now the men whom Moses sent to scout out the land returned and caused the
    whole congregation to grumble against him by bringing out a bad report about the
    land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to spy out the land.'
    reason: lexical_alternative
  - marker: b
    text: Or 'spread a bad report about the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאֲנָשִׁים
  chosen: Now the men
  alternatives:
  - And the men
  - As for the men
  lexicon: HALOT
  rationale: The conjunction with the article-noun can be rendered simply 'and the
    men,' but in English narrative this verse resumes and advances the account, so
    'Now the men' gives natural discourse flow without losing the connective force.
- source_word: אֲשֶׁר שָׁלַח מֹשֶׁה
  chosen: whom Moses sent
  alternatives:
  - that Moses had sent
  lexicon: HALOT
  rationale: A straightforward relative clause. English 'whom' fits the object function
    and keeps the syntax clear.
- source_word: לָתוּר אֶת־הָאָרֶץ
  chosen: to scout out the land
  alternatives:
  - to spy out the land
  - to explore the land
  lexicon: HALOT
  rationale: תור in this context refers to reconnaissance of Canaan. 'Scout out' is
    natural modern English and avoids the potentially over-specific or negatively
    loaded 'spy out,' while preserving the investigative sense.
- source_word: וַיָּשֻׁבוּ
  chosen: returned
  alternatives:
  - came back
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of שוב. 'Returned' is concise and fits the
    formal level of the passage.
- source_word: וילונו עָלָיו
  chosen: caused ... to grumble against him
  alternatives:
  - made ... murmur against him
  - caused ... to complain against him
  lexicon: HALOT
  rationale: The form and context indicate not merely that the men themselves complained,
    but that they induced the congregation's complaint against Moses. Rendering with
    causative force best fits the following direct object 'the whole congregation.'
    'Grumble' captures the wilderness-complaint motif better than the flatter 'complain.'
- source_word: אֶת כָּל־הָעֵדָה
  chosen: the whole congregation
  alternatives:
  - all the congregation
  - the entire community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled Israelite community. 'Congregation'
    preserves the corporate sense and matches Pentateuchal usage well.
- source_word: לְהוֹצִיא דִבָּה
  chosen: by bringing out a bad report
  alternatives:
  - by spreading a bad report
  - to bring out an evil report
  lexicon: HALOT
  rationale: The infinitive expresses means or result. 'By bringing out' stays close
    to הוציא while remaining idiomatic. דִבָּה here is a defamatory or discouraging
    report; 'bad report' is clear modern English and traditional enough for this context.
- source_word: עַל־הָאָרֶץ
  chosen: about the land
  alternatives:
  - concerning the land
  - against the land
  lexicon: HALOT
  rationale: The preposition עַל with דִבָּה here indicates the subject matter of
    the report. 'About the land' is the most natural English rendering.
