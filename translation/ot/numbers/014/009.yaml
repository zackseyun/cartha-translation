id: NUM.14.9
reference: Numbers 14:9
source:
  edition: WLC
  text: אַ֣ךְ בַּֽ/יהוָה֮ אַל תִּמְרֹדוּ֒ וְ/אַתֶּ֗ם אַל תִּֽירְאוּ֙ אֶת עַ֣ם הָ/אָ֔רֶץ
    כִּ֥י לַחְמֵ֖/נוּ הֵ֑ם סָ֣ר צִלָּ֧/ם מֵ/עֲלֵי/הֶ֛ם וַֽ/יהוָ֥ה אִתָּ֖/נוּ אַל תִּירָאֻֽ/ם־־־־׃
translation:
  text: Only, do not rebel against the LORD. And do not fear the people of the land,
    for they are our bread; their protection has departed from over them, and the
    LORD is with us. Do not fear them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for they are our food.' The Hebrew says literally, 'they are our bread,'
      a metaphor for easy conquest or being consumed.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'their shadow has departed from over them.' Here 'shadow' likely
      refers to protection or shelter.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Only
  alternatives:
  - Surely
  - Nevertheless
  - But only
  lexicon: HALOT
  rationale: אַךְ here introduces a strong limiting or emphatic qualification to the
    exhortation. 'Only' preserves the force concisely in natural English better than
    a weaker connective like 'but.'
- source_word: בַּיהוָה
  chosen: against the LORD
  alternatives:
  - against Yahweh
  - with respect to the LORD
  lexicon: HALOT
  rationale: With מרד, the preposition ב marks the one against whom rebellion is directed.
    Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: תִּמְרֹדוּ
  chosen: do not rebel
  alternatives:
  - do not revolt
  - do not be rebellious
  lexicon: HALOT
  rationale: מרד denotes rebellion or revolt against authority. 'Do not rebel' is
    the most direct and idiomatic rendering in this covenantal context.
- source_word: תִּירְאוּ / תִּירָאֻם
  chosen: do not fear / do not fear them
  alternatives:
  - do not be afraid of / do not be afraid of them
  lexicon: HALOT
  rationale: ירא in this context refers to fear in the face of enemies. 'Fear' is
    slightly more formal and concise, while remaining natural; the final clause repeats
    the prohibition and is preserved rather than smoothed away.
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the inhabitants of the land
  - the people of that land
  lexicon: HALOT
  rationale: The phrase is literally 'the people of the land.' Although 'inhabitants
    of the land' is interpretive and smooth, the more literal rendering preserves
    the Hebrew expression without obscuring meaning.
- source_word: כִּי לַחְמֵנוּ הֵם
  chosen: for they are our bread
  alternatives:
  - for they are our food
  - for we will devour them like bread
  lexicon: HALOT
  rationale: The Hebrew is metaphorical and terse. 'They are our bread' preserves
    the vivid image and avoids over-expanding the metaphor. Because 'food' is a plausible
    interpretive gloss, it is preserved in a footnote rather than replacing the metaphor
    in the main text.
- source_word: סָר צִלָּם מֵעֲלֵיהֶם
  chosen: their protection has departed from over them
  alternatives:
  - their shadow has turned aside from them
  - their shelter has departed from them
  lexicon: HALOT
  rationale: צֵל literally means 'shadow,' but in context it functions metaphorically
    for protective covering or shelter. Rendering it as 'protection' communicates
    the sense clearly in modern English while retaining the departure imagery with
    'has departed from over them.' The more literal 'shadow' is preserved in a footnote.
- source_word: וַיהוָה אִתָּנוּ
  chosen: and the LORD is with us
  alternatives:
  - but the LORD is with us
  lexicon: HALOT
  rationale: The conjunction is simple waw; 'and' is sufficient. The clause states
    covenantal presence plainly, and no stronger adversative is required in English.
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md, the default rendering of the divine name יְהוָה is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
