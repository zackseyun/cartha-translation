theological_decisions:
- issue: Rendering the metaphor of conquest in כִּי לַחְמֵנוּ הֵם
  chosen_reading: Preserve the metaphor as 'they are our bread' in the main text
  alternative_readings:
  - they are our food
  - we will devour them
  rationale: The text expresses confidence in the LORD's gift of victory through a
    concrete metaphor. Preserving the metaphor avoids paraphrase beyond the source
    text while allowing a clarifying alternative in a footnote.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering צִלָּם metaphorically
  chosen_reading: Translate the sense as 'their protection has departed from over
    them'
  alternative_readings:
  - their shadow has departed from them
  - their shelter has departed from them
  rationale: A strictly literal 'shadow' may obscure the idiom for many modern readers.
    Optimal equivalence favors communicating the metaphor's function while preserving
    the literal alternative in a footnote to maintain auditability and theological
    restraint.
  doctrine_reference: Translation philosophy §6, §3
