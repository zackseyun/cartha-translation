id: NUM.14.4
reference: Numbers 14:4
source:
  edition: WLC
  text: וַ/יֹּאמְר֖וּ אִ֣ישׁ אֶל אָחִ֑י/ו נִתְּנָ֥ה רֹ֖אשׁ וְ/נָשׁ֥וּבָה מִצְרָֽיְמָ/ה־׃
translation:
  text: And they said to one another, “Let us appoint a leader and return to Egypt.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'each man to his brother.' The Hebrew idiom means they spoke
      reciprocally among themselves.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'Let us set a head.' Here 'head' means a person placed over the
      group, that is, a leader.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - So they said
  - Then they said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר advances the narrative. 'And they said' preserves the
    simple sequential force without overinterpreting discourse nuance.
- source_word: אִישׁ אֶל אָחִיו
  chosen: to one another
  alternatives:
  - each man to his brother
  - each to his brother
  lexicon: HALOT
  rationale: The idiom literally reads 'a man to his brother,' but in context it functions
    reciprocally. 'To one another' conveys the sense in natural English while avoiding
    an overly wooden rendering. The masculine singular forms are distributive rather
    than emphasizing maleness.
- source_word: נִתְּנָה
  chosen: Let us appoint
  alternatives:
  - Let us set
  - Let us place
  - Let us give
  lexicon: HALOT
  rationale: 'From נתן in a cohortative first common plural. With רֹאשׁ as its object,
    the sense is idiomatic: to set or appoint someone as head. ''Appoint'' best captures
    the intended action in clear English.'
- source_word: רֹאשׁ
  chosen: a leader
  alternatives:
  - a head
  - a chief
  lexicon: HALOT
  rationale: Although literally 'head,' in this context it denotes a person placed
    in authority. 'Leader' communicates the functional meaning in contemporary English
    better than the more literal but less idiomatic 'head.'
- source_word: וְנָשׁוּבָה
  chosen: and return
  alternatives:
  - and let us return
  - and go back
  lexicon: HALOT
  rationale: Cohortative of שוב coordinated with the previous cohortative. 'And return'
    keeps the hortatory force within the quotation; English does not require repeating
    'let us' after the first verb, though that remains an acceptable alternative.
- source_word: מִצְרָיְמָה
  chosen: to Egypt
  alternatives:
  - back to Egypt
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Egypt. 'To Egypt' is sufficient;
    'back' is contextually implied by 'return' and need not be separately represented.
