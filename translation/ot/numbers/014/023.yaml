id: NUM.14.23
reference: Numbers 14:23
source:
  edition: WLC
  text: אִם יִרְאוּ֙ אֶת הָ/אָ֔רֶץ אֲשֶׁ֥ר נִשְׁבַּ֖עְתִּי לַ/אֲבֹתָ֑/ם וְ/כָל מְנַאֲצַ֖/י
    לֹ֥א יִרְאֽוּ/הָ־־־׃
translation:
  text: they certainly shall not see the land that I swore to their fathers, and none
    of those who despised me shall see it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew literally, ''if they see the land''; in this oath formula, the sense
      is emphatically negative: ''they certainly shall not see the land.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''their ancestors.'' Hebrew: ''their fathers.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: they certainly shall not
  alternatives:
  - surely not
  - if
  lexicon: HALOT
  rationale: Here אִם introduces an oath-like negative after the preceding divine
    declaration, functioning idiomatically as an emphatic negation rather than a conditional
    'if.' English must supply the negation explicitly for natural sense.
- source_word: יִרְאוּ
  chosen: shall see
  alternatives:
  - will see
  - look upon
  lexicon: HALOT
  rationale: ראה in this context means 'see' in the sense of experiencing/entering
    the promised land. 'Shall see' fits the solemn judicial tone.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Numbers, הארץ in this covenantal context refers specifically to the
    promised land, not merely land in general. 'The land' preserves the biblical idiom.
- source_word: נִשְׁבַּעְתִּי
  chosen: I swore
  alternatives:
  - I promised with an oath
  - I took an oath
  lexicon: HALOT
  rationale: The Niphal of שבע carries the sense of swearing an oath. 'I swore' is
    concise, accurate, and preserves covenantal force.
- source_word: לַאֲבֹתָם
  chosen: to their fathers
  alternatives:
  - to their ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'their fathers.' Per gender-accurate policy,
    the masculine familial term is retained rather than neutralized to 'ancestors,'
    though the referent is the forefathers of Israel.
- source_word: וְכָל
  chosen: and none of
  alternatives:
  - and all ... not
  - and every ... not
  lexicon: HALOT
  rationale: With the following negation, English idiom is best expressed as 'and
    none of,' preserving the distributive force without awkwardness.
- source_word: מְנַאֲצַי
  chosen: those who despised me
  alternatives:
  - those who spurned me
  - those who treated me with contempt
  lexicon: HALOT
  rationale: The participle from נאץ denotes despising or spurning with contempt,
    especially toward God. 'Despised me' is direct, readable, and weighty.
- source_word: לֹא יִרְאוּהָ
  chosen: shall see it
  alternatives:
  - will not see it
  - shall not look upon it
  lexicon: HALOT
  rationale: The pronoun suffix refers back to 'the land.' 'Shall see it' keeps the
    repetition from the Hebrew and the judicial emphasis.
