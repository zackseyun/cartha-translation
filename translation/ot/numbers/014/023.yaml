theological_decisions:
- issue: Force of the opening oath formula
  chosen_reading: 'Render as emphatic negation: ''they certainly shall not see'''
  alternative_readings:
  - Render more literally as 'if they see the land,' leaving the oath formula implicit
  rationale: The Hebrew oath construction with אִם is idiomatically negative in context.
    Translating it woodenly as a conditional would obscure the divine judgment and
    misrepresent the sentence's force in English.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of אָבוֹת
  chosen_reading: '''their fathers'' in the main text'
  alternative_readings:
  - '''their ancestors'''
  rationale: The source is grammatically and semantically masculine. Per the gender-accurate
    policy, the translation retains 'fathers' rather than neutralizing the term, while
    recognizing that the covenantal referent is the patriarchal forebears of Israel.
  doctrine_reference: Translation philosophy §4
