theological_decisions:
- issue: Rendering of divine title אֲדֹנָי
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  rationale: The verse uses the divine title אֲדֹנָי, not the Tetragrammaton. The
    project's default for κύριος-like titles is 'Lord'; with the article in English,
    'the Lord' reads naturally in prayer discourse and does not import the covenant-name
    convention reserved for YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Translation
    philosophy §2'
