id: NUM.14.17
reference: Numbers 14:17
source:
  edition: WLC
  text: וְ/עַתָּ֕ה יִגְדַּל נָ֖א כֹּ֣חַ אֲדֹנָ֑/י כַּ/אֲשֶׁ֥ר דִּבַּ֖רְתָּ לֵ/אמֹֽר־׃
translation:
  text: And now, please let the power of the Lord be great, just as you have spoken,
    saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'let the power of the Lord be magnified.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing Moses' appeal. 'And now' preserves
    the connective ו plus the adverb עתה more fully than simply 'Now.'
- source_word: יִגְדַּל
  chosen: let ... be great
  alternatives:
  - be magnified
  - increase
  lexicon: HALOT
  rationale: 'Qal jussive of גדל here expresses a request/wish: ''let ... be great.''
    ''Be magnified'' is possible in a more idiomatic/theological sense, but ''be great''
    stays closer to the Hebrew and fits the prayer context.'
- source_word: נָא
  chosen: please
  alternatives:
  - I pray
  lexicon: HALOT
  rationale: Particle of entreaty softening the petition. 'Please' is natural modern
    English and preserves the supplicatory force without archaism.
- source_word: כֹּחַ
  chosen: power
  alternatives:
  - strength
  - might
  lexicon: HALOT
  rationale: כח denotes strength/power. 'Power' fits the context of divine capacity
    to act in mercy and judgment; 'strength' is possible but slightly less idiomatic
    in English here.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: Title for God. Following the doctrine's default for אדני/κύριος-family
    titles, 'the Lord' is the natural English rendering here.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Comparative conjunction linking the petition to God's prior declaration.
    'Just as' clearly conveys correspondence with what God has said.
- source_word: דִּבַּרְתָּ
  chosen: you have spoken
  alternatives:
  - you spoke
  - you said
  lexicon: HALOT
  rationale: Second masculine singular perfect, addressed to God. Present perfect
    in English works well in context because Moses appeals to a prior statement with
    continuing relevance.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - when you said
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of the divine speech
    in the following verse. Retaining 'saying' preserves the formal linkage to the
    quotation that follows.
