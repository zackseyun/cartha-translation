theological_decisions:
- issue: Whether to make explicit that 'the land' is the promised land of Canaan
  chosen_reading: Retain 'the land' in the main text without adding 'promised' or
    'Canaan.'
  alternative_readings:
  - the promised land
  - the land of Canaan
  rationale: The Hebrew simply says 'the land.' The context makes the referent clear,
    and adding 'promised' or 'Canaan' would import explanatory material not present
    in the verse itself.
  doctrine_reference: Translation philosophy §1, §6
