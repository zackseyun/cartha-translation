id: NUM.14.31
reference: Numbers 14:31
source:
  edition: WLC
  text: וְ/טַ֨פְּ/כֶ֔ם אֲשֶׁ֥ר אֲמַרְתֶּ֖ם לָ/בַ֣ז יִהְיֶ֑ה וְ/הֵבֵיאתִ֣י אֹתָ֔/ם
    וְ/יָֽדְעוּ֙ אֶת הָ/אָ֔רֶץ אֲשֶׁ֥ר מְאַסְתֶּ֖ם בָּֽ/הּ־׃
translation:
  text: But your little ones, whom you said would become plunder, I will bring in,
    and they will know the land that you rejected.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'would be prey' or 'would become spoil.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they will experience the land.' The Hebrew 'know' can carry an experiential
      sense here.
    reason: lexical_alternative
  - marker: c
    text: Or 'that you despised.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טַפְּכֶם
  chosen: your little ones
  alternatives:
  - your children
  - your dependents
  lexicon: HALOT
  rationale: טַף refers to small children or little ones, not merely offspring in
    a broad sense. 'Your little ones' preserves the vulnerability implied in the context
    of the parents' fear for them.
- source_word: לָבַז
  chosen: would become plunder
  alternatives:
  - would be prey
  - would become spoil
  lexicon: HALOT
  rationale: בַּז denotes plunder/spoil taken by an enemy. 'Would become plunder'
    is idiomatic and fits the military context; 'prey' is possible but can sound more
    animalistic in modern English.
- source_word: וְהֵבֵיאתִי אֹתָם
  chosen: I will bring in
  alternatives:
  - I will bring them in
  - I will bring them into it
  lexicon: HALOT
  rationale: The hiphil of בוא here means to cause to enter, with the object 'them'
    and the destination understood from 'the land.' English can naturally omit the
    repeated object after 'bring in' while retaining the sense.
- source_word: וְיָדְעוּ
  chosen: they will know
  alternatives:
  - they will come to know
  - they will experience
  lexicon: HALOT
  rationale: יָדַע commonly means 'know,' but in land/promise contexts it can include
    experiential knowledge. 'They will know' preserves the Hebrew wording while allowing
    the experiential nuance.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Numbers, הָאָרֶץ in this context refers specifically to the promised
    land. 'The land' is the standard and sufficiently clear rendering.
- source_word: מְאַסְתֶּם בָּהּ
  chosen: that you rejected
  alternatives:
  - that you despised
  - that you refused
  lexicon: HALOT
  rationale: מָאַס means to reject, despise, or spurn. 'Rejected' best captures the
    covenantal refusal of the land without overstating emotional contempt; the preposition
    בָּהּ is naturally absorbed in English.
