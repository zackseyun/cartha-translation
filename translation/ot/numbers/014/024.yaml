id: NUM.14.24
reference: Numbers 14:24
source:
  edition: WLC
  text: וְ/עַבְדִּ֣/י כָלֵ֗ב עֵ֣קֶב הָֽיְתָ֞ה ר֤וּחַ אַחֶ֨רֶת֙ עִמּ֔/וֹ וַ/יְמַלֵּ֖א
    אַחֲרָ֑/י וַ/הֲבִֽיאֹתִ֗י/ו אֶל הָ/אָ֨רֶץ֙ אֲשֶׁר בָּ֣א שָׁ֔מָּ/ה וְ/זַרְע֖/וֹ
    יוֹרִשֶֽׁ/נָּה־־׃
translation:
  text: But my servant Caleb, because a different spirit was with him and he followed
    me fully, I will bring him into the land that he entered, and his offspring will
    possess it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'another spirit was with him'; possibly referring to a different disposition
      or attitude from the rest of Israel.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''he filled after me,'' meaning he followed the LORD wholeheartedly
      or completely.'
    reason: lexical_alternative
  - marker: c
    text: Or 'his offspring will inherit it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַבְדִּי
  chosen: But my servant
  alternatives:
  - And my servant
  - But my slave
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively as 'But' because the verse
    contrasts Caleb with the unbelieving generation in the preceding context. עֶבֶד
    commonly means 'servant' or 'slave'; here 'servant' is the natural English rendering
    for a loyal subordinate of God, since bonded-status emphasis is not foregrounded.
- source_word: כָלֵב
  chosen: Caleb
  rationale: Personal name transliterated by standard English convention.
- source_word: עֵקֶב
  chosen: because
  alternatives:
  - since
  - as a consequence of
  lexicon: HALOT
  rationale: Introduces the reason for God's favorable treatment of Caleb. 'Because'
    is the clearest natural English causal connector.
- source_word: הָיְתָה רוּחַ אַחֶרֶת עִמּוֹ
  chosen: a different spirit was with him
  alternatives:
  - another spirit was with him
  - he had a different spirit
  lexicon: HALOT
  rationale: This clause is rendered closely to the Hebrew syntax. 'Different' communicates
    distinction from the rest of Israel. 'Was with him' preserves עִם rather than
    converting too quickly to the idiom 'he had,' though that remains a viable alternative.
- source_word: וַיְמַלֵּא אַחֲרָי
  chosen: and he followed me fully
  alternatives:
  - and he fully followed me
  - and he filled up after me
  lexicon: HALOT
  rationale: The idiom מלא אחרי means to follow fully or wholeheartedly. A literal
    rendering like 'filled after me' would be opaque in English. 'Followed me fully'
    preserves both the metaphorical force and readability.
- source_word: וַהֲבִיאֹתִיו
  chosen: I will bring him
  alternatives:
  - then I will bring him
  - so I will bring him
  lexicon: HALOT
  rationale: The form is a first-person perfect with prefixed conjunction in prophetic/declarative
    context, naturally rendered as a future in English because it expresses God's
    promised action.
- source_word: אֶל הָאָרֶץ אֲשֶׁר בָּא שָׁמָּה
  chosen: into the land that he entered
  alternatives:
  - into the land where he went
  - into the land to which he went
  lexicon: HALOT
  rationale: בוא with שמה refers to Caleb's having gone there previously as a spy.
    'Entered' is concise and idiomatic for coming into a land; it also preserves the
    concrete movement better than the vaguer 'went'.
- source_word: וְזַרְעוֹ
  chosen: and his offspring
  alternatives:
  - and his seed
  - and his descendants
  lexicon: HALOT
  rationale: זֶרַע can mean seed, offspring, or descendants. 'Offspring' is natural
    modern English and can function collectively without sounding overly technical
    or archaic.
- source_word: יוֹרִשֶׁנָּה
  chosen: will possess it
  alternatives:
  - will inherit it
  - will take possession of it
  lexicon: HALOT
  rationale: ירשׁ often carries the sense of inheriting/possessing land. 'Possess
    it' fits the land-promise context well and avoids implying merely passive receipt;
    'inherit it' is also possible and worth preserving as a lexical alternative.
