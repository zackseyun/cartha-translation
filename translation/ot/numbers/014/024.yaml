theological_decisions:
- issue: Meaning of 'a different spirit' in Caleb
  chosen_reading: The phrase is left broad, referring to Caleb's distinct inner disposition
    or attitude of faithful loyalty, without specifying the Holy Spirit as the referent.
  alternative_readings:
  - a different attitude
  - the Spirit of God uniquely with him
  rationale: The Hebrew רוּחַ can denote spirit, disposition, or attitude. The text
    does not explicitly identify the Holy Spirit, so the translation preserves the
    theological openness rather than importing a more specific doctrinal claim.
  doctrine_reference: Preserve theological tension rather than resolve it.
