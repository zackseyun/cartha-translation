theological_decisions:
- issue: Severity and concreteness of the judgment image in פגריכם
  chosen_reading: your dead bodies
  alternative_readings:
  - your corpses
  - your carcasses
  rationale: The verse announces divine judgment on the unbelieving generation. The
    translation should preserve the physical and sobering force of the Hebrew without
    importing extra rhetorical harshness. 'Your dead bodies' is transparent and grave,
    fitting the context.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic; preserve the source text''s plain sense.'
