id: NUM.14.32
reference: Numbers 14:32
source:
  edition: WLC
  text: וּ/פִגְרֵי/כֶ֖ם אַתֶּ֑ם יִפְּל֖וּ בַּ/מִּדְבָּ֥ר הַ/זֶּֽה׃
translation:
  text: But as for you, your dead bodies will fall in this wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your corpses' or 'your carcasses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פִגְרֵי/כֶם
  chosen: your dead bodies
  alternatives:
  - your corpses
  - your carcasses
  lexicon: HALOT
  rationale: פֶּגֶר denotes a dead body/corpse. 'Your dead bodies' is natural modern
    English and preserves the starkness of the judgment without the slightly harsher
    or more archaic feel of 'carcasses.' The prefixed conjunction is carried by the
    clause-level 'But as for you' in context.
- source_word: אַתֶּם
  chosen: as for you
  alternatives:
  - you
  - you yourselves
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. Rendering it simply as 'you' would
    underrepresent the emphasis; 'as for you' brings out the contrastive force in
    idiomatic English.
- source_word: יִפְּלוּ
  chosen: will fall
  alternatives:
  - shall fall
  - will lie fallen
  lexicon: HALOT
  rationale: The verb נפל in this context refers to falling in death. 'Will fall'
    is the straightforward rendering and leaves the death sense to be supplied by
    'dead bodies,' matching the Hebrew expression.
- source_word: בַּ/מִּדְבָּר
  chosen: in this wilderness
  alternatives:
  - in the wilderness
  - in this desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert land. 'Wilderness' is the
    more established and contextually fitting term in Numbers. The preposition and
    article are naturally combined with the following demonstrative in English as
    'in this wilderness.'
- source_word: הַ/זֶּה
  chosen: this
  alternatives:
  - this very
  lexicon: HALOT
  rationale: The demonstrative points to the specific wilderness where Israel presently
    is. 'This' is sufficient; 'this very' would add emphasis beyond what is necessary.
