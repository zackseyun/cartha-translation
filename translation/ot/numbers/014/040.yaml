id: NUM.14.40
reference: Numbers 14:40
source:
  edition: WLC
  text: וַ/יַּשְׁכִּ֣מוּ בַ/בֹּ֔קֶר וַ/יַּֽעֲל֥וּ אֶל רֹאשׁ הָ/הָ֖ר לֵ/אמֹ֑ר הִנֶּ֗/נּוּ וְ/עָלִ֛ינוּ אֶל הַ/מָּק֛וֹם אֲשֶׁר אָמַ֥ר יְהוָ֖ה כִּ֥י חָטָֽאנוּ־־־־׃
translation:
  text: They rose early in the morning and went up to the top of the mountain, saying, “Here we are, and we will go up to the place that Yahweh has spoken of, for we have sinned.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that the LORD said.' The Hebrew verb is simply 'said/spoke'; 'has spoken of' is chosen for natural English in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכִּמוּ
  chosen: They rose early
  alternatives:
  - They got up early
  - They started early
  lexicon: HALOT
  rationale: The Hiphil of שׁכם commonly means to rise early or set out early. 'They rose early' is natural English and preserves the temporal emphasis without unnecessary expansion.
- source_word: בַבֹּקֶר
  chosen: in the morning
  alternatives:
  - at morning
  - early in the morning
  lexicon: HALOT
  rationale: בוקר denotes morning. Combined with וַיַּשְׁכִּמוּ, the phrase idiomatically conveys an early start; 'in the morning' keeps the wording clear while the adverbial force is already carried by 'rose early'.
- source_word: וַיַּעֲלוּ
  chosen: went up
  alternatives:
  - ascended
  - climbed up
  lexicon: HALOT
  rationale: עלה is the standard verb 'go up.' 'Went up' is the most natural modern rendering and fits the mountain setting.
- source_word: אֶל רֹאשׁ הָהָר
  chosen: to the top of the mountain
  alternatives:
  - to the head of the mountain
  - to the summit of the mountain
  lexicon: HALOT
  rationale: The idiom 'head of the mountain' refers to its top or summit. 'Top of the mountain' is idiomatic English and preserves the sense.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: This infinitive introduces direct speech. 'Saying' is a straightforward formal equivalent.
- source_word: הִנֶּנּוּ
  chosen: Here we are
  alternatives:
  - Behold us
  - We are ready
  lexicon: HALOT
  rationale: הִנֵּה with first person plural suffix is a self-presentation formula. 'Here we are' is idiomatic and avoids over-interpreting it as readiness alone.
- source_word: וְעָלִינוּ
  chosen: we will go up
  alternatives:
  - let us go up
  - we are going up
  lexicon: HALOT
  rationale: Though formally a perfect with prefixed conjunction, in this context it expresses intended action following the declaration 'Here we are.' 'We will go up' best captures the volitional/future sense in natural English.
- source_word: אֶל הַמָּקוֹם
  chosen: to the place
  alternatives:
  - to the location
  lexicon: HALOT
  rationale: מקום is the ordinary term for place. No contextual reason warrants a more specialized rendering.
- source_word: אֲשֶׁר אָמַר יְהוָה
  chosen: that the LORD has spoken of
  alternatives:
  - which the LORD said
  - that the LORD promised
  lexicon: HALOT
  rationale: The clause identifies the destination as the place mentioned by YHWH. 'Has spoken of' is smoother than the wooden 'said' and avoids importing the stronger nuance 'promised,' which is interpretive though contextually related.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces the reason for their proposed action: they acknowledge guilt. ''For'' is concise and fits the explanatory sense.'
- source_word: חָטָאנוּ
  chosen: we have sinned
  alternatives:
  - we sinned
  - we were wrong
  lexicon: HALOT
  rationale: חטא means to sin, miss the mark, incur guilt. 'We have sinned' preserves the moral and theological weight better than the weaker 'we were wrong.'
