id: NUM.14.25
reference: Numbers 14:25
source:
  edition: WLC
  text: וְ/הָֽ/עֲמָלֵקִ֥י וְ/הַֽ/כְּנַעֲנִ֖י יוֹשֵׁ֣ב בָּ/עֵ֑מֶק מָחָ֗ר פְּנ֨וּ וּ/סְע֥וּ
    לָ/כֶ֛ם הַ/מִּדְבָּ֖ר דֶּ֥רֶךְ יַם סֽוּף־׃פ
translation:
  text: Now the Amalekites and the Canaanites are living in the valley. Tomorrow turn
    and set out for yourselves into the wilderness by the way of the Red Sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Sea of Reeds.'' Traditionally rendered ''Red Sea.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָעֲמָלֵקִי
  chosen: Now the Amalekites
  alternatives:
  - And the Amalekite
  - The Amalekites
  lexicon: HALOT
  rationale: The singular gentilic with article functions collectively for the people
    group; English idiom prefers the plural 'Amalekites.' The prefixed conjunction
    is rendered 'Now' to mark the explanatory/discursive force in context rather than
    a bare additive 'and.'
- source_word: וְהַכְּנַעֲנִי
  chosen: and the Canaanites
  alternatives:
  - and the Canaanite
  lexicon: HALOT
  rationale: Like the previous gentilic, the singular with article is collective,
    best rendered as the plural people group in English.
- source_word: יוֹשֵׁב
  chosen: are living
  alternatives:
  - dwell
  - sit
  - are dwelling
  lexicon: HALOT
  rationale: The participle denotes ongoing residence. 'Are living' gives natural
    modern English while preserving the durative sense.
- source_word: בָּעֵמֶק
  chosen: in the valley
  alternatives:
  - in the lowland
  - in the plain
  lexicon: HALOT
  rationale: עֵמֶק commonly denotes a valley or low-lying area. 'Valley' is the most
    straightforward and idiomatic rendering here.
- source_word: מָחָר
  chosen: Tomorrow
  alternatives:
  - the next day
  lexicon: HALOT
  rationale: Temporal adverb indicating the following day; 'Tomorrow' is concise and
    natural.
- source_word: פְּנוּ
  chosen: turn
  alternatives:
  - turn back
  - change direction
  lexicon: HALOT
  rationale: Imperative of פנה, here commanding a change of direction. 'Turn' preserves
    the basic verbal force without over-specifying 'back,' which is implied by context
    but not explicit in the verb itself.
- source_word: וּסְעוּ
  chosen: and set out
  alternatives:
  - and journey
  - and depart
  lexicon: HALOT
  rationale: נסע in travel contexts means to pull up camp and move on. 'Set out' captures
    the travel-command sense in readable English.
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for you
  - yourselves
  lexicon: HALOT
  rationale: The dative pronoun is not strictly necessary in English, but here it
    adds emphasis to the command directed to the people. 'For yourselves' preserves
    that nuance without awkwardness.
- source_word: הַמִּדְבָּר
  chosen: the wilderness
  alternatives:
  - the desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes the wilderness region traversed by Israel, not
    necessarily a sand desert. 'Wilderness' is the standard and contextually appropriate
    rendering.
- source_word: דֶּרֶךְ יַם סוּף
  chosen: by the way of the Red Sea
  alternatives:
  - by the way of the Sea of Reeds
  - toward the Red Sea road
  lexicon: HALOT
  rationale: 'דֶּרֶךְ marks route or direction: ''by the way of.'' יַם סוּף is traditionally
    ''Red Sea,'' though more literally ''Sea of Reeds.'' Because this is a well-known
    geographical designation in English, ''Red Sea'' is retained in the main text,
    with the more literal alternative preserved in a footnote for transparency.'
