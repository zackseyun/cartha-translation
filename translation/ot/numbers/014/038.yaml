id: NUM.14.38
reference: Numbers 14:38
source:
  edition: WLC
  text: וִ/יהוֹשֻׁ֣עַ בִּן נ֔וּן וְ/כָלֵ֖ב בֶּן יְפֻנֶּ֑ה חָיוּ֙ מִן הָ/אֲנָשִׁ֣ים
    הָ/הֵ֔ם הַֽ/הֹלְכִ֖ים לָ/ת֥וּר אֶת הָ/אָֽרֶץ־־־־׃
translation:
  text: But Joshua son of Nun and Caleb son of Jephunneh remained alive out of those
    men who had gone to spy out the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to explore the land' or 'to scout the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וִיהוֹשֻׁעַ
  chosen: But Joshua
  alternatives:
  - And Joshua
  - Now Joshua
  lexicon: HALOT
  rationale: The prefixed conjunction here is rendered 'But' to mark the contrast
    with the preceding deaths of the other scouts in context. The personal name is
    transliterated per translation philosophy.
- source_word: בִּן נוּן
  chosen: son of Nun
  lexicon: HALOT
  rationale: Standard filial construction; retained formally and naturally in English.
- source_word: וְכָלֵב בֶּן יְפֻנֶּה
  chosen: and Caleb son of Jephunneh
  lexicon: HALOT
  rationale: The conjunction simply coordinates the second survivor with Joshua. Names
    are transliterated; filial construction retained.
- source_word: חָיוּ
  chosen: remained alive
  alternatives:
  - lived
  - survived
  lexicon: HALOT
  rationale: 'Qal perfect of חיה means ''lived, remained alive.'' ''Remained alive''
    best captures the contrastive sense in context: these two did not die as the others
    did. ''Survived'' is possible but slightly more interpretive.'
- source_word: מִן הָאֲנָשִׁים הָהֵם
  chosen: out of those men
  alternatives:
  - from those men
  - among those men
  lexicon: HALOT
  rationale: מִן here expresses separation from the larger group. 'Out of those men'
    communicates that these two were the exceptions within that set. 'Men' is gender-accurate
    and fits the specific male spies.
- source_word: הַהֹלְכִים
  chosen: who had gone
  alternatives:
  - who went
  - who were going
  lexicon: HALOT
  rationale: The participle functions substantivally/descriptively of the men. In
    English, a relative clause with past perfect fits the retrospective narrative
    context.
- source_word: לָתוּר אֶת הָאָרֶץ
  chosen: to spy out the land
  alternatives:
  - to explore the land
  - to scout the land
  lexicon: HALOT
  rationale: תור in this context refers to the reconnaissance mission into Canaan.
    'Spy out' is the established and contextually precise sense, though not necessarily
    implying covert espionage in every nuance. 'The land' refers to the land under
    discussion, namely Canaan.
