id: NUM.14.16
reference: Numbers 14:16
source:
  edition: WLC
  text: מִ/בִּלְתִּ֞י יְכֹ֣לֶת יְהוָ֗ה לְ/הָבִיא֙ אֶת הָ/עָ֣ם הַ/זֶּ֔ה אֶל הָ/אָ֖רֶץ אֲשֶׁר נִשְׁבַּ֣ע לָ/הֶ֑ם וַ/יִּשְׁחָטֵ֖/ם בַּ/מִּדְבָּֽר־־־׃
translation:
  text: Because Yahweh was not able to bring this people into the land that he swore to them, he slaughtered them in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For lack of the LORD's ability to bring this people into the land that he swore to give them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבִּלְתִּי
  chosen: Because ... not
  alternatives:
  - For lack of
  - Since ... could not
  lexicon: HALOT
  rationale: 'In context this preposition + negative particle introduces the nations'' proposed explanation in v. 16: ''because the LORD was not able...''. English idiom requires distributing the negation with the following infinitive clause rather than rendering woodenly ''from not''.'
- source_word: יְכֹלֶת
  chosen: was able
  alternatives:
  - could
  - had the power
  lexicon: HALOT
  rationale: From יכל, expressing ability/capacity. 'Was able' is clear modern English and preserves the force of alleged inability without adding interpretive nuance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְהָבִיא
  chosen: to bring
  alternatives:
  - to bring in
  - to lead into
  lexicon: HALOT
  rationale: The Hiphil of בוא here means to cause to enter/bring into. 'Bring' is natural and sufficient with the following destination phrase 'into the land'.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: עָם is singular collective. 'This people' preserves the Hebrew number and rhetorical force better than the more idiomatic plural 'these people'.
- source_word: אֶל הָאָרֶץ
  chosen: into the land
  alternatives:
  - to the land
  lexicon: HALOT
  rationale: With הָבִיא, English idiom prefers 'bring ... into the land,' expressing entry into the promised land rather than mere movement toward it.
- source_word: אֲשֶׁר נִשְׁבַּע לָהֶם
  chosen: that he swore to give them
  alternatives:
  - that he swore to them
  - which he promised them with an oath
  lexicon: HALOT
  rationale: 'The verb ''swore'' takes an implied object from context: the land was sworn to them, i.e., sworn to be given to them. Supplying ''to give'' makes the English complete and reflects the covenant-promise sense without overtranslation.'
- source_word: וַיִּשְׁחָטֵם
  chosen: he slaughtered them
  alternatives:
  - he killed them
  - he struck them down
  lexicon: HALOT
  rationale: שׁחט commonly denotes slaughtering/slaying, often with sacrificial or butchering overtones. 'Slaughtered' preserves the severity of the accusation voiced by the nations more accurately than the softer 'killed'.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר in the Pentateuch is conventionally and accurately rendered 'wilderness,' matching the setting of Israel's wandering.
