theological_decisions:
- issue: Rendering the nations' accusation about the LORD's ability
  chosen_reading: Because Yahweh was not able to bring this people into the land...
  alternative_readings:
  - For lack of the LORD's ability to bring this people into the land...
  rationale: The Hebrew presents the content of what the nations would say (cf. v. 15 context), including an apparent claim of divine inability. The translation preserves that rhetorical accusation without softening it into a statement of actual theological limitation.
  doctrine_reference: Preserve theological tension rather than resolve it.
