id: NUM.14.7
reference: Numbers 14:7
source:
  edition: WLC
  text: וַ/יֹּ֣אמְר֔וּ אֶל כָּל עֲדַ֥ת בְּנֵֽי יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר הָ/אָ֗רֶץ אֲשֶׁ֨ר
    עָבַ֤רְנוּ בָ/הּ֙ לָ/ת֣וּר אֹתָ֔/הּ טוֹבָ֥ה הָ/אָ֖רֶץ מְאֹ֥ד מְאֹֽד־־־׃
translation:
  text: And they said to all the congregation of the sons of Israel, “The land through
    which we passed to spy it out is a very, very good land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the assembly of the Israelites.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to explore it' or 'to scout it out.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - And they spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר introducing direct speech; 'said'
    is the natural English rendering.
- source_word: כָּל עֲדַת בְּנֵי יִשְׂרָאֵל
  chosen: all the congregation of the sons of Israel
  alternatives:
  - all the assembly of the Israelites
  - the whole congregation of the people of Israel
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled community or congregation. בְּנֵי
    יִשְׂרָאֵל is rendered more formally as 'sons of Israel' to preserve the source
    expression; 'Israelites' is possible but less transparent to the Hebrew wording.
- source_word: לֵאמֹר
  chosen: omitted as separate English word
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Hebrew speech-introducing infinitive is idiomatic and usually unnecessary
    in English once direct quotation is introduced.
- source_word: הָאָרֶץ
  chosen: The land
  alternatives:
  - the הארץ / country
  lexicon: HALOT
  rationale: Definite reference to Canaan under discussion; 'land' is the standard
    and contextually appropriate rendering.
- source_word: אֲשֶׁר עָבַרְנוּ בָהּ
  chosen: through which we passed
  alternatives:
  - which we went through
  - that we traversed
  lexicon: HALOT
  rationale: עבר with ב conveys passing through a place. 'Through which we passed'
    is natural and preserves the movement sense.
- source_word: לָתוּר אֹתָהּ
  chosen: to spy it out
  alternatives:
  - to explore it
  - to scout it out
  lexicon: HALOT
  rationale: תור in the Numbers spy narrative carries the sense of exploratory reconnaissance.
    'Spy it out' fits the narrative context better than the more neutral 'explore,'
    while remaining idiomatic.
- source_word: טוֹבָה
  chosen: good
  alternatives:
  - pleasant
  - excellent
  lexicon: HALOT
  rationale: Basic adjectival sense is 'good'; stronger English options would over-interpret
    because the intensification is supplied by the following מאד מאד.
- source_word: מְאֹד מְאֹד
  chosen: very, very
  alternatives:
  - exceedingly
  - extremely
  - very much
  lexicon: HALOT
  rationale: The doubled adverb is emphatic. 'Very, very' preserves the repetition
    and rhetorical force better than collapsing it into a single intensified adverb.
