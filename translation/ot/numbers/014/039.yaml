id: NUM.14.39
reference: Numbers 14:39
source:
  edition: WLC
  text: וַ/יְדַבֵּ֤ר מֹשֶׁה֙ אֶת הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה אֶֽל כָּל בְּנֵ֖י יִשְׂרָאֵ֑ל
    וַ/יִּֽתְאַבְּל֥וּ הָ/עָ֖ם מְאֹֽד־־־׃
translation:
  text: Moses spoke these words to all the sons of Israel, and the people mourned
    greatly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to all the Israelites' or traditionally 'to all the children of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - told
  - declared
  lexicon: HALOT
  rationale: The piel wayyiqtol of דבר here introduces Moses' communication of the
    divine judgment. 'Spoke' is the most direct and natural rendering, preserving
    the verbal act without adding interpretive nuance such as 'declared.'
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - this message
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words,' 'matters,' or 'things.' In this context Moses
    is reporting the preceding divine pronouncement, so 'these words' keeps the verbal
    sense and remains close to the Hebrew.
- source_word: אֶל כָּל בְּנֵי יִשְׂרָאֵל
  chosen: to all the sons of Israel
  alternatives:
  - to all the Israelites
  - to all the children of Israel
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל is the standard covenantal ethnonym. Following the
    project's gender-accurate principle, 'sons of Israel' preserves the Hebrew form
    more closely than 'Israelites,' while remaining understandable in English.
- source_word: וַיִּתְאַבְּלוּ
  chosen: mourned
  alternatives:
  - grieved
  - lamented
  lexicon: HALOT
  rationale: The hitpael of אבל denotes entering a state of mourning. 'Mourned' best
    captures the communal sorrow expressed in response to the judgment, stronger and
    more specific than the broader 'grieved.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עָם commonly refers to the people as a collective body. 'The people'
    is the natural English equivalent here.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: HALOT
  rationale: מְאֹד intensifies the mourning. 'Greatly' is idiomatic with 'mourned'
    and preserves the force without sounding archaic.
