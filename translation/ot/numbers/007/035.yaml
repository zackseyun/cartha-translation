id: NUM.7.35
reference: Numbers 7:35
source:
  edition: WLC
  text: וּ/לְ/זֶ֣בַח הַ/שְּׁלָמִים֮ בָּקָ֣ר שְׁנַיִם֒ אֵילִ֤ם חֲמִשָּׁה֙ עַתֻּדִ֣ים
    חֲמִשָּׁ֔ה כְּבָשִׂ֥ים בְּנֵֽי שָׁנָ֖ה חֲמִשָּׁ֑ה זֶ֛ה קָרְבַּ֥ן אֱלִיצ֖וּר בֶּן
    שְׁדֵיאֽוּר־־׃פ
translation:
  text: 'and for the sacrifice of peace offerings: two cattle, five rams, five male
    goats, and five male lambs a year old. This was the offering of Elizur son of
    Shedeur.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  chosen: and for the sacrifice of
  alternatives:
  - and for a sacrifice of
  - and as a sacrifice of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition introduce another item in the
    list of offerings. 'For the sacrifice of' is natural English and preserves the
    construction's enumerative function in the larger passage.
- source_word: הַשְּׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is the standard sacrificial term traditionally rendered 'peace
    offerings.' This preserves continuity with Levitical sacrificial terminology while
    remaining understandable. Alternatives are possible, but 'peace offerings' best
    matches established cultic usage.
- source_word: בָּקָר שְׁנַיִם
  chosen: two cattle
  alternatives:
  - two oxen
  - two head of cattle
  lexicon: HALOT
  rationale: בָּקָר is a collective term for bovine livestock. 'Two cattle' is concise
    and sufficiently literal in a sacrificial inventory. 'Two oxen' is more specific
    than the Hebrew requires.
- source_word: אֵילִם חֲמִשָּׁה
  chosen: five rams
  lexicon: HALOT
  rationale: אֵילִם clearly denotes male sheep, 'rams.'
- source_word: עַתֻּדִים חֲמִשָּׁה
  chosen: five male goats
  alternatives:
  - five goats
  lexicon: HALOT
  rationale: עַתּוּדִים refers specifically to male goats, often he-goats prepared
    for sacrifice. Including 'male' preserves the lexical specificity of the Hebrew.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  chosen: five male lambs a year old
  alternatives:
  - five one-year-old lambs
  - five lambs in their first year
  lexicon: HALOT
  rationale: כְּבָשִׂים are male lambs; בְּנֵי שָׁנָה literally means 'sons of a year,'
    idiomatically 'a year old' or 'one year old.' The chosen rendering preserves both
    age and sex.
- source_word: זֶה קָרְבַּן
  chosen: This was the offering of
  alternatives:
  - This is the offering of
  - This was the gift of
  lexicon: HALOT
  rationale: 'In this repetitive narrative formula, English idiom favors past tense:
    ''This was the offering of.'' קָרְבָּן is a general term for an offering brought
    near to God.'
- source_word: אֱלִיצוּר בֶּן שְׁדֵיאוּר
  chosen: Elizur son of Shedeur
  alternatives:
  - Elizur the son of Shedeur
  rationale: Personal names are transliterated per project philosophy. 'Son of' is
    the standard rendering of the patronymic.
