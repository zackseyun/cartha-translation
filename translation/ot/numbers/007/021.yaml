id: NUM.7.21
reference: Numbers 7:21
source:
  edition: WLC
  text: פַּ֣ר אֶחָ֞ד בֶּן בָּקָ֗ר אַ֧יִל אֶחָ֛ד כֶּֽבֶשׂ אֶחָ֥ד בֶּן שְׁנָת֖/וֹ לְ/עֹלָֽה־־־׃
translation:
  text: one bull from the herd, one ram, one male lamb a year old, for a burnt offering;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'one bull, son of the herd.' The Hebrew idiom means a bovine
      animal from the herd.
    reason: lexical_alternative
  - marker: b
    text: Or 'one lamb in its first year.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּר
  chosen: bull
  alternatives:
  - young bull
  - ox
  lexicon: HALOT
  rationale: פַּר denotes a bull/young bull. 'Bull' is the most natural sacrificial-animal
    term in English here and fits the offering list.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: The repeated numeral structures the inventory of offerings; rendering
    each occurrence as 'one' preserves the formal listing style.
- source_word: בֶּן בָּקָר
  chosen: from the herd
  alternatives:
  - a young bull
  - a bull, a son of cattle
  lexicon: HALOT
  rationale: The construct literally means 'son of cattle,' an idiom for bovine stock/herd
    animal. In English sacrificial context, 'bull from the herd' is idiomatic and
    clear without wooden literalism.
- source_word: אַיִל
  chosen: ram
  lexicon: HALOT
  rationale: Standard term for an adult male sheep, especially in sacrificial lists;
    'ram' is the precise English equivalent.
- source_word: כֶּבֶשׂ
  chosen: male lamb
  alternatives:
  - lamb
  lexicon: HALOT
  rationale: כֶּבֶשׂ refers to a lamb; 'male lamb' makes explicit the masculine singular
    form and matches the sacrificial specification.
- source_word: בֶּן שְׁנָתוֹ
  chosen: a year old
  alternatives:
  - in its first year
  - the son of its year
  lexicon: HALOT
  rationale: This idiom specifies age. 'A year old' is clear modern English and accurately
    conveys the sacrificial requirement.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. 'Burnt offering'
    is the established and accurate rendering; 'for' reflects the prefixed ל naturally
    in this list context.
