id: NUM.7.25
reference: Numbers 7:25
source:
  edition: WLC
  text: קָרְבָּנ֞/וֹ קַֽעֲרַת כֶּ֣סֶף אַחַ֗ת שְׁלֹשִׁ֣ים וּ/מֵאָה֮ מִשְׁקָלָ/הּ֒ מִזְרָ֤ק
    אֶחָד֙ כֶּ֔סֶף שִׁבְעִ֥ים שֶׁ֖קֶל בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ שְׁנֵי/הֶ֣ם מְלֵאִ֗ים
    סֹ֛לֶת בְּלוּלָ֥ה בַ/שֶּׁ֖מֶן לְ/מִנְחָֽה־׀׃
translation:
  text: His offering was one silver plate, its weight one hundred thirty shekels,
    one silver basin of seventy shekels, by the shekel of the sanctuary; both of them
    were full of fine flour mixed with oil for a grain offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one silver dish' for 'one silver plate.'
    reason: lexical_alternative
  - marker: b
    text: Or 'one silver bowl' for 'one silver basin.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'by the shekel of the sanctuary,' that is, according to the sanctuary
      standard weight.
    reason: cultural_note
lexical_decisions:
- source_word: קָרְבָּנוֹ
  chosen: His offering was
  alternatives:
  - His gift was
  - His offering
  lexicon: HALOT
  rationale: קָרְבָּן denotes an offering/presentation brought near in a cultic context.
    'Offering' is the standard clear English equivalent here. Supplying 'was' yields
    natural English in this inventory formula.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  chosen: one silver plate
  alternatives:
  - one silver dish
  - one silver platter
  lexicon: HALOT
  rationale: קַעֲרָה refers to a dish/plate used in offerings. 'Plate' fits the likely
    shallow vessel and reads naturally in English; 'dish' is possible but slightly
    less specific.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  chosen: its weight one hundred thirty shekels
  alternatives:
  - weighing one hundred thirty shekels
  lexicon: HALOT
  rationale: The Hebrew literally states 'thirty and a hundred, its weight.' English
    idiom reverses to 'one hundred thirty.' Retaining 'its weight' preserves the formal
    inventory style.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  chosen: one silver basin
  alternatives:
  - one silver bowl
  lexicon: HALOT
  rationale: מִזְרָק is a vessel used for sprinkling or ritual handling, often rendered
    'bowl' or 'basin.' 'Basin' better distinguishes it from a common eating bowl and
    suits cultic usage.
- source_word: שִׁבְעִים שֶׁקֶל
  chosen: of seventy shekels
  alternatives:
  - weighing seventy shekels
  lexicon: HALOT
  rationale: This continues the vessel description with its weight. 'Of seventy shekels'
    is concise and idiomatic when attached to 'basin.'
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the shekel of the sanctuary
  alternatives:
  - according to the sanctuary shekel
  - by the sanctuary shekel
  lexicon: HALOT
  rationale: The phrase specifies the standard of weight. 'By the shekel of the sanctuary'
    is a fairly formal but clear rendering that preserves the Hebrew construction.
- source_word: שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - both
  lexicon: HALOT
  rationale: The pronoun explicitly refers to the two vessels. 'Both of them' preserves
    the emphasis and referential clarity.
- source_word: מְלֵאִים
  chosen: were full of
  alternatives:
  - full
  lexicon: HALOT
  rationale: Predicate adjective in Hebrew is naturally rendered with an English copula.
    'Were full of' makes the sentence complete and clear.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: סֹלֶת is the standard term for fine flour used in offerings. 'Fine flour'
    is the conventional and accurate rendering.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: The passive participle indicates flour prepared by mixing with oil. 'Mixed
    with oil' is modern and precise.
- source_word: לְמִנְחָה
  chosen: for a grain offering
  alternatives:
  - for an offering
  - for a tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in priestly sacrificial context specifically denotes the grain
    offering. This is more precise than the generic 'offering' and avoids flattening
    cultic terminology.
