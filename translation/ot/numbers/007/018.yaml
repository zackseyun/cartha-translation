id: NUM.7.18
reference: Numbers 7:18
source:
  edition: WLC
  text: בַּ/יּוֹם֙ הַ/שֵּׁנִ֔י הִקְרִ֖יב נְתַנְאֵ֣ל בֶּן צוּעָ֑ר נְשִׂ֖יא יִשָּׂשכָֽר־׃
translation:
  text: On the second day Nethanel son of Zuar, the leader of Issachar, presented
    his offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew simply says 'presented'; 'his offering' is supplied from the repeated
      context of Numbers 7, where each tribal leader presents an offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַשֵּׁנִי
  chosen: On the second day
  alternatives:
  - On day two
  - On the second day of dedication
  lexicon: HALOT
  rationale: The preposition ב plus יוֹם with the ordinal yields a temporal phrase.
    'On the second day' is the natural English equivalent and matches the narrative
    sequence without adding information not explicit in this verse.
- source_word: הִקְרִיב
  chosen: presented his offering
  alternatives:
  - brought near
  - presented
  - offered
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial/dedication contexts commonly means to
    present or offer an offering. Since the direct object is omitted here but supplied
    by the immediate context of the repeated dedication formula in Numbers 7, 'presented
    his offering' makes the English idiomatic while reflecting the cultic sense. A
    more literal 'presented' is possible but sounds incomplete in English.
- source_word: נְתַנְאֵל
  chosen: Nethanel
  alternatives:
  - Netanel
  rationale: Personal names are transliterated by standard English biblical convention
    per project philosophy.
- source_word: בֶּן צוּעָר
  chosen: son of Zuar
  rationale: Standard filial construction; 'son of' is retained as the normal biblical
    genealogical formula.
- source_word: נְשִׂיא
  chosen: the leader
  alternatives:
  - chief
  - prince
  - tribal leader
  lexicon: HALOT
  rationale: נָשִׂיא in tribal contexts denotes a recognized leader or chief. 'Prince'
    is traditional but misleading in modern English because it suggests royalty. 'The
    leader' is clear and fits the appositional structure with Issachar.
- source_word: יִשָּׂשכָר
  chosen: Issachar
  rationale: Tribal/personal name is transliterated by standard convention.
