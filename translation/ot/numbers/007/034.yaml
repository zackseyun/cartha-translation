id: NUM.7.34
reference: Numbers 7:34
source:
  edition: WLC
  text: שְׂעִיר עִזִּ֥ים אֶחָ֖ד לְ/חַטָּֽאת־׃
translation:
  text: one male goat for a sin offering;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'one he-goat of the goats for a sin offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  chosen: male goat
  alternatives:
  - goat
  - buck goat
  - he-goat
  lexicon: HALOT
  rationale: The construct phrase literally denotes a hairy one of the goats, an idiomatic
    Hebrew expression for a male goat. 'Male goat' is clear modern English and preserves
    the sacrificial-animal specificity better than the more archaic 'he-goat.'
- source_word: אֶחָד
  chosen: one
  alternatives:
  - a single
  - one [animal]
  lexicon: HALOT
  rationale: The numeral is retained explicitly, matching the repetitive enumerative
    style of Numbers 7 and preserving the formal inventory structure of the offerings.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly refers to the sin offering rather
    than abstract 'sin.' The prefixed ל is naturally rendered 'for' here in an offering
    list. 'For a sin offering' is idiomatic and contextually precise.
