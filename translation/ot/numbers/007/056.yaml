id: NUM.7.56
reference: Numbers 7:56
source:
  edition: WLC
  text: כַּ֥ף אַחַ֛ת עֲשָׂרָ֥ה זָהָ֖ב מְלֵאָ֥ה קְטֹֽרֶת׃
translation:
  text: one gold dish weighing ten shekels, full of incense;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'one gold dish, ten [shekels], full of incense.' The Hebrew leaves
      the weight unit implicit here, but in this repeated offering formula the sense
      is ten shekels.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  chosen: dish
  alternatives:
  - pan
  - bowl
  - spoon
  lexicon: HALOT
  rationale: In the tabernacle-offering context of Numbers 7, כף refers to a small
    vessel/container used for incense rather than a literal 'palm.' English 'dish'
    is natural and fits the cultic inventory context. 'Spoon' is traditional in some
    versions, but can mislead modern readers toward eating utensils; 'pan' or 'bowl'
    are possible but less idiomatic here.
- source_word: אַחַת
  chosen: one
  lexicon: HALOT
  rationale: Simple cardinal numeral agreeing with the feminine noun כף.
- source_word: עֲשָׂרָה
  chosen: ten
  lexicon: HALOT
  rationale: Cardinal numeral modifying the implied weight measure. In this repeated
    formula in Numbers 7, the sense is 'ten [shekels].' English requires the measure
    to be supplied for clarity.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: 'Material of the vessel: ''gold.'''
- source_word: מְלֵאָה
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Predicate adjective describing the vessel's contents. 'Full of' is concise
    and natural English.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard rendering for the aromatic offering substance used in worship.
