id: NUM.7.75
reference: Numbers 7:75
source:
  edition: WLC
  text: פַּ֣ר אֶחָ֞ד בֶּן בָּקָ֗ר אַ֧יִל אֶחָ֛ד כֶּֽבֶשׂ אֶחָ֥ד בֶּן שְׁנָת֖/וֹ לְ/עֹלָֽה־־־׃
translation:
  text: one bull from the herd, one ram, one male lamb a year old, for a burnt offering;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פַּר
  chosen: bull
  alternatives:
  - young bull
  - ox
  lexicon: HALOT
  rationale: פַּר denotes a bull/young bull. 'Bull' is the most natural sacrificial-animal
    term in English here.
- source_word: בֶּן בָּקָר
  chosen: from the herd
  alternatives:
  - a young bull
  - son of the herd
  lexicon: HALOT
  rationale: The construct phrase literally means 'son of cattle/herd' and idiomatically
    specifies a bovine from the herd. Rendering it 'from the herd' preserves the distinction
    without wooden literalism.
- source_word: אַיִל
  chosen: ram
  lexicon: HALOT
  rationale: Standard sacrificial term for an adult male sheep; 'ram' is the precise
    English equivalent.
- source_word: כֶּבֶשׂ
  chosen: male lamb
  alternatives:
  - lamb
  lexicon: HALOT
  rationale: כֶּבֶשׂ refers to a lamb, typically male in sacrificial contexts. 'Male
    lamb' makes the sacrificial specification explicit in English.
- source_word: בֶּן שְׁנָתוֹ
  chosen: a year old
  alternatives:
  - in its first year
  - the son of its year
  lexicon: HALOT
  rationale: This idiom denotes an animal one year old. 'A year old' is clear modern
    English and fits the sacrificial formula.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. 'For a burnt
    offering' reflects the prefixed ל and reads naturally in the list format.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Repeated numeral marking each animal count should be preserved explicitly
    in the offering inventory.
