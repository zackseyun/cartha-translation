id: NUM.7.48
reference: Numbers 7:48
source:
  edition: WLC
  text: בַּ/יּוֹם֙ הַ/שְּׁבִיעִ֔י נָשִׂ֖יא לִ/בְנֵ֣י אֶפְרָ֑יִם אֱלִֽישָׁמָ֖ע בֶּן
    עַמִּיהֽוּד־׃
translation:
  text: On the seventh day, the leader of the sons of Ephraim was Elishama son of
    Ammihud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leader for the sons of Ephraim.' The Hebrew preposition can be understood
      as marking relation or representation.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  chosen: On the seventh day
  alternatives:
  - On day seven
  - On the seventh
  lexicon: HALOT
  rationale: The preposition ב plus יוֹם with the ordinal gives a temporal expression.
    'On the seventh day' is the most natural and precise English rendering.
- source_word: נָשִׂיא
  chosen: leader
  alternatives:
  - chief
  - prince
  - chieftain
  lexicon: HALOT
  rationale: In Numbers 7 this term refers to the tribal head presenting offerings.
    'Leader' is clear modern English and fits the administrative/representative role
    better than the archaic or potentially misleading 'prince.'
- source_word: לִבְנֵי אֶפְרָיִם
  chosen: of the sons of Ephraim
  alternatives:
  - for the sons of Ephraim
  - of the people of Ephraim
  - of Ephraim
  lexicon: HALOT
  rationale: The ל marks relation here with נָשִׂיא, indicating the one who is leader
    for/of the tribal descendants. 'Of the sons of Ephraim' preserves the Hebrew filial
    expression and the gender-accurate wording required by the translation philosophy.
- source_word: אֱלִישָׁמָע
  chosen: Elishama
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: בֶּן עַמִּיהוּד
  chosen: son of Ammihud
  alternatives:
  - the son of Ammihud
  rationale: Standard Hebrew patronymic construction. 'Son of Ammihud' is the natural
    English equivalent and preserves the genealogical identification.
