id: NUM.7.4
reference: Numbers 7:4
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: Then Yahweh said to Moses,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And the LORD said to Moses, saying.'' The initial conjunction may also be rendered ''And,'' and the final ''saying'' introduces the speech in the following verse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר advances the narrative. 'Then' gives natural English narrative progression while preserving the sequential force; 'And' is possible but less idiomatic here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks direction toward Moses; 'to' is the clear modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - ''
  - as follows
  lexicon: HALOT
  rationale: The infinitive introduces the following divine speech. Retaining 'saying' preserves the Hebrew discourse formula, even though English can omit it. Because the next verse contains the content, keeping the formula here best reflects the source text.
