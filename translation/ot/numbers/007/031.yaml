id: NUM.7.31
reference: Numbers 7:31
source:
  edition: WLC
  text: קָרְבָּנ֞/וֹ קַֽעֲרַת כֶּ֣סֶף אַחַ֗ת שְׁלֹשִׁ֣ים וּ/מֵאָה֮ מִשְׁקָלָ/הּ֒ מִזְרָ֤ק
    אֶחָד֙ כֶּ֔סֶף שִׁבְעִ֥ים שֶׁ֖קֶל בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ שְׁנֵי/הֶ֣ם מְלֵאִ֗ים
    סֹ֛לֶת בְּלוּלָ֥ה בַ/שֶּׁ֖מֶן לְ/מִנְחָֽה־׀׃
translation:
  text: His offering was one silver plate, its weight one hundred thirty shekels,
    one silver basin of seventy shekels, by the sanctuary shekel; both of them were
    full of fine flour mixed with oil for a grain offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dish' for 'plate' (Hebrew קַעֲרָה), a ritual vessel.
    reason: lexical_alternative
  - marker: b
    text: Or 'bowl' for 'basin' (Hebrew מִזְרָק), a vessel associated with sacrificial
      use.
    reason: lexical_alternative
  - marker: c
    text: That is, according to the standard sanctuary weight.
    reason: cultural_note
lexical_decisions:
- source_word: קָרְבָּנוֹ
  chosen: His offering was
  alternatives:
  - his gift
  - his offering
  lexicon: HALOT
  rationale: קָרְבָּן denotes an offering/presentation brought for cultic use. 'Offering'
    is the standard and clearest English equivalent in this sacrificial context.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  chosen: one silver plate
  alternatives:
  - one silver dish
  - one silver platter
  lexicon: HALOT
  rationale: קַעֲרָה refers to a dish/plate used in ritual contexts. 'Plate' fits
    the likely shallow vessel here and reads naturally in English.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  chosen: its weight one hundred thirty shekels
  alternatives:
  - weighing one hundred thirty shekels
  lexicon: HALOT
  rationale: The Hebrew literally states 'its weight [was] one hundred and thirty.'
    The chosen rendering preserves the explicit noun 'weight' while remaining idiomatic.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  chosen: one silver basin
  alternatives:
  - one silver bowl
  lexicon: HALOT
  rationale: מִזְרָק is a vessel used for sprinkling or holding sacrificial materials.
    'Basin' better conveys a functional ritual vessel than the more domestic-sounding
    'bowl'.
- source_word: שִׁבְעִים שֶׁקֶל
  chosen: of seventy shekels
  alternatives:
  - weighing seventy shekels
  lexicon: HALOT
  rationale: This phrase gives the weight of the basin. 'Of seventy shekels' is concise
    and natural following the vessel description.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the sanctuary shekel
  alternatives:
  - according to the sanctuary shekel
  - by the holy shekel
  lexicon: HALOT
  rationale: This standard formula specifies the cultic weight standard. 'By the sanctuary
    shekel' is clear, compact, and faithful to the Hebrew.
- source_word: שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - both
  lexicon: HALOT
  rationale: The pronoun explicitly refers to the two vessels. 'Both of them' preserves
    the explicitness of the Hebrew.
- source_word: מְלֵאִים
  chosen: were full of
  alternatives:
  - full of
  lexicon: HALOT
  rationale: Supplying 'were' makes a complete English clause while reflecting the
    predicative adjective.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: סֹלֶת is the standard term for fine flour used in offerings; 'fine flour'
    is the conventional and accurate rendering.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: The passive participle indicates flour combined with oil. 'Mixed with
    oil' is natural modern English without loss of meaning.
- source_word: לְמִנְחָה
  chosen: for a grain offering
  alternatives:
  - for an offering
  - for a tribute offering
  lexicon: HALOT
  rationale: In priestly sacrificial context, מִנְחָה specifically denotes the grain
    offering. This rendering preserves the cultic sense rather than using the broader
    'offering'.
