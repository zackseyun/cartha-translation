id: NUM.7.61
reference: Numbers 7:61
source:
  edition: WLC
  text: קָרְבָּנ֞/וֹ קַֽעֲרַת כֶּ֣סֶף אַחַ֗ת שְׁלֹשִׁ֣ים וּ/מֵאָה֮ מִשְׁקָלָ/הּ֒ מִזְרָ֤ק
    אֶחָד֙ כֶּ֔סֶף שִׁבְעִ֥ים שֶׁ֖קֶל בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ שְׁנֵי/הֶ֣ם מְלֵאִ֗ים
    סֹ֛לֶת בְּלוּלָ֥ה בַ/שֶּׁ֖מֶן לְ/מִנְחָֽה־׀׃
translation:
  text: His offering was one silver plate, its weight one hundred thirty shekels,
    one silver basin of seventy shekels, by the shekel of the sanctuary; both of them
    full of fine flour mixed with oil for a grain offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dish' for 'plate' (קַעֲרָה).
    reason: lexical_alternative
  - marker: b
    text: Or 'bowl' for 'basin' (מִזְרָק), a vessel used in sanctuary service.
    reason: lexical_alternative
  - marker: c
    text: '''By the shekel of the sanctuary'' means according to the sanctuary''s
      standard weight.'
    reason: cultural_note
lexical_decisions:
- source_word: קָרְבָּנוֹ
  chosen: His offering was
  alternatives:
  - his gift
  - his offering
  lexicon: HALOT
  rationale: קָרְבָּן denotes an offering/presentation brought near in a cultic context.
    'Offering' is the standard clear English rendering here; adding 'was' supplies
    natural English syntax for the nominal list.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  chosen: one silver plate
  alternatives:
  - one silver dish
  - one silver platter
  lexicon: HALOT
  rationale: קַעֲרָה is a shallow vessel/dish. 'Plate' fits the likely shape and keeps
    the inventory style concise. 'Dish' is possible, but 'plate' reads more naturally
    in modern English.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  chosen: its weight one hundred thirty shekels
  alternatives:
  - weighing one hundred thirty shekels
  lexicon: HALOT
  rationale: The Hebrew literally states 'its weight [was] one hundred and thirty.'
    The chosen rendering preserves the explicit noun 'weight' while remaining idiomatic.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  chosen: one silver basin
  alternatives:
  - one silver bowl
  lexicon: HALOT
  rationale: מִזְרָק is a vessel used in sacrificial service, often for tossing/sprinkling
    blood or holding offerings. 'Basin' better reflects a cultic vessel than the more
    domestic-sounding 'bowl,' though 'bowl' is a viable alternative.
- source_word: שִׁבְעִים שֶׁקֶל
  chosen: of seventy shekels
  alternatives:
  - weighing seventy shekels
  lexicon: HALOT
  rationale: This continues the vessel specification by weight. 'Of seventy shekels'
    is compact and natural in the inventory formula.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the shekel of the sanctuary
  alternatives:
  - according to the sanctuary shekel
  - by the holy shekel
  lexicon: HALOT
  rationale: This standard Pentateuchal phrase specifies the cultic standard of weight.
    'By the shekel of the sanctuary' is transparent and fairly formal without sounding
    archaic.
- source_word: שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - both
  lexicon: HALOT
  rationale: The pronoun explicitly refers to the two vessels. 'Both of them' preserves
    the emphasis slightly more fully than bare 'both.'
- source_word: מְלֵאִים
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Predicate adjective describing the vessels' contents. 'Full of' is the
    most direct equivalent.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: Standard rendering for the refined flour used in offerings.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: בָּלַל in the passive participial form indicates flour combined with
    oil. 'Mixed with oil' is clear modern English; 'mingled' is more traditional but
    less natural.
- source_word: לְמִנְחָה
  chosen: for a grain offering
  alternatives:
  - for an offering
  - for a tribute offering
  lexicon: HALOT
  rationale: In priestly sacrificial context, מִנְחָה specifically denotes the grain
    offering. This is more precise than the generic 'offering.'
