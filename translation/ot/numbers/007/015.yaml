id: NUM.7.15
reference: Numbers 7:15
source:
  edition: WLC
  text: פַּ֣ר אֶחָ֞ד בֶּן בָּקָ֗ר אַ֧יִל אֶחָ֛ד כֶּֽבֶשׂ אֶחָ֥ד בֶּן שְׁנָת֖/וֹ לְ/עֹלָֽה־־־׃
translation:
  text: one bull from the herd, one ram, one male lamb a year old, for a burnt offering;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פַּר
  chosen: bull
  alternatives:
  - young bull
  - bullock
  lexicon: HALOT
  rationale: פַּר denotes a bull/young bull. 'Bull' is the most natural modern English
    rendering in sacrificial lists and avoids the archaic 'bullock.'
- source_word: בֶּן בָּקָר
  chosen: from the herd
  alternatives:
  - a young bull
  - son of the herd
  lexicon: HALOT
  rationale: The construct phrase literally means 'son of cattle/herd' and idiomatically
    specifies the animal as bovine. Rendering it 'from the herd' preserves the Hebrew
    specification without awkward literalism. Because פַּר already supplies 'bull,'
    this avoids redundancy while retaining the sense.
- source_word: אַיִל
  chosen: ram
  lexicon: HALOT
  rationale: Standard rendering for the adult male sheep specified here in sacrificial
    contexts.
- source_word: כֶּבֶשׂ
  chosen: male lamb
  alternatives:
  - lamb
  lexicon: HALOT
  rationale: כֶּבֶשׂ refers to a lamb, typically a male lamb in sacrificial usage.
    'Male lamb' makes the likely sex explicit in context, though English often leaves
    it implicit.
- source_word: בֶּן שְׁנָתוֹ
  chosen: a year old
  alternatives:
  - in its first year
  - son of its year
  lexicon: HALOT
  rationale: This idiom denotes an animal one year old. 'A year old' is clear, idiomatic
    modern English.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. 'For a burnt
    offering' fits the list format and preserves the sacrificial category.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Repeated numeral marking the count of each sacrificial animal; retained
    consistently as 'one' in the inventory style of the verse.
