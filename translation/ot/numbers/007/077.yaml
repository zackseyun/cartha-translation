id: NUM.7.77
reference: Numbers 7:77
source:
  edition: WLC
  text: וּ/לְ/זֶ֣בַח הַ/שְּׁלָמִים֮ בָּקָ֣ר שְׁנַיִם֒ אֵילִ֤ם חֲמִשָּׁה֙ עַתֻּדִ֣ים
    חֲמִשָּׁ֔ה כְּבָשִׂ֥ים בְּנֵֽי שָׁנָ֖ה חֲמִשָּׁ֑ה זֶ֛ה קָרְבַּ֥ן פַּגְעִיאֵ֖ל
    בֶּן עָכְרָֽן־־׃פ
translation:
  text: 'and for the sacrifice of peace offerings: two cattle, five rams, five male
    goats, five male lambs a year old. This was the offering of Pagiel son of Ocran.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being' for the Hebrew term
      traditionally rendered 'peace offerings.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'two cattle'; many translations render this more specifically as
      'two oxen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  chosen: and for the sacrifice of
  alternatives:
  - and for a sacrifice of
  - and as the sacrifice of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition introduce another item in the
    list of offerings. 'Sacrifice of' is the natural rendering of לְזֶבַח in this
    inventory context.
- source_word: הַשְּׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is the standard sacrificial term traditionally rendered 'peace
    offerings.' Alternatives are possible, but 'peace offerings' remains clear and
    recognizable while preserving the cultic category.
- source_word: בָּקָר שְׁנַיִם
  chosen: two cattle
  alternatives:
  - two oxen
  - two head of cattle
  lexicon: HALOT
  rationale: בָּקָר is a collective term for cattle. Since the Hebrew does not specify
    sex here, 'two cattle' is more precise than 'two oxen,' though the latter is common
    in English Bible tradition.
- source_word: אֵילִם חֲמִשָּׁה
  chosen: five rams
  alternatives:
  - five male sheep
  lexicon: HALOT
  rationale: אֵילִם specifically denotes rams, not merely generic male sheep.
- source_word: עַתֻּדִים חֲמִשָּׁה
  chosen: five male goats
  alternatives:
  - five goats
  - five he-goats
  lexicon: HALOT
  rationale: עַתֻּדִים refers to male goats. 'Male goats' is clear modern English;
    'he-goats' is accurate but less natural.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  chosen: five male lambs a year old
  alternatives:
  - five lambs a year old
  - five one-year-old lambs
  lexicon: HALOT
  rationale: כְּבָשִׂים are male lambs/lambs; the phrase בְּנֵי שָׁנָה means 'a year
    old.' Including 'male' preserves the lexical distinction from more general terms.
- source_word: זֶה קָרְבַּן
  chosen: This was the offering of
  alternatives:
  - This is the offering of
  - This was the gift of
  lexicon: HALOT
  rationale: The demonstrative plus noun closes the repeated dedication formula. English
    past tense fits the narrative summary style better than present tense here.
- source_word: פַּגְעִיאֵל בֶּן עָכְרָן
  chosen: Pagiel son of Ocran
  alternatives:
  - Pagiel the son of Ocran
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. 'Son of' is
    the standard rendering of the patronymic.
