id: NUM.7.36
reference: Numbers 7:36
source:
  edition: WLC
  text: בַּ/יּוֹם֙ הַ/חֲמִישִׁ֔י נָשִׂ֖יא לִ/בְנֵ֣י שִׁמְע֑וֹן שְׁלֻֽמִיאֵ֖ל בֶּן
    צוּרִֽישַׁדָּֽי־׃
translation:
  text: On the fifth day, the leader of the sons of Simeon was Shelumiel son of Zurishaddai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the Simeonites.' The Hebrew reads more literally 'of the sons of
      Simeon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַחֲמִישִׁי
  chosen: On the fifth day
  alternatives:
  - On day five
  - On the fifth day of dedication
  lexicon: HALOT
  rationale: Temporal prepositional phrase with article and ordinal; standard idiomatic
    English is 'On the fifth day.' Expanded renderings adding 'of dedication' import
    context not explicit in this verse.
- source_word: נָשִׂיא
  chosen: leader
  alternatives:
  - chief
  - prince
  - tribal leader
  lexicon: HALOT
  rationale: In Numbers 7 this term denotes the recognized head of a tribe/clan group.
    'Leader' is clear modern English and avoids the potentially misleading royal sense
    of 'prince.' 'Tribal leader' is interpretively accurate but slightly more expansive
    than the Hebrew here.
- source_word: לִבְנֵי שִׁמְעוֹן
  chosen: of the sons of Simeon
  alternatives:
  - for the sons of Simeon
  - of the Simeonites
  - of the people of Simeon
  lexicon: HALOT
  rationale: 'The preposition ל with בני marks affiliation/representation: the leader
    belonging to or representing Simeon''s descendants. ''Of the sons of Simeon''
    preserves the Hebrew construction most transparently. ''For'' is possible but
    less natural here; ''Simeonites'' is smoother but less formally tied to the source
    wording.'
- source_word: שְׁלֻמִיאֵל
  chosen: Shelumiel
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard patronymic construction in English. The article is unnecessary
    in English proper-name apposition.
- source_word: צוּרִישַׁדָּי
  chosen: Zurishaddai
  rationale: Personal name transliterated according to project policy.
