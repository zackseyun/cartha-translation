id: NUM.7.10
reference: Numbers 7:10
source:
  edition: WLC
  text: וַ/יַּקְרִ֣יבוּ הַ/נְּשִׂאִ֗ים אֵ֚ת חֲנֻכַּ֣ת הַ/מִּזְבֵּ֔חַ בְּ/י֖וֹם הִמָּשַׁ֣ח
    אֹת֑/וֹ וַ/יַּקְרִ֧יבוּ הַ/נְּשִׂיאִ֛ם אֶת קָרְבָּנָ֖/ם לִ/פְנֵ֥י הַ/מִּזְבֵּֽחַ־׃
translation:
  text: Then the leaders presented the dedication offering for the altar on the day
    it was anointed, and the leaders presented their offering before the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the dedication of the altar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרִיבוּ
  chosen: presented
  alternatives:
  - brought near
  - offered
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts commonly means to present or
    offer. 'Presented' fits both occurrences in this verse and avoids awkward repetition
    of 'offered' with the object 'offering,' while still preserving cultic nuance.
- source_word: הַנְּשִׂאִים
  chosen: the leaders
  alternatives:
  - the chiefs
  - the princes
  lexicon: HALOT
  rationale: נָשִׂיא in Numbers refers to tribal heads. 'Leaders' is clear modern
    English and contextually accurate; 'princes' is too monarchical here, and 'chiefs'
    can sound archaic or tribal in a misleading way.
- source_word: חֲנֻכַּת הַמִּזְבֵּחַ
  chosen: the dedication offering for the altar
  alternatives:
  - the dedication of the altar
  - the altar's dedication
  lexicon: HALOT
  rationale: חֲנֻכָּה denotes dedication. In this context, because the leaders are
    bringing gifts connected with the altar's dedication, 'dedication offering for
    the altar' makes explicit the sense of what they presented. A more literal 'the
    dedication of the altar' is possible, but in English it can sound as though they
    presented the event rather than the gifts associated with it.
- source_word: בְּיוֹם הִמָּשַׁח אֹתוֹ
  chosen: on the day it was anointed
  alternatives:
  - on the day of anointing it
  - when it was anointed
  lexicon: HALOT
  rationale: This infinitive construct with prefixed ב marks time. 'On the day it
    was anointed' is natural English and preserves the temporal specificity.
- source_word: קָרְבָּנָם
  chosen: their offering
  alternatives:
  - their gift
  - their قربan/offering
  lexicon: HALOT
  rationale: קָרְבָּן is a general sacrificial/presentational term. 'Offering' is
    the standard cultic rendering in English and suits the tabernacle context better
    than the broader 'gift'.
- source_word: לִפְנֵי הַמִּזְבֵּחַ
  chosen: before the altar
  alternatives:
  - in front of the altar
  - at the front of the altar
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before' in spatial and cultic settings. 'Before
    the altar' is idiomatic and preserves the formal setting.
