id: NUM.7.41
reference: Numbers 7:41
source:
  edition: WLC
  text: וּ/לְ/זֶ֣בַח הַ/שְּׁלָמִים֮ בָּקָ֣ר שְׁנַיִם֒ אֵילִ֤ם חֲמִשָּׁה֙ עַתֻּדִ֣ים
    חֲמִשָּׁ֔ה כְּבָשִׂ֥ים בְּנֵי שָׁנָ֖ה חֲמִשָּׁ֑ה זֶ֛ה קָרְבַּ֥ן שְׁלֻמִיאֵ֖ל בֶּן
    צוּרִֽישַׁדָּֽי־־׃פ
translation:
  text: 'and for the sacrifice of peace offerings: two cattle, five rams, five male
    goats, and five male lambs a year old. This was the offering of Shelumiel son
    of Zurishaddai.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being' for 'peace offerings.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew בָּקָר is a broad term for cattle; some translations render it 'oxen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  chosen: and for the sacrifice of
  alternatives:
  - and for a sacrifice of
  - and as the sacrifice of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition introduce the next item in the
    list of offerings. 'Sacrifice of' is the natural English rendering of לְזֶבַח
    in this inventory context.
- source_word: הַשְּׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is the standard sacrificial term often rendered 'peace offerings.'
    This preserves traditional cultic specificity while remaining understandable.
    Alternatives are viable, but 'peace offerings' is concise and widely recognized.
- source_word: בָּקָר שְׁנַיִם
  chosen: two cattle
  alternatives:
  - two oxen
  - two head of cattle
  lexicon: HALOT
  rationale: בָּקָר is a collective term for cattle rather than specifically male
    oxen. 'Two cattle' is slightly unusual in English but accurately reflects the
    broad term in a sacrificial list.
- source_word: אֵילִם חֲמִשָּׁה
  chosen: five rams
  lexicon: HALOT
  rationale: אֵילִים clearly denotes rams in sacrificial contexts.
- source_word: עַתֻּדִים חֲמִשָּׁה
  chosen: five male goats
  alternatives:
  - five goats
  - five he-goats
  lexicon: HALOT
  rationale: עַתּוּדִים refers specifically to male goats, so the gender should be
    preserved in English.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  chosen: five male lambs a year old
  alternatives:
  - five one-year-old lambs
  - five lambs in their first year
  lexicon: HALOT
  rationale: כְּבָשִׂים are male lambs, and בְּנֵי שָׁנָה is the standard idiom for
    being one year old. The rendering keeps both age and sex explicit.
- source_word: זֶה קָרְבַּן
  chosen: This was the offering of
  alternatives:
  - This is the offering of
  - This was the gift of
  lexicon: HALOT
  rationale: 'In this repetitive narrative formula, English idiom prefers past tense:
    ''This was the offering of.'' קָרְבָּן is the general term ''offering'' here.'
- source_word: שְׁלֻמִיאֵל
  chosen: Shelumiel
  alternatives:
  - Shelumiel
  rationale: Personal names are transliterated by standard English convention. 'Shelumiel'
    is a straightforward transliteration of the Hebrew form.
- source_word: בֶּן צוּרִישַׁדָּי
  chosen: son of Zurishaddai
  rationale: בֶּן is rendered literally as 'son of' in genealogical identification
    formulas, and the proper name is transliterated.
