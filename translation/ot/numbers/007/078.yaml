theological_decisions:
- issue: Gendered tribal designation בְּנֵי
  chosen_reading: sons of Naphtali
  alternative_readings:
  - children of Naphtali
  - descendants of Naphtali
  rationale: The Hebrew is grammatically masculine plural and functions as the standard
    tribal designation. Per doctrine, gender-accurate rendering is preferred over
    neutralizing language unless context demands otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
