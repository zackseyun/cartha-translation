id: NUM.7.78
reference: Numbers 7:78
source:
  edition: WLC
  text: בְּ/יוֹם֙ שְׁנֵ֣ים עָשָׂ֣ר י֔וֹם נָשִׂ֖יא לִ/בְנֵ֣י נַפְתָּלִ֑י אֲחִירַ֖ע
    בֶּן עֵינָֽן־׃
translation:
  text: On the twelfth day, the leader of the sons of Naphtali was Ahira son of Enan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּיוֹם
  chosen: On the ... day
  alternatives:
  - In the ... day
  lexicon: HALOT
  rationale: The preposition ב with יוֹם is idiomatically temporal, best rendered
    in natural English as 'On the ... day.'
- source_word: שְׁנֵים עָשָׂר
  chosen: twelfth
  alternatives:
  - twelve
  lexicon: HALOT
  rationale: The phrase with following יוֹם forms the ordinal expression 'twelfth
    day.' English idiom prefers the ordinal rather than a wooden 'day twelve.'
- source_word: יוֹם
  chosen: day
  lexicon: HALOT
  rationale: Retained explicitly to match the Hebrew temporal formula used throughout
    the chapter.
- source_word: נָשִׂיא
  chosen: leader
  alternatives:
  - chief
  - prince
  lexicon: HALOT
  rationale: נָשִׂיא in tribal contexts denotes a recognized tribal head or leader.
    'Leader' is clear modern English and avoids the potentially misleading royal connotations
    of 'prince.'
- source_word: לִבְנֵי נַפְתָּלִי
  chosen: of the sons of Naphtali
  alternatives:
  - for the sons of Naphtali
  - of the people of Naphtali
  lexicon: HALOT
  rationale: 'The lamed here marks relation/apposition with נָשִׂיא: ''leader of/for
    the sons of Naphtali.'' ''Of the sons of Naphtali'' best reflects the tribal affiliation
    while preserving the gender-accurate ''sons'' per translation philosophy.'
- source_word: אֲחִירַע
  chosen: Ahira
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: בֶּן עֵינָן
  chosen: son of Enan
  lexicon: HALOT
  rationale: Standard Hebrew patronymic construction, rendered straightforwardly as
    'son of Enan.'
