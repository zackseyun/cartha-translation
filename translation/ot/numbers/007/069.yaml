id: NUM.7.69
reference: Numbers 7:69
source:
  edition: WLC
  text: פַּ֣ר אֶחָ֞ד בֶּן בָּקָ֗ר אַ֧יִל אֶחָ֛ד כֶּֽבֶשׂ אֶחָ֥ד בֶּן שְׁנָת֖/וֹ לְ/עֹלָֽה־־־׃
translation:
  text: one bull from the herd, one ram, one male lamb a year old, for a burnt offering;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one bull, son of the herd.'
    reason: lexical_alternative
  - marker: b
    text: Or 'one lamb'; the Hebrew term here is often used for a male lamb in sacrificial
      contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּר
  chosen: bull
  alternatives:
  - young bull
  lexicon: HALOT
  rationale: פַּר denotes a bull/young bull. In sacrificial inventory style, 'bull'
    is the clearest concise English rendering.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Cardinal numeral repeated with each animal; rendered consistently as
    'one' to preserve the list structure.
- source_word: בֶּן בָּקָר
  chosen: from the herd
  alternatives:
  - of the cattle
  - a young bull
  lexicon: HALOT
  rationale: Literally 'son of cattle/herd,' an idiom specifying bovine stock. 'From
    the herd' is natural English and preserves the classificatory force without awkward
    literalism.
- source_word: אַיִל
  chosen: ram
  lexicon: HALOT
  rationale: Standard sacrificial term for an adult male sheep; 'ram' is the precise
    English equivalent.
- source_word: כֶּבֶשׂ
  chosen: male lamb
  alternatives:
  - lamb
  lexicon: HALOT
  rationale: The Hebrew term denotes a lamb; because the sacrificial list distinguishes
    animal types and sex is relevant in such contexts, 'male lamb' makes the referent
    explicit in English.
- source_word: בֶּן שְׁנָתוֹ
  chosen: a year old
  alternatives:
  - in its first year
  - son of its year
  lexicon: HALOT
  rationale: 'This idiom indicates age: one year old. ''A year old'' is idiomatic
    modern English.'
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. 'For a burnt
    offering' fits the inventory format of the verse.
