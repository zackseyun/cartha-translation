id: NUM.7.57
reference: Numbers 7:57
source:
  edition: WLC
  text: פַּ֣ר אֶחָ֞ד בֶּן בָּקָ֗ר אַ֧יִל אֶחָ֛ד כֶּֽבֶשׂ אֶחָ֥ד בֶּן שְׁנָת֖/וֹ לְ/עֹלָֽה־־־׃
translation:
  text: one bull from the herd, one ram, one male lamb a year old, for a burnt offering;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one bull, a son of the herd.' The phrase is an idiom
      for a bull from the cattle herd, often rendered 'one young bull.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּר
  chosen: bull
  alternatives:
  - young bull
  lexicon: HALOT
  rationale: פַּר denotes a bull/young bull. 'Bull' is the clearest natural English
    rendering in sacrificial inventory contexts.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Cardinal number indicating a single animal in each item of the offering
    list.
- source_word: בֶּן בָּקָר
  chosen: from the herd
  alternatives:
  - a young bull
  - son of the herd
  lexicon: HALOT
  rationale: The construct phrase literally means 'son of cattle/herd' and idiomatically
    specifies a bovine animal from the herd. Rendering it as 'from the herd' preserves
    the classificatory force without wooden literalism. Since פַּר already supplies
    'bull,' this avoids redundancy while reflecting the Hebrew phrase.
- source_word: אַיִל
  chosen: ram
  lexicon: HALOT
  rationale: Standard rendering for the adult male sheep used in sacrificial contexts.
- source_word: כֶּבֶשׂ
  chosen: male lamb
  alternatives:
  - lamb
  lexicon: HALOT
  rationale: כֶּבֶשׂ denotes a lamb, typically male in sacrificial usage. 'Male lamb'
    makes the species and sex explicit in a context listing sacrificial animals.
- source_word: בֶּן שְׁנָתוֹ
  chosen: a year old
  alternatives:
  - in its first year
  - son of its year
  lexicon: HALOT
  rationale: This idiom indicates an animal one year old. 'A year old' is idiomatic
    modern English and accurately conveys the age requirement.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard sacrificial term for 'burnt offering.' 'For a burnt
    offering' fits the list format and preserves the sacrificial purpose marked by
    לְ.
