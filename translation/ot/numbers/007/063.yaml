id: NUM.7.63
reference: Numbers 7:63
source:
  edition: WLC
  text: פַּ֣ר אֶחָ֞ד בֶּן בָּקָ֗ר אַ֧יִל אֶחָ֛ד כֶּֽבֶשׂ אֶחָ֥ד בֶּן שְׁנָת֖/וֹ לְ/עֹלָֽה־־־׃
translation:
  text: one bull from the herd, one ram, one male lamb a year old, for a burnt offering;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one young bull, one ram, one male lamb in its first year, for a burnt
      offering.' The Hebrew phrase 'son of the herd' is an idiom for a bovine animal
      from the herd, and 'son of its year' is an idiom for an animal in its first
      year.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּר
  chosen: bull
  alternatives:
  - young bull
  - ox
  lexicon: HALOT
  rationale: פַּר commonly denotes a bull, especially in sacrificial contexts. 'Bull'
    is the most natural and specific English rendering here.
- source_word: בֶּן־בָּקָר
  chosen: from the herd
  alternatives:
  - a young bull
  - son of the herd
  - of cattle
  lexicon: HALOT
  rationale: The construct phrase literally means 'son of cattle/herd' and idiomatically
    specifies a bovine from the herd. In English sacrificial inventory style, 'bull
    from the herd' preserves the distinction without awkward literalism.
- source_word: אַיִל
  chosen: ram
  lexicon: HALOT
  rationale: Standard sacrificial term for an adult male sheep; 'ram' is the precise
    equivalent.
- source_word: כֶּבֶשׂ
  chosen: male lamb
  alternatives:
  - lamb
  lexicon: HALOT
  rationale: כֶּבֶשׂ denotes a lamb, often specifically a male lamb in sacrificial
    contexts. 'Male lamb' makes explicit the likely sex distinction reflected by the
    Hebrew sacrificial terminology.
- source_word: בֶּן־שְׁנָתוֹ
  chosen: a year old
  alternatives:
  - in its first year
  - son of its year
  lexicon: HALOT
  rationale: This idiom means the animal is one year old / in its first year. 'A year
    old' is clear modern English and fits the inventory style.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. 'For a burnt
    offering' reflects the prefixed לְ naturally in English.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Repeated numeral marking the count of each sacrificial animal; retained
    consistently as 'one' to mirror the Hebrew list structure.
