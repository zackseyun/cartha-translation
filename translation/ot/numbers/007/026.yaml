id: NUM.7.26
reference: Numbers 7:26
source:
  edition: WLC
  text: כַּ֥ף אַחַ֛ת עֲשָׂרָ֥ה זָהָ֖ב מְלֵאָ֥ה קְטֹֽרֶת׃
translation:
  text: one gold dish of ten shekels, full of incense;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one gold dish, ten, full of incense'; 'shekels' is supplied
      from the standard offering formula in the immediate context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  chosen: dish
  alternatives:
  - pan
  - bowl
  - spoon
  lexicon: HALOT
  rationale: In sacrificial/tabernacle inventory contexts, כף denotes a small vessel
    rather than a human 'palm.' English 'dish' fits a cultic utensil holding incense
    and is more natural than 'spoon' in modern English, while remaining concrete.
- source_word: אַחַת
  chosen: one
  lexicon: HALOT
  rationale: Simple cardinal numeral modifying כף; rendered directly as 'one.'
- source_word: עֲשָׂרָה
  chosen: ten shekels
  alternatives:
  - ten
  - weighing ten shekels
  lexicon: HALOT
  rationale: Although 'shekels' is not explicit in this verse, the repeated formula
    in the surrounding context specifies vessel weights in shekels. Supplying 'shekels'
    in English makes the measurement intelligible and reflects the idiomatic elliptical
    construction 'ten [shekels] of gold.'
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: 'Material/genitive of composition for the vessel: ''gold.'''
- source_word: מְלֵאָה
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Predicate adjective agreeing with the feminine vessel noun; idiomatic
    English is 'full of' incense.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard rendering for the aromatic offering substance used in sanctuary
    worship.
