id: NUM.7.47
reference: Numbers 7:47
source:
  edition: WLC
  text: וּ/לְ/זֶ֣בַח הַ/שְּׁלָמִים֮ בָּקָ֣ר שְׁנַיִם֒ אֵילִ֤ם חֲמִשָּׁה֙ עַתֻּדִ֣ים
    חֲמִשָּׁ֔ה כְּבָשִׂ֥ים בְּנֵי שָׁנָ֖ה חֲמִשָּׁ֑ה זֶ֛ה קָרְבַּ֥ן אֶלְיָסָ֖ף בֶּן
    דְּעוּאֵֽל־־׃פ
translation:
  text: 'and for the sacrifice of peace offerings: two cattle, five rams, five male
    goats, five one-year-old lambs. This was the offering of Eliasaph son of Deuel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being' for 'peace offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  chosen: and for the sacrifice of
  alternatives:
  - and for
  - as the sacrifice of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition introduce another item in the
    list of offerings. Rendering both explicitly as 'and for the sacrifice of' preserves
    the catalog style of the Hebrew.
- source_word: הַשְּׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is the standard sacrificial term traditionally rendered 'peace
    offerings.' This keeps a recognizable cultic term while remaining understandable.
    Alternatives are possible, but 'peace offerings' best matches common biblical
    usage and the likely semantic range of wholeness/peace.
- source_word: בָּקָר שְׁנַיִם
  chosen: two cattle
  alternatives:
  - two oxen
  - two head of cattle
  lexicon: HALOT
  rationale: בָּקָר is a collective term for bovine livestock. 'Two cattle' is a natural
    English rendering in a sacrificial inventory and avoids over-specifying sex, which
    the Hebrew does not state here.
- source_word: אֵילִם חֲמִשָּׁה
  chosen: five rams
  lexicon: HALOT
  rationale: אֵילִם clearly denotes rams; the straightforward rendering is best.
- source_word: עַתֻּדִים חֲמִשָּׁה
  chosen: five male goats
  alternatives:
  - five goats
  - five he-goats
  lexicon: HALOT
  rationale: עַתּוּדִים refers specifically to male goats. 'Male goats' is clear modern
    English and preserves the sex distinction relevant to sacrificial terminology.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  chosen: five one-year-old lambs
  alternatives:
  - five lambs a year old
  - five year-old lambs
  lexicon: HALOT
  rationale: The construct phrase literally means 'lambs, sons of a year.' 'One-year-old
    lambs' is the idiomatic English equivalent and preserves the age requirement.
- source_word: זֶה קָרְבַּן
  chosen: This was the offering of
  alternatives:
  - This is the offering of
  - This was the gift of
  lexicon: HALOT
  rationale: 'In this repetitive narrative summary, English idiom prefers past tense:
    ''This was the offering of.'' קָרְבָּן is broadly ''offering'' in sacrificial
    context.'
- source_word: אֶלְיָסָף
  chosen: Eliasaph
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: בֶּן דְּעוּאֵל
  chosen: son of Deuel
  rationale: Standard patronymic rendering; names are transliterated rather than translated.
