id: NUM.7.59
reference: Numbers 7:59
source:
  edition: WLC
  text: וּ/לְ/זֶ֣בַח הַ/שְּׁלָמִים֮ בָּקָ֣ר שְׁנַיִם֒ אֵילִ֤ם חֲמִשָּׁה֙ עַתֻּדִ֣ים
    חֲמִשָּׁ֔ה כְּבָשִׂ֥ים בְּנֵי שָׁנָ֖ה חֲמִשָּׁ֑ה זֶ֛ה קָרְבַּ֥ן גַּמְלִיאֵ֖ל בֶּן
    פְּדָה צֽוּר־־׃פ
translation:
  text: 'And for the sacrifice of peace offerings: two cattle, five rams, five male
    goats, and five one-year-old lambs. This was the offering of Gamliel son of Pedahzur.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being' for 'peace offerings.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'two cattle'; traditionally, 'two oxen.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'This is the offering of'; the English past tense reflects the narrative
      listing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  chosen: And for the sacrifice of
  alternatives:
  - and for the offering of
  - and as the sacrifice of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition introduce the final item in
    the list of offerings. 'Sacrifice' is the plain sense of זֶבַח here, and 'And
    for' preserves the list-like continuation from the preceding verses.
- source_word: הַשְּׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is the standard sacrificial term traditionally rendered 'peace
    offerings.' While 'fellowship offerings' or 'offerings of well-being' capture
    aspects of the term, 'peace offerings' remains a clear and recognizable rendering
    without overstating one nuance.
- source_word: בָּקָר שְׁנַיִם
  chosen: two cattle
  alternatives:
  - two oxen
  - two head of cattle
  lexicon: HALOT
  rationale: בָּקָר is a collective term for bovine livestock. 'Two cattle' is a natural
    concise rendering in a sacrificial inventory. 'Two oxen' is possible, but the
    Hebrew term itself is broader than specifically draft animals.
- source_word: אֵילִם חֲמִשָּׁה
  chosen: five rams
  lexicon: HALOT
  rationale: אֵילִם straightforwardly denotes rams; no contextual pressure suggests
    another rendering.
- source_word: עַתֻּדִים חֲמִשָּׁה
  chosen: five male goats
  alternatives:
  - five goats
  - five he-goats
  lexicon: HALOT
  rationale: עַתּוּדִים refers specifically to male goats. 'Male goats' is clear modern
    English; 'he-goats' is accurate but less natural.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  chosen: five one-year-old lambs
  alternatives:
  - five lambs a year old
  - five yearling lambs
  lexicon: HALOT
  rationale: The phrase literally means 'five lambs, sons of a year.' 'One-year-old
    lambs' is idiomatic English that preserves the age specification required for
    the sacrificial animals.
- source_word: זֶה קָרְבַּן
  chosen: This was the offering of
  alternatives:
  - This is the offering of
  - This was the gift of
  lexicon: HALOT
  rationale: קָרְבָּן is a dedicated offering brought near to God. 'Offering' is the
    standard rendering. English past tense fits the narrative summary formula in this
    repeated section, though the Hebrew demonstrative clause is verbless.
- source_word: גַּמְלִיאֵל
  chosen: Gamliel
  alternatives:
  - Gamaliel
  rationale: Personal names are transliterated rather than translated per project
    philosophy. 'Gamliel' more directly reflects the Hebrew form here.
- source_word: בֶּן פְּדָה־צוּר
  chosen: son of Pedahzur
  rationale: בֶּן is rendered with the standard filial expression 'son of,' and the
    personal name is transliterated from the Hebrew form פְּדָה־צוּר as 'Pedahzur.'
