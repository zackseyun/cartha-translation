id: NUM.7.3
reference: Numbers 7:3
source:
  edition: WLC
  text: וַ/יָּבִ֨יאוּ אֶת קָרְבָּנָ֜/ם לִ/פְנֵ֣י יְהוָ֗ה שֵׁשׁ עֶגְלֹ֥ת צָב֙ וּ/שְׁנֵ֣י עָשָׂ֣ר בָּקָ֔ר עֲגָלָ֛ה עַל שְׁנֵ֥י הַ/נְּשִׂאִ֖ים וְ/שׁ֣וֹר לְ/אֶחָ֑ד וַ/יַּקְרִ֥יבוּ אוֹתָ֖/ם לִ/פְנֵ֥י הַ/מִּשְׁכָּֽן־־־׃
translation:
  text: 'And they brought their offering before Yahweh: six covered carts and twelve oxen, a cart for every two leaders and an ox for each one; and they presented them before the tabernacle.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'six covered wagons.' The Hebrew phrase עֶגְלֹת צָב is traditionally understood to refer to covered transport carts.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְבָּנָם
  chosen: their offering
  alternatives:
  - their gift
  - their contribution
  lexicon: HALOT
  rationale: קָרְבָּן commonly denotes an offering brought near/presented in a cultic context. 'Offering' is the most natural English rendering here and fits the ceremonial setting.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is spatial/relational 'before, in front of.' The divine name is rendered 'the LORD' per doctrine for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֶגְלֹת צָב
  chosen: covered carts
  alternatives:
  - covered wagons
  - transport carts
  lexicon: HALOT
  rationale: עֶגְלֹת are wagons/carts. צָב is traditionally understood here as indicating a covered or canopied vehicle. 'Covered carts' is concise and idiomatic while preserving the likely sense.
- source_word: בָּקָר
  chosen: oxen
  alternatives:
  - cattle
  lexicon: HALOT
  rationale: Though בָּקָר can denote cattle broadly, the distributive phrase with שׁוֹר and the transport context point to draft animals; 'oxen' is the clearest English rendering.
- source_word: עֲגָלָה עַל שְׁנֵי הַנְּשִׂאִים
  chosen: a cart for every two leaders
  alternatives:
  - one cart for two chiefs
  - a wagon for each pair of leaders
  lexicon: HALOT
  rationale: 'The phrase is distributive: one cart corresponding to two נשיאים. ''Leaders'' renders נשיאים naturally in this tribal context.'
- source_word: הַנְּשִׂאִים
  chosen: leaders
  alternatives:
  - chiefs
  - princes
  lexicon: HALOT
  rationale: נשיא can mean chief, leader, prince. In Numbers 7 it refers to tribal heads. 'Leaders' is accurate and readable without importing monarchical nuance.
- source_word: וְשׁוֹר לְאֶחָד
  chosen: and an ox for each one
  alternatives:
  - and one ox for each leader
  lexicon: HALOT
  rationale: This is another distributive phrase. 'Each one' refers back to each leader; the sense is one ox per leader.
- source_word: וַיַּקְרִיבוּ אֹתָם
  chosen: and they presented them
  alternatives:
  - and they brought them near
  - and they offered them
  lexicon: HALOT
  rationale: הקריב in offering contexts often means present/offer. Since the items are carts and oxen brought to the sanctuary precincts, 'presented' avoids over-specifying sacrificial slaughter while retaining cultic presentation.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the tent of meeting
  - the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן is the tabernacle/dwelling. 'Tabernacle' is the standard and precise term here; 'tent of meeting' would correspond more specifically to אֹהֶל מוֹעֵד.
