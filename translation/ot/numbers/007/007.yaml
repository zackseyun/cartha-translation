id: NUM.7.7
reference: Numbers 7:7
source:
  edition: WLC
  text: אֵ֣ת שְׁתֵּ֣י הָ/עֲגָלֹ֗ת וְ/אֵת֙ אַרְבַּ֣עַת הַ/בָּקָ֔ר נָתַ֖ן לִ/בְנֵ֣י
    גֵרְשׁ֑וֹן כְּ/פִ֖י עֲבֹדָתָֽ/ם׀׃
translation:
  text: He gave the two carts and the four cattle to the sons of Gershon, according
    to their service.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the two wagons.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the four oxen.' The Hebrew uses a collective term for bovine animals.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֲגָלֹת
  chosen: carts
  alternatives:
  - wagons
  lexicon: HALOT
  rationale: עֲגָלָה denotes a cart or wagon used for transport. 'Carts' is concise,
    natural English and fits the tabernacle-transport context. 'Wagons' is a viable
    alternative and is preserved in a footnote-worthy lexical note.
- source_word: הַבָּקָר
  chosen: cattle
  alternatives:
  - oxen
  - bulls
  lexicon: HALOT
  rationale: בָּקָר is a collective term for bovine livestock. In this context, paired
    with transport carts, the animals are draft animals; 'cattle' preserves the Hebrew
    collective sense without over-specifying sex. 'Oxen' is contextually plausible
    but more interpretive, while 'bulls' is too specific.
- source_word: לִבְנֵי גֵרְשׁוֹן
  chosen: to the sons of Gershon
  alternatives:
  - to the Gershonites
  lexicon: HALOT
  rationale: The Hebrew is literally 'to the sons of Gershon.' Following the translation
    philosophy of transliterating names and preserving source form where natural,
    the filial expression is retained rather than replaced with the gentilic 'Gershonites.'
- source_word: כְּפִי עֲבֹדָתָם
  chosen: according to their service
  alternatives:
  - according to their work
  - in proportion to their service
  lexicon: HALOT
  rationale: The idiom כְּפִי means 'according to' or 'in accordance with,' and עֲבֹדָה
    here refers to assigned service/duty in tabernacle work. 'According to their service'
    is both natural and close to the Hebrew, preserving the cultic-duty nuance better
    than the broader 'work'.
- source_word: נָתַן
  chosen: He gave
  alternatives:
  - he assigned
  lexicon: HALOT
  rationale: The verb simply means 'gave.' Although the context implies allocation
    for duty, 'gave' best reflects the plain verbal sense without adding interpretive
    nuance.
