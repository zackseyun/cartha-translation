id: NUM.7.71
reference: Numbers 7:71
source:
  edition: WLC
  text: וּ/לְ/זֶ֣בַח הַ/שְּׁלָמִים֮ בָּקָ֣ר שְׁנַיִם֒ אֵילִ֤ם חֲמִשָּׁה֙ עַתֻּדִ֣ים
    חֲמִשָּׁ֔ה כְּבָשִׂ֥ים בְּנֵֽי שָׁנָ֖ה חֲמִשָּׁ֑ה זֶ֛ה קָרְבַּ֥ן אֲחִיעֶ֖זֶר בֶּן
    עַמִּישַׁדָּֽי־־׃פ
translation:
  text: 'and for the sacrifice of peace offerings: two cattle, five rams, five male
    goats, and five one-year-old lambs. This was the offering of Ahiezer son of Ammishaddai.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being' for 'peace offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  chosen: and for the sacrifice of
  alternatives:
  - and for a sacrifice of
  - and as the sacrifice of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition introduce the final item in
    the list of offerings. 'For the sacrifice of' is natural English and preserves
    the construction without over-paraphrasing.
- source_word: הַשְּׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is the standard sacrificial term traditionally rendered 'peace
    offerings.' While 'fellowship offerings' or 'offerings of well-being' are possible,
    'peace offerings' is concise, recognizable, and close to the Hebrew cultic term.
- source_word: בָּקָר שְׁנַיִם
  chosen: two cattle
  alternatives:
  - two oxen
  - two head of cattle
  lexicon: HALOT
  rationale: בָּקָר denotes bovine livestock broadly. 'Two cattle' preserves the collective
    noun without specifying sex, unlike 'oxen,' which may over-specify.
- source_word: אֵילִם חֲמִשָּׁה
  chosen: five rams
  lexicon: HALOT
  rationale: אֵילִם clearly refers to rams in sacrificial lists.
- source_word: עַתֻּדִים חֲמִשָּׁה
  chosen: five male goats
  alternatives:
  - five goats
  - five he-goats
  lexicon: HALOT
  rationale: עַתּוּדִים refers specifically to male goats. 'Male goats' is clear modern
    English; 'he-goats' is accurate but less natural.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  chosen: five one-year-old lambs
  alternatives:
  - five lambs a year old
  - five year-old lambs
  lexicon: HALOT
  rationale: The phrase literally means 'five lambs, sons of a year.' 'One-year-old
    lambs' is the idiomatic English equivalent and preserves the age specification
    relevant to sacrificial qualification.
- source_word: זֶה קָרְבַּן
  chosen: This was the offering of
  alternatives:
  - This is the offering of
  - This was the gift of
  lexicon: HALOT
  rationale: In this repetitive narrative formula, English past tense reads naturally
    in context recounting completed offerings. קָרְבָּן is well rendered 'offering'
    here.
- source_word: אֲחִיעֶזֶר בֶּן עַמִּישַׁדָּי
  chosen: Ahiezer son of Ammishaddai
  rationale: Personal names are transliterated per project philosophy; 'son of' directly
    represents בֶּן.
