id: NUM.7.84
reference: Numbers 7:84
source:
  edition: WLC
  text: זֹ֣את חֲנֻכַּ֣ת הַ/מִּזְבֵּ֗חַ בְּ/יוֹם֙ הִמָּשַׁ֣ח אֹת֔/וֹ מֵ/אֵ֖ת נְשִׂיאֵ֣י
    יִשְׂרָאֵ֑ל קַעֲרֹ֨ת כֶּ֜סֶף שְׁתֵּ֣ים עֶשְׂרֵ֗ה מִֽזְרְקֵי כֶ֨סֶף֙ שְׁנֵ֣ים עָשָׂ֔ר
    כַּפּ֥וֹת זָהָ֖ב שְׁתֵּ֥ים עֶשְׂרֵֽה׀־׃
translation:
  text: 'This was the dedication offering of the altar on the day it was anointed,
    from the leaders of Israel: twelve silver dishes, twelve silver bowls, and twelve
    gold pans.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This is the dedication of the altar'; the Hebrew can be rendered more
      formally, but the context favors a retrospective summary of the offerings presented.
    reason: lexical_alternative
  - marker: b
    text: Or 'chiefs' or 'princes of Israel.' The Hebrew term refers to the recognized
      tribal leaders.
    reason: lexical_alternative
  - marker: c
    text: The vessel names may also be rendered 'silver plates,' 'silver basins,'
      and 'gold dishes/ladles,' depending on how one construes the specific cultic
      utensils.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  chosen: This was
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Though formally 'this,' in this summary statement after the list of offerings,
    idiomatic English past tense ('This was') fits the retrospective context better
    while preserving the demonstrative force.
- source_word: חֲנֻכַּת
  chosen: dedication offering
  alternatives:
  - dedication
  - consecration offering
  lexicon: HALOT
  rationale: The noun denotes dedication/consecration. In context, this verse summarizes
    the material gifts presented for the altar's dedication, so 'dedication offering'
    makes explicit the implied offering sense without over-paraphrasing.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering of מִזְבֵּחַ in cultic context.
- source_word: בְּיוֹם הִמָּשַׁח אֹתוֹ
  chosen: on the day it was anointed
  alternatives:
  - in the day of its anointing
  - when it was anointed
  lexicon: HALOT
  rationale: The infinitive construct/passive verbal form with בְּיוֹם is naturally
    rendered temporally. 'It was anointed' clearly refers back to the altar.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - on the part of
  lexicon: HALOT
  rationale: Marks source/origin of the offerings; 'from' is the most natural English
    equivalent here.
- source_word: נְשִׂיאֵי יִשְׂרָאֵל
  chosen: the leaders of Israel
  alternatives:
  - the chiefs of Israel
  - the princes of Israel
  lexicon: HALOT
  rationale: נָשִׂיא in Numbers commonly refers to tribal leaders. 'Leaders' is clear
    modern English and avoids the potentially misleading aristocratic sense of 'princes.'
- source_word: קַעֲרֹת כֶּסֶף
  chosen: silver dishes
  alternatives:
  - silver plates
  - silver bowls
  lexicon: HALOT
  rationale: קַעֲרָה denotes a dish/platter-like vessel. 'Dishes' distinguishes it
    from the following מִזְרְקִים.
- source_word: מִזְרְקֵי כֶסֶף
  chosen: silver bowls
  alternatives:
  - silver basins
  lexicon: HALOT
  rationale: מִזְרָק refers to a bowl/basin used in ritual contexts. 'Bowls' is readable
    modern English; 'basins' is possible but slightly less natural here.
- source_word: כַּפּוֹת זָהָב
  chosen: gold pans
  alternatives:
  - gold dishes
  - gold ladles
  lexicon: HALOT
  rationale: כַּף literally means 'palm' and by extension a spoon/pan-like vessel.
    In this tabernacle-offering context, 'pans' conveys a small cultic container without
    implying a modern eating utensil; 'ladles' is possible but less likely in this
    inventory style.
- source_word: שְׁתֵּים עֶשְׂרֵה / שְׁנֵים עָשָׂר
  chosen: twelve
  lexicon: HALOT
  rationale: Straightforward cardinal numbers, with feminine/masculine agreement matching
    the counted nouns in Hebrew but not requiring distinction in English.
