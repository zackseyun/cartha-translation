id: NUM.7.19
reference: Numbers 7:19
source:
  edition: WLC
  text: הִקְרִ֨ב אֶת קָרְבָּנ֜/וֹ קַֽעֲרַת כֶּ֣סֶף אַחַ֗ת שְׁלֹשִׁ֣ים וּ/מֵאָה֮ מִשְׁקָלָ/הּ֒
    מִזְרָ֤ק אֶחָד֙ כֶּ֔סֶף שִׁבְעִ֥ים שֶׁ֖קֶל בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ שְׁנֵי/הֶ֣ם
    מְלֵאִ֗ים סֹ֛לֶת בְּלוּלָ֥ה בַ/שֶּׁ֖מֶן לְ/מִנְחָֽה־־׀׃
translation:
  text: 'He presented his offering: one silver plate, its weight one hundred thirty
    shekels; one silver basin, seventy shekels by the shekel of the sanctuary; both
    of them full of fine flour mixed with oil for a grain offering.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'silver dish' for 'silver plate' (קַעֲרַת כֶּסֶף).
    reason: lexical_alternative
  - marker: b
    text: Or 'bowl' for 'basin' (מִזְרָק).
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'by the shekel of the sanctuary,' indicating the standard sacred
      weight.
    reason: cultural_note
lexical_decisions:
- source_word: הִקְרִב
  chosen: presented
  alternatives:
  - brought
  - offered
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial/dedication context commonly means to bring
    near or present an offering. 'Presented' fits the ceremonial listing style and
    avoids awkward repetition with the following noun 'offering.'
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his gift
  - his oblation
  lexicon: HALOT
  rationale: Standard sacrificial term for what is brought near. 'Offering' is the
    clearest modern English equivalent in cultic context.
- source_word: קַעֲרַת כֶּסֶף
  chosen: silver plate
  alternatives:
  - silver dish
  - silver platter
  lexicon: HALOT
  rationale: The vessel is a shallow container used in sanctuary donations. 'Plate'
    is a natural English rendering in this inventory context, while 'dish' remains
    possible.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  chosen: its weight one hundred thirty shekels
  alternatives:
  - weighing one hundred thirty shekels
  lexicon: HALOT
  rationale: The Hebrew gives the weight explicitly with a feminine suffix referring
    to the plate. This rendering preserves the measured, catalog-like style.
- source_word: מִזְרָק
  chosen: basin
  alternatives:
  - bowl
  lexicon: HALOT
  rationale: A vessel used in ritual contexts, often for sprinkling or holding sacrificial
    materials. 'Basin' is slightly more formal and suits tabernacle inventory language.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the shekel of the sanctuary
  alternatives:
  - according to the sanctuary shekel
  - by the holy shekel
  lexicon: HALOT
  rationale: This phrase specifies the standard unit of weight used in sacred contexts.
    'By the shekel of the sanctuary' is clear and fairly literal.
- source_word: שְׁנֵיהֶם מְלֵאִים
  chosen: both of them full of
  alternatives:
  - both full of
  lexicon: HALOT
  rationale: The dual/plural expression refers to both vessels together. The chosen
    wording preserves the explicitness of the Hebrew.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: Standard term for refined flour used in offerings; 'fine flour' is the
    conventional and accurate rendering.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: Describes the preparation of the grain offering. 'Mixed with oil' is
    idiomatic modern English while remaining faithful to the Hebrew.
- source_word: לְמִנְחָה
  chosen: for a grain offering
  alternatives:
  - for an offering
  - for a tribute offering
  lexicon: HALOT
  rationale: In priestly sacrificial context, מִנְחָה refers specifically to the grain
    offering rather than a generic gift. 'Grain offering' preserves cultic specificity
    for modern readers.
