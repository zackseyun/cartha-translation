id: NUM.7.87
reference: Numbers 7:87
source:
  edition: WLC
  text: כָּל הַ/בָּקָ֨ר לָ/עֹלָ֜ה שְׁנֵ֧ים עָשָׂ֣ר פָּרִ֗ים אֵילִ֤ם שְׁנֵים עָשָׂר֙
    כְּבָשִׂ֧ים בְּנֵֽי שָׁנָ֛ה שְׁנֵ֥ים עָשָׂ֖ר וּ/מִנְחָתָ֑/ם וּ/שְׂעִירֵ֥י עִזִּ֛ים
    שְׁנֵ֥ים עָשָׂ֖ר לְ/חַטָּֽאת־־־׃
translation:
  text: 'All the cattle for the burnt offering: twelve bulls, twelve rams, twelve
    one-year-old lambs, and their grain offering; and twelve male goats for a sin
    offering.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "for a purification offering." The Hebrew term חַטָּאת can emphasize
      purification from impurity as well as sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - The whole total of
  lexicon: HALOT
  rationale: Introduces the summary total of the offerings listed in this verse.
- source_word: הַבָּקָר
  chosen: the cattle
  alternatives:
  - the herd animals
  - the oxen
  lexicon: HALOT
  rationale: Refers collectively to bovine animals. 'Cattle' best matches the collective
    sense in this inventory context, while the following פָּרִים specifies the counted
    animals as bulls.
- source_word: לָעֹלָה
  chosen: for the burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: The lamed marks purpose/destination. 'For the burnt offering' fits the
    tabulated style of the verse and preserves sacrificial terminology.
- source_word: פָּרִים
  chosen: bulls
  alternatives:
  - young bulls
  - oxen
  lexicon: HALOT
  rationale: Standard rendering for the plural of פַּר in sacrificial contexts.
- source_word: אֵילִם
  chosen: rams
  lexicon: HALOT
  rationale: Standard sacrificial animal term.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה
  chosen: one-year-old lambs
  alternatives:
  - lambs a year old
  - yearling lambs
  lexicon: HALOT
  rationale: Combines the construct phrase naturally in English while preserving the
    age specification required for the sacrifice.
- source_word: וּמִנְחָתָם
  chosen: and their grain offering
  alternatives:
  - and their offering
  - and their grain tribute
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial legislation commonly denotes the grain offering
    accompanying animal sacrifices. The 3mp suffix is retained with 'their,' referring
    to the listed burnt-offering animals.
- source_word: וּשְׂעִירֵי עִזִּים
  chosen: and male goats
  alternatives:
  - and goats
  - and he-goats
  lexicon: HALOT
  rationale: The phrase specifically denotes male goats. 'Male goats' is clear modern
    English without archaic tone.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for purification offering
  lexicon: HALOT
  rationale: In priestly sacrificial contexts, חַטָּאת conventionally denotes the
    sin offering. Although some argue for 'purification offering,' 'sin offering'
    remains the clearest default in this inventory context; the alternative is worth
    preserving in a footnote.
