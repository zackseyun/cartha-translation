theological_decisions:
- issue: Rendering of חַטָּאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The term can denote the offering associated with sin and purification.
    In this cultic summary, 'sin offering' is the conventional and most recognizable
    rendering, but the purification nuance should be preserved for auditability.
  doctrine_reference: Translation philosophy §3, §5
