id: NUM.7.83
reference: Numbers 7:83
source:
  edition: WLC
  text: וּ/לְ/זֶ֣בַח הַ/שְּׁלָמִים֮ בָּקָ֣ר שְׁנַיִם֒ אֵילִ֤ם חֲמִשָּׁה֙ עַתֻּדִ֣ים
    חֲמִשָּׁ֔ה כְּבָשִׂ֥ים בְּנֵֽי שָׁנָ֖ה חֲמִשָּׁ֑ה זֶ֛ה קָרְבַּ֥ן אֲחִירַ֖ע בֶּן
    עֵינָֽן־־׃פ
translation:
  text: 'And for the sacrifice of peace offerings: two cattle, five rams, five male
    goats, and five male lambs a year old. This was the offering of Ahira son of Enan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being' for 'peace offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  chosen: And for the sacrifice of
  alternatives:
  - And for
  - as a sacrifice of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition introduce the next item in the
    list of offerings. 'Sacrifice of' preserves the nominal construction with זֶבַח
    rather than reducing it to a bare category label.
- source_word: הַשְּׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is the standard sacrificial term traditionally rendered 'peace
    offerings.' While 'fellowship offerings' or 'offerings of well-being' are possible,
    'peace offerings' is concise, recognizable, and adequately reflects the cultic
    category without over-interpreting its nuance.
- source_word: בָּקָר שְׁנַיִם
  chosen: two cattle
  alternatives:
  - two oxen
  - two head of cattle
  lexicon: HALOT
  rationale: בָּקָר is a collective term for cattle. 'Two cattle' is a natural English
    rendering in a sacrificial inventory and avoids specifying sex beyond what the
    Hebrew states here.
- source_word: אֵילִם חֲמִשָּׁה
  chosen: five rams
  alternatives:
  - five male sheep
  lexicon: HALOT
  rationale: אֵילִים specifically denotes rams, not sheep generally. 'Five rams' is
    the precise and conventional rendering.
- source_word: עַתֻּדִים חֲמִשָּׁה
  chosen: five male goats
  alternatives:
  - five goats
  - five he-goats
  lexicon: HALOT
  rationale: עַתּוּדִים refers specifically to male goats. 'Male goats' is clear modern
    English; 'he-goats' is accurate but less natural.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  chosen: five male lambs a year old
  alternatives:
  - five one-year-old lambs
  - five lambs in their first year
  lexicon: HALOT
  rationale: כְּבָשִׂים are male lambs/lambs; בְּנֵי שָׁנָה literally 'sons of a year'
    indicates age. 'Five male lambs a year old' preserves both sex and age with readable
    English.
- source_word: זֶה קָרְבַּן
  chosen: This was the offering of
  alternatives:
  - This is the offering of
  - This was the gift of
  lexicon: HALOT
  rationale: The demonstrative plus noun functions as a concluding identification
    formula in this repeated narrative pattern. English past tense ('was') fits the
    narrative context better than present tense, while 'offering' is the standard
    rendering of קָרְבָּן.
- source_word: אֲחִירַע בֶּן עֵינָן
  chosen: Ahira son of Enan
  alternatives:
  - Ahira the son of Enan
  rationale: Personal names are transliterated per project philosophy. 'Son of Enan'
    is the standard Hebrew patronymic rendering.
