id: NUM.7.68
reference: Numbers 7:68
source:
  edition: WLC
  text: כַּ֥ף אַחַ֛ת עֲשָׂרָ֥ה זָהָ֖ב מְלֵאָ֥ה קְטֹֽרֶת
translation:
  text: one gold dish, weighing ten shekels, full of incense;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one gold dish, ten, full of incense'; the weight unit
      'shekels' is implied by the repeated offering formula in Numbers 7.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  chosen: dish
  alternatives:
  - pan
  - bowl
  - spoon
  lexicon: HALOT
  rationale: In the tabernacle-offering context of Numbers 7, כף refers to a small
    ceremonial vessel. Traditional English often uses 'spoon,' but in modern English
    that suggests an eating utensil and obscures the cultic object. 'Dish' is a clearer,
    natural rendering for a shallow vessel used to hold incense.
- source_word: אַחַת
  chosen: one
  lexicon: HALOT
  rationale: Simple cardinal numeral agreeing with the feminine noun כף.
- source_word: עֲשָׂרָה
  chosen: ten
  lexicon: HALOT
  rationale: Cardinal numeral modifying the implied weight measure of the vessel,
    as in the repeated offering formula in Numbers 7.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: 'Material of the vessel. Here it naturally modifies כף: ''gold dish.'''
- source_word: עֲשָׂרָה זָהָב
  chosen: weighing ten shekels
  alternatives:
  - of ten gold
  - ten of gold
  lexicon: HALOT
  rationale: The Hebrew is elliptical, omitting the explicit unit 'shekels,' but in
    this stock formula throughout Numbers 7 the sense is weight, not quantity of objects
    or purity of material. Supplying 'weighing' and 'shekels' makes the English intelligible
    while staying faithful to the idiom.
- source_word: מְלֵאָה
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Predicate adjective describing the vessel's contents; 'full of' is idiomatic
    and concise.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard rendering for the aromatic offering substance placed in the
    vessel.
