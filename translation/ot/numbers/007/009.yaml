id: NUM.7.9
reference: Numbers 7:9
source:
  edition: WLC
  text: וְ/לִ/בְנֵ֥י קְהָ֖ת לֹ֣א נָתָ֑ן כִּֽי עֲבֹדַ֤ת הַ/קֹּ֨דֶשׁ֙ עֲלֵ/הֶ֔ם בַּ/כָּתֵ֖ף
    יִשָּֽׂאוּ־׃
translation:
  text: But to the sons of Kohath he gave none, because the service of the holy things
    was upon them; they were to carry them on the shoulder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'For the service of the sanctuary was upon them; they
      were to carry it on the shoulder.' The Hebrew likely refers specifically to
      the holy objects entrusted to the Kohathites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/בְנֵי קְהָת
  chosen: But to the sons of Kohath
  alternatives:
  - And to the sons of Kohath
  - But to the descendants of Kohath
  lexicon: HALOT
  rationale: לִבְנֵי marks indirect object, 'to the sons/children of.' 'Sons of Kohath'
    preserves the clan designation more formally than 'descendants,' while remaining
    natural in English. Initial וְ is rendered 'But' to reflect the contrast with
    the previous gifts to other Levitical clans.
- source_word: לֹא נָתָן
  chosen: he gave none
  alternatives:
  - he did not give
  - he gave nothing
  lexicon: HALOT
  rationale: The verb נתן with the negation here refers back to the wagons and oxen
    given in the preceding context. 'He gave none' is idiomatic English that makes
    the implied object clear without over-paraphrasing.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for not giving them any carts or oxen. 'Because'
    is clearer in modern English than the more formal 'for.'
- source_word: עֲבֹדַת הַקֹּדֶשׁ
  chosen: the service of the holy things
  alternatives:
  - the service of the sanctuary
  - the holy service
  lexicon: HALOT
  rationale: עֲבֹדָה is 'service/work,' and הַקֹּדֶשׁ here most naturally refers to
    the holy objects entrusted to the Kohathites, not the sanctuary in general. 'The
    service of the holy things' fits the immediate context of transporting sacred
    furnishings.
- source_word: עֲלֵיהֶם
  chosen: was upon them
  alternatives:
  - was assigned to them
  - rested on them
  lexicon: HALOT
  rationale: The idiom literally means the duty was 'upon them.' Retaining 'was upon
    them' preserves the Hebrew sense of obligation while remaining understandable.
- source_word: בַּכָּתֵף
  chosen: on the shoulder
  alternatives:
  - on their shoulders
  - by shoulder-pole
  lexicon: HALOT
  rationale: Literally 'on the shoulder.' Although the subject is plural, Hebrew can
    use the singular collectively. English idiom often prefers 'on the shoulder' in
    such distributive expressions; the plural sense is then clarified by the plural
    verb and object.
- source_word: יִשָּׂאוּ
  chosen: they were to carry them
  alternatives:
  - they shall carry
  - they must carry
  lexicon: HALOT
  rationale: The imperfect here expresses prescribed duty in context. 'They were to
    carry them' conveys obligation in natural English. 'Them' is supplied from context,
    referring to the holy objects, since English requires an explicit object where
    Hebrew leaves it implicit.
