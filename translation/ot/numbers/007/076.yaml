id: NUM.7.76
reference: Numbers 7:76
source:
  edition: WLC
  text: שְׂעִיר עִזִּ֥ים אֶחָ֖ד לְ/חַטָּֽאת־׃
translation:
  text: one male goat for a sin offering;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a purification offering.' The Hebrew חַטָּאת in sacrificial contexts
      can refer to the offering that deals with sin and ritual impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  chosen: male goat
  alternatives:
  - goat
  - buck goat
  - he-goat
  lexicon: HALOT
  rationale: The construct phrase literally denotes a hairy goat of the goats, an
    idiom for a male goat/buck. 'Male goat' is clear modern English and preserves
    the sacrificial-animal specificity better than the more generic 'goat'.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - a single
  - one [animal]
  lexicon: HALOT
  rationale: The cardinal number is retained explicitly, matching the repetitive enumerative
    style of Numbers 7 and preserving the formal inventory structure.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly denotes the purification/sin
    offering rather than abstract 'sin.' 'For a sin offering' is idiomatic and accurate
    in English, preserving the cultic sense without over-paraphrasing.
