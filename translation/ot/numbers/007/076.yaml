theological_decisions:
- issue: Rendering of חַטָּאת in sacrificial context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew term can denote either 'sin' or the offering associated with
    sin/purification. In Levitical and priestly sacrificial lists, the offering sense
    is clearly intended here. 'Sin offering' remains the most recognizable English
    rendering, while 'purification offering' is a defensible contextual alternative
    worth preserving in a footnote because the rite addresses ritual purification
    as well as sin.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; consistency of key terms, or documented exception.'
