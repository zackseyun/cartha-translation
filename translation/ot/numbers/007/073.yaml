id: NUM.7.73
reference: Numbers 7:73
source:
  edition: WLC
  text: קָרְבָּנ֞/וֹ קַֽעֲרַת כֶּ֣סֶף אַחַ֗ת שְׁלֹשִׁ֣ים וּ/מֵאָה֮ מִשְׁקָלָ/הּ֒ מִזְרָ֤ק
    אֶחָד֙ כֶּ֔סֶף שִׁבְעִ֥ים שֶׁ֖קֶל בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ שְׁנֵי/הֶ֣ם מְלֵאִ֗ים
    סֹ֛לֶת בְּלוּלָ֥ה בַ/שֶּׁ֖מֶן לְ/מִנְחָֽה־׀׃
translation:
  text: His offering was one silver plate, its weight one hundred thirty shekels,
    one silver basin of seventy shekels, by the shekel of the sanctuary; both of them
    full of fine flour mixed with oil for a grain offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dish' for 'plate' (קַעֲרָה), a shallow silver vessel used in the sanctuary
      inventory.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to the sanctuary shekel.' The Hebrew specifies the sacred
      standard of weight.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְבָּנוֹ
  chosen: His offering was
  alternatives:
  - his gift
  - his offering
  lexicon: HALOT
  rationale: קָרְבָּן denotes an offering/presentation brought near in a cultic context.
    'Offering' is the standard and clearest English equivalent here. Supplying 'was'
    makes the Hebrew nominal sequence natural in English.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  chosen: one silver plate
  alternatives:
  - one silver dish
  - one silver platter
  lexicon: HALOT
  rationale: קַעֲרָה in tabernacle inventory contexts refers to a shallow vessel.
    'Plate' fits the cultic inventory style of Numbers 7 and is idiomatic in English;
    'dish' is possible but less conventional in this repeated list.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  chosen: its weight one hundred thirty shekels
  alternatives:
  - weighing one hundred thirty shekels
  - its weight was one hundred thirty shekels
  lexicon: HALOT
  rationale: The Hebrew literally gives the vessel followed by its weight. 'Its weight
    one hundred thirty shekels' preserves the inventory style while remaining readable.
    English word order is adjusted for clarity.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  chosen: one silver basin
  alternatives:
  - one silver bowl
  lexicon: HALOT
  rationale: מִזְרָק is a ritual vessel used for tossing/sprinkling, often rendered
    'basin' in tabernacle contexts. 'Basin' better suggests a cultic implement than
    the more domestic-sounding 'bowl'.
- source_word: שִׁבְעִים שֶׁקֶל
  chosen: of seventy shekels
  alternatives:
  - weighing seventy shekels
  lexicon: HALOT
  rationale: This phrase specifies the basin's weight. 'Of seventy shekels' is concise
    and matches the inventory style established in the verse.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the shekel of the sanctuary
  alternatives:
  - according to the sanctuary shekel
  - by the sanctuary shekel
  lexicon: HALOT
  rationale: The phrase indicates the standard of measurement. 'By the shekel of the
    sanctuary' is a fairly literal rendering that remains understandable and preserves
    the formal register of the passage.
- source_word: שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - both
  lexicon: HALOT
  rationale: The pronoun explicitly refers to the two vessels. 'Both of them' preserves
    the emphasis and avoids ambiguity.
- source_word: מְלֵאִים
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Predicate adjective describing the vessels' contents. 'Full of' is direct
    and natural.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: סֹלֶת is the standard term for fine flour used in offerings. 'Fine flour'
    is the conventional and accurate rendering.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: The passive participle indicates the flour had been mixed with oil. 'Mixed
    with oil' is clear modern English; 'mingled' is more archaic.
- source_word: לְמִנְחָה
  chosen: for a grain offering
  alternatives:
  - for an offering
  - for a tribute offering
  lexicon: HALOT
  rationale: In priestly sacrificial context, מִנְחָה specifically denotes the grain
    offering. Rendering it specifically avoids flattening the cultic terminology.
