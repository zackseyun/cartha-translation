id: NUM.7.22
reference: Numbers 7:22
source:
  edition: WLC
  text: שְׂעִיר עִזִּ֥ים אֶחָ֖ד לְ/חַטָּֽאת־׃
translation:
  text: one male goat for a sin offering;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שְׂעִיר
  chosen: male goat
  alternatives:
  - goat
  - he-goat
  - buck goat
  lexicon: HALOT, BDB
  rationale: שְׂעִיר denotes a male goat, often specifically a buck or he-goat in
    sacrificial contexts. 'Male goat' is clear, natural modern English and preserves
    the animal's sex, which is explicit in the Hebrew sacrificial terminology.
- source_word: עִזִּים
  chosen: male goat
  alternatives:
  - of goats
  lexicon: HALOT, BDB
  rationale: 'In the construct phrase שְׂעִיר עִזִּים, עִזִּים specifies the kind
    of shaggy goat: literally ''a goat of goats,'' idiomatically ''a male goat.''
    Rather than woodenly rendering both words separately, the phrase is best represented
    by the single natural English expression ''male goat.'''
- source_word: אֶחָד
  chosen: one
  alternatives:
  - a single
  - one each
  lexicon: HALOT, BDB
  rationale: אֶחָד straightforwardly gives the count of the offering item. 'One' preserves
    the enumerative style of the offering list in Numbers 7.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT, BDB
  rationale: חַטָּאת in sacrificial contexts commonly means 'sin offering,' not merely
    'sin.' The prefixed לְ is well rendered 'for' here in the inventory formula. 'For
    a sin offering' is idiomatic and contextually precise.
