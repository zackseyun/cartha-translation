theological_decisions:
- issue: Rendering sacrificial term חַטָּאת
  chosen_reading: sin offering
  alternative_readings:
  - for sin
  rationale: In cultic lists such as Numbers 7, חַטָּאת refers to the prescribed offering
    category rather than abstract sin. This avoids flattening the sacrificial system
    into a vague moral sense and best matches the immediate ritual context.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms, or documented exception.'
