id: NUM.7.14
reference: Numbers 7:14
source:
  edition: WLC
  text: כַּ֥ף אַחַ֛ת עֲשָׂרָ֥ה זָהָ֖ב מְלֵאָ֥ה קְטֹֽרֶת׃
translation:
  text: one gold dish, weighing ten shekels, full of incense;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one gold dish, ten, full of incense'; 'shekels' is understood
      from the repeated offering formula in the surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  chosen: dish
  alternatives:
  - pan
  - bowl
  - spoon
  lexicon: HALOT
  rationale: In tabernacle/cultic inventory contexts, כף refers to a small vessel
    or dish rather than a human 'palm.' English 'dish' best fits a gold container
    for incense in this offering list. 'Spoon' is traditional in some English versions,
    but can mislead modern readers toward tableware rather than a ritual vessel.
- source_word: אַחַת
  chosen: one
  lexicon: HALOT
  rationale: Simple cardinal numeral agreeing with the feminine noun כף.
- source_word: עֲשָׂרָה
  chosen: ten shekels
  alternatives:
  - ten
  lexicon: HALOT
  rationale: Although the noun 'shekels' is not repeated in this verse, the offering
    list formula in the immediate context supplies the understood weight measure.
    Rendering only 'ten' in English would be incomplete and unnatural; 'ten shekels'
    makes the ellipsis explicit for clarity and accuracy.
- source_word: זָהָב
  chosen: gold
  alternatives:
  - of gold
  - golden
  lexicon: HALOT
  rationale: Material descriptor for the vessel. 'Gold' is concise and natural in
    English in apposition with the vessel noun.
- source_word: מְלֵאָה
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Predicate adjective agreeing with the feminine vessel noun; idiomatic
    English requires 'full of' before the content noun.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard rendering for the aromatic substance used in worship. No stronger
    theological or lexical ambiguity is present here.
