id: NUM.7.20
reference: Numbers 7:20
source:
  edition: WLC
  text: כַּ֥ף אַחַ֛ת עֲשָׂרָ֥ה זָהָ֖ב מְלֵאָ֥ה קְטֹֽרֶת׃
translation:
  text: one gold dish of ten shekels, full of incense;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one gold dish, ten [of] gold'; 'shekels' is implied from
      the offering formula in the surrounding verses.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  chosen: dish
  alternatives:
  - pan
  - bowl
  - spoon
  lexicon: HALOT
  rationale: In tabernacle-offering contexts, כף denotes a small vessel/container
    rather than a human palm. 'Dish' is natural modern English and fits the cultic
    inventory. 'Spoon' is traditional in some English versions, but can mislead modern
    readers toward eating utensils; 'pan' or 'bowl' are possible but less idiomatic
    here.
- source_word: אַחַת
  chosen: one
  lexicon: HALOT
  rationale: Simple cardinal numeral agreeing with the feminine noun כף.
- source_word: עֲשָׂרָה
  chosen: ten
  lexicon: HALOT
  rationale: Cardinal numeral modifying the implied weight measure of the vessel.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: 'Material of the vessel: ''gold.'''
- source_word: עֲשָׂרָה זָהָב
  chosen: of ten shekels
  alternatives:
  - weighing ten shekels of gold
  - ten gold
  lexicon: HALOT
  rationale: Although שֶׁקֶל is not written in this clause, in this repeated inventory
    formula the numeral plus material expresses weight by ellipsis, as in the surrounding
    verses. Supplying 'shekels' in English is necessary for sense. 'Of ten shekels'
    is concise and reflects the implied measure.
- source_word: מְלֵאָה
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Predicate adjective describing the vessel's contents; 'full of' is the
    most natural English rendering.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard rendering for the aromatic offering substance used in tabernacle
    worship.
