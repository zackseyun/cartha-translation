id: NUM.7.74
reference: Numbers 7:74
source:
  edition: WLC
  text: כַּ֥ף אַחַ֛ת עֲשָׂרָ֥ה זָהָ֖ב מְלֵאָ֥ה קְטֹֽרֶת׃
translation:
  text: one gold dish of ten shekels, full of incense;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one gold dish, ten [of gold], full of incense'; 'shekels'
      is supplied from the repeated offering formula in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  chosen: dish
  alternatives:
  - pan
  - bowl
  - spoon
  lexicon: HALOT
  rationale: In tabernacle offering contexts, כַּף denotes a small vessel/container
    rather than a hand or palm. 'Dish' is natural modern English and fits the cultic
    inventory. 'Spoon' is traditional in some English versions, but can mislead modern
    readers toward an eating utensil.
- source_word: אַחַת
  chosen: one
  lexicon: HALOT
  rationale: Simple cardinal numeral agreeing with the feminine noun כַּף.
- source_word: עֲשָׂרָה
  chosen: ten
  lexicon: HALOT
  rationale: Cardinal numeral modifying the implied weight measure of the vessel.
- source_word: זָהָב
  chosen: gold
  alternatives:
  - golden
  lexicon: HALOT
  rationale: 'Here the noun functions attributively: the vessel is made of gold. ''Gold''
    is more literal than adjectival ''golden'' and matches inventory style.'
- source_word: עֲשָׂרָה זָהָב
  chosen: of ten shekels
  alternatives:
  - weighing ten shekels of gold
  - ten gold shekels
  lexicon: HALOT
  rationale: The Hebrew omits the unit 'shekels,' but in this repeated offering formula
    the weight measure is understood from context (cf. surrounding verses). Supplying
    'shekels' in English is necessary for clarity and reflects the idiom rather than
    adding new content.
- source_word: מְלֵאָה
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Predicate/adjectival participial sense describing the vessel's contents.
    'Full of' is concise and idiomatic.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard rendering for the aromatic offering substance used in sanctuary
    worship.
