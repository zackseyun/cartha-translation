id: NUM.7.67
reference: Numbers 7:67
source:
  edition: WLC
  text: קָרְבָּנ֞/וֹ קַֽעֲרַת כֶּ֣סֶף אַחַ֗ת שְׁלֹשִׁ֣ים וּ/מֵאָה֮ מִשְׁקָלָ/הּ֒ מִזְרָ֤ק
    אֶחָד֙ כֶּ֔סֶף שִׁבְעִ֥ים שֶׁ֖קֶל בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ שְׁנֵי/הֶ֣ם מְלֵאִ֗ים
    סֹ֛לֶת בְּלוּלָ֥ה בַ/שֶּׁ֖מֶן לְ/מִנְחָֽה־׀׃
translation:
  text: His offering was one silver plate, its weight one hundred thirty shekels,
    one silver basin of seventy shekels, by the shekel of the sanctuary; both of them
    were full of fine flour mixed with oil for a grain offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dish' for 'plate' (קַעֲרָה), a shallow vessel used in the offering inventory.
    reason: lexical_alternative
  - marker: b
    text: Or 'bowl' for 'basin' (מִזְרָק), a ritual vessel.
    reason: lexical_alternative
  - marker: c
    text: That is, according to the sanctuary standard weight.
    reason: cultural_note
lexical_decisions:
- source_word: קָרְבָּנוֹ
  chosen: His offering was
  alternatives:
  - His gift was
  - His قربן/offering was
  lexicon: HALOT
  rationale: קָרְבָּן denotes an offering/presentation brought near in a cultic context.
    'Offering' is the standard clear English equivalent in sacrificial contexts.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  chosen: one silver plate
  alternatives:
  - one silver dish
  - one silver platter
  lexicon: HALOT
  rationale: קַעֲרָה refers to a dish/plate-like vessel. 'Plate' fits the tabernacle
    inventory context and traditional usage in Numbers 7, while remaining understandable.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  chosen: its weight one hundred thirty shekels
  alternatives:
  - weighing one hundred thirty shekels
  lexicon: HALOT
  rationale: The Hebrew states literally 'its weight one hundred and thirty.' The
    chosen rendering is natural English while preserving the explicit mention of weight.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  chosen: one silver basin
  alternatives:
  - one silver bowl
  lexicon: HALOT
  rationale: מִזְרָק is a vessel used in sacrificial service, often for sprinkling
    or presenting blood/liquids. 'Basin' better conveys a ritual vessel than the more
    domestic 'bowl.'
- source_word: שִׁבְעִים שֶׁקֶל
  chosen: of seventy shekels
  alternatives:
  - weighing seventy shekels
  lexicon: HALOT
  rationale: This phrase specifies the weight of the basin. 'Of seventy shekels' is
    concise and idiomatic in the inventory style of the passage.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the shekel of the sanctuary
  alternatives:
  - according to the sanctuary shekel
  - by the holy shekel
  lexicon: HALOT
  rationale: This is the standard cultic weight standard. 'By the shekel of the sanctuary'
    preserves the formal register and the sense of measurement according to the sanctuary
    standard.
- source_word: שְׁנֵיהֶם מְלֵאִים
  chosen: both of them were full
  alternatives:
  - both were filled
  lexicon: HALOT
  rationale: The adjective מְלֵאִים describes the two vessels as full. 'Both of them
    were full' closely reflects the Hebrew emphasis on the pair.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: סֹלֶת is the standard term for fine flour used in offerings.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: בָּלַל in the passive participial form indicates flour prepared by being
    mixed with oil. 'Mixed' is modern and accurate.
- source_word: לְמִנְחָה
  chosen: for a grain offering
  alternatives:
  - for an offering
  - for a tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in priestly sacrificial context refers specifically to the grain
    offering. 'Grain offering' is the clearest established rendering here.
