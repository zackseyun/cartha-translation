id: NUM.7.49
reference: Numbers 7:49
source:
  edition: WLC
  text: קָרְבָּנ֞/וֹ קַֽעֲרַת כֶּ֣סֶף אַחַ֗ת שְׁלֹשִׁ֣ים וּ/מֵאָה֮ מִשְׁקָלָ/הּ֒ מִזְרָ֤ק
    אֶחָד֙ כֶּ֔סֶף שִׁבְעִ֥ים שֶׁ֖קֶל בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ שְׁנֵי/הֶ֣ם מְלֵאִ֗ים
    סֹ֛לֶת בְּלוּלָ֥ה בַ/שֶּׁ֖מֶן לְ/מִנְחָֽה־׀׃
translation:
  text: His offering was one silver plate, its weight one hundred thirty shekels,
    one silver basin of seventy shekels, according to the sanctuary shekel; both of
    them full of fine flour mixed with oil for a grain offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dish' for 'plate' (קַעֲרָה), and 'bowl' for 'basin' (מִזְרָק).
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְבָּנוֹ
  chosen: His offering was
  alternatives:
  - his gift
  - his offering
  lexicon: HALOT
  rationale: קָרְבָּן denotes an offering/presentation brought near in a cultic context.
    'Offering' is the standard and clearest English rendering here.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  chosen: one silver plate
  alternatives:
  - one silver dish
  - one silver platter
  lexicon: HALOT
  rationale: קַעֲרָה is a vessel; in this tabernacle inventory context 'plate' fits
    a broad shallow vessel better than the more generic 'dish.' 'Silver' directly
    modifies the vessel.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  chosen: its weight one hundred thirty shekels
  alternatives:
  - weighing one hundred thirty shekels
  - its weight was one hundred thirty shekels
  lexicon: HALOT
  rationale: The Hebrew gives the vessel followed by its weight. 'Its weight one hundred
    thirty shekels' preserves the compact inventory style while remaining natural
    English.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  chosen: one silver basin
  alternatives:
  - one silver bowl
  lexicon: HALOT
  rationale: מִזְרָק is a bowl/basin used in sacrificial service, often for sprinkling.
    'Basin' better suggests a ritual vessel than 'bowl' in this context.
- source_word: שִׁבְעִים שֶׁקֶל
  chosen: of seventy shekels
  alternatives:
  - weighing seventy shekels
  lexicon: HALOT
  rationale: This continues the inventory description of the second vessel's weight.
    'Of seventy shekels' is concise and idiomatic with the preceding noun phrase.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: according to the sanctuary shekel
  alternatives:
  - by the sanctuary shekel
  - in the shekel of the sanctuary
  - by the holy shekel
  lexicon: HALOT
  rationale: This phrase specifies the standard of weight. 'According to the sanctuary
    shekel' is clear modern English and preserves the cultic standard.
- source_word: שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - both
  lexicon: HALOT
  rationale: Refers to the two silver vessels together. 'Both of them' makes the referent
    explicit in English.
- source_word: מְלֵאִים
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Predicate adjective describing the vessels' contents. 'Full of' is straightforward
    and natural.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: Standard rendering for the refined flour used in offerings.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: Describes the flour's preparation. 'Mixed with oil' is accurate and readable
    modern English.
- source_word: לְמִנְחָה
  chosen: for a grain offering
  alternatives:
  - for an offering
  - for a tribute offering
  lexicon: HALOT
  rationale: In priestly sacrificial context, מִנְחָה specifically denotes the grain
    offering. This preserves cultic specificity better than the generic 'offering'.
