id: NUM.7.6
reference: Numbers 7:6
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח מֹשֶׁ֔ה אֶת הָ/עֲגָלֹ֖ת וְ/אֶת הַ/בָּקָ֑ר וַ/יִּתֵּ֥ן אוֹתָ֖/ם
    אֶל הַ/לְוִיִּֽם־־־׃
translation:
  text: So Moses took the carts and the cattle and gave them to the Levites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wagons' for 'carts.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'cattle'; context elsewhere in the chapter specifies oxen.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - received
  lexicon: HALOT
  rationale: Qal wayyiqtol of לקח commonly means 'take.' In context Moses physically
    takes possession of the items just presented, so 'took' is the most natural and
    direct rendering.
- source_word: הָעֲגָלֹת
  chosen: the carts
  alternatives:
  - the wagons
  lexicon: HALOT
  rationale: עגלה here refers to transport vehicles donated for tabernacle service.
    'Carts' is clear modern English and fits the likely function; 'wagons' is possible
    but slightly more interpretive in this context.
- source_word: הַבָּקָר
  chosen: the cattle
  alternatives:
  - the oxen
  lexicon: HALOT
  rationale: בקר is a collective noun for herd animals/cattle. Although the immediate
    context specifies oxen elsewhere in the chapter, this verse itself uses the broader
    collective term. 'Cattle' preserves the Hebrew wording more closely; 'oxen' is
    a contextually plausible narrowing but less formally exact here.
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - assigned
  lexicon: HALOT
  rationale: נתן in the Qal wayyiqtol straightforwardly means 'gave.' 'Assigned' would
    bring out administrative distribution, but the basic verb 'gave' best matches
    the Hebrew while allowing the context to supply the official nature of the action.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: The masculine plural object pronoun refers collectively to both the carts
    and the cattle. English 'them' is the natural equivalent.
- source_word: אֶל־הַלְוִיִּם
  chosen: to the Levites
  alternatives:
  - for the Levites
  lexicon: HALOT
  rationale: The preposition אֶל normally means 'to, toward.' Since Moses is transferring
    the items into Levite possession, 'to the Levites' is the most direct rendering.
    'For the Levites' would emphasize purpose rather than transfer.
