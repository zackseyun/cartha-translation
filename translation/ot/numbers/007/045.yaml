id: NUM.7.45
reference: Numbers 7:45
source:
  edition: WLC
  text: פַּ֣ר אֶחָ֞ד בֶּן בָּקָ֗ר אַ֧יִל אֶחָ֛ד כֶּֽבֶשׂ אֶחָ֥ד בֶּן שְׁנָת֖/וֹ לְ/עֹלָֽה־־־׃
translation:
  text: one bull from the herd, one ram, one male lamb a year old, for a burnt offering;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פַּר
  chosen: bull
  alternatives:
  - young bull
  - ox
  lexicon: HALOT
  rationale: פַּר in sacrificial contexts denotes a bull. 'Bull' is the most natural
    modern English rendering and fits the animal list.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: The repeated numeral marks the count of each sacrificial animal individually;
    rendering each as 'one' preserves the list structure.
- source_word: בֶּן בָּקָר
  chosen: from the herd
  alternatives:
  - a head of cattle
  - of cattle
  lexicon: HALOT
  rationale: The construct phrase literally means 'son of cattle/herd' and idiomatically
    specifies a bovine animal from the herd. 'From the herd' is idiomatic English
    that preserves the distinction from sheep/goats without wooden literalism.
- source_word: אַיִל
  chosen: ram
  lexicon: HALOT
  rationale: Standard rendering for the adult male sheep used in sacrificial contexts.
- source_word: כֶּבֶשׂ
  chosen: male lamb
  alternatives:
  - lamb
  lexicon: HALOT
  rationale: כֶּבֶשׂ denotes a male lamb. Including 'male' makes the lexical value
    explicit, though English often leaves it implicit.
- source_word: בֶּן שְׁנָתוֹ
  chosen: a year old
  alternatives:
  - in its first year
  - the son of its year
  lexicon: HALOT
  rationale: This idiom indicates the animal's age. 'A year old' is clear modern English
    and accurately conveys the sacrificial specification.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. 'For a burnt
    offering' fits the list format of the verse.
