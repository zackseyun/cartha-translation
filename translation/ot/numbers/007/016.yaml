id: NUM.7.16
reference: Numbers 7:16
source:
  edition: WLC
  text: שְׂעִיר עִזִּ֥ים אֶחָ֖ד לְ/חַטָּֽאת־׃
translation:
  text: one male goat for a sin offering;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "one he-goat for a sin offering."
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  chosen: male goat
  alternatives:
  - goat
  - buck goat
  - he-goat
  lexicon: HALOT
  rationale: The construct phrase literally denotes a hairy one of the goats, an idiom
    for a male goat. 'Male goat' is clear modern English and preserves the sacrificial-animal
    specificity better than the less common 'he-goat.'
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: The numeral is retained explicitly, matching the inventory style of Numbers
    7 and preserving the formal count of the offering.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly refers to the sin offering rather
    than abstract sin. The prefixed ל is well represented by 'for' here. 'For sin'
    would be too ambiguous in English, while 'as a sin offering' is possible but slightly
    less natural in this list format.
