theological_decisions:
- issue: Rendering חַטָּאת in cultic context
  chosen_reading: sin offering
  alternative_readings:
  - for sin
  rationale: The immediate context is a list of sacrificial animals and offerings,
    so the cultic sense is required rather than the abstract moral sense 'sin.' This
    avoids importing later theological nuance and follows the plain sacrificial usage
    of the Hebrew.
