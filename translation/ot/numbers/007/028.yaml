id: NUM.7.28
reference: Numbers 7:28
source:
  edition: WLC
  text: שְׂעִיר עִזִּ֥ים אֶחָ֖ד לְ/חַטָּֽאת־׃
translation:
  text: one male goat for a sin offering.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שְׂעִיר
  chosen: male goat
  alternatives:
  - goat
  - he-goat
  - buck
  lexicon: HALOT
  rationale: שְׂעִיר in sacrificial contexts denotes a male goat, not merely a generic
    goat. Rendering it as 'male goat' preserves the animal's sex, which is explicit
    in the Hebrew and relevant in offering lists.
- source_word: עִזִּים
  chosen: goat
  alternatives:
  - goats
  lexicon: HALOT
  rationale: In the construct phrase שְׂעִיר עִזִּים, עִזִּים specifies the species/class
    ('of goats'). In idiomatic English this is best represented within the compound
    expression 'male goat' rather than a wooden 'goat of goats.'
- source_word: אֶחָד
  chosen: one
  alternatives:
  - a single
  - one [animal]
  lexicon: HALOT
  rationale: The numeral is explicit and should be retained because this verse is
    part of a repeated inventory of offerings. 'One' is more formally transparent
    than simply using the English article 'a.'
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly denotes the sin offering rather
    than abstract 'sin.' The prefixed לְ is naturally rendered 'for' here in an offering
    list. 'For a sin offering' is clear, idiomatic, and contextually precise.
