id: NUM.7.70
reference: Numbers 7:70
source:
  edition: WLC
  text: שְׂעִיר עִזִּ֥ים אֶחָ֖ד לְ/חַטָּֽאת־׃
translation:
  text: one male goat for a sin offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a sin offering.' The Hebrew חַטָּאת can mean 'sin' or, in sacrificial
      contexts like this one, 'sin offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  chosen: male goat
  alternatives:
  - goat
  - buck goat
  - he-goat
  lexicon: HALOT
  rationale: The construct phrase literally denotes a hairy one of the goats, an idiom
    for a male goat. 'Male goat' is clear modern English and preserves the sacrificial-animal
    specificity better than the less common 'he-goat.'
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: The numeral straightforwardly counts the sacrificial animal. Retaining
    'one' reflects the repetitive inventory style of Numbers 7.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - for sin
  - as a sin offering
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly refers metonymically to the
    sin offering rather than abstract sin. The prefixed ל is well represented by 'for'
    in this list format. 'For a sin offering' is idiomatic and contextually precise.
