theological_decisions:
- issue: Rendering חַטָּאת in cultic context
  chosen_reading: sin offering
  alternative_readings:
  - sin
  rationale: The verse is part of a sacrificial inventory, so the cultic sense is
    demanded by context. Translating merely 'for sin' would undertranslate the established
    sacrificial meaning.
