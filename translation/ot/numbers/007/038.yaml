id: NUM.7.38
reference: Numbers 7:38
source:
  edition: WLC
  text: כַּ֥ף אַחַ֛ת עֲשָׂרָ֥ה זָהָ֖ב מְלֵאָ֥ה קְטֹֽרֶת׃
translation:
  text: one gold dish, ten shekels, full of incense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one gold dish, ten [of] gold, full of incense'; 'shekels'
      is supplied in English because the phrase is an abbreviated weight formula in
      this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'pan,' 'bowl,' or traditionally 'spoon' for the vessel.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  chosen: dish
  alternatives:
  - pan
  - bowl
  - spoon
  lexicon: HALOT
  rationale: In the tabernacle-offering context, כף denotes a small vessel/container
    rather than a hand or palm. English 'dish' is natural and fits the cultic inventory
    context. 'Spoon' is traditional in some versions, but in contemporary English
    it can mislead readers toward an eating utensil rather than a ritual vessel.
- source_word: אַחַת
  chosen: one
  lexicon: HALOT
  rationale: Cardinal numeral modifying כף; rendered straightforwardly as 'one'.
- source_word: עֲשָׂרָה
  chosen: ten
  lexicon: HALOT
  rationale: Cardinal numeral indicating the vessel's weight.
- source_word: זָהָב
  chosen: gold
  alternatives:
  - of gold
  - golden
  lexicon: HALOT
  rationale: Material of the vessel. Rendered attributively in English as 'gold dish'
    for natural style while preserving the sense.
- source_word: עֲשָׂרָה זָהָב
  chosen: ten shekels
  alternatives:
  - ten gold shekels
  - weighing ten shekels of gold
  lexicon: HALOT
  rationale: In this repeated inventory formula in Numbers 7, the bare numeral plus
    material is an elliptical weight expression, understood as shekels from the immediate
    context and parallel verses. Supplying 'shekels' in English is necessary for clarity
    and reflects the idiomatic sense rather than adding new content.
- source_word: מְלֵאָה
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Predicate adjective agreeing with כף, describing its contents. 'Full
    of' is concise and idiomatic.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard rendering for the aromatic offering substance used in worship.
