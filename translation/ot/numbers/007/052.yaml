id: NUM.7.52
reference: Numbers 7:52
source:
  edition: WLC
  text: שְׂעִיר עִזִּ֥ים אֶחָ֖ד לְ/חַטָּֽאת־׃
translation:
  text: one male goat for a sin offering;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שְׂעִיר
  chosen: male goat
  alternatives:
  - goat
  - he-goat
  - buck
  lexicon: HALOT
  rationale: שְׂעִיר in sacrificial contexts denotes a male goat, not merely a generic
    goat. 'Male goat' is clear modern English and preserves the animal's sex, which
    is specified in the Hebrew term and relevant in offering lists.
- source_word: עִזִּים
  chosen: goat
  alternatives:
  - goats
  lexicon: HALOT
  rationale: 'In the construct phrase שְׂעִיר עִזִּים, עִזִּים functions idiomatically
    to specify the species: ''male goat of goats,'' i.e., ''male goat.'' English does
    not preserve the literal plural naturally, so the sense is conveyed by ''male
    goat.'''
- source_word: אֶחָד
  chosen: one
  alternatives:
  - a
  - single
  lexicon: HALOT
  rationale: The numeral explicitly counts the offering item in this inventory context.
    Rendering it as 'one' preserves the formal listing style better than the more
    idiomatic but less explicit 'a.'
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly denotes the sin offering rather
    than abstract 'sin.' The prefixed לְ is well represented by 'for' here, matching
    the offering-list formula and remaining natural in English.
