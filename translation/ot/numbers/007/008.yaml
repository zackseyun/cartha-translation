id: NUM.7.8
reference: Numbers 7:8
source:
  edition: WLC
  text: וְ/אֵ֣ת אַרְבַּ֣ע הָ/עֲגָלֹ֗ת וְ/אֵת֙ שְׁמֹנַ֣ת הַ/בָּקָ֔ר נָתַ֖ן לִ/בְנֵ֣י
    מְרָרִ֑י כְּ/פִי֙ עֲבֹ֣דָתָ֔/ם בְּ/יַד֙ אִֽיתָמָ֔ר בֶּֽן אַהֲרֹ֖ן הַ/כֹּהֵֽן׀־׃
translation:
  text: And he gave the four carts and the eight oxen to the sons of Merari, according
    to their service, under the direction of Ithamar son of Aaron the priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wagons' for 'carts.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'by the hand of Ithamar,' an idiom indicating agency or supervision.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֲגָלֹת
  chosen: carts
  alternatives:
  - wagons
  lexicon: HALOT
  rationale: עֲגָלָה refers to a wheeled transport vehicle. 'Carts' is natural modern
    English and fits the tabernacle transport context; 'wagons' is possible but slightly
    heavier in English usage.
- source_word: הַבָּקָר
  chosen: oxen
  alternatives:
  - cattle
  lexicon: HALOT
  rationale: In this context the animals are assigned to pull the carts, so 'oxen'
    is more specific and contextually appropriate than the broader 'cattle'.
- source_word: נָתַן
  chosen: gave
  alternatives:
  - assigned
  lexicon: HALOT
  rationale: The plain verbal sense is 'gave.' Although the context implies official
    allocation, the Hebrew verb itself does not require the more interpretive 'assigned.'
- source_word: לִבְנֵי מְרָרִי
  chosen: to the sons of Merari
  alternatives:
  - to the Merarites
  lexicon: HALOT
  rationale: The Hebrew is literally 'to the sons of Merari.' This preserves the familial/tribal
    expression while remaining clear in English.
- source_word: כְּפִי עֲבֹדָתָם
  chosen: according to their service
  alternatives:
  - according to their work
  - in proportion to their service
  lexicon: HALOT
  rationale: כְּפִי literally means 'according to the mouth of,' idiomatically 'according
    to' or 'in keeping with.' עֲבֹדָה here denotes assigned service/duty in tabernacle
    work. 'According to their service' is both accurate and readable.
- source_word: בְּיַד אִיתָמָר
  chosen: under the direction of Ithamar
  alternatives:
  - by the hand of Ithamar
  - under Ithamar's supervision
  lexicon: HALOT
  rationale: בְּיַד literally means 'by the hand of,' but in administrative contexts
    it denotes agency or supervision. 'Under the direction of' communicates the idiom's
    function in clear modern English.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: The appositional phrase identifies Aaron as 'the priest.' Retaining the
    definite title matches the Hebrew and preserves the formal identification.
