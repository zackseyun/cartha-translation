id: NUM.7.88
reference: Numbers 7:88
source:
  edition: WLC
  text: וְ/כֹ֞ל בְּקַ֣ר זֶ֣בַח הַ/שְּׁלָמִ֗ים עֶשְׂרִ֣ים וְ/אַרְבָּעָה֮ פָּרִים֒ אֵילִ֤ם
    שִׁשִּׁים֙ עַתֻּדִ֣ים שִׁשִּׁ֔ים כְּבָשִׂ֥ים בְּנֵי שָׁנָ֖ה שִׁשִּׁ֑ים זֹ֚את חֲנֻכַּ֣ת
    הַ/מִּזְבֵּ֔חַ אַחֲרֵ֖י הִמָּשַׁ֥ח אֹתֽ/וֹ׀־׃
translation:
  text: And all the cattle for the sacrifice of peace offerings were twenty-four bulls,
    sixty rams, sixty male goats, and sixty one-year-old lambs. This was the dedication
    offering of the altar after it had been anointed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sacrifice of fellowship offerings' or 'the sacrifice of well-being
      offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  chosen: And all
  alternatives:
  - And the total of
  - All
  lexicon: HALOT
  rationale: Introduces the concluding total for this category of offerings. 'And
    all' preserves the connective וְ and the comprehensiveness of כֹל.
- source_word: בְּקַר
  chosen: the cattle
  alternatives:
  - the herd animals
  - the oxen
  lexicon: HALOT
  rationale: בְּקַר is a collective term for bovine herd animals. 'Cattle' fits the
    collective sense better than 'oxen' here, especially since the specific count
    is then given as bulls.
- source_word: זֶבַח הַשְּׁלָמִים
  chosen: the sacrifice of peace offerings
  alternatives:
  - the sacrifice of fellowship offerings
  - the sacrifice of well-being offerings
  lexicon: HALOT
  rationale: זֶבַח is 'sacrifice' and שְׁלָמִים is the standard sacrificial category
    often rendered 'peace offerings.' This keeps a recognizable formal rendering while
    remaining understandable. Alternatives reflect modern renderings that emphasize
    fellowship or well-being.
- source_word: עֶשְׂרִים וְאַרְבָּעָה
  chosen: twenty-four
  lexicon: HALOT
  rationale: Straightforward cardinal number.
- source_word: פָּרִים
  chosen: bulls
  alternatives:
  - young bulls
  lexicon: HALOT
  rationale: The plural of פַּר commonly denotes bulls in sacrificial contexts. 'Young
    bulls' is possible in some contexts, but the Hebrew here does not require 'young.'
- source_word: אֵילִם
  chosen: rams
  lexicon: HALOT
  rationale: Standard rendering for sacrificial male sheep.
- source_word: עַתֻּדִים
  chosen: male goats
  alternatives:
  - goats
  - he-goats
  lexicon: HALOT
  rationale: Specifies male goats; 'male goats' is clear modern English without the
    archaic feel of 'he-goats.'
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה
  chosen: one-year-old lambs
  alternatives:
  - lambs a year old
  - year-old lambs
  lexicon: HALOT
  rationale: This phrase denotes lambs in their first year. 'One-year-old lambs' is
    natural English and preserves the age specification important in sacrificial regulations.
- source_word: זֹאת
  chosen: This was
  alternatives:
  - This is
  lexicon: HALOT
  rationale: Though literally 'this,' English idiom in a retrospective summary favors
    'This was.' The verse concludes the list by identifying the total dedication offering.
- source_word: חֲנֻכַּת הַמִּזְבֵּחַ
  chosen: the dedication offering of the altar
  alternatives:
  - the dedication of the altar
  - the altar's dedication offering
  lexicon: HALOT
  rationale: In context, חֲנֻכָּה refers to the dedication event/offerings associated
    with inaugurating the altar. Because the verse is summing sacrificial totals,
    'dedication offering of the altar' makes the referent explicit in English.
- source_word: אַחֲרֵי הִמָּשַׁח אֹתוֹ
  chosen: after it had been anointed
  alternatives:
  - after anointing it
  - after he anointed it
  lexicon: HALOT
  rationale: 'The infinitive construct with אַחֲרֵי marks subsequent time: ''after
    its being anointed'' / ''after it had been anointed.'' The passive-like English
    avoids introducing an explicit subject not stated here.'
