theological_decisions:
- issue: Rendering of שְׁלָמִים sacrificial category
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  - offerings of well-being
  rationale: This is a cultic category rather than a doctrinally disputed term, but
    it carries theological nuance. 'Peace offerings' preserves continuity with traditional
    sacrificial terminology while remaining intelligible. Alternatives are viable
    and preserved in a footnote because they highlight relational or wholeness aspects
    of the Hebrew root.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
