id: NUM.7.37
reference: Numbers 7:37
source:
  edition: WLC
  text: קָרְבָּנ֞/וֹ קַֽעֲרַת כֶּ֣סֶף אַחַ֗ת שְׁלֹשִׁ֣ים וּ/מֵאָה֮ מִשְׁקָלָ/הּ֒ מִזְרָ֤ק
    אֶחָד֙ כֶּ֔סֶף שִׁבְעִ֥ים שֶׁ֖קֶל בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ שְׁנֵי/הֶ֣ם מְלֵאִ֗ים
    סֹ֛לֶת בְּלוּלָ֥ה בַ/שֶּׁ֖מֶן לְ/מִנְחָֽה־׀׃
translation:
  text: His offering was one silver plate, its weight one hundred thirty shekels,
    one silver basin of seventy shekels, by the shekel of the sanctuary; both of them
    were full of fine flour mixed with oil for a grain offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dish' for 'plate' (Hebrew קַעֲרָה), a vessel term that may refer more
      broadly to a shallow bowl or dish.
    reason: lexical_alternative
  - marker: b
    text: Or 'sprinkling bowl' for 'basin' (Hebrew מִזְרָק), reflecting the vessel's
      cultic use in other contexts.
    reason: lexical_alternative
  - marker: c
    text: '''By the shekel of the sanctuary'' means according to the sanctuary''s
      standard weight.'
    reason: cultural_note
lexical_decisions:
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his gift
  - his oblation
  lexicon: HALOT
  rationale: The noun קָרְבָּן denotes an offering brought near/presented in worship.
    'Offering' is the clearest natural English equivalent in sacrificial context.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  chosen: one silver plate
  alternatives:
  - one silver dish
  - one silver bowl
  lexicon: HALOT
  rationale: קַעֲרָה can denote a dish/plate/bowl. In this inventory context, a broad
    shallow vessel is likely; 'plate' fits traditional tabernacle vessel terminology
    while remaining understandable. 'One' preserves the counted item.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  chosen: its weight one hundred thirty shekels
  alternatives:
  - weighing one hundred thirty shekels
  lexicon: HALOT
  rationale: 'The Hebrew states literally ''its weight: thirty and a hundred.'' English
    idiom reverses to ''one hundred thirty.'' Including ''its weight'' preserves the
    nominal construction.'
- source_word: מִזְרָק אֶחָד כֶּסֶף
  chosen: one silver basin
  alternatives:
  - one silver bowl
  - one silver sprinkling bowl
  lexicon: HALOT
  rationale: מִזְרָק is a bowl/basin used in cultic service, often for tossing or
    sprinkling blood. Here it is listed as a vessel with weight; 'basin' is a clear
    cultic vessel term without over-specifying function in the main text.
- source_word: שִׁבְעִים שֶׁקֶל
  chosen: of seventy shekels
  alternatives:
  - weighing seventy shekels
  lexicon: HALOT
  rationale: This gives the weight of the basin. 'Of seventy shekels' is concise and
    natural in English when linked to the vessel.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the shekel of the sanctuary
  alternatives:
  - according to the sanctuary shekel
  - by the holy shekel
  lexicon: HALOT
  rationale: This phrase specifies the standard unit of weight used for valuation.
    'By the shekel of the sanctuary' is a transparent rendering of the Hebrew construction
    and preserves cultic specificity.
- source_word: שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - both
  lexicon: HALOT
  rationale: Refers to the two vessels together. 'Both of them' makes the antecedent
    explicit and preserves the emphatic dual sense.
- source_word: מְלֵאִים
  chosen: were full of
  alternatives:
  - full
  lexicon: HALOT
  rationale: Predicate adjective describing the vessels' contents; English requires
    a verbal expression for smoothness.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: Standard sacrificial term for finely milled flour used in offerings.
    'Fine flour' is the conventional and accurate rendering.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: Describes the flour as combined with oil. 'Mixed with oil' is natural
    modern English and preserves the preparation detail.
- source_word: לְמִנְחָה
  chosen: for a grain offering
  alternatives:
  - for an offering
  - for a tribute offering
  lexicon: HALOT
  rationale: In priestly sacrificial context, מִנְחָה refers specifically to the cereal/grain
    offering. 'Grain offering' is the clearest contextual rendering in English.
