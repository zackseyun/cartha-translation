id: NUM.7.50
reference: Numbers 7:50
source:
  edition: WLC
  text: כַּ֥ף אַחַ֛ת עֲשָׂרָ֥ה זָהָ֖ב מְלֵאָ֥ה קְטֹֽרֶת׃
translation:
  text: one gold dish, weighing ten shekels, full of incense;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one gold pan' or 'one gold bowl.' Traditional versions often read 'spoon,'
      but the Hebrew term refers more broadly to a small ceremonial vessel.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  chosen: dish
  alternatives:
  - pan
  - bowl
  - spoon
  lexicon: HALOT
  rationale: In tabernacle/altar inventory contexts, כף denotes a small vessel or
    dish rather than a human 'palm.' Traditional English versions often use 'spoon,'
    but in modern English that can mislead readers toward tableware. 'Dish' best conveys
    a small ceremonial container.
- source_word: אַחַת
  chosen: one
  lexicon: HALOT
  rationale: Simple cardinal numeral agreeing with the feminine noun כף.
- source_word: עֲשָׂרָה
  chosen: ten shekels, weighing
  alternatives:
  - ten
  - of ten shekels
  lexicon: HALOT
  rationale: Although 'shekels' is not explicit in this clause, the repeated formula
    in Numbers 7 uses the numeral elliptically for weight, with 'shekels' understood
    from the larger context (cf. preceding vessel descriptions in the chapter). Supplying
    'weighing ten shekels' makes the sense clear in idiomatic English without adding
    new content beyond the established inventory formula.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: 'Material descriptor for the vessel: ''gold.'''
- source_word: מְלֵאָה
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Predicate adjective describing the vessel's contents; 'full of' is natural
    and direct.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard rendering for the aromatic substance burned in worship.
