id: NUM.7.66
reference: Numbers 7:66
source:
  edition: WLC
  text: בַּ/יּוֹם֙ הָ/עֲשִׂירִ֔י נָשִׂ֖יא לִ/בְנֵ֣י דָ֑ן אֲחִיעֶ֖זֶר בֶּן עַמִּישַׁדָּֽי־׃
translation:
  text: 'On the tenth day, the leader of the sons of Dan was Ahiezer son of Ammishaddai:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בַּיּוֹם
  chosen: On the ... day
  alternatives:
  - In the ... day
  lexicon: HALOT
  rationale: The preposition ב with יוֹם in this narrative listing is most naturally
    temporal, rendered idiomatically in English as 'On the ... day' rather than the
    more wooden 'In the ... day.'
- source_word: הָעֲשִׂירִי
  chosen: tenth
  lexicon: HALOT
  rationale: Ordinal adjective modifying 'day'; 'tenth' is the straightforward formal
    equivalent.
- source_word: נָשִׂיא
  chosen: leader
  alternatives:
  - chief
  - prince
  - tribal leader
  lexicon: HALOT
  rationale: In Numbers, נָשִׂיא denotes the recognized head of a tribe or clan. 'Leader'
    is clear modern English and fits the administrative/representative role without
    the potentially misleading royal overtones of 'prince.'
- source_word: לִבְנֵי דָן
  chosen: of the sons of Dan
  alternatives:
  - for the sons of Dan
  - of the Danites
  lexicon: HALOT
  rationale: The construction identifies the group represented by the leader. 'Of
    the sons of Dan' preserves the Hebrew familial expression בני while remaining
    natural enough in English. 'Danites' is possible but less formally transparent
    to the source wording.
- source_word: אֲחִיעֶזֶר
  chosen: Ahiezer
  rationale: 'Personal name transliterated according to the translation philosophy:
    translate titles, transliterate names.'
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: Standard patronymic construction; 'son of' is the direct and conventional
    rendering.
- source_word: עַמִּישַׁדָּי
  chosen: Ammishaddai
  rationale: Personal name transliterated rather than translated, in keeping with
    project policy for names.
