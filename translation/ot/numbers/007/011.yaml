id: NUM.7.11
reference: Numbers 7:11
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוָ֖ה אֶל מֹשֶׁ֑ה נָשִׂ֨יא אֶחָ֜ד לַ/יּ֗וֹם נָשִׂ֤יא אֶחָד֙ לַ/יּ֔וֹם יַקְרִ֨יבוּ֙ אֶת קָרְבָּנָ֔/ם לַ/חֲנֻכַּ֖ת הַ/מִּזְבֵּֽחַ־־׃ס
translation:
  text: Then Yahweh said to Moses, “One leader each day, one leader each day, they shall present their offering for the dedication of the altar.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one tribal leader per day.' The Hebrew repeats 'one leader, one day' for emphasis on the ordered sequence of offerings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural English narrative sequence while preserving the simple verbal sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נָשִׂיא
  chosen: leader
  alternatives:
  - chief
  - prince
  - tribal leader
  lexicon: HALOT
  rationale: In this context the word refers to the heads of Israel's tribes bringing offerings. 'Leader' is clear modern English and broad enough to fit the office without importing monarchical overtones of 'prince.'
- source_word: אֶחָד
  chosen: one
  alternatives:
  - single
  - one by one
  lexicon: HALOT
  rationale: The numeral is retained straightforwardly to preserve the distributive pattern.
- source_word: לַיּוֹם
  chosen: each day
  alternatives:
  - for the day
  - per day
  - on the day
  lexicon: HALOT
  rationale: With the repeated phrase 'one leader ... one leader ...' the sense is distributive over successive days. 'Each day' communicates the idiomatic force in natural English.
- source_word: יַקְרִיבוּ
  chosen: they shall present
  alternatives:
  - they shall bring near
  - they shall offer
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts commonly means to present or offer. 'Present' fits well with the direct object 'their offering' and avoids redundancy with English 'offer their offering.'
- source_word: קָרְבָּנָם
  chosen: their offering
  alternatives:
  - their gift
  - their oblation
  lexicon: HALOT
  rationale: The noun denotes an offering brought near to God. 'Offering' is the standard clear rendering in cultic context.
- source_word: לַחֲנֻכַּת
  chosen: for the dedication of
  alternatives:
  - for the consecration of
  - at the dedication of
  lexicon: HALOT
  rationale: The noun refers to the dedicatory occasion for the altar. 'For the dedication of' best reflects purpose/occasion in idiomatic English.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard rendering for the sacrificial altar.
