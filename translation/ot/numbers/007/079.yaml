id: NUM.7.79
reference: Numbers 7:79
source:
  edition: WLC
  text: קָרְבָּנ֞/וֹ קַֽעֲרַת כֶּ֣סֶף אַחַ֗ת שְׁלֹשִׁ֣ים וּ/מֵאָה֮ מִשְׁקָלָ/הּ֒ מִזְרָ֤ק
    אֶחָד֙ כֶּ֔סֶף שִׁבְעִ֥ים שֶׁ֖קֶל בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ שְׁנֵי/הֶ֣ם מְלֵאִ֗ים
    סֹ֛לֶת בְּלוּלָ֥ה בַ/שֶּׁ֖מֶן לְ/מִנְחָֽה־׀׃
translation:
  text: His offering was one silver plate, its weight one hundred thirty shekels,
    one silver basin of seventy shekels, according to the sanctuary shekel; both of
    them full of fine flour mixed with oil for a grain offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one silver bowl' for 'one silver plate' (קַעֲרָה), since the Hebrew
      term denotes a vessel and its exact shape is not fully certain.
    reason: lexical_alternative
  - marker: b
    text: Or 'one silver sprinkling bowl' for 'one silver basin' (מִזְרָק), highlighting
      the vessel's ritual function.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his gift
  - his oblation
  lexicon: HALOT
  rationale: The noun קָרְבָּן denotes an offering/presentation brought near to God.
    'Offering' is the clearest natural English equivalent in sacrificial context.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  chosen: one silver plate
  alternatives:
  - one silver dish
  - one silver bowl
  lexicon: HALOT
  rationale: קַעֲרָה here refers to a shallow vessel used in offerings. 'Plate' fits
    the likely shape and matches common tabernacle-inventory usage better than the
    more generic 'dish' or the deeper 'bowl'.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  chosen: its weight one hundred thirty shekels
  alternatives:
  - weighing one hundred thirty shekels
  lexicon: HALOT
  rationale: The Hebrew literally states 'its weight [was] one hundred and thirty.'
    The chosen rendering preserves the explicit mention of weight while remaining
    idiomatic English.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  chosen: one silver basin
  alternatives:
  - one silver bowl
  - one silver sprinkling bowl
  lexicon: HALOT
  rationale: מִזְרָק is a vessel associated with ritual use, often for tossing/sprinkling
    blood or holding offerings. 'Basin' is a clear, readable choice broad enough for
    the cultic vessel without over-specifying function in the main text.
- source_word: שִׁבְעִים שֶׁקֶל
  chosen: of seventy shekels
  alternatives:
  - weighing seventy shekels
  lexicon: HALOT
  rationale: This phrase gives the weight of the basin. 'Of seventy shekels' is concise
    and natural in coordination with the previous vessel description.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: according to the sanctuary shekel
  alternatives:
  - by the shekel of the sanctuary
  - by the holy shekel
  lexicon: HALOT
  rationale: This standard formula specifies the cultic weight standard. 'According
    to the sanctuary shekel' is idiomatic and preserves the technical sense.
- source_word: שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - both
  lexicon: HALOT
  rationale: The pronoun explicitly refers to the two vessels together. 'Both of them'
    preserves that explicitness.
- source_word: מְלֵאִים
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Predicate adjective describing the vessels' contents. 'Full of' is straightforward
    and natural.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: Standard sacrificial term for finely milled flour used in offerings.
    'Fine flour' is the established and accurate rendering.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: The passive participle indicates the flour had been blended with oil.
    'Mixed with oil' is modern and precise.
- source_word: לְמִנְחָה
  chosen: for a grain offering
  alternatives:
  - for an offering
  - for a tribute offering
  lexicon: HALOT
  rationale: In priestly sacrificial context, מִנְחָה specifically denotes the cereal/grain
    offering. 'Grain offering' communicates the cultic category clearly in modern
    English.
