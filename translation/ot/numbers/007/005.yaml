id: NUM.7.5
reference: Numbers 7:5
source:
  edition: WLC
  text: קַ֚ח מֵֽ/אִתָּ֔/ם וְ/הָי֕וּ לַ/עֲבֹ֕ד אֶת עֲבֹדַ֖ת אֹ֣הֶל מוֹעֵ֑ד וְ/נָתַתָּ֤ה
    אוֹתָ/ם֙ אֶל הַ/לְוִיִּ֔ם אִ֖ישׁ כְּ/פִ֥י עֲבֹדָתֽ/וֹ־־׃
translation:
  text: Take them from them, and let them be used for the service of the tent of meeting;
    and you shall give them to the Levites, each according to his service.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and they shall be for serving the service of the tent
      of meeting.' The main text renders the Hebrew idiom in natural English, since
      the objects in view are inanimate and are meant to be used in the sanctuary
      service.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each according to his service,' referring to distribution in keeping
      with each Levite's assigned duty.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח
  chosen: Take
  alternatives:
  - Receive
  lexicon: HALOT
  rationale: Imperative of לקח, a straightforward command to Moses to take/accept
    the offered items. 'Take' is the most natural and direct English equivalent here.
- source_word: מֵאִתָּם
  chosen: from them
  alternatives:
  - from among them
  lexicon: HALOT
  rationale: 'The preposition with pronoun indicates source: Moses is to take the
    items from the tribal leaders who presented them. ''From them'' is sufficiently
    clear and formally close.'
- source_word: וְהָיוּ לַעֲבֹד
  chosen: let them be used
  alternatives:
  - and they shall be for serving
  - and they shall serve
  lexicon: HALOT
  rationale: 'The Hebrew expresses purpose/result: ''and they shall be for serving.''
    Since the referent is inanimate wagons and oxen from the context, English idiom
    requires a passive-like sense: they are to be used in service, not that they themselves
    actively serve.'
- source_word: עֲבֹדַת
  chosen: service
  alternatives:
  - work
  - ministry
  lexicon: HALOT
  rationale: עֲבֹדָה here denotes assigned labor connected with sanctuary transport
    and function. 'Service' preserves the cultic/official nuance without becoming
    overly technical.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard designation for the sanctuary structure in the wilderness.
    'Tent of meeting' is the established and accurate rendering.
- source_word: וְנָתַתָּה אֹתָם אֶל הַלְוִיִּם
  chosen: and you shall give them to the Levites
  alternatives:
  - and assign them to the Levites
  lexicon: HALOT
  rationale: נתן commonly means 'give.' In context it implies assignment for use,
    but 'give them to the Levites' preserves the Hebrew wording while remaining clear.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - each man
  lexicon: HALOT
  rationale: 'Although אִישׁ is literally ''man,'' here it functions distributively
    with the following phrase: each Levite/group according to assigned service. English
    ''each'' best conveys the distributive force without unnecessary awkwardness.'
- source_word: כְּפִי עֲבֹדָתוֹ
  chosen: according to his service
  alternatives:
  - according to his work
  - in proportion to his assignment
  lexicon: HALOT
  rationale: Literally 'according to the mouth of his service,' an idiom meaning in
    accordance with the demands or measure of each one's assigned duty. 'According
    to his service' is concise and close to the Hebrew.
