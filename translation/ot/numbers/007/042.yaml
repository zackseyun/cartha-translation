id: NUM.7.42
reference: Numbers 7:42
source:
  edition: WLC
  text: בַּ/יּוֹם֙ הַ/שִּׁשִּׁ֔י נָשִׂ֖יא לִ/בְנֵ֣י גָ֑ד אֶלְיָסָ֖ף בֶּן דְּעוּאֵֽל־׃
translation:
  text: 'On the sixth day, the leader of the sons of Gad was Eliasaph son of Deuel:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Gad'; that is, the tribe/descendants of Gad. Some English
      versions render this more idiomatically as 'Gadites.'
    reason: lexical_alternative
  - marker: b
    text: The name is spelled 'Deuel' here in the Hebrew text; compare passages where
      the name appears as 'Reuel.'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּיּוֹם
  chosen: On ... day
  alternatives:
  - In the day
  lexicon: HALOT
  rationale: The preposition ב with יוֹם in this narrative formula is most naturally
    rendered temporally as 'on the day,' idiomatically in English 'on ... day.'
- source_word: הַשִּׁשִּׁי
  chosen: the sixth
  lexicon: HALOT
  rationale: Ordinal adjective modifying 'day'; standard rendering is 'the sixth.'
- source_word: נָשִׂיא
  chosen: leader
  alternatives:
  - chief
  - prince
  - tribal leader
  lexicon: HALOT
  rationale: In Numbers 7 this term denotes the recognized head or chieftain of a
    tribe. 'Leader' is clear modern English and avoids the potentially misleading
    royal sense of 'prince,' while preserving the official status.
- source_word: לִבְנֵי גָד
  chosen: of the sons of Gad
  alternatives:
  - for the sons of Gad
  - of the Gadites
  lexicon: HALOT
  rationale: The ל marks relation here with נָשִׂיא, indicating the person who is
    leader with respect to the tribal group. 'Of the sons of Gad' is a transparent
    rendering of the Hebrew construction and preserves the familial/tribal idiom.
- source_word: אֶלְיָסָף
  chosen: Eliasaph
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: Standard patronymic construction in Hebrew; 'son of' is the natural English
    equivalent.
- source_word: דְּעוּאֵל
  chosen: Deuel
  alternatives:
  - Reuel
  rationale: The consonantal form here is דְּעוּאֵל, best represented as 'Deuel.'
    An alternative form 'Reuel' appears in some related passages/traditions, but this
    verse's MT reading supports 'Deuel.'
