id: NUM.7.44
reference: Numbers 7:44
source:
  edition: WLC
  text: כַּ֥ף אַחַ֛ת עֲשָׂרָ֥ה זָהָ֖ב מְלֵאָ֥ה קְטֹֽרֶת׃
translation:
  text: one gold dish of ten shekels, full of incense;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one gold dish, ten [of gold], full of incense'; 'shekels'
      is supplied from the chapter's repeated weight formula for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  chosen: dish
  alternatives:
  - pan
  - bowl
  - spoon
  lexicon: HALOT
  rationale: In the repeated inventory formula of Numbers 7, כף denotes a small vessel/container
    used for incense. 'Dish' is natural modern English and fits the cultic object
    better than the overly specific 'spoon' in many traditional versions, while remaining
    concrete.
- source_word: אַחַת
  chosen: one
  lexicon: HALOT
  rationale: Simple cardinal numeral agreeing with the feminine noun כף.
- source_word: עֲשָׂרָה
  chosen: ten
  lexicon: HALOT
  rationale: Cardinal numeral modifying the implied weight measure of the vessel.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Material of the vessel; rendered straightforwardly as 'gold.'
- source_word: עֲשָׂרָה זָהָב
  chosen: of ten shekels
  alternatives:
  - weighing ten shekels
  - ten gold shekels
  lexicon: HALOT
  rationale: In this tabernacle-offering inventory formula, the numeral plus material
    regularly expresses weight, with 'shekels' understood from the broader context
    of the chapter (cf. nearby verses). Supplying 'shekels' in English is necessary
    for clarity and reflects the idiom rather than adding new content.
- source_word: מְלֵאָה
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Predicate adjective describing the vessel's contents; 'full of' is idiomatic
    and concise.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard rendering for the aromatic offering substance placed in the
    vessel.
