id: NUM.7.13
reference: Numbers 7:13
source:
  edition: WLC
  text: וְ/קָרְבָּנ֞/וֹ קַֽעֲרַת כֶּ֣סֶף אַחַ֗ת שְׁלֹשִׁ֣ים וּ/מֵאָה֮ מִשְׁקָלָ/הּ֒
    מִזְרָ֤ק אֶחָד֙ כֶּ֔סֶף שִׁבְעִ֥ים שֶׁ֖קֶל בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ שְׁנֵי/הֶ֣ם
    מְלֵאִ֗ים סֹ֛לֶת בְּלוּלָ֥ה בַ/שֶּׁ֖מֶן לְ/מִנְחָֽה־׀׃
translation:
  text: And his offering was one silver plate, its weight one hundred thirty shekels,
    one silver bowl of seventy shekels, according to the shekel of the sanctuary;
    both of them were full of fine flour mixed with oil for a grain offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dish' for 'plate' (קַעֲרָה), a shallow vessel.
    reason: lexical_alternative
  - marker: b
    text: Or 'basin' for 'bowl' (מִזְרָק), a ritual vessel term.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָרְבָּנוֹ
  chosen: And his offering was
  alternatives:
  - And his gift was
  - Now his offering was
  lexicon: HALOT
  rationale: קָרְבָּן denotes an offering/presentation brought near in cultic context.
    'Offering' is the standard cultic English equivalent. The prefixed waw is rendered
    with simple connective 'And.'
- source_word: קַעֲרַת כֶּסֶף אַחַת
  chosen: one silver plate
  alternatives:
  - one silver dish
  - one silver platter
  lexicon: HALOT
  rationale: קַעֲרָה here denotes a shallow vessel. 'Plate' best fits readable modern
    English while preserving the likely broad, shallow shape better than the more
    generic 'dish.'
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  chosen: its weight one hundred thirty shekels
  alternatives:
  - weighing one hundred thirty shekels
  - its weight was one hundred and thirty shekels
  lexicon: HALOT
  rationale: The Hebrew gives the vessel followed by its weight. 'Its weight one hundred
    thirty shekels' closely reflects the syntax while remaining natural English. Numerals
    are rendered in standard modern order.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  chosen: one silver bowl
  alternatives:
  - one silver basin
  - one silver sprinkling bowl
  lexicon: HALOT
  rationale: מִזְרָק is a ritual vessel, often used for tossing/sprinkling blood,
    but in this inventory context 'bowl' is the clearest natural rendering. The more
    technical function is not explicit in this verse, so it is not imported into the
    main text.
- source_word: שִׁבְעִים שֶׁקֶל
  chosen: of seventy shekels
  alternatives:
  - weighing seventy shekels
  lexicon: HALOT
  rationale: This continues the weight specification for the bowl. 'Of seventy shekels'
    is concise and idiomatic in English inventory style.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: according to the shekel of the sanctuary
  alternatives:
  - by the sanctuary shekel
  - by the holy shekel standard
  lexicon: HALOT
  rationale: This phrase specifies the standard weight measure. 'According to the
    shekel of the sanctuary' preserves the formal cultic reference without over-paraphrase.
- source_word: שְׁנֵיהֶם מְלֵאִים
  chosen: both of them were full
  alternatives:
  - both were full
  lexicon: HALOT
  rationale: The dual-plus-pronominal form explicitly refers to the two vessels. 'Both
    of them' preserves that emphasis, with 'were' supplied for natural English.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: סֹלֶת is the standard term for fine flour used in offerings. 'Fine flour'
    is the conventional and accurate rendering.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: The passive participle indicates the flour had been mixed with oil. 'Mixed
    with oil' is clear modern English.
- source_word: לְמִנְחָה
  chosen: for a grain offering
  alternatives:
  - for an offering
  - for a tribute offering
  lexicon: HALOT
  rationale: In priestly sacrificial context, מִנְחָה refers specifically to the grain
    offering. 'Grain offering' preserves the cultic category more precisely than the
    broader 'offering.'
