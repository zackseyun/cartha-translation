id: NUM.7.54
reference: Numbers 7:54
source:
  edition: WLC
  text: בַּ/יּוֹם֙ הַ/שְּׁמִינִ֔י נָשִׂ֖יא לִ/בְנֵ֣י מְנַשֶּׁ֑ה גַּמְלִיאֵ֖ל בֶּן
    פְּדָה צֽוּר־־׃
translation:
  text: On the eighth day, the leader of the sons of Manasseh was Gamaliel son of
    Pedahzur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Manasseh,' a tribal designation; that is, the descendants
      or tribe of Manasseh.
    reason: cultural_note
lexical_decisions:
- source_word: בַּיּוֹם הַשְּׁמִינִי
  chosen: On the eighth day
  alternatives:
  - On day eight
  - On the eighth day of dedication
  lexicon: HALOT
  rationale: The preposition ב plus יוֹם with the ordinal gives a temporal expression.
    'On the eighth day' is the natural English equivalent and preserves the formal
    temporal structure without adding context not explicit in this verse.
- source_word: נָשִׂיא
  chosen: leader
  alternatives:
  - chief
  - prince
  - tribal leader
  lexicon: HALOT
  rationale: נָשִׂיא in this census/offering context refers to the recognized head
    of a tribe or clan group. 'Leader' is clear modern English and avoids the potentially
    misleading royal connotations of 'prince' while remaining broad enough for the
    office.
- source_word: לִבְנֵי מְנַשֶּׁה
  chosen: of the sons of Manasseh
  alternatives:
  - for the sons of Manasseh
  - of the people of Manasseh
  - of the tribe of Manasseh
  lexicon: HALOT
  rationale: The construction identifies the group represented by the leader. 'Of
    the sons of Manasseh' closely follows the Hebrew בני and preserves the familial/tribal
    idiom. 'For' is possible from ל, but in context English idiom prefers 'of' after
    'leader.' 'Tribe of Manasseh' is interpretive and less formally aligned with the
    Hebrew wording.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Personal/tribal name is transliterated according to the translation philosophy.
- source_word: גַּמְלִיאֵל
  chosen: Gamaliel
  rationale: Personal name is transliterated by standard English convention.
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: Standard patronymic construction; 'son of' is the direct and conventional
    rendering.
- source_word: פְּדָה צוּר
  chosen: Pedahzur
  alternatives:
  - Peda-zur
  rationale: This is a proper name conventionally represented in English as the single
    form 'Pedahzur.' The Masoretic spacing reflects the name's components, but English
    normally transliterates the compound as one name.
