id: NUM.7.58
reference: Numbers 7:58
source:
  edition: WLC
  text: שְׂעִיר עִזִּ֥ים אֶחָ֖ד לְ/חַטָּֽאת־׃
translation:
  text: one male goat for a sin offering;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a purification offering.' The Hebrew חַטָּאת can denote the offering
      that deals with sin and ritual impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  chosen: male goat
  alternatives:
  - goat
  - buck goat
  - he-goat
  lexicon: HALOT
  rationale: The construct phrase literally denotes a shaggy one of the goats, an
    idiom for a male goat. 'Male goat' is clear modern English and preserves the sacrificial-animal
    specificity better than the less common 'he-goat.'
- source_word: אֶחָד
  chosen: one
  alternatives:
  - a single
  - one [animal]
  lexicon: HALOT
  rationale: The numeral is retained explicitly, matching the repetitive enumerative
    style of Numbers 7 and preserving the formal inventory structure of the offering
    list.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly refers to the purification/sin
    offering. 'For a sin offering' is standard, natural English and fits the prefixed
    לְ indicating purpose. 'For sin' would be too bare here, while 'purification offering'
    is possible but less expected in this repeated cultic list.
