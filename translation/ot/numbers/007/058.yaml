theological_decisions:
- issue: Rendering of sacrificial term חַטָּאת in cultic context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew term can denote either sin or the offering associated with
    removing impurity/sin. In this inventory formula, the sacrificial sense is certain.
    'Sin offering' remains the most recognizable English rendering, while the alternative
    nuance is preserved in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it where ambiguity is genuine.'
