id: NUM.7.27
reference: Numbers 7:27
source:
  edition: WLC
  text: פַּ֣ר אֶחָ֞ד בֶּן בָּקָ֗ר אַ֧יִל אֶחָ֛ד כֶּֽבֶשׂ אֶחָ֥ד בֶּן שְׁנָת֖/וֹ לְ/עֹלָֽה־־־׃
translation:
  text: one bull from the herd, one ram, one male lamb a year old, for a burnt offering;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'one bull, son of the herd.' The Hebrew idiom refers to a bull
      from the cattle herd, often understood as a young bull.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'one male lamb, son of its year,' that is, a male lamb a year
      old or in its first year.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּר
  chosen: bull
  alternatives:
  - young bull
  - ox
  lexicon: HALOT
  rationale: פַּר denotes a bull; 'bull' is the most natural sacrificial-animal term
    in English here. 'Young bull' is possible in some contexts, but the age nuance
    is sufficiently conveyed by the following phrase 'from the herd' rather than by
    the noun itself.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: The repeated numeral is rendered consistently as 'one' to preserve the
    itemized sacrificial list.
- source_word: בֶּן בָּקָר
  chosen: from the herd
  alternatives:
  - a young bull
  - son of the herd
  lexicon: HALOT
  rationale: The construct literally means 'son of cattle/herd,' an idiom for a bovine
    from the herd. 'From the herd' gives clear modern English while preserving the
    classification. 'Son of the herd' would be overly literal and unnatural.
- source_word: אַיִל
  chosen: ram
  lexicon: HALOT
  rationale: Standard rendering for the sacrificial male sheep specified by אַיִל.
- source_word: כֶּבֶשׂ
  chosen: male lamb
  alternatives:
  - lamb
  lexicon: HALOT
  rationale: כֶּבֶשׂ specifically denotes a male lamb. Including 'male' preserves
    the lexical specificity of the Hebrew in a sacrificial context.
- source_word: בֶּן שְׁנָתוֹ
  chosen: a year old
  alternatives:
  - in its first year
  - the son of its year
  lexicon: HALOT
  rationale: This idiom denotes an animal one year old. 'A year old' is idiomatic
    English and accurately conveys the age requirement.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. 'For a burnt
    offering' fits the list format and preserves the sacrificial purpose.
