id: NUM.7.72
reference: Numbers 7:72
source:
  edition: WLC
  text: בְּ/יוֹם֙ עַשְׁתֵּ֣י עָשָׂ֣ר י֔וֹם נָשִׂ֖יא לִ/בְנֵ֣י אָשֵׁ֑ר פַּגְעִיאֵ֖ל
    בֶּן עָכְרָֽן־׃
translation:
  text: On the eleventh day, the leader of the sons of Asher was Pagiel son of Ocran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the leader of the sons of Asher.'' This refers to the tribal
      chief representing Asher.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/יוֹם ... י֔וֹם
  chosen: On the eleventh day
  alternatives:
  - On day eleven
  - On the day, the eleventh day
  lexicon: HALOT
  rationale: The Hebrew uses בְּיוֹם followed by the ordinal-like construction עַשְׁתֵּי
    עָשָׂר יוֹם, a standard narrative formula in Numbers 7. English idiom is best
    served by collapsing the repeated 'day' wording into 'On the eleventh day' while
    preserving the temporal marker.
- source_word: עַשְׁתֵּי עָשָׂר
  chosen: eleventh
  alternatives:
  - day eleven
  - twelve less one day
  lexicon: HALOT
  rationale: In this context the numeral functions distributively/ordinally within
    the repeated dedication sequence. English naturally renders it as the ordinal
    'eleventh' rather than a wooden cardinal expression.
- source_word: נָשִׂיא
  chosen: leader
  alternatives:
  - chief
  - prince
  - tribal leader
  lexicon: HALOT
  rationale: נָשִׂיא in Numbers commonly denotes the recognized head of a tribe. 'Leader'
    is clear modern English and avoids the potentially misleading royal connotations
    of 'prince' while still fitting the tribal context.
- source_word: לִ/בְנֵי אָשֵׁר
  chosen: of the sons of Asher
  alternatives:
  - for the sons of Asher
  - of the people of Asher
  - of Asher
  lexicon: HALOT
  rationale: The preposition ל plus 'sons of Asher' identifies the tribal affiliation
    of the leader. 'Of the sons of Asher' preserves the Hebrew kinship expression
    more closely than flattening it to simply 'of Asher.'
- source_word: פַּגְעִיאֵל
  chosen: Pagiel
  alternatives:
  - Pagiel
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per
    project philosophy. 'Pagiel' is the conventional transliteration.
- source_word: בֶּן עָכְרָן
  chosen: son of Ocran
  alternatives:
  - ben Ocran
  lexicon: HALOT
  rationale: Hebrew patronymic בֶּן is regularly translated 'son of' in English narrative
    and genealogical style. 'Ocran' is a standard transliteration of עָכְרָן.
