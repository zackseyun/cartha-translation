id: NUM.7.12
reference: Numbers 7:12
source:
  edition: WLC
  text: וַ/יְהִ֗י הַ/מַּקְרִ֛יב בַּ/יּ֥וֹם הָ/רִאשׁ֖וֹן אֶת קָרְבָּנ֑/וֹ נַחְשׁ֥וֹן
    בֶּן עַמִּינָדָ֖ב לְ/מַטֵּ֥ה יְהוּדָֽה־־׃
translation:
  text: And the one presenting his offering on the first day was Nahshon son of Amminadab,
    for the tribe of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the one who offered his offering ... of the tribe of Judah.' The Hebrew
      participle and the phrase 'for/of the tribe of Judah' can be rendered slightly
      differently in English without changing the sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... was
  alternatives:
  - Now ... was
  - Then ... was
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the narrative statement. In modern
    English, a simple connective plus copula conveys the sense without the archaic
    'it came to pass.'
- source_word: הַמַּקְרִיב
  chosen: the one presenting
  alternatives:
  - the one bringing
  - the offerer
  - the one who offered
  lexicon: HALOT
  rationale: From קרב in the Hiphil participle, referring to the person causing the
    offering to be brought near/presented. 'Presenting' preserves the cultic nuance
    while remaining natural English.
- source_word: בַּיּוֹם הָרִאשׁוֹן
  chosen: on the first day
  alternatives:
  - in the first day
  lexicon: HALOT
  rationale: Standard temporal expression in English for ביום with ordinal adjective.
- source_word: אֶת קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his gift
  - his oblation
  lexicon: HALOT
  rationale: קָרְבָּן is the standard sacrificial/cultic term 'offering.' 'Gift' is
    possible in some contexts but is too weak here given the tabernacle dedication
    setting.
- source_word: נַחְשׁוֹן
  chosen: Nahshon
  rationale: Personal name transliterated according to standard English convention,
    following the project's policy to transliterate names.
- source_word: בֶּן עַמִּינָדָב
  chosen: son of Amminadab
  alternatives:
  - the son of Amminadab
  rationale: Standard Hebrew patronymic rendered directly and naturally in English.
- source_word: לְמַטֵּה יְהוּדָה
  chosen: for the tribe of Judah
  alternatives:
  - of the tribe of Judah
  - belonging to the tribe of Judah
  - for Judah's tribe
  lexicon: HALOT
  rationale: מַטֶּה denotes 'tribe' in this census/tribal context. The prefixed ל
    marks affiliation/representation; 'for the tribe of Judah' best conveys that Nahshon
    is presenting as representative of Judah.
