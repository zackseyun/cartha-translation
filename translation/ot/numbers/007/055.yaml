id: NUM.7.55
reference: Numbers 7:55
source:
  edition: WLC
  text: קָרְבָּנ֞/וֹ קַֽעֲרַת כֶּ֣סֶף אַחַ֗ת שְׁלֹשִׁ֣ים וּ/מֵאָה֮ מִשְׁקָלָ/הּ֒ מִזְרָ֤ק
    אֶחָד֙ כֶּ֔סֶף שִׁבְעִ֥ים שֶׁ֖קֶל בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ שְׁנֵי/הֶ֣ם מְלֵאִ֗ים
    סֹ֛לֶת בְּלוּלָ֥ה בַ/שֶּׁ֖מֶן לְ/מִנְחָֽה־׀
translation:
  text: His offering was one silver plate, its weight one hundred thirty shekels,
    one silver basin of seventy shekels, by the shekel of the sanctuary; both of them
    were full of fine flour mixed with oil for a grain offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dish' for 'plate' (קַעֲרָה), a shallow silver vessel.
    reason: lexical_alternative
  - marker: b
    text: Or 'bowl' for 'basin' (מִזְרָק), a ritual vessel used in sanctuary service.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'by the shekel of the sanctuary,' that is, according to the sanctuary
      standard weight.
    reason: cultural_note
lexical_decisions:
- source_word: קָרְבָּנוֹ
  chosen: His offering was
  alternatives:
  - his gift
  - his offering
  lexicon: HALOT
  rationale: קָרְבָּן denotes an offering/presentation brought near in a cultic context.
    'Offering' is the standard and most natural English rendering here. 'Was' is supplied
    for smooth English in this verbless list formula.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  chosen: one silver plate
  alternatives:
  - one silver dish
  - one silver platter
  lexicon: HALOT
  rationale: קַעֲרָה in tabernacle inventory contexts refers to a shallow vessel.
    'Plate' fits the cultic inventory style and common English usage in this passage
    series better than the broader 'dish' or 'platter'.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  chosen: its weight one hundred thirty shekels
  alternatives:
  - weighing one hundred thirty shekels
  lexicon: HALOT
  rationale: 'The Hebrew literally states ''its weight: thirty and a hundred.'' English
    idiom reverses to ''one hundred thirty.'' Retaining ''its weight'' keeps the formal
    structure while remaining readable.'
- source_word: מִזְרָק אֶחָד כֶּסֶף
  chosen: one silver basin
  alternatives:
  - one silver bowl
  lexicon: HALOT
  rationale: מִזְרָק is a vessel used in sacrificial service, often for tossing/sprinkling
    blood or holding offerings. 'Basin' better conveys a ritual vessel than the more
    domestic-sounding 'bowl'.
- source_word: שִׁבְעִים שֶׁקֶל
  chosen: of seventy shekels
  alternatives:
  - weighing seventy shekels
  lexicon: HALOT
  rationale: This phrase gives the weight of the basin. 'Of seventy shekels' is concise
    and natural in the inventory formula.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the shekel of the sanctuary
  alternatives:
  - according to the sanctuary shekel
  - by the sanctuary shekel
  lexicon: HALOT
  rationale: This phrase specifies the standard of measurement. 'By the shekel of
    the sanctuary' is a fairly literal rendering that remains understandable; 'according
    to the sanctuary shekel' is also possible.
- source_word: שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - both
  lexicon: HALOT
  rationale: The pronoun explicitly refers to the two vessels. 'Both of them' preserves
    the emphasis and referential clarity.
- source_word: מְלֵאִים
  chosen: were full of
  alternatives:
  - full
  lexicon: HALOT
  rationale: Predicate adjective in a verbless clause; English requires a copular
    expression. 'Were full of' is natural and accurate.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: סֹלֶת is the standard term for fine flour used in offerings. 'Fine flour'
    is the conventional and precise rendering.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: The passive participle indicates flour combined with oil. 'Mixed with
    oil' is clear modern English; 'mingled' is accurate but more archaic.
- source_word: לְמִנְחָה
  chosen: for a grain offering
  alternatives:
  - for an offering
  - for a tribute offering
  lexicon: HALOT
  rationale: In priestly sacrificial context, מִנְחָה specifically denotes the grain
    offering. Rendering it specifically avoids flattening the cultic terminology.
