id: NUM.7.17
reference: Numbers 7:17
source:
  edition: WLC
  text: וּ/לְ/זֶ֣בַח הַ/שְּׁלָמִים֮ בָּקָ֣ר שְׁנַיִם֒ אֵילִ֤ם חֲמִשָּׁה֙ עַתּוּדִ֣ים
    חֲמִשָּׁ֔ה כְּבָשִׂ֥ים בְּנֵֽי שָׁנָ֖ה חֲמִשָּׁ֑ה זֶ֛ה קָרְבַּ֥ן נַחְשׁ֖וֹן בֶּן
    עַמִּינָדָֽב־־׃פ
translation:
  text: 'and for the sacrifice of peace offerings: two cattle, five rams, five male
    goats, and five male lambs a year old. This was the offering of Nahshon son of
    Amminadab.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being' for the Hebrew term
      often used of a sacrificial meal shared in communion and peace.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  chosen: and for the sacrifice of
  alternatives:
  - and for a sacrifice of
  - and as the sacrifice of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition introduce another item in the
    list of offerings. 'Sacrifice of' preserves the construct relationship with the
    following noun phrase.
- source_word: הַשְּׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is the standard sacrificial term often rendered 'peace offerings.'
    This keeps traditional cultic specificity while remaining understandable. Alternatives
    are possible, but 'peace offerings' is concise and widely recognized.
- source_word: בָּקָר שְׁנַיִם
  chosen: two cattle
  alternatives:
  - two oxen
  - two head of cattle
  lexicon: HALOT
  rationale: בָּקָר is a collective term for cattle. 'Two cattle' is a natural English
    rendering in a sacrificial inventory and avoids over-specifying sex as 'oxen,'
    which the Hebrew does not explicitly mark here.
- source_word: אֵילִם חֲמִשָּׁה
  chosen: five rams
  lexicon: HALOT
  rationale: אֵילִם clearly denotes rams; the straightforward rendering is best.
- source_word: עַתּוּדִים חֲמִשָּׁה
  chosen: five male goats
  alternatives:
  - five goats
  - five he-goats
  lexicon: HALOT
  rationale: עַתּוּדִים refers specifically to male goats. 'Male goats' is clear modern
    English; 'he-goats' is accurate but less natural.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  chosen: five male lambs a year old
  alternatives:
  - five one-year-old lambs
  - five lambs in their first year
  lexicon: HALOT
  rationale: כְּבָשִׂים are male lambs, and בְּנֵי שָׁנָה means 'a year old' or 'one
    year old.' The chosen phrasing preserves both the sex and age specification.
- source_word: זֶה קָרְבַּן
  chosen: This was the offering of
  alternatives:
  - This is the offering of
  - This was the gift of
  lexicon: HALOT
  rationale: קָרְבָּן is a cultic 'offering.' Although the Hebrew uses a demonstrative
    with a verbless clause ('this [the] offering of...'), English idiom in this narrative
    summary is best expressed as 'This was the offering of.'
- source_word: נַחְשׁוֹן בֶּן עַמִּינָדָב
  chosen: Nahshon son of Amminadab
  alternatives:
  - Nahshon, the son of Amminadab
  rationale: Personal names are transliterated per project philosophy. 'Son of' is
    the standard rendering of the patronymic.
