id: NUM.7.30
reference: Numbers 7:30
source:
  edition: WLC
  text: בַּ/יּוֹם֙ הָ/רְבִיעִ֔י נָשִׂ֖יא לִ/בְנֵ֣י רְאוּבֵ֑ן אֱלִיצ֖וּר בֶּן שְׁדֵיאֽוּר־׃
translation:
  text: On the fourth day, the leader of the sons of Reuben was Elizur son of Shedeur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chief' or traditionally 'prince' for נָשִׂיא; the Hebrew denotes an
      official tribal head.
    reason: lexical_alternative
  - marker: b
    text: Or 'for the sons of Reuben'; the Hebrew preposition can mark relation or
      representation in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם
  chosen: On the ... day
  alternatives:
  - In the ... day
  lexicon: HALOT
  rationale: The preposition ב with יוֹם in this narrative listing is idiomatically
    temporal, best rendered 'on the ... day' in natural English.
- source_word: הָרְבִיעִי
  chosen: fourth
  lexicon: HALOT
  rationale: Ordinal adjective modifying 'day'; straightforwardly rendered 'fourth'.
- source_word: נָשִׂיא
  chosen: leader
  alternatives:
  - chief
  - prince
  - tribal leader
  lexicon: HALOT
  rationale: In Numbers this term denotes the recognized head of a tribe or clan group.
    'Leader' is clear modern English and avoids the potentially misleading royal sense
    of 'prince' while preserving official status.
- source_word: לִבְנֵי רְאוּבֵן
  chosen: of the sons of Reuben
  alternatives:
  - for the sons of Reuben
  - of the Reubenites
  lexicon: HALOT
  rationale: 'The ל marks affiliation here: the leader belonging to/representing Reuben''s
    descendants. ''Of the sons of Reuben'' stays close to the Hebrew and preserves
    the familial-tribal expression. ''Reubenites'' is possible but less formally aligned
    with the source wording.'
- source_word: אֱלִיצוּר
  chosen: Elizur
  rationale: Personal name transliterated per project philosophy to transliterate
    names rather than translate them.
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: Standard patronymic construction in Hebrew genealogy and identification
    formulas.
- source_word: שְׁדֵיאוּר
  chosen: Shedeur
  rationale: Personal name transliterated by standard English convention.
