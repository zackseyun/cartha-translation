id: NUM.7.43
reference: Numbers 7:43
source:
  edition: WLC
  text: קָרְבָּנ֞/וֹ קַֽעֲרַת כֶּ֣סֶף אַחַ֗ת שְׁלֹשִׁ֣ים וּ/מֵאָה֮ מִשְׁקָלָ/הּ֒ מִזְרָ֤ק
    אֶחָד֙ כֶּ֔סֶף שִׁבְעִ֥ים שֶׁ֖קֶל בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ שְׁנֵי/הֶ֣ם מְלֵאִ֗ים
    סֹ֛לֶת בְּלוּלָ֥ה בַ/שֶּׁ֖מֶן לְ/מִנְחָֽה־׀׃
translation:
  text: His offering was one silver plate, its weight one hundred thirty shekels,
    one silver basin of seventy shekels, by the shekel of the sanctuary; both of them
    full of fine flour mixed with oil for a grain offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dish' for 'plate' (קַעֲרָה).
    reason: lexical_alternative
  - marker: b
    text: Or 'bowl' for 'basin' (מִזְרָק), a ritual vessel.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'by the shekel of the sanctuary,' referring to the sanctuary's standard
      weight.
    reason: cultural_note
lexical_decisions:
- source_word: קָרְבָּנוֹ
  chosen: His offering was
  alternatives:
  - his gift
  - his presented offering
  lexicon: HALOT
  rationale: קָרְבָּן commonly denotes an offering brought near/presented in a cultic
    context. 'Offering' is the standard clear English equivalent in sacrificial contexts.
    Supplying 'was' makes the verbless Hebrew clause natural in English.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  chosen: one silver plate
  alternatives:
  - one silver dish
  - one silver platter
  lexicon: HALOT
  rationale: קַעֲרָה refers to a dish/plate-like vessel. 'Plate' fits the tabernacle
    inventory context and traditional sacrificial vessel terminology without sounding
    archaic. 'One silver plate' preserves the Hebrew order naturally in English.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  chosen: its weight one hundred thirty shekels
  alternatives:
  - weighing one hundred thirty shekels
  - its weight was one hundred thirty shekels
  lexicon: HALOT
  rationale: The Hebrew literally states 'its weight [was] thirty and a hundred.'
    English idiom reverses to 'one hundred thirty.' 'Its weight' preserves the explicit
    noun מִשְׁקָל rather than collapsing fully into a participial phrase.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  chosen: one silver basin
  alternatives:
  - one silver bowl
  - one silver sprinkling bowl
  lexicon: HALOT
  rationale: מִזְרָק is a ritual vessel, often used for tossing/sprinkling blood.
    'Basin' is broad and natural in English, suitable for cultic use. 'Sprinkling
    bowl' is more interpretive than the immediate context requires.
- source_word: שִׁבְעִים שֶׁקֶל
  chosen: of seventy shekels
  alternatives:
  - weighing seventy shekels
  lexicon: HALOT
  rationale: This phrase gives the basin's weight. 'Of seventy shekels' is concise
    and idiomatic following the vessel noun, while still conveying measurement.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the shekel of the sanctuary
  alternatives:
  - according to the sanctuary shekel
  - by the holy shekel
  lexicon: HALOT
  rationale: This standard formula specifies the cultic standard weight. 'By the shekel
    of the sanctuary' is a fairly formal but clear rendering that preserves the concrete
    noun 'shekel' and the genitive 'of the sanctuary.'
- source_word: שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - both
  lexicon: HALOT
  rationale: The dual reference is explicit in Hebrew, referring to the two vessels.
    'Both of them' slightly heightens clarity by making the referent explicit.
- source_word: מְלֵאִים
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: The adjective means 'full.' 'Full of' is the most direct equivalent and
    works smoothly with the following content phrase.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: סֹלֶת is the standard term for fine flour used in offerings. 'Fine flour'
    is the established and accurate rendering.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: The passive participle indicates the flour had been mixed with oil. 'Mixed
    with oil' is clear modern English; 'mingled' is more traditional but less natural.
- source_word: לְמִנְחָה
  chosen: for a grain offering
  alternatives:
  - for an offering
  - for a tribute offering
  lexicon: HALOT
  rationale: In priestly sacrificial context, מִנְחָה specifically denotes the grain
    offering. Rendering it simply as 'offering' would lose cultic specificity; 'tribute
    offering' is possible in other contexts but less fitting here.
