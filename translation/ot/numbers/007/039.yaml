id: NUM.7.39
reference: Numbers 7:39
source:
  edition: WLC
  text: פַּ֣ר אֶחָ֞ד בֶּן בָּקָ֗ר אַ֧יִל אֶחָ֛ד כֶּֽבֶשׂ אֶחָ֥ד בֶּן שְׁנָת֖/וֹ לְ/עֹלָֽה־־־׃
translation:
  text: one bull from the herd, one ram, one male lamb a year old, for a burnt offering;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one bull, son of the herd,' an idiom for a bull from
      the cattle/herd.
    reason: lexical_alternative
  - marker: b
    text: Or simply 'one lamb'; the Hebrew term here is commonly used in sacrificial
      contexts for a male lamb.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּר
  chosen: bull
  alternatives:
  - young bull
  - bullock
  lexicon: HALOT
  rationale: פַּר denotes a bull/young bull in sacrificial contexts. 'Bull' is the
    clearest modern English rendering and fits the offering list naturally.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: The repeated numeral marks the count of each sacrificial animal individually;
    rendering each occurrence as 'one' preserves the list structure.
- source_word: בֶּן בָּקָר
  chosen: from the herd
  alternatives:
  - of the cattle
  - a young bull
  lexicon: HALOT
  rationale: Literally 'son of cattle/herd,' an idiom specifying bovine stock. 'From
    the herd' is idiomatic English that preserves the source sense without awkward
    literalism.
- source_word: אַיִל
  chosen: ram
  lexicon: HALOT
  rationale: Standard sacrificial term for an adult male sheep; 'ram' is the direct
    and conventional equivalent.
- source_word: כֶּבֶשׂ
  chosen: male lamb
  alternatives:
  - lamb
  lexicon: HALOT
  rationale: כֶּבֶשׂ denotes a lamb, often specifically a male lamb in sacrificial
    usage. 'Male lamb' makes explicit the likely sex distinction present in the Hebrew
    sacrificial terminology.
- source_word: בֶּן שְׁנָתוֹ
  chosen: a year old
  alternatives:
  - in its first year
  - the son of its year
  lexicon: HALOT
  rationale: This Hebrew age expression idiomatically means the animal is one year
    old. 'A year old' is natural modern English.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. 'For a burnt
    offering' reflects the prefixed לְ and fits the list format.
