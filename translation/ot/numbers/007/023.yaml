id: NUM.7.23
reference: Numbers 7:23
source:
  edition: WLC
  text: וּ/לְ/זֶ֣בַח הַ/שְּׁלָמִים֮ בָּקָ֣ר שְׁנַיִם֒ אֵילִ֤ם חֲמִשָּׁה֙ עַתּוּדִ֣ים
    חֲמִשָּׁ֔ה כְּבָשִׂ֥ים בְּנֵי שָׁנָ֖ה חֲמִשָּׁ֑ה זֶ֛ה קָרְבַּ֥ן נְתַנְאֵ֖ל בֶּן
    צוּעָֽר־־׃פ
translation:
  text: 'and for the sacrifice of peace offerings: two cattle, five rams, five male
    goats, and five male lambs a year old. This was the offering of Nethanel son of
    Zuar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being' for the Hebrew term
      שְׁלָמִים.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  chosen: and for the sacrifice of
  alternatives:
  - and for the sacrifice
  - and as the sacrifice of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition introduce the next item in the
    list of offerings. 'For the sacrifice of' is natural English while preserving
    the construction.
- source_word: הַשְּׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is the standard sacrificial term traditionally rendered 'peace
    offerings.' This preserves continuity with Levitical sacrificial terminology while
    remaining understandable. Alternatives are possible, but 'peace offerings' best
    matches common biblical English and the cultic category.
- source_word: בָּקָר שְׁנַיִם
  chosen: two cattle
  alternatives:
  - two oxen
  - two head of cattle
  lexicon: HALOT
  rationale: בָּקָר is a collective term for bovine livestock. 'Two cattle' is a concise
    rendering that avoids over-specifying sex; 'oxen' could imply male draft animals,
    which the Hebrew does not explicitly state.
- source_word: אֵילִם חֲמִשָּׁה
  chosen: five rams
  alternatives:
  - five male sheep
  lexicon: HALOT
  rationale: אֵילִם specifically denotes rams, not merely sheep in general.
- source_word: עַתּוּדִים חֲמִשָּׁה
  chosen: five male goats
  alternatives:
  - five goats
  - five he-goats
  lexicon: HALOT
  rationale: עַתּוּדִים refers to male goats. 'Male goats' is clear modern English;
    'he-goats' is accurate but less natural.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  chosen: five male lambs a year old
  alternatives:
  - five one-year-old lambs
  - five lambs in their first year
  lexicon: HALOT
  rationale: כְּבָשִׂים are male lambs, and בְּנֵי שָׁנָה literally means 'sons of
    a year,' i.e., one year old. 'A year old' is idiomatic English and preserves the
    age specification.
- source_word: זֶה קָרְבַּן
  chosen: This was the offering of
  alternatives:
  - This is the offering of
  - This was the gift of
  lexicon: HALOT
  rationale: The demonstrative plus noun functions as a concluding identification
    formula. English past tense fits the narrative context. קָרְבָּן is broadly 'offering'
    in sacrificial context.
- source_word: נְתַנְאֵל בֶּן צוּעָר
  chosen: Nethanel son of Zuar
  alternatives:
  - Nethanel the son of Zuar
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. 'Son of' is
    the standard rendering of the patronymic.
