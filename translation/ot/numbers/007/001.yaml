theological_decisions:
- issue: Cultic holiness terminology
  chosen_reading: consecrated
  alternative_readings:
  - sanctified
  - made holy
  rationale: The verse concerns ritual dedication of sanctuary objects, not moral
    transformation. 'Consecrated' best preserves the cultic sense of being set apart
    for holy use in readable modern English.
  doctrine_reference: Translation philosophy §6; §5 consistency documented exception
