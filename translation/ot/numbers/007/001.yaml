id: NUM.7.1
reference: Numbers 7:1
source:
  edition: WLC
  text: וַ/יְהִ֡י בְּ/יוֹם֩ כַּלּ֨וֹת מֹשֶׁ֜ה לְ/הָקִ֣ים אֶת הַ/מִּשְׁכָּ֗ן וַ/יִּמְשַׁ֨ח
    אֹת֜/וֹ וַ/יְקַדֵּ֤שׁ אֹת/וֹ֙ וְ/אֶת כָּל כֵּלָ֔י/ו וְ/אֶת הַ/מִּזְבֵּ֖חַ וְ/אֶת
    כָּל כֵּלָ֑י/ו וַ/יִּמְשָׁחֵ֖/ם וַ/יְקַדֵּ֥שׁ אֹתָֽ/ם־־־־־־׃
translation:
  text: And it happened on the day Moses finished setting up the tabernacle, that
    he anointed it and consecrated it, along with all its furnishings, and the altar
    with all its utensils; he anointed them and consecrated them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when Moses had finished setting up the tabernacle.' The Hebrew temporal
      expression can be rendered more idiomatically this way.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new episode. 'And it happened'
    preserves the Hebrew discourse function without archaic English.
- source_word: בְּיוֹם כַּלּוֹת
  chosen: on the day ... finished
  alternatives:
  - when ... had finished
  - on the day of finishing
  lexicon: HALOT
  rationale: The preposition plus יוֹם with infinitive construct expresses temporal
    setting. Rendering as 'on the day ... finished' keeps the Hebrew idiom while remaining
    natural English.
- source_word: לְהָקִים
  chosen: setting up
  alternatives:
  - erecting
  - raising up
  - establishing
  lexicon: HALOT
  rationale: In context of the mishkan, קום in the Hiphil means to set up or erect.
    'Setting up' is clear modern English and fits the physical action.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the tent sanctuary
  lexicon: HALOT
  rationale: Traditional but still accurate rendering for משכן in the wilderness sanctuary
    context. 'Tabernacle' is the most recognizable and contextually precise English
    equivalent.
- source_word: וַיִּמְשַׁח
  chosen: he anointed
  alternatives:
  - he smeared with oil
  - he inaugurated by anointing
  lexicon: HALOT
  rationale: משׁח is the standard verb for anointing with oil in consecratory contexts.
    'Anointed' preserves the ritual and theological sense.
- source_word: וַיְקַדֵּשׁ
  chosen: consecrated
  alternatives:
  - sanctified
  - made holy
  lexicon: HALOT
  rationale: קדשׁ in this cultic context refers to setting apart as holy. 'Consecrated'
    communicates ritual dedication in accessible modern English better than the more
    archaic 'sanctified.'
- source_word: כָּל כֵּלָיו
  chosen: all its furnishings
  alternatives:
  - all its vessels
  - all its utensils
  - all its equipment
  lexicon: HALOT
  rationale: For the tabernacle, כלים refers broadly to articles/furnishings used
    in worship. 'Furnishings' fits the sanctuary as a whole better than the narrower
    'utensils.'
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard and precise rendering of מזבח.
- source_word: כָּל כֵּלָיו
  chosen: all its utensils
  alternatives:
  - all its furnishings
  - all its vessels
  lexicon: HALOT
  rationale: The second occurrence refers specifically to the altar's implements,
    so 'utensils' is more precise than repeating 'furnishings.' This is a documented
    contextual variation for consistency policy.
- source_word: וַיִּמְשָׁחֵם ... וַיְקַדֵּשׁ אֹתָם
  chosen: he anointed them and consecrated them
  alternatives:
  - he anointed and sanctified them
  lexicon: HALOT
  rationale: The plural suffixes summarize the altar and its utensils, and likely
    by extension the previously mentioned sacred objects. The English keeps the resumptive
    plural straightforwardly.
