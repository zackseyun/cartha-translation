id: NUM.7.24
reference: Numbers 7:24
source:
  edition: WLC
  text: בַּ/יּוֹם֙ הַ/שְּׁלִישִׁ֔י נָשִׂ֖יא לִ/בְנֵ֣י זְבוּלֻ֑ן אֱלִיאָ֖ב בֶּן חֵלֹֽן־׃
translation:
  text: On the third day, the leader of the sons of Zebulun was Eliab son of Helon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the leader for the sons of Zebulun.' The Hebrew preposition can be understood
      as marking representation or affiliation.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם
  chosen: On the ... day
  alternatives:
  - In the ... day
  lexicon: HALOT
  rationale: The preposition ב with יוֹם in this narrative formula is most naturally
    rendered temporally as 'on the day' in idiomatic English.
- source_word: הַשְּׁלִישִׁי
  chosen: third
  lexicon: HALOT
  rationale: Ordinal adjective modifying 'day'; straightforwardly rendered 'third'.
- source_word: נָשִׂיא
  chosen: leader
  alternatives:
  - chief
  - prince
  - tribal leader
  lexicon: HALOT
  rationale: In Numbers, נָשִׂיא denotes the recognized head or chieftain of a tribe.
    'Leader' is clear modern English and avoids the potentially misleading royal sense
    of 'prince' while preserving official status.
- source_word: לִבְנֵי
  chosen: of the sons of
  alternatives:
  - for the sons of
  - of the people of
  lexicon: HALOT
  rationale: 'The preposition ל here marks affiliation: the leader belonging to/representing
    the tribal descendants. ''Of the sons of'' preserves the Hebrew construction and
    its genealogical sense more closely than a looser paraphrase.'
- source_word: זְבוּלֻן
  chosen: Zebulun
  rationale: Standard English transliteration of the tribal name.
- source_word: אֱלִיאָב
  chosen: Eliab
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: Standard patronymic expression in Hebrew narrative and lists.
- source_word: חֵלֹן
  chosen: Helon
  rationale: Standard English transliteration of the personal name.
