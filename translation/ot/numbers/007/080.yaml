id: NUM.7.80
reference: Numbers 7:80
source:
  edition: WLC
  text: כַּ֥ף אַחַ֛ת עֲשָׂרָ֥ה זָהָ֖ב מְלֵאָ֥ה קְטֹֽרֶת׃
translation:
  text: one gold dish of ten shekels, full of incense;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one gold dish, ten [of] gold, full of incense'; 'shekels'
      is understood from the offering inventory formula in this chapter.
    reason: lexical_alternative
  - marker: b
    text: Traditional translations often render כַּף here as 'spoon'; the term refers
      to a small vessel or dish used for incense.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  chosen: dish
  alternatives:
  - pan
  - bowl
  - spoon
  lexicon: HALOT
  rationale: In tabernacle offering contexts, כַּף refers to a small vessel/container
    rather than a human palm. Traditional English often has 'spoon,' but that is misleading
    in modern English. 'Dish' communicates a small ceremonial vessel suitable for
    holding incense.
- source_word: אַחַת
  chosen: one
  lexicon: HALOT
  rationale: Simple cardinal numeral agreeing with the feminine noun כַּף.
- source_word: עֲשָׂרָה
  chosen: ten
  lexicon: HALOT
  rationale: Cardinal numeral modifying the implied weight measure with the following
    noun phrase.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: 'Material of the vessel: ''gold.'' The Hebrew sequence naturally yields
    ''gold dish'' rather than requiring a more expanded paraphrase.'
- source_word: עֲשָׂרָה זָהָב
  chosen: of ten shekels
  alternatives:
  - weighing ten shekels
  - ten gold shekels
  lexicon: HALOT
  rationale: In this recurring inventory formula in Numbers 7, the numeral plus material
    functions elliptically for weight, conventionally understood as shekels. Supplying
    'shekels' in English is necessary for sense and reflects the established idiom
    of the passage rather than adding new content. 'Of ten shekels' is concise and
    natural.
- source_word: מְלֵאָה
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Predicate adjective describing the vessel's contents; 'full of' is the
    most natural English rendering here.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard rendering for the incense offering substance in priestly/tabernacle
    contexts.
