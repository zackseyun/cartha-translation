id: NUM.7.46
reference: Numbers 7:46
source:
  edition: WLC
  text: שְׂעִיר עִזִּ֥ים אֶחָ֖ד לְ/חַטָּֽאת־׃
translation:
  text: one male goat for a sin offering;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for sin.' In this sacrificial context, the Hebrew term
      commonly refers to a 'sin offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂעִיר
  chosen: male goat
  alternatives:
  - goat
  - he-goat
  - buck
  lexicon: HALOT
  rationale: שְׂעִיר denotes a male goat. 'Male goat' is clear modern English and
    preserves the animal's sex, which is explicit in the Hebrew sacrificial terminology.
- source_word: עִזִּים
  chosen: goat
  alternatives:
  - goats
  lexicon: HALOT
  rationale: In the construct chain שְׂעִיר עִזִּים, עִזִּים specifies the species
    ('of goats'). In idiomatic English the whole phrase is best rendered 'male goat'
    rather than the overly literal 'goat of goats.'
- source_word: אֶחָד
  chosen: one
  alternatives:
  - a
  - single
  lexicon: HALOT
  rationale: The numeral is explicit and is retained as 'one,' matching the repetitive
    inventory style of Numbers 7 and preserving the formal count of the offering.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial context חַטָּאת commonly denotes the sin offering rather
    than merely 'sin.' The prefixed לְ is naturally rendered 'for' here, indicating
    purpose/designation of the animal within the offering list.
