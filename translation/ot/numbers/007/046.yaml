theological_decisions:
- issue: Rendering of חַטָּאת in cultic context
  chosen_reading: sin offering
  alternative_readings:
  - sin
  rationale: In priestly sacrificial lists, חַטָּאת regularly functions as a technical
    term for the offering brought in relation to sin. Rendering it 'sin offering'
    avoids flattening the cultic meaning and does not import later doctrinal claims
    beyond the Hebrew text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve meaning without importing doctrinal claims'
