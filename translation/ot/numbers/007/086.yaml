id: NUM.7.86
reference: Numbers 7:86
source:
  edition: WLC
  text: כַּפּ֨וֹת זָהָ֤ב שְׁתֵּים עֶשְׂרֵה֙ מְלֵאֹ֣ת קְטֹ֔רֶת עֲשָׂרָ֧ה עֲשָׂרָ֛ה
    הַ/כַּ֖ף בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ כָּל זְהַ֥ב הַ/כַּפּ֖וֹת עֶשְׂרִ֥ים וּ/מֵאָֽה־־׃
translation:
  text: twelve gold dishes full of incense, each dish weighing ten shekels by the
    sanctuary shekel; all the gold of the dishes was one hundred twenty shekels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pans,' 'bowls,' or traditionally 'spoons' for the incense vessels.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּפּוֹת
  chosen: dishes
  alternatives:
  - pans
  - bowls
  - spoons
  lexicon: HALOT
  rationale: In tabernacle-offering contexts כַּף can denote a small vessel or dish
    used for incense. 'Dishes' is natural modern English and fits the object being
    filled with incense and weighed. 'Spoons' reflects older tradition (KJV), but
    is misleading to modern readers.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward material designation modifying the vessels.
- source_word: שְׁתֵּים עֶשְׂרֵה
  chosen: twelve
  lexicon: HALOT
  rationale: Cardinal number for the total count of vessels.
- source_word: מְלֵאֹת קְטֹרֶת
  chosen: full of incense
  alternatives:
  - filled with incense
  lexicon: HALOT
  rationale: The adjective plus noun indicates the dishes were full/filled with incense.
    'Full of incense' is concise and idiomatic.
- source_word: עֲשָׂרָה עֲשָׂרָה
  chosen: each ... ten
  alternatives:
  - ten each
  - ten apiece
  lexicon: HALOT
  rationale: The distributive repetition means each individual dish weighed ten shekels.
- source_word: הַכַּף
  chosen: dish
  alternatives:
  - pan
  - bowl
  lexicon: HALOT
  rationale: Singular after the distributive numeral refers to each individual vessel.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the sanctuary shekel
  alternatives:
  - according to the shekel of the sanctuary
  - in sanctuary shekels
  lexicon: HALOT
  rationale: This standard cultic weight formula specifies the official sanctuary
    standard. 'By the sanctuary shekel' is readable while preserving the technical
    sense.
- source_word: כָּל זְהַב הַכַּפּוֹת
  chosen: all the gold of the dishes
  alternatives:
  - the total gold of the dishes
  - all the gold for the dishes
  lexicon: HALOT
  rationale: Construct phrase summarizing the total amount of gold represented by
    these vessels.
- source_word: עֶשְׂרִים וּמֵאָה
  chosen: one hundred twenty shekels
  alternatives:
  - a hundred and twenty shekels
  lexicon: HALOT
  rationale: Hebrew gives 120; 'shekels' is supplied in English from the immediately
    preceding weight expression and the sense of the total.
