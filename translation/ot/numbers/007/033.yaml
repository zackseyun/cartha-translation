id: NUM.7.33
reference: Numbers 7:33
source:
  edition: WLC
  text: פַּ֣ר אֶחָ֞ד בֶּן בָּקָ֗ר אַ֧יִל אֶחָ֛ד כֶּֽבֶשׂ אֶחָ֥ד בֶּן שְׁנָת֖/וֹ לְ/עֹלָֽה־־־׃
translation:
  text: one bull from the herd, one ram, one male lamb a year old, for a burnt offering;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one bull, son of the herd'—an idiom for a bull from the
      cattle herd, often understood as a young bull.
    reason: lexical_alternative
  - marker: b
    text: Or 'one lamb in its first year.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּר
  chosen: bull
  alternatives:
  - young bull
  - ox
  lexicon: HALOT
  rationale: פַּר denotes a bull/young bull. In sacrificial inventory context, 'bull'
    is the clearest natural English rendering.
- source_word: בֶּן בָּקָר
  chosen: from the herd
  alternatives:
  - a young bull
  - son of the herd
  - of the cattle
  lexicon: HALOT
  rationale: The construct literally means 'son of the herd/cattle,' an idiom specifying
    a bovine animal from the herd. Rendering it with 'from the herd' preserves the
    distinction without awkward literalism. Since פַּר already supplies 'bull,' this
    avoids redundancy such as 'bull, a young bull.'
- source_word: אַיִל
  chosen: ram
  lexicon: HALOT
  rationale: Standard sacrificial term for an adult male sheep; 'ram' is the precise
    and conventional English equivalent.
- source_word: כֶּבֶשׂ
  chosen: male lamb
  alternatives:
  - lamb
  lexicon: HALOT
  rationale: כֶּבֶשׂ denotes a lamb, often specifically a male lamb in sacrificial
    contexts. 'Male lamb' makes the sacrificial specification explicit in English.
- source_word: בֶּן שְׁנָתוֹ
  chosen: a year old
  alternatives:
  - in its first year
  - the son of its year
  lexicon: HALOT
  rationale: This Hebrew age expression idiomatically means the animal is one year
    old/in its first year. 'A year old' is idiomatic modern English.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. 'For a burnt
    offering' fits the list format of the verse and preserves sacrificial terminology.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Repeated numeral marking the count of each sacrificial animal; rendered
    consistently as 'one' in the inventory.
