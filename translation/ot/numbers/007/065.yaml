id: NUM.7.65
reference: Numbers 7:65
source:
  edition: WLC
  text: וּ/לְ/זֶ֣בַח הַ/שְּׁלָמִים֮ בָּקָ֣ר שְׁנַיִם֒ אֵילִ֤ם חֲמִשָּׁה֙ עַתֻּדִ֣ים
    חֲמִשָּׁ֔ה כְּבָשִׂ֥ים בְּנֵי שָׁנָ֖ה חֲמִשָּׁ֑ה זֶ֛ה קָרְבַּ֥ן אֲבִידָ֖ן בֶּן
    גִּדְעֹנִֽי־־׃פ
translation:
  text: 'and for the sacrifice of peace offerings: two cattle, five rams, five male
    goats, and five male lambs a year old. This was the offering of Abidan son of
    Gideoni.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being' for 'peace offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  chosen: and for the sacrifice of
  alternatives:
  - and for the offering of
  - and as a sacrifice of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition link this item to the preceding
    list and introduce the category of offering. 'Sacrifice' best matches זֶבַח in
    this cultic context.
- source_word: הַשְּׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is the standard sacrificial term often rendered 'peace offerings.'
    While 'fellowship offerings' or 'offerings of well-being' capture aspects of the
    term, 'peace offerings' is concise, recognizable, and suitably literal.
- source_word: בָּקָר שְׁנַיִם
  chosen: two cattle
  alternatives:
  - two oxen
  - two head of cattle
  lexicon: HALOT
  rationale: בָּקָר is a collective term for bovine livestock. 'Two cattle' preserves
    the broad sense without over-specifying sex; 'oxen' could imply males used for
    labor, which the Hebrew does not explicitly state here.
- source_word: אֵילִם חֲמִשָּׁה
  chosen: five rams
  alternatives:
  - five male sheep
  lexicon: HALOT
  rationale: אֵילִם specifically denotes rams, so the standard sacrificial term 'rams'
    is the most precise rendering.
- source_word: עַתֻּדִים חֲמִשָּׁה
  chosen: five male goats
  alternatives:
  - five goats
  - five he-goats
  lexicon: HALOT
  rationale: עַתּוּדִים refers to male goats, often mature ones. 'Male goats' is clear
    modern English and preserves the sex distinction relevant to sacrificial inventory.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  chosen: five male lambs a year old
  alternatives:
  - five one-year-old lambs
  - five lambs in their first year
  lexicon: HALOT
  rationale: כְּבָשִׂים are male lambs/lambs; in sacrificial contexts 'male lambs'
    is appropriately specific. בְּנֵי שָׁנָה idiomatically means 'a year old' or 'one
    year old.'
- source_word: זֶה קָרְבַּן
  chosen: This was the offering of
  alternatives:
  - This is the offering of
  - This was the gift of
  lexicon: HALOT
  rationale: The demonstrative plus noun forms the standard concluding formula in
    this chapter. English past tense reads naturally in narrative summary, though
    the Hebrew lacks an explicit tense marker.
- source_word: אֲבִידָן בֶּן גִּדְעֹנִי
  chosen: Abidan son of Gideoni
  alternatives:
  - Abidan the son of Gideoni
  rationale: Personal names are transliterated per project philosophy. 'Son of' is
    the natural rendering of the patronymic construction.
