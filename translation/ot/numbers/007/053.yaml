id: NUM.7.53
reference: Numbers 7:53
source:
  edition: WLC
  text: וּ/לְ/זֶ֣בַח הַ/שְּׁלָמִים֮ בָּקָ֣ר שְׁנַיִם֒ אֵילִ֤ם חֲמִשָּׁה֙ עַתֻּדִ֣ים
    חֲמִשָּׁ֔ה כְּבָשִׂ֥ים בְּנֵֽי שָׁנָ֖ה חֲמִשָּׁ֑ה זֶ֛ה קָרְבַּ֥ן אֱלִישָׁמָ֖ע
    בֶּן עַמִּיהֽוּד־־׃פ
translation:
  text: 'and for the sacrifice of peace offerings: two cattle, five rams, five male
    goats, and five male lambs a year old. This was the offering of Elishama son of
    Ammihud.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being' for the Hebrew term
      often used for a shared sacrificial meal expressing peace or wholeness.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'two cattle'; some translations render more specifically 'two oxen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  chosen: and for the sacrifice of
  alternatives:
  - and for the offering of
  - for the sacrifice of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition introduce another item in the
    list of offerings. 'Sacrifice' best matches זֶבַח in a sacrificial context, while
    retaining the formal structure 'for the sacrifice of'.
- source_word: הַשְּׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is the standard sacrificial term traditionally rendered 'peace
    offerings.' This preserves recognizable cultic terminology without over-paraphrasing.
    Alternatives are possible, but 'peace offerings' remains concise and established.
- source_word: בָּקָר שְׁנַיִם
  chosen: two cattle
  alternatives:
  - two oxen
  - two head of cattle
  lexicon: HALOT
  rationale: בָּקָר is a collective term for cattle. 'Two cattle' is slightly unusual
    in English but concise and close to the Hebrew enumeration. 'Two oxen' would be
    more specific than the Hebrew requires.
- source_word: אֵילִם חֲמִשָּׁה
  chosen: five rams
  lexicon: HALOT
  rationale: אֵילִם clearly denotes rams in sacrificial lists.
- source_word: עַתֻּדִים חֲמִשָּׁה
  chosen: five male goats
  alternatives:
  - five goats
  lexicon: HALOT
  rationale: עַתּוּדִים refers specifically to male goats, so the gender distinction
    should be preserved in English.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  chosen: five male lambs a year old
  alternatives:
  - five one-year-old lambs
  - five lambs in their first year
  lexicon: HALOT
  rationale: כְּבָשִׂים are male lambs, and בְּנֵי שָׁנָה literally means 'sons of
    a year,' idiomatically 'a year old.' The translation preserves both age and sex
    distinctions relevant to sacrificial specification.
- source_word: זֶה קָרְבַּן
  chosen: This was the offering of
  alternatives:
  - This is the offering of
  - This was the gift of
  lexicon: HALOT
  rationale: The verbless clause identifies the named leader's presented gift. English
    past tense reads naturally in this narrative inventory context.
- source_word: אֱלִישָׁמָע בֶּן עַמִּיהוּד
  chosen: Elishama son of Ammihud
  alternatives:
  - Elishama the son of Ammihud
  rationale: Personal names are transliterated per project philosophy, and 'son of'
    is the standard rendering of the patronymic.
