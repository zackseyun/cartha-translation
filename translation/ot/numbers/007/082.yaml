id: NUM.7.82
reference: Numbers 7:82
source:
  edition: WLC
  text: שְׂעִיר עִזִּ֥ים אֶחָ֖ד לְ/חַטָּֽאת־׃
translation:
  text: one male goat for a sin offering;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  chosen: male goat
  alternatives:
  - goat
  - buck goat
  - he-goat
  lexicon: HALOT
  rationale: The construct phrase literally denotes a hairy one of the goats, an idiomatic
    Hebrew expression for a male goat. 'Male goat' is clear modern English and preserves
    the sacrificial-animal specificity better than the broader 'goat.'
- source_word: אֶחָד
  chosen: one
  alternatives:
  - a single
  - one [animal]
  lexicon: HALOT
  rationale: The numeral is retained explicitly, matching the repetitive inventory
    style of Numbers 7 and preserving the formal count of the offering list.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly denotes the sin offering rather
    than sin abstractly. 'For a sin offering' reflects the prefixed לְ and reads naturally
    in English while preserving cultic meaning.
