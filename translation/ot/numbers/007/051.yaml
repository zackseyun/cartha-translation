id: NUM.7.51
reference: Numbers 7:51
source:
  edition: WLC
  text: פַּ֣ר אֶחָ֞ד בֶּן בָּקָ֗ר אַ֧יִל אֶחָ֛ד כֶּֽבֶשׂ אֶחָ֥ד בֶּן שְׁנָת֖/וֹ לְ/עֹלָֽה־־־׃
translation:
  text: one bull from the herd, one ram, one male lamb a year old, for a burnt offering;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פַּר
  chosen: bull
  alternatives:
  - young bull
  lexicon: HALOT
  rationale: פַּר denotes a bull/young bull. 'Bull' is the most natural sacrificial-animal
    term in English here, while the following construct phrase specifies its class.
- source_word: בֶּן־בָּקָר
  chosen: from the herd
  alternatives:
  - a young bull
  - of the cattle
  lexicon: HALOT
  rationale: Literally 'son of cattle/herd,' an idiom for a bovine animal from the
    herd. Rendering the phrase with פַּר as 'bull from the herd' preserves both the
    lexical components and readable English. 'Young bull' is possible but less transparent
    to the Hebrew construction.
- source_word: אַיִל
  chosen: ram
  lexicon: HALOT
  rationale: Standard sacrificial term for an adult male sheep; 'ram' is the direct
    and conventional equivalent.
- source_word: כֶּבֶשׂ
  chosen: male lamb
  alternatives:
  - lamb
  lexicon: HALOT
  rationale: כֶּבֶשׂ refers to a lamb, typically male in sacrificial contexts. 'Male
    lamb' makes the sex explicit, matching the Hebrew noun more precisely in this
    offering list.
- source_word: בֶּן־שְׁנָתוֹ
  chosen: a year old
  alternatives:
  - in its first year
  - the son of its year
  lexicon: HALOT
  rationale: This idiom denotes an animal one year old. 'A year old' is idiomatic
    modern English and accurately conveys the age requirement.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. 'For a burnt
    offering' fits the list format and preserves the sacrificial category clearly.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Repeated numeral marking the quantity of each animal; retained consistently
    as 'one' in the offering inventory.
