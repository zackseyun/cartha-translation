theological_decisions:
- issue: Referent of the pronouns in 'to speak with him' and the final 'and he spoke
    to him'
  chosen_reading: The pronouns refer to the LORD speaking with/to Moses from above
    the mercy seat.
  alternative_readings:
  - The final clause could be understood more impersonally as 'it spoke to him,' with
    'the voice' as subject.
  - Some English versions smooth the line as 'then he spoke to Him,' making Moses
    the subject of the final verb.
  rationale: The immediate context is divine revelation from the sanctuary, and the
    location phrase 'from above the mercy seat ... from between the two cherubim'
    identifies the source of the speech as God. The final clause most plausibly resumes
    the divine speaker. The translation keeps the Hebrew pronouns rather than replacing
    them with explicit nouns, preserving the text's style while reflecting the likely
    sense.
  doctrine_reference: Preserve theological tension rather than resolve it
