id: NUM.7.89
reference: Numbers 7:89
source:
  edition: WLC
  text: וּ/בְ/בֹ֨א מֹשֶׁ֜ה אֶל אֹ֣הֶל מוֹעֵד֮ לְ/דַבֵּ֣ר אִתּ/וֹ֒ וַ/יִּשְׁמַ֨ע אֶת
    הַ/קּ֜וֹל מִדַּבֵּ֣ר אֵלָ֗י/ו מֵ/עַ֤ל הַ/כַּפֹּ֨רֶת֙ אֲשֶׁר֙ עַל אֲרֹ֣ן הָ/עֵדֻ֔ת
    מִ/בֵּ֖ין שְׁנֵ֣י הַ/כְּרֻבִ֑ים וַ/יְדַבֵּ֖ר אֵלָֽי/ו־־־׃פ
translation:
  text: When Moses went into the tent of meeting to speak with him, he heard the voice
    speaking to him from above the mercy seat that was on the ark of the testimony,
    from between the two cherubim; and he spoke to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the voice being spoken to him'; the Hebrew participle may be understood
      in a slightly different nuance, though 'the voice speaking to him' is the most
      straightforward reading.
    reason: lexical_alternative
  - marker: b
    text: '''Mercy seat'' refers to the cover of the ark, the place from which the
      LORD spoke between the cherubim.'
    reason: cultural_note
  - marker: c
    text: The final clause could also be rendered more explicitly, 'and the LORD spoke
      to him,' or more formally, 'and it spoke to him,' with 'the voice' as the subject.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְבֹא
  chosen: When Moses went into
  alternatives:
  - And when Moses entered
  - Whenever Moses went in
  lexicon: HALOT
  rationale: The preposition ב with infinitive construct of בוא introduces a temporal
    clause. 'When ... went into' is natural English and preserves the narrative-temporal
    force without overformal awkwardness.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the Tent of Meeting
  lexicon: HALOT
  rationale: Standard rendering of the sanctuary designation. Lowercase is used here
    as a common noun phrase in running translation, though capitalization is possible
    as a formal title.
- source_word: לְדַבֵּר אִתּוֹ
  chosen: to speak with him
  alternatives:
  - to speak to him
  lexicon: HALOT
  rationale: The preposition with דבר here naturally conveys speaking with/to God
    in the sanctuary context. 'With him' preserves the Hebrew pronoun and the relational
    nuance.
- source_word: וַיִּשְׁמַע אֶת־הַקּוֹל
  chosen: he heard the voice
  alternatives:
  - he heard the sound
  - he heard the voice speaking
  lexicon: HALOT
  rationale: קוֹל can mean 'sound' or 'voice'; here the following participle 'speaking'
    and the divine context favor 'voice' rather than the more generic 'sound'.
- source_word: מִדַּבֵּר
  chosen: speaking
  alternatives:
  - being spoken
  - talking
  lexicon: HALOT
  rationale: 'The participle modifies ''the voice'': literally ''the voice speaking.''
    This preserves the vividness of the Hebrew. Some take it as a passive-like idiom,
    but active ''speaking'' is the plain sense.'
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: The pronoun most naturally refers to Moses as the recipient of the voice.
    Repeating 'to him' reflects the Hebrew and avoids importing a more interpretive
    paraphrase.
- source_word: מֵעַל הַכַּפֹּרֶת
  chosen: from above the mercy seat
  alternatives:
  - from above the atonement cover
  lexicon: HALOT
  rationale: כַּפֹּרֶת is the cultic cover of the ark. 'Mercy seat' is the established
    English rendering and fits this tabernacle context better than a more explanatory
    paraphrase. Although 'mercy seat' is also a possible alternative for Greek ἱλαστήριον
    elsewhere, here it directly renders the Hebrew cultic object.
- source_word: אֲרֹן הָעֵדֻת
  chosen: the ark of the testimony
  alternatives:
  - the ark of the covenant document
  - the ark of the witness
  lexicon: HALOT
  rationale: Traditional and accurate rendering for the ark associated with the testimony
    tablets. 'Testimony' best preserves the covenantal-legal sense without overexpansion.
- source_word: מִבֵּין שְׁנֵי הַכְּרֻבִים
  chosen: from between the two cherubim
  alternatives:
  - from between the two cherubs
  lexicon: HALOT
  rationale: Cherubim is the standard English plural transliteration for כְּרֻבִים
    and preserves the specific heavenly-creature terminology.
- source_word: וַיְדַבֵּר אֵלָיו
  chosen: and he spoke to him
  alternatives:
  - and it spoke to him
  - and he would speak to him
  lexicon: HALOT
  rationale: The final verb is singular with implicit subject. In context, the most
    natural subject is the LORD/the voice, not Moses. English retains the Hebrew ambiguity
    of pronouns while allowing the narrative to flow. 'He spoke to him' is preferable
    to the impersonal 'it spoke' because the speaker is personal and divine.
