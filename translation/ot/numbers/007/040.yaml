id: NUM.7.40
reference: Numbers 7:40
source:
  edition: WLC
  text: שְׂעִיר עִזִּ֥ים אֶחָ֖ד לְ/חַטָּֽאת־
translation:
  text: one male goat for a sin offering—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "one he-goat for a sin offering."
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  chosen: male goat
  alternatives:
  - goat
  - buck goat
  - he-goat
  lexicon: HALOT
  rationale: The construct phrase literally denotes a hairy one of the goats, an idiomatic
    expression for a male goat. 'Male goat' is clear modern English and preserves
    the sacrificial-animal specificity better than the more archaic 'he-goat'.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - a single
  lexicon: HALOT
  rationale: The numeral is rendered directly as 'one,' matching the enumerative style
    of the offering list in Numbers 7.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly denotes the sin offering rather
    than abstract 'sin.' The prefixed ל is naturally rendered 'for' in this inventory
    formula. 'For a sin offering' is idiomatic and contextually precise.
