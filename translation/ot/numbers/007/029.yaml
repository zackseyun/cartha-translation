id: NUM.7.29
reference: Numbers 7:29
source:
  edition: WLC
  text: וּ/לְ/זֶ֣בַח הַ/שְּׁלָמִים֮ בָּקָ֣ר שְׁנַיִם֒ אֵילִ֤ם חֲמִשָּׁה֙ עַתֻּדִ֣ים
    חֲמִשָּׁ֔ה כְּבָשִׂ֥ים בְּנֵי שָׁנָ֖ה חֲמִשָּׁ֑ה זֶ֛ה קָרְבַּ֥ן אֱלִיאָ֖ב בֶּן
    חֵלֹֽן־־׃פ
translation:
  text: 'and for the sacrifice of peace offerings: two cattle, five rams, five male
    goats, and five male lambs a year old. This was the offering of Eliab son of Helon.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fellowship offerings' or 'offerings of well-being' for 'peace offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  chosen: and for the sacrifice of
  alternatives:
  - and for a sacrifice of
  - and as a sacrifice of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition continue the list from the previous
    verse and introduce the category of offering. 'Sacrifice of' is the natural English
    equivalent for זֶבַח in this cultic inventory context.
- source_word: הַשְּׁלָמִים
  chosen: peace offerings
  alternatives:
  - fellowship offerings
  - offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is the standard sacrificial term traditionally rendered 'peace
    offerings.' While 'fellowship offerings' or 'offerings of well-being' capture
    aspects of the term, 'peace offerings' remains concise, recognizable, and faithful
    in a sacrificial context.
- source_word: בָּקָר שְׁנַיִם
  chosen: two cattle
  alternatives:
  - two oxen
  - two head of cattle
  lexicon: HALOT
  rationale: בָּקָר is a collective term for bovines/cattle. Because the Hebrew does
    not specify sex here, 'two cattle' is more precise than 'two oxen,' which can
    imply males.
- source_word: אֵילִם חֲמִשָּׁה
  chosen: five rams
  lexicon: HALOT
  rationale: אֵילִם clearly denotes male sheep, 'rams,' in sacrificial lists.
- source_word: עַתֻּדִים חֲמִשָּׁה
  chosen: five male goats
  alternatives:
  - five goats
  lexicon: HALOT
  rationale: עַתּוּדִים refers specifically to male goats, so the gender distinction
    should be preserved in English.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  chosen: five male lambs a year old
  alternatives:
  - five lambs a year old
  - five one-year-old lambs
  lexicon: HALOT
  rationale: כְּבָשִׂים denotes lambs, often male in sacrificial usage; the plural
    masculine form supports 'male lambs.' בְּנֵי שָׁנָה is the standard idiom for
    age, rendered idiomatically as 'a year old.'
- source_word: זֶה קָרְבַּן
  chosen: This was the offering of
  alternatives:
  - This is the offering of
  - This was the gift of
  lexicon: HALOT
  rationale: קָרְבָּן is a general term for an offering brought near to God. In this
    repetitive narrative summary, English past tense ('was') reads naturally, though
    the Hebrew demonstrative construction is formally present-like.
- source_word: אֱלִיאָב בֶּן חֵלֹן
  chosen: Eliab son of Helon
  alternatives:
  - Eliab, the son of Helon
  rationale: Personal names are transliterated per project philosophy. 'Son of' is
    the standard concise rendering of the patronymic.
