id: NUM.7.60
reference: Numbers 7:60
source:
  edition: WLC
  text: בַּ/יּוֹם֙ הַ/תְּשִׁיעִ֔י נָשִׂ֖יא לִ/בְנֵ֣י בִנְיָמִ֑ן אֲבִידָ֖ן בֶּן גִּדְעֹנִֽי־׃
translation:
  text: On the ninth day, the leader of the sons of Benjamin was Abidan son of Gideoni.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leader for the sons of Benjamin.' The Hebrew preposition can express
      representation or relation in this phrase.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם
  chosen: On the ... day
  alternatives:
  - In the ... day
  lexicon: HALOT
  rationale: The preposition ב with יוֹם in this temporal construction is idiomatically
    rendered in English as 'on the ... day,' not the more wooden 'in the day.'
- source_word: הַתְּשִׁיעִי
  chosen: ninth
  lexicon: HALOT
  rationale: Ordinal adjective modifying 'day'; straightforwardly rendered 'ninth.'
- source_word: נָשִׂיא
  chosen: leader
  alternatives:
  - chief
  - prince
  - tribal leader
  lexicon: HALOT
  rationale: In Numbers 7 this term refers to the recognized head of a tribe presenting
    offerings. 'Leader' is clear modern English and fits the social-political role
    without the potentially misleading royal overtones of 'prince.'
- source_word: לִבְנֵי בִנְיָמִן
  chosen: of the sons of Benjamin
  alternatives:
  - for the sons of Benjamin
  - of the people of Benjamin
  - of Benjamin
  lexicon: HALOT
  rationale: The ל marks relation here with נָשִׂיא, indicating the leader belonging
    to or representing the tribal group. 'Of the sons of Benjamin' preserves the Hebrew
    construction and its gender-accurate familial language.
- source_word: אֲבִידָן
  chosen: Abidan
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: Standard patronymic construction in Hebrew; 'son of' is the natural and
    precise rendering.
- source_word: גִּדְעֹנִי
  chosen: Gideoni
  rationale: Personal name is transliterated according to the translation philosophy.
