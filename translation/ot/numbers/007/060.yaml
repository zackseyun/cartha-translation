theological_decisions:
- issue: Gendered tribal designation בְנֵי
  chosen_reading: sons of Benjamin
  alternative_readings:
  - people of Benjamin
  - Benjaminites
  rationale: Per the doctrine's gender-accurate principle, the familial masculine
    form should be preserved where it refers to the tribal descent group. In this
    administrative context it denotes the tribe represented through its ancestral
    line, so 'sons of Benjamin' is retained rather than neutralizing the expression.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
