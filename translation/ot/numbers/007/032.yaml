id: NUM.7.32
reference: Numbers 7:32
source:
  edition: WLC
  text: כַּ֥ף אַחַ֛ת עֲשָׂרָ֥ה זָהָ֖ב מְלֵאָ֥ה קְטֹֽרֶת
translation:
  text: one gold dish of ten shekels, full of incense;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one dish, ten, gold, full of incense'; 'shekels' is supplied
      from the repeated offering formula in the surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  chosen: dish
  alternatives:
  - pan
  - bowl
  - spoon
  lexicon: HALOT
  rationale: In the tabernacle-offering inventory context, כַּף denotes a small vessel/container
    rather than a human 'palm.' English 'dish' fits a cultic vessel holding incense
    and is more natural than 'spoon' in contemporary English, while remaining concrete.
- source_word: אַחַת
  chosen: one
  lexicon: HALOT
  rationale: Cardinal numeral modifying the feminine noun כַּף; straightforwardly
    rendered 'one.'
- source_word: עֲשָׂרָה
  chosen: ten shekels
  alternatives:
  - ten
  lexicon: HALOT
  rationale: The Hebrew text says only 'ten,' but in this repeated inventory formula
    the weight unit 'shekels' is understood from the immediate larger context (cf.
    surrounding verses listing vessel weights). Supplying 'shekels' in English makes
    the measurement intelligible and reflects the elliptical Hebrew without over-paraphrasing.
- source_word: זָהָב
  chosen: gold
  alternatives:
  - golden
  lexicon: HALOT
  rationale: 'Best taken as the material of the vessel: ''gold.'' Rendering as the
    noun ''gold'' is more literal and idiomatic here than adjectival ''golden.'''
- source_word: מְלֵאָה
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Predicate/adjectival participial form describing the vessel's contents.
    'Full of' is concise and natural English.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard rendering for the aromatic offering substance in priestly/tabernacle
    contexts.
