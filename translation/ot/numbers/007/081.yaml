id: NUM.7.81
reference: Numbers 7:81
source:
  edition: WLC
  text: פַּ֣ר אֶחָ֞ד בֶּן בָּקָ֗ר אַ֧יִל אֶחָ֛ד כֶּֽבֶשׂ אֶחָ֥ד בֶּן שְׁנָת֖/וֹ לְ/עֹלָֽה־־־׃
translation:
  text: one bull from the herd, one ram, one male lamb a year old, for a burnt offering;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פַּר
  chosen: bull
  alternatives:
  - young bull
  lexicon: HALOT
  rationale: פַּר denotes a bull/young bull. In sacrificial inventory style, 'bull'
    is the clearest natural English rendering.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: The repeated numeral structures the list of sacrificial animals; 'one'
    preserves the formal counting pattern.
- source_word: בֶּן בָּקָר
  chosen: from the herd
  alternatives:
  - a young bull
  - of cattle
  lexicon: HALOT
  rationale: The construct literally means 'son of cattle/herd,' an idiom for bovine
    stock. With פַּר already rendered 'bull,' 'from the herd' avoids awkward literalism
    while preserving the animal classification.
- source_word: אַיִל
  chosen: ram
  lexicon: HALOT
  rationale: Standard rendering for the adult male sheep used in sacrificial contexts.
- source_word: כֶּבֶשׂ
  chosen: male lamb
  alternatives:
  - lamb
  lexicon: HALOT
  rationale: כֶּבֶשׂ specifically denotes a male lamb. 'Male lamb' preserves the sex
    distinction present in the Hebrew.
- source_word: בֶּן שְׁנָתוֹ
  chosen: a year old
  alternatives:
  - in its first year
  - the son of its year
  lexicon: HALOT
  rationale: This idiom indicates an animal one year old. 'A year old' is idiomatic
    modern English and accurately conveys the age requirement.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. 'For a burnt
    offering' fits the list format and preserves sacrificial terminology.
