id: NUM.7.85
reference: Numbers 7:85
source:
  edition: WLC
  text: שְׁלֹשִׁ֣ים וּ/מֵאָ֗ה הַ/קְּעָרָ֤ה הָֽ/אַחַת֙ כֶּ֔סֶף וְ/שִׁבְעִ֖ים הַ/מִּזְרָ֣ק
    הָ/אֶחָ֑ד כֹּ֚ל כֶּ֣סֶף הַ/כֵּלִ֔ים אַלְפַּ֥יִם וְ/אַרְבַּע מֵא֖וֹת בְּ/שֶׁ֥קֶל
    הַ/קֹּֽדֶשׁ־׃
translation:
  text: each silver plate weighing one hundred thirty shekels, and each basin seventy;
    all the silver of the vessels was two thousand four hundred shekels, by the shekel
    of the sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “according to the sanctuary shekel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלֹשִׁים וּמֵאָה
  chosen: one hundred thirty
  alternatives:
  - a hundred and thirty
  lexicon: HALOT
  rationale: The Hebrew gives the compound number literally 'thirty and a hundred,'
    idiomatically 'one hundred thirty.' Modern English number order is used for readability.
- source_word: הַקְּעָרָה הָאַחַת
  chosen: each silver plate
  alternatives:
  - the one plate
  - the single plate
  lexicon: HALOT
  rationale: In this inventory context, the singular with article and numeral functions
    distributively, referring to the weight of each item in the repeated offering
    list. 'Plate' is a standard rendering for קְעָרָה here.
- source_word: כֶּסֶף
  chosen: silver
  alternatives:
  - of silver
  lexicon: HALOT
  rationale: Here כֶּסֶף denotes the material of the vessel, not money. In English,
    'silver plate' is natural and accurate.
- source_word: וְשִׁבְעִים
  chosen: seventy
  lexicon: HALOT
  rationale: Straightforward cardinal number for the basin's weight.
- source_word: הַמִּזְרָק הָאֶחָד
  chosen: each basin
  alternatives:
  - the one basin
  - each sprinkling bowl
  lexicon: HALOT
  rationale: מִזְרָק can denote a bowl or basin used in ritual contexts. 'Basin' is
    clear modern English and fits the cultic vessel. As with 'the one plate,' the
    singular is distributive in context, hence 'each basin.'
- source_word: כֹּל כֶּסֶף הַכֵּלִים
  chosen: all the silver of the vessels
  alternatives:
  - the total silver of the vessels
  - all the silverware
  lexicon: HALOT
  rationale: כֹּל marks the total amount; כֵּלִים means vessels/utensils. 'All the
    silver of the vessels' preserves the sense without sounding overly technical.
- source_word: אַלְפַּיִם וְאַרְבַּע מֵאוֹת
  chosen: two thousand four hundred
  alternatives:
  - two thousand and four hundred
  lexicon: HALOT
  rationale: Standard modern English rendering of the total number.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the shekel of the sanctuary
  alternatives:
  - according to the sanctuary shekel
  - in sanctuary shekels
  lexicon: HALOT
  rationale: This phrase specifies the standard of weight used. 'By the shekel of
    the sanctuary' is a fairly formal but clear rendering; the common alternative
    'according to the sanctuary shekel' is also possible.
