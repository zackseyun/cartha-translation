id: NUM.7.62
reference: Numbers 7:62
source:
  edition: WLC
  text: כַּ֥ף אַחַ֛ת עֲשָׂרָ֥ה זָהָ֖ב מְלֵאָ֥ה קְטֹֽרֶת׃
translation:
  text: one gold dish of ten shekels, full of incense;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'one dish, ten gold, full of incense'; the weight unit
      'shekels' is understood from the recurring offering formula in Numbers 7.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּף
  chosen: dish
  alternatives:
  - pan
  - bowl
  - spoon
  lexicon: HALOT
  rationale: In the tabernacle-offering context of Numbers 7, כַּף refers to a small
    vessel/container used for incense rather than a literal 'palm.' 'Dish' is natural
    modern English and fits the cultic inventory better than the more archaic KJV-like
    'spoon.'
- source_word: אַחַת
  chosen: one
  alternatives:
  - a single
  lexicon: HALOT
  rationale: Cardinal numeral marking quantity; 'one' is the straightforward rendering.
- source_word: עֲשָׂרָה
  chosen: ten
  lexicon: HALOT
  rationale: Simple numeral modifying the weight statement.
- source_word: זָהָב
  chosen: gold
  alternatives:
  - golden
  lexicon: HALOT
  rationale: 'Here זָהָב functions naturally as the material of the vessel: ''gold
    dish.'' ''Golden'' is possible in English, but ''gold'' more directly reflects
    the noun.'
- source_word: עֲשָׂרָה זָהָב
  chosen: ten shekels
  alternatives:
  - weighing ten shekels of gold
  - ten gold shekels
  lexicon: HALOT
  rationale: Although שֶׁקֶל is not written in this abbreviated inventory line, the
    repeated formula in Numbers 7 clearly implies the standard weight expression 'ten
    shekels of gold.' Supplying 'shekels' in English is necessary for sense and reflects
    the idiom rather than adding new content.
- source_word: מְלֵאָה
  chosen: full of
  alternatives:
  - filled with
  lexicon: HALOT
  rationale: Predicate adjective agreeing with the feminine vessel; 'full of' is concise
    and idiomatic.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard rendering for the incense substance used in worship.
