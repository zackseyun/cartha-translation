id: NUM.30.9
reference: Numbers 30:9
source:
  edition: WLC
  text: וְ֠/אִם בְּ/י֨וֹם שְׁמֹ֣עַ אִישָׁ/הּ֮ יָנִ֣יא אוֹתָ/הּ֒ וְ/הֵפֵ֗ר אֶת נִדְרָ/הּ֙ אֲשֶׁ֣ר עָלֶ֔י/הָ וְ/אֵת֙ מִבְטָ֣א שְׂפָתֶ֔י/הָ אֲשֶׁ֥ר אָסְרָ֖ה עַל נַפְשָׁ֑/הּ וַ/יהוָ֖ה יִֽסְלַֽח לָֽ/הּ־־־׃
translation:
  text: But if, on the day her husband hears of it, he forbids her and annuls her vow that is upon her, or the rash utterance of her lips by which she bound herself, then Yahweh will forgive her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the utterance of her lips” or “the binding utterance of her lips.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the preceding case; 'But if' captures both the conjunction and the adversative force in context.
- source_word: בְּיוֹם שְׁמֹעַ
  chosen: on the day ... hears of it
  alternatives:
  - in the day of hearing
  - when ... hears
  lexicon: HALOT
  rationale: The infinitive construct with בְּיוֹם is an idiom for the time when the husband becomes aware. 'Hears of it' makes the implied object natural in English while preserving the temporal force.
- source_word: אִישָׁהּ
  chosen: her husband
  alternatives:
  - her man
  lexicon: HALOT
  rationale: In this legal context אִישׁ with 3fs suffix refers to a woman's husband, not merely a male person.
- source_word: יָנִיא אֹתָהּ
  chosen: he forbids her
  alternatives:
  - he restrains her
  - he disallows her
  - he opposes her
  lexicon: HALOT
  rationale: The Hiphil of נוא in vow contexts means to prevent or disallow the vow's force. 'Forbids her' is concise and idiomatic, matching the legal sense.
- source_word: וְהֵפֵר
  chosen: and annuls
  alternatives:
  - and nullifies
  - and breaks
  - and makes void
  lexicon: HALOT
  rationale: In legal language about vows, הפר means to invalidate rather than physically break. 'Annuls' best conveys formal cancellation.
- source_word: נִדְרָהּ
  chosen: her vow
  lexicon: HALOT
  rationale: Standard rendering of נדר in this chapter's legal discussion.
- source_word: אֲשֶׁר עָלֶיהָ
  chosen: that is upon her
  alternatives:
  - that is binding on her
  - which rests on her
  lexicon: HALOT
  rationale: Retains the Hebrew metaphor of obligation resting 'upon' her, while remaining understandable in English.
- source_word: מִבְטָא שְׂפָתֶיהָ
  chosen: the rash utterance of her lips
  alternatives:
  - the binding utterance of her lips
  - the statement of her lips
  - the rash promise from her lips
  lexicon: HALOT
  rationale: מִבְטָא denotes an utterance or spoken expression; in this context of vows and self-imposed obligations, 'rash utterance' reflects the likely nuance of an impulsive spoken commitment, consistent with the legal concern of the passage.
- source_word: אֲשֶׁר אָסְרָה עַל נַפְשָׁהּ
  chosen: by which she bound herself
  alternatives:
  - with which she bound her life
  - with which she obligated herself
  lexicon: HALOT
  rationale: אָסַר עַל נֶפֶשׁ is an idiom for placing oneself under obligation. 'Bound herself' is clear and preserves the reflexive legal force.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - the Lord
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה is 'the LORD'.
- source_word: יִסְלַח לָהּ
  chosen: will forgive her
  alternatives:
  - will pardon her
  lexicon: HALOT
  rationale: סלח in covenantal/legal contexts is best rendered 'forgive.' The future sense fits the legal consequence stated here.
