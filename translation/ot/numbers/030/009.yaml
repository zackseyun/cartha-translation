theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of מִבְטָא שְׂפָתֶיהָ in a vow context
  chosen_reading: the rash utterance of her lips
  alternative_readings:
  - the utterance of her lips
  - the binding utterance of her lips
  rationale: The immediate context concerns vows that may be disallowed by a husband; the phrase likely refers to spoken self-obligation, often with an impulsive nuance. 'Rash utterance' preserves the legal-moral flavor without over-paraphrasing, while an alternative is preserved in a footnote because the lexical nuance is not entirely fixed.
