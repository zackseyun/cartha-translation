id: NUM.30.8
reference: Numbers 30:8
source:
  edition: WLC
  text: וְ/שָׁמַ֥ע אִישָׁ֛/הּ בְּ/י֥וֹם שָׁמְע֖/וֹ וְ/הֶחֱרִ֣ישׁ לָ֑/הּ וְ/קָ֣מוּ
    נְדָרֶ֗י/הָ וֶֽ/אֱסָרֶ֛/הָ אֲשֶׁר אָסְרָ֥ה עַל נַפְשָׁ֖/הּ יָקֻֽמוּ־־׃
translation:
  text: And if her husband hears of it on the day he hears, and is silent toward her,
    then her vows shall stand, and her binding obligations that she bound on herself
    shall stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and says nothing to her.' The Hebrew idiom 'is silent toward her' indicates
      that the husband does not object, so the vow remains valid.
    reason: lexical_alternative
  - marker: b
    text: Or 'her bonds' or 'her obligations.' The Hebrew term refers to binding commitments
      she has placed upon herself.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַע
  chosen: And if ... hears
  alternatives:
  - And ... heard
  - and hears
  lexicon: HALOT
  rationale: The conjunction plus qatal in this legal context continues a conditional/casuistic
    sequence; English idiom is best represented with 'And if ... hears' rather than
    a simple past.
- source_word: אִישָׁהּ
  chosen: her husband
  alternatives:
  - her man
  lexicon: HALOT
  rationale: In context of marriage law, אִישׁ with 3fs suffix clearly means 'husband,'
    not the more generic 'man.'
- source_word: בְּיוֹם שָׁמְעוֹ
  chosen: on the day he hears
  alternatives:
  - when he hears of it
  - on the day of his hearing
  lexicon: HALOT
  rationale: This phrase marks the legally relevant time of hearing. 'On the day he
    hears' preserves the Hebrew temporal formulation while remaining natural English.
- source_word: וְהֶחֱרִישׁ לָהּ
  chosen: and is silent toward her
  alternatives:
  - and says nothing to her
  - and keeps silent to her
  lexicon: HALOT
  rationale: The idiom means refraining from objection. 'Is silent toward her' stays
    close to the Hebrew while conveying legal acquiescence.
- source_word: וְקָמוּ
  chosen: then ... shall stand
  alternatives:
  - shall remain in force
  - shall be established
  lexicon: HALOT
  rationale: קוּם in this legal setting means to stand/remain valid. 'Shall stand'
    preserves the repeated Hebrew legal term and allows consistency with the final
    יָקֻמוּ.
- source_word: נְדָרֶיהָ
  chosen: her vows
  lexicon: HALOT
  rationale: Standard rendering for נדרים in legal contexts concerning vowed commitments.
- source_word: וֶאֱסָרֶהָ
  chosen: her binding obligations
  alternatives:
  - her bonds
  - her pledges
  - her obligations
  lexicon: HALOT
  rationale: From אסר in nominal form, referring to binding commitments or restraints
    undertaken by oath. 'Binding obligations' communicates both the metaphor of binding
    and the legal force.
- source_word: אֲשֶׁר אָסְרָה עַל נַפְשָׁהּ
  chosen: that she bound on herself
  alternatives:
  - that she imposed on herself
  - that she bound upon herself
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of binding upon oneself. 'Bound on
    herself' preserves the metaphor and legal self-obligation without over-paraphrase.
- source_word: נַפְשָׁהּ
  chosen: herself
  alternatives:
  - her soul
  - her life
  lexicon: HALOT
  rationale: In this idiom נֶפֶשׁ refers reflexively to the person herself, not specifically
    to the immaterial soul. 'Herself' best matches the legal sense in English.
- source_word: יָקֻמוּ
  chosen: shall stand
  alternatives:
  - shall remain in force
  - shall stand firm
  lexicon: HALOT
  rationale: Repeats the same legal verb as earlier in the verse; rendering it identically
    preserves the Hebrew emphasis and legal consistency.
