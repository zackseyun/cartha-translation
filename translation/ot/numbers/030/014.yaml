id: NUM.30.14
reference: Numbers 30:14
source:
  edition: WLC
  text: כָּל נֵ֛דֶר וְ/כָל שְׁבֻעַ֥ת אִסָּ֖ר לְ/עַנֹּ֣ת נָ֑פֶשׁ אִישָׁ֥/הּ יְקִימֶ֖/נּוּ
    וְ/אִישָׁ֥/הּ יְפֵרֶֽ/נּוּ־־׃
translation:
  text: Every vow and every binding oath to afflict the soul—her husband may confirm
    it, or her husband may annul it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to deny oneself' or 'to humble oneself.' The Hebrew idiom literally
      reads 'to afflict the soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵדֶר
  chosen: vow
  alternatives:
  - pledge
  lexicon: HALOT
  rationale: נדר regularly denotes a vow made to God or under sacred obligation. 'Vow'
    is the standard and most precise English equivalent in legal/cultic contexts such
    as Numbers 30.
- source_word: שְׁבֻעַת אִסָּר
  chosen: binding oath
  alternatives:
  - obligatory oath
  - oath of obligation
  lexicon: HALOT
  rationale: The construct phrase combines 'oath' with אִסָּר, a binding obligation/restraining
    bond. 'Binding oath' preserves both the formal oath and its restrictive force
    without becoming wooden.
- source_word: לְעַנֹּת נָפֶשׁ
  chosen: to afflict the soul
  alternatives:
  - to deny oneself
  - to humble oneself
  lexicon: HALOT
  rationale: The infinitive plus נֶפֶשׁ is a fixed expression used for self-denial/affliction,
    often in fasting contexts. 'Afflict the soul' keeps the Hebrew idiom visible;
    alternatives are interpretive and worth preserving in a footnote.
- source_word: נָפֶשׁ
  chosen: soul
  alternatives:
  - self
  - life
  - person
  lexicon: HALOT
  rationale: Although נֶפֶשׁ can mean 'self' or 'person,' in the idiom לְעַנֹּת נָפֶשׁ
    the traditional and semantically defensible rendering is 'afflict the soul.' This
    preserves the idiomatic and anthropological texture of the Hebrew.
- source_word: אִישָׁהּ
  chosen: her husband
  alternatives:
  - her man
  lexicon: HALOT
  rationale: In this marital legal context, אִישׁ with 3fs suffix clearly means 'her
    husband,' not merely 'her man.' This is the natural and contextually accurate
    English rendering.
- source_word: יְקִימֶנּוּ
  chosen: may confirm it
  alternatives:
  - shall establish it
  - may uphold it
  lexicon: HALOT
  rationale: The Hiphil of קום here means to cause a vow to stand, i.e., confirm or
    establish it as valid. 'Confirm it' is clear modern legal English and fits the
    husband's authority over the vow in context.
- source_word: יְפֵרֶנּוּ
  chosen: may annul it
  alternatives:
  - shall break it
  - may nullify it
  lexicon: HALOT
  rationale: The Hiphil of פרר in vow legislation means to invalidate or annul. 'Annul
    it' best captures the legal force in idiomatic English.
- source_word: כָּל ... וְכָל
  chosen: Every ... and every ...
  alternatives:
  - Any ... and any ...
  - Every ... or every ...
  lexicon: HALOT
  rationale: The repeated כָּל emphasizes comprehensiveness across both categories.
    'Every ... and every ...' preserves the distributive force better than a flattened
    singular expression.
