id: NUM.30.5
reference: Numbers 30:5
source:
  edition: WLC
  text: וְ/שָׁמַ֨ע אָבִ֜י/הָ אֶת נִדְרָ֗/הּ וֶֽ/אֱסָרָ/הּ֙ אֲשֶׁ֣ר אָֽסְרָ֣ה עַל נַפְשָׁ֔/הּ
    וְ/הֶחֱרִ֥ישׁ לָ֖/הּ אָבִ֑י/הָ וְ/קָ֨מוּ֙ כָּל נְדָרֶ֔י/הָ וְ/כָל אִסָּ֛ר אֲשֶׁר
    אָסְרָ֥ה עַל נַפְשָׁ֖/הּ יָקֽוּם־־־־־־׃
translation:
  text: And if her father hears her vow, or her binding obligation by which she has
    bound herself, and her father says nothing to her, then all her vows shall stand,
    and every binding obligation by which she has bound herself shall stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bond' or 'binding pledge' for 'binding obligation' (Hebrew אִסָּר),
      a term distinct from 'vow' though closely related.
    reason: lexical_alternative
  - marker: b
    text: Literally 'and her father is silent to her.' The silence signifies non-objection,
      so the vows remain valid.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵדֶר / נִדְרָהּ
  chosen: vow
  alternatives:
  - pledge
  lexicon: HALOT
  rationale: נדר in legal/cultic contexts refers to a vow made to God. 'Vow' is the
    standard and clearest English equivalent here.
- source_word: אִסָּר / וֶאֱסָרָהּ
  chosen: binding obligation
  alternatives:
  - bond
  - binding pledge
  - obligation
  lexicon: HALOT
  rationale: אִסָּר denotes a self-imposed restraint or binding commitment, distinct
    from נדר though related. 'Binding obligation' preserves the legal force without
    sounding archaic; using a distinct gloss helps retain the Hebrew distinction.
- source_word: אָסְרָה עַל־נַפְשָׁהּ
  chosen: she has bound herself
  alternatives:
  - she has obligated herself
  - she has bound upon herself
  lexicon: HALOT
  rationale: The idiom literally involves binding upon oneself. 'She has bound herself'
    is natural English and preserves the reflexive, self-imposing sense of the Hebrew
    construction.
- source_word: וְהֶחֱרִישׁ לָהּ
  chosen: her father says nothing to her
  alternatives:
  - her father remains silent toward her
  - her father keeps silent
  lexicon: HALOT
  rationale: The verb means to be silent/keep silent. Rendering it as 'says nothing
    to her' communicates the legal significance of non-objection in idiomatic English
    while preserving the sense of silence.
- source_word: וְקָמוּ ... יָקוּם
  chosen: shall stand
  alternatives:
  - shall remain in force
  - shall be established
  lexicon: HALOT
  rationale: קום in this legal setting means to stand or remain valid. 'Shall stand'
    is concise, formal enough for legal force, and close to the Hebrew imagery.
- source_word: כָּל
  chosen: all / every
  alternatives:
  - each
  lexicon: HALOT
  rationale: Using 'all' with the plural 'vows' and 'every' with the singular collective
    'binding obligation' produces natural English while accurately reflecting the
    distributive force of כָּל in each clause.
- source_word: וְ
  chosen: And if
  alternatives:
  - And
  lexicon: Hebrew conjunction usage
  rationale: Although the Hebrew begins simply with 'and,' the verse is conditional
    in context and continues the case law from the previous verse. 'And if' makes
    the legal condition explicit in natural English without adding content beyond
    the discourse function.
