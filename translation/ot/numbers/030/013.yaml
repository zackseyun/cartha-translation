id: NUM.30.13
reference: Numbers 30:13
source:
  edition: WLC
  text: וְ/אִם הָפֵר֩ יָפֵ֨ר אֹתָ֥/ם אִישָׁ/הּ֮ בְּ/י֣וֹם שָׁמְע/וֹ֒ כָּל מוֹצָ֨א
    שְׂפָתֶ֧י/הָ לִ/נְדָרֶ֛י/הָ וּ/לְ/אִסַּ֥ר נַפְשָׁ֖/הּ לֹ֣א יָק֑וּם אִישָׁ֣/הּ
    הֲפֵרָ֔/ם וַ/יהוָ֖ה יִֽסְלַֽח לָֽ/הּ־׀־־׃
translation:
  text: But if her husband indeed annuls them on the day he hears, then nothing that
    came from her lips—whether her vows or her self-binding obligation—shall stand.
    Her husband has annulled them, and the LORD will forgive her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whatever proceeded from her lips.' The Hebrew literally says 'all the
      outgoing of her lips,' a legal expression covering all spoken commitments.
    reason: lexical_alternative
  - marker: b
    text: Or 'the binding obligation by which she bound herself.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew YHWH, rendered 'the LORD' in keeping with the translation's standard
      practice.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the preceding case; 'But if' captures
    both the conjunction and the adversative force in context.
- source_word: הָפֵר יָפֵר
  chosen: indeed annuls
  alternatives:
  - surely annuls
  - utterly annuls
  - annuls
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb הפר. 'Indeed
    annuls' conveys emphasis in natural English without awkward repetition.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Refers back collectively to the woman's vows and binding obligations.
- source_word: אִישָׁהּ
  chosen: her husband
  alternatives:
  - her man
  lexicon: HALOT
  rationale: In this legal-marital context, 'her husband' is the idiomatic and contextually
    precise rendering.
- source_word: בְּיוֹם שָׁמְעוֹ
  chosen: on the day he hears
  alternatives:
  - when he hears
  - on the day of his hearing
  lexicon: HALOT
  rationale: A temporal phrase marking the legally relevant time of response. 'On
    the day he hears' preserves the formal timing language of the Hebrew law.
- source_word: כָּל מוֹצָא שְׂפָתֶיהָ
  chosen: nothing that came from her lips
  alternatives:
  - everything that came from her lips
  - any utterance of her lips
  - whatever proceeded from her lips
  lexicon: HALOT
  rationale: Literally 'all the outgoing of her lips.' Because it is followed by 'shall
    not stand,' idiomatic English is best expressed as 'nothing that came from her
    lips.' This preserves the legal scope of all her spoken commitments.
- source_word: לִנְדָרֶיהָ
  chosen: her vows
  lexicon: HALOT
  rationale: Standard rendering of נדר in legal/religious contexts.
- source_word: וּלְאִסַּר נַפְשָׁהּ
  chosen: her self-binding obligation
  alternatives:
  - the binding obligation upon herself
  - her pledge by which she bound herself
  - her self-denying obligation
  lexicon: HALOT
  rationale: The phrase denotes an obligation by which she binds herself. 'Self-binding
    obligation' is concise, readable, and preserves the reflexive sense of נַפְשָׁהּ
    in context.
- source_word: לֹא יָקוּם
  chosen: shall stand
  alternatives:
  - shall not stand
  - shall not remain in force
  - will not be established
  lexicon: HALOT
  rationale: Legal idiom for remaining valid or in force. In the sentence structure,
    rendered as 'shall stand' after 'nothing' for natural English while preserving
    legal force.
- source_word: הֲפֵרָם
  chosen: has annulled them
  alternatives:
  - annulled them
  - made them void
  lexicon: HALOT
  rationale: Perfect verb summarizing the husband's decisive action; English present
    perfect fits the resulting legal state.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.'
- source_word: יִסְלַח לָהּ
  chosen: will forgive her
  alternatives:
  - will pardon her
  lexicon: HALOT
  rationale: Straightforward rendering of סלח in covenantal/legal-religious context;
    indicates that she is not held guilty for failing to fulfill a vow annulled by
    proper authority.
