id: NUM.30.2
reference: Numbers 30:2
source:
  edition: WLC
  text: וַ/יְדַבֵּ֤ר מֹשֶׁה֙ אֶל רָאשֵׁ֣י הַ/מַּטּ֔וֹת לִ/בְנֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר זֶ֣ה הַ/דָּבָ֔ר אֲשֶׁ֖ר צִוָּ֥ה יְהוָֽה־׃
translation:
  text: Then Moses spoke to the heads of the tribes of the sons of Israel, saying, “This is the word that Yahweh has commanded:”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “the Israelites.” The Hebrew reads “the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “This is what the LORD has commanded.” Hebrew “This is the word that the LORD has commanded.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... spoke
  alternatives:
  - And ... spoke
  - said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and 'Then ... spoke' gives natural modern English while preserving the sequential force better than a bare 'spoke.'
- source_word: רָאשֵׁי הַמַּטּוֹת
  chosen: the heads of the tribes
  alternatives:
  - the leaders of the tribes
  - the heads of the clans
  lexicon: HALOT
  rationale: רָאשֵׁי is literally 'heads/chiefs,' and מַטּוֹת in this context refers to Israel's tribal divisions. 'Heads of the tribes' preserves the metaphor and social structure more closely than the more interpretive 'leaders.'
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: of the sons of Israel
  alternatives:
  - of the children of Israel
  - of the Israelites
  lexicon: HALOT
  rationale: The phrase is formally 'to/for the sons of Israel.' Here it is rendered 'of the sons of Israel' in English apposition to 'the tribes,' preserving the gender-accurate and traditional covenantal expression rather than flattening it to 'Israelites.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard rendering for the infinitive introducing direct speech; concise and formally transparent.
- source_word: זֶה הַדָּבָר
  chosen: This is the word
  alternatives:
  - This is the thing
  - This is what
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' Here the formula introduces a divine command. 'Word' preserves the formal force of an authoritative utterance, while 'This is what' would be smoother but less textually transparent.
- source_word: צִוָּה
  chosen: has commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: The perfect verb reports a completed divine command now being relayed. English present perfect reads naturally in this speech-introduction formula and highlights the abiding relevance of the command.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
