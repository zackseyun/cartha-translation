id: NUM.30.6
reference: Numbers 30:6
source:
  edition: WLC
  text: וְ/אִם הֵנִ֨יא אָבִ֣י/הָ אֹתָ/הּ֮ בְּ/י֣וֹם שָׁמְע/וֹ֒ כָּל נְדָרֶ֗י/הָ וֶֽ/אֱסָרֶ֛י/הָ
    אֲשֶׁר אָסְרָ֥ה עַל נַפְשָׁ֖/הּ לֹ֣א יָק֑וּם וַֽ/יהוָה֙ יִֽסְלַח לָ֔/הּ כִּי הֵנִ֥יא
    אָבִ֖י/הָ אֹתָֽ/הּ־־־־־־׃
translation:
  text: But if her father forbids her on the day he hears of it, none of her vows
    or her binding obligations by which she has bound herself shall stand; and the
    LORD will forgive her, because her father forbade her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'binding pledges' or 'bonds.' The Hebrew term refers to obligations that
      bind a person, especially in vow contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'shall take effect.' The Hebrew literally says 'shall not stand,' meaning
      the vows are not upheld as binding.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the preceding case. 'But if' captures
    the adversative force in context better than a bare 'if.'
- source_word: הֵנִיא
  chosen: forbids
  alternatives:
  - restrains
  - disallows
  - annuls
  lexicon: HALOT
  rationale: In this vow context, the verb denotes a father's act of opposing or nullifying
    the vow upon hearing it. 'Forbids' is natural English and fits the legal setting.
    'Annuls' is possible, but the direct object is the daughter ('forbids her'), matching
    the Hebrew syntax here.
- source_word: אָבִיהָ
  chosen: her father
  lexicon: HALOT
  rationale: Straightforward possessive construction.
- source_word: אֹתָהּ
  chosen: her
  lexicon: HALOT
  rationale: Direct-object pronoun referring to the daughter; retained in English
    as the object of 'forbids.'
- source_word: בְּיוֹם שָׁמְעוֹ
  chosen: on the day he hears of it
  alternatives:
  - when he hears
  - on the day of his hearing
  lexicon: HALOT
  rationale: The Hebrew is literally 'in/on the day of his hearing.' English idiom
    prefers 'on the day he hears of it,' preserving the temporal specificity important
    to the legal condition.
- source_word: כָּל נְדָרֶיהָ
  chosen: none of her vows
  alternatives:
  - all her vows
  lexicon: HALOT
  rationale: 'Although the phrase itself is ''all her vows,'' English requires the
    negation to scope over the clause: ''none of her vows ... shall stand'' rather
    than the less idiomatic ''all her vows ... shall not stand.'''
- source_word: וֶאֱסָרֶיהָ
  chosen: her binding obligations
  alternatives:
  - her bonds
  - her pledges
  - her obligations
  lexicon: HALOT
  rationale: From אסר in the nominal form, referring to self-imposed binding commitments.
    'Binding obligations' makes the legal force clear in modern English.
- source_word: אֲשֶׁר אָסְרָה עַל נַפְשָׁהּ
  chosen: by which she has bound herself
  alternatives:
  - that she has bound upon herself
  - which she imposed on herself
  lexicon: HALOT
  rationale: This idiom refers to self-binding by vow or pledge. 'Bound herself' is
    clear and preserves the reflexive sense without wooden literalism.
- source_word: לֹא יָקוּם
  chosen: shall stand
  alternatives:
  - shall stand firm
  - shall be established
  - shall take effect
  lexicon: HALOT
  rationale: The legal sense is that the vows do not remain valid. 'Shall stand' is
    concise and idiomatic, while still reflecting the Hebrew verb 'arise/stand'.
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of יְהוָה is 'the LORD.'
- source_word: יִסְלַח לָהּ
  chosen: will forgive her
  alternatives:
  - will pardon her
  lexicon: HALOT
  rationale: Standard rendering of סלח with personal object. 'Forgive' is the clearest
    modern English equivalent.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: 'Introduces the reason the LORD forgives her: her father has nullified
    the vow. ''Because'' is clearer in modern English than ''for.'''
- source_word: הֵנִיא אָבִיהָ אֹתָהּ
  chosen: her father forbade her
  alternatives:
  - her father restrained her
  - her father annulled it for her
  lexicon: HALOT
  rationale: Repeats the earlier legal action and keeps the Hebrew's personal-object
    construction. This repetition is stylistically important and should be preserved.
