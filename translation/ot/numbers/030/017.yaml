- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered relational terms in legal context
  chosen_reading: a man ... his wife ... a father ... his daughter
  alternative_readings:
  - a husband ... his wife ... a father ... his daughter
  rationale: The Hebrew uses gender-specific relational nouns, not generic humanity language. Per doctrine, gender-accurate rendering is preferred. 'Man' fits the paired legal formulation, though 'husband' is a possible contextual alternative.
