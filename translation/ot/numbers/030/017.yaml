id: NUM.30.17
reference: Numbers 30:17
source:
  edition: WLC
  text: אֵ֣לֶּה הַֽ/חֻקִּ֗ים אֲשֶׁ֨ר צִוָּ֤ה יְהוָה֙ אֶת מֹשֶׁ֔ה בֵּ֥ין אִ֖ישׁ לְ/אִשְׁתּ֑/וֹ בֵּֽין אָ֣ב לְ/בִתּ֔/וֹ בִּ/נְעֻרֶ֖י/הָ בֵּ֥ית אָבִֽי/הָ־־׃פ
translation:
  text: These are the statutes that Yahweh commanded Moses concerning a man and his wife, and concerning a father and his daughter in her youth in her father's house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “between a man and his wife, and between a father and his daughter.”
    reason: lexical_alternative
  - marker: b
    text: “In her youth” refers to the period when the daughter is still living in her father’s household.
    reason: cultural_note
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Deictic plural introducing a summary statement; English idiom naturally supplies 'are' in this verbless clause.
- source_word: הַחֻקִּים
  chosen: the statutes
  alternatives:
  - the decrees
  - the ordinances
  lexicon: HALOT
  rationale: חֻקִּים commonly denotes prescribed statutes or fixed regulations. 'Statutes' preserves the legal-register sense without overinterpreting.
- source_word: אֲשֶׁר צִוָּה
  chosen: that ... commanded
  alternatives:
  - which ... commanded
  - that ... gave as commands
  lexicon: HALOT
  rationale: Relative clause with צוה straightforwardly means 'that ... commanded'; this is the most natural modern English rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת מֹשֶׁה
  chosen: Moses
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: The direct-object marker אֶת marks Moses as the one commanded. In English, 'commanded Moses' is idiomatic and accurate.
- source_word: בֵּין אִישׁ לְאִשְׁתּוֹ
  chosen: concerning a man and his wife
  alternatives:
  - between a man and his wife
  lexicon: HALOT
  rationale: Though בֵּין literally means 'between,' in this legal summary it introduces the relational sphere governed by the statutes. 'Concerning' reads more naturally in English while preserving the legal sense.
- source_word: בֵּין אָב לְבִתּוֹ
  chosen: and concerning a father and his daughter
  alternatives:
  - between a father and his daughter
  lexicon: HALOT
  rationale: Parallel to the previous בֵּין phrase; 'concerning' avoids awkward repetition of 'between' in English legal summary style.
- source_word: בִּנְעֻרֶיהָ
  chosen: in her youth
  alternatives:
  - while she is young
  - during her girlhood
  lexicon: HALOT
  rationale: The phrase denotes the period of youth/young womanhood. 'In her youth' is concise and preserves the temporal nuance.
- source_word: בֵּית אָבִיהָ
  chosen: in her father's house
  alternatives:
  - in the house of her father
  lexicon: HALOT
  rationale: Construct phrase indicating residence under paternal authority. 'In her father's house' is natural English and preserves the familial-legal setting.
