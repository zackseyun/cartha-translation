id: NUM.30.4
reference: Numbers 30:4
source:
  edition: WLC
  text: וְ/אִשָּׁ֕ה כִּֽי תִדֹּ֥ר נֶ֖דֶר לַ/יהוָ֑ה וְ/אָסְרָ֥ה אִסָּ֛ר בְּ/בֵ֥ית אָבִ֖י/הָ בִּ/נְעֻרֶֽי/הָ־׃
translation:
  text: And if a woman vows a vow to Yahweh, and binds herself by an obligation in her father's house in her youth,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'vows a vow,' a cognate expression emphasizing the formal act of making a vow.
    reason: lexical_alternative
  - marker: b
    text: Or 'and binds herself with a binding obligation.' The Hebrew uses a verb and related noun to express placing oneself under a binding pledge.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִשָּׁה
  chosen: And if a woman
  alternatives:
  - And a woman
  - When a woman
  lexicon: HALOT
  rationale: The conjunction plus noun introduces a new case in the legal material. 'And if a woman' fits the casuistic flow in English better than the more wooden 'And a woman,' while preserving the conditional sense carried by כִּי with the following verb.
- source_word: כִּי
  chosen: if
  alternatives:
  - when
  lexicon: HALOT
  rationale: In this legal context כִּי introduces a case condition. 'If' is the most natural English rendering for casuistic law, though 'when' is possible.
- source_word: תִדֹּר נֶדֶר
  chosen: vows a vow
  alternatives:
  - makes a vow
  - vows
  lexicon: HALOT
  rationale: The Hebrew uses a verb-noun cognate construction for emphasis. 'Vows a vow' preserves the formal force and legal register better than smoothing to 'makes a vow,' though the latter is idiomatic English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' in the main text, following the project's default for the divine name.
- source_word: וְאָסְרָה אִסָּר
  chosen: and binds herself by an obligation
  alternatives:
  - and binds a binding vow
  - and binds herself with a pledge
  - and takes upon herself an obligation
  lexicon: HALOT
  rationale: אָסַר with the cognate noun אִסָּר denotes placing oneself under a binding obligation, especially in vow contexts. 'Binds herself by an obligation' preserves the reflexive sense and legal force without becoming opaque. 'Binding vow' is possible but may blur the distinction between נֶדֶר and אִסָּר in this verse.
- source_word: בְּבֵית אָבִיהָ
  chosen: in her father's house
  alternatives:
  - while in her father's house
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'In her father's house' preserves both the household setting and the legal authority structure assumed by the passage.
- source_word: בִּנְעֻרֶיהָ
  chosen: in her youth
  alternatives:
  - while she is young
  - during her girlhood
  lexicon: HALOT
  rationale: The phrase indicates the period of youth, here specifying her unmarried status under her father's authority. 'In her youth' is concise and sufficiently formal; 'girlhood' is possible but sounds more interpretive.
