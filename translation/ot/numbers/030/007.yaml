id: NUM.30.7
reference: Numbers 30:7
source:
  edition: WLC
  text: וְ/אִם הָי֤וֹ תִֽהְיֶה֙ לְ/אִ֔ישׁ וּ/נְדָרֶ֖י/הָ עָלֶ֑י/הָ א֚וֹ מִבְטָ֣א שְׂפָתֶ֔י/הָ
    אֲשֶׁ֥ר אָסְרָ֖ה עַל נַפְשָֽׁ/הּ־־׃
translation:
  text: But if she belongs to a husband, and her vows are upon her, or a rash utterance
    of her lips by which she has bound herself,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'she becomes a man's wife' / 'she is married to a husband.' The Hebrew
      idiom literally reads 'she is/becomes to a man.'
    reason: lexical_alternative
  - marker: b
    text: Or 'an utterance of her lips.' The phrase likely refers to a spoken self-obligation
      made impulsively, distinct from a formal vow.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction introduces a conditional case in continuity with the
    preceding legislation. 'But if' captures both the connective force and the slight
    contrastive shift to a new scenario.
- source_word: הָיוֹ תִהְיֶה לְאִישׁ
  chosen: she belongs to a husband
  alternatives:
  - she becomes a man's wife
  - she is married to a husband
  - she comes to belong to a man
  lexicon: HALOT
  rationale: The construction with היה + לְאִישׁ is idiomatic for entering or being
    in marriage. 'Belongs to a husband' preserves the legal-relational force of the
    Hebrew without over-paraphrasing into a modern idiom like 'gets married.' The
    phrase is not merely existential ('is to a man') but covenantal/legal.
- source_word: וּנְדָרֶיהָ עָלֶיהָ
  chosen: and her vows are upon her
  alternatives:
  - while her vows are on her
  - and her vows remain binding on her
  - and her vows are still upon her
  lexicon: HALOT
  rationale: The prepositional phrase עָלֶיהָ is retained with 'upon her' to preserve
    the Hebrew image of an obligation resting on the woman. This also avoids prematurely
    interpreting the phrase as already legally validated; the following verses address
    that process.
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Simple disjunctive conjunction introducing an alternative category alongside
    vows.
- source_word: מִבְטָא שְׂפָתֶיהָ
  chosen: a rash utterance of her lips
  alternatives:
  - an utterance of her lips
  - a thoughtless statement from her lips
  - a rash promise from her lips
  lexicon: HALOT
  rationale: מִבְטָא denotes an utterance/expression, and in this legal context, especially
    parallel to vows and self-binding language, it carries the sense of a spoken commitment
    made impulsively. 'Rash utterance' reflects the nuance found elsewhere in vow
    contexts without collapsing it into a formal 'vow,' since the Hebrew distinguishes
    the terms.
- source_word: אֲשֶׁר אָסְרָה
  chosen: by which she has bound
  alternatives:
  - which she bound
  - with which she bound
  - by which she has obligated
  lexicon: HALOT
  rationale: אָסַר in vow contexts means to bind or obligate. 'By which she has bound'
    fits the instrumental force of the relative clause and keeps the legal metaphor
    explicit.
- source_word: עַל נַפְשָׁהּ
  chosen: herself
  alternatives:
  - her soul
  - her life
  - upon herself
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers reflexively to the person herself in a legal self-obligation
    context, not to an immaterial 'soul' in a later theological sense. 'Herself' is
    the clearest natural English equivalent while preserving the reflexive force.
