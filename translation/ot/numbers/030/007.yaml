theological_decisions:
- issue: Rendering of נֶפֶשׁ in a legal vow context
  chosen_reading: herself
  alternative_readings:
  - her soul
  - her life
  rationale: The verse concerns self-imposed obligations, not anthropology. Rendering
    נֶפֶשׁ as 'herself' avoids importing doctrinal claims about the soul and best
    matches the Hebrew idiom 'bind upon oneself.'
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the text actually says without importing doctrinal claims.'
