id: NUM.30.11
reference: Numbers 30:11
source:
  edition: WLC
  text: וְ/אִם בֵּ֥ית אִישָׁ֖/הּ נָדָ֑רָה אֽוֹ אָסְרָ֥ה אִסָּ֛ר עַל נַפְשָׁ֖/הּ בִּ/שְׁבֻעָֽה־־־׃
translation:
  text: And if in her husband's house she made a vow, or bound herself by an obligation
    with an oath,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'bound a binding obligation upon herself with an oath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - But if
  - If
  lexicon: HALOT
  rationale: The conjunction plus conditional particle introduces the next case in
    a legal sequence. 'And if' preserves the connective flow from the surrounding
    casuistic material better than a bare 'If.'
- source_word: בֵּית אִישָׁהּ
  chosen: in her husband's house
  alternatives:
  - in the house of her husband
  - while in her husband's household
  lexicon: HALOT
  rationale: The construct phrase literally means 'the house of her husband.' 'In
    her husband's house' is natural English and preserves the locative/social setting
    of marriage without over-paraphrasing.
- source_word: נָדָרָה
  chosen: she made a vow
  alternatives:
  - she vowed
  lexicon: HALOT
  rationale: The verb נדר denotes making a vow. 'Made a vow' is idiomatic modern English
    and keeps the legal force clear.
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Simple disjunctive conjunction linking two related legal possibilities.
- source_word: אָסְרָה אִסָּר
  chosen: bound herself by an obligation
  alternatives:
  - bound herself with a binding pledge
  - put herself under a binding obligation
  - forbade herself by a bond
  lexicon: HALOT
  rationale: The cognate verb-noun construction intensifies the act of placing oneself
    under a binding restriction. 'Bound herself by an obligation' communicates the
    reflexive self-binding sense in clear English while avoiding awkward literalism.
- source_word: עַל נַפְשָׁהּ
  chosen: bound herself
  alternatives:
  - upon herself
  - on herself
  - on her person
  lexicon: HALOT
  rationale: In this idiom, נֶפֶשׁ refers to the person/self rather than the immaterial
    'soul' in a narrow sense. Rendering the phrase within the verbal expression as
    'bound herself' best conveys the legal self-obligation.
- source_word: בִּשְׁבֻעָה
  chosen: with an oath
  alternatives:
  - by an oath
  - under oath
  lexicon: HALOT
  rationale: The preposition marks means or accompanying circumstance. 'With an oath'
    is natural and preserves the formal, sworn character of the obligation.
