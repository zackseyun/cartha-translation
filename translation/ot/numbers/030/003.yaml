id: NUM.30.3
reference: Numbers 30:3
source:
  edition: WLC
  text: אִישׁ֩ כִּֽי יִדֹּ֨ר נֶ֜דֶר לַֽ/יהוָ֗ה אֽוֹ הִשָּׁ֤בַע שְׁבֻעָה֙ לֶ/אְסֹ֤ר אִסָּר֙ עַל נַפְשׁ֔/וֹ לֹ֥א יַחֵ֖ל דְּבָר֑/וֹ כְּ/כָל הַ/יֹּצֵ֥א מִ/פִּ֖י/ו יַעֲשֶֽׂה־־־־׃
translation:
  text: If a man makes a vow to Yahweh, or swears an oath to bind himself with a binding obligation, he shall not break his word; he shall do according to all that has gone out from his mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to bind himself by an obligation.' The Hebrew expression is literally 'to bind a binding obligation upon himself.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'he shall not profane his word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: Masculine singular noun. Following the gender-accurate principle, rendered 'a man' rather than a gender-neutral substitute. In this legal context the masculine form is retained as the source wording.
- source_word: כִּי
  chosen: If
  alternatives:
  - when
  lexicon: HALOT
  rationale: Introduces a conditional/casuistic clause in legal material; 'If' fits standard English law-style formulation.
- source_word: יִדֹּר נֶדֶר
  chosen: makes a vow
  alternatives:
  - vows a vow
  lexicon: HALOT
  rationale: Hebrew uses cognate verb + noun for emphasis. English idiom prefers 'makes a vow,' which preserves the legal force without awkward literalism.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine table, YHWH is rendered 'the LORD' rather than transliterated.
- source_word: הִשָּׁבַע שְׁבֻעָה
  chosen: swears an oath
  alternatives:
  - takes an oath
  lexicon: HALOT
  rationale: Another cognate construction. 'Swears an oath' is natural English and preserves the solemn verbal action.
- source_word: לֶאְסֹר אִסָּר
  chosen: to bind himself by a pledge
  alternatives:
  - to bind himself by an obligation
  - to bind a binding obligation upon himself
  - to impose a pledge on himself
  lexicon: HALOT
  rationale: The infinitive + noun from אסר/אִסָּר expresses self-obligation or self-binding. 'Bind himself by a pledge' communicates the reflexive legal sense in readable English. 'Pledge' is chosen over the more abstract 'obligation' to preserve the concrete force of אִסָּר.
- source_word: עַל נַפְשׁוֹ
  chosen: himself
  alternatives:
  - upon himself
  - on his person
  - on his life
  lexicon: HALOT
  rationale: Literally 'upon his soul/self.' In this legal idiom it indicates that the obligation is self-imposed. 'Himself' best conveys the sense in contemporary English.
- source_word: לֹא יַחֵל דְּבָרוֹ
  chosen: he shall not break his word
  alternatives:
  - he shall not profane his word
  - he shall not violate his word
  lexicon: HALOT
  rationale: The Hiphil of חלל here means to treat as profane/defile, idiomatically to violate or break one's word. 'Break his word' is the clearest natural English equivalent; the more literal 'profane' is preserved as an alternative because it reflects the underlying semantic field.
- source_word: כְּכָל הַיֹּצֵא מִפִּיו
  chosen: according to all that has gone out from his mouth
  alternatives:
  - according to everything that proceeds from his mouth
  - according to all that he has said
  lexicon: HALOT
  rationale: Retains the concrete Hebrew image of spoken words issuing from the mouth while remaining readable. Slightly more formal wording preserves the solemnity of the legal formula.
- source_word: יַעֲשֶׂה
  chosen: he shall do
  alternatives:
  - he must do
  - he shall perform
  lexicon: HALOT
  rationale: Simple legal obligation verb. 'He shall do' matches the casuistic style and keeps close to the Hebrew.
