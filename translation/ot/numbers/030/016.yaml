theological_decisions:
- issue: Meaning of bearing iniquity/guilt in a legal context
  chosen_reading: The husband assumes liability for the wrong involved in belatedly
    annulling her vows.
  alternative_readings:
  - He bears the punishment due for her broken vow.
  - He bears responsibility for the consequences of invalidating the vow after hearing
    it.
  rationale: The idiom נשׂא עון can denote bearing guilt, culpability, or its consequences.
    In Numbers 30 the legal point is that delayed annulment shifts responsibility
    to the husband. 'Bear her guilt' preserves the idiom without over-specifying penal
    mechanics.
  doctrine_reference: Preserve theological tension rather than resolve it.
