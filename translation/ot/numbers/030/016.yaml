id: NUM.30.16
reference: Numbers 30:16
source:
  edition: WLC
  text: וְ/אִם הָפֵ֥ר יָפֵ֛ר אֹתָ֖/ם אַחֲרֵ֣י שָׁמְע֑/וֹ וְ/נָשָׂ֖א אֶת עֲוֺנָֽ/הּ־־׃
translation:
  text: But if he does indeed nullify them after he has heard of them, then he shall
    bear her guilt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'surely annuls them' or 'completely annuls them'; the Hebrew uses an
      infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''Bear her guilt'' may also be understood as ''bear responsibility for
      her iniquity'' or ''bear the punishment for her guilt.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the preceding verse. 'But if'
    captures the adversative force of waw in context better than a simple 'and if.'
- source_word: הָפֵר יָפֵר
  chosen: does indeed nullify
  alternatives:
  - surely nullifies
  - completely annuls
  - breaks
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Does
    indeed nullify' preserves the emphatic construction in natural English. 'Nullify'
    fits the legal context of annulling vows better than the more colloquial 'breaks.'
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Refers back to the woman's vows or binding pledges in the immediate context;
    the plural pronoun is retained.
- source_word: אַחֲרֵי שָׁמְעוֹ
  chosen: after he has heard of them
  alternatives:
  - after hearing them
  - after he hears of them
  lexicon: HALOT
  rationale: The preposition plus infinitive/verb form indicates subsequent action
    after the husband's hearing. 'Has heard of them' is idiomatic and clarifies that
    he had prior knowledge before annulling.
- source_word: וְנָשָׂא
  chosen: then he shall bear
  alternatives:
  - and he shall bear
  - he will carry
  lexicon: HALOT
  rationale: In legal-moral contexts נשׂא עון commonly means to bear guilt or bear
    iniquity. 'Then' makes the consequence relation explicit in English while preserving
    the conjunction's flow.
- source_word: עֲוֺנָהּ
  chosen: her guilt
  alternatives:
  - her iniquity
  - her punishment for guilt
  lexicon: HALOT
  rationale: In this context the sense is liability for wrongdoing transferred to
    the husband if he annuls the vows belatedly. 'Her guilt' is clearer in modern
    English than 'her iniquity,' while preserving the legal-moral force.
