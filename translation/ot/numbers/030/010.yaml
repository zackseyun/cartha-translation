id: NUM.30.10
reference: Numbers 30:10
source:
  edition: WLC
  text: וְ/נֵ֥דֶר אַלְמָנָ֖ה וּ/גְרוּשָׁ֑ה כֹּ֛ל אֲשֶׁר אָסְרָ֥ה עַל נַפְשָׁ֖/הּ יָק֥וּם
    עָלֶֽי/הָ־־׃
translation:
  text: And the vow of a widow or of a divorced woman—everything by which she has
    bound herself—shall stand against her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall be binding on her' for 'shall stand against her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵדֶר
  chosen: vow
  alternatives:
  - pledge
  lexicon: HALOT
  rationale: נדר in legal/cultic contexts regularly denotes a vow made to God. 'Vow'
    is the standard and most precise English equivalent here.
- source_word: אַלְמָנָה
  chosen: widow
  lexicon: HALOT
  rationale: Straightforward lexical equivalent for an unmarried woman whose husband
    has died.
- source_word: גְרוּשָׁה
  chosen: divorced woman
  alternatives:
  - divorcee
  lexicon: HALOT
  rationale: The passive participial form denotes a woman who has been sent away/divorced.
    'Divorced woman' is clear, natural, and slightly more formal/legal than 'divorcee'.
- source_word: כֹּל אֲשֶׁר
  chosen: everything by which
  alternatives:
  - every vow that
  - everything that
  lexicon: HALOT
  rationale: The phrase broadens beyond the initial noun 'vow' to include any binding
    obligation. 'Everything by which' preserves the comprehensive force of כֹּל אֲשֶׁר
    while fitting the following verb.
- source_word: אָסְרָה
  chosen: has bound
  alternatives:
  - has bound by vow
  - has obligated
  lexicon: HALOT
  rationale: From אסר, 'to bind.' In this chapter it refers to placing oneself under
    an obligation. 'Has bound' preserves the metaphor and legal force without over-paraphrasing.
- source_word: עַל נַפְשָׁהּ
  chosen: herself
  alternatives:
  - upon herself
  - her own person
  lexicon: HALOT
  rationale: Literally 'upon her soul/self.' In idiomatic English, 'herself' best
    conveys self-imposed obligation while preserving the reflexive sense.
- source_word: יָקוּם
  chosen: shall stand
  alternatives:
  - shall remain in force
  - shall be binding
  lexicon: HALOT
  rationale: קום in legal contexts can mean 'stand, remain valid, be established.'
    'Shall stand' is a relatively formal rendering that preserves the Hebrew metaphor
    and legal validity.
- source_word: עָלֶיהָ
  chosen: against her
  alternatives:
  - upon her
  - for her
  - binding on her
  lexicon: HALOT
  rationale: With legal obligations in this chapter, עַל often carries the sense of
    an obligation resting on someone. 'Against her' reflects the burden-bearing force
    and matches the legal tone, though 'binding on her' is also possible.
