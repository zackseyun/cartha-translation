id: NUM.30.12
reference: Numbers 30:12
source:
  edition: WLC
  text: וְ/שָׁמַ֤ע אִישָׁ/הּ֙ וְ/הֶחֱרִ֣שׁ לָ֔/הּ לֹ֥א הֵנִ֖יא אֹתָ֑/הּ וְ/קָ֨מוּ֙
    כָּל נְדָרֶ֔י/הָ וְ/כָל אִסָּ֛ר אֲשֶׁר אָסְרָ֥ה עַל נַפְשָׁ֖/הּ יָקֽוּם־־־־׃
translation:
  text: And if her husband hears and says nothing to her, and does not nullify her,
    then all her vows shall stand, and every binding obligation that she has bound
    on herself shall stand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'does not nullify her.' The sense in context is that he
      does not annul or invalidate her vow or binding obligation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַע
  chosen: And if ... hears
  alternatives:
  - And ... heard
  - and hears
  lexicon: HALOT
  rationale: The waw + qatal here functions in the casuistic legal style with conditional
    force carried from the surrounding context; English supplies 'if' naturally to
    express the legal condition rather than a simple past narrative.
- source_word: אִישָׁהּ
  chosen: her husband
  alternatives:
  - her man
  lexicon: HALOT
  rationale: In this legal context אִישׁ with 3fs suffix refers specifically to a
    married woman's husband, not merely 'man.'
- source_word: וְהֶחֱרִשׁ לָהּ
  chosen: says nothing to her
  alternatives:
  - keeps silent toward her
  - is silent to her
  lexicon: HALOT
  rationale: The idiom means remaining silent in response. 'Says nothing to her' is
    natural modern English while preserving the legal significance of silence.
- source_word: לֹא הֵנִיא אֹתָהּ
  chosen: does not nullify her
  alternatives:
  - does not forbid her
  - does not invalidate her vow
  - does not restrain her
  lexicon: HALOT
  rationale: The verb נוא/הניא in this chapter refers to annulling or frustrating
    the force of the woman's vow. Because the direct object is 'her,' English can
    either preserve the Hebrew construction literally or make the implied object explicit.
    I retained the literal object for transparency, while the sense is legal nullification
    of her vow/obligation.
- source_word: וְקָמוּ
  chosen: then ... shall stand
  alternatives:
  - then ... shall remain in force
  - then ... shall be established
  lexicon: HALOT
  rationale: קום in legal contexts conveys validity or continuing force. 'Shall stand'
    is concise and close to the Hebrew, while still intelligible.
- source_word: כָּל נְדָרֶיהָ
  chosen: all her vows
  alternatives:
  - every one of her vows
  lexicon: HALOT
  rationale: Standard rendering of נדר in vow legislation.
- source_word: וְכָל אִסָּר
  chosen: and every binding obligation
  alternatives:
  - and every bond
  - and every binding pledge
  - and every obligation
  lexicon: HALOT
  rationale: אִסָּר in this chapter denotes a binding obligation or restriction, especially
    one self-imposed by oath. 'Binding obligation' captures both the legal and restrictive
    sense better than the opaque 'bond.'
- source_word: אֲשֶׁר אָסְרָה עַל נַפְשָׁהּ
  chosen: that she has bound on herself
  alternatives:
  - that she has bound upon herself
  - by which she has bound herself
  - that she has imposed on herself
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of binding upon oneself. 'Bound on
    herself' preserves the metaphor and legal force; 'imposed on herself' is possible
    but less transparent to the source wording.
- source_word: יָקוּם
  chosen: shall stand
  alternatives:
  - shall remain in force
  - shall stand firm
  lexicon: HALOT
  rationale: Singular verb after a collective expression is idiomatic Hebrew; English
    can still render the legal result with 'shall stand.' Repeating 'shall stand'
    also preserves the Hebrew's rhetorical parallelism.
