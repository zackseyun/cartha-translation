id: NUM.30.15
reference: Numbers 30:15
source:
  edition: WLC
  text: וְ/אִם הַחֲרֵשׁ֩ יַחֲרִ֨ישׁ לָ֥/הּ אִישָׁ/הּ֮ מִ/יּ֣וֹם אֶל יוֹם֒ וְ/הֵקִים֙
    אֶת כָּל נְדָרֶ֔י/הָ א֥וֹ אֶת כָּל אֱסָרֶ֖י/הָ אֲשֶׁ֣ר עָלֶ֑י/הָ הֵקִ֣ים אֹתָ֔/ם
    כִּי הֶחֱרִ֥שׁ לָ֖/הּ בְּ/י֥וֹם שָׁמְעֽ/וֹ־־־־־־־׃
translation:
  text: But if her husband indeed keeps silent to her from day to day, then he confirms
    all her vows or all her obligations that are upon her; he has confirmed them,
    because he kept silent to her on the day he heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all her binding pledges' for 'all her obligations.' The Hebrew term
      refers to commitments that bind the person who makes them.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֲרֵשׁ יַחֲרִישׁ
  chosen: indeed keeps silent
  alternatives:
  - is completely silent
  - keeps on being silent
  lexicon: HALOT
  rationale: The infinitive absolute + finite verb intensifies the verbal idea. 'Indeed
    keeps silent' preserves the emphasis without becoming awkward. The context is
    legal non-objection rather than mere inability to speak.
- source_word: אִישָׁהּ
  chosen: her husband
  alternatives:
  - her man
  lexicon: HALOT
  rationale: In this marital legal context, 'her husband' is the natural and accurate
    English rendering of אִישׁ with 3fs suffix.
- source_word: מִיּוֹם אֶל יוֹם
  chosen: from day to day
  alternatives:
  - day after day
  - from one day to another
  lexicon: HALOT
  rationale: This idiom indicates continued silence over successive days. 'From day
    to day' is both natural and close to the Hebrew form.
- source_word: וְהֵקִים
  chosen: then he confirms
  alternatives:
  - then he establishes
  - then he upholds
  lexicon: HALOT
  rationale: 'The verb קום in the Hiphil here has legal force: to cause a vow to stand,
    hence ''confirm.'' ''Then'' makes the result relation clear in English.'
- source_word: נְדָרֶיהָ
  chosen: her vows
  lexicon: HALOT
  rationale: Standard rendering for נדר in legal and cultic contexts.
- source_word: אֱסָרֶיהָ
  chosen: her obligations
  alternatives:
  - her binding pledges
  - her restraints
  lexicon: HALOT
  rationale: The noun derives from אסר, 'to bind,' and in this chapter refers to self-imposed
    binding commitments. 'Obligations' communicates the legal force in readable English;
    the more literal 'binding pledges' is preserved as an alternative.
- source_word: אֲשֶׁר עָלֶיהָ
  chosen: that are upon her
  alternatives:
  - that bind her
  - that are binding on her
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew metaphor and legal
    sense. It refers to obligations resting on her.
- source_word: הֵקִים אֹתָם
  chosen: he has confirmed them
  alternatives:
  - he confirmed them
  lexicon: HALOT
  rationale: The perfect summarizes the legal effect of his prior silence. English
    present perfect captures the resultant state well.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: 'Causal sense fits the explanation: his confirmation stands because he
    was silent when he heard.'
- source_word: הֶחֱרִשׁ לָהּ
  chosen: he kept silent to her
  alternatives:
  - he said nothing to her
  - he was silent toward her
  lexicon: HALOT
  rationale: Retains the repeated legal motif of silence toward her as tacit confirmation.
    Slightly literal phrasing preserves the connection with the earlier clause.
- source_word: בְּיוֹם שָׁמְעוֹ
  chosen: on the day he heard
  alternatives:
  - when he heard
  lexicon: HALOT
  rationale: This closely follows the Hebrew temporal expression and echoes the chapter's
    repeated legal timing formula.
