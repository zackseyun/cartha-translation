theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Per doctrine guidelines, the default
    rendering is 'the LORD,' following Jewish reverence tradition and longstanding
    English convention while distinguishing the divine name from other titles.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered covenantal designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the Israelites
  rationale: The Hebrew is grammatically masculine plural and functions as a fixed
    national designation. Per the gender-accurate policy, the masculine form is preserved
    rather than neutralized in the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
