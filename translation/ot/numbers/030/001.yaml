id: NUM.30.1
reference: Numbers 30:1
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר מֹשֶׁ֖ה אֶל בְּנֵ֣י יִשְׂרָאֵ֑ל כְּ/כֹ֛ל אֲשֶׁר צִוָּ֥ה יְהוָ֖ה
    אֶת מֹשֶֽׁה־־־׃פ
translation:
  text: Moses spoke to the sons of Israel according to all that the LORD had commanded
    Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel' or 'the Israelites.' The Hebrew reads 'the sons
      of Israel,' a standard covenantal designation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: Though the verb is formally 'said,' English idiom with an indirect object
    plus summary content is smoother as 'spoke to.' This preserves the speech act
    without implying direct quotation.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: This is the literal Hebrew expression. Per the gender-accurate policy,
    'sons' is retained rather than neutralizing to 'children' or 'Israelites,' since
    the phrase is a standard covenantal ethnonym built on the masculine plural construct.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - all that
  - just as everything that
  lexicon: HALOT
  rationale: The prefixed כ conveys conformity ('according to, in accordance with'),
    not merely content. 'According to all that' best reflects the Hebrew construction
    while remaining natural English.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: 'English past perfect clarifies the sequence: the LORD''s command to
    Moses precedes Moses'' speaking to Israel.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the covenant name through the small-caps convention represented here as 'the LORD'.
- source_word: אֶת מֹשֶׁה
  chosen: Moses
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: The direct-object marker אֶת indicates that Moses is the object of 'had
    commanded.' English requires the preposition 'to' with 'command' in many contexts,
    but 'commanded Moses' is idiomatic and more formally aligned here.
