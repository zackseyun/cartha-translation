id: NUM.28.9
reference: Numbers 28:9
source:
  edition: WLC
  text: וּ/בְ/יוֹם֙ הַ/שַּׁבָּ֔ת שְׁנֵֽי כְבָשִׂ֥ים בְּנֵֽי שָׁנָ֖ה תְּמִימִ֑ם וּ/שְׁנֵ֣י
    עֶשְׂרֹנִ֗ים סֹ֧לֶת מִנְחָ֛ה בְּלוּלָ֥ה בַ/שֶּׁ֖מֶן וְ/נִסְכּֽ/וֹ־־׃
translation:
  text: 'And on the Sabbath day: two male lambs a year old, without blemish, and two-tenths
    of an ephah of fine flour as a grain offering, mixed with oil, and its drink offering.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'two tenths'; in sacrificial legislation this means two-tenths of
      an ephah.
    reason: cultural_note
  - marker: b
    text: Or 'and its libation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/יוֹם הַ/שַּׁבָּת
  chosen: And on the Sabbath day
  alternatives:
  - And on the day of the Sabbath
  - On the Sabbath day
  lexicon: HALOT
  rationale: The phrase is temporal and introduces the additional Sabbath offering.
    'And' preserves the conjunction from the Hebrew, linking this verse to the preceding
    sacrificial instructions.
- source_word: שְׁנֵי כְבָשִׂים
  chosen: two male lambs
  alternatives:
  - two lambs
  - two sheep
  lexicon: HALOT
  rationale: כְבָשִׂים refers specifically to lambs/young sheep, and in sacrificial
    contexts 'lambs' is the natural English equivalent. 'Male' is supplied because
    the plural form here is masculine and sacrificial prescriptions regularly distinguish
    sex, though English often leaves it implicit.
- source_word: בְּנֵי שָׁנָה
  chosen: a year old
  alternatives:
  - of the first year
  - yearling
  lexicon: HALOT
  rationale: The idiom literally means 'sons of a year' and denotes animals one year
    old. 'A year old' is clear modern English and preserves the age requirement.
- source_word: תְּמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial contexts תמים denotes freedom from defect. 'Without blemish'
    is the standard and precise cultic rendering in English.
- source_word: וּ/שְׁנֵי עֶשְׂרֹנִים
  chosen: and two-tenths of an ephah
  alternatives:
  - and two tenth-parts
  - and two omers
  lexicon: HALOT
  rationale: An עִשָּׂרוֹן is a tenth-part measure, conventionally understood as a
    tenth of an ephah in offering legislation. Rendering it as 'two-tenths of an ephah'
    makes the measure intelligible in context.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: סֹלֶת is finely milled flour used in offerings; 'fine flour' is the standard
    cultic equivalent.
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - tribute offering
  lexicon: HALOT
  rationale: In priestly sacrificial legislation, מִנְחָה refers specifically to the
    cereal/grain offering rather than a generic gift. 'Grain offering' is contextually
    precise and widely understood.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: The participle describes the flour as combined with oil. 'Mixed with
    oil' is natural modern English without loss of meaning.
- source_word: וְנִסְכּוֹ
  chosen: and its drink offering
  alternatives:
  - and its libation
  - with its drink offering
  lexicon: HALOT
  rationale: נֶסֶךְ is the poured liquid accompaniment to sacrifices. 'Drink offering'
    is the clearest standard rendering; the 3ms suffix is represented by 'its,' referring
    to the offering package associated with the Sabbath sacrifice.
