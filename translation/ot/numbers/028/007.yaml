id: NUM.28.7
reference: Numbers 28:7
source:
  edition: WLC
  text: וְ/נִסְכּ/וֹ֙ רְבִיעִ֣ת הַ/הִ֔ין לַ/כֶּ֖בֶשׂ הָ/אֶחָ֑ד בַּ/קֹּ֗דֶשׁ הַסֵּ֛ךְ נֶ֥סֶךְ שֵׁכָ֖ר לַ/יהוָֽה׃
translation:
  text: And its drink offering shall be a quarter of a hin for each lamb. In the holy place you shall pour out a drink offering of strong drink to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for one lamb'; literally 'for the one lamb.'
    reason: lexical_alternative
  - marker: b
    text: Or 'In the sanctuary.'
    reason: lexical_alternative
  - marker: c
    text: '''Strong drink'' refers to an intoxicating beverage other than wine; the exact type is not specified.'
    reason: cultural_note
lexical_decisions:
- source_word: וְנִסְכּוֹ
  chosen: And its drink offering shall be
  alternatives:
  - And its libation shall be
  - And its poured offering shall be
  lexicon: HALOT
  rationale: נֶסֶךְ/נִסְכּוֹ refers to the accompanying liquid offering. 'Drink offering' is standard, clear English and fits the cultic context better than the less common 'libation.' The suffix is rendered 'its,' referring back to the daily burnt offering context.
- source_word: רְבִיעִת הַהִין
  chosen: a quarter of a hin
  alternatives:
  - a fourth of a hin
  lexicon: HALOT
  rationale: This is a precise measure. 'Quarter of a hin' is natural English while preserving the ancient unit rather than converting it, which maintains transparency to the source text.
- source_word: לַכֶּבֶשׂ הָאֶחָד
  chosen: for each lamb
  alternatives:
  - for the one lamb
  - for one lamb
  lexicon: HALOT
  rationale: Literally 'for the one lamb.' In context the instruction specifies the amount per individual lamb in the regular offering, so 'for each lamb' communicates the distributive force more naturally in English.
- source_word: בַּקֹּדֶשׁ
  chosen: In the holy place
  alternatives:
  - In the sanctuary
  - In holiness
  lexicon: HALOT
  rationale: In sacrificial context, המקום הקדוש refers to the sacred precinct rather than an abstract manner ('holily'). 'Holy place' is a transparent rendering; 'sanctuary' is possible but slightly more interpretive.
- source_word: הַסֵּךְ
  chosen: you shall pour out
  alternatives:
  - pour out
  - offer by pouring
  lexicon: HALOT
  rationale: This imperative/infinitive-like cultic form from נסך calls for the act of pouring the liquid offering. English requires an explicit verbal expression; 'you shall pour out' fits the instructional style of the passage.
- source_word: נֶסֶךְ
  chosen: a drink offering
  alternatives:
  - a libation
  lexicon: HALOT
  rationale: The noun is repeated for emphasis and is best kept explicit in English as 'a drink offering' rather than omitted.
- source_word: שֵׁכָר
  chosen: strong drink
  alternatives:
  - fermented drink
  - beer
  lexicon: HALOT
  rationale: שֵׁכָר denotes an intoxicating beverage distinct from wine. 'Strong drink' is the established broad rendering and avoids over-specifying the exact beverage type.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's doctrinal standard as 'the LORD.' 'To the LORD' fits the direction of the offering act.
