id: NUM.28.31
reference: Numbers 28:31
source:
  edition: WLC
  text: מִ/לְּ/בַ֞ד עֹלַ֧ת הַ/תָּמִ֛יד וּ/מִנְחָת֖/וֹ תַּעֲשׂ֑וּ תְּמִימִ֥ם יִהְיוּ
    לָ/כֶ֖ם וְ/נִסְכֵּי/הֶֽם־׃פ
translation:
  text: Besides the regular burnt offering and its grain offering, you shall prepare
    them; they shall be without blemish for you, along with their drink offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the continual burnt offering' or 'the daily burnt offering.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'they shall be for you unblemished,' meaning the animals presented
      are to be without defect.
    reason: lexical_alternative
  - marker: c
    text: Or 'their libations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּבַד
  chosen: Besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: Introduces these offerings as supplementary to the continual daily offering.
    'Besides' is concise and idiomatic in sacrificial instructions.
- source_word: עֹלַת הַתָּמִיד
  chosen: the regular burnt offering
  alternatives:
  - the continual burnt offering
  - the daily burnt offering
  lexicon: HALOT
  rationale: Refers to the standing daily burnt offering. 'Regular' communicates the
    ongoing prescribed nature of תָּמִיד in clear modern English without losing the
    cultic sense.
- source_word: וּמִנְחָתוֹ
  chosen: and its grain offering
  alternatives:
  - and its tribute offering
  - and its meal offering
  lexicon: HALOT
  rationale: מִנְחָה in priestly sacrificial contexts commonly denotes the grain offering
    accompanying the burnt offering. 'Grain offering' is the clearest standard English
    rendering here.
- source_word: תַּעֲשׂוּ
  chosen: you shall prepare
  alternatives:
  - you shall make
  - you shall offer
  lexicon: HALOT
  rationale: The verb עשה in sacrificial contexts can mean to prepare or perform/offer.
    'Prepare' fits the immediate context of arranging sacrificial animals and associated
    offerings while remaining natural English.
- source_word: תְּמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - whole
  - perfect
  lexicon: HALOT
  rationale: In sacrificial legislation תמים describes animals free from defect. 'Without
    blemish' is the standard and precise cultic rendering.
- source_word: יִהְיוּ לָכֶם
  chosen: they shall be without blemish for you
  alternatives:
  - they shall be unblemished for you
  - let them be without blemish for you
  lexicon: HALOT
  rationale: The clause qualifies the offerings to be presented by the Israelites.
    Retaining 'for you' reflects the Hebrew dative, indicating the offerings required
    from them, though in English it is somewhat formal.
- source_word: וְנִסְכֵּיהֶם
  chosen: along with their drink offerings
  alternatives:
  - and their drink offerings
  - with their libations
  lexicon: HALOT
  rationale: נֶסֶךְ denotes the accompanying poured offering of wine. 'Drink offerings'
    is the clearest modern rendering; 'along with' smooths the connection in English.
