id: NUM.28.4
reference: Numbers 28:4
source:
  edition: WLC
  text: אֶת הַ/כֶּ֥בֶשׂ אֶחָ֖ד תַּעֲשֶׂ֣ה בַ/בֹּ֑קֶר וְ/אֵת֙ הַ/כֶּ֣בֶשׂ הַ/שֵּׁנִ֔י
    תַּעֲשֶׂ֖ה בֵּ֥ין הָֽ/עַרְבָּֽיִם־׃
translation:
  text: You shall offer one lamb in the morning, and the second lamb you shall offer
    between the evenings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'between the evenings,' a traditional expression for the time around
      twilight or late afternoon.
    reason: cultural_note
lexical_decisions:
- source_word: הַכֶּבֶשׂ
  chosen: lamb
  alternatives:
  - male lamb
  - young ram
  lexicon: HALOT
  rationale: כֶּבֶשׂ denotes a lamb, typically a young male sheep in sacrificial contexts.
    'Lamb' is the most natural English rendering here; 'male' is contextually implied
    by the sacrificial legislation but not explicitly restated in this verse.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - the one
  - first
  lexicon: HALOT
  rationale: The cardinal 'one' is the plain sense. Although English could idiomatically
    say 'the first,' the Hebrew uses אֶחָד, not רִאשׁוֹן, so 'one' better preserves
    the source wording.
- source_word: תַּעֲשֶׂה
  chosen: you shall offer
  alternatives:
  - you shall make
  - you shall prepare
  lexicon: HALOT
  rationale: The verb עשה literally means 'do/make,' but in sacrificial instructions
    it idiomatically means to prepare or offer a sacrifice. 'Offer' communicates the
    cultic action clearly in natural English without over-paraphrasing.
- source_word: בַבֹּקֶר
  chosen: in the morning
  alternatives:
  - in the morning time
  - at morning
  lexicon: HALOT
  rationale: בֹּקֶר means 'morning.' The prepositional phrase is best rendered idiomatically
    as 'in the morning.'
- source_word: הַשֵּׁנִי
  chosen: the second
  alternatives:
  - the other
  - the second one
  lexicon: HALOT
  rationale: שֵׁנִי is the ordinal 'second.' 'The second' is direct and preserves
    the sequence established by the first lamb.
- source_word: בֵּין הָעַרְבָּיִם
  chosen: between the evenings
  alternatives:
  - at twilight
  - between sunset and dark
  - toward evening
  lexicon: HALOT
  rationale: The Hebrew expression is literally 'between the evenings.' Because the
    phrase is culturally and temporally specific and somewhat debated, the main text
    preserves the more formal rendering, while a footnote gives a more idiomatic alternative.
