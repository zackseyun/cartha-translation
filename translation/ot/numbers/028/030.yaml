theological_decisions:
- issue: Supplying the implied sacrificial category not explicitly repeated in the
    Hebrew clause
  chosen_reading: Include 'for a sin offering' in the English text
  alternative_readings:
  - Translate more literally as 'and one male goat, to make atonement for you'
  rationale: The immediate context repeatedly lists sacrificial animals by function,
    and in this recurring formula the goat is the purification/sin offering associated
    with making atonement. English normally requires the implied category to be made
    explicit for clarity. This is a contextual completion, not a doctrinal expansion.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy; do not paraphrase beyond what the source warrants.'
