id: NUM.28.6
reference: Numbers 28:6
source:
  edition: WLC
  text: עֹלַ֖ת תָּמִ֑יד הָ/עֲשֻׂיָה֙ בְּ/הַ֣ר סִינַ֔י לְ/רֵ֣יחַ נִיחֹ֔חַ אִשֶּׁ֖ה לַֽ/יהוָֽה׃
translation:
  text: It is the regular burnt offering, made at Mount Sinai as a pleasing aroma, a food offering to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'continual burnt offering.'
    reason: lexical_alternative
  - marker: b
    text: Or 'made/offered at Mount Sinai.' The Hebrew participle can be rendered more literally, but here likely refers to the offering as instituted there.
    reason: alternative_reading
  - marker: c
    text: Or 'a soothing aroma' or 'a sweet aroma.'
    reason: lexical_alternative
  - marker: d
    text: Traditionally 'an offering by fire to the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹלַת
  chosen: burnt offering
  alternatives:
  - ascending offering
  lexicon: HALOT
  rationale: Standard cultic term for an offering wholly burned up. 'Burnt offering' is the clearest established English equivalent; 'ascending offering' reflects etymology but is less natural in English.
- source_word: תָּמִיד
  chosen: regular
  alternatives:
  - continual
  - daily
  lexicon: HALOT
  rationale: In sacrificial contexts this denotes the ongoing regularity of the offering. 'Regular' is natural modern English and fits the repeated daily pattern without implying uninterrupted action as strongly as 'continual' might.
- source_word: הָעֲשֻׂיָה
  chosen: established
  alternatives:
  - made
  - offered
  - prepared
  lexicon: HALOT
  rationale: The passive participle literally means 'made/done.' In context, referring back to the institution of this offering at Sinai, 'established' best conveys that this is the offering set in place there, not merely one physically manufactured there.
- source_word: בְּהַר סִינַי
  chosen: at Mount Sinai
  alternatives:
  - on Mount Sinai
  - in Mount Sinai
  lexicon: HALOT
  rationale: Idiomatic English for the location of covenantal/instructional establishment. 'At Mount Sinai' reads naturally and fits the likely sense of institution there.
- source_word: לְרֵיחַ נִיחֹחַ
  chosen: as a pleasing aroma
  alternatives:
  - for a soothing aroma
  - for a sweet aroma
  lexicon: HALOT
  rationale: Conventional sacrificial idiom indicating acceptability before God. 'Pleasing aroma' communicates the idiom's sense in accessible English without over-literalizing the anthropomorphic imagery.
- source_word: אִשֶּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: Though traditionally rendered 'offering by fire,' the term in priestly sacrificial contexts can denote an offering presented in fire and functions idiomatically for a sacrificial food gift. 'Food offering' is clear modern English, while the fire element is already implicit in the burnt offering context.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD.' The preposition is retained as 'to' to mark the offering's direction toward Israel's covenant God.
