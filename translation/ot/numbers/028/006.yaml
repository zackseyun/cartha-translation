theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cultic idiom רֵיחַ נִיחֹחַ
  chosen_reading: pleasing aroma
  alternative_readings:
  - soothing aroma
  - sweet aroma
  rationale: The phrase should communicate divine acceptance of the sacrifice without importing a mechanistic theology of appeasement. 'Pleasing aroma' preserves the sacrificial idiom while remaining readable modern English.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
