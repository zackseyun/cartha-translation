id: NUM.28.28
reference: Numbers 28:28
source:
  edition: WLC
  text: וּ/מִנְחָתָ֔/ם סֹ֖לֶת בְּלוּלָ֣ה בַ/שָּׁ֑מֶן שְׁלֹשָׁ֤ה עֶשְׂרֹנִים֙ לַ/פָּ֣ר
    הָֽ/אֶחָ֔ד שְׁנֵי֙ עֶשְׂרֹנִ֔ים לָ/אַ֖יִל הָ/אֶחָֽד׃
translation:
  text: 'And their grain offering shall be fine flour mixed with oil: three-tenths
    for the one bull, and two-tenths for the one ram.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'three tenth-measures' and 'two tenth-measures'; in this sacrificial
      context these are commonly understood as tenths of an ephah.
    reason: cultural_note
lexical_decisions:
- source_word: וּמִנְחָתָם
  chosen: And their grain offering shall be
  alternatives:
  - and their offering
  - and their tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes a grain offering rather
    than a generic gift. The prefixed conjunction is rendered 'And,' and the verbless
    Hebrew is supplied with 'shall be' for natural English.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - flour of fine quality
  lexicon: HALOT
  rationale: סֹלֶת is the standard sacrificial ingredient 'fine flour'; this is the
    conventional and accurate cultic rendering.
- source_word: בְּלוּלָה בַשָּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  - moistened with oil
  lexicon: HALOT
  rationale: The passive participle plus preposition indicates flour prepared by mixing
    with oil. 'Mixed with oil' is clear modern English while preserving the ritual
    sense.
- source_word: שְׁלֹשָׁה עֶשְׂרֹנִים
  chosen: three-tenths
  alternatives:
  - three tenth-measures
  - three tenths of an ephah
  lexicon: HALOT
  rationale: עִשָּׂרוֹן refers to a tenth measure, conventionally a tenth of an ephah
    in offering laws. English translations often shorten this to 'three-tenths' in
    this context; the unit is understood from the sacrificial legislation.
- source_word: לַפָּר הָאֶחָד
  chosen: for the one bull
  alternatives:
  - for one bull
  - for the single bull
  lexicon: HALOT
  rationale: פַּר is a bull from the herd. The article plus אֶחָד is retained as 'the
    one bull,' reflecting the Hebrew specificity in the prescribed count.
- source_word: שְׁנֵי עֶשְׂרֹנִים
  chosen: two-tenths
  alternatives:
  - two tenth-measures
  - two tenths of an ephah
  lexicon: HALOT
  rationale: As above, the measure is a pair of tenth-units used in grain-offering
    prescriptions. 'Two-tenths' is concise and idiomatic.
- source_word: לָאַיִל הָאֶחָד
  chosen: for the one ram
  alternatives:
  - for one ram
  - for the single ram
  lexicon: HALOT
  rationale: אַיִל is 'ram.' The article plus numeral is mirrored with 'the one ram'
    to preserve the formal structure of the prescription.
