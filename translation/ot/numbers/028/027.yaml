id: NUM.28.27
reference: Numbers 28:27
source:
  edition: WLC
  text: וְ/הִקְרַבְתֶּ֨ם עוֹלָ֜ה לְ/רֵ֤יחַ נִיחֹ֨חַ֙ לַֽ/יהוָ֔ה פָּרִ֧ים בְּנֵי בָקָ֛ר שְׁנַ֖יִם אַ֣יִל אֶחָ֑ד שִׁבְעָ֥ה כְבָשִׂ֖ים בְּנֵ֥י שָׁנָֽה־׃
translation:
  text: 'And you shall present a burnt offering as a pleasing aroma to Yahweh: two bulls from the herd, one ram, and seven male lambs a year old.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a soothing aroma.' The Hebrew sacrificial formula לְרֵיחַ נִיחֹחַ can also be rendered 'for a pleasing/soothing aroma.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתֶּם
  chosen: you shall present
  alternatives:
  - you shall offer
  - you shall bring near
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial context commonly means to present or offer an offering. 'Present' preserves the ritual sense without sounding overly technical; 'offer' is also viable.
- source_word: עוֹלָה
  chosen: a burnt offering
  alternatives:
  - an ascending offering
  lexicon: HALOT
  rationale: Standard sacrificial term for the whole burnt offering. 'Ascending offering' reflects etymology but is not standard English and would obscure the cultic category.
- source_word: לְרֵיחַ נִיחֹחַ
  chosen: as a pleasing aroma
  alternatives:
  - for a soothing aroma
  - for a sweet aroma
  lexicon: HALOT
  rationale: Idiomatic sacrificial formula indicating the acceptability of the offering before God. 'Pleasing aroma' is clear modern English and avoids implying literal divine olfaction alone.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: פָּרִים בְּנֵי בָקָר
  chosen: two bulls from the herd
  alternatives:
  - two young bulls
  - two bulls, sons of cattle
  lexicon: HALOT
  rationale: The phrase denotes bovines of the herd; 'bulls from the herd' is natural English and preserves the livestock classification. 'Young bulls' is possible in sacrificial contexts but the age nuance is not explicit here.
- source_word: אַיִל אֶחָד
  chosen: one ram
  lexicon: HALOT
  rationale: Straightforward rendering of the singular sacrificial animal.
- source_word: שִׁבְעָה כְבָשִׂים
  chosen: seven male lambs
  alternatives:
  - seven lambs
  lexicon: HALOT
  rationale: כְבָשִׂים refers specifically to male lambs, so 'male' is retained for gender accuracy.
- source_word: בְּנֵי שָׁנָה
  chosen: a year old
  alternatives:
  - one year old
  - in their first year
  lexicon: HALOT
  rationale: Standard age designation for sacrificial animals. 'A year old' is idiomatic and sufficiently precise in English.
