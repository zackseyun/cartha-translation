id: NUM.28.13
reference: Numbers 28:13
source:
  edition: WLC
  text: וְ/עִשָּׂרֹ֣ן עִשָּׂר֗וֹן סֹ֤לֶת מִנְחָה֙ בְּלוּלָ֣ה בַ/שֶּׁ֔מֶן לַ/כֶּ֖בֶשׂ הָ/אֶחָ֑ד עֹלָה֙ רֵ֣יחַ נִיחֹ֔חַ אִשֶּׁ֖ה לַ/יהוָֽה׃
translation:
  text: and a tenth of an ephah of fine flour as a grain offering mixed with oil for each lamb, as a burnt offering, a pleasing aroma, a food offering to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering by fire' (for 'a food offering').
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעִשָּׂרֹן עִשָּׂרוֹן
  chosen: and a tenth of an ephah
  alternatives:
  - and one-tenth
  - and a tenth part
  lexicon: HALOT
  rationale: The doubled construction literally expresses 'a tenth of a tenth-measure'; in sacrificial contexts this idiom denotes a tenth of an ephah. Supplying 'of an ephah' makes the measure intelligible in English while staying close to the Hebrew sense.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: Standard sacrificial term for refined flour; 'fine flour' is the clearest natural English equivalent.
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - tribute offering
  lexicon: HALOT
  rationale: In cultic context this refers specifically to the cereal/grain offering, not a generic gift. 'Grain offering' is the established and precise rendering.
- source_word: בְּלוּלָה בַּשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: The participial form describes the flour offering as combined with oil. 'Mixed with oil' is clear modern English.
- source_word: לַכֶּבֶשׂ הָאֶחָד
  chosen: for each one lamb
  alternatives:
  - for the one lamb
  - for each lamb
  lexicon: HALOT
  rationale: Within the sequence of prescribed offerings, the phrase specifies the amount accompanying each individual lamb. 'For each one lamb' preserves the distributive force, though slightly wooden, and avoids implying only a single lamb total.
- source_word: עֹלָה
  chosen: a burnt offering
  alternatives:
  - burnt offering
  lexicon: HALOT
  rationale: Technical sacrificial term for an offering wholly burned up. The appositional English reflects the Hebrew nominal sequence.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet aroma
  lexicon: HALOT
  rationale: This fixed sacrificial expression denotes acceptability before God, not divine olfactory pleasure in a crude sense. 'Pleasing aroma' is idiomatic and widely understandable.
- source_word: אִשֶּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: The term refers to an offering made by fire. 'Food offering' is a common contextual rendering in modern translations because the offering ascends in smoke to God; however, the more literal 'offering by fire' remains a viable alternative and is preserved in a footnote.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD' rather than transliterated.
