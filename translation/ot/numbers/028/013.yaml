theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cultic term אִשֶּׁה
  chosen_reading: food offering
  alternative_readings:
  - offering by fire
  - fire offering
  rationale: The Hebrew term is sacrificial and fire-related. 'Food offering' communicates the cultic category in readable English, but because 'offering by fire' is more formally literal and common in translation tradition, it is preserved in a footnote for auditability.
