id: NUM.28.18
reference: Numbers 28:18
source:
  edition: WLC
  text: בַּ/יּ֥וֹם הָ/רִאשׁ֖וֹן מִקְרָא קֹ֑דֶשׁ כָּל מְלֶ֥אכֶת עֲבֹדָ֖ה לֹ֥א תַעֲשֽׂוּ־־׃
translation:
  text: On the first day there shall be a holy convocation; you shall do no laborious
    work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sacred assembly.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'no work of labor/service'; that is, no ordinary occupational labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הָרִאשׁוֹן
  chosen: On the first day
  alternatives:
  - On day one
  - On the first day of the feast
  lexicon: HALOT
  rationale: Temporal prepositional phrase with definite article and ordinal; the
    straightforward temporal rendering is best. 'Of the feast' is contextually true
    from the surrounding passage but not explicit in this verse, so it is not added.
- source_word: מִקְרָא קֹדֶשׁ
  chosen: a holy convocation
  alternatives:
  - a sacred assembly
  - a holy assembly
  lexicon: HALOT
  rationale: This fixed cultic expression commonly denotes an officially summoned
    sacred gathering. 'Holy convocation' preserves the formal, liturgical sense while
    remaining intelligible; 'sacred assembly' is possible but slightly less transparent
    to the summons nuance in מִקְרָא.
- source_word: כָּל
  chosen: 'no'
  alternatives:
  - any
  - all
  lexicon: HALOT
  rationale: In the construction כָּל ... לֹא with the following noun phrase, idiomatic
    English expresses the prohibition as 'no ...' rather than a wooden 'all ... not.'
    This preserves the totalizing force naturally.
- source_word: מְלֶאכֶת עֲבֹדָה
  chosen: laborious work
  alternatives:
  - occupational work
  - servile work
  - regular work
  lexicon: HALOT
  rationale: The phrase refers to ordinary labor/service work prohibited on festival
    days, not absolutely every action. 'Laborious work' captures the sense of customary
    productive labor without the archaic overtones of 'servile work.' 'Regular work'
    is possible but slightly interpretive.
- source_word: לֹא תַעֲשׂוּ
  chosen: you shall do no
  alternatives:
  - you must not do
  - do not do
  lexicon: HALOT
  rationale: Second person plural imperfect in legal/instructional context is well
    rendered with English 'shall' for solemn prescription. This preserves the directive
    force and addresses the community corporately.
