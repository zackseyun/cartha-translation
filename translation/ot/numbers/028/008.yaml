id: NUM.28.8
reference: Numbers 28:8
source:
  edition: WLC
  text: וְ/אֵת֙ הַ/כֶּ֣בֶשׂ הַ/שֵּׁנִ֔י תַּעֲשֶׂ֖ה בֵּ֣ין הָֽ/עַרְבָּ֑יִם כְּ/מִנְחַ֨ת
    הַ/בֹּ֤קֶר וּ/כְ/נִסְכּ/וֹ֙ תַּעֲשֶׂ֔ה אִשֵּׁ֛ה רֵ֥יחַ נִיחֹ֖חַ לַ/יהוָֽה׃פ
translation:
  text: And you shall offer the second lamb between the evenings; like the morning
    grain offering and its drink offering, you shall offer it as a food offering,
    a pleasing aroma to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'between the evenings,' a traditional expression often understood
      as 'at twilight.'
    reason: lexical_alternative
  - marker: b
    text: Or 'an offering by fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֶּבֶשׂ הַשֵּׁנִי
  chosen: the second lamb
  alternatives:
  - the second sheep
  lexicon: HALOT
  rationale: כֶּבֶשׂ in sacrificial contexts commonly refers to a lamb. 'Second' is
    retained formally to match the sequence with the morning offering.
- source_word: תַּעֲשֶׂה
  chosen: you shall offer
  alternatives:
  - you shall make
  - you shall prepare
  lexicon: HALOT
  rationale: Though עשה is literally 'do/make,' in sacrificial instructions English
    idiom is best conveyed by 'offer,' since the object is the sacrificial animal
    and associated offerings.
- source_word: בֵּין הָעַרְבָּיִם
  chosen: between the evenings
  alternatives:
  - at twilight
  - between dusk and dark
  lexicon: HALOT
  rationale: The Hebrew idiom is preserved relatively formally as 'between the evenings,'
    a traditional and textually transparent rendering. Because the exact temporal
    nuance is debated, a more interpretive gloss is preserved in a footnote rather
    than placed in the main text.
- source_word: כְּמִנְחַת הַבֹּקֶר
  chosen: like the morning grain offering
  alternatives:
  - like the morning offering
  lexicon: HALOT
  rationale: מִנְחָה in priestly sacrificial contexts specifically denotes the grain
    offering, not a generic gift. 'Morning' identifies the corresponding daily offering.
- source_word: וּכְנִסְכּוֹ
  chosen: and its drink offering
  alternatives:
  - and its libation
  lexicon: HALOT
  rationale: נֶסֶךְ refers to the poured-out accompanying offering. 'Drink offering'
    is standard accessible English; 'libation' is a viable but less common alternative.
- source_word: אִשֵּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: The term denotes an offering made by fire. 'Food offering' is a common
    contextual rendering in modern translations, but because the fire element is lexically
    significant, the alternative is preserved in a footnote.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet-smelling aroma
  lexicon: HALOT
  rationale: This sacrificial formula communicates divine acceptance of the offering.
    'Pleasing aroma' is natural modern English while preserving the metaphor.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' in keeping with
    the project's default treatment of the divine name.
