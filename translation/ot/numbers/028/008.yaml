theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the covenant name as 'the LORD' rather
    than transliterating it, following the stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Temporal idiom בֵּין הָעַרְבָּיִם
  chosen_reading: between the evenings
  alternative_readings:
  - at twilight
  rationale: The Hebrew expression is somewhat debated in precise reference. To preserve
    interpretive openness, the more literal rendering is kept in the main text and
    a more idiomatic alternative is footnoted.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
