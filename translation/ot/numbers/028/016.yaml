id: NUM.28.16
reference: Numbers 28:16
source:
  edition: WLC
  text: וּ/בַ/חֹ֣דֶשׁ הָ/רִאשׁ֗וֹן בְּ/אַרְבָּעָ֥ה עָשָׂ֛ר י֖וֹם לַ/חֹ֑דֶשׁ פֶּ֖סַח לַ/יהוָֽה׃
translation:
  text: In the first month, on the fourteenth day of the month, is the Passover of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the LORD.' The Hebrew preposition can express dedication or belonging.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/חֹדֶשׁ הָ/רִאשׁוֹן
  chosen: In the first month
  alternatives:
  - And in the first month
  - Now in the first month
  lexicon: HALOT
  rationale: The prefixed conjunction on וּ may be rendered simply by starting the sentence naturally in English; 'In the first month' preserves the temporal setting without forcing an awkward initial 'And.'
- source_word: בְּ/אַרְבָּעָה עָשָׂר יוֹם לַ/חֹדֶשׁ
  chosen: on the fourteenth day of the month
  alternatives:
  - on the fourteenth day of this month
  - on day fourteen of the month
  lexicon: HALOT
  rationale: This is the standard Hebrew date formula. 'On the fourteenth day of the month' is idiomatic English and closely reflects the Hebrew construction.
- source_word: פֶּסַח
  chosen: Passover
  alternatives:
  - Passover offering
  - Pesach
  lexicon: HALOT
  rationale: '''Passover'' is the established and accurate English rendering for פֶּסַח in calendrical and cultic contexts. ''Passover offering'' would over-specify, since the verse names the festival/observance rather than explicitly the sacrifice alone.'
- source_word: לַ/יהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - belongs to the LORD
  lexicon: HALOT
  rationale: The lamed marks dedication or relation. 'To the LORD' preserves the concise Hebrew sense that the Passover is directed/dedicated to YHWH. Per doctrine, יהוה is rendered 'the LORD,' not transliterated.
