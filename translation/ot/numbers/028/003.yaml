id: NUM.28.3
reference: Numbers 28:3
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֣ לָ/הֶ֔ם זֶ֚ה הָֽ/אִשֶּׁ֔ה אֲשֶׁ֥ר תַּקְרִ֖יבוּ לַ/יהוָ֑ה כְּבָשִׂ֨ים בְּנֵֽי שָׁנָ֧ה תְמִימִ֛ם שְׁנַ֥יִם לַ/יּ֖וֹם עֹלָ֥ה תָמִֽיד־׃
translation:
  text: 'And you shall say to them, ‘This is the food offering that you shall present to Yahweh: two male lambs a year old, without blemish, each day, as a regular burnt offering.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the offering by fire” or “the fire offering.”
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִשֶּׁה
  chosen: the food offering
  alternatives:
  - the offering by fire
  - the fire offering
  lexicon: HALOT
  rationale: The term denotes an offering made by fire, but in priestly sacrificial contexts a more natural English rendering is 'food offering,' which reflects its cultic sense without implying the offering literally feeds God in a crude sense. 'Offering by fire' is more formally literal and worth preserving as an alternative.
- source_word: תַּקְרִיבוּ
  chosen: you shall present
  alternatives:
  - you shall bring near
  - you shall offer
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial contexts commonly means to present or offer. 'Present' preserves the ritual nuance of bringing before the LORD while remaining idiomatic English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: כְּבָשִׂים
  chosen: male lambs
  alternatives:
  - lambs
  - young rams
  lexicon: HALOT
  rationale: The noun refers to lambs; 'male lambs' makes explicit the masculine form and matches sacrificial specificity. 'Young rams' is less likely here given the age designation 'sons of a year.'
- source_word: בְּנֵי שָׁנָה
  chosen: a year old
  alternatives:
  - sons of a year
  - yearling
  lexicon: HALOT
  rationale: This idiom means one year old. 'A year old' is clear modern English; 'yearling' is possible but slightly less transparent.
- source_word: תְמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial legislation this term denotes animals free from defect. 'Without blemish' is the standard clear rendering and preserves cultic precision.
- source_word: לַיּוֹם
  chosen: day by day
  alternatives:
  - per day
  - for the day
  - daily
  lexicon: HALOT
  rationale: 'With the numeral and following phrase, the sense is distributive: two each day. ''Day by day'' is idiomatic and preserves the repeated daily requirement.'
- source_word: עֹלָה
  chosen: burnt offering
  alternatives:
  - ascending offering
  lexicon: HALOT
  rationale: The established cultic meaning is 'burnt offering.' 'Ascending offering' reflects etymology but is less idiomatic in English and less immediately clear.
- source_word: תָמִיד
  chosen: regular
  alternatives:
  - continual
  - continually
  lexicon: HALOT
  rationale: In priestly contexts תמיד often marks the regular, ongoing nature of a rite. 'Regular' fits the daily sacrificial schedule naturally in English; 'continual' is more literal but can misleadingly suggest uninterrupted action.
