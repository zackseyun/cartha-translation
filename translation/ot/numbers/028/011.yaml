theological_decisions:
- issue: Rendering the temporal phrase for the monthly observance
  chosen_reading: At the beginnings of your months
  alternative_readings:
  - At your new moons
  rationale: The Hebrew idiom refers to the monthly new-moon occasion, but the more
    literal rendering preserves the source wording while allowing the cultic setting
    to remain visible. Because 'new moons' is a meaningful interpretive equivalent,
    it is preserved in a footnote rather than replacing the main text.
  doctrine_reference: Translation philosophy items 1, 3, and 5
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
