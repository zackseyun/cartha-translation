id: NUM.28.11
reference: Numbers 28:11
source:
  edition: WLC
  text: וּ/בְ/רָאשֵׁי֙ חָדְשֵׁי/כֶ֔ם תַּקְרִ֥יבוּ עֹלָ֖ה לַ/יהוָ֑ה פָּרִ֨ים בְּנֵֽי
    בָקָ֤ר שְׁנַ֨יִם֙ וְ/אַ֣יִל אֶחָ֔ד כְּבָשִׂ֧ים בְּנֵי שָׁנָ֛ה שִׁבְעָ֖ה תְּמִימִֽם־־׃
translation:
  text: 'At the beginnings of your months, you shall present a burnt offering to the
    LORD: two bulls from the herd, one ram, and seven male lambs a year old, without
    blemish.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''At the beginnings of your months''; that is, at the new-moon
      observances.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְרָאשֵׁי חָדְשֵׁיכֶם
  chosen: At the beginnings of your months
  alternatives:
  - At the start of each month
  - At your new moons
  lexicon: HALOT
  rationale: Literally 'and/in the heads of your months,' an idiom for the beginning
    of each month/new-moon observance. 'Beginnings of your months' preserves the Hebrew
    structure while remaining intelligible. 'New moons' is contextually valid but
    less directly lexical here, so it is preserved in a footnote as an alternative.
- source_word: תַּקְרִיבוּ
  chosen: you shall present
  alternatives:
  - you shall bring near
  - you shall offer
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial contexts commonly means to present/offer.
    'Present' keeps the cultic sense of bringing an offering before God without sounding
    overly wooden.
- source_word: עֹלָה
  chosen: a burnt offering
  alternatives:
  - an ascending offering
  lexicon: HALOT
  rationale: Standard sacrificial term for the whole burnt offering. 'Burnt offering'
    is the clearest established English equivalent and accurately reflects the ritual
    category.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
    The preposition ל marks dedication/direction of the offering to YHWH.
- source_word: פָּרִים בְּנֵי בָקָר
  chosen: two bulls from the herd
  alternatives:
  - two young bulls
  - two bulls, sons of cattle
  lexicon: HALOT
  rationale: The phrase denotes bulls of the cattle herd. 'From the herd' is natural
    English and preserves the distinction from other sacrificial animals. 'Young bulls'
    is possible in some contexts but not required by the Hebrew here.
- source_word: וְאַיִל אֶחָד
  chosen: one ram
  lexicon: HALOT
  rationale: Straightforward sacrificial animal term with numeral.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה שִׁבְעָה
  chosen: seven male lambs a year old
  alternatives:
  - seven lambs in their first year
  - seven year-old lambs
  lexicon: HALOT
  rationale: כבשים are male lambs; 'a year old' reflects the idiom 'sons of a year,'
    meaning in their first year/about one year old. Including 'male' preserves the
    lexical specificity of the Hebrew term.
- source_word: תְּמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial contexts this adjective denotes animals free from defect.
    'Without blemish' is idiomatic and precise in English.
