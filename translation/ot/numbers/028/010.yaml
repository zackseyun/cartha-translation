id: NUM.28.10
reference: Numbers 28:10
source:
  edition: WLC
  text: עֹלַ֥ת שַׁבַּ֖ת בְּ/שַׁבַּתּ֑/וֹ עַל עֹלַ֥ת הַ/תָּמִ֖יד וְ/נִסְכָּֽ/הּ־׃ס
translation:
  text: This is the burnt offering of each Sabbath, on each Sabbath, in addition to
    the regular burnt offering and its drink offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'besides the continual burnt offering and its libation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹלַת
  chosen: burnt offering
  alternatives:
  - ascending offering
  lexicon: HALOT
  rationale: The standard sacrificial term עֹלָה refers to the whole burnt offering.
    'Burnt offering' is the clearest established English equivalent and fits the cultic
    context.
- source_word: שַׁבַּת
  chosen: Sabbath
  alternatives:
  - week
  - rest day
  lexicon: HALOT
  rationale: In this sacrificial calendar context, שַׁבָּת clearly denotes the Sabbath
    day, not a week in general.
- source_word: בְּשַׁבַּתּוֹ
  chosen: on each Sabbath
  alternatives:
  - on its Sabbath
  - on his Sabbath
  - on every Sabbath
  lexicon: HALOT
  rationale: 'The preposition ב plus שַׁבָּת with 3ms suffix is idiomatically distributive
    here: the offering belongs to each occurrence of the Sabbath. ''On each Sabbath''
    communicates the recurring sense naturally in English.'
- source_word: עַל
  chosen: in addition to
  alternatives:
  - besides
  - upon
  - over
  lexicon: HALOT
  rationale: In sacrificial instructions עַל commonly marks addition or accompaniment
    relative to another offering. 'In addition to' best conveys the procedural relationship.
- source_word: הַתָּמִיד
  chosen: the regular
  alternatives:
  - the continual
  - the continual offering
  - the daily
  lexicon: HALOT
  rationale: תָּמִיד means continual/regular. Because עֹלַת precedes it, the phrase
    is best rendered 'the regular burnt offering.' 'Regular' is natural modern English
    while preserving the ongoing prescribed nature of the offering.
- source_word: וְנִסְכָּהּ
  chosen: and its drink offering
  alternatives:
  - and its libation
  lexicon: HALOT
  rationale: נֶסֶךְ denotes the accompanying poured-out offering. 'Drink offering'
    is the standard accessible English rendering; the 3fs suffix refers back to the
    burnt offering.
