id: NUM.28.21
reference: Numbers 28:21
source:
  edition: WLC
  text: עִשָּׂר֤וֹן עִשָּׂרוֹן֙ תַּעֲשֶׂ֔ה לַ/כֶּ֖בֶשׂ הָ/אֶחָ֑ד לְ/שִׁבְעַ֖ת הַ/כְּבָשִֽׂים׃
translation:
  text: You shall prepare a tenth of an ephah for each lamb, for the seven lambs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew literally, ''a tenth, a tenth you shall make for the one lamb, for
      the seven lambs.'' The repetition expresses a distributive sense: one tenth
      for each lamb.'
    reason: lexical_alternative
  - marker: b
    text: That is, a tenth of an ephah, the standard grain-offering measure in this
      context.
    reason: cultural_note
lexical_decisions:
- source_word: עִשָּׂר֤וֹן עִשָּׂרוֹן֙
  chosen: a tenth of an ephah
  alternatives:
  - a tenth part
  - one-tenth measure
  lexicon: HALOT
  rationale: 'The repeated singular noun functions distributively: ''a tenth [for
    each one].'' In priestly sacrificial contexts עִשָּׂרוֹן is the standard grain-offering
    measure, conventionally understood as one-tenth of an ephah. Supplying ''of an
    ephah'' makes the measure clear in English and matches the cultic usage in the
    immediate context.'
- source_word: תַּעֲשֶׂה
  chosen: You shall prepare
  alternatives:
  - you shall make
  - you shall offer
  lexicon: HALOT
  rationale: עשה literally means 'do/make,' but in sacrificial instructions idiomatic
    English prefers 'prepare' for the prescribed grain portion. 'Offer' would over-interpret,
    since the verb itself is broader than the act of presentation.
- source_word: לַכֶּבֶשׂ הָאֶחָד
  chosen: for each lamb
  alternatives:
  - for the one lamb
  - for one lamb
  lexicon: HALOT
  rationale: The singular with the article and numeral after the distributive repetition
    indicates allocation per animal. 'For each lamb' communicates the distributive
    force naturally in English better than the more wooden 'for the one lamb.'
- source_word: לְשִׁבְעַת הַכְּבָשִׂים
  chosen: for the seven lambs
  alternatives:
  - for all seven lambs
  lexicon: HALOT
  rationale: This phrase totals the distributive instruction across the full set of
    sacrificial animals. 'For the seven lambs' preserves the Hebrew wording while
    fitting the English sentence structure.
