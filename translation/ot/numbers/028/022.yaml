id: NUM.28.22
reference: Numbers 28:22
source:
  edition: WLC
  text: וּ/שְׂעִ֥יר חַטָּ֖את אֶחָ֑ד לְ/כַפֵּ֖ר עֲלֵי/כֶֽם׃
translation:
  text: and one male goat for a sin offering, to make atonement for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for purification from sin.' The Hebrew term translated 'sin offering'
      can, in sacrificial contexts, also be understood as 'purification offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׂעִיר
  chosen: and one male goat
  alternatives:
  - and a goat
  - and one goat
  lexicon: HALOT
  rationale: שָׂעִיר denotes a he-goat/male goat. The prefixed conjunction ו is carried
    as 'and.' 'Male goat' is more precise than simply 'goat,' and 'one' is included
    with the phrase in natural English order.
- source_word: חַטָּאת
  chosen: sin offering
  alternatives:
  - sin
  - purification offering
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly refers to the offering rather
    than the abstract concept of sin. 'Sin offering' is the standard clear rendering.
    'Purification offering' is a defensible alternative in some scholarship, but here
    the traditional cultic sense is best preserved in the main text.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: The numeral specifies the quantity of the sacrificial animal and should
    be retained explicitly.
- source_word: לְ/כַפֵּר
  chosen: to make atonement
  alternatives:
  - to atone
  - to make expiation
  lexicon: HALOT
  rationale: כפר in priestly sacrificial context is conventionally and accurately
    rendered 'make atonement.' This preserves the cultic-theological force without
    importing a narrower doctrinal theory.
- source_word: עֲלֵי/כֶם
  chosen: for you
  alternatives:
  - on your behalf
  - for yourselves
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix in this context indicates
    benefit/on behalf of the people. 'For you' is natural modern English and fits
    the sacrificial formula.
