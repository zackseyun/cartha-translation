theological_decisions:
- issue: Rendering of sacrificial כפר language
  chosen_reading: to make atonement for you
  alternative_readings:
  - to make expiation for you
  - to atone for you
  rationale: The verse describes a prescribed sacrificial act in Israel's cultus.
    'Make atonement' is broad enough to preserve the theological weight of the Hebrew
    without over-specifying the mechanism. This aligns with the project's aim to preserve
    theological tension rather than resolve it beyond the text.
  doctrine_reference: Translation philosophy §3, §6
