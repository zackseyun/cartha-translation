id: NUM.28.12
reference: Numbers 28:12
source:
  edition: WLC
  text: וּ/שְׁלֹשָׁ֣ה עֶשְׂרֹנִ֗ים סֹ֤לֶת מִנְחָה֙ בְּלוּלָ֣ה בַ/שֶּׁ֔מֶן לַ/פָּ֖ר
    הָ/אֶחָ֑ד וּ/שְׁנֵ֣י עֶשְׂרֹנִ֗ים סֹ֤לֶת מִנְחָה֙ בְּלוּלָ֣ה בַ/שֶּׁ֔מֶן לָ/אַ֖יִל
    הָֽ/אֶחָֽד׃
translation:
  text: and three-tenths of an ephah of fine flour as a grain offering, mixed with
    oil, for the one bull, and two-tenths of an ephah of fine flour as a grain offering,
    mixed with oil, for the one ram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'three tenths' and 'two tenths'; the measure is understood as tenths
      of an ephah.
    reason: cultural_note
  - marker: b
    text: Or 'mingled with oil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁלֹשָׁה עֶשְׂרֹנִים
  chosen: and three-tenths of an ephah
  alternatives:
  - and three tenth-parts
  - and three omers
  lexicon: HALOT
  rationale: עֶשְׂרוֹן denotes a tenth measure, conventionally understood as a tenth
    of an ephah in sacrificial legislation. Rendering the measure explicitly in English
    avoids obscurity while preserving the concrete unit.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: Standard cultic term for refined flour used in offerings; 'fine flour'
    is the clearest established English equivalent.
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - tribute offering
  lexicon: HALOT
  rationale: In Levitical sacrificial context, מִנְחָה refers specifically to the
    cereal/grain offering rather than a generic gift or tribute. 'Grain offering'
    is contextually precise and readable.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  lexicon: HALOT
  rationale: The participial phrase describes the preparation of the grain offering.
    'Mixed with oil' is natural modern English and accurately reflects the Hebrew.
- source_word: לַפָּר הָאֶחָד
  chosen: for the one bull
  alternatives:
  - for one bull
  - for the first bull
  lexicon: HALOT
  rationale: The article plus אֶחָד is best taken here as specifying each individual
    sacrificial animal in sequence, not ordinal 'first.' 'The one bull' preserves
    the Hebrew form, though idiomatically it means each single bull in the offering
    prescription.
- source_word: וּ/שְׁנֵי עֶשְׂרֹנִים
  chosen: and two-tenths of an ephah
  alternatives:
  - and two tenth-parts
  lexicon: HALOT
  rationale: As above, עֶשְׂרוֹן is rendered by its understood measure in context
    for clarity.
- source_word: לָאַיִל הָאֶחָד
  chosen: for the one ram
  alternatives:
  - for one ram
  - for the first ram
  lexicon: HALOT
  rationale: Parallel to 'for the one bull'; preserves the distributive/specific force
    of the Hebrew without introducing an unwarranted ordinal sense.
