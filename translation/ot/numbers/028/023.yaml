id: NUM.28.23
reference: Numbers 28:23
source:
  edition: WLC
  text: מִ/לְּ/בַד֙ עֹלַ֣ת הַ/בֹּ֔קֶר אֲשֶׁ֖ר לְ/עֹלַ֣ת הַ/תָּמִ֑יד תַּעֲשׂ֖וּ אֶת
    אֵֽלֶּה־׃
translation:
  text: Besides the morning burnt offering, which is for the regular burnt offering,
    you shall offer these.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in addition to the continual burnt offering'; the Hebrew relation between
      'the morning burnt offering' and 'the regular burnt offering' can be taken slightly
      differently, though the overall instruction is that these sacrifices are offered
      besides the standing daily offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּבַד
  chosen: Besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: The prepositional expression marks addition/exclusion relative to what
    follows. 'Besides' is concise, natural English in sacrificial instructions and
    fits the sense 'in addition to' without overexpansion.
- source_word: עֹלַת
  chosen: burnt offering
  alternatives:
  - ascending offering
  lexicon: HALOT
  rationale: The standard cultic term for עֹלָה is 'burnt offering.' While the root
    relates to ascent, 'burnt offering' is the established and accurate English equivalent
    in Levitical/Numbers sacrificial contexts.
- source_word: הַבֹּקֶר
  chosen: the morning
  alternatives:
  - morning
  lexicon: HALOT
  rationale: With the article, the phrase specifies the morning offering. English
    idiom naturally renders this as 'the morning burnt offering.'
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces a relative clause modifying 'the morning burnt offering.'
    'Which' reads smoothly in formal instruction.
- source_word: לְעֹלַת הַתָּמִיד
  chosen: is for the regular burnt offering
  alternatives:
  - belongs to the continual burnt offering
  - is in addition to the continual burnt offering
  - for the daily burnt offering
  lexicon: HALOT
  rationale: 'The לְ here is best taken in relation/apposition: the morning burnt
    offering is the one associated with the regular/continual offering. ''Regular''
    communicates תָּמִיד clearly in modern English; ''continual'' is possible but
    less natural here. ''Daily'' is interpretive and narrower than the Hebrew''s broader
    sense of regular continuity.'
- source_word: תַּעֲשׂוּ
  chosen: you shall offer
  alternatives:
  - you shall make
  - you shall do
  lexicon: HALOT
  rationale: Although the verb is literally 'do/make,' in sacrificial contexts English
    idiom requires 'offer' to express the prescribed cultic action accurately.
- source_word: אֶת אֵלֶּה
  chosen: these
  alternatives:
  - these things
  lexicon: HALOT
  rationale: The object marker plus demonstrative points to the offerings just specified.
    'These' is sufficient and idiomatic; 'these things' is more wooden without adding
    meaning.
