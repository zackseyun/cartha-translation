id: NUM.28.26
reference: Numbers 28:26
source:
  edition: WLC
  text: וּ/בְ/י֣וֹם הַ/בִּכּוּרִ֗ים בְּ/הַקְרִ֨יבְ/כֶ֜ם מִנְחָ֤ה חֲדָשָׁה֙ לַֽ/יהוָ֔ה בְּ/שָׁבֻעֹ֖תֵי/כֶ֑ם מִֽקְרָא קֹ֨דֶשׁ֙ יִהְיֶ֣ה לָ/כֶ֔ם כָּל מְלֶ֥אכֶת עֲבֹדָ֖ה לֹ֥א תַעֲשֽׂוּ־־׃
translation:
  text: And on the day of the firstfruits, when you present a new grain offering to Yahweh at your Feast of Weeks, you shall have a holy convocation. You shall do no ordinary work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a holy assembly.' The Hebrew phrase is a technical term for a sacred gathering summoned for worship.
    reason: lexical_alternative
  - marker: b
    text: Or 'no laborious work' or 'no occupational work.' The phrase refers to ordinary work associated with daily labor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְיוֹם
  chosen: And on the day
  alternatives:
  - And in the day
  - Now on the day
  lexicon: HALOT
  rationale: Temporal prepositional phrase introducing the occasion; 'on the day' is natural English and preserves the formal sense.
- source_word: הַבִּכּוּרִים
  chosen: of the firstfruits
  alternatives:
  - of firstfruits
  - of the earliest produce
  lexicon: HALOT
  rationale: Refers to the festival day associated with firstfruits. 'Firstfruits' is the established and accurate cultic term in English.
- source_word: בְּהַקְרִיבְכֶם
  chosen: when you present
  alternatives:
  - when you bring near
  - in your presenting
  lexicon: HALOT
  rationale: Infinitive construct with prefixed preposition marks contemporaneous time. The verb קרב in sacrificial contexts means to present/offer; 'present' is clear modern English without losing sacrificial force.
- source_word: מִנְחָה חֲדָשָׁה
  chosen: a new grain offering
  alternatives:
  - a new offering
  - a fresh grain offering
  lexicon: HALOT
  rationale: מִנְחָה in priestly sacrificial context commonly denotes a grain offering rather than a generic gift. 'New' modifies the offering associated with the new produce.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: בְּשָׁבֻעֹתֵיכֶם
  chosen: at your Feast of Weeks
  alternatives:
  - at your weeks
  - during your Festival of Weeks
  - at your שבועות
  lexicon: HALOT
  rationale: The plural noun here refers to the festival known as Weeks/Shavuot. 'Feast of Weeks' communicates the calendrical festival rather than a literal sequence of weeks.
- source_word: מִקְרָא קֹדֶשׁ
  chosen: a holy convocation
  alternatives:
  - a sacred assembly
  - a holy assembly
  lexicon: HALOT
  rationale: Standard cultic phrase for a formally summoned sacred gathering. 'Holy convocation' preserves the technical liturgical sense; 'sacred assembly' is possible but slightly less precise to the idiom.
- source_word: יִהְיֶה לָכֶם
  chosen: you shall have
  alternatives:
  - there shall be for you
  - it shall be for you
  lexicon: HALOT
  rationale: Idiomatic English rendering of existential היה + ל phrase, while keeping the directive force.
- source_word: כָּל מְלֶאכֶת עֲבֹדָה
  chosen: ordinary work
  alternatives:
  - laborious work
  - occupational work
  - servile work
  lexicon: HALOT
  rationale: This priestly expression denotes regular occupational labor prohibited on festival days, not absolutely every activity. 'Ordinary work' is clear modern English and captures the contrast with sacred observance.
- source_word: לֹא תַעֲשׂוּ
  chosen: You shall do no
  alternatives:
  - you shall not do
  - do not do
  lexicon: HALOT
  rationale: Direct prohibition in second person plural. 'You shall do no...' fits the legal style of the verse in English.
