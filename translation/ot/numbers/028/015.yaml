theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering חַטָּאת in sacrificial context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew term can denote either sin or purification offering depending on context and translation philosophy. Here the traditional cultic rendering 'sin offering' is retained in the main text for clarity and continuity, while preserving the alternative in a footnote because it reflects a legitimate interpretive nuance.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
