id: NUM.28.15
reference: Numbers 28:15
source:
  edition: WLC
  text: וּ/שְׂעִ֨יר עִזִּ֥ים אֶחָ֛ד לְ/חַטָּ֖את לַ/יהוָ֑ה עַל עֹלַ֧ת הַ/תָּמִ֛יד יֵעָשֶׂ֖ה וְ/נִסְכּֽ/וֹ־׃ס
translation:
  text: And one male goat for a sin offering to Yahweh shall be offered besides the regular burnt offering and its drink offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a purification offering.' The Hebrew term חַטָּאת can denote the offering that deals with impurity as well as sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  chosen: male goat
  alternatives:
  - goat
  - kid of the goats
  - he-goat
  lexicon: HALOT
  rationale: The construct phrase denotes a male goat, commonly a buck-goat used in sacrificial contexts. 'Male goat' is clear modern English and preserves the animal's sex, which is specified in the Hebrew.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - a single
  lexicon: HALOT
  rationale: The numeral is retained explicitly because it is part of the sacrificial specification.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - for sin
  - as a purification offering
  lexicon: HALOT
  rationale: In sacrificial legislation חַטָּאת commonly refers to the sin/purification offering. 'Sin offering' is the most recognizable and sufficiently precise here; 'purification offering' is a viable scholarly alternative but less familiar.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' per doctrine. With sacrificial language, English idiom naturally uses 'to the LORD,' indicating dedication/presentation.
- source_word: עַל
  chosen: in addition to
  alternatives:
  - besides
  - upon
  - along with
  lexicon: HALOT
  rationale: In this cultic context עַל marks accompaniment or addition relative to the regular burnt offering, not spatial 'upon' in a literal sense. 'In addition to' communicates the ritual relationship clearly.
- source_word: עֹלַת הַתָּמִיד
  chosen: the regular burnt offering
  alternatives:
  - the continual burnt offering
  - the daily burnt offering
  lexicon: HALOT
  rationale: The phrase refers to the fixed, ongoing offering prescribed regularly. 'Regular burnt offering' is clear modern English and preserves the institutional sense of תָּמִיד without over-specifying 'daily' in the wording itself.
- source_word: יֵעָשֶׂה
  chosen: shall be offered
  alternatives:
  - shall be made
  - shall be prepared
  - shall be done
  lexicon: HALOT
  rationale: Although the verb is literally 'shall be done/made,' in sacrificial context English idiom requires 'shall be offered' to express the cultic action naturally and accurately.
- source_word: וְנִסְכּוֹ
  chosen: and its drink offering
  alternatives:
  - and its libation
  lexicon: HALOT
  rationale: נֶסֶךְ denotes the accompanying poured-out offering. 'Drink offering' is standard, accessible English; 'libation' is a valid but less common alternative.
