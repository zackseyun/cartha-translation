id: NUM.28.17
reference: Numbers 28:17
source:
  edition: WLC
  text: וּ/בַ/חֲמִשָּׁ֨ה עָשָׂ֥ר י֛וֹם לַ/חֹ֥דֶשׁ הַ/זֶּ֖ה חָ֑ג שִׁבְעַ֣ת יָמִ֔ים
    מַצּ֖וֹת יֵאָכֵֽל׃
translation:
  text: And on the fifteenth day of this month is a feast; for seven days unleavened
    bread shall be eaten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is a festival.' The Hebrew חָג can denote a sacred festival observance
      as well as a feast.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/חֲמִשָּׁה עָשָׂר יוֹם
  chosen: And on the fifteenth day
  alternatives:
  - And on the fifteenth day of
  - Now on the fifteenth day
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition together introduce a temporal
    phrase, literally 'and on the fifteen day.' English idiom requires 'the fifteenth
    day.'
- source_word: לַחֹדֶשׁ הַזֶּה
  chosen: of this month
  alternatives:
  - of this new moon/month
  lexicon: HALOT
  rationale: חֹדֶשׁ ordinarily means 'month' in calendrical contexts. 'This month'
    is the natural rendering here in a festival calendar instruction.
- source_word: חָג
  chosen: is a feast
  alternatives:
  - is a festival
  lexicon: HALOT
  rationale: חָג denotes a pilgrimage/festival feast. 'Feast' is concise and idiomatic
    here, while still conveying a sacred festival observance.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: The construct phrase modifies the feast duration. English reads most
    naturally with 'for seven days' to express the span of observance.
- source_word: מַצּוֹת
  chosen: unleavened bread
  alternatives:
  - unleavened bread cakes
  - matzot
  lexicon: HALOT
  rationale: מַצּוֹת refers to unleavened bread in the context of the Feast of Unleavened
    Bread. 'Unleavened bread' is the standard transparent English rendering.
- source_word: יֵאָכֵל
  chosen: shall be eaten
  alternatives:
  - is to be eaten
  - must be eaten
  lexicon: HALOT
  rationale: The Niphal imperfect is naturally rendered as a passive here. 'Shall
    be eaten' preserves the formal instruction without overstating modality beyond
    the Hebrew.
