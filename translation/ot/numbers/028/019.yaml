id: NUM.28.19
reference: Numbers 28:19
source:
  edition: WLC
  text: וְ/הִקְרַבְתֶּ֨ם אִשֶּׁ֤ה עֹלָה֙ לַֽ/יהוָ֔ה פָּרִ֧ים בְּנֵי בָקָ֛ר שְׁנַ֖יִם וְ/אַ֣יִל אֶחָ֑ד וְ/שִׁבְעָ֤ה כְבָשִׂים֙ בְּנֵ֣י שָׁנָ֔ה תְּמִימִ֖ם יִהְי֥וּ לָ/כֶֽם־׃
translation:
  text: 'And you shall present a food offering, a burnt offering to Yahweh: two bulls, one ram, and seven male lambs a year old; they shall be without blemish for you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering by fire.' The Hebrew term is a technical sacrificial word for an offering consumed in fire.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתֶּם
  chosen: you shall present
  alternatives:
  - you shall offer
  - you shall bring near
  lexicon: HALOT
  rationale: The Hifil of קרב in sacrificial contexts commonly means to present or offer an offering. 'Present' is natural English while preserving the cultic sense without over-paraphrase.
- source_word: אִשֶּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: Although traditionally rendered 'offering made by fire,' the term denotes an offering turned into smoke by fire and functions as a technical sacrificial term. 'Food offering' is a clear modern rendering used in many contexts for this noun, while the following 'burnt offering' specifies the type.
- source_word: עֹלָה
  chosen: a burnt offering
  alternatives:
  - an ascent offering
  lexicon: HALOT
  rationale: The established sacrificial term 'burnt offering' accurately conveys the offering wholly consumed on the altar. 'Ascent offering' is more etymologically transparent but less idiomatic in English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' The preposition ל marks dedication/direction of the offering.
- source_word: פָּרִים בְּנֵי בָקָר
  chosen: bulls from the herd
  alternatives:
  - young bulls
  - bulls, sons of cattle
  lexicon: HALOT
  rationale: The phrase literally means 'bulls, sons of cattle,' an idiom for bovines from the herd. 'Bulls from the herd' is natural and sufficiently formal. 'Young bulls' is possible but the age nuance is less explicit here than the species/classification.
- source_word: שְׁנַיִם
  chosen: two
  lexicon: HALOT
  rationale: Cardinal number specifying the quantity of bulls.
- source_word: וְאַיִל אֶחָד
  chosen: one ram
  lexicon: HALOT
  rationale: Standard rendering of אַיִל in sacrificial lists.
- source_word: וְשִׁבְעָה כְבָשִׂים
  chosen: and seven male lambs
  alternatives:
  - and seven lambs
  lexicon: HALOT
  rationale: כְבָשִׂים refers specifically to male lambs, so 'male' is retained for gender accuracy and sacrificial precision.
- source_word: בְּנֵי שָׁנָה
  chosen: a year old
  alternatives:
  - yearling
  lexicon: HALOT
  rationale: The idiom means 'sons of a year,' i.e., one year old. 'A year old' is clearer for modern readers than 'yearling.'
- source_word: תְּמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial contexts this adjective denotes freedom from defect. 'Without blemish' is the standard and clearest cultic rendering.
- source_word: יִהְיוּ לָכֶם
  chosen: they shall be without blemish for you
  alternatives:
  - they shall be for you without blemish
  - they must be without blemish
  lexicon: HALOT
  rationale: The Hebrew places the predicate before the verb and includes לָכֶם, indicating the required condition of the animals brought by the Israelites. 'For you' is retained rather than omitted, preserving the source structure and responsibility nuance.
