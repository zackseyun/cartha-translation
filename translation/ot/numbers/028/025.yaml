id: NUM.28.25
reference: Numbers 28:25
source:
  edition: WLC
  text: וּ/בַ/יּוֹם֙ הַ/שְּׁבִיעִ֔י מִקְרָא קֹ֖דֶשׁ יִהְיֶ֣ה לָ/כֶ֑ם כָּל מְלֶ֥אכֶת
    עֲבֹדָ֖ה לֹ֥א תַעֲשֽׂוּ־־׃ס
translation:
  text: On the seventh day you shall have a holy convocation; you shall do no ordinary
    work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sacred assembly' or 'a holy assembly.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'no work of labor/service'; that is, no ordinary occupational work.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/יּוֹם
  chosen: On ... day
  alternatives:
  - And on ... day
  - On ... day
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally gives 'and/on the
    day.' In English, 'On the ... day' is natural and preserves the temporal force;
    the conjunction is not separately represented because English does not require
    it here.
- source_word: הַ/שְּׁבִיעִי
  chosen: the seventh
  lexicon: HALOT
  rationale: Straightforward ordinal adjective modifying 'day.'
- source_word: מִקְרָא קֹדֶשׁ
  chosen: a holy convocation
  alternatives:
  - a sacred assembly
  - a holy assembly
  lexicon: HALOT
  rationale: This fixed cultic expression commonly denotes a formally summoned sacred
    gathering. 'Holy convocation' preserves the formal, liturgical sense while remaining
    understandable; alternatives are viable but slightly less traditional or less
    precise to the summons nuance of מִקְרָא.
- source_word: יִהְיֶה לָכֶם
  chosen: you shall have
  alternatives:
  - shall be for you
  - will be yours
  lexicon: HALOT
  rationale: Literally 'shall be for you.' English idiom is smoother with 'you shall
    have,' while preserving the prescriptive force in context.
- source_word: כָּל
  chosen: 'no'
  alternatives:
  - any
  lexicon: HALOT
  rationale: In the construction with negation ('all/any ... you shall not do'), idiomatic
    English is 'you shall do no ...' rather than a wooden 'any ... you shall not do.'
- source_word: מְלֶאכֶת עֲבֹדָה
  chosen: ordinary work
  alternatives:
  - laborious work
  - occupational work
  - servile work
  lexicon: HALOT
  rationale: This recurring phrase refers to regular occupational or labor-intensive
    work prohibited on sacred days, not absolutely every action. 'Ordinary work' communicates
    the contrast with sacred observance and avoids the misleading archaic 'servile
    work.'
- source_word: לֹא תַעֲשׂוּ
  chosen: you shall do no
  alternatives:
  - you must not do
  - do not do
  lexicon: HALOT
  rationale: The imperfect with negation in legal/instructional context is well rendered
    as a prohibition. 'You shall do no' fits the formal register of the verse and
    aligns with the surrounding cultic legislation.
