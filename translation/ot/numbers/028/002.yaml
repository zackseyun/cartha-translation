id: NUM.28.2
reference: Numbers 28:2
source:
  edition: WLC
  text: צַ֚ו אֶת בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/אָמַרְתָּ֖ אֲלֵ/הֶ֑ם אֶת קָרְבָּנִ֨/י לַחְמִ֜/י
    לְ/אִשַּׁ֗/י רֵ֚יחַ נִֽיחֹחִ֔/י תִּשְׁמְר֕וּ לְ/הַקְרִ֥יב לִ֖/י בְּ/מוֹעֲדֽ/וֹ־־׃
translation:
  text: Command the sons of Israel, and say to them, ‘My offering, my food for my
    food offerings, my pleasing aroma—you shall be careful to present to me at its
    appointed time.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for my offerings by fire.' The Hebrew term refers to sacrificial offerings
      consumed on the altar.
    reason: lexical_alternative
  - marker: b
    text: '''Pleasing aroma'' is a stock sacrificial expression for an offering accepted
      by God.'
    reason: cultural_note
  - marker: c
    text: Or, 'the Israelites.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צַו
  chosen: Command
  alternatives:
  - Give orders to
  - Instruct
  lexicon: HALOT
  rationale: Imperative of צוה, a strong directive addressed to Moses. 'Command' preserves
    the force better than the softer 'instruct.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Formally masculine plural construct. 'Sons of Israel' preserves the source
    wording and aligns with the project's gender-accurate policy; 'Israelites' is
    smoother but less formally transparent.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  chosen: and say to them
  alternatives:
  - and tell them
  lexicon: HALOT
  rationale: Standard rendering of אמר with indirect object; 'say to them' keeps the
    directness of the Hebrew sequence.
- source_word: קָרְבָּנִי
  chosen: My offering
  alternatives:
  - my offering gift
  - my oblation
  lexicon: HALOT
  rationale: קרבן is a general term for an offering brought near to God. 'Offering'
    is the clearest modern English equivalent.
- source_word: לַחְמִי
  chosen: my food
  alternatives:
  - my bread
  lexicon: HALOT
  rationale: Though literally 'my bread,' in sacrificial context it refers more broadly
    to food/provision associated with offerings. 'My food' communicates the idiom
    without misleading readers into thinking only bread is meant.
- source_word: לְאִשַּׁי
  chosen: for my food offerings
  alternatives:
  - for my offerings by fire
  - for my fire offerings
  lexicon: HALOT
  rationale: From אִשֶּׁה, traditionally 'offering made by fire.' Because the term
    is linked to sacrificial burning, 'food offerings' is readable but should preserve
    the sacrificial sense; the alternative 'offerings by fire' is worth noting.
- source_word: רֵיחַ נִיחֹחִי
  chosen: my pleasing aroma
  alternatives:
  - a soothing aroma to me
  - my sweet aroma
  lexicon: HALOT
  rationale: A stock sacrificial expression indicating acceptability before God, not
    divine olfactory need in a crude sense. 'Pleasing aroma' is idiomatic modern English
    and preserves the acceptance motif.
- source_word: תִּשְׁמְרוּ
  chosen: you shall be careful
  alternatives:
  - you shall keep
  - you shall observe
  lexicon: HALOT
  rationale: שמר here governs the infinitive 'to present' and conveys careful observance/guarding.
    'Be careful' captures the practical force better than a bare 'keep.'
- source_word: לְהַקְרִיב לִי
  chosen: to present to me
  alternatives:
  - to offer to me
  - to bring near to me
  lexicon: HALOT
  rationale: הקריב in sacrificial context means to present/offer. 'Present' avoids
    redundancy with 'offering' earlier while retaining cultic sense.
- source_word: בְּמוֹעֲדוֹ
  chosen: at its appointed time
  alternatives:
  - in its appointed season
  - at the appointed time
  lexicon: HALOT
  rationale: מועד denotes an appointed time/festival occasion. The singular suffix
    refers back to the offering regimen collectively; 'its appointed time' is a natural
    rendering.
