theological_decisions:
- issue: Anthropomorphic sacrificial language ('my food,' 'my pleasing aroma')
  chosen_reading: Retain the covenantal sacrificial idiom without flattening it into
    abstraction
  alternative_readings:
  - Interpretive paraphrase such as 'the offerings acceptable to me'
  rationale: The Hebrew uses concrete sacrificial language. Retaining it respects
    the text while allowing readers to understand it as cultic idiom rather than implying
    literal divine nourishment.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Gendered corporate designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The source is grammatically masculine and refers to the covenant people
    corporately. Per the gender-accurate policy, the translation preserves the masculine
    form rather than neutralizing it in the main text.
  doctrine_reference: Translation philosophy §4
