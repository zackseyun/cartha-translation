id: NUM.28.20
reference: Numbers 28:20
source:
  edition: WLC
  text: וּ/מִ֨נְחָתָ֔/ם סֹ֖לֶת בְּלוּלָ֣ה בַ/שָּׁ֑מֶן שְׁלֹשָׁ֨ה עֶשְׂרֹנִ֜ים לַ/פָּ֗ר
    וּ/שְׁנֵ֧י עֶשְׂרֹנִ֛ים לָ/אַ֖יִל תַּעֲשֽׂוּ׃
translation:
  text: 'And their grain offering shall be fine flour mixed with oil: three-tenths
    for the bull, and two-tenths for the ram you shall prepare.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'three-tenths' and 'two-tenths' abbreviate tenths of an ephah, a
      dry measure used in sacrificial regulations.
    reason: cultural_note
lexical_decisions:
- source_word: וּמִנְחָתָם
  chosen: And their grain offering
  alternatives:
  - And their offering
  - And its grain offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes a grain offering rather
    than a generic gift/offering. The 3mp suffix is rendered 'their,' referring to
    the animals just mentioned collectively in the offering sequence.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - flour of fine quality
  lexicon: HALOT
  rationale: סֹלֶת is the standard term for finely milled flour used in offerings;
    'fine flour' is the established and precise English equivalent.
- source_word: בְּלוּלָה בַשָּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  - blended with oil
  lexicon: HALOT
  rationale: The passive participle בְּלוּלָה with ב + שֶׁמֶן indicates flour prepared
    by being mixed with oil. 'Mixed with oil' is natural modern English while remaining
    close to the Hebrew.
- source_word: שְׁלֹשָׁה עֶשְׂרֹנִים
  chosen: three-tenths
  alternatives:
  - three tenth-parts of an ephah
  - three omers
  lexicon: HALOT
  rationale: עִשָּׂרוֹן is a tenth measure, conventionally understood as a tenth of
    an ephah in cultic legislation. English translations often shorten this to 'three-tenths';
    this is concise and idiomatic here.
- source_word: לַפָּר
  chosen: for the bull
  alternatives:
  - for each bull
  - for a bull
  lexicon: HALOT
  rationale: The singular with article refers to the bull specified in the sacrificial
    prescription. 'For the bull' best matches the immediate context.
- source_word: וּשְׁנֵי עֶשְׂרֹנִים
  chosen: and two-tenths
  alternatives:
  - and two tenth-parts of an ephah
  lexicon: HALOT
  rationale: Same measure term as above; consistency favors 'two-tenths' in parallel
    structure.
- source_word: לָאַיִל
  chosen: for the ram
  alternatives:
  - for each ram
  - for a ram
  lexicon: HALOT
  rationale: The singular refers to the ram in the offering sequence. 'For the ram'
    preserves the specificity of the Hebrew.
- source_word: תַּעֲשׂוּ
  chosen: you shall prepare
  alternatives:
  - you shall make
  - you shall offer
  lexicon: HALOT
  rationale: עשה is broadly 'do/make,' but in sacrificial instructions 'prepare' communicates
    the required action idiomatically without over-specifying 'offer.'
