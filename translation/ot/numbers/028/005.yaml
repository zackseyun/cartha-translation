id: NUM.28.5
reference: Numbers 28:5
source:
  edition: WLC
  text: וַ/עֲשִׂירִ֧ית הָ/אֵיפָ֛ה סֹ֖לֶת לְ/מִנְחָ֑ה בְּלוּלָ֛ה בְּ/שֶׁ֥מֶן כָּתִ֖ית
    רְבִיעִ֥ת הַ/הִֽין׃
translation:
  text: and a tenth of an ephah of fine flour for a grain offering, mixed with a quarter
    of a hin of beaten oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: An ephah and a hin are ancient Israelite units of measure.
    reason: cultural_note
  - marker: b
    text: Or 'mixed with a quarter of a hin of pressed oil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשִׂירִית
  chosen: and a tenth
  alternatives:
  - and a tenth part
  lexicon: HALOT
  rationale: The conjunction prefixed to עֲשִׂירִית links this item to the preceding
    sacrificial prescription, so 'and a tenth' is the natural English rendering. 'Tenth
    part' is more formal but less idiomatic.
- source_word: הָאֵיפָה
  chosen: of an ephah
  alternatives:
  - of the ephah
  lexicon: HALOT
  rationale: אֵיפָה is a dry measure. Retaining 'ephah' transliterates the ancient
    unit rather than approximating it, preserving source-text specificity. Although
    the Hebrew has the article, English idiom with measures is better as 'an ephah'
    in this construction.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - fine meal
  lexicon: HALOT
  rationale: סֹלֶת refers to finely milled flour used in offerings. 'Fine flour' is
    the standard clear rendering in sacrificial contexts.
- source_word: לְמִנְחָה
  chosen: for a grain offering
  alternatives:
  - for an offering
  - for a tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in priestly sacrificial legislation denotes the cereal/grain
    offering rather than a generic gift. 'Grain offering' communicates the cultic
    category clearly in modern English.
- source_word: בְּלוּלָה
  chosen: mixed
  alternatives:
  - mingled
  lexicon: HALOT
  rationale: The passive participle describes the flour as combined with oil. 'Mixed'
    is natural modern English; 'mingled' is accurate but archaic.
- source_word: בְּשֶׁמֶן
  chosen: with ... oil
  alternatives:
  - in oil
  lexicon: HALOT
  rationale: The preposition here marks the substance with which the flour is mixed.
    English idiom prefers 'mixed with oil'.
- source_word: כָּתִית
  chosen: beaten
  alternatives:
  - pressed
  - crushed
  lexicon: HALOT
  rationale: כָּתִית describes oil obtained by pounding/crushing olives. 'Beaten oil'
    is the traditional and sufficiently transparent rendering; 'pressed' is possible
    but less directly tied to the Hebrew adjective.
- source_word: רְבִיעִת הַהִין
  chosen: a quarter of a hin
  alternatives:
  - a fourth of a hin
  lexicon: HALOT
  rationale: This is a fractional measure modifying the oil quantity. 'A quarter of
    a hin' is idiomatic English while preserving the ancient unit 'hin' by transliteration.
