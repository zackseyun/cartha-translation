id: NUM.32.10
reference: Numbers 32:10
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֥ף יְהוָ֖ה בַּ/יּ֣וֹם הַ/ה֑וּא וַ/יִּשָּׁבַ֖ע לֵ/אמֹֽר־׃
translation:
  text: So Yahweh’s anger burned on that day, and he swore, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh'' or ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּחַר
  chosen: burned
  alternatives:
  - was kindled
  - grew hot
  lexicon: HALOT
  rationale: The verb חרה with אַף is a standard idiom for anger becoming hot/burning. 'Burned' preserves the metaphor naturally in modern English without over-literal awkwardness.
- source_word: אַף
  chosen: anger
  alternatives:
  - nose
  - wrath
  lexicon: HALOT
  rationale: Although literally 'nose,' in this idiom it denotes anger. 'Anger' is the clearest English equivalent here; 'wrath' is possible but slightly more interpretive and elevated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: This temporal phrase is most naturally rendered 'on that day' in contemporary English. 'In that day' can sound more idiomatic in prophetic contexts, but here the narrative setting favors 'on.'
- source_word: וַיִּשָּׁבַע
  chosen: he swore
  alternatives:
  - he took an oath
  - he vowed
  lexicon: HALOT
  rationale: The Niphal of שבע means to swear/take an oath. 'He swore' is concise and idiomatic; 'took an oath' is slightly more explicit but less direct.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: This infinitive introduces the content of the oath in the following verse. 'Saying' preserves the formal linkage to the quoted speech while remaining natural in English.
