id: NUM.32.31
reference: Numbers 32:31
source:
  edition: WLC
  text: וַ/יַּֽעֲנ֧וּ בְנֵי גָ֛ד וּ/בְנֵ֥י רְאוּבֵ֖ן לֵ/אמֹ֑ר אֵת֩ אֲשֶׁ֨ר דִּבֶּ֧ר יְהוָ֛ה אֶל עֲבָדֶ֖י/ךָ כֵּ֥ן נַעֲשֶֽׂה־־׃
translation:
  text: Then the sons of Gad and the sons of Reuben answered, saying, “As Yahweh has spoken to your servants, so we will do.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “What the LORD has spoken to your servants, that we will do.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: The verb ענה in this narrative wayyiqtol form commonly introduces a spoken reply. 'Answered' is the most direct and idiomatic rendering in English narrative.
- source_word: בְנֵי גָד וּבְנֵי רְאוּבֵן
  chosen: the sons of Gad and the sons of Reuben
  alternatives:
  - the Gadites and the Reubenites
  - the descendants of Gad and the descendants of Reuben
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the Hebrew kinship expression בְּנֵי ('sons of'). Although ethnic terms like 'Gadites' and 'Reubenites' are possible, the source text explicitly uses the filial construction twice.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: This infinitive construct functions as a speech introducer after 'answered.' 'Saying' preserves the Hebrew structure naturally enough in English.
- source_word: אֵת אֲשֶׁר
  chosen: as
  alternatives:
  - that which
  - what
  lexicon: HALOT
  rationale: The combination introduces the content of what was spoken. In idiomatic English with the following כֵּן, 'as ... so ...' best captures the correlative sense of the clause.
- source_word: דִּבֶּר
  chosen: has spoken
  alternatives:
  - spoke
  - has said
  lexicon: HALOT
  rationale: The perfect refers to the LORD's prior speech just given in context. English present perfect fits the immediate relevance of that completed speech act, though simple past would also be possible.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל עֲבָדֶיךָ
  chosen: to your servants
  alternatives:
  - to your slaves
  lexicon: HALOT
  rationale: Although עֶבֶד can denote a slave, here the speakers use a conventional deferential self-reference to Moses. The bonded-status nuance is not foregrounded, so 'servants' is the better contextual rendering while preserving humility.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - accordingly
  lexicon: HALOT
  rationale: 'This adverb pairs naturally with the preceding clause: ''As ... so ...'' It is concise and idiomatic.'
- source_word: נַעֲשֶׂה
  chosen: we will do
  alternatives:
  - we will act accordingly
  - we will do it
  lexicon: HALOT
  rationale: The verb עשה is broad and here refers to carrying out the command. 'We will do' is the most direct equivalent and avoids adding an object not explicit in Hebrew.
