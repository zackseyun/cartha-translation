theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Referent of the 3ms pronouns in הוֹרִישׁוֹ / אֹיְבָיו / מִפָּנָיו
  chosen_reading: the pronouns refer to the LORD
  alternative_readings:
  - the pronouns refer to Israel collectively or to the armed force
  rationale: 'The immediate phrase ''before the LORD'' strongly supports the LORD as the antecedent: they cross before the LORD until he drives out his enemies from before him. This also matches common conquest idiom in the Pentateuch, where the LORD drives out enemies before Israel. The alternative is grammatically conceivable but less coherent with the singular chain of pronouns.'
