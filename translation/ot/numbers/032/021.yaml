id: NUM.32.21
reference: Numbers 32:21
source:
  edition: WLC
  text: וְ/עָבַ֨ר לָ/כֶ֧ם כָּל חָל֛וּץ אֶת הַ/יַּרְדֵּ֖ן לִ/פְנֵ֣י יְהוָ֑ה עַ֧ד הוֹרִישׁ֛/וֹ אֶת אֹיְבָ֖י/ו מִ/פָּנָֽי/ו־־־׃
translation:
  text: and every armed man among you crosses the Jordan before Yahweh, until he has driven out his enemies from before him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'until he has dispossessed his enemies from before him.' The Hebrew verb can mean 'drive out' or 'dispossess.'
    reason: lexical_alternative
  - marker: b
    text: The pronouns in 'he has driven out his enemies from before him' most naturally refer to the LORD, though some understand them with reference to Israel's fighting force.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָבַר
  chosen: and ... crosses
  alternatives:
  - and ... shall cross
  - and ... must cross
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this conditional context functions with future force after the preceding condition (v. 20). Rendering as present-style English 'crosses' conveys the stipulation naturally; future 'shall cross' is possible but slightly stiffer.
- source_word: לָכֶם
  chosen: among you
  alternatives:
  - for you
  - of you
  lexicon: HALOT
  rationale: The preposition with pronoun marks relation to the addressed tribes; in idiomatic English with כָּל חָלוּץ it is best expressed as 'among you' rather than the more wooden 'for you'.
- source_word: כָּל חָלוּץ
  chosen: every armed man
  alternatives:
  - every armed one
  - everyone equipped for battle
  - every warrior
  lexicon: HALOT
  rationale: חָלוּץ refers to one equipped/arrayed for battle, not merely any traveler. 'Every armed man' preserves the singular distributive force of כָּל and the military sense. 'Warrior' is possible but slightly interpretive.
- source_word: אֶת הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Standard English geographic rendering is 'the Jordan.' 'River' is unnecessary unless clarity demands it.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי denotes presence/before-ness. Per doctrine, יְהוָה is rendered 'the LORD,' not 'Yahweh.' 'Before the LORD' is both natural and covenantally weighty.
- source_word: עַד
  chosen: until
  alternatives:
  - as far as the point when
  lexicon: HALOT
  rationale: Simple temporal limit marker.
- source_word: הוֹרִישׁוֹ
  chosen: he has driven out
  alternatives:
  - he has dispossessed
  - he causes to inherit by removing
  - he has expelled
  lexicon: HALOT
  rationale: Hiphil of ירשׁ here means to dispossess/drive out. The 3ms suffix most naturally refers to the LORD in context ('before the LORD ... until he has driven out'). 'Driven out' is clear modern English; 'dispossessed' is more formal but less natural.
- source_word: אֹיְבָיו
  chosen: his enemies
  alternatives:
  - the enemies
  lexicon: HALOT
  rationale: Suffix retained; the antecedent is the same 3ms subject of הוֹרִישׁוֹ, most naturally the LORD. Keeping 'his enemies' preserves the Hebrew pronominal linkage.
- source_word: מִפָּנָיו
  chosen: from before him
  alternatives:
  - from his presence
  - before him
  lexicon: HALOT
  rationale: Literally 'from before his face/presence.' 'From before him' preserves the idiom and the repeated פני language with minimal awkwardness.
