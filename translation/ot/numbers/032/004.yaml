id: NUM.32.4
reference: Numbers 32:4
source:
  edition: WLC
  text: הָ/אָ֗רֶץ אֲשֶׁ֨ר הִכָּ֤ה יְהוָה֙ לִ/פְנֵי֙ עֲדַ֣ת יִשְׂרָאֵ֔ל אֶ֥רֶץ מִקְנֶ֖ה הִ֑וא וְ/לַֽ/עֲבָדֶ֖י/ךָ מִקְנֶֽה׃ס
translation:
  text: The land that Yahweh struck before the congregation of Israel is a land for livestock, and your servants have livestock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the assembly of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'land suitable for cattle'; the Hebrew term can refer broadly to livestock, not only cattle.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָרֶץ
  chosen: The land
  alternatives:
  - the country
  - the territory
  lexicon: HALOT
  rationale: אֶרֶץ commonly denotes land/territory. 'The land' fits the immediate geographic sense and preserves the definite article.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Simple relative pronoun introducing the clause; 'that' is natural modern English.
- source_word: הִכָּה
  chosen: struck down
  alternatives:
  - struck
  - defeated
  lexicon: HALOT
  rationale: נכה often means to strike/smite, including military defeat. 'Struck down' preserves the force of divine action without over-paraphrasing to a purely interpretive 'defeated.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  - ahead of
  lexicon: HALOT
  rationale: Spatial idiom here means 'before/in front of' the assembly of Israel as witnesses to the LORD's action.
- source_word: עֲדַת יִשְׂרָאֵל
  chosen: the congregation of Israel
  alternatives:
  - the assembly of Israel
  - the community of Israel
  lexicon: HALOT
  rationale: עֵדָה refers to the gathered community. 'Congregation' is a standard and accurate rendering in Pentateuchal contexts, while remaining understandable.
- source_word: אֶרֶץ מִקְנֶה
  chosen: land for livestock
  alternatives:
  - a land of livestock
  - land suitable for cattle
  lexicon: HALOT
  rationale: The construct-like apposition expresses suitability or character. 'Land for livestock' is concise and natural, avoiding the narrower 'cattle' since מִקְנֶה can include various domesticated animals.
- source_word: הִוא
  chosen: is
  alternatives:
  - it is
  lexicon: HALOT
  rationale: The independent pronoun serves as the copular subject in Hebrew; English idiom naturally renders it with 'is' in this sentence.
- source_word: וְלַעֲבָדֶיךָ
  chosen: and your servants
  alternatives:
  - and for your servants
  lexicon: HALOT
  rationale: The prefixed ל marks possession/advantage. English can express the sense smoothly as 'and your servants have...' while retaining the direct address to Moses.
- source_word: מִקְנֶה
  chosen: livestock
  alternatives:
  - cattle
  - herds
  lexicon: HALOT
  rationale: מִקְנֶה denotes livestock/property in animals. 'Livestock' is broader and more precise than 'cattle' in this context.
