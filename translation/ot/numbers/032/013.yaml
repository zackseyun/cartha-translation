id: NUM.32.13
reference: Numbers 32:13
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֤ף יְהוָה֙ בְּ/יִשְׂרָאֵ֔ל וַ/יְנִעֵ/ם֙ בַּ/מִּדְבָּ֔ר אַרְבָּעִ֖ים שָׁנָ֑ה עַד תֹּם֙ כָּל הַ/דּ֔וֹר הָ/עֹשֶׂ֥ה הָ/רַ֖ע בְּ/עֵינֵ֥י יְהוָֽה־־־׃
translation:
  text: So Yahweh’s anger burned against Israel, and he made them wander in the wilderness forty years, until all the generation that had done evil in the sight of Yahweh had come to an end.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD was angry with Israel.' The Hebrew idiom is literally 'the nose/anger of the LORD burned.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he caused them to wander in the wilderness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  chosen: the LORD’s anger burned
  alternatives:
  - the LORD was angry
  - the LORD’s anger flared
  lexicon: HALOT
  rationale: The idiom literally involves anger 'burning.' 'The LORD’s anger burned' preserves the Hebrew imagery while remaining natural English; it is more vivid and textually grounded than the flatter 'was angry.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - with Israel
  - at Israel
  lexicon: HALOT
  rationale: With verbs of anger, the preposition here is best rendered idiomatically in English as 'against,' expressing the object of divine wrath.
- source_word: וַיְנִעֵם
  chosen: he made them wander
  alternatives:
  - he caused them to wander
  - he led them about
  - he made them stagger
  lexicon: HALOT
  rationale: From נוּעַ/נוע, the causative sense here is that God caused Israel to wander. 'Made them wander' is concise, natural, and preserves the causative force better than a simple 'they wandered.'
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard rendering for מִדְבָּר in Israel''s exodus context and better preserves the biblical-theological setting than ''desert,'' which can sound overly geographical or narrow.'
- source_word: אַרְבָּעִים שָׁנָה
  chosen: forty years
  lexicon: HALOT
  rationale: Straightforward numerical expression; no special adjustment needed.
- source_word: עַד תֹּם
  chosen: until ... had come to an end
  alternatives:
  - until ... was finished
  - until the end of
  lexicon: HALOT
  rationale: The infinitive construct of תָּמַם conveys completion/coming to an end. In English, 'had come to an end' fits the clause smoothly and captures the sense of the generation's disappearance.
- source_word: כָּל הַדּוֹר
  chosen: all the generation
  alternatives:
  - the whole generation
  - all that generation
  lexicon: HALOT
  rationale: The phrase refers collectively to the entire generation under judgment. 'All the generation' is slightly formal but clear; it preserves the totalizing force of כָּל. The more idiomatic 'that whole generation' is possible, but the demonstrative is not explicit in the Hebrew.
- source_word: הָעֹשֶׂה הָרַע
  chosen: that had done evil
  alternatives:
  - doing evil
  - that did what was evil
  lexicon: HALOT
  rationale: Although formally a singular participial expression modifying a collective noun, English naturally renders the sense as a relative clause. 'Had done evil' fits the retrospective context of the judgment. 'Did what was evil' is also possible but slightly more expansive.
- source_word: בְּעֵינֵי יְהוָה
  chosen: in the sight of the LORD
  alternatives:
  - in the eyes of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative idiom. 'In the sight of the LORD' is idiomatic English that preserves the metaphor without sounding wooden.
