id: NUM.32.7
reference: Numbers 32:7
source:
  edition: WLC
  text: וְ/לָ֣/מָּה תנואו/ן אֶת לֵ֖ב בְּנֵ֣י יִשְׂרָאֵ֑ל מֵֽ/עֲבֹר֙ אֶל הָ/אָ֔רֶץ אֲשֶׁר נָתַ֥ן לָ/הֶ֖ם יְהוָֽה־־־׃
translation:
  text: And why do you discourage the hearts of the sons of Israel from crossing over into the land that Yahweh has given them?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'discourage the courage/resolve of the sons of Israel.' The Hebrew literally says 'discourage the heart.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' or 'the children of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָמָּה
  chosen: And why
  alternatives:
  - Why
  lexicon: HALOT
  rationale: Retains the conjunction plus interrogative force. 'And why' reflects the Hebrew connective in discourse, linking this question to the preceding complaint.
- source_word: תְּנִיאוּן
  chosen: do you discourage
  alternatives:
  - do you dissuade
  - do you turn away
  - do you hinder
  lexicon: HALOT
  rationale: The verb from נוא in Hiphil here means to cause discouragement or aversion, especially by weakening resolve. 'Discourage' best fits the idiom with 'heart' and the context of deterring Israel from entering the land.
- source_word: אֶת לֵב
  chosen: the heart
  alternatives:
  - the courage
  - the resolve
  lexicon: HALOT
  rationale: Formally, the Hebrew says 'the heart.' While the idiomatic sense involves courage or resolve, retaining 'heart' preserves the Hebrew anthropology and remains understandable in English.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the stated philosophy. The Hebrew is literally 'sons of Israel'; although 'Israelites' is smoother, 'sons of Israel' more closely matches the source and preserves the familial-national expression.
- source_word: מֵעֲבֹר
  chosen: from crossing over
  alternatives:
  - from going over
  - from passing over
  lexicon: HALOT
  rationale: The preposition plus infinitive construct of עבר expresses prevention from making the crossing. 'Crossing over' is the most natural English equivalent in this land-entry context and echoes the Jordan-crossing motif.
- source_word: אֶל הָאָרֶץ
  chosen: into the land
  alternatives:
  - to the land
  lexicon: HALOT
  rationale: Although אֶל is often 'to,' English idiom with 'cross over' commonly takes 'into' when entering a territory. This slightly dynamic choice clarifies movement into possession of the land.
- source_word: אֲשֶׁר נָתַן לָהֶם
  chosen: that the LORD has given them
  alternatives:
  - which the LORD gave them
  lexicon: HALOT
  rationale: The perfect verb can be rendered 'has given' to reflect the completed divine grant with present relevance, a common feature in promise-land contexts. This avoids implying mere past narration and fits Moses' appeal.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
