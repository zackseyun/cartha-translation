  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered national designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The translation philosophy prefers gender-accurate renderings over flattening masculine forms into neutral English when the source uses a masculine plural representative expression. Here 'sons of Israel' preserves the Hebrew form while remaining intelligible.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
