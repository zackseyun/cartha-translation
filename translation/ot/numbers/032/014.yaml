id: NUM.32.14
reference: Numbers 32:14
source:
  edition: WLC
  text: וְ/הִנֵּ֣ה קַמְתֶּ֗ם תַּ֚חַת אֲבֹ֣תֵי/כֶ֔ם תַּרְבּ֖וּת אֲנָשִׁ֣ים חַטָּאִ֑ים לִ/סְפּ֣וֹת ע֗וֹד עַ֛ל חֲר֥וֹן אַף יְהוָ֖ה אֶל יִשְׂרָאֵֽל־־׃
translation:
  text: And behold, you have risen up in your fathers’ place, a brood of sinful men, to add still more to the burning anger of Yahweh against Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an increase of sinful men' or 'offspring of sinful men.' The Hebrew תַּרְבּוּת can denote increase or progeny; 'a brood' is chosen to convey the rebuking tone in context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'upon the burning of the nose of the LORD,' a Hebrew idiom for intense anger.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Now behold
  lexicon: HALOT
  rationale: Retains the deictic/interjective force that marks Moses' emphatic warning. 'Behold' is slightly formal but still readable and preserves the rhetorical punch better than omitting it.
- source_word: קַמְתֶּם
  chosen: you have risen up
  alternatives:
  - you have arisen
  - you have come forward
  lexicon: HALOT
  rationale: Qal perfect of קום here is not merely physical standing but arising in succession to the previous generation. 'Have risen up' preserves both the verbal imagery and the accusatory tone.
- source_word: תַּחַת אֲבֹתֵיכֶם
  chosen: in your fathers’ place
  alternatives:
  - instead of your fathers
  - under your fathers
  lexicon: HALOT
  rationale: תחת commonly means 'in place of' in succession contexts. 'In your fathers’ place' is the most natural English expression here and fits the generational contrast.
- source_word: תַּרְבּוּת
  chosen: a brood
  alternatives:
  - an increase
  - an offspring
  - a multiplication
  lexicon: HALOT
  rationale: The noun denotes an offspring/increase/group produced from others. In this rebuke, 'a brood' idiomatically conveys a spawned generation and carries the negative force of the context better than the more wooden 'increase.'
- source_word: אֲנָשִׁים חַטָּאִים
  chosen: of sinful men
  alternatives:
  - of sinful people
  - of sinners
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'men.' Following the gender-accurate principle, 'men' is retained rather than neutralizing to 'people.' 'Sinful men' is more adjectival and immediate than 'sinners,' while preserving the moral indictment.
- source_word: לִסְפּוֹת
  chosen: to add
  alternatives:
  - to increase
  - to augment
  lexicon: HALOT
  rationale: From יסף/ספה in this construction, the sense is adding to or increasing what is already present. 'To add' is concise and idiomatic with the following 'still more.'
- source_word: עוֹד
  chosen: still more
  alternatives:
  - again
  - further
  - yet more
  lexicon: HALOT
  rationale: 'Conveys continuation/intensification: this generation would compound prior guilt. ''Still more'' works naturally with ''to add.'''
- source_word: עַל חֲרוֹן אַף
  chosen: to the burning anger
  alternatives:
  - to the fierce anger
  - to the wrath
  lexicon: HALOT
  rationale: The idiom literally combines 'burning' and 'nose/anger' for intense divine anger. 'Burning anger' preserves the metaphor more transparently than flattening it to simply 'wrath.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל יִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - toward Israel
  - upon Israel
  lexicon: HALOT
  rationale: With anger terminology, אֶל marks the object toward which anger is directed. In idiomatic English, 'against Israel' best expresses that hostile orientation.
