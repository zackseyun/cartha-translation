id: NUM.32.29
reference: Numbers 32:29
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר מֹשֶׁ֜ה אֲלֵ/הֶ֗ם אִם יַעַבְר֣וּ בְנֵי גָ֣ד וּ/בְנֵי רְאוּבֵ֣ן אִ֠תְּ/כֶם אֶֽת הַ/יַּרְדֵּ֞ן כָּל חָל֤וּץ לַ/מִּלְחָמָה֙ לִ/פְנֵ֣י יְהוָ֔ה וְ/נִכְבְּשָׁ֥ה הָ/אָ֖רֶץ לִ/פְנֵי/כֶ֑ם וּ/נְתַתֶּ֥ם לָ/הֶ֛ם אֶת אֶ֥רֶץ הַ/גִּלְעָ֖ד לַ/אֲחֻזָּֽה־־־׀־־־׃
translation:
  text: And Moses said to them, “If the sons of Gad and the sons of Reuben cross the Jordan with you, every armed man for battle before Yahweh, and the land is subdued before you, then you shall give them the land of Gilead as a possession.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing Moses' speech; 'And' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a real condition governing the grant of land; 'if' best preserves the conditional force.
- source_word: בְנֵי גָד וּבְנֵי רְאוּבֵן
  chosen: the sons of Gad and the sons of Reuben
  alternatives:
  - the Gadites and the Reubenites
  - the descendants of Gad and the descendants of Reuben
  lexicon: HALOT
  rationale: Formal kinship expression is retained. 'Sons of' matches the Hebrew construct and keeps tribal identity language transparent.
- source_word: יַעַבְרוּ ... אֶת הַיַּרְדֵּן
  chosen: cross the Jordan
  alternatives:
  - pass over the Jordan
  lexicon: HALOT
  rationale: Idiomatic English for עבר with the direct object 'the Jordan'; concise and natural while remaining close to the source.
- source_word: אִתְּכֶם
  chosen: with you
  alternatives:
  - along with you
  lexicon: HALOT
  rationale: Simple accompaniment; no need to expand beyond the Hebrew.
- source_word: כָּל חָלוּץ
  chosen: every armed man
  alternatives:
  - every armed one
  - every equipped man
  lexicon: HALOT
  rationale: חָלוּץ in this military context refers to those equipped/arrayed for combat. 'Every armed man' is clear modern English and fits the tribal-war setting.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  lexicon: HALOT
  rationale: '''For battle'' is more idiomatic in English here while preserving the military purpose.'
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Retains covenantal/theological force of the phrase while following the doctrinal default rendering of יְהוָה as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְנִכְבְּשָׁה הָאָרֶץ
  chosen: and the land is subdued
  alternatives:
  - and the land is conquered
  - and the land is brought into subjection
  lexicon: HALOT
  rationale: The Niphal of כבש conveys being subdued or brought under control. 'Subdued' preserves the passive/resultative sense without overstating annihilation.
- source_word: לִפְנֵיכֶם
  chosen: before you
  alternatives:
  - in your presence
  - before your face
  lexicon: HALOT
  rationale: Conventional rendering of the Hebrew idiom; here it indicates the land being subdued in relation to Israel's advance.
- source_word: וּנְתַתֶּם לָהֶם
  chosen: then you shall give them
  alternatives:
  - you shall give them
  lexicon: HALOT
  rationale: English 'then' makes the apodosis of the conditional explicit, though implied in Hebrew; this is a minimal, justified smoothing for readability.
- source_word: אֶרֶץ הַגִּלְעָד
  chosen: the land of Gilead
  alternatives:
  - the territory of Gilead
  lexicon: HALOT
  rationale: אֶרֶץ commonly denotes land/territory; 'land of Gilead' is the standard and sufficiently clear geographic rendering.
- source_word: לַאֲחֻזָּה
  chosen: as a possession
  alternatives:
  - for a possession
  - as property
  - as an inheritance
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a landed holding or possession. 'As a possession' is natural English and avoids importing the stronger inheritance nuance unless context requires it.
