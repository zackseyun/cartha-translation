id: NUM.32.9
reference: Numbers 32:9
source:
  edition: WLC
  text: וַֽ/יַּעֲל֞וּ עַד נַ֣חַל אֶשְׁכּ֗וֹל וַ/יִּרְאוּ֙ אֶת הָ/אָ֔רֶץ וַ/יָּנִ֕יאוּ אֶת לֵ֖ב בְּנֵ֣י יִשְׂרָאֵ֑ל לְ/בִלְתִּי בֹא֙ אֶל הָ/אָ֔רֶץ אֲשֶׁר נָתַ֥ן לָ/הֶ֖ם יְהוָֽה־־־־־־׃
translation:
  text: They went up as far as the Valley of Eshcol and saw the land, and they discouraged the heart of the sons of Israel from going into the land that Yahweh had given them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel,' a standard covenantal/national designation.
    reason: lexical_alternative
  - marker: b
    text: Or 'they disheartened' or 'they caused the heart of the sons of Israel to turn away.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: They went up
  alternatives:
  - They came up
  - They ascended
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' 'Went up' is natural English and preserves the directional sense without overformal wording.
- source_word: עַד נַחַל אֶשְׁכּוֹל
  chosen: as far as the Valley of Eshcol
  alternatives:
  - to the Wadi Eshcol
  - as far as the Wadi of Eshcol
  lexicon: HALOT
  rationale: נחל can denote a wadi, torrent valley, or valley. 'Valley' is more accessible in modern English, while 'as far as' reflects עַד. The place name is transliterated as Eshcol.
- source_word: וַיִּרְאוּ אֶת הָאָרֶץ
  chosen: and saw the land
  alternatives:
  - and viewed the land
  - and inspected the land
  lexicon: HALOT
  rationale: ראה is straightforwardly 'see.' In this narrative context it refers to observing the land; 'saw' keeps the wording simple and close to the Hebrew.
- source_word: וַיָּנִיאוּ
  chosen: they discouraged
  alternatives:
  - they disheartened
  - they caused to refuse
  - they alienated
  lexicon: HALOT
  rationale: The Hiphil of נאה/נוא here conveys causing aversion or discouragement. In context, the spies' report caused Israel to shrink back from entering. 'Discouraged' best captures the idiomatic force in clear English.
- source_word: אֶת לֵב בְּנֵי יִשְׂרָאֵל
  chosen: the heart of the sons of Israel
  alternatives:
  - the hearts of the Israelites
  - the heart of the Israelites
  lexicon: HALOT
  rationale: לב in Hebrew often denotes inner resolve/courage. The singular 'heart' is retained because the Hebrew is singular and refers corporately to Israel's resolve. 'Sons of Israel' is more formally aligned with בְּנֵי יִשְׂרָאֵל than 'Israelites,' and preserves the source expression.
- source_word: לְבִלְתִּי בֹא
  chosen: from going
  alternatives:
  - so that they would not go in
  - from entering
  lexicon: HALOT
  rationale: 'לבלתי plus infinitive expresses prevention or result: ''so as not to go/enter.'' ''From going'' works idiomatically after ''discouraged'' in English while preserving the sense of being kept from entering.'
- source_word: אֶל הָאָרֶץ
  chosen: into the land
  alternatives:
  - to the land
  lexicon: HALOT
  rationale: With בוא and אֶל, English idiom favors 'go into the land' in this context of entering the promised land.
- source_word: אֲשֶׁר נָתַן לָהֶם יְהוָה
  chosen: that the LORD had given them
  alternatives:
  - which the LORD gave them
  - that the LORD was giving them
  lexicon: HALOT
  rationale: נתן is a simple past/perfect here. English past perfect ('had given') fits the retrospective narration. Per doctrine, יְהוָה is rendered 'the LORD.'
