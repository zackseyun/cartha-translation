id: NUM.32.20
reference: Numbers 32:20
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֲלֵי/הֶם֙ מֹשֶׁ֔ה אִֽם תַּעֲשׂ֖וּ/ן אֶת הַ/דָּבָ֣ר הַ/זֶּ֑ה אִם תֵּחָֽלְצ֛וּ לִ/פְנֵ֥י יְהוָ֖ה לַ/מִּלְחָמָֽה־־־׃
translation:
  text: And Moses said to them, “If you will do this thing, if you will arm yourselves before Yahweh for battle,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “if you will be equipped,” “if you will go as armed men,” or “if you will muster yourselves.” The Hebrew verb has a military sense of being armed or prepared for battle.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “before the LORD,” indicating that their military action is undertaken in the LORD’s presence and under his authority.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next event in narrative sequence. 'And ... said' preserves the Hebrew narrative flow without overinterpreting temporal nuance.
- source_word: אֲלֵיהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Standard preposition + pronominal suffix indicating indirect object.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: אִם ... תַּעֲשׂוּן
  chosen: If you will do
  alternatives:
  - If you do
  lexicon: HALOT
  rationale: Conditional particle with 2mp imperfect. English 'will do' fits the forward-looking condition in Moses's stipulation; 'do' would also be possible.
- source_word: אֶת־הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this word
  - this matter
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'thing.' Here it refers back to the proposal just made, so 'thing' is natural modern English while still broad enough to cover the concrete commitment.
- source_word: אִם תֵּחָלְצוּ
  chosen: if you will arm yourselves
  alternatives:
  - if you will be equipped
  - if you will go as armed men
  - if you will be mustered
  lexicon: HALOT
  rationale: Nifal of חלץ in military context refers to being equipped/armed for battle. 'Arm yourselves' makes the military sense explicit and reads naturally in English.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'Before the LORD' is the standard concise rendering and preserves the covenantal-theological dimension. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name as specified in DOCTRINE.md.
- source_word: לַמִּלְחָמָה
  chosen: for the war
  alternatives:
  - for battle
  - to the war
  lexicon: HALOT
  rationale: The noun denotes warfare/battle. 'For the war' closely reflects the Hebrew preposition and noun, while fitting the immediate military context. 'For battle' is possible but slightly less formally aligned.
