id: NUM.32.12
reference: Numbers 32:12
source:
  edition: WLC
  text: בִּלְתִּ֞י כָּלֵ֤ב בֶּן יְפֻנֶּה֙ הַ/קְּנִזִּ֔י וִ/יהוֹשֻׁ֖עַ בִּן נ֑וּן כִּ֥י מִלְא֖וּ אַחֲרֵ֥י יְהוָֽה־־׃
translation:
  text: except Caleb son of Jephunneh the Kenizzite, and Joshua son of Nun, because they fully followed Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'followed the LORD wholeheartedly.' The Hebrew idiom is literally 'filled after the LORD,' expressing complete loyalty.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּלְתִּי
  chosen: except
  alternatives:
  - none but
  - except for
  lexicon: HALOT
  rationale: In this context the particle introduces the sole exceptions to the prior judgment. 'Except' is the most natural modern English rendering.
- source_word: כָּלֵב בֶּן יְפֻנֶּה
  chosen: Caleb son of Jephunneh
  rationale: Personal names are transliterated by standard convention, and בֶּן is rendered with the genealogical 'son of'.
- source_word: הַקְּנִזִּי
  chosen: the Kenizzite
  alternatives:
  - the Kenezite
  lexicon: HALOT
  rationale: A gentilicial designation identifying Caleb's clan or ethnic association. 'Kenizzite' is the standard English transliteration.
- source_word: וִיהוֹשֻׁעַ בִּן נוּן
  chosen: and Joshua son of Nun
  rationale: The conjunction joins the second exception; names are transliterated and בִּן is rendered 'son of'.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי gives the reason Caleb and Joshua are excepted. 'Because' makes the causal force explicit in clear modern English.
- source_word: מִלְאוּ אַחֲרֵי
  chosen: fully followed
  alternatives:
  - followed wholeheartedly
  - were fully obedient to
  lexicon: HALOT
  rationale: The idiom literally means 'filled after' and in context denotes complete loyalty in following the LORD. 'Fully followed' preserves the established idiomatic sense without over-paraphrasing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
