id: NUM.32.27
reference: Numbers 32:27
source:
  edition: WLC
  text: וַ/עֲבָדֶ֨י/ךָ יַֽעַבְר֜וּ כָּל חֲל֥וּץ צָבָ֛א לִ/פְנֵ֥י יְהוָ֖ה לַ/מִּלְחָמָ֑ה כַּ/אֲשֶׁ֥ר אֲדֹנִ֖/י דֹּבֵֽר־׃
translation:
  text: But your servants will cross over, every man armed for battle, before Yahweh for the war, just as my lord says.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every one equipped for military service.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'before the LORD,' indicating that their participation in the campaign is undertaken under the LORD's authority and in his presence.
    reason: cultural_note
  - marker: c
    text: Or 'to battle' / 'for the war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲבָדֶיךָ
  chosen: But your servants
  alternatives:
  - and your servants
  - your servants
  lexicon: HALOT
  rationale: עֶבֶד commonly means 'servant' or 'slave.' Here the speakers address Moses deferentially about their own role; 'servants' fits the social-political context without importing the bonded emphasis that would favor 'slaves.' The prefixed waw is rendered 'But' because the clause continues and contrasts with the prior concern, not merely adding information.
- source_word: יַעַבְרוּ
  chosen: will cross over
  alternatives:
  - shall cross over
  - will pass over
  lexicon: HALOT
  rationale: עבר in this context refers to crossing over into the land/river boundary for military action. 'Will cross over' is idiomatic modern English and preserves the movement sense.
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: With the following singular participial form, כָּל is distributive. 'Every' better captures the sense 'each one' rather than a collective 'all.'
- source_word: חֲלוּץ
  chosen: armed
  alternatives:
  - equipped
  - ready
  - drawn up
  lexicon: HALOT
  rationale: In military contexts חלוץ denotes one equipped or arrayed for combat, often one going out armed. 'Armed' is the clearest concise rendering in English.
- source_word: צָבָא
  chosen: for battle
  alternatives:
  - of the army
  - for military service
  - host
  lexicon: HALOT
  rationale: The noun can mean army/host/service. In the collocation כָּל חֲלוּץ צָבָא, the sense is not merely 'every army' but each man outfitted for military action. 'Armed for battle' gives the idiomatic force of the phrase.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before/in the presence of.' 'Before the LORD' is both natural and important, preserving the theological sense that the campaign is undertaken under Yahweh's authority. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: לַמִּלְחָמָה
  chosen: to the war
  alternatives:
  - for the battle
  - to battle
  - for war
  lexicon: HALOT
  rationale: The phrase is directional/purposive. 'To the war' is slightly formal but preserves the Hebrew movement toward the military campaign better than the more interpretive 'to fight.'
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison/conformity with Moses' command. 'Just as' is natural and precise.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  - lord
  lexicon: HALOT
  rationale: Here אֲדֹנִי is a respectful address to Moses, not a divine title. 'My lord' preserves the deferential register without confusing it with the divine name, which is separately rendered 'the LORD.'
- source_word: דֹּבֵר
  chosen: says
  alternatives:
  - speaks
  - has spoken
  lexicon: HALOT
  rationale: 'The participle functions here as a present or immediate discourse reference: ''as my lord says/speaks.'' ''Says'' is the most natural English in direct reported speech.'
