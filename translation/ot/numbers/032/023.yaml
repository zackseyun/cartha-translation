id: NUM.32.23
reference: Numbers 32:23
source:
  edition: WLC
  text: וְ/אִם לֹ֤א תַעֲשׂוּ/ן֙ כֵּ֔ן הִנֵּ֥ה חֲטָאתֶ֖ם לַ/יהוָ֑ה וּ/דְעוּ֙ חַטַּאתְ/כֶ֔ם אֲשֶׁ֥ר תִּמְצָ֖א אֶתְ/כֶֽם־׃
translation:
  text: But if you do not do so, behold, you have sinned against Yahweh, and know that your sin will find you out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your sin will find you' or 'your guilt will overtake you.' The Hebrew idiom conveys inevitable exposure and consequence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with what precedes; 'But if' captures the adversative force in context better than a bare 'if' while remaining natural English.
- source_word: לֹא תַעֲשׂוּן כֵּן
  chosen: you do not do so
  alternatives:
  - you do not do this
  - you do not act thus
  lexicon: HALOT
  rationale: Combines negation, verb, and adverb idiomatically. 'Do so' is concise and refers back to the commanded action in the prior context.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - indeed
  - surely
  lexicon: HALOT
  rationale: Retains the warning and emphatic force of the discourse particle. 'Behold' is slightly elevated but still recognizable and fits the solemn tone.
- source_word: חֲטָאתֶם
  chosen: you have sinned
  alternatives:
  - you will have sinned
  - you have incurred guilt
  lexicon: HALOT
  rationale: The verb from חטא is best rendered verbally here. Perfect aspect in this warning context states the resulting offense if they fail to act; 'you have sinned' is the most direct English equivalent.
- source_word: לַיהוָה
  chosen: against the LORD
  alternatives:
  - to the LORD
  - before the LORD
  lexicon: HALOT
  rationale: With חטא, the preposition marks the one against whom the sin is committed. Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: וּדְעוּ
  chosen: and know
  alternatives:
  - then know
  - be sure
  lexicon: HALOT
  rationale: Imperative plural calling for certainty about the consequence. 'And know' preserves the directness of the Hebrew.
- source_word: חַטַּאתְכֶם
  chosen: your sin
  alternatives:
  - your guilt
  - your sin-offense
  lexicon: HALOT
  rationale: The noun can denote sin or guilt, but here the straightforward sense 'sin' fits the idiom and matches the warning's moral emphasis.
- source_word: אֲשֶׁר תִּמְצָא אֶתְכֶם
  chosen: will find you out
  alternatives:
  - will find you
  - will overtake you
  - will catch up with you
  lexicon: HALOT
  rationale: This is a well-established English rendering that accurately conveys the Hebrew idiom of sin discovering or overtaking the guilty. 'Find you out' communicates exposure and inevitable consequence, not mere location.
