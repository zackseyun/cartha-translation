theological_decisions:
- issue: Sanctuary designation מִשְׁכַּן הָעֵדֻת
  chosen_reading: the tabernacle of the testimony
  alternative_readings:
  - the tent of the testimony
  - the tabernacle of the covenant
  rationale: The phrase is primarily cultic and descriptive, not a point of doctrinal
    dispute. 'Tabernacle of the testimony' stays close to the Hebrew and preserves
    canonical resonance with related Pentateuchal usage. 'Tent' is possible for portability,
    but מִשְׁכָּן specifically denotes the dwelling/tabernacle structure; 'covenant'
    is interpretive rather than lexical here.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency
    of key terms'
