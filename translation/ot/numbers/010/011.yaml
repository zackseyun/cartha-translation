id: NUM.10.11
reference: Numbers 10:11
source:
  edition: WLC
  text: וַ/יְהִ֞י בַּ/שָּׁנָ֧ה הַ/שֵּׁנִ֛ית בַּ/חֹ֥דֶשׁ הַ/שֵּׁנִ֖י בְּ/עֶשְׂרִ֣ים
    בַּ/חֹ֑דֶשׁ נַעֲלָה֙ הֶֽ/עָנָ֔ן מֵ/עַ֖ל מִשְׁכַּ֥ן הָ/עֵדֻֽת׃
translation:
  text: And it happened in the second year, in the second month, on the twentieth
    day of the month, that the cloud lifted from over the tabernacle of the testimony.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rose' or 'went up' for 'lifted.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'tabernacle of the testimony'; also rendered 'tent of the testimony.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event in sequence. 'And
    it happened' preserves the Hebrew narrative transition without archaic English.
- source_word: בַּשָּׁנָה הַשֵּׁנִית
  chosen: in the second year
  lexicon: HALOT
  rationale: Straightforward temporal phrase marking the year count. 'In the second
    year' is the natural English equivalent.
- source_word: בַּחֹדֶשׁ הַשֵּׁנִי
  chosen: in the second month
  lexicon: HALOT
  rationale: Temporal specification within the year; rendered directly and consistently.
- source_word: בְּעֶשְׂרִים בַּחֹדֶשׁ
  chosen: on the twentieth day of the month
  alternatives:
  - on the twentieth of the month
  lexicon: HALOT
  rationale: Hebrew idiom literally 'on twenty in the month' refers to the twentieth
    day. Supplying 'day' is required for clear English while staying close to the
    source.
- source_word: נַעֲלָה
  chosen: lifted
  alternatives:
  - went up
  - rose
  lexicon: HALOT
  rationale: עלה with the subject 'the cloud' describes upward movement from above
    the tabernacle. 'Lifted' fits the context of the cloud's departure signal and
    reads naturally in English.
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Definite noun referring to the known wilderness cloud associated with
    God's guidance; simple direct rendering is sufficient.
- source_word: מֵעַל
  chosen: from over
  alternatives:
  - from above
  lexicon: HALOT
  rationale: The preposition indicates movement away from a position above the tabernacle.
    'From over' preserves the spatial sense more precisely than the broader 'from
    above.'
- source_word: מִשְׁכַּן
  chosen: tabernacle
  alternatives:
  - dwelling place
  lexicon: HALOT
  rationale: Traditional but still clear rendering for the portable sanctuary in the
    wilderness. 'Dwelling place' is possible lexically, but 'tabernacle' is the established
    and contextually precise term.
- source_word: הָעֵדֻת
  chosen: of the testimony
  alternatives:
  - of the covenant document
  - of the witness
  lexicon: HALOT
  rationale: In Pentateuchal sanctuary language, עֵדוּת refers to the testimony, especially
    the covenant witness housed in the sanctuary. 'Tabernacle of the testimony' preserves
    the established biblical expression and its intertextual links.
