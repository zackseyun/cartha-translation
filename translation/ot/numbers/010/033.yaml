id: NUM.10.33
reference: Numbers 10:33
source:
  edition: WLC
  text: וַ/יִּסְעוּ֙ מֵ/הַ֣ר יְהוָ֔ה דֶּ֖רֶךְ שְׁלֹ֣שֶׁת יָמִ֑ים וַ/אֲר֨וֹן בְּרִית
    יְהוָ֜ה נֹסֵ֣עַ לִ/פְנֵי/הֶ֗ם דֶּ֚רֶךְ שְׁלֹ֣שֶׁת יָמִ֔ים לָ/ת֥וּר לָ/הֶ֖ם מְנוּחָֽה־׃
translation:
  text: So they set out from the mountain of the LORD for a journey of three days,
    and the ark of the covenant of the LORD was setting out before them for a journey
    of three days, to seek out a resting place for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'three days' journey' in both occurrences of the phrase.
    reason: lexical_alternative
  - marker: b
    text: Or 'to scout out' or 'to search out' a place of rest for them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: they set out
  alternatives:
  - they journeyed
  - they departed
  lexicon: HALOT
  rationale: From נסע, in travel/camp-movement contexts the sense is to break camp
    and set out. 'Set out' is natural modern English and preserves the narrative movement
    better than the more static 'journeyed'.
- source_word: מֵהַר יְהוָה
  chosen: from the mountain of the LORD
  alternatives:
  - from the mount of the LORD
  - from the mountain of Yahweh
  lexicon: HALOT
  rationale: הַר is straightforwardly 'mountain/mount.' The construct with YHWH is
    rendered 'of the LORD' following the project's default for יְהוָה. 'Mountain'
    is preferred over 'mount' for readable modern English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: דֶּרֶךְ שְׁלֹשֶׁת יָמִים
  chosen: for a journey of three days
  alternatives:
  - three days' journey
  - for three days
  lexicon: HALOT
  rationale: דֶּרֶךְ with a measure of time idiomatically denotes the extent of travel,
    not merely duration. 'For a journey of three days' is clear modern English while
    preserving the idiom's sense.
- source_word: וַאֲרוֹן בְּרִית יְהוָה
  chosen: and the ark of the covenant of the LORD
  alternatives:
  - and the LORD's covenant ark
  - and the ark of the LORD's covenant
  lexicon: HALOT
  rationale: A close rendering of the construct chain. 'Ark of the covenant of the
    LORD' preserves the formal relationship without paraphrase.
- source_word: נֹסֵעַ
  chosen: was setting out
  alternatives:
  - went
  - was going ahead
  lexicon: HALOT
  rationale: The participle conveys ongoing or attendant action in relation to the
    main wayyiqtol. 'Was setting out' reflects the participial aspect while keeping
    the same travel verb family as וַיִּסְעוּ.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - ahead of them
  - in front of them
  lexicon: HALOT
  rationale: The spatial sense is straightforward. 'Before them' is slightly more
    formal and fits the narrative register; 'ahead of them' is a viable alternative.
- source_word: לָתוּר
  chosen: to seek out
  alternatives:
  - to scout out
  - to search out
  - to spy out
  lexicon: HALOT
  rationale: תור means to explore or seek out. Here the object is not enemy territory
    but a suitable stopping place, so 'seek out' fits better than the militarized
    'spy out' and is less colloquial than 'scout out'.
- source_word: מְנוּחָה
  chosen: a resting place
  alternatives:
  - rest
  - a place of rest
  lexicon: HALOT
  rationale: In this travel context, the noun refers concretely to a place of rest
    or encampment rather than abstract rest. 'A resting place' captures that concrete
    sense in idiomatic English.
