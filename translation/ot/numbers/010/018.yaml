id: NUM.10.18
reference: Numbers 10:18
source:
  edition: WLC
  text: וְ/נָסַ֗ע דֶּ֛גֶל מַחֲנֵ֥ה רְאוּבֵ֖ן לְ/צִבְאֹתָ֑/ם וְ/עַל צְבָא֔/וֹ אֱלִיצ֖וּר
    בֶּן שְׁדֵיאֽוּר־־׃
translation:
  text: Then the banner of the camp of Reuben set out by their divisions, and over
    its division was Elizur son of Shedeur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'standard' for 'banner.'
    reason: lexical_alternative
  - marker: b
    text: Or 'according to their companies/hosts'; the Hebrew term can carry an organized,
      military-style sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסַע
  chosen: Then ... set out
  alternatives:
  - And ... set out
  - broke camp
  lexicon: HALOT
  rationale: The waw-consecutive with נסע advances the narrative. 'Set out' is a natural
    English rendering in travel/camp-movement contexts. 'Then' captures the sequential
    force smoothly in English; 'broke camp' is possible but adds an idiomatic nuance
    not explicit in the Hebrew verb itself.
- source_word: דֶּגֶל
  chosen: banner
  alternatives:
  - standard
  - division-banner
  lexicon: HALOT
  rationale: דגל refers to the tribal standard/banner under which the camp moved.
    'Banner' is clear modern English and preserves the concrete image. 'Standard'
    is traditional but slightly less accessible.
- source_word: מַחֲנֵה רְאוּבֵן
  chosen: the camp of Reuben
  alternatives:
  - Reuben's camp
  lexicon: HALOT
  rationale: The construct chain is straightforwardly possessive. 'The camp of Reuben'
    stays close to the Hebrew while remaining natural English.
- source_word: לְצִבְאֹתָם
  chosen: by their divisions
  alternatives:
  - according to their companies
  - by their hosts
  - by their armies
  lexicon: HALOT
  rationale: צבא in Numbers often denotes organized groupings for march order rather
    than military combat alone. 'By their divisions' communicates ordered tribal groupings
    in context without over-militarizing, while preserving the plural sense with the
    3mp suffix.
- source_word: וְעַל צְבָאוֹ
  chosen: and over its division was
  alternatives:
  - and over its company was
  - with Elizur ... over its host
  - and the leader of its division was
  lexicon: HALOT
  rationale: 'The preposition על here indicates authority/oversight: ''over its division.''
    Supplying ''was'' is required in English. ''Its division'' keeps lexical continuity
    with the previous צבא-form and reflects the singular suffix referring to the camp/banner
    unit.'
- source_word: אֱלִיצוּר
  chosen: Elizur
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: בֶּן שְׁדֵיאוּר
  chosen: son of Shedeur
  rationale: Standard patronymic rendering. The father's name is transliterated rather
    than translated.
