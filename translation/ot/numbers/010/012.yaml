id: NUM.10.12
reference: Numbers 10:12
source:
  edition: WLC
  text: וַ/יִּסְע֧וּ בְנֵֽי יִשְׂרָאֵ֛ל לְ/מַסְעֵי/הֶ֖ם מִ/מִּדְבַּ֣ר סִינָ֑י וַ/יִּשְׁכֹּ֥ן
    הֶ/עָנָ֖ן בְּ/מִדְבַּ֥ר פָּארָֽן־׃
translation:
  text: And the sons of Israel set out by stages from the wilderness of Sinai, and
    the cloud settled in the wilderness of Paran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Israelites.'' Hebrew: ''the sons of Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: set out
  alternatives:
  - journeyed
  - departed
  lexicon: HALOT
  rationale: נסע in the travel narrative commonly denotes breaking camp and moving
    on. 'Set out' is natural modern English and preserves the concrete sense better
    than the more archaic 'journeyed.'
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A formally transparent rendering of the Hebrew construct. Because the
    source is explicitly 'sons,' this follows the project's gender-accurate principle.
    'Israelites' is idiomatic but less transparent; 'children of Israel' is traditional
    but less precise in modern English.
- source_word: לְמַסְעֵיהֶם
  chosen: by stages
  alternatives:
  - according to their stages
  - on their journeys
  lexicon: HALOT
  rationale: The plural noun from מסע refers to successive stages or marches of travel.
    'By stages' captures the distributive sense idiomatically in English without overloading
    the line with wooden phrasing.
- source_word: מִמִּדְבַּר סִינָי
  chosen: from the wilderness of Sinai
  alternatives:
  - from the desert of Sinai
  lexicon: HALOT
  rationale: מִדְבָּר is well rendered 'wilderness' in Pentateuchal narrative, preserving
    the geographic and theological resonance of an uncultivated region without implying
    only sand desert.
- source_word: וַיִּשְׁכֹּן
  chosen: settled
  alternatives:
  - came to rest
  - dwelt
  - abode
  lexicon: HALOT
  rationale: שכן means to settle/dwell. Here the subject is the cloud stopping over
    a location, so 'settled' is concise and natural. 'Dwelt' is too static and archaic
    in this travel context.
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Definite reference to the known cloud of divine guidance in the wilderness
    narrative; straightforward rendering is best.
- source_word: בְּמִדְבַּר פָּארָן
  chosen: in the wilderness of Paran
  alternatives:
  - in the desert of Paran
  lexicon: HALOT
  rationale: Retains the standard rendering of מִדְבָּר as 'wilderness' and transliterates
    the place name Paran per project policy on names.
