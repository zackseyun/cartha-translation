id: NUM.10.28
reference: Numbers 10:28
source:
  edition: WLC
  text: אֵ֛לֶּה מַסְעֵ֥י בְנֵֽי יִשְׂרָאֵ֖ל לְ/צִבְאֹתָ֑/ם וַ/יִּסָּֽעוּ־׃ס
translation:
  text: These were the stages of the sons of Israel by their divisions, and they set
    out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the journeys' or 'the departures' for 'the stages.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites'; literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'according to their hosts' or 'by their companies.' The Hebrew suggests
      organized groupings for travel.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These are
  lexicon: HALOT
  rationale: Demonstrative plural introducing a summary statement. English idiom prefers
    'These were' in this narrative retrospective context, even though Hebrew has no
    explicit copula.
- source_word: מַסְעֵי
  chosen: the stages
  alternatives:
  - the journeys
  - the departures
  - the marchings
  lexicon: HALOT
  rationale: Construct plural from מסע, referring to travel stages or marching movements.
    'Stages' fits the wilderness-travel context and avoids the awkwardness of 'journeys'
    in a verse summarizing successive departures.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Per gender-accurate philosophy, the familial
    expression is preserved rather than neutralized to 'Israelites,' though that remains
    a viable idiomatic alternative.
- source_word: לְצִבְאֹתָם
  chosen: by their divisions
  alternatives:
  - according to their hosts
  - by their companies
  - by their armies
  lexicon: HALOT
  rationale: צבאות commonly denotes organized companies/hosts arranged for marching.
    'By their divisions' communicates ordered military-style grouping in readable
    modern English without overstating active warfare.
- source_word: וַיִּסָּעוּ
  chosen: and they set out
  alternatives:
  - and they journeyed
  - and they departed
  lexicon: HALOT
  rationale: Wayyiqtol of נסע in travel narrative. 'Set out' is natural modern English
    for beginning movement from one place to another.
