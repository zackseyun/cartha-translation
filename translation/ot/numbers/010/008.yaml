theological_decisions:
- issue: Rendering of חקת עולם
  chosen_reading: a permanent statute
  alternative_readings:
  - a statute forever
  - an everlasting statute
  rationale: The phrase denotes an enduring ordinance within Israel's covenantal life.
    'Permanent' preserves the legal-continuing force without forcing a philosophical
    claim about absolute endless duration in every possible sense. This follows optimal
    equivalence and preserves theological tension where עולם can denote long duration
    or perpetuity depending on context.
  doctrine_reference: Translation philosophy §3, §6
