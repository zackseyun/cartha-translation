id: NUM.10.8
reference: Numbers 10:8
source:
  edition: WLC
  text: וּ/בְנֵ֤י אַהֲרֹן֙ הַ/כֹּ֣הֲנִ֔ים יִתְקְע֖וּ בַּֽ/חֲצֹצְר֑וֹת וְ/הָי֥וּ לָ/כֶ֛ם
    לְ/חֻקַּ֥ת עוֹלָ֖ם לְ/דֹרֹתֵי/כֶֽם׃
translation:
  text: And the sons of Aaron, the priests, shall blow the trumpets; and this shall
    be for you a permanent statute throughout your generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “an everlasting statute” or “a statute forever.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי אַהֲרֹן
  chosen: And the sons of Aaron
  alternatives:
  - And Aaron's sons
  lexicon: HALOT
  rationale: בני literally means 'sons of.' Kept the familial expression rather than
    flattening to a more interpretive phrase, while using standard English word order.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Appositional identification of 'the sons of Aaron' as 'the priests.'
    Straightforward lexical rendering.
- source_word: יִתְקְעוּ
  chosen: shall blow
  alternatives:
  - are to blow
  - must blow
  lexicon: HALOT
  rationale: תקע with trumpets means 'blow' or 'sound.' 'Shall blow' fits the instructional/legal
    context without overstating as an imperative beyond the Hebrew imperfect's force
    here.
- source_word: בַּחֲצֹצְרֹת
  chosen: the trumpets
  alternatives:
  - the silver trumpets
  lexicon: HALOT
  rationale: חצצרות denotes trumpets. 'Silver' is not stated in this verse, though
    established in the immediate context (v. 2), so it is not imported into the main
    text.
- source_word: וְהָיוּ לָכֶם
  chosen: and this shall be for you
  alternatives:
  - and they shall be for you
  - and it shall be for you
  lexicon: HALOT
  rationale: The plural verb formally refers back to the preceding matter, but idiomatic
    English often uses singular 'this' to summarize the ordinance as a whole. This
    best conveys the legal sense in natural English.
- source_word: לְחֻקַּת עוֹלָם
  chosen: a permanent statute
  alternatives:
  - a statute forever
  - an everlasting statute
  lexicon: HALOT
  rationale: חקת עולם is a common legal formula. 'Permanent statute' preserves enduring
    force while using readable modern English; 'forever/everlasting' is possible but
    can sound more absolute in English than the idiom sometimes requires.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - from generation to generation
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the phrase indicating ongoing applicability
    across successive generations.
