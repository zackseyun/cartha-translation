theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of וֲנִזְכַּרְתֶּם
  chosen_reading: you shall be remembered before the LORD your God
  alternative_readings:
  - the LORD your God will remember you
  rationale: 'The passive wording preserves the Hebrew verbal form and theological tension: the text states Israel''s being brought into remembrance before God through the trumpet alarm, without needing to restate God explicitly as subject in the main text.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
