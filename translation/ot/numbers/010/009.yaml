id: NUM.10.9
reference: Numbers 10:9
source:
  edition: WLC
  text: וְ/כִֽי תָבֹ֨אוּ מִלְחָמָ֜ה בְּ/אַרְצְ/כֶ֗ם עַל הַ/צַּר֙ הַ/צֹּרֵ֣ר אֶתְ/כֶ֔ם וַ/הֲרֵעֹתֶ֖ם בַּ/חֲצֹצְר֑וֹת וֲ/נִזְכַּרְתֶּ֗ם לִ/פְנֵי֙ יְהוָ֣ה אֱלֹֽהֵי/כֶ֔ם וְ/נוֹשַׁעְתֶּ֖ם מֵ/אֹיְבֵי/כֶֽם־־׃
translation:
  text: And when you go to war in your land against the enemy who oppresses you, then you shall sound an alarm with the trumpets, and you shall be remembered before Yahweh your God, and you shall be saved from your enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And if you go to war in your land.' The Hebrew conjunction can introduce either a conditional or a situational clause.
    reason: alternative_reading
  - marker: b
    text: Or, 'you shall be brought to remembrance before the LORD your God,' or more interpretively, 'the LORD your God will remember you.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''the LORD'' represents the divine name YHWH.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And when
  alternatives:
  - And if
  - When
  lexicon: HALOT
  rationale: In legal/instructional contexts, כִּי with prefixed ו can introduce a situational clause best rendered 'when' or 'if.' Here the sense is a future contingency within covenant instruction; 'And when' preserves the discourse flow from the preceding commands while sounding natural in English.
- source_word: תָבֹאוּ מִלְחָמָה
  chosen: you go to war
  alternatives:
  - you come into battle
  - you enter war
  lexicon: HALOT
  rationale: The idiom 'come/go war' means to engage in warfare. English idiom favors 'go to war' rather than a more wooden 'come to war.'
- source_word: בְּאַרְצְכֶם
  chosen: in your land
  alternatives:
  - in your country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the Israelites' own land/territory. 'Land' preserves covenantal and territorial resonance better than the more modern-political 'country.'
- source_word: עַל הַצַּר הַצֹּרֵר אֶתְכֶם
  chosen: against the adversary who is oppressing you
  alternatives:
  - against the enemy who harasses you
  - against the foe who attacks you
  lexicon: HALOT
  rationale: 'The paired noun and participle intensify the hostile figure: צַר can mean adversary/distresser, and צֹרֵר denotes one acting hostilely or oppressively. ''Adversary who is oppressing you'' preserves both the nominal and participial force without collapsing them into a single generic ''enemy.'''
- source_word: וַהֲרֵעֹתֶם
  chosen: you shall sound an alarm
  alternatives:
  - you shall blow loudly
  - you shall raise a blast
  lexicon: HALOT
  rationale: From רוע in the Hiphil, in trumpet contexts the sense is to give a signal/alarm blast rather than merely make noise. 'Sound an alarm' captures the military signaling function.
- source_word: בַּחֲצֹצְרֹת
  chosen: with the trumpets
  alternatives:
  - on the trumpets
  lexicon: HALOT
  rationale: חֲצֹצְרֹת are the cultic/silver trumpets described in this chapter. 'With the trumpets' is idiomatic for the instrument used to sound the alarm.
- source_word: וֲנִזְכַּרְתֶּם לִפְנֵי יְהוָה אֱלֹהֵיכֶם
  chosen: you shall be remembered before the LORD your God
  alternatives:
  - you shall be brought to remembrance before the LORD your God
  - the LORD your God will remember you
  lexicon: HALOT
  rationale: 'The Niphal of זכר is passive/reflexive in form: ''be remembered'' or ''come to remembrance.'' Retaining the passive avoids over-interpreting the syntax while preserving the covenantal idea that the trumpet blast brings Israel before God for his favorable attention.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְנוֹשַׁעְתֶּם
  chosen: you shall be saved
  alternatives:
  - you shall be delivered
  - you shall be rescued
  lexicon: HALOT
  rationale: The Niphal of ישׁע denotes being saved/delivered. 'Saved' is a standard rendering and fits the military context here without excluding the broader covenantal resonance of divine salvation.
- source_word: מֵאֹיְבֵיכֶם
  chosen: from your enemies
  alternatives:
  - from those who hate you
  lexicon: HALOT
  rationale: אֹיֵב is the standard term for enemy. 'From your enemies' is direct and idiomatic.
