id: NUM.10.15
reference: Numbers 10:15
source:
  edition: WLC
  text: וְ/עַ֨ל צְבָ֔א מַטֵּ֖ה בְּנֵ֣י יִשָׂשכָ֑ר נְתַנְאֵ֖ל בֶּן צוּעָֽר־־׃
translation:
  text: And over the company of the tribe of the sons of Issachar was Nethanel the
    son of Zuar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'host' or 'division' for 'company' (Hebrew צְבָא), reflecting an organized
      tribal body in marching order.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: And over
  alternatives:
  - Over
  - Now over
  lexicon: HALOT
  rationale: The conjunction plus preposition links this verse to the preceding list
    and introduces the leader set over a tribal division. 'And over' preserves the
    coordination and the supervisory sense of עַל in this formulaic context.
- source_word: צְבָא
  chosen: company
  alternatives:
  - host
  - division
  - army
  lexicon: HALOT
  rationale: In Numbers 10 this term refers to the ordered tribal group in procession,
    not necessarily a fighting force in the immediate sense. 'Company' is natural
    modern English and preserves the idea of an organized body without over-militarizing
    the line; 'host' is more traditional but archaic, and 'division' is possible but
    more interpretive.
- source_word: מַטֵּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  lexicon: HALOT
  rationale: Here מַטֵּה clearly denotes a tribal unit, not a literal staff. 'Tribe'
    is the standard contextual sense in census and camp-order passages.
- source_word: בְּנֵי יִשָׂשכָר
  chosen: the sons of Issachar
  alternatives:
  - the people of Issachar
  - the descendants of Issachar
  lexicon: HALOT
  rationale: The Hebrew literally says 'sons of Issachar.' Per the translation philosophy,
    gender-accurate rendering is preferred where it matches the source. In this tribal
    formula, 'sons of Issachar' is both literal and idiomatic enough in English.
- source_word: נְתַנְאֵל
  chosen: Nethanel
  rationale: Personal names are transliterated by standard convention.
- source_word: בֶּן צוּעָר
  chosen: the son of Zuar
  alternatives:
  - son of Zuar
  rationale: The filial construction identifies Nethanel. Including 'the' yields smoother
    English in a full sentence while preserving the Hebrew relationship.
