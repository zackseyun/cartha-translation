id: NUM.10.20
reference: Numbers 10:20
source:
  edition: WLC
  text: וְ/עַל צְבָ֖א מַטֵּ֣ה בְנֵי גָ֑ד אֶלְיָסָ֖ף בֶּן דְּעוּאֵֽל־־־׃
translation:
  text: And over the company of the tribe of the sons of Gad was Eliasaph son of Deuel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'host' or 'division' for 'company'; the Hebrew צְבָא often has military
      overtones, but here it refers to the ordered tribal marching group.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  chosen: And over
  alternatives:
  - and concerning
  - and upon
  lexicon: HALOT
  rationale: In this recurring leadership-list formula, the conjunction plus עַל introduces
    the leader set 'over' a tribal division. 'And over' preserves the syntactic linkage
    with the preceding verses and the supervisory sense of עַל.
- source_word: צְבָא
  chosen: company
  alternatives:
  - host
  - division
  - army
  lexicon: HALOT
  rationale: Although צָבָא can denote an army or host, in Numbers 10 this refers
    to the ordered marching body of each tribe within Israel's camp. 'Company' communicates
    an organized group without overstating a purely military sense; 'division' is
    possible but slightly more interpretive.
- source_word: מַטֵּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  - tribal staff
  lexicon: HALOT
  rationale: Here מַטֶּה is the standard term for a tribal unit, not the literal object
    'staff.' 'Tribe' is the plain contextual sense in this census/march arrangement
    material.
- source_word: בְנֵי גָד
  chosen: the sons of Gad
  alternatives:
  - the children of Gad
  - the Gadites
  lexicon: HALOT
  rationale: The Hebrew construct literally reads 'sons of Gad.' This is a standard
    tribal designation. 'The sons of Gad' preserves the source form and remains natural
    enough in English; 'Gadites' is smoother but less formally transparent.
- source_word: אֶלְיָסָף
  chosen: Eliasaph
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: בֶּן דְּעוּאֵל
  chosen: son of Deuel
  rationale: The patronymic construction is rendered straightforwardly as 'son of
    Deuel,' preserving the Hebrew genealogical formula.
