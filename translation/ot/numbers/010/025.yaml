id: NUM.10.25
reference: Numbers 10:25
source:
  edition: WLC
  text: וְ/נָסַ֗ע דֶּ֚גֶל מַחֲנֵ֣ה בְנֵי דָ֔ן מְאַסֵּ֥ף לְ/כָל הַֽ/מַּחֲנֹ֖ת לְ/צִבְאֹתָ֑/ם
    וְ/עַל צְבָא֔/וֹ אֲחִיעֶ֖זֶר בֶּן עַמִּישַׁדָּֽי־־־־׃
translation:
  text: Then the banner of the camp of the sons of Dan set out, serving as the rear
    guard for all the camps by their divisions; and over its division was Ahiezer
    the son of Ammishaddai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'standard' for 'banner.'
    reason: lexical_alternative
  - marker: b
    text: Or 'bringing up the rear' for 'serving as the rear guard.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term can also be rendered 'hosts' or 'companies'; here it refers
      to the organized tribal divisions in the marching order.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסַע
  chosen: Then ... set out
  alternatives:
  - And ... set out
  - And ... journeyed
  lexicon: HALOT
  rationale: The waw-consecutive with נסע advances the narrative. 'Set out' is idiomatic
    modern English for the movement of the camp in this travel context; 'Then' captures
    the sequential force naturally.
- source_word: דֶּגֶל
  chosen: banner
  alternatives:
  - standard
  lexicon: HALOT
  rationale: דגל denotes the tribal standard/banner under which a camp marched. 'Banner'
    is readable modern English; 'standard' is possible but slightly more archaic/military
    in tone.
- source_word: מַחֲנֵה
  chosen: camp
  alternatives:
  - encampment
  lexicon: HALOT
  rationale: The construct phrase דגל מחנה is best rendered 'banner of the camp.'
    'Camp' is the normal concise rendering for the Israelite tribal encampment.
- source_word: בְנֵי דָן
  chosen: the sons of Dan
  alternatives:
  - the people of Dan
  - the descendants of Dan
  lexicon: HALOT
  rationale: Following the gender-accurate principle, בני is rendered 'sons' rather
    than neutralized. In tribal formulas this refers corporately to the Danites, but
    the literal familial expression is still transparent and natural enough in English.
- source_word: מְאַסֵּף
  chosen: serving as the rear guard
  alternatives:
  - gathering up
  - bringing up the rear
  - rear guard
  lexicon: HALOT
  rationale: In this marching context, מאסף refers to the unit moving last, protecting
    and collecting the rear. 'Serving as the rear guard' conveys the participial function
    clearly. A more literal 'gathering up' would be obscure in English.
- source_word: לְכָל הַמַּחֲנֹת
  chosen: for all the camps
  alternatives:
  - of all the camps
  - for all the camp divisions
  lexicon: HALOT
  rationale: The phrase indicates Dan's role relative to the whole marching formation.
    'For all the camps' communicates that Dan functioned as rear guard on behalf of
    the entire camp arrangement.
- source_word: לְצִבְאֹתָם
  chosen: by their divisions
  alternatives:
  - according to their hosts
  - by their companies
  - according to their armies
  lexicon: HALOT
  rationale: צבאות in Numbers often refers to organized tribal groupings for march/order
    rather than combat armies in the narrow sense. 'By their divisions' is clear and
    fits the logistical context.
- source_word: וְעַל צְבָאוֹ
  chosen: and over its division was
  alternatives:
  - and over its host was
  - and the leader of its division was
  lexicon: HALOT
  rationale: The preposition על with צבא introduces the leader set over that tribal
    division. 'Over its division was' preserves the Hebrew structure while remaining
    intelligible. 'Its' refers back to the camp/banner grouping of Dan.
- source_word: אֲחִיעֶזֶר בֶּן עַמִּישַׁדָּי
  chosen: Ahiezer the son of Ammishaddai
  rationale: Personal names are transliterated per project philosophy. 'The son of'
    preserves the standard Hebrew patronymic formula.
