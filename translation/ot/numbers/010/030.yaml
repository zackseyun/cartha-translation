id: NUM.10.30
reference: Numbers 10:30
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֵלָ֖י/ו לֹ֣א אֵלֵ֑ךְ כִּ֧י אִם אֶל אַרְצִ֛/י וְ/אֶל מוֹלַדְתִּ֖/י
    אֵלֵֽךְ־־־׃
translation:
  text: But he said to him, “I will not go. Rather, I will go to my own land and to
    my own kindred.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and to my relatives'; the Hebrew term can also mean 'birthplace' or
      'native place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלָיו
  chosen: But he said to him
  alternatives:
  - And he said to him
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. English can render it as
    'and,' but 'but' better reflects the adversative sense in context, since this
    is a refusal to Moses' request in the preceding verse.
- source_word: לֹא אֵלֵךְ
  chosen: I will not go
  alternatives:
  - I am not going
  - I will not come
  lexicon: HALOT
  rationale: The Qal imperfect 1cs of הלך here expresses volition/intention in direct
    speech. 'I will not go' is the most natural English refusal. 'Come' would be too
    interpretive because the Hebrew verb is simply 'go.'
- source_word: כִּי אִם
  chosen: Rather
  alternatives:
  - but
  - except that
  - instead
  lexicon: HALOT
  rationale: 'In this construction after a negation, כִּי אִם introduces the contrasting
    positive statement: not X, but rather Y. ''Rather'' captures the corrective force
    in concise modern English.'
- source_word: אֶל אַרְצִי
  chosen: to my own land
  alternatives:
  - to my land
  - to my country
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'country.' 'Land' is slightly more literal and
    fits the patriarchal/geographical sense. 'My own' brings out the possessive suffix
    naturally in English emphasis.
- source_word: וְאֶל מוֹלַדְתִּי
  chosen: and to my own kindred
  alternatives:
  - and to my relatives
  - and to my birthplace
  - and to my native land
  lexicon: HALOT
  rationale: מוֹלֶדֶת/מוֹלַדְתִּי can denote birthplace, native place, or kinship
    group. In this context, paired with 'my land,' rendering it as 'my own kindred'
    avoids redundancy and reflects the social/familial sense likely intended. The
    alternatives are viable and worth preserving.
- source_word: אֵלֵךְ
  chosen: I will go
  alternatives:
  - I am going
  lexicon: HALOT
  rationale: Repeated Qal imperfect 1cs of הלך mirrors the earlier refusal and states
    his intended course. 'I will go' preserves the parallelism and resolve.
