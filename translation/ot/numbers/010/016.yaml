id: NUM.10.16
reference: Numbers 10:16
source:
  edition: WLC
  text: וְ/עַ֨ל צְבָ֔א מַטֵּ֖ה בְּנֵ֣י זְבוּלֻ֑ן אֱלִיאָ֖ב בֶּן חֵלֽוֹן־־׃
translation:
  text: And over the company of the tribe of the sons of Zebulun was Eliab son of
    Helon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'host' or 'division' for 'company'; the Hebrew צְבָא denotes an organized
      tribal contingent in marching order.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: And over
  alternatives:
  - Over
  - And concerning
  lexicon: HALOT
  rationale: In this repeated leadership formula in Numbers 10, וְ links the clause
    to the preceding list item, and עַל with an implied verb of authority indicates
    supervision or command. 'And over' preserves the coordinative flow and the sense
    of authority.
- source_word: צְבָא
  chosen: company
  alternatives:
  - host
  - army
  - division
  lexicon: HALOT
  rationale: In the wilderness-march context, צְבָא refers to the organized tribal
    contingent. 'Company' is natural modern English and broad enough to cover a military-style
    formation without overstating it as a standing army. 'Host' is traditional but
    archaic; 'division' is possible but more technical than the Hebrew requires.
- source_word: מַטֵּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  lexicon: HALOT
  rationale: Here מַטֵּה is the standard social-political sense for a tribal unit,
    not the literal object 'staff.' 'Tribe' is the established and contextually correct
    rendering.
- source_word: בְּנֵי זְבוּלֻן
  chosen: the sons of Zebulun
  alternatives:
  - the people of Zebulun
  - the descendants of Zebulun
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Zebulun.' Per the gender-accurate policy,
    the familial expression is retained rather than neutralized. In tribal formulas,
    it denotes the members/descendants of the tribe through the eponymous ancestor.
- source_word: אֱלִיאָב
  chosen: Eliab
  rationale: Personal name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: בֶּן חֵלֹן
  chosen: son of Helon
  rationale: Standard Hebrew patronymic construction. 'Son of Helon' is the direct
    and natural rendering.
