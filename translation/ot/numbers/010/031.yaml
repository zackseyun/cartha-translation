id: NUM.10.31
reference: Numbers 10:31
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר אַל נָ֖א תַּעֲזֹ֣ב אֹתָ֑/נוּ כִּ֣י עַל כֵּ֣ן יָדַ֗עְתָּ חֲנֹתֵ֨/נוּ֙
    בַּ/מִּדְבָּ֔ר וְ/הָיִ֥יתָ לָּ֖/נוּ לְ/עֵינָֽיִם־׀־׃
translation:
  text: And he said, “Please do not leave us, because you know where we should camp
    in the wilderness, and you will serve as eyes for us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “you will be eyes for us,” that is, a guide because
      of your knowledge of the wilderness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech; 'And he said'
    preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: אַל נָא
  chosen: Please do not
  alternatives:
  - Do not, please
  lexicon: HALOT
  rationale: אַל gives prohibition and נָא adds entreaty/politeness. 'Please do not'
    is natural modern English and preserves the pleading tone.
- source_word: תַּעֲזֹב אֹתָנוּ
  chosen: leave us
  alternatives:
  - forsake us
  - abandon us
  lexicon: HALOT
  rationale: עזב commonly means leave, forsake, abandon. 'Leave us' best fits the
    immediate travel context while avoiding an overly theologically loaded 'forsake'.
- source_word: כִּי עַל כֵּן
  chosen: because
  alternatives:
  - for therefore
  - for this reason
  lexicon: HALOT
  rationale: The combination introduces the reason for the plea. In English, 'because'
    communicates the causal force clearly and idiomatically.
- source_word: יָדַעְתָּ
  chosen: you know
  alternatives:
  - you have known
  lexicon: HALOT
  rationale: Perfect verb with present relevance; English present best conveys Hobab's
    ongoing knowledge.
- source_word: חֲנֹתֵנוּ
  chosen: where we should camp
  alternatives:
  - our camping places
  - our encamping
  - how we camp
  lexicon: HALOT
  rationale: From חנה, 'to camp/encamp.' The form with 1cp suffix likely refers to
    Israel's camping/encampment. Rendering it as 'where we should camp' makes the
    sense explicit in natural English. The more literal 'our camping places' is possible
    but less idiomatic here.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness region rather than sandy desert specifically.
    'Wilderness' is the established and contextually accurate rendering.
- source_word: וְהָיִיתָ לָּנוּ לְעֵינַיִם
  chosen: and you will serve as eyes for us
  alternatives:
  - and you will be eyes for us
  - and you will be our guide
  lexicon: HALOT
  rationale: Literally 'you will be to us for eyes.' The idiom suggests guidance based
    on local knowledge. 'Serve as eyes for us' preserves the metaphor while remaining
    intelligible. 'Our guide' captures the sense but loses the Hebrew imagery.
