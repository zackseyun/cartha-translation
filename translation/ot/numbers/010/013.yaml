id: NUM.10.13
reference: Numbers 10:13
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ בָּ/רִאשֹׁנָ֑ה עַל פִּ֥י יְהוָ֖ה בְּ/יַד מֹשֶֽׁה־־׃
translation:
  text: So they set out for the first time at the command of Yahweh through Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the hand of Moses,'' an idiom meaning through Moses as mediator or agent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: they set out
  alternatives:
  - they journeyed
  - they departed
  lexicon: HALOT
  rationale: נסע in the travel narrative commonly denotes breaking camp and moving on. 'Set out' is natural modern English and captures the ingressive sense better than the more generic 'journeyed'.
- source_word: בָּרִאשֹׁנָה
  chosen: for the first time
  alternatives:
  - first
  - at first
  lexicon: HALOT
  rationale: The adverbial feminine form means 'at first' or 'for the first time.' In this context of Israel's initial departure from Sinai in ordered stages, 'for the first time' best conveys the inaugural sense.
- source_word: עַל פִּי
  chosen: at the command of
  alternatives:
  - according to
  - by the mouth of
  lexicon: HALOT
  rationale: The idiom על פי literally means 'upon the mouth of' but functionally means 'according to' or 'at the command of.' Here the context is obedience to divine direction, so 'at the command of' makes the force explicit in idiomatic English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיַד מֹשֶׁה
  chosen: through Moses
  alternatives:
  - by the hand of Moses
  - by Moses
  lexicon: HALOT
  rationale: The idiom 'by the hand of' often marks agency or mediation. 'Through Moses' preserves Moses' mediating role in clear contemporary English without flattening the idiom's sense.
