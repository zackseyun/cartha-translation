id: NUM.10.24
reference: Numbers 10:24
source:
  edition: WLC
  text: וְ/עַ֨ל צְבָ֔א מַטֵּ֖ה בְּנֵ֣י בִנְיָמִ֑ן אֲבִידָ֖ן בֶּן גִּדְעוֹנִֽי־־׃ס
translation:
  text: And over the company of the tribe of the sons of Benjamin was Abidan son of
    Gideoni.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'host' or 'division' for 'company'; the Hebrew term can denote an organized
      military-style formation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  chosen: And over
  alternatives:
  - and
  - over
  - upon
  lexicon: HALOT
  rationale: The conjunction plus preposition continues the marching-order list from
    the preceding verses and introduces the leader set 'over' the tribal company.
    'And over' preserves both the connective and supervisory sense.
- source_word: צְבָא
  chosen: company
  alternatives:
  - host
  - army
  - division
  lexicon: HALOT
  rationale: In Numbers 10 this term refers to the ordered tribal marching formation
    rather than a combat army in the narrow sense. 'Company' is natural modern English
    while retaining the organized-group sense.
- source_word: מַטֶּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  - tribal staff
  lexicon: HALOT
  rationale: Here the noun is used in its common census/military-administrative sense
    for a tribal unit, not the literal object 'staff.'
- source_word: בְּנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the children of Benjamin
  - the people of Benjamin
  - Benjaminites
  lexicon: HALOT
  rationale: A relatively formal rendering fits the repeated tribal formula in this
    section. 'Sons of Benjamin' preserves the Hebrew construction and genealogical
    flavor better than the more interpretive 'Benjaminites.'
- source_word: אֲבִידָן
  chosen: Abidan
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: בֶּן גִּדְעוֹנִי
  chosen: son of Gideoni
  rationale: Standard patronymic rendering; 'son of' is the natural equivalent of
    בן in genealogical identification.
