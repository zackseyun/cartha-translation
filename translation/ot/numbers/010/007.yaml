id: NUM.10.7
reference: Numbers 10:7
source:
  edition: WLC
  text: וּ/בְ/הַקְהִ֖יל אֶת הַ/קָּהָ֑ל תִּתְקְע֖וּ וְ/לֹ֥א תָרִֽיעוּ־׃
translation:
  text: But when assembling the congregation, you shall blow, and you shall not sound
    an alarm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blow an alarm blast.' The Hebrew contrasts ordinary blowing with the
      distinctive alarm signal used for setting out in the surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/הַקְהִיל
  chosen: But when assembling
  alternatives:
  - And when gathering
  - But in gathering together
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition with the Hiphil infinitive
    construct of קהל gives a temporal sense, 'and/when causing to assemble.' 'But
    when assembling' fits the contrast with the previous verse, where an alarm blast
    signaled movement, while here a simple blowing signals assembly.
- source_word: הַקָּהָל
  chosen: the congregation
  alternatives:
  - the assembly
  - the community
  lexicon: HALOT
  rationale: קָהָל commonly denotes the assembled community of Israel. 'Congregation'
    is natural in this cultic/communal setting and distinguishes the people gathered
    from the act of gathering.
- source_word: תִּתְקְעוּ
  chosen: you shall blow
  alternatives:
  - you shall sound
  - you shall blow the trumpets
  lexicon: HALOT
  rationale: תקע in this context refers to blowing the trumpets. 'You shall blow'
    is concise and faithful; 'the trumpets' is implied from context but not repeated
    in the Hebrew of this verse, so it is not supplied in the main text.
- source_word: וְלֹא
  chosen: and you shall not
  alternatives:
  - but not
  - and not
  lexicon: HALOT
  rationale: The conjunction with negation coordinates the second clause with the
    first. In English, repeating 'you shall' yields a clear legal/instructional cadence.
- source_word: תָרִיעוּ
  chosen: sound an alarm
  alternatives:
  - raise a shout
  - blow an alarm blast
  - sound a signal
  lexicon: HALOT
  rationale: רוע/הֵרִיעַ in trumpet contexts refers to giving the distinctive alarm
    signal rather than merely making noise. 'Sound an alarm' best captures the technical
    contrast with the ordinary blowing in the first clause.
