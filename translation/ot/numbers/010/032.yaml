id: NUM.10.32
reference: Numbers 10:32
source:
  edition: WLC
  text: וְ/הָיָ֖ה כִּי תֵלֵ֣ךְ עִמָּ֑/נוּ וְ/הָיָ֣ה הַ/טּ֣וֹב הַ/ה֗וּא אֲשֶׁ֨ר יֵיטִ֧יב
    יְהוָ֛ה עִמָּ֖/נוּ וְ/הֵטַ֥בְנוּ לָֽ/ךְ־׀׃
translation:
  text: And if you go with us, then whatever good the LORD does for us, we will do
    the same good for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'that good which the LORD will do with us, we will do
      for you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And if
  alternatives:
  - And it shall be, if
  - And when
  lexicon: HALOT
  rationale: The clause-opening וְהָיָה with כִּי introduces a conditional/result
    construction. In natural English, 'And if' best captures the sense without woodenly
    preserving the idiom 'and it shall be.' 'When' would overstate certainty where
    the Hebrew still presents a condition.
- source_word: תֵלֵךְ עִמָּנוּ
  chosen: you go with us
  alternatives:
  - you come with us
  - you travel with us
  lexicon: HALOT
  rationale: הלך with עִם here refers to accompanying Israel on the journey. 'Go with
    us' is the most direct and idiomatic rendering in context.
- source_word: וְהָיָה
  chosen: then
  alternatives:
  - and it shall be
  - and it will happen
  lexicon: HALOT
  rationale: The second וְהָיָה marks the apodosis/result of the condition. 'Then'
    conveys this function clearly in English.
- source_word: הַטּוֹב הַהוּא
  chosen: whatever good
  alternatives:
  - that good
  - the good
  lexicon: HALOT
  rationale: The phrase points to the good benefit in view, further defined by the
    relative clause. In English, 'whatever good' best captures the open-ended sense
    of benefit that the LORD may grant, whereas 'that good' sounds awkward and overly
    literal.
- source_word: אֲשֶׁר יֵיטִיב יְהוָה עִמָּנוּ
  chosen: the LORD does for us
  alternatives:
  - the LORD grants us
  - the LORD deals well with us
  - the LORD bestows on us
  lexicon: HALOT
  rationale: The Hiphil of יטב means to do good, treat well, or benefit. 'Does for
    us' is clear modern English and preserves the verbal connection with the following
    clause. The divine name יְהוָה follows the project's default rendering 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name is rendered 'the LORD' rather
    than transliterated.
- source_word: וְהֵטַבְנוּ לָךְ
  chosen: we will do the same good for you
  alternatives:
  - we will do good to you
  - we will treat you well
  - we will benefit you
  lexicon: HALOT
  rationale: 'The Hiphil of יטב here mirrors the previous verb, so the translation
    preserves that reciprocity with ''the same good.'' This makes explicit the parallelism:
    as the LORD benefits Israel, Israel will benefit Hobab.'
