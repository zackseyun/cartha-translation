id: NUM.10.23
reference: Numbers 10:23
source:
  edition: WLC
  text: וְ/עַ֨ל צְבָ֔א מַטֵּ֖ה בְּנֵ֣י מְנַשֶּׁ֑ה גַּמְלִיאֵ֖ל בֶּן פְּדָה צֽוּר־־־׃
translation:
  text: And over the company of the tribe of the sons of Manasseh was Gamaliel son
    of Pedahzur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew צְבָא can also be rendered 'host,' 'army,' or 'division'; here it
      refers to the organized tribal contingent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: And over
  alternatives:
  - and upon
  - and in charge of
  lexicon: HALOT
  rationale: In this recurring camp-order formula, וְ plus עַל introduces the leader
    set over a tribal division. 'And over' preserves the formal structure while remaining
    natural in English.
- source_word: צְבָא
  chosen: company
  alternatives:
  - host
  - army
  - division
  lexicon: HALOT
  rationale: Here צְבָא refers to the organized tribal contingent in the wilderness
    marching/camp arrangement, not necessarily an army in the narrow combat sense.
    'Company' is readable modern English and fits the administrative context.
- source_word: מַטֵּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  lexicon: HALOT
  rationale: In Numbers, מַטֵּה commonly denotes a tribal unit. 'Tribe' is the established
    and contextually correct sense here.
- source_word: בְּנֵי מְנַשֶּׁה
  chosen: the sons of Manasseh
  alternatives:
  - the children of Manasseh
  - the descendants of Manasseh
  lexicon: HALOT
  rationale: The Hebrew construct literally reads 'sons of Manasseh.' Per the project's
    gender-accurate philosophy, the masculine form is retained where it denotes the
    named tribal lineage. This is also the standard tribal designation in this context.
- source_word: גַּמְלִיאֵל
  chosen: Gamaliel
  rationale: Personal name transliterated according to standard English convention,
    following the project's policy to transliterate names rather than translate them.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical linkage. 'Son of' is concise and idiomatic in English.
- source_word: פְּדָה צוּר
  chosen: Pedahzur
  rationale: This is the personal name פְּדָהצוּר (Pedahzur), written in the consonantal
    text across two elements by orthography/spacing. It should be represented as the
    single conventional proper name 'Pedahzur' in English.
