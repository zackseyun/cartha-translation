id: NUM.10.17
reference: Numbers 10:17
source:
  edition: WLC
  text: וְ/הוּרַ֖ד הַ/מִּשְׁכָּ֑ן וְ/נָסְע֤וּ בְנֵֽי גֵרְשׁוֹן֙ וּ/בְנֵ֣י מְרָרִ֔י
    נֹשְׂאֵ֖י הַ/מִּשְׁכָּֽן־׃ס
translation:
  text: Then the tabernacle was taken down, and the sons of Gershon and the sons of
    Merari set out, carrying the tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Gershonites and the Merarites.' The Hebrew reads 'the sons of Gershon
      and the sons of Merari.'
    reason: lexical_alternative
  - marker: b
    text: That is, they carried the tabernacle after it had been taken down; the Hebrew
      repeats 'the tabernacle' rather than explicitly saying 'its parts.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהוּרַד
  chosen: was taken down
  alternatives:
  - was lowered
  - was dismantled
  lexicon: HALOT
  rationale: Hophal of ירד conveys a passive/causative sense, here referring to the
    tabernacle being brought down from its erected state. 'Was taken down' is idiomatic
    English and fits the camp-march context better than the more literal 'was lowered.'
    'Was dismantled' is possible contextually but slightly over-interprets the mechanics.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the dwelling
  lexicon: HALOT
  rationale: מִשְׁכָּן is the standard term for Israel's sanctuary tent in Exodus-Numbers.
    'Tabernacle' is the established and accurate English equivalent in this cultic
    context; alternatives are more etymological but less natural here.
- source_word: וְנָסְעוּ
  chosen: set out
  alternatives:
  - journeyed
  - departed
  lexicon: HALOT
  rationale: נסע in travel contexts means to break camp and move on. 'Set out' captures
    the beginning of movement in natural modern English better than the somewhat archaic
    'journeyed' or the flatter 'departed.'
- source_word: בְנֵי גֵרְשׁוֹן
  chosen: the sons of Gershon
  alternatives:
  - the Gershonites
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Gershon.' This preserves the clan-based
    expression of the source. 'Gershonites' is a valid contextual equivalent but is
    not the form used here.
- source_word: וּבְנֵי מְרָרִי
  chosen: the sons of Merari
  alternatives:
  - the Merarites
  lexicon: HALOT
  rationale: As with 'sons of Gershon,' the Hebrew explicitly uses the filial/clan
    expression. Retaining 'sons of Merari' preserves the source wording and parallelism.
- source_word: נֹשְׂאֵי
  chosen: carrying
  alternatives:
  - bearing
  - those carrying
  lexicon: HALOT
  rationale: The participle describes their role as they traveled. 'Carrying' is clear,
    contemporary, and fits the syntax smoothly in English. 'Bearing' is more formal
    but less natural.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - its parts of the tabernacle
  lexicon: HALOT
  rationale: The second occurrence again reads 'the tabernacle.' Although context
    implies they carried the tabernacle's components after taking it down, the Hebrew
    itself repeats the same noun without specifying 'parts,' so the translation should
    not add that detail to the main text.
