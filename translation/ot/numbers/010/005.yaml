id: NUM.10.5
reference: Numbers 10:5
source:
  edition: WLC
  text: וּ/תְקַעְתֶּ֖ם תְּרוּעָ֑ה וְ/נָֽסְעוּ֙ הַֽ/מַּחֲנ֔וֹת הַ/חֹנִ֖ים קֵֽדְמָ/ה׃
translation:
  text: When you blow an alarm blast, the camps that are encamped on the east side
    shall set out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a signal blast.' The Hebrew term refers here to the distinctive trumpet
      sounding that signaled movement of the camp.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּתְקַעְתֶּם
  chosen: When you blow
  alternatives:
  - And you shall blow
  - and you blow
  lexicon: HALOT
  rationale: תקע with trumpets means to blow/sound them. Although the form is prefixed
    with conjunction, in English the clause functions naturally as a temporal instruction
    introducing the result clause, hence 'When you blow' rather than a wooden 'And
    you shall blow.'
- source_word: תְּרוּעָה
  chosen: an alarm blast
  alternatives:
  - a blast
  - a shout
  - a signal blast
  lexicon: HALOT
  rationale: תְּרוּעָה in the trumpet-signaling context of Numbers 10 denotes a distinctive
    alarm/signal blast rather than a generic sound. 'Alarm blast' best captures the
    technical signaling sense in readable English.
- source_word: וְנָסְעוּ
  chosen: shall set out
  alternatives:
  - shall journey
  - shall depart
  - will set out
  lexicon: HALOT
  rationale: נסע for camp movement commonly means to set out or break camp. 'Shall
    set out' is idiomatic and fits the instructional tone.
- source_word: הַמַּחֲנוֹת
  chosen: the camps
  alternatives:
  - the camp divisions
  - the camps of Israel
  lexicon: HALOT
  rationale: The plural refers to the tribal camp groupings arranged around the tabernacle.
    'The camps' is the direct and sufficient rendering.
- source_word: הַחֹנִים
  chosen: that are encamped
  alternatives:
  - camping
  - which camp
  - that camp
  lexicon: HALOT
  rationale: The participle modifies 'the camps' and describes their present position.
    'That are encamped' preserves the stative sense more clearly than the terser 'that
    camp.'
- source_word: קֵדְמָה
  chosen: on the east side
  alternatives:
  - eastward
  - to the east
  - toward the east
  lexicon: HALOT
  rationale: The directional adverb here identifies the eastern position of the camps
    in the camp arrangement. 'On the east side' makes the locational force explicit
    in natural English.
