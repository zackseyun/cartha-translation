id: NUM.10.27
reference: Numbers 10:27
source:
  edition: WLC
  text: וְ/עַ֨ל צְבָ֔א מַטֵּ֖ה בְּנֵ֣י נַפְתָּלִ֑י אֲחִירַ֖ע בֶּן עֵינָֽן־־׃
translation:
  text: And over the company of the tribe of the sons of Naphtali was Ahira son of
    Enan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'army,' 'host,' or 'division' for 'company.' The Hebrew צְבָא refers
      to an organized tribal contingent in the camp-and-march arrangement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: And over
  alternatives:
  - and upon
  - and over
  lexicon: HALOT
  rationale: In this repeated leadership formula, וְ links the clause to the preceding
    list and עַל introduces the person set 'over' a military/tribal unit. 'And over'
    preserves the syntactic pattern naturally in English.
- source_word: צְבָא
  chosen: company
  alternatives:
  - army
  - host
  - division
  lexicon: HALOT
  rationale: צְבָא can denote army/host/military service. In this census-and-march
    context it refers to the organized tribal contingent. 'Company' gives a readable
    modern rendering without overstating a standing national army, while still reflecting
    an ordered military grouping.
- source_word: מַטֵּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  - tribal staff
  lexicon: HALOT
  rationale: Here מַטֵּה is the standard term for a tribal unit, not the literal object
    'staff.' 'Tribe' is the established and contextually correct sense.
- source_word: בְּנֵי נַפְתָּלִי
  chosen: the sons of Naphtali
  alternatives:
  - the people of Naphtali
  - the descendants of Naphtali
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of.' Per the gender-accurate philosophy,
    the familial expression is retained rather than neutralized. In tribal formulas
    this denotes the clan/tribal descendants of Naphtali.
- source_word: אֲחִירַע
  chosen: Ahira
  rationale: Personal name transliterated by standard English convention, following
    the project's policy to transliterate names rather than translate them.
- source_word: בֶּן עֵינָן
  chosen: son of Enan
  alternatives:
  - the son of Enan
  lexicon: HALOT
  rationale: Standard Hebrew patronymic construction. 'Son of Enan' is concise and
    idiomatic in English genealogical style.
