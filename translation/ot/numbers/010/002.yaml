id: NUM.10.2
reference: Numbers 10:2
source:
  edition: WLC
  text: עֲשֵׂ֣ה לְ/ךָ֗ שְׁתֵּי֙ חֲצֽוֹצְרֹ֣ת כֶּ֔סֶף מִקְשָׁ֖ה תַּעֲשֶׂ֣ה אֹתָ֑/ם
    וְ/הָי֤וּ לְ/ךָ֙ לְ/מִקְרָ֣א הָֽ/עֵדָ֔ה וּ/לְ/מַסַּ֖ע אֶת הַֽ/מַּחֲנֽוֹת־׃
translation:
  text: Make for yourself two silver trumpets; you shall make them of hammered work,
    and they shall be for you for summoning the congregation and for setting the camps
    out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for calling the congregation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and for the departure of the camps.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲשֵׂה לְךָ
  chosen: Make for yourself
  alternatives:
  - Make yourself
  - Make
  lexicon: HALOT
  rationale: The imperative עֲשֵׂה with לְךָ is naturally rendered with a reflexive
    nuance, indicating Moses is to have these made for his own use/charge. 'Make for
    yourself' preserves the Hebrew construction without sounding overly wooden.
- source_word: שְׁתֵּי חֲצֹצְרֹת כֶּסֶף
  chosen: two silver trumpets
  alternatives:
  - two trumpets of silver
  lexicon: HALOT
  rationale: 'חֲצֹצְרָה refers to a straight trumpet rather than a curved horn; ''trumpets''
    is the standard and clearest English equivalent. כֶּסֶף is attributive/material:
    ''silver trumpets'' is idiomatic English.'
- source_word: מִקְשָׁה
  chosen: of hammered work
  alternatives:
  - of hammered metal
  - beaten work
  - of one piece
  lexicon: HALOT
  rationale: מִקְשָׁה denotes something made by hammering/beating out metal. 'Of hammered
    work' preserves the manufacturing sense. 'Of one piece' is too interpretive here,
    though sometimes associated with the result of hammered craftsmanship.
- source_word: תַּעֲשֶׂה אֹתָם
  chosen: you shall make them
  alternatives:
  - make them
  lexicon: HALOT
  rationale: The imperfect following the initial imperative functions instructionally,
    reinforcing the command. 'You shall make them' fits English legislative/instructional
    style and mirrors the Hebrew emphasis.
- source_word: וְהָיוּ לְךָ
  chosen: and they shall be for you
  alternatives:
  - and they shall serve you
  - and they shall be yours
  lexicon: HALOT
  rationale: The Hebrew expresses purpose/use rather than ownership alone. 'They shall
    be for you' keeps the formal structure and leads naturally into the stated functions.
- source_word: לְמִקְרָא הָעֵדָה
  chosen: for summoning the congregation
  alternatives:
  - for calling the congregation
  - for assembling the congregation
  lexicon: HALOT
  rationale: מִקְרָא here is a summons/calling, and הָעֵדָה is the assembled community/congregation
    of Israel. 'Summoning the congregation' is concise and captures the functional
    purpose of the trumpets.
- source_word: וּלְמַסַּע אֶת הַמַּחֲנוֹת
  chosen: and for setting the camps out
  alternatives:
  - and for the breaking camp of the camps
  - and for moving the camps out
  - and for the departure of the camps
  lexicon: HALOT
  rationale: מַסַּע can denote setting out/journeying/departure. In this wilderness-camp
    context, the phrase refers to signaling the camps to depart in order. 'Setting
    the camps out' is natural modern English and preserves the causative-functional
    sense better than the archaic 'breaking camp.'
