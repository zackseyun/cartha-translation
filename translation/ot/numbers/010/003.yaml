id: NUM.10.3
reference: Numbers 10:3
source:
  edition: WLC
  text: וְ/תָקְע֖וּ בָּ/הֵ֑ן וְ/נֽוֹעֲד֤וּ אֵלֶ֨י/ךָ֙ כָּל הָ֣/עֵדָ֔ה אֶל פֶּ֖תַח
    אֹ֥הֶל מוֹעֵֽד־־׃
translation:
  text: When they blow them, all the congregation shall assemble before you at the
    entrance of the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And they shall blow them, and all the congregation shall
      gather to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְתָקְעוּ
  chosen: When they blow
  alternatives:
  - And they shall blow
  - And when they blow
  lexicon: HALOT
  rationale: 'The verb תקע with trumpets means ''blow/sound.'' Although formally a
    waw + qatal can be rendered ''and they shall blow,'' in this procedural context
    it functions conditionally/temporally: ''when they blow.'' This best fits the
    instruction sequence and natural English.'
- source_word: בָּהֵן
  chosen: them
  alternatives:
  - with them
  - on them
  lexicon: HALOT
  rationale: The feminine plural pronoun refers back to the two silver trumpets in
    the preceding verse. English idiom with 'blow' takes a direct object ('blow them'),
    though the Hebrew uses a preposition.
- source_word: וְנוֹעֲדוּ
  chosen: shall assemble
  alternatives:
  - shall gather
  - shall meet
  - shall present themselves
  lexicon: HALOT
  rationale: From יעד in the Niphal, the sense here is that the community gathers
    by appointment/summons. 'Shall assemble' communicates the collective response
    to the trumpet signal more naturally than the more literal but less idiomatic
    'shall meet.'
- source_word: אֵלֶיךָ
  chosen: before you
  alternatives:
  - to you
  - unto you
  lexicon: HALOT
  rationale: Although literally 'to you,' the context is the congregation gathering
    in Moses' presence at a specified location. 'Before you' is idiomatic English
    for appearing in someone's presence and fits the assembly setting.
- source_word: כָּל הָעֵדָה
  chosen: all the congregation
  alternatives:
  - the whole congregation
  - all the assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled covenant community of Israel. 'Congregation'
    is a standard and clear rendering in Numbers, preserving the corporate sense.
- source_word: פֶּתַח
  chosen: the entrance
  alternatives:
  - the doorway
  - the opening
  lexicon: HALOT
  rationale: פֶּתַח denotes the entry point. 'Entrance' is natural modern English
    and fits a tent structure.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tent of appointment
  lexicon: HALOT
  rationale: This is the established rendering for the tabernacle-related phrase in
    the Pentateuch. It preserves the connection with appointed meeting while remaining
    idiomatic and recognizable.
