id: NUM.10.4
reference: Numbers 10:4
source:
  edition: WLC
  text: וְ/אִם בְּ/אַחַ֖ת יִתְקָ֑עוּ וְ/נוֹעֲד֤וּ אֵלֶ֨י/ךָ֙ הַ/נְּשִׂיאִ֔ים רָאשֵׁ֖י
    אַלְפֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: But if they blow only one, then the leaders, the heads of the thousands of
    Israel, shall gather to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the heads of the thousands of Israel' likely refers to leaders over
      Israel's thousand-unit divisions; some translations render more interpretively
      as 'the chiefs of the clans of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the previous instruction. 'But
    if' captures the adversative nuance in context better than a bare 'if,' while
    remaining natural English.
- source_word: בְּ/אַחַת
  chosen: only one
  alternatives:
  - with one
  - one
  lexicon: HALOT
  rationale: Refers elliptically to one trumpet blast/one trumpet in contrast to both
    trumpets in the preceding verse. 'Only one' makes the contrast clear in idiomatic
    English without over-paraphrasing.
- source_word: יִתְקָעוּ
  chosen: they blow
  alternatives:
  - they sound
  - they trumpet
  lexicon: HALOT
  rationale: From תקע in the trumpet-signaling context, meaning to blow/sound. 'Blow'
    is the most direct and natural English verb for trumpets.
- source_word: וְ/נוֹעֲדוּ
  chosen: shall gather
  alternatives:
  - shall assemble
  - shall meet by appointment
  lexicon: HALOT
  rationale: Niphal of יעד here denotes assembling at an appointed summons. 'Shall
    gather' is clear modern English and fits the signaling context; 'assemble' is
    possible but slightly stiffer.
- source_word: אֵלֶי/ךָ
  chosen: to you
  alternatives:
  - before you
  lexicon: HALOT
  rationale: The preposition indicates movement toward Moses. 'To you' is the plain
    sense.
- source_word: הַ/נְּשִׂיאִים
  chosen: the leaders
  alternatives:
  - the chiefs
  - the princes
  lexicon: HALOT
  rationale: נשיאים denotes tribal leaders/chieftains. 'Leaders' communicates the
    role clearly in contemporary English without the potentially misleading royal
    sense of 'princes.'
- source_word: רָאשֵׁי אַלְפֵי יִשְׂרָאֵל
  chosen: the heads of the thousands of Israel
  alternatives:
  - the heads of Israel's clans
  - the chiefs of the thousands of Israel
  lexicon: HALOT
  rationale: A construct chain identifying these leaders as heads over Israel's thousand-units.
    Retaining 'thousands' preserves the Hebrew administrative/military terminology
    more transparently than interpreting it as 'clans' in the main text.
