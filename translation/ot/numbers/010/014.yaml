id: NUM.10.14
reference: Numbers 10:14
source:
  edition: WLC
  text: וַ/יִּסַּ֞ע דֶּ֣גֶל מַחֲנֵ֧ה בְנֵֽי יְהוּדָ֛ה בָּ/רִאשֹׁנָ֖ה לְ/צִבְאֹתָ֑/ם
    וְ/עַל צְבָא֔/וֹ נַחְשׁ֖וֹן בֶּן עַמִּינָדָֽב־־־׃
translation:
  text: The standard of the camp of the sons of Judah set out first, by their divisions;
    and over its division was Nahshon son of Amminadab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'banner' for 'standard.' The Hebrew term denotes the tribal ensign under
      which the camp unit marched.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to their companies/hosts.' The Hebrew has a military-organizational
      term for the ordered tribal units.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסַּע
  chosen: set out
  alternatives:
  - departed
  - marched out
  - journeyed
  lexicon: HALOT
  rationale: From נסע in the wilderness-travel context, the verb denotes breaking
    camp and moving onward. 'Set out' is natural modern English and fits the narrative
    sequence better than the more wooden 'journeyed.'
- source_word: דֶּגֶל
  chosen: standard
  alternatives:
  - banner
  - division
  lexicon: HALOT
  rationale: The term refers to the tribal standard/banner under which a camp unit
    moved. 'Standard' preserves the military-camp sense without reducing it merely
    to the cloth object; 'banner' is possible but slightly less idiomatic here.
- source_word: מַחֲנֵה
  chosen: camp
  alternatives:
  - encampment
  lexicon: HALOT
  rationale: The construct phrase דֶּגֶל מַחֲנֵה is best rendered 'the standard of
    the camp,' referring to the camp-unit organized under a standard.
- source_word: בְנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the people of Judah
  - the descendants of Judah
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the Hebrew expression literally. In
    tribal/genealogical contexts 'sons of' is a standard formal designation and should
    be preserved rather than flattened to 'people of' unless context requires it.
- source_word: בָּרִאשֹׁנָה
  chosen: first
  alternatives:
  - at the first
  - in front
  lexicon: HALOT
  rationale: Adverbial use indicating order of march. 'First' is the clearest idiomatic
    rendering.
- source_word: לְצִבְאֹתָם
  chosen: by their divisions
  alternatives:
  - according to their companies
  - by their hosts
  - by their armies
  lexicon: HALOT
  rationale: צבא in this census/march context refers to organized military-style groupings.
    'Divisions' communicates ordered units in readable English without overstating
    literal warfare in this verse.
- source_word: וְעַל צְבָאוֹ
  chosen: and over its division was
  alternatives:
  - and over its company was
  - and the leader of its host was
  lexicon: HALOT
  rationale: The preposition על with צבאו introduces the person in charge of that
    tribal unit. 'Over its division was' preserves the Hebrew structure and leadership
    sense. The singular suffix refers back to the camp-standard unit of Judah.
- source_word: נַחְשׁוֹן בֶּן עַמִּינָדָב
  chosen: Nahshon son of Amminadab
  alternatives:
  - Nahshon the son of Amminadab
  rationale: Personal names are transliterated by standard conventions per project
    philosophy.
