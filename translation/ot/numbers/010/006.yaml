id: NUM.10.6
reference: Numbers 10:6
source:
  edition: WLC
  text: וּ/תְקַעְתֶּ֤ם תְּרוּעָה֙ שֵׁנִ֔ית וְ/נָֽסְעוּ֙ הַֽ/מַּחֲנ֔וֹת הַ/חֹנִ֖ים
    תֵּימָ֑נָ/ה תְּרוּעָ֥ה יִתְקְע֖וּ לְ/מַסְעֵי/הֶֽם׃
translation:
  text: When you blow a second alarm, the camps that are encamped on the south side
    shall set out; they shall blow an alarm for their departures.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blast' or 'signal' for 'alarm' (Hebrew תְּרוּעָה), a distinctive trumpet
      call used to direct the camps.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּתְקַעְתֶּם
  chosen: when you blow
  alternatives:
  - and you shall blow
  - you are to blow
  lexicon: HALOT
  rationale: From תקע, 'to blow' a trumpet/horn in this context. English 'when you
    blow' gives natural instruction-sequence sense while preserving the second person
    plural address.
- source_word: תְּרוּעָה
  chosen: alarm
  alternatives:
  - blast
  - shout
  lexicon: HALOT
  rationale: In the trumpet-signaling context of Numbers 10, תְּרוּעָה refers to a
    distinctive signal blast rather than a generic sound. 'Alarm' best captures a
    sharp signal used to cue movement.
- source_word: שֵׁנִית
  chosen: second
  alternatives:
  - a second time
  lexicon: HALOT
  rationale: Adjectival/ordinal use modifying תְּרוּעָה; 'a second alarm' is concise
    and idiomatic.
- source_word: וְנָסְעוּ
  chosen: shall set out
  alternatives:
  - shall journey
  - shall depart
  lexicon: HALOT
  rationale: From נסע in camp-travel context. 'Set out' is natural modern English
    for breaking camp and beginning travel.
- source_word: הַמַּחֲנוֹת
  chosen: the camps
  alternatives:
  - the camp divisions
  lexicon: HALOT
  rationale: Plural noun referring to the tribal camp groupings. 'Camps' is the most
    direct rendering.
- source_word: הַחֹנִים
  chosen: that are encamped
  alternatives:
  - camping
  - which camp
  lexicon: HALOT
  rationale: Participle from חנה describing the camps by their stationed location.
    'That are encamped' preserves the stative descriptive force.
- source_word: תֵּימָנָה
  chosen: on the south side
  alternatives:
  - southward
  - to the south
  lexicon: HALOT
  rationale: Directional term with locative ending. In context it identifies the southern
    camp position, not merely motion; 'on the south side' communicates location clearly.
- source_word: תְּרוּעָה יִתְקְעוּ
  chosen: they shall blow an alarm
  alternatives:
  - an alarm blast they shall blow
  - they shall sound a signal
  lexicon: HALOT
  rationale: Repetition of noun + verb emphasizes the prescribed signal. Rendered
    straightforwardly in English while retaining the object 'alarm'.
- source_word: לְמַסְעֵיהֶם
  chosen: for their departures
  alternatives:
  - for setting out
  - for their journeys
  lexicon: HALOT
  rationale: From מסע, 'breaking camp/journey stage/departure.' Here it refers to
    the occasions of setting out. 'For their departures' stays close to the Hebrew
    while fitting the procedural instruction.
