id: NUM.10.26
reference: Numbers 10:26
source:
  edition: WLC
  text: וְ/עַל צְבָ֔א מַטֵּ֖ה בְּנֵ֣י אָשֵׁ֑ר פַּגְעִיאֵ֖ל בֶּן עָכְרָֽן־־׃
translation:
  text: And over the company of the tribe of the sons of Asher was Pagiel son of Ocran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'host,' 'division,' or 'army' for 'company'; the Hebrew denotes an organized
      contingent in Israel's camp order.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  chosen: And over
  alternatives:
  - and concerning
  - and upon
  lexicon: HALOT
  rationale: The conjunction plus preposition continues the list structure from the
    surrounding verses and introduces the leader set 'over' the tribal company. 'And
    over' preserves the syntactic linkage and administrative sense.
- source_word: צְבָא
  chosen: company
  alternatives:
  - host
  - division
  - army
  lexicon: HALOT
  rationale: In the camp-order context of Numbers 10, the term refers to an organized
    tribal contingent. 'Company' is readable modern English and preserves the ordered-group
    sense without overstating a combat setting as 'army' might.
- source_word: מַטֵּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  lexicon: HALOT
  rationale: Here the word denotes a tribal unit, not a literal staff. 'Tribe' is
    the standard contextual sense in census and camp-order passages.
- source_word: בְּנֵי אָשֵׁר
  chosen: the sons of Asher
  alternatives:
  - the children of Asher
  - the descendants of Asher
  lexicon: HALOT
  rationale: The Hebrew construct is literally 'sons of Asher.' Per the translation
    philosophy, this is rendered gender-accurately rather than neutralized, while
    still functioning idiomatically as the tribal designation.
- source_word: פַּגְעִיאֵל
  chosen: Pagiel
  rationale: Personal names are transliterated by standard convention.
- source_word: בֶּן עָכְרָן
  chosen: son of Ocran
  alternatives:
  - ben Ocran
  rationale: Hebrew patronymic construction is naturally rendered 'son of.' The father's
    name is transliterated rather than translated.
