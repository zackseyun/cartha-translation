id: NUM.10.19
reference: Numbers 10:19
source:
  edition: WLC
  text: וְ/עַ֨ל צְבָ֔א מַטֵּ֖ה בְּנֵ֣י שִׁמְע֑וֹן שְׁלֻֽמִיאֵ֖ל בֶּן צוּרִֽי שַׁדָּֽי־־׃
translation:
  text: And over the company of the tribe of the sons of Simeon was Shelumiel son
    of Zurishaddai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'division' or 'host' for 'company' (Hebrew צְבָא), referring to the organized
      tribal contingent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  chosen: And over
  alternatives:
  - and concerning
  - and upon
  lexicon: HALOT
  rationale: In this marching-order context, עַל introduces the leader set over a
    tribal division. 'And over' preserves the structural repetition from the surrounding
    verses and reads naturally in English.
- source_word: צְבָא
  chosen: company
  alternatives:
  - host
  - division
  - army
  lexicon: HALOT
  rationale: Here צְבָא refers to the organized tribal contingent in Israel's camp
    order, not necessarily an army in active combat. 'Company' captures an ordered
    group without over-militarizing the immediate context; 'division' is possible
    but slightly more interpretive.
- source_word: מַטֵּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  lexicon: HALOT
  rationale: In census and camp-order contexts מַטֵּה is the standard term for a tribal
    unit. 'Tribe' is the plain contextual sense.
- source_word: בְּנֵי שִׁמְעוֹן
  chosen: the sons of Simeon
  alternatives:
  - the people of Simeon
  - the descendants of Simeon
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Simeon.' Per the translation philosophy,
    gender-accurate rendering is preferred where it matches the source. Here it is
    a conventional tribal designation, so the literal form is retained.
- source_word: שְׁלֻמִיאֵל
  chosen: Shelumiel
  rationale: Personal name transliterated by standard English convention, following
    the project's policy to transliterate names rather than translate them.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: In a direct patronymic, 'son of' is the standard and most transparent
    rendering.
- source_word: צוּרִי שַׁדָּי
  chosen: Zurishaddai
  rationale: Personal name transliterated as a single conventional form in English
    biblical usage.
