id: NUM.10.35
reference: Numbers 10:35
source:
  edition: WLC
  text: וַ/יְהִ֛י בִּ/נְסֹ֥עַ הָ/אָרֹ֖ן וַ/יֹּ֣אמֶר מֹשֶׁ֑ה קוּמָ֣/ה יְהוָ֗ה וְ/יָפֻ֨צוּ֙ אֹֽיְבֶ֔י/ךָ וְ/יָנֻ֥סוּ מְשַׂנְאֶ֖י/ךָ מִ/פָּנֶֽי/ךָ׀׃
translation:
  text: And whenever the ark set out, Moses said, “Rise up, O Yahweh, and let your enemies be scattered, and let those who hate you flee before you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And it happened when the ark set out'; the Hebrew idiom can be rendered more formally, but here likely has the sense 'whenever the ark set out.'
    reason: lexical_alternative
  - marker: b
    text: '''Rise up'' is an appeal for the LORD to act in power, not a suggestion that God was literally inactive.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי בִּנְסֹעַ
  chosen: And whenever ... set out
  alternatives:
  - And it happened when ... set out
  - Whenever ... set out
  lexicon: HALOT
  rationale: The waw + היה with infinitive construct introduces a recurring circumstance here, not merely a one-time event. 'Whenever' captures the idiomatic force in readable English, while retaining the temporal sense.
- source_word: הָאָרֹן
  chosen: the ark
  alternatives:
  - the ark of the covenant
  lexicon: HALOT
  rationale: The Hebrew text has simply 'the ark.' Expanding to 'ark of the covenant' would import context not explicitly present in this verse.
- source_word: קוּמָה
  chosen: Rise up
  alternatives:
  - Arise
  - Stand up
  lexicon: HALOT
  rationale: An imperative addressed to YHWH, idiomatically invoking divine action. 'Rise up' is natural modern English and preserves the vivid metaphor of God acting in power.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְיָפֻצוּ
  chosen: let ... be scattered
  alternatives:
  - may ... be scattered
  - and ... will be scattered
  lexicon: HALOT
  rationale: The imperfect following the imperative is jussive in force, expressing Moses' petition. 'Let ... be scattered' best conveys the prayer-like volitive sense.
- source_word: אֹיְבֶיךָ
  chosen: your enemies
  alternatives:
  - those hostile to you
  lexicon: HALOT
  rationale: A straightforward rendering of the plural construct with second masculine singular suffix, addressed to the LORD.
- source_word: וְיָנֻסוּ
  chosen: let ... flee
  alternatives:
  - may ... flee
  - and ... will flee
  lexicon: HALOT
  rationale: Like the previous verb, this imperfect is jussive/volitive after the imperative. 'Let ... flee' preserves the parallel petition structure.
- source_word: מְשַׂנְאֶיךָ
  chosen: those who hate you
  alternatives:
  - your haters
  - those who are hostile to you
  lexicon: HALOT
  rationale: The participial form denotes ongoing characterization. 'Those who hate you' is idiomatic and preserves the personal opposition to the LORD.
- source_word: מִפָּנֶיךָ
  chosen: before you
  alternatives:
  - from before you
  - from your presence
  lexicon: HALOT
  rationale: '''Before you'' is the most natural English rendering here, expressing retreat in the presence of the LORD. ''From your presence'' is possible but less idiomatic in this military-prayer context.'
