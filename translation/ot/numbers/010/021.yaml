id: NUM.10.21
reference: Numbers 10:21
source:
  edition: WLC
  text: וְ/נָסְעוּ֙ הַ/קְּהָתִ֔ים נֹשְׂאֵ֖י הַ/מִּקְדָּ֑שׁ וְ/הֵקִ֥ימוּ אֶת הַ/מִּשְׁכָּ֖ן
    עַד בֹּאָֽ/ם־־׃ס
translation:
  text: Then the Kohathites set out, carrying the holy things, and the tabernacle
    was set up before they arrived.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'carrying the sanctuary' or 'bearers of the sanctuary';
      here the phrase refers to the sacred furnishings carried by the Kohathites,
      distinguished from the tabernacle structure mentioned next.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסְעוּ
  chosen: Then ... set out
  alternatives:
  - and ... set out
  - and ... departed
  lexicon: HALOT
  rationale: The waw with נסע continues the travel narrative. 'Set out' is idiomatic
    and fits the camp-march context better than the more generic 'departed.' 'Then'
    reflects sequential narrative force in smooth English.
- source_word: הַקְּהָתִים
  chosen: the Kohathites
  alternatives:
  - the sons of Kohath
  lexicon: HALOT
  rationale: This is the standard gentilic/plural designation for the clan descended
    from Kohath. 'Kohathites' is the natural English rendering.
- source_word: נֹשְׂאֵי הַמִּקְדָּשׁ
  chosen: carrying the holy things
  alternatives:
  - bearers of the sanctuary
  - carrying the sanctuary objects
  lexicon: HALOT
  rationale: Although literally 'bearers of the sanctuary,' in context this refers
    to the Kohathites transporting the sacred objects/furnishings, not the sanctuary
    structure itself. 'Holy things' is a clear contextual rendering that avoids misleading
    readers into thinking they carried the whole sanctuary.
- source_word: הַמִּקְדָּשׁ
  chosen: the holy things
  alternatives:
  - the sanctuary
  - the sacred objects
  lexicon: HALOT
  rationale: Here מִקְדָּשׁ is best understood metonymically for the holy items associated
    with the sanctuary, since the next clause distinguishes the tabernacle structure
    itself. Rendering it woodenly as 'sanctuary' in English would create confusion.
- source_word: וְהֵקִימוּ אֶת־הַמִּשְׁכָּן
  chosen: and the tabernacle was set up
  alternatives:
  - and they set up the tabernacle
  - while the tabernacle was being set up
  lexicon: HALOT
  rationale: The Hebrew uses a 3mp verb without an explicit subject; context indicates
    the non-Kohathite Levites had already gone ahead with the tabernacle structure.
    English passive best conveys the sense without forcing an ambiguous 'they.'
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the tent dwelling
  lexicon: HALOT
  rationale: '''Tabernacle'' is the established and accurate rendering for מִשְׁכָּן
    in this wilderness-sanctuary context.'
- source_word: עַד בֹּאָם
  chosen: before they arrived
  alternatives:
  - until their coming
  - by the time they came
  lexicon: HALOT
  rationale: This clause indicates that the tabernacle had been erected by the time
    the Kohathites arrived with the holy objects. 'Before they arrived' expresses
    the temporal relationship naturally in English.
