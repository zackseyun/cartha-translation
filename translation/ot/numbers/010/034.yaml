id: NUM.10.34
reference: Numbers 10:34
source:
  edition: WLC
  text: וַ/עֲנַ֧ן יְהוָ֛ה עֲלֵי/הֶ֖ם יוֹמָ֑ם בְּ/נָסְעָ֖/ם מִן הַֽ/מַּחֲנֶֽה־׃׆ס
translation:
  text: And the cloud of the LORD was over them by day when they set out from the
    camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was upon them by day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/עֲנַן
  chosen: And the cloud
  alternatives:
  - Now the cloud
  - The cloud
  lexicon: HALOT
  rationale: עָנָן means 'cloud.' The prefixed conjunction is rendered 'And' to preserve
    the narrative linkage with the preceding verse. The noun is definite by construct
    with the divine name, so 'the cloud' is appropriate.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Following the project's contested-terms policy, the Tetragrammaton is
    rendered 'the LORD' rather than transliterated.
- source_word: עֲלֵיהֶם
  chosen: was over them
  alternatives:
  - was upon them
  - was above them
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix indicates position over or
    upon them. English idiom favors 'was over them' for the protective/locative sense
    of the cloud.
- source_word: יוֹמָם
  chosen: by day
  alternatives:
  - in the daytime
  - daytime
  lexicon: HALOT
  rationale: The adverb יוֹמָם means 'by day' or 'in the daytime.' 'By day' is concise
    and conventional in this wilderness-guidance context.
- source_word: בְּ/נָסְעָם
  chosen: when they set out
  alternatives:
  - in their setting out
  - as they journeyed
  - when they journeyed
  lexicon: HALOT
  rationale: The infinitive construct of נסע with prefixed ב conveys temporal sense,
    literally 'in their setting out.' 'When they set out' is a natural optimal-equivalence
    rendering that preserves the action of breaking camp and moving on, rather than
    the broader ongoing idea 'journeyed.'
- source_word: מִן הַמַּחֲנֶה
  chosen: from the camp
  alternatives:
  - from camp
  - from the encampment
  lexicon: HALOT
  rationale: מַחֲנֶה denotes the camp/encampment. With the article, 'the camp' is
    the most straightforward rendering, referring to Israel's camp.
