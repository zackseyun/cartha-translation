id: NUM.10.10
reference: Numbers 10:10
source:
  edition: WLC
  text: וּ/בְ/י֨וֹם שִׂמְחַתְ/כֶ֥ם וּֽ/בְ/מוֹעֲדֵי/כֶם֮ וּ/בְ/רָאשֵׁ֣י חָדְשֵׁי/כֶם֒ וּ/תְקַעְתֶּ֣ם בַּ/חֲצֹֽצְרֹ֗ת עַ֚ל עֹלֹ֣תֵי/כֶ֔ם וְ/עַ֖ל זִבְחֵ֣י שַׁלְמֵי/כֶ֑ם וְ/הָי֨וּ לָ/כֶ֤ם לְ/זִכָּרוֹן֙ לִ/פְנֵ֣י אֱלֹֽהֵי/כֶ֔ם אֲנִ֖י יְהוָ֥ה אֱלֹהֵי/כֶֽם׃פ
translation:
  text: And on the day of your gladness, and at your appointed times, and at the beginnings of your months, you shall blow the trumpets over your burnt offerings and over the sacrifices of your peace offerings, and they shall be for you as a memorial before your God. I am Yahweh your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your new moons.' The Hebrew is literally 'the beginnings of your months.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the sacrifices of your fellowship offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂמְחַתְכֶם
  chosen: your gladness
  alternatives:
  - your joy
  - your rejoicing
  lexicon: HALOT
  rationale: The noun denotes joy/gladness. 'Gladness' fits the formal list structure ('day of your gladness ... appointed times ... beginnings of your months') while remaining natural English.
- source_word: מוֹעֲדֵיכֶם
  chosen: your appointed times
  alternatives:
  - your appointed feasts
  - your festivals
  lexicon: HALOT
  rationale: מוֹעֵד broadly denotes appointed time/meeting and in cultic contexts often festival occasions. 'Appointed times' preserves the lexical breadth without narrowing it only to feast days.
- source_word: רָאשֵׁי חָדְשֵׁיכֶם
  chosen: the beginnings of your months
  alternatives:
  - the first days of your months
  - your new moons
  lexicon: HALOT
  rationale: Literally 'heads/beginnings of your months.' This keeps the Hebrew idiom transparent. 'New moons' is a common contextual rendering, but the Hebrew expression is calendrical rather than using a separate noun for moon here.
- source_word: וּתְקַעְתֶּם
  chosen: you shall blow
  alternatives:
  - you shall sound
  lexicon: HALOT
  rationale: In context with trumpets, the verb means to blow/sound them. 'Blow' is the most direct and idiomatic English collocation.
- source_word: חֲצֹצְרֹת
  chosen: the trumpets
  alternatives:
  - the silver trumpets
  lexicon: HALOT
  rationale: The noun refers to the cultic trumpets introduced in the chapter. 'Silver' is contextually true from earlier verses but not stated here, so it is not imported into the translation.
- source_word: עַל עֹלֹתֵיכֶם
  chosen: over your burnt offerings
  alternatives:
  - at your burnt offerings
  lexicon: HALOT
  rationale: עַל here is spatial/associative with the sacrificial acts. 'Over' preserves the preposition's basic sense and matches the ritual imagery of trumpet-blowing accompanying the offerings.
- source_word: זִבְחֵי שַׁלְמֵיכֶם
  chosen: the sacrifices of your peace offerings
  alternatives:
  - your fellowship offerings
  - your shared offerings
  lexicon: HALOT
  rationale: זֶבַח plus שְׁלָמִים refers to the class of peace/fellowship offerings. 'Peace offerings' preserves traditional sacrificial terminology and the likely connection to well-being/peace, while 'sacrifices of' reflects the construct chain.
- source_word: וְהָיוּ לָכֶם לְזִכָּרוֹן
  chosen: and they shall be for you as a memorial
  alternatives:
  - and they shall serve for you as a reminder
  - and they shall be a remembrance for you
  lexicon: HALOT
  rationale: The plural verb most naturally refers to the trumpet blasts in connection with the offerings. 'Memorial' is concise and preserves the cultic sense of bringing to remembrance before God.
- source_word: לִפְנֵי אֱלֹהֵיכֶם
  chosen: before your God
  alternatives:
  - in the presence of your God
  lexicon: HALOT
  rationale: לִפְנֵי is literally 'before/in the presence of.' 'Before your God' is both accurate and idiomatic in sacrificial context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
