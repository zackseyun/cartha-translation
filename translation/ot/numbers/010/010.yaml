theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guideline specifies 'the LORD' as the default for YHWH.
    This preserves covenantal force while following the project's stated convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  rationale: The Hebrew sacrificial term can be rendered in more than one established
    way. 'Peace offerings' preserves continuity with the semantic field of wholeness/peace
    and avoids over-interpreting the social dimension alone.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms,
    or documented exception)
