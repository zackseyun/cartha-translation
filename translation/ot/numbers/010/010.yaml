theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  rationale: The Hebrew sacrificial term can be rendered in more than one established way. 'Peace offerings' preserves continuity with the semantic field of wholeness/peace and avoids over-interpreting the social dimension alone.
