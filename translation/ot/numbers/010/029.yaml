theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Meaning of חֹתֵן מֹשֶׁה in relation to Hobab/Reuel
  chosen_reading: Moses’ father-in-law
  alternative_readings:
  - Moses’ relative by marriage
  - Moses’ brother-in-law
  rationale: The Hebrew term can denote an in-law more broadly, and this verse is
    discussed because Hobab is called son of Reuel while elsewhere Jethro/Reuel is
    associated with Moses' father-in-law. The main text keeps the most common lexical
    value 'father-in-law,' while preserving the broader kinship possibility in a footnote
    for auditability rather than resolving the genealogical question beyond the text.
