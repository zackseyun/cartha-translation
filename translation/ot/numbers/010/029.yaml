id: NUM.10.29
reference: Numbers 10:29
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֹשֶׁ֗ה לְ֠/חֹבָב בֶּן רְעוּאֵ֣ל הַ/מִּדְיָנִי֮ חֹתֵ֣ן מֹשֶׁה֒
    נֹסְעִ֣ים אֲנַ֗חְנוּ אֶל הַ/מָּקוֹם֙ אֲשֶׁ֣ר אָמַ֣ר יְהוָ֔ה אֹת֖/וֹ אֶתֵּ֣ן לָ/כֶ֑ם
    לְכָ֤/ה אִתָּ֨/נוּ֙ וְ/הֵטַ֣בְנוּ לָ֔/ךְ כִּֽי יְהוָ֥ה דִּבֶּר ט֖וֹב עַל יִשְׂרָאֵֽל־׀־־־־׃
translation:
  text: And Moses said to Hobab son of Reuel the Midianite, Moses’ father-in-law,
    “We are setting out for the place of which the LORD said, ‘I will give it to you.’
    Come with us, and we will do you good, for the LORD has spoken good concerning
    Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew חֹתֵן can refer more broadly to a relation by marriage; some understand
      this as 'Moses’ brother-in-law' or 'relative by marriage' rather than 'father-in-law.'
    reason: alternative_reading
lexical_decisions:
- source_word: חֹבָב
  chosen: Hobab
  lexicon: HALOT
  rationale: Personal name transliterated by standard convention, following the translation
    philosophy to transliterate names rather than translate them.
- source_word: רְעוּאֵל
  chosen: Reuel
  lexicon: HALOT
  rationale: Personal name transliterated rather than translated.
- source_word: הַמִּדְיָנִי
  chosen: the Midianite
  alternatives:
  - a Midianite
  lexicon: HALOT
  rationale: Gentilic with article is most naturally rendered 'the Midianite,' identifying
    Reuel/Hobab by ethnic affiliation.
- source_word: חֹתֵן מֹשֶׁה
  chosen: Moses’ father-in-law
  alternatives:
  - Moses’ relative by marriage
  - Moses’ brother-in-law
  lexicon: HALOT
  rationale: חֹתֵן commonly denotes a relation by marriage, often specifically 'father-in-law.'
    In this narrative context that is the most familiar and likely sense, though the
    wider semantic range explains the longstanding discussion about the exact relationship.
- source_word: נֹסְעִים אֲנַחְנוּ
  chosen: We are setting out
  alternatives:
  - We are journeying
  - We are departing
  lexicon: HALOT
  rationale: The participle plus pronoun expresses ongoing or imminent movement. 'Setting
    out' captures the sense of beginning the journey in natural English.
- source_word: הַמָּקוֹם
  chosen: the place
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with article.
- source_word: אֲשֶׁר אָמַר יְהוָה אֹתוֹ אֶתֵּן לָכֶם
  chosen: of which the LORD said, ‘I will give it to you’
  alternatives:
  - about which the LORD said, ‘I will give it to you’
  lexicon: HALOT
  rationale: Retains the relative construction and the direct divine promise. Singular
    'it' reflects אֹתוֹ referring back to 'the place'; 'you' is plural in Hebrew,
    addressed to Israel collectively.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: לְכָה אִתָּנוּ
  chosen: Come with us
  alternatives:
  - Go with us
  lexicon: HALOT
  rationale: Idiomatic invitation in English. 'Come with us' fits the speaker-oriented
    appeal better than a more wooden rendering.
- source_word: וְהֵטַבְנוּ לָךְ
  chosen: and we will do you good
  alternatives:
  - and we will treat you well
  - and we will be good to you
  lexicon: HALOT
  rationale: Preserves the benefactive sense of the Hiphil of יטב without over-paraphrasing.
    The idiom means to act for someone's good.
- source_word: דִּבֶּר טוֹב עַל יִשְׂרָאֵל
  chosen: has spoken good concerning Israel
  alternatives:
  - has promised good to Israel
  - has spoken favorably about Israel
  lexicon: HALOT
  rationale: Keeps the verbal idea 'spoken' while allowing natural English. 'Concerning
    Israel' reflects עַל in this context. 'Promised good' is interpretive and possible,
    but the Hebrew wording is more directly about what the LORD has spoken.
