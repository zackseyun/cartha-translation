id: NUM.10.22
reference: Numbers 10:22
source:
  edition: WLC
  text: וְ/נָסַ֗ע דֶּ֛גֶל מַחֲנֵ֥ה בְנֵֽי אֶפְרַ֖יִם לְ/צִבְאֹתָ֑/ם וְ/עַל צְבָא֔/וֹ
    אֱלִישָׁמָ֖ע בֶּן עַמִּיהֽוּד־־־׃
translation:
  text: Then the banner of the camp of the sons of Ephraim set out by their divisions,
    and over its division was Elishama son of Ammihud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'standard' for 'banner.' The Hebrew term refers to the tribal ensign
      under which the camp marched.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to their companies/hosts.' The Hebrew reflects organized military-style
      groupings within the camp.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסַע
  chosen: Then ... set out
  alternatives:
  - And ... set out
  - journeyed
  lexicon: HALOT
  rationale: The waw + qatal continues the narrative sequence. 'Set out' is the natural
    English rendering in this marching context; 'Then' captures sequential movement
    more idiomatically than a bare 'And'.
- source_word: דֶּגֶל
  chosen: banner
  alternatives:
  - standard
  lexicon: HALOT
  rationale: The term denotes the tribal military/camp standard under which the group
    marched. 'Banner' is clear modern English; 'standard' is possible but slightly
    more archaic/military in tone.
- source_word: מַחֲנֵה
  chosen: camp
  alternatives:
  - company
  - encampment
  lexicon: HALOT
  rationale: In construct with דֶּגֶל it identifies the camp-unit associated with
    the banner. 'Camp' is the most straightforward rendering in this wilderness-march
    context.
- source_word: בְנֵי אֶפְרַיִם
  chosen: the sons of Ephraim
  alternatives:
  - the people of Ephraim
  - the descendants of Ephraim
  lexicon: HALOT
  rationale: This is the standard tribal designation. Per translation philosophy,
    the masculine form is retained where it reflects the source expression; 'sons
    of Ephraim' is more textually transparent than smoothing to 'people of Ephraim'.
- source_word: לְצִבְאֹתָם
  chosen: by their divisions
  alternatives:
  - according to their companies
  - by their hosts
  - by their armies
  lexicon: HALOT
  rationale: צָבָא in Numbers often refers to organized tribal groupings for march/order
    rather than combat alone. 'By their divisions' communicates ordered military-style
    arrangement in readable English.
- source_word: וְעַל צְבָאוֹ
  chosen: and over its division was
  alternatives:
  - and over its host was
  - and the one over its company was
  - with Elishama ... over its division
  lexicon: HALOT
  rationale: The phrase identifies the leader appointed over Ephraim's marching division.
    Rendering עַל as 'over' preserves the leadership relation, and 'its division'
    matches the singular pronominal suffix referring back to the camp-standard unit.
- source_word: אֱלִישָׁמָע בֶּן עַמִּיהוּד
  chosen: Elishama son of Ammihud
  alternatives:
  - Elishama the son of Ammihud
  rationale: Personal names are transliterated by standard convention per project
    philosophy. 'Son of' is the normal genealogical rendering.
