id: NUM.10.36
reference: Numbers 10:36
source:
  edition: WLC
  text: וּ/בְ/נֻחֹ֖/ה יֹאמַ֑ר שׁוּבָ֣/ה יְהוָ֔ה רִֽבְב֖וֹת אַלְפֵ֥י יִשְׂרָאֵֽל׃׆ס
translation:
  text: And when it came to rest, he would say, “Return, O Yahweh, to the myriads of the thousands of Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Yahweh.” The Hebrew has the divine name יְהוָה.
    reason: alternative_reading
  - marker: b
    text: Hebrew “the myriads of the thousands of Israel,” an emphatic expression for Israel’s vast numbers.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/נֻחֹה
  chosen: And when it came to rest
  alternatives:
  - And when it rested
  - And at its resting
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with the infinitive construct of נוח form a temporal clause, referring back to the ark's settling down. 'Came to rest' is natural modern English while preserving the motion-to-rest sense.
- source_word: יֹאמַר
  chosen: he would say
  alternatives:
  - he said
  - he says
  lexicon: HALOT
  rationale: The imperfect here in narrative introduces Moses' customary utterance whenever the ark rested. 'Would say' captures the iterative/habitual force better than a simple past.
- source_word: שׁוּבָה
  chosen: Return
  alternatives:
  - Turn back
  - Come back
  lexicon: HALOT
  rationale: The imperative of שוב with paragogic ה is a direct appeal for YHWH to return/remain among his people after going out before them. 'Return' is the most idiomatic and traditional equivalent without overinterpreting.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רִבְבֹות
  chosen: myriads
  alternatives:
  - ten thousands
  - multitudes
  lexicon: HALOT
  rationale: The noun denotes very large groups, often 'ten thousands.' 'Myriads' preserves the large-number sense without forcing a strictly arithmetic reading.
- source_word: אַלְפֵי
  chosen: the thousands of
  alternatives:
  - the clans of
  - the families of
  lexicon: HALOT
  rationale: Though אֶלֶף can in some contexts denote clan or military unit, here the straightforward numerical sense best fits the paired expression with רִבְבֹות. The construct is retained in English as 'the thousands of.'
- source_word: רִבְבֹות אַלְפֵי יִשְׂרָאֵל
  chosen: the myriads of the thousands of Israel
  alternatives:
  - the countless thousands of Israel
  - the many thousands of Israel
  lexicon: HALOT
  rationale: The Hebrew stacks two large-number terms in construct for rhetorical force. A relatively formal rendering preserves the elevated cadence and avoids collapsing the expression into a single vague quantity.
