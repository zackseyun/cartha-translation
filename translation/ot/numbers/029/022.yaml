id: NUM.29.22
reference: Numbers 29:22
source:
  edition: WLC
  text: וּ/שְׂעִ֥יר חַטָּ֖את אֶחָ֑ד מִ/לְּ/בַד֙ עֹלַ֣ת הַ/תָּמִ֔יד וּ/מִנְחָתָ֖/הּ
    וְ/נִסְכָּֽ/הּ׃ס
translation:
  text: and one male goat for a sin offering, besides the regular burnt offering and
    its grain offering and its drink offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the continual burnt offering.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'its grain offering and its drink offering,' referring to the regular
      burnt offering.
    reason: cross_reference
lexical_decisions:
- source_word: וּ/שְׂעִיר
  chosen: and one male goat
  alternatives:
  - and a goat
  - and one goat
  lexicon: HALOT
  rationale: שָׂעִיר denotes a male goat. Including 'male' preserves the specific
    sacrificial animal indicated by the Hebrew, while 'and' reflects the prefixed
    conjunction.
- source_word: חַטָּאת
  chosen: for a sin offering
  alternatives:
  - sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly refers to the sin offering rather
    than abstract 'sin.' Rendering with 'for a sin offering' makes the construction
    natural in English while preserving the cultic sense.
- source_word: אֶחָד
  chosen: one
  alternatives:
  - a single
  lexicon: HALOT
  rationale: The numeral specifies the quantity of the sacrificial animal and is retained
    explicitly.
- source_word: מִ/לְּ/בַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: This prepositional expression marks that the listed offering is additional
    to the continual offering complex. 'Besides' is concise and idiomatic.
- source_word: עֹלַת
  chosen: burnt offering
  alternatives:
  - ascending offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the burnt offering in sacrificial legislation.
    'Ascending offering' is more etymologically transparent but less established and
    less clear in English.
- source_word: הַ/תָּמִיד
  chosen: the regular
  alternatives:
  - the continual
  - the daily
  lexicon: HALOT
  rationale: תָּמִיד here modifies the burnt offering as the ongoing stated offering.
    'Regular' communicates the recurring nature in clear modern English; 'continual'
    is possible but less natural here.
- source_word: וּ/מִנְחָתָהּ
  chosen: and its grain offering
  alternatives:
  - and its tribute offering
  - and its offering
  lexicon: HALOT
  rationale: מִנְחָה in priestly sacrificial contexts is best rendered 'grain offering.'
    The 3fs suffix refers back to the burnt offering, hence 'its.'
- source_word: וְ/נִסְכָּהּ
  chosen: and its drink offering
  alternatives:
  - and its libation
  lexicon: HALOT
  rationale: נֶסֶךְ denotes the accompanying poured-out offering. 'Drink offering'
    is the clearest standard English rendering; 'libation' is accurate but less accessible.
