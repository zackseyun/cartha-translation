theological_decisions:
- issue: Cultic terminology for חַטָּאת
  chosen_reading: Rendered as 'sin offering' in both occurrences
  alternative_readings:
  - purification offering
  rationale: Although some scholarship emphasizes the purificatory function of the
    sacrifice, the verse is a procedural list of offerings, and 'sin offering' remains
    the clearest established English equivalent without importing extra interpretation.
    No doctrinal dispute is at stake, but the lexical nuance is noted for auditability.
