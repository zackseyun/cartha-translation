id: NUM.29.11
reference: Numbers 29:11
source:
  edition: WLC
  text: שְׂעִיר עִזִּ֥ים אֶחָ֖ד חַטָּ֑את מִ/לְּ/בַ֞ד חַטַּ֤את הַ/כִּפֻּרִים֙ וְ/עֹלַ֣ת
    הַ/תָּמִ֔יד וּ/מִנְחָתָ֖/הּ וְ/נִסְכֵּי/הֶֽם־׃פ
translation:
  text: and one male goat for a sin offering, besides the sin offering of atonement,
    and the regular burnt offering with its grain offering and their drink offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'purification offering' in both occurrences of 'sin offering.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the continual burnt offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  chosen: male goat
  alternatives:
  - goat
  - kid of the goats
  - goat buck
  lexicon: HALOT
  rationale: The construct phrase literally denotes a hairy goat/buck from the goats.
    'Male goat' is clear modern English and preserves the sacrificial animal's sex
    without awkward literalism.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Simple numeral retained formally to reflect the specified count of the
    offering.
- source_word: חַטָּאת
  chosen: sin offering
  alternatives:
  - sin sacrifice
  - purification offering
  lexicon: HALOT
  rationale: In sacrificial contexts this noun commonly denotes the offering rather
    than abstract 'sin.' 'Sin offering' is the standard and sufficiently transparent
    rendering. 'Purification offering' is possible in some contexts, but here the
    traditional cultic term best fits the list of sacrifices.
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: Marks that this sacrifice is additional to the other listed offerings.
    'Besides' is concise and natural.
- source_word: חַטַּאת הַכִּפֻּרִים
  chosen: the sin offering of atonement
  alternatives:
  - the sin offering for atonement
  - the purification offering of atonements
  lexicon: HALOT
  rationale: The construct links the sin offering with the atonement rite, likely
    the Day of Atonement context. 'Of atonement' is idiomatic and preserves the cultic
    sense without over-specifying beyond the Hebrew.
- source_word: עֹלַת הַתָּמִיד
  chosen: the regular burnt offering
  alternatives:
  - the continual burnt offering
  - the daily burnt offering
  lexicon: HALOT
  rationale: תָּמִיד denotes regular/continual recurrence. 'Regular burnt offering'
    is natural modern English and accurately conveys the standing offering.
- source_word: מִנְחָתָהּ
  chosen: its grain offering
  alternatives:
  - its tribute offering
  - its offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial lists refers to the grain offering accompanying
    another sacrifice. The 3fs suffix is rendered 'its,' referring back to the burnt
    offering.
- source_word: נִסְכֵּיהֶם
  chosen: their drink offerings
  alternatives:
  - their libations
  lexicon: HALOT
  rationale: The plural suffix is preserved with 'their,' likely referring to the
    set of principal offerings just mentioned. 'Drink offerings' is clearer than 'libations'
    for modern readers while retaining the ritual sense.
