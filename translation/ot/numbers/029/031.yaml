id: NUM.29.31
reference: Numbers 29:31
source:
  edition: WLC
  text: וּ/שְׂעִ֥יר חַטָּ֖את אֶחָ֑ד מִ/לְּ/בַד֙ עֹלַ֣ת הַ/תָּמִ֔יד מִנְחָתָ֖/הּ וּ/נְסָכֶֽי/הָ׃פ
translation:
  text: and one goat for a sin offering, besides the regular burnt offering, with
    its grain offering and its drink offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the continual burnt offering.'
    reason: lexical_alternative
  - marker: b
    text: '''Drink offerings'' may also be rendered ''libations.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂעִיר
  chosen: goat
  alternatives:
  - male goat
  - he-goat
  lexicon: HALOT
  rationale: The term denotes a goat, often specifically a male goat in sacrificial
    contexts. English 'goat' is natural and sufficient here; the sacrificial function
    is clarified by the following phrase 'for a sin offering.'
- source_word: חַטָּאת
  chosen: sin offering
  alternatives:
  - sin sacrifice
  - offering for sin
  lexicon: HALOT
  rationale: In cultic contexts this noun commonly refers to the sacrifice offered
    for sin rather than abstract 'sin.' 'Sin offering' is the standard and clear rendering.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Cardinal number specifying the quantity of the goat.
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: This prepositional expression marks that the listed sacrifice is additional
    to the continual offering. 'Besides' is concise and idiomatic.
- source_word: עֹלַת הַתָּמִיד
  chosen: the regular burnt offering
  alternatives:
  - the continual burnt offering
  - the daily burnt offering
  lexicon: HALOT
  rationale: The phrase refers to the standing, repeated burnt offering. 'Regular'
    communicates ongoing prescribed recurrence in readable modern English; 'continual'
    is possible but less natural in contemporary usage.
- source_word: מִנְחָתָהּ
  chosen: its grain offering
  alternatives:
  - its tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial lists refers to the accompanying grain offering.
    The 3fs suffix refers back to the burnt offering as a grammatical feminine noun,
    hence 'its grain offering.'
- source_word: וּנְסָכֶיהָ
  chosen: and its drink offerings
  alternatives:
  - and its libations
  lexicon: HALOT
  rationale: נֶסֶךְ denotes a poured drink offering. The plural with suffix is naturally
    rendered 'its drink offerings'; 'libations' is accurate but less accessible for
    the target audience.
