id: NUM.29.14
reference: Numbers 29:14
source:
  edition: WLC
  text: וּ/מִנְחָתָ֔/ם סֹ֖לֶת בְּלוּלָ֣ה בַ/שָּׁ֑מֶן שְׁלֹשָׁ֨ה עֶשְׂרֹנִ֜ים לַ/פָּ֣ר
    הָֽ/אֶחָ֗ד לִ/שְׁלֹשָׁ֤ה עָשָׂר֙ פָּרִ֔ים שְׁנֵ֤י עֶשְׂרֹנִים֙ לָ/אַ֣יִל הָֽ/אֶחָ֔ד
    לִ/שְׁנֵ֖י הָ/אֵילִֽם׃
translation:
  text: 'And their grain offering shall be fine flour mixed with oil: three-tenths
    for each bull, for the thirteen bulls, and two-tenths for each ram, for the two
    rams.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'three tenths' and 'two tenths' refer to tenth-measures, traditionally
      understood as tenths of an ephah.
    reason: cultural_note
lexical_decisions:
- source_word: וּמִנְחָתָם
  chosen: And their grain offering
  alternatives:
  - And their offering
  - And its grain offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes the grain offering rather
    than a generic offering. The 3mp suffix matches the series of sacrificial animals/offers
    in context, so 'their' is retained.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - flour of fine quality
  lexicon: HALOT
  rationale: Standard cultic term for finely milled flour used in grain offerings;
    'fine flour' is the clearest established English equivalent.
- source_word: בְּלוּלָה בַשָּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  - blended with oil
  lexicon: HALOT
  rationale: The passive participle with ב indicates the flour is prepared by being
    mixed with oil. 'Mixed with oil' is natural modern English while remaining close
    to the Hebrew.
- source_word: שְׁלֹשָׁה עֶשְׂרֹנִים
  chosen: three-tenths
  alternatives:
  - three tenth-measures
  - three tenths of an ephah
  lexicon: HALOT
  rationale: עִשָּׂרוֹן is a tenth-measure, conventionally a tenth of an ephah. English
    sacrificial style often shortens this to 'three-tenths.' Because the Hebrew does
    not repeat 'of an ephah' explicitly here, the concise measure is preserved in
    the main text.
- source_word: לַפָּר הָאֶחָד
  chosen: for each bull
  alternatives:
  - for the one bull
  - for one bull
  lexicon: HALOT
  rationale: Though literally 'for the one bull,' in distributive sacrificial instructions
    English idiom is better expressed as 'for each bull,' especially since it is followed
    by the total number of bulls.
- source_word: לִשְׁלֹשָׁה עָשָׂר פָּרִים
  chosen: for the thirteen bulls
  alternatives:
  - for thirteen bulls
  lexicon: HALOT
  rationale: The phrase specifies the total set to which the per-animal measure applies.
    Including the article as 'the thirteen bulls' reflects the definite, enumerated
    sacrificial group in context.
- source_word: שְׁנֵי עֶשְׂרֹנִים
  chosen: two-tenths
  alternatives:
  - two tenth-measures
  - two tenths of an ephah
  lexicon: HALOT
  rationale: Same cultic measure as above; consistency favors 'two-tenths' in parallel
    with 'three-tenths.'
- source_word: לָאַיִל הָאֶחָד
  chosen: for each ram
  alternatives:
  - for the one ram
  - for one ram
  lexicon: HALOT
  rationale: As with the bull phrase, the Hebrew singular with article functions distributively
    in this listing; 'for each ram' communicates the instruction clearly in English.
- source_word: לִשְׁנֵי הָאֵילִם
  chosen: for the two rams
  alternatives:
  - for two rams
  lexicon: HALOT
  rationale: This gives the total number of rams in the offering sequence; the definite
    form is represented naturally as 'the two rams.'
