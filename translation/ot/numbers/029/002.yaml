id: NUM.29.2
reference: Numbers 29:2
source:
  edition: WLC
  text: וַ/עֲשִׂיתֶ֨ם עֹלָ֜ה לְ/רֵ֤יחַ נִיחֹ֨חַ֙ לַֽ/יהוָ֔ה פַּ֧ר בֶּן בָּקָ֛ר אֶחָ֖ד אַ֣יִל אֶחָ֑ד כְּבָשִׂ֧ים בְּנֵי שָׁנָ֛ה שִׁבְעָ֖ה תְּמִימִֽם־־׃
translation:
  text: 'And you shall offer a burnt offering as a pleasing aroma to Yahweh: one bull from the herd, one ram, and seven male lambs a year old, without blemish.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a soothing aroma' or 'a sweet aroma.' The Hebrew expression is a fixed sacrificial formula indicating that the offering is acceptable to the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשִׂיתֶם
  chosen: you shall offer
  alternatives:
  - you shall make
  - you shall prepare
  lexicon: HALOT
  rationale: Although the verb is literally 'do/make,' in sacrificial contexts with the object עֹלָה it idiomatically means to present or offer a sacrifice. 'Offer' gives the plain sacrificial sense in natural English without over-paraphrasing.
- source_word: עֹלָה
  chosen: burnt offering
  alternatives:
  - ascending offering
  lexicon: HALOT
  rationale: The standard sacrificial term denotes the whole offering that goes up in smoke. 'Burnt offering' is the established and accurate English rendering.
- source_word: לְרֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet aroma
  lexicon: HALOT
  rationale: This fixed sacrificial expression refers to the acceptability of the offering before God, not to divine olfactory pleasure in a crude sense. 'A pleasing aroma' is idiomatic, clear, and widely understood.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' The preposition marks the offering as directed to the covenant God.
- source_word: פַּר בֶּן בָּקָר אֶחָד
  chosen: one bull from the herd
  alternatives:
  - one young bull
  - one bull, a son of the herd
  lexicon: HALOT
  rationale: The phrase literally means 'one bull, son of cattle/herd.' In sacrificial English, 'one bull from the herd' conveys the idiom naturally while preserving the animal specification.
- source_word: אַיִל אֶחָד
  chosen: one ram
  lexicon: HALOT
  rationale: אַיִל in sacrificial lists is straightforwardly 'ram.'
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה שִׁבְעָה
  chosen: seven male lambs a year old
  alternatives:
  - seven lambs a year old
  - seven year-old lambs
  lexicon: HALOT
  rationale: כְּבָשִׂים denotes lambs, typically male in this form and sacrificial context. 'A year old' renders בְּנֵי שָׁנָה idiomatically. Including 'male' reflects the lexical specificity.
- source_word: תְּמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial contexts the term denotes freedom from defect. 'Without blemish' is precise and idiomatic in English Bible style.
