id: NUM.29.38
reference: Numbers 29:38
source:
  edition: WLC
  text: וּ/שְׂעִ֥יר חַטָּ֖את אֶחָ֑ד מִ/לְּ/בַד֙ עֹלַ֣ת הַ/תָּמִ֔יד וּ/מִנְחָתָ֖/הּ
    וְ/נִסְכָּֽ/הּ׃
translation:
  text: and one goat for a sin offering, besides the regular burnt offering and its
    grain offering and its drink offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one male goat for a sin offering.' The Hebrew שׂעיר can more specifically
      denote a male goat in sacrificial contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'the continual burnt offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׂעִיר
  chosen: and one goat
  alternatives:
  - and a male goat
  lexicon: HALOT
  rationale: שׂעיר denotes a goat, often specifically a male goat in sacrificial contexts.
    English 'goat' is natural and sufficient here, while the numeral 'one' following
    אֶחָד is brought forward in idiomatic English.
- source_word: חַטָּאת
  chosen: for a sin offering
  alternatives:
  - sin offering
  - for sin
  lexicon: HALOT
  rationale: 'In sacrificial contexts חטאת commonly refers to the sin offering rather
    than abstract ''sin.'' The prepositional sense is supplied idiomatically in English:
    ''one goat for a sin offering.'''
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Cardinal number specifying the quantity of the sacrificial animal.
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: Marks that this offering is additional to the continual offering already
    prescribed. 'Besides' is concise and natural.
- source_word: עֹלַת הַתָּמִיד
  chosen: the regular burnt offering
  alternatives:
  - the continual burnt offering
  - the daily burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the burnt offering; הַתָּמִיד denotes the regular/continual
    offering. 'Regular burnt offering' communicates the established recurring sacrifice
    in clear modern English.
- source_word: וּמִנְחָתָהּ
  chosen: and its grain offering
  alternatives:
  - and its tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in priestly sacrificial contexts refers to the grain offering
    accompanying the burnt offering. The 3fs suffix refers back to עֹלָה, hence 'its.'
- source_word: וְנִסְכָּהּ
  chosen: and its drink offering
  alternatives:
  - and its libation
  lexicon: HALOT
  rationale: נֶסֶךְ is the drink offering/libation accompanying sacrifices. 'Drink
    offering' is the standard accessible rendering; the suffix again refers back to
    the burnt offering.
