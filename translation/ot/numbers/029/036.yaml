id: NUM.29.36
reference: Numbers 29:36
source:
  edition: WLC
  text: וְ/הִקְרַבְתֶּ֨ם עֹלָ֜ה אִשֵּׁ֨ה רֵ֤יחַ נִיחֹ֨חַ֙ לַֽ/יהוָ֔ה פַּ֥ר אֶחָ֖ד אַ֣יִל אֶחָ֑ד כְּבָשִׂ֧ים בְּנֵי שָׁנָ֛ה שִׁבְעָ֖ה תְּמִימִֽם־׃
translation:
  text: 'And you shall present a burnt offering, an offering by fire, a pleasing aroma to Yahweh: one bull, one ram, and seven one-year-old lambs without blemish.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a soothing aroma.' The Hebrew phrase is a fixed sacrificial expression for an offering acceptable to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתֶּם
  chosen: you shall present
  alternatives:
  - you shall offer
  - you shall bring near
  lexicon: HALOT
  rationale: The Hifil of קרב in sacrificial contexts commonly means to present or offer an offering. 'Present' preserves the ritual sense without sounding overly wooden, while still reflecting the causative nuance better than a looser paraphrase.
- source_word: עֹלָה
  chosen: a burnt offering
  alternatives:
  - an ascending offering
  lexicon: HALOT
  rationale: The established sacrificial term denotes the whole offering that goes up in smoke. 'Burnt offering' is the clearest idiomatic English equivalent and best matches Levitical/Numerical cultic usage.
- source_word: אִשֵּׁה
  chosen: an offering by fire
  alternatives:
  - a fire offering
  - a food offering
  lexicon: HALOT
  rationale: This term refers to an offering made by fire. 'Offering by fire' is transparent and avoids overinterpreting it as specifically 'food offering,' while preserving the sacrificial mechanism.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet-smelling aroma
  lexicon: HALOT
  rationale: This fixed sacrificial expression indicates acceptability to God. 'Pleasing aroma' is natural modern English and preserves the idiom's sense without archaic wording like 'sweet savour.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' The preposition ל marks the offering as directed to or for YHWH.
- source_word: פַּר אֶחָד
  chosen: one bull
  alternatives:
  - one young bull
  lexicon: HALOT
  rationale: פַּר denotes a bull from the herd. 'One bull' is the most direct rendering; 'young bull' is possible in some contexts but is not required by the Hebrew here.
- source_word: אַיִל אֶחָד
  chosen: one ram
  lexicon: HALOT
  rationale: אַיִל is the standard term for a ram in sacrificial lists. 'One ram' is straightforward and precise.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה שִׁבְעָה
  chosen: seven one-year-old lambs
  alternatives:
  - seven lambs a year old
  - seven male lambs a year old
  lexicon: HALOT
  rationale: The phrase literally means 'seven lambs, sons of a year.' 'Seven one-year-old lambs' is idiomatic English and preserves the age requirement. The Hebrew noun here does not require adding 'male' in the translation.
- source_word: תְּמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial contexts, תמימים denotes animals free from defect. 'Without blemish' is the standard clear English rendering and preserves cultic precision.
