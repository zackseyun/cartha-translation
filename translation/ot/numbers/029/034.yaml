id: NUM.29.34
reference: Numbers 29:34
source:
  edition: WLC
  text: וּ/שְׂעִ֥יר חַטָּ֖את אֶחָ֑ד מִ/לְּ/בַד֙ עֹלַ֣ת הַ/תָּמִ֔יד מִנְחָתָ֖/הּ וְ/נִסְכָּֽ/הּ׃פ
translation:
  text: and one goat for a sin offering, besides the regular burnt offering, with
    its grain offering and its drink offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one male goat for a sin offering.'
    reason: lexical_alternative
  - marker: b
    text: '''Regular'' translates the Hebrew term for the continual, recurring offering;
      many versions render it ''daily'' or ''continual.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׂעִיר
  chosen: and one goat
  alternatives:
  - and a male goat
  - and one he-goat
  lexicon: HALOT
  rationale: שׂעיר denotes a male goat, often in sacrificial contexts. English 'goat'
    is sufficiently natural here, while the numeral אֶחָד supplies 'one.' The conjunction
    וּ is carried as 'and' to continue the list of offerings.
- source_word: חַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial contexts חטאת commonly denotes the sin offering rather
    than abstract 'sin.' 'For a sin offering' is idiomatic and clear in English.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: The numeral specifies the quantity of the goat and is retained explicitly.
- source_word: מִ/לְּ/בַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: The prepositional expression marks this offering as additional to the
    daily burnt offering. 'Besides' is concise and natural.
- source_word: עֹלַת
  chosen: burnt offering
  lexicon: HALOT
  rationale: Standard sacrificial term for the עולה offering; 'burnt offering' remains
    the clearest established English equivalent.
- source_word: הַ/תָּמִיד
  chosen: the regular
  alternatives:
  - the continual
  - the daily
  lexicon: HALOT
  rationale: תמיד identifies the ongoing stated offering. 'Regular' communicates the
    recurring nature in contemporary English without archaic tone; 'daily' is possible,
    but 'regular' better matches the broader sense while fitting the established phrase
    'regular burnt offering.'
- source_word: מִנְחָתָ/הּ
  chosen: with its grain offering
  alternatives:
  - its tribute offering
  - its offering
  lexicon: HALOT
  rationale: מנחה in cultic contexts refers to the grain offering accompanying the
    burnt offering. The 3fs suffix refers back to the burnt offering as a grammatical
    feminine noun, so 'its' is appropriate.
- source_word: וְ/נִסְכָּ/הּ
  chosen: and its drink offering
  alternatives:
  - and its libation
  lexicon: HALOT
  rationale: נסך in sacrificial lists denotes the drink offering/libation. 'Drink
    offering' is more transparent for modern readers than 'libation,' while preserving
    the ritual sense.
