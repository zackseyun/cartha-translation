id: NUM.29.5
reference: Numbers 29:5
source:
  edition: WLC
  text: וּ/שְׂעִיר עִזִּ֥ים אֶחָ֖ד חַטָּ֑את לְ/כַפֵּ֖ר עֲלֵי/כֶֽם־׃
translation:
  text: and one male goat for a sin offering, to make atonement for you—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to make expiation for you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׂעִיר
  chosen: and one male goat
  alternatives:
  - and a goat
  - and one goat
  lexicon: HALOT
  rationale: 'שָׂעִיר denotes a he-goat/male goat. The prefixed וּ is rendered ''and.''
    Because אֶחָד follows and modifies the noun phrase, English naturally brings ''one''
    forward: ''and one male goat.'' ''Male goat'' preserves the sex-specific sacrificial
    animal more precisely than generic ''goat''.'
- source_word: עִזִּים
  chosen: male goat
  alternatives:
  - of the goats
  lexicon: HALOT
  rationale: In the construct phrase שְׂעִיר עִזִּים, עִזִּים specifies the species/class
    ('goats'), yielding the idiomatic sense 'male goat' or 'he-goat.' English does
    not need a wooden 'goat of goats.'
- source_word: אֶחָד
  chosen: one
  alternatives:
  - a single
  lexicon: HALOT
  rationale: Cardinal numeral indicating the quantity of the sacrificial animal. 'One'
    is the most direct rendering.
- source_word: חַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly denotes the sin offering rather
    than abstract 'sin.' Rendering it 'sin offering' preserves the cultic sense. 'For
    a sin offering' fits the verbless list style in context.
- source_word: לְ/כַפֵּר
  chosen: to make atonement
  alternatives:
  - to atone
  - to make expiation
  lexicon: HALOT
  rationale: כפר in priestly sacrificial context refers to making atonement/expiation.
    'To make atonement' is standard, clear modern English and preserves the ritual-theological
    force without importing a narrower doctrinal theory.
- source_word: עֲלֵי/כֶם
  chosen: for you
  alternatives:
  - on your behalf
  - for yourselves
  lexicon: HALOT
  rationale: The preposition עַל with כפר often indicates the persons on whose behalf
    atonement is made. 'For you' is natural English and captures the representative
    sense; 'on your behalf' is possible but heavier.
