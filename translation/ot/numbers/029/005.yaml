theological_decisions:
- issue: Rendering of sacrificial כפר language
  chosen_reading: to make atonement for you
  alternative_readings:
  - to make expiation for you
  rationale: The Hebrew expresses priestly sacrificial atonement without specifying
    a later doctrinal mechanism. 'Make atonement' preserves the biblical cultic category
    and theological breadth better than a more technical or narrower term in the main
    text.
  doctrine_reference: Translation philosophy §§1, 3, 6
