id: NUM.29.27
reference: Numbers 29:27
source:
  edition: WLC
  text: וּ/מִנְחָתָ֣/ם וְ/נִסְכֵּי/הֶ֡ם לַ֠/פָּרִים לָ/אֵילִ֧ם וְ/לַ/כְּבָשִׂ֛ים בְּ/מִסְפָּרָ֖/ם
    כַּ/מִּשְׁפָּֽט׃
translation:
  text: along with their grain offering and their drink offerings for the bulls, for
    the rams, and for the lambs, according to their number, according to the ordinance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the prescribed manner.' The Hebrew כַּמִּשְׁפָּט refers
      to the established rule or procedure for these offerings.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָתָם
  chosen: their grain offering
  alternatives:
  - their offering
  - their tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes the grain offering that
    accompanies burnt offerings. 'Grain offering' is more precise than the generic
    'offering' and fits the cultic context of Numbers 29.
- source_word: נִסְכֵּיהֶם
  chosen: their drink offerings
  alternatives:
  - their libations
  lexicon: HALOT
  rationale: נֶסֶךְ refers to poured-out offerings of wine or similar liquid. 'Drink
    offerings' is standard, clear modern English; 'libations' is accurate but less
    accessible.
- source_word: לַפָּרִים
  chosen: for the bulls
  alternatives:
  - with the bulls
  lexicon: HALOT
  rationale: The prefixed ל marks the allocation of the accompanying offerings to
    each class of animal. 'For the bulls' communicates that these grain and drink
    offerings correspond to the bulls.
- source_word: לָאֵילִם
  chosen: for the rams
  alternatives:
  - with the rams
  lexicon: HALOT
  rationale: As with לַפָּרִים, the preposition indicates the offerings assigned to
    the rams.
- source_word: וְלַכְּבָשִׂים
  chosen: and for the lambs
  alternatives:
  - and with the lambs
  lexicon: HALOT
  rationale: Continues the list of animals to which the accompanying offerings belong.
    'Lambs' is the normal rendering in this sacrificial inventory.
- source_word: בְּמִסְפָּרָם
  chosen: according to their number
  alternatives:
  - by their number
  - in their number
  lexicon: HALOT
  rationale: This phrase indicates that the quantities of the accompanying offerings
    are proportioned to the number of animals. 'According to their number' is idiomatic
    and sufficiently formal.
- source_word: כַּמִּשְׁפָּט
  chosen: according to the ordinance
  alternatives:
  - according to the rule
  - according to the prescribed manner
  - as prescribed
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to the prescribed legal/customary procedure for
    these offerings. 'According to the ordinance' preserves the formal cultic sense
    better than the looser 'as prescribed,' while remaining readable.
- source_word: וּ
  chosen: along with
  alternatives:
  - and
  lexicon: HALOT
  rationale: The verse is syntactically dependent on the preceding sacrificial list;
    rendering the initial conjunction as 'along with' makes explicit that these grain
    and drink offerings accompany the animals already mentioned, which is the sense
    in context.
