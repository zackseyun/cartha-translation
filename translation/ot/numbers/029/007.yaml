id: NUM.29.7
reference: Numbers 29:7
source:
  edition: WLC
  text: וּ/בֶ/עָשׂוֹר֩ לַ/חֹ֨דֶשׁ הַ/שְּׁבִיעִ֜י הַ/זֶּ֗ה מִֽקְרָא קֹ֨דֶשׁ֙ יִהְיֶ֣ה
    לָ/כֶ֔ם וְ/עִנִּיתֶ֖ם אֶת נַפְשֹׁתֵי/כֶ֑ם כָּל מְלָאכָ֖ה לֹ֥א תַעֲשֽׂוּ־־־׃
translation:
  text: On the tenth day of this seventh month, there shall be a holy convocation
    for you, and you shall afflict yourselves; you shall do no work at all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall humble yourselves' or 'you shall deny yourselves.' The Hebrew
      idiom literally says 'you shall afflict your souls,' a ritual expression associated
      with self-denial, especially fasting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בֶ/עָשׂוֹר
  chosen: On the tenth day
  alternatives:
  - And on the tenth
  - On the tenth
  lexicon: HALOT
  rationale: The preposition plus ordinal/numeral idiom refers to the calendar date,
    not merely the number ten in abstraction. English idiom naturally supplies 'day'
    to express the temporal sense.
- source_word: לַ/חֹדֶשׁ הַ/שְּׁבִיעִי הַ/זֶּה
  chosen: of this seventh month
  alternatives:
  - of the seventh month, this one
  - in this seventh month
  lexicon: HALOT
  rationale: The phrase specifies the month in calendrical sequence. 'This seventh
    month' preserves the demonstrative הַזֶּה while remaining natural English.
- source_word: מִקְרָא קֹדֶשׁ
  chosen: a holy convocation
  alternatives:
  - a sacred assembly
  - a holy assembly
  lexicon: HALOT
  rationale: This is a standard cultic expression for an officially summoned sacred
    gathering. 'Holy convocation' preserves the formal, liturgical character better
    than the more generic 'assembly'.
- source_word: יִהְיֶה לָכֶם
  chosen: there shall be for you
  alternatives:
  - it shall be for you
  - you shall have
  lexicon: HALOT
  rationale: The clause states what the day is to be for the people. In the final
    English line, this is smoothed to 'there shall be a holy convocation for you'
    for readability while retaining the dative sense.
- source_word: וְעִנִּיתֶם אֶת נַפְשֹׁתֵיכֶם
  chosen: you shall afflict yourselves
  alternatives:
  - you shall humble yourselves
  - you shall deny yourselves
  lexicon: HALOT
  rationale: The piel of ענה with נֶפֶשׁ in this ritual context is the established
    idiom for self-affliction associated with fasting/humiliation on the Day of Atonement.
    'Afflict yourselves' is the most textually transparent rendering; alternatives
    are interpretive and narrower or softer.
- source_word: נַפְשֹׁתֵיכֶם
  chosen: yourselves
  alternatives:
  - your souls
  - your lives
  lexicon: HALOT
  rationale: Although literally 'your souls/lives,' in this idiom English reflexive
    'yourselves' best conveys the object of the self-affliction without importing
    a dualistic anthropology foreign to the Hebrew expression.
- source_word: כָּל מְלָאכָה
  chosen: work at all
  alternatives:
  - any work
  - any occupation
  lexicon: HALOT
  rationale: כָּל with מְלָאכָה gives a comprehensive prohibition. 'Work at all' idiomatically
    captures the totality in English and matches the force of the negative command.
- source_word: לֹא תַעֲשׂוּ
  chosen: you shall do no
  alternatives:
  - you must not do
  - do not do
  lexicon: HALOT
  rationale: The imperfect with לֹא in legal instruction is appropriately rendered
    as a future-like prohibition in English. The final sentence is arranged as 'you
    shall do no work at all' for natural legal style.
