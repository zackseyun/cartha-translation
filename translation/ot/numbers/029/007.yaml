theological_decisions:
- issue: Rendering the ritual idiom וְעִנִּיתֶם אֶת נַפְשֹׁתֵיכֶם
  chosen_reading: you shall afflict yourselves
  alternative_readings:
  - you shall humble yourselves
  - you shall deny yourselves
  rationale: The verse prescribes a cultic act of self-denial on the Day of Atonement.
    'Afflict yourselves' preserves the ritual and penitential force without prematurely
    narrowing the practice to fasting alone or softening it to a merely inward attitude.
    This keeps the theological weight of the command while avoiding over-interpretation.
  doctrine_reference: Translation philosophy §3, §5
