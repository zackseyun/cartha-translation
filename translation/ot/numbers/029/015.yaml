id: NUM.29.15
reference: Numbers 29:15
source:
  edition: WLC
  text: וְ/עִשָּׂרׄוֹן֙ עִשָּׂר֔וֹן לַ/כֶּ֖בֶשׂ הָ/אֶחָ֑ד לְ/אַרְבָּעָ֥ה עָשָׂ֖ר כְּבָשִֽׂים׃
translation:
  text: and one-tenth for each lamb, for the fourteen lambs;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew repeats 'one-tenth' twice ('a tenth, a tenth'), an idiom expressing
      the amount assigned to each individual lamb.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִשָּׂרוֹן ... עִשָּׂרוֹן
  chosen: one-tenth
  alternatives:
  - a tenth part
  - one-tenth measure
  - one-tenth of an ephah
  lexicon: HALOT
  rationale: The repeated noun עִשָּׂרוֹן denotes a tenth-part measure, in sacrificial
    contexts conventionally a tenth of an ephah of fine flour. English 'one-tenth'
    is concise and natural here. The repetition in Hebrew has a distributive force
    ('a tenth, a tenth'), which is carried idiomatically in English by 'one-tenth
    for each' rather than woodenly repeating the noun twice.
- source_word: לַכֶּבֶשׂ הָאֶחָד
  chosen: for each lamb
  alternatives:
  - for the one lamb
  - for one lamb
  lexicon: HALOT
  rationale: Literally 'for the one lamb.' In this list of offerings, the phrase functions
    distributively, specifying the amount assigned per animal. 'For each lamb' best
    conveys the sense in clear English.
- source_word: לְאַרְבָּעָה עָשָׂר כְּבָשִׂים
  chosen: for the fourteen lambs
  alternatives:
  - for fourteen lambs
  lexicon: HALOT
  rationale: This phrase states the total set to which the per-lamb measure applies.
    Retaining 'the' reflects the Hebrew's definite, contextually specified group of
    fourteen lambs in the festival prescription.
