id: NUM.29.25
reference: Numbers 29:25
source:
  edition: WLC
  text: וּ/שְׂעִיר עִזִּ֥ים אֶחָ֖ד חַטָּ֑את מִ/לְּ/בַד֙ עֹלַ֣ת הַ/תָּמִ֔יד מִנְחָתָ֖/הּ
    וְ/נִסְכָּֽ/הּ־׃ס
translation:
  text: and one male goat for a sin offering, besides the regular burnt offering,
    its grain offering, and its drink offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the continual burnt offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׂעִיר עִזִּים
  chosen: and one male goat
  alternatives:
  - and one goat of the goats
  - and one he-goat
  lexicon: HALOT
  rationale: שׂעיר עזים is the standard sacrificial expression for a male goat. 'Male
    goat' is clear modern English; 'he-goat' is more formal but less natural, and
    'goat of the goats' is overly literal.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Cardinal number specifying the quantity of the sacrificial animal.
- source_word: חַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - sin offering
  lexicon: HALOT
  rationale: In sacrificial contexts חטאת commonly denotes the offering rather than
    abstract 'sin.' Rendering with 'for a sin offering' makes the construction natural
    in English while preserving the cultic sense.
- source_word: מִ/לְּ/בַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: The prepositional expression marks that this sacrifice is additional
    to the regularly prescribed offering.
- source_word: עֹלַת הַ/תָּמִיד
  chosen: the regular burnt offering
  alternatives:
  - the continual burnt offering
  - the daily burnt offering
  lexicon: HALOT
  rationale: תמיד here refers to the regular, ongoing offering. 'Regular burnt offering'
    is idiomatic and accurate; 'continual' is more formal, while 'daily' may be too
    specific though often contextually true.
- source_word: מִנְחָתָהּ
  chosen: its grain offering
  alternatives:
  - its tribute offering
  lexicon: HALOT
  rationale: מנחה in priestly sacrificial lists usually refers to the accompanying
    grain offering. 'Grain offering' is the clearest established English rendering
    in this cultic context.
- source_word: וְ/נִסְכָּהּ
  chosen: and its drink offering
  alternatives:
  - and its libation
  lexicon: HALOT
  rationale: נסך in sacrificial contexts denotes the poured-out drink offering. 'Drink
    offering' is more accessible than 'libation' while preserving the ritual meaning.
