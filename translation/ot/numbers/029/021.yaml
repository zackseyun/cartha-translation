id: NUM.29.21
reference: Numbers 29:21
source:
  edition: WLC
  text: וּ/מִנְחָתָ֣/ם וְ/נִסְכֵּי/הֶ֡ם לַ֠/פָּרִים לָ/אֵילִ֧ם וְ/לַ/כְּבָשִׂ֛ים בְּ/מִסְפָּרָ֖/ם
    כַּ/מִּשְׁפָּֽט׃
translation:
  text: and their grain offering and their drink offerings for the bulls, for the
    rams, and for the lambs, according to their number, according to the ordinance;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the prescribed procedure.' The Hebrew term refers to the
      established ritual rule for these offerings.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָתָם
  chosen: their grain offering
  alternatives:
  - their offering
  - their tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes the grain offering accompanying
    burnt offerings. 'Grain offering' is the standard contextual rendering and fits
    the cultic list here better than the broader 'offering.' Singular with plural
    suffix is retained as a collective tied to the listed animals.
- source_word: נִסְכֵּיהֶם
  chosen: their drink offerings
  alternatives:
  - their libations
  lexicon: HALOT
  rationale: נֶסֶךְ refers to poured liquid offerings accompanying sacrifices. 'Drink
    offerings' is clear modern English and more accessible than 'libations,' while
    preserving the ritual sense.
- source_word: לַפָּרִים
  chosen: for the bulls
  alternatives:
  - for the young bulls
  lexicon: HALOT
  rationale: פָּרִים are bulls in sacrificial terminology. 'Young bulls' is possible
    in some contexts, but the Hebrew here does not explicitly add 'young'; 'bulls'
    is sufficiently precise.
- source_word: לָאֵילִם
  chosen: for the rams
  lexicon: HALOT
  rationale: אַיִל in sacrificial lists is straightforwardly 'ram.'
- source_word: וְלַכְּבָשִׂים
  chosen: and for the lambs
  alternatives:
  - and for the male lambs
  lexicon: HALOT
  rationale: כֶּבֶשׂ denotes a lamb, often male in sacrificial usage. English 'lambs'
    is natural and adequate here without over-specifying unless the context requires
    it.
- source_word: בְּמִסְפָּרָם
  chosen: according to their number
  alternatives:
  - by their number
  - in their number
  lexicon: HALOT
  rationale: The phrase indicates correspondence to the prescribed count of each animal
    category. 'According to their number' is idiomatic and preserves the administrative
    precision of the ritual instruction.
- source_word: כַּמִּשְׁפָּט
  chosen: according to the ordinance
  alternatives:
  - according to the rule
  - according to the prescribed procedure
  - according to the custom
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to the prescribed legal/ritual regulation governing
    the offerings. 'Ordinance' preserves the formal cultic sense better than the looser
    'custom.'
