- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering אִשֶּׁה in sacrificial terminology
  chosen_reading: a food offering
  alternative_readings:
  - an offering by fire
  - a fire offering
  rationale: The verse is a cultic inventory, and a clear modern technical rendering is preferred. Because many readers know the traditional 'offering by fire,' that alternative is preserved in a footnote for auditability.
