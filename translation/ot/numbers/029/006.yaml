id: NUM.29.6
reference: Numbers 29:6
source:
  edition: WLC
  text: מִ/לְּ/בַד֩ עֹלַ֨ת הַ/חֹ֜דֶשׁ וּ/מִנְחָתָ֗/הּ וְ/עֹלַ֤ת הַ/תָּמִיד֙ וּ/מִנְחָתָ֔/הּ וְ/נִסְכֵּי/הֶ֖ם כְּ/מִשְׁפָּטָ֑/ם לְ/רֵ֣יחַ נִיחֹ֔חַ אִשֶּׁ֖ה לַ/יהוָֽה׃ס
translation:
  text: besides the burnt offering of the month and its grain offering, and the regular burnt offering and its grain offering, and their drink offerings, according to their ordinance, as a pleasing aroma, a food offering to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'an offering by fire' or 'a fire offering.'
    reason: lexical_alternative
  - marker: b
    text: '''The burnt offering of the month'' likely refers to the offering for the new moon; the Hebrew wording is literally ''of the month.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: Introduces these offerings as additional to those already prescribed. 'Besides' is concise and idiomatic in sacrificial inventory contexts.
- source_word: עֹלַת הַחֹדֶשׁ
  chosen: the burnt offering of the month
  alternatives:
  - the monthly burnt offering
  - the burnt offering for the new moon
  lexicon: HALOT
  rationale: Literally 'burnt offering of the month.' This likely refers to the new-moon offering, but the Hebrew here says 'month,' so the translation stays close to the wording while remaining natural English.
- source_word: מִנְחָתָהּ
  chosen: its grain offering
  alternatives:
  - its tribute offering
  - its offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes the grain offering accompanying an animal sacrifice. 'Its' refers back to the singular burnt offering.
- source_word: עֹלַת הַתָּמִיד
  chosen: the regular burnt offering
  alternatives:
  - the continual burnt offering
  - the daily burnt offering
  lexicon: HALOT
  rationale: תָּמִיד denotes regular continuity. 'Regular' is readable modern English and preserves the ongoing prescribed nature of the offering without over-specifying beyond the Hebrew.
- source_word: וְנִסְכֵּיהֶם
  chosen: and their drink offerings
  alternatives:
  - and their libations
  lexicon: HALOT
  rationale: נֶסֶךְ refers to poured drink offerings accompanying sacrifices. 'Drink offerings' is standard, clear English; plural suffix matches the multiple offerings in view.
- source_word: כְּמִשְׁפָּטָם
  chosen: according to their ordinance
  alternatives:
  - according to their rule
  - according to the prescribed manner
  - according to their judgment
  lexicon: HALOT
  rationale: In cultic procedure מִשְׁפָּט refers to the prescribed regulation or ordinance governing performance. 'According to their ordinance' preserves the formal cultic sense.
- source_word: לְרֵיחַ נִיחֹחַ
  chosen: as a pleasing aroma
  alternatives:
  - for a soothing aroma
  - for a sweet-smelling aroma
  lexicon: HALOT
  rationale: This fixed sacrificial formula conveys acceptability before God. 'Pleasing aroma' is idiomatic modern English and avoids archaic phrasing while preserving the metaphor.
- source_word: אִשֶּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: Though traditionally rendered 'offering made by fire,' the term denotes an offering presented in fire and functions as a technical sacrificial term. 'Food offering' reflects common modern lexical understanding and reads naturally alongside the aroma formula.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' 'To the LORD' fits the dative/benefactive sense in sacrificial dedication.
