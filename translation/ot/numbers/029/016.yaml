id: NUM.29.16
reference: Numbers 29:16
source:
  edition: WLC
  text: וּ/שְׂעִיר עִזִּ֥ים אֶחָ֖ד חַטָּ֑את מִ/לְּ/בַד֙ עֹלַ֣ת הַ/תָּמִ֔יד מִנְחָתָ֖/הּ
    וְ/נִסְכָּֽ/הּ־׃ס
translation:
  text: and one male goat for a sin offering, besides the regular burnt offering,
    its grain offering, and its drink offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "purification offering" for "sin offering."
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂעִיר עִזִּים
  chosen: male goat
  alternatives:
  - goat
  - kid of the goats
  - he-goat
  lexicon: HALOT
  rationale: The construct phrase denotes a goat, specifically a male goat used sacrificially.
    'Male goat' is clear modern English and preserves the animal's sex, which is explicit
    in the Hebrew expression.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Cardinal number indicating the quantity of the sacrificial animal.
- source_word: חַטָּאת
  chosen: sin offering
  alternatives:
  - purification offering
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly denotes the offering rather
    than abstract 'sin.' 'Sin offering' is the standard and most recognizable rendering
    here, though 'purification offering' is a possible contextual alternative.
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: The prepositional expression marks that this sacrifice is additional
    to the regularly prescribed offering.
- source_word: עֹלַת הַתָּמִיד
  chosen: the regular burnt offering
  alternatives:
  - the continual burnt offering
  - the daily burnt offering
  lexicon: HALOT
  rationale: The phrase refers to the standing, repeated burnt offering. 'Regular'
    communicates ongoing prescribed recurrence in natural English; 'continual' is
    more formal but less idiomatic.
- source_word: מִנְחָתָהּ
  chosen: its grain offering
  alternatives:
  - its tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in cultic contexts refers to the grain offering accompanying
    a sacrifice. The 3fs suffix refers back to the burnt offering (עֹלָה, feminine).
- source_word: וְנִסְכָּהּ
  chosen: and its drink offering
  alternatives:
  - and its libation
  lexicon: HALOT
  rationale: נֶסֶךְ is the accompanying poured-out offering. 'Drink offering' is standard
    accessible English; 'libation' is accurate but less common.
