id: NUM.29.23
reference: Numbers 29:23
source:
  edition: WLC
  text: וּ/בַ/יּ֧וֹם הָ/רְבִיעִ֛י פָּרִ֥ים עֲשָׂרָ֖ה אֵילִ֣ם שְׁנָ֑יִם כְּבָשִׂ֧ים
    בְּנֵֽי שָׁנָ֛ה אַרְבָּעָ֥ה עָשָׂ֖ר תְּמִימִֽם־׃
translation:
  text: 'And on the fourth day: ten bulls, two rams, fourteen one-year-old lambs without
    blemish,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/בַ/יּוֹם
  chosen: And on the ... day
  alternatives:
  - And on the day
  - On the ... day
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with 'day' naturally introduce
    the next item in a sequential ritual list. 'And on the ... day' preserves the
    connective force and the temporal formula.
- source_word: הָרְבִיעִי
  chosen: fourth
  alternatives:
  - the fourth
  lexicon: HALOT
  rationale: Ordinal adjective modifying 'day.' English idiom in this construction
    is 'on the fourth day.'
- source_word: פָּרִים
  chosen: bulls
  alternatives:
  - young bulls
  - oxen
  lexicon: HALOT
  rationale: In sacrificial contexts פַּר/פָּרִים commonly refers to bulls. 'Bulls'
    is the clearest and most standard rendering here.
- source_word: עֲשָׂרָה
  chosen: ten
  lexicon: HALOT
  rationale: Cardinal number specifying the quantity of bulls.
- source_word: אֵילִם
  chosen: rams
  lexicon: HALOT
  rationale: Standard sacrificial animal term; 'rams' is the direct lexical equivalent.
- source_word: שְׁנַיִם
  chosen: two
  lexicon: HALOT
  rationale: Cardinal number specifying the quantity of rams.
- source_word: כְּבָשִׂים
  chosen: lambs
  alternatives:
  - male lambs
  lexicon: HALOT
  rationale: The term denotes lambs in sacrificial lists. Because the age phrase follows
    and English sacrificial style commonly uses 'lambs,' this is sufficient in the
    main text.
- source_word: בְּנֵי שָׁנָה
  chosen: one-year-old
  alternatives:
  - a year old
  - sons of a year
  lexicon: HALOT
  rationale: This Hebrew idiom means animals in their first year/about a year old.
    'One-year-old' is natural modern English while remaining precise.
- source_word: אַרְבָּעָה עָשָׂר
  chosen: fourteen
  lexicon: HALOT
  rationale: Compound cardinal number specifying the quantity of lambs.
- source_word: תְּמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial legislation this adjective denotes animals free from defect.
    'Without blemish' is the established and precise cultic rendering in clear modern
    English.
