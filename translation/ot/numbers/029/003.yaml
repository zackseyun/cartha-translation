id: NUM.29.3
reference: Numbers 29:3
source:
  edition: WLC
  text: וּ/מִנְחָתָ֔/ם סֹ֖לֶת בְּלוּלָ֣ה בַ/שָּׁ֑מֶן שְׁלֹשָׁ֤ה עֶשְׂרֹנִים֙ לַ/פָּ֔ר
    שְׁנֵ֥י עֶשְׂרֹנִ֖ים לָ/אָֽיִל׃
translation:
  text: 'And their grain offering shall be fine flour mixed with oil: three-tenths
    for the bull, and two-tenths for the ram.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'three tenths' and 'two tenths' refer to tenth-parts of an ephah,
      a dry measure used in Israel's sacrificial system.
    reason: cultural_note
lexical_decisions:
- source_word: וּמִנְחָתָם
  chosen: And their grain offering shall be
  alternatives:
  - and their offering
  - with their grain offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes the grain offering rather
    than a generic gift or offering. The prefixed conjunction is carried as 'And.'
    The verbless Hebrew is rendered with 'shall be' for natural English and to connect
    with the quantified specification that follows.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - fine meal
  lexicon: HALOT
  rationale: סֹלֶת refers to high-quality finely milled flour used in offerings. 'Fine
    flour' is the standard clear English equivalent in cultic contexts.
- source_word: בְּלוּלָה בַשָּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  - blended with oil
  lexicon: HALOT
  rationale: The passive participle בְּלוּלָה with the preposition ב marks flour prepared
    by being mixed with oil. 'Mixed with oil' is idiomatic modern English and preserves
    the preparation detail.
- source_word: שְׁלֹשָׁה עֶשְׂרֹנִים
  chosen: three-tenths
  alternatives:
  - three tenth-parts of an ephah
  - three omers
  lexicon: HALOT
  rationale: עִשָּׂרוֹן is a tenth-measure, conventionally a tenth of an ephah in
    sacrificial legislation. English versions often shorten this to 'three-tenths'
    when the measure is understood from context. This keeps the text readable while
    preserving the quantitative force.
- source_word: לַפָּר
  chosen: for the bull
  alternatives:
  - for each bull
  - for the young bull
  lexicon: HALOT
  rationale: פַּר denotes a bull in sacrificial contexts. 'For the bull' matches the
    singular form here and fits the immediate listing of required amounts.
- source_word: שְׁנֵי עֶשְׂרֹנִים
  chosen: two-tenths
  alternatives:
  - two tenth-parts of an ephah
  lexicon: HALOT
  rationale: As above, the measure is abbreviated naturally in English as 'two-tenths,'
    with the underlying sacrificial unit understood from context.
- source_word: לָאָיִל
  chosen: for the ram
  alternatives:
  - for each ram
  lexicon: HALOT
  rationale: אַיִל is 'ram' in sacrificial contexts. The singular is preserved.
