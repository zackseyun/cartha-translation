id: NUM.29.24
reference: Numbers 29:24
source:
  edition: WLC
  text: מִנְחָתָ֣/ם וְ/נִסְכֵּי/הֶ֡ם לַ֠/פָּרִים לָ/אֵילִ֧ם וְ/לַ/כְּבָשִׂ֛ים בְּ/מִסְפָּרָ֖/ם
    כַּ/מִּשְׁפָּֽט׃
translation:
  text: and their grain offering and their drink offerings for the bulls, for the
    rams, and for the lambs, according to their number, according to the ordinance;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the prescribed rule/manner.' The Hebrew term refers to
      the established legal procedure for these offerings.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָתָם
  chosen: their grain offering
  alternatives:
  - their offering
  - their tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes the grain offering accompanying
    animal sacrifices, not a generic offering. Singular with 3mp suffix is retained
    as a collective singular in English.
- source_word: וְנִסְכֵּיהֶם
  chosen: and their drink offerings
  alternatives:
  - and their libations
  lexicon: HALOT
  rationale: נֶסֶךְ refers to poured drink offerings. 'Drink offerings' is standard,
    clear modern English; 'libations' is possible but less accessible.
- source_word: לַפָּרִים
  chosen: for the bulls
  alternatives:
  - with the bulls
  lexicon: HALOT
  rationale: The prefixed ל marks relation/distribution to the sacrificial animals
    to which the accompanying offerings belong. 'For the bulls' communicates this
    naturally in English.
- source_word: לָאֵילִם
  chosen: for the rams
  alternatives:
  - with the rams
  lexicon: HALOT
  rationale: Same distributive ל as with 'bulls'; rendered consistently.
- source_word: וְלַכְּבָשִׂים
  chosen: and for the lambs
  alternatives:
  - and with the lambs
  lexicon: HALOT
  rationale: Continues the same list of sacrificial animals; 'lambs' is the normal
    rendering of כבשׂים in this cultic context.
- source_word: בְּמִסְפָּרָם
  chosen: according to their number
  alternatives:
  - by their number
  - in their number
  lexicon: HALOT
  rationale: This phrase indicates that the accompanying offerings are apportioned
    in correspondence with the number of animals. 'According to their number' is idiomatic
    and preserves the procedural sense.
- source_word: כַּמִּשְׁפָּט
  chosen: according to the ordinance
  alternatives:
  - according to the rule
  - according to the prescribed manner
  - according to the custom
  lexicon: HALOT
  rationale: In sacrificial legislation מִשְׁפָּט often means the prescribed legal
    procedure or ordinance. 'Ordinance' preserves the formal cultic/legal nuance better
    than the more generic 'custom.'
