id: NUM.29.37
reference: Numbers 29:37
source:
  edition: WLC
  text: מִנְחָתָ֣/ם וְ/נִסְכֵּי/הֶ֗ם לַ/פָּ֨ר לָ/אַ֧יִל וְ/לַ/כְּבָשִׂ֛ים בְּ/מִסְפָּרָ֖/ם
    כַּ/מִּשְׁפָּֽט׃
translation:
  text: and their grain offering and their drink offerings for the bull, for the ram,
    and for the lambs, according to their number, according to the ordinance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the prescribed manner.' The Hebrew term refers to the established
      rule or legal prescription governing these offerings.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָתָם
  chosen: their grain offering
  alternatives:
  - their offering
  - their tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes the grain offering that
    accompanies animal sacrifices, not a generic gift. Singular with 3mp suffix is
    retained as a collective singular in English.
- source_word: וְנִסְכֵּיהֶם
  chosen: and their drink offerings
  alternatives:
  - and their libations
  lexicon: HALOT
  rationale: נֶסֶךְ refers to poured liquid offerings accompanying sacrifices. 'Drink
    offerings' is standard, clear modern English; 'libations' is possible but less
    accessible.
- source_word: לַפָּר
  chosen: for the bull
  alternatives:
  - for the young bull
  lexicon: HALOT
  rationale: פַּר denotes a bull from the herd. 'Bull' is the most direct rendering
    here; 'young bull' can be contextually appropriate elsewhere but is not required
    by the form alone in this verse.
- source_word: לָאַיִל
  chosen: for the ram
  lexicon: HALOT
  rationale: אַיִל straightforwardly means 'ram' in sacrificial lists.
- source_word: וְלַכְּבָשִׂים
  chosen: and for the lambs
  alternatives:
  - and for the male lambs
  lexicon: HALOT
  rationale: כֶּבֶשׂ means 'lamb,' often specifically a male lamb in sacrificial usage.
    English 'lambs' is natural and sufficient in this list context.
- source_word: בְּמִסְפָּרָם
  chosen: according to their number
  alternatives:
  - by their number
  - in their number
  lexicon: HALOT
  rationale: The phrase indicates correspondence to the counted number of sacrificial
    animals. 'According to their number' is idiomatic and preserves the procedural
    sense.
- source_word: כַּמִּשְׁפָּט
  chosen: according to the ordinance
  alternatives:
  - according to the rule
  - according to the prescribed manner
  - according to the custom
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to the prescribed legal/procedural requirement
    for the offerings. 'Ordinance' preserves the formal cultic sense better than the
    more generic 'custom.'
