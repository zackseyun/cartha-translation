id: NUM.29.35
reference: Numbers 29:35
source:
  edition: WLC
  text: בַּ/יּוֹם֙ הַ/שְּׁמִינִ֔י עֲצֶ֖רֶת תִּהְיֶ֣ה לָ/כֶ֑ם כָּל מְלֶ֥אכֶת עֲבֹדָ֖ה
    לֹ֥א תַעֲשֽׂוּ־׃
translation:
  text: On the eighth day you shall have a solemn assembly; you shall do no regular
    work.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a closing assembly.' The Hebrew עֲצֶרֶת can denote a concluding festival
      assembly.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַשְּׁמִינִי
  chosen: On the eighth day
  alternatives:
  - On day eight
  - On the eighth day of the festival
  lexicon: HALOT
  rationale: Temporal prepositional phrase marking when the command applies. 'On the
    eighth day' is natural English and preserves the definite ordinal sense.
- source_word: עֲצֶרֶת
  chosen: a solemn assembly
  alternatives:
  - an assembly
  - a closing assembly
  lexicon: HALOT
  rationale: The noun denotes a sacred assembly or concluding convocation, especially
    in festival context. 'Solemn assembly' is a well-established and contextually
    fitting rendering that preserves the formal, sacred character without over-specifying
    beyond the Hebrew.
- source_word: תִּהְיֶה לָכֶם
  chosen: you shall have
  alternatives:
  - shall be for you
  - there shall be for you
  lexicon: HALOT
  rationale: Literally 'shall be for you.' In idiomatic English, 'you shall have'
    communicates the possessive/existential force clearly while remaining close to
    the Hebrew.
- source_word: כָּל מְלֶאכֶת עֲבֹדָה
  chosen: regular work
  alternatives:
  - occupational work
  - laborious work
  - servile work
  lexicon: HALOT
  rationale: This collocation commonly refers to ordinary occupational labor prohibited
    on sacred days, not absolutely every activity. 'Regular work' is clear modern
    English and captures the distinction between common labor and permitted cultic
    acts better than the archaic 'servile work.'
- source_word: לֹא תַעֲשׂוּ
  chosen: you shall do no
  alternatives:
  - you shall not do
  - do not do
  lexicon: HALOT
  rationale: Second person plural imperfect with negation in legal instruction. 'You
    shall do no' fits the formal legislative style in English and pairs naturally
    with 'regular work.'
