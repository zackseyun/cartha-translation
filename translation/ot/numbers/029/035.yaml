theological_decisions:
- issue: Festival terminology for עֲצֶרֶת
  chosen_reading: Rendered as 'solemn assembly' without importing later doctrinal
    or liturgical identification into the main text.
  alternative_readings:
  - Rendered more specifically as 'closing assembly' to emphasize the concluding festival
    day
  rationale: The Hebrew indicates a sacred assembly on the eighth day. The verse itself
    does not require a fuller theological explanation of the feast structure, so the
    translation preserves the ritual term in accessible English without interpretive
    expansion.
  doctrine_reference: Translation philosophy §§1, 3, 6
