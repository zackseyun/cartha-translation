id: NUM.29.10
reference: Numbers 29:10
source:
  edition: WLC
  text: עִשָּׂרוֹן֙ עִשָּׂר֔וֹן לַ/כֶּ֖בֶשׂ הָ/אֶחָ֑ד לְ/שִׁבְעַ֖ת הַ/כְּבָשִֽׂים׃
translation:
  text: a tenth of an ephah for each lamb, for the seven lambs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew simply says 'a tenth, a tenth'; in sacrificial contexts this denotes
      a tenth of an ephah.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִשָּׂרוֹן עִשָּׂרוֹן
  chosen: a tenth of an ephah
  alternatives:
  - one-tenth
  - a tenth measure
  lexicon: HALOT
  rationale: The repeated noun construction is idiomatic in sacrificial regulations
    and refers to a tenth-measure of grain, conventionally understood as a tenth of
    an ephah. Supplying 'of an ephah' makes the measure intelligible in English and
    matches the cultic context without over-paraphrasing.
- source_word: לַכֶּבֶשׂ הָאֶחָד
  chosen: for each lamb
  alternatives:
  - for the one lamb
  - for one lamb
  lexicon: HALOT
  rationale: Literally 'for the one lamb,' but in this distributive listing of offerings
    the sense is per animal. 'For each lamb' communicates the distributive force naturally
    in English.
- source_word: לְשִׁבְעַת הַכְּבָשִׂים
  chosen: for the seven lambs
  alternatives:
  - for seven lambs
  lexicon: HALOT
  rationale: The phrase specifies the total set to which the per-lamb measure applies.
    Retaining 'the seven lambs' reflects the article in Hebrew and ties the line to
    the previously enumerated sacrificial animals.
