id: NUM.29.17
reference: Numbers 29:17
source:
  edition: WLC
  text: וּ/בַ/יּ֣וֹם הַ/שֵּׁנִ֗י פָּרִ֧ים בְּנֵי בָקָ֛ר שְׁנֵ֥ים עָשָׂ֖ר אֵילִ֣ם שְׁנָ֑יִם
    כְּבָשִׂ֧ים בְּנֵי שָׁנָ֛ה אַרְבָּעָ֥ה עָשָׂ֖ר תְּמִימִֽם־־׃
translation:
  text: 'And on the second day: twelve bulls from the herd, two rams, and fourteen
    one-year-old lambs without blemish,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'twelve bulls, sons of the herd.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/יּוֹם
  chosen: And on the ... day
  alternatives:
  - And on the day
  - On the ... day
  lexicon: HALOT
  rationale: The conjunction plus preposition and noun naturally introduces the next
    item in a sequence of festival offerings. Rendering with 'And on' preserves the
    narrative/list continuity from the surrounding verses.
- source_word: הַ/שֵּׁנִי
  chosen: second
  lexicon: HALOT
  rationale: Ordinal adjective; straightforwardly 'second.'
- source_word: פָּרִים
  chosen: bulls
  alternatives:
  - young bulls
  - oxen
  lexicon: HALOT
  rationale: In sacrificial contexts פַּר/פָּרִים refers to bulls. 'Young bulls' is
    possible in some English traditions, but the Hebrew here does not explicitly mark
    youth beyond the species/class expression that follows.
- source_word: בְּנֵי בָקָר
  chosen: from the herd
  alternatives:
  - of the herd
  - young bulls
  lexicon: HALOT
  rationale: Literally 'sons of cattle/herd,' an idiom specifying herd cattle. 'From
    the herd' is natural modern English and preserves the classificatory force without
    awkward literalism.
- source_word: שְׁנֵים עָשָׂר
  chosen: twelve
  lexicon: HALOT
  rationale: Cardinal number modifying 'bulls.'
- source_word: אֵילִם
  chosen: rams
  lexicon: HALOT
  rationale: Standard sacrificial term for male sheep, 'rams.'
- source_word: שְׁנָיִם
  chosen: two
  lexicon: HALOT
  rationale: Cardinal number modifying 'rams.'
- source_word: כְּבָשִׂים
  chosen: lambs
  alternatives:
  - male lambs
  - sheep
  lexicon: HALOT
  rationale: In this sacrificial inventory, 'lambs' is the most idiomatic rendering.
    The following age phrase clarifies they are young animals.
- source_word: בְּנֵי שָׁנָה
  chosen: one-year-old
  alternatives:
  - a year old
  - in their first year
  lexicon: HALOT
  rationale: Literally 'sons of a year,' a standard idiom for animals one year old.
    Hyphenated adjectival English is concise and natural.
- source_word: אַרְבָּעָה עָשָׂר
  chosen: fourteen
  lexicon: HALOT
  rationale: Cardinal number modifying 'lambs.'
- source_word: תְּמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial legislation this adjective denotes animals free from defect.
    'Without blemish' is the established and precise cultic rendering in clear modern
    English.
