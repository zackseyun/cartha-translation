id: NUM.29.12
reference: Numbers 29:12
source:
  edition: WLC
  text: וּ/בַ/חֲמִשָּׁה֩ עָשָׂ֨ר י֜וֹם לַ/חֹ֣דֶשׁ הַ/שְּׁבִיעִ֗י מִֽקְרָא קֹ֨דֶשׁ֙ יִהְיֶ֣ה לָ/כֶ֔ם כָּל מְלֶ֥אכֶת עֲבֹדָ֖ה לֹ֣א תַעֲשׂ֑וּ וְ/חַגֹּתֶ֥ם חַ֛ג לַ/יהוָ֖ה שִׁבְעַ֥ת יָמִֽים־־׃
translation:
  text: And on the fifteenth day of the seventh month, you shall have a holy convocation. You shall do no ordinary work, and you shall keep a feast to Yahweh seven days.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/בַ/חֲמִשָּׁה עָשָׂר יוֹם
  chosen: And on the fifteenth day
  alternatives:
  - And on the fifteenth
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with the cardinal expression idiomatically mean 'and on the fifteenth day.' Supplying 'day' is required by the Hebrew construction and natural English style.
- source_word: לַחֹדֶשׁ הַשְּׁבִיעִי
  chosen: of the seventh month
  alternatives:
  - in the seventh month
  lexicon: HALOT
  rationale: The phrase specifies the month to which the day belongs. 'Of the seventh month' is slightly more formal and fits the calendrical formula.
- source_word: מִקְרָא קֹדֶשׁ
  chosen: a holy convocation
  alternatives:
  - a sacred assembly
  - a holy assembly
  lexicon: HALOT
  rationale: This is a standard cultic expression for an officially summoned sacred gathering. 'Holy convocation' preserves the formal, liturgical sense while remaining understandable.
- source_word: יִהְיֶה לָכֶם
  chosen: you shall have
  alternatives:
  - shall be for you
  - there shall be for you
  lexicon: HALOT
  rationale: The Hebrew literally says 'shall be for you,' but in English 'you shall have' expresses the same sense more naturally without loss.
- source_word: כָּל מְלֶאכֶת עֲבֹדָה
  chosen: ordinary work
  alternatives:
  - laborious work
  - occupational work
  - servile work
  lexicon: HALOT
  rationale: The phrase refers to regular occupational labor prohibited on sacred days, not absolutely every activity. 'Ordinary work' communicates the contrast with sacred observance in clear modern English.
- source_word: לֹא תַעֲשׂוּ
  chosen: You shall do no
  alternatives:
  - you shall not do
  - do not do
  lexicon: HALOT
  rationale: Future-style prohibition is standard in legal material. 'You shall do no ordinary work' is idiomatic and preserves the prescriptive force.
- source_word: וְחַגֹּתֶם חַג
  chosen: you shall keep a feast
  alternatives:
  - you shall celebrate a festival
  - you shall observe a feast
  lexicon: HALOT
  rationale: The cognate verb-noun construction intensifies the idea of festival observance. 'Keep a feast' is concise and suitably formal; 'celebrate a festival' is possible but slightly more interpretive.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition marks the feast as directed to or in honor of YHWH. Following the doctrine guideline, יהוה is rendered 'the LORD.' 'To the LORD' preserves the directional nuance.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  alternatives:
  - for seven days
  lexicon: HALOT
  rationale: The duration of the feast is seven days. English can express this either with or without 'for'; the bare phrase after 'keep a feast' reads naturally.
