id: NUM.29.18
reference: Numbers 29:18
source:
  edition: WLC
  text: וּ/מִנְחָתָ֣/ם וְ/נִסְכֵּי/הֶ֡ם לַ֠/פָּרִים לָ/אֵילִ֧ם וְ/לַ/כְּבָשִׂ֛ים בְּ/מִסְפָּרָ֖/ם
    כַּ/מִּשְׁפָּֽט׃
translation:
  text: and their grain offering and their drink offerings for the bulls, for the
    rams, and for the lambs, according to their number, according to the ordinance;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the prescribed manner.' The Hebrew כַּמִּשְׁפָּט refers
      to the established rule or procedure for these offerings.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָתָם
  chosen: their grain offering
  alternatives:
  - their offering
  - their tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes the grain offering that
    accompanies burnt offerings. 'Grain offering' is more precise than the generic
    'offering' and fits the cultic context of Numbers 29.
- source_word: נִסְכֵּיהֶם
  chosen: their drink offerings
  alternatives:
  - their libations
  lexicon: HALOT
  rationale: נֶסֶךְ refers to poured liquid offerings accompanying sacrifices. 'Drink
    offerings' is standard, clear modern English; 'libations' is accurate but less
    accessible.
- source_word: לַפָּרִים
  chosen: for the bulls
  alternatives:
  - with the bulls
  lexicon: HALOT
  rationale: The prefixed ל marks relation/distribution to the sacrificial animals
    listed. 'For the bulls' communicates that these accompanying offerings correspond
    to the bulls.
- source_word: לָאֵילִם
  chosen: for the rams
  alternatives:
  - with the rams
  lexicon: HALOT
  rationale: As with the previous noun, the ל indicates the grain and drink offerings
    assigned to this class of sacrificial animal.
- source_word: וְלַכְּבָשִׂים
  chosen: and for the lambs
  alternatives:
  - and with the lambs
  lexicon: HALOT
  rationale: Continues the distributive list of animals to which the accompanying
    offerings belong. 'Lambs' is the normal rendering of כְּבָשִׂים in sacrificial
    legislation.
- source_word: בְּמִסְפָּרָם
  chosen: according to their number
  alternatives:
  - by their number
  - in their number
  lexicon: HALOT
  rationale: This phrase indicates that the quantities are apportioned in correspondence
    with the number of animals. 'According to their number' is idiomatic and preserves
    the procedural sense.
- source_word: כַּמִּשְׁפָּט
  chosen: according to the ordinance
  alternatives:
  - according to the rule
  - according to the prescribed manner
  - as prescribed
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to the prescribed legal/customary procedure for
    these offerings. 'According to the ordinance' preserves the formal cultic-legal
    nuance without becoming overly wooden.
