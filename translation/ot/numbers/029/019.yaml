id: NUM.29.19
reference: Numbers 29:19
source:
  edition: WLC
  text: וּ/שְׂעִיר עִזִּ֥ים אֶחָ֖ד חַטָּ֑את מִ/לְּ/בַד֙ עֹלַ֣ת הַ/תָּמִ֔יד וּ/מִנְחָתָ֖/הּ
    וְ/נִסְכֵּי/הֶֽם־׃ס
translation:
  text: and one male goat for a sin offering, besides the regular burnt offering and
    its grain offering and their drink offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the continual burnt offering.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their drink offerings'; the plural likely refers to the drink offerings
      belonging to the set of prescribed offerings.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׂעִיר עִזִּים
  chosen: and one male goat
  alternatives:
  - and a goat of the goats
  - and one he-goat
  lexicon: HALOT
  rationale: שׂעיר עזים is the standard sacrificial expression for a male goat. 'Male
    goat' is natural modern English; 'he-goat' is more formal but less readable.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Cardinal number specifying the quantity of the sacrificial animal.
- source_word: חַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial contexts חטאת commonly denotes the sin offering rather
    than abstract 'sin.' 'For a sin offering' makes the function explicit in idiomatic
    English.
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: Marks that this offering is additional to the continual offering complex.
    'Besides' is concise and clear.
- source_word: עֹלַת הַתָּמִיד
  chosen: the regular burnt offering
  alternatives:
  - the continual burnt offering
  - the daily burnt offering
  lexicon: HALOT
  rationale: The phrase refers to the ongoing prescribed burnt offering. 'Regular'
    communicates the continual, fixed nature in accessible English; 'continual' is
    possible but less natural for many readers.
- source_word: וּמִנְחָתָהּ
  chosen: and its grain offering
  alternatives:
  - and its tribute offering
  - and its offering
  lexicon: HALOT
  rationale: מנחה in sacrificial legislation commonly refers to the grain offering
    accompanying the burnt offering. The 3fs suffix refers back to עֹלָה, hence singular
    'its.'
- source_word: וְנִסְכֵּיהֶם
  chosen: and their drink offerings
  alternatives:
  - and its drink offering
  lexicon: HALOT
  rationale: The plural suffix and plural noun are best represented as 'their drink
    offerings,' likely referring to the drink offerings associated with the offerings
    in the complex. Retaining the plural follows the Hebrew form more closely than
    smoothing to singular.
