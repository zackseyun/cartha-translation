id: NUM.29.8
reference: Numbers 29:8
source:
  edition: WLC
  text: וְ/הִקְרַבְתֶּ֨ם עֹלָ֤ה לַֽ/יהוָה֙ רֵ֣יחַ נִיחֹ֔חַ פַּ֧ר בֶּן בָּקָ֛ר אֶחָ֖ד אַ֣יִל אֶחָ֑ד כְּבָשִׂ֤ים בְּנֵֽי שָׁנָה֙ שִׁבְעָ֔ה תְּמִימִ֖ם יִהְי֥וּ לָ/כֶֽם־־׃
translation:
  text: 'You shall present a burnt offering to Yahweh, a pleasing aroma: one bull from the herd, one ram, and seven male lambs a year old; they shall be without blemish for you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a soothing aroma.' The Hebrew phrase is a fixed sacrificial expression for an offering acceptable to the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתֶּם
  chosen: You shall present
  alternatives:
  - you shall offer
  - you shall bring near
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial context commonly means to present or offer an offering. 'Present' preserves the cultic action without sounding overly technical, while fitting modern English.
- source_word: עֹלָה
  chosen: a burnt offering
  alternatives:
  - an ascent offering
  lexicon: HALOT
  rationale: The standard sacrificial term denotes the whole offering that goes up in smoke. 'Burnt offering' is the clearest established English equivalent; 'ascent offering' is more etymologically transparent but less natural in English.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated. The preposition ל marks direction/dedication of the offering.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - an appeasing fragrance
  lexicon: HALOT
  rationale: This fixed sacrificial expression refers to the acceptability of the offering before God. 'A pleasing aroma' is idiomatic, readable, and avoids implying crude divine sensory literalism while preserving the metaphor.
- source_word: פַּר בֶּן בָּקָר אֶחָד
  chosen: one bull from the herd
  alternatives:
  - one young bull
  - one bull, a son of the herd
  lexicon: HALOT
  rationale: The phrase literally means 'one bull, son of cattle/herd,' an idiom for a bull from the herd. 'One bull from the herd' is natural English and preserves the animal specification without over-literal awkwardness.
- source_word: אַיִל אֶחָד
  chosen: one ram
  lexicon: HALOT
  rationale: Standard rendering of אַיִל in sacrificial lists.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה שִׁבְעָה
  chosen: seven male lambs a year old
  alternatives:
  - seven lambs a year old
  - seven year-old lambs
  lexicon: HALOT
  rationale: כְּבָשִׂים are male lambs; the Hebrew is gender-specific, so 'male' is retained per gender-accurate policy. בְּנֵי שָׁנָה is the idiom for one year old / a year old.
- source_word: תְּמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial contexts תמימים denotes animals free from defect. 'Without blemish' is the clearest established rendering.
- source_word: יִהְיוּ לָכֶם
  chosen: they shall be without blemish for you
  alternatives:
  - they shall be yours without blemish
  - they must be without blemish
  lexicon: HALOT
  rationale: The Hebrew explicitly includes לָכֶם, which is not always represented in English. 'For you' preserves the dative relation, indicating the required condition of the animals brought by the worshipers.
