id: NUM.29.4
reference: Numbers 29:4
source:
  edition: WLC
  text: וְ/עִשָּׂר֣וֹן אֶחָ֔ד לַ/כֶּ֖בֶשׂ הָ/אֶחָ֑ד לְ/שִׁבְעַ֖ת הַ/כְּבָשִֽׂים׃
translation:
  text: and one-tenth for each lamb, for the seven lambs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'one-tenth'; in this sacrificial context this commonly means one-tenth
      of an ephah.
    reason: cultural_note
lexical_decisions:
- source_word: וְעִשָּׂרוֹן
  chosen: and one-tenth
  alternatives:
  - and a tenth part
  - and one-tenth of an ephah
  lexicon: HALOT
  rationale: עִשָּׂרוֹן denotes a tenth measure, regularly understood in sacrificial
    contexts as a tenth of an ephah of fine flour. The Hebrew here states only 'one-tenth,'
    so the main text keeps the concise measure without importing 'of an ephah'; that
    fuller sense can be inferred from the surrounding sacrificial legislation.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: Simple cardinal numeral modifying עִשָּׂרוֹן; rendered directly as 'one'
    within 'one-tenth.'
- source_word: לַכֶּבֶשׂ הָאֶחָד
  chosen: for each lamb
  alternatives:
  - for the one lamb
  - for one lamb
  lexicon: HALOT
  rationale: 'The phrase is literally ''for the one lamb.'' In this list of prescribed
    offerings, English idiom is clearer with distributive force: ''for each lamb.''
    This preserves the sense that the stated amount applies per individual lamb.'
- source_word: לְשִׁבְעַת הַכְּבָשִׂים
  chosen: for the seven lambs
  alternatives:
  - for seven lambs
  lexicon: HALOT
  rationale: The prepositional phrase specifies the total set to which the per-lamb
    rule applies. Retaining the article as 'the seven lambs' reflects the definite
    sacrificial group already in view in the context.
