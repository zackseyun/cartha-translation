id: NUM.29.29
reference: Numbers 29:29
source:
  edition: WLC
  text: וּ/בַ/יּ֧וֹם הַ/שִּׁשִּׁ֛י פָּרִ֥ים שְׁמֹנָ֖ה אֵילִ֣ם שְׁנָ֑יִם כְּבָשִׂ֧ים
    בְּנֵי שָׁנָ֛ה אַרְבָּעָ֥ה עָשָׂ֖ר תְּמִימִֽם־׃
translation:
  text: 'And on the sixth day: eight bulls, two rams, and fourteen male lambs a year
    old, without blemish.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/בַ/יּוֹם
  chosen: And on the ... day
  alternatives:
  - And on the day
  lexicon: HALOT
  rationale: 'The prefixed conjunction and preposition with יוֹם naturally introduce
    the next item in a sequence of daily offerings: ''And on the ... day.'' English
    idiom omits a repeated literal ''the day'' after the ordinal.'
- source_word: הַשִּׁשִּׁי
  chosen: sixth
  lexicon: HALOT
  rationale: Ordinal adjective modifying 'day'; straightforwardly rendered 'sixth'.
- source_word: פָּרִים
  chosen: bulls
  alternatives:
  - young bulls
  - oxen
  lexicon: HALOT
  rationale: In sacrificial contexts פַּר/פָּרִים commonly denotes bulls. 'Young bulls'
    is possible in some contexts, but the Hebrew here does not explicitly mark age,
    so 'bulls' is the cleaner rendering.
- source_word: שְׁמֹנָה
  chosen: eight
  lexicon: HALOT
  rationale: Cardinal number modifying 'bulls'.
- source_word: אֵילִם
  chosen: rams
  lexicon: HALOT
  rationale: Standard sacrificial term for male sheep, rendered 'rams'.
- source_word: שְׁנָיִם
  chosen: two
  lexicon: HALOT
  rationale: Cardinal number modifying 'rams'.
- source_word: כְּבָשִׂים
  chosen: male lambs
  alternatives:
  - lambs
  lexicon: HALOT
  rationale: כֶּבֶשׂ denotes a lamb; 'male lambs' makes explicit the masculine form
    and matches sacrificial specificity, though English often shortens to 'lambs'.
- source_word: בְּנֵי שָׁנָה
  chosen: a year old
  alternatives:
  - one year old
  - in their first year
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for animals one year old. 'A year old' is
    natural modern English.
- source_word: אַרְבָּעָה עָשָׂר
  chosen: fourteen
  lexicon: HALOT
  rationale: Compound cardinal number modifying 'male lambs'.
- source_word: תְּמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial legislation תמימים refers to animals free from defect.
    'Without blemish' is the established and precise cultic rendering in clear modern
    English.
