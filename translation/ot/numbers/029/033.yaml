id: NUM.29.33
reference: Numbers 29:33
source:
  edition: WLC
  text: וּ/מִנְחָתָ֣/ם וְ/נִסְכֵּ/הֶ֡ם לַ֠/פָּרִים לָ/אֵילִ֧ם וְ/לַ/כְּבָשִׂ֛ים בְּ/מִסְפָּרָ֖/ם
    כְּ/מִשְׁפָּטָֽ/ם׃
translation:
  text: and their grain offering and their drink offerings for the bulls, for the
    rams, and for the lambs, according to their number, according to their ordinance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the prescribed rule' or 'according to the ordinance for
      them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָתָם
  chosen: their grain offering
  alternatives:
  - their tribute offering
  - their offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes the grain offering that
    accompanies burnt offerings. Singular with 3mp suffix is retained as a collective
    singular, matching the Hebrew form and the recurring cultic formula in this chapter.
- source_word: נִסְכֵּיהֶם
  chosen: their drink offerings
  alternatives:
  - their libations
  lexicon: HALOT
  rationale: נֶסֶךְ refers to poured drink offerings accompanying sacrifices. 'Drink
    offerings' is standard, clear modern English; plural reflects the Hebrew plural
    construct with suffix.
- source_word: לַפָּרִים
  chosen: for the bulls
  alternatives:
  - for the young bulls
  lexicon: HALOT
  rationale: פָּרִים are bulls in sacrificial lists. 'Young bulls' is possible in
    some contexts, but the Hebrew here simply says 'bulls,' so the simpler rendering
    is preferred.
- source_word: לָאֵילִם
  chosen: for the rams
  lexicon: HALOT
  rationale: אַיִל in sacrificial contexts is straightforwardly 'ram'; plural retained.
- source_word: וְלַכְּבָשִׂים
  chosen: and for the lambs
  alternatives:
  - and for the male lambs
  lexicon: HALOT
  rationale: כֶּבֶשׂ denotes a lamb, often male in sacrificial usage. English 'lambs'
    is natural and sufficient here without over-specifying sex unless context requires
    it.
- source_word: בְּמִסְפָּרָם
  chosen: according to their number
  alternatives:
  - by their number
  - in their number
  lexicon: HALOT
  rationale: The phrase indicates correspondence to the prescribed count of animals.
    'According to their number' is idiomatic and preserves the formal structure.
- source_word: כְּמִשְׁפָּטָם
  chosen: according to their ordinance
  alternatives:
  - according to their rule
  - according to the prescribed ordinance
  - according to custom
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to the prescribed legal/customary procedure for
    these offerings. 'Ordinance' preserves the cultic-legal sense better than the
    looser 'custom.'
