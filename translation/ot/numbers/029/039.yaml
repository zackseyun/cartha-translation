id: NUM.29.39
reference: Numbers 29:39
source:
  edition: WLC
  text: אֵ֛לֶּה תַּעֲשׂ֥וּ לַ/יהוָ֖ה בְּ/מוֹעֲדֵי/כֶ֑ם לְ/בַ֨ד מִ/נִּדְרֵי/כֶ֜ם וְ/נִדְבֹתֵי/כֶ֗ם
    לְ/עֹלֹֽתֵי/כֶם֙ וּ/לְ/מִנְחֹ֣תֵי/כֶ֔ם וּ/לְ/נִסְכֵּי/כֶ֖ם וּ/לְ/שַׁלְמֵי/כֶֽם׃
translation:
  text: These you shall offer to the LORD at your appointed times, besides your vow
    offerings and your freewill offerings, for your burnt offerings and for your grain
    offerings and for your drink offerings and for your peace offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “fellowship offerings.” The Hebrew term refers to a category of well-being/peace
      offerings.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These things
  lexicon: HALOT
  rationale: Demonstrative plural referring back to the prescribed festival offerings
    in the preceding context. Simple 'These' is natural English and sufficiently definite.
- source_word: תַּעֲשׂוּ
  chosen: you shall offer
  alternatives:
  - you shall do
  - you shall make
  lexicon: HALOT
  rationale: Although the verb is literally 'do/make,' in sacrificial context with
    offerings to the LORD, English idiom is best represented by 'offer.' This reflects
    the cultic sense without over-paraphrasing.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition marks direction/dedication of the offerings. 'the LORD'
    follows the project's default rendering for יְהוָה.
- source_word: בְּמוֹעֲדֵיכֶם
  chosen: at your appointed times
  alternatives:
  - at your appointed feasts
  - at your festivals
  lexicon: HALOT
  rationale: מוֹעֵד can denote appointed time or festival occasion. Here the chapter
    concerns fixed sacred occasions; 'appointed times' preserves the broader cultic
    scheduling sense without narrowing it only to feast-days.
- source_word: לְבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: Introduces offerings that are additional to the required festival sacrifices.
    'Besides' is concise and idiomatic.
- source_word: מִנִּדְרֵיכֶם
  chosen: your vow offerings
  alternatives:
  - your vows
  - offerings from your vows
  lexicon: HALOT
  rationale: The noun refers to vowed gifts/offerings, not merely the spoken vows
    themselves. 'Vow offerings' makes the sacrificial sense explicit in English.
- source_word: וְנִדְבֹתֵיכֶם
  chosen: your freewill offerings
  alternatives:
  - your voluntary offerings
  lexicon: HALOT
  rationale: Standard sacrificial term for offerings given voluntarily rather than
    by obligation. 'Freewill offerings' is established and clear modern English.
- source_word: לְעֹלֹתֵיכֶם
  chosen: for your burnt offerings
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering. 'Burnt offerings'
    is the conventional and accurate rendering.
- source_word: וּלְמִנְחֹתֵיכֶם
  chosen: and for your grain offerings
  alternatives:
  - and for your tribute offerings
  lexicon: HALOT
  rationale: In priestly sacrificial contexts, מִנְחָה commonly denotes the grain
    offering. 'Grain offerings' is clearer for modern readers than the broader 'tribute
    offerings'.
- source_word: וּלְנִסְכֵּיכֶם
  chosen: and for your drink offerings
  alternatives:
  - and for your libations
  lexicon: HALOT
  rationale: נֶסֶךְ refers to poured liquid offerings. 'Drink offerings' is the standard
    accessible rendering; 'libations' is more technical.
- source_word: וּלְשַׁלְמֵיכֶם
  chosen: and for your peace offerings
  alternatives:
  - and for your fellowship offerings
  lexicon: HALOT
  rationale: שְׁלָמִים is traditionally 'peace offerings.' While 'fellowship offerings'
    captures one aspect, 'peace offerings' better preserves the established sacrificial
    category and lexical connection to wholeness/peace.
