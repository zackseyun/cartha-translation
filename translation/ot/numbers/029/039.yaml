theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יְהוָה is 'the LORD,' following the stated doctrine
    and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  rationale: The Hebrew sacrificial term is not a major doctrinal controversy, but
    it carries theological nuance. 'Peace offerings' preserves the traditional category
    and the semantic link to peace/wholeness, while the alternative is preserved in
    a footnote for readers familiar with that rendering.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms,
    or documented exception)
