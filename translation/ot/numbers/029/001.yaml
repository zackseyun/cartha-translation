id: NUM.29.1
reference: Numbers 29:1
source:
  edition: WLC
  text: וּ/בַ/חֹ֨דֶשׁ הַ/שְּׁבִיעִ֜י בְּ/אֶחָ֣ד לַ/חֹ֗דֶשׁ מִֽקְרָא קֹ֨דֶשׁ֙ יִהְיֶ֣ה
    לָ/כֶ֔ם כָּל מְלֶ֥אכֶת עֲבֹדָ֖ה לֹ֣א תַעֲשׂ֑וּ י֥וֹם תְּרוּעָ֖ה יִהְיֶ֥ה לָ/כֶֽם־־׃
translation:
  text: And in the seventh month, on the first day of the month, you shall have a
    holy convocation. You shall do no laborious work. It shall be a day of trumpet-blast
    for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “a day of shouting/acclamation.” The Hebrew teruah refers to a loud
      raised sound and can denote a trumpet signal, a shout, or acclamation depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/חֹדֶשׁ הַ/שְּׁבִיעִי
  chosen: And in the seventh month
  alternatives:
  - And on the seventh month
  lexicon: HALOT
  rationale: The preposition ב with the article on חֹדֶשׁ is most naturally temporal,
    'in the month.' English idiom prefers 'in the seventh month.' The conjunction
    ו is retained as 'And' to preserve the legal-sequential style.
- source_word: בְּ/אֶחָד לַ/חֹדֶשׁ
  chosen: on the first day of the month
  alternatives:
  - on the first of the month
  lexicon: HALOT
  rationale: Literally 'on one of the month,' a standard Hebrew calendrical expression
    meaning the first day of the month. The fuller English rendering is clearer for
    modern readers while staying close to the source.
- source_word: מִקְרָא קֹדֶשׁ
  chosen: a holy convocation
  alternatives:
  - a sacred assembly
  lexicon: HALOT
  rationale: This fixed cultic phrase denotes an officially summoned sacred gathering.
    'Holy convocation' preserves the formal, liturgical sense and remains understandable
    in context.
- source_word: כָּל מְלֶאכֶת עֲבֹדָה
  chosen: laborious work
  alternatives:
  - regular work
  - occupational work
  - servile work
  lexicon: HALOT
  rationale: The phrase refers not to absolutely all activity but to ordinary labor/work-service
    prohibited on festival days. 'Laborious work' captures the distinction better
    than the archaic 'servile work' and more precisely than the potentially too broad
    'work.'
- source_word: לֹא תַעֲשׂוּ
  chosen: You shall do no
  alternatives:
  - you must not do
  - you shall not do any
  lexicon: HALOT
  rationale: A straightforward legal prohibition in second person plural. 'You shall
    do no...' preserves the legislative tone and fits the following object phrase.
- source_word: יוֹם תְּרוּעָה
  chosen: a day of trumpet-blast
  alternatives:
  - a day of shouting
  - a day of acclamation
  - a day of blowing trumpets
  lexicon: HALOT
  rationale: תְּרוּעָה can denote a loud raised sound, including battle cry, acclamation,
    or trumpet signal. In this cultic calendrical context, the traditional association
    is with trumpet/blast signals, but the Hebrew term itself emphasizes the blast/acclamation
    rather than naming the instrument directly. 'Day of trumpet-blast' preserves that
    nuance while signaling the festal setting.
- source_word: יִהְיֶה לָכֶם
  chosen: It shall be ... for you
  alternatives:
  - it shall be yours as ...
  - it shall be to you ...
  lexicon: HALOT
  rationale: This construction marks the appointed character of the day for the people.
    'It shall be ... for you' is idiomatic and close to the Hebrew.
