theological_decisions:
- issue: Rendering of the festival designation יוֹם תְּרוּעָה
  chosen_reading: a day of trumpet-blast
  alternative_readings:
  - a day of shouting
  - a day of blowing trumpets
  rationale: The verse names the day by its characteristic sound rather than by a
    later traditional title. To avoid importing later Jewish festival nomenclature
    directly into the main text, the translation renders the Hebrew phrase descriptively.
    Because תְּרוּעָה is semantically broad, a lexical alternative is preserved in
    a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
