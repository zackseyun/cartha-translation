id: NUM.29.20
reference: Numbers 29:20
source:
  edition: WLC
  text: וּ/בַ/יּ֧וֹם הַ/שְּׁלִישִׁ֛י פָּרִ֥ים עַשְׁתֵּי עָשָׂ֖ר אֵילִ֣ם שְׁנָ֑יִם
    כְּבָשִׂ֧ים בְּנֵי שָׁנָ֛ה אַרְבָּעָ֥ה עָשָׂ֖ר תְּמִימִֽם־־׃
translation:
  text: 'And on the third day: eleven bulls, two rams, fourteen one-year-old lambs
    without blemish,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unblemished.' The Hebrew term refers to sacrificial animals being free
      from defect.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/יּוֹם
  chosen: And on the ... day
  alternatives:
  - And on the day
  - On the ... day
  lexicon: HALOT
  rationale: 'The prefixed conjunction and preposition together naturally introduce
    the next item in a sequence of festival offerings: ''And on the ... day.'' Retaining
    ''and'' reflects the Hebrew coordination in this enumerative context.'
- source_word: הַשְּׁלִישִׁי
  chosen: third
  lexicon: HALOT
  rationale: Ordinal adjective modifying 'day'; straightforwardly rendered 'third'.
- source_word: פָּרִים עַשְׁתֵּי עָשָׂר
  chosen: eleven bulls
  alternatives:
  - eleven young bulls
  - eleven oxen
  lexicon: HALOT
  rationale: פָּרִים denotes bulls/cattle in sacrificial context. 'Bulls' is the clearest
    and most idiomatic rendering here. 'Young bulls' is possible in some contexts,
    but the Hebrew here does not explicitly add 'young' beyond the lexical range,
    so 'bulls' is preferred.
- source_word: אֵילִם שְׁנָיִם
  chosen: two rams
  lexicon: HALOT
  rationale: Standard sacrificial term for male sheep; 'rams' is the direct and conventional
    rendering.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה אַרְבָּעָה עָשָׂר
  chosen: fourteen one-year-old lambs
  alternatives:
  - fourteen lambs a year old
  - fourteen year-old lambs
  lexicon: HALOT
  rationale: כְּבָשִׂים are lambs; בְּנֵי שָׁנָה literally 'sons of a year' is the
    standard idiom for animals one year old. 'One-year-old lambs' is natural modern
    English and preserves the sacrificial specification.
- source_word: תְּמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial legislation, תָּמִים describes animals free from defect.
    'Without blemish' is the clearest established English equivalent in cultic context;
    'perfect' could mislead modern readers.
