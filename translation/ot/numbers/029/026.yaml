id: NUM.29.26
reference: Numbers 29:26
source:
  edition: WLC
  text: וּ/בַ/יּ֧וֹם הַ/חֲמִישִׁ֛י פָּרִ֥ים תִּשְׁעָ֖ה אֵילִ֣ם שְׁנָ֑יִם כְּבָשִׂ֧ים
    בְּנֵֽי שָׁנָ֛ה אַרְבָּעָ֥ה עָשָׂ֖ר תְּמִימִֽם־׃
translation:
  text: 'On the fifth day: nine bulls, two rams, and fourteen male lambs a year old,
    without blemish,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And on the fifth day.' The Hebrew includes a conjunction at the start
      of the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/יּוֹם
  chosen: On the ... day
  alternatives:
  - And on the ... day
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally yields 'and/on the
    day.' In English list style for sacrificial prescriptions, 'On the ... day' is
    natural and preserves the temporal force; the conjunctive sense is implicit in
    the sequence.
- source_word: הַ/חֲמִישִׁי
  chosen: fifth
  lexicon: HALOT
  rationale: Ordinal adjective modifying 'day'; straightforwardly rendered 'fifth'.
- source_word: פָּרִים
  chosen: bulls
  alternatives:
  - young bulls
  - bulls from the herd
  lexicon: HALOT
  rationale: פָּר commonly denotes a bull in sacrificial contexts. 'Bulls' is concise
    and idiomatic here; 'young bulls' is possible in some contexts but not required
    by this verse alone.
- source_word: תִּשְׁעָה
  chosen: nine
  lexicon: HALOT
  rationale: Cardinal number agreeing with 'bulls'.
- source_word: אֵילִם
  chosen: rams
  lexicon: HALOT
  rationale: Standard rendering for the plural of אַיִל in sacrificial lists.
- source_word: שְׁנָיִם
  chosen: two
  lexicon: HALOT
  rationale: Cardinal number modifying 'rams'.
- source_word: כְּבָשִׂים
  chosen: male lambs
  alternatives:
  - lambs
  lexicon: HALOT
  rationale: כֶּבֶשׂ denotes a lamb, often specifically a male lamb in sacrificial
    usage. 'Male lambs' makes the cultic specificity explicit and matches the likely
    force in this context.
- source_word: בְּנֵי שָׁנָה
  chosen: a year old
  alternatives:
  - one year old
  - yearling
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for animals in their first year. 'A year
    old' is clear modern English.
- source_word: אַרְבָּעָה עָשָׂר
  chosen: fourteen
  lexicon: HALOT
  rationale: Compound cardinal number modifying 'male lambs.'
- source_word: תְּמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial contexts תמים refers to animals free from defect. 'Without
    blemish' is the standard clear rendering and preserves the cultic sense better
    than 'perfect'.
