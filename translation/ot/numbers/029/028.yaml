id: NUM.29.28
reference: Numbers 29:28
source:
  edition: WLC
  text: וּ/שְׂעִ֥יר חַטָּ֖את אֶחָ֑ד מִ/לְּ/בַד֙ עֹלַ֣ת הַ/תָּמִ֔יד וּ/מִנְחָתָ֖/הּ
    וְ/נִסְכָּֽ/הּ׃ס
translation:
  text: and one male goat for a sin offering, besides the regular burnt offering and
    its grain offering and its drink offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'besides the continual burnt offering.'
    reason: lexical_alternative
  - marker: b
    text: '''Drink offering'' may also be rendered ''libation.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׂעִיר
  chosen: and one male goat
  alternatives:
  - and a goat
  - and one goat
  lexicon: HALOT
  rationale: שָׂעִיר denotes a male goat. The prefixed ו marks continuation in the
    sacrificial list, so 'and' is retained. 'Male goat' is more precise than simply
    'goat' in a cultic inventory.
- source_word: חַטָּאת
  chosen: for a sin offering
  alternatives:
  - sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly refers to the sin offering rather
    than abstract 'sin.' Rendering with 'for a sin offering' reflects the appositional/categorical
    relation to the goat in natural English.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: The numeral specifies the quantity of the sacrificial animal and should
    be preserved explicitly.
- source_word: מִ/לְּ/בַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: The prepositional expression marks that this offering is additional to
    the continual offering complex. 'Besides' is concise and idiomatic.
- source_word: עֹלַת
  chosen: burnt offering
  lexicon: HALOT
  rationale: Standard cultic term for the whole burnt offering; this is the established
    and accurate English equivalent.
- source_word: הַ/תָּמִיד
  chosen: the regular
  alternatives:
  - the continual
  - the daily
  lexicon: HALOT
  rationale: תָּמִיד indicates the continual/regular offering. 'Regular' communicates
    the ongoing prescribed nature in clear modern English without over-specifying
    'daily' where the Hebrew itself says 'continual/regular.'
- source_word: וּ/מִנְחָתָ/הּ
  chosen: and its grain offering
  alternatives:
  - and its tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in priestly sacrificial lists refers to the accompanying grain
    offering. The 3fs suffix is rendered 'its,' referring back to the burnt offering.
- source_word: וְ/נִסְכָּ/הּ
  chosen: and its drink offering
  alternatives:
  - and its libation
  lexicon: HALOT
  rationale: נֶסֶךְ in sacrificial contexts is the drink offering/libation. 'Drink
    offering' is clearer for modern readers, while preserving the cultic sense. The
    suffix is again rendered 'its,' tied to the burnt offering.
