id: NUM.29.30
reference: Numbers 29:30
source:
  edition: WLC
  text: וּ/מִנְחָתָ֣/ם וְ/נִסְכֵּי/הֶ֡ם לַ֠/פָּרִים לָ/אֵילִ֧ם וְ/לַ/כְּבָשִׂ֛ים בְּ/מִסְפָּרָ֖/ם
    כַּ/מִּשְׁפָּֽט׃
translation:
  text: and their grain offering and their drink offerings for the bulls, for the
    rams, and for the lambs, according to their number, according to the ordinance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the prescribed manner.' The Hebrew כַּמִּשְׁפָּט refers
      to the established rule for how these offerings were to be presented.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָתָם
  chosen: their grain offering
  alternatives:
  - their offering
  - their tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes the cereal/grain offering
    rather than a generic gift. Singular with plural suffix is retained as a collective
    singular in English.
- source_word: נִסְכֵּיהֶם
  chosen: their drink offerings
  alternatives:
  - their libations
  lexicon: HALOT
  rationale: נֶסֶךְ refers to poured drink offerings accompanying sacrifices. 'Drink
    offerings' is clearer modern English than 'libations' while preserving sacrificial
    specificity.
- source_word: לַפָּרִים
  chosen: for the bulls
  alternatives:
  - for the young bulls
  lexicon: HALOT
  rationale: פַּר commonly means 'bull' in sacrificial lists. 'Young bulls' is possible
    in some contexts, but the Hebrew here does not explicitly mark age, so 'bulls'
    is preferred.
- source_word: לָאֵילִם
  chosen: for the rams
  lexicon: HALOT
  rationale: אַיִל straightforwardly denotes 'ram' in sacrificial contexts.
- source_word: וְלַכְּבָשִׂים
  chosen: and for the lambs
  alternatives:
  - and for the male lambs
  lexicon: HALOT
  rationale: כֶּבֶשׂ denotes a lamb, often male in sacrificial usage. English 'lambs'
    is natural and sufficient here without over-specifying unless the context requires
    it.
- source_word: בְּמִסְפָּרָם
  chosen: according to their number
  alternatives:
  - by their number
  - in their number
  lexicon: HALOT
  rationale: The phrase indicates correspondence to the counted number of animals
    prescribed. 'According to their number' is idiomatic and preserves the procedural
    sense.
- source_word: כַּמִּשְׁפָּט
  chosen: according to the ordinance
  alternatives:
  - according to the rule
  - according to the prescribed manner
  - according to the custom
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to the prescribed legal/procedural requirement
    for the offerings. 'Ordinance' fits cultic-legal context better than the more
    generic 'custom.'
