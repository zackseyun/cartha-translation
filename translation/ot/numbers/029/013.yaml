id: NUM.29.13
reference: Numbers 29:13
source:
  edition: WLC
  text: וְ/הִקְרַבְתֶּ֨ם עֹלָ֜ה אִשֵּׁ֨ה רֵ֤יחַ נִיחֹ֨חַ֙ לַֽ/יהוָ֔ה פָּרִ֧ים בְּנֵי בָקָ֛ר שְׁלֹשָׁ֥ה עָשָׂ֖ר אֵילִ֣ם שְׁנָ֑יִם כְּבָשִׂ֧ים בְּנֵֽי שָׁנָ֛ה אַרְבָּעָ֥ה עָשָׂ֖ר תְּמִימִ֥ם יִהְיֽוּ־־׃
translation:
  text: 'And you shall present a burnt offering, an offering by fire, a pleasing aroma to Yahweh: thirteen bulls from the herd, two rams, and fourteen male lambs a year old; they shall be without blemish.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a soothing aroma' or 'a sweet aroma.' The Hebrew idiom רֵיחַ נִיחֹחַ expresses that the offering is acceptable to the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתֶּם
  chosen: you shall present
  alternatives:
  - you shall offer
  - you shall bring near
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial context commonly means to present/offer an offering. 'Present' preserves the cultic sense without sounding overly wooden; 'bring near' is too literal for natural English.
- source_word: עֹלָה
  chosen: a burnt offering
  alternatives:
  - an ascent offering
  lexicon: HALOT
  rationale: Standard sacrificial term for the whole burnt offering. 'Ascent offering' reflects etymology but is not standard or as clear in English.
- source_word: אִשֵּׁה
  chosen: an offering by fire
  alternatives:
  - a fire offering
  - a food offering
  lexicon: HALOT
  rationale: The term denotes an offering made by fire. 'Offering by fire' is clear and traditional enough; 'food offering' can be used in some contexts but is less precise here alongside burnt offering language.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet aroma
  lexicon: HALOT
  rationale: This idiom describes the acceptability of the sacrifice before God. 'Pleasing aroma' communicates the idiomatic sense in readable modern English without implying literal divine olfaction alone.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.'
- source_word: פָּרִים בְּנֵי בָקָר
  chosen: bulls from the herd
  alternatives:
  - young bulls
  - bulls, sons of the herd
  lexicon: HALOT
  rationale: The phrase literally means 'bulls, sons of cattle/herd.' 'Bulls from the herd' is natural English and preserves the livestock classification without overinterpreting age as 'young'.
- source_word: שְׁלֹשָׁה עָשָׂר
  chosen: thirteen
  lexicon: HALOT
  rationale: Cardinal number.
- source_word: אֵילִם
  chosen: rams
  lexicon: HALOT
  rationale: Standard rendering for male sheep of this class in sacrificial lists.
- source_word: שְׁנָיִם
  chosen: two
  lexicon: HALOT
  rationale: Cardinal number.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה
  chosen: male lambs a year old
  alternatives:
  - lambs a year old
  - year-old lambs
  lexicon: HALOT
  rationale: כְּבָשִׂים are male lambs; 'male' is worth preserving because the Hebrew term is gender-specific. 'A year old' renders the age expression naturally.
- source_word: אַרְבָּעָה עָשָׂר
  chosen: fourteen
  lexicon: HALOT
  rationale: Cardinal number.
- source_word: תְּמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial contexts the term denotes freedom from defect. 'Without blemish' is the clearest established English equivalent.
- source_word: יִהְיוּ
  chosen: they shall be
  alternatives:
  - must be
  lexicon: HALOT
  rationale: 'Imperfect of היה here functions predicatively with the sacrificial animals: they shall be without blemish. ''Shall be'' matches the prescriptive force of the legal context.'
