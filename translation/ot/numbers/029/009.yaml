id: NUM.29.9
reference: Numbers 29:9
source:
  edition: WLC
  text: וּ/מִנְחָתָ֔/ם סֹ֖לֶת בְּלוּלָ֣ה בַ/שָּׁ֑מֶן שְׁלֹשָׁ֤ה עֶשְׂרֹנִים֙ לַ/פָּ֔ר
    שְׁנֵי֙ עֶשְׂרֹנִ֔ים לָ/אַ֖יִל הָ/אֶחָֽד׃
translation:
  text: 'and their grain offering: fine flour mixed with oil, three-tenths for the
    bull, two-tenths for the one ram,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'three-tenths' and 'two-tenths' refer to tenth-measures, traditionally
      understood as tenths of an ephah.
    reason: cultural_note
lexical_decisions:
- source_word: וּמִנְחָתָם
  chosen: and their grain offering
  alternatives:
  - and their offering
  - and their tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts commonly denotes the grain/cereal offering
    that accompanies burnt offerings. 'Grain offering' is the clearest modern English
    rendering in cultic context; the prefixed conjunction is retained as 'and,' and
    the 3mp suffix is rendered 'their' referring back to the animals offered in the
    preceding verse.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - fine meal
  lexicon: HALOT
  rationale: סֹלֶת refers to high-quality finely milled flour used in offerings. 'Fine
    flour' is standard, accurate, and readable.
- source_word: בְּלוּלָה בַשָּׁמֶן
  chosen: mixed with oil
  alternatives:
  - mingled with oil
  - blended with oil
  lexicon: HALOT
  rationale: The passive participle plus prepositional phrase describes the flour
    as combined with oil. 'Mixed with oil' is natural modern English and preserves
    the sacrificial preparation detail.
- source_word: שְׁלֹשָׁה עֶשְׂרֹנִים
  chosen: three-tenths
  alternatives:
  - three tenth-measures
  - three tenths of an ephah
  lexicon: HALOT
  rationale: עִשָּׂרוֹן is a tenth-measure, conventionally a tenth of an ephah. English
    translations often abbreviate to 'three-tenths' when the measure is understood
    from sacrificial legislation. This keeps the text readable while preserving the
    quantified amount.
- source_word: לַפָּר
  chosen: for the bull
  alternatives:
  - for each bull
  - for a bull
  lexicon: HALOT
  rationale: The singular with article refers to the bull just mentioned in the offering
    sequence. 'For the bull' is the most direct rendering.
- source_word: שְׁנֵי עֶשְׂרֹנִים
  chosen: two-tenths
  alternatives:
  - two tenth-measures
  - two tenths of an ephah
  lexicon: HALOT
  rationale: As above, the quantified sacrificial measure is best rendered compactly
    as 'two-tenths' in this procedural context.
- source_word: לָאַיִל הָאֶחָד
  chosen: for the one ram
  alternatives:
  - for one ram
  - for the single ram
  lexicon: HALOT
  rationale: The article plus אֶחָד is naturally rendered 'the one ram,' matching
    the enumerated sacrificial list and preserving the specificity of the Hebrew.
