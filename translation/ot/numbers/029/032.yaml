id: NUM.29.32
reference: Numbers 29:32
source:
  edition: WLC
  text: וּ/בַ/יּ֧וֹם הַ/שְּׁבִיעִ֛י פָּרִ֥ים שִׁבְעָ֖ה אֵילִ֣ם שְׁנָ֑יִם כְּבָשִׂ֧ים
    בְּנֵי שָׁנָ֛ה אַרְבָּעָ֥ה עָשָׂ֖ר תְּמִימִֽם־׃
translation:
  text: 'And on the seventh day: seven bulls, two rams, and fourteen one-year-old
    lambs without blemish.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unblemished.' The Hebrew term denotes sacrificial wholeness or freedom
      from defect.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/יּוֹם
  chosen: And on the ... day
  alternatives:
  - And in the ... day
  - On the ... day
  lexicon: HALOT
  rationale: The conjunction plus preposition and noun introduces the next item in
    the festival sequence. 'And on the ... day' preserves the Hebrew linkage to the
    preceding verses while remaining natural English.
- source_word: הַשְּׁבִיעִי
  chosen: seventh
  lexicon: HALOT
  rationale: Straightforward ordinal adjective modifying 'day.'
- source_word: פָּרִים
  chosen: bulls
  alternatives:
  - young bulls
  - bulls from the herd
  lexicon: HALOT
  rationale: In sacrificial contexts פַּר commonly denotes a bull. 'Bulls' is concise
    and natural here; 'young bulls' is possible in some contexts but the age is not
    explicit in this verse.
- source_word: שִׁבְעָה
  chosen: seven
  lexicon: HALOT
  rationale: Cardinal number specifying the quantity of bulls.
- source_word: אֵילִם
  chosen: rams
  lexicon: HALOT
  rationale: Standard rendering of אַיִל in sacrificial lists.
- source_word: שְׁנָיִם
  chosen: two
  lexicon: HALOT
  rationale: Cardinal number specifying the quantity of rams.
- source_word: כְּבָשִׂים
  chosen: lambs
  alternatives:
  - male lambs
  lexicon: HALOT
  rationale: The term denotes lambs; because the sacrificial inventory formula in
    English is idiomatically rendered 'lambs,' the more explicit 'male' component
    is not brought out here, though it may be contextually inferred from the cultic
    setting.
- source_word: בְּנֵי שָׁנָה
  chosen: one-year-old
  alternatives:
  - a year old
  - in their first year
  lexicon: HALOT
  rationale: Hebrew idiom literally 'sons of a year,' meaning animals one year old.
    'One-year-old' is the most natural concise English equivalent.
- source_word: אַרְבָּעָה עָשָׂר
  chosen: fourteen
  lexicon: HALOT
  rationale: Cardinal number specifying the quantity of lambs.
- source_word: תְּמִימִם
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial contexts תמים refers to animals free from defect. 'Without
    blemish' is the standard clear English rendering and preserves the cultic sense
    better than the broader 'perfect.'
