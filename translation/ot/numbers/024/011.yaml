id: NUM.24.11
reference: Numbers 24:11
source:
  edition: WLC
  text: וְ/עַתָּ֖ה בְּרַח לְ/ךָ֣ אֶל מְקוֹמֶ֑/ךָ אָמַ֨רְתִּי֙ כַּבֵּ֣ד אֲכַבֶּדְ/ךָ֔
    וְ/הִנֵּ֛ה מְנָעֲ/ךָ֥ יְהוָ֖ה מִ/כָּבֽוֹד־־׃
translation:
  text: So now, flee to your place. I said, ‘I would surely honor you,’ but look,
    the LORD has kept you back from honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I had said, “I would surely honor you.”' The Hebrew construction is
      emphatic.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the LORD has withheld you from honor' or 'prevented you from honor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces Balak’s concluding response with a natural discourse transition.
    'So now' preserves both the conjunction and the temporal adverb in readable English.
- source_word: בְּרַח
  chosen: flee
  alternatives:
  - go quickly
  - run away
  lexicon: HALOT
  rationale: Imperative of ברח carries the sense of hurried departure or flight. 'Flee'
    preserves Balak’s dismissive and forceful tone better than a softer 'go'.
- source_word: מְקוֹמֶךָ
  chosen: your place
  alternatives:
  - your home
  - your own place
  lexicon: HALOT
  rationale: The noun means place/location. 'Your place' is sufficiently literal and
    contextually implies Balaam’s proper destination without over-specifying 'home'.
- source_word: אָמַרְתִּי
  chosen: I said
  alternatives:
  - I had said
  - I told you
  lexicon: HALOT
  rationale: Simple past fits the discourse. English does not require pluperfect here,
    though the sense refers to Balak’s prior promise.
- source_word: כַּבֵּד אֲכַבֶּדְךָ
  chosen: I would surely honor you
  alternatives:
  - I would greatly honor you
  - I would indeed honor you
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Would
    surely honor you' captures the emphatic promise without sounding wooden.
- source_word: וְהִנֵּה
  chosen: but look
  alternatives:
  - and behold
  - but behold
  - look
  lexicon: HALOT
  rationale: Marks a sharp contrast between promise and outcome. 'But look' conveys
    the adversative force in context and keeps the immediacy of הִנֵּה in modern English.
- source_word: מְנָעֲךָ
  chosen: has kept you back
  alternatives:
  - has withheld you
  - has restrained you
  - has prevented you
  lexicon: HALOT
  rationale: From מנע, 'withhold/prevent.' With the following מִן + noun, the sense
    is that the LORD has prevented Balaam from receiving the promised honor. 'Has
    kept you back from honor' is idiomatic and faithful.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: מִכָּבוֹד
  chosen: from honor
  alternatives:
  - from glory
  - from reward
  lexicon: HALOT
  rationale: כָּבוֹד here refers to the honor Balak had promised Balaam, not divine
    glory in an abstract theological sense. 'Honor' best fits the immediate context
    of royal reward and status.
