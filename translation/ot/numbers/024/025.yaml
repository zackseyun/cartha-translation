id: NUM.24.25
reference: Numbers 24:25
source:
  edition: WLC
  text: וַ/יָּ֣קָם בִּלְעָ֔ם וַ/יֵּ֖לֶךְ וַ/יָּ֣שָׁב לִ/מְקֹמ֑/וֹ וְ/גַם בָּלָ֖ק הָלַ֥ךְ
    לְ/דַרְכּֽ/וֹ־׃פ
translation:
  text: Then Balaam rose and went and returned to his place, and Balak also went on
    his way.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּקָם
  chosen: rose
  alternatives:
  - got up
  - arose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום commonly marks standing up or setting out. 'Rose'
    is concise and idiomatic in narrative sequence, preserving the formal movement
    of the Hebrew.
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - departed
  lexicon: HALOT
  rationale: הלך in simple narrative is most naturally 'went.' 'Departed' is possible
    but slightly more interpretive; 'went' better preserves the straightforward sequence.
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - turned back
  - went back
  lexicon: HALOT
  rationale: שׁוב with the destination phrase לִמְקֹמוֹ indicates returning to a prior
    place. 'Returned' is the most natural English rendering.
- source_word: לִמְקֹמוֹ
  chosen: to his place
  alternatives:
  - to his home
  - to his own place
  lexicon: HALOT
  rationale: מקום is literally 'place.' 'Home' is possible by implication, but the
    Hebrew does not explicitly say house or home, so 'to his place' is more textually
    restrained.
- source_word: וְגַם
  chosen: and ... also
  alternatives:
  - and also
  - also
  lexicon: HALOT
  rationale: The conjunction plus adverb adds Balak as a parallel participant in the
    departure. Rendering with both 'and' and 'also' preserves the additive force.
- source_word: בָּלָק
  chosen: Balak
  rationale: Personal name transliterated by standard English convention.
- source_word: הָלַךְ
  chosen: went
  alternatives:
  - departed
  lexicon: HALOT
  rationale: Qal perfect here summarizes Balak's action after Balaam's departure.
    'Went' keeps the lexical consistency with הלך earlier in the verse.
- source_word: לְדַרְכּוֹ
  chosen: on his way
  alternatives:
  - to his way
  - along his road
  lexicon: HALOT
  rationale: דרך literally means 'way/road,' but the idiom in English is 'went on
    his way,' which preserves the sense naturally without over-paraphrase.
