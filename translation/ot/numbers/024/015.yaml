theological_decisions:
- issue: Interpretation of Balaam's self-description שְׁתֻם הָעָיִן
  chosen_reading: 'Render as revelatory perception: ''whose eye is opened'''
  alternative_readings:
  - whose eye is shut
  - with closed eye
  rationale: The immediate literary context presents Balaam as one who receives divine
    visions and has his eyes uncovered. Rendering the phrase as 'opened' preserves
    that contextual sense without overstating the grammar. Because the Hebrew expression
    is debated, the alternative is preserved in a footnote rather than erased.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it; preserve genuine ambiguity in footnotes.'
