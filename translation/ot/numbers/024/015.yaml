id: NUM.24.15
reference: Numbers 24:15
source:
  edition: WLC
  text: וַ/יִּשָּׂ֥א מְשָׁל֖/וֹ וַ/יֹּאמַ֑ר נְאֻ֤ם בִּלְעָם֙ בְּנ֣/וֹ בְעֹ֔ר וּ/נְאֻ֥ם
    הַ/גֶּ֖בֶר שְׁתֻ֥ם הָ/עָֽיִן׃
translation:
  text: 'Then he took up his discourse and said: “The declaration of Balaam son of
    Beor, the declaration of the man whose eye is opened:”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'whose eye is shut/closed.' The Hebrew phrase is difficult and has been
      understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשָּׂא
  chosen: Then he took up
  alternatives:
  - And he lifted up
  - And he took up
  lexicon: HALOT
  rationale: With מְשָׁלוֹ ('his discourse/oracle'), נשׂא idiomatically introduces
    a formal utterance. 'Took up' preserves the Hebrew idiom in readable English better
    than the overly literal 'lifted up'.
- source_word: מְשָׁלוֹ
  chosen: his discourse
  alternatives:
  - his oracle
  - his parable
  lexicon: HALOT
  rationale: מָשָׁל can denote a proverb, parable, taunt, or poetic utterance. In
    Balaam's speeches it refers to a formal poetic pronouncement. 'Discourse' is clear
    modern English; 'oracle' is possible, but נְאֻם later in the verse already carries
    the declarative-oracular force.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - and he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing the quoted speech; rendered
    straightforwardly.
- source_word: נְאֻם
  chosen: the declaration of
  alternatives:
  - the oracle of
  - the utterance of
  lexicon: HALOT
  rationale: נְאֻם is a solemn prophetic formula marking an authoritative utterance.
    'Declaration' is natural English and preserves the formal force without sounding
    archaic. Because the term occurs twice in the verse, the rendering is kept consistent.
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: בְּנוֹ בְעֹר
  chosen: son of Beor
  rationale: Standard patronymic construction.
- source_word: הַגֶּבֶר
  chosen: the man
  alternatives:
  - the strong man
  lexicon: HALOT
  rationale: גֶּבֶר often emphasizes a male person, sometimes with connotations of
    strength or vigor. Here 'the man' is the most natural and sufficiently reflects
    the Hebrew; the stronger nuance is not central in context.
- source_word: שְׁתֻם הָעָיִן
  chosen: whose eye is opened
  alternatives:
  - with closed eye
  - whose eye is shut
  lexicon: HALOT
  rationale: This phrase is famously difficult. In context, especially alongside v.
    16 ('falling down, yet with uncovered eyes'), the sense likely points to revelatory
    opening rather than blindness. Many traditional versions render 'whose eyes are
    open/opened.' Because the lexical form has been understood differently, the alternative
    is preserved in a footnote.
