id: NUM.24.6
reference: Numbers 24:6
source:
  edition: WLC
  text: כִּ/נְחָלִ֣ים נִטָּ֔יוּ כְּ/גַנֹּ֖ת עֲלֵ֣י נָהָ֑ר כַּ/אֲהָלִים֙ נָטַ֣ע יְהוָ֔ה
    כַּ/אֲרָזִ֖ים עֲלֵי מָֽיִם־׃
translation:
  text: Like valleys they spread out, like gardens beside a river, like aloes that
    the LORD has planted, like cedars beside the waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'aloewood' or 'lign aloes'; the Hebrew refers to fragrant trees, not
      to tents.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְחָלִים
  chosen: valleys
  alternatives:
  - wadis
  - torrent valleys
  lexicon: HALOT
  rationale: נחל can denote a wadi, streambed, or valley associated with water flow.
    In this simile of luxuriant spread, 'valleys' is natural English and fits the
    imagery, while the water associations are preserved by the following phrases.
- source_word: נִטָּיוּ
  chosen: they spread out
  alternatives:
  - they are stretched out
  - they extend
  lexicon: HALOT
  rationale: From נטה, 'to stretch out, extend.' The passive/reflexive nuance in context
    describes the camp/people as laid out expansively. 'Spread out' is idiomatic and
    visually clear in English.
- source_word: גַנֹּת
  chosen: gardens
  alternatives:
  - garden plots
  lexicon: HALOT
  rationale: Straightforward plural of 'garden'; 'gardens' preserves the cultivated,
    fertile imagery.
- source_word: עֲלֵי נָהָר
  chosen: beside a river
  alternatives:
  - by a river
  - along a river
  lexicon: HALOT
  rationale: The preposition על in this idiom can mean 'by/upon/alongside.' 'Beside
    a river' is natural English and conveys proximity to a life-giving water source.
- source_word: אֲהָלִים
  chosen: aloes
  alternatives:
  - lign aloes
  - aloewood
  lexicon: HALOT
  rationale: The noun here refers not to 'tents' but to fragrant trees/wood (often
    identified as aloes/aloewood) in poetic contexts. 'Aloes' is the conventional
    concise rendering; the more specific botanical sense is preserved in a footnote.
- source_word: נָטַע
  chosen: has planted
  alternatives:
  - planted
  lexicon: HALOT
  rationale: Perfect verb describing YHWH's action. English present perfect works
    well in a simile emphasizing the established result of divine planting.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the stated translation policy.
- source_word: אֲרָזִים
  chosen: cedars
  lexicon: HALOT
  rationale: Standard rendering; cedars evoke strength, height, and durability, fitting
    the poetic progression.
- source_word: עֲלֵי מָיִם
  chosen: beside the waters
  alternatives:
  - by the waters
  - along the waters
  lexicon: HALOT
  rationale: Plural 'waters' is retained to reflect the Hebrew and to preserve the
    poetic resonance of abundant water sources.
