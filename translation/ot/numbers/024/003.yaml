id: NUM.24.3
reference: Numbers 24:3
source:
  edition: WLC
  text: וַ/יִּשָּׂ֥א מְשָׁל֖/וֹ וַ/יֹּאמַ֑ר נְאֻ֤ם בִּלְעָם֙ בְּנ֣/וֹ בְעֹ֔ר וּ/נְאֻ֥ם
    הַ/גֶּ֖בֶר שְׁתֻ֥ם הָ/עָֽיִן׃
translation:
  text: 'Then he took up his discourse and said: “The declaration of Balaam son of
    Beor, the declaration of the man with the closed eye.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “with the opened eye.” Some understand the phrase this way from the context
      of prophetic vision and ancient interpretive tradition, but the Hebrew form
      more directly suggests “closed” or “shut.”
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשָּׂא מְשָׁלוֹ
  chosen: Then he took up his discourse
  alternatives:
  - Then he uttered his oracle
  - Then he took up his proverb
  lexicon: HALOT
  rationale: The idiom נשׂא משל commonly introduces a formal poetic utterance. 'Took
    up his discourse' preserves the Hebrew image while using natural English. 'Oracle'
    is possible in context, but מָשָׁל more basically denotes a saying, discourse,
    or poetic utterance rather than the specific noun נְאֻם, which already carries
    the declarative/oracular force later in the verse.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - and declared
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר. 'And said' is the plain sense and
    keeps the cadence of the Hebrew introduction.
- source_word: נְאֻם
  chosen: the declaration of
  alternatives:
  - the oracle of
  - the utterance of
  lexicon: HALOT
  rationale: נְאֻם is a formal prophetic/declarative formula. 'Declaration' is clear
    modern English and avoids overloading 'oracle,' since the verse already began
    with משל. 'Utterance' is possible but slightly flatter.
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Standard English transliteration of the personal name.
- source_word: בְּנוֹ בְעֹר
  chosen: son of Beor
  rationale: Construct chain indicating parentage; standard English rendering.
- source_word: הַגֶּבֶר
  chosen: the man
  alternatives:
  - the strong man
  lexicon: HALOT
  rationale: גבר can emphasize a man in his strength or vigor, but in this formulaic
    self-description 'the man' is the most natural and sufficiently preserves the
    masculine singular reference. This follows the gender-accurate principle without
    unnecessary expansion.
- source_word: שְׁתֻם הָעָיִן
  chosen: with the closed eye
  alternatives:
  - whose eye is shut
  - with the opened eye
  lexicon: HALOT
  rationale: The consonantal text and common lexical sense support 'closed/shut.'
    Because the phrase is difficult and some interpreters, influenced by context and
    ancient versions, understand it as 'opened eye,' the main text keeps the more
    direct reading from the Hebrew form while preserving the alternative in a footnote.
