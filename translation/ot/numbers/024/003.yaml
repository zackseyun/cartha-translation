theological_decisions:
- issue: Interpretation of Balaam's visionary description שְׁתֻם הָעָיִן
  chosen_reading: with the closed eye
  alternative_readings:
  - with the opened eye
  rationale: This is not a major doctrinal issue, but it is an interpretively contested
    phrase. Following original-language primacy, the draft retains the more straightforward
    sense of the MT form שְׁתֻם as 'closed/shut' rather than harmonizing it to the
    visionary context. The contextual alternative is preserved in a footnote to maintain
    transparency and the text's ambiguity.
  doctrine_reference: Translation philosophy §§1, 3
