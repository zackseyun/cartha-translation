id: NUM.24.16
reference: Numbers 24:16
source:
  edition: WLC
  text: נְאֻ֗ם שֹׁמֵ֨עַ֙ אִמְרֵי אֵ֔ל וְ/יֹדֵ֖עַ דַּ֣עַת עֶלְי֑וֹן מַחֲזֵ֤ה שַׁדַּי֙
    יֶֽחֱזֶ֔ה נֹפֵ֖ל וּ/גְל֥וּי עֵינָֽיִם־׃
translation:
  text: 'the declaration of one who hears the words of God, and knows the knowledge
    of the Most High, who sees the vision of the Almighty, falling down, yet with
    uncovered eyes:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the oracle of one who hears the sayings of God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'falling down, with eyes uncovered'; some understand this as a visionary
      trance state.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְאֻם
  chosen: the declaration of
  alternatives:
  - the oracle of
  - the utterance of
  lexicon: HALOT
  rationale: Introduces a solemn prophetic pronouncement. 'Declaration' is clear modern
    English and preserves the formal weight without sounding overly archaic like 'oracle'
    in this context.
- source_word: שֹׁמֵעַ
  chosen: one who hears
  alternatives:
  - he who hears
  - the hearer of
  lexicon: HALOT
  rationale: Qal participle functioning substantivally; 'one who hears' is natural
    English and preserves the ongoing characteristic sense.
- source_word: אִמְרֵי אֵל
  chosen: the words of God
  alternatives:
  - the sayings of God
  - the utterances of God
  lexicon: HALOT
  rationale: Construct phrase meaning spoken words/utterances from God. 'Words of
    God' is idiomatic and sufficiently weighty.
- source_word: אֵל
  chosen: God
  alternatives:
  - El
  lexicon: HALOT
  rationale: Here the common Semitic divine title functions as a reference to God,
    not as a proper name requiring transliteration.
- source_word: וְיֹדֵעַ
  chosen: and knows
  alternatives:
  - and one who knows
  lexicon: HALOT
  rationale: Coordinates with the prior participle and continues the self-description
    in parallel form.
- source_word: דַּעַת עֶלְיוֹן
  chosen: the knowledge of the Most High
  alternatives:
  - knowledge from the Most High
  - the mind of the Most High
  lexicon: HALOT
  rationale: Construct phrase most naturally means 'the knowledge of the Most High,'
    i.e., knowledge pertaining to or given by him. This preserves the Hebrew compactness
    and ambiguity better than an expanded paraphrase.
- source_word: עֶלְיוֹן
  chosen: the Most High
  alternatives:
  - the Exalted One
  lexicon: HALOT
  rationale: Standard rendering of the divine title, preserving its superlative force.
- source_word: מַחֲזֵה
  chosen: the vision
  alternatives:
  - a vision
  - the prophetic vision
  lexicon: HALOT
  rationale: Refers to a visionary sight/revelation. 'Vision' is the straightforward
    rendering.
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: Following translation philosophy, divine titles are translated rather
    than transliterated. 'The Almighty' is the conventional and contextually fitting
    rendering.
- source_word: יֶחֱזֶה
  chosen: who sees
  alternatives:
  - he sees
  - beholds
  lexicon: HALOT
  rationale: Though formally imperfect, in this poetic self-description it functions
    well as a relative verbal clause parallel to the participles. 'Who sees' gives
    smooth English cohesion.
- source_word: נֹפֵל
  chosen: falling down
  alternatives:
  - fallen
  - prostrate
  - in a trance
  lexicon: HALOT
  rationale: The participle literally denotes falling. Some interpreters understand
    a visionary trance state, but the Hebrew itself says 'falling.' The more interpretive
    'in a trance' is better preserved as an alternative note rather than placed in
    the main text.
- source_word: וּגְלוּי עֵינָיִם
  chosen: yet with uncovered eyes
  alternatives:
  - and with eyes uncovered
  - with open eyes
  lexicon: HALOT
  rationale: Literally 'and uncovered of eyes/with uncovered eyes.' 'Uncovered eyes'
    preserves the vivid Hebrew image; 'yet' brings out the concessive sense often
    implied alongside 'falling down' without over-paraphrasing.
