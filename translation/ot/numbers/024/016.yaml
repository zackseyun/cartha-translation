theological_decisions:
- issue: Rendering of divine titles אֵל, עֶלְיוֹן, and שַׁדַּי
  chosen_reading: God / the Most High / the Almighty
  alternative_readings:
  - El / Elyon / Shaddai
  rationale: The translation philosophy directs that titles be translated to preserve
    meaning. These are divine titles here, not personal names requiring transliteration.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
