id: NUM.24.19
reference: Numbers 24:19
source:
  edition: WLC
  text: וְ/יֵ֖רְדְּ מִֽ/יַּעֲקֹ֑ב וְ/הֶֽאֱבִ֥יד שָׂרִ֖יד מֵ/עִֽיר׃
translation:
  text: And one shall rule from Jacob, and he shall destroy the survivor from the
    city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And he shall have dominion from Jacob.' The Hebrew verb can be rendered
      'rule' or 'have dominion.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the remnant' instead of 'the survivor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵרְדְּ
  chosen: And one shall rule
  alternatives:
  - and he shall rule
  - and he shall have dominion
  - and one shall come down
  lexicon: HALOT
  rationale: The verb is from רדה, commonly 'rule/have dominion.' In this Balaam-oracle
    context, a royal ruler arising from Jacob is in view, so 'rule' best fits the
    sense. 'Come down' would reflect a different root and is less likely here. 'One'
    is supplied in English because the Hebrew verb has no explicit subject in this
    clause, but the context points back to the coming ruler.
- source_word: מִיַּעֲקֹב
  chosen: from Jacob
  alternatives:
  - out of Jacob
  lexicon: HALOT
  rationale: The preposition מן here marks origin/source. 'From Jacob' is natural
    modern English and preserves the sense of emergence from Jacob/Israel.
- source_word: וְהֶאֱבִיד
  chosen: and he shall destroy
  alternatives:
  - and he shall wipe out
  - and he shall cause to perish
  lexicon: HALOT
  rationale: Hiphil of אבד conveys causing destruction/perishing. 'Destroy' is clear,
    strong, and suitably direct without over-paraphrase.
- source_word: שָׂרִיד
  chosen: the survivor
  alternatives:
  - the remnant
  - any survivor
  lexicon: HALOT
  rationale: שָׂרִיד denotes one who remains or survives. Singular collective force
    is possible. 'The survivor' keeps the singular form while allowing representative
    sense. 'Remnant' is possible but more abstract than the Hebrew noun here.
- source_word: מֵעִיר
  chosen: from the city
  alternatives:
  - from the city-state
  - from the fortified city
  lexicon: HALOT
  rationale: עִיר ordinarily means 'city.' The phrase likely means the ruler will
    eliminate the last survivor from the enemy city. A more specific gloss such as
    'fortified city' is not warranted by the word alone in this verse.
