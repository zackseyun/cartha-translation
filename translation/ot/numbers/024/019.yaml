theological_decisions:
- issue: Messianic/royal reference in Balaam's oracle
  chosen_reading: Render the verse in straightforward royal language without making
    the messianic interpretation explicit in the text.
  alternative_readings:
  - Interpret the ruler as an immediate historical king only
  - Interpret the ruler as a direct messianic prophecy
  rationale: Within the broader oracle, the figure is royal and may be read typologically
    or prophetically in messianic terms, but the verse itself does not explicitly
    identify the ruler as Messiah. To preserve theological tension and avoid importing
    a doctrinal conclusion beyond the Hebrew, the translation keeps the wording general
    while allowing canonical interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
