id: NUM.24.4
reference: Numbers 24:4
source:
  edition: WLC
  text: נְאֻ֕ם שֹׁמֵ֖עַ אִמְרֵי אֵ֑ל אֲשֶׁ֨ר מַחֲזֵ֤ה שַׁדַּי֙ יֶֽחֱזֶ֔ה נֹפֵ֖ל וּ/גְל֥וּי
    עֵינָֽיִם־׃
translation:
  text: 'the declaration of one who hears the words of God, who sees the vision of
    the Almighty, falling down with eyes uncovered:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the oracle of one who hears the words of God.' The Hebrew נְאֻם is a
      formal prophetic term for a solemn utterance.
    reason: lexical_alternative
  - marker: b
    text: Or 'with eyes open.' Literally, 'with eyes uncovered,' preserving the imagery
      of unveiled sight in revelation.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְאֻם
  chosen: the declaration of
  alternatives:
  - the oracle of
  - the utterance of
  lexicon: HALOT
  rationale: נְאֻם is a formal prophetic-introductory noun meaning an utterance or
    declaration. 'The declaration of' preserves the solemn formula without importing
    the stronger English connotations of 'oracle' as necessarily pagan or cryptic.
- source_word: שֹׁמֵעַ
  chosen: one who hears
  alternatives:
  - the one hearing
  - he who hears
  lexicon: HALOT
  rationale: The participle functions substantivally, describing Balaam as characterized
    by hearing. 'One who hears' is natural modern English and preserves the ongoing/characterizing
    force.
- source_word: אִמְרֵי אֵל
  chosen: the words of God
  alternatives:
  - the sayings of God
  - the utterances of God
  lexicon: HALOT
  rationale: אִמְרֵי is the construct plural of 'sayings/words.' 'Words of God' is
    the most idiomatic and transparent rendering here. אֵל is rendered 'God' rather
    than 'El' because it functions as the common divine title, not a proper name in
    this context.
- source_word: מַחֲזֵה
  chosen: the vision
  alternatives:
  - a vision
  - the appearance
  lexicon: HALOT
  rationale: מַחֲזֵה denotes a visionary sight or vision. The construct with שַׁדַּי
    favors 'the vision of the Almighty' as a definite visionary experience.
- source_word: שַׁדַּי
  chosen: the Almighty
  alternatives:
  - Shaddai
  lexicon: HALOT
  rationale: Per translation philosophy, titles are translated rather than transliterated.
    'The Almighty' is the standard and contextually fitting rendering of שַׁדַּי.
- source_word: יֶחֱזֶה
  chosen: sees
  alternatives:
  - beholds
  lexicon: HALOT
  rationale: Though morphologically imperfect, in this poetic self-description it
    functions well as a present/generic statement parallel to 'hears.' 'Sees' gives
    clear modern English while preserving the visionary sense.
- source_word: נֹפֵל
  chosen: falling down
  alternatives:
  - fallen
  - prostrate
  lexicon: HALOT
  rationale: The participle likely describes Balaam's physical state during the revelatory
    experience. 'Falling down' preserves the verbal force and avoids overinterpreting
    the exact posture as fully 'prostrate.'
- source_word: וּגְל֥וּי עֵינָיִם
  chosen: with eyes uncovered
  alternatives:
  - with eyes open
  - yet with eyes unveiled
  lexicon: HALOT
  rationale: גְל֥וּי literally means 'uncovered/unveiled.' While many English versions
    use 'with eyes open,' the Hebrew imagery is more literally that the eyes are uncovered,
    suggesting revelatory perception. This preserves the metaphor without flattening
    it.
