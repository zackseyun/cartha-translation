id: NUM.24.12
reference: Numbers 24:12
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר בִּלְעָ֖ם אֶל בָּלָ֑ק הֲ/לֹ֗א גַּ֧ם אֶל מַלְאָכֶ֛י/ךָ אֲשֶׁר שָׁלַ֥חְתָּ
    אֵלַ֖/י דִּבַּ֥רְתִּי לֵ/אמֹֽר־־־׃
translation:
  text: Balaam said to Balak, “Did I not also speak to your messengers whom you sent
    to me, saying,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your envoys.' The Hebrew word can denote either human messengers or,
      in other contexts, angels; here the human sense is required by context.
    reason: lexical_alternative
  - marker: b
    text: The quotation introduced by 'saying' continues into the next verse.
    reason: cross_reference
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר introducing direct speech; 'said'
    is the natural English narrative equivalent.
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶל בָּלָק
  chosen: to Balak
  rationale: אֶל marks the addressee of speech; 'to Balak' is the straightforward
    rendering.
- source_word: הֲלֹא
  chosen: Did ... not
  alternatives:
  - Have ... not
  - Surely
  lexicon: HALOT
  rationale: Interrogative particle with negation expects an affirmative answer; in
    English this is best conveyed by 'Did I not ...?' in this past narrative context.
- source_word: גַּם
  chosen: also
  alternatives:
  - indeed
  - even
  lexicon: HALOT
  rationale: Adds emphasis that Balaam had already addressed Balak's envoys as well;
    'also' is the clearest idiomatic choice.
- source_word: מַלְאָכֶיךָ
  chosen: your messengers
  alternatives:
  - your envoys
  - your angels
  lexicon: HALOT
  rationale: In this human diplomatic context מלאך refers to human messengers/envoys,
    not heavenly beings. 'Messengers' is broad and natural; 'envoys' is possible but
    slightly more specialized.
- source_word: אֲשֶׁר שָׁלַחְתָּ אֵלַי
  chosen: whom you sent to me
  alternatives:
  - that you sent to me
  lexicon: HALOT
  rationale: Relative clause specifying the messengers. 'Whom' fits the personal referent
    and keeps the sentence formal but readable.
- source_word: דִּבַּרְתִּי
  chosen: I speak
  alternatives:
  - I spoke
  - I told
  lexicon: HALOT
  rationale: Though morphologically perfect, with the following לֵאמֹר introducing
    quoted content and in light of the immediately following verse continuing the
    quotation, English can retain the sense as part of an introduced speech formula.
    However, because the verse itself is retrospective, the main clause is rendered
    'speak' only within the idiom 'Did I not also speak ... saying'. This preserves
    the linkage to the quotation that follows.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard infinitive introducing the content of speech, which continues
    into the next verse. 'Saying' preserves the formal linkage without paraphrase.
