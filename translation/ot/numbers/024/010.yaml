id: NUM.24.10
reference: Numbers 24:10
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֤ף בָּלָק֙ אֶל בִּלְעָ֔ם וַ/יִּסְפֹּ֖ק אֶת כַּפָּ֑י/ו וַ/יֹּ֨אמֶר
    בָּלָ֜ק אֶל בִּלְעָ֗ם לָ/קֹ֤ב אֹֽיְבַ/י֙ קְרָאתִ֔י/ךָ וְ/הִנֵּה֙ בֵּרַ֣כְתָּ בָרֵ֔ךְ
    זֶ֖ה שָׁלֹ֥שׁ פְּעָמִֽים־־־־׃
translation:
  text: Then Balak’s anger burned against Balaam, and he struck his hands together.
    And Balak said to Balaam, “I called you to curse my enemies, but look—you have
    done nothing but bless them these three times!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'you have blessed, blessed,' an emphatic construction
      expressing repeated or intensified blessing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  chosen: anger burned
  alternatives:
  - became angry
  - his anger flared
  lexicon: HALOT
  rationale: The idiom literally involves the nose/anger burning. 'Anger burned' preserves
    the Hebrew imagery in natural English better than a flat 'was angry.'
- source_word: וַיִּחַר אַף בָּלָק אֶל בִּלְעָם
  chosen: Balak’s anger burned against Balaam
  alternatives:
  - Balak became angry with Balaam
  lexicon: HALOT
  rationale: Using 'against' reflects אֶל here as hostile direction, and the possessive
    construction makes the English idiomatic while retaining the force of the Hebrew
    idiom.
- source_word: וַיִּסְפֹּק אֶת כַּפָּיו
  chosen: he struck his hands together
  alternatives:
  - he clapped his hands
  - he smote his palms together
  lexicon: HALOT
  rationale: The verb denotes striking or clapping the hands. In this context of anger,
    'struck his hands together' conveys the gesture without suggesting applause. 'Clapped'
    is possible but can sound positive in modern English.
- source_word: לָקֹב
  chosen: to curse
  alternatives:
  - to denounce
  - to invoke a curse on
  lexicon: HALOT
  rationale: The infinitive expresses the purpose for which Balaam was summoned. 'To
    curse' is the standard and clearest rendering in this context.
- source_word: אֹיְבַי
  chosen: my enemies
  alternatives:
  - those hostile to me
  lexicon: HALOT
  rationale: Straightforward possessive plural; 'my enemies' is the natural equivalent.
- source_word: קְרָאתִיךָ
  chosen: I called you
  alternatives:
  - I summoned you
  lexicon: HALOT
  rationale: The verb means call/summon. 'I called you' is simple and natural; the
    purpose clause already clarifies the formal context.
- source_word: וְהִנֵּה
  chosen: but look
  alternatives:
  - and behold
  - yet behold
  - see
  lexicon: HALOT
  rationale: The particle marks emphatic contrast and draws attention to the unexpected
    result. 'But look' captures both the adversative sense in context and the deictic
    force in readable modern English.
- source_word: בֵּרַכְתָּ בָרֵךְ
  chosen: you have done nothing but bless them
  alternatives:
  - you have surely blessed
  - you have indeed blessed
  - you have kept on blessing
  lexicon: HALOT
  rationale: The finite verb plus infinitive absolute intensifies the action. 'Done
    nothing but bless them' communicates emphatic repeated blessing in idiomatic English,
    fitting Balak’s complaint.
- source_word: זֶה שָׁלֹשׁ פְּעָמִים
  chosen: these three times
  alternatives:
  - three times now
  - this three times
  lexicon: HALOT
  rationale: The phrase points to repeated occurrence up to the present moment. 'These
    three times' is a natural rendering that preserves the demonstrative force better
    than a bare 'three times.'
