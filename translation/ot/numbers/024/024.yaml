theological_decisions:
- issue: Identification of Kittim, Asshur, Eber, and the final singular pronoun
  chosen_reading: Retain the Hebrew names Kittim, Asshur, and Eber, and render the
    final pronoun as singular 'he' without specifying the historical referent.
  alternative_readings:
  - Interpret Kittim as Cyprus or western maritime powers
  - Interpret Asshur as Assyria
  - Interpret Eber as the Hebrews or peoples beyond the Euphrates
  - Interpret the final pronoun as referring corporately to Kittim/its ruler or to
    another imperial power
  rationale: The verse is prophetic and historically debated. The translation should
    preserve the text's ambiguity rather than resolve contested identifications not
    explicit in the Hebrew. This follows the project's principle of preserving theological
    and interpretive tension where the source is genuinely ambiguous.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
