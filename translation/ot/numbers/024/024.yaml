id: NUM.24.24
reference: Numbers 24:24
source:
  edition: WLC
  text: וְ/צִים֙ מִ/יַּ֣ד כִּתִּ֔ים וְ/עִנּ֥וּ אַשּׁ֖וּר וְ/עִנּוּ עֵ֑בֶר וְ/גַם ה֖וּא
    עֲדֵ֥י אֹבֵֽד־־׃
translation:
  text: But ships shall come from the coast of Kittim, and they shall afflict Asshur,
    and they shall afflict Eber; and he too shall come to destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kittim may refer specifically to Cyprus or more broadly to western maritime
      peoples.
    reason: alternative_reading
  - marker: b
    text: Asshur can also be rendered 'Assyria.'
    reason: lexical_alternative
  - marker: c
    text: Eber may refer to Eber as a people-name, to the Hebrews, or to peoples 'beyond'
      a boundary such as the Euphrates.
    reason: alternative_reading
  - marker: d
    text: The Hebrew reads 'and he too'; the antecedent is uncertain, and some understand
      it more collectively as 'it too' or as a ruler representing the power from Kittim.
    reason: alternative_reading
lexical_decisions:
- source_word: צִים
  chosen: ships
  alternatives:
  - fleets
  - ships of war
  lexicon: HALOT
  rationale: The noun denotes seagoing vessels. 'Ships' is the plain and natural English
    rendering; 'fleets' is possible but adds a collective nuance not required by the
    singular lexical item used collectively.
- source_word: מִיַּד
  chosen: from the coast of
  alternatives:
  - from the side of
  - from the region of
  lexicon: HALOT
  rationale: Literally 'from the hand of,' but in geographic expressions this idiom
    can denote the side, shore, or region associated with a place. Because ships are
    in view, 'from the coast of' best captures the likely maritime sense in idiomatic
    English without wooden literalism.
- source_word: כִּתִּים
  chosen: Kittim
  alternatives:
  - Cyprus
  - the Kittim
  lexicon: HALOT
  rationale: This is a proper name/group designation and should be transliterated
    per project philosophy. While it can refer more broadly to western maritime peoples
    or specifically Cyprus, the Hebrew form itself is best preserved as 'Kittim,'
    with broader identifications left to interpretation.
- source_word: וְעִנּוּ
  chosen: they shall afflict
  alternatives:
  - they shall humble
  - they shall oppress
  lexicon: HALOT
  rationale: The verb ענה in the piel commonly carries the sense of afflicting, humbling,
    or oppressing. 'Afflict' is broad enough to preserve the force without over-specifying
    the manner of subjugation.
- source_word: אַשּׁוּר
  chosen: Asshur
  alternatives:
  - Assyria
  lexicon: HALOT
  rationale: The Hebrew form is the proper name Asshur. 'Assyria' is a common interpretive
    equivalent for the geopolitical entity, but 'Asshur' more closely reflects the
    source form and preserves possible ambiguity between land/people.
- source_word: עֵבֶר
  chosen: Eber
  alternatives:
  - the region beyond
  - the Hebrews
  lexicon: HALOT
  rationale: The term is a proper name in form and is traditionally linked either
    to the ancestor Eber or to a broader population/region. Because the referent is
    debated, transliterating 'Eber' preserves the ambiguity better than resolving
    it interpretively.
- source_word: וְגַם הוּא
  chosen: and he too
  alternatives:
  - and it too
  - and they too
  lexicon: HALOT
  rationale: The Hebrew is singular masculine pronoun. 'He too' most directly reflects
    the grammar, even though the antecedent is debated. A more impersonal 'it' would
    smooth the ambiguity but move away from the source.
- source_word: עֲדֵי אֹבֵד
  chosen: shall come to destruction
  alternatives:
  - shall perish forever
  - shall be destroyed completely
  - shall end in destruction
  lexicon: HALOT
  rationale: The phrase means 'unto destruction/perishing.' 'Shall come to destruction'
    is idiomatic English that preserves the directional force of עֲדֵי and the outcome
    of אֹבֵד without importing the stronger idea of eternal ruin.
