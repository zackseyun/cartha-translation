theological_decisions:
- issue: Interpretation of the difficult clause מִשֻּׂמוֹ אֵל
  chosen_reading: Rendered as 'when God appoints this' with אֵל as subject.
  alternative_readings:
  - '''when God does this'''
  - '''from the time God establishes it'''
  - 'less likely: taking אֵל as object or reading the suffix differently'
  rationale: The Hebrew is elliptical and has generated multiple translations. No
    doctrinal issue is at stake, so the decision is driven by contextual coherence
    within Balaam's oracle of coming upheaval. The chosen rendering preserves divine
    agency without over-specifying the object beyond what the Hebrew implies.
