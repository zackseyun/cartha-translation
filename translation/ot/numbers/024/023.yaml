id: NUM.24.23
reference: Numbers 24:23
source:
  edition: WLC
  text: וַ/יִּשָּׂ֥א מְשָׁל֖/וֹ וַ/יֹּאמַ֑ר א֕וֹי מִ֥י יִחְיֶ֖ה מִ/שֻּׂמ֥/וֹ אֵֽל׃
translation:
  text: Then he took up his discourse and said, “Alas, who can live when God appoints
    this?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Alas, who can survive when God does this?' The Hebrew of the final clause
      is difficult and may also be understood as 'when he sets this in place, God.'
    reason: alternative_reading
  - marker: b
    text: '''His discourse'' may also be rendered ''his oracle'' or ''his parable.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא
  chosen: Then he took up
  alternatives:
  - and he lifted up
  - and he uttered
  lexicon: HALOT
  rationale: With מְשָׁלוֹ ('his discourse/oracle'), נשׂא forms an idiom meaning to
    take up or utter a saying. 'Then he took up' preserves the Hebrew idiom in natural
    English.
- source_word: מְשָׁלוֹ
  chosen: his discourse
  alternatives:
  - his oracle
  - his parable
  lexicon: HALOT
  rationale: מָשָׁל can denote a proverb, taunt, parable, or poetic oracle. In Balaam's
    sequence of pronouncements, 'discourse' is a clear, broad rendering; 'oracle'
    is possible and is preserved as an alternative nuance.
- source_word: אֹוי
  chosen: Alas
  alternatives:
  - Woe
  - Ah
  lexicon: HALOT
  rationale: An interjection of lament or dread. 'Alas' fits the tone of anguished
    exclamation here without implying a formal prophetic woe-oracle as strongly as
    'Woe' might.
- source_word: מִי
  chosen: who can
  alternatives:
  - who will
  - who
  lexicon: HALOT
  rationale: The interrogative 'who?' with the following imperfect יִחְיֶה in context
    expresses survival under coming judgment; English idiom naturally supplies 'can'
    to convey the sense of possibility/endurance.
- source_word: יִחְיֶה
  chosen: live
  alternatives:
  - survive
  - remain alive
  lexicon: HALOT
  rationale: The basic sense is 'live,' but in this context of ominous prediction
    it carries the nuance of surviving. 'Live' keeps the Hebrew's directness while
    allowing the context to imply survival.
- source_word: מִשֻּׂמוֹ
  chosen: when God appoints this
  alternatives:
  - from his setting
  - when he sets this in place
  - when one appoints him
  lexicon: HALOT
  rationale: 'From שׂוּם, ''to set, place, appoint,'' with prefixed מִן. The phrase
    is notoriously compressed and difficult. The most coherent sense in context is
    temporal/causal: ''when [God] sets/appoints this.'' The 3ms suffix is taken with
    an impersonal or anticipatory force tied to the coming event, and אֵל is read
    as the subject ''God'' rather than the object ''him''.'
- source_word: אֵל
  chosen: God
  alternatives:
  - the Mighty One
  - god
  lexicon: HALOT
  rationale: אֵל here is best taken as a divine title/name functioning as the subject
    of the final clause. 'God' is the most natural English rendering in this context.
