id: NUM.24.22
reference: Numbers 24:22
source:
  edition: WLC
  text: כִּ֥י אִם יִהְיֶ֖ה לְ/בָ֣עֵֽר קָ֑יִן עַד מָ֖ה אַשּׁ֥וּר תִּשְׁבֶּֽ/ךָּ־־׃
translation:
  text: For if Kain is destined for burning, how long before Asshur carries you away
    captive?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kain likely refers here to the Kenites rather than to the individual Cain.
    reason: lexical_alternative
  - marker: b
    text: Asshur can mean 'Assyria' or 'the Assyrian' in context.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי אִם
  chosen: For if
  alternatives:
  - Surely if
  - Nevertheless if
  - But if
  lexicon: HALOT
  rationale: The combination introduces an explanatory or concessive conditional.
    'For if' preserves the linkage to the preceding oracle while keeping the conditional
    force clear in English.
- source_word: יִהְיֶה
  chosen: is destined
  alternatives:
  - will be
  - comes to be
  - becomes
  lexicon: HALOT
  rationale: The simple verb 'be' with the following infinitive construction expresses
    what will happen to Kain. 'Is destined' brings out the predictive force naturally
    in English without over-paraphrasing.
- source_word: לְבָעֵר
  chosen: for burning
  alternatives:
  - to be consumed
  - for destruction
  - to be burned up
  lexicon: HALOT
  rationale: 'The preposition ל with בער here is commonly understood as indicating
    result or destiny: Kain is headed toward being consumed/burned. ''For burning''
    stays close to the Hebrew imagery and avoids prematurely specifying whether the
    sense is literal fire or figurative destruction.'
- source_word: קָיִן
  chosen: Kain
  alternatives:
  - Cain
  - Kenite
  lexicon: HALOT
  rationale: As a proper name, it is transliterated. In this context the referent
    is the Kenite group addressed in the surrounding oracle, but the Hebrew form is
    singular proper-name-like. 'Kain' preserves the form while a footnote can note
    the likely ethnic reference.
- source_word: עַד מָה
  chosen: how long before
  alternatives:
  - until when
  - how long
  - to what point
  lexicon: HALOT
  rationale: The idiom asks how long a condition will last before the next event occurs.
    'How long before' communicates the temporal force idiomatically in modern English.
- source_word: אַשּׁוּר
  chosen: Asshur
  alternatives:
  - Assyria
  - the Assyrian
  lexicon: HALOT
  rationale: The Hebrew is the proper name Asshur, which may denote Assyria or the
    Assyrian power. Following the translation philosophy, names are transliterated
    in the main text, with the geopolitical sense preserved in a footnote.
- source_word: תִּשְׁבֶּךָּ
  chosen: carries you away captive
  alternatives:
  - takes you captive
  - captures you
  - leads you away
  lexicon: HALOT
  rationale: From שבה 'take captive.' The 3fs form likely agrees with a collective
    or kingdom-name subject such as Asshur/Assyria. 'Carries you away captive' reflects
    the exile/captivity nuance more fully than the bare 'captures you.'
