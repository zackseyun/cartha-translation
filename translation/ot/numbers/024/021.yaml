id: NUM.24.21
reference: Numbers 24:21
source:
  edition: WLC
  text: וַ/יַּרְא֙ אֶת הַ/קֵּינִ֔י וַ/יִּשָּׂ֥א מְשָׁל֖/וֹ וַ/יֹּאמַ֑ר אֵיתָן֙ מֽוֹשָׁבֶ֔/ךָ
    וְ/שִׂ֥ים בַּ/סֶּ֖לַע קִנֶּֽ/ךָ־׃
translation:
  text: 'Then he saw the Kenite, and he took up his discourse and said: “Your dwelling
    place is enduring, and your nest is set in the rock.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “he took up his oracle.” The Hebrew מָשָׁל can denote a proverb, taunt,
      or prophetic utterance; here it refers to Balaam’s poetic oracle.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקֵּינִי
  chosen: the Kenite
  alternatives:
  - the Kenites
  - Kain
  lexicon: HALOT
  rationale: The form is singular with the article, referring to the Kenite as a representative
    people/group in Balaam's oracle. Singular collective is best preserved in English
    as 'the Kenite.'
- source_word: מְשָׁלוֹ
  chosen: his discourse
  alternatives:
  - his oracle
  - his proverb
  lexicon: HALOT
  rationale: מָשָׁל in Balaam contexts denotes a weighty poetic utterance or oracle.
    'Discourse' is natural English and broad enough to cover the elevated saying,
    while 'oracle' is possible and 'proverb' is too narrow in modern English. Because
    'oracle' is a viable alternative in this prophetic context, it is preserved in
    a footnote.
- source_word: אֵיתָן
  chosen: enduring
  alternatives:
  - strong
  - secure
  - permanent
  lexicon: HALOT
  rationale: The adjective conveys firmness, durability, and strength. 'Enduring'
    captures the sense of lasting security in context, while avoiding an overly physical-only
    sense such as 'strong.'
- source_word: מוֹשָׁבֶךָ
  chosen: your dwelling place
  alternatives:
  - your habitation
  - your settlement
  lexicon: HALOT
  rationale: The noun refers to a place of dwelling or habitation. 'Dwelling place'
    is clear modern English and fits the poetic line.
- source_word: וְשִׂים
  chosen: is set
  alternatives:
  - put
  - placed
  - set
  lexicon: HALOT
  rationale: Although formally an imperative/participle-like poetic form, in this
    verbless-poetic context it functions predicatively describing the condition of
    the Kenite's nest. English idiom is best served by 'is set' rather than a wooden
    imperative such as 'and put in the rock your nest.'
- source_word: בַּסֶּלַע
  chosen: in the rock
  alternatives:
  - on the crag
  - in the crag
  lexicon: HALOT
  rationale: סֶלַע denotes rock, cliff, or crag. 'Rock' is the most straightforward
    rendering; the imagery is of a secure nesting place in rocky heights. 'Crag' is
    possible but less common.
- source_word: קִנֶּךָ
  chosen: your nest
  alternatives:
  - your nesting place
  lexicon: HALOT
  rationale: The noun literally means 'nest.' The metaphor of a bird's secure nest
    in the rock should be preserved rather than flattened.
