theological_decisions:
- issue: Prophetic time expression בְּאַחֲרִית הַיָּמִים
  chosen_reading: in the latter days
  alternative_readings:
  - in days to come
  rationale: The phrase can denote a future period without requiring a fully developed
    end-times schema in every context. 'In the latter days' preserves the prophetic
    and potentially eschatological tension rather than resolving it into a merely
    generic future.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
