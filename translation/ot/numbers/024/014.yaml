id: NUM.24.14
reference: Numbers 24:14
source:
  edition: WLC
  text: וְ/עַתָּ֕ה הִנְנִ֥/י הוֹלֵ֖ךְ לְ/עַמִּ֑/י לְכָ/ה֙ אִיעָ֣צְ/ךָ֔ אֲשֶׁ֨ר יַעֲשֶׂ֜ה
    הָ/עָ֥ם הַ/זֶּ֛ה לְ/עַמְּ/ךָ֖ בְּ/אַחֲרִ֥ית הַ/יָּמִֽים׃
translation:
  text: And now, behold, I am going to my people. Come, I will advise you what this
    people will do to your people in the latter days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'in days to come.' The Hebrew phrase can refer broadly to the future,
      though 'in the latter days' preserves its prophetic weight.
    reason: alternative_reading
  - marker: b
    text: Or, 'against your people.' The Hebrew preposition literally reads 'to your
      people,' but in context it may imply hostile action.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Temporal discourse marker introducing Balaam's next statement; 'And now'
    preserves the connective force of ו plus the adverb 'now.'
- source_word: הִנְנִי
  chosen: behold
  alternatives:
  - look
  - see
  - here I am
  lexicon: HALOT
  rationale: Deictic particle emphasizing the immediacy/certainty of the statement.
    'Behold' is slightly formal but still readable and preserves the marked emphasis
    better than omitting it.
- source_word: הוֹלֵךְ
  chosen: I am going
  alternatives:
  - I am departing
  - I go
  lexicon: HALOT
  rationale: Qal participle expresses imminent or ongoing action. 'I am going' captures
    the participial sense naturally in English.
- source_word: לְעַמִּי
  chosen: to my people
  alternatives:
  - to my own people
  lexicon: HALOT
  rationale: Literal relational phrase indicating return to Balaam's own people; no
    need to specify ethnicity beyond the Hebrew.
- source_word: לְכָה
  chosen: Come
  alternatives:
  - Come now
  - Go
  lexicon: HALOT
  rationale: Idiomatic imperative used to summon attention/action. 'Come' is the standard
    rendering in this discourse formula.
- source_word: אִיעָצְךָ
  chosen: I will advise you
  alternatives:
  - I will counsel you
  - I will inform you
  lexicon: HALOT
  rationale: From יעץ, 'to advise/counsel.' Here Balaam is not merely giving strategy
    but declaring counsel/instruction. 'Advise' is concise and natural. Because the
    following clause is predictive, 'inform you' is possible, but 'advise' stays closer
    to the lexical core.
- source_word: אֲשֶׁר יַעֲשֶׂה
  chosen: what ... will do
  alternatives:
  - that ... will do
  - what ... is going to do
  lexicon: HALOT
  rationale: 'The relative particle plus verb introduces the content of Balaam''s
    counsel: specifically, what will happen. ''What ... will do'' is idiomatic English
    for this construction.'
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: עָם is singular in Hebrew. 'This people' preserves the singular collective
    and the rhetorical distance of Balaam's wording better than 'these people.' 'Nation'
    is possible but less direct.
- source_word: לְעַמְּךָ
  chosen: to your people
  alternatives:
  - against your people
  lexicon: HALOT
  rationale: The preposition ל can mark relation or affected party. In context of
    hostile action, English may imply opposition without adding 'against.' Retaining
    'to your people' stays formally close while remaining intelligible.
- source_word: בְּאַחֲרִית הַיָּמִים
  chosen: in the latter days
  alternatives:
  - in days to come
  - in the end of days
  lexicon: HALOT
  rationale: Established Hebrew idiom for a future time, sometimes with eschatological
    overtones depending on context. 'In the latter days' preserves the idiom and its
    possible prophetic weight better than the flatter 'in days to come.'
