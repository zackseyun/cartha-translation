theological_decisions:
- issue: Messianic force of Balaam's oracle
  chosen_reading: Retain the royal imagery ('star,' 'scepter') in the main text without
    explicitly identifying the referent as the Messiah.
  alternative_readings:
  - Interpret the verse directly as a prophecy of the Messiah
  - Interpret it only as an immediate historical ruler such as David
  rationale: Historic Christian interpretation sees messianic significance here, but
    the Hebrew text itself presents symbolic royal imagery and conquest language without
    naming the Messiah. To preserve theological tension and avoid importing a fuller
    christological identification into the translation, the main text remains image-based
    and non-explicit.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Referent of the masculine singular suffixes and verbs
  chosen_reading: Use personal language in the opening ('him') but allow the later
    symbolic subjects ('star,' 'scepter') to stand without explicit identification.
  alternative_readings:
  - Make the whole verse explicitly personal with 'he will crush'
  - Make the whole verse impersonal as astronomical/political symbolism
  rationale: The opening verbs clearly take a masculine singular object, suggesting
    a person seen in vision. Later clauses use symbolic nouns as subjects. The translation
    preserves both levels rather than flattening the imagery into either a purely
    personal or purely impersonal reading.
  doctrine_reference: Translation philosophy §3
