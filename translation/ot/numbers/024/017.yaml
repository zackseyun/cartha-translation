id: NUM.24.17
reference: Numbers 24:17
source:
  edition: WLC
  text: אֶרְאֶ֨/נּוּ֙ וְ/לֹ֣א עַתָּ֔ה אֲשׁוּרֶ֖/נּוּ וְ/לֹ֣א קָר֑וֹב דָּרַ֨ךְ כּוֹכָ֜ב
    מִֽ/יַּעֲקֹ֗ב וְ/קָ֥ם שֵׁ֨בֶט֙ מִ/יִּשְׂרָאֵ֔ל וּ/מָחַץ֙ פַּאֲתֵ֣י מוֹאָ֔ב וְ/קַרְקַ֖ר
    כָּל בְּנֵי שֵֽׁת־־׃
translation:
  text: I see him, but not now; I behold him, but not near. A star has come forth
    from Jacob, and a scepter has risen from Israel; it will crush the corners of
    Moab and tear down all the sons of Sheth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A star rises from Jacob, and a scepter arises from Israel.' The Hebrew
      uses royal imagery that can be read as referring to a coming ruler.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the corners of Moab,' likely a figurative expression for Moab's
      extremities or strength.
    reason: cultural_note
  - marker: c
    text: Or 'all the sons of Seth.' The Hebrew שֵׁת may be read as the proper name
      Seth/Sheth; some understand it more broadly as a poetic designation for humanity
      or for a hostile people.
    reason: alternative_reading
lexical_decisions:
- source_word: אֶרְאֶנּוּ
  chosen: I see him
  alternatives:
  - I shall see him
  - I see it
  lexicon: HALOT
  rationale: Qal imperfect 1cs with 3ms suffix from ראה. In prophetic discourse the
    imperfect can be rendered with present force in English for vividness ('I see
    him'), while future ('I shall see him') is possible. The masculine singular suffix
    favors a personal referent, matching the following parallelism.
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at this time
  lexicon: HALOT
  rationale: Temporal adverb meaning 'now/at this time.' In the clause with negation
    it indicates the vision concerns a figure not present in Balaam's immediate time.
- source_word: אֲשׁוּרֶנּוּ
  chosen: I behold him
  alternatives:
  - I gaze on him
  - I perceive him
  lexicon: HALOT
  rationale: From שׁור, 'to behold/look upon.' Chosen 'behold' to preserve the elevated
    prophetic parallel with 'I see him' without collapsing the two verbs into identical
    English.
- source_word: קָרוֹב
  chosen: near
  alternatives:
  - soon
  - close
  lexicon: HALOT
  rationale: Adjective/adverb meaning 'near.' Here it is temporal in context ('not
    near'), though spatial nuance remains. 'Near' preserves the ambiguity better than
    the more interpretive 'soon'.
- source_word: דָּרַךְ כּוֹכָב
  chosen: A star has come forth
  alternatives:
  - A star has stepped forth
  - A star rises
  lexicon: HALOT
  rationale: דָּרַךְ literally 'has trodden/stepped,' idiomatically used of appearing
    or advancing. With 'star' as subject, English 'has come forth' captures emergence
    without over-literal awkwardness. 'Rises' is possible but better suits different
    Hebrew verbs and may over-associate with astronomical motion.
- source_word: כּוֹכָב
  chosen: star
  lexicon: HALOT
  rationale: Literal 'star.' In context it is metaphorical for a ruler, but the image
    should remain in the main text rather than be interpreted away.
- source_word: וְקָם שֵׁבֶט
  chosen: and a scepter has risen
  alternatives:
  - and a staff has arisen
  - and a ruler's staff has arisen
  lexicon: HALOT
  rationale: שֵׁבֶט can mean 'rod, staff, scepter, tribe.' Here parallel to 'star'
    and followed by conquest language, the royal sense 'scepter' is most fitting.
    'Has risen' mirrors the perfect/wayyiqtol prophetic style in English.
- source_word: מִיַּעֲקֹב / מִיִּשְׂרָאֵל
  chosen: from Jacob / from Israel
  alternatives:
  - out of Jacob / out of Israel
  lexicon: HALOT
  rationale: The preposition מן marks source/origin. 'From' is natural modern English;
    'out of' is possible but slightly more idiomatic/traditional. Retaining both Jacob
    and Israel preserves the poetic parallelism.
- source_word: וּמָחַץ
  chosen: it will crush
  alternatives:
  - and he will crush
  - and it has crushed
  lexicon: HALOT
  rationale: מחץ means 'smash, crush.' English future is appropriate for the predictive
    force. The subject could be construed as the star/scepter figure personally ('he')
    or the symbol collectively ('it'). 'It' keeps agreement with the immediate symbolic
    subjects while leaving the personal interpretation available.
- source_word: פַּאֲתֵי מוֹאָב
  chosen: the corners of Moab
  alternatives:
  - the forehead of Moab
  - the sides of Moab
  - the princes of Moab
  lexicon: HALOT
  rationale: פֵּאָה commonly means 'corner, side, edge.' 'Corners of Moab' is the
    most textually transparent rendering, preserving the metaphor. More interpretive
    renderings such as 'princes' are not warranted by the Hebrew here.
- source_word: וְקַרְקַר
  chosen: tear down
  alternatives:
  - break down
  - destroy
  - lay waste
  lexicon: HALOT
  rationale: The verb is rare and uncertain; proposed senses include 'tear down, demolish,
    lay waste.' 'Tear down' fits the conquest context and avoids overclaiming precision
    where the lexeme is debated.
- source_word: כָּל בְּנֵי שֵׁת
  chosen: all the sons of Sheth
  alternatives:
  - all the sons of Seth
  - all the sons of tumult
  lexicon: HALOT
  rationale: The phrase is difficult. The consonants naturally read as the proper
    name Sheth/Seth. Retaining the transliterated form 'Sheth' avoids importing the
    Genesis identification too strongly while preserving the Hebrew. Because some
    take it as 'Seth,' that alternative is worth footnoting.
