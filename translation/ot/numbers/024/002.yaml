theological_decisions:
- issue: Rendering רוּחַ אֱלֹהִים in a prophetic empowerment context
  chosen_reading: the Spirit of God
  alternative_readings:
  - a spirit from God
  - God's spirit
  rationale: The immediate context is Balaam's prophetic oracle, and the Hebrew expression
    regularly denotes divine Spirit-empowerment. Rendering it as 'the Spirit of God'
    preserves that theological force without importing later doctrinal detail beyond
    the text.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
