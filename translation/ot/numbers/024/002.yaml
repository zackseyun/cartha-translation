id: NUM.24.2
reference: Numbers 24:2
source:
  edition: WLC
  text: וַ/יִּשָּׂ֨א בִלְעָ֜ם אֶת עֵינָ֗י/ו וַ/יַּרְא֙ אֶת יִשְׂרָאֵ֔ל שֹׁכֵ֖ן לִ/שְׁבָטָ֑י/ו
    וַ/תְּהִ֥י עָלָ֖י/ו ר֥וּחַ אֱלֹהִֽים־־׃
translation:
  text: Then Balaam lifted up his eyes and saw Israel dwelling according to its tribes,
    and the Spirit of God came upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'camped by its tribes' or 'tribe by tribe.'
    reason: lexical_alternative
  - marker: b
    text: Or 'God's spirit was upon him.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשָּׂא
  chosen: lifted up
  alternatives:
  - raised
  lexicon: HALOT
  rationale: The idiom נָשָׂא עֵינַיִם commonly means to lift up one's eyes/look up.
    'Lifted up' preserves the Hebrew idiom naturally in English.
- source_word: עֵינָיו
  chosen: his eyes
  lexicon: HALOT
  rationale: Retained as part of the idiom 'lifted up his eyes' rather than reducing
    to simply 'looked,' since the Hebrew explicitly includes 'his eyes.'
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - looked at
  lexicon: HALOT
  rationale: The verb ראה here reports perception of what Balaam observed after lifting
    his eyes. 'Saw' is the most direct rendering.
- source_word: שֹׁכֵן
  chosen: dwelling
  alternatives:
  - camped
  - settled
  lexicon: HALOT
  rationale: The participle denotes Israel in a settled encampment arrangement. 'Dwelling'
    preserves the participial sense without over-specifying military imagery, though
    the context is camp arrangement.
- source_word: לִשְׁבָטָיו
  chosen: according to its tribes
  alternatives:
  - by its tribes
  - tribe by tribe
  lexicon: HALOT
  rationale: The preposition ל here indicates arrangement/distribution. Because 'Israel'
    is a collective singular in English, 'its tribes' fits the syntax. 'According
    to its tribes' clearly conveys ordered tribal arrangement.
- source_word: רוּחַ אֱלֹהִים
  chosen: the Spirit of God
  alternatives:
  - a spirit from God
  - God's spirit
  lexicon: HALOT
  rationale: In this prophetic context the phrase most naturally refers to God's Spirit
    coming upon Balaam for inspired speech. The definite article is not present in
    Hebrew, but English idiom and the construction support 'the Spirit of God' as
    the clearest rendering.
- source_word: וַתְּהִי עָלָיו
  chosen: came upon him
  alternatives:
  - was upon him
  lexicon: HALOT
  rationale: This is a standard idiom for the Spirit's empowering presence in prophetic
    contexts. 'Came upon him' communicates the ingressive force better than the more
    static 'was upon him.'
