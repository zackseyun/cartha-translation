theological_decisions:
- issue: Referent of second person suffixes in 'those who bless you... those who curse
    you'
  chosen_reading: Addressed to Israel/Jacob as represented in Balaam's oracle
  alternative_readings:
  - Addressed more narrowly to Israel's king
  - Addressed corporately to the people without specifying representative focus
  rationale: The immediate context speaks of Israel/Jacob in elevated poetic singular,
    echoing the patriarchal blessing tradition of Genesis 12:3 and 27:29. The English
    keeps the singular 'you' to preserve the Hebrew form and its representative-corporate
    force without over-specifying the referent.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Echo of patriarchal blessing formula
  chosen_reading: Retained as a direct blessing/curse declaration without importing
    later doctrinal claims
  alternative_readings:
  - Expanded paraphrase to make the Abrahamic allusion explicit
  rationale: The wording strongly echoes earlier covenantal formulas, but the translation
    should preserve the text's own statement rather than interpretively expanding
    it. A footnote can note the cross-reference without embedding it in the main text.
  doctrine_reference: Original-language primacy over translation tradition
