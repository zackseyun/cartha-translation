id: NUM.24.9
reference: Numbers 24:9
source:
  edition: WLC
  text: כָּרַ֨ע שָׁכַ֧ב כַּ/אֲרִ֛י וּ/כְ/לָבִ֖יא מִ֣י יְקִימֶ֑/נּוּ מְבָרֲכֶ֣י/ךָ
    בָר֔וּךְ וְ/אֹרְרֶ֖י/ךָ אָרֽוּר׃
translation:
  text: He crouched, he lay down like a lion, and like a lioness—who will rouse him?
    Those who bless you are blessed, and those who curse you are cursed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This blessing-and-curse formula echoes Genesis 12:3 and Genesis 27:29.
    reason: cross_reference
  - marker: b
    text: Or 'and like a great lion.' The Hebrew term may denote a strong or mature
      lion; 'lioness' preserves the lexical distinction from the previous word for
      'lion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּרַע
  chosen: he crouched
  alternatives:
  - he bowed down
  - he knelt
  lexicon: HALOT
  rationale: The verb denotes bending down or crouching. In parallel with שָׁכַב and
    the lion imagery, 'crouched' best fits the animal posture rather than a human
    act of worship or submission.
- source_word: שָׁכַב
  chosen: he lay down
  alternatives:
  - he lay
  - he reclined
  lexicon: HALOT
  rationale: A common verb for lying down. 'Lay down' is idiomatic in English and
    preserves the sequential picture of the lion settling into rest.
- source_word: כַּאֲרִי
  chosen: like a lion
  lexicon: HALOT
  rationale: Standard rendering of אֲרִי. The simile is explicit with כַּ. Retained
    plainly to preserve the poetic image.
- source_word: וּכְלָבִיא
  chosen: and like a lioness
  alternatives:
  - and like a great lion
  lexicon: HALOT
  rationale: לָבִיא commonly denotes a lion/lioness, often with emphasis on strength
    or maturity. 'Lioness' is a natural lexical counterpart and preserves the distinct
    second feline term rather than flattening both to 'lion.'
- source_word: מִי יְקִימֶנּוּ
  chosen: who will rouse him?
  alternatives:
  - who will raise him up?
  - who will stir him up?
  lexicon: HALOT
  rationale: In context of a resting lion, the causative of קום means to make rise
    or awaken. 'Rouse' is vivid, idiomatic, and contextually precise.
- source_word: מְבָרֲכֶיךָ
  chosen: those who bless you
  alternatives:
  - your blessers
  lexicon: HALOT
  rationale: The participle with 2ms suffix is best rendered as a substantival participial
    phrase in natural English.
- source_word: בָרוּךְ
  chosen: are blessed
  alternatives:
  - be blessed
  - is blessed
  lexicon: HALOT
  rationale: Predicate adjective functioning in a proverbial declaration. English
    plural agreement with the collective subject requires 'are blessed.'
- source_word: וְאֹרְרֶיךָ
  chosen: and those who curse you
  alternatives:
  - and your cursers
  lexicon: HALOT
  rationale: Substantival participle parallel to מברכיך. 'Curse' is the direct lexical
    equivalent and preserves the covenantal blessing/curse contrast.
- source_word: אָרוּר
  chosen: are cursed
  alternatives:
  - is cursed
  lexicon: HALOT
  rationale: Predicate adjective in parallel with בָרוּךְ. Rendered with plural agreement
    in English for clarity and symmetry.
