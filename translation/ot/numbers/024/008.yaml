id: NUM.24.8
reference: Numbers 24:8
source:
  edition: WLC
  text: אֵ֚ל מוֹצִיא֣/וֹ מִ/מִּצְרַ֔יִם כְּ/תוֹעֲפֹ֥ת רְאֵ֖ם ל֑/וֹ יֹאכַ֞ל גּוֹיִ֣ם
    צָרָ֗י/ו וְ/עַצְמֹתֵי/הֶ֛ם יְגָרֵ֖ם וְ/חִצָּ֥י/ו יִמְחָֽץ׃
translation:
  text: God brings him out of Egypt; he has for him the horns of a wild ox. He will
    consume the nations that are his adversaries, and will gnaw their bones and crush
    them with his arrows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the strength of a wild ox.' The Hebrew phrase כְּתוֹעֲפֹת רְאֵם is difficult;
      traditional versions often render the image more generally as strength rather
      than explicitly as horns.
    reason: lexical_alternative
  - marker: b
    text: Or 'will break their bones' or 'will strip their bones bare.' The Hebrew
      verb יְגָרֵם is rare and its precise nuance is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - God
  lexicon: HALOT
  rationale: The noun plainly denotes God here as the subject of Israel's deliverance.
    'God' is the natural modern English rendering.
- source_word: מוֹצִיאוֹ
  chosen: brings him out
  alternatives:
  - brought him out
  - is bringing him out
  lexicon: HALOT
  rationale: 'The participle with pronominal suffix functions verbally: ''the one
    bringing him out.'' In English, ''brings him out'' best captures the vivid present-like
    force in poetic discourse.'
- source_word: מִמִּצְרַיִם
  chosen: out of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: Standard geographic rendering; 'out of Egypt' fits the exodus idiom in
    English.
- source_word: כְּתוֹעֲפֹת רְאֵם
  chosen: the horns of a wild ox
  alternatives:
  - the strength of a wild ox
  - the lofty horns of a wild ox
  - the horns of a re'em
  lexicon: HALOT
  rationale: The phrase is idiomatic and difficult. תועפות likely refers to exalted
    strength or horns/projections; in parallel with the animal image, 'the horns of
    a wild ox' makes the metaphor explicit and natural in English. רְאֵם is best rendered
    as a now-extinct wild ox rather than the traditional but inaccurate 'unicorn.'
- source_word: לוֹ
  chosen: for him
  alternatives:
  - his
  - to him
  lexicon: HALOT
  rationale: 'The preposition plus suffix indicates possession or advantage: God has
    such strength ''for him,'' i.e., on his behalf. Rendering it explicitly preserves
    the Hebrew construction.'
- source_word: יֹאכַל
  chosen: will consume
  alternatives:
  - will eat up
  - will devour
  lexicon: HALOT
  rationale: Though literally 'eat,' in martial poetry it metaphorically denotes destroying
    enemies. 'Consume' preserves the metaphor without sounding overly wooden.
- source_word: גּוֹיִם
  chosen: the nations
  alternatives:
  - nations
  - peoples
  lexicon: HALOT
  rationale: Common plural of גוי. With the following qualifier, 'the nations' is
    the most straightforward rendering.
- source_word: צָרָיו
  chosen: that are his adversaries
  alternatives:
  - his enemies
  - his foes
  lexicon: HALOT
  rationale: 'The construct-like relation is appositional: the nations, namely his
    adversaries. ''Adversaries'' reflects the lexical sense of צרר/צר.'
- source_word: וְעַצְמֹתֵיהֶם
  chosen: their bones
  lexicon: HALOT
  rationale: Direct, literal rendering of the noun with suffix.
- source_word: יְגָרֵם
  chosen: will gnaw
  alternatives:
  - will crush
  - will break
  - will strip bare
  lexicon: HALOT
  rationale: The verb is rare and contextually linked with bones; 'gnaw' fits the
    devouring imagery and explains the object 'bones' better than a generic 'break.'
    Because the lexeme is uncertain, an alternative is preserved in a footnote.
- source_word: וְחִצָּיו
  chosen: with his arrows
  alternatives:
  - his arrows
  - his shafts
  lexicon: HALOT
  rationale: 'Instrumental sense is most natural in English with the following verb:
    he crushes them with his arrows.'
- source_word: יִמְחָץ
  chosen: crush
  alternatives:
  - smash
  - pierce
  lexicon: HALOT
  rationale: The verb commonly denotes crushing or shattering. 'Crush' preserves the
    violence of the image.
