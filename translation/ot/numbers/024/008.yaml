theological_decisions:
- issue: Referent of the singular pronouns in Balaam's oracle
  chosen_reading: The singular 'him/he/his' is preserved without specifying beyond
    the text, referring poetically to Israel as a corporate singular or its kingly
    representative.
  alternative_readings:
  - Israel corporately
  - Israel's king / future ruler
  - a messianic individual reading in later interpretation
  rationale: The Hebrew uses singular pronominal forms, but the immediate context
    allows a corporate or representative singular. To preserve theological tension
    and avoid importing a narrower doctrinal claim, the translation keeps the singular
    pronouns rather than resolving the referent.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
