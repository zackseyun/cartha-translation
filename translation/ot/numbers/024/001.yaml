id: NUM.24.1
reference: Numbers 24:1
source:
  edition: WLC
  text: וַ/יַּ֣רְא בִּלְעָ֗ם כִּ֣י ט֞וֹב בְּ/עֵינֵ֤י יְהוָה֙ לְ/בָרֵ֣ךְ אֶת יִשְׂרָאֵ֔ל
    וְ/לֹא הָלַ֥ךְ כְּ/פַֽעַם בְּ/פַ֖עַם לִ/קְרַ֣את נְחָשִׁ֑ים וַ/יָּ֥שֶׁת אֶל הַ/מִּדְבָּ֖ר
    פָּנָֽי/ו־־־־׃
translation:
  text: When Balaam saw that it was good in the eyes of the LORD to bless Israel,
    he did not go, as at other times, to seek omens, but set his face toward the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to meet with divinations' or 'to encounter omens.' The Hebrew expression
      refers to Balaam's former practice of seeking divinatory signs.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw
  alternatives:
  - perceived
  - realized
  lexicon: HALOT
  rationale: Basic sense of ראה is visual seeing, but in context it introduces Balaam's
    recognition of the situation. 'Saw' preserves the Hebrew idiom and remains natural
    in English.
- source_word: כִּי טוֹב בְּעֵינֵי יְהוָה
  chosen: that it was good in the eyes of the LORD
  alternatives:
  - that it pleased the LORD
  - that it was good to the LORD
  lexicon: HALOT
  rationale: The Hebrew idiom 'good in the eyes of' means pleasing or acceptable.
    Retaining 'good in the eyes of' keeps the source imagery while remaining understandable.
    'the LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD' rather than a transliteration.
- source_word: לְבָרֵךְ
  chosen: to bless
  lexicon: HALOT
  rationale: Straightforward infinitive of ברך in this context; no expansion beyond
    the source is needed.
- source_word: וְלֹא הָלַךְ
  chosen: he did not go
  alternatives:
  - he did not proceed
  - he did not go off
  lexicon: HALOT
  rationale: הלך is the ordinary verb 'go/walk.' 'Did not go' is the most direct rendering
    and fits the narrative sequence.
- source_word: כְּפַעַם בְּפַעַם
  chosen: as at other times
  alternatives:
  - as time after time
  - as before
  lexicon: HALOT
  rationale: The expression literally compares one occurrence with another ('as time
    by time'), idiomatically meaning 'as previously' or 'as at other times.' This
    rendering is natural English and preserves the repeated-practice sense.
- source_word: לִקְרַאת נְחָשִׁים
  chosen: to seek omens
  alternatives:
  - to encounter omens
  - to meet with divinations
  lexicon: HALOT
  rationale: נְחָשִׁים here refers to divinatory signs/omens, not literal snakes.
    The construction with לִקְרַאת can be woodenly 'to meet/encounter,' but in context
    Balaam is going in pursuit of divination. 'To seek omens' communicates the function
    clearly without paraphrasing beyond the context.
- source_word: וַיָּשֶׁת ... פָּנָיו
  chosen: set his face
  alternatives:
  - turned his face
  - directed himself
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for directing oneself intentionally. 'Set
    his face' preserves the idiom and its deliberateness.
- source_word: אֶל הַמִּדְבָּר
  chosen: toward the wilderness
  alternatives:
  - toward the desert
  - to the wilderness
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness/desert terrain. 'Wilderness' is the more
    biblically familiar and contextually suitable choice. 'Toward' fits the directional
    force with 'set his face.'
