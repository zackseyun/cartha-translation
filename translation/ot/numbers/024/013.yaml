id: NUM.24.13
reference: Numbers 24:13
source:
  edition: WLC
  text: אִם יִתֶּן לִ֨/י בָלָ֜ק מְלֹ֣א בֵית/וֹ֮ כֶּ֣סֶף וְ/זָהָב֒ לֹ֣א אוּכַ֗ל לַ/עֲבֹר֙
    אֶת פִּ֣י יְהוָ֔ה לַ/עֲשׂ֥וֹת טוֹבָ֛ה א֥וֹ רָעָ֖ה מִ/לִּבִּ֑/י אֲשֶׁר יְדַבֵּ֥ר
    יְהוָ֖ה אֹת֥/וֹ אֲדַבֵּֽר־־־־׃
translation:
  text: If Balak were to give me his house full of silver and gold, I could not go
    beyond the word of the LORD, to do good or evil from my own heart. Whatever the
    LORD speaks, that I will speak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'go beyond the mouth of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם יִתֶּן
  chosen: If ... were to give
  alternatives:
  - If ... gives
  - Even if ... gives
  lexicon: HALOT
  rationale: אִם with the imperfect here introduces a conditional/hypothetical statement.
    English subjunctive-like 'were to give' captures the sense naturally without overcommitting
    to a temporal nuance.
- source_word: מְלֹא בֵיתוֹ כֶּסֶף וְזָהָב
  chosen: his house full of silver and gold
  alternatives:
  - the fullness of his house of silver and gold
  - his houseful of silver and gold
  lexicon: HALOT
  rationale: The construct phrase literally denotes the fullness of his house consisting
    of silver and gold. 'His house full of silver and gold' is idiomatic English and
    preserves the image of lavish payment.
- source_word: לֹא אוּכַל
  chosen: I could not
  alternatives:
  - I am not able to
  - I cannot
  lexicon: HALOT
  rationale: The imperfect of יכל in this conditional setting is well represented
    by 'could not,' matching the hypothetical frame established by the opening clause.
- source_word: לַעֲבֹר אֶת־פִּי יְהוָה
  chosen: go beyond the word of the LORD
  alternatives:
  - transgress the command of the LORD
  - go against the mouth of the LORD
  lexicon: HALOT
  rationale: Literally 'to pass beyond the mouth of YHWH.' 'Go beyond the word of
    the LORD' preserves the metaphor of exceeding a spoken boundary while remaining
    natural English. 'Word' is preferable to the overly literal 'mouth' in the main
    text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: לַעֲשׂוֹת טוֹבָה אוֹ רָעָה
  chosen: to do good or evil
  alternatives:
  - to do good or bad
  - to do what is good or what is evil
  lexicon: HALOT
  rationale: This infinitive phrase states the content of what Balaam cannot do independently.
    'Good or evil' is the most direct and weighty rendering, preserving the moral
    polarity of the Hebrew.
- source_word: מִלִּבִּי
  chosen: from my own heart
  alternatives:
  - from my heart
  - of myself
  lexicon: HALOT
  rationale: The phrase indicates source or initiative arising from Balaam himself.
    'From my own heart' makes explicit the contrast with speaking only what the LORD
    says.
- source_word: אֲשֶׁר יְדַבֵּר יְהוָה אֹתוֹ
  chosen: Whatever the LORD speaks, that
  alternatives:
  - What the LORD speaks, that
  - Whatever the LORD says, that
  lexicon: HALOT
  rationale: The object marker with pronominal suffix likely anticipates the content
    spoken. 'Whatever the LORD speaks, that' preserves the resumptive structure in
    idiomatic English.
- source_word: אֲדַבֵּר
  chosen: I will speak
  alternatives:
  - I speak
  - I will say
  lexicon: HALOT
  rationale: Future-like imperfect in direct discourse is naturally rendered 'I will
    speak.' 'Speak' maintains verbal consistency with יְדַבֵּר earlier in the verse.
