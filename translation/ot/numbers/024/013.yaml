theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the Tetragrammaton as 'the LORD,' following
    the stated doctrine and translation policy rather than using a transliteration
    in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of Balaam's limitation
  chosen_reading: Balaam cannot act or speak independently of the LORD's word
  alternative_readings:
  - Balaam cannot alter the LORD's command specifically in blessing/curse terms
  rationale: The verse itself emphasizes inability to go beyond the LORD's word and
    inability to do good or evil from his own heart. The translation preserves that
    direct claim without importing broader doctrinal conclusions about prophecy beyond
    the immediate context.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
