id: NUM.24.7
reference: Numbers 24:7
source:
  edition: WLC
  text: יִֽזַּל מַ֨יִם֙ מִ/דָּ֣לְיָ֔/ו וְ/זַרְע֖/וֹ בְּ/מַ֣יִם רַבִּ֑ים וְ/יָרֹ֤ם
    מֵֽ/אֲגַג֙ מַלְכּ֔/וֹ וְ/תִנַּשֵּׂ֖א מַלְכֻתֽ/וֹ־׃
translation:
  text: Water will flow from his buckets, and his seed will be by abundant waters;
    his king will be higher than Agag, and his kingdom will be exalted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'from his branches,' if the noun is taken metaphorically rather
      than in its usual sense 'buckets.'
    reason: lexical_alternative
  - marker: b
    text: '''His seed'' may also be understood as ''his offspring'' or ''his descendants'';
      the Hebrew can evoke both progeny and fertility imagery.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִזַּל
  chosen: will flow
  alternatives:
  - will drip
  - will pour out
  lexicon: HALOT
  rationale: The verb זלל/נזל in this stem conveys liquid flowing or streaming. 'Will
    flow' is natural English and preserves the image without over-specifying the manner.
    'Drip' is too weak in this context of abundance; 'pour out' is possible but slightly
    more interpretive.
- source_word: מַיִם
  chosen: Water
  alternatives:
  - waters
  lexicon: HALOT
  rationale: Although formally plural in Hebrew, 'water' is the idiomatic English
    mass noun here. The singular best fits English style while preserving the substance
    of the image.
- source_word: מִדָּלְיוֹ
  chosen: from his buckets
  alternatives:
  - from his pails
  - from his branches
  lexicon: HALOT
  rationale: The noun דלי ordinarily denotes a bucket or pail used for drawing water.
    'Buckets' is the plain lexical sense and fits the immediate water imagery. Some
    have proposed a metaphorical sense such as 'branches,' but that is less likely
    here and is preserved in a footnote as a lexical alternative.
- source_word: וְזַרְעוֹ
  chosen: and his seed
  alternatives:
  - and his offspring
  - and his descendants
  lexicon: HALOT
  rationale: זֶרַע can denote literal seed or figuratively offspring/descendants.
    Because the line is poetic and may intentionally blend agricultural and progeny
    imagery, 'seed' preserves the Hebrew's breadth better than resolving it to only
    biological descendants.
- source_word: בְּמַיִם רַבִּים
  chosen: by abundant waters
  alternatives:
  - in many waters
  - beside plentiful waters
  lexicon: HALOT
  rationale: The preposition ב can be rendered flexibly in poetic context. 'By abundant
    waters' communicates a setting of plentiful water supply and flourishing. 'Many
    waters' is more literal but less idiomatic in English here.
- source_word: וְיָרֹם
  chosen: will be higher
  alternatives:
  - will rise
  - will be exalted
  lexicon: HALOT
  rationale: רוּם means to be high/exalted. Because the next colon uses a different
    exaltation verb for the kingdom, 'will be higher' preserves the comparative sense
    with Agag and avoids flattening the parallelism.
- source_word: מֵאֲגַג
  chosen: than Agag
  alternatives:
  - above Agag
  lexicon: HALOT
  rationale: The comparative מן after a height/exaltation verb is naturally rendered
    'than.' Agag is best treated as the proper name/title in the Hebrew text rather
    than generalized.
- source_word: מַלְכּוֹ
  chosen: his king
  alternatives:
  - his ruler
  lexicon: HALOT
  rationale: מֶלֶךְ straightforwardly means 'king.' The possessive refers to Israel
    in Balaam's oracle; 'his king' preserves the Hebrew form without importing a specific
    identification into the translation.
- source_word: וְתִנַּשֵּׂא
  chosen: will be exalted
  alternatives:
  - will be lifted up
  lexicon: HALOT
  rationale: נשא in the Niphal/T-stem here conveys being lifted up or exalted. 'Will
    be exalted' is idiomatic and matches royal/kingdom language in English.
- source_word: מַלְכֻתוֹ
  chosen: his kingdom
  alternatives:
  - his kingship
  - his royal dominion
  lexicon: HALOT
  rationale: מַלְכוּת denotes kingdom, reign, or kingship. 'Kingdom' is the most natural
    English choice in this context and preserves the corporate-political scope of
    the blessing.
