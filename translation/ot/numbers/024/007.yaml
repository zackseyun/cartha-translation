theological_decisions:
- issue: Referent of 'his seed'
  chosen_reading: Retained as 'his seed' without specifying whether it refers to agricultural
    fertility, descendants, or both.
  alternative_readings:
  - his offspring
  - his descendants
  rationale: The Hebrew זרע can carry both literal and figurative senses, and the
    poetic context may intentionally sustain that richness. Preserving the ambiguity
    follows the translation philosophy of not resolving genuine tension beyond what
    the text warrants.
  doctrine_reference: Translation philosophy §3
- issue: Identity of 'his king' and relation to Agag
  chosen_reading: Translated generically as 'his king will be higher than Agag' without
    identifying the king as Saul, David, the Messiah, or another figure.
  alternative_readings:
  - a reference to Israel's future monarchy
  - a typological or messianic anticipation
  rationale: The verse speaks of Israel's royal exaltation in Balaam's oracle, but
    the text itself does not explicitly identify the king. The translation therefore
    preserves the wording without importing a later theological conclusion into the
    main text.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
