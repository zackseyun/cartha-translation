id: NUM.24.5
reference: Numbers 24:5
source:
  edition: WLC
  text: מַה טֹּ֥בוּ אֹהָלֶ֖י/ךָ יַעֲקֹ֑ב מִשְׁכְּנֹתֶ֖י/ךָ יִשְׂרָאֵֽל־׃
translation:
  text: How good are your tents, O Jacob, your dwellings, O Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How beautiful/pleasant are your tents … your dwelling places.' The Hebrew
      exclamation emphasizes admiration.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: How
  alternatives:
  - How very
  - How exceedingly
  lexicon: HALOT
  rationale: Exclamatory מַה introduces admiration rather than a question here. 'How'
    is the natural English exclamatory equivalent in poetic speech.
- source_word: טֹּבוּ
  chosen: good
  alternatives:
  - pleasant
  - beautiful
  - fair
  lexicon: HALOT
  rationale: טוֹב has a broad semantic range including good, pleasing, pleasant. 'Good'
    preserves the Hebrew's breadth and avoids over-aestheticizing the statement, while
    still sounding natural in English.
- source_word: אֹהָלֶיךָ
  chosen: your tents
  alternatives:
  - your tabernacles
  lexicon: HALOT
  rationale: אֹהֶל ordinarily means 'tent.' 'Tabernacles' is traditional in some English
    versions but is too cultically loaded here; the context is Balaam viewing Israel's
    encampment, so 'tents' is the plain sense.
- source_word: יַעֲקֹב
  chosen: Jacob
  rationale: Personal/collective name is transliterated per translation philosophy.
    Here it functions as a poetic designation for Israel.
- source_word: מִשְׁכְּנֹתֶיךָ
  chosen: your dwellings
  alternatives:
  - your dwelling places
  - your habitations
  - your tabernacles
  lexicon: HALOT
  rationale: מִשְׁכָּן can denote a dwelling place or habitation. 'Dwellings' preserves
    the parallelism with 'tents' while distinguishing the second colon from the first.
    'Tabernacles' would suggest the sanctuary and is misleading in this context.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Personal/collective name is transliterated. In parallel with 'Jacob,'
    it poetically addresses the covenant people.
