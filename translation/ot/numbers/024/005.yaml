theological_decisions:
- issue: Whether to preserve traditional 'tabernacles' language in this verse
  chosen_reading: Use 'tents' and 'dwellings' rather than 'tabernacles'
  alternative_readings:
  - How goodly are thy tents, O Jacob, and thy tabernacles, O Israel
  rationale: The Hebrew refers to Israel's encampment and habitations, not specifically
    to the sanctuary. Using 'tabernacles' would import cultic associations the text
    does not require. This follows original-language primacy over translation tradition.
  doctrine_reference: Translation philosophy §1, §6
