id: NUM.24.18
reference: Numbers 24:18
source:
  edition: WLC
  text: וְ/הָיָ֨ה אֱד֜וֹם יְרֵשָׁ֗ה וְ/הָיָ֧ה יְרֵשָׁ֛ה שֵׂעִ֖יר אֹיְבָ֑י/ו וְ/יִשְׂרָאֵ֖ל
    עֹ֥שֶׂה חָֽיִל׃
translation:
  text: Edom will become a possession; Seir, his enemies, will also become a possession,
    while Israel acts valiantly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Seir will become a possession of its enemies.' The Hebrew reads 'his
      enemies,' with a masculine singular suffix; interpreters differ on whether it
      points to Seir/Edom or to the ruler described in the surrounding oracle.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'does/acts valor'—an idiom meaning to show strength or act valiantly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly
    carries a future/resultative sense. 'Will become' brings out the transition into
    the stated condition more naturally than a bare 'will be.'
- source_word: אֱדוֹם
  chosen: Edom
  lexicon: HALOT
  rationale: Proper name for the nation/territory descended from Esau; transliterated
    per translation philosophy.
- source_word: יְרֵשָׁה
  chosen: a possession
  alternatives:
  - a possession to be taken
  - an inheritance
  lexicon: HALOT
  rationale: The noun denotes something possessed or occupied. 'A possession' fits
    the military-conquest context without over-specifying inheritance language, which
    can sound too domestic here.
- source_word: שֵׂעִיר
  chosen: Seir
  alternatives:
  - Mount Seir
  lexicon: HALOT
  rationale: Proper place name, parallel to Edom. 'Seir' is sufficient in context;
    'Mount Seir' is possible but the Hebrew here lacks an explicit word for mountain.
- source_word: אֹיְבָיו
  chosen: his enemies
  alternatives:
  - its enemies
  - their enemies
  lexicon: HALOT
  rationale: The suffix is 3ms singular, literally 'his enemies.' In context the referent
    is most naturally the ruler/star/scepter figure of the preceding oracle rather
    than Seir itself. This preserves the masculine singular form present in the Hebrew.
- source_word: וְיִשְׂרָאֵל
  chosen: while Israel
  alternatives:
  - and Israel
  lexicon: HALOT
  rationale: 'The conjunction can be rendered simply ''and,'' but ''while'' clarifies
    the clause relation in idiomatic English: the conquest statements are followed
    by a concurrent/resulting statement about Israel''s strength.'
- source_word: עֹשֶׂה חָיִל
  chosen: acts valiantly
  alternatives:
  - does valiantly
  - gains strength
  - shows might
  lexicon: HALOT
  rationale: This idiom commonly conveys displaying strength or valor. 'Acts valiantly'
    is natural modern English and preserves the martial force of the phrase better
    than the archaic 'does valiantly.'
