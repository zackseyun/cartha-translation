theological_decisions:
- issue: Referent of the singular suffix in 'his enemies'
  chosen_reading: The suffix refers to the singular ruler figure in Balaam's oracle,
    so the text is rendered 'his enemies.'
  alternative_readings:
  - The suffix refers to Seir/Edom, yielding 'its enemies' in a more impersonal national
    sense.
  rationale: The Hebrew form is masculine singular, and the broader immediate context
    (vv. 17–19) centers on a coming singular ruler arising from Israel. Retaining
    'his' preserves that literary linkage without making an explicit messianic claim
    beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it
