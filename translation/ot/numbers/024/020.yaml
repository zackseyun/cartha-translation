theological_decisions:
- issue: Sense of Amalek's status in 'the first of the nations'
  chosen_reading: Preserve the Hebrew ambiguity between temporal priority and preeminence
    rather than resolving it.
  alternative_readings:
  - Amalek was the earliest of the nations
  - Amalek was foremost among the nations
  rationale: The phrase can be read as either first in time or first in prominence.
    The verse itself does not explain which is intended, so the translation keeps
    the ambiguity rather than importing a historical or theological conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
