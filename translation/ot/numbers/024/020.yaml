id: NUM.24.20
reference: Numbers 24:20
source:
  edition: WLC
  text: וַ/יַּרְא֙ אֶת עֲמָלֵ֔ק וַ/יִּשָּׂ֥א מְשָׁל֖/וֹ וַ/יֹּאמַ֑ר רֵאשִׁ֤ית גּוֹיִם֙
    עֲמָלֵ֔ק וְ/אַחֲרִית֖/וֹ עֲדֵ֥י אֹבֵֽד־׃
translation:
  text: 'Then he saw Amalek and took up his discourse and said: “Amalek was the first
    of the nations, but his end is utter destruction.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “foremost among the nations”; the Hebrew phrase may indicate either priority
      in time or preeminence.
    reason: lexical_alternative
  - marker: b
    text: Or “took up his oracle” or “uttered his proverb”; the Hebrew term can denote
      a poetic saying, proverb, taunt, or oracle.
    reason: lexical_alternative
  - marker: c
    text: Or “his end is to perish” or “his latter end is destruction”; the Hebrew
      expression is concise and emphasizes complete ruin.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא אֶת עֲמָלֵק
  chosen: Then he saw Amalek
  alternatives:
  - And he saw Amalek
  - He looked at Amalek
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and 'saw' is the plain sense
    of ראה. 'Then' gives natural English sequence without over-paraphrasing.
- source_word: וַיִּשָּׂא מְשָׁלוֹ
  chosen: took up his discourse
  alternatives:
  - took up his oracle
  - uttered his proverb
  lexicon: HALOT
  rationale: מָשָׁל can denote a proverb, taunt, or poetic utterance/oracle. In Balaam's
    sequence of elevated prophetic sayings, 'discourse' is readable modern English
    and broad enough to preserve the genre without forcing either 'proverb' or the
    more technical 'oracle.'
- source_word: רֵאשִׁית גּוֹיִם
  chosen: the first of the nations
  alternatives:
  - first among the nations
  - the foremost of the nations
  lexicon: HALOT
  rationale: רֵאשִׁית denotes beginning, first, or chief place. The construct with
    גּוֹיִם is concise and somewhat ambiguous between temporal priority and prominence.
    'The first of the nations' preserves that ambiguity better than interpretive expansions.
- source_word: עֲמָלֵק
  chosen: Amalek
  lexicon: HALOT
  rationale: Proper name transliterated per translation philosophy. In context it
    refers to the people/nation represented by the name.
- source_word: וְאַחֲרִיתוֹ
  chosen: but his end
  alternatives:
  - and his latter end
  - yet his future
  lexicon: HALOT
  rationale: אַחֲרִית refers to end, outcome, or latter future. 'His end' is idiomatic
    and fits the contrast with the prior clause.
- source_word: עֲדֵי אֹבֵד
  chosen: is utter destruction
  alternatives:
  - is to perish forever
  - is destruction
  - ends in ruin
  lexicon: HALOT
  rationale: עֲדֵי conveys 'unto/up to,' and אֹבֵד denotes perishing/destruction.
    The phrase is elliptical in Hebrew. 'Is utter destruction' communicates the finality
    and intensity without adding a temporal term like 'forever' that is not explicit
    in the text.
