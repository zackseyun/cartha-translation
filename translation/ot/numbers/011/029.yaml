id: NUM.11.29
reference: Numbers 11:29
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר ל/וֹ֙ מֹשֶׁ֔ה הַֽ/מְקַנֵּ֥א אַתָּ֖ה לִ֑/י וּ/מִ֨י יִתֵּ֜ן כָּל עַ֤ם יְהוָה֙ נְבִיאִ֔ים כִּי יִתֵּ֧ן יְהוָ֛ה אֶת רוּח֖/וֹ עֲלֵי/הֶֽם־־־׃
translation:
  text: But Moses said to him, “Are you jealous for my sake? If only all Yahweh’s people were prophets, that Yahweh would put his Spirit on them!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Would that all the LORD’s people were prophets.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “give his Spirit upon them”; the expression means the LORD would place his Spirit on them for prophetic empowerment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְקַנֵּא
  chosen: are you jealous
  alternatives:
  - are you zealous
  - are you envious
  lexicon: HALOT
  rationale: The participle from קנא here addresses Joshua’s attitude toward Moses. In this context, 'jealous' best captures personal protectiveness or rivalry; 'zealous' is possible but can sound more positive in English than the context suggests.
- source_word: לִי
  chosen: for my sake
  alternatives:
  - for me
  - on my behalf
  lexicon: HALOT
  rationale: The preposition plus first-person suffix expresses concern directed toward Moses’ interest. 'For my sake' is idiomatic and preserves the personal sense better than the more wooden 'for me.'
- source_word: וּמִי יִתֵּן
  chosen: If only
  alternatives:
  - Who will give
  - Would that
  lexicon: HALOT
  rationale: This idiom expresses wish rather than a literal question about giving. 'If only' is natural modern English and accurately conveys the optative force.
- source_word: כָּל עַם יְהוָה
  chosen: all the LORD’s people
  alternatives:
  - all the people of the LORD
  - all the LORD's folk
  lexicon: HALOT
  rationale: Construct chain meaning 'the entire people belonging to the LORD.' 'All the LORD’s people' is clear, natural, and preserves covenantal possession.
- source_word: נְבִיאִים
  chosen: prophets
  alternatives:
  - those who prophesy
  lexicon: HALOT
  rationale: The noun straightforwardly denotes prophets. The more literal nominal rendering is preferable to a paraphrastic verbal expression.
- source_word: כִּי יִתֵּן יְהוָה אֶת רוּחוֹ עֲלֵיהֶם
  chosen: that the LORD would put his Spirit on them
  alternatives:
  - when the LORD puts his Spirit on them
  - because the LORD puts his Spirit on them
  - for the LORD would give his Spirit to them
  lexicon: HALOT
  rationale: Here כִּי introduces the content/result of Moses’ wish. 'That the LORD would put his Spirit on them' best reflects the optative sense carried forward from 'If only.' 'Put ... on them' preserves the Hebrew imagery of the Spirit coming upon persons.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רוּחוֹ
  chosen: his Spirit
  alternatives:
  - his spirit
  - his wind
  - his breath
  lexicon: HALOT
  rationale: In this context of prophetic empowerment, רוּחַ refers to God's Spirit rather than breath or wind. Capitalizing 'Spirit' appropriately signals the referent in English without adding content beyond the context.
