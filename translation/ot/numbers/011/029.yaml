theological_decisions:
- issue: Rendering רוּחוֹ in a prophetic-empowerment context
  chosen_reading: his Spirit
  alternative_readings:
  - his spirit
  rationale: The immediate context concerns prophetic activity bestowed by God, so 'Spirit' best conveys divine empowering presence. Lowercase 'spirit' is lexically possible but less clear in English and may underrepresent the theological force of the passage.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; readable modern English'
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
