id: NUM.11.13
reference: Numbers 11:13
source:
  edition: WLC
  text: מֵ/אַ֤יִן לִ/י֙ בָּשָׂ֔ר לָ/תֵ֖ת לְ/כָל הָ/עָ֣ם הַ/זֶּ֑ה כִּֽי יִבְכּ֤וּ עָלַ/י֙
    לֵ/אמֹ֔ר תְּנָ/ה לָּ֥/נוּ בָשָׂ֖ר וְ/נֹאכֵֽלָה־־־׃
translation:
  text: Where am I to get meat to give to all this people? For they are weeping before
    me, saying, ‘Give us meat, so that we may eat.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they are weeping to me' or 'they are pressing me with their weeping.'
      The Hebrew idiom literally says 'they weep upon me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאַיִן
  chosen: Where am I to get
  alternatives:
  - From where do I have
  - Where can I get
  lexicon: HALOT
  rationale: The interrogative with prefixed מ expresses source/origin, idiomatically
    asking where the speaker could obtain something. English 'Where am I to get' captures
    both the source sense and Moses' exasperation more naturally than a wooden 'from
    where do I have.'
- source_word: לִי
  chosen: am I
  alternatives:
  - for me
  - do I have
  lexicon: HALOT
  rationale: The dative pronoun is absorbed idiomatically into the English clause.
    A literal 'for me' is awkward here; the sense is personal inability or lack of
    access.
- source_word: בָּשָׂר
  chosen: meat
  alternatives:
  - flesh
  lexicon: HALOT
  rationale: In this provisioning context, בשר refers to animal food for eating, so
    'meat' is the natural English equivalent. 'Flesh' would sound overly literal and
    unnatural here.
- source_word: לָתֵת
  chosen: to give
  alternatives:
  - for giving
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result after the question of obtaining
    meat. 'To give' is straightforward and preserves the syntax.
- source_word: לְכָל הָעָם הַזֶּה
  chosen: to all this people
  alternatives:
  - to all these people
  - to all this nation
  lexicon: HALOT
  rationale: עם is singular collective. 'All this people' preserves the collective
    singular force better than 'all these people,' while remaining intelligible in
    English.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כי introduces the reason for Moses' complaint. 'For' fits the discourse
    flow and keeps the connection concise.
- source_word: יִבְכּוּ עָלַי
  chosen: they are weeping before me
  alternatives:
  - they are weeping on me
  - they are crying to me
  - they are weeping against me
  lexicon: HALOT
  rationale: The idiom with על can indicate directed pressure upon Moses. 'Before
    me' captures their crying in his presence and appeal to him without overreading
    hostility. It also avoids the awkwardly literal 'on me.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and saying
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive, introducing the content
    of their plea.
- source_word: תְּנָה לָּנוּ
  chosen: Give us
  alternatives:
  - Give to us
  lexicon: HALOT
  rationale: The imperative plus pronominal suffix is naturally rendered 'Give us'
    in English.
- source_word: וְנֹאכֵלָה
  chosen: so that we may eat
  alternatives:
  - that we may eat
  - and let us eat
  - and we will eat
  lexicon: HALOT
  rationale: The cohortative expresses desired result/purpose following the request.
    'So that we may eat' best conveys the volitional nuance in natural English.
