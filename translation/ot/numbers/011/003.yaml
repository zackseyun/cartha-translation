id: NUM.11.3
reference: Numbers 11:3
source:
  edition: WLC
  text: וַ/יִּקְרָ֛א שֵֽׁם הַ/מָּק֥וֹם הַ/ה֖וּא תַּבְעֵרָ֑ה כִּֽי בָעֲרָ֥ה בָ֖/ם אֵ֥שׁ
    יְהוָֽה־־׃
translation:
  text: So he called the name of that place Taberah, because the fire of the LORD
    burned among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Taberah sounds like 'burning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: he called
  alternatives:
  - he named
  lexicon: HALOT
  rationale: The verb קרא with 'name' as object commonly means to name or call. 'He
    called' preserves the Hebrew idiom, while the following phrase makes the naming
    sense clear.
- source_word: שֵׁם הַמָּקוֹם הַהוּא
  chosen: the name of that place
  alternatives:
  - that place
  - the place's name
  lexicon: HALOT
  rationale: This keeps the Hebrew construction explicit rather than compressing it
    to 'that place,' preserving the formal naming formula common in narrative.
- source_word: תַּבְעֵרָה
  chosen: Taberah
  alternatives:
  - Burning
  lexicon: HALOT
  rationale: As a place name, it is transliterated per translation philosophy. Its
    meaning is reflected by the explanatory clause and may be noted in a footnote.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: '''Because'' gives clear modern English causal force without archaic
    tone.'
- source_word: בָעֲרָה
  chosen: burned
  alternatives:
  - blazed
  - kindled
  lexicon: HALOT
  rationale: The verb בער refers to burning. 'Burned' is the most direct and natural
    rendering here and echoes the place name's sense.
- source_word: בָם
  chosen: among them
  alternatives:
  - in them
  lexicon: HALOT
  rationale: In this judgment context, the preposition with pronoun is best rendered
    'among them,' indicating the fire's presence within the camp/community rather
    than an internal burning.
- source_word: אֵשׁ יְהוָה
  chosen: the fire of the LORD
  alternatives:
  - the LORD's fire
  - a fire from the LORD
  lexicon: HALOT
  rationale: The construct phrase is most naturally 'the fire of the LORD.' This preserves
    the Hebrew wording while clearly indicating divine origin. 'the LORD' follows
    the doctrinal default for יְהוָה.
