theological_decisions:
- issue: Potential implication of הֲרֵעֹתָ with God as subject
  chosen_reading: render as 'have you dealt badly with' rather than 'have you done
    evil to'
  alternative_readings:
  - have you done evil to
  - have you harmed
  rationale: The Hebrew verb can be rendered more literally as 'do evil/bad,' but
    in English that wording could suggest moral evil in God rather than Moses' anguished
    perception of harsh treatment. The chosen rendering preserves the complaint while
    avoiding an unnecessarily misleading theological inference not demanded by the
    text.
  doctrine_reference: 'Translation philosophy: preserve source sense without importing
    doctrinal claims the text does not make.'
