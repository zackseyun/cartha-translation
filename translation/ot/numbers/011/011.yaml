id: NUM.11.11
reference: Numbers 11:11
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר מֹשֶׁ֜ה אֶל יְהוָ֗ה לָ/מָ֤ה הֲרֵעֹ֨תָ֙ לְ/עַבְדֶּ֔/ךָ וְ/לָ֛/מָּה
    לֹא מָצָ֥תִי חֵ֖ן בְּ/עֵינֶ֑י/ךָ לָ/שׂ֗וּם אֶת מַשָּׂ֛א כָּל הָ/עָ֥ם הַ/זֶּ֖ה
    עָלָֽ/י־־־־׃
translation:
  text: And Moses said to the LORD, “Why have you dealt badly with your servant? And
    why have I not found favor in your eyes, that you have laid the burden of all
    this people on me?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “have you done evil to your servant?” The Hebrew verb is more literally
      “done bad/evil,” expressing Moses’ complaint.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “found favor in your eyes,” a common idiom for receiving favor from
      someone.
    reason: cultural_note
  - marker: c
    text: Hebrew “all this people,” with “people” singular as a collective noun.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and common English Bible convention.
- source_word: לָמָה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative; concise modern English best matches the lament
    tone.
- source_word: הֲרֵעֹתָ
  chosen: have you dealt badly with
  alternatives:
  - have you done evil to
  - have you afflicted
  - have you harmed
  lexicon: HALOT
  rationale: From רעע in the Hiphil, expressing causing bad/harm. 'Dealt badly with'
    preserves Moses' complaint without implying moral evil in God as strongly as a
    wooden 'done evil to,' which could mislead in English.
- source_word: לְעַבְדֶּךָ
  chosen: your servant
  alternatives:
  - your slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it is a deferential self-designation
    before God rather than emphasizing bonded status; 'servant' is the most natural
    and contextually fitting rendering.
- source_word: מָצָתִי חֵן בְּעֵינֶיךָ
  chosen: have I not found favor in your eyes
  alternatives:
  - have I not found grace in your sight
  - have I failed to find favor with you
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for receiving favor. 'Favor in your eyes'
    keeps the idiom visible while remaining understandable in English.
- source_word: לָשׂוּם
  chosen: that you have laid
  alternatives:
  - to place
  - to put
  lexicon: HALOT
  rationale: Infinitive with result/purpose nuance after the complaint; in context
    'laid' fits naturally with 'burden' in English.
- source_word: מַשָּׂא
  chosen: the burden
  alternatives:
  - the load
  - the responsibility
  lexicon: HALOT
  rationale: The noun commonly denotes a load or burden. 'Burden' best captures both
    the literal metaphor and Moses' emotional complaint.
- source_word: כָּל הָעָם הַזֶּה
  chosen: all this people
  alternatives:
  - this whole people
  - all these people
  lexicon: HALOT
  rationale: Hebrew uses singular 'people' with collective force. 'All this people'
    is slightly formal but preserves the singular collective better than 'all these
    people.'
- source_word: עָלַי
  chosen: on me
  alternatives:
  - upon me
  lexicon: HALOT
  rationale: Simple prepositional phrase; 'on me' is idiomatic modern English and
    suits the burden metaphor.
- source_word: וַיֹּאמֶר מֹשֶׁה אֶל יְהוָה
  chosen: And Moses said to the LORD
  alternatives:
  - Then Moses said to the LORD
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol sequence; 'And' preserves Hebrew narrative
    flow without overinterpreting temporal nuance.
