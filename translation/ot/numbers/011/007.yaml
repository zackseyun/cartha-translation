id: NUM.11.7
reference: Numbers 11:7
source:
  edition: WLC
  text: וְ/הַ/מָּ֕ן כִּ/זְרַע גַּ֖ד ה֑וּא וְ/עֵינ֖/וֹ כְּ/עֵ֥ין הַ/בְּדֹֽלַח־׃
translation:
  text: Now the manna was like coriander seed, and its appearance was like the appearance
    of bdellium.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bdellium is a fragrant resin or gum; the exact identification of the Hebrew
      term is uncertain, and some understand it as a gemstone-like substance such
      as pearl or crystal.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמָּן
  chosen: the manna
  alternatives:
  - manna
  lexicon: HALOT
  rationale: 'Definite noun referring to the known wilderness food. English keeps
    the article naturally here: ''the manna.'''
- source_word: כִּזְרַע גַּד
  chosen: like coriander seed
  alternatives:
  - like the seed of coriander
  - like gad seed
  lexicon: HALOT
  rationale: The comparison marker כִּ introduces likeness. גַּד is commonly identified
    as coriander; rendering the plant name rather than transliterating aids readability
    while preserving the concrete comparison.
- source_word: וְעֵינוֹ
  chosen: and its appearance
  alternatives:
  - and its eye
  - and its look
  lexicon: HALOT
  rationale: עַיִן literally means 'eye,' but in this idiom it refers to visible appearance
    or look. 'Its appearance' best conveys the Hebrew sense in natural English.
- source_word: כְּעֵין
  chosen: was like the appearance of
  alternatives:
  - was like
  - was like the look of
  lexicon: HALOT
  rationale: The repeated עַיִן idiom intensifies the visual comparison. Rendering
    both instances with 'appearance' preserves the Hebrew parallelism more clearly
    than collapsing the phrase to a simple 'like.'
- source_word: הַבְּדֹלַח
  chosen: bdellium
  alternatives:
  - gum resin
  - pearls
  - crystal
  lexicon: HALOT
  rationale: The precise referent is uncertain, but 'bdellium' is the longstanding
    and most direct lexical equivalent for בְּדֹלַח. Because modern readers may not
    know the term and some dispute the identification, the uncertainty is preserved
    in a footnote rather than replaced with an interpretive substitute.
