id: NUM.11.21
reference: Numbers 11:21
source:
  edition: WLC
  text: וַ/יֹּאמֶר֮ מֹשֶׁה֒ שֵׁשׁ מֵא֥וֹת אֶ֨לֶף֙ רַגְלִ֔י הָ/עָ֕ם אֲשֶׁ֥ר אָנֹכִ֖י
    בְּ/קִרְבּ֑/וֹ וְ/אַתָּ֣ה אָמַ֗רְתָּ בָּשָׂר֙ אֶתֵּ֣ן לָ/הֶ֔ם וְ/אָכְל֖וּ חֹ֥דֶשׁ
    יָמִֽים־׃
translation:
  text: But Moses said, “The people in whose midst I am are six hundred thousand on
    foot, and yet you have said, ‘I will give them meat, and they will eat for a month
    of days.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'a month of days,' an idiom meaning a full month.
    reason: lexical_alternative
  - marker: b
    text: Or 'six hundred thousand men on foot.' The Hebrew expression can denote
      those counted as foot-travelers or foot soldiers.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But Moses said
  alternatives:
  - And Moses said
  - Then Moses said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' fits the discourse
    context because Moses is responding with objection to the preceding divine statement,
    making the adversative nuance clearer in English than a simple 'and.'
- source_word: שֵׁשׁ מֵאוֹת אֶלֶף
  chosen: six hundred thousand
  lexicon: HALOT
  rationale: This is the straightforward cardinal number construction and should be
    rendered directly without paraphrase.
- source_word: רַגְלִי הָעָם
  chosen: the people ... are six hundred thousand on foot
  alternatives:
  - six hundred thousand footmen
  - six hundred thousand men on foot
  lexicon: HALOT
  rationale: רַגְלִי literally relates to 'foot' and idiomatically denotes those on
    foot. Because הָעָם is the explicit subject, 'the people ... on foot' preserves
    the Hebrew sense while avoiding over-specifying 'men' where the syntax foregrounds
    the people as a whole. 'Footmen' is possible but sounds more military and less
    natural here.
- source_word: אֲשֶׁר אָנֹכִי בְּקִרְבּוֹ
  chosen: in whose midst I am
  alternatives:
  - among whom I am
  - with whom I am
  lexicon: HALOT
  rationale: בְּקֶרֶב with pronominal suffix means 'in the midst of/among.' 'In whose
    midst I am' closely reflects the Hebrew while remaining intelligible. It also
    preserves Moses' emphasis on his present location among the people.
- source_word: וְאַתָּה אָמַרְתָּ
  chosen: and yet you have said
  alternatives:
  - and you said
  - but you said
  lexicon: HALOT
  rationale: The pronoun אַתָּה is explicit and contrastive. 'And yet you have said'
    brings out Moses' incredulous contrast with the large number just mentioned. The
    English present perfect captures the force of a statement just made with continuing
    relevance.
- source_word: בָּשָׂר
  chosen: meat
  alternatives:
  - flesh
  lexicon: HALOT
  rationale: In this context the word refers to edible animal flesh as food. 'Meat'
    is the natural modern English equivalent; 'flesh' would sound overly literal and
    less idiomatic.
- source_word: אֶתֵּן לָהֶם
  chosen: I will give them
  alternatives:
  - I shall give them
  lexicon: HALOT
  rationale: Simple first-person singular imperfect expressing future intention/promise
    in direct speech.
- source_word: וְאָכְלוּ
  chosen: and they will eat
  alternatives:
  - so that they may eat
  lexicon: HALOT
  rationale: The verb is best taken as a simple future coordinated with 'I will give.'
    It states the result promised, not merely purpose.
- source_word: חֹדֶשׁ יָמִים
  chosen: for a month of days
  alternatives:
  - for a whole month
  - for a month
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'a month of days.' Retaining 'of days'
    preserves the source texture and emphasis without becoming unintelligible. A smoother
    alternative such as 'for a whole month' is possible, but the more literal phrasing
    better reflects the Hebrew here.
