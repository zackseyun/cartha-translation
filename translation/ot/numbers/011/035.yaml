id: NUM.11.35
reference: Numbers 11:35
source:
  edition: WLC
  text: מִ/קִּבְר֧וֹת הַֽתַּאֲוָ֛ה נָסְע֥וּ הָ/עָ֖ם חֲצֵר֑וֹת וַ/יִּהְי֖וּ בַּ/חֲצֵרֽוֹת׃פ
translation:
  text: From Kibroth-hattaavah the people set out for Hazeroth, and they remained
    at Hazeroth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kibroth-hattaavah means 'graves of craving' or 'graves of lust.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/קִּבְר֧וֹת הַֽתַּאֲוָ֛ה
  chosen: From Kibroth-hattaavah
  alternatives:
  - From the graves of craving
  - From the graves of lust
  - From Kibroth of craving
  lexicon: HALOT
  rationale: This is a place name formed from common nouns ('graves' + 'the craving/desire'),
    but in narrative it functions as a proper toponym. Per translation philosophy,
    names are transliterated rather than translated. A footnote preserves the transparent
    meaning of the name.
- source_word: נָסְע֥וּ
  chosen: set out
  alternatives:
  - journeyed
  - departed
  - traveled
  lexicon: HALOT
  rationale: The verb נסע in travel narratives commonly denotes breaking camp and
    moving on. 'Set out' is natural modern English and preserves the departure nuance
    better than the more generic 'traveled.'
- source_word: הָ/עָ֖ם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם here refers to the Israelite community as a collective group. 'The
    people' is the standard, natural rendering in this narrative context.
- source_word: חֲצֵר֑וֹת
  chosen: Hazeroth
  alternatives:
  - Haseroth
  lexicon: HALOT
  rationale: This is a proper place name, so it is transliterated by standard English
    convention.
- source_word: וַ/יִּהְי֖וּ בַּ/חֲצֵרֽוֹת
  chosen: and they remained at Hazeroth
  alternatives:
  - and they were at Hazeroth
  - and they stayed in Hazeroth
  lexicon: HALOT
  rationale: The clause literally reads 'and they were in Hazeroth,' but in itinerary
    context היה + ב often indicates stopping or remaining at a location. 'Remained
    at' communicates the narrative sense in idiomatic English without over-paraphrasing.
