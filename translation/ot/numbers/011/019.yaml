id: NUM.11.19
reference: Numbers 11:19
source:
  edition: WLC
  text: לֹ֣א י֥וֹם אֶחָ֛ד תֹּאכְל֖וּ/ן וְ/לֹ֣א יוֹמָ֑יִם וְ/לֹ֣א חֲמִשָּׁ֣ה יָמִ֗ים
    וְ/לֹא֙ עֲשָׂרָ֣ה יָמִ֔ים וְ/לֹ֖א עֶשְׂרִ֥ים יֽוֹם׀׃
translation:
  text: You will eat not for one day, or two days, or five days, or ten days, or twenty
    days,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'Not one day shall you eat, and not two days, and not
      five days, and not ten days, and not twenty days.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  chosen: not
  alternatives:
  - 'no'
  - neither
  lexicon: HALOT
  rationale: Used repeatedly with the time expressions to negate each duration in
    sequence. In English, the repeated negation is best carried by 'not ... or ...
    or ...' rather than woodenly repeating 'not' before every phrase.
- source_word: יוֹם אֶחָד
  chosen: one day
  alternatives:
  - a single day
  lexicon: HALOT
  rationale: Straightforward cardinal-plus-noun expression. 'One day' preserves the
    counting sequence and matches the Hebrew idiom naturally.
- source_word: תֹּאכְלוּ/ן
  chosen: you will eat
  alternatives:
  - you will be eating
  lexicon: HALOT
  rationale: Qal imperfect 2mp with paragogic/parasitic nun spelling variation; future
    sense fits the divine announcement. Simple future is the most natural English
    rendering.
- source_word: יוֹמָיִם
  chosen: two days
  lexicon: HALOT
  rationale: Dual form explicitly means 'two days'; rendered directly.
- source_word: חֲמִשָּׁה יָמִים
  chosen: five days
  lexicon: HALOT
  rationale: Cardinal number plus plural noun; rendered literally to preserve the
    escalating sequence.
- source_word: עֲשָׂרָה יָמִים
  chosen: ten days
  lexicon: HALOT
  rationale: Literal rendering preserves the rhetorical buildup.
- source_word: עֶשְׂרִים יוֹם
  chosen: twenty days
  lexicon: HALOT
  rationale: Although English normally pluralizes 'days,' the Hebrew singular after
    twenty is idiomatic; translated as standard English 'twenty days.'
- source_word: וְ
  chosen: or
  alternatives:
  - and
  lexicon: HALOT
  rationale: Though waw commonly means 'and,' in this repeated negative series English
    idiom is better expressed with 'or' ('not for one day, or two days...'). This
    preserves the sense of successive excluded durations rather than sounding additive.
