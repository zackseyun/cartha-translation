id: NUM.11.20
reference: Numbers 11:20
source:
  edition: WLC
  text: עַ֣ד חֹ֣דֶשׁ יָמִ֗ים עַ֤ד אֲשֶׁר יֵצֵא֙ מֵֽ/אַפְּ/כֶ֔ם וְ/הָיָ֥ה לָ/כֶ֖ם לְ/זָרָ֑א
    יַ֗עַן כִּֽי מְאַסְתֶּ֤ם אֶת יְהוָה֙ אֲשֶׁ֣ר בְּ/קִרְבְּ/כֶ֔ם וַ/תִּבְכּ֤וּ לְ/פָנָי/ו֙
    לֵ/אמֹ֔ר לָ֥/מָּה זֶּ֖ה יָצָ֥אנוּ מִ/מִּצְרָֽיִם׀־־־׃
translation:
  text: for a whole month, until it comes out of your nostrils and becomes loathsome
    to you, because you have rejected the LORD who is among you and have wept before
    him, saying, ‘Why did we ever come out of Egypt?’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'becomes repulsive to you' / 'becomes a disgust to you.' The Hebrew expression
      conveys strong revulsion.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד חֹדֶשׁ יָמִים
  chosen: for a whole month
  alternatives:
  - until a month of days
  - for a month of days
  lexicon: HALOT
  rationale: The idiom literally reads 'until a month of days,' meaning the duration
    of a full month. 'For a whole month' is natural English and preserves the emphatic
    sense of duration.
- source_word: יֵצֵא מֵאַפְּכֶם
  chosen: it comes out of your nostrils
  alternatives:
  - it comes out of your nose
  lexicon: HALOT
  rationale: אַפּ can mean nose/nostril/anger; here the concrete bodily sense is required
    by context. 'Nostrils' preserves the vivid, graphic Hebrew image better than the
    more generic 'nose'.
- source_word: וְהָיָה לָכֶם לְזָרָא
  chosen: and becomes loathsome to you
  alternatives:
  - and becomes repulsive to you
  - and becomes a disgust to you
  lexicon: HALOT
  rationale: זָרָא here denotes something abhorrent or disgusting. 'Loathsome' is
    concise, idiomatic, and preserves the revulsion conveyed by the Hebrew.
- source_word: יַעַן כִּי
  chosen: because
  alternatives:
  - inasmuch as
  - for the reason that
  lexicon: HALOT
  rationale: The phrase introduces the reason for the judgment. 'Because' is the clearest
    modern English equivalent.
- source_word: מְאַסְתֶּם
  chosen: you have rejected
  alternatives:
  - you have despised
  - you have spurned
  lexicon: HALOT
  rationale: The verb means to reject or treat with contempt. 'Rejected' communicates
    covenantal repudiation clearly without overstating emotional nuance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
- source_word: אֲשֶׁר בְּקִרְבְּכֶם
  chosen: who is among you
  alternatives:
  - who is in your midst
  - who is within you
  lexicon: HALOT
  rationale: The phrase refers to the LORD's presence in the community. 'Among you'
    is natural English and avoids the potentially misleading inward-individual sense
    of 'within you.'
- source_word: וַתִּבְכּוּ לְפָנָיו
  chosen: and have wept before him
  alternatives:
  - and cried before him
  - and wept in his presence
  lexicon: HALOT
  rationale: בכה is specifically 'weep/cry.' 'Wept before him' preserves both the
    emotional force and the relational setting of lament in God's presence.
- source_word: לָמָּה זֶּה
  chosen: Why did we ever
  alternatives:
  - Why this—did we
  - Why then did we
  lexicon: HALOT
  rationale: The Hebrew idiom intensifies the complaint. 'Why did we ever' captures
    the exasperated force in idiomatic English.
- source_word: יָצָאנוּ מִמִּצְרָיִם
  chosen: come out of Egypt
  alternatives:
  - leave Egypt
  - go out from Egypt
  lexicon: HALOT
  rationale: The verb יצא is literally 'go/come out.' In English, from the speakers'
    retrospective standpoint, 'come out of Egypt' is idiomatic and preserves the exodus
    wording.
