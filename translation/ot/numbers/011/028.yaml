id: NUM.11.28
reference: Numbers 11:28
source:
  edition: WLC
  text: וַ/יַּ֜עַן יְהוֹשֻׁ֣עַ בִּן נ֗וּן מְשָׁרֵ֥ת מֹשֶׁ֛ה מִ/בְּחֻרָ֖י/ו וַ/יֹּאמַ֑ר
    אֲדֹנִ֥/י מֹשֶׁ֖ה כְּלָאֵֽ/ם־׃
translation:
  text: Then Joshua son of Nun, Moses’ attendant from his young men, answered and
    said, “My lord Moses, restrain them!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “one of his young men,” or possibly “from his chosen men.” The Hebrew
      phrase is compact and somewhat ambiguous.
    reason: lexical_alternative
  - marker: b
    text: Or “forbid them.” The Hebrew verb can mean to restrain, hold back, or prohibit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: Then ... answered
  alternatives:
  - answered
  - responded
  lexicon: HALOT
  rationale: The verb ענה in the wayyiqtol commonly introduces a response in narrative.
    'Answered' is slightly more formal and matches the discourse function; 'Then'
    reflects the narrative waw sequence.
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  chosen: Joshua son of Nun
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: מְשָׁרֵת מֹשֶׁה
  chosen: Moses’ attendant
  alternatives:
  - Moses' servant
  - minister of Moses
  lexicon: HALOT
  rationale: מְשָׁרֵת denotes one who serves in an assisting capacity. 'Attendant'
    is natural modern English and avoids implying slavery where the context is personal
    service and assistance.
- source_word: מִבְּחֻרָיו
  chosen: from his young men
  alternatives:
  - from his chosen men
  - from his youth
  - one of his young men
  lexicon: HALOT
  rationale: The phrase is difficult. The plural form with 3ms suffix most naturally
    means 'from among his young men' or 'from his selected young men.' In context
    it identifies Joshua as belonging to Moses' cadre of younger attendants/assistants.
    'From his young men' preserves the Hebrew form more transparently than smoothing
    to 'one of his young men,' while still being intelligible.
- source_word: אֲדֹנִי מֹשֶׁה
  chosen: My lord Moses
  alternatives:
  - My master Moses
  lexicon: HALOT
  rationale: אֲדֹנִי is a respectful address to a human superior. 'My lord' preserves
    the deferential tone without importing divine connotations, especially since Moses
    is explicitly named.
- source_word: כְּלָאֵם
  chosen: restrain them
  alternatives:
  - forbid them
  - stop them
  - shut them up
  lexicon: HALOT
  rationale: The imperative from כלא can mean restrain, hold back, or forbid. In this
    context Joshua wants Eldad and Medad prevented from prophesying. 'Restrain them'
    captures the force without over-specifying the means; 'forbid them' is a viable
    interpretive alternative preserved in a footnote.
