id: NUM.11.2
reference: Numbers 11:2
source:
  edition: WLC
  text: וַ/יִּצְעַ֥ק הָ/עָ֖ם אֶל מֹשֶׁ֑ה וַ/יִּתְפַּלֵּ֤ל מֹשֶׁה֙ אֶל יְהוָ֔ה וַ/תִּשְׁקַ֖ע הָ/אֵֽשׁ־־׃
translation:
  text: Then the people cried out to Moses, and Moses prayed to Yahweh, and the fire died down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fire subsided' or 'the fire sank down.' The Hebrew verb suggests the fire abated.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְעַק
  chosen: cried out
  alternatives:
  - cried
  - called out
  lexicon: HALOT
  rationale: צעק commonly denotes a cry for help or distress. 'Cried out' captures the urgent appeal in context better than the flatter 'cried.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: עם in this narrative context refers to the Israelite community collectively. 'The people' is the natural and standard English rendering.
- source_word: אֶל מֹשֶׁה
  chosen: to Moses
  alternatives:
  - toward Moses
  lexicon: HALOT
  rationale: אֶל marks direction toward a person; 'to Moses' is idiomatic and precise.
- source_word: וַיִּתְפַּלֵּל
  chosen: prayed
  alternatives:
  - interceded
  lexicon: HALOT
  rationale: The hitpael of פלל often means 'pray.' While intercession is implied by context, 'prayed' is the more direct lexical equivalent and avoids importing more interpretation than necessary.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַתִּשְׁקַע
  chosen: died down
  alternatives:
  - subsided
  - sank down
  - was quenched
  lexicon: HALOT
  rationale: שקע literally conveys sinking or subsiding. With 'the fire' as subject, 'died down' gives clear modern English while preserving the sense that the fire abated rather than necessarily being instantaneously extinguished.
- source_word: הָאֵשׁ
  chosen: the fire
  lexicon: HALOT
  rationale: אשׁ is straightforwardly 'fire'; here it refers to the divine fire mentioned in the immediate context.
