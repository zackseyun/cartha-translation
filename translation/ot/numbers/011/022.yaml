id: NUM.11.22
reference: Numbers 11:22
source:
  edition: WLC
  text: הֲ/צֹ֧אן וּ/בָקָ֛ר יִשָּׁחֵ֥ט לָ/הֶ֖ם וּ/מָצָ֣א לָ/הֶ֑ם אִ֣ם אֶֽת כָּל דְּגֵ֥י
    הַ/יָּ֛ם יֵאָסֵ֥ף לָ/הֶ֖ם וּ/מָצָ֥א לָ/הֶֽם־־׃פ
translation:
  text: Would sheep and cattle be slaughtered for them and be enough for them? Or
    if all the fish of the sea were gathered for them, would it be enough for them?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'and be found for them' is an idiom meaning 'and be enough for them'
      or 'and suffice for them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ
  chosen: Would
  alternatives:
  - Shall
  - Could
  lexicon: HALOT
  rationale: Interrogative particle introducing Moses's rhetorical question. 'Would'
    fits natural English for a hypothetical rhetorical challenge better than the more
    archaic 'shall.'
- source_word: צֹאן וּבָקָר
  chosen: sheep and cattle
  alternatives:
  - flocks and herds
  - small livestock and cattle
  lexicon: HALOT
  rationale: The pair denotes small livestock and bovines. 'Sheep and cattle' is clear,
    concrete, and idiomatic in English, preserving the distinction without overtechnical
    wording.
- source_word: יִשָּׁחֵט
  chosen: be slaughtered
  alternatives:
  - be killed
  - be butchered
  lexicon: HALOT
  rationale: Niphal of שׁחט commonly refers to slaughtering animals, especially for
    food or sacrifice. 'Be slaughtered' preserves the specific livestock context better
    than the generic 'be killed.'
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The preposition here expresses provision on behalf of the people. 'For
    them' is the most natural English rendering in this context.
- source_word: וּמָצָא לָהֶם
  chosen: and be enough for them
  alternatives:
  - and suffice for them
  - and be found sufficient for them
  lexicon: HALOT
  rationale: מצא in this idiom means 'be sufficient/adequate' rather than 'be found.'
    Rendering it idiomatically avoids misleading literalism while preserving the sense
    of adequacy.
- source_word: אִם
  chosen: Or if
  alternatives:
  - If
  - Or
  lexicon: HALOT
  rationale: Here אִם introduces the second branch of the rhetorical alternative.
    'Or if' makes the disjunctive force explicit in English.
- source_word: אֵת כָּל דְּגֵי הַיָּם
  chosen: all the fish of the sea
  alternatives:
  - all the sea's fish
  - every fish of the sea
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase. 'Fish of the sea'
    is a natural biblical-English expression and preserves the totalizing 'all.'
- source_word: יֵאָסֵף
  chosen: were gathered
  alternatives:
  - were collected
  - were caught together
  lexicon: HALOT
  rationale: Niphal of אסף means 'be gathered/collected.' 'Were gathered' is broad
    enough to cover the imagined mass provision without adding the more specific idea
    of catching.
- source_word: וּמָצָא לָהֶם
  chosen: would it be enough for them
  alternatives:
  - would it suffice for them
  - would it be sufficient for them
  lexicon: HALOT
  rationale: The repeated idiom is rendered consistently. Adding 'it' is required
    for idiomatic English in the second clause.
