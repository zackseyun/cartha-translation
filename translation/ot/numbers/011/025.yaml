theological_decisions:
- issue: Whether רוּחַ should be rendered as divine 'Spirit' or lower-case 'spirit'
  chosen_reading: divine 'Spirit'
  alternative_readings:
  - '''spirit'''
  rationale: The immediate context describes a transfer of the empowering presence
    that was on Moses to the elders, resulting in prophetic activity. This strongly
    supports reference to God's Spirit rather than a merely human disposition. The
    capitalization is an English interpretive convention, not a claim beyond the text.
- issue: Sense of וְלֹא יָסָפוּ
  chosen_reading: the elders' prophesying did not continue
  alternative_readings:
  - they did not prophesy again
  - they did not cease
  rationale: The clause is syntactically terse and has been understood in more than
    one way in translation history. The most common contextual sense is that they
    prophesied on that occasion only. Because an alternative ancient/traditional understanding
    exists ('they did not cease'), it is preserved in a footnote rather than resolved
    silently.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity and preserve alternatives in footnotes where genuine.
