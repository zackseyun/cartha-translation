id: NUM.11.25
reference: Numbers 11:25
source:
  edition: WLC
  text: וַ/יֵּ֨רֶד יְהוָ֥ה בֶּ/עָנָן֮ וַ/יְדַבֵּ֣ר אֵלָי/ו֒ וַ/יָּ֗אצֶל מִן הָ/ר֨וּחַ֙
    אֲשֶׁ֣ר עָלָ֔י/ו וַ/יִּתֵּ֕ן עַל שִׁבְעִ֥ים אִ֖ישׁ הַ/זְּקֵנִ֑ים וַ/יְהִ֗י כְּ/נ֤וֹחַ
    עֲלֵי/הֶם֙ הָ/ר֔וּחַ וַ/יִּֽתְנַבְּא֖וּ וְ/לֹ֥א יָסָֽפוּ׀־־׃
translation:
  text: Then the LORD came down in the cloud and spoke to him, and he took some of
    the Spirit that was on him and put it on the seventy men, the elders. And when
    the Spirit rested on them, they prophesied, but they did not continue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they did not cease.' The Hebrew expression is terse and has been understood
      in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: וַיֵּרֶד
  chosen: came down
  alternatives:
  - descended
  lexicon: HALOT
  rationale: The verb denotes downward movement. 'Came down' is idiomatic modern English
    and preserves the anthropomorphic theophanic language without over-formal stiffness.
- source_word: בֶּעָנָן
  chosen: in the cloud
  alternatives:
  - in a cloud
  - with the cloud
  lexicon: HALOT
  rationale: With the article, the phrase likely refers to the known theophanic cloud
    associated with the LORD's presence in the wilderness narrative. 'In the cloud'
    preserves that specificity.
- source_word: וַיְדַבֵּר אֵלָיו
  chosen: spoke to him
  alternatives:
  - spoke with him
  lexicon: HALOT
  rationale: Standard rendering of דבר אל. 'To him' is the most natural equivalent
    here, referring to Moses in context.
- source_word: וַיָּאצֶל מִן הָרוּחַ אֲשֶׁר עָלָיו
  chosen: he took some of the Spirit that was on him
  alternatives:
  - he drew from the Spirit that was on him
  - he set apart from the Spirit that was on him
  lexicon: HALOT
  rationale: The rare verb אצל here conveys taking from or drawing off a portion.
    'Took some of' communicates distribution without implying diminution of the Spirit's
    fullness. 'Spirit' is capitalized because the context is God's empowering Spirit
    resting on Moses and then on the elders.
- source_word: רוּחַ
  chosen: Spirit
  alternatives:
  - spirit
  - wind
  lexicon: HALOT
  rationale: In this context the referent is not wind or merely human disposition,
    but the divine empowering Spirit associated with prophetic activity. Capitalization
    signals this interpretive judgment in English.
- source_word: וַיִּתֵּן עַל
  chosen: put it on
  alternatives:
  - gave it to
  - placed it upon
  lexicon: HALOT
  rationale: Although literally 'gave on/upon,' English idiom prefers 'put it on'
    for the transfer of the Spirit onto the elders while preserving the imagery of
    resting upon them.
- source_word: שִׁבְעִים אִישׁ הַזְּקֵנִים
  chosen: the seventy men, the elders
  alternatives:
  - the seventy elders
  - seventy men from the elders
  lexicon: HALOT
  rationale: The Hebrew explicitly includes both 'seventy men' and 'the elders.' Rendering
    both preserves the source's fullness. The appositional comma reflects that these
    men are the elders.
- source_word: כְּנוֹחַ עֲלֵיהֶם הָרוּחַ
  chosen: when the Spirit rested on them
  alternatives:
  - as the Spirit came to rest on them
  - when the Spirit settled on them
  lexicon: HALOT
  rationale: נוח with על conveys resting upon. 'Rested on them' is clear, natural,
    and preserves the imagery of the Spirit's abiding presence.
- source_word: וַיִּתְנַבְּאוּ
  chosen: they prophesied
  alternatives:
  - they spoke as prophets
  - they acted as prophets
  lexicon: HALOT
  rationale: The hitpael of נבא in this context denotes prophetic speech/activity.
    'They prophesied' is the standard and sufficiently transparent rendering.
- source_word: וְלֹא יָסָפוּ
  chosen: they did not continue
  alternatives:
  - they did not do so again
  - they did not add to it
  lexicon: HALOT
  rationale: The phrase is idiomatic and contextually debated. In context it most
    naturally means the prophetic activity did not continue beyond this occasion.
    This avoids the less natural literalism 'they did not add' while preserving the
    likely sense.
