id: NUM.11.4
reference: Numbers 11:4
source:
  edition: WLC
  text: וְ/הָֽ/אסַפְסֻף֙ אֲשֶׁ֣ר בְּ/קִרְבּ֔/וֹ הִתְאַוּ֖וּ תַּאֲוָ֑ה וַ/יָּשֻׁ֣בוּ
    וַ/יִּבְכּ֗וּ גַּ֚ם בְּנֵ֣י יִשְׂרָאֵ֔ל וַ/יֹּ֣אמְר֔וּ מִ֥י יַאֲכִלֵ֖/נוּ בָּשָֽׂר׃
translation:
  text: Now the rabble among them craved a craving, and the sons of Israel also turned
    back and wept, and said, “Who will feed us meat?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the mixed multitude.” The Hebrew term is rare and pejorative, referring
      to a non-core crowd within Israel.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “craved a craving,” an emphatic cognate expression for intense desire.
    reason: lexical_alternative
  - marker: c
    text: Or “the Israelites also.” Hebrew “the sons of Israel.”
    reason: lexical_alternative
  - marker: d
    text: Or “Who will give us meat to eat?”
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאסַפְסֻף
  chosen: the rabble
  alternatives:
  - the mixed multitude
  - the riffraff
  - the gathered crowd
  lexicon: HALOT
  rationale: אָסַפְסֻף is a rare pejorative collective noun for the non-core, disorderly
    crowd among Israel. 'The rabble' captures both the collective sense and the negative
    connotation better than the more traditional but less transparent 'mixed multitude.'
- source_word: אֲשֶׁר בְּקִרְבּוֹ
  chosen: among them
  alternatives:
  - in its midst
  - who were in their midst
  lexicon: HALOT
  rationale: The phrase literally means 'who was in its/their midst.' In context it
    refers to the rabble located within the Israelite camp. 'Among them' is natural
    English and preserves the relational sense without awkward singular/plural tension.
- source_word: הִתְאַוּוּ תַּאֲוָה
  chosen: craved a craving
  alternatives:
  - had greedy desires
  - lusted greatly
  - fell to craving
  lexicon: HALOT
  rationale: The verb plus cognate noun intensifies the action. 'Craved a craving'
    preserves the Hebrew cognate construction and rhetorical force more transparently
    than smoothing it to a single verb. Though slightly marked in English, it remains
    understandable and auditable.
- source_word: וַיָּשֻׁבוּ
  chosen: turned back
  alternatives:
  - again
  - returned
  lexicon: HALOT
  rationale: שׁוּב here likely has the idiomatic sense of resuming or turning again
    to an action, introducing the renewed weeping of Israel. 'Turned back' preserves
    the verbal imagery while allowing the reader to infer renewed action.
- source_word: וַיִּבְכּוּ
  chosen: wept
  alternatives:
  - began to weep
  - cried
  lexicon: HALOT
  rationale: A straightforward rendering of בכה. 'Wept' is slightly weightier and
    more literary than 'cried' while remaining clear.
- source_word: גַּם בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel also
  alternatives:
  - the Israelites also
  - even the sons of Israel
  lexicon: HALOT
  rationale: Per gender-accurate policy, בְּנֵי is rendered 'sons' where the source
    uses the filial expression as an ethnic designation. This preserves the Hebrew
    form; 'Israelites' is a smoother alternative but less formally transparent.
- source_word: מִי יַאֲכִלֵנוּ בָּשָׂר
  chosen: Who will feed us meat?
  alternatives:
  - Who will give us meat to eat?
  - Who will make us eat flesh?
  lexicon: HALOT
  rationale: The Hiphil of אכל means 'cause to eat, feed.' 'Feed us meat' is concise
    and natural. בָּשָׂר here refers to meat as food, not 'flesh' in a more literal
    or theological sense.
