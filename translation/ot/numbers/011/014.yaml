id: NUM.11.14
reference: Numbers 11:14
source:
  edition: WLC
  text: לֹֽא אוּכַ֤ל אָנֹכִי֙ לְ/בַדִּ֔/י לָ/שֵׂ֖את אֶת כָּל הָ/עָ֣ם הַ/זֶּ֑ה כִּ֥י
    כָבֵ֖ד מִמֶּֽ/נִּי־־־׃
translation:
  text: I am not able, I alone, to carry all this people, because it is too heavy
    for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to bear all this people by myself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּכַל
  chosen: am not able
  alternatives:
  - cannot
  lexicon: HALOT
  rationale: From יכל, expressing ability/inability. 'Am not able' is slightly more
    formal and closely reflects the verbal idea without adding emphasis beyond the
    Hebrew negation.
- source_word: אָנֹכִי
  chosen: I
  alternatives:
  - I myself
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis to the 1cs verb. English can reflect
    this emphasis through word order ('I alone') rather than an awkward doubled 'I'.
- source_word: לְבַדִּי
  chosen: I alone
  alternatives:
  - by myself
  - alone
  lexicon: HALOT
  rationale: Means 'by myself/alone.' Combined with the emphatic pronoun, 'I alone'
    preserves Moses' stress that he cannot bear the burden single-handedly.
- source_word: לָשֵׂאת
  chosen: to carry
  alternatives:
  - to bear
  - to lift
  lexicon: HALOT
  rationale: נשא here is idiomatic for bearing a burden or responsibility. 'Carry'
    is natural modern English and fits the burden metaphor in context; 'bear' is possible
    but slightly less accessible.
- source_word: כָּל הָעָם הַזֶּה
  chosen: all this people
  alternatives:
  - all these people
  - all this nation
  lexicon: HALOT
  rationale: The Hebrew is singular ('this people'), a common collective noun. 'All
    this people' preserves the source grammar and rhetorical force better than smoothing
    to plural.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for Moses' inability. 'Because' is clearer in contemporary
    English than 'for' while preserving the causal sense.
- source_word: כָבֵד מִמֶּנִּי
  chosen: it is too heavy for me
  alternatives:
  - it is heavier than I can bear
  - it is heavy for me
  lexicon: HALOT
  rationale: כבד denotes heaviness/burdensomeness. English idiom naturally supplies
    the implied subject from the preceding clause ('it'), and 'too heavy for me' captures
    the sense of an excessive burden without over-paraphrasing.
