id: NUM.11.34
reference: Numbers 11:34
source:
  edition: WLC
  text: וַ/יִּקְרָ֛א אֶת שֵֽׁם הַ/מָּק֥וֹם הַ/ה֖וּא קִבְר֣וֹת הַֽתַּאֲוָ֑ה כִּי שָׁם֙
    קָֽבְר֔וּ אֶת הָ/עָ֖ם הַ/מִּתְאַוִּֽים־־־־׃
translation:
  text: So he called the name of that place Kibroth-hattaavah, because there they
    buried the people who had craved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kibroth-hattaavah likely means “Graves of Craving” or “Graves of Greedy
      Desire.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: So he called
  alternatives:
  - And he called
  - He named
  lexicon: HALOT
  rationale: Wayyiqtol of קרא introduces the next event in sequence. 'So he called'
    preserves the narrative flow in natural English; 'named' is possible but the Hebrew
    idiom explicitly says 'called the name.'
- source_word: אֶת שֵׁם הַמָּקוֹם הַהוּא
  chosen: the name of that place
  alternatives:
  - that place
  - the place's name
  lexicon: HALOT
  rationale: Retains the Hebrew naming formula rather than compressing it away. 'That
    place' reflects הַהוּא demonstratively.
- source_word: קִבְרוֹת הַתַּאֲוָה
  chosen: Kibroth-hattaavah
  alternatives:
  - Graves of Craving
  - Graves of Lust
  - Kibroth Hattaavah
  lexicon: HALOT
  rationale: Place names are transliterated by project policy. The compound likely
    means 'graves of craving/desire'; that sense is preserved in a footnote rather
    than replacing the name in the main text.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the place name. 'Because' is clearer in modern
    English than the more formal 'for.'
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Straightforward locative adverb; 'there' is the natural equivalent.
- source_word: קָבְרוּ
  chosen: they buried
  alternatives:
  - they buried there
  - they interred
  lexicon: HALOT
  rationale: Simple qal perfect plural from קבר. 'Buried' is the plain, idiomatic
    English rendering.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the ones
  - the crowd
  lexicon: HALOT
  rationale: עם here refers to the group of Israelites who were judged, not humanity
    in general. 'The people' is the standard contextual rendering.
- source_word: הַמִּתְאַוִּים
  chosen: who had craved
  alternatives:
  - who had lusted
  - who had desired
  - the craving ones
  lexicon: HALOT
  rationale: Participle of אוה/התאוה denotes those who gave themselves to craving.
    'Who had craved' is idiomatic and fits the retrospective explanation of the place
    name. 'Lusted' is possible but can sound overly sexual in English, which is too
    narrow for the context of greedy desire for meat.
