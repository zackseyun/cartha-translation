id: NUM.11.31
reference: Numbers 11:31
source:
  edition: WLC
  text: וְ/ר֜וּחַ נָסַ֣ע מֵ/אֵ֣ת יְהוָ֗ה וַ/יָּ֣גָז שַׂלְוִים֮ מִן הַ/יָּם֒ וַ/יִּטֹּ֨שׁ עַל הַֽ/מַּחֲנֶ֜ה כְּ/דֶ֧רֶךְ י֣וֹם כֹּ֗ה וּ/כְ/דֶ֤רֶךְ יוֹם֙ כֹּ֔ה סְבִיב֖וֹת הַֽ/מַּחֲנֶ֑ה וּ/כְ/אַמָּתַ֖יִם עַל פְּנֵ֥י הָ/אָֽרֶץ׀־־־׃
translation:
  text: Then a wind went out from Yahweh and drove quail in from the sea, and let them fall beside the camp, about a day’s journey on this side and a day’s journey on that side, all around the camp, and about two cubits above the surface of the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spirit went out from the LORD'; here the context strongly favors 'wind' because it carries the quail from the sea.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'about two cubits above the face of the ground.' The clause may describe the height at which the quail were spread or flew, rather than their depth on the ground.
    reason: alternative_reading
lexical_decisions:
- source_word: וְר֜וּחַ
  chosen: a wind
  alternatives:
  - a רוח/spirit
  lexicon: HALOT
  rationale: רוּחַ can mean 'wind,' 'breath,' or 'spirit.' In this context it is something that comes from the LORD and transports quail from the sea, so 'wind' best fits the physical action.
- source_word: נָסַע מֵאֵת יְהוָה
  chosen: went out from the LORD
  alternatives:
  - set out from the LORD
  - came forth from the LORD
  lexicon: HALOT
  rationale: נָסַע commonly means 'set out/journeyed,' but with רוּחַ and מֵאֵת it conveys movement originating from the LORD. 'Went out from the LORD' is natural English and preserves divine source without overinterpreting mechanism.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיָּגָז שַׂלְוִים
  chosen: drove quail in
  alternatives:
  - cut off quail
  - swept in quail
  - brought quail
  lexicon: HALOT
  rationale: The verb גוז here is rare and contextually refers to the wind's effect in bringing quail from the sea. 'Drove quail in' captures the force of the wind better than the flatter 'brought,' while avoiding an overly literal but obscure rendering.
- source_word: מִן הַיָּם
  chosen: from the sea
  alternatives:
  - from the west/sea region
  lexicon: HALOT
  rationale: The plain sense is geographic origin from the sea. No contextual reason requires a directional paraphrase.
- source_word: וַיִּטֹּשׁ עַל הַמַּחֲנֶה
  chosen: and let them fall beside the camp
  alternatives:
  - and spread them over the camp
  - and cast them upon the camp
  - and left them by the camp
  lexicon: HALOT
  rationale: The verb נטשׁ can mean 'stretch out,' 'leave,' or 'cast/throw.' Given the following measurements around the camp and the practical sense of quail being deposited for gathering, 'let them fall beside the camp' communicates the result clearly. 'Beside' avoids implying the birds fell directly on top of the camp structures.
- source_word: כְּדֶרֶךְ יוֹם כֹּה וּכְדֶרֶךְ יוֹם כֹּה
  chosen: about a day’s journey on this side and a day’s journey on that side
  alternatives:
  - about a day's journey here and a day's journey there
  - about a day's journey in every direction
  lexicon: HALOT
  rationale: The idiom marks extent from the camp in two directions. This rendering preserves the repetitive Hebrew structure while making the spatial sense intelligible in English.
- source_word: סְבִיבוֹת הַמַּחֲנֶה
  chosen: all around the camp
  alternatives:
  - around the camp
  lexicon: HALOT
  rationale: This phrase summarizes the distribution. 'All around' reflects the plural form and the comprehensive sense.
- source_word: וּכְאַמָּתַיִם
  chosen: about two cubits
  alternatives:
  - about three feet
  lexicon: HALOT
  rationale: Keeping the ancient measure is more formally transparent; a modern equivalent can be inferred or footnoted if needed. 'About' reflects the prefixed כ comparative/approximate force.
- source_word: עַל פְּנֵי הָאָרֶץ
  chosen: above the surface of the ground
  alternatives:
  - over the face of the earth/ground
  - on the surface of the ground
  lexicon: HALOT
  rationale: The phrase is literally 'upon the face of the ground.' Because the clause with 'two cubits' most naturally describes height/depth relative to the ground, 'above the surface of the ground' gives the most coherent English sense while staying close to the Hebrew imagery.
