id: NUM.11.6
reference: Numbers 11:6
source:
  edition: WLC
  text: וְ/עַתָּ֛ה נַפְשֵׁ֥/נוּ יְבֵשָׁ֖ה אֵ֣ין כֹּ֑ל בִּלְתִּ֖י אֶל הַ/מָּ֥ן עֵינֵֽי/נוּ־׃
translation:
  text: But now our appetite is dried up; there is nothing at all except this manna
    before our eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our soul is dried up'; Hebrew נֶפֶשׁ (nephesh) can mean 'soul,' 'life,'
      or, in food-related contexts, 'appetite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: But now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: The conjunction plus temporal adverb marks a contrast with prior circumstances
    and complaint context. 'But now' best captures the adversative force in natural
    English.
- source_word: נַפְשֵׁנוּ
  chosen: our appetite
  alternatives:
  - our soul
  - our life
  - we ourselves
  lexicon: HALOT
  rationale: Although נֶפֶשׁ often literally means 'soul' or 'life,' in contexts of
    hunger, thirst, and desire it commonly refers to appetite or inner craving. Here
    the complaint concerns food, so 'our appetite' conveys the idiomatic sense better
    than the misleadingly anthropological 'our soul'.
- source_word: יְבֵשָׁה
  chosen: is dried up
  alternatives:
  - is dry
  - has dried up
  lexicon: HALOT
  rationale: The adjective describes a state of withering/dryness. 'Is dried up' idiomatically
    expresses their depleted condition in English and fits the complaint about lack
    of satisfying food.
- source_word: אֵין כֹּל
  chosen: there is nothing at all
  alternatives:
  - there is nothing
  - there is nothing whatever
  lexicon: HALOT
  rationale: The negation plus כֹּל intensifies the complaint. 'Nothing at all' preserves
    the emphatic force.
- source_word: בִּלְתִּי אֶל
  chosen: except
  alternatives:
  - besides
  - nothing but
  lexicon: HALOT
  rationale: 'The construction expresses exclusion: nothing exists for them except
    one item. ''Except'' is concise and natural.'
- source_word: הַמָּן
  chosen: this manna
  alternatives:
  - the manna
  - manna
  lexicon: HALOT
  rationale: English often omits the article with 'manna,' but the Hebrew article
    points to the specific, familiar substance. Adding 'this' reflects the dismissive
    tone of the speakers better than a bare noun.
- source_word: עֵינֵינוּ
  chosen: before our eyes
  alternatives:
  - in our sight
  - our eyes are on
  lexicon: HALOT
  rationale: The idiom indicates what is visibly set before them. 'Before our eyes'
    is a natural English equivalent and preserves the concrete imagery of monotonous
    visibility.
