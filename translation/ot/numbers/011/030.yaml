id: NUM.11.30
reference: Numbers 11:30
source:
  edition: WLC
  text: וַ/יֵּאָסֵ֥ף מֹשֶׁ֖ה אֶל הַֽ/מַּחֲנֶ֑ה ה֖וּא וְ/זִקְנֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: Then Moses returned to the camp, he and the elders of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then Moses was gathered back to the camp, he and the elders of Israel.'
      The Hebrew verb can be rendered more literally, but in context it means that
      Moses went back to the camp.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּאָסֵף
  chosen: returned
  alternatives:
  - was gathered
  - withdrew
  - came back
  lexicon: HALOT
  rationale: From אסף in the Niphal with waw-consecutive, the sense here is idiomatic
    movement back into the camp after the preceding event, not passive 'was gathered.'
    'Returned' gives the natural contextual sense in English while staying close to
    the Hebrew.
- source_word: אֶל הַמַּחֲנֶה
  chosen: to the camp
  alternatives:
  - into the camp
  lexicon: HALOT
  rationale: מַחֲנֶה denotes the camp of Israel. 'To the camp' is the most direct
    rendering of אֶל; 'into the camp' is possible but slightly more interpretive.
- source_word: הוּא וְזִקְנֵי יִשְׂרָאֵל
  chosen: he and the elders of Israel
  alternatives:
  - along with the elders of Israel
  lexicon: HALOT
  rationale: The pronoun הוּא is emphatic/appositional, clarifying that Moses returned
    together with the elders. Rendering it explicitly preserves the Hebrew structure
    and emphasis.
- source_word: זִקְנֵי יִשְׂרָאֵל
  chosen: the elders of Israel
  alternatives:
  - Israel's elders
  lexicon: HALOT
  rationale: Standard construct rendering. 'The elders of Israel' is clear, formal
    enough for the narrative setting, and consistent with common biblical usage.
