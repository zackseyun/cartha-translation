theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Per DOCTRINE.md, the default rendering
    is 'the LORD,' not a transliteration, unless context requires otherwise.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered distributive אִישׁ
  chosen_reading: each man
  alternative_readings:
  - each one
  - everyone
  rationale: The Hebrew uses grammatically masculine singular distributively. Per
    translation philosophy, gender-accurate rendering is preferred over flattening
    to a neutral expression unless context clearly demands it.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral'
