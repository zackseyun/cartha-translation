id: NUM.11.10
reference: Numbers 11:10
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֨ע מֹשֶׁ֜ה אֶת הָ/עָ֗ם בֹּכֶה֙ לְ/מִשְׁפְּחֹתָ֔י/ו אִ֖ישׁ לְ/פֶ֣תַח
    אָהֳל֑/וֹ וַ/יִּֽחַר אַ֤ף יְהוָה֙ מְאֹ֔ד וּ/בְ/עֵינֵ֥י מֹשֶׁ֖ה רָֽע־־׃
translation:
  text: Moses heard the people weeping by their clans, each man at the entrance of
    his tent. And the anger of the LORD burned greatly, and it was evil in the eyes
    of Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by their families.' The Hebrew term can denote family groups or clans.
    reason: lexical_alternative
  - marker: b
    text: Or 'it was displeasing to Moses.' Literally, 'it was evil in the eyes of
      Moses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: Qal wayyiqtol of שׁמע here reports perception of the people's crying,
    not an imperative nuance of attentive listening. 'Heard' is the natural English
    equivalent.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עָם commonly denotes the people as a collective body. 'The people' fits
    the wilderness-community context better than the more political 'nation.'
- source_word: בֹּכֶה
  chosen: weeping
  alternatives:
  - crying
  lexicon: HALOT
  rationale: The participle depicts ongoing action. 'Weeping' preserves the lamenting
    tone slightly better than the broader 'crying.'
- source_word: לְמִשְׁפְּחֹתָיו
  chosen: by their clans
  alternatives:
  - according to their families
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה refers to kinship groups or clans. The plural with pronominal
    suffix describes the people arranged in family-group units. 'By their clans' is
    concise and socially precise.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: The distributive singular אִישׁ marks each individual within the group.
    Per the gender-accurate policy, 'each man' better reflects the Hebrew form than
    a neutral paraphrase, while still functioning distributively.
- source_word: לְפֶתַח אָהֳלוֹ
  chosen: at the entrance of his tent
  alternatives:
  - at the doorway of his tent
  - at his tent entrance
  lexicon: HALOT
  rationale: פֶּתַח is an opening or entrance. 'At the entrance of his tent' is idiomatic
    and preserves the spatial image.
- source_word: וַיִּחַר אַף יְהוָה
  chosen: the anger of the LORD burned
  alternatives:
  - the LORD's anger burned
  - the LORD became angry
  lexicon: HALOT
  rationale: The idiom חרה אף literally involves burning anger. Rendering it as 'the
    anger of the LORD burned' preserves the Hebrew metaphor while remaining readable.
    'The LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: HALOT
  rationale: מְאֹד intensifies the clause. 'Greatly' works naturally with 'burned'
    and preserves the strong degree.
- source_word: וּבְעֵינֵי מֹשֶׁה רָע
  chosen: it was evil in the eyes of Moses
  alternatives:
  - it was displeasing to Moses
  - it was bad in Moses' sight
  lexicon: HALOT
  rationale: The Hebrew literally says 'it was evil in the eyes of Moses.' This idiom
    can mean displeasing, but the more literal rendering preserves the evaluative
    force and leaves the object implicit as in Hebrew.
