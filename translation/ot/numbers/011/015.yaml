id: NUM.11.15
reference: Numbers 11:15
source:
  edition: WLC
  text: וְ/אִם כָּ֣כָה אַתְּ עֹ֣שֶׂה לִּ֗/י הָרְגֵ֤/נִי נָא֙ הָרֹ֔ג אִם מָצָ֥אתִי
    חֵ֖ן בְּ/עֵינֶ֑י/ךָ וְ/אַל אֶרְאֶ֖ה בְּ/רָעָתִֽ/י־׀־־־׃פ
translation:
  text: If this is how you are going to deal with me, please kill me at once, if I
    have found favor in your eyes, and do not let me see my misery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not let me see my calamity' or 'my trouble.' The Hebrew can denote
      adversity or disaster, not only moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: If
  alternatives:
  - And if
  lexicon: HALOT
  rationale: Introduces a conditional clause. The prefixed conjunction is naturally
    absorbed into English without requiring 'and' at the start.
- source_word: כָּכָה
  chosen: this is how
  alternatives:
  - thus
  - like this
  lexicon: HALOT
  rationale: Idiomatic English rendering of the adverb in a conditional complaint.
- source_word: אַתְּ ... עֹשֶׂה לִּי
  chosen: you are going to deal with me
  alternatives:
  - you do to me
  - you are doing to me
  - you treat me this way
  lexicon: HALOT
  rationale: עשה with ל plus object here refers to how God is acting toward Moses.
    'Deal with me' conveys the relational force more naturally than a wooden 'do to
    me' while staying close to the source.
- source_word: הָרְגֵנִי נָא הָרֹג
  chosen: please kill me at once
  alternatives:
  - please kill me—yes, kill me
  - please kill me outright
  - surely kill me
  lexicon: HALOT
  rationale: The infinitive absolute with imperative intensifies the request. 'At
    once' captures the emphatic force in natural English; נָא adds the plea 'please'.
- source_word: אִם מָצָאתִי חֵן בְּעֵינֶיךָ
  chosen: if I have found favor in your eyes
  alternatives:
  - if I have found favor in your sight
  - if I have found grace in your eyes
  lexicon: HALOT
  rationale: Standard Hebrew idiom for receiving favorable regard. 'Favor in your
    eyes' preserves the imagery more directly than 'in your sight'; 'grace' is possible
    but 'favor' is the more idiomatic contextual sense.
- source_word: וְאַל אֶרְאֶה
  chosen: and do not let me see
  alternatives:
  - and let me not see
  - so that I may not see
  lexicon: HALOT
  rationale: 'אַל with the cohortative/jussive sense is best rendered as a negative
    plea directed to God: ''do not let me see.'''
- source_word: בְּרָעָתִי
  chosen: my misery
  alternatives:
  - my evil
  - my trouble
  - my calamity
  - my wretchedness
  lexicon: HALOT
  rationale: רָעָה can denote adversity, distress, or calamity, not only moral evil.
    In context Moses asks not to witness his own ruin/distress. 'My misery' communicates
    the experiential sense clearly in modern English.
