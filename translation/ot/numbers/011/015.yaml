theological_decisions:
- issue: Meaning of בְּרָעָתִי in Moses' plea
  chosen_reading: personal misery/distress rather than moral evil
  alternative_readings:
  - my evil
  - the evil that would befall me
  - my calamity
  rationale: The context is Moses' despair under the burden of the people, not a confession
    of personal wickedness. Rendering the noun as experiential distress preserves
    the plain sense without importing a moral-theological claim the text does not
    make.
  doctrine_reference: Translation philosophy §§1, 3, 6
