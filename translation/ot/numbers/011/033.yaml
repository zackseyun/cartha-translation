id: NUM.11.33
reference: Numbers 11:33
source:
  edition: WLC
  text: הַ/בָּשָׂ֗ר עוֹדֶ֨/נּוּ֙ בֵּ֣ין שִׁנֵּי/הֶ֔ם טֶ֖רֶם יִכָּרֵ֑ת וְ/אַ֤ף יְהוָה֙
    חָרָ֣ה בָ/עָ֔ם וַ/יַּ֤ךְ יְהוָה֙ בָּ/עָ֔ם מַכָּ֖ה רַבָּ֥ה מְאֹֽד׃
translation:
  text: While the meat was still between their teeth, before it was consumed, the
    LORD’s anger burned against the people, and the LORD struck the people with a
    very great plague.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'before it was cut off'—that is, before the meat was
      finished or consumed.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבָּשָׂר
  chosen: the meat
  alternatives:
  - the flesh
  lexicon: HALOT
  rationale: In this context of quail being eaten, בָּשָׂר refers to animal flesh
    as food. 'Meat' is the natural modern English rendering; 'flesh' would be more
    literal but less idiomatic here.
- source_word: עוֹדֶנּוּ
  chosen: was still
  alternatives:
  - was yet
  - still was
  lexicon: HALOT
  rationale: The adverb עוֹד with pronominal suffix conveys continuance, 'still/yet.'
    In English it is best absorbed into the clause as 'was still' rather than rendered
    woodenly.
- source_word: בֵּין שִׁנֵּיהֶם
  chosen: between their teeth
  lexicon: HALOT
  rationale: A straightforward idiomatic rendering of the Hebrew phrase, preserving
    the vivid image of the meat not yet swallowed.
- source_word: טֶרֶם
  chosen: before
  alternatives:
  - not yet when
  lexicon: HALOT
  rationale: טֶרֶם introduces an action that had not yet occurred. 'Before' is the
    clearest English equivalent in this construction.
- source_word: יִכָּרֵת
  chosen: it was consumed
  alternatives:
  - it was cut off
  - it was chewed up
  lexicon: HALOT
  rationale: The Niphal of כרת literally means 'be cut off,' but in this eating context
    it refers to the meat being finished/consumed. 'Consumed' communicates the sense
    naturally without over-paraphrasing.
- source_word: וְאַף יְהוָה חָרָה
  chosen: the LORD’s anger burned
  alternatives:
  - the anger of the LORD burned
  - the LORD became angry
  lexicon: HALOT
  rationale: The idiom חרה אף expresses burning anger. Rendering it as 'the LORD’s
    anger burned' preserves the Hebrew metaphor while remaining readable. The divine
    name follows doctrine default as 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - smote
  - hit
  lexicon: HALOT
  rationale: נכה in judgment contexts commonly means 'strike' or 'smite.' 'Struck'
    is clear modern English and preserves the force of divine judgment.
- source_word: מַכָּה
  chosen: plague
  alternatives:
  - blow
  - stroke
  lexicon: HALOT
  rationale: Though literally 'blow/strike,' מַכָּה often denotes a plague or devastating
    affliction sent in judgment. Since the object is the people as a whole, 'plague'
    best captures the event in idiomatic English.
- source_word: רַבָּה מְאֹד
  chosen: a very great
  alternatives:
  - an exceedingly severe
  - very severe
  lexicon: HALOT
  rationale: The adjective plus intensifier expresses exceptional magnitude. 'Very
    great' stays close to the Hebrew wording; combined with 'plague' it yields natural
    English.
