theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's doctrine,
    it is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropopathic expression of divine wrath
  chosen_reading: the LORD’s anger burned against the people
  alternative_readings:
  - the LORD became angry with the people
  rationale: The Hebrew uses the idiom חרה אף, literally involving burning anger.
    Preserving the metaphor reflects the text's portrayal of divine judgment without
    softening it into a flatter abstraction.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
