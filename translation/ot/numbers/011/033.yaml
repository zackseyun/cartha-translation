  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Anthropopathic expression of divine wrath
  chosen_reading: the LORD’s anger burned against the people
  alternative_readings:
  - the LORD became angry with the people
  rationale: The Hebrew uses the idiom חרה אף, literally involving burning anger. Preserving the metaphor reflects the text's portrayal of divine judgment without softening it into a flatter abstraction.
