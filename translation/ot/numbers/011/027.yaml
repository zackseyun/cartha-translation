id: NUM.11.27
reference: Numbers 11:27
source:
  edition: WLC
  text: וַ/יָּ֣רָץ הַ/נַּ֔עַר וַ/יַּגֵּ֥ד לְ/מֹשֶׁ֖ה וַ/יֹּאמַ֑ר אֶלְדָּ֣ד וּ/מֵידָ֔ד
    מִֽתְנַבְּאִ֖ים בַּֽ/מַּחֲנֶֽה׃
translation:
  text: Then a young man ran and told Moses, and said, “Eldad and Medad are prophesying
    in the camp.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the young man ran and reported to Moses.' The Hebrew article on 'young
      man' may be rendered more formally as 'the young man,' and the reporting verb
      can also be translated 'reported' or 'informed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרָץ
  chosen: ran
  alternatives:
  - hurried
  - rushed
  lexicon: HALOT
  rationale: The verb רוץ in the wayyiqtol form straightforwardly denotes running.
    'Ran' is the most natural and direct English equivalent, preserving the narrative
    vividness without overinterpreting urgency.
- source_word: הַנַּעַר
  chosen: a young man
  alternatives:
  - the young man
  - the youth
  - the boy
  lexicon: HALOT
  rationale: נַעַר can mean boy, youth, or young man depending on context. Because
    the individual is unspecified in English discourse and appears as a messenger
    capable of reporting to Moses, 'a young man' best fits readable modern English.
    The Hebrew article can function with a known-but-unnamed participant, which English
    often renders idiomatically with an indefinite expression in narrative introduction.
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported to
  - informed
  lexicon: HALOT
  rationale: נגד in the Hiphil means to tell, report, or declare. 'Told' is concise
    and natural here; the following direct speech supplies the content of the report.
- source_word: לְמֹשֶׁה
  chosen: Moses
  rationale: Proper name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: The common narrative verb אמר introduces the quoted speech. 'And said'
    preserves the Hebrew sequencing and keeps the style readable.
- source_word: אֶלְדָּד וּמֵידָד
  chosen: Eldad and Medad
  rationale: Personal names are transliterated rather than translated.
- source_word: מִתְנַבְּאִים
  chosen: are prophesying
  alternatives:
  - are acting as prophets
  - are speaking prophetically
  lexicon: HALOT
  rationale: The Hitpael participle of נבא denotes prophetic activity. 'Are prophesying'
    is the standard and clearest rendering, preserving the ongoing aspect implied
    by the participle.
- source_word: בַּמַּחֲנֶה
  chosen: in the camp
  alternatives:
  - within the camp
  - at the camp
  lexicon: HALOT
  rationale: מַחֲנֶה refers to the camp of Israel in the wilderness setting. 'In the
    camp' is the plain and idiomatic rendering.
