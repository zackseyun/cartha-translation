id: NUM.11.1
reference: Numbers 11:1
source:
  edition: WLC
  text: וַ/יְהִ֤י הָ/עָם֙ כְּ/מִתְאֹ֣נְנִ֔ים רַ֖ע בְּ/אָזְנֵ֣י יְהוָ֑ה וַ/יִּשְׁמַ֤ע
    יְהוָה֙ וַ/יִּ֣חַר אַפּ֔/וֹ וַ/תִּבְעַר בָּ/ם֙ אֵ֣שׁ יְהוָ֔ה וַ/תֹּ֖אכַל בִּ/קְצֵ֥ה
    הַֽ/מַּחֲנֶֽה־׃
translation:
  text: Now the people became like those who complain of hardship in the hearing of
    the LORD, and the LORD heard it, and his anger burned, and the fire of the LORD
    burned among them and consumed some at the edge of the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as complainers,' 'as those complaining,' or possibly 'as if complaining.'
      The Hebrew form is rare and somewhat difficult.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the ears of the LORD,' an idiom meaning that their complaint
      came to the LORD's attention.
    reason: lexical_alternative
  - marker: c
    text: Or 'a fire from the LORD burned among them.'
    reason: alternative_reading
  - marker: d
    text: Hebrew 'at the edge/outskirts of the camp.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ... became
  alternatives:
  - And it happened
  - And the people were
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the narrative development. Rendering
    with 'Now ... became' gives natural English while preserving the shift into a
    new episode and the inceptive sense before the participial phrase.
- source_word: הָעָם
  chosen: the people
  lexicon: HALOT
  rationale: Standard rendering for עם in this context, referring collectively to
    Israel.
- source_word: כְּמִתְאֹנְנִים
  chosen: like those who complain of hardship
  alternatives:
  - as complainers
  - as those complaining
  - as if complaining
  lexicon: HALOT
  rationale: The form is difficult and comparatively rare. The prefixed כ indicates
    comparison ('like/as'), and the Hitpael participial form conveys ongoing self-expressed
    complaint. 'Like those who complain of hardship' preserves both the comparative
    nuance and the sense of grumbling rather than merely stating a neutral complaint.
- source_word: רַע
  chosen: of hardship
  alternatives:
  - evil
  - wickedly
  - badly
  lexicon: HALOT
  rationale: Here רַע most naturally qualifies the complaint as concerning adversity/misfortune
    rather than moral evil. 'Of hardship' fits the idiom and context better than 'evil,'
    which would sound misleading in English.
- source_word: בְּאָזְנֵי יְהוָה
  chosen: in the hearing of the LORD
  alternatives:
  - in the ears of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: This idiom means that the complaint came to the LORD's attention. 'In
    the hearing of the LORD' is idiomatic English and retains the auditory imagery
    better than the more interpretive 'before the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: וַיִּשְׁמַע יְהוָה
  chosen: and the LORD heard it
  alternatives:
  - and the LORD heard
  - and the LORD listened
  lexicon: HALOT
  rationale: The object is implicit from context; 'it' is supplied in English for
    clarity. 'Heard' preserves the narrative sequence and the link with the prior
    idiom about the LORD's hearing.
- source_word: וַיִּחַר אַפּוֹ
  chosen: and his anger burned
  alternatives:
  - and his nose burned
  - and he became angry
  - and his wrath was kindled
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to the burning of the nose/anger. 'His
    anger burned' is clear modern English that preserves the metaphorical heat imagery
    without wooden literalism.
- source_word: וַתִּבְעַר בָּם אֵשׁ יְהוָה
  chosen: and the fire of the LORD burned among them
  alternatives:
  - and a fire from the LORD burned among them
  - and the LORD's fire blazed against them
  lexicon: HALOT
  rationale: The subject is 'fire of the LORD.' 'Burned among them' reflects the preposition
    and avoids overinterpreting the exact source construction. 'Fire of the LORD'
    preserves the genitive relation and the solemnity of divine judgment.
- source_word: וַתֹּאכַל
  chosen: and consumed
  alternatives:
  - and devoured
  - and ate up
  lexicon: HALOT
  rationale: '''Consumed'' is the natural English equivalent for fire as subject and
    preserves the destructive force.'
- source_word: בִּקְצֵה הַמַּחֲנֶה
  chosen: some at the edge of the camp
  alternatives:
  - at the outskirts of the camp
  - in the extremity of the camp
  - at the end of the camp
  lexicon: HALOT
  rationale: The phrase denotes the outer part of the camp. Because English normally
    expects an object for 'consumed,' 'some' is supplied to make explicit that persons
    or portions there were consumed; the location is rendered 'at the edge of the
    camp' for readability.
