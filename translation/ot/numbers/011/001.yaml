theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Depiction of divine judgment by fire
  chosen_reading: the fire of the LORD burned among them
  alternative_readings:
  - a fire from the LORD burned among them
  rationale: The translation preserves the text's direct attribution of the fire to
    the LORD without softening or expanding the theological claim. The genitive construction
    is left transparent rather than interpreted away.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
