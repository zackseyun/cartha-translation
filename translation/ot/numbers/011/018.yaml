id: NUM.11.18
reference: Numbers 11:18
source:
  edition: WLC
  text: וְ/אֶל הָ/עָ֨ם תֹּאמַ֜ר הִתְקַדְּשׁ֣וּ לְ/מָחָר֮ וַ/אֲכַלְתֶּ֣ם בָּשָׂר֒ כִּ֡י
    בְּכִיתֶם֩ בְּ/אָזְנֵ֨י יְהוָ֜ה לֵ/אמֹ֗ר מִ֤י יַאֲכִלֵ֨/נוּ֙ בָּשָׂ֔ר כִּי ט֥וֹב
    לָ֖/נוּ בְּ/מִצְרָ֑יִם וְ/נָתַ֨ן יְהוָ֥ה לָ/כֶ֛ם בָּשָׂ֖ר וַ/אֲכַלְתֶּֽם־־׃
translation:
  text: And to the people you shall say, ‘Consecrate yourselves for tomorrow, and
    you shall eat meat, because you have wept in the hearing of the LORD, saying,
    “Who will feed us meat? For it was good for us in Egypt.” Therefore the LORD will
    give you meat, and you shall eat.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Sanctify yourselves for tomorrow.' The Hebrew verb carries the sense
      of setting yourselves apart in preparation for the LORD's action.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֹּאמַר
  chosen: you shall say
  alternatives:
  - say
  lexicon: HALOT
  rationale: Imperfect 2ms addressed to Moses with directive force; 'you shall say'
    preserves the formal command structure without sounding overly wooden.
- source_word: הִתְקַדְּשׁוּ
  chosen: Consecrate yourselves
  alternatives:
  - Sanctify yourselves
  - Prepare yourselves
  lexicon: HALOT
  rationale: Hitpael imperative of קדשׁ denotes setting oneself apart in preparation
    for divine action. 'Consecrate yourselves' preserves the cultic/religious force
    better than the flatter 'prepare yourselves.'
- source_word: לְמָחָר
  chosen: for tomorrow
  alternatives:
  - by tomorrow
  - tomorrow
  lexicon: HALOT
  rationale: The preposition marks preparation with reference to the coming day; 'for
    tomorrow' fits the imperative naturally in English.
- source_word: וַאֲכַלְתֶּם בָּשָׂר
  chosen: and you shall eat meat
  alternatives:
  - and you will eat flesh
  lexicon: HALOT
  rationale: בָּשָׂר here refers to edible meat, not 'flesh' in a more literal anatomical
    sense. The wayyiqtol after the imperative carries future/result force in context.
- source_word: בְּכִיתֶם
  chosen: you have wept
  alternatives:
  - you wept
  lexicon: HALOT
  rationale: The qatal points to prior action explaining the coming judgment/provision.
    Present perfect in English captures the relevance of their prior complaint.
- source_word: בְּאָזְנֵי יְהוָה
  chosen: in the hearing of the LORD
  alternatives:
  - in the ears of the LORD
  - before the LORD
  lexicon: HALOT
  rationale: Idiomatic expression meaning that the LORD heard them. 'In the hearing
    of' preserves the Hebrew image while remaining natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD' rather
    than transliterated forms.
- source_word: מִי יַאֲכִלֵנוּ בָּשָׂר
  chosen: Who will feed us meat?
  alternatives:
  - Who will give us meat to eat?
  - Who will make us eat meat?
  lexicon: HALOT
  rationale: Hiphil of אכל is causative, 'cause to eat/feed.' 'Feed us meat' is concise
    and idiomatic, preserving the causative sense.
- source_word: כִּי טוֹב לָנוּ בְּמִצְרָיִם
  chosen: For it was good for us in Egypt
  alternatives:
  - For we were better off in Egypt
  - For it was better for us in Egypt
  lexicon: HALOT
  rationale: The clause recalls the people's complaint without over-interpreting it.
    'It was good for us' stays close to the Hebrew; 'better off' would import a comparative
    not explicit in the text.
- source_word: וְנָתַן יְהוָה לָכֶם בָּשָׂר
  chosen: Therefore the LORD will give you meat
  alternatives:
  - And the LORD will give you meat
  lexicon: HALOT
  rationale: The conjunction links their complaint to the LORD's response. 'Therefore'
    makes the causal progression explicit in natural English, while still reflecting
    the Hebrew connective.
- source_word: וַאֲכַלְתֶּם
  chosen: and you shall eat
  alternatives:
  - and you will eat
  lexicon: HALOT
  rationale: Repetition is retained from the Hebrew for emphasis and rhetorical force;
    it anticipates the extended explanation in the following verses.
