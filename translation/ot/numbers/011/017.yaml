id: NUM.11.17
reference: Numbers 11:17
source:
  edition: WLC
  text: וְ/יָרַדְתִּ֗י וְ/דִבַּרְתִּ֣י עִמְּ/ךָ֮ שָׁם֒ וְ/אָצַלְתִּ֗י מִן הָ/ר֛וּחַ
    אֲשֶׁ֥ר עָלֶ֖י/ךָ וְ/שַׂמְתִּ֣י עֲלֵי/הֶ֑ם וְ/נָשְׂא֤וּ אִתְּ/ךָ֙ בְּ/מַשָּׂ֣א
    הָ/עָ֔ם וְ/לֹא תִשָּׂ֥א אַתָּ֖ה לְ/בַדֶּֽ/ךָ־־׃
translation:
  text: And I will come down and speak with you there, and I will take some of the
    Spirit that is on you and put it on them, and they will bear the burden of the
    people with you, so that you will not bear it by yourself alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the spirit that is on you.' The Hebrew רוּחַ can denote spirit, wind,
      or breath; here it refers to the empowering spirit given to Moses for leadership.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרַדְתִּי
  chosen: I will come down
  alternatives:
  - I will descend
  lexicon: HALOT
  rationale: The verb ירד literally means 'go/come down.' In divine speech, 'come
    down' is idiomatic and natural in English while preserving the anthropomorphic-theophanic
    language of the Hebrew.
- source_word: וְדִבַּרְתִּי עִמְּךָ שָׁם
  chosen: and speak with you there
  alternatives:
  - and talk with you there
  lexicon: HALOT
  rationale: דבר with עם commonly means 'speak with.' 'There' is retained for spatial
    specificity at the tent/meeting place.
- source_word: וְאָצַלְתִּי
  chosen: I will take some
  alternatives:
  - I will draw off
  - I will apportion
  - I will take away from
  lexicon: HALOT
  rationale: The rare verb אצל here conveys taking from what is upon Moses in order
    to place it upon the elders. 'Take some' communicates transfer without implying
    diminution too strongly; the source text does not explicitly state loss or non-loss.
- source_word: מִן הָרוּחַ אֲשֶׁר עָלֶיךָ
  chosen: of the Spirit that is on you
  alternatives:
  - of the spirit that is on you
  - from the Spirit that is on you
  lexicon: HALOT
  rationale: רוּחַ here refers to the divinely given empowering Spirit for leadership,
    not merely Moses' personal disposition. Capitalizing 'Spirit' reflects this contextual
    sense. 'Of the Spirit' fits English idiom after 'take some' and preserves the
    partitive force of מִן.
- source_word: וְשַׂמְתִּי עֲלֵיהֶם
  chosen: and put it on them
  alternatives:
  - and place it upon them
  lexicon: HALOT
  rationale: שׂים is a common verb meaning 'put/place/set.' 'Put it on them' is clear
    modern English and preserves the metaphor of Spirit-endowment resting upon persons.
- source_word: וְנָשְׂאוּ אִתְּךָ
  chosen: and they will bear ... with you
  alternatives:
  - and they will carry ... with you
  lexicon: HALOT
  rationale: נשא can mean 'lift, carry, bear.' In context of leadership responsibility,
    'bear' best conveys shared burden-bearing.
- source_word: בְּמַשָּׂא הָעָם
  chosen: the burden of the people
  alternatives:
  - the load of the people
  - the burden of this people
  lexicon: HALOT
  rationale: מַשָּׂא denotes a load or burden. Here it is metaphorical for the responsibility
    of leading the people. 'Burden of the people' is the most natural and sufficiently
    literal rendering.
- source_word: וְלֹא תִשָּׂא אַתָּה לְבַדֶּךָ
  chosen: so that you will not bear it by yourself alone
  alternatives:
  - and you will not bear it alone
  - so you will not carry it by yourself
  lexicon: HALOT
  rationale: The clause expresses purpose/result of the Spirit-sharing arrangement.
    Supplying 'it' in English refers back to the burden. 'By yourself alone' reflects
    לְבַדֶּךָ emphatically without awkwardness.
