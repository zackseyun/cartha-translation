theological_decisions:
- issue: Whether רוּחַ should be rendered 'Spirit' or 'spirit'
  chosen_reading: Spirit
  alternative_readings:
  - spirit
  rationale: In this context the referent is the divine empowering presence given
    for Moses' leadership and then shared with the elders (cf. the immediate context
    in Numbers 11:25). Capitalization in English helps signal that this is not merely
    Moses' human attitude or temperament. This does not import later doctrinal precision
    beyond the text, but reflects the contextual sense of divine empowerment.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
