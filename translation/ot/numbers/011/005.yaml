theological_decisions:
- issue: Rendering חִנָּם in light of Israel's slavery in Egypt
  chosen_reading: for nothing
  alternative_readings:
  - freely
  - without cost
  rationale: The verse reports the people's complaint in their own perspective, not
    an objective theological assessment of Egyptian bondage. Rendering the adverb
    straightforwardly preserves the rhetoric and irony without importing interpretive
    correction into the translation.
  doctrine_reference: Translation philosophy §1, §3
