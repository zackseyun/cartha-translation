id: NUM.11.5
reference: Numbers 11:5
source:
  edition: WLC
  text: זָכַ֨רְנוּ֙ אֶת הַ/דָּגָ֔ה אֲשֶׁר נֹאכַ֥ל בְּ/מִצְרַ֖יִם חִנָּ֑ם אֵ֣ת הַ/קִּשֻּׁאִ֗ים
    וְ/אֵת֙ הָֽ/אֲבַטִּחִ֔ים וְ/אֶת הֶ/חָצִ֥יר וְ/אֶת הַ/בְּצָלִ֖ים וְ/אֶת הַ/שּׁוּמִֽים־־־־־׃
translation:
  text: We remember the fish that we ate in Egypt for nothing, the cucumbers, the
    melons, the leeks, the onions, and the garlic.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'freely' or 'without cost.' The speakers are recalling Egypt from the
      perspective of their complaint, despite their actual slavery there.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכַרְנוּ
  chosen: We remember
  alternatives:
  - We remembered
  - We recall
  lexicon: HALOT
  rationale: Qal perfect 1cp can be rendered as a present in direct discourse to express
    current recollection. 'We remember' is natural English and fits the complaint
    context.
- source_word: הַדָּגָה
  chosen: the fish
  alternatives:
  - the seafood
  lexicon: HALOT
  rationale: Refers collectively to fish as food. 'The fish' preserves the collective
    sense without over-specifying.
- source_word: אֲשֶׁר נֹאכַל
  chosen: that we ate
  alternatives:
  - which we used to eat
  lexicon: HALOT
  rationale: Simple relative clause with Qal imperfect/yiqtol in past habitual context.
    English simple past is idiomatic; habitual nuance is sufficiently conveyed by
    context.
- source_word: בְּמִצְרַיִם
  chosen: in Egypt
  lexicon: HALOT
  rationale: Straightforward locative phrase.
- source_word: חִנָּם
  chosen: for nothing
  alternatives:
  - freely
  - without cost
  lexicon: HALOT
  rationale: The adverb means 'gratis, without payment.' 'For nothing' is idiomatic
    modern English and preserves the complaint's force, without resolving the broader
    contextual irony of Israel's slavery.
- source_word: הַקִּשֻּׁאִים
  chosen: the cucumbers
  lexicon: HALOT
  rationale: Standard identification of the produce item as cucumbers.
- source_word: הָאֲבַטִּחִים
  chosen: the melons
  alternatives:
  - watermelons
  lexicon: HALOT
  rationale: The term denotes a kind of melon; 'melons' is accurate without overcommitting
    to a specific species.
- source_word: הֶחָצִיר
  chosen: the leeks
  alternatives:
  - greens
  - herbs
  lexicon: HALOT
  rationale: In this food list the noun is traditionally and plausibly understood
    as a garden vegetable, commonly rendered 'leeks,' rather than literal grass/hay,
    which would not fit the context.
- source_word: הַבְּצָלִים
  chosen: the onions
  lexicon: HALOT
  rationale: Standard lexical rendering.
- source_word: הַשּׁוּמִים
  chosen: the garlic
  lexicon: HALOT
  rationale: Standard lexical rendering.
