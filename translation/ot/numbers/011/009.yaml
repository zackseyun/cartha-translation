id: NUM.11.9
reference: Numbers 11:9
source:
  edition: WLC
  text: וּ/בְ/רֶ֧דֶת הַ/טַּ֛ל עַל הַֽ/מַּחֲנֶ֖ה לָ֑יְלָה יֵרֵ֥ד הַ/מָּ֖ן עָלָֽי/ו־׃
translation:
  text: When the dew came down on the camp at night, the manna came down on it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and when the dew descended on the camp by night, the manna descended
      on it.' The Hebrew uses the same verb ('came down/descended') for both dew and
      manna, emphasizing the parallel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְרֶדֶת
  chosen: When ... came down
  alternatives:
  - and when ... came down
  - in the descending of
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with the infinitive construct
    of ירד introduces a temporal clause. English idiom is best served by 'When ...
    came down' rather than a more wooden 'and in the descending of.'
- source_word: הַטַּל
  chosen: the dew
  lexicon: HALOT
  rationale: Straightforward nominal rendering; definite article preserved.
- source_word: עַל הַמַּחֲנֶה
  chosen: on the camp
  alternatives:
  - upon the camp
  - over the camp
  lexicon: HALOT
  rationale: עַל commonly means 'on/upon.' 'On the camp' is natural modern English
    and fits the image of dew settling on the camp.
- source_word: לָיְלָה
  chosen: at night
  alternatives:
  - by night
  - in the night
  lexicon: HALOT
  rationale: Adverbial accusative of time. 'At night' is the most natural contemporary
    English equivalent.
- source_word: יֵרֵד
  chosen: came down
  alternatives:
  - would come down
  - descended
  lexicon: HALOT
  rationale: The imperfect here describes customary past action in narrative context.
    English simple past communicates the repeated narrative sense adequately without
    awkwardness; 'would come down' is possible but less smooth.
- source_word: הַמָּן
  chosen: the manna
  lexicon: HALOT
  rationale: Definite noun referring to the known miraculous food.
- source_word: עָלָיו
  chosen: on it
  alternatives:
  - upon it
  - on top of it
  lexicon: HALOT
  rationale: The 3ms suffix most naturally refers back to the camp, indicating that
    the manna fell on the camp, likely with reference to the dew. 'On it' preserves
    the Hebrew pronoun without over-specifying the relation.
