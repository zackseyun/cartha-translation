id: NUM.11.32
reference: Numbers 11:32
source:
  edition: WLC
  text: וַ/יָּ֣קָם הָ/עָ֡ם כָּל הַ/יּוֹם֩ הַ/ה֨וּא וְ/כָל הַ/לַּ֜יְלָה וְ/כֹ֣ל י֣וֹם
    הַֽ/מָּחֳרָ֗ת וַ/יַּֽאַסְפוּ֙ אֶת הַ/שְּׂלָ֔ו הַ/מַּמְעִ֕יט אָסַ֖ף עֲשָׂרָ֣ה חֳמָרִ֑ים
    וַ/יִּשְׁטְח֤וּ לָ/הֶם֙ שָׁט֔וֹחַ סְבִיב֖וֹת הַֽ/מַּחֲנֶֽה־־׀־׃
translation:
  text: And the people rose up all that day and all the night and all the next day,
    and they gathered the quail. The one who gathered the least gathered ten homers,
    and they spread them out for themselves all around the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A homer was a large dry measure. The exact modern equivalent is uncertain;
      the point is that even the person who gathered the least collected a very large
      amount.
    reason: cultural_note
  - marker: b
    text: Or 'ten donkey-loads,' if חֳמָרִים is taken by its etymological association
      rather than as the standard dry measure 'homers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: rose up
  alternatives:
  - got up
  - set out
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום here introduces vigorous action by the people in
    response to the quail. 'Rose up' preserves the Hebrew idiom and the narrative
    force better than the flatter 'got up.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: Standard rendering for עם in narrative contexts referring to the Israelite
    community as a collective.
- source_word: כָּל הַיּוֹם הַהוּא וְכָל הַלַּיְלָה וְכֹל יוֹם הַמָּחֳרָת
  chosen: all that day and all the night and all the next day
  alternatives:
  - the whole of that day and all night and the whole next day
  - all that day, all night, and all the following day
  lexicon: HALOT
  rationale: This sequence emphasizes the uninterrupted duration of the gathering.
    'The next day' is a natural rendering of מָחֳרָת in context. Retaining 'all the
    night' rather than smoothing to 'all night' keeps some of the Hebrew rhythm while
    remaining readable.
- source_word: וַיַּאַסְפוּ אֶת־הַשְּׂלָו
  chosen: and they gathered the quail
  alternatives:
  - and they collected the quail
  lexicon: HALOT
  rationale: אָסף commonly means gather/collect. 'Gathered' is simple and idiomatic.
    שְׂלָו is the quail provided in the preceding context.
- source_word: הַמַּמְעִיט
  chosen: the one who gathered the least
  alternatives:
  - the one who had least
  - the least gatherer
  lexicon: HALOT
  rationale: The Hiphil participle of מעט means 'the one making little' or idiomatically
    'the one who gathered the least' in this context. The supplied verbal idea is
    warranted by the following finite verb אָסַף and the context of collecting quail.
- source_word: אָסַף עֲשָׂרָה חֳמָרִים
  chosen: gathered ten homers
  alternatives:
  - collected ten homers
  - gathered ten donkey-loads
  lexicon: HALOT
  rationale: The repeated verb underscores the minimum quantity collected. חֹמֶר is
    a dry measure usually rendered 'homer.' Keeping the transliterated unit avoids
    false precision; 'donkey-loads' reflects an etymological association but is less
    certain and less standard for the measure here.
- source_word: וַיִּשְׁטְחוּ לָהֶם שָׁטוֹחַ
  chosen: and they spread them out for themselves
  alternatives:
  - and they spread them out
  - and they laid them out
  lexicon: HALOT
  rationale: The verb שטח with cognate infinitive intensifies the action of spreading
    out, likely for drying or processing. 'For themselves' reflects לָהֶם without
    overinterpreting the purpose.
- source_word: סְבִיבוֹת הַמַּחֲנֶה
  chosen: all around the camp
  alternatives:
  - around the camp
  - surrounding the camp
  lexicon: HALOT
  rationale: סְבִיבוֹת conveys surrounding area or all around. 'All around the camp'
    captures the distributive sense and reads naturally in English.
