id: NUM.11.12
reference: Numbers 11:12
source:
  edition: WLC
  text: הֶ/אָנֹכִ֣י הָרִ֗יתִי אֵ֚ת כָּל הָ/עָ֣ם הַ/זֶּ֔ה אִם אָנֹכִ֖י יְלִדְתִּ֑י/הוּ
    כִּֽי תֹאמַ֨ר אֵלַ֜/י שָׂאֵ֣/הוּ בְ/חֵיקֶ֗/ךָ כַּ/אֲשֶׁ֨ר יִשָּׂ֤א הָ/אֹמֵן֙ אֶת
    הַ/יֹּנֵ֔ק עַ֚ל הָֽ/אֲדָמָ֔ה אֲשֶׁ֥ר נִשְׁבַּ֖עְתָּ לַ/אֲבֹתָֽי/ו־־־־׃
translation:
  text: Did I conceive all this people? Did I give birth to him, that you should say
    to me, ‘Carry him in your bosom, as a guardian carries the nursing child,’ to
    the land that you swore to his fathers?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as a nurse carries the suckling.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew has singular 'him' and 'his fathers,' treating 'people' as a collective
      singular; English could also render 'them' and 'their fathers.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֶאָנֹכִי
  chosen: Did I
  alternatives:
  - Was it I who
  lexicon: HALOT
  rationale: The interrogative particle with the independent pronoun introduces a
    rhetorical question with emphatic first-person force. English idiom is best captured
    by 'Did I ...?' rather than a more wooden 'Am I the one who ...?'.
- source_word: הָרִיתִי
  chosen: conceive
  alternatives:
  - become pregnant with
  lexicon: HALOT
  rationale: The verb from הרה refers to conceiving/pregnancy. 'Conceive' is concise,
    natural, and preserves the maternal metaphor.
- source_word: כָּל הָעָם הַזֶּה
  chosen: all this people
  alternatives:
  - all these people
  - all this nation
  lexicon: HALOT
  rationale: Hebrew עָם is singular collective. 'All this people' preserves the singular
    collective force better than 'all these people,' while remaining understandable
    in English.
- source_word: אִם אָנֹכִי יְלִדְתִּיהוּ
  chosen: Did I give birth to him
  alternatives:
  - Did I bear him
  - Did I beget him
  lexicon: HALOT
  rationale: ילד in the Qal with first-person subject here continues the childbirth
    metaphor. The singular suffix 'him' reflects the collective singular 'people'
    (עָם). 'Give birth to him' is clearer than 'bear him' and avoids the male-oriented
    nuance of 'beget.'
- source_word: כִּי תֹאמַר אֵלַי
  chosen: that you should say to me
  alternatives:
  - that you say to me
  - for you say to me
  lexicon: HALOT
  rationale: Here כִּי introduces the consequence/content of the complaint in rhetorical
    style. 'That you should say to me' fits the English flow after the paired rhetorical
    questions.
- source_word: שָׂאֵהוּ
  chosen: Carry him
  alternatives:
  - Bear him
  - Lift him up
  lexicon: HALOT
  rationale: נשא commonly means carry/bear. 'Carry' is the most natural in the child-care
    image that follows.
- source_word: בְחֵיקֶךָ
  chosen: in your bosom
  alternatives:
  - in your arms
  - at your breast
  lexicon: HALOT
  rationale: חֵיק literally denotes bosom/lap. 'In your bosom' preserves the concrete
    imagery and traditional resonance; 'in your arms' is possible but less exact.
- source_word: הָאֹמֵן
  chosen: a guardian
  alternatives:
  - a nurse
  - a foster-father
  - a caretaker
  lexicon: HALOT
  rationale: The participle from אמן here denotes one who cares for and carries a
    child. Because the following suffixes are masculine and the image need not imply
    a female wet nurse, 'guardian' is a suitably broad rendering. The common alternative
    'nurse' is preserved in a footnote because it is a viable lexical option.
- source_word: הַיֹּנֵק
  chosen: the nursing child
  alternatives:
  - the suckling
  - the infant
  lexicon: HALOT
  rationale: The participle denotes a child still nursing. 'The nursing child' is
    clear modern English and preserves the specific stage of infancy better than the
    archaic 'suckling'.
- source_word: עַל הָאֲדָמָה
  chosen: to the land
  alternatives:
  - upon the land
  - over the ground
  lexicon: HALOT
  rationale: In context with movement/carrying toward the promised destination, עַל
    is idiomatically rendered 'to' rather than a strictly spatial 'upon.' 'Land' fits
    the covenantal destination.
- source_word: אֲשֶׁר נִשְׁבַּעְתָּ
  chosen: that you swore
  alternatives:
  - which you swore
  - that you promised with an oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע means 'swear, take an oath.' 'That you swore' is direct
    and preserves the covenant-oath language.
- source_word: לַאֲבֹתָיו
  chosen: to his fathers
  alternatives:
  - to their fathers
  - to his ancestors
  lexicon: HALOT
  rationale: The suffix is singular, agreeing with the collective singular עָם. 'His
    fathers' is formally closest to the Hebrew; 'their fathers' is smoother in English
    but loses the collective-singular linkage. A footnote preserves the smoother alternative.
