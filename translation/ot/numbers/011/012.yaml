theological_decisions:
- issue: Collective singular references to Israel
  chosen_reading: Retain singular pronouns ('him,' 'his fathers') for the collective
    'people'
  alternative_readings:
  - Use plural pronouns for smoother English ('them,' 'their fathers')
  rationale: The Hebrew uses the singular collective עָם with singular pronominal
    references. Preserving the singular maintains Moses' metaphor of Israel as a single
    child and keeps closer to the source, while the plural alternative is noted in
    a footnote for readability.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6
    (readable modern English, not at the expense of source sense)
- issue: Rendering of הָאֹמֵן
  chosen_reading: Use 'guardian' in the main text
  alternative_readings:
  - nurse
  - foster-father
  - caretaker
  rationale: The Hebrew term can denote a caregiver responsible for a child. 'Guardian'
    avoids over-specifying gender or role while preserving the caregiving image. Because
    'nurse' is a common and defensible rendering, it is preserved in a footnote.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve tension where ambiguity is genuine)
