id: NUM.11.24
reference: Numbers 11:24
source:
  edition: WLC
  text: וַ/יֵּצֵ֣א מֹשֶׁ֗ה וַ/יְדַבֵּר֙ אֶל הָ/עָ֔ם אֵ֖ת דִּבְרֵ֣י יְהוָ֑ה וַ/יֶּאֱסֹ֞ף שִׁבְעִ֥ים אִישׁ֙ מִ/זִּקְנֵ֣י הָ/עָ֔ם וַֽ/יַּעֲמֵ֥ד אֹתָ֖/ם סְבִיבֹ֥ת הָ/אֹֽהֶל־׃
translation:
  text: So Moses went out and spoke to the people the words of Yahweh. He gathered seventy men from the elders of the people and stationed them around the tent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set them' or 'made them stand.' The Hebrew verb is literally 'caused them to stand.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the tent'; context likely refers to the tent of meeting.
    reason: cross_reference
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - went forth
  - came out
  lexicon: HALOT
  rationale: The verb יצא in the waw-consecutive narrative form straightforwardly denotes going out from a prior location. 'Went out' is natural modern English and preserves the movement without archaic tone.
- source_word: וַיְדַבֵּר אֶל הָעָם אֵת דִּבְרֵי יְהוָה
  chosen: spoke to the people the words of the LORD
  alternatives:
  - told the people the words of the LORD
  - spoke to the people the message of the LORD
  lexicon: HALOT
  rationale: דבר with אֶל means 'speak to.' Retaining 'the words of the LORD' is more formally faithful than 'message,' preserving the concrete phrasing of the Hebrew while remaining idiomatic enough in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֶּאֱסֹף
  chosen: gathered
  alternatives:
  - assembled
  - collected
  lexicon: HALOT
  rationale: אסף commonly means gather or assemble. 'Gathered' is the most direct and natural fit in this narrative context.
- source_word: שִׁבְעִים אִישׁ
  chosen: seventy men
  alternatives:
  - seventy persons
  lexicon: HALOT
  rationale: אִישׁ is singular in distributive/collective use after the number and ordinarily means 'man/men.' Following the project's gender-accurate policy, 'men' is preferred over a neutral term.
- source_word: מִזִּקְנֵי הָעָם
  chosen: from the elders of the people
  alternatives:
  - from the older men of the people
  - from among the elders of the people
  lexicon: HALOT
  rationale: זִקְנֵי here refers to recognized elders, not merely aged men. 'From the elders of the people' preserves the partitive sense of מִן and the social role implied by the term.
- source_word: וַיַּעֲמֵד אֹתָם
  chosen: stationed them
  alternatives:
  - set them
  - made them stand
  - placed them
  lexicon: HALOT
  rationale: The Hiphil of עמד is causative, 'cause to stand' or 'set in position.' 'Stationed them' captures intentional placement in a designated location more idiomatically than the wooden 'made them stand.'
- source_word: סְבִיבֹת הָאֹהֶל
  chosen: around the tent
  alternatives:
  - around the tabernacle
  - surrounding the tent
  lexicon: HALOT
  rationale: סְבִיבֹת means around/surrounding. הָאֹהֶל is literally 'the tent.' Although context may point to the tent of meeting, the Hebrew here does not include the fuller expression, so 'the tent' best reflects the source without importing interpretive expansion.
