theological_decisions:
- issue: Anthropomorphic language for divine power
  chosen_reading: Retain 'the LORD’s hand' literally
  alternative_readings:
  - Has the LORD’s power become limited?
  rationale: The Hebrew uses bodily imagery to express divine capability. Preserving
    the metaphor maintains the text's rhetorical force without implying corporeality
    in a crude sense. This follows optimal equivalence and avoids unnecessary interpretive
    flattening.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of God's challenge to Moses
  chosen_reading: 'Render as a rhetorical question about limitation: ''Has the LORD’s
    hand become short?'''
  alternative_readings:
  - Is anything too hard for the LORD here?
  rationale: The verse rebukes doubt by asserting that God's capacity has not diminished.
    The chosen rendering stays close to the Hebrew idiom rather than importing wording
    from parallel concepts elsewhere.
  doctrine_reference: Translation philosophy §1, §3
