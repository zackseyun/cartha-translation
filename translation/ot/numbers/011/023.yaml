id: NUM.11.23
reference: Numbers 11:23
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה הֲ/יַ֥ד יְהוָ֖ה תִּקְצָ֑ר עַתָּ֥ה תִרְאֶ֛ה
    הֲ/יִקְרְ/ךָ֥ דְבָרִ֖/י אִם לֹֽא־־׃
translation:
  text: And the LORD said to Moses, “Has the LORD’s hand become short? Now you will
    see whether my word will come to pass for you or not.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Has the LORD’s hand become short?''—an idiom meaning ''Has the
      LORD’s power become limited?'''
    reason: cultural_note
  - marker: b
    text: Or 'whether what I have said will happen to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default, the divine name is rendered 'the LORD' rather than
    transliterated, following established reverential convention and the LXX/English
    Bible pattern.
- source_word: הֲיָד יְהוָה
  chosen: Has the LORD’s hand
  alternatives:
  - Is the LORD’s hand
  - Has the hand of the LORD
  lexicon: HALOT
  rationale: Retains the Hebrew anthropomorphic idiom 'hand' as a metaphor for power/ability
    rather than flattening it to 'power,' preserving the vividness of the source.
- source_word: תִּקְצָר
  chosen: become short
  alternatives:
  - grown short
  - too short
  - limited
  lexicon: HALOT
  rationale: The verb from קצר literally means 'be short' and in this idiom conveys
    insufficiency or limitation. 'Become short' preserves the metaphor and the implied
    challenge to Moses' doubt better than a fully interpretive rendering like 'be
    limited.'
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At once
  - Immediately
  lexicon: HALOT
  rationale: A straightforward temporal adverb marking the immediate demonstration
    of God's capability.
- source_word: תִרְאֶה
  chosen: you will see
  alternatives:
  - you shall see
  lexicon: HALOT
  rationale: Future sense fits the context of imminent verification; 'you will see'
    is clear modern English.
- source_word: הֲיִקְרְךָ
  chosen: will come to pass for you
  alternatives:
  - will happen to you
  - will meet you
  - will befall you
  lexicon: HALOT
  rationale: From קרה, 'to happen/occur/meet.' In context God is speaking of the fulfillment
    of his spoken promise to Moses. 'Come to pass for you' communicates occurrence/fulfillment
    while preserving the second-person suffix.
- source_word: דְבָרִי
  chosen: my word
  alternatives:
  - my words
  - what I have said
  lexicon: HALOT
  rationale: Although דָּבָר can mean 'word,' 'matter,' or 'thing,' the singular with
    first-person suffix here naturally refers to God's spoken declaration/promise.
    Singular 'my word' is both faithful and idiomatic.
- source_word: אִם לֹא
  chosen: or not
  alternatives:
  - if not
  - whether not
  lexicon: HALOT
  rationale: In this interrogative construction after 'you will see whether,' English
    idiom requires 'or not.' A more literal 'if not' would sound awkward and obscure
    the sense.
