id: NUM.11.16
reference: Numbers 11:16
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה אֶסְפָ/ה לִּ֞/י שִׁבְעִ֣ים אִישׁ֮ מִ/זִּקְנֵ֣י
    יִשְׂרָאֵל֒ אֲשֶׁ֣ר יָדַ֔עְתָּ כִּי הֵ֛ם זִקְנֵ֥י הָ/עָ֖ם וְ/שֹׁטְרָ֑י/ו וְ/לָקַחְתָּ֤
    אֹתָ/ם֙ אֶל אֹ֣הֶל מוֹעֵ֔ד וְ/הִֽתְיַצְּב֥וּ שָׁ֖ם עִמָּֽ/ךְ־־־־׃
translation:
  text: Then the LORD said to Moses, “Gather for me seventy men from the elders of
    Israel, whom you know to be the elders of the people and its officers, and bring
    them to the tent of meeting, and let them stand there with you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Assemble for me.”
    reason: lexical_alternative
  - marker: b
    text: Or “officials”; the Hebrew term refers to administrative officers under
      the elders.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, following Jewish reverence
    tradition and common English Bible convention.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר in direct speech introduction; 'said'
    is the most natural modern English rendering.
- source_word: אֶסְפָה לִּי
  chosen: Gather for me
  alternatives:
  - Assemble for me
  - Collect for me
  lexicon: HALOT
  rationale: אָסַף in the imperative/request sense here calls Moses to bring people
    together. 'Gather for me' preserves both the action and the dative nuance לִּי.
- source_word: שִׁבְעִים אִישׁ
  chosen: seventy men
  alternatives:
  - seventy persons
  lexicon: HALOT
  rationale: אִישׁ is singular used distributively after a number and refers to adult
    males in this leadership context. 'Men' is gender-accurate per translation philosophy.
- source_word: מִזִּקְנֵי יִשְׂרָאֵל
  chosen: from the elders of Israel
  alternatives:
  - out of the elders of Israel
  lexicon: HALOT
  rationale: מִן marks selection from a larger group. 'Elders of Israel' is the established
    and accurate sense of the social-political leaders.
- source_word: אֲשֶׁר יָדַעְתָּ כִּי
  chosen: whom you know to be
  alternatives:
  - whom you know that they are
  - who you know are
  lexicon: HALOT
  rationale: This smooths the Hebrew construction into idiomatic English while preserving
    Moses' prior knowledge as the basis for selection.
- source_word: זִקְנֵי הָעָם
  chosen: the elders of the people
  alternatives:
  - the people's elders
  lexicon: HALOT
  rationale: Retains the appositional clarification that these men are recognized
    leaders of the people.
- source_word: וְשֹׁטְרָיו
  chosen: and its officers
  alternatives:
  - and its officials
  - and its scribes
  lexicon: HALOT
  rationale: שֹׁטֵר in administrative contexts refers to officers/officials under
    authority. 'Officers' best fits the governance setting. The 3ms suffix refers
    back collectively to הָעָם, hence 'its' rather than 'their'.
- source_word: וְלָקַחְתָּ אֹתָם
  chosen: and bring them
  alternatives:
  - and take them
  lexicon: HALOT
  rationale: Though לקח is literally 'take,' in motion toward a destination in English
    'bring' is more natural from the deictic perspective of the commanded destination.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tabernacle
  lexicon: HALOT
  rationale: This is the standard literal rendering of the sanctuary designation here.
    'Tabernacle' is possible in some contexts but is less precise to the Hebrew expression.
- source_word: וְהִתְיַצְּבוּ שָׁם עִמָּךְ
  chosen: and let them stand there with you
  alternatives:
  - and they shall present themselves there with you
  - and let them take their stand there with you
  lexicon: HALOT
  rationale: The hitpael of יצב conveys taking one's stand/presenting oneself. 'Let
    them stand there with you' is clear, natural, and preserves the directive force.
