id: NUM.11.8
reference: Numbers 11:8
source:
  edition: WLC
  text: שָׁטוּ֩ הָ/עָ֨ם וְ/לָֽקְט֜וּ וְ/טָחֲנ֣וּ בָ/רֵחַ֗יִם א֤וֹ דָכוּ֙ בַּ/מְּדֹכָ֔ה
    וּ/בִשְּׁלוּ֙ בַּ/פָּר֔וּר וְ/עָשׂ֥וּ אֹת֖/וֹ עֻג֑וֹת וְ/הָיָ֣ה טַעְמ֔/וֹ כְּ/טַ֖עַם
    לְשַׁ֥ד הַ/שָּֽׁמֶן׃
translation:
  text: The people would roam about and gather it, and grind it in the millstones
    or crush it in the mortar, and boil it in the pot, and make it into cakes; and
    its taste was like the taste of rich oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the taste of fresh oil.' The Hebrew phrase לְשַׁד הַשָּׁמֶן is difficult;
      it likely refers to the rich or fresh essence of oil.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁטוּ
  chosen: would roam about
  alternatives:
  - went about
  - roamed
  lexicon: HALOT
  rationale: The verb denotes moving to and fro over an area. 'Would roam about' captures
    the iterative/past customary sense in context, describing the people's regular
    action in collecting manna.
- source_word: לָקְטוּ
  chosen: gather
  alternatives:
  - collect
  - pick up
  lexicon: HALOT
  rationale: A standard harvesting/collecting verb. 'Gather' is natural English and
    fits the context of collecting manna.
- source_word: טָחֲנוּ בָרֵחַיִם
  chosen: grind it in the millstones
  alternatives:
  - grind it in a mill
  - mill it
  lexicon: HALOT
  rationale: רֵחַיִם refers to a handmill/millstones. 'Grind it in the millstones'
    preserves the concrete instrument more closely than the generic 'mill it.'
- source_word: דָכוּ בַּמְּדֹכָה
  chosen: crush it in the mortar
  alternatives:
  - pound it in the mortar
  - bruise it in the mortar
  lexicon: HALOT
  rationale: The verb means to crush/pound. 'Crush' is clear modern English; 'mortar'
    accurately renders the vessel.
- source_word: בִשְּׁלוּ בַּפָּרוּר
  chosen: boil it in the pot
  alternatives:
  - cook it in the pot
  - boil it in a pan
  lexicon: HALOT
  rationale: The verb commonly means boil/cook. Given the vessel named here, 'boil
    it in the pot' is a straightforward rendering that preserves the likely cooking
    method without overinterpreting.
- source_word: עָשׂוּ אֹתוֹ עֻגוֹת
  chosen: make it into cakes
  alternatives:
  - make cakes from it
  - prepare it as cakes
  lexicon: HALOT
  rationale: עֻגוֹת are round cakes. 'Make it into cakes' is idiomatic and keeps the
    object relationship explicit.
- source_word: טַעְמוֹ
  chosen: its taste
  alternatives:
  - its flavor
  lexicon: HALOT
  rationale: The noun refers to taste/flavor. 'Taste' is the more direct and common
    rendering.
- source_word: לְשַׁד הַשָּׁמֶן
  chosen: rich oil
  alternatives:
  - fresh oil
  - the richness of oil
  - juice of oil
  lexicon: HALOT
  rationale: לְשַׁד is a difficult term meaning richness, fatness, or juicy essence.
    In this food context, 'rich oil' best communicates the sense of oily richness
    in readable English. Because the phrase is lexically difficult and has been rendered
    variously in tradition, an alternative is preserved in a footnote.
