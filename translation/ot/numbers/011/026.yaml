theological_decisions:
- issue: Whether הָרוּחַ should be rendered 'the Spirit' or 'the spirit'
  chosen_reading: the Spirit
  alternative_readings:
  - the spirit
  rationale: In the immediate literary context, the same divine empowering Spirit
    distributed from Moses comes upon the elders. Capitalizing 'Spirit' reflects the
    referent rather than importing extra doctrine.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether הָאֹהֱלָה should be made explicit as 'the tent of meeting'
  chosen_reading: the tent
  alternative_readings:
  - the tent of meeting
  rationale: The context strongly suggests the tent of meeting, but the Hebrew text
    in this verse says only 'the tent.' To avoid importing words not present in the
    source, the main text keeps 'the tent'; the contextual identification can be preserved
    in a footnote.
  doctrine_reference: Translation philosophy §1, §3
