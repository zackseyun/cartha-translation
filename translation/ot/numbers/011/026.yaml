id: NUM.11.26
reference: Numbers 11:26
source:
  edition: WLC
  text: וַ/יִּשָּׁאֲר֣וּ שְׁנֵֽי אֲנָשִׁ֣ים בַּֽ/מַּחֲנֶ֡ה שֵׁ֣ם הָ/אֶחָ֣ד אֶלְדָּ֡ד
    וְ/שֵׁם֩ הַ/שֵּׁנִ֨י מֵידָ֜ד וַ/תָּ֧נַח עֲלֵי/הֶ֣ם הָ/ר֗וּחַ וְ/הֵ֨מָּה֙ בַּ/כְּתֻבִ֔ים
    וְ/לֹ֥א יָצְא֖וּ הָ/אֹ֑הֱלָ/ה וַ/יִּֽתְנַבְּא֖וּ בַּֽ/מַּחֲנֶֽה־׀׀׃
translation:
  text: But two men remained in the camp. The name of the one was Eldad, and the name
    of the second was Medad. And the Spirit rested on them; they were among those
    recorded, but they had not gone out to the tent, and they prophesied in the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, likely the tent of meeting in the context of this episode.
    reason: cross_reference
  - marker: b
    text: Or 'they were among the registered.' The Hebrew literally says they were
      'among the written/recorded ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁאֲרוּ
  chosen: remained
  alternatives:
  - were left
  - stayed behind
  lexicon: HALOT
  rationale: From שׁאר, indicating remaining or being left over. 'Remained' is natural
    English and preserves the narrative sense without overinterpreting why they did
    not go.
- source_word: בַּמַּחֲנֶה
  chosen: in the camp
  alternatives:
  - at the camp
  lexicon: HALOT
  rationale: מַחֲנֶה denotes the camp of Israel. 'In the camp' is the normal locative
    rendering and fits both occurrences in the verse.
- source_word: שְׁנֵי אֲנָשִׁים
  chosen: two men
  alternatives:
  - two persons
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural with אֲנָשִׁים, so 'two men'
    is gender-accurate per translation philosophy.
- source_word: שֵׁם הָאֶחָד ... וְשֵׁם הַשֵּׁנִי
  chosen: The name of the one ... and the name of the second
  alternatives:
  - one was named ... and the other was named
  lexicon: HALOT
  rationale: This preserves the Hebrew naming formula fairly closely while remaining
    readable. 'The second' reflects הַשֵּׁנִי more precisely than simply 'the other.'
- source_word: אֶלְדָּד / מֵידָד
  chosen: Eldad / Medad
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: וַתָּנַח עֲלֵיהֶם הָרוּחַ
  chosen: the Spirit rested on them
  alternatives:
  - the spirit rested on them
  - the Spirit came to rest on them
  lexicon: HALOT
  rationale: רוּחַ here refers to the divine Spirit in the immediate context of prophetic
    empowerment (cf. surrounding verses), so 'the Spirit' is appropriate. נוח in this
    stem conveys resting/settling upon them.
- source_word: וְהֵמָּה בַּכְּתֻבִים
  chosen: they were among those recorded
  alternatives:
  - they were among the registered
  - they were written down
  lexicon: HALOT
  rationale: כְּתֻבִים literally means 'written' or 'recorded.' In context it refers
    to their inclusion among the listed elders. 'Among those recorded' is clear and
    avoids an overly wooden 'written ones.'
- source_word: וְלֹא יָצְאוּ הָאֹהֱלָה
  chosen: they had not gone out to the tent
  alternatives:
  - they did not go out to the tent
  - they had not gone out to the Tent
  lexicon: HALOT
  rationale: 'The directional ending on אֹהֱלָה indicates movement toward the tent.
    The perfect after the descriptive clause is well represented by English pluperfect
    in context: they were recorded, but had not gone out. Lowercase ''tent'' is retained
    because the Hebrew here says simply ''the tent''; while context likely points
    to the tent of meeting, the phrase itself is not expanded beyond the source.'
- source_word: וַיִּתְנַבְּאוּ
  chosen: they prophesied
  alternatives:
  - they began to prophesy
  lexicon: HALOT
  rationale: The hitpael of נבא here denotes prophetic speech/activity. 'They prophesied'
    is the straightforward rendering; 'began to prophesy' adds an inceptive nuance
    not required by the form.
