id: NUM.26.43
reference: Numbers 26:43
source:
  edition: WLC
  text: כָּל מִשְׁפְּחֹ֥ת הַ/שּׁוּחָמִ֖י לִ/פְקֻדֵי/הֶ֑ם אַרְבָּעָ֧ה וְ/שִׁשִּׁ֛ים
    אֶ֖לֶף וְ/אַרְבַּ֥ע מֵאֽוֹת־׃ס
translation:
  text: All the families of the Shuhamites, according to those numbered among them,
    were sixty-four thousand four hundred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all the clans of the Shuhamites.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - The whole number of
  lexicon: HALOT
  rationale: Quantifies the totality of the families being summarized; 'All' is the
    natural concise English equivalent.
- source_word: מִשְׁפְּחֹת
  chosen: families
  alternatives:
  - clans
  lexicon: HALOT
  rationale: In census and tribal contexts this term can be rendered 'families' or
    'clans.' 'Families' is retained as a standard rendering, with the tribal/genealogical
    sense understood from context.
- source_word: הַשּׁוּחָמִי
  chosen: the Shuhamites
  alternatives:
  - the clan of Shuham
  lexicon: HALOT
  rationale: This gentilic refers to the descendants/clan associated with Shuham.
    Transliteration preserves the proper-name form while the plural English ending
    communicates the group identity.
- source_word: לִפְקֻדֵיהֶם
  chosen: according to those numbered among them
  alternatives:
  - by their registration
  - according to their counted ones
  lexicon: HALOT
  rationale: From פקד in the census/passive-participial sense, referring to those
    enrolled or counted. The phrase indicates the census basis for the total, not
    merely an abstract numbering.
- source_word: אַרְבָּעָה וְשִׁשִּׁים אֶלֶף וְאַרְבַּע מֵאוֹת
  chosen: sixty-four thousand four hundred
  alternatives:
  - four and sixty thousand and four hundred
  lexicon: HALOT
  rationale: Rendered in standard contemporary English number style while preserving
    the exact total.
