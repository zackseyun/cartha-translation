id: NUM.26.47
reference: Numbers 26:47
source:
  edition: WLC
  text: אֵ֛לֶּה מִשְׁפְּחֹ֥ת בְּנֵי אָשֵׁ֖ר לִ/פְקֻדֵי/הֶ֑ם שְׁלֹשָׁ֧ה וַ/חֲמִשִּׁ֛ים
    אֶ֖לֶף וְ/אַרְבַּ֥ע מֵאֽוֹת־׃ס
translation:
  text: 'These are the clans of the sons of Asher, according to those numbered from
    them: fifty-three thousand four hundred.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'according to their numbered ones.' The Hebrew reflects
      census terminology from the verb פקד, referring to those enrolled or counted.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Demonstrative plural introducing a summary statement; English idiom naturally
    supplies the copula in this census formula.
- source_word: מִשְׁפְּחֹת
  chosen: clans
  alternatives:
  - families
  lexicon: HALOT
  rationale: In tribal census contexts, the term denotes extended kinship groups within
    a tribe rather than nuclear families; 'clans' best matches the social unit.
- source_word: בְּנֵי אָשֵׁר
  chosen: the sons of Asher
  alternatives:
  - the children of Asher
  - the descendants of Asher
  lexicon: HALOT
  rationale: A standard genealogical expression. 'Sons' preserves the Hebrew form
    and lineage language; in this context it refers to Asher's tribal descendants.
- source_word: לִפְקֻדֵיהֶם
  chosen: according to those numbered from them
  alternatives:
  - according to their number
  - by those mustered from them
  - as numbered
  lexicon: HALOT
  rationale: From פקד in the passive/participle census sense, with pronominal suffix.
    The phrase marks the census total corresponding to these clans. The chosen rendering
    is slightly idiomatic but keeps the notion of an official numbering rather than
    a mere abstract total.
- source_word: שְׁלֹשָׁה וַחֲמִשִּׁים אֶלֶף וְאַרְבַּע מֵאוֹת
  chosen: fifty-three thousand four hundred
  alternatives:
  - three and fifty thousand and four hundred
  lexicon: HALOT
  rationale: Rendered in standard contemporary English number style while preserving
    the exact total.
