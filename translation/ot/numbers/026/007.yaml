id: NUM.26.7
reference: Numbers 26:7
source:
  edition: WLC
  text: אֵ֖לֶּה מִשְׁפְּחֹ֣ת הָ/רֻֽאוּבֵנִ֑י וַ/יִּהְי֣וּ פְקֻדֵי/הֶ֗ם שְׁלֹשָׁ֤ה
    וְ/אַרְבָּעִים֙ אֶ֔לֶף וּ/שְׁבַ֥ע מֵא֖וֹת וּ/שְׁלֹשִֽׁים׃
translation:
  text: These are the clans of the Reubenites, and those numbered from them were forty-three
    thousand seven hundred thirty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “their numbered men” / “those mustered from them.” The Hebrew term refers
      to those counted in the census.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפְּחֹת
  chosen: clans
  alternatives:
  - families
  lexicon: HALOT
  rationale: In census and tribal contexts in Numbers, מִשְׁפָּחָה refers to kinship
    subdivisions within a tribe rather than nuclear families. 'Clans' best matches
    the social unit in contemporary English.
- source_word: הָרֻאוּבֵנִי
  chosen: the Reubenites
  alternatives:
  - the Reubenite clan
  - the descendants of Reuben
  lexicon: HALOT
  rationale: This gentilic denotes members/descendants of Reuben's tribe. 'Reubenites'
    is the standard and natural English rendering of the tribal name.
- source_word: פְקֻדֵיהֶם
  chosen: those numbered from them
  alternatives:
  - their numbered men
  - their enrollment
  - those mustered from them
  lexicon: HALOT
  rationale: From פקד in a census context, the term refers to those counted/registered.
    'Those numbered from them' preserves the passive census sense without adding 'men'
    where the Hebrew here does not explicitly repeat it.
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - came to be
  - amounted to
  lexicon: HALOT
  rationale: 'A simple copular rendering fits the numerical statement naturally in
    English: ''were forty-three thousand...''.'
- source_word: שְׁלֹשָׁה וְאַרְבָּעִים אֶלֶף וּשְׁבַע מֵאוֹת וּשְׁלֹשִׁים
  chosen: forty-three thousand seven hundred thirty
  alternatives:
  - 43,730
  lexicon: HALOT
  rationale: The Hebrew gives a cardinal number in descending units. Spelling it out
    in English preserves the literary style of the census list while remaining readable.
