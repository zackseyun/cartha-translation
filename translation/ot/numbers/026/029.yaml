id: NUM.26.29
reference: Numbers 26:29
source:
  edition: WLC
  text: בְּנֵ֣י מְנַשֶּׁ֗ה לְ/מָכִיר֙ מִשְׁפַּ֣חַת הַ/מָּכִירִ֔י וּ/מָכִ֖יר הוֹלִ֣יד
    אֶת גִּלְעָ֑ד לְ/גִלְעָ֕ד מִשְׁפַּ֖חַת הַ/גִּלְעָדִֽי־׃
translation:
  text: 'The sons of Manasseh: of Machir, the clan of the Machirites; and Machir fathered
    Gilead; of Gilead, the clan of the Gileadites.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי מְנַשֶּׁה
  chosen: The sons of Manasseh
  alternatives:
  - The descendants of Manasseh
  - The sons of Manasseh were
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of,' but in tribal/genealogical census contexts
    it can function broadly for descendants. 'The sons of Manasseh' preserves the
    formal genealogical style while remaining natural in English.
- source_word: לְ/מָכִיר
  chosen: of Machir
  alternatives:
  - to Machir
  - for Machir
  - Machir
  lexicon: HALOT
  rationale: The prefixed ל in this census formula introduces the branch or descendant
    line to which the following clan belongs. 'Of Machir' best reflects the idiomatic
    genealogical sense in English.
- source_word: מִשְׁפַּחַת הַמָּכִירִי
  chosen: the clan of the Machirites
  alternatives:
  - the family of the Machirites
  - the clan of the Makirite
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in Numbers 26 refers to a clan-level subdivision within a
    tribe. 'Clan' is more precise than 'family' in this census setting. The gentilic
    הַמָּכִירִי is naturally rendered 'the Machirites.'
- source_word: וּמָכִיר הוֹלִיד אֶת גִּלְעָד
  chosen: and Machir fathered Gilead
  alternatives:
  - and Machir became the father of Gilead
  - and Machir begot Gilead
  lexicon: HALOT
  rationale: הוֹלִיד is the standard genealogical verb for begetting/fathering. 'Fathered'
    is clear modern English and preserves the male genealogical reference without
    archaic 'begot.'
- source_word: לְ/גִלְעָד
  chosen: of Gilead
  alternatives:
  - to Gilead
  - for Gilead
  - Gilead
  lexicon: HALOT
  rationale: As with לְמָכִיר earlier in the verse, the prefixed ל introduces the
    descendant line associated with the following clan designation. 'Of Gilead' keeps
    the parallel structure.
- source_word: מִשְׁפַּחַת הַגִּלְעָדִי
  chosen: the clan of the Gileadites
  alternatives:
  - the family of the Gileadites
  - the clan of the Giladite
  lexicon: HALOT
  rationale: Again, מִשְׁפָּחָה is best rendered 'clan' in this tribal census context,
    and the gentilic הַגִּלְעָדִי is naturally pluralized in English as 'the Gileadites.'
