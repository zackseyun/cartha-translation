id: NUM.26.41
reference: Numbers 26:41
source:
  edition: WLC
  text: אֵ֥לֶּה בְנֵי בִנְיָמִ֖ן לְ/מִשְׁפְּחֹתָ֑/ם וּ/פְקֻ֣דֵי/הֶ֔ם חֲמִשָּׁ֧ה וְ/אַרְבָּעִ֛ים
    אֶ֖לֶף וְ/שֵׁ֥שׁ מֵאֽוֹת־׃ס
translation:
  text: These were the sons of Benjamin by their clans, and those numbered from them
    were forty-five thousand six hundred.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These are
  - These
  lexicon: HALOT
  rationale: Introduces the summary statement for the Benjaminite clans just listed.
    English past tense 'were' fits the census-report style in context better than
    a bare demonstrative.
- source_word: בְנֵי בִנְיָמִן
  chosen: the sons of Benjamin
  alternatives:
  - the descendants of Benjamin
  - the children of Benjamin
  lexicon: HALOT
  rationale: Formal kinship language is retained. In this census context it refers
    to Benjamin's tribal descendants, but 'sons' best matches the Hebrew and preserves
    the genealogical register.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census material refers to clan divisions within the tribe.
    'Clans' is more precise and natural in modern English than 'families' here.
- source_word: וּפְקֻדֵיהֶם
  chosen: those numbered from them
  alternatives:
  - their numbered men
  - their enrollment
  - their mustered ones
  lexicon: HALOT
  rationale: 'From פקד in the passive/participle-like census sense: those counted
    or enrolled in the census. ''Those numbered from them'' preserves the idea without
    adding ''men'' explicitly, since the verse itself does not repeat it.'
- source_word: חֲמִשָּׁה וְאַרְבָּעִים אֶלֶף וְשֵׁשׁ מֵאוֹת
  chosen: forty-five thousand six hundred
  alternatives:
  - five and forty thousand and six hundred
  lexicon: HALOT
  rationale: Rendered in standard contemporary English number style while preserving
    the exact total.
