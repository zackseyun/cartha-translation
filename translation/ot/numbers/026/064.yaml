theological_decisions:
- issue: Gendered language in אִישׁ and בְּנֵי יִשְׂרָאֵל
  chosen_reading: Retain 'man' and 'sons of Israel' in the main text
  alternative_readings:
  - person
  - Israelites
  - people of Israel
  rationale: The verse refers specifically to the previously counted male generation,
    and the Hebrew uses masculine forms. Following the translation philosophy's gender-accurate
    principle, the masculine wording is preserved rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
