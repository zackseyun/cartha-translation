id: NUM.26.64
reference: Numbers 26:64
source:
  edition: WLC
  text: וּ/בְ/אֵ֨לֶּה֙ לֹא הָ֣יָה אִ֔ישׁ מִ/פְּקוּדֵ֣י מֹשֶׁ֔ה וְ/אַהֲרֹ֖ן הַ/כֹּהֵ֑ן
    אֲשֶׁ֥ר פָּקְד֛וּ אֶת בְּנֵ֥י יִשְׂרָאֵ֖ל בְּ/מִדְבַּ֥ר סִינָֽי־־׃
translation:
  text: But among these there was not a man from those counted by Moses and Aaron
    the priest, who counted the sons of Israel in the wilderness of Sinai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And among these'; the conjunction can be rendered simply as 'and,' but
      here it likely carries a contrast with the previous verse.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel,' a traditional familial designation for Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְאֵלֶּה
  chosen: But among these
  alternatives:
  - And among these
  - Among these
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally yields 'and/in these'
    or 'among these.' Given the contrast with the previous verse, 'But among these'
    best conveys the adversative force in natural English while preserving the locative
    sense.
- source_word: לֹא הָיָה אִישׁ
  chosen: there was not a man
  alternatives:
  - not one man was
  - there was no man
  lexicon: HALOT
  rationale: This idiom states the nonexistence of any individual. 'There was not
    a man' is a natural, fairly formal rendering that preserves the singular noun
    אִישׁ and the emphatic force of the statement.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - one
  lexicon: HALOT
  rationale: The Hebrew is singular masculine and here refers to individual males
    from the earlier census generation. Per the gender-accurate principle, 'man' is
    preferable to a gender-neutral substitute.
- source_word: מִפְּקוּדֵי
  chosen: from those counted by
  alternatives:
  - from the numbered ones of
  - from the census of
  lexicon: HALOT
  rationale: The form derives from פקד in the sense of mustering/counting. 'From those
    counted by' makes explicit that the reference is to persons included in the earlier
    census, not merely an abstract census record.
- source_word: הַכֹּהֵן
  chosen: the priest
  alternatives:
  - the high priest
  lexicon: HALOT
  rationale: The Hebrew says simply 'the priest.' Although Aaron functioned as high
    priest, the text does not include the adjective 'high,' so it should not be added.
- source_word: אֲשֶׁר פָּקְדוּ
  chosen: who counted
  alternatives:
  - whom they counted
  - who registered
  lexicon: HALOT
  rationale: The relative clause refers back to Moses and Aaron as the ones who conducted
    the counting. 'Who counted' is the most straightforward rendering of the verbal
    idea.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: A more literal rendering preserves the familial covenantal expression
    in the Hebrew. While 'Israelites' is idiomatic, 'sons of Israel' better reflects
    the source wording here.
- source_word: בְּמִדְבַּר סִינָי
  chosen: in the wilderness of Sinai
  alternatives:
  - in the Sinai wilderness
  - in the desert of Sinai
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert. 'Wilderness of Sinai' is
    a standard and clear rendering that preserves the construct relationship.
