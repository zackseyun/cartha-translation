id: NUM.26.26
reference: Numbers 26:26
source:
  edition: WLC
  text: בְּנֵ֣י זְבוּלֻן֮ לְ/מִשְׁפְּחֹתָ/ם֒ לְ/סֶ֗רֶד מִשְׁפַּ֨חַת֙ הַ/סַּרְדִּ֔י
    לְ/אֵל֕וֹן מִשְׁפַּ֖חַת הָ/אֵלֹנִ֑י לְ/יַ֨חְלְאֵ֔ל מִשְׁפַּ֖חַת הַ/יַּחְלְאֵלִֽי׃
translation:
  text: 'The sons of Zebulun by their clans: of Sered, the clan of the Sardites; of
    Elon, the clan of the Elonites; of Jahleel, the clan of the Jahleelites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to their clans.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Zebulun'; in this census context, this refers to Zebulun's
      tribal descendants.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Literal construct form 'sons of' introducing the tribal descendants.
    In a genealogical census context, 'sons of' is natural and preserves the Hebrew
    idiom better than the more interpretive 'descendants of.'
- source_word: זְבוּלֻן
  chosen: Zebulun
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal/personal name; names are
    transliterated rather than translated.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their clans
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in this census context refers to clan groupings within the
    tribe. 'By their clans' is concise, natural English and reflects the distributive
    force of לְ.
- source_word: לְסֶרֶד
  chosen: of Sered
  alternatives:
  - to Sered
  - for Sered
  lexicon: HALOT
  rationale: The prefixed ל introduces the clan ancestor/source in this list formula.
    English 'of Sered' best conveys descent or derivation in context.
- source_word: מִשְׁפַּחַת הַסַּרְדִּי
  chosen: the clan of the Sardites
  alternatives:
  - the family of the Sardite
  - the clan of the Seredites
  lexicon: HALOT
  rationale: The gentilic הַסַּרְדִּי denotes the clan derived from Sered. 'Sardites'
    follows the Hebrew gentilic form as represented in many English traditions; 'clan'
    is preferred over 'family' for census precision.
- source_word: לְאֵלֹן
  chosen: of Elon
  alternatives:
  - to Elon
  - for Elon
  lexicon: HALOT
  rationale: Same list formula as the preceding name; 'of Elon' communicates clan
    descent.
- source_word: מִשְׁפַּחַת הָאֵלֹנִי
  chosen: the clan of the Elonites
  alternatives:
  - the family of the Elonite
  lexicon: HALOT
  rationale: Gentilic form from Elon; rendered with the English plural ethnicon/clan
    name 'Elonites' for readability and consistency with census formulas.
- source_word: לְיַחְלְאֵל
  chosen: of Jahleel
  alternatives:
  - of Jachleel
  lexicon: HALOT
  rationale: Standard transliteration of the personal name. 'Jahleel' is a common
    English form and keeps the Hebrew name distinct.
- source_word: מִשְׁפַּחַת הַיַּחְלְאֵלִי
  chosen: the clan of the Jahleelites
  alternatives:
  - the family of the Jahleelite
  - the clan of the Jachleelites
  lexicon: HALOT
  rationale: Gentilic form from Jahleel; rendered as a plural clan designation in
    smooth English, matching the repeated census pattern.
