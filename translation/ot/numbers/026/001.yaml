id: NUM.26.1
reference: Numbers 26:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה וְ/אֶ֧ל אֶלְעָזָ֛ר בֶּן אַהֲרֹ֥ן הַ/כֹּהֵ֖ן לֵ/אמֹֽר־־׃
translation:
  text: And Yahweh spoke to Moses and to Eleazar son of Aaron the priest, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''said''; rendered ''spoke ... saying'' to preserve the speech formula naturally in English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: Though the verb is formally 'said,' English narrative style with the following לֵאמֹר is smoother as 'spoke ... saying,' preserving both the speech introduction and the infinitive construction without awkwardness.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition indicating the addressees of divine speech; 'to' is the natural modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Personal name transliterated by standard English convention.
- source_word: וְאֶל
  chosen: and to
  alternatives:
  - also to
  lexicon: HALOT
  rationale: The conjunction plus preposition coordinates Eleazar as a second addressee; 'and to' preserves the Hebrew structure clearly.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Personal name transliterated by standard English convention.
- source_word: בֶּן אַהֲרֹן
  chosen: son of Aaron
  alternatives:
  - the son of Aaron
  lexicon: HALOT
  rationale: Construct chain identifying Eleazar by lineage. English omits the article naturally while preserving the filial relationship.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: 'Definite title appositional to Aaron in context: ''Aaron the priest.'' This is the most natural way to preserve the Hebrew definiteness and identification.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Conventional rendering of the infinitive introducing direct speech. 'Saying' preserves the formal discourse marker and anticipates the content in the next verse.
