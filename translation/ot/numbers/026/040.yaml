id: NUM.26.40
reference: Numbers 26:40
source:
  edition: WLC
  text: וַ/יִּהְי֥וּ בְנֵי בֶ֖לַע אַ֣רְדְּ וְ/נַעֲמָ֑ן מִשְׁפַּ֨חַת֙ הָֽ/אַרְדִּ֔י
    לְ/נַֽעֲמָ֔ן מִשְׁפַּ֖חַת הַֽ/נַּעֲמִֽי־׃
translation:
  text: 'And the sons of Bela were Ard and Naaman: from Ard, the clan of the Ardite;
    from Naaman, the clan of the Naamite.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the Naamite' is the gentilicial form derived from Naaman; alternatively,
      it could be rendered more transparently as 'the Naamanite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: And ... were
  alternatives:
  - Now ... were
  - And there were
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the genealogical statement. 'And
    ... were' preserves the narrative/listing flow without adding emphasis beyond
    the Hebrew.
- source_word: בְנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: In a tribal genealogy, בנים most naturally refers to male lineal descendants
    or named sons. 'Sons of' is the most direct and preserves the genealogical register.
- source_word: בֶלַע
  chosen: Bela
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: אַרְדְּ
  chosen: Ard
  rationale: Personal name transliterated. Although Genesis 46:21 has 'Ard' among
    Benjamin's sons, here the form is simply preserved as a proper name.
- source_word: וְנַעֲמָן
  chosen: and Naaman
  rationale: Personal name transliterated; conjunction retained straightforwardly.
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  lexicon: HALOT
  rationale: In census and tribal-allotment contexts in Numbers, מִשְׁפָּחָה denotes
    a clan-level kinship unit within a tribe. 'Clan' is more precise than the broader
    'family' in modern English.
- source_word: הָאַרְדִּי
  chosen: the Ardite
  alternatives:
  - the family of the Ardite
  - the Ardites
  lexicon: HALOT
  rationale: The gentilicial form identifies the clan descending from Ard. 'The clan
    of the Ardite' mirrors the Hebrew construction and standard English rendering
    of such patronymics.
- source_word: לְנַעֲמָן
  chosen: from Naaman
  alternatives:
  - for Naaman
  lexicon: HALOT
  rationale: 'The prefixed ל in this genealogical formula marks derivation or affiliation:
    the clan traced to Naaman. ''From Naaman'' communicates descent naturally in English.'
- source_word: הַנַּעֲמִי
  chosen: the Naamite
  alternatives:
  - the Naamanite
  lexicon: HALOT
  rationale: The gentilicial adjective from Naaman is conventionally rendered 'Naamite'
    in English. This reflects the Hebrew adjectival form rather than mechanically
    reproducing the full personal name.
