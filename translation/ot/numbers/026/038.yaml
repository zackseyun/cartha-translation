id: NUM.26.38
reference: Numbers 26:38
source:
  edition: WLC
  text: בְּנֵ֣י בִנְיָמִן֮ לְ/מִשְׁפְּחֹתָ/ם֒ לְ/בֶ֗לַע מִשְׁפַּ֨חַת֙ הַ/בַּלְעִ֔י
    לְ/אַשְׁבֵּ֕ל מִשְׁפַּ֖חַת הָֽ/אַשְׁבֵּלִ֑י לַ/אֲחִירָ֕ם מִשְׁפַּ֖חַת הָ/אֲחִירָמִֽי׃
translation:
  text: 'The sons of Benjamin by their clans: of Bela, the clan of the Belaites; of
    Ashbel, the clan of the Ashbelites; of Ahiram, the clan of the Ahiramites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ahiram in the Masoretic Text corresponds to 'Ahiam' in some textual traditions
      and English versions; the main text follows the Hebrew reading here.
    reason: textual_variant
lexical_decisions:
- source_word: בְּנֵי בִנְיָמִן
  chosen: The sons of Benjamin
  alternatives:
  - The descendants of Benjamin
  - The children of Benjamin
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of.' In a genealogical census context it
    can denote descendants, but 'sons of Benjamin' preserves the formal structure
    and matches the tribal listing style without obscuring meaning.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their clans
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה here refers to clan-level subdivisions within the tribe.
    'By their clans' is concise, natural English and accurately reflects the census
    formula.
- source_word: לְבֶלַע
  chosen: of Bela
  alternatives:
  - to Bela
  - for Bela
  lexicon: HALOT
  rationale: The prefixed ל introduces each descendant line in this list. In English
    genealogical enumeration, 'of Bela' best conveys descent/source rather than direction.
- source_word: מִשְׁפַּחַת הַבַּלְעִי
  chosen: the clan of the Belaites
  alternatives:
  - the Belaite clan
  - the family of the Belaite
  lexicon: HALOT
  rationale: The gentilic form הַבַּלְעִי denotes the clan derived from Bela. 'Belaites'
    is the standard English formation from the proper name Bela and preserves the
    clan designation.
- source_word: לְאַשְׁבֵּל
  chosen: of Ashbel
  alternatives:
  - to Ashbel
  - for Ashbel
  lexicon: HALOT
  rationale: As with Bela, the ל marks the named ancestor in the clan list. 'Of Ashbel'
    is the most idiomatic genealogical rendering.
- source_word: מִשְׁפַּחַת הָאַשְׁבֵּלִי
  chosen: the clan of the Ashbelites
  alternatives:
  - the Ashbelite clan
  - the family of the Ashbelite
  lexicon: HALOT
  rationale: The gentilic adjective identifies the clan descending from Ashbel. 'Ashbelites'
    is a clear transliterated people-name in English.
- source_word: לַאֲחִירָם
  chosen: of Ahiram
  alternatives:
  - of Ahiam
  lexicon: HALOT
  rationale: The Masoretic Text reads אֲחִירָם, conventionally transliterated 'Ahiram.'
    The prefixed ל is rendered idiomatically as 'of' in this genealogical sequence.
- source_word: מִשְׁפַּחַת הָאֲחִירָמִי
  chosen: the clan of the Ahiramites
  alternatives:
  - the Ahiramite clan
  lexicon: HALOT
  rationale: The gentilic form from Ahiram is best represented by the English plural
    ethnicon 'Ahiramites,' matching the pattern of the surrounding clan names.
