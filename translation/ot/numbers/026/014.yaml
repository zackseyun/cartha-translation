id: NUM.26.14
reference: Numbers 26:14
source:
  edition: WLC
  text: אֵ֖לֶּה מִשְׁפְּחֹ֣ת הַ/שִּׁמְעֹנִ֑י שְׁנַ֧יִם וְ/עֶשְׂרִ֛ים אֶ֖לֶף וּ/מָאתָֽיִם׃ס
translation:
  text: 'These are the clans of the Simeonites: twenty-two thousand two hundred.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: Deictic plural pronoun introducing the census summary. Presentative English
    'These are' fits the nominal clause in context.
- source_word: מִשְׁפְּחֹת
  chosen: clans
  alternatives:
  - families
  lexicon: HALOT
  rationale: In tribal and census contexts, מִשְׁפָּחָה refers to kinship subdivisions
    within a tribe; 'clans' is more precise than the broader 'families' in modern
    English.
- source_word: הַשִּׁמְעֹנִי
  chosen: the Simeonites
  alternatives:
  - the Simeonite clan
  - the descendants of Simeon
  lexicon: HALOT
  rationale: Gentilic singular with article used collectively for the tribal group.
    English plural ethnicon 'the Simeonites' naturally conveys the collective sense.
- source_word: שְׁנַיִם וְעֶשְׂרִים
  chosen: twenty-two
  alternatives:
  - two and twenty
  lexicon: HALOT
  rationale: Standard English rendering of the Hebrew compound number.
- source_word: אֶלֶף
  chosen: thousand
  lexicon: HALOT
  rationale: Cardinal number term in a census total; rendered straightforwardly as
    'thousand'.
- source_word: וּמָאתַיִם
  chosen: two hundred
  lexicon: HALOT
  rationale: Completes the census figure; standard English cardinal rendering.
