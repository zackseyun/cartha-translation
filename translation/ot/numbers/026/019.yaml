id: NUM.26.19
reference: Numbers 26:19
source:
  edition: WLC
  text: בְּנֵ֥י יְהוּדָ֖ה עֵ֣ר וְ/אוֹנָ֑ן וַ/יָּ֥מָת עֵ֛ר וְ/אוֹנָ֖ן בְּ/אֶ֥רֶץ כְּנָֽעַן׃
translation:
  text: 'The sons of Judah: Er and Onan. But Er and Onan died in the land of Canaan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And Er and Onan died in the land of Canaan.' The Hebrew conjunction
      can be rendered simply as 'and'; 'but' is used in the main text to reflect the
      contrastive sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: Construct plural of בֵּן in a genealogical listing. 'Sons of' is the
    most direct and natural rendering here, preserving the male-line genealogical
    sense rather than broadening to 'children' or 'descendants'.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to the translation philosophy
    of transliterating names.
- source_word: עֵר
  chosen: Er
  lexicon: HALOT
  rationale: Proper personal name; standard English transliteration.
- source_word: וְ/אוֹנָן
  chosen: and Onan
  lexicon: HALOT
  rationale: Conjunction plus proper name. Rendered straightforwardly as coordination
    in the list.
- source_word: וַ/יָּמָת
  chosen: But ... died
  alternatives:
  - and ... died
  - then ... died
  lexicon: HALOT
  rationale: Wayyiqtol of מוּת, narrating a past event. English 'died' is the plain
    lexical equivalent. 'But' is supplied to mark the shift from listing Judah's sons
    to noting the exception that two of them died, which fits the discourse flow better
    than a bare 'and' in modern English.
- source_word: בְּ/אֶרֶץ
  chosen: in the land of
  alternatives:
  - in
  - in the country of
  lexicon: HALOT
  rationale: The preposition ב plus אֶרֶץ is naturally rendered 'in the land of' in
    geographic expressions, preserving the idiomatic Hebrew sense.
- source_word: כְּנָעַן
  chosen: Canaan
  lexicon: HALOT
  rationale: Proper place name; standard English transliteration.
