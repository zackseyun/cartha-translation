id: NUM.26.4
reference: Numbers 26:4
source:
  edition: WLC
  text: מִ/בֶּ֛ן עֶשְׂרִ֥ים שָׁנָ֖ה וָ/מָ֑עְלָ/ה כַּ/אֲשֶׁר֩ צִוָּ֨ה יְהוָ֤ה אֶת מֹשֶׁה֙ וּ/בְנֵ֣י יִשְׂרָאֵ֔ל הַ/יֹּצְאִ֖ים מֵ/אֶ֥רֶץ מִצְרָֽיִם־׃
translation:
  text: From twenty years old and upward, as Yahweh commanded Moses and the Israelites who came out of the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''sons of Israel''; rendered ''Israelites'' as the standard collective name for the people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the land of Egypt.'
    reason: lexical_alternative
  - marker: c
    text: '''the LORD'' renders the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמָעְלָה
  chosen: From twenty years old and upward
  alternatives:
  - From twenty years old and above
  - Those twenty years old and older
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'from a son of twenty years and upward,' a standard age-threshold formula. 'From twenty years old and upward' preserves the formal structure while remaining natural English.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison to the prior divine command. 'As' is concise and natural here.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - had commanded
  - instructed
  lexicon: HALOT
  rationale: The verb denotes giving a command. 'Commanded' best matches the force of the Hebrew without softening it.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת מֹשֶׁה
  chosen: Moses
  alternatives:
  - Moses (direct-object marker untranslated)
  lexicon: HALOT
  rationale: The particle אֶת marks the direct object and is not represented in English; the sense is simply that the LORD commanded Moses.
- source_word: וּבְנֵי יִשְׂרָאֵל
  chosen: and the Israelites
  alternatives:
  - and the sons of Israel
  - and the children of Israel
  lexicon: HALOT
  rationale: Though literally 'and the sons of Israel,' the phrase is the standard ethnonym for the people as a whole. 'The Israelites' is natural modern English and accurately conveys collective reference.
- source_word: הַיֹּצְאִים
  chosen: who came out
  alternatives:
  - who were coming out
  - those who came out
  lexicon: HALOT
  rationale: The participle functions substantivally to identify the Israelites as the exodus generation. English relative clause 'who came out' communicates this clearly.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: of the land of Egypt
  alternatives:
  - from the land of Egypt
  - out of Egypt
  lexicon: HALOT
  rationale: With 'came out' already carrying the motion, 'of the land of Egypt' yields smooth English in apposition to the relative clause. The full phrase preserves the geographic expression of the Hebrew.
