id: NUM.26.5
reference: Numbers 26:5
source:
  edition: WLC
  text: רְאוּבֵ֖ן בְּכ֣וֹר יִשְׂרָאֵ֑ל בְּנֵ֣י רְאוּבֵ֗ן חֲנוֹךְ֙ מִשְׁפַּ֣חַת הַ/חֲנֹכִ֔י
    לְ/פַלּ֕וּא מִשְׁפַּ֖חַת הַ/פַּלֻּאִֽי׃
translation:
  text: 'Reuben, the firstborn of Israel: the sons of Reuben were Hanoch, from whom
    came the clan of the Hanochites; of Pallu, the clan of the Palluites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more formally, ''the sons of Reuben: Hanoch, the clan of the Hanochites;
      of Pallu, the clan of the Palluites.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכֹר
  chosen: the firstborn
  alternatives:
  - firstborn son
  lexicon: HALOT
  rationale: The construct with יִשְׂרָאֵל identifies Reuben as Israel's firstborn.
    'The firstborn' is natural English and preserves the familial/status sense without
    adding 'son,' which is implied.
- source_word: בְּנֵי רְאוּבֵן
  chosen: the sons of Reuben were
  alternatives:
  - the descendants of Reuben
  - the children of Reuben
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of.' In this genealogical census context,
    the phrase introduces male lineal descendants/clan founders. 'The sons of Reuben
    were' is both formally close and idiomatic.
- source_word: חֲנוֹךְ
  chosen: Hanoch
  alternatives:
  - Hanok
  rationale: Personal names are transliterated by standard English convention. 'Hanoch'
    is the familiar transliteration for this Hebrew name in English Bible usage.
- source_word: מִשְׁפַּחַת
  chosen: clan of
  alternatives:
  - family of
  - the clan of
  lexicon: HALOT
  rationale: In census and tribal-allotment contexts, מִשְׁפָּחָה denotes a kinship
    subdivision within a tribe. 'Clan' best captures the social unit more precisely
    than the broader 'family.'
- source_word: הַחֲנֹכִי
  chosen: the Hanochites
  alternatives:
  - the Hanochite clan
  - the Hanokites
  lexicon: HALOT
  rationale: The gentilicial form names the subgroup descended from Hanoch. English
    normally renders such forms with the plural ethnicon ending '-ites' in genealogical
    lists.
- source_word: לְפַלּוּא
  chosen: of Pallu
  alternatives:
  - Pallu
  - for Pallu
  lexicon: HALOT
  rationale: The prefixed ל here introduces the next clan founder in a list, functioning
    idiomatically as 'of/from Pallu' rather than a directional 'to/for.' 'Of Pallu'
    yields smooth English while preserving the genealogical relation.
- source_word: הַפַּלֻּאִי
  chosen: the Palluites
  alternatives:
  - the Palluite clan
  lexicon: HALOT
  rationale: As with הַחֲנֹכִי, this gentilicial form denotes the clan descending
    from Pallu. 'Palluites' is the conventional English rendering.
