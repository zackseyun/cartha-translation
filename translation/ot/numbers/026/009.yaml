id: NUM.26.9
reference: Numbers 26:9
source:
  edition: WLC
  text: וּ/בְנֵ֣י אֱלִיאָ֔ב נְמוּאֵ֖ל וְ/דָתָ֣ן וַ/אֲבִירָ֑ם הֽוּא דָתָ֨ן וַ/אֲבִירָ֜ם קרואי הָ/עֵדָ֗ה אֲשֶׁ֨ר הִצּ֜וּ עַל מֹשֶׁ֤ה וְ/עַֽל אַהֲרֹן֙ בַּ/עֲדַת קֹ֔רַח בְּ/הַצֹּתָ֖/ם עַל יְהוָֽה־־־־־׃
translation:
  text: 'And the sons of Eliab: Nemuel, and Dathan, and Abiram. These are that Dathan and Abiram, the called ones of the congregation, who contended against Moses and against Aaron in the company of Korah, when they contended against Yahweh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who were chosen men of the congregation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  - Now the sons of
  lexicon: HALOT
  rationale: בנים in a genealogical listing is best rendered 'sons of' rather than the broader 'children of,' since specific male descendants are named.
- source_word: הוּא
  chosen: These are
  alternatives:
  - This is
  - They are
  lexicon: HALOT
  rationale: Although formally singular ('he/this'), Hebrew often uses הוּא resumptively or identificationally. In English, with two names following, 'These are' communicates the referent naturally and accurately.
- source_word: קרואי העדה
  chosen: who were called by the congregation
  alternatives:
  - chosen men of the congregation
  - called ones of the assembly
  - summoned by the assembly
  lexicon: HALOT
  rationale: The passive participle from קרא literally means 'called.' In this context it likely denotes men summoned/recognized by the assembly. The rendering preserves the lexical sense without over-interpreting it as an official title. An alternative with more interpretive force is preserved in a footnote.
- source_word: העדה
  chosen: the congregation
  alternatives:
  - the assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the gathered community of Israel. 'Congregation' fits the census/wilderness context well, while 'assembly' remains a viable alternative.
- source_word: הִצּוּ
  chosen: contended against
  alternatives:
  - strove against
  - set themselves against
  - quarreled with
  lexicon: HALOT
  rationale: From נצה, the verb denotes strife or contention. 'Contended against' is clear modern English and preserves the adversarial force.
- source_word: בַּעֲדַת קֹרַח
  chosen: in the company of Korah
  alternatives:
  - in the congregation of Korah
  - in the company of Korah's followers
  lexicon: HALOT
  rationale: The phrase identifies the setting/association of their rebellion. 'In the company of Korah' is idiomatic and avoids implying a formal congregation distinct from Israel as a whole.
- source_word: בְּהַצֹּתָם
  chosen: when they contended
  alternatives:
  - when they strove
  - in their contending
  - when they rebelled
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys temporal circumstance here. Repeating 'contended' reflects the same Hebrew root as earlier in the verse and preserves lexical consistency.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
