- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of קרואי העדה
  chosen_reading: who were called by the congregation
  alternative_readings:
  - chosen men of the congregation
  rationale: The Hebrew can be understood either more literally ('called by the congregation') or more idiomatically as recognized leaders/chosen representatives. The main text keeps the lexical form; the more interpretive alternative is preserved in a footnote.
