theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the
    stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of קרואי העדה
  chosen_reading: who were called by the congregation
  alternative_readings:
  - chosen men of the congregation
  rationale: The Hebrew can be understood either more literally ('called by the congregation')
    or more idiomatically as recognized leaders/chosen representatives. The main text
    keeps the lexical form; the more interpretive alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
