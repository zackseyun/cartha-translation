id: NUM.26.63
reference: Numbers 26:63
source:
  edition: WLC
  text: אֵ֚לֶּה פְּקוּדֵ֣י מֹשֶׁ֔ה וְ/אֶלְעָזָ֖ר הַ/כֹּהֵ֑ן אֲשֶׁ֨ר פָּֽקְד֜וּ אֶת
    בְּנֵ֤י יִשְׂרָאֵל֙ בְּ/עַֽרְבֹ֣ת מוֹאָ֔ב עַ֖ל יַרְדֵּ֥ן יְרֵחֽוֹ־׃
translation:
  text: These are the ones counted by Moses and Eleazar the priest, who counted the
    sons of Israel in the plains of Moab by the Jordan at Jericho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Hebrew reads 'the sons
      of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'beside the Jordan opposite Jericho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקוּדֵי
  chosen: the ones counted
  alternatives:
  - those registered
  - those numbered
  - the census of
  lexicon: HALOT
  rationale: Construct form from פקד in a census context refers to persons enrolled/countable
    in the census. 'The ones counted' is natural English and preserves the personal
    reference better than the more abstract 'the census of.'
- source_word: הַכֹּהֵן
  chosen: the priest
  alternatives:
  - the high priest
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'the priest,' not 'the high priest.' Although
    Eleazar functionally holds the high-priestly office in context, the translation
    should not import a title not present in the text.
- source_word: פָּקְדוּ
  chosen: counted
  alternatives:
  - registered
  - numbered
  - took a census of
  lexicon: HALOT
  rationale: Same root as פְּקוּדֵי; 'counted' preserves lexical consistency and fits
    the census setting. 'Took a census of' is possible but less direct for the verbal
    repetition in Hebrew.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine plural construct is retained
    as 'sons of Israel.' This also preserves the traditional covenantal/tribal sense
    of descent better than the more generalized 'Israelites.'
- source_word: בְּעַרְבֹת מוֹאָב
  chosen: in the plains of Moab
  alternatives:
  - in the steppes of Moab
  - in the plains of Moabland
  lexicon: HALOT
  rationale: עַרְבוֹת in this geographical expression is commonly rendered 'plains'
    or 'steppes.' 'Plains of Moab' is idiomatic and clear in modern English.
- source_word: עַל יַרְדֵּן יְרֵחוֹ
  chosen: by the Jordan at Jericho
  alternatives:
  - beside the Jordan opposite Jericho
  - on the Jordan of Jericho
  lexicon: HALOT
  rationale: The phrase locates the plains of Moab along the Jordan in relation to
    Jericho. 'By the Jordan at Jericho' is concise and readable, though 'opposite
    Jericho' is also possible depending on how the preposition is nuanced.
