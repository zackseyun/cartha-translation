theological_decisions:
- issue: Gendered covenantal expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  - the children of Israel
  rationale: The source is grammatically masculine and genealogically framed. Following
    the translation philosophy's gender-accurate principle, the masculine form is
    preserved rather than neutralized, while a footnote can clarify the broader referent
    if needed.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Official title of Eleazar
  chosen_reading: the priest
  alternative_readings:
  - the high priest
  rationale: No doctrinal issue is at stake, but the translation avoids expanding
    the title beyond the Hebrew wording. This preserves textual restraint and avoids
    importing interpretive detail.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 1
