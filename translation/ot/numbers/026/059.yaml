theological_decisions:
- issue: Genealogical force of 'daughter of Levi'
  chosen_reading: Retain the literal phrase 'a daughter of Levi' in the main text
    without harmonizing it to 'descendant.'
  alternative_readings:
  - a descendant of Levi
  rationale: The verse's wording should stand as given rather than being adjusted
    to solve chronological or genealogical questions. This preserves the source text's
    form and leaves interpretation to readers and notes.
  doctrine_reference: Translation philosophy §§1, 3, 5
