id: NUM.26.59
reference: Numbers 26:59
source:
  edition: WLC
  text: וְ/שֵׁ֣ם אֵ֣שֶׁת עַמְרָ֗ם יוֹכֶ֨בֶד֙ בַּת לֵוִ֔י אֲשֶׁ֨ר יָלְדָ֥ה אֹתָ֛/הּ
    לְ/לֵוִ֖י בְּ/מִצְרָ֑יִם וַ/תֵּ֣לֶד לְ/עַמְרָ֗ם אֶֽת אַהֲרֹן֙ וְ/אֶת מֹשֶׁ֔ה וְ/אֵ֖ת
    מִרְיָ֥ם אֲחֹתָֽ/ם׀־־־׃
translation:
  text: The name of Amram’s wife was Jochebed, a daughter of Levi, who was born to
    Levi in Egypt. She bore to Amram Aaron and Moses, and Miriam their sister.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “a daughter of Levi.” In genealogical contexts, “daughter”
      can sometimes function more broadly for a female descendant.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, “whom she bore to Levi in Egypt,” with the mother left
      implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֵׁם
  chosen: The name
  alternatives:
  - And the name
  - Now the name
  lexicon: HALOT
  rationale: Standard introductory formula; English omits a wooden initial 'and' for
    natural style while preserving the clause's function.
- source_word: אֵשֶׁת עַמְרָם
  chosen: of Amram’s wife
  alternatives:
  - the wife of Amram
  lexicon: HALOT
  rationale: 'Construct chain indicates possession: ''the name of Amram''s wife.''
    This is the most natural English rendering in context.'
- source_word: יוֹכֶבֶד
  chosen: Jochebed
  rationale: Personal name transliterated according to standard English convention,
    per translation philosophy.
- source_word: בַּת לֵוִי
  chosen: a daughter of Levi
  alternatives:
  - the daughter of Levi
  - a descendant of Levi
  lexicon: HALOT
  rationale: Hebrew literally reads 'daughter of Levi.' Although genealogical usage
    can sometimes mean female descendant, the plain lexical rendering is retained
    in the main text; the genealogical difficulty is not resolved by paraphrase.
- source_word: אֲשֶׁר יָלְדָה אֹתָהּ לְלֵוִי בְּמִצְרַיִם
  chosen: who was born to Levi in Egypt
  alternatives:
  - whom she bore to Levi in Egypt
  - who was borne to Levi in Egypt
  lexicon: HALOT
  rationale: The Hebrew uses a 3fs verb with feminine object suffix ('whom she bore')
    but leaves the mother implicit. English naturally shifts to passive, 'who was
    born to Levi in Egypt,' preserving the sense without supplying an explicit unnamed
    mother.
- source_word: וַתֵּלֶד לְעַמְרָם
  chosen: She bore to Amram
  alternatives:
  - She bore for Amram
  - She gave birth to
  lexicon: HALOT
  rationale: ילד with ל marks the husband/father relation here. 'She bore to Amram'
    is concise and close to the Hebrew; 'gave birth to' would require restructuring
    and slightly weaken the explicit relation.
- source_word: אֶת אַהֲרֹן וְאֶת מֹשֶׁה
  chosen: Aaron and Moses
  rationale: Direct-object markers are untranslated; names are transliterated in standard
    English form.
- source_word: וְאֵת מִרְיָם אֲחֹתָם
  chosen: and Miriam their sister
  alternatives:
  - and their sister Miriam
  lexicon: HALOT
  rationale: Hebrew apposition places 'Miriam' before 'their sister.' English can
    preserve that order smoothly as 'Miriam their sister.'
