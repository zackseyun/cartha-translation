id: NUM.26.55
reference: Numbers 26:55
source:
  edition: WLC
  text: אַךְ בְּ/גוֹרָ֕ל יֵחָלֵ֖ק אֶת הָ/אָ֑רֶץ לִ/שְׁמ֥וֹת מַטּוֹת אֲבֹתָ֖/ם יִנְחָֽלוּ־־־׃
translation:
  text: Only by lot shall the land be divided; they shall inherit according to the
    names of the tribes of their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their ancestors.' The Hebrew is literally 'their fathers,' referring
      to paternal ancestral lines within the tribes.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Only
  alternatives:
  - Surely
  - Nevertheless
  - However
  lexicon: HALOT
  rationale: 'Here אַךְ restricts the manner of apportionment, emphasizing exclusivity:
    the land is to be divided only/by no other means than lot. ''Only'' best captures
    the restrictive force in clear modern English.'
- source_word: בְּגוֹרָל
  chosen: by lot
  alternatives:
  - by the lot
  - through lot-casting
  lexicon: HALOT
  rationale: גוֹרָל refers to the lot used for allocation decisions. 'By lot' is the
    standard and natural English rendering for the instrumental beth here.
- source_word: יֵחָלֵק
  chosen: shall be divided
  alternatives:
  - shall be apportioned
  - shall be allotted
  lexicon: HALOT
  rationale: 'Nifal imperfect of חלק is passive/reflexive: the land is to be divided/apportioned.
    ''Shall be divided'' preserves the passive sense and remains idiomatic; the object
    ''the land'' makes the allocation context clear.'
- source_word: אֶת הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ/land
  lexicon: HALOT
  rationale: Direct object marker plus 'the land.' In Numbers this refers specifically
    to the land to be inherited, but 'the land' is sufficient and faithful without
    over-specifying.
- source_word: לִשְׁמוֹת
  chosen: according to the names of
  alternatives:
  - by the names of
  - to the names of
  lexicon: HALOT
  rationale: 'The preposition ל here indicates standard/reference: inheritance is
    assigned with reference to the names. ''According to the names of'' is the most
    natural English expression.'
- source_word: מַטּוֹת
  chosen: tribes
  alternatives:
  - staffs
  - tribal divisions
  lexicon: HALOT
  rationale: Though the noun can literally mean 'staffs/rods,' in this context it
    denotes tribal groupings. 'Tribes' is the established and contextually correct
    sense.
- source_word: אֲבֹתָם
  chosen: their fathers
  alternatives:
  - their ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'their fathers,' referring to paternal ancestral
    houses/lines. Per the translation philosophy's gender-accurate principle, the
    masculine familial term should be retained rather than neutralized to 'ancestors'
    in the main text.
- source_word: יִנְחָלוּ
  chosen: they shall inherit
  alternatives:
  - they shall receive as an inheritance
  - they shall take possession as inheritance
  lexicon: HALOT
  rationale: From נחל in the Qal, meaning to receive/possess as an inheritance. 'They
    shall inherit' is concise, accurate, and idiomatic.
