theological_decisions:
- issue: Gendered ancestral terminology in אֲבֹתָם
  chosen_reading: their fathers
  alternative_readings:
  - their ancestors
  rationale: The Hebrew specifically uses the masculine familial term 'fathers' in
    a tribal-inheritance context. Following the stated gender-accurate policy, the
    translation preserves the paternal lineage emphasis rather than replacing it with
    a gender-neutral term in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
