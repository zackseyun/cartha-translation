id: NUM.26.56
reference: Numbers 26:56
source:
  edition: WLC
  text: עַל פִּי֙ הַ/גּוֹרָ֔ל תֵּחָלֵ֖ק נַחֲלָת֑/וֹ בֵּ֥ין רַ֖ב לִ/מְעָֽט־׃ס
translation:
  text: According to the lot, his inheritance shall be divided between the larger
    and the smaller.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By the lot his inheritance shall be apportioned among the many and the
      few.' The Hebrew contrasts a larger group with a smaller one in the distribution
      process.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל פִּי
  chosen: According to
  alternatives:
  - By
  - On the basis of
  lexicon: HALOT
  rationale: The idiom עַל פִּי literally means 'upon the mouth of,' but idiomatically
    means 'according to' or 'by the decision of.' 'According to' is natural English
    and preserves the sense of conformity to the lot's determination.
- source_word: הַגּוֹרָל
  chosen: the lot
  alternatives:
  - the casting of lots
  lexicon: HALOT
  rationale: גוֹרָל refers to the lot used for allocation. 'The lot' is the most direct
    rendering and fits the context of land apportionment by lot.
- source_word: תֵּחָלֵק
  chosen: shall be divided
  alternatives:
  - shall be apportioned
  - shall be allotted
  lexicon: HALOT
  rationale: The Niphal form of חלק here is passive/reflexive, indicating that the
    inheritance is to be divided/apportioned. 'Shall be divided' is straightforward
    and preserves the passive sense; 'apportioned' is possible but slightly more interpretive.
- source_word: נַחֲלָתוֹ
  chosen: his inheritance
  alternatives:
  - its inheritance
  - their inheritance
  lexicon: HALOT
  rationale: The singular noun with 3ms suffix is formally 'his inheritance.' In context
    the referent is distributive, applying to each tribal allotment. Retaining 'his'
    follows the Hebrew form and the project's gender-accurate philosophy, while English
    readers can understand it distributively.
- source_word: בֵּין
  chosen: between
  alternatives:
  - among
  lexicon: HALOT
  rationale: בֵּין marks the relation between two comparative groups here. 'Between'
    is the most literal and suitable rendering with the paired expressions that follow.
- source_word: רַב
  chosen: the larger
  alternatives:
  - the many
  - the great
  - the numerous
  lexicon: HALOT
  rationale: In this census-and-allotment context, רַב contrasts with מְעָט in terms
    of relative size/number. 'The larger' captures the comparative sense idiomatically
    in English without over-specifying whether size refers to population or allotment.
- source_word: לִמְעָט
  chosen: the smaller
  alternatives:
  - the few
  - the lesser
  lexicon: HALOT
  rationale: The preposition ל here marks the contrasting counterpart to רַב. 'The
    smaller' pairs naturally with 'the larger' and reflects the contrast in relative
    size/number.
