id: NUM.26.53
reference: Numbers 26:53
source:
  edition: WLC
  text: לָ/אֵ֗לֶּה תֵּחָלֵ֥ק הָ/אָ֛רֶץ בְּ/נַחֲלָ֖ה בְּ/מִסְפַּ֥ר שֵׁמֽוֹת׃
translation:
  text: To these the land shall be divided as an inheritance according to the number
    of names.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the number of persons'; literally, 'according to the number
      of names.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָאֵלֶּה
  chosen: To these
  alternatives:
  - For these
  - Among these
  lexicon: HALOT
  rationale: The preposition ל with the demonstrative plural points to the recipients
    of the allotment. 'To these' best captures the dative sense in natural English
    while preserving the referential force of the Hebrew.
- source_word: תֵּחָלֵק
  chosen: shall be divided
  alternatives:
  - shall be apportioned
  - shall be allotted
  lexicon: HALOT
  rationale: Nifal imperfect of חלק is passive/reflexive, indicating the land is to
    be divided/apportioned. 'Shall be divided' is a clear, fairly formal rendering;
    the allotment nuance is supplied by the inheritance language that follows.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the territory
  lexicon: HALOT
  rationale: In context of Israel's tribal allotments, 'the land' is the standard
    and natural rendering for הארץ.
- source_word: בְּנַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as a possession
  lexicon: HALOT
  rationale: נחלה denotes inherited property or allotted possession. 'As an inheritance'
    preserves both the legal and covenantal sense without overexpansion.
- source_word: בְּמִסְפַּר
  chosen: according to the number of
  alternatives:
  - by the number of
  - in proportion to the number of
  lexicon: HALOT
  rationale: The preposition ב here expresses standard or measure. 'According to the
    number of' is idiomatic and accurately conveys distribution based on count.
- source_word: שֵׁמוֹת
  chosen: names
  alternatives:
  - persons
  - those listed by name
  lexicon: HALOT
  rationale: The Hebrew literally says 'names.' Since the census context counts individuals/families
    by name, retaining 'names' preserves the source wording and avoids interpretive
    overtranslation.
