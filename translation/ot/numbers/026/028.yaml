id: NUM.26.28
reference: Numbers 26:28
source:
  edition: WLC
  text: בְּנֵ֥י יוֹסֵ֖ף לְ/מִשְׁפְּחֹתָ֑/ם מְנַשֶּׁ֖ה וְ/אֶפְרָֽיִם׃
translation:
  text: 'The sons of Joseph by their clans: Manasseh and Ephraim.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'according to their clans.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - descendants of
  - children of
  lexicon: HALOT
  rationale: Construct plural of בֵּן. In genealogical/census contexts, 'sons of'
    is the standard and most transparent rendering, preserving the formal lineage
    language better than the broader 'descendants' or 'children.'
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Proper personal name; transliterated according to standard English convention
    per translation philosophy.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their clans
  - for their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census/tribal organization commonly denotes 'clan' rather
    than the narrower modern sense of 'family.' The prefixed לְ here marks classification/distribution,
    so 'by their clans' is concise modern English while preserving the organizational
    sense.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Proper tribal/personal name; transliterated by standard convention.
- source_word: וְאֶפְרָיִם
  chosen: and Ephraim
  rationale: Conjunction plus proper tribal/personal name; rendered straightforwardly
    as coordination of Joseph's two sons/tribal branches.
