theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  rationale: The Hebrew is literally 'sons of Israel.' In keeping with gender-accurate
    over gender-neutral policy and original-language primacy, the familial expression
    is preserved here rather than generalized to 'Israelites.'
