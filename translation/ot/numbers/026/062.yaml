id: NUM.26.62
reference: Numbers 26:62
source:
  edition: WLC
  text: וַ/יִּהְי֣וּ פְקֻדֵי/הֶ֗ם שְׁלֹשָׁ֤ה וְ/עֶשְׂרִים֙ אֶ֔לֶף כָּל זָכָ֖ר מִ/בֶּן
    חֹ֣דֶשׁ וָ/מָ֑עְלָ/ה כִּ֣י לֹ֣א הָתְפָּקְד֗וּ בְּ/תוֹךְ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל כִּ֠י
    לֹא נִתַּ֤ן לָ/הֶם֙ נַחֲלָ֔ה בְּ/ת֖וֹךְ בְּנֵ֥י יִשְׂרָאֵֽל־־׀־׃
translation:
  text: And those counted from among them were twenty-three thousand, every male from
    a month old and upward, because they were not counted among the sons of Israel,
    because no inheritance was given to them among the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the Israelites' in both occurrences of 'among the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְקֻדֵיהֶם
  chosen: those counted from among them
  alternatives:
  - their numbered ones
  - their census total
  lexicon: HALOT
  rationale: From פקד in a census context, referring to those enrolled/countable in
    the census. 'Those counted from among them' preserves the participial/noun sense
    without sounding overly technical.
- source_word: שְׁלֹשָׁה וְעֶשְׂרִים אֶלֶף
  chosen: twenty-three thousand
  lexicon: HALOT
  rationale: Standard English rendering of the cardinal number sequence.
- source_word: כָּל זָכָר
  chosen: every male
  alternatives:
  - every man
  lexicon: HALOT
  rationale: Gender-accurate and age-appropriate, since the next phrase includes infants
    one month old and upward; 'male' is more precise than 'man' here.
- source_word: מִבֶּן חֹדֶשׁ וָמָעְלָה
  chosen: from a month old and upward
  alternatives:
  - from one month old and above
  - from a month and upward
  lexicon: HALOT
  rationale: Idiomatic English for the age threshold while preserving the formal sense
    of the Hebrew construction.
- source_word: הָתְפָּקְדוּ
  chosen: were not counted
  alternatives:
  - were not enrolled
  - were not registered
  lexicon: HALOT
  rationale: Same census root as earlier in the verse; 'counted' maintains consistency
    and clarity in context.
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - among the Israelites
  - in the midst of the sons of Israel
  lexicon: HALOT
  rationale: Formally reflects the Hebrew phrase. 'Sons of Israel' preserves the familial/covenantal
    wording; although 'Israelites' is possible, this rendering better matches the
    source wording.
- source_word: נִתַּן לָהֶם נַחֲלָה
  chosen: no inheritance was given to them
  alternatives:
  - they were given no inheritance
  - no possession was given to them
  lexicon: HALOT
  rationale: Passive construction preserved. 'Inheritance' is the standard and contextually
    appropriate rendering of נַחֲלָה in land-allotment contexts.
