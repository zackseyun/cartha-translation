id: NUM.26.13
reference: Numbers 26:13
source:
  edition: WLC
  text: לְ/זֶ֕רַח מִשְׁפַּ֖חַת הַ/זַּרְחִ֑י לְ/שָׁא֕וּל מִשְׁפַּ֖חַת הַ/שָּׁאוּלִֽי׃
translation:
  text: of Zerah, the clan of the Zerahites; of Shaul, the clan of the Shaulites.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/זֶרַח
  chosen: of Zerah
  alternatives:
  - for Zerah
  - to Zerah
  lexicon: HALOT
  rationale: The prefixed ל in this census formula introduces the named ancestor from
    whom the clan descends. In idiomatic English in this genealogical list, 'of Zerah'
    best conveys affiliation/descent without awkward literalism.
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  - the clan
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census and tribal contexts denotes a kinship subdivision
    within a tribe. 'Clan' fits the social structure better than the more general
    'family' and is natural in repeated list format.
- source_word: הַזַּרְחִי
  chosen: the Zerahites
  alternatives:
  - the Zerahite clan
  - the Zarhites
  lexicon: HALOT
  rationale: The gentilic form identifies the descendants/group stemming from Zerah.
    'Zerahites' is the standard and clear English rendering of the patronymic/gentilic.
- source_word: לְ/שָׁאוּל
  chosen: of Shaul
  alternatives:
  - for Shaul
  - to Shaul
  lexicon: HALOT
  rationale: As with the first occurrence, the prefixed ל marks genealogical affiliation
    in the census list. 'Of Shaul' preserves the formula cleanly in English.
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  - the clan
  lexicon: HALOT
  rationale: Repeated consistently for the second clan designation to preserve the
    structure of the Hebrew census formula.
- source_word: הַשָּׁאוּלִי
  chosen: the Shaulites
  alternatives:
  - the Shaulite clan
  lexicon: HALOT
  rationale: The gentilic/patronymic form denotes the clan descended from Shaul. 'Shaulites'
    is concise and mirrors the Hebrew formation.
