id: NUM.26.15
reference: Numbers 26:15
source:
  edition: WLC
  text: בְּנֵ֣י גָד֮ לְ/מִשְׁפְּחֹתָ/ם֒ לִ/צְפ֗וֹן מִשְׁפַּ֨חַת֙ הַ/צְּפוֹנִ֔י לְ/חַגִּ֕י
    מִשְׁפַּ֖חַת הַֽ/חַגִּ֑י לְ/שׁוּנִ֕י מִשְׁפַּ֖חַת הַ/שּׁוּנִֽי׃
translation:
  text: 'The sons of Gad by their clans: of Zephon, the clan of the Zephonites; of
    Haggi, the clan of the Haggites; of Shuni, the clan of the Shunites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some English traditions read 'Ziphon' / 'Ziphionites' here (compare Genesis
      46:16), but the Masoretic Text in this verse reads 'Zephon' (צפון), so 'Zephon'
      is retained in the main text.
    reason: textual_variant
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  - The children of
  lexicon: HALOT
  rationale: בְּנֵי plus a tribal ancestor regularly introduces genealogical descent.
    'Sons of' preserves the formal genealogical idiom better than the broader 'descendants
    of,' while remaining natural in English.
- source_word: גָד
  chosen: Gad
  lexicon: HALOT
  rationale: 'Personal/tribal name is transliterated according to the translation
    philosophy: names are transliterated rather than translated.'
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their clans
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census/genealogical contexts refers to clan groupings
    within a tribe. 'By their clans' is concise, natural, and accurate to the organizational
    sense.
- source_word: לִצְפוֹן
  chosen: of Zephon
  alternatives:
  - from Zephon
  - to Zephon
  lexicon: HALOT
  rationale: The prefixed ל in this repeated genealogical formula marks descent/source
    ('belonging to/from the line of'). In English genealogy lists, 'of Zephon' best
    conveys the sense idiomatically.
- source_word: מִשְׁפַּחַת הַצְּפוֹנִי
  chosen: the clan of the Zephonites
  alternatives:
  - the family of the Zephonite
  - the clan of the Ziphonites
  lexicon: HALOT
  rationale: The construction names the clan derived from the ancestor Zephon. 'Zephonites'
    is the standard English gentilicial formation. An alternative spelling 'Ziphonites'
    reflects a textual/traditional variation, but the MT here reads צפון, supporting
    'Zephonites' in the main text.
- source_word: לְחַגִּי
  chosen: of Haggi
  alternatives:
  - from Haggi
  lexicon: HALOT
  rationale: Same genealogical ל as earlier in the verse; 'of Haggi' is the most natural
    English rendering in this list format.
- source_word: מִשְׁפַּחַת הַחַגִּי
  chosen: the clan of the Haggites
  alternatives:
  - the family of the Haggite
  lexicon: HALOT
  rationale: Gentilic clan designation derived from the ancestor name Haggi; 'Haggites'
    is the conventional and clear English form.
- source_word: לְשׁוּנִי
  chosen: of Shuni
  alternatives:
  - from Shuni
  lexicon: HALOT
  rationale: Same genealogical formula as the preceding names; 'of Shuni' keeps the
    parallel structure.
- source_word: מִשְׁפַּחַת הַשּׁוּנִי
  chosen: the clan of the Shunites
  alternatives:
  - the family of the Shunite
  lexicon: HALOT
  rationale: Clan/gentilic designation from Shuni. 'Shunites' is the natural English
    plural for the clan members.
