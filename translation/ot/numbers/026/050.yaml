id: NUM.26.50
reference: Numbers 26:50
source:
  edition: WLC
  text: אֵ֛לֶּה מִשְׁפְּחֹ֥ת נַפְתָּלִ֖י לְ/מִשְׁפְּחֹתָ֑/ם וּ/פְקֻ֣דֵי/הֶ֔ם חֲמִשָּׁ֧ה
    וְ/אַרְבָּעִ֛ים אֶ֖לֶף וְ/אַרְבַּ֥ע מֵאֽוֹת׃
translation:
  text: These are the clans of Naphtali by their clans, and those numbered from them
    were forty-five thousand four hundred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "according to their clans."
    reason: lexical_alternative
  - marker: b
    text: Or "their numbered men were forty-five thousand four hundred."
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: Deictic plural introducing the summary statement. Present-tense English
    is natural in census formulae and matches the Hebrew demonstrative construction.
- source_word: מִשְׁפְּחֹת
  chosen: clans
  alternatives:
  - families
  lexicon: HALOT
  rationale: In tribal census contexts, מִשְׁפָּחָה refers to extended kinship subdivisions
    within a tribe, better rendered 'clans' than the more domestic-sounding 'families'.
- source_word: נַפְתָּלִי
  chosen: Naphtali
  rationale: Standard English transliteration of the tribal/personal name.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their clans
  lexicon: HALOT
  rationale: The prefixed ל marks distribution/classification in this census formula.
    'By their clans' is concise modern English preserving the organizational sense.
- source_word: וּפְקֻדֵיהֶם
  chosen: those numbered from them
  alternatives:
  - their numbered men
  - their enrollment
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like census sense, referring to those
    counted in the registration. 'Those numbered from them' preserves the personal
    reference without adding 'men' explicitly where the Hebrew here uses a collective
    counted group.
- source_word: חֲמִשָּׁה וְאַרְבָּעִים אֶלֶף וְאַרְבַּע מֵאוֹת
  chosen: forty-five thousand four hundred
  rationale: Straightforward cardinal number rendering in idiomatic English order.
