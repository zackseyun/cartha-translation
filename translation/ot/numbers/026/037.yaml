id: NUM.26.37
reference: Numbers 26:37
source:
  edition: WLC
  text: אֵ֣לֶּה מִשְׁפְּחֹ֤ת בְּנֵי אֶפְרַ֨יִם֙ לִ/פְקֻ֣דֵי/הֶ֔ם שְׁנַ֧יִם וּ/שְׁלֹשִׁ֛ים
    אֶ֖לֶף וַ/חֲמֵ֣שׁ מֵא֑וֹת אֵ֥לֶּה בְנֵי יוֹסֵ֖ף לְ/מִשְׁפְּחֹתָֽ/ם־־׃ס
translation:
  text: 'These are the clans of the sons of Ephraim, according to those numbered of
    them: thirty-two thousand and five hundred. These are the sons of Joseph according
    to their clans.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to their enrollment,' 'by their number,' or more idiomatically
      'as numbered.' The Hebrew reflects census registration language.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפְּחֹת
  chosen: clans
  alternatives:
  - families
  lexicon: HALOT
  rationale: In census and tribal-allotment contexts, מִשְׁפָּחָה refers to kinship
    subdivisions within a tribe. 'Clans' best conveys the social unit in modern English
    more precisely than the broader 'families.'
- source_word: בְּנֵי אֶפְרַיִם
  chosen: the sons of Ephraim
  alternatives:
  - the descendants of Ephraim
  - the Ephraimites
  lexicon: HALOT
  rationale: A formally close rendering preserves the idiom and genealogical framing
    of the census list. 'Descendants' is possible, but 'sons' keeps the Hebrew structure
    while remaining understandable.
- source_word: לִפְקֻדֵיהֶם
  chosen: according to those numbered of them
  alternatives:
  - according to their enrollment
  - by their number
  - as numbered
  lexicon: HALOT
  rationale: From פקד in the passive/participle census sense, the phrase indicates
    the tally of those registered. The chosen wording preserves the census nuance
    and the relation to the counted members without over-paraphrasing.
- source_word: שְׁנַיִם וּשְׁלֹשִׁים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  chosen: thirty-two thousand and five hundred
  alternatives:
  - two and thirty thousand and five hundred
  lexicon: HALOT
  rationale: Rendered in standard contemporary English number order for readability
    while preserving the exact total.
- source_word: בְנֵי יוֹסֵף
  chosen: the sons of Joseph
  alternatives:
  - the descendants of Joseph
  lexicon: HALOT
  rationale: The Hebrew repeats the genealogical formula. 'Sons' preserves the formal
    linkage between Ephraim and Joseph in the tribal register.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: according to their clans
  alternatives:
  - by their clans
  - according to their families
  lexicon: HALOT
  rationale: This closing formula summarizes the tribal subdivisions. 'According to
    their clans' matches the earlier rendering of מִשְׁפְּחֹת for consistency.
