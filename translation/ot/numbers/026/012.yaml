id: NUM.26.12
reference: Numbers 26:12
source:
  edition: WLC
  text: בְּנֵ֣י שִׁמְעוֹן֮ לְ/מִשְׁפְּחֹתָ/ם֒ לִ/נְמוּאֵ֗ל מִשְׁפַּ֨חַת֙ הַ/נְּמ֣וּאֵלִ֔י
    לְ/יָמִ֕ין מִשְׁפַּ֖חַת הַ/יָּמִינִ֑י לְ/יָכִ֕ין מִשְׁפַּ֖חַת הַ/יָּכִינִֽי׃
translation:
  text: 'The sons of Simeon by their clans: of Nemuel, the clan of the Nemuelites;
    of Jamin, the clan of the Jaminites; of Jachin, the clan of the Jachinites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Simeon' can also be rendered 'descendants of Simeon,' but
      the text specifically uses the male-line genealogical expression 'sons of.'
    reason: lexical_alternative
  - marker: b
    text: Or 'according to their families.' Here 'clans' reflects the census sense
      of Hebrew mishpachot.
    reason: lexical_alternative
  - marker: c
    text: Jachin may also be transliterated 'Yachin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Literal construct 'sons of' is retained because this is a genealogical
    census formula and the male-line descent is in view. 'Descendants of' is possible
    but less textually precise.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census contexts refers to clan-groupings within a tribe.
    'By their clans' is natural modern English and fits the formulaic structure.
- source_word: לִנְמוּאֵל
  chosen: of Nemuel
  alternatives:
  - to Nemuel
  - for Nemuel
  lexicon: HALOT
  rationale: The prefixed ל introduces the clan ancestor in an enumerative genealogical
    formula. English 'of Nemuel' best conveys descent/source here.
- source_word: מִשְׁפַּחַת הַנְּמוּאֵלִי
  chosen: the clan of the Nemuelites
  alternatives:
  - the family of the Nemuelite
  - the clan of the Nemuelite
  lexicon: HALOT
  rationale: The gentilic denotes the descendant group named from Nemuel. English
    plural ethnicon 'Nemuelites' is the standard and clearest rendering for a clan
    designation.
- source_word: לְיָמִין
  chosen: of Jamin
  alternatives:
  - to Jamin
  - for Jamin
  lexicon: HALOT
  rationale: As with the parallel items, the preposition marks the eponymous ancestor
    in the list; 'of Jamin' is idiomatic in English genealogy.
- source_word: מִשְׁפַּחַת הַיָּמִינִי
  chosen: the clan of the Jaminites
  alternatives:
  - the family of the Jaminite
  lexicon: HALOT
  rationale: The gentilic is best represented by the plural clan name 'Jaminites'
    in this census register.
- source_word: לְיָכִין
  chosen: of Jachin
  alternatives:
  - of Yachin
  - to Jachin
  lexicon: HALOT
  rationale: The personal name is transliterated by standard English convention as
    'Jachin.' 'Yachin' would be a more phonetic transliteration but is less conventional
    in English Bible usage.
- source_word: מִשְׁפַּחַת הַיָּכִינִי
  chosen: the clan of the Jachinites
  alternatives:
  - the family of the Jachinite
  lexicon: HALOT
  rationale: The gentilic is rendered as a plural clan name to match the census formula
    and parallel English usage for such lineage groups.
