id: NUM.26.18
reference: Numbers 26:18
source:
  edition: WLC
  text: אֵ֛לֶּה מִשְׁפְּחֹ֥ת בְּנֵֽי גָ֖ד לִ/פְקֻדֵי/הֶ֑ם אַרְבָּעִ֥ים אֶ֖לֶף וַ/חֲמֵ֥שׁ
    מֵאֽוֹת־׃ס
translation:
  text: 'These are the clans of the sons of Gad according to those numbered from them:
    forty thousand and five hundred.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: Deictic plural introducing the summary statement. Present-tense English
    is natural in census formulae and matches the Hebrew verbless clause.
- source_word: מִשְׁפְּחֹת
  chosen: clans
  alternatives:
  - families
  lexicon: HALOT
  rationale: In tribal and census contexts, מִשְׁפָּחָה refers to kinship subdivisions
    within a tribe; 'clans' is more precise than the broader 'families'.
- source_word: בְּנֵי גָד
  chosen: the sons of Gad
  alternatives:
  - the descendants of Gad
  - the children of Gad
  lexicon: HALOT
  rationale: Formal tribal designation. 'Sons of Gad' preserves the Hebrew idiom and
    the gender-accurate wording of the source, while still being understandable in
    English.
- source_word: לִפְקֻדֵיהֶם
  chosen: according to those numbered from them
  alternatives:
  - according to their registration
  - by their number
  - according to their mustered men
  lexicon: HALOT
  rationale: The phrase is tied to the census/mustering formula from פקד. The chosen
    rendering preserves the passive/resultative sense of those enrolled or counted,
    while remaining readable. 'From them' reflects the 3mp suffix without overparaphrasing.
- source_word: אַרְבָּעִים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  chosen: forty thousand and five hundred
  alternatives:
  - 40,500
  lexicon: HALOT
  rationale: Standard English rendering of the cardinal number sequence; words are
    preferred in the running biblical text.
