id: NUM.26.30
reference: Numbers 26:30
source:
  edition: WLC
  text: אֵ֚לֶּה בְּנֵ֣י גִלְעָ֔ד אִיעֶ֕זֶר מִשְׁפַּ֖חַת הָ/אִֽיעֶזְרִ֑י לְ/חֵ֕לֶק
    מִשְׁפַּ֖חַת הַֽ/חֶלְקִֽי׃
translation:
  text: 'These were the sons of Gilead: of Iezer, the clan of the Iezerites; of Helek,
    the clan of the Helekites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Gilead' can denote male-line descendants or constituent
      clans, not only immediate sons.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These are
  - These
  lexicon: HALOT
  rationale: Introduces the list of descendants/clans. English past tense 'were' fits
    the census-style genealogical register naturally, though the Hebrew demonstrative
    itself is tenseless.
- source_word: בְּנֵי גִלְעָד
  chosen: the sons of Gilead
  alternatives:
  - the descendants of Gilead
  - the children of Gilead
  lexicon: HALOT
  rationale: Formal genealogical language is retained. 'Sons' reflects the Hebrew
    construct and the translation philosophy's gender-accurate preference; in this
    census context it denotes male-line descendants/clan founders.
- source_word: אִיעֶזֶר
  chosen: Iezer
  alternatives:
  - Jeezer
  lexicon: HALOT
  rationale: Personal name is transliterated rather than translated, following the
    stated philosophy. 'Iezer' is a standard scholarly transliteration from the Hebrew
    form here.
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  - the clan
  lexicon: HALOT
  rationale: In Numbers 26 the term refers to a subdivision within a tribe, best rendered
    'clan' in contemporary English rather than the broader and potentially misleading
    'family'.
- source_word: הָאִיעֶזְרִי
  chosen: the Iezerites
  alternatives:
  - the Iezrite clan
  - the Jeezerites
  lexicon: HALOT
  rationale: The gentilicial/adjectival form denotes the clan descending from Iezer.
    English '-ites' is the most natural way to render this clan designation.
- source_word: לְחֵלֶק
  chosen: of Helek
  alternatives:
  - for Helek
  - to Helek
  lexicon: HALOT
  rationale: The prefixed ל in this repetitive census formula introduces the next
    named descendant/clan founder. In English, 'of Helek' best matches the pattern
    established in the verse.
- source_word: הַחֶלְקִי
  chosen: the Helekites
  alternatives:
  - the Helkite clan
  lexicon: HALOT
  rationale: Gentilic clan name from Helek, rendered with the conventional English
    '-ites' ending for readability and consistency with similar genealogical labels.
