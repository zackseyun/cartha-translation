id: NUM.26.31
reference: Numbers 26:31
source:
  edition: WLC
  text: וְ/אַ֨שְׂרִיאֵ֔ל מִשְׁפַּ֖חַת הָֽ/אַשְׂרִֽאֵלִ֑י וְ/שֶׁ֕כֶם מִשְׁפַּ֖חַת הַ/שִּׁכְמִֽי׃
translation:
  text: from Ashriel, the clan of the Ashrielites; and from Shechem, the clan of the
    Shechemites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English versions often spell the name 'Asriel' and the clan
      'Asrielites.' The Hebrew form here supports 'Ashriel' / 'Ashrielites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׂרִיאֵל
  chosen: Ashriel
  alternatives:
  - Asriel
  rationale: Proper name transliterated per translation philosophy. 'Ashriel' follows
    the Hebrew spelling with shin/sin represented by 'sh'; 'Asriel' reflects a traditional
    English form but is less directly tied to the consonantal form here.
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  - the clan
  lexicon: HALOT
  rationale: In census/genealogical contexts, מִשְׁפָּחָה denotes a kinship subdivision
    within a tribe. 'Clan' best captures the social unit in natural English. The construct
    form is represented as 'the clan of' before the gentilic.
- source_word: הָאַשְׂרִיאֵלִי
  chosen: the Ashrielites
  alternatives:
  - the Ashrielite clan
  - the Asrielites
  lexicon: HALOT
  rationale: The gentilic with article identifies the descendant group from Ashriel.
    'Ashrielites' is the standard English way to render the collective clan name.
    The article is naturally absorbed into English as 'the Ashrielites.'
- source_word: וְ
  chosen: and
  alternatives:
  - now
  rationale: Simple conjunction linking the clan entries in the census list; 'and'
    is the straightforward rendering.
- source_word: שֶׁכֶם
  chosen: Shechem
  rationale: Proper name transliterated directly. Although also the name of a place
    elsewhere, here it is the personal ancestor name in the genealogy.
- source_word: הַשִּׁכְמִי
  chosen: the Shechemites
  alternatives:
  - the Shechemite clan
  lexicon: HALOT
  rationale: Gentilic derived from Shechem, rendered as the collective descendant
    group. 'Shechemites' is idiomatic English for the clan designation in this list.
