id: NUM.26.24
reference: Numbers 26:24
source:
  edition: WLC
  text: לְ/יָשׁ֕וּב מִשְׁפַּ֖חַת הַ/יָּשׁוּבִ֑י לְ/שִׁמְרֹ֕ן מִשְׁפַּ֖חַת הַ/שִּׁמְרֹנִֽי׃
translation:
  text: of Jashub, the clan of the Jashubites; of Shimron, the clan of the Shimronites.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/יָשׁוּב
  chosen: of Jashub
  alternatives:
  - for Jashub
  lexicon: HALOT
  rationale: In this census list, לְ before a personal name introduces the descendant/clan
    head from whom the family designation is derived. English idiom is best represented
    by 'of Jashub' in parallel with the repeated clan formula.
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal census contexts refers to a kinship subdivision
    within a tribe. 'Clan' is more precise than the broader 'family' in English for
    this administrative-genealogical setting.
- source_word: הַ/יָּשׁוּבִי
  chosen: the Jashubites
  alternatives:
  - the Jashubite family
  lexicon: HALOT
  rationale: The gentilic form denotes the group descended from Jashub. 'Jashubites'
    is the standard and concise English rendering of the clan name.
- source_word: לְ/שִׁמְרֹן
  chosen: of Shimron
  alternatives:
  - for Shimron
  lexicon: HALOT
  rationale: As with Jashub, לְ introduces the eponymous ancestor in the census formula.
    'Of Shimron' preserves the repetitive structure naturally in English.
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  lexicon: HALOT
  rationale: Repeated unchanged for the second clan formula; consistency is appropriate
    in this list structure.
- source_word: הַ/שִּׁמְרֹנִי
  chosen: the Shimronites
  alternatives:
  - the Shimronite family
  lexicon: HALOT
  rationale: The gentilic identifies the clan descended from Shimron. 'Shimronites'
    is the natural English equivalent.
