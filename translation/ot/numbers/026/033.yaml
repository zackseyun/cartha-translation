id: NUM.26.33
reference: Numbers 26:33
source:
  edition: WLC
  text: וּ/צְלָפְחָ֣ד בֶּן חֵ֗פֶר לֹא הָ֥יוּ ל֛/וֹ בָּנִ֖ים כִּ֣י אִם בָּנ֑וֹת וְ/שֵׁם֙
    בְּנ֣וֹת צְלָפְחָ֔ד מַחְלָ֣ה וְ/נֹעָ֔ה חָגְלָ֥ה מִלְכָּ֖ה וְ/תִרְצָֽה־־־׃
translation:
  text: Now Zelophehad son of Hepher had no sons, but only daughters; and the names
    of Zelophehad’s daughters were Mahlah, Noah, Hoglah, Milcah, and Tirzah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'there were not to him sons, except daughters.'
    reason: lexical_alternative
  - marker: b
    text: '''Noah'' here is the name of one of Zelophehad’s daughters, not Noah of
      the flood narrative.'
    reason: cultural_note
lexical_decisions:
- source_word: וּ/צְלָפְחָד
  chosen: Now Zelophehad
  alternatives:
  - And Zelophehad
  - Zelophehad
  lexicon: HALOT
  rationale: The prefixed conjunction ו is rendered as discourse-continuing 'Now'
    for natural English narrative flow, while preserving the connective sense. The
    personal name is transliterated per translation philosophy.
- source_word: בֶּן חֵפֶר
  chosen: son of Hepher
  alternatives:
  - the son of Hepher
  lexicon: HALOT
  rationale: A straightforward filial construction. 'Son of Hepher' is the natural
    English equivalent and preserves the genealogical relationship.
- source_word: לֹא הָיוּ לֹו בָּנִים
  chosen: had no sons
  alternatives:
  - there were no sons for him
  - he had no children (male)
  lexicon: HALOT
  rationale: Although literally 'there were not to him sons,' idiomatic English is
    'had no sons.' 'Sons' is retained rather than 'children' because the contrast
    with daughters in the next phrase is explicit.
- source_word: כִּי אִם בָּנוֹת
  chosen: but only daughters
  alternatives:
  - except daughters
  - but daughters
  lexicon: HALOT
  rationale: The construction כִּי אִם marks exception/contrast. 'But only daughters'
    clearly conveys that he had daughters and no sons.
- source_word: וְשֵׁם בְּנוֹת צְלָפְחָד
  chosen: and the names of Zelophehad’s daughters were
  alternatives:
  - and the name of Zelophehad's daughters was
  - and these were the names of Zelophehad's daughters
  lexicon: HALOT
  rationale: Though שֵׁם is singular ('name'), Hebrew commonly uses singular with
    a following plural genitive in a collective sense. English requires the plural
    predicate 'the names ... were' for idiomatic clarity.
- source_word: מַחְלָה וְנֹעָה חָגְלָה מִלְכָּה וְתִרְצָה
  chosen: Mahlah, Noah, Hoglah, Milcah, and Tirzah
  lexicon: HALOT
  rationale: These are personal names and are transliterated by standard English conventions.
    'Noah' here is a female personal name distinct from the more familiar male figure
    in Genesis, but standard transliteration is retained.
