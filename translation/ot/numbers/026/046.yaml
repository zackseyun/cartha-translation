id: NUM.26.46
reference: Numbers 26:46
source:
  edition: WLC
  text: וְ/שֵׁ֥ם בַּת אָשֵׁ֖ר שָֽׂרַח־׃
translation:
  text: And the name of Asher’s daughter was Serah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the daughter of Asher''; some English versions preserve the more
      literal word order, ''And the name of the daughter of Asher was Serah.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֵׁם
  chosen: And the name
  alternatives:
  - Now the name
  - The name
  lexicon: HALOT
  rationale: וְ conjunctive plus שֵׁם introduces an additional genealogical notice.
    'And the name' preserves the simple connective and the nominal construction without
    overinterpreting discourse force.
- source_word: בַּת
  chosen: daughter
  alternatives:
  - female descendant
  lexicon: HALOT
  rationale: The singular construct 'daughter of' in genealogical context most naturally
    refers to an actual daughter here, not a broader clan designation. 'Daughter'
    is the plain and sufficiently formal rendering.
- source_word: אָשֵׁר
  chosen: Asher’s
  alternatives:
  - of Asher
  lexicon: HALOT
  rationale: This is the personal/tribal name Asher, transliterated per translation
    philosophy for names. The possessive form 'Asher’s' is natural English for the
    construct relationship.
- source_word: שָׂרַח
  chosen: Serah
  alternatives:
  - Sarah
  - Seraḥ
  lexicon: HALOT
  rationale: This is a proper name and should be transliterated, not translated. 'Serah'
    is the standard English transliteration for this Hebrew name in this context.
