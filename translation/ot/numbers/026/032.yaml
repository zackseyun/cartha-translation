id: NUM.26.32
reference: Numbers 26:32
source:
  edition: WLC
  text: וּ/שְׁמִידָ֕ע מִשְׁפַּ֖חַת הַ/שְּׁמִידָעִ֑י וְ/חֵ֕פֶר מִשְׁפַּ֖חַת הַֽ/חֶפְרִֽי׃
translation:
  text: from Shemida, the clan of the Shemidaites; and from Hepher, the clan of the
    Hepherites.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/שְׁמִידָע
  chosen: from Shemida
  alternatives:
  - and Shemida
  lexicon: HALOT
  rationale: In this census formula, the prefixed conjunction on a clan ancestor name
    is idiomatically carried into English as 'from' rather than a bare 'and,' matching
    the implied pattern 'from X, the clan of the X-ites.' 'Shemida' is a transliterated
    personal name per the translation philosophy for names.
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census and tribal listings denotes a kinship subdivision
    within a tribe; 'clan' is the most natural and precise English rendering here,
    more specific than 'family.'
- source_word: הַ/שְּׁמִידָעִי
  chosen: the Shemidaites
  alternatives:
  - the Shemidite clan
  lexicon: HALOT
  rationale: The gentilicial form refers to the descendants/group associated with
    Shemida. 'Shemidaites' is standard English formation for such lineage terms and
    works smoothly after 'the clan of.'
- source_word: וְ/חֵפֶר
  chosen: and from Hepher
  alternatives:
  - and Hepher
  lexicon: HALOT
  rationale: As with the first name in the verse, the conjunction introduces the next
    item in the repeated census pattern. English supplies 'from' to make the elliptical
    Hebrew formula clear and natural.
- source_word: הַֽ/חֶפְרִי
  chosen: the Hepherites
  alternatives:
  - the Hepherite clan
  lexicon: HALOT
  rationale: The gentilicial adjective denotes the clan descended from Hepher. 'Hepherites'
    is a clear and conventional English rendering in genealogical context.
