id: NUM.26.23
reference: Numbers 26:23
source:
  edition: WLC
  text: בְּנֵ֤י יִשָּׂשכָר֙ לְ/מִשְׁפְּחֹתָ֔/ם תּוֹלָ֕ע מִשְׁפַּ֖חַת הַ/תּוֹלָעִ֑י
    לְ/פֻוָ֕ה מִשְׁפַּ֖חַת הַ/פּוּנִֽי׃
translation:
  text: 'The sons of Issachar by their clans: of Tola, the clan of the Tolaites; of
    Puvah, the clan of the Punites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Puvah is spelled 'Puah' in some related passages and translations.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: בני in genealogical/census contexts commonly introduces lineal descent.
    'The sons of' preserves the formal structure and matches the immediate tribal
    listing style, while still being understood corporately.
- source_word: יִשָּׂשכָר
  chosen: Issachar
  lexicon: HALOT
  rationale: Personal/tribal name is transliterated per project philosophy to transliterate
    names rather than translate them.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their clans
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה here denotes clan subdivisions within the tribe in a census
    register. 'By their clans' is concise, natural English and accurately reflects
    the organizational sense better than the broader 'families'.
- source_word: תּוֹלָע
  chosen: Tola
  lexicon: HALOT
  rationale: Proper name; transliterated. Although the common noun can mean 'worm,'
    the context is clearly a personal name.
- source_word: מִשְׁפַּחַת הַתּוֹלָעִי
  chosen: the clan of the Tolaites
  alternatives:
  - the family of the Tolaite
  lexicon: HALOT
  rationale: The gentilic/adjectival form הַתּוֹלָעִי denotes the clan derived from
    Tola. English idiom prefers a plural clan name, 'Tolaites,' in this census formula.
- source_word: לְפֻוָה
  chosen: of Puvah
  alternatives:
  - of Puah
  lexicon: HALOT
  rationale: 'The prefixed ל in this list functions distributively, introducing each
    clan ancestor: ''of/from Puvah.'' The spelling פֻוָה in this verse supports the
    transliteration ''Puvah.'' An alternative tradition spells the name ''Puah'' elsewhere.'
- source_word: מִשְׁפַּחַת הַפּוּנִי
  chosen: the clan of the Punites
  alternatives:
  - the family of the Punite
  lexicon: HALOT
  rationale: As with 'Tolaites,' the gentilic הַפּוּנִי identifies the descendant
    clan from Puvah/Puah. 'Punites' is the conventional English rendering of the clan
    name and fits the repetitive census pattern.
