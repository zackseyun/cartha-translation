id: NUM.26.48
reference: Numbers 26:48
source:
  edition: WLC
  text: בְּנֵ֤י נַפְתָּלִי֙ לְ/מִשְׁפְּחֹתָ֔/ם לְ/יַ֨חְצְאֵ֔ל מִשְׁפַּ֖חַת הַ/יַּחְצְאֵלִ֑י
    לְ/גוּנִ֕י מִשְׁפַּ֖חַת הַ/גּוּנִֽי׃
translation:
  text: 'The sons of Naphtali by their clans: of Jahzeel, the clan of the Jahzeelites;
    of Guni, the clan of the Gunites.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנֵי
  chosen: The sons of
  alternatives:
  - The descendants of
  lexicon: HALOT
  rationale: Literal construct form 'sons of' introducing tribal descent. 'Descendants
    of' is possible in genealogical contexts, but 'sons of' preserves the Hebrew form
    and remains natural in English here.
- source_word: נַפְתָּלִי
  chosen: Naphtali
  lexicon: HALOT
  rationale: Personal/tribal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their clans
  - by their families
  lexicon: HALOT
  rationale: The phrase marks classification within the tribe. 'Clans' best fits מִשְׁפָּחָה
    in census/genealogical contexts; 'by' is concise modern English for the distributive
    sense of לְ.
- source_word: לְיַחְצְאֵל
  chosen: of Jahzeel
  alternatives:
  - to Jahzeel
  - for Jahzeel
  lexicon: HALOT
  rationale: In this repeated census formula, לְ before a personal name introduces
    the clan ancestor from whom the subgroup is reckoned. 'Of Jahzeel' is idiomatic
    in English genealogy lists.
- source_word: מִשְׁפַּחַת הַיַּחְצְאֵלִי
  chosen: the clan of the Jahzeelites
  alternatives:
  - the family of the Jahzeelite
  lexicon: HALOT
  rationale: מִשְׁפַּחַת is rendered 'the clan of' consistently in this chapter. The
    gentilic הַיַּחְצְאֵלִי is best represented by the collective plural 'Jahzeelites'
    in English, matching the sense of a named subgroup rather than a single individual.
- source_word: לְגוּנִי
  chosen: of Guni
  alternatives:
  - to Guni
  - for Guni
  lexicon: HALOT
  rationale: Same genealogical/distributive use of לְ as earlier in the verse; 'of
    Guni' is the most natural English rendering in this list structure.
- source_word: מִשְׁפַּחַת הַגּוּנִי
  chosen: the clan of the Gunites
  alternatives:
  - the family of the Gunite
  lexicon: HALOT
  rationale: As with Jahzeelites, the gentilic denotes the subgroup descended from
    Guni. 'Gunites' is the standard and natural English collective form.
