id: NUM.26.27
reference: Numbers 26:27
source:
  edition: WLC
  text: אֵ֛לֶּה מִשְׁפְּחֹ֥ת הַ/זְּבוּלֹנִ֖י לִ/פְקֻדֵי/הֶ֑ם שִׁשִּׁ֥ים אֶ֖לֶף וַ/חֲמֵ֥שׁ
    מֵאֽוֹת׃ס
translation:
  text: 'These are the clans of the Zebulunites, according to those numbered from
    them: sixty thousand and five hundred.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: Deictic plural introducing the summary statement; present-tense English
    is natural in census formulae.
- source_word: מִשְׁפְּחֹת
  chosen: clans
  alternatives:
  - families
  lexicon: HALOT
  rationale: In tribal/census contexts, the term denotes extended kinship groupings
    within a tribe; 'clans' is more precise than the broader 'families'.
- source_word: הַזְּבוּלֹנִי
  chosen: the Zebulunites
  alternatives:
  - the clan of Zebulun
  - the Zebulunite families
  lexicon: HALOT
  rationale: Gentilic singular with article used collectively for the tribal group
    descending from Zebulun; 'Zebulunites' is idiomatic English.
- source_word: לִפְקֻדֵיהֶם
  chosen: according to those numbered from them
  alternatives:
  - according to their registration
  - by their number
  - as numbered
  lexicon: HALOT
  rationale: Derived from פקד in the census sense. The phrase links the clans to the
    census total. 'According to those numbered from them' preserves the relation to
    the counted members without over-paraphrasing.
- source_word: שִׁשִּׁים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  chosen: sixty thousand and five hundred
  alternatives:
  - 60,500
  lexicon: HALOT
  rationale: Cardinal number stated in standard English words, matching the formal
    census style of the passage.
