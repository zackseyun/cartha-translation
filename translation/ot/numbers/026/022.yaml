id: NUM.26.22
reference: Numbers 26:22
source:
  edition: WLC
  text: אֵ֛לֶּה מִשְׁפְּחֹ֥ת יְהוּדָ֖ה לִ/פְקֻדֵי/הֶ֑ם שִׁשָּׁ֧ה וְ/שִׁבְעִ֛ים אֶ֖לֶף
    וַ/חֲמֵ֥שׁ מֵאֽוֹת׃ס
translation:
  text: 'These were the clans of Judah according to those numbered from them: seventy-six
    thousand five hundred.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "according to their number"; the Hebrew census expression לִפְקֻדֵיהֶם
      refers to those enrolled or counted.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These are
  lexicon: HALOT
  rationale: Demonstrative plural introducing a summary statement. English past tense
    fits the census-report narrative context better than a strictly present-tense
    rendering.
- source_word: מִשְׁפְּחֹת
  chosen: clans
  alternatives:
  - families
  lexicon: HALOT
  rationale: In tribal census contexts, מִשְׁפָּחָה refers to kinship subdivisions
    within a tribe; 'clans' is more precise than the broader 'families' in modern
    English.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal/personal name יְהוּדָה.
- source_word: לִפְקֻדֵיהֶם
  chosen: according to those numbered from them
  alternatives:
  - according to their number
  - by their enrollment
  lexicon: HALOT
  rationale: The phrase is built on פקד in the passive/participle-like census sense
    with 3mp suffix. The wording aims to preserve the census nuance without over-paraphrasing.
    'From them' reflects the suffix and the idea of those counted out from these clans.
- source_word: שִׁשָּׁה וְשִׁבְעִים אֶלֶף
  chosen: seventy-six thousand
  alternatives:
  - six and seventy thousand
  lexicon: HALOT
  rationale: Idiomatic modern English reverses the Hebrew number order while preserving
    the exact value.
- source_word: וַחֲמֵשׁ מֵאוֹת
  chosen: five hundred
  lexicon: HALOT
  rationale: Standard rendering of the concluding hundreds in the census total.
