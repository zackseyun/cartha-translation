id: NUM.26.16
reference: Numbers 26:16
source:
  edition: WLC
  text: לְ/אָזְנִ֕י מִשְׁפַּ֖חַת הָ/אָזְנִ֑י לְ/עֵרִ֕י מִשְׁפַּ֖חַת הָ/עֵרִֽי׃
translation:
  text: of Ozni, the clan of the Oznites; of Eri, the clan of the Erites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the family of the Ozni(te).' The Hebrew uses a clan term and a gentilic
      form.
    reason: lexical_alternative
  - marker: b
    text: Or 'the family of the Eri(te).' The Hebrew uses a clan term and a gentilic
      form.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/אָזְנִי
  chosen: of Ozni
  alternatives:
  - for Ozni
  - to Ozni
  lexicon: HALOT
  rationale: In this census formula, לְ before a personal/ancestor name introduces
    the clan descendant line and is most naturally rendered idiomatically as 'of'
    in English rather than the more wooden 'to/for.' The name is transliterated, following
    the policy to transliterate personal names.
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal/census contexts denotes a kinship subdivision within
    Israel, best rendered 'clan' in contemporary English. 'Family' would sound too
    narrow for the administrative-genealogical sense.
- source_word: הָ/אָזְנִי
  chosen: the Oznites
  alternatives:
  - the Oznite clan
  - the family of the Oznite
  lexicon: HALOT
  rationale: The gentilic form with article identifies the descendant group from Ozni.
    English naturally renders this as the plural ethnicon 'the Oznites.'
- source_word: לְ/עֵרִי
  chosen: of Eri
  alternatives:
  - for Eri
  - to Eri
  lexicon: HALOT
  rationale: As with לְאָזְנִי, the prefixed לְ functions genealogically in this list
    and is best represented by 'of' in idiomatic English. The personal name is transliterated.
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  lexicon: HALOT
  rationale: Repeated term kept consistent within the verse, since the same clan-list
    formula is being used.
- source_word: הָ/עֵרִי
  chosen: the Erites
  alternatives:
  - the Erite clan
  - the family of the Erite
  lexicon: HALOT
  rationale: The gentilic form with article denotes the descendant group from Eri;
    'the Erites' is the clearest natural English equivalent.
