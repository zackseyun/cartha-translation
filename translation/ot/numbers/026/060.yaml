id: NUM.26.60
reference: Numbers 26:60
source:
  edition: WLC
  text: וַ/יִּוָּלֵ֣ד לְ/אַהֲרֹ֔ן אֶת נָדָ֖ב וְ/אֶת אֲבִיה֑וּא אֶת אֶלְעָזָ֖ר וְ/אֶת
    אִיתָמָֽר־־־־׃
translation:
  text: To Aaron were born Nadab and Abihu, Eleazar and Ithamar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'To Aaron was born Nadab and Abihu, Eleazar and Ithamar,'
      using a singular verb with a compound list in a genealogical formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּלֵד
  chosen: were born
  alternatives:
  - was born
  - fathered
  lexicon: HALOT
  rationale: 'The verb is ילד in the Niphal with waw-consecutive, functioning here
    in a passive/resultative sense: ''were born.'' Although morphologically singular,
    it introduces a list of sons and is idiomatically rendered in English with a plural
    predicate. ''Fathered'' would shift to an active construction not present in the
    Hebrew, while ''was born'' would sound mismatched with the following plural list.'
- source_word: לְאַהֲרֹן
  chosen: to Aaron
  alternatives:
  - for Aaron
  - Aaron
  lexicon: HALOT
  rationale: The preposition ל marks the parent to whom the sons were born in this
    genealogical idiom. In idiomatic English, 'to Aaron were born...' preserves the
    Hebrew structure better than simply 'Aaron fathered,' while remaining readable.
- source_word: אֶת ... וְאֶת ... אֶת ... וְאֶת
  chosen: '[direct-object marking not separately translated]'
  lexicon: HALOT
  rationale: The repeated אֶת marks the named sons as direct objects and has no direct
    English equivalent. The names are rendered as a coordinated list.
- source_word: נָדָב
  chosen: Nadab
  rationale: Standard English transliteration of the personal name, following the
    philosophy of transliterating names rather than translating them.
- source_word: אֲבִיהוּא
  chosen: Abihu
  rationale: Standard English transliteration of the personal name.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Standard English transliteration of the personal name.
- source_word: אִיתָמָר
  chosen: Ithamar
  rationale: Standard English transliteration of the personal name.
