id: NUM.26.8
reference: Numbers 26:8
source:
  edition: WLC
  text: וּ/בְנֵ֥י פַלּ֖וּא אֱלִיאָֽב׃
translation:
  text: 'And the sons of Pallu: Eliab.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: And the sons of
  alternatives:
  - And the descendants of
  - Now the sons of
  lexicon: HALOT
  rationale: The conjunction ו is rendered 'And' to preserve the genealogical sequence.
    בְנֵי is the construct plural of 'sons of,' a standard genealogical formula. 'Sons
    of' is retained rather than 'descendants of' because the immediate context lists
    direct lineage, and the formal expression is clear and natural in English.
- source_word: פַלּוּא
  chosen: Pallu
  alternatives:
  - Pallu
  lexicon: HALOT
  rationale: Personal names are transliterated rather than translated, following the
    project's philosophy. 'Pallu' is the standard English form for this Hebrew proper
    name.
- source_word: אֱלִיאָב
  chosen: Eliab
  lexicon: HALOT
  rationale: This is a personal name and is therefore transliterated by standard convention.
    'Eliab' is the established and straightforward English form.
