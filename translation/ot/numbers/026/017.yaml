id: NUM.26.17
reference: Numbers 26:17
source:
  edition: WLC
  text: לַ/אֲר֕וֹד מִשְׁפַּ֖חַת הָ/אֲרוֹדִ֑י לְ/אַ֨רְאֵלִ֔י מִשְׁפַּ֖חַת הָ/אַרְאֵלִֽי׃
translation:
  text: From Arod, the clan of the Arodites; from Areli, the clan of the Arelites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'To Arod belonged the clan of the Arodites; to Areli
      belonged the clan of the Arelites.' The Hebrew preposition ל introduces each
      ancestral name in a formulaic census style.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַ/אֲרֹד
  chosen: From Arod
  alternatives:
  - To Arod
  - For Arod
  lexicon: HALOT
  rationale: In this census formula, the prefixed ל marks descent/source with each
    named ancestor introducing the resulting clan. English idiom is best represented
    by 'From Arod,' matching the repetitive structure of the surrounding verses.
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  - the clan
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census and tribal contexts denotes a kinship subdivision
    within a tribe; 'clan' is the most natural and sufficiently formal English equivalent
    here.
- source_word: הָ/אֲרֹדִי
  chosen: the Arodites
  alternatives:
  - the Arodite clan
  - the Arodite
  lexicon: HALOT
  rationale: The gentilicial/adjectival form with article identifies the descendant
    group from Arod. English conventionally renders such forms as a people/clan name
    in the plural, 'Arodites.'
- source_word: לְ/אַ֨רְאֵלִי
  chosen: from Areli
  alternatives:
  - to Areli
  - for Areli
  lexicon: HALOT
  rationale: As with לַאֲרֹד, the prefixed ל introduces the eponymous ancestor from
    whom the clan descends. 'From Areli' preserves the formulaic pattern.
- source_word: הָ/אַרְאֵלִי
  chosen: the Arelites
  alternatives:
  - the Areli clan
  - the Arelite
  lexicon: HALOT
  rationale: This gentilicial form names the clan descended from Areli. 'Arelites'
    is the standard English way to render the collective descendant group.
