id: NUM.26.39
reference: Numbers 26:39
source:
  edition: WLC
  text: לִ/שְׁפוּפָ֕ם מִשְׁפַּ֖חַת הַ/שּׁוּפָמִ֑י לְ/חוּפָ֕ם מִשְׁפַּ֖חַת הַ/חוּפָמִֽי׃
translation:
  text: Of Shupham, the clan of the Shuphamites; of Hupham, the clan of the Huphamites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Shupham corresponds to the name spelled Shupham in this verse; some
      English traditions reflect related spellings influenced by other textual traditions
      or parallel lists.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/שְׁפוּפָם
  chosen: Of Shupham
  alternatives:
  - For Shupham
  - To Shupham
  lexicon: HALOT
  rationale: The prefixed ל in this census formula introduces descent/group affiliation
    and is idiomatically rendered 'of' in English genealogical lists. The personal
    name is transliterated as 'Shupham' in keeping with the policy to transliterate
    names.
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  - the clan
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census and tribal contexts denotes a kinship subdivision
    within a tribe, best rendered 'clan' in modern English. The construct form requires
    'the clan of' before the gentilics.
- source_word: הַ/שּׁוּפָמִי
  chosen: the Shuphamites
  alternatives:
  - the Shuphamite clan
  - the Shuphamite
  lexicon: HALOT
  rationale: The gentilic form with article identifies the named clan descending from
    Shupham. English plural gentilic 'Shuphamites' naturally conveys the collective
    sense.
- source_word: לְ/חוּפָם
  chosen: of Hupham
  alternatives:
  - for Hupham
  - to Hupham
  lexicon: HALOT
  rationale: As with the first name, the prefixed ל marks clan derivation in this
    list and is best rendered 'of.' The name is transliterated 'Hupham.'
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  - the clan
  lexicon: HALOT
  rationale: Repeated term kept consistent within the verse, matching the census formula.
- source_word: הַ/חוּפָמִי
  chosen: the Huphamites
  alternatives:
  - the Huphamite clan
  - the Huphamite
  lexicon: HALOT
  rationale: The gentilic with article denotes the clan descended from Hupham; English
    plural gentilic is the clearest equivalent.
