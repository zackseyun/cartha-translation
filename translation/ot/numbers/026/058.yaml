id: NUM.26.58
reference: Numbers 26:58
source:
  edition: WLC
  text: אֵ֣לֶּה מִשְׁפְּחֹ֣ת לֵוִ֗י מִשְׁפַּ֨חַת הַ/לִּבְנִ֜י מִשְׁפַּ֤חַת הַֽ/חֶבְרֹנִי֙
    מִשְׁפַּ֤חַת הַ/מַּחְלִי֙ מִשְׁפַּ֣חַת הַ/מּוּשִׁ֔י מִשְׁפַּ֖חַת הַ/קָּרְחִ֑י
    וּ/קְהָ֖ת הוֹלִ֥ד אֶת עַמְרָֽם׀־׃
translation:
  text: 'These were the clans of Levi: the clan of the Libnite, the clan of the Hebronite,
    the clan of the Mahlite, the clan of the Mushite, the clan of the Korahite. And
    Kohath fathered Amram.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "families" or "family groups"; Hebrew מִשְׁפָּחָה denotes a kinship subdivision
      within the tribe.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפְּחֹת / מִשְׁפַּחַת
  chosen: clans / the clan of
  alternatives:
  - families
  - family groups
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census and tribal-genealogical contexts refers to a kinship
    subdivision within a tribe, more specific than a modern nuclear 'family.' 'Clan'
    best conveys the social unit in contemporary English while remaining natural and
    reasonably formal.
- source_word: לֵוִי
  chosen: Levi
  lexicon: HALOT
  rationale: This is the proper name of the tribal ancestor; per translation philosophy,
    personal names are transliterated rather than translated.
- source_word: הַלִּבְנִי
  chosen: the Libnite
  alternatives:
  - the clan of Libni
  - the Libnite clan
  lexicon: HALOT
  rationale: The gentilicial/adjectival form names the descendant group associated
    with Libni. 'Libnite' is a standard and concise English rendering for such clan
    designations.
- source_word: הַחֶבְרֹנִי
  chosen: the Hebronite
  alternatives:
  - the clan of Hebron
  - the Hebronite clan
  lexicon: HALOT
  rationale: Rendered as a gentilicial clan name parallel to the surrounding items
    for consistency and readability.
- source_word: הַמַּחְלִי
  chosen: the Mahlite
  alternatives:
  - the clan of Mahli
  - the Mahlite clan
  lexicon: HALOT
  rationale: The form denotes the group descended from Mahli; 'Mahlite' preserves
    the genealogical label compactly.
- source_word: הַמּוּשִׁי
  chosen: the Mushite
  alternatives:
  - the clan of Mushi
  - the Mushite clan
  lexicon: HALOT
  rationale: As with the other gentilics, 'Mushite' is the most natural English equivalent
    for the named clan.
- source_word: הַקָּרְחִי
  chosen: the Korahite
  alternatives:
  - the clan of Korah
  - the Korahite clan
  lexicon: HALOT
  rationale: This gentilic refers to the descendants/group of Korah. 'Korahite' is
    the conventional and clear English form.
- source_word: וּקְהָת
  chosen: And Kohath
  alternatives:
  - Now Kohath
  - Kohath
  lexicon: HALOT
  rationale: The prefixed conjunction is retained as 'And' to reflect the Hebrew narrative
    linkage. The proper name is transliterated.
- source_word: הוֹלִד
  chosen: fathered
  alternatives:
  - became the father of
  - was the father of
  - begot
  lexicon: HALOT
  rationale: The Hiphil of ילד in genealogical formulae means 'to father, beget.'
    'Fathered' is concise, natural modern English and preserves the male genealogical
    sense better than the more ambiguous 'was the father of.' 'Begot' is accurate
    but archaic.
- source_word: אֶת עַמְרָם
  chosen: Amram
  lexicon: HALOT
  rationale: Direct-object marker אֶת is untranslated in English; the proper name
    is transliterated as 'Amram.'
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These are
  - These
  lexicon: HALOT
  rationale: Although the Hebrew is verbless, English idiom commonly supplies 'were'
    in retrospective census narration. Past tense fits the surrounding enumeration
    context better than a bare present.
