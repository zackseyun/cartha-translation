id: NUM.26.6
reference: Numbers 26:6
source:
  edition: WLC
  text: לְ/חֶצְרֹ֕ן מִשְׁפַּ֖חַת הַֽ/חֶצְרוֹנִ֑י לְ/כַרְמִ֕י מִשְׁפַּ֖חַת הַ/כַּרְמִֽי׃
translation:
  text: from Hezron, the clan of the Hezronites; from Carmi, the clan of the Carmites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for Hezron ... for Carmi'; the Hebrew preposition can be rendered more
      literally, but here it functions in a genealogical/census sense, indicating
      descent or clan derivation.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/חֶצְרֹן
  chosen: from Hezron
  alternatives:
  - for Hezron
  - to Hezron
  lexicon: HALOT
  rationale: 'In this census formula, the prefixed ל marks descent/classification:
    the following family group derives from or belongs to Hezron. English ''from Hezron''
    best captures the genealogical sense in natural modern English.'
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  - the clan
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census/genealogical contexts denotes a kinship subdivision
    within a tribe. 'Clan' is more precise than 'family' in English for this corporate
    lineage unit.
- source_word: הַחֶצְרֹנִי
  chosen: the Hezronites
  alternatives:
  - the Hezronite clan
  - the Hezronite
  lexicon: HALOT
  rationale: The gentilic form identifies the descendants/group associated with Hezron.
    Rendering it as the plural ethnicon 'Hezronites' fits the collective sense required
    by the census formula.
- source_word: לְ/כַרְמִי
  chosen: from Carmi
  alternatives:
  - for Carmi
  - to Carmi
  lexicon: HALOT
  rationale: As with לְחֶצְרֹן, the prefixed ל indicates genealogical derivation or
    classification. 'From Carmi' communicates the lineage relationship idiomatically.
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  - the clan
  lexicon: HALOT
  rationale: Repeated census term; kept consistent with the first occurrence for lexical
    transparency and structural parallelism.
- source_word: הַכַּרְמִי
  chosen: the Carmites
  alternatives:
  - the Carmite clan
  - the Carmite
  lexicon: HALOT
  rationale: The gentilic denotes the descendant group from Carmi. 'Carmites' is the
    natural English collective equivalent and preserves the parallelism with 'Hezronites'.
