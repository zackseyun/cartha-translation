id: NUM.26.34
reference: Numbers 26:34
source:
  edition: WLC
  text: אֵ֖לֶּה מִשְׁפְּחֹ֣ת מְנַשֶּׁ֑ה וּ/פְקֻ֣דֵי/הֶ֔ם שְׁנַ֧יִם וַ/חֲמִשִּׁ֛ים
    אֶ֖לֶף וּ/שְׁבַ֥ע מֵאֽוֹת׃ס
translation:
  text: These are the clans of Manasseh, and those numbered from them were fifty-two
    thousand seven hundred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "their numbered men" or "their mustered ones." The Hebrew census formula
      uses a form of פקד, referring to those counted or enrolled.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: Deictic plural introducing the summary statement of the clan list; present-tense
    English is natural in census formulas.
- source_word: מִשְׁפְּחֹת
  chosen: clans
  alternatives:
  - families
  lexicon: HALOT
  rationale: In Numbers census contexts, the term denotes larger kinship subdivisions
    within a tribe, better captured by 'clans' than the more domestic-sounding 'families'.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: Standard English transliteration of the tribal/personal name, following
    the policy to transliterate names.
- source_word: וּפְקֻדֵיהֶם
  chosen: those numbered from them
  alternatives:
  - their numbered men
  - their enrollment
  - their mustered ones
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like census sense, referring to those
    counted in the tribal census. 'Those numbered from them' preserves the connection
    to the clans without over-specifying 'men' where the Hebrew here leaves it implicit
    in the census formula.
- source_word: שְׁנַיִם וַחֲמִשִּׁים אֶלֶף וּשְׁבַע מֵאוֹת
  chosen: fifty-two thousand seven hundred
  alternatives:
  - two and fifty thousand and seven hundred
  lexicon: HALOT
  rationale: Idiomatic English rendering of the Hebrew number sequence while preserving
    the exact total.
