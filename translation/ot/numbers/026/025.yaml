id: NUM.26.25
reference: Numbers 26:25
source:
  edition: WLC
  text: אֵ֛לֶּה מִשְׁפְּחֹ֥ת יִשָּׂשכָ֖ר לִ/פְקֻדֵי/הֶ֑ם אַרְבָּעָ֧ה וְ/שִׁשִּׁ֛ים
    אֶ֖לֶף וּ/שְׁלֹ֥שׁ מֵאֽוֹת׃ס
translation:
  text: 'These are the clans of Issachar according to those numbered from them: sixty-four
    thousand and three hundred.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'according to their number' or 'by their enrollment.' The Hebrew expression
      refers to the census count of those registered from these clans.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Demonstrative plural introducing a summary statement; English idiom naturally
    supplies 'are' in this verbless clause.
- source_word: מִשְׁפְּחֹת
  chosen: clans
  alternatives:
  - families
  lexicon: HALOT
  rationale: In census and tribal contexts, the term denotes extended kinship groups
    within a tribe; 'clans' is more precise than the broader 'families'.
- source_word: יִשָּׂשכָר
  chosen: Issachar
  rationale: Standard English transliteration of the tribal/personal name, following
    the translation philosophy to transliterate names.
- source_word: לִפְקֻדֵיהֶם
  chosen: according to those numbered from them
  alternatives:
  - according to their number
  - by their enrollment
  - as numbered
  lexicon: HALOT
  rationale: The preposition ל plus passive participial/noun form from פקד with 3mp
    suffix refers to the census reckoning of the clan members. 'According to those
    numbered from them' preserves the relation to the counted persons without overparaphrasing.
    Alternatives are possible, but this wording best reflects the Hebrew construction
    in context.
- source_word: אַרְבָּעָה וְשִׁשִּׁים אֶלֶף
  chosen: sixty-four thousand
  alternatives:
  - four and sixty thousand
  rationale: Standard modern English reverses the Hebrew number order while preserving
    the value 64,000.
- source_word: וּשְׁלֹשׁ מֵאוֹת
  chosen: and three hundred
  rationale: Completes the census total in straightforward modern English.
