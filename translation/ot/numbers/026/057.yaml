id: NUM.26.57
reference: Numbers 26:57
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה פְקוּדֵ֣י הַ/לֵּוִי֮ לְ/מִשְׁפְּחֹתָ/ם֒ לְ/גֵרְשׁ֗וֹן מִשְׁפַּ֨חַת֙
    הַ/גֵּ֣רְשֻׁנִּ֔י לִ/קְהָ֕ת מִשְׁפַּ֖חַת הַ/קְּהָתִ֑י לִ/מְרָרִ֕י מִשְׁפַּ֖חַת
    הַ/מְּרָרִֽי׃
translation:
  text: 'And these were the numbered ones of Levi by their clans: of Gershon, the
    clan of the Gershonites; of Kohath, the clan of the Kohathites; of Merari, the
    clan of the Merarites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those counted' or 'those registered.' The Hebrew refers to persons enrolled
      in the census, not merely the abstract act of counting.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְקוּדֵי
  chosen: the numbered ones
  alternatives:
  - those counted
  - those registered
  - the census of
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like nominal form, referring to those
    enrolled or counted in the census. 'The numbered ones' preserves the concrete
    sense of persons counted, closer to the Hebrew than the abstract 'census,' while
    remaining readable.
- source_word: הַלֵּוִי
  chosen: Levi
  alternatives:
  - the Levite
  - the Levites
  lexicon: HALOT
  rationale: Here the singular with article functions as the tribal ancestor/tribal
    designation, introducing the Levite census by clan. 'Levi' is the most natural
    English rendering in this genealogical formula, avoiding the misleading singular
    personal sense of 'the Levite' and the interpretive plural 'the Levites' in the
    head phrase.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census and tribal contexts refers to clan-level subdivisions
    rather than modern nuclear families. 'By their clans' communicates the social
    unit accurately and idiomatically.
- source_word: לְגֵרְשׁוֹן
  chosen: of Gershon
  alternatives:
  - for Gershon
  - to Gershon
  - from Gershon
  lexicon: HALOT
  rationale: The prefixed ל in this repeated census formula introduces descent/group
    affiliation. 'Of Gershon' is idiomatic in English genealogical listing and matches
    the following clan designation.
- source_word: מִשְׁפַּחַת הַגֵּרְשֻׁנִּי
  chosen: the clan of the Gershonites
  alternatives:
  - the family of the Gershonite
  lexicon: HALOT
  rationale: The gentilic form denotes the descendant clan group, best rendered with
    the English plural ethnicon 'Gershonites.' 'Clan' again reflects the tribal census
    context.
- source_word: לִקְהָת
  chosen: of Kohath
  alternatives:
  - for Kohath
  - to Kohath
  lexicon: HALOT
  rationale: Same genealogical/distributive ל as in the previous phrase; 'of Kohath'
    is the clearest English rendering in the list.
- source_word: מִשְׁפַּחַת הַקְּהָתִי
  chosen: the clan of the Kohathites
  alternatives:
  - the family of the Kohathite
  lexicon: HALOT
  rationale: The gentilic refers to the clan descended from Kohath. English plural
    ethnicon is the natural equivalent.
- source_word: לִמְרָרִי
  chosen: of Merari
  alternatives:
  - for Merari
  - to Merari
  lexicon: HALOT
  rationale: Same construction as the prior two names; 'of Merari' preserves the genealogical
    listing pattern.
- source_word: מִשְׁפַּחַת הַמְּרָרִי
  chosen: the clan of the Merarites
  alternatives:
  - the family of the Merarite
  lexicon: HALOT
  rationale: The gentilic denotes the descendant clan group. 'Merarites' is the standard
    and accurate English form.
- source_word: וְאֵלֶּה
  chosen: And these were
  alternatives:
  - These were
  - Now these were
  lexicon: HALOT
  rationale: The conjunction links this verse to the surrounding census material.
    'And these were' preserves the narrative continuity without sounding overly wooden.
