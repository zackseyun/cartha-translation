id: NUM.26.36
reference: Numbers 26:36
source:
  edition: WLC
  text: וְ/אֵ֖לֶּה בְּנֵ֣י שׁוּתָ֑לַח לְ/עֵרָ֕ן מִשְׁפַּ֖חַת הָ/עֵרָנִֽי׃
translation:
  text: 'And these were the sons of Shuthelah: of Eran, the clan of the Eranites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew literally, ''And these [were] the sons of Shuthelah: of Eran, the
      clan of the Eranite.'' Here ''sons of'' functions as genealogical language for
      descendants/clan lines, not necessarily immediate sons only.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: And these were
  alternatives:
  - And these are
  - Now these were
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces the next item in the census
    list. English idiom in this genealogical context is smoother with 'And these were'
    rather than the more wooden 'And these are,' while still reflecting the list-advancing
    function.
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the descendants of
  - the children of
  lexicon: HALOT
  rationale: Formal genealogical language is appropriate here. Although the verse
    proceeds to a clan descendant rather than multiple immediate sons, 'sons of' preserves
    the Hebrew genealogical idiom better than the more interpretive 'descendants of.'
- source_word: שׁוּתָלַח
  chosen: Shuthelah
  alternatives:
  - Shuthalah
  rationale: Personal names are transliterated by standard convention per project
    philosophy. 'Shuthelah' is a common English transliteration of this name.
- source_word: לְ/עֵרָן
  chosen: of Eran
  alternatives:
  - to Eran
  - Eran
  lexicon: HALOT
  rationale: 'The prefixed ל marks the subdivision/member heading within the census
    formula: ''of Eran, the clan...'' In English, ''of Eran'' best conveys clan derivation
    without forcing an unnatural literal ''to Eran.'''
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  - the clan
  lexicon: HALOT
  rationale: In Numbers census material, מִשְׁפָּחָה denotes a kinship subdivision
    within a tribe. 'Clan' is the most precise and natural rendering in this administrative-genealogical
    context.
- source_word: הָ/עֵרָנִי
  chosen: the Eranites
  alternatives:
  - the Eranite clan
  - the Eranite
  lexicon: HALOT
  rationale: The gentilicial form denotes the named clan descending from Eran. 'The
    Eranites' is standard English for such patronymic group names and pairs naturally
    with 'clan of.'
