theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: of the sons of Israel
  alternative_readings:
  - of the Israelites
  - of the children of Israel
  rationale: The Hebrew is literally 'sons of Israel.' Following the project's gender-accurate
    principle, the familial term is preserved rather than flattened to an ethnonym,
    while still understood corporately.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sense of פְּקוּדֵי in a census context
  chosen_reading: the numbered men
  alternative_readings:
  - those counted
  - the census total
  rationale: The verse reports the result of a military-style census. Rendering the
    term with reference to persons counted, rather than only an abstract total, best
    reflects the Hebrew usage in Numbers.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
