id: NUM.26.51
reference: Numbers 26:51
source:
  edition: WLC
  text: אֵ֗לֶּה פְּקוּדֵי֙ בְּנֵ֣י יִשְׂרָאֵ֔ל שֵׁשׁ מֵא֥וֹת אֶ֖לֶף וָ/אָ֑לֶף שְׁבַ֥ע
    מֵא֖וֹת וּ/שְׁלֹשִֽׁים־׃פ
translation:
  text: 'These are the numbered men of the sons of Israel: six hundred one thousand
    seven hundred thirty.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Israelites" or "the children of Israel." Literally, "the sons of
      Israel."
    reason: lexical_alternative
  - marker: b
    text: Or "those counted"; the Hebrew refers to those registered in the census.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Deictic plural introducing the census total; English idiom naturally
    supplies the copula.
- source_word: פְּקוּדֵי
  chosen: the numbered men
  alternatives:
  - those counted
  - the census total
  - the enrolled men
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like nominal sense used in census
    contexts, referring to those registered/countable in the military census. 'Numbered
    men' preserves the census nuance better than a bare abstract 'number.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: of the sons of Israel
  alternatives:
  - of the Israelites
  - of the children of Israel
  lexicon: HALOT
  rationale: A formally close rendering preserves the Hebrew familial expression.
    'Sons of Israel' is gender-accurate to the source while functioning corporately
    for the nation.
- source_word: שֵׁשׁ מֵאוֹת אֶלֶף
  chosen: six hundred thousand
  lexicon: HALOT
  rationale: Standard Hebrew cardinal construction for 600,000.
- source_word: וָאָלֶף
  chosen: one thousand
  lexicon: HALOT
  rationale: Conjunctive plus singular 'thousand' adds 1,000 to the preceding total.
- source_word: שְׁבַע מֵאוֹת
  chosen: seven hundred
  lexicon: HALOT
  rationale: Standard cardinal construction for 700.
- source_word: וּשְׁלֹשִׁים
  chosen: thirty
  lexicon: HALOT
  rationale: Final additive element in the summed census figure.
