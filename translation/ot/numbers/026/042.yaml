id: NUM.26.42
reference: Numbers 26:42
source:
  edition: WLC
  text: אֵ֤לֶּה בְנֵי דָן֙ לְ/מִשְׁפְּחֹתָ֔/ם לְ/שׁוּחָ֕ם מִשְׁפַּ֖חַת הַ/שּׁוּחָמִ֑י
    אֵ֛לֶּה מִשְׁפְּחֹ֥ת דָּ֖ן לְ/מִשְׁפְּחֹתָֽ/ם־׃
translation:
  text: 'These were the sons of Dan by their clans: of Shuham, the clan of the Shuhamites.
    These were the clans of Dan by their clans.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Dan'; in this genealogical census formula, 'sons' can function
      as a tribal-descendant term.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These were
  alternatives:
  - These are
  - These
  lexicon: HALOT
  rationale: The demonstrative introduces a census-style listing. English past tense
    ('were') fits the narrative/reporting context of the census better than a bare
    present, while preserving the deictic force.
- source_word: בְנֵי דָן
  chosen: the sons of Dan
  alternatives:
  - the descendants of Dan
  - the children of Dan
  lexicon: HALOT
  rationale: בְּנֵי is literally 'sons of.' In genealogical/census contexts it can
    denote descendants, but here the formulaic tribal register is best preserved with
    'sons of Dan,' retaining the source's gendered form per translation philosophy.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their clans
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in Numbers census material refers to clan-level subdivisions
    within a tribe. 'By their clans' is concise, natural English and more precise
    than 'families.'
- source_word: לְשׁוּחָם
  chosen: of Shuham
  alternatives:
  - to Shuham
  - for Shuham
  lexicon: HALOT
  rationale: The prefixed ל in this genealogical formula marks descent/source within
    the clan list. 'Of Shuham' communicates the clan progenitor relationship idiomatically
    in English.
- source_word: מִשְׁפַּחַת הַשּׁוּחָמִי
  chosen: the clan of the Shuhamites
  alternatives:
  - the family of the Shuhamite
  - the Shuhamite clan
  lexicon: HALOT
  rationale: The singular construct מִשְׁפַּחַת with the gentilic הַשּׁוּחָמִי denotes
    the named clan descending from Shuham. 'Clan of the Shuhamites' makes the collective
    sense clear in English.
- source_word: מִשְׁפְּחֹת דָּן
  chosen: the clans of Dan
  alternatives:
  - Dan's clans
  - the families of Dan
  lexicon: HALOT
  rationale: A straightforward rendering of the summary phrase; 'clans' maintains
    consistency with earlier מִשְׁפָּחָה terminology in the verse.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their clans
  lexicon: HALOT
  rationale: The repeated phrase is retained consistently. Although somewhat redundant
    in English, the repetition reflects the formal census style of the Hebrew and
    should not be omitted.
