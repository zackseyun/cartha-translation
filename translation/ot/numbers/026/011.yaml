id: NUM.26.11
reference: Numbers 26:11
source:
  edition: WLC
  text: וּ/בְנֵי קֹ֖רַח לֹא מֵֽתוּ־־׃ס
translation:
  text: But the sons of Korah did not die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “And the sons of Korah did not die.” The Hebrew conjunction can be read
      as simple coordination; “But” brings out the contrast with the preceding deaths
      in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  chosen: But the sons of
  alternatives:
  - And the sons of
  - Now the sons of
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply 'and,' but here an adversative
    nuance fits the context after the judgment on Korah's line in the surrounding
    passage. 'Sons of' is the standard rendering of construct בְנֵי, denoting descendants/children
    in a genealogical register.
- source_word: קֹרַח
  chosen: Korah
  lexicon: HALOT
  rationale: Proper personal name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: לֹא
  chosen: did not
  alternatives:
  - not
  lexicon: HALOT
  rationale: Standard negation rendered idiomatically in English with auxiliary support
    for the following perfect verb.
- source_word: מֵתוּ
  chosen: die
  alternatives:
  - perish
  - died
  lexicon: HALOT
  rationale: From מות, 'to die.' With the English auxiliary construction after לֹא,
    'did not die' is the most natural rendering. Although the Hebrew perfect could
    be rendered 'did not die' or 'did not die off/perish,' the simple verbal sense
    is sufficient and matches the narrative note that Korah's sons survived.
