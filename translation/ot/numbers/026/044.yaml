id: NUM.26.44
reference: Numbers 26:44
source:
  edition: WLC
  text: בְּנֵ֣י אָשֵׁר֮ לְ/מִשְׁפְּחֹתָ/ם֒ לְ/יִמְנָ֗ה מִשְׁפַּ֨חַת֙ הַ/יִּמְנָ֔ה
    לְ/יִשְׁוִ֕י מִשְׁפַּ֖חַת הַ/יִּשְׁוִ֑י לִ/בְרִיעָ֕ה מִשְׁפַּ֖חַת הַ/בְּרִיעִֽי׃
translation:
  text: 'The sons of Asher by their clans: of Imnah, the clan of the Imnites; of Ishvi,
    the clan of the Ishvites; of Beriah, the clan of the Beriites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'families'; in this census context the term refers to clan divisions
      within the tribe.
    reason: lexical_alternative
  - marker: b
    text: Or 'Beriahites' for 'Beriites'; the Hebrew gentilic is derived from Beriah.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי אָשֵׁר
  chosen: The sons of Asher
  alternatives:
  - The descendants of Asher
  - The children of Asher
  lexicon: HALOT
  rationale: בְּנֵי is literally 'sons of.' In this census genealogy context it introduces
    male-line descendants/clan founders. 'Sons' preserves the formal genealogical
    idiom better than the broader 'descendants' or 'children.'
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in Numbers census material refers to clan-level subdivisions
    within a tribe. 'By their clans' is natural English and more precise than 'families,'
    which can sound too narrow in modern usage.
- source_word: לְיִמְנָה
  chosen: of Imnah
  alternatives:
  - to Imnah
  - for Imnah
  lexicon: HALOT
  rationale: The prefixed ל in this repetitive genealogical formula is best rendered
    idiomatically as 'of,' introducing descent from the named ancestor.
- source_word: מִשְׁפַּחַת הַיִּמְנָה
  chosen: the clan of the Imnites
  alternatives:
  - the family of the Imnahites
  - the clan of Imnah
  lexicon: HALOT
  rationale: The construction names the resulting clan from the ancestor Imnah. English
    gentilics in this chapter are commonly rendered with '-ites'; 'Imnites' is a concise
    transliterated clan name matching the Hebrew gentilic function.
- source_word: לְיִשְׁוִי
  chosen: of Ishvi
  alternatives:
  - of Isui
  lexicon: HALOT
  rationale: יִשְׁוִי is a personal name. It is transliterated rather than translated,
    following the project's policy for names. 'Ishvi' reflects the consonantal form
    in the MT.
- source_word: מִשְׁפַּחַת הַיִּשְׁוִי
  chosen: the clan of the Ishvites
  alternatives:
  - the family of the Ishvites
  - the clan of the Ishuites
  lexicon: HALOT
  rationale: This is the gentilic/clan designation derived from Ishvi. 'Clan' fits
    the census context; 'Ishvites' is the most straightforward English formation from
    the MT name.
- source_word: לִבְרִיעָה
  chosen: of Beriah
  alternatives:
  - to Beriah
  - for Beriah
  lexicon: HALOT
  rationale: As with the previous names, the prefixed ל is rendered idiomatically
    as 'of' in this genealogical listing.
- source_word: מִשְׁפַּחַת הַבְּרִיעִי
  chosen: the clan of the Beriites
  alternatives:
  - the family of the Beriahites
  - the clan of the Beriites/Beriahites
  lexicon: HALOT
  rationale: The gentilic form בְּרִיעִי is most directly represented by 'Beriite.'
    This follows the Hebrew derivative more closely than expanding to 'Beriahite,'
    though the latter is a possible smoothing in English.
