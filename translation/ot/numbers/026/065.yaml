id: NUM.26.65
reference: Numbers 26:65
source:
  edition: WLC
  text: כִּֽי אָמַ֤ר יְהוָה֙ לָ/הֶ֔ם מ֥וֹת יָמֻ֖תוּ בַּ/מִּדְבָּ֑ר וְ/לֹא נוֹתַ֤ר מֵ/הֶם֙ אִ֔ישׁ כִּ֚י אִם כָּלֵ֣ב בֶּן יְפֻנֶּ֔ה וִ/יהוֹשֻׁ֖עַ בִּן נֽוּן־־־־־׃ס
translation:
  text: For Yahweh had said of them, ‘They shall surely die in the wilderness,’ and not a man was left of them except Caleb son of Jephunneh and Joshua son of Nun.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''dying they shall die,'' an emphatic form meaning ''they shall surely die.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'and no one remained of them'; Hebrew literally, 'and not a man was left from them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the preceding statement; 'For' is natural English and preserves the causal/explanatory force.
- source_word: אָמַר
  chosen: had said
  alternatives:
  - said
  lexicon: HALOT
  rationale: Rendered as past perfect in English to reflect that the divine declaration preceded the present census result being explained.
- source_word: לָהֶם
  chosen: of them
  alternatives:
  - to them
  - concerning them
  lexicon: HALOT
  rationale: In context the preposition marks the people as the subject of the divine pronouncement. 'Of them' is idiomatic with 'had said' in English here, though 'concerning them' is also possible.
- source_word: מוֹת יָמֻתוּ
  chosen: They shall surely die
  alternatives:
  - they will certainly die
  - dying they shall die
  lexicon: HALOT
  rationale: This infinitive absolute plus finite verb intensifies the verbal idea. 'Shall surely die' preserves the emphatic force in established but still understandable English.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard rendering for מִדְבָּר in the Pentateuch and fits Israel''s setting without over-specifying terrain.'
- source_word: וְלֹא נוֹתַר מֵהֶם אִישׁ
  chosen: and not a man was left from them
  alternatives:
  - and no one remained of them
  - and not one man remained from them
  lexicon: HALOT
  rationale: אִישׁ is singular 'man' used distributively. Per doctrine, gender-accurate rendering is preferred where it matches source intent. The phrase means that not even one individual remained from that generation.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - one
  - anyone
  lexicon: HALOT
  rationale: Although the sense is generic/individual, the Hebrew uses the masculine singular noun. 'A man' preserves the form and distributive sense; the clause as a whole communicates that none remained.
- source_word: כִּי אִם
  chosen: except
  alternatives:
  - but only
  - unless
  lexicon: HALOT
  rationale: This idiom introduces the sole exceptions to the preceding negative statement.
- source_word: כָּלֵב בֶּן יְפֻנֶּה
  chosen: Caleb son of Jephunneh
  alternatives:
  - Caleb ben Jephunneh
  lexicon: HALOT
  rationale: Personal names are transliterated; בֶּן is translated as 'son of' in standard English genealogical style.
- source_word: וִיהוֹשֻׁעַ בִּן נוּן
  chosen: and Joshua son of Nun
  alternatives:
  - and Yehoshua son of Nun
  lexicon: HALOT
  rationale: Standard English transliteration 'Joshua' is appropriate; 'son of Nun' translates the patronymic construction naturally.
