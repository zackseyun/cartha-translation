id: NUM.26.21
reference: Numbers 26:21
source:
  edition: WLC
  text: וַ/יִּהְי֣וּ בְנֵי פֶ֔רֶץ לְ/חֶצְרֹ֕ן מִשְׁפַּ֖חַת הַֽ/חֶצְרֹנִ֑י לְ/חָמ֕וּל
    מִשְׁפַּ֖חַת הֶ/חָמוּלִֽי־׃
translation:
  text: 'The sons of Perez were: of Hezron, the clan of the Hezronites; of Hamul,
    the clan of the Hamulites.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - became
  - came to be
  lexicon: HALOT
  rationale: In this genealogical census formula, היה functions as a simple copular/existential
    verb introducing the listed descendants and their clans. English 'were' is the
    most natural and sufficiently formal rendering.
- source_word: בְנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: Although בנים can sometimes mean broader descendants, here the immediate
    genealogical structure names male lineage heads from whom clans derive. 'Sons
    of' preserves the Hebrew form and the gender-accurate principle.
- source_word: פֶרֶץ
  chosen: Perez
  alternatives:
  - Pharez
  rationale: Standard modern transliteration of the personal name; preferred over
    older tradition-bound 'Pharez'.
- source_word: לְחֶצְרֹן
  chosen: of Hezron
  alternatives:
  - to Hezron
  - for Hezron
  lexicon: HALOT
  rationale: 'In this census formula, ל marks clan derivation or descent: ''of Hezron''
    idiomatically conveys that the Hezronite clan descends from Hezron.'
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  - the clan
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in Numbers census contexts refers to a kinship subdivision
    within a tribe. 'Clan' best matches the social unit in readable modern English.
- source_word: הַחֶצְרֹנִי
  chosen: the Hezronites
  alternatives:
  - the Hezronite clan
  - the Hezronite
  lexicon: HALOT
  rationale: The gentilicial form denotes the group descended from Hezron. Rendering
    it as the plural ethnicon 'Hezronites' is natural in English and matches the census
    style.
- source_word: לְחָמוּל
  chosen: of Hamul
  alternatives:
  - to Hamul
  - for Hamul
  lexicon: HALOT
  rationale: As with Hezron, the prefixed ל indicates descent/grouping in the genealogical
    list, best rendered idiomatically as 'of Hamul.'
- source_word: הֶחָמוּלִי
  chosen: the Hamulites
  alternatives:
  - the Hamulite clan
  - the Hamulite
  lexicon: HALOT
  rationale: The gentilicial form identifies the clan descended from Hamul. 'Hamulites'
    is the clearest English equivalent in this list format.
