theological_decisions:
- issue: Gendered covenantal expression in בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: Following the translation philosophy's gender-accurate principle, the
    familial masculine form is preserved rather than neutralized. In this military
    census context, the male-oriented framing is also contextually relevant.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Military eligibility implied by כָּל יֹצֵא צָבָא
  chosen_reading: everyone in Israel who is able to go out to war
  alternative_readings:
  - every man fit for military service
  rationale: The Hebrew expression identifies those liable for warfare. 'Everyone'
    avoids adding a separate noun not present in Hebrew, while the surrounding context
    and age threshold make the military census function clear.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
