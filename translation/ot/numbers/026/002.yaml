id: NUM.26.2
reference: Numbers 26:2
source:
  edition: WLC
  text: שְׂא֞וּ אֶת רֹ֣אשׁ כָּל עֲדַ֣ת בְּנֵי יִשְׂרָאֵ֗ל מִ/בֶּ֨ן עֶשְׂרִ֥ים שָׁנָ֛ה
    וָ/מַ֖עְלָ/ה לְ/בֵ֣ית אֲבֹתָ֑/ם כָּל יֹצֵ֥א צָבָ֖א בְּ/יִשְׂרָאֵֽל־׀־־־׃
translation:
  text: Take a census of the whole congregation of the sons of Israel, from twenty
    years old and upward, by their fathers’ houses, everyone in Israel who is able
    to go out to war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'Lift up the head of the whole congregation.' This is
      an idiom meaning 'take a census' or 'count.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' or 'the children of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'every man fit for military service in Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאוּ
  chosen: Take a census
  alternatives:
  - Lift up
  - Count
  lexicon: HALOT
  rationale: Literally 'lift up' with 'head' forms the idiom 'lift up the head,' meaning
    to count or take a census. 'Take a census' renders the idiomatic sense clearly
    in modern English.
- source_word: רֹאשׁ
  chosen: a census
  alternatives:
  - head
  lexicon: HALOT
  rationale: Within the idiom שׂא את־ראשׁ, 'head' functions as part of the census
    expression rather than requiring a separate literal rendering in English.
- source_word: כָּל עֲדַת
  chosen: the whole congregation
  alternatives:
  - the whole community
  - the entire assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled covenant community. 'Congregation'
    preserves the formal communal sense and fits Pentateuchal usage.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A more literal rendering is preferred here to preserve the Hebrew familial
    expression and the gender-accurate wording of the source, while still being natural
    enough in context.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  chosen: from twenty years old and upward
  alternatives:
  - from twenty years old and above
  - aged twenty years and up
  lexicon: HALOT
  rationale: This is a standard age-threshold formula. 'And upward' closely reflects
    the Hebrew while remaining idiomatic English.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - according to their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: This phrase indicates clan/paternal-household organization for the census.
    'Fathers’ houses' preserves the social structure named in the Hebrew.
- source_word: כָּל יֹצֵא צָבָא
  chosen: everyone in Israel who is able to go out to war
  alternatives:
  - all who go out to the army
  - every man fit for military service
  lexicon: HALOT
  rationale: The phrase denotes those eligible for military duty. 'Able to go out
    to war' makes the functional sense explicit without over-paraphrasing.
- source_word: צָבָא
  chosen: war
  alternatives:
  - army
  - military service
  lexicon: HALOT
  rationale: In this construction with 'go out,' the sense is martial participation.
    'War' is the most natural English complement to 'go out to' here.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: A straightforward locative/social rendering that fits the census context.
