id: NUM.26.45
reference: Numbers 26:45
source:
  edition: WLC
  text: לִ/בְנֵ֣י בְרִיעָ֔ה לְ/חֶ֕בֶר מִשְׁפַּ֖חַת הַֽ/חֶבְרִ֑י לְ/מַ֨לְכִּיאֵ֔ל מִשְׁפַּ֖חַת
    הַ/מַּלְכִּיאֵלִֽי׃
translation:
  text: 'For the sons of Beriah: from Heber, the clan of the Heberites; from Malkiel,
    the clan of the Malkielites.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לִ/בְנֵי
  chosen: For the sons of
  alternatives:
  - For the descendants of
  - To the sons of
  lexicon: HALOT
  rationale: The prefixed ל in this census formula introduces the subdivision belonging
    to a larger tribal line; 'For the sons of' is idiomatic and preserves the genealogical
    structure. 'Descendants' is possible but less formally tied to the recurring formula.
- source_word: בְרִיעָה
  chosen: Beriah
  rationale: 'Personal name transliterated per translation philosophy: names are transliterated
    rather than translated.'
- source_word: לְ/חֶבֶר
  chosen: from Heber
  alternatives:
  - to Heber
  - for Heber
  lexicon: HALOT
  rationale: In this repeated census pattern, prefixed ל before a clan ancestor is
    best rendered 'from,' indicating descent/source for the named family line. This
    yields natural English while preserving the genealogical sense.
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  - the clan
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census/genealogical contexts denotes a kinship subdivision
    within a tribe. 'Clan' best captures this social unit in modern English more precisely
    than the broader 'family.'
- source_word: הַֽ/חֶבְרִי
  chosen: the Heberites
  alternatives:
  - the Heberite clan
  - the Hebrites
  lexicon: HALOT
  rationale: The gentilicial form identifies the descendants/group derived from Heber.
    'Heberites' is the standard and clear English rendering for this patronymic plural
    sense.
- source_word: לְ/מַ֨לְכִּיאֵל
  chosen: from Malkiel
  alternatives:
  - to Malkiel
  - for Malkiel
  lexicon: HALOT
  rationale: As with Heber, the prefixed ל in this census list marks descent from
    the named ancestor; 'from Malkiel' communicates that relationship naturally in
    English.
- source_word: הַ/מַּלְכִּיאֵלִי
  chosen: the Malkielites
  alternatives:
  - the Malkielite clan
  lexicon: HALOT
  rationale: The gentilicial form denotes the clan descending from Malkiel. 'Malkielites'
    is concise and preserves the genealogical naming pattern.
