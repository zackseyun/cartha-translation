id: NUM.26.20
reference: Numbers 26:20
source:
  edition: WLC
  text: וַ/יִּהְי֣וּ בְנֵי יְהוּדָה֮ לְ/מִשְׁפְּחֹתָ/ם֒ לְ/שֵׁלָ֗ה מִשְׁפַּ֨חַת֙ הַ/שֵּׁ֣לָנִ֔י
    לְ/פֶ֕רֶץ מִשְׁפַּ֖חַת הַ/פַּרְצִ֑י לְ/זֶ֕רַח מִשְׁפַּ֖חַת הַ/זַּרְחִֽי־׃
translation:
  text: 'The sons of Judah by their clans were: of Shelah, the clan of the Shelanites;
    of Perez, the clan of the Perezites; of Zerah, the clan of the Zerahites.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Judah'; in this census context the phrase denotes Judah's
      male-line descendants grouped into clans.
    reason: lexical_alternative
  - marker: b
    text: Older English tradition sometimes has 'Pharez' for Perez.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - became
  - came to be
  lexicon: HALOT
  rationale: In this census formula, the waw-consecutive form of היה functions as
    a simple copular/existential introduction to the clan list. 'Were' is idiomatic
    and sufficiently formal without overstating process.
- source_word: בְנֵי יְהוּדָה
  chosen: The sons of Judah
  alternatives:
  - The descendants of Judah
  - The children of Judah
  lexicon: HALOT
  rationale: בני literally means 'sons of.' In genealogical/census contexts it can
    denote descendants, but here the conventional clan-register formula is best preserved
    with 'sons,' which remains clear in English and reflects the masculine genealogical
    framing of the Hebrew.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in Numbers 26 refers to sub-tribal clan groupings in a census
    context. 'Clans' is more precise and natural than 'families' in modern English,
    while 'by' captures the classificatory force of לְ.
- source_word: לְשֵׁלָה
  chosen: of Shelah
  alternatives:
  - to Shelah
  - for Shelah
  lexicon: HALOT
  rationale: The repeated לְ before each ancestor introduces descent/source for the
    named clan. 'Of Shelah' is the most idiomatic English rendering in this list structure.
- source_word: מִשְׁפַּחַת הַשֵּׁלָנִי
  chosen: the clan of the Shelanites
  alternatives:
  - the family of the Shelanite clan
  - the Shelanite clan
  lexicon: HALOT
  rationale: The construct phrase explicitly names the clan and its gentilic form.
    'The clan of the Shelanites' preserves both elements and matches the repetitive
    census style.
- source_word: לְפֶרֶץ
  chosen: of Perez
  alternatives:
  - of Perez/Pharez
  lexicon: HALOT
  rationale: Perez is the standard English transliteration from Hebrew פֶרֶץ. The
    older form 'Pharez' reflects Greek/Latin tradition rather than the Hebrew source,
    so 'Perez' is preferred.
- source_word: מִשְׁפַּחַת הַפַּרְצִי
  chosen: the clan of the Perezites
  alternatives:
  - the clan of the Perez clan
  - the Perezite clan
  lexicon: HALOT
  rationale: Although the gentilic form is built from the Hebrew root behind Perez,
    English naturally renders it as 'Perezites.' This preserves the derivational relationship
    while remaining readable.
- source_word: לְזֶרַח
  chosen: of Zerah
  alternatives:
  - of Zerah/Zarah
  lexicon: HALOT
  rationale: Zerah is the standard transliteration of זֶרַח from Hebrew. It is preferable
    to variant traditional spellings not directly reflecting the consonantal form
    here.
- source_word: מִשְׁפַּחַת הַזַּרְחִי
  chosen: the clan of the Zerahites
  alternatives:
  - the Zerahite clan
  lexicon: HALOT
  rationale: As with the other clan names, the gentilic is best rendered with the
    English people-group suffix '-ites.' Retaining 'clan of the Zerahites' mirrors
    the Hebrew structure and the verse's patterned style.
