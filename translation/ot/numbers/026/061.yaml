id: NUM.26.61
reference: Numbers 26:61
source:
  edition: WLC
  text: וַ/יָּ֥מָת נָדָ֖ב וַ/אֲבִיה֑וּא בְּ/הַקְרִיבָ֥/ם אֵשׁ זָרָ֖ה לִ/פְנֵ֥י יְהוָֽה־׃
translation:
  text: But Nadab and Abihu died when they offered unauthorized fire before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strange fire' or 'foreign fire.' The Hebrew refers to fire that was
      not authorized for offering before the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - and he died
  - and died
  lexicon: HALOT
  rationale: The singular verb precedes a compound subject ('Nadab and Abihu'), a
    common Hebrew construction. English idiom requires a plural sense, so 'died' is
    used with the compound subject rather than a wooden singular rendering.
- source_word: נָדָב וַאֲבִיהוּא
  chosen: Nadab and Abihu
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy.
- source_word: בְּהַקְרִיבָם
  chosen: when they offered
  alternatives:
  - in their offering
  - as they presented
  lexicon: HALOT
  rationale: The preposition ב with the infinitive construct plus suffix is temporal
    here, naturally rendered 'when they offered.' 'Offered' fits sacrificial context
    and is more idiomatic than a nominal English construction.
- source_word: אֵשׁ זָרָה
  chosen: unauthorized fire
  alternatives:
  - strange fire
  - foreign fire
  lexicon: HALOT
  rationale: זָרָה here denotes something improper or not permitted in cultic context.
    'Unauthorized fire' communicates the sense clearly in modern English without relying
    on the traditional but potentially opaque 'strange fire.'
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is regularly rendered 'before' in spatial/cultic contexts. יְהוָה
    is rendered 'the LORD' according to the doctrinal default for the divine name.
- source_word: וַ
  chosen: But
  alternatives:
  - And
  rationale: Although waw commonly means 'and,' here 'But' better signals the contrast
    with the surrounding genealogy and the exceptional note about these two sons.
    This is a modest discourse-level adjustment consistent with optimal equivalence.
