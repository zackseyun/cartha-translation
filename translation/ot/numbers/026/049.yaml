id: NUM.26.49
reference: Numbers 26:49
source:
  edition: WLC
  text: לְ/יֵ֕צֶר מִשְׁפַּ֖חַת הַ/יִּצְרִ֑י לְ/שִׁלֵּ֕ם מִשְׁפַּ֖חַת הַ/שִּׁלֵּמִֽי׃
translation:
  text: of Iezer, the clan of the Iezerites; of Shillem, the clan of the Shillemites.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/יֵצֶר
  chosen: of Iezer
  alternatives:
  - for Iezer
  - to Iezer
  lexicon: HALOT
  rationale: In this census formula, the prefixed ל introduces the descendant/clan
    head being listed, best rendered idiomatically as 'of' in English genealogical
    style. The personal name is transliterated rather than translated, following the
    policy to transliterate names.
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census and tribal contexts denotes a kinship subdivision
    within a tribe, more specific than a modern nuclear 'family.' 'Clan' best fits
    the social structure and is standard, readable English.
- source_word: הַיִּצְרִי
  chosen: the Iezerites
  alternatives:
  - the Izrite clan
  - the Jizrite clan
  lexicon: HALOT
  rationale: This gentilicial form names the descendants/clan derived from Iezer.
    'Iezerites' preserves the transparent relation to the personal name Iezer in English.
    Alternative spellings reflect different transliteration traditions, but this form
    keeps consistency with the base name used here.
- source_word: לְ/שִׁלֵּם
  chosen: of Shillem
  alternatives:
  - for Shillem
  - to Shillem
  lexicon: HALOT
  rationale: As with the first name in the verse, the prefixed ל is rendered idiomatically
    as 'of' in this repeated census pattern. The name is transliterated.
- source_word: הַשִּׁלֵּמִי
  chosen: the Shillemites
  alternatives:
  - the Shillemite clan
  lexicon: HALOT
  rationale: The gentilicial form indicates the clan descending from Shillem. 'Shillemites'
    is a natural English ethnicon/clan designation and mirrors the Hebrew derivation.
