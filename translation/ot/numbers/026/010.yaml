id: NUM.26.10
reference: Numbers 26:10
source:
  edition: WLC
  text: וַ/תִּפְתַּ֨ח הָ/אָ֜רֶץ אֶת פִּ֗י/הָ וַ/תִּבְלַ֥ע אֹתָ֛/ם וְ/אֶת קֹ֖רַח בְּ/מ֣וֹת
    הָ/עֵדָ֑ה בַּ/אֲכֹ֣ל הָ/אֵ֗שׁ אֵ֣ת חֲמִשִּׁ֤ים וּ/מָאתַ֨יִם֙ אִ֔ישׁ וַ/יִּהְי֖וּ
    לְ/נֵֽס־־׃
translation:
  text: and the earth opened its mouth and swallowed them and Korah, when the congregation
    died, when the fire consumed two hundred fifty men; and they became a warning
    sign.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land opened its mouth.'
    reason: lexical_alternative
  - marker: b
    text: Or simply 'they became a sign.' The Hebrew נֵס can denote a sign, signal,
      or standard; 'warning sign' makes the function explicit in context.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'them and Korah.' This verse states the judgment in that form; compare
      the broader narrative in Numbers 16 for the surrounding details.
    reason: cross_reference
lexical_decisions:
- source_word: וַתִּפְתַּח הָאָרֶץ אֶת־פִּיהָ
  chosen: the earth opened its mouth
  alternatives:
  - the land opened its mouth
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land'; here the imagery of the ground opening
    favors 'earth.' Retaining 'mouth' preserves the vivid personification in the Hebrew.
- source_word: וַתִּבְלַע
  chosen: swallowed
  alternatives:
  - swallowed up
  - devoured
  lexicon: HALOT
  rationale: בלע commonly means 'swallow'; 'swallowed' is natural English and preserves
    the concrete image without adding intensity beyond the source.
- source_word: אֹתָם וְאֶת־קֹרַח
  chosen: them and Korah
  alternatives:
  - them, along with Korah
  lexicon: HALOT
  rationale: The Hebrew explicitly coordinates 'them' and 'Korah.' Although Numbers
    16 raises interpretive questions about Korah's exact fate, this verse includes
    him syntactically, so the translation preserves that wording rather than harmonizing.
- source_word: בְּמוֹת הָעֵדָה
  chosen: when the congregation died
  alternatives:
  - at the death of the company
  - when the community died
  lexicon: HALOT
  rationale: 'The preposition ב plus infinitive construct of מות is temporal: ''when
    ... died.'' עֵדָה is regularly ''congregation'' in Numbers for the assembled company/group.'
- source_word: בַּאֲכֹל הָאֵשׁ
  chosen: when the fire consumed
  alternatives:
  - as the fire consumed
  - when the fire ate up
  lexicon: HALOT
  rationale: The infinitive construct with ב is temporal. Although אכל is literally
    'eat,' with fire as subject idiomatic English is 'consume.'
- source_word: חֲמִשִּׁים וּמָאתַיִם אִישׁ
  chosen: two hundred fifty men
  alternatives:
  - two hundred and fifty men
  lexicon: HALOT
  rationale: This is the straightforward cardinal number plus איש. 'Men' is retained
    as gender-accurate, matching the Hebrew singular collective איש after the number.
- source_word: וַיִּהְיוּ לְנֵס
  chosen: they became a warning sign
  alternatives:
  - they became a sign
  - they became an example
  lexicon: HALOT
  rationale: נֵס can mean 'signal, standard, sign.' In this judgment context, 'warning
    sign' brings out the function indicated by the narrative while remaining close
    to the lexical sense of a sign set up for notice.
