id: NUM.26.3
reference: Numbers 26:3
source:
  edition: WLC
  text: וַ/יְדַבֵּ֨ר מֹשֶׁ֜ה וְ/אֶלְעָזָ֧ר הַ/כֹּהֵ֛ן אֹתָ֖/ם בְּ/עַֽרְבֹ֣ת מוֹאָ֑ב
    עַל יַרְדֵּ֥ן יְרֵח֖וֹ לֵ/אמֹֽר־׃
translation:
  text: Moses and Eleazar the priest spoke to them in the plains of Moab by the Jordan
    at Jericho, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "by the Jordan opposite Jericho."
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of דבר introduces direct speech. 'Spoke'
    is the standard and slightly more formal narrative rendering before לֵאמֹר; 'said'
    is possible but less distinct when followed by 'saying.'
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
- source_word: וְאֶלְעָזָר
  chosen: and Eleazar
  rationale: Standard English transliteration of the personal name אֶלְעָזָר, joined
    coordinately with Moses as compound subject.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite title identifying Eleazar's office. 'The priest' preserves the
    Hebrew apposition without importing the fuller title 'high priest,' which is not
    stated here.
- source_word: אֹתָם
  chosen: to them
  alternatives:
  - them
  lexicon: HALOT
  rationale: The object marker with pronominal suffix marks the addressees of the
    speech. In idiomatic English after 'spoke,' this is best rendered 'spoke to them'
    rather than the less natural 'spoke them.'
- source_word: בְּעַרְבֹת מוֹאָב
  chosen: in the plains of Moab
  alternatives:
  - in the steppes of Moab
  lexicon: HALOT
  rationale: עַרְבוֹת refers to the flat steppe/plains region. 'Plains' is natural
    modern English and traditional in this geographical phrase; 'steppes' is more
    technical but less accessible.
- source_word: עַל יַרְדֵּן יְרֵחוֹ
  chosen: by the Jordan at Jericho
  alternatives:
  - by the Jordan opposite Jericho
  - at the Jordan of Jericho
  lexicon: HALOT
  rationale: The phrase locates the setting near the Jordan in relation to Jericho.
    'By the Jordan at Jericho' is concise and natural. Because עַל in this formula
    can indicate proximity or relation, 'opposite Jericho' is possible and worth preserving
    in a footnote.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said,
  lexicon: HALOT
  rationale: Standard infinitive construct introducing the content of speech. 'Saying'
    preserves the Hebrew discourse structure and prepares for the quotation in the
    next verse.
