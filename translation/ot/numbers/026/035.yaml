id: NUM.26.35
reference: Numbers 26:35
source:
  edition: WLC
  text: אֵ֣לֶּה בְנֵי אֶפְרַיִם֮ לְ/מִשְׁפְּחֹתָ/ם֒ לְ/שׁוּתֶ֗לַח מִשְׁפַּ֨חַת֙ הַ/שֻּׁ֣תַלְחִ֔י
    לְ/בֶ֕כֶר מִשְׁפַּ֖חַת הַ/בַּכְרִ֑י לְ/תַ֕חַן מִשְׁפַּ֖חַת הַֽ/תַּחֲנִֽי־׃
translation:
  text: 'These are the sons of Ephraim by their clans: of Shuthelah, the clan of the
    Shuthelahites; of Becher, the clan of the Becherites; of Tahan, the clan of the
    Tahanites.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Introduces the list demonstratively. Rendering with the copula in English
    makes the clause natural while preserving the Hebrew listing formula.
- source_word: בְנֵי אֶפְרַיִם
  chosen: the sons of Ephraim
  alternatives:
  - the descendants of Ephraim
  - the children of Ephraim
  lexicon: HALOT
  rationale: Formal genealogical language is retained. 'Sons' matches בְנֵי in a tribal
    register; broader alternatives are possible but less precise to the Hebrew form.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their clans
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in Numbers census material refers to clan subdivisions within
    tribes. 'By their clans' is concise, natural English and preserves the organizational
    sense.
- source_word: לְשׁוּתֶלַח
  chosen: of Shuthelah
  alternatives:
  - for Shuthelah
  - to Shuthelah
  lexicon: HALOT
  rationale: The prefixed ל in this genealogical formula marks descent/grouping under
    a named ancestor. 'Of' best conveys clan derivation in English.
- source_word: מִשְׁפַּחַת הַשֻּׁתַלְחִי
  chosen: the clan of the Shuthelahites
  alternatives:
  - the family of the Shuthelahite
  - the clan of the Shuthalhite
  lexicon: HALOT
  rationale: The gentilic form denotes the named clan descending from Shuthelah. 'Shuthelahites'
    is the natural English plural clan designation.
- source_word: לְבֶכֶר
  chosen: of Becher
  alternatives:
  - for Becher
  - to Becher
  lexicon: HALOT
  rationale: Same genealogical ל-formula as earlier in the verse; 'of' communicates
    descent/group identity.
- source_word: מִשְׁפַּחַת הַבַּכְרִי
  chosen: the clan of the Becherites
  alternatives:
  - the family of the Bachrite
  - the clan of the Bekrite
  lexicon: HALOT
  rationale: The gentilic from Becher is rendered as an English clan name. 'Becherites'
    transparently reflects the underlying personal name Becher.
- source_word: לְתַחַן
  chosen: of Tahan
  alternatives:
  - for Tahan
  - to Tahan
  lexicon: HALOT
  rationale: Again the genealogical ל indicates descent or clan source; 'of' is idiomatic
    in English lists of this kind.
- source_word: מִשְׁפַּחַת הַתַּחֲנִי
  chosen: the clan of the Tahanites
  alternatives:
  - the family of the Tahanite
  lexicon: HALOT
  rationale: The gentilic is best represented by an English plural clan designation,
    matching the repeated structure of the verse.
