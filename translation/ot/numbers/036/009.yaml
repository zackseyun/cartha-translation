id: NUM.36.9
reference: Numbers 36:9
source:
  edition: WLC
  text: וְ/לֹֽא תִסֹּ֧ב נַחֲלָ֛ה מִ/מַּטֶּ֖ה לְ/מַטֶּ֣ה אַחֵ֑ר כִּי אִישׁ֙ בְּ/נַ֣חֲלָת֔/וֹ
    יִדְבְּק֕וּ מַטּ֖וֹת בְּנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: No inheritance shall pass from one tribe to another tribe, for each of the
    tribes of the sons of Israel shall hold fast to his own inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the tribes of Israel.'' Hebrew: ''the tribes of the sons of Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: תִסֹּב
  chosen: shall pass
  alternatives:
  - shall turn
  - shall transfer
  - shall move around
  lexicon: HALOT
  rationale: The verb סבב in this context refers to an inheritance changing tribal
    affiliation, not physical turning. 'Shall pass' is idiomatic English that preserves
    the legal-transfer sense without overparaphrasing.
- source_word: נַחֲלָה
  chosen: inheritance
  alternatives:
  - heritage
  - property allotment
  lexicon: HALOT
  rationale: In Numbers 36 the term denotes landed inheritance allotted within Israel's
    tribal structure. 'Inheritance' is the standard and sufficiently precise legal
    term.
- source_word: מִמַּטֶּה ... לְמַטֶּה אַחֵר
  chosen: from one tribe to another tribe
  alternatives:
  - from tribe to tribe
  - from one staff/clan to another tribe
  lexicon: HALOT
  rationale: מַטֶּה literally can mean 'staff,' but in this legal-land context it
    denotes a tribal unit. 'From one tribe to another tribe' makes the distributive
    sense explicit and natural in English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the rationale for the prohibition. 'For' fits formal
    legal explanation style in English.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - every man
  - each man
  lexicon: HALOT
  rationale: Although אִישׁ is formally masculine singular, the referent here is distributive
    across the tribal entities that follow. 'Each' preserves the distributive force
    without awkwardly personifying the tribes as 'every man.'
- source_word: בְּנַחֲלָתוֹ
  chosen: to his own inheritance
  alternatives:
  - in his inheritance
  - with his inheritance
  lexicon: HALOT
  rationale: With דבק, the sense is adherence or attachment. In English, 'hold fast
    to his own inheritance' best conveys remaining attached to one's allotted inheritance.
- source_word: יִדְבְּקוּ
  chosen: shall hold fast
  alternatives:
  - shall cling
  - shall remain attached
  lexicon: HALOT
  rationale: דבק commonly conveys clinging or holding fast. In this legal setting,
    'shall hold fast' preserves the metaphor while sounding natural and suitably formal.
- source_word: מַטּוֹת בְּנֵי יִשְׂרָאֵל
  chosen: the tribes of the sons of Israel
  alternatives:
  - the tribes of the Israelites
  - the tribes of Israel
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'sons of Israel.' Per gender-accurate policy,
    this is preserved in the main text, though the phrase denotes the covenant people
    corporately rather than only males.
