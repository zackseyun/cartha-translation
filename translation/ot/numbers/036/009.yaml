theological_decisions:
- issue: Gendered covenantal expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - people of Israel
  rationale: The Hebrew phrase is grammatically and traditionally masculine. Following
    the gender-accurate policy, the translation preserves 'sons of Israel' rather
    than neutralizing it, while recognizing that the phrase refers corporately to
    the people of Israel.
