id: NUM.36.10
reference: Numbers 36:10
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶׁ֑ה כֵּ֥ן עָשׂ֖וּ בְּנ֥וֹת צְלָפְחָֽד־׃
translation:
  text: Just as Yahweh had commanded Moses, so the daughters of Zelophehad did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''As/just as the LORD commanded Moses, so the daughters of Zelophehad did.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: Just as
  alternatives:
  - As
  - According as
  lexicon: HALOT
  rationale: Introduces comparison/correspondence between the command and the action taken. 'Just as' is natural modern English and preserves the sense of exact conformity.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: 'The verb denotes giving a command. English past perfect fits the sequence well in context: the LORD''s prior command is followed by the daughters'' action.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת מֹשֶׁה
  chosen: Moses
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: The direct-object marker אֶת marks Moses as the one whom the LORD commanded. In idiomatic English, 'commanded Moses' is the most natural rendering; 'commanded to Moses' would be unidiomatic.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: 'Signals correspondence: they acted in the manner commanded. ''So'' is concise and natural in English.'
- source_word: עָשׂוּ
  chosen: did
  alternatives:
  - acted
  - done
  lexicon: HALOT
  rationale: With כֵּן, the idiom כֵּן עָשׂוּ is well rendered 'so ... did,' expressing that they acted accordingly. 'Did' preserves the simple verbal force without overinterpreting.
- source_word: בְּנוֹת צְלָפְחָד
  chosen: the daughters of Zelophehad
  alternatives:
  - Zelophehad's daughters
  lexicon: HALOT
  rationale: A straightforward construct phrase identifying the women in view. The fuller form 'the daughters of Zelophehad' matches the Hebrew structure and maintains clarity.
