id: NUM.36.13
reference: Numbers 36:13
source:
  edition: WLC
  text: אֵ֣לֶּה הַ/מִּצְוֺ֞ת וְ/הַ/מִּשְׁפָּטִ֗ים אֲשֶׁ֨ר צִוָּ֧ה יְהוָ֛ה בְּ/יַד מֹשֶׁ֖ה אֶל בְּנֵ֣י יִשְׂרָאֵ֑ל בְּ/עַֽרְבֹ֣ת מוֹאָ֔ב עַ֖ל יַרְדֵּ֥ן יְרֵחֽוֹ־־׃
translation:
  text: These are the commandments and the judgments that Yahweh commanded through Moses to the sons of Israel in the plains of Moab by the Jordan at Jericho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Israel'; this covenant expression refers to the people of Israel collectively.
    reason: lexical_alternative
  - marker: b
    text: Or 'by the Jordan opposite Jericho.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Deictic plural introducing a concluding summary formula; English idiom naturally supplies 'are.'
- source_word: הַמִּצְוֺת
  chosen: the commandments
  alternatives:
  - the commands
  - the commandments
  lexicon: HALOT
  rationale: מִצְוָה denotes commands/commandments. 'Commandments' preserves the formal legal tone of the closing formula in Numbers.
- source_word: וְהַמִּשְׁפָּטִים
  chosen: and the judgments
  alternatives:
  - and the ordinances
  - and the rules
  lexicon: HALOT
  rationale: מִשְׁפָּטִים in legal contexts can mean judgments, ordinances, or rules. 'Judgments' keeps closer lexical continuity with the Hebrew while still intelligible in modern English.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Standard relative pronoun; 'that' is natural modern English.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - gave
  - ordered
  lexicon: HALOT
  rationale: Direct verbal cognate with מִצְוֺת; 'commanded' preserves the legal-authoritative force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיַד מֹשֶׁה
  chosen: through Moses
  alternatives:
  - by the hand of Moses
  - by Moses
  lexicon: HALOT
  rationale: Hebrew idiom literally 'by the hand of Moses' commonly means agency/instrumentality. 'Through Moses' communicates the idiom clearly in modern English while preserving Moses as mediator.
- source_word: אֶל בְּנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the children of Israel
  - to the Israelites
  lexicon: HALOT
  rationale: בְּנֵי is literally 'sons of.' Following the gender-accurate principle, this preserves the source expression rather than flattening it to 'Israelites,' while remaining understandable as a covenant people designation.
- source_word: בְּעַרְבֹת מוֹאָב
  chosen: in the plains of Moab
  alternatives:
  - in the steppes of Moab
  - in the plains of Moab
  lexicon: HALOT
  rationale: עַרְבֹת refers to the steppe/plain region. 'Plains of Moab' is the established and clear geographic rendering.
- source_word: עַל יַרְדֵּן יְרֵחוֹ
  chosen: by the Jordan at Jericho
  alternatives:
  - beside the Jordan of Jericho
  - by the Jordan opposite Jericho
  lexicon: HALOT
  rationale: עַל here marks location by/beside. The phrase identifies the Transjordan location near Jericho. 'By the Jordan at Jericho' is concise and natural, though the Hebrew may also imply proximity/opposition to Jericho.
