id: NUM.36.1
reference: Numbers 36:1
source:
  edition: WLC
  text: וַֽ/יִּקְרְב֞וּ רָאשֵׁ֣י הָֽ/אָב֗וֹת לְ/מִשְׁפַּ֤חַת בְּנֵֽי גִלְעָד֙ בֶּן
    מָכִ֣יר בֶּן מְנַשֶּׁ֔ה מִֽ/מִּשְׁפְּחֹ֖ת בְּנֵ֣י יוֹסֵ֑ף וַֽ/יְדַבְּר֞וּ לִ/פְנֵ֤י
    מֹשֶׁה֙ וְ/לִ/פְנֵ֣י הַ/נְּשִׂאִ֔ים רָאשֵׁ֥י אָב֖וֹת לִ/בְנֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: Then the heads of the fathers’ houses of the clan of the sons of Gilead son
    of Machir, son of Manasseh, from the clans of the sons of Joseph, came near and
    spoke before Moses and before the leaders, the heads of the fathers’ houses of
    the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heads of the families' / 'the chiefs of the ancestral houses.' The
      Hebrew idiom refers to recognized kinship-household leaders within Israel's
      tribal structure.
    reason: lexical_alternative
  - marker: b
    text: '''Sons of Israel'' is the formal Hebrew expression; alternatively, ''Israelites.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְבוּ
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: The verb קרב in the wayyiqtol narrative form commonly introduces a formal
    approach to present a case. 'Came near' preserves the concrete movement and the
    legal/formal nuance without over-paraphrasing.
- source_word: רָאשֵׁי הָאָבוֹת
  chosen: the heads of the fathers’ houses
  alternatives:
  - the chiefs of the ancestral houses
  - the heads of the families
  lexicon: HALOT
  rationale: Literally 'heads of the fathers.' In context this denotes clan/family
    heads within Israel's kinship structure. 'Fathers’ houses' preserves the Hebrew
    social unit better than the flatter 'families,' while 'heads' reflects the leadership
    role.
- source_word: לְמִשְׁפַּחַת
  chosen: of the clan of
  alternatives:
  - for the clan of
  - belonging to the clan of
  lexicon: HALOT
  rationale: The prefixed ל here marks relation/association rather than direction.
    'Of the clan of' gives natural English while preserving the genealogical linkage.
- source_word: בְּנֵי גִלְעָד
  chosen: the sons of Gilead
  alternatives:
  - the descendants of Gilead
  lexicon: HALOT
  rationale: '''Sons of'' is retained because it is a standard Hebrew genealogical
    expression and keeps the formal lineage structure visible. ''Descendants'' is
    possible but less transparent to the source wording.'
- source_word: בֶּן מָכִיר בֶּן מְנַשֶּׁה
  chosen: son of Machir, son of Manasseh
  lexicon: HALOT
  rationale: The genealogy is rendered straightforwardly and formally, preserving
    the repeated 'son of' rather than compressing the lineage.
- source_word: מִמִּשְׁפְּחֹת בְּנֵי יוֹסֵף
  chosen: from the clans of the sons of Joseph
  alternatives:
  - from the families of the sons of Joseph
  - from the clans of Joseph's sons
  lexicon: HALOT
  rationale: מִן marks source/origin within the larger tribal structure. 'Clans' is
    preferred for consistency with מִשְׁפָּחָה in this census/legal context.
- source_word: וַיְדַבְּרוּ
  chosen: spoke
  alternatives:
  - spoke up
  - said
  lexicon: HALOT
  rationale: דבר is the standard verb for speaking. 'Spoke' is sufficiently formal
    and avoids adding emphasis not explicit in the Hebrew.
- source_word: לִפְנֵי מֹשֶׁה וְלִפְנֵי הַנְּשִׂאִים
  chosen: before Moses and before the leaders
  alternatives:
  - in the presence of Moses and in the presence of the leaders
  - before Moses and before the chiefs
  lexicon: HALOT
  rationale: לִפְנֵי indicates appearance in the presence of authorities. 'Before'
    preserves the formal setting. הַנְּשִׂאִים refers to tribal leaders/chieftains;
    'leaders' is clear modern English.
- source_word: רָאשֵׁי אָבוֹת לִבְנֵי יִשְׂרָאֵל
  chosen: the heads of the fathers’ houses of the sons of Israel
  alternatives:
  - the heads of the ancestral houses of the Israelites
  - the family heads of the sons of Israel
  lexicon: HALOT
  rationale: This appositional phrase identifies the leaders more precisely. Retaining
    'sons of Israel' preserves the formal covenantal ethnonym and mirrors the Hebrew
    structure; 'Israelites' would be smoother but less transparent.
