id: NUM.36.11
reference: Numbers 36:11
source:
  edition: WLC
  text: וַ/תִּהְיֶ֜ינָה מַחְלָ֣ה תִרְצָ֗ה וְ/חָגְלָ֧ה וּ/מִלְכָּ֛ה וְ/נֹעָ֖ה בְּנ֣וֹת
    צְלָפְחָ֑ד לִ/בְנֵ֥י דֹדֵי/הֶ֖ן לְ/נָשִֽׁים׃
translation:
  text: Mahlah, Tirzah, Hoglah, Milcah, and Noah, the daughters of Zelophehad, became
    wives to the sons of their uncles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more explicitly, 'to the sons of their father's brothers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּהְיֶינָה
  chosen: became
  alternatives:
  - were
  lexicon: HALOT
  rationale: The waw-consecutive form of היה here introduces the resulting state of
    marriage. 'Became' brings out the transition into that state more naturally in
    English than the more wooden 'were,' while staying close to the Hebrew sense.
- source_word: בְּנוֹת
  chosen: daughters
  lexicon: HALOT
  rationale: Standard rendering of בְּנוֹת in a genealogical context. It identifies
    these women as the daughters of Zelophehad, not merely female descendants.
- source_word: צְלָפְחָד
  chosen: Zelophehad
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: לִבְנֵי
  chosen: to the sons of
  alternatives:
  - for the sons of
  - among the sons of
  lexicon: HALOT
  rationale: The preposition ל with בני in this marriage context is idiomatically
    rendered 'to the sons of,' indicating the men whom they married.
- source_word: דֹדֵיהֶן
  chosen: their uncles
  alternatives:
  - their father's brothers
  - their kinsmen
  lexicon: HALOT
  rationale: דּוֹד commonly refers to an uncle, especially a paternal uncle in kinship
    contexts. Since the broader context concerns preserving inheritance within the
    father's clan, 'their uncles' is the most natural concise rendering. 'Their father's
    brothers' is more explicit but heavier; 'kinsmen' is too broad.
- source_word: לְנָשִׁים
  chosen: wives
  alternatives:
  - as wives
  - for wives
  lexicon: HALOT
  rationale: In marriage formulas, אשה/נשים with ל often means 'as wives' or simply
    'wives.' 'Became wives to' is clear modern English and preserves the marital sense
    without paraphrase.
- source_word: מַחְלָה תִרְצָה וְחָגְלָה וּמִלְכָּה וְנֹעָה
  chosen: Mahlah, Tirzah, Hoglah, Milcah, and Noah
  rationale: These are personal names and are transliterated. The sequence is preserved
    as in the Hebrew.
