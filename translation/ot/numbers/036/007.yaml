theological_decisions:
- issue: Gendered covenantal language in a corporate legal statement
  chosen_reading: the sons of Israel ... each ... his fathers
  alternative_readings:
  - the Israelites ... each person ... ancestors
  - the children of Israel ... each ... ancestral tribe
  rationale: The Hebrew uses masculine/genealogical terms (בני, איש, אבתיו). Per the
    doctrine's gender-accurate principle, the translation preserves this representative
    male lineage language rather than neutralizing it, while still rendering אִישׁ
    distributively as 'each' for natural English.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
