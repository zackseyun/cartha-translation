id: NUM.36.7
reference: Numbers 36:7
source:
  edition: WLC
  text: וְ/לֹֽא תִסֹּ֤ב נַחֲלָה֙ לִ/בְנֵ֣י יִשְׂרָאֵ֔ל מִ/מַּטֶּ֖ה אֶל מַטֶּ֑ה כִּ֣י
    אִ֗ישׁ בְּ/נַחֲלַת֙ מַטֵּ֣ה אֲבֹתָ֔י/ו יִדְבְּק֖וּ בְּנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: So no inheritance of the sons of Israel shall pass from tribe to tribe, for
    the sons of Israel shall each hold fast to the inheritance of the tribe of his
    fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Israelites shall each cling to his ancestral tribal inheritance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִסֹּב
  chosen: shall pass
  alternatives:
  - shall turn
  - shall transfer
  - shall move around
  lexicon: HALOT
  rationale: The verb סבב in this context refers to an inheritance changing tribal
    affiliation, not physical turning. 'Shall pass' is natural English and preserves
    the legal-transfer sense in context.
- source_word: נַחֲלָה
  chosen: inheritance
  alternatives:
  - heritage
  - property
  lexicon: HALOT
  rationale: Standard legal-land term in Numbers 36. 'Inheritance' best captures allotted
    patrimony within Israel's tribal structure.
- source_word: מַטֶּה ... אֶל מַטֶּה
  chosen: from tribe to tribe
  alternatives:
  - from one tribe to another tribe
  - from staff to staff
  lexicon: HALOT
  rationale: מַטֶּה here clearly means 'tribe,' not 'staff,' in the context of land
    allotment. The idiom is streamlined into idiomatic English as 'from tribe to tribe.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Retains the formal covenantal expression and follows the project's gender-accurate
    principle. Although it refers corporately to Israel, the Hebrew expression is
    literally 'sons of Israel.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - but rather
  lexicon: HALOT
  rationale: Introduces the rationale for the prohibition. 'For' is concise and fits
    legal discourse.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - every man
  - a man
  lexicon: HALOT
  rationale: Although literally 'man,' the distributive force in this legal context
    is best conveyed by 'each.' This preserves the sense without awkward English while
    still reflecting individual obligation.
- source_word: יִדְבְּקוּ
  chosen: shall hold fast to
  alternatives:
  - shall cling to
  - shall remain attached to
  lexicon: HALOT
  rationale: דבק conveys firm attachment. 'Hold fast to' works well in English for
    legal and covenantal adherence to one's tribal inheritance.
- source_word: בְּנַחֲלַת מַטֵּה אֲבֹתָיו
  chosen: to the inheritance of the tribe of his fathers
  alternatives:
  - to his ancestral tribal inheritance
  - to the inheritance of his fathers' tribe
  lexicon: HALOT
  rationale: This phrase specifies ancestral tribal allotment. The chosen rendering
    stays close to the Hebrew structure while remaining readable.
