id: NUM.36.5
reference: Numbers 36:5
source:
  edition: WLC
  text: וַ/יְצַ֤ו מֹשֶׁה֙ אֶת בְּנֵ֣י יִשְׂרָאֵ֔ל עַל פִּ֥י יְהוָ֖ה לֵ/אמֹ֑ר כֵּ֛ן
    מַטֵּ֥ה בְנֵֽי יוֹסֵ֖ף דֹּבְרִֽים־־־׃
translation:
  text: So Moses commanded the sons of Israel according to the word of the LORD, saying,
    “The tribe of the sons of Joseph is speaking rightly.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'according to the mouth of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'The tribe of the sons of Joseph speaks correctly' / 'is right.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - gave orders to
  - instructed
  lexicon: HALOT
  rationale: צוה commonly denotes giving a command or charge. 'Commanded' preserves
    the authoritative force better than the softer 'instructed.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A formally transparent rendering is appropriate here. 'Sons of Israel'
    preserves the Hebrew idiom and the gendered form; 'Israelites' is possible but
    less explicit. This follows the gender-accurate principle.
- source_word: עַל פִּי יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - at the command of the LORD
  - by the mouth of the LORD
  lexicon: HALOT
  rationale: The idiom literally means 'upon/by the mouth of YHWH.' 'According to
    the word of the LORD' is natural English that still reflects the idiom's emphasis
    on divine authorization. 'The LORD' follows the stated default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech.
- source_word: כֵּן
  chosen: rightly
  alternatives:
  - correctly
  - thus
  lexicon: HALOT
  rationale: 'In this context כֵּן affirms the correctness of the preceding petition:
    ''thus/correctly.'' Rendering it adverbially as ''rightly'' makes the sense idiomatic
    in English while preserving the evaluative force.'
- source_word: מַטֵּה
  chosen: the tribe of
  alternatives:
  - the staff of
  - the branch of
  lexicon: HALOT
  rationale: In tribal/allotment contexts מַטֶּה means 'tribe,' not the literal 'staff.'
    Because it governs 'sons of Joseph,' English requires 'the tribe of the sons of
    Joseph.'
- source_word: בְנֵי יוֹסֵף
  chosen: the sons of Joseph
  alternatives:
  - the descendants of Joseph
  - the Josephites
  lexicon: HALOT
  rationale: This preserves the Hebrew familial expression and matches the formal
    rendering of בְּנֵי יִשְׂרָאֵל earlier in the verse.
- source_word: דֹּבְרִים
  chosen: is speaking rightly
  alternatives:
  - are right
  - speak correctly
  lexicon: HALOT
  rationale: The participle of דבר literally means 'speaking.' Since English can sound
    awkward with a plural participle after a collective singular subject ('tribe'),
    'is speaking rightly' preserves the verbal idea while remaining idiomatic. 'Are
    right' captures the sense but loses the lexical link to speaking.
