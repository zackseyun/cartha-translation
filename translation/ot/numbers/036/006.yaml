id: NUM.36.6
reference: Numbers 36:6
source:
  edition: WLC
  text: זֶ֣ה הַ/דָּבָ֞ר אֲשֶׁר צִוָּ֣ה יְהוָ֗ה לִ/בְנ֤וֹת צְלָפְחָד֙ לֵ/אמֹ֔ר לַ/טּ֥וֹב בְּ/עֵינֵי/הֶ֖ם תִּהְיֶ֣ינָה לְ/נָשִׁ֑ים אַ֗ךְ לְ/מִשְׁפַּ֛חַת מַטֵּ֥ה אֲבִי/הֶ֖ם תִּהְיֶ֥ינָה לְ/נָשִֽׁים־׃
translation:
  text: This is the word that Yahweh has commanded concerning the daughters of Zelophehad, saying, ‘Let them become wives to whomever seems good in their eyes; only they must become wives within the family of the tribe of their father.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to whomever they think best.' The Hebrew idiom is literally 'to the good in their eyes.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'within the clan of their father's tribe.' The Hebrew combines family/clan and tribe terminology to stress that the inheritance must remain within the paternal tribal line.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה הַדָּבָר
  chosen: This is the word
  alternatives:
  - This is the thing
  - This is the matter
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' Here it introduces a formal divine directive. 'Word' preserves the authoritative force while remaining natural in English.
- source_word: צִוָּה יְהוָה
  chosen: the LORD has commanded
  alternatives:
  - the LORD commanded
  lexicon: HALOT
  rationale: צוה denotes command. The perfect can be rendered simply as past, but 'has commanded' fits the present relevance of the ruling in context. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: לִבְנוֹת צְלָפְחָד
  chosen: concerning the daughters of Zelophehad
  alternatives:
  - to the daughters of Zelophehad
  - for the daughters of Zelophehad
  lexicon: HALOT
  rationale: The preposition ל here marks the object/sphere of the command. 'Concerning' best captures that the command pertains to them, not merely that it is addressed to them.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard quotative introduction; 'saying' is transparent and sufficiently formal.
- source_word: לַטּוֹב בְּעֵינֵיהֶם
  chosen: to whomever seems good in their eyes
  alternatives:
  - to whoever is good in their sight
  - to whomever they think best
  lexicon: HALOT
  rationale: The idiom means what appears good/pleasing to them. 'Seems good in their eyes' preserves the Hebrew idiom while remaining understandable. 'Whomever' supplies the implied marriage partner.
- source_word: תִּהְיֶינָה לְנָשִׁים
  chosen: Let them become wives
  alternatives:
  - let them be wives
  - let them marry
  lexicon: HALOT
  rationale: Literally 'let them be for wives.' 'Become wives' preserves the predicative sense and avoids over-paraphrasing, while still reading naturally. 'Marry' is possible but less formally tied to the Hebrew wording.
- source_word: אַךְ
  chosen: only
  alternatives:
  - however
  - nevertheless
  - except that
  lexicon: HALOT
  rationale: אַךְ marks restriction here. 'Only' clearly signals the limitation placed on the preceding permission.
- source_word: לְמִשְׁפַּחַת מַטֵּה אֲבִיהֶם
  chosen: within the family of the tribe of their father
  alternatives:
  - within the clan of their father's tribe
  - to a family of the tribe of their father
  lexicon: HALOT
  rationale: The phrase combines family/clan and tribe language to restrict marriage within the paternal tribal structure. 'Within the family of the tribe of their father' keeps both elements explicit, even if slightly formal.
- source_word: תִּהְיֶינָה לְנָשִׁים
  chosen: they must become wives
  alternatives:
  - they shall become wives
  - they are to become wives
  lexicon: HALOT
  rationale: The repeated verb phrase now carries the force of obligation under the restriction. 'Must become wives' makes the prescriptive force clear in English.
