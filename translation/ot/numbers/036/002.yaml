id: NUM.36.2
reference: Numbers 36:2
source:
  edition: WLC
  text: וַ/יֹּאמְר֗וּ אֶת אֲדֹנִ/י֙ צִוָּ֣ה יְהוָ֔ה לָ/תֵ֨ת אֶת הָ/אָ֧רֶץ בְּ/נַחֲלָ֛ה בְּ/גוֹרָ֖ל לִ/בְנֵ֣י יִשְׂרָאֵ֑ל וַֽ/אדֹנִ/י֙ צֻוָּ֣ה בַֽ/יהוָ֔ה לָ/תֵ֗ת אֶֽת נַחֲלַ֛ת צְלָפְחָ֥ד אָחִ֖י/נוּ לִ/בְנֹתָֽי/ו־־־׃
translation:
  text: And they said, “Yahweh commanded my lord to give the land as an inheritance by lot to the sons of Israel, and my lord was commanded by Yahweh to give the inheritance of Zelophehad our brother to his daughters.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “children of Israel” or “Israelites.” The Hebrew reads “sons of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  lexicon: HALOT
  rationale: In direct address to Moses by the clan leaders, אֲדֹנִי is a respectful human title, not a divine title. 'My lord' preserves the deferential register better than the more servile-sounding 'my master'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָתֵת אֶת הָאָרֶץ
  chosen: to give the land
  alternatives:
  - to assign the land
  - to grant the land
  lexicon: HALOT
  rationale: נתן with הארץ here refers to the divine grant of Canaan. 'Give the land' is straightforward and idiomatic, while the inheritance language is carried by the following noun phrase.
- source_word: בְּנַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as a possession
  lexicon: HALOT
  rationale: נחלה denotes inherited property/allotment. 'As an inheritance' is natural English and preserves the legal-landholding sense.
- source_word: בְּגוֹרָל
  chosen: by lot
  alternatives:
  - by allotment
  - by casting lots
  lexicon: HALOT
  rationale: The phrase specifies the means of distribution. 'By lot' is the standard concise rendering and reflects the procedural sense without overexpanding.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the children of Israel
  - to the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate policy, בנים is rendered 'sons' where that matches the source wording. Here it refers corporately to Israel, and 'sons of Israel' preserves the formal covenantal phrasing better than 'Israelites.'
- source_word: צֻוָּה בַיהוָה
  chosen: was commanded by the LORD
  alternatives:
  - was commanded by Yahweh
  - received a command from the LORD
  lexicon: HALOT
  rationale: The passive Pual indicates that Moses received the command, and the prefixed ב with the divine name functions idiomatically for agency/source here. 'Was commanded by the LORD' is the clearest natural English rendering.
- source_word: נַחֲלַת צְלָפְחָד
  chosen: the inheritance of Zelophehad
  alternatives:
  - Zelophehad's inheritance
  - the hereditary portion of Zelophehad
  lexicon: HALOT
  rationale: The construct phrase denotes the inheritance belonging to Zelophehad's line. The chosen wording is transparent and formal enough for the legal context.
- source_word: אָחִינוּ
  chosen: our brother
  alternatives:
  - our kinsman
  lexicon: HALOT
  rationale: The speakers refer to Zelophehad as a fellow clan member. 'Our brother' preserves the literal familial language; 'our kinsman' would interpret rather than translate.
- source_word: לִבְנֹתָיו
  chosen: to his daughters
  alternatives:
  - for his daughters
  lexicon: HALOT
  rationale: The preposition marks the recipients of the inheritance. 'To his daughters' is the most direct rendering in this legal statement.
