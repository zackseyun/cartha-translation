id: NUM.36.4
reference: Numbers 36:4
source:
  edition: WLC
  text: וְ/אִם יִהְיֶ֣ה הַ/יֹּבֵל֮ לִ/בְנֵ֣י יִשְׂרָאֵל֒ וְ/נֽוֹסְפָה֙ נַחֲלָתָ֔/ן
    עַ֚ל נַחֲלַ֣ת הַ/מַּטֶּ֔ה אֲשֶׁ֥ר תִּהְיֶ֖ינָה לָ/הֶ֑ם וּ/מִֽ/נַּחֲלַת֙ מַטֵּ֣ה
    אֲבֹתֵ֔י/נוּ יִגָּרַ֖ע נַחֲלָתָֽ/ן־׃
translation:
  text: And when the Jubilee comes for the sons of Israel, their inheritance will
    be added to the inheritance of the tribe to which they belong, and their inheritance
    will be taken away from the inheritance of the tribe of our fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the Israelites' or traditionally 'for the children of Israel.' The
      Hebrew reads 'for the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And when
  alternatives:
  - and if
  - now if
  lexicon: HALOT
  rationale: Although the particle pair can be rendered conditionally ('and if'),
    in this legal argument the sense is that of an anticipated eventuality tied to
    the Jubilee year. 'And when' communicates the practical force in smoother English
    without losing the conditional background.
- source_word: יִהְיֶה הַיֹּבֵל
  chosen: the Jubilee comes
  alternatives:
  - the Jubilee happens
  - the year of Jubilee comes
  lexicon: HALOT
  rationale: The idiom with היה is naturally rendered 'comes' in English for the arrival
    of a calendrical event. 'Jubilee' is the established and accurate rendering of
    יוֹבֵל here.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: for the sons of Israel
  alternatives:
  - for the Israelites
  - for the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'for the sons of Israel.' Following the gender-accurate
    principle, the main text preserves the familial expression rather than flattening
    it to 'Israelites,' while remaining natural English.
- source_word: וְנוֹסְפָה
  chosen: will be added
  alternatives:
  - is added
  - will be joined
  lexicon: HALOT
  rationale: 'The Niphal of יסף here is passive/resultative: the inheritance becomes
    attached to another tribal inheritance. Future English fits the legal consequence
    being described.'
- source_word: נַחֲלָתָן
  chosen: their inheritance
  alternatives:
  - their property share
  - their hereditary possession
  lexicon: HALOT
  rationale: נחלה in this context refers to inherited tribal landholding. 'Inheritance'
    is the most concise and standard rendering, and the possessive feminine plural
    refers to the daughters under discussion.
- source_word: עַל נַחֲלַת הַמַּטֶּה
  chosen: to the inheritance of the tribe
  alternatives:
  - onto the inheritance of the tribe
  - over the inheritance of the tribe
  lexicon: HALOT
  rationale: The preposition על with יסף here expresses addition to another allotment.
    English idiom prefers 'added to' rather than a more literal but awkward 'added
    upon/over.' מטה is 'tribe' in this land-allotment context.
- source_word: אֲשֶׁר תִּהְיֶינָה לָהֶם
  chosen: to which they belong
  alternatives:
  - which will be theirs
  - to whom they will belong
  lexicon: HALOT
  rationale: The clause identifies the tribe of the men they marry into. A literal
    rendering ('which they will be to them') is awkward in English; 'to which they
    belong' captures the relational sense in context.
- source_word: וּמִנַּחֲלַת מַטֵּה אֲבֹתֵינוּ
  chosen: from the inheritance of the tribe of our fathers
  alternatives:
  - from the inheritance of our fathers' tribe
  - from our ancestral tribal inheritance
  lexicon: HALOT
  rationale: This phrase contrasts the receiving tribe with the speakers' own ancestral
    tribe. 'Our fathers' reflects the Hebrew directly and preserves the clan-based
    legal setting.
- source_word: יִגָּרַע
  chosen: will be taken away
  alternatives:
  - will be diminished
  - will be deducted
  - will be withdrawn
  lexicon: HALOT
  rationale: The Niphal of גרע denotes reduction or removal. In this inheritance context,
    'will be taken away' clearly expresses loss from one tribal allotment to another.
