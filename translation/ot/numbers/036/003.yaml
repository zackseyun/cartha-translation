id: NUM.36.3
reference: Numbers 36:3
source:
  edition: WLC
  text: וְ֠/הָיוּ לְ/אֶחָ֞ד מִ/בְּנֵ֨י שִׁבְטֵ֥י בְנֵֽי יִשְׂרָאֵל֮ לְ/נָשִׁים֒ וְ/נִגְרְעָ֤ה
    נַחֲלָתָ/ן֙ מִ/נַּחֲלַ֣ת אֲבֹתֵ֔י/נוּ וְ/נוֹסַ֕ף עַ֚ל נַחֲלַ֣ת הַ/מַּטֶּ֔ה אֲשֶׁ֥ר
    תִּהְיֶ֖ינָה לָ/הֶ֑ם וּ/מִ/גֹּרַ֥ל נַחֲלָתֵ֖/נוּ יִגָּרֵֽעַ־׃
translation:
  text: And if they become wives to one of the sons of the tribes of the sons of Israel,
    then their inheritance will be taken away from the inheritance of our fathers
    and added to the inheritance of the tribe to which they belong, and it will be
    taken away from the allotted portion of our inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the lot of our inheritance.' The Hebrew literally says 'from the
      lot,' referring to the portion assigned by lot.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  chosen: if they become
  alternatives:
  - and they become
  - and they are
  lexicon: HALOT
  rationale: Though formally 'and they become/are,' in context this continues the
    conditional concern begun in the surrounding argument, so English idiom naturally
    supplies 'if' to express the contingent scenario without changing the sense.
- source_word: לְאֶחָד
  chosen: to one
  alternatives:
  - for one
  - belonging to one
  lexicon: HALOT
  rationale: The preposition with numeral indicates marriage to a member of another
    group; 'to one' works idiomatically with 'become wives.'
- source_word: מִבְּנֵי שִׁבְטֵי בְנֵי יִשְׂרָאֵל
  chosen: of the sons of the tribes of the sons of Israel
  alternatives:
  - of the Israelites' tribal sons
  - of one of the tribal groups of the Israelites
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the layered kinship/tribal structure
    in the Hebrew. 'Sons of Israel' is retained rather than flattened to 'Israelites'
    in order to reflect the source phrasing.
- source_word: לְנָשִׁים
  chosen: wives
  alternatives:
  - as wives
  - for wives
  lexicon: HALOT
  rationale: In marriage contexts אִשָּׁה in the plural commonly means 'wives.' English
    omits the preposition naturally.
- source_word: וְנִגְרְעָה
  chosen: will be taken away
  alternatives:
  - will be diminished
  - will be withdrawn
  - will be reduced
  lexicon: HALOT
  rationale: The Niphal of גרע here refers to loss from one inheritance holding. 'Taken
    away' communicates actual transfer/loss more clearly than the weaker 'diminished.'
- source_word: נַחֲלָתָן
  chosen: their inheritance
  alternatives:
  - their hereditary property
  - their possession
  lexicon: HALOT
  rationale: '''Inheritance'' is the standard and contextually precise term in this
    land-allotment passage.'
- source_word: מִנַּחֲלַת אֲבֹתֵינוּ
  chosen: from the inheritance of our fathers
  alternatives:
  - from our ancestral inheritance
  - from the inheritance of our ancestors
  lexicon: HALOT
  rationale: This preserves the familial and tribal continuity emphasized in the Hebrew.
    'Fathers' is gender-accurate to the source and idiomatic in covenantal/ancestral
    contexts.
- source_word: וְנוֹסַף
  chosen: and added
  alternatives:
  - and it will be added
  - and accrue
  lexicon: HALOT
  rationale: The passive/result sense is clear from context; English can express it
    succinctly as part of the compound predicate.
- source_word: עַל נַחֲלַת הַמַּטֶּה
  chosen: to the inheritance of the tribe
  alternatives:
  - onto the inheritance of the tribe
  - to the tribal inheritance
  lexicon: HALOT
  rationale: מַטֶּה here denotes tribe in the land-distribution sense. 'To the inheritance
    of the tribe' best reflects the legal transfer idea.
- source_word: אֲשֶׁר תִּהְיֶינָה לָהֶם
  chosen: to which they belong
  alternatives:
  - to which they will belong
  - in which they come to be theirs
  lexicon: HALOT
  rationale: The clause identifies the tribe of the men they marry into. 'To which
    they belong' is natural English and captures the resulting affiliation.
- source_word: וּמִגֹּרַל
  chosen: from the allotted portion
  alternatives:
  - from the lot
  - from the allotment by lot
  lexicon: HALOT
  rationale: גוֹרָל literally means 'lot,' but in this land context it refers metonymically
    to the portion assigned by lot. 'Allotted portion' communicates the sense clearly
    for modern readers.
- source_word: נַחֲלָתֵנוּ
  chosen: of our inheritance
  alternatives:
  - of our possession
  - of our hereditary share
  lexicon: HALOT
  rationale: Maintains consistency with the repeated key term נַחֲלָה in the verse.
- source_word: יִגָּרֵעַ
  chosen: it will be taken away
  alternatives:
  - it will be diminished
  - it will be removed
  lexicon: HALOT
  rationale: Repeats the same root as earlier in the verse; using the same English
    gloss preserves the rhetorical emphasis on loss from the clan's allotted inheritance.
