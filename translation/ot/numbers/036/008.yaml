theological_decisions:
- issue: Gendered covenantal/legal language
  chosen_reading: Retain 'sons of Israel' and 'his fathers' in the main text.
  alternative_readings:
  - Israelites
  - ancestors
  rationale: The verse is embedded in a patrilineal inheritance law, so the masculine
    forms are not merely generic noise; they are part of the legal structure being
    described. This follows the stated gender-accurate philosophy rather than flattening
    the wording into gender-neutral English.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
