id: NUM.36.8
reference: Numbers 36:8
source:
  edition: WLC
  text: וְ/כָל בַּ֞ת יֹרֶ֣שֶׁת נַחֲלָ֗ה מִ/מַּטּוֹת֮ בְּנֵ֣י יִשְׂרָאֵל֒ לְ/אֶחָ֗ד
    מִ/מִּשְׁפַּ֛חַת מַטֵּ֥ה אָבִ֖י/הָ תִּהְיֶ֣ה לְ/אִשָּׁ֑ה לְמַ֗עַן יִֽירְשׁוּ֙
    בְּנֵ֣י יִשְׂרָאֵ֔ל אִ֖ישׁ נַחֲלַ֥ת אֲבֹתָֽי/ו־׃
translation:
  text: And every daughter who possesses an inheritance from the tribes of the sons
    of Israel shall become the wife of one from the clan of her father's tribe, so
    that the sons of Israel may each possess the inheritance of his fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inherits an inheritance' / 'is inheriting property'; the Hebrew participle
      can emphasize the daughter’s status as an heiress.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'family of her father's tribe'; Hebrew mishpachah denotes a clan-level
      kinship group within the tribe.
    reason: lexical_alternative
  - marker: d
    text: Or 'may inherit, each one, the inheritance of his fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹרֶשֶׁת
  chosen: possesses
  alternatives:
  - inherits
  - is inheriting
  lexicon: HALOT
  rationale: The participle from ירשׁ denotes possessing or inheriting property. 'Possesses'
    fits the present legal status of a daughter who holds an inherited allotment,
    while avoiding awkward English. 'Inherits' is possible, but can sound more event-focused
    than status-focused here.
- source_word: נַחֲלָה
  chosen: inheritance
  alternatives:
  - property
  - heritage
  - allotment
  lexicon: HALOT
  rationale: In this land-tenure context, נַחֲלָה refers to inherited tribal landholding.
    'Inheritance' is the most natural and consistent rendering, while 'allotment'
    is a possible contextual nuance but narrower.
- source_word: מִמַּטּוֹת בְּנֵי יִשְׂרָאֵל
  chosen: from the tribes of the sons of Israel
  alternatives:
  - from the tribes of the Israelites
  - from among the tribes of the sons of Israel
  lexicon: HALOT
  rationale: מַטּוֹת here refers to tribal divisions. Per translation philosophy,
    the gendered phrase בְּנֵי יִשְׂרָאֵל is retained as 'sons of Israel' rather than
    neutralized, since it reflects the source form and covenantal idiom.
- source_word: לְאֶחָד
  chosen: of one
  alternatives:
  - to one
  - to a man
  lexicon: HALOT
  rationale: The phrase introduces the required marriage partner. In English, 'the
    wife of one from...' is smoother than a more wooden 'to one from...,' while preserving
    the singular requirement.
- source_word: מִמִּשְׁפַּחַת מַטֵּה אָבִיהָ
  chosen: from the clan of her father's tribe
  alternatives:
  - from the family of her father's tribe
  - from a clan of her father's tribal group
  lexicon: HALOT
  rationale: מִשְׁפָּחָה is best rendered 'clan' in tribal/legal contexts, distinguishing
    it from the larger tribe (מַטֶּה). This preserves the nested social structure
    in the Hebrew.
- source_word: תִּהְיֶה לְאִשָּׁה
  chosen: shall become the wife
  alternatives:
  - shall be wife
  - shall marry
  lexicon: HALOT
  rationale: The idiom literally means 'shall be for a wife,' but idiomatic English
    is 'shall become the wife' or 'shall marry.' The chosen wording preserves the
    legal/formal tone without paraphrasing too freely.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the purpose that
  lexicon: HALOT
  rationale: This conjunction expresses purpose. 'So that' is clear modern English
    and adequately formal.
- source_word: יִירְשׁוּ
  chosen: may each possess
  alternatives:
  - may inherit
  - may possess
  lexicon: HALOT
  rationale: The verb again comes from ירשׁ. 'Possess' keeps continuity with the legal-landholding
    sense in context. 'Each' is supplied from אִישׁ to reflect distributive force
    in natural English.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - every man
  - each man
  lexicon: HALOT
  rationale: Here אִישׁ functions distributively rather than emphasizing maleness.
    'Each' conveys the syntax naturally in English while preserving the sense that
    every individual Israelite retains ancestral inheritance.
- source_word: נַחֲלַת אֲבֹתָיו
  chosen: the inheritance of his fathers
  alternatives:
  - his ancestral inheritance
  - the inheritance of his ancestors
  lexicon: HALOT
  rationale: The Hebrew is literally 'the inheritance of his fathers.' This preserves
    the patrilineal legal framework of the passage. 'Ancestors' is broader and less
    precise than the source wording.
