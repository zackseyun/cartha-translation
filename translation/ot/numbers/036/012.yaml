id: NUM.36.12
reference: Numbers 36:12
source:
  edition: WLC
  text: מִֽ/מִּשְׁפְּחֹ֛ת בְּנֵֽי מְנַשֶּׁ֥ה בֶן יוֹסֵ֖ף הָי֣וּ לְ/נָשִׁ֑ים וַ/תְּהִי֙
    נַחֲלָתָ֔/ן עַל מַטֵּ֖ה מִשְׁפַּ֥חַת אֲבִי/הֶֽן־־־׃
translation:
  text: They became wives from the clans of the sons of Manasseh son of Joseph, and
    their inheritance remained with the tribe of the clan of their father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among the families of the sons of Manasseh son of Joseph.' The
      Hebrew kinship term can be rendered 'families' or 'clans' depending on how specifically
      the tribal structure is expressed in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמִּשְׁפְּחֹת
  chosen: from the clans of
  alternatives:
  - from among the families of
  - into the families of
  lexicon: HALOT
  rationale: 'The preposition מִן with מִשְׁפָּחָה most naturally indicates source/origin:
    they married from within the clans of Manasseh. ''Clans'' fits Israelite kinship
    structure better than the more generic ''families.'' ''Into the families of''
    is possible in English idiom but less directly reflects the Hebrew preposition.'
- source_word: בְּנֵי מְנַשֶּׁה בֶן יוֹסֵף
  chosen: the sons of Manasseh son of Joseph
  alternatives:
  - the descendants of Manasseh son of Joseph
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the genealogical expression. 'Sons
    of' is idiomatic in biblical lineage language and keeps the tribal framework visible;
    'descendants of' is smoother but less literal.
- source_word: הָיוּ לְנָשִׁים
  chosen: became wives
  alternatives:
  - were married
  - became wives to
  lexicon: HALOT
  rationale: Literally 'were for wives.' 'Became wives' preserves the Hebrew predicative
    construction and keeps the women as the grammatical subject. 'Were married' is
    acceptable but less explicit about the Hebrew wording.
- source_word: נַחֲלָתָן
  chosen: their inheritance
  alternatives:
  - their hereditary property
  - their possession
  lexicon: HALOT
  rationale: נַחֲלָה in Numbers commonly refers to inherited tribal land allotment.
    'Inheritance' is the standard and sufficiently clear rendering in this legal-land
    context.
- source_word: וַתְּהִי
  chosen: remained
  alternatives:
  - was
  - came to be
  lexicon: HALOT
  rationale: Although the verb is simply 'was/became,' English idiom in this context
    is better served by 'remained,' since the point is that the inheritance stayed
    attached to the proper tribal allotment after marriage.
- source_word: עַל מַטֵּה
  chosen: with the tribe of
  alternatives:
  - upon the tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: מַטֶּה here denotes a tribal division, not a literal staff. With עַל
    in this legal-allotment context, the sense is attachment or belonging. 'With the
    tribe of' is natural English while preserving the legal association.
- source_word: מִשְׁפַּחַת אֲבִיהֶן
  chosen: the clan of their father
  alternatives:
  - their father's clan
  - the family of their father
  lexicon: HALOT
  rationale: 'The singular construct chain is collective: the relevant paternal clan.
    ''Clan'' again better reflects Israelite social structure than generic ''family.''
    The singular ''father'' matches the Hebrew form while functioning collectively
    for the daughters'' paternal house.'
