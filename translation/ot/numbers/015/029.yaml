theological_decisions:
- issue: Scope of legal equality between native Israelite and resident foreigner in
    cases of unintentional sin
  chosen_reading: The verse states that the same legal instruction applies equally
    to both groups for unintentional acts.
  alternative_readings:
  - The verse could be rendered more generally as 'one statute' or 'one instruction'
    rather than 'one law.'
  rationale: The Hebrew emphasizes equal application of the prescribed rule without
    adding broader theological claims beyond the immediate legal context.
  doctrine_reference: Translation philosophy §§1, 3, 5
