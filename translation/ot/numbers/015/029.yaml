id: NUM.15.29
reference: Numbers 15:29
source:
  edition: WLC
  text: הָֽ/אֶזְרָח֙ בִּ/בְנֵ֣י יִשְׂרָאֵ֔ל וְ/לַ/גֵּ֖ר הַ/גָּ֣ר בְּ/תוֹכָ֑/ם תּוֹרָ֤ה
    אַחַת֙ יִהְיֶ֣ה לָ/כֶ֔ם לָ/עֹשֶׂ֖ה בִּ/שְׁגָגָֽה׃
translation:
  text: For the native among the sons of Israel and for the sojourner who sojourns
    among them, there shall be one law for you, for the one who acts unintentionally.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the native-born among the Israelites.'
    reason: lexical_alternative
  - marker: b
    text: '''Sojourner'' refers to a resident foreigner living among Israel.'
    reason: cultural_note
  - marker: c
    text: Or 'one instruction' or 'one statute.'
    reason: lexical_alternative
  - marker: d
    text: Or 'in error,' 'by mistake,' or 'unwittingly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֶזְרָח
  chosen: the native
  alternatives:
  - the native-born
  - the citizen
  lexicon: HALOT
  rationale: אֶזְרָח denotes a native member of the community in contrast to the resident
    foreigner. 'The native' is concise and preserves the legal contrast with גֵּר.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - among the Israelites
  - of the children of Israel
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the underlying familial expression
    בְּנֵי while remaining natural English. Per translation philosophy, gender-accurate
    language is preferred over flattening to a neutral collective where the source
    uses a masculine representative form.
- source_word: וְלַגֵּר
  chosen: and for the sojourner
  alternatives:
  - and for the resident foreigner
  - and for the stranger
  lexicon: HALOT
  rationale: גֵּר in Torah law commonly refers to a non-native resident living within
    Israelite society. 'Sojourner' preserves the covenant-legal nuance better than
    the broader 'stranger.'
- source_word: הַגָּר בְּתוֹכָם
  chosen: who sojourns among them
  alternatives:
  - who resides among them
  - dwelling in their midst
  lexicon: HALOT
  rationale: The participial construction explicitly describes the גֵּר as residing
    within the community. 'Who sojourns among them' keeps the lexical connection with
    גֵּר and reflects the Hebrew participle.
- source_word: תּוֹרָה אַחַת
  chosen: one law
  alternatives:
  - one instruction
  - one statute
  lexicon: HALOT
  rationale: In this legal context תּוֹרָה refers to a governing legal instruction
    or rule. 'One law' is the most idiomatic and contextually precise rendering.
- source_word: יִהְיֶה לָכֶם
  chosen: there shall be one law for you
  alternatives:
  - shall be for you
  - will be for you
  lexicon: HALOT
  rationale: The clause states a legal norm applying to the addressed community. 'There
    shall be' is standard legal English and fits the prescriptive force.
- source_word: לָעֹשֶׂה
  chosen: for the one who acts
  alternatives:
  - for the one who does
  - for anyone who commits
  lexicon: HALOT
  rationale: The participle is substantival, referring to the person performing the
    act in view. 'Acts' is smoother than 'does' while remaining close to the Hebrew.
- source_word: בִּשְׁגָגָה
  chosen: unintentionally
  alternatives:
  - in error
  - by mistake
  - unwittingly
  lexicon: HALOT
  rationale: The term denotes inadvertence or unintentional wrongdoing in sacrificial/legal
    contexts. 'Unintentionally' is clear modern English and matches the legal distinction
    in the passage.
