theological_decisions:
- issue: Status of the non-Israelite participant in sacrificial worship
  chosen_reading: The verse extends the same sacrificial procedure to the sojourner or other person among Israel, without distinction in the act described here.
  alternative_readings:
  - The verse may be read more narrowly as applying only to a resident foreigner already integrated into Israel's covenantal life.
  rationale: The Hebrew legal formula 'just as you do, so he shall do' emphasizes parity of practice in this case. The translation preserves that equality without importing broader covenantal conclusions not explicit in the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
