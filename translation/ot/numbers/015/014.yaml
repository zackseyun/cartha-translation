id: NUM.15.14
reference: Numbers 15:14
source:
  edition: WLC
  text: וְ/כִֽי יָגוּר֩ אִתְּ/כֶ֨ם גֵּ֜ר א֤וֹ אֲשֶֽׁר בְּ/תֽוֹכְ/כֶם֙ לְ/דֹרֹ֣תֵי/כֶ֔ם וְ/עָשָׂ֛ה אִשֵּׁ֥ה רֵֽיחַ נִיחֹ֖חַ לַ/יהוָ֑ה כַּ/אֲשֶׁ֥ר תַּעֲשׂ֖וּ כֵּ֥ן יַעֲשֶֽׂה־־־׃
translation:
  text: And if a sojourner is staying with you, or anyone who is among you throughout your generations, and he offers a food offering, a pleasing aroma to Yahweh, just as you do, so he shall do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering by fire' or 'a fire offering' for 'a food offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And if
  alternatives:
  - If
  - Now if
  lexicon: HALOT
  rationale: Introduces a conditional case linked to the preceding legislation. 'And if' preserves the connective force of ו while keeping natural English.
- source_word: יָגוּר
  chosen: is staying
  alternatives:
  - sojourns
  - resides as an alien
  - dwells
  lexicon: HALOT
  rationale: From גור, referring to residing as a non-native. 'Is staying' is readable modern English; the non-native status is carried by גֵּר ('sojourner').
- source_word: גֵּר
  chosen: sojourner
  alternatives:
  - resident foreigner
  - stranger
  - alien
  lexicon: HALOT
  rationale: '''Sojourner'' preserves the covenantal/legal category of a non-Israelite living among Israel better than the more politically loaded ''alien'' or the vaguer ''stranger.'''
- source_word: אִתְּכֶם
  chosen: with you
  alternatives:
  - among you
  lexicon: HALOT
  rationale: Directly reflects the preposition with the 2mp suffix. The following phrase בְּתוֹכְכֶם then adds the sense of being 'among you.'
- source_word: אוֹ אֲשֶׁר בְּתוֹכְכֶם
  chosen: or whoever is among you
  alternatives:
  - or anyone who is among you
  - or one who is in your midst
  lexicon: HALOT
  rationale: Covers the broader expression after גֵּר, likely extending the rule to any such person in the community. 'Whoever is among you' is natural and sufficiently inclusive of the Hebrew relative construction.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - in your generations
  lexicon: HALOT
  rationale: Standard idiomatic rendering indicating ongoing applicability across successive generations.
- source_word: וְעָשָׂה
  chosen: and he offers
  alternatives:
  - and he makes
  - and he does
  lexicon: HALOT
  rationale: Although עשה is literally 'do/make,' in sacrificial context English idiom prefers 'offers' for the act of presenting the sacrifice.
- source_word: אִשֵּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: The term denotes an offering made by fire. 'Food offering' is a common contextual rendering that communicates sacrificial presentation without implying literal divine consumption; the more literal alternatives are preserved in a footnote.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet aroma
  lexicon: HALOT
  rationale: A standard sacrificial idiom indicating acceptability before God. 'Pleasing aroma' is clear modern English and avoids archaic 'sweet savour' while preserving the metaphor.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Follows the project's default rendering of YHWH as 'the LORD.' 'To the LORD' fits the direction of the offering in context.
- source_word: כַּאֲשֶׁר תַּעֲשׂוּ כֵּן יַעֲשֶׂה
  chosen: just as you do, so he shall do
  alternatives:
  - as you do, so shall he do
  - according to what you do, thus he shall do
  lexicon: HALOT
  rationale: Preserves the comparative legal formula establishing equal ritual practice between native Israelite and sojourner. 'Shall' appropriately conveys the prescriptive force in legal context.
