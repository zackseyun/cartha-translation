theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render YHWH as 'the LORD,' following the stated
    doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropomorphic sacrificial idiom רֵיחַ נִיחֹחַ
  chosen_reading: a pleasing aroma
  alternative_readings:
  - a soothing aroma
  - a sweet savor
  rationale: This preserves the cultic metaphor without importing a mechanistic theology
    of divine appeasement beyond the text. It is readable modern English and common
    in sacrificial contexts.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
