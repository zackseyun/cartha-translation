id: NUM.15.3
reference: Numbers 15:3
source:
  edition: WLC
  text: וַ/עֲשִׂיתֶ֨ם אִשֶּׁ֤ה לַֽ/יהוָה֙ עֹלָ֣ה אוֹ זֶ֔בַח לְ/פַלֵּא נֶ֨דֶר֙ א֣וֹ
    בִ/נְדָבָ֔ה א֖וֹ בְּ/מֹעֲדֵי/כֶ֑ם לַ/עֲשׂ֞וֹת רֵ֤יחַ נִיחֹ֨חַ֙ לַֽ/יהוָ֔ה מִן
    הַ/בָּקָ֖ר א֥וֹ מִן הַ/צֹּֽאן־־־־׃
translation:
  text: and you present an offering by fire to the LORD—either a burnt offering or
    a sacrifice—to fulfill a vow, or as a freewill offering, or at your appointed
    times, to produce a pleasing aroma to the LORD, from the herd or from the flock,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering made by fire.'
    reason: lexical_alternative
  - marker: b
    text: Or 'at your appointed festivals.' The Hebrew can refer broadly to appointed
      times or more specifically to festival occasions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשִׂיתֶם
  chosen: you present
  alternatives:
  - you make
  - you offer
  lexicon: HALOT
  rationale: Literally 'and you do/make,' but in sacrificial context with אִשֶּׁה
    the idiomatic sense is presenting or offering a sacrifice. 'Present' is natural
    modern English while staying close to the cultic action.
- source_word: אִשֶּׁה
  chosen: an offering by fire
  alternatives:
  - a fire offering
  - an offering made by fire
  lexicon: HALOT
  rationale: Standard sacrificial term for an offering presented in fire. 'Offering
    by fire' is clear and reasonably formal without archaic phrasing.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Follows the project's default rendering of YHWH as 'the LORD.' 'To' fits
    the direction of the offering.
- source_word: עֹלָה
  chosen: a burnt offering
  lexicon: HALOT
  rationale: Established and accurate rendering for the whole-burnt sacrifice.
- source_word: זֶבַח
  chosen: a sacrifice
  alternatives:
  - a slaughter offering
  lexicon: HALOT
  rationale: Broad sacrificial term. 'Sacrifice' is the most natural general rendering
    here, especially contrasted with 'burnt offering.'
- source_word: לְפַלֵּא נֶדֶר
  chosen: to fulfill a vow
  alternatives:
  - to perform a vow
  - to pay a vow
  lexicon: HALOT
  rationale: The infinitive with נדר indicates carrying out a vowed offering. 'Fulfill
    a vow' communicates the sense clearly in idiomatic English.
- source_word: בִנְדָבָה
  chosen: as a freewill offering
  alternatives:
  - voluntarily
  - as a voluntary offering
  lexicon: HALOT
  rationale: Technical sacrificial term for an offering given freely, not under vow
    or obligation.
- source_word: בְּמֹעֲדֵיכֶם
  chosen: at your appointed times
  alternatives:
  - at your appointed festivals
  - at your set feasts
  lexicon: HALOT
  rationale: מוֹעֵד can denote appointed times or festival occasions. Here the broader
    'appointed times' preserves the lexical range without over-specifying festivals
    alone.
- source_word: לַעֲשׂוֹת רֵיחַ נִיחֹחַ
  chosen: to produce a pleasing aroma
  alternatives:
  - to make a soothing aroma
  - for a pleasing aroma
  lexicon: HALOT
  rationale: Keeps the sacrificial idiom while using readable English. 'Pleasing aroma'
    is a common equivalent for the anthropomorphic cultic expression.
- source_word: מִן הַבָּקָר
  chosen: from the herd
  alternatives:
  - from the cattle
  lexicon: HALOT
  rationale: Refers to bovine livestock used for sacrifice. 'From the herd' is natural
    and concise.
- source_word: מִן הַצֹּאן
  chosen: from the flock
  alternatives:
  - from the sheep and goats
  lexicon: HALOT
  rationale: Collective term for small livestock, especially sheep/goats. 'From the
    flock' preserves the collective sense.
