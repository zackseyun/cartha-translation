id: NUM.15.23
reference: Numbers 15:23
source:
  edition: WLC
  text: אֵת֩ כָּל אֲשֶׁ֨ר צִוָּ֧ה יְהוָ֛ה אֲלֵי/כֶ֖ם בְּ/יַד מֹשֶׁ֑ה מִן הַ/יּ֞וֹם
    אֲשֶׁ֨ר צִוָּ֧ה יְהוָ֛ה וָ/הָ֖לְאָה לְ/דֹרֹתֵי/כֶֽם־־־׃
translation:
  text: everything that the LORD has commanded you through Moses, from the day that
    the LORD gave command and onward throughout your generations—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the hand of Moses,'' an idiom meaning ''through Moses.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵת כָּל אֲשֶׁר
  chosen: everything that
  alternatives:
  - all that
  - the whole of what
  lexicon: HALOT
  rationale: The object marker אֵת with כָּל אֲשֶׁר introduces the totality of what
    follows. 'Everything that' is natural modern English and preserves the comprehensive
    force.
- source_word: צִוָּה
  chosen: has commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: The perfect verb refers to what the LORD has commanded, viewed as a completed
    body of instruction relevant to the present case. English present perfect fits
    the ongoing relevance in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD' rather
    than transliterated forms.
- source_word: אֲלֵיכֶם
  chosen: you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition is implicit in idiomatic English after 'commanded.' 'Commanded
    you' is smoother than 'commanded to you' while preserving the addressees.
- source_word: בְּיַד מֹשֶׁה
  chosen: through Moses
  alternatives:
  - by the hand of Moses
  - by Moses
  lexicon: HALOT
  rationale: The idiom בְּיַד literally means 'by the hand of' but commonly denotes
    agency or mediation. 'Through Moses' best conveys mediated delivery in clear English.
- source_word: מִן הַיּוֹם אֲשֶׁר
  chosen: from the day that
  alternatives:
  - since the day that
  - from the time when
  lexicon: HALOT
  rationale: This temporal phrase marks the starting point of the commands. 'From
    the day that' is a close and readable rendering.
- source_word: צִוָּה
  chosen: gave command
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: A slight variation avoids awkward repetition in English while preserving
    the same Hebrew verb. The semantic content remains unchanged and the variation
    is documented for consistency.
- source_word: וָהָלְאָה
  chosen: and onward
  alternatives:
  - and after
  - thereafter
  - forward
  lexicon: HALOT
  rationale: This adverb means onward/thereafter from the stated point. 'And onward'
    is concise and natural in English.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - from generation to generation among you
  lexicon: HALOT
  rationale: The phrase expresses continuing applicability across successive generations.
    'Throughout your generations' preserves that durative covenantal sense.
