id: NUM.15.24
reference: Numbers 15:24
source:
  edition: WLC
  text: וְ/הָיָ֗ה אִ֣ם מֵ/עֵינֵ֣י הָ/עֵדָה֮ נֶעֶשְׂתָ֣ה לִ/שְׁגָגָה֒ וְ/עָשׂ֣וּ כָל
    הָ/עֵדָ֡ה פַּ֣ר בֶּן בָּקָר֩ אֶחָ֨ד לְ/עֹלָ֜ה לְ/רֵ֤יחַ נִיחֹ֨חַ֙ לַֽ/יהוָ֔ה וּ/מִנְחָת֥/וֹ
    וְ/נִסְכּ֖/וֹ כַּ/מִּשְׁפָּ֑ט וּ/שְׂעִיר עִזִּ֥ים אֶחָ֖ד לְ/חַטָּֽת־־־׃
translation:
  text: then, if it was done unintentionally and escaped the notice of the congregation,
    all the congregation shall offer one bull from the herd for a burnt offering,
    for a pleasing aroma to the LORD, with its grain offering and its drink offering,
    according to the ordinance, and one male goat for a sin offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for a purification offering.' The Hebrew חַטָּאת can denote the offering
      associated with sin and its ritual purification effect.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעֵינֵי הָעֵדָה
  chosen: escaped the notice of the congregation
  alternatives:
  - from the eyes of the congregation
  - hidden from the congregation
  lexicon: HALOT
  rationale: The idiom literally means 'from the eyes of the congregation' but in
    context refers to something being overlooked or unnoticed by the assembly. 'Escaped
    the notice' preserves the idiomatic sense in natural English without over-paraphrasing.
- source_word: נֶעֶשְׂתָה לִשְׁגָגָה
  chosen: it was done unintentionally
  alternatives:
  - it was done by mistake
  - it was done in error
  lexicon: HALOT
  rationale: שְׁגָגָה denotes inadvertence or unintentional error, especially in sacrificial/legal
    contexts. 'Unintentionally' is the clearest modern rendering and matches the cultic
    distinction from high-handed sin in the surrounding passage.
- source_word: כָל הָעֵדָה
  chosen: all the congregation
  alternatives:
  - the whole congregation
  - all the assembly
  lexicon: HALOT
  rationale: עֵדָה commonly refers to the covenant community assembled. 'Congregation'
    is a standard and natural rendering in Numbers, and 'all' preserves כָל.
- source_word: פַּר בֶּן בָּקָר אֶחָד
  chosen: one bull from the herd
  alternatives:
  - one young bull
  - one bull, a son of the herd
  lexicon: HALOT
  rationale: The phrase denotes a bull of the cattle/herd. 'One bull from the herd'
    is idiomatic English that preserves the sacrificial specification without woodenly
    reproducing the Hebrew construct.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard sacrificial term 'burnt offering.' This should
    be kept consistent and not paraphrased.
- source_word: לְרֵיחַ נִיחֹחַ
  chosen: for a pleasing aroma
  alternatives:
  - for a soothing aroma
  - for a sweet-smelling aroma
  lexicon: HALOT
  rationale: The phrase is a sacrificial idiom indicating acceptability before God,
    not divine olfactory description alone. 'Pleasing aroma' is readable modern English
    and preserves the cultic metaphor.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.'
- source_word: וּמִנְחָתוֹ
  chosen: with its grain offering
  alternatives:
  - and its grain offering
  - with its tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in sacrificial contexts refers to the accompanying grain offering.
    The suffix refers to the bull's associated offering. 'With' clarifies accompaniment
    in English.
- source_word: וְנִסְכּוֹ
  chosen: and its drink offering
  alternatives:
  - with its drink offering
  - and its libation
  lexicon: HALOT
  rationale: נֶסֶךְ is the accompanying drink offering/libation. 'Drink offering'
    is the clearest standard biblical English.
- source_word: כַּמִּשְׁפָּט
  chosen: according to the ordinance
  alternatives:
  - according to the rule
  - according to the prescribed procedure
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to the prescribed legal/ritual regulation. 'Ordinance'
    preserves the formal cultic sense better than the vaguer 'rule.'
- source_word: וּשְׂעִיר עִזִּים אֶחָד
  chosen: and one male goat
  alternatives:
  - and one goat
  - and one buck goat
  lexicon: HALOT
  rationale: שְׂעִיר עִזִּים specifically denotes a male goat. Including 'male' preserves
    the lexical specificity of the Hebrew.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for purification offering
  lexicon: HALOT
  rationale: חַטָּאת in sacrificial contexts traditionally means 'sin offering.' While
    some argue for 'purification offering' in priestly texts, 'sin offering' remains
    the most recognizable and contextually adequate main-text rendering; the alternative
    is worth preserving in a footnote.
