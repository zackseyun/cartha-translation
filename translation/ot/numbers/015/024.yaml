theological_decisions:
- issue: Rendering of חַטָּאת in priestly sacrificial context
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew sacrificial term can emphasize either the relation to sin
    or the rite's purificatory effect. To preserve readability and continuity with
    established sacrificial terminology, the main text uses 'sin offering,' while
    the alternative is preserved in a footnote because it is a meaningful scholarly
    option and reflects the ritual-cleansing nuance of priestly usage.
  doctrine_reference: Translation philosophy §3, §5
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
