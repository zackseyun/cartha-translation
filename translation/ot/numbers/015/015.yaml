theological_decisions:
- issue: Legal status of the resident foreigner in Israel's worship legislation
  chosen_reading: The verse states equal statutory standing in this matter for the native assembly and the sojourner residing among them.
  alternative_readings:
  - The verse could be read more narrowly as applying only to the specific sacrificial regulations in the immediate context.
  rationale: The wording clearly emphasizes one statute for both groups 'before the LORD.' The translation preserves that parity without expanding it beyond the immediate legal context more than the text itself warrants.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
