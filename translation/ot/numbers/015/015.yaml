id: NUM.15.15
reference: Numbers 15:15
source:
  edition: WLC
  text: הַ/קָּהָ֕ל חֻקָּ֥ה אַחַ֛ת לָ/כֶ֖ם וְ/לַ/גֵּ֣ר הַ/גָּ֑ר חֻקַּ֤ת עוֹלָם֙ לְ/דֹרֹ֣תֵי/כֶ֔ם כָּ/כֶ֛ם כַּ/גֵּ֥ר יִהְיֶ֖ה לִ/פְנֵ֥י יְהוָֽה׃
translation:
  text: For the assembly, there shall be one statute for you and for the sojourner who sojourns with you, a permanent statute throughout your generations. As you are, so shall the sojourner be before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the stranger' or 'the resident foreigner' for 'the sojourner.'
    reason: lexical_alternative
  - marker: b
    text: Or 'an everlasting statute' or 'a perpetual statute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקָּהָל
  chosen: the assembly
  alternatives:
  - the congregation
  lexicon: HALOT
  rationale: קָהָל denotes the gathered community. 'Assembly' is clear modern English and fits the civic-cultic setting; 'congregation' is possible but can sound more ecclesiastical than the Hebrew requires.
- source_word: חֻקָּה אַחַת
  chosen: one statute
  alternatives:
  - one ordinance
  - one fixed statute
  lexicon: HALOT
  rationale: חֻקָּה refers to a prescribed statute or ordinance. 'One statute' preserves both the singularity and legal force of the Hebrew.
- source_word: לָכֶם וְלַגֵּר
  chosen: for you and for the sojourner
  alternatives:
  - for you and for the stranger
  - for you and for the resident foreigner
  lexicon: HALOT
  rationale: 'גֵּר is best rendered ''sojourner'' here: a non-native residing among Israel under covenantal/legal provisions. ''Stranger'' can imply mere unfamiliarity, while ''resident foreigner'' is accurate but less natural in running English.'
- source_word: הַגָּר
  chosen: who sojourns with you
  alternatives:
  - who resides among you
  - who is staying with you
  lexicon: HALOT
  rationale: The participle of גור repeats the root for emphasis. Rendering it verbally ('who sojourns') preserves the Hebrew wordplay and ongoing resident status better than a flatter nominal gloss.
- source_word: חֻקַּת עוֹלָם
  chosen: a permanent statute
  alternatives:
  - an everlasting statute
  - a perpetual statute
  lexicon: HALOT
  rationale: עוֹלָם in legal formulae often denotes enduring continuance across generations. 'Permanent' communicates the force in contemporary English without overstating philosophical eternity; traditional 'perpetual/everlasting' remain possible.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - from generation to generation
  lexicon: HALOT
  rationale: This idiom marks ongoing applicability across successive generations. 'Throughout your generations' is a standard, natural rendering.
- source_word: כָּכֶם כַּגֵּר יִהְיֶה
  chosen: As you are, so shall the sojourner be
  alternatives:
  - The sojourner shall be as you are
  - As with you, so with the sojourner
  lexicon: HALOT
  rationale: The comparative כ...כ construction stresses parity between native Israelite and resident alien in this legal-cultic matter. The chosen wording preserves the emphatic balance and reads naturally in English.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי means 'before/in the presence of.' 'Before the LORD' is idiomatic and preserves the covenantal setting. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
