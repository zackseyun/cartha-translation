id: NUM.15.27
reference: Numbers 15:27
source:
  edition: WLC
  text: וְ/אִם נֶ֥פֶשׁ אַחַ֖ת תֶּחֱטָ֣א בִ/שְׁגָגָ֑ה וְ/הִקְרִ֛יבָה עֵ֥ז בַּת שְׁנָתָ֖/הּ
    לְ/חַטָּֽאת־־׃
translation:
  text: But if one person sins unintentionally, then she shall present a one-year-old
    female goat as a sin offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "purification offering." The Hebrew term חַטָּאת can denote the offering
      that deals with sin/impurity, not only the sin itself.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction plus conditional introduces a contrasting case to the
    preceding legislation. 'But if' captures the mild adversative/continuative force
    in context better than a bare 'if.'
- source_word: נֶפֶשׁ אַחַת
  chosen: one person
  alternatives:
  - one soul
  - one individual
  lexicon: HALOT
  rationale: Although נֶפֶשׁ is literally 'soul/self/life,' in legal contexts it commonly
    refers to a person. 'One person' is natural English and preserves the singularity
    marked by אַחַת.
- source_word: תֶּחֱטָא
  chosen: sins
  alternatives:
  - should sin
  - commits a sin
  lexicon: HALOT
  rationale: The imperfect in this casuistic setting is best rendered as a simple
    present/future-like condition in English. 'Sins' is concise and idiomatic.
- source_word: בִּשְׁגָגָה
  chosen: unintentionally
  alternatives:
  - by mistake
  - in error
  - inadvertently
  lexicon: HALOT
  rationale: The term denotes inadvertence or unintentional wrongdoing in priestly
    legal material. 'Unintentionally' is clear modern English and preserves the legal
    distinction from high-handed sin.
- source_word: וְהִקְרִיבָה
  chosen: then she shall present
  alternatives:
  - and she shall bring near
  - and she shall offer
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts means to bring/present an offering.
    'Present' is natural and suitably formal. 'Then' makes the legal consequence explicit
    in English.
- source_word: עֵז
  chosen: female goat
  alternatives:
  - goat
  - she-goat
  lexicon: HALOT
  rationale: The noun specifically denotes a female goat. Rendering the sex is important
    because the Hebrew specifies it.
- source_word: בַּת שְׁנָתָהּ
  chosen: one-year-old
  alternatives:
  - in its first year
  - a year old
  lexicon: HALOT
  rationale: This idiom indicates the animal is in its first year / a year old. 'One-year-old'
    is the most natural compact English equivalent.
- source_word: לְחַטָּאת
  chosen: as a sin offering
  alternatives:
  - for a sin offering
  - for sin
  lexicon: HALOT
  rationale: In sacrificial contexts חַטָּאת commonly denotes the purification/sin
    offering rather than merely 'sin.' 'As a sin offering' is the standard clear rendering
    in English.
