theological_decisions:
- issue: Gender of the singular offender
  chosen_reading: Rendered the offender as 'she' in keeping with the feminine singular
    Hebrew forms.
  alternative_readings:
  - Rendered generically as 'he'
  - Rendered gender-neutrally as 'they'
  rationale: The Hebrew uses feminine singular forms (נֶפֶשׁ אַחַת ... תֶּחֱטָא ...
    וְהִקְרִיבָה), likely agreeing grammatically with נֶפֶשׁ, which is feminine. Following
    the project's gender-accurate principle, the translation preserves the feminine
    singular rather than neutralizing it. This does not imply the law applies only
    to women; it reflects the grammar of this clause.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Meaning of חַטָּאת in sacrificial law
  chosen_reading: Rendered as 'sin offering' in the main text.
  alternative_readings:
  - purification offering
  rationale: While some scholars argue that חַטָּאת in priestly texts can emphasize
    purification, 'sin offering' remains the clearest and most widely understood English
    rendering here. The alternative is worth preserving in a footnote because it may
    better reflect the ritual function in some contexts.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 5
