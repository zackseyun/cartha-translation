id: NUM.15.13
reference: Numbers 15:13
source:
  edition: WLC
  text: כָּל הָ/אֶזְרָ֥ח יַעֲשֶׂה כָּ֖כָה אֶת אֵ֑לֶּה לְ/הַקְרִ֛יב אִשֵּׁ֥ה רֵֽיחַ נִיחֹ֖חַ לַֽ/יהוָֽה־־־־׃
translation:
  text: Every native-born person shall do these things in this way, to present a food offering, a pleasing aroma to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Every native-born person'; the Hebrew uses a masculine singular form with representative force in legal instruction.
    reason: lexical_alternative
  - marker: b
    text: Or 'a fire offering' or 'an offering by fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: Every
  alternatives:
  - All
  lexicon: HALOT
  rationale: 'Distributive sense fits the singular noun that follows: each individual native-born person is in view.'
- source_word: הָאֶזְרָח
  chosen: native-born man
  alternatives:
  - native-born person
  - native
  - citizen
  lexicon: HALOT
  rationale: Refers to an Israelite native to the land/community in contrast to the sojourner in the surrounding context. 'Man' preserves the grammatically masculine singular representative form per gender-accurate policy; the sense is generic rather than exclusively male.
- source_word: יַעֲשֶׂה
  chosen: shall do
  alternatives:
  - must do
  - is to do
  lexicon: HALOT
  rationale: Imperfect here carries prescriptive force in legal material. 'Shall do' preserves the legislative tone without over-paraphrasing.
- source_word: כָּכָה
  chosen: in this way
  alternatives:
  - thus
  - like this
  lexicon: HALOT
  rationale: Natural modern English rendering of the adverb while retaining the procedural sense.
- source_word: אֶת אֵלֶּה
  chosen: these things
  alternatives:
  - these
  - these offerings
  lexicon: HALOT
  rationale: The direct-object marker plus demonstrative points back to the prescribed sacrificial actions/items. 'These things' is explicit without importing more than the text states.
- source_word: לְהַקְרִיב
  chosen: to present
  alternatives:
  - to bring near
  - to offer
  lexicon: HALOT
  rationale: In sacrificial context the verb means to bring/present an offering. 'Present' avoids redundancy with the following offering term while remaining faithful.
- source_word: אִשֵּׁה
  chosen: food offering
  alternatives:
  - offering by fire
  - fire offering
  lexicon: HALOT
  rationale: A standard sacrificial term for an offering made by fire. 'Food offering' is readable modern English and reflects the idiom used in many contexts, while 'offering by fire' remains a viable alternative.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet-smelling aroma
  lexicon: HALOT
  rationale: Established sacrificial idiom indicating acceptability before God. 'Pleasing aroma' is clear modern English without implying divine sensory limitation.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the LORD'.
