  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Representative masculine in הָאֶזְרָח
  chosen_reading: native-born man
  alternative_readings:
  - native-born person
  rationale: The Hebrew is grammatically masculine singular but functions generically in legal instruction. Per translation philosophy, the rendering should be gender-accurate rather than automatically gender-neutral; the generic force is preserved in a footnote.
