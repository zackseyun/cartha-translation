id: NUM.15.36
reference: Numbers 15:36
source:
  edition: WLC
  text: וַ/יֹּצִ֨יאוּ אֹת֜/וֹ כָּל הָ/עֵדָ֗ה אֶל מִ/חוּץ֙ לַֽ/מַּחֲנֶ֔ה וַ/יִּרְגְּמ֥וּ אֹת֛/וֹ בָּ/אֲבָנִ֖ים וַ/יָּמֹ֑ת כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־׃פ
translation:
  text: So the whole congregation brought him outside the camp and stoned him with stones, and he died, just as Yahweh had commanded Moses.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כָּל הָעֵדָה
  chosen: the whole congregation
  alternatives:
  - all the assembly
  - the entire community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled Israelite community/congregation. 'Congregation' preserves the corporate, covenantal sense better than the more generic 'community,' while 'whole' reflects כָּל.
- source_word: וַיֹּצִיאוּ אֹתוֹ
  chosen: brought him
  alternatives:
  - took him out
  - led him out
  lexicon: HALOT
  rationale: The verb יצא in the Hiphil means 'bring out' or 'take out.' 'Brought him' is natural English and fits the following destination phrase 'outside the camp.'
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - to outside the camp
  - to a place outside the camp
  lexicon: HALOT
  rationale: מִחוּץ with לַמַּחֲנֶה expresses movement to a location outside the camp. 'Outside the camp' is idiomatic and sufficiently precise.
- source_word: וַיִּרְגְּמוּ אֹתוֹ בָּאֲבָנִים
  chosen: stoned him with stones
  alternatives:
  - pelted him with stones
  - stoned him
  lexicon: HALOT
  rationale: רגם means to stone. Retaining 'with stones' reflects the explicit Hebrew instrument בָּאֲבָנִים, even though English can omit it. This preserves the formal force of the judicial execution description.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - and he was put to death
  lexicon: HALOT
  rationale: מות is the ordinary verb 'to die.' 'And he died' follows the Hebrew directly without importing additional interpretive wording.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  - according to what the LORD had commanded Moses
  lexicon: HALOT
  rationale: כַּאֲשֶׁר marks correspondence ('just as/as'). The perfect צִוָּה refers to the prior divine command. Per doctrine, יְהוָה is rendered 'the LORD.'
