id: NUM.15.33
reference: Numbers 15:33
source:
  edition: WLC
  text: וַ/יַּקְרִ֣יבוּ אֹת֔/וֹ הַ/מֹּצְאִ֥ים אֹת֖/וֹ מְקֹשֵׁ֣שׁ עֵצִ֑ים אֶל מֹשֶׁה֙
    וְ/אֶֽל אַהֲרֹ֔ן וְ/אֶ֖ל כָּל הָ/עֵדָֽה־־־׃
translation:
  text: And those who found him gathering wood brought him near to Moses and Aaron
    and to all the congregation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gathering sticks.' The Hebrew עֵצִים can refer to wood in general or
      to pieces of wood such as sticks.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרִיבוּ
  chosen: brought him near
  alternatives:
  - brought him
  - presented him
  lexicon: HALOT
  rationale: The Hiphil of קרב commonly means to bring near/present. 'Brought him
    near' preserves the causative nuance more clearly than the flatter 'brought him,'
    while remaining natural English.
- source_word: הַמֹּצְאִים
  chosen: those who found
  alternatives:
  - the ones who found
  - his finders
  lexicon: HALOT
  rationale: The participle with article functions substantivally, referring to the
    people who discovered him. 'Those who found' is natural and accurate.
- source_word: מְקֹשֵׁשׁ עֵצִים
  chosen: gathering wood
  alternatives:
  - gathering sticks
  - collecting wood
  lexicon: HALOT
  rationale: The participle describes the man's action at the time he was found. עֵצִים
    can mean wood/sticks; 'wood' is broader and fits the Hebrew noun, while 'gathering'
    reflects the verbal idea of collecting.
- source_word: אֶל מֹשֶׁה וְאֶל אַהֲרֹן וְאֶל כָּל הָעֵדָה
  chosen: to Moses and Aaron and to all the congregation
  alternatives:
  - before Moses and Aaron and all the congregation
  - to Moses, Aaron, and the whole assembly
  lexicon: HALOT
  rationale: אֶל normally means 'to/toward.' Because וַיַּקְרִיבוּ already carries
    the sense of presentation, 'to Moses and Aaron and to all the congregation' is
    straightforward and preserves the repeated prepositions' formal weight. 'Congregation'
    is retained as a standard rendering of עֵדָה in Israel's covenantal setting.
- source_word: עֵדָה
  chosen: congregation
  alternatives:
  - assembly
  - community
  lexicon: HALOT
  rationale: In Pentateuchal legal/narrative contexts, עֵדָה often denotes the gathered
    covenant community. 'Congregation' preserves that communal and formal sense better
    than the more generic 'community.'
