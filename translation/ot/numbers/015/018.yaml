id: NUM.15.18
reference: Numbers 15:18
source:
  edition: WLC
  text: דַּבֵּר֙ אֶל בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/אָמַרְתָּ֖ אֲלֵ/הֶ֑ם בְּ/בֹֽאֲ/כֶם֙ אֶל
    הָ/אָ֔רֶץ אֲשֶׁ֥ר אֲנִ֛י מֵבִ֥יא אֶתְ/כֶ֖ם שָֽׁמָּ/ה־־׃
translation:
  text: 'Speak to the sons of Israel and say to them: When you come into the land
    to which I am bringing you,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel' or 'the Israelites.' The Hebrew is literally
      'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  - Address
  lexicon: HALOT
  rationale: Piel imperative of דבר commonly introduces direct divine instruction
    to be delivered by Moses. 'Speak' is the standard and suitably direct rendering.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Following the gender-accurate principle,
    the familial expression is preserved rather than flattened to 'Israelites,' though
    that is a natural English alternative. In this formulaic covenantal address, the
    literal form best reflects the Hebrew.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  chosen: and say to them
  alternatives:
  - and tell them
  lexicon: HALOT
  rationale: This is the common sequential command formula after 'speak to.' 'Say
    to them' preserves the formal structure without awkwardness.
- source_word: בְּבֹאֲכֶם
  chosen: When you come
  alternatives:
  - When you enter
  - As you come
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys temporal sense, 'when/in
    your coming.' 'When you come' is natural English and keeps the movement sense
    of בוא.
- source_word: אֶל הָאָרֶץ
  chosen: into the land
  alternatives:
  - to the land
  lexicon: HALOT
  rationale: With בוא plus אֶל, English idiom prefers 'come into the land' to express
    entry rather than mere approach.
- source_word: אֲשֶׁר אֲנִי מֵבִיא אֶתְכֶם שָׁמָּה
  chosen: to which I am bringing you
  alternatives:
  - that I am bringing you there
  - which I am bringing you into
  lexicon: HALOT
  rationale: 'The participle מֵבִיא expresses ongoing/future-directed divine action.
    English smooths the resumptive adverb שָׁמָּה (''there'') into the relative clause:
    ''to which I am bringing you.'' This avoids awkward redundancy while preserving
    the sense.'
