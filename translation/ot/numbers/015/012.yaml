id: NUM.15.12
reference: Numbers 15:12
source:
  edition: WLC
  text: כַּ/מִּסְפָּ֖ר אֲשֶׁ֣ר תַּעֲשׂ֑וּ כָּ֛כָה תַּעֲשׂ֥וּ לָ/אֶחָ֖ד כְּ/מִסְפָּרָֽ/ם׃
translation:
  text: According to the number that you prepare, so you shall prepare for each one,
    according to their number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'According to the number that you make, thus you shall do for each one
      according to their number.' The Hebrew verb עשה commonly means 'do' or 'make';
      here 'prepare' is used to clarify the sacrificial context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּ/מִּסְפָּר
  chosen: According to the number
  alternatives:
  - In proportion to the number
  - By the number
  lexicon: HALOT
  rationale: The prefixed כ conveys comparison/accordance ('according to, in proportion
    to') with מִסְפָּר ('number, count'). 'According to the number' preserves the
    formal structure and fits the procedural context of sacrificial quantities.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  - as
  lexicon: HALOT
  rationale: Introduces the relative clause modifying 'number.' 'That' is natural
    modern English and keeps the syntax straightforward.
- source_word: תַּעֲשׂוּ
  chosen: you prepare
  alternatives:
  - you do
  - you make
  lexicon: HALOT
  rationale: עשה is broad ('do/make'), but in this immediate cultic context it refers
    to preparing or providing the required offerings. 'Prepare' communicates the ritual
    action more clearly than the overly generic 'do' while staying within the semantic
    range.
- source_word: כָּכָה
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: 'This adverb correlates with the opening comparative phrase: ''According
    to... so...'' ''So'' is concise and idiomatic in English.'
- source_word: תַּעֲשׂוּ
  chosen: you shall prepare
  alternatives:
  - you shall do
  - you shall make
  lexicon: HALOT
  rationale: The second occurrence resumes the instruction with modal force. 'Shall
    prepare' maintains consistency with the first verb and reflects the prescriptive
    sense in context.
- source_word: לָ/אֶחָד
  chosen: for each one
  alternatives:
  - for one
  - for each
  lexicon: HALOT
  rationale: Literally 'for the one,' but in context it refers distributively to each
    individual animal/offering unit under discussion. 'For each one' preserves the
    distributive force without over-specifying the referent.
- source_word: כְ/מִסְפָּרָם
  chosen: according to their number
  alternatives:
  - in proportion to their number
  - by their number
  lexicon: HALOT
  rationale: The suffix is plural ('their'), referring back to the counted items.
    'According to their number' mirrors the Hebrew structure and keeps the procedural
    emphasis on quantity.
