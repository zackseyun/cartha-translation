theological_decisions:
- issue: Nature of the uncertainty in the legal process
  chosen_reading: The text states that the required action had not yet been clearly
    specified, without implying ignorance of the law in general.
  alternative_readings:
  - The text could be taken more narrowly as meaning the specific penalty had not
    yet been declared.
  rationale: The passive wording לֹא פֹרַשׁ focuses on lack of clear specification.
    The translation preserves that procedural uncertainty without adding theological
    or legal interpretation beyond the text.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
