id: NUM.15.34
reference: Numbers 15:34
source:
  edition: WLC
  text: וַ/יַּנִּ֥יחוּ אֹת֖/וֹ בַּ/מִּשְׁמָ֑ר כִּ֚י לֹ֣א פֹרַ֔שׁ מַה יֵּעָשֶׂ֖ה לֽ/וֹ־׃ס
translation:
  text: So they put him in custody, because it had not been made clear what should
    be done to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'it had not been specified what was to be done to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּנִּיחוּ
  chosen: they put
  alternatives:
  - they placed
  - they left
  lexicon: HALOT
  rationale: The verb from נוח in the Hiphil can mean to set down, place, or leave.
    In this legal/narrative context, 'put' is natural modern English and fits the
    sense of placing the man under restraint.
- source_word: אֹתוֹ
  chosen: him
  rationale: Direct object pronoun, masculine singular, referring to the man found
    gathering wood in the preceding context.
- source_word: בַּמִּשְׁמָר
  chosen: in custody
  alternatives:
  - under guard
  - in the guardhouse
  - in prison
  lexicon: HALOT
  rationale: מִשְׁמָר denotes guarding, custody, or a place of detention. 'In custody'
    best captures the legal holding sense without overstating it as a formal prison
    sentence.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  rationale: Introduces the reason for the detention. 'Because' is clearer in contemporary
    English than the more formal 'for'.
- source_word: לֹא פֹרַשׁ
  chosen: it had not been made clear
  alternatives:
  - it had not been declared
  - it had not been specified
  - it had not been explained
  lexicon: HALOT
  rationale: The passive of פרש conveys that the matter had not yet been clearly stated
    or specified. 'Made clear' communicates the passive and the uncertainty of the
    legal ruling in idiomatic English.
- source_word: מַה יֵּעָשֶׂה לוֹ
  chosen: what should be done to him
  alternatives:
  - what was to be done to him
  - what ought to be done to him
  lexicon: HALOT
  rationale: The clause asks what action should be taken regarding him. 'Should be
    done' reflects the deliberative/legal force in natural English.
