id: NUM.15.20
reference: Numbers 15:20
source:
  edition: WLC
  text: רֵאשִׁית֙ עֲרִסֹ֣תֵ/כֶ֔ם חַלָּ֖ה תָּרִ֣ימוּ תְרוּמָ֑ה כִּ/תְרוּמַ֣ת גֹּ֔רֶן
    כֵּ֖ן תָּרִ֥ימוּ אֹתָֽ/הּ׃
translation:
  text: From the first of your dough you shall lift up a loaf as a contribution; like
    the contribution from the threshing floor, so you shall lift it up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the first part of your kneading dough'; the Hebrew term may refer to
      dough itself or, by extension, the kneading bowl/trough.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'heave offering.' The Hebrew term denotes a contribution set
      apart and presented.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵאשִׁית
  chosen: from the first of
  alternatives:
  - the first part of
  - the firstfruits of
  lexicon: HALOT
  rationale: רֵאשִׁית denotes the beginning or first portion. 'From the first of'
    fits the partitive sense in context, where a portion of the dough is to be offered,
    while avoiding the more technical 'firstfruits' if that would suggest harvested
    produce rather than prepared dough.
- source_word: עֲרִסֹתֵיכֶם
  chosen: your dough
  alternatives:
  - your kneading dough
  - your dough-troughs
  lexicon: HALOT
  rationale: The noun can refer to kneading dough or the kneading bowl/trough by metonymy.
    In this context, since a loaf is taken from it as an offering, 'your dough' best
    captures the intended substance rather than the container.
- source_word: חַלָּה
  chosen: a loaf
  alternatives:
  - a cake
  - a dough cake
  lexicon: HALOT
  rationale: חַלָּה here refers to a baked or formed bread-cake/loaf set apart from
    the dough. 'Loaf' is natural modern English and avoids the possible misunderstanding
    of 'cake' as a sweet dessert.
- source_word: תָּרִימוּ
  chosen: you shall lift up
  alternatives:
  - you shall present
  - you shall offer up
  lexicon: HALOT
  rationale: The Hiphil of רום in sacrificial/contribution contexts literally means
    'raise/lift up' and is the verbal basis for the offering term תְּרוּמָה. Retaining
    'lift up' preserves the lexical connection while remaining understandable.
- source_word: תְרוּמָה
  chosen: a contribution
  alternatives:
  - an offering
  - a heave offering
  lexicon: HALOT
  rationale: תְּרוּמָה is a contribution set apart and presented to God/priestly use.
    'Contribution' is transparent and avoids the archaic technical term 'heave offering,'
    while still conveying something set apart. 'Offering' is possible but less specific.
- source_word: כִּתְרוּמַת גֹּרֶן
  chosen: like the contribution from the threshing floor
  alternatives:
  - as the offering of the threshing floor
  - like the contribution of grain from the threshing floor
  lexicon: HALOT
  rationale: The comparison is to the contribution customarily taken from produce
    at the threshing floor. 'From the threshing floor' makes the source relationship
    clear in idiomatic English.
- source_word: גֹּרֶן
  chosen: threshing floor
  alternatives:
  - threshing place
  lexicon: HALOT
  rationale: Standard rendering for the agricultural site where grain is processed;
    it preserves the agrarian image behind the comparison.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: כֵּן marks the comparison's conclusion. 'So' is concise and natural in
    modern English.
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - this offering
  - that loaf
  lexicon: HALOT
  rationale: The feminine pronoun refers back to the loaf/contribution. 'It' is sufficient
    in English because the antecedent is clear from the immediate context.
