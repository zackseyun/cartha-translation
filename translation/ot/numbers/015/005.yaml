id: NUM.15.5
reference: Numbers 15:5
source:
  edition: WLC
  text: וְ/יַ֤יִן לַ/נֶּ֨סֶךְ֙ רְבִיעִ֣ית הַ/הִ֔ין תַּעֲשֶׂ֥ה עַל הָ/עֹלָ֖ה א֣וֹ לַ/זָּ֑בַח
    לַ/כֶּ֖בֶשׂ הָ/אֶחָֽד־׃
translation:
  text: And you shall prepare a quarter of a hin of wine for the drink offering, with
    the burnt offering or for the sacrifice, for each lamb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'upon the burnt offering.' The Hebrew preposition can
      be rendered more formally, but here likely indicates accompaniment in the sacrificial
      rite.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for the one lamb'; the translation 'for each lamb' brings out
      the distributive force in the instruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יַיִן
  chosen: And ... wine
  alternatives:
  - and wine
  lexicon: HALOT
  rationale: וְ joins this instruction to the preceding one; יַיִן is the ordinary
    term for 'wine.' English places 'And' at the start and moves 'wine' into a natural
    phrase.
- source_word: לַ/נֶּסֶךְ
  chosen: for the drink offering
  alternatives:
  - for a libation
  - as a drink offering
  lexicon: HALOT
  rationale: נֶסֶךְ in sacrificial context denotes the poured-out wine offering. 'Drink
    offering' is the clearest standard English rendering; 'libation' is possible but
    less accessible.
- source_word: רְבִיעִית הַ/הִין
  chosen: a quarter of a hin
  alternatives:
  - a fourth of a hin
  lexicon: HALOT
  rationale: The phrase specifies the quantity. 'Quarter' is idiomatic modern English
    while preserving the ancient unit 'hin' rather than converting it.
- source_word: תַּעֲשֶׂה
  chosen: you shall prepare
  alternatives:
  - you shall make
  - you shall offer
  lexicon: HALOT
  rationale: עָשָׂה literally means 'do/make,' but in sacrificial instructions it
    commonly means to prepare or perform. 'Prepare' fits the object 'wine for the
    drink offering' in natural English without over-paraphrasing.
- source_word: עַל הָ/עֹלָה
  chosen: with the burnt offering
  alternatives:
  - upon the burnt offering
  - for the burnt offering
  lexicon: HALOT
  rationale: עַל can be rendered literally 'upon,' but in this ritual context it indicates
    accompaniment/association with the burnt offering. 'With' communicates the relation
    clearly in English.
- source_word: א֣וֹ לַ/זָּבַח
  chosen: or for the sacrifice
  alternatives:
  - or for the sacrifice offering
  - or for the slaughtered offering
  lexicon: HALOT
  rationale: זֶבַח is the general sacrificial term, often distinct from עֹלָה. 'Sacrifice'
    preserves that distinction without adding a more specific category not explicit
    here.
- source_word: לַ/כֶּבֶשׂ הָ/אֶחָד
  chosen: for each lamb
  alternatives:
  - for the one lamb
  - for one lamb
  lexicon: HALOT
  rationale: Literally 'for the one lamb.' In procedural instructions this distributive
    sense is best conveyed by 'for each lamb,' indicating the amount required per
    individual lamb.
