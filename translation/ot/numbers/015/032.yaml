theological_decisions:
- issue: Rendering the covenant people designation בְנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: No doctrinal controversy is present, but the translation philosophy prefers
    gender-accurate renderings that match the source's form. 'Sons of Israel' preserves
    the Hebrew expression without importing a more interpretive collective label.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Sabbath terminology
  chosen_reading: the Sabbath day
  alternative_readings:
  - the Sabbath
  rationale: The verse reports an act occurring on the Sabbath without adding interpretive
    commentary about the law itself. The translation preserves the temporal reference
    plainly and does not import theological explanation beyond the text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 3
