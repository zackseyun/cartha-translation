id: NUM.15.32
reference: Numbers 15:32
source:
  edition: WLC
  text: וַ/יִּהְי֥וּ בְנֵֽי יִשְׂרָאֵ֖ל בַּ/מִּדְבָּ֑ר וַֽ/יִּמְצְא֗וּ אִ֛ישׁ מְקֹשֵׁ֥שׁ
    עֵצִ֖ים בְּ/י֥וֹם הַ/שַּׁבָּֽת־׃
translation:
  text: While the sons of Israel were in the wilderness, they found a man gathering
    wood on the Sabbath day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gathering sticks.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - came to be
  - happened to be
  lexicon: HALOT
  rationale: The wayyiqtol of היה here sets the scene rather than emphasizing becoming;
    'were' is natural English and preserves the circumstantial force.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: This is the literal Hebrew expression. Per gender-accurate philosophy,
    'sons of Israel' preserves the source form better than the more idiomatic 'Israelites,'
    while remaining understandable.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes the wilderness region of Israel's wandering.
    'Wilderness' fits biblical usage and avoids over-specifying a sandy desert landscape.
- source_word: וַיִּמְצְאוּ
  chosen: they found
  alternatives:
  - they came upon
  - they discovered
  lexicon: HALOT
  rationale: A straightforward rendering of מצא in narrative context.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The singular noun explicitly denotes a male individual here, not an indefinite
    person in general; 'a man' is the most direct rendering.
- source_word: מְקֹשֵׁשׁ עֵצִים
  chosen: gathering wood
  alternatives:
  - collecting sticks
  - gathering sticks
  lexicon: HALOT
  rationale: The participle from קשש with עֵצִים refers to collecting pieces of wood.
    'Gathering wood' is idiomatic and broad enough; 'sticks' is possible and worth
    preserving as a lexical alternative.
- source_word: בְּיוֹם הַשַּׁבָּת
  chosen: on the Sabbath day
  alternatives:
  - on the Sabbath
  lexicon: HALOT
  rationale: The phrase explicitly includes 'day' (יוֹם). 'On the Sabbath day' preserves
    the full expression in natural English.
