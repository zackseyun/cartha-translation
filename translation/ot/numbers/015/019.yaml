id: NUM.15.19
reference: Numbers 15:19
source:
  edition: WLC
  text: וְ/הָיָ֕ה בַּ/אֲכָלְ/כֶ֖ם מִ/לֶּ֣חֶם הָ/אָ֑רֶץ תָּרִ֥ימוּ תְרוּמָ֖ה לַ/יהוָֽה׃
translation:
  text: And when you eat from the bread of the land, you shall present a contribution to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall present an offering to the LORD.' The Hebrew says 'lift up a contribution,' using cultic offering language.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And when
  alternatives:
  - And it shall be
  - Then it shall be
  lexicon: HALOT
  rationale: The clause marker with היה introduces a future circumstance/result. In English, 'And when' best captures the temporal force naturally in context, linking this verse to the preceding instruction without woodenly preserving 'it shall be.'
- source_word: בַּאֲכָלְכֶם
  chosen: you eat
  alternatives:
  - in your eating
  - when you eat
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed ב and 2mp suffix is temporal: ''when/in your eating.'' English requires a finite clause; ''you eat'' within ''when'' expresses the sense clearly.'
- source_word: מִלֶּחֶם
  chosen: from the bread
  alternatives:
  - some of the bread
  - of the bread
  - food from
  lexicon: HALOT
  rationale: The preposition מן indicates source/partitive sense. 'From the bread' preserves the Hebrew construction and avoids over-paraphrasing, while still sounding natural enough in English.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: '''The land'' is the standard rendering and in context refers to the produce of the land they are entering. ''Country'' is less biblically idiomatic here.'
- source_word: תָּרִימוּ
  chosen: you shall lift up
  alternatives:
  - you shall present
  - you shall raise
  lexicon: HALOT
  rationale: The Hiphil of רום in sacrificial/gift contexts often carries the sense of lifting up/presenting. 'Lift up' preserves the concrete cultic imagery behind the technical offering language.
- source_word: תְרוּמָה
  chosen: a contribution
  alternatives:
  - an offering
  - a heave offering
  - a raised offering
  lexicon: HALOT
  rationale: תרומה denotes a contribution set apart and presented to God. 'Contribution' is clear modern English and avoids the archaic technical term 'heave offering,' while remaining more precise than the broad 'offering.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, יהוה is rendered 'the LORD.' The preposition ל is naturally rendered 'to' here, marking the offering's dedication.
