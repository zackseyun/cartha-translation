id: NUM.15.28
reference: Numbers 15:28
source:
  edition: WLC
  text: וְ/כִפֶּ֣ר הַ/כֹּהֵ֗ן עַל הַ/נֶּ֧פֶשׁ הַ/שֹּׁגֶ֛גֶת בְּ/חֶטְאָ֥ה בִ/שְׁגָגָ֖ה
    לִ/פְנֵ֣י יְהוָ֑ה לְ/כַפֵּ֥ר עָלָ֖י/ו וְ/נִסְלַ֥ח לֽ/וֹ־׃
translation:
  text: And the priest shall make atonement before the LORD for the person who sins
    unintentionally, when he sins unintentionally, to make atonement for him, and
    he shall be forgiven.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְכִפֶּר
  chosen: shall make atonement
  alternatives:
  - shall atone
  - shall make expiation
  lexicon: HALOT
  rationale: Piel of כפר commonly denotes effecting atonement/expiation in priestly
    contexts. 'Make atonement' is standard, clear modern English and preserves the
    cultic sense without importing a narrower theory.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Direct rendering of the officiating cultic agent.
- source_word: עַל הַנֶּפֶשׁ
  chosen: for the person
  alternatives:
  - for the soul
  - for the individual
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the individual person rather than the immaterial
    'soul.' 'For the person' communicates the referent naturally in English.
- source_word: הַשֹּׁגֶגֶת
  chosen: who sins unintentionally
  alternatives:
  - who errs unintentionally
  - who goes astray unintentionally
  lexicon: HALOT
  rationale: The participle from שׁגג denotes committing an act in error or unintentionally.
    Rendering it verbally in English is more natural than a wooden adjectival form
    like 'the erring one.'
- source_word: בְּחֶטְאָה בִשְׁגָגָה
  chosen: when he sins unintentionally
  alternatives:
  - in sinning unintentionally
  - by sinning unintentionally
  lexicon: HALOT
  rationale: The phrase restates and specifies the circumstance of the offense. 'When
    he sins unintentionally' preserves the repetition and clarifies the temporal/circumstantial
    force. The masculine singular in English reflects the Hebrew pronominal form while
    functioning generically.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי is spatial-relational, 'before/in the presence of.' 'Before the
    LORD' is idiomatic and concise. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: לְכַפֵּר עָלָיו
  chosen: to make atonement for him
  alternatives:
  - to atone for him
  lexicon: HALOT
  rationale: Infinitive phrase expressing purpose/result, naturally rendered with
    'to make atonement for him.' Retains the repeated כפר language of the verse.
- source_word: וְנִסְלַח לוֹ
  chosen: and he shall be forgiven
  alternatives:
  - and forgiveness shall be granted to him
  lexicon: HALOT
  rationale: 'Passive of סלח indicates the result of the atoning rite: forgiveness
    is granted. ''He shall be forgiven'' is natural and preserves the passive sense.'
