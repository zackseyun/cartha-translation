id: NUM.15.2
reference: Numbers 15:2
source:
  edition: WLC
  text: דַּבֵּר֙ אֶל בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/אָמַרְתָּ֖ אֲלֵ/הֶ֑ם כִּ֣י תָבֹ֗אוּ אֶל
    אֶ֨רֶץ֙ מוֹשְׁבֹ֣תֵי/כֶ֔ם אֲשֶׁ֥ר אֲנִ֖י נֹתֵ֥ן לָ/כֶֽם־־׃
translation:
  text: Speak to the sons of Israel and say to them, ‘When you come into the land
    of your dwellings, which I am giving to you,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites” or “the children of Israel.” The Hebrew is literally
      “the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “the land where you will dwell” or “the land of your settlements.”
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Speak to
  - Tell
  lexicon: HALOT
  rationale: Piel imperative of דבר commonly introduces divine instruction to be delivered
    by Moses. 'Speak' preserves the formal command style; the following אֶל supplies
    'to.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with gender-accurate policy, the
    familial expression is preserved rather than flattened to 'Israelites,' though
    that is a natural English alternative.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  chosen: and say to them
  alternatives:
  - and tell them
  lexicon: HALOT
  rationale: Standard sequential command formula. 'Say to them' is slightly more formal
    and matches the Hebrew idiom closely.
- source_word: כִּי
  chosen: When
  alternatives:
  - For when
  - If/when
  lexicon: HALOT
  rationale: Here כִּי introduces the circumstance in which the following legislation
    applies. 'When' communicates expected future entry into the land better than a
    more causal 'for.'
- source_word: תָבֹאוּ
  chosen: you come
  alternatives:
  - you enter
  - you go in
  lexicon: HALOT
  rationale: The verb בוא means 'come/enter.' 'Come' works naturally with 'into the
    land' and preserves the deictic sense without overformalizing.
- source_word: אֶרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: In Pentateuchal covenant context, 'land' is the standard and theologically
    loaded term for the promised territory.
- source_word: מוֹשְׁבֹתֵיכֶם
  chosen: your dwellings
  alternatives:
  - your settlements
  - your habitation
  - where you will dwell
  lexicon: HALOT
  rationale: From מושב, 'dwelling place/settlement.' The construct with 'land' is
    somewhat unusual; 'land of your dwellings' preserves the Hebrew wording while
    remaining intelligible. 'Settlements' is possible but slightly more interpretive.
- source_word: אֲשֶׁר אֲנִי נֹתֵן לָכֶם
  chosen: which I am giving to you
  alternatives:
  - that I give you
  - which I am giving you
  lexicon: HALOT
  rationale: The participle נֹתֵן conveys ongoing or imminent divine action. 'I am
    giving' preserves that aspect better than a simple present. 'To you' keeps the
    indirect object explicit, though idiomatic English could omit 'to'.
