theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is explicitly filial and masculine plural in form. Per the
    translation philosophy, gender-accurate rendering is preferred over neutralizing
    the expression, while recognizing that the referent is the covenant community
    as a whole.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Aspect of divine gift in נֹתֵן
  chosen_reading: which I am giving to you
  alternative_readings:
  - which I give you
  - which I will give you
  rationale: Using the participial sense preserves the immediacy and certainty of
    God's promised gift without converting it into a simple future. This avoids importing
    a stronger temporal nuance than the Hebrew requires.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
