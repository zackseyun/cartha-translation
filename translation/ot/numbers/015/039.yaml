theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default specifies 'the LORD' for יְהוָה, following Jewish
    reverence tradition and the Septuagintal pattern, unless context demands otherwise.
    No contextual factor here requires deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Strength of the metaphor for זנה in a covenant-faithfulness context
  chosen_reading: retain explicit sexual-infidelity imagery with 'are whoring'
  alternative_readings:
  - go astray
  - are unfaithful
  rationale: The verse warns against pursuing inner desire and sight in a way portrayed
    as covenantal infidelity. Preserving the metaphor maintains the theological force
    of Israel's relationship to the LORD without importing later doctrinal categories.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
