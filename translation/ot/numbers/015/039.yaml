id: NUM.15.39
reference: Numbers 15:39
source:
  edition: WLC
  text: וְ/הָיָ֣ה לָ/כֶם֮ לְ/צִיצִת֒ וּ/רְאִיתֶ֣ם אֹת֗/וֹ וּ/זְכַרְתֶּם֙ אֶת כָּל
    מִצְוֺ֣ת יְהוָ֔ה וַ/עֲשִׂיתֶ֖ם אֹתָ֑/ם וְ/לֹֽא תָתֻ֜רוּ אַחֲרֵ֤י לְבַבְ/כֶם֙ וְ/אַחֲרֵ֣י
    עֵֽינֵי/כֶ֔ם אֲשֶׁר אַתֶּ֥ם זֹנִ֖ים אַחֲרֵי/הֶֽם־־־־׃
translation:
  text: And it shall be a tassel for you, and when you see it, you shall remember
    all the commandments of the LORD and do them, and you shall not go about after
    your own heart and after your own eyes, after which you are whoring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fringe.' The Hebrew term refers to the tassel-like fringe attached to
      the garment.
    reason: lexical_alternative
  - marker: b
    text: Or 'follow after your heart and your eyes.' The Hebrew verb suggests pursuing
      or ranging after them.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'after which you are whoring,' using sexual-infidelity imagery
      as a metaphor for covenant unfaithfulness; alternatively, 'after which you go
      astray.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צִיצִת
  chosen: tassel
  alternatives:
  - fringe
  - tuft
  lexicon: HALOT
  rationale: Refers to the tassel/fringe attached to the garment corners in this context.
    'Tassel' is the clearest modern English term for the specific object commanded
    in the surrounding passage.
- source_word: וְהָיָה לָכֶם לְצִיצִת
  chosen: it shall be a tassel for you
  alternatives:
  - it shall serve as a tassel for you
  - it shall be for you as a tassel
  lexicon: HALOT
  rationale: Keeps the straightforward predicative construction with the implied singular
    referent from the previous verse. 'For you' preserves the dative sense without
    over-paraphrasing.
- source_word: וּרְאִיתֶם אֹתוֹ
  chosen: when you see it
  alternatives:
  - and you shall see it
  lexicon: HALOT
  rationale: 'Although formally a coordinate perfect with waw, in English the sense
    is naturally temporal/sequential: upon seeing the tassel, the Israelites are to
    remember. ''When you see it'' conveys the practical force more idiomatically while
    remaining close to the Hebrew.'
- source_word: מִצְוֺת
  chosen: commandments
  alternatives:
  - commands
  lexicon: HALOT
  rationale: '''Commandments'' preserves the covenantal and legal force of the Hebrew
    better than the slightly lighter ''commands,'' while remaining natural English.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving
    the traditional small-caps covenantal rendering in standard English form.
- source_word: וַעֲשִׂיתֶם אֹתָם
  chosen: and do them
  alternatives:
  - and perform them
  - and obey them
  lexicon: HALOT
  rationale: The verb עשה with commandments commonly means to do/keep them. 'Do them'
    is direct and close to the Hebrew; 'obey them' is interpretive, and 'perform'
    is stiffer English.
- source_word: תָתֻרוּ
  chosen: go about after
  alternatives:
  - follow
  - seek after
  - spy out after
  lexicon: HALOT
  rationale: The verb תור has the sense of exploring/seeking out. In this moral context
    it denotes pursuing or ranging after desires. 'Go about after' preserves some
    of the Hebrew's vividness without flattening it to the more generic 'follow.'
- source_word: לְבַבְכֶם
  chosen: your own heart
  alternatives:
  - your heart
  - your mind
  lexicon: HALOT
  rationale: In Hebrew anthropology לבב includes inner desire and intention, not merely
    emotion. 'Heart' is the standard biblical equivalent; 'your own' brings out the
    contrast with the LORD's commandments implied by the warning.
- source_word: עֵינֵיכֶם
  chosen: your own eyes
  alternatives:
  - your eyes
  - what your eyes desire
  lexicon: HALOT
  rationale: Literally 'your eyes.' Adding 'own' mirrors the previous phrase and highlights
    subjective desire. The idiom points to what is visually desired, but the literal
    expression is understandable in English.
- source_word: זֹנִים
  chosen: are whoring
  alternatives:
  - play the prostitute
  - go astray
  - are unfaithful
  lexicon: HALOT
  rationale: The participle from זנה is a strong metaphor of sexual infidelity used
    for covenantal unfaithfulness. 'Are whoring' preserves the shock and metaphorical
    force more directly than the softened 'go astray.'
- source_word: אֲשֶׁר אַתֶּם זֹנִים אַחֲרֵיהֶם
  chosen: after which you are whoring
  alternatives:
  - which you prostitute yourselves after
  - after which you go astray
  lexicon: HALOT
  rationale: Keeps the relative clause tied to 'heart' and 'eyes' and preserves the
    metaphor of illicit pursuit. The English is intentionally stark because the Hebrew
    metaphor is stark.
