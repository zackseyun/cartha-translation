id: NUM.15.35
reference: Numbers 15:35
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה מ֥וֹת יוּמַ֖ת הָ/אִ֑ישׁ רָג֨וֹם אֹת֤/וֹ בָֽ/אֲבָנִים֙
    כָּל הָ֣/עֵדָ֔ה מִ/ח֖וּץ לַֽ/מַּחֲנֶֽה־־׃
translation:
  text: Then the LORD said to Moses, “The man must surely be put to death; the whole
    congregation shall stone him with stones outside the camp.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “shall surely be put to death.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “stone him with stones,” an emphatic judicial expression for execution
      by stoning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project default for the divine name, preserving the traditional
    English convention for YHWH.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: מֹות יוּמַת
  chosen: must surely be put to death
  alternatives:
  - shall surely be put to death
  - must be executed
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the verbal idea.
    'Must surely be put to death' preserves both the passive sense and the emphatic
    force without sounding archaic.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - that man
  lexicon: HALOT
  rationale: Definite singular noun referring to the previously identified offender.
    'The man' is the most direct rendering.
- source_word: רָגוֹם ... בָאֲבָנִים
  chosen: stone him with stones
  alternatives:
  - certainly stone him
  - pelt him with stones
  lexicon: HALOT
  rationale: The infinitive absolute רָגוֹם before the implied finite sense intensifies
    the command. 'Stone him with stones' reflects the Hebrew wording closely and preserves
    the judicial execution sense.
- source_word: כָּל הָעֵדָה
  chosen: the whole congregation
  alternatives:
  - all the assembly
  - the entire community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled covenant community. 'Congregation'
    preserves the corporate, formal sense in legal/narrative contexts.
- source_word: מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - from outside the camp
  lexicon: HALOT
  rationale: Idiomatic locative expression indicating the place where the execution
    is to occur. 'Outside the camp' is natural and precise.
