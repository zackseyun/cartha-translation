theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of שׁגה in sacrificial/legal context
  chosen_reading: unintentional error/disobedience
  alternative_readings:
  - general error
  - sin unintentionally
  rationale: The immediate context (vv. 22ff.) concerns sins committed unintentionally, in contrast to deliberate defiance later in the chapter. The translation preserves that theological-legal distinction without importing later doctrinal terminology beyond the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
