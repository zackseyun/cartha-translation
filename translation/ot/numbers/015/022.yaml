id: NUM.15.22
reference: Numbers 15:22
source:
  edition: WLC
  text: וְ/כִ֣י תִשְׁגּ֔וּ וְ/לֹ֣א תַעֲשׂ֔וּ אֵ֥ת כָּל הַ/מִּצְוֺ֖ת הָ/אֵ֑לֶּה אֲשֶׁר דִּבֶּ֥ר יְהוָ֖ה אֶל מֹשֶֽׁה־־־׃
translation:
  text: But if you unintentionally go astray and do not do all these commandments that Yahweh has spoken to Moses,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if you err' or 'if you sin unintentionally.' The Hebrew verb conveys going astray or erring, and in this context refers to unintentional failure regarding the commandments.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: HALOT
  rationale: The conjunction introduces a conditional case that continues the legal instruction from the preceding context. 'But if' captures both the conditional force and the slight contrastive transition better than a bare 'and if' in natural English.
- source_word: תִשְׁגּוּ
  chosen: you unintentionally go astray
  alternatives:
  - you err unintentionally
  - you sin unintentionally
  - you stray
  lexicon: HALOT
  rationale: The verb שׁגה denotes going astray or erring, often with the nuance of inadvertence in priestly/legal contexts. Because the surrounding passage distinguishes unintentional failure from high-handed sin, 'unintentionally go astray' preserves both the verbal imagery and the legal nuance.
- source_word: וְלֹא תַעֲשׂוּ
  chosen: and do not carry out
  alternatives:
  - and do not do
  - and fail to do
  - and do not observe
  lexicon: HALOT
  rationale: עשה is broad ('do, make'). In context of commandments, 'carry out' is idiomatic modern English that preserves obedience language without sounding wooden. The negative with the preceding verb expresses the result/content of the error.
- source_word: אֵת כָּל הַמִּצְוֺת הָאֵלֶּה
  chosen: all these commandments
  alternatives:
  - all these commands
  - all these mitzvot
  lexicon: HALOT
  rationale: מִצְוֺת is best rendered 'commandments' in covenant-law context. 'All these commandments' closely follows the Hebrew and preserves the comprehensiveness marked by כָּל and הָאֵלֶּה.
- source_word: אֲשֶׁר דִּבֶּר יְהוָה אֶל מֹשֶׁה
  chosen: that the LORD has spoken to Moses
  alternatives:
  - which the LORD spoke to Moses
  - that the LORD spoke to Moses
  lexicon: HALOT
  rationale: The relative clause identifies the commandments as those communicated by YHWH through Moses. The perfect is rendered with English present perfect ('has spoken') to sound natural while retaining the completed divine speech with present relevance in the legal setting.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
