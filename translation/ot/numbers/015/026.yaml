theological_decisions:
- issue: Corporate scope of forgiveness
  chosen_reading: The verse states that forgiveness extends to the entire Israelite
    congregation and also to the resident sojourner when the offense is committed
    unintentionally.
  alternative_readings:
  - The final clause could be read more elliptically as 'for all the people were in
    error' rather than 'it was done unintentionally by all the people.'
  rationale: The Hebrew emphasizes communal inclusion and the category of unintentional
    sin without adding further doctrinal explanation. The translation preserves that
    legal-theological distinction and the inclusion of the sojourner within the community's
    atonement provisions.
  doctrine_reference: Translation philosophy §§3, 4, 5
