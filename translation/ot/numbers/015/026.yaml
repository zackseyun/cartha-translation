id: NUM.15.26
reference: Numbers 15:26
source:
  edition: WLC
  text: וְ/נִסְלַ֗ח לְ/כָל עֲדַת֙ בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/לַ/גֵּ֖ר הַ/גָּ֣ר בְּ/תוֹכָ֑/ם
    כִּ֥י לְ/כָל הָ/עָ֖ם בִּ/שְׁגָגָֽה־־׃ס
translation:
  text: And all the congregation of the sons of Israel shall be forgiven, along with
    the sojourner who sojourns among them, because it was done unintentionally by
    all the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole community of the Israelites.' The Hebrew reads 'the congregation
      of the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''Sojourner'' refers to a resident foreigner living among Israel under
      the community''s laws and protections.'
    reason: cultural_note
  - marker: c
    text: Or 'for all the people were in error.' The Hebrew final clause is compact
      and may be rendered more literally that way.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנִסְלַח
  chosen: shall be forgiven
  alternatives:
  - and it shall be forgiven
  - and forgiveness shall be granted
  lexicon: HALOT
  rationale: 'Nifal imperfect 3ms of סלח is impersonal/passive in sense here: forgiveness
    is granted to the community. English passive ''shall be forgiven'' best captures
    the result for the people rather than leaving an awkward impersonal singular subject.'
- source_word: לְכָל עֲדַת בְּנֵי יִשְׂרָאֵל
  chosen: all the congregation of the sons of Israel
  alternatives:
  - all the congregation of the people of Israel
  - the whole community of the Israelites
  lexicon: HALOT
  rationale: עֵדָה is 'congregation/community/assembly.' 'Congregation' preserves
    the formal covenantal-cultic sense in this legal context. בְּנֵי יִשְׂרָאֵל is
    rendered gender-accurately as 'sons of Israel' per project philosophy, though
    'people of Israel' is a smoother alternative.
- source_word: וְלַגֵּר
  chosen: along with the sojourner
  alternatives:
  - and the resident foreigner
  - and the alien
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident living within Israelite society under
    its protections and obligations. 'Sojourner' is a standard, theologically resonant
    rendering that avoids the modern connotations of 'alien.' 'Along with' smooths
    the prefixed conjunction and preposition in English.
- source_word: הַגָּר בְּתוֹכָם
  chosen: who sojourns among them
  alternatives:
  - who resides among them
  - dwelling in their midst
  lexicon: HALOT
  rationale: The participle of גור echoes the noun גֵּר; preserving the verbal cognate
    with 'sojourns' reflects the Hebrew wordplay and legal category. 'Among them'
    is a natural rendering of בְּתוֹכָם.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the forgiveness stated in the first
    clause. 'Because' makes the causal force explicit in contemporary English.
- source_word: לְכָל הָעָם
  chosen: by all the people
  alternatives:
  - for all the people
  - for the whole people
  lexicon: HALOT
  rationale: The preposition לְ here is best taken in relation to the predicate of
    inadvertence affecting the whole people; idiomatic English expresses this as the
    act/error being done 'by all the people.' This clarifies that the unintentionality
    pertains corporately.
- source_word: בִּשְׁגָגָה
  chosen: unintentionally
  alternatives:
  - in error
  - by mistake
  - through inadvertence
  lexicon: HALOT
  rationale: שְׁגָגָה in sacrificial/legal contexts refers to inadvertent or unintentional
    sin. 'Unintentionally' is clear modern English and preserves the legal distinction
    from high-handed sin.
