id: NUM.15.30
reference: Numbers 15:30
source:
  edition: WLC
  text: וְ/הַ/נֶּ֜פֶשׁ אֲשֶֽׁר תַּעֲשֶׂ֣ה בְּ/יָ֣ד רָמָ֗ה מִן הָֽ/אֶזְרָח֙ וּ/מִן הַ/גֵּ֔ר אֶת יְהוָ֖ה ה֣וּא מְגַדֵּ֑ף וְ/נִכְרְתָ֛ה הַ/נֶּ֥פֶשׁ הַ/הִ֖וא מִ/קֶּ֥רֶב עַמָּֽ/הּ־׀־־־׃
translation:
  text: But the person who acts with a high hand, whether native-born or a sojourner, is reviling Yahweh, and that person shall be cut off from among his people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'presumptuously' or 'defiantly'; literally 'with a high hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֶּפֶשׁ
  chosen: the person
  alternatives:
  - the soul
  - the individual
  lexicon: HALOT
  rationale: Though literally 'soul/self,' in legal material נֶפֶשׁ commonly refers to the person as a whole. 'Person' is natural modern English and preserves the juridical sense better than 'soul.'
- source_word: תַּעֲשֶׂה
  chosen: acts
  alternatives:
  - does
  - commits
  lexicon: HALOT
  rationale: עשה is broad ('do/make'). In this context of presumptuous wrongdoing, 'acts' idiomatically carries the sense without over-specifying the offense.
- source_word: בְּיָד רָמָה
  chosen: with a high hand
  alternatives:
  - presumptuously
  - defiantly
  - with uplifted hand
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'with a high hand' and conveys open, defiant presumption. Retaining the idiom in English preserves the vividness and legal-theological force; a footnote preserves the more interpretive alternatives.
- source_word: הָאֶזְרָח
  chosen: native-born
  alternatives:
  - native
  - citizen
  lexicon: HALOT
  rationale: Refers to an Israelite native of the land/community. 'Native-born' is clear and fits the legal contrast with גֵּר.
- source_word: הַגֵּר
  chosen: a sojourner
  alternatives:
  - resident foreigner
  - alien
  - foreigner
  lexicon: HALOT
  rationale: גֵּר denotes a non-native residing among Israel under its protection/law. 'Sojourner' is a standard biblical rendering that preserves covenantal and legal nuance better than the more modern but flatter 'foreigner.'
- source_word: אֶת־יְהוָה הוּא מְגַדֵּף
  chosen: is blaspheming the LORD
  alternatives:
  - reviles the LORD
  - defies the LORD
  lexicon: HALOT
  rationale: גדף denotes speaking or acting in contempt against God; 'blaspheming' best captures the gravity of the offense in English. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: וְנִכְרְתָה
  chosen: shall be cut off
  alternatives:
  - must be cut off
  - shall be removed
  lexicon: HALOT
  rationale: כרת in Niphal in covenant/legal contexts is the standard formula for severe exclusion/judgment. 'Shall be cut off' preserves the established legal idiom without prematurely resolving whether the penalty is death, excommunication, or divine judgment.
- source_word: מִקֶּרֶב עַמָּהּ
  chosen: from among his people
  alternatives:
  - from the midst of his people
  - from among her people
  lexicon: HALOT
  rationale: The phrase denotes removal from the covenant community. Although the suffix on 'people' is formally feminine agreeing with נֶפֶשׁ, English naturally uses representative 'his' with 'person' here; the sense is communal exclusion.
