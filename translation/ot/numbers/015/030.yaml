theological_decisions:
- issue: Nature of the offense and penalty
  chosen_reading: The verse describes open, defiant sin against the LORD and states the offender will be 'cut off' without specifying in translation whether this is human execution, excommunication, or direct divine judgment.
  alternative_readings:
  - The offense is specifically 'presumptuous sin'
  - '''Cut off'' here means execution'
  - '''Cut off'' here means expulsion from the community'
  rationale: The Hebrew idiom and legal formula are weighty but not fully unpacked in the verse itself. To preserve theological tension rather than resolve it, the translation keeps the idiomatic language and avoids importing a narrower doctrinal or juridical interpretation than the text states.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
