theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines explicitly assign 'the LORD' as the default
    rendering for YHWH. This preserves established reverential convention without
    obscuring that the covenant name is in view.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Covenant formula לִהְיוֹת לָכֶם לֵאלֹהִים
  chosen_reading: to be your God
  alternative_readings:
  - to be God to you
  rationale: The phrase expresses covenant relationship rather than merely abstract
    deity. 'To be your God' preserves that theological force in clear modern English.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    theological weight without archaic phrasing'
