id: NUM.15.41
reference: Numbers 15:41
source:
  edition: WLC
  text: אֲנִ֞י יְהוָ֣ה אֱלֹֽהֵי/כֶ֗ם אֲשֶׁ֨ר הוֹצֵ֤אתִי אֶתְ/כֶם֙ מֵ/אֶ֣רֶץ מִצְרַ֔יִם
    לִ/הְי֥וֹת לָ/כֶ֖ם לֵ/אלֹהִ֑ים אֲנִ֖י יְהוָ֥ה אֱלֹהֵי/כֶֽם׃פ
translation:
  text: I am the LORD your God, who brought you out of the land of Egypt to be your
    God. I am the LORD your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to be God to you.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: Though morphologically plural in form, אֱלֹהִים with a singular referent
    and possessive suffix regularly denotes the one God of Israel; 'your God' reflects
    the covenantal singular sense in context.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  - which
  lexicon: HALOT
  rationale: A personal relative pronoun fits the antecedent 'the LORD your God' better
    in natural English than 'that' or 'which'.
- source_word: הוֹצֵאתִי
  chosen: brought ... out
  alternatives:
  - led ... out
  - caused ... to come out
  lexicon: HALOT
  rationale: 'From יצא in the Hiphil, the sense is causative: ''bring out.'' This
    is the standard exodus formula and is best rendered idiomatically as ''brought
    you out.'''
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: out of the land of Egypt
  alternatives:
  - from Egypt
  - out of Egypt
  lexicon: HALOT
  rationale: Including 'the land of' preserves the Hebrew wording and the formal covenantal
    cadence of the exodus formula.
- source_word: לִהְיוֹת לָכֶם לֵאלֹהִים
  chosen: to be your God
  alternatives:
  - to become God for you
  - to be God to you
  lexicon: HALOT
  rationale: This infinitive construction expresses covenant purpose/result. 'To be
    your God' is idiomatic English and preserves the relational covenant formula without
    awkwardness.
- source_word: אֲנִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: The verbless Hebrew clause requires an English copula. 'I am' gives a
    natural and emphatic rendering in both occurrences.
