id: NUM.15.10
reference: Numbers 15:10
source:
  edition: WLC
  text: וְ/יַ֛יִן תַּקְרִ֥יב לַ/נֶּ֖סֶךְ חֲצִ֣י הַ/הִ֑ין אִשֵּׁ֥ה רֵֽיחַ נִיחֹ֖חַ
    לַ/יהוָֽה־׃
translation:
  text: And you shall present wine for the drink offering, half a hin, a food offering,
    a pleasing aroma to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering by fire' or 'a fire offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יַיִן
  chosen: And ... wine
  alternatives:
  - and wine
  - and as for wine
  lexicon: HALOT
  rationale: יַיִן straightforwardly means 'wine.' The prefixed conjunction is carried
    as 'And.' English word order shifts slightly to fit the verbal clause naturally.
- source_word: תַּקְרִיב
  chosen: you shall present
  alternatives:
  - you shall bring near
  - you shall offer
  lexicon: HALOT
  rationale: Hiphil of קרב commonly means to bring/present an offering. 'Present'
    preserves sacrificial nuance without sounding overly wooden; 'offer' is possible,
    but 'present' avoids redundancy with the following offering terms.
- source_word: לַ/נֶּסֶךְ
  chosen: for the drink offering
  alternatives:
  - as a libation
  - for a libation
  lexicon: HALOT
  rationale: נֶסֶךְ denotes the poured liquid offering accompanying sacrifice. 'Drink
    offering' is the clearest established English equivalent; 'libation' is accurate
    but less accessible.
- source_word: חֲצִי הַ/הִין
  chosen: half a hin
  alternatives:
  - a half hin
  lexicon: HALOT
  rationale: The phrase gives the quantity of the drink offering. Retaining 'hin'
    preserves the ancient unit rather than approximating it in modern measure.
- source_word: אִשֵּׁה
  chosen: a food offering
  alternatives:
  - an offering by fire
  - a fire offering
  lexicon: HALOT
  rationale: Though traditionally rendered 'offering made by fire,' the term in priestly
    texts can function more broadly for a food offering presented to God. 'Food offering'
    is more natural in modern English and fits the collocation here, while the fire-associated
    traditional rendering is preserved as an alternative.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet-smelling aroma
  lexicon: HALOT
  rationale: This fixed sacrificial expression describes the acceptability of the
    offering before God. 'Pleasing aroma' is idiomatic modern English and avoids implying
    that God is literally soothed by smell alone.
- source_word: לַ/יהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition can be represented
    as 'to' or 'for'; 'to the LORD' fits the offering language and keeps the directionality
    of presentation.
