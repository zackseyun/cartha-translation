theological_decisions:
- issue: Rendering of יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the divine name, preserving
    reverential convention and consistency with the translation's doctrine guidelines.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of אִשֵּׁה
  chosen_reading: food offering
  alternative_readings:
  - offering by fire
  - fire offering
  rationale: The verse uses priestly sacrificial terminology. 'Food offering' reflects
    the likely functional sense in context and aligns with readable modern English,
    while preserving the traditional fire-related rendering as a lexical alternative
    rather than making a theological claim about the mechanics of sacrifice.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
