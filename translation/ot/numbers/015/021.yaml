id: NUM.15.21
reference: Numbers 15:21
source:
  edition: WLC
  text: מֵ/רֵאשִׁית֙ עֲרִסֹ֣תֵי/כֶ֔ם תִּתְּנ֥וּ לַ/יהוָ֖ה תְּרוּמָ֑ה לְ/דֹרֹ֖תֵי/כֶֽם׃ס
translation:
  text: From the first of your dough you shall give to the LORD a contribution throughout
    your generations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your kneading bowls'; the Hebrew term can refer to dough or, by association,
      the kneading vessel.
    reason: lexical_alternative
  - marker: b
    text: Or 'an offering' or traditionally 'a heave offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵרֵאשִׁית
  chosen: From the first of
  alternatives:
  - From the beginning of
  - As firstfruits of
  lexicon: HALOT
  rationale: רֵאשִׁית denotes the first or beginning portion. In this cultic context
    it refers to the initial portion taken from the dough, not a temporal 'beginning'
    in the abstract. 'From the first of' preserves the partitive sense with natural
    English.
- source_word: עֲרִסֹתֵיכֶם
  chosen: your dough
  alternatives:
  - your kneading bowls
  - your dough batches
  lexicon: HALOT
  rationale: עֲרִסָה can denote dough or kneading trough/bowl by metonymy. Here, because
    the offering is a portion presented to the LORD, 'your dough' best captures the
    substance from which the contribution is taken, matching the immediate ritual
    sense better than the container.
- source_word: תִּתְּנוּ
  chosen: you shall give
  alternatives:
  - you shall present
  - you shall offer
  lexicon: HALOT
  rationale: נתן is the common verb 'give.' While sacrificial context could justify
    'present' or 'offer,' the Hebrew itself is straightforward, and 'give' preserves
    the directness of the command.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated,
    following the stated default and established covenantal convention.
- source_word: תְּרוּמָה
  chosen: a contribution
  alternatives:
  - an offering
  - a heave offering
  lexicon: HALOT
  rationale: תְּרוּמָה is a lifted-off contribution set apart for the LORD/priestly
    use. 'Contribution' is clear modern English and avoids the overly technical 'heave
    offering,' while remaining more specific than the broad 'offering.'
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - through your generations
  lexicon: HALOT
  rationale: The phrase marks an enduring obligation across successive generations.
    'Throughout your generations' is idiomatic English for the covenantal duration
    formula.
