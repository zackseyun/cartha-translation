id: NUM.15.9
reference: Numbers 15:9
source:
  edition: WLC
  text: וְ/הִקְרִ֤יב עַל בֶּן הַ/בָּקָר֙ מִנְחָ֔ה סֹ֖לֶת שְׁלֹשָׁ֣ה עֶשְׂרֹנִ֑ים בָּל֥וּל
    בַּ/שֶּׁ֖מֶן חֲצִ֥י הַ/הִֽין־־׃
translation:
  text: then he shall present with the bull a grain offering of fine flour, three-tenths
    of an ephah, mixed with half a hin of oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'three tenths'; in this sacrificial context the measure is understood
      as three-tenths of an ephah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  chosen: then he shall present
  alternatives:
  - and he shall present
  - then he shall offer
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial context means to bring near/present/offer.
    'Present' is natural English for bringing an offering, while 'then' reflects the
    conjunctive waw in procedural sequence.
- source_word: עַל
  chosen: with
  alternatives:
  - for
  - upon
  - along with
  lexicon: HALOT
  rationale: In this sacrificial instruction, עַל before the animal indicates accompaniment
    or addition to it rather than spatial 'upon.' 'With' best conveys that the grain
    offering accompanies the bull offering.
- source_word: בֶּן הַבָּקָר
  chosen: the bull
  alternatives:
  - a bull from the herd
  - the young bull
  lexicon: HALOT
  rationale: Literally 'son of the herd/cattle,' an idiom for a bovine animal suitable
    for sacrifice. In context, 'bull' is the clearest concise rendering. The article
    supports a definite/generic procedural sense.
- source_word: מִנְחָה
  chosen: a grain offering
  alternatives:
  - an offering
  - a tribute offering
  lexicon: HALOT
  rationale: In priestly sacrificial legislation, מִנְחָה specifically denotes the
    cereal/grain offering rather than a generic gift. 'Grain offering' preserves cultic
    specificity in accessible English.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  lexicon: HALOT
  rationale: Standard rendering for the refined flour used in offerings; both accurate
    and idiomatic.
- source_word: שְׁלֹשָׁה עֶשְׂרֹנִים
  chosen: three-tenths of an ephah
  alternatives:
  - three tenth-parts
  - three omers
  lexicon: HALOT
  rationale: Literally 'three tenths.' In offering measurements this elliptical expression
    means three-tenths of an ephah. Supplying 'of an ephah' makes the measure intelligible
    in English and matches the cultic idiom.
- source_word: בָּלוּל
  chosen: mixed
  alternatives:
  - mingled
  - blended
  lexicon: HALOT
  rationale: Describes the flour as combined with oil. 'Mixed' is straightforward
    modern English.
- source_word: בַּשֶּׁמֶן
  chosen: with oil
  alternatives:
  - in oil
  lexicon: HALOT
  rationale: The preposition with the passive participle indicates the substance used
    in mixing. English idiom prefers 'mixed with oil.'
- source_word: חֲצִי הַהִין
  chosen: half a hin
  alternatives:
  - a half-hin
  lexicon: HALOT
  rationale: Retains the ancient liquid measure by transliteration rather than speculative
    conversion, preserving source-text specificity.
