id: NUM.15.6
reference: Numbers 15:6
source:
  edition: WLC
  text: א֤וֹ לָ/אַ֨יִל֙ תַּעֲשֶׂ֣ה מִנְחָ֔ה סֹ֖לֶת שְׁנֵ֣י עֶשְׂרֹנִ֑ים בְּלוּלָ֥ה
    בַ/שֶּׁ֖מֶן שְׁלִשִׁ֥ית הַ/הִֽין׃
translation:
  text: Or for a ram you shall prepare a grain offering of fine flour, two-tenths,
    mixed with a third of a hin of oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally 'two tenths,' with the larger unit understood from the
      sacrificial measurement system; compare the fuller expression elsewhere as 'two-tenths
      of an ephah.'
    reason: cultural_note
lexical_decisions:
- source_word: א֤וֹ
  chosen: Or
  alternatives:
  - And if
  - Or if
  lexicon: HALOT
  rationale: Simple disjunctive/conjunctive particle linking this instruction to the
    preceding sacrificial cases. 'Or' best preserves the sequence of alternatives
    without adding conditional wording not explicit in the Hebrew.
- source_word: לָ/אַ֨יִל֙
  chosen: for a ram
  alternatives:
  - for the ram
  lexicon: HALOT
  rationale: 'אַיִל denotes a ram. The prefixed ל marks relation/purpose here, naturally
    rendered ''for.'' Although the noun has the article by pointing, English idiom
    in procedural instruction is better as indefinite: ''for a ram.'''
- source_word: תַּעֲשֶׂ֣ה
  chosen: you shall prepare
  alternatives:
  - you shall make
  - you shall do
  lexicon: HALOT
  rationale: עשה is broad ('do/make'), but in sacrificial-preparation context 'prepare'
    communicates the required action idiomatically while remaining faithful to the
    procedural sense.
- source_word: מִנְחָ֔ה
  chosen: a grain offering
  alternatives:
  - an offering
  - a tribute offering
  lexicon: HALOT
  rationale: In priestly sacrificial context, מִנְחָה refers specifically to the cereal/grain
    offering rather than a generic gift. 'Grain offering' is the clearest established
    English equivalent here.
- source_word: סֹ֖לֶת
  chosen: of fine flour
  alternatives:
  - choice flour
  - fine wheat flour
  lexicon: HALOT
  rationale: סֹלֶת denotes fine flour, the standard material of this offering. 'Of
    fine flour' naturally complements 'grain offering' in English.
- source_word: שְׁנֵ֣י עֶשְׂרֹנִ֑ים
  chosen: two-tenths
  alternatives:
  - two tenth-parts
  - two omers?
  lexicon: HALOT
  rationale: Literally 'two tenths' (of an ephah, understood from sacrificial measurement
    usage). English versions often leave the ellipsis as 'two-tenths.' Supplying 'of
    an ephah' would clarify but adds words not present in this verse; the compact
    form preserves the Hebrew economy.
- source_word: בְּלוּלָ֥ה
  chosen: mixed
  alternatives:
  - mingled
  - blended
  lexicon: HALOT
  rationale: Passive participle describing the flour as mixed with oil. 'Mixed' is
    clear modern English and fits the ritual instruction.
- source_word: בַ/שֶּׁ֖מֶן
  chosen: with oil
  alternatives:
  - in oil
  lexicon: HALOT
  rationale: 'The preposition with בלל in this construction is best rendered instrumentally/associatively:
    the flour is mixed ''with oil.'''
- source_word: שְׁלִשִׁ֥ית הַ/הִֽין
  chosen: a third of a hin
  alternatives:
  - the third part of a hin
  lexicon: HALOT
  rationale: This is a fractional measure. 'A third of a hin' is idiomatic modern
    English while preserving the ancient unit rather than converting it.
