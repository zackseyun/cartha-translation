theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines explicitly set 'the LORD' as the default rendering
    for YHWH. This preserves reverential convention and aligns with the translation's
    stated policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of רֵיחַ נִיחֹחַ in sacrificial language
  chosen_reading: as a pleasing aroma
  alternative_readings:
  - a soothing aroma
  - a sweet-smelling aroma
  rationale: The phrase is rendered in a way that preserves sacrificial acceptability
    language without over-literalizing the anthropomorphic imagery or importing additional
    theological claims.
  doctrine_reference: DOCTRINE.md Translation philosophy §6 (readable modern English,
    not archaic or academic)
