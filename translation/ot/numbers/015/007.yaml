id: NUM.15.7
reference: Numbers 15:7
source:
  edition: WLC
  text: וְ/יַ֥יִן לַ/נֶּ֖סֶךְ שְׁלִשִׁ֣ית הַ/הִ֑ין תַּקְרִ֥יב רֵֽיחַ נִיחֹ֖חַ לַ/יהוָֽה־׃
translation:
  text: and wine for the drink offering, a third of a hin, you shall present as a
    pleasing aroma to the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “as a libation”; the Hebrew term refers to a poured drink offering accompanying
      the sacrifice.
    reason: lexical_alternative
  - marker: b
    text: A hin was an ancient liquid measure.
    reason: cultural_note
  - marker: c
    text: Or “a soothing aroma” or “a sweet-smelling aroma.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יַיִן
  chosen: and wine
  alternatives:
  - and [with] wine
  lexicon: HALOT
  rationale: יַיִן is the standard term for 'wine.' The prefixed conjunction links
    this clause to the preceding sacrificial instructions, so 'and wine' is the natural
    English rendering.
- source_word: לַ/נֶּסֶךְ
  chosen: for the drink offering
  alternatives:
  - as a libation
  - for a libation
  lexicon: HALOT
  rationale: נֶסֶךְ denotes a poured liquid offering accompanying a sacrifice. 'Drink
    offering' is the clearest established English equivalent; 'libation' is possible
    but less accessible for modern readers.
- source_word: שְׁלִשִׁית הַ/הִין
  chosen: a third of a hin
  alternatives:
  - one-third of a hin
  lexicon: HALOT
  rationale: The phrase specifies the quantity of the drink offering. Retaining 'hin'
    preserves the ancient unit rather than approximating it, which best reflects the
    source text.
- source_word: תַּקְרִיב
  chosen: you shall present
  alternatives:
  - you shall offer
  - you shall bring near
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial contexts commonly means 'present/offer.'
    'Present' fits the cultic setting while remaining readable; 'bring near' is more
    formally literal but less idiomatic in English.
- source_word: רֵיחַ נִיחֹחַ
  chosen: as a pleasing aroma
  alternatives:
  - a soothing aroma
  - a sweet-smelling aroma
  lexicon: HALOT
  rationale: This fixed sacrificial expression describes the offering as acceptable
    to God. 'Pleasing aroma' is idiomatic and widely understood without implying that
    God literally smells in a merely anthropomorphic sense. The prepositionless phrase
    is rendered adverbially with 'as' to make smooth English.
- source_word: לַ/יהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD,' following
    longstanding reverential convention and the stated translation policy.
