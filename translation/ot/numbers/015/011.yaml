id: NUM.15.11
reference: Numbers 15:11
source:
  edition: WLC
  text: כָּ֣כָה יֵעָשֶׂ֗ה לַ/שּׁוֹר֙ הָֽ/אֶחָ֔ד א֖וֹ לָ/אַ֣יִל הָ/אֶחָ֑ד אֽוֹ לַ/שֶּׂ֥ה
    בַ/כְּבָשִׂ֖ים א֥וֹ בָ/עִזִּֽים־׃
translation:
  text: Thus it shall be done for the one bull, or for the one ram, or for the lamb
    among the sheep or among the goats.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שֶׂה can refer more broadly to a head of small livestock, not only
      a lamb; the following phrase specifies one from the sheep or from the goats.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּכָה
  chosen: Thus
  alternatives:
  - So
  - In this way
  lexicon: HALOT
  rationale: Adverb introducing the prescribed manner. 'Thus' is concise and suitably
    formal in legal/instructional context.
- source_word: יֵעָשֶׂה
  chosen: it shall be done
  alternatives:
  - it is to be done
  - it shall be prepared
  lexicon: HALOT
  rationale: Nifal imperfect of עשה expresses passive/impersonal instruction. 'It
    shall be done' preserves the legal-prescriptive force without over-specifying
    the object.
- source_word: לַשּׁוֹר הָאֶחָד
  chosen: for the one bull
  alternatives:
  - for each bull
  - for one bull
  lexicon: HALOT
  rationale: Definite article plus 'one' points to each individual animal in the prescribed
    case. 'The one bull' is wooden in English; 'for the one bull' preserves singular
    specificity while remaining readable.
- source_word: אַיִל
  chosen: ram
  lexicon: HALOT
  rationale: Standard rendering for the male sheep specified here.
- source_word: הָאֶחָד
  chosen: the one
  alternatives:
  - one
  - each
  lexicon: HALOT
  rationale: Repeated numeral emphasizes singular application of the rule to each
    animal offering. Retained in English as 'the one' in coordination with the previous
    phrase.
- source_word: שֶּׂה
  chosen: lamb
  alternatives:
  - head of small livestock
  - one of the flock
  lexicon: HALOT
  rationale: Though שׂה can denote a member of small livestock more broadly, the following
    qualifiers 'among the sheep or among the goats' narrow the category. 'Lamb' is
    a natural English rendering here, with the species distinction then specified
    by the following phrases.
- source_word: בַכְּבָשִׂים
  chosen: among the sheep
  alternatives:
  - from the sheep
  lexicon: HALOT
  rationale: 'The preposition ב here marks class/category: the animal is one belonging
    to the sheep. ''Among the sheep'' communicates membership in that group.'
- source_word: בָעִזִּים
  chosen: among the goats
  alternatives:
  - from the goats
  lexicon: HALOT
  rationale: Parallel to 'among the sheep'; indicates the goat category of small livestock.
- source_word: אוֹ ... אוֹ ... אוֹ ... אוֹ
  chosen: or ... or ... or ... or
  lexicon: HALOT
  rationale: The repeated disjunctive structure should be preserved to reflect the
    list of alternative sacrificial animals.
