theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to render חַטָּאת as moral 'sin' or sacrificial 'sin offering'
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: In this syntax the term is something the people bring before the LORD,
    so the sacrificial referent is demanded by context. The alternative 'purification
    offering' is lexically defensible and worth preserving in a footnote because of
    ongoing scholarly discussion.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms,
    or documented exception)
