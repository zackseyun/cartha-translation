id: NUM.15.25
reference: Numbers 15:25
source:
  edition: WLC
  text: וְ/כִפֶּ֣ר הַ/כֹּהֵ֗ן עַֽל כָּל עֲדַ֛ת בְּנֵ֥י יִשְׂרָאֵ֖ל וְ/נִסְלַ֣ח לָ/הֶ֑ם
    כִּֽי שְׁגָגָ֣ה הִ֔וא וְ/הֵם֩ הֵבִ֨יאוּ אֶת קָרְבָּנָ֜/ם אִשֶּׁ֣ה לַֽ/יהוָ֗ה וְ/חַטָּאתָ֛/ם
    לִ/פְנֵ֥י יְהוָ֖ה עַל שִׁגְגָתָֽ/ם־־־־־׃
translation:
  text: And the priest shall make atonement for all the congregation of the sons of
    Israel, and they shall be forgiven, because it was an unintentional error; and
    they have brought their offering, a food offering to the LORD, and their sin offering
    before the LORD, for their unintentional error.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an offering by fire to the LORD.' The Hebrew term can emphasize an offering
      made by fire; 'food offering' is a common contextual rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'their purification offering.' The Hebrew term often rendered 'sin offering'
      can also be understood as an offering for purification in sacrificial contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִפֶּר
  chosen: shall make atonement
  alternatives:
  - shall atone
  - shall purge
  lexicon: HALOT
  rationale: Piel of כפר in sacrificial context regularly denotes effecting atonement.
    'Make atonement' is clear modern English and preserves the cultic/theological
    force better than the shorter 'atone' for many readers.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun; singular representative
    priest acts on behalf of the community.
- source_word: עַל כָּל עֲדַת בְּנֵי יִשְׂרָאֵל
  chosen: for all the congregation of the sons of Israel
  alternatives:
  - for all the congregation of the people of Israel
  - for the whole community of the Israelites
  lexicon: HALOT
  rationale: עַל after כפר is idiomatically 'for/on behalf of.' עֲדָה is 'congregation/community.'
    בְּנֵי יִשְׂרָאֵל is formally 'sons of Israel'; retained here to stay gender-accurate
    to the source while still natural enough in context.
- source_word: וְנִסְלַח לָהֶם
  chosen: and they shall be forgiven
  alternatives:
  - and it shall be forgiven them
  lexicon: HALOT
  rationale: Passive Niphal of סלח with plural pronominal complement is most naturally
    rendered with the people as subject in English. This preserves the result of divine
    forgiveness without adding an explicit subject not stated in Hebrew.
- source_word: כִּי שְׁגָגָה הִוא
  chosen: because it was an unintentional error
  alternatives:
  - for it was a mistake
  - because it was done unintentionally
  lexicon: HALOT
  rationale: שְׁגָגָה denotes inadvertence/unintentional sin or error. 'Unintentional
    error' preserves both the moral and accidental dimensions in this sacrificial
    law context.
- source_word: וְהֵם הֵבִיאוּ
  chosen: and they have brought
  alternatives:
  - and they brought
  lexicon: HALOT
  rationale: 'The perfect can be rendered as present perfect in English to show completed
    action relevant to the present legal result. This fits the sequence: because the
    offense was inadvertent and because they have presented the required offerings.'
- source_word: אֶת קָרְבָּנָם
  chosen: their offering
  alternatives:
  - their gift offering
  - their presentation
  lexicon: HALOT
  rationale: קָרְבָּן is the general term for an offering brought near to God. 'Offering'
    is the standard and clearest rendering.
- source_word: אִשֶּׁה לַיהוָה
  chosen: a food offering to the LORD
  alternatives:
  - an offering by fire to the LORD
  - a fire offering to the LORD
  lexicon: HALOT
  rationale: אִשֶּׁה traditionally rendered 'offering by fire.' Many modern translations
    use 'food offering,' reflecting the sacrificial gift terminology and avoiding
    over-specifying combustion as the sole nuance. This remains readable while preserving
    cultic sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: וְחַטָּאתָם
  chosen: and their sin offering
  alternatives:
  - and their purification offering
  lexicon: HALOT
  rationale: חַטָּאת in sacrificial contexts can denote either 'sin' or the offering
    dealing with sin/purification. Here, because it is something brought before the
    LORD alongside קָרְבָּנָם, the sacrificial sense 'sin offering' is required. 'Purification
    offering' is a viable scholarly alternative but less familiar.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard idiom for cultic presentation in God's presence.
- source_word: עַל שִׁגְגָתָם
  chosen: for their unintentional error
  alternatives:
  - because of their inadvertent sin
  - for their mistake
  lexicon: HALOT
  rationale: Repetition of the same root as earlier in the verse should be reflected
    consistently in English. 'For their unintentional error' preserves the legal-sacrificial
    rationale of the offering.
