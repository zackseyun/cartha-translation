id: NUM.15.17
reference: Numbers 15:17
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: And Yahweh spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive + דבר introduces a new narrative speech event. 'Spoke' is the standard and slightly more formal rendering for דבר in divine-address formulas, while 'said' is possible but less precise in this recurring construction.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech. 'To' is the natural modern English equivalent; 'unto' is archaic.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention, in keeping with the translation philosophy to transliterate names.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: This infinitive construct regularly introduces the content of speech after a speech verb. 'Saying' preserves the Hebrew discourse formula naturally in English and signals that the following verse contains the spoken content.
