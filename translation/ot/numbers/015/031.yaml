theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Meaning of 'cut off' in covenant law
  chosen_reading: Retain the idiom 'cut off' without specifying whether it means death, childlessness, or expulsion
  alternative_readings:
  - executed
  - excluded from the community
  rationale: The Hebrew כרת in Niphal here carries covenantal-judicial force, but the precise mechanism is not stated in this verse. Preserving the idiom maintains the text's theological tension rather than resolving a debated legal interpretation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
