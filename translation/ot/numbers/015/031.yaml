id: NUM.15.31
reference: Numbers 15:31
source:
  edition: WLC
  text: כִּ֤י דְבַר יְהוָה֙ בָּזָ֔ה וְ/אֶת מִצְוָת֖/וֹ הֵפַ֑ר הִכָּרֵ֧ת תִּכָּרֵ֛ת הַ/נֶּ֥פֶשׁ הַ/הִ֖וא עֲוֺנָ֥/ה בָֽ/הּ־־׀׃פ
translation:
  text: Because he has despised the word of Yahweh and has broken his commandment, that person shall surely be cut off; his guilt shall be on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For he has despised the word of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: '''That person shall surely be cut off'' preserves the Hebrew idiom; the exact form of the judgment is not specified here.'
    reason: cultural_note
  - marker: c
    text: Or 'his iniquity is upon him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  lexicon: HALOT
  rationale: Introduces the reason for the preceding judgment. 'Because' makes the causal force clear in modern English.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the matter of the LORD
  lexicon: HALOT
  rationale: דבר commonly means 'word' or 'matter'; here in covenantal context it refers to the LORD's spoken command/revelation. YHWH is rendered 'the LORD' per doctrine.
- source_word: בָּזָה
  chosen: has despised
  alternatives:
  - has treated with contempt
  - has scorned
  lexicon: HALOT
  rationale: Conveys active contempt rather than mere neglect. Present perfect in English fits the Hebrew perfect in this explanatory clause.
- source_word: מִצְוָתוֹ
  chosen: his commandment
  alternatives:
  - his command
  - his commandment
  lexicon: HALOT
  rationale: Singular is retained because the Hebrew is singular. 'Commandment' preserves covenantal and legal weight better than the lighter 'command'.
- source_word: הֵפַר
  chosen: has broken
  alternatives:
  - has violated
  - has annulled
  lexicon: HALOT
  rationale: In context of a divine command, 'broken' is idiomatic and clear. 'Annulled' is possible lexically but sounds too technical here.
- source_word: הִכָּרֵת תִּכָּרֵת
  chosen: shall surely be cut off
  alternatives:
  - shall certainly be cut off
  - shall be utterly cut off
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verb. 'Shall surely be cut off' preserves both the solemnity and the traditional covenantal idiom.
- source_word: הַנֶּפֶשׁ הַהִוא
  chosen: that person
  alternatives:
  - that soul
  - that life
  lexicon: HALOT
  rationale: Although נֶפֶשׁ is literally 'soul' or 'life,' in legal contexts it often refers to the individual person. 'That person' is natural English and avoids misleading anthropological overtones.
- source_word: עֲוֺנָהּ בָּהּ
  chosen: his guilt is on him
  alternatives:
  - his iniquity is upon him
  - his guilt remains on him
  lexicon: HALOT
  rationale: The phrase indicates liability for guilt resting on the offender. Because the referent is an individual offender, 'his guilt is on him' is idiomatic and preserves the judicial sense. 'Iniquity' is possible but less accessible in modern English.
