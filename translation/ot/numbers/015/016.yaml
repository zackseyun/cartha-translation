id: NUM.15.16
reference: Numbers 15:16
source:
  edition: WLC
  text: תּוֹרָ֥ה אַחַ֛ת וּ/מִשְׁפָּ֥ט אֶחָ֖ד יִהְיֶ֣ה לָ/כֶ֑ם וְ/לַ/גֵּ֖ר הַ/גָּ֥ר
    אִתְּ/כֶֽם׃פ
translation:
  text: One law and one ordinance shall be for you and for the sojourner who sojourns
    with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'resident foreigner.' The Hebrew גֵּר refers to a non-native living among
      Israel under its communal order.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרָה
  chosen: law
  alternatives:
  - instruction
  lexicon: HALOT
  rationale: In this legal context, תּוֹרָה refers to a binding legal directive rather
    than general teaching, so 'law' best fits the immediate sense. 'Instruction' is
    a broader possible gloss but is less natural here alongside מִשְׁפָּט.
- source_word: מִשְׁפָּט
  chosen: ordinance
  alternatives:
  - judgment
  - rule
  - legal standard
  lexicon: HALOT
  rationale: The term denotes a legal ruling or prescribed norm. 'Ordinance' preserves
    the juridical sense and distinguishes it from תּוֹרָה without overtranslating.
    'Judgment' could mislead modern readers toward a court verdict rather than an
    established legal requirement.
- source_word: אַחַת / אֶחָד
  chosen: one
  alternatives:
  - same
  lexicon: HALOT
  rationale: The repeated numeral emphasizes singularity and equality of standard.
    'One' preserves the Hebrew repetition directly; 'same' is interpretive and less
    formally transparent.
- source_word: יִהְיֶה
  chosen: shall be
  alternatives:
  - will be
  - is to be
  lexicon: HALOT
  rationale: The imperfect here expresses a legal prescription. 'Shall be' communicates
    normative force in English legal style better than the merely predictive 'will
    be'.
- source_word: גֵּר
  chosen: sojourner
  alternatives:
  - resident foreigner
  - alien
  - foreigner
  lexicon: HALOT
  rationale: גֵּר refers to a non-native residing among Israel under its communal
    order. 'Sojourner' is a well-established and relatively transparent rendering
    that avoids the harsh or misleading connotations of 'alien' and the over-specificity
    of 'resident foreigner' in the main text.
- source_word: הַגָּר
  chosen: who sojourns
  alternatives:
  - who resides
  - dwelling
  lexicon: HALOT
  rationale: 'The participle echoes the noun גֵּר and is best represented by a cognate
    expression in English to preserve the Hebrew wordplay and emphasis: the sojourner
    is one ''who sojourns'' among Israel.'
- source_word: אִתְּכֶם
  chosen: with you
  alternatives:
  - among you
  lexicon: HALOT
  rationale: The preposition literally means 'with you.' While 'among you' captures
    the social sense, 'with you' is closer to the Hebrew and remains natural in English.
