theological_decisions:
- issue: Legal equality between native Israelite and resident outsider in cultic law
  chosen_reading: The verse states that the same legal standard applies equally to
    Israel and to the resident sojourner among them.
  alternative_readings:
  - The verse could be read more narrowly as applying only to the immediate sacrificial
    regulations in context.
  rationale: The wording is broad ('one law and one ordinance') but occurs within
    a specific legal section. The translation preserves the broad formulation without
    importing a wider theological program beyond the text itself.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
