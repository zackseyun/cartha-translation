id: NUM.15.4
reference: Numbers 15:4
source:
  edition: WLC
  text: וְ/הִקְרִ֛יב הַ/מַּקְרִ֥יב קָרְבָּנ֖/וֹ לַֽ/יהוָ֑ה מִנְחָה֙ סֹ֣לֶת עִשָּׂר֔וֹן בָּל֕וּל בִּ/רְבִעִ֥ית הַ/הִ֖ין שָֽׁמֶן׃
translation:
  text: then the one who presents his offering to Yahweh shall present a grain offering of fine flour, a tenth of an ephah, mixed with a fourth of a hin of oil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''a tenth''; in this sacrificial context, this denotes a tenth of an ephah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  chosen: then ... shall present
  alternatives:
  - and ... shall bring near
  - and ... shall offer
  lexicon: HALOT
  rationale: The waw plus perfect continues the legal sequence from the previous verse, so 'then' captures the procedural force in idiomatic English. 'Shall present' reflects the sacrificial sense of הקריב without overly wooden 'bring near.'
- source_word: הַמַּקְרִיב
  chosen: the one who presents
  alternatives:
  - he who offers
  - the offerer
  lexicon: HALOT
  rationale: The Hiphil participle identifies the person making the offering. 'The one who presents' is clear modern English and preserves the participial sense better than the more technical 'offerer.'
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his gift
  - his قربan/corban
  lexicon: HALOT
  rationale: קָרְבָּן is the general term for an offering brought near to God. 'Offering' is the standard clear rendering in context.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated. The preposition ל is retained as 'to.'
- source_word: מִנְחָה
  chosen: a grain offering
  alternatives:
  - a tribute offering
  - an offering
  lexicon: HALOT
  rationale: In sacrificial legislation, מִנְחָה commonly denotes the cereal/grain offering. 'Grain offering' is the clearest contextual rendering, though the term can more broadly mean tribute or gift elsewhere.
- source_word: סֹלֶת
  chosen: fine flour
  alternatives:
  - choice flour
  - fine meal
  lexicon: HALOT
  rationale: סֹלֶת refers to high-quality finely milled flour used in offerings. 'Fine flour' is standard and natural English.
- source_word: עִשָּׂרוֹן
  chosen: a tenth of an ephah
  alternatives:
  - a tenth measure
  lexicon: HALOT
  rationale: Literally 'a tenth,' but in cultic measurement this is conventionally shorthand for a tenth of an ephah. Supplying 'of an ephah' makes the measure intelligible in English and matches the established usage in Pentateuchal offering texts.
- source_word: בָּלוּל
  chosen: mixed
  alternatives:
  - mingled
  - blended
  lexicon: HALOT
  rationale: The passive participle describes the flour as combined with oil. 'Mixed' is straightforward modern English.
- source_word: בִּרְבִעִית הַהִין
  chosen: with a fourth of a hin
  alternatives:
  - with a quarter of a hin
  lexicon: HALOT
  rationale: The phrase gives the quantity of oil. 'A fourth of a hin' is a transparent rendering of the ancient measure; retaining 'hin' preserves the source-culture unit.
- source_word: שָׁמֶן
  chosen: oil
  alternatives:
  - olive oil
  lexicon: HALOT
  rationale: While olive oil is likely intended in Israelite sacrificial context, the Hebrew here simply says 'oil,' so the translation should not add specificity beyond the text.
