theological_decisions:
- issue: Sense of holiness language in covenant context
  chosen_reading: Retain 'holy' rather than paraphrasing as merely moral obedience
    or ritual separation.
  alternative_readings:
  - set apart to your God
  - consecrated to your God
  rationale: The verse links remembering and doing the commandments with Israel's
    being 'holy' in relation to God. Rendering קדשים as 'holy' preserves the full
    theological range—ethical, covenantal, and cultic—without collapsing it into one
    dimension.
  doctrine_reference: Translation philosophy §3, §5
