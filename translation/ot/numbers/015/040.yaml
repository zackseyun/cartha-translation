id: NUM.15.40
reference: Numbers 15:40
source:
  edition: WLC
  text: לְמַ֣עַן תִּזְכְּר֔וּ וַ/עֲשִׂיתֶ֖ם אֶת כָּל מִצְוֺתָ֑/י וִ/הְיִיתֶ֥ם קְדֹשִׁ֖ים
    לֵֽ/אלֹהֵי/כֶֽם־־׃
translation:
  text: so that you may remember and do all my commandments, and be holy to your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set apart to your God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - so that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: תִּזְכְּרוּ
  chosen: you may remember
  alternatives:
  - you may recall
  - you will remember
  lexicon: HALOT
  rationale: Qal imperfect 2mp of זכר in a purpose clause is well rendered with modal
    force, 'you may remember.' 'Recall' is possible but 'remember' is the standard
    and more natural covenantal term.
- source_word: וַעֲשִׂיתֶם
  chosen: and do
  alternatives:
  - and keep
  - and perform
  lexicon: HALOT
  rationale: עשה here means to do/carry out the commandments. 'Do' is direct and idiomatic
    with 'commandments'; 'keep' would shift toward שמר language not present here.
- source_word: אֶת כָּל מִצְוֺתָי
  chosen: all my commandments
  alternatives:
  - all my commands
  - all my commandments of mine
  lexicon: HALOT
  rationale: מִצְוֺת is best rendered 'commandments' in covenantal/legal context.
    'Commands' is possible but slightly less formal; 'all' preserves כָּל and the
    1cs suffix is naturally expressed by 'my'.
- source_word: וִהְיִיתֶם
  chosen: and be
  alternatives:
  - and you shall be
  - and become
  lexicon: HALOT
  rationale: היה with following predicate adjective can denote resultant state. In
    English, 'and be holy' reads naturally after the purpose sequence. 'Become' overstates
    a process not explicit in the Hebrew.
- source_word: קְדֹשִׁים
  chosen: holy
  alternatives:
  - set apart
  - consecrated
  lexicon: HALOT
  rationale: קדוש carries the core sense of holiness/set-apartness. 'Holy' is the
    established and theologically weighty rendering; alternatives narrow or paraphrase
    the term.
- source_word: לֵאלֹהֵיכֶם
  chosen: to your God
  alternatives:
  - for your God
  - belonging to your God
  - before your God
  lexicon: HALOT
  rationale: 'The preposition ל here marks relation/reference: holy with respect to
    or unto God. ''To your God'' is a concise, literal-leaning rendering that preserves
    the covenant relationship. ''For your God'' is possible, but ''to'' better reflects
    the Hebrew preposition without overinterpreting.'
