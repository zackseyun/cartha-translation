id: NUM.15.8
reference: Numbers 15:8
source:
  edition: WLC
  text: וְ/כִֽי תַעֲשֶׂ֥ה בֶן בָּקָ֖ר עֹלָ֣ה אוֹ זָ֑בַח לְ/פַלֵּא נֶ֥דֶר אֽוֹ שְׁלָמִ֖ים לַֽ/יהוָֽה־־־־־׃
translation:
  text: And when you prepare a bull as a burnt offering or a sacrifice, to fulfill a vow or as peace offerings to Yahweh,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to perform a vow' or 'to make good on a vow.' The Hebrew idiom refers to carrying out what was vowed.
    reason: lexical_alternative
  - marker: b
    text: Or 'fellowship offerings' or 'offerings of well-being.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִי
  chosen: And when
  alternatives:
  - And if
  - Now when
  lexicon: HALOT
  rationale: In this procedural sacrificial context, כִּי with prefixed וְ introduces a conditional/temporal case. 'And when' reads naturally in English while preserving the forward-moving legal instruction better than a bare 'if.'
- source_word: תַעֲשֶׂה
  chosen: you prepare
  alternatives:
  - you make
  - you offer
  lexicon: HALOT
  rationale: עשה is broadly 'do/make.' In sacrificial instructions, English idiom prefers 'prepare' for the act of presenting or arranging the animal for offering. 'Offer' would be possible but risks importing the cultic act too specifically where the Hebrew remains more general.
- source_word: בֶן בָּקָר
  chosen: a bull
  alternatives:
  - a young bull
  - one of the herd
  lexicon: HALOT
  rationale: The phrase literally means 'son of cattle/herd,' an idiom for a bovine animal from the herd. 'Bull' is the clearest natural rendering here. 'Young bull' is possible in some contexts, but age is not explicit enough here to require it.
- source_word: עֹלָה
  chosen: a burnt offering
  lexicon: HALOT
  rationale: Standard and precise rendering for the whole-burnt sacrifice.
- source_word: אוֹ זָבַח
  chosen: or a sacrifice
  alternatives:
  - or a slaughter offering
  lexicon: HALOT
  rationale: זבח is a broad sacrificial term. 'Sacrifice' is the most natural umbrella term in English and fits the contrast with the more specific 'burnt offering.'
- source_word: לְ/פַלֵּא נֶדֶר
  chosen: to fulfill a vow
  alternatives:
  - to perform a vow
  - to make good on a vow
  lexicon: HALOT
  rationale: The infinitive of פלא here is used in the idiom of carrying out a vowed offering in an exceptional/specified way. 'To fulfill a vow' communicates the sense idiomatically and clearly in English.
- source_word: אוֹ שְׁלָמִים
  chosen: or as peace offerings
  alternatives:
  - or fellowship offerings
  - or offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is traditionally rendered 'peace offerings.' While 'fellowship offerings' or 'offerings of well-being' capture aspects of the term, 'peace offerings' remains concise, recognizable, and faithful, especially in sacrificial legislation.
- source_word: לַ/יהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ל here is naturally expressed as 'to' in the context of offerings presented to God.
