id: NUM.15.38
reference: Numbers 15:38
source:
  edition: WLC
  text: דַּבֵּ֞ר אֶל בְּנֵ֤י יִשְׂרָאֵל֙ וְ/אָמַרְתָּ֣ אֲלֵ/הֶ֔ם וְ/עָשׂ֨וּ לָ/הֶ֥ם
    צִיצִ֛ת עַל כַּנְפֵ֥י בִגְדֵי/הֶ֖ם לְ/דֹרֹתָ֑/ם וְ/נָֽתְנ֛וּ עַל צִיצִ֥ת הַ/כָּנָ֖ף
    פְּתִ֥יל תְּכֵֽלֶת־־־׃
translation:
  text: Speak to the sons of Israel and tell them to make tassels for themselves on
    the corners of their garments throughout their generations, and to put on the
    tassel of each corner a cord of blue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fringes' for 'tassels' (Hebrew צִיצִת).
    reason: lexical_alternative
  - marker: b
    text: The Hebrew word תְּכֵלֶת refers to a blue or blue-purple dye/color used
      in Israel's sacred materials.
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Per translation philosophy, gender-accurate
    language is preferred over flattening to a neutral collective where the Hebrew
    uses a masculine kinship term. 'Israelites' is idiomatic but less transparent
    to the source wording; 'children of Israel' is traditional but less natural in
    modern English.
- source_word: וְעָשׂוּ לָהֶם
  chosen: to make tassels for themselves
  alternatives:
  - that they should make tassels for themselves
  - to make for themselves fringes
  lexicon: HALOT
  rationale: The Hebrew sequence after 'tell them' naturally carries an infinitival
    force in English. 'For themselves' preserves לָהֶם, indicating the tassels are
    to be made/worn by the Israelites.
- source_word: צִיצִת
  chosen: tassels
  alternatives:
  - fringes
  lexicon: HALOT
  rationale: צִיצִת refers to the hanging ornamental/threaded feature attached to
    garments. 'Tassels' is clearer in contemporary English and fits the physical object
    better than the broader 'fringes,' while remaining faithful to the Hebrew.
- source_word: עַל כַּנְפֵי בִגְדֵיהֶם
  chosen: on the corners of their garments
  alternatives:
  - on the edges of their garments
  - on the wings of their garments
  lexicon: HALOT
  rationale: כָּנָף literally means 'wing' but idiomatically denotes an extremity,
    edge, or corner of a garment. 'Corners' is the standard and contextually precise
    rendering here.
- source_word: לְדֹרֹתָם
  chosen: throughout their generations
  alternatives:
  - for their generations
  - from generation to generation
  lexicon: HALOT
  rationale: This phrase marks enduring applicability across successive generations.
    'Throughout their generations' is both natural and formally close.
- source_word: עַל צִיצִת הַכָּנָף
  chosen: on the tassel of each corner
  alternatives:
  - on the tassel of the corner
  - on the fringe at the corner
  lexicon: HALOT
  rationale: 'The singular construction is distributive in context: each garment corner
    has its tassel. Rendering it as ''each corner'' communicates the sense clearly
    in English without obscuring the Hebrew singular.'
- source_word: פְּתִיל
  chosen: a cord
  alternatives:
  - a thread
  - a string
  lexicon: HALOT
  rationale: פְּתִיל denotes a twisted thread or cord. 'Cord' best conveys something
    attached and visible as part of the tassel.
- source_word: תְּכֵלֶת
  chosen: blue
  alternatives:
  - violet
  - blue-purple
  lexicon: HALOT
  rationale: תְּכֵלֶת denotes the well-known blue/purple dye color used in sacred
    contexts. 'Blue' is the most established and accessible rendering in this verse;
    the more specific hue can be preserved in a footnote.
