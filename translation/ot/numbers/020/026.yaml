theological_decisions:
- issue: Death idiom in יֵאָסֵף
  chosen_reading: Retain the idiom as 'will be gathered' rather than interpretively
    expanding it.
  alternative_readings:
  - will be gathered to his people
  - will die
  rationale: The Hebrew uses a conventional death idiom, but this verse does not include
    the fuller phrase 'to his people.' Preserving 'will be gathered' maintains the
    text's theological and literary nuance without importing words from parallel expressions
    or flattening it into mere death.
  doctrine_reference: Preserve theological tension rather than resolve it.
