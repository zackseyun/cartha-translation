id: NUM.20.26
reference: Numbers 20:26
source:
  edition: WLC
  text: וְ/הַפְשֵׁ֤ט אֶֽת אַהֲרֹן֙ אֶת בְּגָדָ֔י/ו וְ/הִלְבַּשְׁתָּ֖/ם אֶת אֶלְעָזָ֣ר
    בְּנ֑/וֹ וְ/אַהֲרֹ֥ן יֵאָסֵ֖ף וּ/מֵ֥ת שָֽׁם־־־׃
translation:
  text: Strip Aaron of his garments and put them on Eleazar his son. Then Aaron will
    be gathered and die there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in context, 'his priestly garments.' The Hebrew says
      simply 'his garments.'
    reason: lexical_alternative
  - marker: b
    text: '''Will be gathered'' is a Hebrew idiom used of death; compare the fuller
      expression ''gathered to his people'' elsewhere.'
    reason: cross_reference
lexical_decisions:
- source_word: וְהַפְשֵׁט
  chosen: Strip
  alternatives:
  - Take off
  - Remove the garments from
  lexicon: HALOT
  rationale: Hiphil imperative of פשט here means to strip or remove clothing from
    someone. 'Strip' is concise and natural in English while preserving the directness
    of the command.
- source_word: אֶת אַהֲרֹן
  chosen: Aaron
  rationale: Direct object marker plus personal name; rendered simply as the object
    of the imperative.
- source_word: בְּגָדָיו
  chosen: his garments
  alternatives:
  - his clothes
  - his priestly garments
  lexicon: HALOT
  rationale: בגד commonly means garment/clothing. 'Garments' fits the formal setting
    and likely priestly vestments in context. 'Priestly garments' is contextually
    true from the surrounding passage but is more explicit than this word alone, so
    it is not placed in the main text.
- source_word: וְהִלְבַּשְׁתָּם
  chosen: put them on
  alternatives:
  - clothe
  - dress
  lexicon: HALOT
  rationale: 'Hiphil perfect with vav in command sequence carries injunctive force:
    cause them to be worn by him. ''Put them on'' clearly expresses transferring the
    garments to Eleazar and preserves the pronominal suffix ''them''.'
- source_word: אֶת אֶלְעָזָר בְּנוֹ
  chosen: Eleazar his son
  alternatives:
  - his son Eleazar
  rationale: Straightforward rendering of the name plus filial relation. Word order
    is adjusted slightly for natural English while preserving meaning.
- source_word: יֵאָסֵף
  chosen: will be gathered
  alternatives:
  - will be gathered to his people
  - will be taken away
  lexicon: HALOT
  rationale: Niphal of אסף in death contexts is a standard idiom for being gathered,
    often implying joining one's people in death. Since 'to his people' is not present
    in this verse, the shorter 'will be gathered' best reflects the Hebrew actually
    stated while preserving the idiomatic expression.
- source_word: וּמֵת
  chosen: and die
  alternatives:
  - and he will die
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this sequence continues the
    future/result sense after the preceding yiqtol. English 'and die' is smooth and
    faithful.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple adverb of place; 'there' is the natural equivalent.
