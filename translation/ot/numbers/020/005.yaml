id: NUM.20.5
reference: Numbers 20:5
source:
  edition: WLC
  text: וְ/לָ/מָ֤ה הֶֽעֱלִיתֻ֨/נוּ֙ מִ/מִּצְרַ֔יִם לְ/הָבִ֣יא אֹתָ֔/נוּ אֶל הַ/מָּק֥וֹם
    הָ/רָ֖ע הַ/זֶּ֑ה לֹ֣א מְק֣וֹם זֶ֗רַע וּ/תְאֵנָ֤ה וְ/גֶ֨פֶן֙ וְ/רִמּ֔וֹן וּ/מַ֥יִם
    אַ֖יִן לִ/שְׁתּֽוֹת־׀׃
translation:
  text: And why have you brought us up out of Egypt to bring us into this evil place?
    It is not a place of seed, or figs, or vines, or pomegranates, and there is no
    water to drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'a place of seed' may mean a place fit for sowing or a place producing
      grain/crops.
    reason: lexical_alternative
  - marker: b
    text: Or 'this bad place' or 'this miserable place'; 'evil' here describes the
      place as harmful or undesirable, not necessarily morally evil.
    reason: lexical_alternative
  - marker: c
    text: Or 'fig trees' and 'grapevines.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָמָה
  chosen: And why
  alternatives:
  - Why
  lexicon: HALOT
  rationale: Interrogative phrase introducing a complaint; retaining the conjunction
    with 'And' reflects the discourse flow of continued grumbling.
- source_word: הֶעֱלִיתֻנוּ
  chosen: have you brought us up
  alternatives:
  - did you bring us up
  - have you led us up
  lexicon: HALOT
  rationale: Hiphil of עלה with 1cp suffix commonly means 'bring up.' 'Brought us
    up' preserves the Exodus idiom of ascent from Egypt; present perfect fits natural
    English complaint.
- source_word: מִמִּצְרַיִם
  chosen: out of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: With 'brought up,' English idiom naturally takes 'out of Egypt,' preserving
    the exodus sense.
- source_word: לְהָבִיא אֹתָנוּ
  chosen: to bring us
  alternatives:
  - to bring us in
  - to lead us
  lexicon: HALOT
  rationale: Infinitive of בוא with object suffix expresses purpose/result. 'To bring
    us' is straightforward and avoids over-specifying 'in' since 'into this place'
    follows.
- source_word: אֶל־הַמָּקוֹם הָרָע הַזֶּה
  chosen: into this evil place
  alternatives:
  - to this bad place
  - into this miserable place
  lexicon: HALOT
  rationale: רַע here describes the place as harmful/unpleasant. 'Evil' is formally
    closer and preserves the strong negative force, though the sense is experiential
    rather than moral.
- source_word: לֹא מְקוֹם זֶרַע
  chosen: It is not a place of seed
  alternatives:
  - It is no place for sowing
  - It is not a place for grain
  lexicon: HALOT
  rationale: The Hebrew is literally 'not a place of seed.' This likely refers to
    agricultural productivity/sowing. The more literal rendering is retained in the
    main text for auditability.
- source_word: וּתְאֵנָה וְגֶפֶן וְרִמּוֹן
  chosen: or figs, or vines, or pomegranates
  alternatives:
  - or fig trees, or grapevines, or pomegranates
  lexicon: HALOT
  rationale: These nouns list desirable produce/plants absent from the land. 'Figs...vines...pomegranates'
    is concise and natural; 'vines' represents גפן adequately in context.
- source_word: וּמַיִם אַיִן לִשְׁתּוֹת
  chosen: and there is no water to drink
  alternatives:
  - and there is no water for drinking
  - and there is not water to drink
  lexicon: HALOT
  rationale: Existential אַיִן plus infinitive expresses lack of drinkable water.
    The chosen rendering is idiomatic and faithful.
