id: NUM.20.2
reference: Numbers 20:2
source:
  edition: WLC
  text: וְ/לֹא הָ֥יָה מַ֖יִם לָ/עֵדָ֑ה וַ/יִּקָּ֣הֲל֔וּ עַל מֹשֶׁ֖ה וְ/עַֽל אַהֲרֹֽן־־־׃
translation:
  text: Now there was no water for the congregation, and they assembled against Moses
    and against Aaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembly' or 'community' for 'congregation.' The Hebrew עֵדָה denotes
      the gathered people of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֹא
  chosen: Now ... no
  alternatives:
  - And ... no
  - But ... no
  lexicon: HALOT
  rationale: The conjunction plus negation introduces the next event in narrative
    sequence. Rendering the conjunction as 'Now' gives natural English discourse flow
    while preserving the simple connective force without overstating contrast.
- source_word: הָיָה
  chosen: there was
  alternatives:
  - there existed
  - was
  lexicon: HALOT
  rationale: Hebrew היה with an indefinite noun commonly expresses existence. 'There
    was' is idiomatic English and preserves the existential sense.
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: The plural form is a standard Hebrew plural of substance; English normally
    uses the mass noun 'water'.
- source_word: לָ/עֵדָה
  chosen: for the congregation
  alternatives:
  - for the community
  - for the assembly
  lexicon: HALOT
  rationale: עֵדָה often denotes the gathered covenant community of Israel. 'Congregation'
    preserves that corporate sense and fits Pentateuchal usage better than the more
    generic 'community.'
- source_word: וַ/יִּקָּהֲלוּ
  chosen: they assembled
  alternatives:
  - they gathered themselves
  - they came together
  lexicon: HALOT
  rationale: From קהל, the verb denotes assembling as a group. 'They assembled' is
    concise, natural, and retains the collective action.
- source_word: עַל
  chosen: against
  alternatives:
  - to
  - before
  - around
  lexicon: HALOT
  rationale: In this complaint context, עַל with persons indicates hostile opposition
    rather than mere location. 'Against' best captures the adversative force shown
    in the following dispute narrative.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: וְ/עַֽל אַהֲרֹן
  chosen: and against Aaron
  alternatives:
  - and to Aaron
  lexicon: HALOT
  rationale: 'The repeated preposition is preserved for emphasis: the assembly''s
    opposition is directed at both leaders individually.'
