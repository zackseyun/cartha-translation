id: NUM.20.29
reference: Numbers 20:29
source:
  edition: WLC
  text: וַ/יִּרְאוּ֙ כָּל הָ֣/עֵדָ֔ה כִּ֥י גָוַ֖ע אַהֲרֹ֑ן וַ/יִּבְכּ֤וּ אֶֽת אַהֲרֹן֙
    שְׁלֹשִׁ֣ים י֔וֹם כֹּ֖ל בֵּ֥ית יִשְׂרָאֵֽל־־׃ס
translation:
  text: When all the congregation saw that Aaron had died, all the house of Israel
    wept for Aaron thirty days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'realized that Aaron had died.' The Hebrew literally says 'saw that Aaron
      had died,' where 'saw' can include recognition of the fact.
    reason: lexical_alternative
  - marker: b
    text: '''All the house of Israel'' is a corporate expression for the entire people
      of Israel.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּרְאוּ
  chosen: saw
  alternatives:
  - realized
  - came to see
  lexicon: HALOT
  rationale: The verb ראה normally means 'see.' In context it can imply recognition
    of Aaron's death, but 'saw' preserves the Hebrew wording while remaining natural
    in English.
- source_word: כָּל הָעֵדָה
  chosen: all the congregation
  alternatives:
  - the whole congregation
  - all the community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled Israelite community. 'Congregation'
    is a standard and suitably formal rendering in Pentateuchal narrative.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content of what the congregation saw/recognized:
    ''that Aaron had died.'''
- source_word: גָוַע
  chosen: had died
  alternatives:
  - had breathed his last
  - had perished
  lexicon: HALOT
  rationale: גוע is a reverent verb for dying/expiring. 'Had died' is clear modern
    English and fits the pluperfect sense after 'saw that.'
- source_word: וַיִּבְכּוּ
  chosen: wept
  alternatives:
  - mourned
  - cried
  lexicon: HALOT
  rationale: בכה means 'weep.' 'Wept' preserves the emotional force more directly
    than the broader 'mourned.'
- source_word: אֶת אַהֲרֹן
  chosen: for Aaron
  alternatives:
  - over Aaron
  lexicon: HALOT
  rationale: With בכה, the object marker introduces the person mourned. English idiom
    prefers 'wept for Aaron' or 'wept over Aaron'; 'for' is slightly more natural
    here.
- source_word: שְׁלֹשִׁים יוֹם
  chosen: thirty days
  alternatives:
  - for thirty days
  lexicon: HALOT
  rationale: The accusative of duration is naturally rendered 'thirty days'; English
    readers understand this as duration after the verb 'wept.'
- source_word: כֹּל בֵּית יִשְׂרָאֵל
  chosen: all the house of Israel
  alternatives:
  - the whole house of Israel
  - all Israel
  lexicon: HALOT
  rationale: בֵּית יִשְׂרָאֵל is a fixed expression. 'All the house of Israel' preserves
    the covenantal-corporate sense better than the flatter 'all Israel.'
