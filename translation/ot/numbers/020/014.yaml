theological_decisions:
- issue: Kinship language between Israel and Edom
  chosen_reading: your brother Israel
  alternative_readings:
  - your kinsman Israel
  rationale: The verse intentionally frames Israel's appeal in familial terms rooted
    in the nations' ancestral relationship. The translation preserves the direct kinship
    metaphor rather than softening it to a generalized social relation.
  doctrine_reference: Translation philosophy §3, §4
