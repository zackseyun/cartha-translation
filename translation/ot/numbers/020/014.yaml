id: NUM.20.14
reference: Numbers 20:14
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֨ח מֹשֶׁ֧ה מַלְאָכִ֛ים מִ/קָּדֵ֖שׁ אֶל מֶ֣לֶךְ אֱד֑וֹם כֹּ֤ה אָמַר֙
    אָחִ֣י/ךָ יִשְׂרָאֵ֔ל אַתָּ֣ה יָדַ֔עְתָּ אֵ֥ת כָּל הַ/תְּלָאָ֖ה אֲשֶׁ֥ר מְצָאָֽתְ/נוּ־־׃
translation:
  text: 'Then Moses sent messengers from Kadesh to the king of Edom: “Thus says your
    brother Israel: You know all the hardship that has come upon us.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “your kinsman Israel.” The Hebrew uses familial language, “your brother
      Israel,” invoking the ancestral relationship between Edom and Israel.
    reason: lexical_alternative
  - marker: b
    text: Or “all the trouble” or “all the distress.”
    reason: lexical_alternative
  - marker: c
    text: Literally “that found us”; that is, “that has come upon us” or “that has
      befallen us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then ... sent
  alternatives:
  - And ... sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'and' is possible but less idiomatic
    here.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - angels
  lexicon: HALOT
  rationale: In this diplomatic context the word refers to human representatives,
    not heavenly beings. 'Messengers' is the broad, clear English equivalent; 'envoys'
    is possible but slightly more interpretive.
- source_word: מִקָּדֵשׁ
  chosen: from Kadesh
  alternatives:
  - from Kadesh-barnea
  lexicon: HALOT
  rationale: The Hebrew text reads simply 'Kadesh.' The longer place-name is not in
    this verse and should not be imported.
- source_word: מֶלֶךְ אֱדוֹם
  chosen: the king of Edom
  alternatives:
  - Edom's king
  lexicon: HALOT
  rationale: A straightforward formal rendering of the construct phrase in natural
    English.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: This is a standard messenger-formula. Present-tense 'says' fits the quoted
    diplomatic message being delivered.
- source_word: אָחִיךָ יִשְׂרָאֵל
  chosen: your brother Israel
  alternatives:
  - Israel your brother
  - your kinsman Israel
  lexicon: HALOT
  rationale: The phrase invokes kinship between Edom and Israel through Esau and Jacob.
    'Your brother Israel' preserves the familial language without overexplaining in
    the main text.
- source_word: אַתָּה יָדַעְתָּ
  chosen: You know
  alternatives:
  - You have known
  - You yourself know
  lexicon: HALOT
  rationale: The perfect here expresses a present state of knowledge. 'You know' is
    idiomatic English. The explicit pronoun adds emphasis, but English can convey
    this adequately without 'yourself' in the main text.
- source_word: כָּל הַתְּלָאָה
  chosen: all the hardship
  alternatives:
  - all the trouble
  - all the distress
  - all the travail
  lexicon: HALOT
  rationale: The noun denotes trouble, hardship, or distress experienced. 'Hardship'
    is natural modern English and fits Israel's suffering in context.
- source_word: אֲשֶׁר מְצָאָתְנוּ
  chosen: that has come upon us
  alternatives:
  - that has befallen us
  - that found us
  lexicon: HALOT
  rationale: The idiom literally involves something 'finding' or 'befalling' someone.
    'Has come upon us' is clear, idiomatic, and preserves the sense without woodenness.
