id: NUM.20.18
reference: Numbers 20:18
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלָי/ו֙ אֱד֔וֹם לֹ֥א תַעֲבֹ֖ר בִּ֑/י פֶּן בַּ/חֶ֖רֶב אֵצֵ֥א לִ/קְרָאתֶֽ/ךָ־׃
translation:
  text: But Edom said to him, “You shall not pass through me, lest I come out against
    you with the sword.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “through me.” Since Edom speaks as a nation/territory, the phrase
      means passage through Edom’s land.
    reason: lexical_alternative
  - marker: b
    text: 'Or “to meet you.” In this context the phrase carries a hostile sense: to
      come out in armed opposition.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר; 'said' is the natural modern English
    rendering in direct speech narrative.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Direct object of speech with preposition אֶל; straightforwardly 'to him,'
    referring to Israel's messenger/Moses in context.
- source_word: אֱדוֹם
  chosen: Edom
  lexicon: HALOT
  rationale: Proper name of the nation/territory; transliterated per translation philosophy
    for names.
- source_word: לֹא תַעֲבֹר
  chosen: You shall not pass
  alternatives:
  - You may not pass
  - Do not pass
  lexicon: HALOT
  rationale: Qal imperfect 2ms of עבר in prohibitive/declarative force. 'You shall
    not pass' preserves the formal force of Edom's refusal without sounding overly
    archaic.
- source_word: בִּי
  chosen: through me
  alternatives:
  - through my land
  - in me
  lexicon: HALOT
  rationale: Literally 'in me,' but with territorial speaker Edom the idiomatic sense
    is passage through Edom's land. 'Through me' preserves the personified national
    speech while remaining intelligible.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - otherwise
  - or else
  lexicon: HALOT
  rationale: Introduces a warning of undesirable consequence. 'Lest' is concise and
    accurately captures the force.
- source_word: בַּחֶרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Hebrew idiom for armed hostile action. 'With the sword' is the most natural
    English equivalent here.
- source_word: אֵצֵא
  chosen: I come out
  alternatives:
  - I will come out
  - I go out
  lexicon: HALOT
  rationale: Qal imperfect 1cs of יצא in a threat context. English present after 'lest'
    is idiomatic, though future sense is implied.
- source_word: לִקְרָאתֶךָ
  chosen: against you
  alternatives:
  - to meet you
  - to confront you
  lexicon: HALOT
  rationale: Literally 'to meet you,' but in military-threat context the idiomatic
    sense is hostile encounter. 'Against you' makes the threat explicit in natural
    English without adding content beyond context.
