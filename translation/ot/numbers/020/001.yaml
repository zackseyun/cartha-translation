id: NUM.20.1
reference: Numbers 20:1
source:
  edition: WLC
  text: וַ/יָּבֹ֣אוּ בְנֵֽי יִ֠שְׂרָאֵל כָּל הָ֨/עֵדָ֤ה מִדְבַּר צִן֙ בַּ/חֹ֣דֶשׁ
    הָֽ/רִאשׁ֔וֹן וַ/יֵּ֥שֶׁב הָ/עָ֖ם בְּ/קָדֵ֑שׁ וַ/תָּ֤מָת שָׁם֙ מִרְיָ֔ם וַ/תִּקָּבֵ֖ר
    שָֽׁם־־־׃
translation:
  text: Then the sons of Israel, the whole congregation, came into the wilderness
    of Zin in the first month, and the people stayed at Kadesh. Miriam died there
    and was buried there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Hebrew is literally
      'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the whole community' or 'the entire assembly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Chosen to preserve the Hebrew familial/national
    expression and the gender-accurate policy, while remaining natural enough in English.
    'Israelites' is smoother but less transparent to the source wording; 'children
    of Israel' is traditional but less idiomatic in modern English.
- source_word: כָּל הָעֵדָה
  chosen: the whole congregation
  alternatives:
  - the whole community
  - the entire assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled covenant community. 'Congregation'
    preserves that corporate sense better than the more generic 'community,' while
    'whole' reflects כָּל.
- source_word: מִדְבַּר צִן
  chosen: the wilderness of Zin
  alternatives:
  - the desert of Zin
  lexicon: HALOT
  rationale: מִדְבָּר can be rendered 'wilderness' or 'desert.' 'Wilderness' is a
    standard and contextually fitting rendering in the Pentateuch, preserving the
    geographic and theological resonance of Israel's wilderness setting.
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  chosen: in the first month
  alternatives:
  - in the first new moon/month
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'Month' is the natural English
    equivalent for חֹדֶשׁ here.
- source_word: וַיֵּשֶׁב
  chosen: stayed
  alternatives:
  - settled
  - dwelt
  - remained
  lexicon: HALOT
  rationale: Though singular in form, the verb takes הָעָם as its subject ('the people').
    'Stayed' fits the narrative context of encampment/residence at Kadesh without
    implying permanent settlement as strongly as 'settled' might.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: The standard rendering of עָם in this context; it naturally refers to
    Israel as a people-group.
- source_word: בְּקָדֵשׁ
  chosen: at Kadesh
  alternatives:
  - in Kadesh
  lexicon: HALOT
  rationale: English idiom for residence or encampment at a named location favors
    'at Kadesh.'
- source_word: מִרְיָם
  chosen: Miriam
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: וַתָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: A direct rendering of מות. 'Passed away' would soften the statement beyond
    the Hebrew's plain sense.
- source_word: וַתִּקָּבֵר
  chosen: was buried
  alternatives:
  - and they buried her
  lexicon: HALOT
  rationale: The verb is best rendered as passive here. This preserves the Hebrew
    form and avoids supplying an explicit subject not stated in the text.
- source_word: שָׁם ... שָׁם
  chosen: there ... there
  lexicon: HALOT
  rationale: 'The repetition is retained to reflect the Hebrew emphasis: Miriam died
    there and was buried there.'
