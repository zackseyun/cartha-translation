id: NUM.20.6
reference: Numbers 20:6
source:
  edition: WLC
  text: וַ/יָּבֹא֩ מֹשֶׁ֨ה וְ/אַהֲרֹ֜ן מִ/פְּנֵ֣י הַ/קָּהָ֗ל אֶל פֶּ֨תַח֙ אֹ֣הֶל מוֹעֵ֔ד
    וַֽ/יִּפְּל֖וּ עַל פְּנֵי/הֶ֑ם וַ/יֵּרָ֥א כְבוֹד יְהוָ֖ה אֲלֵי/הֶֽם־־־׃פ
translation:
  text: Then Moses and Aaron came from before the assembly to the entrance of the
    tent of meeting and fell on their faces, and the glory of the LORD appeared to
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from before the assembly,'' an idiom meaning from the presence
      of the gathered people.'
    reason: cultural_note
  - marker: b
    text: Or 'the congregation.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the LORD’s glory appeared to them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - entered
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come/go/enter' depending on viewpoint. 'Came'
    fits the English narrative flow with Moses and Aaron as the subject moving to
    a specified place.
- source_word: מִפְּנֵי
  chosen: from before
  alternatives:
  - from the presence of
  - away from
  lexicon: HALOT
  rationale: Literally 'from before/from the presence of.' 'From before' preserves
    the Hebrew spatial idiom and explains their withdrawal from the congregation without
    over-paraphrasing.
- source_word: הַקָּהָל
  chosen: the assembly
  alternatives:
  - the congregation
  lexicon: HALOT
  rationale: קהל denotes the gathered community. 'Assembly' is clear modern English
    and avoids overly traditional ecclesiastical phrasing while preserving the corporate
    sense.
- source_word: פֶּתַח
  chosen: the entrance
  alternatives:
  - the doorway
  - the opening
  lexicon: HALOT
  rationale: פתח refers to the entry point of a structure. 'Entrance' is natural in
    English and fits the tabernacle setting.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the Tent of Meeting
  lexicon: HALOT
  rationale: This is the standard literal rendering of the tabernacle designation.
    Lowercase was chosen in the draft for readable modern English; the phrase itself
    is preserved closely.
- source_word: וַיִּפְּלוּ עַל־פְּנֵיהֶם
  chosen: fell on their faces
  alternatives:
  - fell facedown
  - prostrated themselves
  lexicon: HALOT
  rationale: The idiom literally means falling on one's face. 'Fell on their faces'
    preserves the Hebrew expression and its posture of humility/supplication.
- source_word: וַיֵּרָא
  chosen: appeared
  alternatives:
  - was seen
  - showed itself
  lexicon: HALOT
  rationale: The Niphal of ראה here expresses visible manifestation. 'Appeared' is
    the standard and most natural rendering in context.
- source_word: כְבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: כבוד here denotes the manifested divine glory. For יְהוָה, the doctrinally
    required default is 'the LORD.' The construct phrase is best rendered straightforwardly
    as 'the glory of the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md, the default rendering of the divine name יְהוָה is 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: אֲלֵיהֶם
  chosen: to them
  alternatives:
  - before them
  lexicon: HALOT
  rationale: The preposition אל normally indicates direction toward. 'Appeared to
    them' is idiomatic English for the manifestation being directed to Moses and Aaron.
