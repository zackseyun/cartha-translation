id: NUM.20.23
reference: Numbers 20:23
source:
  edition: WLC
  text: וַ/יֹּ֧אמֶר יְהוָ֛ה אֶל מֹשֶׁ֥ה וְ/אֶֽל אַהֲרֹ֖ן בְּ/הֹ֣ר הָ/הָ֑ר עַל גְּב֥וּל אֶֽרֶץ אֱד֖וֹם לֵ/אמֹֽר־־־־׃
translation:
  text: And Yahweh spoke to Moses and to Aaron at Mount Hor, on the border of the land of Edom, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb אמר commonly means 'say/said,' but in English narrative introducing direct divine speech, 'spoke' is natural and preserves the sense without changing the function. The following לֵאמֹר confirms that speech content follows in the next verse.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition introducing the addressee of speech.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: וְאֶל
  chosen: and to
  alternatives:
  - and
  lexicon: HALOT
  rationale: 'The repeated preposition is explicit in Hebrew and is best retained in English for clarity and rhythm: ''to Moses and to Aaron.'''
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Standard English transliteration of the personal name.
- source_word: בְּהֹר הָהָר
  chosen: at Mount Hor
  alternatives:
  - on Mount Hor
  - at Hor the mountain
  lexicon: HALOT
  rationale: The place name is conventionally rendered 'Mount Hor.' The preposition ב here is locative; 'at' fits the narrative setting naturally in English.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - by
  - at
  lexicon: HALOT
  rationale: With גְּבוּל, the phrase idiomatically means 'on the border/boundary.' 'On' is the most direct rendering.
- source_word: גְּבֻל
  chosen: the border
  alternatives:
  - the boundary
  - the territory
  lexicon: HALOT
  rationale: Refers to the edge or boundary line of a territory. 'Border' is the clearest modern English choice in this geopolitical context.
- source_word: אֶרֶץ אֱדוֹם
  chosen: the land of Edom
  alternatives:
  - the territory of Edom
  - Edom's land
  lexicon: HALOT
  rationale: Construct chain indicating the region belonging to Edom. 'The land of Edom' is standard and clear.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard Hebrew speech-introduction infinitive, naturally rendered 'saying' before the quoted content in the next verse.
