  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering אַחֵינוּ with gender accuracy
  chosen_reading: our brothers
  alternative_readings:
  - our brothers and sisters
  - our kinsmen
  rationale: The source is grammatically masculine plural. Per translation philosophy, gender-accurate rendering is preferred over gender-neutral language unless context clearly demands otherwise.
