id: NUM.20.3
reference: Numbers 20:3
source:
  edition: WLC
  text: וַ/יָּ֥רֶב הָ/עָ֖ם עִם מֹשֶׁ֑ה וַ/יֹּאמְר֣וּ לֵ/אמֹ֔ר וְ/ל֥וּ גָוַ֛עְנוּ בִּ/גְוַ֥ע אַחֵ֖י/נוּ לִ/פְנֵ֥י יְהוָֽה־׃
translation:
  text: And the people quarreled with Moses and said, “If only we had perished when our brothers perished before Yahweh!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “If only we had perished as our brothers perished before the LORD!”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּרֶב
  chosen: quarreled
  alternatives:
  - contended
  - complained
  - strove
  lexicon: HALOT
  rationale: From ריב, indicating dispute or contention. 'Quarreled' gives natural modern English while preserving the adversarial force directed at Moses more clearly than the weaker 'complained.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the congregation
  lexicon: HALOT
  rationale: עם here refers broadly to the Israelite community. 'The people' is the plain and natural rendering in context.
- source_word: עִם מֹשֶׁה
  chosen: with Moses
  alternatives:
  - against Moses
  lexicon: HALOT
  rationale: The preposition עִם normally means 'with.' In English, 'quarreled with Moses' adequately conveys the hostile interaction without overtranslating.
- source_word: וַיֹּאמְרוּ לֵאמֹר
  chosen: and said
  alternatives:
  - and spoke, saying
  lexicon: HALOT
  rationale: This is a common Hebrew speech introduction. 'And said' is sufficient in idiomatic English; retaining both elements woodenly would not improve accuracy.
- source_word: וְלוּ
  chosen: If only
  alternatives:
  - Would that
  - If
  lexicon: HALOT
  rationale: This particle expresses wish or lament. 'If only' captures the emotional force in clear modern English.
- source_word: גָוַעְנוּ
  chosen: we had died
  alternatives:
  - we had perished
  - we had expired
  lexicon: HALOT
  rationale: גוע denotes dying/perishing. 'Died' is the most natural English equivalent here and fits the lament construction.
- source_word: בִּגְוַע
  chosen: when ... died
  alternatives:
  - in the dying of
  - as ... perished
  lexicon: HALOT
  rationale: 'The infinitive construct with ב marks the circumstance or time of the action. Rendering it temporally as ''when'' produces natural English while preserving the sense: they wish they had died at the same time as their brothers.'
- source_word: אַחֵינוּ
  chosen: our brothers
  alternatives:
  - our kinsmen
  - our brothers and sisters
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural and likely refers to fellow Israelites who died previously. Per translation philosophy, the gendered form is preserved as 'brothers' rather than neutralized.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי means 'before/in the presence of.' 'Before the LORD' is concise and idiomatic. Per doctrine guidelines, יְהוָה is rendered 'the LORD,' with 'Yahweh' preserved as an alternative only in documentation, not main text.
