id: NUM.20.9
reference: Numbers 20:9
source:
  edition: WLC
  text: וַ/יִּקַּ֥ח מֹשֶׁ֛ה אֶת הַ/מַּטֶּ֖ה מִ/לִּ/פְנֵ֣י יְהוָ֑ה כַּ/אֲשֶׁ֖ר צִוָּֽ/הוּ־׃
translation:
  text: So Moses took the staff from before the LORD, just as he had commanded him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rod.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - took up
  - received
  lexicon: HALOT
  rationale: Qal wayyiqtol of לקח normally denotes a simple past narrative action,
    'took.' 'Took up' is possible but adds a nuance not required by the verb alone.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
- source_word: הַמַּטֶּה
  chosen: the staff
  alternatives:
  - the rod
  lexicon: HALOT
  rationale: מַטֶּה can mean 'staff,' 'rod,' or 'tribe' depending on context. Here
    it is the physical object kept before the LORD, so 'staff' is the most natural
    modern English rendering; 'rod' is a traditional alternative.
- source_word: מִלִּפְנֵי
  chosen: from before
  alternatives:
  - from the presence of
  - from before the presence of
  lexicon: HALOT
  rationale: The preposition plus לִפְנֵי is spatial, literally 'from before.' Retaining
    'from before' preserves the concrete Hebrew sense and the cultic setting without
    over-expanding to 'presence of' in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the LXX/English Bible pattern.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison/conformity with the prior command. 'Just as' communicates
    exact correspondence in natural English.
- source_word: צִוָּהוּ
  chosen: he had commanded him
  alternatives:
  - he commanded him
  lexicon: HALOT
  rationale: The verb means 'commanded him.' English past perfect is used idiomatically
    because the command precedes Moses' taking the staff in the narrative sequence.
