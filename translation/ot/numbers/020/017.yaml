id: NUM.20.17
reference: Numbers 20:17
source:
  edition: WLC
  text: נַעְבְּרָה נָּ֣א בְ/אַרְצֶ֗/ךָ לֹ֤א נַעֲבֹר֙ בְּ/שָׂדֶ֣ה וּ/בְ/כֶ֔רֶם וְ/לֹ֥א
    נִשְׁתֶּ֖ה מֵ֣י בְאֵ֑ר דֶּ֧רֶךְ הַ/מֶּ֣לֶךְ נֵלֵ֗ךְ לֹ֤א נִטֶּה֙ יָמִ֣ין וּ/שְׂמֹ֔אול
    עַ֥ד אֲשֶֽׁר נַעֲבֹ֖ר גְּבוּלֶֽ/ךָ־־׃
translation:
  text: Please let us pass through your land. We will not pass through field or vineyard,
    and we will not drink water from a well. We will go by the king’s road; we will
    not turn to the right or to the left until we have passed through your border.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the king’s highway.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “your border”; the phrase means passing beyond the boundary of your
      territory.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעְבְּרָה נָּא
  chosen: Please let us pass
  alternatives:
  - Let us pass, please
  - Please allow us to pass through
  lexicon: HALOT
  rationale: The cohortative with particle נָא expresses a polite request. 'Please
    let us pass' captures both the volitional force and the courteous tone in natural
    English.
- source_word: בְאַרְצֶךָ
  chosen: through your land
  alternatives:
  - in your land
  - through your country
  lexicon: HALOT
  rationale: With עבר, the preposition ב commonly indicates movement through a territory.
    'Land' is the most direct rendering of אֶרֶץ here.
- source_word: לֹא נַעֲבֹר בְּשָׂדֶה וּבְכֶרֶם
  chosen: We will not pass through field or vineyard
  alternatives:
  - We will not go through any field or vineyard
  - We will not cross through field and vineyard
  lexicon: HALOT
  rationale: The phrase denies leaving the route to traverse cultivated areas. Singular
    collectives 'field or vineyard' are idiomatic in English and reflect the Hebrew
    singular nouns used generically.
- source_word: וְלֹא נִשְׁתֶּה מֵי בְאֵר
  chosen: and we will not drink water from a well
  alternatives:
  - and we will not drink well water
  - and we will not drink the water of a well
  lexicon: HALOT
  rationale: מֵי is the construct form 'water of,' and בְאֵר is 'well.' 'Water from
    a well' is clear modern English while preserving the source sense.
- source_word: דֶּרֶךְ הַמֶּלֶךְ
  chosen: the king’s road
  alternatives:
  - the king's highway
  - the royal road
  lexicon: HALOT
  rationale: Literally 'the way of the king.' 'The king’s road' is a natural rendering
    that preserves the definite, recognized route without relying on archaic 'highway.'
- source_word: נֵלֵךְ
  chosen: We will go by
  alternatives:
  - We will travel on
  - We will walk on
  lexicon: HALOT
  rationale: הלך here describes travel along the specified route. 'Go by' fits the
    English construction with 'the king’s road' and keeps the promise concise.
- source_word: לֹא נִטֶּה יָמִין וּשְׂמֹאול
  chosen: we will not turn to the right or to the left
  alternatives:
  - we will not turn right or left
  - we will not deviate to the right or to the left
  lexicon: HALOT
  rationale: This is an idiom for not deviating from the route. The fuller wording
    preserves the Hebrew directional pair and remains readable.
- source_word: עַד אֲשֶׁר נַעֲבֹר גְּבוּלֶךָ
  chosen: until we have passed through your border
  alternatives:
  - until we have crossed your border
  - until we pass beyond your territory
  lexicon: HALOT
  rationale: גְּבוּל can mean border or territory. Here the sense is the boundary
    line marking Edom's land; 'your border' is more literal, while 'passed through'
    echoes the repeated עבר motif in the verse.
