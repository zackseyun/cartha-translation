id: NUM.20.8
reference: Numbers 20:8
source:
  edition: WLC
  text: קַ֣ח אֶת הַ/מַּטֶּ֗ה וְ/הַקְהֵ֤ל אֶת הָ/עֵדָה֙ אַתָּה֙ וְ/אַהֲרֹ֣ן אָחִ֔י/ךָ
    וְ/דִבַּרְתֶּ֧ם אֶל הַ/סֶּ֛לַע לְ/עֵינֵי/הֶ֖ם וְ/נָתַ֣ן מֵימָ֑י/ו וְ/הוֹצֵאתָ֨
    לָ/הֶ֥ם מַ֨יִם֙ מִן הַ/סֶּ֔לַע וְ/הִשְׁקִיתָ֥ אֶת הָ/עֵדָ֖ה וְ/אֶת בְּעִירָֽ/ם־־־־־־׃
translation:
  text: Take the staff, and assemble the congregation, you and Aaron your brother,
    and speak to the rock before their eyes, and it will give its water. Then you
    shall bring out water for them from the rock and give drink to the congregation
    and to their livestock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rod.'
    reason: lexical_alternative
  - marker: b
    text: Or 'assembly' for 'congregation.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'before their eyes.'
    reason: lexical_alternative
  - marker: d
    text: Or 'their cattle' or 'their beasts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּטֶּה
  chosen: the staff
  alternatives:
  - the rod
  lexicon: HALOT
  rationale: מַטֶּה commonly denotes a staff/rod. 'Staff' is more natural modern English
    and fits the narrative object Moses is to take.
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the assembly
  - the community
  lexicon: HALOT
  rationale: עֵדָה refers to the gathered Israelite community. 'Congregation' preserves
    the formal communal sense without over-paraphrase.
- source_word: וְדִבַּרְתֶּם אֶל הַסֶּלַע
  chosen: and speak to the rock
  alternatives:
  - and tell the rock
  - and address the rock
  lexicon: HALOT
  rationale: דבר אל is the standard idiom 'speak to.' The plural verb includes Moses
    and Aaron; English imperative 'speak' after the coordinated commands is natural.
- source_word: לְעֵינֵיהֶם
  chosen: before their eyes
  alternatives:
  - in their sight
  - before them
  lexicon: HALOT
  rationale: The idiom literally means 'before their eyes,' emphasizing public visibility.
    This is retained in idiomatic English.
- source_word: וְנָתַן מֵימָיו
  chosen: and it will give its water
  alternatives:
  - and it shall yield its water
  - and it will produce its water
  lexicon: HALOT
  rationale: The verb is singular with the rock as subject. 'Give its water' is a
    close rendering; 'its water' preserves the possessive suffix.
- source_word: וְהוֹצֵאתָ לָהֶם מַיִם מִן הַסֶּלַע
  chosen: Then you shall bring out water for them from the rock
  alternatives:
  - and you shall bring out water for them from the rock
  - and you shall bring forth water for them from the rock
  lexicon: HALOT
  rationale: The Hiphil of יצא means 'bring out/cause to come out.' 'Then' reflects
    the sequential force in smooth English while preserving the command sequence.
- source_word: וְהִשְׁקִיתָ
  chosen: and give drink to
  alternatives:
  - and make drink
  - and provide water to
  lexicon: HALOT
  rationale: The Hiphil of שקה means to give drink or cause to drink. 'Give drink
    to' is idiomatic and close to the causative sense.
- source_word: בְּעִירָם
  chosen: their livestock
  alternatives:
  - their cattle
  - their beasts
  lexicon: HALOT
  rationale: בְּעִיר refers to beasts of burden or domestic animals. 'Livestock' is
    clear modern English and suitably broad.
- source_word: אַתָּה וְאַהֲרֹן אָחִיךָ
  chosen: you and Aaron your brother
  lexicon: HALOT
  rationale: The appositional phrase identifies the two leaders explicitly. Retained
    straightforwardly in English.
