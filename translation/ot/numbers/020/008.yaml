theological_decisions:
- issue: Public nature of the miracle command
  chosen_reading: The command is rendered to emphasize that Moses and Aaron are to
    speak to the rock in the sight of the people.
  alternative_readings:
  - A less explicit rendering such as 'before them'
  rationale: The Hebrew idiom לְעֵינֵיהֶם highlights visible public witness. Preserving
    this matters for the narrative logic of Moses's later failure in the same episode.
