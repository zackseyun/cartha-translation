theological_decisions:
- issue: Rendering the death idiom 'gathered to his people'
  chosen_reading: Preserve the idiom rather than interpret it merely as physical death
  alternative_readings:
  - Render simply as 'Aaron will die'
  rationale: The Hebrew expression carries more than bare notification of death; it
    evokes covenantal and ancestral continuity. Preserving the idiom maintains the
    text's theological and literary texture without importing a detailed doctrine
    of the afterlife.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Gender rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: '''sons of Israel'' in the main text'
  alternative_readings:
  - '''people of Israel'''
  - '''Israelites'''
  rationale: The source is grammatically masculine and formulaic. Per the gender-accurate
    principle, the translation keeps 'sons' rather than neutralizing it, even though
    the referent is the nation as a whole.
  doctrine_reference: Translation philosophy §4
