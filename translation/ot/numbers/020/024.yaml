id: NUM.20.24
reference: Numbers 20:24
source:
  edition: WLC
  text: יֵאָסֵ֤ף אַהֲרֹן֙ אֶל עַמָּ֔י/ו כִּ֣י לֹ֤א יָבֹא֙ אֶל הָ/אָ֔רֶץ אֲשֶׁ֥ר נָתַ֖תִּי
    לִ/בְנֵ֣י יִשְׂרָאֵ֑ל עַ֛ל אֲשֶׁר מְרִיתֶ֥ם אֶת פִּ֖/י לְ/מֵ֥י מְרִיבָֽה־־־־׃
translation:
  text: Aaron will be gathered to his people, because he will not enter the land that
    I have given to the sons of Israel, because you rebelled against my command at
    the waters of Meribah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'to the Israelites.' The Hebrew reads 'to the sons
      of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'against my mouth,' that is, against my spoken command.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵאָסֵף
  chosen: will be gathered
  alternatives:
  - will be taken away
  - will die
  lexicon: HALOT
  rationale: The Niphal of אסף in death contexts is an idiomatic expression for being
    gathered in death to one's kin/people. 'Will be gathered' preserves the Hebrew
    idiom and its solemn tone better than flattening it to 'will die.'
- source_word: אֶל עַמָּיו
  chosen: to his people
  alternatives:
  - to his kin
  - to his ancestors
  lexicon: HALOT
  rationale: The phrase is a standard Hebrew expression associated with death and
    ancestral belonging. 'To his people' is the most direct and traditional equivalent;
    'ancestors' is interpretive and narrower than the Hebrew.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for Aaron's impending death outside the
    land. 'Because' is clear modern English and preserves the causal force.
- source_word: יָבֹא אֶל הָאָרֶץ
  chosen: will not enter the land
  alternatives:
  - will not come into the land
  lexicon: HALOT
  rationale: '''Enter the land'' is idiomatic English and accurately reflects the
    motion verb plus preposition. It also fits the covenant-land context naturally.'
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In context this refers to the promised land given to Israel. 'The land'
    is the standard covenantal expression and avoids over-paraphrasing by adding 'promised'
    where the Hebrew does not.
- source_word: אֲשֶׁר נָתַתִּי
  chosen: that I have given
  alternatives:
  - that I am giving
  - which I gave
  lexicon: HALOT
  rationale: The perfect verb can be rendered as a completed divine grant with present
    relevance. 'Have given' captures the certainty of God's gift without forcing a
    simple past.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the people of Israel
  - to the Israelites
  lexicon: HALOT
  rationale: Per the gender-accurate principle, בְּנֵי is retained as 'sons' rather
    than neutralized. This is the standard Hebrew ethnonymic expression; a footnote
    can preserve the more idiomatic English alternative if desired, but the main text
    should reflect the source form.
- source_word: עַל אֲשֶׁר
  chosen: because
  alternatives:
  - on account of which
  - for that
  lexicon: HALOT
  rationale: The combination introduces the ground for the judgment. In English, 'because'
    best conveys the causal sense without awkwardness.
- source_word: מְרִיתֶם
  chosen: you rebelled
  alternatives:
  - you were rebellious
  - you defied
  lexicon: HALOT
  rationale: The verb מרה denotes rebellion or defiance against authority. 'You rebelled'
    is direct and preserves the moral seriousness of the offense.
- source_word: אֶת־פִּי
  chosen: against my command
  alternatives:
  - against my mouth
  - against my word
  lexicon: HALOT
  rationale: Literally 'my mouth,' but in this idiom it refers to God's spoken command.
    'Against my command' communicates the sense clearly in modern English while remaining
    faithful to the idiom.
- source_word: לְמֵי מְרִיבָה
  chosen: at the waters of Meribah
  alternatives:
  - by the waters of Meribah
  - at Meribah's waters
  lexicon: HALOT
  rationale: This is a place/event designation. 'Waters of Meribah' is the conventional
    and transparent rendering, preserving the proper name rather than translating
    it as 'quarreling/dispute.'
