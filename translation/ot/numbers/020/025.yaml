id: NUM.20.25
reference: Numbers 20:25
source:
  edition: WLC
  text: קַ֚ח אֶֽת אַהֲרֹ֔ן וְ/אֶת אֶלְעָזָ֖ר בְּנ֑/וֹ וְ/הַ֥עַל אֹתָ֖/ם הֹ֥ר הָ/הָֽר־־׃
translation:
  text: Take Aaron and Eleazar his son, and bring them up Mount Hor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Hor the mountain,'' conventionally rendered ''Mount Hor.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח
  chosen: Take
  alternatives:
  - Bring
  - Fetch
  lexicon: HALOT
  rationale: Qal imperative 2ms of לקח commonly means 'take.' 'Take' is the most direct
    and natural imperative here, fitting Moses being commanded to take Aaron and Eleazar
    with him.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Standard English transliteration of the personal name.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Standard English transliteration of the personal name.
- source_word: בְּנוֹ
  chosen: his son
  alternatives:
  - the son of Aaron
  lexicon: HALOT
  rationale: 'The 3ms suffix most naturally refers to Aaron in context: ''Eleazar
    his son.'' This is the straightforward appositional identification.'
- source_word: וְהַעַל
  chosen: bring ... up
  alternatives:
  - take ... up
  - cause ... to go up
  - lead ... up
  lexicon: HALOT
  rationale: Hiphil imperative of עלה is causative, 'cause to go up' or 'bring up.'
    In idiomatic English with a destination on a mountain, 'bring them up' preserves
    the causative sense while reading naturally.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object pronoun referring to Aaron and Eleazar together.
- source_word: הֹר הָהָר
  chosen: Mount Hor
  alternatives:
  - Hor the mountain
  lexicon: HALOT
  rationale: This is the conventional rendering of the place name in English. Although
    formally the Hebrew is 'Hor the mountain,' English idiom and established toponym
    usage favor 'Mount Hor'.
