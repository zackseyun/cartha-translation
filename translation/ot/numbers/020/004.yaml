id: NUM.20.4
reference: Numbers 20:4
source:
  edition: WLC
  text: וְ/לָ/מָ֤ה הֲבֵאתֶם֙ אֶת קְהַ֣ל יְהוָ֔ה אֶל הַ/מִּדְבָּ֖ר הַ/זֶּ֑ה לָ/מ֣וּת
    שָׁ֔ם אֲנַ֖חְנוּ וּ/בְעִירֵֽ/נוּ־־׃
translation:
  text: And why have you brought the assembly of the LORD into this wilderness, for
    us and our livestock to die there?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the congregation of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָמָה
  chosen: And why
  alternatives:
  - Why
  lexicon: HALOT
  rationale: Introduces the complaint with a connective plus interrogative. 'And why'
    preserves the Hebrew conjunction and the flow from the previous accusation.
- source_word: הֲבֵאתֶם
  chosen: have you brought
  alternatives:
  - did you bring
  lexicon: HALOT
  rationale: The Hiphil of בוא here means 'bring' or 'cause to come.' Present perfect
    English fits the discourse naturally while reflecting the completed action with
    present consequence.
- source_word: קְהַל יְהוָה
  chosen: the assembly of the LORD
  alternatives:
  - the congregation of the LORD
  - the community of the LORD
  lexicon: HALOT
  rationale: קהל denotes the gathered community. 'Assembly' is clear modern English
    and preserves the corporate sense without sounding overly ecclesiastical. 'Of
    the LORD' reflects the genitive relation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֶל הַמִּדְבָּר הַזֶּה
  chosen: into this wilderness
  alternatives:
  - into this desert
  - to this wilderness
  lexicon: HALOT
  rationale: מִדְבָּר commonly refers to wilderness or steppe. 'Wilderness' best fits
    biblical usage and avoids overly narrow associations of 'desert.' 'Into' suits
    the motion implied by the verb.
- source_word: לָמוּת
  chosen: to die
  alternatives:
  - for death
  lexicon: HALOT
  rationale: The infinitive expresses purpose or result. In English, 'to die' is the
    most natural rendering in this construction.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is direct and idiomatic.
- source_word: אֲנַחְנוּ וּבְעִירֵנוּ
  chosen: for us and our livestock to die there
  alternatives:
  - that we and our cattle should die there
  - for us and our beasts to die there
  lexicon: HALOT
  rationale: The explicit pronoun plus noun phrase identifies those who would die.
    בעיר refers to beasts/cattle/livestock; 'livestock' is the clearest modern collective
    term. The phrase is reordered in English for natural syntax while preserving the
    sense.
