theological_decisions:
- issue: First person plural in Moses' question
  chosen_reading: shall we bring out water for you from this rock?
  alternative_readings:
  - shall we bring forth water for you from this rock?
  rationale: The Hebrew explicitly uses first person plural נוֹצִיא ('shall we bring
    out'). The translation preserves the wording without softening the theological
    tension about Moses and Aaron's role versus God's agency; the narrative context
    resolves the issue rather than the translation.
  doctrine_reference: Preserve theological tension rather than resolve it.
