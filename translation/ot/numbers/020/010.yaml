id: NUM.20.10
reference: Numbers 20:10
source:
  edition: WLC
  text: וַ/יַּקְהִ֜לוּ מֹשֶׁ֧ה וְ/אַהֲרֹ֛ן אֶת הַ/קָּהָ֖ל אֶל פְּנֵ֣י הַ/סָּ֑לַע וַ/יֹּ֣אמֶר
    לָ/הֶ֗ם שִׁמְעוּ נָא֙ הַ/מֹּרִ֔ים הֲ/מִן הַ/סֶּ֣לַע הַ/זֶּ֔ה נוֹצִ֥יא לָ/כֶ֖ם
    מָֽיִם־־־־׃
translation:
  text: 'Then Moses and Aaron assembled the assembly before the rock, and he said
    to them, “Listen now, you rebels: shall we bring out water for you from this rock?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall we bring forth water for you from this rock?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְהִלוּ
  chosen: assembled
  alternatives:
  - gathered together
  - convened
  lexicon: HALOT
  rationale: Hiphil of קהל means to cause to gather/assemble. 'Assembled' is natural
    English and preserves the causative sense better than a looser paraphrase.
- source_word: הַקָּהָל
  chosen: the assembly
  alternatives:
  - the congregation
  - the community
  lexicon: HALOT
  rationale: קָהָל denotes the gathered community/assembly. 'Assembly' keeps the lexical
    connection with וַיַּקְהִלוּ and avoids importing later ecclesial overtones that
    'congregation' may carry.
- source_word: אֶל־פְּנֵי הַסָּלַע
  chosen: before the rock
  alternatives:
  - in front of the rock
  - to the front of the rock
  lexicon: HALOT
  rationale: The idiom אֶל־פְּנֵי commonly means 'before' or 'in front of.' 'Before
    the rock' is concise and idiomatic.
- source_word: וַיֹּאמֶר
  chosen: he said
  alternatives:
  - Moses said
  lexicon: HALOT
  rationale: The verb is singular, naturally referring to Moses after the compound
    subject 'Moses and Aaron.' Rendering 'he said' reflects the Hebrew form without
    over-specifying beyond the text.
- source_word: שִׁמְעוּ נָא
  chosen: Listen now
  alternatives:
  - Hear now
  - Please listen
  lexicon: HALOT
  rationale: שׁמע in imperative is 'hear/listen'; נָא here adds urgency or entreaty
    rather than politeness. 'Listen now' captures the force in readable modern English.
- source_word: הַמֹּרִים
  chosen: you rebels
  alternatives:
  - you rebellious ones
  - you defiant ones
  lexicon: HALOT
  rationale: From מרה, 'to be rebellious.' The substantive participle addresses the
    people as characterized by rebellion. 'You rebels' is direct, idiomatic, and preserves
    the rebuke.
- source_word: הֲמִן הַסֶּלַע הַזֶּה
  chosen: from this rock
  alternatives:
  - out of this rock
  lexicon: HALOT
  rationale: 'The interrogative plus מן marks source: ''from this rock.'' ''Out of''
    is possible, but ''from'' is the more neutral and natural rendering.'
- source_word: נוֹצִיא
  chosen: shall we bring out
  alternatives:
  - must we bring out
  - shall we bring forth
  - shall we produce
  lexicon: HALOT
  rationale: Hiphil of יצא means 'cause to come out/bring out.' In the interrogative
    context, 'shall we bring out' preserves both the causative sense and the rhetorical
    question.
- source_word: מָיִם
  chosen: water
  lexicon: HALOT
  rationale: Standard rendering of מַיִם.
