id: NUM.20.22
reference: Numbers 20:22
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ מִ/קָּדֵ֑שׁ וַ/יָּבֹ֧אוּ בְנֵֽי יִשְׂרָאֵ֛ל כָּל הָ/עֵדָ֖ה הֹ֥ר
    הָ/הָֽר־־׃
translation:
  text: And they set out from Kadesh, and the sons of Israel, the whole congregation,
    came to Mount Hor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' for 'the sons of Israel.' The Hebrew idiom is literally
      'sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Mount Hor,' literally 'Hor the mountain,' functioning as a place
      name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: they set out
  alternatives:
  - they journeyed
  - they departed
  lexicon: HALOT
  rationale: The verb נסע in the wayyiqtol narrative form commonly denotes breaking
    camp and traveling onward. 'Set out' is natural modern English and preserves the
    sense of departure from a staging place better than the more generic 'went'.
- source_word: מִקָּדֵשׁ
  chosen: from Kadesh
  alternatives:
  - from Kadesh-barnea
  lexicon: HALOT
  rationale: The Hebrew text reads simply 'Kadesh.' 'Kadesh-barnea' may be identified
    contextually with this location elsewhere, but importing the fuller place name
    here would go beyond the wording of the verse.
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - arrived
  - entered
  lexicon: HALOT
  rationale: בוא broadly means 'come' or 'enter.' With a destination place name following,
    'came to' is idiomatic and sufficiently literal. 'Entered' would be less natural
    with a mountain name here.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: This preserves the familial/corporate idiom of the Hebrew while remaining
    understandable in English. 'Israelites' is smoother but less formally transparent;
    'children of Israel' is traditional but less natural in contemporary English.
- source_word: כָּל הָעֵדָה
  chosen: the whole congregation
  alternatives:
  - the whole community
  - all the congregation
  lexicon: HALOT
  rationale: עֵדָה refers to the assembled covenant community. 'Congregation' preserves
    the corporate sense and matches common Pentateuchal usage. 'Whole' reflects כָּל
    modifying the noun phrase.
- source_word: הֹר הָהָר
  chosen: Mount Hor
  alternatives:
  - Hor the mountain
  lexicon: HALOT
  rationale: This is a proper place name conventionally rendered 'Mount Hor.' A more
    mechanically literal rendering ('Hor the mountain') would be awkward in English
    and unnecessary since the phrase functions as a toponym.
