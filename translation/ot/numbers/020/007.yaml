id: NUM.20.7
reference: Numbers 20:7
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: And Yahweh spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh'' or ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive + Piel of דבר is the standard narrative formula 'and [he] spoke.' 'Spoke' preserves the formal narrative cadence better than 'said,' especially before the infinitive 'saying.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks direction toward the indirect object; 'to' is the natural modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
- source_word: לֵּאמֹר
  chosen: saying
  alternatives:
  - and said
  - as follows
  lexicon: HALOT
  rationale: This infinitive construct is a common speech-introduction formula. 'Saying' preserves the Hebrew structure and signals that the content of the speech follows in the next verse.
