id: NUM.20.15
reference: Numbers 20:15
source:
  edition: WLC
  text: וַ/יֵּרְד֤וּ אֲבֹתֵ֨י/נוּ֙ מִצְרַ֔יְמָ/ה וַ/נֵּ֥שֶׁב בְּ/מִצְרַ֖יִם יָמִ֣ים
    רַבִּ֑ים וַ/יָּרֵ֥עוּ לָ֛/נוּ מִצְרַ֖יִם וְ/לַ/אֲבֹתֵֽי/נוּ׃
translation:
  text: And our fathers went down to Egypt, and we lived in Egypt many days, and the
    Egyptians treated us and our fathers badly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our ancestors' for 'our fathers' in both occurrences; the Hebrew is
      literally 'our fathers.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'many days,' an idiom for a long period.
    reason: lexical_alternative
  - marker: c
    text: Or 'mistreated us and our fathers' or 'did evil to us and our fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרְדוּ
  chosen: went down
  alternatives:
  - went
  - descended
  lexicon: HALOT
  rationale: ירד commonly means 'go down/descend.' 'Went down' preserves the idiomatic
    geographical movement to Egypt and matches common biblical usage without sounding
    overly formal.
- source_word: אֲבֹתֵינוּ
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: אָבוֹת literally means 'fathers.' In this historical-retrospective context
    it refers to forefathers/ancestors, but 'our fathers' better preserves the source
    wording and biblical register. The representative sense is clear from context.
- source_word: מִצְרַיְמָה
  chosen: to Egypt
  alternatives:
  - toward Egypt
  lexicon: HALOT
  rationale: The directional he indicates motion toward a place. 'To Egypt' is the
    natural English equivalent.
- source_word: וַנֵּשֶׁב
  chosen: we lived
  alternatives:
  - we dwelt
  - we stayed
  - we settled
  lexicon: HALOT
  rationale: ישב here denotes residing/dwelling. 'We lived' is clear modern English
    and fits the summary of Israel's stay in Egypt better than the more archaic 'dwelt.'
- source_word: יָמִים רַבִּים
  chosen: many days
  alternatives:
  - a long time
  - many years
  lexicon: HALOT
  rationale: Literally 'many days.' Although idiomatically it can mean a long period,
    the Hebrew wording should be preserved in the main text. 'Many years' would over-specify
    beyond the text.
- source_word: וַיָּרֵעוּ
  chosen: treated ... badly
  alternatives:
  - did evil to
  - mistreated
  - dealt harshly with
  lexicon: HALOT
  rationale: The Hiphil of רעע means to do evil/harm, here with ל marking the affected
    party. 'Treated ... badly' communicates the sense naturally in English while retaining
    the moral-negative force. 'Mistreated' is possible, but 'treated badly' mirrors
    the broader Hebrew verb without narrowing it too much.
- source_word: מִצְרַיִם
  chosen: the Egyptians
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: Although the form is 'Egypt,' the verb is plural and the sense is the
    people of Egypt. Rendering it as 'the Egyptians' makes explicit the personal subject
    required by English.
- source_word: לָנוּ
  chosen: us
  alternatives:
  - to us
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object/affected party. In idiomatic
    English after 'treated badly,' simple 'us' is the best rendering.
- source_word: וְלַאֲבֹתֵינוּ
  chosen: and our fathers
  alternatives:
  - and our ancestors
  lexicon: HALOT
  rationale: Repeated for emphasis in the Hebrew; retained in English rather than
    collapsed. 'Our fathers' preserves the lexical repetition and familial-historical
    framing.
