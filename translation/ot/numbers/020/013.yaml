theological_decisions:
- issue: How to render the LORD's sanctification in the final clause
  chosen_reading: and he showed himself holy among them
  alternative_readings:
  - and he was sanctified in them
  - and he proved himself holy by them
  rationale: The Hebrew nifal of קדש can sound passive ('was sanctified'), but in
    English that wording may wrongly suggest that humans made God holy. The clause
    means that through this incident the LORD's holiness was manifested or vindicated
    in relation to Israel. The chosen rendering preserves that theological sense without
    importing more than the text states.
  doctrine_reference: Translation philosophy §3, §6
- issue: Whether to render בְנֵי יִשְׂרָאֵל inclusively
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The source expression is grammatically masculine plural and is a standard
    covenantal ethnonym. Per the gender-accurate policy, the translation keeps the
    masculine form rather than flattening it to a neutral collective in the main text.
  doctrine_reference: Translation philosophy §4
