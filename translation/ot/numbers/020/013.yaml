id: NUM.20.13
reference: Numbers 20:13
source:
  edition: WLC
  text: הֵ֚מָּה מֵ֣י מְרִיבָ֔ה אֲשֶׁר רָב֥וּ בְנֵֽי יִשְׂרָאֵ֖ל אֶת יְהוָ֑ה וַ/יִּקָּדֵ֖שׁ
    בָּֽ/ם־־־׃ס
translation:
  text: These are the waters of Meribah, where the sons of Israel quarreled with the
    LORD, and he showed himself holy among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Meribah means 'quarreling' or 'contention.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and he was shown holy in them' / 'and he proved himself holy by them.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֵמָּה
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: Demonstrative pronoun introducing and identifying the place/waters. Present-tense
    English ('These are') is idiomatic in naming formulae, though past ('These were')
    is possible.
- source_word: מֵי מְרִיבָה
  chosen: the waters of Meribah
  alternatives:
  - the waters of quarreling
  - the waters of contention
  lexicon: HALOT
  rationale: Construct phrase literally 'waters of Meribah/strife.' Because מְרִיבָה
    functions here as a place name established by the narrative, 'Meribah' is transliterated
    in the main text. The lexical sense ('quarreling/contention') is preserved implicitly
    by context and can be noted as an alternative.
- source_word: רָבוּ
  chosen: quarreled
  alternatives:
  - contended
  - strove
  lexicon: HALOT
  rationale: The verb ריב denotes dispute/contention. 'Quarreled' is clear modern
    English and fits the narrative tone better than the more formal 'contended' or
    archaic 'strove.'
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate rendering of the Hebrew expression per translation philosophy.
    While it denotes the people of Israel collectively, the source is explicitly masculine
    plural construct, so 'sons of Israel' best matches form and traditional sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: וַיִּקָּדֵשׁ
  chosen: he showed himself holy
  alternatives:
  - he was sanctified
  - he was shown holy
  - he proved himself holy
  lexicon: HALOT
  rationale: Nifal of קדש here expresses that the LORD was manifested/recognized as
    holy through the event. 'Showed himself holy' communicates the passive-reflexive
    nuance in natural English better than the wooden 'was sanctified,' which could
    mislead modern readers.
- source_word: בָּם
  chosen: among them
  alternatives:
  - in them
  - by them
  lexicon: HALOT
  rationale: The preposition ב with pronominal suffix can be rendered several ways
    here. In context, it most naturally means that the LORD's holiness was displayed
    in relation to the Israelites, hence 'among them.' 'By them' is possible but less
    direct in English and more interpretive.
