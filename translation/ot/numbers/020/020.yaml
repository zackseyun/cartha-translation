id: NUM.20.20
reference: Numbers 20:20
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר לֹ֣א תַעֲבֹ֑ר וַ/יֵּצֵ֤א אֱדוֹם֙ לִ/קְרָאת֔/וֹ בְּ/עַ֥ם כָּבֵ֖ד
    וּ/בְ/יָ֥ד חֲזָקָֽה׃
translation:
  text: But he said, “You shall not pass through.” And Edom came out to meet him with
    a large force and with a strong hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to confront him” for “to meet him”; the Hebrew expression itself is
      neutral, but the context is clearly hostile.
    reason: lexical_alternative
  - marker: b
    text: Literally, “with a heavy people,” an idiom meaning a large or imposing body
      of men.
    reason: lexical_alternative
  - marker: c
    text: Or “with a mighty hand,” that is, with strong power or force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'But' brings out the adversative
    sense in context, since this is Edom's refusal after Israel's request. 'He said'
    leaves the subject implicit from context (the king/representative of Edom).
- source_word: לֹא תַעֲבֹר
  chosen: You shall not pass through
  alternatives:
  - You may not pass through
  - Do not pass through
  lexicon: HALOT
  rationale: The imperfect here expresses prohibition/refusal. 'You shall not pass
    through' preserves the firmness of the denial and fits the direct speech. 'Pass
    through' reflects עבר in the sense of traversing territory.
- source_word: וַיֵּצֵא אֱדוֹם
  chosen: And Edom came out
  alternatives:
  - Then Edom went out
  - And Edom marched out
  lexicon: HALOT
  rationale: יצא literally means 'go out/come out.' 'Came out' is natural in English
    from the narrator's perspective and avoids over-interpreting as a military march,
    though the following phrases imply armed opposition.
- source_word: לִקְרָאתוֹ
  chosen: to meet him
  alternatives:
  - against him
  - to confront him
  lexicon: HALOT
  rationale: לקראת commonly means 'to meet.' In this hostile context it implies confrontation,
    but the base sense should be retained in the main text rather than importing hostility
    into the verb itself.
- source_word: בְּעַם כָּבֵד
  chosen: with a large force
  alternatives:
  - with a heavy people
  - with a great multitude
  - with many people
  lexicon: HALOT
  rationale: The idiom literally reads 'with a heavy people,' where כבד conveys weightiness/impressiveness.
    In context it refers to a substantial body of people, likely military. 'Large
    force' communicates the idiomatic sense in readable modern English.
- source_word: וּבְיָד חֲזָקָה
  chosen: and with a strong hand
  alternatives:
  - and with a mighty hand
  - and with force
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for strength/power. 'Strong hand' preserves
    the imagery and allows readers to hear the Hebrew expression, while still making
    sense in English. 'Mighty hand' is possible, but 'strong' more directly reflects
    חזק.
