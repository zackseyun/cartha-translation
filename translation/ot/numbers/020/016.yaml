id: NUM.20.16
reference: Numbers 20:16
source:
  edition: WLC
  text: וַ/נִּצְעַ֤ק אֶל יְהוָה֙ וַ/יִּשְׁמַ֣ע קֹלֵ֔/נוּ וַ/יִּשְׁלַ֣ח מַלְאָ֔ךְ וַ/יֹּצִאֵ֖/נוּ מִ/מִּצְרָ֑יִם וְ/הִנֵּה֙ אֲנַ֣חְנוּ בְ/קָדֵ֔שׁ עִ֖יר קְצֵ֥ה גְבוּלֶֽ/ךָ־׃
translation:
  text: And we cried out to Yahweh, and he heard our voice and sent a messenger and brought us out of Egypt. And behold, we are in Kadesh, a city at the edge of your border.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a messenger.' The Hebrew word can refer to either a human or heavenly messenger, though in this context many understand it as an angelic messenger from God.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנִּצְעַק
  chosen: we cried out
  alternatives:
  - we called out
  - we cried
  lexicon: HALOT
  rationale: The verb צעק conveys an urgent cry for help, stronger than a neutral 'said' or 'prayed.' 'Cried out' preserves the distress implied in Israel's appeal.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּשְׁמַע קֹלֵנוּ
  chosen: he heard our voice
  alternatives:
  - he heard us
  - he listened to our voice
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'heard our voice.' This idiom means hearing their plea, but the more literal wording is natural enough in English and preserves the source imagery.
- source_word: מַלְאָךְ
  chosen: an angel
  alternatives:
  - a messenger
  lexicon: HALOT
  rationale: מלאך can mean either 'messenger' or 'angel.' In the exodus context, the referent is traditionally understood as a divine messenger, and 'angel' is the most natural English rendering. The lexical alternative is preserved in a footnote because the Hebrew term itself is broader.
- source_word: וַיֹּצִאֵנוּ מִמִּצְרָיִם
  chosen: brought us out of Egypt
  alternatives:
  - led us out of Egypt
  - brought us forth from Egypt
  lexicon: HALOT
  rationale: The hiphil of יצא commonly means 'bring out' or 'lead out.' 'Brought us out' is idiomatic, clear, and standard for exodus language.
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - Now look
  - See
  lexicon: HALOT
  rationale: הנה is a discourse marker drawing attention to the present situation. 'And look' preserves that force in readable modern English better than the archaic 'behold.'
- source_word: בְקָדֵשׁ
  chosen: in Kadesh
  alternatives:
  - at Kadesh
  lexicon: HALOT
  rationale: The preposition ב commonly means 'in' here, referring to their present location. 'In Kadesh' is straightforward and natural.
- source_word: עִיר קְצֵה גְבוּלֶךָ
  chosen: a city at the edge of your border
  alternatives:
  - a city on the edge of your territory
  - a city at the end of your border
  lexicon: HALOT
  rationale: The construct phrase identifies Kadesh as a city situated at the extremity of Edom's border. 'At the edge of your border' is idiomatic and preserves the spatial sense of קצה.
