theological_decisions:
- issue: Identity of מַלְאָךְ in the exodus reference
  chosen_reading: Render the noun lexically as 'an angel' without specifying the messenger's precise identity.
  alternative_readings:
  - a messenger
  - the angel of the LORD understood by some as a special divine manifestation
  rationale: The verse itself states only that the LORD 'sent an angel.' It does not explicitly identify this figure further. To avoid importing a more specific theological claim than the text makes, the translation keeps the common lexical sense 'angel' and preserves the broader lexical alternative in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
