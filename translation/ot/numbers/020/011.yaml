theological_decisions:
- issue: Narrative wording of Moses' action toward the rock
  chosen_reading: Retain the plain historical description 'struck the rock with his
    staff twice' without importing interpretive judgment into the verse itself.
  alternative_readings:
  - Expanded renderings that imply disobedience within the translation line itself
  rationale: The broader context presents Moses' action as significant and problematic,
    but this verse itself narrates the act and its result. Optimal equivalence preserves
    the event without adding theological commentary not explicit in the wording.
  doctrine_reference: Translation philosophy §1, §3
