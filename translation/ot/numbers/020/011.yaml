id: NUM.20.11
reference: Numbers 20:11
source:
  edition: WLC
  text: וַ/יָּ֨רֶם מֹשֶׁ֜ה אֶת יָד֗/וֹ וַ/יַּ֧ךְ אֶת הַ/סֶּ֛לַע בְּ/מַטֵּ֖/הוּ פַּעֲמָ֑יִם
    וַ/יֵּצְאוּ֙ מַ֣יִם רַבִּ֔ים וַ/תֵּ֥שְׁתְּ הָ/עֵדָ֖ה וּ/בְעִירָֽ/ם־־׃ס
translation:
  text: Then Moses raised his hand and struck the rock with his staff twice, and abundant
    water came out, and the congregation drank, along with their livestock.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּרֶם
  chosen: raised
  alternatives:
  - lifted up
  lexicon: HALOT
  rationale: The verb רוּם in the Hiphil here means to lift or raise. 'Raised' is
    natural modern English and preserves the physical action without unnecessary formality.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: A straightforward rendering of the singular noun with 3ms suffix. No
    idiomatic adjustment is needed.
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - hit
  - smote
  lexicon: HALOT
  rationale: נכה commonly means to strike/smite. 'Struck' is clear, dignified modern
    English; 'smote' is archaic, and 'hit' is too flat for the narrative tone.
- source_word: הַסֶּלַע
  chosen: the rock
  alternatives:
  - the crag
  lexicon: HALOT
  rationale: סֶלַע denotes a rock/cliff. 'The rock' is the standard and contextually
    appropriate rendering for the object Moses strikes.
- source_word: בְּמַטֵּהוּ
  chosen: with his staff
  alternatives:
  - with his rod
  lexicon: HALOT
  rationale: מַטֶּה can be 'staff' or 'rod.' 'Staff' is more natural in contemporary
    English narrative while still fitting Moses' instrument.
- source_word: פַּעֲמָיִם
  chosen: twice
  alternatives:
  - two times
  lexicon: HALOT
  rationale: The dual adverb is best rendered idiomatically as 'twice.'
- source_word: וַיֵּצְאוּ מַיִם רַבִּים
  chosen: abundant water came out
  alternatives:
  - much water came out
  - water came out in abundance
  lexicon: HALOT
  rationale: The plural adjective רַבִּים with 'water' indicates quantity. 'Abundant
    water came out' preserves the sense of plentiful supply in readable English.
- source_word: וַתֵּשְׁתְּ
  chosen: drank
  lexicon: HALOT
  rationale: Though the Hebrew verb is feminine singular agreeing with the collective
    feminine noun עֵדָה, English naturally renders the action with plural sense only
    if the subject is recast. Here the singular collective 'congregation' still takes
    the idiomatic verb 'drank' in narrative translation.
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the community
  - the assembly
  lexicon: HALOT
  rationale: עֵדָה often refers to the assembled Israelite community. 'Congregation'
    preserves the collective sense and matches Pentateuchal usage well.
- source_word: וּבְעִירָם
  chosen: along with their livestock
  alternatives:
  - and their cattle
  - and their beasts
  lexicon: HALOT
  rationale: בְּעִיר refers broadly to beasts/livestock. 'Livestock' is accurate and
    contemporary; 'cattle' would be too narrow, and 'beasts' too archaic or vague.
