id: NUM.20.19
reference: Numbers 20:19
source:
  edition: WLC
  text: וַ/יֹּאמְר֨וּ אֵלָ֥י/ו בְּנֵֽי יִשְׂרָאֵ֘ל בַּֽ/מְסִלָּ֣ה נַעֲלֶה֒ וְ/אִם
    מֵימֶ֤י/ךָ נִשְׁתֶּה֙ אֲנִ֣י וּ/מִקְנַ֔/י וְ/נָתַתִּ֖י מִכְרָ֑/ם רַ֥ק אֵין דָּבָ֖ר
    בְּ/רַגְלַ֥/י אֶֽעֱבֹֽרָה־־־׃
translation:
  text: And the sons of Israel said to him, “We will go up on the highway, and if
    I and my livestock drink your water, then I will pay its price. Only let me pass
    through on foot—nothing more.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites.” The Hebrew reads “the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “on the main road.” The Hebrew term refers to a highway or raised roadway.
    reason: lexical_alternative
  - marker: c
    text: Literally “with my feet I will pass through,” an idiom for simple passage
      through the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Formal rendering preserves the Hebrew idiom and matches the masculine
    plural form. 'Israelites' is smoother English but slightly less transparent to
    the source wording.
- source_word: בַּמְסִלָּה
  chosen: on the highway
  alternatives:
  - by the highway
  - on the main road
  lexicon: HALOT
  rationale: מְסִלָּה denotes a raised road or highway. 'On the highway' best fits
    the sense of traveling along the established route through the land.
- source_word: נַעֲלֶה
  chosen: we will go up
  alternatives:
  - we will pass through
  - we will travel
  lexicon: HALOT
  rationale: The verb is literally 'go up.' Because the context is movement through
    territory, the literal sense is retained rather than flattening it to 'pass through'
    here.
- source_word: מֵימֶיךָ
  chosen: your water
  alternatives:
  - water from you
  - your waters
  lexicon: HALOT
  rationale: The plural form for 'water' is idiomatic in Hebrew; singular 'water'
    is natural English.
- source_word: נִשְׁתֶּה אֲנִי וּמִקְנַי
  chosen: I and my livestock drink
  alternatives:
  - we drink, I and my livestock
  - I and my cattle drink
  lexicon: HALOT
  rationale: The singular pronoun followed by 'my livestock' reflects the speaker
    representing the people. 'Livestock' is broader and more natural than 'cattle'
    for מִקְנֶה.
- source_word: וְנָתַתִּי מִכְרָם
  chosen: then I will pay its price
  alternatives:
  - then I will give their price
  - then I will pay for it
  lexicon: HALOT
  rationale: מֶכֶר refers to price or payment. The suffix likely refers to the water
    consumed. 'Pay its price' preserves the transactional sense clearly in English.
- source_word: רַק
  chosen: Only
  alternatives:
  - just
  - surely
  lexicon: HALOT
  rationale: 'Introduces the limiting request emphatically: they ask for nothing beyond
    passage.'
- source_word: אֵין דָּבָר
  chosen: nothing more
  alternatives:
  - there is no matter
  - it is no big thing
  lexicon: HALOT
  rationale: This idiom minimizes the request. 'Nothing more' communicates the sense
    succinctly in natural English.
- source_word: בְּרַגְלַי אֶעֱבֹרָה
  chosen: let me pass through on foot
  alternatives:
  - I will pass through with my feet
  - I will only pass through
  lexicon: HALOT
  rationale: The phrase literally mentions the feet, idiomatically indicating passage
    by foot, that is, straightforward transit without hostile action. 'Let me pass
    through on foot' captures both the idiom and the requestive force in context.
