id: NUM.20.28
reference: Numbers 20:28
source:
  edition: WLC
  text: וַ/יַּפְשֵׁט֩ מֹשֶׁ֨ה אֶֽת אַהֲרֹ֜ן אֶת בְּגָדָ֗י/ו וַ/יַּלְבֵּ֤שׁ אֹתָ/ם֙
    אֶת אֶלְעָזָ֣ר בְּנ֔/וֹ וַ/יָּ֧מָת אַהֲרֹ֛ן שָׁ֖ם בְּ/רֹ֣אשׁ הָ/הָ֑ר וַ/יֵּ֧רֶד
    מֹשֶׁ֛ה וְ/אֶלְעָזָ֖ר מִן הָ/הָֽר־־־־׃
translation:
  text: So Moses stripped Aaron of his garments and put them on Eleazar his son, and
    Aaron died there on the top of the mountain. Then Moses and Eleazar came down
    from the mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, Aaron's official priestly garments were transferred to Eleazar
      as part of the succession described in the surrounding context.
    reason: cultural_note
  - marker: b
    text: Or 'on the summit of the mountain.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּפְשֵׁט
  chosen: stripped
  alternatives:
  - removed
  - stripped off
  lexicon: HALOT
  rationale: The Hifil of פשט here means to remove clothing from someone. 'Stripped'
    is direct and natural in English, while still matching the concrete action of
    removing Aaron's priestly garments.
- source_word: בְּגָדָיו
  chosen: his garments
  alternatives:
  - his clothes
  - his vestments
  lexicon: HALOT
  rationale: בגד is a general term for garments/clothing. In this priestly succession
    context, 'garments' preserves the formal tone and allows the reader to recognize
    these as Aaron's official priestly clothes without over-specifying 'vestments,'
    which the Hebrew itself does not state explicitly.
- source_word: וַיַּלְבֵּשׁ אֹתָם אֶת אֶלְעָזָר בְּנוֹ
  chosen: put them on Eleazar his son
  alternatives:
  - clothed Eleazar his son with them
  - dressed Eleazar his son in them
  lexicon: HALOT
  rationale: 'The verb לבש in Hifil means to clothe someone. ''Put them on Eleazar
    his son'' is idiomatic modern English and keeps the object sequence clear: the
    garments removed from Aaron are placed on Eleazar.'
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - passed away
  lexicon: HALOT
  rationale: מות is the ordinary verb 'to die.' 'Died' is the plain, accurate rendering
    and avoids euphemism.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: The adverb marks the location of Aaron's death and is best preserved
    explicitly as 'there.'
- source_word: בְּרֹאשׁ הָהָר
  chosen: on the top of the mountain
  alternatives:
  - on the summit of the mountain
  - at the top of the mountain
  lexicon: HALOT
  rationale: ראשׁ literally means 'head,' idiomatically 'top/summit.' 'On the top
    of the mountain' is clear, natural, and preserves the spatial imagery.
- source_word: וַיֵּרֶד
  chosen: came down
  alternatives:
  - went down
  - descended
  lexicon: HALOT
  rationale: ירד means 'go down/come down.' Because the narrative viewpoint follows
    Moses and Eleazar returning from the mountain, 'came down' is natural English
    narrative style.
- source_word: מִן הָהָר
  chosen: from the mountain
  alternatives:
  - off the mountain
  lexicon: HALOT
  rationale: The prepositional phrase is straightforward. 'From the mountain' is the
    most neutral and literal rendering.
