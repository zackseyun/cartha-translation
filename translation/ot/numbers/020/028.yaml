theological_decisions:
- issue: Nature of Aaron's garments in the transfer to Eleazar
  chosen_reading: Rendered as 'garments' without adding 'priestly' in the main text
  alternative_readings:
  - his priestly garments
  - his vestments
  rationale: The broader context makes clear these are Aaron's high-priestly garments,
    but this verse itself uses the ordinary noun for garments. To avoid importing
    more than the Hebrew explicitly states, the main text keeps 'garments,' while
    the contextual significance is left implicit.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; consistency of key terms, or documented exception.'
