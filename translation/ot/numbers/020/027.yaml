id: NUM.20.27
reference: Numbers 20:27
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ מֹשֶׁ֔ה כַּ/אֲשֶׁ֖ר צִוָּ֣ה יְהוָ֑ה וַֽ/יַּעֲלוּ֙ אֶל הֹ֣ר הָ/הָ֔ר לְ/עֵינֵ֖י כָּל הָ/עֵדָֽה־־׃
translation:
  text: Moses did as Yahweh commanded, and they went up Mount Hor before the eyes of all the congregation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''before the eyes of all the congregation,'' that is, publicly and in full view of the assembled people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: HALOT
  rationale: The verb עשה here introduces Moses' obedience to the command just given. 'Did' is the most natural and sufficiently formal rendering in English, preserving the straightforward narrative style.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according to what
  lexicon: HALOT
  rationale: This comparative/subordinating expression links Moses' action directly to the divine command. 'As' is concise and idiomatic in 'did as ... commanded.'
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: HALOT
  rationale: צוה regularly denotes authoritative command. 'Commanded' best preserves the force of divine authority without softening it.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיַּעֲלוּ
  chosen: they went up
  alternatives:
  - they ascended
  - they went up
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend.' 'They went up' is natural modern English and fits the narrative movement to a mountain. 'Ascended' is possible but sounds more elevated than the context requires.
- source_word: אֶל הֹר הָהָר
  chosen: to Mount Hor
  alternatives:
  - to Hor the mountain
  - to Hor Mountain
  lexicon: HALOT
  rationale: This is the standard English transliteration of the place name. Although the Hebrew form is literally 'Hor the mountain,' English idiom treats it as the proper name 'Mount Hor.'
- source_word: לְעֵינֵי
  chosen: before the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: The phrase literally means 'before the eyes of' and emphasizes public visibility. This rendering preserves the Hebrew imagery while remaining clear.
- source_word: כָּל הָעֵדָה
  chosen: all the congregation
  alternatives:
  - all the assembly
  - the whole community
  lexicon: HALOT
  rationale: עֵדָה commonly refers to the gathered Israelite community. 'Congregation' is a standard and contextually fitting rendering in Numbers, though 'assembly' is also viable. 'All the congregation' closely follows the Hebrew wording.
