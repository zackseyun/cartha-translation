id: NUM.20.21
reference: Numbers 20:21
source:
  edition: WLC
  text: וַ/יְמָאֵ֣ן אֱד֗וֹם נְתֹן֙ אֶת יִשְׂרָאֵ֔ל עֲבֹ֖ר בִּ/גְבֻל֑/וֹ וַ/יֵּ֥ט יִשְׂרָאֵ֖ל
    מֵ/עָלָֽי/ו׀־׃פ
translation:
  text: But Edom refused to let Israel pass through his territory, so Israel turned
    away from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turned aside from him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמָאֵן
  chosen: refused
  alternatives:
  - was unwilling
  - declined
  lexicon: HALOT
  rationale: The verb מאן denotes refusal or unwillingness. 'Refused' is the most
    natural and sufficiently strong English rendering in narrative context.
- source_word: אֱדוֹם
  chosen: Edom
  rationale: Proper national name is transliterated per translation philosophy.
- source_word: נְתֹן
  chosen: to let
  alternatives:
  - to give
  - to allow
  lexicon: HALOT
  rationale: 'The infinitive absolute/construct of נתן here functions idiomatically
    with מאן: ''refused to give/allow.'' In English, ''refused to let'' best captures
    the sense of permission being denied.'
- source_word: עֲבֹר
  chosen: pass through
  alternatives:
  - cross through
  - pass
  lexicon: HALOT
  rationale: עבר with the territorial phrase indicates transit through a land or border
    region. 'Pass through' is idiomatic and precise.
- source_word: בִּגְבֻלוֹ
  chosen: through his territory
  alternatives:
  - through his border
  - within his boundary
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory. In this context of requesting
    passage through Edom's land, 'territory' communicates the practical sense better
    than the more literal but less natural 'border.' The preposition is absorbed idiomatically
    into 'through his territory.'
- source_word: וַיֵּט
  chosen: turned away
  alternatives:
  - turned aside
  - deviated
  lexicon: HALOT
  rationale: נטה commonly means to turn aside or deviate. 'Turned away' reads naturally
    in English and fits the context of Israel changing course rather than entering
    Edom.
- source_word: מֵעָלָיו
  chosen: from him
  alternatives:
  - away from him
  - from against him
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'from upon him,' but idiomatically
    indicates movement away from Edom. 'From him' is concise; the directional nuance
    is already conveyed by 'turned away.'
