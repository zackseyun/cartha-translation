theological_decisions:
- issue: Nature of Moses and Aaron's failure
  chosen_reading: Render the charge as failure to believe God and to treat him as
    holy publicly, without specifying beyond the text exactly how their act constituted
    unbelief.
  alternative_readings:
  - failure to trust God
  - failure to honor God as holy
  - failure to uphold God's holiness before Israel
  rationale: 'The verse itself states both elements: lack of belief in God and failure
    to sanctify/treat him as holy before Israel. The translation preserves this tension
    rather than collapsing it into a single explanatory paraphrase.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Rendering of בני ישראל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is grammatically masculine in a standard covenantal ethnonym.
    Per project policy, the translation keeps the gender-accurate form rather than
    neutralizing it in the main text.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
