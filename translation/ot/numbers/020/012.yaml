id: NUM.20.12
reference: Numbers 20:12
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָה֮ אֶל מֹשֶׁ֣ה וְ/אֶֽל אַהֲרֹן֒ יַ֚עַן לֹא הֶאֱמַנְתֶּ֣ם
    בִּ֔/י לְ/הַ֨קְדִּישֵׁ֔/נִי לְ/עֵינֵ֖י בְּנֵ֣י יִשְׂרָאֵ֑ל לָ/כֵ֗ן לֹ֤א תָבִ֨יאוּ֙
    אֶת הַ/קָּהָ֣ל הַ/זֶּ֔ה אֶל הָ/אָ֖רֶץ אֲשֶׁר נָתַ֥תִּי לָ/הֶֽם־־־־־־׃
translation:
  text: And the LORD said to Moses and to Aaron, “Because you did not believe in me,
    to treat me as holy before the eyes of the sons of Israel, therefore you shall
    not bring this assembly into the land that I have given them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “you did not trust me.” The Hebrew verb can carry the sense of believing
      or trusting.
    reason: lexical_alternative
  - marker: b
    text: Or “to sanctify me” or “to uphold me as holy.”
    reason: lexical_alternative
  - marker: c
    text: Hebrew “the sons of Israel”; traditionally “the children of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and established English convention.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - Forasmuch as
  lexicon: HALOT
  rationale: Introduces the causal clause naturally in modern English while remaining
    close to the Hebrew sense.
- source_word: הֶאֱמַנְתֶּם בִּי
  chosen: you did not believe in me
  alternatives:
  - you did not trust me
  - you did not have faith in me
  lexicon: HALOT
  rationale: The Hiphil of אמן with ב conveys believing/trusting in someone. 'Believe
    in me' is the most direct formal rendering; 'trust me' is a viable contextual
    alternative but slightly more interpretive.
- source_word: לְהַקְדִּישֵׁנִי
  chosen: to treat me as holy
  alternatives:
  - to sanctify me
  - to show my holiness
  - to uphold me as holy
  lexicon: HALOT
  rationale: The Hiphil of קדש here means to regard or present God as holy before
    the people. 'Treat me as holy' is clear modern English and preserves the causative/public
    sense better than the more opaque 'sanctify me.'
- source_word: לְעֵינֵי
  chosen: before the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: A fairly literal rendering of the idiom that remains understandable in
    English and preserves the public, visible dimension of the offense.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Retains the gender-accurate form of the Hebrew expression in keeping
    with project policy. 'Israelites' is smoother but less formally transparent; 'children
    of Israel' is traditional but less natural in contemporary English.
- source_word: לָכֵן
  chosen: therefore
  alternatives:
  - so
  - for that reason
  lexicon: HALOT
  rationale: Marks the consequence with a formal connective that matches the judicial
    tone of the sentence.
- source_word: תָבִיאוּ
  chosen: you shall not bring
  alternatives:
  - you will not bring
  - you shall not lead in
  lexicon: HALOT
  rationale: The Hiphil of בוא means to cause to enter/bring in. 'Bring' fits the
    object 'this assembly' and the destination 'into the land.' 'Shall not' preserves
    the solemn declarative force.
- source_word: הַקָּהָל
  chosen: this assembly
  alternatives:
  - this congregation
  - this community
  lexicon: HALOT
  rationale: '''Assembly'' is a clear rendering for קהל in this wilderness context
    and avoids overly ecclesiastical connotations of ''congregation'' while preserving
    the gathered-people sense.'
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Pentateuchal covenant context, 'the land' is the standard and theologically
    loaded rendering, referring to the promised land.
- source_word: אֲשֶׁר נָתַתִּי לָהֶם
  chosen: that I have given them
  alternatives:
  - which I have given them
  - that I am giving them
  lexicon: HALOT
  rationale: The perfect verb can be rendered as a completed gift from the divine
    perspective. 'Have given' preserves the certainty and covenantal force better
    than a simple future-oriented paraphrase.
