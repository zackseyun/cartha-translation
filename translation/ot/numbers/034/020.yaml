id: NUM.34.20
reference: Numbers 34:20
source:
  edition: WLC
  text: וּ/לְ/מַטֵּה֙ בְּנֵ֣י שִׁמְע֔וֹן שְׁמוּאֵ֖ל בֶּן עַמִּיהֽוּד־׃
translation:
  text: 'And for the tribe of the sons of Simeon: Shemuel son of Ammihud.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Shemuel'; traditionally anglicized 'Samuel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/מַטֵּה
  chosen: And for the tribe of
  alternatives:
  - And for the staff of
  - And for the branch of
  lexicon: HALOT
  rationale: In this administrative allotment context, מַטֶּה refers idiomatically
    to a tribal unit rather than a literal staff or branch. The prefixed conjunction
    and preposition are naturally rendered together as 'And for.'
- source_word: בְּנֵי
  chosen: the sons of
  alternatives:
  - the children of
  - the descendants of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural 'sons of.' In tribal formulas it can denote
    descendants, but 'sons of' preserves the Hebrew form and matches the conventional
    tribal designation without obscuring meaning.
- source_word: שִׁמְעוֹן
  chosen: Simeon
  rationale: Standard English transliteration of the personal/tribal name שִׁמְעוֹן.
- source_word: שְׁמוּאֵל
  chosen: Shemuel
  alternatives:
  - Samuel
  rationale: As a personal name, it is transliterated rather than translated. 'Shemuel'
    more closely reflects the Hebrew spelling in this verse; 'Samuel' is a familiar
    anglicized form but less directly tied to the consonantal form here.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The genealogical marker בֶּן is most straightforwardly rendered 'son
    of' in this list of tribal leaders.
- source_word: עַמִּיהוּד
  chosen: Ammihud
  rationale: Standard transliteration of the personal name עַמִּיהוּד.
