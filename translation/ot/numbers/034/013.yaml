id: NUM.34.13
reference: Numbers 34:13
source:
  edition: WLC
  text: וַ/יְצַ֣ו מֹשֶׁ֔ה אֶת בְּנֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר זֹ֣את הָ/אָ֗רֶץ אֲשֶׁ֨ר
    תִּתְנַחֲל֤וּ אֹתָ/הּ֙ בְּ/גוֹרָ֔ל אֲשֶׁר֙ צִוָּ֣ה יְהוָ֔ה לָ/תֵ֛ת לְ/תִשְׁעַ֥ת
    הַ/מַּטּ֖וֹת וַ/חֲצִ֥י הַ/מַּטֶּֽה־׃
translation:
  text: Then Moses commanded the sons of Israel, saying, “This is the land that you
    shall inherit by lot, which the LORD commanded to give to the nine tribes and
    the half-tribe.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites” or “the children of Israel.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: commanded
  alternatives:
  - instructed
  - charged
  lexicon: HALOT
  rationale: The piel of צוה regularly conveys authoritative command rather than mere
    instruction. 'Commanded' best preserves the force of Moses' speech act.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the familial idiom of the Hebrew. While
    'Israelites' is idiomatic English, 'sons of Israel' better reflects the source
    wording and aligns with the gender-accurate policy, since this is a conventional
    corporate designation rather than a statement about only males.
- source_word: זֹאת הָאָרֶץ
  chosen: This is the land
  alternatives:
  - This is the territory
  lexicon: HALOT
  rationale: '''Land'' is the standard rendering for אֶרֶץ here and fits the inheritance-boundary
    context without over-specifying.'
- source_word: תִּתְנַחֲלוּ אֹתָהּ
  chosen: you shall inherit
  alternatives:
  - you shall receive as an inheritance
  - you shall take possession of as an inheritance
  lexicon: HALOT
  rationale: The hitpael of נחל in this context refers to receiving allotted inheritance.
    'Inherit' is concise and accurate; the object pronoun is naturally absorbed in
    English.
- source_word: בְּגוֹרָל
  chosen: by lot
  alternatives:
  - by allotment
  - by casting lots
  lexicon: HALOT
  rationale: '''By lot'' is the conventional and precise expression for distribution
    through lot-casting. It preserves the procedural sense without unnecessary expansion.'
- source_word: אֲשֶׁר צִוָּה יְהוָה
  chosen: which the LORD commanded
  alternatives:
  - which the LORD ordered
  - as the LORD commanded
  lexicon: HALOT
  rationale: The relative clause most naturally modifies the manner of inheritance/allotment
    as something divinely commanded. 'The LORD' follows the project's default rendering
    for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms, יְהוָה is rendered 'the LORD' in keeping
    with Jewish reverence tradition and the Septuagintal pattern.
- source_word: לָתֵת
  chosen: to give
  alternatives:
  - to assign
  - to grant
  lexicon: HALOT
  rationale: '''To give'' is the plain sense of נתן and keeps the clause close to
    the Hebrew. More interpretive options like ''assign'' are possible but less direct.'
- source_word: לְתִשְׁעַת הַמַּטּוֹת וַחֲצִי הַמַּטֶּה
  chosen: to the nine tribes and the half-tribe
  alternatives:
  - to the nine tribes and the half of the tribe
  - to nine tribes and half the tribe
  lexicon: HALOT
  rationale: מַטֶּה here denotes tribal division. The article is naturally represented
    in English as 'the nine tribes and the half-tribe,' referring to the western allotment
    after the Transjordanian inheritance of Reuben, Gad, and half-Manasseh.
