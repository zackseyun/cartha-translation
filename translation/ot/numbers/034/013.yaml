theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD.' This is a translation-policy
    decision rather than a doctrinally disputed point within the verse itself.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Corporate designation בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is grammatically masculine plural in a standard covenantal
    ethnonym. Per the gender-accurate policy, the rendering preserves the source form
    rather than neutralizing it, while recognizing that the referent is the whole
    people.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
