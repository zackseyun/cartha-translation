id: NUM.34.7
reference: Numbers 34:7
source:
  edition: WLC
  text: וְ/זֶֽה יִהְיֶ֥ה לָ/כֶ֖ם גְּב֣וּל צָפ֑וֹן מִן הַ/יָּם֙ הַ/גָּדֹ֔ל תְּתָא֥וּ
    לָ/כֶ֖ם הֹ֥ר הָ/הָֽר־־׃
translation:
  text: 'And this shall be your northern border: from the Great Sea you shall mark
    out for yourselves Mount Hor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'you shall draw the boundary to Mount Hor.' The verb can denote
      tracing or marking out a border line in this geographic context.
    reason: lexical_alternative
  - marker: b
    text: '''The Great Sea'' refers to the Mediterranean Sea.'
    reason: cultural_note
lexical_decisions:
- source_word: וְ/זֶה
  chosen: And this
  alternatives:
  - Now this
  - This
  lexicon: HALOT
  rationale: Introduces the next boundary specification. Retaining the conjunction
    gives the verse its sequential, legislative flow.
- source_word: יִהְיֶה
  chosen: shall be
  alternatives:
  - will be
  - is to be
  lexicon: HALOT
  rationale: Imperfect of היה in legal/boundary description is well represented by
    English future 'shall be,' preserving the prescriptive tone.
- source_word: לָכֶם
  chosen: your
  alternatives:
  - for you
  - belonging to you
  lexicon: HALOT
  rationale: The dative pronoun indicates possession with the boundary; idiomatic
    English expresses this as 'your' border.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  - territory line
  lexicon: HALOT
  rationale: '''Border'' is natural modern English for a territorial limit. ''Boundary''
    is possible, but ''border'' reads more smoothly here while preserving sense.'
- source_word: צָפוֹן
  chosen: northern
  alternatives:
  - north
  - north side
  lexicon: HALOT
  rationale: 'Used attributively with גְּבוּל, so the adjectival rendering ''northern''
    best fits English syntax: ''northern border.'''
- source_word: מִן הַיָּם הַגָּדֹל
  chosen: from the Great Sea
  alternatives:
  - from the great sea
  - from the Mediterranean Sea
  lexicon: HALOT
  rationale: The Hebrew expression is a geographic designation, literally 'the Great
    Sea.' It likely refers to the Mediterranean, but the translation preserves the
    source wording rather than substituting the modern name in the main text.
- source_word: תְּתָאוּ
  chosen: you shall mark out for yourselves
  alternatives:
  - you shall draw
  - you shall outline
  - you shall extend
  lexicon: HALOT
  rationale: The verb in this boundary context denotes marking or tracing out a border
    line/destination. 'Mark out for yourselves' captures both the action and the reflexive/dative
    element expressed by לָכֶם.
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for you
  - yourselves
  lexicon: HALOT
  rationale: Here the repeated pronoun after the verb is best represented explicitly,
    indicating the action is done with reference to Israel's own boundary.
- source_word: הֹר הָהָר
  chosen: Mount Hor
  alternatives:
  - Hor the mountain
  lexicon: HALOT
  rationale: This is a place name, and per translation philosophy personal/place names
    are transliterated by standard conventions. Although the form is unusual ('Hor
    the mountain'), standard English usage is 'Mount Hor.'
