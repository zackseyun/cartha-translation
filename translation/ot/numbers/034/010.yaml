id: NUM.34.10
reference: Numbers 34:10
source:
  edition: WLC
  text: וְ/הִתְאַוִּיתֶ֥ם לָ/כֶ֖ם לִ/גְב֣וּל קֵ֑דְמָ/ה מֵ/חֲצַ֥ר עֵינָ֖ן שְׁפָֽמָ/ה׃
translation:
  text: And you shall mark out for yourselves the eastern border from Hazar-enan to
    Shepham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'draw/outline for yourselves the eastern boundary.' The Hebrew verb here
      is unusual and in this context refers to marking or tracing a border line.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִתְאַוִּיתֶם
  chosen: you shall mark out
  alternatives:
  - you shall draw
  - you shall outline
  - you shall designate
  lexicon: HALOT
  rationale: In this boundary-setting context, the verb refers to tracing or marking
    a border line rather than desire or craving, despite the more common sense of
    the root in other stems/contexts. 'Mark out' is idiomatic modern English and fits
    the legal-geographical setting.
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for you
  rationale: The dative pronoun indicates the action is done for the benefit/possession
    of the Israelites. 'For yourselves' preserves the reflexive-benefactive nuance
    more clearly than simply 'for you.'
- source_word: לִגְבוּל
  chosen: the border
  alternatives:
  - a border
  - boundary
  lexicon: HALOT
  rationale: In the context of territorial delimitation, גְּבוּל denotes a territorial
    boundary. 'Border' is natural English here and pairs well with the directional
    phrase.
- source_word: קֵדְמָה
  chosen: eastern
  alternatives:
  - eastward
  - to the east
  lexicon: HALOT
  rationale: The directional term specifies the side of the land in view. Rendering
    it adjectivally as 'eastern' produces clear English with 'border' while preserving
    the sense.
- source_word: מֵחֲצַר עֵינָן
  chosen: from Hazar-enan
  alternatives:
  - from Hazar Enan
  rationale: This is a place name marking the starting point of the border line. Per
    translation philosophy, names are transliterated rather than translated.
- source_word: שְׁפָמָה
  chosen: to Shepham
  alternatives:
  - toward Shepham
  rationale: Another place name indicating the border's endpoint in this segment.
    English idiom supplies 'to' with 'from' to express the line's extent.
