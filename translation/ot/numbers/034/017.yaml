id: NUM.34.17
reference: Numbers 34:17
source:
  edition: WLC
  text: אֵ֚לֶּה שְׁמ֣וֹת הָֽ/אֲנָשִׁ֔ים אֲשֶׁר יִנְחֲל֥וּ לָ/כֶ֖ם אֶת הָ/אָ֑רֶץ אֶלְעָזָר֙
    הַ/כֹּהֵ֔ן וִ/יהוֹשֻׁ֖עַ בִּן נֽוּן־־־׃
translation:
  text: 'These are the names of the men who shall apportion the land to you as an
    inheritance: Eleazar the priest and Joshua son of Nun.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who shall give you the land as an inheritance' or 'who shall cause
      you to inherit the land.' The Hebrew verb carries the sense of causing or assigning
      an inheritance.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Deictic plural introducing the following identification. English supplies
    'are' naturally in a verbless Hebrew clause.
- source_word: שְׁמוֹת
  chosen: the names of
  alternatives:
  - the names
  lexicon: HALOT
  rationale: Construct form with הָאֲנָשִׁים, yielding 'the names of the men.'
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the persons
  - the people
  lexicon: HALOT
  rationale: Masculine plural noun referring to specific male leaders named in the
    verse. Per gender-accurate policy, 'men' is preferable to a neutral rendering.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative pronoun introducing the defining clause about the named men.
- source_word: יִנְחֲלוּ
  chosen: shall apportion the land to you as an inheritance
  alternatives:
  - shall give you the land as an inheritance
  - shall cause you to inherit the land
  - shall inherit the land for you
  lexicon: HALOT
  rationale: 'From נחל in the Hiphil, the sense is causative: these men are not themselves
    inheriting the land but administering/distributing it so Israel receives it as
    inheritance. ''Apportion ... as an inheritance'' captures both the administrative
    and inheritance senses in context.'
- source_word: לָכֶם
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: Dative pronoun indicating the beneficiaries of the apportionment.
- source_word: אֶת הָאָרֶץ
  chosen: the land
  lexicon: HALOT
  rationale: Direct object of the Hiphil verb; in Numbers this refers to the promised
    land to be allotted among Israel.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Standard English transliteration of the personal name.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Official title identifying Eleazar's role; translated rather than transliterated
    per philosophy for titles/common nouns.
- source_word: וִיהוֹשֻׁעַ
  chosen: and Joshua
  rationale: Standard English transliteration of the personal name with conjunction.
- source_word: בִּן נוּן
  chosen: son of Nun
  alternatives:
  - the son of Nun
  lexicon: HALOT
  rationale: Standard patronymic expression. English omits the second article for
    smoother style while preserving meaning.
