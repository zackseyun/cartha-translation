id: NUM.34.28
reference: Numbers 34:28
source:
  edition: WLC
  text: וּ/לְ/מַטֵּ֥ה בְנֵֽי נַפְתָּלִ֖י נָשִׂ֑יא פְּדַהְאֵ֖ל בֶּן עַמִּיהֽוּד־־׃
translation:
  text: 'And for the tribe of the sons of Naphtali, a leader: Pedahel son of Ammihud.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Naphtali,' a standard tribal designation meaning the descendants
      of Naphtali.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/מַטֵּה
  chosen: And for the tribe of
  alternatives:
  - And for the staff of
  - And for the branch of
  lexicon: HALOT
  rationale: מַטֶּה in tribal-allotment contexts regularly means 'tribe' rather than
    its more concrete senses 'staff/rod.' The prefixed conjunction and preposition
    are naturally rendered together as 'And for.'
- source_word: בְנֵי
  chosen: the sons of
  alternatives:
  - the children of
  - the descendants of
  lexicon: HALOT
  rationale: The construct phrase בְנֵי נַפְתָּלִי is literally 'sons of Naphtali.'
    Per gender-accurate policy, the masculine form is preserved rather than neutralized,
    even though idiomatically it denotes the tribal descendants.
- source_word: נַפְתָּלִי
  chosen: Naphtali
  rationale: Personal/tribal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: נָשִׂיא
  chosen: a leader
  alternatives:
  - a chief
  - a prince
  - a tribal leader
  lexicon: HALOT
  rationale: In this administrative list, נָשִׂיא denotes the appointed tribal head
    or chief. 'Leader' is clear modern English and fits the context without importing
    monarchical overtones that 'prince' may suggest.
- source_word: פְּדַהְאֵל
  chosen: Pedahel
  rationale: Proper name transliterated.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: Standard patronymic formula; 'son of' is the direct and natural rendering.
- source_word: עַמִּיהוּד
  chosen: Ammihud
  rationale: Proper name transliterated.
