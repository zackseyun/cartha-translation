id: NUM.34.29
reference: Numbers 34:29
source:
  edition: WLC
  text: אֵ֕לֶּה אֲשֶׁ֖ר צִוָּ֣ה יְהוָ֑ה לְ/נַחֵ֥ל אֶת בְּנֵֽי יִשְׂרָאֵ֖ל בְּ/אֶ֥רֶץ כְּנָֽעַן־־׃פ
translation:
  text: These are the ones whom Yahweh commanded to apportion the inheritance to the sons of Israel in the land of Canaan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'These are those whom the LORD commanded to give the inheritance to the sons of Israel in the land of Canaan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are the ones
  alternatives:
  - These are those
  - These
  lexicon: HALOT
  rationale: The demonstrative introduces the concluding identification of the appointed leaders. 'These are the ones' is natural English while preserving the referential force.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  - who
  lexicon: HALOT
  rationale: Relative pronoun referring to persons; 'whom' fits the object role after 'commanded' in formal English.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - appointed
  - charged
  lexicon: HALOT
  rationale: The verb צוה normally means 'command.' Although the context involves official appointment, 'commanded' best preserves the lexical sense; the content of the command is expressed by the infinitive that follows.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לְנַחֵל
  chosen: to apportion the inheritance
  alternatives:
  - to give as an inheritance
  - to divide for inheritance
  - to assign as inheritance
  lexicon: HALOT
  rationale: The Hiphil of נחל here denotes causing Israel to receive/distribute the land as inheritance. 'Apportion the inheritance' captures both the allotment process and the inheritance concept in context.
- source_word: אֶת בְּנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - the Israelites
  - to the people of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'the sons of Israel.' In keeping with gender-accurate policy and the formal cast of the verse, this is retained rather than flattened to 'Israelites.' The preposition 'to' is supplied idiomatically in English with 'apportion the inheritance to.'
- source_word: בְּאֶרֶץ כְּנָעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  - in the land Canaan
  lexicon: HALOT
  rationale: The construct-like phrase is most naturally rendered 'in the land of Canaan,' preserving both the geographic designation and the noun 'land.'
