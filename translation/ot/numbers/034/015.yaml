id: NUM.34.15
reference: Numbers 34:15
source:
  edition: WLC
  text: שְׁנֵ֥י הַ/מַּטּ֖וֹת וַ/חֲצִ֣י הַ/מַּטֶּ֑ה לָקְח֣וּ נַחֲלָתָ֗/ם מֵ/עֵ֛בֶר
    לְ/יַרְדֵּ֥ן יְרֵח֖וֹ קֵ֥דְמָ/ה מִזְרָֽחָ/ה׃פ
translation:
  text: The two tribes and the half-tribe have taken their inheritance beyond the
    Jordan at Jericho, eastward, toward the sunrise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "on the other side of the Jordan."
    reason: lexical_alternative
  - marker: b
    text: Hebrew "eastward, toward the sunrise," a doubled expression emphasizing
      the eastern side.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁנֵי הַמַּטּוֹת
  chosen: the two tribes
  alternatives:
  - the two staffs/rods
  lexicon: HALOT
  rationale: מַטֶּה can literally mean 'staff/rod,' but in tribal-allotment contexts
    it idiomatically means 'tribe.' The construct with the numeral yields 'the two
    tribes.'
- source_word: וַחֲצִי הַמַּטֶּה
  chosen: and the half-tribe
  alternatives:
  - and half the tribe
  lexicon: HALOT
  rationale: The phrase refers to the recognized administrative unit of a half-tribe
    (here Manasseh), not merely an abstract fraction. Hyphenation in English preserves
    that sense naturally.
- source_word: לָקְחוּ
  chosen: have taken
  alternatives:
  - took
  - received
  lexicon: HALOT
  rationale: Qal perfect 3cp denotes completed action. In English, 'have taken' fits
    the immediate explanatory context of vv. 14–15, though simple past would also
    be possible. 'Received' is interpretive and less directly tied to the verb לקח.
- source_word: נַחֲלָתָם
  chosen: their inheritance
  alternatives:
  - their possession
  - their allotted inheritance
  lexicon: HALOT
  rationale: נַחֲלָה in land-distribution contexts commonly denotes inherited allotment.
    'Inheritance' preserves the covenantal-land nuance better than the flatter 'possession.'
- source_word: מֵעֵבֶר לְיַרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - on the other side of the Jordan
  - across the Jordan
  lexicon: HALOT
  rationale: The idiom means the region across/beyond the Jordan from the speaker's
    frame of reference. 'Beyond the Jordan' is concise and standard while remaining
    faithful.
- source_word: יְרֵחוֹ
  chosen: at Jericho
  alternatives:
  - by Jericho
  - near Jericho
  lexicon: HALOT
  rationale: The place name functions adverbially to locate the Jordan crossing region.
    'At Jericho' is natural English and sufficiently precise.
- source_word: קֵדְמָה
  chosen: eastward
  alternatives:
  - to the east
  - on the east side
  lexicon: HALOT
  rationale: The directional form with ה locale indicates direction/orientation eastward.
    'Eastward' preserves the adverbial force.
- source_word: מִזְרָחָה
  chosen: toward the sunrise
  alternatives:
  - eastward
  - toward the east
  lexicon: HALOT
  rationale: Though often rendered simply 'east,' the noun derives from 'rising' and
    literally evokes the sunrise/east. Rendering it distinctly avoids flattening the
    paired expression קֵדְמָה מִזְרָחָה into redundant English while preserving the
    Hebrew emphasis.
