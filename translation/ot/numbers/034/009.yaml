id: NUM.34.9
reference: Numbers 34:9
source:
  edition: WLC
  text: וְ/יָצָ֤א הַ/גְּבֻל֙ זִפְרֹ֔נָ/ה וְ/הָי֥וּ תוֹצְאֹתָ֖י/ו חֲצַ֣ר עֵינָ֑ן זֶֽה
    יִהְיֶ֥ה לָ/כֶ֖ם גְּב֥וּל צָפֽוֹן־׃
translation:
  text: Then the border shall extend to Ziphron, and its endpoint shall be Hazar-enan.
    This shall be your northern border.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'its outgoings shall be Hazar-enan.' The Hebrew uses
      a plural expression for the border’s termination.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  chosen: shall extend
  alternatives:
  - shall go out
  - shall run
  lexicon: HALOT
  rationale: In boundary descriptions, יצא commonly describes the course or extension
    of a border line rather than literal motion. 'Shall extend' is natural English
    while preserving the geographic sense.
- source_word: הַגְּבֻל
  chosen: the border
  alternatives:
  - the boundary
  lexicon: HALOT
  rationale: גְּבוּל denotes a territorial border or boundary. 'Border' is concise
    and idiomatic in this land-allotment context.
- source_word: זִפְרֹנָה
  chosen: to Ziphron
  alternatives:
  - toward Ziphron
  rationale: This is a place name and is transliterated per translation policy. The
    directional ending indicates movement toward that location, well represented by
    'to Ziphron'.
- source_word: וְהָיוּ תוֹצְאֹתָיו
  chosen: and its endpoint shall be
  alternatives:
  - and its extremities shall be
  - and its termination shall be
  - and its outgoings shall be
  lexicon: HALOT
  rationale: 'תוֹצָאוֹת in border texts refers to the termination or outer limit of
    the line. Although formally plural (''its goings out/endings''), English idiom
    prefers a singular collective expression here: ''its endpoint shall be.'''
- source_word: חֲצַר עֵינָן
  chosen: Hazar-enan
  alternatives:
  - Hazar Enan
  rationale: This is a place name and is transliterated rather than translated. The
    hyphenated form reflects standard English presentation of the compound name.
- source_word: זֶה יִהְיֶה לָכֶם
  chosen: This shall be your
  alternatives:
  - This shall belong to you as
  - This will be for you
  lexicon: HALOT
  rationale: This clause summarizes and identifies the described line as belonging
    to Israel. 'This shall be your' is straightforward and idiomatic.
- source_word: גְּבֻל צָפוֹן
  chosen: northern border
  alternatives:
  - north border
  - border on the north
  lexicon: HALOT
  rationale: The construct phrase denotes the border on the north side. 'Northern
    border' is the most natural English equivalent.
