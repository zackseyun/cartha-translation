id: NUM.34.26
reference: Numbers 34:26
source:
  edition: WLC
  text: וּ/לְ/מַטֵּ֥ה בְנֵֽי יִשָׂשכָ֖ר נָשִׂ֑יא פַּלְטִיאֵ֖ל בֶּן עַזָּֽן־־׃
translation:
  text: 'And for the tribe of the sons of Issachar, a leader: Paltiel son of Azzan.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/לְ/מַטֵּה
  chosen: And for the tribe of
  alternatives:
  - And for the staff of
  - And for the branch of
  lexicon: HALOT
  rationale: מַטֶּה in tribal-allotment and census contexts commonly denotes a 'tribe'
    (literally 'staff/branch'). The prefixed conjunction and preposition are best
    represented together as 'And for' in this list format.
- source_word: בְנֵי
  chosen: the sons of
  alternatives:
  - the children of
  - the descendants of
  lexicon: HALOT
  rationale: בְנֵי is formally 'sons of' and here forms the standard tribal designation
    'sons of Issachar.' Following the gender-accurate policy, the masculine form is
    retained rather than neutralized.
- source_word: יִשָׂשכָר
  chosen: Issachar
  rationale: Proper tribal/personal name; transliterated by standard English convention.
- source_word: נָשִׂיא
  chosen: a leader
  alternatives:
  - chief
  - prince
  - leader
  lexicon: HALOT
  rationale: In Numbers 34 this term refers to the appointed tribal representative.
    'Leader' is clear modern English and fits the administrative role better than
    the more archaic or potentially misleading 'prince.' The indefinite article reflects
    normal English syntax in this appositional list.
- source_word: פַּלְטִיאֵל
  chosen: Paltiel
  rationale: Proper personal name; transliterated rather than translated.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: Standard patronymic marker; 'son of' is the direct and natural rendering
    here.
- source_word: עַזָּן
  chosen: Azzan
  rationale: Proper personal name; transliterated by standard convention.
