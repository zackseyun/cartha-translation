id: NUM.34.5
reference: Numbers 34:5
source:
  edition: WLC
  text: וְ/נָסַ֧ב הַ/גְּב֛וּל מֵ/עַצְמ֖וֹן נַ֣חְלָ/ה מִצְרָ֑יִם וְ/הָי֥וּ תוֹצְאֹתָ֖י/ו
    הַ/יָּֽמָּ/ה׃
translation:
  text: Then the border shall turn from Azmon to the Brook of Egypt, and its end shall
    be at the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the Wadi of Egypt.' The Hebrew נחל often refers to a seasonal watercourse
      or wadi; 'Brook of Egypt' is retained in the main text for readability and continuity.
    reason: lexical_alternative
  - marker: b
    text: Or 'its extremities shall be at the sea.' The Hebrew uses a plural form
      ('its goings out/endings') for the border's terminal point.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסַב
  chosen: Then ... shall turn
  alternatives:
  - and ... turned
  - and ... shall go around
  lexicon: HALOT
  rationale: The verb נסב in this boundary-description context denotes a change in
    direction of the border line. English 'shall turn' is natural and preserves the
    future-like force of the Hebrew sequence. 'Then' brings out the narrative progression
    of the boundary markers.
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  lexicon: HALOT
  rationale: In territorial delimitation, גְּבוּל refers to the border/boundary line.
    'Border' is slightly more idiomatic in modern English while retaining the geographic
    sense.
- source_word: מֵעַצְמוֹן
  chosen: from Azmon
  rationale: Proper place name; transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: נַחְלָה מִצְרַיִם
  chosen: to the Brook of Egypt
  alternatives:
  - to the Wadi of Egypt
  - to the River of Egypt
  lexicon: HALOT
  rationale: נחל commonly denotes a wadi, torrent-bed, or brook rather than a major
    perennial river. In this geographic formula, 'Brook of Egypt' preserves traditional
    recognizability while avoiding the misleading implication of the Nile that 'River
    of Egypt' may suggest. Because 'wadi' may better reflect the Hebrew topography,
    that alternative is preserved in a footnote.
- source_word: וְהָיוּ
  chosen: and ... shall be
  alternatives:
  - and ... will be
  lexicon: HALOT
  rationale: Simple copular verb introducing the final boundary point. 'Shall be'
    matches the formal style of the surrounding boundary description.
- source_word: תּוֹצְאֹתָיו
  chosen: its end
  alternatives:
  - its extremities
  - its termination
  - its outlets
  lexicon: HALOT
  rationale: In boundary texts, תוצאות refers to the outer end-point or termination
    of the border. Singular English 'its end' is the most natural idiomatic rendering,
    even though the Hebrew form is plural in form.
- source_word: הַיָּמָּה
  chosen: at the sea
  alternatives:
  - toward the sea
  - at the Mediterranean Sea
  lexicon: HALOT
  rationale: Literally 'to the sea/sea-ward.' In this land-boundary context it indicates
    the border's terminal point at the sea. 'At the sea' is concise and natural; the
    specific sea is contextually the Great Sea/Mediterranean, but the Hebrew here
    simply says 'the sea.'
