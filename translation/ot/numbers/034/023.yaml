id: NUM.34.23
reference: Numbers 34:23
source:
  edition: WLC
  text: לִ/בְנֵ֣י יוֹסֵ֔ף לְ/מַטֵּ֥ה בְנֵֽי מְנַשֶּׁ֖ה נָשִׂ֑יא חַנִּיאֵ֖ל בֶּן אֵפֹֽד־־׃
translation:
  text: 'For the sons of Joseph, for the tribe of the sons of Manasseh: a leader,
    Hanniel son of Ephod.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descendants of Joseph ... descendants of Manasseh.' The Hebrew repeatedly
      uses 'sons of' in tribal-genealogical language.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִ/בְנֵי יוֹסֵף
  chosen: For the sons of Joseph
  alternatives:
  - For the descendants of Joseph
  - For the children of Joseph
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of.' In tribal/genealogical context it denotes
    descendants, but 'sons of Joseph' preserves the Hebrew form and the representative
    tribal sense without unnecessary paraphrase.
- source_word: לְ/מַטֵּה
  chosen: for the tribe of
  alternatives:
  - for the staff of
  - for the branch of
  lexicon: HALOT
  rationale: מַטֶּה can mean 'staff/rod,' but in census and allotment contexts it
    idiomatically means 'tribe.' The prefixed לְ is carried by 'for.'
- source_word: בְנֵי מְנַשֶּׁה
  chosen: the sons of Manasseh
  alternatives:
  - the descendants of Manasseh
  - the children of Manasseh
  lexicon: HALOT
  rationale: As with 'sons of Joseph,' the construct phrase is best preserved in a
    tribal register. 'Manasseh' is transliterated as a personal/tribal name per translation
    philosophy.
- source_word: נָשִׂיא
  chosen: a leader
  alternatives:
  - chief
  - prince
  - chieftain
  lexicon: HALOT
  rationale: נָשִׂיא in this administrative list refers to an appointed tribal head.
    'Leader' is clear modern English and avoids the potentially misleading royal overtones
    of 'prince,' while still fitting the official role.
- source_word: חַנִּיאֵל
  chosen: Hanniel
  rationale: Personal name transliterated by standard English convention.
- source_word: בֶּן אֵפֹד
  chosen: son of Ephod
  lexicon: HALOT
  rationale: Standard Hebrew patronymic construction. 'Ephod' here is a personal name,
    not the priestly garment, so it is transliterated as a name.
