id: NUM.34.25
reference: Numbers 34:25
source:
  edition: WLC
  text: וּ/לְ/מַטֵּ֥ה בְנֵֽי זְבוּלֻ֖ן נָשִׂ֑יא אֱלִיצָפָ֖ן בֶּן פַּרְנָֽךְ־־׃
translation:
  text: 'And for the tribe of the sons of Zebulun, a leader: Elizaphan son of Parnach.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/לְ/מַטֵּה
  chosen: And for the tribe of
  alternatives:
  - And for the staff of
  - And for the branch of
  lexicon: HALOT
  rationale: מַטֶּה in tribal-allotment contexts regularly means 'tribe' rather than
    its more concrete senses ('staff,' 'rod'). The prefixed conjunction and preposition
    together are best rendered idiomatically as 'And for the tribe of' in this list
    of appointed leaders.
- source_word: בְנֵי זְבוּלֻן
  chosen: the sons of Zebulun
  alternatives:
  - the people of Zebulun
  - the descendants of Zebulun
  lexicon: HALOT
  rationale: בְנֵי literally means 'sons of.' In tribal designations this can function
    corporately, but retaining 'sons of' preserves the Hebrew form and matches the
    source's gendered genealogical language.
- source_word: נָשִׂיא
  chosen: a leader
  alternatives:
  - chief
  - prince
  - leader
  lexicon: HALOT
  rationale: נָשִׂיא denotes a recognized tribal chief or leader. 'Leader' is clear
    modern English and fits the administrative context better than the potentially
    misleading 'prince.' The indefinite sense is natural in English in this appositional
    list.
- source_word: אֱלִיצָפָן
  chosen: Elizaphan
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: בֶּן פַּרְנָךְ
  chosen: son of Parnach
  alternatives:
  - the son of Parnach
  lexicon: HALOT
  rationale: בֶּן is the standard genealogical marker 'son of.' The anarthrous construction
    is naturally rendered without 'the' in English proper-name apposition.
