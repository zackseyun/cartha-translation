id: NUM.34.11
reference: Numbers 34:11
source:
  edition: WLC
  text: וְ/יָרַ֨ד הַ/גְּבֻ֧ל מִ/שְּׁפָ֛ם הָ/רִבְלָ֖ה מִ/קֶּ֣דֶם לָ/עָ֑יִן וְ/יָרַ֣ד
    הַ/גְּב֔וּל וּ/מָחָ֛ה עַל כֶּ֥תֶף יָם כִּנֶּ֖רֶת קֵֽדְמָ/ה־־׃
translation:
  text: Then the border shall go down from Shepham to Riblah, on the east side of
    Ain; and the border shall go down and reach the slope of the Sea of Kinnereth
    on the east.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'east of Ain.' The Hebrew phrase can be rendered more literally as a
      location eastward of Ain.
    reason: lexical_alternative
  - marker: b
    text: Literally 'strike/touch the shoulder of the Sea of Kinnereth'; 'shoulder'
      here refers to the side or slope of the terrain by the sea.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרַד
  chosen: shall go down
  alternatives:
  - shall descend
  - went down
  lexicon: HALOT
  rationale: The verb ירד literally means 'go down/descend.' In boundary descriptions
    it commonly marks movement along the line of the border. 'Shall go down' preserves
    the directional/topographical sense and fits the legal-descriptive future style
    in English.
- source_word: הַגְּבֻל / הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  - the border line
  lexicon: HALOT
  rationale: גְּבוּל denotes a border or boundary. 'Border' is concise and natural
    in a territorial description, while still formally close to the Hebrew.
- source_word: מִשְּׁפָם
  chosen: from Shepham
  rationale: Proper place name; transliterated according to standard English convention
    in keeping with the translation philosophy to transliterate names.
- source_word: הָרִבְלָה
  chosen: to Riblah
  rationale: Proper place name. The prefixed article is commonly retained in the Hebrew
    form of some place names but is not normally represented in English translation;
    the destination sense is conveyed by 'to Riblah.'
- source_word: מִקֶּדֶם לָעָיִן
  chosen: on the east side of Ain
  alternatives:
  - east of Ain
  - to the east of Ain
  lexicon: HALOT
  rationale: מִקֶּדֶם literally means 'from the east' or 'eastward/east of.' In this
    boundary notice it locates Riblah relative to Ain. 'On the east side of Ain' makes
    the relational geography clear in idiomatic English without over-paraphrasing.
- source_word: וּמָחָה
  chosen: reach
  alternatives:
  - strike
  - extend
  - touch
  lexicon: HALOT
  rationale: The verb מחה here is used in a topographical/boundary context. The sense
    is that the border comes to or touches a feature. 'Reach' is clear modern English
    and captures the contact/termination sense better than the overly literal 'strike.'
- source_word: עַל כֶּתֶף
  chosen: the slope of
  alternatives:
  - the shoulder of
  - along the side of
  lexicon: HALOT
  rationale: כֶּתֶף literally means 'shoulder,' but in geographical usage it refers
    to a side, ridge, or slope. 'Slope of' best fits the terrain language here and
    avoids an opaque literalism.
- source_word: יָם כִּנֶּרֶת
  chosen: the Sea of Kinnereth
  alternatives:
  - the Sea of Chinnereth
  - Lake Kinnereth
  lexicon: HALOT
  rationale: The Hebrew names the body of water as 'Sea of Kinnereth.' This preserves
    the Hebrew toponym rather than replacing it with a later or more familiar designation
    such as Sea of Galilee.
- source_word: קֵדְמָה
  chosen: on the east
  alternatives:
  - eastward
  - to the east
  lexicon: HALOT
  rationale: The adverb marks the eastern side/orientation of the Sea of Kinnereth
    in relation to the border. 'On the east' is idiomatic and works smoothly with
    'the slope of the Sea of Kinnereth.'
