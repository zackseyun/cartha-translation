id: NUM.34.2
reference: Numbers 34:2
source:
  edition: WLC
  text: צַ֞ו אֶת בְּנֵ֤י יִשְׂרָאֵל֙ וְ/אָמַרְתָּ֣ אֲלֵ/הֶ֔ם כִּֽי אַתֶּ֥ם בָּאִ֖ים
    אֶל הָ/אָ֣רֶץ כְּנָ֑עַן זֹ֣את הָ/אָ֗רֶץ אֲשֶׁ֨ר תִּפֹּ֤ל לָ/כֶם֙ בְּֽ/נַחֲלָ֔ה
    אֶ֥רֶץ כְּנַ֖עַן לִ/גְבֻלֹתֶֽי/הָ־־־׃
translation:
  text: 'Command the sons of Israel and say to them, ‘When you enter the land of Canaan,
    this is the land that will fall to you as an inheritance: the land of Canaan according
    to its borders.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “that will be allotted to you as an inheritance.” The Hebrew literally
      says “that will fall to you,” an idiom for assigned territorial allotment.
    reason: lexical_alternative
  - marker: b
    text: “Sons of Israel” is the literal Hebrew expression; “Israelites” is a smoother
      English equivalent.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַו
  chosen: Command
  alternatives:
  - Give orders to
  - Instruct
  lexicon: HALOT
  rationale: Imperative of צוה, a strong directive verb. 'Command' best preserves
    the authoritative force without unnecessary expansion.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Per gender-accurate philosophy, the masculine
    form is preserved in the main text rather than neutralizing to 'Israelites,' though
    that is a natural English alternative.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  chosen: and say to them
  alternatives:
  - and tell them
  lexicon: HALOT
  rationale: A straightforward sequential command. 'Say to them' is slightly more
    formal and closer to the Hebrew wording than 'tell them.'
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - that
  lexicon: HALOT
  rationale: Although כי often means 'for/that,' here it introduces the circumstance
    of entering the land. English idiom is best served by 'When you enter,' which
    captures the temporal sense implied by the context.
- source_word: בָּאִים אֶל
  chosen: you enter
  alternatives:
  - you are coming into
  - you come into
  lexicon: HALOT
  rationale: The participle with preposition expresses imminent/future entrance. 'You
    enter' is natural modern English and fits the legal-instruction context.
- source_word: הָאָרֶץ כְּנָעַן
  chosen: the land of Canaan
  alternatives:
  - the land, Canaan
  lexicon: HALOT
  rationale: Standard construct-like apposition in English. 'The land of Canaan' is
    clear and idiomatic.
- source_word: זֹאת הָאָרֶץ
  chosen: this is the land
  alternatives:
  - this is the land area
  - this is the territory
  lexicon: HALOT
  rationale: The demonstrative plus noun introduces a formal specification of the
    territory. 'This is the land' preserves the deictic force.
- source_word: אֲשֶׁר תִּפֹּל לָכֶם
  chosen: that will fall to you
  alternatives:
  - that will be allotted to you
  - that will come to you
  lexicon: HALOT
  rationale: נפל literally means 'fall.' In land-allotment contexts it refers to what
    falls by lot or comes as one's assigned portion. The main text keeps the concrete
    idiom 'fall to you,' while an explanatory alternative is preserved in a footnote.
- source_word: בְּנַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as a possession
  lexicon: HALOT
  rationale: נחלה commonly denotes inherited possession/allotment. 'As an inheritance'
    is both natural and theologically/legally appropriate in land-promise contexts.
- source_word: אֶרֶץ כְּנַעַן לִגְבֻלֹתֶיהָ
  chosen: the land of Canaan according to its borders
  alternatives:
  - the land of Canaan by its boundaries
  - the land of Canaan within its borders
  lexicon: HALOT
  rationale: לִגְבֻלֹתֶיהָ specifies the territorial limits that are about to be described.
    'According to its borders' preserves the formal, delimiting sense better than
    a looser paraphrase.
