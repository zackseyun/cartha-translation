id: NUM.34.4
reference: Numbers 34:4
source:
  edition: WLC
  text: וְ/נָסַ֣ב לָ/כֶם֩ הַ/גְּב֨וּל מִ/נֶּ֜גֶב לְ/מַעֲלֵ֤ה עַקְרַבִּים֙ וְ/עָ֣בַר
    צִ֔נָ/ה ו/היה תּֽוֹצְאֹתָ֔י/ו מִ/נֶּ֖גֶב לְ/קָדֵ֣שׁ בַּרְנֵ֑עַ וְ/יָצָ֥א חֲצַר
    אַדָּ֖ר וְ/עָבַ֥ר עַצְמֹֽנָ/ה־׃
translation:
  text: Then the border shall turn for you from the south of the Ascent of Akrabbim,
    and cross to Zin; and its end points shall be south of Kadesh-barnea; then it
    shall go out to Hazar-addar and cross to Azmon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Akrabbim likely means 'scorpions'; the place-name could be rendered 'the
      ascent of Scorpions' or 'Scorpion Pass.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסַב
  chosen: shall turn
  alternatives:
  - will turn
  - shall curve around
  lexicon: HALOT
  rationale: נָסַב in boundary descriptions commonly denotes a turning or bending
    of the border line. 'Shall turn' is natural English and preserves the directional
    sense without over-paraphrasing.
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  lexicon: HALOT
  rationale: גְּבוּל refers to a territorial boundary or border. 'Border' is concise
    and idiomatic in a land-boundary context.
- source_word: מִנֶּגֶב
  chosen: from the south of
  alternatives:
  - southward from
  - on the south of
  lexicon: HALOT
  rationale: Here נֶגֶב functions directionally/geographically, indicating the southern
    side relative to the named landmark. 'From the south of' best fits the syntax
    with the following place-name.
- source_word: לְמַעֲלֵה עַקְרַבִּים
  chosen: the Ascent of Akrabbim
  alternatives:
  - the ascent of Scorpions
  - Scorpion Pass
  lexicon: HALOT
  rationale: This is a place-name. Following the translation philosophy, names are
    transliterated rather than translated when functioning as proper nouns. 'Ascent'
    translates מַעֲלֵה, while 'Akrabbim' preserves the toponym; the lexical meaning
    'scorpions' is worth preserving in a footnote.
- source_word: וְעָבַר
  chosen: and cross
  alternatives:
  - and pass over
  - and pass through
  lexicon: HALOT
  rationale: עָבַר in border itineraries indicates the line passing across or through
    an area. 'Cross' is clear modern English and fits the movement of a boundary line.
- source_word: צִנָה
  chosen: to Zin
  alternatives:
  - into Zin
  lexicon: HALOT
  rationale: The directional he on the place-name marks motion toward the wilderness/region
    of Zin. English idiom is best served by supplying 'to'.
- source_word: וְהָיָה תּוֹצְאֹתָיו
  chosen: and its end points shall be
  alternatives:
  - and its extremities shall be
  - and its termination shall be
  lexicon: HALOT
  rationale: תּוֹצְאוֹת in boundary texts refers to the border's outer limits or terminal
    points. The plural is preserved with 'end points,' and the pronominal suffix refers
    back to the border.
- source_word: לְקָדֵשׁ בַּרְנֵעַ
  chosen: south of Kadesh-barnea
  alternatives:
  - toward Kadesh-barnea
  - at Kadesh-barnea
  lexicon: HALOT
  rationale: Combined with the preceding מִנֶּגֶב, the phrase locates the border's
    end points on the south side of Kadesh-barnea, not simply at or toward it.
- source_word: וְיָצָא
  chosen: then it shall go out to
  alternatives:
  - and it shall extend to
  - and it shall reach to
  lexicon: HALOT
  rationale: יָצָא in boundary descriptions often means the line extends onward to
    a further point. 'Go out to' is slightly more literal while remaining readable.
- source_word: חֲצַר אַדָּר
  chosen: Hazar-addar
  alternatives:
  - Hazar Addar
  lexicon: HALOT
  rationale: This is a proper place-name and is therefore transliterated. The hyphenated
    form helps English readers recognize the compound name.
- source_word: עַצְמֹנָה
  chosen: to Azmon
  alternatives:
  - into Azmon
  lexicon: HALOT
  rationale: Another place-name with directional ending; 'to Azmon' is the most natural
    English rendering.
