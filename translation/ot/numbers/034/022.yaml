id: NUM.34.22
reference: Numbers 34:22
source:
  edition: WLC
  text: וּ/לְ/מַטֵּ֥ה בְנֵי דָ֖ן נָשִׂ֑יא בֻּקִּ֖י בֶּן יָגְלִֽי־־׃
translation:
  text: 'And for the tribe of the sons of Dan, a leader: Bukki son of Jogli.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'the sons of Dan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/מַטֵּה
  chosen: And for the tribe of
  alternatives:
  - And for the staff of
  - And for the branch of
  lexicon: HALOT
  rationale: מַטֶּה commonly denotes 'tribe' in census/allotment contexts in Numbers,
    by extension from 'staff/rod.' The prefixed conjunction and preposition are naturally
    rendered together as 'And for.'
- source_word: בְנֵי דָן
  chosen: the sons of Dan
  alternatives:
  - the people of Dan
  - the Danites
  lexicon: HALOT
  rationale: Literally 'sons of Dan.' In tribal formulas this identifies the tribal
    descendants. 'Sons of Dan' preserves the Hebrew kinship expression; alternatives
    are possible but less formally transparent.
- source_word: נָשִׂיא
  chosen: a leader
  alternatives:
  - a chief
  - a prince
  lexicon: HALOT
  rationale: In Numbers 34 this term designates the appointed tribal representative
    for land division. 'Leader' is clear modern English and fits the administrative
    role better than the more archaic or potentially misleading 'prince.'
- source_word: בֻּקִּי
  chosen: Bukki
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: Standard filial expression; 'son of' is the direct and expected rendering
    in genealogical identification.
- source_word: יָגְלִי
  chosen: Jogli
  alternatives:
  - Jagli
  rationale: Personal name transliterated by standard English convention; 'Jogli'
    reflects common representation of initial yod as J in many biblical names in English
    tradition while remaining recognizable.
