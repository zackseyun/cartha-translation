id: NUM.34.12
reference: Numbers 34:12
source:
  edition: WLC
  text: וְ/יָרַ֤ד הַ/גְּבוּל֙ הַ/יַּרְדֵּ֔נָ/ה וְ/הָי֥וּ תוֹצְאֹתָ֖י/ו יָ֣ם הַ/מֶּ֑לַח
    זֹאת֩ תִּהְיֶ֨ה לָ/כֶ֥ם הָ/אָ֛רֶץ לִ/גְבֻלֹתֶ֖י/הָ סָבִֽיב׃
translation:
  text: Then the border shall go down to the Jordan, and its end points shall be at
    the Salt Sea. This shall be your land according to its borders all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its extremities shall be at the Salt Sea.' The Hebrew term can denote
      the border's terminal points or extremities.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Salt Sea'; that is, the body of water commonly called the Dead
      Sea.
    reason: cultural_note
lexical_decisions:
- source_word: וְיָרַד
  chosen: Then ... shall go down
  alternatives:
  - and ... went down
  - and ... descends
  lexicon: HALOT
  rationale: The verb ירד literally means 'go down/descend.' In this boundary-description
    context, English idiom naturally uses 'go down' for the line's movement. The prefixed
    conjunction is rendered 'Then' for smooth sequential narration within the border
    itinerary.
- source_word: הַגְּבוּל
  chosen: the border
  alternatives:
  - the boundary
  - the territory line
  lexicon: HALOT
  rationale: גְּבוּל commonly denotes a border or boundary. 'Border' is concise and
    natural in English while fitting the repeated territorial-boundary context of
    Numbers 34.
- source_word: הַיַּרְדֵּנָה
  chosen: to the Jordan
  alternatives:
  - toward the Jordan
  - to the Jordan River
  lexicon: HALOT
  rationale: The directional ending indicates motion toward the Jordan. 'To the Jordan'
    is a natural English rendering; 'River' is not required because 'the Jordan' is
    standard English usage.
- source_word: וְהָיוּ
  chosen: and ... shall be
  alternatives:
  - and ... will be
  - and ... are
  lexicon: HALOT
  rationale: Future-like modal force suits the prescriptive description of the land's
    borders. 'Shall be' matches the formal register of legal-geographical delineation.
- source_word: תוֹצְאֹתָיו
  chosen: its end points
  alternatives:
  - its extremities
  - its outlets
  - its termination
  lexicon: HALOT
  rationale: תּוֹצָאוֹת in boundary texts refers to the terminal points or extremities
    of a border line. 'End points' communicates the geographic sense clearly in modern
    English better than the more literal but potentially misleading 'outgoings' or
    'outlets.'
- source_word: יָם הַמֶּלַח
  chosen: the Salt Sea
  alternatives:
  - the Dead Sea
  - the Sea of Salt
  lexicon: HALOT
  rationale: The Hebrew expression is literally 'Salt Sea.' 'The Salt Sea' preserves
    the source wording while remaining understandable. 'Dead Sea' is a familiar modern
    name but is not the lexical form of the Hebrew.
- source_word: זֹאת תִּהְיֶה לָכֶם הָאָרֶץ
  chosen: This shall be your land
  alternatives:
  - This shall be the land for you
  - This will be your land
  lexicon: HALOT
  rationale: This clause summarizes the territorial grant. 'Your land' is the most
    natural English possessive rendering of לָכֶם in context.
- source_word: לִגְבֻלֹתֶיהָ סָבִיב
  chosen: according to its borders all around
  alternatives:
  - within its borders all around
  - by its borders round about
  - with its borders on every side
  lexicon: HALOT
  rationale: The phrase describes the land as defined by its surrounding boundaries.
    'According to its borders all around' preserves the delimiting sense without over-paraphrasing.
