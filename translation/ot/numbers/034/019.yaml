id: NUM.34.19
reference: Numbers 34:19
source:
  edition: WLC
  text: וְ/אֵ֖לֶּה שְׁמ֣וֹת הָ/אֲנָשִׁ֑ים לְ/מַטֵּ֣ה יְהוּדָ֔ה כָּלֵ֖ב בֶּן יְפֻנֶּֽה־׃
translation:
  text: 'And these are the names of the men: for the tribe of Judah, Caleb son of
    Jephunneh.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: And these are
  alternatives:
  - These are
  - And these
  lexicon: HALOT
  rationale: The conjunction וְ naturally continues the preceding list, and אֵלֶּה
    introduces identification. 'And these are' preserves the discourse flow and the
    verbless Hebrew clause in idiomatic English.
- source_word: שְׁמוֹת
  chosen: the names of
  alternatives:
  - the names
  lexicon: HALOT
  rationale: Construct form with the following noun requires 'the names of.' This
    introduces the list of appointed representatives.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the persons
  - the people
  lexicon: HALOT
  rationale: אֲנָשִׁים is grammatically and semantically masculine plural here, referring
    to specific male representatives. Per gender-accurate policy, 'the men' best matches
    the source.
- source_word: לְמַטֵּה
  chosen: for the tribe of
  alternatives:
  - for the staff of
  - belonging to the tribe of
  - for the branch of
  lexicon: HALOT
  rationale: 'In tribal-allotment contexts מַטֶּה denotes ''tribe,'' not the literal
    ''staff/rod.'' The prefixed ל marks representation: the named man is appointed
    for that tribe.'
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal/personal name.
- source_word: כָּלֵב
  chosen: Caleb
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Hebrew patronymic construction is most naturally rendered 'son of' in
    English.
- source_word: יְפֻנֶּה
  chosen: Jephunneh
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
