id: NUM.34.24
reference: Numbers 34:24
source:
  edition: WLC
  text: וּ/לְ/מַטֵּ֥ה בְנֵֽי אֶפְרַ֖יִם נָשִׂ֑יא קְמוּאֵ֖ל בֶּן שִׁפְטָֽן־־׃
translation:
  text: 'And for the tribe of the sons of Ephraim, a leader: Kemuel son of Shiphtan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Ephraim'; that is, the members or descendants of the tribe
      of Ephraim.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/מַטֵּה
  chosen: And for the tribe of
  alternatives:
  - And for the staff of
  - And for the branch of
  lexicon: HALOT
  rationale: מַטֶּה literally can denote 'staff/rod,' but in tribal administrative
    lists it idiomatically means 'tribe.' The prefixed conjunction and preposition
    are best carried together as 'And for' in this list context.
- source_word: בְנֵי אֶפְרַיִם
  chosen: the sons of Ephraim
  alternatives:
  - the children of Ephraim
  - the Ephraimites
  lexicon: HALOT
  rationale: בְנֵי is literally 'sons of.' In tribal formulas this denotes descendants/members
    of the tribe. 'Sons of Ephraim' preserves the Hebrew construction and the translation
    philosophy's gender-accurate preference better than the more interpretive 'Ephraimites.'
- source_word: נָשִׂיא
  chosen: a leader
  alternatives:
  - a chief
  - a prince
  - a tribal leader
  lexicon: HALOT
  rationale: In this context נָשִׂיא refers to the appointed representative/head of
    the tribe. 'Leader' is clear modern English and fits the administrative context
    without the potentially misleading royal overtones of 'prince.'
- source_word: קְמוּאֵל
  chosen: Kemuel
  alternatives:
  - Qemuel
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: בֶּן
  chosen: son of
  alternatives: []
  lexicon: HALOT
  rationale: Standard patronymic construction; 'son of' is the natural and sufficiently
    formal rendering.
- source_word: שִׁפְטָן
  chosen: Shiphtan
  alternatives:
  - Shiptan
  rationale: Personal name transliterated by standard English convention.
