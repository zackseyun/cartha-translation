id: NUM.34.8
reference: Numbers 34:8
source:
  edition: WLC
  text: מֵ/הֹ֣ר הָ/הָ֔ר תְּתָא֖וּ לְבֹ֣א חֲמָ֑ת וְ/הָי֛וּ תּוֹצְאֹ֥ת הַ/גְּבֻ֖ל צְדָֽדָ/ה׃
translation:
  text: From Mount Hor you shall mark out the border to Lebo-hamath, and the end points
    of the border shall be at Zedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'to the entrance of Hamath'; likely a fixed place name,
      Lebo-hamath.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵהֹר הָהָר
  chosen: From Mount Hor
  alternatives:
  - From Hor the mountain
  lexicon: HALOT
  rationale: Proper place name with prefixed preposition מִן ('from'). The Hebrew
    construction is the standard toponym 'Mount Hor,' not a descriptive phrase in
    natural English.
- source_word: תְּתָאוּ
  chosen: you shall mark out
  alternatives:
  - you shall draw
  - you shall outline
  - you shall extend
  lexicon: HALOT
  rationale: In this boundary-setting context, the verb refers to tracing or marking
    the line of the border. 'Mark out' communicates the surveying/boundary sense more
    clearly than the more literal but less idiomatic 'draw.'
- source_word: לְבֹא חֲמָת
  chosen: to Lebo-hamath
  alternatives:
  - to the entrance of Hamath
  - toward the approach to Hamath
  lexicon: HALOT
  rationale: Although literally 'to the entering/entrance of Hamath,' this expression
    functions as a fixed geographical designation elsewhere. Rendering it as the place
    name 'Lebo-hamath' preserves the toponymic force and avoids implying merely a
    generic direction of travel.
- source_word: וְהָיוּ
  chosen: shall be
  alternatives:
  - and they shall be
  - and will be
  lexicon: HALOT
  rationale: Standard wayyiqtol/qatal sequence in legal-boundary description, best
    rendered idiomatically in English as future 'shall be' rather than preserving
    the conjunction woodenly.
- source_word: תּוֹצְאֹת
  chosen: the end points
  alternatives:
  - the extremities
  - the limits
  - the outgoings
  lexicon: HALOT
  rationale: In territorial descriptions, the noun denotes the outer limits or terminal
    points of a border. 'End points' is clear modern English and fits the geographic
    context.
- source_word: הַגְּבֻל
  chosen: the border
  alternatives:
  - the boundary
  lexicon: HALOT
  rationale: Common term for territorial boundary. 'Border' is slightly more natural
    in English in a land-allotment context, while remaining accurate.
- source_word: צְדָדָה
  chosen: at Zedad
  alternatives:
  - toward Zedad
  lexicon: HALOT
  rationale: Toponym marking the terminal location of the border. English 'at Zedad'
    best conveys the sense of the border's endpoint location in this clause.
