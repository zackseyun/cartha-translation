id: NUM.34.21
reference: Numbers 34:21
source:
  edition: WLC
  text: לְ/מַטֵּ֣ה בִנְיָמִ֔ן אֱלִידָ֖ד בֶּן כִּסְלֽוֹן־׃
translation:
  text: 'From the tribe of Benjamin: Elidad son of Chislon.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For the tribe of Benjamin.' The Hebrew preposition can be rendered either
      way in this list of tribal representatives.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/מַטֵּה
  chosen: From the tribe of
  alternatives:
  - For the tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: The preposition לְ with מַטֶּה in this appointment list introduces the
    representative assigned to each tribe. In English, 'From the tribe of' is natural
    and accurately conveys tribal affiliation in this context better than the more
    wooden 'For the tribe of,' though that is also possible.
- source_word: בִנְיָמִן
  chosen: Benjamin
  lexicon: HALOT
  rationale: Standard transliteration of the tribal/personal name, following the translation
    philosophy to transliterate names rather than translate them.
- source_word: אֱלִידָד
  chosen: Elidad
  alternatives:
  - Elidadh
  lexicon: HALOT
  rationale: Personal name is transliterated by standard English convention.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: The construct relationship between the two names is most naturally rendered
    'son of' in English genealogical style.
- source_word: כִּסְלֹון
  chosen: Chislon
  alternatives:
  - Kislon
  lexicon: HALOT
  rationale: Personal name is transliterated. 'Chislon' reflects a conventional English
    representation of the Hebrew consonants, while 'Kislon' is a possible alternative
    transliteration.
