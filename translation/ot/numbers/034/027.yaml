id: NUM.34.27
reference: Numbers 34:27
source:
  edition: WLC
  text: וּ/לְ/מַטֵּ֥ה בְנֵי אָשֵׁ֖ר נָשִׂ֑יא אֲחִיה֖וּד בֶּן שְׁלֹמִֽי־־׃
translation:
  text: 'And for the tribe of the sons of Asher, a leader: Ahihud son of Shelomi.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/לְ/מַטֵּה
  chosen: And for the tribe of
  alternatives:
  - And for the staff of
  - And for the branch of
  lexicon: HALOT
  rationale: In tribal-allotment contexts מַטֶּה idiomatically means 'tribe' rather
    than its more concrete senses 'staff/rod.' The prefixed conjunction and preposition
    are naturally rendered together as 'And for.'
- source_word: בְנֵי אָשֵׁר
  chosen: the sons of Asher
  alternatives:
  - the children of Asher
  - the descendants of Asher
  lexicon: HALOT
  rationale: בְנֵי literally means 'sons of.' Here it functions as the standard tribal
    designation. 'Sons of Asher' preserves the Hebrew form and matches the source's
    gendered wording, while still clearly denoting the tribal group.
- source_word: נָשִׂיא
  chosen: a leader
  alternatives:
  - chief
  - prince
  - leader
  lexicon: HALOT
  rationale: In Numbers 34 this term denotes the appointed tribal representative for
    land division. 'Leader' is clear modern English and avoids the potentially misleading
    royal connotations of 'prince,' while still reflecting an official representative
    role.
- source_word: אֲחִיהוּד
  chosen: Ahihud
  rationale: Personal name transliterated according to the translation philosophy's
    preference to transliterate names rather than translate them.
- source_word: בֶּן שְׁלֹמִי
  chosen: son of Shelomi
  alternatives:
  - the son of Shelomi
  rationale: Standard Hebrew patronymic construction. 'Son of Shelomi' is the natural
    formal rendering in English genealogical style.
