id: NUM.34.14
reference: Numbers 34:14
source:
  edition: WLC
  text: כִּ֣י לָקְח֞וּ מַטֵּ֨ה בְנֵ֤י הָ/ראוּבֵנִי֙ לְ/בֵ֣ית אֲבֹתָ֔/ם וּ/מַטֵּ֥ה
    בְנֵֽי הַ/גָּדִ֖י לְ/בֵ֣ית אֲבֹתָ֑/ם וַ/חֲצִי֙ מַטֵּ֣ה מְנַשֶּׁ֔ה לָקְח֖וּ נַחֲלָתָֽ/ם־׃
translation:
  text: For the tribe of the sons of Reuben, by their fathers’ houses, and the tribe
    of the sons of Gad, by their fathers’ houses, and the half-tribe of Manasseh have
    taken their inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the Reubenites ... the Gadites.'
    reason: lexical_alternative
  - marker: b
    text: '''Fathers’ houses'' refers to ancestral family/clan divisions within each
      tribe.'
    reason: cultural_note
  - marker: c
    text: Or 'half the tribe of Manasseh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding boundary/allotment statement.
    'For' fits the discourse flow in English while preserving the causal/explanatory
    force.
- source_word: לָקְחוּ
  chosen: have taken
  alternatives:
  - took
  - have received
  lexicon: HALOT
  rationale: Qal perfect 3cp of לקח, here indicating completed possession/allotment.
    'Have taken' is a close rendering; 'have received' is interpretive and softer
    than the Hebrew verb.
- source_word: מַטֶּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  - tribal group
  lexicon: HALOT
  rationale: In this land-allotment context מַטֶּה clearly denotes a tribal unit,
    not a literal staff. 'Tribe' is the standard and natural English equivalent.
- source_word: בְנֵי הָרְאוּבֵנִי
  chosen: the sons of Reuben
  alternatives:
  - the Reubenites
  lexicon: HALOT
  rationale: A more formally transparent rendering of the Hebrew construct. 'The Reubenites'
    is idiomatic and could also work, but 'the sons of Reuben' preserves the source
    phrasing and genealogical flavor.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - according to their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: This phrase marks clan/family divisions within the tribe. 'Fathers’ houses'
    preserves the idiom with understandable English; 'by' conveys distribution according
    to those units.
- source_word: בְנֵי הַגָּדִי
  chosen: the sons of Gad
  alternatives:
  - the Gadites
  lexicon: HALOT
  rationale: As with Reuben, this preserves the Hebrew genealogical expression more
    directly than the ethnic shorthand 'Gadites.'
- source_word: וַחֲצִי מַטֶּה מְנַשֶּׁה
  chosen: the half-tribe of Manasseh
  alternatives:
  - half the tribe of Manasseh
  lexicon: HALOT
  rationale: This is the conventional and clear rendering of the construct phrase
    in allotment contexts. It communicates that only one half of Manasseh is in view.
- source_word: נַחֲלָתָם
  chosen: their inheritance
  alternatives:
  - their possession
  - their allotted inheritance
  lexicon: HALOT
  rationale: נַחֲלָה in this context refers to inherited territorial allotment. 'Inheritance'
    preserves both the legal and covenantal nuance without overexpansion.
