id: NUM.34.18
reference: Numbers 34:18
source:
  edition: WLC
  text: וְ/נָשִׂ֥יא אֶחָ֛ד נָשִׂ֥יא אֶחָ֖ד מִ/מַּטֶּ֑ה תִּקְח֖וּ לִ/נְחֹ֥ל אֶת הָ/אָֽרֶץ־׃
translation:
  text: And you shall take one leader from each tribe to apportion the land as an
    inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to inherit the land.' The Hebrew verb can denote inheriting or causing
      an inheritance/allotment, and the context here favors the sense of assigning
      the land portions.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשִׂיא
  chosen: leader
  alternatives:
  - chief
  - prince
  - tribal leader
  lexicon: HALOT
  rationale: נָשִׂיא denotes a recognized leader or chief. In this administrative
    land-allotment context, 'leader' is clear modern English and avoids the potentially
    misleading royal nuance of 'prince.'
- source_word: אֶחָד ... אֶחָד
  chosen: one ... each
  alternatives:
  - one ... one
  - a single ... from each
  lexicon: HALOT
  rationale: The repetition emphasizes one representative per tribe. English idiom
    expresses this naturally as 'one leader from each tribe' rather than woodenly
    repeating 'one leader, one leader.'
- source_word: מִמַּטֶּה
  chosen: from each tribe
  alternatives:
  - from a tribe
  - from each staff/tribe
  lexicon: HALOT
  rationale: מַטֶּה literally can mean 'staff,' but in tribal-administrative contexts
    it commonly means 'tribe.' Because the repeated 'one' distributes across the tribal
    units, 'from each tribe' best conveys the sense.
- source_word: תִּקְחוּ
  chosen: you shall take
  alternatives:
  - you are to take
  - take
  lexicon: HALOT
  rationale: The imperfect here functions as an instruction/command to the plural
    audience. 'You shall take' preserves the directive force in a formal but natural
    way.
- source_word: לִנְחֹל
  chosen: to apportion ... as an inheritance
  alternatives:
  - to inherit
  - to give as an inheritance
  - to receive possession of
  lexicon: HALOT
  rationale: The verb נחל in the Hiphil/Qal-related inheritance domain can involve
    causing or assigning an inheritance, not merely personally inheriting. In context
    these leaders participate in assigning the land portions, so 'to apportion ...
    as an inheritance' captures the administrative sense.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the territory
  lexicon: HALOT
  rationale: In Numbers this refers specifically to the land being allotted to Israel.
    'The land' is the standard and most natural rendering.
