id: NUM.34.6
reference: Numbers 34:6
source:
  edition: WLC
  text: וּ/גְב֣וּל יָ֔ם וְ/הָיָ֥ה לָ/כֶ֛ם הַ/יָּ֥ם הַ/גָּד֖וֹל וּ/גְב֑וּל זֶֽה יִהְיֶ֥ה
    לָ/כֶ֖ם גְּב֥וּל יָֽם־׃
translation:
  text: And the western border shall be for you the Great Sea as a border; this shall
    be your western border.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'border of sea' / 'sea border.' In this boundary context, Hebrew
      יָם ('sea') also functions as a directional term for the west, hence 'western
      border.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  lexicon: HALOT
  rationale: The noun denotes a territorial limit or boundary line. 'Border' is natural
    modern English in a land-allotment context and fits the repeated formula in this
    passage.
- source_word: יָם
  chosen: western
  alternatives:
  - sea
  lexicon: HALOT
  rationale: In the opening construct phrase גְּבוּל יָם, literally 'border of sea,'
    the term functions idiomatically for the seaward/western side in this boundary
    list. Rendering it 'western' communicates the directional force in context rather
    than leaving an awkward literalism.
- source_word: הַיָּם הַגָּדוֹל
  chosen: the Great Sea
  alternatives:
  - the great sea
  lexicon: HALOT
  rationale: This is the standard designation for the Mediterranean in biblical geography.
    Capitalizing 'Great Sea' treats it as a geographic title while preserving the
    Hebrew wording.
- source_word: וְהָיָה לָכֶם
  chosen: shall be for you
  alternatives:
  - will be yours
  - shall belong to you
  lexicon: HALOT
  rationale: The clause states what will constitute Israel's border. 'Shall be for
    you' preserves the formal allocative sense without overparaphrase.
- source_word: וּגְבוּל
  chosen: as a border
  alternatives:
  - for a border
  - and its border
  lexicon: HALOT
  rationale: After 'the Great Sea,' this accusative/appositional use restates its
    function as the boundary. 'As a border' makes the syntax clear in English.
- source_word: זֶה יִהְיֶה לָכֶם
  chosen: this shall be your
  alternatives:
  - this will be for you
  - this shall belong to you as
  lexicon: HALOT
  rationale: This resumptive formula concludes the boundary statement. 'This shall
    be your' is idiomatic and preserves the possessive force.
- source_word: גְּבוּל יָם
  chosen: western border
  alternatives:
  - sea border
  - border of the sea
  lexicon: HALOT
  rationale: Here again the phrase refers to the side toward the sea, i.e., the west.
    'Western border' is the clearest contextual rendering in English.
