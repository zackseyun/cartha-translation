id: NUM.34.3
reference: Numbers 34:3
source:
  edition: WLC
  text: וְ/הָיָ֨ה לָ/כֶ֧ם פְּאַת נֶ֛גֶב מִ/מִּדְבַּר צִ֖ן עַל יְדֵ֣י אֱד֑וֹם וְ/הָיָ֤ה
    לָ/כֶם֙ גְּב֣וּל נֶ֔גֶב מִ/קְצֵ֥ה יָם הַ/מֶּ֖לַח קֵֽדְמָ/ה־־־־׃
translation:
  text: Your southern side shall be from the wilderness of Zin along the side of Edom,
    and your southern border shall run from the end of the Salt Sea eastward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the edge/extremity of the Salt Sea.'
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'the Dead Sea'; Hebrew 'the Salt Sea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּאַת
  chosen: side
  alternatives:
  - edge
  - corner
  - region
  lexicon: HALOT
  rationale: In boundary descriptions, פֵּאָה commonly denotes a side or edge of a
    territory rather than a geometric 'corner.' 'Side' is natural English and fits
    the territorial context.
- source_word: נֶגֶב
  chosen: southern / south
  alternatives:
  - Negev
  lexicon: HALOT
  rationale: Here נֶגֶב functions directionally in a border formula, not as the proper
    name of the Negev region. Rendering it as 'southern'/'south' best reflects the
    syntax and context.
- source_word: מִמִּדְבַּר צִן
  chosen: from the wilderness of Zin
  alternatives:
  - from the desert of Zin
  lexicon: HALOT
  rationale: מִדְבָּר can be rendered 'wilderness' or 'desert.' 'Wilderness' is retained
    as a standard biblical geographical term and pairs naturally with the proper name
    Zin.
- source_word: עַל יְדֵי אֱדוֹם
  chosen: along the side of Edom
  alternatives:
  - beside Edom
  - alongside Edom
  - at the border of Edom
  lexicon: HALOT
  rationale: The idiom עַל יְדֵי literally involves 'by the hand/side of' and in geographical
    contexts means 'alongside' or 'beside.' 'Along the side of Edom' preserves the
    spatial nuance without overinterpreting it as a formal border treaty line.
- source_word: גְּבוּל
  chosen: border
  alternatives:
  - boundary
  lexicon: HALOT
  rationale: In a land-allotment context, גְּבוּל denotes a territorial boundary.
    'Border' is concise, natural, and accurate.
- source_word: מִקְצֵה יָם הַמֶּלַח
  chosen: from the end of the Salt Sea
  alternatives:
  - from the extremity of the Salt Sea
  - from the edge of the Salt Sea
  lexicon: HALOT
  rationale: קָצֶה denotes an extremity or end point. 'End' is idiomatic in English
    for a boundary starting point. 'Salt Sea' is a direct rendering of the Hebrew
    name.
- source_word: יָם הַמֶּלַח
  chosen: the Salt Sea
  alternatives:
  - the Dead Sea
  lexicon: HALOT
  rationale: Original-language primacy favors the literal toponym 'Salt Sea' over
    the traditional interpretive equivalent 'Dead Sea.'
- source_word: קֵדְמָה
  chosen: eastward
  alternatives:
  - to the east
  - on the east
  lexicon: HALOT
  rationale: The directional adverb indicates orientation from the Salt Sea's extremity.
    'Eastward' is compact and idiomatic in English boundary language.
- source_word: וְהָיָה לָכֶם ... וְהָיָה לָכֶם
  chosen: shall be ... shall run
  alternatives:
  - will be ... will be
  lexicon: HALOT
  rationale: The repeated וְהָיָה introduces boundary specification. Rendering the
    first as 'shall be' and the second as 'shall run' avoids awkward repetition in
    English while preserving the legal-descriptive force of the Hebrew.
