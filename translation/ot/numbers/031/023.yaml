theological_decisions:
- issue: Nature of purification language in priestly law
  chosen_reading: Render the verse in terms of ritual purity/impurity rather than
    moral cleansing.
  alternative_readings:
  - Use more general language such as 'cleanse' without specifying impurity
  - Translate חטא language in a sin-oriented way
  rationale: In Numbers 31 and the linked legislation in Numbers 19, the concern is
    ceremonial purification of objects after contact with impurity, not forgiveness
    of moral guilt. The English wording therefore distinguishes 'clean/clean' and
    'purified with the water for impurity' to avoid importing doctrinal claims the
    text does not make.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
