id: NUM.31.23
reference: Numbers 31:23
source:
  edition: WLC
  text: כָּל דָּבָ֞ר אֲשֶׁר יָבֹ֣א בָ/אֵ֗שׁ תַּעֲבִ֤ירוּ בָ/אֵשׁ֙ וְ/טָהֵ֔ר אַ֕ךְ
    בְּ/מֵ֥י נִדָּ֖ה יִתְחַטָּ֑א וְ/כֹ֨ל אֲשֶׁ֧ר לֹֽא יָבֹ֛א בָּ/אֵ֖שׁ תַּעֲבִ֥ירוּ
    בַ/מָּֽיִם־־־׃
translation:
  text: Every thing that can go through the fire, you shall pass through the fire,
    and it shall be clean; only it must be purified with the water for impurity. But
    everything that cannot go through the fire, you shall pass through the water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'with the water of impurity'; traditionally, 'with the water of separation'
      (cf. Numbers 19).
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל דָּבָר
  chosen: Every thing
  alternatives:
  - Everything
  - Every article
  lexicon: HALOT
  rationale: כָּל with דָּבָר here refers comprehensively to each object/item taken
    as spoil. 'Every thing' preserves the distributive force and concrete sense better
    than a more abstract rendering.
- source_word: אֲשֶׁר יָבֹא בָאֵשׁ
  chosen: that can go through the fire
  alternatives:
  - that goes through the fire
  - that can withstand fire
  lexicon: HALOT
  rationale: The idiom concerns objects suitable for fire-purging, not merely those
    that in fact enter fire. 'Can go through the fire' brings out the practical sense
    in context.
- source_word: תַּעֲבִירוּ בָאֵשׁ
  chosen: you shall pass through the fire
  alternatives:
  - you shall put through the fire
  - you shall make pass through the fire
  lexicon: HALOT
  rationale: Hiphil of עבר means to cause to pass through. 'Pass through the fire'
    is idiomatic English while retaining the ritual action.
- source_word: וְטָהֵר
  chosen: and it shall be clean
  alternatives:
  - and it will be clean
  - and it shall be purified
  lexicon: HALOT
  rationale: The verb states the resulting state after fire treatment. 'Be clean'
    preserves the stative/result sense; the following clause then specifies an additional
    purification requirement.
- source_word: אַךְ
  chosen: only
  alternatives:
  - however
  - nevertheless
  - except that
  lexicon: HALOT
  rationale: אַךְ marks an important qualification to the preceding statement. 'Only'
    is concise and natural.
- source_word: בְּמֵי נִדָּה
  chosen: with the water for impurity
  alternatives:
  - with the water of impurity
  - with the water for cleansing from impurity
  - with the water of separation
  lexicon: HALOT
  rationale: The phrase refers to the special water used in purification from ritual
    impurity (cf. Num 19). 'Water for impurity' is a transparent rendering of the
    Hebrew construction without importing later traditional phrasing into the main
    text.
- source_word: יִתְחַטָּא
  chosen: it must be purified
  alternatives:
  - it shall purify itself
  - it shall be decontaminated
  - it shall be cleansed from sin/impurity
  lexicon: HALOT
  rationale: The hitpael of חטא in priestly contexts means to undergo purification
    from impurity, not moral self-cleansing. 'Must be purified' communicates the ritual
    requirement clearly in English.
- source_word: וְכֹל אֲשֶׁר לֹא יָבֹא בָּאֵשׁ
  chosen: But everything that cannot go through the fire
  alternatives:
  - And everything that does not go through the fire
  - And every thing that cannot be put into the fire
  lexicon: HALOT
  rationale: The contrast is between fire-safe and non-fire-safe objects. 'Cannot
    go through the fire' best matches the practical distinction in context.
- source_word: תַּעֲבִירוּ בַמָּיִם
  chosen: you shall pass through the water
  alternatives:
  - you shall wash in water
  - you shall put through water
  lexicon: HALOT
  rationale: The same causative verb is repeated for parallelism. 'Pass through the
    water' preserves the verbal correspondence with the fire clause better than simply
    'wash.'
