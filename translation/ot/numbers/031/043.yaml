id: NUM.31.43
reference: Numbers 31:43
source:
  edition: WLC
  text: וַ/תְּהִ֛י מֶחֱצַ֥ת הָ/עֵדָ֖ה מִן הַ/צֹּ֑אן שְׁלֹשׁ מֵא֥וֹת אֶ֨לֶף֙ וּ/שְׁלֹשִׁ֣ים
    אֶ֔לֶף שִׁבְעַ֥ת אֲלָפִ֖ים וַ/חֲמֵ֥שׁ מֵאֽוֹת־־׃
translation:
  text: And the half belonging to the congregation, from the flock, was 337,500.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתְּהִי
  chosen: was
  alternatives:
  - came to be
  - amounted to
  lexicon: HALOT
  rationale: The waw-consecutive form of היה here introduces the resulting total.
    English 'was' is the most natural rendering in a numerical inventory statement;
    'amounted to' is possible but slightly more interpretive.
- source_word: מֶחֱצַת
  chosen: the half
  alternatives:
  - half
  - one half
  lexicon: HALOT
  rationale: The construct form means 'half of.' With the following definite noun,
    'the half belonging to' or 'the half of' is appropriate. 'The half' preserves
    the definite sense in context, referring to one of the two apportioned shares.
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the community
  - the assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled Israelite community. 'Congregation'
    is a standard and suitably formal rendering in Pentateuchal contexts, without
    implying a specifically later ecclesial institution.
- source_word: מִן הַצֹּאן
  chosen: from the flock
  alternatives:
  - of the flock
  - from the sheep and goats
  lexicon: HALOT
  rationale: The phrase specifies the category from which this half is counted. צֹאן
    is a collective term for small livestock, especially sheep/goats. 'Flock' is concise
    and idiomatic; 'sheep and goats' is more explicit but adds specificity not required
    by the immediate context.
- source_word: שְׁלֹשׁ מֵאוֹת אֶלֶף וּשְׁלֹשִׁים אֶלֶף שִׁבְעַת אֲלָפִים וַחֲמֵשׁ
    מֵאוֹת
  chosen: 337,500
  alternatives:
  - three hundred thirty-seven thousand five hundred
  - three hundred and thirty-seven thousand five hundred
  lexicon: HALOT
  rationale: The Hebrew number sequence totals 300,000 + 30,000 + 7,000 + 500. Rendering
    with Arabic numerals improves readability in an inventory context while preserving
    exact quantity.
