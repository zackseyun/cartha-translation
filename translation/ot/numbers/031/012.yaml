id: NUM.31.12
reference: Numbers 31:12
source:
  edition: WLC
  text: וַ/יָּבִ֡אוּ אֶל מֹשֶׁה֩ וְ/אֶל אֶלְעָזָ֨ר הַ/כֹּהֵ֜ן וְ/אֶל עֲדַ֣ת בְּנֵֽי
    יִשְׂרָאֵ֗ל אֶת הַ/שְּׁבִ֧י וְ/אֶת הַ/מַּלְק֛וֹחַ וְ/אֶת הַ/שָּׁלָ֖ל אֶל הַֽ/מַּחֲנֶ֑ה
    אֶל עַֽרְבֹ֣ת מוֹאָ֔ב אֲשֶׁ֖ר עַל יַרְדֵּ֥ן יְרֵחֽוֹ־־־־־־־־־־׃ס
translation:
  text: And they brought the captives, the plunder, and the spoil to Moses, to Eleazar
    the priest, and to the congregation of the sons of Israel, to the camp on the
    plains of Moab, which are by the Jordan at Jericho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the congregation of the Israelites.' The Hebrew reads 'the congregation
      of the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the steppes of Moab.'
    reason: lexical_alternative
  - marker: c
    text: Or 'which are on the Jordan opposite Jericho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבִאוּ
  chosen: And they brought
  alternatives:
  - And they came with
  - And they brought in
  lexicon: HALOT
  rationale: The Hiphil of בוא commonly means 'bring' rather than simply 'come.' The
    direct objects that follow (captives, plunder, spoil) confirm a causative sense.
- source_word: עֲדַת בְּנֵי יִשְׂרָאֵל
  chosen: the congregation of the sons of Israel
  alternatives:
  - the congregation of the Israelites
  - the assembly of the children of Israel
  lexicon: HALOT
  rationale: עֵדָה denotes the assembled community or congregation. 'Sons of Israel'
    preserves the Hebrew familial expression בני ישראל more transparently than 'Israelites,'
    while remaining understandable in English.
- source_word: הַשְּׁבִי
  chosen: the captives
  alternatives:
  - the prisoners
  - the captivity
  lexicon: HALOT
  rationale: In this military context שבי refers to persons taken captive, not the
    abstract state of captivity. 'Captives' is the most natural and precise English
    rendering.
- source_word: הַמַּלְקוֹחַ
  chosen: the plunder
  alternatives:
  - the booty
  - the captured goods
  lexicon: HALOT
  rationale: This term refers to what was taken, often especially movable goods or
    livestock. 'Plunder' is readable modern English and fits the military context.
- source_word: הַשָּׁלָל
  chosen: the spoil
  alternatives:
  - the booty
  - the spoil of war
  lexicon: HALOT
  rationale: שׁלל is a standard term for spoil taken in war. Rendering it distinctly
    from מלקוח preserves the Hebrew's use of two related but not identical terms.
- source_word: אֶל הַמַּחֲנֶה
  chosen: to the camp
  alternatives:
  - into the camp
  lexicon: HALOT
  rationale: The preposition אֶל most straightforwardly means 'to.' 'To the camp'
    fits the movement described without over-specifying entry into it.
- source_word: עַרְבֹת מוֹאָב
  chosen: the plains of Moab
  alternatives:
  - the steppes of Moab
  lexicon: HALOT
  rationale: This geographical phrase is conventionally rendered 'plains of Moab.'
    'Steppes' is possible and perhaps more topographically specific, but 'plains'
    is clearer for modern readers.
- source_word: אֲשֶׁר עַל יַרְדֵּן יְרֵחוֹ
  chosen: which are by the Jordan at Jericho
  alternatives:
  - which are on the Jordan opposite Jericho
  - which are beside the Jordan of Jericho
  lexicon: HALOT
  rationale: The phrase locates the plains of Moab near the Jordan in relation to
    Jericho. 'By the Jordan at Jericho' is natural English and preserves the geographical
    sense without forcing a more interpretive 'opposite Jericho.'
