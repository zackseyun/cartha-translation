id: NUM.31.42
reference: Numbers 31:42
source:
  edition: WLC
  text: וּ/מִֽ/מַּחֲצִ֖ית בְּנֵ֣י יִשְׂרָאֵ֑ל אֲשֶׁר֙ חָצָ֣ה מֹשֶׁ֔ה מִן הָ/אֲנָשִׁ֖ים
    הַ/צֹּבְאִֽים־׃
translation:
  text: And from the half belonging to the sons of Israel, which Moses had separated
    from the men who served in the army—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the men who were on campaign' / 'from the men who went out to war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִֽ/מַּחֲצִית
  chosen: And from the half
  alternatives:
  - And from the half-share
  - Now from the half
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are both represented. מַחֲצִית
    denotes a half or half-portion; 'the half' is the most natural English here in
    the inventory context.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: belonging to the sons of Israel
  alternatives:
  - of the Israelites
  - of the children of Israel
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל is literally 'sons of Israel.' Per gender-accurate
    policy, the masculine form is preserved rather than neutralized, while 'belonging
    to' makes the genitival relationship idiomatic in English.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: A simple relative pronoun is required; 'which' fits the antecedent 'half'
    smoothly.
- source_word: חָצָה
  chosen: had separated
  alternatives:
  - divided
  - apportioned
  lexicon: HALOT
  rationale: 'In context of distributing spoil into halves, the verb refers to separating
    or dividing off a portion. ''Had separated'' best matches the immediate syntax:
    Moses had set apart Israel''s half from the combatants'' share.'
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: מִן הָאֲנָשִׁים
  chosen: from the men
  alternatives:
  - from the people
  - from the warriors
  lexicon: HALOT
  rationale: אֲנָשִׁים is literally 'men.' Since the referent is specifically the
    male combatants, 'men' is both accurate and contextually appropriate.
- source_word: הַצֹּבְאִים
  chosen: who served in the army
  alternatives:
  - who were going out to war
  - who were on campaign
  - who were fighting
  lexicon: HALOT
  rationale: The participle from צבא refers to those engaged in military service.
    'Served in the army' is readable modern English and preserves the military sense
    without over-paraphrase.
