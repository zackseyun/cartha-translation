id: NUM.31.7
reference: Numbers 31:7
source:
  edition: WLC
  text: וַֽ/יִּצְבְּאוּ֙ עַל מִדְיָ֔ן כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶׁ֑ה וַ/יַּֽהַרְג֖וּ כָּל זָכָֽר־־־׃
translation:
  text: So they waged war against Midian, just as Yahweh had commanded Moses, and they killed every male.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they fought against Midian.' The Hebrew verb can denote engaging in military service or warfare.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְבְּאוּ
  chosen: they waged war
  alternatives:
  - they campaigned
  - they served in battle
  - they fought
  lexicon: HALOT
  rationale: From צבא in the verbal form here, the sense is military action/going out in warfare. 'Waged war' is idiomatic modern English that preserves the martial force better than a wooden 'they army-ed' or an overly narrow 'they fought.'
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - 'on'
  lexicon: HALOT
  rationale: With a verb of military action and a people/place object, עַל naturally marks hostile direction. 'Against' best conveys the adversative sense in English.
- source_word: מִדְיָן
  chosen: Midian
  rationale: Proper name transliterated by standard English convention, in keeping with the translation philosophy to transliterate names.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces correspondence with the divine command. 'Just as' clearly expresses conformity without sounding archaic.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: 'English past perfect fits the sequence naturally: the command preceded the military action. This is a stylistic English adjustment, not a change in meaning.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת מֹשֶׁה
  chosen: Moses
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: The direct-object marker אֶת marks Moses as the one whom the LORD commanded. In idiomatic English, 'the LORD had commanded Moses' is the natural rendering.
- source_word: וַיַּהַרְגוּ
  chosen: they killed
  alternatives:
  - they struck down
  - they slew
  lexicon: HALOT
  rationale: הרג straightforwardly means 'kill.' 'Slew' is archaic; 'struck down' is possible but less direct than the Hebrew.
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: With a singular noun in English, 'every male' is the most natural equivalent to כָּל זָכָר.
- source_word: זָכָר
  chosen: male
  alternatives:
  - man
  - males
  lexicon: HALOT
  rationale: זָכָר denotes male sex broadly, not specifically adult men. 'Male' is therefore more precise than 'man' and preserves the scope of the Hebrew.
