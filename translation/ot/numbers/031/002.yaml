theological_decisions:
- issue: Death idiom in Moses' impending end
  chosen_reading: Retain the Hebrew idiom 'you will be gathered to your people' rather
    than paraphrasing it as 'you will die.'
  alternative_readings:
  - After that you will die
  - After that you will be gathered to your ancestors
  rationale: The phrase is a conventional Hebrew expression for death, but preserving
    the idiom maintains the text's imagery and avoids importing a more specific doctrine
    of the afterlife than the verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English without flattening theological weight.
