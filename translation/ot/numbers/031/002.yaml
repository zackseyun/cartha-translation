id: NUM.31.2
reference: Numbers 31:2
source:
  edition: WLC
  text: נְקֹ֗ם נִקְמַת֙ בְּנֵ֣י יִשְׂרָאֵ֔ל מֵ/אֵ֖ת הַ/מִּדְיָנִ֑ים אַחַ֖ר תֵּאָסֵ֥ף
    אֶל עַמֶּֽי/ךָ־׃
translation:
  text: Take vengeance for the sons of Israel on the Midianites. Afterward you will
    be gathered to your people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''Avenge the Israelites on the Midianites.'' Hebrew: ''Take the vengeance
      of the sons of Israel from/on the Midianites.'''
    reason: lexical_alternative
  - marker: b
    text: '''You will be gathered to your people'' is a Hebrew idiom for death.'
    reason: cultural_note
lexical_decisions:
- source_word: נְקֹם
  chosen: Take vengeance
  alternatives:
  - Avenge
  - Execute vengeance
  lexicon: HALOT
  rationale: Imperative 2ms from נקם, a direct command to Moses. 'Take vengeance'
    is natural modern English and preserves the force of the imperative without softening
    it.
- source_word: נִקְמַת
  chosen: vengeance
  alternatives:
  - avenging
  - the vengeance
  lexicon: HALOT
  rationale: 'Cognate accusative with the verb נקם intensifies the action: literally
    ''avenge the vengeance.'' English normally collapses this into a single idiomatic
    expression, here reflected by ''Take vengeance.'' The object is then specified
    by the following phrase.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate rendering of בני as 'sons' follows the stated philosophy.
    While 'Israelites' is idiomatic, 'sons of Israel' more closely reflects the Hebrew
    form and covenantal identity language.
- source_word: מֵאֵת הַמִּדְיָנִים
  chosen: on the Midianites
  alternatives:
  - against the Midianites
  - from the Midianites
  lexicon: HALOT
  rationale: With נקם, the prepositional phrase marks the party against whom vengeance
    is taken. 'On the Midianites' is idiomatic in English for vengeance/judgment and
    avoids the misleadingly literal 'from the Midianites.'
- source_word: אַחַר
  chosen: Afterward
  alternatives:
  - After that
  - Then afterward
  lexicon: HALOT
  rationale: Temporal adverb introducing the next event in sequence.
- source_word: תֵּאָסֵף
  chosen: you will be gathered
  alternatives:
  - you will be taken away
  - you will be gathered in
  lexicon: HALOT
  rationale: Niphal imperfect of אסף in the common idiom for death. 'You will be gathered'
    preserves the metaphor rather than replacing it with an interpretive paraphrase
    such as 'you will die.'
- source_word: אֶל עַמֶּיךָ
  chosen: to your people
  alternatives:
  - to your kin
  - to your ancestors
  lexicon: HALOT
  rationale: Standard Hebrew idiom accompanying death. 'To your people' is the most
    direct and traditional equivalent; 'ancestors' is interpretive and narrower than
    the Hebrew.
