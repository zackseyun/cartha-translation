id: NUM.31.38
reference: Numbers 31:38
source:
  edition: WLC
  text: וְ/הַ֨/בָּקָ֔ר שִׁשָּׁ֥ה וּ/שְׁלֹשִׁ֖ים אָ֑לֶף וּ/מִכְסָ֥/ם לַ/יהוָ֖ה שְׁנַ֥יִם וְ/שִׁבְעִֽים׃
translation:
  text: And the cattle were thirty-six thousand, and their tribute for Yahweh was seventy-two.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הַבָּקָר
  chosen: the cattle
  alternatives:
  - the herd
  - the oxen
  lexicon: HALOT
  rationale: בָּקָר denotes cattle/herd animals, especially bovines. In this census-like inventory context, 'cattle' is the most natural collective English rendering.
- source_word: שִׁשָּׁה וּשְׁלֹשִׁים אָלֶף
  chosen: thirty-six thousand
  alternatives:
  - six and thirty thousand
  rationale: The Hebrew number is literally 'six and thirty thousand,' but standard modern English idiom reverses the order to 'thirty-six thousand' without loss of meaning.
- source_word: מִכְסָם
  chosen: their tribute
  alternatives:
  - their levy
  - their tax
  - their assessment
  lexicon: HALOT
  rationale: מֶכֶס in this context refers to the portion exacted from the spoil and given to the LORD. 'Tribute' communicates an assessed due portion in readable English; 'levy' is possible but less natural here.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - to the LORD
  lexicon: HALOT
  rationale: The preposition ל marks what is assigned as belonging to or designated for YHWH. Per doctrine, יהוה is rendered 'the LORD.' 'For the LORD' fits the sense of a dedicated portion.
- source_word: שְׁנַיִם וְשִׁבְעִים
  chosen: seventy-two
  alternatives:
  - two and seventy
  rationale: The Hebrew number is literally 'two and seventy,' but modern English idiom is 'seventy-two.'
