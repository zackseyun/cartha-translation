theological_decisions:
- issue: Rendering a morally difficult warfare command without softening or interpretive
    expansion
  chosen_reading: Translate the command directly and literally enough to preserve
    the severity of the text
  alternative_readings:
  - Use euphemistic language such as 'put to death' throughout
  - Paraphrase to explain the historical situation in the main text
  rationale: The translation should not mute the force of the Hebrew or import moral
    commentary into the verse itself. The text presents a direct command, and optimal
    equivalence here requires transparent rendering rather than softening.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
