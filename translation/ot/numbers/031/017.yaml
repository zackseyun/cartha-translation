id: NUM.31.17
reference: Numbers 31:17
source:
  edition: WLC
  text: וְ/עַתָּ֕ה הִרְג֥וּ כָל זָכָ֖ר בַּ/טָּ֑ף וְ/כָל אִשָּׁ֗ה יֹדַ֥עַת אִ֛ישׁ לְ/מִשְׁכַּ֥ב
    זָכָ֖ר הֲרֹֽגוּ־־׃
translation:
  text: So now, kill every male among the little ones, and kill every woman who has
    known a man by lying with a male.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''who has known a man by the lying of a male,'' a Hebrew idiom
      for sexual relations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - Now
  - And now
  lexicon: HALOT
  rationale: Marks a transition to the immediate command that follows. 'So now' preserves
    the discourse force of וְ plus עַתָּה without sounding overly wooden.
- source_word: הִרְגוּ / הֲרֹגוּ
  chosen: kill
  alternatives:
  - put to death
  - slay
  lexicon: HALOT
  rationale: The imperative of הרג is direct and forceful. 'Kill' is the clearest
    modern English equivalent; 'slay' is archaic, and 'put to death' is more formal
    than the Hebrew requires.
- source_word: כָל זָכָר
  chosen: every male
  alternatives:
  - every boy
  - every male person
  lexicon: HALOT
  rationale: זָכָר denotes 'male' rather than specifically 'boy.' Because the phrase
    is qualified by בַּטָּף, 'every male among the little ones' best preserves both
    elements.
- source_word: בַּטָּף
  chosen: among the little ones
  alternatives:
  - among the children
  - among the dependents
  lexicon: HALOT
  rationale: טַף refers to little children or dependents. 'Among the little ones'
    is more precise than simply 'children' and avoids flattening the phrase into a
    generic age category.
- source_word: אִשָּׁה
  chosen: woman
  alternatives:
  - female
  - wife
  lexicon: HALOT
  rationale: Here אִשָּׁה is indefinite and generic, referring to women as a class,
    not specifically wives. 'Woman' is the natural English rendering.
- source_word: יֹדַעַת אִישׁ
  chosen: who has known a man
  alternatives:
  - who has had relations with a man
  - who has had sexual intercourse with a man
  lexicon: HALOT
  rationale: יָדַע with sexual sense is a common Hebrew idiom. 'Has known a man' preserves
    the idiom in readable English while the following phrase clarifies the sexual
    meaning.
- source_word: לְמִשְׁכַּב זָכָר
  chosen: by lying with a male
  alternatives:
  - in sexual intercourse
  - in bed with a man
  lexicon: HALOT
  rationale: This phrase specifies the sexual sense of 'known.' 'By lying with a male'
    stays close to the Hebrew wording and preserves the explicitness of the construction
    without unnecessary paraphrase.
