id: NUM.31.34
reference: Numbers 31:34
source:
  edition: WLC
  text: וַ/חֲמֹרִ֕ים אֶחָ֥ד וְ/שִׁשִּׁ֖ים אָֽלֶף׃
translation:
  text: and 61,000 donkeys.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַ/חֲמֹרִים
  chosen: and ... donkeys
  alternatives:
  - and ... asses
  lexicon: HALOT
  rationale: The prefixed conjunction continues the inventory list from the preceding
    verses, so 'and' should be retained. חֲמֹרִים is the common plural noun for donkeys;
    'donkeys' is standard modern English, while 'asses' is archaic and potentially
    distracting.
- source_word: אֶחָד וְ/שִׁשִּׁים אָלֶף
  chosen: 61,000
  alternatives:
  - sixty-one thousand
  lexicon: HALOT
  rationale: The Hebrew number sequence literally reads 'one and sixty thousand,'
    the standard Hebrew way of expressing 61,000. Rendering with Arabic numerals is
    clear, natural modern English in a census/spoil tally context, while preserving
    the exact quantity.
