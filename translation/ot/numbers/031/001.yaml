id: NUM.31.1
reference: Numbers 31:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: Then the LORD spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'' Alternative English
      renderings include ''Yahweh'' and ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... spoke
  alternatives:
  - And ... spoke
  - said
  lexicon: HALOT
  rationale: The waw-consecutive with דבר advances the narrative, commonly rendered
    'and/then ... spoke.' 'Then' gives natural English narrative flow while preserving
    sequence. 'Spoke' is preferred over 'said' because the Hebrew verb is דבר, not
    אמר.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name YHWH is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition here marking the addressee of speech;
    'to' is the natural modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
- source_word: לֵּאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: The infinitive construct formula introducing direct speech is conventionally
    and accurately rendered 'saying,' especially since the content follows in the
    next verse.
