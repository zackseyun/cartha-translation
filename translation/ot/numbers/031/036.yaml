id: NUM.31.36
reference: Numbers 31:36
source:
  edition: WLC
  text: וַ/תְּהִי֙ הַֽ/מֶּחֱצָ֔ה חֵ֕לֶק הַ/יֹּצְאִ֖ים בַּ/צָּבָ֑א מִסְפַּ֣ר הַ/צֹּ֗אן
    שְׁלֹשׁ מֵא֥וֹת אֶ֨לֶף֙ וּ/שְׁלֹשִׁ֣ים אֶ֔לֶף וְ/שִׁבְעַ֥ת אֲלָפִ֖ים וַ/חֲמֵ֥שׁ
    מֵאֽוֹת־׃
translation:
  text: And the half, the portion of those who went out in the army, was in number
    337,500 sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the share of those who went out to war.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּהִי
  chosen: was
  alternatives:
  - came to be
  - amounted to
  lexicon: HALOT
  rationale: The waw-consecutive form of היה here introduces the resulting total.
    'Was' is natural English and preserves the simple copular sense without adding
    interpretation.
- source_word: הַמֶּחֱצָה
  chosen: the half
  alternatives:
  - the half-share
  - the half portion
  lexicon: HALOT
  rationale: Refers to one half of the spoil just divided in the surrounding context.
    'The half' is sufficiently clear and keeps the formal link to the Hebrew noun.
- source_word: חֵלֶק
  chosen: the portion of
  alternatives:
  - share of
  - part of
  lexicon: HALOT
  rationale: In apposition to 'the half,' specifying whose half is in view. 'The portion
    of' preserves the distributive sense in readable English.
- source_word: הַיֹּצְאִים בַּצָּבָא
  chosen: those who went out in the army
  alternatives:
  - those who went out to war
  - the warriors
  - those who served in the campaign
  lexicon: HALOT
  rationale: Literally 'the ones going out in the army.' This refers to the combatants.
    'Those who went out in the army' stays close to the Hebrew while remaining understandable;
    'to war' would also fit but is slightly more interpretive.
- source_word: מִסְפַּר
  chosen: in number
  alternatives:
  - the number of
  - numbering
  lexicon: HALOT
  rationale: Introduces the numerical total of the livestock. 'In number' reflects
    the Hebrew succinctly and fits the sentence structure.
- source_word: הַצֹּאן
  chosen: sheep
  alternatives:
  - flock
  - small livestock
  lexicon: HALOT
  rationale: In this context the term denotes sheep specifically, as shown by the
    counted spoil in the surrounding verses. 'Sheep' is the clearest English rendering.
- source_word: שְׁלֹשׁ מֵאוֹת אֶלֶף וּשְׁלֹשִׁים אֶלֶף וְשִׁבְעַת אֲלָפִים וַחֲמֵשׁ
    מֵאוֹת
  chosen: 337,500
  alternatives:
  - three hundred thirty-seven thousand five hundred
  - three hundred and thirty-seven thousand five hundred
  lexicon: HALOT
  rationale: 'The Hebrew number is straightforwardly additive: 300,000 + 30,000 +
    7,000 + 500. Numerals improve readability in modern English while preserving exact
    quantity.'
