id: NUM.31.45
reference: Numbers 31:45
source:
  edition: WLC
  text: וַ/חֲמֹרִ֕ים שְׁלֹשִׁ֥ים אֶ֖לֶף וַ/חֲמֵ֥שׁ מֵאֽוֹת׃
translation:
  text: and the donkeys, thirty thousand and five hundred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'asses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/חֲמֹרִים
  chosen: and the donkeys
  alternatives:
  - and the asses
  lexicon: HALOT
  rationale: חֲמֹרִים is the common plural noun for donkeys. The prefixed conjunction
    ו is carried over as 'and,' matching the list structure in the surrounding inventory.
    'Donkeys' is preferred in modern English over the archaic 'asses.' The article
    is not explicit in Hebrew here, but English idiom in an enumerated list naturally
    supplies 'the' for this category.
- source_word: שְׁלֹשִׁים אֶלֶף
  chosen: thirty thousand
  lexicon: HALOT
  rationale: 'Standard Hebrew cardinal number construction: ''thirty thousand.'' Rendered
    straightforwardly without expansion.'
- source_word: וַ/חֲמֵשׁ מֵאוֹת
  chosen: and five hundred
  lexicon: HALOT
  rationale: The conjunction before חֲמֵשׁ is retained as 'and,' yielding the full
    total 'thirty thousand and five hundred.' This reflects normal English rendering
    of the Hebrew additive number construction.
