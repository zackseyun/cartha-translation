id: NUM.31.28
reference: Numbers 31:28
source:
  edition: WLC
  text: וַ/הֲרֵמֹתָ֨ מֶ֜כֶס לַֽ/יהוָ֗ה מֵ/אֵ֞ת אַנְשֵׁ֤י הַ/מִּלְחָמָה֙ הַ/יֹּצְאִ֣ים
    לַ/צָּבָ֔א אֶחָ֣ד נֶ֔פֶשׁ מֵ/חֲמֵ֖שׁ הַ/מֵּא֑וֹת מִן הָ/אָדָם֙ וּ/מִן הַ/בָּקָ֔ר
    וּ/מִן הַ/חֲמֹרִ֖ים וּ/מִן הַ/צֹּֽאן־־־־׃
translation:
  text: 'And you shall levy a tribute for the LORD from the men of war who went out
    to battle: one life out of five hundred, from the people and from the cattle and
    from the donkeys and from the flock.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one soul out of five hundred.' The Hebrew uses nephesh as a counting
      term for an individual living being, whether human or animal.
    reason: lexical_alternative
  - marker: b
    text: Hebrew adam here refers to the human portion of the spoil, in contrast to
      the animals listed afterward.
    reason: cultural_note
lexical_decisions:
- source_word: וַהֲרֵמֹתָ
  chosen: you shall levy
  alternatives:
  - you shall raise
  - you shall set apart
  - you shall take as a contribution
  lexicon: HALOT
  rationale: Hiphil of רום here means to lift off or set apart as an assessed portion.
    In this military-plunder context, 'levy' best captures an imposed extracted portion
    without over-literal awkwardness.
- source_word: מֶכֶס
  chosen: tribute
  alternatives:
  - tax
  - levy
  - assessment
  lexicon: HALOT
  rationale: The noun denotes a due or assessed portion, especially from spoil or
    goods. 'Tribute' fits the context of a required portion dedicated to the LORD;
    'tax' sounds overly bureaucratic in modern English.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - to the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' 'For the LORD' communicates
    that the tribute is designated as belonging to him; 'to the LORD' would also be
    possible.
- source_word: מֵאֵת אַנְשֵׁי הַמִּלְחָמָה
  chosen: from the men of war
  alternatives:
  - from the warriors
  - from the fighting men
  lexicon: HALOT
  rationale: This phrase identifies the source group from whom the tribute is taken.
    'Men of war' preserves the masculine and military sense; 'warriors' is possible
    but less formally tied to the Hebrew wording.
- source_word: הַיֹּצְאִים לַצָּבָא
  chosen: who went out to battle
  alternatives:
  - who went out to the army
  - who went out for military service
  lexicon: HALOT
  rationale: The participial phrase specifies those who participated in the campaign.
    'Went out to battle' is idiomatic English and contextually precise.
- source_word: אֶחָד נֶפֶשׁ מֵחֲמֵשׁ הַמֵּאוֹת
  chosen: one life out of five hundred
  alternatives:
  - one soul out of five hundred
  - one head out of five hundred
  - one person out of five hundred
  lexicon: HALOT
  rationale: נפש here functions as a counting term for an individual living being
    across both humans and animals in the following list. 'Life' preserves the broad
    animate sense better than 'person,' which would not fit animals, while 'soul'
    may mislead modern readers into a more metaphysical sense.
- source_word: מִן הָאָדָם
  chosen: from the people
  alternatives:
  - from man
  - from humankind
  - from the human beings
  lexicon: HALOT
  rationale: אָדָם here contrasts human captives/persons with animals in the spoil
    list. 'From the people' is natural English and reflects the collective human category.
    The doctrine default allows 'man / humankind' contextually; here a collective
    rendering is clearer.
- source_word: וּמִן הַבָּקָר
  chosen: and from the cattle
  alternatives:
  - and from the herd
  lexicon: HALOT
  rationale: בקר denotes cattle/herd animals. 'Cattle' is the standard concrete rendering
    in inventory lists.
- source_word: וּמִן הַחֲמֹרִים
  chosen: and from the donkeys
  alternatives:
  - and from the asses
  lexicon: HALOT
  rationale: The plain modern English rendering is 'donkeys'; 'asses' is archaic in
    contemporary usage.
- source_word: וּמִן הַצֹּאן
  chosen: and from the flock
  alternatives:
  - and from the sheep and goats
  - and from the small livestock
  lexicon: HALOT
  rationale: צאן is a collective term for small livestock, especially sheep and goats.
    'Flock' is concise and standard, though broader specification could be footnoted
    if needed.
