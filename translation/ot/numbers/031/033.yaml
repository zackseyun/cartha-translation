id: NUM.31.33
reference: Numbers 31:33
source:
  edition: WLC
  text: וּ/בָקָ֕ר שְׁנַ֥יִם וְ/שִׁבְעִ֖ים אָֽלֶף׃
translation:
  text: and 72,000 cattle,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּבָקָר
  chosen: and cattle
  alternatives:
  - and herd animals
  - and oxen/cattle
  lexicon: HALOT
  rationale: בָּקָר denotes cattle/bovine livestock collectively. The prefixed conjunction
    וּ is carried over as 'and.' 'Cattle' is the most natural collective English rendering
    in a livestock inventory context.
- source_word: שְׁנַיִם וְשִׁבְעִים אָלֶף
  chosen: 72,000
  alternatives:
  - seventy-two thousand
  lexicon: HALOT
  rationale: The Hebrew number phrase literally reads 'two and seventy thousand,'
    idiomatically 'seventy-two thousand.' Numerals are rendered in standard modern
    English form for readability while preserving the exact quantity.
