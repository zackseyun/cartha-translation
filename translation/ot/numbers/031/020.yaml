id: NUM.31.20
reference: Numbers 31:20
source:
  edition: WLC
  text: וְ/כָל בֶּ֧גֶד וְ/כָל כְּלִי ע֛וֹר וְ/כָל מַעֲשֵׂ֥ה עִזִּ֖ים וְ/כָל כְּלִי
    עֵ֑ץ תִּתְחַטָּֽאוּ־־־־־־׃ס
translation:
  text: And every garment, and every article of leather, and every work of goats’
    hair, and every article of wood, you shall purify yourselves from sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall cleanse yourselves.' The Hebrew verb is the reflexive form
      of a root associated with sin/purification and here refers to ritual purification.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּגֶד
  chosen: garment
  alternatives:
  - clothing
  - cloth
  lexicon: HALOT
  rationale: בֶּגֶד commonly denotes a garment or item of clothing. 'Garment' is slightly
    more formal and fits the inventory style of the verse.
- source_word: כְּלִי עוֹר
  chosen: article of leather
  alternatives:
  - vessel of skin
  - item of hide
  - leather object
  lexicon: HALOT
  rationale: כְּלִי is a broad term for an implement, article, or vessel. Since the
    context lists categories of material objects rather than only containers, 'article'
    is broader and more natural than 'vessel.' עוֹר refers to skin/hide/leather; 'leather'
    communicates the likely finished material in readable English.
- source_word: מַעֲשֵׂה עִזִּים
  chosen: work of goats’ hair
  alternatives:
  - anything made of goats' hair
  - goat-hair изделие
  - goatskin work
  lexicon: HALOT
  rationale: מַעֲשֵׂה means work, workmanship, or thing made. With עִזִּים ('goats'),
    the phrase idiomatically refers to an item made from goat product, most likely
    goat hair/textile rather than goatskin, especially in material lists. 'Work of
    goats’ hair' stays close to the Hebrew while remaining intelligible.
- source_word: כְּלִי עֵץ
  chosen: article of wood
  alternatives:
  - wooden vessel
  - wooden article
  - item of wood
  lexicon: HALOT
  rationale: As with כְּלִי עוֹר, כְּלִי is broader than 'vessel.' 'Article of wood'
    preserves the material classification and parallels the previous phrase.
- source_word: תִּתְחַטָּאוּ
  chosen: you shall purify yourselves from sin
  alternatives:
  - you shall cleanse yourselves
  - you shall decontaminate yourselves
  - you shall undergo purification
  lexicon: HALOT
  rationale: The hitpael of חטא in ritual contexts means to purify oneself, often
    by removal of impurity associated with sin or corpse contamination. Because English
    'purify yourselves' can sound merely moral or inward, 'from sin' preserves the
    verbal connection to חטא and reflects the ritual-purification sense without over-paraphrasing.
