theological_decisions:
- issue: Ritual purification language in a war-purity context
  chosen_reading: Render תִּתְחַטָּאוּ with explicit purification language rather
    than a generic 'cleanse,' while not importing later theological categories.
  alternative_readings:
  - you shall cleanse yourselves
  - you shall purify them
  rationale: The Hebrew form is second person masculine plural reflexive, addressed
    to the hearers regarding purification. The verse concerns ritual purification
    of persons/items after warfare, not moral conversion or atonement in a developed
    doctrinal sense. The translation preserves that cultic sense without flattening
    the sin-related root.
  doctrine_reference: Translation philosophy §§1, 3, 6
