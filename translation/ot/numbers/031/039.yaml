id: NUM.31.39
reference: Numbers 31:39
source:
  edition: WLC
  text: וַ/חֲמֹרִ֕ים שְׁלֹשִׁ֥ים אֶ֖לֶף וַ/חֲמֵ֣שׁ מֵא֑וֹת וּ/מִכְסָ֥/ם לַֽ/יהוָ֖ה אֶחָ֥ד וְ/שִׁשִּֽׁים׃
translation:
  text: The donkeys were 30,500, and their tribute to Yahweh was 61.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their levy.' The Hebrew term refers to the assessed portion of the spoil set apart for the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/חֲמֹרִים
  chosen: The donkeys
  alternatives:
  - And the donkeys
  - The asses
  lexicon: HALOT
  rationale: חֲמֹרִים is the common plural noun for donkeys. English often omits the initial connective in list-style census formulas, so 'The donkeys' reads naturally while preserving the itemized sense. 'Asses' is archaic in modern English.
- source_word: שְׁלֹשִׁים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  chosen: 30,500
  alternatives:
  - thirty thousand and five hundred
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence gives the total count. Numerals are rendered with digits for readability in a statistical inventory context without loss of meaning.
- source_word: וּמִכְסָם
  chosen: their tribute
  alternatives:
  - their levy
  - their tax
  - their assessment
  lexicon: HALOT
  rationale: מִכְסָם refers here to the portion exacted from the spoil and given to the LORD. 'Tribute' communicates a required apportioned due in this cultic-war context more naturally than 'tax,' while 'levy' is possible but less immediately clear to modern readers.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition ל marks the tribute as belonging/given to the LORD; 'to the LORD' is a natural English rendering.
- source_word: אֶחָד וְשִׁשִּׁים
  chosen: '61'
  alternatives:
  - sixty-one
  lexicon: HALOT
  rationale: The Hebrew gives the tribute quantity as sixty-one. Digits fit the surrounding inventory style and preserve the exact count.
