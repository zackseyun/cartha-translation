id: NUM.31.14
reference: Numbers 31:14
source:
  edition: WLC
  text: וַ/יִּקְצֹ֣ף מֹשֶׁ֔ה עַ֖ל פְּקוּדֵ֣י הֶ/חָ֑יִל שָׂרֵ֤י הָ/אֲלָפִים֙ וְ/שָׂרֵ֣י
    הַ/מֵּא֔וֹת הַ/בָּאִ֖ים מִ/צְּבָ֥א הַ/מִּלְחָמָֽה׃
translation:
  text: And Moses was angry with the officers of the army, the commanders of thousands
    and the commanders of hundreds, who were coming from the battle campaign.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who came from the military service of the war.' The Hebrew phrase combines
      ideas of military host/service and warfare.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְצֹף
  chosen: was angry
  alternatives:
  - was wrathful
  - became angry
  - was furious
  lexicon: HALOT
  rationale: The verb קצף denotes anger/wrath. 'Was angry' is natural modern English
    and adequately conveys the force without overstating it as 'furious.'
- source_word: פְּקוּדֵי הֶחָיִל
  chosen: the officers of the army
  alternatives:
  - the appointed men of the force
  - the commanders of the army
  - the overseers of the host
  lexicon: HALOT
  rationale: פְּקוּדֵי, from פקד, here refers to those appointed/numbered in authority
    over the military force. 'Officers of the army' captures the administrative-military
    sense better than a wooden 'appointed men.'
- source_word: שָׂרֵי הָאֲלָפִים
  chosen: the commanders of thousands
  alternatives:
  - the captains of thousands
  - the chiefs of thousands
  lexicon: HALOT
  rationale: שָׂרִים are leaders/officials; in military context 'commanders' is clear
    modern English. Retaining 'of thousands' preserves the Hebrew organizational structure.
- source_word: וְשָׂרֵי הַמֵּאוֹת
  chosen: and the commanders of hundreds
  alternatives:
  - and the captains of hundreds
  - and the chiefs of hundreds
  lexicon: HALOT
  rationale: Parallel to the previous phrase; 'commanders' maintains consistency and
    military clarity.
- source_word: הַבָּאִים
  chosen: who were coming
  alternatives:
  - who came
  - returning
  lexicon: HALOT
  rationale: The participle is best represented as an ongoing/descriptive action.
    'Who were coming' reflects the Hebrew form more closely than the simple past 'who
    came.' 'Returning' is interpretive and not explicit in the verb itself.
- source_word: מִצְּבָא הַמִּלְחָמָה
  chosen: from the battle campaign
  alternatives:
  - from the service of the war
  - from the army of the war
  - from the warfare
  lexicon: HALOT
  rationale: צָבָא can denote military service/host, and with הַמִּלְחָמָה the phrase
    refers to the military expedition. 'Battle campaign' is readable modern English
    that preserves the military sense without the awkwardness of 'service of the war.'
