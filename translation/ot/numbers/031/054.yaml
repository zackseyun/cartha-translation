id: NUM.31.54
reference: Numbers 31:54
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח מֹשֶׁ֜ה וְ/אֶלְעָזָ֤ר הַ/כֹּהֵן֙ אֶת הַ/זָּהָ֔ב מֵ/אֵ֛ת שָׂרֵ֥י
    הָ/אֲלָפִ֖ים וְ/הַ/מֵּא֑וֹת וַ/יָּבִ֤אוּ אֹת/וֹ֙ אֶל אֹ֣הֶל מוֹעֵ֔ד זִכָּר֥וֹן
    לִ/בְנֵֽי יִשְׂרָאֵ֖ל לִ/פְנֵ֥י יְהוָֽה־־־׃פ
translation:
  text: So Moses and Eleazar the priest took the gold from the commanders of thousands
    and of hundreds, and they brought it into the tent of meeting as a memorial for
    the sons of Israel before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the Israelites.' The Hebrew reads 'for the sons of Israel,' a conventional
      covenantal designation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - received
  lexicon: HALOT
  rationale: The verb לקח in the waw-consecutive narrative form straightforwardly
    means 'took.' 'Received' is possible in context, but 'took' better preserves the
    Hebrew verbal sense while remaining natural English.
- source_word: הַזָּהָב
  chosen: the gold
  alternatives:
  - gold
  lexicon: HALOT
  rationale: Definite article is present in Hebrew. English can omit it, but 'the
    gold' reflects the specific gold just described in the context.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - at the hand of
  - from the hand of
  lexicon: HALOT
  rationale: The preposition marks source/origin. 'From' is the most natural English
    rendering here.
- source_word: שָׂרֵי הָאֲלָפִים וְהַמֵּאוֹת
  chosen: the commanders of thousands and of hundreds
  alternatives:
  - the officers over the thousands and the hundreds
  - the leaders of thousands and hundreds
  lexicon: HALOT
  rationale: שׂרים are military leaders in this context. 'Commanders' best fits the
    military setting. 'Thousands' and 'hundreds' refer to military-administrative
    units, not literal counts of persons under command in this verse.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the Tent of Meeting
  lexicon: HALOT
  rationale: Standard rendering of the tabernacle designation. Lowercase is used here
    as a common descriptive title in running text; capitalization is an orthographic
    choice, not a lexical one.
- source_word: זִכָּרוֹן
  chosen: as a memorial
  alternatives:
  - for a memorial
  - as a reminder
  lexicon: HALOT
  rationale: The noun denotes a memorial/remembrance object or act. 'As a memorial'
    reads naturally in English and preserves the cultic commemorative sense.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: for the sons of Israel
  alternatives:
  - for the people of Israel
  - for the Israelites
  lexicon: HALOT
  rationale: In keeping with the project's gender-accurate principle, בני ישראל is
    rendered 'sons of Israel' rather than flattened to 'Israelites.' The phrase is
    a standard ethnocovenantal designation; a more idiomatic alternative is possible
    but the formal rendering is preferred here.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: The phrase regularly denotes being before/in the presence of YHWH in
    cultic context. 'Before the LORD' is both idiomatic and consistent with the project's
    default rendering of YHWH as 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following longstanding reverential convention and Septuagintal pattern.
