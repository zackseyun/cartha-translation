id: NUM.31.3
reference: Numbers 31:3
source:
  edition: WLC
  text: וַ/יְדַבֵּ֤ר מֹשֶׁה֙ אֶל הָ/עָ֣ם לֵ/אמֹ֔ר הֵחָלְצ֧וּ מֵ/אִתְּ/כֶ֛ם אֲנָשִׁ֖ים
    לַ/צָּבָ֑א וְ/יִהְיוּ֙ עַל מִדְיָ֔ן לָ/תֵ֥ת נִקְמַת יְהוָ֖ה בְּ/מִדְיָֽן־־־׃
translation:
  text: So Moses spoke to the people, saying, “Arm men from among you for the army,
    and let them go against Midian to execute the LORD’s vengeance on Midian.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “vengeance for the LORD.” The Hebrew can denote vengeance belonging to
      the LORD or carried out on his behalf.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: Common narrative wayyiqtol of דבר introducing direct speech; 'spoke'
    fits the formal narrative frame before the quoted command.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עם here refers to the assembled Israelite community addressed by Moses,
    best rendered 'the people' in natural English.
- source_word: הֵחָלְצוּ
  chosen: Arm
  alternatives:
  - Equip
  - Muster
  - Prepare for battle
  lexicon: HALOT
  rationale: The verb חלץ in military context conveys making ready/equipping for war.
    'Arm' is concise and idiomatic, capturing the martial sense better than the more
    generic 'prepare'.
- source_word: מֵאִתְּכֶם
  chosen: from among you
  alternatives:
  - from you
  lexicon: HALOT
  rationale: The prepositional phrase indicates selection out of the people themselves,
    not merely action done by them. 'From among you' makes that explicit in idiomatic
    English.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  - warriors
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural and in a military setting
    refers to male combatants. Per gender-accurate policy, 'men' is preferred over
    a neutral term.
- source_word: לַצָּבָא
  chosen: for the army
  alternatives:
  - for war
  - for battle
  - for military service
  lexicon: HALOT
  rationale: צבא can denote army/warfare/service. Here it marks mobilization for a
    military campaign. 'For the army' preserves the concrete force while remaining
    readable.
- source_word: וְיִהְיוּ עַל מִדְיָן
  chosen: and let them go against Midian
  alternatives:
  - and let them be against Midian
  - and let them attack Midian
  lexicon: HALOT
  rationale: The idiom היה על with hostile force indicates setting out against an
    enemy. 'Go against Midian' is natural English and preserves the military movement
    without over-specifying the action.
- source_word: לָתֵת
  chosen: to execute
  alternatives:
  - to give
  - to inflict
  lexicon: HALOT
  rationale: Although literally 'to give,' in this collocation with vengeance the
    sense is carrying out or inflicting vengeance. 'Execute' communicates the idiomatic
    force in English.
- source_word: נִקְמַת
  chosen: vengeance
  alternatives:
  - vengeance due
  - avenging
  - retribution
  lexicon: HALOT
  rationale: נקמה denotes vengeance/avenging. 'Vengeance' is the most direct nominal
    equivalent and preserves the severity of the term.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
- source_word: בְּמִדְיָן
  chosen: on Midian
  alternatives:
  - against Midian
  - upon Midian
  lexicon: HALOT
  rationale: The preposition marks the object/target of the vengeance. 'On Midian'
    works naturally with 'vengeance' in English and mirrors the Hebrew construction.
