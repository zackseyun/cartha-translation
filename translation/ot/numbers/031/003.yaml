theological_decisions:
- issue: Rendering divine vengeance in a holy-war context
  chosen_reading: the LORD’s vengeance
  alternative_readings:
  - vengeance for the LORD
  - the LORD’s avenging
  rationale: The construct phrase נִקְמַת יְהוָה most naturally means vengeance belonging
    to or carried out on behalf of the LORD. 'The LORD’s vengeance' preserves the
    text's attribution without softening or expanding it into a broader theological
    explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
