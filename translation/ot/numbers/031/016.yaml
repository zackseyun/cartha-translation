id: NUM.31.16
reference: Numbers 31:16
source:
  edition: WLC
  text: הֵ֣ן הֵ֜נָּה הָי֨וּ לִ/בְנֵ֤י יִשְׂרָאֵל֙ בִּ/דְבַ֣ר בִּלְעָ֔ם לִ/מְסָר מַ֥עַל בַּ/יהוָ֖ה עַל דְּבַר פְּע֑וֹר וַ/תְּהִ֥י הַ/מַּגֵּפָ֖ה בַּ/עֲדַ֥ת יְהוָֽה־־־׃
translation:
  text: Look, these women were the ones who, at Balaam’s word, caused the sons of Israel to act unfaithfully against Yahweh in the matter of Peor, and so the plague came upon the congregation of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through Balaam’s counsel' or 'on Balaam’s advice.' The Hebrew says literally 'at/by the word of Balaam.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel'; this refers to the people of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן הֵנָּה
  chosen: Look, these women were the ones
  alternatives:
  - Behold, these
  - Indeed, these women
  lexicon: HALOT
  rationale: The doubled demonstrative/exclamatory construction is emphatic. 'Look' captures the deictic force in natural modern English, and 'these women were the ones' makes explicit the feminine plural referent from context.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Rendered gender-accurately per project philosophy. Although idiomatically this refers to Israel as a people, the Hebrew expression is literally 'sons of Israel'; this is preserved in the main text rather than flattened to 'Israelites'.
- source_word: בִּדְבַר בִּלְעָם
  chosen: at Balaam’s word
  alternatives:
  - through Balaam’s counsel
  - on Balaam’s advice
  lexicon: HALOT
  rationale: דבר here means 'word/matter' and in context refers to Balaam's prompting or counsel. 'At Balaam’s word' preserves the lexical link to 'word' while still conveying causative influence.
- source_word: לִמְסָר
  chosen: caused
  alternatives:
  - were for causing
  - led
  lexicon: HALOT
  rationale: 'The infinitive construct from מסר in this context expresses resulting agency: these women became the means by which Israel was induced into wrongdoing. ''Caused'' is concise and idiomatic.'
- source_word: מַעַל
  chosen: to act unfaithfully
  alternatives:
  - to commit trespass
  - to be unfaithful
  - to break faith
  lexicon: HALOT
  rationale: מעל denotes breach of faith or treachery, often in covenantal contexts. 'Act unfaithfully' preserves both the verbal sense and covenantal nuance better than the archaic 'commit trespass'.
- source_word: בַּיהוָה
  chosen: against the LORD
  alternatives:
  - against Yahweh
  - toward the LORD
  lexicon: HALOT
  rationale: With מעל, the preposition marks the one against whom the unfaithfulness is committed. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: עַל דְּבַר פְּעוֹר
  chosen: in the matter of Peor
  alternatives:
  - because of Peor
  - over the affair of Peor
  lexicon: HALOT
  rationale: The phrase means 'concerning the matter/affair of Peor,' referring to the Baal-peor incident. 'In the matter of Peor' is a natural English rendering that preserves the event-reference without overexpanding.
- source_word: וַתְּהִי הַמַּגֵּפָה
  chosen: so that the plague came
  alternatives:
  - and the plague happened
  - and there was a plague
  lexicon: HALOT
  rationale: The waw-consecutive plus היה introduces the consequence. 'So that the plague came' makes the result relation explicit and reads naturally in English.
- source_word: בַּעֲדַת יְהוָה
  chosen: upon the congregation of the LORD
  alternatives:
  - among the congregation of the LORD
  - on the assembly of the LORD
  lexicon: HALOT
  rationale: עֵדָה is 'congregation/assembly.' 'Congregation' fits the communal sense here. The preposition can be rendered 'upon' with plague language, preserving the sense of judgment falling on the community.
