theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make explicit the feminine referent of הֵנָּה
  chosen_reading: these women
  alternative_readings:
  - these
  - these ones
  rationale: The Hebrew pronoun is feminine plural, and the immediate context is Moses speaking about the Midianite women. Making the referent explicit in English avoids ambiguity while remaining faithful to the discourse context.
  doctrine_reference: DOCTRINE.md Translation philosophy §6 (readable modern English) and §5 (documented exception/consistency)
