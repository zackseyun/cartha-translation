id: NUM.31.53
reference: Numbers 31:53
source:
  edition: WLC
  text: אַנְשֵׁי֙ הַ/צָּבָ֔א בָּזְז֖וּ אִ֥ישׁ לֽ/וֹ׃
translation:
  text: The men of the army had each taken plunder for himself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'The men of the army had plundered, each man for himself.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי
  chosen: the men of
  alternatives:
  - the soldiers of
  - the people of
  lexicon: HALOT
  rationale: Construct plural of אִישׁ, here referring specifically to male members
    of the military force. 'Men of' preserves the construct relationship and the gender-accurate
    sense required by the source.
- source_word: הַצָּבָא
  chosen: the army
  alternatives:
  - the host
  - the military force
  lexicon: HALOT
  rationale: צָבָא commonly denotes an army or military host in narrative contexts.
    'The army' is the most natural modern English rendering.
- source_word: בָּזְזוּ
  chosen: had taken plunder
  alternatives:
  - plundered
  - had seized spoil
  - had taken spoil
  lexicon: HALOT
  rationale: From בזז, 'to plunder/spoil.' Because the object is implicit and the
    following אִישׁ לוֹ distributes the action individually, 'had taken plunder' makes
    the sense explicit in idiomatic English without over-paraphrasing.
- source_word: אִישׁ לּוֹ
  chosen: each ... for himself
  alternatives:
  - each man for himself
  - every man for himself
  - individually
  lexicon: HALOT
  rationale: The distributive expression literally means 'a man for himself,' indicating
    individual appropriation by each soldier. 'Each ... for himself' preserves the
    distributive force while reading naturally in English.
