id: NUM.31.37
reference: Numbers 31:37
source:
  edition: WLC
  text: וַ/יְהִ֛י הַ/מֶּ֥כֶס לַֽ/יהוָ֖ה מִן הַ/צֹּ֑אן שֵׁ֥שׁ מֵא֖וֹת חָמֵ֥שׁ וְ/שִׁבְעִֽים־׃
translation:
  text: And the tribute for Yahweh from the flock was six hundred seventy-five.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... was
  alternatives:
  - And ... became
  - And there was
  lexicon: HALOT
  rationale: The waw-consecutive form of היה here functions as a simple narrative/copular link introducing the amount of the levy. In English, 'And ... was' is the most natural equivalent.
- source_word: הַמֶּכֶס
  chosen: the tribute
  alternatives:
  - the levy
  - the tax
  - the assessment
  lexicon: HALOT
  rationale: מֶכֶס in this context refers to the portion exacted from war spoil and set apart as a due. 'Tribute' communicates an imposed portion without over-specifying modern taxation categories. 'Levy' is possible, but 'tribute' reads more naturally in English here.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - belonging to the LORD
  - to the LORD
  lexicon: HALOT
  rationale: The preposition ל marks the portion designated for YHWH. 'For the LORD' expresses destination/dedication naturally in English. Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: יהוה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's mandated default for the divine name, preserving the reverential substitution traditional in English Bibles and reflecting the doctrine table.
- source_word: מִן הַצֹּאן
  chosen: from the flock
  alternatives:
  - from the sheep
  - from the small livestock
  lexicon: HALOT
  rationale: צֹאן denotes small livestock, especially sheep and goats. In this immediate context of counting spoil categories, 'flock' is a natural collective rendering that avoids narrowing the term unnecessarily to sheep alone.
- source_word: שֵׁשׁ מֵאוֹת חָמֵשׁ וְשִׁבְעִים
  chosen: six hundred seventy-five
  alternatives:
  - six hundred and seventy-five
  lexicon: HALOT
  rationale: This is the straightforward cardinal number. The version without 'and' fits clean modern English style while preserving the exact total.
