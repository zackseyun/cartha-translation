id: NUM.31.35
reference: Numbers 31:35
source:
  edition: WLC
  text: וְ/נֶ֣פֶשׁ אָדָ֔ם מִן הַ֨/נָּשִׁ֔ים אֲשֶׁ֥ר לֹֽא יָדְע֖וּ מִשְׁכַּ֣ב זָכָ֑ר
    כָּל נֶ֕פֶשׁ שְׁנַ֥יִם וּ/שְׁלֹשִׁ֖ים אָֽלֶף־־־׃
translation:
  text: And the human persons from the women who had not known the bed of a male,
    all the persons, were thirty-two thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''had not known the bed of a male,'' an idiom meaning they had
      not had sexual relations with a man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ אָדָם
  chosen: human persons
  alternatives:
  - persons
  - human beings
  - people
  lexicon: HALOT
  rationale: נֶפֶשׁ literally denotes a living being/person, and with אָדָם specifies
    human life as opposed to livestock in the surrounding census. 'Human persons'
    preserves the contrast and avoids reducing the phrase to a mere headcount formula.
- source_word: אָדָם
  chosen: human
  alternatives:
  - man
  - humankind
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here it distinguishes
    human beings from animals rather than referring to a male individual, so 'human'
    best matches the sense.
- source_word: מִן הַנָּשִׁים
  chosen: from the women
  alternatives:
  - among the women
  lexicon: HALOT
  rationale: The preposition marks this group as drawn from the women taken in war.
    'From the women' is the most direct rendering.
- source_word: אֲשֶׁר לֹא יָדְעוּ
  chosen: who had not known
  alternatives:
  - who had not had relations with
  - who had not experienced
  lexicon: HALOT
  rationale: יָדַע is the standard Hebrew euphemism for sexual knowledge in this construction.
    'Had not known' keeps the source idiom while remaining intelligible in context.
- source_word: מִשְׁכַּב זָכָר
  chosen: the bed of a male
  alternatives:
  - sexual relations with a man
  - a man's bed
  lexicon: HALOT
  rationale: The phrase is a Hebrew idiom for sexual intercourse with a male. Because
    the verse is a census formula, a relatively formal rendering preserves the wording
    closely; the idiomatic sense is clear enough, and an alternative is preserved
    in a footnote.
- source_word: כָּל נֶפֶשׁ
  chosen: all the persons
  alternatives:
  - every person
  - the total number of persons
  lexicon: HALOT
  rationale: This resumes the count and totals the group. 'All the persons' reflects
    the distributive-totaling force without sounding overly technical.
- source_word: שְׁנַיִם וּשְׁלֹשִׁים אָלֶף
  chosen: thirty-two thousand
  lexicon: HALOT
  rationale: Standard English rendering of the numeral sequence.
