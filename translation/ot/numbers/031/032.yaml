id: NUM.31.32
reference: Numbers 31:32
source:
  edition: WLC
  text: וַ/יְהִי֙ הַ/מַּלְק֔וֹחַ יֶ֣תֶר הַ/בָּ֔ז אֲשֶׁ֥ר בָּזְז֖וּ עַ֣ם הַ/צָּבָ֑א
    צֹ֗אן שֵׁשׁ מֵא֥וֹת אֶ֛לֶף וְ/שִׁבְעִ֥ים אֶ֖לֶף וַ/חֲמֵֽשֶׁת אֲלָפִֽים־־׃
translation:
  text: Now the plunder, the remainder of the spoil that the people of the army had
    taken, was 675,000 sheep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the booty, the rest of the spoil.' The Hebrew uses two closely related
      war-booty terms (מַלְקוֹחַ and בָּז), likely for stylistic or classificatory
      nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ... was
  alternatives:
  - And ... was
  - And there was
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the inventory statement. 'Now ...
    was' gives natural English narrative progression while preserving the simple existential/copular
    force.
- source_word: הַמַּלְקוֹחַ
  chosen: the plunder
  alternatives:
  - the booty
  - the captured goods
  lexicon: HALOT
  rationale: Refers to what was taken in war. 'Plunder' is clear modern English and
    fits the military context.
- source_word: יֶתֶר
  chosen: the remainder of
  alternatives:
  - the rest of
  - what remained of
  lexicon: HALOT
  rationale: Marks this as the surplus/remainder portion in relation to the spoil.
    'The remainder of' preserves the construct relationship with the following noun.
- source_word: הַבָּז
  chosen: the spoil
  alternatives:
  - the booty
  - the prey
  lexicon: HALOT
  rationale: A standard war-booty term. Using 'spoil' alongside 'plunder' reflects
    the Hebrew's paired but near-overlapping terms without collapsing them into one
    English word.
- source_word: אֲשֶׁר בָּזְזוּ
  chosen: that ... had taken
  alternatives:
  - that ... had plundered
  - which ... had seized
  lexicon: HALOT
  rationale: English idiom prefers 'had taken' with the object 'spoil/plunder.' This
    avoids the awkward 'plundered spoil' while still conveying the act of taking booty.
- source_word: עַם הַצָּבָא
  chosen: the people of the army
  alternatives:
  - the troops
  - the army's people
  - the fighting men
  lexicon: HALOT
  rationale: Literally 'the people of the army.' 'The troops' is smoother but less
    transparent to the Hebrew wording; this rendering keeps both elements while remaining
    understandable.
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - small livestock
  - flocks
  lexicon: HALOT
  rationale: In this counting context, 'sheep' is the most direct and natural rendering
    for צאן here.
- source_word: שֵׁשׁ מֵאוֹת אֶלֶף וְשִׁבְעִים אֶלֶף וַחֲמֵשֶׁת אֲלָפִים
  chosen: 675,000
  alternatives:
  - six hundred seventy-five thousand
  lexicon: HALOT
  rationale: The Hebrew number totals 600,000 + 70,000 + 5,000. Numerals improve readability
    in an inventory list while preserving exact quantity.
