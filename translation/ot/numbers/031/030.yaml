id: NUM.31.30
reference: Numbers 31:30
source:
  edition: WLC
  text: וּ/מִ/מַּחֲצִ֨ת בְּנֵֽי יִשְׂרָאֵ֜ל תִּקַּ֣ח אֶחָ֣ד אָחֻ֣ז מִן הַ/חֲמִשִּׁ֗ים מִן הָ/אָדָ֧ם מִן הַ/בָּקָ֛ר מִן הַ/חֲמֹרִ֥ים וּ/מִן הַ/צֹּ֖אן מִ/כָּל הַ/בְּהֵמָ֑ה וְ/נָתַתָּ֤ה אֹתָ/ם֙ לַ/לְוִיִּ֔ם שֹׁמְרֵ֕י מִשְׁמֶ֖רֶת מִשְׁכַּ֥ן יְהוָֽה־׀׀־־־־־־׃
translation:
  text: And from the half belonging to the sons of Israel you shall take one portion out of every fifty, from the people, from the cattle, from the donkeys, and from the flock, from every kind of livestock; and you shall give them to the Levites who keep charge of the tabernacle of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'one out of every fifty.'
    reason: lexical_alternative
  - marker: b
    text: '''The flock'' translates a collective term that can include sheep and goats.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִמַּחֲצִת
  chosen: from the half belonging to
  alternatives:
  - from the half of
  - from the Israelites' half
  lexicon: HALOT
  rationale: מַחֲצִית means 'half, half-portion.' The prefixed prepositions/conjunction yield 'and from the half of.' 'Belonging to' makes explicit the possessive relation to the following phrase without over-paraphrasing.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A formally transparent rendering preserves the Hebrew idiom and the gender-accurate wording of the source. 'Israelites' is possible, but 'sons of Israel' better reflects the underlying expression in this legal/narrative context.
- source_word: תִּקַּח
  chosen: you shall take
  alternatives:
  - you are to take
  lexicon: HALOT
  rationale: The imperfect here functions as an instruction to Moses. 'You shall take' is standard, clear, and suitably formal for legal prescription.
- source_word: אֶחָד אָחֻז מִן הַחֲמִשִּׁים
  chosen: one taken from every fifty
  alternatives:
  - one portion out of fifty
  - one seized from fifty
  - one out of every fifty
  lexicon: HALOT
  rationale: The phrase denotes a levy ratio of 1:50. אָחֻז literally relates to something taken/held; 'one taken from every fifty' preserves the passive nuance while communicating the counting formula. The smoother sense 'one out of every fifty' is reflected in the footnote as a lexical alternative.
- source_word: מִן הָאָדָם
  chosen: from the man
  alternatives:
  - from the people
  - from humankind
  lexicon: HALOT
  rationale: Per doctrine, אָדָם should be rendered 'man' or 'humankind' according to context. Here it refers to the human portion in the list of war booty categories, singular collective. 'The man' preserves the singular collective form more closely than 'people,' though the latter is idiomatic.
- source_word: מִן הַבָּקָר
  chosen: from the cattle
  alternatives:
  - from the herd
  lexicon: HALOT
  rationale: בָּקָר denotes cattle/herd animals. 'Cattle' is the most direct and natural English equivalent in a livestock inventory.
- source_word: מִן הַחֲמֹרִים
  chosen: from the donkeys
  alternatives:
  - from the asses
  lexicon: HALOT
  rationale: Modern readable English favors 'donkeys.' 'Asses' is accurate but archaic or distracting for contemporary readers.
- source_word: וּמִן הַצֹּאן
  chosen: and from the flock
  alternatives:
  - and from the sheep and goats
  - and from the small livestock
  lexicon: HALOT
  rationale: צֹאן is a collective for small livestock, especially sheep/goats. 'Flock' is concise and conventional; a footnote preserves the more explicit lexical range.
- source_word: מִכָּל הַבְּהֵמָה
  chosen: from every kind of livestock
  alternatives:
  - from all the animals
  - from every beast
  lexicon: HALOT
  rationale: בְּהֵמָה here functions as a broad category of animals/livestock. 'Every kind of livestock' avoids the overly broad 'animals' while fitting the inventory context.
- source_word: וְנָתַתָּה אֹתָם
  chosen: and you shall give them
  alternatives:
  - and give them
  lexicon: HALOT
  rationale: Straightforward sequential instruction; 'shall' matches the legal-prescriptive tone.
- source_word: לַלְוִיִּם
  chosen: to the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal designation.
- source_word: שֹׁמְרֵי מִשְׁמֶרֶת
  chosen: who keep charge
  alternatives:
  - who keep the duty
  - who perform the service of guarding
  lexicon: HALOT
  rationale: The cognate construction emphasizes guarding/keeping an assigned duty. 'Keep charge' is idiomatic English that preserves the custodial sense.
- source_word: מִשְׁכַּן יְהוָה
  chosen: the tabernacle of the LORD
  alternatives:
  - the dwelling place of the LORD
  - the LORD's tabernacle
  lexicon: HALOT
  rationale: מִשְׁכָּן is conventionally and accurately 'tabernacle' in Pentateuchal cultic contexts. Per doctrine, יְהוָה is rendered 'the LORD'.
