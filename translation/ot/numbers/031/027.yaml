id: NUM.31.27
reference: Numbers 31:27
source:
  edition: WLC
  text: וְ/חָצִ֨יתָ֙ אֶת הַ/מַּלְק֔וֹחַ בֵּ֚ין תֹּפְשֵׂ֣י הַ/מִּלְחָמָ֔ה הַ/יֹּצְאִ֖ים
    לַ/צָּבָ֑א וּ/בֵ֖ין כָּל הָ/עֵדָֽה־־׃
translation:
  text: And divide the plunder between the warriors who went out to battle and all
    the congregation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the booty' or 'the spoil.' The Hebrew term refers to what was taken
      in war.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew ''all the congregation''; also possible: ''all the community'' or
      ''all the assembly.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָצִיתָ
  chosen: And divide
  alternatives:
  - And you shall divide
  - And apportion
  lexicon: HALOT
  rationale: The verb from חצה means to divide or split. English imperative-like instruction
    fits the context of divine command to Moses. 'Divide' is the most direct and natural
    rendering; 'you shall divide' is possible but less idiomatic in this sequence
    of instructions.
- source_word: הַמַּלְקוֹחַ
  chosen: the plunder
  alternatives:
  - the booty
  - the spoil
  - the captives and goods taken
  lexicon: HALOT
  rationale: מַלְקוֹחַ refers to what is taken in war. 'Plunder' is clear modern English
    and suitably broad. 'Booty' can sound dated or misleading in modern usage; 'spoil'
    is traditional but less natural. The term here covers the taken goods/people listed
    in the surrounding context.
- source_word: בֵּין
  chosen: between
  alternatives:
  - among
  lexicon: HALOT
  rationale: The preposition marks a division between two parties, so 'between' is
    the precise choice.
- source_word: תֹּפְשֵׂי הַמִּלְחָמָה
  chosen: the warriors
  alternatives:
  - those who seized in the war
  - those who took hold of the battle
  - the fighting men
  lexicon: HALOT
  rationale: Literally 'those who grasp/handle the war,' an idiom for combatants.
    'The warriors' communicates the sense naturally in English without wooden phrasing.
- source_word: הַיֹּצְאִים לַצָּבָא
  chosen: who went out to battle
  alternatives:
  - who went out to the army
  - who went out for military service
  lexicon: HALOT
  rationale: This participial phrase further identifies the combatants as those who
    went out on campaign. 'To battle' captures the military sense of לַצָּבָא in context.
- source_word: וּבֵין כָּל הָעֵדָה
  chosen: and all the congregation
  alternatives:
  - and all the community
  - and all the assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled covenant community of Israel. 'Congregation'
    preserves that corporate sense well in biblical context, while remaining understandable.
