id: NUM.31.22
reference: Numbers 31:22
source:
  edition: WLC
  text: אַ֥ךְ אֶת הַ/זָּהָ֖ב וְ/אֶת הַ/כָּ֑סֶף אֶֽת הַ/נְּחֹ֨שֶׁת֙ אֶת הַ/בַּרְזֶ֔ל
    אֶֽת הַ/בְּדִ֖יל וְ/אֶת הָ/עֹפָֽרֶת־־־־־־׃
translation:
  text: Only the gold, and the silver, the bronze, the iron, the tin, and the lead—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'copper' for 'bronze.' The Hebrew term can refer broadly to copper-based
      metal.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Only
  alternatives:
  - However
  - Nevertheless
  - But only
  lexicon: HALOT
  rationale: In this context אַךְ introduces an exception or limitation to the preceding
    instructions, not a strong adversative. 'Only' naturally signals that what follows
    is the restricted category of items under discussion.
- source_word: הַזָּהָב
  chosen: the gold
  lexicon: HALOT
  rationale: Standard rendering of זָהָב as the metal 'gold.' The article is retained
    in English for the list structure.
- source_word: הַכָּסֶף
  chosen: the silver
  lexicon: HALOT
  rationale: Standard rendering of כֶּסֶף here as the metal 'silver,' not 'money,'
    since the context is a list of metals subject to purification.
- source_word: הַנְּחֹשֶׁת
  chosen: the bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper or bronze depending on context. In traditional
    biblical metal lists and likely ancient usage here, 'bronze' is the more idiomatic
    English rendering, while 'copper' remains a plausible lexical alternative.
- source_word: הַבַּרְזֶל
  chosen: the iron
  lexicon: HALOT
  rationale: Standard rendering of בַּרְזֶל as 'iron.'
- source_word: הַבְּדִיל
  chosen: the tin
  alternatives:
  - alloy
  lexicon: HALOT
  rationale: בְּדִיל most commonly denotes 'tin' in lists of metals. 'Alloy' is less
    precise and less likely in this enumerated context.
- source_word: הָעֹפָרֶת
  chosen: the lead
  lexicon: HALOT
  rationale: Standard rendering of עֹפָרֶת as 'lead.'
- source_word: אֵת repeated before each noun
  chosen: not separately translated
  lexicon: Hebrew grammar
  rationale: The repeated direct-object marker structures and emphasizes the list
    in Hebrew but has no direct English equivalent, so it is represented by English
    coordination and punctuation.
