id: NUM.31.26
reference: Numbers 31:26
source:
  edition: WLC
  text: שָׂ֗א אֵ֣ת רֹ֤אשׁ מַלְק֨וֹחַ֙ הַ/שְּׁבִ֔י בָּ/אָדָ֖ם וּ/בַ/בְּהֵמָ֑ה אַתָּה֙
    וְ/אֶלְעָזָ֣ר הַ/כֹּהֵ֔ן וְ/רָאשֵׁ֖י אֲב֥וֹת הָ/עֵדָֽה׃
translation:
  text: Take a count of the plunder that was taken captive, both of man and of beast—you
    and Eleazar the priest and the heads of the fathers’ houses of the congregation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the captives' / 'the captive spoil.' The Hebrew expression includes
      what was captured in war, here specified as both humans and animals.
    reason: lexical_alternative
  - marker: b
    text: '''Of man'' uses Hebrew אָדָם in contrast with animals; the sense is human
      beings.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the heads of the ancestral houses' or more dynamically 'the clan leaders.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂא
  chosen: Take
  alternatives:
  - Lift up
  - Carry
  lexicon: HALOT
  rationale: In the idiom שָׂא אֵת רֹאשׁ, the verb means to take or make a count rather
    than literally 'lift.' 'Take' works naturally in English with 'a count.'
- source_word: רֹאשׁ
  chosen: a count
  alternatives:
  - the sum
  - the total
  - the head/count
  lexicon: HALOT
  rationale: Within the idiom 'take the head' = count/enumerate. Rendering the idiomatic
    sense is clearer than a wooden 'head.'
- source_word: מַלְקוֹחַ
  chosen: plunder
  alternatives:
  - booty
  - spoil
  lexicon: HALOT
  rationale: Refers to goods taken in war. 'Plunder' is clear modern English; 'booty'
    can sound archaic or misleading.
- source_word: הַשְּׁבִי
  chosen: that was taken captive
  alternatives:
  - the captives
  - the captive spoil
  lexicon: HALOT
  rationale: The noun denotes what was captured. Because the following phrase includes
    both humans and animals, an attributive rendering modifying 'plunder' captures
    the sense of captured spoil without restricting it to persons alone.
- source_word: בָּאָדָם
  chosen: of man
  alternatives:
  - of humankind
  - of people
  lexicon: HALOT
  rationale: אָדָם here contrasts with animals and refers to human beings. Per doctrine,
    gender-accurate rendering is preferred; 'man' in this collective contrast preserves
    the source's form and sense.
- source_word: וּבַבְּהֵמָה
  chosen: and of beast
  alternatives:
  - and of livestock
  - and of animals
  lexicon: HALOT
  rationale: The term denotes animals, especially domesticated animals in this context.
    'Beast' preserves the human/animal contrast and the formal tone; 'livestock' is
    possible but slightly narrower.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Explicit pronoun adds emphasis to Moses' participation in the counting.
- source_word: אֶלְעָזָר הַכֹּהֵן
  chosen: Eleazar the priest
  rationale: Personal name is transliterated; title is translated, following project
    policy.
- source_word: רָאשֵׁי אֲבוֹת
  chosen: the heads of the fathers’ houses
  alternatives:
  - the chiefs of the ancestral houses
  - the heads of the clans
  lexicon: HALOT
  rationale: This phrase refers to family-household leaders. 'Heads of the fathers’
    houses' is relatively formal but preserves the social structure more precisely
    than the broader 'clans.'
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the community
  - the assembly
  lexicon: HALOT
  rationale: A standard term for the assembled Israelite community. 'Congregation'
    fits Pentateuchal usage and remains understandable.
