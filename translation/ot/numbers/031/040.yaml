  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD,' following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering אָדָם in a human-category phrase
  chosen_reading: of mankind
  alternative_readings:
  - of man
  - human
  rationale: The phrase distinguishes human persons from animals in the spoil list.
    'Of mankind' preserves the human reference while remaining gender-accurate per
    the translation philosophy.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם
    adam → man / humankind (context)'
