id: NUM.31.40
reference: Numbers 31:40
source:
  edition: WLC
  text: וְ/נֶ֣פֶשׁ אָדָ֔ם שִׁשָּׁ֥ה עָשָׂ֖ר אָ֑לֶף וּ/מִכְסָ/ם֙ לַֽ/יהוָ֔ה שְׁנַ֥יִם
    וּ/שְׁלֹשִׁ֖ים נָֽפֶשׁ׃
translation:
  text: And the persons of mankind were sixteen thousand, and their tribute for the
    LORD was thirty-two persons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'souls of man'; that is, human persons. 'Souls' is a more literal
      alternative, but here it functions as a counting term for people.
    reason: lexical_alternative
  - marker: b
    text: Or 'their levy.' The Hebrew refers to the assessed portion of the spoil
      set apart for the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  chosen: persons
  alternatives:
  - souls
  - lives
  lexicon: HALOT
  rationale: Here נֶפֶשׁ is a counting term for individual human beings in a census/spoil
    list, so 'persons' communicates the referent naturally in English without importing
    a more metaphysical sense of 'souls.'
- source_word: אָדָם
  chosen: of mankind
  alternatives:
  - human
  - man
  lexicon: HALOT
  rationale: In the phrase נֶפֶשׁ אָדָם, אָדָם marks these as human persons as opposed
    to animals. 'Of mankind' preserves the human category and follows the doctrine
    preference for gender-accurate rendering in context.
- source_word: שִׁשָּׁה עָשָׂר אָלֶף
  chosen: sixteen thousand
  rationale: Straightforward cardinal number construction.
- source_word: מִכְסָם
  chosen: their tribute
  alternatives:
  - their levy
  - their tax
  lexicon: HALOT
  rationale: מֶכֶס in this context is the assessed portion taken from the spoil and
    given to the LORD. 'Tribute' is natural English and fits the context of apportioned
    spoil; 'levy' is possible but less idiomatic here.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - to the LORD
  lexicon: HALOT
  rationale: The preposition marks dedication/allocation to YHWH. Per doctrine, יהוה
    is rendered 'the LORD.' 'For the LORD' fits the sense of an assigned tribute.
- source_word: שְׁנַיִם וּשְׁלֹשִׁים
  chosen: thirty-two
  rationale: Standard number expression.
- source_word: נָפֶשׁ
  chosen: persons
  alternatives:
  - souls
  lexicon: HALOT
  rationale: Repeated counting use of נֶפֶשׁ for human individuals; 'persons' keeps
    the English consistent and clear in this administrative context.
