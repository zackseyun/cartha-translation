id: NUM.31.25
reference: Numbers 31:25
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: Then Yahweh spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And the LORD said to Moses, saying.' The Hebrew uses a standard narrative speech formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר advances the narrative. 'Then' gives natural English narrative progression while preserving the sequential force; 'And' is possible but less idiomatic here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard prepositional sense in this speech-introduction formula; 'to' is clear modern English.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - as follows
  lexicon: HALOT
  rationale: This infinitive construct introduces the content of the speech in the next verse. Retaining 'saying' preserves the Hebrew discourse marker and signals continuation into the following quotation.
