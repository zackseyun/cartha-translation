id: NUM.31.48
reference: Numbers 31:48
source:
  edition: WLC
  text: וַֽ/יִּקְרְבוּ֙ אֶל מֹשֶׁ֔ה הַ/פְּקֻדִ֕ים אֲשֶׁ֖ר לְ/אַלְפֵ֣י הַ/צָּבָ֑א שָׂרֵ֥י
    הָ/אֲלָפִ֖ים וְ/שָׂרֵ֥י הַ/מֵּאֽוֹת־׃
translation:
  text: Then the officers who were over the thousands of the army, the commanders
    of thousands and the commanders of hundreds, came near to Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'approached Moses.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term rendered 'officers' refers to men appointed over military
      units; the following phrase specifies them as commanders of thousands and of
      hundreds.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקְרְבוּ
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: The verb קרב in the wayyiqtol form narrates movement toward someone.
    'Came near' preserves the concrete sense and narrative flow; 'approached' is possible
    but slightly less literal.
- source_word: הַפְּקֻדִים
  chosen: the officers
  alternatives:
  - the appointed men
  - the mustered men
  - the overseers
  lexicon: HALOT
  rationale: From פקד in a passive/participial form, here referring to those appointed
    or assigned over military units. In context, these are not the rank-and-file troops
    but the officials in charge, so 'the officers' best captures the function.
- source_word: אֲשֶׁר לְאַלְפֵי הַצָּבָא
  chosen: who were over the thousands of the army
  alternatives:
  - who belonged to the thousands of the army
  - who were assigned to the army's thousands
  lexicon: HALOT
  rationale: The phrase identifies the sphere of responsibility of these officers.
    Rendering with 'were over' makes explicit the governing relationship implied by
    the context and the following appositional titles.
- source_word: אַלְפֵי
  chosen: thousands
  alternatives:
  - clans
  - military thousands
  lexicon: HALOT
  rationale: Although אֶלֶף can sometimes denote a clan or military contingent, here
    the military context and the parallel with 'hundreds' favor the standard numerical/military-unit
    sense 'thousands.'
- source_word: הַצָּבָא
  chosen: the army
  alternatives:
  - the host
  - the troops
  lexicon: HALOT
  rationale: In this context צבא refers to the organized fighting force. 'Army' is
    clear modern English and fits the military setting better than the more archaic
    'host.'
- source_word: שָׂרֵי הָאֲלָפִים
  chosen: the commanders of thousands
  alternatives:
  - the captains of thousands
  - the chiefs of thousands
  lexicon: HALOT
  rationale: שׂר denotes a leader or official. 'Commanders' is natural in military
    context and avoids archaic 'captains' while preserving rank structure.
- source_word: וְשָׂרֵי הַמֵּאוֹת
  chosen: and the commanders of hundreds
  alternatives:
  - and the captains of hundreds
  - and the chiefs of hundreds
  lexicon: HALOT
  rationale: Parallel to the previous phrase; 'commanders of hundreds' preserves the
    military hierarchy and keeps consistency with שָׂרֵי הָאֲלָפִים.
