id: NUM.31.51
reference: Numbers 31:51
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח מֹשֶׁ֜ה וְ/אֶלְעָזָ֧ר הַ/כֹּהֵ֛ן אֶת הַ/זָּהָ֖ב מֵֽ/אִתָּ֑/ם כֹּ֖ל
    כְּלִ֥י מַעֲשֶֽׂה־׃
translation:
  text: So Moses and Eleazar the priest took the gold from them, all the crafted articles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the articles of workmanship,' that is, all the worked gold objects.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - received
  lexicon: HALOT
  rationale: The waw-consecutive verb from לקח straightforwardly denotes taking/receiving.
    'Took' best matches the narrative action and keeps the concrete sense.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: וְאֶלְעָזָר הַכֹּהֵן
  chosen: and Eleazar the priest
  alternatives:
  - and Eleazar the priestly one
  lexicon: HALOT
  rationale: Proper name plus appositional title. 'The priest' is the natural English
    rendering of הַכֹּהֵן and identifies his office.
- source_word: אֶת הַזָּהָב
  chosen: the gold
  lexicon: HALOT
  rationale: 'Direct object marker plus noun. The definite article is retained: this
    is the specific gold being presented in context.'
- source_word: מֵאִתָּם
  chosen: from them
  alternatives:
  - at their hand
  lexicon: HALOT
  rationale: The preposition with pronominal suffix indicates source/origin. 'From
    them' is idiomatic and accurate.
- source_word: כֹּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Quantifier modifying the following construct phrase. 'All' fits the collective
    sense of the items received.
- source_word: כְּלִי
  chosen: articles
  alternatives:
  - vessels
  - objects
  - items
  lexicon: HALOT
  rationale: כְּלִי is a broad term for an article, vessel, implement, or object.
    In this context of gold ornaments/spoil, 'articles' is broad enough without implying
    containers specifically, unlike 'vessels.'
- source_word: מַעֲשֶׂה
  chosen: crafted
  alternatives:
  - made
  - worked
  - fashioned
  lexicon: HALOT
  rationale: The noun means work, workmanship, or thing made. In construct with כְּלִי
    it describes manufactured objects. 'Crafted articles' communicates that these
    were worked items of gold, not raw bullion.
