id: NUM.31.31
reference: Numbers 31:31
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ מֹשֶׁ֔ה וְ/אֶלְעָזָ֖ר הַ/כֹּהֵ֑ן כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת
    מֹשֶֽׁה־׃
translation:
  text: So Moses and Eleazar the priest did as the LORD had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: HALOT
  rationale: The verb עשה here summarizes obedience to the preceding command. 'Did'
    is the most natural English rendering and fits the idiom 'did as ... commanded.'
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Personal name transliterated by standard English convention.
- source_word: וְאֶלְעָזָר
  chosen: and Eleazar
  rationale: Conjunction plus personal name; name is transliterated rather than translated.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Appositional title identifying Eleazar. 'The priest' is the plain sense
    and preserves the formal role designation.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according to what
  lexicon: HALOT
  rationale: 'Introduces comparison/conformity: they acted in accordance with the
    command. ''As'' is concise and idiomatic in English.'
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: The command precedes the action in context, so English past perfect is
    natural and clarifies sequence without adding meaning.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: אֶת מֹשֶׁה
  chosen: Moses
  rationale: Direct-object marker plus proper name. In English the marker is not translated;
    the object is rendered simply as 'Moses'.
