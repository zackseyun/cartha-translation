id: NUM.31.10
reference: Numbers 31:10
source:
  edition: WLC
  text: וְ/אֵ֤ת כָּל עָרֵי/הֶם֙ בְּ/מ֣וֹשְׁבֹתָ֔/ם וְ/אֵ֖ת כָּל טִֽירֹתָ֑/ם שָׂרְפ֖וּ
    בָּ/אֵֽשׁ־־׃
translation:
  text: They burned with fire all their cities where they lived, and all their encampments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all their cities in their settlements.' The Hebrew phrase may be rendered
      more formally, but 'where they lived' expresses the sense in natural English.
    reason: lexical_alternative
  - marker: b
    text: Or 'their camps' or 'their villages' for 'their encampments.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרֵיהֶם
  chosen: their cities
  alternatives:
  - their towns
  lexicon: HALOT
  rationale: עִיר commonly denotes a city or town. 'Cities' is the standard and sufficiently
    broad rendering in military/geographic contexts like this one.
- source_word: בְּמוֹשְׁבֹתָם
  chosen: where they lived
  alternatives:
  - in their dwelling places
  - in their settlements
  lexicon: HALOT
  rationale: מוֹשָׁב refers to dwelling place, habitation, or settlement. In this
    construction modifying 'their cities,' idiomatic English is best expressed as
    'their cities where they lived,' preserving the locative sense without awkwardness.
- source_word: טִירֹתָם
  chosen: their encampments
  alternatives:
  - their camps
  - their villages
  lexicon: HALOT
  rationale: טִירָה can denote an encampment, enclosure, or settlement. In the context
    of Midianite habitation alongside 'cities,' 'encampments' best captures a distinct
    type of habitation, likely less urbanized or more tent-based, without collapsing
    it into the same category as 'cities'.
- source_word: שָׂרְפוּ בָּאֵשׁ
  chosen: burned with fire
  alternatives:
  - burned in the fire
  - set on fire
  lexicon: HALOT
  rationale: The verb שׂרף means 'to burn,' and the phrase with בָּאֵשׁ is a common
    instrumental expression. 'Burned with fire' preserves the Hebrew emphasis and
    cadence better than the more interpretive 'set on fire'.
- source_word: וְאֵת ... וְאֵת
  chosen: all ... and all
  alternatives:
  - both ... and
  rationale: The repeated direct-object marker with כָּל structures the verse as two
    coordinated totalities. Rendering as 'all ... and all' preserves the distributive
    emphasis.
