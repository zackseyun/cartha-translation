id: NUM.31.21
reference: Numbers 31:21
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֶלְעָזָ֤ר הַ/כֹּהֵן֙ אֶל אַנְשֵׁ֣י הַ/צָּבָ֔א הַ/בָּאִ֖ים לַ/מִּלְחָמָ֑ה
    זֹ֚את חֻקַּ֣ת הַ/תּוֹרָ֔ה אֲשֶׁר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־׃
translation:
  text: Then Eleazar the priest said to the men of the army who had come to the battle,
    “This is the statute of the law that the LORD commanded Moses:”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ordinance of the law' or 'the statute of instruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Personal name is transliterated by standard convention per translation
    philosophy.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite title identifying Eleazar's office; straightforward rendering.
- source_word: אַנְשֵׁי הַצָּבָא
  chosen: the men of the army
  alternatives:
  - the soldiers
  - the men of the host
  - the warriors
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of,' and the doctrine prefers gender-accurate
    renderings where the source is masculine. 'Army' renders צָבָא idiomatically without
    losing the collective military sense.
- source_word: הַבָּאִים לַמִּלְחָמָה
  chosen: who had come to the battle
  alternatives:
  - who were coming from the battle
  - who came to the war
  lexicon: HALOT
  rationale: The participle 'the ones coming' with לַמִּלְחָמָה is contextually tied
    to the returning fighting force after combat. 'Had come to the battle' preserves
    the basic motion toward warfare without over-paraphrasing to 'returned from,'
    which the Hebrew does not explicitly state here.
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: English idiom normally supplies the copula for a verbless clause.
- source_word: חֻקַּת הַתּוֹרָה
  chosen: the statute of the law
  alternatives:
  - the statute of instruction
  - the ordinance of the law
  - the prescription of the law
  lexicon: HALOT
  rationale: חֻקָּה denotes a fixed statute or ordinance; תּוֹרָה here refers to authoritative
    instruction/law. 'Statute of the law' is formal enough to preserve legal force
    and familiar biblical diction.
- source_word: אֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  chosen: that the LORD commanded Moses
  alternatives:
  - which the LORD commanded to Moses
  - that the LORD commanded through Moses
  lexicon: HALOT
  rationale: Direct-object marker אֶת before Moses indicates Moses as the one commanded,
    not the mediated agent. 'The LORD' follows the doctrinal default for יְהוָה.
