id: NUM.31.44
reference: Numbers 31:44
source:
  edition: WLC
  text: וּ/בָקָ֕ר שִׁשָּׁ֥ה וּ/שְׁלֹשִׁ֖ים אָֽלֶף׃
translation:
  text: and the cattle, thirty-six thousand.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/בָקָר
  chosen: and the cattle
  alternatives:
  - and the herd
  - and the oxen
  lexicon: HALOT
  rationale: בָּקָר denotes cattle/herd animals, especially bovines. In this census-style
    list of livestock totals, 'cattle' is the most natural collective English rendering.
    The prefixed conjunction וּ is carried over as 'and,' matching the additive structure
    of the surrounding verses.
- source_word: שִׁשָּׁה וּ/שְׁלֹשִׁים אָלֶף
  chosen: thirty-six thousand
  alternatives:
  - six and thirty thousand
  lexicon: HALOT
  rationale: The Hebrew number is literally 'six and thirty thousand,' but standard
    modern English expresses this as 'thirty-six thousand.' This preserves the quantity
    accurately while following readable contemporary English style.
