id: NUM.31.8
reference: Numbers 31:8
source:
  edition: WLC
  text: וְ/אֶת מַלְכֵ֨י מִדְיָ֜ן הָרְג֣וּ עַל חַלְלֵי/הֶ֗ם אֶת אֱוִ֤י וְ/אֶת רֶ֨קֶם֙
    וְ/אֶת צ֤וּר וְ/אֶת חוּר֙ וְ/אֶת רֶ֔בַע חֲמֵ֖שֶׁת מַלְכֵ֣י מִדְיָ֑ן וְ/אֵת֙ בִּלְעָ֣ם
    בֶּן בְּע֔וֹר הָרְג֖וּ בֶּ/חָֽרֶב־־־־־־־־׃
translation:
  text: 'They killed the kings of Midian along with their slain: Evi, Rekem, Zur,
    Hur, and Reba, the five kings of Midian. They also killed Balaam son of Beor with
    the sword.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among their slain.' The Hebrew phrase is compact and may describe the
      kings as killed among the rest of Midian's dead.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרְגוּ
  chosen: they killed
  alternatives:
  - they struck down
  - they slew
  lexicon: HALOT
  rationale: Qal perfect 3cp of הרג, straightforwardly denoting killing. 'Killed'
    is clear modern English; 'slew' is archaic, and 'struck down' is possible but
    less direct.
- source_word: עַל חַלְלֵיהֶם
  chosen: along with their slain
  alternatives:
  - among their slain
  - in addition to those they had slain
  lexicon: HALOT
  rationale: The phrase literally involves 'upon/over their slain.' In context it
    indicates the kings were killed in connection with, or among, the rest of the
    dead. 'Along with their slain' preserves the compact Hebrew sense without overinterpreting
    the spatial nuance.
- source_word: מַלְכֵי מִדְיָן
  chosen: the kings of Midian
  alternatives:
  - Midian's kings
  lexicon: HALOT
  rationale: Construct chain plainly means 'the kings of Midian.' Repeated later in
    apposition to the list of names, so the same rendering is retained for consistency.
- source_word: אֱוִי
  chosen: Evi
  alternatives:
  - Ewi
  rationale: Personal name; transliterated rather than translated, following project
    policy for names.
- source_word: רֶקֶם
  chosen: Rekem
  alternatives:
  - Rekem
  rationale: Personal name; standard transliteration retained.
- source_word: צוּר
  chosen: Zur
  alternatives:
  - Tsur
  rationale: Personal name; transliterated by standard English biblical convention
    as 'Zur.'
- source_word: חוּר
  chosen: Hur
  rationale: Personal name; standard transliteration.
- source_word: רֶבַע
  chosen: Reba
  alternatives:
  - Reva
  rationale: Personal name; standard English biblical form is 'Reba.'
- source_word: חֲמֵשֶׁת מַלְכֵי מִדְיָן
  chosen: the five kings of Midian
  alternatives:
  - five kings of Midian
  lexicon: HALOT
  rationale: This phrase is appositional, summarizing the five named men. Including
    'the' makes the English apposition natural and definite.
- source_word: בִּלְעָם בֶּן בְּעוֹר
  chosen: Balaam son of Beor
  alternatives:
  - Balaam the son of Beor
  rationale: Personal name plus patronymic. 'Son of Beor' is the natural, direct rendering.
- source_word: בֶּחָרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Beth instrumental is well rendered 'with.' 'With the sword' is idiomatic
    and preserves the concrete instrumentality of the Hebrew.
