id: NUM.31.5
reference: Numbers 31:5
source:
  edition: WLC
  text: וַ/יִּמָּֽסְרוּ֙ מֵ/אַלְפֵ֣י יִשְׂרָאֵ֔ל אֶ֖לֶף לַ/מַּטֶּ֑ה שְׁנֵים עָשָׂ֥ר
    אֶ֖לֶף חֲלוּצֵ֥י צָבָֽא־׃
translation:
  text: 'So from the thousands of Israel, a thousand from each tribe were assigned:
    twelve thousand armed for war.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were handed over' or 'were mustered'; the Hebrew verb can denote being
      provided or assigned for service.
    reason: lexical_alternative
  - marker: b
    text: '''Thousands of Israel'' may refer not only to the number but also to Israel''s
      larger clan or military divisions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמָּסְרוּ
  chosen: were assigned
  alternatives:
  - were delivered
  - were handed over
  - were mustered
  lexicon: HALOT
  rationale: The Niphal form here indicates that the men were given over/provided
    from among Israel for the campaign. 'Were assigned' captures the passive sense
    in idiomatic English and fits the military selection context better than the more
    wooden 'were delivered.'
- source_word: מֵאַלְפֵי יִשְׂרָאֵל
  chosen: from the thousands of Israel
  alternatives:
  - from the clans of Israel
  - from the divisions of Israel
  lexicon: HALOT
  rationale: אַלְפֵי can denote 'thousands' literally, but in tribal/military contexts
    may also refer to larger clan-groupings. Here the following numeration ('a thousand
    from each tribe') favors retaining the literal 'thousands' while allowing the
    organizational nuance to remain implicit.
- source_word: אֶלֶף לַמַּטֶּה
  chosen: a thousand from each tribe
  alternatives:
  - a thousand for the tribe
  - one thousand per tribe
  lexicon: HALOT
  rationale: 'לַמַּטֶּה is distributive in context: each tribe contributed one thousand
    men. ''From each tribe'' expresses the sense naturally in English.'
- source_word: שְׁנֵים עָשָׂר אֶלֶף
  chosen: twelve thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number summarizing the total force from the
    twelve tribes.
- source_word: חֲלוּצֵי צָבָא
  chosen: armed for war
  alternatives:
  - equipped for battle
  - battle-ready men
  - troops ready for service
  lexicon: HALOT
  rationale: חֲלוּצִים refers to men equipped or drawn up for military action. 'Armed
    for war' preserves the martial force concisely and naturally.
