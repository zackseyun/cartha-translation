theological_decisions:
- issue: Function of Phinehas and the sacred items in the military expedition
  chosen_reading: Phinehas accompanies the force as priestly representative carrying
    sacred objects and signal trumpets, without expanding the text into later doctrinal
    claims about holy war.
  alternative_readings:
  - Phinehas is merely an observer
  - The sacred vessels are unspecified sanctuary items with no priestly significance
  rationale: The verse explicitly joins Phinehas, the holy vessels, and the trumpets
    to the campaign. The translation preserves that cultic-military linkage while
    avoiding interpretive additions beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
