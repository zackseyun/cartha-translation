id: NUM.31.6
reference: Numbers 31:6
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֨ח אֹתָ֥/ם מֹשֶׁ֛ה אֶ֥לֶף לַ/מַּטֶּ֖ה לַ/צָּבָ֑א אֹ֠תָ/ם וְ/אֶת
    פִּ֨ינְחָ֜ס בֶּן אֶלְעָזָ֤ר הַ/כֹּהֵן֙ לַ/צָּבָ֔א וּ/כְלֵ֥י הַ/קֹּ֛דֶשׁ וַ/חֲצֹצְר֥וֹת
    הַ/תְּרוּעָ֖ה בְּ/יָדֽ/וֹ־־׃
translation:
  text: So Moses sent them to the war, a thousand from each tribe, them and Phinehas
    son of Eleazar the priest, to the war, with the holy vessels and the trumpets
    for the battle cry in his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the vessels of the sanctuary' or 'the sacred articles.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the trumpets for the signal' or 'the trumpets of alarm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering of שלח in narrative context; 'sent' is natural and
    sufficiently formal.
- source_word: אֶלֶף לַמַּטֶּה
  chosen: a thousand from each tribe
  alternatives:
  - a thousand per tribe
  - a thousand for the tribe
  lexicon: HALOT
  rationale: The construction indicates the number supplied by each tribe, not merely
    'to a tribe.' 'From each tribe' best conveys distributive force in idiomatic English.
- source_word: לַצָּבָא
  chosen: to the war
  alternatives:
  - for battle
  - to the army
  lexicon: HALOT
  rationale: Here צבא refers to military service/warfare rather than the army as an
    institution. 'To the war' preserves the directional sense of the Hebrew, though
    somewhat formal.
- source_word: אֹתָם ... אֹתָם
  chosen: them ... them
  alternatives:
  - these men ... them
  lexicon: HALOT
  rationale: 'The repetition is retained to reflect the Hebrew emphasis and apposition:
    Moses sent the fighting men, namely them together with Phinehas.'
- source_word: פִּינְחָס בֶּן אֶלְעָזָר הַכֹּהֵן
  chosen: Phinehas son of Eleazar the priest
  alternatives:
  - Phinehas, the son of Eleazar the priest
  lexicon: HALOT
  rationale: Standard transliteration of the personal names; appositional phrase rendered
    straightforwardly.
- source_word: וּכְלֵי הַקֹּדֶשׁ
  chosen: with the holy vessels
  alternatives:
  - with the vessels of the sanctuary
  - with the sacred articles
  lexicon: HALOT
  rationale: כְּלֵי הַקֹּדֶשׁ literally means 'vessels/articles of holiness/the sanctuary.'
    'Holy vessels' is concise and preserves the cultic sense, while a footnote preserves
    the more explicit alternative.
- source_word: וַחֲצֹצְרוֹת הַתְּרוּעָה
  chosen: the trumpets for the battle cry
  alternatives:
  - the trumpets for sounding
  - the trumpets of alarm
  - the trumpets for the signal
  lexicon: HALOT
  rationale: חצוצרות are the ritual silver trumpets; תְּרוּעָה denotes a loud signal/shout,
    often in battle or assembly. In this military context, 'for the battle cry' communicates
    the war-signal function.
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - in his possession
  - under his charge
  lexicon: HALOT
  rationale: The singular most naturally refers to Phinehas, the nearest singular
    antecedent. 'In his hand' preserves the Hebrew idiom, with a footnote-worthy interpretive
    note unnecessary because the antecedent is reasonably clear in context.
