id: NUM.31.49
reference: Numbers 31:49
source:
  edition: WLC
  text: וַ/יֹּֽאמְרוּ֙ אֶל מֹשֶׁ֔ה עֲבָדֶ֣י/ךָ נָֽשְׂא֗וּ אֶת רֹ֛אשׁ אַנְשֵׁ֥י הַ/מִּלְחָמָ֖ה
    אֲשֶׁ֣ר בְּ/יָדֵ֑/נוּ וְ/לֹא נִפְקַ֥ד מִמֶּ֖/נּוּ אִֽישׁ־־־׃
translation:
  text: and they said to Moses, “Your servants have taken a count of the men of war
    who are under our command, and not one man from us is missing.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'have lifted up the head of the men of war,' a Hebrew idiom for
      taking a count or census.
    reason: lexical_alternative
  - marker: b
    text: Or 'who are in our charge.' Literally, 'who are in our hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲבָדֶיךָ
  chosen: your servants
  alternatives:
  - your slaves
  lexicon: HALOT
  rationale: Though עבד can denote slave/servant, here the speakers are military officers
    addressing Moses deferentially. The bonded-status nuance is not foregrounded;
    'your servants' is the natural idiomatic rendering in this courtly address.
- source_word: נָשְׂאוּ אֶת רֹאשׁ
  chosen: have taken a count
  alternatives:
  - have lifted up the head of
  - have counted
  lexicon: HALOT
  rationale: The idiom literally means 'have lifted the head of' and in administrative/military
    contexts refers to numbering or taking a census. 'Have taken a count' preserves
    the census sense in readable English.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  chosen: the men of war
  alternatives:
  - the fighting men
  - the warriors
  lexicon: HALOT
  rationale: This phrase refers specifically to the male combatants. 'Men of war'
    is concise and gender-accurate to the Hebrew, while still intelligible in modern
    English.
- source_word: אֲשֶׁר בְּיָדֵנוּ
  chosen: who are under our command
  alternatives:
  - who are in our hand
  - who are in our charge
  lexicon: HALOT
  rationale: The idiom 'in our hand' here denotes responsibility/authority over the
    troops. 'Under our command' best fits the military context; 'in our charge' is
    possible but less specific.
- source_word: נִפְקַד מִמֶּנּוּ אִישׁ
  chosen: not one man from us is missing
  alternatives:
  - not a man of us was absent
  - not one man from among us was lacking
  lexicon: HALOT
  rationale: The nifal of פקד in this context means to be missing, absent, or unaccounted
    for after mustering. 'Not one man from us is missing' communicates that none of
    their soldiers were lost.
