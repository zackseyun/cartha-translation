theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH.
    This verse does not require deviation from that policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering תְּרוּמָה in cultic context
  chosen_reading: contribution
  alternative_readings:
  - offering
  - heave offering
  rationale: The term refers to a portion set apart for sacred use from the spoil.
    'Contribution' preserves the idea of an apportioned sacred due in accessible modern
    English, while avoiding the archaic technicality of 'heave offering.'
  doctrine_reference: DOCTRINE.md Translation philosophy §6 (Readable modern English,
    not archaic or academic)
