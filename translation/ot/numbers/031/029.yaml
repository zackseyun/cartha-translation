id: NUM.31.29
reference: Numbers 31:29
source:
  edition: WLC
  text: מִ/מַּֽחֲצִיתָ֖/ם תִּקָּ֑חוּ וְ/נָתַתָּ֛ה לְ/אֶלְעָזָ֥ר הַ/כֹּהֵ֖ן תְּרוּמַ֥ת יְהוָֽה׃
translation:
  text: From their half you shall take it and give it to Eleazar the priest as Yahweh’s contribution.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the LORD’s offering” or “the contribution for the LORD”; Hebrew תְּרוּמָה refers to a portion set apart for sacred use.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמַּחֲצִיתָם
  chosen: From their half
  alternatives:
  - From half of theirs
  - From their portion
  lexicon: HALOT
  rationale: The preposition מִן plus מַחֲצִית means 'from half of them/theirs.' 'From their half' is concise, natural English and preserves the possessive sense referring back to the half assigned to the warriors in the surrounding context.
- source_word: תִּקָּחוּ
  chosen: you shall take
  alternatives:
  - you are to take
  - take
  lexicon: HALOT
  rationale: Though morphologically 2mp, the clause functions instructionally. 'You shall take' gives clear legal/instructional force in English without over-paraphrasing. The plural likely addresses those carrying out the division.
- source_word: וְנָתַתָּה
  chosen: and give
  alternatives:
  - and you shall give
  lexicon: HALOT
  rationale: The waw-consecutive with 2ms continues the command sequence. English smooths the shift in number by using 'and give,' which is idiomatic and preserves the imperative/instructional force without awkwardly foregrounding the singular/plural alternation.
- source_word: לְאֶלְעָזָר
  chosen: to Eleazar
  lexicon: HALOT
  rationale: Standard transliteration of the personal name, following the philosophy of transliterating names rather than translating them.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite title identifying Eleazar's office. 'The priest' is the plain sense and matches common English usage.
- source_word: תְּרוּמַת יְהוָה
  chosen: the LORD’s contribution
  alternatives:
  - the LORD’s offering
  - the contribution for the LORD
  - the LORD’s heave offering
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution/levy set apart or lifted up for sacred use. 'Contribution' is clear modern English and fits the context of a designated portion from the spoil. 'Heave offering' is too technical/archaic here; 'offering' is possible but less precise about the apportioned nature of the gift. The genitive is rendered possessively as 'the LORD’s,' following the default rendering of יְהוָה as 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
