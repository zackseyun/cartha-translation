id: NUM.31.41
reference: Numbers 31:41
source:
  edition: WLC
  text: וַ/יִּתֵּ֣ן מֹשֶׁ֗ה אֶת מֶ֨כֶס֙ תְּרוּמַ֣ת יְהוָ֔ה לְ/אֶלְעָזָ֖ר הַ/כֹּהֵ֑ן
    כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־׃
translation:
  text: And Moses gave the tribute, the contribution for the LORD, to Eleazar the
    priest, just as the LORD had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'levy' or 'tax' for the assessed portion taken from the spoil.
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD’s offering'; traditionally, 'heave offering of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - handed over
  lexicon: HALOT
  rationale: The waw-consecutive verb from נתן is straightforwardly narrative past,
    best rendered 'gave' in clear modern English.
- source_word: מֶכֶס
  chosen: tribute
  alternatives:
  - levy
  - tax
  - assessment
  lexicon: HALOT
  rationale: In this military-plunder context, מֶכֶס refers to the assessed portion
    taken from the spoil. 'Tribute' communicates a required due without implying a
    modern civil tax system; 'levy' is possible but less natural here.
- source_word: תְּרוּמַת יְהוָה
  chosen: the contribution for the LORD
  alternatives:
  - the LORD's contribution
  - the offering for the LORD
  - the heave offering of the LORD
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution or offering set apart for sacred use.
    'Contribution for the LORD' preserves the sense of something apportioned to him.
    'Heave offering' is too technical and may import ritual specificity not explicit
    in this verse.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD'.
- source_word: לְאֶלְעָזָר הַכֹּהֵן
  chosen: to Eleazar the priest
  alternatives:
  - to Eleazar the priestly official
  lexicon: HALOT
  rationale: A direct and standard rendering of the prepositional phrase and apposition;
    no expansion beyond the Hebrew is needed.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת־מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: This formula marks conformity to prior divine instruction. 'Just as'
    slightly highlights exact correspondence, and the pluperfect 'had commanded' fits
    the retrospective sense in English narrative.
