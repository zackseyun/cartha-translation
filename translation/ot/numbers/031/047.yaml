theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the
    stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  rationale: The Hebrew explicitly uses 'sons,' and the doctrine calls for gender-accurate
    rendering over flattening to a neutral collective where the source expression
    is transparent. 'Israelites' remains a viable idiomatic alternative but is not
    necessary here.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
