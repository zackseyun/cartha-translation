id: NUM.31.47
reference: Numbers 31:47
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח מֹשֶׁ֜ה מִ/מַּחֲצִ֣ת בְּנֵֽי יִשְׂרָאֵ֗ל אֶת הָֽ/אָחֻז֙ אֶחָ֣ד
    מִן הַ/חֲמִשִּׁ֔ים מִן הָ/אָדָ֖ם וּ/מִן הַ/בְּהֵמָ֑ה וַ/יִּתֵּ֨ן אֹתָ֜/ם לַ/לְוִיִּ֗ם
    שֹֽׁמְרֵי֙ מִשְׁמֶ֨רֶת֙ מִשְׁכַּ֣ן יְהוָ֔ה כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־־־־׃
translation:
  text: From the half belonging to the sons of Israel, Moses took the portion of one
    out of fifty, from the people and from the livestock, and gave them to the Levites
    who kept charge of the tabernacle of the LORD, just as the LORD had commanded
    Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Israel'; that is, the Israelites.
    reason: lexical_alternative
  - marker: b
    text: Or 'one taken from every fifty.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִמַּחֲצִת בְּנֵי יִשְׂרָאֵל
  chosen: From the half belonging to the sons of Israel
  alternatives:
  - From the half of the Israelites
  - From the Israelites' half
  lexicon: HALOT
  rationale: מַחֲצִית means 'half' or 'half-portion.' The construct with בְּנֵי יִשְׂרָאֵל
    indicates the half assigned to Israel in the division of spoil. 'Sons of Israel'
    preserves the formal Hebrew expression and the project's gender-accurate policy,
    though 'Israelites' is a natural alternative.
- source_word: הָאָחֻז אֶחָד מִן הַחֲמִשִּׁים
  chosen: the portion of one out of fifty
  alternatives:
  - one portion out of fifty
  - one taken from every fifty
  lexicon: HALOT
  rationale: אָחֻז here denotes something taken or seized as a levy/portion. The phrase
    specifies a one-in-fifty assessment. 'Portion of one out of fifty' keeps the nominal
    structure while remaining intelligible.
- source_word: מִן הָאָדָם
  chosen: from the people
  alternatives:
  - from man
  - from humankind
  lexicon: HALOT
  rationale: אָדָם here refers collectively to human beings counted among the spoil,
    not to an individual male. 'People' best conveys the collective sense in idiomatic
    English while respecting the doctrine note that אָדָם may be rendered 'man' or
    'humankind' by context.
- source_word: וּמִן הַבְּהֵמָה
  chosen: from the livestock
  alternatives:
  - from the cattle
  - from the animals
  lexicon: HALOT
  rationale: בְּהֵמָה in this context refers broadly to domesticated animals taken
    as spoil. 'Livestock' is the most natural contextual rendering.
- source_word: וַיִּתֵּן אֹתָם
  chosen: and gave them
  alternatives:
  - and gave it
  lexicon: HALOT
  rationale: The pronominal suffix is plural, referring to the collected items/persons
    from both categories. English 'them' matches the Hebrew number, even though the
    antecedent is a mixed collective.
- source_word: לַלְוִיִּם
  chosen: to the Levites
  lexicon: HALOT
  rationale: Straightforward rendering of the tribal group designated to receive this
    levy.
- source_word: שֹׁמְרֵי מִשְׁמֶרֶת מִשְׁכַּן יְהוָה
  chosen: who kept charge of the tabernacle of the LORD
  alternatives:
  - who were keeping the duty of the tabernacle of the LORD
  - guarding the service of the tabernacle of the LORD
  lexicon: HALOT
  rationale: The participle plus cognate noun expresses those responsible for guarding/keeping
    the assigned duty connected with the tabernacle. 'Kept charge of' is an idiomatic
    English equivalent that preserves the custodial sense without awkward repetition.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD.'
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: כַּאֲשֶׁר introduces conformity to prior command. The pluperfect 'had
    commanded' fits the narrative sequence in English, referring back to the earlier
    instruction.
