id: NUM.31.50
reference: Numbers 31:50
source:
  edition: WLC
  text: וַ/נַּקְרֵ֞ב אֶת קָרְבַּ֣ן יְהוָ֗ה אִישׁ֩ אֲשֶׁ֨ר מָצָ֤א כְלִֽי זָהָב֙ אֶצְעָדָ֣ה וְ/צָמִ֔יד טַבַּ֖עַת עָגִ֣יל וְ/כוּמָ֑ז לְ/כַפֵּ֥ר עַל נַפְשֹׁתֵ֖י/נוּ לִ/פְנֵ֥י יְהוָֽה־־־׃
translation:
  text: 'So we have brought near Yahweh’s offering: each man what he found—articles of gold, armlets and bracelets, rings, earrings, and pendants—to make atonement for ourselves before Yahweh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'anklets' for 'armlets' (אֶצְעָדָה).
    reason: lexical_alternative
  - marker: b
    text: The exact meaning of 'pendants' (כוּמָז) is uncertain; possible renderings include 'necklaces,' 'ornaments,' or 'nose-rings.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'to make atonement for our lives/our persons.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנַּקְרֵב
  chosen: So we have brought near
  alternatives:
  - So we brought
  - So we presented
  lexicon: HALOT
  rationale: From קרב in the Hiphil, literally 'cause to come near/bring near.' 'Have brought near' preserves the offering language while remaining natural English; 'So' reflects the narrative waw.
- source_word: קָרְבַּן יְהוָה
  chosen: the LORD’s offering
  alternatives:
  - an offering to the LORD
  - the offering for the LORD
  lexicon: HALOT
  rationale: קָרְבָּן denotes an offering/presentation brought near. The construct with YHWH is naturally rendered possessively in English. This keeps the sacrificial nuance without over-specifying the type of offering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אִישׁ אֲשֶׁר מָצָא
  chosen: each man what he found
  alternatives:
  - every man whatever he found
  - each one what he had found
  lexicon: HALOT
  rationale: אִישׁ is distributive here, introducing individual contributions. 'Each man' preserves the masculine singular and distributive force; 'what he found' reflects the relative clause straightforwardly.
- source_word: כְלִי זָהָב
  chosen: articles of gold
  alternatives:
  - gold objects
  - gold items
  - jewelry of gold
  lexicon: HALOT
  rationale: כְלִי is a broad term for article/object/vessel. In context, followed by specific ornaments, 'articles of gold' is suitably broad and idiomatic without narrowing too soon to 'jewelry,' though the listed items are ornaments.
- source_word: אֶצְעָדָה
  chosen: armlets
  alternatives:
  - anklets
  - chains
  lexicon: HALOT
  rationale: The term denotes an ornament worn on a limb; 'armlets' is a common contextual rendering in lists of jewelry. 'Anklets' is possible but less likely here given the military spoil inventory and parallel ornament terms.
- source_word: צָמִיד
  chosen: bracelets
  alternatives:
  - armbands
  lexicon: HALOT
  rationale: A standard rendering for an ornamental band worn on the wrist or arm. 'Bracelets' is clear modern English.
- source_word: טַבַּעַת
  chosen: signet rings
  alternatives:
  - rings
  lexicon: HALOT
  rationale: טַבַּעַת often denotes a ring, frequently a signet ring. Because the list is of valuable personal ornaments and 'ring' alone can be vague, 'signet rings' captures the likely sense while remaining plausible.
- source_word: עָגִיל
  chosen: earrings
  alternatives:
  - rings
  lexicon: HALOT
  rationale: Commonly an earring or ear-ring ornament in such lists. 'Earrings' best distinguishes it from טַבַּעַת.
- source_word: כוּמָז
  chosen: pendants
  alternatives:
  - necklaces
  - ornaments
  - nose-rings
  lexicon: HALOT
  rationale: The exact item is uncertain; it is some kind of ornament/jewelry item. 'Pendants' is a cautious, readable choice that avoids overconfidence. Because the identification is uncertain, alternatives are preserved in a footnote.
- source_word: לְכַפֵּר
  chosen: to make atonement
  alternatives:
  - to atone
  - to make expiation
  lexicon: HALOT
  rationale: כפר in sacrificial contexts is conventionally and accurately rendered 'make atonement.' This preserves the cultic-theological weight of the term.
- source_word: עַל נַפְשֹׁתֵינוּ
  chosen: for ourselves
  alternatives:
  - for our lives
  - for our persons
  - for our souls
  lexicon: HALOT
  rationale: Literally 'for our lives/souls/persons.' In this context the idiom refers to atonement on behalf of themselves. 'For ourselves' is the clearest idiomatic rendering without importing a later soul/body dichotomy.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: A standard idiom meaning before/in the presence of YHWH. 'Before the LORD' is concise and conventional.
