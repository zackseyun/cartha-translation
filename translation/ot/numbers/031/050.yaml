theological_decisions:
- issue: Meaning of the soldiers' gift as related to כפר
  chosen_reading: The gift is presented as an offering associated with making atonement for the men before the LORD.
  alternative_readings:
  - The gift is merely a thank-offering with no expiatory force
  - The phrase means only 'to avert danger' in a non-cultic sense
  rationale: Because the verse explicitly uses כפר with 'before the LORD' and names the gift a קָרְבַּן, the translation should preserve atonement language rather than flatten it into generic gratitude. At the same time, the English does not specify the exact mechanism of atonement beyond what the Hebrew states.
- issue: Gender rendering of אִישׁ
  chosen_reading: each man
  alternative_readings:
  - each one
  - each person
  rationale: Per translation philosophy, gender-accurate over gender-neutral. The Hebrew singular masculine distributive refers to the male soldiers/officers in context, so 'each man' best matches the source intent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
