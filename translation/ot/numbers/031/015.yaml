id: NUM.31.15
reference: Numbers 31:15
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֲלֵי/הֶ֖ם מֹשֶׁ֑ה הַֽ/חִיִּיתֶ֖ם כָּל נְקֵבָֽה־׃
translation:
  text: Moses said to them, “Have you kept alive every female?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Have you let every female live?”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר, best rendered with simple past 'said'
    in English narrative.
- source_word: אֲלֵיהֶם
  chosen: to them
  lexicon: HALOT
  rationale: 'Preposition אֶל with 3mp suffix indicates direction of speech toward
    the group: ''to them.'''
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Proper name, transliterated by standard English convention per translation
    philosophy.
- source_word: הַחִיִּיתֶם
  chosen: have you kept alive
  alternatives:
  - have you let live
  - did you keep alive
  - have you preserved alive
  lexicon: HALOT
  rationale: From חיה in the causative sense, 'to let live/keep alive.' The interrogative
    force is supplied by context and English idiom. 'Kept alive' is natural modern
    English and preserves the causative nuance better than simply 'saved.' Present
    perfect fits the immediate review of completed action.
- source_word: כָּל
  chosen: every
  alternatives:
  - all
  lexicon: HALOT
  rationale: With a singular noun, כָּל is idiomatically rendered 'every' in English,
    emphasizing comprehensiveness individual by individual.
- source_word: נְקֵבָה
  chosen: female
  alternatives:
  - woman
  - girl
  lexicon: HALOT
  rationale: נְקֵבָה denotes 'female' in a biological/sexed sense rather than specifically
    adult 'woman.' 'Female' best matches the Hebrew's broad scope in this military
    context.
