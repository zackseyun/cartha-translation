theological_decisions:
- issue: Rendering of נְקֵבָה in a violent wartime context
  chosen_reading: female
  alternative_readings:
  - woman
  - girls and women
  rationale: The Hebrew term is broader and more clinical than 'woman,' and the verse
    itself does not restrict the referent by age. Using 'female' preserves the starkness
    and scope of the source text without importing interpretive narrowing.
  doctrine_reference: Translation philosophy §§1, 4, 6
