id: NUM.31.4
reference: Numbers 31:4
source:
  edition: WLC
  text: אֶ֚לֶף לַ/מַּטֶּ֔ה אֶ֖לֶף לַ/מַּטֶּ֑ה לְ/כֹל֙ מַטּ֣וֹת יִשְׂרָאֵ֔ל תִּשְׁלְח֖וּ
    לַ/צָּבָֽא׃
translation:
  text: A thousand from each tribe, a thousand from each tribe, from all the tribes
    of Israel, you shall send to the army.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for military service.' The Hebrew לַצָּבָא can denote service in the
      military force, not merely movement toward a location.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶלֶף
  chosen: a thousand
  alternatives:
  - one thousand
  lexicon: HALOT
  rationale: Cardinal number; rendered idiomatically as 'a thousand' in English. The
    repetition in Hebrew is preserved rather than compressed.
- source_word: לַמַּטֶּה
  chosen: from each tribe
  alternatives:
  - for the tribe
  - per tribe
  lexicon: HALOT
  rationale: 'מַטֶּה can mean ''tribe'' in census/military contexts. With ל and repeated
    numerically, the sense is distributive: one thousand from each tribe.'
- source_word: אֶלֶף לַמַּטֶּה אֶלֶף לַמַּטֶּה
  chosen: A thousand from each tribe, a thousand from each tribe
  alternatives:
  - A thousand for every tribe
  - One thousand from a tribe, one thousand from a tribe
  lexicon: HALOT
  rationale: The Hebrew intentionally repeats the phrase. The translation preserves
    the repetition for rhetorical force and formal transparency rather than smoothing
    it away.
- source_word: לְכֹל מַטּוֹת יִשְׂרָאֵל
  chosen: from all the tribes of Israel
  alternatives:
  - for all the tribes of Israel
  - throughout all the tribes of Israel
  lexicon: HALOT
  rationale: This phrase clarifies the distributive scope of the command. 'From all
    the tribes of Israel' fits the recruitment context better than 'for all the tribes.'
- source_word: תִּשְׁלְחוּ
  chosen: you shall send
  alternatives:
  - you must send
  - send
  lexicon: HALOT
  rationale: Qal imperfect 2mp in an injunctive context; 'you shall send' conveys
    directive force in clear modern English without becoming overly paraphrastic.
- source_word: לַצָּבָא
  chosen: to the army
  alternatives:
  - for the army
  - to the war
  - for military service
  lexicon: HALOT
  rationale: צָבָא here refers to the military force or campaign. 'To the army' is
    the most natural concise rendering in context, indicating dispatch into military
    service.
