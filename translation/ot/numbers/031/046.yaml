id: NUM.31.46
reference: Numbers 31:46
source:
  edition: WLC
  text: וְ/נֶ֣פֶשׁ אָדָ֔ם שִׁשָּׁ֥ה עָשָׂ֖ר אָֽלֶף׃
translation:
  text: and the persons of mankind were sixteen thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'and the נפש of אדם, sixteen thousand'—that is, sixteen
      thousand human persons.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/נֶפֶשׁ
  chosen: and the persons
  alternatives:
  - and the souls
  - and the persons
  lexicon: HALOT
  rationale: In this census/spoil context, נֶפֶשׁ functions as a count term for individual
    persons rather than emphasizing the immaterial 'soul.' Rendering it as 'persons'
    communicates the referent clearly in modern English while preserving the counting
    sense. The conjunction וְ is carried over as 'and.'
- source_word: אָדָם
  chosen: of mankind
  alternatives:
  - of man
  - human
  lexicon: HALOT
  rationale: אָדָם here specifies that the counted נפש are human beings, distinguishing
    them from livestock in the surrounding inventory. Following the doctrine guideline
    for אָדָם ('man / humankind' by context), 'of mankind' preserves the human-category
    sense without implying a male-only count.
- source_word: שִׁשָּׁה עָשָׂר אָלֶף
  chosen: sixteen thousand
  alternatives:
  - sixteen thousand
  lexicon: HALOT
  rationale: The Hebrew numeral phrase straightforwardly denotes 16,000. Standard
    English number style renders this as 'sixteen thousand.'
