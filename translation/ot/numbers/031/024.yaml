theological_decisions:
- issue: Ritual purity language
  chosen_reading: Rendered טהר as 'be clean' rather than 'be purified.'
  alternative_readings:
  - be purified
  - cleanse yourselves
  rationale: The verse concerns restoration from ritual impurity after warfare. 'Be
    clean' preserves the ritual state language of the Hebrew without importing later
    theological connotations of moral or spiritual purification. The form is best
    taken as resultative/intransitive rather than reflexive.
  doctrine_reference: Translation philosophy §1, §3, §6
