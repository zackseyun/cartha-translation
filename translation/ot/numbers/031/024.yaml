id: NUM.31.24
reference: Numbers 31:24
source:
  edition: WLC
  text: וְ/כִבַּסְתֶּ֧ם בִּגְדֵי/כֶ֛ם בַּ/יּ֥וֹם הַ/שְּׁבִיעִ֖י וּ/טְהַרְתֶּ֑ם וְ/אַחַ֖ר
    תָּבֹ֥אוּ אֶל הַֽ/מַּחֲנֶֽה־׃פ
translation:
  text: You shall wash your clothes on the seventh day, and you shall be clean; afterward
    you may come into the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall be purified.' The Hebrew can denote becoming ritually clean
      after the prescribed washing.
    reason: lexical_alternative
  - marker: b
    text: Or 'you may enter the camp.' The sense is that reentry is permitted after
      the cleansing is complete.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִבַּסְתֶּם
  chosen: you shall wash
  alternatives:
  - you must wash
  - wash
  lexicon: HALOT
  rationale: Piel of כבס refers specifically to washing garments or cloth. Future-like
    instruction in context is well represented by 'you shall wash.'
- source_word: בִּגְדֵיכֶם
  chosen: your clothes
  alternatives:
  - your garments
  lexicon: HALOT
  rationale: בגד denotes clothing/garments. 'Clothes' is more natural modern English
    while preserving the sense.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  chosen: on the seventh day
  alternatives:
  - on day seven
  lexicon: HALOT
  rationale: Standard temporal expression; 'on the seventh day' is the clearest idiomatic
    rendering.
- source_word: וּטְהַרְתֶּם
  chosen: you shall be clean
  alternatives:
  - you shall be purified
  - and cleanse yourselves
  lexicon: HALOT
  rationale: 'Qal of טהר here is intransitive/resultative in purification context:
    after the prescribed washing, the addressees become clean. ''Be clean'' best matches
    the Hebrew form and ritual context without overstating agency. ''Be purified''
    is possible but slightly more interpretive.'
- source_word: וְאַחַר
  chosen: afterward
  alternatives:
  - and after that
  - then afterward
  lexicon: HALOT
  rationale: Simple sequential adverb marking what follows the purification process.
- source_word: תָּבֹאוּ אֶל הַמַּחֲנֶה
  chosen: you may come into the camp
  alternatives:
  - you shall come into the camp
  - you may enter the camp
  lexicon: HALOT
  rationale: 'בוא אל commonly means ''come into/enter.'' In this ritual context, the
    sense is permissive following cleansing: they are allowed to reenter the camp.
    ''May come into'' captures that nuance better than a merely predictive ''shall
    come.'''
