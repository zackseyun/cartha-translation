id: NUM.31.9
reference: Numbers 31:9
source:
  edition: WLC
  text: וַ/יִּשְׁבּ֧וּ בְנֵי יִשְׂרָאֵ֛ל אֶת נְשֵׁ֥י מִדְיָ֖ן וְ/אֶת טַפָּ֑/ם וְ/אֵ֨ת
    כָּל בְּהֶמְתָּ֧/ם וְ/אֶת כָּל מִקְנֵ/הֶ֛ם וְ/אֶת כָּל חֵילָ֖/ם בָּזָֽזוּ־־־־־־־־׃
translation:
  text: The sons of Israel took captive the women of Midian and their little ones,
    and they plundered all their livestock, all their herds, and all their wealth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “The Israelites.”
    reason: lexical_alternative
  - marker: b
    text: Or “their children.”
    reason: lexical_alternative
  - marker: c
    text: Or “all their goods” for “all their wealth.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁבּוּ
  chosen: took captive
  alternatives:
  - captured
  - carried off as captives
  lexicon: HALOT
  rationale: From שׁבה in the Qal, referring specifically to taking persons as captives
    rather than a general seizure of goods. 'Took captive' is natural English and
    preserves the human-object sense.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: The sons of Israel
  alternatives:
  - The Israelites
  - The children of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the idiom בן + proper name and aligns
    with the gender-accurate philosophy. 'Israelites' is possible but less transparent
    to the Hebrew expression.
- source_word: נְשֵׁי מִדְיָן
  chosen: the women of Midian
  alternatives:
  - Midianite women
  - the wives of Midian
  lexicon: HALOT
  rationale: נָשִׁים here is best rendered broadly as 'women,' not specifically 'wives,'
    since the context concerns female captives generally. 'Of Midian' stays close
    to the construct phrase.
- source_word: טַפָּם
  chosen: their little ones
  alternatives:
  - their children
  - their dependents
  lexicon: HALOT
  rationale: טַף commonly denotes small children or little ones. 'Little ones' preserves
    the nuance of youth more precisely than the broader 'children.'
- source_word: בְּהֶמְתָּם
  chosen: their livestock
  alternatives:
  - their animals
  - their beasts
  lexicon: HALOT
  rationale: בְּהֵמָה in collective usage commonly refers to domestic animals. 'Livestock'
    is idiomatic and suitably specific in context.
- source_word: מִקְנֵהֶם
  chosen: their herds
  alternatives:
  - their cattle
  - their possessions
  lexicon: HALOT
  rationale: מִקְנֶה often refers to acquired livestock holdings, especially herds/flocks.
    Since בְּהֶמָה already covers animals generally, 'herds' differentiates this term
    while keeping the pastoral sense.
- source_word: חֵילָם
  chosen: their wealth
  alternatives:
  - their goods
  - their property
  - their resources
  lexicon: HALOT
  rationale: חַיִל can denote wealth, resources, or property in non-military contexts.
    Here, after listing persons and animals, it most naturally summarizes the rest
    of Midian's material wealth.
- source_word: בָּזָזוּ
  chosen: they plundered
  alternatives:
  - they took as spoil
  - they looted
  lexicon: HALOT
  rationale: בזז denotes taking spoil after victory. 'Plundered' is concise, natural,
    and preserves the wartime sense better than the more colloquial 'looted.'
