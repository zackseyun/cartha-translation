id: NUM.31.52
reference: Numbers 31:52
source:
  edition: WLC
  text: וַ/יְהִ֣י כָּל זְהַ֣ב הַ/תְּרוּמָ֗ה אֲשֶׁ֤ר הֵרִ֨ימוּ֙ לַֽ/יהוָ֔ה שִׁשָּׁ֨ה עָשָׂ֥ר אֶ֛לֶף שְׁבַע מֵא֥וֹת וַ/חֲמִשִּׁ֖ים שָׁ֑קֶל מֵ/אֵת֙ שָׂרֵ֣י הָֽ/אֲלָפִ֔ים וּ/מֵ/אֵ֖ת שָׂרֵ֥י הַ/מֵּאֽוֹת׀־־׃
translation:
  text: And all the gold of the contribution that they presented to Yahweh was sixteen thousand seven hundred and fifty shekels, from the commanders of the thousands and from the commanders of the hundreds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the offering'; traditionally 'the heave offering.' The Hebrew term denotes a contribution set apart for the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... was
  alternatives:
  - Now ... was
  - And it was
  lexicon: HALOT
  rationale: The waw-consecutive with היה introduces the statement of total amount. In English, 'And ... was' is natural and preserves the narrative linkage without woodenly retaining 'it happened.'
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: Marks the totality of the gold being quantified; 'all' is the most natural equivalent.
- source_word: זְהַב
  chosen: gold
  lexicon: HALOT
  rationale: Direct material term; no contextual reason to vary the standard gloss.
- source_word: הַתְּרוּמָה
  chosen: the contribution
  alternatives:
  - the offering
  - the heave offering
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution set apart or lifted up for sacred use. 'Contribution' fits the context of donated spoil and is clearer in modern English than the traditional but opaque 'heave offering.' 'Offering' is possible but less specific.
- source_word: אֲשֶׁר הֵרִימוּ
  chosen: that they presented
  alternatives:
  - that they raised
  - that they offered up
  lexicon: HALOT
  rationale: The verb רום in the Hiphil here refers to setting apart/presenting as an offering. 'Presented' communicates the cultic act idiomatically in English without implying literal upward motion.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' The preposition ל is retained as 'to' to show direction of dedication.
- source_word: שִׁשָּׁה עָשָׂר אֶלֶף שְׁבַע מֵאוֹת וַחֲמִשִּׁים
  chosen: sixteen thousand seven hundred and fifty
  lexicon: HALOT
  rationale: This is the straightforward cardinal number sequence in English order.
- source_word: שָׁקֶל
  chosen: shekels
  lexicon: HALOT
  rationale: Standard unit of weight/currency. The singular in Hebrew after a number is idiomatically rendered as plural in English.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - coming from
  lexicon: HALOT
  rationale: 'The preposition marks source: the gold came from these officers.'
- source_word: שָׂרֵי הָאֲלָפִים
  chosen: the commanders of the thousands
  alternatives:
  - the officers over the thousands
  - the captains of thousands
  lexicon: HALOT
  rationale: שָׂרֵי are leaders/officials; in military context 'commanders' is apt. 'Thousands' refers to military units, not merely numerals, so the phrase is preserved literally enough to reflect the structure.
- source_word: וּמֵאֵת שָׂרֵי הַמֵּאוֹת
  chosen: and from the commanders of the hundreds
  alternatives:
  - and from the officers over the hundreds
  - and from the captains of hundreds
  lexicon: HALOT
  rationale: Parallel to the previous phrase; 'commanders of the hundreds' preserves the military-administrative structure.
