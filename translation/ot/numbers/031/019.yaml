id: NUM.31.19
reference: Numbers 31:19
source:
  edition: WLC
  text: וְ/אַתֶּ֗ם חֲנ֛וּ מִ/ח֥וּץ לַֽ/מַּחֲנֶ֖ה שִׁבְעַ֣ת יָמִ֑ים כֹּל֩ הֹרֵ֨ג נֶ֜פֶשׁ
    וְ/כֹ֣ל נֹגֵ֣עַ בֶּֽ/חָלָ֗ל תִּֽתְחַטְּא֞וּ בַּ/יּ֤וֹם הַ/שְּׁלִישִׁי֙ וּ/בַ/יּ֣וֹם
    הַ/שְּׁבִיעִ֔י אַתֶּ֖ם וּ/שְׁבִי/כֶֽם׀׃
translation:
  text: And you, camp outside the camp for seven days. Everyone who has killed a person,
    and everyone who has touched one slain, shall purify yourselves on the third day
    and on the seventh day—you and your captives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone who has touched a slain body.' The Hebrew literally refers
      to 'one slain,' which in context implies corpse-contact and resulting ritual
      impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲנוּ
  chosen: camp
  alternatives:
  - remain encamped
  - stay
  lexicon: HALOT
  rationale: Imperative plural from חנה, directing the people to encamp or stay encamped.
    'Camp' is concise and natural in context.
- source_word: מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - outside the encampment
  lexicon: HALOT
  rationale: Straightforward spatial expression; 'camp' matches the military/wilderness
    setting and keeps the repetition with חֲנוּ.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  alternatives:
  - seven days
  lexicon: HALOT
  rationale: English idiom normally supplies 'for' with a duration phrase.
- source_word: כֹּל הֹרֵג נֶפֶשׁ
  chosen: everyone who has killed a person
  alternatives:
  - everyone who has killed someone
  - everyone who kills a person
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to a human life/person, not 'soul' in an abstract
    sense. The participle in context has past-reference force after battle, so 'has
    killed' fits the situation.
- source_word: נֶפֶשׁ
  chosen: a person
  alternatives:
  - someone
  - a life
  lexicon: HALOT
  rationale: In this legal/ritual context, the term denotes a human being. 'Person'
    is clear modern English and avoids misleading metaphysical overtones of 'soul'.
- source_word: וְכֹל נֹגֵעַ בֶּחָלָל
  chosen: and everyone who has touched one slain
  alternatives:
  - and everyone who has touched a slain body
  - and everyone who touches the slain
  lexicon: HALOT
  rationale: חָלָל denotes one slain, often a corpse resulting from violence. 'One
    slain' preserves the personal reference while remaining idiomatic.
- source_word: בֶּחָלָל
  chosen: one slain
  alternatives:
  - a corpse
  - the slain body
  lexicon: HALOT
  rationale: The word can denote a slain person/corpse. Because the impurity law concerns
    contact with the dead, the sense includes corpse-contact, but 'one slain' stays
    closer to the Hebrew wording.
- source_word: תִּתְחַטְּאוּ
  chosen: shall purify yourselves
  alternatives:
  - must cleanse yourselves
  - shall decontaminate yourselves
  lexicon: HALOT
  rationale: Hitpael of חטא in ritual contexts means to purify oneself from impurity,
    not moral self-improvement. 'Shall purify yourselves' captures the required ritual
    action.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי וּבַיּוֹם הַשְּׁבִיעִי
  chosen: on the third day and on the seventh day
  alternatives:
  - on day three and on day seven
  lexicon: HALOT
  rationale: Formal temporal markers are best preserved because they are part of the
    ritual prescription.
- source_word: אַתֶּם וּשְׁבִיכֶם
  chosen: you and your captives
  alternatives:
  - you and your prisoners
  lexicon: HALOT
  rationale: שְׁבִי refers to captives taken in war. 'Captives' is more precise than
    'prisoners' in this military context.
