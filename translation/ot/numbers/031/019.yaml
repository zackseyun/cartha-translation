theological_decisions:
- issue: Nature of purification after killing or corpse-contact
  chosen_reading: ritual purification from corpse impurity
  alternative_readings:
  - moral cleansing from bloodguilt
  rationale: The verb תתחטאו in context, together with the specified third and seventh
    days, points to the ritual purification procedure associated with corpse impurity
    rather than a statement primarily about moral absolution. The translation therefore
    uses 'purify yourselves' without importing a stronger theological claim about
    forgiveness.
  doctrine_reference: Translation philosophy §1, §3
