theological_decisions:
- issue: Whether to make explicit the sexual idiom in fully contemporary terms
  chosen_reading: Retain the idiomatic expression 'has not known the bed of a man'
    in the main text.
  alternative_readings:
  - has not had sexual relations with a man
  - is a virgin
  rationale: The Hebrew uses a sexual euphemism rather than the abstract label 'virgin.'
    Rendering the idiom preserves the source's wording and avoids importing a more
    technical or culturally loaded term than the text itself uses. A clearer contemporary
    alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: How explicitly to mark the female referent of טַף
  chosen_reading: Translate with 'young girl' rather than a gender-neutral 'child.'
  alternative_readings:
  - child
  - young one
  rationale: Although טַף by itself can be collective and not inherently female, the
    immediate qualifiers 'among the women' and 'who has not known the bed of a man'
    restrict the referent to females. This follows the gender-accurate principle by
    matching the source's intent in context.
  doctrine_reference: Translation philosophy §4
