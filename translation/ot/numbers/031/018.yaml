id: NUM.31.18
reference: Numbers 31:18
source:
  edition: WLC
  text: וְ/כֹל֙ הַ/טַּ֣ף בַּ/נָּשִׁ֔ים אֲשֶׁ֥ר לֹא יָדְע֖וּ מִשְׁכַּ֣ב זָכָ֑ר הַחֲי֖וּ
    לָ/כֶֽם־׃
translation:
  text: But keep alive for yourselves every young girl among the women who has not
    known the bed of a man.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'who has not had sexual relations with a man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֹל
  chosen: But every
  alternatives:
  - And every
  - But all
  lexicon: HALOT
  rationale: וְ here continues the command in contrast to the preceding instructions,
    so 'But' brings out the adversative force in context; כֹל with the following singular
    collective noun is naturally rendered 'every' rather than 'all' in English.
- source_word: הַטַּף
  chosen: young girl
  alternatives:
  - little one
  - child
  - young one
  lexicon: HALOT
  rationale: טַף denotes little ones/children. In this context, modified by 'among
    the women' and further defined as those who have not known sexual relations with
    a male, the referent is specifically female minors or young females. 'Young girl'
    makes the implied sex explicit in idiomatic English without adding more than the
    context warrants.
- source_word: בַּנָּשִׁים
  chosen: among the women
  alternatives:
  - among the females
  - from among the women
  lexicon: HALOT
  rationale: 'The preposition ב plus נשים is best expressed here as a partitive grouping:
    these young girls are identified from within the female population. ''Among the
    women'' is natural English and preserves the grouping sense.'
- source_word: אֲשֶׁר לֹא יָדְעוּ
  chosen: who has not known
  alternatives:
  - who have not known
  - who has not had
  lexicon: HALOT
  rationale: יָדַע is the standard Hebrew euphemism for sexual experience in such
    contexts. Because the English subject is treated distributively as 'every young
    girl,' singular 'has not known' reads naturally.
- source_word: מִשְׁכַּב זָכָר
  chosen: the bed of a man
  alternatives:
  - lying with a male
  - sexual relations with a man
  lexicon: HALOT
  rationale: The phrase is a Hebrew idiom for sexual intercourse with a male. 'The
    bed of a man' preserves the metaphor more formally while remaining understandable.
    A more explicit paraphrase is possible, but this wording better balances transparency
    to the source with readability.
- source_word: הַחֲיוּ לָכֶם
  chosen: keep alive for yourselves
  alternatives:
  - spare for yourselves
  - let live for yourselves
  lexicon: HALOT
  rationale: The Hiphil imperative of חיה means to keep alive or let live. 'Keep alive'
    is a direct rendering; 'for yourselves' preserves לָכֶם, indicating these captives
    are to be spared for the Israelites' own use/possession, without specifying beyond
    the text.
