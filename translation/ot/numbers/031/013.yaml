id: NUM.31.13
reference: Numbers 31:13
source:
  edition: WLC
  text: וַ/יֵּ֨צְא֜וּ מֹשֶׁ֨ה וְ/אֶלְעָזָ֧ר הַ/כֹּהֵ֛ן וְ/כָל נְשִׂיאֵ֥י הָ/עֵדָ֖ה
    לִ/קְרָאתָ֑/ם אֶל מִ/ח֖וּץ לַֽ/מַּחֲנֶֽה־־׃
translation:
  text: Then Moses, Eleazar the priest, and all the leaders of the congregation went
    out to meet them outside the camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chiefs of the congregation' or 'princes of the assembly' for 'leaders
      of the congregation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצְאוּ
  chosen: went out
  alternatives:
  - came out
  lexicon: HALOT
  rationale: Wayyiqtol of יצא denotes movement outward. 'Went out' is the most natural
    narrative English rendering and preserves the directional sense.
- source_word: אֶלְעָזָר הַכֹּהֵן
  chosen: Eleazar the priest
  alternatives:
  - Eleazar, the priest
  lexicon: HALOT
  rationale: The appositional title identifies Eleazar's office. English can render
    smoothly without a comma while preserving the designation.
- source_word: כָל נְשִׂיאֵי הָעֵדָה
  chosen: all the leaders of the congregation
  alternatives:
  - all the chiefs of the congregation
  - all the princes of the assembly
  lexicon: HALOT
  rationale: נְשִׂיאִים refers to recognized tribal/community leaders, not royalty
    in this context. 'Leaders' is clear modern English; הָעֵדָה is well rendered 'the
    congregation' in Numbers for the covenant community.
- source_word: לִקְרָאתָם
  chosen: to meet them
  alternatives:
  - to meet with them
  - to encounter them
  lexicon: HALOT
  rationale: 'The infinitive construct with preposition ל and suffix expresses purpose:
    going out for the purpose of meeting them.'
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - to outside the camp
  - to a place outside the camp
  lexicon: HALOT
  rationale: The phrase is idiomatic for location beyond the camp perimeter. In English,
    'outside the camp' communicates the sense naturally without over-literal awkwardness.
