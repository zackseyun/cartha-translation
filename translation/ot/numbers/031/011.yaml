id: NUM.31.11
reference: Numbers 31:11
source:
  edition: WLC
  text: וַ/יִּקְחוּ֙ אֶת כָּל הַ/שָּׁלָ֔ל וְ/אֵ֖ת כָּל הַ/מַּלְק֑וֹחַ בָּ/אָדָ֖ם וּ/בַ/בְּהֵמָֽה־־־׃
translation:
  text: And they took all the spoil and all the plunder, both man and beast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''all the booty.'' The Hebrew uses two related terms for war gains:
      ''spoil'' and ''plunder'' (or ''booty'').'
    reason: lexical_alternative
  - marker: b
    text: '''Man'' here means human beings collectively, not males only.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: And they took
  alternatives:
  - And they seized
  - And they carried off
  lexicon: HALOT
  rationale: Qal wayyiqtol of לקח, the standard narrative form meaning 'take.' 'Took'
    is the most natural and sufficiently broad English rendering in context of war
    booty.
- source_word: כָּל הַשָּׁלָל
  chosen: all the spoil
  alternatives:
  - all the booty
  lexicon: HALOT
  rationale: שָׁלָל commonly denotes spoil taken in war. 'Spoil' preserves the military
    sense and distinguishes it from the following near-synonym.
- source_word: כָּל הַמַּלְקוֹחַ
  chosen: all the plunder
  alternatives:
  - all the prey
  - all the captives and livestock taken
  lexicon: HALOT
  rationale: מַלְקוֹחַ refers to what is taken, especially as captured goods. Rendering
    it as 'plunder' keeps the distinction from שָׁלָל while remaining idiomatic. 'Prey'
    is possible but less natural in modern English and can sound dehumanizing in a
    way not required by the Hebrew.
- source_word: בָּאָדָם
  chosen: man
  alternatives:
  - people
  - human beings
  lexicon: HALOT
  rationale: אָדָם here refers to human beings as part of the taken spoil. Per doctrine,
    gender-accurate rendering is preferred; 'man' reflects the Hebrew term and also
    preserves the stock pairing 'man and beast.' The sense is collective rather than
    male-only.
- source_word: וּבַבְּהֵמָה
  chosen: beast
  alternatives:
  - livestock
  - animals
  lexicon: HALOT
  rationale: בְּהֵמָה denotes animals, often domesticated animals or livestock. 'Beast'
    fits the conventional paired expression with 'man' and matches the singular collective
    force of the Hebrew.
