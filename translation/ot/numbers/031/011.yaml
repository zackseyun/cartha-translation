theological_decisions:
- issue: Rendering of אָדָם in a collective wartime inventory
  chosen_reading: man
  alternative_readings:
  - people
  - human beings
  rationale: The doctrine excerpt specifies 'man / humankind (context)' for אָדָם
    and prefers gender-accurate renderings. Here the phrase is a collective category
    contrasted with animals, and 'man and beast' is a natural English equivalent that
    preserves the source structure. Because modern readers may hear 'man' as male-specific,
    the broader sense is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms table for אָדָם'
