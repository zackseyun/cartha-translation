id: NUM.35.29
reference: Numbers 35:29
source:
  edition: WLC
  text: וְ/הָי֨וּ אֵ֧לֶּה לָ/כֶ֛ם לְ/חֻקַּ֥ת מִשְׁפָּ֖ט לְ/דֹרֹתֵי/כֶ֑ם בְּ/כֹ֖ל מוֹשְׁבֹתֵי/כֶֽם׃
translation:
  text: And these shall be for you a statute of justice throughout your generations
    in all your dwelling places.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a statute of judgment' or 'a legal statute.' The Hebrew phrase combines
      terms for an enacted statute and judicial decision/procedure.
    reason: lexical_alternative
  - marker: b
    text: Or 'in all your settlements.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  chosen: shall be
  alternatives:
  - will be
  - are to be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal material commonly carries
    a future/resultative sense in English. 'Shall be' fits the prescriptive tone of
    the statute.
- source_word: אֵלֶּה
  chosen: these
  alternatives:
  - these things
  lexicon: HALOT
  rationale: Straightforward demonstrative plural referring back to the preceding
    legal provisions. 'These' is sufficiently clear and more natural than 'these things.'
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition marks benefit/reference. 'For you' is idiomatic in English
    for legal provisions addressed to Israel.
- source_word: לְחֻקַּת
  chosen: a statute
  alternatives:
  - a fixed statute
  - an ordinance
  lexicon: HALOT
  rationale: חֻקָּה often denotes an enacted prescription or statute. 'Statute' preserves
    the legal force without sounding overly archaic.
- source_word: מִשְׁפָּט
  chosen: of justice
  alternatives:
  - of judgment
  - of legal judgment
  - of ordinance
  lexicon: HALOT
  rationale: In this collocation with חֻקָּה, the sense is juridical. 'Justice' communicates
    the legal/judicial character in clear modern English, while 'judgment' could sound
    like a specific verdict rather than a body of legal procedure.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  - for all your generations
  lexicon: HALOT
  rationale: This idiom expresses enduring applicability across successive generations.
    'Throughout your generations' is standard and natural English.
- source_word: בְּכֹל
  chosen: in all
  alternatives:
  - throughout all
  lexicon: HALOT
  rationale: The preposition plus 'all' introduces the scope of application. 'In all'
    is concise and fits the following noun.
- source_word: מוֹשְׁבֹתֵיכֶם
  chosen: your dwelling places
  alternatives:
  - your settlements
  - your habitations
  - wherever you live
  lexicon: HALOT
  rationale: מוֹשָׁב refers to places of residence/settlement. 'Dwelling places' preserves
    the locative sense formally; 'wherever you live' would be more dynamic, and 'settlements'
    somewhat narrower.
