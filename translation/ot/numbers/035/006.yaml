id: NUM.35.6
reference: Numbers 35:6
source:
  edition: WLC
  text: וְ/אֵ֣ת הֶֽ/עָרִ֗ים אֲשֶׁ֤ר תִּתְּנוּ֙ לַ/לְוִיִּ֔ם אֵ֚ת שֵׁשׁ עָרֵ֣י הַ/מִּקְלָ֔ט
    אֲשֶׁ֣ר תִּתְּנ֔וּ לָ/נֻ֥ס שָׁ֖מָּ/ה הָ/רֹצֵ֑חַ וַ/עֲלֵי/הֶ֣ם תִּתְּנ֔וּ אַרְבָּעִ֥ים
    וּ/שְׁתַּ֖יִם עִֽיר־׃
translation:
  text: And the cities that you give to the Levites shall be the six cities of refuge,
    which you shall give for the manslayer to flee there; and in addition to them
    you shall give forty-two cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the slayer' or 'the killer.' The Hebrew term here is used in the legal
      context of the cities of refuge and does not by itself specify whether the killing
      was intentional or accidental; 'manslayer' preserves that nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: עִיר commonly denotes a city or town. 'Cities' is the standard rendering
    in this legal/allotment context and fits the repeated use throughout the passage.
- source_word: לַלְוִיִּם
  chosen: to the Levites
  lexicon: HALOT
  rationale: Straightforward dative/allative phrase indicating the recipients of the
    cities.
- source_word: שֵׁשׁ עָרֵי הַמִּקְלָט
  chosen: the six cities of refuge
  alternatives:
  - the six asylum cities
  - the six cities of shelter
  lexicon: HALOT
  rationale: מִקְלָט denotes a place of refuge/asylum. 'Cities of refuge' is the established
    and accurate legal expression in English for this institution.
- source_word: לָנוּס שָׁמָּה
  chosen: to flee there
  alternatives:
  - to escape there
  - to run there
  lexicon: HALOT
  rationale: נוּס means 'to flee.' 'To flee there' preserves both the verbal force
    and the directional adverb שָׁמָּה.
- source_word: הָרֹצֵחַ
  chosen: the manslayer
  alternatives:
  - the killer
  - the slayer
  lexicon: HALOT
  rationale: In the context of cities of refuge, רֹצֵחַ refers to one who has killed
    a person and may include accidental homicide, not necessarily premeditated murder.
    'Manslayer' best preserves the legal nuance without overstating intent.
- source_word: וַעֲלֵיהֶם
  chosen: in addition to them
  alternatives:
  - besides them
  - over and above them
  lexicon: HALOT
  rationale: The preposition על with this idiom indicates addition/supplement here,
    not physical position. 'In addition to them' communicates the arithmetic relation
    clearly in modern English.
- source_word: אַרְבָּעִים וּשְׁתַּיִם עִיר
  chosen: forty-two cities
  lexicon: HALOT
  rationale: The singular עִיר after the number is a common Hebrew counting construction;
    idiomatic English requires the plural 'cities.'
