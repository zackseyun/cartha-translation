id: NUM.35.7
reference: Numbers 35:7
source:
  edition: WLC
  text: כָּל הֶ/עָרִ֗ים אֲשֶׁ֤ר תִּתְּנוּ֙ לַ/לְוִיִּ֔ם אַרְבָּעִ֥ים וּ/שְׁמֹנֶ֖ה
    עִ֑יר אֶתְ/הֶ֖ן וְ/אֶת מִגְרְשֵׁי/הֶֽן־־׃
translation:
  text: All the cities that you give to the Levites shall be forty-eight cities, together
    with their pasturelands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common lands' or 'open land' for the area surrounding the cities.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - The total of all
  lexicon: HALOT
  rationale: Quantifier introducing the full sum of the cities under discussion; 'All'
    is the natural English equivalent.
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: עִיר commonly means 'city/town.' 'Cities' is retained for consistency
    with the surrounding legal material and traditional English rendering.
- source_word: אֲשֶׁר תִּתְּנוּ
  chosen: that you give
  alternatives:
  - which you shall give
  - that you are to give
  lexicon: HALOT
  rationale: Relative clause with 2mp imperfect of נתן. Present-style English 'that
    you give' fits legal instruction naturally in context.
- source_word: לַלְוִיִּם
  chosen: to the Levites
  lexicon: HALOT
  rationale: Direct reference to the Levitical recipients; standard transliteration
    'Levites' is appropriate for the tribal group.
- source_word: אַרְבָּעִים וּשְׁמֹנֶה עִיר
  chosen: forty-eight cities
  alternatives:
  - forty and eight cities
  lexicon: HALOT
  rationale: Hebrew cardinal expression literally 'forty and eight city/cities'; idiomatic
    English contracts this to 'forty-eight cities.' Plural 'cities' is required in
    English though עִיר appears in singular after the numeral.
- source_word: אֶתְהֶן
  chosen: shall be
  alternatives:
  - namely
  - in all
  lexicon: HALOT
  rationale: 'The object marker with pronoun resumes the counted cities for emphasis.
    English commonly expresses the sense with an equative verb: ''shall be forty-eight
    cities.'' This avoids an awkward literal rendering while preserving the totalizing
    force.'
- source_word: וְאֶת מִגְרְשֵׁיהֶן
  chosen: together with their pasturelands
  alternatives:
  - and their pasturelands
  - along with their common lands
  - and their open land
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land/pastureland around a city, especially
    in priestly legislation. 'Pasturelands' best captures the functional sense in
    this context. 'Together with' reflects that these lands are included along with
    the cities.
