id: NUM.35.28
reference: Numbers 35:28
source:
  edition: WLC
  text: כִּ֣י בְ/עִ֤יר מִקְלָט/וֹ֙ יֵשֵׁ֔ב עַד מ֖וֹת הַ/כֹּהֵ֣ן הַ/גָּדֹ֑ל וְ/אַחֲרֵ֥י
    מוֹת֙ הַ/כֹּהֵ֣ן הַ/גָּדֹ֔ל יָשׁוּב֙ הָ/רֹצֵ֔חַ אֶל אֶ֖רֶץ אֲחֻזָּתֽ/וֹ־־׃
translation:
  text: For he must remain in his city of refuge until the death of the high priest,
    and after the death of the high priest the manslayer may return to the land of
    his possession.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the killer.' The Hebrew term here is a legal category in the cities-of-refuge
      laws and should not automatically be read as 'murderer.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to his own landholding' or 'to the land of his property.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the rationale for the preceding legal consequence in the context.
    'For' fits the explanatory force in English legal-style discourse better than
    'because' at the head of the sentence.
- source_word: בְעִיר מִקְלָטוֹ
  chosen: in his city of refuge
  alternatives:
  - within his city of refuge
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase. 'City of refuge'
    is the established and accurate legal term for מִקְלָט in this context.
- source_word: יֵשֵׁב
  chosen: he must remain
  alternatives:
  - he shall dwell
  - he shall stay
  - he will live
  lexicon: HALOT
  rationale: Although the verb literally means 'sit/dwell/live,' in this legal context
    it carries an obligatory sense. 'Must remain' communicates both residence and
    legal restriction in natural modern English better than the more wooden 'shall
    dwell'.
- source_word: עַד מוֹת
  chosen: until the death of
  alternatives:
  - until ... dies
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered as 'until the death of,'
    preserving the nominal form of the Hebrew.
- source_word: הַכֹּהֵן הַגָּדֹל
  chosen: the high priest
  alternatives:
  - the great priest
  lexicon: HALOT
  rationale: Standard and accurate rendering of the official title; 'high priest'
    is idiomatic English for this office.
- source_word: וְאַחֲרֵי מוֹת
  chosen: and after the death of
  alternatives:
  - and after ... dies
  lexicon: HALOT
  rationale: Preserves the Hebrew temporal sequence and the repeated nominal expression,
    which is rhetorically important in the legal formulation.
- source_word: הָרֹצֵחַ
  chosen: the manslayer
  alternatives:
  - the killer
  - the slayer
  - the murderer
  lexicon: HALOT
  rationale: In the immediate context of the cities of refuge legislation, this term
    refers to one who has killed a person, often specifically the one who killed unintentionally.
    'Manslayer' preserves the legal nuance without importing the moral specificity
    of 'murderer,' which would be misleading here.
- source_word: יָשׁוּב
  chosen: may return
  alternatives:
  - shall return
  - will return
  lexicon: HALOT
  rationale: The verb means 'return.' 'May return' best conveys restored legal permission
    after prior restriction, which is the point of the law here; 'shall/will return'
    could imply prediction or command rather than permission.
- source_word: אֶל אֶרֶץ אֲחֻזָּתוֹ
  chosen: to the land of his possession
  alternatives:
  - to the land of his property
  - to his own landholding
  - to the land of his inheritance
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a landed holding or property possession. 'Land of his
    possession' is slightly formal but preserves the property/legal sense better than
    the more theologically loaded 'inheritance' in this context.
