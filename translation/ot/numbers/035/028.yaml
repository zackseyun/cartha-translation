theological_decisions:
- issue: Whether הָרֹצֵחַ should be rendered as 'murderer' or with a less morally
    determinate legal term
  chosen_reading: the manslayer
  alternative_readings:
  - the killer
  - the murderer
  rationale: The cities of refuge legislation distinguishes unlawful murder from other
    forms of killing. Rendering the term here as 'murderer' would overstate the case
    and collapse an important legal distinction in the passage. 'Manslayer' preserves
    the juridical category without importing a verdict not stated in this verse.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
