theological_decisions:
- issue: Rendering the legal category of intentional homicide
  chosen_reading: murderer
  alternative_readings:
  - manslayer
  rationale: The context specifies hostile intent ('in enmity'), so the killer is
    not merely one who caused death but one guilty of intentional homicide. 'Murderer'
    preserves the legal and moral distinction made in the chapter.
- issue: Rendering גֹּאֵל הַדָּם
  chosen_reading: the avenger of blood
  alternative_readings:
  - the blood-avenger
  - the kinsman-avenger
  rationale: The translation preserves the Old Testament legal institution without
    importing later doctrinal or cultural explanation into the main text. A footnote
    preserves a kinship-oriented alternative because גֹּאֵל can denote a family redeemer/avenger
    in Israelite law.
