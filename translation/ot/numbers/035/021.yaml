id: NUM.35.21
reference: Numbers 35:21
source:
  edition: WLC
  text: א֣וֹ בְ/אֵיבָ֞ה הִכָּ֤ה/וּ בְ/יָד/וֹ֙ וַ/יָּמֹ֔ת מֽוֹת יוּמַ֥ת הַ/מַּכֶּ֖ה
    רֹצֵ֣חַֽ ה֑וּא גֹּאֵ֣ל הַ/דָּ֗ם יָמִ֛ית אֶת הָ/רֹצֵ֖חַ בְּ/פִגְע/וֹ בֽ/וֹ־־־׃
translation:
  text: Or if he struck him with his hand in enmity and he died, the one who struck
    him must surely be put to death; he is a murderer. The avenger of blood shall
    put the murderer to death when he meets him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with hatred' or 'out of hostility' for 'in enmity.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the blood-avenger'; more explicitly, 'the kinsman-avenger of blood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאֵיבָה
  chosen: in enmity
  alternatives:
  - out of hostility
  - with hatred
  lexicon: HALOT
  rationale: The noun אֵיבָה denotes hostility or enmity. 'In enmity' preserves the
    prepositional construction and the legal emphasis on hostile intent better than
    a more interpretive paraphrase.
- source_word: הִכָּהוּ בְיָדוֹ
  chosen: struck him with his hand
  alternatives:
  - hit him with his hand
  - struck him by hand
  lexicon: HALOT
  rationale: The verb נכה is the standard term for striking. 'With his hand' is retained
    formally because the bodily means of the assault is part of the legal case distinction.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so that he died
  lexicon: HALOT
  rationale: A simple sequential rendering matches the Hebrew narrative form. English
    readers will still understand the causal connection in context.
- source_word: מוֹת יוּמַת
  chosen: must surely be put to death
  alternatives:
  - shall surely be put to death
  - must be executed
  lexicon: HALOT
  rationale: The infinitive absolute with passive verb intensifies the penalty. 'Must
    surely be put to death' preserves both the legal force and the emphatic construction
    in clear modern English.
- source_word: הַמַּכֶּה
  chosen: the one who struck him
  alternatives:
  - the striker
  - the assailant
  lexicon: HALOT
  rationale: Although literally 'the striker,' the phrase refers back to the assailant
    in this case law. 'The one who struck him' is more natural English while remaining
    transparent to the source.
- source_word: רֹצֵחַ הוּא
  chosen: he is a murderer
  alternatives:
  - he is a manslayer
  lexicon: HALOT
  rationale: In this context the law distinguishes intentional killing from accidental
    manslaughter; therefore 'murderer' best captures the culpable, intentional sense.
- source_word: גֹּאֵל הַדָּם
  chosen: the avenger of blood
  alternatives:
  - the blood-avenger
  - the kinsman-avenger
  lexicon: HALOT
  rationale: This is the established legal title in the passage. 'Avenger of blood'
    is transparent and preserves the formal legal idiom; 'kinsman-avenger' adds kinship
    explicitly, but that nuance is not stated in this immediate phrase.
- source_word: יָמִית
  chosen: shall put ... to death
  alternatives:
  - shall kill
  lexicon: HALOT
  rationale: Using 'put to death' rather than simply 'kill' maintains the judicial-legal
    register of the passage and aligns with the earlier penalty formula.
- source_word: בְּפִגְעוֹ בוֹ
  chosen: when he meets him
  alternatives:
  - upon encountering him
  - when he comes upon him
  lexicon: HALOT
  rationale: The phrase denotes encountering or coming upon the murderer. 'When he
    meets him' is idiomatic modern English and fits the legal scenario without overtranslation.
