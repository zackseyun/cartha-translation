id: NUM.35.5
reference: Numbers 35:5
source:
  edition: WLC
  text: וּ/מַדֹּתֶ֞ם מִ/ח֣וּץ לָ/עִ֗יר אֶת פְּאַת קֵ֣דְמָ/ה אַלְפַּ֪יִם בָּֽ/אַמָּ֟ה
    וְ/אֶת פְּאַת נֶגֶב֩ אַלְפַּ֨יִם בָּ/אַמָּ֜ה וְ/אֶת פְּאַת יָ֣ם אַלְפַּ֣יִם בָּֽ/אַמָּ֗ה
    וְ/אֵ֨ת פְּאַ֥ת צָפ֛וֹן אַלְפַּ֥יִם בָּ/אַמָּ֖ה וְ/הָ/עִ֣יר בַּ/תָּ֑וֶךְ זֶ֚ה
    יִהְיֶ֣ה לָ/הֶ֔ם מִגְרְשֵׁ֖י הֶ/עָרִֽים־־־־־־׀׃
translation:
  text: 'You shall measure outside the city: the east side, two thousand cubits; the
    south side, two thousand cubits; the west side, two thousand cubits; and the north
    side, two thousand cubits, with the city in the middle. This shall be for them
    the pasture lands of the cities.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally 'sea' for the western side, using the common directional
      idiom based on the Mediterranean Sea.
    reason: lexical_alternative
  - marker: b
    text: Or 'common land' or 'open land' of the cities; the Hebrew term refers to
      the land surrounding a city, often used for grazing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַדֹּתֶם
  chosen: You shall measure
  alternatives:
  - and you shall measure
  - you are to measure
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction used with instructional force in
    legal material; English future/modal imperative sense fits the context. Retaining
    'measure' preserves the concrete surveying action.
- source_word: מִחוּץ לָעִיר
  chosen: outside the city
  alternatives:
  - from outside the city
  - beyond the city
  lexicon: HALOT
  rationale: The phrase indicates measurement taken in the area outside the city limits.
    'Outside the city' is natural English and sufficiently precise.
- source_word: פְּאַת
  chosen: side
  alternatives:
  - edge
  - corner
  - boundary
  lexicon: HALOT
  rationale: In this surveying context, the term refers to each directional extent
    of the measured area. 'Side' is clearer in modern English than 'corner' here,
    since the verse lists cardinal directions rather than angular points.
- source_word: קֵדְמָה
  chosen: east
  alternatives:
  - eastward
  - front/east side
  lexicon: HALOT
  rationale: Directional term meaning east/eastward. 'East side' communicates the
    intended orientation in idiomatic English.
- source_word: נֶגֶב
  chosen: south
  alternatives:
  - south side
  - Negev
  lexicon: HALOT
  rationale: Here the word functions as a compass direction, not the regional proper
    name. 'South side' is the contextual sense.
- source_word: יָם
  chosen: west
  alternatives:
  - sea side
  - toward the sea
  lexicon: HALOT
  rationale: Although literally 'sea,' in Hebrew directional usage it commonly denotes
    west, the direction of the Mediterranean. Rendering 'west' gives the plain directional
    sense for English readers.
- source_word: צָפוֹן
  chosen: north
  alternatives:
  - north side
  lexicon: HALOT
  rationale: Standard directional term; 'north side' fits the repeated pattern.
- source_word: אַלְפַּיִם בָּאַמָּה
  chosen: two thousand cubits
  alternatives:
  - two thousand cubits in length
  lexicon: HALOT
  rationale: The measure is explicit and should be preserved formally. 'Cubit' is
    retained rather than converted to a modern unit to maintain textual specificity.
- source_word: וְהָעִיר בַּתָּוֶךְ
  chosen: with the city in the middle
  alternatives:
  - and the city shall be in the middle
  - the city being in the center
  lexicon: HALOT
  rationale: This clause describes the spatial arrangement of the measured area around
    the city. 'With the city in the middle' is concise and natural while preserving
    the sense.
- source_word: זֶה יִהְיֶה לָהֶם
  chosen: This shall be for them
  alternatives:
  - This shall belong to them
  - This shall serve for them
  lexicon: HALOT
  rationale: The demonstrative plus היה expresses designation. 'This shall be for
    them' keeps the formal legal tone without overinterpreting ownership.
- source_word: מִגְרְשֵׁי הֶעָרִים
  chosen: the pasture lands of the cities
  alternatives:
  - the common land of the cities
  - the open land around the cities
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land or pasture area belonging to a settlement,
    especially in Levitical-city legislation. 'Pasture lands' best captures the practical
    use while remaining readable. The plural 'cities' follows the Hebrew.
