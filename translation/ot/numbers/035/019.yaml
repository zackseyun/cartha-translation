id: NUM.35.19
reference: Numbers 35:19
source:
  edition: WLC
  text: גֹּאֵ֣ל הַ/דָּ֔ם ה֥וּא יָמִ֖ית אֶת הָ/רֹצֵ֑חַ בְּ/פִגְע/וֹ ב֖/וֹ ה֥וּא יְמִיתֶֽ/נּוּ־־׃
translation:
  text: The avenger of blood himself shall put the murderer to death; when he meets
    him, he himself shall put him to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the blood avenger.' The Hebrew phrase is a fixed legal term for the
      family member responsible to avenge unlawful bloodshed.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּאֵל
  chosen: avenger
  alternatives:
  - redeemer
  - kinsman-redeemer
  lexicon: HALOT
  rationale: In this legal context, גֹּאֵל refers specifically to the family member
    charged with avenging a wrongful death, not the broader redemption sense. 'Avenger'
    best fits the immediate judicial function while remaining natural English.
- source_word: הַדָּם
  chosen: of blood
  alternatives:
  - blood
  lexicon: HALOT
  rationale: The construct phrase גֹּאֵל הַדָּם is a fixed legal expression in Numbers
    35. Rendering it 'of blood' preserves the idiom 'avenger of blood,' which is established
    and accurately reflects the Hebrew legal terminology.
- source_word: הוּא
  chosen: himself
  alternatives:
  - he
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis. ''Himself'' brings out the emphatic
    force: the blood avenger personally carries out the act.'
- source_word: יָמִית
  chosen: shall put ... to death
  alternatives:
  - shall kill
  - shall cause to die
  lexicon: HALOT
  rationale: The Hiphil of מות is causative. 'Put to death' is idiomatic English for
    an authorized execution context and better reflects the legal setting than the
    blunter 'kill.'
- source_word: הָרֹצֵחַ
  chosen: the murderer
  alternatives:
  - the manslayer
  - the killer
  lexicon: HALOT
  rationale: Although רצח can cover unlawful killing more broadly, in this immediate
    verse the person in view is the one liable to death under the preceding legal
    distinctions. 'Murderer' fits the context better than the more ambiguous 'killer'
    or the technical but potentially misleading 'manslayer.'
- source_word: בְּפִגְעוֹ בוֹ
  chosen: when he meets him
  alternatives:
  - upon encountering him
  - when he comes upon him
  - at his striking him
  lexicon: HALOT
  rationale: The phrase denotes encounter or coming upon someone. 'When he meets him'
    is clear modern English and captures the temporal sense without over-literal awkwardness.
- source_word: הוּא יְמִיתֶנּוּ
  chosen: he himself shall put him to death
  alternatives:
  - he shall kill him
  - he shall put him to death
  lexicon: HALOT
  rationale: The repeated pronoun plus verb restates and emphasizes the authorized
    agent and action. Repeating 'he himself' preserves the Hebrew emphasis and the
    legal solemnity of the sentence.
