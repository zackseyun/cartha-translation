theological_decisions:
- issue: Legal role of גֹּאֵל הַדָּם
  chosen_reading: Translate as 'the avenger of blood' as a human kinship-based legal
    agent within Israel's judicial framework.
  alternative_readings:
  - the redeemer of blood
  - the blood-redeemer
  rationale: The verse concerns Israelite homicide law, not a theological redemption
    motif. The translation should preserve the legal institution without importing
    later doctrinal associations attached to 'redeemer.'
  doctrine_reference: Translation philosophy §1, §5
