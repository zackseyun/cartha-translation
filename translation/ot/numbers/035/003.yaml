id: NUM.35.3
reference: Numbers 35:3
source:
  edition: WLC
  text: וְ/הָי֧וּ הֶֽ/עָרִ֛ים לָ/הֶ֖ם לָ/שָׁ֑בֶת וּ/מִגְרְשֵׁי/הֶ֗ם יִהְי֤וּ לִ/בְהֶמְתָּ/ם֙
    וְ/לִ/רְכֻשָׁ֔/ם וּ/לְ/כֹ֖ל חַיָּתָֽ/ם׃
translation:
  text: The cities shall be for them to live in, and their pasturelands shall be for
    their livestock, for their property, and for all their animals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their common-land' or 'their open land' for 'their pasturelands.' The
      Hebrew term refers to the open area around the cities, here especially suited
      for grazing use.
    reason: lexical_alternative
  - marker: b
    text: Or 'for their possessions' for 'for their property.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: עִיר commonly denotes a city/town settlement. 'Cities' is the standard
    rendering in this legal allotment context and matches the repeated terminology
    in the passage.
- source_word: לָשָׁבֶת
  chosen: to live in
  alternatives:
  - to dwell in
  - for dwelling
  lexicon: HALOT
  rationale: From ישׁב, 'sit, dwell, inhabit.' In idiomatic modern English after 'shall
    be for them,' 'to live in' is natural while preserving the infinitival purpose
    sense.
- source_word: מִגְרְשֵׁיהֶם
  chosen: their pasturelands
  alternatives:
  - their common-land
  - their open land
  - their grazing land
  lexicon: HALOT
  rationale: מִגְרָשׁ in this context refers to the open land around a city assigned
    for use, especially for grazing. 'Pasturelands' best captures the practical function
    in this verse while remaining clear to modern readers.
- source_word: לִבְהֶמְתָּם
  chosen: for their livestock
  alternatives:
  - for their cattle
  - for their beasts
  lexicon: HALOT
  rationale: בְּהֵמָה here refers collectively to domesticated animals. 'Livestock'
    is the clearest contemporary collective term in this land-use context.
- source_word: לִרְכֻשָׁם
  chosen: for their property
  alternatives:
  - for their possessions
  - for their goods
  lexicon: HALOT
  rationale: רְכוּשׁ denotes property/possessions. 'Property' fits the legal-administrative
    tone and allows the following phrase to distinguish living creatures from other
    holdings.
- source_word: וּלְכֹל חַיָּתָם
  chosen: and for all their animals
  alternatives:
  - and for all their living creatures
  - and for all their beasts
  lexicon: HALOT
  rationale: חַיָּה can mean living thing/animal. Here, with livestock already mentioned,
    it likely broadens the scope to all their animals. 'Animals' is clearer than the
    overly broad 'living creatures' and less archaic than 'beasts.'
