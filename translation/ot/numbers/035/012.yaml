id: NUM.35.12
reference: Numbers 35:12
source:
  edition: WLC
  text: וְ/הָי֨וּ לָ/כֶ֧ם הֶ/עָרִ֛ים לְ/מִקְלָ֖ט מִ/גֹּאֵ֑ל וְ/לֹ֤א יָמוּת֙ הָ/רֹצֵ֔חַ
    עַד עָמְד֛/וֹ לִ/פְנֵ֥י הָ/עֵדָ֖ה לַ/מִּשְׁפָּֽט־׃
translation:
  text: The cities shall be for you as a refuge from the avenger, so that the manslayer
    may not die until he stands before the congregation for judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the blood avenger' or 'from the kinsman-avenger'; Hebrew go'el,
      a kinship term used here for the one who would avenge bloodshed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  chosen: shall be
  alternatives:
  - will be
  - are to be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal instruction functions
    futurally/prescriptively. 'Shall be' fits English legal style and preserves the
    directive force.
- source_word: הֶעָרִים
  chosen: The cities
  alternatives:
  - these cities
  - the towns
  lexicon: HALOT
  rationale: Refers back to the designated cities of refuge in the immediate context.
    'Cities' is the standard rendering for עָרִים and suits the legal-administrative
    setting.
- source_word: לְמִקְלָט
  chosen: as a refuge
  alternatives:
  - for refuge
  - for asylum
  lexicon: HALOT
  rationale: מִקְלָט denotes a place of refuge/protection. 'As a refuge' reads naturally
    with 'shall be for you' while preserving the noun's sense. 'Asylum' is possible
    but more institutionally modern.
- source_word: מִגֹּאֵל
  chosen: from the avenger
  alternatives:
  - from the redeemer-avenger
  - from the blood avenger
  - from the kinsman-avenger
  lexicon: HALOT
  rationale: גֹאֵל broadly means a kinsman-redeemer/avenger; in this legal context
    of homicide it refers specifically to the avenger who would execute blood vengeance.
    Main text uses the concise 'avenger' for readability; the more specific traditional
    sense is preserved in a footnote.
- source_word: וְלֹא יָמוּת
  chosen: so that ... may not die
  alternatives:
  - and ... shall not die
  - that ... not be put to death
  lexicon: HALOT
  rationale: The clause expresses purpose/result of the refuge provision. Rendering
    with 'so that' makes the legal function explicit in natural English. 'May not
    die' preserves the verbal form without over-specifying agency, though death would
    occur at the avenger's hand.
- source_word: הָרֹצֵחַ
  chosen: the manslayer
  alternatives:
  - the killer
  - the slayer
  - the murderer
  lexicon: HALOT
  rationale: In the cities-of-refuge legislation, רֹצֵחַ can denote one who has killed,
    including accidental homicide, not necessarily a culpable murderer. 'Manslayer'
    best preserves the legal category without prejudging guilt; 'murderer' would be
    too narrow and interpretively loaded before trial.
- source_word: עַד עָמְדוֹ
  chosen: until he stands
  alternatives:
  - until his standing
  - until he has stood
  lexicon: HALOT
  rationale: 'Infinitive construct with pronominal suffix after עַד is idiomatically
    temporal: ''until he stands/appears.'' The simple finite English clause is the
    most natural equivalent.'
- source_word: לִפְנֵי הָעֵדָה
  chosen: before the congregation
  alternatives:
  - before the assembly
  - before the community
  lexicon: HALOT
  rationale: עֵדָה is the gathered community/assembly acting in judicial capacity.
    'Congregation' preserves the formal corporate sense common in Pentateuchal legal
    contexts, though 'assembly' is also viable.
- source_word: לַמִּשְׁפָּט
  chosen: for judgment
  alternatives:
  - for trial
  - for justice
  - for legal judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט here denotes judicial decision/proceeding. 'For judgment' is
    concise and formal; 'for trial' is possible but slightly narrows the broader legal
    sense.
