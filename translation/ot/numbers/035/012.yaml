theological_decisions:
- issue: Legal status of הָרֹצֵחַ before adjudication
  chosen_reading: Render as 'manslayer' rather than 'murderer'
  alternative_readings:
  - murderer
  - killer
  rationale: The verse explicitly delays final outcome until appearance before the
    congregation for judgment. Translating with 'manslayer' preserves that the person's
    culpability has not yet been judicially determined and avoids importing a stronger
    moral verdict than the Hebrew requires.
  doctrine_reference: Translation philosophy §1, §3
- issue: Specific force of גֹאֵל in homicide law
  chosen_reading: Main text 'avenger' with footnote preserving 'blood avenger/kinsman-avenger'
  alternative_readings:
  - blood avenger
  - kinsman-avenger
  - redeemer-avenger
  rationale: The Hebrew term carries broader kinship-redemption associations, but
    in this context its homicide-law function is vengeance for bloodshed. The main
    text keeps readable English while the footnote preserves the fuller traditional/legal
    nuance.
  doctrine_reference: Translation philosophy §3, §5
