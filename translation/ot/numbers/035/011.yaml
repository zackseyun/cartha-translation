id: NUM.35.11
reference: Numbers 35:11
source:
  edition: WLC
  text: וְ/הִקְרִיתֶ֤ם לָ/כֶם֙ עָרִ֔ים עָרֵ֥י מִקְלָ֖ט תִּהְיֶ֣ינָה לָ/כֶ֑ם וְ/נָ֥ס
    שָׁ֨מָּ/ה֙ רֹצֵ֔חַ מַכֵּה נֶ֖פֶשׁ בִּ/שְׁגָגָֽה־׃
translation:
  text: then you shall designate cities for yourselves; they shall be cities of refuge
    for you, and the manslayer who strikes down a person unintentionally shall flee
    there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appoint' or 'set apart' cities for yourselves.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the manslayer who strikes down a person unintentionally'; that is,
      one guilty of unintentional homicide, not deliberate murder.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִקְרִיתֶם
  chosen: you shall designate
  alternatives:
  - you shall appoint
  - you shall set apart
  - you shall provide
  lexicon: HALOT
  rationale: Hiphil of קרה here carries the sense of causing to be selected/appointed.
    'Designate' is natural English and fits the legal-institutional context of assigning
    specific cities.
- source_word: עָרִים ... עָרֵי מִקְלָט
  chosen: cities ... cities of refuge
  alternatives:
  - towns ... refuge cities
  lexicon: HALOT
  rationale: The repetition in Hebrew is preserved for emphasis and legal clarity.
    'Cities of refuge' is the established and accurate rendering of עָרֵי מִקְלָט.
- source_word: מִקְלָט
  chosen: refuge
  alternatives:
  - asylum
  - shelter
  lexicon: HALOT
  rationale: In this legal setting the term denotes a protected place of escape. 'Refuge'
    is both precise and idiomatic in English Bible style without becoming archaic.
- source_word: וְנָס שָׁמָּה
  chosen: shall flee there
  alternatives:
  - may flee there
  - must flee there
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this legal sequence functions
    futurally. 'Shall flee there' best reflects the prescriptive/resultative force
    in context.
- source_word: רֹצֵחַ
  chosen: manslayer
  alternatives:
  - killer
  - slayer
  - murderer
  lexicon: HALOT
  rationale: Although רצח can denote killing broadly and sometimes murder, the immediate
    qualification 'unintentionally' excludes deliberate murder. 'Manslayer' is the
    best legal-English equivalent for one who has killed a human without implying
    intent.
- source_word: מַכֵּה נֶפֶשׁ
  chosen: who strikes down a person
  alternatives:
  - who kills a person
  - who strikes a life
  lexicon: HALOT
  rationale: Literally 'one striking a person/life.' 'Strikes down a person' preserves
    the verbal imagery while clearly conveying lethal effect in context.
- source_word: נֶפֶשׁ
  chosen: person
  alternatives:
  - life
  - soul
  lexicon: HALOT
  rationale: Here נֶפֶשׁ refers to a human being as the object of lethal violence,
    not specifically the immaterial soul. 'Person' is the most contextually accurate
    English rendering.
- source_word: בִּשְׁגָגָה
  chosen: unintentionally
  alternatives:
  - by mistake
  - accidentally
  - in error
  lexicon: HALOT
  rationale: The term denotes inadvertence or lack of intent. 'Unintentionally' best
    matches the legal distinction being drawn between accidental killing and deliberate
    murder.
