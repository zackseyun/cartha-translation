theological_decisions:
- issue: Legal classification of the killer
  chosen_reading: Render רֹצֵחַ as 'manslayer' rather than 'murderer' because the
    phrase is explicitly qualified by בִּשְׁגָגָה ('unintentionally').
  alternative_readings:
  - killer
  - murderer
  rationale: This avoids importing moral or judicial guilt beyond what the verse states
    and preserves the Torah's distinction between intentional murder and unintentional
    homicide.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
