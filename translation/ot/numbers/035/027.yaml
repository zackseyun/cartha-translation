id: NUM.35.27
reference: Numbers 35:27
source:
  edition: WLC
  text: וּ/מָצָ֤א אֹת/וֹ֙ גֹּאֵ֣ל הַ/דָּ֔ם מִ/ח֕וּץ לִ/גְב֖וּל עִ֣יר מִקְלָט֑/וֹ וְ/רָצַ֞ח
    גֹּאֵ֤ל הַ/דָּם֙ אֶת הָ֣/רֹצֵ֔חַ אֵ֥ין ל֖/וֹ דָּֽם־׃
translation:
  text: and the avenger of blood finds him outside the boundary of his city of refuge,
    and the avenger of blood kills the manslayer, he is not guilty of blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the blood avenger.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'he has no blood,' that is, he incurs no bloodguilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּאֵל הַדָּם
  chosen: the avenger of blood
  alternatives:
  - the blood avenger
  - the kinsman-avenger
  lexicon: HALOT
  rationale: In this legal context, the phrase denotes the person authorized to avenge
    a blood-debt. 'Avenger of blood' is the most transparent and established English
    rendering. 'Kinsman-avenger' is possible in broader uses of גאל, but kinship is
    not explicit in this verse and would add information not directly stated here.
- source_word: מִחוּץ לִגְבוּל
  chosen: outside the boundary
  alternatives:
  - outside the border
  - beyond the limits
  lexicon: HALOT
  rationale: The phrase is spatial and legal, referring to being beyond the protected
    limits of the refuge city. 'Boundary' preserves both the concrete and juridical
    sense better than the more geopolitical-sounding 'border'.
- source_word: עִיר מִקְלָטוֹ
  chosen: his city of refuge
  alternatives:
  - the city of his refuge
  - his asylum city
  lexicon: HALOT
  rationale: This is the standard legal designation in Numbers. 'City of refuge' is
    clear modern English and preserves the institutional sense of מקלט.
- source_word: וְרָצַח
  chosen: kills
  alternatives:
  - strikes down
  - murders
  lexicon: HALOT
  rationale: Although רצח can denote unlawful killing in many contexts, here the following
    clause ('he is not guilty of blood') shows the act is legally exempt from bloodguilt.
    Therefore 'murders' would mislead. 'Kills' is the most contextually accurate neutral
    rendering.
- source_word: הָרֹצֵחַ
  chosen: the manslayer
  alternatives:
  - the killer
  - the slayer
  lexicon: HALOT
  rationale: Within the refuge-city legislation, this term refers specifically to
    the one who has killed a person and fled for asylum, often an unintentional killer.
    'Manslayer' is the best legal-English equivalent and avoids implying murder in
    this immediate context.
- source_word: אֵין לוֹ דָּם
  chosen: he is not guilty of blood
  alternatives:
  - there is no bloodguilt for him
  - blood shall not be imputed to him
  lexicon: HALOT
  rationale: The idiom means the avenger incurs no bloodguilt for this killing. 'He
    is not guilty of blood' is readable modern English while preserving the Hebrew
    legal idiom's force.
