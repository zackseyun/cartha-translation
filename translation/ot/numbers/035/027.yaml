theological_decisions:
- issue: Moral/legal force of רצח in a context of permitted killing
  chosen_reading: Render the verb neutrally as 'kills' rather than 'murders.'
  alternative_readings:
  - Render as 'murders' to maintain lexical consistency with רצח elsewhere
  rationale: The verse explicitly states that the avenger bears no bloodguilt, so
    an English verb implying criminal homicide would create a contradiction not present
    in the Hebrew legal context. The legal status of the act governs the English choice
    here.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
