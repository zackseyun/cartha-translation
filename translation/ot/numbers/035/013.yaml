id: NUM.35.13
reference: Numbers 35:13
source:
  edition: WLC
  text: וְ/הֶ/עָרִ֖ים אֲשֶׁ֣ר תִּתֵּ֑נוּ שֵׁשׁ עָרֵ֥י מִקְלָ֖ט תִּהְיֶ֥ינָה לָ/כֶֽם־׃
translation:
  text: And the cities that you give shall be six cities of refuge for you.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/הֶ/עָרִים
  chosen: And the cities
  alternatives:
  - Now the cities
  - As for the cities
  lexicon: HALOT
  rationale: Definite plural noun with prefixed conjunction. Rendered with simple
    connective 'And' and definite article retained. 'Now' or 'As for' are possible
    discourse-sensitive alternatives, but the straightforward connective best fits
    the syntax.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle introducing the clause modifying 'cities.' 'That' is
    natural modern English; 'which' is more formal but unnecessary here.
- source_word: תִּתֵּנוּ
  chosen: you give
  alternatives:
  - you shall give
  - you assign
  lexicon: HALOT
  rationale: Qal imperfect 2mp of נתן. In this legal/instructional context, English
    present 'you give' works idiomatically within the relative clause, while still
    conveying the prospective sense. 'You shall give' is possible but slightly stiffer;
    'assign' is interpretive.
- source_word: שֵׁשׁ
  chosen: six
  lexicon: HALOT
  rationale: Cardinal number straightforwardly rendered 'six.'
- source_word: עָרֵי מִקְלָט
  chosen: cities of refuge
  alternatives:
  - refuge cities
  lexicon: HALOT
  rationale: Construct chain literally 'cities of refuge.' This is the standard and
    transparent English rendering for the legal institution described in the context.
- source_word: תִּהְיֶינָה
  chosen: shall be
  alternatives:
  - are to be
  - will be
  lexicon: HALOT
  rationale: Qal imperfect 3fp of היה agreeing with 'cities.' In legal instruction,
    'shall be' appropriately conveys directive/resultative force without over-paraphrase.
- source_word: לָ/כֶם
  chosen: for you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: Preposition ל with 2mp suffix. 'For you' best expresses beneficiary/reference
    sense in context; 'to you' is possible but less idiomatic in English here.
