theological_decisions:
- issue: Legal classification of רֹצֵחַ in a homicide statute
  chosen_reading: Rendered as 'murderer' rather than the broader 'killer.'
  alternative_readings:
  - killer
  - manslayer
  rationale: The immediate context distinguishes culpable homicide from accidental
    killing and assigns capital punishment. 'Murderer' best communicates the legal-moral
    judgment embedded in the verse without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §1, §5
