id: NUM.35.18
reference: Numbers 35:18
source:
  edition: WLC
  text: א֡וֹ בִּ/כְלִ֣י עֵֽץ יָד֩ אֲשֶׁר יָמ֨וּת בּ֥/וֹ הִכָּ֛ה/וּ וַ/יָּמֹ֖ת רֹצֵ֣חַֽ
    ה֑וּא מ֥וֹת יוּמַ֖ת הָ/רֹצֵֽחַ־־׃
translation:
  text: Or if he struck him with a wooden object in the hand, by which one could die,
    and he died, he is a murderer; the murderer must surely be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a wooden implement in the hand' or 'with a hand-held wooden object.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּכְלִי עֵץ
  chosen: with a wooden object
  alternatives:
  - with a wooden implement
  - with an instrument of wood
  lexicon: HALOT
  rationale: כְּלִי is a broad term for an article, vessel, implement, or weapon depending
    on context. Here, in a homicide law parallel to iron and stone instruments in
    the surrounding verses, 'object' is natural modern English while preserving the
    broadness of the Hebrew.
- source_word: יָד
  chosen: in the hand
  alternatives:
  - hand-held
  - that can be wielded by hand
  lexicon: HALOT
  rationale: The construct עֵץ יָד is idiomatic and likely denotes something hand-held
    rather than a wooden structure generally. Rendering it 'in the hand' keeps the
    Hebrew image while remaining intelligible in context.
- source_word: אֲשֶׁר יָמוּת בּוֹ
  chosen: by which one could die
  alternatives:
  - with which one may die
  - by which a person dies
  lexicon: HALOT
  rationale: The clause describes an object capable of causing death, not merely the
    outcome in this single case. 'Could die' expresses lethal capacity in idiomatic
    English.
- source_word: הִכָּהוּ
  chosen: he struck him
  alternatives:
  - he hit him
  - he struck him down
  lexicon: HALOT
  rationale: נכה commonly means 'strike' or 'smite.' 'Struck' is clear, suitably formal,
    and avoids overstating the result before the following clause states that the
    victim died.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so that he died
  lexicon: HALOT
  rationale: A straightforward sequential rendering best reflects the Hebrew narrative-consequential
    form without adding interpretive nuance.
- source_word: רֹצֵחַ
  chosen: murderer
  alternatives:
  - manslayer
  - killer
  lexicon: HALOT
  rationale: In this legal context, after specifying a lethal blow with a deadly object,
    רֹצֵחַ denotes one guilty of unlawful killing. 'Murderer' fits the judicial force
    better than the broader 'killer' or the more technical but potentially misleading
    'manslayer.'
- source_word: מוֹת יוּמַת
  chosen: must surely be put to death
  alternatives:
  - shall surely be put to death
  - must be executed
  lexicon: HALOT
  rationale: The infinitive absolute with passive/imperfect intensifies the penalty.
    'Must surely be put to death' preserves both the legal necessity and the emphatic
    force in readable modern English.
