id: NUM.35.23
reference: Numbers 35:23
source:
  edition: WLC
  text: א֣וֹ בְ/כָל אֶ֜בֶן אֲשֶׁר יָמ֥וּת בָּ/הּ֙ בְּ/לֹ֣א רְא֔וֹת וַ/יַּפֵּ֥ל עָלָ֖י/ו
    וַ/יָּמֹ֑ת וְ/הוּא֙ לֹא אוֹיֵ֣ב ל֔/וֹ וְ/לֹ֥א מְבַקֵּ֖שׁ רָעָתֽ/וֹ־־־׃
translation:
  text: or with any stone by which a man could die, without seeing, he dropped it
    on him so that he died, though he was not his enemy and was not seeking his harm—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'without seeing.' The phrase indicates lack of awareness rather
      than necessarily denying all physical sight.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Continues the preceding casuistic alternatives; simple disjunctive 'or'
    best fits the legal sequence.
- source_word: בְּכָל אֶבֶן
  chosen: with any stone
  alternatives:
  - with any kind of stone
  - by any stone
  lexicon: HALOT
  rationale: The preposition ב plus instrument in this legal context is naturally
    instrumental, 'with.' 'Any stone' preserves כָל's broad scope without awkwardness.
- source_word: אֲשֶׁר יָמוּת בָּהּ
  chosen: by which a man could die
  alternatives:
  - with which one may die
  - by which he might die
  lexicon: HALOT
  rationale: The clause identifies a stone capable of causing death. English idiom
    prefers an impersonal/generic expression. Supplying 'a man' reflects the generic
    force of the 3ms verb in legal style and follows the project's gender-accurate
    policy rather than flattening to a vague paraphrase.
- source_word: בְּלֹא רְאוֹת
  chosen: without seeing
  alternatives:
  - without noticing
  - unintentionally
  lexicon: HALOT
  rationale: Literally 'without seeing.' This preserves the concrete Hebrew expression
    and leaves the inference of inadvertence to the reader, rather than importing
    the more interpretive 'unintentionally' into the main text.
- source_word: וַיִּפֵּל עָלָיו
  chosen: he dropped it on him
  alternatives:
  - it fell on him
  - he caused it to fall on him
  lexicon: HALOT
  rationale: The Hiphil of נפל is causative, so the subject causes the stone to fall.
    'He dropped it on him' is natural modern English and preserves agency better than
    the intransitive 'it fell on him.'
- source_word: וַיָּמֹת
  chosen: so that he died
  alternatives:
  - and he died
  lexicon: HALOT
  rationale: The resultative sense is clear in English after the causative action;
    'so that he died' makes the legal consequence explicit without adding content.
- source_word: וְהוּא לֹא אֹיֵב לוֹ
  chosen: though he was not his enemy
  alternatives:
  - and he was not his enemy
  lexicon: HALOT
  rationale: The clause is concessive/explanatory in context, clarifying that the
    death was not motivated by hostility. 'Though' brings out that force in readable
    English.
- source_word: וְלֹא מְבַקֵּשׁ רָעָתוֹ
  chosen: and was not seeking his harm
  alternatives:
  - and was not seeking to harm him
  - and was not seeking his injury
  - and was not seeking evil against him
  lexicon: HALOT
  rationale: רָעָה here denotes harm/injury in interpersonal legal context rather
    than abstract moral evil. 'Seeking his harm' is concise and preserves the idiom
    of intent.
