id: NUM.35.17
reference: Numbers 35:17
source:
  edition: WLC
  text: וְ/אִ֡ם בְּ/אֶ֣בֶן יָד֩ אֲשֶׁר יָמ֨וּת בָּ֥/הּ הִכָּ֛ה/וּ וַ/יָּמֹ֖ת רֹצֵ֣חַֽ
    ה֑וּא מ֥וֹת יוּמַ֖ת הָ/רֹצֵֽחַ־׃
translation:
  text: Or if he struck him with a stone in the hand, by which one could die, and
    he died, he is a murderer; the murderer must surely be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'with a stone of hand,' that is, a stone held in the hand
      or suitable for use by hand as a weapon.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: Or if
  alternatives:
  - And if
  - But if
  lexicon: HALOT
  rationale: Introduces an additional case in a legal sequence. 'Or if' fits the casuistic
    flow in English better than a simple 'and if' while preserving the disjunctive
    force.
- source_word: בְּאֶבֶן יָד
  chosen: with a stone in the hand
  alternatives:
  - with a hand stone
  - with a stone held in the hand
  lexicon: HALOT
  rationale: The Hebrew phrase is literally 'with a stone of hand/hand-stone.' It
    refers to a hand-held stone, likely a stone of a size usable as a weapon. 'With
    a stone in the hand' preserves the concrete imagery without over-interpreting
    the exact technical sense.
- source_word: אֲשֶׁר יָמוּת בָּהּ
  chosen: by which one could die
  alternatives:
  - with which a person may die
  - by which he may die
  lexicon: HALOT
  rationale: The clause describes the stone as lethal in capacity. 'By which one could
    die' communicates potential lethality in idiomatic English and avoids implying
    only the specific victim is in view.
- source_word: הִכָּהוּ
  chosen: he struck him
  alternatives:
  - he hit him
  - he struck him down
  lexicon: HALOT
  rationale: נכה commonly means 'strike/smite.' 'Struck' is natural modern English
    and does not overstate the result, since the death is stated separately in the
    next clause.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so that he died
  - and the victim died
  lexicon: HALOT
  rationale: A straightforward narrative consequence. 'And he died' preserves the
    Hebrew sequence without adding interpretive material.
- source_word: רֹצֵחַ הוּא
  chosen: he is a murderer
  alternatives:
  - he is a manslayer
  - he is a killer
  lexicon: HALOT
  rationale: In this legal context רצח identifies culpable homicide, not merely killing
    in general. 'Murderer' best captures the judicial force in English.
- source_word: מוֹת יוּמַת
  chosen: must surely be put to death
  alternatives:
  - shall surely be put to death
  - must be executed
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the penalty. 'Must
    surely be put to death' preserves both the legal solemnity and the emphatic force.
- source_word: הָרֹצֵחַ
  chosen: the murderer
  alternatives:
  - that murderer
  - the manslayer
  lexicon: HALOT
  rationale: The final noun restates the legal subject for emphasis. 'The murderer'
    maintains the formal judicial repetition present in Hebrew.
