theological_decisions:
- issue: Legal classification of the killer in the cities-of-refuge legislation
  chosen_reading: Render רצח as 'murderer' rather than a more neutral 'killer' or
    'manslayer.'
  alternative_readings:
  - killer
  - manslayer
  rationale: The verse distinguishes intentional, culpable homicide from accidental
    killing in the surrounding context. 'Murderer' best reflects the legal and moral
    judgment embedded in the passage without importing later doctrinal claims.
  doctrine_reference: Translation philosophy §1, §5
