id: NUM.35.2
reference: Numbers 35:2
source:
  edition: WLC
  text: צַו֮ אֶת בְּנֵ֣י יִשְׂרָאֵל֒ וְ/נָתְנ֣וּ לַ/לְוִיִּ֗ם מִֽ/נַּחֲלַ֛ת אֲחֻזָּתָ֖/ם
    עָרִ֣ים לָ/שָׁ֑בֶת וּ/מִגְרָ֗שׁ לֶֽ/עָרִים֙ סְבִיבֹ֣תֵי/הֶ֔ם תִּתְּנ֖וּ לַ/לְוִיִּֽם־׃
translation:
  text: Command the sons of Israel that they give to the Levites, from the inheritance
    of their possession, cities to live in; and you shall give to the Levites pasturelands
    around those cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' / traditional 'the children of Israel.' The Hebrew is
      literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''Pasturelands'' translates a term for the open land surrounding a city,
      used especially for grazing and related communal use.'
    reason: cultural_note
lexical_decisions:
- source_word: צַו
  chosen: Command
  alternatives:
  - Order
  - Instruct
  lexicon: HALOT
  rationale: Imperative to Moses; 'Command' preserves the force of the Hebrew imperative
    without sounding overly harsh or overly weak.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with gender-accurate policy, the
    masculine form is preserved where it refers to the covenant people corporately.
    'Israelites' is possible but less transparent to the source wording.
- source_word: וְנָתְנוּ
  chosen: that they give
  alternatives:
  - and let them give
  - that they shall give
  lexicon: HALOT
  rationale: Following the command, the waw + perfect functions with injunctive force.
    'That they give' is natural modern English and reflects the commanded result.
- source_word: לַלְוִיִּם
  chosen: to the Levites
  lexicon: HALOT
  rationale: Straightforward dative of recipient.
- source_word: מִנַּחֲלַת אֲחֻזָּתָם
  chosen: from the inheritance of their possession
  alternatives:
  - from their inherited property
  - from their hereditary possession
  lexicon: HALOT
  rationale: The phrase combines נַחֲלָה ('inheritance') and אֲחֻזָּה ('possession/property
    holding'). The chosen rendering preserves both terms distinctly, though somewhat
    formally, because both are legally significant in the land-allotment context.
- source_word: עָרִים לָשָׁבֶת
  chosen: cities to live in
  alternatives:
  - cities to dwell in
  - towns to inhabit
  lexicon: HALOT
  rationale: Infinitive expresses purpose. 'Live in' is idiomatic modern English;
    'dwell' is more formal but less natural.
- source_word: מִגְרָשׁ
  chosen: pasturelands
  alternatives:
  - common land
  - open land
  lexicon: HALOT
  rationale: In this context the term denotes the open land belonging to a city, especially
    for grazing/use around it. 'Pasturelands' best captures the practical sense in
    Numbers 35.
- source_word: לֶעָרִים סְבִיבֹתֵיהֶם
  chosen: around those cities
  alternatives:
  - for the cities around them
  - around their cities
  lexicon: HALOT
  rationale: The phrase specifies the surrounding area belonging to the cities. 'Around
    those cities' makes the referent clear in English.
- source_word: תִּתְּנוּ
  chosen: you shall give
  alternatives:
  - they shall give
  - you are to give
  lexicon: HALOT
  rationale: Second masculine plural is distinct from the earlier third plural verb
    and is retained. The shift likely addresses Israel collectively after the initial
    indirect command. 'You shall give' preserves that shift.
