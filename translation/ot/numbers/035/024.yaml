theological_decisions:
- issue: Legal role of the community in homicide adjudication
  chosen_reading: The verse assigns the congregation a judicial function between the
    killer and the blood avenger, without importing later doctrinal or institutional
    categories.
  alternative_readings:
  - Treating 'congregation' as a narrower court body
  - Rendering the striker as already proven 'murderer'
  rationale: The Hebrew presents a communal judicial process and does not yet declare
    the accused guilty of murder in this verse. The translation preserves procedural
    neutrality.
  doctrine_reference: Translation philosophy §§1, 3, 5
