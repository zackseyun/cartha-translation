id: NUM.35.24
reference: Numbers 35:24
source:
  edition: WLC
  text: וְ/שָֽׁפְטוּ֙ הָֽ/עֵדָ֔ה בֵּ֚ין הַ/מַּכֶּ֔ה וּ/בֵ֖ין גֹּאֵ֣ל הַ/דָּ֑ם עַ֥ל
    הַ/מִּשְׁפָּטִ֖ים הָ/אֵֽלֶּה׃
translation:
  text: then the congregation shall judge between the one who struck him and the avenger
    of blood, according to these ordinances.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the blood avenger.' The Hebrew phrase denotes the person charged with
      avenging a relative's blood.
    reason: lexical_alternative
  - marker: b
    text: Or 'these judgments.' The Hebrew term can refer to legal rulings or ordinances.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁפְטוּ
  chosen: then ... shall judge
  alternatives:
  - and ... shall judge
  - and ... must judge
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal narrative often carries
    a future/result sense in English. 'Then ... shall judge' fits the procedural sequence
    of the law better than a simple past, while preserving the judicial force of שׁפט.
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the assembly
  - the community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled community of Israel. 'Congregation'
    preserves the formal, corporate-judicial sense in Pentateuchal legal contexts
    better than the broader 'community.'
- source_word: בֵּין ... וּבֵין
  chosen: between ... and
  alternatives:
  - between ... and between
  lexicon: HALOT
  rationale: Standard English smooths the repeated preposition into 'between ... and'
    without loss of meaning.
- source_word: הַמַּכֶּה
  chosen: the one who struck him
  alternatives:
  - the striker
  - the manslayer
  - the one who struck
  lexicon: HALOT
  rationale: From נכה, literally 'the one striking/the striker.' In context this is
    the person who caused the death, but 'manslayer' would import an interpretive/legal
    category more specific than the participle itself. 'The one who struck him' stays
    close to the Hebrew and clarifies the implied object from the surrounding context.
- source_word: גֹּאֵל הַדָּם
  chosen: the avenger of blood
  alternatives:
  - the blood avenger
  - the kinsman-avenger of blood
  lexicon: HALOT
  rationale: 'This is the established legal role in the passage: the person responsible
    to avenge a relative''s blood. ''Avenger of blood'' is clear modern English and
    preserves the idiom. ''Kinsman-avenger'' is possible but the kinship element is
    not explicit in this verse itself.'
- source_word: עַל
  chosen: according to
  alternatives:
  - on the basis of
  - concerning
  - by
  lexicon: HALOT
  rationale: In this legal setting עַל with מִשְׁפָּטִים indicates judgment in accordance
    with the stated legal standards. 'According to' communicates the normative sense
    most naturally.
- source_word: הַמִּשְׁפָּטִים הָאֵלֶּה
  chosen: these ordinances
  alternatives:
  - these judgments
  - these rules
  - these legal decisions
  lexicon: HALOT
  rationale: מִשְׁפָּטִים in Torah legal material can mean legal ordinances or judicial
    rules. 'Ordinances' preserves the formal legal register without sounding overly
    technical. 'Judgments' is possible but in English may suggest verdicts rather
    than governing statutes.
