id: NUM.35.32
reference: Numbers 35:32
source:
  edition: WLC
  text: וְ/לֹא תִקְח֣וּ כֹ֔פֶר לָ/נ֖וּס אֶל עִ֣יר מִקְלָט֑/וֹ לָ/שׁוּב֙ לָ/שֶׁ֣בֶת
    בָּ/אָ֔רֶץ עַד מ֖וֹת הַ/כֹּהֵֽן־־־׃
translation:
  text: And you shall not take a ransom for him to flee to his city of refuge, to
    return to live in the land before the death of the priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'compensation' or 'payment'; Hebrew כֹּפֶר refers to a ransom-price or
      compensatory payment.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew syntax is compact and may also be understood as forbidding payment
      connected with his remaining in or returning from the city of refuge before
      the priest dies.
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּפֶר
  chosen: ransom
  alternatives:
  - compensation
  - payment
  - bribe
  lexicon: HALOT
  rationale: כֹּפֶר denotes a compensatory payment or ransom price. In this legal
    context, 'ransom' best captures a payment accepted in place of the required legal
    consequence. 'Bribe' is too pejorative and interpretive; 'compensation' is broader
    and less precise.
- source_word: לָנוּס
  chosen: for him to flee
  alternatives:
  - for fleeing
  - to escape
  lexicon: HALOT
  rationale: The infinitive of נוּס means 'to flee.' Rendering with an explicit subject
    ('for him to flee') makes clear that the payment would enable the manslayer's
    flight to refuge. 'Escape' is possible but less concrete than the legal movement
    to a refuge city.
- source_word: עִיר מִקְלָטוֹ
  chosen: his city of refuge
  alternatives:
  - the city of his refuge
  - his refuge city
  lexicon: HALOT
  rationale: This is the standard legal expression for the designated asylum city.
    'His city of refuge' is natural English while preserving the possessive suffix.
- source_word: לָשׁוּב לָשֶׁבֶת בָּאָרֶץ
  chosen: to return to live in the land
  alternatives:
  - to return to dwell in the land
  - to go back and live in the land
  lexicon: HALOT
  rationale: The paired infinitives express returning and residing again in the land.
    'Live' is a readable modern equivalent of 'dwell' without loss of meaning.
- source_word: עַד מוֹת הַכֹּהֵן
  chosen: before the death of the priest
  alternatives:
  - until the death of the priest
  lexicon: HALOT
  rationale: In this prohibition, the sense is that no payment may secure early return
    prior to the priest's death. English 'before the death of the priest' makes that
    temporal restriction explicit. 'Until' is possible, but here it can sound as though
    return is permitted up to that point rather than only after it.
