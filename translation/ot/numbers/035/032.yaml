theological_decisions:
- issue: Legal force of the prohibition concerning the manslayer's return from the
    city of refuge
  chosen_reading: The verse forbids accepting any payment that would allow the manslayer
    to secure refuge or to return early to reside in the land before the priest's
    death.
  alternative_readings:
  - The payment is specifically a ransom to excuse flight to the refuge city rather
    than to permit early return.
  rationale: The syntax is compressed and can be read as prohibiting ransom connected
    with the manslayer's legal status in relation to the refuge city and return to
    the land. The chosen rendering preserves the legal prohibition without importing
    a narrower doctrinal interpretation beyond the Hebrew wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
