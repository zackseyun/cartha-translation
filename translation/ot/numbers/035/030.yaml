id: NUM.35.30
reference: Numbers 35:30
source:
  edition: WLC
  text: כָּל מַ֨כֵּה נֶ֔פֶשׁ לְ/פִ֣י עֵדִ֔ים יִרְצַ֖ח אֶת הָ/רֹצֵ֑חַ וְ/עֵ֣ד אֶחָ֔ד
    לֹא יַעֲנֶ֥ה בְ/נֶ֖פֶשׁ לָ/מֽוּת־־־־׃
translation:
  text: Whoever strikes down a person, the murderer shall be put to death on the testimony
    of witnesses; but one witness shall not testify against a person so that he dies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'by the mouth of witnesses.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew uses the same root for 'murderer' and the verb of putting him to
      death; the English avoids suggesting unlawful killing by the court.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַכֵּה נֶפֶשׁ
  chosen: strikes down a person
  alternatives:
  - kills a person
  - slays a soul/person
  lexicon: HALOT
  rationale: The participial phrase literally denotes one who strikes a nephesh. In
    this legal context, nephesh refers to a human life/person, not 'soul' in a narrow
    anthropological sense. 'Strikes down' preserves the violent act without over-paraphrasing,
    while the following clause clarifies that the case concerns a murderer.
- source_word: נֶפֶשׁ
  chosen: person
  alternatives:
  - life
  - soul
  lexicon: HALOT
  rationale: In both occurrences the term refers to a human being/life in a judicial
    setting. 'Person' is the clearest modern English equivalent here and avoids misleading
    readers into hearing a body-soul distinction not intended by the Hebrew.
- source_word: לְפִי עֵדִים
  chosen: on the testimony of witnesses
  alternatives:
  - by the mouth of witnesses
  - according to witnesses
  lexicon: HALOT
  rationale: The idiom 'by the mouth of' means on the basis of testimony. 'On the
    testimony of witnesses' renders the legal force naturally in English while preserving
    the evidentiary sense.
- source_word: יִרְצַח אֶת הָרֹצֵחַ
  chosen: the murderer shall be put to death
  alternatives:
  - they shall kill the murderer
  - the murderer shall be executed
  lexicon: HALOT
  rationale: The Hebrew uses the same רצח root for the judicial action and the murderer.
    In English, 'murder' normally denotes unlawful killing, so a literal 'shall murder
    the murderer' would be misleading. 'Shall be put to death' communicates the legal
    penalty accurately.
- source_word: הָרֹצֵחַ
  chosen: the murderer
  alternatives:
  - the manslayer
  - the killer
  lexicon: HALOT
  rationale: Within this context the verse distinguishes the culpable killer subject
    to capital punishment, so 'murderer' is more precise than the broader 'killer'
    or the less clear 'manslayer'.
- source_word: וְעֵד אֶחָד
  chosen: but one witness
  alternatives:
  - and one witness
  - a single witness
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively in context because the clause
    contrasts sufficient testimony with insufficient testimony. 'One witness' is straightforward
    and legal in tone.
- source_word: לֹא יַעֲנֶה
  chosen: shall not testify
  alternatives:
  - shall not answer
  - shall not bear witness
  lexicon: HALOT
  rationale: ענה in legal contexts can mean to answer or testify. Here the witness
    is giving evidence in a capital case, so 'testify' best captures the judicial
    sense.
- source_word: בְנֶפֶשׁ לָמוּת
  chosen: against a person so that he dies
  alternatives:
  - against a life for death
  - in a capital case to cause death
  lexicon: HALOT
  rationale: The phrase is compressed Hebrew legal language. It indicates testimony
    against a person with the result/aim of a death sentence. 'Against a person so
    that he dies' preserves the personal object and the capital consequence in natural
    English.
