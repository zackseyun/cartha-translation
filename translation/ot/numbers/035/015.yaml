id: NUM.35.15
reference: Numbers 35:15
source:
  edition: WLC
  text: לִ/בְנֵ֣י יִשְׂרָאֵ֗ל וְ/לַ/גֵּ֤ר וְ/לַ/תּוֹשָׁב֙ בְּ/תוֹכָ֔/ם תִּהְיֶ֛ינָה
    שֵׁשׁ הֶ/עָרִ֥ים הָ/אֵ֖לֶּה לְ/מִקְלָ֑ט לָ/נ֣וּס שָׁ֔מָּ/ה כָּל מַכֵּה נֶ֖פֶשׁ
    בִּ/שְׁגָגָֽה־־־׃
translation:
  text: These six cities shall be for refuge for the sons of Israel, and for the sojourner
    and for the resident among them, so that anyone who kills a person unintentionally
    may flee there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''Sojourner'' and ''resident'' render two distinct Hebrew terms (גֵּר and
      תּוֹשָׁב) for non-native persons living within Israelite society.'
    reason: cultural_note
  - marker: c
    text: Or 'any manslayer' for 'anyone who kills a person.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: for the sons of Israel
  alternatives:
  - for the Israelites
  - for the children of Israel
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל is the standard ethnic-covenantal designation. 'Sons
    of Israel' preserves the literal form and the source's gendered wording; 'Israelites'
    is smoother but less transparent.
- source_word: גֵּר
  chosen: sojourner
  alternatives:
  - stranger
  - foreigner
  - resident alien
  lexicon: HALOT
  rationale: גֵּר denotes a non-native person residing among Israel under its protection.
    'Sojourner' preserves the covenantal-legal nuance without sounding overly technical;
    'resident alien' is precise but bureaucratic.
- source_word: תּוֹשָׁב
  chosen: resident
  alternatives:
  - temporary resident
  - settler
  lexicon: HALOT
  rationale: תּוֹשָׁב refers to one dwelling in the land/community without full native
    status. 'Resident' is concise and readable; the distinction from גֵּר is retained
    by using a different English term.
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  lexicon: HALOT
  rationale: The phrase indicates presence within the Israelite community. 'Among
    them' is natural modern English while preserving the relational sense.
- source_word: תִּהְיֶינָה שֵׁשׁ הֶעָרִים הָאֵלֶּה
  chosen: These six cities shall be
  alternatives:
  - these six cities will be
  lexicon: HALOT
  rationale: This clause states the legal designation of the cities. 'Shall be' fits
    the legislative register slightly better than 'will be'.
- source_word: לְמִקְלָט
  chosen: for refuge
  alternatives:
  - as a refuge
  - for asylum
  lexicon: HALOT
  rationale: מִקְלָט in this context is a place of refuge, specifically a city of
    refuge. 'For refuge' follows the Hebrew prepositional construction and remains
    idiomatic.
- source_word: לָנוּס שָׁמָּה
  chosen: may flee there
  alternatives:
  - to flee there
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose: the cities exist so that the manslayer
    can flee there. Rendering with ''may flee there'' makes the purpose relation explicit
    in natural English.'
- source_word: כָּל מַכֵּה נֶפֶשׁ
  chosen: anyone who kills a person
  alternatives:
  - whoever strikes down a person
  - any manslayer
  lexicon: HALOT
  rationale: Literally 'everyone striking a life/person.' In context this refers to
    causing a human death. 'Anyone who kills a person' is clear modern English; 'manslayer'
    is traditional but less transparent.
- source_word: נֶפֶשׁ
  chosen: person
  alternatives:
  - life
  - soul
  lexicon: HALOT
  rationale: Here נֶפֶשׁ refers to a human being as the victim of homicide, not to
    the abstract concept of soul. 'Person' best fits the legal context.
- source_word: בִּשְׁגָגָה
  chosen: unintentionally
  alternatives:
  - by mistake
  - accidentally
  - in error
  lexicon: HALOT
  rationale: The term denotes inadvertence or lack of intent. 'Unintentionally' best
    matches the legal distinction at stake in the cities-of-refuge legislation.
