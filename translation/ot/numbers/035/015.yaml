theological_decisions:
- issue: Gendered covenantal designation in בְּנֵי יִשְׂרָאֵל
  chosen_reading: Retain 'sons of Israel' in the main text
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: Following the project's gender-accurate principle, the translation preserves
    the masculine plural form where it functions as the standard national designation,
    rather than flattening it to a neutral ethnonym in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
