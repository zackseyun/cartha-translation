id: NUM.35.14
reference: Numbers 35:14
source:
  edition: WLC
  text: אֵ֣ת שְׁלֹ֣שׁ הֶ/עָרִ֗ים תִּתְּנוּ֙ מֵ/עֵ֣בֶר לַ/יַּרְדֵּ֔ן וְ/אֵת֙ שְׁלֹ֣שׁ
    הֶֽ/עָרִ֔ים תִּתְּנ֖וּ בְּ/אֶ֣רֶץ כְּנָ֑עַן עָרֵ֥י מִקְלָ֖ט תִּהְיֶֽינָה׀׃
translation:
  text: You shall appoint three of the cities beyond the Jordan, and three of the
    cities in the land of Canaan; they shall be cities of refuge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you shall give'; the Hebrew verb is literally 'give,' here in the sense
      of assigning or designating the cities for this purpose.
    reason: lexical_alternative
  - marker: b
    text: Or 'across the Jordan' or 'on the other side of the Jordan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְּנוּ / תִּתְּנ֖וּ
  chosen: you shall appoint
  alternatives:
  - you shall give
  - you shall designate
  lexicon: HALOT
  rationale: The verb נתן is literally 'give,' but in this legal-administrative context
    it refers to assigning or setting apart cities for a specific function. 'Appoint'
    communicates the plain sense in natural English without over-paraphrasing; 'designate'
    is possible but slightly more technical.
- source_word: מֵעֵבֶר לַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - on the other side of the Jordan
  - across the Jordan
  lexicon: HALOT
  rationale: The phrase literally means 'from/across the side of the Jordan.' 'Beyond
    the Jordan' is a standard and concise geographical rendering that preserves the
    relational sense without forcing a viewpoint more explicitly than the Hebrew does.
- source_word: בְּאֶרֶץ כְּנָעַן
  chosen: in the land of Canaan
  alternatives:
  - in Canaan
  lexicon: HALOT
  rationale: The construct explicitly includes 'land,' so 'in the land of Canaan'
    preserves the full Hebrew expression and its territorial emphasis.
- source_word: עָרֵי מִקְלָט
  chosen: cities of refuge
  alternatives:
  - refuge cities
  - asylum cities
  lexicon: HALOT
  rationale: This is the established and accurate rendering of the legal term for
    designated places of protection for one who kills unintentionally. 'Cities of
    refuge' is both clear and faithful; 'asylum cities' is understandable but imports
    modern political associations.
- source_word: אֵת שְׁלֹשׁ הֶעָרִים ... וְאֵת שְׁלֹשׁ הֶעָרִים
  chosen: three of the cities ... and three of the cities
  alternatives:
  - three cities ... and three cities
  lexicon: HALOT
  rationale: The direct-object marker with the definite noun 'the cities' suggests
    specific cities from the larger set already under discussion. Rendering 'three
    of the cities' reflects that definiteness better than the more generic 'three
    cities.'
- source_word: תִּהְיֶינָה
  chosen: they shall be
  alternatives:
  - they are to be
  lexicon: HALOT
  rationale: The imperfect of היה here states the resulting status/purpose of the
    six appointed cities. 'They shall be' is a straightforward future/legal rendering
    in English.
