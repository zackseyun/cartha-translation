id: NUM.35.22
reference: Numbers 35:22
source:
  edition: WLC
  text: וְ/אִם בְּ/פֶ֥תַע בְּ/לֹא אֵיבָ֖ה הֲדָפ֑/וֹ אוֹ הִשְׁלִ֥יךְ עָלָ֛י/ו כָּל
    כְּלִ֖י בְּ/לֹ֥א צְדִיָּֽה־־־־׃
translation:
  text: But if he pushed him suddenly, without hostility, or threw any object at him
    without lying in wait,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without enmity.' The Hebrew term denotes personal hostility or animosity.
    reason: lexical_alternative
  - marker: b
    text: Or 'without ambush' or 'without premeditation.' Literally, 'without lying
      in wait.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: HALOT
  rationale: Introduces a contrasting conditional case to the previous verses. 'But
    if' captures the adversative force in context better than a simple 'and if.'
- source_word: בְּפֶתַע
  chosen: suddenly
  alternatives:
  - unexpectedly
  - all at once
  lexicon: HALOT
  rationale: The noun with preposition denotes suddenness or an abrupt occurrence.
    'Suddenly' is idiomatic and concise in English.
- source_word: בְּלֹא אֵיבָה
  chosen: without hostility
  alternatives:
  - without enmity
  - without hatred
  lexicon: HALOT
  rationale: אֵיבָה denotes enmity/hostility between persons. 'Without hostility'
    is natural modern English while preserving the interpersonal sense; 'enmity' is
    possible but less accessible.
- source_word: הֲדָפוֹ
  chosen: pushed him
  alternatives:
  - thrust him
  - jostled him
  lexicon: HALOT
  rationale: The verb refers to pushing or thrusting someone. 'Pushed him' is the
    clearest modern rendering and fits the accidental-homicide legal context.
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Standard disjunctive conjunction introducing an alternative scenario.
- source_word: הִשְׁלִיךְ עָלָיו
  chosen: threw ... at him
  alternatives:
  - cast ... upon him
  - hurled ... at him
  lexicon: HALOT
  rationale: The verb means to throw/cast, and with עַל plus pronominal suffix here
    indicates the object was thrown toward or onto the person. 'At him' is idiomatic
    in English for this legal scenario.
- source_word: כָּל כְּלִי
  chosen: any object
  alternatives:
  - any article
  - any implement
  - any vessel
  lexicon: HALOT
  rationale: Literally 'any כלי,' a broad term for an item, implement, or object.
    'Any object' best fits the generality intended in the law and avoids overly narrow
    senses like 'vessel.'
- source_word: בְּלֹא צְדִיָּה
  chosen: without lying in wait
  alternatives:
  - without premeditation
  - without ambush
  lexicon: HALOT
  rationale: צְדִיָּה denotes lying in wait or ambush. 'Without lying in wait' preserves
    the concrete legal imagery and avoids importing the broader modern legal category
    'premeditation,' though that is conceptually related.
