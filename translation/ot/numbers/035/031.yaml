theological_decisions:
- issue: Legal force of the capital sentence
  chosen_reading: The verse states a binding judicial requirement that a murderer
    liable to death may not have the sentence commuted by payment.
  alternative_readings:
  - The verse merely describes customary practice without strong prescriptive force.
  rationale: The prohibition לֹא תִקְחוּ plus the emphatic מוֹת יוּמָת indicates a
    firm legal command, not a loose description. The translation therefore preserves
    the mandatory force with 'shall not' and 'must surely be put to death.'
