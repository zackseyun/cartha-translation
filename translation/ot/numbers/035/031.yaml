id: NUM.35.31
reference: Numbers 35:31
source:
  edition: WLC
  text: וְ/לֹֽא תִקְח֥וּ כֹ֨פֶר֙ לְ/נֶ֣פֶשׁ רֹצֵ֔חַ אֲשֶׁר ה֥וּא רָשָׁ֖ע לָ/מ֑וּת
    כִּי מ֖וֹת יוּמָֽת־־־׃
translation:
  text: You shall not accept a ransom for the life of a murderer who is guilty of
    death, for he must surely be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'accept compensation' or 'accept a redemption payment.' The Hebrew כֹּפֶר
      refers to a payment intended to avert penalty or secure release.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for the life/person of a murderer.' The sense is that no payment
      may be accepted to spare the murderer's life.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'for he shall surely be put to death,' an emphatic Hebrew construction.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִקְחוּ
  chosen: accept
  alternatives:
  - take
  - receive
  lexicon: HALOT
  rationale: Although the verb literally means 'take,' in legal context with כֹּפֶר
    it idiomatically means to accept or receive payment. 'Accept' is natural modern
    English for receiving a compensatory payment.
- source_word: כֹּפֶר
  chosen: ransom
  alternatives:
  - compensation
  - bribe
  - redemption payment
  lexicon: HALOT
  rationale: כֹּפֶר denotes a payment made to avert penalty or secure release. 'Ransom'
    best captures the legal-redemptive sense here without reducing it to a mere bribe;
    the verse forbids commuting the death penalty by payment.
- source_word: לְנֶפֶשׁ רֹצֵחַ
  chosen: for the life of a murderer
  alternatives:
  - for a murderer
  - on behalf of a murderer
  lexicon: HALOT
  rationale: נֶפֶשׁ here is best understood in the sense of 'life' or 'person.' In
    context, the payment concerns sparing the murderer's life. 'For the life of a
    murderer' makes the legal sense explicit while staying close to the Hebrew construction.
- source_word: רֹצֵחַ
  chosen: murderer
  alternatives:
  - manslayer
  - killer
  lexicon: HALOT
  rationale: In Numbers 35 the chapter distinguishes accidental killing from culpable
    homicide. Here the following clause marks the person as liable to death, so 'murderer'
    is more precise than the broader 'killer' or 'manslayer'.
- source_word: רָשָׁע לָמוּת
  chosen: guilty of death
  alternatives:
  - wicked to die
  - condemned to die
  - deserving to die
  lexicon: HALOT
  rationale: Literally, 'wicked/guilty to die.' In judicial context this indicates
    legal liability to capital punishment. 'Guilty of death' is concise, idiomatic,
    and preserves the forensic force.
- source_word: כִּי מוֹת יוּמָת
  chosen: for he must surely be put to death
  alternatives:
  - for he shall surely be put to death
  - for he must be put to death
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies certainty/obligation.
    'Must surely be put to death' preserves both the passive causative sense and the
    emphatic force in readable English.
