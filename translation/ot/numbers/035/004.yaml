id: NUM.35.4
reference: Numbers 35:4
source:
  edition: WLC
  text: וּ/מִגְרְשֵׁי֙ הֶֽ/עָרִ֔ים אֲשֶׁ֥ר תִּתְּנ֖וּ לַ/לְוִיִּ֑ם מִ/קִּ֤יר הָ/עִיר֙
    וָ/ח֔וּצָ/ה אֶ֥לֶף אַמָּ֖ה סָבִֽיב׃
translation:
  text: And the pasture lands of the cities that you give to the Levites shall extend
    from the wall of the city outward a thousand cubits all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'common lands' or 'open land' for the land surrounding the cities.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the wall of the city'; some understand this more generally
      as 'from the city boundary.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִגְרְשֵׁי
  chosen: pasture lands
  alternatives:
  - common lands
  - open land
  - pastureland
  lexicon: HALOT
  rationale: מִגְרָשׁ in this context refers to the open land surrounding a settlement,
    especially land set apart for use with the Levitical cities. 'Pasture lands' best
    captures the practical function in Numbers 35 while remaining natural English.
    'Common lands' is possible but less transparent to modern readers.
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: עִיר commonly means 'city' or 'town.' 'Cities' is retained for consistency
    with the surrounding passage concerning Levitical cities.
- source_word: אֲשֶׁר תִּתְּנוּ
  chosen: that you give
  alternatives:
  - which you shall give
  - that you are to give
  lexicon: HALOT
  rationale: The relative clause with נתן is straightforward. 'That you give' is clear
    modern English and preserves the future/instructional force in context.
- source_word: לַלְוִיִּם
  chosen: to the Levites
  lexicon: HALOT
  rationale: Directly identifies the recipients of the cities and their surrounding
    lands.
- source_word: מִקִּיר הָעִיר
  chosen: from the wall of the city
  alternatives:
  - from the city wall
  - from the side of the city
  lexicon: HALOT
  rationale: קִיר ordinarily means 'wall.' In this verse the measurement begins at
    the city's wall or boundary. 'From the wall of the city' is slightly more formal
    and mirrors the Hebrew construction. Some take it more generally as the city's
    edge, but 'wall' is the plain lexical sense.
- source_word: וָחוּצָה
  chosen: outward
  alternatives:
  - and outward
  - outside
  lexicon: HALOT
  rationale: The form indicates direction toward the outside. 'Outward' communicates
    the directional sense idiomatically in English without overtranslating the conjunction.
- source_word: אֶלֶף אַמָּה
  chosen: a thousand cubits
  alternatives:
  - one thousand cubits
  lexicon: HALOT
  rationale: The Hebrew gives a specific linear measurement. 'A thousand cubits' is
    standard and readable; the ancient unit is preserved rather than converted.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - on every side
  lexicon: HALOT
  rationale: סָבִיב marks the surrounding perimeter. 'All around' clearly conveys
    the distributive sense of the measurement encircling the city.
