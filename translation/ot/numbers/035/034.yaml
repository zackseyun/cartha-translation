theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file explicitly sets 'the LORD' as the default for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered expression בני ישראל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The translation philosophy prefers gender-accurate renderings over gender-neutral
    ones when the source is grammatically masculine. Here the literal phrase is preserved
    in the main text, while a more idiomatic alternative is preserved in a footnote
    for readability.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
