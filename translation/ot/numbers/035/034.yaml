  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gendered expression בני ישראל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The translation philosophy prefers gender-accurate renderings over gender-neutral ones when the source is grammatically masculine. Here the literal phrase is preserved in the main text, while a more idiomatic alternative is preserved in a footnote for readability.
