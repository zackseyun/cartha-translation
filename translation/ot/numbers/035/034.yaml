id: NUM.35.34
reference: Numbers 35:34
source:
  edition: WLC
  text: וְ/לֹ֧א תְטַמֵּ֣א אֶת הָ/אָ֗רֶץ אֲשֶׁ֤ר אַתֶּם֙ יֹשְׁבִ֣ים בָּ֔/הּ אֲשֶׁ֥ר אֲנִ֖י שֹׁכֵ֣ן בְּ/תוֹכָ֑/הּ כִּ֚י אֲנִ֣י יְהוָ֔ה שֹׁכֵ֕ן בְּ/ת֖וֹךְ בְּנֵ֥י יִשְׂרָאֵֽל־׃פ
translation:
  text: And you shall not defile the land in which you dwell, in the midst of which I dwell, for I, Yahweh, dwell in the midst of the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'among the Israelites' or 'among the children of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְטַמֵּא
  chosen: defile
  alternatives:
  - make unclean
  - pollute
  lexicon: HALOT
  rationale: טמא in the Piel commonly means to render ritually or morally unclean. 'Defile' preserves both cultic and moral force in this context better than the flatter 'make unclean' or the more environmental-sounding 'pollute'.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: In Numbers, אֶרֶץ here refers specifically to the land where Israel dwells, not the whole earth. 'Land' fits the immediate covenantal-geographical context.
- source_word: יֹשְׁבִים בָּהּ
  chosen: in which you are living
  alternatives:
  - where you dwell
  - in which you dwell
  lexicon: HALOT
  rationale: ישב denotes dwelling or residing. 'Are living' is natural modern English while still reflecting the durative participial sense; 'in which' keeps the relative structure tied to 'land'.
- source_word: שֹׁכֵן
  chosen: dwell
  alternatives:
  - tabernacle
  - reside
  lexicon: HALOT
  rationale: שכן is the standard verb for dwelling, often with covenantal/theological overtones of divine presence. 'Dwell' preserves that resonance without importing the more technical noun-based idea of 'tabernacle'.
- source_word: בְּתוֹכָהּ
  chosen: in the midst of which
  alternatives:
  - within which
  - in it
  lexicon: HALOT
  rationale: תוך conveys interiority and central presence. 'In the midst of which' preserves the strong spatial sense and echoes the repeated wording in the verse.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: כִּי here introduces the ground for the prohibition. 'For' is concise and fits the explanatory force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  chosen: in the midst of the sons of Israel
  alternatives:
  - among the children of Israel
  - among the Israelites
  - in the midst of the people of Israel
  lexicon: HALOT
  rationale: בני ישראל is literally 'sons of Israel.' Following the gender-accurate policy, the masculine form is retained in the main text rather than neutralizing to 'Israelites,' while still being understandable in context as the covenant people.
