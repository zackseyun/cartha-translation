id: NUM.35.8
reference: Numbers 35:8
source:
  edition: WLC
  text: וְ/הֶֽ/עָרִ֗ים אֲשֶׁ֤ר תִּתְּנוּ֙ מֵ/אֲחֻזַּ֣ת בְּנֵי יִשְׂרָאֵ֔ל מֵ/אֵ֤ת
    הָ/רַב֙ תַּרְבּ֔וּ וּ/מֵ/אֵ֥ת הַ/מְעַ֖ט תַּמְעִ֑יטוּ אִ֗ישׁ כְּ/פִ֤י נַחֲלָת/וֹ֙
    אֲשֶׁ֣ר יִנְחָ֔לוּ יִתֵּ֥ן מֵ/עָרָ֖י/ו לַ/לְוִיִּֽם־׃פ
translation:
  text: And the cities that you give from the possession of the sons of Israel—from
    the larger tribes you shall increase, and from the smaller you shall reduce. Each
    one, according to his inheritance that they inherit, shall give some of his cities
    to the Levites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from the much you shall increase, and from the little
      you shall reduce'; the sense is proportional allocation from larger and smaller
      tribal inheritances.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites' for 'the sons of Israel.' The main text preserves the
      formally masculine Hebrew expression while conveying the covenant people as
      a whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: עִיר commonly denotes a city/town settlement. 'Cities' is the standard
    rendering in this legal-allotment context and fits the repeated terminology of
    Levitical cities in Numbers 35.
- source_word: תִּתְּנוּ
  chosen: you give
  alternatives:
  - you shall give
  lexicon: HALOT
  rationale: Qal imperfect 2mp of נתן in legal instruction can be rendered with simple
    present in English subordinate clause ('that you give') while the main obligations
    are expressed with 'shall.'
- source_word: אֲחֻזַּת
  chosen: possession
  alternatives:
  - property
  - holding
  lexicon: HALOT
  rationale: אֲחֻזָּה refers to landed property/holding. 'Possession' preserves the
    covenantal-land sense without over-specifying modern property categories.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Following the gender-accurate principle, the formally masculine expression
    is preserved as 'sons of Israel.' 'Israelites' is possible, but the source wording
    is transparent and natural enough here.
- source_word: מֵאֵת הָרַב ... תַּרְבּוּ
  chosen: from the larger tribes you shall increase
  alternatives:
  - from the many you shall give more
  - from the greater share you shall increase
  lexicon: HALOT
  rationale: The idiom contrasts larger and smaller inheritance groups. Supplying
    'tribes' clarifies the implied referent in English from the context of tribal
    allotments; 'increase' reflects the Hiphil of רבה, i.e., make the number greater.
- source_word: וּמֵאֵת הַמְעַט תַּמְעִיטוּ
  chosen: from the smaller you shall reduce
  alternatives:
  - from the few you shall give less
  - from the smaller tribes you shall diminish
  lexicon: HALOT
  rationale: This balances the previous clause and expresses proportional reduction.
    'Smaller' is contextual, referring to groups with lesser inheritance.
- source_word: אִישׁ
  chosen: Each one
  alternatives:
  - each man
  - everyone
  lexicon: HALOT
  rationale: Though grammatically masculine singular, the distributive sense is primary
    here. 'Each one' preserves the distributive force without implying only male individuals
    are in view.
- source_word: כְּפִי נַחֲלָתוֹ
  chosen: according to his inheritance
  alternatives:
  - in proportion to his inheritance
  - according to the measure of his inheritance
  lexicon: HALOT
  rationale: כְּפִי literally 'according to the mouth/measure of' is an idiom for
    proportion. 'According to his inheritance' is concise and faithful.
- source_word: אֲשֶׁר יִנְחָלוּ
  chosen: that they inherit
  alternatives:
  - which they receive as an inheritance
  - that they possess as inheritance
  lexicon: HALOT
  rationale: The plural verb refers back to the tribal groups/Israelites collectively.
    'That they inherit' keeps the inheritance motif explicit.
- source_word: יִתֵּן מֵעָרָיו
  chosen: shall give some of his cities
  alternatives:
  - shall give from his cities
  - shall give out of his cities
  lexicon: HALOT
  rationale: The singular verb with distributive אִישׁ yields 'each one ... shall
    give.' English idiom benefits from 'some of his cities' to express the partitive
    מִן.
- source_word: לַלְוִיִּם
  chosen: to the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal designation in this context of Levitical
    city allocation.
