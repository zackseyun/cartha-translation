id: NUM.35.16
reference: Numbers 35:16
source:
  edition: WLC
  text: וְ/אִם בִּ/כְלִ֨י בַרְזֶ֧ל הִכָּ֛ה/וּ וַ/יָּמֹ֖ת רֹצֵ֣חַֽ ה֑וּא מ֥וֹת יוּמַ֖ת
    הָ/רֹצֵֽחַ־׀׃
translation:
  text: But if he struck him with an iron tool and he died, he is a murderer; the
    murderer must surely be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with an iron implement' or 'with an iron object.' The Hebrew term is
      broad and does not itself specify a weapon by name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional case within a larger legal sequence. 'But if'
    captures the adversative progression from the preceding case law better than bare
    'if' while remaining natural English.
- source_word: בִּכְלִי בַרְזֶל
  chosen: with an iron tool
  alternatives:
  - with an iron object
  - with an iron implement
  lexicon: HALOT
  rationale: כְּלִי is a broad term for vessel, article, implement, or weapon depending
    on context. In a homicide law, 'tool' or 'implement' best reflects a usable iron
    instrument without over-specifying as a weapon, since the Hebrew itself does not
    use a dedicated weapon term here.
- source_word: הִכָּהוּ
  chosen: he struck him
  alternatives:
  - he hit him
  - he smote him
  lexicon: HALOT
  rationale: The Hiphil of נכה commonly means 'strike' in legal and narrative contexts.
    'Struck' is idiomatic, sufficiently formal, and preserves the causal violent action.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so that he died
  - and the man died
  lexicon: HALOT
  rationale: A straightforward narrative consequence following the blow. 'And he died'
    preserves the Hebrew sequence without adding interpretive causation beyond the
    context.
- source_word: רֹצֵחַ הוּא
  chosen: he is a murderer
  alternatives:
  - he is a manslayer
  - he is one who murders
  lexicon: HALOT
  rationale: In this legal context רצח denotes culpable killing, and the clause identifies
    the striker as legally guilty. 'Murderer' best matches the judicial force here,
    distinguishing this from accidental killing discussed elsewhere in the chapter.
- source_word: מוֹת יוּמַת
  chosen: must surely be put to death
  alternatives:
  - shall surely be put to death
  - must be put to death
  lexicon: HALOT
  rationale: The infinitive absolute with passive/imperfect intensifies the penalty.
    'Must surely be put to death' preserves both the legal obligation and the emphatic
    force in readable modern English.
- source_word: הָרֹצֵחַ
  chosen: the murderer
  alternatives:
  - the manslayer
  - that murderer
  lexicon: HALOT
  rationale: The definite form restates the offender's legal status and is naturally
    rendered 'the murderer' in English.
