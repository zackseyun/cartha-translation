theological_decisions:
- issue: Legal classification of רצח in this verse
  chosen_reading: murderer
  alternative_readings:
  - manslayer
  rationale: Although רצח can sometimes be rendered more broadly in English tradition
    as 'slayer' or 'manslayer,' this verse explicitly identifies intentional culpability
    within the chapter's homicide legislation and prescribes capital punishment. 'Murderer'
    best reflects the legal and moral distinction made by the text itself.
  doctrine_reference: Translation philosophy §1, §5
