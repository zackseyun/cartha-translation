id: NUM.35.26
reference: Numbers 35:26
source:
  edition: WLC
  text: וְ/אִם יָצֹ֥א יֵצֵ֖א הָ/רֹצֵ֑חַ אֶת גְּבוּל֙ עִ֣יר מִקְלָט֔/וֹ אֲשֶׁ֥ר יָנ֖וּס
    שָֽׁמָּ/ה־־׃
translation:
  text: But if the manslayer does indeed go out beyond the boundary of his city of
    refuge, to which he fled,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'goes out beyond the border of his city of refuge where he fled.' The
      Hebrew uses an infinitive absolute with the finite verb ('go out he goes out')
      for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the preceding legal material.
    'But if' captures the adversative force in context better than a simple 'and if.'
- source_word: יָצֹא יֵצֵא
  chosen: does indeed go out
  alternatives:
  - goes out
  - surely goes out
  - goes out at all
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect of יצא intensifies the verbal
    idea. 'Does indeed go out' preserves the emphatic force in natural English without
    sounding overly wooden.
- source_word: הָרֹצֵחַ
  chosen: the manslayer
  alternatives:
  - the killer
  - the slayer
  - the murderer
  lexicon: HALOT
  rationale: In the immediate context of the cities of refuge legislation, this term
    refers to the one who killed and fled for asylum, not necessarily a culpable murderer.
    'Manslayer' is the most precise legal-context rendering in English.
- source_word: אֶת גְּבוּל
  chosen: beyond the boundary
  alternatives:
  - the border of
  - the boundary of
  - outside the border of
  lexicon: HALOT
  rationale: With יצא, the object marker plus 'boundary' yields the sense of crossing
    or going beyond the limit. 'Beyond the boundary' makes the legal transgression
    explicit in idiomatic English.
- source_word: עִיר מִקְלָטוֹ
  chosen: his city of refuge
  alternatives:
  - the city of his refuge
  - his refuge city
  lexicon: HALOT
  rationale: Standard and clear rendering of the legal term for asylum city; the pronominal
    suffix is preserved with 'his.'
- source_word: אֲשֶׁר יָנוּס שָׁמָּה
  chosen: to which he fled
  alternatives:
  - where he fled
  - to which he had fled
  - where he had taken refuge
  lexicon: HALOT
  rationale: The relative clause identifies the city as the place of his flight. 'To
    which he fled' is concise and faithful; English may supply the directional sense
    inherent in שָׁמָּה.
