theological_decisions:
- issue: Meaning of land contamination by bloodshed
  chosen_reading: The verse teaches that unlawful bloodshed brings real moral-sacral
    defilement upon the land, and that this bloodguilt is removed only through the
    execution of the murderer.
  alternative_readings:
  - The language is merely metaphorical for social disorder
  - The focus is only civil justice without cultic or theological significance
  rationale: The repeated use of חנף and כפר, together with the explicit statement
    about blood and the land, indicates more than civic disorder; it presents bloodguilt
    as a defiling reality requiring atonement. The translation preserves this without
    importing later doctrinal categories beyond the verse itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
