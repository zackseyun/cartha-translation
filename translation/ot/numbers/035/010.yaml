id: NUM.35.10
reference: Numbers 35:10
source:
  edition: WLC
  text: דַּבֵּר֙ אֶל בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/אָמַרְתָּ֖ אֲלֵ/הֶ֑ם כִּ֥י אַתֶּ֛ם עֹבְרִ֥ים
    אֶת הַ/יַּרְדֵּ֖ן אַ֥רְצָ/ה כְּנָֽעַן־־׃
translation:
  text: Speak to the sons of Israel and say to them, ‘When you cross the Jordan into
    the land of Canaan,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Hebrew is literally
      'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Speak to
  - Tell
  lexicon: HALOT
  rationale: Piel imperative of דבר, a standard command to address someone. 'Speak'
    preserves the direct imperative force; the following אֶל supplies 'to.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Per gender-accurate philosophy, the masculine
    plural familial expression is retained rather than flattened to 'Israelites,'
    though that remains a viable idiomatic alternative.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  chosen: and say to them
  alternatives:
  - and tell them
  lexicon: HALOT
  rationale: A common Hebrew command sequence ('speak ... and say'). Rendering both
    verbs preserves the formal structure and rhetorical cadence of the source.
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - that
  - indeed
  lexicon: HALOT
  rationale: Although כִּי often means 'for/that,' in this context introducing a future
    circumstance ('you are crossing') it is best rendered temporally as 'when,' which
    is idiomatic in English and fits the legal instruction setting.
- source_word: אַתֶּם עֹבְרִים
  chosen: you cross
  alternatives:
  - you are crossing
  - you pass over
  lexicon: HALOT
  rationale: The participial construction with pronoun expresses imminent/future action.
    English simple present in a temporal clause ('when you cross') is natural and
    accurately conveys the sense.
- source_word: אֶת הַיַּרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: Standard English geographic rendering. 'River' is implicit but not required;
    'the Jordan' is clear and idiomatic.
- source_word: אַרְצָה כְּנָעַן
  chosen: into the land of Canaan
  alternatives:
  - to the land of Canaan
  - toward the land of Canaan
  lexicon: HALOT
  rationale: The directional suffix on אֶרֶץ conveys motion toward/into the land.
    'Into the land of Canaan' best reflects the crossing into a territory rather than
    merely toward it.
