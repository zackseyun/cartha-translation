id: NUM.35.1
reference: Numbers 35:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֧ר יְהוָ֛ה אֶל מֹשֶׁ֖ה בְּ/עַֽרְבֹ֣ת מוֹאָ֑ב עַל יַרְדֵּ֥ן יְרֵח֖וֹ לֵ/אמֹֽר־־׃
translation:
  text: And Yahweh spoke to Moses in the plains of Moab by the Jordan at Jericho, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of דבר introduces a new speech event in standard narrative style. 'Spoke' is the natural English rendering in this formulaic context and pairs well with the following לֵאמֹר ('saying').
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is clear modern English.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בְּעַרְבֹת
  chosen: in the plains
  alternatives:
  - in the steppes
  - in the desert plains
  lexicon: HALOT
  rationale: עֲרָבוֹת refers to steppe/plains terrain. 'Plains' is idiomatic and familiar in the established geographical expression 'the plains of Moab,' while still accurately conveying the setting.
- source_word: מוֹאָב
  chosen: Moab
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: עַל
  chosen: by
  alternatives:
  - beside
  - upon
  lexicon: HALOT
  rationale: In this geographical expression, עַל with the Jordan is best rendered idiomatically as proximity rather than literal elevation. 'By the Jordan' communicates location naturally in English.
- source_word: יַרְדֵּן
  chosen: the Jordan
  alternatives:
  - the Jordan River
  lexicon: HALOT
  rationale: As a well-known river name, 'the Jordan' is sufficient and reflects common biblical English usage without unnecessary expansion.
- source_word: יְרֵחוֹ
  chosen: Jericho
  lexicon: HALOT
  rationale: Standard English transliteration of the city name.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: This infinitive construct introduces the content of divine speech in a standard Hebrew formula. 'Saying' preserves the formal linkage to the following speech without over-paraphrase.
