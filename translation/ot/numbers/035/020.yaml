id: NUM.35.20
reference: Numbers 35:20
source:
  edition: WLC
  text: וְ/אִם בְּ/שִׂנְאָ֖ה יֶהְדָּפֶ֑/נּוּ אֽוֹ הִשְׁלִ֥יךְ עָלָ֛י/ו בִּ/צְדִיָּ֖ה
    וַ/יָּמֹֽת־־׃
translation:
  text: But if he pushed him in hatred, or threw something at him intentionally, and
    he died,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'threw something at him with malice' or 'while lying in wait'; the Hebrew
      term carries a nuance of deliberate hostile intent, possibly including ambush.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: HALOT
  rationale: Introduces a conditional case contrasting with the previous scenario.
    'But if' captures the adversative force in context better than a simple 'and if.'
- source_word: בְּשִׂנְאָה
  chosen: in hatred
  alternatives:
  - out of hatred
  - with hatred
  lexicon: HALOT
  rationale: The preposition plus noun expresses motive or manner. 'In hatred' is
    concise and close to the Hebrew, while still idiomatic in English legal-style
    narration.
- source_word: יֶהְדָּפֶנּוּ
  chosen: he pushed him
  alternatives:
  - he shoved him
  - he thrust him
  - he struck him down
  lexicon: HALOT
  rationale: The verb denotes pushing or thrusting. 'Pushed' fits the homicide-law
    context and avoids overstating the action as a strike or blow.
- source_word: אוֹ
  chosen: or
  lexicon: HALOT
  rationale: Simple disjunctive conjunction introducing an alternative act.
- source_word: הִשְׁלִיךְ עָלָיו
  chosen: threw something at him
  alternatives:
  - cast something upon him
  - hurled at him
  - threw at him
  lexicon: HALOT
  rationale: The verb means 'throw/cast,' and the object is implicit in Hebrew. English
    normally supplies an indefinite object for clarity. 'At him' reflects the hostile
    direction of the act.
- source_word: בִּצְדִיָּה
  chosen: intentionally
  alternatives:
  - lying in wait
  - with malice
  - deliberately
  lexicon: HALOT
  rationale: In this legal context the noun conveys intentional hostile action, often
    with the nuance of ambush or premeditation. 'Intentionally' communicates the core
    legal force clearly in modern English; the more specific nuance is preserved in
    a footnote.
- source_word: וַיָּמֹת
  chosen: and he died
  alternatives:
  - so that he died
  - with the result that he died
  lexicon: HALOT
  rationale: Standard narrative consequence. 'And he died' is faithful and natural,
    leaving the causal link to the legal context.
