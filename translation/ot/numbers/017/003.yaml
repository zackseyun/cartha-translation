theological_decisions:
- issue: Referent and force of the sanctification statement
  chosen_reading: The censers became holy because they were presented before the LORD, and therefore could be repurposed only for sacred memorial use.
  alternative_readings:
  - The men became holy in a limited cultic sense despite their sin
  - The censers were merely set apart ceremonially without implying enduring holiness
  rationale: 'The nearest grammatical referent of the plural verb is the censers, and the logic of the verse explains why they are to be beaten into altar covering. This preserves the text''s tension: objects associated with sinful rebels nevertheless become holy by contact with the divine sphere.'
- issue: Rendering of בְּנַפְשֹׁתָם
  chosen_reading: The phrase indicates that their sin resulted in the loss of their own lives.
  alternative_readings:
  - They sinned against their own lives in a moral sense
  - They sinned with respect to their souls
  rationale: The idiom in context points to self-destructive rebellion ending in death, not to a developed anthropology of 'soul' distinct from 'life.'
