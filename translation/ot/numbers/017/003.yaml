id: NUM.17.3
reference: Numbers 17:3
source:
  edition: WLC
  text: אֵ֡ת מַחְתּוֹת֩ הַֽ/חַטָּאִ֨ים הָ/אֵ֜לֶּה בְּ/נַפְשֹׁתָ֗/ם וְ/עָשׂ֨וּ אֹתָ֜/ם רִקֻּעֵ֤י פַחִים֙ צִפּ֣וּי לַ/מִּזְבֵּ֔חַ כִּֽי הִקְרִיבֻ֥/ם לִ/פְנֵֽי יְהוָ֖ה וַ/יִּקְדָּ֑שׁוּ וְ/יִֽהְי֥וּ לְ/א֖וֹת לִ/בְנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: As for the censers of these men who sinned at the cost of their lives, let them make them into hammered plates as a covering for the altar, because they presented them before Yahweh and they became holy; and they shall be a sign to the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these sinners' or 'these sinful men.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'in/with their lives'; that is, their sin cost them their lives.
    reason: lexical_alternative
  - marker: c
    text: Or 'beaten plates' or 'hammered plates of metal.'
    reason: lexical_alternative
  - marker: d
    text: Or 'they were consecrated.' The subject is most naturally the censers.
    reason: lexical_alternative
  - marker: e
    text: Or 'for the Israelites.' Literally 'to the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחְתּוֹת
  chosen: censers
  alternatives:
  - firepans
  lexicon: HALOT
  rationale: Refers to the incense-burning vessels used in the rebellion narrative. 'Censers' is the clearest modern English equivalent in this cultic context; 'firepans' is possible but less idiomatic.
- source_word: הַחַטָּאִים הָאֵלֶּה
  chosen: these men who sinned
  alternatives:
  - these sinners
  - these sinful men
  lexicon: HALOT
  rationale: The participial form identifies the people by their sinful act. Rendering it verbally ('who sinned') preserves the eventive force in context better than the more static label 'sinners.' 'Men' is supplied from context because the referents are Korah's company; this keeps the English natural without overextending beyond the narrative setting.
- source_word: בְּנַפְשֹׁתָם
  chosen: at the cost of their lives
  alternatives:
  - against their own lives
  - to the loss of their lives
  - with their lives
  lexicon: HALOT
  rationale: The phrase literally involves 'their lives/souls' and idiomatically means they sinned in a way that brought about their own death. 'At the cost of their lives' communicates the consequence clearly in natural English.
- source_word: וְעָשׂוּ אֹתָם
  chosen: let them make them
  alternatives:
  - and make them
  - they shall make them
  lexicon: HALOT
  rationale: 'In context this continues a command from the preceding verse, so English benefits from an explicit jussive/imperatival sense: Eleazar or the craftsmen are to make the censers into something else. ''Let them make them'' captures the directive force.'
- source_word: רִקֻּעֵי פַחִים
  chosen: hammered sheets
  alternatives:
  - beaten plates
  - hammered plates of metal
  lexicon: HALOT
  rationale: The phrase denotes metal beaten out into thin plates/sheets. 'Hammered sheets' is concise and understandable; 'plates' is also possible.
- source_word: צִפּוּי לַמִּזְבֵּחַ
  chosen: as a covering for the altar
  alternatives:
  - for plating the altar
  - as an overlay for the altar
  lexicon: HALOT
  rationale: 'This expresses purpose/result: the hammered metal would serve as an overlay on the altar. ''Covering'' is clear modern English and fits the cultic object.'
- source_word: כִּי הִקְרִיבֻם לִפְנֵי יְהוָה
  chosen: because they presented them before the LORD
  alternatives:
  - because they offered them before the LORD
  - for they brought them near before the LORD
  lexicon: HALOT
  rationale: The verb is the standard sacrificial 'bring near/offer.' Since the object is censers rather than an animal sacrifice, 'presented' avoids awkwardness while preserving cultic solemnity. The divine name follows project policy as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּקְדָּשׁוּ
  chosen: they became holy
  alternatives:
  - they were made holy
  - they were consecrated
  lexicon: HALOT
  rationale: The plural verb most naturally refers to the censers just mentioned. Because they were brought before the LORD, they acquired sacred status. 'Became holy' preserves the result without over-specifying agency.
- source_word: וְיִהְיוּ לְאוֹת
  chosen: and they shall be a sign
  alternatives:
  - and they shall serve as a sign
  - and let them be a sign
  lexicon: HALOT
  rationale: The plural subject continues to be the censers/altar covering. 'A sign' preserves the memorial-warning function without interpretive expansion.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - for the Israelites
  - to the people of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' In narrative covenantal language this can be rendered more formally. I retained 'sons of Israel' to stay close to the source and preserve the traditional corporate designation, while recognizing 'Israelites' as a viable smoother alternative.
