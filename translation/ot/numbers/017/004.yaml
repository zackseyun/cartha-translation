id: NUM.17.4
reference: Numbers 17:4
source:
  edition: WLC
  text: וַ/יִּקַּ֞ח אֶלְעָזָ֣ר הַ/כֹּהֵ֗ן אֵ֚ת מַחְתּ֣וֹת הַ/נְּחֹ֔שֶׁת אֲשֶׁ֥ר הִקְרִ֖יבוּ
    הַ/שְּׂרֻפִ֑ים וַֽ/יְרַקְּע֖וּ/ם צִפּ֥וּי לַ/מִּזְבֵּֽחַ׃
translation:
  text: So Eleazar the priest took the bronze censers that the burned men had offered,
    and they were hammered out as a covering for the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'firepans' for 'censers.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the burned ones' or 'the ones who were burned,' referring to those
      consumed by fire in the preceding narrative.
    reason: lexical_alternative
  - marker: c
    text: Or 'plating' or 'overlay' for 'a covering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַחְתּוֹת
  chosen: censers
  alternatives:
  - firepans
  lexicon: HALOT
  rationale: Refers to vessels for carrying burning coals/incense. 'Censers' is clearer
    in modern English while remaining faithful to cultic context.
- source_word: הַנְּחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper/bronze; in tabernacle furnishings 'bronze'
    is the conventional and likely contextual rendering.
- source_word: הִקְרִיבוּ
  chosen: had offered
  alternatives:
  - presented
  - brought near
  lexicon: HALOT
  rationale: In sacrificial/cultic contexts קרב in the Hiphil commonly means 'offer'
    or 'present as an offering.' The pluperfect sense in English helps relate the
    action to the prior narrative.
- source_word: הַשְּׂרֻפִים
  chosen: the burned men
  alternatives:
  - the ones who were burned
  - the burned ones
  lexicon: HALOT
  rationale: Passive participle from שׂרף, 'to burn.' It refers to Korah's company
    who were consumed by fire. 'The burned men' preserves the concrete force without
    over-paraphrasing.
- source_word: וַיְרַקְּעוּם
  chosen: they were hammered out
  alternatives:
  - he hammered them out
  - they hammered them out
  - they beat them into plates
  lexicon: HALOT
  rationale: From רקע, 'to beat out, hammer out metal.' The 3mp form with 3mp suffix
    is syntactically difficult in context; English passive best captures the result
    without forcing an explicit subject where Hebrew leaves it less clear.
- source_word: צִפּוּי
  chosen: a covering
  alternatives:
  - plating
  - overlay
  lexicon: HALOT
  rationale: Denotes something used as an overlay or covering. 'A covering' is natural
    English; 'plating' is a viable more technical alternative.
- source_word: לַמִּזְבֵּחַ
  chosen: for the altar
  alternatives:
  - on the altar
  lexicon: HALOT
  rationale: 'The lamed here marks purpose/result: the hammered metal became a covering
    intended for the altar.'
