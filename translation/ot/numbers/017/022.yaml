id: NUM.17.22
reference: Numbers 17:22
source:
  edition: WLC
  text: וַ/יַּנַּ֥ח מֹשֶׁ֛ה אֶת הַ/מַּטֹּ֖ת לִ/פְנֵ֣י יְהוָ֑ה בְּ/אֹ֖הֶל הָ/עֵדֻֽת־׃
translation:
  text: So Moses placed the staffs before the LORD in the tent of the testimony.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rods.' The Hebrew מַטּוֹת refers here to the physical staffs representing
      the tribes.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the tabernacle of the testimony.' Literally, 'in the tent of the
      testimony.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּנַּח
  chosen: placed
  alternatives:
  - set down
  - laid
  lexicon: HALOT
  rationale: The verb from נוח in the Hiphil/waw-consecutive narrative form here means
    to set or place something down. 'Placed' is natural modern English and preserves
    the concrete action without overformal stiffness.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: הַמַּטֹּת
  chosen: the staffs
  alternatives:
  - the rods
  lexicon: HALOT
  rationale: מַטֶּה can mean 'staff,' 'rod,' or 'tribe' depending on context. Here
    it refers to the tribal leaders' physical staffs placed before the LORD, so 'staffs'
    best communicates the concrete objects in readable English. 'Rods' is possible
    but slightly less natural in contemporary usage.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: The preposition literally denotes position before or in front of. 'Before'
    is concise and idiomatic, while still carrying the sense of presentation in the
    LORD's presence.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint tradition.
- source_word: בְּאֹהֶל
  chosen: in the tent
  alternatives:
  - in the tabernacle
  lexicon: HALOT
  rationale: אֹהֶל literally means 'tent.' Although this refers to the sanctuary structure,
    'tent' preserves the Hebrew image more directly. 'Tabernacle' is interpretive
    and more traditional, but less transparent to the source wording here.
- source_word: הָעֵדֻת
  chosen: the testimony
  alternatives:
  - the covenant document
  - the witness
  lexicon: HALOT
  rationale: עֵדוּת commonly refers to the testimony, especially the covenant testimony
    associated with the tablets and the sanctuary. 'The testimony' is the established
    and sufficiently transparent rendering here; it also explains the sanctuary designation
    'tent of the testimony.'
