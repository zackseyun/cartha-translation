id: NUM.17.6
reference: Numbers 17:6
source:
  edition: WLC
  text: וַ/יִּלֹּ֜נוּ כָּל עֲדַ֤ת בְּנֵֽי יִשְׂרָאֵל֙ מִֽ/מָּחֳרָ֔ת עַל מֹשֶׁ֥ה וְ/עַֽל אַהֲרֹ֖ן לֵ/אמֹ֑ר אַתֶּ֥ם הֲמִתֶּ֖ם אֶת עַ֥ם יְהוָֽה־־־־־׃
translation:
  text: But on the next day all the congregation of the sons of Israel grumbled against Moses and against Aaron, saying, “You have killed the people of Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''sons of Israel.'' Many English versions render this more idiomatically as ''Israelites'' or ''people of Israel.'''
    reason: lexical_alternative
  - marker: b
    text: '''the LORD'' renders the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּלֹּנוּ
  chosen: grumbled
  alternatives:
  - murmured
  - complained
  lexicon: HALOT
  rationale: The verb לון in this stem commonly denotes communal murmuring or grumbling against leaders in the wilderness narratives. 'Grumbled' is natural modern English and preserves the hostile, repeated-complaint sense better than the more archaic 'murmured.'
- source_word: כָּל עֲדַת בְּנֵי יִשְׂרָאֵל
  chosen: all the congregation of the sons of Israel
  alternatives:
  - the whole congregation of the Israelites
  - all the assembly of the people of Israel
  lexicon: HALOT
  rationale: עֵדָה is well rendered 'congregation' or 'assembly.' I chose 'congregation' to reflect the corporate covenant community. בְּנֵי יִשְׂרָאֵל is formally 'sons of Israel'; per the project's gender-accurate policy, the masculine form is preserved rather than flattened to a purely neutral expression.
- source_word: מִמָּחֳרָת
  chosen: on the next day
  alternatives:
  - the next day
  - on the morrow
  lexicon: HALOT
  rationale: The term means 'on the next day' or 'the following day.' This is idiomatic modern English without archaic coloring.
- source_word: עַל מֹשֶׁה וְעַל אַהֲרֹן
  chosen: against Moses and against Aaron
  alternatives:
  - against Moses and Aaron
  lexicon: HALOT
  rationale: The repeated preposition עַל is retained with both names for emphasis, reflecting the Hebrew's accusatory focus on each leader.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech.
- source_word: אַתֶּם הֲמִתֶּם
  chosen: You have killed
  alternatives:
  - You killed
  - You caused the death of
  lexicon: HALOT
  rationale: The form is second person plural with the causative sense from מות, here functioning as a direct accusation. 'You have killed' fits the direct speech naturally in English and conveys completed action with present relevance.
- source_word: עַם יְהוָה
  chosen: the people of the LORD
  alternatives:
  - the LORD's people
  - the people of Yahweh
  lexicon: HALOT
  rationale: עַם יְהוָה is a covenantal designation. 'The people of the LORD' preserves the genitival relationship and solemn tone. Per doctrine, יְהוָה is rendered 'the LORD,' not 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving the traditional reverential substitution pattern.
