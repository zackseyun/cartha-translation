id: NUM.17.24
reference: Numbers 17:24
source:
  edition: WLC
  text: וַ/יֹּצֵ֨א מֹשֶׁ֤ה אֶת כָּל הַ/מַּטֹּת֙ מִ/לִּ/פְנֵ֣י יְהוָ֔ה אֶֽל כָּל בְּנֵ֖י יִשְׂרָאֵ֑ל וַ/יִּרְא֥וּ וַ/יִּקְח֖וּ אִ֥ישׁ מַטֵּֽ/הוּ־־־־׃ס
translation:
  text: So Moses brought out all the staffs from before Yahweh to all the sons of Israel, and they saw, and each man took his staff.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to all the Israelites.' The Hebrew is literally 'to all the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they saw.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּצֵא
  chosen: brought out
  alternatives:
  - took out
  - brought forth
  lexicon: HALOT
  rationale: Hiphil of יצא is causative, 'bring out' or 'take out.' 'Brought out' is natural English and preserves the causative sense.
- source_word: הַמַּטֹּת
  chosen: the staffs
  alternatives:
  - the rods
  lexicon: HALOT
  rationale: מַטֶּה can mean 'staff,' 'rod,' or 'tribe' depending on context. Here the physical objects placed before the LORD are in view, so 'staffs' is the clearest rendering.
- source_word: מִלִּפְנֵי יְהוָה
  chosen: from before the LORD
  alternatives:
  - from the presence of the LORD
  lexicon: HALOT
  rationale: Literally 'from before YHWH.' The covenant name is rendered per doctrine as 'the LORD.' 'From before' preserves the spatial idiom without over-paraphrasing.
- source_word: אֶל כָּל בְּנֵי יִשְׂרָאֵל
  chosen: to all the sons of Israel
  alternatives:
  - to all the Israelites
  - to all the children of Israel
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל is the standard national designation. 'Sons of Israel' is more formally transparent to the Hebrew than 'Israelites,' while remaining understandable. It also follows the project's gender-accurate principle.
- source_word: וַיִּרְאוּ
  chosen: they looked
  alternatives:
  - they saw
  lexicon: HALOT
  rationale: Although ראה commonly means 'see,' in this sequence with the staffs being presented and then reclaimed, 'looked' better conveys the act of examining them.
- source_word: וַיִּקְחוּ אִישׁ מַטֵּהוּ
  chosen: each man took his staff
  alternatives:
  - each one took his staff
  - every man took his rod
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each man' or 'each one.' Because the Hebrew is singular distributive with a masculine noun, 'each man' best reflects the form, and 'staff' maintains consistency with מַטֶּה earlier in the verse.
