theological_decisions:
- issue: Referent of 'the testimony'
  chosen_reading: Retain the literal phrase 'the testimony' without specifying whether
    it refers directly to the tablets, the ark, or the covenant witness more broadly.
  alternative_readings:
  - the tablets of the testimony
  - the ark of the testimony
  rationale: The Hebrew expression is semantically loaded but not fully explicit here.
    Preserving the literal wording avoids narrowing the referent beyond what the text
    states.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
