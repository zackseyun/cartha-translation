id: NUM.17.19
reference: Numbers 17:19
source:
  edition: WLC
  text: וְ/הִנַּחְתָּ֖/ם בְּ/אֹ֣הֶל מוֹעֵ֑ד לִ/פְנֵי֙ הָֽ/עֵד֔וּת אֲשֶׁ֛ר אִוָּעֵ֥ד
    לָ/כֶ֖ם שָֽׁמָּ/ה׃
translation:
  text: And you shall place them in the tent of meeting before the testimony, where
    I meet with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the covenant witness'; 'the testimony' likely refers to the covenant
      testimony associated with the tablets in the sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Or 'where I make myself known to you' or 'where I appoint to meet with you.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִנַּחְתָּם
  chosen: And you shall place them
  alternatives:
  - And you shall set them down
  - And you shall lay them
  lexicon: HALOT
  rationale: Hiphil of נוח/ניח in the second masculine singular with 3mp suffix indicates
    causing the objects to be placed. 'Place' is natural modern English and preserves
    the directive force without over-literal awkwardness.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - in the Tent of Meeting
  lexicon: HALOT
  rationale: The phrase is the standard designation for the sanctuary. 'Tent of meeting'
    is the established transparent rendering of אֹהֶל מוֹעֵד. Lowercase is used here
    for readable modern English, though capitalization is possible as a formal convention.
- source_word: לִפְנֵי הָעֵדוּת
  chosen: before the testimony
  alternatives:
  - before the covenant document
  - before the ark's testimony
  lexicon: HALOT
  rationale: לִפְנֵי means 'before/in front of.' הָעֵדוּת literally means 'the testimony,'
    referring to the covenant witness, likely the tablets or that which bears them.
    The literal rendering is retained to avoid importing an interpretive expansion
    into the main text.
- source_word: אֲשֶׁר אִוָּעֵד
  chosen: where I meet
  alternatives:
  - where I make myself known
  - where I appoint to meet
  lexicon: HALOT
  rationale: Niphal of יעד here conveys appointed meeting. In this sanctuary context,
    'where I meet' captures the relational and locative sense succinctly. The relative
    אֲשֶׁר with שָׁמָּה supports a locative rendering, 'where.'
- source_word: לָכֶם
  chosen: with you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: Although the preposition is literally 'to/for you,' with יעד in this
    idiom the sense is meeting with someone. 'With you' best reflects idiomatic English
    and the covenantal encounter sense.
- source_word: שָׁמָּה
  chosen: there (implicit in 'where')
  alternatives:
  - there
  lexicon: HALOT
  rationale: The adverb is absorbed into the English relative adverb 'where' to avoid
    redundancy ('where ... there'). This is a justified optimal-equivalence compression
    with no loss of meaning.
