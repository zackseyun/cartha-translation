id: NUM.17.13
reference: Numbers 17:13
source:
  edition: WLC
  text: וַ/יַּעֲמֹ֥ד בֵּֽין הַ/מֵּתִ֖ים וּ/בֵ֣ין הַֽ/חַיִּ֑ים וַ/תֵּעָצַ֖ר הַ/מַּגֵּפָֽה־׃
translation:
  text: And he stood between the dead and the living, and the plague was stopped.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲמֹד
  chosen: And he stood
  alternatives:
  - And he took his stand
  - And he remained standing
  lexicon: HALOT
  rationale: From עמד, the basic sense is 'stand' or 'take one's stand.' 'Stood' is
    the most natural English rendering here and preserves the narrative concreteness
    without overinterpreting posture as military defiance.
- source_word: בֵּין ... וּבֵין
  chosen: between ... and
  alternatives:
  - in the midst of ... and
  lexicon: HALOT
  rationale: The paired prepositions mark spatial separation between two groups. 'Between
    ... and' is the direct and idiomatic equivalent.
- source_word: הַמֵּתִים
  chosen: the dead
  alternatives:
  - the dead ones
  lexicon: HALOT
  rationale: The participial/substantival form denotes those who had died. 'The dead'
    is idiomatic English and preserves the stark contrast with 'the living.'
- source_word: הַחַיִּים
  chosen: the living
  alternatives:
  - those alive
  - the live ones
  lexicon: HALOT
  rationale: The adjective used substantivally denotes those still alive. 'The living'
    matches the Hebrew contrast and reads naturally in English.
- source_word: וַתֵּעָצַר
  chosen: was stopped
  alternatives:
  - was restrained
  - was halted
  - ceased
  lexicon: HALOT
  rationale: From עצר, here in passive/resultative sense, indicating the plague's
    progress was checked. 'Was stopped' is clear modern English and fits the immediate
    context of a halted outbreak.
- source_word: הַמַּגֵּפָה
  chosen: the plague
  alternatives:
  - the plague outbreak
  - the affliction
  lexicon: HALOT
  rationale: מגפה commonly denotes a plague or deadly blow/outbreak in judgment contexts.
    'Plague' is the standard concise rendering and best fits the narrative.
