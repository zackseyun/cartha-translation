- issue: Nature of מַגֵּפָה in this judgment context
  chosen_reading: the plague
  alternative_readings:
  - the affliction
  - the outbreak
  rationale: The term refers to a divinely sent deadly outbreak in the immediate narrative.
    'Plague' preserves the severity and conventional sense without adding explanatory
    theology beyond the text.
