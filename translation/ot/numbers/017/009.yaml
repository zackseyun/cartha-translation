id: NUM.17.9
reference: Numbers 17:9
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: And Yahweh spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: YHWH; alternatively rendered ''Yahweh'' or ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: 'The waw-consecutive with דבר introduces a narrative advance: ''and ... spoke.'' ''Spoke'' is the standard rendering for דבר in this formula and preserves the formal distinction from אמר (''say''). ''Said'' is possible in English but less precise here.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech. 'To' is the natural modern English equivalent; 'unto' is archaic and contrary to the readability aim.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name, in keeping with the policy to transliterate names rather than translate them.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive construct functions as the conventional speech-introduction formula after 'spoke to Moses.' 'Saying' is idiomatic English and preserves the expectation of direct discourse in the following verse.
