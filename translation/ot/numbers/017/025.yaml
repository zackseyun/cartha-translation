theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name, and the project default is 'the
    LORD' rather than a transliteration. This is a translation-policy decision rather
    than a doctrinally disputed point.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered idiom in לִבְנֵי מֶרִי
  chosen_reading: sons of rebellion
  alternative_readings:
  - rebels
  - rebellious people
  rationale: The Hebrew uses a masculine plural filial idiom. Per the project's gender-accurate
    principle, the translation preserves the marked expression rather than neutralizing
    it in the main text, while a footnote can offer a smoother English equivalent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
