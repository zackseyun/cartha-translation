id: NUM.17.25
reference: Numbers 17:25
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה הָשֵׁ֞ב אֶת מַטֵּ֤ה אַהֲרֹן֙ לִ/פְנֵ֣י הָ/עֵד֔וּת
    לְ/מִשְׁמֶ֥רֶת לְ/א֖וֹת לִ/בְנֵי מֶ֑רִי וּ/תְכַ֧ל תְּלוּנֹּתָ֛/ם מֵ/עָלַ֖/י וְ/לֹ֥א
    יָמֻֽתוּ־־־׃
translation:
  text: And the LORD said to Moses, “Put Aaron’s staff back before the testimony,
    to be kept as a sign for the sons of rebellion, so that you may put an end to
    their grumblings against me, and they may not die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for the rebels” or “for the rebellious sons.”
    reason: lexical_alternative
  - marker: b
    text: “The testimony” likely refers to the covenant testimony associated with
      the ark; the Hebrew expression is kept concise here.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional small-caps covenantal substitute in English rather than transliteration.
- source_word: הָשֵׁב
  chosen: Put ... back
  alternatives:
  - Return
  - Bring back
  lexicon: HALOT
  rationale: The Hiphil imperative of שוב here directs Moses to restore Aaron's staff
    to its prior place. 'Put ... back' is natural modern English and preserves the
    sense of returning it.
- source_word: מַטֵּה
  chosen: staff
  alternatives:
  - rod
  lexicon: HALOT
  rationale: '''Staff'' is clearer and more natural in contemporary English than ''rod,''
    while still fitting the object used as a tribal/priestly sign.'
- source_word: לִפְנֵי הָעֵדוּת
  chosen: before the testimony
  alternatives:
  - before the covenant document
  - before the ark of the testimony
  lexicon: HALOT
  rationale: A relatively formal rendering is retained because עֵדוּת in Pentateuchal
    tabernacle contexts commonly refers to the covenant testimony. The phrase is left
    concise rather than expanded beyond the Hebrew. 'Before the testimony' likely
    means before the ark/chest associated with the testimony, but the Hebrew itself
    says 'the testimony.'
- source_word: לְמִשְׁמֶרֶת
  chosen: to be kept
  alternatives:
  - for safekeeping
  - for keeping
  - as something to be preserved
  lexicon: HALOT
  rationale: This infinitival/purpose expression indicates preservation or keeping
    in custody. 'To be kept' is idiomatic and concise.
- source_word: לְאוֹת
  chosen: as a sign
  alternatives:
  - for a sign
  - as a token
  lexicon: HALOT
  rationale: אוֹת regularly denotes a sign or token. 'As a sign' is the most natural
    English expression here.
- source_word: לִבְנֵי מֶרִי
  chosen: for the sons of rebellion
  alternatives:
  - for the rebellious sons
  - for the rebels
  - for the children of rebellion
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of rebellion.' Because the project prefers
    gender-accurate renderings and avoids flattening marked expressions, the literal
    familial idiom is substantially preserved. A smoother alternative is worth preserving
    in a footnote.
- source_word: וּתְכַל
  chosen: so that you may put an end to
  alternatives:
  - and you shall end
  - and you shall consume
  - that you may finish
  lexicon: HALOT
  rationale: 'כלה in Hiphil can mean bring to an end, finish, or cause to cease. In
    context, the LORD states the purpose/result of preserving the staff: Moses will
    bring the complaints to an end. ''So that you may put an end to'' captures the
    purposive force and idiomatic sense.'
- source_word: תְּלוּנֹּתָם
  chosen: their grumblings
  alternatives:
  - their complaints
  - their murmurings
  lexicon: HALOT
  rationale: The noun refers to the people's murmuring/complaining against the LORD
    and Moses. 'Grumblings' preserves the repeated wilderness-theme nuance better
    than the more neutral 'complaints.'
- source_word: מֵעָלַי
  chosen: against me
  alternatives:
  - from upon me
  - away from me
  lexicon: HALOT
  rationale: In this idiom with תלונות, the sense is that the complaints are directed
    against the LORD. 'Against me' is the natural contextual rendering.
- source_word: וְלֹא יָמֻתוּ
  chosen: and they may not die
  alternatives:
  - so that they will not die
  - and they will not die
  lexicon: HALOT
  rationale: 'The clause expresses intended result: the sign is meant to stop rebellion
    and thereby prevent death. ''And they may not die'' preserves the Hebrew coordination
    while conveying purpose/result in English.'
