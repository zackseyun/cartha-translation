id: NUM.17.18
reference: Numbers 17:18
source:
  edition: WLC
  text: וְ/אֵת֙ שֵׁ֣ם אַהֲרֹ֔ן תִּכְתֹּ֖ב עַל מַטֵּ֣ה לֵוִ֑י כִּ֚י מַטֶּ֣ה אֶחָ֔ד
    לְ/רֹ֖אשׁ בֵּ֥ית אֲבוֹתָֽ/ם־׃
translation:
  text: And you shall write Aaron’s name on the staff of Levi, for there shall be
    one staff for the head of their fathers’ house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one staff for each head of their fathers’ house.' The Hebrew phrase
      can be understood distributively, explaining that each paternal house head is
      represented by a single staff.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵת
  chosen: And
  alternatives:
  - and
  - now
  lexicon: HALOT
  rationale: The conjunction continues the LORD's instructions from the previous verse.
    The object marker אֵת is not translated directly in English.
- source_word: שֵׁם
  chosen: name
  lexicon: HALOT
  rationale: Standard rendering; here it refers to inscribing Aaron's personal name
    on the staff.
- source_word: אַהֲרֹן
  chosen: Aaron
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: תִּכְתֹּב
  chosen: you shall write
  alternatives:
  - you are to write
  - write
  lexicon: HALOT
  rationale: Qal imperfect 2ms in instructional context is well rendered as an imperative-future,
    'you shall write,' matching the direct command to Moses.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - upon
  lexicon: HALOT
  rationale: Simple spatial preposition indicating the name is to be written on the
    staff.
- source_word: מַטֵּה
  chosen: staff
  alternatives:
  - rod
  - tribal staff
  lexicon: HALOT
  rationale: מַטֶּה can mean 'staff/rod' and by extension a tribal emblem. In this
    context literal staffs are being collected as representatives of tribes, so 'staff'
    preserves both the concrete object and its representative function better than
    the more archaic 'rod'.
- source_word: לֵוִי
  chosen: Levi
  rationale: Tribal/personal name transliterated. 'the staff of Levi' means the staff
    representing the tribe of Levi.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for writing Aaron's name on Levi's staff.
- source_word: מַטֶּה אֶחָד
  chosen: one staff
  alternatives:
  - a single staff
  - one rod
  lexicon: HALOT
  rationale: Expresses the rule that only one representative staff is to be taken
    per paternal house head.
- source_word: לְ/רֹאשׁ
  chosen: for the head
  alternatives:
  - for each leader
  - for the chief
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head' and here denotes the leader/chief. 'Head'
    is retained because the following construct phrase clarifies the social unit.
- source_word: בֵּית אֲבוֹתָם
  chosen: their fathers’ house
  alternatives:
  - their ancestral house
  - their family house
  lexicon: HALOT
  rationale: A standard kinship expression for the paternal household/clan unit. 'Fathers’
    house' preserves the formal structure of the Hebrew while remaining understandable
    in English.
