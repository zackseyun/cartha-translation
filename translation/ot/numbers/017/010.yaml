id: NUM.17.10
reference: Numbers 17:10
source:
  edition: WLC
  text: הֵרֹ֗מּוּ מִ/תּוֹךְ֙ הָ/עֵדָ֣ה הַ/זֹּ֔את וַ/אֲכַלֶּ֥ה אֹתָ֖/ם כְּ/רָ֑גַע וַֽ/יִּפְּל֖וּ
    עַל פְּנֵי/הֶֽם־׃
translation:
  text: Rise up from the midst of this congregation, so that I may consume them in
    a moment. And they fell on their faces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Separate yourselves from among this assembly.'
    reason: lexical_alternative
  - marker: b
    text: Or 'destroy them in an instant.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵרֹמּוּ
  chosen: Rise up
  alternatives:
  - Separate yourselves
  - Be lifted up
  - Get away
  lexicon: HALOT
  rationale: From רום in the Niphal imperative plural, here functioning idiomatically
    as a command to remove themselves from among the assembly. 'Rise up' preserves
    the verbal image while fitting the immediate context of separation. 'Separate
    yourselves' is interpretive and possible, but less formally tied to the Hebrew
    wording.
- source_word: מִתּוֹךְ
  chosen: from the midst of
  alternatives:
  - from among
  - out of the middle of
  lexicon: HALOT
  rationale: The phrase marks separation from within the group. 'From the midst of'
    is slightly more formal but natural in English and reflects the Hebrew construction
    closely.
- source_word: הָעֵדָה הַזֹּאת
  chosen: this congregation
  alternatives:
  - this assembly
  - this community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the gathered community of Israel. 'Congregation'
    preserves the corporate sense without over-specifying a cultic meeting; 'assembly'
    is also viable and is preserved as an alternative.
- source_word: וַאֲכַלֶּה
  chosen: so that I may consume
  alternatives:
  - that I may destroy
  - that I may put an end to
  lexicon: HALOT
  rationale: כלה in the Piel can mean to bring to an end, consume, or destroy. 'Consume'
    preserves the vividness and common biblical usage for divine judgment, while still
    communicating total destruction.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring to the congregation.
- source_word: כְּרָגַע
  chosen: in a moment
  alternatives:
  - instantly
  - in an instant
  lexicon: HALOT
  rationale: The phrase denotes extreme brevity of time. 'In a moment' is idiomatic
    and close to the Hebrew.
- source_word: וַיִּפְּלוּ
  chosen: And they fell
  alternatives:
  - Then they fell
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative sequence. 'And they fell' preserves the
    Hebrew narrative flow.
- source_word: עַל פְּנֵיהֶם
  chosen: on their faces
  alternatives:
  - face down
  - with their faces to the ground
  lexicon: HALOT
  rationale: A standard biblical idiom for prostration in fear, intercession, or worship.
    'On their faces' preserves the idiom and its literary resonance.
