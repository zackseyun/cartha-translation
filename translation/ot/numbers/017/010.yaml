theological_decisions:
- issue: Nature of the divine command to Moses and Aaron
  chosen_reading: The command is rendered as a call to separate from the congregation
    before imminent divine judgment, without softening the threat.
  alternative_readings:
  - A less direct command such as 'stand aside' or 'withdraw'
  rationale: The Hebrew presents an urgent imperative followed by God's stated intention
    to consume the people quickly. The translation preserves the severity of divine
    judgment without adding interpretive explanation.
