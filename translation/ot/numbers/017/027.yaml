id: NUM.17.27
reference: Numbers 17:27
source:
  edition: WLC
  text: וַ/יֹּֽאמְרוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אֶל מֹשֶׁ֖ה לֵ/אמֹ֑ר הֵ֥ן גָּוַ֛עְנוּ אָבַ֖דְנוּ
    כֻּלָּ֥/נוּ אָבָֽדְנוּ־׃
translation:
  text: And the sons of Israel said to Moses, “Look, we are dying! We are perishing!
    All of us are perishing!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Behold'; an exclamation of alarm.
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew uses two different verbs in sequence: ''we are dying'' (גוע)
      and ''we are perishing'' (אבד), heightening the people''s panic.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Formal rendering preserves the Hebrew idiom and the corporate identity
    marker. 'Israelites' is smoother English but slightly less transparent to the
    source phrase.
- source_word: וַיֹּאמְרוּ ... לֵאמֹר
  chosen: said ...
  alternatives:
  - spoke ... saying
  lexicon: HALOT
  rationale: Standard narrative introduction. English does not require a wooden 'saying';
    direct quotation after 'said' naturally conveys the function of לֵאמֹר.
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - Surely
  - See
  lexicon: HALOT
  rationale: An attention-getting particle expressing alarm. 'Look' conveys the immediacy
    in readable modern English; 'Behold' is too archaic.
- source_word: גָּוַעְנוּ
  chosen: we are dying
  alternatives:
  - we have expired
  - we are finished
  lexicon: HALOT
  rationale: The verb denotes dying or breathing out one's life. Given the fearful
    outcry and present relevance, English present progressive best captures the force
    rather than a simple past.
- source_word: אָבַדְנוּ
  chosen: we are perishing
  alternatives:
  - we have perished
  - we are ruined
  - we are lost
  lexicon: HALOT
  rationale: אבד here intensifies the sense of destruction/doom. 'Perishing' fits
    the lament context and distinguishes it from גוע rather than flattening both into
    'dying.'
- source_word: כֻּלָּנוּ
  chosen: All of us
  alternatives:
  - we all
  - every one of us
  lexicon: HALOT
  rationale: Placed forward in English for emphasis, matching the Hebrew stress on
    the totality of the people's fear.
- source_word: אָבָדְנוּ
  chosen: are perishing
  alternatives:
  - have perished
  - are ruined
  lexicon: HALOT
  rationale: The repeated verb is retained with the same English gloss for rhetorical
    force and consistency. The repetition communicates panic rather than requiring
    variation for style.
