id: NUM.17.26
reference: Numbers 17:26
source:
  edition: WLC
  text: וַ/יַּ֖עַשׂ מֹשֶׁ֑ה כַּ/אֲשֶׁ֨ר צִוָּ֧ה יְהוָ֛ה אֹת֖/וֹ כֵּ֥ן עָשָֽׂה׃ס
translation:
  text: And Moses did just as the LORD commanded him; so he did.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - made
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make'). In this context of obedience to a
    command, 'did' is the most natural English rendering and matches the following
    resumptive clause.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according to what
  lexicon: HALOT
  rationale: Introduces comparison/conformity with the command. 'Just as' clearly
    conveys exact correspondence, fitting the emphasis on Moses' obedience.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: HALOT
  rationale: צוה commonly denotes authoritative command. 'Commanded' preserves the
    force of divine instruction better than the softer 'instructed.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD.'
- source_word: אֹתוֹ
  chosen: him
  rationale: Direct-object marker with 3ms suffix referring to Moses; rendered by
    the English object pronoun 'him.'
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - accordingly
  lexicon: HALOT
  rationale: כֵּן here resumes and reinforces the preceding statement. 'So' is idiomatic
    modern English and preserves the emphatic confirmation.
- source_word: עָשָׂה
  chosen: he did
  alternatives:
  - he acted
  - he did so
  lexicon: HALOT
  rationale: 'The repeated עשה creates deliberate emphasis: Moses carried out the
    command exactly. ''He did'' preserves the repetition without unnecessary expansion.'
