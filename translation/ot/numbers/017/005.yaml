theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of זָר in priestly context
  chosen_reading: outsider
  alternative_readings:
  - foreigner
  - stranger
  rationale: The warning concerns unauthorized access to priestly service, not ethnicity. This avoids importing a doctrinal or ethnic exclusion beyond the text's cultic restriction.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
