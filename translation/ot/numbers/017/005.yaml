id: NUM.17.5
reference: Numbers 17:5
source:
  edition: WLC
  text: זִכָּר֞וֹן לִ/בְנֵ֣י יִשְׂרָאֵ֗ל לְ֠מַעַן אֲשֶׁ֨ר לֹֽא יִקְרַ֜ב אִ֣ישׁ זָ֗ר אֲ֠שֶׁר לֹ֣א מִ/זֶּ֤רַע אַהֲרֹן֙ ה֔וּא לְ/הַקְטִ֥יר קְטֹ֖רֶת לִ/פְנֵ֣י יְהוָ֑ה וְ/לֹֽא יִהְיֶ֤ה כְ/קֹ֨רַח֙ וְ/כַ֣/עֲדָת֔/וֹ כַּ/אֲשֶׁ֨ר דִּבֶּ֧ר יְהוָ֛ה בְּ/יַד מֹשֶׁ֖ה לֽ/וֹ־־־׃
translation:
  text: as a reminder for the children of Israel, so that no outsider, who is not from the offspring of Aaron, may come near to burn incense before Yahweh, and so that he may not become like Korah and like his company, just as Yahweh spoke by the hand of Moses to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'memorial' or 'remembrance.'
    reason: lexical_alternative
  - marker: b
    text: '''Outsider'' here means a person unauthorized for priestly service, not necessarily a foreigner by ethnicity.'
    reason: cultural_note
  - marker: c
    text: Hebrew 'by the hand of Moses,' an idiom meaning 'through Moses.'
    reason: lexical_alternative
  - marker: d
    text: The final 'to him' likely refers to Aaron.
    reason: alternative_reading
lexical_decisions:
- source_word: זִכָּרוֹן
  chosen: reminder
  alternatives:
  - memorial
  - remembrance
  lexicon: HALOT
  rationale: The noun denotes something serving as a memorial/reminder. In this immediate legal-warning context, 'reminder' is natural modern English while preserving the commemorative force.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: for the children of Israel
  alternatives:
  - for the Israelites
  - for the sons of Israel
  lexicon: HALOT
  rationale: Retains the familial covenantal expression with readable English. 'Children of Israel' is more formally transparent than 'Israelites,' while avoiding the overly literal 'sons' in a mixed-group reference.
- source_word: לְמַעַן אֲשֶׁר
  chosen: so that
  alternatives:
  - in order that
  - for the purpose that
  lexicon: HALOT
  rationale: Expresses purpose clearly and idiomatically in English.
- source_word: יִקְרַב
  chosen: may come near
  alternatives:
  - approach
  - draw near
  lexicon: HALOT
  rationale: The verb commonly means approach/draw near, especially in cultic settings. 'Come near' is clear and preserves the physical-cultic sense.
- source_word: אִישׁ זָר
  chosen: outsider
  alternatives:
  - strange man
  - unauthorized person
  - foreign man
  lexicon: HALOT
  rationale: Here זָר in priestly context means one unauthorized or not belonging to the priestly line, not necessarily ethnically foreign. 'Outsider' captures the exclusion without misleading ethnic overtones.
- source_word: מִזֶּרַע אַהֲרֹן
  chosen: from the offspring of Aaron
  alternatives:
  - of the seed of Aaron
  - from Aaron's descendants
  lexicon: HALOT
  rationale: '''Offspring'' preserves the lineage idea of זֶרַע in contemporary English. ''Seed'' is more literal but less natural here.'
- source_word: לְהַקְטִיר קְטֹרֶת
  chosen: to burn incense
  alternatives:
  - to offer incense
  - to make incense smoke
  lexicon: HALOT
  rationale: Standard cultic idiom in English for this priestly action; concise and accurate.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: Follows the doctrinal default for יְהוָה as 'the LORD' and preserves the cultic spatial sense of לִפְנֵי.
- source_word: וְלֹא יִהְיֶה כְקֹרַח וְכַעֲדָתוֹ
  chosen: and so that he may not become like Korah and like his congregation
  alternatives:
  - and not be like Korah and his company
  - and not become like Korah and his assembly
  lexicon: HALOT
  rationale: The singular verb with comparison warns against sharing Korah's fate/example. 'Congregation' renders עֵדָה well in Pentateuchal usage, though 'company' or 'assembly' are possible.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה בְּיַד מֹשֶׁה לוֹ
  chosen: just as the LORD spoke by the hand of Moses to him
  alternatives:
  - as the LORD said through Moses concerning him
  - just as the LORD spoke through Moses to him
  lexicon: HALOT
  rationale: בְּיַד is a standard idiom for mediated agency, literally 'by the hand of.' Retaining it in slightly idiomatic English preserves the formal texture. The pronoun 'to him' most naturally refers to Aaron in context, though the exact antecedent is not explicit in English.
