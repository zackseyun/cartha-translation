id: NUM.17.17
reference: Numbers 17:17
source:
  edition: WLC
  text: דַּבֵּ֣ר אֶל בְּנֵ֣י יִשְׂרָאֵ֗ל וְ/קַ֣ח מֵֽ/אִתָּ֡/ם מַטֶּ֣ה מַטֶּה֩ לְ/בֵ֨ית
    אָ֜ב מֵ/אֵ֤ת כָּל נְשִֽׂיאֵ/הֶם֙ לְ/בֵ֣ית אֲבֹתָ֔/ם שְׁנֵ֥ים עָשָׂ֖ר מַטּ֑וֹת
    אִ֣ישׁ אֶת שְׁמ֔/וֹ תִּכְתֹּ֖ב עַל מַטֵּֽ/הוּ׀־־־־׃
translation:
  text: Speak to the sons of Israel, and take from them one staff for each father’s
    house, from all their leaders according to their fathers’ houses, twelve staffs.
    Each man’s name you shall write on his staff.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'rod.' The Hebrew מַטֶּה can mean a staff or rod; here a physical staff
      is intended.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Rendered formally as 'the sons of Israel' to preserve the Hebrew idiom
    and the gender-accurate wording of the source, in line with the project's preference
    for gender-accurate translation over flattening to a neutral collective. 'Israelites'
    is possible but less transparent to the underlying expression.
- source_word: מַטֶּה
  chosen: staff
  alternatives:
  - rod
  - tribal staff
  lexicon: HALOT
  rationale: The noun can denote a staff/rod and by extension a tribal unit. Here
    the physical object is in view because names are written on it and it will later
    bud, so 'staff' best captures the concrete referent while remaining natural English.
- source_word: מַטֶּה מַטֶּה לְבֵית אָב
  chosen: one staff for each father’s house
  alternatives:
  - a staff, a staff for a father’s house
  - one rod for each ancestral house
  lexicon: HALOT
  rationale: The distributive repetition מַטֶּה מַטֶּה is represented idiomatically
    in English as 'one staff for each.' 'Father’s house' preserves the clan/ancestral-household
    structure signaled by בֵית אָב more precisely than simply 'family'.
- source_word: נְשִׂיאֵיהֶם
  chosen: their leaders
  alternatives:
  - their chiefs
  - their princes
  lexicon: HALOT
  rationale: נָשִׂיא commonly refers to tribal leaders or chiefs. 'Leaders' is clear
    modern English and fits the social setting without the potentially misleading
    royal nuance of 'princes.'
- source_word: לְבֵית אֲבֹתָם
  chosen: according to their fathers’ houses
  alternatives:
  - by their ancestral houses
  - for their fathers’ houses
  lexicon: HALOT
  rationale: This phrase specifies the organizational basis of the leaders and staffs.
    'According to their fathers’ houses' preserves the clan-based structure and reads
    naturally in context.
- source_word: שְׁנֵים עָשָׂר מַטּוֹת
  chosen: twelve staffs
  alternatives:
  - twelve rods
  lexicon: HALOT
  rationale: Straightforward numerical phrase; 'staffs' maintains consistency with
    the earlier rendering of מַטֶּה.
- source_word: אִישׁ אֶת שְׁמוֹ תִּכְתֹּב
  chosen: Each man’s name you shall write
  alternatives:
  - You shall write each man’s name
  - the name of each man you shall write
  lexicon: HALOT
  rationale: אִישׁ is distributive here, indicating one name per staff. 'Each man’s
    name you shall write' preserves the distributive force and the directness of the
    command.
- source_word: עַל מַטֵּהוּ
  chosen: on his staff
  alternatives:
  - upon his staff
  lexicon: HALOT
  rationale: Simple prepositional phrase referring to the corresponding staff of each
    leader/house. 'On his staff' is natural modern English.
