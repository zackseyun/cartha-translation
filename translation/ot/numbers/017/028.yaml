id: NUM.17.28
reference: Numbers 17:28
source:
  edition: WLC
  text: כֹּ֣ל הַ/קָּרֵ֧ב הַ/קָּרֵ֛ב אֶל מִשְׁכַּ֥ן יְהוָ֖ה יָמ֑וּת הַ/אִ֥ם תַּ֖מְנוּ לִ/גְוֺֽעַ׀־׃ס
translation:
  text: Everyone who comes near, who comes near to the tabernacle of Yahweh, will die. Are we all to perish?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Are we all to die?' The Hebrew uses a different verb here than in 'will die,' which may suggest the sense of being consumed or perishing rather than simply repeating the same verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  chosen: Everyone
  alternatives:
  - All
  - Whoever
  lexicon: HALOT
  rationale: Here כֹּל introduces a sweeping statement about any person who approaches. 'Everyone' gives natural English while preserving the universal force better than a bare 'all' in this context.
- source_word: הַקָּרֵב הַקָּרֵב
  chosen: who comes near, who comes near
  alternatives:
  - who approaches, who approaches
  - everyone drawing near, drawing near
  lexicon: HALOT
  rationale: The doubled participle from קרב is retained with repetition to reflect the emphatic/reiterative Hebrew style. Rendering both occurrences preserves the urgency and fear in the people's speech rather than smoothing it away.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  - near
  lexicon: HALOT
  rationale: With קרב and the object 'tabernacle,' 'to' is the most idiomatic English preposition while preserving the directional sense.
- source_word: מִשְׁכַּן
  chosen: tabernacle
  alternatives:
  - dwelling place
  - dwelling
  lexicon: HALOT
  rationale: '''Tabernacle'' is the established and accurate rendering for the sanctuary structure in the wilderness context. ''Dwelling place'' is semantically possible but less specific in this cultic setting.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יָמוּת
  chosen: will die
  alternatives:
  - shall die
  - dies
  lexicon: HALOT
  rationale: The imperfect here expresses the consequence of approaching the sanctuary improperly. 'Will die' is clear modern English and preserves the force of the warning.
- source_word: הַאִם
  chosen: Are ... ?
  alternatives:
  - Shall ... ?
  - Is it that ... ?
  lexicon: HALOT
  rationale: Introduces a rhetorical question. Rendering it as a direct English question best captures the sense.
- source_word: תַּמְנוּ
  chosen: are ... to
  alternatives:
  - shall we be finished
  - will we be consumed
  lexicon: HALOT
  rationale: From תמם in the sense of being finished/completed/used up. In this rhetorical lament, 'Are we all to ... ?' communicates impending total destruction naturally in English.
- source_word: לִגְוֹעַ
  chosen: perish
  alternatives:
  - die
  - expire
  lexicon: HALOT
  rationale: גוע often denotes dying or perishing, sometimes with a nuance of wasting away or meeting one's end. 'Perish' avoids an awkward repetition of 'die' immediately after יָמוּת while still conveying mortal dread.
