theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: Following the translation philosophy's gender-accurate principle, the
    formal familial expression is retained rather than neutralized. In context it
    refers corporately to Israel, but the Hebrew wording is explicitly 'sons.'
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
