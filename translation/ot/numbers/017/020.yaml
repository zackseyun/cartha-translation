id: NUM.17.20
reference: Numbers 17:20
source:
  edition: WLC
  text: וְ/הָיָ֗ה הָ/אִ֛ישׁ אֲשֶׁ֥ר אֶבְחַר בּ֖/וֹ מַטֵּ֣/הוּ יִפְרָ֑ח וַ/הֲשִׁכֹּתִ֣י
    מֵֽ/עָלַ֗/י אֶת תְּלֻנּוֹת֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁ֛ר הֵ֥ם מַלִּינִ֖ם עֲלֵי/כֶֽם־־׃
translation:
  text: And it shall be that the staff of the man whom I choose will bud, and I will
    put an end to the complaints of the sons of Israel against me, which they are
    grumbling against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the Israelites'' or ''the people of Israel.'' Hebrew: ''the sons of
      Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will be
  - Then it shall be
  lexicon: HALOT
  rationale: Uses a standard future-oriented introductory formula for וְהָיָה, preserving
    the formal sense without sounding overly wooden.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the person
  lexicon: HALOT
  rationale: Gender-accurate rendering of the masculine singular noun; here it refers
    to the representative male leader associated with each tribe, so 'man' fits the
    source and context better than a neutral substitute.
- source_word: אֲשֶׁר אֶבְחַר בּוֹ
  chosen: whom I choose
  alternatives:
  - whom I will choose
  - in whom I choose
  lexicon: HALOT
  rationale: Smooth English rendering of the relative clause with בּוֹ. The sense
    is divine selection of the man represented by the staff; 'whom I choose' is idiomatic
    and faithful.
- source_word: מַטֵּהוּ
  chosen: the staff
  alternatives:
  - his staff
  - rod
  lexicon: HALOT
  rationale: מַטֶּה commonly means 'staff/rod' and in this context refers to the tribal
    leader's staff placed before the LORD. 'The staff' is natural in English because
    the following genitive phrase already identifies whose it is; 'rod' is possible
    but less natural in contemporary English.
- source_word: יִפְרָח
  chosen: will bud
  alternatives:
  - will sprout
  - will blossom
  lexicon: HALOT
  rationale: The verb denotes budding/flowering. 'Will bud' best matches the immediate
    sign of life in the staff and is concise; fuller blossoming appears in the following
    verse.
- source_word: וַהֲשִׁכֹּתִי
  chosen: I will put an end to
  alternatives:
  - I will make cease
  - I will quiet
  - I will stop
  lexicon: HALOT
  rationale: Hiphil of שׁכך conveys causing something to subside or cease. 'Put an
    end to' communicates decisive cessation in clear modern English.
- source_word: מֵעָלַי
  chosen: against me
  alternatives:
  - from upon me
  - away from me
  lexicon: HALOT
  rationale: In context the complaints are directed toward God; 'against me' captures
    the adversative force idiomatically better than a more literal but awkward rendering.
- source_word: תְּלֻנּוֹת
  chosen: complaints
  alternatives:
  - murmurings
  - grumblings
  lexicon: HALOT
  rationale: Refers to the people's complaints/murmurings. 'Complaints' is clear modern
    English; the related verb later in the verse carries the more vivid 'grumbling'
    nuance.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Retains the formal covenantal expression and follows the project's gender-accurate
    principle. 'The Israelites' is possible but less transparent to the Hebrew wording.
- source_word: מַלִּינִם
  chosen: are grumbling
  alternatives:
  - are murmuring
  - are complaining
  lexicon: HALOT
  rationale: The Hiphil participle of לון/לין in this context denotes ongoing grumbling
    or murmuring. 'Are grumbling' preserves the durative force and the negative tone.
- source_word: עֲלֵיכֶם
  chosen: against you
  alternatives:
  - about you
  - concerning you
  lexicon: HALOT
  rationale: The preposition עַל here marks hostile complaint directed toward Aaron
    and Moses. 'Against you' best reflects that adversative sense.
