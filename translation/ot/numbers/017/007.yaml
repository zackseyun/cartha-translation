id: NUM.17.7
reference: Numbers 17:7
source:
  edition: WLC
  text: וַ/יְהִ֗י בְּ/הִקָּהֵ֤ל הָֽ/עֵדָה֙ עַל מֹשֶׁ֣ה וְ/עַֽל אַהֲרֹ֔ן וַ/יִּפְנוּ֙ אֶל אֹ֣הֶל מוֹעֵ֔ד וְ/הִנֵּ֥ה כִסָּ֖ה/וּ הֶ/עָנָ֑ן וַ/יֵּרָ֖א כְּב֥וֹד יְהוָֽה־־־׃
translation:
  text: And it happened, when the congregation assembled against Moses and against Aaron, that they turned toward the tent of meeting, and behold, the cloud covered it, and the glory of Yahweh appeared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the cloud covered it''; the pronoun most naturally refers to ''the tent of meeting.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence. 'And it happened' preserves the Hebrew narrative transition without archaic diction like 'came to pass.'
- source_word: בְּהִקָּהֵל
  chosen: when ... assembled
  alternatives:
  - as ... gathered together
  - in the assembling of
  lexicon: HALOT
  rationale: 'The infinitive construct with ב marks temporal circumstance: ''when the congregation assembled.'' ''Assembled'' fits the Niphal sense of gathering together.'
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the community
  - the assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the gathered Israelite community. 'Congregation' is a natural and established rendering in Pentateuchal narrative, preserving the corporate sense.
- source_word: עַל
  chosen: against
  alternatives:
  - concerning
  - toward
  lexicon: HALOT
  rationale: In context of hostile gathering against Moses and Aaron, עַל is best rendered 'against,' reflecting opposition rather than mere orientation.
- source_word: וַיִּפְנוּ
  chosen: they turned
  alternatives:
  - they faced
  - they turned their attention
  lexicon: HALOT
  rationale: פנה here denotes physical turning/orienting. 'They turned toward' is straightforward and avoids over-interpreting the action.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tabernacle
  lexicon: HALOT
  rationale: This is the standard designation for the sanctuary structure in the wilderness. 'Tent of meeting' translates both elements directly; 'tabernacle' is more interpretive and less formally tied to the Hebrew phrase.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and suddenly
  lexicon: HALOT
  rationale: הִנֵּה draws attention to a dramatic sight. 'Behold' preserves the deictic force and solemnity better than more colloquial options.
- source_word: כִסָּהוּ
  chosen: covered it
  alternatives:
  - had covered it
  - covered
  lexicon: HALOT
  rationale: The verb means 'covered,' with the 3ms suffix referring back to the tent of meeting. Explicit 'it' is required in English to represent the pronominal suffix.
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: A direct rendering. In context this is the visible cloud associated with the divine presence, but the text itself simply says 'the cloud.'
- source_word: וַיֵּרָא
  chosen: appeared
  alternatives:
  - was seen
  - became visible
  lexicon: HALOT
  rationale: The Niphal of ראה here expresses visible manifestation. 'Appeared' is idiomatic English for a theophanic manifestation.
- source_word: כְּבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: This phrase denotes the manifest splendor/presence of God. 'The glory of the LORD' preserves the familiar biblical expression and its theological weight.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
