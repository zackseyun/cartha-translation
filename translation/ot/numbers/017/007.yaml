theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of the suffix in כִסָּהוּ
  chosen_reading: the cloud covered the tent of meeting
  alternative_readings:
  - the cloud covered the congregation/scene
  rationale: The masculine singular suffix most naturally refers to the nearest masculine singular antecedent, 'tent' (אֹהֶל). This also matches the narrative pattern of the cloud covering the sanctuary as a sign of divine presence.
