id: NUM.17.23
reference: Numbers 17:23
source:
  edition: WLC
  text: וַ/יְהִ֣י מִֽ/מָּחֳרָ֗ת וַ/יָּבֹ֤א מֹשֶׁה֙ אֶל אֹ֣הֶל הָ/עֵד֔וּת וְ/הִנֵּ֛ה
    פָּרַ֥ח מַטֵּֽה אַהֲרֹ֖ן לְ/בֵ֣ית לֵוִ֑י וַ/יֹּ֤צֵֽא פֶ֨רַח֙ וַ/יָּ֣צֵֽץ צִ֔יץ
    וַ/יִּגְמֹ֖ל שְׁקֵדִֽים־־׃
translation:
  text: 'And it happened on the next day that Moses went into the tent of the testimony,
    and behold, Aaron’s staff for the house of Levi had budded: it brought forth blossoms,
    produced flowers, and ripened almonds.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tent of witness.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'for the house of Levi,' that is, representing the tribe/clan of
      Levi.
    reason: cultural_note
lexical_decisions:
- source_word: מִמָּחֳרָת
  chosen: on the next day
  alternatives:
  - the next day
  - on the morrow
  lexicon: HALOT
  rationale: Temporal expression meaning the following day. 'On the next day' is natural
    modern English while preserving the sequence marked in Hebrew.
- source_word: אֹהֶל הָעֵדוּת
  chosen: the tent of the testimony
  alternatives:
  - the tent of witness
  - the tent of the covenant
  lexicon: HALOT
  rationale: A fairly formal rendering of the established tabernacle designation.
    'Testimony' reflects עֵדוּת directly and preserves the covenantal/legal nuance
    better than the broader 'witness.'
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there it was
  lexicon: HALOT
  rationale: Retains the vivid deictic force of the Hebrew narrative marker, signaling
    surprise and drawing attention to the miracle.
- source_word: פָּרַח
  chosen: had budded
  alternatives:
  - had sprouted
  - had blossomed
  lexicon: HALOT
  rationale: Used of the rod's initial flowering. 'Had budded' fits the plant imagery
    and works well as the first stage in the sequence that follows.
- source_word: מַטֵּה
  chosen: staff
  alternatives:
  - rod
  - branch
  lexicon: HALOT
  rationale: In this context the object is the tribal leader's rod/staff. 'Staff'
    is clear modern English; 'rod' is possible but slightly less natural here.
- source_word: לְבֵית לֵוִי
  chosen: for the house of Levi
  alternatives:
  - for the tribe of Levi
  - belonging to the house of Levi
  lexicon: HALOT
  rationale: The phrase identifies Aaron's staff as representing Levi. 'House of Levi'
    preserves the Hebrew expression while remaining understandable.
- source_word: וַיֹּצֵא פֶרַח
  chosen: it brought forth blossoms
  alternatives:
  - it produced a bloom
  - it put out buds
  lexicon: HALOT
  rationale: The idiom literally 'it brought out blossom' marks a further stage of
    growth. 'Blossoms' distinguishes פֶרַח from the later צִיץ and keeps the progression.
- source_word: וַיָּצֵץ צִיץ
  chosen: produced flowers
  alternatives:
  - bloomed flowers
  - sprouted blooms
  lexicon: HALOT
  rationale: The verb-noun pairing intensifies the flowering image. 'Produced flowers'
    is idiomatic English and preserves the second stage distinct from budding and
    fruiting.
- source_word: וַיִּגְמֹל שְׁקֵדִים
  chosen: ripened almonds
  alternatives:
  - bore ripe almonds
  - produced almonds
  lexicon: HALOT
  rationale: 'The verb conveys maturation to ripeness rather than mere production.
    ''Ripened almonds'' captures the climactic miracle: the dead staff not only budded
    and flowered but reached mature fruit.'
