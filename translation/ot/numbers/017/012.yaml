theological_decisions:
- issue: Rendering of cultic verb כפר
  chosen_reading: made atonement for the people
  alternative_readings:
  - made expiation for the people
  rationale: The verse describes priestly intercession that turns away divine judgment.
    'Made atonement' is the clearest established English equivalent for the priestly
    action, while 'expiation' is a viable but less accessible technical alternative.
    The wording preserves the ritual-theological weight without over-specifying mechanism.
  doctrine_reference: Translation philosophy §6; preserve theological weight in readable
    modern English
- issue: Rendering of קָהָל
  chosen_reading: assembly
  alternative_readings:
  - congregation
  rationale: '''Assembly'' communicates the gathered people of Israel in contemporary
    English without importing specifically ecclesial associations. This is a lexical-theological
    choice because the term can shape how readers imagine the covenant community.'
  doctrine_reference: Translation philosophy §6
