id: NUM.17.12
reference: Numbers 17:12
source:
  edition: WLC
  text: וַ/יִּקַּ֨ח אַהֲרֹ֜ן כַּ/אֲשֶׁ֣ר דִּבֶּ֣ר מֹשֶׁ֗ה וַ/יָּ֨רָץ֙ אֶל תּ֣וֹך הַ/קָּהָ֔ל
    וְ/הִנֵּ֛ה הֵחֵ֥ל הַ/נֶּ֖גֶף בָּ/עָ֑ם וַ/יִּתֵּן֙ אֶֽת הַ/קְּטֹ֔רֶת וַ/יְכַפֵּ֖ר
    עַל הָ/עָֽם׀־־־׃
translation:
  text: So Aaron took it, just as Moses had spoken, and ran into the midst of the
    assembly. And behold, the plague had begun among the people, so he put on the
    incense and made atonement for the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'congregation' for 'assembly.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he placed the incense'; the Hebrew is literally 'he gave/put the incense.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took it
  alternatives:
  - took
  - fetched
  lexicon: HALOT
  rationale: The verb simply means 'took.' English requires an object for natural
    sense in context, supplied from the previous verse (the censer/fire arrangement).
    'Took it' preserves the implied object without over-paraphrasing.
- source_word: כַּאֲשֶׁר דִּבֶּר מֹשֶׁה
  chosen: just as Moses had spoken
  alternatives:
  - as Moses said
  - as Moses had commanded
  lexicon: HALOT
  rationale: דבר is 'speak/say,' not specifically 'command,' though the speech functions
    imperatively in context. 'Had spoken' stays closer to the Hebrew while remaining
    idiomatic.
- source_word: וַיָּרָץ אֶל תּוֹךְ הַקָּהָל
  chosen: ran into the midst of the assembly
  alternatives:
  - ran into the middle of the congregation
  - hurried into the midst of the assembly
  lexicon: HALOT
  rationale: רוץ is straightforwardly 'run.' תּוֹךְ is 'midst/middle.' קָהָל is rendered
    'assembly' as a clear, natural equivalent for the gathered Israelite community;
    'congregation' is possible but more traditional/church-coded in English.
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - and look
  - and indeed
  lexicon: HALOT
  rationale: הִנֵּה marks vivid attention to the scene. 'Behold' preserves the discourse
    force and gravity better than flatter modern options.
- source_word: הֵחֵל הַנֶּגֶף בָּעָם
  chosen: the plague had begun among the people
  alternatives:
  - the plague had started among the people
  - the blow/plague had begun in the people
  lexicon: HALOT
  rationale: נֶגֶף in this context is a divine plague. The perfective sense in narrative
    after הִנֵּה is well conveyed by English pluperfect, 'had begun.' 'Among the people'
    is the natural rendering of בָעָם here.
- source_word: וַיִּתֵּן אֶת הַקְּטֹרֶת
  chosen: he put on the incense
  alternatives:
  - he placed the incense
  - he offered the incense
  lexicon: HALOT
  rationale: נתן literally means 'gave/put.' In the ritual context of incense on the
    firepan, 'put on the incense' best reflects the concrete action without jumping
    directly to the more interpretive 'offered.'
- source_word: וַיְכַפֵּר עַל הָעָם
  chosen: made atonement for the people
  alternatives:
  - made expiation for the people
  - covered the people
  lexicon: HALOT
  rationale: כפר in priestly ritual contexts is best rendered 'make atonement.' This
    is established cultic language and accurately conveys the sacrificial/intercessory
    action without importing later doctrinal precision beyond the text.
