id: NUM.17.21
reference: Numbers 17:21
source:
  edition: WLC
  text: וַ/יְדַבֵּ֨ר מֹשֶׁ֜ה אֶל בְּנֵ֣י יִשְׂרָאֵ֗ל וַ/יִּתְּנ֣וּ אֵלָ֣י/ו כָּֽל
    נְשִֽׂיאֵי/הֶ֡ם מַטֶּה֩ לְ/נָשִׂ֨יא אֶחָ֜ד מַטֶּ֨ה לְ/נָשִׂ֤יא אֶחָד֙ לְ/בֵ֣ית
    אֲבֹתָ֔/ם שְׁנֵ֥ים עָשָׂ֖ר מַטּ֑וֹת וּ/מַטֵּ֥ה אַהֲרֹ֖ן בְּ/ת֥וֹךְ מַטּוֹתָֽ/ם־׀־׃
translation:
  text: So Moses spoke to the sons of Israel, and all their leaders gave him a staff,
    one staff for each leader, according to their fathers’ houses, twelve staffs;
    and Aaron’s staff was among their staffs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads literally 'the sons of Israel,' a
      standard covenantal designation for the people of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb דבר commonly denotes speaking/addressing. 'Spoke' fits the narrative
    introduction naturally and preserves the formal sense better than the more generic
    'said.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Rendered gender-accurately per translation philosophy. The Hebrew is
    literally 'sons of Israel'; while it refers corporately to Israel, this form is
    retained in the main text rather than flattened to 'Israelites.'
- source_word: נְשִׂיאֵיהֶם
  chosen: their leaders
  alternatives:
  - their chiefs
  - their princes
  lexicon: HALOT
  rationale: נָשִׂיא in Pentateuchal tribal contexts refers to recognized tribal leaders.
    'Leaders' is clear modern English; 'princes' is too archaic and potentially misleading.
- source_word: מַטֶּה
  chosen: staff
  alternatives:
  - rod
  - tribal staff
  lexicon: HALOT
  rationale: In this context the object physically given is a staff/rod used as a
    representative token. 'Staff' is natural modern English and avoids the archaic
    feel of 'rod.'
- source_word: מַטֶּה לְנָשִׂיא אֶחָד ... מַטֶּה לְנָשִׂיא אֶחָד
  chosen: a staff, one staff for each leader
  alternatives:
  - a rod for one prince, a rod for one prince
  - one staff per leader
  lexicon: HALOT
  rationale: The repeated phrase is distributive, emphasizing one staff from each
    leader. English smooths the repetition while preserving the distributive force.
- source_word: לְבֵית אֲבֹתָם
  chosen: according to their fathers’ houses
  alternatives:
  - by their ancestral houses
  - for their fathers' house
  lexicon: HALOT
  rationale: This phrase marks tribal/clan representation by paternal household line.
    'According to their fathers’ houses' preserves the social-kinship structure with
    readable English.
- source_word: שְׁנֵים עָשָׂר מַטּוֹת
  chosen: twelve staffs
  alternatives:
  - twelve rods
  lexicon: HALOT
  rationale: Straightforward numerical phrase; 'staffs' matches the chosen rendering
    of מַטֶּה for consistency.
- source_word: וּמַטֵּה אַהֲרֹן בְּתוֹךְ מַטּוֹתָם
  chosen: and Aaron’s staff was among their staffs
  alternatives:
  - with Aaron's staff among their staffs
  - and Aaron's rod was in the midst of their rods
  lexicon: HALOT
  rationale: The verbless clause is rendered with 'was' in English. בְּתוֹךְ means
    'in the midst of/among'; 'among' is idiomatic and preserves the sense that Aaron's
    staff was included with the others.
