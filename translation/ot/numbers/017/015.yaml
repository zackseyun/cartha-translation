theological_decisions:
- issue: Implied divine agency in the stopping of the plague
  chosen_reading: Retain the passive 'had been stopped' without making God the explicit
    subject in the translation.
  alternative_readings:
  - and the LORD stopped the plague
  - and the plague was restrained
  rationale: The Hebrew uses a passive/Niphal form and does not explicitly name the
    agent in this clause. Given the immediate context, divine agency is understood,
    but the translation should not import an explicit subject the text does not state.
    This preserves the text's wording and theological restraint.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
