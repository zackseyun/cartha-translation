id: NUM.17.15
reference: Numbers 17:15
source:
  edition: WLC
  text: וַ/יָּ֤שָׁב אַהֲרֹן֙ אֶל מֹשֶׁ֔ה אֶל פֶּ֖תַח אֹ֣הֶל מוֹעֵ֑ד וְ/הַ/מַּגֵּפָ֖ה
    נֶעֱצָֽרָה־־׃פ
translation:
  text: Then Aaron returned to Moses at the entrance of the tent of meeting, and the
    plague had been stopped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was stopped,' 'was restrained,' or 'was checked.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: Then Aaron returned
  alternatives:
  - And Aaron returned
  - So Aaron returned
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative; 'Then' gives natural English
    narrative flow while preserving sequence. שׁוּב here means 'return' in a straightforward
    spatial sense.
- source_word: אֶל מֹשֶׁה
  chosen: to Moses
  alternatives:
  - back to Moses
  lexicon: HALOT
  rationale: אֶל marks motion toward Moses. 'To Moses' is sufficient; 'back' is implied
    by 'returned' and need not be repeated.
- source_word: אֶל פֶּתַח אֹהֶל מוֹעֵד
  chosen: at the entrance of the tent of meeting
  alternatives:
  - to the entrance of the tent of meeting
  - at the doorway of the tent of meeting
  lexicon: HALOT
  rationale: פֶּתַח is 'entrance/opening.' Because English idiom after 'returned to
    Moses' naturally locates them there, 'at the entrance' best conveys the sense
    without awkward repetition of 'to.' 'Tent of meeting' is the standard transparent
    rendering of אֹהֶל מוֹעֵד.
- source_word: הַמַּגֵּפָה
  chosen: the plague
  alternatives:
  - the outbreak
  - the pestilence
  lexicon: HALOT
  rationale: מַגֵּפָה commonly denotes a plague or deadly blow from God in judgment
    contexts. 'Plague' is the clearest and most established English equivalent here.
- source_word: נֶעֱצָרָה
  chosen: had been stopped
  alternatives:
  - was stopped
  - was restrained
  - was checked
  lexicon: HALOT
  rationale: The Niphal of עצר here indicates that the plague was brought to a halt.
    'Had been stopped' fits the narrative context following Aaron's successful intercession
    and reads naturally in English; the passive preserves the Hebrew form without
    specifying an explicit agent in the clause.
