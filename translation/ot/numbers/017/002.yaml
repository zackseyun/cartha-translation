id: NUM.17.2
reference: Numbers 17:2
source:
  edition: WLC
  text: אֱמֹ֨ר אֶל אֶלְעָזָ֜ר בֶּן אַהֲרֹ֣ן הַ/כֹּהֵ֗ן וְ/יָרֵ֤ם אֶת הַ/מַּחְתֹּת֙
    מִ/בֵּ֣ין הַ/שְּׂרֵפָ֔ה וְ/אֶת הָ/אֵ֖שׁ זְרֵה הָ֑לְאָה כִּ֖י קָדֵֽשׁוּ־־־־־׃
translation:
  text: Tell Eleazar son of Aaron the priest to lift the censers out from among the
    burning, and scatter the fire farther away, for they have become holy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'firepans' for 'censers.' The Hebrew term refers to vessels used to carry
      coals/incense.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''for they are holy.'' The Hebrew perfect may emphasize the resulting
      state: ''they have become holy.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  chosen: Tell
  alternatives:
  - Say
  lexicon: HALOT
  rationale: Imperative of אמר introducing direct instruction. 'Tell' is natural modern
    English for commanding Moses to address Eleazar.
- source_word: אֶלְעָזָר בֶּן אַהֲרֹן הַכֹּהֵן
  chosen: Eleazar son of Aaron the priest
  alternatives:
  - Eleazar, the son of Aaron the priest
  lexicon: HALOT
  rationale: Personal names are transliterated; appositional phrase retained straightforwardly.
    'The priest' most naturally modifies Aaron in the Hebrew chain, though in context
    Eleazar is also priestly.
- source_word: וְיָרֵם
  chosen: to lift
  alternatives:
  - and let him raise
  - and he shall take up
  lexicon: HALOT
  rationale: Jussive after imperative gives the content of what Moses is to tell Eleazar.
    English infinitive 'to lift' smoothly conveys the commanded action without awkwardness.
- source_word: הַמַּחְתֹּת
  chosen: the censers
  alternatives:
  - the firepans
  lexicon: HALOT
  rationale: מחתה refers to a censer/firepan used for incense and coals. 'Censers'
    is the more familiar cultic term in English; 'firepans' is possible but less precise
    for this context.
- source_word: מִבֵּין הַשְּׂרֵפָה
  chosen: out from among the burning
  alternatives:
  - from among the blaze
  - from among the burnt remains
  lexicon: HALOT
  rationale: שׂרפה here denotes the burning/burned area resulting from divine fire.
    'Out from among the burning' preserves the concrete image while remaining readable.
    'Burnt remains' is interpretive and less immediate.
- source_word: וְאֶת הָאֵשׁ זְרֵה הָלְאָה
  chosen: and scatter the fire farther away
  alternatives:
  - and scatter the fire yonder
  - and scatter the coals at a distance
  lexicon: HALOT
  rationale: זרה means scatter/winnow; with האש it likely refers to dispersing the
    fire/coals away from the holy censers. הָלְאָה adds the sense of farther off/away.
    'Farther away' communicates the adverb clearly in modern English.
- source_word: כִּי קָדֵשׁוּ
  chosen: for they have become holy
  alternatives:
  - for they are holy
  - because they were made holy
  lexicon: HALOT
  rationale: Perfect plural refers most naturally to the censers, not the fire, since
    the censers were offered before the LORD and thus acquired holiness. 'Have become
    holy' captures resultant state from prior consecrating contact.
