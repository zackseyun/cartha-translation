theological_decisions:
- issue: Referent of the plural verb in כִּי קָדֵשׁוּ
  chosen_reading: The plural refers to the censers
  alternative_readings:
  - The plural refers to the censers and the fire together
  - The plural refers implicitly to the objects associated with the offering more
    broadly
  rationale: 'The nearest suitable plural antecedent is הַמַּחְתֹּת (''the censers'').
    This also fits the narrative logic: the censers are preserved because they have
    become holy through presentation before the LORD, whereas the fire is to be scattered
    away.'
