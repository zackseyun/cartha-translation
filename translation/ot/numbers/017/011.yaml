theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the covenant name as 'the LORD,' following
    the stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic verb כפר in priestly context
  chosen_reading: make atonement for them
  alternative_readings:
  - make expiation for them
  rationale: The verse describes priestly ritual action to halt divine judgment. 'Make
    atonement' best preserves the established theological sense without importing
    a narrower doctrinal theory beyond the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
