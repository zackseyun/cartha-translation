id: NUM.17.11
reference: Numbers 17:11
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר מֹשֶׁ֜ה אֶֽל אַהֲרֹ֗ן קַ֣ח אֶת הַ֠/מַּחְתָּה וְ/תֶן עָלֶ֨י/הָ
    אֵ֜שׁ מֵ/עַ֤ל הַ/מִּזְבֵּ֨חַ֙ וְ/שִׂ֣ים קְטֹ֔רֶת וְ/הוֹלֵ֧ךְ מְהֵרָ֛ה אֶל הָ/עֵדָ֖ה
    וְ/כַפֵּ֣ר עֲלֵי/הֶ֑ם כִּֽי יָצָ֥א הַ/קֶּ֛צֶף מִ/לִּ/פְנֵ֥י יְהוָ֖ה הֵחֵ֥ל הַ/נָּֽגֶף־־־־־׃
translation:
  text: Then Moses said to Aaron, “Take the censer, and put fire from upon the altar
    in it, and put incense on it, and go quickly to the congregation and make atonement
    for them, because wrath has gone out from before the LORD; the plague has begun.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the firepan.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'from before the LORD,' that is, from his presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּחְתָּה
  chosen: the censer
  alternatives:
  - the firepan
  lexicon: HALOT
  rationale: Refers to the vessel used for carrying coals/incense in priestly service.
    'Censer' is the clearest natural English equivalent in this cultic context; 'firepan'
    is possible but less idiomatic here.
- source_word: וְתֶן עָלֶיהָ אֵשׁ מֵעַל הַמִּזְבֵּחַ
  chosen: put fire from upon the altar in it
  alternatives:
  - put fire from the altar on it
  lexicon: HALOT
  rationale: The Hebrew literally says to place fire on/into the censer from upon
    the altar. English idiom prefers 'in it' for a container, while retaining the
    source of the fire from the altar.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard cultic term for incense; straightforward rendering.
- source_word: וְהוֹלֵךְ מְהֵרָה
  chosen: go quickly
  alternatives:
  - hurry
  - go in haste
  lexicon: HALOT
  rationale: Combines the imperative of motion with the adverbial sense of urgency.
    'Go quickly' preserves both the action and urgency in readable English.
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the assembly
  - the community
  lexicon: HALOT
  rationale: In Numbers this term commonly denotes the gathered Israelite community
    in a formal covenantal setting. 'Congregation' preserves that corporate sense
    better than the more generic 'community'.
- source_word: וְכַפֵּר עֲלֵיהֶם
  chosen: make atonement for them
  alternatives:
  - make expiation for them
  lexicon: HALOT
  rationale: כפר in priestly contexts is a key sacrificial term. 'Make atonement'
    is the established and most accessible rendering without flattening the cultic-theological
    force.
- source_word: הַקֶּצֶף
  chosen: wrath
  alternatives:
  - anger
  - fury
  lexicon: HALOT
  rationale: Denotes divine outburst of anger/judgment. 'Wrath' best conveys the solemn
    judicial force in this context.
- source_word: מִלִּפְנֵי יְהוָה
  chosen: from before the LORD
  alternatives:
  - from the presence of the LORD
  - from the LORD
  lexicon: HALOT
  rationale: The phrase literally means 'from before the face/presence of YHWH.' 'From
    before the LORD' preserves the Hebrew imagery and solemnity while remaining understandable.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: הֵחֵל הַנָּגֶף
  chosen: the plague has begun
  alternatives:
  - the blow has begun
  - the pestilence has started
  lexicon: HALOT
  rationale: נֶגֶף here refers to a divinely sent deadly outbreak among the people.
    'Plague' is the most natural and contextually precise English rendering.
