id: NUM.17.8
reference: Numbers 17:8
source:
  edition: WLC
  text: וַ/יָּבֹ֤א מֹשֶׁה֙ וְ/אַהֲרֹ֔ן אֶל פְּנֵ֖י אֹ֥הֶל מוֹעֵֽד־׃פ
translation:
  text: Then Moses and Aaron came before the Tent of Meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'to the face of the Tent of Meeting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: Then came
  alternatives:
  - and came
  - entered
  lexicon: HALOT
  rationale: Wayyiqtol of בוא advances the narrative with past tense force. English
    smooths the singular verb with the compound subject by rendering the clause naturally
    as 'Then Moses and Aaron came.' 'Entered' is too specific because the following
    phrase is 'before the face of,' not necessarily into the tent.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: וְאַהֲרֹן
  chosen: and Aaron
  rationale: Conjunction plus standard English transliteration of the personal name.
- source_word: אֶל־פְּנֵי
  chosen: before
  alternatives:
  - to the front of
  - into the presence of
  lexicon: HALOT
  rationale: The idiom אֶל־פְּנֵי literally means 'to/before the face of' and commonly
    denotes approaching or standing before something/someone. 'Before' is the most
    natural concise English equivalent here.
- source_word: אֹהֶל מוֹעֵד
  chosen: the Tent of Meeting
  alternatives:
  - the tent of meeting
  - the meeting tent
  lexicon: HALOT
  rationale: Established rendering of the tabernacle-related term that preserves the
    construct relationship and cultic sense. Capitalization is appropriate because
    it refers to the specific sanctuary structure, not a generic tent.
