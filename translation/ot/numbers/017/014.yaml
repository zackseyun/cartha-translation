id: NUM.17.14
reference: Numbers 17:14
source:
  edition: WLC
  text: וַ/יִּהְי֗וּ הַ/מֵּתִים֙ בַּ/מַּגֵּפָ֔ה אַרְבָּעָ֥ה עָשָׂ֛ר אֶ֖לֶף וּ/שְׁבַ֣ע
    מֵא֑וֹת מִ/לְּ/בַ֥ד הַ/מֵּתִ֖ים עַל דְּבַר קֹֽרַח־־׃
translation:
  text: Now those who died in the plague were fourteen thousand seven hundred, besides
    those who died because of Korah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on account of Korah' or 'in the matter of Korah.' The phrase refers
      to those who had already died in connection with Korah's rebellion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: Now ... were
  alternatives:
  - And ... were
  lexicon: HALOT
  rationale: The waw-consecutive with היה introduces the tally/result in narrative
    sequence. 'Now ... were' gives natural English while preserving the narrative
    continuation; 'and ... were' is possible but less idiomatic here.
- source_word: הַמֵּתִים
  chosen: those who died
  alternatives:
  - the dead
  lexicon: HALOT
  rationale: The participle from מות can be rendered substantivally as 'the dead'
    or 'those who died.' Here 'those who died' reads more naturally with the following
    numerical total and avoids sounding like a static category rather than the victims
    just counted.
- source_word: בַּמַּגֵּפָה
  chosen: in the plague
  alternatives:
  - by the plague
  - in the affliction
  lexicon: HALOT
  rationale: מגפה commonly denotes a plague or deadly outbreak. 'In the plague' is
    a close rendering of the preposition and fits the context of deaths occurring
    during the divinely sent plague.
- source_word: אַרְבָּעָה עָשָׂר אֶלֶף וּשְׁבַע מֵאוֹת
  chosen: fourteen thousand seven hundred
  lexicon: HALOT
  rationale: Straightforward cardinal number sequence rendered in standard contemporary
    English style.
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - apart from
  - in addition to
  lexicon: HALOT
  rationale: מִלְּבַד marks exclusion from the stated total. 'Besides' is concise
    and idiomatic in English for a numerical exception/addition.
- source_word: הַמֵּתִים
  chosen: those who died
  alternatives:
  - the dead
  lexicon: HALOT
  rationale: Repeated participle rendered consistently with the first occurrence for
    clarity and stylistic coherence.
- source_word: עַל דְּבַר קֹרַח
  chosen: because of Korah
  alternatives:
  - on account of Korah
  - in the matter of Korah
  - for the sake of Korah
  lexicon: HALOT
  rationale: The phrase על דבר often means 'because of,' 'on account of,' or 'with
    regard to' a matter/person. In this context it refers to those who died in connection
    with Korah's rebellion, so 'because of Korah' communicates the causal connection
    most clearly in natural English.
