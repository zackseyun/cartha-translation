theological_decisions:
- issue: Scope of the deaths associated with Korah
  chosen_reading: The verse distinguishes plague victims from the earlier deaths connected
    with Korah's rebellion without specifying further categories in the main text.
  alternative_readings:
  - '''those who died in the affair of Korah'''
  - '''those who died on account of Korah'''
  rationale: The Hebrew עַל דְּבַר קֹרַח points back to the prior judgment associated
    with Korah. The translation should preserve the distinction between the 14,700
    plague deaths and the earlier deaths, but should not over-specify beyond the text
    itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
