theological_decisions:
- issue: Referent of the pronominal suffix in יְכַסֶּנּוּ
  chosen_reading: the cloud would cover 'it,' referring to the tabernacle/dwelling
  alternative_readings:
  - the cloud would cover 'him'
  rationale: Hebrew 3ms suffix can be rendered 'him/it,' but the immediate context
    concerns the tabernacle/tent being covered by the cloud. Rendering 'it' avoids
    personifying the referent and best matches the narrative setting.
