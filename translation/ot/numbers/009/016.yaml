id: NUM.9.16
reference: Numbers 9:16
source:
  edition: WLC
  text: כֵּ֚ן יִהְיֶ֣ה תָמִ֔יד הֶ/עָנָ֖ן יְכַסֶּ֑/נּוּ וּ/מַרְאֵה אֵ֖שׁ לָֽיְלָה־׃
translation:
  text: 'So it was continually: the cloud would cover it, and the appearance of fire
    by night.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'what looked like fire by night.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  chosen: So
  alternatives:
  - Thus
  - In this way
  lexicon: HALOT
  rationale: Introduces a summary or continuation of the described pattern. 'So' is
    natural modern English and preserves the demonstrative force without sounding
    stiff.
- source_word: יִהְיֶה
  chosen: it was
  alternatives:
  - it would be
  - it remained
  lexicon: HALOT
  rationale: Though formally imperfect, in context it describes customary past action
    during Israel's wilderness period. English simple past with the adverbial 'continually'
    communicates the ongoing customary state idiomatically.
- source_word: תָמִיד
  chosen: continually
  alternatives:
  - continually so
  - always
  - regularly
  lexicon: HALOT
  rationale: Marks the persistent, ongoing nature of the phenomenon. 'Continually'
    best conveys durative constancy in readable English.
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Definite noun referring to the known cloud associated with the tabernacle
    in the immediate context.
- source_word: יְכַסֶּנּוּ
  chosen: would cover it
  alternatives:
  - covered it
  - would cover him
  lexicon: HALOT
  rationale: The verb means 'cover, conceal.' The suffix most naturally refers to
    the tabernacle/dwelling described in context, so 'it' is preferable in English.
    'Would cover' reflects the habitual sense of the imperfect in narrative summary.
- source_word: וּמַרְאֵה אֵשׁ
  chosen: and the appearance of fire
  alternatives:
  - and an appearance of fire
  - and what looked like fire
  lexicon: HALOT
  rationale: מַרְאֶה denotes visible appearance or sight. 'The appearance of fire'
    preserves the wording closely while remaining clear; it avoids over-interpreting
    whether this was literal fire or fire-like appearance.
- source_word: לָיְלָה
  chosen: by night
  alternatives:
  - at night
  - during the night
  lexicon: HALOT
  rationale: Idiomatic temporal expression in English matching the Hebrew adverbial
    use and traditional biblical cadence without archaism.
