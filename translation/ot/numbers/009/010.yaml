id: NUM.9.10
reference: Numbers 9:10
source:
  edition: WLC
  text: דַּבֵּ֛ר אֶל בְּנֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר אִ֣ישׁ אִ֣ישׁ כִּי יִהְיֶֽה טָמֵ֣א לָ/נֶ֡פֶשׁ אוֹ֩ בְ/דֶ֨רֶךְ רְחֹקָ֜הׄ לָ/כֶ֗ם א֚וֹ לְ/דֹרֹ֣תֵי/כֶ֔ם וְ/עָ֥שָׂה פֶ֖סַח לַ/יהוָֽה־־־׀׃
translation:
  text: Speak to the sons of Israel, saying, ‘If any man is unclean because of a dead body, or is on a distant journey, whether among you or throughout your generations, he shall keep the Passover to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Israel'; the phrase refers to the Israelite community as a whole.
    reason: lexical_alternative
  - marker: b
    text: Or 'unclean because of a corpse.' The Hebrew idiom literally says 'unclean for a person/soul' and in this legal context refers to corpse impurity.
    reason: lexical_alternative
  - marker: c
    text: Or 'throughout your generations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Imperative of דבר introducing divine instruction to Moses; 'Speak' is the standard direct equivalent and fits the formal tone.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Per gender-accurate policy, the masculine form is preserved in the main text rather than flattened to 'Israelites,' though the phrase is corporately inclusive.
- source_word: אִישׁ אִישׁ
  chosen: If any man
  alternatives:
  - Any man
  - Whoever
  lexicon: HALOT
  rationale: The repetition is distributive/intensive, meaning 'any individual man' or 'whoever.' 'If any man' preserves the masculine singular and the case-by-case force in readable English.
- source_word: טָמֵא לָנֶפֶשׁ
  chosen: unclean by a dead body
  alternatives:
  - unclean because of a corpse
  - unclean for a person
  lexicon: HALOT
  rationale: In priestly/legal contexts, נֶפֶשׁ in this construction is an idiom for a dead person/corpse causing ritual impurity, not merely 'person' in general. 'By a dead body' communicates the source of impurity naturally.
- source_word: בְדֶרֶךְ רְחֹקָה
  chosen: on a distant journey
  alternatives:
  - on a far journey
  - on a distant road
  lexicon: HALOT
  rationale: The phrase denotes being away from the sanctuary/community because of travel. 'On a distant journey' is idiomatic English and captures the practical sense better than the more wooden 'in a distant way/road.'
- source_word: לָכֶם
  chosen: among you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: Here the prepositional phrase qualifies the scope of the rule for the present community. 'Among you' expresses communal applicability more clearly than the literal but less natural 'for you.'
- source_word: לְדֹרֹתֵיכֶם
  chosen: among your generations
  alternatives:
  - throughout your generations
  - for your generations
  lexicon: HALOT
  rationale: The phrase extends the rule beyond the immediate audience to future descendants. 'Among your generations' keeps the parallel with 'among you,' though the sense is durative across generations.
- source_word: וְעָשָׂה פֶסַח
  chosen: he shall still keep the Passover
  alternatives:
  - he shall observe the Passover
  - he shall do the Passover
  lexicon: HALOT
  rationale: עשה with Passover is an idiom meaning to observe/keep the Passover. 'Keep the Passover' is natural English; 'still' brings out that the person remains obligated despite impurity or travel, anticipating the provision explained in the following verse.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' per doctrine. The preposition marks the Passover as directed to/for YHWH; 'to the LORD' is a straightforward rendering.
