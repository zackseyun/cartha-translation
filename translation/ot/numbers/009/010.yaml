theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered covenantal address
  chosen_reading: the sons of Israel / any man
  alternative_readings:
  - the Israelites / anyone
  rationale: The Hebrew uses masculine forms with representative force. Per translation policy, gender-accurate renderings are preferred over gender-neutral flattening, while the inclusive legal scope can be noted in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
