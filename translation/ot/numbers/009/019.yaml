id: NUM.9.19
reference: Numbers 9:19
source:
  edition: WLC
  text: וּ/בְ/הַאֲרִ֧יךְ הֶֽ/עָנָ֛ן עַל הַ/מִּשְׁכָּ֖ן יָמִ֣ים רַבִּ֑ים וְ/שָׁמְר֧וּ בְנֵי יִשְׂרָאֵ֛ל אֶת מִשְׁמֶ֥רֶת יְהוָ֖ה וְ/לֹ֥א יִסָּֽעוּ־־־׃
translation:
  text: When the cloud remained over the tabernacle for many days, the sons of Israel kept the charge of Yahweh and did not set out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'kept the LORD’s requirement' or 'kept the LORD’s charge.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְהַאֲרִיךְ
  chosen: When ... remained
  alternatives:
  - and when ... stayed long
  - when ... prolonged its stay
  lexicon: HALOT
  rationale: The construction with ב + infinitive construct of אָרַךְ introduces a temporal clause, literally 'and when the cloud made long/continued.' In idiomatic English, 'when the cloud remained' best captures the sense of extended duration without awkwardness.
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Straightforward reference to the visible cloud associated with the LORD's guidance in the wilderness context.
- source_word: עַל הַמִּשְׁכָּן
  chosen: over the tabernacle
  alternatives:
  - upon the tabernacle
  - over the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן is commonly rendered 'tabernacle' in this wilderness-sanctuary context. 'Over' is natural for עַל describing the cloud's position.
- source_word: יָמִים רַבִּים
  chosen: for many days
  alternatives:
  - many days
  - a long time
  lexicon: HALOT
  rationale: This phrase expresses extended duration. 'For many days' reads naturally in English with the preceding verb.
- source_word: וְשָׁמְרוּ
  chosen: kept
  alternatives:
  - observed
  - guarded
  lexicon: HALOT
  rationale: שׁמר here governs מִשְׁמֶרֶת and conveys careful observance/keeping rather than physical guarding alone. 'Kept' preserves the Hebrew idiom concisely.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural construct is preserved as 'sons of Israel.' While 'Israelites' is idiomatic, this rendering more closely reflects the source form and familial-covenantal language.
- source_word: אֶת מִשְׁמֶרֶת יְהוָה
  chosen: the charge of the LORD
  alternatives:
  - the requirement of the LORD
  - the obligation given by the LORD
  - the LORD's command
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת denotes a charge, duty, or obligation to be kept. 'The charge of the LORD' preserves the covenantal nuance better than the flatter 'command.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְלֹא יִסָּעוּ
  chosen: and did not set out
  alternatives:
  - and did not journey
  - and did not break camp
  lexicon: HALOT
  rationale: נסע in this wilderness-travel context means to pull up camp and depart. 'Set out' is clear modern English and fits the narrative flow.
