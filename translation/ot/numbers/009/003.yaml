id: NUM.9.3
reference: Numbers 9:3
source:
  edition: WLC
  text: בְּ/אַרְבָּעָ֣ה עָשָֽׂר י֠וֹם בַּ/חֹ֨דֶשׁ הַ/זֶּ֜ה בֵּ֧ין הָֽ/עֲרְבַּ֛יִם
    תַּעֲשׂ֥וּ אֹת֖/וֹ בְּ/מוֹעֲד֑/וֹ כְּ/כָל חֻקֹּתָ֥י/ו וּ/כְ/כָל מִשְׁפָּטָ֖י/ו
    תַּעֲשׂ֥וּ אֹתֽ/וֹ־־־׃
translation:
  text: On the fourteenth day of this month, between the evenings, you shall keep
    it at its appointed time; according to all its statutes and according to all its
    ordinances you shall keep it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'between the evenings,' a traditional expression for the period around
      twilight.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאַרְבָּעָה עָשָׂר יוֹם
  chosen: On the fourteenth day
  alternatives:
  - On day fourteen
  - On the fourteenth
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'on fourteen day,' which in natural English
    is 'on the fourteenth day.' This preserves the calendrical specificity without
    awkwardness.
- source_word: בַּחֹדֶשׁ הַזֶּה
  chosen: of this month
  alternatives:
  - in this month
  lexicon: HALOT
  rationale: Linked with the preceding date expression, English idiom prefers 'the
    fourteenth day of this month.'
- source_word: בֵּין הָעַרְבַּיִם
  chosen: between the evenings
  alternatives:
  - at twilight
  - between sunset and dark
  lexicon: HALOT
  rationale: This is a technical Hebrew time expression associated with Passover timing.
    A more interpretive rendering like 'at twilight' is possible, but 'between the
    evenings' better preserves the source wording and its ritual specificity; an explanatory
    alternative is preserved in a footnote.
- source_word: תַּעֲשׂוּ אֹתוֹ
  chosen: you shall keep it
  alternatives:
  - you shall do it
  - you shall observe it
  lexicon: HALOT
  rationale: Although עשה is broadly 'do/make,' with Passover as the object it idiomatically
    means to celebrate/observe/keep it. 'Keep it' is concise, natural, and fits festival
    observance language in English.
- source_word: בְּמוֹעֲדוֹ
  chosen: at its appointed time
  alternatives:
  - in its appointed season
  - at its set time
  lexicon: HALOT
  rationale: מוֹעֵד denotes an appointed time or fixed occasion, especially in cultic/calendar
    contexts. 'At its appointed time' preserves both timing and ritual force.
- source_word: כְּכָל חֻקֹּתָיו
  chosen: according to all its statutes
  alternatives:
  - according to all its prescribed statutes
  - according to all its regulations
  lexicon: HALOT
  rationale: חֻקּוֹת refers to prescribed enactments/statutes. 'Statutes' keeps the
    formal legal-cultic sense.
- source_word: וּכְכָל מִשְׁפָּטָיו
  chosen: and according to all its ordinances
  alternatives:
  - and according to all its rules
  - and according to all its judgments
  lexicon: HALOT
  rationale: מִשְׁפָּטִים in legal/cultic contexts are ordinances or judgments. 'Ordinances'
    distinguishes it from חֻקּוֹת while remaining readable.
- source_word: תַּעֲשׂוּ אֹתוֹ
  chosen: you shall keep it
  alternatives:
  - you shall do it
  - you shall observe it
  lexicon: HALOT
  rationale: The repeated verb-object phrase frames the command. Rendering it consistently
    as 'keep it' reflects the idiomatic sense of observing the Passover and preserves
    the repetition.
