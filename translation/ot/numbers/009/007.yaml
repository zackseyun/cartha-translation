id: NUM.9.7
reference: Numbers 9:7
source:
  edition: WLC
  text: וַ֠/יֹּאמְרוּ הָ/אֲנָשִׁ֤ים הָ/הֵ֨מָּה֙ אֵלָ֔י/ו אֲנַ֥חְנוּ טְמֵאִ֖ים לְ/נֶ֣פֶשׁ
    אָדָ֑ם לָ֣/מָּה נִגָּרַ֗ע לְ/בִלְתִּ֨י הַקְרִ֜ב אֶת קָרְבַּ֤ן יְהוָה֙ בְּ/מֹ֣עֲד֔/וֹ
    בְּ/ת֖וֹךְ בְּנֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: And those men said to him, “We are unclean because of a dead man. Why should
    we be kept from presenting the offering of the LORD at its appointed time among
    the sons of Israel?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “unclean for the soul of a man,” an idiom meaning unclean
      through contact with a human corpse.
    reason: lexical_alternative
  - marker: b
    text: Or “Why should we be excluded from bringing the offering of the LORD...?”
    reason: alternative_reading
  - marker: c
    text: “Sons of Israel” is the Hebrew expression; many English versions render
      it “Israelites.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And ... said
  alternatives:
  - And ... spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר introducing direct speech; 'said'
    is the natural English equivalent.
- source_word: הָאֲנָשִׁים הָהֵמָּה
  chosen: those men
  alternatives:
  - the men, those very ones
  - those men themselves
  lexicon: HALOT
  rationale: The combination of noun plus demonstrative is emphatic/deictic. 'Those
    men' preserves the reference without awkward over-literalism.
- source_word: אֵלָיו
  chosen: to him
  lexicon: HALOT
  rationale: Simple prepositional phrase referring back to Moses in context.
- source_word: טְמֵאִים
  chosen: unclean
  alternatives:
  - impure
  lexicon: HALOT
  rationale: Cultic impurity is in view, so 'unclean' is the standard and clearest
    biblical-English rendering.
- source_word: לְנֶפֶשׁ אָדָם
  chosen: because of a dead man
  alternatives:
  - by a human corpse
  - for a dead person
  - through contact with a dead body
  lexicon: HALOT
  rationale: This idiom in priestly/legal contexts refers to corpse impurity. A too-literal
    'for the soul of a man' would obscure the sense. 'Dead man' is concise and contextually
    accurate, while preserving the singular אדם as 'man' per gender-accurate policy.
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative introducing their protest.
- source_word: נִגָּרַע
  chosen: should we be kept from
  alternatives:
  - should we be diminished
  - should we be excluded
  - should we be deprived
  lexicon: HALOT
  rationale: The Niphal of גרע here conveys being withheld/excluded from participation.
    'Be kept from' communicates the passive sense naturally in English.
- source_word: לְבִלְתִּי הַקְרִב
  chosen: from presenting
  alternatives:
  - from bringing near
  - so as not to present
  lexicon: HALOT
  rationale: The construction expresses prevention from performing the act. הקריב
    in sacrificial context means to present/offer. 'Presenting' fits the syntax with
    'kept from' and avoids redundancy with 'offering' as the object.
- source_word: קָרְבַּן יְהוָה
  chosen: the offering of the LORD
  alternatives:
  - the LORD's offering
  - the gift offering of the LORD
  lexicon: HALOT
  rationale: קָרְבָּן is a sacrificial offering brought to God. 'Offering of the LORD'
    is clear and preserves the genitival relation. Per doctrine, יְהוָה is rendered
    'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD'.
- source_word: בְּמֹעֲדוֹ
  chosen: at its appointed time
  alternatives:
  - in its appointed season
  - at the appointed time for it
  lexicon: HALOT
  rationale: מוֹעֵד here denotes the fixed, prescribed time for the Passover-related
    offering. 'Its appointed time' is idiomatic and precise.
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - among the Israelites
  - in the midst of the sons of Israel
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'sons of Israel.' Per gender-accurate policy,
    this is retained rather than flattened to 'Israelites,' since it is the covenantal
    ethnonym in its standard biblical form.
