theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering, following
    Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering of אָדָם within לְנֶפֶשׁ אָדָם
  chosen_reading: dead man
  alternative_readings:
  - dead person
  - human corpse
  rationale: The phrase is an idiom for corpse impurity, but אדם is singular masculine.
    Following the gender-accurate policy, 'man' is retained rather than neutralizing
    to 'person,' while the idiomatic sense is made clear by 'dead.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם
    *adam*'
