id: NUM.9.22
reference: Numbers 9:22
source:
  edition: WLC
  text: אֽוֹ יֹמַ֜יִם אוֹ חֹ֣דֶשׁ אוֹ יָמִ֗ים בְּ/הַאֲרִ֨יךְ הֶ/עָנָ֤ן עַל הַ/מִּשְׁכָּן֙
    לִ/שְׁכֹּ֣ן עָלָ֔י/ו יַחֲנ֥וּ בְנֵֽי יִשְׂרָאֵ֖ל וְ/לֹ֣א יִסָּ֑עוּ וּ/בְ/הֵעָלֹת֖/וֹ
    יִסָּֽעוּ־־־־־׃
translation:
  text: Whether it was two days, or a month, or a longer time, when the cloud remained
    over the tabernacle, dwelling over it, the sons of Israel would camp and would
    not set out; but when it was lifted up, they would set out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many days' for 'a longer time'; the Hebrew literally reads 'days,' likely
      meaning an extended period in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֽוֹ ... אוֹ ... אוֹ
  chosen: Whether it was ... or ... or ...
  alternatives:
  - Or ... or ... or ...
  - Be it ... or ... or ...
  lexicon: HALOT
  rationale: The repeated disjunctive particle structures a range of possible durations.
    'Whether it was ... or ... or ...' reads naturally in English while preserving
    the Hebrew sequence.
- source_word: יֹמַיִם
  chosen: two days
  alternatives:
  - a couple of days
  lexicon: HALOT
  rationale: Dual form explicitly means 'two days'; the more idiomatic 'a couple of
    days' is less precise than the Hebrew.
- source_word: חֹדֶשׁ
  chosen: a month
  alternatives:
  - month
  lexicon: HALOT
  rationale: Indefinite sense fits the list of possible durations.
- source_word: יָמִים
  chosen: a longer time
  alternatives:
  - days
  - many days
  lexicon: HALOT
  rationale: In this context, after 'two days' and 'a month,' the plural 'days' idiomatically
    denotes an extended period rather than merely repeating 'days.' 'A longer time'
    conveys the sense in clear English. The more literal alternative 'many days' is
    preserved in a footnote.
- source_word: בְּהַאֲרִיךְ
  chosen: when ... remained
  alternatives:
  - when ... prolonged its stay
  - in the prolonging of
  lexicon: HALOT
  rationale: The Hiphil infinitive construct of ארך here expresses duration/continuance.
    Rendering with 'remained' gives natural English tied to the temporal clause, while
    still reflecting the idea of extended duration.
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Standard rendering for the wilderness-guiding cloud.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: Traditional but still clear rendering for the portable sanctuary; context
    in Numbers supports this established gloss.
- source_word: לִשְׁכֹּן עָלָיו
  chosen: dwelling over it
  alternatives:
  - to settle over it
  - resting over it
  lexicon: HALOT
  rationale: The infinitive of שכן expresses the cloud's abiding presence over the
    tabernacle. 'Dwelling over it' preserves the verbal connection with משכן/tabernacle
    and the sense of settled presence.
- source_word: יַחֲנוּ
  chosen: would camp
  alternatives:
  - camped
  - would remain camped
  lexicon: HALOT
  rationale: 'Imperfect here describes customary action in past narrative sequence:
    whenever the cloud stayed, Israel would camp.'
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the Hebrew expression literally. 'The
    Israelites' is smoother but less formally aligned; inclusivity is not the point
    of this phrase here.
- source_word: וְלֹא יִסָּעוּ
  chosen: and would not set out
  alternatives:
  - and would not journey
  - and did not break camp
  lexicon: HALOT
  rationale: נסע in travel contexts means to pull up camp and depart. 'Set out' is
    natural modern English and fits the repeated contrast with the final clause.
- source_word: וּבְהֵעָלֹתוֹ
  chosen: but when it was lifted up
  alternatives:
  - and when it went up
  - when it rose
  lexicon: HALOT
  rationale: The passive-like English reflects the cloud's being taken up from above
    the tabernacle. This matches the immediate context of the cloud lifting as the
    signal to depart.
- source_word: יִסָּעוּ
  chosen: they would set out
  alternatives:
  - they would journey
  - they would depart
  lexicon: HALOT
  rationale: Keeps consistency with the earlier occurrence of נסע in the same verse.
