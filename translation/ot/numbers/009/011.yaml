id: NUM.9.11
reference: Numbers 9:11
source:
  edition: WLC
  text: בַּ/חֹ֨דֶשׁ הַ/שֵּׁנִ֜י בְּ/אַרְבָּעָ֨ה עָשָׂ֥ר י֛וֹם בֵּ֥ין הָ/עַרְבַּ֖יִם
    יַעֲשׂ֣וּ אֹת֑/וֹ עַל מַצּ֥וֹת וּ/מְרֹרִ֖ים יֹאכְלֻֽ/הוּ־׃
translation:
  text: In the second month, on the fourteenth day at twilight, they shall keep it;
    they shall eat it with unleavened bread and bitter herbs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''between the evenings,'' an idiom for the period around sunset
      or twilight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֹדֶשׁ הַשֵּׁנִי
  chosen: In the second month
  alternatives:
  - In the second new moon/month
  lexicon: HALOT
  rationale: חֹדֶשׁ ordinarily means 'month' in calendrical contexts. The prefixed
    preposition and article yield a temporal phrase. 'Second month' is the plain calendrical
    sense.
- source_word: בְּאַרְבָּעָה עָשָׂר יוֹם
  chosen: on the fourteenth day
  alternatives:
  - on day fourteen
  lexicon: HALOT
  rationale: The Hebrew cardinal construction with יוֹם functions idiomatically for
    a date. English naturally renders this as 'on the fourteenth day.'
- source_word: בֵּין הָעַרְבַּיִם
  chosen: at twilight
  alternatives:
  - between the evenings
  - at dusk
  lexicon: HALOT
  rationale: This idiom refers to the time around sunset/twilight. 'At twilight' gives
    clear modern English while preserving the temporal sense. The more literal 'between
    the evenings' is obscure in English and is worth preserving in a footnote as a
    lexical alternative.
- source_word: יַעֲשׂוּ אֹתוֹ
  chosen: they shall keep it
  alternatives:
  - they shall do it
  - they shall observe it
  lexicon: HALOT
  rationale: In Passover context, עשה with the object referring to the Passover means
    to perform/observe/keep it, not merely 'do it.' 'Keep it' is idiomatic English
    for observing a feast and matches the cultic context.
- source_word: עַל מַצּוֹת
  chosen: with unleavened bread
  alternatives:
  - on unleavened breads
  - along with unleavened bread
  lexicon: HALOT
  rationale: Though עַל is literally 'on/upon,' in this eating context it conveys
    accompaniment. מַצּוֹת refers to unleavened bread. 'With unleavened bread' is
    natural and accurate.
- source_word: וּמְרֹרִים
  chosen: and bitter herbs
  alternatives:
  - and bitter things
  lexicon: HALOT
  rationale: The plural noun denotes bitter herbs eaten with the Passover. 'Bitter
    herbs' is the established and contextually precise rendering.
- source_word: יֹאכְלֻהוּ
  chosen: they shall eat it
  lexicon: HALOT
  rationale: Straightforward Qal imperfect with 3ms suffix referring back to the Passover
    meal/lamb. Future/modal 'shall' fits the legal instruction context.
