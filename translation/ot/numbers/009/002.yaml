id: NUM.9.2
reference: Numbers 9:2
source:
  edition: WLC
  text: וְ/יַעֲשׂ֧וּ בְנֵי יִשְׂרָאֵ֛ל אֶת הַ/פָּ֖סַח בְּ/מוֹעֲדֽ/וֹ־־׃
translation:
  text: Let the sons of Israel keep the Passover at its appointed time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or traditionally 'the children of Israel.' The Hebrew
      is literally 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיַעֲשׂוּ
  chosen: Let ... keep
  alternatives:
  - and let ... do
  - and let ... observe
  - and let ... celebrate
  lexicon: HALOT
  rationale: The verb עשה literally means 'do/make,' but with פֶּסַח as its object
    it idiomatically means to observe or keep the Passover. 'Keep' is natural modern
    English and preserves the covenantal/ritual sense without over-paraphrasing. The
    prefixed conjunction plus imperfect here carries a jussive force in context, so
    'Let ... keep' reflects the command value better than a simple future.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with the gender-accurate principle,
    the formal familial expression is retained rather than flattened to 'Israelites.'
    'Children of Israel' is traditional but less precise to the Hebrew form here.
- source_word: הַפָּסַח
  chosen: the Passover
  alternatives:
  - the Passover sacrifice
  - the Passover festival
  lexicon: HALOT
  rationale: פֶּסַח can denote the Passover observance broadly, and in this context
    the command is to observe the Passover. 'The Passover' is the most direct and
    sufficiently broad rendering; more specific options would narrow the sense beyond
    what the verse itself states.
- source_word: בְּמוֹעֲדוֹ
  chosen: at its appointed time
  alternatives:
  - in its appointed season
  - at its set time
  - at the appointed time
  lexicon: HALOT
  rationale: מוֹעֵד denotes an appointed time/meeting/festival time. Here the suffix
    refers to the Passover, so 'its appointed time' best captures the possessive force
    and the calendrical precision required by the context.
