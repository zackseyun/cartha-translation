id: NUM.9.5
reference: Numbers 9:5
source:
  edition: WLC
  text: וַ/יַּעֲשׂ֣וּ אֶת הַ/פֶּ֡סַח בָּ/רִאשׁ֡וֹן בְּ/אַרְבָּעָה֩ עָשָׂ֨ר י֥וֹם לַ/חֹ֛דֶשׁ בֵּ֥ין הָ/עַרְבַּ֖יִם בְּ/מִדְבַּ֣ר סִינָ֑י כְּ֠/כֹל אֲשֶׁ֨ר צִוָּ֤ה יְהוָה֙ אֶת מֹשֶׁ֔ה כֵּ֥ן עָשׂ֖וּ בְּנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: So they kept the Passover in the first month, on the fourteenth day of the month at twilight, in the wilderness of Sinai; according to all that Yahweh had commanded Moses, so the sons of Israel did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''between the evenings,'' an idiom referring to the twilight period.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ / עָשׂוּ
  chosen: kept / did
  alternatives:
  - celebrated / did
  - observed / did
  lexicon: HALOT
  rationale: The verb עשה literally means 'do/make,' but with פֶּסַח the idiom means to keep or observe the Passover. Rendering the first occurrence as 'kept' gives natural English while preserving the ritual sense; the second occurrence is retained as 'did' to reflect the concluding summary 'so ... did.'
- source_word: הַפֶּסַח
  chosen: the Passover
  alternatives:
  - the Passover sacrifice
  - the Passover festival
  lexicon: HALOT
  rationale: פֶּסַח here refers to the Passover observance as a whole in context, not narrowly only the lamb or sacrifice.
- source_word: בָּרִאשׁוֹן
  chosen: in the first month
  alternatives:
  - in the first
  - in the first month of the year
  lexicon: HALOT
  rationale: With the calendrical phrase that follows, English requires 'month' to be supplied for clarity.
- source_word: בְּאַרְבָּעָה עָשָׂר יוֹם לַחֹדֶשׁ
  chosen: on the fourteenth day of the month
  alternatives:
  - on the fourteenth day of this month
  - on day fourteen of the month
  lexicon: HALOT
  rationale: This is the standard Hebrew date formula; 'on the fourteenth day of the month' is clear and formally close.
- source_word: בֵּין הָעַרְבַּיִם
  chosen: at twilight
  alternatives:
  - between the evenings
  - at dusk
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'between the evenings' and refers to the twilight period. 'At twilight' communicates the temporal sense in natural English; the more literal alternative is preserved in a footnote.
- source_word: בְּמִדְבַּר סִינָי
  chosen: in the wilderness of Sinai
  alternatives:
  - in the Sinai wilderness
  - in the desert of Sinai
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert land. 'Wilderness of Sinai' is a standard and transparent rendering.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as everything that
  - in accordance with all that
  lexicon: HALOT
  rationale: This phrase emphasizes full conformity to the command, and 'according to all that' preserves that comprehensiveness.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: 'The pluperfect fits the sequence in English: Israel kept the Passover in accordance with what the LORD had already commanded Moses.'
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Israel.' Following the project's gender-accurate principle, this is retained rather than flattened to 'Israelites,' though the collective sense is clear from context.
