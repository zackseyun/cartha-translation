id: NUM.9.17
reference: Numbers 9:17
source:
  edition: WLC
  text: וּ/לְ/פִ֞י הֵעָלֹ֤ת הֶֽ/עָנָן֙ מֵ/עַ֣ל הָ/אֹ֔הֶל וְ/אַ֣חֲרֵי כֵ֔ן יִסְע֖וּ
    בְּנֵ֣י יִשְׂרָאֵ֑ל וּ/בִ/מְק֗וֹם אֲשֶׁ֤ר יִשְׁכָּן שָׁם֙ הֶֽ/עָנָ֔ן שָׁ֥ם יַחֲנ֖וּ
    בְּנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: Whenever the cloud was lifted from over the tent, after that the sons of Israel
    would set out; and in the place where the cloud settled, there the sons of Israel
    would camp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from over the tabernacle,' since 'the tent' here refers to the tabernacle
      tent.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites.' The Hebrew is literally 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְפִי
  chosen: Whenever
  alternatives:
  - According to
  - At the time of
  lexicon: HALOT
  rationale: The idiom לְפִי + infinitive here marks circumstance/time ('according
    to the lifting of' > 'whenever ... was lifted'). 'Whenever' captures the recurring
    procedural sense in context better than a wooden 'according to.'
- source_word: הֵעָלֹת
  chosen: was lifted
  alternatives:
  - went up
  - rose
  lexicon: HALOT
  rationale: The infinitive construct of עלה with the cloud indicates its being taken
    up from above the tent. Passive English ('was lifted') best reflects the event
    without awkwardness; 'went up' is possible but less natural in this guidance context.
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Standard rendering of ענן in this wilderness-guidance context.
- source_word: מֵעַל הָאֹהֶל
  chosen: from over the tent
  alternatives:
  - from above the tent
  - from over the tabernacle
  lexicon: HALOT
  rationale: מֵעַל is spatial, 'from over/upon.' אֹהֶל is literally 'tent.' Although
    the referent is the tabernacle tent, the Hebrew here says 'the tent,' so that
    is preserved in the main text.
- source_word: וְאַחֲרֵי כֵן
  chosen: after that
  alternatives:
  - afterward
  - then
  lexicon: HALOT
  rationale: This phrase marks sequence. 'After that' preserves the explicit temporal
    progression.
- source_word: יִסְעוּ
  chosen: would set out
  alternatives:
  - set out
  - journeyed
  - broke camp
  lexicon: HALOT
  rationale: In this procedural/habitual context, the imperfect has iterative force.
    'Would set out' conveys repeated customary action better than a simple future.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Following the project's gender-accurate principle, the literal familial
    expression is retained. 'The Israelites' is smoother but less formally transparent;
    'children of Israel' is traditional but less precise in modern English.
- source_word: וּבִמְקוֹם אֲשֶׁר
  chosen: and in the place where
  alternatives:
  - and wherever
  - and at the place where
  lexicon: HALOT
  rationale: This keeps the locative structure explicit. 'Wherever' is possible, but
    'in the place where' more closely follows the Hebrew syntax.
- source_word: יִשְׁכָּן
  chosen: settled
  alternatives:
  - dwelt
  - rested
  - tabernacled
  lexicon: HALOT
  rationale: שׁכן often means 'dwell' or 'settle.' For a cloud coming to rest over
    a location, 'settled' is idiomatic and concrete. 'Dwelt' is too anthropomorphic
    here; 'rested' is possible but less tied to the root's habitation nuance.
- source_word: שָׁם ... שָׁם
  chosen: there ... there
  alternatives:
  - there
  lexicon: HALOT
  rationale: The Hebrew repeats שָׁם for emphasis/correspondence. English can preserve
    this with 'there ... there,' though only one 'there' is strictly necessary. Retaining
    both reflects the source's structure.
- source_word: יַחֲנוּ
  chosen: would camp
  alternatives:
  - camped
  - encamped
  lexicon: HALOT
  rationale: Like יִסְעוּ earlier, the imperfect here is iterative in context. 'Would
    camp' conveys repeated action. 'Encamped' is accurate but slightly archaic for
    the project's style goals.
