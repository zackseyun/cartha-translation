id: NUM.9.21
reference: Numbers 9:21
source:
  edition: WLC
  text: וְ/יֵ֞שׁ אֲשֶׁר יִהְיֶ֤ה הֶֽ/עָנָן֙ מֵ/עֶ֣רֶב עַד בֹּ֔קֶר וְ/נַעֲלָ֧ה הֶֽ/עָנָ֛ן
    בַּ/בֹּ֖קֶר וְ/נָסָ֑עוּ א֚וֹ יוֹמָ֣ם וָ/לַ֔יְלָה וְ/נַעֲלָ֥ה הֶ/עָנָ֖ן וְ/נָסָֽעוּ־־׃
translation:
  text: And sometimes the cloud would remain from evening until morning; when the
    cloud was taken up in the morning, they would set out. Or if it remained for a
    day and a night, when the cloud was taken up, they would set out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when the cloud rose.' The Hebrew verb can be rendered more literally
      this way, but 'was taken up' better reflects the cloud's lifting as the signal
      for Israel to depart in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵשׁ אֲשֶׁר
  chosen: And sometimes
  alternatives:
  - And there were times when
  - And it happened that
  lexicon: HALOT
  rationale: The idiom introduces a particular case within the preceding pattern.
    'And sometimes' gives natural English while preserving the sense of an occasional
    circumstance better than a wooden 'and there is that which.'
- source_word: יִהְיֶה הֶעָנָן
  chosen: the cloud would remain
  alternatives:
  - the cloud would be
  - the cloud stayed
  lexicon: HALOT
  rationale: Although היה is literally 'be,' in this context with a temporal span
    ('from evening until morning') it denotes continued presence. 'Would remain' expresses
    the durative sense in idiomatic English.
- source_word: מֵעֶרֶב עַד בֹּקֶר
  chosen: from evening until morning
  alternatives:
  - from evening to morning
  lexicon: HALOT
  rationale: A straightforward temporal expression; 'until' slightly better marks
    the endpoint.
- source_word: וְנַעֲלָה הֶעָנָן
  chosen: when the cloud was taken up
  alternatives:
  - when the cloud rose
  - when the cloud lifted
  lexicon: HALOT
  rationale: עלה in this travel-theophany context refers to the cloud lifting from
    above the tabernacle as the signal to depart. 'Was taken up' preserves the passive-like
    event sense and matches the repeated formula in the passage. 'Rose' is possible
    but can sound merely descriptive rather than signaling departure.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - at morning
  lexicon: HALOT
  rationale: Natural English rendering of the temporal phrase.
- source_word: וְנָסָעוּ
  chosen: they would set out
  alternatives:
  - they journeyed
  - they broke camp
  lexicon: HALOT
  rationale: נסע in wilderness-travel contexts means to pull up camp and depart. 'Set
    out' is clear modern English and fits the repeated procedural sense. 'Broke camp'
    is interpretive; 'journeyed' underplays the departure signal.
- source_word: אוֹ
  chosen: Or if
  alternatives:
  - or
  - or whether
  lexicon: HALOT
  rationale: Introduces an alternative case parallel to the first. 'Or if' makes the
    conditional force explicit in English.
- source_word: יוֹמָם וָלַיְלָה
  chosen: for a day and a night
  alternatives:
  - by day and by night
  - a full day and night
  lexicon: HALOT
  rationale: Here the phrase denotes duration, not merely the times of day. 'For a
    day and a night' best fits the syntax with the cloud's remaining.
