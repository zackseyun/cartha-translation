theological_decisions:
- issue: Meaning of the penalty 'cut off'
  chosen_reading: Retain the idiom 'shall be cut off' without specifying whether it means death, excommunication, childlessness, or divine judgment.
  alternative_readings:
  - shall be excluded from the community
  - shall be put to death
  rationale: The Hebrew idiom is theologically and legally weighty but not fully specified in this verse. Preserving the idiom maintains the text's tension rather than resolving a debated sanction.
  doctrine_reference: Preserve theological tension rather than resolve it.
