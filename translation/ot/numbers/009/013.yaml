id: NUM.9.13
reference: Numbers 9:13
source:
  edition: WLC
  text: וְ/הָ/אִישׁ֩ אֲשֶׁר ה֨וּא טָה֜וֹר וּ/בְ/דֶ֣רֶךְ לֹא הָיָ֗ה וְ/חָדַל֙ לַ/עֲשׂ֣וֹת הַ/פֶּ֔סַח וְ/נִכְרְתָ֛ה הַ/נֶּ֥פֶשׁ הַ/הִ֖וא מֵֽ/עַמֶּ֑י/הָ כִּ֣י קָרְבַּ֣ן יְהוָ֗ה לֹ֤א הִקְרִיב֙ בְּ/מֹ֣עֲד֔/וֹ חֶטְא֥/וֹ יִשָּׂ֖א הָ/אִ֥ישׁ הַ/הֽוּא־־׀׃
translation:
  text: But the man who is clean and is not on a journey, yet fails to keep the Passover—that person shall be cut off from his people, because he did not present Yahweh’s offering at its appointed time; that man shall bear his sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that soul shall be cut off.' The Hebrew idiom can denote severe covenantal judgment without specifying here exactly how it is carried out.
    reason: lexical_alternative
  - marker: b
    text: Or, 'shall bear his guilt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טָהוֹר
  chosen: clean
  alternatives:
  - pure
  lexicon: HALOT
  rationale: In ritual context, טָהוֹר refers to ceremonial cleanness rather than moral purity. 'Clean' is natural modern English and preserves the cultic sense.
- source_word: וּבְדֶרֶךְ לֹא הָיָה
  chosen: is not on a journey
  alternatives:
  - was not on the road
  - was not away on a journey
  lexicon: HALOT
  rationale: The phrase contrasts with the exception in the surrounding context for one who is away. 'On a journey' communicates absence due to travel idiomatically in English.
- source_word: וְחָדַל לַעֲשׂוֹת
  chosen: yet fails to keep
  alternatives:
  - and refrains from observing
  - and neglects to celebrate
  lexicon: HALOT
  rationale: חָדַל is 'cease/refrain/fail,' and with לעשות הפסח refers to not carrying out the Passover observance. 'Fails to keep' is concise and idiomatic without over-paraphrasing.
- source_word: הַפֶּסַח
  chosen: the Passover
  alternatives:
  - the Passover sacrifice
  - Passover
  lexicon: HALOT
  rationale: The term can denote the Passover observance or its sacrifice. Here the broader observance is in view, since the man fails to perform it; the sacrificial aspect is then specified by 'the LORD’s offering.'
- source_word: וְנִכְרְתָה הַנֶּפֶשׁ הַהִוא
  chosen: that person shall be cut off
  alternatives:
  - that soul shall be cut off
  - that person shall be excluded
  lexicon: HALOT
  rationale: נפש here refers to the individual person. 'Cut off' preserves the covenantal/judicial idiom and should not be flattened to mere exclusion in the main text.
- source_word: מֵעַמֶּיהָ
  chosen: from his people
  alternatives:
  - from his kin
  - from his people-group
  lexicon: HALOT
  rationale: Although the suffix agrees with the feminine נפש, the referent is the man under discussion. English naturally renders the sense as 'his people.'
- source_word: קָרְבַּן יְהוָה
  chosen: the LORD’s offering
  alternatives:
  - the offering of the LORD
  - the LORD’s gift-offering
  lexicon: HALOT
  rationale: קָרְבָּן is a general term for an offering brought near to God. 'The LORD’s offering' is clear and preserves possession. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּמֹעֲדוֹ
  chosen: at its appointed time
  alternatives:
  - in its appointed season
  - at the appointed time for it
  lexicon: HALOT
  rationale: מוֹעֵד here denotes the fixed, prescribed time for observance. 'Its appointed time' is natural and precise.
- source_word: חֶטְאוֹ יִשָּׂא
  chosen: shall bear his sin
  alternatives:
  - shall bear his guilt
  - shall carry his sin
  lexicon: HALOT
  rationale: This idiom expresses liability for wrongdoing and its consequences. 'Bear his sin' keeps the biblical idiom; 'guilt' is interpretive and therefore left as an alternative.
- source_word: הָאִישׁ הַהוּא
  chosen: that man
  alternatives:
  - that person
  - the man in question
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular. Per gender-accurate policy, 'that man' is retained, while the earlier נפש phrase is rendered 'that person' because it refers to the individual under the idiom.
