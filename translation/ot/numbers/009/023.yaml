id: NUM.9.23
reference: Numbers 9:23
source:
  edition: WLC
  text: עַל פִּ֤י יְהוָה֙ יַחֲנ֔וּ וְ/עַל פִּ֥י יְהוָ֖ה יִסָּ֑עוּ אֶת מִשְׁמֶ֤רֶת יְהוָה֙ שָׁמָ֔רוּ עַל פִּ֥י יְהוָ֖ה בְּ/יַד מֹשֶֽׁה־־־־־׃פ
translation:
  text: At the command of Yahweh they camped, and at the command of Yahweh they set out. They kept the charge of Yahweh at the command of Yahweh by the hand of Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''by the hand of Moses,'' an idiom meaning ''through Moses'' or ''by Moses as mediator.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל־פִּי
  chosen: at the command of
  alternatives:
  - according to
  - by the mouth of
  lexicon: HALOT
  rationale: The idiom literally means 'upon the mouth of' and in context denotes authoritative direction. 'At the command of' is natural English and preserves the sense of direct divine instruction better than the more wooden 'by the mouth of.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving English Bible convention and the reverential substitution pattern noted in doctrine.
- source_word: יַחֲנוּ
  chosen: they camped
  alternatives:
  - they encamped
  lexicon: HALOT
  rationale: The verb refers to making camp or settling in camp. 'They camped' is clear modern English; 'encamped' is more traditional but less natural.
- source_word: יִסָּעוּ
  chosen: they set out
  alternatives:
  - they journeyed
  - they broke camp
  lexicon: HALOT
  rationale: In wilderness-travel context the verb means to pull up and depart. 'Set out' is idiomatic and readable; 'broke camp' is possible but narrower, while 'journeyed' can overemphasize the travel rather than the departure.
- source_word: מִשְׁמֶרֶת
  chosen: the charge
  alternatives:
  - the obligation
  - the duty
  - the requirement
  lexicon: HALOT
  rationale: The noun often denotes something entrusted to someone to keep or observe. 'Charge' preserves both the custodial and obedient sense and fits the cultic/wilderness context better than the flatter 'duty.'
- source_word: שָׁמָרוּ
  chosen: they kept
  alternatives:
  - they observed
  - they guarded
  lexicon: HALOT
  rationale: The verb commonly means keep, observe, or guard. Here it governs 'the charge of the LORD,' so 'kept' is concise and idiomatic while retaining the covenantal-obediential nuance.
- source_word: בְּיַד מֹשֶׁה
  chosen: by the hand of Moses
  alternatives:
  - through Moses
  - by Moses
  lexicon: HALOT
  rationale: The Hebrew idiom indicates mediation or agency. 'By the hand of Moses' preserves the source-text imagery and the common biblical idiom, while still being understandable in English.
