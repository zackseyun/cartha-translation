id: NUM.9.20
reference: Numbers 9:20
source:
  edition: WLC
  text: וְ/יֵ֞שׁ אֲשֶׁ֨ר יִהְיֶ֧ה הֶֽ/עָנָ֛ן יָמִ֥ים מִסְפָּ֖ר עַל הַ/מִּשְׁכָּ֑ן עַל פִּ֤י יְהוָה֙ יַחֲנ֔וּ וְ/עַל פִּ֥י יְהוָ֖ה יִסָּֽעוּ־־־׃
translation:
  text: Sometimes the cloud would remain over the tabernacle for a number of days; at the command of Yahweh they would camp, and at the command of Yahweh they would set out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''according to the mouth of the LORD''—that is, by the LORD''s command.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵשׁ אֲשֶׁר
  chosen: Sometimes
  alternatives:
  - And there were times when
  - There were occasions when
  lexicon: HALOT
  rationale: The idiom וְיֵשׁ אֲשֶׁר introduces a particular case within a sequence of varying circumstances. In natural English here, 'Sometimes' captures the sense of 'there were occasions when' without unnecessary stiffness.
- source_word: יִהְיֶה הֶעָנָן
  chosen: the cloud would remain
  alternatives:
  - the cloud would be
  - the cloud would stay
  lexicon: HALOT
  rationale: The verb היה with the cloud in this travel-context conveys continued presence/location rather than mere existence. 'Would remain' expresses durative presence over the tabernacle more clearly than the bare 'would be.'
- source_word: יָמִים מִסְפָּר
  chosen: for a number of days
  alternatives:
  - some days
  - a few days
  lexicon: HALOT
  rationale: The phrase literally means 'days of number/numbered days,' an idiom for a limited count of days. 'For a number of days' is both accurate and idiomatic, avoiding the over-specific 'a few days.'
- source_word: עַל הַמִּשְׁכָּן
  chosen: over the tabernacle
  alternatives:
  - upon the tabernacle
  - over the dwelling place
  lexicon: HALOT
  rationale: מִשְׁכָּן is the standard term for the sanctuary structure in the wilderness and is conventionally and accurately rendered 'tabernacle.' 'Over' fits the spatial sense of the cloud's position.
- source_word: עַל פִּי יְהוָה
  chosen: at the command of the LORD
  alternatives:
  - according to the mouth of the LORD
  - by the command of the LORD
  - according to the command of the LORD
  lexicon: HALOT
  rationale: The idiom עַל־פִּי literally means 'according to the mouth of,' but in context denotes authoritative direction/command. 'At the command of' is concise, idiomatic, and preserves the sense of direct divine instruction.
- source_word: יַחֲנוּ
  chosen: they would camp
  alternatives:
  - they would encamp
  - they camped
  lexicon: HALOT
  rationale: The imperfect here describes customary action in this narrative sequence. 'Would camp' reflects repeated practice. 'Encamp' is possible but slightly less natural in contemporary English.
- source_word: יִסָּעוּ
  chosen: they would set out
  alternatives:
  - they would depart
  - they would journey
  lexicon: HALOT
  rationale: In the wilderness-travel context, נסע refers to breaking camp and moving on. 'Set out' is natural modern English and more precise than the broader 'journey.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
