id: NUM.9.1
reference: Numbers 9:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר יְהוָ֣ה אֶל מֹשֶׁ֣ה בְ/מִדְבַּר סִ֠ינַי בַּ/שָּׁנָ֨ה הַ/שֵּׁנִ֜ית לְ/צֵאתָ֨/ם מֵ/אֶ֧רֶץ מִצְרַ֛יִם בַּ/חֹ֥דֶשׁ הָ/רִאשׁ֖וֹן לֵ/אמֹֽר־־׃
translation:
  text: And Yahweh spoke to Moses in the wilderness of Sinai, in the second year after they came out of the land of Egypt, in the first month, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the desert of Sinai.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: And ... spoke
  alternatives:
  - Then ... spoke
  - said
  lexicon: HALOT
  rationale: The waw-consecutive with דבר advances the narrative. 'Spoke' is the standard and suitably formal rendering for divine speech; 'And' preserves Hebrew narrative flow without overinterpreting temporal sequence as 'then'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל מֹשֶׁה
  chosen: to Moses
  alternatives:
  - with Moses
  lexicon: HALOT
  rationale: אֶל with דבר regularly marks the addressee of speech. 'To Moses' is the plain sense.
- source_word: בְּמִדְבַּר סִינַי
  chosen: in the wilderness of Sinai
  alternatives:
  - in the desert of Sinai
  - in the Sinai wilderness
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness/desert terrain. 'Wilderness of Sinai' is a natural English rendering that preserves the construct relationship and biblical register.
- source_word: בַּשָּׁנָה הַשֵּׁנִית
  chosen: in the second year
  alternatives:
  - during the second year
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'In the second year' is idiomatic and close to the Hebrew.
- source_word: לְצֵאתָם מֵאֶרֶץ מִצְרַיִם
  chosen: after they came out of the land of Egypt
  alternatives:
  - of their going out from the land of Egypt
  - since they came out of the land of Egypt
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ל and pronominal suffix forms a temporal expression anchored to the exodus. 'After they came out' gives clear English sense while preserving the event reference. 'Land of Egypt' is retained rather than simply 'Egypt' to reflect אֶרֶץ.
- source_word: בַּחֹדֶשׁ הָרִאשׁוֹן
  chosen: in the first month
  alternatives:
  - during the first month
  lexicon: HALOT
  rationale: Another temporal phrase; 'in the first month' is direct and idiomatic.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said,
  lexicon: HALOT
  rationale: לֵאמֹר introduces the content of speech in the following verse. 'Saying' preserves the formal linkage and avoids collapsing it into a finite verb.
