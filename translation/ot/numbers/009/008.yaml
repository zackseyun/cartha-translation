id: NUM.9.8
reference: Numbers 9:8
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר אֲלֵ/הֶ֖ם מֹשֶׁ֑ה עִמְד֣וּ וְ/אֶשְׁמְעָ֔ה מַה יְצַוֶּ֥ה יְהוָ֖ה לָ/כֶֽם־׃פ
translation:
  text: And Moses said to them, “Wait, and I will hear what Yahweh commands concerning you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Stand by,” preserving the more literal sense of the Hebrew imperative.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative preterite introducing the next event in sequence. 'And' preserves Hebrew narrative flow without overinterpreting the conjunction.
- source_word: אֲלֵהֶם
  chosen: to them
  alternatives:
  - to these men
  lexicon: HALOT
  rationale: Direct object of speech with 3mp suffix; simple 'to them' is the natural English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name, in keeping with the policy to transliterate names.
- source_word: עִמְדוּ
  chosen: Wait
  alternatives:
  - Stand
  - Stand by
  - Remain standing
  lexicon: HALOT
  rationale: The imperative of עמד literally means 'stand,' but in this context Moses is telling them to stay in place while he seeks an answer. 'Wait' best conveys the idiomatic force in readable modern English; the more formal alternative 'stand by' is preserved in a footnote.
- source_word: וְאֶשְׁמְעָה
  chosen: and I will hear
  alternatives:
  - and let me hear
  - and I will listen
  lexicon: HALOT
  rationale: The cohortative-like first person form expresses Moses' intention to receive an answer from the LORD. 'I will hear' keeps the Hebrew wording and avoids adding interpretive detail beyond the text; English readers can understand it as hearing from the LORD.
- source_word: מַה
  chosen: what
  alternatives:
  - whatever
  lexicon: HALOT
  rationale: Interrogative pronoun introducing the content of what Moses expects the LORD to command.
- source_word: יְצַוֶּה
  chosen: will command
  alternatives:
  - commands
  - will instruct
  lexicon: HALOT
  rationale: Piel imperfect of צוה commonly means 'command' or 'give instruction.' 'Will command' matches the future-oriented context after Moses' request to wait.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָכֶם
  chosen: for you
  alternatives:
  - concerning you
  - to you
  lexicon: HALOT
  rationale: The preposition with 2mp suffix can be rendered several ways here. 'For you' fits the context of Moses seeking the LORD's directive on their behalf; 'concerning you' is possible but less natural in English.
