id: NUM.9.12
reference: Numbers 9:12
source:
  edition: WLC
  text: לֹֽא יַשְׁאִ֤ירוּ מִמֶּ֨/נּוּ֙ עַד בֹּ֔קֶר וְ/עֶ֖צֶם לֹ֣א יִשְׁבְּרוּ ב֑/וֹ
    כְּ/כָל חֻקַּ֥ת הַ/פֶּ֖סַח יַעֲשׂ֥וּ אֹתֽ/וֹ־־־־׃
translation:
  text: They shall leave none of it until morning, and they shall not break a bone
    of it; according to all the statute of the Passover they shall keep it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they shall not break any of its bones.'
    reason: lexical_alternative
  - marker: b
    text: The unbroken-bone requirement echoes the Passover instructions in Exodus
      12:46.
    reason: cross_reference
lexical_decisions:
- source_word: יַשְׁאִירוּ
  chosen: shall leave
  alternatives:
  - shall let remain
  - shall leave over
  lexicon: HALOT
  rationale: Hiphil of שׁאר means to leave, let remain, or leave over. 'Shall leave'
    is natural English and fits the prohibition with the following phrase 'until morning.'
- source_word: מִמֶּנּוּ
  chosen: of it
  alternatives:
  - from it
  - any of it
  lexicon: HALOT
  rationale: 'The preposition מן with pronominal suffix here indicates partitive sense:
    none from it/none of it. ''Of it'' is idiomatic in English with the negative prohibition.'
- source_word: עַד בֹּקֶר
  chosen: until morning
  alternatives:
  - until the morning
  - by morning
  lexicon: HALOT
  rationale: Standard temporal expression. 'Until morning' is concise and idiomatic
    while preserving the temporal limit.
- source_word: וְעֶצֶם
  chosen: and a bone
  alternatives:
  - and any bone
  - and bone
  lexicon: HALOT
  rationale: Singular noun used distributively. 'A bone' preserves the Hebrew singular
    and reads naturally in English.
- source_word: לֹא יִשְׁבְּרוּ בוֹ
  chosen: they shall not break a bone of it
  alternatives:
  - they shall not break a bone in it
  - they shall not break any of its bones
  lexicon: HALOT
  rationale: The Hebrew is literally 'they shall not break in/of it.' English idiom
    prefers 'break a bone of it' or 'break any of its bones.' The chosen wording stays
    relatively close to the singular Hebrew while remaining natural.
- source_word: כְּכָל חֻקַּת הַפֶּסַח
  chosen: according to all the statute of the Passover
  alternatives:
  - according to the whole statute of the Passover
  - according to every statute of the Passover
  - according to all the ordinance of the Passover
  lexicon: HALOT
  rationale: חֻקָּה denotes a statute or prescribed ordinance. Because the Hebrew
    has singular construct with כָּל, the sense is the full prescribed rule governing
    Passover. 'According to all the statute of the Passover' is somewhat formal but
    preserves the singular collective force.
- source_word: הַפֶּסַח
  chosen: the Passover
  alternatives:
  - the Passover offering
  - Passover
  lexicon: HALOT
  rationale: The term can denote the Passover rite or the lamb/meal in context. Here
    the following pronoun אֹתוֹ refers to the observance/Passover meal. 'The Passover'
    preserves the broader ritual sense without over-specifying 'offering.'
- source_word: יַעֲשׂוּ אֹתוֹ
  chosen: they shall keep it
  alternatives:
  - they shall do it
  - they shall observe it
  - they shall celebrate it
  lexicon: HALOT
  rationale: עשה with a festival or ordinance often means to observe/keep it. 'Keep
    it' is idiomatic for prescribed observance and avoids the wooden 'do it,' while
    remaining closer than the more expansive 'celebrate it.'
