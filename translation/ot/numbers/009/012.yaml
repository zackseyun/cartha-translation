theological_decisions:
- issue: Potential intertextual significance of the unbroken bone clause
  chosen_reading: Translate the clause straightforwardly as a Passover regulation
    without importing later christological interpretation into the main text.
  alternative_readings:
  - Render with wording shaped to foreground later New Testament fulfillment themes
  rationale: The verse in its immediate context gives instructions for observing Passover,
    including that no bone is to be broken. While this later resonates with New Testament
    usage, the translation should not import that theological connection into the
    main text beyond what the Hebrew states plainly.
  doctrine_reference: Translation philosophy §1, §3
