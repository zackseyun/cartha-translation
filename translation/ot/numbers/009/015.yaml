id: NUM.9.15
reference: Numbers 9:15
source:
  edition: WLC
  text: וּ/בְ/יוֹם֙ הָקִ֣ים אֶת הַ/מִּשְׁכָּ֔ן כִּסָּ֤ה הֶֽ/עָנָן֙ אֶת הַ/מִּשְׁכָּ֔ן
    לְ/אֹ֖הֶל הָ/עֵדֻ֑ת וּ/בָ/עֶ֜רֶב יִהְיֶ֧ה עַֽל הַ/מִּשְׁכָּ֛ן כְּ/מַרְאֵה אֵ֖שׁ
    עַד בֹּֽקֶר־־־־־׃
translation:
  text: Now on the day the tabernacle was set up, the cloud covered the tabernacle,
    the tent of the testimony; and in the evening it was over the tabernacle like
    the appearance of fire until morning.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tent of witness.' The Hebrew phrase can be rendered either way;
      'testimony' is retained here as the more established cultic term.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְיוֹם
  chosen: Now on the day
  alternatives:
  - And on the day
  - On the day
  lexicon: HALOT
  rationale: Temporal phrase with prefixed conjunction. 'Now on the day' gives natural
    English discourse flow while preserving the temporal setting and the connective
    force of waw.
- source_word: הָקִים
  chosen: was set up
  alternatives:
  - was erected
  - was raised up
  lexicon: HALOT
  rationale: 'The infinitive construct with prefixed article functions temporally:
    ''on the day of setting up.'' English idiom is best represented by a passive clause,
    ''was set up,'' referring to the tabernacle''s installation.'
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the sanctuary
  lexicon: HALOT
  rationale: Mishkan is the standard term for the portable sanctuary structure in
    the wilderness. 'Tabernacle' is the clearest established English equivalent and
    remains understandable in modern English.
- source_word: כִּסָּה
  chosen: covered
  alternatives:
  - concealed
  - overshadowed
  lexicon: HALOT
  rationale: The verb plainly denotes covering. 'Covered' is direct and fits the physical
    imagery of the cloud over the tabernacle.
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Definite noun referring to the known divine cloud associated with Israel's
    wilderness journey. The text itself uses the definite form, so 'the cloud' is
    appropriate.
- source_word: לְאֹהֶל הָעֵדֻת
  chosen: the tent of the testimony
  alternatives:
  - the tent of witness
  - the tent of the covenant document
  lexicon: HALOT
  rationale: This appositional expression further identifies the tabernacle. 'Testimony'
    is the conventional and semantically fitting rendering for עֵדוּת in this cultic
    context, referring to the covenant testimony housed there.
- source_word: וּבָעֶרֶב
  chosen: and in the evening
  alternatives:
  - and at evening
  - but in the evening
  lexicon: HALOT
  rationale: Temporal transition from daytime to nighttime. 'In the evening' is natural
    modern English and preserves the conjunction.
- source_word: יִהְיֶה
  chosen: it was
  alternatives:
  - it would be
  - it became
  lexicon: HALOT
  rationale: Although formally imperfect, in this descriptive narrative context it
    expresses customary or continuing past situation. English past 'it was' communicates
    the sense smoothly.
- source_word: עַל הַמִּשְׁכָּן
  chosen: over the tabernacle
  alternatives:
  - upon the tabernacle
  - above the tabernacle
  lexicon: HALOT
  rationale: The preposition indicates position over/upon the tabernacle. 'Over' is
    the most natural English choice in this context.
- source_word: כְּמַרְאֵה אֵשׁ
  chosen: like the appearance of fire
  alternatives:
  - like fire in appearance
  - like the sight of fire
  lexicon: HALOT
  rationale: 'The phrase marks comparison, not identity: it looked like fire. ''Like
    the appearance of fire'' preserves that visual nuance carefully.'
- source_word: עַד בֹּקֶר
  chosen: until morning
  alternatives:
  - until the morning
  - until daybreak
  lexicon: HALOT
  rationale: Simple temporal endpoint. 'Until morning' is idiomatic and accurate.
