theological_decisions:
- issue: Relation of 'the tabernacle' and 'the tent of the testimony'
  chosen_reading: 'Appositional: the second phrase identifies the first'
  alternative_readings:
  - 'Locative nuance: ''the cloud covered the tabernacle, namely the tent of the testimony'''
  - 'Directional nuance implied by ל: ''the cloud covered the tabernacle toward/at
    the tent of the testimony'''
  rationale: The syntax most naturally treats 'the tent of the testimony' as an appositional
    clarification of 'the tabernacle,' not as a separate object or a strongly directional
    phrase. This preserves the cultic identification without overcomplicating the
    English.
