id: NUM.9.4
reference: Numbers 9:4
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר מֹשֶׁ֛ה אֶל בְּנֵ֥י יִשְׂרָאֵ֖ל לַ/עֲשֹׂ֥ת הַ/פָּֽסַח־׃
translation:
  text: So Moses told the sons of Israel to keep the Passover.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites'; literally 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: told
  alternatives:
  - spoke
  - said
  lexicon: HALOT
  rationale: The verb דבר with אֶל commonly means 'speak to.' In English, with the
    infinitive complement 'to keep the Passover,' 'told' is the most natural optimal-equivalence
    rendering, conveying that Moses addressed Israel with an instruction.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Following the gender-accurate principle,
    the main text preserves the masculine familial expression rather than flattening
    it to 'Israelites,' though that alternative is idiomatic English and worth preserving.
- source_word: לַעֲשֹׂת
  chosen: to keep
  alternatives:
  - to do
  - to observe
  - to celebrate
  lexicon: HALOT
  rationale: עשה literally means 'to do/make,' but with פֶּסַח in cultic context it
    idiomatically means to observe or keep the Passover. 'Keep' is concise, natural,
    and faithful to the ritual-observance sense.
- source_word: הַפָּסַח
  chosen: the Passover
  alternatives:
  - the Passover meal
  - the Passover sacrifice
  lexicon: HALOT
  rationale: פֶּסַח can denote the Passover observance broadly, and in some contexts
    the lamb/sacrifice specifically. Here the command concerns observance of the festival,
    so 'the Passover' best preserves the broader sense without over-specifying.
