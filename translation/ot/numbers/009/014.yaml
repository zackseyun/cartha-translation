theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of legal equality between Israelite and resident foreigner in Passover observance
  chosen_reading: One statute applies equally to Israel and the sojourner who keeps Passover
  alternative_readings:
  - The verse only permits but does not stress equal legal standing
  - The verse refers narrowly to ritual procedure without broader legal implication
  rationale: The text explicitly states 'one statute' for 'you,' 'the sojourner,' and 'the native of the land.' The translation preserves this legal equality within the immediate Passover context without extending it beyond what the verse states.
