id: NUM.9.14
reference: Numbers 9:14
source:
  edition: WLC
  text: וְ/כִֽי יָג֨וּר אִתְּ/כֶ֜ם גֵּ֗ר וְ/עָ֤שָֽׂה פֶ֨סַח֙ לַֽ/יהוָ֔ה כְּ/חֻקַּ֥ת הַ/פֶּ֛סַח וּ/כְ/מִשְׁפָּט֖/וֹ כֵּ֣ן יַעֲשֶׂ֑ה חֻקָּ֤ה אַחַת֙ יִהְיֶ֣ה לָ/כֶ֔ם וְ/לַ/גֵּ֖ר וּ/לְ/אֶזְרַ֥ח הָ/אָֽרֶץ־׃פ
translation:
  text: And if a sojourner is staying with you and would keep the Passover to Yahweh, he shall do it according to the statute of the Passover and according to its ordinance; so he shall do it. One statute shall be for you, for the sojourner, and for the native of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a stranger resides with you' or 'a foreigner lives among you.' The Hebrew ger refers to a resident foreigner living among Israel, not merely a traveler.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'does/makes the Passover,' an idiom meaning 'keeps' or 'observes' the Passover.
    reason: lexical_alternative
  - marker: c
    text: Or 'native-born of the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And if
  alternatives:
  - If
  - Now if
  lexicon: HALOT
  rationale: Introduces a conditional case with a connective; 'And if' preserves the linkage to the preceding legislation while remaining natural in English.
- source_word: יָגוּר ... גֵּר
  chosen: a sojourner is staying with you
  alternatives:
  - a stranger resides with you
  - an alien sojourns with you
  - a foreigner lives among you
  lexicon: HALOT
  rationale: גֵּר denotes a resident foreigner/sojourner living among Israel, not merely a passing stranger. 'Sojourner' preserves the covenant-legal nuance better than 'stranger.' Rendering the verb with 'is staying' gives the durative sense in idiomatic English.
- source_word: וְעָשָׂה פֶסַח
  chosen: would keep the Passover
  alternatives:
  - celebrates the Passover
  - does the Passover
  - offers the Passover
  lexicon: HALOT
  rationale: The idiom 'do/make Passover' refers to observing or keeping the festival/rite. 'Keep the Passover' is clear modern English and fits the ritual context without wooden literalism.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition marks dedication/direction of the observance toward YHWH. 'The LORD' follows the doctrinal default for the divine name יְהוָה.
- source_word: כְּחֻקַּת הַפֶּסַח
  chosen: according to the statute of the Passover
  alternatives:
  - according to the ordinance of the Passover
  - by the prescribed statute of the Passover
  lexicon: HALOT
  rationale: חֻקָּה refers to a prescribed statute. 'Statute' preserves the legal-ritual force and distinguishes it from the following מִשְׁפָּט.
- source_word: וּכְמִשְׁפָּטוֹ
  chosen: according to its ordinance
  alternatives:
  - according to its rule
  - according to its judgment
  - according to its procedure
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to the proper rule/procedure governing the rite. 'Ordinance' is a natural legal-cultic rendering and differentiates it from חֻקָּה while keeping overlap in sense.
- source_word: כֵּן יַעֲשֶׂה
  chosen: so he shall do it
  alternatives:
  - thus he shall do
  - in this way he shall do it
  lexicon: HALOT
  rationale: This clause emphasizes conformity to the prescribed manner. 'So he shall do it' is concise and preserves the directive force.
- source_word: חֻקָּה אַחַת יִהְיֶה
  chosen: One statute shall be
  alternatives:
  - There shall be one statute
  - One law shall be
  lexicon: HALOT
  rationale: The phrase states a single binding rule for both groups. 'One statute shall be' is formal enough to reflect the legal declaration while remaining readable.
- source_word: לָכֶם וְלַגֵּר
  chosen: for you, for the sojourner
  alternatives:
  - for you and for the sojourner
  - for you and the resident foreigner
  lexicon: HALOT
  rationale: The repeated preposition is retained in English for emphasis on equal application of the law to both Israelite audience and resident foreigner.
- source_word: וּלְאֶזְרַח הָאָרֶץ
  chosen: and for the native of the land
  alternatives:
  - and for the native-born of the land
  - and for the citizen of the land
  lexicon: HALOT
  rationale: אֶזְרַח denotes one native to the land, in contrast to the גֵּר. 'Native of the land' is clear and preserves the contrast without importing modern political categories like 'citizen.'
