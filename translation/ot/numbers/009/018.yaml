id: NUM.9.18
reference: Numbers 9:18
source:
  edition: WLC
  text: עַל פִּ֣י יְהוָ֗ה יִסְעוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/עַל פִּ֥י יְהוָ֖ה יַחֲנ֑וּ
    כָּל יְמֵ֗י אֲשֶׁ֨ר יִשְׁכֹּ֧ן הֶ/עָנָ֛ן עַל הַ/מִּשְׁכָּ֖ן יַחֲנֽוּ־־־־׃
translation:
  text: At the command of the LORD the sons of Israel set out, and at the command
    of the LORD they camped. All the days that the cloud remained over the tabernacle,
    they remained camped.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''upon the mouth of the LORD,'' an idiom meaning ''at the command
      of the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל פִּי יְהוָה
  chosen: at the command of the LORD
  alternatives:
  - by the mouth of the LORD
  - according to the command of the LORD
  lexicon: HALOT
  rationale: The idiom עַל־פִּי literally means 'upon the mouth of,' but in context
    it denotes authoritative direction or command. 'At the command of' is natural
    English and preserves the sense of movement and encampment being governed by divine
    instruction. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered with the default doctrinally specified form
    'the LORD.'
- source_word: יִסְעוּ
  chosen: set out
  alternatives:
  - journeyed
  - broke camp
  lexicon: HALOT
  rationale: נסע in travel contexts means to pull up camp and depart. 'Set out' is
    clear modern English and fits optimal equivalence. 'Broke camp' is possible but
    would over-specify the camping imagery in a way not required here.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A more formal rendering preserves the Hebrew familial expression בני
    ישראל. Because the source is explicitly masculine plural construct, 'sons of Israel'
    is gender-accurate per translation philosophy; 'Israelites' is smoother but less
    transparent to the source form.
- source_word: יַחֲנוּ
  chosen: they camped / they remained camped
  alternatives:
  - encamped
  - stayed in camp
  lexicon: HALOT
  rationale: חנה means to camp or encamp. The first occurrence is rendered 'they camped'
    for straightforward narrative movement. The final occurrence is rendered 'they
    remained camped' to reflect the durative sense created by the clause 'all the
    days that...' in idiomatic English, while still preserving the same core lexical
    idea.
- source_word: כָּל יְמֵי אֲשֶׁר
  chosen: all the days that
  alternatives:
  - for all the time that
  - as long as
  lexicon: HALOT
  rationale: This phrase marks duration. 'All the days that' is close to the Hebrew
    wording and still readable.
- source_word: יִשְׁכֹּן
  chosen: remained
  alternatives:
  - dwelt
  - settled
  - rested
  lexicon: HALOT
  rationale: שכן often means dwell or reside. With 'the cloud' as subject and a temporary
    wilderness setting, 'remained' best conveys continued presence in natural English.
    'Dwelt' is too wooden here.
- source_word: הֶעָנָן
  chosen: the cloud
  lexicon: HALOT
  rationale: Direct rendering of the visible cloud associated with the LORD's guidance.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  - the tent of meeting
  lexicon: HALOT
  rationale: מִשְׁכָּן refers specifically to the sacred dwelling/tabernacle. 'Tabernacle'
    is the standard and sufficiently accessible English term here. 'Tent of meeting'
    would correspond more specifically to אֹהֶל מוֹעֵד, not this term.
