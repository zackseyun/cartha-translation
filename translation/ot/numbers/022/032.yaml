id: NUM.22.32
reference: Numbers 22:32
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֵלָי/ו֙ מַלְאַ֣ךְ יְהוָ֔ה עַל מָ֗ה הִכִּ֨יתָ֙ אֶת אֲתֹ֣נְ/ךָ֔
    זֶ֖ה שָׁל֣וֹשׁ רְגָלִ֑ים הִנֵּ֤ה אָנֹכִי֙ יָצָ֣אתִי לְ/שָׂטָ֔ן כִּֽי יָרַ֥ט הַ/דֶּ֖רֶךְ
    לְ/נֶגְדִּֽ/י־־־׃
translation:
  text: And the angel of the LORD said to him, “Why have you struck your donkey these
    three times? Look, I have come out as an adversary, because the way is reckless
    before me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שָׂטָן here means 'adversary' or 'opponent,' not necessarily the
      proper name 'Satan.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb rendered 'is reckless' is rare and may also be understood
      as 'is perverse' or 'is contrary.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean 'messenger' or 'angel'; in this narrative context the
    supernatural being confronting Balaam is best rendered 'angel.' יְהוָה follows
    the project default 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: עַל מָה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Idiomatic interrogative in English; concise and natural while preserving
    the force of the Hebrew question.
- source_word: הִכִּיתָ
  chosen: have you struck
  alternatives:
  - did you strike
  - have you beaten
  lexicon: HALOT
  rationale: The verb נכה means 'strike, hit.' 'Struck' is direct and avoids overinterpreting
    the severity as 'beaten.' Present perfect fits the immediate rebuke in English.
- source_word: אֲתֹנְךָ
  chosen: your donkey
  alternatives:
  - your she-donkey
  - your female donkey
  lexicon: HALOT
  rationale: The Hebrew specifically denotes a female donkey, but standard English
    'donkey' is natural and sufficient here unless the sex is contextually emphasized.
    The possessive is retained.
- source_word: זֶה שָׁלֹשׁ רְגָלִים
  chosen: these three times
  alternatives:
  - this three times
  - these three occasions
  lexicon: HALOT
  rationale: The idiom literally uses 'three feet/occasions' but means 'three times.'
    This is a standard idiomatic rendering.
- source_word: הִנֵּה אָנֹכִי
  chosen: Look, I
  alternatives:
  - Behold, I
  - See, I
  lexicon: HALOT
  rationale: הִנֵּה marks attention. 'Look' is readable modern English and preserves
    the discourse force without archaism.
- source_word: יָצָאתִי
  chosen: have come out
  alternatives:
  - came out
  - have gone out
  lexicon: HALOT
  rationale: The verb יצא is 'go/come out.' In relation to Balaam's perspective and
    the angel's appearance on the road, 'have come out' communicates emergence into
    confrontation.
- source_word: לְשָׂטָן
  chosen: as an adversary
  alternatives:
  - to oppose you
  - as an opponent
  - as Satan
  lexicon: HALOT
  rationale: Here שָׂטָן is a common noun meaning 'adversary/opponent,' not necessarily
    the proper name Satan. 'As an adversary' preserves the noun sense and avoids importing
    later demonological associations.
- source_word: יָרַט
  chosen: is reckless
  alternatives:
  - is perverse
  - is headlong
  - is contrary
  lexicon: HALOT
  rationale: The verb is rare and difficult. In context the angel explains his opposition
    because Balaam's course is improper and dangerously rash. 'Is reckless' captures
    the likely sense in clear modern English without overcommitting to a more technical
    gloss.
- source_word: הַדֶּרֶךְ
  chosen: the way
  alternatives:
  - your way
  - the path
  lexicon: HALOT
  rationale: The Hebrew has 'the way' with the article. English can preserve this
    while allowing the context to imply Balaam's course of action.
- source_word: לְנֶגְדִּי
  chosen: before me
  alternatives:
  - against me
  - in front of me
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'before me/in front of me.'
    Given the moral evaluation in context, 'before me' preserves both spatial and
    evaluative force without making the phrase more explicit than the Hebrew.
