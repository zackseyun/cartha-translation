theological_decisions:
- issue: Meaning of לְשָׂטָן
  chosen_reading: 'common noun: ''as an adversary'''
  alternative_readings:
  - '''as Satan'' if taken as a title/name'
  rationale: The context presents the angel of the LORD opposing Balaam; the Hebrew
    noun here functions descriptively rather than as the later proper name for the
    devil. Rendering it as 'Satan' would likely mislead readers into a theological
    claim the text does not make.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
