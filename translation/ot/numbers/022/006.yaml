id: NUM.22.6
reference: Numbers 22:6
source:
  edition: WLC
  text: וְ/עַתָּה֩ לְכָ/ה נָּ֨א אָֽרָ/ה לִּ֜/י אֶת הָ/עָ֣ם הַ/זֶּ֗ה כִּֽי עָצ֥וּם
    הוּא֙ מִמֶּ֔/נִּי אוּלַ֤י אוּכַל֙ נַכֶּה בּ֔/וֹ וַ/אֲגָרְשֶׁ֖/נּוּ מִן הָ/אָ֑רֶץ
    כִּ֣י יָדַ֗עְתִּי אֵ֤ת אֲשֶׁר תְּבָרֵךְ֙ מְבֹרָ֔ךְ וַ/אֲשֶׁ֥ר תָּאֹ֖ר יוּאָֽר־־־־־־־׃
translation:
  text: So now, please come and curse this people for me, because they are too mighty
    for me. Perhaps I will be able to strike them and drive them out of the land,
    for I know that whoever you bless is blessed, and whoever you curse is cursed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'this people' uses a singular collective; English could also be rendered
      'these people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'strike it' / 'drive it out'; the Hebrew refers to the people as a singular
      collective, though English commonly uses the plural 'them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Introduces an urgent transition in Balak's request. 'So now' preserves
    the discourse connection and immediacy better than a bare 'now.'
- source_word: לְכָה נָּא
  chosen: please come
  alternatives:
  - come, please
  - do come
  lexicon: HALOT
  rationale: Imperative plus particle of entreaty. 'Please come' conveys both command
    and polite urgency in natural English.
- source_word: אָרָה לִּי
  chosen: curse this people for me
  alternatives:
  - denounce this people for me
  - put a curse on this people for me
  lexicon: HALOT
  rationale: אָרָה is the standard verb for cursing, especially invoking harm. 'For
    me' preserves לִּי as indicating Balak's interest/request.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: Though English often prefers 'these people,' the Hebrew singular collective
    is well represented by 'this people,' which also preserves the slightly distancing
    tone.
- source_word: כִּי עָצוּם הוּא מִמֶּנִּי
  chosen: because they are too mighty for me
  alternatives:
  - for it is stronger than I am
  - because they are stronger than me
  lexicon: HALOT
  rationale: The singular pronoun refers to the collective people; English shifts
    naturally to plural 'they.' 'Too mighty for me' captures comparative force and
    military threat.
- source_word: אוּלַי אוּכַל
  chosen: Perhaps I will be able
  alternatives:
  - Maybe I can
  - Perhaps I may be able
  lexicon: HALOT
  rationale: Expresses uncertainty plus capability. This rendering is natural while
    preserving the tentative sense.
- source_word: נַכֶּה בּוֹ
  chosen: to strike them
  alternatives:
  - to defeat them
  - to smite them
  lexicon: HALOT
  rationale: נכה literally means 'strike.' 'Defeat' is interpretive and too specific;
    'smite' is archaic. Plural 'them' reflects the collective object in idiomatic
    English.
- source_word: וַאֲגָרְשֶׁנּוּ
  chosen: and drive them out
  alternatives:
  - and expel them
  - and drive it out
  lexicon: HALOT
  rationale: גרש commonly means to drive out/expel. Plural English object matches
    the collective referent 'people.'
- source_word: מִן הָאָרֶץ
  chosen: out of the land
  alternatives:
  - from the land
  - out of the country
  lexicon: HALOT
  rationale: '''The land'' is the standard rendering and may carry territorial resonance
    beyond modern ''country.'' ''Out of'' fits with ''drive'' idiomatically.'
- source_word: כִּי יָדַעְתִּי
  chosen: for I know
  alternatives:
  - because I know
  - for I have known
  lexicon: HALOT
  rationale: Introduces the rationale for seeking Balaam. Simple present English best
    conveys the Hebrew perfect in this context.
- source_word: אֵת אֲשֶׁר תְּבָרֵךְ מְבֹרָךְ
  chosen: whoever you bless is blessed
  alternatives:
  - the one whom you bless is blessed
  - whomever you bless is blessed
  lexicon: HALOT
  rationale: Generic relative construction is best rendered with 'whoever.' Passive
    participle/resultative sense is preserved by 'is blessed.'
- source_word: וַאֲשֶׁר תָּאֹר יוּאָר
  chosen: and whoever you curse is cursed
  alternatives:
  - and the one whom you curse is cursed
  - and whoever you denounce is under a curse
  lexicon: HALOT
  rationale: Maintains the parallelism with the previous clause and preserves the
    passive/resultative force of יוּאָר.
