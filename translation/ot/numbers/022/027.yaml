id: NUM.22.27
reference: Numbers 22:27
source:
  edition: WLC
  text: וַ/תֵּ֤רֶא הָֽ/אָתוֹן֙ אֶת מַלְאַ֣ךְ יְהוָ֔ה וַ/תִּרְבַּ֖ץ תַּ֣חַת בִּלְעָ֑ם וַ/יִּֽחַר אַ֣ף בִּלְעָ֔ם וַ/יַּ֥ךְ אֶת הָ/אָת֖וֹן בַּ/מַּקֵּֽל־־־׃
translation:
  text: When the donkey saw the angel of Yahweh, she lay down under Balaam. Then Balaam became angry and struck the donkey with his staff.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the female donkey''; the main text uses ''the donkey'' for natural English, with the feminine reflected by ''she.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'the messenger of the LORD.' Here 'angel' is preferred because the context indicates a supernatural messenger.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָתוֹן
  chosen: the donkey
  alternatives:
  - the she-donkey
  - the female donkey
  lexicon: HALOT
  rationale: אָתוֹן specifically denotes a female donkey. In natural English narrative, 'donkey' is the most readable main-text rendering; the feminine is still reflected by the pronoun 'she.' More explicit alternatives are possible but sound less natural here.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאָךְ can mean 'messenger' or 'angel.' In this narrative context, a supernatural being is clearly intended, so 'angel' is the best rendering. יְהוָה follows the doctrinal default 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַתִּרְבַּץ
  chosen: she lay down
  alternatives:
  - she crouched
  - she knelt down
  lexicon: HALOT
  rationale: The verb רבץ commonly means to lie down or crouch. Given the following phrase 'under Balaam,' 'lay down' best captures the animal's collapse beneath its rider without overinterpreting the action.
- source_word: תַּחַת בִּלְעָם
  chosen: under Balaam
  alternatives:
  - beneath Balaam
  lexicon: HALOT
  rationale: תַּחַת literally means 'under/beneath.' Since Balaam is mounted on the donkey, the phrase indicates that the animal lay down beneath him.
- source_word: וַיִּחַר אַף בִּלְעָם
  chosen: Then Balaam became angry
  alternatives:
  - Balaam's anger burned
  - Balaam was furious
  lexicon: HALOT
  rationale: The idiom חרה אף literally involves anger burning. 'Became angry' is a clear modern-English rendering that preserves the sense without unnecessary literal awkwardness.
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - hit
  - beat
  lexicon: HALOT
  rationale: נכה is a broad verb for striking. 'Struck' is appropriately direct and neither too weak ('hit') nor too strong ('beat') for this single action in context.
- source_word: בַּמַּקֵּל
  chosen: with his staff
  alternatives:
  - with the staff
  - with a stick
  - with his stick
  lexicon: HALOT
  rationale: מַקֵּל denotes a staff or stick. Because Balaam is traveling, 'staff' fits the scene well and reads naturally in English. The possessive 'his' is implicit from context though not explicit in Hebrew, clarifying the instrument in idiomatic English.
