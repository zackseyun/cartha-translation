id: NUM.22.13
reference: Numbers 22:13
source:
  edition: WLC
  text: וַ/יָּ֤קָם בִּלְעָם֙ בַּ/בֹּ֔קֶר וַ/יֹּ֨אמֶר֙ אֶל שָׂרֵ֣י בָלָ֔ק לְכ֖וּ אֶֽל
    אַרְצְ/כֶ֑ם כִּ֚י מֵאֵ֣ן יְהוָ֔ה לְ/תִתִּ֖/י לַ/הֲלֹ֥ךְ עִמָּ/כֶֽם־־׃
translation:
  text: So Balaam rose in the morning and said to Balak’s officials, “Go to your land,
    because the LORD has refused to let me go with you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Balak’s princes” or “Balak’s leaders.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: rose
  alternatives:
  - got up
  - arose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום commonly introduces the next action in narrative.
    'Rose' is concise and natural in English, especially with the following time phrase
    'in the morning.'
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - in the morning early
  - at morning
  lexicon: HALOT
  rationale: Standard temporal expression. 'In the morning' is idiomatic modern English
    without adding emphasis not explicit in the Hebrew.
- source_word: שָׂרֵי בָלָק
  chosen: Balak’s officials
  alternatives:
  - Balak’s princes
  - Balak’s leaders
  lexicon: HALOT
  rationale: שָׂרִים denotes officials, princes, or leaders. In this narrative they
    are emissaries of a king; 'officials' communicates their representative status
    in readable modern English without implying hereditary nobility as strongly as
    'princes.'
- source_word: לְכוּ
  chosen: Go
  alternatives:
  - Leave
  - Be on your way
  lexicon: HALOT
  rationale: Imperative of הלך. 'Go' is the most direct equivalent and fits the command
    to return.
- source_word: אֶל אַרְצְכֶם
  chosen: to your land
  alternatives:
  - to your country
  - to your homeland
  lexicon: HALOT
  rationale: אֶרֶץ can mean land or country. 'Land' is slightly more formal and biblically
    resonant while remaining natural.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for Balaam's command. 'Because' is the clearest
    modern connector.
- source_word: מֵאֵן
  chosen: has refused
  alternatives:
  - refuses
  - was unwilling
  lexicon: HALOT
  rationale: Piel perfect of מאן expresses refusal. English present perfect works
    well in reported speech to convey the present force of a completed divine decision.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the LXX/English Bible pattern.
- source_word: לְתִתִּי
  chosen: to let me
  alternatives:
  - to give me
  - to allow me
  lexicon: HALOT
  rationale: נתן plus infinitive can idiomatically mean 'allow/permit.' A literal
    'give me to go' would be unnatural in English. 'Let me' preserves the sense without
    over-paraphrase.
- source_word: לַהֲלֹךְ עִמָּכֶם
  chosen: go with you
  alternatives:
  - walk with you
  - travel with you
  lexicon: HALOT
  rationale: הלך with עִם here refers to accompanying the delegation. 'Go with you'
    is the most straightforward English equivalent.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative verb of speech; 'said' is the natural default.
