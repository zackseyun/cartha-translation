id: NUM.22.38
reference: Numbers 22:38
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר בִּלְעָ֜ם אֶל בָּלָ֗ק הִֽנֵּה בָ֨אתִי֙ אֵלֶ֔י/ךָ עַתָּ֕ה הֲ/יָכ֥וֹל
    אוּכַ֖ל דַּבֵּ֣ר מְא֑וּמָה הַ/דָּבָ֗ר אֲשֶׁ֨ר יָשִׂ֧ים אֱלֹהִ֛ים בְּ/פִ֖/י אֹת֥/וֹ
    אֲדַבֵּֽר־־׃
translation:
  text: And Balaam said to Balak, “Look, I have come to you now. Am I really able
    to speak anything at all? I will speak only the word that God puts in my mouth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Can I indeed say anything?” The Hebrew uses an emphatic construction
      for ability.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces Balaam’s emphatic response. 'Look' preserves the deictic force
    in readable modern English better than the more archaic 'Behold.'
- source_word: בָאתִי אֵלֶיךָ עַתָּה
  chosen: I have come to you now
  alternatives:
  - I have come to you
  - Here I am, I have come to you
  lexicon: HALOT
  rationale: Combines the perfect verb with the adverb עַתָּה naturally in English
    while preserving the immediacy of Balaam’s arrival.
- source_word: הֲיָכוֹל אוּכַל
  chosen: Am I really able
  alternatives:
  - Can I indeed
  - Do I actually have power
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the idea of ability.
    'Am I really able' captures the emphatic, somewhat rhetorical force without sounding
    wooden.
- source_word: דַּבֵּר מְאוּמָה
  chosen: to speak anything at all
  alternatives:
  - to say anything
  - to speak a word
  lexicon: HALOT
  rationale: מְאוּמָה means 'anything' or 'the least thing.' 'Anything at all' reflects
    the negative-polarity emphasis in the rhetorical question.
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the thing
  - the message
  lexicon: HALOT
  rationale: In this prophetic context, 'the word' best preserves the concrete singular
    expression and anticipates divinely given speech.
- source_word: יָשִׂים אֱלֹהִים בְּפִי
  chosen: that God puts in my mouth
  alternatives:
  - that God places in my mouth
  - that God sets in my mouth
  lexicon: HALOT
  rationale: A standard Hebrew idiom for divinely given speech. 'Puts in my mouth'
    is idiomatic English and preserves the metaphor of inspired utterance.
- source_word: אֹתוֹ אֲדַבֵּר
  chosen: I will speak only
  alternatives:
  - that I will speak
  - that alone will I speak
  lexicon: HALOT
  rationale: 'The fronted object plus verb stresses limitation: Balaam will speak
    that word and no other. ''Only'' makes the exclusivity explicit in natural English.'
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - god
  - Gods
  lexicon: HALOT
  rationale: Though morphologically plural, the verb is singular and the referent
    in context is Israel’s God speaking authoritatively to Balaam; therefore singular
    'God' is required.
