theological_decisions:
- issue: Divine control over Balaam’s speech
  chosen_reading: Balaam states that he can speak only what God gives him to say.
  alternative_readings:
  - Balaam can speak whatever he wishes but intends to restrict himself voluntarily
  rationale: The emphatic limitation in הֲיָכוֹל אוּכַל ... אֹתוֹ אֲדַבֵּר presents
    not mere preference but constrained prophetic speech. The translation preserves
    this theological tension without overstating mechanics of inspiration.
  doctrine_reference: Preserve theological tension rather than resolve it.
