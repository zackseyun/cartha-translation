theological_decisions:
- issue: Counterfactual clause with apparent lack of explicit negation after אוּלַי
  chosen_reading: Render the sense as 'If she had not turned aside from before me'
  alternative_readings:
  - Render woodenly as 'Perhaps she turned aside from before me'
  rationale: 'The narrative logic requires a counterfactual: the donkey''s turning
    aside prevented Balaam''s death. A strictly formal rendering without negation
    produces the opposite sense of the context. Optimal equivalence therefore supplies
    the negation required by idiomatic English and contextual coherence while documenting
    the issue.'
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source''s
    plain sense without paraphrasing beyond what the text warrants.'
