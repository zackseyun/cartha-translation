id: NUM.22.33
reference: Numbers 22:33
source:
  edition: WLC
  text: וַ/תִּרְאַ֨/נִי֙ הָֽ/אָת֔וֹן וַ/תֵּ֣ט לְ/פָנַ֔/י זֶ֖ה שָׁלֹ֣שׁ רְגָלִ֑ים אוּלַי֙
    נָטְתָ֣ה מִ/פָּנַ֔/י כִּ֥י עַתָּ֛ה גַּם אֹתְ/כָ֥ה הָרַ֖גְתִּי וְ/אוֹתָ֥/הּ הֶחֱיֵֽיתִי־׃
translation:
  text: The donkey saw me and turned aside before me these three times. If she had
    not turned aside from before me, surely by now I would have killed you and let
    her live.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'perhaps she turned aside from before me'; the clause
      is commonly understood as a counterfactual, 'if she had not turned aside from
      before me,' which fits the context and the following statement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּרְאַנִי
  chosen: saw me
  alternatives:
  - caught sight of me
  - perceived me
  lexicon: HALOT
  rationale: From ראה, straightforward visual perception in context. 'Saw me' is the
    plainest modern English rendering.
- source_word: הָאָתוֹן
  chosen: the donkey
  alternatives:
  - the she-donkey
  lexicon: HALOT
  rationale: אָתוֹן denotes a female donkey. English 'donkey' is natural and the feminine
    is already reflected by the pronoun 'she' later in the verse; 'she-donkey' is
    possible but less idiomatic.
- source_word: וַתֵּט לְפָנַי
  chosen: turned aside before me
  alternatives:
  - turned aside from before me
  - veered away in front of me
  lexicon: HALOT
  rationale: נטה here means to turn aside or deviate. Retaining 'before me' reflects
    לְפָנַי closely and preserves the angel's spatial relation to the donkey.
- source_word: זֶה שָׁלֹשׁ רְגָלִים
  chosen: these three times
  alternatives:
  - these three occasions
  - this three times
  lexicon: HALOT
  rationale: Literally 'these three feet/occasions,' an idiom for repeated instances.
    'These three times' is the clearest idiomatic English equivalent.
- source_word: אוּלַי
  chosen: If
  alternatives:
  - Perhaps
  - Maybe
  lexicon: HALOT
  rationale: Although אוּלַי often means 'perhaps,' in this counterfactual construction
    with the following perfect it introduces a hypothetical condition. English 'If'
    best conveys the sense in context.
- source_word: נָטְתָה מִפָּנַי
  chosen: she had not turned aside from before me
  alternatives:
  - she had not turned aside from me
  - she had not moved away from before me
  lexicon: HALOT
  rationale: The clause is counterfactual and requires negation in English to make
    sense with the following result clause, even though the Hebrew text as transmitted
    lacks an explicit negative. 'From before me' preserves the prepositional phrase
    מִפָּנַי.
- source_word: כִּי עַתָּה
  chosen: surely by now
  alternatives:
  - for now
  - indeed now
  lexicon: HALOT
  rationale: In this context the phrase introduces the apodosis with emphatic immediacy.
    'Surely by now' captures both force and temporal sense idiomatically.
- source_word: גַּם אֹתְךָה
  chosen: you
  alternatives:
  - even you
  lexicon: HALOT
  rationale: גַּם adds emphasis ('even/also'), but in natural English the emphasis
    is sufficiently conveyed by the sentence structure. The direct object pronoun
    is rendered simply as 'you.'
- source_word: הָרַגְתִּי
  chosen: I would have killed
  alternatives:
  - I would have slain
  lexicon: HALOT
  rationale: Perfect verb in a counterfactual result clause; English conditional perfect
    is required. 'Killed' is clear modern English.
- source_word: וְאֹתָהּ הֶחֱיֵיתִי
  chosen: and let her live
  alternatives:
  - and kept her alive
  - and spared her
  lexicon: HALOT
  rationale: The Hiphil of חיה means to keep alive or let live. 'Let her live' is
    concise and preserves the contrast with Balaam's death. 'Spared her' is interpretive
    and therefore kept as an alternative.
