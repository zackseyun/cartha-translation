id: NUM.22.39
reference: Numbers 22:39
source:
  edition: WLC
  text: וַ/יֵּ֥לֶךְ בִּלְעָ֖ם עִם בָּלָ֑ק וַ/יָּבֹ֖אוּ קִרְיַ֥ת חֻצֽוֹת־׃
translation:
  text: So Balaam went with Balak, and they came to Kiriath-huzoth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kiriath-huzoth likely means 'city of streets' or 'city of open places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - walked
  - traveled
  lexicon: HALOT
  rationale: Qal wayyiqtol of הלך commonly advances the narrative with the simple
    sense 'went.' 'Went' is the most natural modern English rendering here.
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: עִם
  chosen: with
  alternatives:
  - along with
  lexicon: HALOT
  rationale: The preposition straightforwardly denotes accompaniment; 'with' is the
    plain and idiomatic choice.
- source_word: בָּלָק
  chosen: Balak
  rationale: Personal name transliterated by standard English convention.
- source_word: וַיָּבֹאוּ
  chosen: they came
  alternatives:
  - they arrived
  - they entered
  lexicon: HALOT
  rationale: Plural wayyiqtol of בוא marks the next narrative action. 'They came'
    preserves the basic motion sense without over-specifying arrival or entry.
- source_word: קִרְיַת חֻצוֹת
  chosen: Kiriath-huzoth
  alternatives:
  - the city of streets
  - City of Streets
  lexicon: HALOT
  rationale: This is a place name composed of קִרְיַת ('city/town of') + חֻצוֹת ('streets/open
    places'). Because it functions here as a proper place name, transliteration is
    preferred in the main text. The lexical sense is worth preserving in a footnote.
