id: NUM.22.1
reference: Numbers 22:1
source:
  edition: WLC
  text: וַ/יִּסְע֖וּ בְּנֵ֣י יִשְׂרָאֵ֑ל וַֽ/יַּחֲנוּ֙ בְּ/עַֽרְב֣וֹת מוֹאָ֔ב מֵ/עֵ֖בֶר
    לְ/יַרְדֵּ֥ן יְרֵחֽוֹ׃ס
translation:
  text: Then the sons of Israel set out and camped in the plains of Moab, beyond the
    Jordan at Jericho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew is literally 'the sons of Israel,' a standard
      national designation.
    reason: lexical_alternative
  - marker: b
    text: Or 'across the Jordan' or 'on the other side of the Jordan.' The phrase
      is geographically relative to the narrator's perspective.
    reason: lexical_alternative
  - marker: c
    text: Jericho is the landmark indicating the location of the plains of Moab on
      the east side of the Jordan.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּסְעוּ
  chosen: set out
  alternatives:
  - journeyed
  - pulled up and traveled
  lexicon: HALOT
  rationale: From נסע in the wilderness-travel narrative, the verb denotes breaking
    camp and moving on. 'Set out' is natural modern English and preserves the travel
    sense without archaic tone.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Given the project's gender-accurate principle,
    this is retained rather than flattened to 'Israelites,' while still functioning
    corporately for the nation. 'Children of Israel' is traditional but less precise
    to the Hebrew form.
- source_word: וַיַּחֲנוּ
  chosen: camped
  alternatives:
  - encamped
  lexicon: HALOT
  rationale: From חנה, 'to camp/encamp.' 'Camped' gives the plain sense in readable
    modern English; 'encamped' is slightly more formal but not necessary here.
- source_word: בְּעַרְבוֹת מוֹאָב
  chosen: in the plains of Moab
  alternatives:
  - in the steppes of Moab
  - in the desert plains of Moab
  lexicon: HALOT
  rationale: עַרְבוֹת refers to steppe/plains terrain. 'Plains of Moab' is established,
    clear English and fits the geographical setting.
- source_word: מֵעֵבֶר לַיַּרְדֵּן
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: HALOT
  rationale: עֵבֶר with מן marks the region across/beyond the Jordan from the narrator's
    frame of reference. 'Beyond the Jordan' is concise and conventional, while preserving
    the geographical relation without over-specifying viewpoint.
- source_word: יְרֵחוֹ
  chosen: at Jericho
  alternatives:
  - opposite Jericho
  - near Jericho
  lexicon: HALOT
  rationale: With the preceding geographical phrase, Jericho serves as the landmark
    opposite which they camped. English idiom allows 'at Jericho' to express location
    by reference point; 'opposite Jericho' is possible but less smooth without adding
    explicit wording absent from the Hebrew.
