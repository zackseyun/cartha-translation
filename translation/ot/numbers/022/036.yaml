id: NUM.22.36
reference: Numbers 22:36
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֥ע בָּלָ֖ק כִּ֣י בָ֣א בִלְעָ֑ם וַ/יֵּצֵ֨א לִ/קְרָאת֜/וֹ אֶל עִ֣יר
    מוֹאָ֗ב אֲשֶׁר֙ עַל גְּב֣וּל אַרְנֹ֔ן אֲשֶׁ֖ר בִּ/קְצֵ֥ה הַ/גְּבֽוּל־־׃
translation:
  text: When Balak heard that Balaam had come, he went out to meet him at the city
    of Moab, which is on the border of the Arnon, at the edge of the border.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a city of Moab.' The Hebrew phrase may refer either to a specific
      known city in Moab or more generally to a city belonging to Moab.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the end of the territory.' The Hebrew word for 'border' can also
      mean 'territory' in some contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - learned
  - was told
  lexicon: HALOT
  rationale: The verb שׁמע commonly means 'hear.' In this narrative context, 'heard'
    is natural English and preserves the straightforward report of receiving news
    without adding mediation not explicit in the Hebrew.
- source_word: כִּי בָא
  chosen: that Balaam had come
  alternatives:
  - that Balaam was coming
  - that Balaam came
  lexicon: HALOT
  rationale: 'The clause reports the content of what Balak heard. English past perfect
    (''had come'') fits the sequence well: Balak hears of Balaam''s arrival and then
    goes out to meet him.'
- source_word: וַיֵּצֵא
  chosen: he went out
  alternatives:
  - he came out
  lexicon: HALOT
  rationale: יצא is the standard verb 'go out/come out.' 'Went out' best matches the
    narrative movement from Balak's location toward Balaam.
- source_word: לִקְרָאתוֹ
  chosen: to meet him
  alternatives:
  - to encounter him
  - to greet him
  lexicon: HALOT
  rationale: לקראת commonly expresses movement toward someone for a meeting. 'To meet
    him' is idiomatic and neutral, avoiding the warmer nuance of 'greet' or the harsher
    nuance of 'encounter.'
- source_word: אֶל עִיר מוֹאָב
  chosen: at the city of Moab
  alternatives:
  - to the city of Moab
  - to a city of Moab
  lexicon: HALOT
  rationale: The preposition אֶל with a motion verb could be rendered 'to,' but in
    English after 'went out to meet him' the location is more naturally expressed
    as 'at.' The construct phrase is most naturally definite here, referring to a
    known Moabite city near the border.
- source_word: אֲשֶׁר עַל גְּבוּל אַרְנֹן
  chosen: which is on the border of the Arnon
  alternatives:
  - which was by the border of the Arnon
  - which is on Arnon's border
  lexicon: HALOT
  rationale: עַל גְּבוּל denotes location on or by a boundary. 'The Arnon' refers
    to the river/wadi serving as a border marker. The English keeps the geographic
    note explicit.
- source_word: אֲשֶׁר בִּקְצֵה הַגְּבוּל
  chosen: at the edge of the border
  alternatives:
  - at the end of the territory
  - at the extremity of the border
  lexicon: HALOT
  rationale: קצה means 'end, extremity, edge.' Since גבול in the immediate context
    is already 'border,' rendering it again as 'border' preserves the repetition in
    Hebrew. 'Territory' is possible for גבול, but here the geographic boundary sense
    is primary.
