id: NUM.22.7
reference: Numbers 22:7
source:
  edition: WLC
  text: וַ/יֵּ֨לְכ֜וּ זִקְנֵ֤י מוֹאָב֙ וְ/זִקְנֵ֣י מִדְיָ֔ן וּ/קְסָמִ֖ים בְּ/יָדָ֑/ם
    וַ/יָּבֹ֨אוּ֙ אֶל בִּלְעָ֔ם וַ/יְדַבְּר֥וּ אֵלָ֖י/ו דִּבְרֵ֥י בָלָֽק־׃
translation:
  text: So the elders of Moab and the elders of Midian went, with divination fees
    in their hands, and they came to Balaam and spoke to him the words of Balak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with divinations in their hands'; the Hebrew expression may refer either
      to divinatory implements/omens or, more likely in context, to the payment brought
      for divination.
    reason: lexical_alternative
lexical_decisions:
- source_word: זִקְנֵי
  chosen: elders of
  alternatives:
  - leaders of
  lexicon: HALOT
  rationale: זָקֵן in construct with a people name commonly denotes the recognized
    elders or senior leaders of that group. 'Elders of' preserves the social-political
    office more precisely than the broader 'leaders of'.
- source_word: וּקְסָמִים בְּיָדָם
  chosen: with divination fees in their hands
  alternatives:
  - with divinations in their hands
  - with payment for divination in their hands
  - with omens in their hands
  lexicon: HALOT
  rationale: קְסָמִים can denote acts/items of divination, but in this narrative setting
    it most naturally refers metonymically to the payment or customary fee brought
    to secure Balaam's divinatory service. 'Divination fees' communicates the idiom
    in natural English while retaining the connection to divination. 'In their hands'
    is kept literally as an idiom for carrying something.
- source_word: וַיָּבֹאוּ אֶל
  chosen: they came to
  alternatives:
  - they went to
  lexicon: HALOT
  rationale: בוא with אֶל is straightforwardly 'come to' or 'arrive at.' Since the
    prior verb already states that they went, 'came to' reflects the sequence naturally
    in English.
- source_word: וַיְדַבְּרוּ אֵלָיו
  chosen: and spoke to him
  alternatives:
  - and said to him
  lexicon: HALOT
  rationale: דבר with אֶל means 'speak to.' 'Spoke to him' is the more direct lexical
    equivalent; 'said to him' is possible but less tied to the Hebrew verb.
- source_word: דִּבְרֵי בָלָק
  chosen: the words of Balak
  alternatives:
  - Balak's words
  - Balak's message
  lexicon: HALOT
  rationale: The construct phrase is literally 'the words of Balak.' This preserves
    the formal sense and leaves open whether the content is a direct quotation or
    commissioned message. 'Balak's message' is interpretive and slightly more dynamic.
- source_word: וַיֵּלְכוּ
  chosen: So ... went
  alternatives:
  - And ... went
  - Then ... went
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So' gives natural English
    narrative flow while preserving the consequential movement from the prior verse.
