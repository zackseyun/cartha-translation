id: NUM.22.40
reference: Numbers 22:40
source:
  edition: WLC
  text: וַ/יִּזְבַּ֥ח בָּלָ֖ק בָּקָ֣ר וָ/צֹ֑אן וַ/יְשַׁלַּ֣ח לְ/בִלְעָ֔ם וְ/לַ/שָּׂרִ֖ים
    אֲשֶׁ֥ר אִתּֽ/וֹ׃
translation:
  text: And Balak sacrificed cattle and sheep, and sent some to Balaam and to the
    officials who were with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sent portions to Balaam and to the officials who were with him.' The
      Hebrew says simply 'sent,' but the context of sacrificed animals suggests food
      or sacrificial portions were sent.
    reason: lexical_alternative
  - marker: b
    text: '''Sheep'' may also be understood more broadly as ''flock'' or ''small livestock,''
      since the Hebrew term can include goats as well.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבַּח
  chosen: sacrificed
  alternatives:
  - slaughtered
  - offered as sacrifices
  lexicon: HALOT
  rationale: The verb זבח commonly denotes slaughter for sacrifice, not merely ordinary
    butchering. 'Sacrificed' is concise and preserves the cultic sense better than
    the more generic 'slaughtered.'
- source_word: בָּקָר
  chosen: cattle
  alternatives:
  - oxen
  - herd animals
  lexicon: HALOT
  rationale: בקר is a collective term for bovines/herd cattle. 'Cattle' is natural
    modern English and avoids implying only male animals, as 'oxen' might.
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - flock
  - small livestock
  lexicon: HALOT
  rationale: צאן can refer collectively to small livestock, especially sheep and goats.
    Here 'sheep' is a conventional concise rendering in the pairing 'cattle and sheep,'
    though the broader sense is possible.
- source_word: וַיְשַׁלַּח
  chosen: sent some
  alternatives:
  - sent
  - sent portions
  lexicon: HALOT
  rationale: The verb itself is simply 'sent,' but in context after sacrificial slaughter
    it implies sending meat or portions from the sacrifice. Adding 'some' makes the
    English intelligible without over-specifying 'portions,' which is implied rather
    than explicit.
- source_word: לְבִלְעָם
  chosen: to Balaam
  rationale: Personal name transliterated according to the project's policy.
- source_word: לַשָּׂרִים
  chosen: to the officials
  alternatives:
  - to the princes
  - to the leaders
  lexicon: HALOT
  rationale: שׂרים refers to high-ranking persons or officials. 'Officials' is clear
    modern English and avoids the potentially misleading hereditary nuance of 'princes'
    in this context.
- source_word: אֲשֶׁר אִתּוֹ
  chosen: who were with him
  alternatives:
  - who were with Balaam
  - with him
  lexicon: HALOT
  rationale: The suffix most naturally refers to Balaam, the nearest singular antecedent
    and the one accompanied by attendants in the narrative. Expanding to 'who were
    with him' preserves the Hebrew's relative clause while leaving the pronoun as
    in the source.
