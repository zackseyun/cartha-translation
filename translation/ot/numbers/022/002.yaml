id: NUM.22.2
reference: Numbers 22:2
source:
  edition: WLC
  text: וַ/יַּ֥רְא בָּלָ֖ק בֶּן צִפּ֑וֹר אֵ֛ת כָּל אֲשֶׁר עָשָׂ֥ה יִשְׂרָאֵ֖ל לָֽ/אֱמֹרִֽי־־־׃
translation:
  text: Now Balak son of Zippor saw all that Israel had done to the Amorites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to the Amorite,' using a singular ethnic term collectively; that
      is, 'to the Amorites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: Now ... saw
  alternatives:
  - And ... saw
  - Then ... saw
  lexicon: HALOT
  rationale: The waw-consecutive with ראה advances the narrative. 'Saw' is the plain
    sense. 'Now' renders the discourse shift naturally in English at the start of
    a new episode, while still reflecting the narrative conjunction.
- source_word: בָּלָק
  chosen: Balak
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: בֶּן צִפּוֹר
  chosen: son of Zippor
  alternatives:
  - the son of Zippor
  rationale: Construct chain identifying lineage is most naturally rendered 'son of
    Zippor.' The article is unnecessary in English.
- source_word: אֵת כָּל אֲשֶׁר
  chosen: all that
  alternatives:
  - everything that
  - all which
  lexicon: HALOT
  rationale: This combination marks the totality of what follows as the direct object.
    'All that' is idiomatic and sufficiently formal.
- source_word: עָשָׂה
  chosen: had done
  alternatives:
  - did
  lexicon: HALOT
  rationale: 'English past perfect fits the narrative relation: Balak saw the results
    of actions Israel had already performed. The Hebrew perfect itself does not require
    pluperfect, but English style favors it here.'
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Standard transliteration for the people/nation name.
- source_word: לָאֱמֹרִי
  chosen: to the Amorites
  alternatives:
  - against the Amorites
  - to the Amorite
  lexicon: HALOT
  rationale: The preposition ל with עשה in this context indicates what was done to
    a people group. Although the noun is morphologically singular collective ('the
    Amorite'), English normally uses the ethnic plural 'the Amorites' for the nation.
    'To' preserves the broad Hebrew relation better than the more interpretive 'against.'
