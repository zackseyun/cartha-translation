id: NUM.22.41
reference: Numbers 22:41
source:
  edition: WLC
  text: וַ/יְהִ֣י בַ/בֹּ֔קֶר וַ/יִּקַּ֤ח בָּלָק֙ אֶת בִּלְעָ֔ם וַֽ/יַּעֲלֵ֖/הוּ בָּמ֣וֹת
    בָּ֑עַל וַ/יַּ֥רְא מִ/שָּׁ֖ם קְצֵ֥ה הָ/עָֽם־׃
translation:
  text: And in the morning Balak took Balaam and brought him up to Bamoth-baal, and
    from there he saw the edge of the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the high places of Baal,' if the phrase is taken descriptively rather
      than as the place name Bamoth-baal.
    reason: lexical_alternative
  - marker: b
    text: That is, only the outermost part of Israel was visible from there.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי בַבֹּקֶר
  chosen: And in the morning
  alternatives:
  - And it happened in the morning
  - The next morning
  lexicon: HALOT
  rationale: The waw-consecutive plus היה introduces the next event in narrative sequence.
    'And in the morning' preserves the temporal setting in natural English without
    over-literalizing the Hebrew narrative formula.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - took along
  - fetched
  lexicon: HALOT
  rationale: לקח commonly means 'take.' Here Balak takes Balaam with him to another
    location. 'Took' is sufficiently broad and keeps close to the Hebrew.
- source_word: וַיַּעֲלֵהוּ
  chosen: brought him up
  alternatives:
  - took him up
  - led him up
  lexicon: HALOT
  rationale: עלה in the Hiphil means 'cause to go up, bring up.' 'Brought him up'
    reflects the causative sense and the ascent to a high place.
- source_word: בָּמוֹת בָּעַל
  chosen: Bamoth-baal
  alternatives:
  - the high places of Baal
  - Bamoth Baal
  lexicon: HALOT
  rationale: The form functions as a place name here rather than a common noun phrase.
    Following the translation philosophy, personal and place names are transliterated
    rather than translated. The hyphenated form reflects the compound toponym.
- source_word: וַיַּרְא
  chosen: he saw
  alternatives:
  - he looked on
  - he viewed
  lexicon: HALOT
  rationale: ראה is the ordinary verb 'see.' The subject is best taken as Balaam in
    context, since Balak has brought him there in order to view Israel. English keeps
    the implicit subject with 'he saw.'
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from that place
  lexicon: HALOT
  rationale: A straightforward locative adverb indicating the vantage point from which
    the sighting occurred.
- source_word: קְצֵה הָעָם
  chosen: the edge of the people
  alternatives:
  - the extremity of the people
  - the outskirts of the people
  - the edge of the camp
  lexicon: HALOT
  rationale: קצה denotes an end, edge, or extremity. The Hebrew says 'the people,'
    not explicitly 'camp,' so 'the edge of the people' stays closer to the source
    while conveying that only part of Israel was visible.
