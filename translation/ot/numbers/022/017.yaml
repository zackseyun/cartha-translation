id: NUM.22.17
reference: Numbers 22:17
source:
  edition: WLC
  text: כִּֽי כַבֵּ֤ד אֲכַבֶּדְ/ךָ֙ מְאֹ֔ד וְ/כֹ֛ל אֲשֶׁר תֹּאמַ֥ר אֵלַ֖/י אֶֽעֱשֶׂ֑ה
    וּ/לְכָ/ה נָּא֙ קָֽבָ/ה לִּ֔/י אֵ֖ת הָ/עָ֥ם הַ/זֶּֽה־־־־׃
translation:
  text: For I will greatly honor you, and I will do whatever you say to me. So please
    come, curse this people for me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will surely honor you very much' or 'I will richly reward you.' The
      Hebrew uses an infinitive absolute with a finite verb for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces Balak's explanation/promise as the reason for his renewed
    request. 'For' fits the discourse flow naturally in English.
- source_word: כַבֵּד אֲכַבֶּדְךָ
  chosen: I will greatly honor you
  alternatives:
  - I will surely honor you
  - I will richly reward you
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the promise. The
    root כבד commonly conveys honor, making 'honor' the most direct rendering; 'greatly'
    captures the emphatic force. 'Reward' is possible contextually, but the Hebrew
    term itself is honor-language.
- source_word: מְאֹד
  chosen: greatly
  alternatives:
  - very much
  - exceedingly
  lexicon: HALOT
  rationale: Used adverbially to strengthen the promise. 'Greatly' reads smoothly
    with 'honor' in modern English.
- source_word: וְכֹל אֲשֶׁר תֹּאמַר אֵלַי אֶעֱשֶׂה
  chosen: and I will do whatever you say to me
  alternatives:
  - and all that you say to me I will do
  - and whatever you tell me I will do
  lexicon: HALOT
  rationale: Preserves the broad scope of כֹל אֲשֶׁר while using natural English word
    order. 'Say to me' is retained rather than paraphrased more loosely, though 'tell
    me' is a viable alternative.
- source_word: וּלְכָה נָּא
  chosen: So please come
  alternatives:
  - And now, please come
  - Come now, please
  lexicon: HALOT
  rationale: לְכָה is an imperative of motion, and נָא adds politeness/urgency. 'So
    please come' reflects the appeal in idiomatic English and connects it to the preceding
    promises.
- source_word: קָבָה
  chosen: curse
  alternatives:
  - denounce
  - pronounce a curse on
  lexicon: HALOT
  rationale: In this Balaam context the verb refers to invoking a curse. 'Curse' is
    the plain and established sense here without unnecessary expansion.
- source_word: לִּי
  chosen: for me
  alternatives:
  - on my behalf
  lexicon: HALOT
  rationale: Captures Balak's personal interest in the requested action in straightforward
    English.
- source_word: אֵת הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: עָם is singular in Hebrew and often means 'people' in the collective
    sense. 'This people' preserves the singular collective force better than 'these
    people,' while remaining natural enough in English.
