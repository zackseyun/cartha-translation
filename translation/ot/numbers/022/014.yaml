id: NUM.22.14
reference: Numbers 22:14
source:
  edition: WLC
  text: וַ/יָּק֨וּמוּ֙ שָׂרֵ֣י מוֹאָ֔ב וַ/יָּבֹ֖אוּ אֶל בָּלָ֑ק וַ/יֹּ֣אמְר֔וּ מֵאֵ֥ן
    בִּלְעָ֖ם הֲלֹ֥ךְ עִמָּֽ/נוּ־׃
translation:
  text: So the officials of Moab got up and went to Balak, and said, “Balaam refused
    to go with us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Balaam was unwilling to go with us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי
  chosen: officials
  alternatives:
  - princes
  - leaders
  lexicon: HALOT
  rationale: שָׂרִים denotes rulers, officials, or princes. 'Officials' fits the diplomatic
    envoys sent by Balak and is clear modern English without implying hereditary nobility
    as strongly as 'princes'.
- source_word: וַיָּקֻמוּ
  chosen: got up
  alternatives:
  - rose
  - set out
  lexicon: HALOT
  rationale: The verb קום literally means 'arose/got up.' In narrative sequence it
    can imply departure, but here the plain sense is retained in natural English as
    'got up,' followed by 'went' for the travel action.
- source_word: וַיָּבֹאוּ אֶל
  chosen: went to
  alternatives:
  - came to
  lexicon: HALOT
  rationale: בוא with אֶל can be rendered 'came to' or 'went to' depending on viewpoint.
    Since the narrative is reporting their return to Balak rather than speaking from
    Balak's location, 'went to' is the more natural English choice.
- source_word: מֵאֵן
  chosen: refused
  alternatives:
  - was unwilling
  - declined
  lexicon: HALOT
  rationale: The participle of מאן expresses refusal. 'Refused' is the most direct
    and idiomatic rendering in English and matches the force of Balaam's negative
    response.
- source_word: הֲלֹךְ עִמָּנוּ
  chosen: to go with us
  alternatives:
  - to come with us
  lexicon: HALOT
  rationale: The infinitive construct הלך with עִם means 'to go with.' Although English
    could say 'come with us' from the speakers' perspective, 'go with us' stays closer
    to the Hebrew verbal choice.
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: מוֹאָב
  chosen: Moab
  rationale: Place/people name transliterated by standard English convention.
