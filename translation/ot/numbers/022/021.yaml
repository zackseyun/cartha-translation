id: NUM.22.21
reference: Numbers 22:21
source:
  edition: WLC
  text: וַ/יָּ֤קָם בִּלְעָם֙ בַּ/בֹּ֔קֶר וַֽ/יַּחֲבֹ֖שׁ אֶת אֲתֹנ֑/וֹ וַ/יֵּ֖לֶךְ
    עִם שָׂרֵ֥י מוֹאָֽב־־׃
translation:
  text: So Balaam rose in the morning, saddled his donkey, and went with the princes
    of Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his she-donkey.' The Hebrew specifically names a female donkey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: rose
  alternatives:
  - got up
  - arose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום in narrative sequence; 'rose' is concise, natural
    English and preserves the straightforward action without unnecessary archaism.
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - early in the morning
  - in the morning time
  lexicon: HALOT
  rationale: The phrase literally means 'in the morning.' Although context may imply
    earliness, the Hebrew here does not explicitly intensify beyond the standard temporal
    expression, so the simpler rendering is preferred.
- source_word: וַיַּחֲבֹשׁ
  chosen: saddled
  alternatives:
  - bound up
  - put a saddle on
  lexicon: HALOT
  rationale: חבש with a donkey refers idiomatically to preparing the animal for riding
    by saddling it. 'Saddled' is the natural English equivalent.
- source_word: אֶת אֲתֹנוֹ
  chosen: his donkey
  alternatives:
  - his she-donkey
  - his female donkey
  lexicon: HALOT
  rationale: אָתוֹן specifically denotes a female donkey. English 'donkey' is idiomatic
    and sufficient in the main text, while the more specific 'she-donkey' is preserved
    in a footnote because the animal's sex remains relevant in the wider narrative.
- source_word: וַיֵּלֶךְ
  chosen: went
  alternatives:
  - set out
  - traveled
  lexicon: HALOT
  rationale: הלך in simple narrative is best rendered 'went.' 'Set out' adds a nuance
    of departure not required by the verb itself.
- source_word: עִם
  chosen: with
  alternatives:
  - along with
  lexicon: HALOT
  rationale: Standard preposition meaning accompaniment; 'with' is the most direct
    rendering.
- source_word: שָׂרֵי מוֹאָב
  chosen: the princes of Moab
  alternatives:
  - the officials of Moab
  - the leaders of Moab
  lexicon: HALOT
  rationale: שָׂרִים denotes rulers, officials, or princes. 'Princes' preserves the
    elevated social-political status and matches the narrative register well, while
    'officials' and 'leaders' are possible but flatter the term's dignity.
