id: NUM.22.24
reference: Numbers 22:24
source:
  edition: WLC
  text: וַֽ/יַּעֲמֹד֙ מַלְאַ֣ךְ יְהוָ֔ה בְּ/מִשְׁע֖וֹל הַ/כְּרָמִ֑ים גָּדֵ֥ר מִ/זֶּ֖ה וְ/גָדֵ֥ר מִ/זֶּֽה׃
translation:
  text: Then the angel of Yahweh stood in a narrow path between the vineyards, with a wall on this side and a wall on that side.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.' The Hebrew word can mean either 'messenger' or 'angel,' but here the supernatural sense fits the narrative context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד
  chosen: Then ... stood
  alternatives:
  - and ... stood
  - took his stand
  lexicon: HALOT
  rationale: Wayyiqtol of עמד advances the narrative. 'Then ... stood' gives natural English narrative sequence while preserving the basic sense of taking a standing position.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאָךְ can mean 'messenger' or 'angel'; in this Balaam narrative the supernatural being is clearly in view, so 'angel' is the best contextual rendering. יְהוָה follows the doctrinal default 'the LORD' rather than 'Yahweh.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּמִשְׁעוֹל
  chosen: in a narrow path
  alternatives:
  - in a path
  - in a lane
  lexicon: HALOT
  rationale: מִשְׁעוֹל denotes a track or narrow path. 'Narrow path' best captures the constrained setting that explains the donkey's inability to avoid the angel.
- source_word: הַכְּרָמִים
  chosen: between the vineyards
  alternatives:
  - among the vineyards
  - in the vineyards
  lexicon: HALOT
  rationale: The plural 'vineyards' is explicit. Given the following description of walls on both sides, 'between the vineyards' makes the spatial relation clear in idiomatic English.
- source_word: גָּדֵר
  chosen: stone wall
  alternatives:
  - wall
  - fence
  lexicon: HALOT
  rationale: גָּדֵר refers to an enclosing wall or fence, commonly of stones around vineyards. 'Stone wall' makes the agricultural setting concrete and natural in English.
- source_word: מִזֶּה ... וְגָדֵר מִזֶּה
  chosen: on this side and ... on that side
  alternatives:
  - on one side and ... on the other side
  lexicon: HALOT
  rationale: The repeated demonstrative construction marks a wall on each side of the path. 'On this side and on that side' closely reflects the Hebrew while remaining readable.
