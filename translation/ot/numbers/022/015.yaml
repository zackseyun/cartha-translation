id: NUM.22.15
reference: Numbers 22:15
source:
  edition: WLC
  text: וַ/יֹּ֥סֶף ע֖וֹד בָּלָ֑ק שְׁלֹ֣חַ שָׂרִ֔ים רַבִּ֥ים וְ/נִכְבָּדִ֖ים מֵ/אֵֽלֶּה׃
translation:
  text: Then Balak again sent officials, more numerous and more honored than these.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more distinguished' or 'more honorable than these.' The Hebrew emphasizes
      higher status or greater prestige.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף
  chosen: Then ... again sent
  alternatives:
  - added
  - continued
  - sent again
  lexicon: HALOT
  rationale: The idiom יָסַף + infinitive ('he added to send') is natural English
    as 'sent again' or 'again sent.' Including 'Then' reflects the narrative waw-consecutive
    sequence.
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - further
  - once more
  lexicon: HALOT
  rationale: In this context עוֹד reinforces repetition, so 'again' best captures
    the adverbial force with וַיֹּסֶף.
- source_word: בָּלָק
  chosen: Balak
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: שְׁלֹחַ
  chosen: sent
  alternatives:
  - to send
  - sending
  lexicon: HALOT
  rationale: The infinitive construct after יָסַף forms an idiom meaning 'to do again/continue
    doing.' English finite verb 'sent' is required for natural syntax.
- source_word: שָׂרִים
  chosen: officials
  alternatives:
  - princes
  - leaders
  - chiefs
  lexicon: HALOT
  rationale: שָׂרִים denotes high-ranking representatives or officials. 'Officials'
    is clear modern English and fits the diplomatic context better than the archaic
    'princes.'
- source_word: רַבִּים
  chosen: more numerous
  alternatives:
  - many
  - more
  - greater in number
  lexicon: HALOT
  rationale: With the comparative phrase מֵאֵלֶּה ('than these'), the sense is comparative
    rather than merely absolute. 'More numerous' makes the comparison explicit.
- source_word: וְנִכְבָּדִים
  chosen: more honored
  alternatives:
  - more distinguished
  - more honorable
  - more important
  lexicon: HALOT
  rationale: From כבד in the passive/adjectival sense of being weighty, honored, or
    distinguished. 'More honored' preserves the dignity/status nuance without sounding
    overly formal.
- source_word: מֵאֵלֶּה
  chosen: than these
  alternatives:
  - than those
  - than the former ones
  lexicon: HALOT
  rationale: The demonstrative points back to the previously sent delegation. 'Than
    these' is a direct rendering; the referent is clear from context.
