id: NUM.22.34
reference: Numbers 22:34
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר בִּלְעָ֜ם אֶל מַלְאַ֤ךְ יְהוָה֙ חָטָ֔אתִי כִּ֚י לֹ֣א יָדַ֔עְתִּי
    כִּ֥י אַתָּ֛ה נִצָּ֥ב לִ/קְרָאתִ֖/י בַּ/דָּ֑רֶךְ וְ/עַתָּ֛ה אִם רַ֥ע בְּ/עֵינֶ֖י/ךָ
    אָשׁ֥וּבָה לִּֽ/י־־׃
translation:
  text: Then Balaam said to the angel of the LORD, “I have sinned, for I did not know
    that you were standing to confront me on the road. And now, if it is evil in your
    eyes, I will turn back.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'if it is evil in your eyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean either 'messenger' or 'angel,' but in this narrative
    the figure is a supernatural being visibly opposing Balaam, so 'angel' best fits
    English usage. יְהוָה is rendered 'the LORD' per doctrine default.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The project default for the divine name is 'the LORD,' preserving established
    reverential convention and matching the doctrine guidance.
- source_word: חָטָאתִי
  chosen: I have sinned
  alternatives:
  - I sinned
  lexicon: HALOT
  rationale: The perfect verb expresses Balaam's acknowledgment of guilt. 'I have
    sinned' is idiomatic in English for confession and preserves the present relevance
    of the act.
- source_word: כִּי לֹא יָדַעְתִּי
  chosen: for I did not know
  alternatives:
  - because I did not know
  lexicon: HALOT
  rationale: כִּי here introduces the reason for Balaam's confession. 'For' is concise
    and natural in direct speech.
- source_word: נִצָּב לִקְרָאתִי
  chosen: were standing to confront me
  alternatives:
  - were stationed to meet me
  - stood against me
  - were standing in opposition to me
  lexicon: HALOT
  rationale: נִצָּב conveys taking one's stand, and לִקְרָאתִי means 'to meet/toward
    me,' often with adversative force in context. Because the angel is blocking Balaam
    with drawn sword, 'to confront me' makes the hostile sense explicit without overparaphrasing.
- source_word: בַּדָּרֶךְ
  chosen: on the road
  alternatives:
  - in the way
  - on the way
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'On the road' is clear modern English
    and fits the travel setting.
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - So now
  - Now then
  lexicon: HALOT
  rationale: This discourse marker signals Balaam's response after his confession.
    'And now' preserves the transition naturally.
- source_word: אִם רַע בְּעֵינֶיךָ
  chosen: if it is evil in your eyes
  alternatives:
  - if it is displeasing in your sight
  - if it seems wrong to you
  lexicon: HALOT
  rationale: Literally the Hebrew says 'if [it is] evil in your eyes.' Retaining 'evil
    in your eyes' preserves the source idiom and moral weight better than the softer
    'displeasing,' while remaining understandable in English.
- source_word: אָשׁוּבָה לִּי
  chosen: I will turn back
  alternatives:
  - I will go back
  - let me return
  lexicon: HALOT
  rationale: The cohortative form expresses Balaam's stated intention or willingness
    to return. 'I will turn back' is a natural English rendering that preserves the
    directional sense. The לִּי is an ethical/dative nuance not requiring separate
    representation in English.
