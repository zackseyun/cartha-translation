id: NUM.22.30
reference: Numbers 22:30
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר הָ/אָת֜וֹן אֶל בִּלְעָ֗ם הֲ/לוֹא֩ אָנֹכִ֨י אֲתֹֽנְ/ךָ֜ אֲשֶׁר
    רָכַ֣בְתָּ עָלַ֗/י מֵ/עֽוֹדְ/ךָ֙ עַד הַ/יּ֣וֹם הַ/זֶּ֔ה הַֽ/הַסְכֵּ֣ן הִסְכַּ֔נְתִּי
    לַ/עֲשׂ֥וֹת לְ/ךָ֖ כֹּ֑ה וַ/יֹּ֖אמֶר לֹֽא־־־׃
translation:
  text: Then the donkey said to Balaam, “Am I not your donkey, on which you have ridden
    all your life to this day? Have I ever been accustomed to do this to you?” And
    he said, “No.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'your she-donkey' / 'the she-donkey'; the noun specifically refers
      to a female donkey.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָתוֹן
  chosen: the donkey
  alternatives:
  - the she-donkey
  - the female donkey
  lexicon: HALOT
  rationale: אָתוֹן specifically denotes a female donkey. In natural English narrative,
    'donkey' is the most readable main-text rendering, while the more specific sex-marked
    alternatives are preserved as lexical alternatives.
- source_word: הֲלוֹא
  chosen: Am I not
  alternatives:
  - Is it not so that I am
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Am I not' is idiomatic
    and preserves the force.
- source_word: אֲתֹנְךָ
  chosen: your donkey
  alternatives:
  - your she-donkey
  lexicon: HALOT
  rationale: Possessive form of אָתוֹן. 'Your donkey' is natural English and matches
    the preceding noun while retaining the personal appeal of the animal's argument.
- source_word: אֲשֶׁר רָכַבְתָּ עָלַי
  chosen: on which you have ridden
  alternatives:
  - which you have ridden
  - upon which you have ridden
  lexicon: HALOT
  rationale: The relative clause plus עַל conveys riding on the animal. 'On which
    you have ridden' is clear and sufficiently formal without sounding archaic.
- source_word: מֵעוֹדְךָ עַד הַיּוֹם הַזֶּה
  chosen: all your life to this day
  alternatives:
  - from your beginning until this day
  - ever since you existed until this day
  lexicon: HALOT
  rationale: The idiom means from long ago/for as long as one can remember. 'All your
    life to this day' communicates the force naturally in English better than a wooden
    'from your existence.'
- source_word: הַהַסְכֵּן הִסְכַּנְתִּי
  chosen: Have I ever been accustomed
  alternatives:
  - Was I ever accustomed
  - Have I indeed been in the habit
  lexicon: HALOT
  rationale: Infinitive absolute plus finite verb of סכן intensifies the verbal idea,
    forming a rhetorical question about customary behavior. 'Have I ever been accustomed'
    captures both the interrogative and habitual sense.
- source_word: לַעֲשׂוֹת לְךָ כֹּה
  chosen: to do this to you
  alternatives:
  - to act this way toward you
  - to do thus to you
  lexicon: HALOT
  rationale: כֹּה points to the donkey's present unusual behavior. 'Do this to you'
    is idiomatic modern English; 'thus' is more formal but less natural.
- source_word: וַיֹּאמֶר לֹא
  chosen: And he said, “No.”
  alternatives:
  - But he said, “No.”
  lexicon: HALOT
  rationale: Simple narrative continuation with Balaam's direct negative reply. 'And'
    reflects the Hebrew waw-consecutive straightforwardly.
