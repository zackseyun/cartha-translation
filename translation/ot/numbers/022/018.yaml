theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the LXX pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of Balaam's statement
  chosen_reading: inability to exceed the LORD's spoken word
  alternative_readings:
  - refusal to disobey the LORD's command
  rationale: The Hebrew uses יכל ('be able') plus the idiom 'go beyond the mouth/word
    of.' The translation preserves the stated inability and does not flatten it into
    mere volitional refusal, while still implying obedience.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
