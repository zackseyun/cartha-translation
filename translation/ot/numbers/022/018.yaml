id: NUM.22.18
reference: Numbers 22:18
source:
  edition: WLC
  text: וַ/יַּ֣עַן בִּלְעָ֗ם וַ/יֹּ֨אמֶר֙ אֶל עַבְדֵ֣י בָלָ֔ק אִם יִתֶּן לִ֥/י בָלָ֛ק
    מְלֹ֥א בֵית֖/וֹ כֶּ֣סֶף וְ/זָהָ֑ב לֹ֣א אוּכַ֗ל לַ/עֲבֹר֙ אֶת פִּי֙ יְהוָ֣ה אֱלֹהָ֔/י
    לַ/עֲשׂ֥וֹת קְטַנָּ֖ה א֥וֹ גְדוֹלָֽה־־־־׃
translation:
  text: Balaam answered and said to Balak’s servants, “Even if Balak were to give
    me his house full of silver and gold, I could not go beyond the word of the LORD
    my God, to do anything small or great.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''go beyond the mouth of the LORD my God,'' an idiom meaning to
      exceed or violate what he has said.'
    reason: lexical_alternative
  - marker: b
    text: Or 'transgress the command of the LORD my God.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - replied
  lexicon: HALOT
  rationale: Standard narrative use of ענה introducing a response; 'answered' preserves
    the formal dialogue structure.
- source_word: עַבְדֵי
  chosen: servants
  alternatives:
  - slaves
  - officials
  lexicon: HALOT
  rationale: In context this refers to Balak's emissaries/courtiers. 'Servants' is
    idiomatic and fits the social role without overstating chattel status; 'officials'
    is possible but less literal.
- source_word: אִם יִתֶּן לִי בָלָק
  chosen: Even if Balak were to give me
  alternatives:
  - If Balak gives me
  - Though Balak should give me
  lexicon: HALOT
  rationale: The conditional here is rhetorical/hypothetical in direct speech. 'Even
    if ... were to give' brings out the concessive force naturally in English.
- source_word: מְלֹא בֵיתוֹ כֶּסֶף וְזָהָב
  chosen: his house full of silver and gold
  alternatives:
  - the fullness of his house of silver and gold
  - his house filled with silver and gold
  lexicon: HALOT
  rationale: מְלֹא + house expresses fullness. 'His house full of silver and gold'
    is a natural English rendering that preserves the image of immense wealth.
- source_word: לֹא אוּכַל
  chosen: I could not
  alternatives:
  - I am not able to
  - I cannot
  lexicon: HALOT
  rationale: Expresses inability rather than mere refusal. 'Could not' fits the hypothetical
    conditional established earlier.
- source_word: לַעֲבֹר אֶת פִּי
  chosen: go beyond the word of
  alternatives:
  - transgress the command of
  - go against the mouth of
  - pass beyond the command of
  lexicon: HALOT
  rationale: Literally 'go beyond the mouth of.' The idiom means to exceed or violate
    what someone has said/commanded. 'Go beyond the word of' preserves the metaphor
    more closely than 'command' while remaining clear.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine excerpt's default rendering for the divine name.
- source_word: אֱלֹהַי
  chosen: my God
  lexicon: HALOT
  rationale: Straightforward possessive construction; preserves Balaam's wording without
    importing covenantal implications beyond the text.
- source_word: לַעֲשׂוֹת קְטַנָּה אוֹ גְדוֹלָה
  chosen: to do anything small or great
  alternatives:
  - to do a small thing or a great thing
  - to do less or more
  lexicon: HALOT
  rationale: Hebrew merism for anything at all, whether minor or major. 'Anything
    small or great' keeps the rhetorical pair while reading naturally.
