theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagint pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether וַיִּשְׁתַּחוּ should be rendered as bodily prostration or explicitly
    as worship
  chosen_reading: bodily prostration language ('prostrated himself')
  alternative_readings:
  - worshiped
  rationale: The Hebrew verb can denote worship, but in this narrative setting the
    text explicitly describes Balaam's physical response before the angel. Rendering
    it as 'prostrated himself' preserves the action without forcing a more developed
    theological conclusion than the verse itself states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
