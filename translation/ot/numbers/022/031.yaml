id: NUM.22.31
reference: Numbers 22:31
source:
  edition: WLC
  text: וַ/יְגַ֣ל יְהוָה֮ אֶת עֵינֵ֣י בִלְעָם֒ וַ/יַּ֞רְא אֶת מַלְאַ֤ךְ יְהוָה֙ נִצָּ֣ב
    בַּ/דֶּ֔רֶךְ וְ/חַרְבּ֥/וֹ שְׁלֻפָ֖ה בְּ/יָד֑/וֹ וַ/יִּקֹּ֥ד וַ/יִּשְׁתַּ֖חוּ
    לְ/אַפָּֽי/ו־־׃
translation:
  text: Then the LORD uncovered Balaam’s eyes, and he saw the angel of the LORD standing
    in the road with his sword drawn in his hand; and he bowed down and prostrated
    himself with his face to the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'opened Balaam’s eyes.' The Hebrew verb literally means 'uncovered.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the messenger of the LORD.'
    reason: lexical_alternative
  - marker: c
    text: Or 'fell on his face.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְגַל
  chosen: uncovered
  alternatives:
  - opened
  - revealed
  lexicon: HALOT
  rationale: The verb גלה literally conveys uncovering or revealing. In the idiom
    'uncovered Balaam’s eyes,' it preserves the sense that the LORD removed an impediment
    to sight, rather than merely causing a generic act of seeing. 'Opened' is idiomatic
    and common, but 'uncovered' better reflects the Hebrew verb while remaining natural
    enough in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.' This also aligns with established English Bible convention for YHWH.
- source_word: עֵינֵי בִלְעָם
  chosen: Balaam’s eyes
  alternatives:
  - the eyes of Balaam
  lexicon: HALOT
  rationale: A natural English possessive best represents the construct chain without
    loss of meaning.
- source_word: וַיַּרְא
  chosen: he saw
  alternatives:
  - he looked and saw
  lexicon: HALOT
  rationale: The simple past 'he saw' matches the narrative wayyiqtol and the result
    of the LORD's uncovering his eyes.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: Although מַלְאָךְ can mean 'messenger,' 'angel' is the standard and contextually
    appropriate rendering here for the supernatural being encountered by Balaam.
- source_word: נִצָּב
  chosen: standing
  alternatives:
  - stationed
  - standing firm
  lexicon: HALOT
  rationale: The participle denotes a standing posture or fixed position. 'Standing'
    is the most natural and sufficient rendering in English narrative.
- source_word: בַּדֶּרֶךְ
  chosen: in the road
  alternatives:
  - in the way
  - on the road
  lexicon: HALOT
  rationale: דֶּרֶךְ can mean way, road, or path. Here the physical travel setting
    favors 'road.' 'In the road' reflects the obstructing position of the angel in
    Balaam's route.
- source_word: וְחַרְבּוֹ שְׁלֻפָה בְיָדוֹ
  chosen: with his sword drawn in his hand
  alternatives:
  - and his sword was drawn in his hand
  - with his unsheathed sword in his hand
  lexicon: HALOT
  rationale: 'שְׁלֻפָה means drawn/unsheathed. The prepositional phrase is rendered
    smoothly in English as an accompanying circumstance: ''with his sword drawn in
    his hand.'''
- source_word: וַיִּקֹּד
  chosen: he bowed down
  alternatives:
  - he knelt
  - he bent low
  lexicon: HALOT
  rationale: The verb denotes bowing or stooping low in reverence. 'Bowed down' preserves
    the physical act without over-specifying posture.
- source_word: וַיִּשְׁתַּחוּ
  chosen: and prostrated himself
  alternatives:
  - and worshiped
  - and fell down
  lexicon: HALOT
  rationale: The hishtaphel of שחה often denotes prostration. 'Worshiped' could import
    a more interpretive religious sense; 'prostrated himself' keeps the bodily action
    explicit and lets readers infer reverence from context.
- source_word: לְאַפָּיו
  chosen: with his face to the ground
  alternatives:
  - on his face
  - face down
  lexicon: HALOT
  rationale: Literally 'to his face/nostrils,' this idiom means falling on one's face.
    'With his face to the ground' makes the gesture clear in contemporary English
    while preserving the concrete imagery.
