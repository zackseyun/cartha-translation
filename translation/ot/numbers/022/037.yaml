id: NUM.22.37
reference: Numbers 22:37
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר בָּלָ֜ק אֶל בִּלְעָ֗ם הֲ/לֹא֩ שָׁלֹ֨חַ שָׁלַ֤חְתִּי אֵלֶ֨י/ךָ֙
    לִ/קְרֹא לָ֔/ךְ לָ֥/מָּה לֹא הָלַ֖כְתָּ אֵלָ֑/י הַֽ/אֻמְנָ֔ם לֹ֥א אוּכַ֖ל כַּבְּדֶֽ/ךָ־־־׃
translation:
  text: And Balak said to Balaam, “Did I not urgently send to you to call you? Why
    did you not come to me? Am I really not able to honor you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Did I not certainly send to you,' with the Hebrew using an infinitive
      absolute plus finite verb for emphasis; some understand the emphasis contextually
      as repeated or urgent sending.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'Why did you not go to me?'
    reason: lexical_alternative
  - marker: c
    text: '''Honor you'' may include the sense of bestowing reward or high status,
      not merely showing respect.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech; 'And ... said'
    preserves Hebrew narrative flow without overinterpreting discourse relation.
- source_word: הֲלֹא
  chosen: Did I not
  alternatives:
  - Have I not
  - Surely I
  lexicon: HALOT
  rationale: Interrogative with negation expects an affirmative answer; English rhetorical
    question 'Did I not' matches the force naturally.
- source_word: שָׁלֹחַ שָׁלַחְתִּי
  chosen: urgently send
  alternatives:
  - certainly sent
  - indeed sent
  - repeatedly sent
  lexicon: HALOT
  rationale: Infinitive absolute plus finite verb intensifies the verbal idea. 'Urgently
    send' conveys emphasis in context, where Balak stresses the seriousness of his
    summons. 'Repeatedly sent' is possible contextually but is not required by the
    form itself, so it is preserved as an alternative rather than adopted in the main
    text.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: Directional preposition with pronominal suffix is most naturally rendered
    'to you' here.
- source_word: לִקְרֹא לָךְ
  chosen: to call you
  alternatives:
  - to summon you
  - to invite you
  lexicon: HALOT
  rationale: קרא in this context means summoning someone. 'Call you' is straightforward
    modern English and keeps close to the Hebrew; 'summon you' is slightly more formal
    and is preserved as an alternative.
- source_word: לָמָּה לֹא הָלַכְתָּ אֵלָי
  chosen: Why did you not come to me?
  alternatives:
  - Why did you not go to me?
  lexicon: HALOT
  rationale: הלך literally means 'go/walk,' but with אֵלַי from Balak's perspective
    idiomatic English is 'come to me.' This is an optimal-equivalence adjustment for
    natural receptor-language sense.
- source_word: הַאֻמְנָם
  chosen: really
  alternatives:
  - indeed
  - truly
  - is it really the case
  lexicon: HALOT
  rationale: This particle marks emphatic or incredulous interrogation. 'Really' captures
    Balak's offended incredulity in natural English.
- source_word: לֹא אוּכַל כַּבְּדֶךָ
  chosen: Am I really not able to honor you?
  alternatives:
  - Am I really unable to honor you?
  - Can I not indeed honor you?
  - Am I not able to give you honor?
  lexicon: HALOT
  rationale: יכל expresses ability; כבד in the piel commonly means to honor or bestow
    honor. In this narrative context the honor likely includes reward/status, but
    'honor you' preserves the lexical sense without narrowing it to payment alone.
- source_word: כַּבְּדֶךָ
  chosen: honor you
  alternatives:
  - reward you
  - promote you
  lexicon: HALOT
  rationale: The verb can imply conferring honor materially or socially. 'Honor you'
    is broad enough to include Balak's promised reward while remaining closer to the
    Hebrew root than 'reward you' alone.
