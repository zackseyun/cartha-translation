id: NUM.22.12
reference: Numbers 22:12
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אֱלֹהִים֙ אֶל בִּלְעָ֔ם לֹ֥א תֵלֵ֖ךְ עִמָּ/הֶ֑ם לֹ֤א תָאֹר֙ אֶת
    הָ/עָ֔ם כִּ֥י בָר֖וּךְ הֽוּא־־׃
translation:
  text: And God said to Balaam, “You must not go with them. You must not curse the
    people, because it is blessed.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more idiomatically, ''because they are blessed.'' The Hebrew is singular:
      ''because it/he is blessed,'' referring to the people as a collective.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural,
    sufficiently formal rendering in English narrative style.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the referent is the true God speaking directly to Balaam. 'God'
    is the standard English rendering for אֱלֹהִים in this context.
- source_word: לֹא תֵלֵךְ
  chosen: You must not go
  alternatives:
  - Do not go
  - You shall not go
  lexicon: HALOT
  rationale: The imperfect with לֹא in direct divine speech functions as a prohibition.
    'You must not go' communicates the force clearly in modern English without sounding
    archaic.
- source_word: עִמָּהֶם
  chosen: with them
  lexicon: HALOT
  rationale: Straightforward preposition plus pronominal suffix referring to Balak's
    messengers.
- source_word: לֹא תָאֹר
  chosen: You must not curse
  alternatives:
  - Do not curse
  - You shall not curse
  lexicon: HALOT
  rationale: אָרַר means 'curse.' As with the previous clause, the form is prohibitive
    in context, and 'must not' preserves the force in contemporary English.
- source_word: אֶת הָעָם
  chosen: the people
  alternatives:
  - this people
  lexicon: HALOT
  rationale: הָעָם refers to Israel as a collective people. 'The people' is the plain
    sense; 'this people' would add deixis not present in the Hebrew.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition. 'Because' is the clearest
    modern English connector.
- source_word: בָרוּךְ הוּא
  chosen: it is blessed
  alternatives:
  - he is blessed
  - they are blessed
  lexicon: HALOT
  rationale: The predicate adjective is masculine singular with the pronoun הוּא,
    while the antecedent הָעָם is a collective singular noun. English commonly refers
    to a collective noun like 'people' with 'it' when emphasizing the collective entity.
    This preserves the singular grammar without awkwardness. 'He is blessed' would
    misleadingly individualize the referent; 'they are blessed' is idiomatic but loses
    the singular correspondence.
