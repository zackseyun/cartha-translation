theological_decisions:
- issue: Referent and number in 'blessed' clause
  chosen_reading: 'The clause refers to Israel collectively: ''because it is blessed.'''
  alternative_readings:
  - because he is blessed
  - because they are blessed
  rationale: The Hebrew uses singular grammar (בָרוּךְ הוּא) with the collective noun
    הָעָם. The translation preserves the collective-singular sense rather than converting
    it to a plural or individual referent. This is a grammatical decision, not a doctrinal
    expansion.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
