id: NUM.22.8
reference: Numbers 22:8
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֲלֵי/הֶ֗ם לִ֤ינוּ פֹה֙ הַ/לַּ֔יְלָה וַ/הֲשִׁבֹתִ֤י אֶתְ/כֶם֙ דָּבָ֔ר כַּ/אֲשֶׁ֛ר יְדַבֵּ֥ר יְהוָ֖ה אֵלָ֑/י וַ/יֵּשְׁב֥וּ שָׂרֵֽי מוֹאָ֖ב עִם בִּלְעָֽם־־׃
translation:
  text: And he said to them, “Lodge here tonight, and I will bring back word to you according to what Yahweh speaks to me.” So the princes of Moab stayed with Balaam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will return an answer to you' or 'I will bring back a message to you.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''the LORD'' represents the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
  - marker: c
    text: Or, 'the officials of Moab' or 'the leaders of Moab.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִינוּ
  chosen: Stay
  alternatives:
  - Lodge
  - Spend the night
  lexicon: HALOT
  rationale: Imperative plural from לון/לין, inviting them to remain overnight. 'Stay' is natural modern English and fits the following 'tonight'; 'lodge' is more formal/dated, and 'spend the night' is slightly more expansive.
- source_word: פֹה הַלַּיְלָה
  chosen: here tonight
  alternatives:
  - here this night
  - here for the night
  lexicon: HALOT
  rationale: Combines the adverb פֹה ('here') with הַלַּיְלָה ('the night/tonight'). 'Here tonight' is idiomatic and preserves both location and time.
- source_word: וַהֲשִׁבֹתִי אֶתְכֶם דָּבָר
  chosen: I will bring you back word
  alternatives:
  - I will return an answer to you
  - I will bring back a message to you
  - I will answer you
  lexicon: HALOT
  rationale: Hiphil of שוב with דָּבָר idiomatically means to return with a word/answer. 'Bring you back word' preserves the sense of reporting back without over-paraphrasing. 'Answer you' is possible but less explicit to the Hebrew imagery of returning a word.
- source_word: כַּאֲשֶׁר יְדַבֵּר יְהוָה אֵלַי
  chosen: according to what the LORD speaks to me
  alternatives:
  - as the LORD speaks to me
  - according to whatever the LORD says to me
  lexicon: HALOT
  rationale: כַּאֲשֶׁר marks correspondence ('according to/as'). The imperfect יְדַבֵּר is naturally rendered as future in context. 'Speaks' keeps the verbal force rather than flattening to 'says,' though either is acceptable.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֵּשְׁבוּ
  chosen: stayed
  alternatives:
  - remained
  - lodged
  - sat
  lexicon: HALOT
  rationale: Although the basic verb ישב often means 'sit' or 'dwell,' in this narrative context after the invitation to remain overnight it means they stayed/remained there. 'Stayed' is the clearest contextual rendering.
- source_word: שָׂרֵי מוֹאָב
  chosen: the princes of Moab
  alternatives:
  - the officials of Moab
  - the leaders of Moab
  lexicon: HALOT
  rationale: שָׂרִים denotes princes, officials, or leaders. 'Princes' is a traditional and plausible rendering for high-ranking emissaries in a royal context; alternatives are possible but less specific.
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Standard English transliteration of the personal name בִּלְעָם.
