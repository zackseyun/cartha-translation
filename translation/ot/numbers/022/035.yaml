id: NUM.22.35
reference: Numbers 22:35
source:
  edition: WLC
  text: וַ/יֹּאמֶר֩ מַלְאַ֨ךְ יְהוָ֜ה אֶל בִּלְעָ֗ם לֵ֚ךְ עִם הָ֣/אֲנָשִׁ֔ים וְ/אֶ֗פֶס
    אֶת הַ/דָּבָ֛ר אֲשֶׁר אֲדַבֵּ֥ר אֵלֶ֖י/ךָ אֹת֣/וֹ תְדַבֵּ֑ר וַ/יֵּ֥לֶךְ בִּלְעָ֖ם
    עִם שָׂרֵ֥י בָלָֽק־־־־־׃
translation:
  text: Then the angel of the LORD said to Balaam, “Go with the men, but you must
    speak only the word that I speak to you.” So Balaam went with the officials of
    Balak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew ''the word''; also possible: ''the message'' or ''the matter.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'the princes of Balak.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean 'messenger' or 'angel'; in this narrative the supernatural
    being confronting Balaam is best rendered 'angel.' יְהוָה follows the project's
    default as 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and common English Bible convention.
- source_word: לֵךְ עִם הָאֲנָשִׁים
  chosen: Go with the men
  alternatives:
  - Go with these men
  - Go with the menfolk
  lexicon: HALOT
  rationale: Imperative plus עִם is straightforward. הָאֲנָשִׁים is specifically 'the
    men,' not a generic 'people'; this preserves the masculine plural reference to
    Balaam's male companions.
- source_word: וְאֶפֶס
  chosen: but
  alternatives:
  - only
  - nevertheless
  - except that
  lexicon: HALOT
  rationale: אֶפֶס here introduces a strong restriction or exception to the permission
    just granted. In idiomatic English, 'but' best carries the adversative force when
    followed by 'only' in the clause.
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the thing
  - the matter
  - the message
  lexicon: HALOT
  rationale: Though דָּבָר can mean 'thing/matter,' in a speech context with repeated
    דבר verbs it most naturally means 'word' or 'message.' 'The word' preserves the
    singular and the verbal linkage.
- source_word: אֲדַבֵּר אֵלֶיךָ
  chosen: I speak to you
  alternatives:
  - I tell you
  - I say to you
  lexicon: HALOT
  rationale: 'The imperfect here is relative/future in sense: ''that I speak/will
    speak to you.'' Present English in the relative clause is natural and preserves
    the directness of divine speech.'
- source_word: אֹתוֹ תְדַבֵּר
  chosen: you must speak only
  alternatives:
  - that you shall speak
  - that alone you shall speak
  - you are to speak it
  lexicon: HALOT
  rationale: 'The fronted object אֹתוֹ gives emphasis: Balaam is to speak that word
    and no other. ''You must speak only'' captures both the restriction and the force
    of the instruction in clear English.'
- source_word: שָׂרֵי בָלָק
  chosen: the officials of Balak
  alternatives:
  - the princes of Balak
  - the leaders of Balak
  lexicon: HALOT
  rationale: שָׂרִים denotes rulers, officials, or princes. 'Officials' fits the diplomatic
    entourage context and is more natural in modern English than 'princes,' which
    could imply royal sons.
