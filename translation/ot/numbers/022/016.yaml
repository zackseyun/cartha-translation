id: NUM.22.16
reference: Numbers 22:16
source:
  edition: WLC
  text: וַ/יָּבֹ֖אוּ אֶל בִּלְעָ֑ם וַ/יֹּ֣אמְרוּ ל֗/וֹ כֹּ֤ה אָמַר֙ בָּלָ֣ק בֶּן צִפּ֔וֹר
    אַל נָ֥א תִמָּנַ֖ע מֵ/הֲלֹ֥ךְ אֵלָֽ/י־־־׃
translation:
  text: 'They came to Balaam and said to him, “Thus says Balak son of Zippor: Please
    do not hold back from coming to me.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Please do not refrain from going to me.” The Hebrew uses the common
      motion verb 'go/walk' in the infinitive, but in English 'coming to me' better
      reflects the speaker’s perspective and idiom.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: They came
  alternatives:
  - They arrived
  - They went
  lexicon: HALOT
  rationale: From בוא, the basic motion verb 'come/enter.' In context, the messengers
    approach Balaam, so 'came' is the most natural English narrative rendering.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition introducing the person approached; 'to
    Balaam' is idiomatic English.
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Personal name is transliterated per project philosophy.
- source_word: וַיֹּאמְרוּ לוֹ
  chosen: and said to him
  alternatives:
  - and told him
  - and said
  lexicon: HALOT
  rationale: אמר with indirect object is straightforward speech introduction. 'Said
    to him' preserves the direct-address structure.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... said
  - Thus said
  lexicon: HALOT
  rationale: A standard messenger formula. Present-tense 'says' is conventional in
    English for quoted message formulas and preserves the formal tone.
- source_word: בָּלָק בֶּן צִפּוֹר
  chosen: Balak son of Zippor
  alternatives:
  - Balak, the son of Zippor
  rationale: Names are transliterated; construct relationship is naturally rendered
    'son of.'
- source_word: אַל נָא
  chosen: Please do not
  alternatives:
  - Do not, please
  - I beg you, do not
  lexicon: HALOT
  rationale: אַל marks prohibition, while נָא adds politeness/entreaty. 'Please do
    not' captures both force and tone in natural English.
- source_word: תִמָּנַע
  chosen: hold back
  alternatives:
  - refrain
  - withhold yourself
  - refuse
  lexicon: HALOT
  rationale: From מנע, 'to withhold, restrain, hold back.' Here it governs an infinitive
    of motion, expressing reluctance or refusal to come. 'Hold back' preserves the
    metaphor and reads naturally.
- source_word: מֵהֲלֹךְ
  chosen: from coming
  alternatives:
  - from going
  - from walking
  lexicon: HALOT
  rationale: The preposition מִן with infinitive construct after מנע yields 'hold
    back/refrain from doing.' Although הלך often means 'go,' from the speaker's perspective
    with אֵלַי ('to me'), English idiom prefers 'coming to me.'
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Directional preposition with first-person suffix; 'to me' is the plain
    sense and fits the invitation context.
