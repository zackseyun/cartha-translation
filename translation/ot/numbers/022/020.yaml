theological_decisions:
- issue: Divine designation in this verse
  chosen_reading: Translate אֱלֹהִים as 'God'
  alternative_readings:
  - the LORD
  rationale: The Hebrew text in this verse uses אֱלֹהִים rather than the divine name
    YHWH. Following original-language primacy, the translation preserves that distinction
    instead of harmonizing to 'the LORD' from nearby context.
