id: NUM.22.20
reference: Numbers 22:20
source:
  edition: WLC
  text: וַ/יָּבֹ֨א אֱלֹהִ֥ים אֶל בִּלְעָם֮ לַיְלָה֒ וַ/יֹּ֣אמֶר ל֗/וֹ אִם לִ/קְרֹ֤א
    לְ/ךָ֙ בָּ֣אוּ הָ/אֲנָשִׁ֔ים ק֖וּם לֵ֣ךְ אִתָּ֑/ם וְ/אַ֗ךְ אֶת הַ/דָּבָ֛ר אֲשֶׁר
    אֲדַבֵּ֥ר אֵלֶ֖י/ךָ אֹת֥/וֹ תַעֲשֶֽׂה׀־־־־׃
translation:
  text: God came to Balaam at night and said to him, “If the men have come to call
    for you, rise, go with them; but only the word that I speak to you, that you shall
    do.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “If the men came to summon you.”
    reason: lexical_alternative
  - marker: b
    text: Or “but only the matter that I speak to you, that you shall do.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - appeared
  lexicon: HALOT
  rationale: The verb בוא in the wayyiqtol narrative form is most naturally rendered
    'came' here, describing God's approach to Balaam. 'Appeared' would over-interpret,
    since the text does not specify a visionary manifestation.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: The referent is the deity addressing Balaam. Although the broader context
    also uses YHWH elsewhere, this verse specifically has אֱלֹהִים, so it is translated
    straightforwardly as 'God,' not 'the LORD.'
- source_word: לַיְלָה
  chosen: at night
  alternatives:
  - by night
  - in the night
  lexicon: HALOT
  rationale: An idiomatic temporal rendering in modern English. 'At night' preserves
    the nighttime setting without archaic phrasing.
- source_word: אִם לִקְרֹא לְךָ בָּאוּ הָאֲנָשִׁים
  chosen: If the men have come to call for you
  alternatives:
  - If the men came to summon you
  - If the men have come to invite you
  lexicon: HALOT
  rationale: לקרוא לך is literally 'to call you/for you.' In context the men have
    come to summon Balaam. 'Call for you' keeps the wording close to the Hebrew while
    remaining natural English.
- source_word: קוּם לֵךְ
  chosen: rise, go
  alternatives:
  - get up, go
  - arise, go
  lexicon: HALOT
  rationale: A common Hebrew imperative sequence. 'Rise, go' preserves the twofold
    command with readable modern diction.
- source_word: אִתָּם
  chosen: with them
  lexicon: HALOT
  rationale: Direct and contextually clear rendering of the preposition with pronominal
    suffix.
- source_word: וְאַךְ
  chosen: but only
  alternatives:
  - however, only
  - nevertheless, only
  lexicon: HALOT
  rationale: 'אַךְ marks restriction or limitation. ''But only'' clearly conveys the
    concessive-restrictive force: Balaam may go, but under strict limitation.'
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the matter
  - the thing
  lexicon: HALOT
  rationale: Although דָּבָר can mean 'matter' or 'thing,' in a speech context with
    אֲדַבֵּר ('I speak') the sense 'word' best preserves the verbal connection and
    prophetic force.
- source_word: אֲשֶׁר אֲדַבֵּר אֵלֶיךָ
  chosen: that I speak to you
  alternatives:
  - that I will speak to you
  - which I speak to you
  lexicon: HALOT
  rationale: The imperfect can be rendered with present or future force in English.
    'I speak to you' is concise and fits the immediate command context; the future
    nuance is implicit.
- source_word: אֹתוֹ תַעֲשֶׂה
  chosen: that you shall do
  alternatives:
  - that you must do
  - you shall do it
  lexicon: HALOT
  rationale: 'The construction front-loads the object for emphasis: ''that—this—you
    shall do.'' ''That you shall do'' preserves the emphasis and the authoritative
    tone without paraphrase.'
