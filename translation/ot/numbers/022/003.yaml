id: NUM.22.3
reference: Numbers 22:3
source:
  edition: WLC
  text: וַ/יָּ֨גָר מוֹאָ֜ב מִ/פְּנֵ֥י הָ/עָ֛ם מְאֹ֖ד כִּ֣י רַב ה֑וּא וַ/יָּ֣קָץ מוֹאָ֔ב
    מִ/פְּנֵ֖י בְּנֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: And Moab was very afraid because of the people, because they were numerous;
    and Moab was sick with dread because of the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Moab loathed the sons of Israel' / 'Moab was disgusted because of the
      sons of Israel.' The Hebrew verb can express abhorrence, vexation, or sickened
      dread; here the context favors a fear-laden revulsion.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Israel'; traditionally 'children of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּגָר
  chosen: was very afraid
  alternatives:
  - was in dread
  - feared greatly
  lexicon: HALOT
  rationale: The verb גור in this stem/context conveys fear or dread. 'Was very afraid'
    is natural modern English and preserves the emotional force, with מְאֹד supplying
    the intensification.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - before
  - from the presence of
  lexicon: HALOT
  rationale: Literally 'from before/from the face of,' but here idiomatically expressing
    the cause of Moab's fear. 'Because of' best communicates the sense in readable
    English.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - this people
  - the nation
  lexicon: HALOT
  rationale: The singular collective noun refers to Israel as a people-group. 'The
    people' is the plain sense and matches the Hebrew collective usage.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - greatly
  - exceedingly
  lexicon: HALOT
  rationale: Standard adverbial intensifier. 'Very' is concise and idiomatic in contemporary
    English.
- source_word: כִּי רַב הוּא
  chosen: because they were numerous
  alternatives:
  - for it was many
  - because it was great/many
  lexicon: HALOT
  rationale: 'Although the Hebrew uses a singular pronoun with the collective noun,
    English naturally renders the collective referent as plural here. ''Numerous''
    captures רַב in context: the concern is Israel''s large population.'
- source_word: וַיָּקָץ
  chosen: was sick with dread
  alternatives:
  - loathed
  - was disgusted
  - was grieved/harassed
  lexicon: HALOT
  rationale: The verb קוץ can denote abhorrence, vexation, or a sickened dread depending
    on context. Here Moab's reaction to Israel's presence is not moral disgust alone
    but distressed revulsion/fear. 'Was sick with dread' preserves the visceral force
    while fitting the narrative context of alarm.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per translation philosophy, gender-accurate renderings are preferred
    where the source is explicitly masculine plural construct. 'Sons of Israel' is
    more formally transparent than 'Israelites,' while remaining understandable.
- source_word: מוֹאָב
  chosen: Moab
  lexicon: HALOT
  rationale: Standard transliteration of the place/people name.
