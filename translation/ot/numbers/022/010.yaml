theological_decisions:
- issue: Reference of הָאֱלֹהִים
  chosen_reading: the one true God addressed by Balaam
  alternative_readings:
  - a god/gods in a generic sense
  rationale: The immediate narrative context presents Balaam responding to the divine
    encounter of the previous verse. Rendering 'to God' reflects that contextual identification
    without importing additional doctrinal content.
  doctrine_reference: Translation philosophy §1, §3
