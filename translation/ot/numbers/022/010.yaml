id: NUM.22.10
reference: Numbers 22:10
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר בִּלְעָ֖ם אֶל הָ/אֱלֹהִ֑ים בָּלָ֧ק בֶּן צִפֹּ֛ר מֶ֥לֶךְ מוֹאָ֖ב
    שָׁלַ֥ח אֵלָֽ/י־־׃
translation:
  text: And Balaam said to God, “Balak son of Zippor, king of Moab, has sent to me:”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sent for me.' The Hebrew more literally reads 'has sent to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר advances the narrative. 'And ... said' is
    a natural, sufficiently formal rendering in English narrative style.
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶל הָאֱלֹהִים
  chosen: to God
  alternatives:
  - to the God
  - to gods
  lexicon: HALOT
  rationale: 'With the article and singular sense in context, אֱלֹהִים refers to the
    true God speaking with Balaam in the preceding verse. English idiom normally omits
    the article here: ''to God.'' ''to gods'' is grammatically possible for the form
    in isolation but context excludes it.'
- source_word: בָּלָק בֶּן צִפֹּר
  chosen: Balak son of Zippor
  alternatives:
  - Balak, the son of Zippor
  lexicon: HALOT
  rationale: Construct relationship is naturally rendered appositionally in English.
    The article is absent, so the more concise 'son of Zippor' fits well.
- source_word: מֶלֶךְ מוֹאָב
  chosen: king of Moab
  alternatives:
  - the king of Moab
  lexicon: HALOT
  rationale: 'Construct chain identifying Balak''s role; English apposition without
    article is smooth and faithful: ''Balak son of Zippor, king of Moab.'''
- source_word: שָׁלַח אֵלַי
  chosen: has sent to me
  alternatives:
  - sent to me
  - has sent for me
  lexicon: HALOT
  rationale: The perfect reports a completed action with present relevance in Balaam's
    speech. 'Has sent to me' preserves the preposition אֶל and avoids over-interpreting
    it as 'sent for me,' though that is contextually related.
