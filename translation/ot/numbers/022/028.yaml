id: NUM.22.28
reference: Numbers 22:28
source:
  edition: WLC
  text: וַ/יִּפְתַּ֥ח יְהוָ֖ה אֶת פִּ֣י הָ/אָת֑וֹן וַ/תֹּ֤אמֶר לְ/בִלְעָם֙ מֶה עָשִׂ֣יתִֽי לְ/ךָ֔ כִּ֣י הִכִּיתַ֔/נִי זֶ֖ה שָׁלֹ֥שׁ רְגָלִֽים־־׃
translation:
  text: Then Yahweh opened the mouth of the donkey, and she said to Balaam, “What have I done to you, that you have struck me these three times?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, “the mouth of the donkey”; the noun for donkey is feminine, hence “she said.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, “this three feet,” an idiom meaning “these three times” or “on these three occasions.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְתַּח
  chosen: opened
  alternatives:
  - caused to open
  lexicon: HALOT
  rationale: The verb פתח in the qal wayyiqtol straightforwardly means 'opened.' English 'opened' is natural and preserves the direct divine action without unnecessary expansion.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: פִּי הָאָתוֹן
  chosen: the mouth of the donkey
  alternatives:
  - the donkey's mouth
  - the mouth of the she-donkey
  lexicon: HALOT
  rationale: The construct phrase literally means 'the mouth of the donkey.' 'Donkey' is clear modern English; 'she-donkey' is more formally precise to the feminine noun but less natural, and the following feminine verb/pronoun already indicates the animal is female.
- source_word: וַתֹּאמֶר
  chosen: and she said
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The feminine singular verb marks the donkey as the speaker. Including 'she' makes the English explicit and natural.
- source_word: לְבִלְעָם
  chosen: to Balaam
  alternatives:
  - to Bilam
  lexicon: HALOT
  rationale: Standard English transliteration is 'Balaam.' The preposition ל is naturally rendered 'to.'
- source_word: מֶה עָשִׂיתִי לְךָ
  chosen: What have I done to you
  alternatives:
  - What did I do to you
  - What have I done against you
  lexicon: HALOT
  rationale: This idiomatic question is best rendered in natural English as 'What have I done to you.' The perfect can be represented idiomatically by the English present perfect in this direct complaint.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: 'Here כִּי introduces the content/result of the complaint: ''that you have struck me...'' rather than a separate causal clause in English. ''That'' yields the most natural connection.'
- source_word: הִכִּיתַנִי
  chosen: you have struck me
  alternatives:
  - you struck me
  - you have beaten me
  lexicon: HALOT
  rationale: נכה commonly means 'strike, smite.' 'Struck' is accurate and avoids overtranslation. The English present perfect fits the donkey's immediate protest.
- source_word: זֶה שָׁלֹשׁ רְגָלִים
  chosen: these three times
  alternatives:
  - this three times
  - three occasions
  - three times now
  lexicon: HALOT
  rationale: Literally 'this three feet/occasions,' with רְגָלִים functioning idiomatically for occurrences or times. 'These three times' preserves the demonstrative force and communicates the Hebrew idiom clearly.
