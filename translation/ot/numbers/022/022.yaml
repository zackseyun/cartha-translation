theological_decisions:
- issue: Meaning of שָׂטָן in this context
  chosen_reading: 'common noun: ''adversary'''
  alternative_readings:
  - 'proper name/title: ''Satan'''
  rationale: In Numbers 22:22 the term is indefinite/common and describes the angel's
    oppositional role toward Balaam. Rendering it as the proper name 'Satan' would
    import a later, distinct referent not demanded by the Hebrew syntax or context.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    יְהוָה, with alternatives acknowledged but not used in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → ''the LORD'''
