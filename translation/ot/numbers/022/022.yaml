id: NUM.22.22
reference: Numbers 22:22
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֣ף אֱלֹהִים֮ כִּֽי הוֹלֵ֣ךְ הוּא֒ וַ/יִּתְיַצֵּ֞ב מַלְאַ֧ךְ יְהוָ֛ה
    בַּ/דֶּ֖רֶךְ לְ/שָׂטָ֣ן ל֑/וֹ וְ/הוּא֙ רֹכֵ֣ב עַל אֲתֹנ֔/וֹ וּ/שְׁנֵ֥י נְעָרָ֖י/ו
    עִמּֽ/וֹ־־־׃
translation:
  text: But God’s anger burned because he was going, and the angel of the LORD took
    his stand in the road as an adversary to him. Now he was riding on his donkey,
    and his two young men were with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שָׂטָן (satan) here means 'adversary' or 'opponent,' not necessarily
      the proper name Satan.
    reason: lexical_alternative
  - marker: b
    text: Or 'his she-donkey'; the Hebrew term specifically refers to a female donkey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  chosen: anger burned
  alternatives:
  - became angry
  - his anger flared
  lexicon: HALOT
  rationale: The idiom literally involves the burning of anger/nose, and 'anger burned'
    preserves the vivid Hebrew image while remaining natural English.
- source_word: אֱלֹהִים
  chosen: God’s
  alternatives:
  - God
  lexicon: HALOT
  rationale: Here אֱלֹהִים clearly refers to the God of Israel in singular sense;
    the possessive in English is required by the idiom 'God’s anger burned.'
- source_word: כִּי הוֹלֵךְ הוּא
  chosen: because he was going
  alternatives:
  - because he went
  - for he was going
  lexicon: HALOT
  rationale: The clause gives the reason for divine anger. The participial construction
    is well represented by the progressive 'was going,' which reflects ongoing action
    better than a simple past.
- source_word: וַיִּתְיַצֵּב
  chosen: took his stand
  alternatives:
  - stood
  - stationed himself
  lexicon: HALOT
  rationale: The hitpael form conveys deliberate positioning. 'Took his stand' captures
    the intentional, confrontational nuance better than the flatter 'stood.'
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: '''Angel'' is the standard rendering in this narrative context involving
    a heavenly being. Per doctrine, יְהוָה is rendered ''the LORD.'''
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving
    established English convention and the doctrine guideline for יְהוָה.
- source_word: בַּדֶּרֶךְ
  chosen: in the road
  alternatives:
  - on the road
  - in the way
  lexicon: HALOT
  rationale: Either 'in' or 'on' is possible in English; 'in the road' fits the image
    of the angel positioned directly in Balaam's path. 'Way' is possible but less
    concrete here.
- source_word: לְשָׂטָן לוֹ
  chosen: as an adversary to him
  alternatives:
  - to oppose him
  - as a satan against him
  lexicon: HALOT
  rationale: The noun שָׂטָן here is a common noun meaning 'adversary/opponent,' not
    a proper name. 'As an adversary to him' preserves the nominal force and avoids
    importing later demonological associations.
- source_word: וְהוּא רֹכֵב
  chosen: Now he was riding
  alternatives:
  - and he was riding
  - while he was riding
  lexicon: HALOT
  rationale: The clause supplies scene-setting background information. 'Now' signals
    a narrative aside naturally in English without overtranslating the conjunction.
- source_word: אֲתֹנוֹ
  chosen: his donkey
  alternatives:
  - his she-donkey
  - his female donkey
  lexicon: HALOT
  rationale: The Hebrew specifically denotes a female donkey, but in normal English
    narrative 'donkey' is sufficiently natural unless the sex is contextually emphasized.
    The broader passage makes the animal's identity clear without awkward phrasing
    here.
- source_word: שְׁנֵי נְעָרָיו
  chosen: his two young men
  alternatives:
  - his two servants
  - his two attendants
  lexicon: HALOT
  rationale: נַעַר can denote a young man, servant, or attendant depending on context.
    'Young men' is the most direct lexical rendering here, while still fitting the
    travel-companion context.
- source_word: עִמּוֹ
  chosen: were with him
  alternatives:
  - with him
  lexicon: HALOT
  rationale: English requires an explicit verb to complete the clause naturally.
