id: NUM.22.5
reference: Numbers 22:5
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֨ח מַלְאָכִ֜ים אֶל בִּלְעָ֣ם בֶּן בְּע֗וֹר פְּ֠תוֹרָ/ה אֲשֶׁ֧ר
    עַל הַ/נָּהָ֛ר אֶ֥רֶץ בְּנֵי עַמּ֖/וֹ לִ/קְרֹא ל֑/וֹ לֵ/אמֹ֗ר הִ֠נֵּה עַ֣ם יָצָ֤א
    מִ/מִּצְרַ֨יִם֙ הִנֵּ֤ה כִסָּה֙ אֶת עֵ֣ין הָ/אָ֔רֶץ וְ/ה֥וּא יֹשֵׁ֖ב מִ/מֻּלִֽ/י־־־־־־׃
translation:
  text: So he sent messengers to Balaam son of Beor at Pethor, which is by the River,
    in the land of the sons of his people, to call him, saying, “Look, a people has
    come out of Egypt. Look, it has covered the face of the land, and it is dwelling
    opposite me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the River'; likely the Euphrates.
    reason: cross_reference
  - marker: b
    text: Or 'in the land of his people.' The Hebrew phrase 'the land of the sons
      of his people' is difficult, and the pronoun 'his' may be understood in different
      ways.
    reason: alternative_reading
  - marker: c
    text: Literally 'has covered the face of the land'; compare the more literal but
      less clear 'eye of the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: So he sent
  alternatives:
  - And he sent
  - Then he sent
  lexicon: HALOT
  rationale: Wayyiqtol narrative form advances the storyline. 'So he sent' gives natural
    English narrative progression without losing the sequential force.
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - angels
  lexicon: HALOT
  rationale: In this human diplomatic context the word clearly means human messengers/envoys,
    not angels. 'Messengers' is the broad, transparent choice.
- source_word: בִּלְעָם בֶּן בְּעוֹר
  chosen: Balaam son of Beor
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy.
- source_word: פְּתוֹרָה
  chosen: at Pethor
  alternatives:
  - to Pethor
  lexicon: HALOT
  rationale: The directional ending on the place name can indicate motion toward a
    place, but in English the following relative clause identifies Balaam's location.
    'At Pethor' reads naturally while preserving the place reference.
- source_word: אֲשֶׁר עַל־הַנָּהָר
  chosen: which is by the River
  alternatives:
  - which is on the River
  - which is by the Euphrates
  lexicon: HALOT
  rationale: הַנָּהָר literally 'the River' likely refers to the Euphrates, but the
    Hebrew text itself says 'the River.' Main text preserves the source wording; the
    more specific identification is suitable for a footnote if desired.
- source_word: אֶרֶץ בְּנֵי עַמּוֹ
  chosen: in the land of the sons of his people
  alternatives:
  - in the land of his people
  - in the land of the children of his people
  - in his own people's land
  lexicon: HALOT
  rationale: The Hebrew is somewhat awkward and should be represented rather than
    overly smoothed. 'Sons of his people' preserves the formal structure of בְּנֵי
    while remaining intelligible. The referent of 'his' is debated, so a more interpretive
    smoothing is avoided in the main text.
- source_word: לִקְרֹא לוֹ
  chosen: to call him
  alternatives:
  - to summon him
  - to invite him
  lexicon: HALOT
  rationale: The infinitive expresses purpose. 'Call him' is a straightforward rendering;
    'summon' is possible but slightly more interpretive.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard speech-introduction formula; 'saying' is idiomatic and close
    to the Hebrew.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: The particle occurs twice for emphatic attention. 'Look' is readable
    modern English and preserves the deictic force better than omitting it.
- source_word: עַם
  chosen: a people
  alternatives:
  - a nation
  - a people-group
  lexicon: HALOT
  rationale: '''People'' is the most direct rendering and fits the context of a large
    ethnic/national group.'
- source_word: יָצָא מִמִּצְרַיִם
  chosen: has come out of Egypt
  alternatives:
  - came out of Egypt
  - has gone out from Egypt
  lexicon: HALOT
  rationale: English present relevance is conveyed well by 'has come out,' though
    the Hebrew perfect simply states the event. This fits the reported speech context
    naturally.
- source_word: כִסָּה אֶת עֵין הָאָרֶץ
  chosen: has covered the face of the land
  alternatives:
  - has covered the surface of the land
  - has covered the eye of the land
  lexicon: HALOT
  rationale: עֵין literally means 'eye,' but in this idiom it refers to visible surface/face.
    'Face of the land' preserves the imagery better than flattening it completely,
    while avoiding the opaque literalism 'eye of the land.'
- source_word: וְהוּא יֹשֵׁב
  chosen: and it is dwelling
  alternatives:
  - and it dwells
  - and he is dwelling
  - and it is settled
  lexicon: HALOT
  rationale: The singular pronoun refers collectively to the people as a unit. 'It
    is dwelling' preserves the singular collective sense and the participial aspect
    of ongoing presence.
- source_word: מִמֻּלִי
  chosen: opposite me
  alternatives:
  - in front of me
  - across from me
  - before me
  lexicon: HALOT
  rationale: The preposition indicates facing/opposite position. 'Opposite me' is
    concise and spatially clear.
