id: NUM.22.11
reference: Numbers 22:11
source:
  edition: WLC
  text: הִנֵּ֤ה הָ/עָם֙ הַ/יֹּצֵ֣א מִ/מִּצְרַ֔יִם וַ/יְכַ֖ס אֶת עֵ֣ין הָ/אָ֑רֶץ עַתָּ֗ה
    לְכָ֤/ה קָֽבָ/ה לִּ/י֙ אֹת֔/וֹ אוּלַ֥י אוּכַ֛ל לְ/הִלָּ֥חֶם בּ֖/וֹ וְ/גֵרַשְׁתִּֽי/ו־־׃
translation:
  text: Look, the people who came out of Egypt have covered the face of the land.
    Now come, curse them for me. Perhaps I will be able to fight against them and
    drive them out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'covered the eye of the land,' an idiom for covering the
      visible surface or face of the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the report with deictic urgency. 'Look' is natural modern
    English while preserving the attention-getting force better than the more archaic
    'Behold.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - this people
  - the nation
  lexicon: HALOT
  rationale: Collective singular referring to Israel as a people-group. 'The people'
    is the most natural rendering in context.
- source_word: הַיֹּצֵא מִמִּצְרַיִם
  chosen: who came out of Egypt
  alternatives:
  - coming out of Egypt
  - that came out of Egypt
  lexicon: HALOT
  rationale: The participle with article functions substantivally/adjectivally to
    identify the people by the defining event of the exodus. English relative clause
    is the clearest equivalent.
- source_word: וַיְכַס
  chosen: have covered
  alternatives:
  - has covered
  - covered
  lexicon: HALOT
  rationale: Though formally singular, the verb follows a collective subject and reports
    a present state resulting from their arrival. English plural agreement with 'people'
    is idiomatic here, and present perfect captures the current situation Balak describes.
- source_word: עֵין הָאָרֶץ
  chosen: the face of the land
  alternatives:
  - the surface of the land
  - the eye of the land
  lexicon: HALOT
  rationale: Hebrew idiom literally uses 'eye,' but in context means the visible surface/face
    of the land. 'Face of the land' preserves the metaphor more transparently than
    flattening it completely, while avoiding the opaque literalism 'eye of the land.'
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - So now
  - At this time
  lexicon: HALOT
  rationale: Marks the urgent transition from description to request.
- source_word: לְכָה
  chosen: come
  alternatives:
  - go
  - come now
  lexicon: HALOT
  rationale: Idiomatic imperative used to urge action. 'Come' works naturally in English
    in summons formulas of this kind.
- source_word: קָבָה
  chosen: curse
  alternatives:
  - denounce
  - pronounce a curse on
  lexicon: HALOT
  rationale: The verb specifically denotes cursing. 'Curse' is direct and preserves
    the force of Balak's request.
- source_word: לִּי
  chosen: for me
  alternatives:
  - for my sake
  - on my behalf
  lexicon: HALOT
  rationale: Dative of advantage; Balak wants Balaam to act on his behalf.
- source_word: אֹתוֹ
  chosen: them
  alternatives:
  - it
  - him
  lexicon: HALOT
  rationale: Although morphologically singular, the pronoun refers back to the collective
    singular 'people.' English requires plural sense here for naturalness and clarity.
- source_word: אוּלַי אוּכַל
  chosen: Perhaps I will be able
  alternatives:
  - Maybe I can
  - Perhaps I may be able
  lexicon: HALOT
  rationale: Expresses possibility/hope. This rendering is natural and preserves the
    tentative force.
- source_word: לְהִלָּחֶם בּוֹ
  chosen: to fight against them
  alternatives:
  - to wage war against them
  - to fight it
  lexicon: HALOT
  rationale: The Niphal/infinitive construction expresses engaging in battle against
    the people. English plural again reflects the collective referent.
- source_word: וְגֵרַשְׁתִּיו
  chosen: and drive them out
  alternatives:
  - and expel them
  - and banish them
  lexicon: HALOT
  rationale: The verb commonly means to drive out/expel from territory. 'Drive them
    out' fits the military-political context and echoes common biblical land-expulsion
    language.
