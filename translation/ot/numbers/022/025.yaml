id: NUM.22.25
reference: Numbers 22:25
source:
  edition: WLC
  text: וַ/תֵּ֨רֶא הָ/אָת֜וֹן אֶת מַלְאַ֣ךְ יְהוָ֗ה וַ/תִּלָּחֵץ֙ אֶל הַ/קִּ֔יר וַ/תִּלְחַ֛ץ אֶת רֶ֥גֶל בִּלְעָ֖ם אֶל הַ/קִּ֑יר וַ/יֹּ֖סֶף לְ/הַכֹּתָֽ/הּ־־־־׃
translation:
  text: When the donkey saw the angel of Yahweh, she pressed herself against the wall and pressed Balaam’s foot against the wall, so he struck her again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.' In this context the being is clearly supernatural, so 'angel' is used in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָתוֹן
  chosen: the donkey
  alternatives:
  - the she-donkey
  - the female donkey
  lexicon: HALOT
  rationale: אָתוֹן denotes a female donkey. English commonly uses 'donkey' naturally, and the following feminine verbs and pronoun ('she,' 'her') preserve the animal's sex without awkward repetition.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean 'messenger' or 'angel'; in this narrative context a supernatural being is clearly intended, so 'angel' is the plain-sense rendering. Per doctrine, יְהוָה is rendered 'the LORD' rather than a transliteration.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving established reverential convention and consistency with the doctrine table.
- source_word: וַתִּלָּחֵץ אֶל הַקִּיר
  chosen: she pressed herself against the wall
  alternatives:
  - she squeezed herself against the wall
  - she crowded against the wall
  lexicon: HALOT
  rationale: The Niphal-like/passive-reflexive sense here describes the donkey moving tightly against the wall. 'Pressed herself against' is idiomatic and preserves the physical constriction.
- source_word: הַקִּיר
  chosen: the wall
  lexicon: HALOT
  rationale: קִיר straightforwardly means 'wall.' No contextual reason requires a more specific gloss.
- source_word: וַתִּלְחַץ אֶת רֶגֶל בִּלְעָם אֶל הַקִּיר
  chosen: and pressed Balaam’s foot against the wall
  alternatives:
  - and crushed Balaam’s foot against the wall
  - and squeezed Balaam’s foot against the wall
  lexicon: HALOT
  rationale: The same root לחץ now takes Balaam's foot as object, indicating the donkey's movement caused his foot to be pinned or squeezed against the wall. 'Pressed' keeps lexical consistency with the prior clause while fitting the object construction.
- source_word: רֶגֶל
  chosen: foot
  alternatives:
  - leg
  lexicon: HALOT
  rationale: In this context the body part injured against the wall is best rendered 'foot,' the normal sense of רֶגֶל here.
- source_word: וַיֹּסֶף לְהַכֹּתָהּ
  chosen: so he struck her again
  alternatives:
  - and he continued to strike her
  - and he added to strike her
  lexicon: HALOT
  rationale: יָסַף + infinitive expresses repetition or continuation. In this immediate narrative moment, 'struck her again' is concise, natural English that captures renewed action without implying a prolonged beating beyond the verse.
