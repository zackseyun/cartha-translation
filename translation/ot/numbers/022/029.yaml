id: NUM.22.29
reference: Numbers 22:29
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר בִּלְעָם֙ לָֽ/אָת֔וֹן כִּ֥י הִתְעַלַּ֖לְתְּ בִּ֑/י ל֤וּ יֶשׁ חֶ֨רֶב֙
    בְּ/יָדִ֔/י כִּ֥י עַתָּ֖ה הֲרַגְתִּֽי/ךְ־׃
translation:
  text: And Balaam said to the donkey, “Because you have made a mockery of me! If
    only there were a sword in my hand, I would kill you right now.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'she-donkey'; the feminine is explicit in the Hebrew forms, though
      English normally uses 'donkey' naturally here.
    reason: lexical_alternative
  - marker: b
    text: Or 'you have mocked me.' The Hebrew verb can convey treating someone abusively,
      mockingly, or making a fool of them.
    reason: lexical_alternative
  - marker: c
    text: Or 'I would have killed you right now.' The Hebrew expresses Balaam's contrary-to-fact
      wish and immediate intent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And ... said' preserves Hebrew
    narrative flow without overinterpreting sequence.
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: לָאָתוֹן
  chosen: to the donkey
  alternatives:
  - to the she-donkey
  - to the female donkey
  lexicon: HALOT
  rationale: אָתוֹן denotes a female donkey. English 'donkey' is natural and sufficient
    in context, while the feminine is reflected later by the 2fs forms addressed to
    the animal. 'She-donkey' is more formally precise but less natural in contemporary
    English.
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  lexicon: HALOT
  rationale: Introduces Balaam's reason for speaking this way. 'Because' is more idiomatic
    in direct speech here than 'for'.
- source_word: הִתְעַלַּלְתְּ בִּי
  chosen: you have made a mockery of me
  alternatives:
  - you have mocked me
  - you have abused me
  - you have toyed with me
  lexicon: HALOT
  rationale: Hitpael of עלל here conveys dealing abusively or mockingly with someone.
    'Made a mockery of me' captures the sense of humiliating treatment and fits Balaam's
    angry accusation. Shorter 'mocked me' is possible but slightly flatter.
- source_word: לוּ
  chosen: If only
  alternatives:
  - Would that
  lexicon: HALOT
  rationale: Expresses a wish contrary to present reality. 'If only' is idiomatic
    modern English.
- source_word: יֶשׁ חֶרֶב בְּיָדִי
  chosen: there were a sword in my hand
  alternatives:
  - I had a sword in my hand
  - there were a sword at hand for me
  lexicon: HALOT
  rationale: 'Hebrew literally expresses existence: ''there is a sword in my hand.''
    In English, after לוּ, the idiomatic irrealis is ''there were a sword in my hand.''
    This preserves the image rather than flattening it to mere possession.'
- source_word: חֶרֶב
  chosen: sword
  lexicon: HALOT
  rationale: Direct lexical equivalent.
- source_word: כִּי עַתָּה
  chosen: right now
  alternatives:
  - at once
  - by now
  - immediately
  lexicon: HALOT
  rationale: 'In this threat formula, the phrase intensifies immediacy: Balaam says
    he would kill the donkey on the spot. ''Right now'' is natural modern English
    and captures the force better than the more ambiguous ''now''.'
- source_word: הֲרַגְתִּיךְ
  chosen: I would kill you
  alternatives:
  - I would have killed you
  - I had killed you
  lexicon: HALOT
  rationale: With לוּ plus the preceding irrealis condition, the verb expresses Balaam's
    intended action in a contrary-to-fact wish. English 'I would kill you' best matches
    the immediate threat. 'I would have killed you' is also possible, but can suggest
    a more retrospective nuance than the Hebrew requires in this outburst.
