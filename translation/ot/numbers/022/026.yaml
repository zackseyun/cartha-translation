id: NUM.22.26
reference: Numbers 22:26
source:
  edition: WLC
  text: וַ/יּ֥וֹסֶף מַלְאַךְ יְהוָ֖ה עֲב֑וֹר וַֽ/יַּעֲמֹד֙ בְּ/מָק֣וֹם צָ֔ר אֲשֶׁ֛ר אֵֽין דֶּ֥רֶךְ לִ/נְט֖וֹת יָמִ֥ין וּ/שְׂמֹֽאול־־׃
translation:
  text: Then the angel of Yahweh went farther and stood in a narrow place, where there was no way to turn to the right or to the left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'continued on' or 'passed on.' The Hebrew idiom literally has the sense of adding/continuing to go onward.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹסֶף
  chosen: Then ... went farther
  alternatives:
  - again
  - continued
  lexicon: HALOT
  rationale: With the following infinitive עֲבוֹר, יסף functions idiomatically as 'to continue/add' doing something. In this narrative context, 'went farther' captures the sense that the angel proceeded on ahead again, in smoother English than a more wooden 'added to pass on.' 'Then' reflects the narrative waw sequence.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאַךְ can mean 'messenger' or 'angel'; in this supernatural narrative, 'angel' is the natural English rendering. Per doctrine guidance, יְהוָה is rendered 'the LORD' rather than a transliteration.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name YHWH as stated in DOCTRINE.md.
- source_word: עֲבוֹר
  chosen: went farther
  alternatives:
  - passed on
  - went on
  lexicon: HALOT
  rationale: The infinitive of עבר after ויוסף conveys movement onward. 'Went farther' fits the immediate scene of the angel moving ahead to another position and reads naturally in English.
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - stationed himself
  - took his stand
  lexicon: HALOT
  rationale: עמד commonly means 'stand' or 'take one's stand.' 'Stood' is simple and sufficient here.
- source_word: בְּמָקוֹם צָר
  chosen: in a narrow place
  alternatives:
  - in a tight place
  - in a narrow spot
  lexicon: HALOT
  rationale: The phrase denotes a constricted location. 'Narrow place' preserves the spatial imagery without becoming idiomatic paraphrase.
- source_word: אֲשֶׁר אֵין דֶּרֶךְ
  chosen: where there was no way
  alternatives:
  - where there was no path
  - where there was no road
  lexicon: HALOT
  rationale: דֶּרֶךְ can mean road, path, or way. Here the point is not the absence of a road altogether but the lack of room or route for turning aside, so 'no way' best fits the clause as a whole.
- source_word: לִנְטוֹת
  chosen: to turn
  alternatives:
  - to turn aside
  - to deviate
  lexicon: HALOT
  rationale: The verb means to stretch out, turn, or turn aside. In context of directional movement right or left, 'to turn' is the clearest concise rendering.
- source_word: יָמִין וּשְׂמֹאול
  chosen: to the right or to the left
  alternatives:
  - right or left
  lexicon: HALOT
  rationale: These directional nouns are rendered with explicit English prepositions for natural syntax and to show the sense of lateral movement in either direction.
