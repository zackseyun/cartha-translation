  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD.' This verse
    contains the phrase 'angel of the LORD,' and the standard rendering preserves
    both doctrinal consistency and recognizable biblical idiom.
