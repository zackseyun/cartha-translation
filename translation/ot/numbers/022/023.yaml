id: NUM.22.23
reference: Numbers 22:23
source:
  edition: WLC
  text: וַ/תֵּ֣רֶא הָ/אָתוֹן֩ אֶת מַלְאַ֨ךְ יְהוָ֜ה נִצָּ֣ב בַּ/דֶּ֗רֶךְ וְ/חַרְבּ֤/וֹ
    שְׁלוּפָה֙ בְּ/יָד֔/וֹ וַ/תֵּ֤ט הָֽ/אָתוֹן֙ מִן הַ/דֶּ֔רֶךְ וַ/תֵּ֖לֶךְ בַּ/שָּׂדֶ֑ה
    וַ/יַּ֤ךְ בִּלְעָם֙ אֶת הָ֣/אָת֔וֹן לְ/הַטֹּתָ֖/הּ הַ/דָּֽרֶךְ־־־׃
translation:
  text: When the donkey saw the angel of the LORD standing in the road with his sword
    drawn in his hand, the donkey turned aside from the road and went into the field.
    So Balaam struck the donkey to turn her back to the road.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the messenger of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָתוֹן
  chosen: the donkey
  alternatives:
  - the she-donkey
  - the female donkey
  lexicon: HALOT
  rationale: אָתוֹן denotes a female donkey. English 'donkey' is the most natural
    readable rendering; the feminine sense is preserved later with 'her' when Balaam
    turns her back to the road.
- source_word: מַלְאַךְ יְהוָה
  chosen: the angel of the LORD
  alternatives:
  - the messenger of the LORD
  lexicon: HALOT
  rationale: מַלְאָךְ can mean 'messenger' or 'angel'; in this narrative context of
    a supernatural being with drawn sword, 'angel' is the plain sense. Per doctrine,
    יְהוָה is rendered 'the LORD' rather than 'Yahweh'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and common English Bible convention.
- source_word: נִצָּב
  chosen: standing
  alternatives:
  - stationed
  - posted
  lexicon: HALOT
  rationale: The participle describes the angel's position in the road. 'Standing'
    is the most direct and idiomatic English equivalent.
- source_word: בַּדֶּרֶךְ
  chosen: in the road
  alternatives:
  - on the road
  - in the way
  lexicon: HALOT
  rationale: Here the phrase locates the angel obstructively within the roadway. 'In
    the road' better conveys physical presence blocking the path than the more neutral
    'on the road.'
- source_word: וְחַרְבּוֹ שְׁלוּפָה בְיָדוֹ
  chosen: with his sword drawn in his hand
  alternatives:
  - and his sword was drawn in his hand
  - with his unsheathed sword in his hand
  lexicon: HALOT
  rationale: שְׁלוּפָה means drawn/unsheathed. Rendering the clause with 'with' produces
    natural English while preserving the image and relation to the angel.
- source_word: וַתֵּט
  chosen: turned aside
  alternatives:
  - turned away
  - veered off
  lexicon: HALOT
  rationale: The verb נָטָה here indicates deviating from the path. 'Turned aside'
    is both accurate and idiomatic, and matches the narrative tone.
- source_word: מִן הַדֶּרֶךְ
  chosen: from the road
  alternatives:
  - off the road
  - away from the road
  lexicon: HALOT
  rationale: This phrase marks departure from the roadway. 'From the road' is a straightforward
    rendering; the motion is completed by the following verb 'went into the field.'
- source_word: וַתֵּלֶךְ בַּשָּׂדֶה
  chosen: went into the field
  alternatives:
  - went into the open field
  - went into the countryside
  lexicon: HALOT
  rationale: שָׂדֶה is 'field/open country.' 'Field' fits the immediate scene and
    keeps the wording concrete.
- source_word: וַיַּךְ
  chosen: struck
  alternatives:
  - hit
  - beat
  lexicon: HALOT
  rationale: נכה is a broad verb for striking. 'Struck' is accurate and avoids overstating
    repeated action that the single verb form does not itself specify.
- source_word: לְהַטֹּתָהּ הַדָּרֶךְ
  chosen: to turn her back to the road
  alternatives:
  - to turn her toward the road
  - to make her turn to the road
  lexicon: HALOT
  rationale: The infinitive of נָטָה with the feminine suffix refers to causing the
    donkey to turn. Since she had already left the road, 'back to the road' makes
    the directional sense explicit in natural English without adding a new event.
