id: NUM.22.9
reference: Numbers 22:9
source:
  edition: WLC
  text: וַ/יָּבֹ֥א אֱלֹהִ֖ים אֶל בִּלְעָ֑ם וַ/יֹּ֕אמֶר מִ֛י הָ/אֲנָשִׁ֥ים הָ/אֵ֖לֶּה
    עִמָּֽ/ךְ־׃
translation:
  text: Then God came to Balaam and said, “Who are these men with you?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - entered
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא in narrative sequence commonly means 'came.' 'Entered'
    would over-specify, and 'went' is less natural from the narrator's perspective
    here.
- source_word: אֱלֹהִים
  chosen: God
  alternatives:
  - a god
  - the divine being
  lexicon: HALOT
  rationale: In this narrative context with a singular verb, אֱלֹהִים refers to the
    true God acting personally. English 'God' best reflects the referent and standard
    singular sense here.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks direction toward Balaam. 'To' is the most natural
    English rendering in this context.
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: אמר in direct-speech introduction is most naturally rendered 'said' in
    readable modern English.
- source_word: מִי
  chosen: Who
  alternatives:
  - What sort of people
  lexicon: HALOT
  rationale: The interrogative asks for identification of persons. 'Who' is the plain
    and direct equivalent.
- source_word: הָאֲנָשִׁים
  chosen: men
  alternatives:
  - people
  - persons
  lexicon: HALOT
  rationale: The Hebrew noun is grammatically masculine plural and here refers to
    the male envoys present in the narrative. Per gender-accurate policy, 'men' is
    preferable to a neutral term.
- source_word: הָאֵלֶּה
  chosen: these
  alternatives:
  - those
  lexicon: HALOT
  rationale: The demonstrative points to specific men presently in view; 'these' matches
    the deictic force in context.
- source_word: עִמָּךְ
  chosen: with you
  alternatives:
  - beside you
  - in your company
  lexicon: HALOT
  rationale: The preposition עם with pronominal suffix indicates accompaniment or
    association. 'With you' is the clearest idiomatic rendering.
- source_word: וַ
  chosen: Then
  alternatives:
  - And
  lexicon: HALOT
  rationale: The prefixed waw on the opening wayyiqtol advances the narrative. 'Then'
    conveys sequence in natural English better than repeated 'And,' while preserving
    the flow.
