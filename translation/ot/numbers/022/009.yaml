theological_decisions:
- issue: Referent of אֱלֹהִים in Balaam narrative
  chosen_reading: God
  alternative_readings:
  - a god
  - divine being
  rationale: Although אֱלֹהִים can be used in other senses, the singular verbal agreement
    and canonical narrative context indicate Israel's God addressing Balaam. Rendering
    'God' reflects the text without importing additional doctrinal claims.
  doctrine_reference: Affirmations; Translation philosophy §1
