theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Implication of personal versus corporate guilt in 'he died for his own sin'
  chosen_reading: The translation preserves the daughters' distinction that their
    father was not part of Korah's rebellion, yet still died on account of his own
    sin.
  alternative_readings:
  - He died in his own sin
  - He died for his sin
  rationale: The verse itself distinguishes his death from participation in Korah's
    revolt without specifying the exact sin. The wording should preserve that distinction
    without importing a fuller doctrine of individual guilt beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
