id: NUM.27.3
reference: Numbers 27:3
source:
  edition: WLC
  text: אָבִי/נוּ֮ מֵ֣ת בַּ/מִּדְבָּר֒ וְ/ה֨וּא לֹא הָיָ֜ה בְּ/ת֣וֹךְ הָ/עֵדָ֗ה הַ/נּוֹעָדִ֛ים
    עַל יְהוָ֖ה בַּ/עֲדַת קֹ֑רַח כִּֽי בְ/חֶטְא֣/וֹ מֵ֔ת וּ/בָנִ֖ים לֹא הָ֥יוּ לֽ/וֹ־־־־־׃
translation:
  text: Our father died in the wilderness, but he was not among the congregation of
    those who gathered themselves against the LORD in the company of Korah; rather,
    he died for his own sin, and he had no sons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembly' instead of 'congregation' for the Hebrew עֵדָה.
    reason: lexical_alternative
  - marker: b
    text: Or 'who assembled against the LORD' for 'those who gathered themselves against
      the LORD.'
    reason: lexical_alternative
  - marker: c
    text: Or 'because of his sin' or 'in his sin.' The Hebrew does not specify the
      particular sin, only that his death was not as part of Korah's rebellion.
    reason: alternative_reading
lexical_decisions:
- source_word: אָבִינוּ
  chosen: Our father
  alternatives:
  - Our ancestor
  lexicon: HALOT
  rationale: Direct familial reference from the daughters speaking; 'father' is the
    plain and contextually necessary sense, not the broader 'ancestor'.
- source_word: מֵת
  chosen: died
  alternatives:
  - is dead
  lexicon: HALOT
  rationale: Qal perfect here is best rendered as simple past in narrative recollection.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard rendering for מִדְבָּר in the Pentateuch
    and preserves the Israel-in-the-wilderness setting better than ''desert''.'
- source_word: וְהוּא לֹא הָיָה בְּתוֹךְ הָעֵדָה
  chosen: but he was not among the congregation
  alternatives:
  - and he was not in the midst of the assembly
  - but he was not among the assembly
  lexicon: HALOT
  rationale: בְּתוֹךְ means 'in the midst of/among.' עֵדָה can be 'assembly' or 'congregation';
    'congregation' fits the communal sense here and reads naturally in English.
- source_word: הַנּוֹעָדִים עַל יְהוָה
  chosen: of those who gathered themselves against the LORD
  alternatives:
  - who assembled against the LORD
  - who banded together against the LORD
  lexicon: HALOT
  rationale: The Niphal participle of יעד here denotes assembling together; with עַל
    יְהוָה it indicates hostile gathering against the LORD. 'Gathered themselves'
    preserves the reflexive/collective nuance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: בַּעֲדַת קֹרַח
  chosen: in the company of Korah
  alternatives:
  - in the congregation of Korah
  - with Korah's assembly
  lexicon: HALOT
  rationale: This phrase identifies the specific rebellious faction associated with
    Korah. 'Company' avoids awkward repetition with earlier 'congregation' while preserving
    the group sense of עֵדָה.
- source_word: כִּי
  chosen: rather
  alternatives:
  - for
  - but
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces a corrective/explanatory contrast: he was not part
    of Korah''s rebellion; instead, he died on account of his own sin. ''Rather''
    brings out that contrast clearly in English.'
- source_word: בְחֶטְאוֹ
  chosen: for his own sin
  alternatives:
  - in his sin
  - because of his sin
  lexicon: HALOT
  rationale: The preposition בְ here is causal/instrumental in context. Adding 'own'
    reflects the 3ms suffix and clarifies the contrast with corporate rebellion.
- source_word: וּבָנִים לֹא הָיוּ לוֹ
  chosen: and he had no sons
  alternatives:
  - and sons were not his
  - and no sons belonged to him
  lexicon: HALOT
  rationale: Idiomatic English rendering of existential היה + לְ construction. 'Sons'
    should be retained, not neutralized, because the inheritance issue in context
    specifically concerns male offspring.
