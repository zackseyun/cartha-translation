id: NUM.27.7
reference: Numbers 27:7
source:
  edition: WLC
  text: כֵּ֗ן בְּנ֣וֹת צְלָפְחָד֮ דֹּבְרֹת֒ נָתֹ֨ן תִּתֵּ֤ן לָ/הֶם֙ אֲחֻזַּ֣ת נַחֲלָ֔ה
    בְּ/ת֖וֹךְ אֲחֵ֣י אֲבִי/הֶ֑ם וְ/הַֽעֲבַרְתָּ֛ אֶת נַחֲלַ֥ת אֲבִי/הֶ֖ן לָ/הֶֽן־׃
translation:
  text: The daughters of Zelophehad are right. You must surely give them a hereditary
    possession among their father's brothers, and you shall transfer their father's
    inheritance to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''The daughters of Zelophehad are speaking rightly.'' The translation
      ''are right'' renders the idiom in natural English.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew text has a masculine plural suffix in 'to them' at one point,
      but the referent in context is Zelophehad's daughters; the sense is therefore
      rendered with feminine referent in English.
    reason: textual_variant
lexical_decisions:
- source_word: כֵּן
  chosen: are right
  alternatives:
  - speak rightly
  - are correct
  lexicon: HALOT
  rationale: In this judicial response, כֵּן with דֹּבְרֹת affirms the correctness
    of the daughters' claim. English 'are right' is natural and preserves the verdict
    sense better than a wooden 'speak rightly.'
- source_word: דֹּבְרֹת
  chosen: are right
  alternatives:
  - speak
  - are speaking rightly
  lexicon: HALOT
  rationale: 'The participle of דבר here functions predicatively with כֵּן: ''are
    speaking rightly/rightly.'' Rendering the whole expression idiomatically as ''are
    right'' communicates the legal approval clearly in modern English.'
- source_word: נָתֹן תִּתֵּן
  chosen: must surely give
  alternatives:
  - shall surely give
  - you shall indeed give
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the command. 'Must
    surely give' captures both the force and the directness of the Hebrew without
    sounding archaic.
- source_word: לָהֶם
  chosen: them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: The consonantal text points to a masculine plural suffix, but context
    clearly refers to the daughters; many understand this as an orthographic irregularity
    or generalized plural form. English should reflect the referent, 'them,' meaning
    the daughters.
- source_word: אֲחֻזַּת נַחֲלָה
  chosen: a hereditary possession
  alternatives:
  - a possession of inheritance
  - an inherited holding
  - property as an inheritance
  lexicon: HALOT
  rationale: The construct phrase combines the idea of landed possession and inheritance.
    'Hereditary possession' preserves both elements concisely and suits the land-tenure
    context.
- source_word: בְּתוֹךְ אֲחֵי אֲבִיהֶם
  chosen: among their father's brothers
  alternatives:
  - in the midst of their father's brothers
  - among the brothers of their father
  lexicon: HALOT
  rationale: The phrase locates the daughters' inheritance within the clan allotment
    otherwise associated with their paternal uncles. 'Among their father's brothers'
    is clear, natural, and sufficiently formal.
- source_word: וְהַעֲבַרְתָּ
  chosen: you shall transfer
  alternatives:
  - you shall pass over
  - you shall cause to pass
  lexicon: HALOT
  rationale: 'The Hiphil of עבר here is legal/administrative: causing an inheritance
    to pass from one party to another. ''Transfer'' best conveys the juridical sense
    in contemporary English.'
- source_word: נַחֲלַת אֲבִיהֶן
  chosen: their father's inheritance
  alternatives:
  - the inheritance of their father
  - their paternal inheritance
  lexicon: HALOT
  rationale: This phrase refers specifically to the inheritance that belonged to their
    deceased father. 'Their father's inheritance' is straightforward and preserves
    the familial/legal relationship.
