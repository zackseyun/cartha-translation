theological_decisions:
- issue: Rendering the death idiom אסף אל־עמיו
  chosen_reading: Retain the idiom as 'be gathered to your people' rather than reducing
    it to 'die.'
  alternative_readings:
  - die
  - be gathered to your ancestors
  - join your kin in death
  rationale: The Hebrew says more than a bare statement of death; it uses a conventional
    expression that carries familial and covenantal resonance. Preserving the idiom
    maintains the text's theological and literary texture without forcing a detailed
    doctrine of the afterlife beyond what the verse states.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
