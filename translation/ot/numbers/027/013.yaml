id: NUM.27.13
reference: Numbers 27:13
source:
  edition: WLC
  text: וְ/רָאִ֣יתָה אֹתָ֔/הּ וְ/נֶאֱסַפְתָּ֥ אֶל עַמֶּ֖י/ךָ גַּם אָ֑תָּה כַּ/אֲשֶׁ֥ר
    נֶאֱסַ֖ף אַהֲרֹ֥ן אָחִֽי/ךָ־־׃
translation:
  text: And when you have seen it, you also will be gathered to your people, just
    as Aaron your brother was gathered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'you will die' or 'you will be gathered to your
      ancestors.' The Hebrew idiom is literally 'be gathered to your people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאִיתָה
  chosen: And when you have seen
  alternatives:
  - and you shall see
  - and you saw
  lexicon: HALOT
  rationale: From ראה, Qal 2ms with prefixed conjunction. In context it follows the
    command to view the land, so an English temporal sense ('when you have seen')
    best captures the sequence leading to the next event, while remaining close to
    the Hebrew.
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - her
  lexicon: HALOT
  rationale: Feminine singular object pronoun referring back to the land/mountain
    view in context. English idiom uses 'it' for the referent.
- source_word: וְנֶאֱסַפְתָּ
  chosen: you ... will be gathered
  alternatives:
  - you will be taken in
  - you will be gathered in
  lexicon: HALOT
  rationale: Niphal of אסף in this idiom refers to death and joining one's kin/people.
    'Will be gathered' preserves the metaphor and avoids flattening it to merely 'die'.
- source_word: אֶל עַמֶּיךָ
  chosen: to your people
  alternatives:
  - to your kin
  - to your ancestors
  lexicon: HALOT
  rationale: Traditional Hebrew idiom for joining one's people in death. 'To your
    people' is the most direct and preserves the covenantal/familial resonance better
    than interpretive alternatives.
- source_word: גַּם אָתָּה
  chosen: you also
  alternatives:
  - you too
  lexicon: HALOT
  rationale: Adds emphasis that Moses, like Aaron, will share the same fate. 'You
    also' is natural and sufficiently emphatic.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - in the same way that
  lexicon: HALOT
  rationale: Introduces the comparison with Aaron's death. 'Just as' clearly marks
    the parallel.
- source_word: נֶאֱסַף
  chosen: was gathered
  alternatives:
  - was taken in
  lexicon: HALOT
  rationale: Same death idiom as earlier in the verse; consistency is important.
- source_word: אַהֲרֹן אָחִיךָ
  chosen: Aaron your brother
  alternatives:
  - Aharon your brother
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention; appositional
    kinship term retained straightforwardly.
