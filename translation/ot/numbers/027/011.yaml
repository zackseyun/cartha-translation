theological_decisions:
- issue: Rendering of the covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the divine name is 'the LORD.' This verse presents
    no contextual reason to depart from that standard.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered covenantal expression לִבְנֵי יִשְׂרָאֵל
  chosen_reading: for the sons of Israel
  alternative_readings:
  - for the Israelites
  - for the children of Israel
  rationale: The translation philosophy prefers gender-accurate renderings where the
    source is masculine and representative. Here the phrase is a covenantal-national
    designation, so the masculine form is preserved rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
