id: NUM.27.11
reference: Numbers 27:11
source:
  edition: WLC
  text: וְ/אִם אֵ֣ין אַחִים֮ לְ/אָבִי/ו֒ וּ/נְתַתֶּ֣ם אֶת נַחֲלָת֗/וֹ לִ/שְׁאֵר֞/וֹ
    הַ/קָּרֹ֥ב אֵלָ֛י/ו מִ/מִּשְׁפַּחְתּ֖/וֹ וְ/יָרַ֣שׁ אֹתָ֑/הּ וְֽ/הָ֨יְתָ֜ה לִ/בְנֵ֤י
    יִשְׂרָאֵל֙ לְ/חֻקַּ֣ת מִשְׁפָּ֔ט כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־׃ס
translation:
  text: And if his father has no brothers, then you shall give his inheritance to
    his nearest relative from his clan, and he shall possess it. This shall be for
    the sons of Israel a statute of judgment, just as the LORD commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his kinsman who is closest to him.' The Hebrew combines 'his blood relative'
      with 'the one nearest to him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and he shall inherit it.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'sons of Israel,' a standard covenantal designation for the people
      of Israel.
    reason: cultural_note
  - marker: d
    text: Or 'a legal statute' or 'an ordinance of judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחִים
  chosen: brothers
  alternatives:
  - brothers/kinsmen
  lexicon: HALOT
  rationale: The plain familial sense is intended here in the inheritance sequence.
    'Brothers' is gender-accurate to the Hebrew and fits the legal context of paternal
    male relatives.
- source_word: לְאָבִיו
  chosen: his father
  alternatives:
  - for his father
  lexicon: HALOT
  rationale: In context this means 'his father' as the referent whose brothers are
    in view; English idiom requires 'if his father has no brothers' rather than a
    more wooden prepositional rendering.
- source_word: נַחֲלָתוֹ
  chosen: his inheritance
  alternatives:
  - his possession
  - his hereditary property
  lexicon: HALOT
  rationale: '''Inheritance'' is the standard legal sense in this passage about succession
    of property rights.'
- source_word: שְׁאֵרוֹ
  chosen: his nearest relative
  alternatives:
  - his kinsman
  - his flesh-relative
  lexicon: HALOT
  rationale: The term denotes a blood relative/close kin. Because it is immediately
    qualified by 'the nearest ... from his clan,' 'nearest relative' communicates
    the legal sense clearly in modern English.
- source_word: הַקָּרֹב אֵלָיו
  chosen: nearest
  alternatives:
  - who is closest to him
  - closest
  lexicon: HALOT
  rationale: This adjectival phrase specifies degree of kinship. 'Nearest relative'
    is a natural compression in English without loss of meaning.
- source_word: מִמִּשְׁפַּחְתּוֹ
  chosen: from his clan
  alternatives:
  - from his family
  - from his kindred
  lexicon: HALOT
  rationale: מִשְׁפָּחָה often refers to a wider kinship group or clan within Israel's
    tribal structure. 'Clan' preserves the social-legal nuance better than the broader
    'family.'
- source_word: וְיָרַשׁ אֹתָהּ
  chosen: and he shall possess it
  alternatives:
  - and he shall inherit it
  - and he shall take possession of it
  lexicon: HALOT
  rationale: The verb ירשׁ can mean inherit or take possession. Since the preceding
    clause already states the transfer of inheritance, 'possess it' avoids redundancy
    while preserving the legal result.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: for the sons of Israel
  alternatives:
  - for the Israelites
  - for the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, 'sons of Israel' preserves the source
    expression. It remains a conventional covenantal designation, not merely a reference
    to male individuals.
- source_word: לְחֻקַּת מִשְׁפָּט
  chosen: a statute of judgment
  alternatives:
  - a legal statute
  - an ordinance of justice
  - a statute and rule
  lexicon: HALOT
  rationale: The phrase denotes a binding legal ordinance. 'Statute of judgment' keeps
    both components visible and suits the formal legal register of the verse.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies 'the LORD' as the default rendering for the divine
    name, following Jewish reverence tradition and the LXX pattern.
