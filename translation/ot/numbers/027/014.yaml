theological_decisions:
- issue: Rendering the failure expressed by לְהַקְדִּישֵׁנִי in context
  chosen_reading: by not treating me as holy
  alternative_readings:
  - to sanctify me
  - to show me holy before them
  rationale: The infinitive itself is positive ('to sanctify me'), but the broader
    context and parallel passages indicate the sense is failure to do so. The translation
    makes the implied negation explicit for intelligibility without adding doctrinal
    content beyond the narrative's plain sense.
  doctrine_reference: Translation philosophy §1, §3
