id: NUM.27.14
reference: Numbers 27:14
source:
  edition: WLC
  text: כַּ/אֲשֶׁר֩ מְרִיתֶ֨ם פִּ֜/י בְּ/מִדְבַּר צִ֗ן בִּ/מְרִיבַת֙ הָֽ/עֵדָ֔ה לְ/הַקְדִּישֵׁ֥/נִי
    בַ/מַּ֖יִם לְ/עֵינֵי/הֶ֑ם הֵ֛ם מֵֽי מְרִיבַ֥ת קָדֵ֖שׁ מִדְבַּר צִֽן־־־׃פ
translation:
  text: because you rebelled against my command in the wilderness of Zin, in the strife
    of the congregation, by not treating me as holy at the waters before their eyes.
    These are the waters of Meribath-kadesh in the wilderness of Zin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to sanctify me' / 'to show me as holy before their eyes.' The Hebrew
      infinitive is positive in form, but the context makes clear that Moses and Aaron
      failed to do this.
    reason: lexical_alternative
  - marker: b
    text: Meribath-kadesh may also be rendered 'Meribah of Kadesh' or more literally
      'the strife of Kadesh.'
    reason: alternative_reading
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: because
  alternatives:
  - as
  - when
  lexicon: HALOT
  rationale: In this context the particle introduces the reason for Moses and Aaron's
    exclusion, so causal 'because' communicates the sense more clearly than a more
    wooden 'as'.
- source_word: מְרִיתֶם
  chosen: you rebelled
  alternatives:
  - you were rebellious
  - you defied
  lexicon: HALOT
  rationale: The verb from מרה commonly denotes rebellion or defiance against authority.
    'You rebelled' is direct and idiomatic.
- source_word: פִּי
  chosen: my command
  alternatives:
  - my mouth
  - my word
  lexicon: HALOT
  rationale: Literally 'my mouth,' but in this idiom it refers to what proceeds from
    God's mouth, i.e., his command. 'My command' best conveys the Hebrew sense in
    natural English.
- source_word: בְּמִדְבַּר צִן
  chosen: in the wilderness of Zin
  alternatives:
  - in the desert of Zin
  lexicon: HALOT
  rationale: '''Wilderness'' is a standard rendering for מִדְבָּר and fits biblical
    geographic usage. ''Zin'' is transliterated as a place name.'
- source_word: בִּמְרִיבַת הָעֵדָה
  chosen: in the strife of the congregation
  alternatives:
  - at the quarrel of the assembly
  - in the contention of the community
  lexicon: HALOT
  rationale: The phrase identifies the incident characterized by communal contention.
    'Strife' is concise and natural; 'congregation' preserves the covenant-community
    nuance of עֵדָה.
- source_word: לְהַקְדִּישֵׁנִי
  chosen: by not treating me as holy
  alternatives:
  - to sanctify me
  - to show me holy
  - to uphold my holiness
  lexicon: HALOT
  rationale: The Hiphil of קדש here means to acknowledge or display God's holiness
    before the people. English requires the negative idea to be supplied from context,
    since the clause explains their rebellion. 'By not treating me as holy' is clear
    and faithful to the sense.
- source_word: בַּמַּיִם
  chosen: at the waters
  alternatives:
  - in the water
  - by the waters
  lexicon: HALOT
  rationale: The prepositional phrase points to the location/circumstance of the event
    at the waters of Meribah. 'At the waters' is idiomatic and contextually precise.
- source_word: לְעֵינֵיהֶם
  chosen: before their eyes
  alternatives:
  - in their sight
  - before them
  lexicon: HALOT
  rationale: This idiom emphasizes public visibility. 'Before their eyes' preserves
    the vividness of the Hebrew.
- source_word: הֵם
  chosen: These are
  alternatives:
  - Those are
  - They are
  lexicon: HALOT
  rationale: The pronoun introduces an identifying note about the place. 'These are'
    is a natural English way to render the deictic force in context.
- source_word: מֵי מְרִיבַת קָדֵשׁ
  chosen: the waters of Meribath-kadesh
  alternatives:
  - the waters of the strife of Kadesh
  - the waters of Meribah of Kadesh
  lexicon: HALOT
  rationale: This is a place-name expression. Retaining the established transliterated
    form 'Meribath-kadesh' preserves the toponym while reflecting the construct form.
- source_word: קָדֵשׁ
  chosen: kadesh
  alternatives:
  - Kadesh
  lexicon: HALOT
  rationale: Included within the compound place name Meribath-kadesh. Standard English
    capitalization is applied in the final text.
