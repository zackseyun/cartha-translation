id: NUM.27.17
reference: Numbers 27:17
source:
  edition: WLC
  text: אֲשֶׁר יֵצֵ֣א לִ/פְנֵי/הֶ֗ם וַ/אֲשֶׁ֤ר יָבֹא֙ לִ/פְנֵי/הֶ֔ם וַ/אֲשֶׁ֥ר יוֹצִיאֵ֖/ם וַ/אֲשֶׁ֣ר יְבִיאֵ֑/ם וְ/לֹ֤א תִהְיֶה֙ עֲדַ֣ת יְהוָ֔ה כַּ/צֹּ֕אן אֲשֶׁ֥ר אֵין לָ/הֶ֖ם רֹעֶֽה־־׃
translation:
  text: who will go out before them and come in before them, and who will lead them out and bring them in, so that the congregation of Yahweh may not be like sheep that have no shepherd.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ahead of them' for 'before them' in both occurrences.
    reason: lexical_alternative
  - marker: b
    text: The sequence 'go out ... come in ... lead them out ... bring them in' is a Hebrew way of describing comprehensive public leadership.
    reason: cultural_note
  - marker: c
    text: Or 'assembly of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  - one who
  lexicon: HALOT
  rationale: Introduces a relative clause describing the desired leader. 'Who' is natural in English for a personal antecedent implied from the previous verse.
- source_word: יֵצֵא
  chosen: will go out
  alternatives:
  - goes out
  - may go out
  lexicon: HALOT
  rationale: Qal imperfect 3ms of יצא. In context of Moses' request for a future leader, English future best conveys the prospective sense.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - ahead of them
  - in front of them
  lexicon: HALOT
  rationale: Literally 'before their face/presence.' 'Before them' preserves the idiom and leadership nuance without over-paraphrasing.
- source_word: יָבֹא
  chosen: come in
  alternatives:
  - comes in
  - return in
  lexicon: HALOT
  rationale: Qal imperfect of בוא paired with 'go out.' 'Come in' preserves the Hebrew merism for public leadership in all movements and affairs.
- source_word: יוֹצִיאֵם
  chosen: will lead them out
  alternatives:
  - will bring them out
  - will take them out
  lexicon: HALOT
  rationale: Hiphil of יצא is causative. 'Lead them out' fits the context of a leader guiding the people, better capturing personal leadership than the more mechanical 'bring out'.
- source_word: יְבִיאֵם
  chosen: bring them in
  alternatives:
  - lead them in
  - cause them to come in
  lexicon: HALOT
  rationale: Hiphil of בוא is causative. 'Bring them in' is idiomatic and pairs well with 'lead them out'; the slight variation reflects natural English while preserving the causative sense.
- source_word: עֲדַת יְהוָה
  chosen: the congregation of the LORD
  alternatives:
  - the assembly of the LORD
  - the community of the LORD
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled covenant people. 'Congregation' preserves the collective, covenantal sense. יְהוָה follows the doctrinal default as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כַּצֹּאן
  chosen: like sheep
  alternatives:
  - as sheep
  - like the flock
  lexicon: HALOT
  rationale: The singular collective noun is best rendered idiomatically in English as 'sheep.' The simile is preserved directly.
- source_word: רֹעֶה
  chosen: shepherd
  alternatives:
  - herdsman
  - pastor
  lexicon: HALOT
  rationale: The participle denotes one who shepherds a flock. 'Shepherd' is the standard and contextually rich rendering, preserving the leadership metaphor without importing later ecclesial terminology.
