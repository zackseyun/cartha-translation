theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Leadership metaphor in 'go out...come in...lead them out...bring them in'
  chosen_reading: Retained as a concrete leadership description culminating in the shepherd image
  alternative_readings:
  - Interpreting the whole sequence more abstractly as 'govern them' or 'guide them in all they do'
  rationale: The Hebrew uses concrete movement language and then explicitly compares the people to sheep without a shepherd. Preserving the imagery maintains the theological and pastoral force of the text without flattening it into abstraction.
