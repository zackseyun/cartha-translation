id: NUM.27.2
reference: Numbers 27:2
source:
  edition: WLC
  text: וַֽ/תַּעֲמֹ֜דְנָה לִ/פְנֵ֣י מֹשֶׁ֗ה וְ/לִ/פְנֵי֙ אֶלְעָזָ֣ר הַ/כֹּהֵ֔ן וְ/לִ/פְנֵ֥י
    הַ/נְּשִׂיאִ֖ם וְ/כָל הָ/עֵדָ֑ה פֶּ֥תַח אֹֽהֶל מוֹעֵ֖ד לֵ/אמֹֽר־־׃
translation:
  text: and they stood before Moses, before Eleazar the priest, before the leaders,
    and all the congregation, at the entrance of the tent of meeting, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the assembly.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the chiefs' or 'the princes' for 'the leaders.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעֲמֹדְנָה
  chosen: and they stood
  alternatives:
  - and they presented themselves
  - and they came and stood
  lexicon: HALOT
  rationale: The verb from עמד in the wayyiqtol 3fp indicates that the daughters took
    their stand or stood in a formal setting. 'And they stood' is the most direct
    and natural rendering, preserving the narrative sequence and the public, juridical
    sense without over-paraphrasing.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: '''Before'' is the standard rendering for לִפְנֵי here and fits the repeated
    formal listing of authorities before whom they appear. It preserves the legal/public
    nuance better than a looser paraphrase.'
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: A straightforward rendering of the title identifying Eleazar's office.
    No need to expand to 'high priest' since the Hebrew here simply says 'the priest.'
- source_word: הַנְּשִׂיאִם
  chosen: the leaders
  alternatives:
  - the chiefs
  - the princes
  lexicon: HALOT
  rationale: נְשִׂיאִים refers to tribal/community leaders. 'Leaders' is clear modern
    English and avoids the potentially misleading aristocratic sense of 'princes,'
    while preserving the official status of the group.
- source_word: כָּל הָעֵדָה
  chosen: all the congregation
  alternatives:
  - the whole congregation
  - all the assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled covenant community in Numbers. 'Congregation'
    preserves that communal/public sense and is a familiar biblical term; 'all' reflects
    כָּל.
- source_word: פֶּתַח
  chosen: at the entrance of
  alternatives:
  - at the doorway of
  - at the opening of
  lexicon: HALOT
  rationale: פֶּתַח denotes the entrance/opening. 'At the entrance of' is idiomatic
    in English and suits the formal location marker.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard and accurate rendering of the tabernacle-related
    phrase in the Pentateuch. It preserves the established cultic sense without unnecessary
    innovation.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said,
  lexicon: HALOT
  rationale: The infinitive construct formula introduces the direct speech of the
    next verse. 'Saying,' preserves the Hebrew discourse linkage more formally than
    collapsing it into a finite verb.
