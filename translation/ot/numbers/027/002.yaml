theological_decisions:
- issue: Public-legal setting of the daughters' appeal
  chosen_reading: Retain the repeated 'before' and the full list of authorities and
    congregation
  alternative_readings:
  - Compress the list into a smoother English summary
  rationale: The verse emphasizes that the women make their case openly before Moses,
    Eleazar, the leaders, and the congregation at the tent of meeting. Preserving
    this structure maintains the legal and communal weight of the appeal rather than
    reducing it to mere narrative movement.
  doctrine_reference: 'Translation philosophy: preserve source-text sense and avoid
    paraphrase beyond what the text warrants.'
- issue: Rendering of עֵדָה
  chosen_reading: congregation
  alternative_readings:
  - assembly
  rationale: No doctrinal controversy is at stake, but 'congregation' better preserves
    the covenant-community nuance in Pentateuchal usage, whereas 'assembly' can sound
    more purely procedural. The choice aims to preserve theological texture without
    importing extra claims.
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented
    exception.'
