id: NUM.27.10
reference: Numbers 27:10
source:
  edition: WLC
  text: וְ/אִם אֵ֥ין ל֖/וֹ אַחִ֑ים וּ/נְתַתֶּ֥ם אֶת נַחֲלָת֖/וֹ לַ/אֲחֵ֥י אָבִֽי/ו־־׃
translation:
  text: But if he has no brothers, then you shall give his inheritance to his father's
    brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'to his paternal uncles.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction plus conditional particle introduces the next case in
    a legal sequence. 'But if' fits the contrastive progression in English, while
    preserving the conditional force.
- source_word: אֵין לוֹ
  chosen: he has no
  alternatives:
  - there is not for him
  - there are no for him
  lexicon: HALOT
  rationale: 'Hebrew existential negation with lamed + pronominal suffix is most naturally
    rendered in idiomatic English as possession: ''he has no.'''
- source_word: אַחִים
  chosen: brothers
  alternatives:
  - siblings
  - brothers/kinsmen
  lexicon: HALOT
  rationale: The Hebrew masculine plural literally means 'brothers.' In this inheritance-law
    context it refers to male siblings, not a gender-neutral group, so 'brothers'
    is the gender-accurate rendering.
- source_word: וּנְתַתֶּם
  chosen: then you shall give
  alternatives:
  - and you shall give
  - you must give
  lexicon: HALOT
  rationale: The form continues the legal instruction addressed to the community/authorities
    in the second person plural. 'Then you shall give' makes the procedural sequence
    explicit in natural English.
- source_word: נַחֲלָתוֹ
  chosen: his inheritance
  alternatives:
  - his property
  - his hereditary possession
  lexicon: HALOT
  rationale: נַחֲלָה in this legal context denotes inherited estate or allotted property.
    'Inheritance' is the clearest and most standard rendering here.
- source_word: לַאֲחֵי אָבִיו
  chosen: to his father's brothers
  alternatives:
  - to his paternal uncles
  - to the brothers of his father
  lexicon: HALOT
  rationale: The construct phrase literally means 'to the brothers of his father.'
    'His father's brothers' preserves the familial structure closely; 'paternal uncles'
    is idiomatic but slightly more interpretive.
