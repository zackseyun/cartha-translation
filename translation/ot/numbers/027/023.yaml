theological_decisions:
- issue: Rendering the installation verb צוה in Joshua's appointment
  chosen_reading: commissioned him
  alternative_readings:
  - commanded him
  - charged him
  rationale: The verse describes Moses' public transfer of leadership to Joshua in obedience to God's instruction. 'Commissioned him' reflects the official, vocational nature of the act without importing later ecclesial ordination language. It also aligns with the laying-on-of-hands context while preserving the text's plain sense.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source text''s plain sense without paraphrase.'
