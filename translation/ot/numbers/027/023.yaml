id: NUM.27.23
reference: Numbers 27:23
source:
  edition: WLC
  text: וַ/יִּסְמֹ֧ךְ אֶת יָדָ֛י/ו עָלָ֖י/ו וַ/יְצַוֵּ֑/הוּ כַּ/אֲשֶׁ֛ר דִּבֶּ֥ר יְהוָ֖ה בְּ/יַד מֹשֶֽׁה־־׃פ
translation:
  text: And he laid his hands on him and commanded him, just as Yahweh had spoken by the hand of Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'charged him' or 'commanded him.' The Hebrew verb can denote giving a command, but here it refers to Moses' formal appointment of Joshua.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''by the hand of Moses,'' an idiom meaning through Moses as the LORD''s agent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְמֹךְ
  chosen: laid
  alternatives:
  - placed
  - leaned
  lexicon: HALOT
  rationale: The verb סמך with hands upon a person is the idiom for laying hands on someone. 'Laid' is the natural English equivalent and preserves the ritual action without paraphrase.
- source_word: יָדָיו
  chosen: his hands
  alternatives:
  - his hand
  lexicon: HALOT
  rationale: The Hebrew form is plural with 3ms suffix, so 'his hands' is required.
- source_word: עָלָיו
  chosen: on him
  alternatives:
  - upon him
  lexicon: HALOT
  rationale: '''On him'' is idiomatic modern English for the preposition על in this construction; ''upon him'' is possible but more formal/archaic.'
- source_word: וַיְצַוֵּהוּ
  chosen: commissioned him
  alternatives:
  - commanded him
  - charged him
  lexicon: HALOT
  rationale: The verb צוה often means 'command,' but in this context of installing Joshua into leadership, 'commissioned him' best captures the official appointing/charging sense in clear English. 'Charged him' is also possible, but 'commissioned' better reflects the public installation context established in the surrounding passage.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: '''Just as'' clearly marks correspondence between Moses'' action and the LORD''s prior word.'
- source_word: דִּבֶּר
  chosen: had spoken
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: 'English past perfect fits the sequence naturally: Moses acted in accordance with what the LORD had previously said.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיַד מֹשֶׁה
  chosen: by the hand of Moses
  alternatives:
  - through Moses
  - by Moses
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'by the hand of Moses.' Retaining it preserves the biblical expression of mediated agency while remaining understandable in English.
