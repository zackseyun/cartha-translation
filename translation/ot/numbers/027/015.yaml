id: NUM.27.15
reference: Numbers 27:15
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר מֹשֶׁ֔ה אֶל יְהוָ֖ה לֵ/אמֹֽר־׃
translation:
  text: Then Moses spoke to Yahweh, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... spoke
  alternatives:
  - And ... spoke
  - said
  lexicon: HALOT
  rationale: Wayyiqtol of דבר advances the narrative; 'Then' gives natural English narrative progression while preserving sequence. 'Spoke' matches the verb more directly than the simpler 'said,' especially since the following לֵאמֹר introduces the content.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: אֶל
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: 'The preposition most naturally marks direction of speech here: Moses spoke to the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The infinitive construct formula introducing direct speech is conventionally and accurately rendered 'saying.' This preserves the Hebrew speech-introduction structure without unnecessary expansion.
