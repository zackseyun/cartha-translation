id: NUM.27.15
reference: Numbers 27:15
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר מֹשֶׁ֔ה אֶל יְהוָ֖ה לֵ/אמֹֽר־׃
translation:
  text: Then Moses spoke to the LORD, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... spoke
  alternatives:
  - And ... spoke
  - said
  lexicon: HALOT
  rationale: Wayyiqtol of דבר advances the narrative; 'Then' gives natural English
    narrative progression while preserving sequence. 'Spoke' matches the verb more
    directly than the simpler 'said,' especially since the following לֵאמֹר introduces
    the content.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: אֶל
  chosen: to
  alternatives:
  - with
  lexicon: HALOT
  rationale: 'The preposition most naturally marks direction of speech here: Moses
    spoke to the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The infinitive construct formula introducing direct speech is conventionally
    and accurately rendered 'saying.' This preserves the Hebrew speech-introduction
    structure without unnecessary expansion.
