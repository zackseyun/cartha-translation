id: NUM.27.8
reference: Numbers 27:8
source:
  edition: WLC
  text: וְ/אֶל בְּנֵ֥י יִשְׂרָאֵ֖ל תְּדַבֵּ֣ר לֵ/אמֹ֑ר אִ֣ישׁ כִּֽי יָמ֗וּת וּ/בֵן֙
    אֵ֣ין ל֔/וֹ וְ/הַֽעֲבַרְתֶּ֥ם אֶת נַחֲלָת֖/וֹ לְ/בִתּֽ/וֹ־־־׃
translation:
  text: And you shall speak to the sons of Israel, saying, ‘If a man dies and has
    no son, then you shall transfer his inheritance to his daughter.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' / 'the children of Israel.' The Hebrew is literally
      'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל בְּנֵי יִשְׂרָאֵל
  chosen: And ... to the sons of Israel
  alternatives:
  - And ... to the Israelites
  - And ... to the children of Israel
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל is literally 'sons of Israel.' Per the gender-accurate
    guideline, the main text preserves the masculine familial form rather than neutralizing
    it to 'Israelites,' though that alternative is idiomatic English.
- source_word: תְּדַבֵּר לֵאמֹר
  chosen: you shall speak, saying
  alternatives:
  - you shall say
  - you shall speak as follows
  lexicon: HALOT
  rationale: The combination of דבר + לאמר is a standard speech-introduction formula.
    'You shall speak ... saying' keeps the formal structure while remaining readable.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: אִישׁ here introduces a legal case in masculine singular form. Following
    the project's gender-accurate policy, 'a man' best reflects the Hebrew wording
    and the inheritance-law context.
- source_word: כִּי יָמוּת
  chosen: if a man dies
  alternatives:
  - when a man dies
  lexicon: HALOT
  rationale: כִּי with the imperfect in casuistic law can introduce a conditional
    situation. 'If' is the most natural English legal rendering here.
- source_word: וּבֵן אֵין לוֹ
  chosen: and has no son
  alternatives:
  - and there is no son for him
  - and leaves no son
  lexicon: HALOT
  rationale: The Hebrew states literally 'and a son there is not to him.' 'Has no
    son' is concise and natural while preserving the focus on the absence of a male
    heir.
- source_word: וְהַעֲבַרְתֶּם
  chosen: you shall transfer
  alternatives:
  - you shall pass over
  - you shall cause to pass
  - you shall pass on
  lexicon: HALOT
  rationale: The Hiphil of עבר here is a legal-administrative term for causing property
    rights to pass from one party to another. 'Transfer' best communicates the inheritance-law
    sense in contemporary English.
- source_word: נַחֲלָתוֹ
  chosen: his inheritance
  alternatives:
  - his property
  - his hereditary possession
  lexicon: HALOT
  rationale: נַחֲלָה in this context refers specifically to inherited landed estate
    or inheritance rights. 'Inheritance' is the clearest and most contextually precise
    rendering.
- source_word: לְבִתּוֹ
  chosen: to his daughter
  alternatives:
  - for his daughter
  lexicon: HALOT
  rationale: The preposition ל marks the recipient of the transferred inheritance.
    'To his daughter' is the most straightforward English equivalent.
