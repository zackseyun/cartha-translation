id: NUM.27.20
reference: Numbers 27:20
source:
  edition: WLC
  text: וְ/נָתַתָּ֥ה מֵ/הֽוֹדְ/ךָ֖ עָלָ֑י/ו לְמַ֣עַן יִשְׁמְע֔וּ כָּל עֲדַ֖ת בְּנֵ֥י
    יִשְׂרָאֵֽל־׃
translation:
  text: And you shall put some of your authority on him, so that all the congregation
    of the sons of Israel may obey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'some of your majesty' or 'some of your honor.' The Hebrew word can denote
      splendor or dignity as well as the authority attached to office.
    reason: lexical_alternative
  - marker: b
    text: Or 'may listen' or 'may hear.' The Hebrew verb often carries the sense of
      hearing with obedience.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''the sons of Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה
  chosen: And you shall put
  alternatives:
  - and you shall give
  - and you shall set
  lexicon: HALOT
  rationale: The verb נתן literally means 'give,' but with עַל ('on/upon') and in
    this commissioning context, 'put ... on him' is the most natural English rendering
    and preserves the transfer imagery.
- source_word: מֵהוֹדְךָ
  chosen: some of your authority
  alternatives:
  - some of your majesty
  - some of your honor
  - some of your splendor
  lexicon: HALOT
  rationale: הוֹד often denotes majesty, splendor, or honor, but in this leadership-investiture
    context it refers to the dignified authority attached to Moses' office. The prefixed
    מִן indicates a portion, so 'some of your authority' best conveys the sense in
    context without implying a total transfer.
- source_word: עָלָיו
  chosen: on him
  alternatives:
  - upon him
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition עַל with pronominal suffix,
    preserving the imagery of conferral.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the purpose that
  lexicon: HALOT
  rationale: This conjunction introduces purpose; 'so that' is clear modern English
    and accurately reflects the syntax.
- source_word: יִשְׁמְעוּ
  chosen: may obey
  alternatives:
  - may listen
  - may hear
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey. In a leadership context where Moses'
    authority is being conferred to Joshua, the intended result is not mere auditory
    hearing but responsive obedience from the congregation. 'Obey' brings out the
    idiomatic force.
- source_word: כָּל עֲדַת
  chosen: all the congregation
  alternatives:
  - the whole congregation
  - all the assembly
  lexicon: HALOT
  rationale: עֵדָה commonly refers to the assembled community of Israel. 'Congregation'
    is a standard and natural rendering here.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per the gender-accurate philosophy, the masculine familial expression
    is preserved as 'sons of Israel.' While 'Israelites' is idiomatic, this rendering
    keeps the source form visible.
