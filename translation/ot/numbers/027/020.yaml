theological_decisions:
- issue: Nature of the transferred quality in Moses' commissioning of Joshua
  chosen_reading: The text speaks of a partial transfer of Moses' official authority
    to Joshua.
  alternative_readings:
  - The text speaks primarily of honor or splendor rather than authority.
  rationale: Because הוֹד can denote majesty, honor, or splendor, the phrase could
    be rendered more literally. However, in the immediate context of public commissioning
    and the purpose clause that the congregation may obey, the functional sense is
    official authority. The translation preserves the contextual meaning rather than
    a potentially misleading surface gloss.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of שׁמע in the purpose clause
  chosen_reading: The congregation is to obey Joshua, not merely hear him.
  alternative_readings:
  - The congregation is to listen to him
  - The congregation is to hear him
  rationale: Biblical Hebrew frequently uses שׁמע with the sense of heed/obey, especially
    in covenantal and leadership contexts. Since the verse concerns conferral of authority,
    'obey' best captures the intended response.
  doctrine_reference: Translation philosophy §1, §6
