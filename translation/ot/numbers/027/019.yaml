theological_decisions:
- issue: Public installation of Joshua's authority
  chosen_reading: Render צוה in this context as 'commission' rather than the more
    general 'command.'
  alternative_readings:
  - command
  - charge
  rationale: The verse describes a formal, public act before Eleazar and the congregation.
    'Commission' best reflects the installation context established by the surrounding
    passage while avoiding doctrinal overstatement.
  doctrine_reference: Translation philosophy §1, §5
