id: NUM.27.19
reference: Numbers 27:19
source:
  edition: WLC
  text: וְ/הַֽעֲמַדְתָּ֣ אֹת֗/וֹ לִ/פְנֵי֙ אֶלְעָזָ֣ר הַ/כֹּהֵ֔ן וְ/לִ/פְנֵ֖י כָּל
    הָ/עֵדָ֑ה וְ/צִוִּיתָ֥ה אֹת֖/וֹ לְ/עֵינֵי/הֶֽם־׃
translation:
  text: You shall set him before Eleazar the priest and before all the congregation,
    and you shall commission him in their sight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'charge him' or 'command him.' The Hebrew verb can mean to command; here
      it likely refers to publicly entrusting Joshua with his charge.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַעֲמַדְתָּ
  chosen: you shall set
  alternatives:
  - you shall stand
  - you shall present
  - you shall station
  lexicon: HALOT
  rationale: Hiphil of עמד here is causative, meaning to cause someone to stand/place
    before another. 'Set' is natural modern English and preserves the formal act without
    overinterpreting it.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: The preposition with פנים commonly denotes spatial or formal presence
    before someone. 'Before' is concise and fits the ceremonial context.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite title identifying Eleazar's office. 'The priest' is the plain
    sense and preserves the formal role in the succession scene.
- source_word: כָּל הָעֵדָה
  chosen: all the congregation
  alternatives:
  - all the assembly
  - the whole community
  lexicon: HALOT
  rationale: עֵדָה often refers to the assembled covenant community of Israel. 'Congregation'
    preserves the corporate, gathered sense and is a standard but still understandable
    English rendering.
- source_word: וְצִוִּיתָה
  chosen: you shall commission
  alternatives:
  - you shall command
  - you shall charge
  lexicon: HALOT
  rationale: While צוה often means 'command,' in this context of Joshua's public installation
    the sense is to give an authoritative charge/commission. 'Commission' communicates
    the formal appointment context without losing authority.
- source_word: לְעֵינֵיהֶם
  chosen: in their sight
  alternatives:
  - before their eyes
  - in their presence
  lexicon: HALOT
  rationale: Literally 'to their eyes,' an idiom for public visibility. 'In their
    sight' is idiomatic English that preserves the public, witnessed nature of the
    act.
