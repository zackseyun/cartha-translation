id: NUM.27.6
reference: Numbers 27:6
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: Then the LORD said to Moses,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And the LORD said to Moses, saying.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר advances the narrative. 'Then' gives natural
    English narrative flow while preserving the sequential sense; 'and said' is more
    formally literal but less idiomatic here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard prepositional sense in this speech-introduction formula.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: לֵאמֹר
  chosen: —
  alternatives:
  - saying
  lexicon: HALOT
  rationale: This infinitive construct commonly introduces the content of speech.
    In English, it is often redundant after 'said to Moses' when the next verse supplies
    the quotation, so it is left untranslated for naturalness while its function is
    preserved by the following direct speech context.
