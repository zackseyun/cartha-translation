theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and avoids introducing a denominationally loaded preference while preserving established reverential convention.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering בְּנֵי יִשְׂרָאֵל with gender accuracy
  chosen_reading: sons of Israel
  alternative_readings:
  - people of Israel
  - Israelites
  - children of Israel
  rationale: The translation philosophy prefers gender-accurate renderings over gender-neutral ones where the source is grammatically masculine and representative. Here, 'sons of Israel' preserves the Hebrew form transparently, though more idiomatic alternatives are possible.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
