id: NUM.27.12
reference: Numbers 27:12
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶל מֹשֶׁ֔ה עֲלֵ֛ה אֶל הַ֥ר הָ/עֲבָרִ֖ים הַ/זֶּ֑ה וּ/רְאֵה֙ אֶת הָ/אָ֔רֶץ אֲשֶׁ֥ר נָתַ֖תִּי לִ/בְנֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: Then Yahweh said to Moses, “Go up to this mountain of the Abarim and see the land that I have given to the sons of Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mountain of Abarim' or 'Mount Abarim.' The Hebrew phrase is literally 'mountain of the Abarim.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''to the Israelites'' or ''to the people of Israel.'' Hebrew: ''to the sons of Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural English narrative flow while preserving the sequential sense.
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Ascend
  - Climb up
  lexicon: HALOT
  rationale: Imperative of עלה. 'Go up' is the most natural modern English equivalent and preserves the upward movement without sounding overly formal.
- source_word: הַר הָעֲבָרִים
  chosen: mountain of the Abarim
  alternatives:
  - the mountain of Abarim
  - Mount Abarim
  - the mountain range of the Abarim
  lexicon: HALOT
  rationale: The Hebrew is literally 'mountain of the Abarim.' Because עֲבָרִים functions here as a place name/designation, it is transliterated as 'Abarim' rather than translated. 'Mountain of the Abarim' closely reflects the construct phrase while remaining readable.
- source_word: הַזֶּה
  chosen: this
  alternatives:
  - this one
  lexicon: HALOT
  rationale: The demonstrative points to a specific mountain near the speaker/addressee context. Simple 'this' is sufficient in English.
- source_word: וּרְאֵה
  chosen: and see
  alternatives:
  - and look at
  - and behold
  lexicon: HALOT
  rationale: Imperative of ראה. 'See' is direct and idiomatic; 'behold' is archaic, and 'look at' is slightly more colloquial than the tone warrants.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Pentateuchal promise contexts, אֶרֶץ commonly refers to the promised land. 'The land' is the standard and contextually appropriate rendering.
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I give
  - I gave
  lexicon: HALOT
  rationale: The perfect can denote a completed act with present relevance, especially in divine promise language. 'I have given' preserves the sense of certainty and established divine grant better than a simple present or past.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the people of Israel
  - to the Israelites
  - to the children of Israel
  lexicon: HALOT
  rationale: Per the gender-accurate principle, בְּנֵי is retained as 'sons' rather than neutralized. The phrase is a standard ethnonym, but the underlying masculine plural is significant enough to preserve in the main text.
