id: NUM.27.1
reference: Numbers 27:1
source:
  edition: WLC
  text: וַ/תִּקְרַ֜בְנָה בְּנ֣וֹת צְלָפְחָ֗ד בֶּן חֵ֤פֶר בֶּן גִּלְעָד֙ בֶּן מָכִ֣יר
    בֶּן מְנַשֶּׁ֔ה לְ/מִשְׁפְּחֹ֖ת מְנַשֶּׁ֣ה בֶן יוֹסֵ֑ף וְ/אֵ֨לֶּה֙ שְׁמ֣וֹת בְּנֹתָ֔י/ו
    מַחְלָ֣ה נֹעָ֔ה וְ/חָגְלָ֥ה וּ/מִלְכָּ֖ה וְ/תִרְצָֽה־־־־־׃
translation:
  text: 'Then the daughters of Zelophehad son of Hepher, son of Gilead, son of Machir,
    son of Manasseh, from the clans of Manasseh son of Joseph, came near. And these
    were the names of his daughters: Mahlah, Noah, Hoglah, Milcah, and Tirzah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew ''came near''; also possible: ''approached'' or ''drew near.'' The
      wording may suggest coming forward for a formal petition, which the following
      verses narrate.'
    reason: lexical_alternative
  - marker: b
    text: '''Noah'' here is the name of one of Zelophehad''s daughters, not the earlier
      male figure Noah in Genesis.'
    reason: cultural_note
lexical_decisions:
- source_word: וַתִּקְרַבְנָה
  chosen: came near
  alternatives:
  - approached
  - drew near
  lexicon: HALOT
  rationale: Qal wayyiqtol 3fp of קרב, narrating movement into the presence of an
    authority. 'Came near' preserves the formal sense and anticipates the legal petition
    context in the following verses without over-specifying the object.
- source_word: בְּנוֹת
  chosen: daughters of
  alternatives:
  - female descendants of
  lexicon: HALOT
  rationale: The construct with a named father naturally means literal daughters here,
    confirmed by the later naming formula. 'Daughters of' is both accurate and idiomatic.
- source_word: בֶּן ... בֶּן ... בֶּן ... בֶּן
  chosen: son of ... son of ... son of ... son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The repeated genealogy is retained rather than compressed to 'descendant
    of' in order to preserve the formal lineage structure that grounds the inheritance
    claim.
- source_word: לְמִשְׁפְּחֹת
  chosen: from the clans of
  alternatives:
  - belonging to the families of
  - according to the clans of
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal-genealogical contexts is best rendered 'clan.'
    The prefixed ל here marks affiliation; 'from the clans of' is natural English
    and preserves the social-tribal sense.
- source_word: מְנַשֶּׁה בֶן יוֹסֵף
  chosen: Manasseh son of Joseph
  alternatives:
  - Manasseh, the son of Joseph
  lexicon: HALOT
  rationale: Kept explicit to preserve the full tribal genealogy and the connection
    to Joseph's line.
- source_word: וְאֵלֶּה
  chosen: And these were
  alternatives:
  - Now these were
  - And these are
  lexicon: HALOT
  rationale: Introduces the naming formula in narrative sequence. Past tense fits
    the English narrative frame better than present while preserving the demonstrative
    force.
- source_word: שְׁמוֹת
  chosen: the names of
  alternatives:
  - the names
  lexicon: HALOT
  rationale: Standard formula for introducing a list of persons by name; retained
    straightforwardly.
- source_word: בְּנֹתָיו
  chosen: his daughters
  alternatives:
  - his female children
  lexicon: HALOT
  rationale: The suffix refers back to Zelophehad. 'His daughters' is the natural
    and precise rendering.
- source_word: מַחְלָה נֹעָה וְחָגְלָה וּמִלְכָּה וְתִרְצָה
  chosen: Mahlah, Noah, Hoglah, Milcah, and Tirzah
  lexicon: standard transliteration conventions
  rationale: Personal names are transliterated per project philosophy. 'Noah' here
    is a female personal name distinct from the male Noah elsewhere; standard English
    transliteration is retained.
