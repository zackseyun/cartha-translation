theological_decisions:
- issue: Whether רוּחַ in 'a man in whom is spirit' refers to the divine Spirit or
    merely an admirable human spirit/disposition
  chosen_reading: the Spirit
  alternative_readings:
  - spirit
  - a spirit
  rationale: Within the immediate context of Joshua's appointment to leadership, the
    phrase plausibly denotes divine endowment rather than generic temperament. Rendering
    it as 'the Spirit' reflects that likely sense while preserving the Hebrew's concise
    wording. Because the Hebrew lacks the article, the alternative is preserved in
    a footnote rather than erased.
  doctrine_reference: Preserve theological tension rather than resolve it; gender-accurate
    over gender-neutral
