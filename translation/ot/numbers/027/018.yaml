id: NUM.27.18
reference: Numbers 27:18
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה קַח לְ/ךָ֙ אֶת יְהוֹשֻׁ֣עַ בִּן נ֔וּן אִ֖ישׁ
    אֲשֶׁר ר֣וּחַ בּ֑/וֹ וְ/סָמַכְתָּ֥ אֶת יָדְ/ךָ֖ עָלָֽי/ו־־־־־־׃
translation:
  text: And the LORD said to Moses, “Take Joshua son of Nun, a man in whom is the
    Spirit, and lay your hand on him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a man in whom is spirit” or “a man who has spirit.” The Hebrew does
      not include the article.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional small-caps covenantal form rather than transliteration.
- source_word: קַח לְךָ
  chosen: Take
  alternatives:
  - Take for yourself
  - Get
  lexicon: HALOT
  rationale: The imperative of לקח with לְךָ is naturally rendered in English simply
    as 'Take'; the reflexive nuance 'for yourself' is not necessary to convey the
    command idiomatically here.
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  chosen: Joshua son of Nun
  alternatives:
  - Joshua, the son of Nun
  lexicon: HALOT
  rationale: Personal names are transliterated; 'son of' is the standard English rendering
    of the Hebrew filial construction.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a person
  - one
  lexicon: HALOT
  rationale: The Hebrew is grammatically and lexically masculine singular. Per the
    project's gender-accurate policy, 'a man' best matches the source rather than
    neutralizing to 'person'.
- source_word: אֲשֶׁר רוּחַ בּוֹ
  chosen: in whom is the Spirit
  alternatives:
  - in whom is spirit
  - who has spirit
  - in whom is a spirit
  lexicon: HALOT
  rationale: The clause literally reads 'in whom is spirit.' In this commissioning
    context, the phrase most naturally refers to God's empowering Spirit rather than
    merely human disposition, and English idiom prefers 'in whom is the Spirit.' The
    capitalized rendering makes explicit the likely referent while staying close to
    the Hebrew structure.
- source_word: וְסָמַכְתָּ אֶת יָדְךָ עָלָיו
  chosen: and lay your hand on him
  alternatives:
  - and place your hand on him
  - and lean your hand on him
  lexicon: HALOT
  rationale: The verb סמך with 'hand' over a person is the standard idiom for laying
    on of hands. Singular 'hand' is retained because the Hebrew is singular.
