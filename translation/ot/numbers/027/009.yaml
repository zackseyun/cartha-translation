id: NUM.27.9
reference: Numbers 27:9
source:
  edition: WLC
  text: וְ/אִם אֵ֥ין ל֖/וֹ בַּ֑ת וּ/נְתַתֶּ֥ם אֶת נַחֲלָת֖/וֹ לְ/אֶחָי/ו־־׃
translation:
  text: And if he has no daughter, then you shall give his inheritance to his brothers.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/אִם
  chosen: And if
  alternatives:
  - But if
  - If
  lexicon: HALOT
  rationale: Introduces the next conditional case in a legal sequence. 'And if' preserves
    the connective force of וְ while remaining natural in English law-style prose.
- source_word: אֵין לּוֹ
  chosen: he has no
  alternatives:
  - there is not for him
  - there is no for him
  lexicon: HALOT
  rationale: The existential construction with לּוֹ idiomatically means 'he has no.'
    This is clearer and more natural than a wooden rendering while preserving the
    legal sense.
- source_word: בַּת
  chosen: daughter
  alternatives:
  - a daughter
  lexicon: HALOT
  rationale: Singular 'daughter' matches the Hebrew singular noun in this inheritance
    law. English does not require the article here after 'has no.'
- source_word: וּ/נְתַתֶּם
  chosen: then you shall give
  alternatives:
  - and you shall give
  - you must give
  lexicon: HALOT
  rationale: Second person plural instruction addressed to the covenant community/judges.
    'Then' brings out the apodosis of the conditional, while 'shall give' fits the
    legal register.
- source_word: נַחֲלָתוֹ
  chosen: his inheritance
  alternatives:
  - his property
  - his hereditary possession
  lexicon: HALOT
  rationale: נַחֲלָה in this context refers specifically to inherited landed estate
    or inheritance rights. 'Inheritance' is the most accurate and idiomatic legal
    rendering.
- source_word: לְאֶחָיו
  chosen: to his brothers
  alternatives:
  - to his brothers/kinsmen
  - to his siblings
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural, 'his brothers.' Per translation
    philosophy, gender-accurate rendering is preferred over gender-neutral 'siblings.'
    In this legal context it refers to male siblings as the next heirs.
