id: NUM.27.22
reference: Numbers 27:22
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ מֹשֶׁ֔ה כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֹת֑/וֹ וַ/יִּקַּ֣ח אֶת יְהוֹשֻׁ֗עַ
    וַ/יַּֽעֲמִדֵ֨/הוּ֙ לִ/פְנֵי֙ אֶלְעָזָ֣ר הַ/כֹּהֵ֔ן וְ/לִ/פְנֵ֖י כָּל הָ/עֵדָֽה־־׃
translation:
  text: 'And Moses did as the LORD had commanded him: he took Joshua and set him before
    Eleazar the priest and before all the congregation.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set him standing before'; the Hebrew verb can also be rendered 'presented
      him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: HALOT
  rationale: The common verb עשה here introduces Moses' obedience to the prior command.
    'Did' is the most natural and sufficiently formal rendering in the idiom 'did
    as ... commanded.'
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according to what
  lexicon: HALOT
  rationale: This comparative conjunction links Moses' action directly to the divine
    command. 'As' is concise and idiomatic in English.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: 'English past perfect fits the sequence naturally: the LORD''s command
    precedes Moses'' action. It preserves the sense without adding content.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible practice.
- source_word: וַיִּקַּח אֶת־יְהוֹשֻׁעַ
  chosen: he took Joshua
  alternatives:
  - he brought Joshua
  lexicon: HALOT
  rationale: לקח literally means 'take.' In this commissioning context it refers to
    Moses taking Joshua in hand for presentation. 'Took Joshua' is faithful and clear.
- source_word: וַיַּעֲמִדֵהוּ
  chosen: set him
  alternatives:
  - made him stand
  - presented him
  - stationed him
  lexicon: HALOT
  rationale: The causative of עמד means to cause someone to stand or to place/present
    someone. 'Set him before' preserves the physical and ceremonial sense without
    sounding wooden. 'Presented him' is possible but slightly more interpretive.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: לפני here marks public placement in someone's presence. 'Before' is the
    standard concise rendering and works for both Eleazar and the assembly.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: A straightforward rendering of the title identifying Eleazar's office.
- source_word: כָּל־הָעֵדָה
  chosen: all the congregation
  alternatives:
  - all the assembly
  - the whole community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the gathered Israelite community. 'Congregation'
    is a traditional and still understandable rendering in Pentateuchal contexts;
    'assembly' is also viable. 'All the congregation' reflects כָּל plus the noun
    naturally.
