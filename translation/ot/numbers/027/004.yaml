theological_decisions:
- issue: Gender-specific inheritance language
  chosen_reading: son / brothers
  alternative_readings:
  - child / relatives
  - descendants / clan members
  rationale: The Hebrew explicitly uses male terms because the legal question concerns
    inheritance through sons and the father's brothers. Per translation philosophy,
    gender-accurate wording is preserved rather than neutralized.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
