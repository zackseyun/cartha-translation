id: NUM.27.4
reference: Numbers 27:4
source:
  edition: WLC
  text: לָ֣/מָּה יִגָּרַ֤ע שֵׁם אָבִ֨י/נוּ֙ מִ/תּ֣וֹךְ מִשְׁפַּחְתּ֔/וֹ כִּ֛י אֵ֥ין
    ל֖/וֹ בֵּ֑ן תְּנָ/ה לָּ֣/נוּ אֲחֻזָּ֔ה בְּ/ת֖וֹךְ אֲחֵ֥י אָבִֽי/נוּ־־׃
translation:
  text: Why should our father's name be taken away from among his clan because he
    had no son? Give us a possession among our father's brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be diminished' or 'be removed.' The Hebrew asks why their father's 'name'
      should be lost from his clan because he had no son.
    reason: lexical_alternative
  - marker: b
    text: '''Possession'' refers to a landed holding or inheritance allotment within
      the clan.'
    reason: cultural_note
lexical_decisions:
- source_word: לָמָּה
  chosen: Why should
  alternatives:
  - Why
  - For what reason should
  lexicon: HALOT
  rationale: Introduces a rhetorical protest/question. 'Why should' captures the interrogative
    plus the implied objection in context more naturally than a bare 'Why'.
- source_word: יִגָּרַע
  chosen: be taken away
  alternatives:
  - be diminished
  - be withdrawn
  - be removed
  lexicon: HALOT
  rationale: The Niphal of גרע here expresses loss/reduction of the father's name
    from the family register/inheritance context. 'Be taken away' communicates the
    practical effect on his standing and memorial more clearly than the more abstract
    'be diminished.'
- source_word: שֵׁם
  chosen: name
  lexicon: HALOT
  rationale: Retained literally. In context it refers to the father's continuing standing/line
    within the clan, but 'name' is the proper lexical rendering and preserves the
    Hebrew idiom.
- source_word: מִתּוֹךְ מִשְׁפַּחְתּוֹ
  chosen: from among his clan
  alternatives:
  - from the midst of his family
  - from among his family group
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal land-allotment contexts is narrower than modern
    nuclear 'family' and is well represented by 'clan.' 'From among' reflects מִתּוֹךְ
    idiomatically.
- source_word: כִּי אֵין לוֹ בֵּן
  chosen: because he had no son
  alternatives:
  - because there is no son for him
  - since he had no son
  lexicon: HALOT
  rationale: Although the Hebrew uses a verbless present construction, English in
    this narrative setting naturally uses past time. 'Son' should be preserved rather
    than neutralized, since the legal issue specifically concerns male offspring.
- source_word: תְּנָה לָּנוּ
  chosen: Give us
  alternatives:
  - Grant us
  lexicon: HALOT
  rationale: A direct imperative request. 'Give us' is straightforward modern English
    and fits the petitionary tone.
- source_word: אֲחֻזָּה
  chosen: a possession
  alternatives:
  - an inheritance holding
  - property
  lexicon: HALOT
  rationale: Refers to a landed holding/allotted property. 'Possession' preserves
    the legal-land sense without over-specifying beyond the Hebrew. 'Inheritance'
    is possible, but here the request is for an allotted holding within the inheritance
    structure.
- source_word: בְּתוֹךְ אֲחֵי אָבִינוּ
  chosen: among our father's brothers
  alternatives:
  - among the brothers of our father
  - among our father's kinsmen
  lexicon: HALOT
  rationale: 'The phrase is literal and specific: the paternal uncles/agnatic line.
    ''Brothers'' is retained per gender-accurate policy rather than broadened to ''relatives''
    or ''siblings.'''
