theological_decisions:
- issue: Referent of the pronoun in 'at his command'
  chosen_reading: The pronoun is rendered as singular 'his' and understood as the
    authoritative directive resulting from the Urim inquiry, mediated through Eleazar
    before the LORD.
  alternative_readings:
  - The pronoun refers more directly to Eleazar
  - The pronoun refers to Joshua as leader acting in accordance with the divine decision
  rationale: The Hebrew leaves the immediate antecedent somewhat compressed. The translation
    keeps the singular pronoun and does not over-resolve the ambiguity in the main
    text; the wording 'at his command' preserves the chain of authority without inserting
    explanatory material into the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
