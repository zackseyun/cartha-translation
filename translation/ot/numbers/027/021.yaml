id: NUM.27.21
reference: Numbers 27:21
source:
  edition: WLC
  text: וְ/לִ/פְנֵ֨י אֶלְעָזָ֤ר הַ/כֹּהֵן֙ יַעֲמֹ֔ד וְ/שָׁ֥אַל ל֛/וֹ בְּ/מִשְׁפַּ֥ט
    הָ/אוּרִ֖ים לִ/פְנֵ֣י יְהוָ֑ה עַל פִּ֨י/ו יֵצְא֜וּ וְ/עַל פִּ֣י/ו יָבֹ֗אוּ ה֛וּא
    וְ/כָל בְּנֵי יִשְׂרָאֵ֥ל אִתּ֖/וֹ וְ/כָל הָ/עֵדָֽה־־־־־׃
translation:
  text: And he shall stand before Eleazar the priest, who shall inquire for him by
    the judgment of the Urim before the LORD. At his command they shall go out, and
    at his command they shall come in—he and all the sons of Israel with him, even
    all the congregation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the decision of the Urim.' The phrase refers to priestly inquiry
      before the LORD by means of the Urim.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel'; that is, the Israelites.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: Standard spatial/relational sense. 'Before' is concise and natural in
    English while preserving the formal relationship of Joshua standing before Eleazar.
- source_word: יַעֲמֹד
  chosen: he shall stand
  alternatives:
  - he is to stand
  lexicon: HALOT
  rationale: The imperfect here carries directive/future force in the commissioning
    context. 'He shall stand' preserves the formal tone and instruction.
- source_word: וְשָׁאַל לוֹ
  chosen: who shall inquire for him
  alternatives:
  - and he shall ask for him
  - and he shall inquire of him/for him
  lexicon: HALOT
  rationale: 'The subject shifts naturally to Eleazar in context: Joshua stands before
    Eleazar, and Eleazar inquires on Joshua''s behalf. Rendering with relative ''who
    shall inquire for him'' makes the English syntax clear without changing the sense.'
- source_word: בְּמִשְׁפַּט הָאוּרִים
  chosen: by the judgment of the Urim
  alternatives:
  - by the decision of the Urim
  - by means of the ordinance of the Urim
  lexicon: HALOT
  rationale: מִשְׁפָּט here denotes a judicial decision/procedure rather than merely
    'law.' 'Judgment' preserves the formal, cultic-judicial nuance. 'Urim' is transliterated
    because it is a technical priestly term with no satisfactory English equivalent.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name is rendered 'the LORD' rather than transliterated.
- source_word: עַל פִּיו
  chosen: at his command
  alternatives:
  - by his word
  - according to his mouth
  lexicon: HALOT
  rationale: The idiom literally means 'upon his mouth' and denotes authoritative
    direction. 'At his command' communicates the idiomatic sense in clear English.
    In context, the pronoun refers to the divinely mediated decision delivered through
    Eleazar's inquiry.
- source_word: יֵצְאוּ ... יָבֹאוּ
  chosen: they shall go out ... they shall come in
  alternatives:
  - they shall march out ... they shall come back
  - they shall go out ... they shall enter
  lexicon: HALOT
  rationale: This is a common Hebrew pair for the conduct of communal life, often
    especially military/public movement. The more literal 'go out ... come in' preserves
    the idiom while remaining understandable.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural construct. Per gender-accurate
    philosophy, 'sons of Israel' preserves the source form; a more idiomatic alternative
    is worth preserving in a footnote.
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the assembly
  - the community
  lexicon: HALOT
  rationale: In Pentateuchal usage this often denotes the gathered covenant community.
    'Congregation' preserves the corporate and formal sense better than the broader
    'community.'
