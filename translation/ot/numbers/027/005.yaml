id: NUM.27.5
reference: Numbers 27:5
source:
  edition: WLC
  text: וַ/יַּקְרֵ֥ב מֹשֶׁ֛ה אֶת מִשְׁפָּטָ֖/ לִ/פְנֵ֥י יְהוָֽה־׃ס
translation:
  text: So Moses brought their case before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'presented their legal claim before the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  chosen: brought
  alternatives:
  - presented
  - brought near
  lexicon: HALOT
  rationale: The Hiphil of קרב means to bring near or present. In this legal context, 'brought' communicates that Moses formally presented the matter for divine decision. 'Brought near' is more literal but less idiomatic in modern English.
- source_word: מִשְׁפָּטָהּ/מִשְׁפָּטָן
  chosen: their case
  alternatives:
  - their judgment
  - their legal claim
  - their cause
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, legal decision, or case. With the 3fp suffix, it refers to the daughters' legal matter. 'Their case' best fits the immediate context of an appeal for inheritance rights and reads naturally in English.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: The preposition literally means 'before' or 'in the presence of.' 'Before' is concise and idiomatic for bringing a matter to someone for adjudication.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַ
  chosen: So
  alternatives:
  - And
  rationale: The prefixed waw here advances the narrative. 'So' captures the consequential flow from the daughters' petition in the preceding verses, while remaining faithful to the discourse function.
