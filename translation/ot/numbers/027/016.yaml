theological_decisions:
- issue: Rendering the divine title in the vocative-like petition
  chosen_reading: May the LORD, the God of the spirits of all flesh, appoint...
  alternative_readings:
  - Let the LORD... appoint...
  rationale: The Hebrew imperfect in this prayer functions jussively. 'May the LORD'
    communicates petition naturally in English without overstating command. The divine
    title is preserved because it emphasizes God's sovereign knowledge of every human
    spirit and grounds Moses' request for a suitable leader.
  doctrine_reference: 'DOCTRINE.md: YHWH -> ''the LORD''; preserve theological tension
    rather than resolve it'
- issue: Gender rendering of אִישׁ
  chosen_reading: a man
  alternative_readings:
  - a person
  - someone
  rationale: The context concerns appointment of Joshua as Moses' successor and the
    Hebrew explicitly uses the masculine singular noun. Following the gender-accurate
    policy, the masculine form is retained rather than neutralized.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
