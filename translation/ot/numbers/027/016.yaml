  chosen_reading: May Yahweh, the God of the spirits of all flesh, appoint...
  alternative_readings:
  - Let the LORD... appoint...
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gender rendering of אִישׁ
  chosen_reading: a man
  alternative_readings:
  - a person
  - someone
  rationale: The context concerns appointment of Joshua as Moses' successor and the Hebrew explicitly uses the masculine singular noun. Following the gender-accurate policy, the masculine form is retained rather than neutralized.
