id: NUM.27.16
reference: Numbers 27:16
source:
  edition: WLC
  text: יִפְקֹ֣ד יְהוָ֔ה אֱלֹהֵ֥י הָ/רוּחֹ֖ת לְ/כָל בָּשָׂ֑ר אִ֖ישׁ עַל הָ/עֵדָֽה־־׃
translation:
  text: May the LORD, the God of the spirits of all flesh, appoint a man over the
    congregation,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let the LORD, the God of the spirits of all flesh, appoint a man over
      the congregation.'
    reason: lexical_alternative
  - marker: b
    text: '''All flesh'' is a Hebrew idiom for all humanity in its mortal creatureliness.'
    reason: cultural_note
  - marker: c
    text: Or 'over the assembly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִפְקֹד
  chosen: appoint
  alternatives:
  - set over
  - visit/attend to
  - number/muster
  lexicon: HALOT
  rationale: The verb פקד has a broad semantic range, but with a direct object referring
    to a person and the following phrase 'over the congregation,' the sense is to
    appoint or designate someone to office. 'Appoint' is clear modern English and
    fits the leadership context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the pattern reflected
    in the Septuagint tradition.
- source_word: אֱלֹהֵי הָרוּחֹת
  chosen: the God of the spirits
  alternatives:
  - God of the breaths
  - God of the dispositions
  lexicon: HALOT
  rationale: רוּחוֹת here is best taken as 'spirits,' referring to the inner life
    of human beings under God's knowledge and authority. The construct phrase is retained
    fairly formally to preserve the distinctive title used in Numbers 16:22 and here.
- source_word: לְכָל בָּשָׂר
  chosen: of all flesh
  alternatives:
  - of all humanity
  - of every mortal
  lexicon: HALOT
  rationale: '''All flesh'' is a standard biblical idiom for all living human beings
    (and sometimes creatures generally). Here it most naturally refers to humanity
    in its mortal creatureliness. Retaining the idiom preserves biblical texture while
    remaining understandable.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and in this context refers
    to an individual male leader to succeed Moses. Per the gender-accurate policy,
    'a man' is preferred over a gender-neutral rendering.
- source_word: עַל הָעֵדָה
  chosen: over the congregation
  alternatives:
  - over the assembly
  - over the community
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled covenant community of Israel. 'Congregation'
    preserves the communal and quasi-formal sense better than the more generic 'community,'
    while remaining natural in English.
