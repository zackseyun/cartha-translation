id: NUM.16.29
reference: Numbers 16:29
source:
  edition: WLC
  text: אִם כְּ/מ֤וֹת כָּל הָֽ/אָדָם֙ יְמֻת֣וּ/ן אֵ֔לֶּה וּ/פְקֻדַּת֙ כָּל הָ֣/אָדָ֔ם יִפָּקֵ֖ד עֲלֵי/הֶ֑ם לֹ֥א יְהוָ֖ה שְׁלָחָֽ/נִי־־־׃
translation:
  text: If these men die the death of all mankind, and the fate of all mankind is visited on them, then Yahweh has not sent me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the visitation of all mankind is visited on them'; the Hebrew repeats the root פקד, which can carry the sense of visitation, appointment, or what befalls someone.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - If indeed
  - If it is that
  lexicon: HALOT
  rationale: Introduces the conditional protasis of Moses' test; simple 'If' is natural and sufficient in English.
- source_word: כְּמוֹת
  chosen: die the death of
  alternatives:
  - die like
  - die as the death of
  lexicon: HALOT
  rationale: The construction combines comparative כ with מוֹת and is idiomatically emphatic. 'Die the death of' preserves the Hebrew force better than a flatter 'die like' while remaining intelligible.
- source_word: כָּל הָאָדָם
  chosen: all mankind
  alternatives:
  - all men
  - all humanity
  - every man
  lexicon: HALOT
  rationale: אָדָם here is collective/generic rather than referring to an individual male. 'All mankind' preserves the representative human sense and fits the doctrine's gender-accurate principle.
- source_word: יְמֻתוּן אֵלֶּה
  chosen: these men die
  alternatives:
  - these die
  - these people die
  lexicon: HALOT
  rationale: The demonstrative refers to Korah and his company. Supplying 'men' makes the English natural and reflects the personal referent without overtranslating.
- source_word: וּפְקֻדַּת
  chosen: the fate
  alternatives:
  - the visitation
  - the punishment
  - the appointed lot
  lexicon: HALOT
  rationale: פְּקֻדָּה can denote visitation, oversight, or appointed dealing. In this judicial context, 'fate' communicates the outcome that ordinarily befalls humans without prematurely specifying punitive nuance.
- source_word: יִפָּקֵד עֲלֵיהֶם
  chosen: is visited on them
  alternatives:
  - comes upon them
  - is appointed for them
  - befalls them
  lexicon: HALOT
  rationale: The Niphal of פקד here conveys what is visited or appointed upon them. 'Is visited on them' preserves the lexical connection to פְּקֻדָּה and the formal judicial tone.
- source_word: לֹא יְהוָה שְׁלָחָנִי
  chosen: the LORD has not sent me
  alternatives:
  - the LORD did not send me
  lexicon: HALOT
  rationale: This is Moses' conclusion if the ordinary course of death occurs. Present perfect in English fits the completed commissioning with present relevance. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
