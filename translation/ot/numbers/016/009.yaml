id: NUM.16.9
reference: Numbers 16:9
source:
  edition: WLC
  text: הַ/מְעַ֣ט מִ/כֶּ֗ם כִּֽי הִבְדִּיל֩ אֱלֹהֵ֨י יִשְׂרָאֵ֤ל אֶתְ/כֶם֙ מֵ/עֲדַ֣ת יִשְׂרָאֵ֔ל לְ/הַקְרִ֥יב אֶתְ/כֶ֖ם אֵלָ֑י/ו לַ/עֲבֹ֗ד אֶת עֲבֹדַת֙ מִשְׁכַּ֣ן יְהוָ֔ה וְ/לַ/עֲמֹ֛ד לִ/פְנֵ֥י הָ/עֵדָ֖ה לְ/שָׁרְתָֽ/ם־־׃
translation:
  text: Is it too small a thing for you that the God of Israel has separated you from the congregation of Israel, to bring you near to himself, to serve in the service of the tabernacle of Yahweh, and to stand before the congregation to minister to them?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Is it not enough for you...?' The Hebrew idiom can be rendered either as 'Is it too small a thing' or more dynamically as 'Is it not enough.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְעַט
  chosen: Is it too small a thing
  alternatives:
  - Is it a small thing
  - Is it not enough
  lexicon: HALOT
  rationale: Idiomatic interrogative expressing that the privilege already given should not be considered insignificant. 'Too small a thing' preserves the rhetorical force in natural English.
- source_word: כִּי
  chosen: that
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here introduces the content of the rhetorical question after הַמְעַט rather than a straightforward causal clause.
- source_word: הִבְדִּיל
  chosen: has separated
  alternatives:
  - has set apart
  - has distinguished
  lexicon: HALOT
  rationale: The Hiphil of בדל denotes causing separation. 'Has separated' is direct and fits the contrast with the rest of Israel; 'set apart' is possible but slightly more interpretive/cultic.
- source_word: עֲדַת יִשְׂרָאֵל
  chosen: the congregation of Israel
  alternatives:
  - the community of Israel
  - the assembly of Israel
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the assembled community. 'Congregation' fits both the communal and worship context here.
- source_word: לְהַקְרִיב אֶתְכֶם אֵלָיו
  chosen: to bring you near to himself
  alternatives:
  - to present you to himself
  - to draw you near to him
  lexicon: HALOT
  rationale: Though קרב can be used for presenting offerings, here the object is the Levites themselves. 'Bring you near' preserves the relational/cultic sense without over-specifying sacrificial imagery.
- source_word: לַעֲבֹד אֶת עֲבֹדַת מִשְׁכַּן יְהוָה
  chosen: to serve in the service of the tabernacle of the LORD
  alternatives:
  - to perform the work of the tabernacle of the LORD
  - to do the service of the LORD's tabernacle
  lexicon: HALOT
  rationale: The verb עבד with cognate noun עֲבֹדָה emphasizes cultic service. 'Serve in the service' intentionally preserves the Hebrew cognate emphasis while remaining understandable.
- source_word: מִשְׁכַּן יְהוָה
  chosen: the tabernacle of the LORD
  alternatives:
  - the dwelling place of the LORD
  lexicon: HALOT
  rationale: מִשְׁכָּן is the standard term for the wilderness sanctuary. 'Tabernacle' is the established and accurate English equivalent in this context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְלַעֲמֹד לִפְנֵי הָעֵדָה
  chosen: and to stand before the congregation
  alternatives:
  - and to stand in the presence of the congregation
  lexicon: HALOT
  rationale: A formal posture of representative service before the assembled people is in view. 'Stand before' is the natural and sufficiently literal rendering.
- source_word: לְשָׁרְתָם
  chosen: to minister to them
  alternatives:
  - to serve them
  lexicon: HALOT
  rationale: שרת often denotes attendant or ministerial service, especially in sacred or official contexts. 'Minister to them' preserves that nuance better than the flatter 'serve them'.
