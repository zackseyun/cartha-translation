theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of רַב לָכֶם in Moses' rebuke
  chosen_reading: You have gone too far
  alternative_readings:
  - It is too much for you
  - Enough of you
  rationale: The phrase is contextually a rebuke against overreaching in the priestly challenge, not merely a statement of quantity. The chosen rendering preserves the rhetorical sting without adding doctrinal interpretation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source plain sense'
