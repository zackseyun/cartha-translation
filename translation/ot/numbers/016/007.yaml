id: NUM.16.7
reference: Numbers 16:7
source:
  edition: WLC
  text: וּ/תְנ֣וּ בָ/הֵ֣ן אֵ֡שׁ וְ/שִׂימוּ֩ עֲלֵי/הֶ֨ן קְטֹ֜רֶת לִ/פְנֵ֤י יְהוָה֙ מָחָ֔ר וְ/הָיָ֗ה הָ/אִ֛ישׁ אֲשֶׁר יִבְחַ֥ר יְהוָ֖ה ה֣וּא הַ/קָּד֑וֹשׁ רַב לָ/כֶ֖ם בְּנֵ֥י לֵוִֽי׀־־׃
translation:
  text: and put fire in them, and place incense on them before Yahweh tomorrow. Then the man whom Yahweh chooses—he is the holy one. You have gone too far, sons of Levi!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “It is too much for you, sons of Levi!”
    reason: lexical_alternative
lexical_decisions:
- source_word: וּתְנוּ בָהֵן אֵשׁ
  chosen: and put fire in them
  alternatives:
  - and place fire in them
  lexicon: HALOT
  rationale: נתן with ב plus the censers from the prior context naturally means to put/place fire into them. 'Put' is idiomatic modern English.
- source_word: וְשִׂימוּ עֲלֵיהֶן קְטֹרֶת
  chosen: and place incense on them
  alternatives:
  - and put incense on them
  lexicon: HALOT
  rationale: שים commonly means 'put/place.' With עַל and the censers implied, the sense is to place incense on the fire in/on the censers. 'Place' provides slight variation while remaining faithful.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard idiom for cultic presentation in God's presence. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: מָחָר
  chosen: tomorrow
  lexicon: HALOT
  rationale: Straightforward temporal adverb.
- source_word: וְהָיָה
  chosen: Then
  alternatives:
  - and it shall be
  - and it will happen
  lexicon: HALOT
  rationale: Introduces the result/apodosis of the test. 'Then' captures the discourse function in natural English.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the person
  lexicon: HALOT
  rationale: Masculine singular noun retained as 'the man' in keeping with gender-accurate policy and the representative singular construction.
- source_word: אֲשֶׁר יִבְחַר יְהוָה
  chosen: whom the LORD chooses
  alternatives:
  - whom the LORD will choose
  lexicon: HALOT
  rationale: Imperfect here expresses future relative action in English; present 'chooses' is idiomatic in relative clauses and fits the imminent test.
- source_word: הוּא הַקָּדוֹשׁ
  chosen: he is the holy one
  alternatives:
  - he is the one who is holy
  - he is holy
  lexicon: HALOT
  rationale: The article on קָדוֹשׁ is significant; 'the holy one' preserves the marked designation of the divinely approved person rather than a mere predicate adjective.
- source_word: רַב לָכֶם
  chosen: You have gone too far
  alternatives:
  - It is too much for you
  - Enough of you
  lexicon: HALOT
  rationale: Idiomatic rebuke also used earlier in the chapter. While literally 'much for you,' the sense in context is an accusation that they have exceeded proper bounds. This rendering is natural modern English and preserves the force.
- source_word: בְּנֵי לֵוִי
  chosen: sons of Levi
  alternatives:
  - children of Levi
  - Levites
  lexicon: HALOT
  rationale: Literally 'sons of Levi.' Retaining the familial expression preserves the direct address and Hebrew texture better than the more generalized 'Levites.'
