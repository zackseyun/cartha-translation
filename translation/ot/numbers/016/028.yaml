id: NUM.16.28
reference: Numbers 16:28
source:
  edition: WLC
  text: וַ/יֹּאמֶר֮ מֹשֶׁה֒ בְּ/זֹאת֙ תֵּֽדְע֔וּ/ן כִּֽי יְהוָ֣ה שְׁלָחַ֔/נִי לַ/עֲשׂ֕וֹת אֵ֥ת כָּל הַֽ/מַּעֲשִׂ֖ים הָ/אֵ֑לֶּה כִּי לֹ֖א מִ/לִּבִּֽ/י־־־׃
translation:
  text: And Moses said, “By this you will know that Yahweh has sent me to do all these deeds, for it was not from my own heart.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “all these acts” or “all these things.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “not from my heart,” an idiom meaning not on my own initiative or authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר מֹשֶׁה
  chosen: And Moses said
  alternatives:
  - Then Moses said
  - So Moses said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech; 'And' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: בְּזֹאת
  chosen: By this
  alternatives:
  - Through this
  - In this
  lexicon: HALOT
  rationale: Instrumental beth is best represented as 'by this,' pointing to the sign/event that will demonstrate Moses' claim.
- source_word: תֵּדְעוּן
  chosen: you will know
  alternatives:
  - you shall know
  - you will come to know
  lexicon: HALOT
  rationale: Imperfect 2mp with straightforward future sense in context; modern English favors 'will know' over the more archaic 'shall know.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and English Bible familiarity.
- source_word: שְׁלָחַנִי
  chosen: has sent me
  alternatives:
  - sent me
  lexicon: HALOT
  rationale: English present perfect naturally conveys the present relevance of the completed commissioning. Simple past would also be possible, but 'has sent' fits the evidentiary force of the statement.
- source_word: לַעֲשׂוֹת
  chosen: to do
  alternatives:
  - to perform
  - to carry out
  lexicon: HALOT
  rationale: The infinitive of עשה is broad; 'to do' is the most direct and least interpretive rendering.
- source_word: אֵת כָּל הַמַּעֲשִׂים הָאֵלֶּה
  chosen: all these deeds
  alternatives:
  - all these things
  - all these acts
  lexicon: HALOT
  rationale: מַעֲשִׂים refers to actions/works. 'Deeds' preserves the concrete sense better than the vaguer 'things,' while remaining natural English.
- source_word: כִּי לֹא מִלִּבִּי
  chosen: and that it was not from my own heart
  alternatives:
  - for not from my own heart
  - because not from my own heart
  - that it was not of my own accord
  lexicon: HALOT
  rationale: The second כִּי is taken as introducing a further content clause dependent on 'you will know.' 'From my own heart' closely reflects the Hebrew idiom, indicating that Moses did not act on self-originated impulse or authority. 'My own' is supplied for idiomatic clarity.
