theological_decisions:
- issue: Rendering of שְׁאוֹל
  chosen_reading: Sheol
  alternative_readings:
  - the grave
  - the underworld
  - the realm of the dead
  rationale: The Hebrew term is semantically broader than a burial place and should not be reduced to 'grave' in the main text. Transliteration preserves the conceptual world of the Hebrew Bible while allowing alternatives to be noted.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
