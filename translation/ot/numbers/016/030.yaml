id: NUM.16.30
reference: Numbers 16:30
source:
  edition: WLC
  text: וְ/אִם בְּרִיאָ֞ה יִבְרָ֣א יְהוָ֗ה וּ/פָצְתָ֨ה הָ/אֲדָמָ֤ה אֶת פִּ֨י/הָ֙ וּ/בָלְעָ֤ה אֹתָ/ם֙ וְ/אֶת כָּל אֲשֶׁ֣ר לָ/הֶ֔ם וְ/יָרְד֥וּ חַיִּ֖ים שְׁאֹ֑לָ/ה וִֽ/ידַעְתֶּ֕ם כִּ֧י נִֽאֲצ֛וּ הָ/אֲנָשִׁ֥ים הָ/אֵ֖לֶּה אֶת יְהוָֽה־־־־־׃
translation:
  text: But if Yahweh creates something new, and the ground opens its mouth and swallows them and all that belongs to them, and they go down alive to Sheol, then you will know that these men have despised Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'creates a new thing' or 'creates a creation.' The Hebrew uses a cognate noun and verb for emphasis on an extraordinary act of God.
    reason: lexical_alternative
  - marker: b
    text: Sheol is the Hebrew term for the realm of the dead; alternatively, 'the grave' in a more concrete sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרִיאָה
  chosen: something unprecedented
  alternatives:
  - a creation
  - something new
  lexicon: HALOT
  rationale: 'The noun from ברא in this context is idiomatic with the cognate verb יברא: ''if the LORD creates a creation/new thing.'' English ''creates something unprecedented'' captures the force of a divinely wrought, extraordinary event more naturally than the wooden ''create a creation,'' while preserving the emphasis on novelty.'
- source_word: יִבְרָא
  chosen: creates
  alternatives:
  - creates anew
  - brings about
  lexicon: HALOT
  rationale: Basic sense of ברא is 'create.' Retaining 'creates' preserves the verbal link with בְּרִיאָה and the theological weight of divine creative action.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּפָצְתָה הָאֲדָמָה אֶת־פִּיהָ
  chosen: the ground opens its mouth
  alternatives:
  - the earth opens its mouth
  lexicon: HALOT
  rationale: אֲדָמָה commonly denotes 'ground/soil/land.' Here 'ground' fits the immediate image of the earth splitting beneath them. The anthropomorphic 'opens its mouth' should be preserved.
- source_word: וּבָלְעָה
  chosen: swallows
  alternatives:
  - devours
  - gulps down
  lexicon: HALOT
  rationale: בלע means 'swallow, engulf.' 'Swallows' is the most direct and idiomatic choice in this context.
- source_word: כָּל אֲשֶׁר לָהֶם
  chosen: all that belongs to them
  alternatives:
  - everything that is theirs
  - all they have
  lexicon: HALOT
  rationale: This phrase includes possessions and dependents in a broad sense. 'All that belongs to them' preserves the comprehensive scope without over-specifying.
- source_word: וְיָרְדוּ חַיִּים שְׁאֹלָה
  chosen: they go down alive to Sheol
  alternatives:
  - they go down alive to the grave
  - they descend alive to the underworld
  lexicon: HALOT
  rationale: שְׁאוֹל is best preserved as 'Sheol' rather than flattened to 'grave,' since the Hebrew term can denote the realm of the dead more broadly. 'Alive' is fronted in Hebrew and retained near the verb for emphasis.
- source_word: וִידַעְתֶּם
  chosen: then you will know
  alternatives:
  - and you will know
  lexicon: HALOT
  rationale: The conjunction here marks result/inference from the conditional scenario. 'Then you will know' makes the logic explicit in natural English.
- source_word: נִאֲצוּ
  chosen: have despised
  alternatives:
  - have treated with contempt
  - have spurned
  - have rejected
  lexicon: HALOT
  rationale: נאץ conveys contemptuous rejection or scorn. 'Have despised' is concise, strong, and idiomatic, preserving the offense against the LORD.
- source_word: הָאֲנָשִׁים הָאֵלֶּה
  chosen: these men
  alternatives:
  - these people
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'the men הללו.' Per gender-accurate policy, 'these men' should be retained rather than neutralized.
