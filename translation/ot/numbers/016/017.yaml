id: NUM.16.17
reference: Numbers 16:17
source:
  edition: WLC
  text: וּ/קְח֣וּ אִ֣ישׁ מַחְתָּת֗/וֹ וּ/נְתַתֶּ֤ם עֲלֵי/הֶם֙ קְטֹ֔רֶת וְ/הִקְרַבְתֶּ֞ם לִ/פְנֵ֤י יְהוָה֙ אִ֣ישׁ מַחְתָּת֔/וֹ חֲמִשִּׁ֥ים וּ/מָאתַ֖יִם מַחְתֹּ֑ת וְ/אַתָּ֥ה וְ/אַהֲרֹ֖ן אִ֥ישׁ מַחְתָּתֽ/וֹ׀׃
translation:
  text: And let each man take his firepan, and put incense on them, and bring before Yahweh each man his firepan—two hundred and fifty firepans—and you and Aaron, each his firepan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD''; alternatives include ''Yahweh'' and ''Jehovah.'''
    reason: alternative_reading
  - marker: b
    text: Or 'censer(s)' for 'firepan(s),' the vessel used for burning incense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּקְחוּ
  chosen: And let each man take
  alternatives:
  - And take
  - Then take
  lexicon: HALOT
  rationale: Qal imperative plural of לקח, addressed to the rebels collectively. Rendered with English jussive force ('let each man take') to fit the distributive phrase that follows and the instruction context.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - each person
  lexicon: HALOT
  rationale: Used distributively with the following singular possessive ('his firepan'). 'Each man' preserves the masculine singular form and representative force, in line with the gender-accurate policy.
- source_word: מַחְתָּתוֹ / מַחְתֹּת
  chosen: firepan / firepans
  alternatives:
  - censer / censers
  - incense pan / incense pans
  lexicon: HALOT
  rationale: Refers to the vessel used to hold coals/incense. 'Firepan' is clear modern English and avoids overly ecclesiastical diction, while still fitting the ritual setting. 'Censer' is a viable traditional alternative but less transparent for modern readers.
- source_word: וּנְתַתֶּם עֲלֵיהֶם קְטֹרֶת
  chosen: and put incense on them
  alternatives:
  - and place incense on them
  - and put incense in them
  lexicon: HALOT
  rationale: Literally 'put on them incense,' referring to the firepans. 'On them' follows the Hebrew preposition עַל and likely reflects placing incense onto the coals in the pans. 'In them' is smoother in English but less formally aligned.
- source_word: קְטֹרֶת
  chosen: incense
  lexicon: HALOT
  rationale: Standard rendering for the substance burned in priestly ritual.
- source_word: וְהִקְרַבְתֶּם
  chosen: and bring
  alternatives:
  - and present
  - and bring near
  lexicon: HALOT
  rationale: Hiphil of קרב, causative/bringing near in cultic context. 'Bring' is natural English; 'present' is possible but less concrete. The following phrase 'before the LORD' conveys the cultic presentation.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard idiom for appearing in God's presence. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: חֲמִשִּׁים וּמָאתַיִם מַחְתֹּת
  chosen: two hundred and fifty firepans
  alternatives:
  - 250 firepans
  lexicon: HALOT
  rationale: Cardinal number phrase specifying the total number of firepans brought by Korah's company. Spelled out for literary style in biblical narrative.
- source_word: וְאַתָּה וְאַהֲרֹן אִישׁ מַחְתָּתוֹ
  chosen: and you and Aaron, each his firepan
  alternatives:
  - and you and Aaron, each with his firepan
  - and you and Aaron, each one his firepan
  lexicon: HALOT
  rationale: Appositional/distributive phrase adds Moses and Aaron to the action. The verbless Hebrew is concise; English supplies a natural equivalent without overexpanding. 'Each his firepan' preserves the distributive singular.
