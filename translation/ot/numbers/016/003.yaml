theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether Korah's claim 'all the congregation... are holy' should be phrased to endorse or undercut the claim
  chosen_reading: Rendered straightforwardly as the speakers' claim without interpretive qualification
  alternative_readings:
  - Adding qualifiers such as 'claim to be holy' or 'are consecrated'
  rationale: The translation preserves the statement as spoken, without importing narrative judgment into the wording. The broader context evaluates the claim; this verse reports it directly.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
