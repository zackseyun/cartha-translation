id: NUM.16.3
reference: Numbers 16:3
source:
  edition: WLC
  text: וַ/יִּֽקָּהֲל֞וּ עַל מֹשֶׁ֣ה וְ/עַֽל אַהֲרֹ֗ן וַ/יֹּאמְר֣וּ אֲלֵ/הֶם֮ רַב לָ/כֶם֒ כִּ֤י כָל הָֽ/עֵדָה֙ כֻּלָּ֣/ם קְדֹשִׁ֔ים וּ/בְ/תוֹכָ֖/ם יְהוָ֑ה וּ/מַדּ֥וּעַ תִּֽתְנַשְּׂא֖וּ עַל קְהַ֥ל יְהוָֽה־־־־־׃
translation:
  text: They assembled against Moses and against Aaron and said to them, “You have gone too far! For all the congregation—all of them—are holy, and Yahweh is among them. So why do you exalt yourselves above the assembly of Yahweh?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''It is too much for you'' or ''Enough of you.'' The idiom is rendered ''You have gone too far'' for clear modern English.'
    reason: lexical_alternative
  - marker: b
    text: '''the LORD'' renders the divine name YHWH (traditionally vocalized ''Yahweh'').'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקָּהֲלוּ
  chosen: They assembled
  alternatives:
  - They gathered together
  - They banded together
  lexicon: HALOT
  rationale: From קהל in the Niphal/assembled sense. 'Assembled' preserves the corporate, deliberate gathering without overinterpreting hostility, which is supplied by the following עַל ('against').
- source_word: עַל מֹשֶׁה וְעַל אַהֲרֹן
  chosen: against Moses and against Aaron
  alternatives:
  - before Moses and Aaron
  - concerning Moses and Aaron
  lexicon: HALOT
  rationale: In this confrontational context, עַל is best rendered 'against,' indicating opposition rather than mere location or topic.
- source_word: רַב לָכֶם
  chosen: You have gone too far!
  alternatives:
  - Enough of you!
  - It is too much for you!
  lexicon: HALOT
  rationale: This idiom is a sharp rebuke. 'You have gone too far' communicates the force naturally in modern English while preserving the accusatory sense. A more literal 'It is too much for you' is possible but less idiomatic.
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the accusation; 'For' fits the argumentative flow in English.
- source_word: כָל הָעֵדָה כֻּלָּם
  chosen: all the congregation—all of them—
  alternatives:
  - the whole congregation, every one of them
  - all the community, all of them
  lexicon: HALOT
  rationale: Retains the emphatic totality of כָל ... כֻּלָּם. 'Congregation' fits Israel assembled as a covenant people; the dash preserves the Hebrew emphasis.
- source_word: קְדֹשִׁים
  chosen: holy
  alternatives:
  - set apart
  - consecrated
  lexicon: HALOT
  rationale: '''Holy'' is the standard and theologically weighty rendering for קדושׁ. Here it reflects Korah''s claim about the people''s sanctified status.'
- source_word: וּבְתוֹכָם יְהוָה
  chosen: and the LORD is among them
  alternatives:
  - and the LORD is in their midst
  - with the LORD in their midst
  lexicon: HALOT
  rationale: The phrase denotes divine presence within the community. 'Among them' is clear modern English. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּמַדּוּעַ
  chosen: So why
  alternatives:
  - And why
  - Why then
  lexicon: HALOT
  rationale: Introduces the conclusion drawn from the preceding claim. 'So why' captures the inferential force naturally.
- source_word: תִּתְנַשְּׂאוּ
  chosen: do you exalt yourselves
  alternatives:
  - do you lift yourselves up
  - do you raise yourselves
  lexicon: HALOT
  rationale: Hitpael of נשׂא here is reflexive/exalting oneself. 'Exalt yourselves' best conveys self-elevation and arrogance in context.
- source_word: עַל קְהַל יְהוָה
  chosen: above the assembly of the LORD
  alternatives:
  - over the assembly of the LORD
  - against the assembly of the LORD
  lexicon: HALOT
  rationale: With the reflexive verb, עַל conveys elevation over others. 'Above' makes the charge of self-exaltation explicit. 'Assembly' is a good contextual equivalent for קהל here and distinguishes it slightly from עֵדָה earlier while remaining natural.
