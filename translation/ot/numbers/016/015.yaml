id: NUM.16.15
reference: Numbers 16:15
source:
  edition: WLC
  text: וַ/יִּ֤חַר לְ/מֹשֶׁה֙ מְאֹ֔ד וַ/יֹּ֨אמֶר֙ אֶל יְהוָ֔ה אַל תֵּ֖פֶן אֶל מִנְחָתָ֑/ם לֹ֠א חֲמ֨וֹר אֶחָ֤ד מֵ/הֶם֙ נָשָׂ֔אתִי וְ/לֹ֥א הֲרֵעֹ֖תִי אֶת אַחַ֥ד מֵ/הֶֽם־־־־׃
translation:
  text: Then Moses became very angry and said to Yahweh, “Do not regard their offering. I have not taken a single donkey from them, nor have I harmed any one of them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not regard their offering' or 'Do not accept their offering.' The Hebrew literally says, 'Do not turn toward their offering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר לְמֹשֶׁה מְאֹד
  chosen: Then Moses became very angry
  alternatives:
  - Then Moses was very angry
  - Then it burned greatly to Moses
  lexicon: HALOT
  rationale: The idiom חרה ל expresses anger kindling in or toward a person. 'Became very angry' renders the Hebrew idiom in natural English while preserving the intensity marked by מְאֹד.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אַל תֵּפֶן אֶל מִנְחָתָם
  chosen: Do not turn toward their offering
  alternatives:
  - Do not regard their offering
  - Do not accept their offering
  lexicon: HALOT
  rationale: פנה אל literally means 'turn toward' and in prayer contexts can imply favorable regard. 'Turn toward' keeps the metaphor of the Hebrew, while 'offering' is the broad and contextually fitting sense of מִנְחָה here.
- source_word: מִנְחָתָם
  chosen: their offering
  alternatives:
  - their grain offering
  - their tribute
  lexicon: HALOT
  rationale: מִנְחָה can denote a gift, tribute, or offering. In this cultic dispute context, 'offering' is broad enough to fit without over-specifying 'grain offering,' which the immediate wording does not require.
- source_word: לֹא חֲמוֹר אֶחָד מֵהֶם נָשָׂאתִי
  chosen: I have not taken a single donkey from them
  alternatives:
  - I have not taken even one donkey from them
  - I have not carried off one donkey from them
  lexicon: HALOT
  rationale: נשא with a direct object here conveys taking or appropriating. 'Taken a single donkey' communicates Moses' claim that he has not exploited them materially, preserving the concrete image of the Hebrew.
- source_word: וְלֹא הֲרֵעֹתִי אֶת אַחַד מֵהֶם
  chosen: nor have I harmed any one of them
  alternatives:
  - nor have I done wrong to any of them
  - nor have I treated any one of them badly
  lexicon: HALOT
  rationale: The Hiphil of רעע means to do evil/harm. 'Harmed' is concise and natural, preserving the denial of personal wrongdoing against any individual among them.
