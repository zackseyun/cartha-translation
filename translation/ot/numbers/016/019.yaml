id: NUM.16.19
reference: Numbers 16:19
source:
  edition: WLC
  text: וַ/יַּקְהֵ֨ל עֲלֵי/הֶ֥ם קֹ֨רַח֙ אֶת כָּל הָ֣/עֵדָ֔ה אֶל פֶּ֖תַח אֹ֣הֶל מוֹעֵ֑ד וַ/יֵּרָ֥א כְבוֹד יְהוָ֖ה אֶל כָּל הָ/עֵדָֽה־־־־־־׃פ
translation:
  text: And Korah assembled the whole congregation against them at the entrance to the tent of meeting, and the glory of Yahweh appeared to the whole congregation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּקְהֵל
  chosen: assembled
  alternatives:
  - gathered together
  - convened
  lexicon: HALOT
  rationale: 'The Hiphil of קהל here is causative: Korah caused the community to gather. ''Assembled'' is natural modern English and preserves the active leadership of Korah in summoning the people.'
- source_word: עֲלֵיהֶם
  chosen: against them
  alternatives:
  - before them
  - around them
  lexicon: HALOT
  rationale: With קהל and the context of rebellion against Moses and Aaron, עַל has adversative force. 'Against them' best reflects the hostile orientation of the assembly toward Moses and Aaron.
- source_word: כָּל הָעֵדָה
  chosen: the whole congregation
  alternatives:
  - all the community
  - the entire assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the covenant community assembled as a body. 'Congregation' is a standard and fitting rendering in Numbers, while 'whole' preserves כָּל.
- source_word: אֶל פֶּתַח אֹהֶל מוֹעֵד
  chosen: at the entrance to the tent of meeting
  alternatives:
  - to the entrance of the tent of meeting
  - at the doorway of the tent of meeting
  lexicon: HALOT
  rationale: פֶּתַח is the opening/entrance. In English, with the gathering already completed there, 'at the entrance to' reads more naturally than a more wooden 'to the entrance of' while preserving the location precisely.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: This is the established literal sense of the tabernacle's designation in the Pentateuch. 'Tent of meeting' is both accurate and readable.
- source_word: וַיֵּרָא
  chosen: appeared
  alternatives:
  - was seen
  - showed himself
  lexicon: HALOT
  rationale: The Niphal of ראה here is the standard idiom for visible manifestation. 'Appeared' is concise and idiomatic without over-interpreting the mode of manifestation.
- source_word: כְבוֹד יְהוָה
  chosen: the glory of the LORD
  alternatives:
  - the LORD's glory
  lexicon: HALOT
  rationale: כָּבוֹד in this context refers to the visible, weighty manifestation of divine presence. The divine name יְהוָה follows project policy as 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל כָּל הָעֵדָה
  chosen: to the whole congregation
  alternatives:
  - before the whole congregation
  - to all the congregation
  lexicon: HALOT
  rationale: The preposition marks the audience of the appearance. 'To the whole congregation' preserves the directional sense while reading naturally in English.
