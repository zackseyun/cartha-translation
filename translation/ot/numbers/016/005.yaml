id: NUM.16.5
reference: Numbers 16:5
source:
  edition: WLC
  text: וַ/יְדַבֵּ֨ר אֶל קֹ֜רַח וְ/אֶֽל כָּל עֲדָת/וֹ֮ לֵ/אמֹר֒ בֹּ֠קֶר וְ/יֹדַ֨ע יְהוָ֧ה אֶת אֲשֶׁר ל֛/וֹ וְ/אֶת הַ/קָּד֖וֹשׁ וְ/הִקְרִ֣יב אֵלָ֑י/ו וְ/אֵ֛ת אֲשֶׁ֥ר יִבְחַר בּ֖/וֹ יַקְרִ֥יב אֵלָֽי/ו־־־־־־־׃
translation:
  text: And he spoke to Korah and to all his congregation, saying, “In the morning Yahweh will make known who is his, and who is holy, and will bring him near to himself. The one whom he chooses, he will bring near to himself.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD will know who is his'; the Hebrew verb can be rendered more literally as 'know,' but here it likely carries the sense of making known or publicly showing.
    reason: lexical_alternative
  - marker: b
    text: '''Bring near'' is priestly/cultic language, referring to authorized approach into the LORD''s presence for sacred service.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: And he spoke
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The verb דבר commonly denotes speaking/addressing. 'Spoke' preserves the narrative register and distinguishes it from the following infinitive לֵאמֹר introducing direct speech.
- source_word: עֲדָתוֹ
  chosen: his congregation
  alternatives:
  - his company
  - his assembly
  lexicon: HALOT
  rationale: עֵדָה often refers to an assembled group or community. 'Congregation' fits the wilderness-community setting and is idiomatic in English for this corporate body; 'company' is possible but less clear to modern readers.
- source_word: בֹּקֶר
  chosen: In the morning
  alternatives:
  - Morning
  lexicon: HALOT
  rationale: The bare noun functions adverbially. 'In the morning' gives natural English while preserving the temporal force.
- source_word: וְיֹדַע יְהוָה
  chosen: the LORD will make known
  alternatives:
  - the LORD will know
  - the LORD will show
  lexicon: HALOT
  rationale: Though ידע is formally 'know,' in this causative/resultative context with the following objects it conveys public disclosure or demonstration. 'Will make known' best captures the sense that the LORD will reveal the true status of the persons in question.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת אֲשֶׁר לוֹ
  chosen: who is his
  alternatives:
  - the one who belongs to him
  - who belongs to the LORD
  lexicon: HALOT
  rationale: The phrase literally means 'the one who is his.' This concise rendering preserves the possessive covenantal sense without over-expanding the text.
- source_word: הַקָּדוֹשׁ
  chosen: who is holy
  alternatives:
  - the holy one
  - who is set apart
  lexicon: HALOT
  rationale: As an adjective used substantivally, it identifies the person set apart for sacred service. 'Who is holy' is natural English and preserves the predicate-like parallel with 'who is his.'
- source_word: וְהִקְרִיב אֵלָיו
  chosen: and will bring him near to himself
  alternatives:
  - and will cause him to come near to him
  - and will present him before himself
  lexicon: HALOT
  rationale: The Hiphil of קרב means to bring near/allow approach, especially in cultic contexts. 'Bring near to himself' preserves the priestly-access nuance without becoming wooden.
- source_word: אֲשֶׁר יִבְחַר בּוֹ
  chosen: The one whom he chooses
  alternatives:
  - whomever he chooses
  - the one he selects
  lexicon: HALOT
  rationale: בחר denotes choosing/electing. 'The one whom he chooses' keeps the personal and formal tone of the Hebrew.
- source_word: יַקְרִיב אֵלָיו
  chosen: he will bring near to himself
  alternatives:
  - he will cause to approach him
  lexicon: HALOT
  rationale: Repeating 'bring near to himself' reflects the Hebrew repetition and reinforces the cultic theme of authorized approach.
