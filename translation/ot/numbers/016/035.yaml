id: NUM.16.35
reference: Numbers 16:35
source:
  edition: WLC
  text: וְ/אֵ֥שׁ יָצְאָ֖ה מֵ/אֵ֣ת יְהוָ֑ה וַ/תֹּ֗אכַל אֵ֣ת הַ/חֲמִשִּׁ֤ים וּ/מָאתַ֨יִם֙ אִ֔ישׁ מַקְרִיבֵ֖י הַ/קְּטֹֽרֶת׃פ
translation:
  text: And fire came out from Yahweh and consumed the two hundred and fifty men who were offering the incense.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'from before the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֵשׁ
  chosen: And fire
  alternatives:
  - And a fire
  - Then fire
  lexicon: HALOT
  rationale: אֵשׁ means 'fire.' English can omit the indefinite article for a natural idiomatic rendering in a judgment scene. The prefixed conjunction is rendered 'And' to preserve the narrative sequence.
- source_word: יָצְאָה
  chosen: came out
  alternatives:
  - went out
  - issued forth
  lexicon: HALOT
  rationale: From יצא, 'to go out/come out.' 'Came out' is the most natural English expression here for fire proceeding from the divine presence.
- source_word: מֵ/אֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - from before the LORD
  - from Yahweh
  lexicon: HALOT
  rationale: The phrase indicates source/origin from YHWH. Following doctrine, יְהוָה is rendered 'the LORD.' 'From the LORD' is clear and idiomatic; 'from before the LORD' is a possible more formal alternative but less natural in English.
- source_word: וַ/תֹּאכַל
  chosen: and consumed
  alternatives:
  - and devoured
  - and ate up
  lexicon: HALOT
  rationale: אכל is literally 'eat,' but with fire as subject it idiomatically means 'consume/devour.' 'Consumed' is standard, clear modern English and preserves the severity without sounding overly archaic.
- source_word: הַ/חֲמִשִּׁים וּ/מָאתַיִם אִישׁ
  chosen: the two hundred fifty men
  alternatives:
  - the two hundred and fifty men
  - the 250 men
  lexicon: HALOT
  rationale: The Hebrew number phrase plus אִישׁ denotes a counted group of men. 'Two hundred fifty men' is natural modern English; 'and' is optional in English style.
- source_word: מַקְרִיבֵי
  chosen: who were offering
  alternatives:
  - offering
  - who offered
  - who were presenting
  lexicon: HALOT
  rationale: The participle of קרב here describes the men by their action in progress or characteristic role at that moment. A relative clause, 'who were offering,' makes the syntax clear in English.
- source_word: הַ/קְּטֹרֶת
  chosen: the incense
  alternatives:
  - incense
  lexicon: HALOT
  rationale: קְטֹרֶת refers to incense, specifically the cultic incense involved in this episode. The article is retained as 'the incense' because the reference is definite and situationally specific.
