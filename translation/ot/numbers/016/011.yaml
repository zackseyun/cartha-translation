theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Identifying the true target of the rebellion
  chosen_reading: The main clause is rendered to show that the assembly has assembled against the LORD, while Aaron is rhetorically minimized as secondary.
  alternative_readings:
  - The assembly has assembled against both the LORD and Aaron equally
  rationale: The Hebrew syntax places primary emphasis on rebellion against the LORD, then adds Aaron with the rhetorical question 'what is he...?' This preserves the theological point of the passage without overstating Aaron's status.
