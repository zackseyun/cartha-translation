id: NUM.16.11
reference: Numbers 16:11
source:
  edition: WLC
  text: לָ/כֵ֗ן אַתָּה֙ וְ/כָל עֲדָ֣תְ/ךָ֔ הַ/נֹּעָדִ֖ים עַל יְהוָ֑ה וְ/אַהֲרֹ֣ן מַה ה֔וּא כִּ֥י תלונו עָלָֽי/ו־־־׃
translation:
  text: Therefore, you and all your company who have assembled against Yahweh—and Aaron, what is he, that you grumble against him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your assembly' or 'your congregation.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'and as for Aaron, who is he?' The sense is that their rebellion is ultimately against the LORD, not merely against Aaron.
    reason: alternative_reading
  - marker: c
    text: '''the LORD'' renders the divine name YHWH.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: HALOT
  rationale: Introduces Moses' conclusion from the preceding accusation; 'Therefore' is natural and preserves the inferential force.
- source_word: עֲדָתְךָ
  chosen: your company
  alternatives:
  - your congregation
  - your assembly
  lexicon: HALOT
  rationale: Refers to Korah's gathered faction. 'Company' is idiomatic modern English and fits the polemical context better than the more ecclesial-sounding 'congregation.'
- source_word: הַנֹּעָדִים
  chosen: who have assembled
  alternatives:
  - who are gathered together
  - who have banded together
  lexicon: HALOT
  rationale: The Niphal participle of יעד here denotes those who have gathered by appointment or agreement. 'Who have assembled' is clear and sufficiently formal without overinterpreting motive.
- source_word: עַל
  chosen: against
  alternatives:
  - before
  - concerning
  lexicon: HALOT
  rationale: 'In context of rebellion and complaint, עַל carries adversative force: the assembly is set against the LORD, and they grumble against Aaron.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: וְאַהֲרֹן מַה הוּא
  chosen: and Aaron, what is he
  alternatives:
  - and as for Aaron, who is he?
  - but Aaron—what is he?
  lexicon: HALOT
  rationale: Retains the rhetorical minimization of Aaron's personal significance in contrast to the true object of rebellion being the LORD. The wording is slightly smoothed in English punctuation while preserving the Hebrew sense.
- source_word: תלונו
  chosen: you grumble
  alternatives:
  - you murmur
  - you complain
  lexicon: HALOT
  rationale: From לון in the Hiphil, commonly used in the wilderness narratives for Israel's complaining. 'Grumble' is natural modern English and preserves the negative, rebellious tone better than the more neutral 'complain.'
- source_word: עָלָיו
  chosen: against him
  alternatives:
  - about him
  lexicon: HALOT
  rationale: The complaint is directed at Aaron; 'against him' best matches the adversative sense in context.
