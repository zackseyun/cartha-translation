id: NUM.16.16
reference: Numbers 16:16
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר מֹשֶׁה֙ אֶל קֹ֔רַח אַתָּה֙ וְ/כָל עֲדָ֣תְ/ךָ֔ הֱי֖וּ לִ/פְנֵ֣י יְהוָ֑ה אַתָּ֥ה וָ/הֵ֛ם וְ/אַהֲרֹ֖ן מָחָֽר־־׃
translation:
  text: And Moses said to Korah, “You and all your congregation, be before Yahweh tomorrow—you and they and Aaron.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “be in the presence of the LORD tomorrow.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “you and they and Aaron,” an explicit listing of the parties to appear.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative form introducing the next event. 'And ... said' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Direct addressee marker; 'to' is the natural modern English equivalent.
- source_word: קֹרַח
  chosen: Korah
  rationale: Personal name is transliterated per translation philosophy.
- source_word: אַתָּה וְכָל עֲדָתְךָ
  chosen: You and all your congregation
  alternatives:
  - You and all your company
  - You and all your assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes the gathered community or company. 'Congregation' fits the communal setting and is idiomatic in English while preserving the collective sense.
- source_word: הֱיוּ
  chosen: be
  alternatives:
  - present yourselves
  - appear
  lexicon: HALOT
  rationale: Imperative plural of היה, literally 'be.' In context it means to be present/stand there, but 'be' keeps the wording closer to the Hebrew while remaining intelligible with the following phrase.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: לִפְנֵי means 'before/in the presence of.' 'Before the LORD' is concise and natural. YHWH is rendered 'the LORD' per doctrinal guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required default rendering for the divine name per DOCTRINE.md contested terms table.
- source_word: אַתָּה וָהֵם וְאַהֲרֹן
  chosen: you and they and Aaron
  alternatives:
  - you, they, and Aaron
  lexicon: HALOT
  rationale: The Hebrew repeats and coordinates the parties explicitly. Retaining 'you and they and Aaron' reflects the emphatic listing, though punctuation in English clarifies the structure.
- source_word: מָחָר
  chosen: tomorrow
  alternatives:
  - on the next day
  lexicon: HALOT
  rationale: Temporal adverb indicating when they are to appear. Placed earlier in English for natural readability while preserving meaning.
