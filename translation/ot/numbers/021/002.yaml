id: NUM.21.2
reference: Numbers 21:2
source:
  edition: WLC
  text: וַ/יִּדַּ֨ר יִשְׂרָאֵ֥ל נֶ֛דֶר לַֽ/יהוָ֖ה וַ/יֹּאמַ֑ר אִם נָתֹ֨ן תִּתֵּ֜ן אֶת הָ/עָ֤ם הַ/זֶּה֙ בְּ/יָדִ֔/י וְ/הַֽחֲרַמְתִּ֖י אֶת עָרֵי/הֶֽם־־־׃
translation:
  text: Then Israel made a vow to Yahweh and said, “If you indeed give this people into my hand, then I will devote their cities to destruction.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, “If you will surely give this people into my hand.” The Hebrew intensifies the verb: “giving, you give.”'
    reason: lexical_alternative
  - marker: b
    text: Or, “put their cities under the ban.” The Hebrew refers to devoting something irrevocably to destruction as an act of ḥerem.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּדַּר ... נֶדֶר
  chosen: made a vow
  alternatives:
  - vowed a vow
  - uttered a vow
  lexicon: HALOT
  rationale: The Hebrew uses the cognate construction 'vowed a vow,' an idiom naturally rendered in English as 'made a vow' while preserving the formal act of a solemn pledge.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated, following established covenant-name convention.
- source_word: אִם נָתֹן תִּתֵּן
  chosen: If you indeed give
  alternatives:
  - If you will surely give
  - If you truly give
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the verb. 'Indeed give' preserves the emphasis in readable modern English without sounding wooden.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: The singular collective עָם is best kept as 'people' here. 'This people' reflects the Hebrew demonstrative construction more closely than 'these people.'
- source_word: בְּיָדִי
  chosen: into my hand
  alternatives:
  - into my power
  - into my control
  lexicon: HALOT
  rationale: The idiom 'into my hand' is common biblical language for delivering into someone's power. It is sufficiently transparent in English and preserves the source imagery.
- source_word: וְהַחֲרַמְתִּי
  chosen: I will devote ... to destruction
  alternatives:
  - I will utterly destroy
  - I will put under the ban
  - I will devote
  lexicon: HALOT
  rationale: חרם in the Hiphil denotes placing something under ḥerem, devoting it irrevocably to destruction. 'Devote ... to destruction' preserves the theological-ritual force better than the flatter 'destroy,' while remaining understandable.
- source_word: עָרֵיהֶם
  chosen: their cities
  alternatives:
  - their towns
  lexicon: HALOT
  rationale: עִיר commonly means 'city'; plural 'cities' is the most direct rendering and fits the military context.
