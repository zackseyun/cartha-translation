theological_decisions:
- issue: Rendering of חרם language in a warfare vow
  chosen_reading: devote their cities to destruction
  alternative_readings:
  - utterly destroy their cities
  - put their cities under the ban
  rationale: The verse describes a vow involving ḥerem, a concept with both cultic and military dimensions. The chosen rendering preserves that this is not mere battlefield killing but a formal act of devoting the conquered cities to destruction. This avoids importing later doctrinal or ethical explanations while retaining the text's gravity.
  doctrine_reference: Translation philosophy §§1, 3, 6
