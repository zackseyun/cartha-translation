id: NUM.21.7
reference: Numbers 21:7
source:
  edition: WLC
  text: וַ/יָּבֹא֩ הָ/עָ֨ם אֶל מֹשֶׁ֜ה וַ/יֹּאמְר֣וּ חָטָ֗אנוּ כִּֽי דִבַּ֤רְנוּ בַֽ/יהוָה֙ וָ/בָ֔/ךְ הִתְפַּלֵּל֙ אֶל יְהוָ֔ה וְ/יָסֵ֥ר מֵ/עָלֵ֖י/נוּ אֶת הַ/נָּחָ֑שׁ וַ/יִּתְפַּלֵּ֥ל מֹשֶׁ֖ה בְּעַ֥ד הָ/עָֽם־־־־׃
translation:
  text: Then the people came to Moses and said, “We have sinned, for we have spoken against Yahweh and against you. Pray to Yahweh, that he may take away the serpent from us.” So Moses prayed for the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the serpent.” The Hebrew noun is singular and may represent the snake plague collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא הָעָם
  chosen: Then the people came
  alternatives:
  - So the people came
  - And the people came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence. Singular verb with collective noun is idiomatic Hebrew; English renders the collective subject naturally as 'the people came.'
- source_word: חָטָאנוּ
  chosen: We have sinned
  alternatives:
  - We sinned
  lexicon: HALOT
  rationale: The perfect here expresses completed action with present relevance in confession. 'We have sinned' is idiomatic in English penitential speech and matches the force of acknowledgment.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the grounds of the confession. 'For' is slightly more natural in direct speech of confession, while preserving the causal sense.
- source_word: דִבַּרְנוּ בַיהוָה וָבָךְ
  chosen: we have spoken against the LORD and against you
  alternatives:
  - we spoke against the LORD and you
  - we have spoken against the LORD and you
  lexicon: HALOT
  rationale: With דבר plus ב, the sense here is hostile speech 'against.' Repeating 'against' in English makes explicit the parallel objects and avoids ambiguity. YHWH is rendered 'the LORD' per doctrine.
- source_word: בַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name יְהוָה is rendered 'the LORD' according to the project's stated default for YHWH.
- source_word: הִתְפַּלֵּל אֶל יְהוָה
  chosen: Pray to the LORD
  alternatives:
  - Intercede with the LORD
  - Pray to Yahweh
  lexicon: HALOT
  rationale: The hitpael of פלל commonly means 'pray/intercede.' 'Pray to the LORD' is the most direct and readable rendering here; the intercessory nuance is clear from context.
- source_word: וְיָסֵר
  chosen: that he may take away
  alternatives:
  - and let him take away
  - that he would remove
  - and he may remove
  lexicon: HALOT
  rationale: 'Following the imperative ''Pray,'' this prefixed form expresses the content/purpose of the request. English idiom prefers a subordinate clause: ''that he may take away.'''
- source_word: מֵעָלֵינוּ
  chosen: from us
  alternatives:
  - from upon us
  - away from us
  lexicon: HALOT
  rationale: The preposition literally means 'from upon us,' but in this context idiomatic English is simply 'from us,' referring to removal of the affliction.
- source_word: אֶת הַנָּחָשׁ
  chosen: the snake
  alternatives:
  - the serpent
  lexicon: HALOT
  rationale: נָחָשׁ can be rendered 'snake' or 'serpent.' 'Snake' is more accessible modern English and fits the concrete narrative context. The singular likely functions collectively for the plague of snakes, but the Hebrew is singular, so the main text preserves that form.
- source_word: וַיִּתְפַּלֵּל מֹשֶׁה בְּעַד הָעָם
  chosen: So Moses prayed for the people
  alternatives:
  - And Moses interceded for the people
  lexicon: HALOT
  rationale: בְּעַד marks intercession on behalf of someone. 'Prayed for' is clear, natural English; 'interceded' is possible but less common for the target readership.
