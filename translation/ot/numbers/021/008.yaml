id: NUM.21.8
reference: Numbers 21:8
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה עֲשֵׂ֤ה לְ/ךָ֙ שָׂרָ֔ף וְ/שִׂ֥ים אֹת֖/וֹ עַל נֵ֑ס וְ/הָיָה֙ כָּל הַ/נָּשׁ֔וּךְ וְ/רָאָ֥ה אֹת֖/וֹ וָ/חָֽי־־־׃
translation:
  text: Then Yahweh said to Moses, “Make for yourself a fiery serpent and set it on a pole, and it shall be that everyone who is bitten, when he looks at it, shall live.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seraph'; the Hebrew term can mean 'burning one' and in this context refers to the deadly serpent.
    reason: lexical_alternative
  - marker: b
    text: Or 'standard' or 'signal pole.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional reverential substitution reflected in many English translations and the LXX pattern.
- source_word: עֲשֵׂה לְךָ
  chosen: Make for yourself
  alternatives:
  - Make
  - Fashion for yourself
  lexicon: HALOT
  rationale: The imperative plus dative pronoun is naturally rendered 'make for yourself,' preserving the personal direction to Moses without overinterpreting the nuance.
- source_word: שָׂרָף
  chosen: fiery serpent
  alternatives:
  - seraph
  - burning one
  - venomous serpent
  lexicon: HALOT
  rationale: In this narrative context the term refers to the serpent associated with the deadly burning effect of the bite (cf. Num 21:6). 'Fiery serpent' preserves the lexical imagery and the connection with the earlier plague better than the more interpretive 'venomous serpent.' 'Seraph' is too opaque here for modern readers.
- source_word: נֵס
  chosen: pole
  alternatives:
  - standard
  - banner
  - signal pole
  lexicon: HALOT
  rationale: Although נֵס often denotes a standard or signal-banner, in this context it is the object on which the bronze serpent is mounted. 'Pole' communicates the concrete referent clearly in English while remaining faithful to the sense.
- source_word: הַנָּשׁוּךְ
  chosen: who is bitten
  alternatives:
  - the one bitten
  - who has been bitten
  lexicon: HALOT
  rationale: 'The passive participle with the article functions generically: ''everyone who is bitten.'' This is idiomatic English and preserves the ongoing/general condition.'
- source_word: וְרָאָה אֹתוֹ
  chosen: when he looks at it
  alternatives:
  - and looks at it
  - and sees it
  lexicon: HALOT
  rationale: The sequence expresses the condition for healing. 'Looks at it' is more contextually precise than 'sees it,' and 'when' makes the conditional/resultative flow natural in English without adding meaning beyond the Hebrew construction.
- source_word: וָחָי
  chosen: shall live
  alternatives:
  - will live
  - shall remain alive
  lexicon: HALOT
  rationale: This gives the straightforward result of the action. 'Shall live' preserves the solemnity and directness of the Hebrew.
