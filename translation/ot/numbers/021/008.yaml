theological_decisions:
- issue: Referent and imagery of שָׂרָף
  chosen_reading: Rendered as 'fiery serpent' in the main text.
  alternative_readings:
  - '''seraph'''
  - '''venomous serpent'''
  rationale: The verse concerns the making of a serpent-image in response to the plague of serpents. Translating with 'fiery serpent' preserves the lexical link to the Hebrew term and avoids importing later angelic associations of 'seraph.' 'Venomous serpent' captures the effect but is more interpretive than the source wording.
