id: NUM.21.14
reference: Numbers 21:14
source:
  edition: WLC
  text: עַל כֵּן֙ יֵֽאָמַ֔ר בְּ/סֵ֖פֶר מִלְחֲמֹ֣ת יְהוָ֑ה אֶת וָהֵ֣ב בְּ/סוּפָ֔ה וְ/אֶת הַ/נְּחָלִ֖ים אַרְנֽוֹן־־־׃
translation:
  text: Therefore it is said in the Book of the Wars of Yahweh, “Waheb in Suphah, and the wadis of the Arnon.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, “Waheb in the storm,” if Suphah is taken as a common noun rather than a place-name.
    reason: alternative_reading
  - marker: b
    text: The Hebrew of this quoted line is obscure; some understand “Waheb” differently, even as part of a verbal clause rather than a place-name.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - Thus
  lexicon: HALOT
  rationale: Idiomatic inferential formula introducing a citation or explanation; 'Therefore' is natural modern English and preserves the connective force.
- source_word: יֵאָמַר
  chosen: it is said
  alternatives:
  - one says
  - it is spoken
  lexicon: HALOT
  rationale: Niphal imperfect of אמר functions impersonally here, introducing a quotation from a source. 'It is said' is standard and clear.
- source_word: בְּסֵפֶר
  chosen: in the Book
  alternatives:
  - in a book
  - in the scroll
  lexicon: HALOT
  rationale: The construct phrase points to a known written source. 'Book' is conventional and readable; 'scroll' is possible but not required by the Hebrew.
- source_word: מִלְחֲמֹת יְהוָה
  chosen: of the Wars of the LORD
  alternatives:
  - of the LORD's Wars
  - of the battles of the LORD
  lexicon: HALOT
  rationale: Construct chain best rendered straightforwardly. 'Wars' reflects the plural noun; 'the LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת וָהֵב
  chosen: Waheb
  alternatives:
  - Vaheb
  - '[he] gave'
  lexicon: HALOT
  rationale: Here אֶת most likely marks the beginning of cited place-names or items within the quotation, and וָהֵב is best taken as a proper noun, probably a place-name. Rendering it as the transliterated name avoids forcing a conjectural verbal sense into a notoriously difficult line.
- source_word: בְּסוּפָה
  chosen: in Suphah
  alternatives:
  - in the storm
  - at Suphah
  - in Suphah region
  lexicon: HALOT
  rationale: Given the poetic citation and the obscurity of the phrase, taking סוּפָה as a place-name and transliterating it best preserves the Hebrew without over-interpreting. The common noun sense 'storm/whirlwind' remains possible and is preserved in a footnote.
- source_word: וְאֶת הַנְּחָלִים
  chosen: and the wadis
  alternatives:
  - and the valleys
  - and the streams
  - and the ravines
  lexicon: HALOT
  rationale: נחל often denotes seasonal watercourses/wadis in this geographical context. 'Wadis' is the most geographically precise English term, though less traditional than 'valleys' or 'brooks'.
- source_word: אַרְנוֹן
  chosen: the Arnon
  alternatives:
  - Arnon
  lexicon: HALOT
  rationale: Standard transliteration of the river/place name; the article is natural in English with river/wadi systems ('the Arnon').
