id: NUM.21.16
reference: Numbers 21:16
source:
  edition: WLC
  text: וּ/מִ/שָּׁ֖ם בְּאֵ֑רָ/ה הִ֣וא הַ/בְּאֵ֗ר אֲשֶׁ֨ר אָמַ֤ר יְהוָה֙ לְ/מֹשֶׁ֔ה אֱסֹף֙ אֶת הָ/עָ֔ם וְ/אֶתְּנָ֥ה לָ/הֶ֖ם מָֽיִם־׃ס
translation:
  text: And from there they went to Beer. That is the well about which Yahweh said to Moses, “Gather the people, and I will give them water.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beer is the name of the place; the Hebrew name sounds like the word for 'well.'
    reason: cultural_note
  - marker: b
    text: Or 'the well concerning which the LORD said to Moses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִשָּׁם
  chosen: And from there
  alternatives:
  - From there
  lexicon: HALOT
  rationale: 'The conjunction plus preposition/adverb naturally continues the itinerary: ''and/from there.'' Retaining ''And'' reflects the narrative sequence.'
- source_word: בְּאֵרָה
  chosen: Beer
  alternatives:
  - to Beer
  - Beerah
  lexicon: HALOT
  rationale: Treated as a place name, transliterated per translation philosophy. The directional ending indicates motion toward the place, which is expressed in English by adding 'they went to' rather than awkwardly preserving the suffix.
- source_word: הִוא הַבְּאֵר
  chosen: That is the well
  alternatives:
  - It is the well
  - this is the well
  lexicon: HALOT
  rationale: Identificational clause pointing out the significance of the place name. 'That is the well' reads naturally in English and preserves the explanatory force.
- source_word: אֲשֶׁר אָמַר יְהוָה לְמֹשֶׁה
  chosen: about which the LORD said to Moses
  alternatives:
  - of which the LORD spoke to Moses
  - concerning which the LORD said to Moses
  lexicon: HALOT
  rationale: The relative clause links the well with the divine statement that follows. 'About which' is idiomatic English for the object under discussion.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱסֹף
  chosen: Gather
  alternatives:
  - Assemble
  - Collect
  lexicon: HALOT
  rationale: Imperative to Moses to bring the people together. 'Gather' is clear, direct, and fits modern English.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: Standard rendering for עָם in this wilderness narrative context, referring to Israel collectively.
- source_word: וְאֶתְּנָה לָהֶם מָיִם
  chosen: and I will give them water
  alternatives:
  - that I may give them water
  - and let me give them water
  lexicon: HALOT
  rationale: First person cohortative following an imperative can express intended result or resolve. In direct speech here, 'and I will give them water' is the most natural optimal-equivalence rendering, preserving divine intention without overcomplicating the syntax.
