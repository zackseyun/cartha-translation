id: NUM.21.3
reference: Numbers 21:3
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֨ע יְהוָ֜ה בְּ/ק֣וֹל יִשְׂרָאֵ֗ל וַ/יִּתֵּן֙ אֶת הַֽ/כְּנַעֲנִ֔י וַ/יַּחֲרֵ֥ם אֶתְ/הֶ֖ם וְ/אֶת עָרֵי/הֶ֑ם וַ/יִּקְרָ֥א שֵׁם הַ/מָּק֖וֹם חָרְמָֽה־־־׃פ
translation:
  text: And Yahweh heard the voice of Israel and gave the Canaanites over to them, and they devoted them and their cities to destruction. So the name of the place was called Hormah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hormah sounds like the Hebrew word for 'devoted to destruction' or 'placed under the ban.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּשְׁמַע ... בְּקוֹל
  chosen: heard the voice of
  alternatives:
  - listened to
  - heard
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'heard the voice of.' Retaining 'voice' preserves the source expression while remaining natural enough in English; it conveys that the LORD responded to Israel's appeal.
- source_word: וַיִּתֵּן אֶת־הַכְּנַעֲנִי
  chosen: gave the Canaanite over to them
  alternatives:
  - delivered the Canaanites to them
  - gave the Canaanites into their hand
  lexicon: HALOT
  rationale: נתן with a hostile object commonly means to hand over or deliver into another's power. 'Gave ... over to them' is concise and faithful. The singular collective 'the Canaanite' is preserved from the Hebrew rather than smoothing fully to the plural.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanite
  alternatives:
  - the Canaanites
  - the Canaanite people
  lexicon: HALOT
  rationale: The Hebrew uses a singular ethnic term with collective force. 'The Canaanite' preserves that form while still being intelligible in English.
- source_word: וַיַּחֲרֵם
  chosen: they devoted ... to destruction
  alternatives:
  - utterly destroyed
  - put under the ban
  - devoted to destruction
  lexicon: HALOT
  rationale: חרם in the Hiphil denotes placing persons or things under ḥerem, that is, devoting them irrevocably to destruction. 'Devoted ... to destruction' preserves the technical force better than the flatter 'destroyed.' The subject is best understood as Israel from the context of the vow and the plural objects that follow.
- source_word: אֶתְהֶם וְאֶת־עָרֵיהֶם
  chosen: them and their cities
  alternatives:
  - them and their towns
  lexicon: HALOT
  rationale: A straightforward rendering of the direct objects; 'cities' is the normal gloss for עָרִים/עָרֵי in this context.
- source_word: וַיִּקְרָא שֵׁם הַמָּקוֹם
  chosen: So the name of the place was called
  alternatives:
  - and he called the name of the place
  - and they called the place
  lexicon: HALOT
  rationale: The Hebrew has a singular verb, but the subject is left implicit and may function idiomatically. An English passive avoids over-specifying whether God, Israel, or common usage is the subject, while preserving the naming-result sense.
- source_word: חָרְמָה
  chosen: Hormah
  alternatives: []
  lexicon: HALOT
  rationale: As a place name, it is transliterated per project policy. The name is etymologically linked to חרם ('devote to destruction'), which is worth preserving in a footnote.
