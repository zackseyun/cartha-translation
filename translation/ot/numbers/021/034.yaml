id: NUM.21.34
reference: Numbers 21:34
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֤ה אֶל מֹשֶׁה֙ אַל תִּירָ֣א אֹת֔/וֹ כִּ֣י בְ/יָדְ/ךָ֞ נָתַ֧תִּי אֹת֛/וֹ וְ/אֶת כָּל עַמּ֖/וֹ וְ/אֶת אַרְצ֑/וֹ וְ/עָשִׂ֣יתָ לּ֔/וֹ כַּ/אֲשֶׁ֣ר עָשִׂ֗יתָ לְ/סִיחֹן֙ מֶ֣לֶךְ הָֽ/אֱמֹרִ֔י אֲשֶׁ֥ר יוֹשֵׁ֖ב בְּ/חֶשְׁבּֽוֹן־־־־־׃
translation:
  text: And Yahweh said to Moses, “Do not fear him, for I have given him into your hand, along with all his people and his land. You shall do to him as you did to Sihon king of the Amorites, who lived in Heshbon.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not be afraid of him.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'I have given him into your hand,' an idiom meaning 'I have delivered him into your power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md, preserving the covenant name in the standard small-caps English convention.
- source_word: אַל תִּירָא
  chosen: Do not fear
  alternatives:
  - Do not be afraid of
  - Do not dread
  lexicon: HALOT
  rationale: ירא in the Qal here is a straightforward prohibition against fear. 'Do not fear him' is concise and natural while staying close to the Hebrew.
- source_word: בְיָדְךָ
  chosen: into your hand
  alternatives:
  - into your power
  - over to you
  lexicon: HALOT
  rationale: The idiom 'give into the hand' commonly denotes delivering someone into another's power. Retaining 'hand' preserves the Hebrew imagery while remaining intelligible in English.
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I give
  - I have delivered
  lexicon: HALOT
  rationale: The perfect verb presents the action as assured/completed from the speaker's perspective. English present perfect captures this well in a divine promise context.
- source_word: אֹתוֹ וְאֶת כָּל עַמּוֹ וְאֶת אַרְצוֹ
  chosen: him, along with all his people and his land
  alternatives:
  - him and all his people and his land
  - him, all his people, and his land
  lexicon: HALOT
  rationale: The Hebrew lists Og himself, his people, and his land as the objects given over. 'Along with' smooths the coordination in readable English without losing any element.
- source_word: וְעָשִׂיתָ לּוֹ
  chosen: You shall do to him
  alternatives:
  - You will do to him
  - You shall deal with him
  lexicon: HALOT
  rationale: עשה with ל can mean 'do to/deal with.' 'You shall do to him' preserves the direct comparison with the following clause and reflects the force of the prefixed conjunction plus perfect/consecutive sequence.
- source_word: כַּאֲשֶׁר עָשִׂיתָ
  chosen: as you did
  alternatives:
  - just as you did
  - as you have done
  lexicon: HALOT
  rationale: A simple comparative clause referring back to Moses/Israel's prior action against Sihon. 'As you did' is the most natural equivalent.
- source_word: לְסִיחֹן מֶלֶךְ הָאֱמֹרִי
  chosen: to Sihon king of the Amorites
  alternatives:
  - to Sihon, the Amorite king
  rationale: Standard rendering of the proper name and title. 'King of the Amorites' follows the Hebrew construct chain closely.
- source_word: אֲשֶׁר יוֹשֵׁב בְּחֶשְׁבּוֹן
  chosen: who lived in Heshbon
  alternatives:
  - who dwelt in Heshbon
  - who was living in Heshbon
  lexicon: HALOT
  rationale: The participle ישב can denote residence or dwelling. 'Lived in Heshbon' is idiomatic modern English and adequately reflects the participial description.
