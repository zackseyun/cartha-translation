id: NUM.21.6
reference: Numbers 21:6
source:
  edition: WLC
  text: וַ/יְשַׁלַּ֨ח יְהוָ֜ה בָּ/עָ֗ם אֵ֚ת הַ/נְּחָשִׁ֣ים הַ/שְּׂרָפִ֔ים וַֽ/יְנַשְּׁכ֖וּ אֶת הָ/עָ֑ם וַ/יָּ֥מָת עַם רָ֖ב מִ/יִּשְׂרָאֵֽל־־׃
translation:
  text: So Yahweh sent among the people the fiery serpents, and they bit the people, and many from Israel died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'venomous snakes' or 'burning serpents.' The Hebrew literally reads 'the serpents, the fiery ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלַּח
  chosen: sent
  alternatives:
  - released
  - let loose
  lexicon: HALOT
  rationale: The verb שׁלח in the waw-consecutive narrative form straightforwardly means 'sent.' 'Sent' is the most natural and direct English rendering in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בָּעָם
  chosen: among the people
  alternatives:
  - against the people
  - into the people
  lexicon: HALOT
  rationale: The preposition ב with עם here is best rendered locatively as 'among the people,' indicating where the serpents were sent. 'Against the people' is interpretive and less directly tied to the preposition.
- source_word: הַנְּחָשִׁים הַשְּׂרָפִים
  chosen: the fiery serpents
  alternatives:
  - the venomous snakes
  - the burning serpents
  lexicon: HALOT
  rationale: נחשים are 'serpents/snakes.' שׂרפים here likely describes the burning effect of the bite, hence 'fiery.' 'Fiery serpents' preserves the Hebrew imagery and traditional lexical force better than the more interpretive 'venomous snakes.'
- source_word: וַיְנַשְּׁכוּ
  chosen: they bit
  alternatives:
  - they struck
  - they attacked by biting
  lexicon: HALOT
  rationale: The verb נשׁך means 'to bite.' The simple past 'they bit' matches the narrative sequence.
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - perished
  lexicon: HALOT
  rationale: מות is the standard verb 'to die.' 'Died' is the clearest and least interpretive rendering.
- source_word: עַם רָב
  chosen: many people
  alternatives:
  - a great many people
  - many of the people
  lexicon: HALOT
  rationale: The phrase literally means 'much/many people' or 'a numerous people [group].' In idiomatic English within this clause, 'many people' communicates the sense naturally.
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - of Israel
  - from among Israel
  lexicon: HALOT
  rationale: The preposition מן is retained with 'from,' yielding 'from Israel.' This preserves the Hebrew wording while remaining natural in English.
