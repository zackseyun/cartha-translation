theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gender representation in legal address
  chosen_reading: Retain both 'a man or a woman' and use a singular masculine pronoun in the final infinitive clause
  alternative_readings:
  - Use 'anyone' and 'themselves'
  - Repeat 'such a person'
  rationale: The Hebrew explicitly includes both sexes, so that inclusion is preserved. The final verb phrase is rendered with a singular masculine pronoun as a natural English representative singular tied to the Hebrew grammar, while the prior phrase already makes clear that both men and women are in view.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
