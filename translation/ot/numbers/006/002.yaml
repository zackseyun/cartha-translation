id: NUM.6.2
reference: Numbers 6:2
source:
  edition: WLC
  text: דַּבֵּר֙ אֶל בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/אָמַרְתָּ֖ אֲלֵ/הֶ֑ם אִ֣ישׁ אֽוֹ אִשָּׁ֗ה כִּ֤י יַפְלִא֙ לִ/נְדֹּר֙ נֶ֣דֶר נָזִ֔יר לְ/הַזִּ֖יר לַֽ/יהוָֽה־־׃
translation:
  text: 'Speak to the sons of Israel and say to them: When a man or a woman makes a special vow, the vow of a Nazirite, to dedicate himself to Yahweh,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if a man or a woman sets himself or herself apart by vowing a Nazirite vow.'
    reason: lexical_alternative
  - marker: b
    text: '''Nazirite'' refers to a person specially set apart to the LORD under a vow.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Rendered formally as 'the sons of Israel' to preserve the Hebrew idiom and the gender-accurate policy. 'Israelites' is smoother English but loses the explicit familial idiom; 'children of Israel' is traditional but less natural in modern English.
- source_word: אִישׁ אוֹ אִשָּׁה
  chosen: a man or a woman
  alternatives:
  - anyone
  - a man or woman
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sexes, so the translation preserves that wording rather than collapsing it into the gender-neutral 'anyone.' This also fits the verse's legal inclusiveness.
- source_word: כִּי
  chosen: when
  alternatives:
  - if
  lexicon: HALOT
  rationale: In this legal instruction context, כִּי introducing a case law scenario is naturally rendered 'when,' though 'if' is possible. 'When' reads more idiomatically in English law-style discourse without changing the conditional sense.
- source_word: יַפְלִא
  chosen: makes a special vow
  alternatives:
  - separates himself by a vow
  - utters an extraordinary vow
  - makes a remarkable vow
  lexicon: HALOT
  rationale: The Hiphil of פלא here conveys doing something exceptional or special in relation to vowing. Because the infinitive and noun for vowing immediately follow, the sense is best carried idiomatically as 'makes a special vow' rather than a wooden 'does something extraordinary to vow.'
- source_word: לִנְדֹּר נֶדֶר
  chosen: vow
  alternatives:
  - make a vow
  - take a vow
  lexicon: HALOT
  rationale: The infinitive plus cognate noun intensifies the act of vowing. In English, this is best represented by 'makes a special vow, the vow of a Nazirite,' preserving both the verbal action and the formal noun.
- source_word: נֶדֶר נָזִיר
  chosen: the vow of a Nazirite
  alternatives:
  - a Nazirite vow
  - the vow of a Nazarite
  lexicon: HALOT
  rationale: This preserves the construct relationship explicitly. 'Nazirite' is the standard transliteration for the consecrated person under this vow; 'Nazirite vow' is possible but slightly compresses the Hebrew structure.
- source_word: נָזִיר
  chosen: Nazirite
  alternatives:
  - Nazarite
  - one consecrated
  lexicon: HALOT
  rationale: '''Nazirite'' is the conventional and recognizable transliteration for this technical term in Numbers 6. Translating it as ''one consecrated'' would blur the specific institution established here.'
- source_word: לְהַזִּיר
  chosen: to dedicate himself
  alternatives:
  - to separate himself
  - to consecrate himself
  lexicon: HALOT
  rationale: The verb denotes separating or dedicating oneself in a consecratory sense. 'Dedicate himself' communicates the purpose clearly in modern English, while the following context of abstentions will make the separation aspect explicit. The masculine pronoun reflects the default singular grammar, though the preceding 'a man or a woman' shows the law applies to either sex.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD.' This follows the project's stated policy and preserves the covenant name's reverential convention.
