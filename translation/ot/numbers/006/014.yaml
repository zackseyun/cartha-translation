theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering חַטָּאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The Hebrew term can be understood functionally as a purification offering in priestly texts, but the immediate construction here lists standard sacrifice types. 'Sin offering' is retained in the main text for clarity and continuity, while the alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
