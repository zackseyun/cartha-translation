id: NUM.6.14
reference: Numbers 6:14
source:
  edition: WLC
  text: וְ/הִקְרִ֣יב אֶת קָרְבָּנ֣/וֹ לַ/יהוָ֡ה כֶּבֶשׂ֩ בֶּן שְׁנָת֨/וֹ תָמִ֤ים אֶחָד֙ לְ/עֹלָ֔ה וְ/כַבְשָׂ֨ה אַחַ֧ת בַּת שְׁנָתָ֛/הּ תְּמִימָ֖ה לְ/חַטָּ֑את וְ/אַֽיִל אֶחָ֥ד תָּמִ֖ים לִ/שְׁלָמִֽים־־־־׃
translation:
  text: 'And he shall present his offering to Yahweh: one male lamb a year old without blemish for a burnt offering, and one ewe lamb a year old without blemish for a sin offering, and one ram without blemish for peace offerings,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "purification offering" for "sin offering." The Hebrew term חַטָּאת can denote both sin and the sacrifice associated with purification from impurity or offense.
    reason: alternative_reading
  - marker: b
    text: Or "offerings of well-being" or "fellowship offerings" for "peace offerings."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  chosen: and he shall present
  alternatives:
  - and he shall bring near
  - and he shall offer
  lexicon: HALOT
  rationale: Hiphil of קרב in sacrificial context means to bring/present an offering. 'Present' is natural modern English and preserves the ritual sense without over-paraphrase. The prefixed waw continues the procedure, and the imperfect is rendered with 'shall' for instruction/legal style.
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his gift
  - his قربן/offering
  lexicon: HALOT
  rationale: Refers broadly to the sacrificial gift brought near. 'Offering' is the standard and clearest English equivalent in cultic context.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: כֶּבֶשׂ ... בֶּן שְׁנָתוֹ
  chosen: one year-old male lamb
  alternatives:
  - one male lamb a year old
  - one lamb in its first year
  lexicon: HALOT
  rationale: כֶּבֶשׂ is a male lamb; בֶּן שְׁנָתוֹ idiomatically indicates a year-old animal. 'Male lamb' makes the sex distinction explicit, which matters because the next animal is female.
- source_word: תָמִים
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: In sacrificial legislation, תמים denotes an animal free from defect. 'Without blemish' is the established and precise cultic rendering.
- source_word: לְעֹלָה
  chosen: for a burnt offering
  alternatives:
  - as a burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard sacrificial category 'burnt offering.' 'For' fits the Hebrew preposition and English sacrificial idiom.
- source_word: וְכַבְשָׂה ... בַּת שְׁנָתָהּ
  chosen: and one year-old ewe lamb
  alternatives:
  - and one female lamb a year old
  - and one ewe lamb in its first year
  lexicon: HALOT
  rationale: כַבְשָׂה is specifically a female lamb. 'Ewe lamb' preserves the sex distinction and reads naturally. בַּת שְׁנָתָהּ is the feminine counterpart to 'a year old.'
- source_word: תְּמִימָה
  chosen: without blemish
  alternatives:
  - unblemished
  - perfect
  lexicon: HALOT
  rationale: Feminine form of the same adjective; rendered consistently with the masculine occurrence.
- source_word: לְחַטָּאת
  chosen: for a sin offering
  alternatives:
  - as a sin offering
  - for purification offering
  lexicon: HALOT
  rationale: חטאת can denote either sin or sin offering, and in priestly sacrificial contexts specifically the offering. 'Sin offering' is the most recognizable and direct rendering; 'purification offering' is a possible interpretive alternative but is not required by the immediate syntax.
- source_word: וְאַיִל אֶחָד
  chosen: and one ram
  alternatives:
  - and a single ram
  lexicon: HALOT
  rationale: אַיִל is specifically a ram, not a generic sheep. 'One ram' preserves the counting structure of the verse.
- source_word: לִשְׁלָמִים
  chosen: for peace offerings
  alternatives:
  - for fellowship offerings
  - for offerings of well-being
  lexicon: HALOT
  rationale: שְׁלָמִים is the standard sacrificial category often rendered 'peace offerings.' Although 'fellowship offerings' or 'offerings of well-being' capture aspects of the term, 'peace offerings' remains concise, recognizable, and sufficiently broad.
