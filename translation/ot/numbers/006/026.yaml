id: NUM.6.26
reference: Numbers 6:26
source:
  edition: WLC
  text: יִשָּׂ֨א יְהוָ֤ה פָּנָי/ו֙ אֵלֶ֔י/ךָ וְ/יָשֵׂ֥ם לְ/ךָ֖ שָׁלֽוֹם׀׃ס
translation:
  text: May Yahweh lift up his face toward you and give you peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'peace' (shalom) can also carry the sense of wholeness or well-being.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׂא
  chosen: lift up
  alternatives:
  - raise
  - turn toward favorably
  lexicon: HALOT
  rationale: The verb נשׂא literally means 'lift, carry, raise.' In this blessing, with 'face' as object, the idiom conveys favorable attention. 'Lift up' preserves the Hebrew imagery while remaining natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: פָּנָיו
  chosen: his face
  alternatives:
  - his countenance
  - his presence
  lexicon: HALOT
  rationale: פנים literally means 'face.' 'His face' keeps the concrete metaphor of divine favor. 'Countenance' is traditional but archaic; 'presence' is interpretive and less precise.
- source_word: אֵלֶיךָ
  chosen: toward you
  alternatives:
  - upon you
  - to you
  lexicon: HALOT
  rationale: The preposition אל commonly means 'to, toward.' With the idiom 'lift up his face,' 'toward you' best reflects directional sense without importing the more traditional but less literal 'upon you.'
- source_word: וְיָשֵׂם
  chosen: and give
  alternatives:
  - and set
  - and place
  lexicon: HALOT
  rationale: The verb שׂים literally means 'set, place, put.' In the collocation 'set/place for you peace,' idiomatic English is 'give you peace.' This is an optimal-equivalence rendering that conveys the result clearly.
- source_word: לְךָ
  chosen: you
  alternatives:
  - for you
  - to you
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object/beneficiary. In English, 'give you peace' naturally incorporates this sense.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: שָׁלוֹם has a broad semantic range including peace, wholeness, and well-being. 'Peace' is the standard and contextually fitting rendering in a blessing formula, while the fuller sense can be noted in a footnote.
