theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Preserving the anthropomorphic idiom 'lift up his face'
  chosen_reading: Retain the face-language rather than replacing it with an abstract paraphrase such as 'show you favor.'
  alternative_readings:
  - show you favor
  - look on you with favor
  rationale: The Hebrew blessing uses embodied imagery for divine favor. Preserving the metaphor maintains the text's theological and literary texture without denying its idiomatic force.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve original-language primacy; preserve theological tension rather than over-resolve'
