theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of יִשְׁתֶּה in the final clause
  chosen_reading: may drink wine
  alternative_readings:
  - shall drink wine
  rationale: The context concerns the lifting of the Nazirite's prior prohibition after the completion of the rite. Rendering as permission preserves the legal sense without implying a required act.
