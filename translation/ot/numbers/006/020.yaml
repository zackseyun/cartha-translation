id: NUM.6.20
reference: Numbers 6:20
source:
  edition: WLC
  text: וְ/הֵנִיף֩ אוֹתָ֨/ם הַ/כֹּהֵ֥ן תְּנוּפָה֮ לִ/פְנֵ֣י יְהוָה֒ קֹ֤דֶשׁ הוּא֙ לַ/כֹּהֵ֔ן עַ֚ל חֲזֵ֣ה הַ/תְּנוּפָ֔ה וְ/עַ֖ל שׁ֣וֹק הַ/תְּרוּמָ֑ה וְ/אַחַ֛ר יִשְׁתֶּ֥ה הַ/נָּזִ֖יר יָֽיִן׀׃
translation:
  text: The priest shall wave them as a wave offering before Yahweh. It is holy for the priest, besides the breast of the wave offering and the thigh of the contribution offering. Afterward the Nazirite may drink wine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the thigh of the heave offering.' The traditional term 'heave offering' renders תְּרוּמָה, but 'contribution offering' is clearer in contemporary English while preserving the sense of a portion set apart and presented.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the Nazirite shall drink wine.' The Hebrew form can be rendered more literally this way, but the context indicates restored permission after the vow's completion.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהֵנִיף
  chosen: shall wave
  alternatives:
  - shall present as a wave offering
  - shall elevate
  lexicon: HALOT
  rationale: The Hiphil of נוּף in sacrificial contexts denotes the ritual act of waving/presenting before YHWH. 'Shall wave' is the standard and clearest English rendering in cultic law.
- source_word: אֹתָם
  chosen: them
  alternatives:
  - these things
  lexicon: HALOT
  rationale: Refers back to the boiled shoulder, unleavened cake, and wafer in the preceding verse. 'Them' is natural English and preserves the anaphoric reference.
- source_word: תְּנוּפָה
  chosen: as a wave offering
  alternatives:
  - for a wave offering
  - as a presentation offering
  lexicon: HALOT
  rationale: Though literally the noun is 'wave offering,' in English the idiom 'wave them as a wave offering' best captures the ritual designation without obscuring the Hebrew cognate construction.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard covenantal/cultic expression. Per doctrine, יְהוָה is rendered 'the LORD.' 'Before' is sufficiently clear and formally close.
- source_word: קֹדֶשׁ הוּא לַכֹּהֵן
  chosen: It is holy for the priest
  alternatives:
  - They are holy for the priest
  - It belongs as a holy portion to the priest
  lexicon: HALOT
  rationale: The Hebrew uses singular predicate language with הוּא. 'It is holy for the priest' preserves the syntax while conveying that this waved portion is consecrated for priestly use. English singular collective reference is acceptable here.
- source_word: עַל
  chosen: in addition to
  alternatives:
  - besides
  - along with
  - over and above
  lexicon: HALOT
  rationale: In this distribution formula, עַל indicates addition to portions already assigned to the priest, not physical position. 'In addition to' makes the legal sense explicit in modern English.
- source_word: חֲזֵה הַתְּנוּפָה
  chosen: the breast of the wave offering
  alternatives:
  - the waved breast
  lexicon: HALOT
  rationale: A technical sacrificial portion. This rendering is transparent and keeps the cultic terminology recognizable.
- source_word: שׁוֹק הַתְּרוּמָה
  chosen: the thigh of the contribution offering
  alternatives:
  - the thigh of the heave offering
  - the leg of the contribution offering
  lexicon: HALOT
  rationale: שׁוֹק is anatomically the upper leg/thigh portion. תְּרוּמָה in sacrificial law is an elevated contribution; 'contribution offering' is clearer for modern readers than the traditional but opaque 'heave offering.'
- source_word: וְאַחַר
  chosen: Afterward
  alternatives:
  - and afterward
  - after that
  lexicon: HALOT
  rationale: Marks temporal sequence after completion of the rite. 'Afterward' is concise and natural.
- source_word: יִשְׁתֶּה
  chosen: may drink
  alternatives:
  - shall drink
  - is permitted to drink
  lexicon: HALOT
  rationale: The imperfect here states what is allowed following the completion of the Nazirite ritual. 'May drink' best conveys restored permission rather than a command to drink.
- source_word: הַנָּזִיר
  chosen: the Nazirite
  alternatives:
  - the one under the Nazirite vow
  lexicon: HALOT
  rationale: Standard English rendering for נָזִיר in Numbers 6. It is concise and widely understood in biblical context.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Direct lexical equivalent.
