  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to foreground 'holy' or a more explanatory term
  chosen_reading: he shall be holy
  alternative_readings:
  - he shall be consecrated
  - he shall be set apart
  rationale: The Hebrew explicitly uses קדוש, a theologically significant term. Preserving 'holy' maintains lexical transparency and theological weight, while the surrounding context already explains the mode of consecration.
