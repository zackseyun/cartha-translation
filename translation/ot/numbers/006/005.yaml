id: NUM.6.5
reference: Numbers 6:5
source:
  edition: WLC
  text: כָּל יְמֵי֙ נֶ֣דֶר נִזְר֔/וֹ תַּ֖עַר לֹא יַעֲבֹ֣ר עַל רֹאשׁ֑/וֹ עַד מְלֹ֨את הַ/יָּמִ֜ם אֲשֶׁר יַזִּ֤יר לַ/יהוָה֙ קָדֹ֣שׁ יִהְיֶ֔ה גַּדֵּ֥ל פֶּ֖רַע שְׂעַ֥ר רֹאשֽׁ/וֹ־־־־־׃
translation:
  text: All the days of his Nazirite vow, no razor shall pass over his head. Until the days are completed for which he separates himself to Yahweh, he shall be holy; he shall let the locks of the hair of his head grow long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his vow of separation.' The Hebrew wording behind 'Nazirite' is built on the idea of separation/consecration.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'no razor shall pass over his head,' an idiom meaning he must not shave it.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶדֶר נִזְרוֹ
  chosen: his Nazirite vow
  alternatives:
  - his vow of separation
  - the vow of his Naziriteship
  lexicon: HALOT
  rationale: The phrase combines נֶדֶר ('vow') with נֵזֶר/נִזְרוֹ from the Nazirite root. 'Nazirite vow' is the clearest idiomatic English rendering in this legal context and preserves the technical status of the vow from the surrounding passage.
- source_word: תַּעַר לֹא יַעֲבֹר עַל רֹאשׁוֹ
  chosen: no razor shall pass over his head
  alternatives:
  - no razor shall come upon his head
  - he shall not shave his head
  lexicon: HALOT
  rationale: This is a conventional Hebrew idiom expressed literally with תער ('razor') and עבר על ('pass over'). The chosen rendering stays close to the Hebrew while remaining natural English. 'He shall not shave' is interpretive and less formally tied to the image of the razor passing over the head.
- source_word: עַד מְלֹאת הַיָּמִים
  chosen: Until the days are completed
  alternatives:
  - until the fulfillment of the days
  - until the time is fulfilled
  lexicon: HALOT
  rationale: מְלֹאת from מלא conveys completion/fullness. 'The days are completed' is natural modern English and preserves the temporal-legal force of the phrase.
- source_word: אֲשֶׁר יַזִּיר לַיהוָה
  chosen: for which he separates himself to the LORD
  alternatives:
  - during which he dedicates himself to the LORD
  - which he sets apart to the LORD
  lexicon: HALOT
  rationale: The Hiphil of נזר here denotes entering/securing a state of separation or consecration in relation to YHWH. 'Separates himself to the LORD' best preserves the root idea behind 'Nazirite' and avoids importing a stronger cultic term than the Hebrew itself requires.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ל here can be represented as 'to' in the sense of dedication/separation directed toward the LORD.
- source_word: קָדֹשׁ יִהְיֶה
  chosen: he shall be holy
  alternatives:
  - he shall be consecrated
  - he shall be set apart
  lexicon: HALOT
  rationale: קדוש fundamentally means 'holy.' While 'consecrated' or 'set apart' are contextually related, the main text should preserve the theological term 'holy' unless clarity demands otherwise.
- source_word: גַּדֵּל פֶּרַע שְׂעַר רֹאשׁוֹ
  chosen: he shall let the hair of his head grow long
  alternatives:
  - he shall grow the untrimmed locks of his head
  - he shall let the locks of the hair of his head grow
  lexicon: HALOT
  rationale: גַּדֵּל is permissive/causative in context ('let grow'), and פֶּרַע refers to loose/untrimmed growth of hair. 'Let the hair of his head grow long' communicates the legal requirement clearly in modern English without overloading the line with awkward literalism.
