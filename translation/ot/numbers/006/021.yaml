id: NUM.6.21
reference: Numbers 6:21
source:
  edition: WLC
  text: זֹ֣את תּוֹרַ֣ת הַ/נָּזִיר֮ אֲשֶׁ֣ר יִדֹּר֒ קָרְבָּנ֤/וֹ לַֽ/יהוָה֙ עַל נִזְר֔/וֹ מִ/לְּ/בַ֖ד אֲשֶׁר תַּשִּׂ֣יג יָד֑/וֹ כְּ/פִ֤י נִדְר/וֹ֙ אֲשֶׁ֣ר יִדֹּ֔ר כֵּ֣ן יַעֲשֶׂ֔ה עַ֖ל תּוֹרַ֥ת נִזְרֽ/וֹ־־׃פ
translation:
  text: This is the law of the Nazirite who vows his offering to Yahweh for his Nazirite vow, besides what his hand can afford. According to the vow that he vows, so he shall do, according to the law of his Nazirite vow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'besides what he can afford'; literally, 'besides what his hand can reach.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרַת
  chosen: the law of
  alternatives:
  - the instruction for
  - the regulation of
  lexicon: HALOT
  rationale: תּוֹרָה here introduces the prescribed rule or legal procedure governing the Nazirite case. 'Law' is concise and idiomatic in this legal context, while alternatives like 'instruction' or 'regulation' are possible but less traditional in this formulaic setting.
- source_word: הַנָּזִיר
  chosen: the Nazirite
  alternatives:
  - the one consecrated
  - the dedicated one
  lexicon: HALOT
  rationale: נָזִיר is the established term for one under the special consecration/vow described in this chapter. Transliteration preserves the technical status of the term better than a paraphrase.
- source_word: אֲשֶׁר יִדֹּר
  chosen: who vows
  alternatives:
  - who makes a vow
  - who shall vow
  lexicon: HALOT
  rationale: The relative clause identifies the Nazirite as one who makes this vow. 'Who vows' is natural English and preserves the verbal force without overcomplicating the syntax.
- source_word: קָרְבָּנוֹ
  chosen: his offering
  alternatives:
  - his gift offering
  - his oblation
  lexicon: HALOT
  rationale: קָרְבָּן is a general term for an offering brought near to God. 'Offering' is the clearest modern equivalent here.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ל marks direction/dedication; 'to the LORD' fits the act of presenting an offering.
- source_word: עַל נִזְרוֹ
  chosen: for his Nazirite vow
  alternatives:
  - for his consecration
  - concerning his separation
  lexicon: HALOT
  rationale: נֵזֶר in this chapter refers to the state/vow of Nazirite separation-consecration. 'Nazirite vow' makes the referent explicit in English and matches the chapter's subject matter.
- source_word: מִלְּבַד אֲשֶׁר תַּשִּׂיג יָדוֹ
  chosen: besides what his hand can afford
  alternatives:
  - besides what he can obtain
  - apart from what his means can reach
  lexicon: HALOT
  rationale: This idiom refers to a person's financial means or ability to provide. 'What his hand can afford' preserves the Hebrew imagery while remaining understandable in English.
- source_word: כְּפִי נִדְרוֹ
  chosen: According to the vow
  alternatives:
  - In keeping with his vow
  - As his vow requires
  lexicon: HALOT
  rationale: כְּפִי means 'according to/in proportion to,' and with נֶדֶר it indicates conformity to the content of the vow. 'According to the vow' is straightforward and formal enough for legal style.
- source_word: אֲשֶׁר יִדֹּר
  chosen: that he vows
  alternatives:
  - that he makes
  - which he has vowed
  lexicon: HALOT
  rationale: The repetition of the vow language is retained rather than smoothed away, since the Hebrew intentionally reiterates the binding nature of the vow.
- source_word: כֵּן יַעֲשֶׂה
  chosen: so he shall do
  alternatives:
  - thus he shall do
  - so must he do
  lexicon: HALOT
  rationale: This legal formula expresses obligation corresponding to the vow. 'So he shall do' preserves the formal cadence and normative force.
- source_word: עַל תּוֹרַת נִזְרוֹ
  chosen: according to the law of his Nazirite vow
  alternatives:
  - concerning the law of his consecration
  - with respect to the regulation of his Nazirite status
  lexicon: HALOT
  rationale: The closing phrase ties the required action back to the governing rule for the Nazirite vow. Rendering both תּוֹרָה and נֵזֶר consistently helps the legal structure of the verse remain visible.
