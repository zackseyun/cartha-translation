id: NUM.6.25
reference: Numbers 6:25
source:
  edition: WLC
  text: יָאֵ֨ר יְהוָ֧ה פָּנָ֛י/ו אֵלֶ֖י/ךָ וִֽ/יחֻנֶּֽ/ךָּ׀׃ס
translation:
  text: May Yahweh make his face shine upon you and be gracious to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'May Yahweh make his face shine toward you and show you favor.'
    reason: alternative_reading
lexical_decisions:
- source_word: יָאֵר
  chosen: may ... make ... shine
  alternatives:
  - shine
  - cause to shine
  lexicon: HALOT
  rationale: Hiphil jussive of אוֹר expresses a wish/blessing that YHWH would cause light to shine. In English, 'May the LORD make his face shine' preserves both the volitional force and the causative nuance more clearly than a bare 'shine.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: פָּנָיו
  chosen: his face
  alternatives:
  - his presence
  - his countenance
  lexicon: HALOT
  rationale: Literally 'his face.' While the idiom conveys favorable presence, the concrete image should be preserved in the main text. 'Countenance' is too archaic for the stated readability goals; 'presence' interprets rather than translates.
- source_word: אֵלֶיךָ
  chosen: on you
  alternatives:
  - toward you
  - upon you
  lexicon: HALOT
  rationale: The preposition אֶל is basically 'to/toward,' but in English the idiom 'make his face shine on you' is natural and accurately conveys beneficent direction. 'Toward you' is possible but less idiomatic here.
- source_word: וִיחֻנֶּךָּ
  chosen: and be gracious to you
  alternatives:
  - and show you favor
  - and have mercy on you
  lexicon: HALOT
  rationale: From חנן, meaning to show favor or be gracious. 'Be gracious to you' is the most established and semantically fitting rendering in a blessing context. 'Have mercy' can overemphasize pity; 'show you favor' is acceptable but slightly flatter in liturgical tone.
