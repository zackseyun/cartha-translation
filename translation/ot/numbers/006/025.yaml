theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Anthropomorphic idiom 'his face shine'
  chosen_reading: Preserve the idiom literally in the main text
  alternative_readings:
  - let his presence shine on you
  - look favorably on you
  rationale: The Hebrew blessing uses embodied imagery for divine favor. Preserving the idiom maintains the theological-poetic texture without forcing a reduction to abstract interpretation. The favorable sense is clear in context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s plain sense; do not paraphrase beyond what the source warrants'
