id: NUM.6.24
reference: Numbers 6:24
source:
  edition: WLC
  text: יְבָרֶכְ/ךָ֥ יְהוָ֖ה וְ/יִשְׁמְרֶֽ/ךָ׃ס
translation:
  text: May Yahweh bless you and keep you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יְבָרֶכְךָ
  chosen: May ... bless you
  alternatives:
  - will bless you
  - bless you
  lexicon: HALOT
  rationale: Piel jussive 3ms of ברך with 2ms suffix in a benedictory context; English 'May ... bless you' best conveys the volitive/jussive force of the priestly blessing without sounding like a bare imperative or simple future.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְיִשְׁמְרֶךָ
  chosen: and keep you
  alternatives:
  - and guard you
  - and watch over you
  lexicon: HALOT
  rationale: Qal jussive 3ms of שמר with 2ms suffix. 'Keep you' is the most natural and traditional English equivalent here, preserving the compact poetic parallelism and the sense of protective preservation; 'guard' and 'watch over' are possible but less fitting to the blessing's cadence.
