theological_decisions:
- issue: Rendering the Nazirite terminology without over-specifying the noun
  chosen_reading: his separation
  alternative_readings:
  - his Nazirite vow
  - his consecration
  rationale: The Hebrew noun here is tied to the Nazirite institution but more literally denotes the state/period of separation. Rendering it as 'his separation' preserves the lexical sense while the surrounding context in Numbers 6 identifies the Nazirite framework. This avoids adding 'vow' in the main text where that specific noun is not present.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for YHWH, following Jewish reverence tradition and the LXX pattern.
