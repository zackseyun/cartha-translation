id: NUM.6.6
reference: Numbers 6:6
source:
  edition: WLC
  text: כָּל יְמֵ֥י הַזִּיר֖/וֹ לַ/יהוָ֑ה עַל נֶ֥פֶשׁ מֵ֖ת לֹ֥א יָבֹֽא־־׃
translation:
  text: All the days of his separation to Yahweh, he shall not go near a dead body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "his Nazirite vow" or "his consecration." The Hebrew term refers to the state or period of being set apart as a Nazirite.
    reason: lexical_alternative
  - marker: b
    text: Literally, "a dead nephesh"; that is, a human corpse or dead body.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: Quantifier introducing the total duration of the vow period; 'All' is natural English and preserves the comprehensive force.
- source_word: יְמֵי
  chosen: the days of
  alternatives:
  - during the days of
  lexicon: HALOT
  rationale: Construct form of 'days' governing the following noun phrase; rendered straightforwardly as a temporal expression.
- source_word: הַזִּירוֹ
  chosen: his separation
  alternatives:
  - his Nazirite vow
  - his consecration
  lexicon: HALOT
  rationale: From the Nazirite/separation root נזר. 'His separation' stays close to the Hebrew and avoids importing 'vow' where the noun here more directly denotes the state/period of separation. 'Consecration' is possible but less specific to the Nazirite context.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition marks dedication belonging/directing to YHWH. 'To the LORD' is idiomatic and preserves the dedicatory sense. Per doctrine, יהוה is rendered 'the LORD'.
- source_word: עַל
  chosen: near
  alternatives:
  - upon
  - over
  - toward
  lexicon: HALOT
  rationale: In the idiom עַל נֶפֶשׁ מֵת with בוא, the sense is approaching/contact in relation to a corpse. English 'go near' best captures the prohibition idiomatically.
- source_word: נֶפֶשׁ מֵת
  chosen: a dead body
  alternatives:
  - a dead person
  - a corpse
  lexicon: HALOT
  rationale: Literally 'a dead נפשׁ,' but in purity-law context this idiom refers to a human corpse. 'Dead body' is clear, natural, and contextually precise.
- source_word: לֹא יָבֹא
  chosen: he shall not go near
  alternatives:
  - he must not come near
  - he shall not come to
  lexicon: HALOT
  rationale: Imperfect with negation in legal instruction expresses prohibition. 'He shall not go near' is idiomatic legal English and matches the corpse-contact context.
