id: NUM.6.8
reference: Numbers 6:8
source:
  edition: WLC
  text: כֹּ֖ל יְמֵ֣י נִזְר֑/וֹ קָדֹ֥שׁ ה֖וּא לַֽ/יהוָֽה׃
translation:
  text: All the days of his separation he is holy to Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his Nazirite vow' or 'his consecration.' The Hebrew term refers to the state of being set apart as a Nazirite.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  chosen: All
  alternatives:
  - Every
  lexicon: HALOT
  rationale: The quantifier governs the full phrase 'the days of his separation.' 'All' is natural English and preserves the comprehensive force.
- source_word: יְמֵי
  chosen: the days of
  alternatives:
  - during the days of
  lexicon: HALOT
  rationale: Construct plural of 'days' introducing a temporal span. 'The days of' is the most direct and idiomatic rendering in English.
- source_word: נִזְרוֹ
  chosen: his separation
  alternatives:
  - his Nazirite vow
  - his consecration
  lexicon: HALOT
  rationale: From נֵזֶר, here referring to the state/status of Nazirite separation rather than the vow formula itself. 'His separation' best matches the immediate context of the Nazirite's set-apart period without importing extra wording. 'His Nazirite vow' is interpretive and broader; 'his consecration' is possible but overlaps semantically with the following 'holy.'
- source_word: קָדֹשׁ
  chosen: holy
  alternatives:
  - set apart
  - consecrated
  lexicon: HALOT
  rationale: The adjective denotes holiness/set-apartness. 'Holy' preserves the covenantal and theological weight of the Hebrew and avoids flattening it into a merely functional phrase.
- source_word: הוּא
  chosen: he is
  alternatives:
  - he
  - he remains
  lexicon: HALOT
  rationale: The independent pronoun functions as the subject with an implied copula in Hebrew. English requires 'he is' for a complete clause.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  - belonging to the LORD
  lexicon: HALOT
  rationale: The preposition ל marks relation/dedication here. 'To the LORD' is concise and idiomatic. Per doctrine, יהוה is rendered 'the LORD' rather than 'Yahweh' or 'Jehovah'.
