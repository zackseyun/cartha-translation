- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering נִזְרוֹ in Nazirite legislation
  chosen_reading: his separation
  alternative_readings:
  - his Nazirite vow
  - his consecration
  rationale: The verse emphasizes the duration of the Nazirite's separated status. 'His separation' preserves the lexical sense of נזר in this context and avoids over-specifying the term as the vow itself. This also keeps the theological distinction between the state of separation and the resulting holiness to the LORD.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological weight without paraphrase'
