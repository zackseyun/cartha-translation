id: NUM.6.17
reference: Numbers 6:17
source:
  edition: WLC
  text: וְ/אֶת הָ/אַ֜יִל יַעֲשֶׂ֨ה זֶ֤בַח שְׁלָמִים֙ לַֽ/יהוָ֔ה עַ֖ל סַ֣ל הַ/מַּצּ֑וֹת וְ/עָשָׂה֙ הַ/כֹּהֵ֔ן אֶת מִנְחָת֖/וֹ וְ/אֶת נִסְכּֽ/וֹ־־־׃
translation:
  text: And he shall offer the ram as a sacrifice of peace offerings to Yahweh, with the basket of unleavened bread; and the priest shall offer its grain offering and its drink offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a sacrifice of fellowship offerings.' The Hebrew שְׁלָמִים can be rendered 'peace offerings' or 'fellowship offerings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאַיִל
  chosen: the ram
  alternatives:
  - the male sheep
  lexicon: HALOT
  rationale: אַיִל commonly denotes a ram in sacrificial contexts. 'Ram' is the natural and specific English equivalent here.
- source_word: יַעֲשֶׂה
  chosen: he shall offer
  alternatives:
  - he shall make
  - he shall prepare
  lexicon: HALOT
  rationale: Though עשה is broadly 'do/make,' in sacrificial legislation it often carries the sense of performing or offering a sacrifice. 'Offer' best reflects the cultic action in idiomatic English.
- source_word: זֶבַח שְׁלָמִים
  chosen: a sacrifice of peace offerings
  alternatives:
  - a sacrifice of fellowship offerings
  - a peace offering
  lexicon: HALOT
  rationale: זֶבַח is the sacrificial act and שְׁלָמִים the class of offering. 'Sacrifice of peace offerings' preserves both elements more fully than the compressed singular 'peace offering.' 'Fellowship offerings' is possible but less directly tied to the Hebrew term.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition marks dedication/direction of the offering. 'To the LORD' is idiomatic and follows the project's default rendering of YHWH as 'the LORD'.
- source_word: עַל סַל הַמַּצּוֹת
  chosen: along with the basket of unleavened bread
  alternatives:
  - beside the basket of unleavened bread
  - in addition to the basket of unleavened bread
  lexicon: HALOT
  rationale: עַל here is not strictly spatial in English sense but indicates accompaniment in the ritual sequence. 'Along with' communicates that the ram is offered together with the basket. 'Unleavened bread' is a natural rendering for מַצּוֹת in sacrificial context.
- source_word: וְעָשָׂה הַכֹּהֵן
  chosen: and the priest shall offer
  alternatives:
  - and the priest shall prepare
  - and the priest shall perform
  lexicon: HALOT
  rationale: Again עשה in cultic context refers to carrying out the offering. 'Offer' keeps the sacrificial sense clear and consistent in English.
- source_word: מִנְחָתוֹ
  chosen: its grain offering
  alternatives:
  - his grain offering
  - its offering
  lexicon: HALOT
  rationale: מִנְחָה in priestly texts commonly denotes the grain offering. The suffix most naturally refers to the ram/sacrifice complex rather than a human male in English style, so 'its' avoids ambiguity and reflects the associated offering belonging to this sacrifice.
- source_word: נִסְכּוֹ
  chosen: its drink offering
  alternatives:
  - his drink offering
  - its libation
  lexicon: HALOT
  rationale: נֶסֶךְ/related forms denote the drink offering accompanying sacrifice. 'Drink offering' is the clearest standard English rendering; 'libation' is possible but less accessible.
