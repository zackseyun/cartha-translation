theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering שְׁלָמִים
  chosen_reading: peace offerings
  alternative_readings:
  - fellowship offerings
  rationale: The Hebrew term is traditionally rendered 'peace offerings' and is broad enough to preserve the sacrificial category without importing a narrower interpretive gloss such as 'fellowship.'
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms)
