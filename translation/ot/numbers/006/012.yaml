id: NUM.6.12
reference: Numbers 6:12
source:
  edition: WLC
  text: וְ/הִזִּ֤יר לַֽ/יהוָה֙ אֶת יְמֵ֣י נִזְר֔/וֹ וְ/הֵבִ֛יא כֶּ֥בֶשׂ בֶּן שְׁנָת֖/וֹ לְ/אָשָׁ֑ם וְ/הַ/יָּמִ֤ים הָ/רִאשֹׁנִים֙ יִפְּל֔וּ כִּ֥י טָמֵ֖א נִזְרֽ/וֹ־־׃
translation:
  text: He shall rededicate to Yahweh the days of his Nazirite vow, and he shall bring a male lamb a year old as a guilt offering. But the former days shall be void, because his Nazirite vow was defiled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the days of his separation' or 'the days of his consecration.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the first days shall fall'; that is, the earlier days of the vow no longer count.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִזִּיר
  chosen: he shall rededicate
  alternatives:
  - he shall consecrate
  - he shall separate
  lexicon: HALOT
  rationale: Hiphil of נזר in the Nazirite context denotes entering/re-entering a state of consecrated separation. 'Rededicate' captures that the prior period has been interrupted and must begin again, fitting the immediate context of renewed vow days.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition marks dedication directed to YHWH.
- source_word: יְמֵי נִזְרוֹ
  chosen: the days of his Nazirite vow
  alternatives:
  - the days of his separation
  - the days of his consecration
  lexicon: HALOT
  rationale: The construct refers specifically to the period of Naziriteship. 'Nazirite vow' makes the institutional sense clear in English and ties to the surrounding legislation.
- source_word: וְהֵבִיא
  chosen: and he shall bring
  alternatives:
  - and he shall present
  lexicon: HALOT
  rationale: Standard sacrificial idiom for bringing an offering.
- source_word: כֶּבֶשׂ בֶּן שְׁנָתוֹ
  chosen: a male lamb a year old
  alternatives:
  - a year-old lamb
  - a lamb in its first year
  lexicon: HALOT
  rationale: This idiom denotes a lamb in its first year. 'Male lamb a year old' is natural and preserves the sacrificial specification.
- source_word: לְאָשָׁם
  chosen: as a guilt offering
  alternatives:
  - for a guilt offering
  - as a reparation offering
  lexicon: HALOT
  rationale: אָשָׁם is the standard sacrificial category 'guilt offering.' 'Reparation offering' is possible but less familiar; the traditional category remains clear and accurate.
- source_word: וְהַיָּמִים הָרִאשֹׁנִים
  chosen: the former days
  alternatives:
  - the previous days
  - the first days
  lexicon: HALOT
  rationale: Refers to the days of the vow completed before defilement. 'Former days' is idiomatic and concise.
- source_word: יִפְּלוּ
  chosen: shall be lost
  alternatives:
  - shall fall away
  - shall be void
  - shall not count
  lexicon: HALOT
  rationale: Literally 'shall fall,' but in context it means the earlier days no longer count toward the vow. 'Shall be lost' communicates the legal effect in natural English without over-paraphrasing.
- source_word: כִּי טָמֵא נִזְרוֹ
  chosen: because his Nazirite vow was defiled
  alternatives:
  - because his consecration became unclean
  - because his separation was defiled
  lexicon: HALOT
  rationale: The clause explains why the prior days are invalidated. Rendering נזרו here as 'Nazirite vow' keeps consistency with the institutional context; 'was defiled' expresses the passive/resultative sense of ritual contamination.
