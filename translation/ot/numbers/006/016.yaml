id: NUM.6.16
reference: Numbers 6:16
source:
  edition: WLC
  text: וְ/הִקְרִ֥יב הַ/כֹּהֵ֖ן לִ/פְנֵ֣י יְהוָ֑ה וְ/עָשָׂ֥ה אֶת חַטָּאת֖/וֹ וְ/אֶת עֹלָתֽ/וֹ־־׃
translation:
  text: And the priest shall present them before Yahweh and offer his sin offering and his burnt offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bring them near before the LORD.' The Hebrew verb can emphasize presentation before God prior to the actual offering.
    reason: lexical_alternative
  - marker: b
    text: '''Sin offering'' may also be understood as ''purification offering'' in priestly sacrificial language.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  chosen: shall present
  alternatives:
  - shall bring near
  - shall offer
  lexicon: HALOT
  rationale: The Hiphil of קרב commonly means to bring near/present in sacrificial contexts. Here, because the direct object is implicit from the previous verse and the actual sacrificial action is then expressed by וְעָשָׂה, 'present' best distinguishes the preparatory bringing before the LORD from the subsequent offering act.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in cultic context.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי denotes presence/location before God in worship context. יְהוָה is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְעָשָׂה
  chosen: and offer
  alternatives:
  - and make
  - and perform
  lexicon: HALOT
  rationale: Although עשה literally means 'do/make,' in sacrificial idiom with named offerings it means to perform or offer the sacrifice. 'Offer' is the most natural and accurate English in this cultic setting.
- source_word: אֶת חַטָּאתוֹ
  chosen: his sin offering
  alternatives:
  - his purification offering
  lexicon: HALOT
  rationale: חַטָּאת can denote either 'sin' or the sacrifice for sin. In sacrificial legislation it regularly means 'sin offering.' 'Purification offering' is a defensible contextual alternative in some priestly texts, but 'sin offering' remains the more conventional and sufficiently accurate rendering here.
- source_word: וְאֶת עֹלָתוֹ
  chosen: and his burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard term for the whole burnt offering.
- source_word: implicit object of וְהִקְרִיב
  chosen: them
  alternatives:
  - the offerings
  rationale: The Hebrew verb lacks an explicit object in this verse, but the context from the preceding verse supplies the sacrificial items. English requires an object for clarity; 'them' preserves the Hebrew's dependence on the immediate context without over-specifying.
