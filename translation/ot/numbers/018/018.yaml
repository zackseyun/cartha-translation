theological_decisions:
- issue: Referent shift in second-person pronouns
  chosen_reading: Render both second-person forms collectively as singular 'yours'
    addressed to Aaron as representative priest.
  alternative_readings:
  - Render explicitly 'to you, Aaron' in the main text
  - Render plurally to the priests
  rationale: The Hebrew shows a feminine suffix in לָּךְ and a masculine suffix in
    לְךָ, likely reflecting agreement with different implied referents or textual
    transmission details, but the sense in context is the priestly entitlement centered
    on Aaron and his house. English 'yours' preserves the legal assignment without
    over-resolving the grammatical irregularity.
