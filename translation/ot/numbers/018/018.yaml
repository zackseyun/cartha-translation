id: NUM.18.18
reference: Numbers 18:18
source:
  edition: WLC
  text: וּ/בְשָׂרָ֖/ם יִהְיֶה לָּ֑/ךְ כַּ/חֲזֵ֧ה הַ/תְּנוּפָ֛ה וּ/כְ/שׁ֥וֹק הַ/יָּמִ֖ין
    לְ/ךָ֥ יִהְיֶֽה־׃
translation:
  text: But their flesh shall be yours, just as the breast of the wave offering and
    as the right thigh shall be yours.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their meat.' The Hebrew literally says 'their flesh,' referring to the
      edible sacrificial portion.
    reason: lexical_alternative
  - marker: b
    text: '''Wave offering'' refers to the portion presented before the LORD in a
      ritual motion; some render it ''presentation offering.'''
    reason: cultural_note
lexical_decisions:
- source_word: וּבְשָׂרָם
  chosen: But their flesh
  alternatives:
  - And their flesh
  - their meat
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh.' In sacrificial contexts it refers to
    the edible meat portion, but 'flesh' preserves the concrete sacrificial language
    of the Hebrew. The prefixed conjunction is rendered 'But' to reflect the discourse
    contrast with the preceding verse about blood and fat belonging to God.
- source_word: יִהְיֶה לָּךְ
  chosen: shall be yours
  alternatives:
  - shall belong to you
  - will be yours
  lexicon: HALOT
  rationale: The idiom היה + ל expresses possession or entitlement. 'Shall be yours'
    is natural English and preserves the legal-allotment sense.
- source_word: כַּחֲזֵה הַתְּנוּפָה
  chosen: just as the breast of the wave offering
  alternatives:
  - like the breast of the presentation offering
  - like the breast that is waved
  lexicon: HALOT
  rationale: חָזֶה is 'breast.' תְּנוּפָה denotes the ritual 'wave offering' or presentation
    motion. 'Breast of the wave offering' is the established sacrificial expression
    and fits the comparison being made to priestly portions already assigned elsewhere.
- source_word: וּכְשׁוֹק הַיָּמִין
  chosen: and as the right thigh
  alternatives:
  - and as the right leg
  - and as the right haunch
  lexicon: HALOT
  rationale: שׁוֹק denotes the upper leg/thigh portion in sacrificial distribution.
    'Thigh' is the most precise and idiomatic rendering in this cultic context; 'right'
    translates הַיָּמִין straightforwardly.
- source_word: לְךָ יִהְיֶה
  chosen: shall be yours
  alternatives:
  - shall belong to you
  - will be yours
  lexicon: HALOT
  rationale: The repeated possession formula is retained in English to mirror the
    Hebrew emphasis that these portions are assigned to Aaron/the priest.
