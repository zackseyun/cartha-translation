theological_decisions:
- issue: Who is addressed and who is restricted
  chosen_reading: The verse addresses Aaron ('your charge') and speaks of the Levites'
    duty while restricting them from the holier objects reserved to the priests.
  alternative_readings:
  - A broader address to priests generally without emphasis on Aaron personally
  rationale: The 2ms suffix on מִשְׁמַרְתְּךָ directly addresses Aaron in context,
    and the warning maintains the priest/Levite distinction without collapsing their
    roles.
- issue: Meaning of the death warning
  chosen_reading: The warning includes both the Levites and Aaron/priests as liable
    if sacred boundaries are violated.
  alternative_readings:
  - Only the Levites would die
  rationale: גַם הֵם גַם אַתֶּם explicitly includes both parties. The translation
    preserves the corporate seriousness of mishandling holy things without adding
    explanation beyond the text.
