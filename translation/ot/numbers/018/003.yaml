id: NUM.18.3
reference: Numbers 18:3
source:
  edition: WLC
  text: וְ/שָֽׁמְרוּ֙ מִֽשְׁמַרְתְּ/ךָ֔ וּ/מִשְׁמֶ֖רֶת כָּל הָ/אֹ֑הֶל אַךְ֩ אֶל כְּלֵ֨י
    הַ/קֹּ֤דֶשׁ וְ/אֶל הַ/מִּזְבֵּ֨חַ֙ לֹ֣א יִקְרָ֔בוּ וְ/לֹֽא יָמֻ֥תוּ גַם הֵ֖ם גַּם
    אַתֶּֽם־־־־־־׃
translation:
  text: They shall keep your charge and the charge of the whole tent, but they shall
    not come near the vessels of the sanctuary or the altar, so that neither they
    nor you may die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy furnishings' or 'the sacred objects' for 'the vessels of the
      sanctuary.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'both they and you'; in English, within a negative clause, this is
      naturally rendered 'neither they nor you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמְרוּ
  chosen: They shall keep
  alternatives:
  - They shall guard
  - They shall perform
  lexicon: HALOT
  rationale: שׁמר with מִשְׁמֶרֶת commonly conveys keeping/guarding an assigned duty.
    'Keep' preserves the formal linkage with 'charge' while remaining natural English.
- source_word: מִשְׁמַרְתְּךָ
  chosen: your charge
  alternatives:
  - your duty
  - your responsibility
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת denotes an assigned obligation, watch, or charge. 'Your charge'
    fits priestly/tabernacle context and preserves the technical sense of entrusted
    duty directed toward Aaron.
- source_word: וּמִשְׁמֶרֶת כָּל הָאֹהֶל
  chosen: and the charge of the whole tent
  alternatives:
  - and the duty of the whole tent
  - and the responsibility for the whole tent
  lexicon: HALOT
  rationale: The repeated noun is rendered consistently as 'charge.' הָאֹהֶל here
    refers to the tabernacle structure/complex; 'tent' is the plain lexical sense
    and avoids importing 'tabernacle' where the Hebrew says 'tent.' 'Whole' reflects
    כָּל.
- source_word: הָאֹהֶל
  chosen: tent
  alternatives:
  - tabernacle
  lexicon: HALOT
  rationale: The base meaning is 'tent.' While this refers to the sanctuary tent,
    optimal equivalence favors the direct lexical sense here.
- source_word: אַךְ
  chosen: but
  alternatives:
  - only
  - except that
  - however
  lexicon: HALOT
  rationale: אַךְ marks an exception/limitation to the preceding duty. 'But' communicates
    the restriction smoothly in English; the limiting force is preserved by the following
    prohibition.
- source_word: אֶל כְּלֵי הַקֹּדֶשׁ
  chosen: the vessels of the sanctuary
  alternatives:
  - the holy furnishings
  - the sacred objects
  lexicon: HALOT
  rationale: כְּלֵי are articles/vessels/implements. 'Vessels' is suitably concrete
    and traditional without being archaic here. הַקֹּדֶשׁ is rendered 'the sanctuary'
    to indicate the holy sphere rather than an abstract 'holiness.'
- source_word: וְאֶל הַמִּזְבֵּחַ
  chosen: or the altar
  alternatives:
  - and the altar
  lexicon: HALOT
  rationale: After a negative prohibition, English idiom often uses 'or' to express
    the two prohibited objects ('not...or...'). This preserves the sense that approach
    to either is forbidden.
- source_word: לֹא יִקְרָבוּ
  chosen: they shall not come near
  alternatives:
  - they shall not approach
  lexicon: HALOT
  rationale: קרב in this context means approaching restricted sacred space/items.
    'Come near' is clear modern English and preserves the spatial force.
- source_word: וְלֹא יָמֻתוּ
  chosen: so that neither they nor you may die
  alternatives:
  - and they shall not die
  - lest they die
  lexicon: HALOT
  rationale: Given the following גַם הֵם גַם אַתֶּם, the clause expresses the consequence
    to be avoided if the prohibition is observed. Rendering the whole as 'so that
    neither they nor you may die' makes explicit the relation in natural English while
    preserving the warning.
- source_word: גַם הֵם גַּם אַתֶּם
  chosen: neither they nor you
  alternatives:
  - both they and you
  - they as well as you
  lexicon: HALOT
  rationale: In a negative context, גַם...גַם is best represented idiomatically as
    'neither...nor.' This captures that death would affect both groups if the boundary
    is violated.
