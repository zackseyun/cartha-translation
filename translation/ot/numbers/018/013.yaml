id: NUM.18.13
reference: Numbers 18:13
source:
  edition: WLC
  text: בִּכּוּרֵ֞י כָּל אֲשֶׁ֧ר בְּ/אַרְצָ֛/ם אֲשֶׁר יָבִ֥יאוּ לַ/יהוָ֖ה לְ/ךָ֣ יִהְיֶ֑ה כָּל טָה֥וֹר בְּ/בֵיתְ/ךָ֖ יֹאכֲלֶֽ/נּוּ־־־׃
translation:
  text: The firstfruits of everything in their land that they bring to Yahweh shall be yours. Everyone in your house who is clean may eat it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone in your house who is ceremonially clean.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּכּוּרֵי
  chosen: the firstfruits
  alternatives:
  - the first ripe produce
  - the choicest first produce
  lexicon: HALOT
  rationale: Refers to the first produce offered from harvest/yield. 'Firstfruits' is the standard concise English equivalent and fits the cultic context without unnecessary paraphrase.
- source_word: כָּל אֲשֶׁר בְּאַרְצָם
  chosen: of everything in their land
  alternatives:
  - of all that is in their land
  - of everything from their land
  lexicon: HALOT
  rationale: The phrase modifies 'firstfruits' and indicates the produce originates in the Israelites' land. 'In their land' is a natural rendering of בְאַרְצָם and avoids over-specifying agricultural produce beyond what the Hebrew states.
- source_word: אֲשֶׁר יָבִיאוּ לַיהוָה
  chosen: that they bring to the LORD
  alternatives:
  - which they present to the LORD
  - that they bring as an offering to the LORD
  lexicon: HALOT
  rationale: יָבִיאוּ literally means 'they bring.' In sacrificial/cultic contexts it can imply presentation as an offering, but 'bring to the LORD' preserves the Hebrew wording while remaining clear.
- source_word: לְךָ יִהְיֶה
  chosen: shall be yours
  alternatives:
  - shall belong to you
  - shall be for you
  lexicon: HALOT
  rationale: This idiom assigns the offering to Aaron/the priestly household. 'Shall be yours' is idiomatic and clear in English.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the LORD.'
- source_word: כָּל טָהוֹר
  chosen: everyone ... who is clean
  alternatives:
  - everyone ... who is ceremonially clean
  - every clean person
  lexicon: HALOT
  rationale: The adjective טָהוֹר in priestly material commonly denotes ritual cleanness. 'Who is clean' keeps the wording simple in the main text; the cultic sense can be clarified in a footnote.
- source_word: בְּבֵיתְךָ
  chosen: in your house
  alternatives:
  - in your household
  - among your household
  lexicon: HALOT
  rationale: Refers to Aaron's household. 'In your house' is a close rendering; English readers will naturally understand household membership from context.
- source_word: יֹאכֲלֶנּוּ
  chosen: may eat it
  alternatives:
  - shall eat it
  - may consume it
  lexicon: HALOT
  rationale: The imperfect here expresses permitted entitlement in context rather than mere future action. 'May eat it' communicates authorized access to the priestly portion.
