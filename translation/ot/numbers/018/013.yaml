theological_decisions:
- issue: Nature of 'clean' in priestly legislation
  chosen_reading: ritually clean members of Aaron's household may eat the priestly portion
  alternative_readings:
  - morally clean/pure in a general sense
  rationale: In Numbers 18 the context is priestly entitlement and purity regulations. טָהוֹר here is best understood in the ritual/cultic sense, not as a generalized moral category.
