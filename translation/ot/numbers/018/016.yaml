id: NUM.18.16
reference: Numbers 18:16
source:
  edition: WLC
  text: וּ/פְדוּיָ/ו֙ מִ/בֶּן חֹ֣דֶשׁ תִּפְדֶּ֔ה בְּ/עֶ֨רְכְּ/ךָ֔ כֶּ֛סֶף חֲמֵ֥שֶׁת
    שְׁקָלִ֖ים בְּ/שֶׁ֣קֶל הַ/קֹּ֑דֶשׁ עֶשְׂרִ֥ים גֵּרָ֖ה הֽוּא־׃
translation:
  text: 'And those to be redeemed from a month old, you shall redeem according to
    your valuation: five shekels of silver, by the sanctuary shekel; it is twenty
    gerahs.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'the shekel is twenty gerahs.' The Hebrew pronoun 'it'
      refers to the sanctuary shekel as the standard weight.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְדוּיָו
  chosen: those to be redeemed
  alternatives:
  - his redeemed one
  - its redemption price
  - those redeemed of it/him
  lexicon: HALOT
  rationale: The passive participial form from פדה with 3ms suffix is syntactically
    difficult. In context (instructions about redeeming firstborn), it refers to the
    redeemable firstborn individual(s). English idiom is best captured by a passive
    expression rather than a wooden nominal form. The plural-like English 'those'
    reflects the generic legal instruction, though the Hebrew suffix is singular and
    collective/generic in force.
- source_word: מִבֶּן חֹדֶשׁ
  chosen: from a month old
  alternatives:
  - from one month old
  - at a month old
  lexicon: HALOT
  rationale: This idiom marks the age threshold beginning at one month. 'From a month
    old' is a close rendering of the Hebrew preposition plus age expression.
- source_word: תִּפְדֶּה
  chosen: you shall redeem
  alternatives:
  - you are to redeem
  lexicon: HALOT
  rationale: 'Imperfect 2ms in legal instruction is naturally rendered as an obligation/future
    command: ''you shall redeem.'''
- source_word: בְּעֶרְכְּךָ
  chosen: according to your valuation
  alternatives:
  - at your valuation
  - by your assessment
  lexicon: HALOT
  rationale: ערך in priestly/legal contexts denotes assessed value. 'According to
    your valuation' preserves the formal legal sense and the 2ms suffix addressed
    to the priest.
- source_word: כֶּסֶף חֲמֵשֶׁת שְׁקָלִים
  chosen: five shekels of silver
  alternatives:
  - silver of five shekels
  - five silver shekels
  lexicon: HALOT
  rationale: This is the standard monetary expression; idiomatic English places the
    measure before the material.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the sanctuary shekel
  alternatives:
  - according to the holy shekel
  - by the sacred shekel
  lexicon: HALOT
  rationale: This phrase specifies the standard weight used for valuation. 'Sanctuary
    shekel' is the conventional and clear rendering in context.
- source_word: עֶשְׂרִים גֵּרָה הוּא
  chosen: it is twenty gerahs
  alternatives:
  - the shekel is twenty gerahs
  - twenty gerahs it is
  lexicon: HALOT
  rationale: The Hebrew clarifies the equivalence of the sanctuary shekel. Since English
    could ambiguously attach 'it' to the silver amount, the footnote preserves the
    more explicit alternative.
