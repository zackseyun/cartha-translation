theological_decisions:
- issue: Meaning of 'bear the iniquity' in priestly context
  chosen_reading: Retain the idiom 'shall bear the iniquity' without resolving whether
    it emphasizes guilt, liability, or responsibility.
  alternative_readings:
  - shall bear the guilt
  - shall be responsible for any offense against the sanctuary/priesthood
  rationale: The Hebrew idiom can encompass culpability and responsibility for violations
    connected to sacred service. Preserving the idiom maintains the theological tension
    rather than flattening it into a single interpretive paraphrase.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
