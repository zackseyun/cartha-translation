id: NUM.18.1
reference: Numbers 18:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֶֽל אַהֲרֹ֔ן אַתָּ֗ה וּ/בָנֶ֤י/ךָ וּ/בֵית אָבִ֨י/ךָ֙
    אִתָּ֔/ךְ תִּשְׂא֖וּ אֶת עֲוֺ֣ן הַ/מִּקְדָּ֑שׁ וְ/אַתָּה֙ וּ/בָנֶ֣י/ךָ אִתָּ֔/ךְ
    תִּשְׂא֖וּ אֶת עֲוֺ֥ן כְּהֻנַּתְ/כֶֽם־־־־׃
translation:
  text: Then the LORD said to Aaron, “You and your sons and your father’s house with
    you shall bear the iniquity of the sanctuary, and you and your sons with you shall
    bear the iniquity of your priesthood.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall bear the guilt of the sanctuary'; the Hebrew idiom can also carry
      the sense of bearing responsibility for offenses connected with the sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Or 'shall bear the guilt of your priesthood'; the Hebrew idiom may also
      mean bearing responsibility for offenses connected with your priestly office.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, following established English
    convention that reflects Jewish reverence tradition.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force.
- source_word: בֵית אָבִיךָ
  chosen: your father’s house
  alternatives:
  - your ancestral house
  - your paternal household
  lexicon: HALOT
  rationale: A standard Hebrew kinship expression referring to the wider paternal
    family/clan, not merely a physical house. 'Father’s house' preserves the idiom
    with sufficient clarity.
- source_word: אִתָּךְ
  chosen: with you
  alternatives:
  - along with you
  lexicon: HALOT
  rationale: Straightforward accompaniment; repeated in both clauses and retained
    for emphasis and structure.
- source_word: תִּשְׂאוּ
  chosen: shall bear
  alternatives:
  - shall carry
  - shall be responsible for
  lexicon: HALOT
  rationale: נשא with עון commonly means to bear guilt/iniquity or bear responsibility
    for it. 'Shall bear' preserves the formal theological idiom and allows the ambiguity
    of liability/responsibility to remain.
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - punishment for iniquity
  lexicon: HALOT
  rationale: The noun can denote iniquity, guilt, or liability to punishment. Here
    the sense is covenantal culpability/responsibility connected with sanctuary and
    priesthood. 'Iniquity' preserves the traditional breadth better than narrowing
    to 'guilt' alone.
- source_word: הַמִּקְדָּשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the sacred precinct
  lexicon: HALOT
  rationale: Refers to the holy sanctuary as the sacred sphere for which Aaron and
    his wider house bear responsibility. 'Sanctuary' is the most natural and established
    rendering.
- source_word: כְּהֻנַּתְכֶם
  chosen: your priesthood
  alternatives:
  - your priestly office
  lexicon: HALOT
  rationale: Denotes the priestly office/service belonging to Aaron and his sons.
    'Your priesthood' is concise and preserves the institutional sense.
