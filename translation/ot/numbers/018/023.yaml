id: NUM.18.23
reference: Numbers 18:23
source:
  edition: WLC
  text: וְ/עָבַ֨ד הַ/לֵּוִ֜י ה֗וּא אֶת עֲבֹדַת֙ אֹ֣הֶל מוֹעֵ֔ד וְ/הֵ֖ם יִשְׂא֣וּ עֲוֺנָ֑/ם
    חֻקַּ֤ת עוֹלָם֙ לְ/דֹרֹ֣תֵי/כֶ֔ם וּ/בְ/תוֹךְ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל לֹ֥א יִנְחֲל֖וּ
    נַחֲלָֽה־׃
translation:
  text: But the Levite himself shall serve the service of the tent of meeting, and
    they shall bear their iniquity. It is a permanent statute throughout your generations,
    and among the sons of Israel they shall not inherit an inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bear their guilt.' The Hebrew idiom can denote bearing guilt, iniquity,
      or the liability/consequences attached to it.
    reason: lexical_alternative
  - marker: b
    text: Or 'among the Israelites.' The Hebrew reads 'among the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'they shall not inherit an inheritance,' a Hebrew repetition
      that emphasizes the denial of tribal land allotment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבַד
  chosen: shall serve
  alternatives:
  - must serve
  - shall do service
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal/instructional context
    functions with future/modal force. 'Shall serve' preserves the prescriptive sense
    without over-paraphrase.
- source_word: הַלֵּוִי הוּא
  chosen: the Levite himself
  alternatives:
  - the Levite, he
  - the Levite alone
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. 'Himself' captures the emphatic
    force idiomatically in English without implying exclusivity beyond the context.
- source_word: עֲבֹדַת אֹהֶל מוֹעֵד
  chosen: the service of the tent of meeting
  alternatives:
  - the work of the tent of meeting
  - the ministry of the tent of meeting
  lexicon: HALOT
  rationale: עֲבֹדָה here denotes cultic service/duty. 'Service' is both accurate
    and readable; 'tent of meeting' is the standard rendering for אֹהֶל מוֹעֵד.
- source_word: וְהֵם יִשְׂאוּ עֲוֺנָם
  chosen: and they shall bear their iniquity
  alternatives:
  - and they shall bear their guilt
  - and they shall bear the consequences of their sin
  lexicon: HALOT
  rationale: נשא עון is a standard legal-cultic idiom. 'Bear their iniquity' preserves
    the biblical idiom and theological weight better than an explanatory paraphrase;
    'their' follows the 3mp suffix.
- source_word: חֻקַּת עוֹלָם
  chosen: a permanent statute
  alternatives:
  - a perpetual statute
  - an everlasting statute
  lexicon: HALOT
  rationale: The phrase denotes an enduring legal ordinance within Israel's covenantal
    order. 'Permanent statute' is clear modern English while retaining the durative
    force.
- source_word: לְדֹרֹתֵיכֶם
  chosen: throughout your generations
  alternatives:
  - for your generations
  lexicon: HALOT
  rationale: This idiom marks continuing applicability across successive generations.
    'Throughout your generations' is natural and sufficiently formal.
- source_word: וּבְתוֹךְ בְּנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - among the Israelites
  - in the midst of the sons of Israel
  lexicon: HALOT
  rationale: Because the source explicitly uses 'sons,' the translation follows the
    gender-accurate policy. 'Among' captures the relational sense of בתוך in this
    context.
- source_word: לֹא יִנְחֲלוּ נַחֲלָה
  chosen: they shall not inherit an inheritance
  alternatives:
  - they shall have no inheritance
  - they shall not receive an inheritance
  lexicon: HALOT
  rationale: The Hebrew uses cognate verb and noun for emphasis. Retaining 'inherit
    an inheritance' preserves the formal force and avoids smoothing away the repetition.
