theological_decisions:
- issue: Rendering of covenantal legal language concerning Levitical duty and liability
  chosen_reading: The verse is translated in legal-cultic terms without softening
    the idiom 'bear their iniquity.'
  alternative_readings:
  - '''bear their guilt'''
  - '''suffer the penalty for their sin'''
  rationale: The text states covenantal responsibility attached to Levite service.
    Preserving the idiom maintains theological tension and avoids importing a narrower
    interpretation of whether the phrase emphasizes guilt, punishment, or liability
    in this instance.
  doctrine_reference: Translation philosophy §3, §6
- issue: Gendered expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: among the sons of Israel
  alternative_readings:
  - among the Israelites
  - among the children of Israel
  rationale: The source is grammatically masculine plural in a representative ethnic
    expression. Per the gender-accurate policy, the translation keeps the masculine
    form rather than neutralizing it, while preserving readability.
  doctrine_reference: Translation philosophy §4
