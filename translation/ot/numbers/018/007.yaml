theological_decisions:
- issue: Meaning of זָר in priestly law
  chosen_reading: the outsider
  alternative_readings:
  - the stranger
  - any layman
  - the unauthorized person
  rationale: The term refers to anyone outside the authorized priestly class who intrudes
    into restricted sacred service. Rendering it as 'outsider' avoids ethnic misunderstanding
    while preserving the exclusionary legal sense.
- issue: Force of עֲבֹדַת מַתָּנָה
  chosen_reading: the priesthood is given as a gift expressed in service
  alternative_readings:
  - gift-service
  - service of gift
  rationale: The verse emphasizes that priestly ministry is not self-assumed but divinely
    granted. The translation preserves that theological emphasis without over-interpreting
    the syntax.
