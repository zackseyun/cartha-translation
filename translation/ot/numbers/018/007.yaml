id: NUM.18.7
reference: Numbers 18:7
source:
  edition: WLC
  text: וְ/אַתָּ֣ה וּ/בָנֶ֣י/ךָ אִ֠תְּ/ךָ תִּשְׁמְר֨וּ אֶת כְּהֻנַּתְ/כֶ֜ם לְ/כָל
    דְּבַ֧ר הַ/מִּזְבֵּ֛חַ וּ/לְ/מִ/בֵּ֥ית לַ/פָּרֹ֖כֶת וַ/עֲבַדְתֶּ֑ם עֲבֹדַ֣ת מַתָּנָ֗ה
    אֶתֵּן֙ אֶת כְּהֻנַּתְ/כֶ֔ם וְ/הַ/זָּ֥ר הַ/קָּרֵ֖ב יוּמָֽת־־־׃ס
translation:
  text: But you and your sons with you shall keep your priesthood for everything concerning
    the altar and for what is inside the veil, and you shall serve. I give your priesthood
    as a gift of service, but the outsider who comes near shall be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the unauthorized person'; Hebrew 'the stranger/outsider' refers here
      to anyone not authorized to perform priestly duties, not specifically to a foreigner.
    reason: lexical_alternative
  - marker: b
    text: Or 'a service given as a gift.' The Hebrew phrase may emphasize either that
      the service is a gift or that the priesthood is granted as a gift for service.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמְר֨וּ
  chosen: shall keep
  alternatives:
  - shall guard
  - shall maintain
  lexicon: HALOT
  rationale: שׁמר here carries the sense of guarding/keeping charge of priestly responsibility.
    'Keep' is concise and idiomatic in English while still preserving the custodial
    force.
- source_word: כְּהֻנַּתְכֶם
  chosen: your priesthood
  alternatives:
  - your priestly office
  lexicon: HALOT
  rationale: Refers to the office/function of priesthood rather than merely priestly
    acts. 'Priesthood' is the most natural and sufficiently formal rendering.
- source_word: לְכָל דְּבַר הַמִּזְבֵּחַ
  chosen: for everything concerning the altar
  alternatives:
  - for all the matters of the altar
  - for every service of the altar
  lexicon: HALOT
  rationale: דבר in construct here broadly denotes matters/concerns related to altar
    duties. 'Everything concerning the altar' communicates scope without over-specifying
    ritual acts.
- source_word: וּלְמִבֵּית לַפָּרֹכֶת
  chosen: and for what is inside the veil
  alternatives:
  - and for the area within the veil
  - and for the inner side of the curtain
  lexicon: HALOT
  rationale: Literally 'and for/from inside the veil.' The phrase points to the space
    on the inner side of the curtain. 'What is inside the veil' is clear modern English
    and preserves the sanctuary reference without awkward literalism.
- source_word: וַעֲבַדְתֶּם
  chosen: and you shall serve
  alternatives:
  - and you shall perform the service
  - and you shall minister
  lexicon: HALOT
  rationale: The verb עבד in cultic context means to perform service. 'Serve' is broad
    enough to cover priestly ministry and avoids importing later ecclesiastical terminology,
    while the following phrase specifies the nature of the service.
- source_word: עֲבֹדַת מַתָּנָה
  chosen: a gift of service
  alternatives:
  - gift-service
  - service as a gift
  - a service given as a gift
  lexicon: HALOT
  rationale: The construct phrase is somewhat compressed. It describes the priesthood/service
    as something granted by God. 'A gift of service' preserves both nouns and the
    sense that the service itself is a divinely given privilege.
- source_word: אֶתֵּן אֶת כְּהֻנַּתְכֶם
  chosen: I give your priesthood
  alternatives:
  - I have given your priesthood
  - I grant your priesthood
  lexicon: HALOT
  rationale: The imperfect here expresses God's granting of the priesthood. Present
    English 'I give' works well in direct divine speech and matches the Hebrew aspect
    in context.
- source_word: הַזָּר
  chosen: the outsider
  alternatives:
  - the unauthorized person
  - the stranger
  lexicon: HALOT
  rationale: In priestly legislation זָר denotes one not authorized for the sacred
    role, not necessarily a foreign ethnic stranger. 'Outsider' best captures non-priestly
    unauthorized status in accessible English.
- source_word: הַקָּרֵב
  chosen: who comes near
  alternatives:
  - who approaches
  lexicon: HALOT
  rationale: קרב is a standard term for approaching sacred space. 'Who comes near'
    is transparent and preserves the physical/cultic sense.
- source_word: יוּמָת
  chosen: shall be put to death
  alternatives:
  - shall die
  lexicon: HALOT
  rationale: The Hophal is causative/passive, indicating execution or death sentence
    rather than mere prediction of death. 'Shall be put to death' best reflects the
    form and legal force.
