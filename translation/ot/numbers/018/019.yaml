id: NUM.18.19
reference: Numbers 18:19
source:
  edition: WLC
  text: כֹּ֣ל תְּרוּמֹ֣ת הַ/קֳּדָשִׁ֗ים אֲשֶׁ֨ר יָרִ֥ימוּ בְנֵֽי יִשְׂרָאֵל֮ לַֽ/יהוָה֒ נָתַ֣תִּֽי לְ/ךָ֗ וּ/לְ/בָנֶ֧י/ךָ וְ/לִ/בְנֹתֶ֛י/ךָ אִתְּ/ךָ֖ לְ/חָק עוֹלָ֑ם בְּרִית֩ מֶ֨לַח עוֹלָ֥ם הִוא֙ לִ/פְנֵ֣י יְהוָ֔ה לְ/ךָ֖ וּ/לְ/זַרְעֲ/ךָ֥ אִתָּֽ/ךְ׀־־׃
translation:
  text: All the contributions of the holy things that the sons of Israel present to Yahweh I have given to you, and to your sons and your daughters with you, as a permanent statute. It is a covenant of salt forever before Yahweh for you and for your offspring with you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heave offerings.' The Hebrew term refers to contributions set apart and presented to the LORD.
    reason: lexical_alternative
  - marker: b
    text: '''Covenant of salt'' is a covenantal expression associated with permanence and inviolability; compare 2 Chronicles 13:5.'
    reason: cultural_note
lexical_decisions:
- source_word: תְּרוּמֹת
  chosen: contributions
  alternatives:
  - heave offerings
  - offerings
  - sacred contributions
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution or offering set apart and presented to God. 'Contributions' is natural modern English and preserves the idea of something lifted off from ordinary use and given. 'Heave offerings' is too tradition-bound and opaque for modern readers.
- source_word: הַקֳּדָשִׁים
  chosen: the holy things
  alternatives:
  - the sacred gifts
  - the holy offerings
  lexicon: HALOT
  rationale: The phrase תְּרוּמֹת הַקֳּדָשִׁים is most naturally 'the contributions of the holy things,' referring to portions from consecrated items. 'Holy things' keeps the cultic category without over-interpreting the exact objects.
- source_word: יָרִימוּ
  chosen: lift up
  alternatives:
  - present
  - offer up
  - raise
  lexicon: HALOT
  rationale: The Hiphil of רוּם here carries the technical sacrificial sense of raising/presenting an offering. 'Lift up' preserves the concrete Hebrew imagery while remaining understandable; the object and context make the offering sense clear.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine plural is preserved. 'The sons of Israel' reflects the Hebrew form directly; 'Israelites' is possible but loses the familial/covenantal texture. Inclusivity is not the point here, since the phrase is a standard national designation.
- source_word: לַיהוָה / יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies 'the LORD' as the default rendering for יְהוָה, following Jewish reverence tradition and the Septuagintal pattern.
- source_word: לְחָק עוֹלָם
  chosen: as a permanent statute
  alternatives:
  - as a perpetual statute
  - as an everlasting due
  lexicon: HALOT
  rationale: חָק is a fixed statute or prescribed due. 'Permanent statute' communicates enduring legal force in readable modern English. 'Perpetual statute' is more traditional but slightly less natural.
- source_word: בְּרִית מֶלַח
  chosen: a covenant of salt
  alternatives:
  - a salt covenant
  lexicon: HALOT
  rationale: The Hebrew idiom is preserved literally because it is a recognized covenantal expression and carries symbolic weight of permanence and inviolability. A more interpretive rendering would flatten the image.
- source_word: עוֹלָם
  chosen: forever
  alternatives:
  - perpetual
  - everlasting
  lexicon: HALOT
  rationale: In the second occurrence, 'forever' is the most natural English adverbial rendering. It preserves the durative force without archaic tone. The first occurrence is represented adjectivally in 'permanent statute' for smoother English.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: This standard cultic phrase is well represented by 'before the LORD,' which is both literal and idiomatic in English Bible style.
- source_word: זַרְעֲךָ
  chosen: your offspring
  alternatives:
  - your descendants
  - your seed
  lexicon: HALOT
  rationale: '''Offspring'' preserves the collective singular sense of זֶרַע in clear modern English. ''Seed'' is more literal but less natural here; ''descendants'' is acceptable but slightly more interpretive.'
