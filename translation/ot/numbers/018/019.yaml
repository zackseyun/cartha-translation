theological_decisions:
- issue: Rendering the covenantal idiom בְּרִית מֶלַח
  chosen_reading: a covenant of salt
  alternative_readings:
  - a permanent covenant
  - an inviolable covenant
  rationale: The text uses a concrete covenantal idiom rather than an abstract explanation. Preserving the idiom maintains theological and literary texture while allowing explanation in a footnote rather than resolving the symbolism in the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gendered reference to Aaron's family and Israel
  chosen_reading: to you, and to your sons and your daughters with you ... the sons of Israel
  alternative_readings:
  - to you and your children ... the Israelites
  rationale: The Hebrew explicitly names sons and daughters in Aaron's household and uses the masculine national designation 'sons of Israel.' Following the gender-accurate policy, the translation preserves these forms rather than neutralizing them.
  doctrine_reference: Translation philosophy §4
