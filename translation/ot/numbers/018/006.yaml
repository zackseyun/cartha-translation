id: NUM.18.6
reference: Numbers 18:6
source:
  edition: WLC
  text: וַ/אֲנִ֗י הִנֵּ֤ה לָקַ֨חְתִּי֙ אֶת אֲחֵי/כֶ֣ם הַ/לְוִיִּ֔ם מִ/תּ֖וֹךְ בְּנֵ֣י יִשְׂרָאֵ֑ל לָ/כֶ֞ם מַתָּנָ֤ה נְתֻנִים֙ לַֽ/יהוָ֔ה לַ/עֲבֹ֕ד אֶת עֲבֹדַ֖ת אֹ֥הֶל מוֹעֵֽד־־׃
translation:
  text: And I—behold, I have taken your brothers the Levites from among the sons of Israel, given to you as a gift, given to Yahweh, to perform the service of the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from among the Israelites.' The Hebrew reads 'from among the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: And I
  alternatives:
  - Now I
  - As for me, I
  lexicon: HALOT
  rationale: Retains the conjunction plus emphatic first-person pronoun, marking divine emphasis and continuity with the preceding speech.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - indeed
  lexicon: HALOT
  rationale: Preserves the deictic/emphatic force of the Hebrew. Though somewhat elevated, it remains readable and reflects the solemnity of the declaration.
- source_word: לָקַחְתִּי
  chosen: I have taken
  alternatives:
  - I took
  - I have selected
  lexicon: HALOT
  rationale: The perfect is rendered with present relevance in English ('have taken'), fitting the ongoing appointment of the Levites. 'Selected' is interpretive beyond the basic verb לקח.
- source_word: אֲחֵיכֶם
  chosen: your brothers
  alternatives:
  - your kinsmen
  - your fellow Israelites
  lexicon: HALOT
  rationale: Keeps the familial language of the Hebrew. Although the referent is tribal kin rather than literal siblings, 'brothers' best preserves the source wording and covenantal solidarity.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal designation.
- source_word: מִתּוֹךְ בְּנֵי יִשְׂרָאֵל
  chosen: from among the sons of Israel
  alternatives:
  - from among the people of Israel
  - from among the Israelites
  lexicon: HALOT
  rationale: Preserves the gender-accurate form 'sons of Israel' in line with the translation philosophy, while clearly expressing separation from the larger covenant community.
- source_word: לָכֶם
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: Natural English dative indicating the Levites are assigned to Aaron and his sons.
- source_word: מַתָּנָה
  chosen: as a gift
  alternatives:
  - a gift
  - as a present
  lexicon: HALOT
  rationale: 'Expresses predicative force smoothly in English: the Levites are given in the capacity of a gift.'
- source_word: נְתֻנִים
  chosen: given
  alternatives:
  - assigned
  - donated
  lexicon: HALOT
  rationale: Keeps the passive participial idea and echoes the Hebrew wordplay with gift/given. 'Assigned' is possible but weakens the concrete giving language.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Follows the doctrinal default for YHWH as 'the LORD.' 'To the LORD' best matches the dative relation in the Hebrew, though contextually it also implies dedication for his service.
- source_word: לַעֲבֹד
  chosen: to serve
  alternatives:
  - to perform service
  - to work
  lexicon: HALOT
  rationale: Clear, natural rendering of the infinitive of עבד in cultic context. 'Work' is too broad; 'perform service' is more cumbersome.
- source_word: עֲבֹדַת אֹהֶל מוֹעֵד
  chosen: the service of the tent of meeting
  alternatives:
  - the work of the tent of meeting
  - the ministry of the tent of meeting
  lexicon: HALOT
  rationale: Maintains the cultic noun 'service' and the standard rendering 'tent of meeting.' This preserves the formal connection between verb and noun ('serve the service') without paraphrasing away the repetition.
