theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered phrase בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - people of Israel
  - Israelites
  rationale: The translation philosophy prefers gender-accurate renderings over gender-neutral ones where the source is grammatically masculine and representative. Here 'sons of Israel' preserves the Hebrew form while remaining intelligible.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
