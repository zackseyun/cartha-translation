  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering בְּנֵי יִשְׂרָאֵל with gender-accurate language
  chosen_reading: among the sons of Israel
  alternative_readings:
  - among the people of Israel
  - among the Israelites
  rationale: The Hebrew expression is grammatically masculine plural and is a standard covenantal ethnonym. Per translation philosophy, gender-accurate rendering is preferred over gender-neutral smoothing unless context demands otherwise. Here 'sons of Israel' preserves the source form and familial-covenantal texture.
