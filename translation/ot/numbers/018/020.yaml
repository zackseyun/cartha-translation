id: NUM.18.20
reference: Numbers 18:20
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶֽל אַהֲרֹ֗ן בְּ/אַרְצָ/ם֙ לֹ֣א תִנְחָ֔ל וְ/חֵ֕לֶק לֹא יִהְיֶ֥ה לְ/ךָ֖ בְּ/תוֹכָ֑/ם אֲנִ֤י חֶלְקְ/ךָ֙ וְ/נַחֲלָ֣תְ/ךָ֔ בְּ/ת֖וֹךְ בְּנֵ֥י יִשְׂרָאֵֽל־־׃ס
translation:
  text: And Yahweh said to Aaron, “In their land you shall not inherit, and no portion shall be yours among them. I am your portion and your inheritance among the sons of Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the people of Israel' / 'among the Israelites.' The Hebrew reads 'among the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּאַרְצָם
  chosen: in their land
  alternatives:
  - in their country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the territorial inheritance of the Israelites. 'Land' best matches the inheritance context and preserves the covenantal-territorial sense.
- source_word: תִנְחָל
  chosen: you shall not inherit
  alternatives:
  - you shall have no inheritance
  - you shall not receive an inheritance
  lexicon: HALOT
  rationale: The verb נחל in Qal here denotes receiving or possessing an inheritance. 'You shall not inherit' is concise and close to the Hebrew form, while the following clauses clarify the object.
- source_word: חֵלֶק
  chosen: portion
  alternatives:
  - share
  - allotment
  lexicon: HALOT
  rationale: חֵלֶק commonly denotes a share or allotted portion. 'Portion' works well both in the negative clause and in the climactic divine self-designation, preserving the inheritance motif.
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  lexicon: HALOT
  rationale: The phrase indicates Aaron's relation within the people of Israel. 'Among them' is natural English and accurately conveys social-location rather than mere spatial centrality.
- source_word: אֲנִי חֶלְקְךָ
  chosen: I am your portion
  alternatives:
  - I am your share
  lexicon: HALOT
  rationale: This is the theological center of the verse. 'Portion' preserves the lexical link with חֵלֶק earlier in the verse and communicates covenantal provision without paraphrase.
- source_word: נַחֲלָתְךָ
  chosen: your inheritance
  alternatives:
  - your heritage
  - your possession
  lexicon: HALOT
  rationale: נַחֲלָה is the standard term for inheritance, especially land inheritance. 'Inheritance' keeps the legal-covenantal resonance and parallels the earlier verbal form תִנְחָל.
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - among the people of Israel
  - in the midst of the sons of Israel
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל is formally 'sons of Israel.' In keeping with the project's gender-accurate principle, the masculine form is preserved here rather than flattened to a gender-neutral collective, while still functioning corporately.
