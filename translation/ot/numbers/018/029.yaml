id: NUM.18.29
reference: Numbers 18:29
source:
  edition: WLC
  text: מִ/כֹּל֙ מַתְּנֹ֣תֵי/כֶ֔ם תָּרִ֕ימוּ אֵ֖ת כָּל תְּרוּמַ֣ת יְהוָ֑ה מִ/כָּל חֶלְבּ֔/וֹ אֶֽת מִקְדְּשׁ֖/וֹ מִמֶּֽ/נּוּ־־־׃
translation:
  text: From all your gifts you shall offer every offering of Yahweh; from all its best part, its holy portion from it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from all its fat,' that is, from all its choicest part.
    reason: lexical_alternative
  - marker: b
    text: Or 'its consecrated part' for 'the holy portion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכֹּל
  chosen: From all
  alternatives:
  - out of all
  lexicon: HALOT
  rationale: 'The preposition מִן with כֹּל indicates source or separation: the offering is taken from the totality of the gifts. ''From all'' is natural English and preserves the distributive sense.'
- source_word: מַתְּנֹתֵיכֶם
  chosen: your gifts
  alternatives:
  - your contributions
  - your donations
  lexicon: HALOT
  rationale: מַתָּנָה denotes a gift or contribution. In this priestly context it refers to the portions given to the Levites. 'Gifts' is broad enough to cover the cultic contributions without over-specifying beyond the Hebrew.
- source_word: תָּרִימוּ
  chosen: you shall lift up
  alternatives:
  - you shall present
  - you shall raise
  lexicon: HALOT
  rationale: The Hiphil of רוּם is the standard verb used for heave/contribution language. 'Lift up' preserves the concrete sacrificial idiom behind the technical offering terminology better than a flatter 'present.'
- source_word: תְּרוּמַת יְהוָה
  chosen: offering of the LORD
  alternatives:
  - contribution to the LORD
  - the LORD's contribution offering
  lexicon: HALOT
  rationale: תְּרוּמָה is a technical term for a contribution or raised offering. 'Offering of the LORD' is concise and idiomatic in English, while still signaling that this is the portion set apart for him. The divine name follows the project's default as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִכָּל חֶלְבּוֹ
  chosen: from all its best part
  alternatives:
  - from all its fat
  - from all its choicest part
  lexicon: HALOT
  rationale: חֵלֶב literally means 'fat,' but in offering contexts it often denotes the richest or best portion. Since the referent here is the gifts rather than animal tissue specifically, 'best part' communicates the idiomatic sense. The possessive suffix is rendered as 'its,' referring collectively to the gift material.
- source_word: מִקְדְּשׁוֹ
  chosen: the holy portion
  alternatives:
  - its sanctified part
  - its consecrated part
  - its sanctuary portion
  lexicon: HALOT
  rationale: In this context מִקְדָּשׁ with suffix is best understood as that which is set apart as holy from the gift. 'Holy portion' is clearer in English than the more wooden 'its sanctified part' while preserving the cultic sense of consecration.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - out of it
  lexicon: HALOT
  rationale: The pronoun refers back to the gift/produce from which the holy portion is taken. 'From it' is the most direct rendering.
