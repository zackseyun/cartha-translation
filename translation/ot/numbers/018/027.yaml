id: NUM.18.27
reference: Numbers 18:27
source:
  edition: WLC
  text: וְ/נֶחְשַׁ֥ב לָ/כֶ֖ם תְּרוּמַתְ/כֶ֑ם כַּ/דָּגָן֙ מִן הַ/גֹּ֔רֶן וְ/כַֽ/מְלֵאָ֖ה
    מִן הַ/יָּֽקֶב־־׃
translation:
  text: And your contribution will be reckoned to you like grain from the threshing
    floor and like fullness from the winepress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be counted to you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your offering'; traditionally 'your heave offering.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'fullness from the winepress,' that is, the full yield/product of
      the winepress.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנֶחְשַׁב
  chosen: will be reckoned
  alternatives:
  - will be counted
  - will be regarded
  lexicon: HALOT
  rationale: Niphal of חשׁב here expresses being accounted or credited. 'Reckoned'
    preserves the formal sense of something being considered as equivalent, fitting
    the legal/cultic context.
- source_word: תְּרוּמַתְכֶם
  chosen: your contribution
  alternatives:
  - your offering
  - your heave offering
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution set apart and lifted up for sacred use.
    'Contribution' is clear modern English and fits the context of the tithe portion
    given by the Levites. 'Heave offering' is too archaic; 'offering' alone is less
    specific.
- source_word: כַּדָּגָן
  chosen: like grain
  alternatives:
  - as grain
  - like the grain
  lexicon: HALOT
  rationale: דָּגָן refers to grain/cereal produce. 'Like grain' is natural English
    after the comparative כ and keeps the agricultural image.
- source_word: מִן הַגֹּרֶן
  chosen: from the threshing floor
  alternatives:
  - from the threshing place
  lexicon: HALOT
  rationale: The phrase identifies grain as produce associated with the threshing
    floor, a standard metonymy for harvested grain yield. 'Threshing floor' is the
    conventional and accurate rendering.
- source_word: וְכַמְלֵאָה
  chosen: and like fullness
  alternatives:
  - and like the full yield
  - and like produce
  lexicon: HALOT
  rationale: מְלֵאָה literally means fullness/full produce. Here it parallels grain
    from the threshing floor and refers to the full produce associated with the winepress.
    'Fullness' preserves the lexical image while remaining understandable in context.
- source_word: מִן הַיָּקֶב
  chosen: from the winepress
  alternatives:
  - from the vat
  lexicon: HALOT
  rationale: יֶקֶב denotes the winepress or wine vat. 'Winepress' best matches the
    agricultural parallelism and common biblical usage.
