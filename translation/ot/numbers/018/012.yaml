id: NUM.18.12
reference: Numbers 18:12
source:
  edition: WLC
  text: כֹּ֚ל חֵ֣לֶב יִצְהָ֔ר וְ/כָל חֵ֖לֶב תִּיר֣וֹשׁ וְ/דָגָ֑ן רֵאשִׁיתָ֛/ם אֲשֶׁר
    יִתְּנ֥וּ לַֽ/יהוָ֖ה לְ/ךָ֥ נְתַתִּֽי/ם־־׃
translation:
  text: All the best of the oil, and all the best of the new wine and grain—their
    firstfruits, which they give to the LORD—I have given them to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'fat' of the oil/new wine/grain, an idiom for the richest or best
      portion.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵלֶב
  chosen: the best of
  alternatives:
  - fat
  - richest part
  - choicest
  lexicon: HALOT
  rationale: Although חֵלֶב literally means 'fat,' in produce contexts it idiomatically
    denotes the richest or best part. Rendering it as 'the best of' communicates the
    sense naturally in English for oil, wine, and grain.
- source_word: יִצְהָר
  chosen: oil
  alternatives:
  - fresh oil
  - olive oil
  lexicon: HALOT
  rationale: יִצְהָר refers to fresh oil, typically olive oil. 'Oil' is the clearest
    natural English rendering here; 'olive' is implied by the ancient Israelite context
    but not explicit in the word itself.
- source_word: תִּירוֹשׁ
  chosen: new wine
  alternatives:
  - wine
  - fresh wine
  - must
  lexicon: HALOT
  rationale: תִּירוֹשׁ commonly denotes freshly produced wine/new wine rather than
    wine in the most general sense. 'New wine' preserves the lexical distinction from
    other Hebrew terms for wine.
- source_word: דָגָן
  chosen: grain
  alternatives:
  - corn
  - cereal
  lexicon: HALOT
  rationale: דָגָן is a broad term for grain/cereal produce. 'Grain' is standard modern
    English and avoids the regional ambiguity of 'corn.'
- source_word: רֵאשִׁיתָם
  chosen: their firstfruits
  alternatives:
  - the first of them
  - their first portion
  lexicon: HALOT
  rationale: רֵאשִׁית often refers to the first or first portion, especially in offering
    contexts. 'Their firstfruits' fits the agricultural and cultic setting and is
    the most idiomatic English equivalent here.
- source_word: אֲשֶׁר יִתְּנוּ לַיהוָה
  chosen: which they give to the LORD
  alternatives:
  - that they present to the LORD
  - which they offer to the LORD
  lexicon: HALOT
  rationale: The clause identifies these firstfruits as those given to YHWH. 'Give'
    closely follows נתן while remaining natural English.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of יְהוָה is 'the LORD.'
- source_word: לְךָ נְתַתִּים
  chosen: I have given them to you
  alternatives:
  - I give them to you
  - I have assigned them to you
  lexicon: HALOT
  rationale: The perfect form with pronominal suffix presents the allocation as an
    established grant. 'I have given them to you' reflects the completed, declarative
    force in context.
