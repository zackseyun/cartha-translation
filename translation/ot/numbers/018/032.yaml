id: NUM.18.32
reference: Numbers 18:32
source:
  edition: WLC
  text: וְ/לֹֽא תִשְׂא֤וּ עָלָי/ו֙ חֵ֔טְא בַּ/הֲרִֽימְ/כֶ֥ם אֶת חֶלְבּ֖/וֹ מִמֶּ֑/נּוּ
    וְ/אֶת קָדְשֵׁ֧י בְנֵי יִשְׂרָאֵ֛ל לֹ֥א תְחַלְּל֖וּ וְ/לֹ֥א תָמֽוּתוּ־־־־׃פ
translation:
  text: And you will bear no sin because of it when you lift up its best part from
    it. You shall not profane the holy things of the sons of Israel, so that you may
    not die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its fat' or 'its choicest part.' The Hebrew חֶלֶב literally means 'fat,'
      but in offering contexts often refers idiomatically to the richest or best portion.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel,' a standard expression for the people of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׂאוּ ... חֵטְא
  chosen: you will bear no sin
  alternatives:
  - you will incur no guilt
  - you will not bear sin
  lexicon: HALOT
  rationale: נשא with חטא commonly expresses bearing guilt or incurring culpability.
    'Bear no sin' stays close to the Hebrew while remaining natural enough in English.
- source_word: עָלָיו
  chosen: because of it
  alternatives:
  - for it
  - on account of it
  - upon it
  lexicon: HALOT
  rationale: The preposition על with pronominal suffix here points back to the tithe/portion
    and indicates liability with respect to that matter. 'Because of it' communicates
    the causal sense more clearly than a wooden 'upon it.'
- source_word: בַּהֲרִימְכֶם
  chosen: when you lift up
  alternatives:
  - when you offer up
  - when you present as a contribution
  lexicon: HALOT
  rationale: From רום in the Hiphil, used for raising up or offering as a contribution.
    'Lift up' preserves the sacrificial/contribution imagery and matches the verbal
    root behind heave/contribution language.
- source_word: חֶלְבּוֹ
  chosen: its best part
  alternatives:
  - its fat
  - its choicest part
  lexicon: HALOT
  rationale: Though literally 'fat,' in offering contexts חלב often denotes the richest
    or best portion. Since the referent is tithe produce rather than animal fat specifically,
    'best part' best conveys the idiomatic sense.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - out of it
  - from among it
  lexicon: HALOT
  rationale: Refers to the tithe from which the best portion is taken. 'From it' is
    the most straightforward rendering.
- source_word: קָדְשֵׁי בְנֵי יִשְׂרָאֵל
  chosen: the holy things of the sons of Israel
  alternatives:
  - the holy offerings of the Israelites
  - the sacred things of the children of Israel
  lexicon: HALOT
  rationale: קדשים denotes holy things/consecrated items, here the offerings belonging
    to Israel. 'Holy things' is broad enough to preserve the Hebrew scope. 'Sons of
    Israel' follows the formal ethnic expression בני ישראל.
- source_word: תְחַלְּלוּ
  chosen: you shall not profane
  alternatives:
  - you shall not desecrate
  - you shall not treat as common
  lexicon: HALOT
  rationale: חלל in the Piel means to profane or desecrate what is holy. 'Profane'
    preserves the holiness contrast central to the verse.
- source_word: וְלֹא תָמֻתוּ
  chosen: so that you may not die
  alternatives:
  - and you shall not die
  - lest you die
  lexicon: HALOT
  rationale: The final clause gives the consequence to be avoided if the command is
    obeyed. 'So that you may not die' makes the purpose/result relationship explicit
    in natural English.
