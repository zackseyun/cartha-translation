theological_decisions:
- issue: Rendering בני ישראל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is grammatically masculine plural in a standard covenantal
    ethnonym. Per the translation philosophy, gender-accurate rendering is preferred
    unless context requires a more idiomatic collective. Here 'sons of Israel' preserves
    the source form while remaining understandable.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Idiomatic sense of חלב in cultic context
  chosen_reading: its best part
  alternative_readings:
  - its fat
  - its choicest part
  rationale: 'The verse concerns the Levites'' tithe portion and the requirement to
    set apart the choicest part. Rendering the idiom as literal ''fat'' in English
    could mislead readers into thinking animal fat is specifically in view. ''Best
    part'' preserves the cultic-theological point: the highest-quality portion belongs
    to God.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
