id: NUM.18.5
reference: Numbers 18:5
source:
  edition: WLC
  text: וּ/שְׁמַרְתֶּ֗ם אֵ֚ת מִשְׁמֶ֣רֶת הַ/קֹּ֔דֶשׁ וְ/אֵ֖ת מִשְׁמֶ֣רֶת הַ/מִּזְבֵּ֑חַ
    וְ/לֹֽא יִהְיֶ֥ה ע֛וֹד קֶ֖צֶף עַל בְּנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: And you shall keep charge of the sanctuary and the charge of the altar, so
    that there may no longer be wrath against the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or 'the children of Israel.' The Hebrew reads 'the sons
      of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁמַרְתֶּם
  chosen: And you shall keep
  alternatives:
  - And you must guard
  - And you shall observe
  lexicon: HALOT
  rationale: 'שׁמר commonly carries the sense of keeping, guarding, or observing.
    Here, with מִשְׁמֶרֶת objects, the idiom is cultic/administrative: ''keep charge''
    or ''guard the duty.'' ''You shall keep'' preserves the imperative-future force
    in direct address and works naturally with the following noun.'
- source_word: מִשְׁמֶרֶת
  chosen: charge
  alternatives:
  - duty
  - responsibility
  - guard
  lexicon: HALOT
  rationale: In priestly contexts מִשְׁמֶרֶת often denotes an assigned obligation,
    charge, or duty of guarding sacred things. 'Charge' preserves both the custodial
    and official sense better than the flatter 'duty.' Repeating it for both objects
    reflects the Hebrew repetition.
- source_word: הַ/קֹּדֶשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the holy things
  - the holiness
  lexicon: HALOT
  rationale: In this context of priestly service paired with 'the altar,' הַקֹּדֶשׁ
    refers to the sacred precinct/holy area rather than abstract holiness. 'The sanctuary'
    is the clearest natural English rendering for the cultic referent.
- source_word: הַ/מִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard and contextually precise rendering for the sacrificial altar.
- source_word: וְ/לֹא יִהְיֶה עוֹד
  chosen: so that there may no longer be
  alternatives:
  - and there will no longer be
  - and there shall not again be
  lexicon: HALOT
  rationale: 'Although formally a simple conjunction plus negated imperfect, in context
    the clause expresses purpose/result of proper priestly guarding: their keeping
    charge prevents further wrath. ''So that there may no longer be'' brings out that
    relationship in idiomatic English without over-paraphrasing. ''עוֹד'' is captured
    by ''no longer.'''
- source_word: קֶצֶף
  chosen: wrath
  alternatives:
  - anger
  - indignation
  lexicon: HALOT
  rationale: קֶצֶף in priestly/judgment contexts denotes divine wrath more strongly
    than ordinary anger. 'Wrath' preserves the gravity of covenantal judgment.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, the masculine plural construct is retained
    as 'sons of Israel.' While it refers corporately to Israel, the source expression
    is not neutralized. A more idiomatic alternative is preserved in a footnote.
