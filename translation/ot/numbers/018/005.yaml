theological_decisions:
- issue: Whether to make the final clause merely predictive ('and there will no longer
    be wrath') or purposive/resultative in relation to priestly guarding
  chosen_reading: 'Purposive/resultative: proper priestly keeping of the sanctuary
    and altar prevents further divine wrath from falling on Israel'
  alternative_readings:
  - Simple future prediction without explicit purpose nuance
  rationale: The immediate context concerns priestly and Levitical responsibilities
    established to avert unauthorized approach and consequent judgment. Rendering
    the clause with 'so that' reflects the functional logic of the passage while remaining
    faithful to the Hebrew sequence.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
- issue: Referent of divine wrath
  chosen_reading: Wrath is left implicit as divine wrath rather than explicitly adding
    'God's wrath'
  alternative_readings:
  - Explicitly 'God's wrath'
  rationale: The context makes the source of wrath clear, but the Hebrew text does
    not state the divine subject explicitly in this clause. The translation preserves
    that restraint and does not import an extra noun.
