id: NUM.18.30
reference: Numbers 18:30
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֖ אֲלֵ/הֶ֑ם בַּ/הֲרִֽימְ/כֶ֤ם אֶת חֶלְבּ/וֹ֙ מִמֶּ֔/נּוּ וְ/נֶחְשַׁב֙
    לַ/לְוִיִּ֔ם כִּ/תְבוּאַ֥ת גֹּ֖רֶן וְ/כִ/תְבוּאַ֥ת יָֽקֶב־׃
translation:
  text: And you shall say to them, ‘When you lift up its best part from it, it shall
    be counted to the Levites as the produce of the threshing floor and as the produce
    of the winepress.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'its fat'; here the term refers idiomatically to the richest or best
      portion of the produce.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  chosen: And you shall say to them
  alternatives:
  - And you must say to them
  - Then say to them
  lexicon: HALOT
  rationale: Direct second masculine singular instruction to Moses; 'shall say' preserves
    the directive force without sounding overly stiff.
- source_word: בַּהֲרִימְכֶם
  chosen: When you lift up
  alternatives:
  - When you offer up
  - When you raise
  lexicon: HALOT
  rationale: From רום in the Hiphil, commonly used for lifting up or presenting a
    contribution. 'Lift up' preserves the sacrificial/contribution idiom while remaining
    understandable in English.
- source_word: חֶלְבּוֹ
  chosen: its best part
  alternatives:
  - its fat
  - its choicest part
  lexicon: HALOT
  rationale: Though literally 'its fat,' in offering contexts חֵלֶב often denotes
    the richest or best portion. Since the referent here is tithed produce rather
    than animal fat, 'best part' communicates the idiomatic sense more clearly.
- source_word: מִמֶּנּוּ
  chosen: from it
  alternatives:
  - out of it
  lexicon: HALOT
  rationale: Straightforward pronominal prepositional phrase referring to the tithe
    from which the best portion is taken.
- source_word: וְנֶחְשַׁב
  chosen: it shall be counted
  alternatives:
  - it shall be reckoned
  - it shall be regarded
  lexicon: HALOT
  rationale: Passive of חשׁב. 'Counted' is natural English and preserves the accounting/legal
    nuance of being credited or regarded in a certain way.
- source_word: לַלְוִיִּם
  chosen: to the Levites
  alternatives:
  - for the Levites
  lexicon: HALOT
  rationale: The phrase indicates how the offering is reckoned in relation to the
    Levites. 'To the Levites' is a natural rendering of the dative relation here.
- source_word: כִּתְבוּאַת גֹּרֶן
  chosen: as the produce of the threshing floor
  alternatives:
  - like grain from the threshing floor
  - as the yield of the threshing floor
  lexicon: HALOT
  rationale: תבואה denotes produce or yield. 'Produce of the threshing floor' preserves
    the agricultural image and parallels the next phrase.
- source_word: וְכִתְבוּאַת יָקֶב
  chosen: and as the produce of the winepress
  alternatives:
  - and like the yield of the wine vat
  - and as produce from the winepress
  lexicon: HALOT
  rationale: יֶקֶב refers to a winepress or wine vat. 'Winepress' is the most familiar
    and concise English equivalent, matching the parallel structure.
