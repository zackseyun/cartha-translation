theological_decisions:
- issue: Rendering אֹהֶל הָעֵדֻת
  chosen_reading: the tent of the testimony
  alternative_readings:
  - the tent of meeting
  rationale: Although English tradition often harmonizes tabernacle phrases, the Hebrew
    in this verse specifically says 'testimony.' Following original-language primacy,
    the translation preserves this wording rather than importing the more familiar
    phrase.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
