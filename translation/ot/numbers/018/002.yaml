id: NUM.18.2
reference: Numbers 18:2
source:
  edition: WLC
  text: וְ/גַ֣ם אֶת אַחֶי/ךָ֩ מַטֵּ֨ה לֵוִ֜י שֵׁ֤בֶט אָבִ֨י/ךָ֙ הַקְרֵ֣ב אִתָּ֔/ךְ
    וְ/יִלָּו֥וּ עָלֶ֖י/ךָ וִֽ/ישָׁרְת֑וּ/ךָ וְ/אַתָּה֙ וּ/בָנֶ֣י/ךָ אִתָּ֔/ךְ לִ/פְנֵ֖י
    אֹ֥הֶל הָ/עֵדֻֽת־׃
translation:
  text: And also bring near with you your brothers, the tribe of Levi, the tribe of
    your father, so that they may be joined to you and serve you, while you and your
    sons with you are before the tent of the testimony.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'that they may accompany you' or 'be attached to you'; the Hebrew verb
      also echoes the name Levi.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''the tent of the testimony''; many English versions read ''tent
      of meeting'' here by familiarity with related tabernacle expressions.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  chosen: And also
  alternatives:
  - Moreover
  - And furthermore
  lexicon: HALOT
  rationale: Conveys the additive force of the conjunction plus adverb at the start
    of the instruction.
- source_word: אַחֶיךָ
  chosen: your brothers
  alternatives:
  - your kinsmen
  - your fellow Levites
  lexicon: HALOT
  rationale: Literal familial language is retained; in context it refers to Aaron's
    fellow Levites, but 'brothers' best preserves the Hebrew wording and representative
    kinship sense.
- source_word: מַטֵּה לֵוִי
  chosen: the tribe of Levi
  alternatives:
  - the staff of Levi
  - the branch of Levi
  lexicon: HALOT
  rationale: Here מַטֶּה is the standard tribal designation, not a physical staff;
    'tribe of Levi' is the clear contextual sense.
- source_word: שֵׁבֶט אָבִיךָ
  chosen: the tribe of your father
  alternatives:
  - your father's tribe
  - the clan of your father
  lexicon: HALOT
  rationale: Appositional phrase further identifying Levi as Aaron's ancestral tribe.
    'The tribe of your father' keeps the Hebrew structure while remaining natural
    English.
- source_word: הַקְרֵב
  chosen: bring near
  alternatives:
  - present
  - bring
  lexicon: HALOT
  rationale: The Hiphil of קרב commonly means to bring near/present for service. 'Bring
    near' preserves the cultic nuance without over-paraphrase.
- source_word: אִתָּךְ
  chosen: with you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: Expresses accompaniment in relation to Aaron.
- source_word: וְיִלָּווּ עָלֶיךָ
  chosen: so that they may be joined to you
  alternatives:
  - that they may accompany you
  - that they may be attached to you
  lexicon: HALOT
  rationale: The Niphal of לוה carries the sense of joining/attaching oneself. This
    also plays on the name Levi. 'Joined to you' preserves the relational and service
    nuance better than the weaker 'accompany.'
- source_word: וִישָׁרְתוּךָ
  chosen: and serve you
  alternatives:
  - and minister to you
  lexicon: HALOT
  rationale: שרת denotes service/ministering. 'Serve you' is clearer modern English;
    'minister' is possible but can sound ecclesiastical and less direct.
- source_word: וְאַתָּה וּבָנֶיךָ אִתָּךְ
  chosen: while you and your sons with you
  alternatives:
  - and you and your sons with you
  lexicon: HALOT
  rationale: The clause marks Aaron and his sons as the corresponding priestly party
    in contrast to the Levites. 'While' brings out the relationship between the clauses
    in natural English.
- source_word: לִפְנֵי אֹהֶל הָעֵדֻת
  chosen: are before the tent of the testimony
  alternatives:
  - are before the tent of meeting
  - are before the tabernacle of the testimony
  lexicon: HALOT
  rationale: The Hebrew here is literally 'tent of the testimony,' not the more common
    'tent of meeting.' The translation follows the source text's plain sense and preserves
    the covenant-witness nuance of עֵדוּת.
