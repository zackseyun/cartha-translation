id: NUM.18.21
reference: Numbers 18:21
source:
  edition: WLC
  text: וְ/לִ/בְנֵ֣י לֵוִ֔י הִנֵּ֥ה נָתַ֛תִּי כָּל מַֽעֲשֵׂ֥ר בְּ/יִשְׂרָאֵ֖ל לְ/נַחֲלָ֑ה
    חֵ֤לֶף עֲבֹֽדָתָ/ם֙ אֲשֶׁר הֵ֣ם עֹֽבְדִ֔ים אֶת עֲבֹדַ֖ת אֹ֥הֶל מוֹעֵֽד־־־׃
translation:
  text: And to the sons of Levi, behold, I have given every tithe in Israel as an
    inheritance, in return for their service that they perform, the service of the
    tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the tithe in Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'instead of their service' or 'as compensation for their service.'
    reason: lexical_alternative
  - marker: c
    text: That is, the tabernacle, where the Levites carried out their assigned duties.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/לִ/בְנֵי לֵוִי
  chosen: And to the sons of Levi
  alternatives:
  - And to the Levites
  - Now to the sons of Levi
  lexicon: HALOT
  rationale: Literally 'and to the sons of Levi.' Retaining 'sons of Levi' preserves
    the genealogical phrasing of the Hebrew. 'Levites' is a natural English alternative
    but is slightly less formally transparent.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  - indeed
  lexicon: HALOT
  rationale: הִנֵּה marks emphasis and draws attention to the declaration. 'Behold'
    preserves that discourse force with a dignified but still recognizable English
    equivalent.
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I give
  - I gave
  lexicon: HALOT
  rationale: The perfect form can be rendered as a completed present grant in context.
    'I have given' communicates a settled divine provision better than a simple past,
    while remaining close to the Hebrew aspect.
- source_word: כָּל מַעֲשֵׂר בְּיִשְׂרָאֵל
  chosen: every tithe in Israel
  alternatives:
  - all the tithe in Israel
  - every tenth part in Israel
  lexicon: HALOT
  rationale: מַעֲשֵׂר refers to the tithe. 'Every tithe in Israel' is natural modern
    English and reflects כָּל with distributive force. 'All the tithe' is possible
    but less idiomatic.
- source_word: לְנַחֲלָה
  chosen: as an inheritance
  alternatives:
  - for an inheritance
  - as a possession
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes inheritance/allocated possession. 'As an inheritance'
    fits the legal-allotment context and reads naturally in English.
- source_word: חֵלֶף
  chosen: in return for
  alternatives:
  - instead of
  - as compensation for
  - in exchange for
  lexicon: HALOT
  rationale: חֵלֶף indicates exchange or compensation. 'In return for' best conveys
    that the tithe is given as recompense for Levitical service without sounding overly
    commercial.
- source_word: עֲבֹדָתָם
  chosen: their service
  alternatives:
  - their work
  - their ministry
  lexicon: HALOT
  rationale: עֲבֹדָה can mean work or service. Here it refers to cultic duty, so 'service'
    is broad enough to preserve both labor and sacred function. 'Ministry' would import
    later ecclesial language.
- source_word: אֲשֶׁר הֵם עֹבְדִים
  chosen: that they perform
  alternatives:
  - which they serve
  - that they do
  lexicon: HALOT
  rationale: The relative clause explains the service rendered by the Levites. 'That
    they perform' is idiomatic English and avoids the awkward repetition of 'serve
    ... service' while preserving the sense.
- source_word: אֶת עֲבֹדַת אֹהֶל מוֹעֵד
  chosen: the service of the tent of meeting
  alternatives:
  - the work of the tent of meeting
  - the service at the tent of meeting
  lexicon: HALOT
  rationale: The phrase denotes the cultic duties associated with the tabernacle.
    'The service of the tent of meeting' stays close to the Hebrew construct chain.
    'At the tent of meeting' is interpretive and slightly less formal.
