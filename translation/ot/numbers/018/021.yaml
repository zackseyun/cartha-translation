theological_decisions:
- issue: Rendering of Levitical compensation language
  chosen_reading: The tithe is presented as an inheritance given in return for Levitical
    service.
  alternative_readings:
  - The tithe is simply assigned to the Levites without emphasis on compensation
  - The tithe replaces a land inheritance only implicitly
  rationale: The verse explicitly combines לְנַחֲלָה ('as an inheritance') with חֵלֶף
    עֲבֹדָתָם ('in return for their service'). The translation preserves both ideas
    without collapsing one into the other.
