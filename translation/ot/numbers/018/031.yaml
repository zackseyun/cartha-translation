id: NUM.18.31
reference: Numbers 18:31
source:
  edition: WLC
  text: וַ/אֲכַלְתֶּ֤ם אֹת/וֹ֙ בְּ/כָל מָק֔וֹם אַתֶּ֖ם וּ/בֵֽיתְ/כֶ֑ם כִּֽי שָׂכָ֥ר
    הוּא֙ לָ/כֶ֔ם חֵ֥לֶף עֲבֹֽדַתְ/כֶ֖ם בְּ/אֹ֥הֶל מוֹעֵֽד־־׃
translation:
  text: You and your household may eat it in any place, because it is your wages in
    return for your service in the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shall eat it' or 'are to eat it'; the Hebrew form in this legal context
      can express instruction or permitted action rather than simple past time.
    reason: lexical_alternative
  - marker: b
    text: '''Household'' refers to the domestic unit, not merely the physical house.'
    reason: cultural_note
  - marker: c
    text: Or 'reward,' 'payment,' or 'compensation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲכַלְתֶּם אֹתוֹ
  chosen: may eat it
  alternatives:
  - shall eat it
  - are to eat it
  lexicon: HALOT
  rationale: The Hebrew form gives an instruction/consequence in context rather than
    simple past narrative in English. 'May eat it' communicates permitted consumption
    of the tithe portion, fitting the legal context better than a bare preterite.
- source_word: בְּכָל מָקוֹם
  chosen: in any place
  alternatives:
  - in every place
  - wherever
  lexicon: HALOT
  rationale: The phrase indicates lack of sanctuary restriction for eating this portion.
    'In any place' is natural modern English and preserves the distributive sense.
- source_word: אַתֶּם וּבֵיתְכֶם
  chosen: you and your household
  alternatives:
  - you and your house
  - you and your family
  lexicon: HALOT
  rationale: '''Household'' best captures בית in this legal-domestic context, including
    the family unit under one''s roof, without sounding overly literal or too narrow.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the permission. 'Because' is clearer in contemporary
    English, though 'for' would be more formally traditional.
- source_word: שָׂכָר
  chosen: wages
  alternatives:
  - reward
  - payment
  - compensation
  lexicon: HALOT
  rationale: The term denotes remuneration for labor. 'Wages' clearly conveys earned
    compensation and fits the priestly-service context.
- source_word: חֵלֶף
  chosen: in return for
  alternatives:
  - instead of
  - as compensation for
  - in exchange for
  lexicon: HALOT
  rationale: Here the preposition marks recompense corresponding to service rendered.
    'In return for' is idiomatic and avoids implying mere substitution detached from
    compensation.
- source_word: עֲבֹדַתְכֶם
  chosen: your service
  alternatives:
  - your work
  - your labor
  lexicon: HALOT
  rationale: The noun refers to assigned cultic labor. 'Service' preserves the formal,
    ministerial nuance better than the more generic 'work' or 'labor'.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: This is the standard rendering of the tabernacle designation. 'In' follows
    the Hebrew preposition and suits the idea of service performed in connection with
    the sanctuary.
