id: NUM.18.9
reference: Numbers 18:9
source:
  edition: WLC
  text: זֶֽה יִהְיֶ֥ה לְ/ךָ֛ מִ/קֹּ֥דֶשׁ הַ/קֳּדָשִׁ֖ים מִן הָ/אֵ֑שׁ כָּל קָ֠רְבָּנָ/ם
    לְֽ/כָל מִנְחָתָ֞/ם וּ/לְ/כָל חַטָּאתָ֗/ם וּ/לְ/כָל אֲשָׁמָ/ם֙ אֲשֶׁ֣ר יָשִׁ֣יבוּ
    לִ֔/י קֹ֣דֶשׁ קָֽדָשִׁ֥ים לְ/ךָ֛ ה֖וּא וּ/לְ/בָנֶֽי/ךָ־־־־־־׃
translation:
  text: 'This shall be yours from the most holy things reserved from the fire: every
    offering of theirs, every grain offering of theirs, every sin offering of theirs,
    and every guilt offering of theirs, which they return to me. It is most holy for
    you and for your sons.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the fire.' The Hebrew is literal; 'reserved from the fire' brings
      out the sense of portions set apart from offerings presented by fire.
    reason: lexical_alternative
  - marker: b
    text: '''Sin offering'' may also be rendered ''purification offering.'''
    reason: lexical_alternative
  - marker: c
    text: '''Guilt offering'' may also be rendered ''reparation offering.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקֹּדֶשׁ הַקֳּדָשִׁים
  chosen: from the most holy things
  alternatives:
  - from the holy of holies
  - from the holiest things
  lexicon: HALOT
  rationale: The construct/superlative expression denotes the highest degree of holiness
    for sacrificial portions, not the sanctuary room itself in this context. 'Most
    holy things' is idiomatic and contextually precise.
- source_word: מִן הָאֵשׁ
  chosen: reserved from the fire
  alternatives:
  - from the fire
  - out of the fire
  lexicon: HALOT
  rationale: Literally 'from the fire.' In context of priestly portions from offerings,
    the sense is the portion set apart from what is presented by fire. 'Reserved from
    the fire' makes the cultic sense clear in natural English without over-paraphrasing.
- source_word: קָרְבָּנָם
  chosen: offering of theirs
  alternatives:
  - gift of theirs
  - presentation of theirs
  lexicon: HALOT
  rationale: קָרְבָּן is a general term for an offering brought near to God. 'Offering'
    is the standard clear rendering here.
- source_word: מִנְחָתָם
  chosen: grain offering of theirs
  alternatives:
  - tribute offering of theirs
  - gift offering of theirs
  lexicon: HALOT
  rationale: In priestly sacrificial contexts, מִנְחָה commonly refers to the cereal/grain
    offering. 'Grain offering' is specific and conventional.
- source_word: חַטָּאתָם
  chosen: sin offering of theirs
  alternatives:
  - purification offering of theirs
  lexicon: HALOT
  rationale: While חַטָּאת can denote either 'sin' or the offering associated with
    sin/purification, in this sacrificial list it clearly refers to the offering.
    'Sin offering' is the most recognizable rendering; the alternative 'purification
    offering' is worth preserving because many scholars stress the ritual-purification
    nuance.
- source_word: אֲשָׁמָם
  chosen: guilt offering of theirs
  alternatives:
  - reparation offering of theirs
  lexicon: HALOT
  rationale: In sacrificial legislation, אָשָׁם denotes the guilt/reparation offering.
    'Guilt offering' is standard; 'reparation offering' captures the compensatory
    aspect and is preserved as an alternative.
- source_word: אֲשֶׁר יָשִׁיבוּ לִי
  chosen: which they return to me
  alternatives:
  - which they render to me
  - which they repay to me
  lexicon: HALOT
  rationale: The Hiphil of שוב can mean 'restore/return.' Here it refers to offerings
    given back to God, likely especially in restitution contexts, but also summing
    the listed offerings. 'Return to me' preserves the verbal imagery without narrowing
    the sense too much.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: most holy
  alternatives:
  - holy of holies
  - supremely holy
  lexicon: HALOT
  rationale: Predicate use here describes the status of these portions. 'Most holy'
    is concise and idiomatic in English for sacrificial holiness.
- source_word: לְךָ ... וּלְבָנֶיךָ
  chosen: for you and for your sons
  alternatives:
  - belonging to you and to your sons
  lexicon: HALOT
  rationale: The addressees are Aaron and his male priestly descendants. Per gender-accurate
    policy, 'sons' is retained rather than neutralizing to 'children,' since the priestly
    office is specifically in view.
