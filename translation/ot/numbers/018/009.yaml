theological_decisions:
- issue: Rendering of priestly holiness terminology without conflating sacrificial
    status with the inner sanctuary
  chosen_reading: most holy things / most holy
  alternative_readings:
  - holy of holies
  rationale: The Hebrew phrase can be rendered woodenly as 'holy of holies,' but here
    it refers to the classification of offerings rather than the sanctuary chamber.
    The translation preserves the cultic category without importing a spatial reference
    the verse does not make.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Gendered reference to Aaron's descendants
  chosen_reading: sons
  alternative_readings:
  - children
  - descendants
  rationale: The Hebrew explicitly says 'your sons,' and in this priestly context
    the male reference is not merely generic. This follows the gender-accurate policy
    and avoids flattening the text's cultic specificity.
  doctrine_reference: Translation philosophy §4
