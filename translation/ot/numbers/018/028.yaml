id: NUM.18.28
reference: Numbers 18:28
source:
  edition: WLC
  text: כֵּ֣ן תָּרִ֤ימוּ גַם אַתֶּם֙ תְּרוּמַ֣ת יְהוָ֔ה מִ/כֹּל֙ מַעְשְׂרֹ֣תֵי/כֶ֔ם
    אֲשֶׁ֣ר תִּקְח֔וּ מֵ/אֵ֖ת בְּנֵ֣י יִשְׂרָאֵ֑ל וּ/נְתַתֶּ֤ם מִמֶּ֨/נּוּ֙ אֶת תְּרוּמַ֣ת
    יְהוָ֔ה לְ/אַהֲרֹ֖ן הַ/כֹּהֵֽן־־׃
translation:
  text: So you also shall present the LORD’s contribution from all your tithes, which
    you receive from the sons of Israel, and from it you shall give the LORD’s contribution
    to Aaron the priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' for 'the sons of Israel.' The Hebrew expression is literally
      'sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  chosen: So
  alternatives:
  - Thus
  - In this way
  lexicon: HALOT
  rationale: Introduces the instruction as corresponding to the preceding command.
    'So' is natural modern English and preserves the inferential force.
- source_word: תָּרִימוּ
  chosen: shall present
  alternatives:
  - shall lift up
  - shall offer
  lexicon: HALOT
  rationale: The Hiphil of רום with תְּרוּמָה language refers to setting apart/presenting
    an offering. 'Present' captures the ritual action in readable English without
    overly literal 'lift up'.
- source_word: גַם אַתֶּם
  chosen: you also
  alternatives:
  - even you
  - you too
  lexicon: HALOT
  rationale: Emphasizes that the Levites, like Israel, must set apart an offering.
    'You also' is the clearest idiomatic rendering.
- source_word: תְּרוּמַת יְהוָה
  chosen: the LORD’s contribution
  alternatives:
  - the contribution for the LORD
  - the LORD’s offering
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution/set-apart portion. 'Contribution' avoids
    narrowing the term to a specific sacrificial act while preserving the idea of
    a portion dedicated to the LORD.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: מִכֹּל מַעְשְׂרֹתֵיכֶם
  chosen: from all your tithes
  alternatives:
  - out of all your tenth-parts
  lexicon: HALOT
  rationale: מַעֲשֵׂר is the standard term for 'tithe.' 'From all your tithes' accurately
    reflects the preposition and plural form.
- source_word: אֲשֶׁר תִּקְחוּ מֵאֵת בְּנֵי יִשְׂרָאֵל
  chosen: which you receive from the sons of Israel
  alternatives:
  - which you take from the Israelites
  - that you receive from the people of Israel
  lexicon: HALOT
  rationale: Though לקח often means 'take,' in this administrative cultic context
    'receive' better reflects the Levites' lawful reception of the tithe. 'Sons of
    Israel' preserves the formal covenantal expression and masculine form of the source.
- source_word: וּנְתַתֶּם מִמֶּנּוּ
  chosen: and from it you shall give
  alternatives:
  - and you shall give from it
  - and out of it you shall give
  lexicon: HALOT
  rationale: 'Keeps the sequence and the partitive sense explicit: a portion is to
    be given from the tithes received.'
- source_word: לְאַהֲרֹן הַכֹּהֵן
  chosen: to Aaron the priest
  alternatives:
  - for Aaron the priest
  lexicon: HALOT
  rationale: The lamed here is naturally rendered 'to,' indicating the recipient of
    the contribution. The appositional title is retained.
