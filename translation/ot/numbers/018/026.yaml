theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton, aligning
    with Jewish reverence tradition and common English Bible practice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The source is grammatically masculine and refers to the covenant people
    through the standard Hebrew expression. Per the project's gender-accurate policy,
    the masculine form is preserved rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
