id: NUM.18.26
reference: Numbers 18:26
source:
  edition: WLC
  text: וְ/אֶל הַ/לְוִיִּ֣ם תְּדַבֵּר֮ וְ/אָמַרְתָּ֣ אֲלֵ/הֶם֒ כִּֽי תִ֠קְחוּ מֵ/אֵ֨ת
    בְּנֵֽי יִשְׂרָאֵ֜ל אֶת הַֽ/מַּעֲשֵׂ֗ר אֲשֶׁ֨ר נָתַ֧תִּי לָ/כֶ֛ם מֵ/אִתָּ֖/ם בְּ/נַחֲלַתְ/כֶ֑ם
    וַ/הֲרֵמֹתֶ֤ם מִמֶּ֨/נּוּ֙ תְּרוּמַ֣ת יְהוָ֔ה מַעֲשֵׂ֖ר מִן הַֽ/מַּעֲשֵֽׂר־־־־־׃
translation:
  text: 'And to the Levites you shall speak and say to them: When you take from the
    sons of Israel the tithe that I have given you from them as your inheritance,
    then you shall present from it the LORD’s contribution, a tithe from the tithe.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites” or “the people of Israel.” The Hebrew reads “the sons
      of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “the contribution for the LORD”; traditionally, “the heave offering of
      the LORD.”
    reason: lexical_alternative
  - marker: c
    text: Literally, “a tithe from the tithe,” that is, a tenth of the tithe received
      by the Levites.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the Levitical men
  lexicon: HALOT
  rationale: Standard ethnic/tribal designation for members of Levi; 'Levites' is
    the natural English equivalent.
- source_word: תְּדַבֵּר ... וְאָמַרְתָּ
  chosen: you shall speak and say
  alternatives:
  - you shall speak ... and tell
  - you shall say
  lexicon: HALOT
  rationale: Retains the Hebrew legal-instruction formula with two verbs rather than
    collapsing them, while remaining readable in English.
- source_word: כִּי תִקְחוּ
  chosen: When you take
  alternatives:
  - For when you take
  - If you take
  lexicon: HALOT
  rationale: Here כִּי introduces the circumstance under which the command applies.
    'When' fits the procedural sense better than a causal 'for' or a more conditional
    'if'.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Chosen to preserve the gender-accurate form of the Hebrew expression
    per translation philosophy. 'Israelites' is possible, but the source explicitly
    says 'sons.'
- source_word: הַמַּעֲשֵׂר
  chosen: the tithe
  alternatives:
  - the tenth
  lexicon: HALOT
  rationale: Established and precise rendering for the required tenth portion in cultic
    law.
- source_word: אֲשֶׁר נָתַתִּי לָכֶם מֵאִתָּם
  chosen: that I have given you from them
  alternatives:
  - which I gave to you from them
  - that I have assigned to you out of what comes from them
  lexicon: HALOT
  rationale: 'Preserves the divine gift language and the source relationship: the
    tithe comes from Israel and is given by God to the Levites.'
- source_word: בְּנַחֲלַתְכֶם
  chosen: as your inheritance
  alternatives:
  - for your inheritance
  - as your allotted possession
  lexicon: HALOT
  rationale: Conveys the Levites' divinely assigned share in place of landed inheritance.
    'As your inheritance' reads naturally and reflects predicative force.
- source_word: וַהֲרֵמֹתֶם
  chosen: you shall present
  alternatives:
  - you shall lift up
  - you shall offer up
  - you shall set apart
  lexicon: HALOT
  rationale: From רום in the Hiphil in sacrificial/tribute contexts, the sense is
    to present or offer as a raised contribution. 'Present' is clear modern English
    without losing cultic force.
- source_word: תְּרוּמַת יְהוָה
  chosen: the LORD’s contribution
  alternatives:
  - the contribution for the LORD
  - the LORD’s offering
  - the heave offering of the LORD
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution/set-apart portion. 'Heave offering'
    is traditional but opaque in modern English. The genitive can be rendered as belonging
    to or designated for the LORD; 'the LORD’s contribution' is concise and idiomatic.
- source_word: מַעֲשֵׂר מִן הַמַּעֲשֵׂר
  chosen: a tithe from the tithe
  alternatives:
  - a tenth of the tithe
  - the tithe of the tithe
  lexicon: HALOT
  rationale: This phrase specifies that the Levites must give a tenth portion out
    of the tithe they receive. 'A tithe from the tithe' is both literal and understandable.
