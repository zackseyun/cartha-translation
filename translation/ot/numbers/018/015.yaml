theological_decisions:
- issue: Rendering of אָדָם in contrast with beast
  chosen_reading: man
  alternative_readings:
  - human
  - humankind
  rationale: The verse contrasts human firstborn with animal firstborn. 'Man' is gender-accurate
    to the Hebrew and fits the doctrine guideline to prefer source-matching forms
    over neutralization when representative force is intended.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table
    for אָדָם
- issue: Nature of priestly claim over firstborn
  chosen_reading: The firstborn belong to the priest, with the explicit qualification
    that human firstborn and unclean animal firstborn are redeemed rather than literally
    offered.
  alternative_readings:
  - Treating 'present to the LORD' as implying sacrifice in every case
  rationale: The immediate qualification in the verse itself prevents an overreading
    that all firstborn are sacrificed. The translation therefore uses 'present' rather
    than a narrower sacrificial term in the main clause.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 and §3
