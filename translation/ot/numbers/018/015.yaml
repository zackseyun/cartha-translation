id: NUM.18.15
reference: Numbers 18:15
source:
  edition: WLC
  text: כָּל פֶּ֣טֶר רֶ֠חֶם לְֽ/כָל בָּשָׂ֞ר אֲשֶׁר יַקְרִ֧יבוּ לַֽ/יהוָ֛ה בָּ/אָדָ֥ם
    וּ/בַ/בְּהֵמָ֖ה יִֽהְיֶה לָּ֑/ךְ אַ֣ךְ פָּדֹ֣ה תִפְדֶּ֗ה אֵ֚ת בְּכ֣וֹר הָֽ/אָדָ֔ם
    וְ/אֵ֛ת בְּכֽוֹר הַ/בְּהֵמָ֥ה הַ/טְּמֵאָ֖ה תִּפְדֶּֽה־־־־׀־׃
translation:
  text: Every firstborn that opens the womb, of all flesh that they present to the
    LORD, whether man or beast, shall be yours. Nevertheless, you must surely redeem
    the firstborn of man, and you must redeem the firstborn of the unclean beast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whatever opens the womb.' The Hebrew idiom refers to the first offspring
      to emerge from the womb.
    reason: lexical_alternative
  - marker: b
    text: Or 'that they offer to the LORD.' The verb can mean 'bring near' or 'present'
      in offering contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּטֶר רֶחֶם
  chosen: firstborn that opens the womb
  alternatives:
  - first issue of the womb
  - whatever opens the womb
  lexicon: HALOT
  rationale: The idiom denotes the first offspring to emerge from the womb. 'Firstborn
    that opens the womb' preserves the Hebrew imagery while remaining natural English.
- source_word: כָּל ... לְכָל בָּשָׂר
  chosen: Every ... of all flesh
  alternatives:
  - Every ... among all flesh
  - Every womb-opener of every living being
  lexicon: HALOT
  rationale: כָּל with לְכָל בָּשָׂר gives a comprehensive scope. 'Of all flesh' preserves
    the broad category of animate creatures without over-paraphrasing.
- source_word: אֲשֶׁר יַקְרִיבוּ לַיהוָה
  chosen: that they present to the LORD
  alternatives:
  - that they bring near to the LORD
  - that they offer to the LORD
  lexicon: HALOT
  rationale: הקריב in sacrificial/dedication contexts means to bring near or present
    as an offering. 'Present' is clear and broad enough here because the verse includes
    both human and animal firstborn, not all of which are literally sacrificed.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: בָּאָדָם וּבַבְּהֵמָה
  chosen: whether man or beast
  alternatives:
  - among man and among beast
  - in man and in beast
  - human or animal
  lexicon: HALOT
  rationale: The phrase marks the two domains in which the firstborn principle applies.
    'Whether man or beast' is concise, idiomatic, and preserves the human/animal distinction.
- source_word: יִהְיֶה לָּךְ
  chosen: shall be yours
  alternatives:
  - shall belong to you
  lexicon: HALOT
  rationale: This indicates priestly entitlement. 'Shall be yours' is direct and natural.
- source_word: אַךְ
  chosen: Nevertheless
  alternatives:
  - Only
  - However
  - But
  lexicon: HALOT
  rationale: אַךְ introduces an important qualification to the preceding grant. 'Nevertheless'
    captures the restrictive/adversative force in context.
- source_word: פָּדֹה תִפְדֶּה
  chosen: you must surely redeem
  alternatives:
  - you shall surely redeem
  - you must redeem
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the command. 'Must
    surely redeem' reflects both obligation and emphasis.
- source_word: בְּכוֹר הָאָדָם
  chosen: the firstborn of man
  alternatives:
  - the firstborn human
  - the firstborn of humankind
  lexicon: HALOT
  rationale: אָדָם here refers to a human being in contrast with beast. 'Man' follows
    the doctrine's gender-accurate guidance and preserves the singular collective
    contrast.
- source_word: בְּכוֹר הַבְּהֵמָה הַטְּמֵאָה
  chosen: the firstborn of the unclean beast
  alternatives:
  - the firstborn of the unclean animal
  - the firstborn of unclean livestock
  lexicon: HALOT
  rationale: The phrase refers to animals not suitable for sacrifice and therefore
    to be redeemed rather than offered. 'Unclean beast' is a close rendering of the
    Hebrew categories.
