theological_decisions:
- issue: Rendering the technical cultic term חֵרֶם
  chosen_reading: devoted thing
  alternative_readings:
  - something devoted to destruction
  - ban
  rationale: The verse concerns priestly rights over items irrevocably devoted within
    Israel. Because חֵרֶם can denote either devotion to God generally or devotion
    involving destruction depending on context, the translation preserves the broader
    technical sense in the main text and notes the stronger alternative in a footnote
    rather than narrowing the meaning beyond what this verse explicitly states.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
