id: NUM.18.14
reference: Numbers 18:14
source:
  edition: WLC
  text: כָּל חֵ֥רֶם בְּ/יִשְׂרָאֵ֖ל לְ/ךָ֥ יִהְיֶֽה־׃
translation:
  text: Every devoted thing in Israel shall be yours.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everything under the ban in Israel'; חֵרֶם refers to something irrevocably
      devoted to God, in some contexts devoted to destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: Every
  alternatives:
  - All
  lexicon: HALOT
  rationale: Quantifier introducing the totality of the category. 'Every' works naturally
    with the singular collective noun 'thing' in English; 'all' would also be possible
    but is slightly less idiomatic here.
- source_word: חֵרֶם
  chosen: devoted thing
  alternatives:
  - something devoted to destruction
  - ban
  - devoted offering
  lexicon: HALOT
  rationale: חֵרֶם denotes something placed under ban, devoted irrevocably to God,
    often with the implication that it is removed from ordinary human use and in some
    contexts destroyed. In this priestly allocation context, 'devoted thing' best
    preserves the technical sense without importing destruction into the main text
    where the verse itself does not specify it. Alternatives are worth preserving
    because the term is theologically and legally loaded.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: 'The preposition ב marks location/sphere. ''In Israel'' is the most straightforward
    rendering and fits the legal setting: anything falling under this category within
    Israel belongs to Aaron.'
- source_word: לְךָ
  chosen: yours
  alternatives:
  - for you
  - shall belong to you
  lexicon: HALOT
  rationale: The lamed plus pronoun indicates possession/assignment to Aaron. 'Yours'
    is concise and idiomatic in English while preserving the sense of legal entitlement.
- source_word: יִהְיֶה
  chosen: shall be
  alternatives:
  - will be
  - shall belong
  lexicon: HALOT
  rationale: Simple imperfect of היה expressing future/legal assignment. 'Shall be'
    fits the prescriptive tone of the priestly legislation and pairs naturally with
    'yours'.
