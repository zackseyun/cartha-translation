id: NUM.18.11
reference: Numbers 18:11
source:
  edition: WLC
  text: וְ/זֶה לְּ/ךָ֞ תְּרוּמַ֣ת מַתָּנָ֗/ם לְ/כָל תְּנוּפֹת֮ בְּנֵ֣י יִשְׂרָאֵל֒
    לְ/ךָ֣ נְתַתִּ֗י/ם וּ/לְ/בָנֶ֧י/ךָ וְ/לִ/בְנֹתֶ֛י/ךָ אִתְּ/ךָ֖ לְ/חָק עוֹלָ֑ם
    כָּל טָה֥וֹר בְּ/בֵיתְ/ךָ֖ יֹאכַ֥ל אֹתֽ/וֹ־־־־׃
translation:
  text: 'And this is yours: the contribution from their gifts, from all the wave offerings
    of the sons of Israel. I have given them to you, and to your sons and your daughters
    with you, as a permanent statute. Everyone in your house who is clean may eat
    it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heave offering' for 'the contribution'; the Hebrew term refers to a
      portion set apart for sacred use.
    reason: lexical_alternative
  - marker: b
    text: '''Clean'' here means ritually clean, not merely physically clean or morally
      upright.'
    reason: cultural_note
lexical_decisions:
- source_word: תְּרוּמַת
  chosen: the contribution
  alternatives:
  - the heave offering
  - the offering
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution or offering set apart and lifted up
    for sacred use. 'Contribution' is clear modern English and fits the cultic context
    without relying on archaic terminology like 'heave offering.'
- source_word: מַתָּנָם
  chosen: their gifts
  alternatives:
  - their offerings
  - their donations
  lexicon: HALOT
  rationale: From מַתָּנָה, 'gift.' The pronominal suffix is plural ('their'). 'Gifts'
    preserves the basic lexical sense and avoids collapsing it into a more technical
    sacrificial term than the Hebrew itself uses here.
- source_word: תְּנוּפֹת
  chosen: wave offerings
  alternatives:
  - offerings presented by waving
  - elevated offerings
  lexicon: HALOT
  rationale: תְּנוּפָה is the standard technical term for an offering ritually waved
    before God. 'Wave offerings' is the established and accurate cultic rendering.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Following the gender-accurate principle, the formal expression is retained
    as 'sons of Israel.' It is a conventional collective designation, but the translation
    preserves the source form rather than neutralizing it.
- source_word: נְתַתִּים
  chosen: I have given them
  alternatives:
  - I give them
  - I have assigned them
  lexicon: HALOT
  rationale: The perfect with object suffix refers to the designated portions just
    mentioned. English present perfect communicates the completed grant with present
    force in context.
- source_word: וּלְבָנֶיךָ וְלִבְנֹתֶיךָ אִתָּךְ
  chosen: and to your sons and your daughters with you
  alternatives:
  - and to your sons and daughters with you
  - and to your children with you
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sons and daughters; the translation
    preserves both rather than compressing to 'children.' 'With you' indicates those
    belonging to Aaron's household sphere.
- source_word: לְחָק עוֹלָם
  chosen: as a permanent statute
  alternatives:
  - as a perpetual statute
  - as an everlasting due
  lexicon: HALOT
  rationale: חֹק is a fixed statute or prescribed due. עוֹלָם here indicates enduring
    continuance within the covenantal order. 'Permanent statute' is readable modern
    English while preserving the legal force.
- source_word: כָּל טָהוֹר
  chosen: Everyone ... who is clean
  alternatives:
  - Every clean person
  - Anyone ... who is ceremonially clean
  lexicon: HALOT
  rationale: טָהוֹר in priestly material refers to ritual cleanness. 'Who is clean'
    is concise in the main text; the cultic nuance can be clarified in a footnote.
- source_word: בְּבֵיתְךָ
  chosen: in your house
  alternatives:
  - in your household
  - among your household
  lexicon: HALOT
  rationale: The phrase denotes the household sphere. 'In your house' is a close rendering;
    in English it naturally implies household membership in this context.
- source_word: יֹאכַל אֹתוֹ
  chosen: may eat it
  alternatives:
  - shall eat it
  - is permitted to eat it
  lexicon: HALOT
  rationale: The imperfect here expresses permitted entitlement. 'May eat it' captures
    the legal allowance more naturally than a simple future.
