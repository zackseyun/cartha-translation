theological_decisions:
- issue: Ritual purity language
  chosen_reading: Rendered טָהוֹר as 'clean' in a priestly/ritual sense, not moral
    purity.
  alternative_readings:
  - morally pure
  - pure
  rationale: The context is sacrificial entitlement within priestly law. The verse
    regulates who in Aaron's household may consume holy portions, so ritual cleanness
    is the intended category.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
