theological_decisions:
- issue: Rendering of priestly entitlement language in לְמָשְׁחָה
  chosen_reading: as your anointing portion
  alternative_readings:
  - for an anointing
  - as your consecrated due
  rationale: The phrase is tied to Aaron's priestly consecration and office, not to a fresh ritual act in this verse. The chosen rendering preserves that the holy gifts belong to Aaron by virtue of his anointed priesthood without importing later doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Rendering בְנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - people of Israel
  - Israelites
  rationale: The Hebrew expression is formally masculine plural and here functions as the covenantal national designation. Per the project's gender-accurate policy, the traditional literal form is retained rather than flattened to a neutral collective.
  doctrine_reference: Translation philosophy §4
