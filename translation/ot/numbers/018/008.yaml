id: NUM.18.8
reference: Numbers 18:8
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר יְהוָה֮ אֶֽל אַהֲרֹן֒ וַ/אֲנִי֙ הִנֵּ֣ה נָתַ֣תִּֽי לְ/ךָ֔ אֶת מִשְׁמֶ֖רֶת תְּרוּמֹתָ֑/י לְ/כָל קָדְשֵׁ֣י בְנֵֽי יִ֠שְׂרָאֵל לְ/ךָ֨ נְתַתִּ֧י/ם לְ/מָשְׁחָ֛ה וּ/לְ/בָנֶ֖י/ךָ לְ/חָק עוֹלָֽם־־־־־׃
translation:
  text: 'Then Yahweh spoke to Aaron: “And I, behold, I have given you the charge of my contributions, all the holy gifts of the sons of Israel. I have given them to you for an anointing portion, and to your sons as a permanent statute.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “my offerings” or, more technically, “my heave offerings.”
    reason: lexical_alternative
  - marker: b
    text: Or “for anointing”; the Hebrew likely means the portion belonging to Aaron by virtue of his anointed priestly office.
    reason: lexical_alternative
  - marker: c
    text: Hebrew “sons of Israel,” the standard covenantal designation for the people of Israel.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: Standard narrative rendering of דבר in this construction; 'spoke' fits the formal introduction to divine speech.
- source_word: וַאֲנִי הִנֵּה
  chosen: And I—behold, I
  alternatives:
  - And I, behold
  - Now I myself
  lexicon: HALOT
  rationale: Preserves the emphatic first-person pronoun plus הִנֵּה. The dash reflects the marked, attention-getting force without becoming unnatural English.
- source_word: נָתַתִּי לְךָ
  chosen: I have given to you
  alternatives:
  - I give to you
  - I have entrusted to you
  lexicon: HALOT
  rationale: Perfect verb rendered as present-result perfect in English, suitable for a formal divine grant. 'Given' is the plain sense of נתן.
- source_word: מִשְׁמֶרֶת
  chosen: the charge
  alternatives:
  - the responsibility
  - the keeping
  - the custody
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת often denotes a charge, duty, or entrusted responsibility. 'Charge' best captures an assigned priestly trust here without over-paraphrase.
- source_word: תְּרוּמֹתַי
  chosen: my contributions
  alternatives:
  - my offerings
  - my heave offerings
  - my raised offerings
  lexicon: HALOT
  rationale: תְּרוּמָה refers to a contribution/set-apart offering presented to the LORD. 'Contributions' is understandable modern English and avoids the overly technical 'heave offerings'; 'offerings' is possible but broader and less precise.
- source_word: לְכָל קָדְשֵׁי בְנֵי יִשְׂרָאֵל
  chosen: all the holy gifts of the sons of Israel
  alternatives:
  - for all the holy things of the sons of Israel
  - over all the holy offerings of the Israelites
  lexicon: HALOT
  rationale: קָדְשֵׁי can mean holy things/gifts. In context of priestly dues, 'holy gifts' communicates consecrated items given by Israel. 'Sons of Israel' preserves the Hebrew expression in a gender-accurate way per project philosophy.
- source_word: נְתַתִּים
  chosen: I have given them
  alternatives:
  - I give them
  lexicon: HALOT
  rationale: Retains the repeated נתן for emphasis and coherence with the Hebrew.
- source_word: לְמָשְׁחָה
  chosen: as your anointing portion
  alternatives:
  - for an anointing
  - as a consecrated share
  - because of the anointing
  lexicon: HALOT
  rationale: In priestly contexts this noun can denote that which belongs to one by virtue of anointing/consecration. 'Anointing portion' makes explicit that the gifts are assigned to Aaron in connection with his anointed office.
- source_word: וּלְבָנֶיךָ
  chosen: and to your sons
  alternatives:
  - and for your sons
  lexicon: HALOT
  rationale: Straightforward rendering preserving the familial-priestly extension of the grant.
- source_word: לְחָק עוֹלָם
  chosen: as a permanent statute
  alternatives:
  - as a perpetual statute
  - as an everlasting due
  lexicon: HALOT
  rationale: חָק is a fixed statute or prescribed due; עוֹלָם here denotes enduring continuity within covenantal legislation. 'Permanent statute' is readable modern English while preserving legal force.
