id: NUM.18.4
reference: Numbers 18:4
source:
  edition: WLC
  text: וְ/נִלְו֣וּ עָלֶ֔י/ךָ וְ/שָֽׁמְר֗וּ אֶת מִשְׁמֶ֨רֶת֙ אֹ֣הֶל מוֹעֵ֔ד לְ/כֹ֖ל
    עֲבֹדַ֣ת הָ/אֹ֑הֶל וְ/זָ֖ר לֹא יִקְרַ֥ב אֲלֵי/כֶֽם־־׃
translation:
  text: They shall join themselves to you and keep the charge of the tent of meeting
    for all the service of the tent, but no outsider shall come near you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no unauthorized person.' Hebrew זָר here refers to someone outside the
      permitted sanctuary role, not necessarily a foreigner by ethnicity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִלְוּוּ
  chosen: shall join themselves
  alternatives:
  - shall be joined
  - shall attach themselves
  lexicon: HALOT
  rationale: Nifal of לוה here conveys being joined/attached to Aaron in supportive
    service. 'Join themselves' preserves the relational and functional sense without
    over-paraphrasing.
- source_word: עָלֶיךָ
  chosen: to you
  alternatives:
  - with you
  - unto you
  lexicon: HALOT
  rationale: With נלוה, על can express attachment to a person. 'To you' is idiomatic
    in English and keeps the direction of attachment to Aaron.
- source_word: וְשָׁמְרוּ
  chosen: keep
  alternatives:
  - guard
  - observe
  lexicon: HALOT
  rationale: שׁמר with מִשְׁמֶרֶת commonly means to keep/perform a charge or duty.
    'Keep' preserves the established cultic sense and works naturally with 'charge.'
- source_word: מִשְׁמֶרֶת
  chosen: the charge
  alternatives:
  - the duty
  - the obligation
  - the guard
  lexicon: HALOT
  rationale: In priestly contexts this noun often denotes an assigned responsibility
    or charge. 'Charge' best captures the formal entrusted duty in sanctuary service.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard literal rendering of the sanctuary designation and
    is clear in modern English.
- source_word: לְכָל עֲבֹדַת הָאֹהֶל
  chosen: for all the service of the tent
  alternatives:
  - for all the work of the tent
  - for every duty of the tent
  lexicon: HALOT
  rationale: עֲבֹדָה in tabernacle contexts refers to service/work assigned in worship.
    'Service' preserves the cultic nuance better than the more generic 'work.'
- source_word: וְזָר
  chosen: but no outsider
  alternatives:
  - and no stranger
  - and no unauthorized person
  lexicon: HALOT
  rationale: זָר here denotes one not authorized to approach the sanctuary, not necessarily
    a foreign ethnic stranger. 'Outsider' communicates exclusion from sacred office
    more accurately in contemporary English.
- source_word: יִקְרַב
  chosen: shall come near
  alternatives:
  - shall approach
  lexicon: HALOT
  rationale: קרב in sanctuary law often means approach into sacred proximity. 'Come
    near' is a natural and sufficiently formal rendering.
- source_word: אֲלֵיכֶם
  chosen: you
  alternatives:
  - to you all
  lexicon: HALOT
  rationale: The plural pronoun likely addresses Aaron and his sons/Levitical personnel
    collectively. English 'you' is number-neutral and reads naturally; the plural
    nuance is not crucial enough to force 'you all' into the main text.
