theological_decisions:
- issue: Meaning of זָר in sanctuary legislation
  chosen_reading: outsider, meaning an unauthorized person outside the permitted priestly/Levitical
    role
  alternative_readings:
  - stranger
  - foreigner
  rationale: The context is cultic access, not ethnicity. Rendering it as 'outsider'
    avoids implying merely foreign origin and better reflects exclusion from sacred
    approach based on authorization.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
