id: NUM.18.24
reference: Numbers 18:24
source:
  edition: WLC
  text: כִּ֞י אֶת מַעְשַׂ֣ר בְּנֵֽי יִשְׂרָאֵ֗ל אֲשֶׁ֨ר יָרִ֤ימוּ לַֽ/יהוָה֙ תְּרוּמָ֔ה
    נָתַ֥תִּי לַ/לְוִיִּ֖ם לְ/נַחֲלָ֑ה עַל כֵּן֙ אָמַ֣רְתִּי לָ/הֶ֔ם בְּ/תוֹךְ֙ בְּנֵ֣י
    יִשְׂרָאֵ֔ל לֹ֥א יִנְחֲל֖וּ נַחֲלָֽה־־־׃פ
translation:
  text: For I have given to the Levites as an inheritance the tithe of the children
    of Israel, which they lift up to the LORD as a contribution; therefore I have
    said to them, ‘Among the children of Israel they shall have no inheritance.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as an offering'; traditionally 'as a heave offering.' The Hebrew term
      denotes a contribution set apart and presented to the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding statement. 'For' fits the explanatory
    flow in English and preserves the discourse connection.
- source_word: מַעְשַׂר
  chosen: tithe
  alternatives:
  - tenth
  lexicon: HALOT
  rationale: The term denotes the tenth portion given cultically. 'Tithe' is the standard
    and precise English equivalent in this legal context.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the children of Israel
  alternatives:
  - the Israelites
  - the sons of Israel
  lexicon: HALOT
  rationale: A formally close rendering that preserves the familial covenantal expression.
    'Israelites' is possible, but 'children of Israel' matches the source wording
    and remains readable.
- source_word: יָרִימוּ
  chosen: lift up
  alternatives:
  - present
  - offer
  lexicon: HALOT
  rationale: From רוּם in the Hiphil, used for raising up an offering. 'Lift up' preserves
    the concrete sacrificial idiom better than the more generalized 'offer'.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: תְּרוּמָה
  chosen: as a contribution
  alternatives:
  - as a heave offering
  - as an offering
  lexicon: HALOT
  rationale: תְּרוּמָה refers to a contribution set apart and presented to God. 'Contribution'
    is clear modern English and avoids the archaic technical phrase 'heave offering,'
    while still reflecting a dedicated offering.
- source_word: נָתַתִּי לַלְוִיִּם לְנַחֲלָה
  chosen: I have given to the Levites as an inheritance
  alternatives:
  - I gave to the Levites for an inheritance
  - I have assigned to the Levites as their inheritance
  lexicon: HALOT
  rationale: Captures both the divine grant and the legal status of the tithe as the
    Levites' allotted possession. Present perfect English works naturally for the
    established divine decree.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for that reason
  - thus
  lexicon: HALOT
  rationale: Marks the inference from the preceding grant to the following prohibition
    regarding land inheritance.
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  chosen: Among the children of Israel
  alternatives:
  - in the midst of the children of Israel
  - among the Israelites
  lexicon: HALOT
  rationale: Expresses location within the tribal community. 'Among' is idiomatic
    and preserves the relational sense.
- source_word: לֹא יִנְחֲלוּ נַחֲלָה
  chosen: they shall have no inheritance
  alternatives:
  - they shall not inherit an inheritance
  - they shall receive no inheritance
  lexicon: HALOT
  rationale: The Hebrew repeats the inheritance root verbally and nominally. English
    smooths this to a natural legal expression while preserving the sense that the
    Levites are excluded from a territorial allotment.
