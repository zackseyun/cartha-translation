id: NUM.18.22
reference: Numbers 18:22
source:
  edition: WLC
  text: וְ/לֹא יִקְרְב֥וּ ע֛וֹד בְּנֵ֥י יִשְׂרָאֵ֖ל אֶל אֹ֣הֶל מוֹעֵ֑ד לָ/שֵׂ֥את חֵ֖טְא
    לָ/מֽוּת־־׃
translation:
  text: And the sons of Israel shall no longer come near the tent of meeting, lest
    they bear sin and die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'incur guilt.' The Hebrew literally says 'bear sin,' a priestly/legal
      expression for bearing liability for wrongdoing.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקְרְבוּ
  chosen: shall ... come near
  alternatives:
  - approach
  - draw near
  lexicon: HALOT
  rationale: The verb קרב commonly means to come near or approach. 'Come near' is
    natural modern English and preserves the cultic sense of approaching a sacred
    space.
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - again
  - any more
  lexicon: HALOT
  rationale: With the negation לֹא, עוֹד idiomatically means 'no longer' or 'not again/any
    more.' 'No longer' is the clearest idiomatic rendering here.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A formally transparent rendering is preferred here. 'Sons of Israel'
    reflects the Hebrew expression directly; while it refers corporately to Israel,
    this wording preserves the source form and aligns with the project's gender-accurate
    principle.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the tabernacle
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard literal rendering of the sanctuary term. 'Tabernacle'
    is traditional but less transparent to the Hebrew wording in this verse.
- source_word: לָשֵׂאת חֵטְא
  chosen: lest they bear sin
  alternatives:
  - so as not to incur guilt
  - to bear guilt
  lexicon: HALOT
  rationale: The infinitive plus noun literally means 'to bear sin.' In priestly/legal
    contexts this can denote bearing the consequence or liability of sin. The main
    text keeps the concrete Hebrew expression, while an alternative is preserved in
    a footnote for clarity.
- source_word: לָמוּת
  chosen: and die
  alternatives:
  - so that they do not die
  lexicon: HALOT
  rationale: Linked to the preceding infinitive phrase, this expresses the fatal consequence
    of unauthorized approach. 'And die' is concise and reflects the Hebrew sequence.
