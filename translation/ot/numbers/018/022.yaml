theological_decisions:
- issue: Whether to make explicit that the prohibition concerns unauthorized approach
    to sacred space and resulting culpability
  chosen_reading: 'Retain the concise Hebrew formulation: ''shall no longer come near
    the tent of meeting, lest they bear sin and die'''
  alternative_readings:
  - shall no longer approach the tent of meeting, or they will incur guilt and die
  rationale: The verse warns ordinary Israelites against approaching the sanctuary
    in a way reserved to Levites/priests in the immediate context. The translation
    preserves the legal-theological language of 'bearing sin' rather than interpreting
    it away as mere ritual impropriety, while still making the consequence intelligible
    in English.
  doctrine_reference: Translation philosophy §§1, 3, 5
