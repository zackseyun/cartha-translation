theological_decisions:
- issue: Referent and force of priestly instruction
  chosen_reading: The verse addresses Aaron in the singular as representative of the
    priesthood, with the permission extending to qualified males among the priests.
  alternative_readings:
  - The singular could be read as directed only to Aaron personally.
  rationale: The immediate context concerns priestly dues given to Aaron and his sons.
    Rendering the first clause as singular 'You shall eat it' preserves the Hebrew
    form, while the next clause clarifies the broader priestly application.
  doctrine_reference: Translation philosophy §5 (consistency/documented exception)
    and §4 (gender-accurate over gender-neutral)
