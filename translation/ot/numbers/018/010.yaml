id: NUM.18.10
reference: Numbers 18:10
source:
  edition: WLC
  text: בְּ/קֹ֥דֶשׁ הַ/קֳּדָשִׁ֖ים תֹּאכֲלֶ֑/נּוּ כָּל זָכָר֙ יֹאכַ֣ל אֹת֔/וֹ קֹ֖דֶשׁ
    יִֽהְיֶה לָּֽ/ךְ־־׃
translation:
  text: You shall eat it in a most holy place; every male may eat it. It shall be
    holy to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'in the holy of holies.' The phrase here denotes eating
      it in the designated most holy area.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּקֹדֶשׁ הַקֳּדָשִׁים
  chosen: in a most holy place
  alternatives:
  - in the holy of holies
  - as a most holy thing
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'in holiness of holinesses' / 'in the
    holy of holies.' In this priestly context it refers to the sphere/place of eating
    what is classified as most holy. 'In a most holy place' preserves the locative
    force of בְּ and communicates the superlative idiom naturally in English. 'Holy
    of holies' is possible but can misleadingly suggest only the inner sanctuary rather
    than the designated holy area for priestly consumption.
- source_word: תֹּאכֲלֶנּוּ
  chosen: You shall eat it
  alternatives:
  - you may eat it
  lexicon: HALOT
  rationale: Second masculine singular imperfect with 3ms suffix, addressed to Aaron
    representatively. 'Shall' fits the instructional/legal register and can carry
    the prescriptive sense here.
- source_word: כָּל זָכָר
  chosen: every male
  alternatives:
  - every man
  - every male among you
  lexicon: HALOT
  rationale: The phrase restricts consumption by sex within the priestly household.
    Per gender-accurate policy, 'every male' reflects the Hebrew more precisely than
    the potentially generic 'every man.'
- source_word: יֹאכַל אֹתוֹ
  chosen: may eat it
  alternatives:
  - shall eat it
  lexicon: HALOT
  rationale: The imperfect here states permitted eligibility following the restriction
    'every male.' 'May eat it' expresses authorization more clearly in English than
    a second 'shall eat it,' which could sound merely predictive or redundantly imperative.
- source_word: קֹדֶשׁ יִהְיֶה לָּךְ
  chosen: It shall be holy to you
  alternatives:
  - it shall be sacred to you
  - it shall belong to you as holy
  lexicon: HALOT
  rationale: This clause marks the offering's holy status in relation to Aaron/the
    priests. 'Holy' preserves the key cultic term קֹדֶשׁ consistently. 'Sacred' is
    possible but loses the lexical linkage with the surrounding holiness language.
