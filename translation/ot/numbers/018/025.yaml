id: NUM.18.25
reference: Numbers 18:25
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: And the LORD spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: And ... spoke
  alternatives:
  - Then ... spoke
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive with דבר introduces a new narrative step. 'And ...
    spoke' is a standard, natural rendering in English narrative and preserves the
    formal sense better than collapsing to only 'said.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech; 'to' is the clear
    modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive formula introducing direct speech is idiomatically rendered
    'saying' in English, especially in this recurring narrative frame.
