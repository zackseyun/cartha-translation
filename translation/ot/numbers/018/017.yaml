id: NUM.18.17
reference: Numbers 18:17
source:
  edition: WLC
  text: אַ֣ךְ בְּֽכוֹר שׁ֡וֹר אֽוֹ בְכ֨וֹר כֶּ֜שֶׂב אֽוֹ בְכ֥וֹר עֵ֛ז לֹ֥א תִפְדֶּ֖ה
    קֹ֣דֶשׁ הֵ֑ם אֶת דָּמָ֞/ם תִּזְרֹ֤ק עַל הַ/מִּזְבֵּ֨חַ֙ וְ/אֶת חֶלְבָּ֣/ם תַּקְטִ֔יר
    אִשֶּׁ֛ה לְ/רֵ֥יחַ נִיחֹ֖חַ לַֽ/יהוָֽה־־־־־־׃
translation:
  text: But you shall not redeem the firstborn of an ox, or the firstborn of a sheep,
    or the firstborn of a goat; they are holy. You shall splash their blood on the
    altar, and you shall burn their fat as a food offering, a pleasing aroma to the
    LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'an offering by fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: But
  alternatives:
  - Only
  - Nevertheless
  lexicon: HALOT
  rationale: Introduces a restriction/exception to the preceding legislation. 'But'
    reads naturally in English while preserving the adversative force.
- source_word: בְּכוֹר
  chosen: firstborn
  lexicon: HALOT
  rationale: Standard and precise rendering for the first offspring with cultic significance
    in this context.
- source_word: שׁוֹר
  chosen: ox
  alternatives:
  - bull
  - cattle
  lexicon: HALOT
  rationale: '''Ox'' is a conventional singular rendering for bovine sacrificial animal
    language and fits the generic species sense here better than the more sex-specific
    ''bull''.'
- source_word: כֶּשֶׂב
  chosen: sheep
  alternatives:
  - lamb
  lexicon: HALOT
  rationale: The Hebrew term can denote a sheep/lamb, but here the category is generic
    alongside ox and goat, so 'sheep' best matches the class reference.
- source_word: עֵז
  chosen: goat
  lexicon: HALOT
  rationale: Straightforward species term in a sacrificial list.
- source_word: לֹא תִפְדֶּה
  chosen: you shall not redeem
  alternatives:
  - you must not ransom
  lexicon: HALOT
  rationale: פדה in priestly/legal contexts refers to redemption by substitution/payment.
    'Redeem' is the established and accurate legal-cultic term.
- source_word: קֹדֶשׁ הֵם
  chosen: they are holy
  alternatives:
  - they are sacred
  lexicon: HALOT
  rationale: Predicate statement explaining why they may not be redeemed. 'Holy' preserves
    the covenantal/cultic register better than the flatter 'sacred'.
- source_word: דָּם
  chosen: blood
  lexicon: HALOT
  rationale: Literal sacrificial blood is intended.
- source_word: תִּזְרֹק
  chosen: you shall splash
  alternatives:
  - you shall throw
  - you shall sprinkle
  lexicon: HALOT
  rationale: זרק in sacrificial procedure commonly denotes tossing/splashing blood
    against/on the altar, stronger than the more delicate English 'sprinkle.' 'Splash'
    best captures the ritual action in contemporary English.
- source_word: הַמִּזְבֵּחַ
  chosen: the altar
  lexicon: HALOT
  rationale: Standard cultic term.
- source_word: חֵלֶב
  chosen: fat
  alternatives:
  - choice fat portions
  lexicon: HALOT
  rationale: Refers to the sacrificial fat reserved for burning. 'Fat' is sufficiently
    precise here without over-expanding the text.
- source_word: תַּקְטִיר
  chosen: you shall burn
  alternatives:
  - you shall turn into smoke
  lexicon: HALOT
  rationale: Hiphil of קטר in sacrificial contexts means to burn on the altar as an
    offering. 'Burn' is idiomatic and clear.
- source_word: אִשֶּׁה
  chosen: food offering
  alternatives:
  - offering by fire
  - fire offering
  lexicon: HALOT
  rationale: In priestly texts this term denotes an offering made by fire. 'Food offering'
    is a readable modern rendering that reflects the offering ascending to God, while
    avoiding archaic phrasing; the more formal alternative is preserved in a footnote.
- source_word: רֵיחַ נִיחֹחַ
  chosen: a pleasing aroma
  alternatives:
  - a soothing aroma
  - an aroma of rest
  lexicon: HALOT
  rationale: Established idiom for divine acceptance of sacrifice. 'Pleasing aroma'
    is natural English and preserves the acceptance motif without over-interpreting.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of YHWH is 'the LORD,' following
    reverential Jewish and Septuagintal convention.
