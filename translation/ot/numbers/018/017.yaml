theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH. This preserves continuity with longstanding English Bible practice and Jewish
    reverence tradition.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Cultic idiom אִשֶּׁה
  chosen_reading: food offering
  alternative_readings:
  - offering by fire
  - fire offering
  rationale: This is not a doctrinally contested term in the excerpt, but it carries
    theological-sacrificial significance. 'Food offering' is chosen for readability
    in modern English while preserving the notion of an offering presented to God
    through fire; a more formal alternative is preserved in a footnote for auditability.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English,
    not archaic or academic'
