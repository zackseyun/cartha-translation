id: NUM.1.19
reference: Numbers 1:19
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶׁ֑ה וַֽ/יִּפְקְדֵ֖/ם בְּ/מִדְבַּ֥ר סִינָֽי־׃פ
translation:
  text: just as Yahweh had commanded Moses, so he counted them in the wilderness of Sinai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he mustered them' or 'he numbered them.' The Hebrew verb can refer to enrolling or taking a census.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison with the preceding action and is naturally rendered 'just as' in English to mark conformity to the divine command.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: The verb means 'command.' English past perfect fits the narrative flow, indicating the command preceded the counting.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת מֹשֶׁה
  chosen: Moses
  alternatives:
  - Moses (direct-object marked)
  lexicon: HALOT
  rationale: The particle אֶת marks Moses as the direct object of 'commanded' and is not translated separately in English.
- source_word: וַיִּפְקְדֵם
  chosen: he counted them
  alternatives:
  - he mustered them
  - he numbered them
  lexicon: HALOT
  rationale: The verb פקד in this census context refers to taking a count or muster. 'Counted them' is clear modern English; 'mustered' is possible but slightly more specialized, and 'numbered' is more traditional.
- source_word: בְּמִדְבַּר סִינָי
  chosen: in the wilderness of Sinai
  alternatives:
  - in the Sinai wilderness
  - in the desert of Sinai
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness/desert terrain. 'Wilderness of Sinai' preserves the Hebrew construct relation and matches common biblical geographic style.
