id: NUM.1.1
reference: Numbers 1:1
source:
  edition: WLC
  text: וַ/יְדַבֵּ֨ר יְהוָ֧ה אֶל מֹשֶׁ֛ה בְּ/מִדְבַּ֥ר סִינַ֖י בְּ/אֹ֣הֶל מוֹעֵ֑ד בְּ/אֶחָד֩ לַ/חֹ֨דֶשׁ הַ/שֵּׁנִ֜י בַּ/שָּׁנָ֣ה הַ/שֵּׁנִ֗ית לְ/צֵאתָ֛/ם מֵ/אֶ֥רֶץ מִצְרַ֖יִם לֵ/אמֹֽר־׃
translation:
  text: And Yahweh spoke to Moses in the wilderness of Sinai, in the tent of meeting, on the first day of the second month, in the second year after they had come out of the land of Egypt, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the tent of meeting''; traditionally ''the tabernacle.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive verb from דבר introduces divine speech in standard narrative style. 'Spoke' is the natural English rendering here, while 'said' is possible but less fitting before the infinitive 'saying' at the end of the verse.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּמִדְבַּר סִינַי
  chosen: in the wilderness of Sinai
  alternatives:
  - in the desert of Sinai
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness/desert terrain. 'Wilderness' is preferred in biblical English because it preserves the geographic and theological resonance without sounding overly arid in every context.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - in the tabernacle
  - in the meeting tent
  lexicon: HALOT
  rationale: The phrase literally denotes the 'tent of meeting.' 'Tabernacle' is traditional but less transparent and can obscure the specific Hebrew wording.
- source_word: בְּאֶחָד לַחֹדֶשׁ הַשֵּׁנִי
  chosen: on the first day of the second month
  alternatives:
  - on the first of the second month
  lexicon: HALOT
  rationale: This idiom marks a calendar date. 'On the first day of the second month' is clear modern English and accurately represents the Hebrew temporal construction.
- source_word: בַּשָּׁנָה הַשֵּׁנִית
  chosen: in the second year
  alternatives:
  - during the second year
  lexicon: HALOT
  rationale: A straightforward temporal phrase; 'in the second year' is the most natural equivalent.
- source_word: לְצֵאתָם
  chosen: after they had come out
  alternatives:
  - after their departure
  - from the time they came out
  lexicon: HALOT
  rationale: The infinitive construct with pronominal suffix refers to Israel's exodus. 'After they had come out' expresses the temporal relation idiomatically in English.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: of the land of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly includes 'land,' so it is retained for formal clarity and to preserve the full expression.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said,
  lexicon: HALOT
  rationale: This standard speech-introduction formula is best carried over as 'saying,' since the content follows in the next verse.
