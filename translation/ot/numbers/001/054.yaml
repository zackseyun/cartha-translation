  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering בְּנֵי יִשְׂרָאֵל with gender accuracy
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The Hebrew is explicitly masculine plural construct. Following the gender-accurate principle, the translation preserves the form rather than replacing it with a gender-neutral collective, while recognizing the alternatives as idiomatic English options.
