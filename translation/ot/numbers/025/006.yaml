theological_decisions:
- issue: Gendered covenantal language in בְּנֵי יִשְׂרָאֵל / אֶחָיו
  chosen_reading: Preserve 'sons of Israel' and 'brothers' in the main text
  alternative_readings:
  - Israelites
  - kinsmen
  - fellow Israelites
  rationale: The Hebrew uses masculine familial terms. Following the project's gender-accurate
    principle, the translation keeps these forms rather than neutralizing them, while
    acknowledging smoother contextual alternatives in footnotes.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
