id: NUM.25.6
reference: Numbers 25:6
source:
  edition: WLC
  text: וְ/הִנֵּ֡ה אִישׁ֩ מִ/בְּנֵ֨י יִשְׂרָאֵ֜ל בָּ֗א וַ/יַּקְרֵ֤ב אֶל אֶחָי/ו֙ אֶת
    הַ/מִּדְיָנִ֔ית לְ/עֵינֵ֣י מֹשֶׁ֔ה וּ/לְ/עֵינֵ֖י כָּל עֲדַ֣ת בְּנֵי יִשְׂרָאֵ֑ל
    וְ/הֵ֣מָּה בֹכִ֔ים פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד־־־־׃
translation:
  text: And behold, a man from the sons of Israel came and brought near to his brothers
    a Midianite woman, before the eyes of Moses and before the eyes of all the congregation
    of the sons of Israel, while they were weeping at the entrance of the tent of
    meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to his kinsmen' or 'to his fellow Israelites.' The Hebrew reads 'to
      his brothers.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Midianite'; English idiom often uses 'a Midianite woman' when
      introducing her into the narrative.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - And look
  - Now behold
  lexicon: HALOT
  rationale: Retains the discourse-marker force of sudden attention or shock. 'Behold'
    is slightly formal but still transparent and preserves the narrative jolt better
    than omitting it.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The singular masculine noun refers to an individual male Israelite. 'A
    man' is gender-accurate and more precise than the vague 'someone.'
- source_word: מִבְּנֵי יִשְׂרָאֵל
  chosen: from the sons of Israel
  alternatives:
  - from the Israelites
  - from the children of Israel
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew idiom and the gendered
    wording. 'Israelites' is smoother English, but here 'sons of Israel' better reflects
    the source and aligns with the project's gender-accurate principle.
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Simple narrative verb of motion; 'came' is the natural English equivalent.
- source_word: וַיַּקְרֵב
  chosen: brought near
  alternatives:
  - brought
  - presented
  lexicon: HALOT
  rationale: The Hiphil of קרב literally means 'cause to come near/bring near.' 'Brought
    near' preserves the deliberate affront and spatial force. 'Presented' is too interpretive;
    'brought' is possible but less precise.
- source_word: אֶל אֶחָיו
  chosen: to his brothers
  alternatives:
  - to his kinsmen
  - to his fellow Israelites
  lexicon: HALOT
  rationale: The phrase is literally 'to his brothers.' In context it refers to fellow
    Israelites, but the more literal rendering preserves the familial covenantal language.
    Because the referent could be understood more broadly, an alternative is preserved
    in a footnote.
- source_word: הַמִּדְיָנִית
  chosen: a Midianite woman
  alternatives:
  - the Midianite woman
  - a Midianite
  lexicon: HALOT
  rationale: Although the Hebrew adjective is formally definite, English idiom often
    uses the indefinite here when introducing a participant. 'Woman' is supplied for
    clarity because the feminine adjective functions substantivally.
- source_word: לְעֵינֵי ... וּלְעֵינֵי
  chosen: before the eyes of ... and before the eyes of
  alternatives:
  - in the sight of ... and in the sight of
  - before ... and before
  lexicon: HALOT
  rationale: This preserves the repeated Hebrew idiom and emphasizes the brazen public
    nature of the act. Repetition is maintained rather than smoothed away.
- source_word: כָּל עֲדַת בְּנֵי יִשְׂרָאֵל
  chosen: all the congregation of the sons of Israel
  alternatives:
  - the whole congregation of the Israelites
  - all the assembly of the sons of Israel
  lexicon: HALOT
  rationale: '''Congregation'' is a standard rendering for עֵדָה and fits the communal
    setting. ''Assembly'' is possible, but ''congregation'' better conveys the gathered
    covenant community.'
- source_word: וְהֵמָּה בֹכִים
  chosen: while they were weeping
  alternatives:
  - and they were weeping
  - as they wept
  lexicon: HALOT
  rationale: The pronoun plus participle gives a durative backgrounded action. 'While
    they were weeping' captures the ongoing action concurrent with the man's brazen
    deed.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  chosen: at the entrance of the tent of meeting
  alternatives:
  - at the doorway of the tent of meeting
  - at the entrance to the tent of meeting
  lexicon: HALOT
  rationale: Standard and clear rendering of the sanctuary location. 'Tent of meeting'
    is the established translation of אֹהֶל מוֹעֵד and preserves cultic specificity.
