id: NUM.25.5
reference: Numbers 25:5
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֹשֶׁ֔ה אֶל שֹׁפְטֵ֖י יִשְׂרָאֵ֑ל הִרְגוּ֙ אִ֣ישׁ אֲנָשָׁ֔י/ו
    הַ/נִּצְמָדִ֖ים לְ/בַ֥עַל פְּעֽוֹר־׃
translation:
  text: And Moses said to the judges of Israel, “Each of you must kill his men who
    have joined themselves to Baal of Peor.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Baal-peor.”
    reason: lexical_alternative
  - marker: b
    text: The Hebrew literally reads “kill, each man, his men,” meaning each judge
      was to put to death the men under his authority who had attached themselves
      to Baal of Peor.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁפְטֵי
  chosen: judges
  alternatives:
  - leaders
  - officials
  lexicon: HALOT
  rationale: The noun from שׁפט here refers to those exercising judicial/governing
    authority within Israel. 'Judges' is the most direct and contextually fitting
    rendering.
- source_word: הִרְגוּ
  chosen: must kill
  alternatives:
  - kill
  - slay
  - execute
  lexicon: HALOT
  rationale: The imperative plural gives Moses' command. 'Must kill' brings out the
    force of the command in natural English. 'Execute' is possible by implication,
    but the Hebrew verb itself is simply 'kill/strike dead,' so that stronger juridical
    nuance is not placed in the main text.
- source_word: אִישׁ אֲנָשָׁיו
  chosen: Each of you ... his men
  alternatives:
  - every man his men
  - each man his people
  lexicon: HALOT
  rationale: The distributive construction literally means 'a man his men,' directing
    each judge to deal with the men under his authority. 'Each of you ... his men'
    preserves the distributive sense in idiomatic English.
- source_word: הַנִּצְמָדִים
  chosen: who have joined themselves
  alternatives:
  - who attached themselves
  - who yoked themselves
  - who allied themselves
  lexicon: HALOT
  rationale: The Niphal participle of צמד conveys being joined or attached closely.
    In this idolatrous context, 'joined themselves' communicates voluntary attachment
    without overinterpreting the exact metaphor.
- source_word: לְבַעַל פְּעוֹר
  chosen: to Baal of Peor
  alternatives:
  - to Baal-peor
  - to the Baal of Peor
  lexicon: HALOT
  rationale: The phrase names the deity associated with Peor. 'Baal of Peor' is transparent
    English and preserves the relation between the title/name and the place. The more
    traditional compound form 'Baal-peor' is preserved as an alternative.
