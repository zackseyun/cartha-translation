theological_decisions:
- issue: Nature of the commanded killing
  chosen_reading: Render the command straightforwardly as Moses ordering Israel's
    judges to kill the offending men under their charge, without adding legal or ritual
    explanation not explicit in the verse.
  alternative_readings:
  - Translate with 'execute' to foreground judicial punishment
  - Expand to specify covenant judgment
  rationale: The verse itself gives a direct command in response to apostasy but does
    not spell out procedural details here. The translation should preserve the severity
    of the command without importing extra doctrinal or legal framing beyond the immediate
    wording.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gendered language in אִישׁ אֲנָשָׁיו
  chosen_reading: Preserve masculine reference with 'Each of you ... his men.'
  alternative_readings:
  - Each one of you ... those under you
  - everyone ... their people
  rationale: The Hebrew is explicitly masculine and refers to male offenders in context.
    Per the gender-accurate principle, the English should reflect that rather than
    neutralize it.
  doctrine_reference: Translation philosophy §4
