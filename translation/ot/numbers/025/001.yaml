id: NUM.25.1
reference: Numbers 25:1
source:
  edition: WLC
  text: וַ/יֵּ֥שֶׁב יִשְׂרָאֵ֖ל בַּ/שִּׁטִּ֑ים וַ/יָּ֣חֶל הָ/עָ֔ם לִ/זְנ֖וֹת אֶל בְּנ֥וֹת
    מוֹאָֽב־׃
translation:
  text: While Israel was staying at Shittim, the people began to prostitute themselves
    with the daughters of Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'began to commit sexual immorality with the daughters of Moab'; Hebrew
      'began to play the prostitute with the daughters of Moab.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: was staying
  alternatives:
  - settled
  - remained
  - dwelt
  lexicon: HALOT
  rationale: The verb ישׁב commonly means to sit, dwell, remain, or stay. In this
    narrative setting, 'was staying' gives natural English while preserving the sense
    of Israel's encampment/residence at Shittim without overstating permanence as
    'settled' might.
- source_word: בַּשִּׁטִּים
  chosen: at Shittim
  alternatives:
  - in Shittim
  lexicon: HALOT
  rationale: A place name, transliterated per translation policy. 'At Shittim' is
    idiomatic for a location of encampment; 'in Shittim' is possible but less natural
    in English.
- source_word: וַיָּחֶל
  chosen: began
  alternatives:
  - started
  lexicon: HALOT
  rationale: From חלל/יחל in the Hiphil, here functioning idiomatically as 'began.'
    'Began' is the standard and clearest rendering in context.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: Though Israel is singular as a collective, העם here refers to the people
    corporately. 'The people' is the most natural and contextually accurate English
    rendering.
- source_word: לִזְנוֹת
  chosen: to prostitute themselves
  alternatives:
  - to commit sexual immorality
  - to play the prostitute
  - to fornicate
  lexicon: HALOT
  rationale: זנה often denotes illicit sexual activity and can carry the imagery of
    prostitution/whoredom. Because the verb here is literal in context yet retains
    the force of sexual unfaithfulness, 'to prostitute themselves' preserves the metaphorical
    sharpness better than the more generic 'commit sexual immorality.'
- source_word: אֶל
  chosen: with
  alternatives:
  - to
  - toward
  lexicon: HALOT
  rationale: Although אֶל literally means 'to/toward,' with זנה and a personal object
    it idiomatically indicates sexual relations with. 'With' best conveys the sense
    in clear English.
- source_word: בְּנוֹת מוֹאָב
  chosen: the daughters of Moab
  alternatives:
  - the women of Moab
  - Moabite women
  lexicon: HALOT
  rationale: A formally close rendering is preferable here. 'The daughters of Moab'
    preserves the Hebrew expression while remaining understandable; 'Moabite women'
    is a valid dynamic alternative.
