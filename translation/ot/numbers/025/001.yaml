theological_decisions:
- issue: Nature of Israel's sin in the opening clause
  chosen_reading: Render the verb with explicit sexual-prostitution language rather
    than a softened generality.
  alternative_readings:
  - the people began to commit sexual immorality with the daughters of Moab
  - the people began to play the prostitute with the daughters of Moab
  rationale: The Hebrew verb זנה is stronger and more vivid than a generic moral abstraction.
    The chosen rendering preserves the text's moral and covenantal force without importing
    later theological interpretation beyond the verse itself.
  doctrine_reference: Translation philosophy §§1, 5, 6
