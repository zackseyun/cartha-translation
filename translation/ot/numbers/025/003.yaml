id: NUM.25.3
reference: Numbers 25:3
source:
  edition: WLC
  text: וַ/יִּצָּ֥מֶד יִשְׂרָאֵ֖ל לְ/בַ֣עַל פְּע֑וֹר וַ/יִּֽחַר אַ֥ף יְהוָ֖ה בְּ/יִשְׂרָאֵֽל־׃
translation:
  text: So Israel joined itself to Baal of Peor, and the anger of Yahweh burned against Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “joined itself to Baal-peor” or “yoked itself to Baal of Peor.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצָּמֶד
  chosen: joined itself to
  alternatives:
  - yoked itself to
  - attached itself to
  - clung to
  lexicon: HALOT
  rationale: The verb צמד in the Niphal conveys being joined or attached closely. 'Joined itself to' preserves the reflexive sense and the covenantal/idolatrous attachment without over-paraphrasing. 'Yoked itself to' is vivid but slightly more interpretive.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Standard transliteration of the national name.
- source_word: לְבַעַל פְּעוֹר
  chosen: to Baal of Peor
  alternatives:
  - to Baal-peor
  - to the Baal of Peor
  lexicon: HALOT
  rationale: בעל here is the divine title/name 'Baal,' and פעור specifies the local manifestation associated with Peor. 'Baal of Peor' is clear modern English and preserves the construct relationship better than the fused form 'Baal-peor,' while remaining recognizable.
- source_word: וַיִּחַר אַף
  chosen: the anger ... burned
  alternatives:
  - the anger ... was kindled
  - the anger ... flared
  lexicon: HALOT
  rationale: The idiom חרה אף literally involves anger burning/hotness. Rendering it as 'the anger ... burned' preserves the Hebrew metaphor in natural English. 'Was kindled' is possible but more archaic.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בְּיִשְׂרָאֵל
  chosen: against Israel
  alternatives:
  - at Israel
  - in Israel
  lexicon: HALOT
  rationale: With חרה אף, the preposition ב commonly marks the object of anger. In idiomatic English, 'against Israel' best conveys the sense.
