theological_decisions:
- issue: Rendering the covenant formula בְּרִיתִי שָׁלוֹם
  chosen_reading: my covenant of peace
  alternative_readings:
  - my covenant of well-being
  - my covenant of wholeness
  rationale: The phrase is best rendered with the genitival construction 'covenant
    of peace,' preserving both the formal structure and the theological resonance
    of שָׁלוֹם in covenant contexts. Alternatives reflect the semantic breadth of
    שָׁלוֹם but are not necessary in the main text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    weight without paraphrase'
