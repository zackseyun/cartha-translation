id: NUM.25.12
reference: Numbers 25:12
source:
  edition: WLC
  text: לָ/כֵ֖ן אֱמֹ֑ר הִנְנִ֨/י נֹתֵ֥ן ל֛/וֹ אֶת בְּרִיתִ֖/י שָׁלֽוֹם־׃
translation:
  text: Therefore say, ‘Look, I am giving him my covenant of peace.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my covenant of well-being' or 'my covenant of wholeness.' Hebrew shalom
      can include peace, welfare, and wholeness.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks logical consequence from the preceding narrative; 'therefore' preserves
    the formal inferential force better than the looser 'so.'
- source_word: אֱמֹר
  chosen: say
  alternatives:
  - speak
  lexicon: HALOT
  rationale: Imperative to Moses introducing the divine message. 'Say' is the standard
    natural rendering in direct commission formulas.
- source_word: הִנְנִי
  chosen: Look, I
  alternatives:
  - Behold, I
  - Here I am, I
  lexicon: HALOT
  rationale: The particle draws attention to the solemn divine declaration. 'Look'
    preserves the deictic emphasis in readable modern English; 'behold' is more traditional
    but archaic.
- source_word: נֹתֵן
  chosen: am giving
  alternatives:
  - give
  - am about to give
  lexicon: HALOT
  rationale: The participle with הִנְנִי expresses imminent or present action. 'Am
    giving' captures the ongoing/declarative force better than a simple present.
- source_word: לוֹ
  chosen: him
  alternatives:
  - to him
  lexicon: HALOT
  rationale: English idiom naturally incorporates the indirect object as 'giving him';
    the dative sense is preserved.
- source_word: בְּרִיתִי
  chosen: my covenant
  alternatives:
  - my pact
  - my treaty
  lexicon: HALOT
  rationale: בְּרִית is a major covenant term in the Hebrew Bible; 'covenant' preserves
    its theological and canonical weight.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: '''Peace'' is the standard rendering and fits the covenant formula. The
    broader sense of well-being/wholeness is real, but ''peace'' best preserves the
    established covenantal expression while remaining natural English.'
