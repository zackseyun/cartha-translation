theological_decisions:
- issue: Rendering קנא / קִנְאָה language for Phinehas and God
  chosen_reading: jealous / jealousy
  alternative_readings:
  - zealous / zeal
  rationale: The Hebrew deliberately uses cognate language for Phinehas's action and
    YHWH's own covenant response. Rendering both with 'jealous/jealousy' preserves
    the lexical linkage and the covenantal exclusivity implied, rather than softening
    it to generic zeal. Because 'zeal' is a viable English alternative and common
    in translation tradition, it is preserved in a footnote.
  doctrine_reference: Translation philosophy items 3 and 5
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The source text is grammatically masculine and uses the covenantal expression
    literally. Following the gender-accurate principle, the translation preserves
    'sons of Israel' rather than neutralizing it. A more idiomatic alternative is
    noted in rationale but not needed in a footnote because the meaning is not materially
    contested.
  doctrine_reference: Translation philosophy item 4
