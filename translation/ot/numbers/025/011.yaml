id: NUM.25.11
reference: Numbers 25:11
source:
  edition: WLC
  text: פִּֽינְחָ֨ס בֶּן אֶלְעָזָ֜ר בֶּן אַהֲרֹ֣ן הַ/כֹּהֵ֗ן הֵשִׁ֤יב אֶת חֲמָתִ/י֙
    מֵ/עַ֣ל בְּנֵֽי יִשְׂרָאֵ֔ל בְּ/קַנְא֥/וֹ אֶת קִנְאָתִ֖/י בְּ/תוֹכָ֑/ם וְ/לֹא
    כִלִּ֥יתִי אֶת בְּנֵֽי יִשְׂרָאֵ֖ל בְּ/קִנְאָתִֽ/י־־־־־־־־׃
translation:
  text: Phinehas son of Eleazar, son of Aaron the priest, has turned back my wrath
    from upon the sons of Israel by being jealous with my jealousy among them, so
    that I did not consume the sons of Israel in my jealousy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by being zealous with my zeal ... in my zeal.' The Hebrew uses cognate
      forms of the same root for Phinehas's action and God's response.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵשִׁיב
  chosen: has turned back
  alternatives:
  - has turned away
  - has brought back
  lexicon: HALOT
  rationale: Hiphil of שוב here means to turn back or avert wrath. 'Has turned back'
    preserves the causative sense and fits the object 'my wrath' naturally in English.
- source_word: חֲמָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my anger
  lexicon: HALOT
  rationale: חֵמָה commonly denotes burning wrath or fury. 'Wrath' best preserves
    the intensity and judicial force without sounding overly archaic.
- source_word: מֵעַל
  chosen: from upon
  alternatives:
  - from
  - away from
  lexicon: HALOT
  rationale: The preposition literally means 'from upon.' Retaining 'from upon' reflects
    the Hebrew image of wrath resting on Israel, while remaining understandable in
    English.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Per the gender-accurate principle, the masculine plural construct is
    preserved as 'sons of Israel.' It is also the standard covenantal ethnonym in
    the Hebrew text. A more idiomatic alternative is possible, but this rendering
    keeps the source form visible.
- source_word: בְּקַנְאוֹ
  chosen: by being jealous
  alternatives:
  - when he was jealous
  - by being zealous
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks means or circumstance.
    The root קנא can denote jealousy or zeal. Because the object is 'my jealousy,'
    'being jealous' preserves the lexical cognate and the divine-human parallel more
    transparently than 'being zealous.'
- source_word: קִנְאָתִי
  chosen: my jealousy
  alternatives:
  - my zeal
  lexicon: HALOT
  rationale: The noun is cognate with the preceding verb and refers to YHWH's covenant
    jealousy. 'My jealousy' preserves the lexical repetition and theological force
    of exclusive covenant loyalty. 'My zeal' is possible but weakens the covenantal
    exclusivity nuance.
- source_word: בְּתוֹכָם
  chosen: among them
  alternatives:
  - in their midst
  lexicon: HALOT
  rationale: Both are possible. 'Among them' is clear modern English while still conveying
    Phinehas's action within the community.
- source_word: כִלִּיתִי
  chosen: I did not consume
  alternatives:
  - I did not destroy
  - I did not put an end to
  lexicon: HALOT
  rationale: כלה in the Piel often means to finish, consume, or destroy completely.
    'Consume' fits the context of divine wrath and preserves the sense of total destruction
    threatened but withheld.
- source_word: בְּקִנְאָתִי
  chosen: in my jealousy
  alternatives:
  - in my zeal
  lexicon: HALOT
  rationale: The repeated noun should be rendered consistently with the earlier occurrence.
    'In my jealousy' preserves the lexical and theological repetition across the verse.
- source_word: הַכֹּהֵן
  chosen: the priest
  alternatives:
  - the priestly one
  lexicon: HALOT
  rationale: The appositional title identifies Aaron in the familiar biblical way.
    'The priest' is the natural and accurate rendering.
