theological_decisions:
- issue: Rendering a divinely commanded act of hostility without softening or expanding
    it
  chosen_reading: Treat the Midianites as enemies and strike them down
  alternative_readings:
  - Harass the Midianites and strike them
  - Be hostile to the Midianites and attack them
  rationale: The Hebrew gives two direct imperatives commanding enmity and violent
    action. The translation preserves that severity without paraphrastic expansion
    into broader theological justification not stated in this verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
