id: NUM.25.17
reference: Numbers 25:17
source:
  edition: WLC
  text: צָר֖וֹר אֶת הַ/מִּדְיָנִ֑ים וְ/הִכִּיתֶ֖ם אוֹתָֽ/ם־׃
translation:
  text: Treat the Midianites as enemies and strike them down,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Harass the Midianites and strike them.' The Hebrew verb צָרוֹר can
      carry the sense of showing hostility toward or treating as an enemy.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָרוֹר
  chosen: Treat ... as enemies
  alternatives:
  - Harass
  - Show hostility toward
  - Be hostile to
  lexicon: HALOT
  rationale: Imperative from צרר in the Qal can denote treating someone as an adversary
    or showing hostility. 'Treat ... as enemies' brings out the relational/hostile
    sense in clear modern English without over-specifying a military tactic. 'Harass'
    is possible but can sound too narrow or merely tactical in English.
- source_word: הַמִּדְיָנִים
  chosen: the Midianites
  lexicon: HALOT
  rationale: Standard ethnonym for the people of Midian; transliterated in conventional
    English form.
- source_word: וְהִכִּיתֶם
  chosen: and strike them down
  alternatives:
  - and strike them
  - and defeat them
  - and kill them
  lexicon: HALOT
  rationale: Hiphil of נכה commonly means to strike, smite, or defeat. 'Strike them
    down' preserves the forceful military/judicial sense in idiomatic English. 'Kill
    them' is too specific for the verb alone, while 'defeat' may understate the physical
    violence implied.
- source_word: אוֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object pronoun referring back to the Midianites; rendered straightforwardly
    as 'them'.
- source_word: אֶת
  chosen: '[not separately translated]'
  lexicon: Hebrew grammar
  rationale: Direct-object marker with no independent English equivalent; its function
    is reflected in the syntax.
