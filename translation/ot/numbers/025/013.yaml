theological_decisions:
- issue: Rendering of קנא in relation to Phinehas's action
  chosen_reading: he was jealous for his God
  alternative_readings:
  - he was zealous for his God
  rationale: The Hebrew emphasizes covenant jealousy/zeal in defense of God's honor.
    'Jealous for' preserves the lexical connection more closely, while the more idiomatic
    'zealous for' is preserved in a footnote because English readers may hear 'jealous'
    narrowly as envy.
  doctrine_reference: DOCTRINE.md Translation philosophy §§3, 5
- issue: Force of עוֹלָם in the priesthood promise
  chosen_reading: perpetual priesthood
  alternative_readings:
  - everlasting priesthood
  - eternal priesthood
  rationale: The term often denotes enduring continuity within covenantal history
    rather than requiring an abstract philosophical claim of endless duration in every
    context. 'Perpetual' preserves the institutional sense and avoids importing a
    stronger metaphysical assertion than the Hebrew itself demands.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
- issue: Gender rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - people of Israel
  - Israelites
  rationale: The source is grammatically masculine and functions as a standard ethnic
    designation. In keeping with the gender-accurate policy, the masculine form is
    retained in the main text, with a footnote clarifying the broader referent if
    needed.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
