id: NUM.25.13
reference: Numbers 25:13
source:
  edition: WLC
  text: וְ/הָ֤יְתָה לּ/וֹ֙ וּ/לְ/זַרְע֣/וֹ אַחֲרָ֔י/ו בְּרִ֖ית כְּהֻנַּ֣ת עוֹלָ֑ם
    תַּ֗חַת אֲשֶׁ֤ר קִנֵּא֙ לֵֽ/אלֹהָ֔י/ו וַ/יְכַפֵּ֖ר עַל בְּנֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: It shall be for him and for his offspring after him a covenant of a perpetual
    priesthood, because he was jealous for his God and made atonement for the sons
    of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'zealous for his God.' The Hebrew verb can express covenant jealousy
      or zeal.
    reason: lexical_alternative
  - marker: b
    text: Or 'an everlasting priesthood.'
    reason: alternative_reading
  - marker: c
    text: '''Sons of Israel'' is the traditional Hebrew national designation and refers
      to the people of Israel.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: It shall be
  alternatives:
  - and it shall be
  - and it will become
  lexicon: HALOT
  rationale: The feminine singular verb agrees with the following implied subject,
    the covenant/priesthood grant. English idiom is best served by 'It shall be,'
    with the conjunction absorbed for readability.
- source_word: לּוֹ וּלְזַרְעוֹ אַחֲרָיו
  chosen: for him and for his offspring after him
  alternatives:
  - to him and to his seed after him
  - for him and his descendants after him
  lexicon: HALOT
  rationale: '''Offspring'' preserves the collective singular sense of זֶרַע better
    than ''descendants,'' while remaining natural English. ''After him'' is retained
    to reflect the succession idea.'
- source_word: בְּרִית
  chosen: a covenant
  alternatives:
  - a pact
  - an agreement
  lexicon: HALOT
  rationale: '''Covenant'' is the standard and theologically appropriate rendering
    for בְּרִית in divine-human grant contexts.'
- source_word: כְּהֻנַּת עוֹלָם
  chosen: of a perpetual priesthood
  alternatives:
  - of an everlasting priesthood
  - of an eternal priesthood
  lexicon: HALOT
  rationale: The construct phrase denotes the content or character of the covenant.
    'Perpetual' captures עוֹלָם in an institutional, enduring sense without over-specifying
    metaphysical eternity; 'everlasting' remains a viable alternative.
- source_word: תַּחַת אֲשֶׁר
  chosen: because
  alternatives:
  - because of the fact that
  - in return for that
  lexicon: HALOT
  rationale: In this context the phrase introduces the ground or basis for the covenant
    grant. 'Because' is concise and accurate in English.
- source_word: קִנֵּא לֵאלֹהָיו
  chosen: he was jealous for his God
  alternatives:
  - he was zealous for his God
  - he was jealous on behalf of his God
  lexicon: HALOT
  rationale: The verb קנא can denote jealousy or zeal. 'Jealous for' more directly
    reflects the covenantal exclusivity nuance in the Hebrew, while 'zealous for'
    is a common interpretive alternative worth preserving.
- source_word: וַיְכַפֵּר
  chosen: made atonement
  alternatives:
  - made expiation
  - effected atonement
  lexicon: HALOT
  rationale: '''Made atonement'' is the standard accessible rendering of כפר in priestly/cultic
    contexts. ''Expiation'' is more technical and less readable for the target audience.'
- source_word: עַל בְּנֵי יִשְׂרָאֵל
  chosen: for the sons of Israel
  alternatives:
  - for the people of Israel
  - for the Israelites
  lexicon: HALOT
  rationale: Per the gender-accurate policy, בְּנֵי is rendered 'sons of' rather than
    neutralized. The phrase is a conventional national designation, but the masculine
    form is retained in the main text.
