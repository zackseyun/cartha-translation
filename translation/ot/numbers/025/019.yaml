id: NUM.25.19
reference: Numbers 25:19
source:
  edition: WLC
  text: וַ/יְהִ֖י אַחֲרֵ֣י הַ/מַּגֵּפָ֑הפ
translation:
  text: And it happened after the plague.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'And it came to pass after the plague.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  - And it was
  lexicon: HALOT
  rationale: The wayyiqtol of היה here functions as a narrative transition formula.
    'And it happened' preserves the Hebrew discourse marker while using readable modern
    English. 'And it came to pass' is traditional but archaic; 'And it was' is too
    wooden in English.
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: The preposition straightforwardly marks temporal sequence. 'After' is
    the most natural and direct rendering.
- source_word: הַמַּגֵּפָה
  chosen: the plague
  alternatives:
  - the blow
  - the affliction
  - the pestilence
  lexicon: HALOT
  rationale: מַגֵּפָה commonly denotes a plague or deadly outbreak, especially in
    judgment contexts. 'The plague' is the clearest idiomatic English rendering here
    and fits the immediate context of divine judgment in Numbers 25.
