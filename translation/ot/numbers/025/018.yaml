id: NUM.25.18
reference: Numbers 25:18
source:
  edition: WLC
  text: כִּ֣י צֹרְרִ֥ים הֵם֙ לָ/כֶ֔ם בְּ/נִכְלֵי/הֶ֛ם אֲשֶׁר נִכְּל֥וּ לָ/כֶ֖ם עַל
    דְּבַר פְּע֑וֹר וְ/עַל דְּבַ֞ר כָּזְבִּ֨י בַת נְשִׂ֤יא מִדְיָן֙ אֲחֹתָ֔/ם הַ/מֻּכָּ֥ה
    בְ/יוֹם הַ/מַּגֵּפָ֖ה עַל דְּבַר פְּעֽוֹר־־־־־־־־׃
translation:
  text: For they are hostile to you through their schemes by which they deceived you
    in the matter of Peor, and in the matter of Cozbi, the daughter of a leader of
    Midian, their sister, who was struck down on the day of the plague because of
    the matter of Peor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Peor refers to the incident involving Baal-peor described earlier in the
      chapter.
    reason: cross_reference
  - marker: b
    text: Or 'by their wiles' / 'through their treachery.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'their sister,' likely meaning a woman of their own people or kin-group.
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹרְרִים
  chosen: are hostile
  alternatives:
  - are enemies
  - harass
  - show hostility
  lexicon: HALOT
  rationale: The participle denotes ongoing enmity/hostility. 'Are hostile' captures
    the predicative force in natural English without over-specifying military opposition.
- source_word: בְּנִכְלֵיהֶם
  chosen: through their schemes
  alternatives:
  - with their tricks
  - by their wiles
  - through their treachery
  lexicon: HALOT
  rationale: נכלים refers to crafty, deceptive devices. 'Schemes' is clear modern
    English and fits the instrumental beth ('through/by means of').
- source_word: נִכְּלוּ
  chosen: they deceived
  alternatives:
  - they acted deceitfully
  - they plotted against
  - they beguiled
  lexicon: HALOT
  rationale: The verb is cognate with the preceding noun and conveys deceptive plotting
    against Israel. 'They deceived you' preserves the hostile action directed toward
    the audience.
- source_word: עַל דְּבַר פְּעוֹר
  chosen: in the matter of Peor
  alternatives:
  - because of Peor
  - concerning Peor
  - over the affair of Peor
  lexicon: HALOT
  rationale: The idiom על דבר commonly means 'with regard to / in the matter of.'
    'Peor' here refers to the Baal-peor incident; the idiom is best rendered as an
    affair or matter rather than a bare causal phrase in this first occurrence.
- source_word: כָּזְבִּי
  chosen: Cozbi
  rationale: Personal name is transliterated per translation philosophy.
- source_word: בַת נְשִׂיא מִדְיָן
  chosen: the daughter of a leader of Midian
  alternatives:
  - daughter of a prince of Midian
  - daughter of a chief of Midian
  lexicon: HALOT
  rationale: נשיא denotes a lifted-up person, i.e., leader/chieftain. 'Leader' is
    accessible modern English and avoids aristocratic overtones that 'prince' may
    wrongly suggest.
- source_word: אֲחֹתָם
  chosen: their sister
  alternatives:
  - a woman of their kin
  - their kinswoman
  lexicon: HALOT
  rationale: Literally 'their sister.' Though it may imply tribal kinship, the literal
    rendering is natural enough in English and preserves the familial language of
    the Hebrew.
- source_word: הַמֻּכָּה
  chosen: who was struck down
  alternatives:
  - who was killed
  - the slain woman
  lexicon: HALOT
  rationale: Passive participle from נכה, 'to strike.' 'Struck down' preserves the
    verbal imagery and allows the context to imply death without flattening the expression.
- source_word: בְיוֹם הַמַּגֵּפָה
  chosen: on the day of the plague
  alternatives:
  - in the day of the plague
  - when the plague came
  lexicon: HALOT
  rationale: A straightforward temporal phrase; 'on the day' is idiomatic English
    and preserves the concrete temporal reference.
- source_word: עַל דְּבַר פְּעוֹר
  chosen: because of the matter of Peor
  alternatives:
  - in the matter of Peor
  - because of Peor
  lexicon: HALOT
  rationale: In this final occurrence, the phrase modifies the plague and has a more
    causal nuance. 'Because of the matter of Peor' preserves both the idiom and the
    causal connection.
