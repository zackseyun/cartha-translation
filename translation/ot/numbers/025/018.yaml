theological_decisions:
- issue: Referent of 'Peor'
  chosen_reading: Rendered 'Peor' as a transliterated proper name referring to the
    Baal-peor incident, not expanded in the main text.
  alternative_readings:
  - Baal-peor
  rationale: The Hebrew text has simply 'Peor.' Expanding to 'Baal-peor' would interpretively
    clarify but goes beyond the exact wording. The transliteration preserves the source
    while allowing a footnote for clarity.
  doctrine_reference: Translation philosophy §1, §2
- issue: Force of the repeated 'matter of Peor' phrases
  chosen_reading: First occurrence rendered with situational nuance ('in the matter
    of Peor'); final occurrence with causal nuance ('because of the matter of Peor').
  alternative_readings:
  - Use identical wording in both places
  rationale: Optimal equivalence allows slight variation where English syntax and
    local context demand it. The same Hebrew idiom can bear contextual nuance without
    changing the underlying sense; the variance is documented for consistency auditing.
  doctrine_reference: Translation philosophy §5
