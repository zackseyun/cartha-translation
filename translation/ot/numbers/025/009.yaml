id: NUM.25.9
reference: Numbers 25:9
source:
  edition: WLC
  text: וַ/יִּהְי֕וּ הַ/מֵּתִ֖ים בַּ/מַּגֵּפָ֑ה אַרְבָּעָ֥ה וְ/עֶשְׂרִ֖ים אָֽלֶף׃פ
translation:
  text: And those who died in the plague were twenty-four thousand.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - came to be
  - amounted to
  lexicon: HALOT
  rationale: The waw-consecutive form of היה here functions as a copular/existential
    verb introducing the total number. In English, 'were' is the most natural and
    sufficiently formal rendering in a numerical statement.
- source_word: הַמֵּתִים
  chosen: those who died
  alternatives:
  - the dead
  lexicon: HALOT
  rationale: The participial form from מות can be rendered literally as 'the dead,'
    but in English 'those who died' reads more naturally in this census-like statement
    while preserving the reference to the deceased persons.
- source_word: בַּמַּגֵּפָה
  chosen: in the plague
  alternatives:
  - by the plague
  - during the plague
  lexicon: HALOT
  rationale: מַגֵּפָה denotes a plague or deadly outbreak. The preposition ב here
    is most naturally rendered 'in' in connection with those who died in that event.
    'By the plague' is possible, but 'in the plague' stays closer to the Hebrew construction.
- source_word: אַרְבָּעָה וְעֶשְׂרִים אָלֶף
  chosen: twenty-four thousand
  alternatives:
  - four and twenty thousand
  lexicon: HALOT
  rationale: This is the standard Hebrew number expression 'four and twenty thousand.'
    Modern English idiom requires 'twenty-four thousand' for readability without loss
    of meaning.
