theological_decisions:
- issue: Rendering הָעֵדָה
  chosen_reading: congregation
  alternative_readings:
  - assembly
  - community
  rationale: This is not a major doctrinally contested term, but it carries covenant-community
    overtones in the Pentateuch. 'Congregation' preserves the gathered people of Israel
    without importing later ecclesial meanings too strongly. Alternatives are viable
    but not necessary in the main text.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
