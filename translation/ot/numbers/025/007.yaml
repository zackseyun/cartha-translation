id: NUM.25.7
reference: Numbers 25:7
source:
  edition: WLC
  text: וַ/יַּ֗רְא פִּֽינְחָס֙ בֶּן אֶלְעָזָ֔ר בֶּֽן אַהֲרֹ֖ן הַ/כֹּהֵ֑ן וַ/יָּ֨קָם֙
    מִ/תּ֣וֹךְ הָֽ/עֵדָ֔ה וַ/יִּקַּ֥ח רֹ֖מַח בְּ/יָדֽ/וֹ־־׃
translation:
  text: When Phinehas son of Eleazar, son of Aaron the priest, saw it, he rose up
    from the midst of the congregation and took a spear in his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'saw this.' The Hebrew simply says 'saw,' with the object implied by
      the preceding context.
    reason: lexical_alternative
  - marker: b
    text: Or 'from among the congregation' or 'from the assembly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  chosen: saw it
  alternatives:
  - saw
  - saw this
  lexicon: HALOT
  rationale: The verb simply means 'saw.' English idiom benefits from supplying the
    implied object from context (the act described in the previous verse), hence 'saw
    it.' This avoids an abrupt intransitive feel while not adding interpretive detail
    beyond the immediate narrative context.
- source_word: פִּינְחָס
  chosen: Phinehas
  rationale: Standard English transliteration of the personal name, following the
    translation policy to transliterate names rather than translate them.
- source_word: בֶּן אֶלְעָזָר בֶּן אַהֲרֹן הַכֹּהֵן
  chosen: son of Eleazar, son of Aaron the priest
  alternatives:
  - the son of Eleazar, the son of Aaron the priest
  lexicon: HALOT
  rationale: A straightforward genealogical apposition. 'Aaron the priest' is retained
    rather than 'Aaron the high priest' because the Hebrew here has only 'the priest'
    (הַכֹּהֵן), and adding 'high' would import information not stated in this verse.
- source_word: וַיָּקָם
  chosen: he rose up
  alternatives:
  - he arose
  - he stood up
  lexicon: HALOT
  rationale: The verb denotes rising/standing. 'Rose up' is natural modern English
    and preserves the narrative force of decisive action.
- source_word: מִתּוֹךְ הָעֵדָה
  chosen: from the midst of the congregation
  alternatives:
  - from among the congregation
  - from the assembly
  lexicon: HALOT
  rationale: תּוֹךְ is 'midst/middle,' and עֵדָה commonly denotes the gathered community
    or assembly of Israel. 'Congregation' preserves the corporate sense and is a familiar
    rendering in Pentateuchal narrative; 'from the midst of' reflects the Hebrew more
    closely than the simpler 'from among,' while remaining readable.
- source_word: וַיִּקַּח
  chosen: and took
  alternatives:
  - and seized
  lexicon: HALOT
  rationale: The common verb 'take' is sufficient here. 'Seized' would heighten the
    force beyond what the Hebrew itself requires.
- source_word: רֹמַח
  chosen: a spear
  alternatives:
  - a lance
  - a javelin
  lexicon: HALOT
  rationale: רֹמַח denotes a spear or lance-type weapon. 'Spear' is the clearest and
    most natural general English equivalent.
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - in his hand/with him
  - with his hand
  lexicon: HALOT
  rationale: The prepositional phrase is idiomatically rendered 'in his hand,' indicating
    that he armed himself with the spear. This is the most direct and conventional
    English equivalent.
