id: NUM.25.4
reference: Numbers 25:4
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה קַ֚ח אֶת כָּל רָאשֵׁ֣י הָ/עָ֔ם וְ/הוֹקַ֥ע
    אוֹתָ֛/ם לַ/יהוָ֖ה נֶ֣גֶד הַ/שָּׁ֑מֶשׁ וְ/יָשֹׁ֛ב חֲר֥וֹן אַף יְהוָ֖ה מִ/יִּשְׂרָאֵֽל־־־־׃
translation:
  text: And Yahweh said to Moses, “Take all the leaders of the people and impale them
    for Yahweh in broad daylight, so that the burning anger of Yahweh may turn away
    from Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Take all the leaders of the people, and have them execute the guilty
      before the LORD in broad daylight.' The Hebrew pronoun 'them' most directly
      points to the leaders, but some understand the leaders as the ones commanded
      to carry out the punishment.
    reason: alternative_reading
  - marker: b
    text: Literally, 'before the sun.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration
    of the divine name — rather than the traditional 'the LORD' substitution. This
    preserves the personal name God revealed to Israel rather than substituting a
    title.
- source_word: קַח
  chosen: Take
  alternatives:
  - Seize
  - Bring
  lexicon: HALOT
  rationale: The imperative of לקח here introduces Moses' required action toward the
    leaders. 'Take' is the most direct and idiomatic rendering in context.
- source_word: כָּל רָאשֵׁי הָעָם
  chosen: all the heads of the people
  alternatives:
  - all the leaders of the people
  - all the chiefs of the people
  lexicon: HALOT
  rationale: רָאשֵׁי literally means 'heads of.' Because English 'heads of the people'
    remains understandable and preserves the Hebrew metaphor, it is retained in the
    main text. 'Leaders' is a viable smoother alternative but is less formally transparent.
- source_word: וְהוֹקַע אֹתָם
  chosen: and impale them
  alternatives:
  - and hang them up
  - and expose them
  - and execute them publicly
  lexicon: HALOT
  rationale: The verb יקע in the Hiphil denotes a severe public execution/exposure,
    commonly understood as impalement or hanging up bodies. 'Impale' best conveys
    the violent, public, exemplary nature of the punishment without flattening it
    to the generic 'execute.' The pronoun 'them' most naturally refers back to 'all
    the heads of the people' in the syntax of this verse, though the broader narrative
    raises interpretive questions.
- source_word: לַיהוָה
  chosen: before the LORD
  alternatives:
  - to the LORD
  - for the LORD
  lexicon: HALOT
  rationale: The preposition ל can indicate relation or dedication, but in this judicial-sacral
    context 'before the LORD' communicates that the act is carried out in his presence/for
    his judicial satisfaction. This also reads naturally with the following phrase
    of public exposure.
- source_word: נֶגֶד הַשָּׁמֶשׁ
  chosen: in broad daylight
  alternatives:
  - before the sun
  - in front of the sun
  lexicon: HALOT
  rationale: Literally 'before the sun.' The idiom indicates open, public exposure
    in daylight. 'In broad daylight' preserves the sense in natural modern English
    while retaining the public-shame force.
- source_word: וְיָשֹׁב
  chosen: may turn away
  alternatives:
  - will turn back
  - may be turned back
  lexicon: HALOT
  rationale: 'The jussive-like sense after the command expresses purpose/result: the
    action is to be done so that divine wrath may turn away. ''May turn away'' captures
    this well in English.'
- source_word: חֲרוֹן אַף יְהוָה
  chosen: the burning anger of the LORD
  alternatives:
  - the fierce anger of the LORD
  - the wrath of the LORD
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to the burning of the nose/anger, denoting
    intense wrath. 'Burning anger' preserves the metaphorical heat more transparently
    than the more generalized 'wrath.'
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - away from Israel
  lexicon: HALOT
  rationale: The preposition מן marks separation. In English, 'from Israel' is retained,
    with 'away' supplied in the verbal phrase for naturalness.
