theological_decisions:
- issue: Referent of 'them' in 'impale them'
  chosen_reading: The pronoun refers syntactically to 'all the heads of the people.'
  alternative_readings:
  - The leaders are to seize and execute the guilty offenders rather than themselves
    being executed.
  rationale: The immediate grammar most naturally takes אֹתָם as referring to the
    nearest plural antecedent, 'all the heads of the people.' However, because the
    next verse has Moses instruct the judges to kill the men who yoked themselves
    to Baal-peor, some interpreters understand the leaders as agents rather than victims.
    The main text follows the most direct syntactic reading, while preserving the
    alternative in a footnote due to the genuine interpretive tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
