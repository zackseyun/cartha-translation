id: NUM.25.14
reference: Numbers 25:14
source:
  edition: WLC
  text: וְ/שֵׁם֩ אִ֨ישׁ יִשְׂרָאֵ֜ל הַ/מֻּכֶּ֗ה אֲשֶׁ֤ר הֻכָּה֙ אֶת הַ/מִּדְיָנִ֔ית
    זִמְרִ֖י בֶּן סָל֑וּא נְשִׂ֥יא בֵֽית אָ֖ב לַ/שִּׁמְעֹנִֽי־־־׃
translation:
  text: Now the name of the Israelite man who was struck down, who was struck down
    with the Midianite woman, was Zimri son of Salu, a leader of a father's house
    among the Simeonites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the Israelite man who was struck down, who was struck
      down with the Midianite.' The Hebrew repeats the verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''Father''s house'' refers to a patrilineal family or clan unit within
      the tribe.'
    reason: cultural_note
lexical_decisions:
- source_word: וְ/שֵׁם
  chosen: Now the name
  alternatives:
  - And the name
  lexicon: HALOT
  rationale: The conjunction plus noun introduces identifying information following
    the previous narrative. 'Now the name' is natural English while preserving the
    discourse-linking force of וְ.
- source_word: אִישׁ יִשְׂרָאֵל
  chosen: the Israelite man
  alternatives:
  - the man of Israel
  - the Israelite
  lexicon: HALOT
  rationale: אִישׁ with the gentilic/national name identifies him as an Israelite
    male. 'Israelite man' preserves the explicit masculine singular reference better
    than simply 'Israelite.'
- source_word: הַמֻּכֶּה ... אֲשֶׁר הֻכָּה
  chosen: who was struck down, who was struck down
  alternatives:
  - the slain ... who was slain
  - who had been killed
  lexicon: HALOT
  rationale: The Hebrew repeats forms of נכה, creating deliberate emphasis. The English
    retains the repetition rather than collapsing it, and 'struck down' fits the violent
    context without sounding overly wooden.
- source_word: אֶת הַמִּדְיָנִית
  chosen: with the Midianite woman
  alternatives:
  - along with the Midianite woman
  - the Midianite woman
  lexicon: HALOT
  rationale: 'Although אֶת is normally the direct-object marker, here after ''was
    struck down'' it functions idiomatically to indicate accompaniment: he was killed
    together with the Midianite woman. ''With'' communicates the sense clearly in
    English. ''Woman'' is supplied because the adjective is feminine singular and
    the referent in context is Cozbi.'
- source_word: זִמְרִי בֶּן סָלוּא
  chosen: Zimri son of Salu
  alternatives:
  - Zimri, the son of Salu
  lexicon: HALOT
  rationale: Standard transliteration of personal names, following the project's policy
    to transliterate names rather than translate them.
- source_word: נְשִׂיא
  chosen: a leader
  alternatives:
  - a chief
  - a prince
  - a tribal leader
  lexicon: HALOT
  rationale: נָשִׂיא denotes a lifted-up person, i.e., a leader or chief. 'Leader'
    is clear modern English and avoids the potentially misleading royal nuance of
    'prince.'
- source_word: בֵית אָב
  chosen: a father's house
  alternatives:
  - a family clan
  - his ancestral house
  lexicon: HALOT
  rationale: This is a technical kinship term for a patrilineal household/clan unit.
    'Father's house' preserves the Hebrew social structure more transparently than
    flattening it to 'family,' while remaining understandable.
- source_word: לַשִּׁמְעֹנִי
  chosen: among the Simeonites
  alternatives:
  - of the Simeonites
  - belonging to the Simeonite clan
  lexicon: HALOT
  rationale: The phrase identifies the larger tribal affiliation. 'Among the Simeonites'
    reads naturally with the preceding 'leader of a father's house' and conveys membership
    within the tribe of Simeon.
