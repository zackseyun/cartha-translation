id: NUM.25.8
reference: Numbers 25:8
source:
  edition: WLC
  text: וַ֠/יָּבֹא אַחַ֨ר אִֽישׁ יִשְׂרָאֵ֜ל אֶל הַ/קֻּבָּ֗ה וַ/יִּדְקֹר֙ אֶת שְׁנֵי/הֶ֔ם
    אֵ֚ת אִ֣ישׁ יִשְׂרָאֵ֔ל וְ/אֶת הָ/אִשָּׁ֖ה אֶל קֳבָתָ֑/הּ וַ/תֵּֽעָצַר֙ הַ/מַּגֵּפָ֔ה
    מֵ/עַ֖ל בְּנֵ֥י יִשְׂרָאֵֽל־־־־־׃
translation:
  text: He went after the Israelite man into the inner chamber and pierced both of
    them—the Israelite man and the woman—through her belly. Then the plague was stopped
    from upon the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tent chamber,' 'the alcove,' or 'the pavilion'; the Hebrew term
      is rare and refers to an inner compartment or chamber.
    reason: lexical_alternative
  - marker: b
    text: Or 'through her abdomen.' The Hebrew refers specifically to the belly or
      abdominal cavity.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the sons of Israel,' a standard covenantal expression for the people
      of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקֻּבָּה
  chosen: the inner chamber
  alternatives:
  - the tent chamber
  - the alcove
  - the pavilion
  lexicon: HALOT
  rationale: The noun is rare and denotes an interior compartment or chamber. 'Inner
    chamber' communicates a private enclosed space without overcommitting to a specific
    architectural form. 'Tent chamber' is possible in context, but the Hebrew term
    itself points more to an inner room than explicitly to a tent.
- source_word: וַיִּדְקֹר
  chosen: pierced
  alternatives:
  - stabbed
  - ran through
  lexicon: HALOT
  rationale: '''Pierced'' preserves the violent thrusting sense of דקר while remaining
    natural English. ''Stabbed'' is possible but slightly less vivid of the through-penetration
    implied by the context.'
- source_word: שְׁנֵיהֶם
  chosen: both of them
  lexicon: HALOT
  rationale: A straightforward rendering of the dual expression, preserving that Phinehas
    struck the two together.
- source_word: אֶל קֳבָתָהּ
  chosen: through her belly
  alternatives:
  - through her abdomen
  - into her body
  lexicon: HALOT
  rationale: The noun קֳבָה refers to the belly or abdominal cavity. 'Through her
    belly' is concrete and idiomatic, matching the physical detail of the Hebrew.
    'Abdomen' is more clinical; 'into her body' is too vague.
- source_word: וַתֵּעָצַר
  chosen: was stopped
  alternatives:
  - was checked
  - was restrained
  - ceased
  lexicon: HALOT
  rationale: The Niphal form conveys that the plague was halted. 'Was stopped' is
    clear modern English and preserves the passive/resultative sense.
- source_word: הַמַּגֵּפָה
  chosen: the plague
  alternatives:
  - the affliction
  - the pestilence
  lexicon: HALOT
  rationale: In this judgment context, 'plague' is the standard and most natural rendering
    for מַגֵּפָה.
- source_word: מֵעַל בְּנֵי יִשְׂרָאֵל
  chosen: from upon the sons of Israel
  alternatives:
  - from the Israelites
  - from over the people of Israel
  lexicon: HALOT
  rationale: This keeps the spatial idiom מֵעַל ('from upon') and preserves the gender-accurate
    'sons of Israel' in line with the translation philosophy. A more idiomatic alternative
    would be 'from the Israelites,' but that loses the Hebrew form.
- source_word: אִישׁ יִשְׂרָאֵל
  chosen: the Israelite man
  alternatives:
  - the man of Israel
  - the Israelite
  lexicon: HALOT
  rationale: This preserves both the individual male reference and his Israelite identity.
    'The Israelite' is possible, but 'man' reflects the explicit noun אִישׁ.
