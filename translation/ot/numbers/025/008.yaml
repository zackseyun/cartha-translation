theological_decisions:
- issue: Gendered corporate expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - people of Israel
  rationale: The Hebrew is explicitly masculine plural in the standard covenantal
    expression. Per the doctrine's gender-accurate principle, the translation keeps
    'sons of Israel' rather than neutralizing it, while recognizing that in many contexts
    it refers to the whole people.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Graphic anatomical detail in the judgment scene
  chosen_reading: through her belly
  alternative_readings:
  - through her abdomen
  rationale: The Hebrew gives a concrete bodily detail and should not be softened.
    Preserving the severity of the act matches the source text without embellishment.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
