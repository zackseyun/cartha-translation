theological_decisions:
- issue: Rendering the idolatrous act described by וַיִּשְׁתַּחֲווּ
  chosen_reading: bowed down to their gods
  alternative_readings:
  - worshiped their gods
  rationale: The translation preserves the concrete bodily action rather than moving
    immediately to the more interpretive 'worshiped.' This maintains the narrative's
    lexical texture and lets the theological offense emerge from the context of sacrificial
    participation and obeisance.
  doctrine_reference: Translation philosophy §3, §6
