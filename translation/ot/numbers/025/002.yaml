id: NUM.25.2
reference: Numbers 25:2
source:
  edition: WLC
  text: וַ/תִּקְרֶ֣אןָ לָ/עָ֔ם לְ/זִבְחֵ֖י אֱלֹהֵי/הֶ֑ן וַ/יֹּ֣אכַל הָ/עָ֔ם וַ/יִּֽשְׁתַּחֲוּ֖וּ
    לֵֽ/אלֹהֵי/הֶֽן׃
translation:
  text: And they invited the people to the sacrifices of their gods, and the people
    ate and bowed down to their gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worshiped their gods.' The Hebrew verb literally refers to bowing oneself
      down, often as an act of worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְרֶאןָ
  chosen: they invited
  alternatives:
  - they called
  - they summoned
  lexicon: HALOT
  rationale: Qal wayyiqtol 3fp of קרא with לְ plus persons naturally means calling/inviting
    someone to something. In context, the feminine plural subject refers back to the
    Moabite women of the previous verse, so 'they invited' is idiomatic and contextually
    precise.
- source_word: לָעָם
  chosen: the people
  alternatives:
  - the people of Israel
  - the nation
  lexicon: HALOT
  rationale: עָם with article means 'the people.' Although context identifies Israel,
    the Hebrew here does not repeat 'Israel,' so the translation keeps the more literal
    expression.
- source_word: לְזִבְחֵי אֱלֹהֵיהֶן
  chosen: to the sacrifices of their gods
  alternatives:
  - to sacrifices for their gods
  - to their gods' sacrifices
  lexicon: HALOT
  rationale: זִבְחֵי is the plural construct 'sacrifices of,' linked with 'their gods.'
    The phrase denotes sacrificial meals or rites associated with those deities. 'To
    the sacrifices of their gods' preserves the Hebrew structure while remaining natural
    English.
- source_word: וַיֹּאכַל
  chosen: ate
  alternatives:
  - did eat
  - partook
  lexicon: HALOT
  rationale: 'Simple narrative verb ''and he/it ate,'' with collective singular subject
    הָעָם. English idiom uses plural agreement with the collective sense: ''the people
    ate.'' ''Partook'' is possible but less direct than the Hebrew.'
- source_word: וַיִּשְׁתַּחֲווּ
  chosen: bowed down
  alternatives:
  - worshiped
  - prostrated themselves
  lexicon: HALOT
  rationale: The verb שׁחה/השתחוה literally denotes bowing oneself down, often in
    worship. 'Bowed down' preserves the physical act and leaves the reader to see
    its idolatrous significance from context; 'worshiped' is interpretive, while 'prostrated
    themselves' is more formal than needed.
- source_word: לֵאלֹהֵיהֶן
  chosen: to their gods
  alternatives:
  - before their gods
  lexicon: HALOT
  rationale: The preposition לְ after השתחוה commonly marks the object toward whom
    obeisance is directed. 'To their gods' is a straightforward rendering and matches
    the Hebrew construction.
