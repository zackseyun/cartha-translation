id: NUM.25.16
reference: Numbers 25:16
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר יְהוָ֖ה אֶל מֹשֶׁ֥ה לֵּ/אמֹֽר־׃
translation:
  text: And the LORD spoke to Moses, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: YHWH; traditionally rendered ''the LORD.'' Alternative English
      renderings include ''Yahweh'' and ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of דבר introduces a new narrative event.
    'Spoke' is the standard and slightly more formal rendering for divine address,
    fitting the formulaic narrative introduction better than the simpler 'said.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    to follow established reverential convention and the pattern reflected in the
    Septuagint tradition.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech. 'To' is the natural
    modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names rather than translate them.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: This infinitive construct functions as the conventional speech-introduction
    formula following 'spoke to Moses.' 'Saying' preserves the Hebrew structure cleanly
    in readable English.
