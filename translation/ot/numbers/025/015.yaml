id: NUM.25.15
reference: Numbers 25:15
source:
  edition: WLC
  text: וְ/שֵׁ֨ם הָֽ/אִשָּׁ֧ה הַ/מֻּכָּ֛ה הַ/מִּדְיָנִ֖ית כָּזְבִּ֣י בַת צ֑וּר רֹ֣אשׁ
    אֻמּ֥וֹת בֵּֽית אָ֛ב בְּ/מִדְיָ֖ן הֽוּא־־׃פ
translation:
  text: And the name of the Midianite woman who was struck down was Cozbi daughter
    of Zur, the head of the clans of a father's house in Midian.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the head of the peoples of a father's house in Midian.' The Hebrew term
      can denote 'peoples' or, in this kinship context, clan-groups.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'father's house,' a kinship term for an extended family or ancestral
      household.
    reason: cultural_note
lexical_decisions:
- source_word: וְשֵׁם
  chosen: And the name
  alternatives:
  - Now the name
  lexicon: HALOT
  rationale: A straightforward rendering of the conjunction plus noun. 'And' preserves
    the Hebrew narrative linkage to the previous verse; 'Now' is possible in English
    but less formally transparent.
- source_word: הָאִשָּׁה
  chosen: the woman
  lexicon: HALOT
  rationale: Standard rendering of אִשָּׁה. The definite article is retained.
- source_word: הַמֻּכָּה
  chosen: who was struck down
  alternatives:
  - who was killed
  - the slain
  lexicon: HALOT
  rationale: Passive participle from נכה. In context the woman has been killed (cf.
    previous verse), but 'struck down' preserves the verbal imagery without over-specifying
    beyond the participle itself. 'Killed' is interpretive but contextually valid.
- source_word: הַמִּדְיָנִית
  chosen: the Midianite
  alternatives:
  - the Midianite woman
  lexicon: HALOT
  rationale: Adjectival ethnic designation modifying 'woman.' In English it is natural
    to render as 'the Midianite woman'; in the final line, 'Midianite' is placed before
    'woman' for readability while preserving the ethnic marker.
- source_word: כָּזְבִּי
  chosen: Cozbi
  alternatives:
  - Kozbi
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention. 'Cozbi'
    reflects common English transliteration.
- source_word: בַת צ֑וּר
  chosen: daughter of Zur
  lexicon: HALOT
  rationale: Construct chain indicating filiation. 'Daughter of' is the normal and
    transparent rendering.
- source_word: רֹאשׁ
  chosen: the head
  alternatives:
  - a chief
  - leader
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head' and often denotes a leader/chief. 'The head'
    preserves the metaphor and works idiomatically in apposition to Zur.
- source_word: אֻמּוֹת
  chosen: the clans
  alternatives:
  - the peoples
  - tribal groups
  lexicon: HALOT
  rationale: Though אֻמּוֹת can mean 'peoples/nations,' in this genealogical-tribal
    context with 'father's house' it likely refers to constituent kin-groups or clans.
    'Clans' best fits the social structure in context.
- source_word: בֵּית אָב
  chosen: of a father's house
  alternatives:
  - of a family house
  - of a paternal household
  lexicon: HALOT
  rationale: This is a technical kinship term in Hebrew social organization. A relatively
    literal rendering, 'father's house,' preserves the idiom while remaining understandable.
    The indefinite article reflects the absence of a Hebrew article and the appositional
    sense.
- source_word: בְּמִדְיָן
  chosen: in Midian
  alternatives:
  - among Midian
  lexicon: HALOT
  rationale: The preposition ב is most naturally locative here. 'In Midian' is clear
    and idiomatic.
- source_word: הוּא
  chosen: was
  alternatives:
  - he was
  - he himself was
  lexicon: HALOT
  rationale: The pronoun resumes Zur and functions as a copular element in English.
    Rendering it simply as 'was' avoids awkwardness while preserving the appositional
    identification.
