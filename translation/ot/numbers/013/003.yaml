id: NUM.13.3
reference: Numbers 13:3
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֨ח אֹתָ֥/ם מֹשֶׁ֛ה מִ/מִּדְבַּ֥ר פָּארָ֖ן עַל פִּ֣י יְהוָ֑ה כֻּלָּ֣/ם
    אֲנָשִׁ֔ים רָאשֵׁ֥י בְנֵֽי יִשְׂרָאֵ֖ל הֵֽמָּה־־׃
translation:
  text: So Moses sent them from the wilderness of Paran at the command of the LORD.
    All of them were men, heads of the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to the word of the LORD.' The Hebrew idiom is literally 'upon
      the mouth of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''leaders of the Israelites.'' Hebrew: ''heads of the sons of Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: The waw-consecutive verb from שׁלח narrates a past action. 'Sent' is
    the natural, concise English equivalent in narrative context.
- source_word: מִמִּדְבַּר פָּארָן
  chosen: from the wilderness of Paran
  alternatives:
  - from the desert of Paran
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert land. 'Wilderness' fits biblical
    geographic style well and avoids sounding overly arid where the term can denote
    uncultivated region generally. Paran is transliterated as a place name.
- source_word: עַל פִּי יְהוָה
  chosen: at the command of the LORD
  alternatives:
  - according to the word of the LORD
  - by the mouth of the LORD
  lexicon: HALOT
  rationale: The idiom עַל־פִּי literally 'upon the mouth of' means according to a
    command or directive. 'At the command of' is idiomatic English and captures the
    force of divine authorization. יְהוָה is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name follows the project's default rendering 'the LORD' in
    keeping with the doctrine excerpt's contested terms table.
- source_word: כֻּלָּם
  chosen: All of them
  alternatives:
  - all of them together
  - every one of them
  lexicon: HALOT
  rationale: The term emphasizes the totality of the group. 'All of them' preserves
    the emphasis clearly in English.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - persons
  lexicon: HALOT
  rationale: The Hebrew is grammatically and semantically masculine here, referring
    to male tribal representatives. Per the doctrine's gender-accurate principle,
    'men' is preferable to a gender-neutral rendering.
- source_word: רָאשֵׁי בְנֵי יִשְׂרָאֵל
  chosen: heads of the sons of Israel
  alternatives:
  - leaders of the Israelites
  - chiefs of the children of Israel
  lexicon: HALOT
  rationale: רָאשֵׁי literally means 'heads/chiefs.' 'Heads of the sons of Israel'
    preserves the concrete Hebrew expression and the familial covenantal designation
    בְנֵי יִשְׂרָאֵל. 'Leaders of the Israelites' is smoother but less formally transparent.
- source_word: הֵמָּה
  chosen: were
  alternatives:
  - they were
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis: ''they themselves.'' In English,
    that emphasis is adequately conveyed by the clause ''All of them were...'' without
    requiring a wooden repetition.'
