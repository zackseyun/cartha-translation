theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the Tetragrammaton as 'the LORD,' following
    the doctrine excerpt and preserving established reverential convention without
    transliterating the name in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered language in אֲנָשִׁים / בְנֵי יִשְׂרָאֵל
  chosen_reading: men ... sons of Israel
  alternative_readings:
  - leaders of the Israelites
  - men ... Israelites
  rationale: The verse identifies male representatives, so gender-accurate language
    should be retained. 'Sons of Israel' also preserves the covenantal family expression
    rather than flattening it to the ethnic label 'Israelites' in the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
