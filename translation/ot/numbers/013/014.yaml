id: NUM.13.14
reference: Numbers 13:14
source:
  edition: WLC
  text: לְ/מַטֵּ֣ה נַפְתָּלִ֔י נַחְבִּ֖י בֶּן וָפְסִֽי־׃
translation:
  text: from the tribe of Naphtali, Nahbi son of Vophsi;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Vapsi.” English transliterations of this Hebrew name vary.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/מַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: In this list of tribal representatives, the prefixed לְ with מַטֶּה introduces
    the tribal affiliation of the named man. English idiom is best served by 'from
    the tribe of,' which makes the representative sense explicit without over-paraphrasing.
- source_word: נַפְתָּלִי
  chosen: Naphtali
  lexicon: HALOT
  rationale: Proper tribal/personal name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: נַחְבִּי
  chosen: Nahbi
  lexicon: HALOT
  rationale: Proper personal name; transliterated by standard English convention.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical construction in Hebrew. 'Son of' is the natural
    concise English rendering in name lists.
- source_word: וָפְסִי
  chosen: Vophsi
  alternatives:
  - Vapsi
  lexicon: HALOT
  rationale: Proper personal name. 'Vophsi' follows a common English transliteration
    of the Hebrew consonants and vowels; 'Vapsi' is a viable transliteration variant
    worth preserving.
