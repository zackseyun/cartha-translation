id: NUM.13.12
reference: Numbers 13:12
source:
  edition: WLC
  text: לְ/מַטֵּ֣ה דָ֔ן עַמִּיאֵ֖ל בֶּן גְּמַלִּֽי־׃
translation:
  text: for the tribe of Dan, Ammiel son of Gemalli;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/מַטֶּה
  chosen: for the tribe of
  alternatives:
  - from the tribe of
  - for the staff/branch of
  lexicon: HALOT
  rationale: In this list of tribal representatives, לְ marks assignment/list membership
    and מַטֶּה refers idiomatically to a tribal unit, not a literal staff. 'For the
    tribe of' fits the syntax of the surrounding list in Numbers 13, where each name
    is presented as the representative for a tribe.
- source_word: דָן
  chosen: Dan
  rationale: Proper tribal name; transliterated according to the translation philosophy
    for personal and tribal names.
- source_word: עַמִּיאֵל
  chosen: Ammiel
  alternatives:
  - Ammiel
  rationale: Proper personal name; transliterated in standard English form. A minor
    spelling variation exists in English, but 'Ammiel' is the more familiar conventional
    transliteration.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical construction in Hebrew. 'Son of' is the natural
    concise English rendering in list format.
- source_word: גְּמַלִּי
  chosen: Gemalli
  alternatives:
  - Gammali
  rationale: Proper personal name; transliterated. 'Gemalli' reflects a standard English
    representation of the Hebrew name.
