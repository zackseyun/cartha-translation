id: NUM.13.6
reference: Numbers 13:6
source:
  edition: WLC
  text: לְ/מַטֵּ֣ה יְהוּדָ֔ה כָּלֵ֖ב בֶּן יְפֻנֶּֽה־׃
translation:
  text: from the tribe of Judah, Caleb son of Jephunneh.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/מַטֶּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: In this list of tribal representatives, the prefixed ל with מַטֶּה introduces
    the tribe represented by the named individual. English idiom is best conveyed
    as 'from the tribe of' rather than the more wooden 'for the tribe of,' while preserving
    the representative sense.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard transliteration of the tribal/personal name יְהוּדָה. Here it
    denotes the tribe descended from Judah.
- source_word: כָּלֵב
  chosen: Caleb
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: The construct relationship identifies Caleb by immediate paternal lineage.
    'Son of' is the normal concise genealogical rendering in English.
- source_word: יְפֻנֶּה
  chosen: Jephunneh
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
