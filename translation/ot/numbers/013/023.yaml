id: NUM.13.23
reference: Numbers 13:23
source:
  edition: WLC
  text: וַ/יָּבֹ֜אוּ עַד נַ֣חַל אֶשְׁכֹּ֗ל וַ/יִּכְרְת֨וּ מִ/שָּׁ֤ם זְמוֹרָה֙ וְ/אֶשְׁכּ֤וֹל
    עֲנָבִים֙ אֶחָ֔ד וַ/יִּשָּׂאֻ֥/הוּ בַ/מּ֖וֹט בִּ/שְׁנָ֑יִם וּ/מִן הָ/רִמֹּנִ֖ים
    וּ/מִן הַ/תְּאֵנִֽים־־־׃
translation:
  text: They came as far as the Valley of Eshcol, and from there they cut down a branch
    with a single cluster of grapes, and two of them carried it on a pole; they also
    took some of the pomegranates and figs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Wadi of Eshcol' or 'the Brook of Eshcol.' The Hebrew נַחַל can refer
      to a ravine or seasonal watercourse as well as a valley.
    reason: lexical_alternative
  - marker: b
    text: Or 'a vine branch with one cluster of grapes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחַל אֶשְׁכֹּל
  chosen: the Valley of Eshcol
  alternatives:
  - the Wadi of Eshcol
  - the Brook of Eshcol
  lexicon: HALOT
  rationale: נַחַל can denote a wadi, ravine, torrent-valley, or brook depending on
    context. In English, 'Valley' is the most natural and broadly understandable rendering
    here for a named geographic feature, while preserving the sense of a ravine/torrent-bed.
    'Eshcol' is transliterated as a place name per translation philosophy.
- source_word: זְמוֹרָה
  chosen: a branch
  alternatives:
  - a vine branch
  - a shoot
  lexicon: HALOT
  rationale: זְמוֹרָה refers specifically to a vine branch or tendril. Because the
    following phrase immediately identifies a cluster of grapes, 'branch' is sufficient
    in the main text without overloading the line; the more specific 'vine branch'
    is preserved as an alternative.
- source_word: אֶשְׁכּוֹל עֲנָבִים אֶחָד
  chosen: a single cluster of grapes
  alternatives:
  - one cluster of grapes
  lexicon: HALOT
  rationale: 'The phrase is straightforwardly quantitative: one cluster of grapes.
    ''A single cluster'' is idiomatic modern English and preserves the emphasis on
    singularity.'
- source_word: וַיִּשָּׂאֻהוּ
  chosen: carried it
  alternatives:
  - bore it
  lexicon: HALOT
  rationale: The suffix refers back to the branch/cluster complex as a singular object.
    'Carried it' is clear modern English; 'bore it' is more formal but less natural.
- source_word: בַמּוֹט
  chosen: on a pole
  alternatives:
  - with a carrying pole
  - on a staff
  lexicon: HALOT
  rationale: מוֹט denotes a pole or carrying bar. 'On a pole' best fits the image
    of suspending the cut branch/cluster for transport.
- source_word: בִּשְׁנָיִם
  chosen: two of them
  alternatives:
  - by two men
  - with two
  lexicon: HALOT
  rationale: Literally 'by two' or 'with two.' The subject is the scouting party,
    so English requires an explicit sense. 'Two of them' conveys the implied agents
    without adding unnecessary specificity beyond the context.
- source_word: וּמִן הָרִמֹּנִים וּמִן הַתְּאֵנִים
  chosen: they also took some of the pomegranates and figs
  alternatives:
  - and some pomegranates and figs
  - as well as some of the pomegranates and figs
  lexicon: HALOT
  rationale: The Hebrew appends additional produce taken from the land. English idiom
    benefits from making the implied action explicit. 'They also took some of' smoothly
    carries forward the narrative sense without overstating the amount.
