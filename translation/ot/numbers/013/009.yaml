id: NUM.13.9
reference: Numbers 13:9
source:
  edition: WLC
  text: לְ/מַטֵּ֣ה בִנְיָמִ֔ן פַּלְטִ֖י בֶּן רָפֽוּא־׃
translation:
  text: from the tribe of Benjamin, Palti son of Raphu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the tribe of Benjamin' or 'of the tribe of Benjamin.' The Hebrew
      construction marks tribal affiliation in this list.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/מַטֶּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - of the tribe of
  lexicon: HALOT
  rationale: In this list of tribal representatives, the prefixed לְ with מַטֶּה introduces
    the tribe to which the named man belongs. English idiom is best represented as
    'from the tribe of,' which makes the representative relationship clear without
    woodenly preserving the preposition.
- source_word: בִנְיָמִן
  chosen: Benjamin
  lexicon: HALOT
  rationale: Proper tribal/personal name; transliterated according to standard English
    convention, consistent with the translation philosophy to transliterate names.
- source_word: פַּלְטִי
  chosen: Palti
  lexicon: HALOT
  rationale: Proper personal name; transliterated rather than translated.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical construction in Hebrew. 'Son of' is the natural
    concise English rendering in a list of names.
- source_word: רָפוּא
  chosen: Raphu
  alternatives:
  - Raphu
  lexicon: HALOT
  rationale: Proper personal name; transliterated. 'Raphu' reflects a straightforward
    English representation of the Hebrew vowels and is a common conventional form.
