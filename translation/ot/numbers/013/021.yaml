id: NUM.13.21
reference: Numbers 13:21
source:
  edition: WLC
  text: וַֽ/יַּעֲל֖וּ וַ/יָּתֻ֣רוּ אֶת הָ/אָ֑רֶץ מִ/מִּדְבַּר צִ֥ן עַד רְחֹ֖ב לְבֹ֥א
    חֲמָֽת־־־׃
translation:
  text: So they went up and spied out the land from the wilderness of Zin as far as
    Rehob, at Lebo-hamath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'toward the entrance of Hamath.' The Hebrew expression may be read descriptively
      rather than as the place name Lebo-hamath.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: they went up
  alternatives:
  - they ascended
  lexicon: HALOT
  rationale: The verb עלה literally means 'go up/ascend.' In narrative travel contexts,
    'went up' is natural English and preserves the directional nuance without sounding
    overly formal.
- source_word: וַיָּתֻרוּ
  chosen: spied out
  alternatives:
  - explored
  - scouted out
  lexicon: HALOT
  rationale: The verb תור in this context refers to reconnaissance of the land by
    the appointed men. 'Spied out' fits the immediate narrative context of the spies
    better than the broader 'explored,' while remaining idiomatic.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ/region
  lexicon: HALOT
  rationale: In Numbers 13 the referent is the land of Canaan under investigation.
    'The land' is the standard and contextually precise rendering.
- source_word: מִמִּדְבַּר צִן
  chosen: from the wilderness of Zin
  alternatives:
  - from the desert of Zin
  lexicon: HALOT
  rationale: מִדְבָּר can be rendered 'wilderness' or 'desert.' 'Wilderness' is a
    conventional and accurate rendering in Pentateuchal geography, and Zin is transliterated
    as a place name.
- source_word: עַד רְחֹב
  chosen: as far as Rehob
  alternatives:
  - to Rehob
  lexicon: HALOT
  rationale: עַד marks the extent of the reconnaissance. 'As far as Rehob' clearly
    expresses the geographic range.
- source_word: לְבֹא חֲמָת
  chosen: at Lebo-hamath
  alternatives:
  - toward the entrance of Hamath
  - to Lebo-hamath
  lexicon: HALOT
  rationale: The expression is often understood as a place name or geographic marker.
    Rendering it as 'Lebo-hamath' preserves the likely toponymic force and avoids
    over-interpreting it as a purely descriptive phrase in the main text; the descriptive
    alternative is preserved in a footnote.
