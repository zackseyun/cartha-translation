id: NUM.13.26
reference: Numbers 13:26
source:
  edition: WLC
  text: וַ/יֵּלְכ֡וּ וַ/יָּבֹאוּ֩ אֶל מֹשֶׁ֨ה וְ/אֶֽל אַהֲרֹ֜ן וְ/אֶל כָּל עֲדַ֧ת
    בְּנֵֽי יִשְׂרָאֵ֛ל אֶל מִדְבַּ֥ר פָּארָ֖ן קָדֵ֑שָׁ/ה וַ/יָּשִׁ֨יבוּ אוֹתָ֤/ם
    דָּבָר֙ וְ/אֶת כָּל הָ֣/עֵדָ֔ה וַ/יַּרְא֖וּ/ם אֶת פְּרִ֥י הָ/אָֽרֶץ־־־־־־־־־׃
translation:
  text: They went and came to Moses and Aaron and to all the congregation of the sons
    of Israel in the wilderness of Paran, at Kadesh. They brought back a report to
    them and to all the congregation, and showed them the fruit of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the congregation of the Israelites.' The Hebrew is literally 'the congregation
      of the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ וַיָּבֹאוּ
  chosen: They went and came
  alternatives:
  - They came
  - They returned and came
  lexicon: HALOT
  rationale: Preserves the Hebrew narrative sequence with two coordinated wayyiqtol
    verbs rather than collapsing them into a single English verb. 'Went and came'
    sounds slightly formal but reflects the movement and arrival.
- source_word: עֲדַת בְּנֵי יִשְׂרָאֵל
  chosen: the congregation of the sons of Israel
  alternatives:
  - the congregation of the Israelites
  - the whole community of Israel
  lexicon: HALOT
  rationale: Rendered more formally to preserve both עֲדָה ('congregation/assembly')
    and the construct phrase 'sons of Israel.' This follows the gender-accurate principle
    by not flattening בְּנֵי into a neutral paraphrase in the main text.
- source_word: מִדְבַּר פָּארָן
  chosen: the wilderness of Paran
  alternatives:
  - the desert of Paran
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard and contextually appropriate rendering
    for מִדְבָּר in Israel''s journey narratives.'
- source_word: קָדֵשָׁה
  chosen: at Kadesh
  alternatives:
  - to Kadesh
  lexicon: HALOT
  rationale: 'The directional/locative ending indicates movement toward the place,
    but in English the phrase naturally identifies the destination as their point
    of arrival: ''in the wilderness of Paran, at Kadesh.'''
- source_word: וַיָּשִׁיבוּ אוֹתָם דָּבָר
  chosen: They brought back a report to them
  alternatives:
  - They brought them word
  - They reported to them
  lexicon: HALOT
  rationale: The idiom literally involves returning 'word,' but 'brought back a report'
    is natural English and preserves the sense of an official report after reconnaissance.
- source_word: וְאֶת כָּל הָעֵדָה
  chosen: and to all the congregation
  alternatives:
  - and to the whole congregation
  - and to all the assembly
  lexicon: HALOT
  rationale: Supplies the implied preposition in English from the previous clause
    and keeps the same rendering for עֵדָה as earlier in the verse for consistency.
- source_word: וַיַּרְאוּם
  chosen: showed them
  alternatives:
  - caused them to see
  - let them see
  lexicon: HALOT
  rationale: The Hiphil of ראה here means to show or display, not merely 'saw.' 'Showed
    them' is the clearest idiomatic rendering.
- source_word: פְּרִי הָאָרֶץ
  chosen: the fruit of the land
  alternatives:
  - the produce of the land
  lexicon: HALOT
  rationale: '''Fruit of the land'' is a transparent rendering and fits the immediate
    context of the scouts displaying the land''s yield; ''produce'' is possible but
    less vivid.'
