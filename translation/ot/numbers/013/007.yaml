id: NUM.13.7
reference: Numbers 13:7
source:
  edition: WLC
  text: לְ/מַטֵּ֣ה יִשָּׂשכָ֔ר יִגְאָ֖ל בֶּן יוֹסֵֽף־׃
translation:
  text: from the tribe of Issachar, Igal son of Joseph;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/מַטֶּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: In this list of tribal representatives, the prefixed לְ with מַטֶּה introduces
    the tribe represented by the named individual. English idiom is best served by
    'from the tribe of,' which conveys source/association naturally in a roster context.
- source_word: יִשָּׂשכָר
  chosen: Issachar
  rationale: Standard English transliteration of the tribal/personal name יִשָּׂשכָר,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: יִגְאָל
  chosen: Igal
  alternatives:
  - Yigal
  rationale: Proper name transliterated into standard English biblical form 'Igal.'
    'Yigal' is a more directly phonetic transliteration but is less conventional in
    English Bible style.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: The construct phrase בֶּן יוֹסֵף in a genealogical identification most
    directly means 'son of Joseph.' While 'descendant of' can sometimes fit broader
    genealogical usage, nothing in this immediate context requires broadening beyond
    the ordinary filial sense.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Standard English transliteration of the personal name יוֹסֵף.
