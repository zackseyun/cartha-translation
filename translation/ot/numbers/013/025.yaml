id: NUM.13.25
reference: Numbers 13:25
source:
  edition: WLC
  text: וַ/יָּשֻׁ֖בוּ מִ/תּ֣וּר הָ/אָ֑רֶץ מִ/קֵּ֖ץ אַרְבָּעִ֥ים יֽוֹם׃
translation:
  text: They returned from scouting out the land at the end of forty days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from exploring the land' or 'from spying out the land.' The Hebrew verb
      refers to examining the land on a reconnaissance mission.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  chosen: They returned
  alternatives:
  - And they returned
  - So they returned
  lexicon: HALOT
  rationale: Qal wayyiqtol 3mp of שוב, narrating the next event in sequence. 'They
    returned' gives the plain sense in natural English; the conjunction is absorbed
    into English narrative flow rather than explicitly rendered as 'and'.
- source_word: מִתּוּר
  chosen: from scouting out
  alternatives:
  - from exploring
  - from spying out
  lexicon: HALOT
  rationale: 'The infinitive construct of תור with prefixed מִן expresses source:
    ''from touring/exploring.'' In the context of the mission of the twelve men, ''scouting
    out'' best captures reconnaissance without overloading the term with the more
    pejorative sense of ''spying.'''
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: אָרֶץ here refers specifically to the land under investigation, not the
    earth in a global sense. 'The land' is the standard contextual rendering.
- source_word: מִקֵּץ
  chosen: at the end of
  alternatives:
  - after
  - from the end of
  lexicon: HALOT
  rationale: The preposition מִן with קֵץ idiomatically marks the completion point
    of a period. 'At the end of' is the most precise English equivalent.
- source_word: אַרְבָּעִים יוֹם
  chosen: forty days
  alternatives:
  - forty day(s)
  lexicon: HALOT
  rationale: Straightforward cardinal number plus singular noun used as a measure
    expression in Hebrew; idiomatic English requires the plural, 'forty days.'
