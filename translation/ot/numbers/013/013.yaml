id: NUM.13.13
reference: Numbers 13:13
source:
  edition: WLC
  text: לְ/מַטֵּ֣ה אָשֵׁ֔ר סְת֖וּר בֶּן מִיכָאֵֽל־׃
translation:
  text: from the tribe of Asher, Sethur son of Michael;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/מַטֶּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: In this list of tribal representatives in Numbers 13, the prefixed לְ
    with מַטֶּה introduces the tribe from which the named man comes. English idiom
    is best served by 'from the tribe of,' which makes the representative relationship
    explicit without over-paraphrasing.
- source_word: אָשֵׁר
  chosen: Asher
  lexicon: HALOT
  rationale: Proper tribal/personal name; per translation philosophy, names are transliterated
    by standard English convention.
- source_word: סְתוּר
  chosen: Sethur
  alternatives:
  - Sethur
  lexicon: HALOT
  rationale: Proper personal name, transliterated into standard English form. The
    Hebrew vocalization supports the conventional English spelling 'Sethur.'
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: The construct phrase בֶּן + personal name is the standard patronymic
    'son of.' The article is unnecessary in English list style.
- source_word: מִיכָאֵל
  chosen: Michael
  alternatives:
  - Micael
  lexicon: HALOT
  rationale: Proper personal name, transliterated according to established English
    convention as 'Michael.'
