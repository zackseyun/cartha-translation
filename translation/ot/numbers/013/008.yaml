id: NUM.13.8
reference: Numbers 13:8
source:
  edition: WLC
  text: לְ/מַטֵּ֥ה אֶפְרָ֖יִם הוֹשֵׁ֥עַ בִּן נֽוּן־׃
translation:
  text: from the tribe of Ephraim, Hoshea son of Nun;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hoshea is the earlier name of the man later called Joshua (see Numbers 13:16).
    reason: cross_reference
  - marker: b
    text: The name may also be spelled 'Hosea' in English; 'Hoshea' is used here to
      distinguish this figure from the prophet Hosea.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/מַטֶּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: 'In this list of tribal representatives, לְ with מַטֶּה marks affiliation/source:
    the person representing that tribe. ''From the tribe of'' is idiomatic English
    and fits the repetitive list structure better than a more wooden ''for the tribe
    of,'' while preserving the sense of tribal identification.'
- source_word: אֶפְרָיִם
  chosen: Ephraim
  lexicon: HALOT
  rationale: Proper tribal/personal name; per translation philosophy, names are transliterated
    by standard English convention.
- source_word: הוֹשֵׁעַ
  chosen: Hoshea
  alternatives:
  - Hosea
  lexicon: HALOT
  rationale: This is the personal name of the spy later renamed Joshua (cf. Num 13:16).
    'Hoshea' is the standard English transliteration for this figure in this context
    and avoids confusion with the prophet Hosea, though the forms are related.
- source_word: בִּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical construction in Hebrew. 'Son of' is concise and
    natural in list format.
- source_word: נוּן
  chosen: Nun
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
