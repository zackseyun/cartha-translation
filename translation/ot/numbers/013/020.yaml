id: NUM.13.20
reference: Numbers 13:20
source:
  edition: WLC
  text: וּ/מָ֣ה הָ֠/אָרֶץ הַ/שְּׁמֵנָ֨ה הִ֜וא אִם רָזָ֗ה הֲ/יֵֽשׁ בָּ֥/הּ עֵץ֙ אִם
    אַ֔יִן וְ/הִ֨תְחַזַּקְתֶּ֔ם וּ/לְקַחְתֶּ֖ם מִ/פְּרִ֣י הָ/אָ֑רֶץ וְ/הַ֨/יָּמִ֔ים
    יְמֵ֖י בִּכּוּרֵ֥י עֲנָבִֽים־־־׃
translation:
  text: And what is the land like—whether it is rich or poor, whether there are trees
    in it or not. And be courageous, and take some of the fruit of the land.” Now
    the days were the days of the first-ripe grapes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'whether there is timber in it or not'; the Hebrew word can
      mean 'tree' or 'wood.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the days were the days of the first-ripe grapes,' that is, the
      beginning of the grape harvest season.
    reason: cultural_note
lexical_decisions:
- source_word: הַשְּׁמֵנָה
  chosen: rich
  alternatives:
  - fertile
  - fat
  lexicon: HALOT
  rationale: Literally 'fat,' used idiomatically of land that is fertile/productive.
    'Rich' is natural modern English and fits the contrast with 'poor' for land quality.
- source_word: רָזָה
  chosen: poor
  alternatives:
  - lean
  - thin
  lexicon: HALOT
  rationale: The adjective literally means 'lean/thin'; for land, English idiom prefers
    'poor' to express lack of fertility, matching the agricultural context.
- source_word: הֲיֵשׁ בָּהּ עֵץ אִם אַיִן
  chosen: whether there are trees in it or not
  alternatives:
  - whether there is wood in it or not
  - whether it has trees or not
  lexicon: HALOT
  rationale: עֵץ can mean 'tree' or 'wood.' In a reconnaissance context about the
    land's character, 'trees' is the most straightforward reading, though the phrase
    may also imply timber resources.
- source_word: וְהִתְחַזַּקְתֶּם
  chosen: be courageous
  alternatives:
  - strengthen yourselves
  - be strong
  lexicon: HALOT
  rationale: The hitpael/implied reflexive sense is an exhortation to fortify themselves
    for the task. 'Be courageous' conveys the intended force in idiomatic English
    better than the more wooden 'strengthen yourselves.'
- source_word: וּלְקַחְתֶּם מִפְּרִי הָאָרֶץ
  chosen: take some of the fruit of the land
  alternatives:
  - bring back some of the fruit of the land
  - take from the fruit of the land
  lexicon: HALOT
  rationale: The preposition מִן indicates 'some of/from.' 'Take some' is concise
    and accurate; the context implies bringing it back as evidence, but that need
    not be made explicit in the main text.
- source_word: בִּכּוּרֵי עֲנָבִים
  chosen: the first-ripe grapes
  alternatives:
  - the firstfruits of grapes
  - the early grapes
  lexicon: HALOT
  rationale: בִּכּוּרִים often refers to firstfruits/first-ripe produce. Here it marks
    the season when grapes first ripen. 'First-ripe grapes' is clear and avoids importing
    later cultic overtones too strongly into this narrative note.
- source_word: וְהַיָּמִים יְמֵי
  chosen: Now the days were the days of
  alternatives:
  - and the time was
  - now it was the season of
  lexicon: HALOT
  rationale: This is a Hebrew narrative time note. A slightly smoothed but still transparent
    rendering preserves the repetitive Hebrew structure without becoming awkward.
