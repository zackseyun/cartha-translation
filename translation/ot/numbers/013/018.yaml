id: NUM.13.18
reference: Numbers 13:18
source:
  edition: WLC
  text: וּ/רְאִיתֶ֥ם אֶת הָ/אָ֖רֶץ מַה הִ֑וא וְ/אֶת הָ/עָם֙ הַ/יֹּשֵׁ֣ב עָלֶ֔י/הָ
    הֶ/חָזָ֥ק הוּא֙ הֲ/רָפֶ֔ה הַ/מְעַ֥ט ה֖וּא אִם רָֽב־־־־׃
translation:
  text: See what the land is like, and whether the people who dwell in it are strong
    or weak, whether they are few or many.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'what it is.' The sense is an assessment of the land's
      character or condition.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'the people dwelling upon it.' English idiom normally
      says 'in it' for inhabitants of a land.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְאִיתֶם
  chosen: See
  alternatives:
  - look at
  - observe
  lexicon: HALOT
  rationale: From ראה, here an imperative-like instruction in context following Moses'
    commission to the spies. 'See' is concise and natural in English, carrying the
    force of inspection without over-paraphrasing.
- source_word: הָאָרֶץ מַה הִוא
  chosen: what the land is like
  alternatives:
  - what the land is
  - the nature of the land
  lexicon: HALOT
  rationale: The phrase asks about the character/condition of the land rather than
    merely its identity. 'What the land is like' is idiomatic English that preserves
    the evaluative sense of מַה הִוא.
- source_word: הָעָם הַיֹּשֵׁב עָלֶיהָ
  chosen: the people who dwell in it
  alternatives:
  - the people living on it
  - the people inhabiting it
  lexicon: HALOT
  rationale: יֹשֵׁב with עַל הארץ refers to inhabiting the land. 'Dwell in it' is
    natural English and fits the sense of settled residence; 'in it' is more idiomatic
    than a literal 'on it' in English for a land.
- source_word: הֶחָזָק
  chosen: strong
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: חזק denotes strength or power. 'Strong' is the plain, contextually appropriate
    rendering in this military-population assessment.
- source_word: הֲרָפֶה
  chosen: weak
  alternatives:
  - feeble
  lexicon: HALOT
  rationale: As the antonym to חזק, רפה here describes lack of strength. 'Weak' is
    the clearest modern English equivalent.
- source_word: הַמְעַט
  chosen: few
  alternatives:
  - small in number
  lexicon: HALOT
  rationale: The adjective here contrasts with רָב in terms of number. 'Few' is concise
    and preserves the quantitative contrast.
- source_word: רָב
  chosen: many
  alternatives:
  - numerous
  lexicon: HALOT
  rationale: In contrast to הַמְעַט, רָב refers to being numerous. 'Many' is the most
    straightforward English rendering.
- source_word: אִם
  chosen: whether
  alternatives:
  - or if
  lexicon: HALOT
  rationale: 'Used here in paired indirect questions: whether they are few or many.
    ''Whether'' best reflects the syntax in smooth English.'
