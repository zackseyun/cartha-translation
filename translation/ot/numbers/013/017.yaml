id: NUM.13.17
reference: Numbers 13:17
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח אֹתָ/ם֙ מֹשֶׁ֔ה לָ/ת֖וּר אֶת אֶ֣רֶץ כְּנָ֑עַן וַ/יֹּ֣אמֶר אֲלֵ/הֶ֗ם
    עֲל֥וּ זֶה֙ בַּ/נֶּ֔גֶב וַ/עֲלִיתֶ֖ם אֶת הָ/הָֽר־־׃
translation:
  text: Moses sent them to scout out the land of Canaan, and he said to them, “Go
    up this way through the Negev, and go up into the hill country.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “spy out the land of Canaan.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the Negev,” the southern arid region.
    reason: cultural_note
  - marker: c
    text: Or “the mountains.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard wayyiqtol of שׁלח, narrating Moses' action. 'Sent' is natural
    and sufficiently formal.
- source_word: לָתוּר
  chosen: to scout out
  alternatives:
  - to spy out
  - to explore
  lexicon: HALOT
  rationale: תור here denotes reconnaissance of the land. 'Scout out' communicates
    investigative surveying without the overly loaded or clandestine nuance that 'spy
    out' can carry in modern English, while remaining faithful to the context.
- source_word: אֶרֶץ כְּנָעַן
  chosen: the land of Canaan
  alternatives:
  - Canaan
  - the land of the Canaanites
  lexicon: HALOT
  rationale: The construct phrase straightforwardly refers to the territory named
    Canaan. 'The land of Canaan' preserves the full expression.
- source_word: עֲלוּ
  chosen: Go up
  alternatives:
  - Ascend
  - Go up southward
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' In travel and topographical contexts,
    'go up' is idiomatic and preserves the Hebrew's directional sense.
- source_word: זֶה
  chosen: this way
  alternatives:
  - here
  - by this route
  lexicon: HALOT
  rationale: 'The demonstrative likely has an adverbial force with the imperative:
    ''go up this way.'' This is more natural in English than the overly literal ''go
    up this.'''
- source_word: בַּנֶּגֶב
  chosen: through the Negev
  alternatives:
  - into the Negev
  - through the south country
  - in the Negev
  lexicon: HALOT
  rationale: נֶגֶב can denote the southern region/desert area. As a geographic designation
    here, 'the Negev' is appropriate. 'Through' fits the route-like instruction implied
    by 'go up this way.'
- source_word: וַעֲלִיתֶם
  chosen: and go up
  alternatives:
  - then go up
  - and ascend
  lexicon: HALOT
  rationale: Though formally a qatal with prefixed waw, in this instruction sequence
    it continues the command sense after the imperative. Rendering it as a coordinated
    imperative in English best reflects the syntax and flow.
- source_word: הָהָר
  chosen: the hill country
  alternatives:
  - the hill country of Canaan
  - the mountains
  - the hill country
  lexicon: HALOT
  rationale: הָהָר in this context refers not merely to a single mountain but to the
    upland/hill region. 'Hill country' is the standard contextual rendering in English
    and fits the reconnaissance route.
