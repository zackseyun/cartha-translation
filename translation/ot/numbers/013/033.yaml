theological_decisions:
- issue: Rendering of נְפִילִים
  chosen_reading: Nephilim
  alternative_readings:
  - giants
  - fallen ones
  rationale: The verse invokes a debated term also known from Genesis 6:4. To avoid
    importing a specific interpretation not demanded by the Hebrew, the main text
    keeps the transliteration. A traditional interpretive alternative is preserved
    in a footnote for transparency.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
