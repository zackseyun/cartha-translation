id: NUM.13.33
reference: Numbers 13:33
source:
  edition: WLC
  text: וְ/שָׁ֣ם רָאִ֗ינוּ אֶת הַ/נְּפִילִ֛ים בְּנֵ֥י עֲנָ֖ק מִן הַ/נְּפִלִ֑ים וַ/נְּהִ֤י
    בְ/עֵינֵ֨י/נוּ֙ כַּֽ/חֲגָבִ֔ים וְ/כֵ֥ן הָיִ֖ינוּ בְּ/עֵינֵי/הֶֽם־־׃
translation:
  text: And there we saw the Nephilim—the sons of Anak, from the Nephilim—and we seemed
    in our own eyes like grasshoppers, and so we were in their eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'giants' for 'Nephilim.' The Hebrew term is uncertain
      and is therefore left transliterated in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּפִילִים
  chosen: the Nephilim
  alternatives:
  - the giants
  - the fallen ones
  lexicon: HALOT
  rationale: Transliterated rather than interpreted because the referent is uncertain
    and the term is culturally loaded. 'Giants' reflects traditional interpretation
    but goes beyond the lexical certainty of the Hebrew form.
- source_word: בְּנֵי עֲנָק
  chosen: the sons of Anak
  alternatives:
  - the descendants of Anak
  lexicon: HALOT
  rationale: A formally close rendering that preserves the Hebrew filial expression
    while allowing readers to infer clan/lineage sense from context.
- source_word: מִן הַנְּפִלִים
  chosen: from the Nephilim
  alternatives:
  - among the Nephilim
  - some of the Nephilim
  lexicon: HALOT
  rationale: The preposition מן here most naturally indicates origin/descent in apposition
    to 'the sons of Anak.' 'From' preserves the ambiguity without over-interpreting
    the relationship.
- source_word: וַנְּהִי
  chosen: we seemed
  alternatives:
  - we became
  - we were
  lexicon: HALOT
  rationale: In the idiom with 'in our eyes,' the sense is perceptual rather than
    ontological. 'We seemed' communicates the comparative self-perception naturally
    in English.
- source_word: בְעֵינֵינוּ
  chosen: in our own eyes
  alternatives:
  - in our eyes
  lexicon: HALOT
  rationale: The idiom means 'in our estimation/perception.' 'Own' is added for natural
    English emphasis corresponding to the possessive suffix.
- source_word: כַּחֲגָבִים
  chosen: like grasshoppers
  alternatives:
  - like locusts
  lexicon: HALOT
  rationale: The noun commonly denotes grasshoppers/locust-like insects. 'Grasshoppers'
    fits the simile of smallness and is the more conventional rendering in this context.
- source_word: וְכֵן
  chosen: and so
  alternatives:
  - and thus
  - and in the same way
  lexicon: HALOT
  rationale: A concise connective that preserves the inferential/comparative force
    in readable modern English.
- source_word: בְעֵינֵיהֶם
  chosen: in their eyes
  alternatives:
  - in their sight
  - in their estimation
  lexicon: HALOT
  rationale: Preserves the Hebrew idiom and parallels 'in our own eyes,' maintaining
    the rhetorical symmetry of the verse.
