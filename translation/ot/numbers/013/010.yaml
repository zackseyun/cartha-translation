id: NUM.13.10
reference: Numbers 13:10
source:
  edition: WLC
  text: לְ/מַטֵּ֣ה זְבוּלֻ֔ן גַּדִּיאֵ֖ל בֶּן סוֹדִֽי־׃
translation:
  text: from the tribe of Zebulun, Gaddiel son of Sodi;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/מַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: The preposition לְ with מַטֶּה in this repetitive list formula identifies
    tribal affiliation. In English list style here, 'from the tribe of' is natural
    and accurately conveys representation from that tribe.
- source_word: זְבוּלֻן
  chosen: Zebulun
  rationale: Proper tribal name is transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: גַּדִּיאֵל
  chosen: Gaddiel
  rationale: Personal name is transliterated by standard English convention.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical construction in Hebrew. 'Son of' is the normal
    concise English rendering in name lists.
- source_word: סוֹדִי
  chosen: Sodi
  rationale: Personal name is transliterated rather than translated.
