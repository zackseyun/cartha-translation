theological_decisions:
- issue: Nuance of לְךָ in the divine command
  chosen_reading: Retained in the main text as 'for yourself'
  alternative_readings:
  - Omit as an idiomatic particle with no English equivalent
  - Render 'send on your own behalf'
  rationale: The Hebrew includes לְךָ, and preserving it maintains transparency to
    the source text and leaves interpretive tension intact rather than resolving whether
    it implies permission, personal involvement, or simple emphasis.
  doctrine_reference: Translation philosophy §3, §5
- issue: Rendering בני ישראל
  chosen_reading: '''the sons of Israel'' in the main text'
  alternative_readings:
  - the children of Israel
  - the Israelites
  rationale: The Hebrew idiom is masculine plural and covenantal/familial. Per gender-accurate
    philosophy, the translation keeps the source's form rather than flattening it
    to a neutral ethnonym, while recognizing the phrase refers to the covenant people
    as a whole.
  doctrine_reference: Translation philosophy §4
