id: NUM.13.2
reference: Numbers 13:2
source:
  edition: WLC
  text: שְׁלַח לְ/ךָ֣ אֲנָשִׁ֗ים וְ/יָתֻ֨רוּ֙ אֶת אֶ֣רֶץ כְּנַ֔עַן אֲשֶׁר אֲנִ֥י נֹתֵ֖ן
    לִ/בְנֵ֣י יִשְׂרָאֵ֑ל אִ֣ישׁ אֶחָד֩ אִ֨ישׁ אֶחָ֜ד לְ/מַטֵּ֤ה אֲבֹתָי/ו֙ תִּשְׁלָ֔חוּ
    כֹּ֖ל נָשִׂ֥יא בָ/הֶֽם־־־׃
translation:
  text: Send for yourself men, and let them scout out the land of Canaan, which I
    am giving to the sons of Israel. You shall send one man from each tribe of his
    fathers, every one a leader among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spy out' or 'explore' the land.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Israel,' a standard covenantal expression for the people
      of Israel.
    reason: cultural_note
  - marker: c
    text: Or 'every one a chief among them'; the Hebrew term can denote a tribal leader
      or prince.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלַח לְךָ
  chosen: Send for yourself
  alternatives:
  - Send
  - Send out for yourself
  - Send for you
  lexicon: HALOT
  rationale: שׁלח in the imperative means 'send.' The dative לְךָ is retained as 'for
    yourself' rather than omitted, since it is present in the Hebrew and may nuance
    the command as directed personally to Moses or as permitting/authorizing the action.
    'For yourself' is more transparent than smoothing it away.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  - agents
  lexicon: HALOT
  rationale: The noun is the masculine plural of אִישׁ and here refers to male representatives
    from the tribes. Per gender-accurate philosophy, 'men' is preferable to a gender-neutral
    rendering.
- source_word: וְיָתֻרוּ
  chosen: let them scout out
  alternatives:
  - spy out
  - explore
  - inspect
  lexicon: HALOT
  rationale: תור in this context means to explore or scout out the land. 'Scout out'
    is readable modern English and avoids importing the more loaded 'spy' as the only
    sense, while still fitting the reconnaissance context.
- source_word: אֶרֶץ כְּנַעַן
  chosen: the land of Canaan
  alternatives:
  - Canaan
  - the land Canaan
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered 'the land of Canaan.'
    Including 'land' reflects אֶרֶץ explicitly.
- source_word: אֲשֶׁר אֲנִי נֹתֵן
  chosen: which I am giving
  alternatives:
  - which I give
  - that I am about to give
  - which I have given
  lexicon: HALOT
  rationale: The participle נֹתֵן conveys an ongoing or imminent action. 'I am giving'
    preserves the aspect better than a simple present and reflects the divine grant
    already underway.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the children of Israel
  - to the Israelites
  lexicon: HALOT
  rationale: A more literal rendering preserves the familial/covenantal idiom בני
    ישראל. 'Israelites' is possible, but 'sons of Israel' better reflects the source
    wording; it is not intended to exclude women but to mirror the Hebrew expression.
- source_word: אִישׁ אֶחָד אִישׁ אֶחָד
  chosen: one man ... every one
  alternatives:
  - one man each
  - a man, one from each
  lexicon: HALOT
  rationale: The repetition is distributive and emphatic. The English rendering preserves
    that distributive force without sounding wooden.
- source_word: לְמַטֵּה אֲבֹתָיו
  chosen: from each tribe of his fathers
  alternatives:
  - according to his ancestral tribe
  - for the tribe of his fathers
  - by his fathers' tribe
  lexicon: HALOT
  rationale: מַטֶּה here means 'tribe.' אֲבֹתָיו marks ancestral/paternal lineage.
    'Tribe of his fathers' is somewhat literal but understandable and preserves the
    kinship structure in the Hebrew.
- source_word: תִּשְׁלָחוּ
  chosen: You shall send
  alternatives:
  - you are to send
  - send
  lexicon: HALOT
  rationale: The imperfect here functions as an instruction following the initial
    imperative. 'You shall send' gives clear directive force in English.
- source_word: כֹּל נָשִׂיא בָהֶם
  chosen: every one a leader among them
  alternatives:
  - every one a chief among them
  - all of them leaders
  - each one a prince among them
  lexicon: HALOT
  rationale: נָשִׂיא denotes a leader, chief, or prince. 'Leader' is the clearest
    modern English choice. The phrase qualifies the selected men as recognized leaders
    within their tribes.
