id: NUM.13.29
reference: Numbers 13:29
source:
  edition: WLC
  text: עֲמָלֵ֥ק יוֹשֵׁ֖ב בְּ/אֶ֣רֶץ הַ/נֶּ֑גֶב וְ֠/הַֽ/חִתִּי וְ/הַ/יְבוּסִ֤י וְ/הָֽ/אֱמֹרִי֙
    יוֹשֵׁ֣ב בָּ/הָ֔ר וְ/הַֽ/כְּנַעֲנִי֙ יֹשֵׁ֣ב עַל הַ/יָּ֔ם וְ/עַ֖ל יַ֥ד הַ/יַּרְדֵּֽן־׃
translation:
  text: Amalek lives in the land of the Negev, and the Hittites, the Jebusites, and
    the Amorites live in the hill country, and the Canaanites live by the sea and
    along the side of the Jordan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwells' for 'lives' throughout the verse; the Hebrew participle emphasizes
      settled residence.
    reason: lexical_alternative
  - marker: b
    text: '''The Negev'' may also be rendered ''the southland,'' but here it likely
      refers to the specific southern region of Canaan.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'along the side of the Jordan'; idiomatically, 'beside the Jordan'
      or 'along the Jordan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲמָלֵק
  chosen: Amalek
  lexicon: HALOT
  rationale: Proper ethnic/name term transliterated rather than translated, following
    the policy to transliterate names.
- source_word: יוֹשֵׁב / יֹשֵׁב
  chosen: lives
  alternatives:
  - dwells
  - inhabits
  - is living
  lexicon: HALOT
  rationale: The participle of ישב denotes settled habitation. 'Lives' is natural
    modern English and fits optimal equivalence, while preserving the sense of residing
    in a region.
- source_word: בְּאֶרֶץ הַנֶּגֶב
  chosen: in the land of the Negev
  alternatives:
  - in the Negev land
  - in the southland
  lexicon: HALOT
  rationale: נֶגֶב can denote the southern dry region and also functions as a geographic
    proper name. 'The Negev' best preserves the regional reference; 'land of' reflects
    אֶרֶץ without over-literal awkwardness.
- source_word: הַחִתִּי
  chosen: the Hittites
  alternatives:
  - the Hittite
  lexicon: HALOT
  rationale: Although morphologically singular collective, English idiom normally
    renders these ethnonyms in the plural when referring to a people group.
- source_word: הַיְבוּסִי
  chosen: the Jebusites
  alternatives:
  - the Jebusite
  lexicon: HALOT
  rationale: Rendered as a plural ethnonym in English for natural reference to the
    people group.
- source_word: הָאֱמֹרִי
  chosen: the Amorites
  alternatives:
  - the Amorite
  lexicon: HALOT
  rationale: Rendered as a plural ethnonym in English for natural reference to the
    people group.
- source_word: בָּהָר
  chosen: in the hill country
  alternatives:
  - in the mountains
  - in the hill country
  lexicon: HALOT
  rationale: הַר can mean mountain/hill country. In this regional-settlement context,
    'hill country' is the most idiomatic and geographically appropriate English rendering.
- source_word: הַכְּנַעֲנִי
  chosen: the Canaanites
  alternatives:
  - the Canaanite
  lexicon: HALOT
  rationale: Rendered as a plural ethnonym in English for natural reference to the
    people group.
- source_word: עַל הַיָּם
  chosen: by the sea
  alternatives:
  - along the sea
  - on the coast
  lexicon: HALOT
  rationale: Literally 'upon/by the sea.' 'By the sea' is a clear and natural rendering;
    'on the coast' is interpretive and slightly more specific than the Hebrew.
- source_word: עַל יַד הַיַּרְדֵּן
  chosen: along the side of the Jordan
  alternatives:
  - along the Jordan
  - beside the Jordan
  - by the Jordan
  lexicon: HALOT
  rationale: יָד literally means 'hand,' but in this idiom it means 'side' or 'bank/adjacent
    area.' 'Along the side of the Jordan' preserves the idiomatic spatial sense while
    remaining transparent to the Hebrew.
