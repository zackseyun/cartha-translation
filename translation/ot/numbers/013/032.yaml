id: NUM.13.32
reference: Numbers 13:32
source:
  edition: WLC
  text: וַ/יּוֹצִ֜יאוּ דִּבַּ֤ת הָ/אָ֨רֶץ֙ אֲשֶׁ֣ר תָּר֣וּ אֹתָ֔/הּ אֶל בְּנֵ֥י יִשְׂרָאֵ֖ל
    לֵ/אמֹ֑ר הָ/אָ֡רֶץ אֲשֶׁר֩ עָבַ֨רְנוּ בָ֜/הּ לָ/ת֣וּר אֹתָ֗/הּ אֶ֣רֶץ אֹכֶ֤לֶת
    יוֹשְׁבֶ֨י/הָ֙ הִ֔וא וְ/כָל הָ/עָ֛ם אֲשֶׁר רָאִ֥ינוּ בְ/תוֹכָ֖/הּ אַנְשֵׁ֥י מִדּֽוֹת־־־׃
translation:
  text: So they brought out to the sons of Israel a bad report about the land that
    they had explored, saying, “The land through which we passed to explore it is
    a land that devours its inhabitants, and all the people whom we saw in it are
    men of great size.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “spread a bad report,” or more strongly, “slandered the land.”
    reason: lexical_alternative
  - marker: b
    text: Or “spied out” / “scouted.”
    reason: lexical_alternative
  - marker: c
    text: Hebrew “sons of Israel”; a standard covenantal designation for the people
      of Israel.
    reason: cultural_note
  - marker: d
    text: Or “a land that consumes its inhabitants.”
    reason: lexical_alternative
  - marker: e
    text: Or “men of stature,” referring here to impressive physical size.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִיאוּ
  chosen: brought out
  alternatives:
  - spread
  - gave
  lexicon: HALOT
  rationale: The idiom with דִּבָּה is literally 'bring out' a report. 'Brought out'
    preserves the Hebrew image while remaining natural enough in English; alternatives
    like 'spread' are possible but slightly more interpretive.
- source_word: דִּבַּת
  chosen: a bad report
  alternatives:
  - an evil report
  - slander
  lexicon: HALOT
  rationale: In context the spies are presenting a negative, discouraging account.
    'Bad report' is clear modern English and reflects the established sense of דִּבָּה
    here without importing the stronger accusation of outright 'slander' into the
    main text.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ/region
  - the country
  lexicon: HALOT
  rationale: '''Land'' is the standard and contextually appropriate rendering in the
    wilderness/conquest narrative, preserving the covenantal-geographical sense.'
- source_word: תָּרוּ / לָתוּר
  chosen: had explored / to explore
  alternatives:
  - spied out
  - scouted
  lexicon: HALOT
  rationale: The verb תור denotes exploring or scouting. 'Explore' fits readable modern
    English and avoids overloading the term with espionage connotations, though 'spy
    out' is a viable contextual alternative.
- source_word: אֶל בְּנֵי יִשְׂרָאֵל
  chosen: to the sons of Israel
  alternatives:
  - to the Israelites
  - to the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Israel.' Following the project's gender-accurate
    principle, this is retained rather than flattened to 'Israelites,' while still
    functioning corporately.
- source_word: עָבַרְנוּ בָהּ
  chosen: through which we passed
  alternatives:
  - through which we went
  - that we crossed through
  lexicon: HALOT
  rationale: This reflects the motion verb עבר with the preposition ב. 'Passed through'
    is idiomatic and close to the Hebrew.
- source_word: אֶרֶץ אֹכֶלֶת יוֹשְׁבֶיהָ
  chosen: a land that devours its inhabitants
  alternatives:
  - a land that consumes its inhabitants
  - a land that eats its inhabitants
  lexicon: HALOT
  rationale: The participle אֹכֶלֶת is vivid and metaphorical. 'Devours' preserves
    the force and ominous rhetoric better than the more literal but less idiomatic
    'eats.'
- source_word: יוֹשְׁבֶיהָ
  chosen: its inhabitants
  alternatives:
  - those who dwell in it
  - its dwellers
  lexicon: HALOT
  rationale: '''Inhabitants'' is the natural English equivalent for the participial
    noun in this context.'
- source_word: וְכָל הָעָם
  chosen: and all the people
  alternatives:
  - and all the population
  lexicon: HALOT
  rationale: A straightforward rendering of the collective noun with כָּל.
- source_word: בְתוֹכָהּ
  chosen: in it
  alternatives:
  - in its midst
  - within it
  lexicon: HALOT
  rationale: The phrase means 'in its midst/within it.' 'In it' is concise and natural
    in English, with no significant loss in this context.
- source_word: אַנְשֵׁי מִדּוֹת
  chosen: men of great size
  alternatives:
  - men of stature
  - men of great measure
  lexicon: HALOT
  rationale: The expression refers to unusually large or tall men. 'Men of great size'
    communicates the sense clearly for modern readers; 'men of stature' could be misunderstood
    as social importance rather than physical dimensions.
