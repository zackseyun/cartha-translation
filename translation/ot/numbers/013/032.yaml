theological_decisions:
- issue: Gendered corporate expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: to the sons of Israel
  alternative_readings:
  - to the Israelites
  - to the children of Israel
  rationale: Per the project's gender-accurate principle, the explicitly masculine
    plural construct is preserved rather than neutralized. Here it functions as the
    standard covenantal designation for the nation, but the translation keeps the
    source form visible.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
