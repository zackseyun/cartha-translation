id: NUM.13.4
reference: Numbers 13:4
source:
  edition: WLC
  text: וְ/אֵ֖לֶּה שְׁמוֹתָ֑/ם לְ/מַטֵּ֣ה רְאוּבֵ֔ן שַׁמּ֖וּעַ בֶּן זַכּֽוּר־׃
translation:
  text: 'And these were their names: from the tribe of Reuben, Shammua son of Zaccur.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: And these
  alternatives:
  - These
  lexicon: HALOT
  rationale: The conjunction ו is retained as 'And' to reflect the narrative/list
    continuity, and אֵלֶּה is rendered 'these' in its straightforward demonstrative
    sense.
- source_word: שְׁמוֹתָם
  chosen: were their names
  alternatives:
  - their names
  - the names were
  lexicon: HALOT
  rationale: Although literally 'their names,' English idiom is improved by supplying
    'were' to form a natural clause introducing the list. This preserves the function
    of the Hebrew heading without unnecessary stiffness.
- source_word: לְמַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - by tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: The preposition לְ with מַטֶּה in this listing context identifies tribal
    affiliation. 'From the tribe of' is natural English and accurately conveys representation
    from that tribe.
- source_word: רְאוּבֵן
  chosen: Reuben
  lexicon: HALOT
  rationale: Personal/tribal name transliterated by standard English convention, in
    keeping with the translation philosophy to transliterate names.
- source_word: שַׁמּוּעַ
  chosen: Shammua
  lexicon: HALOT
  rationale: Personal name transliterated rather than translated.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical rendering in English for Hebrew בן.
- source_word: זַכּוּר
  chosen: Zaccur
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention.
