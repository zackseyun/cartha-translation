id: NUM.13.5
reference: Numbers 13:5
source:
  edition: WLC
  text: לְ/מַטֵּ֣ה שִׁמְע֔וֹן שָׁפָ֖ט בֶּן חוֹרִֽי־׃
translation:
  text: from the tribe of Simeon, Shaphat son of Hori;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְ/מַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: מַטֶּה in tribal lists commonly denotes 'tribe' (literally 'staff/branch'
    in other contexts). The prefixed לְ here functions list-wise to indicate assignment/source
    within the sequence of tribal representatives. 'From the tribe of' is idiomatic
    English and fits the repeated pattern in Numbers 13.
- source_word: שִׁמְעוֹן
  chosen: Simeon
  rationale: Proper name of the tribe/patriarch; transliterated according to the translation
    philosophy's preference to transliterate personal and tribal names.
- source_word: שָׁפָט
  chosen: Shaphat
  rationale: Proper personal name; transliterated rather than translated.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard filial construction in Hebrew genealogical identification. English
    omits the article for natural style while preserving the relationship.
- source_word: חוֹרִי
  chosen: Hori
  rationale: Proper personal name; transliterated by standard convention.
