id: NUM.13.31
reference: Numbers 13:31
source:
  edition: WLC
  text: וְ/הָ֨/אֲנָשִׁ֜ים אֲשֶׁר עָל֤וּ עִמּ/וֹ֙ אָֽמְר֔וּ לֹ֥א נוּכַ֖ל לַ/עֲל֣וֹת
    אֶל הָ/עָ֑ם כִּֽי חָזָ֥ק ה֖וּא מִמֶּֽ/נּוּ־־־׃
translation:
  text: But the men who had gone up with him said, “We are not able to go up against
    the people, because they are stronger than we are.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'to go up to the people'; in context this means 'to go
      up against the people' in military confrontation.
    reason: lexical_alternative
  - marker: b
    text: Hebrew has singular, 'the people ... it/he is stronger than we'; English
      renders the collective sense as plural, 'they are stronger than we are.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאֲנָשִׁים
  chosen: But the men
  alternatives:
  - And the men
  - But the men
  lexicon: HALOT
  rationale: The conjunction with the article+noun introduces a contrast with Caleb's
    report in the surrounding context, so 'But the men' best reflects the discourse
    force in natural English while retaining the concrete 'men' rather than a more
    generic term.
- source_word: אֲשֶׁר עָלוּ עִמּוֹ
  chosen: who had gone up with him
  alternatives:
  - who went up with him
  - who had gone up with him
  lexicon: HALOT
  rationale: The relative clause identifies the same spies who accompanied Caleb.
    English past perfect ('had gone up') clarifies prior action relative to 'said'
    without adding meaning.
- source_word: אָמְרוּ
  chosen: said
  alternatives:
  - were saying
  lexicon: HALOT
  rationale: Simple past best represents the Hebrew qatal in this narrative sequence.
- source_word: לֹא נוּכַל
  chosen: We are not able
  alternatives:
  - We cannot
  - We are unable
  lexicon: HALOT
  rationale: From יכל, expressing ability. 'We are not able' preserves the explicit
    sense of incapacity; 'cannot' would also be acceptable but is slightly less transparent
    to the underlying lexical force.
- source_word: לַעֲלוֹת
  chosen: to go up
  alternatives:
  - to attack
  - to march up
  lexicon: HALOT
  rationale: עלה literally means 'go up.' In this military-land context it can imply
    advancing or attacking, but the main text keeps the more literal wording and lets
    the context carry the military sense.
- source_word: אֶל הָעָם
  chosen: against the people
  alternatives:
  - to the people
  - against that people
  lexicon: HALOT
  rationale: 'Although אֶל is often ''to,'' in this context of military advance it
    is idiomatically adversative: going up against a people. ''The people'' refers
    to the inhabitants just reported on, not people in general.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for their claim; 'because' is the clearest modern
    English equivalent.
- source_word: חָזָק הוּא מִמֶּנּוּ
  chosen: they are stronger than we are
  alternatives:
  - it is stronger than we are
  - he is stronger than we are
  - they are too strong for us
  lexicon: HALOT
  rationale: The singular pronoun with collective noun הָעָם is naturally rendered
    by plural English ('they') because 'the people' is a collective referring to multiple
    inhabitants. 'Stronger than we are' preserves the comparative force of מִן. 'Too
    strong for us' is idiomatic but slightly more interpretive.
