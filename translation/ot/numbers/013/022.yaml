id: NUM.13.22
reference: Numbers 13:22
source:
  edition: WLC
  text: וַ/יַּעֲל֣וּ בַ/נֶּגֶב֮ וַ/יָּבֹ֣א עַד חֶבְרוֹן֒ וְ/שָׁ֤ם אֲחִימַן֙ שֵׁשַׁ֣י
    וְ/תַלְמַ֔י יְלִידֵ֖י הָ/עֲנָ֑ק וְ/חֶבְר֗וֹן שֶׁ֤בַע שָׁנִים֙ נִבְנְתָ֔ה לִ/פְנֵ֖י
    צֹ֥עַן מִצְרָֽיִם־׃
translation:
  text: They went up into the Negev, and he came as far as Hebron. Ahiman, Sheshai,
    and Talmai, the descendants of Anak, were there. Hebron had been built seven years
    before Zoan of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has the singular 'he came' after the plural 'they went up.' This
      may refer to the group as a whole, to a representative scout, or reflect a textual
      irregularity; many translations smooth it to 'they came.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיַּעֲלוּ
  chosen: They went up
  alternatives:
  - They ascended
  - They went
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' 'Went up' preserves the narrative
    idiom and the geographic sense without sounding overly formal.
- source_word: בַנֶּגֶב
  chosen: into the Negev
  alternatives:
  - through the Negev
  - in the Negeb
  - into the south country
  lexicon: HALOT
  rationale: נֶגֶב can denote the southern region generally or the specific area name.
    Because it functions here as a recognized region, 'the Negev' is preferred over
    the more generic 'south'.
- source_word: וַיָּבֹא
  chosen: he came
  alternatives:
  - they came
  lexicon: HALOT
  rationale: The verb is morphologically singular (3ms), so the main text preserves
    the singular rather than smoothing it to a plural. The singular may refer to the
    group collectively or reflect a textual/narrative irregularity, but the Hebrew
    form should be represented.
- source_word: עַד חֶבְרוֹן
  chosen: as far as Hebron
  alternatives:
  - to Hebron
  - up to Hebron
  lexicon: HALOT
  rationale: עַד marks extent or limit. 'As far as Hebron' best captures the sense
    of reaching that point.
- source_word: יְלִידֵי הָעֲנָק
  chosen: the descendants of Anak
  alternatives:
  - those born to Anak
  - the children of Anak
  - the offspring of Anak
  lexicon: HALOT
  rationale: יְלִידֵי literally relates to those born of someone, but in English 'descendants
    of Anak' is the most natural and sufficiently precise rendering for this clan
    designation.
- source_word: וְשָׁם
  chosen: were there
  alternatives:
  - and there were
  - and there
  lexicon: HALOT
  rationale: English requires a predicate to make the clause natural. 'Were there'
    conveys the locative statement clearly.
- source_word: נִבְנְתָה
  chosen: had been built
  alternatives:
  - was built
  lexicon: HALOT
  rationale: The passive perfect in this historical note is best rendered with English
    pluperfect to show prior action relative to the spying narrative and the comparison
    with Zoan.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - earlier than
  - in front of
  lexicon: HALOT
  rationale: In this temporal comparison, לִפְנֵי means 'before' rather than spatial
    'in front of.'
- source_word: צֹעַן מִצְרָיִם
  chosen: Zoan of Egypt
  alternatives:
  - Zoan in Egypt
  - Egyptian Zoan
  lexicon: HALOT
  rationale: The construct-like relationship is naturally rendered 'Zoan of Egypt,'
    though 'Zoan in Egypt' would also be possible. The chosen wording is concise and
    preserves the place-name relation.
