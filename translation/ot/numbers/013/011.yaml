id: NUM.13.11
reference: Numbers 13:11
source:
  edition: WLC
  text: לְ/מַטֵּ֥ה יוֹסֵ֖ף לְ/מַטֵּ֣ה מְנַשֶּׁ֑ה גַּדִּ֖י בֶּן סוּסִֽי־׃
translation:
  text: 'from the tribe of Joseph, from the tribe of Manasseh: Gaddi son of Susi.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats ''from the tribe of'': literally, ''from the tribe of Joseph,
      from the tribe of Manasseh,'' preserving Manasseh as the branch of Joseph intended
      here.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: The preposition לְ with מַטֶּה in this list functions to identify tribal
    affiliation of the representative. In English list style, 'from the tribe of'
    is natural and accurately conveys source/representation.
- source_word: יוֹסֵף
  chosen: Joseph
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: לְמַטֵּה מְנַשֶּׁה
  chosen: from the tribe of Manasseh
  alternatives:
  - for the tribe of Manasseh
  lexicon: HALOT
  rationale: The repetition clarifies that Manasseh is the specific tribal subdivision
    under Joseph in view. Retaining both phrases reflects the Hebrew structure rather
    than collapsing it.
- source_word: גַּדִּי
  chosen: Gaddi
  rationale: Personal name transliterated.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical rendering in English; the article is unnecessary
    in this list context.
- source_word: סוּסִי
  chosen: Susi
  rationale: Personal name transliterated.
