id: NUM.13.16
reference: Numbers 13:16
source:
  edition: WLC
  text: אֵ֚לֶּה שְׁמ֣וֹת הָֽ/אֲנָשִׁ֔ים אֲשֶׁר שָׁלַ֥ח מֹשֶׁ֖ה לָ/ת֣וּר אֶת הָ/אָ֑רֶץ
    וַ/יִּקְרָ֥א מֹשֶׁ֛ה לְ/הוֹשֵׁ֥עַ בִּן נ֖וּן יְהוֹשֻֽׁעַ־־־׃
translation:
  text: These are the names of the men whom Moses sent to scout out the land. And
    Moses called Hoshea son of Nun Joshua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to spy out the land.” The Hebrew verb can denote exploring or reconnaissance;
      “to scout out” is chosen for clear modern English.
    reason: lexical_alternative
  - marker: b
    text: Hoshea is the earlier form of Joshua’s name; Moses gives him the name Joshua
      here.
    reason: cultural_note
  - marker: c
    text: Hoshea may also be spelled “Hosea” in English transliteration.
    reason: alternative_reading
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These were
  lexicon: HALOT
  rationale: Deictic plural introducing the list just given/summarized; present-tense
    English works naturally in list-summary style.
- source_word: שְׁמוֹת
  chosen: the names of
  alternatives:
  - the names
  lexicon: HALOT
  rationale: Construct form with following noun; English requires 'of' to express
    the relationship.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  lexicon: HALOT
  rationale: אַנָשִׁים here refers specifically to the male representatives/spies
    named in the context, so 'men' is gender-accurate and contextually precise.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative pronoun referring to persons; 'whom' fits formal written English
    after 'sent'.
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering of שלח in narrative context.
- source_word: לָתוּר
  chosen: to scout out
  alternatives:
  - to spy out
  - to explore
  lexicon: HALOT
  rationale: תור in this context denotes reconnaissance of the land. 'Scout out' is
    natural modern English and avoids importing the more loaded 'spy' terminology
    while preserving the investigative sense.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Numbers 13 the referent is the promised land/Canaan; 'the land' is
    the standard and sufficiently specific rendering.
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - named
  - renamed
  lexicon: HALOT
  rationale: קרא with a personal object and new name indicates naming/calling. 'Called'
    stays close to the Hebrew while allowing the renaming sense to be inferred from
    context.
- source_word: לְהוֹשֵׁעַ
  chosen: Hoshea
  alternatives:
  - Hosea
  lexicon: HALOT
  rationale: Personal names are transliterated by project policy. 'Hoshea' more directly
    reflects the Hebrew form here and distinguishes it from the later prophet commonly
    anglicized 'Hosea'.
- source_word: בִּן נוּן
  chosen: son of Nun
  alternatives:
  - the son of Nun
  lexicon: HALOT
  rationale: Standard patronymic expression; article is unnecessary in English apposition.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  alternatives:
  - Jehoshua
  lexicon: HALOT
  rationale: Standard English transliteration of the renamed figure; widely recognized
    and appropriate for readability.
