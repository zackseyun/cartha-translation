id: NUM.13.15
reference: Numbers 13:15
source:
  edition: WLC
  text: לְ/מַטֵּ֣ה גָ֔ד גְּאוּאֵ֖ל בֶּן מָכִֽי־׃
translation:
  text: from the tribe of Gad, Geuel son of Machi.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְמַטֵּה
  chosen: from the tribe of
  alternatives:
  - for the tribe of
  - belonging to the tribe of
  lexicon: HALOT
  rationale: The preposition לְ with מַטֶּה in this repetitive list identifies tribal
    affiliation for each spy. In idiomatic English, 'from the tribe of' best conveys
    the sense of representation/source in the list context, more naturally than the
    more literal 'for the tribe of.'
- source_word: גָד
  chosen: Gad
  rationale: Proper tribal name; per translation philosophy, personal and tribal names
    are transliterated rather than translated.
- source_word: גְּאוּאֵל
  chosen: Geuel
  alternatives:
  - Geu'el
  rationale: Proper personal name, transliterated by standard English convention.
    A more segmented transliteration could reflect the Hebrew form, but 'Geuel' is
    the smoother standard form.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical construction in Hebrew. English omits the article
    for natural style in name apposition.
- source_word: מָכִי
  chosen: Machi
  rationale: Proper personal name, transliterated by standard English convention.
