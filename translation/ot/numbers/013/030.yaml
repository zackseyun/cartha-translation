id: NUM.13.30
reference: Numbers 13:30
source:
  edition: WLC
  text: וַ/יַּ֧הַס כָּלֵ֛ב אֶת הָ/עָ֖ם אֶל מֹשֶׁ֑ה וַ/יֹּ֗אמֶר עָלֹ֤ה נַעֲלֶה֙ וְ/יָרַ֣שְׁנוּ
    אֹתָ֔/הּ כִּֽי יָכ֥וֹל נוּכַ֖ל לָֽ/הּ־־־׃
translation:
  text: Then Caleb quieted the people before Moses and said, “Let us surely go up
    and take possession of it, for we are certainly able to do it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'silenced the people before Moses.' The Hebrew verb can mean 'quieted,'
      'stilled,' or 'silenced.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'go up, we will surely go up'—an emphatic construction.
    reason: lexical_alternative
  - marker: c
    text: Or 'for we are well able to do it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּהַס
  chosen: quieted
  alternatives:
  - silenced
  - stilled
  - hushed
  lexicon: HALOT
  rationale: The verb denotes causing a crowd to become quiet or still. 'Quieted'
    fits the context of Caleb calming/intervening in the people's response without
    implying harsh suppression as strongly as 'silenced.'
- source_word: אֶת־הָעָם
  chosen: the people
  alternatives:
  - the crowd
  lexicon: HALOT
  rationale: עם here refers to the gathered Israelite community. 'The people' is the
    standard and most contextually natural rendering.
- source_word: אֶל־מֹשֶׁה
  chosen: before Moses
  alternatives:
  - toward Moses
  - in the presence of Moses
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to/toward,' in this idiom the sense is that
    Caleb quieted the people in relation to Moses, i.e., before him or in his presence.
    'Before Moses' is idiomatic English and matches the scene.
- source_word: עָלֹה נַעֲלֶה
  chosen: Let us surely go up
  alternatives:
  - We should certainly go up
  - Let us go up at once
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb. 'Surely
    go up' preserves the emphatic force without adding the temporal nuance 'at once,'
    which is interpretive and not explicit in the Hebrew.
- source_word: וְיָרַשְׁנוּ אֹתָהּ
  chosen: and take possession of it
  alternatives:
  - and possess it
  - and inherit it
  lexicon: HALOT
  rationale: ירשׁ can mean possess, dispossess, or inherit depending on context. Here,
    in the context of entering Canaan, 'take possession of it' best conveys active
    occupation without losing the land-oriented sense.
- source_word: כִּי יָכוֹל נוּכַל
  chosen: for we are certainly able
  alternatives:
  - for we can surely do it
  - for we are well able
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect again gives strong emphasis. 'We
    are certainly able' preserves the emphatic confidence of Caleb's statement in
    clear modern English.
- source_word: לָהּ
  chosen: to do it
  alternatives:
  - to overcome it
  - for it
  lexicon: HALOT
  rationale: The pronominal suffix is feminine singular, referring back to the land.
    In English, after 'able,' an explicit complement is needed. 'To do it' is a concise
    idiomatic rendering that captures capability with respect to the proposed action
    of taking the land; alternatives like 'overcome it' are more interpretive.
