id: NUM.13.28
reference: Numbers 13:28
source:
  edition: WLC
  text: אֶ֚פֶס כִּֽי עַ֣ז הָ/עָ֔ם הַ/יֹּשֵׁ֖ב בָּ/אָ֑רֶץ וְ/הֶֽ/עָרִ֗ים בְּצֻר֤וֹת
    גְּדֹלֹת֙ מְאֹ֔ד וְ/גַם יְלִדֵ֥י הָֽ/עֲנָ֖ק רָאִ֥ינוּ שָֽׁם־־׃
translation:
  text: However, the people who dwell in the land are strong, and the cities are fortified,
    very large; and we also saw the descendants of Anak there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of Anak.' The Hebrew expression refers to those descended from
      Anak.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפֶס כִּי
  chosen: However
  alternatives:
  - Nevertheless
  - Except that
  - Only that
  lexicon: HALOT
  rationale: The combination introduces a strong qualification to the positive report
    of the land in the previous verse. 'However' gives natural modern English while
    preserving the adversative force better than a more wooden 'except that.'
- source_word: עַז
  chosen: strong
  alternatives:
  - fierce
  - mighty
  lexicon: HALOT
  rationale: Describes the strength or formidable character of the people. 'Strong'
    is the most straightforward contextual rendering and avoids overstating hostility
    implied by 'fierce.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the population
  lexicon: HALOT
  rationale: Standard rendering for עַם in this context, referring collectively to
    the inhabitants.
- source_word: הַיֹּשֵׁב בָּאָרֶץ
  chosen: who dwell in the land
  alternatives:
  - living in the land
  - who live in the land
  lexicon: HALOT
  rationale: The participial construction is rendered as a relative clause in idiomatic
    English. 'Dwell' preserves a slightly more formal narrative tone without sounding
    archaic.
- source_word: וְהֶעָרִים
  chosen: and the cities
  lexicon: HALOT
  rationale: Direct rendering of the noun with conjunction.
- source_word: בְּצֻרוֹת
  chosen: fortified
  alternatives:
  - walled
  - defended
  lexicon: HALOT
  rationale: Conveys that the cities are made secure by fortifications. 'Walled' is
    possible but narrower; 'fortified' better captures the adjective's military sense.
- source_word: גְּדֹלֹת מְאֹד
  chosen: very large
  alternatives:
  - very great
  - extremely large
  lexicon: HALOT
  rationale: This describes the size of the cities. 'Very large' is clear modern English
    and preserves the intensification of מְאֹד.
- source_word: וְגַם
  chosen: and we also
  alternatives:
  - and also
  - moreover we
  lexicon: HALOT
  rationale: The conjunction plus additive particle marks an additional alarming detail.
    Including 'we' in English prepares for the following verb and keeps the report
    vivid.
- source_word: יְלִדֵי הָעֲנָק
  chosen: the descendants of Anak
  alternatives:
  - the children of Anak
  - the offspring of Anak
  lexicon: HALOT
  rationale: A construct expression denoting lineage. 'Descendants of Anak' is idiomatic
    and clear, while preserving the genealogical sense better than the more literal
    but less natural 'children of Anak.'
- source_word: רָאִינוּ שָׁם
  chosen: saw ... there
  alternatives:
  - have seen ... there
  lexicon: HALOT
  rationale: The qatal verb in this narrative report is best rendered as simple past
    in English. 'There' is retained for emphasis on the location.
