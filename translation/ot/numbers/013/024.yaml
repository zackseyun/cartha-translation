theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: No major doctrinal issue is at stake, but the phrase involves the project's
    gender-accurate policy. The Hebrew is literally 'sons of Israel,' a standard covenantal
    ethnonym. Rendering it this way preserves source texture and familial identity
    language; smoother alternatives are possible but less formally transparent.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
