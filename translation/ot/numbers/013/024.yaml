id: NUM.13.24
reference: Numbers 13:24
source:
  edition: WLC
  text: לַ/מָּק֣וֹם הַ/ה֔וּא קָרָ֖א נַ֣חַל אֶשְׁכּ֑וֹל עַ֚ל אֹד֣וֹת הָֽ/אֶשְׁכּ֔וֹל
    אֲשֶׁר כָּרְת֥וּ מִ/שָּׁ֖ם בְּנֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: That place was called the Valley of Eshcol because of the cluster that the
    sons of Israel cut from there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wadi of Eshcol' or 'ravine of Eshcol'; Hebrew naḥal can denote a seasonal
      streambed or the valley associated with it.
    reason: lexical_alternative
  - marker: b
    text: Eshcol sounds like the Hebrew word for 'cluster.' The place was named because
      of the cluster cut there by the sons of Israel.
    reason: cultural_note
  - marker: c
    text: Or 'the Israelites' or 'the children of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמָּקוֹם הַהוּא
  chosen: That place
  alternatives:
  - That place there
  - That location
  lexicon: HALOT
  rationale: Definite phrase referring back to the previously described site. 'That
    place' is natural English and preserves the demonstrative force.
- source_word: קָרָא
  chosen: was called
  alternatives:
  - he called
  - one called
  lexicon: HALOT
  rationale: 'Although the Hebrew form is 3ms active (''he called''), this construction
    commonly functions idiomatically with an unnamed subject to express naming. English
    passive is the most natural equivalent: ''was called.'''
- source_word: נַחַל
  chosen: Valley
  alternatives:
  - wadi
  - brook
  - ravine
  lexicon: HALOT
  rationale: נחל can denote a wadi, torrent-bed, ravine, or valley. In this naming
    context, 'Valley' is the most idiomatic established geographic rendering in English,
    while 'wadi' would be too technical and 'brook' too narrow.
- source_word: אֶשְׁכּוֹל
  chosen: Eshcol
  alternatives:
  - Cluster (if translated as a common noun)
  lexicon: HALOT
  rationale: Here אֶשְׁכּוֹל functions as the place-name in the expression 'Valley
    of Eshcol,' so it is transliterated as a proper name in keeping with the translation
    philosophy.
- source_word: עַל אֹדוֹת
  chosen: because of
  alternatives:
  - on account of
  - for the sake of
  - concerning
  lexicon: HALOT
  rationale: The phrase gives the reason for the naming. 'Because of' is clear modern
    English and accurately conveys causal force.
- source_word: הָאֶשְׁכּוֹל
  chosen: the cluster
  alternatives:
  - the cluster of grapes
  - the bunch
  lexicon: HALOT
  rationale: The noun means 'cluster/bunch,' and in context specifically a grape cluster
    from the preceding verse. 'The cluster' is sufficient because the immediate context
    supplies the referent; adding 'of grapes' would be interpretive expansion beyond
    the words present in this verse.
- source_word: אֲשֶׁר כָּרְתוּ
  chosen: that ... cut
  alternatives:
  - which ... cut down
  - which ... cut off
  lexicon: HALOT
  rationale: כרת commonly means 'cut off/cut down.' For harvesting a cluster, 'cut'
    is the most natural concise English rendering.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from that place
  lexicon: HALOT
  rationale: Retains the deictic reference to the location without unnecessary expansion.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: This preserves the Hebrew familial expression more closely than 'Israelites.'
    Per translation philosophy, gender-accurate rendering is preferred where it matches
    the source form and intent.
