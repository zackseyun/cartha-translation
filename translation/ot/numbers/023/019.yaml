id: NUM.23.19
reference: Numbers 23:19
source:
  edition: WLC
  text: לֹ֣א אִ֥ישׁ אֵל֙ וִֽ/יכַזֵּ֔ב וּ/בֶן אָדָ֖ם וְ/יִתְנֶחָ֑ם הַ/ה֤וּא אָמַר֙
    וְ/לֹ֣א יַעֲשֶׂ֔ה וְ/דִבֶּ֖ר וְ/לֹ֥א יְקִימֶֽ/נָּה־׃
translation:
  text: God is not a man, that he should lie, or a son of man, that he should change
    his mind. Has he said, and will he not do it? Or has he spoken, and will he not
    establish it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'relent'; traditionally 'repent.' The Hebrew verb can denote changing
      one's course or relenting, but here it speaks of God's reliability, not moral
      repentance.
    reason: lexical_alternative
  - marker: b
    text: '''Son of man'' here is a Hebrew idiom for a human being, not a messianic
      title.'
    reason: cultural_note
  - marker: c
    text: Or 'fulfill it' or 'confirm it.' The Hebrew literally means 'make it stand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל
  chosen: God
  alternatives:
  - God Mighty One
  lexicon: HALOT
  rationale: In this context אֵל refers to Israel's God, not merely a generic 'mighty
    one.' 'God' is the natural English rendering and fits the contrast with 'man'
    and 'son of man.'
- source_word: אִישׁ
  chosen: man
  alternatives:
  - human being
  - person
  lexicon: HALOT
  rationale: The Hebrew contrasts God with a human male term paired with 'son of man.'
    Per gender-accurate policy, 'man' best preserves the source's wording and rhetorical
    force.
- source_word: וִיכַזֵּב
  chosen: that he should lie
  alternatives:
  - and lie
  - that he should prove false
  lexicon: HALOT
  rationale: The verb כזב commonly means 'lie' or 'deceive/prove false.' In this parallel
    with divine reliability, 'that he should lie' is idiomatic and preserves the moral
    sense of falsehood.
- source_word: בֶן אָדָם
  chosen: son of man
  alternatives:
  - human being
  - son of אדם/man
  lexicon: HALOT
  rationale: This is the literal Hebrew expression in parallel with 'man.' Although
    it can mean simply 'human being,' the formal phrase 'son of man' preserves the
    poetic parallelism and the source wording. Here it is not a messianic title.
- source_word: וְיִתְנֶחָם
  chosen: that he should change his mind
  alternatives:
  - that he should relent
  - that he should repent
  lexicon: HALOT
  rationale: The hitpael of נחם here denotes a change of intention or relenting. 'Change
    his mind' is clear modern English and avoids misleading moral overtones of 'repent'
    when applied to God. 'Relent' is possible but narrower.
- source_word: הַהוּא אָמַר
  chosen: Has he said
  alternatives:
  - He has said
  - Did he say
  lexicon: HALOT
  rationale: Although formally a statement ('he has said'), in context it introduces
    a rhetorical question completed by the following clause. Rendering it as 'Has
    he said' communicates the Hebrew rhetorical force in natural English.
- source_word: יַעֲשֶׂה
  chosen: will he not do it
  alternatives:
  - will he not act
  - does he not do it
  lexicon: HALOT
  rationale: עשה is broad ('do, make, act'). 'Do it' best matches the implied object
    from what he has said and preserves the promise-fulfillment sense.
- source_word: וְדִבֶּר
  chosen: has he spoken
  alternatives:
  - has he declared
  - and spoken
  lexicon: HALOT
  rationale: דבר in this parallel line refers to uttering a word or promise. 'Spoken'
    is the most direct and keeps the parallel with 'said.'
- source_word: יְקִימֶנָּה
  chosen: will he not establish it
  alternatives:
  - will he not fulfill it
  - will he not confirm it
  - will he not carry it out
  lexicon: HALOT
  rationale: The hiphil of קום means to cause to stand, establish, confirm, or fulfill.
    'Establish it' preserves the concrete Hebrew image while fitting the context of
    making one's word stand. The feminine suffix likely refers to the spoken word/promise.
