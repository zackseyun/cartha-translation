theological_decisions:
- issue: Rendering of divine immutability language in ויתנחם
  chosen_reading: change his mind
  alternative_readings:
  - relent
  - repent
  rationale: The verse teaches God's reliability and unlikeness to fickle humanity.
    'Change his mind' communicates the point without importing a philosophical claim
    beyond the text or suggesting moral repentance in God. This preserves the theological
    force while remaining faithful to the Hebrew idiom.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
- issue: Whether בן אדם should be treated as a messianic title
  chosen_reading: ordinary idiom 'son of man' meaning a human being
  alternative_readings:
  - human being
  rationale: In Numbers 23:19 the phrase is a Hebrew poetic expression for humanity,
    not a title for the Messiah. Retaining 'son of man' preserves the literary form,
    while the note clarifies the non-titular sense to avoid christological overreading.
  doctrine_reference: Original-language primacy over translation tradition; do not
    import doctrinal claims the text does not make.
