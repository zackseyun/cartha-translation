id: NUM.23.29
reference: Numbers 23:29
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר בִּלְעָם֙ אֶל בָּלָ֔ק בְּנֵה לִ֥/י בָ/זֶ֖ה שִׁבְעָ֣ה מִזְבְּחֹ֑ת
    וְ/הָכֵ֥ן לִ/י֙ בָּ/זֶ֔ה שִׁבְעָ֥ה פָרִ֖ים וְ/שִׁבְעָ֥ה אֵילִֽים־־׃
translation:
  text: Then Balaam said to Balak, “Build seven altars for me here, and prepare seven
    bulls and seven rams for me here.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving the sequential force better than a bare 'and said.'
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition in speech reporting; 'to' is the natural
    modern equivalent.
- source_word: בָּלָק
  chosen: Balak
  rationale: Personal name transliterated by standard English convention.
- source_word: בְּנֵה
  chosen: Build
  alternatives:
  - construct
  lexicon: HALOT
  rationale: Imperative of בנה. 'Build' is the straightforward and idiomatic rendering
    for erecting altars.
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: The preposition marks advantage/benefaction here; 'for me' is idiomatic
    in English and reflects Balaam's instruction that Balak provide these for his
    use.
- source_word: בָּזֶה
  chosen: here
  alternatives:
  - in this place
  - at this place
  lexicon: HALOT
  rationale: The phrase literally means 'in this [place].' English idiom prefers 'here,'
    which preserves the locative sense without awkwardness.
- source_word: שִׁבְעָה מִזְבְּחֹת
  chosen: seven altars
  lexicon: HALOT
  rationale: Direct numerical phrase; no reason to expand or paraphrase.
- source_word: וְהָכֵן
  chosen: and prepare
  alternatives:
  - and make ready
  - and set in order
  lexicon: HALOT
  rationale: Imperative of כון in the Hiphil, here meaning to make ready/provide.
    'Prepare' is concise and natural in context of sacrificial animals.
- source_word: פָרִים
  chosen: bulls
  alternatives:
  - young bulls
  - oxen
  lexicon: HALOT
  rationale: פַּר commonly denotes a bull in sacrificial contexts. 'Bulls' is the
    clearest general rendering; 'young bulls' is possible but not demanded by this
    verse alone.
- source_word: וְשִׁבְעָה אֵילִים
  chosen: and seven rams
  lexicon: HALOT
  rationale: אֵילִים are male sheep, standardly 'rams,' especially in sacrificial
    settings.
