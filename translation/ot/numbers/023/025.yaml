id: NUM.23.25
reference: Numbers 23:25
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר בָּלָק֙ אֶל בִּלְעָ֔ם גַּם קֹ֖ב לֹ֣א תִקֳּבֶ֑/נּוּ גַּם בָּרֵ֖ךְ
    לֹ֥א תְבָרֲכֶֽ/נּוּ־־־׃
translation:
  text: And Balak said to Balaam, “Then neither curse him at all nor bless him at
    all!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''curse, do not curse him ... bless, do not bless him''—an infinitive
      absolute followed by a finite verb in each clause, expressing strong emphasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard waw-consecutive narrative form introducing the next event. 'And
    ... said' preserves Hebrew narrative flow naturally in English.
- source_word: בָּלָק
  chosen: Balak
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Regular preposition of direction; 'to' is the natural modern English
    equivalent.
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: גַּם
  chosen: neither / nor
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: The two occurrences of גַּם in a prohibitive parallel structure are best
    represented idiomatically in English as 'neither ... nor' rather than woodenly
    repeating 'also.' This preserves the force of Balak's frustrated demand.
- source_word: קֹב
  chosen: curse
  alternatives:
  - denounce
  - hex
  lexicon: HALOT
  rationale: From the root קבב, a term for cursing used in Balaam narratives. 'Curse'
    is the standard and clearest English rendering in this context.
- source_word: לֹא תִקֳּבֶנּוּ
  chosen: do not curse him
  alternatives:
  - you shall not curse him
  - do not denounce him
  lexicon: HALOT
  rationale: Second masculine singular imperfect with 3ms object suffix in a prohibitive/jussive-like
    context after the infinitive absolute. English imperative/prohibitive best captures
    Balak's direct speech.
- source_word: קֹב לֹא תִקֳּבֶנּוּ
  chosen: curse him at all
  alternatives:
  - surely do not curse him
  - by no means curse him
  lexicon: HALOT
  rationale: Infinitive absolute before the finite verb intensifies the action. 'At
    all' conveys emphatic force in idiomatic English without sounding overly formal.
- source_word: בָּרֵךְ
  chosen: bless
  lexicon: HALOT
  rationale: Standard rendering of ברך in this context of pronouncing blessing.
- source_word: לֹא תְבָרֲכֶנּוּ
  chosen: nor bless him
  alternatives:
  - and do not bless him
  - you shall not bless him
  lexicon: HALOT
  rationale: Second masculine singular imperfect with 3ms object suffix. Coordinated
    with the previous clause, 'nor bless him' gives natural English parallelism.
- source_word: בָּרֵךְ לֹא תְבָרֲכֶנּוּ
  chosen: nor bless him at all
  alternatives:
  - surely do not bless him
  - by no means bless him
  lexicon: HALOT
  rationale: As with the first clause, infinitive absolute + finite verb marks emphasis.
    Repeating 'at all' preserves the balanced Hebrew intensification.
