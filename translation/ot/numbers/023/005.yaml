id: NUM.23.5
reference: Numbers 23:5
source:
  edition: WLC
  text: וַ/יָּ֧שֶׂם יְהוָ֛ה דָּבָ֖ר בְּ/פִ֣י בִלְעָ֑ם וַ/יֹּ֛אמֶר שׁ֥וּב אֶל בָּלָ֖ק
    וְ/כֹ֥ה תְדַבֵּֽר־׃
translation:
  text: Then the LORD put a word in Balaam’s mouth and said, “Return to Balak, and
    this is what you shall speak.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Thus you shall speak.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  chosen: put
  alternatives:
  - placed
  - set
  lexicon: HALOT
  rationale: The verb שׂוּם commonly means 'put, set, place.' 'Put' is the most natural
    English choice here and preserves the concrete idiom of placing words in someone's
    mouth without unnecessary stiffness.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention while
    distinguishing the covenant name.
- source_word: דָּבָר
  chosen: a word
  alternatives:
  - a message
  - words
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'message.' Here singular 'a word'
    best matches the Hebrew number and the idiom of divine speech given to a prophet-like
    speaker. 'Message' is possible but slightly more interpretive.
- source_word: בְּפִי
  chosen: in Balaam’s mouth
  alternatives:
  - into Balaam’s mouth
  - on Balaam’s tongue
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'in the mouth of Balaam.' English idiom
    prefers 'in Balaam’s mouth,' which preserves the imagery of divinely supplied
    speech.
- source_word: וַיֹּאמֶר
  chosen: and said
  alternatives:
  - and he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech. The subject is
    clearly the LORD from context, so English can omit the explicit pronoun.
- source_word: שׁוּב
  chosen: Return
  alternatives:
  - Go back
  - Turn back
  lexicon: HALOT
  rationale: The imperative means 'return/turn back.' 'Return' is concise and suitably
    formal for divine command, while remaining natural English.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Simple directional preposition; 'to' is the natural modern English equivalent.
- source_word: וְכֹה
  chosen: this is what
  alternatives:
  - thus
  - and thus
  lexicon: HALOT
  rationale: 'כֹּה often introduces the content of speech: ''thus.'' In contemporary
    English direct speech, ''this is what'' communicates the function clearly without
    archaic tone. The conjunction is absorbed naturally into the clause.'
- source_word: תְדַבֵּר
  chosen: you shall speak
  alternatives:
  - you shall say
  - you are to speak
  lexicon: HALOT
  rationale: The Piel of דבר means 'speak.' 'You shall speak' preserves the force
    of the command in a formal but readable way. 'Say' would be possible but less
    directly tied to the Hebrew verb.
