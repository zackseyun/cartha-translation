id: NUM.23.2
reference: Numbers 23:2
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ בָּלָ֔ק כַּ/אֲשֶׁ֖ר דִּבֶּ֣ר בִּלְעָ֑ם וַ/יַּ֨עַל בָּלָ֧ק וּ/בִלְעָ֛ם
    פָּ֥ר וָ/אַ֖יִל בַּ/מִּזְבֵּֽחַ׃
translation:
  text: Balak did as Balaam had spoken, and Balak and Balaam offered a bull and a
    ram on the altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'caused to ascend'; in sacrificial context this means 'offered'
      or 'offered up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - made
  lexicon: HALOT
  rationale: In the idiom עשה כאשר דבר, the verb means to do or carry out what was
    said. 'Did' is the most natural English rendering and fits the construction 'did
    as ... had spoken.'
- source_word: כַּאֲשֶׁר דִּבֶּר
  chosen: as ... had spoken
  alternatives:
  - just as ... said
  - according to what ... said
  lexicon: HALOT
  rationale: This comparative clause marks conformity to Balaam's instruction. 'Had
    spoken' preserves the prior action relative to Balak's doing and keeps a slightly
    formal narrative tone without sounding archaic.
- source_word: וַיַּעַל
  chosen: offered
  alternatives:
  - brought up
  - presented
  - caused to ascend
  lexicon: HALOT
  rationale: The Hiphil of עלה with sacrificial animals and altar context is a standard
    sacrificial idiom meaning to offer up. 'Offered' communicates the cultic sense
    clearly in modern English better than the more literal but opaque 'brought up.'
- source_word: בָּלָק וּבִלְעָם
  chosen: Balak and Balaam
  alternatives:
  - Balak, along with Balaam
  lexicon: HALOT
  rationale: The coordinated subjects are straightforwardly rendered as a compound
    subject. English repeats neither verb nor preposition here.
- source_word: פָּר
  chosen: a bull
  alternatives:
  - a young bull
  - an ox
  lexicon: HALOT
  rationale: פָּר commonly denotes a bull in sacrificial contexts. 'Bull' is the clearest
    general rendering; 'young bull' may be too specific without an explicit age marker
    in this verse.
- source_word: וָאַיִל
  chosen: and a ram
  alternatives:
  - and one ram
  lexicon: HALOT
  rationale: אַיִל is the standard term for a ram. The conjunction is preserved directly.
- source_word: בַּמִּזְבֵּחַ
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: The preposition with altar in sacrificial context is naturally rendered
    'on the altar' in contemporary English.
