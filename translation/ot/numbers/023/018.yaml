id: NUM.23.18
reference: Numbers 23:18
source:
  edition: WLC
  text: וַ/יִּשָּׂ֥א מְשָׁל֖/וֹ וַ/יֹּאמַ֑ר ק֤וּם בָּלָק֙ וּֽ/שֲׁמָ֔ע הַאֲזִ֥ינָ/ה
    עָדַ֖/י בְּנ֥/וֹ צִפֹּֽר׃
translation:
  text: 'Then he took up his discourse and said: “Rise, Balak, and hear; listen to
    me, son of Zippor.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “his oracle” or “his proverb” for “his discourse.” The Hebrew מָשָׁל
      can denote a proverb-like saying or a formal poetic utterance; here it introduces
      Balaam’s elevated pronouncement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא
  chosen: he took up
  alternatives:
  - he lifted up
  - he uttered
  lexicon: HALOT
  rationale: With מְשָׁלוֹ ('his discourse/oracle'), נשׂא idiomatically introduces
    a formal spoken utterance. 'Took up' preserves the Hebrew idiom in readable English
    better than the more wooden 'lifted up,' while avoiding over-interpretive paraphrase.
- source_word: מְשָׁלוֹ
  chosen: his discourse
  alternatives:
  - his oracle
  - his proverb
  lexicon: HALOT
  rationale: מָשָׁל can denote a proverb, taunt, or elevated poetic utterance. In
    Balaam's speeches it refers to a formal prophetic-poetic pronouncement. 'Discourse'
    communicates a solemn spoken declaration without importing the stronger prophetic
    label 'oracle' where the noun itself does not require it; alternatives are worth
    preserving.
- source_word: וַיֹּאמַר
  chosen: and said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech; 'and said' is
    the natural and sufficiently formal rendering.
- source_word: קוּם
  chosen: Rise
  alternatives:
  - Get up
  - Stand up
  lexicon: HALOT
  rationale: Imperative to Balak. 'Rise' fits the elevated tone of Balaam's pronouncement
    better than the more colloquial 'get up.'
- source_word: וּשֲׁמָע
  chosen: and hear
  alternatives:
  - and listen
  lexicon: HALOT
  rationale: שׁמע commonly means 'hear/listen.' Here paired with הַאֲזִינָה, rendering
    it as 'hear' preserves the rhetorical parallelism while allowing the second verb
    to carry the nuance 'listen attentively.'
- source_word: הַאֲזִינָה
  chosen: listen to me
  alternatives:
  - give ear to me
  - pay attention to me
  lexicon: HALOT
  rationale: The Hiphil of אזן means to give ear, listen attentively. 'Listen to me'
    is clear modern English and preserves the intensification relative to the preceding
    'hear.'
- source_word: עָדַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Preposition plus first-person suffix indicating direction toward the
    speaker; 'to me' is the natural modern equivalent.
- source_word: בְּנוֹ צִפֹּר
  chosen: son of Zippor
  lexicon: HALOT
  rationale: Patronymic identification of Balak. A literal rendering preserves the
    Hebrew form of address and its solemnity.
