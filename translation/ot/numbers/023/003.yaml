theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God explicitly. Following the project's
    stated default for יְהוָה, the main text uses 'the LORD,' while alternatives are
    preserved in documentation rather than the main line.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
