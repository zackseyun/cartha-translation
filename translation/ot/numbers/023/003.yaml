id: NUM.23.3
reference: Numbers 23:3
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר בִּלְעָ֜ם לְ/בָלָ֗ק הִתְיַצֵּב֮ עַל עֹלָתֶ/ךָ֒ וְ/אֵֽלְכָ֗ה אוּלַ֞י
    יִקָּרֵ֤ה יְהוָה֙ לִ/קְרָאתִ֔/י וּ/דְבַ֥ר מַה יַּרְאֵ֖/נִי וְ/הִגַּ֣דְתִּי לָ֑/ךְ
    וַ/יֵּ֖לֶךְ שֶֽׁפִי־־׃
translation:
  text: Then Balaam said to Balak, “Stand beside your burnt offering, and I will go.
    Perhaps the LORD will come to meet me, and whatever he shows me I will tell you.”
    Then he went to a bare height.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to a barren height' / 'to a bare hill.' The Hebrew term denotes an exposed,
      bare high place.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְיַצֵּב
  chosen: Stand beside
  alternatives:
  - Take your stand by
  - Station yourself by
  lexicon: HALOT
  rationale: Hitpael imperative of יצב calls for taking one's position. 'Stand beside'
    is natural English and fits the immediate spatial sense with עַל plus the sacrifice.
- source_word: עַל עֹלָתֶךָ
  chosen: beside your burnt offering
  alternatives:
  - by your burnt offering
  - over your burnt offering
  lexicon: HALOT
  rationale: עֹלָה is specifically a 'burnt offering.' Although עַל often means 'on/upon/over,'
    in this idiom with standing it is best rendered spatially as 'beside/by' rather
    than implying Balak is physically on top of the offering.
- source_word: וְאֵלְכָה
  chosen: and I will go
  alternatives:
  - while I go
  - and let me go
  lexicon: HALOT
  rationale: Cohortative first person singular expresses Balaam's intended action.
    'I will go' communicates resolve in smooth English.
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - Maybe
  - It may be that
  lexicon: HALOT
  rationale: Marks uncertainty or possibility; 'Perhaps' preserves the tentative tone
    appropriately.
- source_word: יִקָּרֵה יְהוָה לִקְרָאתִי
  chosen: the LORD will come to meet me
  alternatives:
  - the LORD will happen to meet me
  - the LORD will encounter me
  lexicon: HALOT
  rationale: קרה in the Niphal can denote happening/meeting by chance or occurrence.
    In context Balaam hopes for a divine encounter. 'Come to meet me' is idiomatic
    and avoids suggesting randomness in a way that would sound awkward in English,
    while still preserving Balaam's uncertainty through 'Perhaps.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: וּדְבַר מַה יַּרְאֵנִי
  chosen: and whatever he shows me
  alternatives:
  - and the word of what he shows me
  - and whatever matter he lets me see
  lexicon: HALOT
  rationale: דבר here introduces the content/result of revelation rather than requiring
    a wooden 'word.' The interrogative מה with the verb yields the sense 'whatever
    he shows me.' This is an optimal-equivalence rendering of a somewhat compressed
    Hebrew expression.
- source_word: יַּרְאֵנִי
  chosen: he shows me
  alternatives:
  - he lets me see
  - he reveals to me
  lexicon: HALOT
  rationale: Hiphil of ראה is causative, 'cause to see/show.' 'Shows me' is the most
    direct and natural rendering.
- source_word: וְהִגַּדְתִּי לָךְ
  chosen: I will tell you
  alternatives:
  - I will declare it to you
  - I will report it to you
  lexicon: HALOT
  rationale: Hiphil of נגד means to tell, declare, report. 'I will tell you' is clear
    and proportionate to the context.
- source_word: שֶׁפִי
  chosen: a bare height
  alternatives:
  - a barren height
  - a bare hill
  - an open height
  lexicon: HALOT
  rationale: The noun likely denotes a bare, treeless height or exposed hilltop. 'A
    bare height' preserves the topographical sense without over-specifying a technical
    location.
