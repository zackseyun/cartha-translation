id: NUM.23.8
reference: Numbers 23:8
source:
  edition: WLC
  text: מָ֣ה אֶקֹּ֔ב לֹ֥א קַבֹּ֖/ה אֵ֑ל וּ/מָ֣ה אֶזְעֹ֔ם לֹ֥א זָעַ֖ם יְהוָֽה׃
translation:
  text: How can I curse whom God has not cursed? And how can I denounce whom the LORD
    has not denounced?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How shall I be indignant with one with whom the LORD has not been indignant?'
      The Hebrew verb in the second line can emphasize indignation or denunciation.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָה
  chosen: How can
  alternatives:
  - What
  - Why
  lexicon: HALOT
  rationale: In this rhetorical question, מָה introduces not a request for information
    but an expression of impossibility or challenge. 'How can' best captures the force
    in natural English.
- source_word: אֶקֹּב
  chosen: I curse
  alternatives:
  - I invoke a curse on
  - I denounce
  lexicon: HALOT
  rationale: From נקב/קבב in this context of Balaam's oracle, the sense is to curse.
    'I curse' is concise and preserves the parallel with the following clause.
- source_word: קַבֹּה
  chosen: has cursed
  alternatives:
  - has denounced
  lexicon: HALOT
  rationale: The verb in parallel with Balaam's own cursing action refers to God's
    not having cursed Israel. Rendering it 'has cursed' preserves the lexical correspondence
    with אֶקֹּב.
- source_word: אֵל
  chosen: God
  alternatives:
  - El
  lexicon: HALOT
  rationale: Although אֵל can function as the divine name/title 'El,' in English Bible
    style here it is best rendered by the common title 'God.' This preserves meaning
    rather than transliterating a title.
- source_word: וּמָה
  chosen: And how can
  alternatives:
  - And what
  - And why
  lexicon: HALOT
  rationale: The conjunction plus interrogative continues the rhetorical parallelism.
    'And how can' mirrors the first colon and communicates the sense of inability.
- source_word: אֶזְעֹם
  chosen: I denounce
  alternatives:
  - I be indignant
  - I curse
  lexicon: HALOT
  rationale: זעם often carries the sense of expressing indignation or denouncing in
    wrath. 'I denounce' differentiates it from the first verb while preserving the
    hostile speech-act in context.
- source_word: זָעַם
  chosen: has not denounced
  alternatives:
  - has not been indignant
  - has not cursed
  lexicon: HALOT
  rationale: To preserve the lexical link with אֶזְעֹם, the same English root is used.
    This keeps the poetic parallelism while avoiding flattening both Hebrew verbs
    into identical English terms.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following established reverential convention and the stated translation
    policy.
