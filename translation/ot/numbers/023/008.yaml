theological_decisions:
- issue: Rendering the divine names אֵל and יְהוָה distinctly within the poetic parallelism
  chosen_reading: Translate אֵל as 'God' and יְהוָה as 'the LORD'
  alternative_readings:
  - Translate both generically as 'God'
  - Render יְהוָה as 'Yahweh'
  rationale: The Hebrew intentionally uses two divine designations in parallel. Preserving
    the distinction in English reflects the source text without importing additional
    theological claims. The rendering 'the LORD' for יְהוָה follows the doctrine's
    contested-terms policy.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD'
