id: NUM.23.28
reference: Numbers 23:28
source:
  edition: WLC
  text: וַ/יִּקַּ֥ח בָּלָ֖ק אֶת בִּלְעָ֑ם רֹ֣אשׁ הַ/פְּע֔וֹר הַ/נִּשְׁקָ֖ף עַל פְּנֵ֥י
    הַ/יְשִׁימֹֽן־־׃
translation:
  text: Then Balak took Balaam to the top of Peor, which overlooks the face of the
    wasteland.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'overlooks the desert'; Hebrew 'the Jeshimon' may be understood either
      as a descriptive term ('the wasteland/desert') or as a place-name.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: Then ... took
  alternatives:
  - and ... took
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... took' gives natural
    English narrative sequence while preserving the simple verbal sense of לקח, 'take.'
- source_word: בָּלָק
  chosen: Balak
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶת בִּלְעָם
  chosen: Balaam
  rationale: Direct-object marker is not represented in English; the personal name
    is transliterated conventionally.
- source_word: רֹאשׁ
  chosen: the top
  alternatives:
  - the head
  - the summit
  lexicon: HALOT
  rationale: In topographical context רֹאשׁ commonly denotes the top or summit of
    a height. 'Top' is the most natural modern English here.
- source_word: הַפְּעוֹר
  chosen: Peor
  alternatives:
  - the Peor
  rationale: Proper place-name transliterated. The article is absorbed in idiomatic
    English rather than rendered woodenly.
- source_word: הַנִּשְׁקָף
  chosen: which overlooks
  alternatives:
  - that looks down on
  - that faces
  lexicon: HALOT
  rationale: The Niphal participle of שׁקף describes a height projecting or looking
    out over an area. 'Which overlooks' best captures the topographical sense in clear
    English.
- source_word: עַל פְּנֵי
  chosen: the face of
  alternatives:
  - over
  - toward
  - across from
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'upon the face of.' The main text preserves
    the imagery with readable English, since the phrase is common enough and fits
    the elevated, geographic description.
- source_word: הַיְשִׁימֹן
  chosen: the wasteland
  alternatives:
  - the desert
  - the Jeshimon
  lexicon: HALOT
  rationale: יְשִׁימֹן denotes a desolate waste or desert region. 'The wasteland'
    conveys the lexical sense directly; 'Jeshimon' would obscure meaning for modern
    readers unless treated as a proper name.
