id: NUM.23.1
reference: Numbers 23:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר בִּלְעָם֙ אֶל בָּלָ֔ק בְּנֵה לִ֥/י בָ/זֶ֖ה שִׁבְעָ֣ה מִזְבְּחֹ֑ת
    וְ/הָכֵ֥ן לִ/י֙ בָּ/זֶ֔ה שִׁבְעָ֥ה פָרִ֖ים וְ/שִׁבְעָ֥ה אֵילִֽים־־׃
translation:
  text: Then Balaam said to Balak, “Build seven altars for me here, and prepare seven
    bulls and seven rams for me here.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in this [place]'' twice; rendered ''here'' in both instances
      for natural English while preserving the repeated location emphasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - and ... said
  - so ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force better than a bare 'and said.'
- source_word: בִּלְעָם
  chosen: Balaam
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition in speech reporting; 'to' is idiomatic
    modern English.
- source_word: בָּלָק
  chosen: Balak
  rationale: Personal name transliterated by standard English convention.
- source_word: בְּנֵה
  chosen: Build
  alternatives:
  - construct
  lexicon: HALOT
  rationale: Imperative of בנה. 'Build' is the normal, direct rendering for constructing
    altars.
- source_word: לִי
  chosen: for me
  alternatives:
  - for myself
  lexicon: HALOT
  rationale: The preposition with 1cs suffix marks benefit/direction. 'For me' is
    the straightforward idiomatic rendering.
- source_word: בָּזֶה
  chosen: here
  alternatives:
  - in this place
  - at this place
  lexicon: HALOT
  rationale: Literally 'in this [place/thing].' In context Balaam is indicating the
    location, so 'here' is natural English and preserves the deictic force.
- source_word: שִׁבְעָה מִזְבְּחֹת
  chosen: seven altars
  lexicon: HALOT
  rationale: Direct numerical phrase; no reason to expand or paraphrase.
- source_word: וְהָכֵן
  chosen: and prepare
  alternatives:
  - and make ready
  - and set in order
  lexicon: HALOT
  rationale: Imperative of כון in the causative sense of making something ready. 'Prepare'
    is concise and idiomatic for sacrificial animals.
- source_word: פָרִים
  chosen: bulls
  alternatives:
  - young bulls
  - oxen
  lexicon: HALOT
  rationale: Plural of פַּר, commonly 'bull' in sacrificial contexts. 'Young bulls'
    is possible in some contexts, but the Hebrew here does not explicitly mark age
    beyond the standard sacrificial term.
- source_word: וְשִׁבְעָה אֵילִים
  chosen: and seven rams
  lexicon: HALOT
  rationale: אֵילִים are male sheep, specifically rams; this should be rendered precisely
    in an offering context.
