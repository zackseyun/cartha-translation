theological_decisions:
- issue: Whether the final clause should be rendered reflexively ('does not count
    itself among the nations') or passively ('is not reckoned among the nations')
  chosen_reading: and not counting itself among the nations
  alternative_readings:
  - and shall not be reckoned among the nations
  - and is not considered among the nations
  rationale: The Hitpael form allows a reflexive/middle sense, and the verse emphasizes
    Israel's distinct identity. The chosen wording preserves that separateness without
    importing later theological claims about ethnic superiority. Because the passive
    reading is also viable and common in translation tradition, it is preserved in
    a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
