id: NUM.23.9
reference: Numbers 23:9
source:
  edition: WLC
  text: כִּֽי מֵ/רֹ֤אשׁ צֻרִים֙ אֶרְאֶ֔/נּוּ וּ/מִ/גְּבָע֖וֹת אֲשׁוּרֶ֑/נּוּ הֶן עָם֙
    לְ/בָדָ֣ד יִשְׁכֹּ֔ן וּ/בַ/גּוֹיִ֖ם לֹ֥א יִתְחַשָּֽׁב־־׃
translation:
  text: For from the top of the rocks I see him, and from the hills I behold him.
    Look, a people dwelling alone, and not counting itself among the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and shall not be reckoned among the nations.' The Hebrew verb can be
      understood passively as well as reflexively/middle.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation of Balaam's oracle. 'For' best preserves the
    connective force into English without over-specifying causation.
- source_word: מֵרֹאשׁ
  chosen: from the top of
  alternatives:
  - from the head of
  - from the summit of
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but in topographical context it idiomatically
    means 'top' or 'summit.' 'From the top of' is natural English and preserves the
    vantage-point imagery.
- source_word: צֻרִים
  chosen: the rocks
  alternatives:
  - crags
  - cliffs
  lexicon: HALOT
  rationale: Plural of צוּר, referring to rocky heights. 'Rocks' is straightforward
    and readable; 'crags' is possible but more stylized.
- source_word: אֶרְאֶנּוּ
  chosen: I see him
  alternatives:
  - I look at him
  - I perceive him
  lexicon: HALOT
  rationale: First-person singular with 3ms object. The object refers collectively
    to Israel as a people, but the Hebrew uses singular pronominal reference to the
    nation; 'him' preserves the source grammar.
- source_word: וּמִגְּבָעוֹת
  chosen: and from the hills
  alternatives:
  - and from the heights
  - and from the hillsides
  lexicon: HALOT
  rationale: Parallel to 'from the top of the rocks.' 'Hills' fits גבעות well and
    keeps the poetic parallelism accessible.
- source_word: אֲשׁוּרֶנּוּ
  chosen: I behold him
  alternatives:
  - I see him
  - I gaze on him
  lexicon: HALOT
  rationale: A poetic verb for looking attentively. Rendering it as 'behold' differentiates
    it from the previous ראה while preserving elevated but still understandable diction.
- source_word: הֶן
  chosen: Look
  alternatives:
  - Behold
  - Surely
  lexicon: HALOT
  rationale: Deictic particle drawing attention to what follows. 'Look' is readable
    modern English; 'Behold' is possible but more archaic.
- source_word: עָם
  chosen: a people
  alternatives:
  - a nation
  lexicon: HALOT
  rationale: עם commonly means 'people' in the sense of an ethnic/national community.
    'A people' preserves the collective identity in view.
- source_word: לְבָדָד
  chosen: alone
  alternatives:
  - by itself
  - in isolation
  lexicon: HALOT
  rationale: Conveys separateness or distinctness. 'Alone' is concise and idiomatic
    in the clause 'dwelling alone.'
- source_word: יִשְׁכֹּן
  chosen: dwelling
  alternatives:
  - shall dwell
  - lives
  lexicon: HALOT
  rationale: Imperfect can express characteristic or future action. Here the line
    describes Israel's distinctive status in Balaam's oracle; the participial-like
    English 'dwelling' works naturally after 'a people' and avoids forcing a strictly
    future nuance.
- source_word: וּבַגּוֹיִם
  chosen: among the nations
  alternatives:
  - with the nations
  - among the peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers to other nations/peoples. 'Among the nations' is
    the most idiomatic rendering in this contrast with Israel's separateness.
- source_word: לֹא יִתְחַשָּׁב
  chosen: not counting itself
  alternatives:
  - shall not be reckoned
  - is not considered
  lexicon: HALOT
  rationale: Hitpael of חשׁב can mean 'to reckon oneself' or 'to be reckoned.' The
    reflexive nuance is plausible, but the broader sense is that Israel does not class
    itself with the nations / is not to be classed among them. The chosen rendering
    keeps the middle/reflexive flavor while remaining readable.
