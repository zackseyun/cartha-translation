id: NUM.23.13
reference: Numbers 23:13
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר אֵלָ֜י/ו בָּלָ֗ק לך נָּ֨א אִתִּ֜/י אֶל מָק֤וֹם אַחֵר֙ אֲשֶׁ֣ר
    תִּרְאֶ֣/נּוּ מִ/שָּׁ֔ם אֶ֚פֶס קָצֵ֣/הוּ תִרְאֶ֔ה וְ/כֻלּ֖/וֹ לֹ֣א תִרְאֶ֑ה וְ/קָבְ/נוֹ
    לִ֖/י מִ/שָּֽׁם־־־׃
translation:
  text: Then Balak said to him, “Please come with me to another place, from where
    you may see him. You will see only the edge of him, and you will not see all of
    him; then curse him for me from there.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''You will see only his edge'' or ''only the farthest part of him,''
      referring to seeing only a partial view of Israel.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew uses singular pronouns ('him,' 'all of him') for Israel as a
      collective people; English could also render these as 'them.'
    reason: alternative_reading
lexical_decisions:
- source_word: לך־נא
  chosen: Please come
  alternatives:
  - Come, please
  - Go now, please
  lexicon: HALOT
  rationale: The sequence combines an imperative of הלך with the particle נָא, yielding
    a polite entreaty rather than a bare command. In English, 'Please come' captures
    both the requestive force and the movement toward a new location in relation to
    Balak.
- source_word: אִתִּי
  chosen: with me
  lexicon: HALOT
  rationale: Straightforward comitative preposition with first-person suffix; retained
    explicitly because Balak is inviting Balaam to relocate together.
- source_word: מָקוֹם אַחֵר
  chosen: another place
  alternatives:
  - a different place
  lexicon: HALOT
  rationale: A natural rendering preserving the concrete sense of relocation without
    unnecessary formality.
- source_word: אֲשֶׁר תִּרְאֶנּוּ מִשָּׁם
  chosen: from where you may see him
  alternatives:
  - where you will see him from there
  - from there you will see him
  lexicon: HALOT
  rationale: The clause identifies the new vantage point. 'May see' reflects the prospective
    sense in context without overstating certainty; the object suffix refers to Israel
    as a collective singular seen as 'him/it.'
- source_word: אֶפֶס
  chosen: only
  alternatives:
  - however
  - surely only
  - nothing but
  lexicon: HALOT
  rationale: Here אֶפֶס limits what can be seen, introducing restriction. 'Only' is
    idiomatic in English and fits the following phrase about seeing merely a part.
- source_word: קָצֵהוּ
  chosen: the edge of him
  alternatives:
  - his extremity
  - his outskirts
  - the farthest part of him
  lexicon: HALOT
  rationale: קָצֶה denotes an end, edge, or extremity. Because the referent is the
    people of Israel viewed from a distance, 'the edge of him' preserves the singular
    suffix while conveying that only a fringe portion will be visible.
- source_word: וְכֻלּוֹ לֹא תִרְאֶה
  chosen: and you will not see all of him
  alternatives:
  - but you will not see all of him
  - and you will not see him in full
  lexicon: HALOT
  rationale: This contrasts partial with complete visibility. 'All of him' keeps the
    singular pronominal reference and the totality expressed by כֻּלּוֹ.
- source_word: וְקָבְנוֹ לִי
  chosen: then curse him for me
  alternatives:
  - and curse him for me
  - denounce him for me
  lexicon: HALOT
  rationale: From קבב, a verb used in Balaam narratives for cursing. 'Curse' is the
    standard and contextually appropriate rendering. The prefixed conjunction is rendered
    as 'then' to show sequence from seeing to cursing.
- source_word: מִשָּׁם
  chosen: from there
  lexicon: HALOT
  rationale: 'Retained at both occurrences to preserve the spatial logic of Balak''s
    strategy: a new location and a curse uttered from that vantage point.'
