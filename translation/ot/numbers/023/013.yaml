theological_decisions:
- issue: Referent of singular pronominal suffixes for Israel
  chosen_reading: Render the suffixes as masculine singular ('him') in the main text
  alternative_readings:
  - Render collectively as 'them' for smoother English
  rationale: The Hebrew repeatedly uses singular suffixes for the people viewed as
    a collective entity. Preserving 'him' maintains source-text form and the rhetorical
    picture of Israel as a single people, while remaining intelligible in English.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of the imperative לך in context
  chosen_reading: Translate as an invitation/request ('Please come with me')
  alternative_readings:
  - Translate more literally as 'Go with me'
  rationale: Although הלך often means 'go,' English deictic usage favors 'come' when
    the speaker invites someone to accompany him to another place. This is an optimal-equivalence
    adjustment for natural modern English without changing the sense.
  doctrine_reference: Translation philosophy §6
