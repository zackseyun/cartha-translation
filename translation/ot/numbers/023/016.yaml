id: NUM.23.16
reference: Numbers 23:16
source:
  edition: WLC
  text: וַ/יִּקָּ֤ר יְהוָה֙ אֶל בִּלְעָ֔ם וַ/יָּ֥שֶׂם דָּבָ֖ר בְּ/פִ֑י/ו וַ/יֹּ֛אמֶר
    שׁ֥וּב אֶל בָּלָ֖ק וְ/כֹ֥ה תְדַבֵּֽר־־׃
translation:
  text: And the LORD met with Balaam and put a word in his mouth, and said, “Return
    to Balak, and thus you shall speak.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came upon Balaam' or 'encountered Balaam.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּר
  chosen: met with
  alternatives:
  - came upon
  - encountered
  lexicon: HALOT
  rationale: The verb קָרָה in this form can denote a meeting or encounter. In this
    context, with YHWH as subject and Balaam as object, 'met with' is natural English
    and preserves the sense of a direct encounter without overstating it as a visionary
    appearance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following longstanding English convention and the stated policy for
    יְהוָה.
- source_word: וַיָּשֶׂם דָּבָר בְּפִיו
  chosen: put a word in his mouth
  alternatives:
  - placed a message in his mouth
  - put words in his mouth
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for divinely given speech. 'Put a word
    in his mouth' is close to the Hebrew singular דָּבָר and remains idiomatic in
    English. 'Message' is possible but slightly more interpretive.
- source_word: דָּבָר
  chosen: word
  alternatives:
  - message
  - matter
  lexicon: HALOT
  rationale: Although דָּבָר has a broad semantic range, here it refers to the specific
    utterance Balaam is to deliver. 'Word' best preserves the Hebrew wording and the
    prophetic-speech idiom.
- source_word: שׁוּב
  chosen: Return
  alternatives:
  - Go back
  - Turn back
  lexicon: HALOT
  rationale: The imperative directs Balaam to go back to Balak. 'Return' is concise,
    natural, and slightly more formal, fitting the narrative tone.
- source_word: וְכֹה תְדַבֵּר
  chosen: and thus you shall speak
  alternatives:
  - and this is what you shall say
  - and so you shall speak
  lexicon: HALOT
  rationale: כֹה plus דבר introduces the content or manner of the forthcoming speech.
    'Thus you shall speak' preserves the formal prophetic flavor and remains clear
    in modern English.
