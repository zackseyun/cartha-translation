id: NUM.23.30
reference: Numbers 23:30
source:
  edition: WLC
  text: וַ/יַּ֣עַשׂ בָּלָ֔ק כַּ/אֲשֶׁ֖ר אָמַ֣ר בִּלְעָ֑ם וַ/יַּ֛עַל פָּ֥ר וָ/אַ֖יִל
    בַּ/מִּזְבֵּֽחַ׃
translation:
  text: So Balak did as Balaam had said, and he offered up a bull and a ram on the
    altar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - made
  - acted
  lexicon: HALOT
  rationale: The verb עשה here functions idiomatically with כַּאֲשֶׁר אָמַר, meaning
    'did as ... said.' 'Did' is the most natural English rendering in this construction.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according to what
  lexicon: HALOT
  rationale: 'In combination with the following verb, this introduces comparison/conformity:
    Balak acted in the manner Balaam specified. ''As'' is concise and natural.'
- source_word: אָמַר
  chosen: had said
  alternatives:
  - said
  - spoke
  lexicon: HALOT
  rationale: 'English past perfect smooths the sequence: Balaam''s instruction precedes
    Balak''s action. The Hebrew perfect after the comparative particle naturally refers
    to prior speech.'
- source_word: וַיַּעַל
  chosen: offered up
  alternatives:
  - offered
  - caused to go up
  lexicon: HALOT
  rationale: עלה in sacrificial contexts commonly means to offer on an altar, with
    the sense of ascending in smoke. 'Offered up' preserves that cultic nuance better
    than the flatter 'offered.'
- source_word: פָּר
  chosen: a bull
  alternatives:
  - bullock
  - young bull
  lexicon: HALOT
  rationale: '''Bull'' is clear modern English for the sacrificial animal and avoids
    archaic ''bullock.'''
- source_word: אַיִל
  chosen: a ram
  lexicon: HALOT
  rationale: Standard and precise rendering for the sacrificial animal אַיִל.
- source_word: בַּמִּזְבֵּחַ
  chosen: on the altar
  alternatives:
  - upon the altar
  lexicon: HALOT
  rationale: The preposition with altar in sacrificial contexts is naturally rendered
    'on the altar' in modern English.
- source_word: וַ
  chosen: So
  alternatives:
  - And
  lexicon: HALOT
  rationale: The initial waw continues the narrative. 'So' captures the consequential
    flow from the prior instruction more idiomatically than a bare 'And,' while remaining
    faithful to the discourse function.
