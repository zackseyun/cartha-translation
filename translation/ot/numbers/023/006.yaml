id: NUM.23.6
reference: Numbers 23:6
source:
  edition: WLC
  text: וַ/יָּ֣שָׁב אֵלָ֔י/ו וְ/הִנֵּ֥ה נִצָּ֖ב עַל עֹלָת֑/וֹ ה֖וּא וְ/כָל שָׂרֵ֥י
    מוֹאָֽב־־׃
translation:
  text: Then he returned to him, and behold, he was standing beside his burnt offering—he
    and all the princes of Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The pronoun 'him' refers to Balak in the immediate context.
    reason: cross_reference
  - marker: b
    text: Or 'by his burnt offering.' The Hebrew preposition can be rendered in several
      ways here; the sense is that he was positioned at the sacrifice, not standing
      on it.
    reason: lexical_alternative
  - marker: c
    text: Or 'officials' or 'leaders' of Moab.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: Then he returned
  alternatives:
  - And he returned
  - So he returned back
  lexicon: HALOT
  rationale: Wayyiqtol of שוב advances the narrative. 'Then he returned' preserves
    the sequential force in natural English without the redundancy of 'returned back'.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to Balak
  lexicon: HALOT
  rationale: The pronominal object is explicit in Hebrew but its referent is contextual.
    Main text keeps the pronoun as in the source; the likely referent is Balak from
    the surrounding narrative.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there he was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to what Balaam sees. 'Behold'
    preserves the deictic vividness and solemn narrative tone better than flatter
    alternatives.
- source_word: נִצָּב
  chosen: was standing
  alternatives:
  - stood
  - was stationed
  lexicon: HALOT
  rationale: The participle conveys a continuing posture or state. 'Was standing'
    reflects that durative sense more naturally than the simple past 'stood'.
- source_word: עַל
  chosen: beside
  alternatives:
  - by
  - over
  - at
  lexicon: HALOT
  rationale: Although עַל often means 'on/upon,' in this context with a person positioned
    in relation to a sacrifice or altar it idiomatically indicates attendance at or
    beside it. 'Beside' is clearer in English than a wooden 'upon his burnt offering,'
    which could suggest physically standing on the sacrifice.
- source_word: עֹלָתוֹ
  chosen: his burnt offering
  alternatives:
  - his whole burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard sacrificial term for a burnt offering. The possessive
    suffix is retained. 'Whole burnt offering' is more explicit etymologically but
    less idiomatic in contemporary English.
- source_word: הוּא וְכָל־שָׂרֵי מוֹאָב
  chosen: he and all the princes of Moab
  alternatives:
  - he and all the officials of Moab
  - he and all the leaders of Moab
  lexicon: HALOT
  rationale: 'The independent pronoun adds emphasis: Balak himself was there, along
    with the Moabite rulers. שָׂרִים can mean princes, officials, or leaders; ''princes''
    fits the political-noble setting and traditional usage while remaining understandable.'
