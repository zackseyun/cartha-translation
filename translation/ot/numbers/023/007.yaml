id: NUM.23.7
reference: Numbers 23:7
source:
  edition: WLC
  text: וַ/יִּשָּׂ֥א מְשָׁל֖/וֹ וַ/יֹּאמַ֑ר מִן אֲ֠רָם יַנְחֵ֨/נִי בָלָ֤ק מֶֽלֶךְ
    מוֹאָב֙ מֵֽ/הַרְרֵי קֶ֔דֶם לְכָ/ה֙ אָֽרָ/ה לִּ֣/י יַעֲקֹ֔ב וּ/לְכָ֖/ה זֹעֲמָ֥/ה
    יִשְׂרָאֵֽל־־־־׃
translation:
  text: 'Then he took up his discourse and said: “From Aram Balak king of Moab has
    led me, from the mountains of the east: ‘Come, curse Jacob for me; yes, come,
    denounce Israel.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “oracle” for “discourse”; the Hebrew idiom is literally “he took up his
      mashal,” a formal poetic utterance.
    reason: lexical_alternative
  - marker: b
    text: Or “from the eastern mountains”; “the mountains of the east” renders a Hebrew
      expression that likely refers geographically to the region eastward from Moab.
    reason: lexical_alternative
  - marker: c
    text: The second verb differs from “curse.” It can also be rendered “execrate,”
      but “denounce” is used here for readable modern English while preserving the
      distinction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא מְשָׁלוֹ
  chosen: he took up his discourse
  alternatives:
  - he took up his oracle
  - he uttered his proverb
  lexicon: HALOT
  rationale: The idiom 'lift/take up his mashal' introduces a formal poetic pronouncement.
    'Discourse' is clear modern English and broad enough to cover the elevated utterance
    here; 'oracle' is possible but can over-specify prophetic force, while 'proverb'
    is too narrow in English for Balaam's poetic saying.
- source_word: מִן אֲרָם
  chosen: From Aram
  alternatives:
  - Out of Aram
  - From Syria
  lexicon: HALOT
  rationale: Aram is a place-name and should be transliterated rather than replaced
    with the later geopolitical term 'Syria.' 'From Aram' is the most straightforward
    rendering of the preposition.
- source_word: יַנְחֵנִי
  chosen: has led me
  alternatives:
  - brought me
  - guided me
  lexicon: HALOT
  rationale: The Hiphil of נחה commonly means to lead or guide. 'Has led me' preserves
    the causative sense and fits Balak's action in summoning and escorting Balaam.
    'Brought me' is possible but less explicit about directed movement.
- source_word: מֵהַרְרֵי קֶדֶם
  chosen: from the mountains of the east
  alternatives:
  - from the eastern mountains
  - from the mountains of old
  lexicon: HALOT
  rationale: קדם here is best taken spatially ('east') in parallel with Aram as Balaam's
    region of origin. 'Mountains of old' is lexically possible for קדם in other contexts,
    but the geographic sense fits this narrative setting better.
- source_word: לְכָה
  chosen: Come
  alternatives:
  - Go
  lexicon: HALOT
  rationale: The imperative functions as an invitation/summons in direct speech. 'Come'
    is idiomatic in English for this kind of appeal.
- source_word: אָרָה
  chosen: curse
  alternatives:
  - pronounce a curse on
  lexicon: HALOT
  rationale: The verb plainly means to curse. The simple English verb is both accurate
    and natural.
- source_word: לִּי
  chosen: for me
  alternatives:
  - for my sake
  - on my behalf
  lexicon: HALOT
  rationale: The dative marks Balak's interest in the requested action. 'For me' is
    concise and natural.
- source_word: יַעֲקֹב
  chosen: Jacob
  lexicon: HALOT
  rationale: Personal/national name retained by standard transliteration.
- source_word: זֹעֲמָה
  chosen: denounce
  alternatives:
  - curse
  - execrate
  lexicon: HALOT
  rationale: This second verb is distinct from אָרָה and should not be flattened into
    the same English gloss without note. 'Denounce' preserves the hostile imprecatory
    force while maintaining lexical distinction. 'Execrate' is more precise but too
    uncommon for readable modern English.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Personal/national name retained by standard transliteration.
