theological_decisions:
- issue: Relation of Jacob and Israel in Balaam's quoted request
  chosen_reading: Render both names distinctly as parallel designations for the covenant
    people without collapsing them into a single paraphrase.
  alternative_readings:
  - Translate only one collective term such as 'the Israelites'
  rationale: The Hebrew deliberately uses the paired names 'Jacob' and 'Israel,' a
    poetic parallelism that should be preserved. This maintains the literary and covenantal
    resonance without adding doctrinal interpretation.
  doctrine_reference: Translation philosophy §§1, 5
