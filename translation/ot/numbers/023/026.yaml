id: NUM.23.26
reference: Numbers 23:26
source:
  edition: WLC
  text: וַ/יַּ֣עַן בִּלְעָ֔ם וַ/יֹּ֖אמֶר אֶל בָּלָ֑ק הֲ/לֹ֗א דִּבַּ֤רְתִּי אֵלֶ֨י/ךָ֙
    לֵ/אמֹ֔ר כֹּ֛ל אֲשֶׁר יְדַבֵּ֥ר יְהוָ֖ה אֹת֥/וֹ אֶֽעֱשֶֽׂה־־׃
translation:
  text: Balaam answered and said to Balak, “Did I not speak to you, saying, ‘All that
    the LORD speaks, that I will do’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''All that the LORD speaks, that I will do.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Standard narrative use of ענה introducing a reply; 'answered' preserves
    the formal dialogue structure.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Common rendering of אמר in Hebrew narrative; paired with 'answered' to
    reflect the two-verb formula without overtranslation.
- source_word: הֲלֹא
  chosen: Did I not
  alternatives:
  - Have I not
  - Surely I
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Did I not' fits
    the past-tense recollection in context.
- source_word: דִּבַּרְתִּי אֵלֶיךָ
  chosen: speak to you
  alternatives:
  - tell you
  - speak with you
  lexicon: HALOT
  rationale: דבר with אֶל is straightforwardly 'speak to.' 'Tell you' is possible
    but slightly more interpretive than the Hebrew.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Retains the quotative infinitive construction in natural English.
- source_word: כֹּל אֲשֶׁר
  chosen: All that
  alternatives:
  - Whatever
  - Everything that
  lexicon: HALOT
  rationale: A formally close rendering that preserves the comprehensive force of
    the expression.
- source_word: יְדַבֵּר יְהוָה
  chosen: the LORD speaks
  alternatives:
  - the LORD says
  - the LORD will speak
  lexicon: HALOT
  rationale: The imperfect here expresses what YHWH says/speaks in such circumstances.
    Present English best captures the general principle Balaam is restating.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the project's contested-terms policy for the divine name.
- source_word: אֹתוֹ אֶעֱשֶׂה
  chosen: that I will do
  alternatives:
  - I will do it
  - that I must do
  lexicon: HALOT
  rationale: The object marker with suffix points back to the preceding content. 'That
    I will do' preserves the resumptive structure and Balaam's commitment to act only
    on what the LORD speaks.
