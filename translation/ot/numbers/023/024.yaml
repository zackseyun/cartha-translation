theological_decisions:
- issue: Violence imagery in Balaam's oracle
  chosen_reading: Retain the predatory and blood-drinking imagery as metaphorical
    language of military triumph and unstoppable strength.
  alternative_readings:
  - Soften the imagery to general victory language
  rationale: The Hebrew is intentionally stark and should not be diluted. The verse
    depicts Israel in lion imagery, emphasizing irresistible conquest, not prescribing
    literal blood-drinking. Preserving the tension matches the translation philosophy
    of not flattening difficult imagery.
  doctrine_reference: Translation philosophy §1, §3, §6
