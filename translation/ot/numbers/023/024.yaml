id: NUM.23.24
reference: Numbers 23:24
source:
  edition: WLC
  text: הֶן עָם֙ כְּ/לָבִ֣יא יָק֔וּם וְ/כַ/אֲרִ֖י יִתְנַשָּׂ֑א לֹ֤א יִשְׁכַּב֙ עַד
    יֹ֣אכַל טֶ֔רֶף וְ/דַם חֲלָלִ֖ים יִשְׁתֶּֽה־־־׃
translation:
  text: Look, a people rises like a lioness, and lifts itself up like a lion; it will
    not lie down until it devours the prey and drinks the blood of the slain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a lion.' The Hebrew לָבִיא may be rendered more generally as 'lion,'
      but 'lioness' preserves the lexical distinction from the following אֲרִי ('lion').
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection introducing an emphatic observation. 'Look' is vivid,
    natural modern English and preserves the force without archaic tone.
- source_word: עָם
  chosen: a people
  alternatives:
  - a nation
  lexicon: HALOT
  rationale: Refers to the collective people of Israel. 'A people' preserves the collective
    sense better than 'nation' in this poetic oracle.
- source_word: כְּלָבִיא
  chosen: like a lioness
  alternatives:
  - like a lion
  lexicon: HALOT
  rationale: לָבִיא commonly denotes a lion/lioness, often specifically a lioness
    in poetic usage. 'Lioness' preserves the lexical distinction from the following
    אֲרִי and reflects the Hebrew imagery more precisely.
- source_word: יָקוּם
  chosen: rises
  alternatives:
  - stands up
  - arises
  lexicon: HALOT
  rationale: Qal imperfect of קום in poetic imagery. 'Rises' is concise and natural,
    fitting the simile of a beast rousing itself.
- source_word: וְכַאֲרִי
  chosen: like a lion
  alternatives:
  - like a great lion
  lexicon: HALOT
  rationale: אֲרִי is the common term for lion. Rendering it distinctly from לָבִיא
    as 'lion' preserves the parallelism without overinterpreting age or size.
- source_word: יִתְנַשָּׂא
  chosen: lifts itself up
  alternatives:
  - raises itself
  - exalts itself
  lexicon: HALOT
  rationale: Hitpael/imperfect of נשׂא here conveys rising or bearing oneself up in
    majestic/predatory posture. 'Lifts itself up' fits the animal imagery better than
    the more abstract 'exalts itself.'
- source_word: לֹא יִשְׁכַּב
  chosen: it will not lie down
  alternatives:
  - it does not lie down
  lexicon: HALOT
  rationale: Imperfect in prophetic-poetic discourse naturally carries future sense
    here. 'Lie down' keeps the concrete animal image.
- source_word: עַד יֹאכַל טֶרֶף
  chosen: until it devours the prey
  alternatives:
  - until it eats prey
  - until it consumes the prey
  lexicon: HALOT
  rationale: טֶרֶף is prey, especially torn prey. 'Devours the prey' is idiomatic
    and suitably forceful for the lion metaphor.
- source_word: וְדַם חֲלָלִים יִשְׁתֶּה
  chosen: and drinks the blood of the slain
  alternatives:
  - and drinks the blood of the wounded
  - and drinks the blood of those pierced
  lexicon: HALOT
  rationale: חֲלָלִים in military/violent contexts commonly means slain ones. The
    clause is metaphorical war imagery; 'the slain' is the most natural and contextually
    fitting rendering.
