id: NUM.23.22
reference: Numbers 23:22
source:
  edition: WLC
  text: אֵ֖ל מוֹצִיאָ֣/ם מִ/מִּצְרָ֑יִם כְּ/תוֹעֲפֹ֥ת רְאֵ֖ם לֽ/וֹ׃
translation:
  text: God brings them out of Egypt; he has for him the horns of a wild ox.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he has the strength of a wild ox.' The Hebrew phrase is difficult; the
      translation preserves the animal imagery rather than reducing it to an abstract
      quality.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'unicorn'; more likely a wild ox or aurochs.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵל
  chosen: God
  alternatives:
  - God is
  - Mighty God
  lexicon: HALOT
  rationale: Here אֵל functions as the subject noun, not merely an exclamation. 'God'
    is the plain contextual rendering in Balaam's oracle. 'Mighty God' would over-specify
    the nuance, and supplying 'is' would reflect English syntax rather than a separate
    Hebrew word.
- source_word: מוֹצִיאָם
  chosen: brings them out
  alternatives:
  - brought them out
  - is bringing them out
  lexicon: HALOT
  rationale: The participle of יצא in the Hiphil with 3mp suffix denotes God as the
    one bringing them out. In poetic discourse the participle can have present-like
    or characteristic force; 'brings them out' preserves the vividness better than
    a simple past, while still referring to the exodus event.
- source_word: מִמִּצְרָיִם
  chosen: out of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: With the motion verb, 'out of Egypt' is the most natural English expression
    and makes the exodus imagery explicit.
- source_word: כְּתוֹעֲפֹת
  chosen: has for him the horns of
  alternatives:
  - has the strength of
  - is like the lofty horns of
  lexicon: HALOT
  rationale: תּוֹעֲפֹת is a difficult plural noun often associated with horns, eminence,
    or powerful projections. In this collocation with רְאֵם, many translations render
    the sense as strength. However, the imagery likely refers more concretely to the
    animal's horns or towering might. 'Has for him the horns of' preserves the metaphor
    rather than flattening it to abstract 'strength.'
- source_word: רְאֵם
  chosen: wild ox
  alternatives:
  - ox
  - aurochs
  - unicorn
  lexicon: HALOT
  rationale: The Hebrew term refers to a powerful wild bovine, traditionally identified
    as the wild ox/aurochs, not a mythic unicorn. 'Wild ox' is clear modern English;
    'aurochs' is more precise zoologically but less accessible. 'Unicorn' preserves
    older tradition but does not reflect the likely Hebrew referent.
- source_word: לוֹ
  chosen: for him
  alternatives:
  - for them
  - his
  lexicon: HALOT
  rationale: The suffix is 3ms singular. Retaining 'for him' reflects the Masoretic
    text as given. Because the preceding suffix in 'brings them out' is plural, the
    singular likely refers corporately to Israel or to God in relation to Israel's
    strength; the translation preserves the grammatical form rather than smoothing
    it away.
