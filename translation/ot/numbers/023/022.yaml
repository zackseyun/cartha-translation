theological_decisions:
- issue: Imagery of רְאֵם
  chosen_reading: wild ox
  alternative_readings:
  - aurochs
  - unicorn
  rationale: The verse uses animal-strength imagery, not mythological assertion. Rendering
    רְאֵם as 'wild ox' best fits current lexical understanding and readable modern
    English. The traditional 'unicorn' is preserved only as an alternative because
    it reflects older translation history rather than the probable Hebrew sense.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
