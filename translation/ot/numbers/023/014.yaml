id: NUM.23.14
reference: Numbers 23:14
source:
  edition: WLC
  text: וַ/יִּקָּחֵ֨/הוּ֙ שְׂדֵ֣ה צֹפִ֔ים אֶל רֹ֖אשׁ הַ/פִּסְגָּ֑ה וַ/יִּ֨בֶן֙ שִׁבְעָ֣ה
    מִזְבְּחֹ֔ת וַ/יַּ֛עַל פָּ֥ר וָ/אַ֖יִל בַּ/מִּזְבֵּֽחַ־׃
translation:
  text: So he took him to the Field of Watchers, to the top of Pisgah, and built seven
    altars and offered a bull and a ram on each altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the field of Zophim.' The Hebrew phrase can be understood either as
      a translated place description ('Field of Watchers/Lookouts') or as a preserved
      place name.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקָּחֵהוּ
  chosen: So he took him
  alternatives:
  - And he took him
  - Then he took him
  lexicon: HALOT
  rationale: Wayyiqtol of לקח with 3ms object suffix; narrative sequencing is conveyed
    naturally in English with 'So' here, preserving the action without over-literal
    repetition of 'and.' Subject remains singular from context (Balak taking Balaam).
- source_word: שְׂדֵה צֹפִים
  chosen: the Field of Watchers
  alternatives:
  - the field of Zophim
  - the field of lookouts
  - the field of watchers
  lexicon: HALOT
  rationale: Construct phrase literally means 'field of watchers/lookouts.' Because
    this may function as a place name, capitalization is appropriate. 'Watchers' preserves
    the lexical sense of צפים better than leaving it untranslated, while remaining
    readable. Alternative transliteration is preserved in a footnote.
- source_word: אֶל רֹאשׁ הַפִּסְגָּה
  chosen: to the top of Pisgah
  alternatives:
  - to the summit of Pisgah
  - to the head of the Pisgah
  lexicon: HALOT
  rationale: רֹאשׁ idiomatically means 'top/summit' in geographical contexts. הַפִּסְגָּה
    is best treated as the place name Pisgah rather than a common noun 'the peak'
    here, in line with standard usage in Numbers/Deuteronomy.
- source_word: וַיִּבֶן שִׁבְעָה מִזְבְּחֹת
  chosen: and built seven altars
  lexicon: HALOT
  rationale: Straightforward rendering of the verb בנה with object 'seven altars.'
    No reason to paraphrase.
- source_word: וַיַּעַל
  chosen: and offered
  alternatives:
  - and caused to go up
  - and sacrificed
  lexicon: HALOT
  rationale: עלה in sacrificial context means to offer up. 'Offered' is idiomatic
    and accurate; 'sacrificed' is possible, but 'offered' better preserves the cultic
    action without adding interpretive weight.
- source_word: פָּר וָאַיִל
  chosen: a bull and a ram
  alternatives:
  - one bull and one ram
  lexicon: HALOT
  rationale: Singular nouns following the established ritual pattern in this passage
    indicate one of each sacrificial animal. English indefinite articles communicate
    this naturally.
- source_word: בַּמִּזְבֵּחַ
  chosen: on each altar
  alternatives:
  - on the altar
  lexicon: HALOT
  rationale: Although singular in Hebrew, the phrase follows the building of seven
    altars and in context means the offering was made on each of them. Rendering 'on
    each altar' makes explicit the distributive sense required by the narrative and
    parallel verses.
