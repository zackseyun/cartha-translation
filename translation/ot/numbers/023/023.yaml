theological_decisions:
- issue: Whether the verse denies occult practices within Israel or their efficacy
    against Israel
  chosen_reading: The verse declares that divination and sorcery have no power against
    Jacob/Israel.
  alternative_readings:
  - The verse states that there is no divination or sorcery practiced in Jacob/Israel.
  rationale: In Balaam's oracle, the emphasis is on Israel's blessed status and immunity
    from curse and omen, not primarily on Israel's internal moral condition. Rendering
    ב as 'against' best preserves that theological and literary context.
- issue: Whether מַה פָּעַל אֵל is interrogative or exclamatory
  chosen_reading: 'Exclamatory: ''What God has done!'''
  alternative_readings:
  - 'Interrogative: ''What has God done?'''
  rationale: The oracle climaxes in public acknowledgment of God's mighty action on
    Israel's behalf. An exclamation better fits the celebratory prophetic force of
    the line.
