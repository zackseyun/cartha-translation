id: NUM.23.23
reference: Numbers 23:23
source:
  edition: WLC
  text: כִּ֤י לֹא נַ֨חַשׁ֙ בְּ/יַעֲקֹ֔ב וְ/לֹא קֶ֖סֶם בְּ/יִשְׂרָאֵ֑ל כָּ/עֵ֗ת יֵאָמֵ֤ר
    לְ/יַעֲקֹב֙ וּ/לְ/יִשְׂרָאֵ֔ל מַה פָּ֖עַל אֵֽל־־־׃
translation:
  text: For there is no divination against Jacob, and no sorcery against Israel; at
    the proper time it will be said of Jacob and of Israel, ‘What God has done!’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there is no divination in Jacob, nor sorcery in Israel.' The Hebrew
      preposition can be understood in more than one way, though the context favors
      'against.'
    reason: alternative_reading
  - marker: b
    text: 'Traditional English: ''What God has wrought!'''
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחַשׁ
  chosen: divination
  alternatives:
  - omen
  - augury
  lexicon: HALOT
  rationale: As a noun in this context, it denotes divinatory practice rather than
    the verbal idea 'to practice divination.' 'Divination' is the clearest modern
    English equivalent and pairs well with קֶסֶם.
- source_word: קֶסֶם
  chosen: sorcery
  alternatives:
  - divination
  - soothsaying
  lexicon: HALOT
  rationale: The term refers to occult divinatory practice. Since נַחַשׁ is already
    rendered 'divination,' 'sorcery' preserves a distinction in English while still
    conveying forbidden magical/divinatory activity.
- source_word: בְּיַעֲקֹב / בְּיִשְׂרָאֵל
  chosen: against Jacob / against Israel
  alternatives:
  - in Jacob / in Israel
  - for Jacob / for Israel
  lexicon: HALOT
  rationale: The preposition ב here is idiomatic and contextually means that such
    practices have no power against or concerning Israel, not that they are absent
    merely 'in' Israel. 'Against' best fits Balaam's declaration of Israel's invulnerability
    to occult manipulation.
- source_word: כָּעֵת
  chosen: at the proper time
  alternatives:
  - now
  - at this time
  - in due time
  lexicon: HALOT
  rationale: The phrase can mean 'at this time/now,' but in context it points to the
    fitting or appointed moment when God's action becomes evident and is proclaimed.
    'At the proper time' captures that temporal nuance in natural English.
- source_word: יֵאָמֵר
  chosen: it will be said
  alternatives:
  - one will say
  - it is said
  lexicon: HALOT
  rationale: The Niphal imperfect is naturally rendered as an impersonal passive/future
    here. 'It will be said' preserves the Hebrew form and suits the prophetic tone.
- source_word: לְיַעֲקֹב וּלְיִשְׂרָאֵל
  chosen: of Jacob and of Israel
  alternatives:
  - to Jacob and to Israel
  - concerning Jacob and Israel
  lexicon: HALOT
  rationale: Although ל often means 'to,' the sense here is what will be said with
    reference to Jacob/Israel. 'Of' is idiomatic in English after 'it will be said'
    and avoids implying that Jacob and Israel are merely the audience.
- source_word: מַה פָּעַל אֵל
  chosen: What God has done!
  alternatives:
  - What has God done?
  - What God does
  - What God has wrought
  lexicon: HALOT
  rationale: The phrase is best taken as an exclamatory proclamation of God's mighty
    act, not a question. The perfect verb supports 'has done.' 'What God has done!'
    is clear modern English; the traditional 'wrought' is preserved as an alternative.
- source_word: אֵל
  chosen: God
  alternatives:
  - Mighty God
  - God Almighty
  lexicon: HALOT
  rationale: Here אֵל functions as the common divine title 'God.' Nothing in the immediate
    context requires an expanded rendering such as 'Mighty God.'
