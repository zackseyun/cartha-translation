id: NUM.23.20
reference: Numbers 23:20
source:
  edition: WLC
  text: הִנֵּ֥ה בָרֵ֖ךְ לָקָ֑חְתִּי וּ/בֵרֵ֖ךְ וְ/לֹ֥א אֲשִׁיבֶֽ/נָּה׃
translation:
  text: Look, I have received a command to bless; he has blessed, and I cannot reverse
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I have received to bless'; the Hebrew leaves the object
      of 'received' implicit.
    reason: lexical_alternative
  - marker: b
    text: The subject of 'he has blessed' is implicit in Hebrew; context indicates
      God.
    reason: alternative_reading
  - marker: c
    text: Or 'I cannot revoke it' or 'I cannot turn it back.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the statement with attention-getting force. 'Look' preserves
    the deictic/interjective sense in readable modern English better than the more
    archaic 'Behold.'
- source_word: בָרֵךְ
  chosen: to bless
  alternatives:
  - a blessing
  - bless
  lexicon: HALOT
  rationale: 'Taken as the object/complement of לָקַחְתִּי in context: Balaam has
    received a commission or utterance ''to bless.'' Rendering infinitivally in English
    best captures the Hebrew construction and the immediate context of prophetic speech.'
- source_word: לָקָחְתִּי
  chosen: I have received a command
  alternatives:
  - I have received
  - I took
  - I have taken up
  lexicon: HALOT
  rationale: Though the verb literally means 'I took/received,' in this prophetic
    context the sense is receiving an oracle/charge. 'Received a command' makes explicit
    the implied object from context without overparaphrasing, since the following
    infinitive-like בָרֵךְ specifies the content.
- source_word: וּבֵרֵךְ
  chosen: he has blessed
  alternatives:
  - and he blessed
  - and one has blessed
  lexicon: HALOT
  rationale: 'The perfect 3ms most naturally refers to God in context: Balaam cannot
    overturn the blessing God has pronounced. English present perfect fits the resulting
    state and the logic of the next clause.'
- source_word: וְלֹא
  chosen: and ... cannot
  alternatives:
  - and not
  - but not
  lexicon: HALOT
  rationale: Combined with the following verb, the clause expresses inability to undo
    what has been done. English idiom requires restructuring rather than a wooden
    'and not.'
- source_word: אֲשִׁיבֶנָּה
  chosen: I cannot reverse it
  alternatives:
  - I cannot turn it back
  - I cannot revoke it
  lexicon: HALOT
  rationale: From שוב in Hiphil, 'cause to return/turn back.' Here it means undoing
    or reversing the blessing. 'Reverse it' is clear, natural English and preserves
    the sense of inability to retract or overturn the blessing already given.
