theological_decisions:
- issue: Implicit subject of 'he has blessed'
  chosen_reading: The subject is God, left as 'he' in the main text.
  alternative_readings:
  - An indefinite subject such as 'one has blessed'
  rationale: The immediate context concerns Balaam's inability to curse whom God has
    blessed (cf. surrounding verses). The Hebrew leaves the subject implicit in the
    verb form, but context strongly points to God. Retaining 'he' preserves the Hebrew's
    terseness without importing a noun absent from the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
