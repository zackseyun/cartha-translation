theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's God directly. Per DOCTRINE.md contested terms,
    the default English rendering is 'the LORD'; alternatives are not used in the
    main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Degree of compulsion in Balaam's response
  chosen_reading: Must I not be careful to speak what the LORD puts in my mouth?
  alternative_readings:
  - Should I not speak only what the LORD puts in my mouth?
  - Must I not speak what the LORD puts in my mouth?
  rationale: The Hebrew combines rhetorical obligation (הֲלֹא) with שׁמר + infinitive,
    which suggests careful adherence rather than mere future action. The chosen wording
    preserves Balaam's constrained responsibility without overstating mechanical dictation.
