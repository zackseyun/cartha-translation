id: NUM.23.12
reference: Numbers 23:12
source:
  edition: WLC
  text: וַ/יַּ֖עַן וַ/יֹּאמַ֑ר הֲ/לֹ֗א אֵת֩ אֲשֶׁ֨ר יָשִׂ֤ים יְהוָה֙ בְּ/פִ֔/י אֹת֥/וֹ
    אֶשְׁמֹ֖ר לְ/דַבֵּֽר׃
translation:
  text: He answered and said, “Must I not be careful to speak what the LORD puts in
    my mouth?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Must I not keep/carefully observe to speak what the LORD puts
      in my mouth?'' The verb can emphasize careful adherence in speaking.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: He answered
  alternatives:
  - And he answered
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of ענה introducing Balaam's reply. English
    can omit the conjunction for natural style while preserving the sequence with
    the following verb.
- source_word: וַיֹּאמַר
  chosen: and said
  alternatives:
  - and he said
  lexicon: HALOT
  rationale: Common Hebrew narrative pairing 'answered and said'; retained in English
    because it is idiomatic enough and reflects the source structure.
- source_word: הֲלֹא
  chosen: Must I not
  alternatives:
  - Should I not
  - Is it not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Must I not' best
    conveys Balaam's sense of obligation under divine constraint, fitting the context
    better than the more wooden 'is it not'.
- source_word: אֵת אֲשֶׁר
  chosen: what
  alternatives:
  - that which
  - the thing that
  lexicon: HALOT
  rationale: The object marker plus relative particle functions together to mean 'what/that
    which.' 'What' is the most natural modern English rendering without loss of sense.
- source_word: יָשִׂים
  chosen: puts
  alternatives:
  - places
  - sets
  lexicon: HALOT
  rationale: שׂים with 'in my mouth' is an idiom for giving words to speak. 'Puts'
    is the most idiomatic English equivalent.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: בְּפִי
  chosen: in my mouth
  alternatives:
  - into my mouth
  lexicon: HALOT
  rationale: Literal rendering preserves the Hebrew idiom of divinely given speech
    and remains clear in English.
- source_word: אֹתוֹ
  chosen: what
  alternatives:
  - it
  lexicon: HALOT
  rationale: Resumed object pronoun referring back to 'that which/what.' In English
    it is absorbed naturally into 'what ... puts ...' rather than rendered separately
    as 'it.'
- source_word: אֶשְׁמֹר
  chosen: be careful
  alternatives:
  - keep
  - watch carefully
  - take care
  lexicon: HALOT
  rationale: שׁמר plus infinitive here expresses careful observance or strictness
    in speaking exactly what is given. 'Be careful' communicates the sense better
    than the overly literal 'keep'.
- source_word: לְדַבֵּר
  chosen: to speak
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Infinitive complement to אֶשְׁמֹר. 'To speak' matches the verbal idea
    and fits the idiom of uttering divinely given words.
