theological_decisions:
- issue: Rendering יְשָׁרִים
  chosen_reading: the upright
  alternative_readings:
  - the righteous
  rationale: The verse expresses Balaam's wish to share the blessed end of God's covenant
    people. 'The upright' follows the lexical sense of ישר and avoids importing a
    more systematized theological category than the Hebrew explicitly states, while
    still allowing the moral-religious force of the term.
  doctrine_reference: Translation philosophy §1, §3
- issue: Interpretation of רֹבַע יִשְׂרָאֵל
  chosen_reading: the fourth part of Israel
  alternative_readings:
  - the multitude of Israel
  - the quarters of Israel
  rationale: A more literal rendering preserves the Hebrew image and avoids resolving
    the exact referent beyond what the text states. The phrase likely means that even
    one quarter of Israel is beyond numbering, but that interpretive conclusion is
    left implicit rather than imported into the main text.
  doctrine_reference: Translation philosophy §1, §3
