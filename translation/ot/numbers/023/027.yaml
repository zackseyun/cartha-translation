theological_decisions:
- issue: Reference of הָאֱלֹהִים in Balak's speech
  chosen_reading: God refers to the true God whom Balaam consults, not a generic deity.
  alternative_readings:
  - the god
  - a god
  rationale: In the immediate narrative Balaam is constrained by Israel's God, and
    Balak hopes a change of place may alter what God permits. Rendering simply 'God'
    best reflects the narrative referent without importing polytheistic ambiguity
    into the main text.
