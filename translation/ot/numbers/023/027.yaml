id: NUM.23.27
reference: Numbers 23:27
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר בָּלָק֙ אֶל בִּלְעָ֔ם לְכָ/ה נָּא֙ אֶקָּ֣חֲ/ךָ֔ אֶל מָק֖וֹם אַחֵ֑ר
    אוּלַ֤י יִישַׁר֙ בְּ/עֵינֵ֣י הָ/אֱלֹהִ֔ים וְ/קַבֹּ֥ת/וֹ לִ֖/י מִ/שָּֽׁם־־־׃
translation:
  text: Then Balak said to Balaam, “Please come, let me take you to another place.
    Perhaps it will seem right in the eyes of God, and you shall curse him for me
    from there.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'it will be pleasing in the eyes of God.' The Hebrew idiom means 'be
      right' or 'be pleasing' in someone's sight.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְכָה נָּא
  chosen: Please come
  alternatives:
  - Come, please
  - Please go
  lexicon: HALOT
  rationale: לְכָה is an imperative of הלך used idiomatically as an invitation or
    summons; with נָּא it softens the command into a polite entreaty. 'Please come'
    is natural English in this dialogue context.
- source_word: אֶקָּחֲךָ
  chosen: let me take you
  alternatives:
  - I will take you
  - let me bring you
  lexicon: HALOT
  rationale: Though formally first person singular imperfect, in context after the
    invitation it functions volitionally. 'Let me take you' captures the cohortative-like
    sense in idiomatic English.
- source_word: מָקוֹם אַחֵר
  chosen: another place
  alternatives:
  - a different place
  - another location
  lexicon: HALOT
  rationale: A straightforward rendering preserving the concrete sense of a changed
    vantage point.
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - Maybe
  - It may be that
  lexicon: HALOT
  rationale: Introduces Balak's hope without overstating certainty.
- source_word: יִישַׁר בְּעֵינֵי הָאֱלֹהִים
  chosen: it will seem right in the eyes of God
  alternatives:
  - it will be pleasing in the eyes of God
  - it will be right before God
  lexicon: HALOT
  rationale: The idiom ישר בעיני means 'be right/pleasing in the eyes of.' 'Seem right
    in the eyes of God' preserves the Hebrew idiom while remaining readable. The impersonal
    'it' is supplied in English because the Hebrew verb lacks an explicit subject
    and refers to the proposed course of action.
- source_word: הָאֱלֹהִים
  chosen: God
  alternatives:
  - the god
  - God/gods
  lexicon: HALOT
  rationale: With the article, אֱלֹהִים can be rendered 'the God,' but in English
    direct speech referring to Israel's deity is most naturally 'God.' The context
    is Balaam's interaction with the true God, not a generic deity.
- source_word: וְקַבֹּתוֹ לִי
  chosen: and you shall curse him for me
  alternatives:
  - that you may curse him for me
  - and curse him for me
  lexicon: HALOT
  rationale: From קבב, 'to curse.' The prefixed conjunction plus imperative/jussive-like
    form continues Balak's request. 'You shall curse him for me' reflects the force
    of the request in smooth English; the object suffix refers to Israel collectively
    through a singular pronoun, as often in English for a people conceived as one
    entity.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - there
  - from that place
  lexicon: HALOT
  rationale: Preserves the spatial sense tied to the new location.
