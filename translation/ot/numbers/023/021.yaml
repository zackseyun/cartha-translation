theological_decisions:
- issue: Whether the verse states that Israel is morally sinless or that no harmful
    omen/trouble is prevailing against Israel
  chosen_reading: The verse speaks of God not regarding trouble/misery in Jacob-Israel,
    rather than declaring absolute absence of sin in the nation.
  alternative_readings:
  - He sees no iniquity in Jacob, nor perversity in Israel
  rationale: Given the semantic range of אָוֶן and עָמָל, and the broader Pentateuchal
    context where Israel's sin is plainly acknowledged, the main text should not imply
    a doctrinally loaded claim that Israel is without sin. The blessing emphasizes
    God's favorable stance and protective presence. The moral reading is lexically
    possible and worth preserving in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition
- issue: Whether 'king' refers to God himself or to royal acclamation generally
  chosen_reading: The phrase is left as 'the shout of a king' without explicitly identifying
    the king.
  alternative_readings:
  - the shout for their king
  - the acclaim of the divine King
  rationale: The Hebrew permits a royal acclamation associated with God's presence,
    but does not explicitly identify the referent. The translation preserves the ambiguity
    rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it
