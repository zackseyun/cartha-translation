id: NUM.23.21
reference: Numbers 23:21
source:
  edition: WLC
  text: לֹֽא הִבִּ֥יט אָ֨וֶן֙ בְּ/יַעֲקֹ֔ב וְ/לֹא רָאָ֥ה עָמָ֖ל בְּ/יִשְׂרָאֵ֑ל יְהוָ֤ה
    אֱלֹהָי/ו֙ עִמּ֔/וֹ וּ/תְרוּעַ֥ת מֶ֖לֶךְ בּֽ/וֹ־־׃
translation:
  text: He has not looked on trouble in Jacob, nor has he seen misery in Israel. The
    LORD his God is with him, and the shout of a king is among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He has not seen iniquity in Jacob, nor has he seen trouble/perversity
      in Israel.' The Hebrew terms can be read in a moral sense ('iniquity') or in
      the sense of trouble or affliction.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'in him'; Israel is spoken of as a collective singular earlier in
      the verse.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'the shout of a king' may refer to royal acclamation in Israel's
      midst, possibly alluding to the LORD's kingly presence.
    reason: alternative_reading
lexical_decisions:
- source_word: הִבִּיט
  chosen: has not looked on
  alternatives:
  - has not beheld
  - does not see
  lexicon: HALOT
  rationale: The verb נבט commonly denotes looking attentively or regarding. 'Has
    not looked on' preserves the concrete visual metaphor while fitting the perfect
    aspect in context.
- source_word: אָוֶן
  chosen: trouble
  alternatives:
  - iniquity
  - wickedness
  - sorrow
  lexicon: HALOT
  rationale: אָוֶן can denote wickedness, trouble, or misfortune depending on context.
    Here, paired with עָמָל and in Balaam's blessing over Israel, the sense is best
    taken as harmful trouble or affliction rather than moral evil that God ignores.
    This avoids importing theologically problematic sinlessness into the verse while
    staying within the word's semantic range.
- source_word: רָאָה
  chosen: has he seen
  alternatives:
  - has he regarded
  - does he see
  lexicon: HALOT
  rationale: A straightforward rendering of ראה. The perfect is carried into idiomatic
    English as 'has he seen' in parallel with the previous clause.
- source_word: עָמָל
  chosen: misery
  alternatives:
  - trouble
  - toil
  - affliction
  lexicon: HALOT
  rationale: עָמָל often denotes trouble, toil, or misery. 'Misery' differentiates
    it from אָוֶן while preserving the parallel sense of affliction or hardship.
- source_word: בְּיַעֲקֹב
  chosen: in Jacob
  alternatives:
  - against Jacob
  - among Jacob
  lexicon: HALOT
  rationale: The preposition ב here is best rendered locatively, referring to Jacob/Israel
    as the covenant people. 'In Jacob' preserves the Hebrew parallelism.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - against Israel
  - among Israel
  lexicon: HALOT
  rationale: As with the previous phrase, the preposition is best taken locatively
    in the poetic parallelism.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: אֱלֹהָיו
  chosen: his God
  alternatives:
  - their God
  lexicon: HALOT
  rationale: The suffix is singular masculine. Since the verse speaks of Jacob/Israel
    collectively under singular personification, 'his God' preserves the grammar.
- source_word: עִמּוֹ
  chosen: is with him
  alternatives:
  - is with them
  lexicon: HALOT
  rationale: The singular suffix matches the singular personification of Israel/Jacob
    in the immediate clause. English keeps the singular here for fidelity.
- source_word: תְרוּעַת
  chosen: the shout
  alternatives:
  - the joyful shout
  - the battle cry
  - the acclamation
  lexicon: HALOT
  rationale: תְּרוּעָה can denote a loud cry of joy, alarm, or acclamation. In connection
    with 'king,' 'shout' is broad enough to preserve the royal-acclamatory sense without
    over-specifying.
- source_word: מֶלֶךְ
  chosen: a king
  alternatives:
  - the King
  lexicon: HALOT
  rationale: The noun lacks the article. 'A king' is the most direct rendering, though
    in context it may refer to the divine kingly presence.
- source_word: בּוֹ
  chosen: is among them
  alternatives:
  - is in him
  - is among him
  lexicon: HALOT
  rationale: Formally the suffix is singular ('in him'), referring back to Israel
    as a collective singular. In English, because the phrase refers to the people
    corporately, 'among them' communicates the sense more naturally while the preceding
    singulars preserve the personification.
