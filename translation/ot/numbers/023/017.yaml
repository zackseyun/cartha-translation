id: NUM.23.17
reference: Numbers 23:17
source:
  edition: WLC
  text: וַ/יָּבֹ֣א אֵלָ֗י/ו וְ/הִנּ֤/וֹ נִצָּב֙ עַל עֹ֣לָת֔/וֹ וְ/שָׂרֵ֥י מוֹאָ֖ב אִתּ֑/וֹ וַ/יֹּ֤אמֶר ל/וֹ֙ בָּלָ֔ק מַה דִּבֶּ֖ר יְהוָֽה־־׃
translation:
  text: He came to him, and behold, he was standing by his burnt offering, with the princes of Moab with him. And Balak said to him, “What has Yahweh spoken?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the officials of Moab' for 'the princes of Moab.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא אֵלָיו
  chosen: He came to him
  alternatives:
  - He returned to him
  lexicon: HALOT
  rationale: The verb בוא normally means 'come' or 'enter.' In context Balaam is returning from meeting the LORD, but the Hebrew itself simply says 'came to him,' so the more direct rendering is preferred over the more interpretive 'returned.'
- source_word: וְהִנּוֹ
  chosen: and behold
  alternatives:
  - and there he was
  - and look
  lexicon: HALOT
  rationale: הִנֵּה/וְהִנּוֹ is a discourse particle drawing attention to what follows. 'Behold' preserves the vividness and abruptness of the Hebrew better than a flatter rendering.
- source_word: נִצָּב
  chosen: was standing
  alternatives:
  - stood
  - was stationed
  lexicon: HALOT
  rationale: The participle conveys a stative/imperfective sense. 'Was standing' reflects the ongoing posture at the moment Balaam arrived.
- source_word: עַל עֹלָתוֹ
  chosen: beside his burnt offering
  alternatives:
  - by his burnt offering
  - over his burnt offering
  - at his burnt offering
  lexicon: HALOT
  rationale: עַל can mean 'on, over, by, beside' depending on context. Since Balak is physically present in relation to the sacrifice, 'beside' gives natural English while preserving the spatial sense without implying he is literally on top of it.
- source_word: עֹלָתוֹ
  chosen: his burnt offering
  alternatives:
  - his whole burnt offering
  lexicon: HALOT
  rationale: עֹלָה is the standard sacrificial term for a burnt offering. 'Burnt offering' is the established and accurate English equivalent.
- source_word: וְשָׂרֵי מוֹאָב אִתּוֹ
  chosen: with the princes of Moab with him
  alternatives:
  - and the officials of Moab were with him
  - with the leaders of Moab with him
  lexicon: HALOT
  rationale: שָׂרִים denotes rulers, princes, officials, or leaders. 'Princes' is retained because it is a common rendering and fits the courtly setting, though 'officials' is possible. The repetition of 'with' reflects the Hebrew אִתּוֹ, though the phrase is slightly smoothed in English syntax.
- source_word: וַיֹּאמֶר לוֹ בָּלָק
  chosen: And Balak said to him
  alternatives:
  - Then Balak said to him
  lexicon: HALOT
  rationale: A straightforward narrative wayyiqtol. 'And' preserves the Hebrew narrative flow.
- source_word: מַה דִּבֶּר
  chosen: What has ... spoken?
  alternatives:
  - What did ... say?
  - What word did ... speak?
  lexicon: HALOT
  rationale: דבר means 'speak/say.' 'Spoken' keeps the verbal connection to divine speech and sounds natural in English with the present-result nuance of the Hebrew perfect in direct discourse.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
