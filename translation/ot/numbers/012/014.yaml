id: NUM.12.14
reference: Numbers 12:14
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה וְ/אָבִ֨י/הָ֙ יָרֹ֤ק יָרַק֙ בְּ/פָנֶ֔י/הָ הֲ/לֹ֥א תִכָּלֵ֖ם שִׁבְעַ֣ת יָמִ֑ים תִּסָּגֵ֞ר שִׁבְעַ֤ת יָמִים֙ מִ/ח֣וּץ לַֽ/מַּחֲנֶ֔ה וְ/אַחַ֖ר תֵּאָסֵֽף־׃
translation:
  text: And Yahweh said to Moses, “If her father had spit in her face, would she not be disgraced for seven days? Let her be shut up outside the camp for seven days, and afterward she may be brought back in.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'would she not be ashamed for seven days?'
    reason: lexical_alternative
  - marker: b
    text: Or 'afterward she may be gathered in again.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יָרֹק יָרַק
  chosen: had spit
  alternatives:
  - were to spit
  - spit indeed
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. In English, 'had spit' in this conditional clause naturally conveys the hypothetical force without awkward literal repetition.
- source_word: בְּפָנֶיהָ
  chosen: in her face
  alternatives:
  - before her
  - on her face
  lexicon: HALOT
  rationale: In this idiom with spitting, 'in her face' is the most natural and forceful English equivalent, conveying public insult and shame.
- source_word: תִכָּלֵם
  chosen: would she not be disgraced
  alternatives:
  - would she not be ashamed
  - would she not be humiliated
  lexicon: HALOT
  rationale: The Niphal of כלם denotes being put to shame or disgraced. 'Disgraced' fits the social and punitive context better than the more internal 'ashamed,' while preserving the rhetorical question.
- source_word: תִּסָּגֵר
  chosen: Let her be shut up
  alternatives:
  - Let her be confined
  - Let her be isolated
  lexicon: HALOT
  rationale: The Niphal/passive sense indicates being shut away or confined. 'Shut up' preserves the concrete exclusion language of the Hebrew and suits the camp-purity setting.
- source_word: מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - outside the encampment
  lexicon: HALOT
  rationale: A straightforward formal rendering of the exclusion location; 'camp' is idiomatic and contextually clear.
- source_word: תֵּאָסֵף
  chosen: she may be received back
  alternatives:
  - she may be gathered in again
  - she may return
  lexicon: HALOT
  rationale: The Niphal/passive of אסף here refers to being brought back into the community after exclusion. 'Received back' makes the communal restoration explicit without over-paraphrasing.
