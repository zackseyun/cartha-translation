theological_decisions:
- issue: Nature of the father's-spitting clause
  chosen_reading: A hypothetical analogy for shame and exclusion
  alternative_readings:
  - A literal recollection of an actual event
  rationale: The Hebrew construction presents a rhetorical conditional used by the
    LORD to justify Miriam's period of exclusion. The translation preserves the analogy
    without importing additional doctrinal or symbolic meaning.
