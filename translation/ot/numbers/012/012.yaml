theological_decisions:
- issue: Referent of the feminine singular
  chosen_reading: '''her'' refers to Miriam'
  rationale: The immediate context is Aaron's plea concerning Miriam after her affliction.
    Making the pronoun explicit in English clarifies the referent without adding doctrinal
    content.
