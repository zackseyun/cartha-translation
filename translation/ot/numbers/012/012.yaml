id: NUM.12.12
reference: Numbers 12:12
source:
  edition: WLC
  text: אַל נָ֥א תְהִ֖י כַּ/מֵּ֑ת אֲשֶׁ֤ר בְּ/צֵאת/וֹ֙ מֵ/רֶ֣חֶם אִמּ֔/וֹ וַ/יֵּאָכֵ֖ל
    חֲצִ֥י בְשָׂרֽ/וֹ־׃
translation:
  text: Please, do not let her be like one dead, whose flesh is half consumed when
    he comes out of his mother’s womb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'like a stillborn child, whose flesh is half consumed when he comes
      out of his mother’s womb.' The Hebrew compares her to one dead at birth; some
      translations make the stillbirth imagery explicit in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל נָא
  chosen: Please, do not
  alternatives:
  - Oh, do not
  - Let not, please
  lexicon: HALOT
  rationale: אַל marks prohibition ('do not'), and נָא adds entreaty/politeness ('please').
    The combination is best represented as an urgent plea rather than a bare negative
    command.
- source_word: תְהִי
  chosen: let her be
  alternatives:
  - may she be
  - be
  lexicon: HALOT
  rationale: 'Jussive/imperfect 3fs of היה in context after אַל expresses a negative
    wish/request: ''do not let her be.'' The feminine singular refers to Miriam.'
- source_word: כַּמֵּת
  chosen: like one dead
  alternatives:
  - as dead
  - like a stillborn child
  lexicon: HALOT
  rationale: The phrase literally means 'like the dead/like one dead.' 'Like one dead'
    preserves the comparison without prematurely specifying the image; the following
    relative clause supplies the vivid description.
- source_word: אֲשֶׁר
  chosen: whose
  alternatives:
  - who
  - which
  lexicon: HALOT
  rationale: The relative particle introduces a descriptive clause modifying 'one
    dead.' In English, 'whose' naturally links the following possessive description
    ('whose flesh...').
- source_word: בְּצֵאתוֹ מֵרֶחֶם אִמּוֹ
  chosen: when he comes out of his mother’s womb
  alternatives:
  - at his birth from his mother's womb
  - when he is born from his mother's womb
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב conveys temporal sense, 'when/at
    the time of his coming out.' 'Comes out of his mother's womb' is vivid and close
    to the Hebrew.
- source_word: וַיֵּאָכֵל
  chosen: is half consumed
  alternatives:
  - is eaten up
  - has been consumed
  lexicon: HALOT
  rationale: Although formally a waw-consecutive form, in this simile it describes
    resultant condition. English idiom prefers a stative/passive sense. 'Consumed'
    fits the image of diseased or decayed flesh better than the overly literal 'eaten.'
- source_word: חֲצִי בְשָׂרוֹ
  chosen: his flesh is half consumed
  alternatives:
  - half his flesh is consumed
  - half of his body is consumed
  lexicon: HALOT
  rationale: בשר here is literal 'flesh,' not metaphorical 'body' or 'sinful nature.'
    Fronting 'his flesh' yields natural English while preserving the grotesque physical
    image.
