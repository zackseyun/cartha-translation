- issue: Rendering of אָדָם in a generic comparative statement
  chosen_reading: man
  alternative_readings:
  - person
  - human being
  rationale: Per DOCTRINE.md, אָדָם is rendered 'man' or 'humankind' depending on
    context, with gender-accurate translation preferred over gender-neutral flattening.
    Here the singular generic comparative construction supports 'any man,' while the
    footnote preserves the inclusive sense for modern readers.
