id: NUM.12.3
reference: Numbers 12:3
source:
  edition: WLC
  text: וְ/הָ/אִ֥ישׁ מֹשֶׁ֖ה ענו מְאֹ֑ד מִ/כֹּל֙ הָֽ/אָדָ֔ם אֲשֶׁ֖ר עַל פְּנֵ֥י הָ/אֲדָמָֽה־׃ס
translation:
  text: Now the man Moses was very humble, more than any man who was on the face of
    the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'more than any person'; Hebrew 'man' here has a generic sense referring
      to human beings generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הָ/אִישׁ
  chosen: Now the man
  alternatives:
  - And the man
  - Now the man
  lexicon: HALOT
  rationale: The conjunction waw here is rendered discourse-initially as 'Now' rather
    than a bare 'And' for readable modern English, while preserving the sense of narrative
    continuation. הָאִישׁ is literally 'the man'; retaining it reflects the Hebrew
    wording rather than omitting it as redundant before the proper name.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: ענו
  chosen: humble
  alternatives:
  - meek
  - afflicted
  - lowly
  lexicon: HALOT
  rationale: The adjective here most naturally describes Moses' disposition as 'humble.'
    'Meek' is traditional and possible, but in contemporary English can suggest weakness
    or passivity more than the Hebrew warrants. 'Afflicted' is a possible semantic
    association of the root in other forms, but does not fit this predicative description
    as well in context.
- source_word: מְאֹד
  chosen: very
  alternatives:
  - exceedingly
  lexicon: HALOT
  rationale: Standard adverbial intensifier. 'Very' is natural modern English and
    adequately conveys the force without archaism.
- source_word: מִ/כֹּל
  chosen: more than any
  alternatives:
  - above all
  - more than all
  lexicon: HALOT
  rationale: The comparative construction with מן plus כֹּל is best expressed idiomatically
    in English as 'more than any,' introducing the comparison that follows.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - person
  - human being
  - humankind
  lexicon: HALOT
  rationale: Following the doctrine's gender-accurate principle for אָדָם, 'man' is
    retained here because the phrase is singular and generic/comparative ('more than
    any man'). 'Person' is possible but less formally aligned with the Hebrew; 'humankind'
    would not fit the singular comparative construction as naturally.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative pronoun referring to persons; 'who' is the most natural English
    rendering.
- source_word: עַל פְּנֵי הָאֲדָמָה
  chosen: on the face of the earth
  alternatives:
  - on the surface of the ground
  - upon the earth
  lexicon: HALOT
  rationale: This is a common Hebrew idiom. 'On the face of the earth' preserves the
    imagery and remains understandable in English. 'Upon the earth' is smoother but
    loses the Hebrew idiom's texture.
