theological_decisions:
- issue: Rendering אֲדֹנִי when addressed to Moses
  chosen_reading: my lord
  alternative_readings:
  - sir
  rationale: The term is a human honorific here, not a divine title. 'My lord' preserves
    the social hierarchy and urgency of Aaron's appeal better than the flatter 'sir.'
  doctrine_reference: Translate titles; transliterate names.
