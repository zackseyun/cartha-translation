id: NUM.12.7
reference: Numbers 12:7
source:
  edition: WLC
  text: לֹא כֵ֖ן עַבְדִּ֣/י מֹשֶׁ֑ה בְּ/כָל בֵּיתִ֖/י נֶאֱמָ֥ן הֽוּא־־׃
translation:
  text: Not so with my servant Moses; he is faithful in all my house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in all my household.' The Hebrew 'house' can refer to a household or
      domain, not only a physical structure.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כֵן
  chosen: Not so
  alternatives:
  - It is not so
  - Not like this
  lexicon: HALOT
  rationale: The idiom לֹא כֵן functions as a strong corrective contrast to the preceding
    statement. 'Not so' is concise, natural English and preserves the emphatic rebuttal.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עֶבֶד can denote 'slave' or 'servant,' here it is an honorific
    designation for Moses in relation to God rather than emphasizing bonded status.
    Per translation philosophy, 'slave' is used where bonded nature is salient; here
    'servant' better fits the covenantal/official sense.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Personal name transliterated by standard English convention.
- source_word: בְּכָל בֵּיתִי
  chosen: in all my house
  alternatives:
  - over all my house
  - throughout my house
  lexicon: HALOT
  rationale: ב + כָּל + בַּיִת is most naturally rendered 'in all my house.' 'House'
    here likely carries the extended sense of household/domain, but the literal image
    should be preserved in the main text. 'Over all my house' is interpretive and
    less directly supported by the preposition.
- source_word: נֶאֱמָן
  chosen: faithful
  alternatives:
  - trustworthy
  - reliable
  lexicon: HALOT
  rationale: נֶאֱמָן denotes reliability and trustworthiness. 'Faithful' is the most
    established and contextually fitting rendering, especially in a statement about
    Moses' status before God.
- source_word: הוּא
  chosen: he is
  alternatives:
  - he
  lexicon: HALOT
  rationale: The independent pronoun supplies the subject and supports the English
    copular expression. 'He is' yields clear, idiomatic English.
