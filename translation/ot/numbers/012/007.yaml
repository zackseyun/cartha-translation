theological_decisions:
- issue: Sense of 'my house' in relation to Moses' role
  chosen_reading: Retain the metaphor 'my house' rather than interpret it as 'household'
    or 'people' in the main text.
  alternative_readings:
  - in all my household
  - among all my people
  rationale: The Hebrew metaphor likely refers to God's household/domain, including
    his covenant community, but the text itself uses 'house.' Preserving the metaphor
    maintains intertextual resonance (e.g., later biblical reflection on Moses in
    God's house) without over-resolving the image.
  doctrine_reference: Translation philosophy §3, §5
