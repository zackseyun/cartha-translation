id: NUM.12.5
reference: Numbers 12:5
source:
  edition: WLC
  text: וַ/יֵּ֤רֶד יְהוָה֙ בְּ/עַמּ֣וּד עָנָ֔ן וַֽ/יַּעֲמֹ֖ד פֶּ֣תַח הָ/אֹ֑הֶל וַ/יִּקְרָא֙
    אַהֲרֹ֣ן וּ/מִרְיָ֔ם וַ/יֵּצְא֖וּ שְׁנֵי/הֶֽם׃
translation:
  text: Then the LORD came down in a pillar of cloud and stood at the entrance of
    the tent, and he called Aaron and Miriam, and both of them came forward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the two of them went out' / 'both of them came out.' The Hebrew verb
      is literally 'went out,' but here it likely means they stepped forward in response
      to the LORD's call.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the tent'; context refers to the tent of meeting.
    reason: cross_reference
lexical_decisions:
- source_word: וַיֵּרֶד
  chosen: came down
  alternatives:
  - descended
  lexicon: HALOT
  rationale: The verb ירד literally means 'go down/descend.' 'Came down' is natural
    modern English and preserves the anthropomorphic movement language without overformal
    stiffness.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: בְּעַמּוּד עָנָן
  chosen: in a pillar of cloud
  alternatives:
  - in the pillar of cloud
  - with a pillar of cloud
  lexicon: HALOT
  rationale: The phrase denotes the mode/manifestation in which the LORD came down.
    'In a pillar of cloud' is the most straightforward rendering. The anarthrous construction
    does not require 'the' here in English, though the referent is familiar from context.
- source_word: וַיַּעֲמֹד
  chosen: stood
  alternatives:
  - took his stand
  lexicon: HALOT
  rationale: A simple past 'stood' best matches the narrative sequence and keeps the
    wording readable.
- source_word: פֶּתַח הָאֹהֶל
  chosen: at the entrance of the tent
  alternatives:
  - at the doorway of the tent
  - at the entrance of the Tent of Meeting
  lexicon: HALOT
  rationale: פתח is 'opening/entrance/doorway.' 'Entrance' is clear modern English.
    אֹהֶל by itself is 'tent'; although contextually this is the tent of meeting,
    the Hebrew here does not include the fuller title, so the main text keeps the
    simpler 'the tent.'
- source_word: וַיִּקְרָא
  chosen: he called
  alternatives:
  - he summoned
  lexicon: HALOT
  rationale: קרא commonly means 'call.' 'Summoned' is possible in context, but 'called'
    is closer to the lexical form and sufficient.
- source_word: אַהֲרֹן וּמִרְיָם
  chosen: Aaron and Miriam
  lexicon: HALOT
  rationale: Standard English transliterations of the personal names.
- source_word: וַיֵּצְאוּ שְׁנֵיהֶם
  chosen: both of them came forward
  alternatives:
  - the two of them went out
  - both of them came out
  lexicon: HALOT
  rationale: יצא literally means 'go out/come out.' In context, since they are being
    called to present themselves before the LORD at the tent entrance, 'came forward'
    communicates the movement idiomatically in English. The dual expression שְׁנֵיהֶם
    is preserved by 'both of them.'
