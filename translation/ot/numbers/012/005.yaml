theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and avoids making
    a denominational or stylistic statement beyond the source text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropomorphic descent of the LORD
  chosen_reading: Retain the concrete language 'came down'
  alternative_readings:
  - Use a less concrete paraphrase such as 'appeared'
  rationale: The Hebrew explicitly uses descent language. Preserving it maintains
    the narrative's theophanic imagery without forcing a theological explanation of
    divine omnipresence.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
