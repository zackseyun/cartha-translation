theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether ב with דבר here indicates recipient ('to') or mediating agent ('through')
  chosen_reading: through Moses / through us
  alternative_readings:
  - to Moses / to us
  rationale: In context the dispute concerns prophetic status and revelatory mediation,
    not merely private reception of speech. Using 'through' preserves the theological
    point that Miriam and Aaron claim revelatory authority alongside Moses.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
