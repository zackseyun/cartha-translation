id: NUM.12.2
reference: Numbers 12:2
source:
  edition: WLC
  text: וַ/יֹּאמְר֗וּ הֲ/רַ֤ק אַךְ בְּ/מֹשֶׁה֙ דִּבֶּ֣ר יְהוָ֔ה הֲ/לֹ֖א גַּם בָּ֣/נוּ
    דִבֵּ֑ר וַ/יִּשְׁמַ֖ע יְהוָֽה־־׃
translation:
  text: And they said, “Has the LORD indeed spoken only through Moses? Has he not
    also spoken through us?” And the LORD heard it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Has the LORD indeed spoken only to Moses? Has he not also spoken to
      us?' The Hebrew preposition can be understood either as marking the recipient
      or the instrument of divine speech; the main text chooses 'through' because
      the context concerns prophetic authority.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: And they said
  alternatives:
  - So they said
  - Then they said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introducing direct speech; 'And they said' preserves
    the narrative sequence naturally in English.
- source_word: הֲרַק אַךְ
  chosen: Has ... indeed ... only
  alternatives:
  - Has ... really ... only
  - Is it only ... that
  lexicon: HALOT
  rationale: The interrogative plus restrictive particles intensify the challenge.
    Rendering with 'indeed' and 'only' captures both the rhetorical question and exclusivity
    without over-paraphrase.
- source_word: בְּמֹשֶׁה
  chosen: through Moses
  alternatives:
  - to Moses
  - with Moses
  - by Moses
  lexicon: HALOT
  rationale: With דבר in prophetic-revelatory contexts, ב often marks the intermediary
    or instrumentality of speech. 'Through Moses' best reflects the claim about Moses
    as the channel of divine revelation.
- source_word: דִּבֶּר יְהוָה
  chosen: the LORD ... spoken
  alternatives:
  - the LORD ... said
  - the LORD ... spoken by
  lexicon: HALOT
  rationale: דבר is broader than 'say' and commonly used for divine speech. 'Spoken'
    fits the perfect verb and the revelatory context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD'.
- source_word: הֲלֹא גַּם בָּנוּ דִבֵּר
  chosen: Has he not also spoken through us?
  alternatives:
  - Has he not also spoken to us?
  - Did he not also speak through us?
  lexicon: HALOT
  rationale: The same construction as the first clause favors the same English preposition
    for consistency. Miriam and Aaron are asserting that they too are channels of
    divine speech, not merely recipients.
- source_word: וַיִּשְׁמַע יְהוָה
  chosen: And the LORD heard it
  alternatives:
  - And the LORD heard
  - Now the LORD heard
  lexicon: HALOT
  rationale: English idiom normally supplies the object. 'It' makes explicit that
    the LORD heard their complaint, while remaining faithful to the implied object
    in Hebrew.
