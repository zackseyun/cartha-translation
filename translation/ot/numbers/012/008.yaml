theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the
    stated doctrine and translation policy. This also aligns with longstanding English
    Bible convention while preserving reverential usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Description of Moses' unique revelation
  chosen_reading: the form of the LORD
  alternative_readings:
  - the likeness of the LORD
  - the appearance of the LORD
  rationale: The verse affirms a uniquely direct mode of revelation to Moses without
    specifying a full metaphysical explanation of divine visibility. 'Form' preserves
    the text's claim while avoiding interpretive overreach about the nature of the
    manifestation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
