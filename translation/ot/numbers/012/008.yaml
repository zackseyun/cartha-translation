id: NUM.12.8
reference: Numbers 12:8
source:
  edition: WLC
  text: פֶּ֣ה אֶל פֶּ֞ה אֲדַבֶּר בּ֗/וֹ וּ/מַרְאֶה֙ וְ/לֹ֣א בְ/חִידֹ֔ת וּ/תְמֻנַ֥ת
    יְהוָ֖ה יַבִּ֑יט וּ/מַדּ֨וּעַ֙ לֹ֣א יְרֵאתֶ֔ם לְ/דַבֵּ֖ר בְּ/עַבְדִּ֥/י בְ/מֹשֶֽׁה־־׃
translation:
  text: Mouth to mouth I speak with him, plainly and not in riddles; and he beholds
    the form of the LORD. So why were you not afraid to speak against my servant,
    against Moses?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'face to face.' The Hebrew is literally 'mouth to mouth,' emphasizing
      direct speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'the likeness of the LORD' or 'the appearance of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּה אֶל פֶּה
  chosen: Mouth to mouth
  alternatives:
  - face to face
  - directly
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'mouth to mouth,' emphasizing direct, unmediated
    speech. 'Face to face' is a common interpretive rendering, but here the source
    text specifically uses 'mouth,' so the more literal expression is preserved in
    English.
- source_word: אֲדַבֶּר בּוֹ
  chosen: I speak with him
  alternatives:
  - I speak to him
  lexicon: HALOT
  rationale: With דבר plus ב, the sense is speaking with someone/in converse with
    someone. 'With him' better reflects the preposition than a simple 'to him,' while
    remaining natural English.
- source_word: וּמַרְאֶה
  chosen: plainly
  alternatives:
  - in appearance
  - visibly
  - clearly
  lexicon: HALOT
  rationale: In this context, paired with 'not in riddles,' the noun conveys clear
    manifestation or plainness of communication rather than a separate object ('appearance').
    Rendering it adverbially as 'plainly' best captures the contrast in idiomatic
    English.
- source_word: וְלֹא בְחִידֹת
  chosen: and not in riddles
  alternatives:
  - and not in dark sayings
  - and not in enigmas
  lexicon: HALOT
  rationale: חִידוֹת refers to riddles, enigmatic sayings, or dark speech. 'Riddles'
    is clear modern English and preserves the contrast with direct revelation.
- source_word: וּתְמֻנַת יְהוָה
  chosen: the form of the LORD
  alternatives:
  - the likeness of the LORD
  - the appearance of the LORD
  lexicon: HALOT
  rationale: תְּמוּנָה denotes form, likeness, or representation. 'Form' is concise
    and preserves the concrete sense without overdefining the mode of divine self-disclosure.
    Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יַבִּיט
  chosen: he beholds
  alternatives:
  - he sees
  - he gazes upon
  - he looks upon
  lexicon: HALOT
  rationale: The Hiphil of נבט here conveys intentional looking or beholding. 'Beholds'
    carries the solemnity of the scene better than the flatter 'sees'.
- source_word: וּמַדּוּעַ
  chosen: So why
  alternatives:
  - And why
  - Why then
  lexicon: HALOT
  rationale: The conjunction plus interrogative introduces an inference from the preceding
    statement. 'So why' communicates the rhetorical force naturally in English.
- source_word: לֹא יְרֵאתֶם
  chosen: were you not afraid
  alternatives:
  - did you not fear
  lexicon: HALOT
  rationale: The verb ירא can mean fear, be afraid, or stand in reverence. In this
    rebuke context, 'were you not afraid' is idiomatic and preserves the force of
    culpable lack of fear.
- source_word: לְדַבֵּר בְּעַבְדִּי בְמֹשֶׁה
  chosen: to speak against my servant, against Moses
  alternatives:
  - to speak against my servant Moses
  - to speak against Moses, my servant
  lexicon: HALOT
  rationale: 'The repeated preposition ב marks the object of hostile speech. ''Speak
    against'' captures the adversative sense in context. Apposition is retained with
    a slight pause for clarity: ''my servant, against Moses.'''
