theological_decisions:
- issue: Identity and ethnic designation of Moses's wife
  chosen_reading: Render כֻשִׁית as 'Cushite' without harmonizing to Zipporah/Midianite
    traditions or importing interpretive conclusions.
  alternative_readings:
  - '''Ethiopian'' as a traditional geographic gloss'
  - Interpretive identification with Zipporah despite the ethnic term
  rationale: The verse itself identifies the woman ethnically/geographically as Cushite.
    The translation should preserve the text's wording and not resolve historical
    or harmonizing debates not explicit in the verse.
  doctrine_reference: Translation philosophy §§1, 3, 5
