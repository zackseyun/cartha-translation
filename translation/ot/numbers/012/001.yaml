id: NUM.12.1
reference: Numbers 12:1
source:
  edition: WLC
  text: וַ/תְּדַבֵּ֨ר מִרְיָ֤ם וְ/אַהֲרֹן֙ בְּ/מֹשֶׁ֔ה עַל אֹד֛וֹת הָ/אִשָּׁ֥ה הַ/כֻּשִׁ֖ית
    אֲשֶׁ֣ר לָקָ֑ח כִּֽי אִשָּׁ֥ה כֻשִׁ֖ית לָקָֽח־־׃
translation:
  text: Then Miriam and Aaron spoke against Moses because of the Cushite woman whom
    he had taken, for he had taken a Cushite woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ethiopian woman.' The Hebrew says 'Cushite woman,' referring to a woman
      from Cush.
    reason: lexical_alternative
  - marker: b
    text: '''Had taken'' is a Hebrew idiom that can mean ''had married'' or ''had
      taken as wife.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּדַבֵּר
  chosen: spoke
  alternatives:
  - spoke out
  - complained
  - criticized
  lexicon: HALOT
  rationale: The verb דבר in the waw-consecutive form introduces the action of speaking.
    Because the preposition ב with Moses gives the sense of speaking against/about
    him negatively, English 'spoke against' captures the clause naturally without
    over-paraphrasing the verb itself as 'complained' in isolation.
- source_word: מִרְיָם וְאַהֲרֹן
  chosen: Miriam and Aaron
  rationale: Personal names are transliterated by standard English conventions. Miriam
    is placed first in Hebrew, and the singular feminine verb likely reflects her
    prominence in initiating the speech, but the coordinated subject is retained straightforwardly
    in English.
- source_word: בְּמֹשֶׁה
  chosen: against Moses
  alternatives:
  - about Moses
  - concerning Moses
  lexicon: HALOT
  rationale: With דבר, the preposition ב can mark the object spoken against in a hostile
    sense. 'Against Moses' best reflects the adversative nuance in context.
- source_word: עַל אֹדוֹת
  chosen: because of
  alternatives:
  - on account of
  - concerning
  lexicon: HALOT
  rationale: The phrase עַל אֹדוֹת commonly gives the reason or occasion for the speech.
    'Because of' is idiomatic and preserves the causal force.
- source_word: הָאִשָּׁה
  chosen: the woman
  alternatives:
  - the wife
  lexicon: HALOT
  rationale: אִשָּׁה can mean either 'woman' or 'wife.' Here the following relative
    clause 'whom he had taken' already implies marital acquisition, so 'woman' preserves
    the Hebrew wording while allowing the context to signal that she is his wife.
- source_word: הַכֻּשִׁית / כֻשִׁית
  chosen: Cushite
  alternatives:
  - Ethiopian
  lexicon: HALOT
  rationale: כּוּשִׁי/כֻּשִׁית denotes someone from Cush. 'Cushite' is more source-transparent
    than the traditional but potentially anachronistic 'Ethiopian.'
- source_word: אֲשֶׁר לָקָח
  chosen: whom he had taken
  alternatives:
  - whom he had married
  - whom he had taken as wife
  lexicon: HALOT
  rationale: לקח literally means 'take.' In marital contexts it can idiomatically
    mean 'take as wife' or 'marry.' The more literal 'had taken' preserves the Hebrew
    expression while remaining understandable.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces an explanatory restatement of the reason already
    given. 'For' preserves that explanatory force in concise English.
- source_word: אִשָּׁה כֻשִׁית לָקָח
  chosen: he had taken a Cushite woman
  alternatives:
  - he had married a Cushite woman
  - he had taken a Cushite wife
  lexicon: HALOT
  rationale: The Hebrew repeats the accusation for emphasis. The translation preserves
    the repetition rather than smoothing it away, in keeping with source-text primacy.
