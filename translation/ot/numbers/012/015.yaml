id: NUM.12.15
reference: Numbers 12:15
source:
  edition: WLC
  text: וַ/תִּסָּגֵ֥ר מִרְיָ֛ם מִ/ח֥וּץ לַֽ/מַּחֲנֶ֖ה שִׁבְעַ֣ת יָמִ֑ים וְ/הָ/עָם֙
    לֹ֣א נָסַ֔ע עַד הֵאָסֵ֖ף מִרְיָֽם־׃
translation:
  text: So Miriam was confined outside the camp for seven days, and the people did
    not set out until Miriam was brought back in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'until Miriam was gathered in.' The Hebrew uses the
      verb 'gather,' here referring to her restoration to the camp after her period
      of exclusion.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּסָּגֵר
  chosen: was confined
  alternatives:
  - was shut up
  - was shut out
  - was isolated
  lexicon: HALOT
  rationale: From סגר in the Niphal, indicating being shut in/out or confined. 'Was
    confined' communicates the passive state imposed on Miriam in readable modern
    English and fits the exclusion context of impurity regulations better than the
    more wooden 'was shut up.'
- source_word: מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - outside the encampment
  lexicon: HALOT
  rationale: A straightforward locative phrase meaning outside the camp. 'Camp' is
    the natural English equivalent in Israel's wilderness setting.
- source_word: שִׁבְעַת יָמִים
  chosen: for seven days
  lexicon: HALOT
  rationale: Duration phrase; 'for seven days' is idiomatic English and preserves
    the temporal force.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: In this narrative setting, הָעָם refers to the traveling community of
    Israel. 'The people' is the most natural and contextually precise rendering.
- source_word: לֹא נָסַע
  chosen: did not set out
  alternatives:
  - did not journey
  - did not depart
  - did not move on
  lexicon: HALOT
  rationale: נסע commonly refers to breaking camp and setting out on a journey in
    wilderness narratives. 'Did not set out' captures that technical travel sense
    better than the more generic 'did not depart.'
- source_word: עַד הֵאָסֵף מִרְיָם
  chosen: until Miriam was brought back in
  alternatives:
  - until Miriam was gathered in
  - until Miriam was received back
  lexicon: HALOT
  rationale: The Niphal infinitive/verb from אסף here refers to Miriam's being gathered
    back into the camp/community after her exclusion. 'Brought back in' makes the
    implied restoration explicit in natural English while remaining faithful to the
    context.
