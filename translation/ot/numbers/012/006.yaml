id: NUM.12.6
reference: Numbers 12:6
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר שִׁמְעוּ נָ֣א דְבָרָ֑/י אִם יִֽהְיֶה֙ נְבִ֣יאֲ/כֶ֔ם יְהוָ֗ה בַּ/מַּרְאָה֙ אֵלָ֣י/ו אֶתְוַדָּ֔ע בַּ/חֲל֖וֹם אֲדַבֶּר בּֽ/וֹ־־־׃
translation:
  text: 'And he said, “Hear now my words: if there is a prophet among you, I, Yahweh, make myself known to him in a vision; I speak to him in a dream.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'if one of you is a prophet.' The Hebrew expression is literally 'if there is your prophet.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'I reveal myself to him.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'I speak to him.' The Hebrew literally has 'I speak in/with him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing direct speech. 'And he said' preserves Hebrew narrative flow without overinterpreting sequence.
- source_word: שִׁמְעוּ נָא
  chosen: Hear now
  alternatives:
  - Listen now
  - Please hear
  lexicon: HALOT
  rationale: Imperative plural with particle נָא, here functioning as an earnest appeal rather than politeness alone. 'Hear now' is idiomatic, concise, and retains the solemn summons.
- source_word: דְבָרַי
  chosen: my words
  alternatives:
  - what I say
  - my word
  lexicon: HALOT
  rationale: Plural construct with 1cs suffix; 'my words' is the most direct rendering and suits the formal divine address.
- source_word: אִם יִהְיֶה נְבִיאֲכֶם
  chosen: if there is a prophet among you
  alternatives:
  - if one of you is a prophet
  - if you have a prophet
  lexicon: HALOT
  rationale: The Hebrew literally says 'if there is your prophet,' an idiom naturally rendered in English as 'a prophet among you.' This avoids awkwardness while preserving the conditional and communal reference.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּמַּרְאָה
  chosen: in a vision
  alternatives:
  - by a vision
  - through a vision
  lexicon: HALOT
  rationale: מַרְאָה denotes a visionary appearance/revelation. 'In a vision' is idiomatic English and fits the revelatory mode being contrasted with Moses in the surrounding context.
- source_word: אֵלָיו אֶתְוַדָּע
  chosen: I make myself known to him
  alternatives:
  - I reveal myself to him
  - I am made known to him
  lexicon: HALOT
  rationale: 'The hitpael/imperfect form of ידע here has a reflexive nuance: God discloses himself. ''Make myself known'' preserves that nuance better than the flatter ''reveal myself'' while remaining natural English.'
- source_word: בַּחֲלוֹם
  chosen: in a dream
  alternatives:
  - by a dream
  - through a dream
  lexicon: HALOT
  rationale: Straightforward prepositional phrase naming the medium of revelation. 'In a dream' is standard English usage.
- source_word: אֲדַבֶּר בּוֹ
  chosen: I speak with him
  alternatives:
  - I speak to him
  - I speak in him
  lexicon: HALOT
  rationale: Though בּוֹ is literally 'in/with him,' with דבר it can function idiomatically for speaking with or to someone. 'With him' preserves the preposition more closely and fits the parallelism with divine self-disclosure.
