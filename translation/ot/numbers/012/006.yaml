theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Mode of prophetic revelation
  chosen_reading: God makes himself known 'in a vision' and speaks 'in a dream'
  alternative_readings:
  - God appears in a vision and speaks in a dream
  rationale: The verse distinguishes ordinary prophetic revelation through mediated visionary/dream communication. The translation preserves that distinction without importing later doctrinal claims about prophecy.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
