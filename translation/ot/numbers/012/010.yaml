id: NUM.12.10
reference: Numbers 12:10
source:
  edition: WLC
  text: וְ/הֶ/עָנָ֗ן סָ֚ר מֵ/עַ֣ל הָ/אֹ֔הֶל וְ/הִנֵּ֥ה מִרְיָ֖ם מְצֹרַ֣עַת כַּ/שָּׁ֑לֶג
    וַ/יִּ֧פֶן אַהֲרֹ֛ן אֶל מִרְיָ֖ם וְ/הִנֵּ֥ה מְצֹרָֽעַת־׃
translation:
  text: And the cloud departed from over the tent, and behold, Miriam was leprous,
    like snow. Then Aaron turned toward Miriam, and behold, she was leprous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Hebrew term rendered 'leprous' can refer more broadly to a serious skin
      disease or ritual skin affliction, not necessarily what modern medicine identifies
      as leprosy (Hansen's disease).
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעָנָן
  chosen: the cloud
  alternatives:
  - the cloud mass
  lexicon: HALOT
  rationale: Definite noun with article; in context this is the visible cloud associated
    with the LORD's presence. 'The cloud' is the natural English rendering.
- source_word: סָר
  chosen: departed
  alternatives:
  - turned aside
  - moved away
  - withdrew
  lexicon: HALOT
  rationale: The verb denotes removal or turning aside. 'Departed' fits the context
    of the cloud lifting from above the tent and reads naturally in English.
- source_word: מֵעַל הָאֹהֶל
  chosen: from over the tent
  alternatives:
  - from above the tent
  - from upon the tent
  lexicon: HALOT
  rationale: מֵעַל indicates movement away from a position above. 'Tent' is preferred
    here because אֹהֶל in this immediate narrative refers to the tent of meeting;
    the shorter rendering preserves the Hebrew wording without overexpanding.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - suddenly
  lexicon: HALOT
  rationale: The particle marks vivid presentation and surprise. 'Behold' preserves
    the dramatic force better than a flattened adverb.
- source_word: מְצֹרַעַת
  chosen: leprous
  alternatives:
  - afflicted with a skin disease
  - diseased
  lexicon: HALOT
  rationale: The adjective refers to the condition traditionally rendered 'leprous.'
    Although the underlying Hebrew term can cover a broader range than modern Hansen's
    disease, 'leprous' remains the most concise conventional rendering in this narrative
    context; the broader nuance is worth preserving in a footnote.
- source_word: כַּשָּׁלֶג
  chosen: like snow
  alternatives:
  - as white as snow
  lexicon: HALOT
  rationale: The Hebrew literally says 'like the snow.' English idiom prefers 'like
    snow.' The comparison likely highlights whiteness, but the text itself gives the
    shorter simile, so it is retained.
- source_word: וַיִּפֶן
  chosen: turned toward
  alternatives:
  - turned to
  - looked toward
  - faced
  lexicon: HALOT
  rationale: The verb means to turn or face. 'Turned toward' captures the physical
    motion before Aaron observes Miriam's condition.
- source_word: אֶל מִרְיָם
  chosen: toward Miriam
  alternatives:
  - to Miriam
  lexicon: HALOT
  rationale: With פנה, אֶל marks direction. 'Toward Miriam' is slightly more precise
    in English for the act of turning.
- source_word: וְהִנֵּה מְצֹרָעַת
  chosen: and behold, she was leprous
  alternatives:
  - and behold, Miriam was leprous
  lexicon: HALOT
  rationale: The second clause omits the name because it has just been mentioned.
    English can supply 'she' naturally while preserving the emphatic repetition of
    the condition with 'behold'.
