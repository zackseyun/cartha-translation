id: NUM.12.9
reference: Numbers 12:9
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֧ף יְהוָ֛ה בָּ֖/ם וַ/יֵּלַֽךְ׃
translation:
  text: And Yahweh’s anger burned against them, and he departed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the nose of the LORD burned against them,'' an idiom meaning ''the LORD’s anger burned against them.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר
  chosen: burned
  alternatives:
  - was kindled
  - grew hot
  lexicon: HALOT
  rationale: From חרה, idiomatically used of anger becoming hot/burning. 'Burned' gives natural English while preserving the Hebrew heat metaphor better than the more interpretive 'was angry' alone.
- source_word: אַף
  chosen: anger
  alternatives:
  - nose
  - wrath
  lexicon: HALOT
  rationale: Literally 'nose,' but in this idiom with חרה it denotes anger. 'Anger' is the standard idiomatic sense in English; 'wrath' is possible but slightly more elevated than the Hebrew requires here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בָּם
  chosen: against them
  alternatives:
  - at them
  - in them
  lexicon: HALOT
  rationale: With the anger idiom, the preposition conveys the object/target of divine anger. 'Against them' is the clearest idiomatic English rendering.
- source_word: וַיֵּלַךְ
  chosen: he departed
  alternatives:
  - he went away
  - he left
  lexicon: HALOT
  rationale: הלך in this context refers to the LORD's withdrawal after speaking in judgment. 'He departed' is concise, reverent, and contextually clear.
