id: NUM.12.9
reference: Numbers 12:9
source:
  edition: WLC
  text: וַ/יִּֽחַר אַ֧ף יְהוָ֛ה בָּ֖/ם וַ/יֵּלַֽךְ׃
translation:
  text: And the LORD’s anger burned against them, and he departed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the nose of the LORD burned against them,'' an idiom meaning
      ''the LORD’s anger burned against them.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר
  chosen: burned
  alternatives:
  - was kindled
  - grew hot
  lexicon: HALOT
  rationale: From חרה, idiomatically used of anger becoming hot/burning. 'Burned'
    gives natural English while preserving the Hebrew heat metaphor better than the
    more interpretive 'was angry' alone.
- source_word: אַף
  chosen: anger
  alternatives:
  - nose
  - wrath
  lexicon: HALOT
  rationale: Literally 'nose,' but in this idiom with חרה it denotes anger. 'Anger'
    is the standard idiomatic sense in English; 'wrath' is possible but slightly more
    elevated than the Hebrew requires here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per project doctrine, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: בָּם
  chosen: against them
  alternatives:
  - at them
  - in them
  lexicon: HALOT
  rationale: With the anger idiom, the preposition conveys the object/target of divine
    anger. 'Against them' is the clearest idiomatic English rendering.
- source_word: וַיֵּלַךְ
  chosen: he departed
  alternatives:
  - he went away
  - he left
  lexicon: HALOT
  rationale: הלך in this context refers to the LORD's withdrawal after speaking in
    judgment. 'He departed' is concise, reverent, and contextually clear.
