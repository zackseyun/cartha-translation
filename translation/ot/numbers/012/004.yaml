id: NUM.12.4
reference: Numbers 12:4
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה פִּתְאֹ֗ם אֶל מֹשֶׁ֤ה וְ/אֶֽל אַהֲרֹן֙ וְ/אֶל מִרְיָ֔ם
    צְא֥וּ שְׁלָשְׁתְּ/כֶ֖ם אֶל אֹ֣הֶל מוֹעֵ֑ד וַ/יֵּצְא֖וּ שְׁלָשְׁתָּֽ/ם־־־־׃
translation:
  text: And the LORD said suddenly to Moses and to Aaron and to Miriam, “Come out,
    you three, to the tent of meeting.” And the three of them went out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Go out'' or ''Come out''; the verb simply denotes movement out
      from a place.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the three of you' / 'all three of you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default, the divine name is rendered 'the LORD' rather than
    transliterated, following established reverential convention and the project's
    stated policy.
- source_word: פִּתְאֹם
  chosen: suddenly
  alternatives:
  - at once
  - abruptly
  lexicon: HALOT
  rationale: The adverb marks the immediacy and unexpectedness of the LORD's speech.
    'Suddenly' is the most natural modern English equivalent and preserves the narrative
    force.
- source_word: צְא֥וּ
  chosen: Come out
  alternatives:
  - Go out
  - Come forth
  lexicon: HALOT
  rationale: The imperative of יצא means 'go/come out.' In direct speech from the
    LORD summoning them from their current location to another place, 'Come out' is
    idiomatic English and preserves the movement out from where they are.
- source_word: שְׁלָשְׁתְּכֶם
  chosen: you three
  alternatives:
  - the three of you
  - all three of you
  lexicon: HALOT
  rationale: This form explicitly identifies the three addressed persons. 'You three'
    is concise, natural, and preserves the emphasis on all three being summoned together.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the Tent of Meeting
  lexicon: HALOT
  rationale: This is the standard rendering of the tabernacle-related phrase. Lowercase
    is used here for readable modern English without changing the referent.
- source_word: וַיֵּצְאוּ
  chosen: went out
  alternatives:
  - came out
  lexicon: HALOT
  rationale: For the narrative wayyiqtol of יצא, 'went out' is the most straightforward
    English narrative rendering. It also avoids repeating 'came out' immediately after
    the command in a way that sounds awkward in English.
- source_word: שְׁלָשְׁתָּם
  chosen: the three of them
  alternatives:
  - all three of them
  lexicon: HALOT
  rationale: The phrase reiterates that all three complied. 'The three of them' preserves
    the Hebrew emphasis and reads naturally in English.
