id: NUM.12.13
reference: Numbers 12:13
source:
  edition: WLC
  text: וַ/יִּצְעַ֣ק מֹשֶׁ֔ה אֶל יְהוָ֖ה לֵ/אמֹ֑ר אֵ֕ל נָ֛א רְפָ֥א נָ֖א לָֽ/הּ־׃פ
translation:
  text: So Moses cried out to Yahweh, saying, “O God, please heal her.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''O God, please heal her, please''—the repeated ''please'' preserves the urgency of Moses''s plea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְעַק
  chosen: cried out
  alternatives:
  - called out
  - shouted
  lexicon: HALOT
  rationale: The verb צעק commonly denotes a strong cry or urgent appeal. 'Cried out' preserves the intensity of Moses's intercession better than the flatter 'called out.'
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition here, naturally rendered 'to' in modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: This infinitive introduces the content of Moses's cry. 'Saying' is concise and reflects the Hebrew discourse formula.
- source_word: אֵל
  chosen: O God
  alternatives:
  - God
  - O mighty God
  lexicon: HALOT
  rationale: Here אֵל functions as a direct address in prayer. 'O God' best captures the vocative force in natural English.
- source_word: נָא
  chosen: please
  alternatives:
  - I pray
  - now
  lexicon: HALOT
  rationale: The particle expresses entreaty or urgency. 'Please' is the clearest modern equivalent in prayer language.
- source_word: רְפָא
  chosen: heal
  alternatives:
  - restore
  - cure
  lexicon: HALOT
  rationale: The imperative from רפא refers to healing from Miriam's affliction. 'Heal' is the most direct and idiomatic rendering.
- source_word: נָא
  chosen: please
  alternatives:
  - I pray
  - now
  lexicon: HALOT
  rationale: The repetition of נָא intensifies the plea. Retaining a second 'please' reflects the Hebrew emphasis rather than smoothing it away.
- source_word: לָהּ
  chosen: her
  lexicon: HALOT
  rationale: The 3fs pronominal suffix refers to Miriam and should be rendered explicitly as 'her.'
