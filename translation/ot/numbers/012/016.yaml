id: NUM.12.16
reference: Numbers 12:16
source:
  edition: WLC
  text: וְ/אַחַ֛ר נָסְע֥וּ הָ/עָ֖ם מֵ/חֲצֵר֑וֹת וַֽ/יַּחֲנ֖וּ בְּ/מִדְבַּ֥ר פָּארָֽן׃פ
translation:
  text: Afterward the people set out from Hazeroth and camped in the wilderness of
    Paran.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאַחַר
  chosen: Afterward
  alternatives:
  - After that
  - Later
  lexicon: HALOT
  rationale: Temporal adverb/conjunction marking sequence after the preceding events.
    'Afterward' is natural modern English and preserves the narrative progression.
- source_word: נָסְעוּ
  chosen: set out
  alternatives:
  - journeyed
  - departed
  - pulled up and traveled
  lexicon: HALOT
  rationale: From נסע, commonly used for breaking camp and moving on in wilderness
    narratives. 'Set out' captures the travel sense idiomatically better than the
    more archaic 'journeyed' while remaining faithful.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the nation
  lexicon: HALOT
  rationale: עָם here refers to the Israelite community as a collective. 'The people'
    is the standard and most natural rendering in context.
- source_word: מֵחֲצֵרוֹת
  chosen: from Hazeroth
  lexicon: HALOT
  rationale: Place name; per translation philosophy, names are transliterated rather
    than translated.
- source_word: וַיַּחֲנוּ
  chosen: and camped
  alternatives:
  - and encamped
  - and pitched camp
  lexicon: HALOT
  rationale: From חנה, to camp/encamp. 'Camped' is clear modern English; 'encamped'
    is slightly more formal but less natural.
- source_word: בְּמִדְבַּר
  chosen: in the wilderness of
  alternatives:
  - in the desert of
  - in the wilderness at
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness/desert terrain. 'Wilderness' is the conventional
    and contextually appropriate rendering in the Pentateuch, preserving the theological-geographical
    resonance of Israel's wilderness journey.
- source_word: פָּארָן
  chosen: Paran
  lexicon: HALOT
  rationale: Place name; transliterated according to standard English convention.
