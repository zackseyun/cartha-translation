  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - children of Israel
  rationale: The source is grammatically masculine plural. Per doctrine, gender-accurate renderings are preferred over neutralization unless context clearly demands otherwise. Because the phrase functions corporately, an idiomatic alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md §Contested terms: יְהוָה YHWH'
