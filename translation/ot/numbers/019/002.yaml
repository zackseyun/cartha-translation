id: NUM.19.2
reference: Numbers 19:2
source:
  edition: WLC
  text: זֹ֚את חֻקַּ֣ת הַ/תּוֹרָ֔ה אֲשֶׁר צִוָּ֥ה יְהוָ֖ה לֵ/אמֹ֑ר דַּבֵּ֣ר אֶל בְּנֵ֣י יִשְׂרָאֵ֗ל וְ/יִקְח֣וּ אֵלֶי/ךָ֩ פָרָ֨ה אֲדֻמָּ֜ה תְּמִימָ֗ה אֲשֶׁ֤ר אֵֽין בָּ/הּ֙ מ֔וּם אֲשֶׁ֛ר לֹא עָלָ֥ה עָלֶ֖י/הָ עֹֽל־׀־־־׃
translation:
  text: 'This is the statute of the law that Yahweh has commanded, saying: Speak to the sons of Israel, that they bring to you a red heifer, without blemish, in which there is no defect, and on which no yoke has come.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Speak to the Israelites' (literally, 'the sons of Israel').
    reason: lexical_alternative
  - marker: b
    text: Or 'a red cow.'
    reason: lexical_alternative
  - marker: c
    text: Or 'without blemish'; the next clause specifies that it has no defect.
    reason: lexical_alternative
  - marker: d
    text: Literally, 'on which no yoke has gone up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֻקַּת
  chosen: statute
  alternatives:
  - ordinance
  - decree
  - requirement
  lexicon: HALOT
  rationale: חֻקָּה commonly denotes a fixed prescription or statute. 'Statute' preserves the formal legal sense better than the broader 'law' or the more procedural 'ordinance.'
- source_word: הַתּוֹרָה
  chosen: the law
  alternatives:
  - instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction' broadly, but in this legal-ritual context 'the law' is the most natural and recognizable rendering. The phrase חֻקַּת הַתּוֹרָה is retained with legal force rather than paraphrased.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דַּבֵּר אֶל בְּנֵי יִשְׂרָאֵל
  chosen: Speak to the sons of Israel
  alternatives:
  - Speak to the Israelites
  - Speak to the children of Israel
  lexicon: HALOT
  rationale: בְּנֵי יִשְׂרָאֵל is literally 'sons of Israel.' Following the gender-accurate principle, the masculine form is preserved in the main text rather than neutralized to 'Israelites,' while the idiomatic alternative is worth preserving in a footnote.
- source_word: וְיִקְחוּ אֵלֶיךָ
  chosen: that they bring to you
  alternatives:
  - and let them take to you
  - and they shall bring to you
  lexicon: HALOT
  rationale: Though לקח is literally 'take,' in this construction with אֶל and the object being supplied to Moses, idiomatic English is 'bring to you.' This reflects the directional sense without wooden phrasing.
- source_word: פָרָה אֲדֻמָּה
  chosen: a red heifer
  alternatives:
  - a red cow
  lexicon: HALOT
  rationale: פָרָה denotes a cow/heifer; 'heifer' is the established and more precise term for a young female bovine in sacrificial context, and 'red heifer' is the recognized ritual designation in English.
- source_word: תְּמִימָה
  chosen: whole
  alternatives:
  - without blemish
  - perfect
  - sound
  lexicon: HALOT
  rationale: תָּמִים here describes the animal's unimpaired condition. Because the next clause explicitly states there is 'no defect,' rendering this adjective as 'whole' avoids redundancy while preserving the sense of completeness.
- source_word: מוּם
  chosen: defect
  alternatives:
  - blemish
  - spot
  lexicon: HALOT
  rationale: מוּם refers to a physical defect or blemish disqualifying a sacrificial animal. 'Defect' is clear modern English and avoids repeating 'blemish' after choosing 'whole' for תְּמִימָה.
- source_word: אֲשֶׁר לֹא עָלָה עָלֶיהָ עֹל
  chosen: on which no yoke has come
  alternatives:
  - on which a yoke has never been placed
  - which has not borne a yoke
  lexicon: HALOT
  rationale: The Hebrew idiom is literally that no yoke has 'come up upon' it. 'Has come' preserves the verbal imagery more closely than a freer paraphrase, while remaining intelligible in English.
