id: NUM.19.14
reference: Numbers 19:14
source:
  edition: WLC
  text: זֹ֚את הַ/תּוֹרָ֔ה אָדָ֖ם כִּֽי יָמ֣וּת בְּ/אֹ֑הֶל כָּל הַ/בָּ֤א אֶל הָ/אֹ֨הֶל֙
    וְ/כָל אֲשֶׁ֣ר בָּ/אֹ֔הֶל יִטְמָ֖א שִׁבְעַ֥ת יָמִֽים־־־־׃
translation:
  text: 'This is the law: when a man dies in a tent, everyone who enters the tent
    and everyone who is in the tent shall be unclean seven days.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everyone/everything that is in the tent.' The Hebrew expression can
      be broader, but the context and singular verb here favor reference to persons
      present; vessels are addressed explicitly in the following verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת הַתּוֹרָה
  chosen: This is the law
  alternatives:
  - This is the instruction
  - This is the statute
  lexicon: HALOT
  rationale: תּוֹרָה here introduces the governing regulation for corpse impurity.
    'Law' is concise and natural in English, while still fitting the legal/ritual
    context. 'Instruction' is possible, but in this procedural purity text 'law' better
    signals a binding rule.
- source_word: אָדָם
  chosen: a man
  alternatives:
  - a person
  - someone
  - humankind
  lexicon: HALOT
  rationale: 'The noun is singular and generic here: ''when a man dies.'' Per doctrine,
    gender-accurate rendering is preferred where Hebrew uses masculine generic forms.
    ''A person'' is possible, but ''a man'' more closely reflects the source form
    while still functioning generically in English.'
- source_word: כִּי יָמוּת
  chosen: when a man dies
  alternatives:
  - if a man dies
  lexicon: HALOT
  rationale: כִּי with the imperfect here introduces a case law situation. 'When'
    fits the legal style in English better than 'if' and avoids implying uncertainty
    rather than circumstance.
- source_word: בְּאֹהֶל
  chosen: in a tent
  alternatives:
  - in the tent
  lexicon: HALOT
  rationale: The first occurrence lacks the article in Hebrew, so 'in a tent' best
    reflects the indefinite sense introducing the scenario. The following occurrences
    are definite and refer back to that tent.
- source_word: כָּל הַבָּא אֶל הָאֹהֶל
  chosen: everyone who enters the tent
  alternatives:
  - everyone coming into the tent
  - everyone who comes into the tent
  lexicon: HALOT
  rationale: The participle with כָּל denotes any person entering. 'Everyone who enters'
    is idiomatic modern English and preserves the ongoing/general force of the participle.
- source_word: וְכָל אֲשֶׁר בָּאֹהֶל
  chosen: and everyone who is in the tent
  alternatives:
  - and everything that is in the tent
  - and all that is in the tent
  lexicon: HALOT
  rationale: Although אֲשֶׁר can be broad ('that/which'), the immediate parallel with
    'everyone who enters' and the singular verb יִטְמָא favors persons present in
    the tent rather than objects. The next verse separately addresses open vessels,
    supporting a personal reference here.
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - will be unclean
  - shall become unclean
  lexicon: HALOT
  rationale: In ritual-purity legislation, 'be unclean' is standard and clear. 'Shall'
    suits legal register. 'Become unclean' is possible, but the English legal idiom
    'shall be unclean' is smoother.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  lexicon: HALOT
  rationale: Straightforward duration phrase in purity law; no special nuance requires
    expansion.
