theological_decisions:
- issue: Meaning of the sanction 'cut off'
  chosen_reading: Retain the covenantal formula 'shall be cut off' without specifying
    death, excommunication, or childlessness.
  alternative_readings:
  - shall be put to death
  - shall be excluded from the community
  rationale: The Hebrew formula is theologically and legally weighty but does not
    itself define the exact mode of judgment in this verse. Preserving the formula
    avoids importing a disputed interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of אָדָם in a generic singular context
  chosen_reading: Use 'man' within the phrase 'the body of a man who has died' while
    the sentence opens with inclusive 'Everyone.'
  alternative_readings:
  - human being
  - person
  rationale: The verse addresses any individual ('Everyone'), but the embedded phrase
    uses אָדָם generically. This balances gender-accurate representation of the Hebrew
    with clear English inclusivity at the sentence level.
  doctrine_reference: Gender-accurate over gender-neutral; אָדָם default 'man / humankind'
    by context.
