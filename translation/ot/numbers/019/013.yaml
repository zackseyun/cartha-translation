id: NUM.19.13
reference: Numbers 19:13
source:
  edition: WLC
  text: כָּֽל הַ/נֹּגֵ֡עַ בְּ/מֵ֣ת בְּ/נֶפֶשׁ֩ הָ/אָדָ֨ם אֲשֶׁר יָמ֜וּת וְ/לֹ֣א יִתְחַטָּ֗א
    אֶת מִשְׁכַּ֤ן יְהוָה֙ טִמֵּ֔א וְ/נִכְרְתָ֛ה הַ/נֶּ֥פֶשׁ הַ/הִ֖וא מִ/יִּשְׂרָאֵ֑ל
    כִּי֩ מֵ֨י נִדָּ֜ה לֹא זֹרַ֤ק עָלָי/ו֙ טָמֵ֣א יִהְיֶ֔ה ע֖וֹד טֻמְאָת֥/וֹ בֽ/וֹ־־־־׃
translation:
  text: Everyone who touches a dead person, the body of a man who has died, and does
    not purify himself, has defiled the tabernacle of the LORD, and that person shall
    be cut off from Israel. Because the water for impurity was not sprinkled on him,
    he shall be unclean; his uncleanness is still on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the water of purification.' The Hebrew is literally 'water of impurity,'
      referring to the water used to remove corpse-impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֹּגֵעַ
  chosen: touches
  alternatives:
  - comes into contact with
  lexicon: HALOT
  rationale: The participle from נגע denotes physical contact. 'Touches' is the most
    direct and natural English rendering here.
- source_word: בְּמֵת
  chosen: a dead person
  alternatives:
  - the dead
  - a corpse
  lexicon: HALOT
  rationale: Though literally 'with a dead one/dead thing,' the following apposition
    specifies a human corpse. 'A dead person' is clear modern English and fits the
    context.
- source_word: בְּנֶפֶשׁ הָאָדָם אֲשֶׁר יָמוּת
  chosen: the body of a man who has died
  alternatives:
  - the corpse of a human being who has died
  - the dead body of a person
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean 'person/self/life,' but in corpse-impurity contexts it
    refers concretely to the dead body. אָדָם here is generic humanity, but because
    the Hebrew uses singular 'man/human,' 'the body of a man who has died' preserves
    the form while still being understandable. The phrase is appositional to 'a dead
    person.'
- source_word: יִתְחַטָּא
  chosen: purify himself
  alternatives:
  - cleanse himself
  - decontaminate himself ritually
  lexicon: HALOT
  rationale: The hitpael of חטא in purification contexts means to undergo ritual purification,
    not moral repentance. 'Purify himself' best captures the ritual sense in accessible
    English.
- source_word: מִשְׁכַּן יְהוָה
  chosen: the tabernacle of the LORD
  alternatives:
  - the dwelling place of the LORD
  lexicon: HALOT
  rationale: מִשְׁכָּן is the tabernacle/shrine dwelling. 'Tabernacle' is the standard
    and contextually precise term. יְהוָה follows the doctrinal default 'the LORD'.
- source_word: טִמֵּא
  chosen: has defiled
  alternatives:
  - has made unclean
  lexicon: HALOT
  rationale: In relation to the sanctuary, the piel conveys causing defilement. 'Has
    defiled' is idiomatic and preserves the cultic seriousness.
- source_word: וְנִכְרְתָה הַנֶּפֶשׁ הַהִוא
  chosen: that person shall be cut off
  alternatives:
  - that soul shall be cut off
  - that person shall be excluded
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the individual person. 'Cut off' preserves the
    covenantal sanction formula without over-interpreting its exact mechanism.
- source_word: מִיִּשְׂרָאֵל
  chosen: from Israel
  alternatives:
  - from among Israel
  lexicon: HALOT
  rationale: A straightforward rendering of separation from the covenant community.
- source_word: מֵי נִדָּה
  chosen: the water for impurity
  alternatives:
  - the water of impurity
  - the water for removal of impurity
  - the water of purification
  lexicon: HALOT
  rationale: This phrase refers to the specially prepared water used in corpse-impurity
    purification. 'Water for impurity' is somewhat formal but transparent and avoids
    importing a smoother interpretation beyond the Hebrew. A more idiomatic alternative
    is preserved in a footnote.
- source_word: זֹרַק עָלָיו
  chosen: was not sprinkled on him
  alternatives:
  - was not dashed on him
  lexicon: HALOT
  rationale: זרה in this ritual context is 'sprinkle.' Passive English best reflects
    the Hebrew passive sense in context.
- source_word: טָמֵא יִהְיֶה
  chosen: he shall be unclean
  alternatives:
  - he remains unclean
  lexicon: HALOT
  rationale: The clause states his continuing ritual status. 'He shall be unclean'
    preserves the formal declaration, while the next clause explains the persistence.
- source_word: עוֹד טֻמְאָתוֹ בוֹ
  chosen: his uncleanness is still on him
  alternatives:
  - his impurity remains in him
  - his uncleanness remains upon him
  lexicon: HALOT
  rationale: עוֹד marks continuance; the idiom means the impurity remains attached
    to him. 'Still on him' is natural English and preserves the metaphor.
