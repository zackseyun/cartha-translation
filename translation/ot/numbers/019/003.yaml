id: NUM.19.3
reference: Numbers 19:3
source:
  edition: WLC
  text: וּ/נְתַתֶּ֣ם אֹתָ֔/הּ אֶל אֶלְעָזָ֖ר הַ/כֹּהֵ֑ן וְ/הוֹצִ֤יא אֹתָ/הּ֙ אֶל מִ/ח֣וּץ
    לַֽ/מַּחֲנֶ֔ה וְ/שָׁחַ֥ט אֹתָ֖/הּ לְ/פָנָֽי/ו־־׃
translation:
  text: You shall give it to Eleazar the priest, and he shall bring it outside the
    camp, and someone shall slaughter it before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he shall slaughter it before him,' if the implicit subject is taken
      to remain Eleazar throughout the clause.
    reason: alternative_reading
  - marker: b
    text: The Hebrew feminine pronoun refers to the red heifer; English uses 'it'
      idiomatically for the animal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתַתֶּם
  chosen: You shall give
  alternatives:
  - and you shall give
  - you must give
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal/instructional context
    functions as directive/future. 'You shall give' fits English legislative style
    and preserves the command force without over-paraphrase.
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - her
  lexicon: HALOT
  rationale: The pronoun is feminine singular referring to the red heifer. English
    idiom normally uses 'it' for an animal in sacrificial legislation; 'her' would
    sound marked and is unnecessary in the main text.
- source_word: אֶל אֶלְעָזָר הַכֹּהֵן
  chosen: to Eleazar the priest
  alternatives:
  - to Eleazar the priestly one
  lexicon: HALOT
  rationale: Standard rendering of the preposition plus proper name and title. Personal
    name is transliterated per project philosophy; title is translated.
- source_word: וְהוֹצִיא
  chosen: and he shall bring it out
  alternatives:
  - and he shall take it out
  - and he shall lead it out
  lexicon: HALOT
  rationale: Hiphil of יצא means cause to go out/bring out. 'Bring it out' is natural
    English and preserves causative sense.
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - to outside the camp
  - to a place outside the camp
  lexicon: HALOT
  rationale: The phrase literally means 'to outside the camp.' Idiomatic English compresses
    this to 'outside the camp' without loss of meaning.
- source_word: וְשָׁחַט
  chosen: and someone shall slaughter
  alternatives:
  - and he shall slaughter
  - and one shall slaughter
  lexicon: HALOT
  rationale: Although the verb is 3ms singular, the subject is left implicit. Given
    the following phrase 'before him' and the broader ritual context, rendering the
    subject as 'someone' avoids implying that Eleazar himself performs the slaughter
    if the Hebrew leaves that less explicit. This preserves the distinction between
    Eleazar's supervisory role and the act done in his presence.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  - before his face
  lexicon: HALOT
  rationale: Idiomatic rendering of the prepositional phrase meaning in front of/in
    the presence of him. 'Before him' is concise and natural.
