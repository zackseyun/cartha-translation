theological_decisions:
- issue: Identity of the slaughterer in the final clause
  chosen_reading: The text is rendered so that the slaughter occurs in Eleazar's presence
    without explicitly stating that Eleazar himself performs it.
  alternative_readings:
  - he shall slaughter it before him (taking Eleazar as the subject of the verb)
  rationale: The Hebrew uses an implicit 3ms subject for both 'bring out' and 'slaughter,'
    which could be read as Eleazar continuing as subject. However, the phrase 'before
    him' naturally distinguishes the observer/supervisor from the slaughterer, and
    many interpreters understand the animal to be slaughtered in Eleazar's presence
    rather than by Eleazar personally. The English 'someone shall slaughter it before
    him' preserves that distinction explicitly for clarity.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity rather than overstate certainty.
