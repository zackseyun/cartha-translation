theological_decisions:
- issue: Rendering of חַטָּאת in a purification ritual context
  chosen_reading: it is a sin offering
  alternative_readings:
  - it is a purification offering
  rationale: The Hebrew term commonly denotes both the offense and the offering associated
    with sin, and in priestly ritual texts often carries a purification function.
    The main text keeps the traditional and lexically standard 'sin offering,' while
    the alternative is preserved because the rite's cleansing purpose is prominent
    in Numbers 19.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
