id: NUM.19.9
reference: Numbers 19:9
source:
  edition: WLC
  text: וְ/אָסַ֣ף אִ֣ישׁ טָה֗וֹר אֵ֚ת אֵ֣פֶר הַ/פָּרָ֔ה וְ/הִנִּ֛יחַ מִ/ח֥וּץ לַֽ/מַּחֲנֶ֖ה
    בְּ/מָק֣וֹם טָה֑וֹר וְ֠/הָיְתָה לַ/עֲדַ֨ת בְּנֵֽי יִשְׂרָאֵ֧ל לְ/מִשְׁמֶ֛רֶת לְ/מֵ֥י
    נִדָּ֖ה חַטָּ֥את הִֽוא׀־׃
translation:
  text: Then a clean man shall gather the ashes of the heifer and place them outside
    the camp in a clean place, and they shall be kept for the congregation of the
    sons of Israel for water for impurity; it is a sin offering.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'for purification water' or 'for water of impurity.'
    reason: lexical_alternative
  - marker: b
    text: Or 'it is a purification offering.' The Hebrew חַטָּאת can denote a sin
      offering and, in priestly contexts, an offering for purification.
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ טָהוֹר
  chosen: a clean man
  alternatives:
  - a ceremonially clean man
  - a pure man
  lexicon: HALOT
  rationale: אִישׁ is singular 'man,' and per gender-accurate policy is retained rather
    than neutralized. טָהוֹר in this ritual context refers to ceremonial cleanness,
    but 'clean' is concise and natural English; the ritual sense is carried by context.
- source_word: אָסַף
  chosen: shall gather
  alternatives:
  - gathered
  - collect
  lexicon: HALOT
  rationale: The qatal with prefixed waw continues the procedural sequence with instruction-like
    force in context; English future/modal 'shall gather' fits legal-ritual style
    better than a simple past.
- source_word: אֵפֶר הַפָּרָה
  chosen: the ashes of the heifer
  alternatives:
  - the ash of the heifer
  - the ashes of the cow
  lexicon: HALOT
  rationale: אֵפֶר can function collectively, but English idiom prefers 'ashes.' פָּרָה
    is specifically a female bovine, so 'heifer' preserves the sacrificial specificity
    better than the generic 'cow.'
- source_word: וְהִנִּיחַ
  chosen: and place
  alternatives:
  - and deposit
  - and set down
  lexicon: HALOT
  rationale: The verb means to set/place/lay. 'Place' is clear modern English and
    suits the ritual instruction.
- source_word: מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - from outside the camp
  - beyond the camp
  lexicon: HALOT
  rationale: 'The phrase is idiomatically locative here: the ashes are to be deposited
    outside the camp. ''Outside the camp'' is the most natural rendering.'
- source_word: בְּמָקוֹם טָהוֹר
  chosen: in a clean place
  alternatives:
  - in a ceremonially clean place
  - in a pure place
  lexicon: HALOT
  rationale: As with טָהוֹר earlier in the verse, the ritual sense is important, but
    'clean place' is the most readable and sufficiently precise in context.
- source_word: וְהָיְתָה
  chosen: and they shall be kept
  alternatives:
  - and it shall be
  - and it shall remain
  lexicon: HALOT
  rationale: The feminine singular verb refers back to the ashes as a collective/feminine
    referent, but English naturally expresses the intended function with plural 'they'
    for 'ashes.' 'Shall be kept' makes explicit the custodial force implied by the
    following לְמִשְׁמֶרֶת.
- source_word: לַעֲדַת בְּנֵי יִשְׂרָאֵל
  chosen: for the congregation of the sons of Israel
  alternatives:
  - for the congregation of the people of Israel
  - for the assembly of the Israelites
  lexicon: HALOT
  rationale: עֲדָה is well rendered 'congregation' in Pentateuchal legal contexts.
    בְּנֵי יִשְׂרָאֵל is formally 'sons of Israel'; this preserves the source expression,
    though 'people of Israel' is a possible smoother alternative.
- source_word: לְמִשְׁמֶרֶת
  chosen: be kept
  alternatives:
  - for keeping
  - for safekeeping
  - as a reserve
  lexicon: HALOT
  rationale: The noun denotes something kept/guarded in custody. In English, converting
    the noun phrase into the verbal expression 'be kept' yields natural sense without
    loss.
- source_word: לְמֵי נִדָּה
  chosen: for water for impurity
  alternatives:
  - for water of impurity
  - for water for removal of impurity
  - for purification water
  lexicon: HALOT
  rationale: Literally the phrase is 'for waters of niddah.' In this context נִדָּה
    denotes impurity/uncleanness rather than its narrower later associations. 'Water
    for impurity' preserves the formal structure while signaling ritual use. A smoother
    idiomatic alternative is preserved in a footnote.
- source_word: חַטָּאת הִוא
  chosen: it is a sin offering
  alternatives:
  - it is a purification offering
  - it is for sin
  lexicon: HALOT
  rationale: חַטָּאת can denote 'sin,' 'sin offering,' or in ritual contexts a purification
    offering. Because the sacrificial context is explicit, 'sin offering' is a defensible
    default, but the purification nuance is significant and preserved in a footnote.
