theological_decisions:
- issue: Rendering of ritual-purity terminology in Numbers 19
  chosen_reading: Use 'unclean' and 'water for impurity' in straightforward cultic
    sense without importing later theological interpretation.
  alternative_readings:
  - Use traditional 'water of separation'
  - Use more interpretive 'water for purification'
  rationale: The verse concerns ceremonial impurity regulations, not moral guilt.
    The translation preserves the ritual category and avoids doctrinal overreading.
    'Water for impurity' stays closer to the Hebrew while a clarifying alternative
    is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
