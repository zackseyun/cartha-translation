id: NUM.19.21
reference: Numbers 19:21
source:
  edition: WLC
  text: וְ/הָיְתָ֥ה לָּ/הֶ֖ם לְ/חֻקַּ֣ת עוֹלָ֑ם וּ/מַזֵּ֤ה מֵֽי הַ/נִּדָּה֙ יְכַבֵּ֣ס
    בְּגָדָ֔י/ו וְ/הַ/נֹּגֵ֨עַ֙ בְּ/מֵ֣י הַ/נִּדָּ֔ה יִטְמָ֖א עַד הָ/עָֽרֶב־־׃
translation:
  text: 'And this shall be a permanent statute for them: the one who sprinkles the
    water for impurity shall wash his clothes, and the one who touches the water for
    impurity shall be unclean until the evening.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the water for cleansing from impurity''; traditionally, ''the water
      of separation.'' Hebrew: ''the waters of impurity.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: And this shall be
  alternatives:
  - And it shall be
  - And it will become
  lexicon: HALOT
  rationale: Introduces the regulation's continuing force. Supplying 'this' in English
    clarifies the feminine singular verb with the implied statute/regulation from
    context.
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - to them
  lexicon: HALOT
  rationale: 'The preposition here marks applicability/benefit: the statute is binding
    for the Israelites.'
- source_word: לְחֻקַּת עוֹלָם
  chosen: a permanent statute
  alternatives:
  - a perpetual statute
  - an everlasting statute
  lexicon: HALOT
  rationale: חֻקָּה is a fixed statute or prescribed ordinance; עוֹלָם here denotes
    enduring duration within covenantal/legal context. 'Permanent statute' is natural
    modern English while preserving the sense of ongoing obligation.
- source_word: וּמַזֵּה
  chosen: the one who sprinkles
  alternatives:
  - whoever sprinkles
  - the sprinkler
  lexicon: HALOT
  rationale: The participle functions substantivally, referring to the person performing
    the ritual action.
- source_word: מֵי הַנִּדָּה
  chosen: the water for impurity
  alternatives:
  - the water of impurity
  - the water for cleansing from impurity
  - the water of separation
  lexicon: HALOT
  rationale: Literally 'waters of niddah.' In Numbers 19 this refers to the specially
    prepared water used in purification from corpse-impurity. 'Water for impurity'
    preserves the Hebrew construction without importing the more traditional but less
    transparent 'water of separation.' Because English could misunderstand the phrase,
    an alternative explanatory rendering is preserved in a footnote.
- source_word: יְכַבֵּס בְּגָדָיו
  chosen: shall wash his clothes
  alternatives:
  - must wash his garments
  lexicon: HALOT
  rationale: כִּבֵּס commonly means washing garments/clothes. 'Clothes' is more readable
    modern English than 'garments'.
- source_word: וְהַנֹּגֵעַ
  chosen: and the one who touches
  alternatives:
  - and whoever touches
  lexicon: HALOT
  rationale: Another substantival participle, parallel to 'the one who sprinkles.'
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - will become unclean
  lexicon: HALOT
  rationale: Standard ritual-purity terminology; 'unclean' is the established and
    accurate English equivalent in this cultic context.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: Both are possible; the article is naturally represented in English as
    'the evening,' though the phrase idiomatically means the period ending at evening.
