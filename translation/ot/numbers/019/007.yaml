id: NUM.19.7
reference: Numbers 19:7
source:
  edition: WLC
  text: וְ/כִבֶּ֨ס בְּגָדָ֜י/ו הַ/כֹּהֵ֗ן וְ/רָחַ֤ץ בְּשָׂר/וֹ֙ בַּ/מַּ֔יִם וְ/אַחַ֖ר
    יָב֣וֹא אֶל הַֽ/מַּחֲנֶ֑ה וְ/טָמֵ֥א הַ/כֹּהֵ֖ן עַד הָ/עָֽרֶב־־׃
translation:
  text: Then the priest shall wash his clothes and bathe his body in water, and afterward
    he may come into the camp; but the priest shall be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he may enter the camp.' The Hebrew can be understood as permitted reentry
      after the required washing.
    reason: lexical_alternative
  - marker: b
    text: '''Unclean'' here refers to ritual impurity, not necessarily personal sin
      or moral fault.'
    reason: cultural_note
lexical_decisions:
- source_word: וְכִבֶּס
  chosen: shall wash
  alternatives:
  - must wash
  - washed
  lexicon: HALOT
  rationale: Piel of כבס commonly means to wash garments. English future/modal 'shall
    wash' fits the legal instruction context better than a simple past, even though
    the Hebrew form is formally perfect in procedural legislation.
- source_word: בְּגָדָיו
  chosen: his clothes
  alternatives:
  - his garments
  lexicon: HALOT
  rationale: '''Clothes'' is more natural modern English while preserving the meaning
    of garments/clothing.'
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כהן in cultic/legal contexts.
- source_word: וְרָחַץ
  chosen: bathe
  alternatives:
  - wash
  lexicon: HALOT
  rationale: Used with 'his body in water,' so 'bathe' avoids awkward repetition with
    the prior 'wash' and reflects full-body washing.
- source_word: בְּשָׂרוֹ
  chosen: his body
  alternatives:
  - his flesh
  lexicon: HALOT
  rationale: Although בשר is literally 'flesh,' in this ritual washing context it
    refers to the person's body. 'Body' is clearer modern English; 'flesh' would sound
    overly literal and potentially misleading.
- source_word: בַּמַּיִם
  chosen: in water
  alternatives:
  - with water
  lexicon: HALOT
  rationale: The preposition with רחץ naturally yields 'in water' in English for bathing/washing
    contexts.
- source_word: וְאַחַר
  chosen: afterward
  alternatives:
  - after that
  - then
  lexicon: HALOT
  rationale: Marks sequence in the ritual procedure. 'Afterward' is concise and natural.
- source_word: יָבֹא אֶל־הַמַּחֲנֶה
  chosen: he may come into the camp
  alternatives:
  - he shall come into the camp
  - he may enter the camp
  lexicon: HALOT
  rationale: The imperfect here indicates permitted subsequent action after washing.
    'May come into' captures allowance rather than a strict command.
- source_word: וְטָמֵא
  chosen: shall be unclean
  alternatives:
  - is unclean
  - will be unclean
  lexicon: HALOT
  rationale: In legal material, English 'shall be unclean' communicates ritual status
    clearly and idiomatically.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: Both are possible; the article is naturally represented by 'the evening'
    in English, and this phrasing is common in ritual legislation.
