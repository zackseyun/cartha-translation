theological_decisions:
- issue: Nature of impurity
  chosen_reading: ritual uncleanness, not moral guilt
  alternative_readings:
  - moral impurity
  rationale: In the context of Numbers 19, contact with the purification rite renders
    participants ceremonially unclean for a time. The translation uses 'unclean' without
    importing moral condemnation, preserving the cultic sense of טמא.
