theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew is grammatically masculine plural in a corporate covenantal
    expression. Following the stated gender-accurate policy, the translation preserves
    'sons' rather than flattening to a neutral collective, while recognizing the corporate
    reference includes the whole people.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Rendering of ritual impurity language
  chosen_reading: unclean
  alternative_readings:
  - impure
  rationale: The verse concerns ceremonial impurity, not moral defilement. 'Unclean'
    is the established and clearest English equivalent in priestly legislation, provided
    the rationale documents its ritual sense.
