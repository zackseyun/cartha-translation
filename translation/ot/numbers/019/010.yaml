id: NUM.19.10
reference: Numbers 19:10
source:
  edition: WLC
  text: וְ֠/כִבֶּס הָ/אֹסֵ֨ף אֶת אֵ֤פֶר הַ/פָּרָה֙ אֶת בְּגָדָ֔י/ו וְ/טָמֵ֖א עַד הָ/עָ֑רֶב
    וְֽ/הָיְתָ֞ה לִ/בְנֵ֣י יִשְׂרָאֵ֗ל וְ/לַ/גֵּ֛ר הַ/גָּ֥ר בְּ/תוֹכָ֖/ם לְ/חֻקַּ֥ת
    עוֹלָֽם־־־׃
translation:
  text: And the one who gathers the ashes of the heifer shall wash his clothes, and
    he shall be unclean until the evening. And this shall be for the sons of Israel
    and for the sojourner who sojourns among them as a permanent statute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the Israelites' / 'for the people of Israel.' The Hebrew reads 'for
      the sons of Israel,' a corporate covenantal expression.
    reason: lexical_alternative
  - marker: b
    text: Or 'as a perpetual statute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹסֵף
  chosen: the one who gathers
  alternatives:
  - he who gathers
  - the gatherer
  lexicon: HALOT
  rationale: Qal participle with article functions substantivally, referring to the
    person performing the gathering. 'The one who gathers' is natural modern English
    and preserves the participial force better than a simple finite verb alone.
- source_word: אֵפֶר הַפָּרָה
  chosen: the ashes of the heifer
  alternatives:
  - the ash of the cow
  - the ashes of the cow
  lexicon: HALOT
  rationale: אֵפֶר can be collective 'ashes/ash'; in English 'ashes' is the idiomatic
    rendering in ritual contexts. פָּרָה is specifically a female bovine, hence 'heifer'
    is more precise than the generic 'cow,' especially in the context of the red heifer
    rite.
- source_word: כִבֶּס ... אֶת בְּגָדָיו
  chosen: shall wash his clothes
  alternatives:
  - must wash his clothes
  - shall launder his garments
  lexicon: HALOT
  rationale: כִבֶּס in priestly purity contexts refers to washing garments. 'Shall
    wash his clothes' is standard, clear, and appropriately formal for legal material.
- source_word: וְטָמֵא
  chosen: and he shall be unclean
  alternatives:
  - and he will be unclean
  - and he shall become unclean
  lexicon: HALOT
  rationale: טָמֵא in this context denotes ritual impurity status. 'Be unclean' communicates
    the state without importing moral impurity. 'Become unclean' is possible, but
    the verbless/resultative legal style is well represented by 'shall be unclean.'
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  lexicon: HALOT
  rationale: Both are possible; 'until the evening' closely reflects the Hebrew with
    article while remaining natural English.
- source_word: וְהָיְתָה
  chosen: this shall be
  alternatives:
  - it shall be
  - and it shall be
  lexicon: HALOT
  rationale: The feminine singular verb refers back to the ordinance/regulation implied
    by the preceding legislation. 'This shall be' makes the referent clear in English.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: for the sons of Israel
  alternatives:
  - for the people of Israel
  - for the Israelites
  lexicon: HALOT
  rationale: Per gender-accurate philosophy, בְּנֵי is retained as 'sons' rather than
    neutralized, while still functioning corporately. This preserves the source form
    and covenantal idiom.
- source_word: וְלַגֵּר הַגָּר בְּתוֹכָם
  chosen: and for the sojourner who sojourns among them
  alternatives:
  - and for the stranger residing among them
  - and for the resident alien who resides among them
  lexicon: HALOT
  rationale: גֵּר denotes a non-native resident living within Israelite society. 'Sojourner'
    is a transparent biblical-legal term that avoids some modern political connotations
    of 'alien' while preserving outsider-yet-resident status. The participle הַגָּר
    is echoed with 'who sojourns' to reflect the Hebrew repetition.
- source_word: לְחֻקַּת עוֹלָם
  chosen: as a permanent statute
  alternatives:
  - as a perpetual statute
  - as an everlasting statute
  lexicon: HALOT
  rationale: חֻקָּה is a fixed statute or ordinance. עוֹלָם in legal formulas often
    denotes enduring/perpetual duration within covenantal framing. 'Permanent statute'
    is readable modern English; 'perpetual statute' is a viable more traditional alternative.
