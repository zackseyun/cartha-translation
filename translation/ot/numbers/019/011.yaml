theological_decisions:
- issue: Rendering of אָדָם in a legal/generic context
  chosen_reading: person
  alternative_readings:
  - man
  - human being
  rationale: The doctrine guidelines call for gender-accurate rather than gender-neutral
    rendering according to source intent. Here אָדָם is generic for a human being,
    not specifically male, so 'person' accurately conveys the legal scope without
    importing male specificity.
