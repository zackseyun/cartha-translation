id: NUM.19.11
reference: Numbers 19:11
source:
  edition: WLC
  text: הַ/נֹּגֵ֥עַ בְּ/מֵ֖ת לְ/כָל נֶ֣פֶשׁ אָדָ֑ם וְ/טָמֵ֖א שִׁבְעַ֥ת יָמִֽים־׃
translation:
  text: Whoever touches a dead body of any person shall be unclean seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a corpse' or more literally 'the dead.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'of any soul/person of man,' meaning any human being.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֹּגֵעַ
  chosen: Whoever touches
  alternatives:
  - The one who touches
  - Anyone who touches
  lexicon: HALOT
  rationale: The participle with article functions substantivally and generically,
    referring to any person in this situation. 'Whoever touches' is natural modern
    English and preserves the legal/general force.
- source_word: בְּמֵת
  chosen: a dead body
  alternatives:
  - the dead
  - a corpse
  lexicon: HALOT
  rationale: מֵת literally denotes a dead person/the dead. In English, after 'touches,'
    'a dead body' communicates the concrete ritual context more clearly than the abstract
    'the dead.' 'Corpse' is possible but slightly less natural for general readers.
- source_word: לְכָל נֶפֶשׁ אָדָם
  chosen: of any person
  alternatives:
  - of any human being
  - of any man
  lexicon: HALOT
  rationale: This phrase intensifies/specifies the referent as any human life/person.
    'Any person' is clear and idiomatic. Although אָדָם can be 'man' or 'humankind,'
    here the sense is generic human, not specifically male; thus 'person' best matches
    the intent while remaining gender-accurate to the context.
- source_word: וְטָמֵא
  chosen: shall be unclean
  alternatives:
  - and he shall be unclean
  - becomes unclean
  lexicon: HALOT
  rationale: In legal material, the perfect with prefixed conjunction often carries
    result/future force. 'Shall be unclean' fits English legal style and preserves
    the prescriptive consequence. 'And he shall be unclean' is more formally literal
    but less natural.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  lexicon: HALOT
  rationale: Straightforward duration phrase; rendered directly and idiomatically.
