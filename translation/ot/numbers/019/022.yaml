id: NUM.19.22
reference: Numbers 19:22
source:
  edition: WLC
  text: וְ/כֹ֛ל אֲשֶׁר יִגַּע בּ֥/וֹ הַ/טָּמֵ֖א יִטְמָ֑א וְ/הַ/נֶּ֥פֶשׁ הַ/נֹּגַ֖עַת
    תִּטְמָ֥א עַד הָ/עָֽרֶב־־־׃פ
translation:
  text: And everything that the unclean person touches shall become unclean, and the
    person who touches it shall be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And every person who touches it shall be unclean until evening.' Hebrew
      nephesh literally means 'soul' but often refers to a person.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  chosen: And everything
  alternatives:
  - And all
  - And whatever
  lexicon: HALOT
  rationale: כֹּל with prefixed conjunction introduces a comprehensive statement.
    'Everything' is natural modern English and preserves the totalizing force.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  - whatever
  lexicon: HALOT
  rationale: Relative particle linking 'everything' to the following clause. 'That'
    is the most idiomatic English relative here.
- source_word: יִגַּע בּוֹ
  chosen: touches
  alternatives:
  - comes into contact with
  lexicon: HALOT
  rationale: נגע commonly means 'touch' or 'make contact with.' The preposition בּוֹ
    is absorbed naturally into English as the direct object sense 'touches,' avoiding
    awkward literalism while preserving the ritual-contact idea.
- source_word: הַטָּמֵא
  chosen: the unclean person
  alternatives:
  - the unclean one
  - the one who is unclean
  lexicon: HALOT
  rationale: The adjective functions substantivally for a person in a ritual state
    of impurity. 'The unclean person' makes the referent explicit in clear English.
- source_word: יִטְמָא
  chosen: shall become unclean
  alternatives:
  - shall be unclean
  - will become impure
  lexicon: HALOT
  rationale: The verb denotes entering or being rendered into a state of ritual impurity.
    'Shall become unclean' best captures the resulting change of state in this context.
- source_word: וְהַנֶּפֶשׁ
  chosen: and the person
  alternatives:
  - and the soul
  - and the individual
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean 'soul,' 'life,' or 'person.' In legal/ritual contexts
    it often refers to the person as a whole. 'Person' is the clearest and least misleading
    here.
- source_word: הַנֹּגַעַת
  chosen: who touches it
  alternatives:
  - that touches it
  - who comes into contact with it
  lexicon: HALOT
  rationale: The feminine singular participle agrees with נֶפֶשׁ and describes the
    person by the act of touching. English personal relative 'who' is appropriate;
    'it' is supplied from the prior object context.
- source_word: תִּטְמָא
  chosen: shall be unclean
  alternatives:
  - shall become unclean
  - will be impure
  lexicon: HALOT
  rationale: Here the focus is the resulting state borne by the touching person. 'Shall
    be unclean' reads smoothly in English and fits the legal consequence.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  - until sundown
  lexicon: HALOT
  rationale: Standard temporal expression in purity legislation. 'Until the evening'
    is slightly more formal and preserves the article in a natural way.
