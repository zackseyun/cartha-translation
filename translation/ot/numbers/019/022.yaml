theological_decisions:
- issue: Nature of impurity language in ritual law
  chosen_reading: Render טמא/יטמא as 'unclean' rather than 'defiled' or 'sinful.'
  alternative_readings:
  - defiled
  - impure
  rationale: The verse concerns ritual impurity transmitted by contact, not necessarily
    moral guilt. 'Unclean' is the standard and clearest English term for this legal-ritual
    category and avoids importing moralized theology the text does not state.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    what the text states without importing doctrinal claims.'
