theological_decisions:
- issue: Nature of purification language in חטא/טהר ritual context
  chosen_reading: Render in terms of ritual purification rather than moral atonement
  alternative_readings:
  - cleanse him from sin
  - make atonement for him
  rationale: The context is corpse impurity and the water of purification, so the
    language concerns ceremonial cleansing. Translating with overtly moral or expiatory
    language here would import theological claims the verse itself does not make.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
- issue: Gender rendering of substantival adjectives הַטָּהֹר / הַטָּמֵא
  chosen_reading: Use 'person' rather than 'man'
  alternative_readings:
  - the clean man ... the unclean man
  rationale: The Hebrew forms are masculine singular, but in legal material they function
    representatively. Per doctrine, gender-accurate over gender-neutral means matching
    source intent; here the intent is generic participation in the ritual, not male-specific
    identity.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
