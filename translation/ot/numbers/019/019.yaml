id: NUM.19.19
reference: Numbers 19:19
source:
  edition: WLC
  text: וְ/הִזָּ֤ה הַ/טָּהֹר֙ עַל הַ/טָּמֵ֔א בַּ/יּ֥וֹם הַ/שְּׁלִישִׁ֖י וּ/בַ/יּ֣וֹם
    הַ/שְּׁבִיעִ֑י וְ/חִטְּא/וֹ֙ בַּ/יּ֣וֹם הַ/שְּׁבִיעִ֔י וְ/כִבֶּ֧ס בְּגָדָ֛י/ו
    וְ/רָחַ֥ץ בַּ/מַּ֖יִם וְ/טָהֵ֥ר בָּ/עָֽרֶב־׃
translation:
  text: And the clean person shall sprinkle the unclean person on the third day and
    on the seventh day; thus he shall purify him on the seventh day. Then he shall
    wash his clothes and bathe in water, and he shall be clean at evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and he shall cleanse him'; the Hebrew verb here is the same root often
      associated with sin/purification language, but in this context it refers to
      ritual purification from impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִזָּה
  chosen: shall sprinkle
  alternatives:
  - shall spatter
  - shall sprinkle on
  lexicon: HALOT
  rationale: The Hiphil of נזה in this ritual context refers to applying the water
    of purification by sprinkling. 'Shall sprinkle' is standard, clear modern English
    and fits the cultic action without over-paraphrase.
- source_word: הַטָּהֹר
  chosen: the clean person
  alternatives:
  - the one who is clean
  - the clean man
  lexicon: HALOT
  rationale: The adjective functions substantivally for a ritually clean individual.
    'Person' preserves the representative sense without importing male specificity
    not required by the ritual context.
- source_word: הַטָּמֵא
  chosen: the unclean person
  alternatives:
  - the one who is unclean
  - the defiled person
  lexicon: HALOT
  rationale: The adjective is likewise substantive and refers to ritual impurity.
    'Unclean person' is the most direct rendering; 'defiled' is possible but less
    transparent in this purification-law context.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי וּבַיּוֹם הַשְּׁבִיעִי
  chosen: on the third day and on the seventh day
  alternatives:
  - on day three and on day seven
  lexicon: HALOT
  rationale: A straightforward temporal expression. Repeating 'on' reflects the Hebrew
    structure and keeps the ritual timing explicit.
- source_word: וְחִטְּאוֹ
  chosen: thus he shall purify him
  alternatives:
  - and he shall cleanse him from sin
  - and he shall decontaminate him
  lexicon: HALOT
  rationale: The Piel of חטא in purification contexts means to remove impurity/purify,
    not necessarily moral forgiveness. 'Purify him' best captures the ritual sense
    in idiomatic English. 'Thus' makes explicit the resultive force of the sequence
    before the seventh-day clause.
- source_word: וְכִבֶּס בְּגָדָיו
  chosen: he shall wash his clothes
  alternatives:
  - he shall wash his garments
  lexicon: HALOT
  rationale: '''Clothes'' is more natural modern English than ''garments'' while remaining
    accurate.'
- source_word: וְרָחַץ בַּמַּיִם
  chosen: bathe in water
  alternatives:
  - wash himself in water
  - bathe with water
  lexicon: HALOT
  rationale: In this ritual sequence רחץ with the person as subject commonly implies
    washing the body. 'Bathe in water' is concise and idiomatic, making the implied
    reflexive sense clear in English.
- source_word: וְטָהֵר
  chosen: he shall be clean
  alternatives:
  - he shall become clean
  - he shall be purified
  lexicon: HALOT
  rationale: The verb marks the resulting state after the washing. 'Be clean' is a
    natural rendering for restored ritual cleanness.
- source_word: בָּעָרֶב
  chosen: at evening
  alternatives:
  - by evening
  - in the evening
  lexicon: HALOT
  rationale: The phrase indicates the time when cleanness is restored. 'At evening'
    is slightly more formal and matches the legal-ritual register.
