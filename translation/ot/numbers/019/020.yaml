theological_decisions:
- issue: Nature of the penalty in 'cut off'
  chosen_reading: Retain the idiom 'shall be cut off' without specifying death, excommunication,
    or divine judgment alone.
  alternative_readings:
  - shall be excluded from the community
  - shall be put to death
  rationale: The Hebrew covenant formula does not itself define the mechanism here.
    Preserving the idiom maintains the text's theological and legal gravity without
    importing a debated interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
