id: NUM.19.20
reference: Numbers 19:20
source:
  edition: WLC
  text: וְ/אִ֤ישׁ אֲשֶׁר יִטְמָא֙ וְ/לֹ֣א יִתְחַטָּ֔א וְ/נִכְרְתָ֛ה הַ/נֶּ֥פֶשׁ הַ/הִ֖וא
    מִ/תּ֣וֹךְ הַ/קָּהָ֑ל כִּי֩ אֶת מִקְדַּ֨שׁ יְהוָ֜ה טִמֵּ֗א מֵ֥י נִדָּ֛ה לֹא זֹרַ֥ק
    עָלָ֖י/ו טָמֵ֥א הֽוּא־־־׃
translation:
  text: But the man who becomes unclean and does not purify himself—that person shall
    be cut off from the midst of the assembly, because he has defiled the sanctuary
    of the LORD. The water for impurity has not been sprinkled on him; he is unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that soul shall be cut off.' The Hebrew legal formula can refer to the
      person as a whole, not only the immaterial soul.
    reason: lexical_alternative
  - marker: b
    text: Or 'the water of impurity'; traditionally, 'the water of separation.' The
      phrase refers to the purification water prepared in this chapter.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: the man
  alternatives:
  - the person
  - anyone
  lexicon: HALOT
  rationale: Hebrew אִישׁ is grammatically masculine singular, here used generically
    for an individual Israelite. Per gender-accurate policy, 'the man' preserves the
    source form while still functioning representatively in context.
- source_word: יִטְמָא
  chosen: becomes unclean
  alternatives:
  - is unclean
  - defiles himself
  lexicon: HALOT
  rationale: Qal imperfect of טמא here denotes entering a state of ritual impurity,
    not necessarily active moral defilement. 'Becomes unclean' best captures the ingressive
    sense in context.
- source_word: יִתְחַטָּא
  chosen: purify himself
  alternatives:
  - cleanse himself
  - decontaminate himself
  lexicon: HALOT
  rationale: The hitpael of חטא in purification contexts means to undergo purification
    from impurity, not 'sin' in the ordinary moral sense. 'Purify himself' is idiomatic
    and contextually precise.
- source_word: וְנִכְרְתָה הַנֶּפֶשׁ הַהִוא
  chosen: that person shall be cut off
  alternatives:
  - that soul shall be cut off
  - that life shall be cut off
  lexicon: HALOT
  rationale: נפש can literally be 'soul,' but in legal formulae like this it commonly
    refers to the person. 'Cut off' preserves the covenantal/judicial idiom without
    over-specifying the exact penalty.
- source_word: מִתּוֹךְ הַקָּהָל
  chosen: from the midst of the assembly
  alternatives:
  - from among the congregation
  - from the community
  lexicon: HALOT
  rationale: קהל is the gathered covenant community. 'Assembly' is a clear modern
    equivalent that preserves the communal/legal sense; 'from the midst of' reflects
    the Hebrew prepositional phrase closely.
- source_word: מִקְדַּשׁ יְהוָה
  chosen: the sanctuary of the LORD
  alternatives:
  - the holy place of the LORD
  - the LORD's sanctuary
  lexicon: HALOT
  rationale: מקדש refers to the sanctuary/holy precinct. The divine name is rendered
    'the LORD' per doctrine. This phrase refers to the sacred dwelling place rendered
    impure by the person's condition.
- source_word: טִמֵּא
  chosen: has defiled
  alternatives:
  - has made unclean
  - has polluted
  lexicon: HALOT
  rationale: 'In relation to the sanctuary, the piel of טמא is causative: the person
    has rendered it unclean by remaining impure. ''Has defiled'' communicates the
    cultic seriousness in natural English.'
- source_word: מֵי נִדָּה
  chosen: the water for impurity
  alternatives:
  - the water of impurity
  - the water for cleansing from impurity
  - the water of separation
  lexicon: HALOT
  rationale: This phrase denotes the specially prepared water used to remove corpse
    impurity in this chapter. 'Water for impurity' is a fairly literal rendering that
    avoids the traditional but potentially misleading 'water of separation'; the function
    is clarified by context.
- source_word: זֹרַק עָלָיו
  chosen: has not been sprinkled on him
  alternatives:
  - was not thrown on him
  - has not been dashed upon him
  lexicon: HALOT
  rationale: זרק in ritual contexts commonly refers to sprinkling/tossing liquid.
    English 'sprinkled on him' is the standard natural rendering for this cultic action.
- source_word: טָמֵא הוּא
  chosen: he is unclean
  alternatives:
  - he remains unclean
  - unclean is he
  lexicon: HALOT
  rationale: The verbless clause gives the resulting status. 'He is unclean' is direct
    and preserves the legal declaration; 'remains unclean' is interpretive and therefore
    left as an alternative only.
