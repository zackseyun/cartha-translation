id: NUM.19.5
reference: Numbers 19:5
source:
  edition: WLC
  text: וְ/שָׂרַ֥ף אֶת הַ/פָּרָ֖ה לְ/עֵינָ֑י/ו אֶת עֹרָ֤/הּ וְ/אֶת בְּשָׂרָ/הּ֙ וְ/אֶת
    דָּמָ֔/הּ עַל פִּרְשָׁ֖/הּ יִשְׂרֹֽף־־־־־׃
translation:
  text: And he shall burn the cow before his eyes—its hide, its flesh, its blood,
    along with its dung, he shall burn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heifer.' The Hebrew פָּרָה can denote a female bovine; 'cow' is
      used here as clear modern English, while 'heifer' remains a viable alternative
      in this ritual context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׂרַף
  chosen: And he shall burn
  alternatives:
  - and he burned
  - then he shall burn
  lexicon: HALOT
  rationale: 'The form is a waw + qatal used in procedural legal/instructional sequence,
    naturally rendered with future/modal force in English ritual law: ''and he shall
    burn.'' This matches the prescriptive context of Numbers 19.'
- source_word: הַפָּרָה
  chosen: the cow
  alternatives:
  - the heifer
  - the young cow
  lexicon: HALOT
  rationale: פָּרָה denotes a cow/heifer. Since the immediately broader context specifies
    a red female bovine, 'cow' is clear modern English and avoids unnecessary archaism.
    'Heifer' is possible, but the Hebrew term itself here does not require emphasizing
    youth in the English line.
- source_word: לְעֵינָיו
  chosen: before his eyes
  alternatives:
  - in his sight
  - before him
  lexicon: HALOT
  rationale: Literally 'to/for his eyes,' an idiom meaning in his presence or sight.
    'Before his eyes' preserves the vividness and formal feel of the Hebrew while
    remaining natural English.
- source_word: עֹרָהּ
  chosen: its hide
  alternatives:
  - its skin
  lexicon: HALOT
  rationale: עוֹר commonly means skin/hide. 'Hide' fits an animal carcass context
    slightly better and distinguishes the outer covering from flesh.
- source_word: בְּשָׂרָהּ
  chosen: its flesh
  alternatives:
  - its meat
  - its body
  lexicon: HALOT
  rationale: בָּשָׂר is the standard term for flesh. 'Flesh' is the most direct and
    contextually appropriate rendering in sacrificial legislation.
- source_word: דָּמָהּ
  chosen: its blood
  lexicon: HALOT
  rationale: Straightforward rendering of דָּם with pronominal suffix.
- source_word: עַל פִּרְשָׁהּ
  chosen: along with its dung
  alternatives:
  - with its dung
  - including its offal/excrement
  lexicon: HALOT
  rationale: פֶּרֶשׁ refers to dung/excrement. The preposition עַל here is idiomatic
    in the sense of addition or accompaniment in the burning list. 'Along with its
    dung' communicates that the dung is included in what is burned. 'Offal' is less
    precise because the Hebrew points specifically to excrement, not merely entrails.
- source_word: יִשְׂרֹף
  chosen: he shall burn
  alternatives:
  - he is to burn
  lexicon: HALOT
  rationale: Imperfect in legal instruction, reiterating the required action. Repeating
    'he shall burn' mirrors the Hebrew emphasis and closes the list forcefully.
