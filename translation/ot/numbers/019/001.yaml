theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the project's
    doctrine and contested-terms table, it is rendered 'the LORD' in the main text
    rather than transliterated. Because the alternatives are doctrinally noted but
    not required to be preserved in a footnote here, they are documented in the decision
    record.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
