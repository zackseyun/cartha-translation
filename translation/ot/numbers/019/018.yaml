theological_decisions:
- issue: Ritual purity terminology
  chosen_reading: clean
  alternative_readings:
  - pure
  rationale: The verse concerns ceremonial impurity from contact with death, not moral
    purity. 'Clean' better preserves the Levitical/Numbers purity framework without
    importing ethical connotations.
  doctrine_reference: Translation philosophy §6
- issue: Gendered representative language in אִישׁ
  chosen_reading: man
  alternative_readings:
  - person
  rationale: The Hebrew explicitly uses masculine singular אִישׁ. Following the gender-accurate
    policy, the translation keeps 'man' rather than neutralizing it, while the context
    indicates the role requirement is ritual cleanness.
  doctrine_reference: Translation philosophy §4
