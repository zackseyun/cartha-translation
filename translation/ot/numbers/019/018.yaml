id: NUM.19.18
reference: Numbers 19:18
source:
  edition: WLC
  text: וְ/לָקַ֨ח אֵז֜וֹב וְ/טָבַ֣ל בַּ/מַּיִם֮ אִ֣ישׁ טָהוֹר֒ וְ/הִזָּ֤ה עַל הָ/אֹ֨הֶל֙
    וְ/עַל כָּל הַ/כֵּלִ֔ים וְ/עַל הַ/נְּפָשׁ֖וֹת אֲשֶׁ֣ר הָֽיוּ שָׁ֑ם וְ/עַל הַ/נֹּגֵ֗עַ
    בַּ/עֶ֨צֶם֙ א֣וֹ בֶֽ/חָלָ֔ל א֥וֹ בַ/מֵּ֖ת א֥וֹ בַ/קָּֽבֶר־־־־־־׃
translation:
  text: Then a clean man shall take hyssop and dip it in the water, and sprinkle it
    on the tent, on all the vessels, on the persons who were there, and on the one
    who touched the bone, or the slain body, or the dead person, or the grave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a man who is clean.' The Hebrew is singular masculine.
    reason: lexical_alternative
  - marker: b
    text: Or 'the slain' or 'a slain body.' The Hebrew term refers specifically to
      one killed violently, distinguishing it from the more general 'dead person'
      in the next phrase.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵזוֹב
  chosen: hyssop
  alternatives:
  - a hyssop plant
  lexicon: HALOT
  rationale: Standard rendering for the ritual plant used in purification contexts;
    retaining the traditional botanical term is more precise than a generic 'plant'
    or 'branch.'
- source_word: בַּמַּיִם
  chosen: in the water
  alternatives:
  - in water
  lexicon: HALOT
  rationale: The article is present in Hebrew. 'The water' likely refers back to the
    water for impurity prepared in the context (vv. 9, 17), so the definite form is
    preserved.
- source_word: אִישׁ טָהוֹר
  chosen: a clean man
  alternatives:
  - a man who is clean
  - a pure man
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the Hebrew singular masculine noun.
    'Clean' fits the ritual-purity context better than 'pure,' which can sound moralized
    in English.
- source_word: וְהִזָּה
  chosen: sprinkle
  alternatives:
  - spatter
  - dash
  lexicon: HALOT
  rationale: Established ritual term for applying purification water by scattering
    droplets. 'Sprinkle' is natural English and matches the cultic action.
- source_word: הָאֹהֶל
  chosen: the tent
  alternatives:
  - the tent-dwelling
  - the dwelling
  lexicon: HALOT
  rationale: In the immediate context of corpse impurity, this refers to the tent
    in which death occurred, not the tabernacle. 'Tent' is the plain and contextually
    correct rendering.
- source_word: הַכֵּלִים
  chosen: the vessels
  alternatives:
  - the utensils
  - the articles
  - the objects
  lexicon: HALOT
  rationale: כְּלִי is a broad term for implements or containers. 'Vessels' preserves
    the ritual/cultic register without becoming overly technical.
- source_word: הַנְּפָשׁוֹת
  chosen: the persons
  alternatives:
  - the people
  - the souls
  lexicon: HALOT
  rationale: Though literally 'souls/lives,' in this context it refers to persons
    present in the tent. 'Persons' avoids misleading anthropological overtones while
    staying close to the Hebrew.
- source_word: הַנֹּגֵעַ
  chosen: the one who touched
  alternatives:
  - whoever touched
  - the person touching
  lexicon: HALOT
  rationale: The participle functions substantivally for a specific affected individual.
    'The one who touched' is both natural and close to the Hebrew form.
- source_word: בָּעֶצֶם
  chosen: the bone
  alternatives:
  - a bone
  lexicon: HALOT
  rationale: The prefixed article is present. In context this means a human bone as
    a source of corpse impurity; singular is retained as in Hebrew.
- source_word: בֶחָלָל
  chosen: the slain body
  alternatives:
  - one slain
  - a corpse of one slain
  - the slain
  lexicon: HALOT
  rationale: חָלָל in impurity contexts denotes one pierced/slain. 'The slain body'
    makes explicit that a corpse is in view, distinguishing it from the next term.
- source_word: בַמֵּת
  chosen: the dead person
  alternatives:
  - the dead body
  - a dead person
  - the corpse
  lexicon: HALOT
  rationale: מֵת is a broader term than חָלָל. Rendering it 'the dead person' preserves
    the distinction between a slain corpse and any dead human.
- source_word: בַקָּבֶר
  chosen: the grave
  alternatives:
  - a grave
  - the tomb
  - a burial place
  lexicon: HALOT
  rationale: Straightforward rendering of the noun for burial place. 'Grave' is the
    most natural modern English equivalent here.
