id: NUM.19.6
reference: Numbers 19:6
source:
  edition: WLC
  text: וְ/לָקַ֣ח הַ/כֹּהֵ֗ן עֵ֥ץ אֶ֛רֶז וְ/אֵז֖וֹב וּ/שְׁנִ֣י תוֹלָ֑עַת וְ/הִשְׁלִ֕יךְ
    אֶל תּ֖וֹךְ שְׂרֵפַ֥ת הַ/פָּרָֽה־׃
translation:
  text: Then the priest shall take cedar wood, hyssop, and scarlet yarn, and throw
    them into the midst of the burning of the cow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the burning of the heifer.' Traditional English versions often render
      פָּרָה here as 'heifer.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְלָקַח
  chosen: Then ... shall take
  alternatives:
  - and ... shall take
  - and took
  lexicon: HALOT
  rationale: The waw + qatal continues the ritual procedure with sequential force.
    In English legal/ritual style, 'Then ... shall take' best conveys the prescriptive
    sequence more naturally than a simple past, while preserving the action's formal
    character.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in cultic context; the definite article
    is preserved.
- source_word: עֵץ אֶרֶז
  chosen: cedar wood
  alternatives:
  - wood of cedar
  - cedar timber
  lexicon: HALOT
  rationale: The construct phrase literally means 'wood of cedar.' 'Cedar wood' is
    the natural English equivalent and preserves the material sense.
- source_word: וְאֵזוֹב
  chosen: hyssop
  lexicon: HALOT
  rationale: Traditional and standard rendering for אֵזוֹב. Although the exact botanical
    identification is debated, 'hyssop' remains the conventional lexical equivalent.
- source_word: וּשְׁנִי תוֹלָעַת
  chosen: scarlet yarn
  alternatives:
  - scarlet material
  - crimson yarn
  - scarlet thread
  lexicon: HALOT
  rationale: The phrase denotes scarlet-dyed material, literally involving the crimson
    color associated with the worm/dye source. 'Scarlet yarn' fits the ritual-object
    context and common Pentateuchal usage in English, without over-literalizing 'worm.'
- source_word: וְהִשְׁלִיךְ
  chosen: and throw
  alternatives:
  - and cast
  - and toss
  lexicon: HALOT
  rationale: Hiphil of שלך means to throw/cast. 'Throw' is clear modern English; 'cast'
    is possible but more archaic in this context.
- source_word: אֶל תּוֹךְ
  chosen: into the midst of
  alternatives:
  - into
  - into the middle of
  lexicon: HALOT
  rationale: The two-word expression is more specific than simple 'into'; it indicates
    placement into the interior/middle. 'Into the midst of' preserves that emphasis.
- source_word: שְׂרֵפַת הַפָּרָה
  chosen: the burning of the cow
  alternatives:
  - the burning of the heifer
  - the burning of the young cow
  lexicon: HALOT
  rationale: שְׂרֵפָה is 'burning/burning process,' not merely 'fire.' פָּרָה denotes
    a cow/heifer. Since the broader context specifies a red cow, and modern readers
    may hear 'heifer' as technical or less accessible, 'cow' is chosen here for readability
    while retaining the sacrificial animal's identity.
