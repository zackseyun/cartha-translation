theological_decisions:
- issue: Rendering of פָּרָה in the red-cow purification rite
  chosen_reading: cow
  alternative_readings:
  - heifer
  rationale: The Hebrew term can denote a female bovine, often rendered 'heifer' in
    this passage by tradition. 'Cow' is the plainer English equivalent and avoids
    importing a more technical term than the Hebrew itself requires. The traditional
    rendering is preserved in a footnote because of its familiarity and ritual significance
    in English Bible tradition.
  doctrine_reference: Translation philosophy §1, §6
