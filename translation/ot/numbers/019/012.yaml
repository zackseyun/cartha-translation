id: NUM.19.12
reference: Numbers 19:12
source:
  edition: WLC
  text: ה֣וּא יִתְחַטָּא ב֞/וֹ בַּ/יּ֧וֹם הַ/שְּׁלִישִׁ֛י וּ/בַ/יּ֥וֹם הַ/שְּׁבִיעִ֖י
    יִטְהָ֑ר וְ/אִם לֹ֨א יִתְחַטָּ֜א בַּ/יּ֧וֹם הַ/שְּׁלִישִׁ֛י וּ/בַ/יּ֥וֹם הַ/שְּׁבִיעִ֖י
    לֹ֥א יִטְהָֽר־־׃
translation:
  text: He shall purify himself with it on the third day and on the seventh day, and
    he will be clean; but if he does not purify himself on the third day and on the
    seventh day, he will not be clean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, with the water for impurity prepared earlier in the chapter.
    reason: cross_reference
  - marker: b
    text: Or 'cleanse himself.' The Hebrew verb here refers to undergoing ritual purification
      from impurity.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְחַטָּא
  chosen: purify himself
  alternatives:
  - decontaminate himself
  - cleanse himself
  - sin-purge himself
  lexicon: HALOT
  rationale: The hitpael of חטא in this ritual context means to undergo purification
    from impurity, not to 'sin.' 'Purify himself' is clear modern English and fits
    the red-heifer cleansing context of Numbers 19. The reflexive sense is preserved
    by 'himself,' though the action is performed by means of the purification water.
- source_word: בּוֹ
  chosen: with it
  alternatives:
  - by it
  - with this water
  lexicon: HALOT
  rationale: The pronoun most naturally refers back to the water for impurity prepared
    earlier in the chapter. 'With it' is concise and preserves the Hebrew pronominal
    reference without over-specifying in the main text.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  alternatives:
  - on day three
  lexicon: HALOT
  rationale: Standard temporal rendering of the prepositional phrase; 'on the third
    day' is idiomatic and formally close.
- source_word: וּבַיּוֹם הַשְּׁבִיעִי
  chosen: and on the seventh day
  alternatives:
  - and on day seven
  lexicon: HALOT
  rationale: Matches the Hebrew coordination and preserves the ritual sequence required
    for purification.
- source_word: יִטְהָר
  chosen: he will be clean
  alternatives:
  - he will be purified
  - he will become clean
  lexicon: HALOT
  rationale: The verb טהר here states the resulting clean status after the purification
    rite. Rendering it as 'be clean' distinguishes the result from יתחטא ('purify
    himself') and avoids collapsing two different Hebrew verbs into the same English
    gloss.
- source_word: וְאִם לֹא
  chosen: but if he does not
  alternatives:
  - and if he does not
  - if he does not
  lexicon: HALOT
  rationale: The conjunction introduces a contrastive conditional. 'But if' communicates
    the warning force in natural English while remaining faithful to the Hebrew syntax.
- source_word: הוּא
  chosen: He
  alternatives:
  - That person
  - The one
  lexicon: HALOT
  rationale: The explicit pronoun is naturally represented by 'He.' This preserves
    the masculine singular form of the Hebrew in keeping with the project's gender-accurate
    policy; in context it refers generically to the defiled person under discussion.
