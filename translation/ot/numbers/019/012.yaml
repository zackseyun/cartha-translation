theological_decisions:
- issue: Nature of ritual purification language in Numbers 19
  chosen_reading: Render the verse in terms of ritual purity/cleanness, not moral
    forgiveness or inward sanctification.
  alternative_readings:
  - Use more generalized spiritual language such as 'be cleansed' without ritual specificity
  rationale: The context is corpse impurity and the prescribed water of purification.
    The Hebrew verbs describe ceremonial purification status, so the English should
    not import later theological categories of moral cleansing beyond what the text
    states.
  doctrine_reference: Translation philosophy §§1, 3, 6
