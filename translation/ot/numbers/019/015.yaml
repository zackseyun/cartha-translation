id: NUM.19.15
reference: Numbers 19:15
source:
  edition: WLC
  text: וְ/כֹל֙ כְּלִ֣י פָת֔וּחַ אֲשֶׁ֛ר אֵין צָמִ֥יד פָּתִ֖יל עָלָ֑י/ו טָמֵ֖א הֽוּא־׃
translation:
  text: And every open vessel that does not have a tied cover on it is unclean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a fastened lid' or 'a sealed cover'; the Hebrew expression refers to
      a covering secured on the vessel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֹל
  chosen: And every
  alternatives:
  - and any
  - and all
  lexicon: HALOT
  rationale: וְ links this rule to the preceding context, and כֹל with a singular
    noun is naturally rendered distributively as 'every.'
- source_word: כְּלִי
  chosen: vessel
  alternatives:
  - container
  - utensil
  - article
  lexicon: HALOT
  rationale: כְּלִי is a broad term for an implement or container. In this purity-law
    context, 'vessel' best fits a receptacle that can be left open and become unclean.
- source_word: פָתוּחַ
  chosen: open
  alternatives:
  - uncovered
  lexicon: HALOT
  rationale: The adjective means 'opened/open.' 'Open' is the most direct rendering;
    the following clause specifies the absence of a cover or seal.
- source_word: אֲשֶׁר אֵין
  chosen: that does not have
  alternatives:
  - which has no
  - on which there is no
  lexicon: HALOT
  rationale: This relative clause introduces the qualifying condition. 'Does not have'
    is idiomatic English while preserving the Hebrew sense of absence.
- source_word: צָמִיד פָּתִיל
  chosen: a tied cover
  alternatives:
  - a fastened lid
  - a bound covering
  - a sealed cover
  lexicon: HALOT
  rationale: The paired nouns denote something fastened by binding, likely a cover
    secured with a cord or seal. 'Tied cover' preserves the concrete imagery without
    over-specifying the exact ancient mechanism. 'Sealed cover' is possible but slightly
    more interpretive.
- source_word: עָלָיו
  chosen: on it
  alternatives:
  - upon it
  - over it
  lexicon: HALOT
  rationale: The preposition indicates the cover's position on the vessel. 'On it'
    is natural modern English.
- source_word: טָמֵא הוּא
  chosen: is unclean
  alternatives:
  - it is unclean
  - is ritually unclean
  lexicon: HALOT
  rationale: The predicate states impurity status. 'Is unclean' is concise and standard;
    'ritually unclean' is interpretive and can be reserved for explanatory contexts
    rather than the main text.
