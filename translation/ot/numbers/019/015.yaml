theological_decisions:
- issue: Nature of impurity
  chosen_reading: Render טָמֵא simply as 'unclean' rather than 'ritually unclean'
    in the main text.
  alternative_readings:
  - ritually unclean
  rationale: The context is ceremonial purity, but the Hebrew text itself says only
    'unclean.' The translation preserves the source wording without importing explanatory
    terminology into the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never import doctrinal claims the text does not make.'
