id: NUM.19.16
reference: Numbers 19:16
source:
  edition: WLC
  text: וְ/כֹ֨ל אֲשֶׁר יִגַּ֜ע עַל פְּנֵ֣י הַ/שָּׂדֶ֗ה בַּֽ/חֲלַל חֶ֨רֶב֙ א֣וֹ בְ/מֵ֔ת
    אֽוֹ בְ/עֶ֥צֶם אָדָ֖ם א֣וֹ בְ/קָ֑בֶר יִטְמָ֖א שִׁבְעַ֥ת יָמִֽים־־־־׃
translation:
  text: And everyone who touches, in the open field, someone slain by the sword, or
    a dead body, or a human bone, or a grave, shall be unclean seven days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'upon the face of the field,' an idiom meaning out in
      the open field.
    reason: lexical_alternative
  - marker: b
    text: Or 'a corpse' for 'a dead body.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'a bone of a human/man'; here the sense is generic human remains,
      not specifically male.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  chosen: And everyone
  alternatives:
  - And whoever
  - And anyone
  lexicon: HALOT
  rationale: כֹל with a relative clause functions distributively here, referring to
    any person meeting the condition. 'Everyone' is natural modern English and preserves
    the universal scope.
- source_word: אֲשֶׁר יִגַּע
  chosen: who touches
  alternatives:
  - whoever touches
  - that touches
  lexicon: HALOT
  rationale: The relative particle plus Qal imperfect gives a general conditional
    sense. English present 'who touches' idiomatically expresses the case law force.
- source_word: עַל פְּנֵי הַשָּׂדֶה
  chosen: in the open field
  alternatives:
  - on the surface of the field
  - in the field
  lexicon: HALOT
  rationale: Literally 'upon the face of the field.' The idiom denotes being out in
    the open countryside rather than inside a structure. 'In the open field' captures
    the Hebrew idiom in readable English.
- source_word: בַּחֲלַל חֶרֶב
  chosen: someone slain by the sword
  alternatives:
  - one pierced by the sword
  - the slain of a sword
  - a sword-slain person
  lexicon: HALOT
  rationale: חָלָל denotes one slain/pierced, and חֶרֶב specifies the instrument.
    'Someone slain by the sword' is clear and preserves the personal referent implied
    by the adjective/substantive construction.
- source_word: אוֹ בְמֵת
  chosen: or a dead body
  alternatives:
  - or a dead person
  - or a corpse
  lexicon: HALOT
  rationale: מֵת can mean 'dead person' or 'corpse.' 'Dead body' is accessible modern
    English and fits the impurity context.
- source_word: אוֹ בְעֶצֶם אָדָם
  chosen: or a human bone
  alternatives:
  - or a bone of a man
  - or a person's bone
  lexicon: HALOT
  rationale: אָדָם here refers to a human being in general, not specifically a male.
    Per doctrine, the generic sense is best rendered non-male-specifically here. 'Human
    bone' is concise and accurate.
- source_word: אוֹ בְקָבֶר
  chosen: or a grave
  alternatives:
  - or a tomb
  - or a burial place
  lexicon: HALOT
  rationale: קֶבֶר commonly means grave or burial site. 'Grave' is the most straightforward
    equivalent in this legal context.
- source_word: יִטְמָא
  chosen: shall be unclean
  alternatives:
  - will be unclean
  - shall become unclean
  lexicon: HALOT
  rationale: The verb denotes ritual impurity in priestly law. 'Shall be unclean'
    preserves the legal register without overexplaining; the context makes ritual
    impurity clear.
- source_word: שִׁבְעַת יָמִים
  chosen: seven days
  lexicon: HALOT
  rationale: Standard cardinal expression; no special idiom requires expansion.
