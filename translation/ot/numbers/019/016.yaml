theological_decisions:
- issue: Rendering אָדָם in a generic human sense
  chosen_reading: human
  alternative_readings:
  - man
  rationale: Although אָדָם often may be rendered 'man,' here it refers generically
    to human remains in purity legislation, not specifically a male. This follows
    the doctrine's gender-accurate principle by matching the source intent rather
    than defaulting to male-specific English.
