theological_decisions:
- issue: Rendering חטאת in a ritual-purity context
  chosen_reading: purification offering
  alternative_readings:
  - sin offering
  rationale: The verse concerns remedy for ritual uncleanness through the red heifer
    ashes. Translating חטאת as 'purification offering' reflects the offering's cleansing
    function without importing a narrower moral-guilt sense. The traditional rendering
    remains viable and is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering מַיִם חַיִּים idiomatically
  chosen_reading: fresh water
  alternative_readings:
  - living water
  - running water
  rationale: The Hebrew idiom refers to water from a living/flowing source. 'Fresh
    water' is readable modern English and fits optimal equivalence, while the literal
    phrase 'living water' is preserved in a footnote because of its broader biblical
    resonance.
  doctrine_reference: Translation philosophy §6, §5
