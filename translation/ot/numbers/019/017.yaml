id: NUM.19.17
reference: Numbers 19:17
source:
  edition: WLC
  text: וְ/לָֽקְחוּ֙ לַ/טָּמֵ֔א מֵ/עֲפַ֖ר שְׂרֵפַ֣ת הַֽ/חַטָּ֑את וְ/נָתַ֥ן עָלָ֛י/ו
    מַ֥יִם חַיִּ֖ים אֶל כֶּֽלִי־׃
translation:
  text: And for the unclean person they shall take some of the dust from the burning
    of the purification offering, and he shall put fresh water on it in a vessel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the ashes from the burning of the sin offering.'
      The Hebrew uses 'dust' and the noun חטאת, which in priestly contexts can mean
      either 'sin offering' or, functionally, 'purification offering.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'living water'; that is, fresh or flowing water.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָקְחוּ
  chosen: they shall take
  alternatives:
  - they shall fetch
  - they shall gather
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in legal/instructional context
    functions with future/modal force; 'shall take' fits English legislative style
    and preserves the plural subject.
- source_word: לַטָּמֵא
  chosen: for the unclean person
  alternatives:
  - for the one who is unclean
  - for the impure person
  lexicon: HALOT
  rationale: The adjective with article and preposition denotes the person in a state
    of ritual uncleanness. 'Unclean person' is the standard and clearest rendering
    in this purity-law context.
- source_word: מֵעֲפַר
  chosen: some of the dust
  alternatives:
  - from the ashes
  - from the powder
  lexicon: HALOT
  rationale: The noun means 'dust' or loose particulate matter. Although English versions
    often use 'ashes' by context, the Hebrew here is not the normal word for ashes;
    'dust' preserves the lexical form while 'some of' reflects the partitive sense
    of מן.
- source_word: שְׂרֵפַת
  chosen: the burning
  alternatives:
  - the burnt remains
  - the incineration
  lexicon: HALOT
  rationale: Construct form from 'burning' or 'burning process.' 'The burning of'
    is transparent and lets the following noun specify what was burned.
- source_word: הַחַטָּאת
  chosen: the purification offering
  alternatives:
  - the sin offering
  lexicon: HALOT
  rationale: In priestly ritual contexts חטאת can denote the offering used for purification
    rather than primarily moral guilt. Here the red heifer rite removes ritual impurity,
    so 'purification offering' better reflects function. The traditional 'sin offering'
    is preserved in a footnote.
- source_word: וְנָתַן
  chosen: and he shall put
  alternatives:
  - and one shall put
  - and they shall put
  lexicon: HALOT
  rationale: The singular verb after a plural verb is idiomatic in legal material
    and may shift to an indefinite singular agent. 'He shall put' is a straightforward
    gender-accurate rendering of the Hebrew singular, without over-specifying identity.
- source_word: עָלָיו
  chosen: on it
  alternatives:
  - upon it
  - over it
  lexicon: HALOT
  rationale: The pronoun most naturally refers back to the dust/ash material just
    mentioned. 'On it' is the plain English equivalent.
- source_word: מַיִם חַיִּים
  chosen: fresh water
  alternatives:
  - living water
  - running water
  lexicon: HALOT
  rationale: Literally 'living water,' an idiom for water from a fresh, flowing source.
    'Fresh water' communicates the ritual requirement in natural English; the more
    literal alternative is preserved in a footnote.
- source_word: אֶל כֶּלִי
  chosen: in a vessel
  alternatives:
  - into a vessel
  - into a container
  lexicon: HALOT
  rationale: The preposition can indicate movement into, but in English the resulting
    state is best expressed as 'in a vessel.' 'Vessel' preserves the ritual-register
    tone better than 'container.'
