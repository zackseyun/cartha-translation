theological_decisions:
- issue: Rendering ritual impurity terminology
  chosen_reading: unclean
  alternative_readings:
  - impure
  - ritually unclean
  rationale: The Hebrew טמא in priestly legislation denotes ritual impurity, not necessarily
    moral defilement. 'Unclean' is the established concise English equivalent; the
    ritual sense is determined by context. 'Ritually unclean' is accurate but unnecessarily
    expansive in the main text for this straightforward legal verse.
