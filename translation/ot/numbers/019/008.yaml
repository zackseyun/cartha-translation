id: NUM.19.8
reference: Numbers 19:8
source:
  edition: WLC
  text: וְ/הַ/שֹּׂרֵ֣ף אֹתָ֔/הּ יְכַבֵּ֤ס בְּגָדָי/ו֙ בַּ/מַּ֔יִם וְ/רָחַ֥ץ בְּשָׂר֖/וֹ
    בַּ/מָּ֑יִם וְ/טָמֵ֖א עַד הָ/עָֽרֶב־׃
translation:
  text: The one who burns it shall wash his clothes in the water and bathe his body
    in the water, and he shall be unclean until the evening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with water' for both instances of 'in the water.' The Hebrew literally
      reads 'in the water.'
    reason: lexical_alternative
  - marker: b
    text: '''Unclean'' here refers to ritual impurity, not necessarily moral guilt.'
    reason: cultural_note
lexical_decisions:
- source_word: הַשֹּׂרֵף
  chosen: the one who burns
  alternatives:
  - the one burning
  - he who burns
  - the burner
  lexicon: HALOT
  rationale: The participle with article functions substantivally, referring to the
    person performing the burning. 'The one who burns' is natural English and preserves
    the ongoing role designation better than the less idiomatic 'the burner.'
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - her
  lexicon: HALOT
  rationale: The feminine singular object pronoun refers back to the red heifer. English
    uses 'it' for an animal in this procedural legal context.
- source_word: יְכַבֵּס
  chosen: shall wash
  alternatives:
  - must wash
  - is to wash
  lexicon: HALOT
  rationale: In ritual legislation the imperfect carries injunctive force. 'Shall
    wash' preserves the legal-prescriptive sense in readable English.
- source_word: בְּגָדָיו
  chosen: his clothes
  alternatives:
  - his garments
  lexicon: HALOT
  rationale: '''Clothes'' is more natural modern English than ''garments'' while accurately
    conveying the meaning.'
- source_word: בַּמַּיִם
  chosen: in the water
  alternatives:
  - with water
  lexicon: HALOT
  rationale: The preposition is beth with the article, literally 'in the water.' In
    ritual washing contexts English often says 'with water,' but 'in the water' more
    closely reflects the Hebrew and suits the repeated phrasing in this verse.
- source_word: וְרָחַץ
  chosen: and bathe
  alternatives:
  - and wash
  lexicon: HALOT
  rationale: Using 'bathe' distinguishes רחץ of the body from כבס of clothing, preserving
    the lexical contrast in the Hebrew.
- source_word: בְּשָׂרוֹ
  chosen: his body
  alternatives:
  - his flesh
  lexicon: HALOT
  rationale: Although בשר is literally 'flesh,' in this washing context it idiomatically
    refers to the person's body. 'His body' is clearer modern English without loss
    of meaning.
- source_word: וְטָמֵא
  chosen: and he shall be unclean
  alternatives:
  - and he will be unclean
  - and he shall become unclean
  lexicon: HALOT
  rationale: In context this states the resulting ritual status. 'Shall be unclean'
    is standard and clear. 'Become unclean' would overemphasize transition rather
    than status.
- source_word: עַד הָעָרֶב
  chosen: until the evening
  alternatives:
  - until evening
  - until sundown
  lexicon: HALOT
  rationale: The phrase marks the duration of ritual impurity. 'Until the evening'
    is a close and natural rendering; 'sundown' is interpretive.
