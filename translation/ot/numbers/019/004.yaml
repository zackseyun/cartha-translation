id: NUM.19.4
reference: Numbers 19:4
source:
  edition: WLC
  text: וְ/לָקַ֞ח אֶלְעָזָ֧ר הַ/כֹּהֵ֛ן מִ/דָּמָ֖/הּ בְּ/אֶצְבָּע֑/וֹ וְ/הִזָּ֞ה אֶל
    נֹ֨כַח פְּנֵ֧י אֹֽהֶל מוֹעֵ֛ד מִ/דָּמָ֖/הּ שֶׁ֥בַע פְּעָמִֽים־־׃
translation:
  text: Then Eleazar the priest shall take some of its blood on his finger and sprinkle
    some of its blood seven times toward the front of the tent of meeting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the tent of meeting.' The Hebrew phrase indicates orientation
      toward the front of the tent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  chosen: Then ... shall take
  alternatives:
  - and ... shall take
  - and took
  lexicon: HALOT
  rationale: The waw + qatal in procedural legal narrative is best rendered as a sequential
    future/instructional sense in English. 'Then' conveys the ritual step progression
    naturally.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Personal name is transliterated per translation philosophy.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Straightforward title/apposition identifying Eleazar's office.
- source_word: מִדָּמָהּ
  chosen: some of its blood
  alternatives:
  - from its blood
  - its blood
  lexicon: HALOT
  rationale: 'The prefixed מִן here is naturally partitive: Eleazar takes some of
    the animal''s blood, not necessarily all of it. ''Its'' refers to the heifer from
    the prior context.'
- source_word: בְּאֶצְבָּעוֹ
  chosen: on his finger
  alternatives:
  - with his finger
  - by his finger
  lexicon: HALOT
  rationale: In this ritual context, the blood is taken onto the priest's finger for
    sprinkling. 'On his finger' expresses the physical action more idiomatically than
    a wooden 'with his finger.'
- source_word: וְהִזָּה
  chosen: and sprinkle
  alternatives:
  - and spatter
  - and dash
  lexicon: HALOT
  rationale: נזה in priestly ritual commonly denotes sprinkling of blood or water
    in a cultic act. 'Sprinkle' is the standard and clearest English equivalent.
- source_word: אֶל נֹכַח פְּנֵי
  chosen: toward the front of
  alternatives:
  - before
  - in front of
  - toward the face of
  lexicon: HALOT
  rationale: The phrase indicates direction toward the front/face of the tent rather
    than entry into it. 'Toward the front of' preserves the spatial nuance and avoids
    implying interior action.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tabernacle
  lexicon: HALOT
  rationale: This is the standard rendering of the sanctuary designation and is more
    textually precise than the interpretive 'tabernacle.'
- source_word: מִדָּמָהּ
  chosen: some of its blood
  alternatives:
  - from its blood
  - its blood
  lexicon: HALOT
  rationale: Repeated for emphasis in the Hebrew; retained in English rather than
    reduced to a pronoun alone, since the blood is the ritual medium being highlighted.
- source_word: שֶׁבַע פְּעָמִים
  chosen: seven times
  lexicon: HALOT
  rationale: Direct numerical expression; no reason to paraphrase.
