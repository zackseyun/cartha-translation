id: NUM.5.31
reference: Numbers 5:31
source:
  edition: WLC
  text: וְ/נִקָּ֥ה הָ/אִ֖ישׁ מֵ/עָוֺ֑ן וְ/הָ/אִשָּׁ֣ה הַ/הִ֔וא תִּשָּׂ֖א אֶת עֲוֺנָֽ/הּ־׃פ
translation:
  text: Then the man will be free from guilt, but that woman will bear her guilt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the husband will be free from guilt.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will bear her iniquity'; the Hebrew idiom can also imply bearing the
      consequences of guilt.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִקָּה
  chosen: will be free
  alternatives:
  - will be cleared
  - will be innocent
  - will be acquitted
  lexicon: HALOT
  rationale: The Niphal of נקה commonly conveys being cleared, free, or acquitted
    from liability. 'Will be free' is natural modern English and fits the construction
    with מִן ('from') plus עָוֹן. 'Acquitted' is possible but sounds more formally
    juridical than the context requires.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the husband
  lexicon: HALOT
  rationale: אִישׁ literally means 'man' and in this context refers to the husband
    involved in the jealousy procedure. The main text keeps the formally closer 'the
    man'; 'the husband' is contextually valid but slightly more interpretive.
- source_word: מֵעָוֺן
  chosen: from guilt
  alternatives:
  - from iniquity
  - from punishment
  - from blame
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the liability/punishment resulting
    from wrongdoing. Here, with נקה, the sense is best captured as release from culpability
    or liability, hence 'from guilt.' 'Iniquity' is too archaic here, and 'punishment'
    is too narrow.
- source_word: וְהָאִשָּׁה הַהִוא
  chosen: but that woman
  alternatives:
  - and that woman
  - while that woman
  lexicon: HALOT
  rationale: 'The conjunction ו can be rendered simply ''and,'' but the clause is
    contrastive in sense: the man is cleared, whereas the woman bears guilt. ''But''
    makes the contrast explicit in idiomatic English without exceeding the source
    sense. ''That woman'' reflects the demonstrative emphasis of הַהִוא.'
- source_word: תִּשָּׂא אֶת עֲוֺנָהּ
  chosen: will bear her guilt
  alternatives:
  - will bear her iniquity
  - will suffer the consequences of her guilt
  lexicon: HALOT
  rationale: The idiom נשׂא עָוֹן regularly means to bear guilt or bear iniquity,
    often including the consequence of wrongdoing. 'Will bear her guilt' preserves
    the idiom compactly and naturally. The more expansive 'suffer the consequences
    of her guilt' interprets the idiom rather than translating it.
