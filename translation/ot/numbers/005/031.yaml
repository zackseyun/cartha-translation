theological_decisions:
- issue: Meaning of עָוֹן in both clauses
  chosen_reading: Render as 'guilt' in both occurrences to preserve the legal-moral
    parallel between the man's exoneration and the woman's liability.
  alternative_readings:
  - iniquity
  - punishment for iniquity
  rationale: The verse contrasts the husband's freedom from liability with the woman's
    bearing of liability if guilty. Using 'guilt' consistently in both clauses best
    preserves the symmetry and avoids archaic diction while not flattening the moral-legal
    force of the Hebrew.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
