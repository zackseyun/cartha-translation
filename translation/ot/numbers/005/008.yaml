id: NUM.5.8
reference: Numbers 5:8
source:
  edition: WLC
  text: וְ/אִם אֵ֨ין לָ/אִ֜ישׁ גֹּאֵ֗ל לְ/הָשִׁ֤יב הָ/אָשָׁם֙ אֵלָ֔י/ו הָ/אָשָׁ֛ם הַ/מּוּשָׁ֥ב לַ/יהוָ֖ה לַ/כֹּהֵ֑ן מִ/לְּ/בַ֗ד אֵ֚יל הַ/כִּפֻּרִ֔ים אֲשֶׁ֥ר יְכַפֶּר בּ֖/וֹ עָלָֽי/ו־־׃
translation:
  text: But if the man has no kinsman-redeemer to whom restitution for the guilt may be returned, the restitution for the guilt that is returned to Yahweh belongs to the priest, besides the ram of atonement by which atonement is made for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'redeemer' or 'next of kin.' The Hebrew גֹּאֵל refers to a family member with legal responsibility in matters of redemption or restitution.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew אָשָׁם here refers to restitution or compensation for guilt, not to the ram itself; the ram is mentioned separately afterward.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּאֵל
  chosen: kinsman-redeemer
  alternatives:
  - redeemer
  - next of kin
  - relative
  lexicon: HALOT
  rationale: The term denotes a family member with legal responsibility to reclaim or receive on behalf of a relative. 'Kinsman-redeemer' preserves the familial and juridical sense better than the more generic 'redeemer' or 'relative'.
- source_word: הָאָשָׁם
  chosen: restitution for the guilt
  alternatives:
  - compensation
  - reparation
  - guilt offering
  lexicon: HALOT
  rationale: In this context the word refers to the compensatory payment owed for a wrong, not the sacrificial offering itself. 'Restitution for the guilt' keeps the connection to guilt while distinguishing it from the ram mentioned later.
- source_word: הָאָשָׁם הַמּוּשָׁב
  chosen: the restitution for the guilt that is returned
  alternatives:
  - the compensation that is restored
  - the guilt-payment that is repaid
  lexicon: HALOT
  rationale: The passive participle from שוב emphasizes that the payment is restored/returned. Rendering the phrase explicitly avoids obscuring the legal-restorative action.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, YHWH is rendered 'the LORD.' Here the payment is said to be returned to the LORD in the sense of being devoted to him and therefore assigned to the priest.
- source_word: לַכֹּהֵן
  chosen: belongs to the priest
  alternatives:
  - is for the priest
  - shall be the priest's
  lexicon: HALOT
  rationale: English requires an explicit predicate to make sense of the Hebrew apposition. 'Belongs to the priest' clearly conveys the legal destination of the restitution.
- source_word: מִלְּבַד
  chosen: besides
  alternatives:
  - in addition to
  - apart from
  lexicon: HALOT
  rationale: This marks that the following ram is additional to the restitution payment, not identical with it.
- source_word: אֵיל הַכִּפֻּרִים
  chosen: the ram of atonement
  alternatives:
  - the atonement ram
  - the ram for atonement
  lexicon: HALOT
  rationale: A natural English rendering that preserves the sacrificial function without unnecessary jargon.
- source_word: יְכַפֶּר בּוֹ עָלָיו
  chosen: by which atonement is made for him
  alternatives:
  - with which he makes atonement for him
  - by it he shall make atonement on his behalf
  lexicon: HALOT
  rationale: The clause refers to the ram as the means of atonement for the offender. The passive English avoids introducing an explicit subject where Hebrew leaves it implicit in priestly procedure.
- source_word: לָאִישׁ
  chosen: the man
  alternatives:
  - the person
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular. Per translation philosophy, gender-accurate rendering is preferred unless context clearly demands a neutral term.
