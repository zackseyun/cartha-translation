theological_decisions:
- issue: Relationship between restitution and sacrifice
  chosen_reading: The verse distinguishes the monetary restitution from the sacrificial ram; both are required when no kinsman-redeemer exists.
  alternative_readings:
  - The guilt payment could be read as itself a cultic offering
  rationale: The separate phrase introduced by 'besides' shows that the restitution payment and the ram of atonement are distinct items. This avoids conflating civil compensation with sacrificial atonement.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering of YHWH
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the contested terms table for יְהוָה YHWH.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
