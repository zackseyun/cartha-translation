theological_decisions:
- issue: Purity-language rendering of נִטְמָאָה
  chosen_reading: she has become unclean
  alternative_readings:
  - she is defiled
  rationale: The verse is part of a legal ritual concerning suspected adultery and
    impurity. 'Unclean' preserves the text's purity-law category without importing
    a more rhetorically charged term unless context demands it.
  doctrine_reference: Translation philosophy §1, §6
- issue: Interpretation of לֹא נִתְפָּשָׂה
  chosen_reading: she was not caught
  alternative_readings:
  - she was not seized
  - she was not forced
  rationale: In context, the clause most likely states that there was no apprehension
    or discovery, supporting the ordeal's use when no proof exists. Some readers take
    the verb to imply coercion, but that is less likely here and should be preserved
    only as an alternative note rather than adopted in the main text.
  doctrine_reference: Translation philosophy §3
