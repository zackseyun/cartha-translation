id: NUM.5.13
reference: Numbers 5:13
source:
  edition: WLC
  text: וְ/שָׁכַ֨ב אִ֣ישׁ אֹתָ/הּ֮ שִׁכְבַת זֶרַע֒ וְ/נֶעְלַם֙ מֵ/עֵינֵ֣י אִישָׁ֔/הּ
    וְ/נִסְתְּרָ֖ה וְ/הִ֣יא נִטְמָ֑אָה וְ/עֵד֙ אֵ֣ין בָּ֔/הּ וְ/הִ֖וא לֹ֥א נִתְפָּֽשָׂה־׃
translation:
  text: and a man lies with her sexually, and it is hidden from the eyes of her husband,
    and she is concealed, and she has become unclean, and there is no witness against
    her, and she was not caught—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the lying of seed,' that is, sexual intercourse.
    reason: lexical_alternative
  - marker: b
    text: Or, 'there is no witness concerning her.'
    reason: alternative_reading
  - marker: c
    text: Or, 'she was not seized'; some understand this to imply, 'she was not forced.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְשָׁכַב
  chosen: lies
  alternatives:
  - has lain
  - sleeps
  lexicon: HALOT
  rationale: 'שׁכב in sexual contexts commonly means ''lie with.'' Present-tense English
    in a conditional/legal protasis reads naturally: ''a man lies with her.'' ''Sleeps''
    is too euphemistic and less precise.'
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  lexicon: HALOT
  rationale: The noun is singular masculine 'man,' referring to another male sexual
    partner. Gender-accurate rendering fits the legal scenario.
- source_word: אֹתָהּ
  chosen: with her
  alternatives:
  - her
  lexicon: HALOT
  rationale: 'In English, the object pronoun with שׁכב in this idiom is best rendered
    with the preposition: ''lies with her.'' This reflects the idiomatic sexual sense.'
- source_word: שִׁכְבַת זֶרַע
  chosen: sexually
  alternatives:
  - with emission of semen
  - carnally
  lexicon: HALOT
  rationale: Literally 'the lying of seed,' an idiom for sexual intercourse. 'Sexually'
    communicates the sense in clear modern English without unnecessary clinical awkwardness.
    The more literal alternative is preserved in a footnote because the phrase is
    semantically significant in purity law.
- source_word: וְנֶעְלַם מֵעֵינֵי אִישָׁהּ
  chosen: it is hidden from the eyes of her husband
  alternatives:
  - it is hidden from her husband
  - it escapes her husband's notice
  lexicon: HALOT
  rationale: Keeps the passive nuance of נעלם and preserves the Hebrew idiom 'from
    the eyes of' while remaining intelligible in English.
- source_word: וְנִסְתְּרָה
  chosen: she is concealed
  alternatives:
  - it is kept secret
  - she has hidden herself
  lexicon: HALOT
  rationale: Niphal feminine singular likely continues the description of the matter
    being kept hidden with reference to the woman. 'She is concealed' preserves the
    passive/reflexive ambiguity better than an active paraphrase.
- source_word: וְהִיא נִטְמָאָה
  chosen: she has become unclean
  alternatives:
  - she is defiled
  - she has become defiled
  lexicon: HALOT
  rationale: טמא in ritual/moral impurity contexts is broadly 'become unclean.' 'Defiled'
    is possible, but 'unclean' better preserves the purity-law register without overinterpreting
    the exact kind of defilement.
- source_word: וְעֵד אֵין בָּהּ
  chosen: there is no witness against her
  alternatives:
  - there is no witness in the matter
  - there is no witness concerning her
  lexicon: HALOT
  rationale: The phrase indicates absence of testimony implicating her. 'Against her'
    makes the legal force explicit in natural English.
- source_word: וְהִוא לֹא נִתְפָּשָׂה
  chosen: she was not caught
  alternatives:
  - she was not seized
  - she was not apprehended
  lexicon: HALOT
  rationale: נתפשׂ in this legal context most naturally means being caught in the
    act or apprehended. 'Caught' is idiomatic and concise. Because some interpret
    it as 'forced/seized,' that alternative is preserved in a footnote.
