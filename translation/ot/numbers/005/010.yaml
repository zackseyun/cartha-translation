id: NUM.5.10
reference: Numbers 5:10
source:
  edition: WLC
  text: וְ/אִ֥ישׁ אֶת קֳדָשָׁ֖י/ו ל֣/וֹ יִהְי֑וּ אִ֛ישׁ אֲשֶׁר יִתֵּ֥ן לַ/כֹּהֵ֖ן
    ל֥/וֹ יִהְיֶֽה־־׃פ
translation:
  text: And each man's holy gifts shall be his; whatever a man gives to the priest
    shall be his.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'his holy things.' The phrase refers to items consecrated
      as sacred offerings.
    reason: lexical_alternative
  - marker: b
    text: 'The final ''his'' refers to the priest: whatever a man gives to the priest
      belongs to the priest.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִישׁ
  chosen: each man / a man
  alternatives:
  - each person
  - any man
  lexicon: HALOT
  rationale: The noun is grammatically masculine singular and used distributively
    in this legal context. Per the gender-accurate policy, 'man' is retained rather
    than neutralizing to 'person.' The first occurrence is rendered distributively
    as 'each man's'; the second as 'a man' in the relative clause.
- source_word: קֳדָשָׁיו
  chosen: his holy gifts
  alternatives:
  - his holy things
  - his sacred donations
  - his consecrated things
  lexicon: HALOT
  rationale: The plural of קדשׁ here refers to items set apart as sacred offerings.
    'Holy gifts' communicates the cultic sense naturally in English while preserving
    the idea of consecrated items. 'Holy things' is more literal but less idiomatic
    in this legal context.
- source_word: לוֹ יִהְיוּ
  chosen: shall be his
  alternatives:
  - shall belong to him
  - shall remain his
  lexicon: HALOT
  rationale: The construction marks possession. 'Shall be his' is concise and close
    to the Hebrew wording; it also matches the repeated possession formula in the
    verse.
- source_word: אֲשֶׁר יִתֵּן לַכֹּהֵן
  chosen: whatever a man gives to the priest
  alternatives:
  - what a man gives to the priest
  - that which a man gives to the priest
  lexicon: HALOT
  rationale: The relative clause is generalized in sense. 'Whatever' captures the
    open-ended legal force in natural English. 'To the priest' preserves the definite
    singular כהן in context.
- source_word: לוֹ יִהְיֶה
  chosen: shall be his
  alternatives:
  - shall belong to him
  lexicon: HALOT
  rationale: 'The final clause repeats the possession formula. In context, the referent
    of ''his'' is the priest: what is given to the priest belongs to the priest. The
    English keeps the Hebrew terseness while the syntax makes the referent sufficiently
    clear.'
