theological_decisions:
- issue: Nature of the woman's offense language
  chosen_reading: Render the text in terms of sexual unfaithfulness/impurity without
    importing later doctrinal or moral categories beyond the Hebrew wording.
  alternative_readings:
  - Render more explicitly as adultery
  - Render more generally as defilement only
  rationale: The verse concerns suspected marital infidelity, but the Hebrew expresses
    it through 'lain with you,' 'gone astray,' and 'uncleanness under your husband.'
    The translation preserves that legal-ritual wording without over-specifying beyond
    the text.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Effect of the waters
  chosen_reading: Translate the waters as 'bring a curse' rather than specifying the
    exact mechanism in the main text.
  alternative_readings:
  - waters of bitterness that bring the curse
  - waters of bitterness, the curse-bringing ones
  rationale: The Hebrew participle marks the waters as associated with curse-effect
    in the ordeal. The main text should remain readable while preserving the ritual-theological
    gravity; more literal alternatives can be footnoted.
  doctrine_reference: Translation philosophy items 3 and 6
