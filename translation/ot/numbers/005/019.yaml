id: NUM.5.19
reference: Numbers 5:19
source:
  edition: WLC
  text: וְ/הִשְׁבִּ֨יעַ אֹתָ֜/הּ הַ/כֹּהֵ֗ן וְ/אָמַ֤ר אֶל הָֽ/אִשָּׁה֙ אִם לֹ֨א שָׁכַ֥ב
    אִישׁ֙ אֹתָ֔/ךְ וְ/אִם לֹ֥א שָׂטִ֛ית טֻמְאָ֖ה תַּ֣חַת אִישֵׁ֑/ךְ הִנָּקִ֕י מִ/מֵּ֛י
    הַ/מָּרִ֥ים הַֽ/מְאָרֲרִ֖ים הָ/אֵֽלֶּה־־־׃
translation:
  text: Then the priest shall make her swear and shall say to the woman, ‘If no man
    has lain with you, and if you have not gone astray into uncleanness under your
    husband, be free from these bitter waters that bring a curse.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'be innocent of these bitter waters that bring the curse.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'under your husband,' an idiom referring to the woman's married status
      and obligation within the marriage bond.
    reason: cultural_note
  - marker: c
    text: Literally, 'the bitter waters, the curse-bringing ones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁבִּיעַ
  chosen: shall make her swear
  alternatives:
  - shall put her under oath
  - shall adjure her
  lexicon: HALOT
  rationale: Hiphil of שבע here means to cause someone to swear or place under oath.
    'Make her swear' is clear modern English and preserves the causative force.
- source_word: וְאָמַר
  chosen: shall say
  alternatives:
  - and say
  lexicon: HALOT
  rationale: Sequential narrative verb; 'shall say' fits the legal-procedural style
    in English.
- source_word: אִם לֹא שָׁכַב אִישׁ אֹתָךְ
  chosen: If no man has lain with you
  alternatives:
  - If a man has not lain with you
  - If no one has slept with you
  lexicon: HALOT
  rationale: שׁכב is a standard euphemism for sexual intercourse. 'Has lain with you'
    preserves the idiom without becoming either crude or overly paraphrastic. 'No
    man' reflects the indefinite איש in this legal context.
- source_word: שָׂטִית
  chosen: have gone astray
  alternatives:
  - have strayed
  - have turned aside
  lexicon: HALOT
  rationale: The verb carries the sense of deviating or going astray, often in covenantal
    or sexual unfaithfulness contexts. 'Gone astray' preserves the metaphor and avoids
    over-interpreting beyond the immediate context.
- source_word: טֻמְאָה
  chosen: into uncleanness
  alternatives:
  - into impurity
  - to defilement
  lexicon: HALOT
  rationale: The noun denotes ritual/moral impurity. 'Uncleanness' is a familiar biblical
    term that preserves the impurity concept without flattening it to merely ceremonial
    or merely moral categories.
- source_word: תַּחַת אִישֵׁךְ
  chosen: under your husband
  alternatives:
  - while under your husband
  - instead of your husband
  lexicon: HALOT
  rationale: The preposition תחת here idiomatically refers to being under the authority/bond
    of one's husband, i.e., in marriage. 'Under your husband' is formally close; the
    marital sense is clear from context.
- source_word: הִנָּקִי
  chosen: be free from
  alternatives:
  - be innocent of
  - be cleared from
  lexicon: HALOT
  rationale: Imperative/passive nuance from נקה here conveys exemption or freedom
    from the effect of the ordeal. 'Be free from' communicates the practical result
    in natural English.
- source_word: מִמֵּי הַמָּרִים
  chosen: these bitter waters
  alternatives:
  - this bitter water
  lexicon: HALOT
  rationale: The Hebrew uses plural 'waters,' commonly rendered as a collective in
    English. Retaining 'waters' preserves the formal texture of the ritual language;
    'bitter' is the plain sense of מרים here.
- source_word: הַמְאָרֲרִים
  chosen: that bring a curse
  alternatives:
  - that cause cursing
  - that are curse-bringing
  - that bring the curse
  lexicon: HALOT
  rationale: The participle from ארר describes the waters as effecting a curse in
    the ordeal. 'That bring a curse' is idiomatic and preserves the causative sense.
- source_word: הָאֵלֶּה
  chosen: these
  alternatives:
  - this
  lexicon: HALOT
  rationale: The demonstrative is plural and naturally modifies 'waters'; 'these'
    should be retained.
