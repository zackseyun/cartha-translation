id: NUM.5.16
reference: Numbers 5:16
source:
  edition: WLC
  text: וְ/הִקְרִ֥יב אֹתָ֖/הּ הַ/כֹּהֵ֑ן וְ/הֶֽעֱמִדָ֖/הּ לִ/פְנֵ֥י יְהוָֽה׃
translation:
  text: Then the priest shall bring her near and make her stand before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD''; alternatively ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִקְרִיב
  chosen: shall bring her near
  alternatives:
  - shall bring her forward
  - shall present her
  lexicon: HALOT
  rationale: Hiphil of קרב commonly means to bring near or present. Here, with the direct object 'her' and followed by standing before YHWH, 'bring her near' preserves the spatial sense without over-formalizing it as a technical offering term.
- source_word: אֹתָהּ
  chosen: her
  rationale: Direct-object marker with 3fs suffix, referring to the woman in the ordeal context; rendered by the English object pronoun.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in cultic/legal contexts.
- source_word: וְהֶעֱמִדָהּ
  chosen: make her stand
  alternatives:
  - set her
  - cause her to stand
  lexicon: HALOT
  rationale: Hiphil of עמד is causative, 'cause to stand.' 'Make her stand' is idiomatic modern English and retains the causative force better than the flatter 'set her'.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in the presence of
  lexicon: HALOT
  rationale: Standard prepositional rendering indicating position in the presence of someone; 'before' is concise and natural here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
