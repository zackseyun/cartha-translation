theological_decisions:
- issue: How specifically to render the bodily curse in a morally and medically disputed
    passage
  chosen_reading: Retain the Hebrew bodily imagery in relatively literal terms ('thigh
    fall away,' 'abdomen swell') without interpreting it as a direct reference to
    miscarriage or infertility in the main text.
  alternative_readings:
  - Render as 'womb miscarry and abdomen swell'
  - Render as 'uterus drop and womb swell'
  rationale: The Hebrew wording is difficult and debated. Optimal equivalence here
    favors preserving the text's concrete imagery while not importing a more specific
    reproductive diagnosis than the Hebrew explicitly states. Because the phrase likely
    carries reproductive implications, that possibility is preserved in footnotes
    rather than resolved in the main text.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
