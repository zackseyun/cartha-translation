id: NUM.5.21
reference: Numbers 5:21
source:
  edition: WLC
  text: וְ/הִשְׁבִּ֨יעַ הַ/כֹּהֵ֥ן אֶֽת הָֽ/אִשָּׁה֮ בִּ/שְׁבֻעַ֣ת הָ/אָלָה֒ וְ/אָמַ֤ר
    הַ/כֹּהֵן֙ לָֽ/אִשָּׁ֔ה יִתֵּ֨ן יְהוָ֥ה אוֹתָ֛/ךְ לְ/אָלָ֥ה וְ/לִ/שְׁבֻעָ֖ה בְּ/ת֣וֹךְ
    עַמֵּ֑/ךְ בְּ/תֵ֨ת יְהוָ֤ה אֶת יְרֵכֵ/ךְ֙ נֹפֶ֔לֶת וְ/אֶת בִּטְנֵ֖/ךְ צָבָֽה־־־׃
translation:
  text: Then the priest shall make the woman swear with the oath of the curse, and
    the priest shall say to the woman, “May the LORD make you a curse and an oath
    among your people, when the LORD makes your thigh fall away and your abdomen swell.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'make you an example of cursing and oath-taking'
      among your people.
    reason: lexical_alternative
  - marker: b
    text: '''Your thigh fall away'' is a literal rendering of a difficult Hebrew expression.
      It may be a euphemism involving the reproductive organs or indicate wasting/shriveling
      of that part of the body.'
    reason: lexical_alternative
  - marker: c
    text: '''Abdomen'' may also be rendered ''belly'' or, in some interpretations,
      ''womb.'' The exact medical or reproductive effect described in this curse is
      debated.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁבִּיעַ
  chosen: shall make ... swear
  alternatives:
  - shall put ... under oath
  - shall adjure
  lexicon: HALOT
  rationale: 'Hiphil of שׁבע here is causative: the priest causes the woman to swear.
    ''Make ... swear'' is clear modern English and preserves the legal-ritual force.'
- source_word: בִּשְׁבֻעַת הָאָלָה
  chosen: with the oath of the curse
  alternatives:
  - with the oath of cursing
  - under the oath of the curse
  lexicon: HALOT
  rationale: The construct phrase joins שְׁבֻעָה ('oath') with אָלָה ('curse'). 'Oath
    of the curse' preserves both elements and the formal ritual setting.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD'.
- source_word: לְאָלָה וְלִשְׁבֻעָה
  chosen: a curse and an oath
  alternatives:
  - an object of cursing and of oath-taking
  - a curse and an imprecation
  lexicon: HALOT
  rationale: The woman is to become a formulaic example invoked by others. 'A curse
    and an oath' is formally close; the idiomatic force is preserved further in a
    footnote.
- source_word: בְּתוֹךְ עַמֵּךְ
  chosen: among your people
  alternatives:
  - in the midst of your people
  lexicon: HALOT
  rationale: Natural English for the social setting while preserving the communal/public
    dimension.
- source_word: בְּתֵת
  chosen: when ... makes
  alternatives:
  - in the giving of
  - by making
  lexicon: HALOT
  rationale: The infinitive construct with ב marks circumstance/time here. 'When the
    LORD makes' gives the sense idiomatically in English.
- source_word: יְרֵךְ
  chosen: thigh
  alternatives:
  - hip
  - loins
  - genitals
  lexicon: HALOT
  rationale: יָרֵךְ literally means 'thigh' or 'upper leg,' though in some contexts
    it can function euphemistically for reproductive organs. 'Thigh' keeps the Hebrew
    wording in the main text while avoiding over-interpretation; the likely reproductive
    implication is preserved in a footnote.
- source_word: נֹפֶלֶת
  chosen: fall away
  alternatives:
  - waste away
  - shrivel
  - rot
  lexicon: HALOT
  rationale: From נפל ('fall'). In this curse context it likely denotes wasting, collapse,
    or withering of the affected body part. 'Fall away' stays close to the Hebrew
    image without claiming a specific medical mechanism.
- source_word: בֶּטֶן
  chosen: abdomen
  alternatives:
  - belly
  - womb
  lexicon: HALOT
  rationale: בֶּטֶן can mean belly/womb. Because the verse pairs it with a bodily
    swelling and the exact referent is debated, 'abdomen' preserves the physical sense
    without prematurely narrowing it to pregnancy or womb alone.
- source_word: צָבָה
  chosen: swell
  alternatives:
  - be distended
  - be bloated
  lexicon: HALOT
  rationale: The adjective/participle-like form here describes swelling/distention.
    'Swell' is concise, natural, and fits the curse formula.
