id: NUM.5.20
reference: Numbers 5:20
source:
  edition: WLC
  text: וְ/אַ֗תְּ כִּ֥י שָׂטִ֛ית תַּ֥חַת אִישֵׁ֖/ךְ וְ/כִ֣י נִטְמֵ֑את וַ/יִּתֵּ֨ן
    אִ֥ישׁ בָּ/ךְ֙ אֶת שְׁכָבְתּ֔/וֹ מִֽ/בַּלְעֲדֵ֖י אִישֵֽׁ/ךְ־׃
translation:
  text: But if you have gone astray under your husband, and if you have become defiled,
    and a man has had sexual intercourse with you besides your husband—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have been unfaithful to your husband.' The Hebrew says 'have gone astray
      under your husband,' using a metaphor of deviation in a marital context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'under your husband,' an idiom referring to the woman's marital
      bond or subjection to her husband.
    reason: cultural_note
  - marker: c
    text: Literally 'a man has given his lying with you,' a Hebrew euphemism for sexual
      relations.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂטִית
  chosen: have gone astray
  alternatives:
  - have strayed
  - have been unfaithful
  lexicon: HALOT
  rationale: The verb שׂטה in this jealousy-ordeal context denotes deviating from
    marital fidelity. 'Have gone astray' preserves the metaphor of deviation without
    importing an interpretive gloss too strongly; 'have been unfaithful' is contextually
    accurate but more interpretive.
- source_word: תַּחַת אִישֵׁךְ
  chosen: under your husband
  alternatives:
  - while under your husband
  - instead of your husband
  lexicon: HALOT
  rationale: תחת literally means 'under' and in this context refers to being under
    the authority/bond of one's husband. Retaining 'under your husband' preserves
    the Hebrew idiom and legal-marital nuance better than smoothing it away entirely.
- source_word: נִטְמֵאת
  chosen: have become defiled
  alternatives:
  - have become unclean
  lexicon: HALOT
  rationale: The Niphal of טמא here refers to sexual defilement in the ritual-legal
    sense. 'Defiled' communicates the moral-ritual force more naturally in English
    than 'unclean,' while still preserving the text's category.
- source_word: וַיִּתֵּן אִישׁ בָּךְ אֶת שְׁכָבְתּוֹ
  chosen: a man has had sexual intercourse with you
  alternatives:
  - a man has lain with you
  - a man has given his lying with you
  lexicon: HALOT
  rationale: The Hebrew idiom literally involves 'giving his lying' in/with her, a
    euphemistic expression for sexual relations. 'Has had sexual intercourse with
    you' renders the meaning clearly in modern English; 'has lain with you' is more
    traditional but less explicit for contemporary readers.
- source_word: מִבַּלְעֲדֵי אִישֵׁךְ
  chosen: besides your husband
  alternatives:
  - apart from your husband
  - other than your husband
  lexicon: HALOT
  rationale: מבלעדי marks exclusion. 'Besides your husband' is idiomatic and clearly
    indicates another man in distinction from the husband.
