- issue: Rendering the marital-infidelity idiom without overstating beyond the Hebrew
  chosen_reading: Use 'gone astray under your husband' and explicit sexual language
    in the following clause
  alternative_readings:
  - Use 'been unfaithful to your husband' throughout
  rationale: The verse combines metaphorical and euphemistic language. Preserving
