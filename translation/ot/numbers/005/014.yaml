theological_decisions:
- issue: Nature of impurity language in suspected adultery law
  chosen_reading: Render נִטְמָאָה as 'has defiled herself' rather than a purely ceremonial
    'has become unclean.'
  alternative_readings:
  - has become unclean
  - has been defiled
  rationale: The context is marital infidelity and its covenantal consequences, not
    merely ritual contamination. 'Defiled herself' preserves the moral-ritual overlap
    without importing later doctrinal conclusions beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
