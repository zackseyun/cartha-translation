id: NUM.5.14
reference: Numbers 5:14
source:
  edition: WLC
  text: וְ/עָבַ֨ר עָלָ֧י/ו רֽוּחַ קִנְאָ֛ה וְ/קִנֵּ֥א אֶת אִשְׁתּ֖/וֹ וְ/הִ֣וא נִטְמָ֑אָה
    אוֹ עָבַ֨ר עָלָ֤י/ו רֽוּחַ קִנְאָה֙ וְ/קִנֵּ֣א אֶת אִשְׁתּ֔/וֹ וְ/הִ֖יא לֹ֥א נִטְמָֽאָה־־־־־׃
translation:
  text: and a spirit of jealousy comes over him, and he becomes jealous of his wife,
    and she has defiled herself; or if a spirit of jealousy comes over him, and he
    becomes jealous of his wife, though she has not defiled herself,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has become unclean.' The Hebrew uses impurity language that can denote
      ritual uncleanness, but here it refers specifically to suspected sexual defilement.
    reason: lexical_alternative
  - marker: b
    text: Or 'and she has not defiled herself.' The Hebrew conjunction is simply 'and';
      'though' in the main text brings out the contrast in the legal scenario.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבַר עָלָיו
  chosen: comes over him
  alternatives:
  - passes over him
  - comes upon him
  lexicon: HALOT
  rationale: The idiom עָבַר עַל with רוּחַ here describes an overpowering onset of
    an inner impulse or disposition. 'Comes over him' is natural modern English and
    preserves the experiential force better than the more wooden 'passes over him.'
- source_word: רוּחַ קִנְאָה
  chosen: a spirit of jealousy
  alternatives:
  - a spirit of jealousy/zeal
  - a jealous spirit
  lexicon: HALOT
  rationale: רוּחַ can denote spirit, wind, or disposition; here it refers to an animating
    impulse or mood. קִנְאָה in this context is jealousy rather than zeal. The indefinite
    'a spirit of jealousy' best matches the Hebrew construction and established idiom
    in this legal setting.
- source_word: וְקִנֵּא
  chosen: he becomes jealous
  alternatives:
  - he is jealous
  - he is moved with jealousy
  lexicon: HALOT
  rationale: The Piel of קנא expresses the husband's jealous reaction. 'Becomes jealous'
    reflects the verbal action following the spirit's coming over him, whereas simple
    'is jealous' can sound stative and flatten the sequence.
- source_word: אֶת אִשְׁתּוֹ
  chosen: of his wife
  alternatives:
  - regarding his wife
  - for his wife
  lexicon: HALOT
  rationale: Although marked with the direct-object marker in Hebrew, idiomatic English
    with 'jealous' takes 'of' in this context. This preserves the sense without forcing
    unnatural syntax such as 'jealous his wife.'
- source_word: נִטְמָאָה
  chosen: has defiled herself
  alternatives:
  - has become unclean
  - has been defiled
  lexicon: HALOT
  rationale: In Numbers 5 the issue is suspected sexual infidelity, so 'defiled herself'
    conveys the covenantal/moral impurity in view better than the more general 'become
    unclean.' The reflexive sense fits the context of sexual misconduct. The perfect
    is rendered with English present perfect for natural narrative-legal style.
- source_word: אוֹ
  chosen: or if
  alternatives:
  - or
  - or when
  lexicon: HALOT
  rationale: The second clause presents an alternative case within the law. 'Or if'
    makes the conditional/legal force explicit in English, even though the Hebrew
    particle alone is simply 'or.'
- source_word: וְהִיא לֹא נִטְמָאָה
  chosen: though she has not defiled herself
  alternatives:
  - and she has not defiled herself
  - when she has not defiled herself
  lexicon: HALOT
  rationale: The conjunction here introduces the contrasting possibility that the
    husband's jealousy is unfounded. 'Though' brings out the adversative sense implied
    by the legal alternative more clearly than a bare 'and.'
