theological_decisions:
- issue: Nature of impurity language in the adultery ordeal law
  chosen_reading: Render טמא with 'becomes defiled' without narrowing it to either
    purely ritual uncleanness or explicit adultery terminology.
  alternative_readings:
  - becomes unclean
  - commits adultery
  rationale: The context concerns suspected sexual infidelity, but the Hebrew uses
    impurity language rather than the more explicit English 'commits adultery.' Preserving
    'defiled' maintains the text's own category and theological texture without importing
    a more specific charge than the wording states.
  doctrine_reference: Translation philosophy §1, §3
