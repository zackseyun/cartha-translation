id: NUM.5.29
reference: Numbers 5:29
source:
  edition: WLC
  text: זֹ֥את תּוֹרַ֖ת הַ/קְּנָאֹ֑ת אֲשֶׁ֨ר תִּשְׂטֶ֥ה אִשָּׁ֛ה תַּ֥חַת אִישָׁ֖/הּ
    וְ/נִטְמָֽאָה׃
translation:
  text: This is the law of jealousies, when a wife goes astray under her husband and
    becomes defiled,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'jealousy'; the Hebrew is plural, likely functioning as a technical label
      for this legal procedure.
    reason: lexical_alternative
  - marker: b
    text: Or 'turns aside' or 'strays.' The Hebrew uses a metaphor for marital unfaithfulness.
    reason: lexical_alternative
  - marker: c
    text: Literally 'under her husband,' an idiom for being under the marital bond
      or authority of her husband.
    reason: cultural_note
lexical_decisions:
- source_word: זֹאת
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: Demonstrative feminine singular introducing the legal summary; English
    idiom naturally supplies 'is'.
- source_word: תּוֹרַת
  chosen: the law of
  alternatives:
  - the instruction for
  - the statute of
  lexicon: HALOT
  rationale: In legal material תּוֹרָה commonly denotes law/instruction. 'Law of'
    fits the summary formula here and matches the juridical context.
- source_word: הַקְּנָאֹת
  chosen: jealousies
  alternatives:
  - jealousy
  - acts of jealousy
  lexicon: HALOT
  rationale: Plural form is explicit in Hebrew. Retaining the plural as 'jealousies'
    preserves the source form and reflects the technical label for this jealousy-related
    legal procedure, even though singular English would be smoother.
- source_word: אֲשֶׁר
  chosen: when
  alternatives:
  - which
  - in which
  lexicon: HALOT
  rationale: The relative particle introduces the circumstance described by the law.
    'When' gives natural English for the situational clause.
- source_word: תִּשְׂטֶה
  chosen: goes astray
  alternatives:
  - turns aside
  - strays
  lexicon: HALOT
  rationale: The verb שׂטה in this context refers to sexual unfaithfulness/deviation.
    'Goes astray' is idiomatic and preserves the metaphor without over-specifying
    beyond the Hebrew wording.
- source_word: אִשָּׁה
  chosen: a wife
  alternatives:
  - a woman
  lexicon: HALOT
  rationale: Although the noun can mean 'woman' or 'wife,' the following phrase 'under
    her husband' makes the marital sense explicit, so 'wife' is contextually required.
- source_word: תַּחַת אִישָׁהּ
  chosen: under her husband
  alternatives:
  - while under her husband's authority
  - instead of her husband
  lexicon: HALOT
  rationale: The preposition תַּחַת literally means 'under.' In this legal-marital
    idiom it denotes being under the husband's marital bond/authority. The more literal
    'under her husband' preserves the Hebrew expression; a more interpretive expansion
    would go beyond the text.
- source_word: וְנִטְמָאָה
  chosen: and becomes defiled
  alternatives:
  - and is defiled
  - and becomes unclean
  lexicon: HALOT
  rationale: The Niphal of טמא here denotes becoming defiled, likely in the sexual/moral
    sense within the ordeal context. 'Becomes defiled' preserves the passive/reflexive
    nuance and avoids flattening it to merely ceremonial impurity.
