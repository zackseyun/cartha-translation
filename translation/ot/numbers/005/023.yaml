id: NUM.5.23
reference: Numbers 5:23
source:
  edition: WLC
  text: וְ֠/כָתַב אֶת הָ/אָלֹ֥ת הָ/אֵ֛לֶּה הַ/כֹּהֵ֖ן בַּ/סֵּ֑פֶר וּ/מָחָ֖ה אֶל מֵ֥י
    הַ/מָּרִֽים־־׃
translation:
  text: Then the priest shall write these curses in the scroll and wash them off into
    the bitter water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these oath-curses.' The Hebrew term can denote a curse associated with
      an oath.
    reason: lexical_alternative
  - marker: b
    text: Or 'blot them out' / 'erase them.' The Hebrew verb refers to wiping off
      or blotting out the written words.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָתַב
  chosen: Then ... shall write
  alternatives:
  - and ... shall write
  - and ... wrote
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in procedural legal narrative commonly
    carries sequential future/injunctive force in English. 'Then ... shall write'
    fits the ritual instructions context better than a simple past.
- source_word: הָאָלֹת הָאֵלֶּה
  chosen: these curses
  alternatives:
  - these oaths
  - these oath-curses
  lexicon: HALOT
  rationale: אָלָה can denote a curse, often specifically a curse invoked by oath.
    In this immediate context the written words are the sanctions pronounced over
    the woman, so 'these curses' is the clearest main-text rendering; the oath-related
    nuance is preserved as an alternative.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of the officiating cultic functionary in this ritual
    law.
- source_word: בַּסֵּפֶר
  chosen: in the scroll
  alternatives:
  - in the book
  - on a scroll
  - in a document
  lexicon: HALOT
  rationale: סֵפֶר here refers to a written document/material rather than a bound
    modern 'book.' 'In the scroll' is idiomatic and materially appropriate for the
    ancient setting.
- source_word: וּמָחָה
  chosen: and wash them off
  alternatives:
  - and blot them out
  - and wipe them off
  - and erase them
  lexicon: HALOT
  rationale: מחה means wipe out/blot out/erase. In this ritual context, where the
    written curses are removed into water to be drunk, 'wash them off' makes the physical
    action and destination intelligible in natural English.
- source_word: אֶל
  chosen: into
  alternatives:
  - onto
  - to
  lexicon: HALOT
  rationale: Given the action of washing/blotting writing into liquid, English 'into'
    best conveys transfer into the water, even though the preposition is broadly directional.
- source_word: מֵי הַמָּרִים
  chosen: the bitter water
  alternatives:
  - the waters of bitterness
  - the bitter waters
  lexicon: HALOT
  rationale: Construct phrase literally 'waters of bitterness/bitter waters.' Singular
    'water' is natural English for the ritual liquid, while preserving the sense of
    bitterness established in the passage.
