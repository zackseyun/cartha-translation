id: NUM.5.12
reference: Numbers 5:12
source:
  edition: WLC
  text: דַּבֵּר֙ אֶל בְּנֵ֣י יִשְׂרָאֵ֔ל וְ/אָמַרְתָּ֖ אֲלֵ/הֶ֑ם אִ֥ישׁ אִישׁ֙ כִּֽי
    תִשְׂטֶ֣ה אִשְׁתּ֔/וֹ וּ/מָעֲלָ֥ה ב֖/וֹ מָֽעַל־־׃
translation:
  text: 'Speak to the sons of Israel and say to them: If any man''s wife goes astray
    and commits a breach of faith against him,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the Israelites.' The Hebrew is literally 'the sons
      of Israel.'
    reason: lexical_alternative
  - marker: b
    text: '''Commits a breach of faith'' renders a Hebrew cognate expression for acting
      unfaithfully or treacherously.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  - Speak
  lexicon: HALOT
  rationale: Imperative of דבר introducing divine instruction to Moses; 'Speak' is
    the standard direct equivalent and fits the formal opening formula.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the doctrine guideline. Though idiomatically
    this refers to the people of Israel broadly, the Hebrew expression is literally
    'sons of Israel.' A more idiomatic alternative is preserved in a footnote.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  chosen: and say to them
  alternatives:
  - and tell them
  lexicon: HALOT
  rationale: Straightforward continuation of the speech formula; 'say' preserves the
    formal cadence of legal instruction.
- source_word: אִישׁ אִישׁ
  chosen: If any man's
  alternatives:
  - If a man
  - Any man whose
  lexicon: HALOT
  rationale: The distributive repetition 'man, man' signals 'any man' or 'each man.'
    Because the clause immediately continues with 'his wife,' English compresses the
    distributive sense into 'If any man's wife...' without loss.
- source_word: כִּי
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: 'In this legal casuistic context, כי introduces a conditional case: ''if''
    rather than a simple temporal ''when.'''
- source_word: תִשְׂטֶה
  chosen: goes astray
  alternatives:
  - turns aside
  - strays
  lexicon: HALOT
  rationale: From שטה, used here in the context of suspected marital unfaithfulness.
    'Goes astray' preserves the metaphorical sense without prematurely specifying
    the exact act before the following phrase clarifies it.
- source_word: אִשְׁתּוֹ
  chosen: wife
  alternatives:
  - his wife
  lexicon: HALOT
  rationale: Rendered within the English phrase 'any man's wife'; the possessive is
    preserved syntactically in English.
- source_word: וּמָעֲלָה ... מָעַל
  chosen: commits a breach of faith
  alternatives:
  - acts unfaithfully
  - commits trespass
  lexicon: HALOT
  rationale: The cognate verb+noun construction intensifies the idea of unfaithfulness
    or treachery. 'Commits a breach of faith' captures both the idiomatic force and
    the covenantal/relational betrayal better than the archaic 'trespass.'
- source_word: בּוֹ
  chosen: against him
  alternatives:
  - toward him
  - with respect to him
  lexicon: HALOT
  rationale: In context the preposition marks the husband as the one wronged by the
    wife's breach of faith; 'against him' is natural and sufficiently precise.
