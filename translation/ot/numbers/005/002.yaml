id: NUM.5.2
reference: Numbers 5:2
source:
  edition: WLC
  text: צַ֚ו אֶת בְּנֵ֣י יִשְׂרָאֵ֔ל וִֽ/ישַׁלְּחוּ֙ מִן הַֽ/מַּחֲנֶ֔ה כָּל צָר֖וּעַ
    וְ/כָל זָ֑ב וְ/כֹ֖ל טָמֵ֥א לָ/נָֽפֶשׁ־־־־׃
translation:
  text: Command the sons of Israel that they send out of the camp everyone with a
    skin disease, and everyone with a discharge, and everyone unclean by a dead person.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'every leprous person.' The Hebrew term refers broadly to a serious
      skin affliction in ritual-law contexts, not necessarily modern leprosy.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'everyone unclean by a person/soul'; this idiom refers to impurity
      from a dead body.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַו
  chosen: Command
  alternatives:
  - Order
  - Instruct
  lexicon: HALOT
  rationale: Imperative singular addressed to Moses. 'Command' preserves the force
    of the directive without sounding overly bureaucratic.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' In keeping with the gender-accurate principle,
    the masculine plural is preserved here rather than neutralizing to 'Israelites,'
    while still functioning corporately for the covenant people.
- source_word: וִישַׁלְּחוּ
  chosen: that they send out
  alternatives:
  - that they put out
  - that they expel
  lexicon: HALOT
  rationale: The verb from שלח in this causative/active context means to send away/out.
    'Send out' is natural English and fits the camp-purity setting without adding
    punitive nuance beyond the text.
- source_word: מִן הַמַּחֲנֶה
  chosen: out of the camp
  alternatives:
  - from the camp
  lexicon: HALOT
  rationale: Both are possible; 'out of the camp' idiomatically matches the motion
    implied by the verb.
- source_word: כָּל צָרוּעַ
  chosen: everyone with a skin disease
  alternatives:
  - every leprous person
  - everyone afflicted with a skin condition
  lexicon: HALOT
  rationale: The Hebrew term traditionally rendered 'leprous' refers to a range of
    serious skin afflictions in Levitical purity law, not necessarily Hansen's disease.
    'Everyone with a skin disease' avoids anachronistic medical specificity while
    preserving ritual-impurity context.
- source_word: זָב
  chosen: everyone with a discharge
  alternatives:
  - everyone having a bodily discharge
  - everyone with a genital discharge
  lexicon: HALOT
  rationale: The term denotes one with an abnormal bodily discharge in purity legislation.
    'With a discharge' is concise and sufficiently accurate; 'bodily' is implied by
    context.
- source_word: טָמֵא לָנָפֶשׁ
  chosen: everyone unclean by a dead person
  alternatives:
  - everyone unclean through contact with a corpse
  - everyone made unclean by the dead
  lexicon: HALOT
  rationale: The phrase literally means 'unclean for/by a person/soul,' an idiom in
    Torah for corpse impurity. 'By a dead person' keeps the human reference of נֶפֶשׁ
    here and avoids over-paraphrasing, while still conveying the intended source of
    impurity.
