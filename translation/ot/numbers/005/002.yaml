theological_decisions:
- issue: Rendering of ritual impurity terminology
  chosen_reading: Use 'unclean' in its cultic sense without moralizing it.
  alternative_readings:
  - defiled
  - impure
  rationale: In Numbers 5 the concern is camp holiness and ritual status, not necessarily
    personal sinfulness. 'Unclean' is the standard and clearest English equivalent
    for טָמֵא in this legal context.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
