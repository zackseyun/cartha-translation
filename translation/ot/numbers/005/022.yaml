id: NUM.5.22
reference: Numbers 5:22
source:
  edition: WLC
  text: וּ֠/בָאוּ הַ/מַּ֨יִם הַ/מְאָרְרִ֤ים הָ/אֵ֨לֶּה֙ בְּֽ/מֵעַ֔יִ/ךְ לַ/צְבּ֥וֹת
    בֶּ֖טֶן וְ/לַ/נְפִּ֣ל יָרֵ֑ךְ וְ/אָמְרָ֥ה הָ/אִשָּׁ֖ה אָמֵ֥ן אָמֵֽן׀׃
translation:
  text: and may these curse-bringing waters enter your inward parts, to make the belly
    swell and the thigh waste away. And the woman shall say, ‘Amen, amen.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'to swell the belly and to cause the thigh to fall.'
      The Hebrew expression is difficult and may be a euphemism for reproductive affliction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאוּ
  chosen: and may ... enter
  alternatives:
  - and shall enter
  - and will enter
  lexicon: HALOT
  rationale: Though formally a qatal form, in this oath/curse context it functions
    jussively or as a performative imprecation following the preceding adjuration.
    English 'may ... enter' best captures the volitive force without overstating simple
    futurity.
- source_word: הַמַּיִם
  chosen: waters
  alternatives:
  - water
  lexicon: HALOT
  rationale: The Hebrew is plural, and 'waters' preserves the formal number and ritual
    tone better than the singular 'water.'
- source_word: הַמְאָרְרִים
  chosen: curse-bringing
  alternatives:
  - accursed
  - bitter
  - bringing a curse
  lexicon: HALOT
  rationale: From ארר, 'to curse.' The participle describes the waters as effecting
    or carrying the curse, not merely being 'bitter.' 'Curse-bringing' is concise
    and reflects the causative sense in context.
- source_word: הָאֵלֶּה
  chosen: these
  lexicon: HALOT
  rationale: Straightforward demonstrative modifying 'waters.'
- source_word: בְּמֵעַיִךְ
  chosen: your inward parts
  alternatives:
  - your bowels
  - your abdomen
  - your body
  lexicon: HALOT
  rationale: מֵעֶה can denote inward parts/inner organs. 'Bowels' is too archaic in
    modern English, while 'abdomen' is too clinical. 'Inward parts' preserves bodily
    concreteness and solemnity.
- source_word: לַצְבּוֹת בֶּטֶן
  chosen: to make the belly swell
  alternatives:
  - to swell the belly
  - to make the abdomen swell
  lexicon: HALOT
  rationale: The infinitive expresses result. בֶּטֶן is 'belly/womb' depending on
    context; here 'belly' is the more direct lexical match, while the swelling effect
    is retained.
- source_word: וְלַנְפִּל יָרֵךְ
  chosen: and the thigh waste away
  alternatives:
  - and the thigh fall
  - and the thigh shrivel
  - and the loins collapse
  lexicon: HALOT
  rationale: נפל literally means 'fall,' but in this curse formula with יָרֵךְ it
    is idiomatic and difficult. 'Waste away' communicates bodily affliction in intelligible
    English without importing a specific anatomical interpretation. 'Thigh' is retained
    as the lexical equivalent of יָרֵךְ.
- source_word: יָרֵךְ
  chosen: thigh
  alternatives:
  - hip
  - loins
  - genitals
  lexicon: HALOT
  rationale: The base sense is 'thigh/hip.' Because the phrase may euphemistically
    refer to reproductive organs, a more explicit rendering is possible, but the Hebrew
    itself uses the euphemistic term. 'Thigh' preserves that wording while allowing
    the context to signal reproductive implications.
- source_word: וְאָמְרָה הָאִשָּׁה
  chosen: And the woman shall say
  alternatives:
  - And the woman must say
  - Then the woman shall say
  lexicon: HALOT
  rationale: Simple narrative continuation with prescribed liturgical response. 'Shall
    say' fits legal-ritual style.
- source_word: אָמֵן אָמֵן
  chosen: Amen, amen
  alternatives:
  - Amen, so be it
  - Truly, truly
  lexicon: HALOT
  rationale: The doubled response is a solemn affirmation. Retaining 'Amen' preserves
    the liturgical force and familiar covenantal formula better than paraphrase.
