theological_decisions:
- issue: Nature of the curse language in the ordeal
  chosen_reading: Render the water as 'bringing a curse' rather than as intrinsically
    'accursed.'
  alternative_readings:
  - Render as 'accursed water'
  rationale: The Hebrew participle from ארר most naturally indicates the water's role
    in mediating the covenantal curse if guilt is present. This avoids importing magical
    or superstitious notions into the text while preserving the judicial-ritual force.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
