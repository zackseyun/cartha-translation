id: NUM.5.24
reference: Numbers 5:24
source:
  edition: WLC
  text: וְ/הִשְׁקָה֙ אֶת הָ֣/אִשָּׁ֔ה אֶת מֵ֥י הַ/מָּרִ֖ים הַ/מְאָֽרֲרִ֑ים וּ/בָ֥אוּ
    בָ֛/הּ הַ/מַּ֥יִם הַֽ/מְאָרֲרִ֖ים לְ/מָרִֽים־־׃
translation:
  text: Then he shall make the woman drink the bitter water that brings a curse, and
    the curse-bringing water shall enter into her as bitterness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the water of bitterness that brings a curse.' The Hebrew uses 'waters'
      in the plural form, a common Hebrew expression for water.
    reason: lexical_alternative
  - marker: b
    text: Or 'the accursed water shall enter into her for bitterness.' The Hebrew
      can be rendered more formally, but the main text reflects the participle as
      describing the water's curse-bearing effect.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִשְׁקָה
  chosen: Then he shall make ... drink
  alternatives:
  - and he shall give ... to drink
  - and he shall cause ... to drink
  lexicon: HALOT
  rationale: Hiphil of שׁקה means to cause to drink or give to drink. English idiom
    favors 'make the woman drink' in this ritual context while preserving the causative
    force.
- source_word: הָאִשָּׁה
  chosen: the woman
  lexicon: HALOT
  rationale: Straightforward definite noun; no reason to generalize or paraphrase.
- source_word: מֵי הַמָּרִים
  chosen: the bitter water
  alternatives:
  - the water of bitterness
  - the bitter waters
  lexicon: HALOT
  rationale: Construct phrase literally 'waters of bitterness.' Singular 'water' is
    more natural in English for a liquid substance, while 'bitter' preserves the adjective's
    sense.
- source_word: הַמְאָֽרֲרִים / הַמְאָרֲרִים
  chosen: that brings a curse / curse-bringing
  alternatives:
  - accursed
  - that brings the curse
  - curse-producing
  lexicon: HALOT
  rationale: From ארר, 'to curse.' The participle describes the water as effecting
    or carrying a curse in the ordeal, not merely being itself 'accursed.' I varied
    the English slightly for readability while preserving the same semantic value.
- source_word: וּבָאוּ בָהּ
  chosen: shall enter into her
  alternatives:
  - shall go into her
  - shall come into her
  lexicon: HALOT
  rationale: בוא with ב marks entry into her body. 'Enter into her' is natural and
    sufficiently literal.
- source_word: לְמָרִים
  chosen: as bitterness
  alternatives:
  - for bitterness
  - to become bitter
  lexicon: HALOT
  rationale: The prefixed ל here expresses result or effect. 'As bitterness' captures
    the resultant harmful effect without over-interpreting the physiology.
