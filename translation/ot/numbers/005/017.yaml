id: NUM.5.17
reference: Numbers 5:17
source:
  edition: WLC
  text: וְ/לָקַ֧ח הַ/כֹּהֵ֛ן מַ֥יִם קְדֹשִׁ֖ים בִּ/כְלִי חָ֑רֶשׂ וּ/מִן הֶֽ/עָפָ֗ר
    אֲשֶׁ֤ר יִהְיֶה֙ בְּ/קַרְקַ֣ע הַ/מִּשְׁכָּ֔ן יִקַּ֥ח הַ/כֹּהֵ֖ן וְ/נָתַ֥ן אֶל
    הַ/מָּֽיִם־־־׃
translation:
  text: Then the priest shall take holy water in an earthen vessel, and the priest
    shall take some of the dust that is on the floor of the tabernacle and put it
    into the water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sacred water.' The Hebrew simply means water set apart as holy for ritual
      use.
    reason: lexical_alternative
  - marker: b
    text: Or 'in a clay vessel' or 'in a pottery vessel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from the ground of the tabernacle.' The Hebrew term can mean 'ground'
      or 'floor'; 'floor' fits the tabernacle setting well.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַיִם קְדֹשִׁים
  chosen: holy water
  alternatives:
  - sacred water
  lexicon: HALOT
  rationale: The adjective קְדֹשִׁים straightforwardly means 'holy' or 'sacred.' 'Holy
    water' is the most direct and natural rendering in English, even though later
    ecclesial associations exist; here it simply denotes water set apart for ritual
    use.
- source_word: בִּכְלִי חָרֶשׂ
  chosen: in an earthen vessel
  alternatives:
  - in a clay vessel
  - in a pottery vessel
  lexicon: HALOT
  rationale: כְּלִי is a general term for a vessel/container, and חָרֶשׂ denotes earthenware/clay
    pottery. 'Earthen vessel' preserves the material sense and the ritual register
    of the passage.
- source_word: הֶעָפָר
  chosen: the dust
  alternatives:
  - the dirt
  - the loose soil
  lexicon: HALOT
  rationale: עָפָר commonly denotes dust, dry earth, or loose soil. 'Dust' best matches
    the ritual imagery and traditional semantic range without becoming colloquial.
- source_word: בְּקַרְקַע הַמִּשְׁכָּן
  chosen: on the floor of the tabernacle
  alternatives:
  - from the ground of the tabernacle
  - on the ground of the tabernacle
  lexicon: HALOT
  rationale: קַרְקַע refers to the ground/floor surface. In the context of the mishkan,
    'floor' communicates the interior surface more naturally than 'ground,' while
    'tabernacle' is the standard rendering of מִשְׁכָּן in this cultic context.
- source_word: מִן הֶעָפָר
  chosen: some of the dust
  alternatives:
  - dust from
  - part of the dust
  lexicon: HALOT
  rationale: 'The preposition מִן is partitive here: the priest takes from the dust,
    not necessarily all of it. English idiom is best served by ''some of the dust.'''
- source_word: וְלָקַח ... יִקַּח ... וְנָתַן
  chosen: shall take ... shall take ... and put
  alternatives:
  - took ... takes ... and puts
  lexicon: HALOT
  rationale: The sequence mixes wayyiqtol and yiqtol forms in procedural instruction.
    In English legal/ritual style, 'shall' appropriately conveys prescribed action.
    'Put' is a natural rendering of נָתַן with אֶל in this context.
- source_word: הַמָּיִם
  chosen: the water
  lexicon: HALOT
  rationale: The final phrase refers back to the previously mentioned holy water.
    English naturally uses 'the water' for this anaphoric reference.
