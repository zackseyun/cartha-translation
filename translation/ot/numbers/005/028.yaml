theological_decisions:
- issue: Nature of the promised outcome after vindication
  chosen_reading: The verse promises that the innocent woman is cleared and granted/confirmed
    capacity to conceive.
  alternative_readings:
  - The verse simply states she will conceive
  - The phrase is a euphemism for continued fertility in general
  rationale: The Hebrew idiom וְנִזְרְעָה זָרַע is best taken as fertility/conception
    language. Rendering it as 'will be able to conceive offspring' preserves the idiomatic
    sense without overstating certainty beyond the wording.
