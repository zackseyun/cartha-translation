id: NUM.5.28
reference: Numbers 5:28
source:
  edition: WLC
  text: וְ/אִם לֹ֤א נִטְמְאָה֙ הָֽ/אִשָּׁ֔ה וּ/טְהֹרָ֖ה הִ֑וא וְ/נִקְּתָ֖ה וְ/נִזְרְעָ֥ה
    זָֽרַע־׃
translation:
  text: But if the woman has not defiled herself and is clean, then she will be cleared
    and will be able to conceive offspring.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''will be sown with seed,'' an idiom meaning to conceive or have
      offspring.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: HALOT
  rationale: Conditional conjunction introducing the contrasting case to the previous
    verse; 'But if' brings out the adversative force in context better than a simple
    'And if'.
- source_word: לֹא נִטְמְאָה
  chosen: has not defiled herself
  alternatives:
  - has not become unclean
  - has not been defiled
  lexicon: HALOT
  rationale: The Niphal of טמא can mean 'become unclean/defiled.' In this adultery-ordeal
    context, 'defiled herself' reflects the moral/sexual impurity in view and matches
    the reflexive sense often conveyed in English, while remaining natural.
- source_word: הָאִשָּׁה
  chosen: the woman
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun.
- source_word: וּטְהֹרָה הִוא
  chosen: and is clean
  alternatives:
  - and she is clean
  - and is pure
  lexicon: HALOT
  rationale: טָהוֹר denotes cleanness/purity. 'Clean' is idiomatic and fits the ritual-moral
    context without overstating with 'pure.' The pronoun הִוא is absorbed into natural
    English syntax.
- source_word: וְנִקְּתָה
  chosen: then she will be cleared
  alternatives:
  - then she will be free
  - then she will be acquitted
  - then she will be unharmed
  lexicon: HALOT
  rationale: From נקה in the Niphal, meaning to be free, clear, or acquitted. In context
    of the ordeal's outcome, 'will be cleared' best captures vindication from the
    accusation without importing a narrowly forensic courtroom setting.
- source_word: וְנִזְרְעָה זָרַע
  chosen: and will be able to conceive offspring
  alternatives:
  - and will conceive seed
  - and will be sown with seed
  - and will bear children
  lexicon: HALOT
  rationale: This idiom is difficult literally ('be sown with seed'). In context it
    refers to restored/confirmed fertility. 'Will be able to conceive offspring' communicates
    the Hebrew idiom in clear modern English while avoiding the overly interpretive
    'bear children,' which goes beyond conception.
