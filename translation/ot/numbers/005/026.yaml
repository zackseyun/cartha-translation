id: NUM.5.26
reference: Numbers 5:26
source:
  edition: WLC
  text: וְ/קָמַ֨ץ הַ/כֹּהֵ֤ן מִן הַ/מִּנְחָה֙ אֶת אַזְכָּ֣רָתָ֔/הּ וְ/הִקְטִ֖יר הַ/מִּזְבֵּ֑חָ/ה
    וְ/אַחַ֛ר יַשְׁקֶ֥ה אֶת הָ/אִשָּׁ֖ה אֶת הַ/מָּֽיִם־־־־׃
translation:
  text: Then the priest shall take a handful from the grain offering, its memorial
    portion, and burn it on the altar; afterward he shall make the woman drink the
    water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bitter water'; the broader context identifies this water that way,
      but this verse itself says simply 'the water.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָמַץ
  chosen: shall take a handful
  alternatives:
  - shall grasp
  - shall scoop out a handful
  lexicon: HALOT
  rationale: The verb קמץ in sacrificial contexts refers specifically to taking a
    handful from an offering. 'Take a handful' is idiomatic and precise in English,
    preserving the ritual action better than a more generic 'take' or overly literal
    'grasp.' The prefixed waw with perfect is rendered sequentially/futuristically
    in legal instruction context as 'Then ... shall.'
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן in cultic/legal contexts.
- source_word: מִן־הַמִּנְחָה
  chosen: from the grain offering
  alternatives:
  - from the offering
  - from the tribute offering
  lexicon: HALOT
  rationale: מִנְחָה in priestly sacrificial context denotes the grain offering, not
    merely a generic gift. 'Grain offering' is the clearest established English equivalent.
- source_word: אֶת אַזְכָּרָתָהּ
  chosen: its memorial portion
  alternatives:
  - its memorial offering
  - the reminder portion of it
  lexicon: HALOT
  rationale: אַזְכָּרָה refers to the memorial portion of a grain offering burned
    on the altar. 'Memorial portion' is both technically accurate and readable. The
    3fs suffix refers back to the grain offering.
- source_word: וְהִקְטִיר הַמִּזְבֵּחָה
  chosen: and burn it on the altar
  alternatives:
  - and turn it into smoke on the altar
  - and offer it up in smoke on the altar
  lexicon: HALOT
  rationale: הקטיר in sacrificial usage means to burn as an offering, often with the
    nuance of producing smoke before God. 'Burn it on the altar' is natural English
    and sufficiently captures the cultic act. The directional suffix on מִזְבֵּחָה
    is idiomatically rendered 'on the altar.' The object 'it' is supplied in English
    from the memorial portion.
- source_word: וְאַחַר
  chosen: afterward
  alternatives:
  - and afterward
  - then after that
  lexicon: HALOT
  rationale: Temporal adverb marking sequence; 'afterward' reads naturally in English
    legal narrative.
- source_word: יַשְׁקֶה
  chosen: he shall make ... drink
  alternatives:
  - he shall give ... to drink
  - he shall cause ... to drink
  lexicon: HALOT
  rationale: 'The Hiphil of שׁקה is causative: the priest causes the woman to drink.
    ''Make the woman drink'' preserves the causative force more clearly than simple
    ''give to drink.'''
- source_word: אֶת־הָאִשָּׁה
  chosen: the woman
  lexicon: HALOT
  rationale: Direct object of the causative verb; straightforward rendering.
- source_word: אֶת־הַמָּיִם
  chosen: the water
  alternatives:
  - the bitter water
  lexicon: HALOT
  rationale: The Hebrew here says simply 'the water.' Although the broader context
    identifies it as the bitter water, that adjective is not present in this verse
    and should not be imported into the main text.
