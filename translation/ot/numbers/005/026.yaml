theological_decisions:
- issue: Whether to specify the water as 'bitter water' in the main text from the
    broader ritual context
  chosen_reading: Retain the simple phrase 'the water'
  alternative_readings:
  - the bitter water
  rationale: The verse itself uses only הַמָּיִם ('the water'). Adding 'bitter' would
    import wording from nearby verses and over-interpret the immediate text. This
    follows the translation philosophy of original-language primacy and avoiding paraphrase
    beyond what the source warrants.
  doctrine_reference: Translation philosophy §1, §6
