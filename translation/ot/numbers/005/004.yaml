id: NUM.5.4
reference: Numbers 5:4
source:
  edition: WLC
  text: וַ/יַּֽעֲשׂוּ כֵן֙ בְּנֵ֣י יִשְׂרָאֵ֔ל וַ/יְשַׁלְּח֣וּ אוֹתָ֔/ם אֶל מִ/ח֖וּץ לַֽ/מַּחֲנֶ֑ה כַּ/אֲשֶׁ֨ר דִּבֶּ֤ר יְהוָה֙ אֶל מֹשֶׁ֔ה כֵּ֥ן עָשׂ֖וּ בְּנֵ֥י יִשְׂרָאֵֽל־־־׃פ
translation:
  text: And the sons of Israel did so, and sent them outside the camp; just as Yahweh had spoken to Moses, so the sons of Israel did.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the sons of Israel'; many English versions render this corporately as 'the Israelites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ כֵן
  chosen: did so
  alternatives:
  - did thus
  - acted accordingly
  lexicon: HALOT
  rationale: Idiomatic rendering of עשה + כן meaning compliance with the preceding command. 'Did so' is natural English and preserves the sense without unnecessary stiffness.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Rendered formally as 'the sons of Israel' to preserve the Hebrew familial expression בני ישראל. This is gender-accurate to the source while still functioning corporately for the nation.
- source_word: וַיְשַׁלְּחוּ אֹתָם
  chosen: sent them
  alternatives:
  - sent them away
  - put them out
  lexicon: HALOT
  rationale: שׁלח in this context denotes dispatching/removing persons from the camp. 'Sent them' is the most direct rendering; the destination phrase supplies the force of removal.
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - to outside the camp
  - to the outside of the camp
  lexicon: HALOT
  rationale: Smooth English rendering of the prepositional phrase. 'Outside the camp' captures the spatial exclusion clearly and naturally.
- source_word: כַּאֲשֶׁר דִּבֶּר
  chosen: just as ... had spoken
  alternatives:
  - as ... spoke
  - according to what ... said
  lexicon: HALOT
  rationale: The comparative particle כַאֲשֶׁר introduces conformity to the divine command. 'Just as ... had spoken' reflects prior speech relative to the action now narrated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כֵּן עָשׂוּ
  chosen: so ... did
  alternatives:
  - thus ... did
  - so they did
  lexicon: HALOT
  rationale: The verse closes with a resumptive repetition emphasizing Israel's obedience. Rendering it explicitly preserves the Hebrew repetition rather than collapsing it as redundant.
