theological_decisions:
- issue: Nature of 'spirit of jealousy'
  chosen_reading: Rendered literally as 'a spirit of jealousy' without specifying whether it is a psychological impulse or a spiritual force.
  alternative_readings:
  - a fit of jealousy
  - a jealous impulse
  rationale: The Hebrew phrase can denote an overpowering disposition without requiring a technical claim about demonic or divine agency. Preserving the literal wording maintains the text's ambiguity rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
