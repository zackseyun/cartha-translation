id: NUM.5.30
reference: Numbers 5:30
source:
  edition: WLC
  text: א֣וֹ אִ֗ישׁ אֲשֶׁ֨ר תַּעֲבֹ֥ר עָלָ֛י/ו ר֥וּחַ קִנְאָ֖ה וְ/קִנֵּ֣א אֶת אִשְׁתּ֑/וֹ וְ/הֶעֱמִ֤יד אֶת הָֽ/אִשָּׁה֙ לִ/פְנֵ֣י יְהוָ֔ה וְ/עָ֤שָׂה לָ/הּ֙ הַ/כֹּהֵ֔ן אֵ֥ת כָּל הַ/תּוֹרָ֖ה הַ/זֹּֽאת־־־׃
translation:
  text: or when a spirit of jealousy comes over a man, and he is jealous of his wife, and he brings the woman before Yahweh, and the priest shall do to her all this law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'comes upon'; literally 'passes over him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all this law,' 'all this procedure,' or 'all this ritual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: א֣וֹ
  chosen: or when
  alternatives:
  - or
  - or if
  lexicon: HALOT
  rationale: Introduces the second alternative in the larger sentence begun earlier in the paragraph. 'Or when' reads naturally in English while preserving the disjunctive force.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a husband
  lexicon: HALOT
  rationale: The Hebrew is the common term for 'man.' In this marital context 'husband' is possible by implication, but 'a man' preserves the source wording while the following 'his wife' supplies the relationship.
- source_word: תַּעֲבֹר עָלָיו רוּחַ קִנְאָה
  chosen: a spirit of jealousy comes over
  alternatives:
  - passes over
  - comes upon
  lexicon: HALOT
  rationale: The idiom literally speaks of a 'spirit of jealousy' passing over/upon him. 'Comes over' is idiomatic modern English that preserves the sense of an overpowering impulse without over-interpreting whether this is psychological or spiritual.
- source_word: רוּחַ
  chosen: spirit
  alternatives:
  - wind
  - breath
  - impulse
  lexicon: HALOT
  rationale: In this idiom 'spirit' is the most natural rendering and preserves the Hebrew's ambiguity between inner disposition and overpowering impulse.
- source_word: קִנְאָה
  chosen: jealousy
  alternatives:
  - zeal
  - envy
  lexicon: HALOT
  rationale: In the context of suspected marital unfaithfulness, 'jealousy' best matches the sense.
- source_word: וְקִנֵּא
  chosen: and he is jealous of
  alternatives:
  - and he becomes jealous of
  - and he is zealous regarding
  lexicon: HALOT
  rationale: The verb is cognate with the noun and continues the jealousy motif. 'Is jealous of' is clear and idiomatic in English.
- source_word: אֶת אִשְׁתּוֹ
  chosen: his wife
  lexicon: HALOT
  rationale: Straightforward possessive construction in context.
- source_word: וְהֶעֱמִיד אֶת הָאִשָּׁה לִפְנֵי יְהוָה
  chosen: and he brings the woman before the LORD
  alternatives:
  - and he sets the woman before the LORD
  - and he makes the woman stand before the LORD
  lexicon: HALOT
  rationale: The causative of עמד literally means 'cause to stand' or 'present.' 'Brings ... before' is natural English for formal presentation in a ritual setting. 'The woman' refers to the wife under accusation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: וְעָשָׂה לָהּ הַכֹּהֵן
  chosen: and the priest shall do to her
  alternatives:
  - and the priest shall perform for her
  - and the priest shall carry out for her
  lexicon: HALOT
  rationale: The Hebrew uses a common verb 'do/make' with the priest as subject. 'Shall do to her' preserves the formal legal-ritual tone and future/jussive-like procedural force in context.
- source_word: כָּל הַתּוֹרָה הַזֹּאת
  chosen: all this instruction
  alternatives:
  - all this law
  - all this ritual
  - all this procedure
  lexicon: HALOT
  rationale: תּוֹרָה can mean law, instruction, or directive. Here it refers to the prescribed procedure just described. 'Instruction' preserves the broader semantic range better than 'law,' while 'all this instruction' still fits the legal-ritual context.
