id: NUM.5.18
reference: Numbers 5:18
source:
  edition: WLC
  text: וְ/הֶעֱמִ֨יד הַ/כֹּהֵ֥ן אֶֽת הָ/אִשָּׁה֮ לִ/פְנֵ֣י יְהוָה֒ וּ/פָרַע֙ אֶת רֹ֣אשׁ הָֽ/אִשָּׁ֔ה וְ/נָתַ֣ן עַל כַּפֶּ֗י/הָ אֵ֚ת מִנְחַ֣ת הַ/זִּכָּר֔וֹן מִנְחַ֥ת קְנָאֹ֖ת הִ֑וא וּ/בְ/יַ֤ד הַ/כֹּהֵן֙ יִהְי֔וּ מֵ֥י הַ/מָּרִ֖ים הַ/מְאָֽרֲרִֽים־־־׃
translation:
  text: Then the priest shall set the woman before Yahweh, uncover the woman's head, and place in her hands the grain offering of remembrance—it is a grain offering of jealousy—while in the priest's hand are the bitter waters that bring a curse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'uncover the woman's head' or 'let the woman's hair hang loose.' The Hebrew idiom literally says 'loosen/unbind the woman's head,' likely referring to unbinding her hair as part of the ritual.
    reason: lexical_alternative
  - marker: b
    text: Or 'the bitter waters that bring the curse.' The Hebrew participle can be understood as describing waters that effect or carry a curse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעֱמִיד
  chosen: shall set
  alternatives:
  - shall make stand
  - shall present
  lexicon: HALOT
  rationale: Hiphil of עמד here means to cause someone to stand/present them in an official setting. 'Set' is natural English while preserving the formal ritual action.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard cultic expression for appearing in Yahweh's presence. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: וּפָרַע אֶת רֹאשׁ הָאִשָּׁה
  chosen: loosen the woman's hair
  alternatives:
  - uncover the woman's head
  - let the woman's hair hang loose
  lexicon: HALOT
  rationale: The idiom literally involves the woman's 'head,' but in context refers to loosening/unbinding the hair rather than removing a head covering. 'Loosen the woman's hair' best conveys the ritual act in clear English without over-literal obscurity.
- source_word: וְנָתַן עַל כַּפֶּיהָ
  chosen: place in her hands
  alternatives:
  - put on her palms
  - put into her hands
  lexicon: HALOT
  rationale: Though literally 'upon her palms,' idiomatic English is 'in her hands.' This preserves the concrete ritual gesture.
- source_word: מִנְחַת הַזִּכָּרוֹן
  chosen: the grain offering of remembrance
  alternatives:
  - the memorial grain offering
  - the grain offering for remembrance
  lexicon: HALOT
  rationale: מִנְחָה in priestly context is a grain offering. הַזִּכָּרוֹן denotes memorial/remembrance. 'Of remembrance' is transparent and readable.
- source_word: מִנְחַת קְנָאֹת הִוא
  chosen: it is a grain offering of jealousy
  alternatives:
  - it is a grain offering of jealousies
  - it is a jealousy offering
  lexicon: HALOT
  rationale: קְנָאֹת is plural in form but functions abstractly; singular 'jealousy' is better English. Repeating 'grain offering' preserves the Hebrew apposition.
- source_word: וּבְיַד הַכֹּהֵן יִהְיוּ
  chosen: while in the priest's hand are
  alternatives:
  - and in the priest's hand shall be
  - with the priest holding
  lexicon: HALOT
  rationale: The clause is circumstantial, describing what the priest holds during the rite. Singular 'hand' follows the Hebrew.
- source_word: מֵי הַמָּרִים
  chosen: the bitter waters
  alternatives:
  - the waters of bitterness
  - the bitter water
  lexicon: HALOT
  rationale: Construct phrase naturally rendered 'the bitter waters.' Plural 'waters' reflects Hebrew usage.
- source_word: הַמְאָֽרֲרִים
  chosen: that bring a curse
  alternatives:
  - that cause cursing
  - that are curse-bringing
  - that bring the curse
  lexicon: HALOT
  rationale: Participle from ארר describes the waters as effecting a curse. 'That bring a curse' is idiomatic and preserves the causative sense without awkwardness.
