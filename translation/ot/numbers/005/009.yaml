id: NUM.5.9
reference: Numbers 5:9
source:
  edition: WLC
  text: וְ/כָל תְּרוּמָ֞ה לְ/כָל קָדְשֵׁ֧י בְנֵי יִשְׂרָאֵ֛ל אֲשֶׁר יַקְרִ֥יבוּ לַ/כֹּהֵ֖ן
    ל֥/וֹ יִהְיֶֽה־־־־׃
translation:
  text: And every contribution from all the holy gifts of the sons of Israel, which
    they bring near to the priest, shall be his.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites” or “the children of Israel.” The Hebrew reads “the sons
      of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “holy things” or “sacred offerings.”
    reason: lexical_alternative
  - marker: c
    text: The verb can also be rendered “present” in sacrificial contexts; literally,
      “bring near.”
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּרוּמָה
  chosen: contribution
  alternatives:
  - offering
  - heave offering
  lexicon: HALOT
  rationale: תְּרוּמָה denotes a contribution or offering set apart and given, often
    as a priestly due. 'Contribution' is natural modern English and avoids the overly
    technical/archaic 'heave offering,' while still preserving the idea of something
    lifted up/presented.
- source_word: קָדְשֵׁי
  chosen: holy gifts
  alternatives:
  - holy things
  - sacred offerings
  lexicon: HALOT
  rationale: The plural construct of קֹדֶשׁ here refers to consecrated items/gifts.
    'Holy gifts' communicates dedicated sacred items in readable English. 'Holy things'
    is more literal but less idiomatic in this context.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Following the project's gender-accurate principle, בְנֵי is retained
    as 'sons' rather than neutralized. This preserves the Hebrew form while remaining
    understandable. 'Israelites' is smoother but less formally transparent.
- source_word: יַקְרִיבוּ
  chosen: bring near
  alternatives:
  - present
  - bring
  lexicon: HALOT
  rationale: The Hiphil of קרב commonly means to bring near/present in sacrificial
    contexts. 'Bring near' preserves the cultic nuance more transparently than the
    flatter 'bring,' while remaining understandable.
- source_word: לַכֹּהֵן
  chosen: to the priest
  alternatives:
  - for the priest
  lexicon: HALOT
  rationale: The preposition marks the recipient of the presented sacred gift. 'To
    the priest' follows the Hebrew directly; the following clause clarifies possession.
- source_word: לוֹ יִהְיֶה
  chosen: shall be his
  alternatives:
  - shall belong to him
  lexicon: HALOT
  rationale: This idiom expresses legal possession. 'Shall be his' is concise, natural,
    and faithful to the Hebrew legal style.
