id: NUM.5.25
reference: Numbers 5:25
source:
  edition: WLC
  text: וְ/לָקַ֤ח הַ/כֹּהֵן֙ מִ/יַּ֣ד הָֽ/אִשָּׁ֔ה אֵ֖ת מִנְחַ֣ת הַ/קְּנָאֹ֑ת וְ/הֵנִ֤יף
    אֶת הַ/מִּנְחָה֙ לִ/פְנֵ֣י יְהוָ֔ה וְ/הִקְרִ֥יב אֹתָ֖/הּ אֶל הַ/מִּזְבֵּֽחַ־־׃
translation:
  text: Then the priest shall take from the woman’s hand the grain offering of jealousy,
    and he shall wave the grain offering before the LORD and bring it near to the
    altar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְלָקַח
  chosen: Then ... shall take
  alternatives:
  - and ... shall take
  - and ... took
  lexicon: HALOT
  rationale: The waw + qatal continues the ritual procedure in instructional sequence.
    English 'Then ... shall take' conveys the next prescribed step naturally while
    preserving the procedural force.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Standard rendering of the cultic official; definite article retained.
- source_word: מִיַּד הָאִשָּׁה
  chosen: from the woman’s hand
  alternatives:
  - from the hand of the woman
  lexicon: HALOT
  rationale: A natural English rendering of the Hebrew idiom with the possessive preserved;
    it indicates direct receipt from her.
- source_word: מִנְחַת הַקְּנָאֹת
  chosen: the grain offering of jealousy
  alternatives:
  - the jealousy offering
  - the grain offering of jealousies
  lexicon: HALOT
  rationale: מִנְחָה in priestly contexts commonly denotes a grain offering. Retaining
    'of jealousy' reflects the genitival construction and the established ritual designation
    in this passage.
- source_word: וְהֵנִיף
  chosen: shall wave
  alternatives:
  - shall present as a wave offering
  - shall elevate
  lexicon: HALOT
  rationale: The hiphil of נוף in sacrificial contexts refers to the ritual wave motion.
    'Shall wave' is concise and standard, while the object remains the offering itself.
- source_word: הַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the offering
  lexicon: HALOT
  rationale: Repeating 'grain offering' preserves lexical consistency with מִנְחָה
    and avoids flattening the specific sacrificial category.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard cultic expression. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name as specified
    in DOCTRINE.md.
- source_word: וְהִקְרִיב אֹתָהּ אֶל הַמִּזְבֵּחַ
  chosen: and bring it near to the altar
  alternatives:
  - and present it at the altar
  - and bring it to the altar
  lexicon: HALOT
  rationale: The hiphil of קרב literally means 'bring near' in sacrificial presentation
    contexts. 'Bring it near to the altar' preserves that cultic nuance better than
    the more generic 'bring it' while remaining readable.
