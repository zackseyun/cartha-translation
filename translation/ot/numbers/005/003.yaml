id: NUM.5.3
reference: Numbers 5:3
source:
  edition: WLC
  text: מִ/זָּכָ֤ר עַד נְקֵבָה֙ תְּשַׁלֵּ֔חוּ אֶל מִ/ח֥וּץ לַֽ/מַּחֲנֶ֖ה תְּשַׁלְּח֑וּ/ם
    וְ/לֹ֤א יְטַמְּאוּ֙ אֶת מַ֣חֲנֵי/הֶ֔ם אֲשֶׁ֥ר אֲנִ֖י שֹׁכֵ֥ן בְּ/תוֹכָֽ/ם־־־׃
translation:
  text: From male to female you shall send them outside the camp; you shall send them
    out so that they may not defile their camps, in whose midst I dwell.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their camp'; the Hebrew has the plural 'their camps,' possibly referring
      to the camp's divisions or encampments.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the midst of which I dwell.' The Hebrew may refer either to the camps
      or to the people associated with them.
    reason: alternative_reading
lexical_decisions:
- source_word: מִזָּכָר עַד נְקֵבָה
  chosen: From male to female
  alternatives:
  - From man to woman
  - Both male and female
  lexicon: HALOT
  rationale: The Hebrew marks the full range inclusively. 'Male' and 'female' is the
    most direct gender-accurate rendering of זָכָר / נְקֵבָה here, matching the source's
    biological pair rather than the more socially marked 'man/woman.'
- source_word: תְּשַׁלֵּחוּ / תְּשַׁלְּחוּם
  chosen: you shall send them ... you shall send them out
  alternatives:
  - you shall expel them
  - you shall put them out
  lexicon: HALOT
  rationale: The repeated Piel of שלח is preserved with a repeated English verb for
    emphasis. 'Send them out' fits the exclusion-from-camp context without overstating
    the force as punitive 'expel.'
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  chosen: outside the camp
  alternatives:
  - to outside the camp
  - to the area outside the camp
  lexicon: HALOT
  rationale: This compresses the Hebrew prepositional phrase into natural English
    while preserving the spatial sense of removal beyond the camp boundary.
- source_word: יְטַמְּאוּ
  chosen: they may not defile
  alternatives:
  - they may not make unclean
  - they may not contaminate
  lexicon: HALOT
  rationale: טמא in priestly purity contexts often denotes ritual defilement. 'Defile'
    is concise, readable, and preserves the cultic force better than the flatter 'contaminate.'
- source_word: מַחֲנֵיהֶם
  chosen: their camps
  alternatives:
  - their camp
  lexicon: HALOT
  rationale: The Hebrew noun is plural with a 3mp suffix. 'Their camps' preserves
    the plural form, likely reflecting the camp's divisions/encampments rather than
    flattening to a singular collective.
- source_word: אֲשֶׁר אֲנִי שֹׁכֵן בְּתוֹכָם
  chosen: in whose midst I dwell
  alternatives:
  - among whom I dwell
  - in the midst of which I dwell
  lexicon: HALOT
  rationale: The relative clause most naturally refers to the camps/people as the
    sphere of God's indwelling presence. 'In whose midst I dwell' preserves the solemn
    covenantal tone and the personal divine presence expressed by שכן.
