id: NUM.5.6
reference: Numbers 5:6
source:
  edition: WLC
  text: דַּבֵּר֮ אֶל בְּנֵ֣י יִשְׂרָאֵל֒ אִ֣ישׁ אֽוֹ אִשָּׁ֗ה כִּ֤י יַעֲשׂוּ֙ מִ/כָּל
    חַטֹּ֣את הָֽ/אָדָ֔ם לִ/מְעֹ֥ל מַ֖עַל בַּ/יהוָ֑ה וְ/אָֽשְׁמָ֖ה הַ/נֶּ֥פֶשׁ הַ/הִֽוא־־־׃
translation:
  text: 'Speak to the sons of Israel: When a man or a woman commits any of the sins
    of man, by acting unfaithfully against the LORD, then that person is guilty,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'any of the sins of humankind.' The Hebrew 'man' here is generic, referring
      to human beings generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Piel imperative of דבר is naturally rendered 'Speak' in direct divine
    address formulas; concise and standard in legal instruction contexts.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the source expression literally while
    still idiomatic in English. 'Israelites' is possible but loses the familial/covenantal
    wording. This aligns with the stated philosophy to prefer gender-accurate renderings
    over flattening to neutral forms.
- source_word: אִישׁ אֽוֹ אִשָּׁה
  chosen: a man or a woman
  alternatives:
  - any man or woman
  lexicon: HALOT
  rationale: Explicitly preserves the male/female pair in the Hebrew and signals that
    the law applies to either sex.
- source_word: כִּי יַעֲשׂוּ
  chosen: When ... commits
  alternatives:
  - If ... does
  - when they do
  lexicon: HALOT
  rationale: Although the verb is morphologically plural, it follows the distributive
    singular 'a man or a woman' and is best represented idiomatically in English by
    a singular generic construction. 'When' fits the casuistic legal style.
- source_word: מִכָּל חַטֹּאת הָאָדָם
  chosen: any of the sins of man
  alternatives:
  - any human sin
  - any of the sins of humankind
  lexicon: HALOT
  rationale: חטֹּאת denotes sins/offenses; הָאָדָם here is generic humanity rather
    than a male individual. 'Sins of man' preserves the Hebrew's generic singular
    אדם and the doctrine's preference for 'man / humankind' according to context.
    The phrase likely means sins commonly committed by humans.
- source_word: לִמְעֹל מַעַל
  chosen: by acting unfaithfully
  alternatives:
  - to commit a trespass
  - to act treacherously
  - to break faith
  lexicon: HALOT
  rationale: The infinitive + cognate noun intensifies the idea of breach of faith.
    'Acting unfaithfully' captures the covenantal disloyalty better than the more
    archaic 'commit a trespass,' while remaining readable.
- source_word: בַּיהוָה
  chosen: against the LORD
  alternatives:
  - against Yahweh
  - against the LORD himself
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The preposition ב with מעל
    in this idiom indicates unfaithfulness directed against the LORD, not merely 'in
    the LORD.'
- source_word: וְאָשְׁמָה הַנֶּפֶשׁ הַהִוא
  chosen: then that person is guilty
  alternatives:
  - then that soul shall bear guilt
  - and that person becomes guilty
  lexicon: HALOT
  rationale: נפש here refers to the individual person, not an immaterial 'soul' in
    a technical sense. 'Is guilty' expresses the resultant state of liability clearly
    in modern English.
