- issue: Rendering of יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering of הָאָדָם in a generic legal expression
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The phrase is generic rather than male-specific. 'Sins of man' preserves
    the Hebrew wording and the project's gender-accurate policy, while a footnote
    preserves the more explicitly inclusive sense for modern readers.
