id: NUM.2.3
reference: Numbers 2:3
source:
  edition: WLC
  text: וְ/הַ/חֹנִים֙ קֵ֣דְמָ/ה מִזְרָ֔חָ/ה דֶּ֛גֶל מַחֲנֵ֥ה יְהוּדָ֖ה לְ/צִבְאֹתָ֑/ם
    וְ/נָשִׂיא֙ לִ/בְנֵ֣י יְהוּדָ֔ה נַחְשׁ֖וֹן בֶּן עַמִּינָדָֽב־׃
translation:
  text: Those who camp on the east side, toward the sunrise, shall be the banner of
    the camp of Judah by their divisions; and the leader of the sons of Judah shall
    be Nahshon son of Amminadab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the east, toward the sunrise.' The Hebrew uses two directional expressions
      for emphasis and specificity.
    reason: lexical_alternative
  - marker: b
    text: '''Banner'' may also be rendered ''standard.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'according to their companies' or 'according to their armies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַחֹנִים
  chosen: Those who camp
  alternatives:
  - Those camping
  - The ones encamped
  lexicon: HALOT
  rationale: The participial form functions substantivally, referring to the group
    positioned in this location. 'Those who camp' is natural English and preserves
    the ongoing/state sense without over-literal awkwardness.
- source_word: קֵדְמָה מִזְרָחָה
  chosen: on the east side, toward the sunrise
  alternatives:
  - to the east, toward the sunrise
  - eastward, toward the east
  lexicon: HALOT
  rationale: The paired directional terms intensify and specify location. Rendering
    both avoids flattening the Hebrew repetition. 'Toward the sunrise' captures מִזְרָחָה
    vividly and naturally, while 'on the east side' conveys the camp's placement.
- source_word: דֶּגֶל
  chosen: banner
  alternatives:
  - standard
  - division-banner
  lexicon: HALOT
  rationale: דֶּגֶל denotes a military/tribal standard or banner. 'Banner' is readable
    modern English; 'standard' is possible but slightly less transparent for contemporary
    readers.
- source_word: מַחֲנֵה יְהוּדָה
  chosen: the camp of Judah
  alternatives:
  - Judah's camp
  lexicon: HALOT
  rationale: The construct chain is straightforward. 'The camp of Judah' preserves
    the formal relationship and fits the military-camp context.
- source_word: לְצִבְאֹתָם
  chosen: by their divisions
  alternatives:
  - according to their companies
  - by their hosts
  - according to their armies
  lexicon: HALOT
  rationale: צָבָא in this context refers to organized tribal groupings for encampment
    and movement. 'By their divisions' communicates ordered arrangement without implying
    a modern standing army, while still preserving the military-organizational nuance.
- source_word: וְנָשִׂיא
  chosen: and the leader
  alternatives:
  - and the chief
  - and the prince
  lexicon: HALOT
  rationale: נָשִׂיא commonly denotes a tribal chief or leader. 'Leader' is clear
    modern English and avoids the potentially misleading royal connotations of 'prince'
    in this context.
- source_word: לִבְנֵי יְהוּדָה
  chosen: of the sons of Judah
  alternatives:
  - for the sons of Judah
  - of the people of Judah
  lexicon: HALOT
  rationale: The Hebrew is literally 'for/of the sons of Judah.' Following the project's
    gender-accurate principle, 'sons' is retained rather than neutralizing to 'people,'
    since the phrase is a standard tribal designation tied to descent language.
- source_word: נַחְשׁוֹן בֶּן עַמִּינָדָב
  chosen: Nahshon son of Amminadab
  alternatives:
  - Nahshon, the son of Amminadab
  lexicon: HALOT
  rationale: Personal names are transliterated per project policy. The filial construction
    is rendered directly and idiomatically.
