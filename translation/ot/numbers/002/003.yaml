theological_decisions:
- issue: Gendered tribal designation in לִבְנֵי יְהוּדָה
  chosen_reading: of the sons of Judah
  alternative_readings:
  - of the people of Judah
  - of the Israelites of Judah
  rationale: The Hebrew uses the standard descent formula 'sons of Judah.' In keeping
    with the doctrine's gender-accurate principle, the translation preserves the masculine
    genealogical language rather than replacing it with a neutral collective.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
