id: NUM.2.22
reference: Numbers 2:22
source:
  edition: WLC
  text: וּ/מַטֵּ֖ה בִּנְיָמִ֑ן וְ/נָשִׂיא֙ לִ/בְנֵ֣י בִנְיָמִ֔ן אֲבִידָ֖ן בֶּן גִּדְעֹנִֽי־׃
translation:
  text: And the tribe of Benjamin; the leader of the sons of Benjamin was Abidan son
    of Gideoni.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the leader for the sons of Benjamin.' The Hebrew preposition can be
      rendered in more than one closely related way here.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַטֶּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  lexicon: HALOT
  rationale: In census/camp arrangement contexts in Numbers, מַטֶּה denotes a tribal
    unit rather than a literal staff. 'Tribe' is the natural and contextually correct
    English rendering.
- source_word: בִּנְיָמִן
  chosen: Benjamin
  rationale: Proper tribal/personal name; transliterated by standard English convention
    per translation philosophy.
- source_word: נָשִׂיא
  chosen: leader
  alternatives:
  - chief
  - prince
  lexicon: HALOT
  rationale: In Numbers this term refers to the recognized head of a tribe. 'Leader'
    is clear modern English and avoids the potentially misleading royal connotations
    of 'prince' while preserving the office's representative authority.
- source_word: לִבְנֵי בִנְיָמִן
  chosen: of the sons of Benjamin
  alternatives:
  - for the sons of Benjamin
  - of the people of Benjamin
  lexicon: HALOT
  rationale: The preposition ל with בני marks relation to the tribal descendants/group.
    'Of the sons of Benjamin' is a relatively formal but transparent rendering that
    preserves the Hebrew kinship expression. It is retained in the main text because
    the phrase is not cumbersome here.
- source_word: אֲבִידָן
  chosen: Abidan
  rationale: Proper name; transliterated by standard English convention.
- source_word: בֶּן גִּדְעֹנִי
  chosen: son of Gideoni
  rationale: Standard Hebrew patronymic construction; rendered straightforwardly as
    'son of Gideoni'.
