id: NUM.2.24
reference: Numbers 2:24
source:
  edition: WLC
  text: כָּֽל הַ/פְּקֻדִ֞ים לְ/מַחֲנֵ֣ה אֶפְרַ֗יִם מְאַ֥ת אֶ֛לֶף וּ/שְׁמֹֽנַת אֲלָפִ֥ים
    וּ/מֵאָ֖ה לְ/צִבְאֹתָ֑/ם וּ/שְׁלִשִׁ֖ים יִסָּֽעוּ־־׃ס
translation:
  text: All those counted for the camp of Ephraim were 108,100 by their divisions.
    They shall set out third.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mustered ones' for 'those counted'; the Hebrew participle can carry
      both census and military-enrollment nuance.
    reason: lexical_alternative
  - marker: b
    text: Or 'by their hosts' or 'according to their companies' for 'by their divisions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - The total of all
  lexicon: HALOT
  rationale: Introduces the sum total of the census figure; simple 'All' fits the
    Hebrew construct with the following passive participle.
- source_word: הַפְּקֻדִים
  chosen: those counted
  alternatives:
  - the numbered men
  - the mustered ones
  lexicon: HALOT
  rationale: From פקד in the census/mustering sense. 'Those counted' is natural English
    and preserves the idea of enrolled/mustered persons without adding 'men' where
    the Hebrew here leaves it implicit from context.
- source_word: לְמַחֲנֵה
  chosen: for the camp of
  alternatives:
  - belonging to the camp of
  - of the camp of
  lexicon: HALOT
  rationale: The preposition marks relation to the camp grouping; 'for the camp of'
    is idiomatic in this census-summary formula.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal name.
- source_word: מְאַת אֶלֶף וּשְׁמֹנַת אֲלָפִים וּמֵאָה
  chosen: 108,100
  alternatives:
  - one hundred eight thousand one hundred
  lexicon: HALOT
  rationale: The Hebrew number sequence is rendered in standard contemporary English
    numeral style for readability while preserving exact value.
- source_word: לְצִבְאֹתָם
  chosen: by their divisions
  alternatives:
  - according to their companies
  - by their hosts
  lexicon: HALOT
  rationale: צָבָא can denote military service/host/company. In this camp-order context,
    'divisions' communicates organized tribal military groupings in readable modern
    English.
- source_word: וּשְׁלִשִׁים
  chosen: third
  alternatives:
  - as the third group
  lexicon: HALOT
  rationale: Ordinal adverbial sense in context of marching order; concise English
    is best expressed as 'third' with the following verb.
- source_word: יִסָּעוּ
  chosen: They shall set out
  alternatives:
  - they shall break camp
  - they shall journey
  lexicon: HALOT
  rationale: In Numbers camp-order contexts נסע refers to setting out when the camp
    moves. 'Set out' is natural and sufficiently concrete.
