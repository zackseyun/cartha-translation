id: NUM.2.9
reference: Numbers 2:9
source:
  edition: WLC
  text: כָּֽל הַ/פְּקֻדִ֞ים לְ/מַחֲנֵ֣ה יְהוּדָ֗ה מְאַ֨ת אֶ֜לֶף וּ/שְׁמֹנִ֥ים אֶ֛לֶף
    וְ/שֵֽׁשֶׁת אֲלָפִ֥ים וְ/אַרְבַּע מֵא֖וֹת לְ/צִבְאֹתָ֑/ם רִאשֹׁנָ֖ה יִסָּֽעוּ־־־׃ס
translation:
  text: All those counted for the camp of Judah were 186,400 by their divisions. They
    shall set out first.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those numbered' for 'those counted.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by their companies' or 'by their hosts' for 'by their divisions.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'They shall set out first'; in camp context this can also be
      expressed as 'They shall break camp first.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - The whole number of
  - All of
  lexicon: HALOT
  rationale: Introduces the total sum of those previously enumerated; 'All' is concise
    and natural in English while preserving the comprehensive force.
- source_word: הַפְּקֻדִים
  chosen: those counted
  alternatives:
  - those numbered
  - the enrolled men
  - the mustered ones
  lexicon: HALOT
  rationale: From פקד in the passive/participle sense of those registered or counted
    in a census/military muster. 'Those counted' is clear modern English and avoids
    over-specifying 'men' where the immediate phrase focuses on the census total.
- source_word: לְמַחֲנֵה
  chosen: for the camp of
  alternatives:
  - belonging to the camp of
  - of the camp of
  lexicon: HALOT
  rationale: The preposition marks relation to the camp grouping. 'For the camp of'
    reads naturally in the census-summary formula used in this chapter.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard English transliteration of the tribal name.
- source_word: מְאַת אֶלֶף וּשְׁמֹנִים אֶלֶף וְשֵׁשֶׁת אֲלָפִים וְאַרְבַּע מֵאוֹת
  chosen: 186,400
  alternatives:
  - a hundred eighty-six thousand four hundred
  - one hundred and eighty-six thousand four hundred
  lexicon: HALOT
  rationale: This is the summed numeral expression. Using digits improves readability
    in a census context while preserving the exact total.
- source_word: לְצִבְאֹתָם
  chosen: by their divisions
  alternatives:
  - according to their companies
  - by their hosts
  - by their armies
  lexicon: HALOT
  rationale: צָבָא can denote military service, host, or division. In Numbers 1–2,
    the tribal arrangement has an ordered military-camp sense. 'By their divisions'
    communicates organized groupings without implying modern standing armies.
- source_word: רִאשֹׁנָה
  chosen: first
  alternatives:
  - in the first place
  lexicon: HALOT
  rationale: Adverbial use indicating order of march.
- source_word: יִסָּעוּ
  chosen: They shall set out
  alternatives:
  - they shall break camp
  - they shall depart
  - they shall journey
  lexicon: HALOT
  rationale: In the wilderness-camp context, נסע refers to setting out from camp.
    'Set out' is idiomatic and fits the marching order context.
