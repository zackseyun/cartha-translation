id: NUM.2.27
reference: Numbers 2:27
source:
  edition: WLC
  text: וְ/הַ/חֹנִ֥ים עָלָ֖י/ו מַטֵּ֣ה אָשֵׁ֑ר וְ/נָשִׂיא֙ לִ/בְנֵ֣י אָשֵׁ֔ר פַּגְעִיאֵ֖ל
    בֶּן עָכְרָֽן־׃
translation:
  text: 'Those camping next to it: the tribe of Asher, and the leader of the sons
    of Asher, Pagiel son of Ocran.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “beside it.” The Hebrew preposition can denote position alongside in
      the camp layout.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֹנִים
  chosen: Those camping
  alternatives:
  - Those who camp
  - The ones encamped
  lexicon: HALOT
  rationale: The participle from חנה denotes those who are encamped/camping. 'Those
    camping' is natural modern English while preserving the participial force introducing
    the adjacent group.
- source_word: עָלָיו
  chosen: next to it
  alternatives:
  - beside it
  - by it
  - upon it
  lexicon: HALOT
  rationale: In the camp-arrangement context, עַל with pronominal suffix idiomatically
    indicates proximity or position alongside, not physical 'upon.' 'Next to it' best
    conveys the spatial relation in readable English.
- source_word: מַטֵּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  lexicon: HALOT
  rationale: In census and camp-order contexts, מַטֶּה is the standard term for a
    tribal division. 'Tribe' is the established and contextually correct sense here.
- source_word: אָשֵׁר
  chosen: Asher
  rationale: Proper tribal/personal name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: נָשִׂיא
  chosen: leader
  alternatives:
  - chief
  - prince
  lexicon: HALOT
  rationale: In Numbers, נָשִׂיא refers to the recognized head of a tribe. 'Leader'
    is accurate and accessible modern English; 'prince' would sound dynastic and potentially
    misleading here.
- source_word: לִבְנֵי אָשֵׁר
  chosen: of the sons of Asher
  alternatives:
  - for the sons of Asher
  - of the people of Asher
  - of the descendants of Asher
  lexicon: HALOT
  rationale: The phrase literally means 'for/of the sons of Asher.' Retaining 'sons
    of Asher' follows the gender-accurate policy and preserves the Hebrew clan idiom,
    while 'of' fits the appositional construction with 'leader' in English.
- source_word: פַּגְעִיאֵל
  chosen: Pagiel
  rationale: Proper name transliterated by standard convention.
- source_word: בֶּן עָכְרָן
  chosen: son of Ocran
  rationale: Standard patronymic construction; 'son of' is the direct and natural
    rendering.
