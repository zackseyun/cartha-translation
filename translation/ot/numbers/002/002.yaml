id: NUM.2.2
reference: Numbers 2:2
source:
  edition: WLC
  text: אִ֣ישׁ עַל דִּגְל֤/וֹ בְ/אֹתֹת֙ לְ/בֵ֣ית אֲבֹתָ֔/ם יַחֲנ֖וּ בְּנֵ֣י יִשְׂרָאֵ֑ל
    מִ/נֶּ֕גֶד סָבִ֥יב לְ/אֹֽהֶל מוֹעֵ֖ד יַחֲנֽוּ־־׃
translation:
  text: The sons of Israel shall camp, each man by his banner, with the signs of their
    fathers’ houses; they shall camp facing the tent of meeting, all around it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “standard” for “banner.” The Hebrew דֶּגֶל refers to a tribal or military
      identifying banner.
    reason: lexical_alternative
  - marker: b
    text: Or “The Israelites” for “The sons of Israel.” The more literal wording preserves
      the familial idiom of the Hebrew.
    reason: lexical_alternative
  - marker: c
    text: Traditional English often has “tabernacle” for “tent of meeting.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: 'Singular distributive use: ''man'' marks each individual within the
    collective arrangement. This follows the gender-accurate policy rather than neutralizing
    the masculine form.'
- source_word: דִּגְלוֹ
  chosen: his banner
  alternatives:
  - his standard
  - his division-banner
  lexicon: HALOT
  rationale: דֶּגֶל denotes a military or tribal standard/banner. 'Banner' is natural
    modern English; 'standard' is possible but slightly more formal. Singular with
    pronominal suffix matches 'each man by his banner.'
- source_word: בְאֹתֹת
  chosen: with the signs
  alternatives:
  - under the signs
  - by the emblems
  - with the standards/signs
  lexicon: HALOT
  rationale: אוֹת here likely refers to identifying markers or emblems associated
    with clan groupings. The beth preposition is rendered instrumentally/associatively
    as 'with.' 'Signs' preserves the lexical sense without over-specifying the exact
    visual form.
- source_word: לְבֵית אֲבֹתָם
  chosen: of their fathers’ houses
  alternatives:
  - according to their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: This phrase denotes the paternal household/clan structure. 'Fathers’
    houses' is a fairly literal rendering that preserves the social-kinship terminology
    of the Hebrew.
- source_word: יַחֲנוּ
  chosen: shall camp
  alternatives:
  - are to camp
  - will encamp
  lexicon: HALOT
  rationale: Imperfect verb in instructional context expresses prescribed arrangement.
    'Shall camp' captures the directive force in clear English.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: The sons of Israel
  alternatives:
  - The Israelites
  - The children of Israel
  lexicon: HALOT
  rationale: A more literal rendering preserves the familial/covenantal idiom of the
    Hebrew. 'Israelites' is possible but less transparent to the source wording.
- source_word: מִנֶּגֶד
  chosen: facing
  alternatives:
  - opposite
  - in front of
  lexicon: HALOT
  rationale: The preposition indicates position opposite or in front of. 'Facing'
    reads naturally in English and fits the camp layout context.
- source_word: סָבִיב
  chosen: all around it
  alternatives:
  - around
  - round about
  lexicon: HALOT
  rationale: This adverb conveys surrounding on every side. 'All around it' makes
    explicit the encircling arrangement relative to the tent of meeting.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tabernacle
  lexicon: HALOT
  rationale: This is the standard literal rendering of the Hebrew phrase. 'Tabernacle'
    is traditional but less transparent and can import later architectural associations
    not explicit in the phrase itself.
