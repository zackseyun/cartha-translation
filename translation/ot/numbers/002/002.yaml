theological_decisions:
- issue: Gendered representative language
  chosen_reading: each man / the sons of Israel
  alternative_readings:
  - each one / the Israelites
  rationale: The Hebrew uses masculine singular אִישׁ distributively and the masculine
    plural construct בְּנֵי יִשְׂרָאֵל. Per doctrine, gender-accurate renderings are
    preferred over neutralization when they match the source intent.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Cultic term rendering
  chosen_reading: tent of meeting
  alternative_readings:
  - tabernacle
  rationale: The Hebrew phrase אֹהֶל מוֹעֵד is translated directly rather than by
    the more traditional but less transparent 'tabernacle,' in keeping with original-language
    primacy and readable modern English.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
