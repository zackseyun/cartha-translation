id: NUM.2.34
reference: Numbers 2:34
source:
  edition: WLC
  text: וַֽ/יַּעֲשׂ֖וּ בְּנֵ֣י יִשְׂרָאֵ֑ל כְּ֠/כֹל אֲשֶׁר צִוָּ֨ה יְהוָ֜ה אֶת מֹשֶׁ֗ה
    כֵּֽן חָנ֤וּ לְ/דִגְלֵי/הֶם֙ וְ/כֵ֣ן נָסָ֔עוּ אִ֥ישׁ לְ/מִשְׁפְּחֹתָ֖י/ו עַל בֵּ֥ית
    אֲבֹתָֽי/ו־־־־׃
translation:
  text: 'So the sons of Israel did according to all that the LORD had commanded Moses:
    so they camped by their standards, and so they set out, each by his clans, according
    to his fathers’ house.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew is literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'under their banners.'
    reason: lexical_alternative
  - marker: c
    text: Or 'by his ancestral house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: HALOT
  rationale: The verb עשה here summarizes Israel's compliance with the preceding instructions.
    'Did' is the most natural and sufficiently formal rendering in English.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Rendered gender-accurately per translation philosophy. Although this
    collective includes the nation broadly, the Hebrew expression is literally 'sons
    of Israel'; 'Israelites' is possible but less transparent to the source wording.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as everything that
  - exactly as
  lexicon: HALOT
  rationale: This preserves the comprehensive force of the Hebrew construction without
    sounding wooden.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the doctrinally specified default rendering for the divine name.
- source_word: צִוָּה ... אֶת מֹשֶׁה
  chosen: had commanded Moses
  alternatives:
  - commanded Moses
  lexicon: HALOT
  rationale: English past perfect fits the narrative sense of prior command relative
    to Israel's action, while remaining faithful to the Hebrew perfect.
- source_word: כֵּן ... וְכֵן
  chosen: so ... and so
  alternatives:
  - thus ... and thus
  - accordingly ... and accordingly
  lexicon: HALOT
  rationale: The repeated adverb marks correspondence between command and action.
    Repeating 'so' preserves the Hebrew emphasis in readable English.
- source_word: חָנוּ
  chosen: camped
  alternatives:
  - encamped
  lexicon: HALOT
  rationale: '''Camped'' is clear modern English; ''encamped'' is more traditional
    but less natural. The meaning is unchanged.'
- source_word: לְדִגְלֵיהֶם
  chosen: by their standards
  alternatives:
  - under their banners
  - by their banner-groups
  lexicon: HALOT
  rationale: דגל refers to a standard/banner associated with tribal arrangement. 'Standards'
    preserves the military-camp organizational sense better than the more generic
    'banners'.
- source_word: נָסָעוּ
  chosen: set out
  alternatives:
  - journeyed
  - broke camp
  lexicon: HALOT
  rationale: In this context of camp movement, 'set out' is idiomatic and captures
    departure for travel. 'Journeyed' is broader; 'broke camp' is interpretive.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - each man
  - every man
  lexicon: HALOT
  rationale: Although אִישׁ is formally masculine singular, here it distributively
    marks each member/unit in the camp order. 'Each' conveys the distributive force
    naturally in English without adding unnecessary awkwardness.
- source_word: לְמִשְׁפְּחֹתָיו
  chosen: by his clans
  alternatives:
  - according to his family groups
  - by his families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in tribal census/camp contexts often denotes clan-level subdivisions
    rather than the nuclear family. 'Clans' best fits the social structure.
- source_word: עַל בֵּית אֲבֹתָיו
  chosen: according to his fathers’ house
  alternatives:
  - by his ancestral house
  - under his father's household
  lexicon: HALOT
  rationale: This phrase denotes paternal household/ancestral house structure. 'According
    to his fathers’ house' stays close to the Hebrew while remaining intelligible;
    plural 'fathers' reflects the idiomatic Hebrew construct.
