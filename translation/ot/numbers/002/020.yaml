id: NUM.2.20
reference: Numbers 2:20
source:
  edition: WLC
  text: וְ/עָלָ֖י/ו מַטֵּ֣ה מְנַשֶּׁ֑ה וְ/נָשִׂיא֙ לִ/בְנֵ֣י מְנַשֶּׁ֔ה גַּמְלִיאֵ֖ל
    בֶּן פְּדָהצֽוּר־׃
translation:
  text: And next to him was the tribe of Manasseh, and the leader of the sons of Manasseh
    was Gamaliel son of Pedahzur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'beside him was the tribe of Manasseh.' The Hebrew prepositional phrase
      denotes adjacent placement in the camp formation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלָיו
  chosen: And next to him was
  alternatives:
  - And beside him was
  - And by him was
  - And over him was
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix here, in the camp-arrangement
    context of Numbers 2, denotes spatial adjacency rather than authority. 'Next to
    him' communicates the placement of the neighboring tribe in natural English. 'Over
    him' would be a misleadingly literal option in this context.
- source_word: מַטֶּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  - clan
  lexicon: HALOT
  rationale: In census and camp-organization contexts, מַטֶּה refers to a tribal unit,
    not a literal staff. 'Tribe' is the standard and contextually precise rendering.
- source_word: מְנַשֶּׁה
  chosen: Manasseh
  rationale: 'Personal/tribal name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: וְנָשִׂיא
  chosen: and the leader
  alternatives:
  - and the chief
  - and the prince
  - and the chieftain
  lexicon: HALOT
  rationale: נָשִׂיא in Numbers commonly denotes the appointed tribal head. 'Leader'
    is clear modern English and avoids the archaic or potentially misleading 'prince'
    while preserving the official role.
- source_word: לִבְנֵי מְנַשֶּׁה
  chosen: of the sons of Manasseh
  alternatives:
  - for the sons of Manasseh
  - of the people of Manasseh
  - of the descendants of Manasseh
  lexicon: HALOT
  rationale: The phrase is formally 'for/of the sons of Manasseh.' In English, after
    'leader,' the genitival sense 'of the sons of Manasseh' is most natural. 'Sons'
    is retained because the Hebrew explicitly uses בנים and the project's philosophy
    prefers gender-accurate renderings over neutralization in representative lineage
    language.
- source_word: גַּמְלִיאֵל
  chosen: Gamaliel
  rationale: Proper name transliterated by standard convention.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard patronymic construction in English.
- source_word: פְּדָהצוּר
  chosen: Pedahzur
  rationale: Proper name transliterated by standard convention.
