id: NUM.2.7
reference: Numbers 2:7
source:
  edition: WLC
  text: מַטֵּ֖ה זְבוּלֻ֑ן וְ/נָשִׂיא֙ לִ/בְנֵ֣י זְבוּלֻ֔ן אֱלִיאָ֖ב בֶּן חֵלֹֽן־׃
translation:
  text: 'The tribe of Zebulun, and the leader of the sons of Zebulun: Eliab son of
    Helon.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the sons of Zebulun.' The Hebrew preposition can be rendered in
      more than one closely related way in this tribal-administrative formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַטֵּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  lexicon: HALOT
  rationale: In census and camp-organization contexts in Numbers, מַטֶּה denotes a
    tribal division rather than a literal staff. 'Tribe' is the natural English equivalent
    here.
- source_word: זְבוּלֻן
  chosen: Zebulun
  rationale: Proper tribal/personal name; transliterated according to standard English
    convention.
- source_word: וְנָשִׂיא
  chosen: and the leader
  alternatives:
  - and the chief
  - and the prince
  lexicon: HALOT
  rationale: נָשִׂיא in this administrative context refers to the recognized head
    of the tribe. 'Leader' is clear modern English; 'prince' would sound misleadingly
    monarchical here.
- source_word: לִבְנֵי זְבוּלֻן
  chosen: of the sons of Zebulun
  alternatives:
  - for the sons of Zebulun
  - of the people of Zebulun
  lexicon: HALOT
  rationale: The preposition ל with בני marks relation to the tribal members. 'Of
    the sons of Zebulun' stays close to the Hebrew and preserves the idiom. 'Sons'
    is retained as gender-accurate tribal language per translation philosophy.
- source_word: אֱלִיאָב
  chosen: Eliab
  rationale: Proper name; transliterated rather than translated.
- source_word: בֶּן חֵלֹן
  chosen: son of Helon
  alternatives:
  - the son of Helon
  rationale: Standard Hebrew patronymic construction; rendered straightforwardly in
    English.
