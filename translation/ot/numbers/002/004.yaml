id: NUM.2.4
reference: Numbers 2:4
source:
  edition: WLC
  text: וּ/צְבָא֖/וֹ וּ/פְקֻדֵי/הֶ֑ם אַרְבָּעָ֧ה וְ/שִׁבְעִ֛ים אֶ֖לֶף וְ/שֵׁ֥שׁ מֵאֽוֹת׃
translation:
  text: 'and his division, those numbered from them: seventy-four thousand six hundred.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and his army' or 'and his host'; the Hebrew צָבָא can carry a military
      sense, but here likely refers to the tribal division as arranged in the camp.
    reason: lexical_alternative
  - marker: b
    text: Or 'those mustered by them' or 'their numbered men.' The Hebrew reflects
      census enrollment terminology.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבָאוֹ
  chosen: and his division
  alternatives:
  - and his army
  - and his host
  lexicon: HALOT
  rationale: צָבָא can denote an army/host, but in the census-and-camp arrangement
    context of Numbers 2 it refers to the tribal military division under the named
    leader. 'Division' is natural modern English and fits the organizational sense
    without overstating active combat.
- source_word: וּפְקֻדֵיהֶם
  chosen: those numbered from them
  alternatives:
  - and those mustered by them
  - and their numbered men
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like census sense, referring to those
    enrolled or counted. The suffix is plural ('them'), referring to the members of
    the division/tribe. 'Those numbered from them' preserves the census nuance and
    avoids adding 'men' where it is not explicit in this clause, though the broader
    context is military census.
- source_word: אַרְבָּעָה וְשִׁבְעִים אֶלֶף וְשֵׁשׁ מֵאוֹת
  chosen: seventy-four thousand six hundred
  alternatives:
  - four and seventy thousand and six hundred
  lexicon: HALOT
  rationale: Rendered in standard contemporary English number order for readability
    while preserving the exact total.
