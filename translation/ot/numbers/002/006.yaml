id: NUM.2.6
reference: Numbers 2:6
source:
  edition: WLC
  text: וּ/צְבָא֖/וֹ וּ/פְקֻדָ֑י/ו אַרְבָּעָ֧ה וַ/חֲמִשִּׁ֛ים אֶ֖לֶף וְ/אַרְבַּ֥ע
    מֵאֽוֹת׃ס
translation:
  text: 'and his division, those counted from it: fifty-four thousand four hundred.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''and his army, those numbered from it: fifty-four thousand four hundred.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבָאוֹ
  chosen: and his division
  alternatives:
  - and his army
  - and his host
  - and his company
  lexicon: HALOT
  rationale: צָבָא can denote an army/host, but in Numbers 1–2 it refers to the organized
    tribal military grouping within the camp arrangement. 'Division' communicates
    an ordered military unit in readable modern English without implying a standing
    army detached from the census context. The prefixed conjunction is rendered 'and,'
    and the 3ms suffix as 'his,' referring to the tribal leader/tribe previously named.
- source_word: וּפְקֻדָיו
  chosen: those counted from it
  alternatives:
  - and those numbered of it
  - and his mustered men
  - and those enrolled of it
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like nominal form with 3ms suffix,
    referring to the census total associated with the division. 'Those counted from
    it' preserves the census/register sense and avoids overinterpreting as only combat
    troops, though the broader context is military organization. 'From it' reflects
    the suffix tied back to the division/tribe.
- source_word: אַרְבָּעָה וַחֲמִשִּׁים אֶלֶף וְאַרְבַּע מֵאוֹת
  chosen: fifty-four thousand four hundred
  alternatives:
  - four and fifty thousand and four hundred
  lexicon: HALOT
  rationale: The Hebrew number sequence is rendered in standard contemporary English
    order and style. This preserves the exact quantity while avoiding wooden reproduction
    of Hebrew numeral syntax.
