id: NUM.2.29
reference: Numbers 2:29
source:
  edition: WLC
  text: וּ/מַטֵּ֖ה נַפְתָּלִ֑י וְ/נָשִׂיא֙ לִ/בְנֵ֣י נַפְתָּלִ֔י אֲחִירַ֖ע בֶּן עֵינָֽן־׃
translation:
  text: 'And the tribe of Naphtali, and the leader of the sons of Naphtali: Ahira
    son of Enan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons of Naphtali,' a standard tribal designation; this refers to
      the members/descendants of the tribe.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַטֶּה
  chosen: tribe
  alternatives:
  - staff
  - branch
  - clan
  lexicon: HALOT
  rationale: In census/camp arrangement contexts in Numbers, מַטֶּה denotes a tribal
    unit rather than a literal staff. 'Tribe' is the natural English equivalent here.
- source_word: נָשִׂיא
  chosen: leader
  alternatives:
  - chief
  - prince
  - chieftain
  lexicon: HALOT
  rationale: In this administrative context, נָשִׂיא refers to the recognized head
    of a tribe. 'Leader' is clear modern English and avoids the potentially misleading
    royal connotations of 'prince.'
- source_word: לִבְנֵי
  chosen: of the sons of
  alternatives:
  - for the sons of
  - of the children of
  - of the people of
  lexicon: HALOT
  rationale: The preposition ל with בני in this formula identifies the leader as belonging
    to/over that tribal group. 'Of the sons of' preserves the Hebrew construction
    and its gender-accurate wording per translation philosophy.
- source_word: נַפְתָּלִי
  chosen: Naphtali
  rationale: Personal/tribal name is transliterated according to the project's policy
    to transliterate names rather than translate them.
- source_word: אֲחִירַע
  chosen: Ahira
  rationale: Proper name; transliterated rather than translated.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: Standard patronymic formula in Hebrew narrative/genealogical style; 'son
    of' is the direct and expected rendering.
- source_word: עֵינָן
  chosen: Enan
  rationale: Proper name; transliterated rather than translated.
