id: NUM.2.17
reference: Numbers 2:17
source:
  edition: WLC
  text: וְ/נָסַ֧ע אֹֽהֶל מוֹעֵ֛ד מַחֲנֵ֥ה הַ/לְוִיִּ֖ם בְּ/ת֣וֹךְ הַֽ/מַּחֲנֹ֑ת כַּ/אֲשֶׁ֤ר
    יַחֲנוּ֙ כֵּ֣ן יִסָּ֔עוּ אִ֥ישׁ עַל יָד֖/וֹ לְ/דִגְלֵי/הֶֽם־־׃ס
translation:
  text: Then the tent of meeting shall set out, with the camp of the Levites in the
    midst of the camps. Just as they camp, so they shall set out, each in his place
    by their banners.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in his position' for 'in his place'; the Hebrew idiom literally involves
      'hand/side' and refers to assigned placement in the marching order.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to their standards' for 'by their banners.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסַע
  chosen: Then ... shall set out
  alternatives:
  - And ... shall set out
  - shall journey on
  lexicon: HALOT
  rationale: נָסַע in camp-travel contexts means to break camp and move on. 'Set out'
    is natural modern English and fits the military/camp procession context. The prefixed
    conjunction is rendered 'Then' to reflect sequence within the marching order.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard literal rendering of the tabernacle title in the
    Pentateuch. It preserves both the concrete noun 'tent' and the cultic function
    'meeting' without importing later terminology.
- source_word: מַחֲנֵה הַלְוִיִּם
  chosen: the camp of the Levites
  alternatives:
  - the Levite camp
  lexicon: HALOT
  rationale: Construct chain is best rendered straightforwardly. 'Levites' is retained
    as the tribal/clan designation.
- source_word: בְּתוֹךְ הַמַּחֲנֹת
  chosen: in the midst of the camps
  alternatives:
  - in the middle of the camps
  - among the camps
  lexicon: HALOT
  rationale: בְּתוֹךְ denotes central position. 'In the midst of' preserves the spatial
    sense that the Levitical camp and tent of meeting travel centrally among the tribal
    camps.
- source_word: כַּאֲשֶׁר יַחֲנוּ כֵּן יִסָּעוּ
  chosen: Just as they camp, so they shall set out
  alternatives:
  - As they encamp, so they shall set out
  - In the same order as they camp, so they shall set out
  lexicon: HALOT
  rationale: The clause expresses correspondence between camping arrangement and marching
    arrangement. English requires some smoothing; 'Just as they camp, so they shall
    set out' preserves the parallelism while remaining readable. The implied idea
    of order is contextually present.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - each man
  - man by man
  lexicon: HALOT
  rationale: Although grammatically singular masculine, here אִישׁ distributively
    marks each individual/unit in the procession. 'Each' conveys the distributive
    force in idiomatic English without unnecessary awkwardness. The masculine force
    is still reflected in the following 'his place.'
- source_word: עַל יָדוֹ
  chosen: in his place
  alternatives:
  - by his side
  - at his side
  - in his position
  lexicon: HALOT
  rationale: The idiom עַל יָד can denote position at one's side/place. In this military-camp
    context it refers to each one in his assigned position/order. 'In his place' communicates
    the organizational sense more clearly than a wooden 'by his hand/side.'
- source_word: לְדִגְלֵיהֶם
  chosen: by their banners
  alternatives:
  - according to their standards
  - with respect to their banner-groups
  lexicon: HALOT
  rationale: דֶּגֶל refers to a standard/banner marking tribal divisions. 'By their
    banners' is concise and natural, while preserving the visual and organizational
    function of the term.
