id: NUM.2.21
reference: Numbers 2:21
source:
  edition: WLC
  text: וּ/צְבָא֖/וֹ וּ/פְקֻדֵי/הֶ֑ם שְׁנַ֧יִם וּ/שְׁלֹשִׁ֛ים אֶ֖לֶף וּ/מָאתָֽיִם׃
translation:
  text: 'and his division, those numbered from them: thirty-two thousand two hundred.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and his army' or 'and his host'; Hebrew צָבָא here refers to the tribal
      contingent arranged for camp and march.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבָאוֹ
  chosen: and his division
  alternatives:
  - and his army
  - and his host
  - and his company
  lexicon: HALOT
  rationale: צָבָא can denote an army/host, but in Numbers 2's camp arrangement context
    it refers to the tribal military division or contingent under the named leader.
    'Division' is natural modern English and fits the organizational sense without
    overstating active warfare.
- source_word: וּפְקֻדֵיהֶם
  chosen: those numbered from them
  alternatives:
  - and those numbered of them
  - and their numbered men
  - and their enrollment
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like nominal usage, this refers to
    those counted/mustered. The suffix is plural ('them'), referring to the members
    of the division. 'Those numbered from them' preserves the sense that the following
    figure is the census total.
- source_word: שְׁנַיִם וּשְׁלֹשִׁים אֶלֶף וּמָאתָיִם
  chosen: thirty-two thousand two hundred
  alternatives:
  - two and thirty thousand and two hundred
  lexicon: HALOT
  rationale: This is the straightforward cardinal number. Rendered in standard contemporary
    English number order rather than preserving Hebrew sequencing woodenly.
