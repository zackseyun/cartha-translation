id: NUM.2.5
reference: Numbers 2:5
source:
  edition: WLC
  text: וְ/הַ/חֹנִ֥ים עָלָ֖י/ו מַטֵּ֣ה יִשָּׂשכָ֑ר וְ/נָשִׂיא֙ לִ/בְנֵ֣י יִשָּׂשכָ֔ר
    נְתַנְאֵ֖ל בֶּן צוּעָֽר־׃
translation:
  text: Those camping next to it are the tribe of Issachar, and the leader of the
    sons of Issachar is Nethanel son of Zuar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''sons of Issachar.'' The expression is a standard tribal designation
      and refers to the descendants/members of Issachar, not only male individuals.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֹנִים
  chosen: Those camping
  alternatives:
  - Those who camp
  - The ones encamping
  lexicon: HALOT
  rationale: The participle functions substantivally, referring to the group stationed
    in camp. 'Those camping' is natural modern English while preserving the ongoing/state
    sense.
- source_word: עָלָיו
  chosen: next to it
  alternatives:
  - beside it
  - by it
  - upon it
  lexicon: HALOT
  rationale: In the camp-arrangement context of Numbers 2, the preposition with pronominal
    suffix indicates spatial adjacency relative to the previously mentioned standard/camp
    unit, not literal position 'upon it.' 'Next to it' is the clearest idiomatic rendering.
- source_word: מַטֵּה
  chosen: the tribe of
  alternatives:
  - tribe
  - staff
  lexicon: HALOT
  rationale: Here מַטֶּה is the standard tribal designation in census/camp contexts,
    not 'staff.' English requires 'the tribe of Issachar' for clarity.
- source_word: יִשָּׂשכָר
  chosen: Issachar
  rationale: Proper name transliterated by standard English convention, following
    the translation philosophy to transliterate names.
- source_word: נָשִׂיא
  chosen: leader
  alternatives:
  - chief
  - prince
  - tribal leader
  lexicon: HALOT
  rationale: In Numbers this term denotes the recognized head of a tribe. 'Leader'
    is clear modern English and avoids the potentially misleading royal connotations
    of 'prince' in contemporary usage.
- source_word: לִבְנֵי יִשָּׂשכָר
  chosen: of the sons of Issachar
  alternatives:
  - for the sons of Issachar
  - of the people of Issachar
  - of the Israelites of Issachar
  lexicon: HALOT
  rationale: The phrase identifies the group represented by the leader. 'Sons of Issachar'
    preserves the Hebrew kinship expression and its gendered form, in keeping with
    the gender-accurate policy.
- source_word: נְתַנְאֵל
  chosen: Nethanel
  rationale: Proper name transliterated by standard English convention.
- source_word: בֶּן צוּעָר
  chosen: son of Zuar
  alternatives:
  - the son of Zuar
  lexicon: HALOT
  rationale: Standard Hebrew patronymic construction, naturally rendered 'son of Zuar.'
