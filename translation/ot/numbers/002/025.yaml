id: NUM.2.25
reference: Numbers 2:25
source:
  edition: WLC
  text: דֶּ֣גֶל מַחֲנֵ֥ה דָ֛ן צָפֹ֖נָ/ה לְ/צִבְאֹתָ֑/ם וְ/נָשִׂיא֙ לִ/בְנֵ֣י דָ֔ן
    אֲחִיעֶ֖זֶר בֶּן עַמִּֽישַׁדָּֽי־׃
translation:
  text: The banner of the camp of Dan shall be on the north, by their divisions; and
    the leader of the sons of Dan shall be Ahiezer son of Ammishaddai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to their companies' or 'by their hosts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּגֶל
  chosen: banner
  alternatives:
  - standard
  lexicon: HALOT
  rationale: Refers to the tribal ensign or military banner under which the camp is
    arranged. 'Banner' is clear modern English and fits the camp-order context.
- source_word: מַחֲנֵה
  chosen: camp
  alternatives:
  - encampment
  lexicon: HALOT
  rationale: Standard rendering for the organized tribal camp in Numbers 2. 'Camp'
    is concise and natural in English.
- source_word: צָפֹנָה
  chosen: on the north
  alternatives:
  - northward
  - to the north
  lexicon: HALOT
  rationale: The directional form indicates location/orientation on the north side
    of the tabernacle arrangement. 'On the north' best fits the spatial sense in this
    census-and-camp formula.
- source_word: לְצִבְאֹתָם
  chosen: by their divisions
  alternatives:
  - according to their companies
  - by their hosts
  lexicon: HALOT
  rationale: צָבָא in this context refers to organized military-style groupings of
    the tribe. 'By their divisions' communicates ordered arrangement without archaic
    military jargon.
- source_word: וְנָשִׂיא
  chosen: and the leader
  alternatives:
  - and the chief
  - and the prince
  lexicon: HALOT
  rationale: In tribal-administrative contexts נָשִׂיא denotes the recognized tribal
    leader. 'Leader' is accurate and readable; 'prince' would sound misleadingly monarchical
    in modern English.
- source_word: לִבְנֵי דָן
  chosen: of the sons of Dan
  alternatives:
  - for the sons of Dan
  - of the people of Dan
  lexicon: HALOT
  rationale: The Hebrew construct is literally 'for/of the sons of Dan.' 'Of the sons
    of Dan' preserves the formal tribal designation and matches the source's gendered
    wording.
- source_word: אֲחִיעֶזֶר
  chosen: Ahiezer
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: בֶּן עַמִּישַׁדָּי
  chosen: son of Ammishaddai
  rationale: Patronymic construction rendered straightforwardly and names transliterated
    rather than translated.
