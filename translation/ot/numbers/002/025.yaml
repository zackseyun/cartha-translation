theological_decisions:
- issue: Gendered tribal designation בְנֵי
  chosen_reading: sons of Dan
  alternative_readings:
  - people of Dan
  - descendants of Dan
  rationale: Following the doctrine's gender-accurate principle, the masculine plural
    is preserved in the main text because it is the formal tribal designation in Hebrew.
    More inclusive alternatives are possible interpretively but are not required by
    the source wording here.
