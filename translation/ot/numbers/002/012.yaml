id: NUM.2.12
reference: Numbers 2:12
source:
  edition: WLC
  text: וְ/הַ/חוֹנִ֥ם עָלָ֖י/ו מַטֵּ֣ה שִׁמְע֑וֹן וְ/נָשִׂיא֙ לִ/בְנֵ֣י שִׁמְע֔וֹן
    שְׁלֻמִיאֵ֖ל בֶּן צוּרִֽי שַׁדָּֽי־־׃
translation:
  text: Those camping next to it are the tribe of Simeon, and the leader of the sons
    of Simeon is Shelumiel son of Zurishaddai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “beside it.” The Hebrew preposition can denote proximity in the camp
      arrangement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַחֹנִם
  chosen: Those camping
  alternatives:
  - And those who camp
  - The ones encamping
  lexicon: HALOT
  rationale: The participle from חנה functions substantivally, referring to the people
    encamped. 'Those camping' is natural modern English while preserving the participial
    sense.
- source_word: עָלָיו
  chosen: next to it
  alternatives:
  - beside it
  - by him/it
  - upon it
  lexicon: HALOT
  rationale: In the camp-arrangement context, עַל with pronominal suffix indicates
    spatial adjacency rather than literal 'upon.' The suffix refers back to the previously
    mentioned camp/tribal standard, so 'next to it' best fits the sense.
- source_word: מַטֵּה שִׁמְעוֹן
  chosen: the tribe of Simeon
  alternatives:
  - the staff of Simeon
  - the branch of Simeon
  lexicon: HALOT
  rationale: מַטֶּה in census and camp texts denotes a tribal unit. 'Tribe of Simeon'
    is the standard contextual meaning, not the literal 'staff.'
- source_word: וְנָשִׂיא
  chosen: and the leader
  alternatives:
  - and the chief
  - and the prince
  lexicon: HALOT
  rationale: נָשִׂיא here denotes the recognized tribal head. 'Leader' is clear modern
    English and avoids the potentially misleading royal connotations of 'prince.'
- source_word: לִבְנֵי שִׁמְעוֹן
  chosen: of the sons of Simeon
  alternatives:
  - for the sons of Simeon
  - of the people of Simeon
  - of the descendants of Simeon
  lexicon: HALOT
  rationale: The phrase literally means 'for/of the sons of Simeon.' In English, 'leader
    of the sons of Simeon' preserves the Hebrew kinship expression. This is gender-accurate
    and reflects the source wording.
- source_word: שְׁלֻמִיאֵל
  chosen: Shelumiel
  rationale: Personal name transliterated according to the project's policy to transliterate
    names rather than translate them.
- source_word: בֶּן צוּרִי שַׁדָּי
  chosen: son of Zurishaddai
  rationale: Patronymic construction rendered straightforwardly. The father's name
    is transliterated as a single proper name, Zurishaddai, following standard English
    Bible convention.
