theological_decisions:
- issue: Gendered kinship language in לִבְנֵי שִׁמְעוֹן
  chosen_reading: sons of Simeon
  alternative_readings:
  - people of Simeon
  - descendants of Simeon
  rationale: The Hebrew uses the masculine plural 'sons,' and the doctrine calls for
    gender-accurate rendering rather than flattening to a neutral term unless context
    requires it. Here the tribal designation can be preserved literally without obscuring
    meaning.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over
    gender-neutral)
