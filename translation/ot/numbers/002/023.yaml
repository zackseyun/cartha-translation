id: NUM.2.23
reference: Numbers 2:23
source:
  edition: WLC
  text: וּ/צְבָא֖/וֹ וּ/פְקֻדֵי/הֶ֑ם חֲמִשָּׁ֧ה וּ/שְׁלֹשִׁ֛ים אֶ֖לֶף וְ/אַרְבַּ֥ע
    מֵאֽוֹת׃
translation:
  text: and his company, even those numbered from them, was thirty-five thousand four
    hundred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and his host' or 'and his army'; the Hebrew reflects the military organization
      of the tribes in the wilderness census.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבָאוֹ
  chosen: and his company
  alternatives:
  - and his host
  - and his army
  lexicon: HALOT
  rationale: צָבָא can denote an army, host, or organized company. In the census-and-camp
    arrangement context of Numbers 2, it refers to the tribal division as a military-style
    contingent. 'Company' preserves the organized-group sense in readable English
    without overstating active combat.
- source_word: וּפְקֻדֵיהֶם
  chosen: even those numbered from them
  alternatives:
  - and those mustered by them
  - and their numbered men
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like census sense, referring to those
    enrolled or counted. The suffix is plural ('them'), referring to the members of
    the tribe/group. 'Those numbered from them' keeps the census nuance and links
    naturally to the following total.
- source_word: חֲמִשָּׁה וּשְׁלֹשִׁים אֶלֶף וְאַרְבַּע מֵאוֹת
  chosen: thirty-five thousand four hundred
  alternatives:
  - five and thirty thousand and four hundred
  lexicon: HALOT
  rationale: This is the straightforward cardinal number total. Modern English idiom
    reverses the Hebrew order for readability while preserving the exact figure.
