id: NUM.2.15
reference: Numbers 2:15
source:
  edition: WLC
  text: וּ/צְבָא֖/וֹ וּ/פְקֻדֵי/הֶ֑ם חֲמִשָּׁ֤ה וְ/אַרְבָּעִים֙ אֶ֔לֶף וְ/שֵׁ֥שׁ מֵא֖וֹת
    וַ/חֲמִשִּֽׁים׃
translation:
  text: 'and his company, even those numbered from them: forty-five thousand six hundred
    and fifty.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and his host' or 'and his army'; the Hebrew term can denote an organized
      military contingent.
    reason: lexical_alternative
  - marker: b
    text: Or 'those mustered from them' or 'their numbered men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבָאוֹ
  chosen: and his company
  alternatives:
  - and his host
  - and his army
  lexicon: HALOT
  rationale: צָבָא in this census/camp arrangement context refers to the tribal military
    division or contingent. 'Company' is natural English in a camp-order list and
    avoids implying an actively fighting army in this immediate context, while still
    reflecting an organized body.
- source_word: וּפְקֻדֵיהֶם
  chosen: even those numbered from them
  alternatives:
  - and those numbered of them
  - and their numbered men
  - and those mustered from them
  lexicon: HALOT
  rationale: From פקד in the passive/participle sense of those enrolled or counted
    in a census. The suffix is plural ('them'), referring to the members of the tribe/company.
    'Those numbered from them' preserves the census nuance without over-specifying
    'men,' which is not explicit in this clause itself though implied by the broader
    census context.
- source_word: חֲמִשָּׁה וְאַרְבָּעִים אֶלֶף
  chosen: forty-five thousand
  lexicon: HALOT
  rationale: Standard English rendering of the Hebrew cardinal number sequence.
- source_word: וְשֵׁשׁ מֵאוֹת
  chosen: six hundred
  lexicon: HALOT
  rationale: Direct rendering of the numeral phrase.
- source_word: וַחֲמִשִּׁים
  chosen: and fifty
  lexicon: HALOT
  rationale: Completes the total in the standard Hebrew number sequence; in idiomatic
    English combined as 'six hundred and fifty.'
