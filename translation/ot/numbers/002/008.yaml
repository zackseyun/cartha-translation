id: NUM.2.8
reference: Numbers 2:8
source:
  edition: WLC
  text: וּ/צְבָא֖/וֹ וּ/פְקֻדָ֑י/ו שִׁבְעָ֧ה וַ/חֲמִשִּׁ֛ים אֶ֖לֶף וְ/אַרְבַּ֥ע מֵאֽוֹת׃
translation:
  text: And his company, even those numbered of it, were fifty-seven thousand four
    hundred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his host' or 'his division'; the Hebrew צָבָא can denote a military
      company or organized contingent in the camp census context.
    reason: lexical_alternative
  - marker: b
    text: Or 'those mustered of it' or 'his enrolled men'; the Hebrew reflects those
      officially counted in the census.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבָאוֹ
  chosen: And his company
  alternatives:
  - And his host
  - And his army
  - And his division
  lexicon: HALOT
  rationale: צָבָא in this census-and-camp arrangement context refers to the tribal
    military grouping or contingent. 'Company' is natural English in this listing
    formula and avoids overstating active warfare with 'army' while remaining more
    concrete than 'host' for modern readers.
- source_word: וּפְקֻדָיו
  chosen: even those numbered of it
  alternatives:
  - and those numbered of it
  - and his enrolled men
  - and those mustered of it
  lexicon: HALOT
  rationale: The passive participial/noun form from פקד in these census formulas denotes
    those counted/mustered in the official registration. 'Those numbered of it' stays
    close to the Hebrew formula; 'even' helps English flow when the verse is a continuation
    of the tribal listing.
- source_word: שִׁבְעָה וַחֲמִשִּׁים אֶלֶף וְאַרְבַּע מֵאוֹת
  chosen: fifty-seven thousand four hundred
  alternatives:
  - seven and fifty thousand and four hundred
  lexicon: HALOT
  rationale: The Hebrew number is rendered in standard contemporary English number
    order for readability while preserving the exact value.
