id: NUM.2.31
reference: Numbers 2:31
source:
  edition: WLC
  text: כָּל הַ/פְּקֻדִים֙ לְ/מַ֣חֲנֵה דָ֔ן מְאַ֣ת אֶ֗לֶף וְ/שִׁבְעָ֧ה וַ/חֲמִשִּׁ֛ים
    אֶ֖לֶף וְ/שֵׁ֣שׁ מֵא֑וֹת לָ/אַחֲרֹנָ֥ה יִסְע֖וּ לְ/דִגְלֵי/הֶֽם־׃פ
translation:
  text: All those counted for the camp of Dan were 157,600. They shall set out last,
    by their standards.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'under their banners.' The Hebrew term refers to the tribal standards
      or banner-groups used in Israel's camp arrangement.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - The whole number of
  - All of
  lexicon: HALOT
  rationale: Introduces the totality of the census figure; simple 'All' is natural
    English and preserves the comprehensive sense.
- source_word: הַפְּקֻדִים
  chosen: those counted
  alternatives:
  - the numbered men
  - the enrolled ones
  - those mustered
  lexicon: HALOT
  rationale: From פקד in the passive participial form, referring to those registered/counted
    in the census. 'Those counted' is clear modern English and avoids adding 'men'
    where the Hebrew form here does not explicitly repeat it in this verse, though
    the census context is understood.
- source_word: לְמַחֲנֵה
  chosen: for the camp of
  alternatives:
  - belonging to the camp of
  - in the camp of
  lexicon: HALOT
  rationale: The preposition marks relation to the camp grouping. 'For the camp of
    Dan' is idiomatic in English and fits the census-summary formula.
- source_word: דָן
  chosen: Dan
  lexicon: HALOT
  rationale: Standard transliteration of the tribal name, following the policy to
    transliterate names.
- source_word: מְאַת אֶלֶף וְשִׁבְעָה וַחֲמִשִּׁים אֶלֶף וְשֵׁשׁ מֵאוֹת
  chosen: 157,600
  alternatives:
  - a hundred fifty-seven thousand six hundred
  - one hundred and fifty-seven thousand six hundred
  lexicon: HALOT
  rationale: This is the summed census number. Numerals are rendered in standard modern
    English figure style for readability while preserving exact value.
- source_word: לָאַחֲרֹנָה
  chosen: last
  alternatives:
  - at the rear
  - in the last position
  lexicon: HALOT
  rationale: Adverbial use indicating marching order. 'Last' is the most direct and
    natural rendering in context.
- source_word: יִסְעוּ
  chosen: shall set out
  alternatives:
  - shall journey
  - shall break camp
  - shall depart
  lexicon: HALOT
  rationale: נסע in wilderness-travel contexts commonly refers to setting out on a
    journey. 'Shall set out' is both accurate and readable.
- source_word: לְדִגְלֵיהֶם
  chosen: by their standards
  alternatives:
  - according to their standards
  - under their banners
  lexicon: HALOT
  rationale: דגל refers to a standard/banner associated with tribal arrangement. 'By
    their standards' preserves the military-camp imagery and the prepositional nuance
    without over-paraphrase.
