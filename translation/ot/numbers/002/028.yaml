id: NUM.2.28
reference: Numbers 2:28
source:
  edition: WLC
  text: וּ/צְבָא֖/וֹ וּ/פְקֻדֵי/הֶ֑ם אֶחָ֧ד וְ/אַרְבָּעִ֛ים אֶ֖לֶף וַ/חֲמֵ֥שׁ מֵאֽוֹת׃
translation:
  text: 'And his company, those numbered from them: forty-one thousand five hundred.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his army' or 'his host'; the Hebrew term can denote a military contingent
      or organized company in the camp census.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and their numbered ones' or 'those mustered of them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבָאוֹ
  chosen: And his company
  alternatives:
  - And his army
  - And his host
  lexicon: HALOT
  rationale: צָבָא in census and camp-order contexts refers to the tribal division
    or military contingent. 'Company' fits readable modern English while preserving
    the organized-group sense without overstating active warfare. The prefixed conjunction
    is rendered 'And,' and the 3ms suffix is represented by 'his,' referring to the
    tribal leader/tribe in the immediate context.
- source_word: וּפְקֻדֵיהֶם
  chosen: those numbered from them
  alternatives:
  - and their numbered men
  - and those mustered of them
  - and their enrollment
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like census expression, this denotes
    the counted or mustered members. 'Those numbered from them' preserves the idiomatic
    census formula and avoids adding 'men' where it is not explicit in this clause,
    though the broader census context concerns fighting men.
- source_word: אֶחָד וְאַרְבָּעִים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  chosen: forty-one thousand five hundred
  alternatives:
  - one and forty thousand and five hundred
  lexicon: HALOT
  rationale: The Hebrew number is rendered in standard contemporary English order.
    This is a straightforward modernization of number style, not a change in meaning.
