id: NUM.2.33
reference: Numbers 2:33
source:
  edition: WLC
  text: וְ/הַ֨/לְוִיִּ֔ם לֹ֣א הָתְפָּקְד֔וּ בְּ/ת֖וֹךְ בְּנֵ֣י יִשְׂרָאֵ֑ל כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־׃
translation:
  text: But the Levites were not counted among the sons of Israel, as Yahweh had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' or traditionally 'the children of Israel.' The Hebrew reads 'the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/לְוִיִּם
  chosen: But the Levites
  alternatives:
  - And the Levites
  - Now the Levites
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply 'and,' but here it marks a contrast with the preceding census totals, so 'But' best reflects the discourse flow in natural English. 'Levites' is the standard transliteration of the tribal/clan name.
- source_word: לֹא
  chosen: were not
  alternatives:
  - did not
  lexicon: HALOT
  rationale: Combined with the passive/reflexive verb, English idiom is best expressed as 'were not' rather than 'did not'.
- source_word: הָתְפָּקְדוּ
  chosen: counted
  alternatives:
  - numbered
  - registered
  - mustered
  lexicon: HALOT
  rationale: The hitpael of פקד in this census context refers to being enrolled or counted in a census/muster. 'Counted' is clear modern English and fits the immediate context. 'Numbered' is traditional but slightly archaic; 'mustered' is possible but more military than the verse requires.
- source_word: בְּ/תוֹךְ
  chosen: among
  alternatives:
  - in the midst of
  - in the middle of
  lexicon: HALOT
  rationale: In this context, the prepositional phrase indicates inclusion within the larger group. 'Among' is the most natural English equivalent.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Following the project's gender-accurate policy, 'sons of Israel' preserves the Hebrew expression בני ישראל. 'Israelites' is idiomatic but less formally transparent; 'children of Israel' is traditional but less precise to the masculine plural construct.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison to the prior divine command. 'As' is concise and natural.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: The perfect verb refers to a command given previously (cf. Num 1:47-49), so English past perfect appropriately signals prior action relative to the counting report.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Direct-object marker plus proper name; rendered straightforwardly as the object of 'had commanded.'
