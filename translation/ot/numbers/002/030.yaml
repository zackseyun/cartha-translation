id: NUM.2.30
reference: Numbers 2:30
source:
  edition: WLC
  text: וּ/צְבָא֖/וֹ וּ/פְקֻדֵי/הֶ֑ם שְׁלֹשָׁ֧ה וַ/חֲמִשִּׁ֛ים אֶ֖לֶף וְ/אַרְבַּ֥ע
    מֵאֽוֹת׃
translation:
  text: 'and his company, even those numbered from them: fifty-three thousand four
    hundred.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and his host' or 'and his army'; the Hebrew term can carry military
      overtones for an organized tribal contingent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבָאוֹ
  chosen: and his company
  alternatives:
  - and his host
  - and his army
  lexicon: HALOT
  rationale: צָבָא can denote a host, army, or organized company. In the census-and-camp
    arrangement context of Numbers 2, it refers to the tribal division as a military-style
    contingent. 'Company' preserves the organizational sense in readable English without
    overstating active warfare.
- source_word: וּפְקֻדֵיהֶם
  chosen: even those numbered from them
  alternatives:
  - and those mustered by them
  - and their numbered men
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like census sense, referring to those
    enrolled or counted. The suffix is plural ('them'), likely referring to the members
    of the tribe/group. 'Those numbered from them' keeps the census nuance and avoids
    adding 'men' where not explicit in this clause.
- source_word: שְׁלֹשָׁה וַחֲמִשִּׁים אֶלֶף וְאַרְבַּע מֵאוֹת
  chosen: fifty-three thousand four hundred
  alternatives:
  - three and fifty thousand and four hundred
  lexicon: HALOT
  rationale: This is the straightforward cardinal number. Modern English idiom reverses
    the Hebrew order into 'fifty-three thousand four hundred' for clarity and naturalness
    while preserving the exact total.
