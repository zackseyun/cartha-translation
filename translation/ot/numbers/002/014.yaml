id: NUM.2.14
reference: Numbers 2:14
source:
  edition: WLC
  text: וְ/מַטֵּ֖ה גָּ֑ד וְ/נָשִׂיא֙ לִ/בְנֵ֣י גָ֔ד אֶלְיָסָ֖ף בֶּן רְעוּאֵֽל־׃
translation:
  text: 'And the tribe of Gad, and the leader of the sons of Gad: Eliasaph son of
    Reuel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts or parallel passages give the father's name as Deuel (see
      Num 1:14).
    reason: textual_variant
lexical_decisions:
- source_word: וְ/מַטֵּה
  chosen: And the tribe of
  alternatives:
  - And the staff of
  - And the branch of
  - And the clan of
  lexicon: HALOT
  rationale: In Numbers 2, מַטֶּה in tribal census/camp arrangement contexts refers
    to a tribal division, not a literal staff. 'Tribe' is the natural English equivalent
    here. The conjunction is retained as 'And' to reflect the list structure.
- source_word: גָּד
  chosen: Gad
  rationale: Proper tribal/personal name; transliterated per translation philosophy.
- source_word: וְ/נָשִׂיא
  chosen: and the leader
  alternatives:
  - and the chief
  - and the prince
  lexicon: HALOT
  rationale: נָשִׂיא in this administrative context denotes the recognized tribal
    head. 'Leader' is clear modern English and avoids the archaic or potentially misleading
    'prince'.
- source_word: לִ/בְנֵי
  chosen: of the sons of
  alternatives:
  - for the sons of
  - of the people of
  - of the descendants of
  lexicon: HALOT
  rationale: The preposition ל with בני in this formula identifies the leader as belonging
    to/over that tribal group. 'Of the sons of' preserves the Hebrew construction
    more transparently than a freer paraphrase.
- source_word: גָד
  chosen: Gad
  rationale: Repeated tribal name; transliterated consistently.
- source_word: אֶלְיָסָף
  chosen: Eliasaph
  rationale: Personal name; transliterated by standard convention.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - descendant of
  lexicon: HALOT
  rationale: Standard patronymic formula; 'son of' is the direct and expected rendering.
- source_word: רְעוּאֵל
  chosen: Reuel
  alternatives:
  - Deuel
  rationale: The MT here reads רְעוּאֵל, best rendered 'Reuel.' A known parallel in
    Numbers 1:14 has 'Deuel,' so the alternative is preserved in a footnote as a name-form/textual
    variation rather than harmonized in the main text.
