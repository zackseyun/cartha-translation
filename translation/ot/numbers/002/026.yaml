id: NUM.2.26
reference: Numbers 2:26
source:
  edition: WLC
  text: וּ/צְבָא֖/וֹ וּ/פְקֻדֵי/הֶ֑ם שְׁנַ֧יִם וְ/שִׁשִּׁ֛ים אֶ֖לֶף וּ/שְׁבַ֥ע מֵאֽוֹת׃
translation:
  text: 'and his division, those numbered from them: sixty-two thousand seven hundred.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and his army' / 'and his host'; Hebrew צָבָא can denote a military host
      or organized company. In this census context, 'division' best reflects the tribal
      contingent arrangement.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and those numbered of them.' The phrase refers to the census
      total counted from that tribe/group.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבָאוֹ
  chosen: and his division
  alternatives:
  - and his army
  - and his host
  - and his company
  lexicon: HALOT
  rationale: צָבָא can denote an army/host, but in Numbers 1–2 within the census and
    camp arrangement context it refers to the tribal military division or contingent.
    'Division' is natural modern English and fits the organizational sense without
    implying a standing army detached from the census structure. The prefixed conjunction
    is carried as 'and,' and the 3ms suffix refers back to the tribe/prince previously
    named, hence 'his.'
- source_word: וּפְקֻדֵיהֶם
  chosen: those numbered from them
  alternatives:
  - and those mustered by them
  - and their numbered men
  - and their enrollment
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like nominal form, this expression
    in Numbers regularly refers to the census total of those counted. 'Those numbered
    from them' preserves the counted-persons sense and the relation to the tribe/group.
    A smoother but less transparent option would be 'their number.'
- source_word: שְׁנַיִם וְשִׁשִּׁים אֶלֶף וּשְׁבַע מֵאוֹת
  chosen: sixty-two thousand seven hundred
  alternatives:
  - two and sixty thousand and seven hundred
  lexicon: HALOT
  rationale: The Hebrew numerals are rendered in standard contemporary English number
    order. This preserves the exact quantity while avoiding wooden English.
