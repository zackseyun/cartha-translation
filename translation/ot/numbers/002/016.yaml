id: NUM.2.16
reference: Numbers 2:16
source:
  edition: WLC
  text: כָּֽל הַ/פְּקֻדִ֞ים לְ/מַחֲנֵ֣ה רְאוּבֵ֗ן מְאַ֨ת אֶ֜לֶף וְ/אֶחָ֨ד וַ/חֲמִשִּׁ֥ים
    אֶ֛לֶף וְ/אַרְבַּע מֵא֥וֹת וַ/חֲמִשִּׁ֖ים לְ/צִבְאֹתָ֑/ם וּ/שְׁנִיִּ֖ם יִסָּֽעוּ־־׃ס
translation:
  text: All those counted for the camp of Reuben were 151,450 by their divisions.
    They shall set out second.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to their armies' or 'according to their companies.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and second they shall set out,' indicating the camp's place
      in the marching order.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: All
  alternatives:
  - The whole number of
  - All the
  lexicon: HALOT
  rationale: Introduces the total sum of those counted; 'All' is natural English and
    preserves the comprehensive force.
- source_word: הַפְּקֻדִים
  chosen: those counted
  alternatives:
  - the numbered men
  - the mustered ones
  lexicon: HALOT
  rationale: From פקד in the passive/participle sense of those enrolled or counted
    in a census. 'Those counted' is clear modern English without adding 'men,' which
    is not explicit in this verse.
- source_word: לְמַחֲנֵה
  chosen: for the camp of
  alternatives:
  - belonging to the camp of
  - of the camp of
  lexicon: HALOT
  rationale: The preposition marks relation to the military/camp grouping. 'For the
    camp of' is idiomatic and reflects the organizational sense.
- source_word: רְאוּבֵן
  chosen: Reuben
  rationale: Standard English transliteration of the tribal name/personal name.
- source_word: מְאַת אֶלֶף וְאֶחָד וַחֲמִשִּׁים אֶלֶף וְאַרְבַּע מֵאוֹת וַחֲמִשִּׁים
  chosen: 151,450
  alternatives:
  - one hundred fifty-one thousand four hundred fifty
  rationale: This is the straightforward sum of the Hebrew numerals. Using digits
    improves readability in a census context while preserving exact quantity.
- source_word: לְצִבְאֹתָם
  chosen: by their divisions
  alternatives:
  - according to their companies
  - by their hosts
  - according to their armies
  lexicon: HALOT
  rationale: צבאות can denote military companies/hosts/divisions. In this camp-order
    context, 'by their divisions' communicates organized tribal military arrangement
    in accessible English.
- source_word: וּשְׁנִיִּם
  chosen: second
  alternatives:
  - in the second place
  lexicon: HALOT
  rationale: Ordinal sense in context of marching order. English idiom prefers 'second'
    rather than the literal cardinal form.
- source_word: יִסָּעוּ
  chosen: They shall set out
  alternatives:
  - they shall break camp
  - they shall journey
  lexicon: HALOT
  rationale: In wilderness-travel context נסע refers to setting out/breaking camp.
    'Set out' is concise and natural; 'break camp' is possible but slightly more interpretive.
