id: NUM.2.13
reference: Numbers 2:13
source:
  edition: WLC
  text: וּ/צְבָא֖/וֹ וּ/פְקֻדֵי/הֶ֑ם תִּשְׁעָ֧ה וַ/חֲמִשִּׁ֛ים אֶ֖לֶף וּ/שְׁלֹ֥שׁ
    מֵאֽוֹת׃
translation:
  text: 'and his division, those numbered from them: fifty-nine thousand three hundred.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּצְבָאוֹ
  chosen: and his division
  alternatives:
  - and his host
  - and his army
  - and his company
  lexicon: HALOT
  rationale: צָבָא in this census-and-camp arrangement context refers to the tribal
    military grouping or contingent. 'Division' is natural modern English and fits
    the organizational sense better than the more martial 'army' or the archaic-sounding
    'host.' The prefixed conjunction is carried over as 'and,' and the 3ms suffix
    is rendered 'his,' referring to the tribal leader/tribe previously named.
- source_word: וּפְקֻדֵיהֶם
  chosen: those numbered from them
  alternatives:
  - and those mustered by them
  - and their numbered men
  - and their enrollment
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like census sense, this expression
    denotes the persons counted in the census. 'Those numbered from them' preserves
    the counted-persons sense without adding 'men' where it is not explicit in this
    clause, though the broader census context is military. The conjunction is retained.
- source_word: תִּשְׁעָה וַחֲמִשִּׁים אֶלֶף
  chosen: fifty-nine thousand
  alternatives:
  - nine and fifty thousand
  lexicon: HALOT
  rationale: The Hebrew number is literally 'nine and fifty thousand.' Standard contemporary
    English reverses the order to 'fifty-nine thousand' for readability while preserving
    the exact value.
- source_word: וּשְׁלֹשׁ מֵאוֹת
  chosen: three hundred
  alternatives:
  - and three hundred
  lexicon: HALOT
  rationale: This completes the census total. English idiom normally omits a second
    explicit 'and' inside large numbers in this style, so 'three hundred' is appended
    after 'fifty-nine thousand.'
