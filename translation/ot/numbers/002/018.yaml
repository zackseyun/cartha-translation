id: NUM.2.18
reference: Numbers 2:18
source:
  edition: WLC
  text: דֶּ֣גֶל מַחֲנֵ֥ה אֶפְרַ֛יִם לְ/צִבְאֹתָ֖/ם יָ֑מָּ/ה וְ/נָשִׂיא֙ לִ/בְנֵ֣י
    אֶפְרַ֔יִם אֱלִישָׁמָ֖ע בֶּן עַמִּיהֽוּד־׃
translation:
  text: The banner of the camp of Ephraim, by their divisions, shall be on the west;
    and the leader of the sons of Ephraim shall be Elishama son of Ammihud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'standard' for 'banner.'
    reason: lexical_alternative
  - marker: b
    text: Or 'according to their companies/hosts' for 'by their divisions.' The Hebrew
      has an ordered military-organizational sense.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'sons of Ephraim,' a tribal designation for the descendants/people
      of Ephraim.
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּגֶל
  chosen: banner
  alternatives:
  - standard
  lexicon: HALOT
  rationale: Refers to the identifying military/tribal banner under which a camp is
    arranged. 'Banner' is clear modern English; 'standard' is possible but slightly
    less natural.
- source_word: מַחֲנֵה
  chosen: camp
  alternatives:
  - encampment
  lexicon: HALOT
  rationale: The noun denotes the camp formation of the tribe. 'Camp' is the most
    natural rendering in this military-organizational context.
- source_word: לְצִבְאֹתָם
  chosen: by their divisions
  alternatives:
  - according to their companies
  - by their hosts
  - according to their armies
  lexicon: HALOT
  rationale: צָבָא in Numbers often has an ordered military sense. Here it describes
    the tribal arrangement within the camp. 'By their divisions' preserves the organizational
    sense in readable English without overstating active warfare.
- source_word: יָמָּה
  chosen: on the west
  alternatives:
  - westward
  - toward the sea
  lexicon: HALOT
  rationale: The directional adverb literally points seaward, idiomatically 'westward'
    in Israelite orientation. 'On the west' fits the camp-position formula in this
    chapter.
- source_word: וְנָשִׂיא
  chosen: and the leader
  alternatives:
  - and the chief
  - and the prince
  lexicon: HALOT
  rationale: נָשִׂיא denotes the tribal chief or leader. 'Leader' communicates the
    role clearly in modern English; 'prince' would sound dynastic and potentially
    misleading here.
- source_word: לִבְנֵי אֶפְרַיִם
  chosen: of the sons of Ephraim
  alternatives:
  - for the sons of Ephraim
  - of the people of Ephraim
  lexicon: HALOT
  rationale: The construction identifies the leader as belonging to/over the tribal
    descendants of Ephraim. 'Of the sons of Ephraim' is a fairly formal but accurate
    rendering that preserves the Hebrew kinship language.
- source_word: אֱלִישָׁמָע בֶּן עַמִּיהוּד
  chosen: Elishama son of Ammihud
  rationale: Personal names are transliterated per project philosophy; 'son of' renders
    בֶּן straightforwardly.
