id: NUM.2.32
reference: Numbers 2:32
source:
  edition: WLC
  text: אֵ֛לֶּה פְּקוּדֵ֥י בְנֵֽי יִשְׂרָאֵ֖ל לְ/בֵ֣ית אֲבֹתָ֑/ם כָּל פְּקוּדֵ֤י הַֽ/מַּחֲנֹת֙
    לְ/צִבְאֹתָ֔/ם שֵׁשׁ מֵא֥וֹת אֶ֨לֶף֙ וּ/שְׁלֹ֣שֶׁת אֲלָפִ֔ים וַ/חֲמֵ֥שׁ מֵא֖וֹת
    וַ/חֲמִשִּֽׁים־־־׃
translation:
  text: These are the numbered men of the sons of Israel by their fathers’ houses.
    All the numbered men of the camps by their divisions were six hundred three thousand
    five hundred fifty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those counted' or 'registered men' for 'numbered men.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites.' Literally, 'the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Or 'by their companies' or 'according to their hosts' for 'by their divisions.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקוּדֵי
  chosen: numbered men
  alternatives:
  - those counted
  - registered men
  - mustered men
  lexicon: HALOT
  rationale: In Numbers, פקד in this nominal form refers to those enrolled/counted
    in the census for military organization. 'Numbered men' is concise and fits the
    repeated census formula. 'Men' is supplied because the census context in Numbers
    1–2 concerns eligible males, even though the noun itself is a participial form.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the familial/covenantal idiom
    of the Hebrew. 'Israelites' is possible, but 'sons of Israel' better reflects
    the source wording in this census formula.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers’ houses
  alternatives:
  - according to their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: This is the standard clan/lineage expression in census contexts. 'Fathers’
    houses' preserves the patrilineal structure explicit in the Hebrew better than
    a more generalized 'families'.
- source_word: כָּל
  chosen: All
  alternatives:
  - the whole number of
  - all of
  lexicon: HALOT
  rationale: Introduces the summary total straightforwardly and naturally in English.
- source_word: הַמַּחֲנֹת
  chosen: the camps
  alternatives:
  - the encampments
  lexicon: HALOT
  rationale: Refers to the tribal camp formations around the tabernacle. 'Camps' is
    clear modern English and sufficiently precise.
- source_word: לְצִבְאֹתָם
  chosen: by their divisions
  alternatives:
  - by their companies
  - according to their hosts
  - by their armies
  lexicon: HALOT
  rationale: צבאות here refers to organized military-style groupings/order. 'By their
    divisions' communicates ordered arrangement without overstating active warfare,
    fitting the camp census context.
- source_word: שֵׁשׁ מֵאוֹת אֶלֶף וּשְׁלֹשֶׁת אֲלָפִים וַחֲמֵשׁ מֵאוֹת וַחֲמִשִּׁים
  chosen: six hundred three thousand five hundred fifty
  alternatives:
  - 603,550
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence is rendered idiomatically in English words.
    Spelling out the number matches the formal tone of the census summary.
