theological_decisions:
- issue: Gendered census language
  chosen_reading: Explicitly rendered the census participants as 'men'
  alternative_readings:
  - those counted
  - the registered ones
  rationale: Although 'men' is not a separate lexical item in this verse, the immediate
    census context in Numbers 1–2 defines those counted as adult males fit for military
    service. This follows the gender-accurate principle rather than neutralizing the
    referent.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
