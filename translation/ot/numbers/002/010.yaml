id: NUM.2.10
reference: Numbers 2:10
source:
  edition: WLC
  text: דֶּ֣גֶל מַחֲנֵ֧ה רְאוּבֵ֛ן תֵּימָ֖נָ/ה לְ/צִבְאֹתָ֑/ם וְ/נָשִׂיא֙ לִ/בְנֵ֣י
    רְאוּבֵ֔ן אֱלִיצ֖וּר בֶּן שְׁדֵיאֽוּר־׃
translation:
  text: The banner of the camp of Reuben shall be on the south, by their divisions;
    and the leader of the sons of Reuben shall be Elizur son of Shedeur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'standard' for 'banner.'
    reason: lexical_alternative
  - marker: b
    text: Or 'according to their armies/hosts'; the Hebrew carries an ordered military
      sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּגֶל
  chosen: banner
  alternatives:
  - standard
  lexicon: HALOT
  rationale: Refers to the identifying military/tribal ensign under which a camp is
    arranged. 'Banner' is natural modern English and fits the camp-order context;
    'standard' is possible but slightly more traditional.
- source_word: מַחֲנֵה
  chosen: camp
  alternatives:
  - company
  - encampment
  lexicon: HALOT
  rationale: The term denotes the organized camp formation of the tribe. 'Camp' is
    the clearest and most idiomatic rendering in this census/arrangement context.
- source_word: רְאוּבֵן
  chosen: Reuben
  rationale: Standard English transliteration of the tribal/personal name, in keeping
    with the policy to transliterate names.
- source_word: תֵּימָנָה
  chosen: on the south
  alternatives:
  - southward
  - to the south
  lexicon: HALOT
  rationale: Directional term with locative ending indicating placement on the south
    side of the camp. 'On the south' reads naturally in English for camp positioning.
- source_word: לְצִבְאֹתָם
  chosen: by their divisions
  alternatives:
  - according to their companies
  - by their hosts
  - according to their armies
  lexicon: HALOT
  rationale: The noun צבא can denote army/host, but in Numbers 1–2 it often refers
    to the ordered tribal groupings for march and encampment. 'By their divisions'
    preserves the military-organizational sense without sounding overly martial in
    English.
- source_word: וְנָשִׂיא
  chosen: and the leader
  alternatives:
  - and the chief
  - and the prince
  lexicon: HALOT
  rationale: נָשִׂיא in this context is the appointed tribal head. 'Leader' is clear
    modern English; 'prince' would be misleadingly monarchical, and 'chief' is possible
    but less neutral.
- source_word: לִבְנֵי רְאוּבֵן
  chosen: of the sons of Reuben
  alternatives:
  - for the sons of Reuben
  - of the people of Reuben
  lexicon: HALOT
  rationale: The preposition plus construct phrase identifies the tribal group over
    whom the leader is appointed. 'Of the sons of Reuben' is a fairly formal but accurate
    rendering that preserves the Hebrew kinship expression.
- source_word: אֱלִיצוּר בֶּן שְׁדֵיאוּר
  chosen: Elizur son of Shedeur
  alternatives:
  - Elizur, the son of Shedeur
  rationale: Standard transliteration of the personal names. 'Son of' directly reflects
    the Hebrew patronymic construction.
