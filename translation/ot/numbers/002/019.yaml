id: NUM.2.19
reference: Numbers 2:19
source:
  edition: WLC
  text: וּ/צְבָא֖/וֹ וּ/פְקֻדֵי/הֶ֑ם אַרְבָּעִ֥ים אֶ֖לֶף וַ/חֲמֵ֥שׁ מֵאֽוֹת׃
translation:
  text: 'And his division, those numbered from them: forty thousand and five hundred.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “those mustered from them.” The Hebrew term can denote those enrolled
      or counted for service in the census.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְבָאוֹ
  chosen: And his division
  alternatives:
  - And his company
  - And his host
  - And his army
  lexicon: HALOT
  rationale: צָבָא in the census-and-camp arrangement context refers to the military/camp
    division associated with the tribal leader. 'Division' fits modern readable English
    while preserving the organized military sense better than the broader 'company'
    and less misleadingly than 'army' in this immediate listing formula.
- source_word: וּפְקֻדֵיהֶם
  chosen: those numbered from them
  alternatives:
  - and those numbered of them
  - and their numbered men
  - and those mustered from them
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like census sense, referring to those
    enrolled or counted in the census. The suffix is plural ('them'), referring to
    the members of the division/tribe. 'Those numbered from them' preserves the idiom
    without over-specifying 'men,' which is implied by the military census context
    but not explicit in this short clause.
- source_word: אַרְבָּעִים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  chosen: forty thousand and five hundred
  lexicon: HALOT
  rationale: Standard cardinal number construction; rendered straightforwardly in
    contemporary English.
