id: NUM.2.11
reference: Numbers 2:11
source:
  edition: WLC
  text: וּ/צְבָא֖/וֹ וּ/פְקֻדָ֑י/ו שִׁשָּׁ֧ה וְ/אַרְבָּעִ֛ים אֶ֖לֶף וַ/חֲמֵ֥שׁ מֵאֽוֹת׃
translation:
  text: His division, that is, those numbered from it, was forty-six thousand five
    hundred.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: צְבָאוֹ
  chosen: his division
  alternatives:
  - his host
  - his army
  - his company
  lexicon: HALOT
  rationale: צָבָא in the census-and-camp context of Numbers refers to the military-style
    tribal formation or contingent. 'Division' is natural modern English and preserves
    the organized military/camp sense without overstating active combat.
- source_word: פְקֻדָיו
  chosen: those numbered from it
  alternatives:
  - his numbered men
  - his muster
  - those enrolled
  lexicon: HALOT
  rationale: From פקד in the passive/participle-derived census sense, referring to
    those counted in the tribal total. 'Those numbered from it' makes explicit that
    the number given is the census total belonging to that division. The pronoun is
    rendered by sense rather than repeated mechanically as 'his' in English.
- source_word: שִׁשָּׁה וְאַרְבָּעִים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  chosen: forty-six thousand five hundred
  alternatives:
  - six and forty thousand and five hundred
  lexicon: HALOT
  rationale: The Hebrew cardinal sequence is rendered in standard contemporary English
    number style. This is a straightforward numerical total with no need to preserve
    Hebrew ordering woodenly.
