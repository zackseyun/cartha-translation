id: NUM.3.19
reference: Numbers 3:19
source:
  edition: WLC
  text: וּ/בְנֵ֥י קְהָ֖ת לְ/מִשְׁפְּחֹתָ֑/ם עַמְרָ֣ם וְ/יִצְהָ֔ר חֶבְר֖וֹן וְ/עֻזִּיאֵֽל׃
translation:
  text: 'And the sons of Kohath, by their clans: Amram, Izhar, Hebron, and Uzziel.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the descendants of
  - Now the sons of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons of.' In genealogical/list contexts
    it can denote direct sons or broader descendants, but here the following proper
    names are the traditional clan founders within the Kohathite line, so 'sons of'
    preserves the Hebrew form while remaining natural in English. The prefixed conjunction
    is rendered 'And' to match the ongoing list structure.
- source_word: קְהָת
  chosen: Kohath
  lexicon: HALOT
  rationale: Proper personal name; transliterated according to standard English convention
    rather than translated, in keeping with the project's policy for names.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their clans
  - for their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה refers to a clan/family subdivision within Israelite tribal
    structure. 'By their clans' is concise, idiomatic, and fits the list format. 'Families'
    is possible but can sound too domestic and less technical than the Hebrew social
    unit.
- source_word: עַמְרָם
  chosen: Amram
  lexicon: HALOT
  rationale: Proper name; transliterated.
- source_word: וְיִצְהָר
  chosen: Izhar
  lexicon: HALOT
  rationale: Proper name with conjunction; transliterated, with the conjunction absorbed
    into normal English list punctuation.
- source_word: חֶבְרוֹן
  chosen: Hebron
  lexicon: HALOT
  rationale: Proper name; transliterated. Though identical in form to the place name
    Hebron, here the context clearly indicates the personal name in a genealogy.
- source_word: וְעֻזִּיאֵל
  chosen: and Uzziel
  lexicon: HALOT
  rationale: Proper name; transliterated. The final conjunction is rendered explicitly
    as 'and' in standard English list style.
