id: NUM.3.14
reference: Numbers 3:14
source:
  edition: WLC
  text: וַ/יְדַבֵּ֤ר יְהוָה֙ אֶל מֹשֶׁ֔ה בְּ/מִדְבַּ֥ר סִינַ֖י לֵ/אמֹֽר־׃
translation:
  text: And Yahweh spoke to Moses in the wilderness of Sinai, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of דבר introduces a narrative speech formula. 'Spoke' is the standard and slightly more formal rendering in divine-address contexts, while 'said' is possible but less precise given the common Hebrew formula 'the LORD spoke ... saying.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech. 'To' is the natural modern English equivalent.
- source_word: מֹשֶׁה
  chosen: Moses
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name מֹשֶׁה.
- source_word: בְּמִדְבַּר
  chosen: in the wilderness of
  alternatives:
  - in the desert of
  - in the wilderness at
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert pastureland. 'Wilderness' fits Pentateuchal usage well and preserves the geographic sense without over-specifying aridity. The construct with Sinai is naturally rendered 'the wilderness of Sinai.'
- source_word: סִינַי
  chosen: Sinai
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: This infinitive construct functions as the standard speech-introduction formula following 'spoke.' 'Saying' preserves the Hebrew structure and signals that the content follows in the next verse.
