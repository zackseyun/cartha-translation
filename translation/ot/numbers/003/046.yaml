id: NUM.3.46
reference: Numbers 3:46
source:
  edition: WLC
  text: וְ/אֵת֙ פְּדוּיֵ֣י הַ/שְּׁלֹשָׁ֔ה וְ/הַ/שִּׁבְעִ֖ים וְ/הַ/מָּאתָ֑יִם הָ/עֹֽדְפִים֙
    עַל הַ/לְוִיִּ֔ם מִ/בְּכ֖וֹר בְּנֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: And for the redemption price of the 273 who exceed the Levites from among
    the firstborn of the sons of Israel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the redeemed ones of the 273"; the Hebrew form can be taken more literally,
      but the immediate context concerns the payment required for the surplus firstborn
      (vv. 47–48), so "redemption price" best conveys the sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּדוּיֵי
  chosen: the redemption price of
  alternatives:
  - those redeemed of
  - the redeemed ones of
  - the ransom of
  lexicon: HALOT
  rationale: In context this noun from פדה refers not merely to persons who are redeemed
    but to the redemption due or redemption amount to be taken for the surplus firstborn,
    as clarified by the following verse specifying five shekels each. 'Redemption
    price' makes the sense explicit in natural English without overparaphrasing.
- source_word: הַשְּׁלֹשָׁה וְהַשִּׁבְעִים וְהַמָּאתָיִם
  chosen: '273'
  alternatives:
  - the three and the seventy and the two hundred
  - two hundred seventy-three
  lexicon: HALOT
  rationale: Hebrew expresses the number additively. Rendering it as the standard
    English numeral preserves the exact quantity clearly and naturally.
- source_word: הָעֹדְפִים
  chosen: who exceed
  alternatives:
  - who are over and above
  - who remain over
  - the surplus
  lexicon: HALOT
  rationale: The participle denotes those in excess beyond the number of Levites available
    as substitutes. 'Who exceed' is concise and preserves the comparative sense.
- source_word: עַל הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - over the Levites
  - beyond the Levites
  lexicon: HALOT
  rationale: With עֹדְפִים, עַל marks excess in relation to the Levites. In idiomatic
    English this is best expressed as exceeding the Levites rather than a more wooden
    'over the Levites.'
- source_word: מִבְּכוֹר בְּנֵי יִשְׂרָאֵל
  chosen: from among the firstborn of the sons of Israel
  alternatives:
  - from the firstborn of the Israelites
  - from among Israel's firstborn sons
  lexicon: HALOT
  rationale: The phrase identifies the group from which the surplus comes. 'Sons of
    Israel' preserves the formal covenantal expression בני ישראל in line with gender-accurate
    policy, while 'from among' reflects the partitive force.
