id: NUM.3.37
reference: Numbers 3:37
source:
  edition: WLC
  text: וְ/עַמֻּדֵ֧י הֶ/חָצֵ֛ר סָבִ֖יב וְ/אַדְנֵי/הֶ֑ם וִ/יתֵדֹתָ֖/ם וּ/מֵֽיתְרֵי/הֶֽם׃
translation:
  text: and the pillars of the surrounding courtyard, and their bases, and their pegs,
    and their cords.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sockets' for 'bases.' The Hebrew term can refer to structural bases,
      especially in tabernacle descriptions.
    reason: lexical_alternative
  - marker: b
    text: Or 'ropes' for 'cords.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמֻּדֵי
  chosen: pillars
  alternatives:
  - posts
  - columns
  lexicon: HALOT
  rationale: The construct plural refers to the upright supports of the courtyard
    enclosure. 'Pillars' is natural English for tabernacle architecture and fits the
    likely substantial supports better than the more generic 'posts.'
- source_word: הֶחָצֵר
  chosen: courtyard
  alternatives:
  - court
  - enclosure
  lexicon: HALOT
  rationale: Refers to the tabernacle court area. 'Courtyard' is clearer in modern
    English than 'court' while remaining faithful to the architectural sense.
- source_word: סָבִיב
  chosen: surrounding
  alternatives:
  - all around
  - around
  lexicon: HALOT
  rationale: Used adverbially/adjectivally to describe the courtyard's perimeter.
    'Surrounding' yields smooth English in construction with 'courtyard' while preserving
    the sense of encircling perimeter elements.
- source_word: אַדְנֵיהֶם
  chosen: their bases
  alternatives:
  - their sockets
  - their pedestals
  lexicon: HALOT
  rationale: In tabernacle contexts this noun often denotes metal bases or sockets
    for structural elements. 'Bases' is a clear, accessible rendering in this inventory
    list; 'sockets' is possible but more technical.
- source_word: יְתֵדֹתָם
  chosen: their pegs
  alternatives:
  - their tent pegs
  - their stakes
  lexicon: HALOT
  rationale: Refers to fastening pegs used with the courtyard structure. 'Pegs' is
    concise and sufficient here; 'tent pegs' would be slightly more explicit but adds
    a word not present in the Hebrew.
- source_word: מֵיתְרֵיהֶם
  chosen: their cords
  alternatives:
  - their ropes
  - their lines
  lexicon: HALOT
  rationale: Denotes the cords/ropes associated with securing the structure. 'Cords'
    fits the likely tabernacle terminology and pairs naturally with 'pegs.'
- source_word: וְ
  chosen: and
  lexicon: HALOT
  rationale: The repeated conjunction marks this as a continuation of the inventory
    list; retaining 'and' preserves the enumerative style of the Hebrew.
