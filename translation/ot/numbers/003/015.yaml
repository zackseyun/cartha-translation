id: NUM.3.15
reference: Numbers 3:15
source:
  edition: WLC
  text: פְּקֹד֙ אֶת בְּנֵ֣י לֵוִ֔י לְ/בֵ֥ית אֲבֹתָ֖/ם לְ/מִשְׁפְּחֹתָ֑/ם כָּל זָכָ֛ר
    מִ/בֶּן חֹ֥דֶשׁ וָ/מַ֖עְלָ/ה תִּפְקְדֵֽ/ם־־־׃
translation:
  text: 'Count the sons of Levi by their fathers'' houses, by their clans: every male
    from a month old and upward you shall count.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Levites' for 'the sons of Levi.' The Hebrew is literally 'sons of
      Levi,' emphasizing descent and clan structure.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקֹד / תִּפְקְדֵם
  chosen: count / you shall count
  alternatives:
  - take a census of
  - number
  - muster
  lexicon: HALOT
  rationale: The verb פקד in this administrative context refers to numbering or enrolling
    persons. 'Count' is clear modern English and preserves the imperative plus second-person
    future force without adding military nuance that 'muster' could imply.
- source_word: בְּנֵי לֵוִי
  chosen: the sons of Levi
  alternatives:
  - the Levites
  - the descendants of Levi
  lexicon: HALOT
  rationale: Literally 'sons of Levi.' This keeps the genealogical framing explicit.
    'Levites' is possible, but the verse immediately specifies paternal houses and
    clans, so the more literal wording better matches the source structure.
- source_word: לְבֵית אֲבֹתָם
  chosen: by their fathers' houses
  alternatives:
  - according to their ancestral houses
  - by their family houses
  lexicon: HALOT
  rationale: This is a standard clan/genealogical expression. 'Fathers' houses' preserves
    the patriarchal household structure of the Hebrew and is more transparent than
    smoothing to a generic family term.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  lexicon: HALOT
  rationale: '''Clans'' distinguishes מִשְׁפָּחָה from the preceding ''fathers'' houses''
    and reflects a kinship subdivision more precisely than repeating ''families''
    in English.'
- source_word: כָּל זָכָר
  chosen: every male
  alternatives:
  - every man
  - all the males
  lexicon: HALOT
  rationale: The Hebrew specifies sex rather than adulthood. 'Every male' is therefore
    more accurate than 'every man,' especially since infants one month old are included.
- source_word: מִבֶּן חֹדֶשׁ וָמַעְלָה
  chosen: from a month old and upward
  alternatives:
  - from one month old and above
  - a month old or older
  lexicon: HALOT
  rationale: This idiom marks the lower age threshold for the count. 'From a month
    old and upward' is natural, precise, and close to the Hebrew wording.
