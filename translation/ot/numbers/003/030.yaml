id: NUM.3.30
reference: Numbers 3:30
source:
  edition: WLC
  text: וּ/נְשִׂ֥יא בֵֽית אָ֖ב לְ/מִשְׁפְּחֹ֣ת הַ/קְּהָתִ֑י אֶלִיצָפָ֖ן בֶּן עֻזִּיאֵֽל־־׃
translation:
  text: And the chief of the ancestral house of the families of the Kohathites was
    Elizaphan the son of Uzziel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leader' or 'prince' for 'chief' (Heb. נָשִׂיא).
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'father's house,' an idiom for an ancestral or clan household unit.
    reason: cultural_note
lexical_decisions:
- source_word: וּ/נְשִׂיא
  chosen: And the chief
  alternatives:
  - And the leader
  - And the prince
  lexicon: HALOT
  rationale: נָשִׂיא commonly denotes a leader, chief, or prince. In this administrative/tribal
    context, 'chief' best conveys recognized authority without implying monarchy.
    The prefixed conjunction ו is rendered 'And' to continue the census-style listing.
- source_word: בֵּית אָב
  chosen: the ancestral house
  alternatives:
  - the father's house
  - the paternal house
  lexicon: HALOT
  rationale: The construct phrase refers to a patrilineal clan unit within Israelite
    social organization. 'Ancestral house' communicates the idiomatic sense in natural
    English better than the more wooden 'father's house,' while preserving the kinship
    structure.
- source_word: לְמִשְׁפְּחֹת
  chosen: of the families
  alternatives:
  - for the clans
  - of the clans
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת denotes family groupings or clans. 'Families' is retained
    here because the verse already uses 'ancestral house' for בֵּית אָב, and the phrase
    'ancestral house of the families' reflects the layered kinship structure of the
    Hebrew.
- source_word: הַקְּהָתִי
  chosen: of the Kohathites
  alternatives:
  - of the Kohathite clan
  - of Kohath
  lexicon: HALOT
  rationale: The gentilic singular with article functions collectively for the descendants/group
    of Kohath. 'Kohathites' is the standard and clear English rendering for the clan
    designation.
- source_word: אֶלִיצָפָן
  chosen: Elizaphan
  rationale: 'Personal name transliterated according to the translation philosophy:
    translate titles, transliterate names.'
- source_word: בֶּן עֻזִּיאֵל
  chosen: the son of Uzziel
  alternatives:
  - son of Uzziel
  rationale: Standard genealogical formula. Including 'the' before 'son' yields natural
    English in a verbless Hebrew identification clause.
