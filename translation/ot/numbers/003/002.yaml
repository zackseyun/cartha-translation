id: NUM.3.2
reference: Numbers 3:2
source:
  edition: WLC
  text: וְ/אֵ֛לֶּה שְׁמ֥וֹת בְּֽנֵי אַהֲרֹ֖ן הַ/בְּכ֣וֹר נָדָ֑ב וַ/אֲבִיה֕וּא אֶלְעָזָ֖ר
    וְ/אִיתָמָֽר־׀׃
translation:
  text: 'These are the names of Aaron’s sons: Nadab the firstborn, and Abihu, Eleazar,
    and Ithamar.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: These are
  alternatives:
  - And these are
  - Now these are
  lexicon: HALOT
  rationale: Introduces the list deictically. English idiom naturally renders the
    conjunction plus demonstrative as 'These are' at the start of a sentence; 'And
    these are' is possible but less natural here.
- source_word: שְׁמוֹת
  chosen: the names
  alternatives:
  - names
  lexicon: HALOT
  rationale: The construct phrase שְׁמוֹת בְּנֵי אַהֲרֹן is straightforwardly 'the
    names of Aaron's sons.' Including the article in English is idiomatic.
- source_word: בְּנֵי אַהֲרֹן
  chosen: of Aaron’s sons
  alternatives:
  - of the sons of Aaron
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English. 'Aaron’s sons' is equivalent
    in meaning and more readable than the more wooden 'the sons of Aaron.'
- source_word: הַבְּכֹר
  chosen: the firstborn
  alternatives:
  - the eldest
  lexicon: HALOT
  rationale: 'בְּכוֹר specifically denotes firstborn status, not merely oldest by
    age. The article marks Nadab appositionally: ''Nadab the firstborn.'''
- source_word: נָדָב
  chosen: Nadab
  rationale: Personal name transliterated per translation philosophy.
- source_word: וַאֲבִיהוּא
  chosen: and Abihu
  rationale: Personal name transliterated; conjunction retained as part of the list.
- source_word: אֶלְעָזָר
  chosen: Eleazar
  rationale: Personal name transliterated per translation philosophy.
- source_word: וְאִיתָמָר
  chosen: and Ithamar
  rationale: Personal name transliterated; conjunction retained to reflect the Hebrew
    list structure.
