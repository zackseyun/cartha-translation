id: NUM.3.40
reference: Numbers 3:40
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל מֹשֶׁ֗ה פְּקֹ֨ד כָּל בְּכֹ֤ר זָכָר֙ לִ/בְנֵ֣י יִשְׂרָאֵ֔ל מִ/בֶּן חֹ֖דֶשׁ וָ/מָ֑עְלָ/ה וְ/שָׂ֕א אֵ֖ת מִסְפַּ֥ר שְׁמֹתָֽ/ם־־־׃
translation:
  text: Then Yahweh said to Moses, “Count every firstborn male among the sons of Israel from a month old and upward, and take the number of their names.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “and count them by name.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, using small-caps convention in English to represent YHWH while following established reverential practice.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow without losing the sequential sense.
- source_word: פְּקֹד
  chosen: Count
  alternatives:
  - Muster
  - Number
  lexicon: HALOT
  rationale: In this census context the imperative means to count or take a census. 'Count' is clear modern English and fits the command.
- source_word: כָּל בְּכֹר זָכָר
  chosen: every firstborn male
  alternatives:
  - every male firstborn
  - every firstborn son
  lexicon: HALOT
  rationale: בכור denotes firstborn, and זכר specifies male. 'Every firstborn male' is straightforward and preserves the gender-specific wording.
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - of the Israelites
  - among the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of Israel.' Following the gender-accurate principle, 'sons of Israel' is retained rather than flattening to 'Israelites,' while 'among' fits the census sense.
- source_word: מִבֶּן חֹדֶשׁ וָמָעְלָה
  chosen: from a month old and upward
  alternatives:
  - from one month old and above
  - from a month old and older
  lexicon: HALOT
  rationale: This idiom marks the lower age limit for counting. 'From a month old and upward' is idiomatic English and preserves the formal threshold language.
- source_word: וְשָׂא אֵת מִסְפַּר שְׁמֹתָם
  chosen: and take the number of their names
  alternatives:
  - and record the number of their names
  - and tally them by name
  lexicon: HALOT
  rationale: Literally 'lift/carry the number of their names,' an idiom for taking a named count. 'Take the number of their names' preserves the formal flavor and the emphasis on enumeration by name.
