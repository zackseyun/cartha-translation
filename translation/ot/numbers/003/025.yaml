id: NUM.3.25
reference: Numbers 3:25
source:
  edition: WLC
  text: וּ/מִשְׁמֶ֤רֶת בְּנֵֽי גֵרְשׁוֹן֙ בְּ/אֹ֣הֶל מוֹעֵ֔ד הַ/מִּשְׁכָּ֖ן וְ/הָ/אֹ֑הֶל
    מִכְסֵ֕/הוּ וּ/מָסַ֕ךְ פֶּ֖תַח אֹ֥הֶל מוֹעֵֽד־׃
translation:
  text: And the duty of the sons of Gershon in the tent of meeting was the tabernacle,
    and the tent, its covering, and the screen for the entrance of the tent of meeting,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'charge' or 'responsibility' for מִשְׁמֶרֶת.
    reason: lexical_alternative
  - marker: b
    text: '''Screen'' may also be rendered ''curtain'' for מָסַךְ, the hanging at
      the entrance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁמֶרֶת
  chosen: duty
  alternatives:
  - charge
  - responsibility
  - guard duty
  lexicon: HALOT
  rationale: In this Levitical assignment context, the noun refers to what the Gershonites
    are responsible to attend or care for. 'Duty' is natural modern English and fits
    the following list of entrusted items.
- source_word: בְּנֵי גֵרְשׁוֹן
  chosen: the sons of Gershon
  alternatives:
  - the Gershonites
  lexicon: HALOT
  rationale: A more formally transparent rendering preserves the familial expression
    in the Hebrew while still reading naturally. 'Gershonites' is possible but less
    directly reflects the source wording.
- source_word: בְּאֹהֶל מוֹעֵד
  chosen: in the tent of meeting
  alternatives:
  - at the tent of meeting
  lexicon: HALOT
  rationale: The preposition ב here is locative with reference to sphere of service.
    'Tent of meeting' is the standard transparent rendering of אֹהֶל מוֹעֵד.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: '''Tabernacle'' is the established and accurate rendering for מִשְׁכָּן
    in this cultic context. Although ''dwelling place'' is more etymologically transparent,
    ''tabernacle'' is clearer as a technical referent here.'
- source_word: וְהָאֹהֶל
  chosen: and the tent
  lexicon: HALOT
  rationale: This likely distinguishes the tent structure from the tabernacle proper
    in the inventory of components. A simple coordinate rendering best preserves the
    list structure.
- source_word: מִכְסֵהוּ
  chosen: its covering
  alternatives:
  - its covering layer
  lexicon: HALOT
  rationale: The suffix refers back to the tent/tabernacle complex. 'Its covering'
    is concise and sufficiently precise for the protective outer covering.
- source_word: מָסַךְ
  chosen: the screen
  alternatives:
  - the curtain
  lexicon: HALOT
  rationale: מָסַךְ often denotes a screen or hanging at an entrance. 'Screen' distinguishes
    it from other curtain terms and fits the doorway context.
- source_word: פֶּתַח
  chosen: for the entrance
  alternatives:
  - of the entrance
  - at the entrance
  lexicon: HALOT
  rationale: In English, 'the screen for the entrance' is smoother than a more wooden
    genitive while preserving the functional relationship.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  lexicon: HALOT
  rationale: Repeated consistently for the same Hebrew phrase in the verse.
