theological_decisions:
- issue: Nature of Levitical service to Aaron
  chosen_reading: The Levites are presented before Aaron in order to serve him in
    his priestly role.
  alternative_readings:
  - The Levites serve with him rather than him
  rationale: The direct object pronoun in וְשֵׁרְתוּ אֹתוֹ most naturally refers to
    Aaron, indicating service rendered to him within the tabernacle order. This should
    not be flattened into a more general 'serve with him' when the Hebrew specifies
    an object.
