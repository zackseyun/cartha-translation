id: NUM.3.6
reference: Numbers 3:6
source:
  edition: WLC
  text: הַקְרֵב֙ אֶת מַטֵּ֣ה לֵוִ֔י וְֽ/הַעֲמַדְתָּ֣ אֹת֔/וֹ לִ/פְנֵ֖י אַהֲרֹ֣ן הַ/כֹּהֵ֑ן
    וְ/שֵׁרְת֖וּ אֹתֽ/וֹ־׃
translation:
  text: Bring near the tribe of Levi, and set it before Aaron the priest, and they
    shall serve him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'minister to him.' The Hebrew verb can denote attendant or liturgical
      service.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְרֵב
  chosen: Bring near
  alternatives:
  - Present
  - Bring forward
  lexicon: HALOT
  rationale: The Hiphil imperative of קרב means to cause to come near or bring near.
    'Bring near' preserves the concrete cultic sense without overformalizing it.
- source_word: מַטֵּה לֵוִי
  chosen: the tribe of Levi
  alternatives:
  - the staff of Levi
  - the clan of Levi
  lexicon: HALOT
  rationale: מַטֶּה can mean 'staff' literally or, in tribal contexts, 'tribe.' Here
    the referent is the Levitical tribal group, so 'the tribe of Levi' best matches
    the sense.
- source_word: וְהַעֲמַדְתָּ אֹתוֹ
  chosen: and set it
  alternatives:
  - and station it
  - and place it
  lexicon: HALOT
  rationale: The Hiphil of עמד means to cause to stand, set, or station. Because the
    object is the collective noun 'tribe,' singular 'it' is retained, and 'set it'
    gives natural English while preserving the causative sense.
- source_word: לִפְנֵי אַהֲרֹן הַכֹּהֵן
  chosen: before Aaron the priest
  alternatives:
  - in the presence of Aaron the priest
  lexicon: HALOT
  rationale: לִפְנֵי is most straightforwardly 'before' or 'in front of.' 'Before
    Aaron the priest' is concise and fits the formal presentation context.
- source_word: וְשֵׁרְתוּ אֹתוֹ
  chosen: and they shall serve him
  alternatives:
  - and they shall minister to him
  lexicon: HALOT
  rationale: שרת often denotes service, especially attendant or ministerial service.
    Here the direct object is Aaron, so 'serve him' is the plain rendering; 'minister
    to him' is possible but more ecclesiastical. The shift from singular collective
    'tribe' to plural 'they' reflects the Hebrew collective followed by plural verb.
