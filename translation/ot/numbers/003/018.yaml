id: NUM.3.18
reference: Numbers 3:18
source:
  edition: WLC
  text: וְ/אֵ֛לֶּה שְׁמ֥וֹת בְּֽנֵי גֵרְשׁ֖וֹן לְ/מִשְׁפְּחֹתָ֑/ם לִבְנִ֖י וְ/שִׁמְעִֽי־׃
translation:
  text: 'And these are the names of the sons of Gershon by their clans: Libni and
    Shimei.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: And these are
  alternatives:
  - These are
  - Now these are
  lexicon: HALOT
  rationale: The conjunction ו plus demonstrative naturally introduces a list. 'And
    these are' preserves the Hebrew connective and the list-introducing force without
    sounding overly wooden.
- source_word: שְׁמוֹת
  chosen: the names of
  alternatives:
  - the names
  lexicon: HALOT
  rationale: Construct form with the following noun requires 'the names of' in English.
- source_word: בְּנֵי גֵרְשׁוֹן
  chosen: the sons of Gershon
  alternatives:
  - the descendants of Gershon
  - the children of Gershon
  lexicon: HALOT
  rationale: בני literally means 'sons of.' Since the verse immediately lists two
    male offspring, the more specific 'sons' is preferable to broader genealogical
    terms.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their clans
  - by their families
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census/genealogical contexts is well rendered 'clan.'
    'By their clans' is concise, natural English and preserves the organizational
    sense of the Hebrew preposition ל.
- source_word: לִבְנִי
  chosen: Libni
  rationale: Proper name; transliterated according to the translation philosophy of
    transliterating personal names.
- source_word: וְשִׁמְעִי
  chosen: and Shimei
  rationale: Proper name with conjunction; transliterated and joined with 'and' in
    standard English list style.
