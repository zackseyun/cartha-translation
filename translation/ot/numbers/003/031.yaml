theological_decisions:
- issue: Cultic terminology for tabernacle service
  chosen_reading: Use 'minister' and 'service' to preserve sacred/tabernacle connotations
    without importing later ecclesiastical language.
  alternative_readings:
  - Use 'serve' and 'work' for plainer English
  rationale: The verse is administrative rather than doctrinal, but the Hebrew vocabulary
    belongs to priestly worship. The chosen wording keeps the cultic register while
    remaining readable modern English.
  doctrine_reference: 'Translation philosophy: readable modern English; consistency
    of key terms, or documented exception.'
