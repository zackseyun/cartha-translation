id: NUM.3.31
reference: Numbers 3:31
source:
  edition: WLC
  text: וּ/מִשְׁמַרְתָּ֗/ם הָ/אָרֹ֤ן וְ/הַ/שֻּׁלְחָן֙ וְ/הַ/מְּנֹרָ֣ה וְ/הַֽ/מִּזְבְּחֹ֔ת
    וּ/כְלֵ֣י הַ/קֹּ֔דֶשׁ אֲשֶׁ֥ר יְשָׁרְת֖וּ בָּ/הֶ֑ם וְ/הַ֨/מָּסָ֔ךְ וְ/כֹ֖ל עֲבֹדָתֽ/וֹ׃
translation:
  text: And their duty was the ark, the table, the lampstand, the altars, the vessels
    of the sanctuary with which they minister, the screen, and all its service.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their charge was' or 'their responsibility was.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the holy vessels' or 'the utensils of the holy place.'
    reason: lexical_alternative
  - marker: c
    text: That is, the entrance screen or hanging; not the inner veil.
    reason: cultural_note
lexical_decisions:
- source_word: וּמִשְׁמַרְתָּם
  chosen: And their duty was
  alternatives:
  - And their charge was
  - And their responsibility was
  - And their guard was
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת/מִשְׁמַרְתָּם in priestly/tabernacle contexts denotes an assigned
    charge, duty, or responsibility. 'Duty' is natural modern English and fits the
    list that follows. The prefixed conjunction is rendered 'And.'
- source_word: הָאָרֹן
  chosen: the ark
  alternatives:
  - the ark of the testimony
  - the chest
  lexicon: HALOT
  rationale: אָרוֹן in tabernacle context conventionally refers to the sacred ark.
    Since the Hebrew here has only 'the ark,' the translation keeps it concise without
    importing 'of the testimony.'
- source_word: הַשֻּׁלְחָן
  chosen: the table
  alternatives:
  - the table of the bread of the Presence
  lexicon: HALOT
  rationale: The Hebrew simply says 'the table.' Because the referent is the tabernacle
    furnishing, 'the table' is sufficient and formally accurate.
- source_word: הַמְּנֹרָה
  chosen: the lampstand
  alternatives:
  - the menorah
  - the lamp
  lexicon: HALOT
  rationale: מְנוֹרָה denotes the cultic lampstand. 'Lampstand' translates the meaning
    rather than transliterating, in keeping with the philosophy of translating common
    nouns.
- source_word: הַמִּזְבְּחֹת
  chosen: the altars
  alternatives:
  - the altar furnishings
  lexicon: HALOT
  rationale: The plural form indicates more than one altar, referring to the tabernacle
    altars under Kohathite care. 'Altars' is the straightforward rendering.
- source_word: וּכְלֵי הַקֹּדֶשׁ
  chosen: the vessels of the sanctuary
  alternatives:
  - the holy vessels
  - the utensils of the holy place
  lexicon: HALOT
  rationale: כְּלִים are implements/vessels/utensils. הַקֹּדֶשׁ here refers to the
    holy sanctuary context rather than abstract holiness. 'Vessels of the sanctuary'
    is clear and suitably formal.
- source_word: אֲשֶׁר יְשָׁרְתוּ בָהֶם
  chosen: with which they minister
  alternatives:
  - with which they serve
  - by which they perform service
  lexicon: HALOT
  rationale: The relative clause modifies the holy vessels as the instruments used
    in sacred service. 'Minister' preserves the cultic sense of שׁרת better than the
    more generic 'serve.'
- source_word: הַמָּסָךְ
  chosen: the screen
  alternatives:
  - the curtain
  - the covering screen
  lexicon: HALOT
  rationale: מָסָךְ in tabernacle contexts commonly denotes a screen or hanging at
    an entrance. 'Screen' distinguishes it from פָּרֹכֶת ('veil/curtain') and avoids
    conflation.
- source_word: וְכָל עֲבֹדָתוֹ
  chosen: and all its service
  alternatives:
  - and all its work
  - and all the service connected with it
  lexicon: HALOT
  rationale: עֲבֹדָה can mean work or service; in cultic context 'service' is preferable.
    The 3ms suffix most naturally refers collectively to the tabernacle service associated
    with these items; English 'its' preserves the singular suffix without over-specifying
    the antecedent.
