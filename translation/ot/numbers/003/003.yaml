theological_decisions:
- issue: Rendering the ordination idiom מִלֵּא יָדָם
  chosen_reading: Preserve the literal idiom in the main text ('whose hands he filled')
    and clarify its priestly function with 'to serve as priests.'
  alternative_readings:
  - Render idiomatically as 'whom he ordained to serve as priests'
  rationale: The phrase is a technical ordination idiom in priestly contexts, but
    translating it only as 'ordained' would hide a significant lexical feature of
    the Hebrew. Optimal equivalence here keeps the idiom visible while making the
    function explicit in the infinitive clause.
  doctrine_reference: Translation philosophy §§1, 5
