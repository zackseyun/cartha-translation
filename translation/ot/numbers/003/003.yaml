id: NUM.3.3
reference: Numbers 3:3
source:
  edition: WLC
  text: אֵ֗לֶּה שְׁמוֹת֙ בְּנֵ֣י אַהֲרֹ֔ן הַ/כֹּהֲנִ֖ים הַ/מְּשֻׁחִ֑ים אֲשֶׁר מִלֵּ֥א
    יָדָ֖/ם לְ/כַהֵֽן־׃
translation:
  text: These are the names of Aaron’s sons, the anointed priests, whose hands he
    filled to serve as priests.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''whose hands he filled,'' an idiom meaning ''whom he ordained''
      or ''installed'' for priestly service.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  chosen: These are
  alternatives:
  - These
  lexicon: HALOT
  rationale: Standard demonstrative introducing the identification formula; English
    idiom naturally supplies the copula.
- source_word: שְׁמוֹת
  chosen: the names of
  alternatives:
  - names of
  lexicon: HALOT
  rationale: Construct form with following genitive phrase; rendered with the normal
    English possessive/genitive structure.
- source_word: בְּנֵי אַהֲרֹן
  chosen: Aaron’s sons
  alternatives:
  - the sons of Aaron
  lexicon: HALOT
  rationale: Construct chain rendered idiomatically in English. 'Sons' is retained
    rather than 'children' because the Hebrew is specifically male and refers to named
    priestly descendants.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  alternatives:
  - priests
  lexicon: HALOT
  rationale: Definite article preserved. Appositional to 'Aaron’s sons,' identifying
    their office.
- source_word: הַמְּשֻׁחִים
  chosen: the anointed
  alternatives:
  - who were anointed
  - consecrated
  lexicon: HALOT
  rationale: Passive participle from משׁח, literally 'anointed.' 'Anointed' preserves
    the ritual action more directly than the broader interpretive gloss 'consecrated.'
- source_word: אֲשֶׁר
  chosen: whose
  alternatives:
  - whom
  - who
  lexicon: HALOT
  rationale: Relative particle introducing the clause about ordination; 'whose' fits
    the following idiom involving 'hands' in natural English.
- source_word: מִלֵּא יָדָם
  chosen: whose hands he filled
  alternatives:
  - whom he ordained
  - whose hand was filled
  lexicon: HALOT
  rationale: Hebrew idiom for ordaining/installing into priestly service. The main
    text preserves the concrete idiom for auditability, while an ordination gloss
    is worth preserving in a footnote.
- source_word: לְכַהֵן
  chosen: to serve as priests
  alternatives:
  - to minister as priests
  - to act as priests
  - to be priests
  lexicon: HALOT
  rationale: Infinitive expressing purpose/result of ordination. 'Serve as priests'
    is clear modern English and preserves the vocational sense better than the flatter
    'to be priests.'
