id: NUM.3.34
reference: Numbers 3:34
source:
  edition: WLC
  text: וּ/פְקֻדֵי/הֶם֙ בְּ/מִסְפַּ֣ר כָּל זָכָ֔ר מִ/בֶּן חֹ֖דֶשׁ וָ/מָ֑עְלָ/ה שֵׁ֥שֶׁת
    אֲלָפִ֖ים וּ/מָאתָֽיִם־־׃
translation:
  text: And those counted from them, by the number of every male from a month old
    and upward, were six thousand two hundred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their numbered ones' / 'those registered among them.' The Hebrew refers
      to the census total for this clan.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְקֻדֵיהֶם
  chosen: those counted from them
  alternatives:
  - their numbered ones
  - their enrollment
  - those registered among them
  lexicon: HALOT
  rationale: From פקד in a passive/resultative nominal form with 3mp suffix, referring
    to the census total belonging to this clan/group. 'Those counted from them' preserves
    the counted-person sense better than the more abstract 'their number,' while remaining
    natural English.
- source_word: בְּמִסְפַּר
  chosen: by the number of
  alternatives:
  - in number
  - according to the number of
  lexicon: HALOT
  rationale: Introduces the basis of enumeration. 'By the number of' is idiomatic
    and reflects the counting formula used in this census context.
- source_word: כָּל זָכָר
  chosen: every male
  alternatives:
  - all the males
  - every male person
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine and individualizing. 'Every male'
    is gender-accurate and concise, matching the census formula.
- source_word: מִבֶּן חֹדֶשׁ וָמָעְלָה
  chosen: from a month old and upward
  alternatives:
  - from one month old and above
  - from the age of one month and up
  lexicon: HALOT
  rationale: Standard age-threshold expression in Numbers. 'A month old and upward'
    is natural English and preserves the lower bound plus upward extension.
- source_word: שֵׁשֶׁת אֲלָפִים וּמָאתָיִם
  chosen: six thousand two hundred
  alternatives:
  - 6,200
  lexicon: HALOT
  rationale: Cardinal number total. Spelled out in running text for literary consistency
    with Bible translation style.
