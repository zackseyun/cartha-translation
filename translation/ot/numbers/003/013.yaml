id: NUM.3.13
reference: Numbers 3:13
source:
  edition: WLC
  text: כִּ֣י לִ/י֮ כָּל בְּכוֹר֒ בְּ/יוֹם֩ הַכֹּתִ֨/י כָל בְּכ֜וֹר בְּ/אֶ֣רֶץ מִצְרַ֗יִם הִקְדַּ֨שְׁתִּי לִ֤/י כָל בְּכוֹר֙ בְּ/יִשְׂרָאֵ֔ל מֵ/אָדָ֖ם עַד בְּהֵמָ֑ה לִ֥/י יִהְי֖וּ אֲנִ֥י יְהוָֽה־־־־׃ס
translation:
  text: For every firstborn is mine. On the day when I struck down every firstborn in the land of Egypt, I consecrated to myself every firstborn in Israel, from man to beast. They shall be mine. I am Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'belongs to me' for the repeated phrase 'is mine / to myself / shall be mine.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from man to beast,' a stock expression meaning from humans to animals.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the rationale for the preceding statement about the Levites. 'For' best preserves the explanatory force in natural English.
- source_word: לִי
  chosen: is mine / to myself / shall be mine
  alternatives:
  - belongs to me
  lexicon: HALOT
  rationale: 'The repeated לִי emphasizes divine possession. Rendering it with possessive English in three places preserves the repetition while keeping idiomatic flow: ''is mine,'' ''to myself,'' and ''shall be mine.'''
- source_word: כָּל בְּכוֹר
  chosen: every firstborn
  alternatives:
  - all the firstborn
  - every firstborn male
  lexicon: HALOT
  rationale: בְּכוֹר denotes the firstborn offspring. 'Every firstborn' is natural and comprehensive. 'Male' is not explicit here and should not be added.
- source_word: בְּיוֹם
  chosen: On the day when
  alternatives:
  - In the day that
  - When
  lexicon: HALOT
  rationale: This temporal phrase introduces the historical occasion of consecration. 'On the day when' preserves the formal temporal linkage better than the simpler 'when.'
- source_word: הַכֹּתִי
  chosen: I struck down
  alternatives:
  - I struck
  - I smote
  lexicon: HALOT
  rationale: From נכה in the context of the Egyptian firstborn plague, 'struck down' conveys lethal judgment clearly and idiomatically.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: The fuller phrase is retained because it is explicit in the Hebrew and carries narrative solemnity.
- source_word: הִקְדַּשְׁתִּי
  chosen: I consecrated
  alternatives:
  - I sanctified
  - I set apart as holy
  lexicon: HALOT
  rationale: קדשׁ in the hiphil here means to set apart as holy for God. 'Consecrated' preserves both the cultic and possessive dimensions without sounding overly technical.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among the Israelites
  lexicon: HALOT
  rationale: The phrase identifies the sphere within which the firstborn are consecrated. 'In Israel' is concise and faithful.
- source_word: מֵאָדָם עַד בְּהֵמָה
  chosen: from man to beast
  alternatives:
  - from humankind to livestock
  - from people to animals
  lexicon: HALOT
  rationale: This merism spans human and animal firstborn. Per doctrine, אָדָם is rendered gender-accurately; here the singular collective is well represented by 'man.' 'Beast' matches the broad category בְּהֵמָה in a solemn register.
- source_word: יִהְיוּ
  chosen: They shall be
  alternatives:
  - they will be
  lexicon: HALOT
  rationale: Future/copular force expressing enduring divine claim. 'Shall' fits the declarative, covenantal tone.
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I am Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The closing formula asserts divine authority and covenant identity.
