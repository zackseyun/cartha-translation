id: NUM.3.4
reference: Numbers 3:4
source:
  edition: WLC
  text: וַ/יָּ֣מָת נָדָ֣ב וַ/אֲבִיה֣וּא לִ/פְנֵ֣י יְהוָ֡ה בְּֽ/הַקְרִבָ/ם֩ אֵ֨שׁ זָרָ֜ה
    לִ/פְנֵ֤י יְהוָה֙ בְּ/מִדְבַּ֣ר סִינַ֔י וּ/בָנִ֖ים לֹא הָי֣וּ לָ/הֶ֑ם וַ/יְכַהֵ֤ן
    אֶלְעָזָר֙ וְ/אִ֣יתָמָ֔ר עַל פְּנֵ֖י אַהֲרֹ֥ן אֲבִי/הֶֽם־־׃פ
translation:
  text: But Nadab and Abihu died before the LORD when they offered unauthorized fire
    before the LORD in the wilderness of Sinai, and they had no sons; and Eleazar
    and Ithamar served as priests in the presence of Aaron their father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strange fire' or 'foreign fire.' The Hebrew likely refers to fire that
      was not authorized for the offering.
    reason: lexical_alternative
  - marker: b
    text: Or 'before Aaron their father'; the Hebrew may also carry the sense that
      Eleazar and Ithamar served during Aaron's lifetime.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - died out
  - was dead
  lexicon: HALOT
  rationale: 'The wayyiqtol of מות straightforwardly narrates the event: ''died.''
    English plural agreement is supplied because the compound subject is Nadab and
    Abihu.'
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: This idiom commonly means being before or in the presence of YHWH. 'Before
    the LORD' is retained here for the first occurrence because it is concise and
    idiomatic in judgment contexts.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name is rendered 'the LORD' rather than transliterated.
- source_word: בְּהַקְרִבָם
  chosen: when they offered
  alternatives:
  - when they brought near
  - in their offering
  lexicon: HALOT
  rationale: 'The infinitive construct of קרב with prefixed ב marks the circumstance/time:
    ''when they offered/brought near.'' ''Offered'' is the natural sacrificial English
    equivalent.'
- source_word: אֵשׁ זָרָה
  chosen: unauthorized fire
  alternatives:
  - strange fire
  - foreign fire
  lexicon: HALOT
  rationale: זָרָה here denotes something improper or not permitted in cultic context.
    'Unauthorized fire' communicates the sense more clearly in modern English than
    the traditional but potentially opaque 'strange fire.'
- source_word: בְּמִדְבַּר סִינַי
  chosen: in the wilderness of Sinai
  alternatives:
  - in the Sinai wilderness
  - in the desert of Sinai
  lexicon: HALOT
  rationale: A direct and natural rendering of the construct phrase, preserving the
    geographic designation.
- source_word: וּבָנִים לֹא הָיוּ לָהֶם
  chosen: and they had no sons
  alternatives:
  - and they had no children
  lexicon: HALOT
  rationale: בָנִים specifically means 'sons,' not merely 'children.' The masculine
    term matters in this priestly succession context.
- source_word: וַיְכַהֵן
  chosen: served as priests
  alternatives:
  - ministered as priests
  - exercised the priesthood
  lexicon: HALOT
  rationale: The verb כהן means to function in priestly service. Because the subject
    is compound (Eleazar and Ithamar), English uses the plural 'served as priests.'
- source_word: עַל פְּנֵי אַהֲרֹן אֲבִיהֶם
  chosen: in the presence of Aaron their father
  alternatives:
  - before Aaron their father
  - during the lifetime of Aaron their father
  - under the oversight of Aaron their father
  lexicon: HALOT
  rationale: The idiom עַל־פְּנֵי can mean spatially 'before/in front of' and by extension
    'in the presence of,' sometimes implying contemporaneity. 'In the presence of'
    preserves the Hebrew image without over-interpreting it as either mere chronology
    or hierarchy alone.
