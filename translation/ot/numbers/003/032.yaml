id: NUM.3.32
reference: Numbers 3:32
source:
  edition: WLC
  text: וּ/נְשִׂיא֙ נְשִׂיאֵ֣י הַ/לֵּוִ֔י אֶלְעָזָ֖ר בֶּן אַהֲרֹ֣ן הַ/כֹּהֵ֑ן פְּקֻדַּ֕ת
    שֹׁמְרֵ֖י מִשְׁמֶ֥רֶת הַ/קֹּֽדֶשׁ־׃
translation:
  text: And the chief over the chiefs of the Levites was Eleazar son of Aaron the
    priest, having oversight of those who kept charge of the sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy things.' The Hebrew הַקֹּדֶשׁ can denote either the sanctuary
      itself or the sacred objects associated with it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/נְשִׂיא
  chosen: And the chief
  alternatives:
  - And the leader
  - And the prince
  lexicon: HALOT
  rationale: נָשִׂיא commonly denotes a leader, chief, or prince. In this administrative
    context, 'chief' best conveys rank without implying royalty. The prefixed conjunction
    is rendered 'And' to continue the census/organization narrative.
- source_word: נְשִׂיאֵי הַלֵּוִי
  chosen: over the chiefs of the Levites
  alternatives:
  - of the leaders of the Levites
  - of the princes of Levi
  lexicon: HALOT
  rationale: The construct chain literally reads 'chief of the chiefs of the Levite/Levites.'
    English idiom is clarified with 'over the chiefs of the Levites,' expressing superintendence
    over subordinate clan heads.
- source_word: אֶלְעָזָר בֶּן אַהֲרֹן הַכֹּהֵן
  chosen: Eleazar son of Aaron the priest
  alternatives:
  - Eleazar, the son of Aaron the priest
  rationale: Personal names are transliterated per project philosophy. 'Son of' preserves
    the Hebrew filial expression. 'The priest' naturally modifies Aaron in apposition.
- source_word: פְּקֻדַּת
  chosen: having oversight of
  alternatives:
  - in charge of
  - the oversight of
  - the appointment of
  lexicon: HALOT
  rationale: פְּקֻדָּה can denote oversight, charge, office, or responsibility. Here
    it describes Eleazar's supervisory role. Rendering it verbally in English yields
    a natural sentence while preserving the administrative sense.
- source_word: שֹׁמְרֵי מִשְׁמֶרֶת
  chosen: those who kept charge
  alternatives:
  - the keepers of the duty
  - those who kept the guard
  - those who performed the service of guarding
  lexicon: HALOT
  rationale: The participle plus cognate noun intensifies the idea of guarding/keeping
    responsibility. 'Those who kept charge' preserves the idiom of entrusted duty
    better than a flat 'guards' and fits priestly/tabernacle service language.
- source_word: הַקֹּדֶשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the holy things
  - the sacred area
  lexicon: HALOT
  rationale: In tabernacle context, הַקֹּדֶשׁ can refer to the holy sanctuary or sacred
    things. 'The sanctuary' best captures the cultic sphere under Levitical care in
    this verse, while remaining readable modern English.
