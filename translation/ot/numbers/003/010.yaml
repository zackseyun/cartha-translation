theological_decisions:
- issue: Meaning of restricted access to priestly service
  chosen_reading: The verse establishes that only Aaron and his sons are authorized
    to exercise and guard the priesthood, and any unauthorized person approaching
    incurs the death penalty.
  alternative_readings:
  - The verse could be read more generally as excluding any non-priest from sacred
    approach, without specifying exact ritual boundaries in this line alone.
  rationale: The Hebrew emphasizes authorized priestly custody and the lethal consequence
    for unauthorized approach. The translation preserves the warning without importing
    later denominational or ritual detail beyond the text itself.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
