id: NUM.3.10
reference: Numbers 3:10
source:
  edition: WLC
  text: וְ/אֶת אַהֲרֹ֤ן וְ/אֶת בָּנָי/ו֙ תִּפְקֹ֔ד וְ/שָׁמְר֖וּ אֶת כְּהֻנָּתָ֑/ם
    וְ/הַ/זָּ֥ר הַ/קָּרֵ֖ב יוּמָֽת־־־׃פ
translation:
  text: And you shall appoint Aaron and his sons, and they shall keep their priesthood;
    but the outsider who comes near shall be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the unauthorized person'; Hebrew 'the outsider' refers here to anyone
      not authorized for priestly access, not specifically to a foreigner by ethnicity.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפְקֹד
  chosen: you shall appoint
  alternatives:
  - you shall muster
  - you shall assign
  - you shall commission
  lexicon: HALOT
  rationale: The verb פקד has a broad range including attend to, appoint, number,
    or assign. In this context, with Aaron and his sons as direct objects and followed
    by their guarding the priesthood, the sense is commissioning/appointing them to
    office rather than counting them.
- source_word: וְשָׁמְרוּ
  chosen: they shall keep
  alternatives:
  - they shall guard
  - they shall observe
  lexicon: HALOT
  rationale: שׁמר commonly means keep, guard, or watch over. Here it refers to maintaining
    and protecting the duties and boundaries of the priestly office. 'Keep' is concise
    and idiomatic, while still allowing the sense of guarding their charge.
- source_word: כְּהֻנָּתָם
  chosen: their priesthood
  alternatives:
  - their priestly office
  - their priestly service
  lexicon: HALOT
  rationale: The noun denotes the priestly office/function, not merely an abstract
    status. 'Their priesthood' is the standard compact rendering and fits the context
    of assigned cultic responsibility.
- source_word: הַזָּר
  chosen: the outsider
  alternatives:
  - the unauthorized person
  - the stranger
  - the non-priest
  lexicon: HALOT
  rationale: זָר here means one who is not authorized for priestly access, not primarily
    a foreign ethnic stranger. 'Outsider' communicates exclusion from the priestly
    sphere without over-specifying ethnicity. Because 'unauthorized person' is also
    contextually strong, it is preserved in a footnote.
- source_word: הַקָּרֵב
  chosen: who comes near
  alternatives:
  - who approaches
  - who draws near
  lexicon: HALOT
  rationale: קרב in this participial form refers to approaching the sacred area or
    function. 'Who comes near' is natural English and preserves the concrete movement
    toward restricted holy space.
- source_word: יוּמָת
  chosen: shall be put to death
  alternatives:
  - shall die
  - must be executed
  lexicon: HALOT
  rationale: 'The Hophal of מות is causative/passive: the person is caused to die,
    not merely predicted to die. ''Shall be put to death'' best reflects the legal-penal
    force of the form.'
