id: NUM.3.8
reference: Numbers 3:8
source:
  edition: WLC
  text: וְ/שָׁמְר֗וּ אֶֽת כָּל כְּלֵי֙ אֹ֣הֶל מוֹעֵ֔ד וְ/אֶת מִשְׁמֶ֖רֶת בְּנֵ֣י יִשְׂרָאֵ֑ל
    לַ/עֲבֹ֖ד אֶת עֲבֹדַ֥ת הַ/מִּשְׁכָּֽן־־־־׃
translation:
  text: They shall keep charge of all the furnishings of the tent of meeting, and
    the obligation of the sons of Israel, to perform the service of the tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the charge' or 'the duty' of the sons of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמְרוּ
  chosen: They shall keep charge of
  alternatives:
  - they shall keep
  - they shall guard
  - they shall attend to
  lexicon: HALOT
  rationale: שׁמר in priestly/tabernacle contexts often carries the sense of guarding
    or keeping charge of assigned duties, not merely watching. 'Keep charge of' preserves
    the custodial-duty nuance and fits the cultic setting.
- source_word: כָּל כְּלֵי אֹהֶל מוֹעֵד
  chosen: all the furnishings of the tent of meeting
  alternatives:
  - all the vessels of the tent of meeting
  - all the equipment of the tent of meeting
  lexicon: HALOT
  rationale: כְּלִים can denote articles, utensils, vessels, or equipment. 'Furnishings'
    is natural modern English for the tabernacle's cultic objects without narrowing
    too much to containers alone.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: This is the standard and accurate rendering of the sanctuary designation,
    preserving both the tent imagery and the appointed-meeting sense.
- source_word: מִשְׁמֶרֶת
  chosen: the obligation
  alternatives:
  - the charge
  - the duty
  - the responsibility
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת in this context refers to what is entrusted or assigned for
    observance. Because שׁמר already appears earlier, rendering this noun as 'obligation'
    avoids awkward repetition while preserving the sense of assigned duty.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'sons of Israel.' Following the project's gender-accurate
    principle, the masculine form is retained rather than flattened to 'Israelites,'
    while still functioning corporately.
- source_word: לַעֲבֹד
  chosen: to perform
  alternatives:
  - to serve
  - to do
  lexicon: HALOT
  rationale: The infinitive of עבד here introduces the purpose of carrying out cultic
    labor. 'Perform' works idiomatically with 'service' in English and avoids the
    ambiguity of 'serve' when followed by a direct object of labor.
- source_word: עֲבֹדַת הַמִּשְׁכָּן
  chosen: the service of the tabernacle
  alternatives:
  - the work of the tabernacle
  - the service of the dwelling place
  lexicon: HALOT
  rationale: עֲבֹדָה in priestly contexts commonly denotes service or labor. מִשְׁכָּן
    is conventionally and accurately 'tabernacle' in this wilderness-sanctuary context.
    The phrase refers to the sanctuary's assigned service.
