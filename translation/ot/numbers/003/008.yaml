theological_decisions:
- issue: Gendered corporate expression in בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the children of Israel
  rationale: The source text uses a grammatically masculine corporate expression.
    Per the translation philosophy, gender-accurate rendering is preferred over gender-neutral
    flattening unless context clearly demands otherwise. Here the phrase is a standard
    national designation, but retaining 'sons of Israel' best reflects the Hebrew
    form.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
