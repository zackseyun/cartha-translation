id: NUM.3.41
reference: Numbers 3:41
source:
  edition: WLC
  text: וְ/לָקַחְתָּ֨ אֶת הַ/לְוִיִּ֥ם לִ/י֙ אֲנִ֣י יְהוָ֔ה תַּ֥חַת כָּל בְּכֹ֖ר בִּ/בְנֵ֣י
    יִשְׂרָאֵ֑ל וְ/אֵת֙ בֶּהֱמַ֣ת הַ/לְוִיִּ֔ם תַּ֣חַת כָּל בְּכ֔וֹר בְּ/בֶהֱמַ֖ת
    בְּנֵ֥י יִשְׂרָאֵֽל־־־׃
translation:
  text: And you shall take the Levites for me—I am the LORD—in place of every firstborn
    among the sons of Israel, and the livestock of the Levites in place of every firstborn
    among the livestock of the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the Israelites.' The Hebrew reads 'among the sons of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  chosen: And you shall take
  alternatives:
  - And you must take
  - And take
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in instructional context functions
    as a directive to Moses. 'You shall take' preserves the formal force and legal-register
    tone without over-paraphrasing.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard transliteration for the tribal group descended from Levi; definite
    article preserved by 'the.'
- source_word: לִי
  chosen: for me
  alternatives:
  - to me
  lexicon: HALOT
  rationale: The preposition marks possession/dedication. 'For me' fits the consecratory
    sense in context better than the more wooden 'to me.'
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I, the LORD
  lexicon: HALOT
  rationale: This self-identification formula is idiomatic in English as 'I am the
    LORD.' It preserves the emphatic divine claim and covenantal formula.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: תַּחַת
  chosen: in place of
  alternatives:
  - instead of
  - under
  lexicon: HALOT
  rationale: In this substitutionary census/redemption context, תַּחַת denotes replacement.
    'In place of' is clear, natural, and slightly more formal than 'instead of.'
- source_word: כָּל בְּכֹר
  chosen: every firstborn
  alternatives:
  - each firstborn
  - all the firstborn
  lexicon: HALOT
  rationale: The distributive sense of כָּל with singular noun is well represented
    by 'every firstborn.'
- source_word: בִּבְנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - among the Israelites
  - among the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'among the sons of Israel.' Following the gender-accurate
    policy, 'sons of Israel' is retained rather than flattening to 'Israelites,' while
    still sounding natural in context.
- source_word: בֶּהֱמַת הַלְוִיִּם
  chosen: the livestock of the Levites
  alternatives:
  - the cattle of the Levites
  - the animals of the Levites
  lexicon: HALOT
  rationale: בְּהֵמָה here refers broadly to domesticated animals owned by the Levites.
    'Livestock' is the most natural modern collective term.
- source_word: כָּל בְּכוֹר בְּבֶהֱמַת בְּנֵי יִשְׂרָאֵל
  chosen: every firstborn among the livestock of the sons of Israel
  alternatives:
  - every firstborn of the livestock of the sons of Israel
  lexicon: HALOT
  rationale: This phrase mirrors the first clause and refers to firstborn animals
    belonging to Israel. 'Among the livestock of' communicates the relationship clearly
    in modern English while preserving the structure.
