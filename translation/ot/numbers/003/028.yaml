id: NUM.3.28
reference: Numbers 3:28
source:
  edition: WLC
  text: בְּ/מִסְפַּר֙ כָּל זָכָ֔ר מִ/בֶּן חֹ֖דֶשׁ וָ/מָ֑עְלָ/ה שְׁמֹנַ֤ת אֲלָפִים֙
    וְ/שֵׁ֣שׁ מֵא֔וֹת שֹׁמְרֵ֖י מִשְׁמֶ֥רֶת הַ/קֹּֽדֶשׁ־־׃
translation:
  text: By the number of every male from a month old and upward, there were eight
    thousand six hundred, keeping charge of the sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'keeping the charge of the holy place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּמִסְפַּר
  chosen: By the number of
  alternatives:
  - According to the number of
  - In number
  lexicon: HALOT
  rationale: The preposition ב plus מִסְפָּר introduces enumeration. 'By the number
    of' preserves the census-style formula while remaining natural English.
- source_word: כָּל זָכָר
  chosen: every male
  alternatives:
  - all the males
  - every male person
  lexicon: HALOT
  rationale: The phrase is distributive within a census formula. 'Every male' is concise
    and preserves the masculine-specific reference required by the source.
- source_word: מִבֶּן חֹדֶשׁ וָמָעְלָה
  chosen: from a month old and upward
  alternatives:
  - from one month old and above
  - a month old or more
  lexicon: HALOT
  rationale: This is a standard age-threshold expression in Numbers. 'From a month
    old and upward' is idiomatic and close to the Hebrew wording.
- source_word: שְׁמֹנַת אֲלָפִים וְשֵׁשׁ מֵאוֹת
  chosen: eight thousand six hundred
  alternatives:
  - 8,600
  lexicon: HALOT
  rationale: The cardinal number is rendered in words for literary consistency with
    formal biblical style.
- source_word: שֹׁמְרֵי
  chosen: keeping
  alternatives:
  - guarding
  - those keeping
  - keepers of
  lexicon: HALOT
  rationale: The participle describes ongoing duty. 'Keeping' works smoothly with
    the following cognate noun to express assigned responsibility.
- source_word: מִשְׁמֶרֶת
  chosen: charge
  alternatives:
  - duty
  - guard
  - obligation
  lexicon: HALOT
  rationale: In priestly/Levitical contexts, מִשְׁמֶרֶת commonly denotes an entrusted
    responsibility or charge. 'Charge' is a standard and contextually precise rendering.
- source_word: הַקֹּדֶשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the holy things
  - the holiness
  lexicon: HALOT
  rationale: Here the term refers to the sacred sphere under Levitical care, not abstract
    holiness. 'The sanctuary' best conveys the cultic referent in natural English.
