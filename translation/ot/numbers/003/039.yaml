id: NUM.3.39
reference: Numbers 3:39
source:
  edition: WLC
  text: כָּל פְּקוּדֵ֨י הַ/לְוִיִּ֜ם אֲשֶׁר֩ פָּקַ֨ד מֹשֶׁ֧ה וְׄ/אַׄהֲׄרֹ֛ׄןׄ עַל פִּ֥י יְהוָ֖ה לְ/מִשְׁפְּחֹתָ֑/ם כָּל זָכָר֙ מִ/בֶּן חֹ֣דֶשׁ וָ/מַ֔עְלָ/ה שְׁנַ֥יִם וְ/עֶשְׂרִ֖ים אָֽלֶף־־־־׃ס
translation:
  text: All those counted of the Levites, whom Moses and Aaron counted at the command of Yahweh, by their clans, every male from a month old and upward, were twenty-two thousand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''according to the mouth of the LORD,'' an idiom meaning ''at the command of the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקוּדֵי / פָּקַד
  chosen: those counted / counted
  alternatives:
  - numbered
  - enrolled
  - mustered
  lexicon: HALOT
  rationale: The noun-participle and verb from פקד here refer to the census total. 'Counted' is clear modern English and preserves the census sense without adding military nuance that 'mustered' might suggest.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard rendering of the tribal name; a transliterated people-group name rather than a translated epithet is appropriate.
- source_word: עַל־פִּי יְהוָה
  chosen: at the command of the LORD
  alternatives:
  - according to the mouth of the LORD
  - by the word of the LORD
  lexicon: HALOT
  rationale: The idiom literally means 'according to the mouth of YHWH' and denotes divine command or authorization. 'At the command of the LORD' is idiomatic English that preserves the force of the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: לְמִשְׁפְּחֹתָם
  chosen: by their clans
  alternatives:
  - according to their families
  - by their families
  lexicon: HALOT
  rationale: '''Clans'' better reflects the social-kinship unit in census contexts than modern English ''families,'' which can sound too narrow.'
- source_word: כָּל זָכָר
  chosen: every male
  alternatives:
  - all the males
  - every man-child
  lexicon: HALOT
  rationale: The Hebrew is explicitly male, so a gender-accurate rendering is required. 'Every male' fits the census formula naturally.
- source_word: מִבֶּן־חֹדֶשׁ וָמַעְלָה
  chosen: from a month old and upward
  alternatives:
  - from one month old and above
  - a month old or more
  lexicon: HALOT
  rationale: This is the standard age-threshold formula. 'From a month old and upward' is natural while staying close to the Hebrew structure.
- source_word: שְׁנַיִם וְעֶשְׂרִים אָלֶף
  chosen: twenty-two thousand
  lexicon: HALOT
  rationale: Straightforward cardinal number rendering.
