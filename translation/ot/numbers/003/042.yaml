id: NUM.3.42
reference: Numbers 3:42
source:
  edition: WLC
  text: וַ/יִּפְקֹ֣ד מֹשֶׁ֔ה כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֹת֑/וֹ אֶֽת כָּל בְּכֹ֖ר
    בִּ/בְנֵ֥י יִשְׂרָאֵֽל־־׃
translation:
  text: So Moses counted every firstborn among the sons of Israel, just as the LORD
    had commanded him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of Israel''; alternatively, ''the Israelites'' or ''the
      children of Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְקֹד
  chosen: counted
  alternatives:
  - numbered
  - took a census of
  - registered
  lexicon: HALOT
  rationale: The verb פקד in this census context refers to numbering or counting persons.
    'Counted' is clear modern English and fits the immediate context without unnecessary
    formality.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: This comparative conjunction introduces conformity to the divine command.
    'Just as' naturally conveys exact correspondence in English.
- source_word: צִוָּה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: English past perfect reads smoothly after the narrative preterite and
    clarifies that the command preceded Moses's action.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the stated translation policy.
- source_word: אֹתוֹ
  chosen: him
  lexicon: HALOT
  rationale: The pronominal object refers to Moses as the recipient of the command.
- source_word: אֶת כָּל בְּכֹר
  chosen: every firstborn
  alternatives:
  - all the firstborn
  - every firstborn male
  lexicon: HALOT
  rationale: The phrase denotes the totality of the firstborn being counted. 'Every
    firstborn' is idiomatic and preserves distributive force. 'Male' is not explicit
    in this verse, even if implied by the broader context.
- source_word: בִּבְנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - among the Israelites
  - of the children of Israel
  lexicon: HALOT
  rationale: The Hebrew is literally 'among the sons of Israel.' Following the project's
    gender-accurate principle, 'sons of Israel' preserves the source expression. 'Among'
    reflects the prefixed ב in this counting context.
