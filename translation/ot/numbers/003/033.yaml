id: NUM.3.33
reference: Numbers 3:33
source:
  edition: WLC
  text: לִ/מְרָרִ֕י מִשְׁפַּ֨חַת֙ הַ/מַּחְלִ֔י וּ/מִשְׁפַּ֖חַת הַ/מּוּשִׁ֑י אֵ֥לֶּה
    הֵ֖ם מִשְׁפְּחֹ֥ת מְרָרִֽי׃
translation:
  text: 'For Merari: the clan of the Mahlites and the clan of the Mushites; these
    are the clans of Merari.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לִמְרָרִי
  chosen: For Merari
  alternatives:
  - To Merari
  - Of Merari
  lexicon: HALOT
  rationale: The prefixed ל introduces the heading for the descendant group being
    enumerated. In this census/list context, 'For Merari' is natural English and preserves
    the classificatory sense better than a more wooden 'To Merari.' 'Merari' is transliterated
    as a personal name per translation philosophy.
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  - the tribe of
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in genealogical/census contexts commonly denotes a clan-level
    kinship unit. 'Clan' is more precise than 'family' in English and avoids the broader,
    inaccurate 'tribe.' The construct form requires 'of'.
- source_word: הַמַּחְלִי
  chosen: the Mahlites
  alternatives:
  - the family of Mahli
  - the Mahlite clan
  lexicon: HALOT
  rationale: 'The gentilic/plural clan designation is best rendered ''the Mahlites,''
    the descendants/group associated with Mahli. This works smoothly with the preceding
    construct phrase: ''the clan of the Mahlites.'''
- source_word: וּמִשְׁפַּחַת
  chosen: and the clan of
  alternatives:
  - and the family of
  lexicon: HALOT
  rationale: The conjunction simply coordinates the second clan designation with the
    first. Repeating 'the clan of' mirrors the Hebrew structure and keeps the list
    formal and clear.
- source_word: הַמּוּשִׁי
  chosen: the Mushites
  alternatives:
  - the family of Mushi
  - the Mushite clan
  lexicon: HALOT
  rationale: As with 'Mahlites,' this is a clan/gentilic designation from Mushi. 'Mushites'
    is the standard and concise English rendering.
- source_word: אֵלֶּה הֵם
  chosen: these are
  alternatives:
  - these, they are
  - these are they
  lexicon: HALOT
  rationale: The demonstrative plus pronoun gives emphatic identification. Idiomatic
    English expresses this simply as 'these are' without loss of meaning.
- source_word: מִשְׁפְּחֹת מְרָרִי
  chosen: the clans of Merari
  alternatives:
  - Merari's clans
  - the families of Merari
  lexicon: HALOT
  rationale: The plural summarizes the two subgroups just listed. 'The clans of Merari'
    preserves the genealogical structure and matches the earlier rendering of מִשְׁפָּחָה
    as 'clan' for consistency.
