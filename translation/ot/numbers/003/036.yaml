id: NUM.3.36
reference: Numbers 3:36
source:
  edition: WLC
  text: וּ/פְקֻדַּ֣ת מִשְׁמֶרֶת֮ בְּנֵ֣י מְרָרִי֒ קַרְשֵׁי֙ הַ/מִּשְׁכָּ֔ן וּ/בְרִיחָ֖י/ו
    וְ/עַמֻּדָ֣י/ו וַ/אֲדָנָ֑י/ו וְ/כָל כֵּלָ֔י/ו וְ/כֹ֖ל עֲבֹדָתֽ/וֹ־׃
translation:
  text: And the appointed duty of the sons of Merari was the frames of the tabernacle,
    its bars, its pillars, its bases, all its furnishings, and all its service.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the boards of the tabernacle' for 'the frames of the tabernacle.'
    reason: lexical_alternative
  - marker: b
    text: Or 'its sockets' for 'its bases.'
    reason: lexical_alternative
  - marker: c
    text: Or 'all the work connected with it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְקֻדַּת
  chosen: appointed duty
  alternatives:
  - oversight
  - charge
  - assignment
  lexicon: HALOT
  rationale: The noun from פקד here denotes what is assigned or entrusted. In construct
    with מִשְׁמֶרֶת, it refers to the specific responsibility allotted to Merari.
    'Appointed duty' captures both the official assignment and practical responsibility
    better than the more abstract 'oversight' in this inventory context.
- source_word: מִשְׁמֶרֶת
  chosen: duty
  alternatives:
  - charge
  - responsibility
  - service
  lexicon: HALOT
  rationale: 'In priestly/tabernacle contexts this word often denotes an entrusted
    charge or duty. Combined with פְקֻדַּת, an English compression is natural: ''appointed
    duty.'' This avoids an awkwardly literal ''oversight of the charge'' while preserving
    the sense of entrusted responsibility.'
- source_word: בְּנֵי מְרָרִי
  chosen: the sons of Merari
  alternatives:
  - the Merarites
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'sons of Merari.' This is more formally transparent
    than the gentilic-style 'Merarites,' while remaining natural English.
- source_word: קַרְשֵׁי הַמִּשְׁכָּן
  chosen: the frames of the tabernacle
  alternatives:
  - the boards of the tabernacle
  - the planks of the tabernacle
  lexicon: HALOT
  rationale: קֶרֶשׁ in tabernacle construction refers to the structural upright pieces.
    'Frames' communicates their architectural function in modern English better than
    'boards,' which can sound too flat, while still fitting the likely sense.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: '''Tabernacle'' is the established and accurate rendering in this cultic
    context. Although the root idea is ''dwelling,'' the technical referent here is
    the sanctuary structure.'
- source_word: בְרִיחָיו
  chosen: its bars
  alternatives:
  - its crossbars
  - its poles
  lexicon: HALOT
  rationale: These are the bars used with the tabernacle frames. 'Bars' is the most
    straightforward rendering; 'crossbars' is possible but slightly more interpretive.
- source_word: עַמֻּדָיו
  chosen: its pillars
  alternatives:
  - its posts
  - its columns
  lexicon: HALOT
  rationale: The term denotes upright supports. 'Pillars' is idiomatic and suitably
    dignified in sanctuary-construction language.
- source_word: אֲדָנָיו
  chosen: its bases
  alternatives:
  - its sockets
  - its pedestals
  lexicon: HALOT
  rationale: In tabernacle descriptions this term refers to the foundation pieces
    or sockets into which structural elements fit. 'Bases' is broad and readable;
    'sockets' is more technical and plausible, but 'bases' better suits modern readability
    here.
- source_word: כָל כֵּלָיו
  chosen: all its furnishings
  alternatives:
  - all its utensils
  - all its equipment
  - all its vessels
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for articles, implements, or equipment. In relation
    to the tabernacle structure, 'furnishings' communicates the collective set of
    associated items without implying only small utensils.
- source_word: כֹל עֲבֹדָתוֹ
  chosen: all its service
  alternatives:
  - all its work
  - all the work connected with it
  lexicon: HALOT
  rationale: The phrase likely summarizes all labor or service pertaining to these
    items. 'All its service' stays close to the Hebrew and preserves the cultic nuance
    of עֲבֹדָה, though it includes practical work as well.
