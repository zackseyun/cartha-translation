id: NUM.3.12
reference: Numbers 3:12
source:
  edition: WLC
  text: וַ/אֲנִ֞י הִנֵּ֧ה לָקַ֣חְתִּי אֶת הַ/לְוִיִּ֗ם מִ/תּוֹךְ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל
    תַּ֧חַת כָּל בְּכ֛וֹר פֶּ֥טֶר רֶ֖חֶם מִ/בְּנֵ֣י יִשְׂרָאֵ֑ל וְ/הָ֥יוּ לִ֖/י הַ/לְוִיִּֽם־־׃
translation:
  text: And I—behold, I have taken the Levites from among the sons of Israel in place
    of every firstborn that opens the womb among the sons of Israel, and the Levites
    shall be mine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Israelites” for “the sons of Israel.” The Hebrew expression is literally
      masculine and formulaic.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: And I
  alternatives:
  - Now I
  - As for me
  lexicon: HALOT
  rationale: Retains the conjunction plus explicit first-person pronoun, preserving
    the emphatic shift in speaker without overloading the English.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  - indeed
  lexicon: HALOT
  rationale: Preserves the deictic/emphatic force of the Hebrew particle. Though somewhat
    elevated, it remains readable here and reflects the solemn divine declaration.
- source_word: לָקַחְתִּי
  chosen: I have taken
  alternatives:
  - I took
  - I am taking
  lexicon: HALOT
  rationale: The perfect is rendered with present relevance in English ('have taken'),
    fitting the declaration of an established divine action with ongoing consequence.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard transliteration of the tribal name; repeated consistently in
    the verse.
- source_word: מִתּוֹךְ
  chosen: from among
  alternatives:
  - from the midst of
  - out of
  lexicon: HALOT
  rationale: Best idiomatic equivalent for selection from within a larger group.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Follows the gender-accurate policy and preserves the formal covenantal
    expression of the Hebrew. 'Israelites' is possible but less transparent to the
    source phrasing.
- source_word: תַּחַת
  chosen: in place of
  alternatives:
  - instead of
  - under
  lexicon: HALOT
  rationale: Conveys substitution clearly in this cultic/legal context.
- source_word: כָּל בְּכוֹר
  chosen: every firstborn
  alternatives:
  - each firstborn
  lexicon: HALOT
  rationale: Natural English rendering of the distributive sense.
- source_word: פֶּטֶר רֶחֶם
  chosen: that opens the womb
  alternatives:
  - the opener of the womb
  - the first issue of the womb
  lexicon: HALOT
  rationale: Idiomatic English for the Hebrew expression denoting the one first opening
    the womb; preserves the legal/cultic category.
- source_word: וְהָיוּ לִי
  chosen: shall be mine
  alternatives:
  - will belong to me
  - shall belong to me
  lexicon: HALOT
  rationale: Expresses possession/consecrated belonging succinctly and naturally,
    while preserving the future/resultative force.
