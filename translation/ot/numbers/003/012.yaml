theological_decisions:
- issue: Rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew is grammatically masculine and formulaic. Per the translation
    philosophy, gender-accurate rendering is preferred over flattening to a neutral
    collective, while a more idiomatic alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Nature of the Levites' relation to God in וְהָיוּ לִי
  chosen_reading: the Levites shall be mine
  alternative_readings:
  - the Levites shall belong to me
  rationale: The text states divine claim/ownership in a consecrational context without
    importing later theological categories. 'Shall be mine' is direct and faithful
    to the Hebrew.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
