id: NUM.3.20
reference: Numbers 3:20
source:
  edition: WLC
  text: וּ/בְנֵ֧י מְרָרִ֛י לְ/מִשְׁפְּחֹתָ֖/ם מַחְלִ֣י וּ/מוּשִׁ֑י אֵ֥לֶּה הֵ֛ם מִשְׁפְּחֹ֥ת
    הַ/לֵּוִ֖י לְ/בֵ֥ית אֲבֹתָֽ/ם׃
translation:
  text: 'The sons of Merari, by their clans: Mahli and Mushi. These are the clans
    of the Levite, by their fathers’ houses.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the clans of Levi." The Hebrew has the singular gentilic "the Levite,"
      which may function collectively or refer back to Levi as the tribal ancestor.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי
  chosen: The sons of
  alternatives:
  - And the sons of
  - The descendants of
  lexicon: HALOT
  rationale: בני literally means 'sons of.' In this genealogical/list context, 'sons
    of' is the standard and sufficiently clear rendering, preserving the formal lineage
    language better than the broader 'descendants of.' The prefixed conjunction is
    not separately represented in English because the verse reads naturally as a list
    item without an initial 'and.'
- source_word: מְרָרִי
  chosen: Merari
  lexicon: HALOT
  rationale: Proper name; transliterated according to the translation philosophy of
    transliterating personal names.
- source_word: למשפחתם
  chosen: by their clans
  alternatives:
  - according to their clans
  - for their clans
  lexicon: HALOT
  rationale: ל + משפחותם indicates classification by family subdivisions. 'By their
    clans' is concise, natural English that preserves the organizational sense of
    the Hebrew.
- source_word: מַחְלִי
  chosen: Mahli
  lexicon: HALOT
  rationale: Proper name; transliterated.
- source_word: וּמוּשִׁי
  chosen: and Mushi
  lexicon: HALOT
  rationale: Proper name with conjunction; transliterated and coordinated straightforwardly.
- source_word: אֵלֶּה הֵם
  chosen: These are
  alternatives:
  - These were
  - These
  lexicon: HALOT
  rationale: The demonstrative plus pronoun gives an identificational statement. 'These
    are' is the most natural English equivalent in this presentational list context.
- source_word: מִשְׁפְּחֹת
  chosen: the clans
  alternatives:
  - the families
  lexicon: HALOT
  rationale: משפחות in tribal/genealogical census contexts is well rendered 'clans,'
    which better signals sub-tribal kinship units than the more generic 'families.'
- source_word: הַלֵּוִי
  chosen: the Levite
  alternatives:
  - the Levites
  - Levi
  lexicon: HALOT
  rationale: The singular with article most naturally refers to the eponymous ancestor/tribal
    designation in a collective-genealogical sense. 'The Levite' preserves the Hebrew
    form better than smoothing to plural 'the Levites.' 'Levi' is possible, but the
    adjectival/gentilic form favors 'the Levite.'
- source_word: לבית אבתם
  chosen: by their fathers’ houses
  alternatives:
  - according to their fathers' households
  - by their ancestral houses
  lexicon: HALOT
  rationale: בית אבות is a standard kinship-administrative expression. 'Fathers’ houses'
    is a conventional, fairly literal rendering that preserves the patriarchal household
    structure named in the Hebrew. The preposition ל here is classificatory, hence
    'by.'
