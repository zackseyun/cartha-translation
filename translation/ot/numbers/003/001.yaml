theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of תּוֹלְדֹת in a heading naming both Aaron and Moses
  chosen_reading: Retain the formal heading 'the generations of Aaron and Moses' without narrowing it in translation
  alternative_readings:
  - the descendants of Aaron and Moses
  - the family line of Aaron and Moses
  rationale: Although the subsequent list centers on Aaron's sons, the Hebrew heading includes both Aaron and Moses. The translation preserves that tension rather than resolving it by paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
