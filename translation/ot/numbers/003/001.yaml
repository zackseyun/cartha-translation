theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of תּוֹלְדֹת in a heading naming both Aaron and Moses
  chosen_reading: Retain the formal heading 'the generations of Aaron and Moses' without
    narrowing it in translation
  alternative_readings:
  - the descendants of Aaron and Moses
  - the family line of Aaron and Moses
  rationale: Although the subsequent list centers on Aaron's sons, the Hebrew heading
    includes both Aaron and Moses. The translation preserves that tension rather than
    resolving it by paraphrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
