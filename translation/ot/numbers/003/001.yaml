id: NUM.3.1
reference: Numbers 3:1
source:
  edition: WLC
  text: וְ/אֵ֛לֶּה תּוֹלְדֹ֥ת אַהֲרֹ֖ן וּ/מֹשֶׁ֑ה בְּ/י֗וֹם דִּבֶּ֧ר יְהוָ֛ה אֶת מֹשֶׁ֖ה בְּ/הַ֥ר סִינָֽי־׃
translation:
  text: These are the generations of Aaron and Moses in the day when Yahweh spoke to Moses on Mount Sinai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the descendants of Aaron and Moses.' The Hebrew heading uses 'generations,' a standard formula that can introduce a family line or what proceeds from someone.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the day when,' an idiom meaning 'at the time when' or simply 'when.'
    reason: lexical_alternative
  - marker: c
    text: Or 'spoke to Moses.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אֵלֶּה
  chosen: These are
  alternatives:
  - Now these are
  - And these are
  lexicon: HALOT
  rationale: Introduces a new section with a deictic formula. 'These are' is natural English and preserves the structural marker without overemphasizing the conjunction.
- source_word: תּוֹלְדֹת
  chosen: the generations
  alternatives:
  - the descendants
  - the family line
  - the account
  lexicon: HALOT
  rationale: The term often functions as a heading for lineage or what proceeds from someone. Here the following verses list Aaron's sons, yet Moses is included in the heading because the section concerns the priestly-Levitical line under Moses' leadership. 'Generations' preserves the formal Hebrew heading style better than the more interpretive 'descendants' or 'family line'.
- source_word: אַהֲרֹן וּמֹשֶׁה
  chosen: Aaron and Moses
  rationale: Personal names are transliterated by standard convention. The source explicitly names both men, so both are retained even though the ensuing genealogy focuses primarily on Aaron's sons.
- source_word: בְּ/י֗וֹם
  chosen: at the time when
  alternatives:
  - in the day when
  - when
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'in the day,' but often means 'when' or 'at the time when.' This rendering preserves the temporal sense in natural modern English without wooden literalism.
- source_word: דִּבֶּר
  chosen: spoke with
  alternatives:
  - spoke to
  lexicon: HALOT
  rationale: With דבר plus אֶת plus person, the sense is commonly 'speak with' or 'speak to.' 'Spoke with' reflects the prepositionless object marker construction here and reads naturally in English, though 'spoke to' is also possible.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶת מֹשֶׁה
  chosen: with Moses
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: The direct-object marker marks Moses as the one addressed. In English this must be expressed with a preposition after 'spoke'; 'with Moses' matches the chosen rendering of דבר.
- source_word: בְּ/הַר סִינָי
  chosen: on Mount Sinai
  alternatives:
  - at Mount Sinai
  - on the mountain of Sinai
  lexicon: HALOT
  rationale: Standard English geographical rendering. 'On Mount Sinai' is idiomatic and precise.
