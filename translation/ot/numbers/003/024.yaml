id: NUM.3.24
reference: Numbers 3:24
source:
  edition: WLC
  text: וּ/נְשִׂ֥יא בֵֽית אָ֖ב לַ/גֵּרְשֻׁנִּ֑י אֶלְיָסָ֖ף בֶּן לָאֵֽל־־׃
translation:
  text: And the chief of the ancestral house of the Gershonites was Eliasaph son of
    Lael.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'father's house,' an Israelite kinship term for an ancestral family
      or clan unit.
    reason: cultural_note
lexical_decisions:
- source_word: וּ/נְשִׂיא
  chosen: And the chief
  alternatives:
  - And the leader
  - And the prince
  lexicon: HALOT
  rationale: נָשִׂיא commonly denotes a lifted-up person, i.e., a leader, chief, or
    prince. In this administrative/genealogical context, 'chief' best conveys an official
    clan head without implying royalty. The prefixed conjunction ו is rendered 'And'
    to continue the list structure.
- source_word: בֵּית אָב
  chosen: of the ancestral house
  alternatives:
  - of the fathers' house
  - of the family house
  lexicon: HALOT
  rationale: The construct phrase literally means 'house of a father/father's house,'
    an Israelite kinship term for a patrilineal family unit or clan subdivision. 'Ancestral
    house' communicates the social structure in clear modern English while remaining
    close to the Hebrew.
- source_word: לַ/גֵּרְשֻׁנִּי
  chosen: of the Gershonites
  alternatives:
  - for the Gershonite clan
  - of the Gershonite
  lexicon: HALOT
  rationale: The form with ל marks relation to the Gershonite group. Since the referent
    is the clan descended from Gershon, the collective plural English 'the Gershonites'
    is the most natural rendering.
- source_word: אֶלְיָסָף
  chosen: Eliasaph
  rationale: 'Personal name transliterated according to the translation philosophy:
    names are transliterated rather than translated.'
- source_word: בֶּן
  chosen: son of
  alternatives:
  - ben
  lexicon: HALOT
  rationale: Standard genealogical rendering in English.
- source_word: לָאֵל
  chosen: Lael
  rationale: Personal name transliterated by standard convention.
