id: NUM.3.17
reference: Numbers 3:17
source:
  edition: WLC
  text: וַ/יִּֽהְיוּ אֵ֥לֶּה בְנֵֽי לֵוִ֖י בִּ/שְׁמֹתָ֑/ם גֵּרְשׁ֕וֹן וּ/קְהָ֖ת וּ/מְרָרִֽי־־׃
translation:
  text: 'These were the sons of Levi by their names: Gershon, Kohath, and Merari.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to their names.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  chosen: were
  alternatives:
  - became
  lexicon: HALOT
  rationale: The wayyiqtol of היה here functions as a simple past copula introducing
    a list, not a change-of-state. 'Were' is the most natural English rendering in
    this genealogical context.
- source_word: אֵלֶּה
  chosen: these
  alternatives:
  - these are
  lexicon: HALOT
  rationale: Demonstrative pointing forward to the named individuals. Combined with
    וַיִּהְיוּ, it yields the idiomatic English clause 'These were...'.
- source_word: בְנֵי לֵוִי
  chosen: the sons of Levi
  alternatives:
  - the descendants of Levi
  - the children of Levi
  lexicon: HALOT
  rationale: בנים in genealogical listings commonly means 'sons/descendants,' but
    here the immediate referents are Levi's three direct sons, so 'sons' is both accurate
    and appropriately gender-specific per the source.
- source_word: בִּשְׁמֹתָם
  chosen: by their names
  alternatives:
  - according to their names
  - named
  lexicon: HALOT
  rationale: Literally 'by/according to their names.' 'By their names' preserves the
    formal flavor while remaining readable in English and signaling that what follows
    is a naming formula.
- source_word: גֵּרְשׁוֹן
  chosen: Gershon
  rationale: Personal name transliterated according to standard English convention,
    following the project's policy to transliterate names rather than translate them.
- source_word: קְהָת
  chosen: Kohath
  alternatives:
  - Kehath
  rationale: Standard English transliteration is 'Kohath.' 'Kehath' is a more letter-near
    alternative but is less conventional in English Bible usage.
- source_word: מְרָרִי
  chosen: Merari
  rationale: Personal name transliterated by standard English convention.
