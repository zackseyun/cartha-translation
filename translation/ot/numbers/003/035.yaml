id: NUM.3.35
reference: Numbers 3:35
source:
  edition: WLC
  text: וּ/נְשִׂ֤יא בֵֽית אָב֙ לְ/מִשְׁפְּחֹ֣ת מְרָרִ֔י צוּרִיאֵ֖ל בֶּן אֲבִיחָ֑יִל
    עַ֣ל יֶ֧רֶךְ הַ/מִּשְׁכָּ֛ן יַחֲנ֖וּ צָפֹֽנָ/ה־־׃
translation:
  text: And the chief of the ancestral house of the clans of Merari was Zuriel son
    of Abihail. They were to camp on the north side of the tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leader' for 'chief'; Hebrew נָשִׂיא can denote a recognized leader or
      prince.
    reason: lexical_alternative
  - marker: b
    text: Literally 'father's house,' a kinship term for an ancestral household or
      clan-unit.
    reason: cultural_note
lexical_decisions:
- source_word: וּ/נְשִׂיא
  chosen: And the chief
  alternatives:
  - And the leader
  - And the prince
  lexicon: HALOT
  rationale: נָשִׂיא commonly denotes a leader, chief, or prince. In this administrative/census
    context, 'chief' best conveys recognized tribal/clan leadership without the monarchical
    overtones of 'prince.' The conjunction ו is rendered 'And' to continue the listing.
- source_word: בֵּית אָב
  chosen: the ancestral house
  alternatives:
  - the father's house
  - the paternal house
  lexicon: HALOT
  rationale: The construct phrase refers to a patrilineal household or clan-unit.
    'Ancestral house' is more natural in modern English while preserving the kinship
    structure better than the overly literal 'father's house.'
- source_word: לְמִשְׁפְּחֹת
  chosen: of the clans of
  alternatives:
  - for the families of
  - over the clans of
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת in Numbers often denotes clan subdivisions within a tribe.
    'Clans' is more precise than 'families' in this census/organizational setting.
    The prefixed ל is absorbed idiomatically into the genitival relationship in English.
- source_word: מְרָרִי
  chosen: Merari
  rationale: Proper name, transliterated according to the project's policy for personal
    names.
- source_word: צוּרִיאֵל בֶּן אֲבִיחָיִל
  chosen: Zuriel son of Abihail
  rationale: Proper names are transliterated; בֶּן is rendered with the standard genealogical
    'son of.'
- source_word: עַל יֶרֶךְ הַמִּשְׁכָּן
  chosen: on the north side of the tabernacle
  alternatives:
  - at the flank of the tabernacle, to the north
  - beside the tabernacle on the north side
  lexicon: HALOT
  rationale: יֶרֶךְ literally means 'side,' 'flank,' or 'far side.' In camp-position
    descriptions, idiomatic English prefers 'side.' The preposition עַל here marks
    location. Because צָפֹנָה specifies the direction, the full phrase is best rendered
    smoothly as 'on the north side of the tabernacle.' 'Tabernacle' is the conventional
    and contextually accurate rendering of מִשְׁכָּן here.
- source_word: יַחֲנוּ
  chosen: They were to camp
  alternatives:
  - they shall camp
  - they camped
  lexicon: HALOT
  rationale: The imperfect here gives prescribed camp arrangement in the wilderness
    narrative. 'They were to camp' communicates assigned disposition more naturally
    in English than a bare future, while preserving the directive sense.
- source_word: צָפֹנָה
  chosen: north
  alternatives:
  - to the north
  - northward
  lexicon: HALOT
  rationale: Directional adverb indicating the northern side/location. In English
    it is incorporated idiomatically into 'on the north side.'
