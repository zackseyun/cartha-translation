theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. The project doctrine specifies
    'the LORD' as the default rendering for יְהוָה, preserving alternatives only as
    noted in documentation rather than adopting them in the main text.
