id: NUM.3.29
reference: Numbers 3:29
source:
  edition: WLC
  text: מִשְׁפְּחֹ֥ת בְּנֵי קְהָ֖ת יַחֲנ֑וּ עַ֛ל יֶ֥רֶךְ הַ/מִּשְׁכָּ֖ן תֵּימָֽנָ/ה־׃
translation:
  text: The clans of the sons of Kohath shall camp on the south side of the tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the descendants of Kohath' or 'the Kohathites.' The Hebrew reads literally
      'the sons of Kohath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפְּחֹת
  chosen: clans
  alternatives:
  - families
  lexicon: HALOT
  rationale: In tribal census and camp-arrangement contexts, the term denotes kinship
    subdivisions larger than immediate households. 'Clans' communicates the social
    unit more naturally in modern English than 'families' while remaining faithful
    to the Hebrew.
- source_word: בְּנֵי קְהָת
  chosen: the sons of Kohath
  alternatives:
  - the descendants of Kohath
  - the Kohathites
  lexicon: HALOT
  rationale: Literally 'sons of Kohath.' This preserves the Hebrew filial expression
    tied to lineage. 'Kohathites' is possible, but the construct phrase is transparent
    enough in English and keeps closer to the source.
- source_word: יַחֲנוּ
  chosen: shall camp
  alternatives:
  - will camp
  - are to camp
  lexicon: HALOT
  rationale: The imperfect here expresses prescribed future arrangement in the camp
    order. 'Shall camp' fits the formal register of instructions without sounding
    archaic in this context.
- source_word: עַל
  chosen: 'on'
  alternatives:
  - by
  - at
  lexicon: HALOT
  rationale: With יֶרֶךְ in a locative expression, עַל marks position relative to
    the tabernacle. 'On' works idiomatically in the established phrase 'on the side
    of.'
- source_word: יֶרֶךְ
  chosen: side
  alternatives:
  - flank
  - far side
  lexicon: HALOT
  rationale: The noun refers to the side or flank of an object. 'Side' is the clearest
    natural English rendering in a camp-location description.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: In Numbers this term refers to the sacred tent sanctuary. 'Tabernacle'
    is the standard and sufficiently clear English rendering for this cultic referent.
- source_word: תֵּימָנָה
  chosen: south
  alternatives:
  - southward
  - to the south
  lexicon: HALOT
  rationale: The directional form indicates the southern side/location. Because יֶרֶךְ
    already supplies 'side,' rendering the adverbial ending as 'south' in the phrase
    'south side' is concise and natural.
