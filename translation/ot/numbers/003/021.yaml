id: NUM.3.21
reference: Numbers 3:21
source:
  edition: WLC
  text: לְ/גֵ֣רְשׁ֔וֹן מִשְׁפַּ֨חַת֙ הַ/לִּבְנִ֔י וּ/מִשְׁפַּ֖חַת הַ/שִּׁמְעִ֑י אֵ֣לֶּה
    הֵ֔ם מִשְׁפְּחֹ֖ת הַ/גֵּרְשֻׁנִּֽי׃
translation:
  text: To Gershon belonged the clan of the Libnites and the clan of the Shimeites;
    these are the clans of the Gershonites.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לְגֵרְשׁוֹן
  chosen: To Gershon belonged
  alternatives:
  - For Gershon
  - Of Gershon
  lexicon: HALOT
  rationale: 'The prefixed ל marks relation or possession in this census-style listing.
    English idiom is best served by expressing this as possession/allotment: ''To
    Gershon belonged,'' introducing the descendant clans associated with Gershon.'
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  - the tribe of
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in genealogical and census contexts refers to a kinship subdivision,
    smaller than a tribe. 'Clan' best matches the social unit here; 'family' can sound
    too narrow in modern English, and 'tribe' is too large.
- source_word: הַלִּבְנִי
  chosen: the Libnites
  alternatives:
  - the Libnite clan
  - the descendants of Libni
  lexicon: HALOT
  rationale: The gentilic form denotes the subgroup descended from Libni. Rendering
    as the plural ethnicon 'Libnites' is concise and natural in English while preserving
    the genealogical sense.
- source_word: וּמִשְׁפַּחַת הַשִּׁמְעִי
  chosen: and the clan of the Shimeites
  alternatives:
  - and the family of the Shimeiites
  - and the descendants of Shimei
  lexicon: HALOT
  rationale: The conjunction joins a second parallel clan designation. 'Shimeites'
    is the natural English rendering of the gentilic tied to Shimei.
- source_word: אֵלֶּה הֵם
  chosen: these are
  alternatives:
  - these were
  - these, they were
  lexicon: HALOT
  rationale: This is a standard identificational formula. Present tense 'these are'
    fits English translations of Hebrew catalog statements and preserves the listing
    function.
- source_word: מִשְׁפְּחֹת
  chosen: the clans of
  alternatives:
  - the families of
  lexicon: HALOT
  rationale: Plural of מִשְׁפָּחָה, again best rendered 'clans' for consistency within
    the verse and to reflect the broader kinship grouping.
- source_word: הַגֵּרְשֻׁנִּי
  chosen: the Gershonites
  alternatives:
  - the Gershonite clans
  - the descendants of Gershon
  lexicon: HALOT
  rationale: The gentilic identifies the larger Levitical branch descending from Gershon.
    'Gershonites' is the standard and clear English form.
