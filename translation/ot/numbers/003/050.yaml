id: NUM.3.50
reference: Numbers 3:50
source:
  edition: WLC
  text: מֵ/אֵ֗ת בְּכ֛וֹר בְּנֵ֥י יִשְׂרָאֵ֖ל לָקַ֣ח אֶת הַ/כָּ֑סֶף חֲמִשָּׁ֨ה וְ/שִׁשִּׁ֜ים
    וּ/שְׁלֹ֥שׁ מֵא֛וֹת וָ/אֶ֖לֶף בְּ/שֶׁ֥קֶל הַ/קֹּֽדֶשׁ־׃
translation:
  text: From the firstborn of the sons of Israel he took the silver, one thousand
    three hundred sixty-five shekels, by the sanctuary shekel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the firstborn of the Israelites.” The Hebrew is literally “the firstborn
      of the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “according to the shekel of the sanctuary.” The phrase specifies the
      sanctuary standard of weight.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאֵת
  chosen: From
  alternatives:
  - from among
  - from the hand of
  lexicon: HALOT
  rationale: Introduces the source from whom the money was taken. In this context
    a simple 'from' is the most natural English equivalent without over-specifying
    agency.
- source_word: בְּכוֹר בְּנֵי יִשְׂרָאֵל
  chosen: the firstborn of the sons of Israel
  alternatives:
  - the firstborn of the Israelites
  - the firstborn sons of Israel
  lexicon: HALOT
  rationale: בכור is singular in construct functioning collectively. 'The firstborn
    of the sons of Israel' preserves the Hebrew structure and the male reference present
    in the census/redemption context. 'Sons of Israel' is retained rather than flattening
    to 'Israelites' in the main text.
- source_word: לָקַח
  chosen: he took
  alternatives:
  - he received
  lexicon: HALOT
  rationale: The verb normally means 'take.' Although English could say 'received'
    in a financial context, 'took' better reflects the plain sense and keeps continuity
    with the Hebrew wording.
- source_word: הַכָּסֶף
  chosen: the silver
  alternatives:
  - the money
  - the silver money
  lexicon: HALOT
  rationale: כסף literally denotes 'silver' and by extension money. Because the verse
    immediately specifies shekels, 'the silver' preserves the material term while
    still making sense idiomatically.
- source_word: חֲמִשָּׁה וְשִׁשִּׁים וּשְׁלֹשׁ מֵאוֹת וָאֶלֶף
  chosen: one thousand three hundred sixty-five
  alternatives:
  - a thousand three hundred and sixty-five
  lexicon: HALOT
  rationale: The Hebrew lists the number components in descending order. Rendering
    as a standard English cardinal number is the clearest optimal-equivalence choice.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: by the sanctuary shekel
  alternatives:
  - according to the shekel of the sanctuary
  - in sanctuary shekels
  - by the holy shekel
  lexicon: HALOT
  rationale: This phrase specifies the standard of weight/currency used. 'By the sanctuary
    shekel' is concise and natural, while preserving the cultic reference. 'Holy shekel'
    is less idiomatic and may sound like a distinct coin rather than a standard measure.
