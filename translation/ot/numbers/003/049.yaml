id: NUM.3.49
reference: Numbers 3:49
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח מֹשֶׁ֔ה אֵ֖ת כֶּ֣סֶף הַ/פִּדְי֑וֹם מֵ/אֵת֙ הָ/עֹ֣דְפִ֔ים עַ֖ל
    פְּדוּיֵ֥י הַ/לְוִיִּֽם׃
translation:
  text: And Moses took the redemption money from those who were in excess over the
    redeemed of the Levites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the ransom money." The Hebrew term can denote the payment made for redemption.
    reason: lexical_alternative
  - marker: b
    text: That is, from those Israelites whose number exceeded the number represented
      by the Levites in the redemption count.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - received
  lexicon: HALOT
  rationale: Qal wayyiqtol of לקח, the standard narrative verb 'took.' 'Received'
    is possible in context, but 'took' preserves the straightforward verbal sense.
- source_word: כֶּסֶף הַפִּדְיוֹם
  chosen: the redemption money
  alternatives:
  - the ransom money
  - the redemption silver
  lexicon: HALOT
  rationale: The construct-like phrase denotes money paid for redemption/redemption
    price. 'Redemption money' is natural English and preserves the cultic/legal sense
    better than the more wooden 'redemption silver.' 'Ransom money' is possible but
    can suggest danger-release rather than substitutionary redemption in this census
    context.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from the hand of
  lexicon: HALOT
  rationale: The preposition marks source/origin. English 'from' is sufficient here;
    the fuller idiomatic force 'from the hand of' would be overly explicit.
- source_word: הָעֹדְפִים
  chosen: those who were in excess
  alternatives:
  - those who were left over
  - the surplus ones
  - those in excess
  lexicon: HALOT
  rationale: Participle of עודף, referring to the firstborn Israelites exceeding the
    number of Levites in the preceding context. 'Those who were in excess' communicates
    the comparative surplus without paraphrasing to 'extra firstborn,' which is contextually
    true but not lexically explicit in this clause.
- source_word: עַל
  chosen: over
  alternatives:
  - beyond
  - more than
  lexicon: HALOT
  rationale: Here עַל expresses comparison/excess relative to the number of Levite
    redeemers/redeemed. 'Over' is concise and idiomatic in English for numerical surplus.
- source_word: פְּדוּיֵי הַלְוִיִּם
  chosen: the redeemed of the Levites
  alternatives:
  - those redeemed by the Levites
  - the Levites' redeemed ones
  lexicon: HALOT
  rationale: The passive participial plural construct with 'the Levites' refers to
    those accounted for by Levite substitution in the redemption scheme. 'The redeemed
    of the Levites' stays close to the Hebrew structure while remaining intelligible.
    'Those redeemed by the Levites' is interpretive and could be taken instrumentally;
    the Hebrew construct is broader.
