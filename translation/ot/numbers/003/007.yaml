id: NUM.3.7
reference: Numbers 3:7
source:
  edition: WLC
  text: וְ/שָׁמְר֣וּ אֶת מִשְׁמַרְתּ֗/וֹ וְ/אֶת מִשְׁמֶ֨רֶת֙ כָּל הָ֣/עֵדָ֔ה לִ/פְנֵ֖י
    אֹ֣הֶל מוֹעֵ֑ד לַ/עֲבֹ֖ד אֶת עֲבֹדַ֥ת הַ/מִּשְׁכָּֽן־־־־׃
translation:
  text: They shall keep his charge and the charge of the whole congregation before
    the tent of meeting, to perform the service of the tabernacle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guard his duty' / 'observe his charge'; the Hebrew verb and noun pair
      can emphasize custodial responsibility as well as faithful observance.
    reason: lexical_alternative
  - marker: b
    text: That is, the Levites carry out responsibilities associated with Aaron and
      with the whole congregation in relation to the sanctuary.
    reason: cultural_note
lexical_decisions:
- source_word: וְשָׁמְרוּ
  chosen: they shall keep
  alternatives:
  - they shall guard
  - they shall observe
  lexicon: HALOT
  rationale: שׁמר commonly carries the sense of keeping, guarding, or observing. Here,
    with מִשְׁמֶרֶת objects, 'keep' preserves the idiomatic priestly/Levitical sense
    of fulfilling a custodial duty without over-specifying physical guarding alone.
- source_word: מִשְׁמַרְתּוֹ
  chosen: his charge
  alternatives:
  - his duty
  - his obligation
  - what was entrusted to him
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת in cultic contexts often denotes a charge, obligation, or
    assigned duty. The 3ms suffix most naturally refers to Aaron in the immediate
    context. 'His charge' is concise and preserves the formal covenantal/cultic nuance.
- source_word: מִשְׁמֶרֶת כָּל־הָעֵדָה
  chosen: the charge of the whole congregation
  alternatives:
  - the duty of the whole congregation
  - the obligation of all the congregation
  lexicon: HALOT
  rationale: The phrase parallels 'his charge' and indicates responsibilities borne
    on behalf of or pertaining to the entire community. 'Charge' maintains the lexical
    repetition of מִשְׁמֶרֶת in both clauses.
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the community
  - the assembly
  lexicon: HALOT
  rationale: In Numbers, עֵדָה regularly refers to the assembled Israelite community.
    'Congregation' fits the cultic setting and is standard, while still understandable
    in modern English.
- source_word: לִפְנֵי אֹהֶל מוֹעֵד
  chosen: before the tent of meeting
  alternatives:
  - in front of the tent of meeting
  - at the front of the tent of meeting
  lexicon: HALOT
  rationale: לִפְנֵי literally means 'before' or 'in front of.' 'Before the tent of
    meeting' is natural English and preserves the spatial/cultic orientation. 'Tent
    of meeting' is the standard rendering of אֹהֶל מוֹעֵד.
- source_word: לַעֲבֹד
  chosen: to perform
  alternatives:
  - to serve
  - to do
  lexicon: HALOT
  rationale: The infinitive of עבד here introduces the purpose of their custodial
    role. Because the following cognate noun עֲבֹדַת is rendered 'service,' 'to perform'
    avoids an awkward 'to serve the service' while preserving the sense of carrying
    out assigned work.
- source_word: עֲבֹדַת הַמִּשְׁכָּן
  chosen: the service of the tabernacle
  alternatives:
  - the work of the tabernacle
  - the service of the dwelling place
  lexicon: HALOT
  rationale: עֲבֹדָה in sanctuary contexts denotes service/work associated with cultic
    duties. מִשְׁכָּן is conventionally and accurately rendered 'tabernacle' in this
    wilderness setting. 'Service of the tabernacle' best captures the technical Levitical
    function.
