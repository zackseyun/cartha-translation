theological_decisions:
- issue: Referent of the 3ms suffix in מִשְׁמַרְתּוֹ
  chosen_reading: The suffix refers to Aaron, whose charge the Levites are to keep.
  alternative_readings:
  - The suffix could be taken more generally as referring to the sanctuary's charge
    or to priestly duty collectively.
  rationale: 'The immediate context in Numbers 3 concerns the Levites'' assignment
    to Aaron and his sons, making Aaron the most natural antecedent. This reading
    also fits the parallel structure: Aaron''s charge and the congregation''s charge,
    both carried out before the tent of meeting.'
