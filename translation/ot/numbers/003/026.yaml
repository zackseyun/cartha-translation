id: NUM.3.26
reference: Numbers 3:26
source:
  edition: WLC
  text: וְ/קַלְעֵ֣י הֶֽ/חָצֵ֗ר וְ/אֶת מָסַךְ֙ פֶּ֣תַח הֶֽ/חָצֵ֔ר אֲשֶׁ֧ר עַל הַ/מִּשְׁכָּ֛ן
    וְ/עַל הַ/מִּזְבֵּ֖חַ סָבִ֑יב וְ/אֵת֙ מֵֽיתָרָ֔י/ו לְ/כֹ֖ל עֲבֹדָתֽ/וֹ־־־׃
translation:
  text: and the hangings of the court, and the screen for the entrance of the court
    that is around the tabernacle and around the altar, and its ropes, for all its
    service.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'curtains of the court.'
    reason: lexical_alternative
  - marker: b
    text: Or 'its cords.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַלְעֵי
  chosen: hangings
  alternatives:
  - curtains
  lexicon: HALOT
  rationale: Refers to the fabric hangings forming the enclosure of the court. 'Hangings'
    is a standard and clear rendering in tabernacle contexts; 'curtains' is possible
    but can sound too domestic and less specific to an enclosing perimeter.
- source_word: חָצֵר
  chosen: court
  alternatives:
  - courtyard
  lexicon: HALOT
  rationale: Denotes the enclosed area around the tabernacle. 'Court' is concise and
    traditional in sanctuary contexts; 'courtyard' is a viable modern alternative
    but slightly more expansive in tone.
- source_word: מָסַךְ
  chosen: screen
  alternatives:
  - curtain
  - covering
  lexicon: HALOT
  rationale: In tabernacle usage this term denotes a textile screen at an entrance.
    'Screen' distinguishes it from the broader enclosure hangings and fits the cultic
    furnishing context.
- source_word: פֶּתַח
  chosen: entrance
  alternatives:
  - gate
  - opening
  lexicon: HALOT
  rationale: The word means an opening/entryway. 'Entrance' fits naturally with 'screen'
    and avoids implying a rigid gate structure not present in the Hebrew.
- source_word: אֲשֶׁר עַל הַמִּשְׁכָּן וְעַל הַמִּזְבֵּחַ סָבִיב
  chosen: that is around the tabernacle and around the altar
  alternatives:
  - which is by the tabernacle and by the altar all around
  lexicon: HALOT
  rationale: The phrase modifies the court/its entrance area as situated around both
    the tabernacle and the altar. Rendering עַל here as 'around' in light of סָבִיב
    communicates spatial relation idiomatically in English better than a wooden 'upon/by.'
- source_word: מִשְׁכָּן
  chosen: tabernacle
  alternatives:
  - dwelling place
  lexicon: HALOT
  rationale: In Numbers this is the established term for the sacred tent sanctuary.
    'Tabernacle' is the clearest conventional rendering in English Bible usage.
- source_word: מִזְבֵּחַ
  chosen: altar
  lexicon: HALOT
  rationale: Standard rendering for the sacrificial altar; no contextual reason to
    vary.
- source_word: מֵיתָרָיו
  chosen: its ropes
  alternatives:
  - its cords
  lexicon: HALOT
  rationale: Refers to the ropes/cords associated with the court structure. 'Ropes'
    is slightly more concrete and natural in modern English; 'cords' remains a close
    alternative.
- source_word: לְכֹל עֲבֹדָתוֹ
  chosen: for all its service
  alternatives:
  - for all its work
  - for all its use
  lexicon: HALOT
  rationale: This phrase summarizes the full range of duties or functions connected
    with these items. 'Service' preserves the cultic/assigned-duty nuance better than
    the more generic 'work' or 'use'.
