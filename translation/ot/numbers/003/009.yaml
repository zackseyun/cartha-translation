id: NUM.3.9
reference: Numbers 3:9
source:
  edition: WLC
  text: וְ/נָתַתָּה֙ אֶת הַ/לְוִיִּ֔ם לְ/אַהֲרֹ֖ן וּ/לְ/בָנָ֑י/ו נְתוּנִ֨ם נְתוּנִ֥ם
    הֵ֨מָּה֙ ל֔/וֹ מֵ/אֵ֖ת בְּנֵ֥י יִשְׂרָאֵֽל־׃
translation:
  text: You shall give the Levites to Aaron and to his sons; they are wholly given
    to him from among the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats ''given'' for emphasis: ''given, given'' or ''surely given.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''from the Israelites.'' Hebrew: ''from among the sons of Israel.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה
  chosen: You shall give
  alternatives:
  - and you shall give
  - you must give
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as an imperative/future command. 'You shall give' preserves the directive force
    in natural English.
- source_word: הַלְוִיִּם
  chosen: the Levites
  alternatives:
  - the descendants of Levi
  lexicon: HALOT
  rationale: Standard ethnic/tribal designation; 'Levites' is the natural and established
    rendering for members of the tribe set apart for sanctuary service.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  chosen: to Aaron and to his sons
  alternatives:
  - for Aaron and for his sons
  lexicon: HALOT
  rationale: The preposition ל marks indirect object/beneficiary. 'To Aaron and to
    his sons' fits the transfer language of נתן and keeps the formal structure.
- source_word: נְתוּנִם נְתוּנִם
  chosen: wholly given
  alternatives:
  - given, yes given
  - surely given
  - completely given
  lexicon: HALOT
  rationale: The doubled passive participle of נתן is emphatic. English does not naturally
    repeat 'given' here, so 'wholly given' conveys the intensification while remaining
    readable. The repetition is still reflected in the rationale and preserved as
    an alternative in a footnote.
- source_word: הֵמָּה
  chosen: they are
  alternatives:
  - they themselves are
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis to the clause. In English the emphasis
    is sufficiently carried by word order and the emphatic predicate; an explicit
    'themselves' would sound awkward.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - for him
  lexicon: HALOT
  rationale: Refers back to Aaron in the immediate context. 'To him' matches the transfer/dedication
    sense established earlier in the verse.
- source_word: מֵאֵת בְּנֵי יִשְׂרָאֵל
  chosen: from among the sons of Israel
  alternatives:
  - from the Israelites
  - from the children of Israel
  lexicon: HALOT
  rationale: 'מֵאֵת marks source/origin: the Levites are taken from the wider covenant
    people and assigned to Aaron. ''Sons of Israel'' preserves the Hebrew familial
    expression and aligns with the project''s gender-accurate policy; ''from among''
    makes the selection sense explicit in idiomatic English.'
