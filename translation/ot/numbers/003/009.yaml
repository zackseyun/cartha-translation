theological_decisions:
- issue: Rendering בְּנֵי יִשְׂרָאֵל
  chosen_reading: sons of Israel
  alternative_readings:
  - Israelites
  - children of Israel
  rationale: The Hebrew is literally masculine plural construct 'sons of Israel.'
    Per translation philosophy, gender-accurate rendering is preferred unless context
    clearly calls for a neutral collective. Here the familial/covenantal expression
    is significant, so the more literal form is retained, while a smoother collective
    alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
