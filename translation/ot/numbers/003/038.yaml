theological_decisions:
- issue: Referent of 'his sons'
  chosen_reading: '''his sons'' refers to Aaron''s sons'
  alternative_readings:
  - '''his sons'' refers more loosely to the households associated with Moses and
    Aaron'
  rationale: The singular pronominal suffix after 'Aaron' most naturally points to
    Aaron, and the priestly guarding role elsewhere in the chapter belongs specifically
    to Aaron and his sons.
- issue: Meaning of זָר in sanctuary law
  chosen_reading: '''outsider'' means any unauthorized non-priest/non-designated person
    approaching sacred service'
  alternative_readings:
  - ethnic foreigner
  - stranger in a general social sense
  rationale: The immediate context concerns tabernacle access and priestly duty, so
    the prohibition is about cultic authorization rather than ethnicity.
