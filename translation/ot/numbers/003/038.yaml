id: NUM.3.38
reference: Numbers 3:38
source:
  edition: WLC
  text: וְ/הַ/חֹנִ֣ים לִ/פְנֵ֣י הַ/מִּשְׁכָּ֡ן קֵ֣דְמָ/ה לִ/פְנֵי֩ אֹֽהֶל מוֹעֵ֨ד
    מִזְרָ֜חָ/ה מֹשֶׁ֣ה וְ/אַהֲרֹ֣ן וּ/בָנָ֗י/ו שֹֽׁמְרִים֙ מִשְׁמֶ֣רֶת הַ/מִּקְדָּ֔שׁ
    לְ/מִשְׁמֶ֖רֶת בְּנֵ֣י יִשְׂרָאֵ֑ל וְ/הַ/זָּ֥ר הַ/קָּרֵ֖ב יוּמָֽת־׀׀׃
translation:
  text: Those who camped in front of the tabernacle on the east, in front of the tent
    of meeting toward the sunrise, were Moses and Aaron and his sons, keeping charge
    of the sanctuary for the duty of the sons of Israel. But the outsider who comes
    near shall be put to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eastward ... on the east'; the Hebrew uses two related directional expressions
      for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''The outsider'' means an unauthorized person who is not permitted to approach
      the sanctuary service, not specifically a foreigner by ethnicity.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהַחֹנִים
  chosen: Those who camped
  alternatives:
  - And those camping
  - Those encamped
  lexicon: HALOT
  rationale: Substantival participle referring to the persons stationed there. English
    past-like 'camped' fits the census/layout context better than a progressive form
    while preserving the descriptive force.
- source_word: לִפְנֵי הַמִּשְׁכָּן
  chosen: in front of the tabernacle
  alternatives:
  - before the tabernacle
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before/in front of.' 'Tabernacle' is the standard
    rendering of מִשְׁכָּן in this context and distinguishes it from the broader phrase
    'tent of meeting' that follows.
- source_word: קֵדְמָה ... מִזְרָחָה
  chosen: on the east ... toward the sunrise
  alternatives:
  - eastward ... on the east
  - to the east ... eastward
  lexicon: HALOT
  rationale: The verse uses two directional expressions. Rendering both identically
    would flatten the Hebrew style; 'on the east' plus 'toward the sunrise' preserves
    the emphasis and avoids awkward repetition while keeping the eastern orientation
    explicit.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  lexicon: HALOT
  rationale: Established and accurate rendering for the sanctuary structure named
    here.
- source_word: מֹשֶׁה וְאַהֲרֹן וּבָנָיו
  chosen: Moses and Aaron and his sons
  alternatives:
  - Moses, Aaron, and his sons
  - Moses and Aaron, and his sons
  lexicon: HALOT
  rationale: The 3ms suffix on 'sons' most naturally refers to Aaron, not Moses and
    Aaron jointly. 'His sons' preserves that grammatical detail, identifying the priestly
    family.
- source_word: שֹׁמְרִים מִשְׁמֶרֶת
  chosen: keeping charge
  alternatives:
  - guarding the duty
  - keeping the charge
  - performing the obligation
  lexicon: HALOT
  rationale: This cognate construction expresses the carrying out of an assigned responsibility.
    'Keeping charge' is concise, idiomatic, and preserves the custodial sense.
- source_word: הַמִּקְדָּשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the sacred precinct
  lexicon: HALOT
  rationale: In this context the term refers broadly to the holy sanctuary area/service,
    not merely one room. 'Sanctuary' is the most natural English equivalent.
- source_word: לְמִשְׁמֶרֶת בְּנֵי יִשְׂרָאֵל
  chosen: for the duty of the sons of Israel
  alternatives:
  - on behalf of the sons of Israel
  - as the obligation of the sons of Israel
  - for the charge of the sons of Israel
  lexicon: HALOT
  rationale: The phrase indicates that Moses, Aaron, and Aaron's sons discharge the
    cultic responsibility that belongs to Israel as a whole. 'For the duty of' preserves
    representative responsibility without overinterpreting it.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Per gender-accurate policy, the literal familial expression is retained
    where it denotes the covenant people corporately. 'Israelites' is possible but
    less formally aligned with the Hebrew wording.
- source_word: וְהַזָּר
  chosen: the outsider
  alternatives:
  - the unauthorized person
  - the stranger
  - the layman
  lexicon: HALOT
  rationale: Here זָר means one not authorized to approach the sanctuary service,
    not necessarily a foreign ethnic stranger. 'Outsider' communicates exclusion from
    sacred office without importing ethnicity.
- source_word: הַקָּרֵב
  chosen: who comes near
  alternatives:
  - who approaches
  lexicon: HALOT
  rationale: This participle modifies 'the outsider' and refers to approaching the
    sanctuary unlawfully. 'Who comes near' is a transparent rendering of the Hebrew
    verbal idea.
- source_word: יוּמָת
  chosen: shall be put to death
  alternatives:
  - shall die
  - must be executed
  lexicon: HALOT
  rationale: The Hophal is causative/passive, indicating imposed death penalty rather
    than mere eventual death. 'Shall be put to death' best reflects that force.
