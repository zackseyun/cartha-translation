id: NUM.3.23
reference: Numbers 3:23
source:
  edition: WLC
  text: מִשְׁפְּחֹ֖ת הַ/גֵּרְשֻׁנִּ֑י אַחֲרֵ֧י הַ/מִּשְׁכָּ֛ן יַחֲנ֖וּ יָֽמָּ/ה׃
translation:
  text: The clans of the Gershonites shall camp behind the tabernacle, toward the
    west.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally 'seaward,' a standard idiom for 'westward' in biblical
      Hebrew.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפְּחֹת
  chosen: clans
  alternatives:
  - families
  lexicon: HALOT
  rationale: In tribal and census contexts in Numbers, the term denotes kinship subdivisions
    within a larger tribe or Levitical group. 'Clans' communicates the corporate,
    lineage-based sense better than the more domestic-sounding 'families.'
- source_word: הַגֵּרְשֻׁנִּי
  chosen: the Gershonites
  alternatives:
  - the Gershonite clan
  - the Gershonite families
  lexicon: HALOT
  rationale: This gentilic singular with article functions collectively for the descendants/group
    associated with Gershon. 'The Gershonites' is standard, clear English for the
    collective sense.
- source_word: אַחֲרֵי
  chosen: behind
  alternatives:
  - after
  - at the rear of
  lexicon: HALOT
  rationale: Here the preposition is spatial, not temporal. 'Behind' is the most natural
    English rendering in a camp-position description.
- source_word: הַמִּשְׁכָּן
  chosen: the tabernacle
  alternatives:
  - the dwelling place
  lexicon: HALOT
  rationale: In Numbers this term refers to the sacred tent sanctuary. 'Tabernacle'
    is the established and sufficiently transparent English equivalent in this cultic
    context.
- source_word: יַחֲנוּ
  chosen: shall camp
  alternatives:
  - will camp
  - shall encamp
  lexicon: HALOT
  rationale: The imperfect here gives the prescribed arrangement of Israel's camp.
    'Shall camp' fits the directive/descriptive force and reads naturally in English.
- source_word: יָמָּה
  chosen: toward the west
  alternatives:
  - westward
  - on the west side
  - seaward
  lexicon: HALOT
  rationale: Literally a directional form from 'sea,' used idiomatically for west
    in biblical Hebrew. 'Toward the west' preserves the directional nuance and is
    clearer for modern readers than the more literal but potentially opaque 'seaward.'
