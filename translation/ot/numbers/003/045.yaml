id: NUM.3.45
reference: Numbers 3:45
source:
  edition: WLC
  text: קַ֣ח אֶת הַ/לְוִיִּ֗ם תַּ֤חַת כָּל בְּכוֹר֙ בִּ/בְנֵ֣י יִשְׂרָאֵ֔ל וְ/אֶת
    בֶּהֱמַ֥ת הַ/לְוִיִּ֖ם תַּ֣חַת בְּהֶמְתָּ֑/ם וְ/הָיוּ לִ֥/י הַ/לְוִיִּ֖ם אֲנִ֥י
    יְהוָֽה־־־־׃
translation:
  text: Take the Levites in place of every firstborn among the sons of Israel, and
    the livestock of the Levites in place of their livestock; and the Levites shall
    be mine. I am the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the Israelites.' The Hebrew reads 'among the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'instead of.' The Hebrew term expresses substitution.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'YHWH'; traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: קַח
  chosen: Take
  alternatives:
  - Accept
  - Receive
  lexicon: HALOT
  rationale: Imperative of לקח, here a direct command to Moses to take or designate
    the Levites as substitutes. 'Take' is the most natural and sufficiently formal
    rendering.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Standard transliteration of the tribal name/title. Repeated consistently
    throughout the verse.
- source_word: תַּחַת
  chosen: in place of
  alternatives:
  - instead of
  - under
  lexicon: HALOT
  rationale: In this cultic substitution context, תחת clearly expresses replacement/substitution,
    not spatial position. 'In place of' is clear modern English and preserves the
    representative exchange.
- source_word: כָּל בְּכוֹר
  chosen: every firstborn
  alternatives:
  - all the firstborn
  - each firstborn
  lexicon: HALOT
  rationale: The distributive sense of כל with singular בכור is well conveyed by 'every
    firstborn.'
- source_word: בִּבְנֵי יִשְׂרָאֵל
  chosen: among the sons of Israel
  alternatives:
  - among the Israelites
  - among the children of Israel
  lexicon: HALOT
  rationale: Gender-accurate rendering preserves the Hebrew idiom בני ישראל while
    remaining natural. 'Among' reflects the partitive sense with ב. 'Israelites' is
    possible, but 'sons of Israel' better reflects the source wording and Cartha's
    gender-accurate principle.
- source_word: בֶּהֱמַת הַלְוִיִּם
  chosen: the livestock of the Levites
  alternatives:
  - the cattle of the Levites
  - the animals of the Levites
  lexicon: HALOT
  rationale: בהמה here refers collectively to domesticated animals/livestock. 'Livestock'
    is the most natural collective term in modern English.
- source_word: בְּהֶמְתָּם
  chosen: their livestock
  alternatives:
  - their cattle
  - their animals
  lexicon: HALOT
  rationale: The 3mp suffix refers back to the sons of Israel/the corresponding firstborn
    households. 'Their livestock' preserves the collective sense and the substitution
    parallelism.
- source_word: וְהָיוּ לִי
  chosen: shall be mine
  alternatives:
  - shall belong to me
  - will be mine
  lexicon: HALOT
  rationale: Expresses covenantal possession. 'Shall be mine' is concise, solemn,
    and fits the declarative force of the clause.
- source_word: אֲנִי יְהוָה
  chosen: I am the LORD
  alternatives:
  - I am Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The clause functions as
    the divine self-identification and authority formula closing the command.
