id: NUM.3.27
reference: Numbers 3:27
source:
  edition: WLC
  text: וְ/לִ/קְהָ֗ת מִשְׁפַּ֤חַת הַֽ/עַמְרָמִי֙ וּ/מִשְׁפַּ֣חַת הַ/יִּצְהָרִ֔י וּ/מִשְׁפַּ֨חַת֙
    הַֽ/חֶבְרֹנִ֔י וּ/מִשְׁפַּ֖חַת הָֽ/עָזִּיאֵלִ֑י אֵ֥לֶּה הֵ֖ם מִשְׁפְּחֹ֥ת הַ/קְּהָתִֽי׃
translation:
  text: 'And for Kohath: the clan of the Amramites, and the clan of the Izharites,
    and the clan of the Hebronites, and the clan of the Uzzielites—these are the clans
    of the Kohathites.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/לִ/קְהָת
  chosen: And for Kohath
  alternatives:
  - And to Kohath
  - As for Kohath
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition introduce the next genealogical
    grouping. 'And for Kohath' is natural English while preserving the classificatory
    force of the Hebrew.
- source_word: מִשְׁפַּחַת
  chosen: the clan of
  alternatives:
  - the family of
  lexicon: HALOT
  rationale: מִשְׁפָּחָה in census/genealogical contexts denotes a kinship subdivision
    within a tribe or larger house. 'Clan' best fits this administrative-genealogical
    sense in modern English.
- source_word: הַֽ/עַמְרָמִי
  chosen: the Amramites
  alternatives:
  - the Amramite clan
  lexicon: HALOT
  rationale: The gentilic form refers to descendants of Amram. 'Amramites' is the
    standard and concise English rendering.
- source_word: הַ/יִּצְהָרִי
  chosen: the Izharites
  alternatives:
  - the Izeharites
  lexicon: HALOT
  rationale: The gentilic from Izhar is conventionally rendered 'Izharites.' This
    preserves the personal-name derivation clearly.
- source_word: הַֽ/חֶבְרֹנִי
  chosen: the Hebronites
  alternatives:
  - the Hebronite clan
  lexicon: HALOT
  rationale: The gentilic denotes descendants of Hebron; 'Hebronites' is idiomatic
    and consistent with the surrounding names.
- source_word: הָֽ/עָזִּיאֵלִי
  chosen: the Uzzielites
  alternatives:
  - the Uzzielite clan
  lexicon: HALOT
  rationale: The gentilic denotes descendants of Uzziel. 'Uzzielites' is the standard
    transliterated plural form.
- source_word: אֵלֶּה הֵם
  chosen: these are
  alternatives:
  - these were
  lexicon: HALOT
  rationale: The demonstrative plus pronoun gives an identifying statement. Present
    tense is normal in English for this kind of classification.
- source_word: מִשְׁפְּחֹת הַ/קְּהָתִי
  chosen: the clans of the Kohathites
  alternatives:
  - the families of the Kohathite
  lexicon: HALOT
  rationale: The plural construct with the gentilic summarizes the listed subgroups
    as belonging to Kohath. 'Clans of the Kohathites' is clear, natural, and consistent
    with the earlier rendering of מִשְׁפָּחָה as 'clan'.
