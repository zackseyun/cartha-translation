id: NUM.3.47
reference: Numbers 3:47
source:
  edition: WLC
  text: וְ/לָקַחְתָּ֗ חֲמֵ֧שֶׁת חֲמֵ֛שֶׁת שְׁקָלִ֖ים לַ/גֻּלְגֹּ֑לֶת בְּ/שֶׁ֤קֶל הַ/קֹּ֨דֶשׁ֙
    תִּקָּ֔ח עֶשְׂרִ֥ים גֵּרָ֖ה הַ/שָּֽׁקֶל׃
translation:
  text: you shall take five shekels apiece, according to the sanctuary shekel; the
    shekel is twenty gerahs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'five shekels per head.'
    reason: lexical_alternative
  - marker: b
    text: That is, according to the standard sanctuary weight; one shekel equaled
      twenty gerahs.
    reason: cultural_note
lexical_decisions:
- source_word: וְלָקַחְתָּ
  chosen: you shall take
  alternatives:
  - and you shall take
  - you must take
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in instructional context functions
    as a directive/future-like command. English 'you shall take' preserves the legal/instructional
    tone better than a simple past.
- source_word: חֲמֵשֶׁת חֲמֵשֶׁת שְׁקָלִים
  chosen: five shekels apiece
  alternatives:
  - five five shekels
  - five shekels each
  - five shekels per head
  lexicon: HALOT
  rationale: The distributive repetition of 'five' indicates an amount for each individual.
    'Apiece' is idiomatic modern English that preserves the distributive force without
    wooden repetition.
- source_word: לַגֻּלְגֹּלֶת
  chosen: apiece
  alternatives:
  - per head
  - for each skull
  lexicon: HALOT
  rationale: Literally 'for the skull/head,' an idiom meaning 'per person' or 'per
    head.' Because the distributive sense is already carried by 'apiece,' repeating
    'per head' in the main text would be clumsy. The more literal alternative is preserved
    in a footnote.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  chosen: according to the sanctuary shekel
  alternatives:
  - by the shekel of the sanctuary
  - in sanctuary shekels
  - by the holy shekel
  lexicon: HALOT
  rationale: This phrase specifies the standard of weight/currency to be used. 'According
    to the sanctuary shekel' is clear modern English and retains the cultic reference.
    'Holy shekel' is less idiomatic and may sound like a distinct coin rather than
    a standard.
- source_word: תִּקָּח
  chosen: the shekel is
  alternatives:
  - you shall take
  - you are to take
  lexicon: HALOT
  rationale: 'Although formally another 2ms verb (''you shall take''), in context
    it introduces the explanatory apposition about the shekel''s value. Rendering
    it woodenly would produce awkward English (''you shall take twenty gerahs the
    shekel''). The clause is best represented as an explanatory statement: ''the shekel
    is twenty gerahs.'''
- source_word: עֶשְׂרִים גֵּרָה
  chosen: twenty gerahs
  alternatives:
  - twenty gerah
  lexicon: HALOT
  rationale: A weight equivalence. English normally pluralizes the unit after a cardinal
    number in this kind of translation, while retaining the Hebrew term 'gerah/gerahs'
    as a technical measure.
- source_word: הַשָּׁקֶל
  chosen: the shekel
  alternatives:
  - a shekel
  lexicon: HALOT
  rationale: The article marks the known standard unit just mentioned. 'The shekel'
    fits the explanatory definition of the standard measure.
