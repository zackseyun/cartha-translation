id: NUM.3.43
reference: Numbers 3:43
source:
  edition: WLC
  text: וַ/יְהִי֩ כָל בְּכ֨וֹר זָכָ֜ר בְּ/מִסְפַּ֥ר שֵׁמ֛וֹת מִ/בֶּן חֹ֥דֶשׁ וָ/מַ֖עְלָ/ה
    לִ/פְקֻדֵי/הֶ֑ם שְׁנַ֤יִם וְ/עֶשְׂרִים֙ אֶ֔לֶף שְׁלֹשָׁ֥ה וְ/שִׁבְעִ֖ים וּ/מָאתָֽיִם־־׃פ
translation:
  text: And all the firstborn males, by the number of names, from a month old and
    upward, according to those counted of them, were twenty-two thousand, three hundred
    seventy-three.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'by the number of names' is a census expression meaning they were
      individually registered or counted by name.
    reason: cultural_note
  - marker: b
    text: Or 'according to their enrollment.' The Hebrew phrase refers to the official
      counting of the group.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... were
  alternatives:
  - And it was
  - And there were
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the census total. In English, rendering
    it with the plural predicate 'were' fits the plural subject 'all the firstborn
    males' and communicates the result naturally without adding meaning.
- source_word: כָל
  chosen: all
  alternatives:
  - the whole number of
  lexicon: HALOT
  rationale: Retains the comprehensive force of the Hebrew, indicating the totality
    of the group counted.
- source_word: בְּכוֹר זָכָר
  chosen: the firstborn males
  alternatives:
  - every male firstborn
  - all the male firstborn
  lexicon: HALOT
  rationale: This combines the noun and adjective into idiomatic English while preserving
    the gender-specific and birth-order sense required by the Hebrew.
- source_word: במספר שמות
  chosen: by the number of names
  alternatives:
  - by number of names
  - according to the number of names
  - listed by name
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the census idiom used in Numbers.
    It indicates enumeration by individual registration rather than an estimate. 'Listed
    by name' is possible but slightly more interpretive.
- source_word: מבן חדש ומעלה
  chosen: from a month old and upward
  alternatives:
  - from one month old and above
  - a month old or more
  lexicon: HALOT
  rationale: This is the standard age-threshold formula in census contexts. 'A month
    old and upward' is clear, natural, and close to the Hebrew wording.
- source_word: לפקדיהם
  chosen: according to those counted of them
  alternatives:
  - according to their enrollment
  - as counted by them
  - according to their number
  lexicon: HALOT
  rationale: The phrase refers to the census reckoning/enrollment of this group. The
    chosen rendering stays close to the Hebrew construction, though somewhat formal,
    and avoids collapsing it into a mere repetition of the final number.
- source_word: שנים ועשרים אלף
  chosen: twenty-two thousand
  alternatives:
  - two and twenty thousand
  lexicon: HALOT
  rationale: English idiom reverses the Hebrew number order. The meaning is straightforward.
- source_word: שלשה ושבעים ומאתים
  chosen: three hundred seventy-three
  alternatives:
  - and three and seventy and two hundred
  - two hundred seventy-three
  lexicon: HALOT
  rationale: The Hebrew sequence after 'twenty-two thousand' yields 373. Rendering
    in standard modern English number style ensures clarity.
