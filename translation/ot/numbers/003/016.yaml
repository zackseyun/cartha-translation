id: NUM.3.16
reference: Numbers 3:16
source:
  edition: WLC
  text: וַ/יִּפְקֹ֥ד אֹתָ֛/ם מֹשֶׁ֖ה עַל פִּ֣י יְהוָ֑ה כַּ/אֲשֶׁ֖ר צֻוָּֽה־׃
translation:
  text: So Moses counted them at the command of the LORD, just as he had been commanded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'according to the mouth of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפְקֹד
  chosen: counted
  alternatives:
  - numbered
  - mustered
  - enrolled
  lexicon: HALOT
  rationale: פקד in this census context refers to taking a count/register of persons.
    'Counted' is clear modern English and fits the immediate context of numbering
    the Levites.
- source_word: אֹתָם
  chosen: them
  rationale: Direct-object pronoun referring back to the Levites mentioned in context;
    standard English object pronoun is sufficient.
- source_word: עַל פִּי יְהוָה
  chosen: at the command of the LORD
  alternatives:
  - according to the word of the LORD
  - by the mouth of the LORD
  lexicon: HALOT
  rationale: The idiom עַל־פִּי literally means 'according to the mouth of,' but in
    context denotes acting by divine command/instruction. 'At the command of the LORD'
    is idiomatic English while preserving the authority conveyed. YHWH is rendered
    'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison/conformity with the prior command; 'just as' brings
    out the exact correspondence.
- source_word: צֻוָּה
  chosen: he had been commanded
  alternatives:
  - he was commanded
  - the LORD had commanded
  lexicon: HALOT
  rationale: 'The verb is passive/pual, ''was commanded.'' English past perfect passive
    (''had been commanded'') fits the sequence naturally: Moses counted them in accordance
    with a prior command. The subject is understood as Moses from context.'
