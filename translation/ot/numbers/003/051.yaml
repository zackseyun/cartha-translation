id: NUM.3.51
reference: Numbers 3:51
source:
  edition: WLC
  text: וַ/יִּתֵּ֨ן מֹשֶׁ֜ה אֶת כֶּ֧סֶף הַ/פְּדֻיִ֛ם לְ/אַהֲרֹ֥ן וּ/לְ/בָנָ֖י/ו עַל פִּ֣י יְהוָ֑ה כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אֶת מֹשֶֽׁה־־־׃פ
translation:
  text: And Moses gave the redemption money to Aaron and to his sons, at the command of Yahweh, just as Yahweh had commanded Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''silver of the redeemed ones''; that is, the payment collected for redemption.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  chosen: gave
  alternatives:
  - handed over
  lexicon: HALOT
  rationale: The waw-consecutive verb from נתן is straightforwardly rendered as a past narrative verb, 'gave.' 'Handed over' is possible but less natural here.
- source_word: כֶּסֶף
  chosen: money
  alternatives:
  - silver
  lexicon: HALOT
  rationale: Although the noun literally denotes 'silver,' in payment contexts it commonly refers to money/silver payment. Since this verse refers to the payment collected for redemption, 'money' best conveys the sense in natural English without losing meaning.
- source_word: הַפְּדֻיִם
  chosen: the redemption
  alternatives:
  - the redeemed ones
  - those who were redeemed
  - the ransom
  lexicon: HALOT
  rationale: The passive participial form from פדה literally refers to 'the redeemed ones,' but in construct with כסף it idiomatically denotes the payment associated with redemption. Rendering the phrase as 'the redemption money' communicates the intended referent in context from the preceding verses.
- source_word: כֶּסֶף הַפְּדֻיִם
  chosen: the redemption money
  alternatives:
  - the money of those redeemed
  - the ransom money
  lexicon: HALOT
  rationale: The construct chain is best rendered idiomatically in English. 'Redemption money' preserves the cultic/legal sense of payment for redemption while remaining readable.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  chosen: to Aaron and to his sons
  alternatives:
  - to Aaron and his sons
  lexicon: HALOT
  rationale: The repeated preposition is naturally represented in English. 'His sons' refers specifically to Aaron's sons, not generic descendants.
- source_word: עַל פִּי יְהוָה
  chosen: at the command of the LORD
  alternatives:
  - according to the word of the LORD
  - by the mouth of the LORD
  lexicon: HALOT
  rationale: The idiom literally means 'according to/by the mouth of YHWH' and commonly signifies action done by divine command. 'At the command of the LORD' is clear modern English and preserves the authority of the source expression.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה אֶת מֹשֶׁה
  chosen: just as the LORD had commanded Moses
  alternatives:
  - as the LORD commanded Moses
  lexicon: HALOT
  rationale: The comparative particle plus perfect verb points back to prior divine instruction. 'Just as' captures the correspondence, and the English past perfect fits the sequence naturally.
