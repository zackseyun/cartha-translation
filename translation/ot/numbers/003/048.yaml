id: NUM.3.48
reference: Numbers 3:48
source:
  edition: WLC
  text: וְ/נָתַתָּ֣ה הַ/כֶּ֔סֶף לְ/אַהֲרֹ֖ן וּ/לְ/בָנָ֑י/ו פְּדוּיֵ֕י הָ/עֹדְפִ֖ים
    בָּ/הֶֽם׃
translation:
  text: And you shall give the silver to Aaron and to his sons as the redemption price
    for those among them who are in excess.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'for the redeemed of those who are in excess among them.'
      The Hebrew compresses the idea into a construct chain; the main text unpacks
      it for clear English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה
  chosen: And you shall give
  alternatives:
  - And you must give
  - Then you shall give
  lexicon: HALOT
  rationale: 'Qal perfect 2ms with prefixed conjunction in instructional context functions
    as a directive/future: ''and you shall give.'' This preserves the sequence from
    the previous verse without over-paraphrasing.'
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - the money
  lexicon: HALOT
  rationale: כֶּסֶף literally denotes 'silver' and by extension money. In this census-redemption
    context the payment is monetary, but 'silver' stays closer to the Hebrew while
    remaining natural in English.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  chosen: to Aaron and to his sons
  alternatives:
  - to Aaron and his sons
  lexicon: HALOT
  rationale: The repeated preposition is represented in English for clarity and rhythm.
    'Sons' is retained as gender-accurate and contextually specific, referring to
    the priestly male descendants.
- source_word: פְּדוּיֵי
  chosen: as the redemption price for
  alternatives:
  - for the redeemed of
  - for the ransom of
  lexicon: HALOT
  rationale: Construct plural from פדה refers to those redeemed / the redemption amount
    connected with them. In this context, with 'the silver' as object, English idiom
    is best expressed as the payment constituting the redemption price, not merely
    'the redeemed ones.'
- source_word: הָעֹדְפִים
  chosen: those among them who are in excess
  alternatives:
  - the excess ones among them
  - those who are over the number among them
  - the ones remaining over among them
  lexicon: HALOT
  rationale: Participle from עודף denotes those exceeding the corresponding number.
    The phrase refers back to the surplus firstborn Israelites beyond the number of
    Levites. This rendering makes the census logic explicit without adding content
    not present in the Hebrew.
- source_word: בָּהֶם
  chosen: among them
  alternatives:
  - of them
  lexicon: HALOT
  rationale: The preposition ב with pronoun here is best rendered relationally as
    'among them,' indicating the surplus within the counted group.
