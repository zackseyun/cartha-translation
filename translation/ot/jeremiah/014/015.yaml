id: JER.14.15
reference: Jeremiah 14:15
source:
  edition: WLC
  text: לָ/כֵ֞ן כֹּֽה אָמַ֣ר יְהוָ֗ה עַֽל הַ/נְּבִאִ֞ים הַ/נִּבְּאִ֣ים בִּ/שְׁמִ/י֮ וַ/אֲנִ֣י לֹֽא שְׁלַחְתִּי/ם֒ וְ/הֵ֨מָּה֙ אֹֽמְרִ֔ים חֶ֣רֶב וְ/רָעָ֔ב לֹ֥א יִהְיֶ֖ה בָּ/אָ֣רֶץ הַ/זֹּ֑את בַּ/חֶ֤רֶב וּ/בָֽ/רָעָב֙ יִתַּ֔מּוּ הַ/נְּבִאִ֖ים הָ/הֵֽמָּה־־־׃
translation:
  text: 'Therefore thus says Yahweh concerning the prophets who prophesy in my name though I did not send them, and who say, ‘Sword and famine will not be in this land’: by sword and by famine those prophets will be consumed.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'war and famine will not come upon this land.' The Hebrew reads literally, 'sword and famine will not be in this land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding context; 'therefore' preserves the discourse connection clearly in English.
- source_word: כֹּה אָמַר יְהוָה
  chosen: thus says the LORD
  alternatives:
  - this is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal prophetic register, and יְהוָה follows the doctrinal default 'the LORD'.
- source_word: עַל
  chosen: concerning
  alternatives:
  - about
  - against
  lexicon: HALOT
  rationale: Here introduces the topic of the divine pronouncement regarding the prophets. 'Concerning' is broad enough to include implicit judgment without over-specifying 'against' in the preposition itself.
- source_word: הַנְּבִאִים הַנִּבְּאִים
  chosen: the prophets who prophesy
  alternatives:
  - the prophets prophesying
  - those prophets who are prophesying
  lexicon: HALOT
  rationale: Retains the Hebrew wordplay/cognate construction between noun and verb rather than flattening it to simply 'the prophets'.
- source_word: בִּשְׁמִי
  chosen: in my name
  alternatives:
  - under my name
  - by my authority
  lexicon: HALOT
  rationale: The idiom denotes claimed authorization/representation. 'In my name' is the natural and sufficiently transparent English equivalent.
- source_word: וַאֲנִי לֹא שְׁלַחְתִּים
  chosen: though I did not send them
  alternatives:
  - but I did not send them
  - when I did not send them
  lexicon: HALOT
  rationale: The clause is adversative to their claim of authority. 'Though' captures the contrast smoothly in English while preserving the sense.
- source_word: וְהֵמָּה אֹמְרִים
  chosen: and who keep saying
  alternatives:
  - and they are saying
  - while they say
  - and they say
  lexicon: HALOT
  rationale: The participial/imperfective sense is iterative or ongoing in context; 'keep saying' reflects repeated proclamation by the false prophets.
- source_word: חֶרֶב וְרָעָב
  chosen: Sword and famine
  alternatives:
  - war and famine
  lexicon: HALOT
  rationale: חֶרֶב is literally 'sword' and is a common prophetic shorthand for warfare/judgment. Retaining 'sword' preserves the stock judgment triad language of Jeremiah.
- source_word: לֹא יִהְיֶה בָּאָרֶץ הַזֹּאת
  chosen: will not be in this land
  alternatives:
  - shall not happen in this land
  - will not come upon this land
  lexicon: HALOT
  rationale: A close rendering of the existential clause. More idiomatic alternatives are possible, but this preserves the Hebrew structure without obscurity.
- source_word: בַּחֶרֶב וּבָרָעָב
  chosen: by sword and by famine
  alternatives:
  - by the sword and by famine
  - through sword and famine
  lexicon: HALOT
  rationale: Instrumental beth indicates means of judgment. Repeating 'by' preserves the parallelism and solemn cadence.
- source_word: יִתַּמּוּ
  chosen: will be consumed
  alternatives:
  - will come to an end
  - will perish
  - will be finished off
  lexicon: HALOT
  rationale: The verb conveys being finished/completed in the sense of being used up or destroyed. 'Will be consumed' fits the judgment context and avoids colloquialism.
- source_word: הַנְּבִאִים הָהֵמָּה
  chosen: those prophets
  alternatives:
  - those very prophets
  - the prophets themselves
  lexicon: HALOT
  rationale: The demonstrative adds emphasis and points back to the specific false prophets just described. 'Those prophets' is natural and preserves the deictic force.
