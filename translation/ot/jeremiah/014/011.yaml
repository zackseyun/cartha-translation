id: JER.14.11
reference: Jeremiah 14:11
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוָ֖ה אֵלָ֑/י אַל תִּתְפַּלֵּ֛ל בְּעַד הָ/עָ֥ם הַ/זֶּ֖ה לְ/טוֹבָֽה־־׃
translation:
  text: Then Yahweh said to me, “Do not pray for the welfare of this people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Do not pray on behalf of this people for their welfare.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  - So ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence better than a bare 'and.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Standard preposition plus 1cs suffix; 'to me' is the natural modern English equivalent.
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - You must not
  lexicon: HALOT
  rationale: Used with the imperfect/jussive to express prohibition. 'Do not' is the straightforward English prohibition.
- source_word: תִּתְפַּלֵּל
  chosen: pray
  alternatives:
  - intercede
  - make intercession
  lexicon: HALOT
  rationale: The hitpael of פלל commonly means 'pray.' While intercessory force is present in context, the following phrase 'for this people' already conveys that object, so 'pray' is sufficient and less interpretively loaded.
- source_word: בְּעַד
  chosen: for
  alternatives:
  - on behalf of
  - in behalf of
  lexicon: HALOT
  rationale: Here the preposition marks intercession on behalf of someone. 'For' is idiomatic and concise; 'on behalf of' is possible but heavier.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: The singular noun with demonstrative is best preserved as 'this people.' 'These people' would smooth the English but lose the Hebrew singular collective; 'this nation' is possible but 'people' is the more direct lexical match.
- source_word: לְטוֹבָה
  chosen: for the good
  alternatives:
  - for their welfare
  - for good
  - for blessing
  lexicon: HALOT
  rationale: The phrase indicates prayer aimed at their benefit or well-being. 'For the good' closely reflects the Hebrew while remaining natural. 'For their welfare' is a viable contextual alternative but slightly more interpretive.
