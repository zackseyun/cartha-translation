id: JER.14.21
reference: Jeremiah 14:21
source:
  edition: WLC
  text: אַל תִּנְאַץ֙ לְמַ֣עַן שִׁמְ/ךָ֔ אַל תְּנַבֵּ֖ל כִּסֵּ֣א כְבוֹדֶ֑/ךָ זְכֹ֕ר
    אַל תָּפֵ֥ר בְּרִֽיתְ/ךָ֖ אִתָּֽ/נוּ־־־׃
translation:
  text: Do not spurn us, for the sake of your name; do not dishonor your glorious
    throne. Remember; do not break your covenant with us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'the throne of your glory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּנְאַץ
  chosen: spurn
  alternatives:
  - reject
  - despise
  - treat with contempt
  lexicon: HALOT
  rationale: נאץ in this stem conveys contemptuous rejection, stronger than a neutral
    'reject.' 'Spurn' preserves the emotional force in natural English without over-paraphrasing.
    The object 'us' is implied from the prayer context and the final phrase 'with
    us,' so it is supplied for intelligibility.
- source_word: לְמַעַן שִׁמְךָ
  chosen: for the sake of your name
  alternatives:
  - because of your name
  - on account of your name
  lexicon: HALOT
  rationale: This idiom appeals to God's reputation/character as the basis for action.
    'For the sake of your name' is a standard, clear rendering that preserves the
    covenantal-theological force of 'name.'
- source_word: תְּנַבֵּל
  chosen: dishonor
  alternatives:
  - disgrace
  - defile
  - treat shamefully
  lexicon: HALOT
  rationale: נבל in the piel here means to treat as foolish/shameful or to dishonor.
    'Dishonor' fits the direct object 'your glorious throne' and avoids implying ritual
    impurity ('defile') more strongly than the Hebrew requires.
- source_word: כִּסֵּא כְבוֹדֶךָ
  chosen: your glorious throne
  alternatives:
  - the throne of your glory
  - your throne of glory
  lexicon: HALOT
  rationale: The construct phrase is literally 'throne of your glory.' 'Your glorious
    throne' is a natural English equivalent that preserves the sense. The more formal
    alternatives are possible; the footnote preserves the most literal option.
- source_word: זְכֹר
  chosen: Remember
  alternatives:
  - Call to mind
  lexicon: HALOT
  rationale: A direct imperative to God. 'Remember' is the standard covenantal rendering
    and preserves the prayer's urgency.
- source_word: תָּפֵר
  chosen: break
  alternatives:
  - violate
  - annul
  lexicon: HALOT
  rationale: פרר with covenant commonly means to break or violate. 'Break' is the
    clearest modern English choice and fits covenant language well.
- source_word: בְּרִיתְךָ אִתָּנוּ
  chosen: your covenant with us
  alternatives:
  - the covenant you made with us
  lexicon: HALOT
  rationale: ברית is straightforwardly 'covenant.' The prepositional phrase אִתָּנוּ
    is best rendered 'with us.' Expanding to 'you made' would be interpretive and
    is unnecessary.
