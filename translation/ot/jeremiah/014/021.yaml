theological_decisions:
- issue: Referent of 'your glorious throne'
  chosen_reading: Retained as 'your glorious throne' without specifying whether it
    refers to the temple, Zion, or God's heavenly throne.
  alternative_readings:
  - the temple/Zion as the earthly throne of God's glory
  - God's heavenly throne
  rationale: The Hebrew phrase is evocative and may intentionally allow layered reference.
    In keeping with the translation philosophy, the rendering preserves the theological
    tension rather than resolving it in the main text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
