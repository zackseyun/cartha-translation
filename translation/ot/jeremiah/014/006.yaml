id: JER.14.6
reference: Jeremiah 14:6
source:
  edition: WLC
  text: וּ/פְרָאִים֙ עָמְד֣וּ עַל שְׁפָיִ֔ם שָׁאֲפ֥וּ ר֖וּחַ כַּ/תַּנִּ֑ים כָּל֥וּ
    עֵינֵי/הֶ֖ם כִּי אֵ֥ין עֵֽשֶׂב־־׃
translation:
  text: And the wild donkeys stand on the bare heights; they pant for air like jackals.
    Their eyes fail, because there is no grass.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wild asses.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they gasp for breath' or more literally 'they draw in wind.'
    reason: lexical_alternative
  - marker: c
    text: Or 'like jackals'; older translations sometimes have 'like dragons,' but
      the Hebrew here most likely refers to a desert scavenger animal in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פְרָאִים
  chosen: and the wild donkeys
  alternatives:
  - and the wild asses
  lexicon: HALOT
  rationale: פְרָאִים denotes wild donkeys/onagers, not domesticated donkeys. 'Wild
    donkeys' is accurate modern English; 'wild asses' is traditional but less natural
    in contemporary usage.
- source_word: עָמְדוּ
  chosen: stand
  alternatives:
  - stood
  lexicon: HALOT
  rationale: Qal perfect 3cp can be rendered with English present in vivid descriptive
    context. The verse depicts ongoing drought conditions, so present tense reads
    naturally in English while preserving the scene.
- source_word: עַל שְׁפָיִם
  chosen: on the bare heights
  alternatives:
  - on the barren heights
  - on the high places
  lexicon: HALOT
  rationale: שְׁפָיִם refers to bare, treeless heights/hilltops. 'Bare heights' captures
    both elevation and exposed barrenness better than the more cultically loaded 'high
    places' in this context.
- source_word: שָׁאֲפוּ רוּחַ
  chosen: they pant for air
  alternatives:
  - they gasp for breath
  - they sniff the wind
  lexicon: HALOT
  rationale: The idiom literally involves drawing in wind/air. In context of drought-stricken
    animals, 'pant for air' communicates desperate breathing clearly in modern English.
- source_word: כַּ/תַּנִּים
  chosen: like jackals
  alternatives:
  - like sea monsters
  - like dragons
  lexicon: HALOT
  rationale: In this terrestrial wilderness context, תַּנִּים is best understood as
    jackals, a common prophetic image for desolate places. Older renderings such as
    'dragons' reflect archaic English usage, not the likely animal reference here.
- source_word: כָּלוּ עֵינֵיהֶם
  chosen: their eyes fail
  alternatives:
  - their eyes grow dim
  - their eyes waste away
  lexicon: HALOT
  rationale: כלה with 'eyes' expresses failing, dimming, or wasting from exhaustion.
    'Their eyes fail' is concise, idiomatic, and preserves the physical collapse implied
    by the Hebrew.
- source_word: כִּי אֵין עֵשֶׂב
  chosen: because there is no grass
  alternatives:
  - because there is no vegetation
  - because there is no herbage
  lexicon: HALOT
  rationale: עֵשֶׂב commonly denotes grass/herbage available for grazing. 'Grass'
    is the most natural and contextually precise choice for drought affecting wild
    grazing animals.
