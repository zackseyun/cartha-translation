id: JER.14.4
reference: Jeremiah 14:4
source:
  edition: WLC
  text: בַּ/עֲב֤וּר הָ/אֲדָמָה֙ חַ֔תָּה כִּ֛י לֹא הָיָ֥ה גֶ֖שֶׁם בָּ/אָ֑רֶץ בֹּ֥שׁוּ
    אִכָּרִ֖ים חָפ֥וּ רֹאשָֽׁ/ם־׃
translation:
  text: Because the ground is cracked, since there has been no rain in the land, the
    farmers are ashamed; they cover their heads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ground is shattered/broken.' The Hebrew verb can denote being broken
      or dismayed; in this drought context it likely refers to the earth being cracked
      open.
    reason: lexical_alternative
  - marker: b
    text: Covering the head is a cultural sign of shame, grief, or mourning.
    reason: cultural_note
lexical_decisions:
- source_word: בַּעֲבוּר
  chosen: Because
  alternatives:
  - On account of
  - Because of
  lexicon: HALOT
  rationale: Introduces the cause of the following condition. 'Because' gives natural
    English while preserving the causal force.
- source_word: הָאֲדָמָה
  chosen: the ground
  alternatives:
  - the soil
  - the land
  lexicon: HALOT
  rationale: Here the term refers to the cultivated earth affected by drought, so
    'ground' is more precise than the broader 'land' and more natural than 'soil'
    in this poetic-prophetic context.
- source_word: חַתָּה
  chosen: is cracked
  alternatives:
  - is dismayed
  - is shattered
  - is broken
  lexicon: HALOT
  rationale: In context of drought and lack of rain, the verb describes the earth
    as broken open or fissured. 'Is cracked' captures the physical effect on the ground
    better than more abstract renderings.
- source_word: כִּי
  chosen: since
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: A second causal conjunction explaining why the ground is cracked. 'Since'
    avoids awkward repetition after the initial 'Because' while preserving the explanatory
    force.
- source_word: גֶשֶׁם
  chosen: rain
  alternatives:
  - rainfall
  lexicon: HALOT
  rationale: Standard rendering for precipitation; simple and direct.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - on the earth
  - in the country
  lexicon: HALOT
  rationale: Refers to the land of Judah/the region under judgment. 'In the land'
    is idiomatic and preserves the covenant-land resonance without over-specifying.
- source_word: בֹּשׁוּ
  chosen: are ashamed
  alternatives:
  - are put to shame
  - are disappointed
  lexicon: HALOT
  rationale: The verb commonly denotes shame or humiliation. 'Are ashamed' is concise
    and fits the visible mourning gesture that follows.
- source_word: אִכָּרִים
  chosen: the farmers
  alternatives:
  - plowmen
  - farmers
  lexicon: HALOT
  rationale: Refers to agricultural workers. 'Farmers' is clear modern English; 'plowmen'
    is more literal/traditional but less natural and narrower.
- source_word: חָפוּ רֹאשָׁם
  chosen: they cover their heads
  alternatives:
  - they have covered their heads
  - they veil their heads
  lexicon: HALOT
  rationale: An idiom of shame, grief, or mourning. The present English form fits
    the verse's descriptive sequence and preserves the cultural gesture without over-interpreting
    it.
