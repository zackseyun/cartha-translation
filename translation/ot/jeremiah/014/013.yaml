id: JER.14.13
reference: Jeremiah 14:13
source:
  edition: WLC
  text: וָ/אֹמַ֞ר אֲהָ֣הּ אֲדֹנָ֣/י יְהוִ֗ה הִנֵּ֨ה הַ/נְּבִאִ֜ים אֹמְרִ֤ים לָ/הֶם֙ לֹֽא תִרְא֣וּ חֶ֔רֶב וְ/רָעָ֖ב לֹֽא יִהְיֶ֣ה לָ/כֶ֑ם כִּֽי שְׁל֤וֹם אֱמֶת֙ אֶתֵּ֣ן לָ/כֶ֔ם בַּ/מָּק֖וֹם הַ/זֶּֽה׀־־־׃ס
translation:
  text: Then I said, “Ah, Lord Yahweh, look, the prophets are saying to them, ‘You will not see the sword, and famine will not be for you, for I will give you true peace in this place.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “peace that is true” for the Hebrew expression “true peace.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲהָהּ
  chosen: Ah
  alternatives:
  - Alas
  - Ah!
  lexicon: HALOT
  rationale: Interjection of lament/distress. 'Ah' preserves the exclamatory force in natural modern English without over-specifying grief as 'alas.'
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord GOD
  - Lord Yahweh
  - my Lord, the LORD
  lexicon: HALOT
  rationale: The compound divine title combines אֲדֹנָי with YHWH. Following doctrine, YHWH is rendered 'the LORD' by default, but in the fixed English convention for אֲדֹנָי יְהוִה, 'Lord GOD' avoids the awkward 'Lord LORD' while signaling the divine name.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Deictic particle drawing attention. 'Look' is readable modern English and preserves the discourse force better than archaic 'behold.'
- source_word: הַנְּבִאִים
  chosen: the prophets
  alternatives:
  - the prophets
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun with article.
- source_word: אֹמְרִים לָהֶם
  chosen: are saying to them
  alternatives:
  - say to them
  - keep saying to them
  lexicon: HALOT
  rationale: The participle conveys ongoing or characteristic action. 'Are saying' reflects the present, progressive sense in context.
- source_word: לֹא תִרְאוּ חֶרֶב
  chosen: You will not see the sword
  alternatives:
  - You will not experience the sword
  - No sword will you see
  lexicon: HALOT
  rationale: Hebrew idiom literally uses 'see' with 'sword.' Retaining 'see the sword' preserves the vividness and remains intelligible in English.
- source_word: חֶרֶב
  chosen: the sword
  alternatives:
  - sword
  - war
  lexicon: HALOT
  rationale: Literally 'sword,' a common metonym for warfare or violent judgment. The concrete image is preserved in the main text rather than generalized to 'war.'
- source_word: וְרָעָב לֹא יִהְיֶה לָכֶם
  chosen: and famine will not come upon you
  alternatives:
  - and there will be no famine for you
  - and famine will not be yours
  lexicon: HALOT
  rationale: The Hebrew literally says 'famine will not be to/for you.' 'Will not come upon you' expresses the idiomatic sense of famine not affecting them.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - rather
  lexicon: HALOT
  rationale: Introduces the content/reason given by the prophets. 'For' fits direct speech naturally.
- source_word: שְׁלוֹם אֱמֶת
  chosen: true peace
  alternatives:
  - peace of truth
  - lasting peace
  - reliable peace
  lexicon: HALOT
  rationale: The collocation joins שָׁלוֹם with אֱמֶת. 'True peace' is concise and natural, conveying peace that is genuine rather than deceptive. More wooden 'peace of truth' is less idiomatic in English.
- source_word: אֶתֵּן לָכֶם
  chosen: I will give you
  alternatives:
  - I am giving you
  - I will grant you
  lexicon: HALOT
  rationale: Simple future promise in the prophets' quoted speech.
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: in this place
  alternatives:
  - at this place
  - in this land
  lexicon: HALOT
  rationale: Literal and contextually sufficient. 'Place' likely refers to Jerusalem/Judah in context, but the text itself says 'place,' so that is retained.
