theological_decisions:
- issue: Interpretation of prophet and priest in judgment
  chosen_reading: The verse depicts even the religious leaders as disoriented and
    helpless under judgment, not as offering a positive theological solution.
  alternative_readings:
  - The phrase could imply they engage in trade for survival.
  - The phrase could imply they are exiled into a foreign land.
  rationale: The Hebrew of סָחֲרוּ אֶל אֶרֶץ וְלֹא יָדָעוּ is difficult. The chosen
    rendering preserves the picture of movement and ignorance without importing a
    stronger doctrinal claim about guilt, exile, or commerce than the text clearly
    states.
  doctrine_reference: Preserve theological tension rather than resolve it.
