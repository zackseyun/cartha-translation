id: JER.14.18
reference: Jeremiah 14:18
source:
  edition: WLC
  text: אִם יָצָ֣אתִי הַ/שָּׂדֶ֗ה וְ/הִנֵּה֙ חַלְלֵי חֶ֔רֶב וְ/אִם֙ בָּ֣אתִי הָ/עִ֔יר
    וְ/הִנֵּ֖ה תַּחֲלוּאֵ֣י רָעָ֑ב כִּֽי גַם נָבִ֧יא גַם כֹּהֵ֛ן סָחֲר֥וּ אֶל אֶ֖רֶץ
    וְ/לֹ֥א יָדָֽעוּ־־־־־־׃ס
translation:
  text: If I go out into the field, look—those slain by the sword! And if I enter
    the city, look—those sick with famine! For both prophet and priest wander through
    the land and do not know what to do.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'both prophet and priest go about trading in the land and do not understand,'
      since the Hebrew verb can carry a commercial sense as well as movement.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult Hebrew. It may also mean 'they have gone into
      a land they do not know' or simply 'they do not understand.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִם יָצָאתִי
  chosen: If I go out
  alternatives:
  - Though I go out
  - When I go out
  lexicon: HALOT
  rationale: The Hebrew conditional particle אִם with the perfect can express a vivid
    conditional or hypothetical observation. In English, present 'If I go out' is
    natural and preserves the rhetorical force better than a wooden past 'If I went
    out.'
- source_word: הַשָּׂדֶה
  chosen: the field
  alternatives:
  - the countryside
  - the open country
  lexicon: HALOT
  rationale: שָׂדֶה is literally 'field,' but in context it contrasts with 'the city'
    and refers broadly to the open country. 'Field' preserves the lexical contrast
    while remaining idiomatic.
- source_word: וְהִנֵּה
  chosen: look—
  alternatives:
  - behold
  - there are
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention to what is seen. 'Look—'
    preserves the immediacy in readable modern English better than archaic 'behold.'
- source_word: חַלְלֵי חֶרֶב
  chosen: those slain by the sword
  alternatives:
  - the slain of the sword
  - sword-slain
  lexicon: HALOT
  rationale: חַלְלֵי denotes pierced/slain persons; with חֶרֶב it forms an idiom for
    violent death in war. 'Those slain by the sword' is clear and close to the Hebrew.
- source_word: בָּאתִי הָעִיר
  chosen: if I enter the city
  alternatives:
  - if I come into the city
  - if I go into the city
  lexicon: HALOT
  rationale: בוא with a destination commonly means 'enter/come into.' 'Enter the city'
    is concise and idiomatic in English.
- source_word: תַּחֲלוּאֵי רָעָב
  chosen: those sick with famine
  alternatives:
  - the diseases of famine
  - the sick ones of famine
  - famine-stricken
  lexicon: HALOT
  rationale: The noun תַּחֲלוּאִים/תַּחֲלוּאֵי relates to sicknesses or sick persons.
    In this context of visible victims paralleling 'those slain by the sword,' the
    phrase likely refers to people made sick by famine rather than abstract 'diseases.'
    'Those sick with famine' preserves the concrete parallelism.
- source_word: כִּי גַם נָבִיא גַם כֹּהֵן
  chosen: For both prophet and priest
  alternatives:
  - Indeed, both prophet and priest
  - For even prophet and priest
  lexicon: HALOT
  rationale: כִּי here introduces the explanation for the devastation. The repeated
    גַם marks both groups together. 'For both prophet and priest' captures the explanatory
    and emphatic force.
- source_word: סָחֲרוּ
  chosen: wander through
  alternatives:
  - go about trading
  - ply their trade
  - roam about
  lexicon: HALOT
  rationale: The verb סחר fundamentally relates to going about, often in trade or
    travel. In this context, 'go about trading' is possible but awkward and obscure;
    many understand the sense as roaming aimlessly through the land. 'Wander through'
    fits the context of disorientation and judgment while reflecting movement across
    the land.
- source_word: אֶל אֶרֶץ
  chosen: through the land
  alternatives:
  - into the land
  - to the land
  lexicon: HALOT
  rationale: Although אֶל often means 'to/into,' with a verb of movement like סחר
    in context it can denote movement about in a region. 'Through the land' makes
    the sense intelligible in English and matches the likely idiom.
- source_word: וְלֹא יָדָעוּ
  chosen: and do not know what to do
  alternatives:
  - and they do not know
  - and they do not understand
  lexicon: HALOT
  rationale: The Hebrew is literally 'and they do not know.' Because the object is
    unstated, English benefits from a slight completion of sense. 'What to do' conveys
    practical bewilderment implied by the context without over-paraphrasing.
