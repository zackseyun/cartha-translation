id: JER.14.22
reference: Jeremiah 14:22
source:
  edition: WLC
  text: הֲ/יֵ֨שׁ בְּ/הַבְלֵ֤י הַ/גּוֹיִם֙ מַגְשִׁמִ֔ים וְ/אִם הַ/שָּׁמַ֖יִם יִתְּנ֣וּ רְבִבִ֑ים הֲ/לֹ֨א אַתָּה ה֜וּא יְהוָ֤ה אֱלֹהֵ֨י/נוּ֙ וּ֨/נְקַוֶּה לָּ֔/ךְ כִּֽי אַתָּ֥ה עָשִׂ֖יתָ אֶת כָּל אֵֽלֶּה־־־־־־׃פ
translation:
  text: Are there any among the idols of the nations that bring rain? Or can the heavens give showers? Is it not you, O Yahweh our God? And we wait for you, for you have made all these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the vanities of the nations'; that is, the nations' idols or worthless gods.
    reason: lexical_alternative
  - marker: b
    text: Or 'And we hope in you' / 'Therefore we put our hope in you.' The Hebrew verb can express waiting with expectant hope.
    reason: lexical_alternative
  - marker: c
    text: Or 'you have done all these things.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲיֵשׁ
  chosen: Are there any
  alternatives:
  - Is there any
  lexicon: HALOT
  rationale: Introduces a rhetorical question about existence. English plural sense is carried by the following plural context ('idols ... that bring rain'), so 'Are there any' reads naturally while preserving the interrogative force.
- source_word: הַבְלֵי הַגּוֹיִם
  chosen: the idols of the nations
  alternatives:
  - the vanities of the nations
  - the worthless things of the nations
  lexicon: HALOT
  rationale: הֶבֶל literally denotes vapor/vanity and by extension worthless idols. In this prophetic polemic context, the referent is pagan gods/images, so 'idols' makes the sense explicit without undue paraphrase.
- source_word: מַגְשִׁמִים
  chosen: that bring rain
  alternatives:
  - that cause rain
  - that make it rain
  lexicon: HALOT
  rationale: From גשם in a causative verbal form, referring to producing rainfall. 'Bring rain' is idiomatic modern English and preserves the causative sense.
- source_word: וְאִם
  chosen: Or
  alternatives:
  - And if
  - or if
  lexicon: HALOT
  rationale: Here the conjunction introduces the second branch of a rhetorical alternative, best rendered idiomatically as 'Or' rather than a conditional 'and if' in English.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - the skies
  lexicon: HALOT
  rationale: The Hebrew plural commonly means 'heavens/sky.' 'The heavens' preserves the elevated register and the personified parallelism with the previous clause.
- source_word: יִתְּנוּ רְבִבִים
  chosen: give showers
  alternatives:
  - give abundant rain
  - send showers
  lexicon: HALOT
  rationale: רְבִבִים denotes rain-showers. 'Give showers' closely follows the Hebrew verb נתן while remaining natural English.
- source_word: הֲלֹא אַתָּה הוּא
  chosen: Is it not you
  alternatives:
  - Are you not the one
  - Is it not you yourself
  lexicon: HALOT
  rationale: This emphatic rhetorical construction identifies the LORD alone as the true source of rain. 'Is it not you' preserves the directness and emphasis.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward possessive construction; no reason to vary from the standard rendering.
- source_word: וּנְקַוֶּה לָּךְ
  chosen: So we wait for you
  alternatives:
  - And we hope in you
  - Therefore we put our hope in you
  - And we look to you
  lexicon: HALOT
  rationale: קוה can mean wait, hope, or look expectantly. In this prayer for rain and deliverance, the sense is expectant dependence. 'Wait for you' preserves the verbal image, while 'So' captures the inferential force in context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for Israel's waiting/hope in the LORD.
- source_word: עָשִׂיתָ אֶת כָּל אֵלֶּה
  chosen: you have made all these things
  alternatives:
  - you have done all these things
  - you made all these
  lexicon: HALOT
  rationale: עשה can mean do/make. Given the immediate context of rain, heavens, and divine sovereignty over nature, 'made' best conveys God's authorship over these realities, though 'done' is possible. 'Things' is supplied for natural English.
