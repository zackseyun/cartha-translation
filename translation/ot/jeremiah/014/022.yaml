theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of עָשִׂיתָ אֶת כָּל אֵלֶּה
  chosen_reading: you have made all these things
  alternative_readings:
  - you have done all these things
  rationale: The clause grounds trust in the LORD's sovereign agency over the phenomena under discussion, especially rain and the heavens. 'Made' foregrounds his authorship/creatorship without importing a broader doctrinal claim beyond the text.
