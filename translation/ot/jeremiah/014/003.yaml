id: JER.14.3
reference: Jeremiah 14:3
source:
  edition: WLC
  text: וְ/אַדִּ֣רֵי/הֶ֔ם שָׁלְח֥וּ צעורי/הם לַ/מָּ֑יִם בָּ֣אוּ עַל גֵּבִ֞ים לֹא מָ֣צְאוּ
    מַ֗יִם שָׁ֤בוּ כְלֵי/הֶם֙ רֵיקָ֔ם בֹּ֥שׁוּ וְ/הָכְלְמ֖וּ וְ/חָפ֥וּ רֹאשָֽׁ/ם־־׃
translation:
  text: Their nobles send their servants for water; they come to the cisterns and
    find no water. They return with their containers empty; they are ashamed and humiliated,
    and they cover their heads.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their youths' or 'their little ones' for 'their servants' (צְעוּרֵיהֶם);
      the context of nobles sending subordinates for water favors a social rather
      than age-based sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'pits' or 'pools' for 'cisterns.'
    reason: lexical_alternative
  - marker: c
    text: Covering the head was a cultural sign of shame, mourning, or distress.
    reason: cultural_note
lexical_decisions:
- source_word: אַדִּירֵיהֶם
  chosen: their nobles
  alternatives:
  - their nobles ones
  - their mighty men
  - their lords
  lexicon: HALOT
  rationale: The noun denotes prominent, powerful, or noble persons. In this context
    of social hierarchy during drought, 'their nobles' naturally contrasts with the
    subordinates they send.
- source_word: צְעוּרֵיהֶם
  chosen: their servants
  alternatives:
  - their little ones
  - their youths
  - their inferiors
  lexicon: HALOT
  rationale: Though the form can denote 'small/young ones,' in context it refers to
    lower-ranking dependents dispatched by the nobles. 'Servants' best captures the
    social relationship and task assignment in idiomatic English.
- source_word: לַמָּיִם
  chosen: for water
  alternatives:
  - to the water
  lexicon: HALOT
  rationale: 'With שלח, the phrase is idiomatically purposive: they send them ''for
    water,'' not merely ''to the water.'''
- source_word: גֵּבִים
  chosen: the cisterns
  alternatives:
  - pits
  - pools
  - reservoirs
  lexicon: HALOT
  rationale: In drought context, the word refers to water-holding excavations or reservoirs.
    'Cisterns' is the most precise and natural English rendering here.
- source_word: שָׁבוּ כְלֵיהֶם רֵיקָם
  chosen: They return with their containers empty
  alternatives:
  - they returned their vessels empty
  - they came back with empty jars
  lexicon: HALOT
  rationale: The clause describes the servants returning while their water vessels
    are empty. 'Containers' is readable modern English and broad enough for the unspecified
    vessels.
- source_word: בֹּשׁוּ וְהָכְלְמוּ
  chosen: they are ashamed and humiliated
  alternatives:
  - they are put to shame and disgraced
  - they are ashamed and confounded
  lexicon: HALOT
  rationale: The paired verbs intensify disgrace. Rendering them with two distinct
    but related English terms preserves the Hebrew parallelism without sounding archaic.
- source_word: וְחָפוּ רֹאשָׁם
  chosen: and they cover their heads
  alternatives:
  - and they veil their heads
  - and they hang their heads
  lexicon: HALOT
  rationale: The idiom refers to a gesture of mourning, shame, or despair. 'Cover
    their heads' is the most direct translation; more interpretive alternatives are
    unnecessary in the main text.
