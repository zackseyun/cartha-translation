theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern. The direct-address
    form 'O LORD' reflects prayerful vocative usage in English.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering מְשׁוּבֹתֵינוּ
  chosen_reading: our apostasies
  alternative_readings:
  - our backslidings
  - our turnings away
  rationale: The verse is a corporate confession of covenant breach. 'Apostasies'
    preserves the theological gravity of repeated turning away from the LORD without
    importing later technical dogmatic categories beyond the Hebrew sense.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
