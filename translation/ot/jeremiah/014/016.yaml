id: JER.14.16
reference: Jeremiah 14:16
source:
  edition: WLC
  text: וְ/הָ/עָ֣ם אֲשֶׁר הֵ֣מָּה נִבְּאִ֣ים לָ/הֶ֡ם יִֽהְי֣וּ מֻשְׁלָכִים֩ בְּ/חֻצ֨וֹת
    יְרוּשָׁלִַ֜ם מִ/פְּנֵ֣י הָ/רָעָ֣ב וְ/הַ/חֶ֗רֶב וְ/אֵ֤ין מְקַבֵּר֙ לָ/הֵ֔מָּה
    הֵ֣מָּה נְשֵׁי/הֶ֔ם וּ/בְנֵי/הֶ֖ם וּ/בְנֹֽתֵי/הֶ֑ם וְ/שָׁפַכְתִּ֥י עֲלֵי/הֶ֖ם
    אֶת רָעָתָֽ/ם־׀־׃
translation:
  text: And the people to whom they are prophesying will be thrown out into the streets
    of Jerusalem because of the famine and the sword, with no one to bury them—they,
    their wives, their sons, and their daughters. And I will pour out on them their
    evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their wickedness,' or 'the disaster due to them / their calamity.' The
      Hebrew word can refer either to moral evil or to the resulting disaster.
    reason: alternative_reading
lexical_decisions:
- source_word: נִבְּאִים לָהֶם
  chosen: are prophesying to them
  alternatives:
  - are prophesying for them
  - prophesy to them
  lexicon: HALOT
  rationale: The Niphal of נבא here denotes prophetic speech directed toward the people.
    'Are prophesying to them' preserves the ongoing/passive-like participial sense
    in idiomatic English and fits the context of false prophets addressing the people.
- source_word: מֻשְׁלָכִים
  chosen: thrown out
  alternatives:
  - cast out
  - thrown down
  lexicon: HALOT
  rationale: The Hophal participle of שלך conveys being cast/thrown. 'Thrown out'
    captures the disgraceful exposure of corpses in the streets more naturally than
    the more wooden 'cast out.'
- source_word: בְּחֻצוֹת יְרוּשָׁלַםִ
  chosen: into the streets of Jerusalem
  alternatives:
  - in the streets of Jerusalem
  - throughout the streets of Jerusalem
  lexicon: HALOT
  rationale: חוצות refers to open places/streets. With the passive participle, 'into
    the streets' conveys the result of being thrown there.
- source_word: מִפְּנֵי הָרָעָב וְהַחֶרֶב
  chosen: because of the famine and the sword
  alternatives:
  - from before the famine and the sword
  - because of famine and sword
  lexicon: HALOT
  rationale: מִפְּנֵי here expresses cause. 'The sword' is retained rather than generalized
    to 'war' to preserve the concrete Hebrew idiom of judgment.
- source_word: וְאֵין מְקַבֵּר לָהֵמָּה
  chosen: with no one to bury them
  alternatives:
  - and there will be no one to bury them
  - and none will bury them
  lexicon: HALOT
  rationale: The existential אין plus participle expresses the absence of any burier.
    'With no one to bury them' reads naturally while preserving the force.
- source_word: הֵמָּה נְשֵׁיהֶם וּבְנֵיהֶם וּבְנֹתֵיהֶם
  chosen: they, their wives, their sons, and their daughters
  alternatives:
  - they and their wives, sons, and daughters
  lexicon: HALOT
  rationale: The pronoun הֵמָּה is resumptive/emphatic, followed by apposition listing
    family members. The chosen rendering preserves the emphasis and the full scope
    of those left unburied.
- source_word: וְשָׁפַכְתִּי
  chosen: I will pour out
  alternatives:
  - I will spill out
  - I will pour
  lexicon: HALOT
  rationale: שׁפך commonly means 'pour out' in contexts of wrath or judgment. This
    idiom should be preserved because it carries theological and rhetorical weight.
- source_word: אֶת רָעָתָם
  chosen: their evil
  alternatives:
  - their wickedness
  - the evil due to them
  - their calamity
  lexicon: HALOT
  rationale: רָעָה can mean moral evil or disaster/calamity. Here, in the idiom 'pour
    out on them,' the sense is the evil/judgment corresponding to them. I retained
    'their evil' as the most text-near rendering, while preserving more interpretive
    alternatives in a footnote because English readers may hear either source or consequence.
