theological_decisions:
- issue: Meaning of רָעָתָם in divine judgment formula
  chosen_reading: their evil
  alternative_readings:
  - their wickedness
  - the disaster due to them
  - their calamity
  rationale: The Hebrew allows either a reference to their own evil being requited
    or to the disaster brought upon them. To avoid over-resolving the ambiguity, the
    main text keeps the more literal 'their evil,' and a footnote preserves the judgment-oriented
    alternatives.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
