id: JER.14.14
reference: Jeremiah 14:14
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֵלַ֗/י שֶׁ֚קֶר הַ/נְּבִאִים֙ נִבְּאִ֣ים בִּ/שְׁמִ֔/י לֹ֤א שְׁלַחְתִּי/ם֙ וְ/לֹ֣א צִוִּיתִ֔י/ם וְ/לֹ֥א דִבַּ֖רְתִּי אֲלֵי/הֶ֑ם חֲז֨וֹן שֶׁ֜קֶר וְ/קֶ֤סֶם ו/אלול ו/תרמות לִבָּ֔/ם הֵ֖מָּה מִֽתְנַבְּאִ֥ים לָ/כֶֽם׃ס
translation:
  text: And Yahweh said to me, “The prophets are prophesying lies in my name. I did not send them, nor did I command them, nor did I speak to them. They are prophesying to you a false vision, divination, emptiness, and the deceit of their own heart.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “worthlessness” or “idol”; the Hebrew term can carry those senses in other contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in line with the DOCTRINE.md contested terms table.
- source_word: שֶׁקֶר
  chosen: lies / false
  alternatives:
  - deception
  - falsehood
  lexicon: HALOT
  rationale: The noun denotes falsehood or deception. In the predicative opening clause, English idiom favors 'prophesying lies'; in construct with חֲזוֹן, 'false vision' is the most natural equivalent while preserving the same semantic field.
- source_word: הַנְּבִאִים נִבְּאִים
  chosen: the prophets are prophesying
  alternatives:
  - the prophets prophesy
  - the prophets are acting as prophets
  lexicon: HALOT
  rationale: Preserves the verbal repetition and ongoing aspect of the Hebrew participial construction without sounding wooden.
- source_word: בִּשְׁמִי
  chosen: in my name
  alternatives:
  - under my name
  - by my authority
  lexicon: HALOT
  rationale: Standard idiomatic rendering that preserves the claim of divine authorization.
- source_word: לֹא שְׁלַחְתִּים
  chosen: I did not send them
  alternatives:
  - I have not sent them
  lexicon: HALOT
  rationale: Simple past fits the sequence of divine denials in English and accurately conveys lack of commission.
- source_word: וְלֹא צִוִּיתִים
  chosen: nor did I command them
  alternatives:
  - nor did I give them orders
  lexicon: HALOT
  rationale: '''Command'' best matches prophetic commissioning language.'
- source_word: וְלֹא דִבַּרְתִּי אֲלֵיהֶם
  chosen: nor did I speak to them
  alternatives:
  - nor have I spoken to them
  lexicon: HALOT
  rationale: Maintains the triadic denial of sending, commanding, and speaking.
- source_word: חֲזוֹן שֶׁקֶר
  chosen: a false vision
  alternatives:
  - a lying vision
  - a deceptive vision
  lexicon: HALOT
  rationale: Readable modern English that preserves the construct relationship and prophetic context.
- source_word: קֶסֶם
  chosen: divination
  alternatives:
  - soothsaying
  - omens
  lexicon: HALOT
  rationale: The term refers to illicit mantic practice; 'divination' is the clearest standard English equivalent.
- source_word: אֱלִיל
  chosen: emptiness
  alternatives:
  - worthlessness
  - delusion
  - idol
  lexicon: HALOT
  rationale: The consonantal form here is commonly understood in context as something empty/worthless rather than a concrete 'idol.' 'Emptiness' fits the series of fraudulent prophetic content. Because 'idol' is a possible lexical alternative in other contexts, it is preserved in a footnote.
- source_word: תַּרְמוּת לִבָּם
  chosen: the deceit of their own heart
  alternatives:
  - the fraud of their own heart
  - the delusion of their own heart
  lexicon: HALOT
  rationale: Conveys inwardly generated deception. 'Their own heart' makes explicit the possessive force and sharpens the contrast with genuine revelation from the LORD.
- source_word: הֵמָּה מִתְנַבְּאִים לָכֶם
  chosen: They are prophesying to you
  alternatives:
  - they prophesy to you
  - they are prophesying for you
  lexicon: HALOT
  rationale: Retains the resumptive pronoun for emphasis in natural English and keeps the second-person addressee explicit.
