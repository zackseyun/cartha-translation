theological_decisions:
- issue: Nature of the false prophets' message
  chosen_reading: The verse denies divine authorization and presents the message as originating in deceptive human sources rather than from the LORD.
  alternative_readings:
  - The list could be read as four near-synonyms for false prophecy rather than distinct categories.
  rationale: The translation preserves the sequence as a list without over-interpreting whether each term marks a separate mode or simply piles up descriptors. This maintains the text's theological force without importing a more technical taxonomy of false revelation.
  doctrine_reference: Preserve theological tension rather than resolve it.
