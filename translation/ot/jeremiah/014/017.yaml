theological_decisions:
- issue: Personified expression 'virgin daughter of my people'
  chosen_reading: Retained as a metaphorical personification of the people/Judah rather
    than paraphrasing it away.
  alternative_readings:
  - the people of Judah
  - daughter Zion/my people as a poetic title
  rationale: The phrase is poetic and covenantally charged. Preserving the metaphor
    maintains the prophetic lament's emotional and literary force without making additional
    doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 3, 6
