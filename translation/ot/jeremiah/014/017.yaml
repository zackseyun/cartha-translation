id: JER.14.17
reference: Jeremiah 14:17
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֤ אֲלֵי/הֶם֙ אֶת הַ/דָּבָ֣ר הַ/זֶּ֔ה תֵּרַ֨דְנָה עֵינַ֥/י דִּמְעָ֛ה
    לַ֥יְלָה וְ/יוֹמָ֖ם וְ/אַל תִּדְמֶ֑ינָה כִּי֩ שֶׁ֨בֶר גָּד֜וֹל נִשְׁבְּרָ֗ה בְּתוּלַת֙
    בַּת עַמִּ֔/י מַכָּ֖ה נַחְלָ֥ה מְאֹֽד־־־׃
translation:
  text: 'And you shall say to them this word: ‘Let my eyes run down with tears night
    and day, and let them not cease, for the virgin daughter of my people is shattered
    with a great breaking, with a very grievous wound.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and let them not be silent' / 'and let them not rest'; the Hebrew verb
      can carry the sense of becoming still or ceasing.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the virgin daughter of my people,' a poetic personification of the
      people as a young woman.
    reason: cultural_note
  - marker: c
    text: Hebrew literally uses a cognate expression, 'a great breaking is broken,'
      for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  chosen: And you shall say to them
  alternatives:
  - And you must say to them
  - Then say to them
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic instruction functions
    as an imperative/future command. 'Shall say' preserves the directive force without
    sounding overly colloquial.
- source_word: אֶת־הַדָּבָר הַזֶּה
  chosen: this word
  alternatives:
  - this message
  - these words
  lexicon: HALOT
  rationale: דָּבָר often means 'word' or 'message.' Singular with demonstrative is
    retained as 'this word' to stay close to the Hebrew while remaining intelligible
    in English.
- source_word: תֵּרַדְנָה עֵינַי דִּמְעָה
  chosen: Let my eyes run down with tears
  alternatives:
  - My eyes will run down with tears
  - Let my eyes shed tears
  lexicon: HALOT
  rationale: The feminine plural verb agrees with 'eyes.' The idiom is vivid and personifies
    the eyes as flowing downward. 'Run down with tears' preserves the image better
    than the flatter 'shed tears.'
- source_word: לַיְלָה וְיוֹמָם
  chosen: night and day
  alternatives:
  - by night and by day
  - all night and all day
  lexicon: HALOT
  rationale: A standard merism for continual duration. 'Night and day' is natural
    English and preserves the sense of unceasing lament.
- source_word: וְאַל תִּדְמֶינָה
  chosen: and let them not cease
  alternatives:
  - and let them not be silent
  - and let them not rest
  lexicon: HALOT
  rationale: The verb דמה in this context carries the sense of stopping or becoming
    still. With 'eyes' as subject in a weeping context, 'let them not cease' most
    naturally means the tears are not to stop.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the lament. 'For' fits the solemn prophetic
    style.
- source_word: שֶׁבֶר גָּדוֹל נִשְׁבְּרָה
  chosen: is shattered with a great breaking
  alternatives:
  - has been broken with a great fracture
  - is broken with a great destruction
  lexicon: HALOT
  rationale: The Hebrew uses cognate noun and verb for rhetorical force. English cannot
    reproduce it exactly, but 'shattered with a great breaking' preserves both the
    passive result and the emphatic cognate effect better than a single bland verb.
- source_word: בְּתוּלַת בַּת־עַמִּי
  chosen: the virgin daughter of my people
  alternatives:
  - the maiden daughter of my people
  - my people's virgin daughter
  lexicon: HALOT
  rationale: A conventional personification for Zion/Judah. 'Virgin daughter' preserves
    the metaphor and its pathos without over-interpreting it as a literal individual.
- source_word: מַכָּה נַחְלָה מְאֹד
  chosen: with a very grievous wound
  alternatives:
  - with an exceedingly sickening blow
  - with a wound that is very severe
  lexicon: HALOT
  rationale: נַחְלָה here describes a wound as severe, grievous, or incurable/sickening.
    'Very grievous wound' is idiomatic English that preserves the intensity signaled
    by מְאֹד without importing a specific medical nuance not explicit in context.
