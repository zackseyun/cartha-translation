theological_decisions:
- issue: Divine address and title-like predicates
  chosen_reading: 'Render the opening as a direct vocative to God: ''O Hope of Israel,
    his Savior in time of distress'''
  alternative_readings:
  - O hope of Israel, its savior in time of trouble
  - Hope of Israel and its deliverer in time of distress
  rationale: The verse is a prayer addressed to the LORD, so the opening nouns function
    as titles/predicates of God. The translation preserves that devotional-theological
    force without importing later doctrinal content.
  doctrine_reference: Translation philosophy §§1, 6
