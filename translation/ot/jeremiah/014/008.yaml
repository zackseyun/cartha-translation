id: JER.14.8
reference: Jeremiah 14:8
source:
  edition: WLC
  text: מִקְוֵה֙ יִשְׂרָאֵ֔ל מֽוֹשִׁיע֖/וֹ בְּ/עֵ֣ת צָרָ֑ה לָ֤/מָּה תִֽהְיֶה֙ כְּ/גֵ֣ר
    בָּ/אָ֔רֶץ וּ/כְ/אֹרֵ֖חַ נָטָ֥ה לָ/לֽוּן׃
translation:
  text: O Hope of Israel, his Savior in time of distress, why should you be like a
    foreigner in the land, like a traveler who turns aside to spend the night?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a stranger in the land' or 'like a sojourner in the land.'
    reason: lexical_alternative
  - marker: b
    text: Or 'like a wayfarer who stops only to lodge.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְוֵה
  chosen: Hope
  alternatives:
  - hope
  - gathering
  - reservoir
  lexicon: HALOT
  rationale: In this vocative address to God, the abstract noun is used in the sense
    of the one in whom Israel hopes, a well-established contextual meaning in Jeremiah.
    'Hope' is the most natural English rendering here and preserves the theological
    force better than a concrete sense such as 'reservoir.' Capitalized because it
    functions as a divine title in direct address.
- source_word: מוֹשִׁיעוֹ
  chosen: his Savior
  alternatives:
  - its savior
  - the one who saves him
  lexicon: HALOT
  rationale: The form is 'his savior' with 3ms suffix referring back to Israel as
    a collective singular. 'His Savior' preserves the grammar while sounding natural
    in English. Capitalized because it is predicated of God in direct address.
- source_word: בְּעֵת צָרָה
  chosen: in time of distress
  alternatives:
  - in time of trouble
  - at the time of affliction
  lexicon: HALOT
  rationale: This phrase denotes a season of crisis. 'In time of distress' is idiomatic
    modern English and retains the gravity of צָרָה without sounding archaic.
- source_word: לָמָּה תִהְיֶה
  chosen: why should you be
  alternatives:
  - why will you be
  - why are you like
  lexicon: HALOT
  rationale: The imperfect here expresses a rhetorical question with modal force.
    'Why should you be' captures the lamenting, protest-like tone better than a simple
    future.
- source_word: כְּגֵר בָּאָרֶץ
  chosen: like a foreigner in the land
  alternatives:
  - like a stranger in the land
  - like a sojourner in the land
  lexicon: HALOT
  rationale: גֵר denotes a resident outsider/sojourner. 'Foreigner' communicates outsider
    status clearly to modern readers. 'In the land' is retained rather than 'in the
    country' to preserve biblical resonance and possible covenant-land overtones.
- source_word: וּכְאֹרֵחַ
  chosen: like a traveler
  alternatives:
  - like a wayfarer
  - like a passerby
  lexicon: HALOT
  rationale: The noun refers to one on a journey. 'Traveler' is clear modern English;
    'wayfarer' is accurate but archaic.
- source_word: נָטָה לָלוּן
  chosen: who turns aside to spend the night
  alternatives:
  - who pitches camp for the night
  - who stops only to lodge
  lexicon: HALOT
  rationale: The idiom conveys a temporary stopover for lodging. 'Turns aside to spend
    the night' preserves both the motion nuance of נָטָה and the lodging sense of
    לון without over-paraphrase.
