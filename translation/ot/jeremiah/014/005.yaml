id: JER.14.5
reference: Jeremiah 14:5
source:
  edition: WLC
  text: כִּ֤י גַם אַיֶּ֨לֶת֙ בַּ/שָּׂדֶ֔ה יָלְדָ֖ה וְ/עָז֑וֹב כִּ֥י לֹֽא הָיָ֖ה דֶּֽשֶׁא־־׃
translation:
  text: For even the doe in the field gives birth and abandons her young, because
    there is no grass.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and leaves it'; the Hebrew does not state the object explicitly, but
      the sense is that the doe abandons her newborn because there is no pasture.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation supporting the preceding lament; 'For' fits
    the discourse connection naturally in English.
- source_word: גַם
  chosen: even
  alternatives:
  - also
  lexicon: HALOT
  rationale: 'Adds emphasis: not only people and livestock suffer, but even wild animals.
    ''Even'' captures the rhetorical force better than the flatter ''also.'''
- source_word: אַיֶּלֶת
  chosen: the doe
  alternatives:
  - the hind
  - a female deer
  lexicon: HALOT
  rationale: Refers specifically to a female deer. 'Doe' is precise and readable modern
    English; 'hind' is accurate but more archaic.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the open country
  - in the countryside
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'Field' preserves the concrete imagery
    and matches common biblical usage.
- source_word: יָלְדָה
  chosen: gives birth
  alternatives:
  - has borne
  - bears
  lexicon: HALOT
  rationale: The verb denotes bearing young. Present-tense English is natural in vivid
    poetic description and pairs well with the following verb.
- source_word: וְעָזוֹב
  chosen: and abandons her young
  alternatives:
  - and leaves it
  - and forsakes it
  lexicon: HALOT
  rationale: From עזב, 'leave, forsake, abandon.' The object is implicit in Hebrew;
    in context it is the newborn offspring. Supplying 'her young' makes the sense
    clear in English without over-paraphrasing.
- source_word: כִּי לֹא הָיָה
  chosen: because there is no
  alternatives:
  - for there was no
  - since there was no
  lexicon: HALOT
  rationale: Gives the reason for the abandonment. English present tense suits the
    vivid description of ongoing drought conditions.
- source_word: דֶּשֶׁא
  chosen: grass
  alternatives:
  - fresh grass
  - green growth
  - vegetation
  lexicon: HALOT
  rationale: Refers to tender grass or fresh vegetation. 'Grass' is the clearest concise
    rendering; the nuance of fresh growth is contextually implied by drought.
