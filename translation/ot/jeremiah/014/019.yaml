id: JER.14.19
reference: Jeremiah 14:19
source:
  edition: WLC
  text: הֲ/מָאֹ֨ס מָאַ֜סְתָּ אֶת יְהוּדָ֗ה אִם בְּ/צִיּוֹן֙ גָּעֲלָ֣ה נַפְשֶׁ֔/ךָ
    מַדּ֨וּעַ֙ הִכִּיתָ֔/נוּ וְ/אֵ֥ין לָ֖/נוּ מַרְפֵּ֑א קַוֵּ֤ה לְ/שָׁלוֹם֙ וְ/אֵ֣ין
    ט֔וֹב וּ/לְ/עֵ֥ת מַרְפֵּ֖א וְ/הִנֵּ֥ה בְעָתָֽה־־׃
translation:
  text: Have you utterly rejected Judah? Does your soul loathe Zion? Why have you
    struck us so that there is no healing for us? We hoped for peace, but there was
    no good, and for a time of healing, but behold, terror.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Or does your soul loathe Zion?' The Hebrew particle can introduce the
      second question in a disjunctive sense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your soul,' a vivid expression for the inner self or whole person.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/מָאֹס מָאַסְתָּ
  chosen: Have you utterly rejected
  alternatives:
  - Have you completely rejected
  - Have you indeed rejected
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of מאס intensifies the verbal
    idea. 'Utterly rejected' captures the emphatic force in natural English without
    overparaphrase.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper name of the kingdom/people; transliterated as a standard English
    biblical name per translation philosophy.
- source_word: אִם
  chosen: Does
  alternatives:
  - Or has
  - If
  lexicon: HALOT
  rationale: Here אִם introduces the second interrogative clause in parallel with
    the first. English idiom prefers a direct question, 'Does your soul loathe Zion?'
    Some translations render it disjunctively ('or'), which is possible but not required.
- source_word: בְּ/צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Proper place/name for Jerusalem as covenant center; transliterated rather
    than translated.
- source_word: גָּעֲלָה
  chosen: loathe
  alternatives:
  - abhor
  - despise
  lexicon: HALOT
  rationale: געל conveys revulsion or abhorrence. 'Loathe' preserves the visceral
    force and fits the poetic lament.
- source_word: נַפְשֶׁךָ
  chosen: your soul
  alternatives:
  - you yourself
  - your being
  lexicon: HALOT
  rationale: נפש often denotes the inner self or whole person. 'Your soul' preserves
    the Hebrew expression and emotional intensity; alternatives are possible but less
    textually transparent.
- source_word: מַדּוּעַ
  chosen: Why
  lexicon: HALOT
  rationale: Straightforward interrogative asking the reason for divine striking.
- source_word: הִכִּיתָנוּ
  chosen: have you struck us
  alternatives:
  - have you smitten us
  - have you afflicted us
  lexicon: HALOT
  rationale: נכה is literally 'strike.' 'Struck' is clear modern English and preserves
    the concrete force better than the more interpretive 'afflicted.'
- source_word: מַרְפֵּא
  chosen: healing
  alternatives:
  - cure
  - remedy
  lexicon: HALOT
  rationale: The noun appears twice in the verse. 'Healing' works in both occurrences
    and preserves the metaphor of recovery from a wound or blow.
- source_word: קַוֵּה
  chosen: We hoped
  alternatives:
  - We waited
  - We looked eagerly
  lexicon: HALOT
  rationale: 'Though formally an infinitive/absolute-like form in the MT tradition,
    the phrase functions idiomatically as an expression of expectation: ''hoping for
    peace.'' English finite past ''We hoped'' best conveys the lament''s sense.'
- source_word: לְשָׁלוֹם
  chosen: for peace
  alternatives:
  - for well-being
  lexicon: HALOT
  rationale: שָׁלוֹם includes wholeness and well-being, but 'peace' is the standard
    concise rendering and suits the lament context.
- source_word: טוֹב
  chosen: good
  alternatives:
  - prosperity
  - well-being
  lexicon: HALOT
  rationale: טוב is broad. 'Good' keeps the Hebrew's generality; more specific renderings
    narrow the sense beyond the text.
- source_word: לְעֵת מַרְפֵּא
  chosen: for a time of healing
  alternatives:
  - for a time of cure
  - for a time of recovery
  lexicon: HALOT
  rationale: עֵת is 'time/season.' The phrase expresses expectation of an opportune
    period of restoration. 'A time of healing' is both literal and idiomatic.
- source_word: בְעָתָה
  chosen: terror
  alternatives:
  - dismay
  - sudden terror
  lexicon: HALOT
  rationale: The noun denotes terror or sudden fright. 'Terror' is concise and forceful;
    'dismay' is weaker than the Hebrew.
