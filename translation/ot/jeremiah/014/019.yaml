theological_decisions:
- issue: Divine rejection language toward Judah and Zion
  chosen_reading: Retain the lament's direct questions about whether the LORD has
    rejected Judah and loathes Zion without softening them.
  alternative_readings:
  - Soften to covenantal discipline language
  - Render more interpretively as temporary abandonment
  rationale: The verse voices Jeremiah's lament in stark covenantal terms. The translation
    should preserve the theological tension of prayer addressed to God amid judgment
    rather than resolve it by importing a doctrinal explanation not stated in the
    text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
