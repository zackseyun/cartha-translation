id: JER.14.1
reference: Jeremiah 14:1
source:
  edition: WLC
  text: אֲשֶׁ֨ר הָיָ֤ה דְבַר יְהוָה֙ אֶֽל יִרְמְיָ֔הוּ עַל דִּבְרֵ֖י הַ/בַּצָּרֽוֹת־־־׃
translation:
  text: The word of the LORD that came to Jeremiah concerning the droughts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'concerning the matters of the drought' or 'concerning the drought.'
      The Hebrew uses a plural form, which may refer to repeated drought conditions
      or to drought-related crises.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Introduces a relative clause linking the heading to the prophetic word.
    English 'that' is the most natural restrictive relative here.
- source_word: הָיָה
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: Although literally 'was,' the idiom הָיָה דְבַר־יְהוָה אֶל commonly means
    'the word of the LORD came to.' This is standard prophetic heading language, and
    'came' conveys the idiomatic sense without paraphrastic expansion.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Word' preserves the lexical link to דָּבָר
    and matches established biblical usage while remaining clear in modern English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English Bible convention.
- source_word: אֶל יִרְמְיָהוּ
  chosen: to Jeremiah
  alternatives:
  - unto Jeremiah
  lexicon: HALOT
  rationale: Straightforward directional phrase indicating the recipient of the divine
    word. 'To Jeremiah' is natural modern English.
- source_word: עַל
  chosen: concerning
  alternatives:
  - about
  - regarding
  - against
  lexicon: HALOT
  rationale: In this superscription, עַל introduces the subject matter of the oracle.
    'Concerning' is slightly more formal and fits prophetic heading style well.
- source_word: דִּבְרֵי
  chosen: concerning
  alternatives:
  - matters of
  - words of
  lexicon: HALOT
  rationale: In the collocation עַל דִּבְרֵי, the noun functions idiomatically to
    mean 'concerning the matter(s) of.' It is not best represented by a wooden 'words
    of' in English here, so the sense is absorbed into 'concerning' for naturalness
    and accuracy.
- source_word: הַבַּצָּרוֹת
  chosen: the droughts
  alternatives:
  - the drought
  - the scarcities
  - the famines
  lexicon: HALOT
  rationale: The plural noun denotes conditions of drought or resulting scarcity.
    'Droughts' best fits the immediate context of Jeremiah 14 and preserves the Hebrew
    plural. 'Famines' is too interpretive, and singular 'drought' smooths away the
    plural form.
