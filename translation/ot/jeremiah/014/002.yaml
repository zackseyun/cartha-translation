id: JER.14.2
reference: Jeremiah 14:2
source:
  edition: WLC
  text: אָבְלָ֣ה יְהוּדָ֔ה וּ/שְׁעָרֶ֥י/הָ אֻמְלְל֖וּ קָדְר֣וּ לָ/אָ֑רֶץ וְ/צִוְחַ֥ת
    יְרוּשָׁלִַ֖ם עָלָֽתָה׃
translation:
  text: Judah mourns, and her gates languish; they sit in darkness on the ground,
    and the cry of Jerusalem goes up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are dark to the ground' / 'grow black on the ground.' The Hebrew verb
      can denote becoming dark, often in mourning imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבְלָה
  chosen: mourns
  alternatives:
  - grieves
  - laments
  lexicon: HALOT
  rationale: Qal perfect of אבל conveys mourning/grieving. Present-tense English fits
    the poetic-prophetic description. 'Mourns' is concise and idiomatic.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Proper name for the nation/territory; transliterated per project philosophy.
- source_word: שְׁעָרֶיהָ
  chosen: her gates
  alternatives:
  - her gatekeepers
  - her cities' gates
  lexicon: HALOT
  rationale: שער normally means 'gate.' In context gates stand metonymically for civic
    life and public space, but the concrete image should be retained in translation.
- source_word: אֻמְלְלוּ
  chosen: languish
  alternatives:
  - wither
  - are miserable
  - droop
  lexicon: HALOT
  rationale: The passive/resultative sense denotes wasting away or becoming feeble.
    'Languish' preserves the image without over-literalizing as botanical 'wither.'
- source_word: קָדְרוּ
  chosen: sit in darkness
  alternatives:
  - are dark
  - mourn in black
  - grow black
  lexicon: HALOT
  rationale: The verb means to be dark/dusky and in mourning contexts can imply darkened
    appearance. Given the following לָאָרֶץ and the plural subject, English benefits
    from making the posture/state explicit as 'sit in darkness,' capturing both gloom
    and abasement.
- source_word: לָאָרֶץ
  chosen: on the ground
  alternatives:
  - to the الأرض
  - to the earth
  - on the earth
  lexicon: HALOT
  rationale: With קָדְרוּ in this lament context, the phrase likely expresses a posture
    of humiliation/mourning. 'On the ground' is more natural English than 'to the
    earth' while preserving the concrete image.
- source_word: צִוְחַת
  chosen: the cry
  alternatives:
  - the outcry
  - the scream
  lexicon: HALOT
  rationale: The noun denotes a cry of distress. 'Cry' is natural and sufficiently
    weighty in English.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Proper name; standard English transliteration.
- source_word: עָלָתָה
  chosen: goes up
  alternatives:
  - has gone up
  - rises
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend.' 'Goes up' preserves the concrete
    upward movement of the city's cry.
