theological_decisions:
- issue: Divine judgment language in the final cola
  chosen_reading: Now he will remember their iniquity and punish their sins
  alternative_readings:
  - Now he will remember their iniquity and visit their sins upon them
  rationale: The Hebrew uses covenant-judicial idiom. The translation preserves God's active judgment without importing a more technical doctrinal framework than the text itself states. 'Punish' communicates the sense of פקד in context, while the more literal idiom is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; readable modern English, not archaic or academic.
