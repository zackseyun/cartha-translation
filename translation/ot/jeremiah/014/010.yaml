id: JER.14.10
reference: Jeremiah 14:10
source:
  edition: WLC
  text: כֹּֽה אָמַ֨ר יְהוָ֜ה לָ/עָ֣ם הַ/זֶּ֗ה כֵּ֤ן אָֽהֲבוּ֙ לָ/נ֔וּעַ רַגְלֵי/הֶ֖ם לֹ֣א חָשָׂ֑כוּ וַ/יהוָה֙ לֹ֣א רָצָ֔/ם עַתָּה֙ יִזְכֹּ֣ר עֲוֺנָ֔/ם וְ/יִפְקֹ֖ד חַטֹּאתָֽ/ם־׃ס
translation:
  text: 'Thus says Yahweh concerning this people: Thus they have loved to wander; they have not restrained their feet. Therefore Yahweh does not accept them. Now he will remember their iniquity and punish their sins.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'they loved to wander' or 'they loved to roam.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'the LORD is not pleased with them.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'he will remember their iniquity and visit their sins upon them,' a Hebrew idiom for calling sin to account in judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָעָם הַזֶּה
  chosen: concerning this people
  alternatives:
  - to this people
  - for this people
  lexicon: HALOT
  rationale: The preposition ל here introduces the object about whom the divine statement is made; 'concerning this people' is idiomatic in English and fits prophetic speech formulas.
- source_word: כֵּן
  chosen: In this way
  alternatives:
  - Thus
  - So
  lexicon: HALOT
  rationale: 'כֵּן points forward/backward to manner: ''thus/in this way.'' Since the verse already begins with כֹּה אָמַר (''Thus says''), rendering this second particle as ''In this way'' avoids awkward repetition while preserving the sense of manner.'
- source_word: אָהֲבוּ לָנוּעַ
  chosen: they have loved to wander
  alternatives:
  - they loved to wander
  - they have loved to roam
  lexicon: HALOT
  rationale: אָהַב + infinitive expresses delight or preference in doing something. 'Have loved to wander' preserves both the affective force and the infinitive construction. 'Wander' fits נוּעַ in a moral/spiritual sense here.
- source_word: לָנוּעַ
  chosen: to wander
  alternatives:
  - to roam
  - to stray
  - to move about
  lexicon: HALOT
  rationale: In context of covenant unfaithfulness, נוּעַ carries the sense of restless straying rather than mere physical movement. 'Wander' is natural English and preserves the metaphorical force.
- source_word: רַגְלֵיהֶם לֹא חָשָׂכוּ
  chosen: they have not restrained their feet
  alternatives:
  - they have not spared their feet
  - they did not hold back their feet
  lexicon: HALOT
  rationale: The idiom literally mentions the feet, signaling unrestrained conduct. 'Restrained their feet' keeps the Hebrew imagery while making the idiom intelligible in English.
- source_word: לֹא רָצָם
  chosen: does not accept them
  alternatives:
  - is not pleased with them
  - does not delight in them
  - has not favored them
  lexicon: HALOT
  rationale: רצה in this context conveys favorable acceptance rather than mere emotional pleasure. 'Does not accept them' captures covenantal disfavor in clear modern English.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At this time
  - So now
  lexicon: HALOT
  rationale: עַתָּה marks the present consequence of their behavior. 'Now' is concise and natural.
- source_word: יִזְכֹּר עֲוֺנָם
  chosen: he will remember their iniquity
  alternatives:
  - he will remember their guilt
  - he will call their wrongdoing to mind
  lexicon: HALOT
  rationale: עָוֺן often denotes iniquity/guilt. 'Iniquity' preserves the moral-theological weight and pairs well with the following clause. 'Remember' should be retained literally because it signals judicial remembrance, not mere recollection.
- source_word: וְיִפְקֹד חַטֹּאתָם
  chosen: and punish their sins
  alternatives:
  - and visit their sins upon them
  - and attend to their sins
  lexicon: HALOT
  rationale: פקד can mean 'visit/attend to,' but in judgment contexts it commonly means to call to account or punish. 'Punish their sins' makes the judicial sense explicit in idiomatic English.
- source_word: עֲוֺנָם / חַטֹּאתָם
  chosen: their iniquity / their sins
  alternatives:
  - their guilt / their sin
  - their wrongdoing / their offenses
  lexicon: HALOT
  rationale: Using two distinct English terms reflects the Hebrew variation between עָוֺן and חַטָּאת rather than flattening both into the same gloss.
