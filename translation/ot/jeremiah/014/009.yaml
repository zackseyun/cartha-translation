id: JER.14.9
reference: Jeremiah 14:9
source:
  edition: WLC
  text: לָ֤/מָּה תִֽהְיֶה֙ כְּ/אִ֣ישׁ נִדְהָ֔ם כְּ/גִבּ֖וֹר לֹא יוּכַ֣ל לְ/הוֹשִׁ֑יעַ וְ/אַתָּ֧ה בְ/קִרְבֵּ֣/נוּ יְהוָ֗ה וְ/שִׁמְ/ךָ֛ עָלֵ֥י/נוּ נִקְרָ֖א אַל תַּנִּחֵֽ/נוּ־־׃ס
translation:
  text: Why should you be like a stunned man, like a warrior who cannot save? Yet you are in our midst, O Yahweh, and your name is called over us; do not forsake us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “we are called by your name.” Literally, “your name is called over us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - Why should
  lexicon: HALOT
  rationale: Interrogative adverb introducing Jeremiah's appeal. In English the following imperfect verb carries the nuance of 'should,' so the sentence as a whole reads naturally as 'Why should you be...'.
- source_word: תִהְיֶה
  chosen: should you be
  alternatives:
  - will you be
  - would you be
  lexicon: HALOT
  rationale: Qal imperfect 2ms of היה. In this lament/prayer context the imperfect has a modal nuance in English, expressing protest or appeal rather than simple future.
- source_word: כְּאִישׁ
  chosen: like a man
  alternatives:
  - like a person
  lexicon: HALOT
  rationale: אִישׁ is grammatically masculine and here means 'man' in an individual sense, not generic humanity. To avoid awkward repetition with the following participle, the main text uses 'like a stunned man.' This follows the gender-accurate principle.
- source_word: נִדְהָם
  chosen: stunned
  alternatives:
  - dismayed
  - astonished
  - appalled
  - speechless
  lexicon: HALOT
  rationale: The Niphal participle conveys being shocked, stupefied, or rendered helpless by astonishment. 'Stunned' is concise, natural English and fits the parallel with a warrior unable to save.
- source_word: כְּגִבּוֹר
  chosen: like a warrior
  alternatives:
  - like a mighty man
  - like a hero
  lexicon: HALOT
  rationale: גִּבּוֹר often denotes a strong warrior or mighty man. 'Warrior' best fits the immediate military-rescue imagery and is more idiomatic than 'mighty man.'
- source_word: לֹא יוּכַל לְהוֹשִׁיעַ
  chosen: who cannot save
  alternatives:
  - who is unable to deliver
  - who cannot rescue
  lexicon: HALOT
  rationale: יכול + infinitive expresses inability. הושיע commonly means save/deliver/rescue. 'Save' preserves the lexical force while remaining natural in English.
- source_word: וְאַתָּה בְקִרְבֵּנוּ
  chosen: Yet you are in our midst
  alternatives:
  - But you are among us
  - And you are in our midst
  lexicon: HALOT
  rationale: 'The conjunction marks contrast with the preceding comparison: God is not truly absent or helpless. ''Yet'' brings out the adversative force in context. בְקֶרֶב means ''in the midst/middle of,'' a covenant-presence expression.'
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְשִׁמְךָ עָלֵינוּ נִקְרָא
  chosen: your name is called over us
  alternatives:
  - we are called by your name
  - your name has been invoked over us
  lexicon: HALOT
  rationale: Literally, 'your name is called over us,' an idiom of belonging, covenant claim, or identification. The more idiomatic English alternative 'we are called by your name' is possible, but the chosen rendering preserves the Hebrew imagery more transparently.
- source_word: אַל תַּנִּחֵנוּ
  chosen: do not forsake us
  alternatives:
  - do not leave us
  - do not abandon us
  lexicon: HALOT
  rationale: Hiphil jussive/imperfect of נוח here carries the sense of leaving alone, letting go, or abandoning. 'Forsake' best matches the covenantal plea and the solemn tone.
