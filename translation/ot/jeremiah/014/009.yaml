theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O Yahweh
  alternative_readings:
  - Yahweh
  - the LORD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Idiomatic covenant formula וְשִׁמְךָ עָלֵינוּ נִקְרָא
  chosen_reading: your name is called over us
  alternative_readings:
  - we are called by your name
  rationale: The Hebrew idiom signals covenant belonging and divine claim. The main text keeps the more literal imagery to preserve the source-text texture; the idiomatic alternative is preserved in a footnote rather than replacing the Hebrew metaphor.
