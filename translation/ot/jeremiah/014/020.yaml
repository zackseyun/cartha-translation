id: JER.14.20
reference: Jeremiah 14:20
source:
  edition: WLC
  text: יָדַ֧עְנוּ יְהוָ֛ה רִשְׁעֵ֖/נוּ עֲוֺ֣ן אֲבוֹתֵ֑י/נוּ כִּ֥י חָטָ֖אנוּ לָֽ/ךְ׃
translation:
  text: We acknowledge, O Yahweh, our wickedness, the iniquity of our fathers, for we have sinned against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our ancestors.' The Hebrew reads 'our fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדַעְנוּ
  chosen: We acknowledge
  alternatives:
  - We know
  - We confess
  lexicon: HALOT
  rationale: The verb ידע literally means 'to know,' but in this penitential context it carries the sense of recognizing or admitting guilt before God. 'Acknowledge' preserves the cognitive sense while fitting the confessional force of the verse better than the flatter 'know.' 'Confess' is possible, but the direct object is the guilt itself rather than an explicit verbal confession formula.
- source_word: יְהוָה
  chosen: O Yahweh
  alternatives:
  - O Yahweh
  - O Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רִשְׁעֵנוּ
  chosen: our wickedness
  alternatives:
  - our guilt
  - our wicked acts
  lexicon: HALOT
  rationale: רֶשַׁע denotes wickedness or guilt in the sense of wrongdoing. 'Our wickedness' best reflects the abstract noun and pairs well with the following 'iniquity.'
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or the consequences of guilt. Here, in parallel with 'our wickedness' and followed by 'we have sinned,' 'iniquity' preserves the moral weight and avoids flattening the distinction among the Hebrew terms.
- source_word: אֲבוֹתֵינוּ
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'our fathers.' In line with the gender-accurate policy, 'our fathers' is retained rather than neutralizing to 'ancestors,' though the latter captures the broader familial sense.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'כִּי here introduces the ground for the acknowledgment: ''for/because we have sinned.'' ''For'' is natural and slightly more formal in prayer language.'
- source_word: חָטָאנוּ
  chosen: we have sinned
  alternatives:
  - we sinned
  lexicon: HALOT
  rationale: The perfect verb is well represented by English present perfect in a confessional context, expressing a completed act with present relevance.
- source_word: לָךְ
  chosen: against you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: With חטא, the preposition can mark the offended party; idiomatic English expresses this as 'sin against' someone rather than 'sin to' someone.
