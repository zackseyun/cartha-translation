id: JER.14.12
reference: Jeremiah 14:12
source:
  edition: WLC
  text: כִּ֣י יָצֻ֗מוּ אֵינֶ֤/נִּי שֹׁמֵ֨עַ֙ אֶל רִנָּתָ֔/ם וְ/כִ֧י יַעֲל֛וּ עֹלָ֥ה
    וּ/מִנְחָ֖ה אֵינֶ֣/נִּי רֹצָ֑/ם כִּ֗י בַּ/חֶ֨רֶב֙ וּ/בָ/רָעָ֣ב וּ/בַ/דֶּ֔בֶר אָנֹכִ֖י
    מְכַלֶּ֥ה אוֹתָֽ/ם־׃ס
translation:
  text: Though they fast, I am not listening to their cry; and though they offer up
    burnt offering and grain offering, I do not accept them. Rather, by the sword,
    by famine, and by pestilence I am consuming them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I do not hear their cry.'
    reason: lexical_alternative
  - marker: b
    text: Or 'grain offering' may also be understood more broadly as a 'tribute offering,'
      but in sacrificial context it usually refers to the grain offering.
    reason: lexical_alternative
  - marker: c
    text: Or 'I do not delight in them' or 'I do not favor them.'
    reason: lexical_alternative
  - marker: d
    text: '''Pestilence'' may also be rendered ''plague.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Though
  alternatives:
  - For
  - When
  - If
  lexicon: HALOT
  rationale: 'Here the conjunction introduces a concessive clause in context: despite
    fasting, YHWH will not respond. ''Though'' captures the force better than a simple
    causal ''for.'''
- source_word: יָצֻמוּ
  chosen: they fast
  alternatives:
  - they are fasting
  lexicon: HALOT
  rationale: Qal imperfect 3mp of צום, referring to the people's act of fasting. Simple
    present in English fits the conditional/concessive sense.
- source_word: אֵינֶנִּי שֹׁמֵעַ אֶל
  chosen: I am not listening to
  alternatives:
  - I do not hear
  - I am not hearing
  lexicon: HALOT
  rationale: The participle with negative expresses ongoing refusal to heed. 'Listening
    to' preserves the idiom of not attending to their plea, slightly more relational
    than bare 'hear.'
- source_word: רִנָּתָם
  chosen: their cry
  alternatives:
  - their outcry
  - their plea
  lexicon: HALOT
  rationale: רִנָּה can denote a ringing cry, often of supplication or lament. In
    this judgment context, 'cry' is natural and broad enough without overstating liturgical
    nuance.
- source_word: וְכִי
  chosen: and though
  alternatives:
  - and when
  - and if
  lexicon: HALOT
  rationale: 'As with the first clause, the conjunction is best taken concessively:
    even if they present offerings, YHWH will not accept them.'
- source_word: יַעֲלוּ
  chosen: they offer up
  alternatives:
  - they bring up
  - they present
  lexicon: HALOT
  rationale: Hiphil of עלה with sacrificial objects commonly means to offer up. This
    preserves sacrificial idiom in readable English.
- source_word: עֹלָה
  chosen: burnt offering
  alternatives:
  - whole burnt offering
  lexicon: HALOT
  rationale: Standard sacrificial term; 'burnt offering' is the established and accurate
    rendering.
- source_word: מִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - tribute offering
  lexicon: HALOT
  rationale: In cultic context, מִנְחָה refers to a grain offering rather than a generic
    gift. This is more precise than simply 'offering.'
- source_word: אֵינֶנִּי רֹצָם
  chosen: I do not accept them
  alternatives:
  - I do not delight in them
  - I do not favor them
  lexicon: HALOT
  rationale: רצה in sacrificial contexts often means to accept favorably. 'Accept
    them' communicates covenantal non-acceptance of the offerings and/or offerers
    in context.
- source_word: כִּי
  chosen: Rather
  alternatives:
  - For
  - But
  lexicon: HALOT
  rationale: This clause explains the divine response in contrast to the rejected
    rituals. 'Rather' makes the adversative-explanatory force clear in English.
- source_word: בַּחֶרֶב
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: HALOT
  rationale: Conventional rendering of the instrument of judgment; 'by the sword'
    fits the triad formula.
- source_word: וּבָרָעָב
  chosen: by famine
  alternatives:
  - and by hunger
  lexicon: HALOT
  rationale: רָעָב in judgment formulas is idiomatically 'famine.'
- source_word: וּבַדֶּבֶר
  chosen: and by pestilence
  alternatives:
  - and by plague
  lexicon: HALOT
  rationale: דֶּבֶר commonly denotes pestilence in prophetic judgment triads. 'Pestilence'
    preserves the formal gravity of the term.
- source_word: אָנֹכִי מְכַלֶּה אוֹתָם
  chosen: I am consuming them
  alternatives:
  - I am putting an end to them
  - I will consume them
  - I am destroying them
  lexicon: HALOT
  rationale: כלה with participle conveys active, ongoing destruction/completion. 'Consuming'
    preserves the lexical sense and the durative force better than a simple future.
