theological_decisions:
- issue: Divine refusal of ritual acts during judgment
  chosen_reading: The verse states that fasting and sacrificial offerings from this
    people will not be heard or accepted, because God is judging them.
  alternative_readings:
  - The rejection applies only to the prayers, not the sacrifices
  - The rejection is temporary without emphasis on judgment
  rationale: The parallel clauses reject both prayer and sacrifice, and the final
    clause grounds that rejection in active judgment by sword, famine, and pestilence.
    The translation avoids importing broader doctrinal claims about sacrifice beyond
    the verse itself.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Referent of 'them' in 'I do not accept them'
  chosen_reading: The pronoun is rendered as referring to the offered sacrifices in
    immediate context.
  alternative_readings:
  - The pronoun refers to the people themselves
  rationale: The nearest antecedents are 'burnt offering and grain offering.' In English,
    'accept them' most naturally refers to the offerings, while still allowing the
    broader implication that the worshipers are not favorably received.
  doctrine_reference: Translation philosophy item 5
