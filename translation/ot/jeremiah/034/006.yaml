id: JER.34.6
reference: Jeremiah 34:6
source:
  edition: WLC
  text: וַ/יְדַבֵּר֙ יִרְמְיָ֣הוּ הַ/נָּבִ֔יא אֶל צִדְקִיָּ֖הוּ מֶ֣לֶךְ יְהוּדָ֑ה
    אֵ֛ת כָּל הַ/דְּבָרִ֥ים הָ/אֵ֖לֶּה בִּ/ירוּשָׁלִָֽם־־׃
translation:
  text: Then Jeremiah the prophet spoke all these words to Zedekiah king of Judah
    in Jerusalem.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then ... spoke
  alternatives:
  - And ... spoke
  - said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, and English idiom often renders
    it naturally as 'Then' rather than repeatedly 'And.' The verb דבר in this construction
    is well rendered 'spoke' rather than the more specific 'said,' since it introduces
    the communication of the preceding message.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  rationale: Standard English transliteration of the personal name, following the
    translation philosophy to transliterate names.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Definite title identifying Jeremiah's role; translated directly rather
    than omitted, since it is explicit in the Hebrew and contributes to the authority
    of the speech.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition for the indirect object of speech; 'to'
    is the natural modern English equivalent.
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  rationale: Standard English transliteration of the royal name.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - the king of Judah
  lexicon: HALOT
  rationale: 'Construct chain rendered straightforwardly. English idiom does not require
    the article here because the proper name already identifies the referent: ''Zedekiah
    king of Judah.'''
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  - all these matters
  lexicon: HALOT
  rationale: דברים can mean 'words,' 'things,' or 'matters,' but here it refers to
    the prophetic utterance just given, so 'words' best preserves the verbal nature
    of the message. 'All' and 'these' are both retained to reflect the Hebrew emphasis.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Locative prepositional phrase translated directly. Its placement at the
    end is retained for natural English flow and to preserve the setting of the speech.
