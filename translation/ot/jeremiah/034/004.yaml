id: JER.34.4
reference: Jeremiah 34:4
source:
  edition: WLC
  text: אַ֚ךְ שְׁמַ֣ע דְּבַר יְהוָ֔ה צִדְקִיָּ֖הוּ מֶ֣לֶךְ יְהוּדָ֑ה כֹּֽה אָמַ֤ר
    יְהוָה֙ עָלֶ֔י/ךָ לֹ֥א תָמ֖וּת בֶּ/חָֽרֶב־־׃
translation:
  text: 'Yet hear the word of the LORD, Zedekiah king of Judah: Thus says the LORD
    concerning you, You shall not die by the sword.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אַךְ
  chosen: Yet
  alternatives:
  - Nevertheless
  - Only
  - Surely
  lexicon: HALOT
  rationale: אַךְ commonly marks limitation, contrast, or emphasis depending on context.
    Here it introduces a consoling qualification after the preceding judgment, so
    'Yet' best captures the adversative nuance in natural English.
- source_word: שְׁמַע
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: The imperative calls Zedekiah to receive a divine message. 'Hear' preserves
    the formal prophetic idiom 'hear the word of the LORD' and is standard, clear
    English.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: This is a common prophetic formula. 'Word' preserves the covenantal-prophetic
    register better than the more interpretive 'message.' 'LORD' follows the project's
    default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following longstanding reverential convention and the Septuagintal pattern.
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: A straightforward construct phrase identifying Zedekiah's royal office
    and realm.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: This fixed prophetic messenger formula is well represented by 'Thus says
    the LORD,' which preserves the solemn cadence of the Hebrew.
- source_word: עָלֶיךָ
  chosen: concerning you
  alternatives:
  - about you
  - against you
  - to you
  lexicon: HALOT
  rationale: The preposition עַל with speech can mean 'concerning/about.' Here the
    content is a pronouncement regarding Zedekiah's fate, not hostile action against
    him, so 'concerning you' is the most precise.
- source_word: לֹא תָמוּת
  chosen: You shall not die
  alternatives:
  - you will not die
  lexicon: HALOT
  rationale: The imperfect with negation expresses future outcome. 'You shall not
    die' fits the prophetic register and the solemnity of the oracle.
- source_word: בֶּחָרֶב
  chosen: by the sword
  alternatives:
  - by sword
  - in battle
  lexicon: HALOT
  rationale: The phrase denotes death by violent weapon, idiomatically 'by the sword.'
    This preserves the Hebrew image without over-interpreting it as specifically battlefield
    death.
