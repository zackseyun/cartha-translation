id: JER.34.2
reference: Jeremiah 34:2
source:
  edition: WLC
  text: כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל הָלֹךְ֙ וְ/אָ֣מַרְתָּ֔ אֶל צִדְקִיָּ֖הוּ מֶ֣לֶךְ יְהוּדָ֑ה וְ/אָמַרְתָּ֣ אֵלָ֗י/ו כֹּ֚ה אָמַ֣ר יְהוָ֔ה הִנְ/נִ֨י נֹתֵ֜ן אֶת הָ/עִ֤יר הַ/זֹּאת֙ בְּ/יַ֣ד מֶֽלֶךְ בָּבֶ֔ל וּ/שְׂרָפָ֖/הּ בָּ/אֵֽשׁ־־־־׃
translation:
  text: 'Thus says Yahweh, the God of Israel: Go and speak to Zedekiah king of Judah, and say to him, ‘Thus says Yahweh: Behold, I am giving this city into the hand of the king of Babylon, and he will burn it with fire.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “into the power of the king of Babylon.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' preserves the formal prophetic cadence without sounding archaic beyond normal biblical English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying YHWH covenantally.
- source_word: הָלֹךְ
  chosen: Go
  alternatives:
  - Go on
  - Proceed
  lexicon: HALOT
  rationale: Infinitive absolute used imperatively; concise English imperative best matches the command force.
- source_word: וְאָמַרְתָּ ... וְאָמַרְתָּ אֵלָיו
  chosen: and speak ... and say to him
  alternatives:
  - and tell ... and say to him
  lexicon: HALOT
  rationale: Retains the two speech verbs rather than collapsing them entirely; 'speak to' for the first clause and 'say to him' for the direct quotation gives natural English while preserving the Hebrew sequence.
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  rationale: Standard English transliteration of the proper name.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - the king of Judah
  lexicon: HALOT
  rationale: Appositional title following the name; article omitted in English for natural style with a proper name plus title.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: Marks solemn immediacy and divine resolve. 'Behold' preserves prophetic gravity better than more colloquial options.
- source_word: נֹתֵן
  chosen: am giving
  alternatives:
  - am about to give
  - give
  lexicon: HALOT
  rationale: Participle with imminent/future force; present progressive in English captures the announced certainty of the coming action.
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  alternatives:
  - the city, this one
  lexicon: HALOT
  rationale: Natural English rendering of the definite noun plus demonstrative.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: HALOT
  rationale: This idiom commonly denotes delivery into someone's power. Main text keeps the biblical idiom; a more interpretive alternative is worth preserving in a footnote.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  lexicon: HALOT
  rationale: Direct rendering of the royal title and place name.
- source_word: וּשְׂרָפָהּ בָּאֵשׁ
  chosen: and he will burn it with fire
  alternatives:
  - and he shall set it on fire
  - and he will burn it down
  lexicon: HALOT
  rationale: Verb plus object suffix and instrumental phrase. 'Burn it with fire' is slightly redundant in English but reflects the Hebrew emphasis and prophetic style.
