id: JER.34.8
reference: Jeremiah 34:8
source:
  edition: WLC
  text: הַ/דָּבָ֛ר אֲשֶׁר הָיָ֥ה אֶֽל יִרְמְיָ֖הוּ מֵ/אֵ֣ת יְהוָ֑ה אַחֲרֵ֡י כְּרֹת֩
    הַ/מֶּ֨לֶךְ צִדְקִיָּ֜הוּ בְּרִ֗ית אֶת כָּל הָ/עָם֙ אֲשֶׁ֣ר בִּ/ירֽוּשָׁלִַ֔ם
    לִ/קְרֹ֥א לָ/הֶ֖ם דְּרֽוֹר־־־־׃
translation:
  text: 'The word that came to Jeremiah from the LORD after King Zedekiah had made
    a covenant with all the people who were in Jerusalem, to proclaim liberty to them:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'cut a covenant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'freedom' or 'release.' The Hebrew term refers to formal emancipation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  chosen: The word
  alternatives:
  - This is the word
  - The message
  lexicon: HALOT
  rationale: Standard prophetic superscription formula. 'The word' preserves the concrete
    Hebrew idiom while remaining natural in English; 'message' is possible but less
    formally tied to recurring prophetic phrasing.
- source_word: הָיָה אֶל
  chosen: came to
  alternatives:
  - was to
  - happened to
  lexicon: HALOT
  rationale: In prophetic introduction formulas, היה + אל idiomatically means revelation
    coming to a prophet. 'Came to' is the established and accurate English equivalent.
- source_word: מֵאֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' rather than a transliteration.
    'From' accurately reflects source/origin.
- source_word: אַחֲרֵי כְּרֹת
  chosen: after ... had made
  alternatives:
  - after ... cut
  - after ... had cut
  lexicon: HALOT
  rationale: כרת ברית is the standard idiom 'make/cut a covenant.' English main text
    uses 'made a covenant' for readability; the more literal 'cut a covenant' is preserved
    as an alternative lexical note.
- source_word: בְּרִית
  chosen: a covenant
  alternatives:
  - an agreement
  - a treaty
  lexicon: HALOT
  rationale: '''Covenant'' is the theologically and lexically appropriate rendering
    for ברית, preserving the formal and relational weight of the Hebrew term.'
- source_word: אֶת כָּל הָעָם אֲשֶׁר בִּירוּשָׁלִַם
  chosen: with all the people who were in Jerusalem
  alternatives:
  - with all the people in Jerusalem
  - with all the populace in Jerusalem
  lexicon: HALOT
  rationale: Retains the comprehensiveness of כָּל and the relative clause. 'People'
    is the most natural rendering of הָעָם here.
- source_word: לִקְרֹא לָהֶם
  chosen: to proclaim to them
  alternatives:
  - to call out to them
  - to announce to them
  lexicon: HALOT
  rationale: With דְּרוֹר as object, קרא carries the sense of formal public proclamation.
    'Proclaim' best fits the legal-emancipatory context.
- source_word: דְּרוֹר
  chosen: liberty
  alternatives:
  - freedom
  - release
  lexicon: HALOT
  rationale: דְּרוֹר in this context refers to manumission/emancipation, echoing legal
    jubilee language. 'Liberty' preserves the formal proclamation sense and biblical
    resonance; 'freedom' is possible but slightly less juridical.
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
