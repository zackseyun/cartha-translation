id: JER.34.13
reference: Jeremiah 34:13
source:
  edition: WLC
  text: כֹּֽה אָמַ֥ר יְהוָ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל אָנֹכִ֗י כָּרַ֤תִּֽי בְרִית֙ אֶת
    אֲב֣וֹתֵי/כֶ֔ם בְּ/י֨וֹם הוֹצִאִ֤/י אוֹתָ/ם֙ מֵ/אֶ֣רֶץ מִצְרַ֔יִם מִ/בֵּ֥ית עֲבָדִ֖ים
    לֵ/אמֹֽר־־׃
translation:
  text: 'Thus says the LORD, the God of Israel: I myself made a covenant with your
    fathers on the day I brought them out from the land of Egypt, from the house of
    slaves, saying,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'cut a covenant.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the house of bondage.' The Hebrew is literally 'from the house
      of slaves.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal
    prophetic register without unnecessary archaism beyond established idiom.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD' in
    keeping with Jewish reverence tradition and the Septuagintal pattern.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase straightforwardly rendered; preserves covenantal identification.
- source_word: אָנֹכִי
  chosen: I myself
  alternatives:
  - I
  - I indeed
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis beyond the verbal subject already
    present in כָּרַתִּי. 'I myself' brings that emphasis into natural English.
- source_word: כָּרַתִּי בְרִית
  chosen: made a covenant
  alternatives:
  - cut a covenant
  lexicon: HALOT
  rationale: Hebrew idiom is literally 'cut a covenant,' but 'made a covenant' is
    the clearest optimal-equivalence rendering in modern English. The literal alternative
    is worth preserving in a footnote because of its covenantal significance.
- source_word: אֶת אֲבֹתֵיכֶם
  chosen: with your fathers
  alternatives:
  - with your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine/plural 'your fathers.' Per gender-accurate
    policy, the main text keeps 'fathers' rather than neutralizing to 'ancestors.'
- source_word: בְּיוֹם
  chosen: on the day
  alternatives:
  - when
  lexicon: HALOT
  rationale: More formally reflects the Hebrew temporal expression while remaining
    natural English.
- source_word: הוֹצִיאִי אוֹתָם
  chosen: I brought them out
  alternatives:
  - I led them out
  lexicon: HALOT
  rationale: '''Brought out'' is the standard rendering of יצא in the Hiphil in exodus
    contexts and preserves the intertextual resonance with the exodus formula.'
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: Retains the full covenant-historical phrase rather than compressing it.
- source_word: מִבֵּית עֲבָדִים
  chosen: from the house of slaves
  alternatives:
  - from the house of bondage
  - from the slave house
  lexicon: HALOT
  rationale: Literally 'from the house of slaves.' This preserves the concrete social
    reality of slavery better than the traditional but more abstract 'house of bondage.'
    'Slave house' is possible but less idiomatic.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'as follows:'
  lexicon: HALOT
  rationale: Introduces the quoted covenant stipulation in the next verse; the participial
    formula is naturally rendered 'saying,' and should end with a comma because the
    sentence continues.
