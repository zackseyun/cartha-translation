theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton and preserves
    continuity with covenantal usage without transliterating the name in the main
    text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering עֲבָדִים in the exodus formula
  chosen_reading: slaves
  alternative_readings:
  - bondage
  - servants
  rationale: The context is liberation from literal enslavement in Egypt, so 'slaves'
    best preserves the bonded nature of the term in line with the project's preference
    to avoid softening slavery language where salient.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy
    for δοῦλος
