id: JER.34.19
reference: Jeremiah 34:19
source:
  edition: WLC
  text: שָׂרֵ֨י יְהוּדָ֜ה וְ/שָׂרֵ֣י יְרוּשָׁלִַ֗ם הַ/סָּֽרִסִים֙ וְ/הַ/כֹּ֣הֲנִ֔ים
    וְ/כֹ֖ל עַ֣ם הָ/אָ֑רֶץ הָ/עֹ֣בְרִ֔ים בֵּ֖ין בִּתְרֵ֥י הָ/עֵֽגֶל׃
translation:
  text: the officials of Judah and the officials of Jerusalem, the court officials
    and the priests, and all the people of the land who passed between the pieces
    of the calf—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eunuchs.' The Hebrew term can refer either to literal eunuchs or to
      court officials.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי
  chosen: officials
  alternatives:
  - princes
  - leaders
  lexicon: HALOT
  rationale: שַׂר commonly denotes rulers or high officials. 'Officials' is natural
    modern English and fits both Judah and Jerusalem without sounding archaic like
    'princes.'
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Standard transliteration of the place/people name.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard English form of the city name.
- source_word: הַסָּרִסִים
  chosen: court officials
  alternatives:
  - eunuchs
  - royal officials
  lexicon: HALOT
  rationale: סָרִיס can mean literal 'eunuch' or, in many court contexts, a palace/court
    official. Here the social list favors an administrative class; 'court officials'
    communicates the likely function while avoiding overcommitting to physical status.
    The literal alternative is preserved in a footnote.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering for כֹּהֲנִים.
- source_word: כֹל עַם הָאָרֶץ
  chosen: all the people of the land
  alternatives:
  - all the people of the הארץ
  - all the common people of the land
  lexicon: HALOT
  rationale: Formally preserves the idiom and its collective scope. 'People of the
    land' is a recognized biblical-social expression; adding 'common' would overinterpret
    here.
- source_word: הָעֹבְרִים
  chosen: who passed
  alternatives:
  - who were passing
  - who crossed
  lexicon: HALOT
  rationale: The participle refers to those who performed the covenant rite. English
    relative clause 'who passed' is idiomatic and suits the retrospective list in
    context.
- source_word: בֵּין
  chosen: between
  alternatives:
  - through the midst of
  lexicon: HALOT
  rationale: Direct and standard rendering of the preposition in this covenant-rite
    expression.
- source_word: בִּתְרֵי
  chosen: the pieces of
  alternatives:
  - the parts of
  - the cut pieces of
  lexicon: HALOT
  rationale: בֶּתֶר denotes a piece or part, especially something cut in pieces. 'Pieces'
    is clear and idiomatic in the covenant context.
- source_word: הָעֵגֶל
  chosen: the calf
  alternatives:
  - the young bull
  lexicon: HALOT
  rationale: עֵגֶל most naturally means 'calf.' This matches the immediately preceding
    context of cutting the calf in two.
