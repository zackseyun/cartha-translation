theological_decisions:
- issue: Meaning of סָרִיסִים in the social list
  chosen_reading: administrative 'court officials' rather than explicitly 'eunuchs'
    in the main text
  alternative_readings:
  - eunuchs
  - royal officials
  rationale: The Hebrew term can denote either literal eunuchs or court officers.
    In this context, the verse enumerates social groups bound by the covenant ceremony,
    and an administrative sense is likely. To preserve the lexical ambiguity without
    overstating one interpretation, the main text uses 'court officials' and a footnote
    preserves 'eunuchs.'
  doctrine_reference: Translation philosophy §3 (preserve theological/interpretive
    tension where ambiguity is genuine)
