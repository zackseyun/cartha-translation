id: JER.34.1
reference: Jeremiah 34:1
source:
  edition: WLC
  text: הַ/דָּבָ֛ר אֲשֶׁר הָיָ֥ה אֶֽל יִרְמְיָ֖הוּ מֵ/אֵ֣ת יְהוָ֑ה וּ/נְבוּכַדְרֶאצַּ֣ר מֶֽלֶךְ בָּבֶ֣ל וְ/כָל חֵיל֡/וֹ וְ/כָל מַמְלְכ֣וֹת אֶרֶץ֩ מֶמְשֶׁ֨לֶת יָד֜/וֹ וְ/כָל הָ/עַמִּ֗ים נִלְחָמִ֧ים עַל יְרוּשָׁלִַ֛ם וְ/עַל כָּל עָרֶ֖י/הָ לֵ/אמֹֽר־־־׀־־־־־־׃
translation:
  text: The word that came to Jeremiah from Yahweh, when Nebuchadnezzar king of Babylon and all his army, and all the kingdoms of the earth under the dominion of his hand, and all the peoples, were fighting against Jerusalem and against all its cities, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Nebuchadrezzar''; the more familiar English form is ''Nebuchadnezzar.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'the kingdoms of the land under the dominion of his hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  chosen: The word
  alternatives:
  - The message
  - This is the word
  lexicon: HALOT
  rationale: דָּבָר in prophetic superscriptions commonly introduces a divine communication as 'the word.' This preserves the conventional prophetic formula without unnecessary paraphrase.
- source_word: אֲשֶׁר הָיָה אֶל
  chosen: that came to
  alternatives:
  - that was to
  - that happened to
  lexicon: HALOT
  rationale: The idiom 'the word that came to [prophet]' is standard in prophetic literature. Rendering הָיָה אֶל woodenly as 'was to' is less natural in English and obscures the formulaic sense.
- source_word: מֵאֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'From' accurately conveys מֵאֵת as source/origin.
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: Standard English transliteration favors 'Nebuchadnezzar,' though the Hebrew form here more closely reflects 'Nebuchadrezzar.' The standard form aids readability and recognition.
- source_word: חֵילוֹ
  chosen: his army
  alternatives:
  - his force
  - his host
  lexicon: HALOT
  rationale: חַיִל here refers to military forces. 'Army' is the clearest modern English rendering in this siege context.
- source_word: מַמְלְכוֹת אֶרֶץ
  chosen: the kingdoms of the earth
  alternatives:
  - the kingdoms of the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In this imperial context, referring to multiple kingdoms subject to Babylon, 'earth' best conveys the broad geopolitical scope without implying every kingdom globally in a modern absolute sense.
- source_word: מֶמְשֶׁלֶת יָדוֹ
  chosen: under the dominion of his hand
  alternatives:
  - under his rule
  - under the power of his hand
  lexicon: HALOT
  rationale: The phrase literally speaks of the dominion/rule of his hand. 'Under the dominion of his hand' preserves the concrete imagery of power while remaining readable. 'Under his rule' is possible but loses the hand imagery.
- source_word: הָעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  - the people-groups
  lexicon: HALOT
  rationale: עַמִּים often denotes distinct peoples. 'The peoples' preserves the plural ethnic-political sense better than the more interpretive 'nations' in this list.
- source_word: נִלְחָמִים עַל
  chosen: were fighting against
  alternatives:
  - were waging war against
  - were attacking
  lexicon: HALOT
  rationale: The participle conveys ongoing action, and עַל in this military context is naturally 'against.' 'Were fighting against' is clear and suitably direct.
- source_word: כָּל עָרֶיהָ
  chosen: all its cities
  alternatives:
  - all its towns
  lexicon: HALOT
  rationale: The suffix refers back to Jerusalem as the mother city representing the territory/jurisdiction of Judah around it. 'Cities' is the normal rendering of עָרִים and fits the military context.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'as follows:'
  lexicon: HALOT
  rationale: This infinitive introduces the following divine speech in the next verse. 'Saying,' preserves the discourse linkage straightforwardly.
