theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nature of the royal 'burning'
  chosen_reading: ceremonial burning of spices/aromatics in honor of the king, not cremation of the body
  alternative_readings:
  - funeral fire
  - burning in general terms
  rationale: The context concerns honorable royal burial customs. Rendering the phrase as ceremonial spice-burning avoids suggesting cremation, which would likely misrepresent the cultural practice and the promise of honorable treatment.
