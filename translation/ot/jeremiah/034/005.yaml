id: JER.34.5
reference: Jeremiah 34:5
source:
  edition: WLC
  text: בְּ/שָׁל֣וֹם תָּמ֗וּת וּֽ/כְ/מִשְׂרְפ֣וֹת אֲ֠בוֹתֶי/ךָ הַ/מְּלָכִ֨ים הָ/רִֽאשֹׁנִ֜ים אֲשֶׁר הָי֣וּ לְ/פָנֶ֗י/ךָ כֵּ֚ן יִשְׂרְפוּ לָ֔/ךְ וְ/ה֥וֹי אָד֖וֹן יִסְפְּדוּ לָ֑/ךְ כִּֽי דָבָ֥ר אֲנִֽי דִבַּ֖רְתִּי נְאֻם יְהוָֽה־־־־־־׃ס
translation:
  text: You will die in peace. And as spices were burned for your fathers, the former kings who were before you, so they will burn spices for you, and they will lament for you, saying, “Alas, lord!” For I have spoken the word, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'as funeral burnings were made for your fathers.' The Hebrew refers to ceremonial burnings in honor of deceased kings, likely of spices or aromatics, not the burning of the body.
    reason: cultural_note
  - marker: b
    text: Or 'Ah, lord!' The Hebrew is a formal cry of lament over a ruler.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשָׁלוֹם
  chosen: in peace
  alternatives:
  - peacefully
  lexicon: HALOT
  rationale: The prepositional phrase denotes the manner/circumstance of death. 'In peace' preserves the Hebrew idiom and can include the sense of a nonviolent or undisturbed death without over-interpreting it as emotional tranquility.
- source_word: תָּמוּת
  chosen: you will die
  alternatives:
  - you shall die
  lexicon: HALOT
  rationale: Simple future rendering of the Qal imperfect 2ms. 'Will die' is natural modern English and fits the prophetic assurance.
- source_word: וּכְמִשְׂרְפוֹת
  chosen: as spices were burned
  alternatives:
  - as burnings were made
  - as funeral fires were burned
  lexicon: HALOT
  rationale: The noun מִשְׂרֵפוֹת in royal burial contexts refers not to cremation of the body but to ceremonial burnings, likely of spices/aromatics, done in honor of the deceased. 'Spices were burned' makes the cultural sense explicit in readable English.
- source_word: אֲבוֹתֶיךָ
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: Literally 'your fathers.' In context it refers specifically to royal predecessors, not merely biological parents. The literal rendering is retained, with the following apposition clarifying the referent.
- source_word: הַמְּלָכִים הָרִאשֹׁנִים אֲשֶׁר הָיוּ לְפָנֶיךָ
  chosen: the former kings who were before you
  alternatives:
  - the earlier kings who preceded you
  lexicon: HALOT
  rationale: This appositional phrase identifies 'your fathers' as prior kings. 'Former kings who were before you' is slightly redundant in English but reflects the Hebrew emphasis on royal predecessors.
- source_word: כֵּן יִשְׂרְפוּ לָךְ
  chosen: so they will burn them for you
  alternatives:
  - so they will make a burning for you
  - so they will burn spices for you
  lexicon: HALOT
  rationale: The verb is active plural with dative 'for you.' Because English normally requires an object with 'burn,' 'them' is supplied to refer back to the ceremonial burnings/spices implied by מִשְׂרְפוֹת. This avoids the misleading impression of cremation while keeping the Hebrew comparison.
- source_word: וְהוֹי אָדוֹן
  chosen: Alas, lord!
  alternatives:
  - Ah, lord!
  - Alas, master!
  lexicon: HALOT
  rationale: הוֹי is a cry of lament. אָדוֹן here is a respectful title addressed to the deceased king. 'Alas, lord!' preserves the mourning formula without importing the divine title 'Lord'.
- source_word: יִסְפְּדוּ לָךְ
  chosen: they will lament for you, saying
  alternatives:
  - they will mourn for you
  lexicon: HALOT
  rationale: The verb denotes formal mourning or lamentation, often with spoken dirge language. 'Lament' better matches the following quoted cry than the broader 'mourn.' 'Saying' is supplied in English to introduce the direct lament.
- source_word: כִּי דָבָר אֲנִי דִבַּרְתִּי
  chosen: For I have spoken the word
  alternatives:
  - For I have spoken
  - For I have declared this word
  lexicon: HALOT
  rationale: The Hebrew includes both noun and verb from the דבר root for emphasis. 'I have spoken the word' preserves that emphasis more closely than smoothing it away, while remaining intelligible.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. Per doctrine, יְהוָה is rendered 'the LORD.' 'Declares' is idiomatic modern English for נְאֻם in prophetic speech.
