id: JER.34.17
reference: Jeremiah 34:17
source:
  edition: WLC
  text: לָ/כֵן֮ כֹּה אָמַ֣ר יְהוָה֒ אַתֶּם֙ לֹֽא שְׁמַעְתֶּ֣ם אֵלַ֔/י לִ/קְרֹ֣א דְר֔וֹר
    אִ֥ישׁ לְ/אָחִ֖י/ו וְ/אִ֣ישׁ לְ/רֵעֵ֑/הוּ הִנְ/נִ֣י קֹרֵא֩ לָ/כֶ֨ם דְּר֜וֹר נְאֻם
    יְהוָ֗ה אֶל הַ/חֶ֨רֶב֙ אֶל הַ/דֶּ֣בֶר וְ/אֶל הָ/רָעָ֔ב וְ/נָתַתִּ֤י אֶתְ/כֶם֙
    ל/זועה לְ/כֹ֖ל מַמְלְכ֥וֹת הָ/אָֽרֶץ־־־־־־׃
translation:
  text: 'Therefore thus says the LORD: You have not listened to me, to proclaim liberty,
    each man to his brother and each man to his neighbor. Behold, I am proclaiming
    liberty for you, declares the LORD—to the sword, to the pestilence, and to the
    famine—and I will make you a horror to all the kingdoms of the earth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'release' or 'freedom' for דְּרוֹר in both occurrences; the same Hebrew
      term is repeated for rhetorical irony.
    reason: lexical_alternative
  - marker: b
    text: That is, the LORD 'releases' them over to the sword, pestilence, and famine
      in judgment.
    reason: cultural_note
  - marker: c
    text: Or 'an object of horror' or 'a terror.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: שְׁמַעְתֶּם אֵלַי
  chosen: have not listened to me
  alternatives:
  - have not obeyed me
  - have not heard me
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly carries the sense of listening/heeding. 'Listened
    to me' preserves the auditory idiom while allowing the implied disobedience to
    remain implicit rather than over-translating as 'obeyed.'
- source_word: לִקְרֹא דְּרוֹר
  chosen: to proclaim liberty
  alternatives:
  - to proclaim release
  - to proclaim freedom
  lexicon: HALOT
  rationale: The infinitive plus דְּרוֹר refers to formally announcing manumission/release
    in the covenant context of debt-slaves. 'Proclaim liberty' is idiomatic, concise,
    and echoes the legal-public nature of the act.
- source_word: דְּרוֹר
  chosen: liberty
  alternatives:
  - release
  - freedom
  lexicon: HALOT
  rationale: In Jeremiah 34 the term refers to emancipation of Hebrew slaves. 'Liberty'
    preserves the formal, juridical tone and also sets up the ironic reversal when
    the LORD 'proclaims liberty' to sword, pestilence, and famine.
- source_word: אִישׁ לְאָחִיו וְאִישׁ לְרֵעֵהוּ
  chosen: each man to his brother and each man to his neighbor
  alternatives:
  - everyone to his brother and everyone to his neighbor
  - each one to his fellow and each one to his companion
  lexicon: HALOT
  rationale: The Hebrew repeats אִישׁ ... וְאִישׁ for distributive force, which is
    preserved with 'each man ... and each man.' 'Brother' and 'neighbor' reflect the
    distinct Hebrew nouns and maintain the gender-accurate policy.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces a solemn divine announcement. 'Behold' retains prophetic gravity
    better than the more colloquial 'look' or 'see.'
- source_word: קֹרֵא לָכֶם דְּרוֹר
  chosen: I am proclaiming liberty for you
  alternatives:
  - I proclaim release to you
  - I am calling out freedom for you
  lexicon: HALOT
  rationale: 'The participle conveys imminent or vivid present action. ''For you''
    captures לָכֶם in context: the liberty is ironically assigned to them, namely
    over to the following agents of judgment.'
- source_word: אֶל הַחֶרֶב אֶל הַדֶּבֶר וְאֶל הָרָעָב
  chosen: to the sword, to the pestilence, and to the famine
  alternatives:
  - for the sword, for the plague, and for the famine
  lexicon: HALOT
  rationale: 'The repeated אֶל after ''proclaim liberty'' is rhetorically jarring
    and ironic: instead of release from bondage, they are released over to covenant
    curses. ''Pestilence'' is preferred over ''plague'' for consistency with prophetic
    judgment language.'
- source_word: לְזַוֲעָה
  chosen: a horror
  alternatives:
  - a terror
  - an object of horror
  - a shaking
  lexicon: HALOT
  rationale: The noun denotes something causing horror/dismay. 'A horror' is natural
    English and fits the following phrase 'to all the kingdoms of the earth' better
    than the less idiomatic 'a shaking.'
- source_word: מַמְלְכוֹת הָאָרֶץ
  chosen: the kingdoms of the earth
  alternatives:
  - the kingdoms of the land
  lexicon: HALOT
  rationale: In Jeremiah this phrase commonly has an international scope, not merely
    the local land of Judah. 'Earth' best reflects that broader horizon.
