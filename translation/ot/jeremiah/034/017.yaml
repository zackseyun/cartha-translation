theological_decisions:
- issue: Gendered distributive language in slave-release command
  chosen_reading: each man to his brother and each man to his neighbor
  alternative_readings:
  - everyone to his fellow citizen
  rationale: The Hebrew uses masculine singular אִישׁ distributively in a legal-social
    context concerning male Hebrew slaves. Per DOCTRINE.md, gender-accurate rendering
    is preferred over flattening to gender-neutral language unless context clearly
    demands otherwise.
  doctrine_reference: Translation philosophy §4
- issue: Irony of divine 'liberty'
  chosen_reading: retain 'liberty' in both clauses
  alternative_readings:
  - vary to 'release' in the second clause for clarity
  rationale: 'The verse intentionally reverses the same word דְּרוֹר: the people refused
    to proclaim liberty to one another, so the LORD proclaims ''liberty'' for them
    to destructive judgments. Preserving the same English term maintains the theological
    and rhetorical irony.'
  doctrine_reference: Translation philosophy §5
