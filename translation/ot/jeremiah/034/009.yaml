theological_decisions:
- issue: Rendering of bonded-status terms in a manumission law context
  chosen_reading: Use 'slave' language rather than 'servant'
  alternative_readings:
  - Use 'servant' for smoother traditional English
  rationale: The passage concerns release from actual bondage; the bonded nature is
    salient. This aligns with the project's stated preference to use 'slave' where
    the source context requires it.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος by analogy of bonded-status rendering
- issue: Rendering יהודי
  chosen_reading: Jew in the main text
  alternative_readings:
  - Judean
  rationale: Both are lexically defensible. 'Jew' is more familiar to modern readers,
    while the footnote preserves 'Judean' as a historically precise alternative for
    the late kingdom context.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension where
    ambiguity is genuine
- issue: Gendered phrasing
  chosen_reading: Retain 'each man,' 'Hebrew man,' and 'Hebrew woman'
  alternative_readings:
  - each person
  - Hebrew slave, male and female
  rationale: The Hebrew explicitly marks masculine and feminine forms. Following the
    project's gender-accurate principle, the translation preserves those distinctions
    rather than neutralizing them.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
