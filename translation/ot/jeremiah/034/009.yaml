id: JER.34.9
reference: Jeremiah 34:9
source:
  edition: WLC
  text: לְ֠/שַׁלַּח אִ֣ישׁ אֶת עַבְדּ֞/וֹ וְ/אִ֧ישׁ אֶת שִׁפְחָת֛/וֹ הָ/עִבְרִ֥י וְ/הָ/עִבְרִיָּ֖ה
    חָפְשִׁ֑ים לְ/בִלְתִּ֧י עֲבָד בָּ֛/ם בִּ/יהוּדִ֥י אָחִ֖י/הוּ אִֽישׁ־־־׃
translation:
  text: that each man should set free his male slave and each man his female slave,
    the Hebrew man and the Hebrew woman, so that no one should enslave among them
    a Jew, his brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a Judean, his brother.' The Hebrew term can denote an ethnic-religious
      'Jew' or, in this historical setting, more specifically a 'Judean.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְשַׁלַּח
  chosen: should set free
  alternatives:
  - should send away
  - should release
  lexicon: HALOT
  rationale: In this covenant context concerning manumission of debt-slaves, the verb
    means release to freedom rather than merely send away. 'Set free' makes the legal-emancipatory
    sense clear in natural English.
- source_word: עַבְדּוֹ
  chosen: his male slave
  alternatives:
  - his servant
  - his slave
  lexicon: HALOT
  rationale: Although עבד can be rendered 'servant' in some contexts, here the bonded
    status is central, since the verse concerns compulsory release from servitude.
    'Male slave' also preserves the gender contrast with the following female term.
- source_word: שִׁפְחָתוֹ
  chosen: his female slave
  alternatives:
  - his maidservant
  - his slave-girl
  lexicon: HALOT
  rationale: The term denotes a female slave/maidservant. 'Female slave' is clear,
    contemporary, and preserves the legal-social force of the passage without archaic
    tone.
- source_word: הָעִבְרִי וְהָעִבְרִיָּה
  chosen: the Hebrew man and the Hebrew woman
  alternatives:
  - the Hebrew slave and the Hebrew slave woman
  - the Hebrew and the Hebrew woman
  lexicon: HALOT
  rationale: The paired masculine and feminine ethnonyms identify the slaves as Hebrews/Israelites.
    Rendering both explicitly as 'man' and 'woman' preserves the gender distinction
    present in Hebrew and avoids flattening the pair.
- source_word: חָפְשִׁים
  chosen: free
  alternatives:
  - as free persons
  - at liberty
  lexicon: HALOT
  rationale: Predicate adjective indicating the state into which they are released.
    'Free' is the most direct and idiomatic rendering.
- source_word: לְבִלְתִּי עֲבָד בָּם
  chosen: so that no one should enslave among them
  alternatives:
  - so as not to make slaves of them
  - so that they should not serve them
  lexicon: HALOT
  rationale: 'The infinitive plus negation expresses purpose/result: they were to
    be released in order that no Judean should continue holding fellow Judeans in
    bondage. The verb עבד here is causative in sense from context: not ''serve'' but
    ''make serve/enslave.'''
- source_word: בִּיהוּדִי אָחִיהוּ אִישׁ
  chosen: a Jew, his brother
  alternatives:
  - a Judean, his brother
  - his fellow Jew
  lexicon: HALOT
  rationale: יהודי can mean 'Jew' or 'Judean.' In Jeremiah's late-monarchic setting,
    'Judean' is historically precise, but 'Jew' is standard and readily understood
    in English. 'His brother' preserves the covenantal kinship language rather than
    replacing it with the more interpretive 'fellow.'
- source_word: אִישׁ ... וְאִישׁ ... אִישׁ
  chosen: each man ... and each man ... no one
  alternatives:
  - everyone ... and everyone ... anyone
  - each person ... and each person ... no one
  lexicon: HALOT
  rationale: The repeated איש structures the verse distributively. 'Each man' preserves
    the masculine singular form where it refers to individual householders, while
    'no one' is idiomatic in the final clause.
