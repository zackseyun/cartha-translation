id: JER.34.3
reference: Jeremiah 34:3
source:
  edition: WLC
  text: וְ/אַתָּ֗ה לֹ֚א תִמָּלֵט֙ מִ/יָּד֔/וֹ כִּ֚י תָּפֹ֣שׂ תִּתָּפֵ֔שׂ וּ/בְ/יָד֖/וֹ
    תִּנָּתֵ֑ן וְֽ֠/עֵינֶי/ךָ אֶת עֵינֵ֨י מֶֽלֶךְ בָּבֶ֜ל תִּרְאֶ֗ינָה וּ/פִ֛י/הוּ
    אֶת פִּ֥י/ךָ יְדַבֵּ֖ר וּ/בָבֶ֥ל תָּבֽוֹא־־־׃
translation:
  text: And you will not escape from his hand, for you will surely be captured and
    given into his hand. Your eyes will see the eyes of the king of Babylon, and his
    mouth will speak with your mouth, and you will go to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'and he will speak with you directly.' The Hebrew
      reads literally, 'his mouth will speak with your mouth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִמָּלֵט מִיָּדוֹ
  chosen: will not escape from his hand
  alternatives:
  - will not slip away from his power
  - will not be delivered from his hand
  lexicon: HALOT
  rationale: נצל/מלט idiom with 'from his hand' denotes escaping another's power or
    control. 'Escape from his hand' is natural English and preserves the Hebrew image
    of power embodied in the hand.
- source_word: כִּי תָּפֹשׂ תִּתָּפֵשׂ
  chosen: for you will surely be captured
  alternatives:
  - for you will certainly be seized
  - for you will indeed be caught
  lexicon: HALOT
  rationale: The construction combines an infinitive absolute/finite verb intensification
    with the Niphal of תפשׂ, expressing certainty or emphasis. 'Surely be captured'
    conveys the emphatic force without awkward literalism.
- source_word: וּבְיָדוֹ תִּנָּתֵן
  chosen: and given into his hand
  alternatives:
  - and handed over into his hand
  - and delivered into his power
  lexicon: HALOT
  rationale: נתן in the Niphal with 'into his hand' is a standard idiom for being
    handed over to someone's control. 'Given into his hand' keeps the Hebrew imagery
    and links with the prior clause.
- source_word: וְעֵינֶיךָ אֶת־עֵינֵי מֶלֶךְ בָּבֶל תִּרְאֶינָה
  chosen: Your eyes will see the eyes of the king of Babylon
  alternatives:
  - You will see the king of Babylon face to face
  - your own eyes will look on the eyes of the king of Babylon
  lexicon: HALOT
  rationale: 'The Hebrew is vivid and concrete: ''your eyes'' and ''the eyes of''
    the king. Retaining the eye-to-eye wording preserves the force of direct personal
    encounter, likely underscoring that Zedekiah will personally face Nebuchadnezzar.'
- source_word: וּפִיהוּ אֶת־פִּיךָ יְדַבֵּר
  chosen: and his mouth will speak with your mouth
  alternatives:
  - and he will speak with you directly
  - and mouth to mouth he will speak with you
  lexicon: HALOT
  rationale: Literally 'his mouth will speak with your mouth.' This is an unusual
    but intelligible Hebrew expression for direct speech. The chosen rendering preserves
    the concrete imagery while remaining readable. A smoother alternative is preserved
    in a footnote.
- source_word: וּבָבֶל תָּבוֹא
  chosen: and you will go to Babylon
  alternatives:
  - and you will come to Babylon
  lexicon: HALOT
  rationale: בוא can be rendered 'come' or 'go' depending on viewpoint. In English
    narrative from the hearer's perspective, 'go to Babylon' is the natural choice.
