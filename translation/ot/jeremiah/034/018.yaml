theological_decisions:
- issue: Relation of the final calf clause to the men under judgment
  chosen_reading: 'Render the clause comparatively: the men are handed over in connection
    with the covenant ritual symbolized by the calf they cut and passed between.'
  alternative_readings:
  - 'Render appositionally: ''the calf ...'' as if the men themselves are identified
    with the cut calf'
  - Supply an explicit consequence such as 'I will make them like the calf'
  rationale: The Hebrew as given is compressed and elliptical. The broader context
    (especially the following verse) implies that the covenant-breakers will suffer
    a fate corresponding to the ritual they enacted. English needs some smoothing,
    but the translation avoids importing the full consequence into this verse alone.
    'Like the calf' signals the comparison without over-expanding the text.
  doctrine_reference: Translation philosophy §1, §3, §6
