id: JER.34.18
reference: Jeremiah 34:18
source:
  edition: WLC
  text: וְ/נָתַתִּ֣י אֶת הָ/אֲנָשִׁ֗ים הָ/עֹֽבְרִים֙ אֶת בְּרִתִ֔/י אֲשֶׁ֤ר לֹֽא הֵקִ֨ימוּ֙
    אֶת דִּבְרֵ֣י הַ/בְּרִ֔ית אֲשֶׁ֥ר כָּרְת֖וּ לְ/פָנָ֑/י הָ/עֵ֨גֶל֙ אֲשֶׁ֣ר כָּרְת֣וּ
    לִ/שְׁנַ֔יִם וַ/יַּעַבְר֖וּ בֵּ֥ין בְּתָרָֽי/ו־־־־׃
translation:
  text: And I will hand over the men who transgressed my covenant, who did not uphold
    the words of the covenant that they made before me, like the calf that they cut
    in two and passed between its pieces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who violated my covenant.' The Hebrew verb literally means 'passed over/transgressed,'
      and it intentionally echoes the later phrase 'passed between its pieces.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the words of the covenant'; that is, the covenant's stipulations
      or terms.
    reason: lexical_alternative
  - marker: c
    text: The ritual of cutting an animal and passing between its pieces was a covenant-making
      act that invoked judgment on the one who broke the covenant; compare Genesis
      15:9–17.
    reason: cultural_note
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will hand over
  alternatives:
  - And I will give
  - And I will deliver
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in judgment contexts it commonly means
    to hand someone over into another's power. The immediate context in Jeremiah 34
    concerns judgment on covenant-breakers, so 'hand over' best conveys the idiom
    without over-paraphrasing.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  lexicon: HALOT
  rationale: The noun is the masculine plural of אישׁ, referring here to specific
    male covenant-makers in the narrative setting. Per gender-accurate philosophy,
    'men' is preferred over a neutral collective.
- source_word: הָעֹבְרִים אֶת־בְּרִיתִי
  chosen: who transgressed my covenant
  alternatives:
  - who violated my covenant
  - who passed over my covenant
  lexicon: HALOT
  rationale: עבר with covenant language is idiomatic for violating or transgressing
    a covenant, not literal movement. 'Transgressed' preserves the legal-moral force
    and echoes the Hebrew verbal connection with the later literal 'passed between'
    while still making sense in English.
- source_word: הֵקִימוּ אֶת דִּבְרֵי הַבְּרִית
  chosen: did not uphold the words of the covenant
  alternatives:
  - did not keep the terms of the covenant
  - did not fulfill the words of the covenant
  lexicon: HALOT
  rationale: הקים with דברי הברית means to confirm, uphold, or carry out covenant
    stipulations. 'Uphold' keeps the formal sense while remaining natural English.
    'Words of the covenant' is retained rather than reduced to 'terms' alone, to stay
    closer to the Hebrew.
- source_word: כָּרְתוּ לְפָנַי
  chosen: that they made before me
  alternatives:
  - that they cut before me
  - that they made in my presence
  lexicon: HALOT
  rationale: כרת ברית is the standard idiom 'make/cut a covenant.' In English, 'made'
    is the natural rendering for the covenant itself, while the sacrificial cutting
    imagery is preserved later with the calf. 'Before me' keeps the covenant's solemn
    divine witness.
- source_word: הָעֵגֶל
  chosen: the calf
  alternatives:
  - the young bull
  lexicon: HALOT
  rationale: עגל most naturally denotes a calf/young bovine. 'Calf' is the standard
    and fits the covenant-cutting ritual described here.
- source_word: כָּרְתוּ לִשְׁנַיִם
  chosen: that they cut in two
  alternatives:
  - that they cut into two parts
  - that they divided in half
  lexicon: HALOT
  rationale: The phrase refers concretely to dividing the sacrificial animal into
    two parts. 'Cut in two' is concise and vivid.
- source_word: וַיַּעַבְרוּ בֵּין בְּתָרָיו
  chosen: and passed between its pieces
  alternatives:
  - and walked between its parts
  lexicon: HALOT
  rationale: This is a literal ritual action. 'Pieces' is more idiomatic than 'parts'
    in English for butchered animal sections, while preserving the covenant-ratification
    imagery.
