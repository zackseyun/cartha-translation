theological_decisions:
- issue: Rendering of covenantal kinship language with masculine singular forms
  chosen_reading: his Hebrew brother
  alternative_readings:
  - his fellow Hebrew
  - his Hebrew kinsman
  rationale: The verse uses masculine singular legal language and covenantal kinship
    terminology. Following the gender-accurate principle, the translation preserves
    the masculine singular and familial force rather than neutralizing it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Translation of slavery/debt-service terminology in this legal context
  chosen_reading: who has been sold to you ... has served you six years
  alternative_readings:
  - who sells himself to you ... has worked for you six years
  rationale: The Hebrew describes a person entering bonded service through sale. The
    translation preserves the bonded legal setting without importing later chattel-slavery
    connotations beyond the text. 'Served' is appropriate for עבד here, while the
    sale language is retained explicitly in יִמָּכֵר.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
