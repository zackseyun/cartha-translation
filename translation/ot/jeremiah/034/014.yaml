id: JER.34.14
reference: Jeremiah 34:14
source:
  edition: WLC
  text: מִ/קֵּ֣ץ שֶׁ֣בַע שָׁנִ֡ים תְּֽשַׁלְּח֡וּ אִישׁ֩ אֶת אָחִ֨י/ו הָ/עִבְרִ֜י אֲשֶֽׁר
    יִמָּכֵ֣ר לְ/ךָ֗ וַ/עֲבָֽדְ/ךָ֙ שֵׁ֣שׁ שָׁנִ֔ים וְ/שִׁלַּחְתּ֥/וֹ חָפְשִׁ֖י מֵֽ/עִמָּ֑/ךְ
    וְ/לֹֽא שָׁמְע֤וּ אֲבֽוֹתֵי/כֶם֙ אֵלַ֔/י וְ/לֹ֥א הִטּ֖וּ אֶת אָזְנָֽ/ם־־־־׃
translation:
  text: At the end of seven years, each of you shall send away his Hebrew brother
    who has been sold to you and has served you six years; you shall send him away
    from you free. But your fathers did not listen to me or incline their ear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "After seven years." The Hebrew expression can be understood as marking
      the completion of a seven-year period.
    reason: lexical_alternative
  - marker: b
    text: Or "his fellow Hebrew" or "his Hebrew kinsman."
    reason: lexical_alternative
  - marker: c
    text: Or "who sells himself to you"; the Hebrew form may be understood in a passive
      or reflexive sense in this legal context.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקֵּץ שֶׁבַע שָׁנִים
  chosen: At the end of seven years
  alternatives:
  - After seven years
  lexicon: HALOT
  rationale: The phrase literally denotes 'from/end of seven years.' In context of
    debt-slave release legislation, English 'at the end of seven years' best preserves
    the temporal marker without over-interpreting the exact calendrical mechanics.
- source_word: תְּשַׁלְּחוּ
  chosen: each of you shall send away
  alternatives:
  - you shall let go
  - you shall release
  lexicon: HALOT
  rationale: The verb שלח in this context means to send away/release. 'Send away'
    keeps the concrete verbal force, while 'each of you' reflects distributive אִישׁ.
- source_word: אִישׁ
  chosen: each of you
  alternatives:
  - every man
  - each man
  lexicon: HALOT
  rationale: Though singular masculine, it functions distributively with the 2mp verb.
    'Each of you' is natural English and preserves the distributive sense without
    unnecessary awkwardness.
- source_word: אָחִיו הָעִבְרִי
  chosen: his Hebrew brother
  alternatives:
  - his Hebrew kinsman
  - his fellow Hebrew
  lexicon: HALOT
  rationale: אָח often means literal brother or fellow member of the covenant people.
    'Hebrew brother' preserves the familial-covenantal rhetoric of the law and matches
    the masculine singular source.
- source_word: אֲשֶׁר יִמָּכֵר לְךָ
  chosen: who has been sold to you
  alternatives:
  - who sells himself to you
  - who is sold to you
  lexicon: HALOT
  rationale: The Niphal of מכר is passive/reflexive in slave-sale contexts. 'Has been
    sold to you' is the most straightforward rendering here; 'sells himself' is possible
    in legal context but is more interpretive than the form requires.
- source_word: וַעֲבָדְךָ שֵׁשׁ שָׁנִים
  chosen: and has served you six years
  alternatives:
  - and serves you six years
  - and has worked for you six years
  lexicon: HALOT
  rationale: The clause states the period of service prior to release. 'Has served
    you six years' reads naturally in English as the completed service required before
    release.
- source_word: וְשִׁלַּחְתּוֹ חָפְשִׁי
  chosen: you shall send him away ... free
  alternatives:
  - you shall let him go free
  - you shall release him as a free man
  lexicon: HALOT
  rationale: The repetition of שלח should be reflected in English if possible; 'send
    him away ... free' preserves the lexical link and the legal outcome signaled by
    חָפְשִׁי.
- source_word: מֵעִמָּךְ
  chosen: from you
  alternatives:
  - from your service
  - from your presence
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'from with you.' In this legal
    context, 'from you' is sufficiently clear and avoids adding explanatory wording
    not explicit in the text.
- source_word: וְלֹא שָׁמְעוּ אֲבוֹתֵיכֶם אֵלַי
  chosen: But your fathers did not listen to me
  alternatives:
  - did not obey me
  - did not hear me
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly carries the sense of listening/heeding. 'Listen
    to me' preserves the auditory metaphor and leaves the implication of obedience
    intact.
- source_word: וְלֹא הִטּוּ אֶת אָזְנָם
  chosen: or incline their ear
  alternatives:
  - or turn their ear
  - or pay attention
  lexicon: HALOT
  rationale: This is a Hebrew idiom for attentive listening. 'Incline their ear' is
    a transparent, established English equivalent that preserves the imagery.
