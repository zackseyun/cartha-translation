id: JER.34.20
reference: Jeremiah 34:20
source:
  edition: WLC
  text: וְ/נָתַתִּ֤י אוֹתָ/ם֙ בְּ/יַ֣ד אֹֽיְבֵי/הֶ֔ם וּ/בְ/יַ֖ד מְבַקְשֵׁ֣י נַפְשָׁ֑/ם
    וְ/הָיְתָ֤ה נִבְלָתָ/ם֙ לְ/מַֽאֲכָ֔ל לְ/ע֥וֹף הַ/שָּׁמַ֖יִם וּ/לְ/בֶהֱמַ֥ת הָ/אָֽרֶץ׃
translation:
  text: And I will give them into the hand of their enemies and into the hand of those
    who seek their life, and their dead bodies will become food for the birds of the
    sky and for the beasts of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who seek their lives,' that is, those who seek to kill them.
    reason: lexical_alternative
  - marker: b
    text: Or 'their corpses' or 'their carcasses.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'birds of the sky'; some English versions have 'birds of the air.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will give
  alternatives:
  - And I will hand over
  lexicon: HALOT
  rationale: נתן with בְּיַד commonly means 'give into the hand of,' that is, deliver
    over into another's power. 'Give' preserves the Hebrew idiom while remaining natural
    in English.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  lexicon: HALOT
  rationale: The phrase בְּיַד is idiomatic for transfer into someone's control. 'Into
    the hand of' keeps the concrete Hebrew image; the sense of power/control is implicit.
- source_word: אֹיְבֵיהֶם
  chosen: their enemies
  lexicon: HALOT
  rationale: Standard rendering of אויבים; no contextual reason to vary.
- source_word: מְבַקְשֵׁי נַפְשָׁם
  chosen: those who seek their life
  alternatives:
  - those who seek to kill them
  - those who seek their lives
  lexicon: HALOT
  rationale: The idiom בקשׁ נפשׁ means to seek someone's life, i.e., to seek their
    death. 'Seek their life' preserves the Hebrew idiom while remaining intelligible;
    'seek to kill them' is interpretive and slightly less formal.
- source_word: וְהָיְתָה
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: With the predicate construction, היה here conveys resultant state. 'Will
    become' brings out the future result more clearly than a simple 'will be.'
- source_word: נִבְלָתָם
  chosen: their dead bodies
  alternatives:
  - their carcasses
  - their corpses
  lexicon: HALOT
  rationale: נבלה refers to a corpse/carcass. For human referents, 'dead bodies' is
    clear modern English and avoids the slightly harsher or more animal-associated
    tone of 'carcasses,' while still conveying disgrace.
- source_word: לְמַאֲכָל
  chosen: food
  alternatives:
  - for food
  lexicon: HALOT
  rationale: The noun means food, something to be eaten. In English, 'become food
    for' is the most natural rendering of the construction.
- source_word: לְעוֹף הַשָּׁמַיִם
  chosen: for the birds of the sky
  alternatives:
  - for the birds of heaven
  - for the birds of the air
  lexicon: HALOT
  rationale: עוֹף is a collective for flying creatures/birds. 'Birds of the sky' is
    a transparent rendering of the Hebrew phrase and fits modern English.
- source_word: וּלְבֶהֱמַת הָאָרֶץ
  chosen: and for the beasts of the earth
  alternatives:
  - and for the animals of the earth
  - and for the beasts of the land
  lexicon: HALOT
  rationale: בהמה can denote beasts/animals, often larger land animals. 'Beasts of
    the earth' preserves the solemn, judgment-oriented tone and parallels the preceding
    phrase closely.
