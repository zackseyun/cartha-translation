theological_decisions:
- issue: Judgment imagery of unburied corpses consumed by animals
  chosen_reading: Retain the concrete covenant-curse imagery without softening
  alternative_readings:
  - Paraphrase as simple death at enemy hands
  rationale: The verse evokes shameful postmortem exposure as part of divine judgment.
    The translation preserves the stark imagery rather than reducing it to a generic
    statement of defeat or death.
