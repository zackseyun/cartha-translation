id: JER.34.21
reference: Jeremiah 34:21
source:
  edition: WLC
  text: וְ/אֶת צִדְקִיָּ֨הוּ מֶֽלֶךְ יְהוּדָ֜ה וְ/אֶת שָׂרָ֗י/ו אֶתֵּן֙ בְּ/יַ֣ד אֹֽיְבֵי/הֶ֔ם
    וּ/בְ/יַ֖ד מְבַקְשֵׁ֣י נַפְשָׁ֑/ם וּ/בְ/יַד חֵ֚יל מֶ֣לֶךְ בָּבֶ֔ל הָ/עֹלִ֖ים מֵ/עֲלֵי/כֶֽם־־־׃
translation:
  text: And I will give Zedekiah king of Judah and his officials into the hand of
    their enemies, into the hand of those who seek their life, and into the hand of
    the army of the king of Babylon, which has gone up away from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which is withdrawing from you' / 'which has withdrawn from you.' The
      Hebrew literally says 'the ones going up from upon you,' an idiom for forces
      moving away from besieging the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  rationale: Standard English transliteration of the personal name, following the
    policy to transliterate names rather than translate them.
- source_word: שָׂרָיו
  chosen: his officials
  alternatives:
  - his princes
  - his commanders
  - his leaders
  lexicon: HALOT
  rationale: שַׂר can denote officials, princes, rulers, or commanders depending on
    context. In this royal-political setting, 'officials' is broad, natural English
    that preserves their status without over-specifying military rank.
- source_word: אֶתֵּן
  chosen: I will give
  alternatives:
  - I will hand over
  lexicon: HALOT
  rationale: נתן with בְּיַד is a common idiom for delivering someone into another's
    power. 'I will give' preserves the Hebrew wording while remaining intelligible
    in English.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: HALOT
  rationale: This idiom is repeated three times in the verse. Rendering it consistently
    as 'into the hand of' preserves the formal force and rhetorical repetition of
    the Hebrew.
- source_word: אֹיְבֵיהֶם
  chosen: their enemies
  lexicon: HALOT
  rationale: Straightforward plural noun with 3mp suffix; 'their enemies' is the natural
    equivalent.
- source_word: מְבַקְשֵׁי נַפְשָׁם
  chosen: those who seek their life
  alternatives:
  - those who seek to kill them
  - those who seek their lives
  lexicon: HALOT
  rationale: The idiom literally involves seeking the nephesh, but in context means
    seeking someone's life. Singular 'life' after plural pronoun is idiomatic English
    in this construction and preserves the threat of death without paraphrasing too
    far.
- source_word: חֵיל מֶלֶךְ בָּבֶל
  chosen: the army of the king of Babylon
  alternatives:
  - the forces of the king of Babylon
  lexicon: HALOT
  rationale: חַיִל here refers to military force rather than wealth or strength. 'Army'
    is the clearest contextual rendering.
- source_word: הָעֹלִים מֵעֲלֵיכֶם
  chosen: which has gone up away from you
  alternatives:
  - which is going up away from you
  - which has withdrawn from you
  - which has moved away from you
  lexicon: HALOT
  rationale: The participle with article can describe the Babylonian army as the one
    'going up from upon you,' i.e., withdrawing from the siege. Because the immediate
    context concerns the Chaldeans having gone away temporarily, 'which has gone up
    away from you' captures the sense while staying close to the Hebrew. Singular
    'which has' agrees with the collective singular 'army' in English.
