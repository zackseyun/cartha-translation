  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in a prophetic judgment formula.
    Per DOCTRINE.md, the default rendering is 'the LORD' rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
