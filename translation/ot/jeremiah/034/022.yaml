id: JER.34.22
reference: Jeremiah 34:22
source:
  edition: WLC
  text: הִנְ/נִ֨י מְצַוֶּ֜ה נְאֻם יְהוָ֗ה וַ/הֲשִׁ֨בֹתִ֜י/ם אֶל הָ/עִ֤יר הַ/זֹּאת֙
    וְ/נִלְחֲמ֣וּ עָלֶ֔י/הָ וּ/לְכָד֖וּ/הָ וּ/שְׂרָפֻ֣/הָ בָ/אֵ֑שׁ וְ/אֶת עָרֵ֧י יְהוּדָ֛ה
    אֶתֵּ֥ן שְׁמָמָ֖ה מֵ/אֵ֥ין יֹשֵֽׁב־־־׃פ
translation:
  text: Behold, I am commanding, declares the LORD, and I will bring them back to
    this city, and they will fight against it and capture it and burn it with fire.
    And I will make the cities of Judah a desolation, without inhabitant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will return them to this city.' The Hebrew verb is causative ('cause
      to return/bring back'). In context it refers to the enemy forces being brought
      back to Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: Or 'without anyone dwelling there.' The Hebrew idiom emphasizes complete
      desolation and depopulation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic attention-getting particle with elevated but still
    intelligible English. 'Behold' fits prophetic discourse better than the more colloquial
    'look' or 'see'.
- source_word: מְצַוֶּה
  chosen: I am commanding
  alternatives:
  - I command
  - I am about to command
  lexicon: HALOT
  rationale: The participle with first-person subject conveys an immediate, present
    declaration of divine action. 'I am commanding' preserves the aspectual force
    better than a simple present.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is natural English and
    preserves the solemn prophetic register. 'the LORD' follows the doctrinal default
    for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows DOCTRINE.md contested-terms guidance for the divine name, preserving
    Jewish reverence tradition and common English Bible convention.
- source_word: וַהֲשִׁבֹתִים
  chosen: I will bring them back
  alternatives:
  - I will return them
  - I will cause them to return
  lexicon: HALOT
  rationale: 'Hiphil of שוב here is causative: God causes the Babylonian forces who
    had withdrawn to come back to Jerusalem. ''Bring them back'' is idiomatic and
    accurately causative.'
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  alternatives:
  - this town
  lexicon: HALOT
  rationale: Refers to Jerusalem in the immediate context. 'City' is the normal rendering
    and preserves the formal tone.
- source_word: וְנִלְחֲמוּ עָלֶיהָ
  chosen: they will fight against it
  alternatives:
  - they will wage war against it
  - they will attack it
  lexicon: HALOT
  rationale: The Niphal/Qal sequence here indicates military engagement against the
    city. 'Fight against it' is straightforward and sufficiently formal.
- source_word: וּלְכָדוּהָ
  chosen: capture it
  alternatives:
  - take it
  - seize it
  lexicon: HALOT
  rationale: לכד in siege context commonly means capture or take a city. 'Capture'
    clearly conveys military conquest.
- source_word: וּשְׂרָפֻהָ בָאֵשׁ
  chosen: burn it with fire
  alternatives:
  - set it on fire
  - burn it down
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the Hebrew idiom and the severity
    of judgment. 'With fire' is retained rather than reduced to 'down'.
- source_word: עָרֵי יְהוּדָה
  chosen: the cities of Judah
  alternatives:
  - Judah's cities
  lexicon: HALOT
  rationale: Keeps the construct relationship transparent and formal.
- source_word: אֶתֵּן שְׁמָמָה
  chosen: I will make ... a desolation
  alternatives:
  - I will give over ... to desolation
  - I will make ... desolate
  lexicon: HALOT
  rationale: The idiom נתן + שׁממה means to make into a desolation. This rendering
    is idiomatic in English while preserving the resultative force.
- source_word: מֵאֵין יֹשֵׁב
  chosen: without inhabitant
  alternatives:
  - with no one living there
  - without anyone dwelling there
  lexicon: HALOT
  rationale: A concise rendering of the idiom 'from there being no inhabitant,' expressing
    total depopulation. Singular 'inhabitant' is idiomatic collective English and
    matches the Hebrew participial construction.
