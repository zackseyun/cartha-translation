theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Per project doctrine, the
    default rendering is 'the LORD,' following Jewish reverence tradition and the
    Septuagintal pattern, while preserving the underlying Hebrew name in documentation
    rather than the main text.
