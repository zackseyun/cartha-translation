id: JER.34.12
reference: Jeremiah 34:12
source:
  edition: WLC
  text: וַ/יְהִ֤י דְבַר יְהוָה֙ אֶֽל יִרְמְיָ֔הוּ מֵ/אֵ֥ת יְהוָ֖ה לֵ/אמֹֽר־־׃
translation:
  text: Then the word of the LORD came to Jeremiah from the LORD, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: YHWH (the divine name), traditionally rendered ''the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a new narrative development. In
    English, 'Then' naturally carries the discourse-sequencing force without archaic
    stiffness. The verb is absorbed into the idiomatic prophetic formula 'the word
    ... came' rather than rendered woodenly as 'it happened.'
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Word' preserves the formal linkage
    to prophetic revelation better than the more interpretive 'message.' YHWH is rendered
    'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    default for יְהוָה and longstanding reverential convention.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Simple directional preposition indicating the recipient of the revelation;
    'to' is clear modern English.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from the presence of
  - on the part of
  lexicon: HALOT
  rationale: The preposition marks source/origin. 'From' is the most natural rendering
    in this formulaic context.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'thus:'
  - 'as follows:'
  lexicon: HALOT
  rationale: Standard introduction to direct speech. 'Saying' preserves the Hebrew
    connective formula and prepares for the following quotation in the next verse.
