id: JER.34.11
reference: Jeremiah 34:11
source:
  edition: WLC
  text: וַ/יָּשׁ֨וּבוּ֙ אַחֲרֵי כֵ֔ן וַ/יָּשִׁ֗בוּ אֶת הָֽ/עֲבָדִים֙ וְ/אֶת הַ/שְּׁפָח֔וֹת
    אֲשֶׁ֥ר שִׁלְּח֖וּ חָפְשִׁ֑ים ו/יכבישו/ם לַ/עֲבָדִ֖ים וְ/לִ/שְׁפָחֽוֹת־־־׃ס
translation:
  text: But afterward they turned back and brought back the male slaves and the female
    slaves whom they had set free, and they forced them into slavery as male and female
    slaves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they enslaved them as male and female slaves.' The Hebrew verb can be
      rendered more compactly, but the main text makes explicit the coercive force
      in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשׁוּבוּ
  chosen: they turned back
  alternatives:
  - they returned
  - they changed their minds
  lexicon: HALOT
  rationale: From שוב in the intransitive sense, indicating reversal after the prior
    act of release. 'Turned back' captures both movement and reversal of decision.
- source_word: אַחֲרֵי כֵן
  chosen: afterward
  alternatives:
  - after that
  - later
  lexicon: HALOT
  rationale: Temporal phrase marking subsequent action; 'afterward' is concise and
    natural.
- source_word: וַיָּשִׁבוּ
  chosen: brought back
  alternatives:
  - caused to return
  - took back
  lexicon: HALOT
  rationale: Hiphil of שוב is causative. 'Brought back' preserves the causative force
    better than the more interpretive 'took back.'
- source_word: הָעֲבָדִים
  chosen: the male slaves
  alternatives:
  - the slaves
  - the male servants
  lexicon: HALOT
  rationale: עבדים here refers to persons previously emancipated and then re-enslaved;
    the bonded nature is salient, so 'slaves' is preferable to 'servants.' Because
    the verse pairs this term with שפחות, specifying 'male slaves' preserves the gender
    distinction in the Hebrew.
- source_word: הַשְּׁפָחוֹת
  chosen: the female slaves
  alternatives:
  - the maidservants
  - the slave women
  lexicon: HALOT
  rationale: The paired term with עבדים denotes female slaves. 'Female slaves' is
    clear modern English and preserves the gendered distinction.
- source_word: שִׁלְּחוּ חָפְשִׁים
  chosen: had set free
  alternatives:
  - had sent away free
  - had released as free persons
  lexicon: HALOT
  rationale: The idiom means to release from bondage. 'Had set free' is idiomatic
    English and reflects the completed prior action.
- source_word: וַיִּכְבְּשׁוּם
  chosen: they forced them into slavery
  alternatives:
  - they subdued them
  - they brought them into subjection
  - they enslaved them
  lexicon: HALOT
  rationale: כָּבַשׁ conveys subduing or bringing under control. In this context,
    with the following לַעֲבָדִים וְלִשְׁפָחוֹת, the sense is specifically coercive
    re-enslavement. 'Forced them into slavery' makes the contextual force explicit
    without over-paraphrasing.
- source_word: לַעֲבָדִים וְלִשְׁפָחוֹת
  chosen: as male and female slaves
  alternatives:
  - for male and female slaves
  - to be male and female slaves
  lexicon: HALOT
  rationale: 'The lamed marks resultant status/purpose: they were reduced to the condition
    of slaves again. ''As male and female slaves'' is idiomatic and preserves the
    gendered pair.'
