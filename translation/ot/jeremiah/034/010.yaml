id: JER.34.10
reference: Jeremiah 34:10
source:
  edition: WLC
  text: וַ/יִּשְׁמְעוּ֩ כָל הַ/שָּׂרִ֨ים וְ/כָל הָ/עָ֜ם אֲשֶׁר בָּ֣אוּ בַ/בְּרִ֗ית
    לְ֠/שַׁלַּח אִ֣ישׁ אֶת עַבְדּ֞/וֹ וְ/אִ֤ישׁ אֶת שִׁפְחָת/וֹ֙ חָפְשִׁ֔ים לְ/בִלְתִּ֥י
    עֲבָד בָּ֖/ם ע֑וֹד וַֽ/יִּשְׁמְע֖וּ וַ/יְשַׁלֵּֽחוּ־־־־־־׃
translation:
  text: So all the officials and all the people who had entered into the covenant
    to send away, each man his male slave and each man his female slave, free, so
    as not to make them serve any longer, obeyed and sent them away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'heard.' The Hebrew verb often means 'hear/listen,' but here it carries
      the sense of obeying, as shown by the following action.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his slave and his female slave'; the translation makes the male/female
      distinction explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  chosen: obeyed
  alternatives:
  - heard
  - listened
  lexicon: HALOT
  rationale: In this covenantal context, שׁמע followed by the action taken indicates
    not mere hearing but compliance/obedience. Rendering both occurrences as 'obeyed'
    preserves the idiomatic force and the narrative emphasis that they acted on the
    covenant commitment.
- source_word: הַשָּׂרִים
  chosen: officials
  alternatives:
  - princes
  - leaders
  lexicon: HALOT
  rationale: שׂרים refers to ruling authorities or officials. 'Officials' is clear
    modern English and fits the civic-political setting better than the archaic 'princes.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: Standard rendering for עם in this collective sense.
- source_word: בָּאוּ בַבְּרִית
  chosen: had entered into the covenant
  alternatives:
  - had come into the covenant
  - had joined in the covenant
  lexicon: HALOT
  rationale: The idiom 'enter into the covenant' is natural English and reflects the
    Hebrew expression of covenant participation.
- source_word: לְשַׁלַּח
  chosen: to send away
  alternatives:
  - to let go
  - to release
  lexicon: HALOT
  rationale: שׁלח here denotes manumission by dismissal/release. 'Send away' stays
    close to the Hebrew while fitting the legal-social context.
- source_word: אִישׁ ... וְאִישׁ
  chosen: each man ... and each man
  alternatives:
  - each one ... and each one
  - every man ... and every man
  lexicon: HALOT
  rationale: The distributive repetition is explicit in Hebrew and is preserved rather
    than smoothed away. This also maintains the gender-accurate wording of the source.
- source_word: עַבְדּוֹ
  chosen: his male slave
  alternatives:
  - his slave
  - his servant
  lexicon: HALOT
  rationale: Given the paired contrast with 'his female slave' and the legal context
    of emancipation, specifying 'male slave' makes the gender distinction explicit.
    'Slave' rather than 'servant' better reflects bonded status, in line with the
    project's philosophy where that nature is salient.
- source_word: שִׁפְחָתוֹ
  chosen: his female slave
  alternatives:
  - his maidservant
  - his slave-girl
  lexicon: HALOT
  rationale: The feminine counterpart to עבד is explicit here. 'Female slave' is clear,
    modern, and preserves the social status without archaic coloring.
- source_word: חָפְשִׁים
  chosen: free
  alternatives:
  - as free persons
  - freed
  lexicon: HALOT
  rationale: Predicate adjective describing the condition in which they were to be
    released. 'Free' is concise and natural.
- source_word: לְבִלְתִּי עֲבָד בָּם עוֹד
  chosen: so as not to make them serve any longer
  alternatives:
  - so as not to enslave them anymore
  - so that they would no longer be worked by them
  lexicon: HALOT
  rationale: 'The infinitive construction expresses purpose/result: they were to be
    released in order that they not be subjected to service any longer. ''Make them
    serve'' captures the causative sense in idiomatic English; ''any longer'' renders
    עוד naturally.'
- source_word: וַיְשַׁלֵּחוּ
  chosen: sent them away
  alternatives:
  - released them
  - let them go
  lexicon: HALOT
  rationale: Repeats the earlier שׁלח and is rendered consistently. The object is
    implicit from context, so 'them' is supplied in English for clarity.
