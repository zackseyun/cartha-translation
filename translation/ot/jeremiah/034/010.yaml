theological_decisions:
- issue: Rendering of slavery terminology in a legal-emancipation context
  chosen_reading: Use 'male slave' and 'female slave' rather than 'servant' terminology
  alternative_readings:
  - male servant / female servant
  - servant / maidservant
  rationale: The verse concerns release from bonded labor under covenant obligation.
    The bonded nature is socially and ethically salient, so 'slave' best reflects
    the Hebrew terms and the translation philosophy's guidance on such contexts.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος analogously favoring 'slave' where bonded nature is salient
- issue: Gendered distributive language
  chosen_reading: Retain 'each man'
  alternative_readings:
  - each person
  - everyone
  rationale: The Hebrew uses אִישׁ distributively and pairs male and female slaves
    explicitly. Per the project's gender-accurate policy, the masculine form is retained
    where it matches the source's intent rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
