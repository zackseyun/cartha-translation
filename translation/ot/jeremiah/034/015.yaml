id: JER.34.15
reference: Jeremiah 34:15
source:
  edition: WLC
  text: וַ/תָּשֻׁ֨בוּ אַתֶּ֜ם הַ/יּ֗וֹם וַ/תַּעֲשׂ֤וּ אֶת הַ/יָּשָׁר֙ בְּ/עֵינַ֔/י
    לִ/קְרֹ֥א דְר֖וֹר אִ֣ישׁ לְ/רֵעֵ֑/הוּ וַ/תִּכְרְת֤וּ בְרִית֙ לְ/פָנַ֔/י בַּ/בַּ֕יִת
    אֲשֶׁר נִקְרָ֥א שְׁמִ֖/י עָלָֽי/ו־־׃
translation:
  text: And you yourselves had turned back today and had done what was right in my
    eyes, by proclaiming liberty, each man to his neighbor; and you had cut a covenant
    before me in the house that is called by my name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you had made a covenant before me.' Hebrew literally, 'cut a covenant.'
    reason: lexical_alternative
  - marker: b
    text: That is, the temple in Jerusalem.
    reason: cultural_note
lexical_decisions:
- source_word: וַתָּשֻׁבוּ
  chosen: had turned back
  alternatives:
  - returned
  - repented
  lexicon: HALOT
  rationale: שׁוּב commonly means 'turn back/return.' In this context it refers to
    reversing prior conduct and temporarily returning to covenant obedience, not necessarily
    full inner repentance. The pluperfect-like English 'had turned back' fits the
    discourse, since the next verse contrasts this prior action with their subsequent
    reversal.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: A straightforward temporal adverb. 'Today' is natural modern English
    while preserving the immediacy of the Hebrew.
- source_word: הַיָּשָׁר בְּעֵינַי
  chosen: what was right in my eyes
  alternatives:
  - what was upright in my sight
  - the right thing in my sight
  lexicon: HALOT
  rationale: This idiom expresses what is morally right from God's perspective. 'What
    was right in my eyes' preserves the Hebrew imagery and covenantal evaluation.
- source_word: לִקְרֹא דְרוֹר
  chosen: by proclaiming liberty
  alternatives:
  - to proclaim freedom
  - to proclaim release
  lexicon: HALOT
  rationale: דְּרוֹר denotes emancipation/release, especially in manumission contexts
    (cf. Lev 25:10). 'Liberty' preserves the formal public-juridical sense of a proclaimed
    emancipation better than a looser 'freedom.'
- source_word: אִישׁ לְרֵעֵהוּ
  chosen: each man to his neighbor
  alternatives:
  - everyone to his fellow
  - each one to his companion
  lexicon: HALOT
  rationale: The Hebrew is distributive and grammatically masculine. Per the translation
    philosophy's gender-accurate principle, 'each man' is retained rather than neutralizing
    to 'everyone,' since the immediate context concerns Hebrew male and female slaves
    being released by their masters. 'Neighbor' is the most natural rendering of רֵעַ
    here.
- source_word: וַתִּכְרְתוּ בְרִית
  chosen: you had cut a covenant
  alternatives:
  - you had made a covenant
  - you had entered into a covenant
  lexicon: HALOT
  rationale: כרת ברית is the standard Hebrew idiom 'cut a covenant.' Retaining 'cut'
    preserves the covenant-making imagery and likely alludes to the ritual described
    in the surrounding context. A more idiomatic English alternative is preserved
    in a footnote.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in my presence
  lexicon: HALOT
  rationale: This is covenantal-presence language. 'Before me' is both literal and
    idiomatic in English.
- source_word: בַּבַּיִת אֲשֶׁר נִקְרָא שְׁמִי עָלָיו
  chosen: in the house that is called by my name
  alternatives:
  - in the house over which my name is called
  - in the house that bears my name
  lexicon: HALOT
  rationale: The passive idiom 'called by my name' is a standard biblical expression
    for belonging to or being identified with God. 'House' here refers to the temple,
    but the Hebrew term itself is retained in the main text for transparency; the
    temple sense is suitable for a footnote if needed.
