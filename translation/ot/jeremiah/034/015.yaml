theological_decisions:
- issue: Rendering the covenant idiom כרת ברית
  chosen_reading: cut a covenant
  alternative_readings:
  - made a covenant
  - entered into a covenant
  rationale: The more literal rendering preserves the ritual and covenantal texture
    of the Hebrew and coheres with the immediate context of covenant-cutting in Jeremiah
    34. This is not a doctrinally disputed issue, but it carries theological significance
    regarding covenant formality and solemnity.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Gendered distributive expression אִישׁ לְרֵעֵהוּ
  chosen_reading: each man to his neighbor
  alternative_readings:
  - everyone to his neighbor
  - each one to his fellow
  rationale: The project's policy is gender-accurate over gender-neutral. The masculine
    singular distributive is preserved, especially since the surrounding legal-social
    context concerns the release of Hebrew slaves by their masters. This does not
    deny broader applicability, but it reflects the source wording more closely.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
