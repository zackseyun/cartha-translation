theological_decisions:
- issue: Rendering of slave terminology in a legal manumission/re-enslavement context
  chosen_reading: male slave / female slave
  alternative_readings:
  - servant / maidservant
  rationale: The verse concerns actual release and forced return to bondage. The bonded
    nature is central, so 'slave' best reflects the source and aligns with the project's
    stated policy for contexts where bondage is salient.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος by analogy of bonded-status rendering
- issue: Gendered distributive language
  chosen_reading: each man
  alternative_readings:
  - each one
  - everyone
  rationale: The Hebrew uses אִישׁ distributively and specifically contrasts male
    and female slaves. Retaining 'man' follows the gender-accurate policy and preserves
    the source texture.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
