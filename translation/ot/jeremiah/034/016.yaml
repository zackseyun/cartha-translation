id: JER.34.16
reference: Jeremiah 34:16
source:
  edition: WLC
  text: וַ/תָּשֻׁ֨בוּ֙ וַ/תְּחַלְּל֣וּ אֶת שְׁמִ֔/י וַ/תָּשִׁ֗בוּ אִ֤ישׁ אֶת עַבְדּ/וֹ֙
    וְ/אִ֣ישׁ אֶת שִׁפְחָת֔/וֹ אֲשֶׁר שִׁלַּחְתֶּ֥ם חָפְשִׁ֖ים לְ/נַפְשָׁ֑/ם וַ/תִּכְבְּשׁ֣וּ
    אֹתָ֔/ם לִֽ/הְי֣וֹת לָ/כֶ֔ם לַ/עֲבָדִ֖ים וְ/לִ/שְׁפָחֽוֹת־־־־׃ס
translation:
  text: But you turned back and profaned my name, and each man took back his male
    slave and each man his female slave, whom you had sent away free as they desired,
    and you forced them back into subjection to be your male slaves and female slaves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'free for themselves'; the phrase means they had been released
      to their own disposal or according to their own wish.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּשֻׁבוּ
  chosen: you turned back
  alternatives:
  - you turned around
  - you relapsed
  lexicon: HALOT
  rationale: שׁוּב with waw-consecutive here marks reversal of the prior action; 'turned
    back' preserves the concrete idiom and the sense of reneging.
- source_word: וַתְּחַלְּלוּ אֶת־שְׁמִי
  chosen: and profaned my name
  alternatives:
  - and defiled my name
  - and dishonored my name
  lexicon: HALOT
  rationale: חלל in the piel commonly means to profane or treat as common, especially
    with 'name' as object. 'Profaned my name' is the standard and most theologically
    precise rendering.
- source_word: וַתָּשִׁבוּ
  chosen: took back
  alternatives:
  - brought back
  - caused to return
  lexicon: HALOT
  rationale: Although the verb is causative ('caused to return'), in English the idiomatic
    sense in this legal-social context is that they reclaimed the persons they had
    released. 'Took back' communicates that forcefully and naturally.
- source_word: אִישׁ ... וְאִישׁ
  chosen: each man ... and each man
  alternatives:
  - each one ... and each one
  - every man ... and every man
  lexicon: HALOT
  rationale: The distributive repetition is explicit in Hebrew. 'Each man' preserves
    the gendered singular form and distributive force in line with the gender-accurate
    policy.
- source_word: עַבְדּוֹ
  chosen: his male slave
  alternatives:
  - his servant
  - his slave
  lexicon: HALOT
  rationale: Given the context of ownership, release, and re-enslavement, the bonded
    nature is salient. Following the translation philosophy, 'slave' is preferable
    to 'servant.' 'Male slave' also preserves the contrast with the following feminine
    term.
- source_word: שִׁפְחָתוֹ
  chosen: his female slave
  alternatives:
  - his maidservant
  - his slave-girl
  lexicon: HALOT
  rationale: The feminine counterpart to עבד is explicit. 'Female slave' is clear
    modern English and preserves the gender distinction without archaic tone.
- source_word: שִׁלַּחְתֶּם חָפְשִׁים
  chosen: you had sent away free
  alternatives:
  - you had let go free
  - you had released as free persons
  lexicon: HALOT
  rationale: The phrase denotes formal manumission. 'Sent away free' closely follows
    the Hebrew while remaining idiomatic.
- source_word: לְנַפְשָׁם
  chosen: as they desired
  alternatives:
  - for themselves
  - according to their own wish
  lexicon: HALOT
  rationale: Literally 'for themselves' or 'for their own persons,' but in this idiom
    it conveys release to their own disposal/self-determination. 'As they desired'
    captures the sense in natural English.
- source_word: וַתִּכְבְּשׁוּ אֹתָם
  chosen: and you forced them back into subjection
  alternatives:
  - and you subdued them
  - and you brought them into bondage
  lexicon: HALOT
  rationale: כבש conveys subduing or bringing under control, here in the context of
    re-enslavement. 'Forced them back into subjection' makes the coercive sense explicit
    and fits the legal reversal in context.
- source_word: לִהְיוֹת לָכֶם
  chosen: to be your
  alternatives:
  - to become yours as
  - to belong to you as
  lexicon: HALOT
  rationale: The infinitive phrase expresses resulting status. 'To be your' is concise
    and preserves the possessive relation.
- source_word: לַעֲבָדִים וְלִשְׁפָחוֹת
  chosen: male slaves and female slaves
  alternatives:
  - slaves, both male and female
  - servants and maidservants
  lexicon: HALOT
  rationale: The paired nouns restate the enslaved status with gender distinction.
    Rendering both explicitly preserves the Hebrew emphasis and avoids softening the
    institution.
