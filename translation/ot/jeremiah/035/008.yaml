id: JER.35.8
reference: Jeremiah 35:8
source:
  edition: WLC
  text: וַ/נִּשְׁמַ֗ע בְּ/ק֨וֹל יְהוֹנָדָ֤ב בֶּן רֵכָב֙ אָבִ֔י/נוּ לְ/כֹ֖ל אֲשֶׁ֣ר
    צִוָּ֑/נוּ לְ/בִלְתִּ֤י שְׁתֽוֹת יַ֨יִן֙ כָּל יָמֵ֔י/נוּ אֲנַ֣חְנוּ נָשֵׁ֔י/נוּ
    בָּנֵ֖י/נוּ וּ/בְנֹתֵֽי/נוּ־־־׃
translation:
  text: 'So we have obeyed the voice of Jehonadab son of Rechab, our father, in everything
    that he commanded us: not to drink wine all our days—we, our wives, our sons,
    and our daughters.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'obeyed the voice of' is an idiom meaning to heed or obey someone's
      command.
    reason: lexical_alternative
  - marker: b
    text: Jehonadab is also spelled 'Jonadab' in some English translations, reflecting
      a shortened form of the same name.
    reason: alternative_reading
lexical_decisions:
- source_word: וַנִּשְׁמַע
  chosen: we have obeyed
  alternatives:
  - we obeyed
  - we listened to
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל commonly means not merely hearing but heeding/obeying
    a person's voice. Present perfect English ('have obeyed') fits the retrospective
    testimony and resulting ongoing pattern.
- source_word: בְּקוֹל
  chosen: the voice of
  alternatives:
  - the command of
  - the instruction of
  lexicon: HALOT
  rationale: Literally 'in/by the voice of.' Retaining 'voice' preserves the Hebrew
    idiom while remaining natural in English when paired with 'obeyed.'
- source_word: יְהוֹנָדָב
  chosen: Jehonadab
  alternatives:
  - Jonadab
  rationale: Personal names are transliterated. 'Jehonadab' reflects the fuller Hebrew
    form in this verse more directly than the shortened 'Jonadab.'
- source_word: בֶּן־רֵכָב
  chosen: son of Rechab
  rationale: Standard genealogical construction; transliteration of the personal name
    is preferred.
- source_word: אָבִינוּ
  chosen: our father
  alternatives:
  - our ancestor
  lexicon: HALOT
  rationale: Although Jehonadab is an ancestral forefather rather than immediate parent,
    'our father' is the natural biblical idiom and preserves the familial covenantal
    tone.
- source_word: לְכֹל אֲשֶׁר צִוָּנוּ
  chosen: in everything that he commanded us
  alternatives:
  - according to all that he commanded us
  - in all that he commanded us
  lexicon: HALOT
  rationale: This renders the comprehensive force of לְכֹל אֲשֶׁר naturally in English
    while preserving the sense of total obedience.
- source_word: לְבִלְתִּי שְׁתוֹת יַיִן
  chosen: not to drink wine
  alternatives:
  - so as not to drink wine
  lexicon: HALOT
  rationale: The infinitive construction expresses the content of the command. 'Not
    to drink wine' is concise and accurate.
- source_word: כָּל יָמֵינוּ
  chosen: all our days
  alternatives:
  - throughout our lives
  - all the days of our life
  lexicon: HALOT
  rationale: A fairly literal rendering that remains idiomatic and preserves the lifelong
    scope of the prohibition.
- source_word: אֲנַחְנוּ נָשֵׁינוּ בָּנֵינוּ וּבְנֹתֵינוּ
  chosen: we, our wives, our sons, and our daughters
  alternatives:
  - we and our wives, sons, and daughters
  lexicon: HALOT
  rationale: The appositional list specifies the whole household. Keeping each group
    explicit reflects the Hebrew emphasis and preserves gender-accurate wording.
