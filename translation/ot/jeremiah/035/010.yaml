id: JER.35.10
reference: Jeremiah 35:10
source:
  edition: WLC
  text: וַ/נֵּ֖שֶׁב בָּֽ/אֳהָלִ֑ים וַ/נִּשְׁמַ֣ע וַ/נַּ֔עַשׂ כְּ/כֹ֥ל אֲשֶׁר צִוָּ֖/נוּ
    יוֹנָדָ֥ב אָבִֽי/נוּ־׃
translation:
  text: So we have lived in tents, and we have obeyed and done all that Jonadab our
    father commanded us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we listened and did'; Hebrew 'heard' often carries the sense of obedient
      response.
    reason: lexical_alternative
  - marker: b
    text: Jonadab can also be spelled 'Jehonadab' in English.
    reason: alternative_reading
lexical_decisions:
- source_word: וַנֵּשֶׁב
  chosen: we have lived
  alternatives:
  - we dwelt
  - we sat
  lexicon: HALOT
  rationale: From ישׁב, here in context of residence rather than the more literal
    'sat.' English perfect ('have lived') fits the speakers' summary of their continuing
    practice better than simple past.
- source_word: בָּאֳהָלִים
  chosen: in tents
  alternatives:
  - in the tents
  lexicon: HALOT
  rationale: Anarthrous plural is naturally indefinite/generic here, describing their
    mode of life rather than specific tents.
- source_word: וַנִּשְׁמַע
  chosen: we have obeyed
  alternatives:
  - we listened
  - we heard
  lexicon: HALOT
  rationale: שׁמע followed by commands commonly carries the sense of heeding/obeying,
    not merely auditory hearing. 'Obeyed' makes the covenantal-response nuance explicit
    in idiomatic English.
- source_word: וַנַּעַשׂ
  chosen: and done
  alternatives:
  - and acted
  - and carried out
  lexicon: HALOT
  rationale: עשה here complements 'obeyed' and expresses actual performance of the
    command. 'Done' preserves the Hebrew pairing of hearing/obeying and doing.
- source_word: כְּכֹל אֲשֶׁר
  chosen: all that
  alternatives:
  - according to all that
  - everything that
  lexicon: HALOT
  rationale: This idiom introduces total conformity to the command. 'All that' is
    natural English while preserving comprehensiveness.
- source_word: צִוָּנוּ
  chosen: commanded us
  alternatives:
  - ordered us
  - instructed us
  lexicon: HALOT
  rationale: צוה is the standard verb for commanding. 'Commanded' best preserves the
    authority implied in Jonadab's directives.
- source_word: יוֹנָדָב
  chosen: Jonadab
  alternatives:
  - Jehonadab
  rationale: Personal names are transliterated by standard conventions. 'Jonadab'
    matches the consonantal form here and common English usage for this spelling.
- source_word: אָבִינוּ
  chosen: our father
  alternatives:
  - our ancestor
  lexicon: HALOT
  rationale: Literally 'our father.' In context it refers to the clan forefather,
    but the literal rendering is clear and preserves the familial authority structure
    without interpretive expansion.
