theological_decisions:
- issue: Sense of שׁמע in relation to command
  chosen_reading: obeyed
  alternative_readings:
  - listened
  - heard
  rationale: The verse emphasizes faithful compliance with Jonadab's command, and
    the Hebrew idiom regularly uses שׁמע in this sense. This is a lexical-contextual
    decision rather than a doctrinally disputed one.
