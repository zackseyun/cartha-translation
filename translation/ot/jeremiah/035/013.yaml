id: JER.35.13
reference: Jeremiah 35:13
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר יְהוָ֤ה צְבָאוֹת֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל הָלֹ֤ךְ וְ/אָֽמַרְתָּ֙ לְ/אִ֣ישׁ יְהוּדָ֔ה וּ/לְ/יֽוֹשְׁבֵ֖י יְרֽוּשָׁלִָ֑ם הֲ/ל֨וֹא תִקְח֥וּ מוּסָ֛ר לִ/שְׁמֹ֥עַ אֶל דְּבָרַ֖/י נְאֻם יְהוָֽה־־־׃
translation:
  text: 'Thus says Yahweh of hosts, the God of Israel: Go and say to the men of Judah and to the inhabitants of Jerusalem, ‘Will you not accept instruction and listen to my words? declares Yahweh.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'accept discipline' or 'take correction' for 'receive instruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' preserves the formal prophetic cadence without archaic excess.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the established concise rendering that preserves the breadth of heavenly/earthly forces under God's command better than the narrower 'of armies'.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain; no reason to depart from the standard rendering.
- source_word: הָלֹךְ וְאָמַרְתָּ
  chosen: Go and say
  alternatives:
  - Go and speak
  - Go, and you shall say
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies/directs the command. 'Go and say' is natural English and preserves the imperative force.
- source_word: לְאִישׁ יְהוּדָה
  chosen: to the men of Judah
  alternatives:
  - to each man of Judah
  - to the people of Judah
  lexicon: HALOT
  rationale: Although singular in form, אִישׁ with a collective sense here refers representatively to the people of Judah. 'Men of Judah' preserves the masculine/gender-accurate form better than the more interpretive 'people of Judah.'
- source_word: וּלְיֹשְׁבֵי יְרוּשָׁלִָם
  chosen: and to the inhabitants of Jerusalem
  alternatives:
  - and to those who dwell in Jerusalem
  lexicon: HALOT
  rationale: '''Inhabitants'' is idiomatic modern English for the participial expression ''those dwelling in''.'
- source_word: הֲלוֹא
  chosen: Will you not
  alternatives:
  - Do you not
  - Surely you will not fail to
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative response. 'Will you not' fits the exhortational tone in context.
- source_word: תִקְחוּ מוּסָר
  chosen: receive instruction
  alternatives:
  - take correction
  - accept discipline
  lexicon: HALOT
  rationale: מוּסָר can denote discipline, correction, or instruction. Here, because it is immediately linked with listening to God's words, 'receive instruction' best captures the pedagogical emphasis while retaining the call to correction.
- source_word: לִשְׁמֹעַ אֶל דְּבָרַי
  chosen: by listening to my words
  alternatives:
  - to listen to my words
  - so as to listen to my words
  lexicon: HALOT
  rationale: The infinitive with ל expresses purpose/result. 'By listening to my words' makes clear that receiving instruction is effected through heeding God's speech; it is slightly dynamic but faithful to the syntax and sense.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic closing formula. 'Declares the LORD' is natural modern English and preserves the solemnity of the utterance.
