id: JER.35.6
reference: Jeremiah 35:6
source:
  edition: WLC
  text: וַ/יֹּאמְר֖וּ לֹ֣א נִשְׁתֶּה יָּ֑יִן כִּי֩ יוֹנָדָ֨ב בֶּן רֵכָ֜ב אָבִ֗י/נוּ
    צִוָּ֤ה עָלֵ֨י/נוּ֙ לֵ/אמֹ֔ר לֹ֧א תִשְׁתּוּ יַ֛יִן אַתֶּ֥ם וּ/בְנֵי/כֶ֖ם עַד עוֹלָֽם־־־־׃
translation:
  text: But they said, “We will not drink wine, for Jonadab son of Rechab, our father,
    commanded us, saying, ‘You and your sons shall not drink wine forever.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “And they said.” The Hebrew narrative conjunction can be rendered either
      way; “But” reflects the contrast with the preceding invitation to drink wine.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “our father,” meaning their forefather or ancestor Jonadab.
    reason: cultural_note
  - marker: c
    text: Hebrew “your sons,” specifically male descendants, not the more general
      “children.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: But they said
  alternatives:
  - And they said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. English can render this as
    either 'and' or 'but'; 'but' fits the immediate contrast with Jeremiah's invitation
    in the preceding context while remaining faithful to the discourse function.
- source_word: לֹא נִשְׁתֶּה יָּיִן
  chosen: We will not drink wine
  alternatives:
  - We do not drink wine
  lexicon: HALOT
  rationale: The imperfect here expresses resolve/future intention in direct speech.
    'Will not drink' best captures their stated refusal in context. 'Wine' is the
    straightforward gloss for יַיִן.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for their refusal. 'For' is concise and natural
    in English dialogue.
- source_word: יוֹנָדָב
  chosen: Jonadab
  alternatives:
  - Jehonadab
  lexicon: HALOT
  rationale: A standard English transliteration of the personal name. 'Jehonadab'
    reflects a fuller form attested elsewhere, but the consonantal form here supports
    'Jonadab'.
- source_word: בֶּן רֵכָב
  chosen: son of Rechab
  lexicon: HALOT
  rationale: Standard patronymic construction; names are transliterated per project
    philosophy.
- source_word: אָבִינוּ
  chosen: our father
  alternatives:
  - our ancestor
  lexicon: HALOT
  rationale: Although Jonadab is an ancestral forefather rather than immediate parent,
    the Hebrew term is literally 'our father' and commonly carries ancestor language.
    The more literal rendering preserves the clan-based sense without over-interpreting.
- source_word: צִוָּה עָלֵינוּ
  chosen: commanded us
  alternatives:
  - gave us a command
  - charged us
  lexicon: HALOT
  rationale: The idiom literally means 'commanded upon us,' but idiomatic English
    is 'commanded us.' This preserves the force of obligation.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive introducing direct speech.
- source_word: לֹא תִשְׁתּוּ יַיִן
  chosen: shall not drink wine
  alternatives:
  - must not drink wine
  - are not to drink wine
  lexicon: HALOT
  rationale: The imperfect in a command context is well represented by English 'shall
    not,' preserving the prescriptive force without sounding overly colloquial.
- source_word: אַתֶּם וּבְנֵיכֶם
  chosen: You and your sons
  alternatives:
  - You and your children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'sons,' not a gender-neutral term for children.
    This follows the project's gender-accurate principle and preserves the male-line
    clan emphasis of the command.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: This idiom denotes enduring duration into the indefinite future. 'Forever'
    is natural modern English and adequately conveys the force here.
