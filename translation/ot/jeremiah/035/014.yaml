theological_decisions:
- issue: Rendering the divine speech contrast with the Rechabites' obedience
  chosen_reading: Use 'But I have spoken to you, rising early and speaking, and you
    have not listened to me' without expanding to explicit covenantal rebellion language.
  alternative_readings:
  - But I have spoken to you persistently, and you have not obeyed me
  rationale: The verse itself contrasts human filial obedience with Judah's refusal
    to heed God. The translation preserves that theological force without importing
    additional interpretive language not explicit in the Hebrew.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
