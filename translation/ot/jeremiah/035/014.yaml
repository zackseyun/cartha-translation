id: JER.35.14
reference: Jeremiah 35:14
source:
  edition: WLC
  text: הוּקַ֡ם אֶת דִּבְרֵ֣י יְהוֹנָדָ֣ב בֶּן רֵ֠כָב אֲשֶׁר צִוָּ֨ה אֶת בָּנָ֜י/ו
    לְ/בִלְתִּ֣י שְׁתֽוֹת יַ֗יִן וְ/לֹ֤א שָׁתוּ֙ עַד הַ/יּ֣וֹם הַ/זֶּ֔ה כִּ֣י שָֽׁמְע֔וּ
    אֵ֖ת מִצְוַ֣ת אֲבִי/הֶ֑ם וְ/אָ֨נֹכִ֜י דִּבַּ֤רְתִּי אֲלֵי/כֶם֙ הַשְׁכֵּ֣ם וְ/דַבֵּ֔ר
    וְ/לֹ֥א שְׁמַעְתֶּ֖ם אֵלָֽ/י־־־־־־׃
translation:
  text: The words of Jehonadab son of Rechab, which he commanded his sons—not to drink
    wine—have been upheld, and they have not drunk it to this day, because they have
    obeyed the command of their father. But I have spoken to you, rising early and
    speaking, and you have not listened to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jonadab' for 'Jehonadab.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''rising early and speaking,'' expressing persistent, diligent
      address.'
    reason: cultural_note
lexical_decisions:
- source_word: הוּקַם
  chosen: have been upheld
  alternatives:
  - have been established
  - have been carried out
  - have stood firm
  lexicon: HALOT
  rationale: Passive of קום here refers to words/commands being put into effect or
    maintained. 'Have been upheld' captures both the passive form and the sense that
    Jehonadab's instruction has been observed.
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the commands of
  - the matters of
  lexicon: HALOT
  rationale: דבר is broad, but 'words' is the most direct rendering and allows the
    following relative clause and command content to specify their force.
- source_word: יְהוֹנָדָב
  chosen: Jehonadab
  alternatives:
  - Jonadab
  rationale: Personal names are transliterated. 'Jehonadab' more closely reflects
    the Hebrew form יְהוֹנָדָב, though 'Jonadab' is a familiar shortened English form.
- source_word: צִוָּה
  chosen: commanded
  alternatives:
  - charged
  - instructed
  lexicon: HALOT
  rationale: צוה denotes authoritative instruction. 'Commanded' best reflects the
    force of the father's directive.
- source_word: לְבִלְתִּי שְׁתוֹת יַיִן
  chosen: not to drink wine
  alternatives:
  - to abstain from drinking wine
  lexicon: HALOT
  rationale: The construction expresses prohibition/purpose. 'Not to drink wine' is
    direct and natural English without adding interpretive nuance.
- source_word: וְלֹא שָׁתוּ
  chosen: and they have not drunk it
  alternatives:
  - and they did not drink
  - and they have not drunk
  lexicon: HALOT
  rationale: The object 'it' is supplied naturally in English from 'wine.' Present
    perfect fits the continuing force up to 'this day'.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Idiomatic English equivalent preserving the ongoing temporal sense.
- source_word: שָׁמְעוּ
  chosen: have obeyed
  alternatives:
  - have listened to
  - have heeded
  lexicon: HALOT
  rationale: With מִצְוַת ('command'), שמע carries the sense of obedience, not mere
    auditory hearing. Rendering 'obeyed' makes the implied sense explicit.
- source_word: מִצְוַת אֲבִיהֶם
  chosen: the command of their father
  alternatives:
  - their father's command
  lexicon: HALOT
  rationale: Singular construct is best represented as a collective command/instruction
    from their father.
- source_word: וְאָנֹכִי
  chosen: But I
  alternatives:
  - And I
  - Yet I
  lexicon: HALOT
  rationale: The conjunction marks contrast between the Rechabites' obedience and
    Judah's disobedience. 'But I' brings out the rhetorical contrast.
- source_word: דִּבַּרְתִּי אֲלֵיכֶם
  chosen: have spoken to you
  alternatives:
  - spoke to you
  lexicon: HALOT
  rationale: Present perfect works well with the following iterative idiom and the
    contrast with their persistent refusal.
- source_word: הַשְׁכֵּם וְדַבֵּר
  chosen: rising early and speaking
  alternatives:
  - again and again speaking
  - persistently speaking
  - speaking early and often
  lexicon: HALOT
  rationale: This Hebrew idiom literally refers to acting early and diligently; retaining
    'rising early and speaking' preserves the imagery and prophetic idiom without
    paraphrasing away the metaphor.
- source_word: וְלֹא שְׁמַעְתֶּם אֵלַי
  chosen: and you have not listened to me
  alternatives:
  - and you have not obeyed me
  - but you did not listen to me
  lexicon: HALOT
  rationale: Here שמע with אֶל commonly means 'listen to.' Because the contrast is
    with God's speaking, 'listened to me' preserves the verbal parallel; the disobedient
    implication remains clear from context.
