id: JER.35.17
reference: Jeremiah 35:17
source:
  edition: WLC
  text: לָ֠/כֵן כֹּֽה אָמַ֨ר יְהוָ֜ה אֱלֹהֵ֤י צְבָאוֹת֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל הִנְ/נִ֧י
    מֵבִ֣יא אֶל יְהוּדָ֗ה וְ/אֶ֤ל כָּל יֽוֹשְׁבֵי֙ יְר֣וּשָׁלִַ֔ם אֵ֚ת כָּל הָ֣/רָעָ֔ה
    אֲשֶׁ֥ר דִּבַּ֖רְתִּי עֲלֵי/הֶ֑ם יַ֣עַן דִּבַּ֤רְתִּי אֲלֵי/הֶם֙ וְ/לֹ֣א שָׁמֵ֔עוּ
    וָ/אֶקְרָ֥א לָ/הֶ֖ם וְ/לֹ֥א עָנֽוּ־־־־׃
translation:
  text: 'Therefore, thus says the LORD, the God of hosts, the God of Israel: Behold,
    I am bringing on Judah and on all the inhabitants of Jerusalem all the disaster
    that I have spoken against them, because I spoke to them and they did not listen,
    and I called to them and they did not answer.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the calamity.' The Hebrew word can also be rendered 'evil' in other
      contexts, but here it refers to announced judgment coming upon Judah and Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding contrast with the
    Rechabites' obedience; 'Therefore' preserves the formal logical connection.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'thus says' is both accurate and
    idiomatic in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the doctrinal default for the divine name, preserving reverential
    convention and broad English Bible recognizability.
- source_word: אֱלֹהֵי צְבָאוֹת
  chosen: the God of hosts
  alternatives:
  - the God of armies
  - the LORD of hosts
  lexicon: HALOT
  rationale: The construct here is with 'God,' not a standalone divine title; 'hosts'
    preserves the breadth of heavenly/earthly armies without over-specifying.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward covenantal title; retained formally.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: Introduces solemn divine announcement with emphasis. 'Behold' preserves
    prophetic gravity better than a flatter modern equivalent.
- source_word: מֵבִיא
  chosen: bringing on
  alternatives:
  - bringing upon
  - bringing
  lexicon: HALOT
  rationale: With אֶל plus object of judgment, English 'bringing on' idiomatically
    conveys the imposition of coming judgment.
- source_word: אֶל יְהוּדָה וְאֶל כָּל יֹשְׁבֵי יְרוּשָׁלִַם
  chosen: on Judah and on all the inhabitants of Jerusalem
  alternatives:
  - against Judah and against all who dwell in Jerusalem
  - to Judah and to all the inhabitants of Jerusalem
  lexicon: HALOT
  rationale: Although אֶל is literally 'to/toward,' in a judgment context English
    'on' best conveys the force of disaster coming upon a people.
- source_word: כָּל הָרָעָה
  chosen: all the disaster
  alternatives:
  - all the evil
  - all the calamity
  lexicon: HALOT
  rationale: In prophetic judgment contexts רָעָה often denotes calamity/disaster
    rather than moral evil. 'Disaster' is clear modern English and avoids implying
    God commits moral evil.
- source_word: אֲשֶׁר דִּבַּרְתִּי עֲלֵיהֶם
  chosen: that I have spoken against them
  alternatives:
  - that I pronounced against them
  - that I spoke concerning them
  lexicon: HALOT
  rationale: דבר על in judgment contexts means to speak against/pronounce concerning
    in a hostile sense. 'Have spoken against' preserves the prophetic declaration.
- source_word: יַעַן
  chosen: because
  alternatives:
  - since
  - on account of the fact that
  lexicon: HALOT
  rationale: Introduces the reason for judgment; 'because' is the most natural modern
    equivalent.
- source_word: דִּבַּרְתִּי אֲלֵיהֶם
  chosen: I spoke to them
  alternatives:
  - I addressed them
  lexicon: HALOT
  rationale: Simple and direct rendering of divine address.
- source_word: וְלֹא שָׁמֵעוּ
  chosen: and they did not listen
  alternatives:
  - but they did not hear
  - and they did not obey
  lexicon: HALOT
  rationale: שׁמע can imply hearing with obedience, but here 'listen' preserves the
    auditory metaphor while allowing the disobedient force to remain implicit from
    context.
- source_word: וָאֶקְרָא לָהֶם
  chosen: and I called to them
  alternatives:
  - and I summoned them
  - and I called out to them
  lexicon: HALOT
  rationale: Keeps the repeated divine initiative vivid and personal; 'called to them'
    is idiomatic and faithful.
- source_word: וְלֹא עָנוּ
  chosen: and they did not answer
  alternatives:
  - and they did not respond
  lexicon: HALOT
  rationale: ענה here is response to God's call. 'Answer' preserves the dialogical
    imagery and the covenantal refusal.
