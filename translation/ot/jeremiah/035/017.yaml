theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of הָרָעָה in relation to divine judgment
  chosen_reading: disaster
  alternative_readings:
  - evil
  - calamity
  rationale: The Hebrew term can denote either moral evil or harmful calamity depending
    on context. In this judgment oracle, the referent is announced punishment, so
    'disaster' preserves the sense without suggesting that God performs moral evil.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
