id: JER.35.15
reference: Jeremiah 35:15
source:
  edition: WLC
  text: וָ/אֶשְׁלַ֣ח אֲלֵי/כֶ֣ם אֶת כָּל עֲבָדַ֣/י הַ/נְּבִאִ֣ים הַשְׁכֵּ֣ים וְ/שָׁלֹ֣חַ
    לֵ/אמֹ֡ר שֻׁבוּ נָ֡א אִישׁ֩ מִ/דַּרְכּ֨/וֹ הָ/רָעָ֜ה וְ/הֵיטִ֣יבוּ מַֽעַלְלֵי/כֶ֗ם
    וְ/אַל תֵּ֨לְכ֜וּ אַחֲרֵ֨י אֱלֹהִ֤ים אֲחֵרִים֙ לְ/עָבְדָ֔/ם וּ/שְׁבוּ֙ אֶל הָ֣/אֲדָמָ֔ה
    אֲשֶׁר נָתַ֥תִּי לָ/כֶ֖ם וְ/לַ/אֲבֹֽתֵי/כֶ֑ם וְ/לֹ֤א הִטִּיתֶם֙ אֶֽת אָזְנְ/כֶ֔ם
    וְ/לֹ֥א שְׁמַעְתֶּ֖ם אֵלָֽ/י־־׀׀־־־־־׃
translation:
  text: And I sent to you all my servants the prophets, rising early and sending them,
    saying, ‘Please turn back, each man from his evil way, and make your deeds good,
    and do not go after other gods to serve them. Then dwell in the land that I gave
    to you and to your fathers.’ But you did not incline your ear or listen to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Please return,” or more interpretively, “Repent.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “each man from his evil way,” a distributive expression meaning each
      person individually.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew idiom: “rising early and sending,” expressing persistent, earnest
      sending.'
    reason: cultural_note
  - marker: d
    text: Or “amend your deeds.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁלַח
  chosen: And I sent
  alternatives:
  - And I have sent
  lexicon: HALOT
  rationale: Wayyiqtol narrative form is best rendered as simple past in this context,
    continuing YHWH's recounting of repeated prophetic sending.
- source_word: עֲבָדַי הַנְּבִאִים
  chosen: my servants the prophets
  alternatives:
  - my servants, the prophets
  - my prophet-servants
  lexicon: HALOT
  rationale: Keeps the appositional force and preserves the theological designation
    of prophets as YHWH's servants without paraphrase.
- source_word: הַשְׁכֵּים וְשָׁלֹחַ
  chosen: rising early and sending them
  alternatives:
  - again and again sending
  - persistently sending
  - rising early and sending
  lexicon: HALOT
  rationale: This Hebrew idiom conveys eagerness and persistence. The more formal
    rendering 'rising early and sending' is retained, with 'them' supplied in English
    for clarity since the object is the prophets.
- source_word: שֻׁבוּ נָא
  chosen: Please turn back
  alternatives:
  - Please return
  - Turn back, please
  - Repent, please
  lexicon: HALOT
  rationale: שׁוּב here calls for turning from evil conduct. 'Turn back' preserves
    the concrete metaphor without importing the fuller theological term 'repent' beyond
    the lexical sense; נָא is reflected by 'please'.
- source_word: אִישׁ מִדַּרְכּוֹ הָרָעָה
  chosen: each man from his evil way
  alternatives:
  - each one from his evil way
  - each man from his wicked way
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the source's singular distributive
    אִישׁ. 'Evil way' is a standard prophetic idiom for sinful conduct; 'wicked' is
    possible but 'evil' more directly matches רָעָה.
- source_word: וְהֵיטִיבוּ מַעַלְלֵיכֶם
  chosen: and make your deeds good
  alternatives:
  - and amend your deeds
  - and improve your actions
  - and make your practices good
  lexicon: HALOT
  rationale: The Hiphil of יטב means to make good/improve. 'Make your deeds good'
    stays close to the Hebrew while remaining intelligible; 'amend' is idiomatic but
    slightly interpretive.
- source_word: וְאַל תֵּלְכוּ אַחֲרֵי אֱלֹהִים אֲחֵרִים
  chosen: and do not go after other gods
  alternatives:
  - and do not follow other gods
  lexicon: HALOT
  rationale: '''Go after'' preserves the Hebrew metaphor used for apostasy/idolatry;
    ''follow'' is smoother but less literal.'
- source_word: לְעָבְדָם
  chosen: to serve them
  alternatives:
  - to worship them
  lexicon: HALOT
  rationale: עבד with gods can imply worshipful service, but 'serve' best preserves
    the lexical range and avoids narrowing the term unnecessarily.
- source_word: וּשְׁבוּ אֶל הָאֲדָמָה
  chosen: Then dwell in the land
  alternatives:
  - and dwell in the land
  - so that you may dwell in the land
  - and remain in the land
  lexicon: HALOT
  rationale: יָשַׁב means dwell/remain. In context it expresses the result of obedience.
    'Then dwell' captures the imperative sequence without over-explicitly converting
    it into a purpose clause.
- source_word: הָאֲדָמָה
  chosen: the land
  alternatives:
  - the ground
  - the soil
  lexicon: HALOT
  rationale: In covenantal context this refers to the land given by God, not merely
    soil.
- source_word: אֲשֶׁר נָתַתִּי לָכֶם וְלַאֲבֹתֵיכֶם
  chosen: that I gave to you and to your fathers
  alternatives:
  - which I gave to you and your fathers
  - that I have given to you and your fathers
  lexicon: HALOT
  rationale: Simple past fits the retrospective covenantal reference. 'Fathers' preserves
    the Hebrew idiom for ancestors.
- source_word: וְלֹא הִטִּיתֶם אֶת אָזְנְכֶם
  chosen: But you did not incline your ear
  alternatives:
  - But you did not pay attention
  - But you did not listen attentively
  lexicon: HALOT
  rationale: This idiom is preserved because it is vivid and understandable in modern
    English, and it pairs naturally with the following 'or listen to me.'
- source_word: וְלֹא שְׁמַעְתֶּם אֵלָי
  chosen: or listen to me
  alternatives:
  - or obey me
  - and you did not listen to me
  lexicon: HALOT
  rationale: שׁמע can imply obedience, but here the parallel with 'incline your ear'
    favors the auditory/listening sense, while the disobedient implication remains
    contextually clear.
