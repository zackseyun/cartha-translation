theological_decisions:
- issue: Rendering of אִישׁ in a distributive exhortation
  chosen_reading: each man
  alternative_readings:
  - each one
  - everyone
  rationale: The source uses grammatically masculine singular with representative
    force. Per doctrine, gender-accurate rendering is preferred over flattening to
    gender-neutral language, while the distributive sense is preserved.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Prophetic call to שׁוּב
  chosen_reading: turn back
  alternative_readings:
  - repent
  - return
  rationale: The verse calls for moral turning from evil ways. 'Turn back' preserves
    the Hebrew metaphor and theological tension without importing a more systematized
    repentance vocabulary than the text itself requires.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
