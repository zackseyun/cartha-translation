id: JER.35.9
reference: Jeremiah 35:9
source:
  edition: WLC
  text: וּ/לְ/בִלְתִּ֛י בְּנ֥וֹת בָּתִּ֖ים לְ/שִׁבְתֵּ֑/נוּ וְ/כֶ֧רֶם וְ/שָׂדֶ֛ה וָ/זֶ֖רַע
    לֹ֥א יִֽהְיֶה לָּֽ/נוּ־׃
translation:
  text: and not to build houses for us to live in; and vineyard and field and seed
    have not belonged to us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and vineyard and field and seed have not been ours'
      / 'there has not been for us vineyard, field, or seed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְבִלְתִּי
  chosen: and not to
  alternatives:
  - and so as not to
  - and in order not to
  lexicon: HALOT
  rationale: Combines the conjunction with the negative-purpose construction. In this
    list of abstentions, English idiom is best served by 'and not to' rather than
    a more wooden 'and for not'.
- source_word: בְּנוֹת
  chosen: build
  alternatives:
  - construct
  lexicon: HALOT
  rationale: Qal infinitive construct of בנה, straightforwardly 'to build.' 'Build'
    is the natural modern English equivalent.
- source_word: בָּתִּים
  chosen: houses
  alternatives:
  - homes
  lexicon: HALOT
  rationale: Literal plural of 'house.' 'Houses' preserves the concrete sense better
    than the more interpretive 'homes.'
- source_word: לְשִׁבְתֵּנוּ
  chosen: for us to live in
  alternatives:
  - for our dwelling
  - for us to dwell in
  lexicon: HALOT
  rationale: 'Infinitive of ישׁב with first person plural suffix expresses purpose/result:
    houses for dwelling. ''For us to live in'' is clear modern English while preserving
    the sense.'
- source_word: וְכֶרֶם
  chosen: vineyard
  alternatives:
  - a vineyard
  lexicon: HALOT
  rationale: Concrete agricultural term. Rendered singular as in Hebrew, functioning
    collectively in the list.
- source_word: וְשָׂדֶה
  chosen: field
  alternatives:
  - farmland
  - a field
  lexicon: HALOT
  rationale: Basic lexical sense is 'field.' Kept singular to mirror the Hebrew list
    of property types.
- source_word: וָזֶרַע
  chosen: seed
  alternatives:
  - seed for sowing
  - crops
  lexicon: HALOT
  rationale: Literal 'seed.' Although it can imply sown produce or agricultural stock,
    'seed' best preserves the Hebrew wording without over-interpreting.
- source_word: לֹא יִהְיֶה לָּנוּ
  chosen: have not belonged to us
  alternatives:
  - we have had none
  - there has not been for us
  - we have not had
  lexicon: HALOT
  rationale: The idiom 'there is/was not to us' expresses possession. Because the
    surrounding context recounts an ongoing customary condition, English perfect 'have
    not belonged to us' captures the state of non-possession. 'Belonged to us' also
    fits the list of property holdings.
