id: JER.35.5
reference: Jeremiah 35:5
source:
  edition: WLC
  text: וָ/אֶתֵּ֞ן לִ/פְנֵ֣י בְּנֵ֣י בֵית הָ/רֵכָבִ֗ים גְּבִעִ֛ים מְלֵאִ֥ים יַ֖יִן
    וְ/כֹס֑וֹת וָ/אֹמַ֥ר אֲלֵי/הֶ֖ם שְׁתוּ יָֽיִן׀־־׃
translation:
  text: Then I set before the sons of the house of the Rekabites bowls full of wine
    and cups, and I said to them, “Drink wine.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Rechabites,” following the more traditional English spelling.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתֵּן
  chosen: Then I set
  alternatives:
  - And I set
  - Then I placed
  lexicon: HALOT
  rationale: נתן literally means 'give/put/set.' In this context with לִפְנֵי ('before')
    and physical vessels, 'set before' is the most natural English rendering. 'Then'
    reflects the narrative waw-consecutive in smooth English.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  lexicon: HALOT
  rationale: The preposition with פנים commonly means 'before/in the presence of.'
    'Before' is idiomatic with 'set' in English.
- source_word: בְּנֵי בֵית
  chosen: the sons of the house of
  alternatives:
  - the members of the household of
  - the sons of
  lexicon: HALOT
  rationale: Formally, the Hebrew says 'sons of the house of.' This preserves the
    familial/household structure of the expression better than flattening it to 'members,'
    while remaining understandable.
- source_word: הָרֵכָבִים
  chosen: the Rekabites
  alternatives:
  - the Rechabites
  lexicon: HALOT
  rationale: A standard transliteration of the group name from Hebrew רֵכָבִים. 'Rechabites'
    reflects older English tradition; 'Rekabites' more directly represents the Hebrew
    consonant כ/ק sound pattern in modern transliteration.
- source_word: גְּבִעִים
  chosen: bowls
  alternatives:
  - goblets
  - basins
  lexicon: HALOT
  rationale: The noun denotes bowl-like drinking vessels. 'Bowls' best matches the
    likely shape and avoids over-specifying luxury implied by 'goblets.'
- source_word: מְלֵאִים יַיִן
  chosen: full of wine
  alternatives:
  - filled with wine
  lexicon: HALOT
  rationale: A straightforward rendering of the adjective plus object construction;
    'full of wine' is concise and natural.
- source_word: וְכֹסוֹת
  chosen: and cups
  alternatives:
  - and drinking cups
  lexicon: HALOT
  rationale: כּוֹס refers to cups. Retaining both 'bowls' and 'cups' preserves the
    Hebrew's mention of two vessel types.
- source_word: וָאֹמַר אֲלֵיהֶם
  chosen: and I said to them
  alternatives:
  - and I told them
  lexicon: HALOT
  rationale: אמר is the standard verb 'say.' 'Said to them' is the most direct rendering.
- source_word: שְׁתוּ יַיִן
  chosen: Drink wine
  alternatives:
  - Drink some wine
  lexicon: HALOT
  rationale: An imperative plural plus object. 'Drink wine' is direct and preserves
    the terseness of the command; adding 'some' would be interpretive.
