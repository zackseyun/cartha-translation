theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse identifies the source of revelation as Israel's covenant God.
    Per DOCTRINE.md, the default rendering for יְהוָה is 'the LORD'; alternatives
    are not adopted in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
