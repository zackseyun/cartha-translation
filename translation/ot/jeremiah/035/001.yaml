id: JER.35.1
reference: Jeremiah 35:1
source:
  edition: WLC
  text: הַ/דָּבָ֛ר אֲשֶׁר הָיָ֥ה אֶֽל יִרְמְיָ֖הוּ מֵ/אֵ֣ת יְהוָ֑ה בִּ/ימֵ֨י יְהוֹיָקִ֧ים בֶּן יֹאשִׁיָּ֛הוּ מֶ֥לֶךְ יְהוּדָ֖ה לֵ/אמֹֽר־־־׃
translation:
  text: The word that came to Jeremiah from Yahweh in the days of Jehoiakim son of Josiah, king of Judah, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Yahweh." The Hebrew has the divine name YHWH.
    reason: alternative_reading
lexical_decisions:
- source_word: הַדָּבָר
  chosen: The word
  alternatives:
  - The message
  - This word
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word' or 'matter/message.' In prophetic superscriptions, 'the word that came' is a conventional and transparent English rendering that preserves the formulaic character of the Hebrew.
- source_word: אֲשֶׁר הָיָה אֶל
  chosen: that came to
  alternatives:
  - that was to
  - that happened to
  lexicon: HALOT
  rationale: The idiom 'was/came to' with prophetic recipients introduces divine revelation. 'Came to' is standard English for this Hebrew prophetic formula and better conveys reception of revelation than a more wooden 'was to.'
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  rationale: Personal name transliterated by standard English convention, in keeping with the translation philosophy to transliterate names.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from the presence of
  - from with
  lexicon: HALOT
  rationale: In this construction with YHWH, מֵאֵת marks source/origin. 'From' is the natural English equivalent.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during the reign of
  - in the time of
  lexicon: HALOT
  rationale: Literally 'in the days of.' Although the context is royal chronology, the Hebrew expression is broader than 'during the reign of,' so 'in the days of' preserves the source wording while remaining natural.
- source_word: יְהוֹיָקִים
  chosen: Jehoiakim
  rationale: Personal name transliterated by standard English convention.
- source_word: בֶּן יֹאשִׁיָּהוּ
  chosen: son of Josiah
  rationale: Standard genealogical expression; 'son of' is the direct and natural rendering.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - the king of Judah
  lexicon: HALOT
  rationale: Construct chain identifying Jehoiakim's office. English apposition works naturally without adding emphasis not present in Hebrew.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'thus:'
  - 'as follows:'
  lexicon: HALOT
  rationale: This infinitive introduces the following divine speech in the next verse. Retaining 'saying,' preserves the discourse linkage and formal prophetic style.
