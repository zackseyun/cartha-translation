id: JER.35.3
reference: Jeremiah 35:3
source:
  edition: WLC
  text: וָ/אֶקַּ֞ח אֶת יַאֲזַנְיָ֤ה בֶֽן יִרְמְיָ֨הוּ֙ בֶּן חֲבַצִּנְיָ֔ה וְ/אֶת אֶחָ֖י/ו
    וְ/אֶת כָּל בָּנָ֑י/ו וְ/אֵ֖ת כָּל בֵּ֥ית הָ/רֵכָבִֽים־־־־־־־׃
translation:
  text: So I took Jaazaniah son of Jeremiah, son of Habazziniah, and his brothers,
    and all his sons, and the whole house of the Rechabites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Then I took” or “And I took.” The Hebrew narrative form can be rendered
      in several natural English ways.
    reason: lexical_alternative
  - marker: b
    text: “House” here means the household or clan of the Rechabites, not merely a
      physical building.
    reason: cultural_note
lexical_decisions:
- source_word: וָאֶקַּח
  chosen: So I took
  alternatives:
  - Then I took
  - And I took
  lexicon: HALOT
  rationale: Qal wayyiqtol of לקח, narrating the next action in sequence. 'So I took'
    gives natural English narrative flow while preserving the consecutive sense.
- source_word: יַאֲזַנְיָה
  chosen: Jaazaniah
  alternatives:
  - Jazaniah
  rationale: Personal name is transliterated per project philosophy. 'Jaazaniah' closely
    reflects the Hebrew form.
- source_word: בֶן
  chosen: son of
  lexicon: HALOT
  rationale: Standard genealogical use indicating direct descent in this immediate
    naming chain.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  alternatives:
  - Yirmeyahu
  rationale: Conventional English transliteration of the personal name.
- source_word: חֲבַצִּנְיָה
  chosen: Habazziniah
  alternatives:
  - Habazziniah
  rationale: Personal name transliterated from Hebrew; spelling chosen to reflect
    the doubled consonant and standard English convention.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his kinsmen
  lexicon: HALOT
  rationale: The ordinary sense of אח is 'brother.' No contextual pressure here requires
    the broader kinship sense, so the more direct rendering is preferred. This also
    follows the gender-accurate principle.
- source_word: כָּל בָּנָיו
  chosen: all his sons
  alternatives:
  - all his children
  - all his descendants
  lexicon: HALOT
  rationale: בנים here is grammatically and semantically masculine plural. In context
    it likely refers to male members of his household line, so 'sons' is more accurate
    than the gender-neutral 'children.'
- source_word: כָּל בֵּית הָרֵכָבִים
  chosen: the whole house of the Rechabites
  alternatives:
  - all the house of the Rechabites
  - the entire household of the Rechabites
  lexicon: HALOT
  rationale: בֵּית in this idiom refers to a household/clan. 'House' preserves the
    familial-corporate sense common in biblical usage, while 'the whole' renders כָּל
    naturally in English. 'Rechabites' is the standard gentilic rendering of הָרֵכָבִים.
