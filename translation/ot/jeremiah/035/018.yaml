id: JER.35.18
reference: Jeremiah 35:18
source:
  edition: WLC
  text: וּ/לְ/בֵ֨ית הָ/רֵכָבִ֜ים אָמַ֣ר יִרְמְיָ֗הוּ כֹּֽה אָמַ֞ר יְהוָ֤ה צְבָאוֹת֙
    אֱלֹהֵ֣י יִשְׂרָאֵ֔ל יַ֚עַן אֲשֶׁ֣ר שְׁמַעְתֶּ֔ם עַל מִצְוַ֖ת יְהוֹנָדָ֣ב אֲבִי/כֶ֑ם
    וַֽ/תִּשְׁמְרוּ֙ אֶת כָּל מִצְוֺתָ֔י/ו וַֽ/תַּעֲשׂ֔וּ כְּ/כֹ֥ל אֲשֶׁר צִוָּ֖ה
    אֶתְ/כֶֽם־־־־־׃ס
translation:
  text: 'And to the house of the Rechabites Jeremiah said, “Thus says the LORD of
    hosts, the God of Israel: Because you have obeyed the command of Jehonadab your
    father, and have kept all his commands, and have done according to all that he
    commanded you,”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Jehonadab; elsewhere often spelled Jonadab in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְבֵית הָרֵכָבִים
  chosen: And to the house of the Rechabites
  alternatives:
  - And to the family of the Rechabites
  - And to the household of the Rechabites
  lexicon: HALOT
  rationale: בַּיִת in this construction can denote a household, family line, or house.
    'House' preserves the idiomatic covenantal/familial sense in a concise, traditional
    but still clear English form.
- source_word: אָמַר יִרְמְיָהוּ
  chosen: Jeremiah said
  alternatives:
  - Jeremiah spoke
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol/reporting formula; 'said' is the most natural
    and direct rendering.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal
    prophetic register without unnecessary paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD'.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the divine title יְהוָה צְבָאוֹת, 'of hosts' is the standard concise
    rendering and preserves the breadth of heavenly/earthly armies implied by the
    Hebrew.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain; no reason to depart from the standard
    rendering.
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Because that
  - Inasmuch as
  lexicon: HALOT
  rationale: The pair introduces the reason for the following divine declaration.
    'Because' is natural modern English and captures the causal force.
- source_word: שְׁמַעְתֶּם עַל מִצְוַת
  chosen: you have obeyed the command of
  alternatives:
  - you have listened to the command of
  - you have heeded the command of
  lexicon: HALOT
  rationale: שׁמע with עַל in this context conveys responsive obedience, not mere
    auditory hearing. 'Obeyed' best reflects the practical sense.
- source_word: יְהוֹנָדָב אֲבִיכֶם
  chosen: Jehonadab your father
  alternatives:
  - Jonadab your father
  lexicon: HALOT
  rationale: The Hebrew form here is Jehonadab; transliterating the form present in
    the text follows the stated philosophy to transliterate names by standard conventions.
- source_word: וַתִּשְׁמְרוּ אֶת כָּל מִצְוֺתָיו
  chosen: and have kept all his commands
  alternatives:
  - and have observed all his commands
  - and have kept all his commandments
  lexicon: HALOT
  rationale: שׁמר in relation to commands commonly means to keep/observe. 'Commands'
    is more readable modern English than 'commandments' while preserving meaning.
- source_word: וַתַּעֲשׂוּ כְּכֹל אֲשֶׁר צִוָּה אֶתְכֶם
  chosen: and have done according to all that he commanded you
  alternatives:
  - and have done all that he commanded you
  - and have acted according to everything he commanded you
  lexicon: HALOT
  rationale: The כְּ in כְּכֹל adds the sense 'according to/in accordance with.' Retaining
    it avoids flattening the Hebrew expression.
