id: JER.35.11
reference: Jeremiah 35:11
source:
  edition: WLC
  text: וַ/יְהִ֗י בַּ/עֲל֨וֹת נְבוּכַדְרֶאצַּ֥ר מֶֽלֶךְ בָּבֶל֮ אֶל הָ/אָרֶץ֒ וַ/נֹּ֗אמֶר
    בֹּ֚אוּ וְ/נָב֣וֹא יְרוּשָׁלִַ֔ם מִ/פְּנֵי֙ חֵ֣יל הַ/כַּשְׂדִּ֔ים וּ/מִ/פְּנֵ֖י
    חֵ֣יל אֲרָ֑ם וַ/נֵּ֖שֶׁב בִּ/ירוּשָׁלִָֽם־־׃פ
translation:
  text: But when Nebuchadnezzar king of Babylon came up against the land, we said,
    ‘Come, and let us go to Jerusalem because of the army of the Chaldeans and because
    of the army of Aram.’ So we have lived in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Babylonians' for 'the Chaldeans.'
    reason: lexical_alternative
  - marker: b
    text: '''Aram'' is traditionally rendered ''Syria.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: But when
  alternatives:
  - And it happened
  - Now when
  lexicon: HALOT
  rationale: The waw + היה introduces a new circumstance in narrative. 'But when'
    captures both the temporal setup and the mild contrast with the preceding command
    to dwell in tents, while remaining natural English.
- source_word: בַּעֲלוֹת
  chosen: came up against
  alternatives:
  - went up to
  - came up to
  lexicon: HALOT
  rationale: עלה with אל הארץ in military context refers to advancing into/against
    the land. 'Came up against' makes the hostile movement explicit from context without
    over-paraphrasing.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  lexicon: HALOT
  rationale: '''The land'' is the standard rendering of הארץ and fits Jeremiah''s
    idiom for Judah''s territory.'
- source_word: וַנֹּאמֶר
  chosen: we said
  alternatives:
  - we said to one another
  lexicon: HALOT
  rationale: Simple first-person plural speech introduction; no indirect object is
    explicit, so the concise rendering is preferred.
- source_word: בֹּאוּ וְנָבוֹא
  chosen: Come, and let us go
  alternatives:
  - Come, let us enter
  - Come, let us go in
  lexicon: HALOT
  rationale: The idiom uses an imperative plus cohortative to express collective resolve.
    'Come, and let us go' preserves the exhortational force and natural English rhythm.
- source_word: יְרוּשָׁלַםִ
  chosen: Jerusalem
  rationale: Standard transliteration of the place name.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - for fear of
  lexicon: HALOT
  rationale: Here מפני gives the reason for seeking refuge. 'Because of' is broad
    and accurate; 'for fear of' is possible but slightly more interpretive.
- source_word: חֵיל
  chosen: army
  alternatives:
  - force
  - troops
  lexicon: HALOT
  rationale: חיל here denotes an armed military force. 'Army' is the clearest modern
    equivalent.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: Jeremiah frequently uses 'Chaldeans' as the ethnic-political designation
    for Babylonian forces. Retaining it preserves the source wording; the more familiar
    'Babylonians' is a viable alternative.
- source_word: אֲרָם
  chosen: Aram
  alternatives:
  - Syria
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than translated
    where possible. 'Aram' preserves the Hebrew proper name; 'Syria' is a later conventional
    equivalent and is worth preserving in a footnote.
- source_word: וַנֵּשֶׁב
  chosen: we have lived
  alternatives:
  - we settled
  - we have stayed
  - we dwell
  lexicon: HALOT
  rationale: ישב can mean dwell, sit, remain, or settle. In context the Rechabites
    explain their present residence in Jerusalem as the result of that decision, so
    English present perfect best conveys the continuing state from a past action.
