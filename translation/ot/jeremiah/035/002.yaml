id: JER.35.2
reference: Jeremiah 35:2
source:
  edition: WLC
  text: הָלוֹךְ֮ אֶל בֵּ֣ית הָ/רֵכָבִים֒ וְ/דִבַּרְתָּ֣ אוֹתָ֔/ם וַ/הֲבִֽאוֹתָ/ם֙ בֵּ֣ית יְהוָ֔ה אֶל אַחַ֖ת הַ/לְּשָׁכ֑וֹת וְ/הִשְׁקִיתָ֥ אוֹתָ֖/ם יָֽיִן־־׃
translation:
  text: Go to the house of the Rechabites, and speak to them, and bring them to the house of Yahweh, into one of the chambers, and give them wine to drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of the LORD.' Literally, 'the house of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלוֹךְ
  chosen: Go
  alternatives:
  - Go on
  - Walk
  lexicon: HALOT
  rationale: Imperative of הלך functioning as a direct command. 'Go' is the natural concise English imperative.
- source_word: בֵּית הָרֵכָבִים
  chosen: the house of the Rechabites
  alternatives:
  - the household of the Rechabites
  - the family of the Rechabites
  lexicon: HALOT
  rationale: בֵּית can denote household/family, but here the phrase identifies the Rechabite clan as a social unit. 'House of the Rechabites' preserves the Hebrew idiom while remaining understandable.
- source_word: וְדִבַּרְתָּ אֹתָם
  chosen: speak with them
  alternatives:
  - speak to them
  - address them
  lexicon: HALOT
  rationale: דבר with אֵת commonly means speak with/to someone. 'Speak with them' fits the context of summoning them and avoids overformal diction.
- source_word: וַהֲבִיאוֹתָם
  chosen: bring them
  alternatives:
  - lead them in
  - cause them to come
  lexicon: HALOT
  rationale: Hiphil of בוא is causative. 'Bring them' is idiomatic English and accurately reflects the causative sense.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' Because יְהוָה is rendered by doctrinal default as 'the LORD,' and because the Hebrew says 'house' rather than the more interpretive 'temple,' the main text keeps 'house of the LORD.'
- source_word: אַחַת הַלְּשָׁכוֹת
  chosen: one of the chambers
  alternatives:
  - one of the rooms
  - one of the cells
  lexicon: HALOT
  rationale: לשכה refers to a chamber/room, often in temple precincts. 'Chambers' preserves the architectural/temple setting better than the generic 'rooms.'
- source_word: וְהִשְׁקִיתָ אֹתָם יָיִן
  chosen: give them wine to drink
  alternatives:
  - make them drink wine
  - offer them wine
  lexicon: HALOT
  rationale: Hiphil of שקה means cause to drink/give drink. 'Give them wine to drink' is natural English and avoids implying coercion that 'make them drink' might suggest in this context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
