id: JER.35.4
reference: Jeremiah 35:4
source:
  edition: WLC
  text: וָ/אָבִ֤א אֹתָ/ם֙ בֵּ֣ית יְהוָ֔ה אֶל לִשְׁכַּ֗ת בְּנֵ֛י חָנָ֥ן בֶּן יִגְדַּלְיָ֖הוּ אִ֣ישׁ הָ/אֱלֹהִ֑ים אֲשֶׁר אֵ֨צֶל֙ לִשְׁכַּ֣ת הַ/שָּׂרִ֔ים אֲשֶׁ֣ר מִ/מַּ֗עַל לְ/לִשְׁכַּ֛ת מַעֲשֵׂיָ֥הוּ בֶן שַׁלֻּ֖ם שֹׁמֵ֥ר הַ/סַּֽף־־־־׃
translation:
  text: So I brought them into the house of Yahweh, into the chamber of the sons of Hanan son of Igdaliah, the man of God, which was beside the chamber of the officials, which was above the chamber of Maaseiah son of Shallum, the keeper of the threshold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of the LORD.' Literally, 'the house of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: '''The sons of Hanan'' may refer to Hanan''s descendants, household, or associated group.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the doorkeeper.' Literally, 'the keeper of the threshold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָבִא
  chosen: So I brought
  alternatives:
  - And I brought
  - Then I brought
  lexicon: HALOT
  rationale: Wayyiqtol of בוא in first person singular narrates the next event in sequence. 'So I brought' gives natural English narrative flow while preserving the causal/sequential force.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression; 'temple' is possible but less formally transparent. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: לִשְׁכַּת
  chosen: the chamber
  alternatives:
  - the room
  - the cell
  lexicon: HALOT
  rationale: לשכה denotes a chamber/room, often one of the temple side rooms. 'Chamber' fits the temple setting and preserves the somewhat formal architectural sense.
- source_word: בְּנֵי חָנָן
  chosen: the sons of Hanan
  alternatives:
  - the sons of Hanan
  - the family of Hanan
  lexicon: HALOT
  rationale: The construct phrase is literally 'sons of Hanan.' Although it may denote descendants or a household/group associated with Hanan, the literal rendering is clear and auditable.
- source_word: אִישׁ הָאֱלֹהִים
  chosen: the man of God
  alternatives:
  - a man of God
  lexicon: HALOT
  rationale: With the article on אֱלֹהִים, the phrase functions as the recognized title 'man of God.' The definite rendering best reflects the Hebrew and the likely honorific sense.
- source_word: אֵצֶל
  chosen: beside
  alternatives:
  - next to
  - near
  lexicon: HALOT
  rationale: The preposition indicates proximity. 'Beside' is concise and fits the spatial description.
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the leaders
  lexicon: HALOT
  rationale: שׂרים can mean princes, officials, or officers. In this temple-administrative context, 'officials' is the clearest modern English choice without implying royal sons specifically.
- source_word: מִמַּעַל לְ
  chosen: above
  alternatives:
  - over
  - higher than
  lexicon: HALOT
  rationale: The phrase marks vertical location. 'Above' is the most natural architectural rendering.
- source_word: שֹׁמֵר הַסַּף
  chosen: the keeper of the threshold
  alternatives:
  - the doorkeeper
  - the keeper of the door
  lexicon: HALOT
  rationale: Literally 'keeper of the threshold.' This likely denotes a temple gatekeeper/door official, but the more literal rendering preserves the Hebrew image and office title.
- source_word: חָנָן ... יִגְדַּלְיָהוּ ... מַעֲשֵׂיָהוּ ... שַׁלֻּם
  chosen: Hanan ... Igdaliah ... Maaseiah ... Shallum
  lexicon: standard transliteration conventions
  rationale: Personal names are transliterated rather than translated, per project philosophy.
