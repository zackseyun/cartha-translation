theological_decisions:
- issue: Rendering of filial language for the Rechabite clan
  chosen_reading: their father
  alternative_readings:
  - their ancestor
  rationale: The Hebrew uses direct familial language, and the verse's force depends
    on contrasting the obedience shown to a human forefather with Judah's refusal
    to heed the LORD. Retaining 'father' preserves that rhetorical and theological
    contrast.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
    and §5 (consistency of key terms, or documented exception)
