id: JER.35.16
reference: Jeremiah 35:16
source:
  edition: WLC
  text: כִּ֣י הֵקִ֗ימוּ בְּנֵי֙ יְהוֹנָדָ֣ב בֶּן רֵכָ֔ב אֶת מִצְוַ֥ת אֲבִי/הֶ֖ם אֲשֶׁ֣ר
    צִוָּ֑/ם וְ/הָ/עָ֣ם הַ/זֶּ֔ה לֹ֥א שָׁמְע֖וּ אֵלָֽ/י־־׃ס
translation:
  text: For the sons of Jehonadab son of Rechab have kept the command of their father
    that he commanded them, but this people have not listened to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their ancestor'; Hebrew 'their father.'
    reason: lexical_alternative
  - marker: b
    text: '''Listened to me'' can also carry the sense ''obeyed me.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding statement; 'For' preserves
    the explanatory force in natural English.
- source_word: הֵקִימוּ
  chosen: have kept
  alternatives:
  - have established
  - have carried out
  - have upheld
  lexicon: HALOT
  rationale: From קום in the Hiphil, here idiomatically with מִצְוַת meaning to cause
    a command to stand, i.e., to keep or uphold it. 'Have kept' is the most natural
    English equivalent in this obedience context.
- source_word: בְּנֵי יְהוֹנָדָב בֶּן רֵכָב
  chosen: the sons of Jehonadab son of Rechab
  alternatives:
  - the descendants of Jehonadab son of Rechab
  lexicon: HALOT
  rationale: בְּנֵי can mean literal sons or broader descendants. Given the clan context
    in Jeremiah 35, 'sons' is retained as a formally closer rendering while still
    idiomatic in English biblical style.
- source_word: מִצְוַת
  chosen: the command
  alternatives:
  - the commandment
  - the instruction
  lexicon: HALOT
  rationale: מִצְוָה denotes a command or injunction. 'Command' is clear modern English
    and avoids overly ecclesiastical tone while preserving authority.
- source_word: אֲבִיהֶם
  chosen: their father
  alternatives:
  - their ancestor
  lexicon: HALOT
  rationale: Literally 'their father.' In context Jehonadab is the forefather of the
    group, but the Hebrew uses the familial term directly; the literal rendering preserves
    the rhetoric of filial obedience.
- source_word: אֲשֶׁר צִוָּם
  chosen: that he commanded them
  alternatives:
  - which he commanded them
  - that he gave them as a command
  lexicon: HALOT
  rationale: Straightforward relative clause specifying the content of the command.
    'That he commanded them' is natural and close to the Hebrew syntax.
- source_word: וְהָעָם הַזֶּה
  chosen: but this people
  alternatives:
  - and this people
  - while this people
  lexicon: HALOT
  rationale: The conjunction marks contrast in context between the Rechabites' obedience
    and Judah's disobedience. English 'but' makes the adversative force explicit.
    'This people' preserves the demonstrative's distancing tone.
- source_word: לֹא שָׁמְעוּ אֵלַי
  chosen: have not listened to me
  alternatives:
  - have not obeyed me
  - did not listen to me
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means to listen to someone, often with the implication
    of obedience. 'Listened to me' preserves the lexical sense while allowing the
    obedience implication to remain audible from context.
