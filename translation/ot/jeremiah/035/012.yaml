id: JER.35.12
reference: Jeremiah 35:12
source:
  edition: WLC
  text: וַֽ/יְהִי֙ דְּבַר יְהוָ֔ה אֶֽל יִרְמְיָ֖הוּ לֵ/אמֹֽר־־׃
translation:
  text: Then the word of the LORD came to Yirmeyahu, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh''; traditionally rendered ''the LORD'' in English translations.'
    reason: alternative_reading
  - marker: b
    text: Yirmeyahu is traditionally rendered 'Jeremiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - And it came to pass
  - Then it came about
  lexicon: HALOT
  rationale: The wayyiqtol of היה here functions as standard narrative/sequential
    introduction. In English, the idiom is best carried by 'Then ... came' rather
    than the wooden 'and it came to pass,' preserving the discourse flow without archaic
    style.
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - a word
  - message
  lexicon: HALOT
  rationale: In the prophetic formula דְּבַר יְהוָה, 'the word' is the established
    and semantically precise rendering, referring to a divine communication. 'Message'
    is possible but less formally tied to the recurring prophetic expression.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines for the divine name יְהוָה, the default rendering
    is 'the LORD,' following Jewish reverence tradition and longstanding English Bible
    convention while signaling the covenant name.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition simply marks direction toward the recipient of the divine
    word; 'to' is the natural modern English equivalent.
- source_word: יִרְמְיָהוּ
  chosen: Yirmeyahu
  alternatives:
  - Jeremiah
  rationale: Personal names are to be transliterated by standard conventions per project
    philosophy. Since the Hebrew form here is יִרְמְיָהוּ, 'Yirmeyahu' preserves the
    source-form name rather than substituting the traditional Anglicized 'Jeremiah.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive construct introduces the content of the speech in standard
    Hebrew narrative style. 'Saying' is the idiomatic English equivalent in prophetic
    formulas.
