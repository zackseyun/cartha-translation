id: JER.41.6
reference: Jeremiah 41:6
source:
  edition: WLC
  text: וַ֠/יֵּצֵא יִשְׁמָעֵ֨אל בֶּן נְתַנְיָ֤ה לִ/קְרָאתָ/ם֙ מִן הַ/מִּצְפָּ֔ה הֹלֵ֥ךְ
    הָלֹ֖ךְ וּ/בֹכֶ֑ה וַֽ/יְהִי֙ כִּ/פְגֹ֣שׁ אֹתָ֔/ם וַ/יֹּ֣אמֶר אֲלֵי/הֶ֔ם בֹּ֖אוּ
    אֶל גְּדַלְיָ֥הוּ בֶן אֲחִיקָֽם־־־־׃ס
translation:
  text: Then Ishmael son of Nethaniah went out from Mizpah to meet them, going along
    and weeping. When he met them, he said to them, “Come to Gedaliah son of Ahikam.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'going, going and weeping,' an idiom expressing continued
      action as he approached.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: Then ... went out
  alternatives:
  - And ... went out
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: לִקְרָאתָם
  chosen: to meet them
  alternatives:
  - to encounter them
  - to go out to them
  lexicon: HALOT
  rationale: The idiom with קרא/לקראת commonly means going out to meet someone. 'To
    meet them' is the most natural and precise rendering here.
- source_word: מִן הַמִּצְפָּה
  chosen: from Mizpah
  alternatives:
  - out from Mizpah
  lexicon: HALOT
  rationale: מן marks source/origin. 'From Mizpah' is sufficient in English and keeps
    the place-name transliterated.
- source_word: הֹלֵךְ הָלֹךְ
  chosen: going along
  alternatives:
  - continually going
  - walking on and on
  - as he went
  lexicon: HALOT
  rationale: The infinitive absolute with participle intensifies or gives durative
    force. 'Going along' captures the ongoing action idiomatically without awkward
    literalism.
- source_word: וּבֹכֶה
  chosen: and weeping
  alternatives:
  - while weeping
  - crying
  lexicon: HALOT
  rationale: בכה denotes weeping/crying. 'Weeping' preserves the solemn tone better
    than the more colloquial 'crying.' Coordinating it with the prior durative expression
    reflects the Hebrew portrayal of his approach.
- source_word: וַיְהִי כִּפְגֹשׁ אֹתָם
  chosen: When he met them
  alternatives:
  - And it happened, when he encountered them
  - as soon as he met them
  lexicon: HALOT
  rationale: This is a common Hebrew temporal construction. 'When he met them' conveys
    the sense clearly in modern English without woodenly reproducing ויהי.
- source_word: בֹּאוּ אֶל
  chosen: Come to
  alternatives:
  - Come, go to
  - Enter to
  lexicon: HALOT
  rationale: בוא plus אל here is an invitation/summons directing them toward Gedaliah.
    'Come to' is the most straightforward English equivalent in direct speech.
- source_word: גְּדַלְיָהוּ בֶן אֲחִיקָם
  chosen: Gedaliah son of Ahikam
  alternatives:
  - Gedaliah, the son of Ahikam
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. 'Son of' preserves
    the Hebrew patronymic directly and naturally.
