id: JER.41.4
reference: Jeremiah 41:4
source:
  edition: WLC
  text: וַ/יְהִ֛י בַּ/יּ֥וֹם הַ/שֵּׁנִ֖י לְ/הָמִ֣ית אֶת גְּדַלְיָ֑הוּ וְ/אִ֖ישׁ לֹ֥א
    יָדָֽע־׃
translation:
  text: And it happened on the second day after he had killed Gedaliah, when no man
    yet knew it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and no man knew.'' The object (''it,'' referring to Gedaliah''s
      killing) is implied in the Hebrew and supplied in English for clarity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of היה introducing the next event in sequence.
    'And it happened' preserves the Hebrew narrative flow without archaic English.
- source_word: בַּיּוֹם הַשֵּׁנִי
  chosen: on the second day
  alternatives:
  - on the next day
  - on the second day afterward
  lexicon: HALOT
  rationale: Literal temporal expression. 'Second day' is retained rather than smoothing
    to 'next day' because the Hebrew explicitly numbers the day.
- source_word: לְהָמִית אֶת גְּדַלְיָהוּ
  chosen: after he had killed Gedaliah
  alternatives:
  - of killing Gedaliah
  - when Gedaliah had been killed
  lexicon: HALOT
  rationale: The infinitive construct with ל marks the temporal reference point relative
    to the prior event. English idiom is best served by 'after he had killed Gedaliah.'
    The active sense fits the narrative context, referring back to Ishmael's killing
    of Gedaliah in the preceding verses.
- source_word: גְּדַלְיָהוּ
  chosen: Gedaliah
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: וְאִישׁ
  chosen: when no man
  alternatives:
  - and no one
  - and no man
  lexicon: HALOT
  rationale: אִישׁ literally means 'man.' Because the phrase is indefinite and generic,
    'no man' preserves the gendered singular form of the Hebrew while still functioning
    idiomatically in English, in keeping with the gender-accurate policy.
- source_word: לֹא יָדָע
  chosen: yet knew it
  alternatives:
  - knew
  - had known
  lexicon: HALOT
  rationale: The verb ידע here means 'to know,' with the implied object being the
    murder just mentioned. 'Yet knew it' makes the implied object explicit for clear
    English and captures the ongoing state that the news had not become known.
