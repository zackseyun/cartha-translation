id: JER.41.8
reference: Jeremiah 41:8
source:
  edition: WLC
  text: וַ/עֲשָׂרָ֨ה אֲנָשִׁ֜ים נִמְצְאוּ בָ֗/ם וַ/יֹּאמְר֤וּ אֶל יִשְׁמָעֵאל֙ אַל
    תְּמִתֵ֔/נוּ כִּֽי יֶשׁ לָ֤/נוּ מַטְמֹנִים֙ בַּ/שָּׂדֶ֔ה חִטִּ֥ים וּ/שְׂעֹרִ֖ים
    וְ/שֶׁ֣מֶן וּ/דְבָ֑שׁ וַ/יֶּחְדַּ֕ל וְ/לֹ֥א הֱמִיתָ֖/ם בְּ/ת֥וֹךְ אֲחֵי/הֶֽם־־־־־׃
translation:
  text: But ten men were found among them, and they said to Ishmael, “Do not put us
    to death, for we have hidden stores in the field—wheat and barley, oil and honey.”
    So he refrained and did not put them to death among their brothers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “treasures” for “hidden stores”; the context favors concealed provisions
      rather than valuables in general.
    reason: lexical_alternative
  - marker: b
    text: “Among their brothers” likely means among their fellow men who were with
      them and were being killed.
    reason: cultural_note
lexical_decisions:
- source_word: וַעֲשָׂרָה אֲנָשִׁים
  chosen: But ten men
  alternatives:
  - And ten men
  - Now ten men
  lexicon: HALOT
  rationale: ו conjunction plus numeral and noun introduces an exception within the
    narrative flow after the preceding slaughter; 'But ten men' captures the adversative
    sense in context better than a simple 'And ten men.' 'Men' reflects אֲנָשִׁים
    directly and follows the gender-accurate policy.
- source_word: נִמְצְאוּ בָם
  chosen: were found among them
  alternatives:
  - were found in them
  - were among them
  lexicon: HALOT
  rationale: Niphal of מצא is passive/reflexive, 'were found.' With בָם, the sense
    is that these ten were discovered as part of the larger group. 'Among them' is
    idiomatic English and best fits the scene.
- source_word: אַל תְּמִתֵנוּ
  chosen: Do not put us to death
  alternatives:
  - Do not kill us
  lexicon: HALOT
  rationale: Hiphil of מות is causative, literally 'do not cause us to die.' 'Put
    us to death' preserves the causative nuance and the execution-like context more
    clearly than the simpler 'kill us.'
- source_word: כִּי יֵשׁ לָנוּ מַטְמֹנִים
  chosen: for we have hidden stores
  alternatives:
  - for we have treasures
  - for we have hidden provisions
  - for there are hidden things for us
  lexicon: HALOT
  rationale: מַטְמֹנִים denotes hidden things or stores, here clearly concealed provisions
    rather than valuables in general. 'Hidden stores' is concise and contextually
    appropriate.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the countryside
  - in the open country
  lexicon: HALOT
  rationale: The singular with article is best rendered straightforwardly as 'in the
    field,' referring to stored provisions hidden out in agricultural land.
- source_word: חִטִּים וּשְׂעֹרִים וְשֶׁמֶן וּדְבָשׁ
  chosen: wheat and barley, oil and honey
  alternatives:
  - wheat, barley, oil, and honey
  lexicon: HALOT
  rationale: These are the specific provisions offered as ransom for their lives.
    'Oil' naturally refers to olive oil in this context, but 'oil' is sufficient in
    the main text. The paired punctuation improves readability without altering meaning.
- source_word: וַיֶּחְדַּל
  chosen: So he refrained
  alternatives:
  - So he stopped
  - So he desisted
  lexicon: HALOT
  rationale: חדל means to cease or refrain. 'He refrained' fits the immediate context
    of withholding the intended killing.
- source_word: וְלֹא הֱמִיתָם
  chosen: and did not put them to death
  alternatives:
  - and did not kill them
  lexicon: HALOT
  rationale: Repeating 'put them to death' maintains consistency with the earlier
    Hiphil of מות and preserves the formal gravity of the act.
- source_word: בְּתוֹךְ אֲחֵיהֶם
  chosen: among their brothers
  alternatives:
  - in the midst of their brothers
  - among their kinsmen
  lexicon: HALOT
  rationale: The phrase most naturally means within the group of their fellow men
    already being killed. 'Brothers' preserves the Hebrew kinship term and aligns
    with the project's gender-accurate policy; 'kinsmen' is possible but less direct.
