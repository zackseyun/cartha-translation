id: JER.41.3
reference: Jeremiah 41:3
source:
  edition: WLC
  text: וְ/אֵ֣ת כָּל הַ/יְּהוּדִ֗ים אֲשֶׁר הָי֨וּ אִתּ֤/וֹ אֶת גְּדַלְיָ֨הוּ֙ בַּ/מִּצְפָּ֔ה
    וְ/אֶת הַ/כַּשְׂדִּ֖ים אֲשֶׁ֣ר נִמְצְאוּ שָׁ֑ם אֵ֚ת אַנְשֵׁ֣י הַ/מִּלְחָמָ֔ה הִכָּ֖ה
    יִשְׁמָעֵֽאל־־־־־׃
translation:
  text: And Ishmael struck down all the Judeans who were with Gedaliah at Mizpah,
    and the Chaldeans who were found there—the men of war.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Jews.' The Hebrew term can denote the people of Judah/Judea; in
      this context 'Judeans' highlights the historical-geographical sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Babylonians.' The Hebrew reads 'the Chaldeans.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'the men of war'; that is, the fighting men or soldiers.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיְּהוּדִים
  chosen: the Judeans
  alternatives:
  - the Jews
  lexicon: HALOT
  rationale: In Jeremiah's historical setting, the term denotes people of Judah/Judea
    rather than the later broader ethnoreligious sense often conveyed by 'Jews.' 'Judeans'
    better preserves the geopolitical nuance.
- source_word: אִתּוֹ אֶת־גְּדַלְיָהוּ
  chosen: who were with Gedaliah
  alternatives:
  - who were with him, with Gedaliah
  lexicon: HALOT
  rationale: The pronominal suffix in אִתּוֹ naturally refers to Gedaliah, clarified
    by the following accusative name. English expresses the sense smoothly as 'with
    Gedaliah' without redundantly preserving both pronoun and name.
- source_word: בַּמִּצְפָּה
  chosen: at Mizpah
  alternatives:
  - in Mizpah
  lexicon: HALOT
  rationale: For a town/location, 'at Mizpah' is idiomatic English and fits the narrative
    setting.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew specifically says 'Chaldeans.' While this can refer to Babylonian
    forces, retaining 'Chaldeans' stays closer to the source and preserves historical
    texture.
- source_word: נִמְצְאוּ שָׁם
  chosen: were found there
  alternatives:
  - were there
  - happened to be there
  lexicon: HALOT
  rationale: The Niphal of מצא is more than simple existence; 'were found there' preserves
    the passive/resultative nuance without becoming awkward.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  chosen: the men of war
  alternatives:
  - the fighting men
  - the soldiers
  lexicon: HALOT
  rationale: The phrase literally means 'men of war.' This rendering is transparent
    and weighty, while still understandable in modern English. 'Soldiers' is possible
    but slightly flattens the Hebrew idiom.
- source_word: הִכָּה
  chosen: struck down
  alternatives:
  - killed
  - smote
  lexicon: HALOT
  rationale: The Hiphil of נכה commonly denotes striking down lethally in narrative
    contexts. 'Struck down' preserves the violent action and allows the context to
    carry the fatal sense.
