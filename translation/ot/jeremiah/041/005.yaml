id: JER.41.5
reference: Jeremiah 41:5
source:
  edition: WLC
  text: וַ/יָּבֹ֣אוּ אֲ֠נָשִׁים מִ/שְּׁכֶ֞ם מִ/שִּׁל֤וֹ וּ/מִ/שֹּֽׁמְרוֹן֙ שְׁמֹנִ֣ים אִ֔ישׁ מְגֻלְּחֵ֥י זָקָ֛ן וּ/קְרֻעֵ֥י בְגָדִ֖ים וּ/מִתְגֹּֽדְדִ֑ים וּ/מִנְחָ֤ה וּ/לְבוֹנָה֙ בְּ/יָדָ֔/ם לְ/הָבִ֖יא בֵּ֥ית יְהוָֽה׃
translation:
  text: Then eighty men came from Shechem, from Shiloh, and from Samaria, with their beards shaved, their clothes torn, and gashing themselves, with grain offerings and frankincense in their hands to bring to the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cutting themselves.' The Hebrew refers to making cuts on oneself as a mourning practice.
    reason: lexical_alternative
  - marker: b
    text: Or 'offering.' The Hebrew minḥah often denotes a grain offering in cultic contexts.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the house of the LORD'; this may refer to the sanctuary site rather than an intact temple building.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: Then ... came
  alternatives:
  - And ... came
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative progression while preserving sequence.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  lexicon: HALOT
  rationale: The noun here refers specifically to male persons, confirmed by the following count and mourning descriptions. 'Men' is gender-accurate per translation philosophy.
- source_word: מִשְּׁכֶם מִשִּׁלוֹ וּמִשֹּׁמְרוֹן
  chosen: from Shechem, from Shiloh, and from Samaria
  alternatives:
  - out of Shechem, Shiloh, and Samaria
  lexicon: HALOT
  rationale: These are place names and are transliterated by standard English conventions. Repeating 'from' reflects the Hebrew prepositions and preserves the list structure.
- source_word: שְׁמֹנִים אִישׁ
  chosen: eighty men
  alternatives:
  - eighty persons
  lexicon: HALOT
  rationale: 'The idiom is literally ''eighty man'' but idiomatic English requires plural agreement: ''eighty men.'''
- source_word: מְגֻלְּחֵי זָקָן
  chosen: with their beards shaved
  alternatives:
  - having shaved beards
  - beard-shaven
  lexicon: HALOT
  rationale: The passive participial construction describes a mourning state. 'With their beards shaved' is clear modern English and preserves the concrete action.
- source_word: וּקְרֻעֵי בְגָדִים
  chosen: their clothes torn
  alternatives:
  - with torn garments
  lexicon: HALOT
  rationale: A standard mourning expression. 'Clothes' is more accessible than 'garments' while retaining the sense.
- source_word: וּמִתְגֹּדְדִים
  chosen: gashing themselves
  alternatives:
  - cutting themselves
  - lacerating themselves
  lexicon: HALOT
  rationale: The Hitpolel form denotes making cuts on oneself, a mourning practice. 'Gashing themselves' conveys deliberate self-inflicted cuts with stronger force than the milder 'cutting themselves.'
- source_word: וּמִנְחָה
  chosen: grain offering
  alternatives:
  - offering
  - gift offering
  lexicon: HALOT
  rationale: מִנְחָה in cultic context commonly denotes a grain offering. Since it is paired with frankincense and brought to the house of the LORD, the sacrificial sense is most likely and should be made explicit.
- source_word: וּלְבוֹנָה
  chosen: frankincense
  alternatives:
  - incense
  lexicon: HALOT
  rationale: The noun specifically denotes frankincense, not incense in general.
- source_word: בְּיָדָם
  chosen: in their hands
  alternatives:
  - with them
  lexicon: HALOT
  rationale: The Hebrew is concrete and should remain so in English.
- source_word: לְהָבִיא
  chosen: to bring
  alternatives:
  - to present
  lexicon: HALOT
  rationale: A straightforward infinitive of purpose; 'to bring' is the plain sense.
- source_word: בֵּית יְהוָה
  chosen: to the house of the LORD
  alternatives:
  - to the temple of the LORD
  lexicon: HALOT
  rationale: The Hebrew is literally 'house of YHWH.' Following doctrine, יְהוָה is rendered 'the LORD.' 'House' is retained rather than 'temple' because the text uses the broader, more literal expression, especially poignant in this post-destruction context.
