id: JER.41.1
reference: Jeremiah 41:1
source:
  edition: WLC
  text: וַ/יְהִ֣י בַּ/חֹ֣דֶשׁ הַ/שְּׁבִיעִ֗י בָּ֣א יִשְׁמָעֵ֣אל בֶּן נְתַנְיָ֣ה בֶן
    אֱלִישָׁמָ֣ע מִ/זֶּ֣רַע הַ֠/מְּלוּכָה וְ/רַבֵּ֨י הַ/מֶּ֜לֶךְ וַ/עֲשָׂרָ֨ה אֲנָשִׁ֥ים
    אִתּ֛/וֹ אֶל גְּדַלְיָ֥הוּ בֶן אֲחִיקָ֖ם הַ/מִּצְפָּ֑תָ/ה וַ/יֹּ֨אכְלוּ שָׁ֥ם
    לֶ֛חֶם יַחְדָּ֖ו בַּ/מִּצְפָּֽה׀־־־־׃
translation:
  text: Now in the seventh month, Ishmael son of Nethaniah, son of Elishama, of the
    royal line and one of the chief officers of the king, came with ten men with him
    to Gedaliah son of Ahikam at Mizpah, and they ate bread there together in Mizpah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'ate bread,' an idiom for sharing a meal.
    reason: lexical_alternative
  - marker: b
    text: Or 'of royal seed' for 'of the royal line.'
    reason: lexical_alternative
  - marker: c
    text: Or 'one of the king's nobles' for 'one of the chief officers of the king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive on היה functions as a narrative scene-setting formula.
    'Now' preserves the discourse transition in readable modern English without archaic
    stiffness.
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  chosen: in the seventh month
  lexicon: HALOT
  rationale: A straightforward temporal expression; retained formally because it is
    clear and important for narrative chronology.
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Simple past narrative movement toward Gedaliah; 'came' is the most natural
    English equivalent in context.
- source_word: מִזֶּרַע הַמְּלוּכָה
  chosen: of the royal line
  alternatives:
  - of royal seed
  - of the king's seed
  - of the royal family
  lexicon: HALOT
  rationale: זֶרַע here denotes lineage/descendants rather than literal seed. 'Of
    the royal line' communicates dynastic descent in idiomatic modern English.
- source_word: וְרַבֵּי הַמֶּלֶךְ
  chosen: and one of the chief officers of the king
  alternatives:
  - and the king's great men
  - and a chief man of the king
  - and one of the king's nobles
  lexicon: HALOT
  rationale: 'The plural construct can denote the class of high-ranking royal officials/nobles.
    Because it modifies the singular Ishmael, English idiom requires a singular representative
    expression: ''one of the chief officers of the king.'' This preserves the sense
    without woodenly reproducing the Hebrew plural.'
- source_word: וַעֲשָׂרָה אֲנָשִׁים אִתּוֹ
  chosen: with ten men with him
  alternatives:
  - and ten men were with him
  - accompanied by ten men
  lexicon: HALOT
  rationale: The phrase indicates Ishmael's entourage. 'With ten men with him' stays
    close to the Hebrew wording; the repetition is acceptable and keeps the syntax
    transparent.
- source_word: אֶל גְּדַלְיָהוּ ... הַמִּצְפָּתָה
  chosen: to Gedaliah son of Ahikam at Mizpah
  alternatives:
  - to Gedaliah ... to Mizpah
  lexicon: HALOT
  rationale: The directional form on Mizpah marks motion toward the place, but in
    English the destination can be expressed naturally as coming 'to Gedaliah ...
    at Mizpah,' since Gedaliah is located there.
- source_word: וַיֹּאכְלוּ שָׁם לֶחֶם יַחְדָּו
  chosen: and they ate bread there together
  alternatives:
  - and they ate a meal there together
  - and they ate there together
  lexicon: HALOT
  rationale: '''Ate bread'' is a Hebrew idiom for sharing a meal, but bread is explicitly
    present in the source and should be preserved in the main text. The communal aspect
    is conveyed by ''together.'''
- source_word: בַּמִּצְפָּה
  chosen: in Mizpah
  alternatives:
  - at Mizpah
  lexicon: HALOT
  rationale: The repeated place name is retained because it is present in the Hebrew
    text and contributes to the narrative framing. 'In Mizpah' is a natural locative
    rendering.
