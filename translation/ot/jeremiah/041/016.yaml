id: JER.41.16
reference: Jeremiah 41:16
source:
  edition: WLC
  text: וַ/יִּקַּח֩ יוֹחָנָ֨ן בֶּן קָרֵ֜חַ וְ/כָל שָׂרֵ֧י הַ/חֲיָלִ֣ים אֲשֶׁר אִתּ֗/וֹ
    אֵ֣ת כָּל שְׁאֵרִ֤ית הָ/עָם֙ אֲשֶׁ֣ר הֵ֠שִׁיב מֵ/אֵ֨ת יִשְׁמָעֵ֤אל בֶּן נְתַנְיָה֙
    מִן הַ/מִּצְפָּ֔ה אַחַ֣ר הִכָּ֔ה אֶת גְּדַלְיָ֖ה בֶּן אֲחִיקָ֑ם גְּבָרִ֞ים אַנְשֵׁ֣י
    הַ/מִּלְחָמָ֗ה וְ/נָשִׁ֤ים וְ/טַף֙ וְ/סָ֣רִסִ֔ים אֲשֶׁ֥ר הֵשִׁ֖יב מִ/גִּבְעֽוֹן־־־־־־־־׃
translation:
  text: 'Then Yohanan son of Kareah, and all the commanders of the forces who were
    with him, took all the remnant of the people whom he had recovered from Ishmael
    son of Nethaniah, from Mizpah, after he had struck down Gedaliah son of Ahikam:
    the men, the warriors, and the women, and the little children, and the court officials,
    whom he had brought back from Gibeon.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had brought back' for 'had recovered' (Hebrew הֵשִׁיב), emphasizing
      restoration rather than rescue.
    reason: lexical_alternative
  - marker: b
    text: Or 'eunuchs' for 'court officials'; the Hebrew סָרִיסִים can refer either
      to literal eunuchs or to royal officials.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: Then ... took
  alternatives:
  - and ... took
  - so ... took
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' captures the sequential
    force in natural English without over-literal repetition of 'and'.
- source_word: שָׂרֵי הַחֲיָלִים
  chosen: the commanders of the forces
  alternatives:
  - captains of the troops
  - officers of the army
  lexicon: HALOT
  rationale: שָׂרִים are leaders/commanders, and חַיִל here refers to armed forces
    or troops. 'Commanders of the forces' is clear and reasonably formal.
- source_word: שְׁאֵרִית הָעָם
  chosen: the remnant of the people
  alternatives:
  - the rest of the people
  - the survivors among the people
  lexicon: HALOT
  rationale: שְׁאֵרִית often carries the sense of a surviving remainder. 'Remnant'
    preserves that nuance and is idiomatic in prophetic narrative.
- source_word: הֵשִׁיב
  chosen: had recovered
  alternatives:
  - had brought back
  - had taken back
  lexicon: HALOT
  rationale: The hiphil of שוב means 'bring back/restore.' In this rescue context,
    'had recovered' communicates that Yohanan regained these people from Ishmael,
    while still fitting the narrative.
- source_word: מֵאֵת יִשְׁמָעֵאל
  chosen: from Ishmael
  alternatives:
  - out of the hand of Ishmael
  lexicon: HALOT
  rationale: The preposition marks separation from Ishmael's control. 'From Ishmael'
    is the plain sense; the fuller idiom 'out of the hand of' is not present in the
    Hebrew.
- source_word: מִן הַמִּצְפָּה
  chosen: from Mizpah
  alternatives:
  - at Mizpah
  lexicon: HALOT
  rationale: The preposition מִן normally indicates source/origin. Here it most naturally
    modifies the recovery of the remnant from the place where Ishmael had held them.
- source_word: אַחַר הִכָּה
  chosen: after he had struck down
  alternatives:
  - after he had killed
  - after he had attacked
  lexicon: HALOT
  rationale: נכה is a broad verb for striking/smiting, often with lethal result. Since
    Gedaliah's death is in view, 'struck down' preserves the violent act without flattening
    the Hebrew to a mere generic 'killed'.
- source_word: גְּבָרִים אַנְשֵׁי הַמִּלְחָמָה
  chosen: the men, the warriors
  alternatives:
  - the men, the fighting men
  - the soldiers
  lexicon: HALOT
  rationale: The appositional sequence likely distinguishes adult males and specifically
    men of war. Rendering both elements preserves the Hebrew's fullness better than
    collapsing them into one term.
- source_word: טַף
  chosen: the little children
  alternatives:
  - the children
  - the dependents
  lexicon: HALOT
  rationale: טַף refers to small children or dependents. 'Little children' preserves
    the vulnerability implied by the term.
- source_word: סָרִסִים
  chosen: the court officials
  alternatives:
  - the eunuchs
  lexicon: HALOT
  rationale: סָרִיס can denote either literal eunuchs or royal/court officials. In
    many royal-administrative contexts the official sense is primary or at least possible.
    'Court officials' fits the narrative setting and avoids asserting physical status
    where the context does not require it.
- source_word: מִגִּבְעוֹן
  chosen: from Gibeon
  alternatives:
  - at Gibeon
  lexicon: HALOT
  rationale: The preposition indicates the place from which Yohanan had brought them
    back in the preceding encounter. 'From Gibeon' is the straightforward locative-source
    sense.
- source_word: יוֹחָנָן ... קָרֵחַ; יִשְׁמָעֵאל ... נְתַנְיָה; גְּדַלְיָה ... אֲחִיקָם
  chosen: Yohanan ... Kareah; Ishmael ... Nethaniah; Gedaliah ... Ahikam
  alternatives:
  - Johanan ... Kareah; Ishmael ... Nethaniah; Gedaliah ... Ahikam
  rationale: Personal names are transliterated rather than translated, following project
    philosophy. 'Yohanan' more directly reflects the Hebrew form יוֹחָנָן.
