id: JER.41.2
reference: Jeremiah 41:2
source:
  edition: WLC
  text: וַ/יָּקָם֩ יִשְׁמָעֵ֨אל בֶּן נְתַנְיָ֜ה וַ/עֲשֶׂ֥רֶת הָ/אֲנָשִׁ֣ים אֲשֶׁר
    הָי֣וּ אִתּ֗/וֹ וַ֠/יַּכּוּ אֶת גְּדַלְיָ֨הוּ בֶן אֲחִיקָ֧ם בֶּן שָׁפָ֛ן בַּ/חֶ֖רֶב
    וַ/יָּ֣מֶת אֹת֑/וֹ אֲשֶׁר הִפְקִ֥יד מֶֽלֶךְ בָּבֶ֖ל בָּ/אָֽרֶץ־׀־־־־־־׃
translation:
  text: Then Ishmael son of Nethaniah rose up with the ten men who were with him,
    and they struck down Gedaliah son of Ahikam, son of Shaphan, with the sword, and
    killed him—the one whom the king of Babylon had appointed over the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'struck Gedaliah ... with the sword and put him to death.' The Hebrew
      uses two verbs in sequence for the assault and its fatal outcome.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  chosen: rose up
  alternatives:
  - got up
  - arose
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום marks the initiation of hostile action. 'Rose up'
    preserves the narrative force and can carry the sense of rising against someone
    without over-paraphrasing.
- source_word: וַעֲשֶׂרֶת הָאֲנָשִׁים
  chosen: the ten men
  alternatives:
  - ten men
  lexicon: HALOT
  rationale: The definite article on 'men' is reflected with 'the,' identifying the
    known group accompanying Ishmael.
- source_word: אֲשֶׁר הָיוּ אִתּוֹ
  chosen: who were with him
  alternatives:
  - who were accompanying him
  - that were with him
  lexicon: HALOT
  rationale: A straightforward relative clause preserving the Hebrew syntax and indicating
    the men allied with Ishmael.
- source_word: וַיַּכּוּ
  chosen: struck down
  alternatives:
  - struck
  - attacked
  - smote
  lexicon: HALOT
  rationale: נכה in violent narrative often means to strike lethally or decisively.
    'Struck down' fits the immediate context of murder and avoids archaic 'smote'.
- source_word: בַּחֶרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Instrumental beth is naturally rendered 'with.' The singular 'sword'
    is idiomatic in English for death by bladed weaponry and preserves the Hebrew
    expression.
- source_word: וַיָּמֶת אֹתוֹ
  chosen: and killed him
  alternatives:
  - and put him to death
  - and caused him to die
  lexicon: HALOT
  rationale: Hiphil of מות is causative. 'Killed him' is the natural English equivalent
    and makes explicit the lethal result of the attack.
- source_word: אֲשֶׁר הִפְקִיד
  chosen: whom ... had appointed
  alternatives:
  - whom ... had entrusted
  - whom ... had placed in charge
  lexicon: HALOT
  rationale: הפקיד in this administrative context means appointing or placing someone
    in oversight. 'Had appointed' is concise and idiomatic for political office.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: Standard formal rendering of the construct chain, preserving the historical-political
    reference.
- source_word: בָּאָרֶץ
  chosen: over the land
  alternatives:
  - in the land
  - over the country
  lexicon: HALOT
  rationale: Given the governing sense of הִפְקִיד, the phrase indicates jurisdiction
    rather than mere location. 'Over the land' best conveys Gedaliah's appointed authority
    in the territory.
- source_word: גְּדַלְיָהוּ בֶן אֲחִיקָם בֶּן שָׁפָן
  chosen: Gedaliah son of Ahikam, son of Shaphan
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy, and the patronymic
    chain is preserved for identification.
