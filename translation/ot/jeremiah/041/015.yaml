id: JER.41.15
reference: Jeremiah 41:15
source:
  edition: WLC
  text: וְ/יִשְׁמָעֵ֣אל בֶּן נְתַנְיָ֗ה נִמְלַט֙ בִּ/שְׁמֹנָ֣ה אֲנָשִׁ֔ים מִ/פְּנֵ֖י
    יֽוֹחָנָ֑ן וַ/יֵּ֖לֶךְ אֶל בְּנֵ֥י עַמּֽוֹן־־׃ס
translation:
  text: But Ishmael son of Nethaniah escaped from Johanan with eight men and went
    to the Ammonites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and Ishmael''; the conjunction may be rendered ''and,'' but ''but''
      brings out the contrast with the preceding narrative context.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from before Johanan,' an idiom meaning escape from his presence
      or pursuit.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''to the sons of Ammon,'' that is, the Ammonites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יִשְׁמָעֵאל
  chosen: But Ishmael
  alternatives:
  - And Ishmael
  lexicon: HALOT
  rationale: 'The conjunction ו can be rendered simply as ''and,'' but here ''but''
    better reflects the narrative contrast with the preceding action: despite Johanan''s
    intervention, Ishmael escapes. ''Ishmael'' is transliterated as a personal name
    per translation philosophy.'
- source_word: בֶּן נְתַנְיָה
  chosen: son of Nethaniah
  lexicon: HALOT
  rationale: Standard Hebrew patronymic construction; rendered formally and naturally
    in English.
- source_word: נִמְלַט
  chosen: escaped
  alternatives:
  - slipped away
  - was delivered
  lexicon: HALOT
  rationale: The Niphal of מלט here denotes successful escape or deliverance from
    danger. 'Escaped' is the most natural narrative rendering in context.
- source_word: בִּ/שְׁמֹנָה אֲנָשִׁים
  chosen: with eight men
  alternatives:
  - along with eight men
  - by means of eight men
  lexicon: HALOT
  rationale: 'The preposition ב with a numeral and persons here is best understood
    in an associative sense: Ishmael escaped accompanied by eight men. ''With eight
    men'' is concise and idiomatic.'
- source_word: מִ/פְּנֵי יֽוֹחָנָן
  chosen: from Johanan
  alternatives:
  - from before Johanan
  - away from Johanan
  lexicon: HALOT
  rationale: Literally 'from the face/presence of Johanan,' an idiom meaning escape
    from someone's presence or pursuit. 'From Johanan' communicates the sense clearly
    in modern English without wooden literalism.
- source_word: וַ/יֵּלֶךְ
  chosen: and went
  alternatives:
  - then he went
  lexicon: HALOT
  rationale: Simple wayyiqtol narrative progression; 'and went' preserves the sequence
    straightforwardly.
- source_word: אֶל בְּנֵי עַמּוֹן
  chosen: to the Ammonites
  alternatives:
  - to the sons of Ammon
  - to the people of Ammon
  lexicon: HALOT
  rationale: בני עמון is the standard ethnogeographic expression for the people of
    Ammon. 'To the Ammonites' is the clearest natural English equivalent.
