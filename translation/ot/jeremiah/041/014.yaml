id: JER.41.14
reference: Jeremiah 41:14
source:
  edition: WLC
  text: וַ/יָּסֹ֨בּוּ֙ כָּל הָ/עָ֔ם אֲשֶׁר שָׁבָ֥ה יִשְׁמָעֵ֖אל מִן הַ/מִּצְפָּ֑ה
    וַ/יָּשֻׁ֨בוּ֙ וַ/יֵּ֣לְכ֔וּ אֶל יֽוֹחָנָ֖ן בֶּן קָרֵֽחַ־־־־־׃
translation:
  text: Then all the people whom Ishmael had taken captive from Mizpah turned around,
    and they returned and went to Johanan son of Kareah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whom Ishmael had captured' or more formally 'whom Ishmael had carried
      away captive.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסֹבּוּ
  chosen: turned around
  alternatives:
  - turned back
  - turned about
  lexicon: HALOT
  rationale: From סבב in the wayyiqtol plural, here describing a physical reversal
    of direction/allegiance. 'Turned around' is natural modern English and fits the
    immediate movement toward Johanan.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the people there
  - all the people
  lexicon: HALOT
  rationale: Collective noun with article and כל. 'People' is the natural collective
    rendering in context, referring to the group Ishmael had seized.
- source_word: אֲשֶׁר שָׁבָה יִשְׁמָעֵאל
  chosen: whom Ishmael had taken captive
  alternatives:
  - whom Ishmael had captured
  - whom Ishmael had carried away captive
  lexicon: HALOT
  rationale: שבה in Qal commonly means 'take captive.' The English pluperfect 'had
    taken captive' reflects the prior action relative to the main wayyiqtol sequence.
- source_word: מִן הַמִּצְפָּה
  chosen: from Mizpah
  alternatives:
  - out of Mizpah
  lexicon: HALOT
  rationale: Simple source preposition מן with place name. 'From Mizpah' is straightforward
    and idiomatic.
- source_word: וַיָּשֻׁבוּ
  chosen: they returned
  alternatives:
  - they turned back
  lexicon: HALOT
  rationale: שוב overlaps semantically with the previous verb, but the sequence likely
    emphasizes both reversal and rejoining. 'They returned' preserves the narrative
    progression without flattening the second verb into mere repetition.
- source_word: וַיֵּלְכוּ אֶל
  chosen: went to
  alternatives:
  - came to
  - went over to
  lexicon: HALOT
  rationale: הלך with אל marks movement toward Johanan. 'Went to' is the most direct
    rendering; 'went over to' could suggest defection, which is implied by context
    but not explicit in the verb itself.
- source_word: יוֹחָנָן בֶּן קָרֵחַ
  chosen: Johanan son of Kareah
  alternatives:
  - Johanan the son of Kareah
  rationale: Personal names are transliterated per project philosophy. 'Son of' is
    retained rather than reduced to a patronymic form to preserve Hebrew narrative
    style.
