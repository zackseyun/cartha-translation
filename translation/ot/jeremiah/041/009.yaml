id: JER.41.9
reference: Jeremiah 41:9
source:
  edition: WLC
  text: וְ/הַ/בּ֗וֹר אֲשֶׁר֩ הִשְׁלִ֨יךְ שָׁ֤ם יִשְׁמָעֵאל֙ אֵ֣ת כָּל פִּגְרֵ֣י הָ/אֲנָשִׁ֗ים
    אֲשֶׁ֤ר הִכָּה֙ בְּ/יַד גְּדַלְיָ֔הוּ ה֗וּא אֲשֶׁ֤ר עָשָׂה֙ הַ/מֶּ֣לֶךְ אָסָ֔א
    מִ/פְּנֵ֖י בַּעְשָׁ֣א מֶֽלֶךְ יִשְׂרָאֵ֑ל אֹת֗/וֹ מִלֵּ֛א יִשְׁמָעֵ֥אל בֶּן נְתַנְיָ֖הוּ
    חֲלָלִֽים׀־־־־׃
translation:
  text: Now the cistern into which Ishmael had thrown all the corpses of the men whom
    he had struck down at the side of Gedaliah was the one that King Asa had made
    because of Baasha king of Israel. Ishmael son of Nethaniah filled it with the
    slain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whom he had killed because of Gedaliah,' or 'whom he had killed along
      with Gedaliah.' The Hebrew phrase 'by the hand/side of Gedaliah' is difficult
      and context-dependent.
    reason: alternative_reading
  - marker: b
    text: Or 'for fear of Baasha king of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבּוֹר
  chosen: the cistern
  alternatives:
  - the pit
  lexicon: HALOT
  rationale: בּוֹר commonly denotes a pit or cistern. In this historical setting,
    and given that it was constructed by King Asa, 'cistern' best conveys a man-made
    water reservoir rather than a generic pit.
- source_word: הִשְׁלִיךְ שָׁם
  chosen: had thrown ... into
  alternatives:
  - cast ... there
  lexicon: HALOT
  rationale: The verb means 'throw/cast.' English idiom requires the destination with
    'into'; 'there' is absorbed into the prepositional sense for natural readability
    while preserving the action.
- source_word: פִּגְרֵי
  chosen: corpses
  alternatives:
  - bodies
  - carcasses
  lexicon: HALOT
  rationale: פֶּגֶר refers to dead bodies/corpses. 'Corpses' preserves the grim force
    more clearly than the softer 'bodies.'
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural, not a generic term for people.
    Per gender-accurate policy, 'the men' is retained.
- source_word: הִכָּה
  chosen: had struck down
  alternatives:
  - had killed
  - had smitten
  lexicon: HALOT
  rationale: נכה often means 'strike' and in lethal contexts 'strike down/kill.' 'Struck
    down' preserves the verbal imagery while fitting the context of death.
- source_word: בְּיַד גְּדַלְיָהוּ
  chosen: at the side of Gedaliah
  alternatives:
  - because of Gedaliah
  - along with Gedaliah
  - by the hand of Gedaliah
  lexicon: HALOT
  rationale: The phrase is difficult. Literally 'by/at the hand of Gedaliah' is awkward
    here because Ishmael is the subject doing the killing. In context (cf. the narrative
    of Ishmael's murder of Gedaliah and those with him), the phrase most naturally
    means those killed in connection with Gedaliah, i.e., at his side/with him. This
    avoids the misleading sense that Gedaliah himself performed the killing.
- source_word: הוּא אֲשֶׁר עָשָׂה
  chosen: was the one that ... had made
  alternatives:
  - it was what ... made
  lexicon: HALOT
  rationale: This resumptive construction identifies the cistern just mentioned with
    the one made by Asa. 'Was the one that' is clear modern English.
- source_word: מִפְּנֵי בַּעְשָׁא
  chosen: because of Baasha
  alternatives:
  - on account of Baasha
  - for fear of Baasha
  lexicon: HALOT
  rationale: מִפְּנֵי can mean 'because of,' 'from before,' or 'for fear of.' In the
    historical allusion to Asa's fortification works against Baasha, 'because of'
    is broad and accurate without over-specifying motive.
- source_word: מִלֵּא
  chosen: filled
  alternatives:
  - made full
  lexicon: HALOT
  rationale: 'Straightforward rendering of מלא in the Piel: ''filled.'''
- source_word: חֲלָלִים
  chosen: the slain
  alternatives:
  - dead bodies
  - slain men
  lexicon: HALOT
  rationale: חֲלָלִים denotes those slain. 'The slain' is concise, idiomatic, and
    preserves the violent sense.
