id: JER.41.11
reference: Jeremiah 41:11
source:
  edition: WLC
  text: וַ/יִּשְׁמַע֙ יוֹחָנָ֣ן בֶּן קָרֵ֔חַ וְ/כָל שָׂרֵ֥י הַ/חֲיָלִ֖ים אֲשֶׁ֣ר אִתּ֑/וֹ
    אֵ֤ת כָּל הָֽ/רָעָה֙ אֲשֶׁ֣ר עָשָׂ֔ה יִשְׁמָעֵ֖אל בֶּן נְתַנְיָֽה־־־־׃
translation:
  text: When Johanan son of Kareah, and all the commanders of the forces who were
    with him, heard of all the evil that Ishmael son of Nethaniah had done,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: When ... heard of
  alternatives:
  - and ... heard
  - heard
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, but in English this verse
    is best rendered as a temporal clause because the next verse continues the action.
    'Heard of' naturally conveys hearing about reported events rather than direct
    auditory perception.
- source_word: שָׂרֵי הַחֲיָלִים
  chosen: the commanders of the forces
  alternatives:
  - the captains of the troops
  - the commanders of the armies
  - the officers of the soldiers
  lexicon: HALOT
  rationale: שָׂרִים are leaders/commanders, and חֲיָלִים refers to military forces
    or troops. 'Commanders of the forces' is clear modern English and fits the military
    context.
- source_word: אֲשֶׁר אִתּוֹ
  chosen: who were with him
  alternatives:
  - who were with him there
  - that were with him
  lexicon: HALOT
  rationale: This relative clause identifies the commanders accompanying Johanan.
    'Who were with him' is natural and sufficiently literal.
- source_word: אֵת כָּל הָרָעָה
  chosen: of all the evil
  alternatives:
  - all the harm
  - all the wickedness
  - all the disaster
  lexicon: HALOT
  rationale: רָעָה here denotes grievous wrongdoing and harmful acts committed by
    Ishmael. 'Evil' preserves the moral weight better than the more neutral 'harm'
    or 'disaster'.
- source_word: עָשָׂה
  chosen: had done
  alternatives:
  - did
  - had committed
  lexicon: HALOT
  rationale: '''Had done'' fits the reportive sense after ''heard of'' and reads naturally
    in English. ''Committed'' would sharpen criminal nuance but is more interpretive
    than the Hebrew verb ''do/make''.'
- source_word: יוֹחָנָן בֶּן קָרֵחַ
  chosen: Johanan son of Kareah
  alternatives:
  - Johanan the son of Kareah
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: יִשְׁמָעֵאל בֶּן נְתַנְיָה
  chosen: Ishmael son of Nethaniah
  alternatives:
  - Ishmael the son of Nethaniah
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
