id: JER.41.17
reference: Jeremiah 41:17
source:
  edition: WLC
  text: וַ/יֵּלְכ֗וּ וַ/יֵּֽשְׁבוּ֙ בְּ/גֵר֣וּת כמו/הם אֲשֶׁר אֵ֖צֶל בֵּ֣ית לָ֑חֶם
    לָ/לֶ֖כֶת לָ/ב֥וֹא מִצְרָֽיִם־׃
translation:
  text: So they went and stayed at Geruth Chimham, which is beside Bethlehem, intending
    to go on into Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lodging-place of Chimham.' The Hebrew בְּגֵרוּת likely functions
      here as a place-name ('Geruth'), but it may also denote a lodging or sojourning
      place associated with Chimham.
    reason: lexical_alternative
  - marker: b
    text: The written form in the provided text appears irregular; context supports
      the proper name 'Chimham,' known from 2 Samuel 19:37–40 and associated with
      a site near Bethlehem.
    reason: textual_variant
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: So they went
  alternatives:
  - And they went
  lexicon: HALOT
  rationale: Wayyiqtol of הלך narrates the next event in sequence. 'So they went'
    gives natural English narrative flow while preserving the consecutive sense.
- source_word: וַיֵּשְׁבוּ
  chosen: and stayed
  alternatives:
  - and sat down
  - and dwelt
  - and lodged
  lexicon: HALOT
  rationale: ישב commonly means 'sit, dwell, remain.' In this travel context, the
    sense is temporary encampment or staying at a place, not merely the physical act
    of sitting.
- source_word: בְּגֵרוּת
  chosen: at Geruth
  alternatives:
  - in the lodging-place
  - in the sojourning-place
  lexicon: HALOT
  rationale: Although the noun can suggest a lodging or sojourning place, in this
    verse the traditional and contextually likely sense is a place-name, especially
    given its association with Chimham and location near Bethlehem. Retaining 'Geruth'
    preserves the probable toponym.
- source_word: כמוהם
  chosen: Chimham
  alternatives:
  - like them
  lexicon: BDB
  rationale: The consonantal form in the supplied text reflects a known orthographic
    issue; context and ancient versions support reading the proper name כִּמְהָם/Chimham,
    as in the well-known site 'Geruth Chimham' near Bethlehem. 'Like them' is nonsensical
    in context.
- source_word: אֲשֶׁר אֵצֶל בֵּית לָחֶם
  chosen: which is beside Bethlehem
  alternatives:
  - that is near Bethlehem
  - which is next to Bethlehem
  lexicon: HALOT
  rationale: אצל marks proximity. 'Beside Bethlehem' is concise and natural while
    preserving the locative relation.
- source_word: לָלֶכֶת
  chosen: intending to go
  alternatives:
  - to go
  - in order to go
  lexicon: HALOT
  rationale: The infinitive with ל expresses purpose. 'Intending to go' makes the
    purposive nuance idiomatic in English.
- source_word: לָבוֹא מִצְרָיִם
  chosen: on into Egypt
  alternatives:
  - to enter Egypt
  - to go to Egypt
  lexicon: HALOT
  rationale: בוא with a destination often means entering or arriving. Combined with
    the previous infinitive, 'go on into Egypt' captures the movement toward and into
    the land.
- source_word: מִצְרָיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard English rendering of the place name.
