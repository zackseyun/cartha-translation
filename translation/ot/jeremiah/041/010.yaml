id: JER.41.10
reference: Jeremiah 41:10
source:
  edition: WLC
  text: וַ/יִּ֣שְׁבְּ יִ֠שְׁמָעֵאל אֶת כָּל שְׁאֵרִ֨ית הָ/עָ֜ם אֲשֶׁ֣ר בַּ/מִּצְפָּ֗ה
    אֶת בְּנ֤וֹת הַ/מֶּ֨לֶךְ֙ וְ/אֶת כָּל הָ/עָם֙ הַ/נִּשְׁאָרִ֣ים בַּ/מִּצְפָּ֔ה
    אֲשֶׁ֣ר הִפְקִ֗יד נְבֽוּזַרְאֲדָן֙ רַב טַבָּחִ֔ים אֶת גְּדַלְיָ֖הוּ בֶּן אֲחִיקָ֑ם
    וַ/יִּשְׁבֵּ/ם֙ יִשְׁמָעֵ֣אל בֶּן נְתַנְיָ֔ה וַ/יֵּ֕לֶךְ לַ/עֲבֹ֖ר אֶל בְּנֵ֥י
    עַמּֽוֹן׀־־־־־־־־־־׃ס
translation:
  text: Then Ishmael took captive all the remnant of the people who were in Mizpah—the
    king’s daughters and all the people who were left in Mizpah, whom Nebuzaradan
    the captain of the guard had entrusted to Gedaliah son of Ahikam. Ishmael son
    of Nethaniah took them captive and went to cross over to the Ammonites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'carried away captive.' The Hebrew verb emphasizes seizure into captivity.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of Ammon,' that is, the Ammonites.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁבְּ / וַיִּשְׁבֵּם
  chosen: took captive / took them captive
  alternatives:
  - carried away captive
  - led away captive
  - captured
  lexicon: HALOT
  rationale: The verb שׁבה in the Qal commonly denotes taking persons captive in warlike
    or violent seizure. 'Took captive' is clear modern English and preserves the coercive
    sense better than the less explicit 'took.' Repeating it for the suffixed form
    keeps the Hebrew emphasis.
- source_word: שְׁאֵרִית הָעָם
  chosen: the remnant of the people
  alternatives:
  - the rest of the people
  - the remainder of the people
  lexicon: HALOT
  rationale: שְׁאֵרִית often carries the sense of a surviving remainder. 'Remnant'
    preserves that lexical and thematic force in Jeremiah better than the flatter
    'rest.'
- source_word: בַּמִּצְפָּה
  chosen: in Mizpah
  alternatives:
  - at Mizpah
  lexicon: HALOT
  rationale: The preposition ב here is naturally rendered 'in' for location. 'Mizpah'
    is transliterated as a place name per translation philosophy.
- source_word: בְּנוֹת הַמֶּלֶךְ
  chosen: the king’s daughters
  alternatives:
  - the royal daughters
  - the princesses
  lexicon: HALOT
  rationale: The Hebrew is literally 'daughters of the king.' 'The king’s daughters'
    is both natural and formally transparent. 'Princesses' is interpretive and slightly
    less direct.
- source_word: הַנִּשְׁאָרִים
  chosen: who were left
  alternatives:
  - who remained
  - the survivors
  lexicon: HALOT
  rationale: The participle from שׁאר denotes those remaining. 'Who were left' fits
    the syntax with 'all the people' and reads naturally in English.
- source_word: הִפְקִיד
  chosen: had entrusted
  alternatives:
  - had appointed over
  - had put in charge of
  lexicon: HALOT
  rationale: In context Nebuzaradan committed these people to Gedaliah's oversight.
    'Had entrusted to' best captures the object relationship in this clause without
    awkwardness.
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - the chief of the executioners
  - the chief butcher
  lexicon: HALOT
  rationale: This title is conventionally and contextually understood as the chief
    officer over the royal/body guard, though the underlying noun is related to slaughtering.
    'Captain of the guard' communicates the office idiomatically in context.
- source_word: לַעֲבֹר אֶל
  chosen: to cross over to
  alternatives:
  - to go over to
  - to pass over to
  lexicon: HALOT
  rationale: עבר with אל here indicates movement across toward a destination. 'To
    cross over to' preserves the directional nuance and likely geographical movement.
- source_word: בְּנֵי עַמּוֹן
  chosen: the Ammonites
  alternatives:
  - the sons of Ammon
  - the people of Ammon
  lexicon: HALOT
  rationale: '''The Ammonites'' is the standard idiomatic English rendering for the
    ethnonym בני עמון. A more literal rendering is possible but less natural in running
    text.'
