id: JER.41.13
reference: Jeremiah 41:13
source:
  edition: WLC
  text: וַ/יְהִ֗י כִּ/רְא֤וֹת כָּל הָ/עָם֙ אֲשֶׁ֣ר אֶת יִשְׁמָעֵ֔אל אֶת יֽוֹחָנָן֙
    בֶּן קָרֵ֔חַ וְ/אֵ֛ת כָּל שָׂרֵ֥י הַ/חֲיָלִ֖ים אֲשֶׁ֣ר אִתּ֑/וֹ וַ/יִּשְׂמָֽחוּ־־־־־׃
translation:
  text: And when all the people who were with Ishmael saw Johanan son of Kareah and
    all the commanders of the forces who were with him, they rejoiced.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when all the people who were with Ishmael saw Johanan son of Kareah
      and all the commanders of the troops with him, they were glad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ...
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions as a narrative transition introducing
    the circumstance. In modern English, this is best carried by a simple coordinating
    'And' plus the temporal clause, rather than the archaic 'it came to pass.'
- source_word: כִּרְאוֹת
  chosen: when ... saw
  alternatives:
  - upon seeing
  - as soon as ... saw
  lexicon: HALOT
  rationale: 'The infinitive construct with כ expresses temporal circumstance: ''when
    seeing'' or ''upon seeing.'' ''When ... saw'' is natural English and preserves
    the temporal sense without overstating immediacy.'
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the people there
  - all the populace
  lexicon: HALOT
  rationale: עם here refers to the group of people just mentioned in context, not
    humanity in general. 'All the people' is the most direct and natural rendering.
- source_word: אֲשֶׁר אֶת־יִשְׁמָעֵאל
  chosen: who were with Ishmael
  alternatives:
  - who were by Ishmael
  - who belonged to Ishmael
  lexicon: HALOT
  rationale: The relative clause is elliptical in Hebrew, with אֵת functioning in
    a comitative sense here. Context makes clear these are the captives/people accompanying
    Ishmael, so 'who were with Ishmael' best captures the sense.
- source_word: יֽוֹחָנָן בֶּן־קָרֵחַ
  chosen: Johanan son of Kareah
  alternatives:
  - Johanan the son of Kareah
  rationale: Personal names are transliterated by standard convention per project
    philosophy. 'Son of' is retained as the straightforward patronymic rendering.
- source_word: שָׂרֵי הַחֲיָלִים
  chosen: the commanders of the forces
  alternatives:
  - the captains of the troops
  - the commanders of the soldiers
  - the officers of the army
  lexicon: HALOT
  rationale: שָׂרִים are leaders/officials, and חַיִל in this context refers to military
    forces. 'Commanders of the forces' is clear modern English and suitably military
    without sounding archaic.
- source_word: אֲשֶׁר אִתּוֹ
  chosen: who were with him
  alternatives:
  - who were with Johanan
  lexicon: HALOT
  rationale: The pronoun most naturally refers to Johanan, the nearest singular antecedent
    and the leader of the rescuing party. 'Who were with him' preserves the Hebrew
    pronoun while remaining clear in context.
- source_word: וַיִּשְׂמָחוּ
  chosen: they rejoiced
  alternatives:
  - they were glad
  - they became joyful
  lexicon: HALOT
  rationale: The verb שמח denotes joy/gladness. 'They rejoiced' preserves the verbal
    force and the emotional intensity better than the flatter 'were glad.'
