id: JER.41.12
reference: Jeremiah 41:12
source:
  edition: WLC
  text: וַ/יִּקְחוּ֙ אֶת כָּל הָ֣/אֲנָשִׁ֔ים וַ/יֵּ֣לְכ֔וּ לְ/הִלָּחֵ֖ם עִם יִשְׁמָעֵ֣אל
    בֶּן נְתַנְיָ֑ה וַ/יִּמְצְא֣וּ אֹת֔/וֹ אֶל מַ֥יִם רַבִּ֖ים אֲשֶׁ֥ר בְּ/גִבְעֽוֹן־־־־־׃
translation:
  text: They took all the men and went to fight against Ishmael son of Nethaniah,
    and they found him by the great waters that are in Gibeon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the abundant waters' or 'at the large pool in Gibeon.' The Hebrew
      literally says 'by the many/great waters that are in Gibeon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: They took
  alternatives:
  - They gathered
  - They seized
  lexicon: HALOT
  rationale: The verb לקח in the waw-consecutive narrative sequence most naturally
    means 'took.' In context it refers to Johanan and his commanders taking along
    the men mentioned in the previous verse, not seizing enemies.
- source_word: כָּל הָאֲנָשִׁים
  chosen: all the men
  alternatives:
  - all the people
  - all the soldiers
  lexicon: HALOT
  rationale: אֲנָשִׁים is the masculine plural 'men.' Given the military context,
    'men' fits naturally, while 'people' is too broad and 'soldiers' is more interpretive
    than the Hebrew requires. This follows the gender-accurate principle.
- source_word: לְהִלָּחֵם עִם
  chosen: to fight against
  alternatives:
  - to wage war with
  - to battle
  lexicon: HALOT
  rationale: The Niphal infinitive of לחם with עִם expresses engaging in battle with
    someone. In English, 'fight against' makes the hostile direction explicit and
    reads naturally.
- source_word: יִשְׁמָעֵאל בֶּן נְתַנְיָה
  chosen: Ishmael son of Nethaniah
  alternatives:
  - Ishmael the son of Nethaniah
  rationale: Personal names are transliterated by standard convention. 'Son of' is
    retained as the normal Hebrew patronymic construction.
- source_word: וַיִּמְצְאוּ אֹתוֹ
  chosen: and they found him
  alternatives:
  - and they came upon him
  - and they encountered him
  lexicon: HALOT
  rationale: מצא commonly means 'find.' In this pursuit context, 'found him' is straightforward
    and sufficiently idiomatic.
- source_word: אֶל מַיִם רַבִּים
  chosen: by the great waters
  alternatives:
  - by abundant waters
  - at the large pool
  lexicon: HALOT
  rationale: The preposition אֶל after מצא can indicate location approached or reached;
    in English 'by' best conveys where they found him. מַיִם רַבִּים literally means
    'many/great waters,' an idiom for a substantial body of water. 'Great waters'
    preserves the Hebrew image better than the more interpretive 'pool,' though the
    referent may be a large reservoir.
- source_word: אֲשֶׁר בְּגִבְעוֹן
  chosen: that are in Gibeon
  alternatives:
  - which are at Gibeon
  lexicon: HALOT
  rationale: The relative clause identifies the location of the waters. 'In Gibeon'
    is a natural rendering of בְּ here, though 'at Gibeon' is also possible. 'In'
    works well for a place-name and likely internal landmark.
