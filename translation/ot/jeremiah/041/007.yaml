id: JER.41.7
reference: Jeremiah 41:7
source:
  edition: WLC
  text: וַ/יְהִ֕י כְּ/בוֹאָ֖/ם אֶל תּ֣וֹךְ הָ/עִ֑יר וַ/יִּשְׁחָטֵ֞/ם יִשְׁמָעֵ֤אל
    בֶּן נְתַנְיָה֙ אֶל תּ֣וֹךְ הַ/בּ֔וֹר ה֖וּא וְ/הָ/אֲנָשִׁ֥ים אֲשֶׁר אִתּֽ/וֹ־־־־׃
translation:
  text: And when they came into the midst of the city, Ishmael son of Nethaniah slaughtered
    them and threw them into the cistern, he and the men who were with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the pit.' The Hebrew bor can mean either 'pit' or 'cistern'; 'cistern'
      fits the immediate context best.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּבוֹאָם
  chosen: And when they came
  alternatives:
  - And it happened, when they came
  - Now when they came
  lexicon: HALOT
  rationale: The Hebrew wayyiqtol plus temporal infinitive construct introduces the
    next event in sequence. In English, 'And when they came' preserves the temporal
    force naturally without the wooden 'and it happened.'
- source_word: אֶל תּוֹךְ הָעִיר
  chosen: into the midst of the city
  alternatives:
  - into the city
  - to the inside of the city
  lexicon: HALOT
  rationale: תּוֹךְ means 'midst/interior.' 'Into the midst of the city' keeps the
    spatial vividness more closely than the flatter 'into the city,' while remaining
    readable.
- source_word: וַיִּשְׁחָטֵם
  chosen: slaughtered them
  alternatives:
  - killed them
  - butchered them
  lexicon: HALOT
  rationale: שׁחט commonly denotes slaughtering, often with violent or sacrificial
    overtones. 'Slaughtered' best conveys the brutality of the act without overparaphrase.
- source_word: אֶל תּוֹךְ הַבּוֹר
  chosen: and threw them into the cistern
  alternatives:
  - into the pit
  - into the cistern
  lexicon: HALOT
  rationale: The preposition אֶל plus 'into the midst of the cistern' in this narrative
    context implies disposal of the bodies into the cistern, not merely location of
    the killing. English requires the implied motion verb to make sense. 'Cistern'
    is preferred over 'pit' because בּוֹר here refers to the water reservoir mentioned
    in the surrounding context.
- source_word: הוּא וְהָאֲנָשִׁים אֲשֶׁר אִתּוֹ
  chosen: he and the men who were with him
  alternatives:
  - he and the men with him
  lexicon: HALOT
  rationale: This appositional phrase identifies Ishmael together with his accomplices
    as responsible for the act. The fuller rendering preserves the Hebrew emphasis
    and remains idiomatic.
- source_word: בּוֹר
  chosen: cistern
  alternatives:
  - pit
  lexicon: HALOT
  rationale: In Jeremiah 41 and related passages, בּוֹר denotes a cistern/reservoir
    rather than a generic pit. 'Cistern' preserves the concrete setting and links
    with the broader narrative.
