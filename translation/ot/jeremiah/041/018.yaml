id: JER.41.18
reference: Jeremiah 41:18
source:
  edition: WLC
  text: מִ/פְּנֵי֙ הַ/כַּשְׂדִּ֔ים כִּ֥י יָרְא֖וּ מִ/פְּנֵי/הֶ֑ם כִּֽי הִכָּ֞ה יִשְׁמָעֵ֣אל
    בֶּן נְתַנְיָ֗ה אֶת גְּדַלְיָ֨הוּ֙ בֶּן אֲחִיקָ֔ם אֲשֶׁר הִפְקִ֥יד מֶֽלֶךְ בָּבֶ֖ל
    בָּ/אָֽרֶץ־־־־־־׃ס
translation:
  text: because of the Chaldeans, for they were afraid of them, because Ishmael son
    of Nethaniah had struck down Gedaliah son of Ahikam, whom the king of Babylon
    had appointed over the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Babylonians' for 'the Chaldeans.'
    reason: lexical_alternative
  - marker: b
    text: Or 'had killed'; the Hebrew verb is literally 'had struck,' here in a lethal
      context.
    reason: lexical_alternative
  - marker: c
    text: Or 'had set over the land' / 'had put in charge of the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - on account of
  lexicon: HALOT
  rationale: The preposition with פָּנִים idiomatically expresses cause here, not
    spatial position. 'Because of' fits the narrative explanation of why they went
    to Egypt in the previous verse.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: כַּשְׂדִּים can denote the Neo-Babylonian power. 'Chaldeans' preserves
    the Hebrew ethnonym and common prophetic usage; 'Babylonians' is a valid contextual
    alternative but less formally aligned.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: The particle introduces an explanatory clause. 'For' works naturally
    after the initial causal phrase and preserves the explanatory flow.
- source_word: יָרְאוּ
  chosen: were afraid
  alternatives:
  - feared
  lexicon: HALOT
  rationale: The verb ירא in this context denotes fear. 'Were afraid' is idiomatic
    modern English and reflects the stative sense in context.
- source_word: מִפְּנֵיהֶם
  chosen: of them
  alternatives:
  - because of them
  - before them
  lexicon: HALOT
  rationale: With the preceding 'were afraid,' English idiom prefers 'afraid of them.'
    The Hebrew repeats the same prepositional idiom, but a more literal repetition
    would sound awkward in English.
- source_word: הִכָּה
  chosen: had struck down
  alternatives:
  - had killed
  - had struck
  lexicon: HALOT
  rationale: נכה often means 'strike' and in lethal contexts 'strike down.' Since
    Gedaliah's death is in view, 'had struck down' preserves the violent verbal imagery
    without flattening it to the result alone.
- source_word: יִשְׁמָעֵאל בֶּן נְתַנְיָה
  chosen: Ishmael son of Nethaniah
  alternatives:
  - Ishmael the son of Nethaniah
  lexicon: HALOT
  rationale: Names are transliterated per project philosophy. The construct 'son of'
    is rendered straightforwardly.
- source_word: אֶת גְּדַלְיָהוּ בֶּן אֲחִיקָם
  chosen: Gedaliah son of Ahikam
  alternatives:
  - Gedaliah the son of Ahikam
  lexicon: HALOT
  rationale: Direct object marker is not translated. Names are transliterated, and
    the filial relation is rendered plainly.
- source_word: אֲשֶׁר הִפְקִיד
  chosen: whom ... had appointed
  alternatives:
  - whom ... had entrusted
  - whom ... had set in charge
  lexicon: HALOT
  rationale: הפקיד in the Hiphil means to appoint, place in charge, or entrust with
    responsibility. 'Had appointed' is concise and fits the governmental context.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: Standard formal rendering of the construct chain; clear and natural in
    English.
- source_word: בָּאָרֶץ
  chosen: over the land
  alternatives:
  - in the land
  - over the country
  lexicon: HALOT
  rationale: 'Given the verb ''appointed,'' the prepositional phrase is best taken
    in an administrative sense: Gedaliah was appointed over the land, not merely located
    in it. ''Land'' preserves the broad territorial sense of אֶרֶץ.'
