theological_decisions:
- issue: Whether to paraphrase the prophetic idiom 'daughter of my people' into a
    flatter referent such as 'my people' or 'my people Israel'
  chosen_reading: Retain 'the daughter of my people' in the main text
  alternative_readings:
  - my people
  - my dear people
  rationale: The phrase is not merely referential but personifying and lamentational.
    Preserving the idiom maintains the prophetic pathos and does not import additional
    theological claims. A paraphrase would reduce the literary and emotional force
    of the Hebrew.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    meaning without flattening theological/literary tension.'
