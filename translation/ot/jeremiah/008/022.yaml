id: JER.8.22
reference: Jeremiah 8:22
source:
  edition: WLC
  text: הַ/צֳרִי֙ אֵ֣ין בְּ/גִלְעָ֔ד אִם רֹפֵ֖א אֵ֣ין שָׁ֑ם כִּ֗י מַדּ֨וּעַ֙ לֹ֣א
    עָֽלְתָ֔ה אֲרֻכַ֖ת בַּת עַמִּֽ/י־־׃
translation:
  text: Is there no balm in Gilead? Is there no physician there? Why then has the
    healing of the daughter of my people not come about?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'resin' or 'balsam.' The Hebrew term refers to a medicinal gum/resin
      associated with Gilead.
    reason: lexical_alternative
  - marker: b
    text: Or 'recovery' or 'restoration' for 'the healing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצֳרִי
  chosen: balm
  alternatives:
  - resin
  - balsam
  lexicon: HALOT
  rationale: צֳרִי denotes a medicinal resin/balsam associated with Gilead. 'Balm'
    is the most natural English rendering in this context and preserves the verse's
    rhetorical force and established medicinal sense without becoming overly technical.
- source_word: אֵין
  chosen: there is no / is there no
  alternatives:
  - there is not
  lexicon: HALOT
  rationale: The particle marks nonexistence. In this rhetorical question, idiomatic
    English uses 'Is there no...?' rather than a wooden 'There is no...?'.
- source_word: בְּגִלְעָד
  chosen: in Gilead
  lexicon: HALOT
  rationale: Straightforward locative use of the place name; transliterated as a proper
    name per project philosophy.
- source_word: אִם
  chosen: (interrogative force carried as a second question)
  alternatives:
  - if
  - whether
  lexicon: HALOT
  rationale: Here אִם introduces the second rhetorical question in parallel with the
    first clause. Rendering it as a fresh question in English ('Is there no physician
    there?') best reflects the syntax and rhetoric rather than a conditional 'if'.
- source_word: רֹפֵא
  chosen: physician
  alternatives:
  - healer
  - doctor
  lexicon: HALOT
  rationale: The participle means one who heals. 'Physician' fits the medical imagery
    paired with 'balm' and sounds natural in elevated but readable English. 'Healer'
    could suggest broader or charismatic connotations not required by the Hebrew.
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple adverb of place, referring back to Gilead.
- source_word: כִּי מַדּוּעַ
  chosen: Why then
  alternatives:
  - For why
  - Why
  lexicon: HALOT
  rationale: The combination introduces the consequence/inference from the preceding
    rhetorical questions. 'Why then' captures the argumentative flow in idiomatic
    English better than the more wooden 'For why'.
- source_word: לֹא עָלְתָה
  chosen: has ... not come about
  alternatives:
  - has not arisen
  - has not gone up
  - has not been restored
  lexicon: HALOT
  rationale: עלה literally means 'go up/arise,' but with אֲרֻכָה in this context it
    idiomatically refers to the coming forth or appearing of healing/recovery. 'Has
    not come about' communicates the resultative sense in natural English without
    forcing a literal spatial image.
- source_word: אֲרֻכַת
  chosen: the healing
  alternatives:
  - the recovery
  - the restoration
  - the health
  lexicon: HALOT
  rationale: The noun refers to healing/recovery, especially the restoration of health.
    'Healing' is concise and fits the medical metaphor. 'Recovery' is possible and
    preserved as an alternative.
- source_word: בַּת עַמִּי
  chosen: the daughter of my people
  alternatives:
  - my dear people
  - the daughter of my people Israel
  lexicon: HALOT
  rationale: This is a prophetic personification for the people/nation. The formal
    image should be preserved rather than paraphrased away, since it carries emotional
    and literary weight. English can retain the genitival phrase naturally.
