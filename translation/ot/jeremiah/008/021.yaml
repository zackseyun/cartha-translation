id: JER.8.21
reference: Jeremiah 8:21
source:
  edition: WLC
  text: עַל שֶׁ֥בֶר בַּת עַמִּ֖/י הָשְׁבָּ֑רְתִּי קָדַ֕רְתִּי שַׁמָּ֖ה הֶחֱזִקָֽתְ/נִי־־׃
translation:
  text: For the brokenness of the daughter of my people I am broken; I mourn; horror
    has seized me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because of the fracture of the daughter of my people, I am shattered.'
      The Hebrew uses the same root for 'brokenness' and 'I am broken,' creating a
      deliberate wordplay.
    reason: lexical_alternative
  - marker: b
    text: '''The daughter of my people'' is a prophetic personification of the people
      of Judah/Israel, preserved here rather than paraphrased away.'
    reason: cultural_note
  - marker: c
    text: Or 'I am darkened' / 'I go about in mourning.' The Hebrew verb carries imagery
      of darkness associated with grief.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: For
  alternatives:
  - Because of
  - Over
  lexicon: HALOT
  rationale: Introduces the cause or occasion of the speaker's grief. 'For' is concise
    and natural in English, while preserving the causal sense.
- source_word: שֶׁבֶר
  chosen: brokenness
  alternatives:
  - fracture
  - breach
  - ruin
  - hurt
  lexicon: HALOT
  rationale: The noun denotes a breaking, fracture, or collapse. 'Brokenness' captures
    both the concrete metaphor and the communal devastation in context better than
    the more archaic 'breach' or the narrower 'hurt'.
- source_word: בַּת עַמִּי
  chosen: the daughter of my people
  alternatives:
  - my dear people
  - the daughter of my people group
  lexicon: HALOT
  rationale: This is a conventional prophetic expression personifying the people as
    a daughter. A relatively formal rendering preserves the metaphor and avoids paraphrasing
    it away.
- source_word: הָשְׁבָּרְתִּי
  chosen: I am broken
  alternatives:
  - I am shattered
  - I have been broken
  - I am hurt
  lexicon: HALOT
  rationale: 'The verb is from the same root as שֶׁבֶר, creating a wordplay: because
    of the people''s breaking, the speaker is broken. ''I am broken'' preserves that
    lexical echo more clearly than ''I am hurt.'' The English present stative sense
    fits the lament context.'
- source_word: קָדַרְתִּי
  chosen: I mourn
  alternatives:
  - I am darkened
  - I go about in mourning
  - I am gloomy
  lexicon: HALOT
  rationale: The verb literally relates to being dark/darkened, but in lament contexts
    it commonly conveys mourning or dejection. 'I mourn' gives the idiomatic sense
    in readable English, while the darker imagery is preserved by the surrounding
    tone.
- source_word: שַׁמָּה
  chosen: horror
  alternatives:
  - appallment
  - desolation
  - astonishment
  lexicon: HALOT
  rationale: The noun can denote appallment or horror. Here it describes the overwhelming
    emotional effect that has come upon the speaker. 'Horror' is the most natural
    modern English choice.
- source_word: הֶחֱזִקַתְנִי
  chosen: has seized me
  alternatives:
  - has taken hold of me
  - has gripped me
  - has overwhelmed me
  lexicon: HALOT
  rationale: From חזק in the causative, the sense is that horror has taken hold of
    the speaker. 'Has seized me' is vivid, idiomatic, and preserves the force of sudden
    overpowering.
