theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering of
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Degree of interpretive smoothing in a difficult judgment clause
  chosen_reading: Retain the imagery of gathering/removal and passing away without
    specifying an object beyond the Hebrew wording
  alternative_readings:
  - Interpret the opening as 'I will consume them'
  - Interpret the closing as 'I will take away from them what I gave them'
  rationale: The verse contains compressed and debated Hebrew, especially in the opening
    intensification and final clause. Optimal equivalence here favors a readable but
    text-near rendering that does not resolve every ambiguity into a more doctrinal
    or interpretive paraphrase.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
