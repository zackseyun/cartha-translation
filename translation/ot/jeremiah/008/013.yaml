id: JER.8.13
reference: Jeremiah 8:13
source:
  edition: WLC
  text: אָסֹ֥ף אֲסִיפֵ֖/ם נְאֻם יְהֹוָ֑ה אֵין֩ עֲנָבִ֨ים בַּ/גֶּ֜פֶן וְ/אֵ֧ין תְּאֵנִ֣ים
    בַּ/תְּאֵנָ֗ה וְ/הֶֽ/עָלֶה֙ נָבֵ֔ל וָ/אֶתֵּ֥ן לָ/הֶ֖ם יַעַבְרֽוּ/ם־׃
translation:
  text: I will surely gather them up, declares the LORD. There are no grapes on the
    vine, and no figs on the fig tree; even the leaf has withered, and what I gave
    them will pass away from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will utterly sweep them away' or 'I will surely consume them.' The
      Hebrew uses an intensified form of 'gather,' which in this judgment context
      may imply removal or destruction.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult Hebrew. It may also mean, 'what I gave them
      will be taken from them' or similar.
    reason: alternative_reading
lexical_decisions:
- source_word: אָסֹף אֲסִיפֵם
  chosen: I will surely gather them up
  alternatives:
  - I will utterly sweep them away
  - I will surely consume them
  - I will gather them in completely
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. The
    root אסף commonly means 'gather, remove, take away.' In this judgment context,
    the phrase likely carries a hostile nuance of removal, but 'gather them up' preserves
    the lexical sense while allowing the context to convey judgment. 'Sweep them away'
    is interpretive and stronger than the base verb, so it is preserved as an alternative
    rather than adopted in the main text.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is natural modern English
    and preserves the formal prophetic force. Per doctrine, יְהוָה is rendered 'the
    LORD.'
- source_word: אֵין עֲנָבִים בַּגֶּפֶן
  chosen: There are no grapes on the vine
  alternatives:
  - There are no grapes on the grapevine
  lexicon: HALOT
  rationale: A straightforward existential clause. 'Vine' is idiomatic English and
    sufficiently specific in context.
- source_word: וְאֵין תְּאֵנִים בַּתְּאֵנָה
  chosen: and no figs on the fig tree
  alternatives:
  - and there are no figs on the fig tree
  lexicon: HALOT
  rationale: The repetition of the fig noun as fruit and tree is preserved in English
    by distinguishing 'figs' and 'fig tree.'
- source_word: וְהֶעָלֶה נָבֵל
  chosen: even the leaf has withered
  alternatives:
  - and the leaf is withered
  - and the foliage has faded
  lexicon: HALOT
  rationale: The singular collective 'the leaf' works in English as a representative
    singular. 'Has withered' conveys the stative/resultative sense naturally.
- source_word: וָאֶתֵּן לָהֶם
  chosen: what I gave them
  alternatives:
  - what I appointed for them
  - what I granted them
  lexicon: HALOT
  rationale: נתן is broad ('give, set, appoint'). Because the following verb is difficult,
    rendering this clause as 'what I gave them' keeps the Hebrew wording transparent
    without over-interpreting the object as specifically laws, land, or blessings.
- source_word: יַעַבְרוּם
  chosen: will pass away from them
  alternatives:
  - will pass over them
  - will be taken from them
  - those who pass over them
  lexicon: HALOT
  rationale: From עבר, the form with pronominal suffix is syntactically difficult.
    In context, a sense of things given to them passing away or being removed fits
    the judgment oracle and connects naturally with agricultural loss. 'Will pass
    away from them' preserves the motion idea of עבר while communicating loss. Because
    the Hebrew is compressed and somewhat obscure, stronger interpretive options are
    kept as alternatives and footnoted.
