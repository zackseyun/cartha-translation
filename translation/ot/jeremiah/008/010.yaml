id: JER.8.10
reference: Jeremiah 8:10
source:
  edition: WLC
  text: לָ/כֵן֩ אֶתֵּ֨ן אֶת נְשֵׁי/הֶ֜ם לַ/אֲחֵרִ֗ים שְׂדֽוֹתֵי/הֶם֙ לְ/י֣וֹרְשִׁ֔ים
    כִּ֤י מִ/קָּטֹן֙ וְ/עַד גָּד֔וֹל כֻּלֹּ֖/ה בֹּצֵ֣עַ בָּ֑צַע מִ/נָּבִיא֙ וְ/עַד
    כֹּהֵ֔ן כֻּלֹּ֖/ה עֹ֥שֶׂה שָּֽׁקֶר־־־׃
translation:
  text: Therefore I will give their wives to others, their fields to those who will
    take possession of them; for from the least even to the greatest, every one of
    them is greedy for unjust gain; from prophet even to priest, every one of them
    practices falsehood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their fields to inheritors/heirs'; the Hebrew verb can mean 'inherit'
      or 'take possession,' and here likely includes the sense of seizure by new possessors.
    reason: lexical_alternative
  - marker: b
    text: Or 'is greedy for gain'; the Hebrew expression can denote acquisitiveness
      generally, but in prophetic contexts often implies dishonest or unjust profit.
    reason: lexical_alternative
  - marker: c
    text: Or 'deals falsely' or 'acts deceitfully.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - Therefore
  lexicon: HALOT
  rationale: Standard inferential particle introducing judgment as a consequence of
    the preceding indictment. 'Therefore' preserves the formal causal connection.
- source_word: אֶתֵּן
  chosen: I will give
  alternatives:
  - I give
  - I am about to give
  lexicon: HALOT
  rationale: 'Qal imperfect 1cs of נתן in prophetic judgment context is naturally
    future: YHWH declares what he will do.'
- source_word: נְשֵׁיהֶם
  chosen: their wives
  alternatives:
  - their women
  lexicon: HALOT
  rationale: Though אשה can mean 'woman' or 'wife,' the possessive suffix in this
    context of covenantal/social judgment strongly favors 'their wives.'
- source_word: לַאֲחֵרִים
  chosen: to others
  alternatives:
  - to other men
  - to strangers
  lexicon: HALOT
  rationale: The adjective/substantive means 'others.' 'To others' is sufficiently
    literal without over-specifying gender beyond the Hebrew.
- source_word: שְׂדוֹתֵיהֶם
  chosen: their fields
  alternatives:
  - their landholdings
  lexicon: HALOT
  rationale: Concrete agricultural property is in view; 'fields' is the plain sense
    and matches the judgment formula.
- source_word: לְיוֹרְשִׁים
  chosen: to those who will take possession of them
  alternatives:
  - to inheritors
  - to heirs
  - to possessors
  lexicon: HALOT
  rationale: From ירשׁ, often 'inherit/possess/dispossess.' Here the sense is not
    merely legal inheritance but seizure/possession by others. The fuller English
    phrase communicates that sense clearly.
- source_word: כִּי מִקָּטֹן וְעַד גָּדוֹל
  chosen: for from the least even to the greatest
  alternatives:
  - for from small to great
  - for from the least to the greatest
  lexicon: HALOT
  rationale: Idiomatic merism indicating the whole population across social rank.
    'The least ... the greatest' is natural English and preserves the scope.
- source_word: כֻּלֹּה
  chosen: every one of them
  alternatives:
  - all of them
  - each one
  lexicon: HALOT
  rationale: 'Though morphologically singular with suffix, distributive force fits
    the following participles: each person without exception.'
- source_word: בֹּצֵעַ בָּצַע
  chosen: is greedy for unjust gain
  alternatives:
  - is greedy for gain
  - covets profit
  - is bent on plunder
  lexicon: HALOT
  rationale: The cognate participle+noun construction intensifies acquisitive wrongdoing.
    'Unjust gain' captures both greed and the illicit character of the profit better
    than the bare 'gain.'
- source_word: מִנָּבִיא וְעַד כֹּהֵן
  chosen: from prophet even to priest
  alternatives:
  - from the prophet to the priest
  - from prophet to priest
  lexicon: HALOT
  rationale: Another merism, now naming leadership classes. Anarthrous forms are well
    represented in English without articles.
- source_word: עֹשֶׂה שָּׁקֶר
  chosen: practices falsehood
  alternatives:
  - deals falsely
  - acts deceitfully
  - works falsehood
  lexicon: HALOT
  rationale: עשה + שקר denotes active engagement in deceit, not merely speaking an
    isolated lie. 'Practices falsehood' conveys habitual conduct and moral corruption.
