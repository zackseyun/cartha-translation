id: JER.8.14
reference: Jeremiah 8:14
source:
  edition: WLC
  text: עַל מָה֙ אֲנַ֣חְנוּ יֹֽשְׁבִ֔ים הֵֽאָסְפ֗וּ וְ/נָב֛וֹא אֶל עָרֵ֥י הַ/מִּבְצָ֖ר
    וְ/נִדְּמָה שָּׁ֑ם כִּי֩ יְהוָ֨ה אֱלֹהֵ֤י/נוּ הֲדִמָּ֨/נוּ֙ וַ/יַּשְׁקֵ֣/נוּ מֵי
    רֹ֔אשׁ כִּ֥י חָטָ֖אנוּ לַ/יהוָֽה־־־־׃
translation:
  text: Why are we sitting still? Gather yourselves, and let us enter the fortified
    cities and perish there, for the LORD our God has doomed us and given us poisoned
    water to drink, because we have sinned against the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and be silent there' / 'and be destroyed there' for 'and perish there';
      the Hebrew verb can carry senses of silence, stillness, or ruin.
    reason: lexical_alternative
  - marker: b
    text: Literally 'water of gall' or 'water of poison.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשְׁבִים
  chosen: sitting still
  alternatives:
  - sitting
  - remaining
  - dwelling
  lexicon: HALOT
  rationale: Although the verb literally means 'sitting/dwelling,' in this rhetorical
    question it carries the sense of inactivity or remaining in place. 'Sitting still'
    preserves the image while making the implied passivity clear in natural English.
- source_word: הֵאָסְפוּ
  chosen: Gather yourselves
  alternatives:
  - assemble
  - be gathered together
  lexicon: HALOT
  rationale: The Niphal imperative is reflexive/passive in form but functions as a
    call for the people to assemble. 'Gather yourselves' preserves the urgency and
    reflexive nuance better than the flatter 'assemble.'
- source_word: עָרֵי הַמִּבְצָר
  chosen: the fortified cities
  alternatives:
  - the fortress cities
  - the fortified towns
  lexicon: HALOT
  rationale: This phrase refers to defensible urban strongholds. 'Fortified cities'
    is standard, clear English and preserves the military sense of מִבְצָר.
- source_word: וְנִדְּמָה
  chosen: and perish there
  alternatives:
  - and be silent there
  - and be destroyed there
  - and wait there in silence
  lexicon: HALOT
  rationale: The root דמה can denote being silenced, becoming still, or being destroyed.
    In this context of judgment and the following clause ('the LORD our God has doomed
    us'), 'perish' best captures the likely sense of being brought to ruin, while
    remaining idiomatic in English.
- source_word: הֲדִמָּנוּ
  chosen: has doomed us
  alternatives:
  - has silenced us
  - has destroyed us
  - has brought us to ruin
  lexicon: HALOT
  rationale: From the same root as וְנִדְּמָה, here the causative form indicates that
    the LORD has consigned the people to ruin/judgment. 'Has doomed us' communicates
    divine judicial determination without over-specifying the mechanism.
- source_word: מֵי רֹאשׁ
  chosen: poisoned water
  alternatives:
  - water of gall
  - water of poison
  - bitter water
  lexicon: HALOT
  rationale: רֹאשׁ denotes a poisonous or bitter plant/substance, not merely emotional
    'gall.' 'Poisoned water' communicates the concrete image accessibly in modern
    English. A more literal alternative is preserved in a footnote.
- source_word: חָטָאנוּ לַיהוָה
  chosen: we have sinned against the LORD
  alternatives:
  - we have sinned to the LORD
  lexicon: HALOT
  rationale: English idiom requires 'against' with 'sinned' here. This accurately
    conveys the offense directed toward the LORD.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
