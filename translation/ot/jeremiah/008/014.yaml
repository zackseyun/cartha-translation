theological_decisions:
- issue: Rendering of divine judgment language in דמה clauses
  chosen_reading: The verse speaks of the people recognizing that the LORD has consigned
    them to ruin under judgment.
  alternative_readings:
  - The LORD has silenced them
  - The people intend merely to wait in silence in the fortified cities
  rationale: The repeated דמה language can be rendered in terms of silence/stillness
    or destruction. In this context of invasion, fortified cities, poisoned water,
    and confession of sin, the judicial-destruction sense best fits the flow without
    importing extra theology.
  doctrine_reference: Translation philosophy §3 (preserve tension where genuine ambiguity
    exists)
