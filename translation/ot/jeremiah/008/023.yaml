theological_decisions:
- issue: Whether to flatten the prophetic personification בַת עַמִּי into a non-metaphorical
    expression
  chosen_reading: Preserve the metaphor as 'the daughter of my people'
  alternative_readings:
  - my people
  - my dear people
  rationale: The phrase is poetic and personifying, not a doctrinally loaded title.
    Preserving it maintains the literary and emotional texture of Jeremiah's lament
    and avoids unnecessary interpretive reduction.
  doctrine_reference: Translation philosophy §1, §3, §6
