id: JER.8.23
reference: Jeremiah 8:23
source:
  edition: WLC
  text: מִֽי יִתֵּ֤ן רֹאשִׁ/י֙ מַ֔יִם וְ/עֵינִ֖/י מְק֣וֹר דִּמְעָ֑ה וְ/אֶבְכֶּה֙ יוֹמָ֣ם
    וָ/לַ֔יְלָה אֵ֖ת חַֽלְלֵ֥י בַת עַמִּֽ/י־־׃
translation:
  text: Oh, that my head were water, and my eyes a fountain of tears, so that I might
    weep day and night for the slain of the daughter of my people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If only my head were water, and my eye a spring of tears.' The Hebrew
      opens with an idiom of longing ('Who will give...?') and uses a singular form
      for 'eye,' though English often renders it idiomatically as 'eyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי יִתֵּן
  chosen: Oh, that ... were
  alternatives:
  - Who will give ...?
  - If only ... were
  lexicon: HALOT
  rationale: The idiom מִי יִתֵּן expresses a wish or lamenting desire rather than
    a literal question. English idiom is best captured by 'Oh, that ... were' or 'If
    only ... were.' 'Oh, that' preserves the emotional force and poetic register.
- source_word: רֹאשִׁי
  chosen: my head
  lexicon: HALOT
  rationale: Literal rendering is appropriate; the image is bodily and poetic, not
    metaphorically abstracted.
- source_word: מַיִם
  chosen: water
  lexicon: HALOT
  rationale: Straightforward lexical sense. Singular 'water' works idiomatically in
    English after 'were' and preserves the metaphor.
- source_word: וְעֵינִי
  chosen: and my eyes
  alternatives:
  - and my eye
  lexicon: HALOT
  rationale: The form is singular with 1cs suffix in Hebrew, but English idiom naturally
    uses the pair 'my eyes' in this poetic parallelism, matching common bodily expression
    and the likely distributive sense.
- source_word: מְקוֹר
  chosen: a fountain
  alternatives:
  - a spring
  - a source
  lexicon: HALOT
  rationale: מְקוֹר denotes a spring, fountain, or source. 'Fountain' best suits elevated
    poetic English and pairs naturally with 'tears.'
- source_word: דִּמְעָה
  chosen: of tears
  alternatives:
  - of tear-water
  lexicon: HALOT
  rationale: Genitive construction is naturally rendered 'a fountain of tears.'
- source_word: וְאֶבְכֶּה
  chosen: so that I might weep
  alternatives:
  - and I would weep
  - that I may weep
  lexicon: HALOT
  rationale: Following the wish formula, the cohortative expresses desired result
    or purpose. 'So that I might weep' captures the volitional nuance in natural English.
- source_word: יוֹמָם וָלַיְלָה
  chosen: day and night
  alternatives:
  - by day and by night
  lexicon: HALOT
  rationale: Standard idiomatic rendering preserving the merism of continual mourning.
- source_word: חַלְלֵי
  chosen: the slain
  alternatives:
  - the wounded
  - the pierced
  - those killed
  lexicon: HALOT
  rationale: In context חללים refers to those slain, especially war dead or casualties.
    'The slain' is concise, formal enough for lament poetry, and contextually precise.
- source_word: בַת עַמִּי
  chosen: the daughter of my people
  alternatives:
  - my dear people
  - the daughter, my people
  - the people of my daughter
  lexicon: HALOT
  rationale: This is a common prophetic personification for the people/community,
    especially Zion/Judah as a daughter. The literal rendering preserves the metaphor
    and avoids flattening the poetic imagery into paraphrase.
