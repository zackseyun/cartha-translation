id: JER.8.12
reference: Jeremiah 8:12
source:
  edition: WLC
  text: הֹבִ֕שׁוּ כִּ֥י תוֹעֵבָ֖ה עָשׂ֑וּ גַּם בּ֣וֹשׁ לֹֽא יֵבֹ֗שׁוּ וְ/הִכָּלֵם֙ לֹ֣א יָדָ֔עוּ לָ/כֵ֞ן יִפְּל֣וּ בַ/נֹּפְלִ֗ים בְּ/עֵ֧ת פְּקֻדָּתָ֛/ם יִכָּשְׁל֖וּ אָמַ֥ר יְהוָֽה־־׃ס
translation:
  text: Were they ashamed because they had done an abomination? No, they were not ashamed at all; they did not even know how to blush. Therefore they will fall among the fallen; at the time of their punishment they will stumble, says Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the time of their visitation.' The Hebrew can denote a time when God visits people for judgment or calls them to account.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹבִשׁוּ
  chosen: Were they ashamed
  alternatives:
  - They were put to shame
  - They acted shamefully
  lexicon: HALOT
  rationale: 'The form is best taken here as introducing a rhetorical question in context: ''Were they ashamed...?'' This matches the parallel in Jer 6:15 and fits the following emphatic denial. ''Ashamed'' preserves the shame/honor sense of בוש without over-interpreting as passive humiliation.'
- source_word: כִּי
  chosen: because
  alternatives:
  - that
  - when
  lexicon: HALOT
  rationale: 'Causal ''because'' best explains the relation: shame would be expected because they committed something detestable.'
- source_word: תוֹעֵבָה
  chosen: an abomination
  alternatives:
  - a detestable thing
  - something abhorrent
  lexicon: HALOT
  rationale: '''Abomination'' is a strong but established rendering for תועבה and preserves the moral-religious force of the Hebrew in prophetic denunciation.'
- source_word: עָשׂוּ
  chosen: they had done
  alternatives:
  - they did
  - they committed
  lexicon: HALOT
  rationale: Combined with תועבה, English idiom allows either 'done' or 'committed.' 'Had done' fits the rhetorical question and prior action leading to expected shame.
- source_word: גַּם בּוֹשׁ לֹא יֵבֹשׁוּ
  chosen: No, they were not ashamed at all
  alternatives:
  - Indeed, they were not ashamed
  - They were not even ashamed
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the negation. The chosen rendering captures the emphatic force in natural English.
- source_word: וְהִכָּלֵם
  chosen: to blush
  alternatives:
  - to be humiliated
  - to feel disgrace
  lexicon: HALOT
  rationale: In parallel with בוש, this noun/infinitival form refers to the experience or display of shame. 'Blush' idiomatically conveys visible shame in English and suits the collocation 'did not know how to blush.'
- source_word: לֹא יָדָעוּ
  chosen: they did not even know
  alternatives:
  - they did not know
  - they were ignorant of
  lexicon: HALOT
  rationale: With the preceding term for shame/disgrace, this expresses moral incapacity or loss of shame. 'Did not even know' brings out the climactic force.
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For that reason
  lexicon: HALOT
  rationale: Standard inferential connector introducing judgment consequent on shamelessness.
- source_word: יִפְּלוּ בַנֹּפְלִים
  chosen: they will fall among the fallen
  alternatives:
  - they will fall with those who fall
  - they will fall among those falling
  lexicon: HALOT
  rationale: The phrase is idiomatic and likely means they will share the fate of others who are struck down. 'Among the fallen' is concise and preserves the Hebrew wordplay.
- source_word: בְּעֵת פְּקֻדָּתָם
  chosen: at the time of their punishment
  alternatives:
  - at the time of their visitation
  - when they are called to account
  lexicon: HALOT
  rationale: פקדה can mean visitation, oversight, or punishment. In this judgment context, 'punishment' makes the sense explicit for modern readers while preserving the judicial force.
- source_word: יִכָּשְׁלוּ
  chosen: they will stumble
  alternatives:
  - they will be overthrown
  - they will totter
  lexicon: HALOT
  rationale: The Niphal of כשל commonly conveys stumbling or being made to fall. 'Stumble' preserves the metaphor and echoes prophetic judgment language.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - declares the LORD
  - said the LORD
  lexicon: HALOT
  rationale: Prophetic speech formula rendered in idiomatic present English. Per doctrine, יְהוָה is translated 'the LORD.'
