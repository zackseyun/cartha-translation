id: JER.8.11
reference: Jeremiah 8:11
source:
  edition: WLC
  text: וַ/יְרַפּ֞וּ אֶת שֶׁ֤בֶר בַּת עַמִּ/י֙ עַל נְקַלָּ֔ה לֵ/אמֹ֖ר שָׁל֣וֹם שָׁל֑וֹם
    וְ/אֵ֖ין שָׁלֽוֹם־־־׀׃
translation:
  text: They have treated the wound of the daughter of my people lightly, saying,
    ‘Peace, peace,’ when there is no peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'superficially' / 'as though it were a trivial thing.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew shalom can also mean 'well-being,' 'wholeness,' or 'security.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְרַפּוּ
  chosen: have treated
  alternatives:
  - have healed
  - try to heal
  lexicon: HALOT
  rationale: From רפא, literally 'heal.' In this prophetic accusation the point is
    their superficial handling of the people's injury rather than actual successful
    healing. 'Have treated' preserves the medical metaphor while fitting the ironic
    context better than a straightforward 'healed.'
- source_word: שֶׁבֶר
  chosen: wound
  alternatives:
  - brokenness
  - fracture
  - hurt
  lexicon: HALOT
  rationale: שבר can denote a breaking, fracture, or ruin/disaster. Here, with רפא
    ('heal/treat'), the bodily-injury metaphor is foregrounded, so 'wound' is natural
    English and preserves the image.
- source_word: בַּת עַמִּי
  chosen: the daughter of my people
  alternatives:
  - my dear people
  - the daughter of my people Israel
  lexicon: HALOT
  rationale: A conventional prophetic expression personifying the people/city as a
    daughter. Kept relatively formal to preserve the metaphor and pathos rather than
    flattening it into paraphrase.
- source_word: עַל נְקַלָּה
  chosen: lightly
  alternatives:
  - superficially
  - as though it were trivial
  - for a slight thing
  lexicon: HALOT
  rationale: The phrase conveys treating a grave wound as insignificant or in a superficial
    manner. 'Lightly' is concise, idiomatic, and preserves the rebuke. 'Superficially'
    is a viable interpretive alternative and is preserved in a footnote.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - by saying
  lexicon: HALOT
  rationale: Standard infinitive construction introducing the content of their false
    reassurance.
- source_word: שָׁלוֹם שָׁלוֹם
  chosen: Peace, peace
  alternatives:
  - All is well, all is well
  - Peace! Peace!
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, well-being, wholeness, and security. 'Peace,
    peace' preserves the repetition and rhetorical force of the Hebrew, while allowing
    the broader sense to be explained in a footnote.
- source_word: וְאֵין שָׁלוֹם
  chosen: when there is no peace
  alternatives:
  - but there is no peace
  - though there is no peace
  lexicon: HALOT
  rationale: The clause exposes the falsity of the preceding claim. 'When there is
    no peace' is idiomatic and captures the mismatch between their proclamation and
    reality; 'but there is no peace' is also possible.
