theological_decisions:
- issue: Preservation of prophetic personification
  chosen_reading: Retain 'the daughter of my people' in the main text
  alternative_readings:
  - my people
  - my dear people
  rationale: The Hebrew personifies the people as a daughter, a significant prophetic
    idiom carrying emotional and covenantal weight. Flattening it would lose imagery
    not demanded by readability concerns.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of שָׁלוֹם
  chosen_reading: Use 'peace' in the main text
  alternative_readings:
  - well-being
  - all is well
  rationale: '''Peace'' is the standard lexical rendering and preserves the repeated
    slogan-like force of the Hebrew. Because שָׁלוֹם is broader than absence of conflict,
    a footnote preserves the fuller semantic range without paraphrasing the main text.'
  doctrine_reference: Translation philosophy §§1, 5, 6
