id: JER.8.9
reference: Jeremiah 8:9
source:
  edition: WLC
  text: הֹבִ֣ישׁוּ חֲכָמִ֔ים חַ֖תּוּ וַ/יִּלָּכֵ֑דוּ הִנֵּ֤ה בִ/דְבַר יְהוָה֙ מָאָ֔סוּ וְ/חָכְמַֽת מֶ֖ה לָ/הֶֽם־־׃ס
translation:
  text: The wise men are put to shame; they are dismayed and captured. Look, they have rejected the word of Yahweh, so what wisdom do they have?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'caught' or 'taken.' The Hebrew verb can denote being seized or trapped.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹבִישׁוּ
  chosen: are put to shame
  alternatives:
  - are ashamed
  - have been shamed
  lexicon: HALOT
  rationale: 'The Hiphil of בוש here is causative/passive in effect: the wise are exposed to shame rather than merely feeling inward embarrassment. ''Are put to shame'' preserves the public disgrace implied by the verb and fits the prophetic denunciation.'
- source_word: חֲכָמִים
  chosen: the wise men
  alternatives:
  - the wise
  - wise men
  lexicon: HALOT
  rationale: The masculine plural noun refers to the recognized wise class or sages in Judah. 'The wise men' is gender-accurate to the Hebrew form and context, referring to male leaders/sages rather than humanity in general.
- source_word: חַתּוּ
  chosen: are dismayed
  alternatives:
  - are shattered
  - are terrified
  lexicon: HALOT
  rationale: The verb conveys being broken down in courage or confounded. 'Are dismayed' is idiomatic modern English and matches the sequence of shame and defeat.
- source_word: וַיִּלָּכֵדוּ
  chosen: and captured
  alternatives:
  - and they are taken
  - and they are caught
  lexicon: HALOT
  rationale: From לכד, 'to capture/seize.' 'Captured' best conveys the image of being overtaken or trapped by judgment. The conjunction is retained with simple coordination.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Indeed
  - See
  lexicon: HALOT
  rationale: This discourse marker draws attention to the explanation that follows. 'Look' is readable modern English without the archaism of 'Behold.'
- source_word: בִדְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  - the word of Yahweh
  lexicon: HALOT
  rationale: דבר here is best rendered 'word' in prophetic context, referring to YHWH's revealed instruction/message. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving the reverential convention and broad English Bible recognizability.
- source_word: מָאָסוּ
  chosen: have rejected
  alternatives:
  - have despised
  - have refused
  lexicon: HALOT
  rationale: מאס denotes repudiation or rejection, not merely emotional dislike. 'Have rejected' clearly expresses their culpable refusal of YHWH's word.
- source_word: וְחָכְמַת מֶה לָהֶם
  chosen: so what wisdom do they have?
  alternatives:
  - and what kind of wisdom is theirs?
  - and wisdom—what is it to them?
  - what wisdom is there in them?
  lexicon: HALOT
  rationale: The Hebrew is a rhetorical question denying that they possess true wisdom after rejecting YHWH's word. 'So what wisdom do they have?' is natural English and preserves the force of the rebuke. The conjunction is rendered inferentially ('so') to reflect the logic of the sentence in context.
