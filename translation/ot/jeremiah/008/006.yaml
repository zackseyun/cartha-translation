theological_decisions:
- issue: Rendering of אישׁ in a representative singular statement
  chosen_reading: No man
  alternative_readings:
  - No one
  - No person
  rationale: The Hebrew uses masculine singular אישׁ with generic representative force.
    Following the stated gender-accurate policy, the translation preserves 'man' rather
    than neutralizing it, while the sense remains inclusive of the people generally.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over
    gender-neutral)
