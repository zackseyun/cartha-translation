id: JER.8.6
reference: Jeremiah 8:6
source:
  edition: WLC
  text: הִקְשַׁ֤בְתִּי וָֽ/אֶשְׁמָע֙ לוֹא כֵ֣ן יְדַבֵּ֔רוּ אֵ֣ין אִ֗ישׁ נִחָם֙ עַל
    רָ֣עָת֔/וֹ לֵ/אמֹ֖ר מֶ֣ה עָשִׂ֑יתִי כֻּלֹּ֗/ה שָׁ֚ב ב/מרצות/ם כְּ/ס֥וּס שׁוֹטֵ֖ף
    בַּ/מִּלְחָמָֽה־־׃
translation:
  text: 'I have paid attention and listened: they do not speak rightly. No man repents
    of his evil, saying, ‘What have I done?’ Every one turns in his own course, like
    a horse rushing into battle.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they do not speak what is right.' Literally, 'not thus they speak.'
    reason: lexical_alternative
  - marker: b
    text: '''No man'' renders Hebrew אישׁ, a masculine singular form used here representatively.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'Every one turns to his own running/course.' The Hebrew expression pictures
      headlong persistence in one's chosen path.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקְשַׁבְתִּי
  chosen: I have paid attention
  alternatives:
  - I have listened closely
  - I have given heed
  lexicon: HALOT
  rationale: קשׁב conveys attentive listening or paying close heed, stronger than
    merely hearing. 'I have paid attention' preserves the deliberate attentiveness
    of the speaker.
- source_word: וָאֶשְׁמָע
  chosen: and listened
  alternatives:
  - and heard
  lexicon: HALOT
  rationale: שׁמע can mean 'hear' or 'listen.' In sequence with הִקְשַׁבְתִּי, 'and
    listened' keeps the parallel emphasis on careful observation rather than simple
    auditory reception.
- source_word: לוֹא כֵן יְדַבֵּרוּ
  chosen: they do not speak rightly
  alternatives:
  - they do not speak so
  - they do not speak what is right
  lexicon: HALOT
  rationale: The phrase literally means 'not thus they speak.' In context it evaluates
    the content of the people's speech as improper or false. 'They do not speak rightly'
    is idiomatic English that preserves the moral assessment.
- source_word: אֵין אִישׁ
  chosen: No man
  alternatives:
  - No one
  - There is not a man
  lexicon: HALOT
  rationale: The Hebrew is singular masculine אישׁ. Per gender-accurate policy, 'No
    man' preserves the source form and representative force better than the more neutral
    'no one.'
- source_word: נִחָם
  chosen: repents
  alternatives:
  - is sorry
  - relents
  lexicon: HALOT
  rationale: In this context נחם refers to regret leading to a change of mind about
    wrongdoing. 'Repents' best captures the moral and volitional sense.
- source_word: עַל רָעָתוֹ
  chosen: of his evil
  alternatives:
  - of his wickedness
  - for his evil
  lexicon: HALOT
  rationale: רעה here denotes moral evil or wrongdoing, not merely misfortune. 'Of
    his evil' is concise and preserves the ethical force; English idiom allows 'repent
    of' in this construction.
- source_word: לֵאמֹר מֶה עָשִׂיתִי
  chosen: saying, ‘What have I done?’
  alternatives:
  - saying, ‘What have I done wrong?’
  lexicon: HALOT
  rationale: The Hebrew is straightforward self-indictment. The shorter rendering
    avoids adding 'wrong,' which is implied by context but not explicit.
- source_word: כֻּלֹּה
  chosen: Every one
  alternatives:
  - All of them
  - Each one
  lexicon: HALOT
  rationale: 'The distributive sense is prominent: each individual is implicated.
    ''Every one'' communicates that force better than a merely collective ''all of
    them.'''
- source_word: שָׁב
  chosen: turns
  alternatives:
  - returns
  - turns back
  lexicon: HALOT
  rationale: שׁוב often means 'turn/return.' Here the sense is not repentance but
    turning back into one's own chosen path, so 'turns' avoids suggesting positive
    conversion.
- source_word: במרצותם
  chosen: in his own course
  alternatives:
  - to his own running
  - in their own course
  - in his own race
  lexicon: HALOT
  rationale: The noun מרוצה denotes a running or course. Because the verse uses distributive
    singular framing ('No man... Every one'), 'in his own course' gives idiomatic
    English while reflecting the suffix. It conveys headlong persistence in one's
    path.
- source_word: כְּסוּס שׁוֹטֵף בַּמִּלְחָמָה
  chosen: like a horse rushing into battle
  alternatives:
  - like a horse charging into battle
  - like a horse storming into the battle
  lexicon: HALOT
  rationale: שוטף conveys rushing, overflowing, or charging violently. 'Rushing into
    battle' is vivid, natural English and preserves the simile of reckless momentum.
