id: JER.8.2
reference: Jeremiah 8:2
source:
  edition: WLC
  text: וּ/שְׁטָחוּ/ם֩ לַ/שֶּׁ֨מֶשׁ וְ/לַ/יָּרֵ֜חַ וּ/לְ/כֹ֣ל צְבָ֣א הַ/שָּׁמַ֗יִם
    אֲשֶׁ֨ר אֲהֵב֜וּ/ם וַ/אֲשֶׁ֤ר עֲבָדוּ/ם֙ וַֽ/אֲשֶׁר֙ הָלְכ֣וּ אַֽחֲרֵי/הֶ֔ם וַ/אֲשֶׁ֣ר
    דְּרָשׁ֔וּ/ם וַ/אֲשֶׁ֥ר הִֽשְׁתַּחֲו֖וּ לָ/הֶ֑ם לֹ֤א יֵאָֽסְפוּ֙ וְ/לֹ֣א יִקָּבֵ֔רוּ
    לְ/דֹ֛מֶן עַל פְּנֵ֥י הָ/אֲדָמָ֖ה יִֽהְיֽוּ׀־׃
translation:
  text: And they will spread them out before the sun and the moon and all the host
    of the heavens, which they loved and which they served and after which they walked
    and which they sought and to which they bowed down. They will not be gathered,
    and they will not be buried; they will become dung on the surface of the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the host of heaven.'
    reason: lexical_alternative
  - marker: b
    text: '''Which they sought'' may also be rendered ''which they consulted'' or
      ''of which they inquired,'' highlighting religious inquiry directed toward the
      heavenly bodies.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'on the face of the ground.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּשְׁטָחוּם
  chosen: they will spread them out
  alternatives:
  - they will lay them out
  - they will scatter them
  lexicon: HALOT
  rationale: שׁטח in this context refers to exposing the bones/corpses by spreading
    them out before heavenly bodies. 'Spread them out' is a natural English rendering
    that preserves the concrete image without overinterpreting as mere scattering.
- source_word: לַשֶּׁמֶשׁ
  chosen: before the sun
  alternatives:
  - to the sun
  lexicon: HALOT
  rationale: The lamed here is best rendered idiomatically with 'before' in English
    because the sense is exposure in front of the heavenly bodies, not motion toward
    them.
- source_word: וְלַיָּרֵחַ
  chosen: and the moon
  lexicon: HALOT
  rationale: Straightforward coordination with the previous object.
- source_word: וּלְכֹל צְבָא הַשָּׁמַיִם
  chosen: and all the host of the heavens
  alternatives:
  - and all the host of heaven
  - and all the army of the heavens
  lexicon: HALOT
  rationale: צָבָא commonly denotes a host/army. 'Host of the heavens' preserves the
    celestial-worship context and reflects the Hebrew plural שׁמים more closely than
    the traditional singular 'heaven,' while remaining readable.
- source_word: אֲשֶׁר אֲהֵבוּם
  chosen: which they loved
  alternatives:
  - whom they loved
  lexicon: HALOT
  rationale: Refers back to the heavenly bodies/host as objects of devotion. 'Which'
    fits English usage for celestial objects.
- source_word: וַאֲשֶׁר עֲבָדוּם
  chosen: which they served
  alternatives:
  - which they worshiped
  lexicon: HALOT
  rationale: עבד can mean serve or worship in cultic contexts. 'Served' preserves
    the lexical distinction from the later explicit bowing/worship verb and keeps
    the sequence of actions visible.
- source_word: וַאֲשֶׁר הָלְכוּ אַחֲרֵיהֶם
  chosen: after which they walked
  alternatives:
  - which they followed
  - after them they went
  lexicon: HALOT
  rationale: The Hebrew idiom 'walk after' often means follow in allegiance. Here
    'after which they walked' keeps the metaphor and the repetitive structure of the
    verse.
- source_word: וַאֲשֶׁר דְּרָשׁוּם
  chosen: which they sought
  alternatives:
  - which they consulted
  - which they inquired of
  lexicon: HALOT
  rationale: דרשׁ in religious contexts can mean seek or inquire of. 'Sought' is broad,
    readable, and preserves the devotional sense without narrowing it only to divination.
- source_word: וַאֲשֶׁר הִשְׁתַּחֲווּ לָהֶם
  chosen: to which they bowed down
  alternatives:
  - which they worshiped
  - before which they prostrated themselves
  lexicon: HALOT
  rationale: השתחוה denotes bowing/prostration in worship. 'Bowed down' preserves
    the physical act and avoids collapsing it into the broader 'worshiped,' since
    the verse already used 'served' earlier.
- source_word: לֹא יֵאָסְפוּ
  chosen: They will not be gathered
  alternatives:
  - they will not be collected
  lexicon: HALOT
  rationale: אָסף in burial contexts refers to gathering remains. The passive 'be
    gathered' preserves the solemnity and likely alludes to funerary treatment.
- source_word: וְלֹא יִקָּבֵרוּ
  chosen: and they will not be buried
  lexicon: HALOT
  rationale: Direct and standard rendering of the burial verb.
- source_word: לְדֹמֶן
  chosen: dung
  alternatives:
  - manure
  - refuse
  lexicon: HALOT
  rationale: דֹּמֶן denotes dung/manure. 'Dung' is blunt and fitting for the prophetic
    disgrace motif; 'refuse' would weaken the image.
- source_word: עַל־פְּנֵי הָאֲדָמָה
  chosen: on the surface of the ground
  alternatives:
  - on the face of the earth
  - upon the ground
  lexicon: HALOT
  rationale: The idiom literally means 'on the face of the ground.' 'On the surface
    of the ground' preserves the exposed, unburied sense more clearly in modern English
    than the more idiomatic but broader 'earth.'
- source_word: יִהְיוּ
  chosen: they will become
  alternatives:
  - they will be
  lexicon: HALOT
  rationale: Although היה is simply 'be,' English idiom after לְדֹמֶן is better expressed
    as 'become dung,' conveying resultant condition.
