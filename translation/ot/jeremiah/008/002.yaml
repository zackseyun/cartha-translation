theological_decisions:
- issue: Rendering the repeated idol-devotion verbs distinctly
  chosen_reading: Preserve the sequence as loved / served / walked after / sought
    / bowed down
  alternative_readings:
  - Compress into fewer English worship terms
  rationale: The Hebrew piles up distinct verbs to emphasize the people's comprehensive
    devotion to celestial bodies. Preserving the distinctions avoids interpretive
    flattening and keeps the prophetic indictment's force.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering צְבָא הַשָּׁמַיִם
  chosen_reading: all the host of the heavens
  alternative_readings:
  - all the host of heaven
  rationale: This keeps the celestial-worship reference explicit while reflecting
    the Hebrew form. No doctrinal issue is resolved beyond lexical fidelity.
  doctrine_reference: Translation philosophy §§1, 6
