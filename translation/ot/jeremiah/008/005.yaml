id: JER.8.5
reference: Jeremiah 8:5
source:
  edition: WLC
  text: מַדּ֨וּעַ שׁוֹבְבָ֜ה הָ/עָ֥ם הַ/זֶּ֛ה יְרוּשָׁלִַ֖ם מְשֻׁבָ֣ה נִצַּ֑חַת הֶחֱזִ֨יקוּ֙
    בַּ/תַּרְמִ֔ית מֵאֲנ֖וּ לָ/שֽׁוּב׃
translation:
  text: Why has this people turned away—Jerusalem—with a perpetual turning away? They
    hold fast to deceit; they refuse to return.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with an everlasting backsliding' or 'in perpetual apostasy.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew repeats forms of the verb 'turn/return' throughout the verse, contrasting
      the people's turning away with their refusal to return.
    reason: lexical_alternative
  - marker: c
    text: '''Jerusalem'' may also be taken as a vocative: ''Why has this people turned
      away, O Jerusalem...?'''
    reason: alternative_reading
lexical_decisions:
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Interrogative adverb introducing a rhetorical question; 'Why' is the
    natural modern English equivalent.
- source_word: שׁוֹבְבָה
  chosen: has turned away
  alternatives:
  - turns back
  - is apostate
  - has backslidden
  lexicon: HALOT
  rationale: From שוב in a stative/resultative sense here, describing defection rather
    than repentance. 'Has turned away' communicates the negative movement clearly
    in contemporary English without relying on the churchy term 'backslidden'.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this people here
  - this nation
  lexicon: HALOT
  rationale: עם commonly means 'people.' 'This people' preserves the prophetic tone
    better than the more political 'this nation.'
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention. Here it stands
    in apposition to 'this people,' identifying the people as Jerusalem.
- source_word: מְשֻׁבָה
  chosen: turning away
  alternatives:
  - apostasy
  - backsliding
  lexicon: HALOT
  rationale: Noun denoting defection/turning away. 'Turning away' preserves the wordplay
    with שוב in the verse. 'Apostasy' is possible but sounds more technical and may
    over-specify.
- source_word: נִצַּחַת
  chosen: perpetual
  alternatives:
  - enduring
  - unceasing
  - permanent
  lexicon: HALOT
  rationale: Conveys continuance or persistence. 'Perpetual' fits the prophetic accusation
    of ongoing, entrenched rebellion.
- source_word: הֶחֱזִיקוּ
  chosen: They hold fast
  alternatives:
  - They cling
  - They seize and keep
  lexicon: HALOT
  rationale: Hiphil of חזק here means to grasp firmly or cling to. 'Hold fast' is
    idiomatic and preserves the force of deliberate persistence.
- source_word: בַּתַּרְמִית
  chosen: to deceit
  alternatives:
  - to deception
  - to falsehood
  lexicon: HALOT
  rationale: תרמית denotes deceit or treachery. 'Deceit' is concise and natural; with
    'hold fast' it forms a strong collocation in English.
- source_word: מֵאֲנוּ
  chosen: they refuse
  alternatives:
  - they are unwilling
  - they reject
  lexicon: HALOT
  rationale: מאן expresses refusal or unwillingness. 'Refuse' best captures volitional
    resistance.
- source_word: לָשׁוּב
  chosen: to return
  alternatives:
  - to turn back
  - to repent
  lexicon: HALOT
  rationale: The base sense of שוב is 'return/turn back.' 'To return' preserves the
    lexical link with earlier forms of שוב in the verse and avoids importing the fuller
    theological sense 'repent' unless context demands it.
