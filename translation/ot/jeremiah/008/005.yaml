theological_decisions:
- issue: Rendering the repeated שוב / מְשׁוּבָה wordplay
  chosen_reading: Use 'turned away' / 'turning away' / 'return' to preserve the rhetorical
    contrast between defection and the call to come back.
  alternative_readings:
  - Use 'backsliding' language throughout
  - Use 'apostasy' and 'repent'
  rationale: The verse hinges on a wordplay built from שוב. Preserving that lexical
    network is more important than adopting traditional but less transparent renderings
    like 'backsliding.' 'Repent' is a possible contextual gloss for the final infinitive,
    but 'return' better maintains the Hebrew repetition and leaves the theological
    implication implicit rather than expanded.
  doctrine_reference: Translation philosophy items 1, 3, and 5
- issue: Syntactic force of 'Jerusalem'
  chosen_reading: Treat 'Jerusalem' appositionally to 'this people' and mark it with
    dashes.
  alternative_readings:
  - 'Translate as vocative: ''Why has this people turned away, O Jerusalem?'''
  rationale: The Hebrew most naturally identifies the people with Jerusalem rather
    than directly addressing Jerusalem. The appositional punctuation helps English
    readers follow the syntax without adding words not in the source.
  doctrine_reference: Translation philosophy item 1
