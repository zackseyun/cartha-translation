id: JER.8.20
reference: Jeremiah 8:20
source:
  edition: WLC
  text: עָבַ֥ר קָצִ֖יר כָּ֣לָה קָ֑יִץ וַ/אֲנַ֖חְנוּ ל֥וֹא נוֹשָֽׁעְנוּ׃
translation:
  text: The harvest has passed, the summer has ended, and we have not been saved.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''delivered'': the Hebrew verb can denote rescue from danger or calamity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָבַר
  chosen: has passed
  alternatives:
  - passed
  - is past
  lexicon: HALOT
  rationale: Qal perfect 3ms of עבר here marks a completed event. 'Has passed' gives
    natural modern English while preserving the sense of something now gone by. 'Is
    past' is traditional but more archaic.
- source_word: קָצִיר
  chosen: the harvest
  alternatives:
  - harvest time
  lexicon: HALOT
  rationale: The noun denotes harvest. Adding the English article yields idiomatic
    English for a known seasonal period in this lament context.
- source_word: כָּלָה
  chosen: has ended
  alternatives:
  - is finished
  - has come to an end
  lexicon: HALOT
  rationale: Qal perfect 3ms of כלה conveys completion. 'Has ended' is concise, natural,
    and parallel to 'has passed' in the first colon.
- source_word: קַיִץ
  chosen: the summer
  alternatives:
  - summer
  - fruit season
  lexicon: HALOT
  rationale: In this poetic parallelism with 'harvest,' the ordinary seasonal sense
    'summer' best fits. While the term can be associated with summer fruit, that nuance
    is not required here.
- source_word: וַאֲנַחְנוּ
  chosen: and we
  alternatives:
  - but we
  lexicon: HALOT
  rationale: 'The conjunction waw most basically coordinates: ''and we.'' In English
    the line carries an adversative force from context, but ''and'' preserves the
    Hebrew more directly while still reading naturally.'
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Straightforward negation.
- source_word: נוֹשָׁעְנוּ
  chosen: have not been saved
  alternatives:
  - have not been delivered
  - were not saved
  lexicon: HALOT
  rationale: Niphal perfect 1cp of ישׁע expresses being saved/delivered. 'Have not
    been saved' preserves the passive/resultative force and keeps the broader semantic
    range open, including rescue from calamity. 'Delivered' is possible, but 'saved'
    is the more direct and biblically resonant rendering without importing later doctrinal
    specificity.
