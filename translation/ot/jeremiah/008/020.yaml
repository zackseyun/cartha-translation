theological_decisions:
- issue: Rendering of ישׁע in a national-lament context
  chosen_reading: saved
  alternative_readings:
  - delivered
  rationale: The verse laments the absence of rescue after expected seasons have passed.
    'Saved' is the direct lexical rendering and preserves the canonical resonance
    of divine rescue, while context prevents narrowing it to specifically eternal
    salvation. 'Delivered' is viable but less textually direct.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English'
