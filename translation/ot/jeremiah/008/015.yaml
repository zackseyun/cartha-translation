id: JER.8.15
reference: Jeremiah 8:15
source:
  edition: WLC
  text: קַוֵּ֥ה לְ/שָׁל֖וֹם וְ/אֵ֣ין ט֑וֹב לְ/עֵ֥ת מַרְפֵּ֖ה וְ/הִנֵּ֥ה בְעָתָֽה׃
translation:
  text: We hoped for peace, but there was no good; for a time of healing, but behold,
    terror.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'We waited/expected peace ... a time of healing.' The opening verb can
      be rendered with the nuance of hoping, waiting, or expecting.
    reason: lexical_alternative
  - marker: b
    text: '''Peace'' (shalom) can also carry the sense of well-being or wholeness,
      not merely the absence of conflict.'
    reason: lexical_alternative
  - marker: c
    text: Or 'dismay' or 'fright' for the final term.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַוֵּה
  chosen: We hoped
  alternatives:
  - Hope!
  - One hoped
  - We waited/expected
  lexicon: HALOT
  rationale: Although the form is morphologically ambiguous in isolation, the verse
    clearly functions as a first-person plural lament in context and in standard translation
    tradition of this clause pair. Rendering as past tense 'We hoped' fits the parallel
    lament structure with the following negatives.
- source_word: לְשָׁלוֹם
  chosen: for peace
  alternatives:
  - for well-being
  - for wholeness
  lexicon: HALOT
  rationale: שָׁלוֹם commonly denotes peace, welfare, or wholeness. 'Peace' is the
    most natural English rendering here and preserves the prophetic contrast with
    the calamity that follows.
- source_word: וְאֵין טוֹב
  chosen: but there was no good
  alternatives:
  - and there was no good
  - but no good came
  - but nothing good came
  lexicon: HALOT
  rationale: The Hebrew is literally 'and there is no good.' In English lament style,
    'but there was no good' best conveys the adversative force and matches the past-oriented
    expectation of the verse without over-paraphrasing.
- source_word: לְעֵת מַרְפֵּה
  chosen: for a time of healing
  alternatives:
  - for a time of cure
  - for a time of recovery
  - for healing
  lexicon: HALOT
  rationale: מַרְפֵּה denotes healing, remedy, or restoration. 'A time of healing'
    preserves the temporal phrase introduced by לְעֵת and keeps the metaphor broad
    enough for both physical and national restoration.
- source_word: וְהִנֵּה
  chosen: but behold
  alternatives:
  - and behold
  - yet behold
  - but look
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle marking sudden presentation. 'Behold' preserves
    the rhetorical shock; adding 'but' reflects the adversative movement already present
    in the verse's parallelism.
- source_word: בְעָתָה
  chosen: terror
  alternatives:
  - dismay
  - fright
  - panic
  lexicon: HALOT
  rationale: The noun denotes terror or sudden fright. 'Terror' is concise and weighty,
    fitting the abrupt reversal from hoped-for healing to experienced dread.
