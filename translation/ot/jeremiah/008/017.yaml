id: JER.8.17
reference: Jeremiah 8:17
source:
  edition: WLC
  text: כִּי֩ הִנְ/נִ֨י מְשַׁלֵּ֜חַ בָּ/כֶ֗ם נְחָשִׁים֙ צִפְעֹנִ֔ים אֲשֶׁ֥ר אֵין לָ/הֶ֖ם
    לָ֑חַשׁ וְ/נִשְּׁכ֥וּ אֶתְ/כֶ֖ם נְאֻם יְהוָֽה־־׃ס
translation:
  text: For look, I am sending among you snakes, vipers that cannot be charmed, and
    they will bite you, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'adders' for 'vipers.' The Hebrew term refers to a venomous snake.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for which there is no charm' or 'no incantation'; the sense
      is that these snakes cannot be charmed.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding context; 'For'
    best preserves the connective force in natural English.
- source_word: הִנְנִי
  chosen: look, I am
  alternatives:
  - behold, I am
  - here I am
  lexicon: HALOT
  rationale: The particle-plus-pronoun construction is deictic and emphatic. 'Look,
    I am' preserves the immediacy without archaic 'behold.'
- source_word: מְשַׁלֵּחַ
  chosen: sending
  alternatives:
  - about to send
  - dispatching
  lexicon: HALOT
  rationale: The participle with הִנְנִי conveys imminent or certain action. 'Sending'
    works smoothly with 'I am' and preserves the ongoing/imminent force.
- source_word: בָּכֶם
  chosen: among you
  alternatives:
  - against you
  - into your midst
  lexicon: HALOT
  rationale: The preposition ב can be rendered several ways here. 'Among you' best
    fits the image of snakes released into the people's midst, while still implying
    judgment.
- source_word: נְחָשִׁים
  chosen: snakes
  alternatives:
  - serpents
  lexicon: HALOT
  rationale: '''Snakes'' is the plain modern English equivalent; ''serpents'' is more
    traditional but less natural for contemporary readers.'
- source_word: צִפְעֹנִים
  chosen: vipers
  alternatives:
  - adders
  - poisonous snakes
  lexicon: HALOT
  rationale: The term denotes a venomous snake. 'Vipers' is a clear, idiomatic rendering
    in modern English and preserves the heightened danger beyond the general 'snakes.'
- source_word: אֲשֶׁר אֵין לָהֶם לָחַשׁ
  chosen: that cannot be charmed
  alternatives:
  - for which there is no charm
  - that have no charm-spell
  - which are beyond charming
  lexicon: HALOT
  rationale: לָחַשׁ refers to whispering/incantation used in snake charming. The clause
    means these snakes are not controllable by such means. 'That cannot be charmed'
    is concise and clear.
- source_word: וְנִשְּׁכוּ אֶתְכֶם
  chosen: and they will bite you
  alternatives:
  - and they shall strike you
  lexicon: HALOT
  rationale: The verb specifically denotes biting. 'Bite' is more precise than the
    broader 'strike.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is well represented by 'declares the LORD,' which
    is idiomatic and weighty. Per doctrine, יְהוָה is rendered 'the LORD'.
