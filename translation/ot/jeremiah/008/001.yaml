id: JER.8.1
reference: Jeremiah 8:1
source:
  edition: WLC
  text: בָּ/עֵ֣ת הַ/הִ֣יא נְאֻם יְהוָ֡ה ו/יציאו אֶת עַצְמ֣וֹת מַלְכֵֽי יְהוּדָ֣ה וְ/אֶת
    עַצְמוֹת שָׂרָי/ו֩ וְ/אֶת עַצְמ֨וֹת הַ/כֹּהֲנִ֜ים וְ/אֵ֣ת עַצְמ֣וֹת הַ/נְּבִיאִ֗ים
    וְ/אֵ֛ת עַצְמ֥וֹת יוֹשְׁבֵֽי יְרוּשָׁלִָ֖ם מִ/קִּבְרֵי/הֶֽם־־־־־־׀־׃
translation:
  text: At that time, declares the LORD, they will bring out the bones of the kings
    of Judah, the bones of its officials, the bones of the priests, the bones of the
    prophets, and the bones of the inhabitants of Jerusalem from their graves.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  chosen: At that time
  alternatives:
  - In that time
  - At that season
  lexicon: HALOT
  rationale: Standard temporal expression introducing a future event. 'At that time'
    is idiomatic modern English and preserves the deictic force of the Hebrew.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A common prophetic formula. 'Declares the LORD' is natural English and
    preserves the formal prophetic register. YHWH is rendered 'the LORD' per doctrine
    guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: וְיֹצִיאוּ
  chosen: they will bring out
  alternatives:
  - they will take out
  - they will remove
  lexicon: HALOT
  rationale: 'Hiphil of יצא here is causative: causing the bones to come out from
    graves. ''Bring out'' is clear, idiomatic, and fits the desecration context better
    than the flatter ''take out.'' The unspecified plural subject is retained as ''they.'''
- source_word: עַצְמוֹת
  chosen: bones
  alternatives:
  - remains
  lexicon: HALOT
  rationale: The literal term is 'bones.' Although 'remains' could smooth the English,
    the Hebrew is concrete and repeated for rhetorical effect, so the translation
    preserves that repetition.
- source_word: מַלְכֵי יְהוּדָה
  chosen: the kings of Judah
  lexicon: HALOT
  rationale: Straightforward construct chain; retained formally.
- source_word: שָׂרָיו
  chosen: its officials
  alternatives:
  - its princes
  - its leaders
  lexicon: HALOT
  rationale: שׂרים can mean princes, officials, or rulers. In this context of civic
    leadership within Judah, 'officials' is the clearest modern rendering. The suffix
    refers back to Judah, hence 'its.'
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of the cultic office.
- source_word: הַנְּבִיאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Standard rendering; no contextual reason to vary.
- source_word: יוֹשְׁבֵי יְרוּשָׁלִָם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - those who dwell in Jerusalem
  - the residents of Jerusalem
  lexicon: HALOT
  rationale: Participle of ישב used substantivally for residents. 'Inhabitants' is
    concise and natural while preserving the collective sense.
- source_word: מִקִּבְרֵיהֶם
  chosen: from their graves
  alternatives:
  - out of their tombs
  - from their burial places
  lexicon: HALOT
  rationale: קבר commonly denotes grave or tomb. 'Graves' is the most general and
    accessible choice. The plural suffix 'their' refers to the previously listed dead
    groups.
