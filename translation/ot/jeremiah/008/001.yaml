theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in a prophetic formula. Per the
    doctrine excerpt's contested terms table, the default rendering is 'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Preservation of rhetorical repetition of 'bones'
  chosen_reading: Repeat 'the bones of' for each group
  alternative_readings:
  - Compress the list by stating 'the bones of' once and then listing groups
  rationale: The Hebrew repeats עַצְמוֹת before each category, heightening the horror
    and totality of the coming desecration. Preserving the repetition reflects the
    source text's rhetoric without becoming unnatural in English.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    consistency of key terms'
