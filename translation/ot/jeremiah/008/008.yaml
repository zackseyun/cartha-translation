theological_decisions:
- issue: Rendering תּוֹרַת יְהוָה in a prophetic polemic
  chosen_reading: the law of the LORD
  alternative_readings:
  - the instruction of the LORD
  rationale: The verse critiques those claiming possession of YHWH's torah while corrupting
    it. 'Law' best preserves the covenantal and textual force in this context, though
    'instruction' remains a valid lexical alternative.
  doctrine_reference: 'Translation philosophy §1, §5; Contested terms: יְהוָה → the
    LORD'
