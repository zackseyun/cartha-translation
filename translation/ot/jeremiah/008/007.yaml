id: JER.8.7
reference: Jeremiah 8:7
source:
  edition: WLC
  text: גַּם חֲסִידָ֣ה בַ/שָּׁמַ֗יִם יָֽדְעָה֙ מֽוֹעֲדֶ֔י/הָ וְ/תֹ֤ר ו/סוס וְ/עָג֔וּר שָׁמְר֖וּ אֶת עֵ֣ת בֹּאָ֑/נָה וְ/עַמִּ֕/י לֹ֣א יָֽדְע֔וּ אֵ֖ת מִשְׁפַּ֥ט יְהוָֽה־־׃
translation:
  text: Even the stork in the heavens knows her appointed times, and the turtledove, the swallow, and the crane keep the time of their coming; but my people do not know the judgment of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'swallow' for 'swift' (Hebrew סוס); the exact bird identification is uncertain.
    reason: lexical_alternative
  - marker: b
    text: '''The judgment of the LORD'' may also be rendered ''the ordinance of the LORD'' or ''the justice of the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲסִידָה
  chosen: stork
  alternatives:
  - faithful one
  - heron
  lexicon: HALOT
  rationale: In context this is clearly a migratory bird; 'stork' is the standard zoological sense in Jeremiah 8:7 and fits the parallel with other birds that know seasonal patterns.
- source_word: בַשָּׁמַיִם
  chosen: in the heavens
  alternatives:
  - in the sky
  lexicon: HALOT
  rationale: Literally 'in the heavens/sky.' 'In the heavens' preserves the Hebrew form while remaining natural enough in English; the phrase here denotes the aerial realm where birds migrate, not a theological heaven.
- source_word: יָדְעָה מוֹעֲדֶיהָ
  chosen: knows her appointed times
  alternatives:
  - knows her seasons
  - knows her fixed times
  lexicon: HALOT
  rationale: מוֹעֵד commonly denotes an appointed time or set season. 'Appointed times' preserves the sense of fixed, ordered seasons rather than mere general awareness.
- source_word: תֹר
  chosen: turtledove
  alternatives:
  - dove
  lexicon: HALOT
  rationale: The specific bird is the turtledove, a known migratory species in the region; the more specific rendering is preferable to the generic 'dove.'
- source_word: סוס
  chosen: swift
  alternatives:
  - swallow
  lexicon: HALOT
  rationale: The bird name is uncertain in exact species identification. 'Swift' is a well-attested option in modern lexicons and avoids overclaiming certainty; the traditional 'swallow' is preserved in a footnote.
- source_word: עָגוּר
  chosen: crane
  alternatives:
  - thrush
  - swallow
  lexicon: HALOT
  rationale: The term likely denotes a crane or similar migratory bird. 'Crane' is a common modern rendering and suits the migration imagery; uncertainty is acknowledged by preserving alternatives in documentation.
- source_word: שָׁמְרוּ אֶת עֵת בֹּאָנָה
  chosen: keep the time of their coming
  alternatives:
  - observe the time of their migration
  - keep the season of their arrival
  lexicon: HALOT
  rationale: שׁמר here means to observe/keep, and עֵת בֹּאָנָה refers to the time of their coming. The chosen wording is fairly literal while still idiomatic.
- source_word: וְעַמִּי
  chosen: but my people
  alternatives:
  - and my people
  lexicon: HALOT
  rationale: The conjunction is formally 'and,' but the clause is adversative in sense, contrasting birds with Israel. 'But' communicates the discourse force in natural English.
- source_word: מִשְׁפַּט יְהוָה
  chosen: the judgment of the LORD
  alternatives:
  - the ordinance of the LORD
  - the justice of the LORD
  - the rule of the LORD
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, ordinance, or legal requirement. Here the sense is what the LORD requires/ordains in covenantal judgment. 'Judgment' best preserves the prophetic force and the people's failure to recognize the LORD's governing verdict and standard.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
