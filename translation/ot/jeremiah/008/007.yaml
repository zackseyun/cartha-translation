theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the tetragrammaton is 'the LORD.' This is a translation-policy
    decision rather than a contextual theological claim in this verse.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of מִשְׁפַּט יְהוָה
  chosen_reading: the judgment of the LORD
  alternative_readings:
  - the ordinance of the LORD
  - the justice of the LORD
  rationale: The verse contrasts instinctive obedience in migratory birds with Israel's
    failure to recognize the LORD's normative and judicial order. 'Judgment' preserves
    the prophetic edge without narrowing the phrase to merely legal statute.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms,
    documented exception)
