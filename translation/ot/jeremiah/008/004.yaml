id: JER.8.4
reference: Jeremiah 8:4
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֗ם כֹּ֚ה אָמַ֣ר יְהוָ֔ה הֲ/יִפְּל֖וּ וְ/לֹ֣א יָק֑וּמוּ אִם יָשׁ֖וּב וְ/לֹ֥א יָשֽׁוּב־׃
translation:
  text: 'You shall say to them, ‘Thus says Yahweh: Do people fall and not rise again? Does one turn away and not return?’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Does one turn back and not return?' The Hebrew repeats the same verb ('turn/return') for rhetorical effect.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  chosen: You shall say to them
  alternatives:
  - And you shall say to them
  - You must say to them
  lexicon: HALOT
  rationale: Direct prophetic commission to Jeremiah. English omits initial conjunction for natural style while preserving imperative/future force with 'shall say'.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - Thus said the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'the LORD' follows the project default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֲיִפְּלוּ
  chosen: Do people fall
  alternatives:
  - If they fall
  - Does one fall
  lexicon: HALOT
  rationale: Interrogative הֲ introduces a rhetorical question. Although the verb is 3mp, English commonly uses a generic plural 'people' to express the general truth being stated.
- source_word: וְלֹא יָקוּמוּ
  chosen: and not rise again
  alternatives:
  - and not get up
  - without rising
  lexicon: HALOT
  rationale: קוּם here refers to getting back up after a fall. 'Rise again' is idiomatic and fits the rhetorical parallel.
- source_word: אִם
  chosen: Does
  alternatives:
  - If
  - Or if
  lexicon: HALOT
  rationale: In this context אִם introduces a second rhetorical question parallel to the first, not a conditional clause in English. Rendering it as 'Does' communicates the interrogative force clearly.
- source_word: יָשׁוּב
  chosen: one turn away
  alternatives:
  - someone turns back
  - he turns aside
  lexicon: HALOT
  rationale: The first שוב in this pair is best taken as turning away/off course in light of the second שוב 'return.' English uses singular generic 'one' for the proverb-like statement.
- source_word: וְלֹא יָשׁוּב
  chosen: and not return
  alternatives:
  - and not turn back
  - without returning
  lexicon: HALOT
  rationale: The second שוב carries the sense of returning after having turned away. 'Return' preserves the lexical repetition while making the contrast clear in English.
