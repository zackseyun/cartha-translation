id: JER.8.16
reference: Jeremiah 8:16
source:
  edition: WLC
  text: מִ/דָּ֤ן נִשְׁמַע֙ נַחְרַ֣ת סוּסָ֗י/ו מִ/קּוֹל֙ מִצְהֲל֣וֹת אַבִּירָ֔י/ו רָעֲשָׁ֖ה
    כָּל הָ/אָ֑רֶץ וַ/יָּב֗וֹאוּ וַ/יֹּֽאכְלוּ֙ אֶ֣רֶץ וּ/מְלוֹאָ֔/הּ עִ֖יר וְ/יֹ֥שְׁבֵי
    בָֽ/הּ־׃ס
translation:
  text: From Dan is heard the snorting of his horses; at the sound of the neighing
    of his stallions the whole land quakes. They come and devour the land and its
    fullness, the city and those who dwell in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole earth trembles.' The Hebrew אֶרֶץ can mean either 'land' or
      'earth'; here 'land' fits the immediate context of invasion and devastation.
    reason: lexical_alternative
  - marker: b
    text: Or 'the land and everything in it.' Hebrew 'its fullness' refers to all
      that fills the land.
    reason: lexical_alternative
  - marker: c
    text: Or 'his mighty horses' for 'his stallions.' The Hebrew term can denote strength
      or nobility; in this context it refers to powerful war-horses.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדָּן
  chosen: From Dan
  alternatives:
  - From the region of Dan
  lexicon: HALOT
  rationale: 'Retains the place name as a transliterated proper noun. The preposition
    מִן marks source/origin: the invading force is first heard from the northern border
    region of Dan.'
- source_word: נִשְׁמַע
  chosen: is heard
  alternatives:
  - is heard of
  - is audible
  lexicon: HALOT
  rationale: Nifal of שׁמע here is best rendered as a passive sensory report, preserving
    the vivid immediacy of the Hebrew.
- source_word: נַחְרַת
  chosen: the snorting
  alternatives:
  - the snort
  - the snorting sound
  lexicon: HALOT
  rationale: Refers to the harsh breathing/snorting of horses. 'Snorting' is idiomatic
    and vivid in English and matches the singular collective sense in context.
- source_word: סוּסָיו
  chosen: his horses
  alternatives:
  - its horses
  lexicon: HALOT
  rationale: The 3ms suffix likely refers to the invader/enemy conceived as a singular
    collective leader or nation. English 'his' preserves the grammatical form without
    over-interpreting.
- source_word: מִקּוֹל
  chosen: at the sound of
  alternatives:
  - from the sound of
  - because of the sound of
  lexicon: HALOT
  rationale: The preposition with 'sound' introduces the cause or occasion of the
    trembling. 'At the sound of' is natural English and preserves the causal force.
- source_word: מִצְהֲלוֹת
  chosen: the neighing
  alternatives:
  - the whinnying
  lexicon: HALOT
  rationale: Denotes the loud neighing of horses. 'Neighing' is the standard literary
    English equivalent and fits the elevated prophetic style.
- source_word: אַבִּירָיו
  chosen: his stallions
  alternatives:
  - his mighty horses
  - his strong ones
  lexicon: HALOT
  rationale: Though the adjective/noun can mean 'mighty ones,' in equine context it
    refers to powerful horses, hence 'stallions' captures both strength and species-specific
    reference.
- source_word: רָעֲשָׁה כָּל הָאָרֶץ
  chosen: the whole land quakes
  alternatives:
  - the whole earth trembles
  - all the land shook
  lexicon: HALOT
  rationale: The verb conveys shaking/trembling. 'Land' is preferable to 'earth' here
    because the context is the devastation of Judah's territory, though the Hebrew
    can bear either more broadly.
- source_word: וַיָּבֹאוּ
  chosen: They come
  alternatives:
  - Then they came
  - And they came
  lexicon: HALOT
  rationale: The waw-consecutive advances the scene. Present tense in English preserves
    the prophetic vividness of the sequence better than a simple past.
- source_word: וַיֹּאכְלוּ
  chosen: and devour
  alternatives:
  - and consume
  - and eat up
  lexicon: HALOT
  rationale: Though literally 'eat,' in invasion contexts the verb is metaphorical
    for consuming/desolating. 'Devour' preserves the metaphor and the violence of
    the image.
- source_word: אֶרֶץ וּמְלוֹאָהּ
  chosen: the land and its fullness
  alternatives:
  - the land and all that fills it
  - the land and everything in it
  lexicon: HALOT
  rationale: מְלוֹא denotes that which fills the land. 'Its fullness' is slightly
    more formal but transparent and preserves the compactness of the Hebrew; a more
    idiomatic alternative is worth preserving in a footnote.
- source_word: עִיר וְיֹשְׁבֵי בָהּ
  chosen: the city and those who dwell in it
  alternatives:
  - the city and its inhabitants
  lexicon: HALOT
  rationale: This keeps the participial force of יֹשְׁבֵי while remaining natural
    English. 'Those who dwell in it' is slightly more formal and echoes prophetic
    diction.
