id: JER.8.3
reference: Jeremiah 8:3
source:
  edition: WLC
  text: וְ/נִבְחַ֥ר מָ֨וֶת֙ מֵֽ/חַיִּ֔ים לְ/כֹ֗ל הַ/שְּׁאֵרִית֙ הַ/נִּשְׁאָרִ֔ים מִן
    הַ/מִּשְׁפָּחָ֥ה הָֽ/רָעָ֖ה הַ/זֹּ֑את בְּ/כָל הַ/מְּקֹמ֤וֹת הַ/נִּשְׁאָרִים֙ אֲשֶׁ֣ר
    הִדַּחְתִּ֣י/ם שָׁ֔ם נְאֻ֖ם יְהוָ֥ה צְבָאֽוֹת־־׃ס
translation:
  text: And death will be chosen rather than life by all the remnant who remain from
    this evil family, in all the places where I have driven them—declares the LORD
    of hosts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'in all the remaining places where I have driven them
      there.' The wording emphasizes the scattered survivors in every place of exile.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִבְחַר
  chosen: will be chosen
  alternatives:
  - shall be chosen
  - is chosen
  lexicon: HALOT
  rationale: 'Niphal of בחר is best rendered as a passive/reflexive idea, here in
    a future sense within the judgment context: ''will be chosen.'' This preserves
    the Hebrew''s stark formulation without adding an explicit subject.'
- source_word: מָוֶת
  chosen: death
  lexicon: HALOT
  rationale: Direct and literal rendering; the contrast with 'life' is central to
    the verse's rhetoric.
- source_word: מֵחַיִּים
  chosen: rather than life
  alternatives:
  - instead of life
  - more than life
  lexicon: HALOT
  rationale: The preposition מִן after 'choose' marks preference/comparison. 'Rather
    than life' is idiomatic English and preserves the sense that death is preferred
    over continued living.
- source_word: לְכֹל הַשְּׁאֵרִית הַנִּשְׁאָרִים
  chosen: by all the remnant who remain
  alternatives:
  - for all the remnant who remain
  - by all the survivors who are left
  lexicon: HALOT
  rationale: The phrase identifies the surviving group. Rendering לְ with passive
    'chosen' as 'by' gives natural English agency ('chosen by all...'). 'Remnant'
    preserves the prophetic nuance of שְׁאֵרִית, while the participle הַנִּשְׁאָרִים
    is retained with 'who remain' to reflect the Hebrew repetition.
- source_word: מִן הַמִּשְׁפָּחָה הָרָעָה הַזֹּאת
  chosen: from this evil family
  alternatives:
  - from this evil clan
  - from this wicked family
  lexicon: HALOT
  rationale: מִשְׁפָּחָה commonly means family/clan. 'Family' is more natural in English,
    while 'evil' straightforwardly renders רָעָה. The phrase refers to the judged
    kin-group/people descended from the present generation.
- source_word: בְּכָל הַמְּקֹמוֹת
  chosen: in all the places
  alternatives:
  - throughout all the places
  - in every place
  lexicon: HALOT
  rationale: A straightforward locative phrase; plural 'places' matches the dispersion
    setting.
- source_word: הַנִּשְׁאָרִים
  chosen: where I have driven them
  alternatives:
  - that remain, where I have driven them
  lexicon: HALOT
  rationale: The second 'remaining' participle modifies 'places' in Hebrew, yielding
    literally 'the remaining places.' In English this is awkward and potentially misleading.
    The main force is that these are the various places left as destinations of exile;
    the translation smooths the construction while preserving the exile sense in the
    following relative clause. The repetition is documented here rather than forced
    woodenly into the main text.
- source_word: אֲשֶׁר הִדַּחְתִּים שָׁם
  chosen: where I have driven them
  alternatives:
  - where I drove them
  - to which I have banished them
  lexicon: HALOT
  rationale: נדח in Hiphil conveys driving away/scattering. 'Driven' preserves the
    force of divine judgment better than a softer term. Perfect is rendered 'have
    driven' to connect the present condition of exile with prior divine action.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of hosts
  alternatives:
  - oracle of the LORD of hosts
  - says the LORD of hosts
  lexicon: HALOT
  rationale: נְאֻם is a prophetic speech formula best rendered 'declares.' Per doctrine,
    יְהוָה is rendered 'the LORD.' 'Of hosts' preserves the traditional and semantically
    rich title צְבָאוֹת without reduction.
