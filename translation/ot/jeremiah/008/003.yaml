theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the LXX pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Retention of 'remnant' language
  chosen_reading: remnant
  alternative_readings:
  - survivors
  - those left
  rationale: Although 'survivors' is possible, 'remnant' preserves the prophetic-theological
    resonance of שְׁאֵרִית without importing additional interpretation. In this context
    the remnant is not a hopeful remnant but the surviving residue under judgment,
    and the translation preserves that tension.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 and #5'
