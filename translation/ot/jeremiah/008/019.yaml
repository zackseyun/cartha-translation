id: JER.8.19
reference: Jeremiah 8:19
source:
  edition: WLC
  text: הִנֵּה ק֞וֹל שַֽׁוְעַ֣ת בַּת עַמִּ֗/י מֵ/אֶ֨רֶץ֙ מַרְחַקִּ֔ים הַֽ/יהוָה֙ אֵ֣ין
    בְּ/צִיּ֔וֹן אִם מַלְכָּ֖/הּ אֵ֣ין בָּ֑/הּ מַדּ֗וּעַ הִכְעִס֛וּ/נִי בִּ/פְסִלֵי/הֶ֖ם
    בְּ/הַבְלֵ֥י נֵכָֽר־־־׃
translation:
  text: 'Look—the cry of the daughter of my people from a distant land: “Is the LORD
    not in Zion? Is her King not in her?” Why have they provoked me to anger with
    their carved images, with foreign idols?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “the sound of the cry of the daughter of my people.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “from a land of far distances,” that is, from very far away.
    reason: lexical_alternative
  - marker: c
    text: Or “with foreign vanities,” a Hebrew expression that mocks idols as empty
      and worthless.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - Listen
  lexicon: HALOT
  rationale: Deictic/interjection introducing an urgent perception. 'Look' is natural
    modern English and preserves the suddenness better than archaic 'Behold.'
- source_word: קוֹל שַׁוְעַת
  chosen: the cry
  alternatives:
  - the sound of the cry
  - the voice of the outcry
  lexicon: HALOT
  rationale: The construct chain is literally 'sound/voice of the cry.' In English,
    'the cry' best captures the idiom without unnecessary stiffness, while retaining
    the sense of anguished appeal.
- source_word: בַּת עַמִּי
  chosen: the daughter of my people
  alternatives:
  - my dear people
  - the daughter of my people
  lexicon: HALOT
  rationale: Kept the familial/poetic metaphor rather than flattening it. This is
    a common prophetic expression for the people/community and should remain visible
    in translation.
- source_word: מֵאֶרֶץ מַרְחַקִּים
  chosen: from a distant land
  alternatives:
  - from a far country
  - from a land of far distances
  lexicon: HALOT
  rationale: The plural noun can function idiomatically for remoteness. 'From a distant
    land' is idiomatic English and conveys exile-like distance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: אֵין בְּצִיּוֹן
  chosen: is ... not in Zion
  alternatives:
  - is there no ... in Zion
  lexicon: HALOT
  rationale: Rendered as a direct question in idiomatic English. The Hebrew existential
    negative naturally becomes 'Is ... not ...?' in this context.
- source_word: אִם מַלְכָּהּ אֵין בָּהּ
  chosen: Is her King not in her?
  alternatives:
  - Or is her king not in her?
  - Is there no king in her?
  lexicon: HALOT
  rationale: אִם here introduces the second rhetorical question, effectively 'or whether.'
    Capitalized 'King' because the referent in context is the LORD as Zion's king,
    not a merely human monarch. 'In her' preserves the feminine reference to Zion.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Straightforward interrogative; concise modern English is sufficient.
- source_word: הִכְעִסוּנִי
  chosen: have they provoked me to anger
  alternatives:
  - have they angered me
  - have they provoked me
  lexicon: HALOT
  rationale: The Hiphil of כעס is causative/intensive. 'Provoked me to anger' preserves
    the causative nuance more clearly than the flatter 'angered me.'
- source_word: בִּפְסִילֵיהֶם
  chosen: with their carved images
  alternatives:
  - with their idols
  - with their graven images
  lexicon: HALOT
  rationale: פסל specifically denotes an idol-image that is carved/hewn. 'Carved images'
    preserves the concrete lexical force better than the broader 'idols.'
- source_word: בְּהַבְלֵי נֵכָר
  chosen: with foreign idols
  alternatives:
  - with foreign vanities
  - with the worthless things of foreigners
  - with foreign emptinesses
  lexicon: HALOT
  rationale: הבל in idol polemic often carries the sense of emptiness/worthlessness
    and functions as a term for idols. 'Foreign idols' communicates the referent clearly
    in context, while the nuance of worthlessness is secondary here.
