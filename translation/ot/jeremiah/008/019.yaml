theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Referent of 'her King' in Zion
  chosen_reading: Capitalized 'King' as referring to the LORD
  alternative_readings:
  - lowercase 'king' as a generic or royal representative
  rationale: The paired questions 'Is the LORD not in Zion? Is her King not in her?'
    present parallel references to Zion's divine ruler. Capitalization in English
    helps signal the theological referent without adding content beyond the context.
