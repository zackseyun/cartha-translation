id: JER.15.9
reference: Jeremiah 15:9
source:
  edition: WLC
  text: אֻמְלְלָ֞ה יֹלֶ֣דֶת הַ/שִּׁבְעָ֗ה נָפְחָ֥ה נַפְשָׁ֛/הּ באה שִׁמְשָׁ֛/הּ בְּ/עֹ֥ד
    יוֹמָ֖ם בּ֣וֹשָׁה וְ/חָפֵ֑רָה וּ/שְׁאֵֽרִיתָ֗/ם לַ/חֶ֧רֶב אֶתֵּ֛ן לִ/פְנֵ֥י אֹיְבֵי/הֶ֖ם
    נְאֻם יְהוָֽה־׃ס
translation:
  text: She who bore seven has withered away; she has breathed out her life. Her sun
    has gone down while it was still day. She is ashamed and humiliated. And the remnant
    of them I will give to the sword before their enemies, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mother of seven.' The Hebrew idiom evokes a woman once considered
      fully fruitful and blessed.
    reason: lexical_alternative
  - marker: b
    text: Literally 'has breathed out her soul/life.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'her sun has gone down while it was still day,' a poetic image
      of a premature end.
    reason: cultural_note
lexical_decisions:
- source_word: אֻמְלְלָה
  chosen: has withered away
  alternatives:
  - languishes
  - has become feeble
  lexicon: HALOT
  rationale: The verb conveys wasting away or languishing. 'Has withered away' preserves
    the vivid image of collapse and fits the poetic lament context better than a flatter
    'is weak.'
- source_word: יֹלֶדֶת הַשִּׁבְעָה
  chosen: she who bore seven
  alternatives:
  - the mother of seven
  - she who has borne seven children
  lexicon: HALOT
  rationale: Literally 'the one bearing seven.' This idiom refers to a woman once
    considered especially fruitful or blessed. 'She who bore seven' is concise and
    preserves the Hebrew poetic force without over-specifying 'children,' though that
    sense is implied.
- source_word: נָפְחָה נַפְשָׁהּ
  chosen: has breathed out her life
  alternatives:
  - has gasped out her soul
  - has expired
  lexicon: HALOT
  rationale: The expression is idiomatic and intense. 'Has breathed out her life'
    preserves the concrete imagery of breath/life departing while communicating the
    sense naturally in English. 'Soul' is possible more formally, but 'life' better
    conveys the idiom here.
- source_word: בָּאָה שִׁמְשָׁהּ
  chosen: Her sun has gone down
  alternatives:
  - her sun has set
  - her sun has come in
  lexicon: HALOT
  rationale: The Hebrew uses 'come' with 'sun' in an idiom for setting. 'Has gone
    down' is idiomatic English and preserves the metaphor of life and hope ending.
- source_word: בְּעוֹד יוֹמָם
  chosen: while it was still day
  alternatives:
  - in broad daylight
  - yet by day
  lexicon: HALOT
  rationale: This phrase emphasizes untimeliness or premature ending. 'While it was
    still day' communicates that her downfall came before its expected time, matching
    the poetic image.
- source_word: בּוֹשָׁה וְחָפֵרָה
  chosen: is ashamed and humiliated
  alternatives:
  - is ashamed and disgraced
  - is put to shame and confounded
  lexicon: HALOT
  rationale: The pair expresses shame and public disgrace. 'Ashamed and humiliated'
    is readable modern English and preserves the intensification of the two verbs.
- source_word: וּשְׁאֵרִיתָם
  chosen: the remnant of them
  alternatives:
  - their remnant
  - those left of them
  - the rest of them
  lexicon: HALOT
  rationale: The noun means what remains or survivors. 'The remnant of them' stays
    close to the Hebrew structure and keeps the corporate sense of survivors after
    judgment.
- source_word: לַחֶרֶב אֶתֵּן
  chosen: I will give to the sword
  alternatives:
  - I will hand over to the sword
  - I will deliver to the sword
  lexicon: HALOT
  rationale: This is a standard judgment formula. 'Give to the sword' is slightly
    formal but transparent and preserves the Hebrew idiom of handing people over to
    violent death.
- source_word: לִפְנֵי אֹיְבֵיהֶם
  chosen: before their enemies
  alternatives:
  - in the presence of their enemies
  - to their enemies
  lexicon: HALOT
  rationale: The preposition is literally 'before/in the presence of.' 'Before their
    enemies' preserves the wording and the sense of exposure to enemy power.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is well represented by 'declares the LORD.' Per
    doctrine, יְהוָה is rendered 'the LORD.'
