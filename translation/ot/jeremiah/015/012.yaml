id: JER.15.12
reference: Jeremiah 15:12
source:
  edition: WLC
  text: הֲ/יָרֹ֨עַ בַּרְזֶ֧ל בַּרְזֶ֛ל מִ/צָּפ֖וֹן וּ/נְחֹֽשֶׁת׀׃
translation:
  text: Can iron break iron from the north, and bronze?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Can iron shatter northern iron and bronze?' The Hebrew is compressed,
      and 'iron from the north' may function as a single expression for especially
      strong iron.
    reason: lexical_alternative
  - marker: b
    text: '''Bronze'' may also be rendered ''copper.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיָרֹעַ
  chosen: Can … break
  alternatives:
  - Can … shatter
  - Can … smash
  lexicon: HALOT
  rationale: The interrogative הֲ with the verb from רעע here introduces a rhetorical
    question. In this context, with metal as subject/object, the sense is not moral
    'do evil' but physical 'break/shatter.' 'Break' is the most natural modern English
    rendering and leaves the rhetorical force intact.
- source_word: בַּרְזֶל
  chosen: iron
  lexicon: HALOT
  rationale: Standard rendering of the noun for the metal iron.
- source_word: בַּרְזֶל מִצָּפוֹן
  chosen: iron from the north
  alternatives:
  - northern iron
  lexicon: HALOT
  rationale: The phrase likely refers to especially hard iron associated with the
    north. Rendering it analytically as 'iron from the north' stays close to the Hebrew
    while remaining clear in English.
- source_word: וּנְחֹשֶׁת
  chosen: and bronze
  alternatives:
  - and copper
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper or bronze depending on context. In biblical
    metal lists and weapon/material contexts, 'bronze' is the conventional and likely
    sense. The conjunction is retained, yielding the compressed Hebrew phrasing.
