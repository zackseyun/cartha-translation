id: JER.15.15
reference: Jeremiah 15:15
source:
  edition: WLC
  text: אַתָּ֧ה יָדַ֣עְתָּ יְהוָ֗ה זָכְרֵ֤/נִי וּ/פָקְדֵ֨/נִי֙ וְ/הִנָּ֤קֶם לִ/י֙
    מֵ/רֹ֣דְפַ֔/י אַל לְ/אֶ֥רֶךְ אַפְּ/ךָ֖ תִּקָּחֵ֑/נִי דַּ֕ע שְׂאֵתִ֥/י עָלֶ֖י/ךָ
    חֶרְפָּֽה־׃
translation:
  text: You know, O LORD; remember me and attend to me, and take vengeance for me
    on my persecutors. In your patience do not take me away; know that for your sake
    I bear reproach.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'visit me,' 'take note of me,' or 'care for me' for 'attend to me' (וּפָקְדֵנִי).
    reason: lexical_alternative
  - marker: b
    text: Or 'avenge me against my pursuers' for 'take vengeance for me on my persecutors.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'Do not take me in/for the length of your anger,' an idiom meaning
      'in your patience/long-suffering do not take me away.'
    reason: lexical_alternative
  - marker: d
    text: Or 'know that I bear reproach on your account.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and consistency with the DOCTRINE.md contested-terms table.
- source_word: זָכְרֵנִי
  chosen: remember me
  alternatives:
  - call me to mind
  - act on my behalf by remembering me
  lexicon: HALOT
  rationale: The imperative of זכר commonly means 'remember,' often with covenantal/action
    implications in prayer. 'Remember me' preserves the directness of Jeremiah's plea
    without over-paraphrasing the implied action.
- source_word: וּפָקְדֵנִי
  chosen: attend to me
  alternatives:
  - visit me
  - take note of me
  - care for me
  lexicon: HALOT
  rationale: פקד has a broad range including visit, attend to, take note of, intervene
    for. Here, in parallel with 'remember me' and followed by a plea for vengeance,
    it asks for divine intervention. 'Attend to me' is natural English and preserves
    the active concern without narrowing to either beneficent 'visit' or merely cognitive
    'notice'.
- source_word: וְהִנָּקֶם לִי מֵרֹדְפַי
  chosen: take vengeance for me on my persecutors
  alternatives:
  - avenge me against my pursuers
  - vindicate me against those who pursue me
  lexicon: HALOT
  rationale: The Niphal imperative of נקם here is a plea for God to enact vengeance/vindication
    on Jeremiah's behalf. 'Take vengeance for me' reflects the judicial force of the
    verb. 'Persecutors' fits the hostile pursuit in prophetic context better than
    the more literal but potentially narrower 'pursuers.'
- source_word: מֵרֹדְפַי
  chosen: my persecutors
  alternatives:
  - my pursuers
  - those pursuing me
  lexicon: HALOT
  rationale: רדף literally denotes pursuit, but in lament and persecution contexts
    it commonly carries the sense of hostile persecution. 'My persecutors' communicates
    the adversarial force in idiomatic English.
- source_word: אַל לְאֶרֶךְ אַפְּךָ תִּקָּחֵנִי
  chosen: In your patience do not take me away
  alternatives:
  - Do not take me away in your long-suffering
  - Because of your slowness to anger, do not seize me
  - Do not let your patience result in my being taken away
  lexicon: HALOT
  rationale: אֶרֶךְ אַף is the idiom 'long/slowness of anger,' hence 'patience' or
    'long-suffering.' תִּקָּחֵנִי from לקח likely means 'take me away' in the sense
    of removing Jeremiah, likely by death or judgment delayed while enemies prosper.
    The chosen rendering keeps the Hebrew idiom's sense while remaining readable.
- source_word: דַּע
  chosen: know
  alternatives:
  - recognize
  - take note
  lexicon: HALOT
  rationale: 'A direct imperative to God: ''know'' or ''take note.'' ''Know'' preserves
    the lexical link with the opening יָדַעְתָּ (''you know'') and keeps the rhetorical
    force.'
- source_word: שְׂאֵתִי
  chosen: I bear
  alternatives:
  - my bearing
  - my enduring
  - I carry
  lexicon: HALOT
  rationale: From נשׂא, here in the sense of bearing/enduring reproach. Rendering
    as the finite English clause 'I bear' is the most natural way to express the Hebrew
    nominal/verbal form in context.
- source_word: עָלֶיךָ חֶרְפָּה
  chosen: reproach for your sake
  alternatives:
  - reproach on your account
  - insult because of you
  lexicon: HALOT
  rationale: The phrase indicates that the reproach Jeremiah suffers is connected
    to his relation to the LORD. 'For your sake' is idiomatic and preserves the causal/associative
    force of עָלֶיךָ.
