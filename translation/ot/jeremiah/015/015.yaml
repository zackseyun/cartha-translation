theological_decisions:
- issue: Nature of Jeremiah's plea for divine retaliation
  chosen_reading: Rendered with the judicial language 'take vengeance for me' without
    softening it into merely internal comfort or over-expanding it into a doctrinal
    statement about personal revenge.
  alternative_readings:
  - avenge me
  - vindicate me
  rationale: 'The Hebrew נקם explicitly invokes divine vengeance/vindication. The
    translation preserves the text''s theological tension: Jeremiah appeals to God''s
    justice amid persecution, and the wording should not be diluted or moralized beyond
    the source text.'
  doctrine_reference: Preserve theological tension rather than resolve it.
