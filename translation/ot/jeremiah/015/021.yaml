id: JER.15.21
reference: Jeremiah 15:21
source:
  edition: WLC
  text: וְ/הִצַּלְתִּ֖י/ךָ מִ/יַּ֣ד רָעִ֑ים וּ/פְדִתִ֖י/ךָ מִ/כַּ֥ף עָרִצִֽים׃פ
translation:
  text: And I will deliver you from the hand of evil men, and I will redeem you from
    the grasp of the ruthless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rescue you' for 'deliver you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'ransom you' for 'redeem you.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the violent' for 'the ruthless.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִצַּלְתִּיךָ
  chosen: And I will deliver you
  alternatives:
  - And I will rescue you
  - And I will save you
  lexicon: HALOT
  rationale: Hiphil of נצל commonly means to snatch away, deliver, or rescue from
    danger. 'Deliver' fits well in prophetic diction and pairs naturally with the
    following prepositional phrase.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  lexicon: HALOT
  rationale: יָד literally means 'hand' and often functions idiomatically for power
    or control. Retaining 'hand' preserves the Hebrew imagery while remaining natural
    in English.
- source_word: רָעִים
  chosen: evil men
  alternatives:
  - wicked men
  - evil ones
  lexicon: HALOT
  rationale: The adjective רָעִים here functions substantivally for morally bad people.
    'Evil men' is clear and preserves the moral sense; 'men' reflects the masculine
    plural form in line with the gender-accurate policy.
- source_word: וּפְדִתִיךָ
  chosen: and I will redeem you
  alternatives:
  - and I will ransom you
  - and I will free you
  lexicon: HALOT
  rationale: פדה often carries the sense of redeeming or ransoming out of danger or
    bondage. 'Redeem' preserves the covenantal and theological weight better than
    the flatter 'free,' while still fitting the immediate context of rescue.
- source_word: מִכַּף
  chosen: from the grasp of
  alternatives:
  - from the palm of
  - from the hand of
  lexicon: HALOT
  rationale: כַּף literally means 'palm' or 'hand,' but in this idiom 'grasp' communicates
    hostile control more naturally in English while preserving the concrete image.
- source_word: עָרִצִים
  chosen: the ruthless
  alternatives:
  - the violent
  - the tyrants
  - the terrible ones
  lexicon: HALOT
  rationale: עָרִיץ denotes the ruthless, violent, or terrifying oppressor. 'The ruthless'
    is concise, idiomatic, and captures the oppressive character without over-specifying
    a political sense such as 'tyrants'.
