theological_decisions:
- issue: Rendering of masculine plural רָעִים
  chosen_reading: evil men
  alternative_readings:
  - evil ones
  - the wicked
  rationale: The Hebrew form is masculine plural and refers to human opponents. Following
    the gender-accurate policy, the translation keeps a masculine rendering rather
    than neutralizing it, while the broader sense could be expressed more generically
    in a footnote if needed.
