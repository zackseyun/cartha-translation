id: JER.15.14
reference: Jeremiah 15:14
source:
  edition: WLC
  text: וְ/הַֽעֲבַרְתִּי֙ אֶת אֹ֣יְבֶ֔י/ךָ בְּ/אֶ֖רֶץ לֹ֣א יָדָ֑עְתָּ כִּֽי אֵ֛שׁ
    קָדְחָ֥ה בְ/אַפִּ֖/י עֲלֵי/כֶ֥ם תּוּקָֽד־־׃ס
translation:
  text: And I will make your enemies pass through into a land you have not known,
    for a fire has been kindled in my anger; it will burn against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following some ancient versions and the parallel in Jeremiah 17:4, 'And
      I will make you serve your enemies in a land you have not known.' The Hebrew
      consonantal text here reads 'your enemies,' but a different vocalization or
      Vorlage may underlie the alternate reading.
    reason: textual_variant
lexical_decisions:
- source_word: וְהַעֲבַרְתִּי
  chosen: I will make ... pass through
  alternatives:
  - I will carry ... over
  - I will cause ... to pass over
  - I will bring ... across
  lexicon: HALOT
  rationale: Hiphil of עבר commonly has a causative sense, 'cause to pass/go over.'
    Here it governs 'your enemies' and is followed by 'into a land,' so an English
    causative construction best preserves the Hebrew force without overparaphrase.
- source_word: אֶת אֹיְבֶיךָ
  chosen: your enemies
  lexicon: HALOT
  rationale: Direct object marker plus plural construct with 2ms suffix straightforwardly
    yields 'your enemies.'
- source_word: בְּאֶרֶץ לֹא יָדָעְתָּ
  chosen: into a land you have not known
  alternatives:
  - in a land you have not known
  - to a land you do not know
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'in' or, with verbs of motion/transfer,
    effectively 'into.' Given the causative motion verb, 'into a land' reads naturally
    in English. The perfect יָדָעְתָּ is retained as experiential 'have not known'
    rather than simple present.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the announced judgment; 'for' is concise and
    preserves the explanatory connection.
- source_word: אֵשׁ
  chosen: a fire
  lexicon: HALOT
  rationale: Literal image should be retained; in prophetic judgment contexts it also
    carries metaphorical force, but the text itself states 'fire.'
- source_word: קָדְחָה
  chosen: has been kindled
  alternatives:
  - has burned
  - is kindled
  - has blazed up
  lexicon: HALOT
  rationale: The verb denotes kindling/burning. 'Has been kindled' fits the perfect
    aspect and pairs naturally with the following future 'it will burn.'
- source_word: בְאַפִּי
  chosen: in my anger
  alternatives:
  - in my nostril
  - in my wrath
  - by my anger
  lexicon: HALOT
  rationale: אַף literally refers to nose/nostril but idiomatically means anger/wrath.
    'In my anger' preserves the idiom's sense in readable English without importing
    a stronger term than necessary.
- source_word: עֲלֵיכֶם
  chosen: against you
  alternatives:
  - upon you
  - over you
  lexicon: HALOT
  rationale: With a verb of burning in a judgment context, English idiom prefers 'against
    you.' The Hebrew suffix is 2mp, likely addressing the people collectively; English
    'you' preserves this without awkwardness.
- source_word: תּוּקָד
  chosen: it will burn
  alternatives:
  - it will be kindled
  - it will blaze
  lexicon: HALOT
  rationale: The verb from יקד denotes burning/kindling. Since the fire has already
    been 'kindled,' rendering the imperfect as 'it will burn' avoids redundancy and
    reflects ongoing effect.
