theological_decisions:
- issue: Referent and number shift from singular suffixes ('your enemies,' 'you have
    known') to plural suffix ('against you')
  chosen_reading: 'Retain the singular and plural as represented in English idiom:
    singular possessive in the first clause, generic ''you'' in the final clause'
  alternative_readings:
  - Regularize all pronouns to singular
  - Regularize all pronouns to plural
  rationale: The Hebrew text shifts person/number, likely moving from Jeremiah individually
    or representative singular to the people collectively. English 'you' can preserve
    the final plural without forcing an interpretive harmonization. This preserves
    the textual tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
