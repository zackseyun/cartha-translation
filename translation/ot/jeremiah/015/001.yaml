theological_decisions:
- issue: Anthropomorphic expression נַפְשִׁי ('my soul') applied to the LORD
  chosen_reading: Retain the anthropomorphic wording 'my soul would not be toward
    this people' rather than flattening it to a purely abstract statement.
  alternative_readings:
  - I would not be favorable toward this people
  - I have no compassion for this people
  rationale: The Hebrew text attributes personal disposition to the LORD in vivid
    anthropomorphic language. Preserving this reflects the source text's rhetoric
    without making speculative claims about divine ontology. This follows the translation
    philosophy of preserving theological tension rather than resolving it by paraphrase.
  doctrine_reference: Translation philosophy §3
- issue: Intercessory force of Moses and Samuel 'standing before' the LORD
  chosen_reading: Preserve the idiom 'stand before me' in the main text and allow
    readers to infer the intercessory setting from context.
  alternative_readings:
  - intercede before me
  - plead with me
  rationale: Moses and Samuel are paradigmatic intercessors, but the Hebrew says 'stand
    before me,' not explicitly 'intercede.' Rendering the idiom literally avoids importing
    an interpretive expansion into the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition'
