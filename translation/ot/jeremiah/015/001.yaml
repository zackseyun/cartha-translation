id: JER.15.1
reference: Jeremiah 15:1
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֵלַ֔/י אִם יַעֲמֹ֨ד מֹשֶׁ֤ה וּ/שְׁמוּאֵל֙ לְ/פָנַ֔/י
    אֵ֥ין נַפְשִׁ֖/י אֶל הָ/עָ֣ם הַ/זֶּ֑ה שַׁלַּ֥ח מֵֽ/עַל פָּנַ֖/י וְ/יֵצֵֽאוּ־־־׃
translation:
  text: Then the LORD said to me, “Even if Moses and Samuel were to stand before me,
    my soul would not be toward this people. Send them away from before me, and let
    them go out.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “my heart would not be toward this people” or “I
      would have no regard for this people.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “from before me”; that is, “out of my presence.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH per
    DOCTRINE.md, preserving Jewish reverence tradition and the longstanding English
    convention reflected in the LXX/NT pattern.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Standard direct-object/prepositional sense in contemporary English.
- source_word: אִם יַעֲמֹד
  chosen: Even if ... were to stand
  alternatives:
  - If ... stood
  - Though ... stood
  lexicon: HALOT
  rationale: Here אִם introduces a hypothetical concessive condition. 'Even if ...
    were to stand' best captures the force of an unreal or emphatic hypothetical in
    English.
- source_word: יַעֲמֹד ... לְפָנַי
  chosen: were to stand before me
  alternatives:
  - should stand before me
  - stood in my presence
  lexicon: HALOT
  rationale: The idiom 'stand before' commonly denotes appearing in attendance or
    intercession before God. The more literal 'stand before me' preserves the Hebrew
    imagery and possible intercessory nuance.
- source_word: מֹשֶׁה וּשְׁמוּאֵל
  chosen: Moses and Samuel
  lexicon: HALOT
  rationale: Standard transliteration of personal names, in keeping with project policy
    to transliterate names rather than translate them.
- source_word: אֵין נַפְשִׁי אֶל־הָעָם הַזֶּה
  chosen: my soul would not be toward this people
  alternatives:
  - I would have no regard for this people
  - I would not be inclined toward this people
  - my heart would not be toward this people
  lexicon: HALOT
  rationale: נֶפֶשׁ literally means 'soul/self/life,' and the phrase expresses personal
    disposition or inclination. 'My soul would not be toward this people' preserves
    the Hebrew anthropomorphic force more transparently than a fully idiomatic paraphrase,
    while remaining intelligible.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - these people
  lexicon: HALOT
  rationale: The singular collective 'people' matches the Hebrew and preserves the
    covenantal-national sense better than the plural 'people' in English.
- source_word: שַׁלַּח
  chosen: Send
  alternatives:
  - Drive away
  - Dismiss
  lexicon: HALOT
  rationale: Imperative addressed to Jeremiah. 'Send' is the basic sense and leaves
    the object implied from context, as in Hebrew.
- source_word: מֵעַל פָּנַי
  chosen: away from before me
  alternatives:
  - out of my presence
  - from my presence
  lexicon: HALOT
  rationale: Literally 'from upon my face/presence.' 'Away from before me' preserves
    the concrete Hebrew expression while remaining readable. A smoother alternative
    is preserved in a footnote.
- source_word: וְיֵצֵאוּ
  chosen: and let them go out
  alternatives:
  - and let them depart
  - and let them leave
  lexicon: HALOT
  rationale: Jussive-like continuation after the imperative. 'Let them go out' keeps
    the verbal imagery of exiting, likely from God's presence or the land under judgment,
    without over-specifying.
