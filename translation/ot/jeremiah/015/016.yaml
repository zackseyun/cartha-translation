theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: O LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD.' Because the verse is direct address, 'O LORD' is the natural English vocative
    form.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD'
- issue: Handling the covenantal idiom 'your name is called over me'
  chosen_reading: your name is called over me
  alternative_readings:
  - I am called by your name
  rationale: The Hebrew idiom signifies belonging to God and bearing his name. To
    preserve theological texture without over-interpreting, the main text keeps the
    more literal form and the idiomatic English equivalent is preserved in a footnote.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it'
