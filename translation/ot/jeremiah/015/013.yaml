id: JER.15.13
reference: Jeremiah 15:13
source:
  edition: WLC
  text: חֵילְ/ךָ֧ וְ/אוֹצְרוֹתֶ֛י/ךָ לָ/בַ֥ז אֶתֵּ֖ן לֹ֣א בִ/מְחִ֑יר וּ/בְ/כָל חַטֹּאותֶ֖י/ךָ
    וּ/בְ/כָל גְּבוּלֶֽי/ךָ־־׃
translation:
  text: Your wealth and your treasures I will give as plunder, without price, because
    of all your sins throughout all your territory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not for a price'—that is, without compensation or payment.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in/with all your sins and in all your borders'; the translation
      renders the sense as causal and distributive in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵילְךָ
  chosen: your wealth
  alternatives:
  - your strength
  - your army
  - your riches
  lexicon: HALOT
  rationale: חַיִל/חֵיל can denote strength, army, or wealth/resources. In parallel
    with 'your treasures' and in a context of confiscation, the economic sense 'wealth'
    best fits.
- source_word: וְאוֹצְרוֹתֶיךָ
  chosen: and your treasures
  alternatives:
  - and your storehouses
  - and your treasuries
  lexicon: HALOT
  rationale: The noun denotes stored valuables or treasuries. 'Treasures' is natural
    English and matches the object being handed over as spoil.
- source_word: לָבַז
  chosen: as plunder
  alternatives:
  - for spoil
  - to plunder
  lexicon: HALOT
  rationale: The phrase with נתן commonly means 'give over as plunder/spoil.' 'As
    plunder' is idiomatic in English.
- source_word: אֶתֵּן
  chosen: I will give
  alternatives:
  - I give
  - I will hand over
  lexicon: HALOT
  rationale: Qal imperfect 1cs of נתן. Future 'I will give' fits the prophetic announcement;
    the sense of handing over is conveyed by the complement 'as plunder.'
- source_word: לֹא בִמְחִיר
  chosen: without price
  alternatives:
  - not for a price
  - without payment
  - for no compensation
  lexicon: HALOT
  rationale: Literally 'not for a price.' In context it means the wealth will be surrendered
    without compensation or purchase. 'Without price' is concise and preserves the
    force.
- source_word: וּבְכָל חַטֹּאותֶיךָ
  chosen: because of all your sins
  alternatives:
  - and for all your sins
  - with all your sins
  lexicon: HALOT
  rationale: The preposition ב here is causal/instrumental in judgment context. 'Because
    of' communicates the reason for the coming loss more clearly than a wooden 'in/with.'
- source_word: וּבְכָל גְּבוּלֶיךָ
  chosen: throughout all your territory
  alternatives:
  - within all your borders
  - in all your territory
  lexicon: HALOT
  rationale: גְּבוּל can mean border, boundary, or territory. Here it refers to the
    whole land under Judah's bounds. 'Throughout all your territory' expresses distributive
    scope naturally in English.
