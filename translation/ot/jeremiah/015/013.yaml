theological_decisions:
- issue: Causal force of the final prepositional phrases in a judgment oracle
  chosen_reading: The verse states that the loss of wealth comes because of the people's
    sins, extending throughout their whole territory.
  alternative_readings:
  - The final phrases could be read more woodenly as 'and with all your sins, and
    in all your borders' without making the causal link explicit.
  rationale: The broader context is divine judgment on Judah. Rendering the Hebrew
    preposition ב with causal force here preserves the sense without importing extra
    theology; it simply makes explicit the judgment logic already present in the oracle.
  doctrine_reference: Translation philosophy §1, §3, §6
