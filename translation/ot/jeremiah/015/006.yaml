id: JER.15.6
reference: Jeremiah 15:6
source:
  edition: WLC
  text: אַ֣תְּ נָטַ֥שְׁתְּ אֹתִ֛/י נְאֻם יְהוָ֖ה אָח֣וֹר תֵּלֵ֑כִי וָ/אַ֨ט אֶת יָדִ֤/י עָלַ֨יִ/ךְ֙ וָֽ/אַשְׁחִיתֵ֔/ךְ נִלְאֵ֖יתִי הִנָּחֵֽם־־׃
translation:
  text: You have forsaken me, declares Yahweh; you keep going backward. So I have stretched out my hand against you and destroyed you; I am weary of relenting.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you keep turning back' / 'you go backward.' The Hebrew is literally 'backward you go,' using movement imagery for apostasy.
    reason: lexical_alternative
  - marker: b
    text: Or 'I am weary of changing my mind.' The Hebrew verb can denote relenting from judgment; 'relenting' is used here to avoid suggesting moral repentance in God.
    reason: alternative_reading
lexical_decisions:
- source_word: נָטַשְׁתְּ
  chosen: have forsaken
  alternatives:
  - have abandoned
  - have rejected
  lexicon: HALOT
  rationale: נטשׁ commonly means to leave, forsake, or abandon. 'Forsaken' preserves the covenantal and relational force in prophetic accusation better than the flatter 'left.'
- source_word: נְאֻם יְהוָה
  chosen: oracle of the LORD
  alternatives:
  - declares the LORD
  - utterance of the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic formula introducing a divine utterance. 'Oracle of the LORD' is transparent and preserves the formal prophetic register. 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אָחוֹר תֵּלֵכִי
  chosen: you keep going backward
  alternatives:
  - you go backward
  - you turn your back
  - you keep turning back
  lexicon: HALOT
  rationale: Literally 'backward you go/walk.' The imperfect here conveys ongoing or characteristic action in context. 'Keep going backward' preserves the spatial metaphor of apostasy without overinterpreting it as the idiom 'turn your back,' though that sense is related.
- source_word: וָאַט
  chosen: So I have stretched out
  alternatives:
  - and I stretched out
  - therefore I stretched out
  lexicon: HALOT
  rationale: 'The verb from נטה means to stretch out or extend. With the prefixed conjunction, the sense is consequential in context: because Judah has turned back, God has acted in judgment. ''So I have stretched out'' gives natural English while retaining the image.'
- source_word: יָדִי עָלַיִךְ
  chosen: my hand against you
  alternatives:
  - my hand over you
  lexicon: HALOT
  rationale: The idiom of God's hand 'against' someone regularly signals hostile action or judgment. 'Against you' makes the adversative force explicit in idiomatic English.
- source_word: וָאַשְׁחִיתֵךְ
  chosen: and destroyed you
  alternatives:
  - and ruined you
  - and brought you to ruin
  lexicon: HALOT
  rationale: שׁחת in the Hiphil often means to destroy or ruin. 'Destroyed' best matches the severity of the judgment context.
- source_word: נִלְאֵיתִי
  chosen: I am weary
  alternatives:
  - I have grown weary
  - I am tired
  lexicon: HALOT
  rationale: The verb לאה expresses weariness or exhaustion. 'I am weary' is concise and weighty, fitting the divine complaint.
- source_word: הִנָּחֵם
  chosen: of relenting
  alternatives:
  - of repenting
  - of having compassion
  - of changing my mind
  lexicon: HALOT
  rationale: נחם in this context refers to relenting from announced judgment, not moral repentance. 'Relenting' avoids misleading implications while preserving the tension of divine mercy withheld.
