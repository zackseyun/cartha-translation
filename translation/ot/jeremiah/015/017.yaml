theological_decisions:
- issue: Meaning of 'your hand' in relation to Jeremiah's isolation
  chosen_reading: God's hand is rendered as a metaphor for divine pressure/compulsion
    without paraphrasing it away.
  alternative_readings:
  - God's hand as protection
  - God's hand as mere presence
  rationale: The phrase likely explains Jeremiah's solitary stance as resulting from
    the burden of his prophetic calling and the divine judgment he bears. The translation
    keeps 'your hand' literal to preserve the theological imagery and avoids resolving
    it into a narrower doctrinal claim.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
- issue: Force of זַעַם
  chosen_reading: Rendered as 'indignation' rather than explicitly 'wrath' in the
    main text.
  alternative_readings:
  - wrath
  - anger
  rationale: 'The term can refer to wrath, often divine, but the immediate syntax
    says God filled Jeremiah with it. ''Indignation'' preserves the severity while
    allowing the text''s tension: Jeremiah bears the burden of God''s anger/judgment
    without the translation over-defining the exact psychological or judicial nuance.'
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
