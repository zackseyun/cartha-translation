id: JER.15.17
reference: Jeremiah 15:17
source:
  edition: WLC
  text: לֹֽא יָשַׁ֥בְתִּי בְ/סוֹד מְשַׂחֲקִ֖ים וָֽ/אֶעְלֹ֑ז מִ/פְּנֵ֤י יָֽדְ/ךָ֙ בָּדָ֣ד
    יָשַׁ֔בְתִּי כִּֽי זַ֖עַם מִלֵּאתָֽ/נִי־־־׃ס
translation:
  text: I did not sit in the company of those who laugh, nor did I rejoice; because
    of your hand I sat alone, for you filled me with indignation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the council of merrymakers' or 'in the circle of those who make merry.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'from before your hand'; the phrase likely means 'because of your
      hand' or 'under the pressure of your hand.'
    reason: lexical_alternative
  - marker: c
    text: Or 'wrath' or 'anger' for 'indignation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשַׁבְתִּי
  chosen: I did not sit / I sat
  alternatives:
  - I did not dwell / I dwelt
  - I did not join / I remained
  lexicon: HALOT
  rationale: The verb ישׁב literally means 'sit, dwell, remain.' In this poetic context,
    'sit' preserves the concrete Hebrew idiom and works naturally in English, especially
    with 'in the company of' and later 'I sat alone.'
- source_word: בְּסוֹד
  chosen: in the company of
  alternatives:
  - in the council of
  - in the circle of
  - in the assembly of
  lexicon: HALOT
  rationale: סוֹד can denote an intimate circle, council, or company. Here it refers
    to social association rather than a formal deliberative council, so 'in the company
    of' best captures the sense for modern readers while preserving the relational
    nuance.
- source_word: מְשַׂחֲקִים
  chosen: those who laugh
  alternatives:
  - merrymakers
  - those who make merry
  - mockers
  lexicon: HALOT
  rationale: From שׂחק, the participle can denote laughing, playing, or making merry.
    In context the contrast is with Jeremiah's isolation and lack of rejoicing, so
    'those who laugh' is a transparent rendering. 'Mockers' is possible in some contexts
    but is too interpretively narrow here.
- source_word: וָאֶעְלֹז
  chosen: nor did I rejoice
  alternatives:
  - and I did not exult
  - nor was I jubilant
  lexicon: HALOT
  rationale: עלז conveys exulting or rejoicing. 'Rejoice' is idiomatic and fits the
    parallel with the laughing company. The negation is carried over in English from
    the previous clause for natural sense.
- source_word: מִפְּנֵי יָדְךָ
  chosen: because of your hand
  alternatives:
  - before your hand
  - under your hand
  - from before your hand
  lexicon: HALOT
  rationale: Literally 'from/before your hand.' In prophetic usage 'your hand' commonly
    signifies God's compelling power or pressure. 'Because of your hand' communicates
    causation clearly while retaining the anthropomorphic 'hand' imagery.
- source_word: בָּדָד
  chosen: alone
  alternatives:
  - in solitude
  - by myself
  - apart
  lexicon: HALOT
  rationale: בָּדָד denotes being alone, isolated, or apart. 'Alone' is concise and
    preserves the emotional force of Jeremiah's separation.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the prophet's isolation. 'For' fits
    the explanatory relation and reads smoothly in English.
- source_word: זַעַם
  chosen: indignation
  alternatives:
  - wrath
  - rage
  - anger
  lexicon: HALOT
  rationale: זַעַם denotes anger or indignation, often with the sense of divine wrath.
    'Indignation' preserves the seriousness without over-specifying whether the emphasis
    is emotional rage or judicial wrath. It also fits the idea that Jeremiah is filled
    with God's burden of judgment.
- source_word: מִלֵּאתָנִי
  chosen: you filled me
  alternatives:
  - you have filled me
  - you made me full
  lexicon: HALOT
  rationale: The verb מלא means 'fill.' The simple past fits the surrounding verbal
    sequence in English and preserves the direct causative force.
