id: JER.15.11
reference: Jeremiah 15:11
source:
  edition: WLC
  text: אָמַ֣ר יְהוָ֔ה אִם לֹ֥א שרות/ך לְ/ט֑וֹב אִם ל֣וֹא הִפְגַּ֣עְתִּֽי בְ/ךָ֗ בְּ/עֵ֥ת רָעָ֛ה וּ/בְ/עֵ֥ת צָרָ֖ה אֶת הָ/אֹיֵֽב־־׀־־׃
translation:
  text: Yahweh said, “Surely I have set you free for good; surely I have made the enemy plead with you in a time of disaster and in a time of distress.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew uncertain in the first clause; alternatively, 'Surely I have released you for good,' or with a different understanding of the form, 'Surely I have strengthened the remnant for good.'
    reason: textual_variant
  - marker: b
    text: Or, 'surely I have interceded for you with the enemy in a time of disaster and in a time of distress.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project’s default rendering for the divine name, preserving the covenant name in standard English small-caps style.
- source_word: אִם לֹא ... אִם לוא
  chosen: surely ... surely
  alternatives:
  - if not ... if not
  - indeed ... indeed
  lexicon: HALOT
  rationale: Here the particle sequence functions idiomatically as a strong asseveration rather than a conditional. Rendering it as 'surely' communicates the oath-like divine affirmation in natural English.
- source_word: שרותך
  chosen: I have set you free
  alternatives:
  - I have released you
  - I have strengthened/remnanted you
  - I have served you well
  lexicon: HALOT
  rationale: The form is difficult and has long been recognized as textually and lexically uncertain. In context, the sense is a divine promise of Jeremiah’s preservation or release for his benefit. 'Set you free' captures the likely force of deliverance/letting go for good, while remaining readable. Alternatives are preserved because the Hebrew is debated.
- source_word: לְטוֹב
  chosen: for good
  alternatives:
  - for your good
  - for well-being
  lexicon: HALOT
  rationale: The preposition plus noun most naturally expresses beneficial result or purpose. 'For good' is concise and idiomatic, while allowing the sense of benefit.
- source_word: הִפְגַּעְתִּי בְךָ
  chosen: I have made ... plead with you
  alternatives:
  - I have interceded for you
  - I have caused ... to entreat you
  - I have intervened with you
  lexicon: HALOT
  rationale: The hiphil of פגע can mean cause to encounter, assail, or entreat/intercede depending on context. With the following object 'the enemy' and the setting of calamity, the sense is best taken as causing the enemy to appeal to Jeremiah rather than harming him. This fits the broader context of Jeremiah being vindicated before opponents.
- source_word: אֶת הָאֹיֵב
  chosen: the enemy
  alternatives:
  - the foe
  - your enemy
  lexicon: HALOT
  rationale: Definite singular collective is well represented by 'the enemy.' English does not require an explicit possessive, though the context implies hostility toward Jeremiah.
- source_word: בְּעֵת רָעָה
  chosen: in a time of disaster
  alternatives:
  - in a time of evil
  - in a time of calamity
  lexicon: HALOT
  rationale: רָעָה here refers to adverse circumstance rather than moral evil. 'Disaster' communicates situational calamity clearly in modern English.
- source_word: וּבְעֵת צָרָה
  chosen: and in a time of distress
  alternatives:
  - and in a time of trouble
  - and in a time of anguish
  lexicon: HALOT
  rationale: צָרָה commonly denotes distress, trouble, or straits. 'Distress' pairs well with 'disaster' and preserves the intensifying parallelism.
