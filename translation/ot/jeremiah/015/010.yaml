id: JER.15.10
reference: Jeremiah 15:10
source:
  edition: WLC
  text: אֽוֹי לִ֣/י אִמִּ֔/י כִּ֣י יְלִדְתִּ֗/נִי אִ֥ישׁ רִ֛יב וְ/אִ֥ישׁ מָד֖וֹן לְ/כָל
    הָ/אָ֑רֶץ לֹֽא נָשִׁ֥יתִי וְ/לֹא נָֽשׁוּ בִ֖/י כֻּלֹּ֥/ה מְקַלְלַֽו/נִי־־־־־׃ס
translation:
  text: Woe to me, my mother, because you bore me, a man of strife and a man of contention
    to all the land. I have not lent, nor have they lent to me, yet every one of them
    curses me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to the whole earth."
    reason: alternative_reading
  - marker: b
    text: The Hebrew likely refers to lending and borrowing in the context of debt;
      Jeremiah says he has given no ordinary social cause for such hostility.
    reason: cultural_note
lexical_decisions:
- source_word: אֽוֹי
  chosen: Woe
  alternatives:
  - Alas
  lexicon: HALOT
  rationale: An interjection of lament/distress. 'Woe' preserves the forceful cry
    better than the softer 'Alas.'
- source_word: אִמִּי
  chosen: my mother
  lexicon: HALOT
  rationale: Direct address in lament; retained explicitly for the emotional force
    of Jeremiah's complaint.
- source_word: כִּי יְלִדְתִּנִי
  chosen: because you bore me
  alternatives:
  - that you bore me
  - for you gave birth to me
  lexicon: HALOT
  rationale: '''Because'' fits the causal sense in context. ''Bore me'' is concise,
    natural, and close to the Hebrew verb ילד.'
- source_word: אִישׁ רִיב
  chosen: a man of strife
  alternatives:
  - a man of dispute
  - a contentious man
  lexicon: HALOT
  rationale: Construct expression describing Jeremiah as characterized by conflict.
    'Strife' is idiomatic and preserves the nominal force better than an adjectival
    paraphrase.
- source_word: וְאִישׁ מָדוֹן
  chosen: and a man of contention
  alternatives:
  - and a man of quarrel
  - and a contentious man
  lexicon: HALOT
  rationale: Paired with רִיב for rhetorical intensification. 'Contention' differentiates
    the second noun while keeping the semantic overlap.
- source_word: לְכָל הָאָרֶץ
  chosen: to all the land
  alternatives:
  - to the whole land
  - for all the land
  - to the whole earth
  lexicon: HALOT
  rationale: In Jeremiah, הָאָרֶץ commonly refers to the land/land of Judah rather
    than the entire globe. 'To all the land' reflects Jeremiah's adversarial relation
    with the people throughout the land.
- source_word: לֹא נָשִׁיתִי
  chosen: I have not lent
  alternatives:
  - I have not lent on interest
  - I have not been a creditor
  lexicon: HALOT
  rationale: From נשה in the sense of lending/credit. The context contrasts normal
    causes of social hostility, especially debt relations. 'Lent' is readable; the
    more specific 'on interest' is possible but not required by the immediate syntax.
- source_word: וְלֹא נָשׁוּ בִי
  chosen: nor have they lent to me
  alternatives:
  - nor have they made me their debtor
  - nor have they loaned to me
  lexicon: HALOT
  rationale: Balances the previous clause and preserves the reciprocal debt-language.
    The phrase means Jeremiah has neither lent to others nor borrowed from them, so
    debt is not the cause of universal hostility.
- source_word: כֻּלֹּה
  chosen: every one of them
  alternatives:
  - all of them
  - everyone
  lexicon: HALOT
  rationale: Distributive sense fits the following participle and conveys the totality
    of opposition.
- source_word: מְקַלְלַנִי
  chosen: curses me
  alternatives:
  - is cursing me
  - reviles me
  lexicon: HALOT
  rationale: The participle expresses ongoing/general action. English simple present
    communicates the general reality naturally; 'curses' preserves the strong verbal
    sense.
