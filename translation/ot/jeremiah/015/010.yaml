theological_decisions:
- issue: Scope of הָאָרֶץ
  chosen_reading: the land
  alternative_readings:
  - the earth
  rationale: No doctrinal issue is at stake, but the translation avoids overstating
    the scope as global when the prophetic context more naturally points to the land
    of Judah. This preserves contextual sense without importing a broader claim.
