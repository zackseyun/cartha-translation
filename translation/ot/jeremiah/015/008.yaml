theological_decisions:
- issue: Handling the difficult clause הִפַּלְתִּי עָלֶיהָ פִּתְאֹם עִיר וּבֶהָלוֹת
  chosen_reading: Retain the Masoretic wording substantially as 'I have suddenly made
    city and terrors fall upon her,' smoothing only enough for intelligible English.
  alternative_readings:
  - Emend עִיר to a term meaning 'anguish' or similar
  - Interpret עִיר adverbially or as part of a different clause structure
  rationale: This is primarily a textual/lexical difficulty rather than a doctrinal
    one. Following original-language primacy, the draft keeps the MT's 'city' in the
    main text rather than adopting a conjectural emendation. Because the phrase is
    awkward in English and Hebrew alike, an alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
