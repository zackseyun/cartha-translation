id: JER.15.8
reference: Jeremiah 15:8
source:
  edition: WLC
  text: עָֽצְמוּ לִ֤/י אַלְמְנֹתָ/ו֙ מֵ/ח֣וֹל יַמִּ֔ים הֵבֵ֨אתִי לָ/הֶ֥ם עַל אֵ֛ם
    בָּח֖וּר שֹׁדֵ֣ד בַּֽ/צָּהֳרָ֑יִם הִפַּ֤לְתִּי עָלֶ֨י/הָ֙ פִּתְאֹ֔ם עִ֖יר וּ/בֶהָלֽוֹת־־׃
translation:
  text: Their widows have become more numerous to me than the sand of the seas. I
    have brought against them, against the mother of a young man, a destroyer at noon;
    I have suddenly made city and terrors fall upon her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'their widows have multiplied beyond the sand of the sea.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew is difficult: ''against the mother of a young man'' may refer to
      a mother bereaved of her son; some take the phrase differently.'
    reason: alternative_reading
  - marker: c
    text: The Hebrew of the final clause is difficult. The Masoretic Text reads literally,
      'I made city and terrors fall upon her suddenly.' Some emend or interpret 'city'
      differently, yielding a sense such as 'anguish and terrors.'
    reason: textual_variant
lexical_decisions:
- source_word: עָצְמוּ
  chosen: have become more numerous
  alternatives:
  - have multiplied
  - are mighty/numerous
  lexicon: HALOT
  rationale: In context with 'widows' and the comparison 'more than the sand of the
    seas,' the verb carries the sense of becoming numerous or multiplying, not strength.
    English idiom prefers 'have become more numerous' to make the comparative construction
    clear.
- source_word: אַלְמְנֹתָיו
  chosen: their widows
  alternatives:
  - his widows
  lexicon: HALOT
  rationale: The ketiv-like form with 3ms suffix can be taken distributively/corporately
    in context of the people under judgment; the following plural pronoun 'to them'
    supports rendering the referent collectively as 'their' in English rather than
    a singular 'his,' which would sound misleadingly individualized.
- source_word: מֵחוֹל יַמִּים
  chosen: than the sand of the seas
  alternatives:
  - than the sand of the sea
  lexicon: HALOT
  rationale: A literal comparative phrase. The plural 'seas' reflects the Hebrew form
    and is acceptable English, while preserving the poetic abundance image.
- source_word: הֵבֵאתִי
  chosen: I have brought
  alternatives:
  - I brought
  lexicon: HALOT
  rationale: The perfect is rendered with present relevance in English. Either simple
    past or present perfect is possible; present perfect fits the prophetic declaration
    of completed divine action with ongoing effect.
- source_word: עַל אֵם בָּחוּר
  chosen: against the mother of a young man
  alternatives:
  - upon the mother of a young man
  - against the mother and the young men
  - against the mother of the chosen man
  lexicon: HALOT
  rationale: The most straightforward reading takes אֵם as 'mother' and בָּחוּר as
    'young man.' The phrase is difficult, but this preserves the Hebrew syntax without
    overinterpreting. It likely depicts bereavement falling on a mother through the
    loss of her son.
- source_word: שֹׁדֵד
  chosen: a destroyer
  alternatives:
  - a plunderer
  - a ravager
  lexicon: HALOT
  rationale: The participle denotes one who devastates or plunders. 'Destroyer' communicates
    violent devastation in accessible English and fits the judgment context.
- source_word: בַּצָּהֳרָיִם
  chosen: at noon
  alternatives:
  - at midday
  lexicon: HALOT
  rationale: A temporal expression. 'At noon' is natural modern English and preserves
    the shock of an attack at an unexpected hour.
- source_word: הִפַּלְתִּי
  chosen: I have made ... fall
  alternatives:
  - I caused ... to fall
  - I brought down
  lexicon: HALOT
  rationale: The hiphil of נפל is causative. 'Made ... fall' keeps the causative force
    while remaining readable.
- source_word: עָלֶיהָ
  chosen: upon her
  alternatives:
  - on her
  - upon them
  lexicon: HALOT
  rationale: The suffix is feminine singular, naturally referring back to 'mother.'
    Retaining the singular preserves the vivid image of calamity falling on her.
- source_word: פִּתְאֹם
  chosen: suddenly
  alternatives:
  - in an instant
  lexicon: HALOT
  rationale: Standard adverbial sense; 'suddenly' is the clearest modern equivalent.
- source_word: עִיר
  chosen: city
  alternatives:
  - anguish
  - watcher
  lexicon: HALOT
  rationale: The consonantal text is commonly taken as 'city,' though the phrase is
    difficult. Retaining 'city' respects the MT and avoids conjectural emendation
    in the main text.
- source_word: וּבֶהָלוֹת
  chosen: and terrors
  alternatives:
  - and panic
  - and horrors
  lexicon: HALOT
  rationale: The noun denotes terrors/panic. 'Terrors' best matches the plural abstract
    force and the tone of judgment.
