theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in the prophetic formula. Per project
    policy, the default rendering is 'the LORD,' following Jewish reverence tradition
    and longstanding English convention while signaling the divine name distinctly.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Maintaining the repeated judgment formula without softening
  chosen_reading: Those for death, to death; and those for the sword, to the sword;
    and those for famine, to famine; and those for captivity, to captivity
  alternative_readings:
  - Whoever is destined for death, to death...
  - Those appointed to death, to death...
  rationale: The Hebrew is intentionally stark and repetitive, emphasizing fixed divine
    judgment categories. The translation preserves that tension and severity rather
    than smoothing it into explanatory prose.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological
    tension rather than resolve it'
