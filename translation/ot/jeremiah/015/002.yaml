id: JER.15.2
reference: Jeremiah 15:2
source:
  edition: WLC
  text: וְ/הָיָ֛ה כִּֽי יֹאמְר֥וּ אֵלֶ֖י/ךָ אָ֣נָה נֵצֵ֑א וְ/אָמַרְתָּ֨ אֲלֵי/הֶ֜ם
    כֹּֽה אָמַ֣ר יְהוָ֗ה אֲשֶׁ֨ר לַ/מָּ֤וֶת לַ/מָּ֨וֶת֙ וַ/אֲשֶׁ֤ר לַ/חֶ֨רֶב֙ לַ/חֶ֔רֶב
    וַ/אֲשֶׁ֤ר לָֽ/רָעָב֙ לָֽ/רָעָ֔ב וַ/אֲשֶׁ֥ר לַ/שְּׁבִ֖י לַ/שֶּֽׁבִי־־׃
translation:
  text: 'And it shall be, when they say to you, ‘Where shall we go out?’ then you
    shall say to them, ‘Thus says the LORD: Those for death, to death; and those for
    the sword, to the sword; and those for famine, to famine; and those for captivity,
    to captivity.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Whoever is for death, to death.' The Hebrew is terse and repetitive,
      preserving the fixed categories of judgment.
    reason: lexical_alternative
  - marker: b
    text: Or, 'captivity' may be rendered 'exile' in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will happen
  - And it will be
  lexicon: HALOT
  rationale: Uses a natural but still formal rendering of the Hebrew narrative/future
    formula introducing a coming circumstance. 'It shall be' preserves the prophetic
    register better than a flatter 'it will happen.'
- source_word: כִּי
  chosen: when
  alternatives:
  - if
  - that
  lexicon: HALOT
  rationale: In this construction with וְהָיָה, כִּי introduces the anticipated circumstance,
    best rendered 'when' rather than conditional 'if.'
- source_word: יֹאמְרוּ אֵלֶיךָ
  chosen: they say to you
  alternatives:
  - they ask you
  - they say to you
  lexicon: HALOT
  rationale: The verb is simply 'say,' though in context it functions as a question.
    Retaining 'say to you' stays closer to the Hebrew while the quoted question conveys
    the force.
- source_word: אָנָה נֵצֵא
  chosen: Where shall we go out?
  alternatives:
  - Where should we go?
  - Where are we to go out?
  lexicon: HALOT
  rationale: אָנָה asks destination ('where/to where'), and יצא is 'go out.' Including
    'out' preserves the Hebrew verb, likely implying departure/exile from the land
    or city. Smoother English alternatives are possible, but this keeps the source
    texture.
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  chosen: then you shall say to them
  alternatives:
  - you shall say to them
  - and you shall say to them
  lexicon: HALOT
  rationale: The sequence after the initial clause is consequential. 'Then' makes
    the temporal progression clear in English without over-paraphrasing.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - Thus said the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the solemnity
    and directness. יְהוָה follows the doctrinal default 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Follows the project''s contested-terms policy for the divine name: ''the
    LORD'' rather than a transliteration.'
- source_word: אֲשֶׁר לַמָּוֶת לַמָּוֶת
  chosen: Those for death, to death
  alternatives:
  - Whoever is for death, to death
  - Those destined for death, to death
  lexicon: HALOT
  rationale: The repeated prepositional phrase is terse and formulaic. 'Those for
    death, to death' preserves the stark cadence and judicial force without adding
    interpretive material like 'destined,' though that sense is implicit.
- source_word: חֶרֶב
  chosen: the sword
  alternatives:
  - sword
  - war
  lexicon: HALOT
  rationale: In Jeremiah this commonly denotes death by warfare. 'The sword' is the
    conventional and accurate rendering, preserving the concrete instrument rather
    than abstracting to 'war.'
- source_word: רָעָב
  chosen: famine
  alternatives:
  - hunger
  - starvation
  lexicon: HALOT
  rationale: Refers to famine as a covenant/judgment category, not merely personal
    hunger. 'Famine' best matches the prophetic context.
- source_word: שְׁבִי / שֶּׁבִי
  chosen: captivity
  alternatives:
  - exile
  - captives
  lexicon: HALOT
  rationale: The noun denotes captivity/captivity as a fate. 'Captivity' preserves
    the parallel structure ('to captivity') better than 'exile,' though exile is a
    close contextual alternative.
