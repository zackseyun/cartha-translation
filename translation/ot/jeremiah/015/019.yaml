id: JER.15.19
reference: Jeremiah 15:19
source:
  edition: WLC
  text: לָ/כֵ֞ן כֹּֽה אָמַ֣ר יְהוָ֗ה אִם תָּשׁ֤וּב וַ/אֲשִֽׁיבְ/ךָ֙ לְ/פָנַ֣/י תַּֽעֲמֹ֔ד וְ/אִם תּוֹצִ֥יא יָקָ֛ר מִ/זּוֹלֵ֖ל כְּ/פִ֣/י תִֽהְיֶ֑ה יָשֻׁ֤בוּ הֵ֨מָּה֙ אֵלֶ֔י/ךָ וְ/אַתָּ֖ה לֹֽא תָשׁ֥וּב אֲלֵי/הֶֽם־־־־׃
translation:
  text: 'Therefore, this is what Yahweh says: If you return, I will restore you, and you will stand before me. If you bring out the precious from the worthless, you will be as my mouth. They will turn to you, but you must not turn to them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If you repent, I will restore you' or 'If you turn back, I will bring you back.' The Hebrew repeats the verb 'return/turn back' for both Jeremiah's response and the LORD's restoring action.
    reason: lexical_alternative
  - marker: b
    text: '''Bring out the precious from the worthless'' likely refers to separating worthy speech from unworthy speech; compare the following phrase, ''you will be as my mouth.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'you will be my spokesman.' Literally, 'you will be as my mouth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential conjunction introducing the LORD's response to Jeremiah's complaint; 'Therefore' preserves the logical connection and prophetic tone.
- source_word: כֹּה אָמַר יְהוָה
  chosen: this is what the LORD says
  alternatives:
  - thus says the LORD
  lexicon: HALOT
  rationale: Uses contemporary readable English while preserving the formal prophetic messenger formula. 'the LORD' follows the doctrinal default for YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אִם תָּשׁוּב
  chosen: If you return
  alternatives:
  - If you repent
  - If you turn back
  lexicon: HALOT
  rationale: שׁוּב broadly means 'turn/return.' 'Return' preserves the metaphor and allows the context to imply repentance without over-specifying.
- source_word: וַאֲשִׁיבְךָ
  chosen: I will restore you
  alternatives:
  - I will bring you back
  - I will cause you to return
  lexicon: HALOT
  rationale: Hiphil of שׁוּב is causative. 'Restore you' fits the relational and vocational context better than a merely spatial 'bring you back,' while remaining faithful to the causative sense.
- source_word: לְפָנַי תַּעֲמֹד
  chosen: you will stand before me
  alternatives:
  - you will stand in my presence
  - you will serve before me
  lexicon: HALOT
  rationale: Literally 'stand before me.' This can imply restored service/acceptance, but the main text keeps the concrete idiom and lets the implication remain implicit.
- source_word: וְאִם תּוֹצִיא
  chosen: If you bring out
  alternatives:
  - If you utter
  - If you extract
  lexicon: HALOT
  rationale: The verb literally means 'bring out.' In context it may refer metaphorically to separating worthy speech from unworthy speech, but the broader image is preserved in translation.
- source_word: יָקָר
  chosen: the precious
  alternatives:
  - what is precious
  - the valuable
  lexicon: HALOT
  rationale: Adjective used substantivally. 'The precious' preserves the compact Hebrew contrast with the following term.
- source_word: מִזּוֹלֵל
  chosen: from the worthless
  alternatives:
  - from the vile
  - from the cheap
  - from what is worthless
  lexicon: HALOT
  rationale: The term denotes what is base, worthless, or despicable. 'Worthless' is clear modern English and fits the contrast with 'precious' without importing excessive moral coloring.
- source_word: כְּפִי תִהְיֶה
  chosen: you will be as my mouth
  alternatives:
  - you will be like my mouth
  - you will be my spokesman
  lexicon: HALOT
  rationale: Literally 'you will be as my mouth.' The idiom implies authorized speech, but the main text preserves the vivid metaphor rather than flattening it to interpretation.
- source_word: יָשֻׁבוּ הֵמָּה אֵלֶיךָ
  chosen: They will turn to you
  alternatives:
  - They will return to you
  - Let them turn to you
  lexicon: HALOT
  rationale: The imperfect is best read as indicative promise rather than jussive here. 'Turn to you' captures both relational and directional force.
- source_word: וְאַתָּה לֹא תָשׁוּב אֲלֵיהֶם
  chosen: but you must not turn to them
  alternatives:
  - but you must not return to them
  - but you shall not turn to them
  lexicon: HALOT
  rationale: The contrastive clause warns Jeremiah not to conform to the people. 'Must not' communicates the force of the prohibition in natural English.
