id: JER.15.18
reference: Jeremiah 15:18
source:
  edition: WLC
  text: לָ֣/מָּה הָיָ֤ה כְאֵבִ/י֙ נֶ֔צַח וּ/מַכָּתִ֖/י אֲנוּשָׁ֑ה֙ מֵֽאֲנָה֙ הֵֽרָפֵ֔א
    הָי֨וֹ תִֽהְיֶ֥ה לִ/י֙ כְּמ֣וֹ אַכְזָ֔ב מַ֖יִם לֹ֥א נֶאֱמָֽנוּ׃ס
translation:
  text: Why has my pain become perpetual, and my wound incurable, refusing to be healed?
    Will you indeed be to me like a deceptive brook, like waters that are not reliable?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a failing brook'—the Hebrew image is of a streambed that promises
      water but proves unreliable.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְאֵבִי
  chosen: my pain
  alternatives:
  - my sorrow
  - my hurt
  lexicon: HALOT
  rationale: כאב denotes pain or suffering; 'pain' is the most natural modern English
    rendering and fits both physical and emotional distress in Jeremiah's lament.
- source_word: נֶצַח
  chosen: perpetual
  alternatives:
  - forever
  - enduring
  - unceasing
  lexicon: HALOT
  rationale: In this context נצח conveys ongoing duration rather than abstract eternity.
    'Perpetual' preserves the force of unending continuance in readable English.
- source_word: מַכָּתִי
  chosen: my wound
  alternatives:
  - my blow
  - my injury
  lexicon: HALOT
  rationale: מכה can mean blow or wound; with the following adjective and healing
    language, 'wound' best matches the medical metaphor.
- source_word: אֲנוּשָׁה
  chosen: incurable
  alternatives:
  - grievous
  - desperate
  - sick
  lexicon: HALOT
  rationale: The adjective often describes something severe or beyond remedy. Because
    the next clause speaks of refusing healing, 'incurable' brings out the contextual
    sense most clearly.
- source_word: מֵאֲנָה הֵרָפֵא
  chosen: refusing to be healed
  alternatives:
  - refusing healing
  - refusing to be cured
  lexicon: HALOT
  rationale: The construction personifies the wound as refusing healing. 'Refusing
    to be healed' preserves the vivid Hebrew idiom while remaining idiomatic in English.
- source_word: הָיוֹ תִהְיֶה לִי
  chosen: Will you indeed be to me
  alternatives:
  - Will you really be to me
  - Will you truly become to me
  lexicon: HALOT
  rationale: This sequence introduces Jeremiah's sharp rhetorical question to God.
    'Indeed' captures the emphatic, incredulous tone without overtranslating the form.
- source_word: אַכְזָב
  chosen: deceptive brook
  alternatives:
  - deceitful stream
  - failing brook
  - lying brook
  lexicon: HALOT
  rationale: אַכזב denotes something deceptive or disappointing, especially a wadi/brook
    that fails when expected to provide water. 'Deceptive brook' communicates both
    the metaphor and the sense of unreliability.
- source_word: מַיִם לֹא נֶאֱמָנוּ
  chosen: waters that are not reliable
  alternatives:
  - waters that fail
  - undependable waters
  - untrustworthy waters
  lexicon: HALOT
  rationale: 'The phrase explains the brook metaphor: waters that cannot be counted
    on. ''Not reliable'' is clear modern English and preserves the covenantal/reliability
    nuance of אמן in the Niphal.'
