theological_decisions:
- issue: Address to God in lament
  chosen_reading: The verse is rendered as Jeremiah's direct, accusatory rhetorical
    question to God without softening the force.
  alternative_readings:
  - A less direct complaint that avoids implying divine unreliability
  rationale: The Hebrew plainly voices lament in bold relational language. Preserving
    this tension accords with the translation philosophy of not resolving difficult
    theological force that the text itself presents.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
