id: JER.15.7
reference: Jeremiah 15:7
source:
  edition: WLC
  text: וָ/אֶזְרֵ֥/ם בְּ/מִזְרֶ֖ה בְּ/שַׁעֲרֵ֣י הָ/אָ֑רֶץ שִׁכַּ֤לְתִּי אִבַּ֨דְתִּי֙
    אֶת עַמִּ֔/י מִ/דַּרְכֵי/הֶ֖ם לוֹא שָֽׁבוּ־־׃
translation:
  text: I winnowed them with a winnowing fork at the gates of the land; I bereaved,
    I destroyed my people—they did not turn back from their ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they did not repent of their ways.' The Hebrew says 'turn back/return,'
      which can carry the sense of repentance in prophetic contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the gates of the earth.' The Hebrew word can mean either 'land' or
      'earth'; here 'land' fits the immediate context of judgment on Judah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶזְרֵם
  chosen: I winnowed them
  alternatives:
  - I scattered them
  - I sifted them
  lexicon: HALOT
  rationale: From זרה in the sense of winnowing/scattering grain. 'Winnowed' preserves
    the agricultural metaphor more precisely than the broader 'scattered.' The 3mp
    suffix is rendered 'them,' referring to the people.
- source_word: בְּמִזְרֶה
  chosen: with a winnowing fork
  alternatives:
  - with a fan
  - with a winnowing shovel
  lexicon: HALOT
  rationale: מִזְרֶה denotes a winnowing implement. 'Winnowing fork' is clear modern
    English and keeps the concrete image. 'Fan' is traditional but less transparent
    to modern readers.
- source_word: בְּשַׁעֲרֵי הָאָרֶץ
  chosen: at the gates of the land
  alternatives:
  - in the gates of the land
  - at the gates of the earth
  lexicon: HALOT
  rationale: שַׁעֲרֵי is literally 'gates of.' הָאָרֶץ can mean 'land' or 'earth';
    in Jeremiah's national judgment context, 'land' better fits Judah/the land rather
    than the whole world. 'At' is idiomatic for the locative phrase.
- source_word: שִׁכַּלְתִּי
  chosen: I bereaved
  alternatives:
  - I made childless
  - I deprived
  lexicon: HALOT
  rationale: The verb commonly carries the sense of causing bereavement or making
    childless. 'I bereaved' is concise and preserves the severity without over-specifying
    the object.
- source_word: אִבַּדְתִּי
  chosen: I destroyed
  alternatives:
  - I ruined
  - I caused to perish
  lexicon: HALOT
  rationale: From אבד in a causative/destructive sense. 'Destroyed' is the most direct
    and natural rendering in context of divine judgment.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard covenantal expression; no reason to paraphrase.
- source_word: מִדַּרְכֵיהֶם
  chosen: from their ways
  alternatives:
  - from their paths
  - from their conduct
  lexicon: HALOT
  rationale: דֶּרֶךְ often means way/path literally or conduct figuratively. Here
    it refers to their course of life. 'Ways' preserves the Hebrew idiom while remaining
    understandable.
- source_word: לֹא שָׁבוּ
  chosen: they did not turn back
  alternatives:
  - they did not return
  - they did not repent
  lexicon: HALOT
  rationale: שׁוּב can mean return/turn back and often carries repentance overtones.
    'Turn back' preserves the verbal imagery and allows the moral sense to remain
    implicit from context without importing an interpretive gloss like 'repent' into
    the main text.
