theological_decisions:
- issue: Whether to make שׁוּב explicitly penitential
  chosen_reading: they did not turn back from their ways
  alternative_readings:
  - they did not repent of their ways
  - they did not return from their ways
  rationale: The Hebrew verb can denote repentance, but the text itself uses the broader
    image of turning/returning. Preserving that wording maintains the prophetic moral
    force without narrowing it to a technical doctrinal term.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
