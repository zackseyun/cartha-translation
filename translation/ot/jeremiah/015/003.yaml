id: JER.15.3
reference: Jeremiah 15:3
source:
  edition: WLC
  text: וּ/פָקַדְתִּ֨י עֲלֵי/הֶ֜ם אַרְבַּ֤ע מִשְׁפָּחוֹת֙ נְאֻם יְהוָ֔ה אֶת הַ/חֶ֣רֶב
    לַֽ/הֲרֹ֔ג וְ/אֶת הַ/כְּלָבִ֖ים לִ/סְחֹ֑ב וְ/אֶת ע֧וֹף הַ/שָּׁמַ֛יִם וְ/אֶת בֶּהֱמַ֥ת
    הָ/אָ֖רֶץ לֶ/אֱכֹ֥ל וּ/לְ/הַשְׁחִֽית־־־־־׃
translation:
  text: 'And I will appoint over them four kinds of destroyers, declares the LORD:
    the sword to kill, the dogs to drag away, and the birds of the heavens and the
    beasts of the earth to devour and to destroy.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'four families/clans'; here the word is used figuratively for four
      categories of agents of judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'the birds of the sky.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָקַדְתִּי
  chosen: I will appoint over
  alternatives:
  - I will punish
  - I will muster against
  - I will visit upon
  lexicon: HALOT
  rationale: פקד has a broad semantic range including attend, appoint, muster, and
    punish. In this construction with עַל plus hostile agents, the sense is that YHWH
    assigns or commissions calamities against them. 'Appoint over' preserves the governing
    nuance better than the more interpretive 'punish.'
- source_word: עֲלֵיהֶם
  chosen: over them
  alternatives:
  - against them
  - upon them
  lexicon: HALOT
  rationale: The preposition עַל can mean over, against, or upon. 'Over them' fits
    the administrative nuance of פקד here, while the hostile force is made clear by
    the listed destroyers.
- source_word: אַרְבַּע מִשְׁפָּחוֹת
  chosen: four kinds of destroyers
  alternatives:
  - four families
  - four clans
  - four groups
  lexicon: HALOT
  rationale: 'מִשְׁפָּחוֹת normally means families or clans, but here it is used figuratively
    for four categories of agents of judgment: sword, dogs, birds, and beasts. ''Kinds''
    communicates the classificatory sense in natural English. ''Destroyers'' is supplied
    to make the ellipsis explicit from context.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is a standard prophetic formula. 'Declares the LORD' is idiomatic
    modern English and preserves prophetic solemnity. YHWH is rendered 'the LORD'
    per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The doctrine excerpt specifies the default rendering of the divine name
    as 'the LORD.'
- source_word: הַחֶרֶב לַהֲרֹג
  chosen: the sword to kill
  alternatives:
  - the sword to slay
  lexicon: HALOT
  rationale: A straightforward infinitive of purpose. 'Kill' is clear modern English;
    'slay' is more traditional but less natural.
- source_word: הַכְּלָבִים לִסְחֹב
  chosen: the dogs to drag away
  alternatives:
  - the dogs to tear away
  - the dogs to haul off
  lexicon: HALOT
  rationale: סחב means drag, draw, or haul. In context of corpses after judgment,
    'drag away' is vivid and natural without over-specifying dismemberment.
- source_word: עוֹף הַשָּׁמַיִם
  chosen: the birds of the heavens
  alternatives:
  - the birds of the sky
  - the fowl of heaven
  lexicon: HALOT
  rationale: Literally 'birds of the heavens.' This phrase often denotes carrion birds
    in judgment contexts. 'Birds of the heavens' stays close to the Hebrew while remaining
    readable.
- source_word: בֶּהֱמַת הָאָרֶץ
  chosen: the beasts of the earth
  alternatives:
  - the animals of the land
  - the wild beasts of the earth
  lexicon: HALOT
  rationale: The construct phrase is broad. 'Beasts of the earth' preserves the elevated
    prophetic register and likely predatory nuance better than the flatter 'animals
    of the land.'
- source_word: לֶאֱכֹל וּלְהַשְׁחִית
  chosen: to devour and to destroy
  alternatives:
  - to eat and to ruin
  - to consume and to destroy
  lexicon: HALOT
  rationale: אכל in this context refers to scavenging on corpses, so 'devour' conveys
    the force better than the overly literal 'eat.' השחית means destroy, ruin, or
    lay waste; 'destroy' matches the judgment context and keeps the parallel force.
