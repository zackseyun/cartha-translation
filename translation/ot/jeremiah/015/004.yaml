theological_decisions:
- issue: Corporate judgment of Judah tied to the sins of Manasseh
  chosen_reading: Retain the text's explicit causal linkage without softening it
  alternative_readings:
  - Interpret as merely historical background rather than direct cause
  rationale: The verse plainly states that the coming judgment is 'because of Manasseh
    ... for what he did in Jerusalem.' The translation preserves this theological
    tension of communal/national judgment rooted in a king's sins without attempting
    to resolve it.
  doctrine_reference: Preserve theological tension rather than resolve it.
