id: JER.15.4
reference: Jeremiah 15:4
source:
  edition: WLC
  text: וּ/נְתַתִּ֣י/ם ל/זועה לְ/כֹ֖ל מַמְלְכ֣וֹת הָ/אָ֑רֶץ בִּ֠/גְלַל מְנַשֶּׁ֤ה
    בֶן יְחִזְקִיָּ֨הוּ֙ מֶ֣לֶךְ יְהוּדָ֔ה עַ֥ל אֲשֶׁר עָשָׂ֖ה בִּ/ירוּשָׁלִָֽם־־׃
translation:
  text: And I will make them a horror to all the kingdoms of the earth, because of
    Manasseh son of Hezekiah, king of Judah, for what he did in Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an object of horror' or 'a terror.' The Hebrew noun conveys something
      that causes shuddering, dread, or horror.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתַתִּים
  chosen: And I will make them
  alternatives:
  - And I will give them
  - And I will hand them over
  lexicon: HALOT
  rationale: נתן with a predicate complement plus ל can mean 'make/render' in context,
    not merely 'give.' English 'make them' best captures the resulting state introduced
    by the following noun.
- source_word: לְזַוֲעָה
  chosen: a horror
  alternatives:
  - an object of horror
  - a terror
  - a shaking
  lexicon: HALOT
  rationale: The noun denotes something causing horror/shuddering. 'A horror' is concise,
    natural English and preserves the sense that they become an object provoking dread
    and revulsion.
- source_word: לְכֹל מַמְלְכוֹת הָאָרֶץ
  chosen: to all the kingdoms of the earth
  alternatives:
  - for all the kingdoms of the earth
  - among all the kingdoms of the earth
  lexicon: HALOT
  rationale: The lamed here marks relation toward the observing nations. 'To all the
    kingdoms of the earth' is a natural rendering with the sense that they are made
    a horror in the sight of all earthly kingdoms.
- source_word: בִּגְלַל
  chosen: because of
  alternatives:
  - on account of
  - for the sake of
  lexicon: HALOT
  rationale: 'Causal sense is straightforward here: Judah''s coming judgment is due
    to Manasseh.'
- source_word: מְנַשֶּׁה בֶן יְחִזְקִיָּהוּ
  chosen: Manasseh son of Hezekiah
  alternatives:
  - Manasseh, the son of Hezekiah
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy; filial relation
    is rendered directly.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Standard royal title; no reason to expand or paraphrase.
- source_word: עַל אֲשֶׁר עָשָׂה
  chosen: for what he did
  alternatives:
  - because of what he did
  - on account of what he did
  lexicon: HALOT
  rationale: This phrase explains the causal basis more specifically. 'For what he
    did' is idiomatic and preserves the retrospective reference to Manasseh's actions.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Simple locative; standard transliteration of the place name.
