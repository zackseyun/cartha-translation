id: JER.15.20
reference: Jeremiah 15:20
source:
  edition: WLC
  text: וּ/נְתַתִּ֜י/ךָ לָ/עָ֣ם הַ/זֶּ֗ה לְ/חוֹמַ֤ת נְחֹ֨שֶׁת֙ בְּצוּרָ֔ה וְ/נִלְחֲמ֥וּ אֵלֶ֖י/ךָ וְ/לֹא י֣וּכְלוּ לָ֑/ךְ כִּֽי אִתְּ/ךָ֥ אֲנִ֛י לְ/הוֹשִֽׁיעֲ/ךָ֥ וּ/לְ/הַצִּילֶ֖/ךָ נְאֻם יְהוָֽה־־־׃
translation:
  text: And I will make you to this people a fortified wall of bronze; they will fight against you, but they will not prevail over you, for I am with you to save you and to deliver you, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a fortified bronze wall.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתַתִּיךָ
  chosen: And I will make you
  alternatives:
  - And I will set you
  - And I will give you
  lexicon: HALOT
  rationale: נתן literally means 'give/put/set,' but in this construction with לְ plus predicate noun it idiomatically means 'make/appoint as.' 'Make you' best reflects the resulting state in natural English.
- source_word: לָעָם הַזֶּה
  chosen: to this people
  alternatives:
  - for this people
  - against this people
  lexicon: HALOT
  rationale: The phrase marks relation to the people addressed in Jeremiah's ministry. 'To this people' preserves the Hebrew preposition and fits the idiom of being made a defensive structure in relation to them.
- source_word: לְחוֹמַת נְחֹשֶׁת בְּצוּרָה
  chosen: a fortified wall of bronze
  alternatives:
  - a bronze wall, fortified
  - a fortified bronze wall
  lexicon: HALOT
  rationale: חוֹמָה is 'wall'; נְחֹשֶׁת is 'bronze/copper'; בָּצוּר means 'fortified, inaccessible.' 'A fortified wall of bronze' is clear and preserves the metaphor of strength and impregnability.
- source_word: וְנִלְחֲמוּ אֵלֶיךָ
  chosen: they will fight against you
  alternatives:
  - they will wage war against you
  - they will battle you
  lexicon: HALOT
  rationale: לחם with אֶל commonly means to fight against someone. 'Fight against you' is straightforward modern English.
- source_word: וְלֹא יוּכְלוּ לָךְ
  chosen: but they will not prevail over you
  alternatives:
  - but they will not overcome you
  - but they will not be able against you
  lexicon: HALOT
  rationale: יכל means 'be able,' and with לְ here conveys inability to succeed against Jeremiah. 'Prevail over you' expresses the idiomatic force better than a wooden rendering.
- source_word: כִּי אִתְּךָ אֲנִי
  chosen: for I am with you
  alternatives:
  - because I am with you
  lexicon: HALOT
  rationale: This gives the ground for their failure and for God's protection. 'For' fits the explanatory sense in context.
- source_word: לְהוֹשִׁיעֲךָ
  chosen: to save you
  alternatives:
  - to rescue you
  lexicon: HALOT
  rationale: ישע commonly means 'save/deliver.' 'Save you' preserves the lexical connection to broader biblical usage, while the following verb supplies a near-synonymous complement.
- source_word: וּלְהַצִּילֶךָ
  chosen: and to deliver you
  alternatives:
  - and to rescue you
  lexicon: HALOT
  rationale: נצל means 'snatch away, deliver, rescue.' Rendering it 'deliver' alongside 'save' preserves the paired but distinct verbs without sounding redundant.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic speech formula. 'Declares the LORD' is idiomatic English and suitably weighty. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
