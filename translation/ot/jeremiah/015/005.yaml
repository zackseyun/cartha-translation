id: JER.15.5
reference: Jeremiah 15:5
source:
  edition: WLC
  text: כִּ֠י מִֽי יַחְמֹ֤ל עָלַ֨יִ/ךְ֙ יְר֣וּשָׁלִַ֔ם וּ/מִ֖י יָנ֣וּד לָ֑/ךְ וּ/מִ֣י
    יָס֔וּר לִ/שְׁאֹ֥ל לְ/שָׁלֹ֖ם לָֽ/ךְ־׃
translation:
  text: For who will have compassion on you, Jerusalem? And who will mourn for you?
    And who will turn aside to ask about your welfare?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who will pity you ... who will show sympathy for you ... who will stop
      to ask about your well-being?'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding judgment statement.
    'For' best preserves the causal/explanatory force in natural English.
- source_word: מִי
  chosen: who
  lexicon: HALOT
  rationale: Interrogative pronoun repeated three times for rhetorical effect; rendered
    consistently as 'who'.
- source_word: יַחְמֹל
  chosen: will have compassion
  alternatives:
  - will pity
  - will spare
  lexicon: HALOT
  rationale: חמל commonly conveys pity/compassion. 'Have compassion' is idiomatic
    and fits the emotional sense here better than 'spare,' since the object is Jerusalem
    in her desolation rather than an act of withholding punishment.
- source_word: עָלַיִךְ
  chosen: on you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition על with חמל is naturally rendered 'on you' in English
    ('have compassion on you').
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Proper name transliterated according to standard English convention,
    in keeping with the translation philosophy to transliterate names.
- source_word: יָנוּד
  chosen: will mourn
  alternatives:
  - will shake his head in sympathy
  - will show sympathy
  - will bemoan
  lexicon: HALOT
  rationale: The verb נוד can denote a gesture of sympathetic mourning/commiseration.
    In this context of lament over Jerusalem, 'mourn' communicates the intended sense
    more clearly than a more literal but opaque 'shake the head' or 'move to and fro.'
- source_word: לָךְ
  chosen: for you
  alternatives:
  - over you
  lexicon: HALOT
  rationale: Dative of concern after יָנוּד; 'for you' is natural English and conveys
    sympathetic involvement.
- source_word: יָסוּר
  chosen: will turn aside
  alternatives:
  - will stop
  - will deviate
  lexicon: HALOT
  rationale: סור means to turn aside or depart from one's path. Here it pictures someone
    interrupting his course to inquire after Jerusalem.
- source_word: לִשְׁאֹל
  chosen: to ask
  alternatives:
  - to inquire
  lexicon: HALOT
  rationale: Infinitive of purpose following 'turn aside.' 'Ask' is simple and natural;
    the object of inquiry is clarified by the following phrase.
- source_word: לְשָׁלוֹם
  chosen: about your welfare
  alternatives:
  - about your peace
  - about your well-being
  lexicon: HALOT
  rationale: שָׁלוֹם here refers not merely to absence of conflict but to well-being/welfare.
    'About your welfare' best captures the idiom 'ask for someone's shalom' in contemporary
    English.
