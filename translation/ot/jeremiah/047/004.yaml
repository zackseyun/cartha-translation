id: JER.47.4
reference: Jeremiah 47:4
source:
  edition: WLC
  text: עַל הַ/יּ֗וֹם הַ/בָּא֙ לִ/שְׁד֣וֹד אֶת כָּל פְּלִשְׁתִּ֔ים לְ/הַכְרִ֤ית לְ/צֹר֙
    וּ/לְ/צִיד֔וֹן כֹּ֖ל שָׂרִ֣יד עֹזֵ֑ר כִּֽי שֹׁדֵ֤ד יְהוָה֙ אֶת פְּלִשְׁתִּ֔ים
    שְׁאֵרִ֖ית אִ֥י כַפְתּֽוֹר־־־־־׃
translation:
  text: because of the day that is coming to devastate all the Philistines, to cut
    off from Tyre and Sidon every surviving helper. For the LORD is devastating the
    Philistines, the remnant of the coastland of Caphtor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the remnant of the island of Caphtor."
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל הַיּוֹם הַבָּא
  chosen: because of the day that is coming
  alternatives:
  - on account of the coming day
  - because of the coming day
  lexicon: HALOT
  rationale: עַל with a temporal noun here functions causally in context, continuing
    the reason for lament/judgment from the previous verse. 'The day that is coming'
    preserves the participial force of הַבָּא while remaining natural English.
- source_word: לִשְׁדֹד
  chosen: to devastate
  alternatives:
  - to plunder
  - to destroy
  lexicon: HALOT
  rationale: The infinitive of שׁדד denotes violent despoiling/devastation. 'Devastate'
    fits the national-judgment context better than the narrower 'plunder' while avoiding
    overstatement beyond the lexical range.
- source_word: אֶת כָּל פְּלִשְׁתִּים
  chosen: all the Philistines
  alternatives:
  - all Philistia
  - all the Philistine people
  lexicon: HALOT
  rationale: The object is the people group in plural form, not the land name. 'All
    the Philistines' is the most direct rendering.
- source_word: לְהַכְרִית
  chosen: to cut off
  alternatives:
  - to destroy
  - to wipe out
  lexicon: HALOT
  rationale: הכרית commonly carries the sense of cutting off, often in judgment contexts.
    'Cut off' preserves the idiomatic and covenantal/judicial resonance.
- source_word: לְצֹר וּלְצִידוֹן
  chosen: from Tyre and Sidon
  alternatives:
  - for Tyre and Sidon
  - to Tyre and Sidon
  lexicon: HALOT
  rationale: 'With לְהַכְרִית, the lamed before the city names is best represented
    in English as separation/source: cutting off every helper from Tyre and Sidon,
    i.e., removing aid available to them from those Phoenician cities.'
- source_word: כֹּל שָׂרִיד עֹזֵר
  chosen: every surviving helper
  alternatives:
  - every remaining ally
  - every survivor who helps
  lexicon: HALOT
  rationale: שָׂרִיד means survivor/remnant; עֹזֵר is helper. The phrase refers to
    any remaining source of assistance. 'Every surviving helper' is concise and close
    to the Hebrew structure.
- source_word: כִּי שֹׁדֵד יְהוָה
  chosen: For the LORD is devastating
  alternatives:
  - For the LORD is plundering
  - For the LORD devastates
  lexicon: HALOT
  rationale: The participle שֹׁדֵד presents the action as underway or certain. 'Is
    devastating' captures the vividness and immediacy. יְהוָה is rendered 'the LORD'
    per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the default rendering of the divine
    name is 'the LORD'.
- source_word: שְׁאֵרִית אִי כַפְתּוֹר
  chosen: the remnant of the coastland of Caphtor
  alternatives:
  - the remnant of the island of Caphtor
  - the remnant from Caphtor
  lexicon: HALOT
  rationale: שְׁאֵרִית is 'remnant.' אִי can denote coastland/island; in prophetic
    geography 'coastland' is often preferable and avoids overprecision. The phrase
    identifies the Philistines as the surviving group associated with Caphtor, traditionally
    their place of origin.
