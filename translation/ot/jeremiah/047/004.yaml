theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrinal and translation policy specifies 'the LORD' as
    the default rendering of YHWH, following Jewish reverence tradition and the Septuagintal
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of אִי in אִי כַפְתּוֹר
  chosen_reading: coastland
  alternative_readings:
  - island
  rationale: The Hebrew term can denote island or coastland. In this prophetic context,
    'coastland' is a natural geographic rendering in English while preserving the
    association with Caphtor. Because 'island' is also viable, it is preserved in
    a footnote.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it (applied analogically to genuine lexical ambiguity)
