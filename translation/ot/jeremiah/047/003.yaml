id: JER.47.3
reference: Jeremiah 47:3
source:
  edition: WLC
  text: מִ/קּ֗וֹל שַֽׁעֲטַת֙ פַּרְס֣וֹת אַבִּירָ֔י/ו מֵ/רַ֣עַשׁ לְ/רִכְבּ֔/וֹ הֲמ֖וֹן
    גַּלְגִּלָּ֑י/ו לֹֽא הִפְנ֤וּ אָבוֹת֙ אֶל בָּנִ֔ים מֵֽ/רִפְי֖וֹן יָדָֽיִם־־׃
translation:
  text: At the sound of the stamping of the hooves of his mighty horses, at the rumbling
    of his chariots, the roar of his wheels, fathers do not turn to their sons because
    of the helplessness of their hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'because of slackness/feebleness of hands,' an idiom for panic-induced
      weakness or helplessness.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקּוֹל
  chosen: At the sound of
  alternatives:
  - From the sound of
  - Because of the sound of
  lexicon: HALOT
  rationale: The preposition מִן with קוֹל can mark source or cause. In English, 'At
    the sound of' naturally conveys the causal-trigger sense in this poetic war context
    without over-paraphrasing.
- source_word: שַׁעֲטַת
  chosen: the stamping
  alternatives:
  - the galloping
  - the rushing
  lexicon: HALOT
  rationale: The noun denotes the pounding or rushing sound/motion of horses. 'Stamping'
    preserves the auditory emphasis created by the surrounding sound terms better
    than the more motion-focused 'galloping.'
- source_word: פַּרְסוֹת
  chosen: the hooves
  alternatives:
  - the hoofbeats
  lexicon: HALOT
  rationale: The noun literally means 'hooves.' Since the verse already foregrounds
    sound with מִקּוֹל, rendering the concrete noun as 'hooves' keeps the imagery
    vivid; the sound is supplied by the larger phrase.
- source_word: אַבִּירָיו
  chosen: his mighty horses
  alternatives:
  - his strong ones
  - his stallions
  lexicon: HALOT
  rationale: אַבִּיר can mean 'mighty one' and in military-poetic contexts can refer
    to powerful horses. Given the immediate collocation with hooves, 'his mighty horses'
    makes the referent explicit in idiomatic English.
- source_word: מֵרַעַשׁ
  chosen: at the rumbling of
  alternatives:
  - from the noise of
  - because of the crashing of
  lexicon: HALOT
  rationale: רַעַשׁ denotes shaking, noise, or rumbling. 'Rumbling' fits the heavy
    military approach of chariots and pairs well with the prior sound imagery.
- source_word: לְרִכְבּוֹ
  chosen: his chariots
  alternatives:
  - his chariotry
  - his chariot
  lexicon: HALOT
  rationale: Though singular in form with suffix, the collective sense is best represented
    in English by the plural 'chariots' in this military description.
- source_word: הֲמוֹן
  chosen: the roar
  alternatives:
  - the din
  - the tumult
  lexicon: HALOT
  rationale: The noun often denotes a loud multitude-noise or tumult. 'Roar' suits
    the sound of wheels in motion and keeps the line forceful and concrete.
- source_word: גַּלְגִּלָּיו
  chosen: his wheels
  alternatives:
  - his wheelwork
  lexicon: HALOT
  rationale: The noun here refers to wheels, specifically of the chariots. The straightforward
    rendering is best.
- source_word: לֹא הִפְנוּ
  chosen: do not turn
  alternatives:
  - do not turn back
  - do not look back
  lexicon: HALOT
  rationale: The verb means to turn or turn toward. In context it describes fathers
    failing even to turn toward their children in panic. 'Do not turn' is concise
    and faithful.
- source_word: אָבוֹת אֶל בָּנִים
  chosen: fathers ... to their sons
  alternatives:
  - fathers ... to their children
  lexicon: HALOT
  rationale: 'The Hebrew is specifically masculine/plural: ''fathers'' and ''sons.''
    Per gender-accurate policy, the translation preserves the male terms rather than
    neutralizing them.'
- source_word: מֵרִפְיוֹן יָדָיִם
  chosen: because of the helplessness of their hands
  alternatives:
  - because of limp hands
  - because their hands hang slack
  - because of feeble hands
  lexicon: HALOT
  rationale: The idiom literally refers to slackness or feebleness of hands, expressing
    loss of strength/courage. 'Helplessness of their hands' preserves the bodily image
    while making the idiom intelligible in modern English.
