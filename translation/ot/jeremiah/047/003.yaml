theological_decisions:
- issue: Gendered kinship terms
  chosen_reading: fathers ... sons
  alternative_readings:
  - fathers ... children
  rationale: The Hebrew uses specifically masculine kinship terms. Following the translation
    philosophy's gender-accurate principle, the rendering preserves the source wording
    rather than broadening it to a generic expression.
