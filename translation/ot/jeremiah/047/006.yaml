id: JER.47.6
reference: Jeremiah 47:6
source:
  edition: WLC
  text: ה֗וֹי חֶ֚רֶב לַֽ/יהוָ֔ה עַד אָ֖נָה לֹ֣א תִשְׁקֹ֑טִי הֵאָֽסְפִי֙ אַל תַּעְרֵ֔/ךְ הֵרָגְעִ֖י וָ/דֹֽמִּי־־׃
translation:
  text: Ah, sword of Yahweh, how long will you not be quiet? Put yourself back into your sheath; rest and be still.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Alas, sword of the LORD.' The opening interjection can express lament as well as woe.
    reason: lexical_alternative
  - marker: b
    text: Literally 'Gather yourself into your sheath'; 'Return to your sheath' expresses the sense idiomatically.
    reason: lexical_alternative
  - marker: c
    text: Or 'your scabbard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Ah
  alternatives:
  - Alas
  - Woe
  lexicon: HALOT
  rationale: An interjection of lament or distress. Here it introduces an anguished apostrophe to the sword rather than a prophetic woe-oracle against a people, so 'Ah' best fits natural English while preserving lament.
- source_word: חֶרֶב
  chosen: sword
  lexicon: HALOT
  rationale: Literal 'sword,' personified as the instrument of divine judgment. No reason to paraphrase.
- source_word: לַיהוָה
  chosen: of the LORD
  alternatives:
  - belonging to the LORD
  - for the LORD
  lexicon: HALOT
  rationale: 'The lamed marks relation/possession here: the sword is the LORD''s instrument. Per doctrine, יהוה is rendered ''the LORD.'' ''Of the LORD'' is concise and idiomatic.'
- source_word: עַד אָנָה
  chosen: how long
  alternatives:
  - until when
  lexicon: HALOT
  rationale: Standard idiom of lament/questioning duration.
- source_word: לֹא תִשְׁקֹטִי
  chosen: will you not be quiet
  alternatives:
  - will you not be at rest
  - will you not be still
  lexicon: HALOT
  rationale: Second feminine singular agrees with 'sword.' The verb denotes quietness/rest from activity. 'Be quiet' works well in context and avoids flattening the personification.
- source_word: הֵאָסְפִי
  chosen: Return
  alternatives:
  - Gather yourself
  - Withdraw
  lexicon: HALOT
  rationale: Imperative to the sword. Literally 'gather yourself,' but in context of a sword entering its sheath, 'Return' communicates the intended motion in natural English without undue paraphrase.
- source_word: תַּעְרֵךְ
  chosen: your sheath
  alternatives:
  - your scabbard
  lexicon: HALOT
  rationale: The noun denotes the sword's sheath/scabbard. 'Sheath' is more common modern English than 'scabbard' while remaining precise.
- source_word: הֵרָגְעִי
  chosen: rest
  alternatives:
  - be at ease
  - be quiet
  lexicon: HALOT
  rationale: Imperative calling for cessation and repose. 'Rest' pairs naturally with the following verb and reflects the semantic field of settling down.
- source_word: וָדֹמִּי
  chosen: be still
  alternatives:
  - be silent
  - be quiet
  lexicon: HALOT
  rationale: Imperative from דמם, often conveying stillness/silence. 'Be still' complements 'rest' and preserves the poetic parallelism.
