id: JER.47.2
reference: Jeremiah 47:2
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה הִנֵּה מַ֜יִם עֹלִ֤ים מִ/צָּפוֹן֙ וְ/הָיוּ֙ לְ/נַ֣חַל
    שׁוֹטֵ֔ף וְ/יִשְׁטְפוּ֙ אֶ֣רֶץ וּ/מְלוֹאָ֔/הּ עִ֖יר וְ/יֹ֣שְׁבֵי בָ֑/הּ וְ/זָֽעֲקוּ֙
    הָֽ/אָדָ֔ם וְ/הֵילִ֕ל כֹּ֖ל יוֹשֵׁ֥ב הָ/אָֽרֶץ׀־׃
translation:
  text: 'Thus says the LORD: Behold, waters are rising from the north, and they will
    become an overflowing torrent; they will overflow the land and its fullness, the
    city and those who dwell in it. Then mankind will cry out, and every inhabitant
    of the land will wail.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land and all that is in it.'
    reason: lexical_alternative
  - marker: b
    text: The image is of floodwaters from the north, likely symbolizing an invading
      force coming from that direction.
    reason: cultural_note
  - marker: c
    text: Hebrew 'man' / 'mankind,' used here collectively for humanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the covenant name through small-caps convention in English rather than transliteration.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic deictic force and solemnity of the announcement.
    'Behold' is still readable here and fits prophetic style better than a flatter
    'look'.
- source_word: מַיִם עֹלִים מִצָּפוֹן
  chosen: waters are rising from the north
  alternatives:
  - water is rising from the north
  - floodwaters are coming up from the north
  lexicon: HALOT
  rationale: Plural 'waters' matches the Hebrew form and preserves the image of threatening
    inundation. 'From the north' likely carries geopolitical force (invading army
    from the north) through flood imagery, but the main text keeps the metaphor rather
    than explicating it.
- source_word: וְהָיוּ לְנַחַל שׁוֹטֵף
  chosen: they will become an overflowing torrent
  alternatives:
  - they will become a flooding stream
  - they will become a rushing wadi
  lexicon: HALOT
  rationale: נחל can denote a streambed/torrent valley, but in context the sense is
    a flood-swollen torrent. 'Overflowing torrent' communicates both the water imagery
    and destructive force in natural English.
- source_word: וְיִשְׁטְפוּ
  chosen: they will overflow
  alternatives:
  - they will sweep over
  - they will inundate
  lexicon: HALOT
  rationale: Keeps the verbal link with שׁוֹטֵף and preserves the flood metaphor.
    'Overflow' is slightly more formal and closer to the imagery than the more interpretive
    'sweep over'.
- source_word: אֶרֶץ וּמְלוֹאָהּ
  chosen: the land and its fullness
  alternatives:
  - the earth and all that fills it
  - the land and all that is in it
  lexicon: HALOT
  rationale: מְלוֹא often means that which fills something. 'Its fullness' is a transparent
    rendering that preserves the compact Hebrew expression; a footnote preserves the
    more idiomatic alternative.
- source_word: עִיר וְיֹשְׁבֵי בָהּ
  chosen: the city and those who dwell in it
  alternatives:
  - the city and its inhabitants
  lexicon: HALOT
  rationale: This more formally reflects the Hebrew pair while remaining natural English.
    It also preserves the movement from territory to urban center to population.
- source_word: הָאָדָם
  chosen: mankind
  alternatives:
  - man
  - humanity
  - people
  lexicon: HALOT
  rationale: The project prefers gender-accurate renderings. Here הָאָדָם is collective/generic
    rather than an individual male, so 'mankind' preserves the representative human
    sense better than the less specific 'people'.
- source_word: וְהֵילִל כֹּל יוֹשֵׁב הָאָרֶץ
  chosen: every inhabitant of the land will wail
  alternatives:
  - all who dwell in the land will howl
  - every resident of the earth will wail
  lexicon: HALOT
  rationale: הֵילִל denotes lamenting/wailing. 'Wail' fits the judgment context without
    sounding overly archaic. הָאָרֶץ here is best taken as 'the land' in the local/oracular
    sense rather than the whole earth.
