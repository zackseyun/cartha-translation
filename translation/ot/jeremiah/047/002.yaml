theological_decisions:
- issue: Gendered collective noun in הָאָדָם
  chosen_reading: mankind
  alternative_readings:
  - man
  - humanity
  - people
  rationale: In line with the doctrine's gender-accurate principle, the Hebrew is
    grammatically masculine but generic/collective. 'Mankind' preserves the human
    collective sense without flattening the source to an ungendered abstraction or
    a merely sociological 'people'.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם
    adam'
- issue: Implicit metaphor of invading army as flood from the north
  chosen_reading: Preserved as flood imagery in the main text without explicit interpretive
    expansion
  alternative_readings:
  - Explicitly interpret as an army from the north
  rationale: The Hebrew presents the threat through water imagery. Since the metaphor
    is intelligible on its own and the verse does not explicitly name the army, the
    translation preserves the image rather than resolving it into commentary.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
