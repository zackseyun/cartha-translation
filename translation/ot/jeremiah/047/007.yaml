theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and LXX-influenced English convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Referent of the feminine singular pronouns
  chosen_reading: The feminine singular refers to the sword personified from Jeremiah
    47:6, rendered with mixed English personification ('you' / 'it') for readability.
  alternative_readings:
  - Render all references as 'it'
  - Render all references as 'her'
  rationale: Hebrew maintains feminine singular reference to the sword. English can
    preserve the rhetorical address with 'you' in the question, but later 'it' sounds
    more natural than repeatedly personifying the sword as 'her.' This balances formal
    linkage with readable modern English.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; readable
    modern English'
