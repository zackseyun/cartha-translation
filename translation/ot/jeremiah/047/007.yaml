id: JER.47.7
reference: Jeremiah 47:7
source:
  edition: WLC
  text: אֵ֣יךְ תִּשְׁקֹ֔טִי וַֽ/יהוָ֖ה צִוָּה לָ֑/הּ אֶֽל אַשְׁקְל֛וֹן וְ/אֶל ח֥וֹף
    הַ/יָּ֖ם שָׁ֥ם יְעָדָֽ/הּ־־־׃ס
translation:
  text: How can you be quiet when the LORD has commanded you? Against Ashkelon and
    against the seacoast—there he has appointed it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''has commanded her/it'' and ''he has appointed her/it,'' referring
      to the sword personified in the previous verse.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to Ashkelon and to the shore of the sea'; the preposition can be rendered
      more literally, though here it implies the sword's hostile commission against
      them.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  chosen: How can
  alternatives:
  - How
  - How could
  lexicon: HALOT
  rationale: Introduces a rhetorical question of possibility/propriety. 'How can'
    captures the force in natural English better than a bare 'How'.
- source_word: תִּשְׁקֹטִי
  chosen: you be quiet
  alternatives:
  - you be still
  - you rest
  - you be at peace
  lexicon: HALOT
  rationale: From שקט, 'be quiet/still, be undisturbed.' Address is feminine singular,
    referring back to the sword in the prior verse; 'be quiet' fits the personified
    weapon and the context of ceasing from action.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render YHWH as 'the LORD'.
- source_word: צִוָּה לָהּ
  chosen: has commanded you
  alternatives:
  - has given it a command
  - has commanded it
  - has ordered you
  lexicon: HALOT
  rationale: The Hebrew has 3ms verb with 3fs suffix, 'has commanded her/it,' again
    referring to the feminine singular sword. In English, retaining the direct address
    from 'How can you be quiet' as 'commanded you' preserves coherence and the personification.
- source_word: אֶל אַשְׁקְלוֹן
  chosen: Against Ashkelon
  alternatives:
  - To Ashkelon
  - Toward Ashkelon
  - At Ashkelon
  lexicon: HALOT
  rationale: Although אֶל is basically 'to/toward,' in context of the sword's commission
    it carries hostile directional force; 'Against Ashkelon' makes the implied judgment
    sense explicit without over-paraphrasing.
- source_word: חוֹף הַיָּם
  chosen: the seacoast
  alternatives:
  - the shore of the sea
  - the coast of the sea
  lexicon: HALOT
  rationale: Idiomatic rendering of 'shore/coast of the sea.' 'Seacoast' is concise
    and natural English.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb pointing to the destinations just named.
- source_word: יְעָדָהּ
  chosen: he has appointed it
  alternatives:
  - he has assigned it
  - he has directed it
  - he has summoned it
  lexicon: HALOT
  rationale: From יעד in the sense of appointing/assigning. The 3fs suffix again refers
    to the sword; English 'it' is suitable here after the direct address earlier in
    the verse. 'Appointed it' preserves divine intentionality in the sword's mission.
