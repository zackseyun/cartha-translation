id: JER.47.5
reference: Jeremiah 47:5
source:
  edition: WLC
  text: בָּ֤אָה קָרְחָה֙ אֶל עַזָּ֔ה נִדְמְתָ֥ה אַשְׁקְל֖וֹן שְׁאֵרִ֣ית עִמְקָ֑/ם
    עַד מָתַ֖י תִּתְגּוֹדָֽדִי־־׃ס
translation:
  text: Baldness has come upon Gaza; Ashkelon has been silenced, the remnant of their
    valley. How long will you gash yourself?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ashkelon is cut off' / 'Ashkelon has perished.' The Hebrew verb can
      carry the sense of being silenced, stilled, or destroyed.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the remnant of their valley.' Some interpreters, following ancient
      versions or a different vocalization, understand this phrase differently, including
      'the remnant of the Anakim.'
    reason: alternative_reading
  - marker: c
    text: Self-gashing was a customary act of mourning in the ancient Near East.
    reason: cultural_note
lexical_decisions:
- source_word: קָרְחָה
  chosen: baldness
  alternatives:
  - shaving bald
  - tonsure
  lexicon: HALOT
  rationale: The noun denotes baldness, here a conventional sign of mourning/disaster.
    'Baldness' preserves the image without over-interpreting it as an imperative act.
- source_word: בָּאָה ... אֶל עַזָּה
  chosen: has come upon Gaza
  alternatives:
  - has come to Gaza
  lexicon: HALOT
  rationale: With בוא plus אֶל, the sense is arrival against/upon Gaza. 'Has come
    upon' better conveys the ominous force in context than the more neutral 'has come
    to.'
- source_word: נִדְמְתָה
  chosen: has been silenced
  alternatives:
  - is cut off
  - has perished
  - has been destroyed
  lexicon: HALOT
  rationale: The Niphal of דמה can denote being silenced, stilled, or destroyed. 'Has
    been silenced' keeps the core image of being brought to stillness while allowing
    the destruction sense to remain implicit in the war oracle context.
- source_word: שְׁאֵרִית
  chosen: the remnant
  alternatives:
  - the remainder
  - survivors
  lexicon: HALOT
  rationale: '''Remnant'' is the standard and contextually fitting rendering for what
    remains after judgment.'
- source_word: עִמְקָם
  chosen: their valley
  alternatives:
  - their plain
  - the Anakim
  lexicon: HALOT
  rationale: The consonantal text points naturally to 'their valley' from עמק with
    3mp suffix. Some ancient versions and interpreters reflect a different reading/tradition,
    but the MT is best represented in the main text.
- source_word: תִּתְגּוֹדָדִי
  chosen: will you gash yourself
  alternatives:
  - will you cut yourself
  - will you make incisions
  lexicon: HALOT
  rationale: The Hitpolel/reflexive form of גדד refers to self-laceration as a mourning
    practice. 'Gash yourself' is vivid, natural English and preserves the reflexive
    force.
- source_word: עַד מָתַי
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Standard idiomatic rendering in English for the lament/question formula.
