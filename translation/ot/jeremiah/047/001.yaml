id: JER.47.1
reference: Jeremiah 47:1
source:
  edition: WLC
  text: אֲשֶׁ֨ר הָיָ֧ה דְבַר יְהוָ֛ה אֶל יִרְמְיָ֥הוּ הַ/נָּבִ֖יא אֶל פְּלִשְׁתִּ֑ים
    בְּ/טֶ֛רֶם יַכֶּ֥ה פַרְעֹ֖ה אֶת עַזָּֽה־־־־׃ס
translation:
  text: This is the word of the LORD that came to Jeremiah the prophet concerning
    the Philistines, before Pharaoh struck Gaza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which came to Jeremiah the prophet concerning the Philistines.' The
      Hebrew opens with a relative construction functioning as a heading.
    reason: lexical_alternative
  - marker: b
    text: Or 'against the Philistines.' The preposition can introduce the subject
      of an oracle and, in judgment contexts, may be understood adversatively.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: This is
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: The verse opens a superscription-like clause carried over idiomatically
    in English. A strictly formal 'which was' is awkward as a standalone verse opening;
    'This is' makes the heading function clear while preserving the referential force
    of the relative particle in context.
- source_word: הָיָה
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: In the prophetic formula 'the word of YHWH came to ...', English idiom
    normally uses 'came' rather than 'was,' reflecting the sense of occurrence/revelation
    rather than mere existence.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Word' preserves the formal and theological
    weight of divine revelation better than the more interpretive 'message.' 'the
    LORD' follows the project's default for YHWH.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אֶל יִרְמְיָהוּ הַנָּבִיא
  chosen: to Jeremiah the prophet
  alternatives:
  - to Yirmeyahu the prophet
  lexicon: HALOT
  rationale: אֶל marks the recipient of the revelatory word. The personal name is
    transliterated by standard English convention as 'Jeremiah,' and the appositional
    title is translated.
- source_word: אֶל פְּלִשְׁתִּים
  chosen: concerning the Philistines
  alternatives:
  - against the Philistines
  - to the Philistines
  lexicon: HALOT
  rationale: With prophetic headings, אֶל can introduce the subject matter/oracle
    target. 'Concerning' is broad and accurate here, avoiding prematurely specifying
    hostility with 'against,' though the wider context is judgment.
- source_word: בְּטֶרֶם
  chosen: before
  alternatives:
  - prior to the time when
  lexicon: HALOT
  rationale: Temporal marker indicating the oracle came before the historical event
    that follows.
- source_word: יַכֶּה
  chosen: struck
  alternatives:
  - would strike
  - attacked
  - smote
  lexicon: HALOT
  rationale: The Hiphil of נכה commonly means 'strike/defeat.' In English, a simple
    past works naturally in this temporal clause. 'Struck' is more precise and less
    interpretive than 'attacked.'
- source_word: פַרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English form of the royal title/name.
- source_word: עַזָּה
  chosen: Gaza
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
