id: JER.28.11
reference: Jeremiah 28:11
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר חֲנַנְיָה֩ לְ/עֵינֵ֨י כָל הָ/עָ֜ם לֵ/אמֹ֗ר כֹּה֮ אָמַ֣ר יְהוָה֒
    כָּ֣כָה אֶשְׁבֹּ֞ר אֶת עֹ֣ל נְבֻֽכַדְנֶאצַּ֣ר מֶֽלֶךְ בָּבֶ֗ל בְּ/עוֹד֙ שְׁנָתַ֣יִם
    יָמִ֔ים מֵ/עַ֕ל צַוַּ֖אר כָּל הַ/גּוֹיִ֑ם וַ/יֵּ֛לֶךְ יִרְמְיָ֥ה הַ/נָּבִ֖יא לְ/דַרְכּֽ/וֹ־־׀־־׃פ
translation:
  text: 'And Hananiah said in the sight of all the people, saying, “Thus says the
    LORD: In this way I will break the yoke of Nebuchadnezzar king of Babylon from
    upon the neck of all the nations within two years.” Then Jeremiah the prophet
    went on his way.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “before all the people.”
    reason: lexical_alternative
  - marker: b
    text: The phrase “In this way” likely echoes Hananiah’s symbolic action of breaking
      the yoke.
    reason: cultural_note
lexical_decisions:
- source_word: לְעֵינֵי
  chosen: in the sight of
  alternatives:
  - before
  - in the presence of
  lexicon: HALOT
  rationale: The idiom literally involves 'eyes' but means public visibility/presence.
    'In the sight of' preserves the Hebrew imagery while remaining natural English.
- source_word: כֹּה ... כָּכָה
  chosen: Thus ... In this way
  alternatives:
  - Thus ... thus
  - This is what ... like this
  lexicon: HALOT
  rationale: The verse uses two near-deictic adverbs. Rendering the first as the standard
    prophetic formula 'Thus says' and the second as 'In this way' preserves the rhetorical
    distinction and likely points to Hananiah's enacted sign of breaking the yoke.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: אֶשְׁבֹּר
  chosen: I will break
  alternatives:
  - I am about to break
  lexicon: HALOT
  rationale: The imperfect here is naturally future in the prophetic declaration.
    'Break' fits the concrete image of smashing a yoke.
- source_word: עֹל
  chosen: yoke
  alternatives:
  - bar of the yoke
  lexicon: HALOT
  rationale: '''Yoke'' is the standard and contextually clear image for political
    subjugation in Jeremiah.'
- source_word: בְּעוֹד שְׁנָתַיִם יָמִים
  chosen: within two years
  alternatives:
  - in two years' time
  - for two full years
  lexicon: HALOT
  rationale: The idiom literally includes 'days' with 'two years' and means a period
    not exceeding two years. 'Within two years' is idiomatic English and captures
    the temporal force better than a wooden rendering.
- source_word: מֵעַל צַוַּאר
  chosen: from upon the neck of
  alternatives:
  - from off the neck of
  - from the neck of
  lexicon: HALOT
  rationale: This preserves the vivid physical metaphor of a yoke resting on the neck
    while remaining readable.
- source_word: כָּל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the peoples
  - all the Gentiles
  lexicon: HALOT
  rationale: In Jeremiah's international context, גוים refers to nations/peoples under
    Babylonian domination, not specifically Gentiles in a later theological sense.
- source_word: וַיֵּלֶךְ ... לְדַרְכּוֹ
  chosen: Then Jeremiah the prophet went on his way
  alternatives:
  - and Jeremiah the prophet went his way
  - and Jeremiah the prophet departed
  lexicon: HALOT
  rationale: The idiom means he left and continued on his course. 'Went on his way'
    is natural English and preserves the narrative movement.
