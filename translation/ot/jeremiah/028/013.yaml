id: JER.28.13
reference: Jeremiah 28:13
source:
  edition: WLC
  text: הָלוֹךְ֩ וְ/אָמַרְתָּ֨ אֶל חֲנַנְיָ֜ה לֵ/אמֹ֗ר כֹּ֚ה אָמַ֣ר יְהוָ֔ה מוֹטֹ֥ת
    עֵ֖ץ שָׁבָ֑רְתָּ וְ/עָשִׂ֥יתָ תַחְתֵּי/הֶ֖ן מֹט֥וֹת בַּרְזֶֽל־׃
translation:
  text: 'Go and say to Hananiah, saying, ‘Thus says the LORD: You have broken wooden
    yoke-bars, but you have made iron yoke-bars in their place.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wooden yokes ... iron yokes.' The Hebrew term refers more precisely
      to the bars or poles of a yoke, but the broader sense 'yokes' is also possible
      in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלוֹךְ
  chosen: Go
  alternatives:
  - Go on
  - Go your way
  lexicon: HALOT
  rationale: Qal infinitive absolute of הלך used imperativally in sequence with the
    following finite verb; concise English imperative 'Go' best captures the command
    idiom.
- source_word: וְאָמַרְתָּ
  chosen: and say
  alternatives:
  - then say
  - you shall say
  lexicon: HALOT
  rationale: Second masculine singular with conjunction continuing the command sequence.
    Rendered as coordinate imperative in English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  - ':'
  lexicon: HALOT
  rationale: Introduces direct speech. Retained with 'saying' to reflect Hebrew discourse
    structure, though punctuated naturally in English.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - Thus said the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. YHWH rendered 'the LORD' per doctrine
    guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD'.
- source_word: מוֹטֹת עֵץ
  chosen: wooden yoke-bars
  alternatives:
  - bars of wood
  - wooden bars
  - wooden yokes
  lexicon: HALOT
  rationale: מוֹטוֹת refers to bars/poles, and in this context specifically the bars
    of a yoke-sign Jeremiah had been wearing. 'Wooden yoke-bars' preserves the concrete
    image better than the more interpretive 'yokes' while making the object intelligible.
- source_word: שָׁבָרְתָּ
  chosen: you have broken
  alternatives:
  - you broke
  lexicon: HALOT
  rationale: Perfect verb referring to Hananiah's completed action. English present
    perfect fits the immediate relevance of the completed act in the prophetic rebuke.
- source_word: וְעָשִׂיתָ
  chosen: but you have made
  alternatives:
  - and you have made
  - so you have made
  lexicon: HALOT
  rationale: 'Though waw can be simply conjunctive, the sense here is adversative/resultative:
    Hananiah''s action has led instead to a harsher replacement. ''But'' brings out
    the contrast implied by the context.'
- source_word: תַחְתֵּיהֶן
  chosen: in their place
  alternatives:
  - instead of them
  - under them
  lexicon: HALOT
  rationale: The preposition תחת in this context denotes substitution/replacement,
    not physical location. 'In their place' is idiomatic English.
- source_word: מֹטוֹת בַּרְזֶל
  chosen: iron yoke-bars
  alternatives:
  - bars of iron
  - iron bars
  - iron yokes
  lexicon: HALOT
  rationale: Parallel to 'wooden yoke-bars'; keeping 'yoke-bars' in both clauses preserves
    the contrast and the symbolic continuity of the sign-act.
