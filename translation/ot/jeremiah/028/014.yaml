theological_decisions:
- issue: Divine sovereignty over pagan nations and creation
  chosen_reading: The verse is rendered to state plainly that the LORD has decreed
    the nations' service to Nebuchadnezzar and has also granted him authority over
    the beasts of the field.
  alternative_readings:
  - A softer political reading that minimizes divine ordination of Babylonian rule
  rationale: The Hebrew twice uses נתן ('I have put/given'), presenting Babylon's
    dominance as an act of God's sovereign judgment. The translation preserves that
    force without adding theological commentary beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Temporal force of the verbs
  chosen_reading: 'Completed divine action with ongoing/future effect: ''I have put
    ... and they will serve him ... I have also given him.'''
  alternative_readings:
  - 'Simple past throughout: ''I put ... and they served him ... I gave him'''
  rationale: The prophetic perfect in Hebrew often presents a future certainty as
    a completed divine decree. Rendering the first and last verbs as present-result
    perfects and the middle clause as future best captures the discourse flow in English.
  doctrine_reference: Translation philosophy §6
