id: JER.28.14
reference: Jeremiah 28:14
source:
  edition: WLC
  text: כִּ֣י כֹֽה אָמַר֩ יְהוָ֨ה צְבָא֜וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֗ל עֹ֣ל בַּרְזֶ֡ל נָתַ֜תִּי
    עַל צַוַּ֣אר כָּל הַ/גּוֹיִ֣ם הָ/אֵ֗לֶּה לַ/עֲבֹ֛ד אֶת נְבֻכַדְנֶאצַּ֥ר מֶֽלֶךְ
    בָּבֶ֖ל וַ/עֲבָדֻ֑/הוּ וְ/גַ֛ם אֶת חַיַּ֥ת הַ/שָּׂדֶ֖ה נָתַ֥תִּי לֽ/וֹ־־׀־־־־׃
translation:
  text: 'For thus says the LORD of hosts, the God of Israel: I have put an iron yoke
    on the neck of all these nations, to serve Nebuchadnezzar king of Babylon, and
    they will serve him. I have also given him the beasts of the field.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Nebuchadnezzar'; Jeremiah elsewhere often has a spelling reflected
      in English as 'Nebuchadrezzar.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a yoke of iron.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the LXX pattern.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the divine title יְהוָה צְבָאוֹת, 'hosts' preserves the established
    sense of heavenly/earthly armies without over-specifying one referent.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct rendering; preserves covenantal identification.
- source_word: עֹל בַּרְזֶל
  chosen: an iron yoke
  alternatives:
  - a yoke of iron
  lexicon: HALOT
  rationale: English idiom favors 'an iron yoke.' The phrase intensifies the earlier
    broken wooden yoke context by indicating harsher, unbreakable subjugation.
- source_word: נָתַתִּי
  chosen: I have put
  alternatives:
  - I have set
  - I have given
  lexicon: HALOT
  rationale: 'Although נתן is broadly ''give/put/set,'' with ''on the neck'' English
    naturally uses ''put.'' The perfect is rendered with present relevance: a completed
    divine act now in force.'
- source_word: עַל צַוַּאר
  chosen: on the neck
  alternatives:
  - upon the neck
  lexicon: HALOT
  rationale: Singular 'neck' is retained from the Hebrew collective expression rather
    than smoothing to plural.
- source_word: כָּל הַגּוֹיִם הָאֵלֶּה
  chosen: all these nations
  alternatives:
  - all these peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers to political nations under Babylonian domination,
    so 'nations' is the most precise rendering.
- source_word: לַעֲבֹד
  chosen: to serve
  alternatives:
  - to be subject to
  - to work for
  lexicon: HALOT
  rationale: עבד with a ruler commonly denotes political servitude/service. 'Serve'
    preserves the lexical link with the following verb.
- source_word: נְבֻכַדְנֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: A standard English transliteration is used for readability and convention,
    even though Jeremiah often preserves a form closer to Akkadian in Hebrew spelling.
- source_word: וַעֲבָדֻהוּ
  chosen: and they will serve him
  alternatives:
  - and they shall serve him
  lexicon: HALOT
  rationale: The waw + perfect here carries future/resultative force in context. 'Will
    serve' is natural modern English and reflects the prophetic declaration of what
    is to happen.
- source_word: וְגַם
  chosen: also
  alternatives:
  - even
  - moreover
  lexicon: HALOT
  rationale: '''Also'' clearly marks addition without overstating emphasis.'
- source_word: חַיַּת הַשָּׂדֶה
  chosen: the beasts of the field
  alternatives:
  - the wild animals
  - the animals of the field
  lexicon: HALOT
  rationale: This is a common biblical expression. 'Beasts of the field' preserves
    the idiom and its broad reference to animal life under divine grant.
- source_word: נָתַתִּי לוֹ
  chosen: I have given him
  alternatives:
  - I have handed over to him
  lexicon: HALOT
  rationale: The same verb נתן is kept consistent as 'given' here because the direct
    object is not spatially located but transferred into Nebuchadnezzar's dominion.
