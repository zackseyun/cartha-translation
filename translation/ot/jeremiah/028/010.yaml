id: JER.28.10
reference: Jeremiah 28:10
source:
  edition: WLC
  text: וַ/יִּקַּ֞ח חֲנַנְיָ֤ה הַ/נָּבִיא֙ אֶת הַ/מּוֹטָ֔ה מֵ/עַ֕ל צַוַּ֖אר יִרְמְיָ֣ה
    הַ/נָּבִ֑יא וַֽ/יִּשְׁבְּרֵֽ/הוּ־׃
translation:
  text: Then Hananiah the prophet took the yoke from off the neck of Jeremiah the
    prophet and broke it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bar' or 'the yoke-bar.' The Hebrew term can refer to the wooden
      bar of a yoke; 'yoke' is used here because the surrounding sign-act centers
      on a yoke placed on Jeremiah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - seized
  - took away
  lexicon: HALOT
  rationale: The verb לקח in the waw-consecutive narrative form straightforwardly
    means 'took.' 'Seized' would add force not explicit in the verb itself, though
    the action is hostile in context.
- source_word: חֲנַנְיָה
  chosen: Hananiah
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: נָבִיא is the standard term for 'prophet.' The appositional use after
    both Hananiah and Jeremiah is retained for clarity and rhetorical emphasis.
- source_word: הַמּוֹטָה
  chosen: the yoke
  alternatives:
  - the bar
  - the yoke-bar
  lexicon: HALOT
  rationale: מוֹטָה can denote a bar or pole, but in this context Jeremiah has been
    wearing a symbolic yoke (cf. surrounding passage). 'Yoke' best communicates the
    object in context without overcomplicating the English. The more literal 'bar'
    is preserved as an alternative.
- source_word: מֵעַל
  chosen: from off
  alternatives:
  - from upon
  - off of
  lexicon: HALOT
  rationale: The preposition literally means 'from upon/from off.' 'From off' preserves
    the vivid physical removal while remaining natural enough in English narrative
    style.
- source_word: צַוַּאר
  chosen: the neck
  lexicon: HALOT
  rationale: Standard rendering of 'neck.' The definite sense is carried in English
    by 'the neck' in relation to Jeremiah.
- source_word: יִרְמְיָה
  chosen: Jeremiah
  rationale: Personal name is transliterated by standard English convention.
- source_word: וַיִּשְׁבְּרֵהוּ
  chosen: and broke it
  alternatives:
  - and shattered it
  lexicon: HALOT
  rationale: שׁבר means 'break.' 'Shattered' is possible but stronger than necessary.
    The pronominal suffix is represented by 'it,' referring to the yoke.
