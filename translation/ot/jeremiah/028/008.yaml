theological_decisions:
- issue: Sense of prophetic prepositions in a judgment oracle
  chosen_reading: The prophets 'prophesied against many lands and against great kingdoms.'
  alternative_readings:
  - The prophets 'prophesied to many lands and against great kingdoms'
  - The prophets 'prophesied concerning many lands and great kingdoms'
  rationale: The immediate context contrasts Jeremiah's message with Hananiah's optimistic
    prophecy. The triad 'war and disaster and plague' shows these were oracles of
    judgment, so an adversative rendering is warranted rather than a neutral one.
