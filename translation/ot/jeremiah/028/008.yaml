id: JER.28.8
reference: Jeremiah 28:8
source:
  edition: WLC
  text: הַ/נְּבִיאִ֗ים אֲשֶׁ֨ר הָי֧וּ לְ/פָנַ֛/י וּ/לְ/פָנֶ֖י/ךָ מִן הָֽ/עוֹלָ֑ם וַ/יִּנָּ֨בְא֜וּ
    אֶל אֲרָצ֤וֹת רַבּוֹת֙ וְ/עַל מַמְלָכ֣וֹת גְּדֹל֔וֹת לְ/מִלְחָמָ֖ה וּ/לְ/רָעָ֥ה
    וּ/לְ/דָֽבֶר־־־׃
translation:
  text: The prophets who were before me and before you from ancient times prophesied
    against many lands and against great kingdoms, of war and disaster and plague.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from of old.' The Hebrew expression refers here to long-past time, not
      necessarily eternity.
    reason: lexical_alternative
  - marker: b
    text: Or 'pestilence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּבִיאִים
  chosen: The prophets
  lexicon: HALOT
  rationale: Definite plural noun; straightforwardly rendered 'the prophets.'
- source_word: אֲשֶׁר הָיוּ לְפָנַי וּלְפָנֶיךָ
  chosen: who were before me and before you
  alternatives:
  - who came before me and before you
  - who were prior to me and to you
  lexicon: HALOT
  rationale: לְפָנַי/לְפָנֶיךָ here is temporal rather than spatial, referring to
    earlier prophets. 'Were before' preserves the Hebrew idiom while remaining natural
    English.
- source_word: מִן הָעוֹלָם
  chosen: from ancient times
  alternatives:
  - from of old
  - from everlasting
  lexicon: HALOT
  rationale: In this context עוֹלָם refers to antiquity/long past time, not metaphysical
    eternity. 'From ancient times' communicates the temporal sense clearly in modern
    English.
- source_word: וַיִּנָּבְאוּ
  chosen: prophesied
  lexicon: HALOT
  rationale: Standard rendering of נבא in the prophetic context.
- source_word: אֶל אֲרָצוֹת רַבּוֹת וְעַל מַמְלָכוֹת גְּדֹלוֹת
  chosen: against many lands and against great kingdoms
  alternatives:
  - concerning many lands and great kingdoms
  - to many lands and against great kingdoms
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' with נבא and in this context of judgment
    it carries an adversative sense. Rendering both prepositional phrases with 'against'
    best reflects the sense of hostile prophetic oracles in the following list of
    calamities.
- source_word: לְמִלְחָמָה
  chosen: of war
  alternatives:
  - for war
  - concerning war
  lexicon: HALOT
  rationale: The לְ introduces the content/theme of the prophecy. 'Of war' is concise
    and idiomatic in the sequence.
- source_word: וּלְרָעָה
  chosen: and disaster
  alternatives:
  - and evil
  - and calamity
  lexicon: HALOT
  rationale: רָעָה in judgment contexts commonly denotes calamity/disaster rather
    than moral evil. 'Disaster' is clear modern English and avoids implying moral
    evil as the content of the prophecy.
- source_word: וּלְדָבֶר
  chosen: and plague
  alternatives:
  - and pestilence
  lexicon: HALOT
  rationale: דָבֶר denotes pestilence/plague. 'Plague' is more accessible modern English,
    while preserving the sense of epidemic judgment.
