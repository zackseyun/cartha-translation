id: JER.28.5
reference: Jeremiah 28:5
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ יִרְמְיָ֣ה הַ/נָּבִ֔יא אֶל חֲנַנְיָ֖ה הַ/נָּבִ֑יא לְ/עֵינֵ֤י הַ/כֹּֽהֲנִים֙ וּ/לְ/עֵינֵ֣י כָל הָ/עָ֔ם הָ/עֹמְדִ֖ים בְּ/בֵ֥ית יְהוָֽה־־׃
translation:
  text: 'Then Jeremiah the prophet said to Hananiah the prophet in the sight of the priests and in the sight of all the people who were standing in the house of Yahweh:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before the priests and before all the people.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of the LORD'; that is, the temple.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural English narrative flow while preserving sequence; 'and said' is more formally possible.
- source_word: יִרְמְיָה
  chosen: Jeremiah
  rationale: Standard English transliteration of the personal name.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Definite title identifying Jeremiah's role; repeated for Hananiah as in the Hebrew, so both occurrences are retained for transparency and rhetorical balance.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition in direct speech introduction.
- source_word: חֲנַנְיָה
  chosen: Hananiah
  rationale: Standard English transliteration of the personal name.
- source_word: לְעֵינֵי
  chosen: in the sight of
  alternatives:
  - before
  - in the presence of
  lexicon: HALOT
  rationale: Literally 'to/in the eyes of.' 'In the sight of' preserves the public, witnessed nature of the speech more closely than the smoother 'before.' The repetition is maintained because the Hebrew repeats the phrase.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the definite plural noun.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - all the crowd
  lexicon: HALOT
  rationale: Common covenant-community sense of עָם here refers to the gathered people generally, not merely a crowd in a casual sense.
- source_word: הָעֹמְדִים
  chosen: who were standing
  alternatives:
  - standing
  - who stood
  lexicon: HALOT
  rationale: The participle describes the people as those presently standing there. 'Who were standing' reads naturally in English while preserving the descriptive force.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת is literally 'house.' Although it refers to the temple precinct/contextually the temple, 'house of the LORD' preserves the Hebrew expression. Per doctrine, יְהוָה is rendered 'the LORD.'
