id: JER.28.6
reference: Jeremiah 28:6
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ יִרְמְיָ֣ה הַ/נָּבִ֔יא אָמֵ֕ן כֵּ֖ן יַעֲשֶׂ֣ה יְהוָ֑ה יָקֵ֤ם
    יְהוָה֙ אֶת דְּבָרֶ֔י/ךָ אֲשֶׁ֣ר נִבֵּ֗אתָ לְ/הָשִׁ֞יב כְּלֵ֤י בֵית יְהוָה֙ וְ/כָל
    הַ/גּוֹלָ֔ה מִ/בָּבֶ֖ל אֶל הַ/מָּק֥וֹם הַ/זֶּֽה־־־־׃
translation:
  text: Then Jeremiah the prophet said, “Amen! May the LORD do so; may the LORD fulfill
    your words that you have prophesied, to bring back the vessels of the house of
    the LORD and all the exiles from Babylon to this place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'confirm' or 'establish your words.' The Hebrew verb can mean to make
      words stand, that is, to bring them to pass.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמֵן
  chosen: Amen
  alternatives:
  - So be it
  - Truly
  lexicon: HALOT
  rationale: Retained as the familiar liturgical/interjectional form in English. In
    this context Jeremiah expresses assent or wish, and 'Amen' preserves both the
    Hebrew flavor and the force of agreement/prayer.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: HALOT
  rationale: 'With יַעֲשֶׂה, the adverb points back to Hananiah''s prediction: ''may
    the LORD do so.'' ''So'' is idiomatic and concise.'
- source_word: יַעֲשֶׂה
  chosen: may ... do
  alternatives:
  - will do
  - does
  lexicon: HALOT
  rationale: 'The imperfect here is best taken jussively after ''Amen,'' expressing
    wish rather than simple future: Jeremiah voices a hope, not a prediction.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md,
    preserving reverential convention and standard English Bible practice.
- source_word: יָקֵם
  chosen: fulfill
  alternatives:
  - confirm
  - establish
  - carry out
  lexicon: HALOT
  rationale: From קום in the Hiphil, the sense is causing words to stand or come to
    pass. 'Fulfill' communicates the idiomatic force naturally in English for spoken
    prophetic words.
- source_word: דְּבָרֶיךָ
  chosen: your words
  alternatives:
  - your message
  - your sayings
  lexicon: HALOT
  rationale: A straightforward rendering of the plural construct with suffix. 'Words'
    preserves the concrete Hebrew expression and fits the prophetic context.
- source_word: נִבֵּאתָ
  chosen: you have prophesied
  alternatives:
  - you prophesied
  lexicon: HALOT
  rationale: The perfect refers to Hananiah's prior prophetic utterance. English present
    perfect fits the discourse context by linking his earlier speech to Jeremiah's
    response.
- source_word: לְהָשִׁיב
  chosen: to bring back
  alternatives:
  - to restore
  - to return
  lexicon: HALOT
  rationale: The infinitive of שוב here governs both temple vessels and exiles. 'Bring
    back' works naturally for both objects and preserves the movement back to Judah/Jerusalem.
- source_word: כְּלֵי בֵית יְהוָה
  chosen: the vessels of the house of the LORD
  alternatives:
  - the vessels of the LORD's house
  - the temple vessels
  lexicon: HALOT
  rationale: '''Vessels'' is the standard rendering for temple articles/implements
    and is more formally precise than the broader ''articles.'' ''House of the LORD''
    preserves the Hebrew designation for the temple.'
- source_word: כָל־הַגּוֹלָה
  chosen: all the exiles
  alternatives:
  - all the deportees
  - the whole body of exiles
  lexicon: HALOT
  rationale: Though the singular noun can denote the collective exile community, English
    plural 'all the exiles' is the clearest natural equivalent.
- source_word: מִבָּבֶל
  chosen: from Babylon
  alternatives:
  - out of Babylon
  lexicon: HALOT
  rationale: Standard geographic rendering; 'from Babylon' is idiomatic with 'bring
    back.'
- source_word: אֶל־הַמָּקוֹם הַזֶּה
  chosen: to this place
  alternatives:
  - to this המקום
  - to this place here
  lexicon: HALOT
  rationale: A direct rendering that preserves the deictic force, referring to Jerusalem/the
    temple setting without over-specifying in the main text.
