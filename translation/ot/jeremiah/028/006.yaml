theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This verse contains the covenant
    name three times, and the standard small-caps convention is represented here in
    plain text as 'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of Jeremiah's response
  chosen_reading: A sincere wish/prayer ('May the LORD do so ... may the LORD fulfill
    ...')
  alternative_readings:
  - A straightforward future assertion ('The LORD will do so ... the LORD will fulfill
    ...')
  rationale: 'The sequence ''Amen'' + imperfect/jussive forms strongly favors volitive
    force. This preserves the irony/tension of the narrative: Jeremiah expresses desire
    that the favorable prophecy be true without endorsing it as established fact.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
