id: JER.28.2
reference: Jeremiah 28:2
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר יְהוָ֧ה צְבָא֛וֹת אֱלֹהֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר שָׁבַ֞רְתִּי
    אֶת עֹ֖ל מֶ֥לֶךְ בָּבֶֽל־־׃
translation:
  text: 'Thus says the LORD of hosts, the God of Israel: I have broken the yoke of
    the king of Babylon.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD of armies.' The Hebrew title 'LORD of hosts' refers to the
      forces under God's command.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  - So
  lexicon: HALOT
  rationale: Introduces a prophetic proclamation formula. 'Thus' preserves the elevated,
    formulaic force of כֹּה אָמַר without sounding archaic beyond normal biblical
    English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: Although morphologically perfect, in the fixed messenger formula כֹּה
    אָמַר it is idiomatically rendered as present in English ('Thus says'), reflecting
    ongoing authoritative declaration rather than a simple past event.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name YHWH is rendered 'the LORD'
    to follow established reverential convention and the pattern reflected in the
    Septuagint tradition.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the standard concise rendering
    and preserves the breadth of heavenly and earthly forces under God's command.
    'Of armies' is possible but narrower and less idiomatic in this title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain identifying YHWH covenantally with Israel;
    translated directly.
- source_word: לֵאמֹר
  chosen: ':'
  alternatives:
  - saying
  lexicon: HALOT
  rationale: The infinitive 'saying' functions as a speech introducer. In natural
    modern English, a colon best represents this function without unnecessary repetition.
- source_word: שָׁבַרְתִּי
  chosen: I have broken
  alternatives:
  - I broke
  lexicon: HALOT
  rationale: The perfect verb presents the action as accomplished. 'I have broken'
    communicates completed action with present relevance, fitting Hananiah's prophetic
    claim.
- source_word: עֹל
  chosen: yoke
  lexicon: HALOT
  rationale: Literal 'yoke' is the established and contextually apt metaphor for subjugation
    and political domination in Jeremiah.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: Formal construct rendered transparently; this preserves the political
    reference and matches normal English biblical style.
