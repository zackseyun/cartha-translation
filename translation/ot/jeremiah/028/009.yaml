id: JER.28.9
reference: Jeremiah 28:9
source:
  edition: WLC
  text: הַ/נָּבִ֕יא אֲשֶׁ֥ר יִנָּבֵ֖א לְ/שָׁל֑וֹם בְּ/בֹא֙ דְּבַ֣ר הַ/נָּבִ֗יא יִוָּדַע֙ הַ/נָּבִ֔יא אֲשֶׁר שְׁלָח֥/וֹ יְהוָ֖ה בֶּ/אֱמֶֽת־׃
translation:
  text: As for the prophet who prophesies peace, when the word of that prophet comes to pass, then that prophet will be known as one whom Yahweh has truly sent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'well-being' or 'prosperity' for 'peace' (שָׁלוֹם).
    reason: lexical_alternative
  - marker: b
    text: Literally, 'when the word of the prophet comes.' The sense is the fulfillment of the prophetic message.
    reason: lexical_alternative
  - marker: c
    text: Or 'whom the LORD sent in truth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנָּבִיא
  chosen: the prophet / that prophet
  alternatives:
  - a prophet
  lexicon: HALOT
  rationale: Definite article is present throughout; English uses both 'the prophet' and later 'that prophet' to reflect the specific prophet under discussion and to keep the sentence natural.
- source_word: יִנָּבֵא
  chosen: prophesies
  alternatives:
  - speaks as a prophet
  - predicts
  lexicon: HALOT
  rationale: The Niphal of נבא is the standard verb for prophetic speaking. 'Prophesies' preserves the formal prophetic register better than the narrower 'predicts'.
- source_word: לְשָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - prosperity
  lexicon: HALOT
  rationale: שָׁלוֹם can denote peace, welfare, or well-being. In this prophetic context, 'peace' is the most idiomatic and traditional rendering, while still allowing the broader sense of favorable outcome.
- source_word: בְּבֹא
  chosen: when ... comes to pass
  alternatives:
  - when ... comes
  - at the coming of
  lexicon: HALOT
  rationale: The preposition plus infinitive construct of בוא marks the time of fulfillment. 'Comes to pass' makes explicit that the issue is whether the prophetic word is fulfilled, which fits the context and the following passive 'will be known'.
- source_word: דְּבַר הַנָּבִיא
  chosen: the word of that prophet
  alternatives:
  - that prophet's word
  - the matter spoken by the prophet
  lexicon: HALOT
  rationale: דבר here refers to the prophetic utterance/message. 'The word of that prophet' is a clear and sufficiently formal rendering.
- source_word: יִוָּדַע
  chosen: will be known
  alternatives:
  - will be recognized
  - will be shown
  lexicon: HALOT
  rationale: 'Niphal of ידע here is passive/resultative: the prophet''s status becomes evident. ''Will be known'' is straightforward and close to the Hebrew.'
- source_word: שְׁלָחוֹ יְהוָה
  chosen: whom the LORD has ... sent
  alternatives:
  - the LORD sent him
  - whom the LORD sent
  lexicon: HALOT
  rationale: The relative clause modifies 'the prophet.' English idiom prefers 'one whom the LORD has sent' rather than repeating the object pronoun separately.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֶּאֱמֶת
  chosen: truly
  alternatives:
  - in truth
  - faithfully
  - genuinely
  lexicon: HALOT
  rationale: The phrase indicates the genuineness of the divine commissioning. 'Truly sent' is idiomatic modern English; 'in truth' is more formal but less natural here.
