theological_decisions:
- issue: Criterion for a true prophet
  chosen_reading: The verse states that fulfillment of a prophet's message of peace demonstrates that the prophet was truly sent by the LORD.
  alternative_readings:
  - The verse could be read more woodenly as 'the prophet whom the LORD sent in truth will be known' without fronting the idea of fulfillment as proof.
  rationale: The Hebrew syntax links the coming of the prophet's word with the recognition of the prophet's authenticity. The translation preserves that evidentiary relationship without adding doctrinal claims beyond the text.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it'
