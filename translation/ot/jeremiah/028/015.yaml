id: JER.28.15
reference: Jeremiah 28:15
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יִרְמְיָ֧ה הַ/נָּבִ֛יא אֶל חֲנַנְיָ֥ה הַ/נָּבִ֖יא שְׁמַֽע נָ֣א חֲנַנְיָ֑ה לֹֽא שְׁלָחֲ/ךָ֣ יְהוָ֔ה וְ/אַתָּ֗ה הִבְטַ֛חְתָּ אֶת הָ/עָ֥ם הַ/זֶּ֖ה עַל שָֽׁקֶר־־־־־׃
translation:
  text: 'Then Jeremiah the prophet said to Hananiah the prophet, “Listen, please, Hananiah: Yahweh has not sent you, and you have made this people trust in a lie.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the LORD did not send you.”
    reason: lexical_alternative
  - marker: b
    text: Or “you caused this people to trust on falsehood.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural English narrative flow while preserving sequence; 'and ... said' is more formally possible.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Definite title retained for both Jeremiah and Hananiah, matching the Hebrew appositional identification and preserving the irony of Hananiah's claimed prophetic status.
- source_word: שְׁמַע נָא
  chosen: Listen, please
  alternatives:
  - Hear now
  - Listen now
  lexicon: HALOT
  rationale: Imperative plus particle נָא expresses an urgent appeal/request. 'Listen, please' preserves both the command and the softening particle in readable modern English.
- source_word: לֹא שְׁלָחֲךָ יְהוָה
  chosen: the LORD has not sent you
  alternatives:
  - the LORD did not send you
  lexicon: HALOT
  rationale: Uses the covenant name according to doctrine default for יְהוָה. English present perfect communicates the present force of Jeremiah's accusation about Hananiah's unauthorized status; simple past is also possible.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: הִבְטַחְתָּ
  chosen: you have made ... trust
  alternatives:
  - you caused ... to trust
  - you made ... feel secure
  lexicon: HALOT
  rationale: Hiphil of בטח is causative. 'Made ... trust' best captures the causative sense without overinterpreting it as mere emotional reassurance.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: Singular Hebrew with demonstrative is preserved as 'this people,' a common prophetic expression. 'These people' would smooth the English but lose the singular collective force.
- source_word: עַל שָׁקֶר
  chosen: in a lie
  alternatives:
  - on a lie
  - in falsehood
  - on falsehood
  lexicon: HALOT
  rationale: With בטח in the Hiphil, the phrase indicates the basis/object of misplaced trust. 'In a lie' is idiomatic English and preserves the concrete singular noun שָׁקֶר better than the more abstract 'falsehood.'
