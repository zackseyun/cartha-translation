theological_decisions:
- issue: Whether to label Hananiah explicitly as false in translation
  chosen_reading: Retain 'the prophet'
  alternative_readings:
  - the false prophet
  rationale: The narrative context judges Hananiah negatively, but the Hebrew wording
    in this verse does not add 'false.' To preserve theological and narrative precision,
    the translation does not intensify the label beyond the source text.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
