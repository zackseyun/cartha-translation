id: JER.28.17
reference: Jeremiah 28:17
source:
  edition: WLC
  text: וַ/יָּ֛מָת חֲנַנְיָ֥ה הַ/נָּבִ֖יא בַּ/שָּׁנָ֣ה הַ/הִ֑יא בַּ/חֹ֖דֶשׁ הַ/שְּׁבִיעִֽי׃פ
translation:
  text: And Hananiah the prophet died in that same year, in the seventh month.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, 'in that year.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  chosen: died
  alternatives:
  - then died
  - and died
  lexicon: HALOT
  rationale: Qal wayyiqtol of מוּת/מות, the straightforward narrative verb 'died.'
    English omits an overly wooden sequential 'and' before the verb in favor of natural
    style, while the clause-initial conjunction is represented at the sentence level.
- source_word: חֲנַנְיָה
  chosen: Hananiah
  rationale: 'Personal name is transliterated according to the translation philosophy:
    translate titles, transliterate names.'
- source_word: הַנָּבִיא
  chosen: the prophet
  alternatives:
  - the false prophet
  lexicon: HALOT
  rationale: The noun נָבִיא means 'prophet.' Although the broader context presents
    Hananiah as speaking falsely, this verse itself uses the standard title without
    an explicit pejorative modifier, so 'the prophet' best matches the source text
    without importing interpretation.
- source_word: בַּשָּׁנָה הַהִיא
  chosen: in that same year
  alternatives:
  - in that year
  lexicon: HALOT
  rationale: Literally 'in that year.' Because the immediate context has specified
    the timing earlier in the chapter, 'that same year' makes the anaphoric force
    clear in idiomatic English without adding new information.
- source_word: בַּחֹדֶשׁ הַשְּׁבִיעִי
  chosen: in the seventh month
  alternatives:
  - during the seventh month
  lexicon: HALOT
  rationale: A direct rendering of the prepositional phrase with ordinal adjective.
    'In the seventh month' is clear and formally close to the Hebrew.
