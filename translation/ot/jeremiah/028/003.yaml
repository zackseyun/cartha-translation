id: JER.28.3
reference: Jeremiah 28:3
source:
  edition: WLC
  text: בְּ/ע֣וֹד שְׁנָתַ֣יִם יָמִ֗ים אֲנִ֤י מֵשִׁיב֙ אֶל הַ/מָּק֣וֹם הַ/זֶּ֔ה אֶֽת
    כָּל כְּלֵ֖י בֵּ֣ית יְהוָ֑ה אֲשֶׁ֨ר לָקַ֜ח נְבוּכַדנֶאצַּ֤ר מֶֽלֶךְ בָּבֶל֙ מִן
    הַ/מָּק֣וֹם הַ/זֶּ֔ה וַ/יְבִיאֵ֖/ם בָּבֶֽל׀־־־־־׃
translation:
  text: Within two years, I will bring back to this place all the vessels of the house
    of the LORD, which Nebuchadnezzar king of Babylon took from this place and brought
    to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Within two years of days,'' an idiom meaning ''within two years.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'all the articles/utensils of the house of the LORD.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew has the object pronoun explicitly: ''and brought them to Babylon.'''
    reason: lexical_alternative
  - marker: d
    text: The name is also commonly spelled 'Nebuchadrezzar' in Jeremiah.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/עוֹד שְׁנָתַיִם יָמִים
  chosen: Within two years
  alternatives:
  - In two years' time
  - Yet two years of days
  lexicon: HALOT
  rationale: The idiom בְּעוֹד + time expression indicates a period still remaining,
    here a short fixed interval. The collocation שְׁנָתַיִם יָמִים is an idiomatic
    way of saying 'two years' rather than a literal 'two years of days.' 'Within two
    years' is natural English and preserves the predictive timeframe.
- source_word: מֵשִׁיב
  chosen: I will bring back
  alternatives:
  - I am restoring
  - I will restore
  lexicon: HALOT
  rationale: The Hiphil participle of שוב with first-person subject has imminent/future
    force in prophetic speech. With the direct object being temple vessels and destination
    marked by אֶל, 'bring back' best captures physical return to a place. 'Restore'
    is possible but can sound more abstract than the concrete movement in context.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  chosen: to this place
  alternatives:
  - to this המקום
  - to this location
  lexicon: HALOT
  rationale: A straightforward deictic phrase referring to Jerusalem/the temple setting
    in context. 'This place' is the standard natural rendering and preserves the demonstrative
    emphasis.
- source_word: כָּל כְּלֵי בֵּית יְהוָה
  chosen: all the vessels of the house of the LORD
  alternatives:
  - all the articles of the house of the LORD
  - all the utensils of the house of the LORD
  - all the vessels of the temple of the LORD
  lexicon: HALOT
  rationale: כְּלִים refers broadly to objects/implements/vessels. In temple-plunder
    context, 'vessels' is the most established and suitably concrete English term.
    בֵּית יְהוָה is rendered formally as 'the house of the LORD' rather than 'the
    temple' to preserve the Hebrew expression, while remaining clear.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following longstanding reverential convention and the Septuagintal
    pattern.
- source_word: אֲשֶׁר לָקַח
  chosen: which ... took
  alternatives:
  - that ... took
  - which ... seized
  lexicon: HALOT
  rationale: The relative clause simply identifies the vessels. 'Took' is the plain
    sense of לקח here and avoids over-interpretive intensification, though the context
    is indeed plunder.
- source_word: נְבוּכַדנֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: A standard English transliteration of the Babylonian king's name. Although
    Jeremiah often preserves a form closer to 'Nebuchadrezzar,' the consonantal form
    here supports the familiar English 'Nebuchadnezzar,' which is widely recognized
    by readers.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  alternatives:
  - the king of Babylon
  lexicon: HALOT
  rationale: The construct phrase is rendered directly. English idiom does not require
    the article before 'king' in apposition to the proper name.
- source_word: מִן הַמָּקוֹם הַזֶּה
  chosen: from this place
  alternatives:
  - out of this place
  lexicon: HALOT
  rationale: Directly parallel to the earlier destination phrase and should be rendered
    consistently. 'From this place' is the plain spatial sense.
- source_word: וַיְבִיאֵם בָּבֶל
  chosen: and brought to Babylon
  alternatives:
  - and carried them to Babylon
  - and brought them to Babylon
  lexicon: HALOT
  rationale: The verb בוא in Hiphil means 'bring.' English can omit the object pronoun
    because it is recoverable from the prior clause ('the vessels'), yielding smoother
    style without loss of meaning. 'To Babylon' rather than 'into Babylon' is standard
    English for destination with a city/land name.
