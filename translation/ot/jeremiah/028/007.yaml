id: JER.28.7
reference: Jeremiah 28:7
source:
  edition: WLC
  text: אַךְ שְׁמַֽע נָא֙ הַ/דָּבָ֣ר הַ/זֶּ֔ה אֲשֶׁ֥ר אָנֹכִ֖י דֹּבֵ֣ר בְּ/אָזְנֶ֑י/ךָ
    וּ/בְ/אָזְנֵ֖י כָּל הָ/עָֽם־־־׃
translation:
  text: 'Yet please hear this word that I am speaking in your hearing and in the hearing
    of all the people:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'in your ears and in the ears of all the people,' an idiom
      meaning 'in your hearing and in the hearing of all the people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Yet
  alternatives:
  - Only
  - Nevertheless
  - But
  lexicon: HALOT
  rationale: אַךְ often marks restriction or contrast. In this discourse setting,
    Jeremiah pivots from agreement in principle (v. 6) to a qualifying statement,
    so 'Yet' best captures the adversative nuance in natural English.
- source_word: שְׁמַע נָא
  chosen: please hear
  alternatives:
  - hear now
  - listen, please
  lexicon: HALOT
  rationale: שׁמע is the standard verb 'hear/listen.' The particle נָא softens the
    imperative and adds urgency/politeness. 'Please hear' preserves both the command
    and the courteous appeal better than the more archaic 'hear now.'
- source_word: הַדָּבָר הַזֶּה
  chosen: this word
  alternatives:
  - this matter
  - this message
  - this thing
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'message.' In prophetic speech,
    'word' preserves the verbal and prophetic force while remaining idiomatic in English.
- source_word: אֲשֶׁר אָנֹכִי דֹּבֵר
  chosen: that I am speaking
  alternatives:
  - which I speak
  - that I speak
  lexicon: HALOT
  rationale: The participle דֹּבֵר conveys ongoing present action. 'I am speaking'
    reflects the immediate act of address more naturally than a simple present in
    English.
- source_word: בְּאָזְנֶיךָ
  chosen: in your hearing
  alternatives:
  - in your ears
  - to your hearing
  - before you
  lexicon: HALOT
  rationale: Literally 'in your ears,' an idiom for direct audibility. 'In your hearing'
    preserves the Hebrew image while sounding natural in modern English.
- source_word: וּבְאָזְנֵי כָּל הָעָם
  chosen: and in the hearing of all the people
  alternatives:
  - and in the ears of all the people
  - and before all the people
  lexicon: HALOT
  rationale: The repeated idiom is retained for emphasis. 'All the people' reflects
    כָּל הָעָם straightforwardly and preserves the public setting of Jeremiah's statement.
