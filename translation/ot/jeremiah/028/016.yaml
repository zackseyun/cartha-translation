id: JER.28.16
reference: Jeremiah 28:16
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֚ה אָמַ֣ר יְהוָ֔ה הִנְ/נִי֙ מְשַֽׁלֵּֽחֲ/ךָ֔ מֵ/עַ֖ל פְּנֵ֣י הָ/אֲדָמָ֑ה
    הַ/שָּׁנָה֙ אַתָּ֣ה מֵ֔ת כִּֽי סָרָ֥ה דִבַּ֖רְתָּ אֶל יְהוָֽה־־׃
translation:
  text: 'Therefore, this is what the LORD says: Look, I am sending you away from the
    face of the earth. This year you will die, because you have spoken rebellion against
    the LORD.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'from off the face of the earth.' The Hebrew expression
      is an idiom for being removed from among the living.
    reason: lexical_alternative
  - marker: b
    text: Or 'you have spoken apostasy/defiance against the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md,
    preserving Jewish reverence tradition and the longstanding English convention
    reflected in the LXX pattern.
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks the inferential force from the preceding judgment speech; 'Therefore'
    is natural and sufficiently formal.
- source_word: כֹּה אָמַר
  chosen: this is what ... says
  alternatives:
  - thus says
  - this is what ... has said
  lexicon: HALOT
  rationale: A standard prophetic messenger formula. 'This is what ... says' preserves
    the formula's force in readable modern English better than the more traditional
    but slightly archaic 'thus says.'
- source_word: הִנְנִי
  chosen: Look
  alternatives:
  - Behold
  - Here I am
  lexicon: HALOT
  rationale: Introduces emphatic divine action. 'Look' preserves the deictic attention-getting
    force in contemporary English without archaic tone.
- source_word: מְשַׁלֵּחֲךָ
  chosen: I am sending you away
  alternatives:
  - I am about to send you away
  - I am casting you off
  - I am dismissing you
  lexicon: HALOT
  rationale: From שלח, literally 'send.' In context of judgment and removal from life,
    'sending you away' preserves the verbal imagery while allowing the following phrase
    to specify the destination/source of removal. 'Casting you off' would overinterpret.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  chosen: away from the face of the earth
  alternatives:
  - from off the face of the earth
  - from the land
  - from the ground
  lexicon: HALOT
  rationale: A conventional Hebrew idiom for removal from among the living. 'Away
    from the face of the earth' keeps the imagery and avoids flattening it to merely
    'from the land,' which could suggest exile rather than death.
- source_word: הַשָּׁנָה
  chosen: This year
  alternatives:
  - Within this year
  - In this year
  lexicon: HALOT
  rationale: Temporal specification is straightforward. 'This year' is idiomatic and
    fits the prophetic announcement of imminent death.
- source_word: אַתָּה מֵת
  chosen: you will die
  alternatives:
  - you are dying
  - you are dead
  lexicon: HALOT
  rationale: Though formally a verbless clause with participial/adjectival מֵת, in
    context it functions as a predictive sentence of impending death. English future
    best conveys the sense.
- source_word: סָרָה
  chosen: rebellion
  alternatives:
  - apostasy
  - defiance
  - a turning away
  lexicon: HALOT
  rationale: The noun denotes deviation or rebelliousness against proper authority,
    here against the LORD. 'Rebellion' is clear and weighty without importing later
    technical theological nuance that 'apostasy' may carry.
- source_word: דִבַּרְתָּ אֶל יְהוָה
  chosen: you have spoken rebellion against the LORD
  alternatives:
  - you have spoken rebellion to the LORD
  - you have preached rebellion against the LORD
  lexicon: HALOT
  rationale: The idiom 'speak rebellion against' is the natural English rendering
    of דבר + סרה + אל in this condemnatory context. 'Against' brings out the adversative
    sense better than a wooden 'to the LORD.' 'Preached' is possible contextually
    for a prophet, but the Hebrew verb is simply 'spoke.'
