theological_decisions:
- issue: Idiomatic force of removal from the earth
  chosen_reading: 'A death sentence: ''I am sending you away from the face of the
    earth'' followed by ''This year you will die.'''
  alternative_readings:
  - Exile/removal from the land
  rationale: The immediate apposition 'This year you will die' interprets the removal
    idiom as death, not merely deportation. The translation preserves the Hebrew imagery
    while allowing the following clause to clarify the judgment.
