id: JER.28.1
reference: Jeremiah 28:1
source:
  edition: WLC
  text: וַ/יְהִ֣י בַּ/שָּׁנָ֣ה הַ/הִ֗יא בְּ/רֵאשִׁית֙ מַמְלֶ֨כֶת֙ צִדְקִיָּ֣ה מֶֽלֶךְ
    יְהוּדָ֔ה ב/שנת הָֽ/רְבִעִ֔ית בַּ/חֹ֖דֶשׁ הַ/חֲמִישִׁ֑י אָמַ֣ר אֵלַ֡/י חֲנַנְיָה֩
    בֶן עַזּ֨וּר הַ/נָּבִ֜יא אֲשֶׁ֤ר מִ/גִּבְעוֹן֙ בְּ/בֵ֣ית יְהוָ֔ה לְ/עֵינֵ֧י הַ/כֹּהֲנִ֛ים
    וְ/כָל הָ/עָ֖ם לֵ/אמֹֽר׀־־־׃
translation:
  text: And it happened in that year, at the beginning of the reign of Zedekiah king
    of Judah, in the fourth year, in the fifth month, that Hananiah son of Azzur,
    the prophet from Gibeon, spoke to me in the house of the LORD, before the eyes
    of the priests and all the people, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''before the eyes of,'' an idiom meaning publicly or in the presence
      of.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew text says both 'at the beginning of the reign of Zedekiah' and
      'in the fourth year.' The translation preserves this wording rather than harmonizing
      it.
    reason: textual_variant
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol introducing a new episode. 'And it happened' preserves
    the Hebrew discourse function without archaic English.
- source_word: בַּשָּׁנָה הַהִיא
  chosen: in that year
  alternatives:
  - during that year
  lexicon: HALOT
  rationale: Straightforward temporal phrase; 'in that year' is the most natural formal
    rendering.
- source_word: בְּרֵאשִׁית מַמְלֶכֶת
  chosen: at the beginning of the reign of
  alternatives:
  - in the beginning of the kingdom of
  - at the start of the rule of
  lexicon: HALOT
  rationale: מַמְלֶכֶת here refers to royal reign/rule, not abstract kingdom. 'At
    the beginning of the reign of' best fits English and context.
- source_word: צִדְקִיָּה מֶלֶךְ יְהוּדָה
  chosen: Zedekiah king of Judah
  lexicon: HALOT
  rationale: Standard transliteration of the personal name and direct rendering of
    the royal title.
- source_word: בַּשָּׁנָה הָרְבִעִית
  chosen: in the fourth year
  alternatives:
  - in year four
  lexicon: HALOT
  rationale: Keeps the chronological notice explicit. Although this creates an apparent
    tension with 'at the beginning of the reign,' the translation preserves the Hebrew
    wording rather than harmonizing it.
- source_word: בַּחֹדֶשׁ הַחֲמִישִׁי
  chosen: in the fifth month
  lexicon: HALOT
  rationale: Literal calendrical expression; no need to convert to a modern month
    name.
- source_word: אָמַר אֵלַי
  chosen: spoke to me
  alternatives:
  - said to me
  lexicon: HALOT
  rationale: Although אמר is often 'said,' 'spoke to me' reads more naturally before
    the following infinitive 'saying' and avoids awkward repetition in English.
- source_word: חֲנַנְיָה בֶן עַזּוּר
  chosen: Hananiah son of Azzur
  alternatives:
  - Hananiah the son of Azzur
  lexicon: HALOT
  rationale: Standard transliteration of names; construct relationship rendered naturally
    in English.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Definite title identifying Hananiah's claimed/recognized role in the
    narrative.
- source_word: אֲשֶׁר מִגִּבְעוֹן
  chosen: from Gibeon
  alternatives:
  - who was from Gibeon
  lexicon: HALOT
  rationale: Relative clause compressed naturally in English while preserving provenance.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת with YHWH is conventionally 'house of the LORD.' 'Temple' is possible,
    but the Hebrew image is 'house,' and the doctrine default renders יְהוָה as 'the
    LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default for the divine name.
- source_word: לְעֵינֵי
  chosen: before the eyes of
  alternatives:
  - in the presence of
  - before
  lexicon: HALOT
  rationale: This idiom literally means 'before the eyes of.' Retaining it preserves
    the public, visible setting; it remains intelligible in English.
- source_word: הַכֹּהֲנִים וְכָל הָעָם
  chosen: the priests and all the people
  alternatives:
  - the priests and the whole people
  lexicon: HALOT
  rationale: Direct rendering of the audience present.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'as follows:'
  lexicon: HALOT
  rationale: Standard introduction to direct speech; the comma signals continuation
    into the next verse.
