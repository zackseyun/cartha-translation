theological_decisions:
- issue: Chronological tension between 'at the beginning of the reign of Zedekiah'
    and 'in the fourth year'
  chosen_reading: Preserve both expressions as translated without harmonization
  alternative_readings:
  - Emend or paraphrase one phrase to remove the tension
  - Translate 'beginning' more loosely to mean an earlier period of the reign
  rationale: The Hebrew text contains both notices. Optimal equivalence and the doctrine's
    principle of preserving tension rather than resolving it require retaining the
    wording rather than smoothing an apparent discrepancy.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD'
