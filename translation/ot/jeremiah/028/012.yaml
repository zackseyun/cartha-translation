id: JER.28.12
reference: Jeremiah 28:12
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֶֽל יִרְמְיָ֑ה אַ֠חֲרֵי שְׁב֞וֹר חֲנַנְיָ֤ה הַ/נָּבִיא֙
    אֶת הַ/מּוֹטָ֔ה מֵ/עַ֗ל צַוַּ֛אר יִרְמְיָ֥ה הַ/נָּבִ֖יא לֵ/אמֹֽר־־־׃
translation:
  text: Then the word of the LORD came to Jeremiah, after Hananiah the prophet had
    broken the yoke from off the neck of Jeremiah the prophet, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the yoke''; the noun can refer more specifically to the yoke-bar
      or wooden crosspiece.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive on היה introduces the next event in narrative sequence.
    'Then' conveys the temporal progression in natural modern English without the
    archaic formula 'it came to pass.'
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Word' preserves the formal and
    theological resonance of divine revelation better than the more interpretive 'message.'
    'YHWH' is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms, the default rendering of the divine
    name is 'the LORD.'
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: A straightforward temporal preposition marking that the divine word came
    subsequent to Hananiah's action.
- source_word: שְׁבֹר
  chosen: had broken
  alternatives:
  - broke
  lexicon: HALOT
  rationale: 'The infinitive construct after אַחֲרֵי refers to a prior completed action.
    English past perfect clarifies the sequence: the word came after Hananiah had
    broken the yoke.'
- source_word: חֲנַנְיָה הַנָּבִיא
  chosen: Hananiah the prophet
  alternatives:
  - Hananiah, the prophet
  lexicon: HALOT
  rationale: The appositional title identifies Hananiah in context. No stronger nuance
    than simple identification is required here.
- source_word: הַמּוֹטָה
  chosen: the yoke
  alternatives:
  - the bar of the yoke
  - the yoke-bar
  lexicon: HALOT
  rationale: The noun refers to the wooden bar/yoke Jeremiah had been wearing as a
    prophetic sign. In context, 'yoke' is the clearest and most idiomatic rendering,
    even if more specific alternatives are possible.
- source_word: מֵעַל צַוַּאר
  chosen: from off the neck of
  alternatives:
  - from the neck of
  - off the neck of
  lexicon: HALOT
  rationale: The double prepositional expression emphasizes removal from upon the
    neck. 'From off the neck of' preserves that force while remaining intelligible.
- source_word: יִרְמְיָה הַנָּבִיא
  chosen: Jeremiah the prophet
  alternatives:
  - Jeremiah, the prophet
  lexicon: HALOT
  rationale: The repeated title mirrors the Hebrew and maintains the formal narrative
    style, also highlighting the prophetic confrontation between Hananiah and Jeremiah.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: This introduces the content of the divine speech in the following verse.
    Retaining 'saying' preserves the connection and avoids over-paraphrase.
