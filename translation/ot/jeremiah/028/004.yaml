id: JER.28.4
reference: Jeremiah 28:4
source:
  edition: WLC
  text: וְ/אֶת יְכָנְיָ֣ה בֶן יְהוֹיָקִ֣ים מֶֽלֶךְ יְ֠הוּדָה וְ/אֶת כָּל גָּל֨וּת
    יְהוּדָ֜ה הַ/בָּאִ֣ים בָּבֶ֗לָ/ה אֲנִ֥י מֵשִׁ֛יב אֶל הַ/מָּק֥וֹם הַ/זֶּ֖ה נְאֻם
    יְהוָ֑ה כִּ֣י אֶשְׁבֹּ֔ר אֶת עֹ֖ל מֶ֥לֶךְ בָּבֶֽל־־־־־־־־׃
translation:
  text: And I will bring back to this place Jeconiah son of Jehoiakim, king of Judah,
    and all the exiles of Judah who went to Babylon, declares the LORD, for I will
    break the yoke of the king of Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who came to Babylon.' The Hebrew participle is literally 'the ones coming
      to Babylon,' but English idiom from Judah's perspective often uses 'went.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְכָנְיָה
  chosen: Jeconiah
  alternatives:
  - Jechoniah
  - Coniah
  rationale: Standard English transliteration of the personal name in this context.
    'Coniah' appears elsewhere as a shortened form, but the full form here is best
    represented as 'Jeconiah'.
- source_word: גָּלוּת
  chosen: the exiles
  alternatives:
  - the captivity
  - the exiled community
  lexicon: HALOT
  rationale: Though the noun can denote 'exile/captivity' as a state or the deported
    group, the following participle 'who went/came to Babylon' points naturally to
    the people, so 'the exiles' is the clearest English rendering.
- source_word: הַבָּאִים בָּבֶלָה
  chosen: who went to Babylon
  alternatives:
  - who came to Babylon
  - who were brought to Babylon
  lexicon: HALOT
  rationale: The participle of בוא literally means 'coming,' but from the Judean frame
    of reference English idiom prefers 'went to Babylon.' 'Were brought' would import
    a passive nuance not explicit in the Hebrew form, though the deportation context
    is known.
- source_word: מֵשִׁיב
  chosen: I will bring back
  alternatives:
  - I am restoring
  - I will restore
  - I will return
  lexicon: HALOT
  rationale: Hiphil of שוב commonly means 'bring back/restore.' With personal objects
    and destination 'to this place,' 'bring back' best captures the motion implied.
- source_word: הַמָּקוֹם הַזֶּה
  chosen: this place
  alternatives:
  - this location
  lexicon: HALOT
  rationale: Natural and sufficiently formal rendering of the deictic phrase, likely
    referring to Jerusalem/Judah in context.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic modern English
    and preserves the solemn prophetic force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: 'Required by the doctrinal guideline for the divine name: render YHWH
    as ''the LORD''.'
- source_word: עֹל
  chosen: the yoke
  alternatives:
  - the bar of the yoke
  lexicon: HALOT
  rationale: Common metaphor for political domination or servitude. 'Yoke' preserves
    the prophetic image without overexplaining it in the main text.
- source_word: אֶשְׁבֹּר אֶת עֹל מֶלֶךְ בָּבֶל
  chosen: I will break the yoke of the king of Babylon
  alternatives:
  - I will break the rule of the king of Babylon
  - I will shatter the yoke imposed by the king of Babylon
  lexicon: HALOT
  rationale: A fairly formal rendering that preserves the metaphor of oppressive imperial
    control. More interpretive alternatives flatten the image.
