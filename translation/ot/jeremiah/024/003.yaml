id: JER.24.3
reference: Jeremiah 24:3
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֵלַ֗/י מָֽה אַתָּ֤ה רֹאֶה֙ יִרְמְיָ֔הוּ וָ/אֹמַ֖ר תְּאֵנִ֑ים
    הַ/תְּאֵנִ֤ים הַ/טֹּבוֹת֙ טֹב֣וֹת מְאֹ֔ד וְ/הָֽ/רָעוֹת֙ רָע֣וֹת מְאֹ֔ד אֲשֶׁ֥ר
    לֹא תֵאָכַ֖לְנָה מֵ/רֹֽעַ־־׃פ
translation:
  text: Then the LORD said to me, “What do you see, Jeremiah?” And I said, “Figs—the
    good figs are very good, and the bad are very bad, so bad that they cannot be
    eaten.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “which cannot be eaten because of their badness.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional small-caps convention in plain text as 'the LORD'.
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Direct object of speech; standard modern English rendering.
- source_word: מָה אַתָּה רֹאֶה
  chosen: What do you see
  alternatives:
  - What are you seeing
  - What do you behold
  lexicon: HALOT
  rationale: Idiomatic present-question in English for the participial construction,
    preserving the immediacy of the vision report.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: תְּאֵנִים
  chosen: Figs
  lexicon: HALOT
  rationale: Simple identification of what Jeremiah sees; plural retained.
- source_word: הַתְּאֵנִים הַטֹּבוֹת טֹבוֹת מְאֹד
  chosen: the good figs are very good
  alternatives:
  - the figs, the good ones, are very good
  - the good figs, very good
  lexicon: HALOT
  rationale: Retains the emphatic repetition of adjective plus adverb while smoothing
    into natural English. Repeating 'figs' clarifies the Hebrew apposition.
- source_word: וְהָרָעוֹת רָעוֹת מְאֹד
  chosen: and the bad are very bad
  alternatives:
  - and the bad figs are very bad
  - and the evil ones are very bad
  lexicon: HALOT
  rationale: Here רָעוֹת describes the quality of the figs, not moral evil; 'bad'
    is the appropriate English adjective. The noun 'figs' is omitted in the second
    clause as natural English since it is understood from context.
- source_word: אֲשֶׁר לֹא תֵאָכַלְנָה
  chosen: that they cannot be eaten
  alternatives:
  - which cannot be eaten
  - so that they cannot be eaten
  lexicon: HALOT
  rationale: The relative clause explains the extent of their badness. Passive English
    best captures the Niphal sense.
- source_word: מֵרֹעַ
  chosen: so bad
  alternatives:
  - because of badness
  - from rottenness
  - from being bad
  lexicon: HALOT
  rationale: 'The preposition with the noun expresses cause or degree: they are inedible
    because of their bad condition. ''So bad'' communicates the force idiomatically
    in English without over-specifying ''rottenness,'' which the Hebrew does not explicitly
    state.'
