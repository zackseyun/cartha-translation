id: JER.24.10
reference: Jeremiah 24:10
source:
  edition: WLC
  text: וְ/שִׁלַּ֣חְתִּי בָ֔/ם אֶת הַ/חֶ֖רֶב אֶת הָ/רָעָ֣ב וְ/אֶת הַ/דָּ֑בֶר עַד תֻּמָּ/ם֙
    מֵ/עַ֣ל הָ/אֲדָמָ֔ה אֲשֶׁר נָתַ֥תִּי לָ/הֶ֖ם וְ/לַ/אֲבוֹתֵי/הֶֽם־־־־־׃פ
translation:
  text: And I will send against them the sword, the famine, and the pestilence, until
    they are consumed from upon the land that I gave to them and to their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the plague.' The Hebrew term can denote epidemic disease more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  chosen: And I will send
  alternatives:
  - And I will send out
  - And I will dispatch
  lexicon: HALOT
  rationale: שׁלח in the Piel with hostile agents takes the sense of sending forth
    or sending against. 'Send' is natural English and preserves the divine agency
    without over-paraphrase.
- source_word: בָם
  chosen: against them
  alternatives:
  - on them
  - among them
  lexicon: HALOT
  rationale: With שׁלח and judgments, ב often conveys hostile direction toward persons.
    'Against them' best captures the adversative force in idiomatic English.
- source_word: הַחֶרֶב
  chosen: the sword
  alternatives:
  - war
  - violence
  lexicon: HALOT
  rationale: חרב is literally 'sword' and in Jeremiah often functions as a metonym
    for warfare or violent death. The main text keeps the concrete term 'sword' to
    preserve the prophetic triad's established wording.
- source_word: הָרָעָב
  chosen: the famine
  alternatives:
  - hunger
  lexicon: HALOT
  rationale: רָעָב in judgment contexts denotes famine rather than the subjective
    experience of hunger. 'The famine' matches the article and the standard triad.
- source_word: הַדָּבֶר
  chosen: the pestilence
  alternatives:
  - the plague
  - disease
  lexicon: HALOT
  rationale: דבר in prophetic judgment formulas commonly refers to epidemic disease.
    'Pestilence' preserves the formal gravity and conventional triad; 'plague' is
    possible but can suggest a specific outbreak rather than the broader category.
- source_word: עַד תֻּמָּם
  chosen: until they are consumed
  alternatives:
  - until they are finished
  - until they come to an end
  lexicon: HALOT
  rationale: The passive/resultative sense of תמם here indicates being brought to
    an end. 'Are consumed' fits the context of sword, famine, and pestilence and sounds
    natural in English.
- source_word: מֵעַל הָאֲדָמָה
  chosen: from upon the land
  alternatives:
  - from the land
  - off the ground
  lexicon: HALOT
  rationale: The preposition מֵעַל is more literally 'from upon/off of.' 'From upon
    the land' preserves that force more closely than simply 'from the land,' while
    remaining readable.
- source_word: הָאֲדָמָה
  chosen: the land
  alternatives:
  - the ground
  - the soil
  lexicon: HALOT
  rationale: In covenantal and territorial context, אֲדָמָה refers to the land given
    by God, not merely soil. 'Land' is therefore preferable.
- source_word: אֲשֶׁר נָתַתִּי לָהֶם וְלַאֲבוֹתֵיהֶם
  chosen: that I gave to them and to their fathers
  alternatives:
  - that I gave them and their fathers
  - which I gave to them and their ancestors
  lexicon: HALOT
  rationale: The clause recalls covenantal gift of the land to the present generation
    and their forefathers. 'Fathers' is retained as the source-oriented rendering
    of אבותיהם, consistent with the gender-accurate policy and the patriarchal covenant
    context.
