theological_decisions:
- issue: Rendering of covenantal land language
  chosen_reading: the land that I gave to them and to their fathers
  alternative_readings:
  - the land that I gave them and their ancestors
  rationale: The verse invokes the covenantal gift of the land to Israel across generations.
    Retaining 'fathers' preserves the historical and textual specificity of the Hebrew
    rather than generalizing to 'ancestors.'
