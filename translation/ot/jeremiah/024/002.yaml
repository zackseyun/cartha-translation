id: JER.24.2
reference: Jeremiah 24:2
source:
  edition: WLC
  text: הַ/דּ֣וּד אֶחָ֗ד תְּאֵנִים֙ טֹב֣וֹת מְאֹ֔ד כִּ/תְאֵנֵ֖י הַ/בַּכֻּר֑וֹת וְ/הַ/דּ֣וּד
    אֶחָ֗ד תְּאֵנִים֙ רָע֣וֹת מְאֹ֔ד אֲשֶׁ֥ר לֹא תֵֽאָכַ֖לְנָה מֵ/רֹֽעַ־׃ס
translation:
  text: One basket had very good figs, like first-ripe figs, and one basket had very
    bad figs, so bad that they could not be eaten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like early figs' or 'like figs of the first crop.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'which could not be eaten from badness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדּוּד
  chosen: basket
  alternatives:
  - pot
  - jar
  - kettle
  lexicon: HALOT
  rationale: In Jeremiah 24 the object contains figs set before the temple, fitting
    a container such as a basket. While the noun can denote a pot or cauldron in other
    contexts, here 'basket' best matches the vision context and standard English sense.
- source_word: אֶחָד
  chosen: one
  lexicon: HALOT
  rationale: 'Simple numeral modifying each container: ''one basket ... and one basket.'''
- source_word: תְּאֵנִים
  chosen: figs
  lexicon: HALOT
  rationale: Direct rendering of the fruit named in the vision.
- source_word: טֹבוֹת מְאֹד
  chosen: very good
  alternatives:
  - exceedingly good
  lexicon: HALOT
  rationale: Combines adjective plus intensifier in natural modern English while preserving
    the strong positive evaluation.
- source_word: כִּתְאֵנֵי הַבַּכֻּרוֹת
  chosen: like first-ripe figs
  alternatives:
  - like early figs
  - like figs of the first crop
  lexicon: HALOT
  rationale: The phrase compares the good figs to the prized first figs of the season.
    'First-ripe figs' preserves both the temporal sense and the idea of special quality.
- source_word: רָעוֹת מְאֹד
  chosen: very bad
  alternatives:
  - exceedingly bad
  - very poor
  lexicon: HALOT
  rationale: Direct antonym to 'very good,' preserving the stark contrast in the vision.
- source_word: אֲשֶׁר לֹא תֵאָכַלְנָה מֵרֹעַ
  chosen: so bad that they could not be eaten
  alternatives:
  - which could not be eaten because of badness
  - which were inedible from rottenness
  lexicon: HALOT
  rationale: The clause explains the severity of the bad figs. 'So bad that they could
    not be eaten' is idiomatic English that preserves the causal force of מֵרֹעַ without
    over-specifying the exact kind of defect.
