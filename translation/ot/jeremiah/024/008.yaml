theological_decisions:
- issue: Rendering of the judgment formula כֵּן אֶתֵּן in the bad-fig simile
  chosen_reading: Rendered idiomatically as 'so I will make' to express that God will
    treat these people as like the bad figs.
  alternative_readings:
  - so I will give over
  - so I will set
  rationale: The Hebrew verb נתן literally means 'give,' but in this context a wooden
    rendering could sound incomplete in English because the object complement ('like
    these bad figs') is implicit from the simile. The chosen rendering preserves the
    comparison without importing later details of judgment beyond the immediate clause.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source''s
    sense without paraphrase beyond what the text warrants.'
