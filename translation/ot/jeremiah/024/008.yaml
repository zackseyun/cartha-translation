id: JER.24.8
reference: Jeremiah 24:8
source:
  edition: WLC
  text: וְ/כַ/תְּאֵנִים֙ הָֽ/רָע֔וֹת אֲשֶׁ֥ר לֹא תֵאָכַ֖לְנָה מֵ/רֹ֑עַ כִּי כֹ֣ה אָמַ֣ר
    יְהוָ֗ה כֵּ֣ן אֶ֠תֵּן אֶת צִדְקִיָּ֨הוּ מֶֽלֶךְ יְהוּדָ֤ה וְ/אֶת שָׂרָי/ו֙ וְ/אֵ֣ת
    שְׁאֵרִ֣ית יְרוּשָׁלִַ֗ם הַ/נִּשְׁאָרִים֙ בָּ/אָ֣רֶץ הַ/זֹּ֔את וְ/הַ/יֹּשְׁבִ֖ים
    בְּ/אֶ֥רֶץ מִצְרָֽיִם־־׀־־־׀׃
translation:
  text: 'But like the bad figs that cannot be eaten because they are so bad, thus
    says the LORD: so I will make Zedekiah king of Judah, his officials, the remnant
    of Jerusalem who remain in this land, and those who dwell in the land of Egypt.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'so I will give Zedekiah ...' The Hebrew uses 'give,'
      with the comparison to the bad figs supplying the sense of being handed over
      or treated accordingly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כַ/תְּאֵנִים
  chosen: But like the ... figs
  alternatives:
  - And like the ... figs
  lexicon: HALOT
  rationale: The prefixed conjunction with comparative כ is best rendered 'But like'
    in English here to continue the contrast with the good figs in the preceding verse
    while preserving the simile.
- source_word: הָרָעוֹת
  chosen: bad
  alternatives:
  - evil
  - worthless
  lexicon: HALOT
  rationale: In context of fruit quality, 'bad' is the most natural English rendering;
    'evil' would sound overly moralized for the immediate image, though the metaphor
    carries moral judgment.
- source_word: לֹא תֵאָכַלְנָה מֵרֹעַ
  chosen: cannot be eaten because they are so bad
  alternatives:
  - are not eaten for badness
  - cannot be eaten from badness
  lexicon: HALOT
  rationale: This clause explains that the figs are inedible due to their extreme
    badness. The idiomatic English 'because they are so bad' captures the causal force
    of מִן plus רֹעַ.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: כֵּן אֶתֵּן
  chosen: so I will make
  alternatives:
  - so I will give over
  - so I will set
  lexicon: HALOT
  rationale: נתן here introduces what God will do with Zedekiah and the others in
    correspondence to the bad figs. 'Make' reflects the comparative force in context
    ('treat as / make into like this') in smoother English, anticipating the judgment
    elaborated in the following verses.
- source_word: צִדְקִיָּהוּ מֶלֶךְ יְהוּדָה
  chosen: Zedekiah king of Judah
  alternatives:
  - Zedekiah, the king of Judah
  lexicon: HALOT
  rationale: The appositional title is rendered straightforwardly. The article is
    not required in English apposition, though it could be supplied.
- source_word: שָׂרָיו
  chosen: his officials
  alternatives:
  - his princes
  - his leaders
  lexicon: HALOT
  rationale: שׂרים refers to ruling officials/court leaders. 'Officials' is clear
    modern English and fits the political context better than the archaic 'princes.'
- source_word: שְׁאֵרִית יְרוּשָׁלִַם
  chosen: the remnant of Jerusalem
  alternatives:
  - the remainder of Jerusalem
  - the survivors of Jerusalem
  lexicon: HALOT
  rationale: '''Remnant'' preserves the established prophetic term שְׁאֵרִית and its
    theological resonance, while still being understandable in modern English.'
- source_word: הַנִּשְׁאָרִים בָּאָרֶץ הַזֹּאת
  chosen: who remain in this land
  alternatives:
  - who are left in this land
  lexicon: HALOT
  rationale: The participle specifies the remnant as those left behind in Judah. 'Who
    remain' is natural and slightly more formal than 'who are left.'
- source_word: וְהַיֹּשְׁבִים בְּאֶרֶץ מִצְרָיִם
  chosen: and those who dwell in the land of Egypt
  alternatives:
  - and those living in the land of Egypt
  - and those who live in Egypt
  lexicon: HALOT
  rationale: '''Dwell'' preserves the participial sense and solemn register. ''Land
    of Egypt'' reflects the Hebrew wording more closely than simply ''Egypt.'''
