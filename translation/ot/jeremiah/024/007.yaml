theological_decisions:
- issue: Covenant formula language
  chosen_reading: Retain the reciprocal covenant expression 'they will be my people, and I will be their God' in familiar form.
  alternative_readings:
  - Paraphrastic renderings emphasizing belonging without the formula
  rationale: The Hebrew uses a classic covenant formula central to Jeremiah's theology. Preserving it maintains intertextual and theological continuity without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §1, §5
- issue: Nature of 'know me'
  chosen_reading: Render as relational-covenantal knowledge rather than mere intellectual recognition.
  alternative_readings:
  - '''acknowledge me'''
  - '''understand that I am the LORD'''
  rationale: In Jeremiah, knowing the LORD is covenantal and transformative. 'Know me' preserves that theological depth while remaining textually direct.
  doctrine_reference: Translation philosophy §1, §3
