theological_decisions:
- issue: Nature of the judgment formula
  chosen_reading: Render the sequence as a list of statuses/results of divine judgment
    rather than smoothing it into a single paraphrased consequence.
  alternative_readings:
  - I will make them a terror and a disaster among all the kingdoms...
  - I will hand them over for trouble to all the kingdoms...
  rationale: The Hebrew piles up nouns with repeated ל to intensify the shame and
    notoriety of exile. Preserving the list maintains the rhetorical force and does
    not import additional theological interpretation beyond the text's judgment language.
  doctrine_reference: Translation philosophy §§1, 3, 5
