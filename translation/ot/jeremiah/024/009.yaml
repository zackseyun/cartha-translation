id: JER.24.9
reference: Jeremiah 24:9
source:
  edition: WLC
  text: וּ/נְתַתִּי/ם֙ ל/זועה לְ/רָעָ֔ה לְ/כֹ֖ל מַמְלְכ֣וֹת הָ/אָ֑רֶץ לְ/חֶרְפָּ֤ה
    וּ/לְ/מָשָׁל֙ לִ/שְׁנִינָ֣ה וְ/לִ/קְלָלָ֔ה בְּ/כָל הַ/מְּקֹמ֖וֹת אֲשֶֽׁר אַדִּיחֵ֥/ם
    שָֽׁם־־׃
translation:
  text: I will make them a horror, an evil thing, to all the kingdoms of the earth—a
    reproach, a proverb, a taunt, and a curse in all the places where I drive them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an object of horror' for 'a horror.'
    reason: lexical_alternative
  - marker: b
    text: '''A proverb'' may also be rendered ''a byword'' here, since the sense is
      a saying repeated about them in scorn.'
    reason: lexical_alternative
  - marker: c
    text: Or 'where I banish them.' The verb can mean 'drive away' or 'banish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתַתִּים
  chosen: I will make them
  alternatives:
  - I will give them over
  - I will set them
  lexicon: HALOT
  rationale: נתן with a predicative ל-construction here means to place/make them into
    a certain condition or status, not merely 'give' in a literal transfer sense.
    'Make them' is idiomatic English and preserves the causative force.
- source_word: לְזַוֲעָה
  chosen: a horror
  alternatives:
  - an object of horror
  - a terror
  lexicon: HALOT
  rationale: The noun denotes something causing horror/shuddering. 'A horror' is concise
    and natural; 'object of horror' is more explicit but heavier. The sense is that
    they become something at which others recoil.
- source_word: לְרָעָה
  chosen: an evil thing
  alternatives:
  - for harm
  - for disaster
  - for evil
  lexicon: HALOT
  rationale: In this sequence the phrase is appositional/predicative alongside 'a
    horror.' Rendering it 'an evil thing' preserves the nominal force and the sense
    that they become a disastrous evil among the nations. 'For harm' would construe
    it more adverbially/purposively and is less fitting in the list.
- source_word: לְכָל מַמְלְכוֹת הָאָרֶץ
  chosen: to all the kingdoms of the earth
  alternatives:
  - for all the kingdoms of the earth
  - among all the kingdoms of the earth
  lexicon: HALOT
  rationale: This indicates the sphere or audience before whom they become such a
    horror. 'To all the kingdoms of the earth' is a natural rendering of the Hebrew
    preposition and keeps the universal scope.
- source_word: לְחֶרְפָּה
  chosen: a reproach
  alternatives:
  - a disgrace
  - an object of scorn
  lexicon: HALOT
  rationale: חרפה commonly denotes reproach/disgrace. 'Reproach' preserves the covenantal
    and prophetic register without over-paraphrase.
- source_word: וּלְמָשָׁל
  chosen: a proverb
  alternatives:
  - a byword
  - a proverb of warning
  lexicon: HALOT
  rationale: משל can denote a proverb, parable, or byword. In judgment formulas it
    often means a saying or byword about someone. 'A proverb' is the most direct lexical
    equivalent; the byword nuance is preserved by the surrounding terms and footnote.
- source_word: לִשְׁנִינָה
  chosen: a taunt
  alternatives:
  - a byword
  - an object of mockery
  lexicon: HALOT
  rationale: This rare noun refers to derisive talk, taunting repetition, or mocking
    byword. 'A taunt' captures the hostile speech element distinctly from משל.
- source_word: וְלִקְלָלָה
  chosen: a curse
  alternatives:
  - an object of cursing
  lexicon: HALOT
  rationale: קללה denotes curse/cursing. 'A curse' is compact and preserves the idea
    that their fate becomes formulaic for invoking judgment on others.
- source_word: בְּכָל הַמְּקֹמוֹת
  chosen: in all the places
  alternatives:
  - wherever
  - throughout all the places
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'In all the places' keeps the formal
    correspondence and prepares for the relative clause.
- source_word: אֲשֶׁר אַדִּיחֵם שָׁם
  chosen: where I drive them
  alternatives:
  - where I banish them
  - where I scatter them
  lexicon: HALOT
  rationale: The Hiphil of נדח means to drive away, banish, or thrust away. 'Drive
    them' preserves the forceful divine action and echoes exile language without over-specifying
    dispersion.
