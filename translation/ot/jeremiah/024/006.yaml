id: JER.24.6
reference: Jeremiah 24:6
source:
  edition: WLC
  text: וְ/שַׂמְתִּ֨י עֵינִ֤/י עֲלֵי/הֶם֙ לְ/טוֹבָ֔ה וַ/הֲשִׁבֹתִ֖י/ם עַל הָ/אָ֣רֶץ
    הַ/זֹּ֑את וּ/בְנִיתִי/ם֙ וְ/לֹ֣א אֶהֱרֹ֔ס וּ/נְטַעְתִּ֖י/ם וְ/לֹ֥א אֶתּֽוֹשׁ־׃
translation:
  text: I will set my eyes on them for good, and I will bring them back to this land.
    I will build them up and not tear them down; I will plant them and not uproot
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for their good.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will restore them to this land.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew uses paired restoration metaphors: ''build ... not tear down'' and
      ''plant ... not uproot.'''
    reason: cross_reference
lexical_decisions:
- source_word: וְשַׂמְתִּי עֵינִי עֲלֵיהֶם
  chosen: I will set my eyes on them
  alternatives:
  - I will keep my eye on them
  - I will look on them
  lexicon: HALOT
  rationale: The idiom literally speaks of setting one's eyes upon someone. 'Set my
    eyes on them' preserves the Hebrew imagery while remaining natural English. It
    also prepares for the following לְטוֹבָה, indicating benevolent intent rather
    than mere observation.
- source_word: לְטוֹבָה
  chosen: for good
  alternatives:
  - for their good
  - for welfare
  lexicon: HALOT
  rationale: לְ with טוֹבָה here expresses purpose/result in a favorable sense. 'For
    good' is concise and idiomatic, preserving the broad sense of benefit without
    over-specifying 'their good,' though that is implied.
- source_word: וַהֲשִׁבֹתִים
  chosen: I will bring them back
  alternatives:
  - I will restore them
  - I will return them
  lexicon: HALOT
  rationale: The Hiphil of שוב with a direct object commonly means to cause to return.
    In context of exile and land, 'bring them back' is the clearest English rendering;
    'restore them' is broader and less spatially explicit.
- source_word: עַל הָאָרֶץ הַזֹּאת
  chosen: to this land
  alternatives:
  - to this הארץ
  - upon this land
  - to this הארץ הזאת
  lexicon: HALOT
  rationale: Although עַל often means 'upon/on,' with verbs of return it can function
    directionally. 'To this land' is idiomatic English and fits the context of return
    from exile. 'Land' is preferable to 'earth' here because the referent is the specific
    territory of Judah.
- source_word: וּבְנִיתִים
  chosen: I will build them up
  alternatives:
  - I will build them
  - I will rebuild them
  lexicon: HALOT
  rationale: The object is the people, not merely structures. 'Build them up' communicates
    the metaphor of restoration and flourishing. 'Rebuild them' could suggest prior
    destruction but is less direct with a personal object.
- source_word: וְלֹא אֶהֱרֹס
  chosen: and not tear them down
  alternatives:
  - and not overthrow them
  - and not destroy them
  lexicon: HALOT
  rationale: הרס is the natural antonym to בנה in prophetic building imagery. 'Tear
    down' preserves the metaphorical pair 'build up / tear down' familiar in Jeremiah
    and is more precise than the broader 'destroy.'
- source_word: וּנְטַעְתִּים
  chosen: I will plant them
  alternatives:
  - I will establish them
  lexicon: HALOT
  rationale: The agricultural metaphor should be retained. 'Plant them' is literal
    and pairs naturally with the following negated verb.
- source_word: וְלֹא אֶתּוֹשׁ
  chosen: and not uproot them
  alternatives:
  - and not pluck them up
  - and not pull them out
  lexicon: HALOT
  rationale: נתש in this prophetic metaphor means to pull up by the roots. 'Uproot'
    is clear modern English and preserves the plant imagery better than the more traditional
    but less common 'pluck up'.
