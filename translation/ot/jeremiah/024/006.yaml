theological_decisions:
- issue: Restoration language in covenant judgment/salvation context
  chosen_reading: Render the verse as a concrete promise of benevolent divine attention
    and return from exile, preserving the paired metaphors of building/planting rather
    than interpreting them spiritually or ecclesiologically.
  alternative_readings:
  - A more generalized promise of prosperity
  - A purely spiritual restoration
  rationale: The immediate context concerns the exiles whom the LORD regards favorably
    and will return to the land. The translation keeps the historical-land promise
    explicit while not excluding broader theological implications. This preserves
    the text's own emphasis without importing later doctrinal systems.
  doctrine_reference: Translation philosophy §§1, 3, 5
