id: JER.24.5
reference: Jeremiah 24:5
source:
  edition: WLC
  text: כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל כַּ/תְּאֵנִ֥ים הַ/טֹּב֖וֹת הָ/אֵ֑לֶּה כֵּֽן אַכִּ֞יר אֶת גָּל֣וּת יְהוּדָ֗ה אֲשֶׁ֨ר שִׁלַּ֜חְתִּי מִן הַ/מָּק֥וֹם הַ/זֶּ֛ה אֶ֥רֶץ כַּשְׂדִּ֖ים לְ/טוֹבָֽה־־־־׃
translation:
  text: 'Thus says Yahweh, the God of Israel: Like these good figs, so I will regard the exiles of Judah, whom I sent away from this place to the land of the Chaldeans, for good.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the exile of Judah' or 'the captivity of Judah.' The Hebrew can denote either the exiled people or the state/event of exile; here the personal sense best fits 'whom I sent away.'
    reason: alternative_reading
  - marker: b
    text: Or 'for their good.' The Hebrew simply says 'for good,' leaving the beneficiary implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional small-caps covenantal substitute in English.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - So says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' is natural, concise, and preserves the formal prophetic register.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct rendering; preserves covenantal identification.
- source_word: כַּתְּאֵנִים הַטֹּבוֹת הָאֵלֶּה
  chosen: Like these good figs
  alternatives:
  - As with these good figs
  - Like these figs, the good ones
  lexicon: HALOT
  rationale: The comparative כ plus the noun phrase introduces the simile from the vision. 'Like these good figs' is idiomatic and keeps the demonstrative force of הָאֵלֶּה.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Pairs naturally with the opening simile ('Like ... so ...') and preserves the comparison structure.
- source_word: אַכִּיר
  chosen: I will regard
  alternatives:
  - I will acknowledge
  - I will recognize
  - I will look upon
  lexicon: HALOT
  rationale: The Hiphil of נכר here conveys treating/regarding someone in a certain way, not merely cognitive recognition. 'Regard' fits the context of divine evaluation corresponding to the good figs.
- source_word: גָּלוּת יְהוּדָה
  chosen: the exiles of Judah
  alternatives:
  - the captivity of Judah
  - the exile of Judah
  lexicon: HALOT
  rationale: Though the noun can denote 'exile/captivity' collectively, the context points to the people carried away. 'The exiles of Judah' communicates the personal referent clearly in modern English.
- source_word: שִׁלַּחְתִּי
  chosen: I sent away
  alternatives:
  - I sent out
  - I deported
  lexicon: HALOT
  rationale: Preserves God's agency in the exile without importing a more technical political term than the Hebrew itself requires. 'Sent away' also fits the relational tone of the passage.
- source_word: מִן הַמָּקוֹם הַזֶּה
  chosen: from this place
  alternatives:
  - out of this place
  lexicon: HALOT
  rationale: Direct and idiomatic rendering, referring to Judah/Jerusalem as the place from which they were sent.
- source_word: אֶרֶץ כַּשְׂדִּים
  chosen: to the land of the Chaldeans
  alternatives:
  - to Chaldea
  - to the land of Babylon
  lexicon: HALOT
  rationale: Formal rendering of the Hebrew phrase; 'Chaldeans' preserves the ethnogeographic designation in the source text.
- source_word: לְטוֹבָה
  chosen: for good
  alternatives:
  - for their good
  - for benefit
  lexicon: HALOT
  rationale: Keeps the concise Hebrew expression and preserves the theological point that the exile, though judgment, is purposed by God for good. 'Their' is not explicit in the Hebrew, so it is left implicit.
