theological_decisions:
- issue: Referent of גָּלוּת יְהוּדָה
  chosen_reading: 'personal: ''the exiles of Judah'''
  alternative_readings:
  - 'abstract/collective: ''the exile of Judah'''
  - 'state: ''the captivity of Judah'''
  rationale: The immediate comparison to 'good figs' favors the people in exile rather than the abstract event alone. This also aligns with the following relative clause 'whom I sent away,' which naturally modifies persons.
- issue: Purpose nuance of לְטוֹבָה
  chosen_reading: 'teleological: ''for good'''
  alternative_readings:
  - 'benefactive: ''for their good'''
  rationale: The Hebrew states the purpose/result succinctly without an explicit pronoun. Rendering 'for good' preserves the text's brevity while allowing the context to imply the beneficiaries.
