id: JER.24.1
reference: Jeremiah 24:1
source:
  edition: WLC
  text: הִרְאַ/נִי֮ יְהוָה֒ וְ/הִנֵּ֗ה שְׁנֵי֙ דּוּדָאֵ֣י תְאֵנִ֔ים מוּעָדִ֕ים לִ/פְנֵ֖י
    הֵיכַ֣ל יְהוָ֑ה אַחֲרֵ֣י הַגְל֣וֹת נְבוּכַדְרֶאצַּ֣ר מֶֽלֶךְ בָּבֶ֡ל אֶת יְכָנְיָ֣הוּ
    בֶן יְהוֹיָקִ֣ים מֶֽלֶךְ יְהוּדָה֩ וְ/אֶת שָׂרֵ֨י יְהוּדָ֜ה וְ/אֶת הֶ/חָרָ֤שׁ
    וְ/אֶת הַ/מַּסְגֵּר֙ מִ/יר֣וּשָׁלִַ֔ם וַ/יְבִאֵ֖/ם בָּבֶֽל־־־־־־־׃
translation:
  text: The LORD showed me, and behold, two baskets of figs were set before the temple
    of the LORD, after Nebuchadrezzar king of Babylon had taken into exile Jeconiah
    son of Jehoiakim, king of Judah, along with the officials of Judah, the craftsmen,
    and the smiths from Jerusalem, and had brought them to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Nebuchadrezzar''; many English versions use the more familiar
      spelling ''Nebuchadnezzar.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'the princes of Judah' for 'the officials of Judah.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the metalworkers'; the Hebrew terms likely denote skilled workers taken
      into exile.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְאַנִי
  chosen: showed me
  alternatives:
  - caused me to see
  - let me see
  lexicon: HALOT
  rationale: Hiphil of ראה commonly means 'show' or 'cause to see.' 'Showed me' is
    idiomatic modern English and preserves the revelatory force without unnecessary
    stiffness.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, render YHWH as 'the LORD' rather
    than transliteration.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there were
  lexicon: HALOT
  rationale: The particle marks vivid presentation of the vision. 'And behold' preserves
    the discourse effect better than a flattened omission.
- source_word: שְׁנֵי דּוּדָאֵי תְאֵנִים
  chosen: two baskets of figs
  alternatives:
  - two pots of figs
  lexicon: HALOT
  rationale: דּוּד can denote a pot or basket-like container; in this context of produce
    set before the temple, 'baskets' is the most natural and widely supported sense
    in English.
- source_word: מוּעָדִים
  chosen: were set
  alternatives:
  - were placed
  - were appointed
  lexicon: HALOT
  rationale: Passive participle from יעד in this context indicates objects positioned
    or placed before the temple. 'Were set' is concise and natural; 'appointed' would
    sound overly abstract here.
- source_word: לִפְנֵי הֵיכַל יְהוָה
  chosen: before the temple of the LORD
  alternatives:
  - in front of the temple of the LORD
  - before the sanctuary of the LORD
  lexicon: HALOT
  rationale: הֵיכָל here refers to the temple building. 'Before the temple of the
    LORD' is the clearest idiomatic rendering.
- source_word: אַחֲרֵי הַגְלוֹת
  chosen: after ... had taken into exile
  alternatives:
  - after the exile of
  - after ... had deported
  lexicon: HALOT
  rationale: The infinitive construct with אַחֲרֵי marks prior action. Rendering with
    a pluperfect-like English clause communicates the sequence clearly. 'Taken into
    exile' is slightly more transparent than 'deported' while preserving the forced
    nature.
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadrezzar
  alternatives:
  - Nebuchadnezzar
  lexicon: HALOT
  rationale: The Hebrew form here is closer to 'Nebuchadrezzar,' so the transliteration
    follows the source form rather than harmonizing to the more familiar English spelling.
- source_word: יְכָנְיָהוּ
  chosen: Jeconiah
  alternatives:
  - Jechoniah
  - Coniah
  lexicon: HALOT
  rationale: A standard English transliteration of the form in this verse. It distinguishes
    this name form from shortened variants used elsewhere.
- source_word: שָׂרֵי יְהוּדָה
  chosen: the officials of Judah
  alternatives:
  - the princes of Judah
  - the leaders of Judah
  lexicon: HALOT
  rationale: שָׂרִים denotes ruling officials or princes. 'Officials' is readable
    modern English and avoids implying only royal sons, while still conveying governing
    status.
- source_word: הֶחָרָשׁ
  chosen: the craftsmen
  alternatives:
  - the artisans
  - the craftsmen class
  lexicon: HALOT
  rationale: חָרָשׁ can denote craftsmen broadly, not only one trade. The plural sense
    is required in English because it refers to a deported group, despite the singular
    form functioning collectively in Hebrew.
- source_word: הַמַּסְגֵּר
  chosen: the smiths
  alternatives:
  - the metalworkers
  - the locksmiths
  lexicon: HALOT
  rationale: The term likely refers to smiths or metalworkers as a class. 'Smiths'
    is concise and fits the historical context of skilled laborers taken into exile;
    'locksmiths' is too narrow.
- source_word: מִירוּשָׁלִַם
  chosen: from Jerusalem
  alternatives:
  - out of Jerusalem
  lexicon: HALOT
  rationale: Simple source preposition indicating the place from which they were taken.
- source_word: וַיְבִאֵם בָּבֶל
  chosen: and had brought them to Babylon
  alternatives:
  - and brought them to Babylon
  lexicon: HALOT
  rationale: English pluperfect fits the temporal frame established by 'after,' making
    clear that this action preceded the vision.
