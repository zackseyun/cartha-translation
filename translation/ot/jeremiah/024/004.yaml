id: JER.24.4
reference: Jeremiah 24:4
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD'' in English translations.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: In the prophetic formula ויהי דבר־יהוה אלי, English idiom is best served by rendering the clause as 'the word of the LORD came' rather than the more wooden 'and the word of the LORD was.' This preserves the standard sense of the formula without unnecessary stiffness.
- source_word: דְבַר
  chosen: word
  alternatives:
  - message
  - matter
  lexicon: HALOT
  rationale: '''Word'' is the standard rendering in the formula ''the word of the LORD,'' preserving both lexical continuity and the prophetic register. ''Message'' is possible but less formally tied to the recurring biblical expression.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: 'The preposition plus first-person suffix is straightforwardly directional: ''to me.'' ''Unto me'' is accurate but archaic in modern English.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - to say
  lexicon: HALOT
  rationale: '''Saying'' is the conventional and natural rendering of the infinitive introducing direct speech in prophetic discourse. It prepares for the following quotation in the next verse.'
