id: JER.32.41
reference: Jeremiah 32:41
source:
  edition: WLC
  text: וְ/שַׂשְׂתִּ֥י עֲלֵי/הֶ֖ם לְ/הֵטִ֣יב אוֹתָ֑/ם וּ/נְטַעְתִּ֞י/ם בָּ/אָ֤רֶץ
    הַ/זֹּאת֙ בֶּ/אֱמֶ֔ת בְּ/כָל לִבִּ֖/י וּ/בְ/כָל נַפְשִֽׁ/י־־׃ס
translation:
  text: I will rejoice over them to do them good, and I will plant them in this land
    in faithfulness, with all my heart and with all my soul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “in truth” or “truly.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂשְׂתִּי
  chosen: I will rejoice
  alternatives:
  - I will delight
  - I will take joy
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    futuristically here. 'Rejoice' preserves the strong affective sense of ששׂ while
    remaining natural English. 'Delight' is possible, but 'rejoice over' better matches
    the preposition עַל in context.
- source_word: עֲלֵיהֶם
  chosen: over them
  alternatives:
  - concerning them
  lexicon: HALOT
  rationale: With ששׂ, עַל commonly marks the object of rejoicing. 'Over them' is
    the most idiomatic and semantically precise rendering.
- source_word: לְהֵיטִיב אוֹתָם
  chosen: to do them good
  alternatives:
  - to do good to them
  - to benefit them
  lexicon: HALOT
  rationale: The infinitive construct of יטב with object suffix expresses purpose/result.
    'To do them good' is a fairly literal English rendering that preserves the covenantal
    flavor of the idiom; 'to do good to them' is smoother but slightly less direct.
- source_word: וּנְטַעְתִּים
  chosen: I will plant them
  alternatives:
  - I will establish them
  lexicon: HALOT
  rationale: נטע literally means 'plant.' In restoration contexts it can imply secure
    establishment, but the agricultural metaphor is important in Jeremiah and should
    be retained in the main text.
- source_word: בָּאָרֶץ הַזֹּאת
  chosen: in this land
  alternatives:
  - in this הארץ
  - in this country
  lexicon: HALOT
  rationale: '''Land'' is the standard rendering for אֶרֶץ here, fitting the covenant-restoration
    context and avoiding the narrower modern political sense of ''country.'''
- source_word: בֶּאֱמֶת
  chosen: in faithfulness
  alternatives:
  - in truth
  - truly
  lexicon: HALOT
  rationale: אֱמֶת can denote truth, reliability, or faithfulness. Here, with God's
    wholehearted commitment to restore and plant his people, 'in faithfulness' best
    conveys steadfast reliability rather than mere factual truthfulness. The alternative
    'in truth' is worth preserving because of traditional renderings and the semantic
    range of the noun.
- source_word: בְּכָל לִבִּי
  chosen: with all my heart
  lexicon: HALOT
  rationale: A standard Hebrew idiom for total inward commitment. 'With' is more idiomatic
    than a wooden 'in all my heart' in English.
- source_word: וּבְכָל נַפְשִׁי
  chosen: and with all my soul
  alternatives:
  - and with all my being
  lexicon: HALOT
  rationale: נֶפֶשׁ here denotes the whole self/life in parallel with 'heart.' 'Soul'
    preserves the familiar anthropological language of the Hebrew idiom; 'being' is
    possible but less textually transparent.
