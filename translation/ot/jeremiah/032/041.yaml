theological_decisions:
- issue: Anthropomorphic language for God's inner commitment
  chosen_reading: Retain 'with all my heart and with all my soul' as applied to God.
  alternative_readings:
  - Paraphrase as 'with my whole being' or 'with complete commitment'
  rationale: The Hebrew explicitly uses the same total-devotion idiom often applied
    to human covenant loyalty. Preserving the anthropomorphic language maintains the
    force of God's personal, covenantal commitment without flattening it into abstraction.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Sense of בֶּאֱמֶת in restoration promise
  chosen_reading: Render as 'in faithfulness' in the main text.
  alternative_readings:
  - in truth
  - truly
  rationale: The context emphasizes God's reliable commitment to restore and establish
    his people. 'In faithfulness' best preserves that covenantal nuance while avoiding
    an overly abstract reading. Because 'in truth' is a viable traditional alternative,
    it is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, §5
