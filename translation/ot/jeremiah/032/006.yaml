id: JER.32.6
reference: Jeremiah 32:6
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר יִרְמְיָ֑הוּ הָיָ֥ה דְּבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And Jeremiah said, "The word of Yahweh came to me, saying,"
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive on אמר advances the narrative. 'And ... said' is a natural modern English rendering that preserves the sequential force without overinterpreting it temporally as 'then.'
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  rationale: Personal name transliterated by standard English convention, following the translation philosophy to transliterate names rather than translate them.
- source_word: הָיָה דְבַר־יְהוָה אֵלַי
  chosen: The word of the LORD came to me
  alternatives:
  - The word of the LORD was to me
  - The word of the LORD happened to me
  lexicon: HALOT
  rationale: This is a standard prophetic formula. Although היה is literally 'was,' idiomatic English for this revelatory construction is 'came to me,' which best conveys the sense of divine communication while remaining close to the Hebrew.
- source_word: דְבַר
  chosen: word
  alternatives:
  - message
  lexicon: HALOT
  rationale: '''Word'' preserves the familiar prophetic formula and the lexical link to דבר. ''Message'' is possible but less formally aligned with the Hebrew expression.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Direct rendering of the preposition plus first-person singular suffix.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive introduces the content of the divine speech in standard biblical style. 'Saying' is the most natural English equivalent here and preserves the formal transition into the next verse.
