id: JER.32.21
reference: Jeremiah 32:21
source:
  edition: WLC
  text: וַ/תֹּצֵ֛א אֶת עַמְּ/ךָ֥ אֶת יִשְׂרָאֵ֖ל מֵ/אֶ֣רֶץ מִצְרָ֑יִם בְּ/אֹת֣וֹת
    וּ/בְ/מוֹפְתִ֗ים וּ/בְ/יָ֤ד חֲזָקָה֙ וּ/בְ/אֶזְר֣וֹעַ נְטוּיָ֔ה וּ/בְ/מוֹרָ֖א
    גָּדֽוֹל־־׃
translation:
  text: And you brought your people Israel out of the land of Egypt with signs and
    wonders, with a strong hand and an outstretched arm, and with great terror.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "with great awe." The Hebrew phrase can denote fear, terror, or awe.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּצֵא
  chosen: you brought ... out
  alternatives:
  - you led ... out
  - you brought forth
  lexicon: HALOT
  rationale: Hiphil of יצא commonly means to cause to go out, hence 'bring out.' 'Led
    out' is possible, but 'brought ... out' more directly reflects the causative force
    and standard exodus idiom.
- source_word: עַמְּךָ
  chosen: your people
  lexicon: HALOT
  rationale: Straightforward covenantal designation; possessive retained to reflect
    direct address to God.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Appositional clarification of 'your people'; retained in English as 'your
    people Israel' to preserve the Hebrew emphasis.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: out of the land of Egypt
  alternatives:
  - from the land of Egypt
  lexicon: HALOT
  rationale: '''Out of'' fits the exodus context and pairs naturally with the causative
    verb ''brought ... out.'' ''Land of Egypt'' is retained formally.'
- source_word: בְּאֹתוֹת
  chosen: with signs
  alternatives:
  - by signs
  lexicon: HALOT
  rationale: The preposition ב here is instrumental; 'with signs' is idiomatic modern
    English while preserving the means by which God acted.
- source_word: וּבְמוֹפְתִים
  chosen: and wonders
  alternatives:
  - and miraculous signs
  - and portents
  lexicon: HALOT
  rationale: The common pair 'signs and wonders' is well established and accurately
    reflects אותות ומופתים without unnecessary expansion.
- source_word: וּבְיָד חֲזָקָה
  chosen: with a strong hand
  alternatives:
  - with a mighty hand
  lexicon: HALOT
  rationale: Literally 'with a strong hand.' 'Mighty hand' is traditional and possible,
    but 'strong hand' stays closer to חזק while remaining natural English.
- source_word: וּבְאֶזְרֹעַ נְטוּיָה
  chosen: and an outstretched arm
  alternatives:
  - and a stretched-out arm
  lexicon: HALOT
  rationale: This is a fixed exodus expression. 'Outstretched arm' is the most natural
    and recognizable English equivalent.
- source_word: וּבְמוֹרָא גָּדוֹל
  chosen: and with great terror
  alternatives:
  - and with great fearfulness
  - and with great awe
  lexicon: HALOT
  rationale: מוֹרָא can denote fear, terror, or awe. In exodus-deliverance contexts
    it points to fearsome acts that inspire dread. 'Great terror' best captures the
    objective, fear-inducing character of God's deeds here, rather than Israel's subjective
    reverence.
