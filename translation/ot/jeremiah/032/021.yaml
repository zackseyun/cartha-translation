theological_decisions:
- issue: Rendering of the exodus formula's final phrase וּבְמוֹרָא גָּדוֹל
  chosen_reading: and with great terror
  alternative_readings:
  - and with great awe
  rationale: The phrase describes the fearsome character of God's redemptive acts
    in history. 'Awe' is possible, but can sound primarily reverential and subjective
    in modern English. 'Great terror' better preserves the weight and dread associated
    with divine acts against Egypt while not importing additional doctrinal claims.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
