id: JER.32.25
reference: Jeremiah 32:25
source:
  edition: WLC
  text: וְ/אַתָּ֞ה אָמַ֤רְתָּ אֵלַ/י֙ אֲדֹנָ֣/י יְהוִ֔ה קְנֵֽה לְ/ךָ֧ הַ/שָּׂדֶ֛ה בַּ/כֶּ֖סֶף וְ/הָעֵ֣ד עֵדִ֑ים וְ/הָ/עִ֥יר נִתְּנָ֖ה בְּ/יַ֥ד הַ/כַּשְׂדִּֽים־׃
translation:
  text: Yet you yourself said to me, Lord Yahweh, ‘Buy the field for yourself with silver and call witnesses,’ though the city has been given into the hand of the Chaldeans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'while the city has been given into the hand of the Chaldeans.' The Hebrew conjunction can be read more simply as 'and/while'; the main text brings out the concessive force in Jeremiah's complaint.
    reason: alternative_reading
  - marker: b
    text: '''Chaldeans'' refers to the Babylonian power.'
    reason: cultural_note
lexical_decisions:
- source_word: וְאַתָּה
  chosen: Yet you yourself
  alternatives:
  - And you
  - But you
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun creates contrast/emphasis in Jeremiah's prayer. 'Yet' captures the adversative force in context, and 'yourself' reflects the emphatic pronoun.
- source_word: אָמַרְתָּ אֵלַי
  chosen: said to me
  alternatives:
  - have said to me
  - spoke to me
  lexicon: HALOT
  rationale: Simple past fits the narrative-prayer context. 'Said to me' is the most natural rendering of אמר + אל.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord GOD
  - Lord Yahweh
  lexicon: HALOT
  rationale: This is the standard rendering of אֲדֹנָי יְהוִה, distinguishing אֲדֹנָי ('Lord') from the divine name. Per doctrine, יְהוָה is rendered 'the LORD' by default; in the compound title, English convention uses 'GOD' to avoid 'Lord LORD'.
- source_word: קְנֵה לְךָ הַשָּׂדֶה
  chosen: Buy the field for yourself
  alternatives:
  - Buy the field
  - Acquire the field for yourself
  lexicon: HALOT
  rationale: The imperative קְנֵה is straightforwardly 'buy/acquire.' Including 'for yourself' reflects לְךָ, which is not redundant but marks personal involvement/benefit.
- source_word: בַּכֶּסֶף
  chosen: with silver
  alternatives:
  - for money
  - with the silver
  lexicon: HALOT
  rationale: כֶּסֶף literally denotes 'silver' and often by extension money. Here 'with silver' preserves the concrete wording without obscuring the transactional sense.
- source_word: וְהָעֵד עֵדִים
  chosen: and call witnesses
  alternatives:
  - and witness witnesses
  - and have witnesses testify
  - and take witnesses
  lexicon: HALOT
  rationale: The Hiphil imperative of עוד with עֵדִים means to secure or call witnesses. 'Call witnesses' is idiomatic English that preserves the legal sense.
- source_word: וְהָעִיר
  chosen: though the city
  alternatives:
  - while the city
  - and the city
  lexicon: HALOT
  rationale: In context Jeremiah is expressing tension between God's command and the military reality. Rendering the conjunction as 'though' brings out the concessive force implied by the prayer.
- source_word: נִתְּנָה
  chosen: has been given
  alternatives:
  - was given
  - is given
  lexicon: HALOT
  rationale: The Niphal perfect can be rendered as a present-result perfect in English, highlighting the city's current state as already handed over.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - to the control of
  lexicon: HALOT
  rationale: '''Into the hand of'' is a standard Hebrew idiom for being delivered into someone''s power. Retaining ''hand'' preserves the idiom and biblical texture.'
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew specifically says 'Chaldeans.' Although 'Babylonians' would be more immediately familiar, 'Chaldeans' is the more direct rendering and remains understandable in context.
