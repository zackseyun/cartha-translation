id: JER.32.2
reference: Jeremiah 32:2
source:
  edition: WLC
  text: וְ/אָ֗ז חֵ֚יל מֶ֣לֶךְ בָּבֶ֔ל צָרִ֖ים עַל יְרוּשָׁלִָ֑ם וְ/יִרְמְיָ֣הוּ הַ/נָּבִ֗יא
    הָיָ֤ה כָלוּא֙ בַּ/חֲצַ֣ר הַ/מַּטָּרָ֔ה אֲשֶׁ֖ר בֵּֽית מֶ֥לֶךְ יְהוּדָֽה־־׃
translation:
  text: At that time the army of the king of Babylon was besieging Jerusalem, and
    Jeremiah the prophet was confined in the court of the guard, which was in the
    house of the king of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was laying siege to Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: '''House of the king of Judah'' refers to the royal palace complex.'
    reason: cultural_note
lexical_decisions:
- source_word: וְ/אָז
  chosen: At that time
  alternatives:
  - And then
  - Now at that time
  lexicon: HALOT
  rationale: Temporal discourse marker introducing the historical setting. 'At that
    time' is natural English and preserves the temporal sense better than a wooden
    'and then.'
- source_word: חֵיל
  chosen: army
  alternatives:
  - force
  - host
  lexicon: HALOT
  rationale: Refers to the military force of Babylon's king. 'Army' is the clearest
    contemporary equivalent for the collective military sense.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly in English. Retains the formal
    royal designation.
- source_word: צָרִים עַל
  chosen: was besieging
  alternatives:
  - were besieging
  - was laying siege to
  lexicon: HALOT
  rationale: The participle with singular collective subject 'army' is best rendered
    with singular English agreement. 'Besieging' captures the military action idiomatically;
    'laying siege to' is possible but slightly more cumbersome.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: וְ/יִרְמְיָהוּ הַ/נָּבִיא
  chosen: and Jeremiah the prophet
  alternatives:
  - while Jeremiah the prophet
  lexicon: HALOT
  rationale: Simple coordination is adequate. The appositional title 'the prophet'
    should be retained because it is explicit in the Hebrew and identifies Jeremiah's
    role.
- source_word: הָיָה כָלוּא
  chosen: was confined
  alternatives:
  - was shut up
  - was imprisoned
  lexicon: HALOT
  rationale: '''Was confined'' reflects the passive/resultative sense of being restrained
    or shut in. ''Imprisoned'' is possible, but the following location phrase specifies
    a guarded court rather than necessarily a conventional prison cell.'
- source_word: בַּ/חֲצַר
  chosen: in the court
  alternatives:
  - in the courtyard
  lexicon: HALOT
  rationale: The noun denotes an enclosed court/courtyard. 'Court' fits the collocation
    'court of the guard' and sounds natural in this institutional setting.
- source_word: הַ/מַּטָּרָה
  chosen: of the guard
  alternatives:
  - of the prison
  - of the watch
  lexicon: HALOT
  rationale: In this context the term refers to a guarded place or guard-post area.
    'Court of the guard' is a well-established and contextually precise rendering
    that avoids over-specifying it as a prison while preserving the custodial sense.
- source_word: אֲשֶׁר בֵּית מֶלֶךְ יְהוּדָה
  chosen: which was in the house of the king of Judah
  alternatives:
  - which was at the house of the king of Judah
  - which belonged to the house of the king of Judah
  lexicon: HALOT
  rationale: The relative clause locates the court within the royal complex. 'House'
    here means palace/royal house, but retaining 'house' is faithful and idiomatic
    enough in biblical narrative; the sense is clarified by context.
