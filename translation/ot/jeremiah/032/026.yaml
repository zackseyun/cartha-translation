id: JER.32.26
reference: Jeremiah 32:26
source:
  edition: WLC
  text: וַ/יְהִי֙ דְּבַר יְהוָ֔ה אֶֽל יִרְמְיָ֖הוּ לֵ/אמֹֽר־־׃
translation:
  text: Then the word of Yahweh came to Jeremiah, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH; alternatively rendered 'Yahweh' or 'Jehovah.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - And it came to pass
  - Then it came
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence. In English, the idiom is best carried by 'Then ... came' rather than the wooden 'and it came to pass,' preserving narrative flow without paraphrase.
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - the message
  - the matter
  lexicon: HALOT
  rationale: In the prophetic formula דְּבַר יְהוָה, 'the word' is the standard and most transparent rendering, preserving the formal prophetic idiom and its theological weight.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks direction toward Jeremiah; 'to' is the natural modern English equivalent.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive introduces the content of the divine speech in standard Hebrew narrative style. 'Saying' is the conventional and clear English rendering.
