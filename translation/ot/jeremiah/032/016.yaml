id: JER.32.16
reference: Jeremiah 32:16
source:
  edition: WLC
  text: וָ/אֶתְפַּלֵּ֖ל אֶל יְהוָ֑ה אַחֲרֵ֤י תִתִּ/י֙ אֶת סֵ֣פֶר הַ/מִּקְנָ֔ה אֶל בָּר֥וּךְ בֶּן נֵרִיָּ֖ה לֵ/אמֹֽר־־־־׃
translation:
  text: After I had given the deed of purchase to Baruch son of Neriah, I prayed to Yahweh, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Rendered ''the LORD'' according to the project''s standard; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֶתְפַּלֵּל
  chosen: I prayed
  alternatives:
  - I prayed earnestly
  - I interceded
  lexicon: HALOT
  rationale: The hitpael of פלל commonly means 'to pray.' 'I prayed' is the most natural and sufficiently precise English rendering without adding intensity not explicit in the verb.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: The preposition אֶל is straightforwardly 'to.' Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated, following the project's default for the divine name.
- source_word: אַחֲרֵי
  chosen: After
  alternatives:
  - Afterward
  - Following
  lexicon: HALOT
  rationale: Temporal אַחֲרֵי introduces the sequence of events. 'After' is the clearest modern English equivalent.
- source_word: תִתִּי
  chosen: I had given
  alternatives:
  - I gave
  lexicon: HALOT
  rationale: 'The infinitive-like temporal construction with אַחֲרֵי plus the 1cs suffix-form of נתן refers to prior completed action relative to the main verb. English past perfect best captures the sequence: first giving the document, then praying.'
- source_word: סֵפֶר הַמִּקְנָה
  chosen: the deed of purchase
  alternatives:
  - the purchase deed
  - the bill of sale
  - the purchase document
  lexicon: HALOT
  rationale: סֵפֶר is a written document, and הַמִּקְנָה specifies that it concerns the purchase. 'Deed of purchase' is idiomatic legal English that preserves the documentary sense better than the overly generic 'book' or 'document'.
- source_word: אֶל בָּרוּךְ בֶּן נֵרִיָּה
  chosen: to Baruch son of Neriah
  alternatives:
  - to Baruch the son of Neriah
  lexicon: HALOT
  rationale: Names are transliterated per project philosophy. 'Son of' is retained as the normal biblical patronymic; omitting 'the' keeps the English natural while preserving the Hebrew relationship.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said,
  lexicon: HALOT
  rationale: לֵאמֹר introduces the content of the prayer in the next verse. 'Saying,' preserves the formal linkage and prepares for the quoted speech.
