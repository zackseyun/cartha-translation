id: JER.32.3
reference: Jeremiah 32:3
source:
  edition: WLC
  text: אֲשֶׁ֣ר כְּלָא֔/וֹ צִדְקִיָּ֥הוּ מֶֽלֶךְ יְהוּדָ֖ה לֵ/אמֹ֑ר מַדּוּעַ֩ אַתָּ֨ה נִבָּ֜א לֵ/אמֹ֗ר כֹּ֚ה אָמַ֣ר יְהוָ֔ה הִנְ/נִ֨י נֹתֵ֜ן אֶת הָ/עִ֥יר הַ/זֹּ֛את בְּ/יַ֥ד מֶֽלֶךְ בָּבֶ֖ל וּ/לְכָדָֽ/הּ־־־׃
translation:
  text: 'because Zedekiah king of Judah had confined him, saying, “Why do you prophesy, saying, ‘Thus says Yahweh: Behold, I am giving this city into the hand of the king of Babylon, and he will capture it’?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'had shut him up' or 'had imprisoned him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - whom
  - that
  lexicon: HALOT
  rationale: In context this relative particle introduces the reason connected to the previous verse ('for/because Zedekiah... had confined him'), not a simple relative clause in English. 'Because' best captures the discourse function.
- source_word: כְּלָאוֹ
  chosen: had confined him
  alternatives:
  - had shut him up
  - had imprisoned him
  lexicon: HALOT
  rationale: The verb כלא denotes restraining/confining/imprisoning. 'Had confined him' is natural modern English and preserves the custodial sense without unnecessary archaism. The pluperfect reflects the prior action relative to the quoted complaint.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with the words
  - when he said
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing direct speech. 'Saying' is concise and transparent.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  - Why is it that
  lexicon: HALOT
  rationale: Direct interrogative; 'Why' is the plain and idiomatic rendering.
- source_word: נִבָּא
  chosen: do you prophesy
  alternatives:
  - are you prophesying
  - do you act as a prophet
  lexicon: HALOT
  rationale: The Niphal of נבא commonly means 'prophesy.' English present 'do you prophesy' fits the king's complaint and the following quotative structure.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - Thus said the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. 'Thus says the LORD' preserves its recognizable force. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: The particle marks solemn immediacy and divine self-involvement. 'Behold' retains the prophetic gravity better than flatter alternatives, while remaining understandable.
- source_word: נֹתֵן
  chosen: am giving
  alternatives:
  - am about to give
  - will give
  lexicon: HALOT
  rationale: The participle conveys imminent or certain action in prophetic speech. 'Am giving' preserves the vividness of the Hebrew while allowing the future consequence to follow naturally.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: HALOT
  rationale: This idiom often means delivery into someone's power. 'Into the hand of' preserves the Hebrew image and remains idiomatic enough in English Bible style.
- source_word: וּלְכָדָהּ
  chosen: and he will capture it
  alternatives:
  - and he will take it
  - and he will seize it
  lexicon: HALOT
  rationale: The verb לכד means capture/seize, especially of a city. 'Capture' is precise for military conquest; the subject is naturally the king of Babylon as singular masculine.
