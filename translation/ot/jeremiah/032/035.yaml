theological_decisions:
- issue: Nature of the child-sacrifice expression
  chosen_reading: Render the idiom explicitly as 'make their sons and their daughters
    pass through the fire to Molech.'
  alternative_readings:
  - make their sons and daughters pass to Molech
  - offer their sons and daughters to Molech
  rationale: The Hebrew idiom refers to child sacrifice, but the translation preserves
    the source expression rather than replacing it with a more interpretive paraphrase.
    Adding 'through the fire' makes explicit what is commonly implicit in the idiom
    and fits the cultic context.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source-text
    sense without unnecessary paraphrase.'
- issue: Divine anthropomorphic language
  chosen_reading: Retain the anthropomorphic expression as 'nor had it entered my
    heart.'
  alternative_readings:
  - nor did it arise in my mind
  rationale: This preserves the Hebrew's rhetorical and theological force without
    flattening it into abstract prose. It communicates that the practice was wholly
    contrary to God's will, not that God lacked knowledge.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
