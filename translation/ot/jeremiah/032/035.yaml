id: JER.32.35
reference: Jeremiah 32:35
source:
  edition: WLC
  text: וַ/יִּבְנוּ֩ אֶת בָּמ֨וֹת הַ/בַּ֜עַל אֲשֶׁ֣ר בְּ/גֵ֣יא בֶן הִנֹּ֗ם לְ֠/הַעֲבִיר
    אֶת בְּנֵי/הֶ֣ם וְ/אֶת בְּנוֹתֵי/הֶם֮ לַ/מֹּלֶךְ֒ אֲשֶׁ֣ר לֹֽא צִוִּיתִ֗י/ם וְ/לֹ֤א
    עָֽלְתָה֙ עַל לִבִּ֔/י לַ/עֲשׂ֖וֹת הַ/תּוֹעֵבָ֣ה הַ/זֹּ֑את לְמַ֖עַן החטי אֶת יְהוּדָֽה־׀־־־־־־׃ס
translation:
  text: They built the high places of Baal that are in the Valley of Ben-hinnom, to
    make their sons and their daughters pass through the fire to Molech—something
    I had not commanded them, nor had it entered my heart that they should do this
    abomination, causing Judah to sin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the valley of the son of Hinnom.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to make their sons and their daughters pass through'; this idiom
      refers to child sacrifice, here associated with fire and Molech worship.
    reason: cultural_note
  - marker: c
    text: Or 'nor did it arise in my mind.' Hebrew 'nor did it come up upon my heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּמ֨וֹת
  chosen: high places
  alternatives:
  - shrines
  lexicon: HALOT
  rationale: Standard rendering for cultic elevated worship sites; 'shrines' is possible
    but less specific to the established biblical idiom.
- source_word: הַבַּעַל
  chosen: Baal
  alternatives:
  - the Baal
  lexicon: HALOT
  rationale: Treated as the proper name of the deity rather than a generic title here,
    matching the cultic reference.
- source_word: בְּגֵיא בֶן־הִנֹּם
  chosen: in the Valley of Ben-hinnom
  alternatives:
  - in the valley of the son of Hinnom
  - in Gehenna
  lexicon: HALOT
  rationale: Transliterates the place name while preserving the Hebrew construct.
    'Gehenna' would be anachronistic in this OT context; the fully literal 'valley
    of the son of Hinnom' is preserved as an alternative.
- source_word: לְהַעֲבִיר
  chosen: to make ... pass through the fire
  alternatives:
  - to offer
  - to sacrifice
  lexicon: HALOT
  rationale: The verb literally means 'to cause to pass over/through'; in this cultic
    context it refers to child sacrifice. The wording 'pass through the fire' preserves
    the Hebrew idiom while making the sense explicit in English.
- source_word: לַמֹּלֶךְ
  chosen: to Molech
  alternatives:
  - to the king
  - for Molech
  lexicon: HALOT
  rationale: In this context the term refers to the deity Molech rather than the common
    noun 'king.' The preposition is naturally rendered 'to' with sacrificial direction.
- source_word: אֲשֶׁר לֹא צִוִּיתִים
  chosen: something I had not commanded them
  alternatives:
  - which I did not command them
  lexicon: HALOT
  rationale: Smooth English rendering of the relative clause with object suffix; preserves
    divine disavowal of the practice.
- source_word: וְלֹא עָלְתָה עַל לִבִּי
  chosen: nor had it entered my heart
  alternatives:
  - nor did it come upon my heart
  - nor did it arise in my mind
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the Hebrew anthropomorphic expression,
    preserving the force that the act was utterly contrary to God's will.
- source_word: הַתּוֹעֵבָה הַזֹּאת
  chosen: this abomination
  alternatives:
  - this detestable thing
  lexicon: HALOT
  rationale: '''Abomination'' is the standard rendering for תּוֹעֵבָה in idolatrous
    and morally abhorrent contexts and carries the needed theological weight.'
- source_word: לְמַעַן הַחֲטִיא
  chosen: causing Judah to sin
  alternatives:
  - so as to make Judah sin
  - thereby leading Judah into sin
  lexicon: HALOT
  rationale: The Hiphil of חטא is causative; 'causing Judah to sin' captures the resultative
    force in clear modern English.
- source_word: וַיִּבְנוּ
  chosen: They built
  alternatives:
  - And they built
  lexicon: HALOT
  rationale: English style often omits the initial conjunction at the start of a sentence;
    the verbal action remains unchanged.
