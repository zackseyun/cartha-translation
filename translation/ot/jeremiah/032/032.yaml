id: JER.32.32
reference: Jeremiah 32:32
source:
  edition: WLC
  text: עַל֩ כָּל רָעַ֨ת בְּנֵֽי יִשְׂרָאֵ֜ל וּ/בְנֵ֣י יְהוּדָ֗ה אֲשֶׁ֤ר עָשׂוּ֙ לְ/הַכְעִסֵ֔/נִי
    הֵ֤מָּה מַלְכֵי/הֶם֙ שָֽׂרֵי/הֶ֔ם כֹּהֲנֵי/הֶ֖ם וּ/נְבִֽיאֵי/הֶ֑ם וְ/אִ֣ישׁ יְהוּדָ֔ה
    וְ/יֹשְׁבֵ֖י יְרוּשָׁלִָֽם־־׃
translation:
  text: because of all the evil of the sons of Israel and the sons of Judah that they
    did to provoke me to anger—they, their kings, their officials, their priests,
    and their prophets, and the men of Judah and the inhabitants of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people of Israel and the people of Judah.' The Hebrew reads literally
      'the sons of Israel and the sons of Judah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to anger me.'
    reason: lexical_alternative
  - marker: c
    text: Or 'each man of Judah'; the Hebrew is singular 'man' used collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: because of
  alternatives:
  - for
  - on account of
  - concerning
  lexicon: HALOT
  rationale: In context this preposition gives the ground or cause for the judgment
    statement carried over from the previous verse. 'Because of' best conveys causal
    force in natural English.
- source_word: כָּל רָעַת
  chosen: all the evil
  alternatives:
  - all the wickedness
  - all the harm
  lexicon: HALOT
  rationale: רָעָה here denotes moral evil/wickedness rather than merely calamity.
    'All the evil' is direct and preserves the comprehensive force of כָּל.
- source_word: בְּנֵי יִשְׂרָאֵל וּבְנֵי יְהוּדָה
  chosen: the sons of Israel and the sons of Judah
  alternatives:
  - the people of Israel and the people of Judah
  - the Israelites and the Judeans
  lexicon: HALOT
  rationale: The Hebrew is literally 'sons of.' Per gender-accurate philosophy, the
    masculine form is preserved where representative. 'Sons of Israel/Judah' is more
    formally transparent than flattening to 'people,' while still understandable.
- source_word: אֲשֶׁר עָשׂוּ
  chosen: that they did
  alternatives:
  - which they committed
  - that they have done
  lexicon: HALOT
  rationale: A straightforward rendering of the relative clause. 'Did' keeps the verbal
    simplicity of עשה without importing interpretive nuance like 'committed.'
- source_word: לְהַכְעִסֵנִי
  chosen: to provoke me to anger
  alternatives:
  - to anger me
  - to provoke me
  lexicon: HALOT
  rationale: The Hiphil of כעס means to provoke to anger. 'To provoke me to anger'
    preserves both causative force and divine response more fully than the shorter
    'to anger me.'
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - they themselves
  lexicon: HALOT
  rationale: The independent pronoun is emphatic, introducing the list of responsible
    groups. English can reflect this with a dash and resumptive 'they' without overloading
    the sentence.
- source_word: מַלְכֵיהֶם
  chosen: their kings
  lexicon: HALOT
  rationale: Direct possessive rendering.
- source_word: שָׂרֵיהֶם
  chosen: their officials
  alternatives:
  - their princes
  - their leaders
  lexicon: HALOT
  rationale: שָׂרִים are ruling officials/administrators. 'Officials' is clear modern
    English and avoids the potentially misleading aristocratic nuance of 'princes.'
- source_word: כֹּהֲנֵיהֶם
  chosen: their priests
  lexicon: HALOT
  rationale: Standard rendering.
- source_word: וּנְבִיאֵיהֶם
  chosen: and their prophets
  lexicon: HALOT
  rationale: Standard rendering; included in the culpability list.
- source_word: וְאִישׁ יְהוּדָה
  chosen: and the men of Judah
  alternatives:
  - and each man of Judah
  - and the people of Judah
  lexicon: HALOT
  rationale: אִישׁ with a collective/genitival complement often has distributive or
    representative force. 'The men of Judah' preserves the masculine singular-based
    collective better than the gender-neutral 'people of Judah.'
- source_word: וְיֹשְׁבֵי יְרוּשָׁלִָם
  chosen: and the inhabitants of Jerusalem
  alternatives:
  - and those dwelling in Jerusalem
  lexicon: HALOT
  rationale: A natural rendering of the participial expression denoting the resident
    population.
