theological_decisions:
- issue: Gendered collective language in בני / איש
  chosen_reading: Preserve masculine-marked collectives as 'sons' and 'men' rather
    than neutralizing to 'people'
  alternative_readings:
  - the people of Israel and Judah
  - everyone in Judah
  rationale: The Hebrew uses masculine collective terms. Per the translation philosophy's
    gender-accurate principle, the English should reflect the source's form and representative
    force unless context clearly demands neutralization.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
