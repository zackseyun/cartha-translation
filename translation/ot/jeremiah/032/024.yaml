theological_decisions:
- issue: Rendering of divine speech fulfillment formula
  chosen_reading: What you spoke has happened
  alternative_readings:
  - What you said has come to pass
  rationale: The verse emphasizes that the present catastrophe confirms the reliability
    of God's prior word, without adding doctrinal interpretation beyond the text.
    The chosen rendering is clear and preserves the fulfillment motif.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
