id: JER.32.24
reference: Jeremiah 32:24
source:
  edition: WLC
  text: הִנֵּ֣ה הַ/סֹּלְל֗וֹת בָּ֣אוּ הָ/עִיר֮ לְ/לָכְדָ/הּ֒ וְ/הָ/עִ֣יר נִתְּנָ֗ה
    בְּ/יַ֤ד הַ/כַּשְׂדִּים֙ הַ/נִּלְחָמִ֣ים עָלֶ֔י/הָ מִ/פְּנֵ֛י הַ/חֶ֥רֶב וְ/הָ/רָעָ֖ב
    וְ/הַ/דָּ֑בֶר וַ/אֲשֶׁ֥ר דִּבַּ֛רְתָּ הָיָ֖ה וְ/הִנְּ/ךָ֥ רֹאֶֽה׃
translation:
  text: Look, the siege ramps have come up against the city to capture it, and the
    city has been given into the hand of the Chaldeans who are fighting against it,
    because of the sword and the famine and the plague. What you spoke has happened,
    and look, you see it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the siegeworks' or 'the mounds.' The Hebrew refers to earthworks built
      up in a siege to assault a city.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Babylonians.' The Hebrew says 'the Chaldeans,' the people identified
      with the Neo-Babylonian power.
    reason: lexical_alternative
  - marker: c
    text: Or 'pestilence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle marking vivid attention. 'Look' is natural modern English
    and preserves the immediacy better than the more archaic 'Behold.'
- source_word: הַסֹּלְלוֹת
  chosen: the siege ramps
  alternatives:
  - the mounds
  - the siegeworks
  lexicon: HALOT
  rationale: In siege context, סללות refers to raised earthworks/ramps used in attacking
    a city. 'Siege ramps' is concrete and clear in modern English; 'mounds' is too
    vague without context.
- source_word: בָּאוּ ... הָעִיר
  chosen: have come up against the city
  alternatives:
  - have come to the city
  - have reached the city
  lexicon: HALOT
  rationale: With siegeworks as subject and the following purpose clause 'to capture
    it,' the sense is that the ramps have advanced up to/against the city walls. 'Come
    up against' conveys military approach more clearly than a bare 'come to.'
- source_word: לְלָכְדָהּ
  chosen: to capture it
  alternatives:
  - to take it
  - to seize it
  lexicon: HALOT
  rationale: לכד commonly means capture/seize, especially of a city. 'Capture' is
    idiomatic in military context.
- source_word: נִתְּנָה בְּיַד
  chosen: has been given into the hand of
  alternatives:
  - has been handed over to
  - has been delivered into the power of
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for being delivered into another's power.
    Retaining 'into the hand of' preserves the idiom while remaining understandable.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew ethnonym is 'Chaldeans.' While historically referring to the
    Neo-Babylonian power, the direct lexical equivalent should be preserved in the
    main text; 'Babylonians' is a contextual alternative.
- source_word: הַנִּלְחָמִים עָלֶיהָ
  chosen: who are fighting against it
  alternatives:
  - who are attacking it
  - who are warring against it
  lexicon: HALOT
  rationale: The participle plus על expresses ongoing hostile action. 'Fighting against
    it' is a transparent rendering of the verbal form.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - on account of
  lexicon: HALOT
  rationale: 'Here the preposition introduces the cause or occasion of the city''s
    fall: sword, famine, and plague. ''Because of'' is the clearest idiomatic English
    equivalent.'
- source_word: הַחֶרֶב וְהָרָעָב וְהַדָּבֶר
  chosen: the sword and the famine and the plague
  alternatives:
  - the sword, famine, and pestilence
  lexicon: HALOT
  rationale: These are the standard covenant-judgment terms. 'Plague' is more accessible
    modern English than 'pestilence,' while preserving the triad's force. Repeating
    'the' mirrors the Hebrew emphasis.
- source_word: וַאֲשֶׁר דִּבַּרְתָּ הָיָה
  chosen: What you spoke has happened
  alternatives:
  - What you said has come to pass
  - What you spoke has come about
  lexicon: HALOT
  rationale: The clause affirms fulfillment of God's prior word. 'Has happened' is
    natural modern English and accurately conveys realized fulfillment.
- source_word: וְהִנְּךָ רֹאֶה
  chosen: and look, you see it
  alternatives:
  - and behold, you see it
  - and here you are seeing it
  lexicon: HALOT
  rationale: The expression underscores direct divine observation of the fulfilled
    word. 'And look, you see it' preserves the vividness and the repeated deictic
    force.
