id: JER.32.28
reference: Jeremiah 32:28
source:
  edition: WLC
  text: לָ/כֵ֕ן כֹּ֖ה אָמַ֣ר יְהוָ֑ה הִנְ/נִ֣י נֹתֵן֩ אֶת הָ/עִ֨יר הַ/זֹּ֜את בְּ/יַ֣ד
    הַ/כַּשְׂדִּ֗ים וּ/בְ/יַ֛ד נְבֽוּכַדְרֶאצַּ֥ר מֶֽלֶךְ בָּבֶ֖ל וּ/לְכָדָֽ/הּ־־׃
translation:
  text: 'Therefore thus says the LORD: Behold, I am giving this city into the hand
    of the Chaldeans and into the hand of Nebuchadnezzar king of Babylon, and he will
    capture it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Nebuchadrezzar''; traditionally rendered ''Nebuchadnezzar'' in
      English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks a consequential transition from the preceding divine indictment
    and explanation; 'Therefore' preserves the formal inferential force.
- source_word: כֹּה אָמַר יְהוָה
  chosen: thus says the LORD
  alternatives:
  - this is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the prophetic
    register, and יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's stated default
    for YHWH.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: Introduces emphatic divine announcement. 'Behold' retains the solemn
    deictic force without omitting the first-person emphasis carried into the participle.
- source_word: נֹתֵן
  chosen: am giving
  alternatives:
  - give
  - am about to give
  - am handing over
  lexicon: HALOT
  rationale: The participle conveys imminent or unfolding action; 'am giving' preserves
    that aspect better than a simple future. 'Handing over' is possible, but 'giving'
    stays closer to the Hebrew while the following phrase 'into the hand of' conveys
    transfer of control.
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  alternatives:
  - the city, this one
  lexicon: HALOT
  rationale: Natural English rendering of the noun plus demonstrative, preserving
    specificity.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: HALOT
  rationale: A common Hebrew idiom for delivering into someone's control. Here the
    literal 'into the hand of' is retained because it is clear in English and preserves
    the idiomatic texture.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew ethnonym is 'Chaldeans.' Although in context it refers to
    Babylonian forces, the more direct rendering is preferred; the named king of Babylon
    in the same verse clarifies the reference.
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: Standard English transliteration favors 'Nebuchadnezzar.' The Hebrew
    form here more closely reflects 'Nebuchadrezzar,' but the conventional English
    form is more recognizable; the alternative is preserved in a footnote.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: Straightforward construct chain; no expansion needed.
- source_word: וּלְכָדָהּ
  chosen: and he will capture it
  alternatives:
  - and he will take it
  - and he will seize it
  lexicon: HALOT
  rationale: The verb לָכַד commonly means to capture or seize, especially of taking
    a city. The 3ms subject naturally refers to Nebuchadnezzar as the nearest singular
    antecedent, though it also coheres with his army acting under him.
