theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Referent of the singular verb in וּלְכָדָהּ
  chosen_reading: 'the subject is rendered as Nebuchadnezzar: ''and he will capture
    it'''
  alternative_readings:
  - 'an impersonal or collective sense: ''and it will be captured'''
  - the Chaldeans collectively implied by context
  rationale: The Hebrew form is 3ms with a 3fs object suffix, and the nearest explicit
    singular antecedent is Nebuchadnezzar king of Babylon. Rendering the singular
    subject preserves the syntax without importing additional interpretation.
