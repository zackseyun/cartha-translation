id: JER.32.44
reference: Jeremiah 32:44
source:
  edition: WLC
  text: שָׂד֞וֹת בַּ/כֶּ֣סֶף יִקְנ֗וּ וְ/כָת֨וֹב בַּ/סֵּ֥פֶר וְ/חָתוֹם֮ וְ/הָעֵ֣ד
    עֵדִים֒ בְּ/אֶ֨רֶץ בִּנְיָמִ֜ן וּ/בִ/סְבִיבֵ֣י יְרוּשָׁלִַ֗ם וּ/בְ/עָרֵ֤י יְהוּדָה֙
    וּ/בְ/עָרֵ֣י הָ/הָ֔ר וּ/בְ/עָרֵ֥י הַ/שְּׁפֵלָ֖ה וּ/בְ/עָרֵ֣י הַ/נֶּ֑גֶב כִּֽי
    אָשִׁ֥יב אֶת שְׁבוּתָ֖/ם נְאֻם יְהוָֽה׀־־־׃פ
translation:
  text: Fields will be bought with silver, and deeds will be written in a scroll and
    sealed and witnessed by witnesses in the land of Benjamin, around Jerusalem, and
    in the cities of Judah, in the cities of the hill country, in the cities of the
    lowland, and in the cities of the Negeb; for I will restore their fortunes, declares
    the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'attested by witnesses.' The Hebrew reads literally 'and witness witnesses,'
      a legal formula for formal attestation.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Shephelah,' the lowland region of Judah.
    reason: cultural_note
  - marker: c
    text: Or 'I will bring back their exiles' / 'I will restore their captivity.'
      The Hebrew idiom can denote reversal of exile and broader restoration.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׂדוֹת
  chosen: Fields
  alternatives:
  - lands
  lexicon: HALOT
  rationale: The plural noun refers to parcels of agricultural land in a property-purchase
    context. 'Fields' is the most natural and concrete English rendering here.
- source_word: בַּכֶּסֶף
  chosen: with silver
  alternatives:
  - for money
  lexicon: HALOT
  rationale: Literally 'with the silver/money.' In this legal-commercial context,
    silver functions as payment currency. 'With silver' preserves the concrete Hebrew
    while remaining idiomatic.
- source_word: יִקְנוּ
  chosen: will be bought
  alternatives:
  - they will buy
  lexicon: HALOT
  rationale: 'Although the Hebrew form is active (''they will buy''), English idiom
    in this list-like restoration oracle is smoother with a passive construction focused
    on the renewed practice: ''Fields will be bought.'' This preserves the sense without
    specifying an unnecessary subject.'
- source_word: וְכָתוֹב בַּסֵּפֶר
  chosen: deeds will be written in a scroll
  alternatives:
  - it will be written in the document
  - contracts will be written in a book
  lexicon: HALOT
  rationale: The infinitive absolute-like legal sequence continues the passive sense
    from the prior verb. סֵפֶר here is a written legal document/register rather than
    a literary 'book.' 'Deeds' makes the property-transaction context explicit in
    natural English, while 'scroll' preserves the physical sense of סֵפֶר.
- source_word: וְחָתוֹם
  chosen: sealed
  alternatives:
  - and sealed
  lexicon: HALOT
  rationale: 'Part of the legal transaction sequence. English can omit the repeated
    auxiliary and article for a concise list: written, sealed, witnessed.'
- source_word: וְהָעֵד עֵדִים
  chosen: witnessed by witnesses
  alternatives:
  - and witnesses will witness
  - attested by witnesses
  lexicon: HALOT
  rationale: The Hebrew uses the verb 'cause to witness/attest' with the noun 'witnesses.'
    'Witnessed by witnesses' is slightly repetitive but reflects the legal formula
    and keeps the formal texture. 'Attested by witnesses' is possible but less transparent
    to the source wording.
- source_word: בְּאֶרֶץ בִּנְיָמִן
  chosen: in the land of Benjamin
  alternatives:
  - in the territory of Benjamin
  lexicon: HALOT
  rationale: אֶרֶץ can mean land/territory. 'Land of Benjamin' is a standard and clear
    rendering for the tribal region.
- source_word: וּבִסְבִיבֵי יְרוּשָׁלַםִ
  chosen: around Jerusalem
  alternatives:
  - in the environs of Jerusalem
  lexicon: HALOT
  rationale: The prepositional phrase denotes the surrounding area. 'Around Jerusalem'
    is natural modern English.
- source_word: וּבְעָרֵי יְהוּדָה
  chosen: in the cities of Judah
  alternatives:
  - in the towns of Judah
  lexicon: HALOT
  rationale: עָרִים can be rendered 'cities' or 'towns.' 'Cities' maintains consistency
    with the repeated formula in the verse.
- source_word: הָהָר
  chosen: the hill country
  alternatives:
  - the mountain region
  lexicon: HALOT
  rationale: This geographical term commonly refers to Judah's hill country rather
    than a single mountain. 'Hill country' is the standard contextual rendering.
- source_word: הַשְּׁפֵלָה
  chosen: the lowland
  alternatives:
  - the Shephelah
  - the foothills
  lexicon: HALOT
  rationale: The term denotes the lowland region of Judah. 'Lowland' is understandable
    in running text; the transliteration 'Shephelah' is more technical and can be
    preserved in a footnote.
- source_word: הַנֶּגֶב
  chosen: the Negeb
  alternatives:
  - the south
  - the southern region
  lexicon: HALOT
  rationale: Negeb is both a directional term and a recognized regional name. Because
    it functions here as a geographic district alongside other regional labels, 'the
    Negeb' best preserves specificity.
- source_word: כִּי אָשִׁיב אֶת שְׁבוּתָם
  chosen: for I will restore their fortunes
  alternatives:
  - for I will restore their captivity
  - for I will bring back their exiles
  lexicon: HALOT
  rationale: The idiom שׁוּב/הֵשִׁיב אֶת־שְׁבוּת commonly means to restore the fortunes
    of a people, often including return from exile but not limited to that. 'Restore
    their fortunes' is the established idiomatic sense in this restoration context.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is well represented by 'declares the LORD,' which
    is both readable and suitably solemn. Per doctrine, יְהוָה is rendered 'the LORD'.
