theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Idiomatic restoration formula שְׁבוּת
  chosen_reading: restore their fortunes
  alternative_readings:
  - restore their captivity
  - bring back their exiles
  rationale: The phrase denotes comprehensive restoration and not merely the physical
    return of captives. The chosen rendering preserves the idiomatic force without
    narrowing the promise.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
