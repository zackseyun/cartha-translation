id: JER.32.31
reference: Jeremiah 32:31
source:
  edition: WLC
  text: כִּ֧י עַל אַפִּ֣/י וְ/עַל חֲמָתִ֗/י הָ֤יְתָה לִּ/י֙ הָ/עִ֣יר הַ/זֹּ֔את לְ/מִן
    הַ/יּוֹם֙ אֲשֶׁ֣ר בָּנ֣וּ אוֹתָ֔/הּ וְ/עַ֖ד הַ/יּ֣וֹם הַ/זֶּ֑ה לַ/הֲסִירָ֖/הּ
    מֵ/עַ֥ל פָּנָֽ/י־־־׃
translation:
  text: For this city has been to me a cause of my anger and my wrath from the day
    they built it even to this day, so that I should remove it from before my face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'upon my anger and upon my wrath,' an idiom meaning that
      the city has provoked or occasioned God's anger.
    reason: lexical_alternative
  - marker: b
    text: Or 'from my presence' for 'from before my face.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding judgment statement. 'For' fits
    the explanatory force in context and reads naturally in English.
- source_word: עַל אַפִּי וְעַל חֲמָתִי
  chosen: a cause of my anger and my wrath
  alternatives:
  - for my anger and for my wrath
  - upon my anger and upon my wrath
  - to my anger and my wrath
  lexicon: HALOT
  rationale: The preposition עַל with 'my nose/anger' and 'my wrath' is idiomatic
    and difficult to render woodenly in English. The sense is that the city has provoked
    or occasioned God's anger and wrath. 'A cause of my anger and my wrath' preserves
    the causal force without paraphrasing too freely.
- source_word: אַפִּי
  chosen: my anger
  alternatives:
  - my nose
  - my nostrils
  lexicon: HALOT
  rationale: אַף literally refers to nose/nostril but commonly denotes anger by metonymy
    in Hebrew. The idiomatic sense is clearly intended here.
- source_word: חֲמָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my heat
  lexicon: HALOT
  rationale: חֵמָה denotes burning wrath/fury. 'Wrath' pairs well with 'anger' and
    preserves the elevated judicial tone.
- source_word: הָיְתָה לִּי
  chosen: has been to me
  alternatives:
  - was to me
  - became to me
  lexicon: HALOT
  rationale: The perfect with לִּי expresses the city's standing in relation to God
    over a period extending from its founding to the present. English present perfect
    best captures that continuing state.
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  alternatives:
  - the city, this one
  lexicon: HALOT
  rationale: Standard demonstrative construction; 'this city' is the natural English
    equivalent.
- source_word: לְמִן הַיּוֹם אֲשֶׁר בָּנוּ אוֹתָהּ
  chosen: from the day they built it
  alternatives:
  - since the day they built it
  lexicon: HALOT
  rationale: לְמִן marks the starting point. The indefinite plural 'they built' reflects
    the Hebrew 3cp without specifying agents beyond the context.
- source_word: וְעַד הַיּוֹם הַזֶּה
  chosen: even to this day
  alternatives:
  - until this day
  - and up to this day
  lexicon: HALOT
  rationale: Marks continuation up to the present moment. 'Even to this day' conveys
    the emphatic duration naturally.
- source_word: לַהֲסִירָהּ
  chosen: so that I should remove it
  alternatives:
  - to remove it
  - for removing it
  lexicon: HALOT
  rationale: 'The prefixed ל with infinitive can express result/purpose. Here it points
    to the outcome of the city''s long provocation: its removal. ''So that I should
    remove it'' preserves the consequential nuance without overstating intentionality.'
- source_word: מֵעַל פָּנַי
  chosen: from before my face
  alternatives:
  - from my presence
  - from before me
  lexicon: HALOT
  rationale: Literally 'from upon my face.' 'From before my face' is more formally
    transparent to the Hebrew while remaining intelligible; it conveys expulsion from
    God's presence.
