theological_decisions:
- issue: Anthropomorphic language for divine presence and anger
  chosen_reading: Retain the anthropomorphic expressions in idiomatic but transparent
    English ('anger,' 'wrath,' 'before my face') rather than flattening them into
    abstract theological language.
  alternative_readings:
  - '''provoked me to anger... from my presence'''
  rationale: The Hebrew uses embodied language for God's anger and presence. Following
    the translation philosophy, the rendering preserves the source's theological tension
    and imagery rather than resolving it into less concrete abstractions.
  doctrine_reference: Translation philosophy §3, §6
