id: JER.32.4
reference: Jeremiah 32:4
source:
  edition: WLC
  text: וְ/צִדְקִיָּ֨הוּ֙ מֶ֣לֶךְ יְהוּדָ֔ה לֹ֥א יִמָּלֵ֖ט מִ/יַּ֣ד הַ/כַּשְׂדִּ֑ים
    כִּ֣י הִנָּתֹ֤ן יִנָּתֵן֙ בְּ/יַ֣ד מֶֽלֶךְ בָּבֶ֔ל וְ/דִבֶּר פִּ֣י/ו עִם פִּ֔י/ו
    וְ/עֵינָ֖י/ו אֶת עינ/ו תִּרְאֶֽינָה־־־־׃
translation:
  text: And Zedekiah king of Judah will not escape from the hand of the Chaldeans,
    for he will surely be given into the hand of the king of Babylon, and his mouth
    will speak with his mouth, and his eyes will see his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'he will speak with him mouth to mouth,' that is,
      in direct personal encounter.
    reason: lexical_alternative
  - marker: b
    text: Or more idiomatically, 'his eyes will see his eyes,' that is, he will see
      him directly, eye to eye.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמָּלֵט
  chosen: will not escape
  alternatives:
  - will not slip away
  - will not be delivered
  lexicon: HALOT
  rationale: The Niphal of מלט here denotes escaping or getting away. 'Will not escape'
    is the most natural modern English rendering and fits the military-captivity context.
- source_word: מִיַּד הַכַּשְׂדִּים
  chosen: from the hand of the Chaldeans
  alternatives:
  - from the power of the Chaldeans
  - from the grasp of the Chaldeans
  lexicon: HALOT
  rationale: The idiom 'from the hand of' is preserved because it is transparent in
    English and retains the concrete force of Hebrew possession/control. 'Chaldeans'
    is kept as the ethnic-political designation used in Jeremiah, rather than flattening
    to 'Babylonians' here.
- source_word: הִנָּתֹן יִנָּתֵן
  chosen: he will surely be given
  alternatives:
  - he will certainly be handed over
  - he will indeed be given over
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the certainty of
    the action. 'Will surely be given' preserves both the passive and the emphatic
    force without over-paraphrase.
- source_word: בְּיַד מֶלֶךְ בָּבֶל
  chosen: into the hand of the king of Babylon
  alternatives:
  - into the power of the king of Babylon
  lexicon: HALOT
  rationale: Again the 'hand' idiom is retained for consistency and concreteness.
    'King of Babylon' is the standard rendering of the title.
- source_word: וְדִבֶּר פִּיו עִם פִּיו
  chosen: and his mouth will speak with his mouth
  alternatives:
  - and he will speak with him face to face
  - and he will speak with him mouth to mouth
  lexicon: HALOT
  rationale: The Hebrew literally says 'his mouth ... with his mouth.' I preserved
    the concrete body-part expression rather than interpretively smoothing it to 'face
    to face.' This keeps the vividness and allows readers to infer direct personal
    encounter. A more idiomatic alternative is worth preserving in a footnote.
- source_word: וְעֵינָיו אֶת־עֵינוֹ תִּרְאֶינָה
  chosen: and his eyes will see his eyes
  alternatives:
  - and his eyes will look upon his eyes
  - and he will see him eye to eye
  lexicon: HALOT
  rationale: 'The Hebrew is strikingly concrete and reciprocal: ''his eyes will see
    his eyes.'' I retained the literal imagery rather than collapsing it into a smoother
    idiom. This emphasizes direct encounter between Zedekiah and the Babylonian king.
    An idiomatic alternative is preserved in a footnote.'
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: Although historically overlapping with Babylonians, the Hebrew specifically
    uses 'Chaldeans.' Retaining it respects source-language specificity; the broader
    identification can be inferred from context.
