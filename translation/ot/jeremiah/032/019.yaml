theological_decisions:
- issue: Anthropomorphic language for divine omniscience
  chosen_reading: Retain the concrete expression 'whose eyes are open' rather than
    abstracting to 'who sees everything.'
  alternative_readings:
  - who watches all human ways
  - who sees all the ways of humanity
  rationale: The Hebrew uses bodily imagery to express God's exhaustive awareness.
    Preserving the image maintains the text's literary force and avoids importing
    a more systematic theological abstraction than the verse itself states.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Gendered human collectives
  chosen_reading: Use 'sons of man' and 'each man' in the main text.
  alternative_readings:
  - humankind
  - each person
  rationale: The Hebrew employs masculine representative terms בְּנֵי אָדָם and אִישׁ.
    Per the doctrine's gender-accurate principle, the translation preserves the source
    form in the main text while clarifying the collective sense in a footnote.
  doctrine_reference: 'Translation philosophy §4; Contested terms: אָדָם'
