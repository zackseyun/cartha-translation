id: JER.32.19
reference: Jeremiah 32:19
source:
  edition: WLC
  text: גְּדֹל֙ הָֽ/עֵצָ֔ה וְ/רַ֖ב הָ/עֲלִֽילִיָּ֑ה אֲשֶׁר עֵינֶ֣י/ךָ פְקֻח֗וֹת עַל
    כָּל דַּרְכֵי֙ בְּנֵ֣י אָדָ֔ם לָ/תֵ֤ת לְ/אִישׁ֙ כִּ/דְרָכָ֔י/ו וְ/כִ/פְרִ֖י מַעֲלָלָֽי/ו־־־׃
translation:
  text: great in counsel and mighty in deed, whose eyes are open upon all the ways
    of the sons of man, to give to each man according to his ways and according to
    the fruit of his deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the ways of humankind.' The Hebrew 'sons of man' is a collective
      expression for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּדֹל הָעֵצָה
  chosen: great in counsel
  alternatives:
  - great in plan
  - great in purpose
  lexicon: HALOT
  rationale: עֵצָה commonly denotes counsel, plan, or purpose. 'Counsel' preserves
    both deliberative wisdom and intentionality, fitting the context of God's sovereign
    wisdom without over-paraphrasing.
- source_word: רַב הָעֲלִילִיָּה
  chosen: mighty in deed
  alternatives:
  - great in action
  - abundant in works
  lexicon: HALOT
  rationale: עֲלִילִיָּה refers to action, deed, or accomplishment. 'Mighty in deed'
    is idiomatic English and pairs well with 'great in counsel,' preserving the Hebrew
    balance between divine wisdom and effective action.
- source_word: עֵינֶיךָ פְקֻחוֹת
  chosen: whose eyes are open
  alternatives:
  - your eyes are open
  lexicon: HALOT
  rationale: The relative אֲשֶׁר links this clause to the preceding description of
    God. 'Whose eyes are open' reads smoothly in English while preserving the anthropomorphic
    image of God's all-seeing awareness.
- source_word: עַל כָּל דַּרְכֵי בְּנֵי אָדָם
  chosen: upon all the ways of the sons of man
  alternatives:
  - over all the ways of humankind
  - on all the ways of mankind
  lexicon: HALOT
  rationale: דְּרָכִים here denotes courses of life or conduct. בְּנֵי אָדָם is a
    conventional human collective. Following the gender-accurate guideline, 'sons
    of man' preserves the Hebrew form; the collective sense can be clarified in a
    footnote.
- source_word: לָתֵת לְאִישׁ
  chosen: to give to each man
  alternatives:
  - to give to every man
  - to repay each person
  lexicon: HALOT
  rationale: 'The infinitive expresses purpose/result: God''s eyes are open in order
    to give. אִישׁ is singular distributive. ''Each man'' preserves the masculine
    singular representative force better than the more interpretive ''each person.'''
- source_word: כִּדְרָכָיו
  chosen: according to his ways
  alternatives:
  - according to his way
  - according to his conduct
  lexicon: HALOT
  rationale: The plural 'ways' is retained from the Hebrew and refers to a person's
    manner of life or conduct. It also echoes the earlier 'ways of the sons of man.'
- source_word: וְכִפְרִי מַעֲלָלָיו
  chosen: and according to the fruit of his deeds
  alternatives:
  - and according to the outcome of his actions
  - and according to the fruit of his actions
  lexicon: HALOT
  rationale: פְּרִי is metaphorical 'fruit,' meaning result or outcome; מַעֲלָלִים
    are deeds or actions, often with moral weight. 'Fruit of his deeds' preserves
    the Hebrew metaphor and the moral-retributive sense.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  lexicon: HALOT
  rationale: In בְּנֵי אָדָם the term is collective for humanity. Per doctrine, gender-accurate
    rendering is preferred where the source uses masculine representative language;
    thus 'sons of man' is retained in the main text, with an inclusive explanation
    suitable for a footnote.
