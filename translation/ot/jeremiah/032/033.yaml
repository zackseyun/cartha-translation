id: JER.32.33
reference: Jeremiah 32:33
source:
  edition: WLC
  text: וַ/יִּפְנ֥וּ אֵלַ֛/י עֹ֖רֶף וְ/לֹ֣א פָנִ֑ים וְ/לַמֵּ֤ד אֹתָ/ם֙ הַשְׁכֵּ֣ם
    וְ/לַמֵּ֔ד וְ/אֵינָ֥/ם שֹׁמְעִ֖ים לָ/קַ֥חַת מוּסָֽר׃
translation:
  text: They turned their back to me and not their face; though I taught them, rising
    early and teaching, they would not listen to receive correction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to accept discipline.' The Hebrew musar can mean correction, discipline,
      or instruction, often with the sense of formative rebuke.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'rising early and teaching,' an idiom for persistent, diligent instruction.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּפְנוּ
  chosen: They turned
  alternatives:
  - they turned away
  lexicon: HALOT
  rationale: Qal wayyiqtol of פנה, here introducing the people's responsive action
    toward God. 'They turned' is the plain sense; 'away' is implied by the idiom with
    'back' but not separately expressed, so it is left implicit.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - toward me
  lexicon: HALOT
  rationale: Preposition plus 1cs suffix marking direction toward the speaker. 'To
    me' is idiomatic and preserves the relational force.
- source_word: עֹרֶף
  chosen: their back
  alternatives:
  - the back of their neck
  - their neck
  lexicon: HALOT
  rationale: In this prophetic idiom עֹרֶף contrasts with 'face' and signifies rejection
    or stubborn refusal. 'Their back' is the most natural English equivalent in the
    paired expression 'back ... not face.'
- source_word: וְלֹא פָנִים
  chosen: and not their face
  alternatives:
  - and not their faces
  - instead of their face
  lexicon: HALOT
  rationale: 'The Hebrew sets up a stark contrast: they presented their back rather
    than their face. English singular ''face'' works idiomatically with distributive
    force for the plural subject.'
- source_word: וְלַמֵּד אֹתָם
  chosen: though I taught them
  alternatives:
  - and I taught them
  - while teaching them
  lexicon: HALOT
  rationale: The infinitive/participle-like construction functions adverbially with
    the following phrase, describing God's repeated instruction despite their rejection.
    'Though I taught them' captures the concessive sense in context better than a
    bare coordinate 'and.'
- source_word: הַשְׁכֵּם וְלַמֵּד
  chosen: rising early and teaching
  alternatives:
  - persistently teaching
  - teaching them again and again
  - rising early to teach
  lexicon: HALOT
  rationale: This is a common Jeremianic idiom for diligent, repeated action. The
    more formal image 'rising early and teaching' preserves the Hebrew metaphor while
    remaining understandable. A more interpretive gloss like 'persistently teaching'
    is possible but less transparent to the source.
- source_word: וְאֵינָם שֹׁמְעִים
  chosen: they would not listen
  alternatives:
  - they were not listening
  - they did not listen
  lexicon: HALOT
  rationale: The construction expresses ongoing refusal rather than mere inability.
    'Would not listen' captures volitional resistance in natural English.
- source_word: לָקַחַת מוּסָר
  chosen: to receive correction
  alternatives:
  - to accept discipline
  - to receive instruction
  lexicon: HALOT
  rationale: מוּסָר can denote discipline, correction, or instruction with a chastening
    nuance. 'Receive correction' fits the context of prophetic rebuke and avoids narrowing
    the term to punitive discipline alone. 'Accept discipline' is viable and worth
    preserving as a lexical alternative.
