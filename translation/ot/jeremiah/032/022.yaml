id: JER.32.22
reference: Jeremiah 32:22
source:
  edition: WLC
  text: וַ/תִּתֵּ֤ן לָ/הֶם֙ אֶת הָ/אָ֣רֶץ הַ/זֹּ֔את אֲשֶׁר נִשְׁבַּ֥עְתָּ לַ/אֲבוֹתָ֖/ם
    לָ/תֵ֣ת לָ/הֶ֑ם אֶ֛רֶץ זָבַ֥ת חָלָ֖ב וּ/דְבָֽשׁ־־׃
translation:
  text: And you gave them this land, which you swore to their fathers to give them,
    a land flowing with milk and honey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their ancestors.' The Hebrew says 'their fathers,' referring to Israel's
      forefathers/patriarchs.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֵּן
  chosen: And you gave
  alternatives:
  - and you delivered
  - and you granted
  lexicon: HALOT
  rationale: From נתן, the common verb 'to give.' In this prayer context, 'gave' is
    the most natural and direct English rendering, preserving the second-person address
    to God and the narrative waw sequence with 'And.'
- source_word: הָאָרֶץ הַזֹּאת
  chosen: this land
  alternatives:
  - this הארץ
  - this country
  lexicon: HALOT
  rationale: אֶרֶץ commonly means 'land' in covenant and territorial contexts. 'This
    land' fits the promise-to-the-fathers theme better than the broader 'country.'
- source_word: אֲשֶׁר נִשְׁבַּעְתָּ
  chosen: which you swore
  alternatives:
  - that you swore
  - which you promised with an oath
  lexicon: HALOT
  rationale: נשבע is specifically oath language, so 'swore' preserves the covenantal
    force more precisely than simply 'promised.'
- source_word: לַאֲבוֹתָם
  chosen: to their fathers
  alternatives:
  - to their ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'their fathers.' Per the gender-accurate philosophy,
    the masculine familial term is retained rather than neutralized to 'ancestors,'
    though the referent is the patriarchal forefathers of Israel.
- source_word: לָתֵת לָהֶם
  chosen: to give them
  alternatives:
  - to grant it to them
  lexicon: HALOT
  rationale: Infinitive construction expressing the content of the oath. 'To give
    them' is straightforward and preserves the repetition of נתן found in the Hebrew.
- source_word: אֶרֶץ זָבַת חָלָב וּדְבָשׁ
  chosen: a land flowing with milk and honey
  alternatives:
  - a land that flows with milk and honey
  lexicon: HALOT
  rationale: This is a conventional Hebrew idiom for agricultural abundance and covenant
    blessing. 'Flowing with milk and honey' is established English that accurately
    reflects זבת while remaining natural.
