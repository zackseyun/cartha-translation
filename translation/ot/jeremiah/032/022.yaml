theological_decisions:
- issue: Rendering of patriarchal language in covenant formula
  chosen_reading: their fathers
  alternative_readings:
  - their ancestors
  rationale: The verse recalls God's oath to Israel's patriarchs. Because the Hebrew
    explicitly uses the masculine familial term אבות, the translation preserves 'fathers'
    in keeping with the project's gender-accurate policy rather than neutralizing
    the expression.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Gender-accurate over
    gender-neutral)'
