theological_decisions:
- issue: Rendering the divine name יְהוָה within the compound address אֲדֹנָי יְהוִה
  chosen_reading: Lord GOD
  alternative_readings:
  - Lord Yahweh
  - Lord the LORD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of לֹא יִפָּלֵא מִמְּךָ כָּל דָּבָר
  chosen_reading: Nothing is too difficult for you
  alternative_readings:
  - Nothing is too wonderful for you
  - Nothing is impossible for you
  rationale: The verse affirms God's unlimited power without requiring a narrower philosophical formulation. 'Too difficult' best captures the Hebrew idiom in context while preserving the theological force of divine omnipotence implied by the prayer.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #3'
