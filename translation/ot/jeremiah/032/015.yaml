id: JER.32.15
reference: Jeremiah 32:15
source:
  edition: WLC
  text: כִּ֣י כֹ֥ה אָמַ֛ר יְהוָ֥ה צְבָא֖וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֑ל ע֣וֹד יִקָּנ֥וּ בָתִּ֛ים
    וְ/שָׂד֥וֹת וּ/כְרָמִ֖ים בָּ/אָ֥רֶץ הַ/זֹּֽאת׃פ
translation:
  text: 'For thus says the LORD of hosts, the God of Israel: Houses and fields and
    vineyards will again be bought in this land.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will again buy houses and fields and vineyards in this land.' The Hebrew
      verb is Niphal and may be taken less strictly as a middle or passive-like form,
      but 'will be bought' best preserves the form here.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the symbolic action in context;
    'For' fits the discourse connection naturally in English.
- source_word: כֹה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  - thus said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Present-tense 'says' is idiomatic
    in English for prophetic declaration, even with the Hebrew perfect.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering of the divine title; preserves
    the breadth of heavenly and earthly forces implied, whereas 'armies' may sound
    too narrowly military.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: Direct and natural rendering of the construct chain, preserving covenantal
    identification.
- source_word: עוֹד
  chosen: again
  alternatives:
  - still
  - yet
  lexicon: HALOT
  rationale: In this restoration context, עוֹד signals renewed future activity after
    interruption; 'again' best captures that sense.
- source_word: יִקָּנוּ
  chosen: will ... be bought
  alternatives:
  - will buy
  - will be purchased
  lexicon: HALOT
  rationale: The Niphal form is most naturally passive/reflexive here. 'Will be bought'
    preserves the Hebrew voice and emphasizes the resumption of normal property transactions.
- source_word: בָתִּים
  chosen: Houses
  alternatives:
  - homes
  lexicon: HALOT
  rationale: More formally aligned with the Hebrew noun and suitable in a property-purchase
    context.
- source_word: שָׂדוֹת
  chosen: fields
  alternatives:
  - farmland
  - plots
  lexicon: HALOT
  rationale: Straightforward rendering of agricultural land; broad enough for the
    context.
- source_word: כְרָמִים
  chosen: vineyards
  alternatives:
  - vine-plots
  lexicon: HALOT
  rationale: Standard rendering for cultivated grape-growing properties, fitting the
    land-restoration theme.
- source_word: בָּאָרֶץ הַזֹּאת
  chosen: in this land
  alternatives:
  - in this הארץ
  - in this country
  lexicon: HALOT
  rationale: '''Land'' is the most contextually appropriate rendering in Jeremiah,
    preserving the covenant-land resonance better than ''country.'''
