theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH and aligns with the reverential
    convention reflected in English Bible tradition and the doctrine excerpt.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Voice of יִקָּנוּ (Niphal)
  chosen_reading: 'passive: ''will again be bought'''
  alternative_readings:
  - 'middle/active-like: ''will again buy'''
  rationale: The Niphal is best represented as passive here. This keeps the focus
    on the restoration of ordinary commerce in the land rather than on unspecified
    buyers as subjects.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
