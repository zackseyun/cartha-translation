theological_decisions:
- issue: Rendering of divine reaction to idolatry
  chosen_reading: to provoke me to anger
  alternative_readings:
  - to anger me
  rationale: The Hebrew explicitly presents the people's idolatrous acts as provoking
    YHWH. The translation preserves the personal and judicial dimension of divine
    anger without softening it or expanding it beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
