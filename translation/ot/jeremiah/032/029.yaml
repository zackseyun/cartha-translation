id: JER.32.29
reference: Jeremiah 32:29
source:
  edition: WLC
  text: וּ/בָ֣אוּ הַ/כַּשְׂדִּ֗ים הַ/נִּלְחָמִים֙ עַל הָ/עִ֣יר הַ/זֹּ֔את וְ/הִצִּ֜יתוּ
    אֶת הָ/עִ֥יר הַ/זֹּ֛את בָּ/אֵ֖שׁ וּ/שְׂרָפ֑וּ/הָ וְ/אֵ֣ת הַ/בָּתִּ֡ים אֲשֶׁר֩
    קִטְּר֨וּ עַל גַּגּֽוֹתֵי/הֶ֜ם לַ/בַּ֗עַל וְ/הִסִּ֤כוּ נְסָכִים֙ לֵ/אלֹהִ֣ים אֲחֵרִ֔ים
    לְמַ֖עַן הַכְעִסֵֽ/נִי־־־׃
translation:
  text: And the Chaldeans who are fighting against this city will come and set this
    city on fire and burn it, along with the houses on whose rooftops they burned
    incense to Baal and poured out drink offerings to other gods, to provoke me to
    anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Babylonians.' The Hebrew says 'the Chaldeans,' a term often used
      for the Neo-Babylonian forces.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: כשדים can denote the Chaldean people and, by extension, the Neo-Babylonian
    forces. 'Chaldeans' is the more direct lexical rendering; 'Babylonians' is a contextual
    alternative worth preserving.
- source_word: הַנִּלְחָמִים עַל
  chosen: who are fighting against
  alternatives:
  - who are attacking
  - who are warring against
  lexicon: HALOT
  rationale: The participle of לחם with על marks ongoing hostile action against the
    city. 'Fighting against' preserves the participial aspect and military sense without
    overinterpreting the exact tactic.
- source_word: וְהִצִּיתוּ ... בָּאֵשׁ
  chosen: set ... on fire
  alternatives:
  - kindle ... with fire
  - ignite ... with fire
  lexicon: HALOT
  rationale: The hiphil of יצת with באש idiomatically means to set something on fire.
    This is natural modern English while remaining close to the Hebrew.
- source_word: וּשְׂרָפוּהָ
  chosen: and burn it
  alternatives:
  - and burn her
  - and consume it by fire
  lexicon: HALOT
  rationale: The suffix refers back to the feminine noun 'city.' English normally
    uses 'it' for a city here. 'Burn it' keeps the straightforward force of שרף.
- source_word: וְאֵת הַבָּתִּים
  chosen: along with the houses
  alternatives:
  - and the houses
  - including the houses
  lexicon: HALOT
  rationale: The direct-object marker with a second object extends what will be burned
    beyond the city itself. 'Along with the houses' makes that coordination clear
    in idiomatic English.
- source_word: אֲשֶׁר קִטְּרוּ עַל גַּגּוֹתֵיהֶם
  chosen: on whose rooftops they burned incense
  alternatives:
  - where on their roofs they made offerings smoke
  - on the roofs of which they offered incense
  lexicon: HALOT
  rationale: קטר in the piel commonly means to burn incense or make a smoke offering.
    The relative clause modifies 'houses'; 'on whose rooftops' is idiomatic and preserves
    the rooftop-cult setting.
- source_word: לַבַּעַל
  chosen: to Baal
  alternatives:
  - for Baal
  lexicon: HALOT
  rationale: The preposition marks the recipient/deity of the offering. 'To Baal'
    is the most natural rendering.
- source_word: וְהִסִּכוּ נְסָכִים
  chosen: and poured out drink offerings
  alternatives:
  - and poured libations
  lexicon: HALOT
  rationale: נסך with נסכים is the standard sacrificial expression for pouring out
    drink offerings/libations. 'Drink offerings' is more accessible than 'libations'
    while preserving cultic meaning.
- source_word: לֵאלֹהִים אֲחֵרִים
  chosen: to other gods
  alternatives:
  - to foreign gods
  lexicon: HALOT
  rationale: אחרים means 'other.' 'Foreign gods' is interpretive; 'other gods' is
    the more direct lexical equivalent.
- source_word: לְמַעַן הַכְעִסֵנִי
  chosen: to provoke me to anger
  alternatives:
  - to anger me
  - so as to provoke me
  lexicon: HALOT
  rationale: The infinitive construct with למען expresses result/purpose. The hiphil
    of כעס means to provoke to anger. This rendering preserves both the causative
    force and the personal divine speech.
