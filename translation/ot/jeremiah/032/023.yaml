id: JER.32.23
reference: Jeremiah 32:23
source:
  edition: WLC
  text: וַ/יָּבֹ֜אוּ וַ/יִּֽרְשׁ֣וּ אֹתָ֗/הּ וְ/לֹֽא שָׁמְע֤וּ בְ/קוֹלֶ֨/ךָ֙ ו/ב/תרות/ך
    לֹא הָלָ֔כוּ אֵת֩ כָּל אֲשֶׁ֨ר צִוִּ֧יתָה לָ/הֶ֛ם לַ/עֲשׂ֖וֹת לֹ֣א עָשׂ֑וּ וַ/תַּקְרֵ֣א
    אֹתָ֔/ם אֵ֥ת כָּל הָ/רָעָ֖ה הַ/זֹּֽאת־־־־׃
translation:
  text: They came in and took possession of it, but they did not listen to your voice,
    and they did not walk in your law. They did not do all that you commanded them
    to do, so you called down on them all this disaster.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they did not walk in your instruction.' The Hebrew torah can mean 'law'
      or 'instruction'; here it refers to God's covenantal teaching.
    reason: lexical_alternative
  - marker: b
    text: Or, 'you brought upon them all this calamity.' The Hebrew literally says
      'you called to them all this disaster,' an idiom for bringing judgment upon
      them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: They came in
  alternatives:
  - They entered
  - They came
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא, narrating entry into the land. 'Came in' preserves
    the movement into the land more naturally than the bare 'came.'
- source_word: וַיִּרְשׁוּ אֹתָהּ
  chosen: took possession of it
  alternatives:
  - possessed it
  - inherited it
  lexicon: HALOT
  rationale: ירשׁ in land contexts commonly means taking possession/inheriting. 'Took
    possession of it' communicates actual occupation of the land without implying
    merely legal inheritance.
- source_word: בְּקוֹלֶךָ
  chosen: your voice
  alternatives:
  - your voice
  - your command
  lexicon: HALOT
  rationale: Literally 'your voice.' Retained in English because 'listen to your voice'
    is idiomatic and preserves the relational-covenantal nuance better than reducing
    it to 'command.'
- source_word: וּבְתוֹרֹתֶךָ לֹא הָלָכוּ
  chosen: they did not walk in your law
  alternatives:
  - they did not follow your law
  - they did not walk in your instruction
  lexicon: HALOT
  rationale: הלך with ב plus תורה is a standard idiom for conduct according to divine
    instruction. Singular 'law' is a natural collective rendering in English, though
    the Hebrew form is pluralized. 'Walk in' preserves the covenantal metaphor.
- source_word: תּוֹרָה
  chosen: law
  alternatives:
  - instruction
  lexicon: HALOT
  rationale: While תורה can mean 'instruction,' in Jeremiah's covenantal setting 'law'
    best conveys the established body of divine teaching. This is not a denial of
    the broader semantic range.
- source_word: אֵת כָּל אֲשֶׁר צִוִּיתָה לָהֶם לַעֲשׂוֹת לֹא עָשׂוּ
  chosen: They did not do all that you commanded them to do
  alternatives:
  - They did not do everything that you commanded them
  - All that you commanded them to do, they did not do
  lexicon: HALOT
  rationale: This clause is rendered straightforwardly, preserving the comprehensive
    force of כָּל and the infinitive 'to do' without awkward literalism.
- source_word: וַתַּקְרֵא אֹתָם אֵת כָּל הָרָעָה הַזֹּאת
  chosen: so you called down on them all this disaster
  alternatives:
  - and you caused all this evil to befall them
  - and you proclaimed against them all this calamity
  lexicon: HALOT
  rationale: קרא with double object here is idiomatic for summoning or bringing something
    upon someone. 'Called down on them' preserves the verbal imagery, while 'disaster'
    fits רָעָה in a judgment context better than the morally ambiguous 'evil.' The
    conjunction is rendered 'so' to reflect the consequence implied by the context.
- source_word: הָרָעָה
  chosen: disaster
  alternatives:
  - calamity
  - evil
  lexicon: HALOT
  rationale: In prophetic judgment contexts רָעָה often denotes calamity/disaster
    rather than moral evil. 'Disaster' is clear modern English and avoids suggesting
    God commits moral evil.
