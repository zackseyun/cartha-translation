theological_decisions:
- issue: Rendering of תּוֹרָה in covenant context
  chosen_reading: your law
  alternative_readings:
  - your instruction
  rationale: The verse recalls Israel's covenant obligations in the land. 'Law' best
    fits this legal-covenantal setting, while 'instruction' remains a valid lexical
    alternative but is less pointed in context.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Rendering of הָרָעָה with reference to divine judgment
  chosen_reading: disaster
  alternative_readings:
  - calamity
  - evil
  rationale: The Hebrew term can denote either moral evil or harmful calamity. In
    this context Jeremiah speaks of covenant judgment brought upon the people, so
    'disaster' preserves the sense without implying that God performs moral evil.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
