id: JER.32.42
reference: Jeremiah 32:42
source:
  edition: WLC
  text: כִּֽי כֹה֙ אָמַ֣ר יְהוָ֔ה כַּ/אֲשֶׁ֤ר הֵבֵ֨אתִי֙ אֶל הָ/עָ֣ם הַ/זֶּ֔ה אֵ֛ת כָּל הָ/רָעָ֥ה הַ/גְּדוֹלָ֖ה הַ/זֹּ֑את כֵּ֣ן אָנֹכִ֞י מֵבִ֤יא עֲלֵי/הֶם֙ אֶת כָּל הַ/טּוֹבָ֔ה אֲשֶׁ֥ר אָנֹכִ֖י דֹּבֵ֥ר עֲלֵי/הֶֽם־־־־־׃
translation:
  text: 'For thus says Yahweh: Just as I brought on this people all this great disaster, so I will bring on them all the good that I am speaking concerning them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all this great calamity'; Hebrew 'evil/disaster.' In this context the word refers to judgmental catastrophe, not moral evil in God.
    reason: lexical_alternative
  - marker: b
    text: Or 'that I am promising them.' The Hebrew more literally reads 'that I am speaking concerning them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name while matching established English convention.
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the divine explanation or grounding for the preceding context; 'For' fits the discourse connection naturally in English.
- source_word: כֹה אָמַר
  chosen: thus says
  alternatives:
  - thus said
  - this is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Present-tense English is idiomatic for the formula and reflects ongoing authority of the declaration.
- source_word: כַּאֲשֶׁר ... כֵּן
  chosen: Just as ... so
  alternatives:
  - As ... so
  - In the same way ... so
  lexicon: HALOT
  rationale: Preserves the explicit comparison structure between past judgment and promised restoration.
- source_word: הֵבֵאתִי
  chosen: I brought on
  alternatives:
  - I brought
  - I caused to come upon
  lexicon: HALOT
  rationale: The hiphil of בוא with עַל/אֶל in this judgment context conveys causing something to come upon someone. 'Brought on' is natural English and preserves divine agency.
- source_word: אֶל הָעָם הַזֶּה
  chosen: on this people
  alternatives:
  - to this people
  - against this people
  lexicon: HALOT
  rationale: Although אֶל literally means 'to,' English idiom with 'bring disaster' normally takes 'on.' This best conveys the effect of the Hebrew construction without woodenness.
- source_word: כָּל הָרָעָה הַגְּדוֹלָה הַזֹּאת
  chosen: all this great disaster
  alternatives:
  - all this great evil
  - all this great calamity
  lexicon: HALOT
  rationale: רָעָה in prophetic judgment contexts often denotes calamity/disaster rather than moral evil. 'Disaster' avoids implying that God committed moral evil while preserving the severity of the announced judgment.
- source_word: מֵבִיא
  chosen: I am bringing on
  alternatives:
  - I will bring on
  - I bring on
  lexicon: HALOT
  rationale: The participle presents the action as certain and in process from the speaker's standpoint. English present progressive captures the vividness and certainty of the promise.
- source_word: עֲלֵיהֶם
  chosen: on them
  alternatives:
  - upon them
  - to them
  lexicon: HALOT
  rationale: With מֵבִיא, 'on them' is the most idiomatic English equivalent for the benefactive/target sense in this construction.
- source_word: כָּל הַטּוֹבָה
  chosen: all the good
  alternatives:
  - all the goodness
  - all the prosperity
  - all the blessing
  lexicon: HALOT
  rationale: טוֹבָה here refers broadly to the good things/promised welfare God will grant. 'All the good' is sufficiently broad and close to the Hebrew.
- source_word: אֲשֶׁר אָנֹכִי דֹּבֵר עֲלֵיהֶם
  chosen: that I am speaking concerning them
  alternatives:
  - that I am promising them
  - that I have spoken about them
  lexicon: HALOT
  rationale: דֹּבֵר is literally 'speaking,' and עַל can mean 'concerning/about.' 'Concerning them' preserves the Hebrew wording while allowing the context of divine promise to be heard. 'Promising' would be interpretive beyond the explicit verb.
