theological_decisions:
- issue: Rendering רָעָה in relation to God's action
  chosen_reading: disaster
  alternative_readings:
  - evil
  - calamity
  rationale: The verse contrasts past judgment with future good. Rendering רָעָה as 'disaster' communicates covenant judgment without suggesting moral evil in God. This preserves the text's meaning and avoids importing a theological claim the Hebrew does not require.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
