theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of 'all flesh'
  chosen_reading: Retained as 'all flesh' rather than interpreting it narrowly as 'all people'
  alternative_readings:
  - all humanity
  - all living beings
  rationale: 'The Hebrew phrase is broader and more textually transparent than a narrowed interpretive gloss. Retaining the idiom preserves theological breadth: the LORD is God over all mortal flesh.'
