id: JER.32.43
reference: Jeremiah 32:43
source:
  edition: WLC
  text: וְ/נִקְנָ֥ה הַ/שָּׂדֶ֖ה בָּ/אָ֣רֶץ הַ/זֹּ֑את אֲשֶׁ֣ר אַתֶּ֣ם אֹמְרִ֗ים שְׁמָמָ֥ה
    הִיא֙ מֵ/אֵ֤ין אָדָם֙ וּ/בְהֵמָ֔ה נִתְּנָ֖ה בְּ/יַ֥ד הַ/כַּשְׂדִּֽים׀׃
translation:
  text: Fields will again be bought in this land of which you say, ‘It is a desolation,
    without man or beast; it has been given into the hand of the Chaldeans.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without human or animal.' The Hebrew idiom literally reads 'without
      man or beast.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''the Babylonians.'' Hebrew: ''the Chaldeans.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִקְנָה
  chosen: will again be bought
  alternatives:
  - will be bought
  - shall be purchased
  lexicon: HALOT
  rationale: Niphal of קנה here is best rendered as a passive/future-like statement,
    'will be bought.' The wider context (vv. 42, 44) speaks of restoration and renewed
    land transactions, so 'again' is supplied in English to reflect the discourse
    implication, not as a separate lexical item.
- source_word: הַשָּׂדֶה
  chosen: Fields
  alternatives:
  - the field
  - farmland
  lexicon: HALOT
  rationale: Although morphologically singular with article ('the field'), Hebrew
    often uses the singular collectively. English plural 'Fields' better matches idiomatic
    sense and the surrounding context of multiple property transactions.
- source_word: בָּאָרֶץ הַזֹּאת
  chosen: in this land
  alternatives:
  - in this הארץ
  - in this country
  lexicon: HALOT
  rationale: '''Land'' is the most natural rendering in Jeremiah, preserving covenantal-territorial
    resonance better than ''country.'''
- source_word: אֲשֶׁר אַתֶּם אֹמְרִים
  chosen: of which you say
  alternatives:
  - about which you say
  - which you are saying
  lexicon: HALOT
  rationale: Relative clause introducing the people's assessment of the land. 'Of
    which you say' is natural and sufficiently formal.
- source_word: שְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate
  - wasteland
  lexicon: HALOT
  rationale: The noun denotes devastation/desolation. Predicate noun 'a desolation'
    preserves the nominal force better than the adjective 'desolate.'
- source_word: מֵאֵין אָדָם וּבְהֵמָה
  chosen: without man or beast
  alternatives:
  - with no man or beast
  - without human or animal
  lexicon: HALOT
  rationale: The idiom expresses absence of inhabitants and livestock. Per doctrine,
    אָדָם is rendered 'man' here because the phrase is a conventional Hebrew expression
    and not primarily making an inclusivity-sensitive anthropological point.
- source_word: נִתְּנָה
  chosen: it has been given
  alternatives:
  - it was given
  - it is given
  lexicon: HALOT
  rationale: The perfect passive describes the land as having been handed over to
    Babylon. English present perfect fits the current-result emphasis in the complaint.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - to the control of
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for transfer into someone's power. 'Into
    the hand of' preserves the idiom transparently in readable English.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: Jeremiah frequently uses 'Chaldeans' as the historical-ethnic designation.
    Retaining it preserves source-text specificity; 'Babylonians' is a valid interpretive
    alternative but less exact to the Hebrew wording.
