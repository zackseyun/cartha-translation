theological_decisions:
- issue: Rendering of אָדָם in a generic absence formula
  chosen_reading: man
  alternative_readings:
  - humankind
  - people
  rationale: The phrase 'without man or beast' is a stock Hebrew collocation in judgment/restoration
    contexts. 'Man' preserves the idiomatic and source-near form in line with the
    doctrine's gender-accurate principle, while the sense is generic humanity.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms table for אָדָם'
