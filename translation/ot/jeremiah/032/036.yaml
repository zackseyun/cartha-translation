id: JER.32.36
reference: Jeremiah 32:36
source:
  edition: WLC
  text: וְ/עַתָּ֕ה לָ/כֵ֛ן כֹּֽה אָמַ֥ר יְהוָ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל אֶל הָ/עִ֨יר הַ/זֹּ֜את אֲשֶׁ֣ר אַתֶּ֣ם אֹמְרִ֗ים נִתְּנָה֙ בְּ/יַ֣ד מֶֽלֶךְ בָּבֶ֔ל בַּ/חֶ֖רֶב וּ/בָ/רָעָ֥ב וּ/בַ/דָּֽבֶר־־׀־׃
translation:
  text: 'Now therefore, thus says Yahweh, the God of Israel, concerning this city of which you say, ‘It has been given into the hand of the king of Babylon by the sword, by famine, and by pestilence’:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'It is given into the hand of the king of Babylon.' The Hebrew form may be rendered as a simple passive rather than a progressive passive.
    reason: lexical_alternative
  - marker: b
    text: '''Pestilence'' may also be translated ''plague.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now
  alternatives:
  - And now
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing the next stage of the oracle. 'Now' is natural English; the conjunction is absorbed into the flow.
- source_word: לָכֵן
  chosen: therefore
  alternatives:
  - for this reason
  - so then
  lexicon: HALOT
  rationale: Marks an inferential transition. Retained explicitly as 'therefore' to preserve the argumentative connection.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'thus says' preserves the formal prophetic register without sounding archaic beyond common biblical English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase identifying YHWH covenantally; straightforward formal rendering.
- source_word: אֶל הָעִיר הַזֹּאת
  chosen: concerning this city
  alternatives:
  - to this city
  - about this city
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' with a speech verb it can introduce the object/topic of the declaration. 'Concerning this city' best fits English and the sense of the oracle.
- source_word: אֲשֶׁר אַתֶּם אֹמְרִים
  chosen: of which you say
  alternatives:
  - about which you are saying
  - which you say
  lexicon: HALOT
  rationale: Links the city with the people's present assessment. 'Of which you say' is idiomatic and keeps the relative construction.
- source_word: נִתְּנָה
  chosen: It is being given
  alternatives:
  - it is given
  - it has been given
  - it will be given
  lexicon: HALOT
  rationale: Niphal perfect of נתן here expresses the city's being handed over, viewed as effectively underway/certain in the speakers' claim. The progressive passive 'is being given' captures the imminent/in-process sense in context.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  lexicon: HALOT
  rationale: Common idiom for being delivered into someone's control. Kept relatively literal because the idiom is transparent in English.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  lexicon: HALOT
  rationale: Direct rendering of the political title.
- source_word: בַּחֶרֶב
  chosen: by the sword
  alternatives:
  - to the sword
  - through the sword
  - by warfare
  lexicon: HALOT
  rationale: Part of the familiar triad of judgment means. 'By the sword' preserves the concrete instrument and biblical cadence.
- source_word: וּבָרָעָב
  chosen: by famine
  alternatives:
  - and by hunger
  lexicon: HALOT
  rationale: Standard rendering of רָעָב in judgment contexts.
- source_word: וּבַדָּבֶר
  chosen: and by pestilence
  alternatives:
  - and by plague
  lexicon: HALOT
  rationale: דֶּבֶר commonly denotes epidemic disease in judgment formulas. 'Pestilence' preserves the established triadic expression and the gravity of the term.
