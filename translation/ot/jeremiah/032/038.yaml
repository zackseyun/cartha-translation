id: JER.32.38
reference: Jeremiah 32:38
source:
  edition: WLC
  text: וְ/הָ֥יוּ לִ֖/י לְ/עָ֑ם וַ/אֲנִ֕י אֶהְיֶ֥ה לָ/הֶ֖ם לֵ/אלֹהִֽים׃
translation:
  text: And they will be my people, and I will be their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'they will be to me for a people, and I will be to them for God,'
      a Hebrew covenant formula expressing mutual belonging and relationship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  chosen: And they will be
  alternatives:
  - And they shall be
  - Then they will become
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    futurally here in a covenant promise sequence. 'Will be' gives clear modern English
    while preserving the simple existential/copular sense of היה.
- source_word: לִי
  chosen: my
  alternatives:
  - to me
  - for me
  lexicon: HALOT
  rationale: 'The preposition ל with 1cs pronoun literally means ''to me/for me,''
    but in the covenant formula with ''be'' it is idiomatically and naturally rendered
    as possession/relationship in English: ''my people.'''
- source_word: לְעָם
  chosen: people
  alternatives:
  - a people
  lexicon: HALOT
  rationale: עם in covenant contexts commonly denotes a people in relationship to
    God. English idiom prefers 'my people' rather than the more wooden 'to me for
    a people' or 'my a people.' The anarthrous Hebrew is still definite in this formulaic
    construction.
- source_word: וַאֲנִי
  chosen: and I
  alternatives:
  - but I
  lexicon: HALOT
  rationale: The conjunction links the reciprocal covenant clauses. 'And I' best preserves
    the balanced parallelism; 'but I' would introduce contrast not required by the
    Hebrew.
- source_word: אֶהְיֶה
  chosen: I will be
  alternatives:
  - I shall be
  lexicon: HALOT
  rationale: Imperfect 1cs of היה expresses future covenant commitment. 'Will be'
    is the natural modern equivalent and preserves the verbal link with the first
    clause.
- source_word: לָהֶם
  chosen: their
  alternatives:
  - to them
  - for them
  lexicon: HALOT
  rationale: 'As with לִי, the preposition ל in this covenant formula is best rendered
    idiomatically in English as a possessive relationship: ''their God.'''
- source_word: לֵאלֹהִים
  chosen: God
  alternatives:
  - a God
  lexicon: HALOT
  rationale: In the covenant formula, אֱלֹהִים refers to Israel's God in a definite
    relational sense. English requires 'their God,' not the indefinite 'a God.'
