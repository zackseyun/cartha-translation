theological_decisions:
- issue: Covenant formula rendering
  chosen_reading: And they will be my people, and I will be their God.
  alternative_readings:
  - And they shall be my people, and I shall be their God.
  - And they will be a people for me, and I will be God for them.
  rationale: This is the standard reciprocal covenant formula in the Hebrew Bible.
    The chosen rendering preserves the theological mutuality and covenantal relationship
    without over-literal English. More formal alternatives are possible, but the selected
    wording best reflects optimal equivalence and established covenant idiom grounded
    in the Hebrew text itself.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it'
