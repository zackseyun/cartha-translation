theological_decisions:
- issue: Whether to render בַּבַּיִת generically as 'house' or interpretively as 'temple'
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: Optimal equivalence favors retaining the literal term 'house' while allowing
    the temple reference to remain clear from context and the following clause about
    God's name. This avoids importing more interpretation than the Hebrew requires
    in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English.'
