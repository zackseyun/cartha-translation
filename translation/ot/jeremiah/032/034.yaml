id: JER.32.34
reference: Jeremiah 32:34
source:
  edition: WLC
  text: וַ/יָּשִׂ֣ימוּ שִׁקּֽוּצֵי/הֶ֗ם בַּ/בַּ֛יִת אֲשֶׁר נִקְרָֽא שְׁמִ֥/י עָלָ֖י/ו
    לְ/טַמְּאֽ/וֹ־־׃
translation:
  text: They put their detestable things in the house that is called by my name, to
    defile it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the temple.' The Hebrew reads 'in the house,' referring here to the
      house called by God's name.
    reason: lexical_alternative
  - marker: b
    text: Or 'their abominations.' The Hebrew term often refers to detestable, especially
      idolatrous, objects or practices.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂימוּ
  chosen: They put
  alternatives:
  - They set
  - They placed
  lexicon: HALOT
  rationale: The waw-consecutive imperfect of שׂים narrates a past action. 'Put' is
    natural modern English and preserves the concrete act without unnecessary formality.
- source_word: שִׁקּוּצֵיהֶם
  chosen: their detestable things
  alternatives:
  - their abominations
  - their disgusting idols
  lexicon: HALOT
  rationale: שִׁקּוּץ often denotes something ritually and morally abhorrent, frequently
    in idolatrous contexts. 'Detestable things' preserves the broad sense without
    over-specifying 'idols,' though idolatrous objects are likely in context. 'Abominations'
    is traditional but less transparent in contemporary English.
- source_word: בַּבַּיִת
  chosen: in the house
  alternatives:
  - in the temple
  lexicon: HALOT
  rationale: The noun is literally 'the house.' In Jeremiah this refers to the temple,
    but the Hebrew wording should be preserved in the main text. The more explicit
    'temple' is a contextual alternative worth noting.
- source_word: אֲשֶׁר נִקְרָא שְׁמִי עָלָיו
  chosen: that is called by my name
  alternatives:
  - over which my name is called
  - which bears my name
  lexicon: HALOT
  rationale: This idiom marks possession, covenantal claim, or consecration. 'That
    is called by my name' is the standard transparent rendering and keeps the Hebrew
    idiom visible. 'Which bears my name' is smoother but less formally tied to the
    source.
- source_word: לְטַמְּאוֹ
  chosen: to defile it
  alternatives:
  - so as to make it unclean
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result. טמא in this context concerns
    ritual and moral pollution of the sanctuary. 'Defile it' is concise, idiomatic,
    and preserves the gravity of the offense.
