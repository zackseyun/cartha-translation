id: JER.32.5
reference: Jeremiah 32:5
source:
  edition: WLC
  text: וּ/בָבֶ֞ל יוֹלִ֤ךְ אֶת צִדְקִיָּ֨הוּ֙ וְ/שָׁ֣ם יִֽהְיֶ֔ה עַד פָּקְדִ֥/י אֹת֖/וֹ
    נְאֻם יְהוָ֑ה כִּ֧י תִֽלָּחֲמ֛וּ אֶת הַ/כַּשְׂדִּ֖ים לֹ֥א תַצְלִֽיחוּ־־־־׃פ
translation:
  text: And he will take Zedekiah to Babylon, and there he will remain until I attend
    to him, declares the LORD. Though you fight against the Chaldeans, you will not
    succeed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'until I visit him'; the Hebrew verb can also carry the sense 'until
      I punish him,' depending on context.
    reason: lexical_alternative
  - marker: b
    text: '''Chaldeans'' refers to the Babylonian power.'
    reason: cultural_note
lexical_decisions:
- source_word: וּ/בָבֶל
  chosen: to Babylon
  alternatives:
  - into Babylon
  - Babylonward
  lexicon: HALOT
  rationale: With the motion verb יוֹלִךְ, the place name functions as destination.
    English idiom prefers 'to Babylon.'
- source_word: יוֹלִךְ
  chosen: he will take
  alternatives:
  - he will bring
  - he will lead
  lexicon: HALOT
  rationale: Hiphil of הלך here is causative, 'cause to go/bring away.' In context
    of capture and deportation, 'take' is natural and clear without over-specifying
    manner.
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: וְ/שָׁם יִהְיֶה
  chosen: and there he will remain
  alternatives:
  - and there he will be
  - and there he will stay
  lexicon: HALOT
  rationale: Hebrew literally says 'and there he will be.' In this captivity context,
    'remain' expresses continued presence more idiomatically in English while preserving
    the plain sense.
- source_word: עַד פָּקְדִי אֹתוֹ
  chosen: until I attend to him
  alternatives:
  - until I visit him
  - until I deal with him
  - until I punish him
  lexicon: HALOT
  rationale: 'פקד is semantically broad: visit, attend to, deal with, punish, care
    for. The context does not require specifying whether the visitation is for judgment
    or mercy at this point, so ''attend to him'' preserves the Hebrew''s theological
    tension better than a narrower gloss.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is natural modern English
    and preserves solemnity. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Required by doctrine for the divine name יְהוָה.
- source_word: כִּי
  chosen: Though
  alternatives:
  - For
  - If
  - When
  lexicon: HALOT
  rationale: 'Here כִּי introduces a concessive sense in context: even if/though they
    fight, they will not prosper. ''Though'' communicates the force clearly in English.'
- source_word: תִלָּחֲמוּ
  chosen: you fight
  alternatives:
  - you wage war
  - you battle
  lexicon: HALOT
  rationale: Second person plural addresses the king/people collectively. 'Fight'
    is the most direct and readable rendering.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew ethnonym is 'Chaldeans.' Since this is the direct lexical
    equivalent and remains intelligible in English, it is preferred; the more interpretive
    'Babylonians' is preserved as an alternative.
- source_word: לֹא תַצְלִיחוּ
  chosen: you will not succeed
  alternatives:
  - you will not prosper
  - you will not prevail
  lexicon: HALOT
  rationale: Hiphil of צלח often conveys prospering/succeeding. In military context,
    'succeed' communicates failure of the effort without adding a stronger nuance
    like 'prevail' that may overstate the verb.
