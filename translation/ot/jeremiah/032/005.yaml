theological_decisions:
- issue: Semantic range of פקד in divine speech
  chosen_reading: until I attend to him
  alternative_readings:
  - until I visit him
  - until I punish him
  rationale: The verb can denote divine visitation for judgment or for gracious attention
    depending on context. This verse alone does not force a narrower theological conclusion,
    so the translation preserves ambiguity rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
