id: JER.32.8
reference: Jeremiah 32:8
source:
  edition: WLC
  text: וַ/יָּבֹ֣א אֵ֠לַ/י חֲנַמְאֵ֨ל בֶּן דֹּדִ֜/י כִּ/דְבַ֣ר יְהוָה֮ אֶל חֲצַ֣ר
    הַ/מַּטָּרָה֒ וַ/יֹּ֣אמֶר אֵלַ֡/י קְנֵ֣ה נָ֠א אֶת שָׂדִ֨/י אֲשֶׁר בַּ/עֲנָת֜וֹת
    אֲשֶׁ֣ר בְּ/אֶ֣רֶץ בִּנְיָמִ֗ין כִּֽי לְ/ךָ֞ מִשְׁפַּ֧ט הַ/יְרֻשָּׁ֛ה וּ/לְ/ךָ֥
    הַ/גְּאֻלָּ֖ה קְנֵה לָ֑/ךְ וָ/אֵדַ֕ע כִּ֥י דְבַר יְהוָ֖ה הֽוּא־־־־׀־־־׃
translation:
  text: Then Hanamel the son of my uncle came to me in the court of the guard, according
    to the word of the LORD, and he said to me, “Please buy my field that is at Anathoth,
    in the land of Benjamin, for the right of inheritance is yours and the redemption
    is yours. Buy it for yourself.” Then I knew that this was the word of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “the right of redemption is yours.” The Hebrew says
      literally, “the redemption is yours,” referring to the kinship-based legal right
      or duty to redeem family property.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּדְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - as the LORD had said
  - according to the LORD's word
  lexicon: HALOT
  rationale: כְּ with דָּבָר expresses conformity to what had been spoken previously.
    'According to the word of the LORD' preserves the narrative link to the prior
    divine announcement while remaining natural English. YHWH is rendered 'the LORD'
    per doctrine.
- source_word: חֲצַר הַמַּטָּרָה
  chosen: the court of the guard
  alternatives:
  - the court of the prison
  - the guard court
  lexicon: HALOT
  rationale: The phrase denotes the guarded court where Jeremiah was confined. 'Court
    of the guard' is a clear, fairly literal rendering that avoids over-specifying
    the location as a prison while preserving the custodial sense.
- source_word: קְנֵה נָא
  chosen: Please buy
  alternatives:
  - Buy, please
  - Please acquire
  lexicon: HALOT
  rationale: קנה means 'buy/acquire'; in this property context 'buy' is the most direct
    choice. נָא softens the imperative, so 'Please buy' captures the polite/requesting
    force.
- source_word: שָׂדִי
  chosen: my field
  alternatives:
  - my land
  - my parcel of land
  lexicon: HALOT
  rationale: שָׂדֶה commonly means 'field.' In a land-sale context, 'field' is both
    accurate and idiomatic.
- source_word: בַּעֲנָתוֹת
  chosen: at Anathoth
  alternatives:
  - in Anathoth
  lexicon: HALOT
  rationale: With a place name, English may use either 'at' or 'in.' 'At Anathoth'
    fits the sense of a field located there and reads naturally with the following
    apposition 'in the land of Benjamin.'
- source_word: מִשְׁפַּט הַיְרֻשָּׁה
  chosen: the right of inheritance
  alternatives:
  - the legal right of inheritance
  - the claim of inheritance
  lexicon: HALOT
  rationale: מִשְׁפָּט here carries the sense of legal right or claim, and יְרֻשָּׁה
    is inheritance/possession. 'The right of inheritance' preserves the legal nuance
    without becoming cumbersome.
- source_word: הַגְּאֻלָּה
  chosen: the redemption
  alternatives:
  - the right of redemption
  - the duty of redemption
  - the redemption right
  lexicon: HALOT
  rationale: The noun refers to the kinship-based right/responsibility to redeem property.
    'The redemption' is close to the Hebrew wording; the legal nuance is clarified
    by context and preserved in a footnote.
- source_word: קְנֵה לָךְ
  chosen: Buy it for yourself
  alternatives:
  - Buy it for yourself as your own
  - Acquire it for yourself
  lexicon: HALOT
  rationale: Although לָךְ is morphologically marked with a feminine form in the table,
    the sense in context is the common idiomatic dative 'for yourself.' English requires
    the object 'it' for clarity.
- source_word: וָאֵדַע כִּי דְבַר יְהוָה הוּא
  chosen: Then I knew that this was the word of the LORD
  alternatives:
  - Then I knew that it was the word of the LORD
  - So I knew that this was the LORD's word
  lexicon: HALOT
  rationale: The clause marks Jeremiah's recognition that the event confirmed the
    prior divine message. 'This was the word of the LORD' makes the demonstrative
    sense explicit in natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the stated translation policy.
