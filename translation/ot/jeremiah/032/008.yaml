theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. The project doctrine specifies
    'the LORD' as the default rendering for YHWH, preserving continuity with Jewish
    reverence tradition and LXX-influenced Christian usage.
