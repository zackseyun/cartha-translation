id: JER.32.12
reference: Jeremiah 32:12
source:
  edition: WLC
  text: וָ/אֶתֵּ֞ן אֶת הַ/סֵּ֣פֶר הַ/מִּקְנָ֗ה אֶל בָּר֣וּךְ בֶּן נֵרִיָּה֮ בֶּן מַחְסֵיָה֒
    לְ/עֵינֵי֙ חֲנַמְאֵ֣ל דֹּדִ֔/י וּ/לְ/עֵינֵי֙ הָֽ/עֵדִ֔ים הַ/כֹּתְבִ֖ים בְּ/סֵ֣פֶר
    הַ/מִּקְנָ֑ה לְ/עֵינֵי֙ כָּל הַ/יְּהוּדִ֔ים הַ/יֹּשְׁבִ֖ים בַּ/חֲצַ֥ר הַ/מַּטָּרָֽה־־־־־׃
translation:
  text: Then I gave the deed of purchase to Baruch son of Neriah, son of Mahseiah,
    in the sight of Hanamel my uncle, and in the sight of the witnesses who had signed
    the deed of purchase, in the sight of all the Judeans who were sitting in the
    court of the guard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'before' or 'in the presence of' for the repeated phrase 'in the sight
      of.'
    reason: lexical_alternative
  - marker: b
    text: '''Hanamel my uncle'' follows the immediate Hebrew wording; elsewhere in
      the chapter Hanamel is identified as Jeremiah''s cousin (the son of his uncle).'
    reason: cross_reference
  - marker: c
    text: Or 'who wrote in the deed of purchase'; the Hebrew literally says 'the witnesses,
      the ones writing in the deed of purchase.'
    reason: lexical_alternative
  - marker: d
    text: Or 'all the Jews'; 'Judeans' reflects the historical setting of the kingdom/province
      of Judah.
    reason: lexical_alternative
  - marker: e
    text: Or 'courtyard of the guard' or possibly 'court of the prison.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתֵּן
  chosen: Then I gave
  alternatives:
  - And I gave
  lexicon: HALOT
  rationale: Wayyiqtol of נתן advances the narrative. 'Then I gave' captures the sequential
    force in natural English while remaining close to the Hebrew.
- source_word: סֵפֶר הַמִּקְנָה
  chosen: the deed of purchase
  alternatives:
  - the purchase document
  - the bill of sale
  lexicon: HALOT
  rationale: סֵפֶר is a written document/book, and מִקְנָה denotes acquisition/purchase.
    In this legal context, 'deed of purchase' best conveys a formal property-transfer
    document in readable modern English.
- source_word: אֶל
  chosen: to
  alternatives:
  - into the hand of
  lexicon: HALOT
  rationale: Simple directional preposition introducing the recipient; 'to' is the
    natural equivalent.
- source_word: בָּרוּךְ בֶּן נֵרִיָּה בֶּן מַחְסֵיָה
  chosen: Baruch son of Neriah, son of Mahseiah
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. 'Son of' preserves
    the genealogical construction.
- source_word: לְעֵינֵי
  chosen: in the sight of
  alternatives:
  - before
  - in the presence of
  lexicon: HALOT
  rationale: Literally 'to/for the eyes of.' 'In the sight of' preserves the public,
    witnessed nature of the act and matches the repeated legal formula in the verse.
- source_word: חֲנַמְאֵל דֹּדִי
  chosen: Hanamel my uncle
  alternatives:
  - Hanamel my kinsman
  lexicon: HALOT
  rationale: דּוֹד commonly means 'uncle' in kinship contexts. Since Hanamel is identified
    elsewhere in the chapter as Jeremiah's uncle's son, 'uncle' here follows the immediate
    lexical sense of the Hebrew as used by the speaker, while the broader family relation
    can be clarified from context.
- source_word: הָעֵדִים
  chosen: the witnesses
  lexicon: HALOT
  rationale: Standard legal term for those attesting the transaction.
- source_word: הַכֹּתְבִים
  chosen: who had signed
  alternatives:
  - who were writing
  - who wrote
  lexicon: HALOT
  rationale: Although the participle literally means 'the ones writing,' in this legal-document
    context it refers to the witnesses' formal written attestation. 'Who had signed'
    communicates the function idiomatically in English without over-paraphrasing.
- source_word: בְּסֵפֶר הַמִּקְנָה
  chosen: the deed of purchase
  alternatives:
  - in the purchase document
  lexicon: HALOT
  rationale: The prepositional phrase specifies the document on which the witnesses
    wrote/signed. English legal style naturally expresses this as 'signed the deed
    of purchase.'
- source_word: כָּל הַיְּהוּדִים
  chosen: all the Judeans
  alternatives:
  - all the Jews
  lexicon: HALOT
  rationale: In Jeremiah's historical setting, יְהוּדִים primarily denotes people
    of Judah/Judea rather than later broader ethnic-religious usage. 'Judeans' is
    more historically precise.
- source_word: הַיֹּשְׁבִים
  chosen: who were sitting
  alternatives:
  - who were staying
  - who were dwelling
  lexicon: HALOT
  rationale: The participle of ישׁב here describes those present and seated in the
    location. 'Sitting' is the most direct rendering.
- source_word: חֲצַר הַמַּטָּרָה
  chosen: the court of the guard
  alternatives:
  - the courtyard of the guard
  - the court of the prison
  lexicon: HALOT
  rationale: חָצֵר is 'court/courtyard'; מַטָּרָה in this context refers to the guardhouse/watch
    area where Jeremiah was confined. 'Court of the guard' is a clear, established
    rendering that fits the chapter's setting.
