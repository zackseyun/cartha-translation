id: JER.32.7
reference: Jeremiah 32:7
source:
  edition: WLC
  text: הִנֵּ֣ה חֲנַמְאֵ֗ל בֶּן שַׁלֻּם֙ דֹּֽדְ/ךָ֔ בָּ֥א אֵלֶ֖י/ךָ לֵ/אמֹ֑ר קְנֵ֣ה
    לְ/ךָ֗ אֶת שָׂדִ/י֙ אֲשֶׁ֣ר בַּ/עֲנָת֔וֹת כִּ֥י לְ/ךָ֛ מִשְׁפַּ֥ט הַ/גְּאֻלָּ֖ה
    לִ/קְנֽוֹת־־׃
translation:
  text: Look, Hanamel son of Shallum, your uncle, is coming to you, saying, ‘Buy my
    field that is in Anathoth, for the right of redemption to buy it belongs to you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the legal right of redemption' or 'the right of repurchase.' The Hebrew
      refers to the kinship-based right to redeem family property.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the announced event with immediacy. 'Look' is natural modern
    English while preserving the deictic force better than omitting it.
- source_word: חֲנַמְאֵל
  chosen: Hanamel
  alternatives:
  - Hanameel
  lexicon: HALOT
  rationale: Standard transliteration of the personal name; names are transliterated
    rather than translated.
- source_word: דֹּדְךָ
  chosen: your uncle
  alternatives:
  - your beloved
  - your father's brother
  lexicon: HALOT
  rationale: In this kinship context דּוֹד refers to an uncle, not 'beloved.' The
    family-land redemption setting confirms the kinship sense.
- source_word: בָּא אֵלֶיךָ
  chosen: is coming to you
  alternatives:
  - will come to you
  - comes to you
  lexicon: HALOT
  rationale: The participial/predicative form presents an imminent event. 'Is coming'
    captures the near-future vividness in English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard idiomatic rendering introducing direct speech.
- source_word: קְנֵה לְךָ
  chosen: Buy
  alternatives:
  - Acquire for yourself
  - Purchase
  lexicon: HALOT
  rationale: Direct imperative of קנה. 'Buy' is the clearest and most natural English
    equivalent here.
- source_word: שָׂדִי
  chosen: my field
  alternatives:
  - my land
  - my parcel of land
  lexicon: HALOT
  rationale: שָׂדֶה commonly means 'field.' 'My field' preserves the concrete property
    reference without over-specifying.
- source_word: בַּעֲנָתוֹת
  chosen: in Anathoth
  lexicon: HALOT
  rationale: Place name transliterated in standard English form.
- source_word: מִשְׁפַּט הַגְּאֻלָּה
  chosen: the right of redemption
  alternatives:
  - the legal right of redemption
  - the redemption right
  - the right of repurchase
  lexicon: HALOT
  rationale: This phrase denotes the legally recognized kinship right/duty to redeem
    family property. 'The right of redemption' is concise, accurate, and preserves
    the juridical sense of מִשְׁפָּט.
- source_word: לִקְנוֹת
  chosen: to buy it
  alternatives:
  - to purchase it
  - for buying
  lexicon: HALOT
  rationale: Infinitive of purpose/complement after the redemption-right phrase. English
    requires an object for clarity; 'it' is supplied from 'my field' and reflects
    the sense.
- source_word: כִּי לְךָ
  chosen: for ... belongs to you
  alternatives:
  - because yours is
  - for to you belongs
  lexicon: HALOT
  rationale: Expresses the reason Jeremiah should buy the field. 'Belongs to you'
    is idiomatic and preserves possession/responsibility.
