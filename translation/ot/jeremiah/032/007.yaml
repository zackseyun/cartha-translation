theological_decisions:
- issue: Nature of גְּאֻלָּה in land law
  chosen_reading: Rendered as 'redemption' in a legal-kinship sense, not spiritualized.
  alternative_readings:
  - repurchase
  - redemption of property
  rationale: The context is Jeremiah's purchase of family land under kinship redemption
    law. The translation preserves the covenantal-legal concept without importing
    later theological overtones.
