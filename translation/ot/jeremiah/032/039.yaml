theological_decisions:
- issue: Meaning of 'one heart and one way'
  chosen_reading: A covenant promise of unified inner disposition and shared manner
    of life oriented toward reverent obedience to God.
  alternative_readings:
  - Primarily communal unity among the people
  - Primarily individual integrity or undivided devotion
  rationale: The Hebrew imagery can encompass both communal and moral-spiritual unity.
    The translation keeps the literal metaphors 'one heart' and 'one way' to preserve
    that theological breadth rather than narrowing to one interpretive paraphrase.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Sense of 'fear me'
  chosen_reading: Reverential fear toward God within covenant relationship.
  alternative_readings:
  - Terror or dread
  rationale: In Jeremiah's covenant-restoration context, ירא with God as object ordinarily
    denotes reverent awe expressed in faithful obedience, not mere fright. The main
    text retains 'fear me' as the standard biblical idiom without paraphrasing away
    the term.
