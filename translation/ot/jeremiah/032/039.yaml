id: JER.32.39
reference: Jeremiah 32:39
source:
  edition: WLC
  text: וְ/נָתַתִּ֨י לָ/הֶ֜ם לֵ֤ב אֶחָד֙ וְ/דֶ֣רֶךְ אֶחָ֔ד לְ/יִרְאָ֥ה אוֹתִ֖/י כָּל
    הַ/יָּמִ֑ים לְ/ט֣וֹב לָ/הֶ֔ם וְ/לִ/בְנֵי/הֶ֖ם אַחֲרֵי/הֶֽם־׃
translation:
  text: And I will give them one heart and one way, so that they may fear me all their
    days, for their good and for the good of their children after them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an undivided heart.' The Hebrew literally reads 'one heart.'
    reason: lexical_alternative
  - marker: b
    text: Or 'one path.' The Hebrew 'way' can refer figuratively to a manner of life.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will give
  alternatives:
  - And I shall give
  - And I will grant
  lexicon: HALOT
  rationale: Qal perfect 1cs with prefixed conjunction in prophetic discourse functions
    as a future promise. 'Give' is the plain sense of נתן and fits the covenantal
    promise context.
- source_word: לֵב אֶחָד
  chosen: one heart
  alternatives:
  - a single heart
  - an undivided heart
  lexicon: HALOT
  rationale: Literal rendering preserves the Hebrew metaphor. 'Undivided heart' captures
    an interpretive implication, but 'one heart' better reflects the source wording
    and leaves the precise nuance open.
- source_word: וְדֶרֶךְ אֶחָד
  chosen: and one way
  alternatives:
  - and a single way
  - and one path
  lexicon: HALOT
  rationale: דרך commonly means 'way/path' both literally and figuratively. 'Way'
    is idiomatic in English for a manner of life and pairs well with 'heart' without
    over-interpreting.
- source_word: לְיִרְאָה אֹתִי
  chosen: so that they may fear me
  alternatives:
  - to fear me
  - for fearing me
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses purpose here. 'So that they
    may fear me' makes the purposive force explicit in natural English while preserving
    'fear' as the standard rendering of ירא in reverential covenant contexts.
- source_word: כָּל הַיָּמִים
  chosen: all their days
  alternatives:
  - all the days
  - always
  lexicon: HALOT
  rationale: Literally 'all the days'; in context referring to the people's ongoing
    life. 'All their days' is idiomatic and conveys enduring duration without flattening
    to the adverb 'always'.
- source_word: לְטוֹב לָהֶם
  chosen: for their good
  alternatives:
  - for good to them
  - for their welfare
  lexicon: HALOT
  rationale: The preposition ל with טוב expresses result/benefit. 'For their good'
    is natural English and preserves the benefactive sense.
- source_word: וְלִבְנֵיהֶם אַחֲרֵיהֶם
  chosen: and for the good of their children after them
  alternatives:
  - and for their children after them
  - and for their descendants after them
  lexicon: HALOT
  rationale: The phrase modifies the preceding 'for their good,' extending the benefit
    to the next generation. Repeating 'for the good of' in English makes the relation
    clear. 'Children' is the direct sense of בנים here; 'descendants' is possible
    but broader than necessary.
