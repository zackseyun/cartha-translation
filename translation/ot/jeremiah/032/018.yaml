id: JER.32.18
reference: Jeremiah 32:18
source:
  edition: WLC
  text: עֹ֤שֶׂה חֶ֨סֶד֙ לַֽ/אֲלָפִ֔ים וּ/מְשַׁלֵּם֙ עֲוֺ֣ן אָב֔וֹת אֶל חֵ֥יק בְּנֵי/הֶ֖ם
    אַחֲרֵי/הֶ֑ם הָ/אֵ֤ל הַ/גָּדוֹל֙ הַ/גִּבּ֔וֹר יְהוָ֥ה צְבָא֖וֹת שְׁמֽ/וֹ־׃
translation:
  text: showing steadfast love to thousands, and repaying the iniquity of fathers
    into the lap of their children after them—the great, mighty God, the LORD of Armies,
    is his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to thousands of generations' in light of similar covenant language elsewhere;
      the Hebrew here reads simply 'to thousands.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD of hosts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֶׂה
  chosen: showing
  alternatives:
  - doing
  - working
  lexicon: HALOT
  rationale: The participle continues the description of God from the prior verse.
    'Showing' fits the collocation with חֶסֶד in natural English while preserving
    the durative/descriptive force of the participle.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - covenant faithfulness
  - kindness
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty and mercy. 'Steadfast love' is established,
    readable modern English that preserves both affection and loyalty better than
    the narrower 'kindness'.
- source_word: לַאֲלָפִים
  chosen: to thousands
  alternatives:
  - to thousands of people
  - to the thousandth generation
  lexicon: HALOT
  rationale: The Hebrew here is simply 'to thousands.' While Exodus 20:6 is often
    understood as 'to thousands [of generations],' Jeremiah does not explicitly supply
    'generations,' so the translation keeps the concise Hebrew expression rather than
    importing an explanatory noun.
- source_word: וּמְשַׁלֵּם
  chosen: and repaying
  alternatives:
  - and recompensing
  - and visiting
  lexicon: HALOT
  rationale: The participle parallels עֹשֶׂה. 'Repaying' preserves the sense of requital
    without the archaic feel of 'recompensing.' 'Visiting' would reflect traditional
    phrasing from related passages but is not the plain sense of this verb.
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - punishment for iniquity
  - sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or its consequence. Here 'repaying
    the iniquity' preserves the compact Hebrew and the moral weight of the term without
    over-resolving whether the focus is on guilt itself or its penal consequence.
- source_word: אָבוֹת
  chosen: fathers
  alternatives:
  - parents
  - ancestors
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural. Per the gender-accurate
    policy, 'fathers' is retained rather than neutralizing to 'parents.'
- source_word: אֶל חֵיק
  chosen: into the lap
  alternatives:
  - into the bosom
  - upon
  lexicon: HALOT
  rationale: This idiom conveys something placed directly upon or into one's own possession/person.
    'Into the lap' is the most transparent modern equivalent and preserves the metaphor.
- source_word: בְּנֵיהֶם אַחֲרֵיהֶם
  chosen: of their children after them
  alternatives:
  - of their sons after them
  - of their descendants after them
  lexicon: HALOT
  rationale: בָּנִים can mean sons or children/descendants. 'Children' best fits the
    likely representative sense in English while avoiding an unnecessarily narrow
    male-only reading; 'after them' preserves the temporal succession explicit in
    the Hebrew.
- source_word: הָאֵל
  chosen: God
  alternatives:
  - the God
  - the Mighty One
  lexicon: HALOT
  rationale: With the following adjectives, this functions as a titular description.
    English idiom prefers 'the great, mighty God' rather than the more wooden 'the
    God, the great, the mighty.'
- source_word: הַגָּדוֹל
  chosen: great
  alternatives:
  - majestic
  lexicon: HALOT
  rationale: A straightforward rendering of the adjective, preserving the elevated
    doxological style.
- source_word: הַגִּבּוֹר
  chosen: mighty
  alternatives:
  - powerful
  - warrior-like
  lexicon: HALOT
  rationale: '''Mighty'' is the natural pairing with ''great'' in English and preserves
    the divine-power nuance without over-specifying martial imagery.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  - of heavenly armies
  lexicon: HALOT
  rationale: The title denotes armies/hosts under divine command. 'Of Armies' is more
    transparent to modern readers than 'of hosts' while remaining concise and faithful.
- source_word: שְׁמוֹ
  chosen: is his name
  alternatives:
  - his name
  - is the name of him
  lexicon: HALOT
  rationale: 'The nominal clause is naturally rendered in English with an explicit
    copula: ''is his name.'' This preserves the formal self-identifying cadence of
    the Hebrew.'
