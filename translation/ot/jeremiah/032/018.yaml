theological_decisions:
- issue: Intergenerational recompense language
  chosen_reading: Retain the text's statement that God repays the iniquity of fathers
    into the lap of their children after them, without softening or systematizing
    it.
  alternative_readings:
  - Interpret as merely the social consequences of parental sin
  - Interpret as direct punishment of innocent children apart from broader canonical
    tension
  rationale: The verse itself states a real intergenerational dimension of divine
    recompense, echoing covenantal formulations elsewhere. Following the translation
    philosophy, the rendering preserves the tension and does not resolve how this
    relates to passages stressing individual responsibility (e.g., Ezek 18).
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Divine title צְבָאוֹת
  chosen_reading: Translate as 'the LORD of Armies' in the main text.
  alternative_readings:
  - the LORD of hosts
  rationale: '''Hosts'' is traditional but opaque for many modern readers. ''Armies''
    communicates the underlying Hebrew more clearly while preserving the title''s
    grandeur and military-sovereign force.'
  doctrine_reference: 'Translation philosophy §6: Readable modern English, not archaic
    or academic; Contested terms table for יְהוָה.'
