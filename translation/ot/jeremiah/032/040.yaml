theological_decisions:
- issue: Nature of the covenant's duration
  chosen_reading: everlasting covenant
  alternative_readings:
  - eternal covenant
  - perpetual covenant
  rationale: The text presents the covenant as enduring without implying a need to
    adjudicate later theological systems. 'Everlasting' preserves the covenantal permanence
    stated in the Hebrew.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
- issue: Meaning of 'fear' in relation to God
  chosen_reading: the fear of me
  alternative_readings:
  - my fear
  rationale: The phrase denotes reverent fear directed toward God, not terror simpliciter
    and not God's own fear. The rendering preserves the theological idea of divinely
    given covenant fidelity without importing a denominational account of perseverance.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
