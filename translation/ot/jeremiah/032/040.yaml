id: JER.32.40
reference: Jeremiah 32:40
source:
  edition: WLC
  text: וְ/כָרַתִּ֤י לָ/הֶם֙ בְּרִ֣ית עוֹלָ֔ם אֲשֶׁ֤ר לֹֽא אָשׁוּב֙ מֵ/אַ֣חֲרֵי/הֶ֔ם
    לְ/הֵיטִיבִ֖/י אוֹתָ֑/ם וְ/אֶת יִרְאָתִ/י֙ אֶתֵּ֣ן בִּ/לְבָבָ֔/ם לְ/בִלְתִּ֖י
    ס֥וּר מֵ/עָלָֽ/י־־׃
translation:
  text: I will make with them an everlasting covenant, that I will not turn away from
    them, to do them good. And I will put the fear of me in their hearts, so that
    they will not turn away from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'eternal covenant' or 'perpetual covenant.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my fear'; that is, fear directed toward me.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָרַתִּי
  chosen: I will make
  alternatives:
  - I will cut
  - I will establish
  lexicon: HALOT
  rationale: Although the Hebrew idiom is literally 'cut a covenant,' idiomatic English
    uses 'make a covenant.' 'Establish' is possible but less direct here because the
    verb itself is the covenant-making idiom.
- source_word: בְּרִית עוֹלָם
  chosen: an everlasting covenant
  alternatives:
  - an eternal covenant
  - a perpetual covenant
  lexicon: HALOT
  rationale: '''Everlasting'' is natural modern English and preserves the durative
    force of עוֹלָם in covenantal context.'
- source_word: אֲשֶׁר לֹא אָשׁוּב מֵאַחֲרֵיהֶם
  chosen: that I will not turn away from them
  alternatives:
  - that I will not turn back from following them
  - that I will not turn away from after them
  lexicon: HALOT
  rationale: The phrase means God will not withdraw from them. A more literal rendering
    with 'from after them' is awkward in English and obscures the sense.
- source_word: לְהֵיטִיבִי אוֹתָם
  chosen: to do them good
  alternatives:
  - to do good to them
  - to benefit them
  lexicon: HALOT
  rationale: This infinitive expresses purpose/result tied to God's not turning away.
    'To do them good' is idiomatic and close to the Hebrew.
- source_word: יִרְאָתִי
  chosen: the fear of me
  alternatives:
  - my fear
  - fear of me
  lexicon: HALOT
  rationale: The construct with first-person suffix is most transparently rendered
    'the fear of me,' meaning reverent fear directed toward God. This avoids the possible
    English ambiguity of 'my fear' as God's own fear.
- source_word: בִּלְבָבָם
  chosen: in their hearts
  alternatives:
  - within their hearts
  - in their inner being
  lexicon: HALOT
  rationale: '''Heart'' in Hebrew anthropology is the center of will and inner disposition.
    ''In their hearts'' is both natural and sufficiently literal.'
- source_word: לְבִלְתִּי סוּר מֵעָלָי
  chosen: so that they will not turn away from me
  alternatives:
  - so as not to depart from me
  - so that they may not turn aside from me
  lexicon: HALOT
  rationale: The construction expresses intended result/prevention. 'Turn away from
    me' matches the repeated שוב/סור theme in the verse and reads naturally in English.
