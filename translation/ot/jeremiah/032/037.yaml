id: JER.32.37
reference: Jeremiah 32:37
source:
  edition: WLC
  text: הִנְ/נִ֤י מְקַבְּצָ/ם֙ מִ/כָּל הָ֣/אֲרָצ֔וֹת אֲשֶׁ֨ר הִדַּחְתִּ֥י/ם שָׁ֛ם
    בְּ/אַפִּ֥/י וּ/בַ/חֲמָתִ֖/י וּ/בְ/קֶ֣צֶף גָּד֑וֹל וַ/הֲשִֽׁבֹתִי/ם֙ אֶל הַ/מָּק֣וֹם
    הַ/זֶּ֔ה וְ/הֹשַׁבְתִּ֖י/ם לָ/בֶֽטַח־־׃
translation:
  text: Behold, I am gathering them from all the lands where I drove them in my anger
    and in my wrath and in great indignation, and I will bring them back to this place
    and make them dwell in safety.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Behold, I will gather them.' The Hebrew construction can express imminent
      or certain future action.
    reason: lexical_alternative
  - marker: b
    text: '''Great indignation'' renders a third Hebrew term for divine anger, preserving
      the verse''s piling up of judgment language.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces the declaration with emphatic immediacy. 'Behold' preserves
    the prophetic force better than the more colloquial 'look' or 'see.'
- source_word: מְקַבְּצָם
  chosen: I am gathering them
  alternatives:
  - I will gather them
  - I gather them
  lexicon: HALOT
  rationale: The participle with הִנְנִי often conveys imminent or certain action
    in progress. 'I am gathering them' preserves the aspectual force while still fitting
    the prophetic promise context.
- source_word: מִכָּל הָאֲרָצוֹת
  chosen: from all the lands
  alternatives:
  - from all the countries
  - from all the earths
  lexicon: HALOT
  rationale: אֲרָצוֹת here refers to various territories/nations of exile, not the
    whole earth in a cosmic sense. 'Lands' is natural and sufficiently broad.
- source_word: הִדַּחְתִּים
  chosen: I drove them
  alternatives:
  - I banished them
  - I scattered them
  lexicon: HALOT
  rationale: The verb emphasizes forceful expulsion. 'Drove them' captures divine
    agency and severity more directly than the softer 'banished'; 'scattered' overlaps
    with related exile language but is less exact here.
- source_word: בְּאַפִּי
  chosen: in my anger
  alternatives:
  - in my nostril
  - in my fury
  lexicon: HALOT
  rationale: Though literally linked to 'nose/nostril,' the idiom denotes anger. 'Anger'
    is the clear English equivalent.
- source_word: וּבַחֲמָתִי
  chosen: and in my wrath
  alternatives:
  - and in my fury
  - and in my rage
  lexicon: HALOT
  rationale: Retains the intensifying accumulation of divine judgment terms while
    varying naturally from 'anger.' 'Wrath' carries appropriate solemnity.
- source_word: וּבְקֶצֶף גָּדוֹל
  chosen: and in great indignation
  alternatives:
  - and in great wrath
  - and in great anger
  lexicon: HALOT
  rationale: A third judgment term is preserved distinctly to reflect the Hebrew piling
    up of near-synonyms. 'Great indignation' avoids flattening all three terms into
    the same English word.
- source_word: וַהֲשִׁבֹתִים
  chosen: I will bring them back
  alternatives:
  - I will return them
  - I will restore them
  lexicon: HALOT
  rationale: In context of exile and return to a place, the causative sense of שוב
    is best rendered 'bring them back.' 'Restore' is broader and less spatially explicit.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  chosen: to this place
  alternatives:
  - to this location
  - to this land
  lexicon: HALOT
  rationale: The phrase points specifically to the place under discussion, likely
    Jerusalem/Judah in context. 'This place' is the most direct rendering.
- source_word: וְהֹשַׁבְתִּים
  chosen: make them dwell
  alternatives:
  - settle them
  - cause them to live
  lexicon: HALOT
  rationale: The causative of ישׁב means to cause to dwell or settle. 'Make them dwell'
    preserves the causative force more transparently than the smoother but slightly
    interpretive 'settle them.'
- source_word: לָבֶטַח
  chosen: in safety
  alternatives:
  - securely
  - in security
  lexicon: HALOT
  rationale: Conveys secure, unharmed dwelling. 'In safety' is idiomatic and clear
    in modern English.
