theological_decisions:
- issue: Rendering the sequence of divine judgment terms without collapsing their
    force
  chosen_reading: anger / wrath / great indignation
  alternative_readings:
  - anger / fury / great wrath
  - anger / rage / great anger
  rationale: The Hebrew intentionally stacks multiple terms for divine displeasure.
    The translation preserves that rhetorical intensity without importing a technical
    distinction beyond the text. Distinct English terms maintain the cumulative force
    of judgment and the later grace of restoration.
  doctrine_reference: Translation philosophy §3, §5
- issue: Aspect of the opening promise formula הִנְנִי + participle
  chosen_reading: Behold, I am gathering them
  alternative_readings:
  - Behold, I will gather them
  rationale: The construction can point to imminent future action. Rendering it as
    present-progressive preserves the Hebrew form while still communicating certain
    divine intent in context. This avoids over-resolving aspect while keeping readable
    English.
  doctrine_reference: Translation philosophy §1, §6
