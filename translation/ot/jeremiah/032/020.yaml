id: JER.32.20
reference: Jeremiah 32:20
source:
  edition: WLC
  text: אֲשֶׁר שַׂ֠מְתָּ אֹת֨וֹת וּ/מֹפְתִ֤ים בְּ/אֶֽרֶץ מִצְרַ֨יִם֙ עַד הַ/יּ֣וֹם
    הַ/זֶּ֔ה וּ/בְ/יִשְׂרָאֵ֖ל וּ/בָֽ/אָדָ֑ם וַ/תַּעֲשֶׂה לְּ/ךָ֥ שֵׁ֖ם כַּ/יּ֥וֹם
    הַ/זֶּֽה־־־־׃
translation:
  text: who set signs and wonders in the land of Egypt, and to this day in Israel
    and among mankind, and made a name for yourself, as it is this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among humanity' or 'among men.' The Hebrew אָדָם is a collective term
      for humankind.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂמְתָּ
  chosen: set
  alternatives:
  - placed
  - performed
  lexicon: HALOT
  rationale: The verb שׂוּם literally means 'set/put/place.' Here with 'signs and
    wonders' it can idiomatically approach 'perform,' but 'set' preserves the Hebrew
    imagery while remaining natural enough in English.
- source_word: אֹתוֹת
  chosen: signs
  alternatives:
  - tokens
  lexicon: HALOT
  rationale: Standard rendering for אוֹת in miracle contexts; paired with 'wonders'
    as a conventional Hebrew collocation.
- source_word: מֹפְתִים
  chosen: wonders
  alternatives:
  - portents
  - miracles
  lexicon: HALOT
  rationale: '''Wonders'' is the most idiomatic partner to ''signs'' and preserves
    the sense of extraordinary acts without over-specifying the mechanism.'
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: Retains אֶרֶץ ('land') rather than compressing to simply 'Egypt,' preserving
    the Hebrew phrasing and geographic concreteness.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Idiomatic English equivalent of the Hebrew temporal expression.
- source_word: וּבְיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: The preposition ב can be spatial or associative; 'in Israel' is the most
    straightforward and natural here, referring to the continuing display of God's
    acts/reputation within Israel.
- source_word: וּבָאָדָם
  chosen: among mankind
  alternatives:
  - among man
  - among humanity
  - and among men
  lexicon: HALOT
  rationale: אָדָם here is collective/generic rather than an individual. Per doctrine,
    gender-accurate rendering is required; 'mankind' preserves the representative
    human sense better than the more abstract 'humanity,' while avoiding the misleading
    singular 'man.'
- source_word: וַתַּעֲשֶׂה לְּךָ שֵׁם
  chosen: made a name for yourself
  alternatives:
  - won renown for yourself
  - made yourself a name
  lexicon: HALOT
  rationale: This idiom means to establish renown or reputation. 'Made a name for
    yourself' is the closest natural English equivalent and preserves the reflexive
    force of לְךָ.
- source_word: כַּיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as at this day
  - as is the case today
  lexicon: HALOT
  rationale: This comparative idiom points to the present, observable state resulting
    from God's acts. 'As it is this day' is clear and fairly close to the Hebrew form.
