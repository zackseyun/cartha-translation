theological_decisions:
- issue: Rendering of אָדָם in a collective generic sense
  chosen_reading: among mankind
  alternative_readings:
  - among humanity
  - among men
  - among man
  rationale: The Hebrew uses אָדָם generically for humankind. Following the doctrine's
    gender-accurate principle and contested-terms guidance, the translation should
    reflect collective humanity without flattening the lexical connection to 'man'
    entirely. 'Mankind' best balances accuracy and readability here.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table
    for אָדָם'
