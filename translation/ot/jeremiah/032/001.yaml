id: JER.32.1
reference: Jeremiah 32:1
source:
  edition: WLC
  text: הַ/דָּבָ֞ר אֲשֶׁר הָיָ֤ה אֶֽל יִרְמְיָ֨הוּ֙ מֵ/אֵ֣ת יְהוָ֔ה ב/שנת הָ/עֲשִׂרִ֔ית
    לְ/צִדְקִיָּ֖הוּ מֶ֣לֶךְ יְהוּדָ֑ה הִ֧יא הַ/שָּׁנָ֛ה שְׁמֹנֶֽה עֶשְׂרֵ֥ה שָׁנָ֖ה
    לִ/נְבֽוּכַדְרֶאצַּֽר־־־׃
translation:
  text: The word that came to Jeremiah from the LORD in the tenth year of Zedekiah
    king of Judah, which was the eighteenth year of Nebuchadnezzar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Yahweh.' The main text follows the project’s default rendering
      of the divine name as 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַדָּבָר
  chosen: The word
  alternatives:
  - The message
  - The matter
  lexicon: HALOT
  rationale: In prophetic superscriptions, דָּבָר commonly introduces a divine communication.
    'The word' preserves the conventional prophetic formula without over-paraphrasing.
- source_word: אֲשֶׁר הָיָה אֶל
  chosen: that came to
  alternatives:
  - that was to
  - that happened to
  lexicon: HALOT
  rationale: The idiom 'the word that came to [prophet]' is standard in prophetic
    literature. 'Came to' is natural English and reflects the Hebrew construction
    without wooden literalism.
- source_word: מֵאֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: The prepositional phrase marks divine source. Per doctrine, יְהוָה is
    rendered 'the LORD' rather than transliterated.
- source_word: בשנת הָעֲשִׂרִית
  chosen: in the tenth year
  alternatives:
  - in year ten
  lexicon: HALOT
  rationale: Standard temporal dating formula; 'in the tenth year' is the natural
    English equivalent.
- source_word: לְצִדְקִיָּהוּ
  chosen: of Zedekiah
  lexicon: HALOT
  rationale: Personal name is transliterated by standard English convention, as required
    by the translation philosophy.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - the king of Judah
  lexicon: HALOT
  rationale: Appositional royal title is rendered straightforwardly. English omits
    the article naturally in this construction.
- source_word: הִיא
  chosen: which was
  alternatives:
  - that was
  - it was
  lexicon: HALOT
  rationale: The feminine pronoun refers back to 'year' and introduces an explanatory
    equivalence between regnal years. 'Which was' reads smoothly in English.
- source_word: הַשָּׁנָה שְׁמֹנֶה עֶשְׂרֵה שָׁנָה
  chosen: the eighteenth year
  alternatives:
  - year eighteen
  lexicon: HALOT
  rationale: The Hebrew repeats 'year' in a standard numerical dating expression.
    English idiom compresses this to 'the eighteenth year' without loss of meaning.
- source_word: לִנְבוּכַדְרֶאצַּר
  chosen: of Nebuchadnezzar
  alternatives:
  - for Nebuchadnezzar
  lexicon: HALOT
  rationale: In regnal-year formulas, the prefixed ל marks reference to the king's
    reign; English idiom is 'of Nebuchadnezzar.' The standard English form of the
    name is used.
