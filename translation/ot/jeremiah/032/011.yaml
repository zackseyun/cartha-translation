id: JER.32.11
reference: Jeremiah 32:11
source:
  edition: WLC
  text: וָ/אֶקַּ֖ח אֶת סֵ֣פֶר הַ/מִּקְנָ֑ה אֶת הֶֽ/חָת֛וּם הַ/מִּצְוָ֥ה וְ/הַ/חֻקִּ֖ים
    וְ/אֶת הַ/גָּלֽוּי־־־׃
translation:
  text: Then I took the deed of purchase, the sealed copy containing the terms and
    conditions, and the open copy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sealed document, the command and the statutes'; the Hebrew legal
      terms likely refer to the deed's stipulations and provisions.
    reason: lexical_alternative
  - marker: b
    text: That is, the unsealed or publicly accessible copy, in contrast to the sealed
      copy.
    reason: cultural_note
lexical_decisions:
- source_word: סֵפֶר הַמִּקְנָה
  chosen: the deed of purchase
  alternatives:
  - the purchase document
  - the bill of sale
  - the purchase deed
  lexicon: HALOT
  rationale: סֵפֶר is a written document/book, and מִקְנָה denotes a purchase/acquisition.
    In this legal-property context, 'deed of purchase' best conveys a formal transaction
    document in natural English without over-paraphrasing.
- source_word: הֶחָתוּם
  chosen: the sealed copy
  alternatives:
  - the sealed one
  - the sealed document
  lexicon: HALOT
  rationale: The passive participle from חתם means 'sealed.' Because it stands appositionally
    to the purchase document and is contrasted with הַגָּלוּי ('the open copy'), English
    benefits from making explicit that this refers to the sealed version/copy of the
    document.
- source_word: הַמִּצְוָה
  chosen: the terms
  alternatives:
  - the command
  - the stipulation
  - the instructions
  lexicon: HALOT
  rationale: Although מִצְוָה often means 'commandment,' in a legal-document setting
    it refers to the stipulation or specification attached to the deed. 'Terms' is
    idiomatic legal English and fits the transactional context.
- source_word: וְהַחֻקִּים
  chosen: and conditions
  alternatives:
  - and statutes
  - and ordinances
  - and provisions
  lexicon: HALOT
  rationale: חֻקִּים commonly means statutes/decrees, but here in conjunction with
    הַמִּצְוָה it refers to the legal provisions of the contract. Rendering the pair
    as 'terms and conditions' captures the documentary-legal force in contemporary
    readable English.
- source_word: הַגָּלוּי
  chosen: the open copy
  alternatives:
  - the unsealed copy
  - the open document
  lexicon: HALOT
  rationale: From גלה in the sense 'uncovered/open.' In contrast to 'the sealed copy,'
    this denotes the accessible, unsealed version of the deed. 'Open copy' is concise
    and preserves the contrast without importing extra detail.
- source_word: וָאֶקַּח
  chosen: Then I took
  alternatives:
  - And I took
  - So I took
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then I took' gives natural
    English narrative flow while preserving sequence.
