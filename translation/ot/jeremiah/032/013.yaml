id: JER.32.13
reference: Jeremiah 32:13
source:
  edition: WLC
  text: וָֽ/אֲצַוֶּה֙ אֶת בָּר֔וּךְ לְ/עֵינֵי/הֶ֖ם לֵ/אמֹֽר׃
translation:
  text: And I charged Baruch before their eyes, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "commanded" or "instructed" for "charged."
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: "before their eyes," that is, publicly and in the sight of
      the witnesses.'
    reason: cultural_note
lexical_decisions:
- source_word: וָאֲצַוֶּה
  chosen: And I charged
  alternatives:
  - And I commanded
  - And I instructed
  lexicon: HALOT
  rationale: The verb צוה commonly means 'command' or 'charge.' 'Charged' fits the
    formal legal-public setting of the property transaction in this context and preserves
    the force of a solemn instruction without sounding overly stiff. The prefixed
    waw with imperfect gives the past narrative sense, hence 'And I charged.'
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  lexicon: HALOT
  rationale: This marks Baruch as the direct object and is not represented by a separate
    English word.
- source_word: בָּרוּךְ
  chosen: Baruch
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: לְעֵינֵיהֶם
  chosen: before their eyes
  alternatives:
  - in their sight
  - before them
  lexicon: HALOT
  rationale: Literally 'to/in their eyes.' 'Before their eyes' preserves the vivid
    public-witness sense of the Hebrew idiom and matches the legal setting better
    than the flatter 'before them.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing direct speech. 'Saying'
    is natural and keeps close to the Hebrew discourse form.
