id: JER.32.9
reference: Jeremiah 32:9
source:
  edition: WLC
  text: וָֽ/אֶקְנֶה֙ אֶת הַ/שָּׂדֶ֔ה מֵ/אֵ֛ת חֲנַמְאֵ֥ל בֶּן דֹּדִ֖/י אֲשֶׁ֣ר בַּ/עֲנָת֑וֹת
    וָֽ/אֶשְׁקֲלָ/ה לּ/וֹ֙ אֶת הַ/כֶּ֔סֶף שִׁבְעָ֥ה שְׁקָלִ֖ים וַ/עֲשָׂרָ֥ה הַ/כָּֽסֶף־־־־׃
translation:
  text: 'So I bought the field at Anathoth from Hanamel the son of my uncle, and I
    weighed out the silver to him: seventeen shekels of silver.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'seven shekels and ten silver.' This is commonly understood
      as 'seventeen shekels of silver.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from Hanamel, my cousin, who was in Anathoth.' The Hebrew more literally
      says 'Hanamel the son of my uncle, who was in Anathoth.'
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֶקְנֶה
  chosen: So I bought
  alternatives:
  - And I bought
  - Then I bought
  lexicon: HALOT
  rationale: Qal wayyiqtol of קנה, narrating a past action. 'Bought' is the plain
    commercial sense. 'So' reflects the narrative continuation naturally in English
    without over-literal repetition of Hebrew waw-consecutive.
- source_word: הַשָּׂדֶה
  chosen: the field
  alternatives:
  - the land plot
  lexicon: HALOT
  rationale: שָׂדֶה commonly denotes a field or tract of land. 'Field' is the most
    natural and sufficiently precise rendering in this purchase context.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from the hand of
  lexicon: HALOT
  rationale: The preposition marks the seller/source of the purchase. English 'from'
    captures the transactional relationship cleanly.
- source_word: חֲנַמְאֵל
  chosen: Hanamel
  alternatives:
  - Hanameel
  rationale: Personal name transliterated by standard English convention. 'Hanamel'
    is a common modern transliteration; alternate spellings exist due to vowel representation.
- source_word: בֶּן דֹּדִי
  chosen: the son of my uncle
  alternatives:
  - my cousin
  - the son of my father's brother
  lexicon: HALOT
  rationale: 'The Hebrew is explicitly relational and formal: ''son of my uncle.''
    Although ''cousin'' conveys the practical relationship, the source wording is
    more specific and should be preserved in the main text.'
- source_word: אֲשֶׁר בַּעֲנָתוֹת
  chosen: at Anathoth
  alternatives:
  - who was in Anathoth
  - which was in Anathoth
  lexicon: HALOT
  rationale: The relative clause can be understood as locating Hanamel or the field;
    in context of a land purchase, the location of the field is most relevant. English
    'the field at Anathoth' expresses the likely sense smoothly while staying close
    to the Hebrew context.
- source_word: וָאֶשְׁקֲלָה לוֹ
  chosen: and I weighed out the silver to him
  alternatives:
  - and I paid him the money
  - and I weighed the money for him
  lexicon: HALOT
  rationale: שקל in commercial contexts refers to weighing payment, reflecting ancient
    practice. 'Weighed out' preserves the concrete action better than the more generic
    'paid.'
- source_word: הַכֶּסֶף ... הַכָּסֶף
  chosen: the silver ... of silver
  alternatives:
  - the money ... in silver
  lexicon: HALOT
  rationale: כֶּסֶף can mean silver or money. Because the amount is given in shekels
    and the weighing imagery is explicit, 'silver' best preserves the material medium
    of payment. The repetition in Hebrew is represented idiomatically in English as
    'seventeen shekels of silver.'
- source_word: שִׁבְעָה שְׁקָלִים וַעֲשָׂרָה
  chosen: seventeen shekels
  alternatives:
  - seven shekels and ten
  - seven shekels and ten pieces of silver
  lexicon: HALOT
  rationale: The Hebrew literally reads 'seven shekels and ten [of] silver,' an idiom
    commonly understood as seventeen shekels of silver. This avoids a wooden rendering
    that would confuse modern readers while preserving the stated amount.
- source_word: שְׁקָלִים
  chosen: shekels
  alternatives:
  - silver pieces
  lexicon: HALOT
  rationale: A shekel is the standard weight/currency term here. Retaining 'shekels'
    is more accurate than flattening to 'pieces of silver.'
