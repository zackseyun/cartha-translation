id: JER.32.10
reference: Jeremiah 32:10
source:
  edition: WLC
  text: וָ/אֶכְתֹּ֤ב בַּ/סֵּ֨פֶר֙ וָֽ/אֶחְתֹּ֔ם וָ/אָעֵ֖ד עֵדִ֑ים וָ/אֶשְׁקֹ֥ל הַ/כֶּ֖סֶף
    בְּ/מֹאזְנָֽיִם׃
translation:
  text: So I wrote it in the deed, sealed it, called witnesses, and weighed out the
    silver on the scales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the scroll' or 'in the document'; the Hebrew סֵפֶר is a general term
      for a written document, here likely the purchase deed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶכְתֹּב
  chosen: So I wrote
  alternatives:
  - And I wrote
  - Then I wrote
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cs of כתב, narrating Jeremiah's action in sequence. 'So
    I wrote' gives natural English narrative flow while preserving the first-person
    past action.
- source_word: בַּסֵּפֶר
  chosen: in the deed
  alternatives:
  - in the scroll
  - in the document
  - in the book
  lexicon: HALOT
  rationale: סֵפֶר broadly means a written document/book/scroll. In this purchase
    context, the referent is the written purchase instrument, so 'deed' best captures
    the legal-commercial sense in idiomatic English without over-literalizing as 'book'
    or 'scroll'.
- source_word: וָאֶחְתֹּם
  chosen: sealed it
  alternatives:
  - and sealed it
  lexicon: HALOT
  rationale: חתם in legal contexts refers to sealing a document. The object is implicit
    from the prior phrase and is naturally supplied in English as 'it'.
- source_word: וָאָעֵד עֵדִים
  chosen: called witnesses
  alternatives:
  - took witnesses
  - caused witnesses to testify
  - witnessed witnesses
  lexicon: HALOT
  rationale: The Hiphil of עוד with עֵדִים in this legal setting means to have witnesses
    attest or to call witnesses. 'Called witnesses' is concise, idiomatic, and fits
    the transaction context better than a more wooden rendering.
- source_word: וָאֶשְׁקֹל
  chosen: and weighed out
  alternatives:
  - and weighed
  lexicon: HALOT
  rationale: שקל here refers to weighing payment metal in a transaction. 'Weighed
    out' makes explicit the commercial act of measuring payment.
- source_word: הַכֶּסֶף
  chosen: the silver
  alternatives:
  - the money
  lexicon: HALOT
  rationale: כֶּסֶף literally means 'silver' and often by extension 'money.' Because
    ancient payment was commonly made by weighed silver, the literal 'silver' preserves
    the historical concreteness, especially with the following phrase about scales.
- source_word: בְּמֹאזְנָיִם
  chosen: on the scales
  alternatives:
  - in the balances
  - with scales
  lexicon: HALOT
  rationale: מֹאזְנַיִם denotes balances/scales used for weighing. 'On the scales'
    is natural modern English and matches the physical image of weighing silver.
