id: JER.32.30
reference: Jeremiah 32:30
source:
  edition: WLC
  text: כִּֽי הָי֨וּ בְנֵֽי יִשְׂרָאֵ֜ל וּ/בְנֵ֣י יְהוּדָ֗ה אַ֣ךְ עֹשִׂ֥ים הָ/רַ֛ע בְּ/עֵינַ֖/י מִ/נְּעֻרֹֽתֵי/הֶ֑ם כִּ֣י בְנֵֽי יִשְׂרָאֵ֗ל אַ֣ךְ מַכְעִסִ֥ים אֹתִ֛/י בְּ/מַעֲשֵׂ֥ה יְדֵי/הֶ֖ם נְאֻם יְהוָֽה־־־־׃
translation:
  text: For the sons of Israel and the sons of Judah have done only what was evil in my eyes from their youth, for the sons of Israel have only provoked me by the work of their hands, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites' / 'the people of Israel' and 'the people of Judah.' The Hebrew reads literally 'the sons of Israel' and 'the sons of Judah.'
    reason: lexical_alternative
  - marker: b
    text: '''By the work of their hands'' can also refer specifically to idols they made.'
    reason: cultural_note
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Kept relatively formal to preserve the covenantal/corporate designation and the parallel with 'sons of Judah.'
- source_word: וּבְנֵי יְהוּדָה
  chosen: and the sons of Judah
  alternatives:
  - and the people of Judah
  - and the Judeans
  lexicon: HALOT
  rationale: Matches the formal structure of the first phrase and preserves the distinction between the northern and southern covenant communities.
- source_word: אַךְ
  chosen: only
  alternatives:
  - surely
  - indeed
  - nothing but
  lexicon: HALOT
  rationale: 'Here אַךְ intensifies exclusivity: their conduct has been characterized only by evil/provocation. ''Only'' is concise and natural in English while preserving the force.'
- source_word: עֹשִׂים הָרַע בְּעֵינַי
  chosen: done only what was evil in my eyes
  alternatives:
  - been doing evil in my sight
  - done what is evil in my eyes
  lexicon: HALOT
  rationale: The idiom means acting in a way judged evil by the LORD. 'In my eyes' preserves the Hebrew metaphor more closely than 'in my sight,' while remaining understandable.
- source_word: מִנְּעֻרֹתֵיהֶם
  chosen: from their youth
  alternatives:
  - since their youth
  - from their earliest days
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the temporal phrase, indicating longstanding pattern from early national history.
- source_word: מַכְעִסִים אֹתִי
  chosen: been provoking me
  alternatives:
  - angered me
  - been making me angry
  lexicon: HALOT
  rationale: The Hiphil of כעס here denotes causing divine anger/provocation. 'Provoking me' better captures repeated rebellious offense than the more result-focused 'angered me.'
- source_word: בְּמַעֲשֵׂה יְדֵיהֶם
  chosen: by the work of their hands
  alternatives:
  - by what their hands have made
  - with the work of their hands
  lexicon: HALOT
  rationale: A common Hebrew expression that can refer broadly to human deeds and, in idolatry contexts, to manufactured idols. 'By the work of their hands' preserves the idiom while allowing the broader contextual resonance.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic modern English and preserves prophetic solemnity. 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
