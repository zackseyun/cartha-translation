theological_decisions:
- issue: Scope of 'sons of Israel' in the second clause
  chosen_reading: Retain 'the sons of Israel' literally, without expanding or harmonizing to include Judah explicitly.
  alternative_readings:
  - Render the second occurrence more broadly as 'they' or 'Israel and Judah' for smoother English
  rationale: The Hebrew repeats 'the sons of Israel' specifically in the second clause. Keeping the repetition preserves the rhetoric and avoids smoothing away a potentially meaningful narrowing or representative use.
  doctrine_reference: Preserve theological tension rather than resolve it.
