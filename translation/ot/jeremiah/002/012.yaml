id: JER.2.12
reference: Jeremiah 2:12
source:
  edition: WLC
  text: שֹׁ֥מּוּ שָׁמַ֖יִם עַל זֹ֑את וְ/שַׂעֲר֛וּ חָרְב֥וּ מְאֹ֖ד נְאֻם יְהוָֽה־־׃
translation:
  text: Be appalled at this, O heavens; shudder, be utterly desolate, declares the
    LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Be astonished at this, O heavens; tremble, be very devastated.' The
      Hebrew verbs are vivid and somewhat overlapping, expressing shock, horror, and
      desolation.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁמּוּ
  chosen: Be appalled
  alternatives:
  - Be astonished
  - Be horrified
  lexicon: HALOT
  rationale: Imperative plural from שמם in the sense of being appalled/astonished.
    'Be appalled' captures the prophetic summons to shocked horror more naturally
    than the more archaic 'be astonished.'
- source_word: שָׁמַיִם
  chosen: O heavens
  alternatives:
  - heavens
  - sky
  lexicon: HALOT
  rationale: Vocative address to the heavens as witnesses. 'O heavens' preserves the
    direct apostrophe and prophetic style better than a bare 'heavens.'
- source_word: עַל זֹאת
  chosen: at this
  alternatives:
  - because of this
  - over this
  lexicon: HALOT
  rationale: The preposition with demonstrative points to the shocking reality just
    described. 'At this' is idiomatic in English with verbs of astonishment and preserves
    the deictic force.
- source_word: וְשַׂעֲרוּ
  chosen: shudder
  alternatives:
  - be horribly afraid
  - bristle
  lexicon: HALOT
  rationale: Imperative plural from שער, likely conveying trembling or bristling in
    horror. 'Shudder' communicates visceral dread in contemporary English without
    over-paraphrase.
- source_word: חָרְבוּ מְאֹד
  chosen: be utterly desolate
  alternatives:
  - be completely devastated
  - be very dried up
  lexicon: HALOT
  rationale: Imperative plural plus intensifier. Though the root can denote being
    dried up or laid waste, in this poetic context following commands to the heavens
    it functions metaphorically for extreme devastation/desolation. 'Utterly desolate'
    preserves the severity and prophetic register.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is natural modern English
    and preserves the solemnity of the divine utterance. 'the LORD' follows the project's
    default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' preserving Jewish reverence tradition and the established convention reflected
    in the LXX/English tradition.
