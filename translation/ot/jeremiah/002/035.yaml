id: JER.2.35
reference: Jeremiah 2:35
source:
  edition: WLC
  text: וַ/תֹּֽאמְרִי֙ כִּ֣י נִקֵּ֔יתִי אַ֛ךְ שָׁ֥ב אַפּ֖/וֹ מִמֶּ֑/נִּי הִנְ/נִי֙
    נִשְׁפָּ֣ט אוֹתָ֔/ךְ עַל אָמְרֵ֖/ךְ לֹ֥א חָטָֽאתִי־׃
translation:
  text: Yet you said, “I am innocent; surely his anger has turned away from me.” Look,
    I am bringing judgment against you because you say, “I have not sinned.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I am entering into judgment with you”; the Hebrew uses courtroom language.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמְרִי
  chosen: Yet you said
  alternatives:
  - And you said
  - But you said
  lexicon: HALOT
  rationale: The waw-consecutive with 2fs continues the accusation while marking contrast
    with the preceding context; 'Yet' captures the adversative force in readable English
    addressed to feminine singular Zion/Judah.
- source_word: כִּי
  chosen: “
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: Introduces the content of the speech. In English this is best represented
    by direct quotation punctuation rather than an explicit 'that/for'.
- source_word: נִקֵּיתִי
  chosen: I am innocent
  alternatives:
  - I am clean
  - I am guiltless
  - I have been acquitted
  lexicon: HALOT
  rationale: From נקה in the Niphal, expressing being free from guilt. 'I am innocent'
    is the most natural English equivalent in this judicial-moral context.
- source_word: אַךְ
  chosen: surely
  alternatives:
  - indeed
  - only
  lexicon: HALOT
  rationale: Here it adds emphatic assurance to the false claim rather than exclusivity;
    'surely' fits the speaker's presumption.
- source_word: שָׁב אַפּוֹ מִמֶּנִּי
  chosen: his anger has turned away from me
  alternatives:
  - his anger has turned back from me
  - his wrath has turned from me
  lexicon: HALOT
  rationale: שׁוּב with אַף idiomatically describes anger turning away/relenting.
    'Anger' is more accessible than 'wrath' while preserving the sense.
- source_word: הִנְנִי
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle introducing divine response. 'Look' is readable modern
    English and preserves the force of sudden attention.
- source_word: נִשְׁפָּט אֹתָךְ
  chosen: I am bringing judgment against you
  alternatives:
  - I am entering into judgment with you
  - I am judging you
  lexicon: HALOT
  rationale: The Niphal participle of שׁפט with object can convey entering into legal
    judgment/proceeding. 'Bringing judgment against you' preserves the forensic sense
    better than the flatter 'judging you.'
- source_word: עַל אָמְרֵךְ
  chosen: because you say
  alternatives:
  - for your saying
  - on account of your saying
  lexicon: HALOT
  rationale: עַל plus infinitive construct/nominalized verbal form gives the ground
    for judgment. 'Because you say' is idiomatic and keeps the causal force.
- source_word: לֹא חָטָאתִי
  chosen: I have not sinned
  alternatives:
  - I did not sin
  lexicon: HALOT
  rationale: Perfect of חטא in quoted speech is well rendered as present perfect in
    English, matching the denial of culpability.
