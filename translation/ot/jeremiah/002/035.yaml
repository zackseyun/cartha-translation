theological_decisions:
- issue: Forensic nuance of divine judgment
  chosen_reading: I am bringing judgment against you
  alternative_readings:
  - I am judging you
  - I will plead with you
  rationale: The verse uses legal/judicial language, and the translation preserves
    that courtroom nuance without importing a narrower theological system. 'Plead
    with you' reflects some traditional renderings of שׁפט in covenant lawsuit contexts,
    but here 'bringing judgment against you' more directly communicates the legal
    action signaled by the Hebrew.
  doctrine_reference: Translation philosophy §1, §3, §6
