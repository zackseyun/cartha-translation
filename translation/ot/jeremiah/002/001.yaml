id: JER.2.1
reference: Jeremiah 2:1
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh''; traditionally rendered ''the LORD'' in English translations.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Now it happened
  - And it was
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as standard narrative/sequential
    introduction. In English, rendering it woodenly as 'and it happened' is possible
    but less natural; its force is adequately carried by 'And' plus the finite verb
    'came' in the clause.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: In the prophetic formula דְבַר יְהוָה, 'the word' is the established
    and semantically precise rendering, preserving both the formulaic character and
    the sense of divine speech/revelation. 'Message' is possible but less formally
    tied to the recurring prophetic expression.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD,' following Jewish reverence tradition and longstanding English Bible convention
    while signaling the covenant name.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person singular suffix straightforwardly indicates
    direction toward the prophet. 'To me' is accurate and natural modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - to say
  lexicon: HALOT
  rationale: This infinitive construct regularly introduces the content of speech.
    'Saying' preserves the Hebrew discourse marker and prepares for the quotation
    in the next verse without over-interpreting.
