id: JER.2.28
reference: Jeremiah 2:28
source:
  edition: WLC
  text: וְ/אַיֵּ֤ה אֱלֹהֶ֨י/ךָ֙ אֲשֶׁ֣ר עָשִׂ֣יתָ לָּ֔/ךְ יָק֕וּמוּ אִם יוֹשִׁיע֖וּ/ךָ
    בְּ/עֵ֣ת רָעָתֶ֑/ךָ כִּ֚י מִסְפַּ֣ר עָרֶ֔י/ךָ הָי֥וּ אֱלֹהֶ֖י/ךָ יְהוּדָֽה־׃ס
translation:
  text: But where are your gods that you made for yourself? Let them arise, if they
    can save you in the time of your trouble. For your gods, Judah, have become as
    many as your cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'For according to the number of your cities were your gods, Judah.'
    reason: lexical_alternative
  - marker: b
    text: '''Trouble'' here means calamity or disaster, not moral evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַיֵּה
  chosen: But where are
  alternatives:
  - And where are
  - Where then are
  lexicon: HALOT
  rationale: אַיֵּה is an interrogative of location, 'where?'; the prefixed וְ is
    rendered adversatively/discoursally as 'But' to fit the prophetic rebuke in context.
- source_word: אֱלֹהֶיךָ
  chosen: your gods
  alternatives:
  - your god(s)
  lexicon: HALOT
  rationale: Plural construct with 2ms suffix; in context it refers to Judah's idols,
    so the plural 'gods' should be explicit.
- source_word: אֲשֶׁר עָשִׂיתָ לָּךְ
  chosen: that you made for yourself
  alternatives:
  - which you made for yourself
  - that you made for your own use
  lexicon: HALOT
  rationale: The clause stresses human manufacture of the idols and the reflexive
    benefit/possession nuance of לָּךְ; 'for yourself' preserves that force naturally.
- source_word: יָקוּמוּ
  chosen: Let them arise
  alternatives:
  - Let them stand up
  - May they rise
  lexicon: HALOT
  rationale: 'Jussive/imperfect plural used rhetorically: a challenge for the idols
    to act. ''Arise'' preserves the vivid summons without overinterpreting.'
- source_word: אִם יוֹשִׁיעוּךָ
  chosen: if they can save you
  alternatives:
  - if they will save you
  - whether they can save you
  lexicon: HALOT
  rationale: אִם after the jussive introduces a testing/challenge sense. English idiom
    is best captured by 'if they can save you,' expressing the rhetorical doubt inherent
    in the line.
- source_word: בְּעֵת רָעָתֶךָ
  chosen: in the time of your trouble
  alternatives:
  - at the time of your calamity
  - in the time of your disaster
  - when evil comes upon you
  lexicon: HALOT
  rationale: רָעָה here denotes adversity/calamity rather than moral evil. 'Trouble'
    is readable modern English; 'time of your trouble' preserves the temporal phrase.
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason/explanation for the challenge; 'For' fits the prophetic
    argument.
- source_word: מִסְפַּר עָרֶיךָ
  chosen: as many as your cities
  alternatives:
  - according to the number of your cities
  - equal to the number of your cities
  lexicon: HALOT
  rationale: The idiom means correspondence in number. 'As many as your cities' is
    concise, natural, and faithful.
- source_word: הָיוּ אֱלֹהֶיךָ
  chosen: have become your gods
  alternatives:
  - were your gods
  - are your gods
  lexicon: HALOT
  rationale: The perfect can be rendered as a present-result state in English. 'Have
    become your gods' reflects the developed condition of rampant idolatry. Word order
    is adjusted in the final sentence for natural English while preserving sense.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: 'Proper name transliterated per project philosophy. It functions as direct
    address in apposition/vocative: ''Judah.'''
