theological_decisions:
- issue: Referent of 'your gods'
  chosen_reading: The phrase refers to idols/false gods made by Judah, not to the
    LORD.
  rationale: The immediate modifier 'that you made for yourself' excludes the LORD
    and underscores the polemic against idolatry. The translation makes the plural
    explicit and retains the sarcasm of the challenge.
