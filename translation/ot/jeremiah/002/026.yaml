theological_decisions:
- issue: Scope of culpability in the appositional list
  chosen_reading: The verse indicts the whole covenant community, especially its leadership
    strata, without narrowing blame to one class alone.
  alternative_readings:
  - The verse primarily targets leaders only
  rationale: The subject 'the house of Israel' is followed by an emphatic pronoun
    and a list of kings, officials, priests, and prophets. The translation preserves
    both the collective indictment and the explicit naming of leadership groups.
