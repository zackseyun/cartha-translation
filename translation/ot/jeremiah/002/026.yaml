id: JER.2.26
reference: Jeremiah 2:26
source:
  edition: WLC
  text: כְּ/בֹ֤שֶׁת גַּנָּב֙ כִּ֣י יִמָּצֵ֔א כֵּ֥ן הֹבִ֖ישׁוּ בֵּ֣ית יִשְׂרָאֵ֑ל הֵ֤מָּה
    מַלְכֵי/הֶם֙ שָֽׂרֵי/הֶ֔ם וְ/כֹהֲנֵי/הֶ֖ם וּ/נְבִיאֵי/הֶֽם׃
translation:
  text: As a thief is ashamed when he is found out, so the house of Israel has been
    put to shame—they, their kings, their officials, their priests, and their prophets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when he is discovered.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their princes' for 'their officials.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּבֹשֶׁת
  chosen: As ... is ashamed
  alternatives:
  - Like the shame of
  - As the shame of
  lexicon: HALOT
  rationale: The prefixed כ plus the noun בֹּשֶׁת introduces a comparison. Rendering
    it idiomatically with a verbal clause in English ('As ... is ashamed') communicates
    the simile naturally while preserving the shame motif.
- source_word: גַּנָּב
  chosen: a thief
  alternatives:
  - the thief
  lexicon: HALOT
  rationale: 'Indefinite singular best fits the generic comparison: any thief caught
    in the act becomes a model for Israel''s shame.'
- source_word: כִּי יִמָּצֵא
  chosen: when he is found out
  alternatives:
  - when he is found
  - if he is found
  lexicon: HALOT
  rationale: The Niphal of מצא here means 'be found/discovered.' 'Found out' captures
    the sense of exposure in context better than the flatter 'found.' 'When' suits
    the comparative statement better than a more conditional 'if.'
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Standard correlative with the opening comparison; 'so' is concise and
    natural.
- source_word: הֹבִישׁוּ
  chosen: has been put to shame
  alternatives:
  - has been ashamed
  - was put to shame
  - has been disgraced
  lexicon: HALOT
  rationale: 'The form is best taken as causative/passive-result in sense from בוש
    in this context: Israel stands exposed and shamed. ''Put to shame'' preserves
    the idiom and avoids reducing it to mere inward embarrassment. Present perfect
    English reflects the prophetic declaration of a realized state.'
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: Retains the covenantal collective expression rather than flattening it
    to the simple proper name.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - namely
  - that is
  lexicon: HALOT
  rationale: The pronoun is resumptive/emphatic, introducing the representative groups
    included in the shame. 'They' preserves the Hebrew emphasis before the appositional
    list.
- source_word: מַלְכֵיהֶם
  chosen: their kings
  lexicon: HALOT
  rationale: Straightforward plural construct with pronominal suffix.
- source_word: שָׂרֵיהֶם
  chosen: their officials
  alternatives:
  - their princes
  - their rulers
  lexicon: HALOT
  rationale: שׂרים can denote princes, officials, or rulers. 'Officials' is readable
    modern English and fits the civic leadership class without implying hereditary
    nobility only.
- source_word: כֹהֲנֵיהֶם
  chosen: their priests
  lexicon: HALOT
  rationale: Standard rendering for כהנים.
- source_word: נְבִיאֵיהֶם
  chosen: their prophets
  lexicon: HALOT
  rationale: Standard rendering for נביאים.
