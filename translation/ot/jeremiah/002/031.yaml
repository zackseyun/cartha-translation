id: JER.2.31
reference: Jeremiah 2:31
source:
  edition: WLC
  text: הַ/דּ֗וֹר אַתֶּם֙ רְא֣וּ דְבַר יְהוָ֔ה הֲ/מִדְבָּ֤ר הָיִ֨יתִי֙ לְ/יִשְׂרָאֵ֔ל
    אִ֛ם אֶ֥רֶץ מַאְפֵּ֖לְיָ֑ה מַדּ֜וּעַ אָמְר֤וּ עַמִּ/י֙ רַ֔דְנוּ לֽוֹא נָב֥וֹא
    ע֖וֹד אֵלֶֽי/ךָ־־׃
translation:
  text: 'O generation, you yourselves, see the word of the LORD: Have I been a wilderness
    to Israel, or a land of deep darkness? Why has my people said, ‘We are free to
    roam; we will come to you no more’?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'We roam,' 'We rule,' or 'We have broken loose.' The Hebrew verb is
      difficult, but the sense in context is a claim of independence from the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדּוֹר
  chosen: O generation
  alternatives:
  - You generation
  - This generation
  lexicon: HALOT
  rationale: Vocative use fits the direct address. 'O generation' preserves the prophetic
    summons more naturally than a wooden 'the generation.'
- source_word: אַתֶּם
  chosen: you yourselves
  alternatives:
  - you
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis; 'you yourselves' reflects that
    marked address.
- source_word: רְאוּ
  chosen: see
  alternatives:
  - look
  - consider
  lexicon: HALOT
  rationale: Imperative of ראה can mean literal seeing or attentive consideration.
    'See' keeps the Hebrew image and works idiomatically with 'the word of the LORD.'
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Word' preserves the covenantal-prophetic
    register. 'the LORD' follows the doctrinal default for YHWH.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies 'the LORD' as the default rendering for YHWH.
- source_word: הֲמִדְבָּר הָיִיתִי לְיִשְׂרָאֵל
  chosen: Have I been a wilderness to Israel
  alternatives:
  - Was I a desert to Israel
  lexicon: HALOT
  rationale: Retains the metaphor of an unproductive, inhospitable place. 'Wilderness'
    is more biblically resonant and broader than 'desert.'
- source_word: אִם
  chosen: or
  alternatives:
  - if
  - or rather
  lexicon: HALOT
  rationale: 'In this interrogative parallelism, אִם introduces the second alternative:
    ''or a land...?'' rather than a conditional ''if.'''
- source_word: אֶרֶץ מַאְפֵּלְיָה
  chosen: a land of deep darkness
  alternatives:
  - a land of gloom
  - a dark land
  lexicon: HALOT
  rationale: מַאְפֵּלְיָה denotes darkness/gloom. 'Deep darkness' preserves the intensity
    better than a flatter 'dark land.'
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct and natural rendering of the interrogative.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward covenantal designation; singular collective in Hebrew
    is best rendered as English collective singular.
- source_word: רַדְנוּ
  chosen: We are free to roam
  alternatives:
  - We roam
  - We rule
  - We have broken loose
  lexicon: HALOT
  rationale: The form is difficult and commonly understood from רוד/רדה in the sense
    of roaming freely or breaking loose from restraint. In context, the people's claim
    is one of independence from the LORD, so 'We are free to roam' captures the sense
    without overcommitting to a more obscure English idiom.
- source_word: לֹא נָבוֹא עוֹד אֵלֶיךָ
  chosen: we will come to you no more
  alternatives:
  - we will not come to you again
  lexicon: HALOT
  rationale: Future negation with עוֹד expresses cessation of return/approach. 'No
    more' is idiomatic and forceful.
