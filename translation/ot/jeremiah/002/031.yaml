theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH and standard English Bible
    convention while preserving covenantal reference.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of the difficult verb רַדְנוּ
  chosen_reading: We are free to roam
  alternative_readings:
  - We roam
  - We rule
  - We have broken loose
  rationale: The verse contrasts God's faithful care with Israel's declaration of
    autonomy. The chosen rendering preserves that theological force of rebellious
    independence without importing a narrower doctrinal claim.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
