id: JER.2.32
reference: Jeremiah 2:32
source:
  edition: WLC
  text: הֲ/תִשְׁכַּ֤ח בְּתוּלָה֙ עֶדְיָ֔/הּ כַּלָּ֖ה קִשֻּׁרֶ֑י/הָ וְ/עַמִּ֣/י שְׁכֵח֔וּ/נִי
    יָמִ֖ים אֵ֥ין מִסְפָּֽר׃
translation:
  text: Does a virgin forget her jewelry, or a bride her ornaments? Yet my people
    have forgotten me for days without number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her adornment.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term may refer more specifically to bridal bands, sashes, or
      tied ornaments.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/תִשְׁכַּח
  chosen: Does ... forget
  alternatives:
  - Would ... forget
  lexicon: HALOT
  rationale: Rendered as an interrogative with present English sense to match the
    rhetorical question introduced by הֲ. English present works naturally for a general
    truth question.
- source_word: בְּתוּלָה
  chosen: a virgin
  alternatives:
  - a young woman
  lexicon: HALOT
  rationale: The noun commonly denotes a virgin/maiden. 'Virgin' best preserves the
    lexical force here and the contrast with 'bride' in the parallel line.
- source_word: עֶדְיָהּ
  chosen: her jewelry
  alternatives:
  - her ornaments
  - her adornment
  lexicon: HALOT
  rationale: Refers to personal adornment or finery. 'Jewelry' is idiomatic modern
    English and fits the marriage imagery; a broader alternative is preserved in the
    lexical alternatives.
- source_word: כַּלָּה
  chosen: a bride
  alternatives:
  - the bride
  lexicon: HALOT
  rationale: The noun denotes a bride. The indefinite article works naturally in English
    in this generic rhetorical comparison.
- source_word: קִשֻּׁרֶיהָ
  chosen: her ornaments
  alternatives:
  - her sashes
  - her bridal bands
  - her attire
  lexicon: HALOT
  rationale: The term likely refers to tied ornaments or bridal adornments. Because
    the exact item is somewhat uncertain, 'ornaments' preserves the sense of decorative
    bridal accessories without over-specifying.
- source_word: וְעַמִּי
  chosen: Yet my people
  alternatives:
  - But my people
  lexicon: HALOT
  rationale: The conjunction marks contrast between the expected behavior of a bride
    and Israel's actual behavior. 'Yet' brings out the rhetorical force slightly better
    in English.
- source_word: שְׁכֵחוּנִי
  chosen: have forgotten me
  alternatives:
  - forgot me
  lexicon: HALOT
  rationale: Perfect verb rendered with English present perfect to express a settled
    state resulting from repeated covenantal neglect, fitting the following duration
    phrase.
- source_word: יָמִים אֵין מִסְפָּר
  chosen: for days without number
  alternatives:
  - for countless days
  - for days beyond counting
  lexicon: HALOT
  rationale: This idiom means an innumerable duration. 'Days without number' is both
    natural and close to the Hebrew expression.
