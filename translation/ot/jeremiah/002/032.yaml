theological_decisions:
- issue: Covenantal force of 'my people' forgetting God
  chosen_reading: Retained the relational covenant language without expanding it into
    explicit theological commentary.
  alternative_readings:
  - Paraphrasing as 'my people have abandoned me'
  rationale: The verse states forgetfulness, not explicitly abandonment, though the
    context implies covenant unfaithfulness. The translation preserves the text's
    own metaphor and accusation without importing stronger wording.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve theological tension rather than resolve it.'
