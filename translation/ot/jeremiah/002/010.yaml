id: JER.2.10
reference: Jeremiah 2:10
source:
  edition: WLC
  text: כִּ֣י עִבְר֞וּ אִיֵּ֤י כִתִּיִּים֙ וּ/רְא֔וּ וְ/קֵדָ֛ר שִׁלְח֥וּ וְ/הִֽתְבּוֹנְנ֖וּ
    מְאֹ֑ד וּ/רְא֕וּ הֵ֥ן הָיְתָ֖ה כָּ/זֹֽאת׃
translation:
  text: For cross over to the coasts of Kittim and see; send to Kedar and consider
    carefully; see whether there has ever been anything like this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the islands/coastlands of Kittim.' 'Kittim' likely refers to Cyprus
      or, more broadly, western maritime lands.
    reason: lexical_alternative
  - marker: b
    text: Kedar refers to Arabian tribes or territory to the east/southeast, forming
      a west-to-east comparison with Kittim.
    reason: cultural_note
lexical_decisions:
- source_word: עִבְרוּ
  chosen: cross over
  alternatives:
  - pass over
  - go over
  lexicon: HALOT
  rationale: Qal imperative plural of עבר, here calling the audience to traverse or
    look abroad geographically. 'Cross over' preserves the concrete movement better
    than the more generic 'go.'
- source_word: אִיֵּי כִתִּיִּים
  chosen: the coasts of Kittim
  alternatives:
  - the islands of Cyprus
  - the coastlands of the Kittim
  lexicon: HALOT
  rationale: אִיִּים can denote islands/coastlands; in prophetic usage it often refers
    broadly to distant maritime regions. 'Kittim' is transliterated as a place/people
    name per philosophy, while 'coasts' communicates the geographic sense naturally
    in English.
- source_word: וּרְאוּ
  chosen: and see
  alternatives:
  - and look
  lexicon: HALOT
  rationale: ראֹה is repeated in the verse as an exhortation to observe. 'See' is
    concise and preserves the rhetorical force of direct inspection.
- source_word: וְקֵדָר שִׁלְחוּ
  chosen: send to Kedar
  alternatives:
  - send to Kedar's people
  - send word to Kedar
  lexicon: HALOT
  rationale: Kedar is a proper name for the Arabian tribal region/people and is best
    transliterated. The verb 'send' likely implies dispatching messengers or inquiry
    there; English can leave the object implicit as Hebrew does.
- source_word: וְהִתְבּוֹנְנוּ מְאֹד
  chosen: and consider carefully
  alternatives:
  - and examine diligently
  - and pay close attention
  lexicon: HALOT
  rationale: Hitbonen conveys reflective observation or careful consideration. מְאֹד
    intensifies the command. 'Consider carefully' captures both thoughtfulness and
    emphasis in readable English.
- source_word: הֵן הָיְתָה כָּזֹאת
  chosen: whether there has ever been anything like this
  alternatives:
  - if such a thing has happened
  - whether this has happened
  lexicon: HALOT
  rationale: The clause is idiomatic and rhetorical, asking whether such a thing has
    occurred. Expanding slightly to 'there has ever been anything like this' conveys
    the force of the astonished comparison in natural English without over-paraphrasing.
