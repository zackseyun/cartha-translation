theological_decisions:
- issue: Rendering of משבותיך in covenant context
  chosen_reading: your apostasies
  alternative_readings:
  - your backslidings
  - your turnings away
  rationale: The verse indicts covenant unfaithfulness toward the LORD, not merely
    moral inconsistency. 'Apostasies' best preserves the theological force of defection
    from God while remaining understandable.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
- issue: Rendering of וְלֹא פַחְדָּתִי אֵלַיִךְ
  chosen_reading: and that my fear is not in you
  alternative_readings:
  - and there is no fear of me in you
  - and you do not fear me
  rationale: The Hebrew uses the noun 'my fear' rather than a verbal clause. The chosen
    rendering keeps the source structure and theological emphasis on the absence of
    reverent fear of God, while a more idiomatic alternative is footnoted.
  doctrine_reference: Original-language primacy over translation tradition.
