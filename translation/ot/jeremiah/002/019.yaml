id: JER.2.19
reference: Jeremiah 2:19
source:
  edition: WLC
  text: תְּיַסְּרֵ֣/ךְ רָעָתֵ֗/ךְ וּ/מְשֻֽׁבוֹתַ֨יִ/ךְ֙ תּוֹכִחֻ֔/ךְ וּ/דְעִ֤י וּ/רְאִי֙
    כִּי רַ֣ע וָ/מָ֔ר עָזְבֵ֖/ךְ אֶת יְהוָ֣ה אֱלֹהָ֑יִ/ךְ וְ/לֹ֤א פַחְדָּתִ/י֙ אֵלַ֔יִ/ךְ
    נְאֻם אֲדֹנָ֥/י יְהוִ֖ה צְבָאֽוֹת־־־׃
translation:
  text: Your evil will discipline you, and your apostasies will reprove you. So know
    and see that it is evil and bitter for you to forsake the LORD your God, and that
    my fear is not in you, declares the Lord GOD of hosts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'your backslidings.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'and there is no fear of me in you.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: cultural_note
lexical_decisions:
- source_word: תְּיַסְּרֵךְ
  chosen: will discipline you
  alternatives:
  - will chasten you
  - will correct you
  - will punish you
  lexicon: HALOT
  rationale: Piel of יסר commonly carries the sense of disciplining/correcting, not
    merely punishing. 'Discipline' preserves both corrective and punitive force in
    readable modern English.
- source_word: רָעָתֵךְ
  chosen: your evil
  alternatives:
  - your wickedness
  - your calamity
  lexicon: HALOT
  rationale: 'Given the parallel with ''forsake the LORD your God,'' the moral sense
    fits best here: Judah''s own evil conduct becomes the instrument of discipline.
    ''Calamity'' would shift the cause from moral evil to resulting disaster.'
- source_word: מְשֻׁבוֹתַיִךְ
  chosen: your apostasies
  alternatives:
  - your backslidings
  - your turnings away
  lexicon: HALOT
  rationale: From משובה, denoting turning away/faithlessness from the LORD. 'Apostasies'
    makes the covenantal-religious dimension explicit and suits the plural form. 'Backslidings'
    is traditional but somewhat archaic.
- source_word: תּוֹכִחֻךְ
  chosen: will reprove you
  alternatives:
  - will rebuke you
  - will convict you
  - will correct you
  lexicon: HALOT
  rationale: Hiphil of יכח often means to prove, reprove, or expose guilt. 'Reprove'
    fits the context of Judah's own apostasies serving as evidence against her.
- source_word: וּדְעִי וּרְאִי
  chosen: So know and see
  alternatives:
  - Know and see
  - Understand and see
  lexicon: HALOT
  rationale: Two imperatives call for recognition by both understanding and perception.
    'So' gives natural English connection to the preceding clause without over-paraphrasing.
- source_word: רַע וָמָר
  chosen: evil and bitter
  alternatives:
  - bad and bitter
  - wicked and bitter
  lexicon: HALOT
  rationale: The pair describes the character and effect of forsaking the LORD. 'Evil'
    preserves the moral weight of רע; 'bitter' captures the painful consequence.
- source_word: עָזְבֵךְ אֶת־יְהוָה אֱלֹהָיִךְ
  chosen: for you to forsake the LORD your God
  alternatives:
  - your forsaking the LORD your God
  - that you have forsaken the LORD your God
  lexicon: HALOT
  rationale: The infinitive construct with suffix is rendered idiomatically in English
    as 'for you to forsake.' This keeps the clause tied to 'it is evil and bitter'
    while remaining natural.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the project's contested-terms policy for the divine name.
- source_word: וְלֹא פַחְדָּתִי אֵלַיִךְ
  chosen: and that my fear is not in you
  alternatives:
  - and that there is no fear of me in you
  - and you do not fear me
  lexicon: HALOT
  rationale: The Hebrew is literally 'my fear is not to/in you.' Rendering it as 'my
    fear is not in you' preserves the nominal expression and the idea of reverence
    toward God being absent. A smoother alternative is preserved in a footnote.
- source_word: נְאֻם אֲדֹנָי יְהוִה צְבָאוֹת
  chosen: declares the Lord GOD of hosts
  alternatives:
  - oracle of the Lord GOD of armies
  - declares the Lord Yahweh of hosts
  lexicon: HALOT
  rationale: '''Declares'' is the standard idiomatic rendering of נְאֻם. ''Lord GOD''
    reflects אֲדֹנָי יְהוִה, and ''of hosts'' is retained as a familiar title for
    צְבָאוֹת without flattening its martial/cosmic sense.'
