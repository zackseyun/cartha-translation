id: JER.2.33
reference: Jeremiah 2:33
source:
  edition: WLC
  text: מַה תֵּיטִ֥בִי דַּרְכֵּ֖/ךְ לְ/בַקֵּ֣שׁ אַהֲבָ֑ה לָ/כֵן֙ גַּ֣ם אֶת הָ/רָע֔וֹת
    למדתי אֶת דְּרָכָֽיִ/ךְ־־־׃
translation:
  text: How well you make your way to seek love! Therefore even evil women you have
    taught your ways.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'even evil things you have taught your ways,' taking the feminine plural
      more abstractly rather than as 'evil women.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: How well
  alternatives:
  - How skillfully
  - How you
  lexicon: HALOT
  rationale: 'In this exclamatory/interrogative construction with the following verb,
    מַה introduces a rhetorical statement of degree: ''how well/how skillfully.''
    ''How well'' is idiomatic and preserves the ironic force.'
- source_word: תֵּיטִבִי
  chosen: you make ... well
  alternatives:
  - you do well
  - you improve
  - you make good
  lexicon: HALOT
  rationale: Hiphil of יטב can mean 'make good/improve' or idiomatically 'do well.'
    Here with 'your way' it conveys making one's course attractive or effective. Rendering
    with 'make your way' keeps the causative nuance tied to the object.
- source_word: דַּרְכֵּךְ
  chosen: your way
  alternatives:
  - your path
  - your conduct
  - your course
  lexicon: HALOT
  rationale: Though literally 'your way/path,' in prophetic usage it often carries
    the sense of conduct or course of life. 'Your way' preserves the metaphor while
    remaining natural English.
- source_word: לְבַקֵּשׁ אַהֲבָה
  chosen: to seek love
  alternatives:
  - to seek lovers
  - to seek affection
  lexicon: HALOT
  rationale: The Hebrew noun is singular 'love,' not the more explicit 'lovers.' In
    context of Judah's adulterous pursuit, 'seek love' preserves the metaphor and
    the lexical form better than expanding to 'seek lovers.'
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - Thus
  lexicon: HALOT
  rationale: Marks an inferential/resultative conclusion from the first clause. 'Therefore'
    best preserves the rhetorical linkage.
- source_word: גַּם
  chosen: even
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: 'Here גַּם intensifies the statement: not merely ''also'' but ''even,''
    heightening the accusation.'
- source_word: הָרָעוֹת
  chosen: evil women
  alternatives:
  - wicked women
  - evil things
  lexicon: HALOT
  rationale: The feminine plural with article most naturally refers to women here,
    especially in the surrounding sexualized metaphor. Some take it abstractly as
    'evil things/ways,' but the immediate context favors personal feminine referents.
    'Evil women' preserves the feminine plural and the polemical force.
- source_word: למדתי
  chosen: you have taught
  alternatives:
  - you taught
  - you instructed
  lexicon: HALOT
  rationale: Despite the consonantal form that could suggest first person singular
    in isolation, the contextual and traditional reading here is second feminine singular
    ('you have taught'), matching the direct address throughout the verse and yielding
    coherent sense. English present perfect reflects the resulting state implied by
    the accusation.
- source_word: דְּרָכָיִךְ
  chosen: your ways
  alternatives:
  - your conduct
  - your practices
  lexicon: HALOT
  rationale: Plural 'ways' is retained here because the final clause speaks of patterns/practices
    taught to others. This also preserves the lexical repetition with the earlier
    singular/plural way-language.
