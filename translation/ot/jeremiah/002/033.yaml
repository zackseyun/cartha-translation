theological_decisions:
- issue: Interpretation of the feminine plural הָרָעוֹת in a metaphor of illicit love
  chosen_reading: 'personal referent: ''evil women'''
  alternative_readings:
  - 'abstract/objective referent: ''evil things'' or ''wickednesses'''
  rationale: 'The broader context depicts Judah as an adulterous woman seeking illicit
    love. Reading the feminine plural as ''evil women'' fits the social and sexual
    imagery: Judah has become so practiced in corruption that she instructs even wicked
    women in her ways. The abstract reading is possible lexically, so it is preserved
    in a footnote.'
