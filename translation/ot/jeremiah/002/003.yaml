id: JER.2.3
reference: Jeremiah 2:3
source:
  edition: WLC
  text: קֹ֤דֶשׁ יִשְׂרָאֵל֙ לַ/יהוָ֔ה רֵאשִׁ֖ית תְּבוּאָתֹ֑/ה כָּל אֹכְלָ֣י/ו יֶאְשָׁ֔מוּ רָעָ֛ה תָּבֹ֥א אֲלֵי/הֶ֖ם נְאֻם יְהוָֽה־־׃פ
translation:
  text: Israel was holy to Yahweh, the firstfruits of his harvest; all who devoured him became guilty; disaster came upon them, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the firstfruits of his produce.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all who ate/devoured him'; the image is of nations consuming or plundering Israel.
    reason: cultural_note
  - marker: c
    text: Or 'incurred guilt' or 'were held guilty.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹדֶשׁ
  chosen: holy
  alternatives:
  - holiness
  - a holy thing
  - set apart
  lexicon: HALOT
  rationale: 'Predicate use with Israel: not merely abstract ''holiness'' but describing Israel as consecrated/set apart to the LORD. ''Holy'' is idiomatic and preserves covenantal-sacral force.'
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - belonging to the LORD
  - for the LORD
  lexicon: HALOT
  rationale: The lamed marks relation/dedication. 'To the LORD' keeps the concise covenantal sense. Per doctrine, יהוה is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: רֵאשִׁית תְּבוּאָתוֹ
  chosen: the firstfruits of his harvest
  alternatives:
  - the first of his produce
  - the firstfruits of his produce
  lexicon: HALOT
  rationale: This phrase evokes consecrated first produce offered to God. 'Firstfruits' preserves the cultic/theological resonance better than the flatter 'first of his produce.' 'Harvest' is natural English for תְּבוּאָה here, though 'produce' is a viable alternative.
- source_word: אֹכְלָיו
  chosen: who devoured him
  alternatives:
  - who ate him
  - his eaters
  lexicon: HALOT
  rationale: The participle is metaphorical for hostile nations consuming/plundering Israel. 'Devoured' communicates the figurative violence better than a wooden 'ate.' Singular 'him' follows the 3ms suffix referring to Israel as a corporate singular.
- source_word: יֶאְשָׁמוּ
  chosen: became guilty
  alternatives:
  - were held guilty
  - incurred guilt
  - were found guilty
  lexicon: HALOT
  rationale: The verb denotes becoming guilty/incurring liability. 'Became guilty' fits the sequence with the following judgment clause and avoids over-specifying a courtroom setting.
- source_word: רָעָה תָּבֹא אֲלֵיהֶם
  chosen: disaster came upon them
  alternatives:
  - evil came upon them
  - harm came upon them
  - calamity came upon them
  lexicon: HALOT
  rationale: רָעָה in judgment contexts commonly means calamity/disaster rather than moral evil. 'Disaster came upon them' is clear modern English and preserves the punitive sense.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic, weighty, and readable in modern English.
