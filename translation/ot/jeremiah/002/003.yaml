theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Cultic metaphor for Israel as consecrated produce
  chosen_reading: the firstfruits of his harvest
  alternative_readings:
  - the first of his produce
  - the firstfruits of his produce
  rationale: The verse portrays Israel as specially consecrated to God, like firstfruits belonging to him. 'Firstfruits' preserves the theological imagery without importing later doctrinal claims.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
