theological_decisions:
- issue: Sense of כַּרְמֶל
  chosen_reading: 'common noun: ''fertile land'''
  alternative_readings:
  - 'proper noun: ''Carmel'''
  rationale: In this context the phrase describes the quality of the land into which
    God brought Israel, parallel to eating its fruit and goodness. The common noun
    sense fits the immediate syntax and imagery better than a geographic proper name.
- issue: Force of טוּב in relation to the land
  chosen_reading: retain broad term 'goodness' in the main text
  alternative_readings:
  - '''bounty'''
  - '''good things'''
  rationale: The Hebrew is broader than agricultural produce alone. Keeping 'goodness'
    preserves the semantic range and theological sense of the land as a beneficent
    gift from God, while alternatives are noted lexically.
