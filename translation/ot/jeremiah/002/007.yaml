id: JER.2.7
reference: Jeremiah 2:7
source:
  edition: WLC
  text: וָ/אָבִ֤יא אֶתְ/כֶם֙ אֶל אֶ֣רֶץ הַ/כַּרְמֶ֔ל לֶ/אֱכֹ֥ל פִּרְיָ֖/הּ וְ/טוּבָ֑/הּ
    וַ/תָּבֹ֨אוּ֙ וַ/תְּטַמְּא֣וּ אֶת אַרְצִ֔/י וְ/נַחֲלָתִ֥/י שַׂמְתֶּ֖ם לְ/תוֹעֵבָֽה־־׃
translation:
  text: I brought you into a fertile land to eat its fruit and its goodness, but when
    you came in, you defiled my land and made my inheritance an abomination.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a land of Carmel,' that is, a richly cultivated or fruitful land.
    reason: lexical_alternative
  - marker: b
    text: '''Its goodness'' may also be rendered ''its bounty'' or ''its good things.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָבִיא
  chosen: I brought
  alternatives:
  - I led
  - I caused to come
  lexicon: HALOT
  rationale: Hiphil of בוא commonly means 'bring' or 'cause to enter.' 'I brought'
    is natural English and preserves divine agency without unnecessary expansion.
- source_word: אֶרֶץ הַכַּרְמֶל
  chosen: a fertile land
  alternatives:
  - the garden land
  - a land of orchard/garden land
  - the Carmel land
  lexicon: HALOT
  rationale: כַּרְמֶל denotes fruitful, cultivated land rather than the proper name
    Carmel in this context. 'A fertile land' best conveys the common noun sense in
    readable English.
- source_word: לֶאֱכֹל פִּרְיָהּ וְטוּבָהּ
  chosen: to eat its fruit and its goodness
  alternatives:
  - to eat its fruit and its bounty
  - to enjoy its fruit and its good things
  lexicon: HALOT
  rationale: The infinitive phrase expresses purpose. פְּרִי is literally 'fruit';
    טוּב can denote goodness, bounty, or produce. 'Its fruit and its goodness' stays
    close to the Hebrew while remaining intelligible; the broader sense of bounty
    is preserved as an alternative.
- source_word: וַתָּבֹאוּ
  chosen: when you came in
  alternatives:
  - but you came
  - and you entered
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'When you came in' makes
    the temporal force explicit in smooth English and sets up the contrast with God's
    beneficent action.
- source_word: וַתְּטַמְּאוּ
  chosen: you defiled
  alternatives:
  - you made unclean
  - you polluted
  lexicon: HALOT
  rationale: טמא in the piel commonly means to render unclean/defile, often with cultic
    and moral force. 'Defiled' preserves that weight better than the more generic
    'polluted.'
- source_word: אַרְצִי
  chosen: my land
  alternatives:
  - my הארץ
  - my country
  lexicon: HALOT
  rationale: The possessive highlights that the land belongs to God. 'My land' is
    the natural rendering in context.
- source_word: נַחֲלָתִי
  chosen: my inheritance
  alternatives:
  - my heritage
  - my possession
  lexicon: HALOT
  rationale: נחלה often denotes an inherited possession or heritage. 'My inheritance'
    preserves the covenantal and possessive nuance, even though 'heritage' is also
    possible.
- source_word: שַׂמְתֶּם לְתוֹעֵבָה
  chosen: made ... an abomination
  alternatives:
  - turned ... into something detestable
  - made ... abhorrent
  lexicon: HALOT
  rationale: תוֹעֵבָה is a strong term for something detestable/abominable, often
    with moral-religious force. 'Abomination' preserves the severity and biblical
    register without paraphrase.
