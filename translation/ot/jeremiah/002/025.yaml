theological_decisions:
- issue: Referent of 'strangers' in Jeremiah's adultery metaphor
  chosen_reading: Retain the broader metaphorical term 'strangers' in the main text,
    allowing it to encompass foreign gods and possibly foreign nations/allies.
  alternative_readings:
  - foreign gods
  - foreign lovers
  - foreign nations
  rationale: The immediate context in Jeremiah 2 uses marital and idolatry imagery
    together. Narrowing the term in translation would import an interpretation rather
    than preserve the prophetic metaphor's layered force.
  doctrine_reference: Preserve theological tension rather than resolve it.
