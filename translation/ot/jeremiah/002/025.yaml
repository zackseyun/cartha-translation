id: JER.2.25
reference: Jeremiah 2:25
source:
  edition: WLC
  text: מִנְעִ֤י רַגְלֵ/ךְ֙ מִ/יָּחֵ֔ף ו/גורנ/ך מִ/צִּמְאָ֑ה וַ/תֹּאמְרִ֣י נוֹאָ֔שׁ
    ל֕וֹא כִּֽי אָהַ֥בְתִּי זָרִ֖ים וְ/אַחֲרֵי/הֶ֥ם אֵלֵֽךְ־׃
translation:
  text: Keep your foot from going unshod and your throat from thirst. But you said,
    “It is hopeless! No, for I have loved strangers, and after them I will go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “foreigners.” In context this may refer metaphorically to foreign gods,
      foreign lovers, or foreign nations/allies.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְעִי
  chosen: Keep ... from
  alternatives:
  - Withhold
  - Restrain
  lexicon: HALOT
  rationale: Imperative feminine singular from מנע, addressing personified Judah.
    'Keep ... from' is natural English that preserves the prohibitive force without
    over-literal awkwardness.
- source_word: רַגְלֵךְ
  chosen: your foot
  alternatives:
  - your feet
  - your leg
  lexicon: HALOT
  rationale: Although 'foot' can function collectively, the Hebrew singular with 2fs
    suffix is best represented as singular here.
- source_word: מִיָּחֵף
  chosen: from going unshod
  alternatives:
  - from being barefoot
  - from bareness
  lexicon: HALOT
  rationale: The adjective/noun idea is 'barefoot, unshod.' 'From going unshod' fits
    the verbal force implied after 'keep your foot from' and communicates the image
    of worn-out pursuit.
- source_word: וְגֹרֹנֵךְ
  chosen: and your throat
  alternatives:
  - and your neck
  lexicon: HALOT
  rationale: גרון commonly means 'throat.' In context with thirst, 'throat' is the
    clear sense.
- source_word: מִצִּמְאָה
  chosen: from thirst
  alternatives:
  - from being thirsty
  lexicon: HALOT
  rationale: Directly reflects the noun צִמְאָה. The phrase pairs with the previous
    clause to warn against exhausting pursuit.
- source_word: וַתֹּאמְרִי
  chosen: But you said
  alternatives:
  - And you said
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively in context because Judah's
    response resists the warning.
- source_word: נוֹאָשׁ
  chosen: It is hopeless
  alternatives:
  - It is no use
  - Despair
  lexicon: HALOT
  rationale: The form expresses resignation/despair. 'It is hopeless' captures the
    idiomatic sense in context better than a wooden gloss.
- source_word: לֹא
  chosen: 'No'
  alternatives:
  - Not so
  - No indeed
  lexicon: HALOT
  rationale: Here לֹא functions as an emphatic rejection of the warning just given.
    'No' is concise and idiomatic.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Introduces the reason for Judah''s refusal: her attachment to other
    lovers/gods.'
- source_word: אָהַבְתִּי
  chosen: I have loved
  alternatives:
  - I love
  - I have desired
  lexicon: HALOT
  rationale: Perfect first common singular. 'I have loved' preserves the completed/state
    sense and the emotional-volitional force of the verb.
- source_word: זָרִים
  chosen: strangers
  alternatives:
  - foreigners
  - aliens
  lexicon: HALOT
  rationale: Literally 'strangers/foreign ones.' In Jeremiah's metaphor this likely
    refers to foreign gods and/or foreign allies as illicit lovers. 'Strangers' preserves
    the metaphor without prematurely narrowing the referent.
- source_word: וְאַחֲרֵיהֶם אֵלֵךְ
  chosen: and after them I will go
  alternatives:
  - and I will go after them
  - and after them I go
  lexicon: HALOT
  rationale: Keeps the Hebrew order and idiom of following after desired objects.
    Future sense is appropriate for the imperfect.
