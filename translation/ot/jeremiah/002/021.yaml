theological_decisions:
- issue: Metaphor of Israel/Judah as vine planted by God
  chosen_reading: Retained the agricultural/vine imagery directly rather than paraphrasing
    into moral language alone.
  alternative_readings:
  - I planted you as a pure people ... you became corrupt
  rationale: The Hebrew uses an extended vine metaphor that carries covenantal and
    prophetic resonance. Preserving the image maintains intertextual links and avoids
    importing explanatory interpretation into the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
