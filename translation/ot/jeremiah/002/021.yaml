id: JER.2.21
reference: Jeremiah 2:21
source:
  edition: WLC
  text: וְ/אָֽנֹכִי֙ נְטַעְתִּ֣י/ךְ שֹׂרֵ֔ק כֻּלֹּ֖/ה זֶ֣רַע אֱמֶ֑ת וְ/אֵיךְ֙ נֶהְפַּ֣כְתְּ
    לִ֔/י סוּרֵ֖י הַ/גֶּ֥פֶן נָכְרִיָּֽה׃
translation:
  text: Yet I planted you as a choice vine, wholly of true seed. How then have you
    turned for me into the degenerate shoots of a foreign vine?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'choice grapevine' for 'choice vine'; the Hebrew term denotes a select
      or noble vine.
    reason: lexical_alternative
  - marker: b
    text: Or 'all of it genuine stock' for 'wholly of true seed.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew behind 'degenerate shoots' is difficult; alternatives include
      'wild branches' or 'corrupt growth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְטַעְתִּיךְ
  chosen: I planted you
  alternatives:
  - I had planted you
  lexicon: HALOT
  rationale: Qal perfect 1cs with 2fs suffix; straightforward past action with Israel/Judah
    personified as feminine singular.
- source_word: שֹׂרֵק
  chosen: choice vine
  alternatives:
  - choice grapevine
  - red vine
  lexicon: HALOT
  rationale: Refers to a select or noble vine, not merely any vine. 'Choice vine'
    is idiomatic modern English and preserves the quality emphasis.
- source_word: כֻּלֹּה זֶרַע אֱמֶת
  chosen: wholly of true seed
  alternatives:
  - entirely a faithful seed
  - all of it genuine stock
  lexicon: HALOT
  rationale: The phrase stresses total purity/genuineness of planting stock. 'True
    seed' preserves the metaphor and avoids over-interpreting אֱמֶת as moral faithfulness
    rather than genuineness/reliability in context.
- source_word: וְאֵיךְ
  chosen: How then
  alternatives:
  - How
  - How is it that
  lexicon: HALOT
  rationale: Introduces shocked contrast; 'then' brings out the rhetorical force from
    the prior clause.
- source_word: נֶהְפַּכְתְּ לִי
  chosen: have you turned for me into
  alternatives:
  - have you become to me
  - have you changed before me into
  lexicon: HALOT
  rationale: 'Nifal of הפך conveys change/transformation. לִי is retained as ''for
    me'' rather than omitted, preserving the relational force: in God''s regard/experience
    she has become this.'
- source_word: סוּרֵי
  chosen: degenerate shoots
  alternatives:
  - wild branches
  - turned-off shoots
  - corrupt growth
  lexicon: HALOT
  rationale: The form is difficult, but in context it denotes offshoots that have
    turned aside/degenerate growth from what was planted. 'Degenerate shoots' preserves
    the vine metaphor and the idea of corruption.
- source_word: הַגֶּפֶן נָכְרִיָּה
  chosen: of a foreign vine
  alternatives:
  - of a strange vine
  - of an alien vine
  lexicon: HALOT
  rationale: נָכְרִיָּה means foreign/strange. 'Foreign vine' is clear modern English
    and preserves the covenantal sense of alienness without archaic tone.
