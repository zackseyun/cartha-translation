id: JER.2.17
reference: Jeremiah 2:17
source:
  edition: WLC
  text: הֲ/לוֹא זֹ֖את תַּעֲשֶׂה לָּ֑/ךְ עָזְבֵ/ךְ֙ אֶת יְהוָ֣ה אֱלֹהַ֔יִ/ךְ בְּ/עֵ֖ת מוֹלִיכֵ֥/ךְ בַּ/דָּֽרֶךְ־־־׃
translation:
  text: Has not this brought it upon you, because you have forsaken Yahweh your God when he was leading you in the way?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Has not this done this to you?' The Hebrew is more literally 'Has not this done for/to you...?'
    reason: lexical_alternative
  - marker: b
    text: Or 'while he was leading you on the way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  chosen: Has not
  alternatives:
  - Is it not
  - Have you not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Has not' fits the English syntax of the verse and preserves the rebuking force.
- source_word: זֹאת
  chosen: this
  alternatives:
  - this thing
  - these things
  lexicon: HALOT
  rationale: Singular feminine demonstrative referring to the calamity/consequence just mentioned in context. 'This' is natural and sufficiently specific in English.
- source_word: תַּעֲשֶׂה לָּךְ
  chosen: brought it upon you
  alternatives:
  - done this to you
  - caused this for you
  lexicon: HALOT
  rationale: Literally 'done for/to you,' but in context the idiom points to suffering brought on oneself. 'Brought it upon you' captures the causative sense idiomatically without over-paraphrasing.
- source_word: עָזְבֵךְ
  chosen: that you have forsaken
  alternatives:
  - your forsaking
  - because you abandoned
  lexicon: HALOT
  rationale: 'The infinitive construct with suffix expresses the cause: ''your forsaking.'' Rendering it as ''that you have forsaken'' gives clear English while preserving the causal relationship.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהַיִךְ
  chosen: your God
  lexicon: HALOT
  rationale: Standard covenantal expression; straightforward possessive rendering.
- source_word: בְּעֵת
  chosen: when
  alternatives:
  - at the time when
  - while
  lexicon: HALOT
  rationale: Temporal preposition plus noun is most naturally rendered 'when' in English.
- source_word: מוֹלִיכֵךְ
  chosen: he was leading you
  alternatives:
  - he led you
  - his leading you
  lexicon: HALOT
  rationale: Hiphil participle of הלך/ילך in causative sense, 'causing to go/leading.' The participial form suggests ongoing action, well represented by 'was leading you.'
- source_word: בַּדָּרֶךְ
  chosen: in the way
  alternatives:
  - on the way
  - in the path
  lexicon: HALOT
  rationale: Retains the Hebrew metaphor and possible moral/covenantal nuance. 'In the way' is slightly more literal than 'on the way' and fits prophetic diction.
