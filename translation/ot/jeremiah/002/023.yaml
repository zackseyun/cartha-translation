id: JER.2.23
reference: Jeremiah 2:23
source:
  edition: WLC
  text: אֵ֣יךְ תֹּאמְרִ֞י לֹ֣א נִטְמֵ֗אתִי אַחֲרֵ֤י הַ/בְּעָלִים֙ לֹ֣א הָלַ֔כְתִּי
    רְאִ֤י דַרְכֵּ/ךְ֙ בַּ/גַּ֔יְא דְּעִ֖י מֶ֣ה עָשִׂ֑ית בִּכְרָ֥ה קַלָּ֖ה מְשָׂרֶ֥כֶת
    דְּרָכֶֽי/הָ׃
translation:
  text: How can you say, ‘I have not defiled myself; I have not gone after the Baals’?
    Look at your way in the valley; know what you have done— a swift young she-camel,
    weaving in and out of her paths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I have not become unclean.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'I have not followed the Baals.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term may depict a young she-camel crisscrossing or twisting along
      her tracks; the exact nuance of the verb is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִטְמֵאתִי
  chosen: I have not defiled myself
  alternatives:
  - I have not become unclean
  - I have not been defiled
  lexicon: HALOT
  rationale: The Niphal of טמא denotes becoming unclean/defiled. 'Defiled myself'
    fits the speaker's self-defense in context and preserves the moral-religious sense
    better than a merely ceremonial 'become unclean.'
- source_word: אַחֲרֵי הַבְּעָלִים ... הָלַכְתִּי
  chosen: I have not gone after the Baals
  alternatives:
  - I have not followed the Baals
  lexicon: HALOT
  rationale: הלך אחרי is a common idiom for following after, especially in idolatrous
    pursuit. 'Gone after' preserves the Hebrew imagery and the accusatory force. 'Baals'
    is retained in the plural because the Hebrew is plural and refers to the various
    manifestations/images of Baal worship.
- source_word: רְאִי דַרְכֵּךְ
  chosen: Look at your way
  alternatives:
  - See your way
  - Consider your conduct
  lexicon: HALOT
  rationale: דרך can mean literal way/path or figurative conduct. Here the following
    phrase 'in the valley' keeps the concrete image while also implying conduct, so
    'your way' preserves the metaphor without over-interpreting.
- source_word: בַּגַּיְא
  chosen: in the valley
  alternatives:
  - in the ravine
  lexicon: HALOT
  rationale: גיא denotes a valley/ravine. 'Valley' is more natural English and sufficient
    here, while still evoking the likely cultic setting alluded to in Jeremiah.
- source_word: דְּעִי
  chosen: know
  alternatives:
  - recognize
  - understand
  lexicon: HALOT
  rationale: The imperative of ידע is straightforwardly 'know.' In English this works
    idiomatically in the sense 'acknowledge/realize what you have done.'
- source_word: בִּכְרָה
  chosen: young she-camel
  alternatives:
  - young camel
  - dromedary
  lexicon: HALOT
  rationale: The noun denotes a young female camel. The feminine matters because the
    verse compares Judah to a female animal in heat-like restless movement, so 'young
    she-camel' is more precise than generic 'camel.'
- source_word: קַלָּה
  chosen: swift
  alternatives:
  - light-footed
  - fleet
  lexicon: HALOT
  rationale: The adjective literally conveys lightness; in this simile it describes
    quick, restless movement. 'Swift' is idiomatic and vivid.
- source_word: מְשָׂרֶכֶת דְּרָכֶיהָ
  chosen: weaving in and out of her paths
  alternatives:
  - crisscrossing her tracks
  - entangling her ways
  - running here and there on her ways
  lexicon: HALOT
  rationale: The participle from שרך is difficult and comparatively rare. In context
    of the animal simile, it depicts erratic, twisting movement along paths. 'Weaving
    in and out of her paths' communicates the image in readable English without claiming
    more certainty than the lexeme allows.
