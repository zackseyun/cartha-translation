theological_decisions:
- issue: Plural בְּעָלִים and idolatry language
  chosen_reading: the Baals
  alternative_readings:
  - Baal
  - the lords
  rationale: The plural is retained because the Hebrew text is plural and the context
    is Judah's repeated idolatries, not a singular title. This avoids flattening the
    accusation into a generic or singularized reference.
