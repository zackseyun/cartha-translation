id: JER.2.15
reference: Jeremiah 2:15
source:
  edition: WLC
  text: עָלָי/ו֙ יִשְׁאֲג֣וּ כְפִרִ֔ים נָתְנ֖וּ קוֹלָ֑/ם וַ/יָּשִׁ֤יתוּ אַרְצ/וֹ֙
    לְ/שַׁמָּ֔ה עָרָ֥י/ו נצתה מִ/בְּלִ֥י יֹשֵֽׁב׃
translation:
  text: Young lions roar against him; they raise their voice. They make his land a
    desolation; his cities are burned, without inhabitant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his cities are laid waste, without inhabitant.' The Hebrew form נצתה
      is difficult and may be understood either as 'burned' or more generally as 'ruined/laid
      waste.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָיו
  chosen: against him
  alternatives:
  - over him
  - at him
  lexicon: HALOT
  rationale: With שׁאג 'roar,' עַל here is best taken in a hostile sense, indicating
    attack or menace directed toward Israel/Jacob personified as singular masculine
    in context.
- source_word: יִשְׁאֲגוּ
  chosen: roar
  alternatives:
  - growl
  lexicon: HALOT
  rationale: Standard rendering for lion vocalization; preserves the vivid predatory
    imagery.
- source_word: כְפִרִים
  chosen: young lions
  alternatives:
  - lion cubs
  - young male lions
  lexicon: HALOT
  rationale: The term denotes vigorous young lions, not small cubs; 'young lions'
    is the established and accurate English equivalent.
- source_word: נָתְנוּ קוֹלָם
  chosen: they raise their voice
  alternatives:
  - they give forth their voice
  - they utter their sound
  lexicon: HALOT
  rationale: Hebrew idiom literally 'gave their voice.' 'Raise their voice' is natural
    English while preserving the force of a loud threatening cry.
- source_word: וַיָּשִׁיתוּ
  chosen: they make
  alternatives:
  - they set
  - they turn
  lexicon: HALOT
  rationale: 'From שׁית, here causative/resultative: the invaders render the land
    into a state of desolation.'
- source_word: אַרְצוֹ
  chosen: his land
  alternatives:
  - his country
  lexicon: HALOT
  rationale: Singular possessive continues the personification of Israel/Jacob as
    a single male figure whose land is ravaged.
- source_word: לְשַׁמָּה
  chosen: a desolation
  alternatives:
  - desolate
  - an object of horror
  lexicon: HALOT
  rationale: Noun indicating devastation/desolation. 'A desolation' fits the syntax
    after 'make' and preserves the noun form.
- source_word: עָרָיו
  chosen: his cities
  lexicon: HALOT
  rationale: Straightforward plural with 3ms suffix, continuing the singular national
    personification.
- source_word: נצתה
  chosen: are burned
  alternatives:
  - are laid waste
  - are kindled
  lexicon: HALOT
  rationale: The form is commonly understood from a verb meaning 'to burn/be set on
    fire' in this context. 'Are burned' best matches the likely sense and the image
    of destroyed cities. Because the consonantal form can be discussed, an alternative
    is preserved in a footnote.
- source_word: מִבְּלִי יֹשֵׁב
  chosen: without inhabitant
  alternatives:
  - with no one living there
  - without anyone dwelling there
  lexicon: HALOT
  rationale: A common Hebrew expression for depopulation. 'Without inhabitant' is
    concise and faithful, though slightly formal; it preserves the singular participle's
    collective force.
