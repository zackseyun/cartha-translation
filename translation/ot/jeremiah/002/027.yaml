theological_decisions:
- issue: Rendering the idol-address language literally rather than softening it
  chosen_reading: The people are depicted as directly attributing parenthood/creative
    origin to idols made of wood and stone.
  alternative_readings:
  - A looser rendering that merely says they worship idols
  rationale: The Hebrew explicitly quotes them calling a tree 'my father' and a stone
    the one that gave them birth. Preserving the literal familial/creative language
    retains the force of the prophetic accusation against idolatry.
