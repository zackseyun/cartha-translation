id: JER.2.27
reference: Jeremiah 2:27
source:
  edition: WLC
  text: אֹמְרִ֨ים לָ/עֵ֜ץ אָ֣בִ/י אַ֗תָּה וְ/לָ/אֶ֨בֶן֙ אַ֣תְּ ילדת/ני כִּֽי פָנ֥וּ
    אֵלַ֛/י עֹ֖רֶף וְ/לֹ֣א פָנִ֑ים וּ/בְ/עֵ֤ת רָֽעָתָ/ם֙ יֹֽאמְר֔וּ ק֖וּמָ/ה וְ/הוֹשִׁיעֵֽ/נוּ־׃
translation:
  text: They say to a tree, “You are my father,” and to a stone, “You gave birth to
    me.” For they have turned their back to me and not their face; but in the time
    of their trouble they say, “Rise up and save us!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “You bore me.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, “they have turned to me a back, and not a face,” an idiom
      for rejection.
    reason: lexical_alternative
  - marker: c
    text: Or “in the time of their calamity.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמְרִים
  chosen: They say
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Rendered as a finite present in English for natural discourse, reflecting
    the participial form used predicatively/descriptively in context.
- source_word: לָעֵץ
  chosen: to a tree
  alternatives:
  - to the tree
  - to wood
  lexicon: HALOT
  rationale: עֵץ commonly means 'tree' or 'wood.' Here the object is an idol materialized
    as a wooden object; 'tree' preserves the concrete absurdity of addressing created
    material as deity.
- source_word: אָבִי אַתָּה
  chosen: You are my father
  alternatives:
  - My father are you
  lexicon: HALOT
  rationale: Standard English copular order preserves the filial claim made to the
    idol.
- source_word: וְלָאֶבֶן
  chosen: and to a stone
  alternatives:
  - and to the stone
  lexicon: HALOT
  rationale: אֶבֶן is straightforwardly 'stone.' The parallel with 'tree' highlights
    idol materials.
- source_word: אַתְּ יְלַדְתִּנִי
  chosen: You gave birth to me
  alternatives:
  - You bore me
  - You begot me
  lexicon: HALOT
  rationale: יַלד in the feminine singular with 1cs suffix naturally means 'you gave
    birth to me.' 'Begot me' is less suitable because the addressee is grammatically
    feminine ('stone').
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the explanatory ground for the accusation; 'for' fits the
    prophetic indictment style.
- source_word: פָּנוּ אֵלַי עֹרֶף
  chosen: they have turned their back to me
  alternatives:
  - they turned the neck to me
  - they turned their backs toward me
  lexicon: HALOT
  rationale: עֹרֶף is literally 'neck/back of neck,' but the idiom in English is best
    conveyed as 'turn one's back,' expressing rejection.
- source_word: וְלֹא פָנִים
  chosen: and not their face
  alternatives:
  - and not their faces
  - instead of their face
  lexicon: HALOT
  rationale: Maintains the Hebrew contrast between back and face. Singular 'face'
    works idiomatically in English with distributive sense.
- source_word: וּבְעֵת רָעָתָם
  chosen: but in the time of their trouble
  alternatives:
  - and at the time of their calamity
  - in the time of their evil
  lexicon: HALOT
  rationale: רָעָה can denote evil, disaster, or trouble. Here the context is distress
    prompting a plea for rescue, so 'trouble' communicates experiential calamity clearly.
- source_word: יֹאמְרוּ
  chosen: they say
  alternatives:
  - they will say
  lexicon: HALOT
  rationale: The imperfect here functions contextually as a future-like or habitual
    response. Present tense in English keeps the vivid prophetic portrayal; the temporal
    sense is supplied by 'in the time of their trouble.'
- source_word: קוּמָה
  chosen: Rise up
  alternatives:
  - Arise
  - Get up
  lexicon: HALOT
  rationale: Imperative addressed to the idol/deity figure. 'Rise up' is vivid modern
    English without archaic tone.
- source_word: וְהוֹשִׁיעֵנוּ
  chosen: and save us
  alternatives:
  - and deliver us
  lexicon: HALOT
  rationale: The Hiphil of ישׁע commonly means 'save/deliver.' 'Save us' is the most
    direct and recognizable rendering in a plea for rescue.
