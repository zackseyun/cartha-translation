theological_decisions:
- issue: Social-status terminology for עֶבֶד in a rhetorical comparison
  chosen_reading: Translate with slavery language ('slave') rather than the softer
    'servant' in the first clause
  alternative_readings:
  - Translate both status terms with 'servant' language
  rationale: The verse contrasts Israel's status with the condition of being reduced
    to spoil. The bonded nature of עֶבֶד is central to the rhetoric, so 'slave' better
    preserves the social reality implied by the Hebrew. This is a lexical-theological
    decision shaped by the project's stated preference to avoid tradition-softened
    renderings where bondage is salient.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος by analogy of bonded-status rendering
