id: JER.2.14
reference: Jeremiah 2:14
source:
  edition: WLC
  text: הַ/עֶ֨בֶד֙ יִשְׂרָאֵ֔ל אִם יְלִ֥יד בַּ֖יִת ה֑וּא מַדּ֖וּעַ הָיָ֥ה לָ/בַֽז־׃
translation:
  text: Is Israel a slave, or a homeborn servant? Why then has he become plunder?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Is Israel a servant, or one born in the household?' The Hebrew phrase
      'homeborn servant' refers to someone born into a master's household.
    reason: lexical_alternative
  - marker: b
    text: Or, 'Why then has he become prey?'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעֶבֶד
  chosen: a slave
  alternatives:
  - the slave
  - a servant
  lexicon: HALOT
  rationale: עֶבֶד denotes a servant/slave. In this rhetorical question, the social
    status of bondage is salient, so 'slave' better preserves the force than the softer
    'servant,' in line with the project's guidance to use 'slave' where bonded status
    matters.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name transliterated by standard English convention.
- source_word: אִם
  chosen: or
  alternatives:
  - if
  - whether
  lexicon: HALOT
  rationale: 'Although אִם commonly means ''if,'' in interrogative constructions it
    can introduce an alternative question, effectively ''or/whether.'' Here it links
    two possible statuses: ''Is Israel a slave, or a homeborn servant?'''
- source_word: יְלִיד בַּיִת
  chosen: a homeborn servant
  alternatives:
  - one born in the house
  - a house-born slave
  - a native of the household
  lexicon: HALOT
  rationale: The phrase literally means 'born of the house/household,' referring to
    someone born into a master's household. 'Homeborn servant' is concise, idiomatic,
    and preserves the household-slavery setting. 'Servant' here avoids awkward English
    ('homeborn slave') while the bonded sense remains clear from the parallel with
    עֶבֶד.
- source_word: הוּא
  chosen: he
  alternatives:
  - it
  lexicon: HALOT
  rationale: Masculine singular pronoun referring to Israel personified. English personal
    pronoun 'he' matches the source's gendered personification.
- source_word: מַדּוּעַ
  chosen: Why then
  alternatives:
  - Why
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative 'why.' 'Then' brings out the rhetorical inference
    from the preceding question without adding substantial meaning.
- source_word: הָיָה
  chosen: has become
  alternatives:
  - was
  - came to be
  lexicon: HALOT
  rationale: The qatal form can be rendered as a present-result state in English in
    this rhetorical context. 'Has become' communicates resultant condition more naturally
    than simple past 'was.'
- source_word: לָבַז
  chosen: plunder
  alternatives:
  - prey
  - spoil
  lexicon: HALOT
  rationale: בַּז refers to spoil/plunder taken by others. 'Plunder' works well in
    English for the state of being despoiled. 'Prey' is possible and common in some
    translations, but 'plunder' more directly reflects the noun's semantic field.
