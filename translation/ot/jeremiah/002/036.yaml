theological_decisions:
- issue: Nature of 'your way' in prophetic rebuke
  chosen_reading: Rendered broadly as 'your way' without specifying only political
    alliance or only moral conduct.
  alternative_readings:
  - your political course
  - your conduct
  rationale: The Hebrew דרך can encompass both conduct and policy. In Jeremiah 2 the
    immediate context concerns seeking foreign alliances, but the prophetic accusation
    also carries moral-spiritual weight. The translation preserves this tension rather
    than narrowing it.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
