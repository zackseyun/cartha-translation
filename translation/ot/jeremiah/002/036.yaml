id: JER.2.36
reference: Jeremiah 2:36
source:
  edition: WLC
  text: מַה תֵּזְלִ֥י מְאֹ֖ד לְ/שַׁנּ֣וֹת אֶת דַּרְכֵּ֑/ךְ גַּ֤ם מִ/מִּצְרַ֨יִם֙ תֵּב֔וֹשִׁי
    כַּ/אֲשֶׁר בֹּ֖שְׁתְּ מֵ/אַשּֽׁוּר־־־׃
translation:
  text: Why do you go about so much, changing your way? You will also be put to shame
    by Egypt, as you were put to shame by Assyria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Why do you wander about so much to change your course?' The Hebrew expression
      may emphasize restless movement in pursuit of changing alliances.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will be ashamed of Egypt ... as you were ashamed of Assyria.' The
      verb can denote shame or disappointed reliance.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: Why
  alternatives:
  - How
  lexicon: HALOT
  rationale: Introduces a rhetorical question expressing rebuke. 'Why' fits the interrogative
    force in context better than a more literal 'How,' which can sound manner-oriented
    rather than evaluative.
- source_word: תֵּזְלִי
  chosen: do you go about
  alternatives:
  - do you go
  - do you wander
  - do you run about
  lexicon: HALOT
  rationale: From זלל/זלל? in this context the verb is commonly understood idiomatically
    as moving about restlessly or lightly in pursuit of alliances. 'Go about' preserves
    the motion metaphor without overinterpreting it as moral 'prostitution' or mere
    physical travel.
- source_word: מְאֹד
  chosen: so much
  alternatives:
  - greatly
  - very much
  lexicon: HALOT
  rationale: Adverb intensifying the verbal action. 'So much' reads naturally in English
    with the rhetorical question and preserves the emphasis.
- source_word: לְשַׁנּוֹת
  chosen: changing
  alternatives:
  - to change
  - altering
  lexicon: HALOT
  rationale: Infinitive of purpose/result after the motion verb. English participial
    'changing' fits the idiom 'go about ... changing your way' and keeps the connection
    between restless movement and policy reversal.
- source_word: דַּרְכֵּךְ
  chosen: your way
  alternatives:
  - your path
  - your course
  lexicon: HALOT
  rationale: '''Way'' is the standard rendering of דרך and can denote conduct, course,
    or policy. Here it likely refers to Judah''s political course and broader conduct;
    ''way'' preserves that breadth.'
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: HALOT
  rationale: 'Marks addition: Egypt too will prove a source of shame, not only Assyria.
    ''Also'' is the clearest English equivalent.'
- source_word: מִמִּצְרַיִם
  chosen: by Egypt
  alternatives:
  - from Egypt
  - because of Egypt
  lexicon: HALOT
  rationale: With בושׁ, the preposition marks the source or occasion of shame. 'By
    Egypt' communicates that Egypt is the agent/source from whom shame comes in context
    of failed reliance.
- source_word: תֵּבֹשִׁי
  chosen: you will be put to shame
  alternatives:
  - you will be ashamed
  - you will be disappointed
  lexicon: HALOT
  rationale: The Niphal/Qal of בושׁ can denote shame or disappointment. 'Be put to
    shame' best captures the passive/resultative sense and the covenantal-political
    humiliation in context.
- source_word: כַּאֲשֶׁר
  chosen: as
  alternatives:
  - just as
  - like
  lexicon: HALOT
  rationale: Introduces comparison with the prior experience involving Assyria. 'As'
    is concise and natural.
- source_word: בֹּשְׁתְּ
  chosen: you were put to shame
  alternatives:
  - you were ashamed
  - you were disappointed
  lexicon: HALOT
  rationale: Past counterpart to תֵּבֹשִׁי. Rendering it consistently as 'were put
    to shame' preserves the parallelism and the sense of humiliating failure.
- source_word: מֵאַשּׁוּר
  chosen: by Assyria
  alternatives:
  - from Assyria
  - because of Assyria
  lexicon: HALOT
  rationale: As with 'by Egypt,' the preposition indicates the source/occasion of
    shame. 'By Assyria' keeps the parallel structure and highlights failed foreign
    dependence.
