theological_decisions:
- issue: Gender agreement in the animal metaphor for Judah
  chosen_reading: Use feminine English pronouns for the wild donkey image ('her')
  alternative_readings:
  - Retain a more literal masculine element from the suffix on נַפְשׁוֹ in one phrase
  rationale: The verse personifies Judah as a female animal, and the verbal/suffix
    pattern overwhelmingly supports feminine reference in context. Smoothing the one
    anomalous masculine-looking suffix avoids confusing English readers while preserving
    the metaphor's force.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §5 (documented
    exception/consistency)
