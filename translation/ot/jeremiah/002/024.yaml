id: JER.2.24
reference: Jeremiah 2:24
source:
  edition: WLC
  text: פֶּ֣רֶה לִמֻּ֣ד מִדְבָּ֗ר בְּ/אַוַּ֤ת נפש/ו שָׁאֲפָ֣ה ר֔וּחַ תַּאֲנָתָ֖/הּ
    מִ֣י יְשִׁיבֶ֑/נָּה כָּל מְבַקְשֶׁ֨י/הָ֙ לֹ֣א יִיעָ֔פוּ בְּ/חָדְשָׁ֖/הּ יִמְצָאֽוּ/נְהָ׀־׃
translation:
  text: A wild donkey, accustomed to the wilderness, in the craving of her appetite
    sniffs the wind; in her heat, who can turn her back? All who seek her will not
    weary themselves; in her month they will find her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'snuffs up the wind.' The Hebrew idiom pictures the animal eagerly scenting
      the air in restless desire.
    reason: lexical_alternative
  - marker: b
    text: Or 'in her rut' or 'in her lust.' The Hebrew refers to the season/state
      of sexual craving.
    reason: lexical_alternative
  - marker: c
    text: Literally 'in her month,' likely meaning the time of her heat or mating
      cycle.
    reason: cultural_note
lexical_decisions:
- source_word: פֶּרֶה
  chosen: wild donkey
  alternatives:
  - wild ass
  lexicon: HALOT
  rationale: Refers to the onager/wild donkey. 'Wild donkey' is clear modern English;
    'wild ass' is traditional but potentially distracting in contemporary usage.
- source_word: לִמֻּד מִדְבָּר
  chosen: accustomed to the wilderness
  alternatives:
  - trained to the wilderness
  - used to the desert
  lexicon: HALOT
  rationale: The passive/adjectival form with 'wilderness' describes an animal habituated
    to desert life. 'Accustomed to' conveys settled adaptation better than the more
    wooden 'trained to.'
- source_word: בְּאַוַּת נַפְשׁוֹ
  chosen: in the craving of her appetite
  alternatives:
  - in the desire of her soul
  - in her lust
  lexicon: HALOT
  rationale: Although the ketiv/qere-like consonantal form shows a 3ms suffix on 'soul,'
    the surrounding verbs and suffixes are feminine, referring to the female donkey
    as an image of Judah. English smooths this to feminine agreement. 'Craving of
    her appetite' preserves the strong desire without importing exclusively sexual
    language into every element of the phrase.
- source_word: שָׁאֲפָה רוּחַ
  chosen: sniffs the wind
  alternatives:
  - pants for air
  - snuffs up the wind
  lexicon: HALOT
  rationale: The idiom depicts the animal eagerly inhaling/scenting the wind in restless
    desire. 'Sniffs the wind' is vivid and natural; 'snuffs up' is more traditional
    but less transparent.
- source_word: תַּאֲנָתָהּ
  chosen: in her heat
  alternatives:
  - in her rut
  - in her lust
  lexicon: HALOT
  rationale: The noun denotes the time/state of sexual craving. 'In her heat' is idiomatic
    English for an animal and fits the metaphor. 'Rut' is possible but more commonly
    used of certain male animals; 'lust' is broader and less zoologically precise.
- source_word: מִי יְשִׁיבֶנָּה
  chosen: who can turn her back?
  alternatives:
  - who can restrain her?
  - who can bring her back?
  lexicon: HALOT
  rationale: Hiphil of שוב can mean cause to return/turn back. In context the point
    is inability to divert or restrain her from her course. 'Turn her back' keeps
    the return imagery while remaining idiomatic.
- source_word: כָּל מְבַקְשֶׁיהָ לֹא יִיעָפוּ
  chosen: All who seek her will not weary themselves
  alternatives:
  - all her pursuers need not tire themselves
  - all who search for her will not grow weary
  lexicon: HALOT
  rationale: The line means those pursuing her do not need to exhaust themselves because
    she is easily found at the proper time. 'Seek' is a straightforward rendering
    of בקשׁ.
- source_word: בְּחָדְשָׁהּ
  chosen: in her month
  alternatives:
  - at her month
  - in the month of her mating
  lexicon: HALOT
  rationale: Literally 'in her month.' The phrase likely refers to the time of estrus/mating
    cycle. The main text keeps the literal expression; explanatory force is supplied
    by context and footnote.
- source_word: יִמְצָאוּנְהָ
  chosen: they will find her
  alternatives:
  - they shall find her
  lexicon: HALOT
  rationale: Simple future sense in context; no need for archaic 'shall.'
