id: JER.2.5
reference: Jeremiah 2:5
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה מַה מָּצְא֨וּ אֲבוֹתֵי/כֶ֥ם בִּ/י֙ עָ֔וֶל כִּ֥י רָחֲק֖וּ מֵ/עָלָ֑/י וַ/יֵּֽלְכ֛וּ אַחֲרֵ֥י הַ/הֶ֖בֶל וַ/יֶּהְבָּֽלוּ׀־׃
translation:
  text: 'Thus says Yahweh: What wrong did your fathers find in me, that they went far from me, and went after vanity, and became vain?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'vanity' and 'became vain' use the same root, highlighting that by going after what is empty, they themselves became empty or worthless.
    reason: lexical_alternative
  - marker: b
    text: Or 'What injustice did your fathers find in me...?'
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. יְהוָה is rendered 'the LORD' per doctrine guidelines for the divine name.
- source_word: מַה מָּצְאוּ
  chosen: What ... did ... find
  alternatives:
  - What did ... discover
  - What fault did ... find
  lexicon: HALOT
  rationale: 'מצא here introduces a rhetorical accusation: what did they find in God that justified their departure? ''Find'' preserves the Hebrew idiom while remaining natural in English.'
- source_word: אֲבוֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural construct with 2mp suffix. 'Your fathers' is the most direct rendering and fits the covenant-historical appeal to prior generations; 'ancestors' is possible but less literal.
- source_word: בִּי עָוֶל
  chosen: wrong ... in me
  alternatives:
  - injustice in me
  - iniquity in me
  - fault in me
  lexicon: HALOT
  rationale: עָוֶל denotes wrongness, injustice, or perversity. In this rhetorical context, 'wrong' is clear modern English and communicates the charge of moral defect without sounding overly technical.
- source_word: כִּי רָחֲקוּ מֵעָלַי
  chosen: that they went far from me
  alternatives:
  - that they distanced themselves from me
  - that they went away from me
  lexicon: HALOT
  rationale: 'The clause gives the result/evidence of their supposed finding: they became distant from the LORD. ''Went far from me'' preserves both the spatial metaphor and the covenantal estrangement.'
- source_word: וַיֵּלְכוּ אַחֲרֵי
  chosen: and went after
  alternatives:
  - and followed
  - and walked after
  lexicon: HALOT
  rationale: הלך אחרי is a common idiom for following after, often in idolatrous contexts. 'Went after' keeps the Hebrew imagery and prepares for the object 'vanity'.
- source_word: הַהֶבֶל
  chosen: vanity
  alternatives:
  - worthlessness
  - what is empty
  - idols
  lexicon: HALOT
  rationale: הֶבֶל literally denotes vapor/breath and figuratively emptiness or worthlessness. Here it likely refers to idols as empty things, but the Hebrew intentionally uses the broader term. 'Vanity' preserves the wordplay with the following verb better than 'idols' or 'worthlessness'.
- source_word: וַיֶּהְבָּלוּ
  chosen: and became vain
  alternatives:
  - and became worthless
  - and became empty
  lexicon: HALOT
  rationale: 'The verb from the same root as הֶבֶל creates a deliberate wordplay: by pursuing vanity they themselves became vain/empty. ''Became vain'' preserves the lexical echo most closely, even though ''vain'' here carries the older sense of empty/worthless rather than merely conceited.'
