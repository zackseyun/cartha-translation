theological_decisions:
- issue: Metaphor of sexual infidelity for idolatry
  chosen_reading: Retain explicit prostitution imagery in the main text
  alternative_readings:
  - Soften to 'were unfaithful' or 'committed idolatry'
  rationale: Jeremiah intentionally uses sexual infidelity language to portray covenant
    breach. Softening the metaphor would remove prophetic force and obscure the link
    between illicit worship and adultery imagery.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it'
