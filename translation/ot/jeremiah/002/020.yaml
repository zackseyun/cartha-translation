id: JER.2.20
reference: Jeremiah 2:20
source:
  edition: WLC
  text: כִּ֣י מֵ/עוֹלָ֞ם שָׁבַ֣רְתִּי עֻלֵּ֗/ךְ נִתַּ֨קְתִּי֙ מוֹסְרֹתַ֔יִ/ךְ וַ/תֹּאמְרִ֖י
    לֹ֣א אעבד כִּ֣י עַֽל כָּל גִּבְעָ֞ה גְּבֹהָ֗ה וְ/תַ֨חַת֙ כָּל עֵ֣ץ רַעֲנָ֔ן אַ֖תְּ
    צֹעָ֥ה זֹנָֽה־־־׃
translation:
  text: For long ago I broke your yoke; I tore off your bonds. But you said, “I will
    not serve.” Indeed, on every high hill and under every green tree, you sprawled
    out as a prostitute.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from of old.' The Hebrew phrase can denote remote past; here it likely
      refers to Israel's earlier history of deliverance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'under every green tree,' a stock prophetic expression for places
      associated with idolatrous worship.
    reason: cultural_note
  - marker: c
    text: The Hebrew verb rendered 'sprawled out' is rare and difficult; alternatives
      include 'bent down' or similar expressions of sexual availability.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעוֹלָם
  chosen: for long ago
  alternatives:
  - from of old
  - long ago
  - from ancient time
  lexicon: HALOT
  rationale: In context this temporal phrase points back to Israel's earlier history
    of deliverance rather than abstract eternity. 'For long ago' fits the causal opening
    כִּי and reads naturally in English.
- source_word: שָׁבַרְתִּי עֻלֵּךְ
  chosen: I broke your yoke
  alternatives:
  - I shattered your yoke
  lexicon: HALOT
  rationale: A straightforward metaphor of liberation from bondage. 'Broke your yoke'
    preserves the concrete image and covenant-history resonance.
- source_word: נִתַּקְתִּי מוֹסְרֹתַיִךְ
  chosen: I tore off your bonds
  alternatives:
  - I snapped your straps
  - I broke your fetters
  lexicon: HALOT
  rationale: The verb conveys pulling apart or tearing loose; the noun refers to bands/bonds
    used with a yoke. 'Tore off your bonds' keeps the liberation imagery while sounding
    idiomatic.
- source_word: לֹא אעבד
  chosen: I will not serve
  alternatives:
  - I will not be a slave
  - I will not worship
  lexicon: HALOT
  rationale: עבד can mean serve or worship depending on context. Here the immediate
    yoke/bonds imagery favors 'serve' as the base sense, while the following idolatry
    context implies refusal of covenant service to God. 'Serve' preserves both dimensions
    without over-specifying.
- source_word: כִּי
  chosen: Indeed
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: The second כִּי introduces explanatory confirmation of Israel's claim
    and conduct. 'Indeed' works well as an emphatic transition into the evidence of
    unfaithfulness.
- source_word: עַל כָּל גִּבְעָה גְּבֹהָה וְתַחַת כָּל עֵץ רַעֲנָן
  chosen: on every high hill and under every green tree
  alternatives:
  - upon every high hill and under every leafy tree
  - on every lofty hill and under every flourishing tree
  lexicon: HALOT
  rationale: This is a stereotyped description of idolatrous worship sites. 'Green
    tree' is retained rather than a more interpretive gloss because it is both literal
    and recognizable in prophetic diction.
- source_word: צֹעָה
  chosen: you sprawled out
  alternatives:
  - you bent down
  - you wandered
  lexicon: HALOT
  rationale: The rare participle is difficult, but in this context it likely depicts
    a posture of sexual availability associated with the prostitution metaphor. 'Sprawled
    out' communicates the physical and shame-laden image better than a vague motion
    verb.
- source_word: זֹנָה
  chosen: as a prostitute
  alternatives:
  - playing the prostitute
  - as a harlot
  lexicon: HALOT
  rationale: The participle is metaphorical for covenant unfaithfulness through idolatry,
    but the sexualized image should remain explicit. 'Prostitute' is modern and clear;
    'as a prostitute' fits the syntax with the preceding participle.
