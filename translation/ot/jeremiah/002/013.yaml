id: JER.2.13
reference: Jeremiah 2:13
source:
  edition: WLC
  text: כִּֽי שְׁתַּ֥יִם רָע֖וֹת עָשָׂ֣ה עַמִּ֑/י אֹתִ֨/י עָזְב֜וּ מְק֣וֹר מַ֣יִם
    חַיִּ֗ים לַ/חְצֹ֤ב לָ/הֶם֙ בֹּאר֔וֹת בֹּארֹת֙ נִשְׁבָּרִ֔ים אֲשֶׁ֥ר לֹא יָכִ֖לוּ
    הַ/מָּֽיִם־׀־׃
translation:
  text: 'For my people have done two evils: they have forsaken me, the fountain of
    living waters, to dig for themselves cisterns—broken cisterns that cannot hold
    water.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spring of living water' or 'source of living waters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding accusation/judgment. 'For'
    preserves the causal/explanatory force in natural English.
- source_word: שְׁתַּיִם רָעוֹת
  chosen: two evils
  alternatives:
  - two wrongs
  - two wicked things
  lexicon: HALOT
  rationale: A straightforward rendering of the numeral plus plural noun/adjective
    construction. 'Evils' keeps the moral weight better than the softer 'wrongs.'
- source_word: עָשָׂה עַמִּי
  chosen: my people have done
  alternatives:
  - my people committed
  - my people have committed
  lexicon: HALOT
  rationale: Although English often says 'commit evils,' the Hebrew verb is the common
    'do/make.' 'Have done' is direct and idiomatic enough while staying close to the
    source.
- source_word: אֹתִי עָזְבוּ
  chosen: they have forsaken me
  alternatives:
  - they have abandoned me
  - they left me
  lexicon: HALOT
  rationale: '''Forsaken'' preserves the covenantal and relational gravity of עזב
    in prophetic discourse better than the more colloquial ''left'' and slightly more
    formal than ''abandoned'' in this context.'
- source_word: מְקוֹר
  chosen: fountain
  alternatives:
  - spring
  - source
  lexicon: HALOT
  rationale: The noun denotes a spring/fount as a source of water. 'Fountain' works
    well in English biblical style and pairs naturally with 'living waters.' 'Spring'
    is possible, but 'fountain' better conveys the metaphorical richness here.
- source_word: מַיִם חַיִּים
  chosen: living waters
  alternatives:
  - living water
  - fresh water
  - flowing water
  lexicon: HALOT
  rationale: Plural in Hebrew, so 'living waters' preserves the form and the established
    idiom for fresh, flowing water. It also retains the theological resonance of life-giving
    water imagery.
- source_word: לַחְצֹב
  chosen: to dig
  alternatives:
  - to hew out
  - to carve out
  lexicon: HALOT
  rationale: The verb can mean hew out, especially from rock, but 'dig' is the clearest
    modern English choice for what one does to make cisterns. The object 'cisterns'
    supplies the needed context.
- source_word: לָהֶם
  chosen: for themselves
  alternatives:
  - for them
  lexicon: HALOT
  rationale: 'The dative here is reflexive in sense: the people make these cisterns
    for their own use/benefit. ''For themselves'' brings out that self-directed contrast
    with forsaking God.'
- source_word: בֹּארוֹת
  chosen: cisterns
  alternatives:
  - wells
  - reservoirs
  lexicon: HALOT
  rationale: In this contrast with a natural fountain/spring, 'cisterns' is the best
    term for man-made water storage pits. 'Wells' would blur the contrast and misrepresent
    the image.
- source_word: בֹּארֹת נִשְׁבָּרִים
  chosen: broken cisterns
  alternatives:
  - cracked cisterns
  - shattered cisterns
  lexicon: HALOT
  rationale: The participle describes cisterns that are fractured and thus defective.
    'Broken' is idiomatic and broad enough to include the idea of cracked, leaking
    cisterns.
- source_word: אֲשֶׁר לֹא יָכִלוּ הַמָּיִם
  chosen: that cannot hold water
  alternatives:
  - that can hold no water
  - that do not contain water
  lexicon: HALOT
  rationale: The idiom means they are unable to retain water. 'Hold water' is natural
    English and preserves both the literal image and the implied critique of futility.
