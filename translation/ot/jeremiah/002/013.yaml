theological_decisions:
- issue: Metaphorical water imagery for God
  chosen_reading: Retain the metaphor 'the fountain of living waters' rather than
    interpret it explicitly as God being the source of life/blessing.
  alternative_readings:
  - the spring of fresh water
  - the source of life-giving water
  rationale: The Hebrew presents a vivid metaphor and does not unpack it. Preserving
    the image maintains the prophetic force and theological richness without importing
    explanatory paraphrase.
  doctrine_reference: Translation philosophy §1, §3, §6
