id: JER.2.11
reference: Jeremiah 2:11
source:
  edition: WLC
  text: הַ/הֵימִ֥יר גּוֹי֙ אֱלֹהִ֔ים וְ/הֵ֖מָּה לֹ֣א אֱלֹהִ֑ים וְ/עַמִּ֛/י הֵמִ֥יר
    כְּבוֹד֖/וֹ בְּ/ל֥וֹא יוֹעִֽיל׃
translation:
  text: Has a nation changed its gods—though they are not gods? Yet my people have
    changed their Glory for what does not profit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'exchanged.' The Hebrew verb can mean 'change,' 'exchange,' or 'replace.'
    reason: lexical_alternative
  - marker: b
    text: '''Their Glory'' likely refers to the LORD, Israel''s true glory, expressed
      by a Hebrew title/metonymy rather than naming him directly.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for what is useless' or 'for that which does not help.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵימִיר
  chosen: changed
  alternatives:
  - exchanged
  - replaced
  lexicon: HALOT
  rationale: The verb means to change, exchange, or substitute. 'Changed' is natural
    English and fits both cola; 'exchanged' is possible, but the object in the first
    colon is simply 'gods' rather than an explicit replacement construction. The broader
    sense of trading one object of allegiance for another is still conveyed.
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  - gentile nation
  lexicon: HALOT
  rationale: In this rhetorical question the term denotes a national entity. 'Nation'
    is the most straightforward rendering in context.
- source_word: אֱלֹהִים
  chosen: gods
  alternatives:
  - deities
  lexicon: HALOT
  rationale: Plural reference to the supposed gods of the nations. 'Gods' is the standard
    and clearest English equivalent.
- source_word: וְהֵמָּה לֹא אֱלֹהִים
  chosen: though they are not gods
  alternatives:
  - but they are no gods
  - yet they are not God
  lexicon: HALOT
  rationale: This clause qualifies the nations' gods as non-gods. 'Though they are
    not gods' preserves the concessive force naturally in English and fits the rhetorical
    contrast. Singular 'God' would misrepresent the plural form.
- source_word: וְעַמִּי
  chosen: Yet my people
  alternatives:
  - But my people
  - And my people
  lexicon: HALOT
  rationale: 'The conjunction marks contrast with the previous clause. ''Yet'' brings
    out the irony: pagan nations keep their false gods, but Israel abandons the true
    one.'
- source_word: כְּבוֹדוֹ
  chosen: their Glory
  alternatives:
  - its glory
  - their glorious one
  - their honor
  lexicon: HALOT
  rationale: The singular noun with 3ms suffix is best understood as referring to
    Israel's true object of glory, that is, the LORD, by metonymy/title. Capitalizing
    'Glory' signals that the referent is not abstract honor but God himself as Israel's
    glory, while preserving the Hebrew expression rather than making the referent
    fully explicit in the main text.
- source_word: בְּלֹא יוֹעִיל
  chosen: for what does not profit
  alternatives:
  - for what is useless
  - for that which does not help
  lexicon: HALOT
  rationale: The phrase denotes something that brings no benefit. 'What does not profit'
    is close to the Hebrew and idiomatic enough in modern English, while retaining
    the prophetic tone.
