theological_decisions:
- issue: Referent of 'his/their glory' (כבודו)
  chosen_reading: A reverential title/metonymy for the LORD as the one who is Israel's
    Glory
  alternative_readings:
  - Israel changed its own glory/honor
  - Israel exchanged glory in a more abstract sense
  rationale: In Jeremiah's polemic against idolatry, the contrast is between false
    gods and Israel's true God. Rendering the phrase as 'their Glory' preserves the
    Hebrew idiom while allowing the theological referent to remain clear from context.
    Capitalization helps English readers recognize the title-like force without over-paraphrasing
    to 'the LORD.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
