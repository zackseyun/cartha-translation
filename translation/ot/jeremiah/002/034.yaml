theological_decisions:
- issue: Speaker and object identification in the difficult middle clause
  chosen_reading: 'The LORD speaks in first person: ''I did not find them in a break-in,''
    with ''them'' referring to the innocent poor whose blood is on Judah''s garments.'
  alternative_readings:
  - 'Taking the verb as textually or interpretively adjusted toward second person:
    ''you did not find them breaking in'''
  - Taking the object more generally as evidence of guilt rather than the slain persons
  rationale: The Masoretic pointing supports first person singular with third plural
    object. Retaining the MT avoids unnecessary emendation and preserves the divine
    forensic accusation. The sense is that these poor were not killed in justified
    self-defense against burglars.
