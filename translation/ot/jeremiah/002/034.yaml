id: JER.2.34
reference: Jeremiah 2:34
source:
  edition: WLC
  text: גַּ֤ם בִּ/כְנָפַ֨יִ/ךְ֙ נִמְצְא֔וּ דַּ֛ם נַפְשׁ֥וֹת אֶבְיוֹנִ֖ים נְקִיִּ֑ים
    לֹֽא בַ/מַּחְתֶּ֥רֶת מְצָאתִ֖י/ם כִּ֥י עַל כָּל אֵֽלֶּה־־־׃
translation:
  text: Even on your skirts is found the blood of the lives of innocent poor people.
    I did not find them in a break-in, but on account of all these things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on the hems of your garment'; literally 'in/on your wings.'
    reason: lexical_alternative
  - marker: b
    text: '''In a break-in'' translates a term for a burglary accomplished by digging
      through a wall; compare the legal background in Exodus 22:2.'
    reason: cross_reference
  - marker: c
    text: The Hebrew of the final clause is elliptical and difficult; alternatively,
      'not because I found them breaking in, but for all these things.'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּכְנָפַיִךְ
  chosen: on your skirts
  alternatives:
  - in your wings
  - on the hems of your garment
  lexicon: HALOT
  rationale: כָּנָף literally means wing or extremity, and in clothing contexts refers
    to the edge, hem, or skirt of a garment. Here the image is forensic and concrete,
    so 'skirts' communicates blood found on her clothing better than the more literal
    but misleading 'wings.' 'On' is idiomatic in English for bloodstains on clothing,
    though the Hebrew preposition is 'in/on.'
- source_word: נִמְצְאוּ
  chosen: is found
  alternatives:
  - was found
  - are found
  lexicon: HALOT
  rationale: 'The Hebrew verb is plural (''were found''), agreeing with the plural
    sense of bloodguilt/evidences, but English idiom commonly treats ''blood'' as
    a mass singular: ''blood is found.'' This preserves readability while keeping
    the passive discovery sense.'
- source_word: דַּם נַפְשׁוֹת
  chosen: the blood of the lives of
  alternatives:
  - the lifeblood of
  - the blood of the persons of
  lexicon: HALOT
  rationale: The construction is unusual and emphatic. נֶפֶשׁ here points to persons/lives
    rather than merely 'souls' in a later theological sense. 'The blood of the lives
    of' preserves the Hebrew force more transparently than smoothing to 'lifeblood,'
    while still being intelligible.
- source_word: אֶבְיוֹנִים נְקִיִּים
  chosen: innocent poor people
  alternatives:
  - the innocent needy
  - poor innocents
  lexicon: HALOT
  rationale: אֶבְיוֹנִים denotes the poor/needy, and נְקִיִּים means innocent or guiltless.
    'Poor people' is natural modern English and avoids archaic nominal adjectives;
    'innocent' preserves the legal-moral sense.
- source_word: לֹא בַמַּחְתֶּרֶת
  chosen: in a break-in
  alternatives:
  - in a burglary
  - through a hole made by digging
  lexicon: HALOT
  rationale: מַחְתֶּרֶת refers to a break-in by digging through a wall, hence burglary.
    The phrase alludes to catching a thief in the act, likely echoing legal language.
    'In a break-in' is accessible modern English and preserves the sense without over-literalizing
    the ancient method.
- source_word: מְצָאתִים
  chosen: I did not find them
  alternatives:
  - you did not find them
  - I found them not
  lexicon: HALOT
  rationale: 'The form is first person singular with third person plural object suffix:
    ''I found them.'' The speaker is therefore best taken as the LORD: ''I did not
    find them.'' This is preferable to emending to second person. ''Them'' refers
    to the slain poor/innocent ones.'
- source_word: כִּי עַל כָּל אֵלֶּה
  chosen: but on account of all these things
  alternatives:
  - but because of all these
  - rather, for all these things
  - but despite all these
  lexicon: HALOT
  rationale: 'The clause is elliptical and difficult. The sense is contrastive: the
    bloodshed was not due to catching burglars, but because of all these things—i.e.,
    the broader sins/idolatrous practices just described. ''On account of'' captures
    עַל causally, while ''but'' supplies the contrast implied by the context.'
