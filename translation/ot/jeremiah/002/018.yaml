id: JER.2.18
reference: Jeremiah 2:18
source:
  edition: WLC
  text: וְ/עַתָּ֗ה מַה לָּ/ךְ֙ לְ/דֶ֣רֶךְ מִצְרַ֔יִם לִ/שְׁתּ֖וֹת מֵ֣י שִׁח֑וֹר וּ/מַה
    לָּ/ךְ֙ לְ/דֶ֣רֶךְ אַשּׁ֔וּר לִ/שְׁתּ֖וֹת מֵ֥י נָהָֽר־־׃
translation:
  text: And now, what have you to do with the road to Egypt, to drink the waters of
    Shihor? And what have you to do with the road to Assyria, to drink the waters
    of the River?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shihor is likely a name for the Nile or one of its eastern branches.
    reason: lexical_alternative
  - marker: b
    text: That is, the Euphrates River.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - But now
  - Now
  lexicon: HALOT
  rationale: Introduces a rhetorical transition and present challenge. 'And now' preserves
    the connective force of ו plus the temporal adverb without sounding archaic.
- source_word: מַה לָּךְ
  chosen: what have you to do with
  alternatives:
  - what is it to you
  - why do you go
  lexicon: HALOT
  rationale: This idiom expresses disassociation or rebuke rather than a simple information
    question. 'What have you to do with' preserves the rhetorical force better than
    a flattened paraphrase like 'why do you go.'
- source_word: לְדֶרֶךְ
  chosen: with the road to
  alternatives:
  - on the way to
  - to the ճանապարհ/way of
  - with the way to
  lexicon: HALOT
  rationale: The noun is literally 'road/way.' In this idiom after מַה לָּךְ, the
    sense is involvement with the route or course toward a foreign power. 'Road to'
    keeps the concrete metaphor while reading naturally in English.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: לִשְׁתּוֹת
  chosen: to drink
  lexicon: HALOT
  rationale: Infinitive of purpose, retained directly in English.
- source_word: מֵי שִׁחוֹר
  chosen: the waters of Shihor
  alternatives:
  - the waters of the Nile
  lexicon: HALOT
  rationale: שִׁיחוֹר/Shihor is a proper name, commonly understood as a Nile designation
    or eastern branch associated with Egypt. Per translation philosophy, names are
    transliterated in the main text rather than replaced with an interpretation. The
    interpretive equivalent 'the Nile' is preserved in a footnote.
- source_word: וּמַה לָּךְ
  chosen: And what have you to do with
  alternatives:
  - And what is it to you
  - And why do you go
  lexicon: HALOT
  rationale: Repeats the same rebuking idiom for rhetorical parallelism; English should
    mirror that repetition.
- source_word: אַשּׁוּר
  chosen: Assyria
  lexicon: HALOT
  rationale: Standard rendering of the national name.
- source_word: מֵי נָהָר
  chosen: the waters of the River
  alternatives:
  - the waters of the Euphrates
  lexicon: HALOT
  rationale: נָהָר is singular 'river,' but in this geopolitical context it commonly
    refers to the Euphrates as the great river associated with Assyria. The main text
    keeps the Hebrew expression 'the River' to preserve the source wording and rhetorical
    parallel with Shihor; 'Euphrates' is preserved in a footnote as an interpretive
    identification.
