id: JER.2.9
reference: Jeremiah 2:9
source:
  edition: WLC
  text: לָ/כֵ֗ן עֹ֛ד אָרִ֥יב אִתְּ/כֶ֖ם נְאֻם יְהוָ֑ה וְ/אֶת בְּנֵ֥י בְנֵי/כֶ֖ם אָרִֽיב־־׃
translation:
  text: Therefore I will still contend with you, declares the LORD, and with your
    children's children I will contend.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will contend against you ... and against your children's children.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks a logical conclusion from the preceding indictment; 'Therefore'
    preserves the formal inferential force in natural English.
- source_word: עוֹד
  chosen: still
  alternatives:
  - again
  - yet
  lexicon: HALOT
  rationale: 'Here עוֹד modifies the verb to indicate continued or repeated action.
    ''Still'' fits the judicial tone: YHWH continues his case against them. ''Again''
    is possible, but ''still'' better captures ongoing persistence.'
- source_word: אָרִיב
  chosen: I will contend
  alternatives:
  - I will bring a case
  - I will plead my case
  - I will accuse
  lexicon: HALOT
  rationale: From ריב in covenant-lawsuit/judicial contexts. 'Contend' preserves both
    the legal and adversarial sense without over-specifying courtroom procedure. The
    repetition is retained in English for emphasis.
- source_word: אִתְּכֶם
  chosen: with you
  alternatives:
  - against you
  lexicon: HALOT
  rationale: The preposition את with ריב can imply adversarial engagement. 'With you'
    is the more direct rendering of the Hebrew construction and allows the legal hostility
    to be carried by 'contend' itself; 'against you' is a valid interpretive alternative
    preserved in a footnote.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic modern English
    and preserves prophetic authority. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance
    with DOCTRINE.md.
- source_word: וְאֶת
  chosen: and with
  alternatives:
  - and also with
  lexicon: HALOT
  rationale: Though formally the object marker appears, in this construction with
    ריב the sense is continuation of the same contention toward another party. 'And
    with' is the most natural English rendering.
- source_word: בְּנֵי בְנֵיכֶם
  chosen: your children's children
  alternatives:
  - your grandchildren
  - the children of your children
  lexicon: HALOT
  rationale: A literal familial expression. 'Your children's children' preserves the
    Hebrew wording and rhetorical solemnity better than the more colloquial 'your
    grandchildren'.
