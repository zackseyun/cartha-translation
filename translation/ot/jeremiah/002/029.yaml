id: JER.2.29
reference: Jeremiah 2:29
source:
  edition: WLC
  text: לָ֥/מָּה תָרִ֖יבוּ אֵלָ֑/י כֻּלְּ/כֶ֛ם פְּשַׁעְתֶּ֥ם בִּ֖/י נְאֻם יְהוָֽה־׃
translation:
  text: Why do you contend with me? All of you have rebelled against me, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Why do you dispute with me?' The Hebrew verb can carry the sense of contending, disputing, or bringing a case.
    reason: lexical_alternative
  - marker: b
    text: Or 'have transgressed against me.' The Hebrew verb often has the stronger sense of rebellion or revolt.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Introduces a rhetorical question asking the reason for Israel's behavior. 'Why' is the natural modern English equivalent.
- source_word: תָרִיבוּ
  chosen: do you contend
  alternatives:
  - do you dispute
  - do you strive
  - do you bring a case
  lexicon: HALOT
  rationale: From ריב, which can denote contending, disputing, or litigating. 'Contend' preserves both the confrontational and quasi-legal nuance without sounding overly technical.
- source_word: אֵלַי
  chosen: with me
  alternatives:
  - against me
  - to me
  lexicon: HALOT
  rationale: With ריב, the preposition here is best represented idiomatically in English as 'with me' rather than the more wooden 'to me.' 'Against me' is possible but would over-specify hostility already conveyed by the verb and following clause.
- source_word: כֻּלְּכֶם
  chosen: All of you
  alternatives:
  - you all
  - every one of you
  lexicon: HALOT
  rationale: Emphatic collective address to the whole people. 'All of you' preserves the emphasis in clear modern English.
- source_word: פְּשַׁעְתֶּם
  chosen: have rebelled
  alternatives:
  - have transgressed
  - have revolted
  lexicon: HALOT
  rationale: פשע commonly conveys rebellion or breach of loyalty, not merely generic wrongdoing. 'Have rebelled' best captures the covenantal force of the accusation.
- source_word: בִּי
  chosen: against me
  alternatives:
  - in me
  lexicon: HALOT
  rationale: With פשע, the preposition marks the offended party. English idiom requires 'against me' to express rebellion directed toward God.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic, weighty, and readable. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
