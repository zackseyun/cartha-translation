id: JER.2.37
reference: Jeremiah 2:37
source:
  edition: WLC
  text: גַּ֣ם מֵ/אֵ֥ת זֶה֙ תֵּֽצְאִ֔י וְ/יָדַ֖יִ/ךְ עַל רֹאשֵׁ֑/ךְ כִּֽי מָאַ֤ס יְהֹוָה֙
    בְּ/מִבְטַחַ֔יִ/ךְ וְ/לֹ֥א תַצְלִ֖יחִי לָ/הֶֽם־־׃
translation:
  text: From this one too you will go out with your hands on your head, for the LORD
    has rejected those in whom you trust, and you will not prosper through them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from this'—the demonstrative likely refers to the foreign power just
      mentioned, namely Egypt.
    reason: alternative_reading
  - marker: b
    text: '''With your hands on your head'' is a gesture of grief, shame, or defeat.'
    reason: cultural_note
  - marker: c
    text: Or 'your trusted ones' or 'your objects of trust.' The Hebrew is literally
      'your trusts/confidences.'
    reason: lexical_alternative
  - marker: d
    text: Or 'you will not succeed with them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: too
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: 'Adds the sense of continuation/escalation from the prior context: not
    only from one foreign power, but from this one as well.'
- source_word: מֵאֵת זֶה
  chosen: from this one
  alternatives:
  - from this
  - from him/it
  lexicon: HALOT
  rationale: The phrase literally means 'from with/from this.' In context it refers
    to the foreign ally just mentioned (Egypt), but 'this one' preserves the demonstrative
    force without over-specifying beyond the Hebrew.
- source_word: תֵּצְאִי
  chosen: you will go out
  alternatives:
  - you will depart
  - you will come out
  lexicon: HALOT
  rationale: A straightforward future rendering of יצא in context of leaving a political
    ally in disgrace.
- source_word: וְיָדַיִךְ עַל רֹאשֵׁךְ
  chosen: with your hands on your head
  alternatives:
  - and your hands on your head
  lexicon: HALOT
  rationale: This idiom expresses mourning, shame, or captivity. 'With your hands
    on your head' is natural English while preserving the image.
- source_word: מָאַס
  chosen: has rejected
  alternatives:
  - has despised
  - has refused
  lexicon: HALOT
  rationale: '''Rejected'' best fits covenantal and political context: the LORD has
    repudiated Judah''s objects of trust.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: בְּמִבְטַחַיִךְ
  chosen: those in whom you trust
  alternatives:
  - your trusted ones
  - your objects of trust
  - your confidences
  lexicon: HALOT
  rationale: Though formally 'your trusts/confidences,' the plural likely refers concretely
    to the foreign powers Judah relies on. This rendering makes the referent clear
    in idiomatic English while preserving the relational sense of misplaced trust.
- source_word: תַצְלִיחִי לָהֶם
  chosen: you will not prosper through them
  alternatives:
  - you will not succeed with them
  - you will not prosper by them
  lexicon: HALOT
  rationale: הצליח in Hiphil means to succeed/prosper. The preposition with pronoun
    indicates relation to those trusted allies; 'through them' captures the sense
    that they will not bring Judah success.
