id: JER.2.30
reference: Jeremiah 2:30
source:
  edition: WLC
  text: לַ/שָּׁוְא֙ הִכֵּ֣יתִי אֶת בְּנֵי/כֶ֔ם מוּסָ֖ר לֹ֣א לָקָ֑חוּ אָכְלָ֧ה חַרְבְּ/כֶ֛ם
    נְבִֽיאֵי/כֶ֖ם כְּ/אַרְיֵ֥ה מַשְׁחִֽית־׃
translation:
  text: In vain I struck your sons; they accepted no correction. Your sword devoured
    your prophets like a destroying lion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your children' for 'your sons'; the Hebrew is literally masculine plural
      'your sons.'
    reason: lexical_alternative
  - marker: b
    text: Or 'discipline' or 'instruction' for 'correction'; Hebrew musar can include
      both corrective discipline and moral instruction.
    reason: lexical_alternative
  - marker: c
    text: Or 'like a ravening lion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַשָּׁוְא
  chosen: In vain
  alternatives:
  - For nothing
  - To no purpose
  lexicon: HALOT
  rationale: שָׁוְא here functions adverbially with the prefixed ל, indicating futility
    or lack of result. 'In vain' is idiomatic and preserves the sense that the striking
    produced no intended effect.
- source_word: הִכֵּיתִי
  chosen: I struck
  alternatives:
  - I smote
  - I struck down
  lexicon: HALOT
  rationale: נכה in the Hiphil commonly means 'strike' or 'smite.' 'I struck' is clear
    modern English and avoids archaic diction while not overstating the action as
    killing.
- source_word: בְּנֵיכֶם
  chosen: your sons
  alternatives:
  - your children
  lexicon: HALOT
  rationale: The Hebrew is literally 'your sons.' In prophetic discourse this can
    represent the people more broadly, but the source term is masculine plural construct,
    so 'your sons' best matches the wording. A broader alternative is preserved because
    some English versions generalize the term.
- source_word: מוּסָר
  chosen: correction
  alternatives:
  - discipline
  - instruction
  - chastening
  lexicon: HALOT
  rationale: מוּסָר can denote discipline, correction, or instruction. In this context,
    following divine striking, the emphasis is on corrective discipline received through
    judgment. 'Correction' communicates the intended remedial sense in natural English.
- source_word: לֹא לָקָחוּ
  chosen: they accepted no
  alternatives:
  - they did not receive
  - they took no
  lexicon: HALOT
  rationale: לקח with מוּסָר idiomatically means to receive or accept correction.
    'Accepted no correction' is idiomatic English and captures the volitional refusal
    implied by the context.
- source_word: אָכְלָה
  chosen: devoured
  alternatives:
  - consumed
  - ate up
  lexicon: HALOT
  rationale: אכל is frequently used metaphorically of the sword 'devouring.' 'Devoured'
    preserves the vivid personification and the violence of the image.
- source_word: חַרְבְּכֶם
  chosen: Your sword
  alternatives:
  - the sword among you
  lexicon: HALOT
  rationale: The straightforward possessive 'your sword' is best. In context it refers
    to violence perpetrated by the people, likely against their own prophets.
- source_word: נְבִיאֵיכֶם
  chosen: your prophets
  alternatives:
  - the prophets among you
  lexicon: HALOT
  rationale: The possessive is retained. It likely means prophets sent to or arising
    among the people, and the possessive heightens the irony that they destroyed their
    own prophets.
- source_word: כְּאַרְיֵה מַשְׁחִית
  chosen: like a destroying lion
  alternatives:
  - like a ravening lion
  - like a lion that destroys
  lexicon: HALOT
  rationale: The phrase compares the sword to a lion characterized by destruction.
    'Destroying lion' is a fairly literal rendering; alternatives are possible, but
    this keeps the participial force of מַשְׁחִית without adding interpretive color
    such as 'ravening.'
