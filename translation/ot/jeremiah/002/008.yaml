id: JER.2.8
reference: Jeremiah 2:8
source:
  edition: WLC
  text: הַ/כֹּהֲנִ֗ים לֹ֤א אָֽמְרוּ֙ אַיֵּ֣ה יְהוָ֔ה וְ/תֹפְשֵׂ֤י הַ/תּוֹרָה֙ לֹ֣א
    יְדָע֔וּ/נִי וְ/הָ/רֹעִ֖ים פָּ֣שְׁעוּ בִ֑/י וְ/הַ/נְּבִיאִים֙ נִבְּא֣וּ בַ/בַּ֔עַל
    וְ/אַחֲרֵ֥י לֹֽא יוֹעִ֖לוּ הָלָֽכוּ־׃
translation:
  text: The priests did not say, ‘Where is the LORD?’ Those who handle the law did
    not know me; the shepherds rebelled against me; the prophets prophesied by Baal
    and went after things that do not profit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who wield the law,' 'those who teach the law.' The Hebrew literally
      refers to those who 'handle' or 'grasp' the law.
    reason: lexical_alternative
  - marker: b
    text: Or 'the prophets prophesied in the name of Baal.'
    reason: alternative_reading
  - marker: c
    text: Or 'went after what is useless' or 'walked after things that do not profit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֲנִים
  chosen: the priests
  alternatives:
  - the priesthood
  lexicon: HALOT
  rationale: Concrete plural noun referring to the priestly leaders as a group; 'the
    priests' is the most natural and direct English rendering.
- source_word: אַיֵּה יְהוָה
  chosen: Where is the LORD?
  alternatives:
  - Where is Yahweh?
  lexicon: HALOT
  rationale: Retains the rhetorical question of covenant neglect. Per doctrine, יְהוָה
    is rendered 'the LORD' in the main text, with 'Yahweh' preserved as an alternative
    only in documentation, not in the text.
- source_word: תֹפְשֵׂי הַתּוֹרָה
  chosen: Those who handle the law
  alternatives:
  - those who wield the law
  - those who teach the law
  - those who grasp the law
  lexicon: HALOT
  rationale: The participle from תפשׂ literally denotes taking hold of or handling.
    'Those who handle the law' preserves the concrete metaphor without prematurely
    narrowing the referent to teachers or experts, though such people are likely in
    view.
- source_word: הַתּוֹרָה
  chosen: the law
  alternatives:
  - instruction
  - Torah
  lexicon: HALOT
  rationale: In Jeremiah this can denote Yahweh's revealed instruction more broadly,
    but in this leadership context 'the law' is the most idiomatic and recognizable
    rendering. 'Instruction' is possible but less natural here; 'Torah' would be more
    transliterative than the project's default style requires.
- source_word: לֹא יְדָעוּנִי
  chosen: did not know me
  alternatives:
  - did not acknowledge me
  - did not understand me
  lexicon: HALOT
  rationale: ידע with personal object commonly denotes relational knowledge, not mere
    cognition. 'Did not know me' preserves the covenantal force and the directness
    of the accusation.
- source_word: הָרֹעִים
  chosen: the shepherds
  alternatives:
  - the rulers
  - the leaders
  lexicon: HALOT
  rationale: Although metaphorical for rulers, 'the shepherds' preserves the prophetic
    image and allows readers to see the leadership metaphor present in the Hebrew.
- source_word: פָּשְׁעוּ בִי
  chosen: rebelled against me
  alternatives:
  - transgressed against me
  - revolted against me
  lexicon: HALOT
  rationale: פשע conveys rebellion or revolt, stronger than a generic sin term. 'Rebelled
    against me' best captures the covenantal breach.
- source_word: הַנְּבִיאִים נִבְּאוּ בַבַּעַל
  chosen: the prophets prophesied by Baal
  alternatives:
  - the prophets prophesied in the name of Baal
  - the prophets prophesied through Baal
  lexicon: HALOT
  rationale: The preposition ב can indicate agency or sphere. 'By Baal' is concise
    and preserves the shock of false prophetic allegiance; the more explicit 'in the
    name of Baal' is interpretive and therefore preserved as an alternative.
- source_word: אַחֲרֵי לֹא יוֹעִלוּ הָלָכוּ
  chosen: went after things that do not profit
  alternatives:
  - walked after what does not profit
  - went after useless things
  - followed those who do not profit
  lexicon: HALOT
  rationale: The idiom 'went after' is standard for pursuing idols or false objects
    of trust. The plural verb יוֹעִלוּ with an implicit object is best represented
    by 'things that do not profit,' making explicit the likely impersonal referent
    without over-specifying 'idols' beyond the wording.
