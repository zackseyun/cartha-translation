theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for יְהוָה,
    following Jewish reverence tradition and the Septuagintal pattern. The verse's
    force is preserved without transliterating the name in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to make the final object explicitly 'idols'
  chosen_reading: things that do not profit
  alternative_readings:
  - idols that do not profit
  - what is useless
  rationale: The Hebrew says literally 'after not-profiting [things/ones] they went.'
    Since the object is left implicit, the translation preserves that openness while
    still producing natural English. This avoids importing a more explicit object
    than the text states, even though idols are clearly implied in context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    never paraphrase beyond what the source text warrants'
