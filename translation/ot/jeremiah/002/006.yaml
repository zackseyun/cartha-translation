id: JER.2.6
reference: Jeremiah 2:6
source:
  edition: WLC
  text: וְ/לֹ֣א אָמְר֔וּ אַיֵּ֣ה יְהוָ֔ה הַ/מַּעֲלֶ֥ה אֹתָ֖/נוּ מֵ/אֶ֣רֶץ מִצְרָ֑יִם הַ/מּוֹלִ֨יךְ אֹתָ֜/נוּ בַּ/מִּדְבָּ֗ר בְּ/אֶ֨רֶץ עֲרָבָ֤ה וְ/שׁוּחָה֙ בְּ/אֶ֨רֶץ֙ צִיָּ֣ה וְ/צַלְמָ֔וֶת בְּ/אֶ֗רֶץ לֹֽא עָ֤בַר בָּ/הּ֙ אִ֔ישׁ וְ/לֹֽא יָשַׁ֥ב אָדָ֖ם שָֽׁם־־׃
translation:
  text: They did not say, ‘Where is Yahweh, who brought us up from the land of Egypt, who led us through the wilderness, through a land of desert plain and pit, through a land of drought and deep darkness, through a land where no man passed through and no human dwelt?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shadow of death' for 'deep darkness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַמַּעֲלֶה אֹתָנוּ מֵאֶרֶץ מִצְרַיִם
  chosen: who brought us up from the land of Egypt
  alternatives:
  - who caused us to go up from the land of Egypt
  - who led us up out of the land of Egypt
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly means 'bring up' or 'cause to go up.' In exodus context, 'brought us up from the land of Egypt' is idiomatic and preserves the Hebrew imagery without over-paraphrase.
- source_word: הַמּוֹלִיךְ אֹתָנוּ
  chosen: who led us
  alternatives:
  - who was leading us
  - who guided us
  lexicon: HALOT
  rationale: הלך in the Hiphil here denotes causing to go, hence 'lead.' 'Led' is natural English and fits the sequence of remembered divine acts.
- source_word: בַּמִּדְבָּר
  chosen: through the wilderness
  alternatives:
  - in the wilderness
  - through the desert
  lexicon: HALOT
  rationale: Although the preposition is 'in,' English idiom with a verb of leading naturally takes 'through the wilderness,' expressing movement across the region.
- source_word: עֲרָבָה
  chosen: desert plain
  alternatives:
  - Arabah
  - steppe
  - desert
  lexicon: HALOT
  rationale: ערבה can denote arid steppe/desert plain. 'Desert plain' communicates the terrain in accessible English better than the opaque transliteration 'Arabah' in this context.
- source_word: שׁוּחָה
  chosen: pit
  alternatives:
  - hollow
  - ravine
  lexicon: HALOT
  rationale: The noun denotes a pit or hollow place. 'Pit' is concise and preserves the danger imagery of the wilderness.
- source_word: צִיָּה
  chosen: drought
  alternatives:
  - dryness
  - parched land
  - arid land
  lexicon: HALOT
  rationale: The term refers to dryness/aridity. 'Drought' is vivid and idiomatic in the paired description of hostile terrain, though it carries the sense of severe dryness rather than a meteorological event alone.
- source_word: צַלְמָוֶת
  chosen: deep darkness
  alternatives:
  - shadow of death
  - gloom
  lexicon: HALOT
  rationale: The term can mean deep darkness or death-shadow. In many contexts the sense is intense gloom rather than explicit death; 'deep darkness' best fits the landscape description while avoiding importing a more specific theological nuance. The traditional alternative is preserved in a footnote.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - anyone
  - a person
  lexicon: HALOT
  rationale: Per DOCTRINE.md, gender-accurate rendering is preferred. Here אִישׁ is singular masculine in a representative sense, and 'no man passed through' preserves the Hebrew form and rhythm.
- source_word: אָדָם
  chosen: human
  alternatives:
  - man
  - humankind
  - a human being
  lexicon: HALOT
  rationale: אָדָם here refers generically to a human being. Rendering it as 'human' preserves the distinction from the preceding אִישׁ while communicating the generic sense in natural English.
- source_word: עָבַר בָּהּ
  chosen: passed through
  alternatives:
  - crossed through
  - traveled through
  lexicon: HALOT
  rationale: עבר with ב conveys traversing a place. 'Passed through' is straightforward and matches the desolation motif.
- source_word: יָשַׁב
  chosen: dwelt
  alternatives:
  - lived
  - settled
  lexicon: HALOT
  rationale: ישב often means dwell, sit, or inhabit. 'Dwelt' preserves the elevated tone and the sense of settled habitation.
