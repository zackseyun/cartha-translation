- issue: Rendering of צַלְמָוֶת
  chosen_reading: deep darkness
  alternative_readings:
  - shadow of death
  rationale: The phrase describes the wilderness as a place of extreme peril and gloom. 'Deep darkness' reflects a widely accepted lexical sense in context and avoids overstating an explicit death reference, while the traditional 'shadow of death' remains worth preserving because of its familiarity and possible lexical overlap.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
