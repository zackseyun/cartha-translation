id: JER.2.4
reference: Jeremiah 2:4
source:
  edition: WLC
  text: שִׁמְע֥וּ דְבַר יְהוָ֖ה בֵּ֣ית יַעֲקֹ֑ב וְ/כָֽל מִשְׁפְּח֖וֹת בֵּ֥ית יִשְׂרָאֵֽל־־׃
translation:
  text: Hear the word of Yahweh, O house of Jacob, and all the clans of the house of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'families' or 'clans'; the term refers to kinship groups within Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Qal imperative plural of שׁמע, a direct summons to receive and heed the message. 'Hear' is the standard prophetic idiom in English and preserves the covenantal force better than the more colloquial 'listen to.'
- source_word: דְבַר
  chosen: the word
  alternatives:
  - the message
  lexicon: HALOT
  rationale: 'Construct form of דָּבָר with YHWH: ''the word of the LORD'' is a standard prophetic formula. ''Message'' is possible, but ''word'' better preserves the formulaic and theological resonance.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֵּית יַעֲקֹב
  chosen: O house of Jacob
  alternatives:
  - house of Jacob
  lexicon: HALOT
  rationale: Vocative address to the covenant people. English commonly supplies 'O' in direct prophetic summonses to reflect the address force, even though no separate vocative particle appears in Hebrew.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - even all
  lexicon: HALOT
  rationale: Simple conjunction plus 'all,' linking a second appositional/additional addressee group. 'And all' is the most natural and sufficiently formal rendering.
- source_word: מִשְׁפְּחוֹת
  chosen: the clans
  alternatives:
  - the families
  - the tribes
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת commonly denotes kinship groups or clans. 'Clans' best fits the social-unit sense here; 'families' can sound too narrow and domestic, while 'tribes' is too large and overlaps with a different Hebrew term.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: Retained as 'the house of Israel' to preserve the parallelism with 'house of Jacob' and the covenantal/corporate sense of the expression.
