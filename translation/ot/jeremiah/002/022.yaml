id: JER.2.22
reference: Jeremiah 2:22
source:
  edition: WLC
  text: כִּ֤י אִם תְּכַבְּסִי֙ בַּ/נֶּ֔תֶר וְ/תַרְבִּי לָ֖/ךְ בֹּרִ֑ית נִכְתָּ֤ם עֲוֺנֵ/ךְ֙
    לְ/פָנַ֔/י נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־׃
translation:
  text: For though you wash with natron and use much soap, your guilt is stained before
    me, declares the Lord GOD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with lye' or 'with alkali'; 'natron' refers to a mineral cleansing agent.
    reason: lexical_alternative
  - marker: b
    text: Or 'use much alkali'; the Hebrew refers to an ancient washing substance,
      not necessarily modern soap.
    reason: lexical_alternative
  - marker: c
    text: Or 'your iniquity is marked before me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: For though
  alternatives:
  - Even if
  - Though indeed
  lexicon: HALOT
  rationale: 'The combination introduces a concessive sense here: despite the hypothetical
    action of washing, the following statement still stands. ''For though'' preserves
    both the connective force and the concessive nuance in readable English.'
- source_word: תְּכַבְּסִי
  chosen: you wash
  alternatives:
  - you cleanse
  - you launder
  lexicon: HALOT
  rationale: The verb commonly refers to washing garments, but here it is used metaphorically
    of attempted moral cleansing. 'Wash' is natural English and preserves the concrete
    imagery without overinterpreting.
- source_word: בַּנֶּתֶר
  chosen: with natron
  alternatives:
  - with lye
  - with alkali
  lexicon: HALOT
  rationale: נֶתֶר refers to a mineral cleansing agent, commonly identified as natron
    or soda. 'Natron' is more precise than the generic 'lye,' while still suitable
    in translation; a footnote preserves the more explanatory alternative.
- source_word: וְתַרְבִּי לָךְ
  chosen: and use much
  alternatives:
  - and multiply for yourself
  - and add much for yourself
  lexicon: HALOT
  rationale: The Hiphil of רבה with לָךְ idiomatically conveys using or applying in
    abundance. 'Use much' communicates the sense clearly in modern English without
    woodenly reproducing the Hebrew idiom.
- source_word: בֹּרִית
  chosen: soap
  alternatives:
  - alkali
  - lye
  lexicon: HALOT
  rationale: בֹּרִית denotes a cleansing substance, likely vegetable alkali used for
    washing. 'Soap' is the most accessible modern equivalent, though not identical
    to modern manufactured soap; alternatives are preserved in a footnote.
- source_word: נִכְתָּם
  chosen: is stained
  alternatives:
  - is marked
  - remains stained
  lexicon: HALOT
  rationale: The passive form conveys that the stain remains fixed or marked. In context
    of washing imagery, 'is stained' best preserves the metaphor of indelible defilement.
- source_word: עֲוֺנֵךְ
  chosen: your guilt
  alternatives:
  - your iniquity
  - your wrongdoing
  lexicon: HALOT
  rationale: עָוֹן can denote both wrongdoing and the guilt resulting from it. Here,
    in the context of a stain before God that cannot be washed away, 'guilt' best
    captures the moral liability in view, while 'iniquity' is preserved as an alternative.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in my presence
  - before my face
  lexicon: HALOT
  rationale: The phrase indicates God's direct sight and evaluation. 'Before me' is
    idiomatic and sufficiently weighty.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  chosen: declares the Lord GOD
  alternatives:
  - oracle of the Lord GOD
  - declares the Lord Yahweh
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula. Following the doctrinal default,
    יְהוָה is rendered 'the LORD.' Because אֲדֹנָי precedes it, 'the Lord GOD' is
    the standard English representation that avoids 'Lord LORD' while preserving both
    titles.
