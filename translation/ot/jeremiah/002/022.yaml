theological_decisions:
- issue: Rendering the divine name יְהוָה in the prophetic formula אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord GOD
  rationale: The doctrine excerpt sets the default rendering of יְהוָה as 'the LORD.'
    In the compound title אֲדֹנָי יְהוִה, standard English convention renders the
    phrase 'the Lord GOD' to preserve both elements without awkward duplication. This
    is a translation-form decision rather than a doctrinal reinterpretation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
