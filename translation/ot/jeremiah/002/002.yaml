id: JER.2.2
reference: Jeremiah 2:2
source:
  edition: WLC
  text: הָלֹ֡ךְ וְ/קָֽרָאתָ֩ בְ/אָזְנֵ֨י יְרוּשָׁלִַ֜ם לֵ/אמֹ֗ר כֹּ֚ה אָמַ֣ר יְהוָ֔ה זָכַ֤רְתִּי לָ/ךְ֙ חֶ֣סֶד נְעוּרַ֔יִ/ךְ אַהֲבַ֖ת כְּלוּלֹתָ֑יִ/ךְ לֶכְתֵּ֤/ךְ אַחֲרַ/י֙ בַּ/מִּדְבָּ֔ר בְּ/אֶ֖רֶץ לֹ֥א זְרוּעָֽה׃
translation:
  text: 'Go and proclaim in the hearing of Jerusalem, saying, ‘Thus says Yahweh: I remember for you the faithful love of your youth, the love of your betrothal, when you went after me in the wilderness, in a land not sown.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'steadfast love' for 'faithful love' (חֶסֶד), emphasizing covenant loyalty.
    reason: lexical_alternative
  - marker: b
    text: Or 'the love of your bridal days' for 'the love of your betrothal.' The Hebrew likely refers to Israel's early bride-like devotion to the LORD.
    reason: alternative_reading
lexical_decisions:
- source_word: הָלֹךְ וְקָרָאתָ
  chosen: Go and proclaim
  alternatives:
  - Go and cry out
  - Go and call out
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the command. 'Go and proclaim' captures both movement and public announcement in natural English without overstating volume. 'Cry out' is possible, but 'proclaim' better fits prophetic declaration to Jerusalem.
- source_word: בְאָזְנֵי יְרוּשָׁלִַם
  chosen: in the hearing of Jerusalem
  alternatives:
  - in the ears of Jerusalem
  - to Jerusalem
  lexicon: HALOT
  rationale: Literally 'in the ears of Jerusalem.' 'In the hearing of Jerusalem' preserves the idiom's force while remaining readable. 'Jerusalem' is a metonym for the people/city and should be retained rather than flattened.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Per doctrine, יְהוָה is rendered 'the LORD,' not transliterated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: זָכַרְתִּי לָךְ
  chosen: I remember for you
  alternatives:
  - I remember concerning you
  - I remember you
  lexicon: HALOT
  rationale: The verb means 'remember,' and the dative pronoun is best preserved rather than omitted. 'I remember for you' is slightly marked in English but reflects the Hebrew orientation toward Jerusalem/Israel as the object of remembered covenant affection. Smoother English could omit 'for you,' but that would lose a feature of the source.
- source_word: חֶסֶד
  chosen: faithful love
  alternatives:
  - steadfast love
  - kindness
  - loyalty
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty and affection. 'Faithful love' communicates both relational warmth and constancy in accessible modern English. 'Steadfast love' is traditional and strong, but slightly more archaic in feel for the target audience.
- source_word: נְעוּרַיִךְ
  chosen: your youth
  alternatives:
  - your young days
  lexicon: HALOT
  rationale: Straightforward temporal expression referring metaphorically to Israel's early national relationship with the LORD.
- source_word: אַהֲבַת כְּלוּלֹתָיִךְ
  chosen: the love of your betrothal
  alternatives:
  - the love of your bridal days
  - the love of your wedding
  lexicon: HALOT
  rationale: כְּלוּלֹת likely refers to the period of being a bride/betrothal or bridal state. 'Betrothal' preserves the nuptial metaphor and the premarital/early-marital covenant imagery often associated with Israel's wilderness devotion. 'Bridal days' is possible but less precise.
- source_word: לֶכְתֵּךְ אַחֲרַי
  chosen: when you went after me
  alternatives:
  - your going after me
  - when you followed me
  lexicon: HALOT
  rationale: The infinitive construct with suffix functions temporally here. 'When you went after me' is natural and preserves the metaphor of following the LORD. 'Followed me' is acceptable but slightly smooths over the Hebrew idiom.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is the standard rendering and better evokes Israel''s exodus setting than ''desert,'' which can sound overly geographic and less theological.'
- source_word: בְּאֶרֶץ לֹא זְרוּעָה
  chosen: in a land not sown
  alternatives:
  - in an unsown land
  - in a land where nothing was sown
  lexicon: HALOT
  rationale: A formally close rendering preserves the agricultural image of uncultivated barrenness. 'Unsown land' is possible, but 'a land not sown' better mirrors the Hebrew predicate structure and remains clear.
