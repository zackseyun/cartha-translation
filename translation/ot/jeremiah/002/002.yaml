theological_decisions:
- issue: Marital metaphor for Israel's early relationship to the LORD
  chosen_reading: Retain nuptial language ('the love of your betrothal') without over-interpreting whether this refers strictly to betrothal, wedding, or early marriage.
  alternative_readings:
  - the love of your bridal days
  - the love of your wedding
  rationale: The verse uses covenant-marriage imagery for Israel's early devotion in the exodus period. The translation preserves the metaphorical and theological tension rather than narrowing it to one later doctrinal model of covenant relationship.
  doctrine_reference: Preserve theological tension rather than resolve it.
