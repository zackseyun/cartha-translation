theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the Tetragrammaton as 'the LORD,' following
    the stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of יִפְגְּעוּ in prophetic/intercessory context
  chosen_reading: plead with
  alternative_readings:
  - intercede with
  - entreat
  rationale: The verse challenges alleged prophets to demonstrate genuine access to
    God through effective intercession. 'Plead with' preserves that intercessory force
    without importing a technical theological category beyond the Hebrew.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
