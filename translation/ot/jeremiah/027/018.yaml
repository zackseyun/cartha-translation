id: JER.27.18
reference: Jeremiah 27:18
source:
  edition: WLC
  text: וְ/אִם נְבִאִ֣ים הֵ֔ם וְ/אִם יֵ֥שׁ דְּבַר יְהוָ֖ה אִתָּ֑/ם יִפְגְּעוּ נָא֙
    בַּֽ/יהוָ֣ה צְבָא֔וֹת לְ/בִלְתִּי בֹ֜אוּ הַ/כֵּלִ֣ים הַ/נּוֹתָרִ֣ים בְּ/בֵית יְהוָ֗ה
    וּ/בֵ֨ית מֶ֧לֶךְ יְהוּדָ֛ה וּ/בִ/ירוּשָׁלִַ֖ם בָּבֶֽלָ/ה־־־־־׀־׃פ
translation:
  text: But if they are prophets, and if the word of the LORD is with them, let them
    now plead with the LORD of hosts that the vessels remaining in the house of the
    LORD, in the house of the king of Judah, and in Jerusalem may not go to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let them intercede with the LORD of hosts.' The Hebrew verb can denote
      entreating or interceding.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'come to Babylon'; in English this is naturally rendered 'go to Babylon'
      from the speaker's perspective.
    reason: lexical_alternative
  - marker: c
    text: Or 'the palace of the king of Judah' for 'the house of the king of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional challenge in contrast to the false prophetic
    claim of the previous context. 'But if' brings out the adversative force of the
    discourse connection while preserving the conditional sense.
- source_word: נְבִאִים
  chosen: prophets
  lexicon: HALOT
  rationale: Standard rendering for נביאים; no contextual reason to vary.
- source_word: דְּבַר יְהוָה אִתָּם
  chosen: the word of the LORD is with them
  alternatives:
  - they have the word of the LORD
  - the word of the LORD is with them indeed
  lexicon: HALOT
  rationale: A close rendering of the existential construction plus prepositional
    phrase. 'Is with them' preserves the Hebrew idiom without overinterpreting it.
- source_word: יִפְגְּעוּ נָא בַּיהוָה צְבָאוֹת
  chosen: let them now plead with the LORD of hosts
  alternatives:
  - let them intercede with the LORD of hosts
  - let them entreat the LORD of hosts
  lexicon: HALOT
  rationale: פגע with ב can mean to entreat or intercede. In this context of asking
    God to prevent the temple vessels from being taken, 'plead with' is natural modern
    English and preserves the earnest petitionary sense. 'Now' reflects נָא as a particle
    of urgency/request.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD Almighty
  - Yahweh of hosts
  lexicon: HALOT
  rationale: Traditional and transparent rendering of the title, preserving the military/angelic
    'hosts' imagery better than 'Almighty'.
- source_word: לְבִלְתִּי בֹאוּ
  chosen: that ... may not go
  alternatives:
  - so that ... do not come
  - to prevent ... from going
  lexicon: HALOT
  rationale: Expresses purpose/prevention after the plea. Although בוא literally means
    'come,' with יעד 'Babylon-ward' in this context English idiom prefers 'go to Babylon'
    from the speaker's vantage.
- source_word: הַכֵּלִים הַנּוֹתָרִים
  chosen: the vessels remaining
  alternatives:
  - the remaining vessels
  - the articles left
  lexicon: HALOT
  rationale: Refers to the temple/palace objects not yet deported. 'Vessels' fits
    cultic and royal inventory language in Jeremiah.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: More formally aligned with בֵּית while still clear in English. 'Temple'
    is possible but slightly more interpretive.
- source_word: וּבֵית מֶלֶךְ יְהוּדָה
  chosen: in the house of the king of Judah
  alternatives:
  - in the palace of the king of Judah
  lexicon: HALOT
  rationale: The Hebrew repeats 'house'; rendering it explicitly maintains the parallel
    structure with the house of the LORD. 'Palace' is a valid contextual alternative
    but less formally equivalent.
- source_word: וּבִירוּשָׁלַם
  chosen: and in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative phrase completing the list of places from which
    the vessels could be taken.
- source_word: בָּבֶלָה
  chosen: to Babylon
  alternatives:
  - Babylonward
  lexicon: HALOT
  rationale: The directional he indicates motion toward Babylon. 'To Babylon' is idiomatic
    modern English.
