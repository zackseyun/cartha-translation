id: JER.27.16
reference: Jeremiah 27:16
source:
  edition: WLC
  text: וְ/אֶל הַ/כֹּהֲנִים֩ וְ/אֶל כָּל הָ/עָ֨ם הַ/זֶּ֜ה דִּבַּ֣רְתִּי לֵ/אמֹ֗ר כֹּה֮ אָמַ֣ר יְהוָה֒ אַֽל תִּשְׁמְע֞וּ אֶל דִּבְרֵ֣י נְבִֽיאֵי/כֶ֗ם הַֽ/נִּבְּאִ֤ים לָ/כֶם֙ לֵ/אמֹ֔ר הִנֵּ֨ה כְלֵ֧י בֵית יְהוָ֛ה מוּשָׁבִ֥ים מִ/בָּבֶ֖לָ/ה עַתָּ֣ה מְהֵרָ֑ה כִּ֣י שֶׁ֔קֶר הֵ֖מָּה נִבְּאִ֥ים לָ/כֶֽם־־־־־־׃
translation:
  text: 'And to the priests and to all this people I spoke, saying, “Thus says Yahweh: Do not listen to the words of your prophets who are prophesying to you, saying, ‘Behold, the vessels of the house of Yahweh are being brought back from Babylon now, quickly,’ for they are prophesying falsely to you.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “are being returned from Babylon very soon.” The Hebrew says literally, “now, quickly,” emphasizing the immediacy claimed by the false prophets.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶל ... וְאֶל
  chosen: And to ... and to
  alternatives:
  - Then to ... and to
  - Also to ... and to
  lexicon: HALOT
  rationale: Preserves the repeated preposition and conjunction, reflecting the Hebrew discourse flow without over-smoothing.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  alternatives:
  - the priesthood
  lexicon: HALOT
  rationale: Concrete plural noun referring to the priestly group addressed, not the institution abstractly.
- source_word: כָּל הָעָם הַזֶּה
  chosen: all this people
  alternatives:
  - all these people
  - all the people
  lexicon: HALOT
  rationale: Retains the singular collective sense of עָם with the demonstrative 'this.' 'All these people' would shift to a pluralized English sense not present in the Hebrew.
- source_word: דִּבַּרְתִּי לֵאמֹר
  chosen: I spoke, saying
  alternatives:
  - I said
  - I spoke as follows
  lexicon: HALOT
  rationale: Keeps the formal prophetic narrative style and reflects both the finite verb and the infinitive construction.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic formula. 'the LORD' follows the project's required rendering of YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by DOCTRINE.md contested terms table for the divine name.
- source_word: אַל תִּשְׁמְעוּ אֶל
  chosen: Do not listen to
  alternatives:
  - Do not hear
  - Do not pay attention to
  lexicon: HALOT
  rationale: Idiomatic English for the Hebrew prohibition with שמע plus אֶל, conveying heed/listening rather than mere auditory perception.
- source_word: דִּבְרֵי נְבִיאֵיכֶם
  chosen: the words of your prophets
  alternatives:
  - the message of your prophets
  - what your prophets say
  lexicon: HALOT
  rationale: Maintains the lexical concreteness of 'words' and the possessive relation in Hebrew.
- source_word: הַנִּבְּאִים לָכֶם
  chosen: who are prophesying to you
  alternatives:
  - who prophesy to you
  - who are acting as prophets for you
  lexicon: HALOT
  rationale: The participle conveys ongoing activity; 'to you' is retained rather than softened to 'for you,' since the speech is directed toward the audience.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Uses readable modern English while preserving the deictic force of the particle.
- source_word: כְלֵי בֵית יְהוָה
  chosen: the vessels of the house of the LORD
  alternatives:
  - the articles of the house of the LORD
  - the temple vessels of the LORD
  lexicon: HALOT
  rationale: '''Vessels'' is a natural rendering for cultic objects and preserves the temple-house expression without collapsing it into ''temple'' in the main text.'
- source_word: מוּשָׁבִים
  chosen: are being brought back
  alternatives:
  - are being returned
  - will be returned
  lexicon: HALOT
  rationale: Hophal participle of שוב indicates passive/causative restoration. 'Are being brought back' captures the passive sense and fits the false prophets' imminent claim. 'Will be returned' is possible but weakens the present/imminent force.
- source_word: מִבָּבֶלָה
  chosen: from Babylon
  alternatives:
  - out of Babylon
  lexicon: HALOT
  rationale: Standard geographic rendering.
- source_word: עַתָּה מְהֵרָה
  chosen: now, quickly
  alternatives:
  - soon
  - very soon
  - at once
  lexicon: HALOT
  rationale: Preserves both adverbial elements rather than compressing them into a single English adverb. The false prophecy stresses immediacy and speed.
- source_word: כִּי שֶׁקֶר הֵמָּה נִבְּאִים לָכֶם
  chosen: for they are prophesying a lie to you
  alternatives:
  - for they prophesy falsely to you
  - for it is a lie that they are prophesying to you
  lexicon: HALOT
  rationale: Treats שֶׁקֶר as the content/object of the prophecy ('a lie'), which is straightforward and forceful in English. Retains the participial ongoing aspect.
