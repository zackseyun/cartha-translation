id: JER.27.19
reference: Jeremiah 27:19
source:
  edition: WLC
  text: כִּ֣י כֹ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת אֶל הָֽ/עַמֻּדִ֔ים וְ/עַל הַ/יָּ֖ם וְ/עַל הַ/מְּכֹנ֑וֹת וְ/עַל֙ יֶ֣תֶר הַ/כֵּלִ֔ים הַ/נּוֹתָרִ֖ים בָּ/עִ֥יר הַ/זֹּֽאת־־־׃
translation:
  text: 'For thus says Yahweh of Armies concerning the pillars, the Sea, the stands, and the rest of the vessels that remain in this city:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bronze Sea,' the large basin in the temple furnishings.
    reason: cultural_note
  - marker: b
    text: Or 'bases' for 'stands.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding statement; 'For' fits the discourse connection naturally in English.
- source_word: כֹה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  - thus said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Present tense 'says' is idiomatic in English for ongoing scriptural speech.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of Hosts
  - of Heaven's Armies
  lexicon: HALOT
  rationale: Translates the title rather than preserving the traditional but less transparent 'Hosts.' 'Armies' is clear and reflects the underlying military/plural sense.
- source_word: אֶל
  chosen: concerning
  alternatives:
  - to
  - about
  lexicon: HALOT
  rationale: Here the preposition introduces the subject matter of the divine declaration rather than direct address to inanimate objects; 'concerning' best fits the syntax and sense.
- source_word: הָעַמֻּדִים
  chosen: the pillars
  alternatives:
  - the columns
  lexicon: HALOT
  rationale: Refers to the temple pillars; 'pillars' is the conventional and clear architectural term.
- source_word: הַיָּם
  chosen: the Sea
  alternatives:
  - the bronze sea
  - the basin
  lexicon: HALOT
  rationale: This is the named temple furnishing commonly called 'the Sea.' Capitalization signals the specific cultic object without over-expanding the Hebrew.
- source_word: הַמְּכֹנוֹת
  chosen: the stands
  alternatives:
  - the bases
  - the carts
  lexicon: HALOT
  rationale: Refers to the movable stands/bases associated with temple vessels. 'Stands' is a readable rendering that avoids over-specification while matching the likely function.
- source_word: יֶתֶר הַכֵּלִים
  chosen: the rest of the vessels
  alternatives:
  - the remainder of the articles
  - the rest of the utensils
  lexicon: HALOT
  rationale: יֶתֶר denotes what remains; כֵּלִים is a broad term for objects/implements. 'Vessels' fits temple inventory context well.
- source_word: הַנּוֹתָרִים
  chosen: that remain
  alternatives:
  - left
  - remaining
  lexicon: HALOT
  rationale: A relative clause is smoother in English and preserves the participial sense.
- source_word: בָּעִיר הַזֹּאת
  chosen: in this city
  alternatives:
  - in the city הזאת
  - in this town
  lexicon: HALOT
  rationale: Straightforward locative phrase; 'city' is the natural rendering for עִיר here, referring to Jerusalem.
