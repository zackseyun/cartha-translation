  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering צְבָאוֹת in the divine title
  chosen_reading: of Armies
  alternative_readings:
  - of Hosts
  - of Heaven's Armies
  rationale: The title is translated for meaning and readability. 'Of Armies' preserves the concrete sense of צְבָאוֹת better than the traditional but opaque 'Hosts.'
