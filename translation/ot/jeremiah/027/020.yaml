id: JER.27.20
reference: Jeremiah 27:20
source:
  edition: WLC
  text: אֲשֶׁ֣ר לֹֽא לְקָחָ֗/ם נְבֽוּכַדְנֶאצַּר֙ מֶ֣לֶךְ בָּבֶ֔ל בַּ֠/גְלוֹת/וֹ אֶת
    יְכָונְיָ֨ה בֶן יְהוֹיָקִ֧ים מֶֽלֶךְ יְהוּדָ֛ה מִ/ירֽוּשָׁלִַ֖ם בָּבֶ֑לָ/ה וְ/אֵ֛ת
    כָּל חֹרֵ֥י יְהוּדָ֖ה וִ/ירוּשָׁלִָֽם־־־־־׃ס
translation:
  text: which Nebuchadnezzar king of Babylon did not take when he exiled Jeconiah
    son of Jehoiakim, king of Judah, from Jerusalem to Babylon, along with all the
    nobles of Judah and Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jechoniah'; Hebrew 'Jeconiah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when he carried into exile.'
    reason: lexical_alternative
  - marker: c
    text: '''Nobles'' may also be rendered ''officials'' or ''leading men.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative pronoun referring back to the temple vessels in the previous
    verse; 'which' is natural and sufficiently formal in English.
- source_word: לֹא לְקָחָם
  chosen: did not take
  alternatives:
  - had not taken
  lexicon: HALOT
  rationale: Qal perfect with negation recounts a past historical action. English
    simple past fits the narrative sequence better than pluperfect here.
- source_word: נְבוּכַדְנֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  rationale: Standard English transliteration. Although Jeremiah often reflects a
    form closer to 'Nebuchadrezzar,' the consonantal form here supports the familiar
    English 'Nebuchadnezzar,' which is widely recognized.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: Straightforward construct chain; retained formally.
- source_word: בַּגְלוֹתוֹ
  chosen: when he exiled
  alternatives:
  - when he carried into exile
  - at his exiling
  lexicon: HALOT
  rationale: The infinitive construct with prefixed beth is temporal, 'when/in the
    act of exiling.' 'Exiled' is concise modern English and preserves the deportation
    sense of גלה in this context.
- source_word: יְכָונְיָה
  chosen: Jeconiah
  alternatives:
  - Jechoniah
  - Coniah
  rationale: Jeconiah is the standard English form for this royal name in this context
    and distinguishes it from the shortened 'Coniah' used elsewhere.
- source_word: בֶן יְהוֹיָקִים
  chosen: son of Jehoiakim
  rationale: Literal filial designation; no reason to paraphrase.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Appositional identification of Jeconiah; retained directly.
- source_word: מִירוּשָׁלִַם בָּבֶלָה
  chosen: from Jerusalem to Babylon
  alternatives:
  - from Jerusalem into Babylon
  lexicon: HALOT
  rationale: The pair of directional phrases marks movement from origin to destination.
    'To Babylon' is idiomatic English for the directional he locale ending.
- source_word: וְאֵת כָּל חֹרֵי יְהוּדָה וִירוּשָׁלִָם
  chosen: along with all the nobles of Judah and Jerusalem
  alternatives:
  - and all the officials of Judah and Jerusalem
  - and all the freemen of Judah and Jerusalem
  lexicon: HALOT
  rationale: חֹרִים/חֹרֵי in royal-political contexts refers to nobles or high-ranking
    men. 'Nobles' best fits the social-political sense here better than the broader
    'officials.' 'Along with' makes explicit that these persons were deported with
    Jeconiah.
