id: JER.27.11
reference: Jeremiah 27:11
source:
  edition: WLC
  text: וְ/הַ/גּ֗וֹי אֲשֶׁ֨ר יָבִ֧יא אֶת צַוָּאר֛/וֹ בְּ/עֹ֥ל מֶֽלֶךְ בָּבֶ֖ל וַֽ/עֲבָד֑/וֹ
    וְ/הִנַּחְתִּ֤י/ו עַל אַדְמָת/וֹ֙ נְאֻם יְהוָ֔ה וַֽ/עֲבָדָ֖/הּ וְ/יָ֥שַׁב בָּֽ/הּ־־־־׃
translation:
  text: But the nation that brings its neck under the yoke of the king of Babylon
    and serves him, I will let remain on its own land, declares the LORD, and it will
    work it and dwell in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will leave it on its land' or 'I will let it rest on its land.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'and it will work it,' that is, the land; alternatively, 'cultivate
      it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגּוֹי
  chosen: the nation
  alternatives:
  - the people
  - the nation-state
  lexicon: HALOT
  rationale: גּוֹי commonly denotes a nation/people group. In this context of international
    submission to Babylon, 'nation' best fits the political sense.
- source_word: יָבִיא אֶת צַוָּארוֹ בְּעֹל
  chosen: brings its neck under the yoke
  alternatives:
  - puts its neck into the yoke
  - submits to the yoke
  lexicon: HALOT
  rationale: The idiom is concrete and vivid in Hebrew. 'Brings its neck under the
    yoke' preserves the imagery better than a flattened 'submits,' while remaining
    natural English.
- source_word: עֹל
  chosen: yoke
  alternatives:
  - burden
  lexicon: HALOT
  rationale: The literal image of political subjugation is central in Jeremiah 27;
    'yoke' should be retained.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  lexicon: HALOT
  rationale: Straightforward construct chain; standard rendering.
- source_word: וַעֲבָדוֹ
  chosen: and serves him
  alternatives:
  - and becomes his servant
  - and works for him
  lexicon: HALOT
  rationale: עבד here refers to political servitude/service to the Babylonian king.
    'Serves him' is idiomatic and sufficiently broad to include vassalage.
- source_word: וְהִנַּחְתִּיו עַל אַדְמָתוֹ
  chosen: I will let remain on its own land
  alternatives:
  - I will leave it on its land
  - I will let it rest on its land
  lexicon: HALOT
  rationale: The hiphil of נוח/נחח here conveys causing to remain/stay undisturbed
    in place. 'Let remain' communicates permission to stay rather than physical rest
    alone. 'Own land' makes the possessive explicit in natural English.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. Per doctrine, יְהוָה is rendered
    'the LORD.' 'Declares' fits נְאֻם well in readable modern English.
- source_word: וַעֲבָדָהּ
  chosen: and it will work it
  alternatives:
  - and cultivate it
  - and serve it
  lexicon: HALOT
  rationale: The feminine suffix refers to the land. The verb עבד with land can mean
    work/cultivate it. 'Work it' is slightly more formal-literal and preserves the
    lexical link with the earlier 'serves him,' while context makes the object agricultural.
- source_word: וְיָשַׁב בָּהּ
  chosen: and dwell in it
  alternatives:
  - and live in it
  - and settle in it
  lexicon: HALOT
  rationale: ישב commonly means dwell/live/settle. 'Dwell in it' fits the elevated
    prophetic register and parallels the promise of remaining in the land.
