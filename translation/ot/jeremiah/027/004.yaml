id: JER.27.4
reference: Jeremiah 27:4
source:
  edition: WLC
  text: וְ/צִוִּיתָ֣ אֹתָ֔/ם אֶל אֲדֹֽנֵי/הֶ֖ם לֵ/אמֹ֑ר כֹּֽה אָמַ֞ר יְהוָ֤ה צְבָאוֹת֙
    אֱלֹהֵ֣י יִשְׂרָאֵ֔ל כֹּ֥ה תֹֽאמְר֖וּ אֶל אֲדֹֽנֵי/כֶֽם־־־׃
translation:
  text: 'And command them to say to their masters, ‘Thus says the LORD of hosts, the
    God of Israel: Thus you shall say to your masters,’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to their lords' / 'to your lords.' Here the term refers to human
      rulers, so 'masters' is used to avoid confusion with the divine title 'Lord.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצִוִּיתָ
  chosen: And command
  alternatives:
  - And you shall command
  - And instruct
  lexicon: HALOT
  rationale: Second masculine singular perfect with prefixed conjunction in instructional
    sequence; rendered as an imperative-like future command in English for naturalness
    in context, since Jeremiah is being told what to do next.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring to the envoys mentioned in the surrounding
    context.
- source_word: אֶל אֲדֹנֵיהֶם
  chosen: to their masters
  alternatives:
  - to their lords
  lexicon: HALOT
  rationale: אדון can mean 'lord' or 'master.' Here it refers to the political superiors
    of the messengers, that is, their kings, so 'masters' communicates human authority
    without confusing the phrase with a divine title.
- source_word: לֵאמֹר
  chosen: to say
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Standard infinitive introducing the content of the command; 'to say'
    fits smooth modern English after 'command them.'
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; present-tense English is standard
    and idiomatic for Hebrew prophetic speech.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the fixed title יְהוָה צְבָאוֹת, 'of hosts' preserves the traditional
    sense of heavenly armies while remaining recognizable in English Bible style.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly as a covenantal title.
- source_word: כֹּה תֹּאמְרוּ
  chosen: Thus you shall say
  alternatives:
  - Thus you are to say
  - This is what you shall say
  lexicon: HALOT
  rationale: Second masculine plural addresses the envoys collectively; 'shall say'
    preserves the directive force.
- source_word: אֶל אֲדֹנֵיכֶם
  chosen: to your masters
  alternatives:
  - to your lords
  lexicon: HALOT
  rationale: Same noun as earlier in the verse, now with second plural suffix; consistency
    favors 'masters' for human rulers represented by the envoys.
