id: JER.27.21
reference: Jeremiah 27:21
source:
  edition: WLC
  text: כִּ֣י כֹ֥ה אָמַ֛ר יְהוָ֥ה צְבָא֖וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֑ל עַל הַ/כֵּלִ֗ים הַ/נּֽוֹתָרִים֙ בֵּ֣ית יְהוָ֔ה וּ/בֵ֥ית מֶֽלֶךְ יְהוּדָ֖ה וִ/ירוּשָׁלִָֽם־־׃
translation:
  text: 'For thus says Yahweh of hosts, the God of Israel, concerning the vessels that remain in the house of Yahweh, in the house of the king of Judah, and in Jerusalem:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of the LORD' for 'the house of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the palace of the king of Judah' for 'the house of the king of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces and grounds the preceding statement, so 'For' best preserves the connective force in natural English.
- source_word: כֹה אָמַר
  chosen: thus says
  alternatives:
  - thus said
  - this is what ... says
  lexicon: HALOT
  rationale: The prophetic messenger formula is conventionally and accurately rendered 'thus says' in present-tense English, reflecting the performative force of the Hebrew perfect in prophetic speech.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the standard concise rendering and preserves the breadth of heavenly and earthly armies better than the narrower 'of armies'.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: A straightforward construct rendering; this covenantal title should be translated transparently.
- source_word: עַל
  chosen: concerning
  alternatives:
  - about
  - regarding
  - against
  lexicon: HALOT
  rationale: In this context introducing the topic of the divine utterance, עַל is best rendered 'concerning' rather than the more adversative 'against'.
- source_word: הַכֵּלִים
  chosen: the vessels
  alternatives:
  - the articles
  - the utensils
  lexicon: HALOT
  rationale: Given the temple context, 'vessels' is the most natural and established English term for cultic objects without over-specifying their function.
- source_word: הַנּוֹתָרִים
  chosen: that remain
  alternatives:
  - remaining
  - left over
  lexicon: HALOT
  rationale: The participle denotes those objects still left in place after earlier removals; 'that remain' is clear and idiomatic in English.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of the LORD.' While it refers to the temple, retaining 'house' preserves the Hebrew expression and its resonance.
- source_word: וּבֵית מֶלֶךְ יְהוּדָה
  chosen: and in the house of the king of Judah
  alternatives:
  - and in the palace of the king of Judah
  lexicon: HALOT
  rationale: The Hebrew repeats 'house.' 'Palace' is interpretive and possible, but 'house' better preserves the lexical repetition across locations.
- source_word: וִירוּשָׁלִָם
  chosen: and in Jerusalem
  alternatives:
  - and Jerusalem
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition are best made explicit in English as 'and in Jerusalem,' matching the series of locations.
