id: JER.27.13
reference: Jeremiah 27:13
source:
  edition: WLC
  text: לָ֤/מָּה תָמ֨וּתוּ֙ אַתָּ֣ה וְ/עַמֶּ֔/ךָ בַּ/חֶ֖רֶב בָּ/רָעָ֣ב וּ/בַ/דָּ֑בֶר֙
    כַּֽ/אֲשֶׁר֙ דִּבֶּ֣ר יְהוָ֔ה אֶל הַ/גּ֕וֹי אֲשֶׁ֥ר לֹֽא יַעֲבֹ֖ד אֶת מֶ֥לֶךְ
    בָּבֶֽל־־־׃
translation:
  text: Why will you and your people die by the sword, by famine, and by pestilence,
    just as the LORD has spoken concerning the nation that will not serve the king
    of Babylon?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plague' for 'pestilence.' The Hebrew term דֶּבֶר commonly denotes epidemic
      disease in judgment contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  chosen: Why
  alternatives:
  - Why should
  lexicon: HALOT
  rationale: Standard interrogative adverb introducing Jeremiah's rhetorical warning.
    'Why' preserves the direct force without adding modal nuance.
- source_word: תָמוּתוּ ... אַתָּה וְעַמְּךָ
  chosen: will you and your people die
  alternatives:
  - do you and your people die
  - should you and your people die
  lexicon: HALOT
  rationale: The verb is 2mp while אַתָּה is singular, a common shift addressing the
    king together with his people. English smooths this as 'you and your people.'
    Future 'will ... die' fits the warning context better than a simple present.
- source_word: בַּחֶרֶב בָּרָעָב וּבַדָּבֶר
  chosen: by the sword, by famine, and by pestilence
  alternatives:
  - by sword, famine, and plague
  - by war, famine, and pestilence
  lexicon: HALOT
  rationale: This is the familiar triad of covenant/judgment disasters. 'Sword' is
    retained literally rather than generalized to 'war.' דֶּבֶר is rendered 'pestilence'
    to preserve the formal prophetic register; 'plague' is possible but slightly less
    specific in this stock phrase.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison with the LORD's prior declaration. 'Just as' gives
    the rhetorical force of correspondence.
- source_word: דִּבֶּר יְהוָה
  chosen: the LORD has spoken
  alternatives:
  - the LORD spoke
  - the LORD has said
  lexicon: HALOT
  rationale: The perfect verb refers to what the LORD has already declared. Present
    perfect in English captures prior speech with continuing relevance. Per doctrine,
    יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance
    with the doctrine table.
- source_word: אֶל הַגּוֹי
  chosen: concerning the nation
  alternatives:
  - to the nation
  - against the nation
  lexicon: HALOT
  rationale: 'Although אֶל often means ''to,'' in English ''spoken concerning the
    nation'' best fits the sense here: a pronouncement about what will happen to any
    nation refusing Babylon''s king. ''Against'' is interpretive; ''to'' is possible
    but less natural with the following relative clause.'
- source_word: הַגּוֹי
  chosen: the nation
  alternatives:
  - the people
  - the kingdom
  lexicon: HALOT
  rationale: גּוֹי here is a political-national entity, not merely an ethnic people.
    'Nation' best matches the context of international submission to Babylon.
- source_word: אֲשֶׁר לֹא יַעֲבֹד
  chosen: that will not serve
  alternatives:
  - which does not serve
  - that refuses to serve
  lexicon: HALOT
  rationale: Imperfect verb in a general conditional-like description of any nation
    that does not submit. 'Will not serve' preserves both futurity and volitional
    refusal without overparaphrasing.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: Standard construct rendering; formal and clear in prophetic context.
