id: JER.27.12
reference: Jeremiah 27:12
source:
  edition: WLC
  text: וְ/אֶל צִדְקִיָּ֤ה מֶֽלֶךְ יְהוּדָה֙ דִּבַּ֔רְתִּי כְּ/כָל הַ/דְּבָרִ֥ים הָ/אֵ֖לֶּה
    לֵ/אמֹ֑ר הָבִ֨יאוּ אֶת צַוְּארֵי/כֶ֜ם בְּ/עֹ֣ל מֶֽלֶךְ בָּבֶ֗ל וְ/עִבְד֥וּ אֹת֛/וֹ
    וְ/עַמּ֖/וֹ וִֽ/חְיֽוּ־־־־־׃
translation:
  text: And to Zedekiah king of Judah I spoke according to all these words, saying,
    “Bring your necks under the yoke of the king of Babylon, and serve him and his
    people, and live.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Bring your necks into the yoke of the king of Babylon.”
    reason: lexical_alternative
  - marker: b
    text: '“And live” may also be understood consequentially: “and you will live”
      or “so that you may live.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבַּרְתִּי
  chosen: I spoke
  alternatives:
  - I said
  lexicon: HALOT
  rationale: The verb דבר in the piel commonly means 'speak.' 'I spoke' preserves
    the verbal distinction from the following לֵאמֹר ('saying') better than 'I said.'
- source_word: כְּכָל הַדְּבָרִים הָאֵלֶּה
  chosen: according to all these words
  alternatives:
  - all these things
  - all these words
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the explicit lexical link to
    'words' (דברים) and the comparative/prepositional force of כְּ. 'According to
    all these words' is slightly wooden but auditable and clear enough in context.
- source_word: הָבִיאוּ
  chosen: Bring
  alternatives:
  - Submit
  - Put
  lexicon: HALOT
  rationale: The hiphil imperative of בוא literally means 'bring.' Although the sense
    is idiomatic ('put/bring under'), retaining 'bring' avoids over-interpreting the
    metaphor as mere abstraction.
- source_word: צַוְּארֵיכֶם
  chosen: your necks
  alternatives:
  - your neck
  lexicon: HALOT
  rationale: The Hebrew is plural with 2mp suffix. English can use singular collectively,
    but 'your necks' better reflects the plural addressees and imagery.
- source_word: בְּעֹל מֶלֶךְ בָּבֶל
  chosen: under the yoke of the king of Babylon
  alternatives:
  - into the yoke of the king of Babylon
  - in the yoke of the king of Babylon
  lexicon: HALOT
  rationale: English idiom prefers 'under the yoke' for subjugation. This brings out
    the metaphor naturally while remaining close to the Hebrew image.
- source_word: וְעִבְדוּ אֹתוֹ
  chosen: and serve him
  alternatives:
  - and work for him
  - and become subject to him
  lexicon: HALOT
  rationale: עבד here denotes political servitude/service to the Babylonian king.
    'Serve him' is the standard and sufficiently broad rendering.
- source_word: וְעַמּוֹ
  chosen: and his people
  alternatives:
  - and his nation
  lexicon: HALOT
  rationale: עם normally means 'people.' In context it likely refers to the Babylonian
    populace/kingdom under the king's authority; 'his people' is the most direct rendering.
- source_word: וִחְיוּ
  chosen: and live
  alternatives:
  - so that you may live
  - and you will live
  lexicon: HALOT
  rationale: The waw + imperative sequence can carry a consequential nuance, but the
    Hebrew form is simply imperative/jussive-like in sequence. 'And live' preserves
    the terseness and urgency without forcing either result or purpose.
- source_word: צִדְקִיָּה
  chosen: Zedekiah
  lexicon: standard transliteration
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: A straightforward construct rendering; no reason to expand or paraphrase.
