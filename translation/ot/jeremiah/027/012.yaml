theological_decisions:
- issue: Political submission language under Babylonian rule
  chosen_reading: Render the command in straightforward political terms without softening
    or theologizing it.
  alternative_readings:
  - Paraphrase as general humility or spiritual submission
  rationale: The verse is a concrete prophetic command to submit to Babylonian domination
    as divine judgment. The translation should preserve that historical-political
    force and not generalize it into a broader spiritual principle.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
