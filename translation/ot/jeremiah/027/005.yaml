theological_decisions:
- issue: Rendering of אָדָם in a generic-singular creation context
  chosen_reading: the man
  alternative_readings:
  - humankind
  - humanity
  rationale: The doctrine file specifies אדם as 'man / humankind' depending on context,
    with gender-accurate rendering preferred. Because the Hebrew is singular and echoes
    creation language, 'the man' preserves the form and representative force better
    than an abstract collective. The generic sense can be preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms table for אָדָם'
