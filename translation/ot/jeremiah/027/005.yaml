id: JER.27.5
reference: Jeremiah 27:5
source:
  edition: WLC
  text: אָנֹכִ֞י עָשִׂ֣יתִי אֶת הָ/אָ֗רֶץ אֶת הָ/אָדָ֤ם וְ/אֶת הַ/בְּהֵמָה֙ אֲשֶׁר֙
    עַל פְּנֵ֣י הָ/אָ֔רֶץ בְּ/כֹחִ/י֙ הַ/גָּד֔וֹל וּ/בִ/זְרוֹעִ֖/י הַ/נְּטוּיָ֑ה וּ/נְתַתִּ֕י/הָ
    לַ/אֲשֶׁ֖ר יָשַׁ֥ר בְּ/עֵינָֽ/י־־־־׃
translation:
  text: I myself made the earth, the man, and the animals that are on the face of
    the earth, by my great power and by my outstretched arm, and I give it to whomever
    seems right in my eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind' or 'humanity' for 'the man'; the Hebrew singular אָדָם can
      function representatively for the human race.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָנֹכִי
  chosen: I myself
  alternatives:
  - I
  - I am the one who
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis beyond the verbal subject already
    present in עָשִׂיתִי. 'I myself' preserves that emphasis in natural English.
- source_word: עָשִׂיתִי
  chosen: made
  alternatives:
  - have made
  - created
  lexicon: HALOT
  rationale: עשה commonly means 'make/do.' 'Made' is the plain sense here. 'Created'
    would import ברא-style creation language not used in this verse.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: In this cosmic statement paired with humanity and animals on the face
    of the earth, 'earth' fits better than the more localized 'land'.
- source_word: הָאָדָם
  chosen: the man
  alternatives:
  - humankind
  - mankind
  - humanity
  lexicon: HALOT
  rationale: The noun is singular with the article. Per doctrine, אדם is rendered
    'man / humankind' according to context. Here, in a creation-formula-like triad
    ('the earth, the man, and the animals'), 'the man' best reflects the singular
    Hebrew while still representing humanity generically.
- source_word: הַבְּהֵמָה
  chosen: the animals
  alternatives:
  - the beasts
  - the cattle
  - the livestock
  lexicon: HALOT
  rationale: Though singular in Hebrew as a collective, English naturally uses the
    plural collective 'animals' here. 'Beasts' sounds archaic; 'cattle/livestock'
    is too narrow for the broad creation context.
- source_word: אֲשֶׁר עַל־פְּנֵי הָאָרֶץ
  chosen: that are on the face of the earth
  alternatives:
  - that are on the earth
  - that are upon the earth
  lexicon: HALOT
  rationale: '''On the face of the earth'' preserves the Hebrew idiom and its elevated
    register while remaining understandable.'
- source_word: בְּכֹחִי הַגָּדוֹל
  chosen: by my great power
  alternatives:
  - with my great power
  lexicon: HALOT
  rationale: Instrumental ב is well rendered 'by' here, expressing means. 'Great power'
    is straightforward and idiomatic.
- source_word: וּבִזְרוֹעִי הַנְּטוּיָה
  chosen: and by my outstretched arm
  alternatives:
  - and with my outstretched arm
  - and by my extended arm
  lexicon: HALOT
  rationale: A standard biblical anthropomorphic idiom for divine power in action.
    'Outstretched arm' is the established and accurate English equivalent.
- source_word: וּנְתַתִּיהָ
  chosen: and I give it
  alternatives:
  - and I have given it
  - and I gave it
  lexicon: HALOT
  rationale: 'The qatal following the creation statement can express a present/general
    sovereign prerogative in context: God declares his right to assign the earth/land.
    ''I give it'' communicates that ongoing authority better than a simple past in
    English.'
- source_word: לַאֲשֶׁר יָשַׁר בְּעֵינַי
  chosen: to whomever seems right in my eyes
  alternatives:
  - to whomever is right in my eyes
  - to anyone who is pleasing in my sight
  lexicon: HALOT
  rationale: The idiom means what is right/pleasing from the speaker's perspective.
    'Seems right in my eyes' preserves the Hebrew 'in my eyes' idiom more closely
    than 'is pleasing in my sight,' while remaining natural enough in English.
