theological_decisions:
- issue: Agency in the judgment sequence
  chosen_reading: The false prophets speak lies with the result/purpose of the people's
    removal, and God then declares, 'I will drive you out, and you will perish.'
  alternative_readings:
  - The false prophets themselves are the implied agents of the removal in the whole
    clause
  rationale: The Hebrew syntax distinguishes the prophets' lying purpose (לְמַעַן
    הַרְחִיק) from the explicit first-person divine action in וְהִדַּחְתִּי. The translation
    preserves that tension rather than collapsing all agency into one actor.
  doctrine_reference: Preserve theological tension rather than resolve it.
