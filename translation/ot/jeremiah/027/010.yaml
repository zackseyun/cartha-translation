id: JER.27.10
reference: Jeremiah 27:10
source:
  edition: WLC
  text: כִּ֣י שֶׁ֔קֶר הֵ֖ם נִבְּאִ֣ים לָ/כֶ֑ם לְמַ֨עַן הַרְחִ֤יק אֶתְ/כֶם֙ מֵ/עַ֣ל
    אַדְמַתְ/כֶ֔ם וְ/הִדַּחְתִּ֥י אֶתְ/כֶ֖ם וַ/אֲבַדְתֶּֽם׃
translation:
  text: For they are prophesying a lie to you, in order to remove you far from your
    land; and I will drive you out, and you will perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'falsehood' instead of 'a lie.'
    reason: lexical_alternative
  - marker: b
    text: Or 'send you far away from your land.'
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew shifts to explicit divine agency: ''and I will drive you out,
      and you will perish.'''
    reason: cross_reference
lexical_decisions:
- source_word: שֶׁקֶר
  chosen: a lie
  alternatives:
  - falsehood
  lexicon: HALOT
  rationale: שׁקר denotes falsehood/deception. 'A lie' is idiomatic with the verbal
    expression 'prophesy a lie' and preserves the concrete force better than the more
    abstract 'falsehood.'
- source_word: נִבְּאִים לָכֶם
  chosen: are prophesying to you
  alternatives:
  - prophesy to you
  - are acting as prophets for you
  lexicon: HALOT
  rationale: The Niphal of נבא commonly means 'prophesy.' The participle gives ongoing/imperfective
    force, so 'are prophesying' best reflects the Hebrew aspect in context.
- source_word: לְמַעַן
  chosen: in order to
  alternatives:
  - so that
  - for the purpose of
  lexicon: HALOT
  rationale: This marks purpose/result. 'In order to' is clear modern English and
    preserves the purposive force.
- source_word: הַרְחִיק אֶתְכֶם מֵעַל אַדְמַתְכֶם
  chosen: remove you far from your land
  alternatives:
  - make you distant from your land
  - send you far away from your land
  lexicon: HALOT
  rationale: The Hiphil of רחק is causative, 'make distant/remove.' 'Remove you far
    from your land' preserves both the causative sense and the spatial separation
    implied by מֵעַל.
- source_word: אַדְמַתְכֶם
  chosen: your land
  alternatives:
  - your soil
  - your ground
  lexicon: HALOT
  rationale: Although the noun literally relates to ground/soil, in this exile context
    'land' is the natural English rendering and matches the covenantal-territorial
    sense.
- source_word: וְהִדַּחְתִּי אֶתְכֶם
  chosen: and I will drive you out
  alternatives:
  - and I will banish you
  - and I will thrust you away
  lexicon: HALOT
  rationale: נדח in the Hiphil conveys driving away/banishing. 'Drive you out' is
    forceful, natural English and fits the exile context.
- source_word: וַאֲבַדְתֶּם
  chosen: and you will perish
  alternatives:
  - and you will be destroyed
  - and you will vanish
  lexicon: HALOT
  rationale: אבד in this context denotes perishing/being ruined. 'Perish' preserves
    the seriousness without over-specifying the mode of destruction.
