theological_decisions:
- issue: Rendering of Nebuchadnezzar as God's 'servant'
  chosen_reading: my servant
  alternative_readings:
  - my slave
  rationale: The verse presents a pagan king as an instrument used by God. The translation
    preserves that theological claim without softening it, while choosing 'servant'
    because the focus is commissioned agency rather than bonded status.
  doctrine_reference: Translation philosophy §1, §5; Contested terms table for δοῦλος/servant-slave
    as analogous principle
