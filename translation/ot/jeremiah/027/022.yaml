theological_decisions:
- issue: Semantic force of פקד in a restoration context
  chosen_reading: favorable visitation leading to restoration
  alternative_readings:
  - punitive visitation
  - more neutral 'visit'
  rationale: The immediate continuation, 'Then I will bring them up and restore them
    to this place,' shows that the divine action here is not punitive but restorative.
    The translation therefore avoids 'punish' and uses a positive/neutral expression
    that coheres with the context while preserving the Hebrew verb's breadth.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
