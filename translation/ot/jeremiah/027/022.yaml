id: JER.27.22
reference: Jeremiah 27:22
source:
  edition: WLC
  text: בָּבֶ֥לָ/ה יוּבָ֖אוּ וְ/שָׁ֣מָּ/ה יִֽהְי֑וּ עַ֠ד י֣וֹם פָּקְדִ֤/י אֹתָ/ם֙
    נְאֻם יְהוָ֔ה וְ/הַֽעֲלִיתִי/ם֙ וַ/הֲשִׁ֣יבֹתִ֔י/ם אֶל הַ/מָּק֖וֹם הַ/זֶּֽה־־׃פ
translation:
  text: They will be brought to Babylon, and there they will remain until the day
    I attend to them, declares the LORD. Then I will bring them up and restore them
    to this place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'visit them.' The Hebrew verb can mean to attend to, visit, or intervene
      for someone; here the context indicates restoration rather than punishment.
    reason: lexical_alternative
  - marker: b
    text: Or 'bring them back.' The Hebrew literally says 'bring them up,' a common
      expression for return from exile to the land.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּבֶלָה
  chosen: to Babylon
  alternatives:
  - Babylonward
  - Babylon
  lexicon: HALOT
  rationale: Directional he on the place name indicates motion toward Babylon; idiomatic
    English is 'to Babylon.'
- source_word: יוּבָאוּ
  chosen: will be brought
  alternatives:
  - will be taken
  - will be brought in
  lexicon: HALOT
  rationale: Hophal imperfect of בוא is passive/causative-passive, indicating that
    the objects are carried or brought by others. 'Will be brought' is the most direct
    rendering.
- source_word: וְשָׁמָּה יִהְיוּ
  chosen: and there they will remain
  alternatives:
  - and there they will be
  - and there they will stay
  lexicon: HALOT
  rationale: Though היה is literally 'be,' in this context with locative 'there' it
    naturally conveys continued presence. 'Remain' captures the durative sense in
    readable English.
- source_word: עַד יוֹם
  chosen: until the day
  alternatives:
  - until a day
  - up to the day
  lexicon: HALOT
  rationale: Standard temporal construction meaning 'until the day' or 'until the
    time when.'
- source_word: פָּקְדִי אֹתָם
  chosen: I attend to them
  alternatives:
  - I visit them
  - I punish them
  - I take note of them
  lexicon: HALOT
  rationale: פקד can denote visiting either for judgment or for gracious intervention
    depending on context. Here, because the next clauses promise bringing them up
    and restoring them, the sense is favorable. 'Attend to them' preserves the visitation
    idea without over-specifying, while fitting the restoration context.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Conventional prophetic formula. YHWH is rendered 'the LORD' per doctrine
    guidelines.
- source_word: וְהַעֲלִיתִים
  chosen: I will bring them up
  alternatives:
  - I will bring them back up
  - I will cause them to come up
  lexicon: HALOT
  rationale: Hiphil of עלה often means 'bring up,' especially from exile to the land.
    'Bring them up' preserves the Hebrew imagery and avoids flattening it to mere
    'return.'
- source_word: וַהֲשִׁיבֹתִים
  chosen: and restore them
  alternatives:
  - and bring them back
  - and return them
  lexicon: HALOT
  rationale: Hiphil of שוב with object can mean cause to return/bring back. Because
    the destination follows ('to this place'), 'restore them' communicates return
    from exile with slightly fuller English force while remaining faithful.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  chosen: to this place
  alternatives:
  - to this המקום
  - to this land
  lexicon: HALOT
  rationale: The Hebrew says 'this place,' likely referring to Jerusalem/Judah in
    context. 'Place' should be retained rather than expanded to 'land' without lexical
    warrant.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the default rendering of the divine
    name יְהוָה is 'the LORD,' following Jewish reverence tradition and longstanding
    English convention.
