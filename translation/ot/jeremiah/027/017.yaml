id: JER.27.17
reference: Jeremiah 27:17
source:
  edition: WLC
  text: אַל תִּשְׁמְע֣וּ אֲלֵי/הֶ֔ם עִבְד֥וּ אֶת מֶֽלֶךְ בָּבֶ֖ל וִֽ/חְי֑וּ לָ֧/מָּה
    תִֽהְיֶ֛ה הָ/עִ֥יר הַ/זֹּ֖את חָרְבָּֽה־־־׃
translation:
  text: Do not listen to them. Serve the king of Babylon and live. Why should this
    city become a ruin?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not obey them.' The Hebrew verb can carry the sense of heeding as
      well as listening.
    reason: lexical_alternative
  - marker: b
    text: Or 'Why should this city be desolate?' The Hebrew noun refers to devastation
      or ruin.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּשְׁמְעוּ אֲלֵיהֶם
  chosen: Do not listen to them
  alternatives:
  - Do not hear them
  - Do not obey them
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means to listen to or heed someone. In this prophetic
    context the force includes refusing their message, so 'listen to' is natural English
    while still allowing the implied sense of heeding.
- source_word: עִבְדוּ
  chosen: Serve
  alternatives:
  - Work for
  - Be subject to
  lexicon: HALOT
  rationale: עבד in the imperative here calls for political subjection/service to
    Babylon's king. 'Serve' is the standard and sufficiently broad rendering, preserving
    both submission and service.
- source_word: אֶת מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: Straightforward construct phrase; 'the king of Babylon' is the most transparent
    English rendering.
- source_word: וִחְיוּ
  chosen: and live
  alternatives:
  - so that you may live
  - and you will live
  lexicon: HALOT
  rationale: The imperative followed by waw + imperative functions as a coordinated
    exhortation with result-like force. 'And live' preserves the concise Hebrew while
    naturally implying the consequence of obedience.
- source_word: לָמָּה
  chosen: Why should
  alternatives:
  - Why
  - For what reason should
  lexicon: HALOT
  rationale: Introduces a rhetorical question. In English, 'Why should' best conveys
    the rhetorical appeal tied to the following imperfect.
- source_word: תִהְיֶה
  chosen: should become
  alternatives:
  - be
  - come to be
  lexicon: HALOT
  rationale: היה with a predicate noun can denote becoming as well as being. Given
    the future disastrous outcome in view, 'become' better captures the transition
    into ruin.
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  alternatives:
  - the city, this one
  lexicon: HALOT
  rationale: Standard demonstrative construction; idiomatic English is 'this city.'
- source_word: חָרְבָּה
  chosen: a ruin
  alternatives:
  - desolate
  - waste
  - ruins
  lexicon: HALOT
  rationale: The noun denotes a ruined or devastated state. 'A ruin' is clear, concrete,
    and fits the singular predicate construction better than the more adjectival 'desolate.'
