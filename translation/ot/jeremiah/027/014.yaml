id: JER.27.14
reference: Jeremiah 27:14
source:
  edition: WLC
  text: וְ/אַֽל תִּשְׁמְע֞וּ אֶל דִּבְרֵ֣י הַ/נְּבִאִ֗ים הָ/אֹמְרִ֤ים אֲלֵי/כֶם֙ לֵ/אמֹ֔ר
    לֹ֥א תַעַבְד֖וּ אֶת מֶ֣לֶךְ בָּבֶ֑ל כִּ֣י שֶׁ֔קֶר הֵ֖ם נִבְּאִ֥ים לָ/כֶֽם־־־׃
translation:
  text: And do not listen to the words of the prophets who are saying to you, ‘You
    will not serve the king of Babylon,’ for they are prophesying a lie to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not serve the king of Babylon.' The Hebrew form can be read as a
      prohibition, but in context it is best taken as the prophets' false prediction
      that Judah will not have to serve Babylon.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אַל
  chosen: And do not
  alternatives:
  - But do not
  - Do not
  lexicon: HALOT
  rationale: וְ links this prohibition to the preceding context, while אַל with the
    imperfect gives a negative command. 'And do not' preserves the discourse flow
    without overstating contrast.
- source_word: תִּשְׁמְעוּ
  chosen: listen
  alternatives:
  - hear
  - obey
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. With אֶל plus
    'words,' the sense is attentive heeding; 'listen' is the most natural English
    equivalent here.
- source_word: אֶל דִּבְרֵי
  chosen: to the words of
  alternatives:
  - to the message of
  - to the sayings of
  lexicon: HALOT
  rationale: The phrase is formally 'to the words of.' Retaining 'words' preserves
    the Hebrew expression and the focus on their spoken claims.
- source_word: הַנְּבִאִים
  chosen: the prophets
  alternatives:
  - those prophets
  lexicon: HALOT
  rationale: The definite article marks a known group in context. 'The prophets' is
    the straightforward rendering.
- source_word: הָאֹמְרִים אֲלֵיכֶם לֵאמֹר
  chosen: who are saying to you
  alternatives:
  - who say to you
  - telling you
  lexicon: HALOT
  rationale: The participle plus infinitive introduces the content of their repeated
    speech. 'Who are saying to you' preserves the ongoing/reiterated force better
    than a simple past form.
- source_word: לֹא תַעַבְדוּ
  chosen: You will not serve
  alternatives:
  - You shall not serve
  - You will not be subject to
  lexicon: HALOT
  rationale: 'עבד with a human king means serve/be subject to. In reported prophetic
    speech, the imperfect is best rendered as future-like prediction: ''You will not
    serve.'' ''Shall not'' could sound like a command rather than their prediction.'
- source_word: אֶת מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: Standard construct phrase; 'the king of Babylon' is clear and idiomatic.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason the audience must not listen. 'For' fits the explanatory
    force in concise English.
- source_word: שֶׁקֶר
  chosen: a lie
  alternatives:
  - falsehood
  - deception
  lexicon: HALOT
  rationale: 'The singular noun functions adverbially/objectively with the verb ''prophesy'':
    they prophesy falsehood. ''A lie'' is vivid, idiomatic, and faithful to the Hebrew.'
- source_word: הֵם נִבְּאִים לָכֶם
  chosen: they are prophesying a lie to you
  alternatives:
  - they are prophesying falsely to you
  - they prophesy lies to you
  lexicon: HALOT
  rationale: The Niphal of נבא is the standard verb 'prophesy.' The clause emphasizes
    their ongoing prophetic activity directed toward the audience. 'Prophesying a
    lie to you' preserves both the verbal action and the object שׁקר.
