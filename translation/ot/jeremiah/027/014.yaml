theological_decisions:
- issue: Nature of the false prophetic message
  chosen_reading: Render the statement as a false prediction ('You will not serve
    the king of Babylon') rather than as a prohibition.
  alternative_readings:
  - Render as 'Do not serve the king of Babylon'
  rationale: In context Jeremiah warns against prophets who deny Babylonian domination.
    The Hebrew imperfect in quoted speech naturally conveys their predictive claim,
    and the following rationale ('for they are prophesying a lie to you') confirms
    this is false prophecy, not merely bad advice.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
