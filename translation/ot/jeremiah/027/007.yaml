id: JER.27.7
reference: Jeremiah 27:7
source:
  edition: WLC
  text: וְ/עָבְד֤וּ אֹת/וֹ֙ כָּל הַ/גּוֹיִ֔ם וְ/אֶת בְּנ֖/וֹ וְ/אֶֽת בֶּן בְּנ֑/וֹ
    עַ֣ד בֹּא עֵ֤ת אַרְצ/וֹ֙ גַּם ה֔וּא וְ/עָ֤בְדוּ ב/וֹ֙ גּוֹיִ֣ם רַבִּ֔ים וּ/מְלָכִ֖ים
    גְּדֹלִֽים־־־־־־׃
translation:
  text: All the nations will serve him, and his son, and his grandson, until the time
    of his own land comes; then many nations and great kings will make him serve them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'and his son and his son's son.'
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'until the time of his land comes'—that is, the appointed
      time concerning Babylon's own land.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew likely means that many nations and great kings will subject Babylon
      to service; a more wooden rendering would be, 'will work him/use him for service.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָבְדוּ אֹתוֹ
  chosen: will serve him
  alternatives:
  - will work for him
  lexicon: HALOT
  rationale: עבד in this political context refers to subjection/service to a ruler
    or empire, not merely labor. 'Serve him' is the most natural English rendering
    for national vassalage.
- source_word: כָּל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the peoples
  - all the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers to political entities under Babylonian domination.
    'Nations' fits the geopolitical context better than 'peoples' or the later religiously
    loaded 'Gentiles'.
- source_word: וְאֶת בְּנוֹ וְאֶת בֶּן בְּנוֹ
  chosen: and his son, and his grandson
  alternatives:
  - and his son, and his son's son
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'his son and his son's son.' 'Grandson'
    is a clear, accurate modern-English equivalent that preserves the dynastic succession
    in view.
- source_word: עַד בֹּא עֵת אַרְצוֹ
  chosen: until the time of his own land comes
  alternatives:
  - until the time of his land comes
  - until the time for his land comes
  lexicon: HALOT
  rationale: The phrase is somewhat compressed. It points to the appointed time concerning
    Babylon's own land, i.e., its turn for judgment/subjugation. 'His own land' makes
    the reflexive force clearer in English without over-interpreting.
- source_word: גַּם הוּא
  chosen: then
  alternatives:
  - also he
  - even he
  lexicon: HALOT
  rationale: 'The Hebrew adds emphasis: Babylon itself also will come under servitude.
    In idiomatic English, this is best carried forward in the clause as a transition
    (''then'') while the emphatic sense is reflected by ''make him serve them.'''
- source_word: וְעָבְדוּ בוֹ
  chosen: will make him serve them
  alternatives:
  - will serve themselves with him
  - will enslave him
  - will serve him
  lexicon: HALOT
  rationale: With עבד plus ב here, the sense is that other nations will impose service
    on him / use him as a servant, not that they will serve him. Rendering it 'make
    him serve them' captures the reversal of power in context.
- source_word: גּוֹיִם רַבִּים וּמְלָכִים גְּדֹלִים
  chosen: many nations and great kings
  alternatives:
  - many peoples and mighty kings
  lexicon: HALOT
  rationale: This preserves the parallelism and political scope of the Hebrew. 'Great
    kings' is a straightforward rendering of גְּדֹלִים in royal context.
