id: JER.27.8
reference: Jeremiah 27:8
source:
  edition: WLC
  text: וְ/הָיָ֨ה הַ/גּ֜וֹי וְ/הַ/מַּמְלָכָ֗ה אֲשֶׁ֨ר לֹֽא יַעַבְד֤וּ אֹת/וֹ֙ אֶת
    נְבוּכַדְנֶאצַּ֣ר מֶֽלֶךְ בָּבֶ֔ל וְ/אֵ֨ת אֲשֶׁ֤ר לֹֽא יִתֵּן֙ אֶת צַוָּאר֔/וֹ
    בְּ/עֹ֖ל מֶ֣לֶךְ בָּבֶ֑ל בַּ/חֶרֶב֩ וּ/בָ/רָעָ֨ב וּ/בַ/דֶּ֜בֶר אֶפְקֹ֨ד עַל הַ/גּ֤וֹי
    הַ/הוּא֙ נְאֻם יְהוָ֔ה עַד תֻּמִּ֥/י אֹתָ֖/ם בְּ/יָדֽ/וֹ־־־־־־־־׃
translation:
  text: And it shall be that the nation or the kingdom that will not serve him—Nebuchadnezzar
    king of Babylon—and that will not put its neck under the yoke of the king of Babylon,
    I will punish that nation with the sword, with famine, and with pestilence, declares
    the LORD, until I have finished them by his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the nation and the kingdom'; the Hebrew pairs two political terms in
      a distributive warning against any realm that refuses Babylon's rule.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'put its neck under the yoke,' an image of submitting to Babylonian
      domination.
    reason: cultural_note
  - marker: c
    text: Or 'until I have consumed them by his hand.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will happen
  - And it shall come to pass
  lexicon: HALOT
  rationale: Introduces a future consequence formula. 'And it shall be' preserves
    the prophetic register without sounding overly archaic like 'come to pass.'
- source_word: הַגּוֹי וְהַמַּמְלָכָה
  chosen: the nation or the kingdom
  alternatives:
  - the nation and the kingdom
  - any nation and kingdom
  lexicon: HALOT
  rationale: The pair functions distributively for any political entity that refuses
    submission. English 'or' best conveys the sense that either a nation or a kingdom
    falls under the warning, while retaining the singular construction reflected later
    by 'that nation.'
- source_word: יַעַבְדוּ אֹתוֹ אֶת נְבוּכַדְנֶאצַּר
  chosen: will not serve him—Nebuchadnezzar
  alternatives:
  - will not work for him—Nebuchadnezzar
  - will not be subject to him—Nebuchadnezzar
  lexicon: HALOT
  rationale: עבד here denotes political servitude/subjection to an imperial ruler,
    not mere labor. 'Serve' is the most natural and sufficiently broad rendering.
- source_word: נְבוּכַדְנֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: Standard English transliteration. The Hebrew spelling here supports the
    familiar English form 'Nebuchadnezzar.'
- source_word: יִתֵּן אֶת צַוָּארוֹ בְּעֹל
  chosen: will not put its neck under the yoke
  alternatives:
  - will not give its neck to the yoke
  - will not submit its neck to the yoke
  lexicon: HALOT
  rationale: A literal image of submission to domination. 'Put its neck under the
    yoke' preserves the metaphor clearly in modern English.
- source_word: בְּעֹל מֶלֶךְ בָּבֶל
  chosen: under the yoke of the king of Babylon
  alternatives:
  - to the yoke of the king of Babylon
  lexicon: HALOT
  rationale: The preposition with 'yoke' is idiomatically expressed in English as
    being 'under' a yoke, preserving the image of imposed rule.
- source_word: בַּחֶרֶב וּבָרָעָב וּבַדֶּבֶר
  chosen: with the sword, with famine, and with pestilence
  alternatives:
  - by sword, famine, and plague
  - with sword, famine, and disease
  lexicon: HALOT
  rationale: This is Jeremiah's recurring triad of covenant judgment. 'Pestilence'
    preserves the formal prophetic diction better than the broader 'disease' while
    remaining understandable.
- source_word: אֶפְקֹד עַל
  chosen: I will punish
  alternatives:
  - I will visit judgment on
  - I will attend to
  lexicon: HALOT
  rationale: פקד with על in judgment contexts means to visit/punish. 'I will punish'
    communicates the sense directly in readable English.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic and weighty.
    Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's contested-terms policy for the divine name.
- source_word: עַד תֻּמִּי אֹתָם
  chosen: until I have finished them
  alternatives:
  - until I have consumed them
  - until I have destroyed them completely
  lexicon: HALOT
  rationale: The verb from תמם here indicates bringing to an end/completion in judgment.
    'Finished them' is concise and preserves the severity without over-specifying
    the mode beyond the Hebrew.
- source_word: בְּיָדוֹ
  chosen: by his hand
  alternatives:
  - by means of him
  - through his power
  lexicon: HALOT
  rationale: A standard idiom for agency. 'By his hand' preserves the concrete Hebrew
    expression while remaining clear.
