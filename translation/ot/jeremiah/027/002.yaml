id: JER.27.2
reference: Jeremiah 27:2
source:
  edition: WLC
  text: כֹּֽה אָמַ֤ר יְהוָה֙ אֵלַ֔/י עֲשֵׂ֣ה לְ/ךָ֔ מוֹסֵר֖וֹת וּ/מֹט֑וֹת וּ/נְתַתָּ֖/ם
    עַל צַוָּארֶֽ/ךָ־־׃
translation:
  text: 'Thus said the LORD to me: “Make for yourself bonds and yoke-bars, and put
    them on your neck.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'bonds and yoke-bars'; some translations simplify to 'straps and
      yokes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  - So
  lexicon: HALOT
  rationale: Deictic adverb introducing a prophetic formula. 'Thus' preserves the
    formal prophetic register in natural English.
- source_word: אָמַר יְהוָה
  chosen: said the LORD
  alternatives:
  - says the LORD
  - the LORD said
  lexicon: HALOT
  rationale: 'Qal perfect 3ms is best rendered as past narrative speech here: ''said
    the LORD.'' Per doctrine, יְהוָה is rendered ''the LORD.'''
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - concerning me
  lexicon: HALOT
  rationale: Preposition אֶל with 1cs suffix in speech-reporting context naturally
    means 'to me.'
- source_word: עֲשֵׂה לְךָ
  chosen: Make for yourself
  alternatives:
  - Make yourself
  - Prepare for yourself
  lexicon: HALOT
  rationale: Imperative plus לְךָ has a reflexive/dative nuance. 'Make for yourself'
    preserves the Hebrew construction clearly.
- source_word: מוֹסֵרוֹת
  chosen: bonds
  alternatives:
  - straps
  - bands
  - thongs
  lexicon: HALOT
  rationale: The noun denotes restraints/bands used with a yoke. 'Bonds' is broad
    enough to fit the symbolic action and pairs well with the following term.
- source_word: מֹטוֹת
  chosen: yoke-bars
  alternatives:
  - yokes
  - bars
  lexicon: HALOT
  rationale: The term refers to the bars/poles of a yoke rather than the whole apparatus
    in a generalized sense. 'Yoke-bars' is more precise than simply 'yokes' while
    remaining readable.
- source_word: וּנְתַתָּם
  chosen: and put them
  alternatives:
  - and place them
  - and set them
  lexicon: HALOT
  rationale: 'Qal perfect 2ms with prefixed conjunction continues the sequence of
    commands in this context; English idiom favors imperative force: ''and put them.''
    The 3mp suffix is represented by ''them.'''
- source_word: עַל צַוָּארֶךָ
  chosen: on your neck
  alternatives:
  - upon your neck
  lexicon: HALOT
  rationale: Straightforward locative phrase. 'On your neck' is idiomatic modern English.
