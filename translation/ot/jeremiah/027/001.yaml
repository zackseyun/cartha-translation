id: JER.27.1
reference: Jeremiah 27:1
source:
  edition: WLC
  text: בְּ/רֵאשִׁ֗ית מַמְלֶ֛כֶת יְהוֹיָקִ֥ם בֶּן יֹאושִׁיָּ֖הוּ מֶ֣לֶךְ יְהוּדָ֑ה
    הָיָ֞ה הַ/דָּבָ֤ר הַ/זֶּה֙ אֶֽל יִרְמְיָ֔ה מֵ/אֵ֥ת יְהוָ֖ה לֵ/אמֹֽר־־׃
translation:
  text: At the beginning of the reign of Jehoiakim son of Josiah, king of Judah, this
    word came to Jeremiah from the LORD, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from Yahweh.'' The divine name יְהוָה is rendered ''the LORD''
      in keeping with the project''s stated policy.'
    reason: lexical_alternative
  - marker: b
    text: Some interpreters note that this verse's reference to Jehoiakim appears
      difficult in context, since the surrounding material points to Zedekiah (see
      27:3, 12).
    reason: textual_variant
lexical_decisions:
- source_word: בְּרֵאשִׁית
  chosen: At the beginning of
  alternatives:
  - In the beginning of
  - At the outset of
  lexicon: HALOT
  rationale: Temporal prepositional phrase marking the initial period of a reign.
    'At the beginning of' is natural modern English and preserves the temporal force
    without sounding overly wooden.
- source_word: מַמְלֶכֶת
  chosen: the reign of
  alternatives:
  - the kingdom of
  - the kingship of
  lexicon: HALOT
  rationale: In context with a named king, the noun refers to the period or exercise
    of royal rule rather than the territory. 'Reign' best fits idiomatic English.
- source_word: יְהוֹיָקִם
  chosen: Jehoiakim
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: בֶּן יֹאושִׁיָּהוּ
  chosen: son of Josiah
  rationale: Standard filial construction; retained explicitly for historical identification.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Royal title plus realm; straightforward formal rendering.
- source_word: הָיָה הַדָּבָר הַזֶּה אֶל
  chosen: this word came to
  alternatives:
  - this message came to
  - this matter came to
  lexicon: HALOT
  rationale: The Hebrew idiom 'the word was/came to' is common in prophetic literature.
    'This word came to' preserves the prophetic formula more closely than the more
    interpretive 'message.'
- source_word: יִרְמְיָה
  chosen: Jeremiah
  rationale: Personal name transliterated by standard English convention.
- source_word: מֵאֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: Source marker plus divine name. Per doctrine, יְהוָה is rendered 'the
    LORD' rather than a transliteration such as 'Yahweh.'
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - thus saying,
  lexicon: HALOT
  rationale: Standard introduction to direct speech. Retained because the following
    verse continues the quotation.
