id: JER.27.15
reference: Jeremiah 27:15
source:
  edition: WLC
  text: כִּ֣י לֹ֤א שְׁלַחְתִּי/ם֙ נְאֻם יְהוָ֔ה וְ/הֵ֛ם נִבְּאִ֥ים בִּ/שְׁמִ֖/י לַ/שָּׁ֑קֶר
    לְמַ֨עַן הַדִּיחִ֤/י אֶתְ/כֶם֙ וַ/אֲבַדְתֶּ֔ם אַתֶּ֕ם וְ/הַ/נְּבִאִ֖ים הַֽ/נִּבְּאִ֥ים
    לָ/כֶֽם־׃
translation:
  text: For I did not send them, declares the LORD, yet they are prophesying falsely
    in my name, so that I may drive you out, and you will perish—you and the prophets
    who are prophesying to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they are prophesying a lie in my name.'
    reason: lexical_alternative
  - marker: b
    text: Or 'so that I may banish you'; the Hebrew verb can carry the sense of driving
      away or causing to be cast out.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלַחְתִּים
  chosen: I did not send them
  alternatives:
  - I have not sent them
  lexicon: HALOT
  rationale: Qal perfect 1cs with 3mp suffix from שלח. In prophetic speech, English
    simple past fits naturally; present perfect is possible but less idiomatic here.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is natural modern English
    and preserves the formal prophetic register. YHWH is rendered 'the LORD' per doctrine
    guidance.
- source_word: נִבְּאִים
  chosen: are prophesying
  alternatives:
  - prophesy
  - are acting as prophets
  lexicon: HALOT
  rationale: Niphal participle plural from נבא, conveying ongoing activity. 'Are prophesying'
    preserves the participial aspect better than a simple present.
- source_word: בִּשְׁמִי
  chosen: in my name
  alternatives:
  - under my name
  - by my authority
  lexicon: HALOT
  rationale: The idiom literally refers to speaking under YHWH's name/authority. 'In
    my name' is the standard and sufficiently clear rendering.
- source_word: לַשָּׁקֶר
  chosen: falsely
  alternatives:
  - a lie
  - for falsehood
  lexicon: HALOT
  rationale: The phrase נבא + בשם + לשקר means to prophesy falsely / for a lie. The
    adverbial English 'falsely' is idiomatic and captures the force without awkwardness.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the purpose that
  lexicon: HALOT
  rationale: Introduces purpose/result. 'So that' is concise and natural in modern
    English.
- source_word: הַדִּיחִי
  chosen: I may drive you out
  alternatives:
  - I may banish you
  - I may thrust you away
  - I may lead you astray
  lexicon: HALOT
  rationale: Hiphil infinitive construct with 1cs suffix from נדח. In this judgment
    context, the sense is removal/banishment from the land rather than mere deception.
    'Drive you out' fits the exile context of Jeremiah 27.
- source_word: וַאֲבַדְתֶּם
  chosen: and you will perish
  alternatives:
  - and you will be destroyed
  - and you will die
  lexicon: HALOT
  rationale: Qal perfect with waw, functioning futurally in the prophetic sequence.
    'Perish' preserves the broad sense of coming to ruin without over-specifying the
    mode.
- source_word: הַנְּבִאִים הַנִּבְּאִים לָכֶם
  chosen: the prophets who are prophesying to you
  alternatives:
  - the prophets who prophesy to you
  - the prophets prophesying for you
  lexicon: HALOT
  rationale: 'The repetition of noun + participle is retained for emphasis. ''To you''
    best reflects לָכֶם in context: they are addressing the people with their prophecies.'
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding warning. 'For' preserves the
    explanatory connection in a formal but readable way.
