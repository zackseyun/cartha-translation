id: JER.27.3
reference: Jeremiah 27:3
source:
  edition: WLC
  text: וְ/שִׁלַּחְתָּ/ם֩ אֶל מֶ֨לֶךְ אֱד֜וֹם וְ/אֶל מֶ֣לֶךְ מוֹאָ֗ב וְ/אֶל מֶ֨לֶךְ֙
    בְּנֵ֣י עַמּ֔וֹן וְ/אֶל מֶ֥לֶךְ צֹ֖ר וְ/אֶל מֶ֣לֶךְ צִיד֑וֹן בְּ/יַ֤ד מַלְאָכִים֙
    הַ/בָּאִ֣ים יְרוּשָׁלִַ֔ם אֶל צִדְקִיָּ֖הוּ מֶ֥לֶךְ יְהוּדָֽה־־־־־־׃
translation:
  text: And send them to the king of Edom, the king of Moab, the king of the sons
    of Ammon, the king of Tyre, and the king of Sidon, by the hand of the messengers
    who are coming to Jerusalem to Zedekiah king of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of Ammon''; that is, the Ammonites.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתָּם
  chosen: And send them
  alternatives:
  - Then send them
  - And you shall send them
  lexicon: HALOT
  rationale: Piel perfect 2ms with 3mp suffix from שׁלח in instructional sequence
    functions as an imperative/future command in context. 'Send them' gives natural
    English while preserving the directive force. The prefixed conjunction is retained
    as 'And' to reflect the narrative-command sequence.
- source_word: מֶלֶךְ
  chosen: king of
  alternatives:
  - the king of
  lexicon: HALOT
  rationale: Construct form before each nation name is best rendered 'king of ...'.
    English idiom requires the article, so the repeated phrase is rendered fully for
    each item in the list.
- source_word: אֱדוֹם
  chosen: Edom
  lexicon: HALOT
  rationale: Standard English transliteration of the place/people name.
- source_word: מוֹאָב
  chosen: Moab
  lexicon: HALOT
  rationale: Standard English transliteration of the place/people name.
- source_word: בְּנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the people of Ammon
  lexicon: HALOT
  rationale: Literally 'sons of Ammon.' Because the translation philosophy prefers
    gender-accurate renderings where the source uses masculine forms, the more literal
    expression is kept in the main text rather than flattening to the ethnic term
    'Ammonites.'
- source_word: צֹר
  chosen: Tyre
  lexicon: HALOT
  rationale: Conventional English form of the city name.
- source_word: צִידוֹן
  chosen: Sidon
  lexicon: HALOT
  rationale: Conventional English form of the city name.
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - through
  - by means of
  lexicon: HALOT
  rationale: This idiom often means agency or instrumentality. 'By the hand of' preserves
    the Hebrew expression while remaining understandable in English; it also fits
    prophetic style better than the flatter 'through.'
- source_word: מַלְאָכִים
  chosen: messengers
  alternatives:
  - envoys
  - ambassadors
  lexicon: HALOT
  rationale: The term can denote messengers broadly, including diplomatic envoys.
    'Messengers' is the lexical core and avoids over-specifying official rank, though
    the context clearly involves diplomatic representatives.
- source_word: הַבָּאִים
  chosen: who are coming
  alternatives:
  - who came
  - coming
  lexicon: HALOT
  rationale: Participle with article describes the messengers as those in the process
    of coming/arriving. 'Who are coming' preserves the participial sense in smooth
    English.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English transliteration of the city name.
- source_word: אֶל צִדְקִיָּהוּ
  chosen: to Zedekiah
  alternatives:
  - for Zedekiah
  lexicon: HALOT
  rationale: The preposition אֶל most naturally indicates direction toward the person
    to whom the messengers are coming.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - the king of Judah
  lexicon: HALOT
  rationale: 'Appositional identification of Zedekiah. English idiom omits the second
    article naturally after the proper name: ''Zedekiah king of Judah.'''
