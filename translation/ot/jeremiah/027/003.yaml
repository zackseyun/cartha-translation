theological_decisions:
- issue: Gendered ethnic expression בְּנֵי עַמּוֹן
  chosen_reading: the sons of Ammon
  alternative_readings:
  - the Ammonites
  - the people of Ammon
  rationale: Following the stated gender-accurate philosophy, the masculine plural
    construct is preserved rather than neutralized. In this geopolitical list the
    phrase functions as an ethnic designation, so an alternative more idiomatic rendering
    is worth preserving in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
