id: JER.27.9
reference: Jeremiah 27:9
source:
  edition: WLC
  text: וְ֠/אַתֶּם אַל תִּשְׁמְע֨וּ אֶל נְבִיאֵי/כֶ֜ם וְ/אֶל קֹֽסְמֵי/כֶ֗ם וְ/אֶל֙
    חֲלֹמֹ֣תֵי/כֶ֔ם וְ/אֶל עֹֽנְנֵי/כֶ֖ם וְ/אֶל כַּשָּׁפֵי/כֶ֑ם אֲשֶׁר הֵ֞ם אֹמְרִ֤ים
    אֲלֵי/כֶם֙ לֵ/אמֹ֔ר לֹ֥א תַעַבְד֖וּ אֶת מֶ֥לֶךְ בָּבֶֽל־־־־־־־׃
translation:
  text: But you, do not listen to your prophets, your diviners, your dreamers, your
    soothsayers, or your sorcerers, who are saying to you, ‘You will not serve the
    king of Babylon.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'your dreams'; the Hebrew term is formally 'dreams,'
      but in this list it likely stands for those who claim revelatory dreams.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתֶּם
  chosen: But you
  alternatives:
  - And you
  - As for you
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks contrast with the surrounding
    discourse; 'But you' brings out the adversative force naturally in English.
- source_word: אַל תִּשְׁמְעוּ אֶל
  chosen: do not listen to
  alternatives:
  - do not hear
  - do not heed
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means to listen to or heed. 'Listen to' is idiomatic
    and preserves the prohibition without overinterpreting as obedience.
- source_word: נְבִיאֵיכֶם
  chosen: your prophets
  lexicon: HALOT
  rationale: Standard rendering of נביאים. The possessive is retained, indicating
    prophets associated with the hearers' nations/communities, not true prophets endorsed
    by YHWH.
- source_word: קֹסְמֵיכֶם
  chosen: your diviners
  alternatives:
  - your fortune-tellers
  lexicon: HALOT
  rationale: קסם refers to divination. 'Diviners' is concise and suitably formal for
    the prophetic denunciation.
- source_word: חֲלֹמֹתֵיכֶם
  chosen: your dreamers
  alternatives:
  - your dreams
  lexicon: HALOT
  rationale: Although the form is built on 'dreams,' in this list of practitioners
    it functions metonymically for those who report or traffic in dreams. 'Your dreamers'
    fits the parallelism with the surrounding personal nouns better than the more
    literal 'your dreams.'
- source_word: עֹנְנֵיכֶם
  chosen: your soothsayers
  alternatives:
  - your augurs
  - your cloud-diviners
  lexicon: HALOT
  rationale: The term denotes practitioners of omen-reading/soothsaying. 'Soothsayers'
    is understandable modern English without importing a narrow technical method.
- source_word: כַּשָּׁפֵיכֶם
  chosen: your sorcerers
  alternatives:
  - your magicians
  lexicon: HALOT
  rationale: כשף refers to sorcery/magic practice. 'Sorcerers' is the most direct
    and contextually appropriate rendering.
- source_word: אֲשֶׁר הֵם אֹמְרִים אֲלֵיכֶם לֵאמֹר
  chosen: who are saying to you, ‘...’
  alternatives:
  - who say to you, ‘...’
  lexicon: HALOT
  rationale: The relative clause introduces the content of their repeated message.
    The progressive 'are saying' reflects the participle אֹמְרִים, though simple present
    would also be possible.
- source_word: לֹא תַעַבְדוּ
  chosen: You will not serve
  alternatives:
  - Do not serve
  - You shall not serve
  lexicon: HALOT
  rationale: 'In reported speech after אֹמְרִים לֵאמֹר, the imperfect is best taken
    as predictive: the false message is that subjection to Babylon will not happen.
    ''Do not serve'' would wrongly make it an imperative in the prophets'' speech.'
- source_word: אֶת מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: A straightforward construct chain. The standard English order is clear
    and preserves the political reference.
