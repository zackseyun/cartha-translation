theological_decisions:
- issue: Rendering a list of illegitimate revelatory practitioners without implying
    legitimacy equal to Jeremiah's prophecy
  chosen_reading: Retain the labels 'prophets, diviners, dreamers, soothsayers, sorcerers'
    as the text presents them, with the prohibition 'do not listen' making their unreliability
    clear.
  alternative_readings:
  - Render 'so-called prophets' to signal falsity explicitly
  rationale: The Hebrew itself names these figures directly and lets the surrounding
    context expose them as deceptive. Adding 'false' or 'so-called' would import an
    interpretive gloss not present in this verse.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
