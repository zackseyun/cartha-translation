theological_decisions:
- issue: Rendering the imprecatory petitions without softening their force
  chosen_reading: The verse is translated as a direct plea for God not to forgive/remove
    the enemies' guilt and to judge them in anger.
  alternative_readings:
  - Soften to a descriptive statement rather than petition
  - Render כפר simply as 'forgive' in the main text
  rationale: The Hebrew imperatives/jussive force are explicit, and the verse is an
    imprecatory prayer. The translation preserves that tension and severity rather
    than muting it for theological comfort. At the same time, 'cover over' retains
    the sacrificial metaphor of כפר without over-interpreting.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
