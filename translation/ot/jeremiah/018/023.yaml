id: JER.18.23
reference: Jeremiah 18:23
source:
  edition: WLC
  text: וְ/אַתָּ֣ה יְ֠הוָה יָדַ֜עְתָּ אֶֽת כָּל עֲצָתָ֤/ם עָלַ/י֙ לַ/מָּ֔וֶת אַל תְּכַפֵּר֙
    עַל עֲוֺנָ֔/ם וְ/חַטָּאתָ֖/ם מִ/לְּ/פָנֶ֣י/ךָ אַל תֶּ֑מְחִי ו/היו מֻכְשָׁלִים֙
    לְ/פָנֶ֔י/ךָ בְּ/עֵ֥ת אַפְּ/ךָ֖ עֲשֵׂ֥ה בָ/הֶֽם־־־־־׃ס
translation:
  text: But you, O LORD, know all their counsel against me for death. Do not cover
    over their iniquity, and do not blot out their sin from before you. Let them be
    made to stumble before you; in the time of your anger, act against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against me to kill me' / 'for my death.' The Hebrew literally reads
      'against me for death.'
    reason: lexical_alternative
  - marker: b
    text: Or 'forgive their iniquity.' The Hebrew verb can carry the sense of making
      atonement or covering over guilt; here the more literal metaphor is retained.
    reason: lexical_alternative
  - marker: c
    text: Or 'May they stumble before you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'LORD' per project doctrine for the divine name, following
    established English convention that signals YHWH without transliteration.
- source_word: עֲצָתָם
  chosen: their counsel
  alternatives:
  - their plan
  - their scheme
  lexicon: HALOT
  rationale: עֵצָה commonly denotes counsel, plan, or purpose. 'Counsel' preserves
    the noun's formal weight while still fitting the hostile plotting context.
- source_word: עָלַי לַמָּוֶת
  chosen: against me for death
  alternatives:
  - against me to kill me
  - for my death
  lexicon: HALOT
  rationale: The Hebrew is compact and literally 'against me for death.' The translation
    keeps the death-oriented purpose explicit without over-paraphrasing to a finite
    verb, though the sense is clearly a murderous plot.
- source_word: תְּכַפֵּר עַל עֲוֺנָם
  chosen: cover over their iniquity
  alternatives:
  - forgive their iniquity
  - atone for their guilt
  lexicon: HALOT
  rationale: כפר in the piel can mean cover, purge, or make atonement. In this imprecatory
    prayer with the negation אַל, 'cover over' preserves the concrete sacrificial
    metaphor and avoids importing a smoother interpretive gloss like 'forgive' into
    the main text.
- source_word: עֲוֺנָם
  chosen: their iniquity
  alternatives:
  - their guilt
  - their wrongdoing
  lexicon: HALOT
  rationale: עָוֺן can denote iniquity or guilt. 'Iniquity' pairs well with the following
    'sin' and preserves the moral-culpability nuance without collapsing the distinction
    between the two nouns.
- source_word: חַטָּאתָם
  chosen: their sin
  alternatives:
  - their offense
  lexicon: HALOT
  rationale: Standard rendering for חטאת here. Keeping 'iniquity' and 'sin' distinct
    reflects the Hebrew's parallel terms.
- source_word: תֶּמְחִי
  chosen: blot out
  alternatives:
  - wipe away
  - erase
  lexicon: HALOT
  rationale: מחה in this context is the common idiom for wiping out or blotting out
    sin. 'Blot out' is natural English and preserves the metaphor of removal from
    record or sight.
- source_word: מִלְּפָנֶיךָ
  chosen: from before you
  alternatives:
  - from your presence
  - out of your sight
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the spatial idiom and the judicial
    sense of sin standing before God.
- source_word: וְהָיוּ מֻכְשָׁלִים לְפָנֶיךָ
  chosen: Let them be made to stumble before you
  alternatives:
  - May they stumble before you
  - let them be overthrown before you
  lexicon: HALOT
  rationale: The clause is jussive in force. The hophal participle from כשל conveys
    being caused to stumble or being made to fall. 'Be made to stumble' preserves
    the passive/causative nuance better than the simpler 'stumble'.
- source_word: בְּעֵת אַפְּךָ
  chosen: in the time of your anger
  alternatives:
  - at the time of your anger
  - in the time of your wrath
  lexicon: HALOT
  rationale: אַף literally 'nose' idiomatically means anger/wrath. 'Anger' is more
    accessible modern English; 'time of your anger' keeps the temporal phrase intact.
- source_word: עֲשֵׂה בָהֶם
  chosen: act against them
  alternatives:
  - deal with them
  - do to them
  lexicon: HALOT
  rationale: 'The Hebrew is terse: ''do in/with them.'' ''Act against them'' makes
    the hostile judicial force explicit in idiomatic English without specifying more
    than the text states.'
