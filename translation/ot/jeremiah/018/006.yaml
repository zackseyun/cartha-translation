id: JER.18.6
reference: Jeremiah 18:6
source:
  edition: WLC
  text: הֲ/כַ/יּוֹצֵ֨ר הַ/זֶּ֜ה לֹא אוּכַ֨ל לַ/עֲשׂ֥וֹת לָ/כֶ֛ם בֵּ֥ית יִשְׂרָאֵ֖ל
    נְאֻם יְהוָ֑ה הִנֵּ֤ה כַ/חֹ֨מֶר֙ בְּ/יַ֣ד הַ/יּוֹצֵ֔ר כֵּן אַתֶּ֥ם בְּ/יָדִ֖/י
    בֵּ֥ית יִשְׂרָאֵֽל־־־׃ס
translation:
  text: Can I not do with you, house of Israel, as this potter does? declares the
    LORD. Look, like clay in the hand of the potter, so are you in my hand, house
    of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like this potter' / 'as this potter does.' The Hebrew comparison is
      concise and can be rendered slightly differently in English.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/כַ/יּוֹצֵר הַזֶּה
  chosen: as this potter does
  alternatives:
  - like this potter
  - as this potter
  lexicon: HALOT
  rationale: 'The interrogative הֲ with comparative כ introduces a comparison: ''as/like
    this potter.'' Rendering with ''as this potter does'' makes explicit the verbal
    force implied by the following לַעֲשׂוֹת (''to do/make'') and yields natural English
    without adding content beyond the comparison.'
- source_word: אוּכַל
  chosen: Can I
  alternatives:
  - Am I able to
  - Could I
  lexicon: HALOT
  rationale: יכל in the first person singular expresses ability/power. In this rhetorical
    question, 'Can I' is idiomatic and preserves the force of divine capability.
- source_word: לַעֲשׂוֹת לָכֶם
  chosen: do with you
  alternatives:
  - make for you
  - deal with you
  lexicon: HALOT
  rationale: עשה with ל can mean 'do/make for, to, with.' In context of the potter-clay
    analogy and divine action toward Israel, 'do with you' best captures the broad
    sense without over-specifying either beneficent or punitive action.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The construct phrase is a covenantal collective designation. 'House of
    Israel' preserves the formal address and prophetic register better than the simpler
    'Israel'.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic formula best rendered 'declares.' Per doctrine,
    יְהוָה is rendered 'the LORD.' This keeps the solemn prophetic cadence in readable
    modern English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, the default rendering of YHWH
    is 'the LORD,' following Jewish reverence tradition and the LXX pattern.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה draws attention emphatically. 'Look' is natural modern English
    and preserves the deictic force without archaic tone.
- source_word: כַחֹמֶר
  chosen: like clay
  alternatives:
  - as the clay
  lexicon: HALOT
  rationale: חֹמֶר is 'clay.' The prefixed כ marks comparison. Omitting the article
    in English is idiomatic here while preserving the simile.
- source_word: בְּיַד הַיּוֹצֵר
  chosen: in the hand of the potter
  alternatives:
  - in the potter's hand
  lexicon: HALOT
  rationale: The phrase is literal and metaphorically important for divine sovereignty.
    'In the hand of the potter' preserves the imagery clearly.
- source_word: כֵּן אַתֶּם בְּיָדִי
  chosen: so are you in my hand
  alternatives:
  - so you are in my hand
  - thus are you in my hand
  lexicon: HALOT
  rationale: כֵּן marks correspondence between image and referent. 'So are you in
    my hand' is a direct, natural rendering that preserves the metaphor and emphasis.
