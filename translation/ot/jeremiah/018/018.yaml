id: JER.18.18
reference: Jeremiah 18:18
source:
  edition: WLC
  text: וַ/יֹּאמְר֗וּ לְכ֨וּ וְ/נַחְשְׁבָ֣ה עַֽל יִרְמְיָהוּ֮ מַחֲשָׁבוֹת֒ כִּי֩ לֹא
    תֹאבַ֨ד תּוֹרָ֜ה מִ/כֹּהֵ֗ן וְ/עֵצָה֙ מֵֽ/חָכָ֔ם וְ/דָבָ֖ר מִ/נָּבִ֑יא לְכוּ֙
    וְ/נַכֵּ֣/הוּ בַ/לָּשׁ֔וֹן וְ/אַל נַקְשִׁ֖יבָה אֶל כָּל דְּבָרָֽי/ו־־־־־׃
translation:
  text: Then they said, “Come, let us devise plans against Jeremiah, for instruction
    will not perish from the priest, nor counsel from the wise man, nor word from
    the prophet. Come, let us strike him with the tongue, and let us not pay attention
    to any of his words.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let us attack him with our tongue,' that is, by slander or accusation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: Then they said
  alternatives:
  - And they said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then they said' gives natural
    English narrative flow while preserving sequence.
- source_word: לְכוּ
  chosen: Come
  alternatives:
  - Come now
  - Go
  lexicon: HALOT
  rationale: Idiomatic exhortation inviting joint action. 'Come' is standard in English
    for this hortatory particle-like imperative.
- source_word: וְנַחְשְׁבָה ... מַחֲשָׁבוֹת
  chosen: let us devise plans
  alternatives:
  - let us plan plans
  - let us scheme schemes
  - let us think thoughts
  lexicon: HALOT
  rationale: The verb and cognate noun intensify deliberate plotting. 'Devise plans'
    preserves the hostile intentionality without awkward literal repetition.
- source_word: עַל יִרְמְיָהוּ
  chosen: against Jeremiah
  alternatives:
  - concerning Jeremiah
  - about Jeremiah
  lexicon: HALOT
  rationale: 'In context of hostile plotting, עַל is adversative: plans are directed
    against him, not merely about him.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - surely
  lexicon: HALOT
  rationale: Introduces the rationale for their conspiracy. 'For' fits the explanatory
    force in direct speech.
- source_word: לֹא תֹאבַד
  chosen: will not perish
  alternatives:
  - will not be lost
  - will not fail
  lexicon: HALOT
  rationale: אָבַד here means to disappear or cease. 'Will not perish' is slightly
    formal but clear and preserves the sense that these sources of guidance will continue
    without Jeremiah.
- source_word: תּוֹרָה
  chosen: instruction
  alternatives:
  - law
  - teaching
  lexicon: HALOT
  rationale: Here torah refers to priestly instruction rather than specifically codified
    law. 'Instruction' best fits the priestly teaching function in context.
- source_word: מִכֹּהֵן
  chosen: from the priest
  alternatives:
  - from a priest
  lexicon: HALOT
  rationale: The singular is representative. 'The priest' in English can express the
    class function generically.
- source_word: וְעֵצָה
  chosen: nor counsel
  alternatives:
  - and counsel
  - advice
  lexicon: HALOT
  rationale: Under the scope of the negated clause, English idiom prefers 'nor counsel.'
    'Counsel' preserves the weightier sense of wise guidance.
- source_word: מֵחָכָם
  chosen: from the wise man
  alternatives:
  - from the wise
  - from a wise man
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular and representative. Per
    translation philosophy, gender-accurate rendering is retained.
- source_word: וְדָבָר
  chosen: nor word
  alternatives:
  - nor message
  - nor a word
  lexicon: HALOT
  rationale: In prophetic context דָבָר can mean an utterance or message. 'Word' preserves
    the biblical resonance and leaves the phrase broad enough to include prophetic
    speech.
- source_word: מִנָּבִיא
  chosen: from the prophet
  alternatives:
  - from a prophet
  lexicon: HALOT
  rationale: Representative singular parallel to 'the priest' and 'the wise man.'
- source_word: וְנַכֵּהוּ בַלָּשׁוֹן
  chosen: let us strike him with the tongue
  alternatives:
  - let us smite him with the tongue
  - let us attack him with our tongue
  - let us denounce him
  lexicon: HALOT
  rationale: The idiom likely refers to verbal attack, slander, or accusation. A relatively
    literal rendering preserves the metaphor and hostility; the idiomatic sense is
    worth noting in a footnote.
- source_word: וְאַל נַקְשִׁיבָה
  chosen: and let us not pay attention
  alternatives:
  - and let us not listen
  - and let us not heed
  lexicon: HALOT
  rationale: קשׁב means to attend or listen carefully. 'Pay attention' is readable
    modern English and conveys deliberate refusal to heed him.
- source_word: אֶל כָּל דְּבָרָיו
  chosen: to any of his words
  alternatives:
  - to all his words
  - to anything he says
  lexicon: HALOT
  rationale: With negation, 'any of his words' is natural English and captures the
    totalizing force of כָּל in this construction.
