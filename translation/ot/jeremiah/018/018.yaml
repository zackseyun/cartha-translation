theological_decisions:
- issue: Representative masculine singular in חָכָם
  chosen_reading: from the wise man
  alternative_readings:
  - from the wise
  - from a wise person
  rationale: The Hebrew uses a masculine singular representative noun. Following the
    project's gender-accurate policy, the masculine form is retained rather than neutralized,
    since the text presents social roles in conventional singular terms alongside
    'priest' and 'prophet.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
