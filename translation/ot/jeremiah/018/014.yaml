id: JER.18.14
reference: Jeremiah 18:14
source:
  edition: WLC
  text: הֲ/יַעֲזֹ֥ב מִ/צּ֛וּר שָׂדַ֖י שֶׁ֣לֶג לְבָנ֑וֹן אִם יִנָּתְשׁ֗וּ מַ֛יִם זָרִ֥ים
    קָרִ֖ים נוֹזְלִֽים־׃
translation:
  text: Does the snow of Lebanon leave the rock of the open country? Or are cold,
    flowing foreign waters ever uprooted?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the field rock,' 'the crag of the countryside,' or similar; the Hebrew
      phrase is difficult and likely evokes the rocky heights/open country associated
      with Lebanon's snow.
    reason: lexical_alternative
  - marker: b
    text: Or 'strange waters.' The phrase may refer to waters from a distant source
      rather than morally 'foreign' waters.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/יַעֲזֹב
  chosen: Does ... leave
  alternatives:
  - forsake
  - abandon
  lexicon: HALOT
  rationale: The interrogative with עזב introduces a rhetorical question. 'Leave'
    is the most natural English equivalent here for snow departing from its source/location;
    'forsake' would sound overly personal in this natural-image context.
- source_word: מִ/צּוּר שָׂדַי
  chosen: the rock of the open country
  alternatives:
  - the field rock
  - the crag of the countryside
  - the rocky height of the field
  lexicon: HALOT
  rationale: צוּר is 'rock/crag.' שָׂדַי is related to 'field/open country.' The phrase
    is difficult, but likely refers to the rocky heights/open country from which Lebanon's
    snow is visible or on which it remains. 'Rock of the open country' preserves the
    concrete imagery without overinterpreting.
- source_word: שֶׁלֶג לְבָנוֹן
  chosen: the snow of Lebanon
  alternatives:
  - Lebanon's snow
  lexicon: HALOT
  rationale: A straightforward construct relationship. 'The snow of Lebanon' is idiomatic
    and preserves the geographic image.
- source_word: אִם
  chosen: Or
  alternatives:
  - if
  lexicon: HALOT
  rationale: In this poetic parallelism, אִם introduces a second rhetorical question
    rather than a conditional clause. 'Or' best conveys the sense in English.
- source_word: יִנָּתְשׁוּ
  chosen: are ... ever uprooted
  alternatives:
  - are plucked up
  - are torn away
  - fail
  lexicon: HALOT
  rationale: The Niphal of נטש normally carries the sense 'be pulled up/uprooted.'
    Applied to waters, the image is unusual, but retaining 'uprooted' preserves the
    striking metaphor better than smoothing it to 'fail' or 'dry up,' which the Hebrew
    does not explicitly say.
- source_word: מַיִם
  chosen: waters
  alternatives:
  - water
  lexicon: HALOT
  rationale: Hebrew plural is commonly rendered 'waters' in elevated or poetic contexts,
    fitting Jeremiah's style here.
- source_word: זָרִים
  chosen: foreign
  alternatives:
  - strange
  - alien
  lexicon: HALOT
  rationale: זָר often means 'strange/foreign.' Here it likely describes waters coming
    from afar or from a foreign source. 'Foreign' preserves the lexical force while
    remaining readable. Because the phrase is debated, alternatives are preserved
    in a footnote.
- source_word: קָרִים
  chosen: cold
  alternatives:
  - cool
  lexicon: HALOT
  rationale: The adjective straightforwardly denotes temperature; 'cold' best matches
    the mountain-spring imagery.
- source_word: נוֹזְלִים
  chosen: flowing
  alternatives:
  - running
  - trickling
  lexicon: HALOT
  rationale: The participle describes waters in motion. 'Flowing' is natural modern
    English and broad enough to fit the image without minimizing it to a trickle.
