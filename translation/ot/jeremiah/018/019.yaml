id: JER.18.19
reference: Jeremiah 18:19
source:
  edition: WLC
  text: הַקְשִׁ֥יבָ/ה יְהוָ֖ה אֵלָ֑/י וּ/שְׁמַ֖ע לְ/ק֥וֹל יְרִיבָֽ/י׃
translation:
  text: Pay attention to me, O LORD, and hear the voice of my adversaries.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''hear the voice of my adversaries''; this may mean either hearing
      their accusations against Jeremiah or taking notice of their hostile plotting.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְשִׁיבָה
  chosen: Pay attention
  alternatives:
  - Give heed
  - Listen attentively
  lexicon: HALOT
  rationale: Hiphil imperative of קשׁב carries the sense of giving attentive heed,
    not merely passive hearing. 'Pay attention' is natural modern English and preserves
    the urgent petition.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition אֶל with first person singular suffix is straightforwardly
    directional, 'to me.' In English with 'pay attention,' 'to me' is idiomatic and
    clear.
- source_word: וּשְׁמַע
  chosen: and hear
  alternatives:
  - and listen to
  lexicon: HALOT
  rationale: Qal imperative of שׁמע commonly means 'hear' or 'listen.' Since the previous
    verb already expresses attentiveness, 'hear' preserves the parallelism without
    unnecessary repetition.
- source_word: לְקוֹל
  chosen: the voice of
  alternatives:
  - the sound of
  - what ... are saying
  lexicon: HALOT
  rationale: קוֹל literally means 'voice' or 'sound.' 'The voice of' keeps the concrete
    Hebrew expression and fits the prayer context.
- source_word: יְרִיבַי
  chosen: my adversaries
  alternatives:
  - my opponents
  - those who contend with me
  - my accusers
  lexicon: HALOT
  rationale: From ריב, those who contend or dispute with the speaker. 'My adversaries'
    captures active opposition broadly without narrowing the sense to legal accusation
    alone.
