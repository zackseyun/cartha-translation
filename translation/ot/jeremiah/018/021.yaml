theological_decisions:
- issue: Rendering an imprecatory prayer addressed to God
  chosen_reading: Preserve the direct petition for judgment without softening
  alternative_readings:
  - Convert to predictive future statements
  - Mitigate the violence with euphemistic language
  rationale: The Hebrew uses direct imperatives/jussive forms in Jeremiah's plea.
    Faithful translation should preserve the text's rhetorical and theological tension
    rather than dilute it. This is descriptive translation of the prophet's prayer,
    not endorsement beyond the text.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
