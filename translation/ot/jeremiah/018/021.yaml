id: JER.18.21
reference: Jeremiah 18:21
source:
  edition: WLC
  text: לָ/כֵן֩ תֵּ֨ן אֶת בְּנֵי/הֶ֜ם לָ/רָעָ֗ב וְ/הַגִּרֵ/ם֮ עַל יְדֵי חֶרֶב֒ וְ/תִֽהְיֶ֨נָה
    נְשֵׁי/הֶ֤ם שַׁכֻּלוֹת֙ וְ/אַלְמָנ֔וֹת וְ/אַ֨נְשֵׁי/הֶ֔ם יִֽהְי֖וּ הֲרֻ֣גֵי מָ֑וֶת
    בַּח֣וּרֵי/הֶ֔ם מֻכֵּי חֶ֖רֶב בַּ/מִּלְחָמָֽה־־־־׃
translation:
  text: Therefore give their children over to famine, and hand them over to the power
    of the sword. Let their wives become bereaved and widowed, and let their men be
    slain by death, their young men struck down by the sword in battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hand them over into the hands of the sword.' The Hebrew idiom is literally
      more concrete than the main text.
    reason: lexical_alternative
  - marker: b
    text: Or 'their sons' for 'their children'; the Hebrew can be read more narrowly,
      though it may also function collectively for offspring.
    reason: lexical_alternative
  - marker: c
    text: Literally 'killed of death,' a difficult Hebrew expression conveying fatal
      destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - Therefore then
  lexicon: HALOT
  rationale: Standard inferential particle introducing the consequence of the preceding
    plea; 'Therefore' preserves the formal connection clearly in modern English.
- source_word: תֵּן ... לָרָעָב
  chosen: give ... over to famine
  alternatives:
  - give ... to famine
  - deliver ... to famine
  lexicon: HALOT
  rationale: נתן with ל marks handing over to a fate or power. 'Give ... over to famine'
    makes the idiom natural in English while preserving the force of judicial surrender.
- source_word: בְּנֵיהֶם
  chosen: their children
  alternatives:
  - their sons
  lexicon: HALOT
  rationale: בנים can mean 'sons' more narrowly, but in judgment contexts it often
    functions collectively for offspring/children. 'Children' is natural and avoids
    overstating male specificity where the Hebrew collective may be broader.
- source_word: וְהַגִּרֵם
  chosen: hand them over
  alternatives:
  - pour them out
  - deliver them up
  - cast them out
  lexicon: HALOT
  rationale: From נגר in the Hiphil, used idiomatically here with עַל־יְדֵי חֶרֶב.
    The sense is of causing them to be given over/exposed to violent death. 'Hand
    them over' best captures the judicial-imprecatory force in idiomatic English.
    'Pour them out' is more literal to one possible image but less clear in context.
- source_word: עַל יְדֵי חֶרֶב
  chosen: to the power of the sword
  alternatives:
  - into the hands of the sword
  - by the sword
  lexicon: HALOT
  rationale: Literally 'upon the hands of the sword,' an idiom for being delivered
    into the sword's power. 'To the power of the sword' preserves the metaphor better
    than the flatter 'by the sword' while remaining readable.
- source_word: וְתִהְיֶינָה נְשֵׁיהֶם שַׁכֻּלוֹת וְאַלְמָנוֹת
  chosen: Let their wives become bereaved and widowed
  alternatives:
  - and their wives shall be bereaved and widows
  - let their women be childless and widows
  lexicon: HALOT
  rationale: Jussive/imprecatory force fits 'Let ... become.' שַׁכֻּלוֹת denotes bereaved
    women, especially deprived of children, not merely 'childless.' 'Wives' fits the
    possessive context better than the broader 'women.'
- source_word: שַׁכֻּלוֹת
  chosen: bereaved
  alternatives:
  - bereft of children
  - child-bereaved
  lexicon: HALOT
  rationale: The adjective denotes loss of children or offspring. 'Bereaved' is concise
    and idiomatic; the child-loss nuance is contextually present through the judgment
    on families.
- source_word: וְאַנְשֵׁיהֶם
  chosen: their men
  alternatives:
  - their husbands
  - their people
  lexicon: HALOT
  rationale: אֲנָשִׁים here refers specifically to the adult males in parallel with
    wives and young men. 'Their men' preserves the gendered and social contrast without
    narrowing to 'husbands' only.
- source_word: הֲרֻגֵי מָוֶת
  chosen: victims of death
  alternatives:
  - slain of death
  - deadly wounded
  - put to death
  lexicon: HALOT
  rationale: A difficult collocation, literally 'killed of death.' It intensifies
    the fatal outcome rather than specifying a separate means. 'Victims of death'
    preserves the grim idiom without wooden English. The following clause then specifies
    sword-death for the young men.
- source_word: בַּחוּרֵיהֶם
  chosen: their young men
  alternatives:
  - their chosen men
  - their youths
  lexicon: HALOT
  rationale: בחור commonly denotes young men in their prime, especially fighting-age
    males. 'Young men' is the clearest modern equivalent.
- source_word: מֻכֵּי חֶרֶב
  chosen: struck down by the sword
  alternatives:
  - smitten by the sword
  - killed by the sword
  lexicon: HALOT
  rationale: Passive participial construction indicating violent defeat. 'Struck down
    by the sword' is vivid, natural, and slightly more formal than 'killed,' fitting
    prophetic poetry.
- source_word: בַּמִּלְחָמָה
  chosen: in battle
  alternatives:
  - in war
  lexicon: HALOT
  rationale: '''In battle'' is more idiomatic in English for the immediate combat
    setting, while still faithful to the Hebrew noun for warfare.'
