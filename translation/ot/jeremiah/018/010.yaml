id: JER.18.10
reference: Jeremiah 18:10
source:
  edition: WLC
  text: וְ/עָשָׂ֤ה ה/רעה בְּ/עֵינַ֔/י לְ/בִלְתִּ֖י שְׁמֹ֣עַ בְּ/קוֹלִ֑/י וְ/נִֽחַמְתִּי֙
    עַל הַ/טּוֹבָ֔ה אֲשֶׁ֥ר אָמַ֖רְתִּי לְ/הֵיטִ֥יב אוֹתֽ/וֹ־׃ס
translation:
  text: but if it does what is evil in my sight by not listening to my voice, then
    I will relent concerning the good that I said I would do to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'change my mind.' The Hebrew verb can express relenting from a stated
      course of action.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to do good to it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  chosen: but if it does
  alternatives:
  - and it does
  - and he does
  lexicon: HALOT
  rationale: The verb עשה means 'do/make.' In context it continues the conditional
    pattern from the previous verse, so English supplies 'if' for natural sense. The
    3ms form refers back to the nation/kingdom from v. 9, so 'it' fits the collective
    antecedent better than 'he.'
- source_word: הָרָעָה
  chosen: what is evil
  alternatives:
  - the evil
  - evil
  lexicon: HALOT
  rationale: With the article, the phrase denotes evil conduct. 'What is evil' is
    idiomatic English and preserves the moral sense rather than sounding abstract.
- source_word: בְּעֵינַי
  chosen: in my sight
  alternatives:
  - in my eyes
  - before me
  lexicon: HALOT
  rationale: This Hebrew idiom means in God's evaluation or before him. 'In my sight'
    is a clear, established English equivalent.
- source_word: לְבִלְתִּי שְׁמֹעַ בְּקוֹלִי
  chosen: by not listening to my voice
  alternatives:
  - so as not to obey my voice
  - without listening to my voice
  lexicon: HALOT
  rationale: The construction expresses refusal or failure to heed. 'Listening to
    my voice' preserves the Hebrew wording, while 'by not' captures the manner/result
    connection with the evil action.
- source_word: וְנִחַמְתִּי
  chosen: then I will relent
  alternatives:
  - and I will relent
  - I will change my mind
  - I will repent
  lexicon: HALOT
  rationale: נחם in this context speaks of God reversing an announced course of action.
    'Relent' is standard, clear English that avoids the misleading modern sense of
    'repent' as moral wrongdoing, while still preserving the genuine contingency in
    the text.
- source_word: עַל הַטּוֹבָה
  chosen: concerning the good
  alternatives:
  - about the good
  - regarding the good thing
  - from the good
  lexicon: HALOT
  rationale: The preposition עַל here marks the matter concerned. 'Concerning the
    good' is natural and keeps the focus on the promised benefit/blessing.
- source_word: אֲשֶׁר אָמַרְתִּי
  chosen: that I said
  alternatives:
  - which I spoke
  - that I had spoken
  lexicon: HALOT
  rationale: Simple past is sufficient in English. 'Said' is more readable than 'spoke'
    here and accurately reflects אמר.
- source_word: לְהֵיטִיב אֹתוֹ
  chosen: I would do to it
  alternatives:
  - to do good to it
  - to benefit it
  lexicon: HALOT
  rationale: The Hiphil of יטב means 'do good, treat well, benefit.' Because English
    already has 'the good' earlier in the clause, 'do to it' avoids awkward repetition
    while still reflecting the promised beneficial action. The object pronoun is rendered
    'it' for the collective nation/kingdom antecedent.
