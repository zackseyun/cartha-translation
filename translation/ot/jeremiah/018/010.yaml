theological_decisions:
- issue: Rendering of divine נחם language
  chosen_reading: I will relent
  alternative_readings:
  - I will change my mind
  - I will repent
  rationale: The verse presents God's announced good as contingent on the nation's
    response. 'Relent' preserves that theological tension without implying moral fault
    in God. This follows the translation philosophy of preserving the text's tension
    rather than smoothing it away.
  doctrine_reference: Translation philosophy §3
