theological_decisions:
- issue: Rendering divine נִחַם language
  chosen_reading: then I will relent
  alternative_readings:
  - then I will repent
  - then I will change my mind
  rationale: The verse depicts God's announced judgment as responsive to human turning.
    'Relent' preserves the text's tension without suggesting moral fault in God. This
    follows the translation philosophy of preserving theological tension rather than
    resolving it away, while using accessible modern English.
  doctrine_reference: Translation philosophy §3, §6
