id: JER.18.8
reference: Jeremiah 18:8
source:
  edition: WLC
  text: וְ/שָׁב֙ הַ/גּ֣וֹי הַ/ה֔וּא מֵ/רָ֣עָת֔/וֹ אֲשֶׁ֥ר דִּבַּ֖רְתִּי עָלָ֑י/ו וְ/נִֽחַמְתִּי֙
    עַל הָ֣/רָעָ֔ה אֲשֶׁ֥ר חָשַׁ֖בְתִּי לַ/עֲשׂ֥וֹת לֽ/וֹ־׃ס
translation:
  text: and if that nation turns from its evil, about which I spoke against it, then
    I will relent concerning the disaster that I planned to do to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'turns back' or 'repents.' The Hebrew verb is literally 'turns/returns.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew uses the same word family for the nation's 'evil' and the 'disaster'
      God planned, but the sense shifts from moral evil to calamity.
    reason: lexical_alternative
  - marker: c
    text: Or 'change my mind'; Hebrew 'relent' language expresses God's responsive
      withdrawal of announced judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: וְשָׁב
  chosen: and if ... turns
  alternatives:
  - and turns
  - and returns
  - and repents
  lexicon: HALOT
  rationale: The verb שׁוּב means 'turn/return.' In this conditional context linked
    to the previous verse, English requires an explicit conditional sense ('if') even
    though the Hebrew conjunction is simply waw. 'Turns' preserves the concrete metaphor
    better than 'repents,' while still conveying moral reversal.
- source_word: הַגּוֹי הַהוּא
  chosen: that nation
  alternatives:
  - that people
  - that nation there
  lexicon: HALOT
  rationale: גּוֹי commonly means 'nation.' 'That nation' is the natural rendering
    of the demonstrative phrase and fits the corporate subject in context.
- source_word: מֵרָעָתוֹ
  chosen: from its evil
  alternatives:
  - from its wickedness
  - from its wrongdoing
  lexicon: HALOT
  rationale: רָעָה here denotes moral evil rather than calamity, as shown by the nation's
    action. 'Evil' keeps the lexical link with the later הָרָעָה, where the sense
    shifts to disaster/calamity.
- source_word: אֲשֶׁר דִּבַּרְתִּי עָלָיו
  chosen: about which I spoke against it
  alternatives:
  - which I spoke concerning
  - against which I pronounced judgment
  - about which I declared against it
  lexicon: HALOT
  rationale: דִּבֵּר עַל can mean 'speak concerning/against.' Because the context
    is announced judgment, 'spoke against it' best captures the adversative force
    while remaining close to the Hebrew wording.
- source_word: וְנִחַמְתִּי
  chosen: then I will relent
  alternatives:
  - then I will repent
  - then I will change my mind
  - then I will be sorry
  lexicon: HALOT
  rationale: נחם in this context refers to God relenting from announced judgment,
    not moral repentance. 'Relent' is idiomatic, theologically careful, and preserves
    the conditional responsiveness expressed in the passage.
- source_word: עַל הָרָעָה
  chosen: concerning the disaster
  alternatives:
  - concerning the calamity
  - about the harm
  - about the evil
  lexicon: HALOT
  rationale: Here רָעָה refers not to moral evil but to punitive disaster. Rendering
    it 'disaster' avoids implying moral evil in God while preserving the lexical contrast
    with the nation's 'evil' earlier in the verse.
- source_word: אֲשֶׁר חָשַׁבְתִּי
  chosen: that I planned
  alternatives:
  - that I intended
  - that I thought
  lexicon: HALOT
  rationale: חָשַׁב can mean think, plan, intend. In context of announced divine action,
    'planned' is clear modern English and conveys deliberate intention.
- source_word: לַעֲשׂוֹת לוֹ
  chosen: to do to it
  alternatives:
  - to bring upon it
  - to do for it
  lexicon: HALOT
  rationale: The infinitive with ל plus pronoun is straightforwardly 'to do to it.'
    'Bring upon it' is interpretive; 'do to it' stays closer to the Hebrew while remaining
    natural enough in English.
