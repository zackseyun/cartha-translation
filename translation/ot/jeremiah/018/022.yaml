id: JER.18.22
reference: Jeremiah 18:22
source:
  edition: WLC
  text: תִּשָּׁמַ֤ע זְעָקָה֙ מִ/בָּ֣תֵּי/הֶ֔ם כִּֽי תָבִ֧יא עֲלֵי/הֶ֛ם גְּד֖וּד פִּתְאֹ֑ם
    כִּֽי כָר֤וּ שיחה לְ/לָכְדֵ֔/נִי וּ/פַחִ֖ים טָמְנ֥וּ לְ/רַגְלָֽ/י־־׃
translation:
  text: Let a cry be heard from their houses when you suddenly bring a raiding band
    upon them, for they have dug a pit to capture me and hidden traps for my feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a troop' or 'a band of raiders' for 'a raiding band.'
    reason: lexical_alternative
  - marker: b
    text: Or 'snares for my feet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשָּׁמַע
  chosen: Let ... be heard
  alternatives:
  - may ... be heard
  - shall ... be heard
  lexicon: HALOT
  rationale: Nifal imperfect of שׁמע is naturally passive ('be heard'). In this imprecatory-prayer
    context, English jussive force is best conveyed with 'Let ... be heard' rather
    than a simple future.
- source_word: זְעָקָה
  chosen: a cry
  alternatives:
  - an outcry
  - a scream
  lexicon: HALOT
  rationale: The noun denotes a cry of distress. 'Cry' is idiomatic and preserves
    the emotional force without over-specifying.
- source_word: מִבָּתֵּיהֶם
  chosen: from their houses
  alternatives:
  - from their homes
  lexicon: HALOT
  rationale: 'Literal spatial source is intended: the cry is heard coming from their
    houses. ''Houses'' keeps the concrete image.'
- source_word: כִּי
  chosen: when
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'The first כִּי introduces the circumstance under which the cry will
    be heard: ''when you bring...''. Rendering it as ''when'' fits the syntax and
    flow better than a causal ''for'' here.'
- source_word: תָבִיא
  chosen: you ... bring
  alternatives:
  - you cause ... to come
  lexicon: HALOT
  rationale: Hiphil of בוא means 'bring' or 'cause to come.' 'Bring' is the natural
    English equivalent with God as the implied subject.
- source_word: גְּדוּד
  chosen: a raiding band
  alternatives:
  - a troop
  - a marauding band
  - a band of raiders
  lexicon: HALOT
  rationale: The term often refers to a troop or raiding party. 'Raiding band' captures
    the military/plundering sense more precisely than the generic 'troop.'
- source_word: פִּתְאֹם
  chosen: suddenly
  alternatives:
  - unexpectedly
  lexicon: HALOT
  rationale: Standard adverbial sense; 'suddenly' is direct and idiomatic.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: 'The second כִּי gives the reason for the imprecation: their prior plotting
    against Jeremiah.'
- source_word: כָרוּ
  chosen: they have dug
  alternatives:
  - they dug
  lexicon: HALOT
  rationale: Qal perfect can be rendered as English present perfect here to connect
    their completed action with the present plea.
- source_word: שִׁיחָה
  chosen: a pit
  alternatives:
  - a ditch
  - a trap-pit
  lexicon: HALOT
  rationale: The noun denotes a pit, often in a trapping context. 'Pit' is concise
    and preserves the metaphor.
- source_word: לְלָכְדֵנִי
  chosen: to capture me
  alternatives:
  - to seize me
  - to catch me
  lexicon: HALOT
  rationale: Infinitive of לכד expresses purpose. 'Capture' fits the trap imagery
    and hostile intent.
- source_word: וּפַחִים
  chosen: and hidden traps
  alternatives:
  - and snares
  lexicon: HALOT
  rationale: פחים are traps/snares. Because English requires a verb complement from
    the following טמנו, the phrase is rendered together as 'and hidden traps.' 'Traps'
    is more concrete for modern readers.
- source_word: טָמְנוּ
  chosen: hidden
  alternatives:
  - laid hidden
  - concealed
  lexicon: HALOT
  rationale: The verb means to hide or conceal, often of setting ambushes or snares.
    'Hidden' works smoothly with 'traps' in English.
- source_word: לְרַגְלָי
  chosen: for my feet
  alternatives:
  - for my steps
  - at my feet
  lexicon: HALOT
  rationale: Literal 'for my feet' preserves the bodily image of snares set in one's
    path. It is idiomatic enough in English and closer to the Hebrew than 'for my
    steps.'
