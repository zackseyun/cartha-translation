theological_decisions:
- issue: Imprecatory force of Jeremiah's prayer
  chosen_reading: Retain the petition as a direct appeal for judgment without softening
    its force.
  alternative_readings:
  - Render as a predictive statement rather than a petition
  rationale: The Hebrew imperfect with jussive sense in context is part of Jeremiah's
    imprecatory prayer. Softening it into mere prediction would mute the text's rhetorical
    and theological force.
  doctrine_reference: Translation philosophy §1, §3
