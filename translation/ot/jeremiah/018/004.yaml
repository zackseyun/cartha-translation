theological_decisions:
- issue: Anthropomorphic idiom and divine-potter imagery
  chosen_reading: Retain the concrete potter imagery without expanding it into an
    explicit theological explanation in the verse itself.
  alternative_readings:
  - Paraphrase toward God's sovereign right to reshape people/nations
  rationale: The immediate verse is a workshop image that later receives interpretation
    in context. To avoid importing doctrinal conclusions beyond the verse, the translation
    preserves the literal scene and its tension.
  doctrine_reference: Translation philosophy items 1 and 3
