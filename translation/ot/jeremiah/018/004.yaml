id: JER.18.4
reference: Jeremiah 18:4
source:
  edition: WLC
  text: וְ/נִשְׁחַ֣ת הַ/כְּלִ֗י אֲשֶׁ֨ר ה֥וּא עֹשֶׂ֛ה בַּ/חֹ֖מֶר בְּ/יַ֣ד הַ/יּוֹצֵ֑ר
    וְ/שָׁ֗ב וַֽ/יַּעֲשֵׂ֨/הוּ֙ כְּלִ֣י אַחֵ֔ר כַּ/אֲשֶׁ֥ר יָשַׁ֛ר בְּ/עֵינֵ֥י הַ/יּוֹצֵ֖ר
    לַ/עֲשֽׂוֹת׃פ
translation:
  text: And the vessel that he was making from the clay was spoiled in the potter’s
    hand, so he turned and made it into another vessel, as seemed right in the potter’s
    eyes to make.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “was marred” or “was ruined.” The Hebrew verb indicates that the vessel
      became defective while being worked.
    reason: lexical_alternative
  - marker: b
    text: Literally “as was right in the eyes of the potter to make,” an idiom meaning
      “as the potter saw fit to make.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁחַת
  chosen: was spoiled
  alternatives:
  - was ruined
  - was marred
  lexicon: HALOT
  rationale: The Niphal of שׁחת here describes the vessel becoming defective/ruined
    in process. 'Was spoiled' is natural English and preserves the passive/resultative
    sense without over-specifying cause. 'Marred' is traditional and possible, but
    can sound archaic or too mild; 'ruined' is stronger than the context requires.
- source_word: הַכְּלִי
  chosen: the vessel
  alternatives:
  - the container
  - the article
  lexicon: HALOT
  rationale: כְּלִי is a broad term for an object/vessel. In pottery context, 'vessel'
    is the most idiomatic and suitably specific rendering.
- source_word: עֹשֶׂה
  chosen: was making
  alternatives:
  - made
  - was fashioning
  lexicon: HALOT
  rationale: The participle with the relative clause conveys ongoing action in past
    narrative context. 'Was making' captures the process underway better than simple
    'made.' 'Was fashioning' is possible but slightly more interpretive/stylized.
- source_word: בַּחֹמֶר
  chosen: from the clay
  alternatives:
  - with the clay
  - in the clay
  lexicon: HALOT
  rationale: The phrase identifies the material being worked. English idiom prefers
    'from the clay' for making an object out of a substance. 'With the clay' is possible
    but less direct.
- source_word: בְּיַד הַיּוֹצֵר
  chosen: in the potter’s hand
  alternatives:
  - in the hand of the potter
  lexicon: HALOT
  rationale: This is a literal and natural rendering of the Hebrew idiom, preserving
    the image of the potter's direct control over the clay.
- source_word: הַיּוֹצֵר
  chosen: the potter
  alternatives:
  - the shaper
  - the former
  lexicon: HALOT
  rationale: In this concrete workshop context, יֹצֵר clearly means 'potter,' not
    the broader 'former/shaper.'
- source_word: וְשָׁב
  chosen: so he turned
  alternatives:
  - and he turned back
  - and he again
  lexicon: HALOT
  rationale: שׁוּב here introduces the potter's renewed action after the vessel was
    spoiled. 'So he turned' conveys the transition naturally. The sense is not primarily
    spatial repentance/return but resumption/reworking.
- source_word: וַיַּעֲשֵׂהוּ
  chosen: made it into
  alternatives:
  - made it
  - remade it as
  lexicon: HALOT
  rationale: The suffix refers back to the spoiled vessel/clay mass as the object
    of renewed shaping. 'Made it into' clearly expresses transformation into a different
    vessel.
- source_word: כְּלִי אַחֵר
  chosen: another vessel
  alternatives:
  - a different vessel
  - another container
  lexicon: HALOT
  rationale: This straightforwardly indicates a new form/product. 'Another vessel'
    is idiomatic and close to the Hebrew.
- source_word: כַּאֲשֶׁר יָשַׁר
  chosen: as seemed right
  alternatives:
  - as was right
  - as was pleasing
  lexicon: HALOT
  rationale: יָשַׁר means 'be right/straight/upright.' In this idiom with 'in the
    eyes of,' it denotes what seemed fitting or right to the potter. 'As seemed right'
    preserves the evaluative nuance without implying moral righteousness alone.
- source_word: בְּעֵינֵי הַיּוֹצֵר
  chosen: in the potter’s eyes
  alternatives:
  - to the potter
  - as the potter saw fit
  lexicon: HALOT
  rationale: The idiom literally means 'in the eyes of the potter,' expressing the
    potter's judgment. Retaining 'eyes' preserves the Hebrew image while remaining
    understandable in English.
- source_word: לַעֲשׂוֹת
  chosen: to make
  alternatives:
  - to do
  - to fashion
  lexicon: HALOT
  rationale: 'The infinitive completes the idiom: what seemed right to the potter
    to make. ''To make'' is the most direct and contextually appropriate rendering.'
