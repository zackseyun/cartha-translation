id: JER.18.16
reference: Jeremiah 18:16
source:
  edition: WLC
  text: לָ/שׂ֥וּם אַרְצָ֛/ם לְ/שַׁמָּ֖ה שרוקת עוֹלָ֑ם כֹּ֚ל עוֹבֵ֣ר עָלֶ֔י/הָ יִשֹּׁ֖ם
    וְ/יָנִ֥יד בְּ/רֹאשֽׁ/וֹ׃
translation:
  text: making their land a desolation, an object of perpetual hissing; everyone who
    passes by it will be appalled and shake his head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an everlasting hissing' or 'a perpetual whistling.' The Hebrew image
      likely refers to the derisive sound made by onlookers at a ruined land.
    reason: lexical_alternative
  - marker: b
    text: '''Shake his head'' renders a Hebrew gesture expressing scorn, astonishment,
      or dismay at the devastation.'
    reason: cultural_note
lexical_decisions:
- source_word: לָשׂוּם
  chosen: making
  alternatives:
  - to make
  - to set
  lexicon: HALOT
  rationale: Infinitive construct of שׂוּם with prefixed ל expresses result/purpose
    in continuation from the previous verse; English participial 'making' fits the
    syntax smoothly in context.
- source_word: אַרְצָם
  chosen: their land
  alternatives:
  - their country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the land belonging to the people under judgment.
    'Land' is the most direct rendering and fits prophetic judgment language.
- source_word: לְשַׁמָּה
  chosen: a desolation
  alternatives:
  - a horror
  - a wasteland
  lexicon: HALOT
  rationale: שַׁמָּה commonly denotes devastation/desolation in judgment contexts.
    'A desolation' preserves the noun form and prophetic register.
- source_word: שרוקת
  chosen: an object of ... hissing
  alternatives:
  - a hissing
  - a thing hissed at
  - a whistling
  lexicon: HALOT
  rationale: From a noun related to שרק, denoting derisive hissing/whistling at a
    ruined place. 'An object of ... hissing' makes the idiom intelligible in English
    while preserving the image.
- source_word: עוֹלָם
  chosen: perpetual
  alternatives:
  - everlasting
  - forever
  lexicon: HALOT
  rationale: Here עוֹלָם modifies the hissing as enduring/ongoing. 'Perpetual' is
    idiomatic with the preceding noun phrase and avoids overstating metaphysical eternity.
- source_word: כֹּל עוֹבֵר עָלֶיהָ
  chosen: everyone who passes by it
  alternatives:
  - all who pass over it
  - everyone passing by her
  lexicon: HALOT
  rationale: The phrase denotes passersby observing the judged land. 'Passes by it'
    is natural English; 'it' reflects the land rather than preserving Hebrew grammatical
    gender.
- source_word: יִשֹּׁם
  chosen: will be appalled
  alternatives:
  - will be astonished
  - will be desolated
  lexicon: HALOT
  rationale: Verb from שמם in the Qal often means to be appalled/astonished at devastation.
    'Will be appalled' best captures the observer's reaction in context.
- source_word: וְיָנִיד בְּרֹאשׁוֹ
  chosen: and shake his head
  alternatives:
  - and wag his head
  - and nod his head
  lexicon: HALOT
  rationale: The idiom נוד בראש signifies a gesture of scorn, astonishment, or derision.
    'Shake his head' is the clearest contemporary equivalent; 'wag his head' is more
    traditional but less natural in modern English.
