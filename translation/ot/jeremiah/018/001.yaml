id: JER.18.1
reference: Jeremiah 18:1
source:
  edition: WLC
  text: הַ/דָּבָר֙ אֲשֶׁ֣ר הָיָ֣ה אֶֽל יִרְמְיָ֔הוּ מֵ/אֵ֥ת יְהוָ֖ה לֵ/אמֹֽר־׃
translation:
  text: The word that came to Yirmeyahu from the LORD, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Yirmeyahu; traditionally Jeremiah.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the message
  - the matter
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word,' 'matter,' or 'message.' In prophetic formulae
    introducing divine revelation, 'the word' is the most direct and conventional
    rendering and preserves the formal linkage to prophetic speech.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle introducing the clause; 'that' is natural modern English
    in this construction.
- source_word: הָיָה אֶל
  chosen: came to
  alternatives:
  - was to
  - happened to come to
  lexicon: HALOT
  rationale: The idiom 'the word that was/came to [prophet]' is standard in prophetic
    superscriptions. 'Came to' is idiomatic English and reflects the sense of revelatory
    arrival better than the more wooden 'was to.'
- source_word: יִרְמְיָהוּ
  chosen: Yirmeyahu
  alternatives:
  - Jeremiah
  rationale: Per translation philosophy, personal names are transliterated by standard
    conventions rather than replaced by traditional Anglicized forms. 'Yirmeyahu'
    directly reflects the Hebrew name.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from the presence of
  - from with
  lexicon: HALOT
  rationale: In this context מֵאֵת marks source/origin. 'From' is the clearest English
    rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thus saying
  lexicon: HALOT
  rationale: This infinitive introduces the following divine speech in the next verse.
    Retaining 'saying' preserves the discourse connection and mirrors the Hebrew structure.
