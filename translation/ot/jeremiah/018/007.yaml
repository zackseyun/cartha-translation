theological_decisions:
- issue: Force of the divine speech formula in a conditional/judgment context
  chosen_reading: Rendered the imperfect as 'I may speak' rather than a flat present
    or past
  alternative_readings:
  - I speak
  - I declare
  rationale: The verse introduces a general principle about God's announced dealings
    with nations, not merely a single past utterance. 'May speak' preserves the open,
    situational force without importing a stronger modal theology than the Hebrew
    warrants.
  doctrine_reference: Translation philosophy §1, §3
