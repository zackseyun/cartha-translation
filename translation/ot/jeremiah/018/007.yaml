id: JER.18.7
reference: Jeremiah 18:7
source:
  edition: WLC
  text: רֶ֣גַע אֲדַבֵּ֔ר עַל גּ֖וֹי וְ/עַל מַמְלָכָ֑ה לִ/נְת֥וֹשׁ וְ/לִ/נְת֖וֹץ וּֽ/לְ/הַאֲבִֽיד־־׃
translation:
  text: At one moment I may speak concerning a nation and concerning a kingdom, to
    uproot and to tear down and to destroy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against a nation and against a kingdom.' The preposition can be rendered
      more adversatively in light of the judgment verbs that follow.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֶגַע
  chosen: At one moment
  alternatives:
  - In an instant
  - At one time
  - Suddenly
  lexicon: HALOT
  rationale: The noun denotes a moment or instant of time. 'At one moment' preserves
    the temporal force and fits the paired structure with the following verse, where
    the timing formula is repeated.
- source_word: אֲדַבֵּר
  chosen: I may speak
  alternatives:
  - I speak
  - I declare
  - I announce
  lexicon: HALOT
  rationale: The Piel imperfect 1cs here expresses a general or contingent action
    in a conditional-like formulation across vv. 7–10. 'I may speak' captures the
    non-past, situational sense better than a simple present while remaining natural
    English.
- source_word: עַל
  chosen: concerning
  alternatives:
  - against
  - about
  - over
  lexicon: HALOT
  rationale: With דבר in this context, the preposition introduces the object/topic
    of divine pronouncement. Because the infinitives that follow already convey judgment,
    'concerning' avoids prematurely narrowing the preposition itself to 'against'
    while still allowing the hostile content to emerge from the clause.
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  - Gentile nation
  lexicon: HALOT
  rationale: '''Nation'' is the standard contextual equivalent here for a political
    entity under divine judgment.'
- source_word: מַמְלָכָה
  chosen: kingdom
  alternatives:
  - realm
  - royal dominion
  lexicon: HALOT
  rationale: The term denotes a kingdom or realm. 'Kingdom' pairs naturally with 'nation'
    and preserves the political sense.
- source_word: לִנְתוֹשׁ
  chosen: to uproot
  alternatives:
  - to pluck up
  - to pull up
  lexicon: HALOT
  rationale: The verb is a common Jeremiah term for removing like a plant from the
    ground. 'Uproot' is vivid, modern, and preserves the metaphor better than the
    traditional but less natural 'pluck up'.
- source_word: לִנְתוֹץ
  chosen: to tear down
  alternatives:
  - to break down
  - to demolish
  lexicon: HALOT
  rationale: The verb denotes pulling down or demolishing structures. 'Tear down'
    is idiomatic and preserves the destructive imagery without over-specifying.
- source_word: וּלְהַאֲבִיד
  chosen: to destroy
  alternatives:
  - to make perish
  - to wipe out
  lexicon: HALOT
  rationale: The Hiphil of אבד here means to cause to perish/destroy. 'Destroy' is
    the clearest natural rendering in this judgment sequence.
