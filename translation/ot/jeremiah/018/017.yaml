theological_decisions:
- issue: Anthropomorphic language for divine rejection
  chosen_reading: 'Retain the bodily metaphor literally: ''I will show them my back
    and not my face.'''
  alternative_readings:
  - Paraphrase as 'I will turn away from them'
  - Paraphrase as 'I will not favor them'
  rationale: The Hebrew uses concrete anthropomorphic imagery to express divine withdrawal
    in judgment. In keeping with optimal equivalence and the instruction not to paraphrase
    beyond the source, the metaphor is preserved in the main text rather than resolved
    into an abstract theological explanation.
  doctrine_reference: Translation philosophy §§1, 3, 6
