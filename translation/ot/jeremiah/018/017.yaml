id: JER.18.17
reference: Jeremiah 18:17
source:
  edition: WLC
  text: כְּ/רֽוּחַ קָדִ֥ים אֲפִיצֵ֖/ם לִ/פְנֵ֣י אוֹיֵ֑ב עֹ֧רֶף וְ/לֹֽא פָנִ֛ים אֶרְאֵ֖/ם
    בְּ/י֥וֹם אֵידָֽ/ם־־׃ס
translation:
  text: Like an east wind I will scatter them before the enemy; I will show them my
    back and not my face in the day of their disaster.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will turn my back to them and not my face.' The Hebrew idiom pictures
      the LORD withdrawing favor rather than giving attentive presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּרוּחַ קָדִים
  chosen: Like an east wind
  alternatives:
  - Like the east wind
  - Like a scorching east wind
  lexicon: HALOT
  rationale: רוּחַ means 'wind,' and קָדִים denotes the east wind, often associated
    in Hebrew usage with destructive force. The simile marker כְּ requires 'like/as.'
    'Like an east wind' is natural English and preserves the image without over-interpreting
    the meteorological nuance.
- source_word: אֲפִיצֵם
  chosen: I will scatter them
  alternatives:
  - I will disperse them
  - I will drive them away
  lexicon: HALOT
  rationale: Hiphil of פוץ commonly carries the causative sense 'scatter/disperse.'
    'Scatter' is the most direct and idiomatic rendering here, fitting the judgment
    context.
- source_word: לִפְנֵי אוֹיֵב
  chosen: before the enemy
  alternatives:
  - before an enemy
  - in the presence of the enemy
  lexicon: HALOT
  rationale: Literally 'before enemy.' In context this indicates being driven/scattered
    in front of or before the attacking foe. 'Before the enemy' is concise and idiomatic
    in English.
- source_word: עֹרֶף וְלֹא פָנִים
  chosen: my back and not my face
  alternatives:
  - the back of my neck and not my face
  - the back and not the face
  lexicon: HALOT
  rationale: עֹרֶף literally refers to the back of the neck, and by extension the
    back turned away. In this idiom, paired with 'face,' it signifies rejection or
    withdrawal of favor. 'My back and not my face' preserves the concrete metaphor
    and makes explicit the implied first-person possessive in English.
- source_word: אֶרְאֵם
  chosen: I will show them
  alternatives:
  - I will look upon them
  - I will let them see
  lexicon: HALOT
  rationale: Although ראה usually means 'see,' in constructions with object plus predicate
    complement it can mean 'show' or 'cause to see.' Here 'I will show them my back
    and not my face' best fits the Hebrew idiom and parallelism.
- source_word: בְּיוֹם אֵידָם
  chosen: in the day of their disaster
  alternatives:
  - in the day of their calamity
  - when disaster comes upon them
  lexicon: HALOT
  rationale: אֵיד denotes disaster, calamity, or ruin. 'In the day of their disaster'
    is a close rendering of the temporal phrase and preserves the solemn prophetic
    diction.
