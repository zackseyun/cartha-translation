id: JER.18.15
reference: Jeremiah 18:15
source:
  edition: WLC
  text: כִּֽי שְׁכֵחֻ֥/נִי עַמִּ֖/י לַ/שָּׁ֣וְא יְקַטֵּ֑רוּ וַ/יַּכְשִׁל֤וּ/ם בְּ/דַרְכֵי/הֶם֙
    שְׁבִילֵ֣י עוֹלָ֔ם לָ/לֶ֣כֶת נְתִיב֔וֹת דֶּ֖רֶךְ לֹ֥א סְלוּלָֽה־׃
translation:
  text: For my people have forgotten me; they burn incense to emptiness. They have
    been made to stumble in their ways, the ancient paths, to walk on side roads,
    on a road not built up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to vanity,' 'to what is false,' or 'to idols.' The Hebrew says 'to emptiness/falsehood,'
      a term often used for worthless worship.
    reason: lexical_alternative
  - marker: b
    text: Or 'they caused them to stumble in their ways, the ancient paths.' The Hebrew
      allows an active rendering, but the agent is not explicit in a way that is clear
      in English.
    reason: alternative_reading
  - marker: c
    text: '''Ancient paths'' echoes Jeremiah''s recurring imagery of the long-established
      way God had set before his people; compare Jeremiah 6:16.'
    reason: cross_reference
  - marker: d
    text: Or 'bypaths' or 'tracks' for 'side roads.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁכֵחֻנִי
  chosen: have forgotten me
  alternatives:
  - have neglected me
  lexicon: HALOT
  rationale: Qal perfect with 1cs suffix from שׁכח, straightforwardly 'forget me.'
    'Forgotten' preserves the covenantal sense of abandoning remembrance without paraphrasing.
- source_word: לַשָּׁוְא
  chosen: to emptiness
  alternatives:
  - to vanity
  - to what is false
  - in vain
  lexicon: HALOT
  rationale: שָׁוְא often denotes emptiness, vanity, falsehood. Here after 'burn incense'
    it likely refers to worthless/false objects of worship. 'To emptiness' preserves
    the terse Hebrew and avoids over-specifying 'idols,' which is implied but not
    explicit.
- source_word: יְקַטֵּרוּ
  chosen: they burn incense
  alternatives:
  - they offer incense
  - they make sacrifices smoke
  lexicon: HALOT
  rationale: Piel of קטר commonly refers to burning incense or making offerings smoke.
    'Burn incense' is the most natural English rendering in this context.
- source_word: וַיַּכְשִׁלוּם
  chosen: they have been made to stumble
  alternatives:
  - they caused them to stumble
  - they made them stumble
  lexicon: HALOT
  rationale: The form is causative with 3mp object suffix, but the subject is not
    explicit in English context. Given the preceding plural verb and the broader syntax,
    the clause can be rendered passively to reflect the people's resulting condition
    without forcing an explicit agent. This preserves the Hebrew's compressed style
    and the sense that they were diverted from the right way.
- source_word: בְּדַרְכֵיהֶם
  chosen: in their ways
  alternatives:
  - from their ways
  - on their ways
  lexicon: HALOT
  rationale: ב + 'ways' is retained as 'in their ways.' In context it denotes the
    sphere/path of conduct from which stumbling occurs.
- source_word: שְׁבִילֵי עוֹלָם
  chosen: the ancient paths
  alternatives:
  - the everlasting paths
  - the age-old tracks
  lexicon: HALOT
  rationale: The phrase denotes long-established paths. 'Ancient paths' is idiomatic
    English and fits Jeremiah's recurring imagery of old, established covenantal ways.
- source_word: לָלֶכֶת
  chosen: to walk
  alternatives:
  - to go
  lexicon: HALOT
  rationale: Infinitive of הלך in path imagery is well rendered 'to walk,' preserving
    the metaphor of conduct.
- source_word: נְתִיבוֹת
  chosen: side roads
  alternatives:
  - bypaths
  - paths
  - tracks
  lexicon: HALOT
  rationale: נתיבות can mean paths or tracks. Here, contrasted with the ancient/main
    paths and followed by 'a road not built up,' it suggests lesser, improper tracks;
    'side roads' communicates that contrast in clear modern English.
- source_word: דֶּרֶךְ לֹא סְלוּלָה
  chosen: a road not built up
  alternatives:
  - an unraised road
  - an unprepared road
  - a highway not cast up
  lexicon: HALOT
  rationale: סלל refers to building up or casting up a road/highway. 'Not built up'
    preserves the physical image without archaic wording like 'cast up.'
