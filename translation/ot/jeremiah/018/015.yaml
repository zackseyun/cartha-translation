theological_decisions:
- issue: Idolatrous object implied by לַשָּׁוְא
  chosen_reading: Render generically as 'emptiness' rather than explicitly 'idols.'
  alternative_readings:
  - to idols
  - to false gods
  - in vain
  rationale: The verse condemns idolatry, but the Hebrew term itself is broader ('emptiness/vanity/falsehood').
    Keeping the more literal term avoids importing a noun not present in the text
    while still allowing the idolatrous force to be understood from context.
  doctrine_reference: Translation philosophy §1, §3
- issue: Agency in וַיַּכְשִׁלוּם
  chosen_reading: Use passive English ('they have been made to stumble').
  alternative_readings:
  - 'active: ''they caused them to stumble'''
  - active with implicit false gods/priests as subject
  rationale: The Hebrew clause is syntactically compressed and the agent is not clearly
    specified in a way that transfers neatly into English. A passive rendering preserves
    the result stated by the text without over-resolving who the immediate agent is.
  doctrine_reference: Translation philosophy §3
