id: JER.18.2
reference: Jeremiah 18:2
source:
  edition: WLC
  text: ק֥וּם וְ/יָרַדְתָּ֖ בֵּ֣ית הַ/יּוֹצֵ֑ר וְ/שָׁ֖מָּ/ה אַשְׁמִֽיעֲ/ךָ֥ אֶת דְּבָרָֽ/י־׃
translation:
  text: Arise and go down to the potter’s house, and there I will let you hear my
    words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Arise and go down to the house of the potter, and there
      I will cause you to hear my words.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֥וּם
  chosen: Arise
  alternatives:
  - Get up
  - Rise
  lexicon: HALOT
  rationale: Imperative of קום meaning to arise/stand up. 'Arise' preserves the prophetic-command
    tone better than the more colloquial 'get up.'
- source_word: וְ/יָרַדְתָּ֖
  chosen: and go down
  alternatives:
  - and go
  - and descend
  lexicon: HALOT
  rationale: ירד literally means 'go down/descend.' 'Go down' keeps the directional
    sense, which may reflect Jerusalem topography, while remaining natural English.
- source_word: בֵּ֣ית הַ/יּוֹצֵ֑ר
  chosen: to the potter’s house
  alternatives:
  - to the house of the potter
  lexicon: HALOT
  rationale: Construct phrase literally 'house of the potter.' 'Potter’s house' is
    idiomatic English and preserves the concrete image.
- source_word: הַ/יּוֹצֵר
  chosen: potter
  alternatives:
  - former
  - one who shapes
  lexicon: HALOT
  rationale: Though the participle of יצר can broadly mean one who forms/shapes, in
    this context the following narrative concerns a craftsman working clay, so 'potter'
    is the contextually precise rendering.
- source_word: וְ/שָׁ֖מָּ/ה
  chosen: and there
  alternatives:
  - and to there
  - there
  lexicon: HALOT
  rationale: Adverb of place with prefixed conjunction. 'And there' preserves the
    sequence and location emphasis.
- source_word: אַשְׁמִֽיעֲ/ךָ֥
  chosen: I will let you hear
  alternatives:
  - I will cause you to hear
  - I will make you hear
  - I will proclaim to you
  lexicon: HALOT
  rationale: Hiphil of שמע is causative, literally 'I will cause you to hear.' 'I
    will let you hear' is natural modern English while preserving the causative nuance
    better than simply 'I will tell you.'
- source_word: אֶת דְּבָרָֽ/י
  chosen: my words
  alternatives:
  - my message
  - my word
  lexicon: HALOT
  rationale: Plural 'my words' matches the Hebrew form and avoids prematurely collapsing
    the expression into the more interpretive singular 'my message.'
