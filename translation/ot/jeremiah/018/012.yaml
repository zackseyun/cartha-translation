id: JER.18.12
reference: Jeremiah 18:12
source:
  edition: WLC
  text: וְ/אָמְר֖וּ נוֹאָ֑שׁ כִּֽי אַחֲרֵ֤י מַחְשְׁבוֹתֵ֨י/נוּ֙ נֵלֵ֔ךְ וְ/אִ֛ישׁ
    שְׁרִר֥וּת לִבּֽ/וֹ הָ/רָ֖ע נַעֲשֶֽׂה־־׃ס
translation:
  text: But they will say, ‘It is hopeless, for we will follow our own plans, and
    each of us will act according to the stubbornness of his evil heart.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “It is in vain” or “There is no hope.” The Hebrew expression can convey
      either despair or the dismissal of the prophet’s appeal as pointless.
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹאָשׁ
  chosen: It is hopeless
  alternatives:
  - It is in vain
  - There is no hope
  lexicon: HALOT
  rationale: The noun/adjectival form conveys despair or futility in response to the
    prophetic call. 'It is hopeless' is idiomatic modern English and fits the people's
    refusal to repent. Alternatives are possible and worth preserving because the
    term can shade toward either despair ('no hope') or dismissal ('in vain').
- source_word: אַחֲרֵי מַחְשְׁבוֹתֵינוּ נֵלֵךְ
  chosen: we will follow our own plans
  alternatives:
  - we will walk after our own schemes
  - we will go after our own thoughts
  lexicon: HALOT
  rationale: The idiom 'go/walk after' often means to follow or pursue. מַחְשְׁבוֹת
    can mean thoughts, plans, or schemes; 'plans' is natural English and captures
    intentional self-direction without overinterpreting as necessarily crafty, though
    'schemes' is possible in context.
- source_word: וְאִישׁ
  chosen: and each of us
  alternatives:
  - and each man
  - and every one
  lexicon: HALOT
  rationale: The Hebrew is singular distributive ('and a man/each one'), referring
    collectively to the people. 'Each of us' preserves the distributive force in idiomatic
    English while avoiding an awkwardly wooden singular. This is gender-accurate to
    the representative sense rather than unnecessarily male-specific in English.
- source_word: שְׁרִרוּת
  chosen: stubbornness
  alternatives:
  - hardness
  - willfulness
  - obstinacy
  lexicon: HALOT
  rationale: This noun denotes stubborn self-will or obstinacy, especially in covenantal
    rebellion formulas. 'Stubbornness' is clear, established in Jeremiah, and preserves
    the moral force of resistant self-direction.
- source_word: לִבּוֹ הָרָע
  chosen: his evil heart
  alternatives:
  - his wicked heart
  - his evil mind
  lexicon: HALOT
  rationale: לֵב in Hebrew commonly denotes the inner will/thought center, often rendered
    'heart' in English Bible style. 'Evil heart' is the most direct rendering and
    preserves the moral evaluation explicit in הָרָע.
- source_word: נַעֲשֶׂה
  chosen: will act
  alternatives:
  - will do
  - will carry out
  lexicon: HALOT
  rationale: The verb עשה is broad ('do, make'). Here, after the statement of intent,
    'will act' reads naturally in English and conveys conduct flowing from the evil
    heart. 'Will do' is more literal but less idiomatic in this construction.
