theological_decisions:
- issue: Rendering the people's response as despair versus dismissive refusal
  chosen_reading: It is hopeless
  alternative_readings:
  - It is in vain
  - There is no hope
  rationale: The Hebrew can express either hopelessness or the sense that the prophetic
    appeal is pointless. In context, the people reject repentance and assert their
    intention to continue in self-willed evil. 'It is hopeless' preserves the force
    of refusal without softening their culpability; alternatives are preserved in
    a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
