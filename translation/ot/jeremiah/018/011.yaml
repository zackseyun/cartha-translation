id: JER.18.11
reference: Jeremiah 18:11
source:
  edition: WLC
  text: וְ/עַתָּ֡ה אֱמָר נָ֣א אֶל אִישׁ יְהוּדָה֩ וְ/עַל יוֹשְׁבֵ֨י יְרוּשָׁלִַ֜ם לֵ/אמֹ֗ר כֹּ֚ה אָמַ֣ר יְהוָ֔ה הִנֵּ֨ה אָנֹכִ֜י יוֹצֵ֤ר עֲלֵי/כֶם֙ רָעָ֔ה וְ/חֹשֵׁ֥ב עֲלֵי/כֶ֖ם מַֽחֲשָׁבָ֑ה שׁ֣וּבוּ נָ֗א אִ֚ישׁ מִ/דַּרְכּ֣/וֹ הָֽ/רָעָ֔ה וְ/הֵיטִ֥יבוּ דַרְכֵי/כֶ֖ם וּ/מַעַלְלֵי/כֶֽם־־־־׃
translation:
  text: 'Now therefore, say to the men of Judah and to the inhabitants of Jerusalem, saying, ‘Thus says Yahweh: Behold, I am shaping disaster against you and devising a plan against you. Turn back, please, each man from his evil way, and make your ways and your deeds good.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forming calamity against you.' The verb 'shaping' echoes the potter imagery in the surrounding context.
    reason: lexical_alternative
  - marker: b
    text: Or 'Return, please' or 'Repent, please.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'each man from his evil way'; the singular is distributive, addressing the community member by member.
    reason: cultural_note
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now therefore
  alternatives:
  - And now
  - So now
  lexicon: HALOT
  rationale: Signals transition and inference from the potter imagery just given; 'now therefore' preserves both temporal and consequential force better than a bare 'now'.
- source_word: אֱמָר נָא
  chosen: say
  alternatives:
  - please say
  - speak now
  lexicon: HALOT
  rationale: Imperative to Jeremiah. The particle נָא adds urgency/politeness; in English this is better reflected later with 'please' attached to the repentance command, where it is more natural, rather than as 'please say.'
- source_word: אֶל אִישׁ יְהוּדָה
  chosen: to the men of Judah
  alternatives:
  - to each man of Judah
  - to the people of Judah
  lexicon: HALOT
  rationale: Although אִישׁ is singular in form, it functions collectively here. 'Men of Judah' preserves the masculine/gender-accurate form better than the more neutral 'people of Judah,' while still reading naturally in English.
- source_word: וְעַל יוֹשְׁבֵי יְרוּשָׁלִַם
  chosen: and to the inhabitants of Jerusalem
  alternatives:
  - and concerning the inhabitants of Jerusalem
  - and against the inhabitants of Jerusalem
  lexicon: HALOT
  rationale: With אמר, על can mark the addressees/topic of speech. 'To the inhabitants' is idiomatic in English and fits the direct address context.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הִנֵּה אָנֹכִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: Introduces solemn divine announcement. 'Behold' retains prophetic gravity without adding content.
- source_word: יוֹצֵר
  chosen: shaping
  alternatives:
  - forming
  - fashioning
  lexicon: HALOT
  rationale: The participle echoes the potter imagery in the immediate context (same root used for forming). 'Shaping' is vivid and natural, preserving the metaphorical continuity.
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - calamity
  lexicon: HALOT
  rationale: In this judgment context the term denotes harmful judgment, not moral evil in God. 'Disaster' communicates the sense clearly and avoids theological misunderstanding.
- source_word: וְחֹשֵׁב ... מַחֲשָׁבָה
  chosen: and devising a plan
  alternatives:
  - and planning a plan
  - and thinking a thought
  - and devising a scheme
  lexicon: HALOT
  rationale: Hebrew uses cognate verb and noun for emphasis. English idiom prefers 'devising a plan,' which preserves intentionality without wooden repetition.
- source_word: שׁוּבוּ נָא
  chosen: Turn back, please
  alternatives:
  - Return, please
  - Repent, please
  lexicon: HALOT
  rationale: שׁוּב here calls for turning from evil conduct. 'Turn back' preserves the concrete metaphor and leaves theological breadth intact; 'repent' is possible but slightly more interpretive.
- source_word: אִישׁ מִדַּרְכּוֹ הָרָעָה
  chosen: each man from his evil way
  alternatives:
  - each one from his evil way
  - each man from his wicked path
  lexicon: HALOT
  rationale: Distributive singular אִישׁ is preserved with 'each man' in keeping with the project's gender-accurate principle. 'Way' is a common prophetic metaphor for conduct and should be retained.
- source_word: וְהֵיטִיבוּ
  chosen: and make ... good
  alternatives:
  - and amend
  - and improve
  lexicon: HALOT
  rationale: Hiphil of יטב means to make good/do good. 'Make ... good' keeps the causative force and links naturally with 'ways and deeds.'
- source_word: דַרְכֵיכֶם
  chosen: your ways
  alternatives:
  - your conduct
  - your paths
  lexicon: HALOT
  rationale: Prophetic idiom for manner of life. 'Ways' preserves the metaphor and aligns with the earlier singular 'way.'
- source_word: וּמַעַלְלֵיכֶם
  chosen: and your deeds
  alternatives:
  - and your actions
  - and your practices
  lexicon: HALOT
  rationale: Refers to concrete acts/behavior. 'Deeds' is concise and suitably weighty in a prophetic call to reform.
