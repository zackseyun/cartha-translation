theological_decisions:
- issue: Rendering of divine judgment term רָעָה when predicated of the LORD's action
  chosen_reading: disaster
  alternative_readings:
  - evil
  - calamity
  rationale: The context is announced covenant judgment, not moral evil in God. Rendering as 'disaster' preserves the Hebrew sense in context and avoids implying that the LORD commits moral evil.
  doctrine_reference: 'Translation philosophy: do not import doctrinal claims the text does not make; optimal equivalence.'
- issue: Gendered distributive language אִישׁ ... אִישׁ
  chosen_reading: men of Judah ... each man
  alternative_readings:
  - people of Judah ... each one
  rationale: The Hebrew uses masculine singular/collective forms. Per the project's gender-accurate principle, the translation preserves the masculine representative wording rather than neutralizing it, while still conveying collective force.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
