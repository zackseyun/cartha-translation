id: JER.18.13
reference: Jeremiah 18:13
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֚ה אָמַ֣ר יְהוָ֔ה שַֽׁאֲלוּ נָא֙ בַּ/גּוֹיִ֔ם מִ֥י שָׁמַ֖ע כָּ/אֵ֑לֶּה
    שַֽׁעֲרֻרִת֙ עָשְׂתָ֣ה מְאֹ֔ד בְּתוּלַ֖ת יִשְׂרָאֵֽל־׃
translation:
  text: 'Therefore, thus says the LORD: Ask now among the nations, who has heard the
    like of these things? Virgin Israel has done a very horrible thing.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who has heard such things?'
    reason: lexical_alternative
  - marker: b
    text: Or, 'Virgin Israel has done an appalling thing' or 'a shocking thing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Standard inferential conjunction introducing the divine conclusion from
    the preceding accusation/judgment context.
- source_word: כֹּה אָמַר יְהוָה
  chosen: thus says the LORD
  alternatives:
  - this is what the LORD says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula. YHWH is rendered 'the LORD'
    per doctrine guidelines.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and broad English Bible recognizability.
- source_word: שַׁאֲלוּ נָא בַּגּוֹיִם
  chosen: Ask now among the nations
  alternatives:
  - Inquire now among the nations
  - Ask, please, among the nations
  lexicon: HALOT
  rationale: Imperative plural calling for inquiry among the nations. נָא adds urgency/politeness;
    'now' captures the discourse force idiomatically without overformal 'please'.
- source_word: מִי שָׁמַע כָּאֵלֶּה
  chosen: who has heard the like of these things?
  alternatives:
  - who has heard such things?
  - who has ever heard anything like this?
  lexicon: HALOT
  rationale: Idiomatic rhetorical question expressing unprecedented scandal. 'The
    like of these things' preserves the comparative force of כָּאֵלֶּה while remaining
    natural English.
- source_word: שַׁעֲרֻרִת
  chosen: a very horrible thing
  alternatives:
  - an appalling thing
  - a shocking thing
  - a monstrous thing
  lexicon: HALOT
  rationale: The noun denotes something horrifying, appalling, or outrageous. 'Horrible
    thing' is accessible modern English; 'very' reflects the intensifying מְאֹד that
    follows.
- source_word: עָשְׂתָה מְאֹד
  chosen: has done a very horrible thing
  alternatives:
  - has done an utterly appalling thing
  - has acted most horribly
  lexicon: HALOT
  rationale: The verb plus following adverb is best represented in English by attaching
    the intensifier to the object phrase rather than woodenly rendering 'has done
    very much an appalling thing.' Present perfect fits the rhetorical force of a
    completed act with present significance.
- source_word: בְּתוּלַת יִשְׂרָאֵל
  chosen: Virgin Israel
  alternatives:
  - the virgin Israel
  - the virgin daughter Israel
  lexicon: HALOT
  rationale: A prophetic personification of Israel as a virgin. Capitalizing 'Virgin
    Israel' signals the personified national title. The construct does not require
    adding 'daughter,' which is absent here.
