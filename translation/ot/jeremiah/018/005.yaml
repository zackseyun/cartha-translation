id: JER.18.5
reference: Jeremiah 18:5
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֽוֹר־׃
translation:
  text: Then the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And it happened, the word of the LORD came to me, saying.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'Yahweh' for 'the LORD' (Hebrew יְהוָה).
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence.
    In contemporary English, 'Then' naturally conveys progression without the archaic
    formula 'it came to pass.' The verb's force is carried idiomatically with 'came'
    in the full clause.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: דבר in the prophetic formula commonly means 'word/message,' but 'the
    word' preserves the established prophetic idiom and reflects the construct relationship
    with the divine name.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the Septuagintal pattern.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus first-person singular suffix straightforwardly indicates
    direction toward Jeremiah; 'to me' is the natural modern English rendering.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - 'with these words:'
  lexicon: HALOT
  rationale: This infinitive introduces the following divine speech. 'Saying' is concise,
    standard, and preserves the formal transition into the quoted message of the next
    verse.
