id: JER.18.3
reference: Jeremiah 18:3
source:
  edition: WLC
  text: וָ/אֵרֵ֖ד בֵּ֣ית הַ/יּוֹצֵ֑ר ו/הנ/הו עֹשֶׂ֥ה מְלָאכָ֖ה עַל הָ/אָבְנָֽיִם־׃
translation:
  text: So I went down to the potter’s house, and there he was, doing work on the
    wheels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and behold, he was doing work on the wheels.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term refers to the potter’s wheel apparatus, literally a dual
      form, hence 'the wheels.'
    reason: cultural_note
lexical_decisions:
- source_word: וָאֵרֵד
  chosen: So I went down
  alternatives:
  - Then I went down
  - And I went down
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cs of ירד, narrating the next event in sequence. 'Went
    down' preserves the directional sense; 'So' captures the narrative continuation
    naturally in English.
- source_word: בֵּית הַיּוֹצֵר
  chosen: to the potter’s house
  alternatives:
  - to the house of the potter
  lexicon: HALOT
  rationale: Construct phrase literally 'house of the potter.' 'Potter’s house' is
    idiomatic modern English while preserving the possessive relationship.
- source_word: הַיּוֹצֵר
  chosen: the potter
  alternatives:
  - the former
  - the craftsman
  lexicon: HALOT
  rationale: From יצר in this context, the artisan who shapes clay. 'Potter' is the
    clear contextual sense and matches the imagery developed in the passage.
- source_word: וְהִנֵּהוּ
  chosen: and there he was
  alternatives:
  - and behold, he was
  - and look, he was
  lexicon: HALOT
  rationale: הִנֵּה introduces vivid attention to what Jeremiah sees; the pronominal
    suffix points to the potter. 'There he was' preserves the deictic force in readable
    modern English better than the more archaic 'behold.'
- source_word: עֹשֶׂה מְלָאכָה
  chosen: doing work
  alternatives:
  - working
  - doing a piece of work
  - making something
  lexicon: HALOT
  rationale: The participle plus noun emphasizes active labor. 'Doing work' keeps
    both elements without over-specifying the product; 'working' is possible but slightly
    compresses the Hebrew expression.
- source_word: עַל הָאָבְנָיִם
  chosen: on the wheels
  alternatives:
  - at the wheel
  - on the potter’s wheels
  lexicon: HALOT
  rationale: אָבְנַיִם is the dual form traditionally understood as the potter's two
    wheels or wheel apparatus. 'On the wheels' reflects the plural/dual form more
    closely than singular 'wheel,' while remaining natural English.
