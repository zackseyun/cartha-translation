theological_decisions:
- issue: Divine conditionality in prophetic speech
  chosen_reading: Render the verbs in a way that preserves the contingent, scenario-setting
    force without implying uncertainty in God.
  alternative_readings:
  - I speak concerning a nation...
  - I will speak concerning a nation...
  rationale: Jeremiah 18:7–10 presents principle statements about how God announces
    judgment or blessing in relation to a nation's response. 'I may speak' preserves
    that conditional framework in English better than a flat present, while avoiding
    a doctrinally loaded implication that God is unsure. The text itself presents
    genuine covenantal responsiveness, which should be preserved rather than flattened.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
