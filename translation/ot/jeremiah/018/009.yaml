id: JER.18.9
reference: Jeremiah 18:9
source:
  edition: WLC
  text: וְ/רֶ֣גַע אֲדַבֵּ֔ר עַל גּ֖וֹי וְ/עַל מַמְלָכָ֑ה לִ/בְנֹ֖ת וְ/לִ/נְטֹֽעַ־־׃
translation:
  text: And at another moment I may speak concerning a nation and concerning a kingdom,
    to build and to plant it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And in a moment I speak concerning a nation and concerning a kingdom,
      to build and to plant.' The Hebrew idiom uses 'moment' language to frame God's
      declarations in vv. 7–10.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/רֶגַע
  chosen: And at another moment
  alternatives:
  - And in an instant
  - And at one moment
  - And suddenly
  lexicon: HALOT
  rationale: רֶגַע denotes a moment or instant. In this paired context with v. 7 ('at
    one moment' to pluck up and destroy) and here a contrasting declaration, 'at another
    moment' brings out the temporal parallel and contrast naturally in English while
    preserving the idiom.
- source_word: אֲדַבֵּר
  chosen: I may speak
  alternatives:
  - I speak
  - I declare
  lexicon: HALOT
  rationale: The imperfect here expresses a contingent/future action in the prophetic
    scenario. 'May speak' captures the conditional, illustrative force in the larger
    context (vv. 7–10) better than a simple present, while remaining close to the
    Hebrew verb 'speak' rather than paraphrastic 'declare'.
- source_word: עַל
  chosen: concerning
  alternatives:
  - about
  - against
  - over
  lexicon: HALOT
  rationale: With דבר על, the sense is speaking with reference to or concerning an
    entity. 'Concerning' is precise and fits both occurrences here. 'Against' would
    import hostility not warranted in this positive verse.
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  lexicon: HALOT
  rationale: גּוֹי commonly denotes a nation or people-group. 'Nation' best matches
    the political/corporate sense here, especially paired with 'kingdom'.
- source_word: מַמְלָכָה
  chosen: kingdom
  alternatives:
  - realm
  - royal dominion
  lexicon: HALOT
  rationale: מַמְלָכָה refers to a kingdom or realm. 'Kingdom' is the standard, clear
    rendering and pairs naturally with 'nation'.
- source_word: לִ/בְנֹת
  chosen: to build
  alternatives:
  - to rebuild
  - to establish
  lexicon: HALOT
  rationale: The infinitive of בנה is literally 'to build.' Although in context it
    can imply establishment or restoration, the base image should be preserved in
    the main text.
- source_word: וְ/לִ/נְטֹעַ
  chosen: and to plant it
  alternatives:
  - and to plant
  - and to establish it
  lexicon: HALOT
  rationale: נטע is literally 'to plant.' English idiom often expects an object after
    'plant' in this context; the implied object is the nation/kingdom. Adding 'it'
    makes the sentence natural without changing the sense. The agricultural metaphor
    complements 'build' and should be retained.
