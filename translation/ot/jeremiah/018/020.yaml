theological_decisions:
- issue: Rendering divine anger term חֲמָה
  chosen_reading: wrath
  alternative_readings:
  - anger
  - fury
  rationale: In a prayer concerning divine judgment, 'wrath' preserves the gravity
    of God's judicial anger without importing later technical theology beyond the
    text.
  doctrine_reference: Translation philosophy §6
- issue: Interpretation of נֶפֶשׁ
  chosen_reading: my life
  alternative_readings:
  - my soul
  rationale: The context is a plot against Jeremiah's person, so 'life' better reflects
    the Hebrew sense and avoids suggesting a body/soul contrast not present in the
    verse.
  doctrine_reference: Translation philosophy §1
