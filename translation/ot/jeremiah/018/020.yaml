id: JER.18.20
reference: Jeremiah 18:20
source:
  edition: WLC
  text: הַ/יְשֻׁלַּ֤ם תַּֽחַת טוֹבָה֙ רָעָ֔ה כִּֽי כָר֥וּ שׁוּחָ֖ה לְ/נַפְשִׁ֑/י זְכֹ֣ר
    עָמְדִ֣/י לְ/פָנֶ֗י/ךָ לְ/דַבֵּ֤ר עֲלֵי/הֶם֙ טוֹבָ֔ה לְ/הָשִׁ֥יב אֶת חֲמָתְ/ךָ֖
    מֵ/הֶֽם־־׀־׃
translation:
  text: Should evil be repaid for good? For they have dug a pit for my life. Remember
    how I stood before you to speak good on their behalf, to turn your wrath away
    from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for my soul.' Here the Hebrew word often means 'life' or 'self' in contexts
      of mortal danger.
    reason: lexical_alternative
  - marker: b
    text: Or 'to speak for their good' or 'to speak well concerning them.' The sense
      is Jeremiah's intercession on their behalf before God.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיְשֻׁלַּם
  chosen: Should ... be repaid
  alternatives:
  - Is ... repaid
  - Will ... be repaid
  lexicon: HALOT
  rationale: Pual imperfect of שׁלם used in an interrogative sense. English passive
    'be repaid' best reflects the Hebrew stem and the rhetorical question.
- source_word: תַּחַת
  chosen: for
  alternatives:
  - instead of
  - in return for
  lexicon: HALOT
  rationale: In the idiom 'under/in place of good, evil,' English 'for' communicates
    reciprocal exchange naturally while preserving the sense of requital.
- source_word: טוֹבָה ... רָעָה
  chosen: good ... evil
  alternatives:
  - good ... harm
  lexicon: HALOT
  rationale: These are broad moral terms here, contrasting beneficence with malicious
    recompense. 'Good' and 'evil' preserve the stark ethical contrast.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the rhetorical question. 'For' fits the lament
    style and links the clauses smoothly.
- source_word: כָר֥וּ שׁוּחָה
  chosen: they have dug a pit
  alternatives:
  - they dug a pit
  - they have dug a trap-pit
  lexicon: HALOT
  rationale: The collocation commonly denotes digging a pit as a trap. 'Pit' is the
    most direct rendering; the perfect is represented naturally with 'have dug' in
    English.
- source_word: לְנַפְשִׁי
  chosen: for my life
  alternatives:
  - for me
  - for my soul
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the speaker's life/self in danger, not primarily
    the immaterial soul. 'For my life' conveys the threat clearly in modern English.
- source_word: זְכֹר
  chosen: Remember
  alternatives:
  - Call to mind
  lexicon: HALOT
  rationale: Imperative addressed to God in prayer. 'Remember' is the standard and
    natural rendering.
- source_word: עָמְדִי לְפָנֶיךָ
  chosen: how I stood before you
  alternatives:
  - that I stood before you
  lexicon: HALOT
  rationale: The infinitive-like recollection after 'Remember' is idiomatically expressed
    in English as 'Remember how I stood before you,' preserving the posture of intercession
    in God's presence.
- source_word: לְדַבֵּר עֲלֵיהֶם טוֹבָה
  chosen: to speak good on their behalf
  alternatives:
  - to speak for their good
  - to speak well concerning them
  lexicon: HALOT
  rationale: The phrase indicates intercessory speech for their benefit before God.
    'On their behalf' makes the mediating sense explicit without over-paraphrasing.
- source_word: לְהָשִׁיב אֶת חֲמָתְךָ מֵהֶם
  chosen: to turn your wrath away from them
  alternatives:
  - to turn back your wrath from them
  - to avert your fury from them
  lexicon: HALOT
  rationale: שׁוב in the Hiphil here means cause to turn back/away. 'Turn your wrath
    away from them' is clear, faithful, and idiomatic. 'Wrath' suitably renders חֵמָה
    in a divine-judgment context.
