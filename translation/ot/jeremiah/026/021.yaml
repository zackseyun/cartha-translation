id: JER.26.21
reference: Jeremiah 26:21
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֣ע הַ/מֶּֽלֶךְ יְ֠הוֹיָקִים וְ/כָל גִּבּוֹרָ֤י/ו וְ/כָל הַ/שָּׂרִים֙
    אֶת דְּבָרָ֔י/ו וַ/יְבַקֵּ֥שׁ הַ/מֶּ֖לֶךְ הֲמִית֑/וֹ וַ/יִּשְׁמַ֤ע אוּרִיָּ֨הוּ֙
    וַ/יִּרָ֔א וַ/יִּבְרַ֖ח וַ/יָּבֹ֥א מִצְרָֽיִם־־־־׃
translation:
  text: When King Jehoiakim, and all his warriors, and all the officials heard his
    words, the king sought to put him to death. But when Uriah heard, he was afraid
    and fled and went to Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'his mighty men' for 'his warriors.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'came to Egypt'; English idiom renders the movement as 'went
      to Egypt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: Standard rendering of שׁמע in narrative context meaning to hear/reportedly
    receive information. 'Heard' fits both occurrences in the verse.
- source_word: גִּבּוֹרָיו
  chosen: his warriors
  alternatives:
  - his mighty men
  - his strong men
  lexicon: HALOT
  rationale: גִּבּוֹר often denotes valiant fighting men or military retainers. 'Warriors'
    is clear modern English and preserves the martial sense better than the more traditional
    but less transparent 'mighty men'.
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the commanders
  lexicon: HALOT
  rationale: שׂרים refers broadly to rulers/court officials. In this royal court setting,
    'officials' best captures administrative leadership without implying hereditary
    nobility as 'princes' might.
- source_word: דְּבָרָיו
  chosen: his words
  alternatives:
  - his message
  - what he said
  lexicon: HALOT
  rationale: Formal enough to preserve the lexical link to דבר while remaining natural
    English. The referent is Uriah's prophetic speech.
- source_word: וַיְבַקֵּשׁ ... הֲמִיתוֹ
  chosen: sought to put him to death
  alternatives:
  - sought to kill him
  - tried to kill him
  lexicon: HALOT
  rationale: The idiom בקש + infinitive expresses intent/attempt. 'Sought to put him
    to death' preserves the formal gravity of the king's lethal intent better than
    the plainer 'kill him.'
- source_word: וַיִּרָא
  chosen: he was afraid
  alternatives:
  - he feared
  lexicon: HALOT
  rationale: English idiom prefers 'was afraid' here; it clearly expresses Uriah's
    fear response after hearing of the king's intent.
- source_word: וַיִּבְרַח
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: HALOT
  rationale: Concise narrative rendering of ברח, preserving the urgency of flight.
- source_word: מִצְרָיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: וַיָּבֹא
  chosen: went
  alternatives:
  - came
  - entered
  lexicon: HALOT
  rationale: Although the verb is literally 'came,' English idiom with destination
    from the narrator's perspective is better rendered 'went to Egypt.' This is a
    documented context-driven exception for readability.
- source_word: וַ
  chosen: But when Uriah heard
  alternatives:
  - And Uriah heard
  lexicon: HALOT
  rationale: 'The waw before ''Uriah heard'' advances the narrative with an adversative
    sense in context: the king sought his death, but Uriah heard and reacted. ''But''
    makes the implied contrast explicit in natural English without adding new content.'
