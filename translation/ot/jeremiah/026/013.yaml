id: JER.26.13
reference: Jeremiah 26:13
source:
  edition: WLC
  text: וְ/עַתָּ֗ה הֵיטִ֤יבוּ דַרְכֵי/כֶם֙ וּ/מַ֣עַלְלֵי/כֶ֔ם וְ/שִׁמְע֕וּ בְּ/ק֖וֹל יְהוָ֣ה אֱלֹהֵי/כֶ֑ם וְ/יִנָּחֵ֣ם יְהוָ֔ה אֶל הָ֣/רָעָ֔ה אֲשֶׁ֥ר דִּבֶּ֖ר עֲלֵי/כֶֽם־׃
translation:
  text: So now, make your ways and your deeds good, and listen to the voice of Yahweh your God, and Yahweh will relent concerning the disaster that he has spoken against you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'amend your ways and your deeds.' The Hebrew literally means 'make your ways and your deeds good.'
    reason: lexical_alternative
  - marker: b
    text: Or 'obey the voice of the LORD your God.' The Hebrew idiom 'listen to the voice' often carries the sense of obedience.
    reason: lexical_alternative
  - marker: c
    text: Or 'the LORD will relent from the disaster' or, more literally, 'the LORD will be sorry concerning the disaster.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: So now
  alternatives:
  - And now
  - Now therefore
  lexicon: HALOT
  rationale: Introduces an urgent transition and exhortation. 'So now' is natural modern English while preserving the discourse force better than a bare 'now.'
- source_word: הֵיטִיבוּ
  chosen: make ... good
  alternatives:
  - amend
  - improve
  - make better
  lexicon: HALOT
  rationale: Hiphil imperative of יטב means to make good/improve. Rendering it with an explicit object ('make your ways and your deeds good') preserves the causative force more transparently than the traditional idiom 'amend,' while remaining readable.
- source_word: דַרְכֵיכֶם
  chosen: your ways
  alternatives:
  - your conduct
  - your paths
  lexicon: HALOT
  rationale: '''Ways'' is a common Hebrew ethical metaphor and should be preserved where understandable. ''Conduct'' is interpretive; ''paths'' is more literal but less idiomatic here.'
- source_word: וּמַעַלְלֵיכֶם
  chosen: your deeds
  alternatives:
  - your actions
  - your practices
  lexicon: HALOT
  rationale: Refers to acts/deeds. 'Deeds' pairs well with 'ways' and preserves the moral dimension without overinterpreting.
- source_word: וְשִׁמְעוּ בְּקוֹל
  chosen: listen to the voice
  alternatives:
  - obey
  - listen to
  lexicon: HALOT
  rationale: The Hebrew idiom can imply obedience, but the wording explicitly says 'listen to the voice.' Preserving the idiom maintains the rhetorical texture; the obedience nuance is naturally implied in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward possessive construction following the divine name.
- source_word: וְיִנָּחֵם
  chosen: will relent
  alternatives:
  - will change his mind
  - will be sorry
  - will repent
  lexicon: HALOT
  rationale: Niphal of נחם here expresses relenting from announced judgment. 'Will relent' is idiomatic English and avoids misleading implications of moral repentance in God, while preserving the conditional reversal of threatened judgment.
- source_word: אֶל הָרָעָה
  chosen: concerning the disaster
  alternatives:
  - from the disaster
  - about the evil
  - concerning the harm
  lexicon: HALOT
  rationale: רָעָה in judgment contexts commonly denotes calamity/disaster rather than moral evil. The preposition אֶל after נחם is awkwardly literal in English; 'concerning' captures the sense without distortion.
- source_word: דִּבֶּר עֲלֵיכֶם
  chosen: has spoken against you
  alternatives:
  - pronounced against you
  - declared against you
  lexicon: HALOT
  rationale: This is the threatened word of judgment directed against the people. 'Has spoken against you' is close to the Hebrew and clear in English.
