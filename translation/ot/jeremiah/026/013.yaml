theological_decisions:
- issue: Rendering divine relenting
  chosen_reading: the LORD will relent concerning the disaster
  alternative_readings:
  - the LORD will repent of the evil
  - the LORD will change his mind about the disaster
  rationale: The verse presents the biblical tension that God announces judgment and, upon repentance, relents from carrying it out. The translation preserves that tension without importing a denial of divine immutability or implying moral fault in God. 'Disaster' avoids suggesting that God spoke moral evil against the people.
  doctrine_reference: Preserve theological tension rather than resolve it; יְהוָה default rendered 'the LORD'.
