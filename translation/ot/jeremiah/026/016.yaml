id: JER.26.16
reference: Jeremiah 26:16
source:
  edition: WLC
  text: וַ/יֹּאמְר֤וּ הַ/שָּׂרִים֙ וְ/כָל הָ/עָ֔ם אֶל הַ/כֹּהֲנִ֖ים וְ/אֶל הַ/נְּבִיאִ֑ים אֵין לָ/אִ֤ישׁ הַ/זֶּה֙ מִשְׁפַּט מָ֔וֶת כִּ֗י בְּ/שֵׁ֛ם יְהוָ֥ה אֱלֹהֵ֖י/נוּ דִּבֶּ֥ר אֵלֵֽי/נוּ־־־־־׃
translation:
  text: Then the officials and all the people said to the priests and the prophets, “This man does not deserve the sentence of death, for he has spoken to us in the name of Yahweh our God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “There is no sentence of death for this man,” or “This man is not worthy of death.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: “in the name of Yahweh our God.” Main text follows the project’s standard rendering of the divine name as “the LORD.”'
    reason: alternative_reading
lexical_decisions:
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the leaders
  lexicon: HALOT
  rationale: שָׂרִים refers to ruling authorities or court officials. 'Officials' is clear modern English and fits the judicial setting better than the more archaic 'princes.'
- source_word: וְכָל הָעָם
  chosen: and all the people
  alternatives:
  - and all the populace
  lexicon: HALOT
  rationale: A straightforward rendering preserving the collective public involvement in the judgment scene.
- source_word: הַכֹּהֲנִים ... הַנְּבִיאִים
  chosen: the priests and the prophets
  lexicon: HALOT
  rationale: These are the direct addressees of the officials and people; the standard renderings are both accurate and natural.
- source_word: אֵין לָאִישׁ הַזֶּה מִשְׁפַּט מָוֶת
  chosen: This man does not deserve a death sentence
  alternatives:
  - There is no sentence of death for this man
  - This man is not worthy of death
  - There is no legal claim of death against this man
  lexicon: HALOT
  rationale: Literally, 'there is not for this man a judgment/sentence of death.' מִשְׁפַּט here carries a judicial sense, so 'death sentence' best captures the legal force in idiomatic English. 'Deserve' smooths the English while preserving the verdict that he is not liable to capital punishment.
- source_word: אִישׁ הַזֶּה
  chosen: This man
  alternatives:
  - this האיש / this האיש?
  - this person
  lexicon: HALOT
  rationale: Gender-accurate and contextually specific, referring to Jeremiah as a male individual on trial.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the acquittal; 'for' fits the formal judicial explanation in English.
- source_word: בְּשֵׁם יְהוָה אֱלֹהֵינוּ
  chosen: in the name of the LORD our God
  alternatives:
  - in the name of Yahweh our God
  lexicon: HALOT
  rationale: 'בְּשֵׁם indicates agency/authorization: Jeremiah spoke under divine commission. Per doctrine, יְהוָה is rendered ''the LORD,'' not transliterated in the main text.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested-terms table for the divine name.
- source_word: דִּבֶּר אֵלֵינוּ
  chosen: he has spoken to us
  alternatives:
  - he spoke to us
  lexicon: HALOT
  rationale: The perfect verb reports a completed act with present relevance in the verdict. 'Has spoken' preserves that force naturally in English, though simple past is also possible.
