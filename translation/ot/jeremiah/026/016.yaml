  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Judicial force of מִשְׁפַּט מָוֶת
  chosen_reading: death sentence
  alternative_readings:
  - worthy of death
  - sentence of death
  rationale: The phrase is legal rather than merely moral in this trial context. 'Death sentence' communicates formal judicial liability without importing extra theology.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
