id: JER.26.3
reference: Jeremiah 26:3
source:
  edition: WLC
  text: אוּלַ֣י יִשְׁמְע֔וּ וְ/יָשֻׁ֕בוּ אִ֖ישׁ מִ/דַּרְכּ֣/וֹ הָ/רָעָ֑ה וְ/נִחַמְתִּ֣י
    אֶל הָ/רָעָ֗ה אֲשֶׁ֨ר אָנֹכִ֤י חֹשֵׁב֙ לַ/עֲשׂ֣וֹת לָ/הֶ֔ם מִ/פְּנֵ֖י רֹ֥עַ מַעַלְלֵי/הֶֽם־׃
translation:
  text: Perhaps they will listen, and each man will turn from his evil way, and I
    will relent concerning the disaster that I am planning to bring on them because
    of the evil of their deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hear'; the Hebrew verb can mean both hearing and heeding in prophetic
      contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'return' or 'repent' from his evil way.
    reason: lexical_alternative
  - marker: c
    text: Or 'I will change my mind concerning the disaster'; Hebrew 'relent' uses
      human language for God's withholding of announced judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - It may be
  - Maybe
  lexicon: HALOT
  rationale: Conveys possibility/hope without implying uncertainty in God beyond the
    Hebrew particle's plain sense.
- source_word: יִשְׁמְעוּ
  chosen: they will listen
  alternatives:
  - they will hear
  - they may listen
  lexicon: HALOT
  rationale: שׁמע often means not merely auditory hearing but heeding. 'Listen' fits
    the prophetic call context better than bare 'hear'.
- source_word: וְיָשֻׁבוּ
  chosen: will turn
  alternatives:
  - will return
  - will repent
  lexicon: HALOT
  rationale: שׁוב literally means 'turn/return.' 'Turn' preserves the metaphor and
    allows the following phrase 'from his evil way' to define the moral sense. 'Repent'
    is interpretive and therefore left as an alternative.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - everyone
  - each one
  lexicon: HALOT
  rationale: Gender-accurate rendering follows the Hebrew singular distributive אישׁ.
    In context it functions distributively over the people; 'each man' preserves the
    source form better than a neutral collective.
- source_word: מִדַּרְכּוֹ הָרָעָה
  chosen: from his evil way
  alternatives:
  - from his wicked way
  - from his evil path
  lexicon: HALOT
  rationale: A standard prophetic idiom for one's morally corrupt course of life.
    'Way' preserves the metaphorical consistency of דרך in prophetic literature.
- source_word: וְנִחַמְתִּי
  chosen: I will relent
  alternatives:
  - I will repent
  - I will change my mind
  - I will be sorry
  lexicon: HALOT
  rationale: נחם with God in judgment contexts commonly denotes relenting from announced
    calamity. 'Relent' preserves the anthropopathic force without suggesting moral
    error in God, unlike English 'repent.'
- source_word: אֶל הָרָעָה
  chosen: concerning the disaster
  alternatives:
  - about the calamity
  - from the evil
  lexicon: HALOT
  rationale: רעה here refers to threatened calamity/disaster, not moral evil. 'Concerning'
    reflects אל idiomatically after נחם in this context.
- source_word: חֹשֵׁב לַעֲשׂוֹת לָהֶם
  chosen: that I am planning to bring on them
  alternatives:
  - that I am thinking to do to them
  - that I intend to do to them
  lexicon: HALOT
  rationale: חשב + infinitive expresses intention/planning. 'Bring on them' makes
    explicit the idiomatic sense of doing disaster to someone in natural English while
    staying close to the Hebrew.
- source_word: מִפְּנֵי רֹעַ מַעַלְלֵיהֶם
  chosen: because of the evil of their deeds
  alternatives:
  - because of the wickedness of their actions
  - on account of their evil practices
  lexicon: HALOT
  rationale: מעללים refers to deeds/practices; the phrase grounds the threatened disaster
    in their morally evil conduct. 'Because of' is the natural causal force of מפני
    here.
