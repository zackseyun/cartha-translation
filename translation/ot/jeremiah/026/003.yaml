theological_decisions:
- issue: Rendering divine נחם
  chosen_reading: I will relent
  alternative_readings:
  - I will repent
  - I will change my mind
  rationale: The verse portrays God as withholding announced judgment in response
    to human turning. 'Relent' preserves the text's real conditionality and anthropopathic
    language without importing the idea that God morally erred and needed repentance.
    This maintains theological tension rather than resolving it away.
  doctrine_reference: Translation philosophy §3; Affirmations (historic orthodoxy)
