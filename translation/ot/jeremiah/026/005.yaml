theological_decisions:
- issue: Rendering the prophetic idiom וְהַשְׁכֵּם וְשָׁלֹחַ
  chosen_reading: again and again
  alternative_readings:
  - rising early and sending
  - persistently sending
  rationale: The phrase is anthropomorphic and idiomatic, stressing the LORD's persistent
    initiative rather than a literal time-of-day detail. Optimal equivalence favors
    conveying the force of the idiom in readable English while preserving the literal
    form in a footnote.
  doctrine_reference: Translation philosophy §2, §6
- issue: Rendering עֲבָדַי as 'servants' rather than 'slaves'
  chosen_reading: my servants
  alternative_readings:
  - my slaves
  rationale: The doctrine allows servant/slave context-dependently. Here the phrase
    is a prophetic title emphasizing commissioned agents of God, not the bonded-status
    nuance. 'Servants' better matches the idiom without importing a social emphasis
    the verse does not foreground.
  doctrine_reference: 'Contested terms table: δοῦλος servant/slave (context-dependent);
    Translation philosophy §1, §5'
