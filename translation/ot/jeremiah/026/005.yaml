id: JER.26.5
reference: Jeremiah 26:5
source:
  edition: WLC
  text: לִ/שְׁמֹ֗עַ עַל דִּבְרֵ֨י עֲבָדַ֣/י הַ/נְּבִאִ֔ים אֲשֶׁ֥ר אָנֹכִ֖י שֹׁלֵ֣חַ
    אֲלֵי/כֶ֑ם וְ/הַשְׁכֵּ֥ם וְ/שָׁלֹ֖חַ וְ/לֹ֥א שְׁמַעְתֶּֽם־׃
translation:
  text: to listen to the words of my servants the prophets, whom I am sending to you
    again and again, though you have not listened,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'rising early and sending,' a Hebrew idiom for persistent repeated
      action.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁמֹעַ
  chosen: to listen
  alternatives:
  - to hear
  - to obey
  lexicon: HALOT
  rationale: The infinitive construct with ל expresses purpose/result dependent on
    the previous verse ('if you do not listen...'). 'Listen' fits the immediate parallel
    with the later finite verb and preserves the sense of heeding without over-specifying
    'obey.'
- source_word: עַל
  chosen: to
  alternatives:
  - to the words of
  - concerning
  lexicon: HALOT
  rationale: With שׁמע, עַל can mark the object listened to. In idiomatic English,
    'listen to the words' is more natural than a wooden 'listen concerning/upon the
    words.'
- source_word: דִּבְרֵי
  chosen: the words
  alternatives:
  - the message
  - the words spoken
  lexicon: HALOT
  rationale: Plural construct of דָּבָר. 'Words' is the most direct rendering and
    preserves the concrete expression; 'message' would be smoother but slightly interpretive.
- source_word: עֲבָדַי
  chosen: my servants
  alternatives:
  - my slaves
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave/servant, in prophetic commissioning formulas
    'my servants the prophets' is an established idiom emphasizing divine service
    rather than bonded status. 'Servants' best fits the context.
- source_word: הַנְּבִאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Straightforward rendering of the appositional noun identifying the servants.
- source_word: אֲשֶׁר אָנֹכִי שֹׁלֵחַ אֲלֵיכֶם
  chosen: whom I am sending to you
  alternatives:
  - that I send to you
  - whom I send to you
  lexicon: HALOT
  rationale: The participle שֹׁלֵחַ conveys ongoing/repeated action in context. English
    progressive captures the active, continuing sense.
- source_word: וְהַשְׁכֵּם וְשָׁלֹחַ
  chosen: again and again
  alternatives:
  - rising early and sending
  - persistently sending
  - sending time after time
  lexicon: HALOT
  rationale: This Hebrew idiom literally means 'rising early and sending' and regularly
    conveys Yahweh's persistent, eager repeated action through the prophets. 'Again
    and again' communicates the idiomatic force in natural English. The more literal
    alternative is preserved in a footnote for auditability.
- source_word: וְלֹא שְׁמַעְתֶּם
  chosen: though you have not listened
  alternatives:
  - but you have not listened
  - and you did not listen
  lexicon: HALOT
  rationale: The clause is adversative relative to God's repeated sending. 'Though'
    makes the concessive force clear in English while preserving the accusation. Present
    perfect reflects the continuing relevance of their refusal.
