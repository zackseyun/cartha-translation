id: JER.26.10
reference: Jeremiah 26:10
source:
  edition: WLC
  text: וַֽ/יִּשְׁמְע֣וּ שָׂרֵ֣י יְהוּדָ֗ה אֵ֚ת הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה וַ/יַּעֲל֥וּ מִ/בֵּית הַ/מֶּ֖לֶךְ בֵּ֣ית יְהוָ֑ה וַ/יֵּֽשְׁב֛וּ בְּ/פֶ֥תַח שַֽׁעַר יְהוָ֖ה הֶ/חָדָֽשׁ׀־־׃ס
translation:
  text: When the officials of Judah heard these words, they went up from the king’s house to the house of Yahweh and sat at the entrance of the New Gate of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the princes of Judah.' The Hebrew term can denote high-ranking rulers or officials.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the palace.' Literally, 'from the king’s house.'
    reason: lexical_alternative
  - marker: c
    text: That is, a gate of the temple complex known as 'the New Gate.'
    reason: cultural_note
lexical_decisions:
- source_word: שָׂרֵי יְהוּדָה
  chosen: the officials of Judah
  alternatives:
  - the princes of Judah
  - the leaders of Judah
  lexicon: HALOT
  rationale: שָׂרִים refers to ruling officials or princes. 'Officials' communicates governing authorities in clear modern English without implying hereditary nobility as strongly as 'princes.'
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - this matter
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words,' 'things,' or 'matters.' In context they are hearing Jeremiah's spoken message/accusation, so 'these words' best preserves the verbal focus.
- source_word: וַיַּעֲלוּ
  chosen: they went up
  alternatives:
  - they came up
  - they ascended
  lexicon: HALOT
  rationale: עלה commonly means 'go up.' Retaining 'went up' preserves the Hebrew movement idiom, likely reflecting movement to the temple precincts and/or topography.
- source_word: מִבֵּית הַמֶּלֶךְ
  chosen: from the king’s house
  alternatives:
  - from the palace
  lexicon: HALOT
  rationale: Literally 'from the house of the king.' 'King’s house' preserves the Hebrew image; 'palace' is possible but slightly more interpretive.
- source_word: בֵּית יְהוָה
  chosen: to the house of the LORD
  alternatives:
  - to the temple of the LORD
  lexicon: HALOT
  rationale: בֵּית יְהוָה is literally 'house of YHWH.' Following the doctrine default, יְהוָה is rendered 'the LORD.' 'House of the LORD' preserves the formal temple designation more directly than the interpretive 'temple.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֵּשְׁבוּ
  chosen: and sat
  alternatives:
  - and took their seats
  - and sat down
  lexicon: HALOT
  rationale: ישׁב is straightforwardly 'sit/dwell/remain.' 'Sat' is the most direct rendering; the judicial nuance is supplied by context rather than expanded in translation.
- source_word: בְּפֶתַח
  chosen: at the entrance
  alternatives:
  - in the entrance
  - at the opening
  - at the doorway
  lexicon: HALOT
  rationale: פֶּתַח denotes an opening or entrance. 'At the entrance' fits the officials' location in relation to the gate.
- source_word: שַׁעַר יְהוָה הֶחָדָשׁ
  chosen: the New Gate of the LORD
  alternatives:
  - the new gate of the house of the LORD
  - the LORD’s new gate
  lexicon: HALOT
  rationale: The Hebrew sequence is literally 'gate of YHWH, the new [one].' 'The New Gate of the LORD' is natural English and preserves the genitival relation to the temple complex. Capitalizing 'New Gate' treats it as a known gate designation in context.
