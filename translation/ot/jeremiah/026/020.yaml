id: JER.26.20
reference: Jeremiah 26:20
source:
  edition: WLC
  text: וְ/גַם אִ֗ישׁ הָיָ֤ה מִתְנַבֵּא֙ בְּ/שֵׁ֣ם יְהוָ֔ה אֽוּרִיָּ֨הוּ֙ בֶּֽן שְׁמַעְיָ֔הוּ מִ/קִּרְיַ֖ת הַיְּעָרִ֑ים וַ/יִּנָּבֵ֞א עַל הָ/עִ֤יר הַ/זֹּאת֙ וְ/עַל הָ/אָ֣רֶץ הַ/זֹּ֔את כְּ/כֹ֖ל דִּבְרֵ֥י יִרְמְיָֽהוּ־־־־׃
translation:
  text: And there was also a man prophesying in the name of Yahweh, Uriah son of Shemaiah from Kiriath-jearim, and he prophesied against this city and against this land according to all the words of Jeremiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''concerning this city and this land.'' The Hebrew preposition can introduce the topic of prophecy more generally, though here the context favors a judgment sense: ''against.'''
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Uriah'; some English versions spell the name 'Urijah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: And there was also
  alternatives:
  - And also there was
  - There was also
  lexicon: HALOT
  rationale: Combines the conjunction and additive particle naturally in English while preserving the sense that this is an additional case alongside Jeremiah.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a certain man
  lexicon: HALOT
  rationale: The noun straightforwardly denotes an individual male person here. 'A man' preserves the gendered singular reference without unnecessary paraphrase.
- source_word: הָיָה מִתְנַבֵּא
  chosen: there was ... prophesying
  alternatives:
  - was prophesying
  - used to prophesy
  lexicon: HALOT
  rationale: 'The construction presents an ongoing or descriptive situation: a man existed who was engaged in prophesying. ''There was ... prophesying'' best reflects the Hebrew idiom in readable English.'
- source_word: בְּשֵׁם יְהוָה
  chosen: in the name of the LORD
  alternatives:
  - by the name of the LORD
  - in the LORD's name
  lexicon: HALOT
  rationale: Standard idiom for speaking under divine authority. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested-terms table for the divine name.
- source_word: אֽוּרִיָּהוּ
  chosen: Uriah
  alternatives:
  - Urijah
  lexicon: HALOT
  rationale: A standard English transliteration of the personal name. 'Urijah' is also possible, but 'Uriah' is more familiar and reflects common transliteration conventions.
- source_word: בֶּן שְׁמַעְיָהוּ
  chosen: son of Shemaiah
  alternatives:
  - the son of Shemaiah
  lexicon: HALOT
  rationale: A direct genealogical identification; the anarthrous English form is natural in apposition to the name.
- source_word: מִקִּרְיַת הַיְּעָרִים
  chosen: from Kiriath-jearim
  alternatives:
  - from Kiriath Jearim
  lexicon: HALOT
  rationale: Place name is transliterated rather than translated, following the philosophy for names. Hyphenation reflects common English convention for this toponym.
- source_word: וַיִּנָּבֵא
  chosen: and he prophesied
  alternatives:
  - and he spoke as a prophet
  lexicon: HALOT
  rationale: Simple narrative continuation with the same prophetic verb; keeping 'prophesied' preserves lexical consistency with the earlier participle.
- source_word: עַל הָעִיר הַזֹּאת
  chosen: against this city
  alternatives:
  - concerning this city
  - about this city
  lexicon: HALOT
  rationale: With prophetic speech, עַל commonly introduces the object of an oracle, often with adversative force in judgment contexts. 'Against' fits the context of threatening prophecy.
- source_word: וְעַל הָאָרֶץ הַזֹּאת
  chosen: and against this land
  alternatives:
  - and concerning this land
  lexicon: HALOT
  rationale: Parallel to 'against this city.' 'Land' is preferable to 'earth' because the reference is territorial and local.
- source_word: כְּכֹל דִּבְרֵי יִרְמְיָהוּ
  chosen: according to all the words of Jeremiah
  alternatives:
  - with all the words of Jeremiah
  - just like all the words of Jeremiah
  lexicon: HALOT
  rationale: כְּכֹל indicates correspondence or conformity. 'According to all the words of Jeremiah' preserves the close alignment between Uriah's message and Jeremiah's.
