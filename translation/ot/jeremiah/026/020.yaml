theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of prophetic speech introduced by עַל
  chosen_reading: against this city and against this land
  alternative_readings:
  - concerning this city and this land
  rationale: In this context the content parallels Jeremiah's judgment prophecies, so the adversative sense is contextually warranted without importing extra theology.
