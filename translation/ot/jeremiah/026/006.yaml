id: JER.26.6
reference: Jeremiah 26:6
source:
  edition: WLC
  text: וְ/נָתַתִּ֛י אֶת הַ/בַּ֥יִת הַ/זֶּ֖ה כְּ/שִׁלֹ֑ה וְ/אֶת הָ/עִ֤יר ה/זאתה אֶתֵּ֣ן
    לִ/קְלָלָ֔ה לְ/כֹ֖ל גּוֹיֵ֥י הָ/אָֽרֶץ־־׃ס
translation:
  text: then I will make this house like Shiloh, and I will make this city a curse
    for all the nations of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I will make this city an object of cursing for all the nations of the
      earth.”
    reason: lexical_alternative
  - marker: b
    text: Shiloh was the earlier sanctuary site that came under judgment; the comparison
      signals devastation and rejection.
    reason: cultural_note
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: then I will make
  alternatives:
  - and I will make
  - and I will give
  - then I will set
  lexicon: HALOT
  rationale: נתן literally means 'give/put/set,' but in this judgment context with
    double objects it idiomatically means to cause something to become a certain way.
    'Make' is natural English and preserves the causative force. 'Then' reflects the
    discourse continuation from the prior conditional context, though the conjunction
    itself is simply 'and.'
- source_word: הַבַּיִת הַזֶּה
  chosen: this house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: בַּיִת is literally 'house.' In Jeremiah 26 the referent is the temple,
    but 'house' preserves the Hebrew wording and its theological resonance as the
    house of the LORD, without over-specifying in the main text.
- source_word: כְּשִׁלֹה
  chosen: like Shiloh
  alternatives:
  - as Shiloh
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. Shiloh is transliterated as a place
    name per translation philosophy. 'Like Shiloh' preserves the allusion to the earlier
    sanctuary brought to ruin.
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  lexicon: HALOT
  rationale: Straightforward demonstrative phrase referring to Jerusalem in context.
- source_word: אֶתֵּן לִקְלָלָה
  chosen: I will make ... a curse
  alternatives:
  - I will give ... for a curse
  - I will make ... an object of cursing
  lexicon: HALOT
  rationale: The idiom נתן + ל + קללה means to make something into a curse or object
    invoked in cursing. 'Make ... a curse' is concise and idiomatic in English, while
    preserving the severe judgment sense.
- source_word: לְכֹל גּוֹיֵי הָאָרֶץ
  chosen: for all the nations of the earth
  alternatives:
  - to all the nations of the earth
  - for all the nations of the land
  lexicon: HALOT
  rationale: 'גּוֹיֵי הָאָרֶץ most naturally means ''nations of the earth/world''
    here, not merely local ''land.'' The preposition ל in this construction can indicate
    reference or effect: the city becomes a curse in relation to all nations, hence
    ''for all the nations of the earth.'''
