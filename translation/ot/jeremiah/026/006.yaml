theological_decisions:
- issue: Rendering of the temple reference
  chosen_reading: this house
  alternative_readings:
  - this temple
  rationale: Although the referent is the Jerusalem temple, the Hebrew says 'house.'
    Retaining 'house' preserves the covenantal and theological resonance of the temple
    as the LORD's house, while remaining intelligible in context.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of the judgment formula concerning the city
  chosen_reading: I will make this city a curse
  alternative_readings:
  - I will make this city an object of cursing
  rationale: The Hebrew idiom can mean either that the city itself becomes a curse-formula
    or that it becomes an object cited in curses. The shorter rendering keeps the
    idiom in the main text; the fuller nuance is preserved in a footnote to avoid
    over-resolving the expression.
  doctrine_reference: Translation philosophy §3
