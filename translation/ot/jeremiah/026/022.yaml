id: JER.26.22
reference: Jeremiah 26:22
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֞ח הַ/מֶּ֧לֶךְ יְהוֹיָקִ֛ים אֲנָשִׁ֖ים מִצְרָ֑יִם אֵ֣ת אֶלְנָתָ֧ן
    בֶּן עַכְבּ֛וֹר וַ/אֲנָשִׁ֥ים אִתּ֖/וֹ אֶל מִצְרָֽיִם־־׃
translation:
  text: 'Then King Jehoiakim sent men to Egypt: Elnathan son of Achbor, and men with
    him, to Egypt.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew repeats 'to Egypt' at the end for the destination of Elnathan and
      the men with him; the translation preserves the repetition.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: The waw-consecutive verb from שׁלח straightforwardly denotes sending.
    'Sent' is natural modern English and preserves the narrative sequence; 'Then'
    captures the consecutive force in context.
- source_word: הַמֶּלֶךְ יְהוֹיָקִים
  chosen: King Jehoiakim
  alternatives:
  - the king, Jehoiakim
  lexicon: HALOT
  rationale: The construct-like apposition is idiomatically rendered as title plus
    name in English. 'King Jehoiakim' is clear and natural.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  lexicon: HALOT
  rationale: The plural of אִישׁ here refers to male agents in an official mission.
    Per gender-accurate policy, 'men' is preferable to the more generic 'people'.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard rendering of the place name.
- source_word: אֵת
  chosen: ':'
  alternatives:
  - namely
  - —
  lexicon: HALOT
  rationale: Here אֵת marks the direct object, followed by specification of who the
    sent men were. A colon communicates the appositional identification smoothly in
    English without adding content.
- source_word: אֶלְנָתָן בֶּן עַכְבּוֹר
  chosen: Elnathan son of Achbor
  alternatives:
  - Elnathan the son of Achbor
  lexicon: HALOT
  rationale: Personal names are transliterated. 'Son of' is the standard concise rendering
    of the patronymic.
- source_word: וַאֲנָשִׁים אִתּוֹ
  chosen: and men with him
  alternatives:
  - and other men with him
  - with men accompanying him
  lexicon: HALOT
  rationale: The Hebrew simply says 'and men with him.' 'Other' is possible by implication
    but not explicit, so it is not added to the main text.
- source_word: אֶל מִצְרַיִם
  chosen: to Egypt
  alternatives:
  - into Egypt
  lexicon: HALOT
  rationale: The preposition אֶל is most naturally 'to.' Repeating 'to Egypt' reflects
    the Hebrew and clarifies destination, even though Egypt was already mentioned
    earlier in the verse.
