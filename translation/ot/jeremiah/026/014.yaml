id: JER.26.14
reference: Jeremiah 26:14
source:
  edition: WLC
  text: וַ/אֲנִ֖י הִנְ/נִ֣י בְ/יֶדְ/כֶ֑ם עֲשׂוּ לִ֛/י כַּ/טּ֥וֹב וְ/כַ/יָּשָׁ֖ר בְּ/עֵינֵי/כֶֽם־׃
translation:
  text: But as for me, here I am in your hand. Do to me what is good and right in
    your eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your hands'; Hebrew has the singular 'hand' in an idiomatic expression
      for being under someone's control.
    reason: lexical_alternative
  - marker: b
    text: Or 'as you see fit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But as for me
  alternatives:
  - And I
  - But I
  lexicon: HALOT
  rationale: 'The conjunction with the independent pronoun marks a contrastive shift:
    after Jeremiah''s defense, he turns to his own situation. ''But as for me'' brings
    out the adversative/discourse force more naturally than a bare ''And I.'''
- source_word: הִנְנִי
  chosen: here I am
  alternatives:
  - behold, I am here
  - I am here
  lexicon: HALOT
  rationale: The deictic-presentative formula signals readiness or availability. 'Here
    I am' is idiomatic modern English and preserves the force without archaic 'behold.'
- source_word: בְיֶדְכֶם
  chosen: in your hand
  alternatives:
  - in your hands
  - under your power
  lexicon: HALOT
  rationale: The Hebrew is singular 'hand' in an idiomatic expression for being under
    someone's control. 'In your hand' keeps the Hebrew image while remaining understandable
    in English.
- source_word: עֲשׂוּ לִי
  chosen: Do to me
  alternatives:
  - Deal with me
  - Do with me
  lexicon: HALOT
  rationale: The verb עשה with ל marks action directed toward Jeremiah. 'Do to me'
    is direct and fits the judicial context; 'deal with me' is possible but slightly
    more interpretive.
- source_word: כַּטּוֹב
  chosen: what is good
  alternatives:
  - as is good
  - what seems good
  lexicon: HALOT
  rationale: 'The prefixed כ here introduces the standard of action: according to
    what is good. In idiomatic English, ''what is good'' best conveys the sense.'
- source_word: וְכַיָּשָׁר
  chosen: and right
  alternatives:
  - and upright
  - and just
  lexicon: HALOT
  rationale: יָשָׁר commonly denotes what is straight/right. 'Right' pairs naturally
    with 'good' and preserves the moral-judicial nuance. 'Just' is possible in context
    but narrows the term more than necessary.
- source_word: בְּעֵינֵיכֶם
  chosen: in your eyes
  alternatives:
  - in your sight
  - as you see fit
  lexicon: HALOT
  rationale: This idiom means according to one's judgment or evaluation. 'In your
    eyes' preserves the Hebrew metaphor; 'as you see fit' is a smoother dynamic alternative
    but less formally transparent.
