id: JER.26.11
reference: Jeremiah 26:11
source:
  edition: WLC
  text: וַ/יֹּ֨אמְר֜וּ הַ/כֹּהֲנִ֤ים וְ/הַ/נְּבִאִים֙ אֶל הַ/שָּׂרִ֔ים וְ/אֶל כָּל
    הָ/עָ֖ם לֵ/אמֹ֑ר מִשְׁפַּט מָ֨וֶת֙ לָ/אִ֣ישׁ הַ/זֶּ֔ה כִּ֤י נִבָּא֙ אֶל הָ/עִ֣יר
    הַ/זֹּ֔את כַּ/אֲשֶׁ֥ר שְׁמַעְתֶּ֖ם בְּ/אָזְנֵי/כֶֽם־־־־־׃
translation:
  text: Then the priests and the prophets said to the officials and to all the people,
    saying, “A sentence of death is for this man, because he has prophesied against
    this city, just as you have heard with your own ears.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “This man deserves the death penalty.” The Hebrew literally reads “a
      judgment/sentence of death for this man,” preserving the formal judicial tone.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “to this city”; in this prophetic judgment context, the sense is
      “against this city.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence; 'And' is possible but less idiomatic
    here.
- source_word: הַכֹּהֲנִים וְהַנְּבִאִים
  chosen: the priests and the prophets
  lexicon: HALOT
  rationale: Straightforward rendering of the coordinated subjects; both groups are
    definite and should be preserved explicitly.
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the leaders
  lexicon: HALOT
  rationale: שָׂרִים refers to ruling authorities or officials. 'Officials' is clear
    modern English and fits the civic-judicial setting better than the more archaic
    'princes.'
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the populace
  lexicon: HALOT
  rationale: A standard rendering that preserves the comprehensiveness of כָּל and
    the collective sense of הָעָם.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Retained as 'saying' to reflect the Hebrew quotative infinitive and preserve
    the formal accusation structure.
- source_word: מִשְׁפַּט מָוֶת
  chosen: A sentence of death
  alternatives:
  - This man deserves the death penalty
  - A judgment of death
  lexicon: HALOT
  rationale: The phrase denotes a judicial verdict or liability to capital punishment.
    'A sentence of death' preserves the legal tone and stays close to the Hebrew.
    A more idiomatic expansion like 'deserves the death penalty' is possible but slightly
    more interpretive.
- source_word: לָאִישׁ הַזֶּה
  chosen: for this man
  alternatives:
  - against this man
  - belongs to this man
  lexicon: HALOT
  rationale: The lamed here marks the person subject to the judicial sentence. 'For
    this man' is concise and idiomatic in English legal style.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the stated ground for the accusation. 'Because' is clearer
    in modern English than 'for' while preserving the causal force.
- source_word: נִבָּא
  chosen: he has prophesied
  alternatives:
  - he prophesied
  lexicon: HALOT
  rationale: The perfect verb reports the completed act forming the basis of the charge.
    'Has prophesied' works well in English to connect the prior speech with the present
    accusation, though simple past is also possible.
- source_word: אֶל הָעִיר הַזֹּאת
  chosen: against this city
  alternatives:
  - concerning this city
  - to this city
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' with נבא in hostile judgment contexts
    it can function as 'against' in sense. The accusation is that Jeremiah spoke judgment
    against the city, not merely addressed it. This best matches the context and common
    prophetic idiom.
- source_word: כַּאֲשֶׁר שְׁמַעְתֶּם
  chosen: just as you have heard
  alternatives:
  - as you heard
  lexicon: HALOT
  rationale: כַּאֲשֶׁר introduces comparison to the audience's direct experience.
    'Just as' preserves that force naturally.
- source_word: בְּאָזְנֵיכֶם
  chosen: with your own ears
  alternatives:
  - in your hearing
  - with your ears
  lexicon: HALOT
  rationale: An idiomatic English rendering that preserves the emphasis on firsthand
    hearing. 'Own' is not explicit lexically but reflects the emphatic force in natural
    English.
