id: JER.26.7
reference: Jeremiah 26:7
source:
  edition: WLC
  text: וַֽ/יִּשְׁמְע֛וּ הַ/כֹּהֲנִ֥ים וְ/הַ/נְּבִאִ֖ים וְ/כָל הָ/עָ֑ם אֶֽת יִרְמְיָ֔הוּ
    מְדַבֵּ֛ר אֶת הַ/דְּבָרִ֥ים הָ/אֵ֖לֶּה בְּ/בֵ֥ית יְהוָֽה־־־׃
translation:
  text: And the priests and the prophets and all the people heard Jeremiah speaking
    these words in the house of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the temple of the LORD.' Literally, 'in the house of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְעוּ
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: 'The waw-consecutive imperfect narrates a past event: ''and ... heard.''
    ''Heard'' is the plain sense of שׁמע here, with no need to expand to ''obey''
    or similar interpretive senses.'
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים in temple context; the article is preserved.
- source_word: וְהַנְּבִאִים
  chosen: and the prophets
  lexicon: HALOT
  rationale: נְבִיאִים is straightforwardly 'prophets.' The conjunction is retained
    for the coordinate list.
- source_word: וְכָל הָעָם
  chosen: and all the people
  alternatives:
  - and all the populace
  lexicon: HALOT
  rationale: כָּל + הָעָם naturally means 'all the people.' 'People' is idiomatic
    and sufficiently broad for the gathered public.
- source_word: אֶת יִרְמְיָהוּ
  chosen: Jeremiah
  lexicon: HALOT
  rationale: Direct-object marker is not translated; the personal name is transliterated
    per project philosophy.
- source_word: מְדַבֵּר
  chosen: speaking
  alternatives:
  - as he spoke
  lexicon: HALOT
  rationale: The participle depicts Jeremiah in the act of speaking when heard. English
    participial 'speaking' preserves the durative/contemporaneous force better than
    a simple finite verb.
- source_word: אֶת הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words' or 'things,' but in a speech context 'words'
    is the more precise and natural rendering.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת with YHWH is literally 'house of YHWH.' 'House of the LORD' preserves
    the Hebrew expression while remaining clear in English; 'temple' is a valid contextual
    alternative but less formally aligned. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name, preserving
    the conventional small-caps substitute in English rather than transliteration.
