theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering תּוֹרָה in covenant context
  chosen_reading: law
  alternative_readings:
  - instruction
  rationale: The verse concerns covenantal obedience and the established divine standard set before the people. 'Law' best preserves that juridical-covenantal force in context, while 'instruction' remains a legitimate lexical alternative and is preserved in a footnote.
