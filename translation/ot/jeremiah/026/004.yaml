id: JER.26.4
reference: Jeremiah 26:4
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֔ם כֹּ֖ה אָמַ֣ר יְהוָ֑ה אִם לֹ֤א תִשְׁמְעוּ֙ אֵלַ֔/י לָ/לֶ֨כֶת֙ בְּ/ת֣וֹרָתִ֔/י אֲשֶׁ֥ר נָתַ֖תִּי לִ/פְנֵי/כֶֽם־׃
translation:
  text: 'And you shall say to them, ‘Thus says Yahweh: If you do not listen to me by walking in my law that I have set before you,’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “instruction”: the Hebrew torah can denote law, teaching, or instruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: And you shall say
  alternatives:
  - And you must say
  - Then you shall say
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic instruction functions as an imperative/future command to Jeremiah. 'Shall say' preserves the directive force in natural English.
- source_word: אֲלֵיהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Standard prepositional phrase indicating the audience of Jeremiah's speech.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - Thus said the LORD
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula. 'Thus says' is idiomatic and formally appropriate. יְהוָה is rendered 'the LORD' per doctrine guidance for the divine name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: אִם לֹא
  chosen: If you do not
  alternatives:
  - Unless you
  - If not
  lexicon: HALOT
  rationale: Introduces the protasis of a conditional warning. 'If you do not' is the clearest English equivalent here.
- source_word: תִשְׁמְעוּ אֵלַי
  chosen: listen to me
  alternatives:
  - obey me
  - hear me
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means 'listen to' or 'heed.' 'Listen to me' preserves the auditory language while allowing the following infinitive phrase to specify obedient response. 'Obey me' would frontload interpretation already expressed by 'to walk in my law.'
- source_word: לָלֶכֶת
  chosen: to walk
  alternatives:
  - to live
  - to follow
  lexicon: HALOT
  rationale: The infinitive construct of הלך is retained as 'to walk,' preserving the covenantal metaphor of conduct rather than flattening it to a purely dynamic paraphrase.
- source_word: בְּתוֹרָתִי
  chosen: in my law
  alternatives:
  - according to my law
  - in my instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction' broadly, but in Jeremiah's covenantal setting 'law' remains a strong and recognizable rendering. 'In my law' matches the Hebrew preposition and the idiom 'walk in.' 'Instruction' is a viable lexical alternative worth preserving.
- source_word: אֲשֶׁר נָתַתִּי לִפְנֵיכֶם
  chosen: that I have set before you
  alternatives:
  - that I gave before you
  - which I placed before you
  lexicon: HALOT
  rationale: נָתַן + לִפְנֵי idiomatically means to place or set before someone. 'Have set before you' is idiomatic English and preserves the present relevance of what God has given.
