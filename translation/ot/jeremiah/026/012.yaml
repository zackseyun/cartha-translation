id: JER.26.12
reference: Jeremiah 26:12
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יִרְמְיָ֨הוּ֙ אֶל כָּל הַ/שָּׂרִ֔ים וְ/אֶל כָּל הָ/עָ֖ם לֵ/אמֹ֑ר יְהוָ֣ה שְׁלָחַ֗/נִי לְ/הִנָּבֵ֞א אֶל הַ/בַּ֤יִת הַ/זֶּה֙ וְ/אֶל הָ/עִ֣יר הַ/זֹּ֔את אֵ֥ת כָּל הַ/דְּבָרִ֖ים אֲשֶׁ֥ר שְׁמַעְתֶּֽם־־־־־־־׃
translation:
  text: Then Yirmeyahu said to all the officials and to all the people, “Yahweh sent me to prophesy against this house and against this city all the words that you have heard.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “this temple.” Hebrew: “this house.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural English narrative flow while preserving sequence; 'And ... said' is more formally possible.
- source_word: יִרְמְיָהוּ
  chosen: Yirmeyahu
  alternatives:
  - Jeremiah
  rationale: Per project philosophy, personal names are transliterated rather than translated by traditional English forms. 'Jeremiah' is the conventional English equivalent but is not used in the main text.
- source_word: הַשָּׂרִים
  chosen: officials
  alternatives:
  - princes
  - leaders
  - rulers
  lexicon: HALOT
  rationale: שָׂרִים refers to governing authorities or court officials. 'Officials' is clear modern English and fits the judicial/public setting better than the archaic 'princes'.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: Standard rendering for עָם in this context; it refers to the gathered people generally.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - ':'
  lexicon: HALOT
  rationale: Retained to reflect the Hebrew speech-introduction structure. Though often omitted in smoother English, it is not redundant here and keeps the formal shape of the discourse.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and established English readability.
- source_word: שְׁלָחַנִי
  chosen: sent me
  alternatives:
  - has sent me
  lexicon: HALOT
  rationale: Simple past fits the narrative context and Jeremiah's defense speech. The perfect here is naturally rendered as a completed commissioning.
- source_word: לְהִנָּבֵא
  chosen: to prophesy against
  alternatives:
  - to prophesy to
  - to proclaim as a prophet against
  lexicon: HALOT
  rationale: 'With אֶל plus hostile content in context, the sense is adversative: Jeremiah was sent to announce judgment concerning the temple and city. English ''prophesy against'' makes that force explicit and matches the surrounding passage.'
- source_word: הַבַּיִת הַזֶּה
  chosen: this house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In Jeremiah's temple sermon context it refers to the temple, but 'house' preserves the Hebrew wording and allows the contextual temple reference to remain implicit.
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  lexicon: HALOT
  rationale: Straightforward deictic reference to Jerusalem.
- source_word: אֵת כָּל הַדְּבָרִים
  chosen: all the words
  alternatives:
  - all the things
  - everything
  lexicon: HALOT
  rationale: '''All the words'' preserves the lexical form דְּבָרִים and the prophetic emphasis on spoken revelation better than the more idiomatic ''everything.'''
- source_word: אֲשֶׁר שְׁמַעְתֶּם
  chosen: that you have heard
  alternatives:
  - which you heard
  lexicon: HALOT
  rationale: Present perfect in English naturally conveys words already spoken and still relevant to the current hearing. It is idiomatic while remaining close to the Hebrew sense.
