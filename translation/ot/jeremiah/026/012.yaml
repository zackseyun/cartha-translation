theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of Jeremiah's commission toward temple and city
  chosen_reading: to prophesy against this house and against this city
  alternative_readings:
  - to prophesy to this house and to this city
  rationale: Although אֶל often means 'to,' the content and immediate context are accusatory and judicial; Jeremiah is defending his proclamation of judgment. Rendering 'against' preserves the prophetic confrontation without adding content beyond the contextual force.
