theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse explicitly names Israel's covenant God. The doctrinal guidelines
    specify 'the LORD' as the default rendering for יְהוָה, with alternatives preserved
    only as lexical possibilities rather than adopted in the main text.
