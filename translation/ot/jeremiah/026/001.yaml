id: JER.26.1
reference: Jeremiah 26:1
source:
  edition: WLC
  text: בְּ/רֵאשִׁ֗ית מַמְלְכ֛וּת יְהוֹיָקִ֥ים בֶּן יֹאשִׁיָּ֖הוּ מֶ֣לֶךְ יְהוּדָ֑ה
    הָיָה֙ הַ/דָּבָ֣ר הַ/זֶּ֔ה מֵ/אֵ֥ת יְהוָ֖ה לֵ/אמֹֽר־׃
translation:
  text: At the beginning of the reign of Jehoiakim son of Josiah, king of Judah, this
    word came from the LORD, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'At the outset of the reign of Jehoiakim.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'this word was from the LORD'; the English 'came from the LORD' reflects
      the normal prophetic formula.
    reason: lexical_alternative
  - marker: c
    text: '''the LORD'' renders the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: בְּרֵאשִׁית
  chosen: At the beginning of
  alternatives:
  - In the beginning of
  - At the outset of
  lexicon: HALOT
  rationale: The preposition ב plus רֵאשִׁית marks the initial period of something.
    'At the beginning of' is idiomatic modern English and preserves the temporal force
    without sounding overly wooden.
- source_word: מַמְלְכוּת
  chosen: the reign of
  alternatives:
  - the kingdom of
  - the kingship of
  lexicon: HALOT
  rationale: In context with a named king, מַמְלְכוּת refers to the period or exercise
    of royal rule, best rendered 'reign' rather than the more territorial 'kingdom.'
- source_word: יְהוֹיָקִים
  chosen: Jehoiakim
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
- source_word: בֶּן יֹאשִׁיָּהוּ
  chosen: son of Josiah
  rationale: Standard genealogical expression; 'son of' is the plain and natural rendering.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - the king of Judah
  lexicon: HALOT
  rationale: Appositional title identifying Jehoiakim. English idiom does not require
    the article here, though it could be supplied.
- source_word: הָיָה הַדָּבָר הַזֶּה
  chosen: this word came
  alternatives:
  - this word was
  - this matter came to pass
  lexicon: HALOT
  rationale: The Hebrew literally says 'this word was,' but in prophetic formulae
    English commonly and accurately expresses the idiom as 'this word came.' This
    avoids awkwardness while preserving the sense of a revelatory message arriving.
- source_word: דָּבָר
  chosen: word
  alternatives:
  - message
  - matter
  lexicon: HALOT
  rationale: In prophetic introduction formulas, דָּבָר often denotes a divine utterance
    or message. 'Word' preserves the biblical idiom and theological weight better
    than the flatter 'message.'
- source_word: מֵאֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: 'מֵאֵת marks source/origin: the word comes from YHWH. Per doctrine, יְהוָה
    is rendered ''the LORD'' rather than transliterated.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Required by the doctrinal default for the divine name, following Jewish
    reverence tradition and longstanding English convention.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'thus:'
  - 'as follows:'
  lexicon: HALOT
  rationale: Standard introduction to direct speech. Retaining 'saying' keeps close
    contact with the Hebrew discourse structure and prepares for the following quotation
    in the next verse.
