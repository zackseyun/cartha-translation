theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the project's contested-terms policy and consistent with
    established reverential English Bible practice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of אֶל יִרְמְיָהוּ in the crowd's action
  chosen_reading: against Jeremiah
  alternative_readings:
  - to Jeremiah
  - around Jeremiah
  rationale: The immediate context is accusatory and hostile; rendering the preposition
    adversatively preserves the narrative tension without adding doctrinal interpretation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve tension rather
    than resolve it beyond the text'
