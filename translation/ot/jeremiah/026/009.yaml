id: JER.26.9
reference: Jeremiah 26:9
source:
  edition: WLC
  text: מַדּוּעַ֩ נִבֵּ֨יתָ בְ/שֵׁם יְהוָ֜ה לֵ/אמֹ֗ר כְּ/שִׁלוֹ֙ יִֽהְיֶה֙ הַ/בַּ֣יִת
    הַ/זֶּ֔ה וְ/הָ/עִ֥יר הַ/זֹּ֛את תֶּחֱרַ֖ב מֵ/אֵ֣ין יוֹשֵׁ֑ב וַ/יִּקָּהֵ֧ל כָּל
    הָ/עָ֛ם אֶֽל יִרְמְיָ֖הוּ בְּ/בֵ֥ית יְהוָֽה־־־׃
translation:
  text: Why have you prophesied in the name of the LORD, saying, ‘This house will
    become like Shiloh, and this city will be laid waste, with no inhabitant’?” Then
    all the people gathered against Jeremiah in the house of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'this house will be like Shiloh.'
    reason: lexical_alternative
  - marker: b
    text: Shiloh was the earlier sanctuary site whose destruction became a warning
      example of judgment.
    reason: cultural_note
  - marker: c
    text: Or, 'all the people gathered to Jeremiah.' The Hebrew preposition can be
      read more neutrally, but the context suggests hostility.
    reason: alternative_reading
lexical_decisions:
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - Why is it that
  lexicon: HALOT
  rationale: Direct interrogative introducing the accusation; simple 'Why' is natural
    and sufficient.
- source_word: נִבֵּיתָ
  chosen: have you prophesied
  alternatives:
  - did you prophesy
  lexicon: HALOT
  rationale: Niphal of נבא in direct accusation. English present perfect fits the
    immediate complaint about Jeremiah's prior prophetic speech now under dispute.
- source_word: בְשֵׁם יְהוָה
  chosen: in the name of the LORD
  alternatives:
  - by the name of the LORD
  lexicon: HALOT
  rationale: Standard idiom for speaking under divine authority. Per doctrine, יְהוָה
    is rendered 'the LORD,' not transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's contested-terms policy for the divine name.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - that
  lexicon: HALOT
  rationale: Retains the quotative force and keeps the accusation vivid.
- source_word: כְּשִׁלוֹ
  chosen: like Shiloh
  alternatives:
  - as Shiloh
  lexicon: HALOT
  rationale: Comparative כ plus place name. 'Like Shiloh' is idiomatic and preserves
    the allusion to the destroyed sanctuary site.
- source_word: יִהְיֶה הַבַּיִת הַזֶּה
  chosen: This house will become
  alternatives:
  - this house will be
  lexicon: HALOT
  rationale: 'With היה plus comparative phrase, English ''will become'' better conveys
    resulting state: the temple will come to be like Shiloh.'
- source_word: הַבַּיִת הַזֶּה
  chosen: This house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: Hebrew literally says 'this house.' While it refers to the temple, the
    literal expression is clear in context and preserves the source wording.
- source_word: וְהָעִיר הַזֹּאת
  chosen: and this city
  alternatives:
  - and this city here
  lexicon: HALOT
  rationale: Straightforward deictic reference to Jerusalem.
- source_word: תֶּחֱרַב
  chosen: will be laid waste
  alternatives:
  - will become a ruin
  - will be destroyed
  lexicon: HALOT
  rationale: חרב here denotes devastation/desolation. 'Laid waste' preserves the sense
    of ruin without over-specifying the mechanism.
- source_word: מֵאֵין יוֹשֵׁב
  chosen: with no inhabitant
  alternatives:
  - without inhabitant
  - so that no one lives there
  lexicon: HALOT
  rationale: Idiomatic expression for total desolation. Singular 'inhabitant' reflects
    the Hebrew participle used collectively.
- source_word: וַיִּקָּהֵל כָּל הָעָם
  chosen: Then all the people gathered
  alternatives:
  - And all the people assembled
  - So all the people gathered together
  lexicon: HALOT
  rationale: Narrative wayyiqtol advances the scene. 'Gathered' is natural English
    for the assembling crowd.
- source_word: אֶל יִרְמְיָהוּ
  chosen: against Jeremiah
  alternatives:
  - to Jeremiah
  - around Jeremiah
  lexicon: HALOT
  rationale: 'Although אֶל often means ''to,'' in this hostile judicial context the
    sense is adversative: the crowd assembled against him. This best fits the narrative
    development.'
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - at the house of the LORD
  - in the temple of the LORD
  lexicon: HALOT
  rationale: Literal and clear locative expression; preserves the repeated 'house
    of the LORD' wording rather than substituting 'temple'.
