id: JER.26.15
reference: Jeremiah 26:15
source:
  edition: WLC
  text: אַ֣ךְ יָדֹ֣עַ תֵּדְע֗וּ כִּ֣י אִם מְמִתִ֣ים אַתֶּם֮ אֹתִ/י֒ כִּי דָ֣ם נָקִ֗י אַתֶּם֙ נֹתְנִ֣ים עֲלֵי/כֶ֔ם וְ/אֶל הָ/עִ֥יר הַ/זֹּ֖את וְ/אֶל יֹשְׁבֶ֑י/הָ כִּ֣י בֶ/אֱמֶ֗ת שְׁלָחַ֤/נִי יְהוָה֙ עֲלֵי/כֶ֔ם לְ/דַבֵּר֙ בְּ/אָזְנֵי/כֶ֔ם אֵ֥ת כָּל הַ/דְּבָרִ֖ים הָ/אֵֽלֶּה׀־־־־־׃ס
translation:
  text: Only know for certain that if you put me to death, you are bringing innocent blood on yourselves, on this city, and on its inhabitants; for in truth Yahweh has sent me to you to speak all these words in your hearing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you kill me.' The Hebrew verb is causative ('put to death'), which suits the judicial context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in your ears,' an idiom meaning 'so that you hear' or 'in your hearing.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: Only
  alternatives:
  - Surely
  - Nevertheless
  lexicon: HALOT
  rationale: Here אַךְ introduces a strong limiting/emphatic warning. 'Only' preserves the force of a solemn qualification better than the more generic 'surely' or adversative 'nevertheless.'
- source_word: יָדֹעַ תֵּדְעוּ
  chosen: know for certain
  alternatives:
  - surely know
  - know well
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the command. 'Know for certain' conveys the emphatic certainty in natural English.
- source_word: כִּי אִם
  chosen: that if
  alternatives:
  - for if
  - if indeed
  lexicon: HALOT
  rationale: The sequence introduces the content of what they must know, followed by the conditional clause. 'That if' best reflects the syntax in smooth English.
- source_word: מְמִתִים אַתֶּם אֹתִי
  chosen: you put me to death
  alternatives:
  - you kill me
  - you cause me to die
  lexicon: HALOT
  rationale: The Hiphil participle of מות is causative. 'Put me to death' captures deliberate execution in this judicial setting more precisely than the blunter 'kill me.'
- source_word: דָם נָקִי
  chosen: innocent blood
  alternatives:
  - guiltless blood
  lexicon: HALOT
  rationale: This is a standard Hebrew expression for wrongful bloodshed. 'Innocent blood' is the established and accurate English equivalent.
- source_word: נֹתְנִים עֲלֵיכֶם
  chosen: are bringing on yourselves
  alternatives:
  - are placing on yourselves
  - are putting upon yourselves
  lexicon: HALOT
  rationale: Although literally 'giving upon yourselves,' the idiom means incurring bloodguilt. 'Bringing on yourselves' communicates the result clearly while staying close to the metaphor.
- source_word: וְאֶל הָעִיר הַזֹּאת וְאֶל יֹשְׁבֶיהָ
  chosen: on this city, and on its inhabitants
  alternatives:
  - against this city and against its inhabitants
  lexicon: HALOT
  rationale: The preposition אֶל after נֹתְנִים extends the sphere affected by the bloodguilt. Rendering with repeated 'on' keeps the parallel with 'on yourselves' and reflects the consequence falling upon city and people.
- source_word: בֶאֱמֶת
  chosen: in truth
  alternatives:
  - truly
  - indeed
  lexicon: HALOT
  rationale: בֶאֱמֶת underscores the factual certainty of Jeremiah's commission. 'In truth' preserves the solemn tone.
- source_word: שְׁלָחַנִי יְהוָה
  chosen: the LORD has sent me
  alternatives:
  - the LORD sent me
  lexicon: HALOT
  rationale: The perfect can be rendered simply past, but 'has sent me' appropriately highlights the present validity of the commission in context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֲלֵיכֶם
  chosen: to you
  alternatives:
  - against you
  - upon you
  lexicon: HALOT
  rationale: With שׁלח in prophetic commissioning, עַל can indicate direction toward an audience. 'To you' fits the sense of being sent to address them, not against them in this clause.
- source_word: לְדַבֵּר בְּאָזְנֵיכֶם
  chosen: to speak ... in your hearing
  alternatives:
  - to speak in your ears
  - to proclaim to you
  lexicon: HALOT
  rationale: The idiom literally means speaking 'in your ears,' that is, directly for them to hear. 'In your hearing' is idiomatic and preserves the concrete force.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  - all these matters
  lexicon: HALOT
  rationale: דְּבָרִים here refers to Jeremiah's spoken message. 'Words' is more precise than the broader 'things' or 'matters.'
