id: JER.26.23
reference: Jeremiah 26:23
source:
  edition: WLC
  text: וַ/יּוֹצִ֨יאוּ אֶת אוּרִיָּ֜הוּ מִ/מִּצְרַ֗יִם וַ/יְבִאֻ֨/הוּ֙ אֶל הַ/מֶּ֣לֶךְ
    יְהוֹיָקִ֔ים וַ/יַּכֵּ֖/הוּ בֶּ/חָ֑רֶב וַ/יַּשְׁלֵךְ֙ אֶת נִבְלָת֔/וֹ אֶל קִבְרֵ֖י
    בְּנֵ֥י הָ/עָֽם־־־־׃
translation:
  text: They brought Uriah out from Egypt and brought him to King Jehoiakim, and he
    struck him down with the sword and threw his corpse into the burial places of
    the common people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'graves of the people.' The Hebrew may refer more literally to the burial
      places belonging to ordinary people, in contrast to an honored burial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצִיאוּ
  chosen: brought ... out
  alternatives:
  - took ... out
  - brought forth
  lexicon: HALOT
  rationale: Hiphil of יצא commonly means to cause to go out, hence 'bring out' or
    'take out.' 'Brought ... out' is natural English and preserves the causative sense.
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  alternatives:
  - out of Egypt
  lexicon: HALOT
  rationale: Straightforward source preposition מן with place name. 'From Egypt' is
    idiomatic here after 'brought ... out.'
- source_word: וַיְבִאֻהוּ
  chosen: brought him
  alternatives:
  - led him
  - brought him in
  lexicon: HALOT
  rationale: Hiphil of בוא with object suffix means 'bring him.' 'Led him' is possible
    but less direct than the Hebrew.
- source_word: הַמֶּלֶךְ יְהוֹיָקִים
  chosen: King Jehoiakim
  alternatives:
  - the king, Jehoiakim
  lexicon: HALOT
  rationale: English normally uses the appositional royal title before the name. This
    preserves the referential force of the Hebrew.
- source_word: וַיַּכֵּהוּ
  chosen: struck him down
  alternatives:
  - smote him
  - killed him
  - struck him
  lexicon: HALOT
  rationale: נכה is broad ('strike, smite'), but with 'with the sword' the result
    is clearly lethal. 'Struck him down' preserves the verbal imagery without over-paraphrasing
    to simply 'killed him.'
- source_word: בֶּחָרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: Instrumental beth is naturally rendered 'with.' The singular 'sword'
    is idiomatic in English for execution by blade.
- source_word: נִבְלָתוֹ
  chosen: his corpse
  alternatives:
  - his dead body
  - his carcass
  lexicon: HALOT
  rationale: נְבֵלָה denotes a corpse/carcass. For a human being, 'corpse' is the
    most natural and dignified English equivalent while retaining the dishonoring
    nuance.
- source_word: קִבְרֵי
  chosen: burial places
  alternatives:
  - graves
  - tombs
  - burial grounds
  lexicon: HALOT
  rationale: Plural construct of קבר can mean graves/tombs. 'Burial places' is slightly
    broader and fits the collective sense in context.
- source_word: בְּנֵי הָעָם
  chosen: the common people
  alternatives:
  - the people
  - the sons of the people
  - the common folk
  lexicon: HALOT
  rationale: The phrase contrasts ordinary people with royal or honored burial. 'The
    common people' conveys the social sense better than the overly literal 'sons of
    the people.'
