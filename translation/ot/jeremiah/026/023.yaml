theological_decisions:
- issue: Subject shift between plural verbs and singular verbs
  chosen_reading: Retain plural agents for the capture/transport ('They brought')
    and singular royal agency for the execution and disposal ('he struck... and threw')
  alternative_readings:
  - Use impersonal plural throughout
  - Understand the singular as collective or as a continuation of the plural agents
  rationale: The Hebrew shifts from plural ויוציאו/ויבאהו to singular ויכהו/וישלך.
    The nearest singular antecedent is 'King Jehoiakim,' so the main text reflects
    that shift rather than smoothing it away. This is a grammatical and narrative
    decision, not a doctrinal one, but it affects agency in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; more broadly,
    preserve source-text ambiguity/tension where present.
