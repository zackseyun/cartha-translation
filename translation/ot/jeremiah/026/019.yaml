theological_decisions:
- issue: Anthropopathic language for God's response to intercession
  chosen_reading: the LORD relented concerning the disaster
  alternative_readings:
  - the LORD changed his mind concerning the disaster
  - the LORD was sorry about the disaster
  rationale: The Hebrew uses ordinary covenantal language for God's withdrawal of announced judgment in response to repentance/intercession. 'Relented' preserves the text's tension without importing a philosophical resolution about divine immutability or denying the force of the statement.
  doctrine_reference: Preserve theological tension rather than resolve it.
