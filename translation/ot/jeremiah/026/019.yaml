id: JER.26.19
reference: Jeremiah 26:19
source:
  edition: WLC
  text: הֶ/הָמֵ֣ת הֱ֠מִתֻ/הוּ חִזְקִיָּ֨הוּ מֶֽלֶךְ יְהוּדָ֜ה וְ/כָל יְהוּדָ֗ה הֲ/לֹא֮ יָרֵ֣א אֶת יְהוָה֒ וַ/יְחַל֙ אֶת פְּנֵ֣י יְהוָ֔ה וַ/יִּנָּ֣חֶם יְהוָ֔ה אֶל הָ/רָעָ֖ה אֲשֶׁר דִּבֶּ֣ר עֲלֵי/הֶ֑ם וַ/אֲנַ֗חְנוּ עֹשִׂ֛ים רָעָ֥ה גְדוֹלָ֖ה עַל נַפְשׁוֹתֵֽי/נוּ־־־־־־־׃
translation:
  text: Did Hezekiah king of Judah and all Judah put him to death? Did he not fear Yahweh and entreat the favor of Yahweh, and Yahweh relented concerning the disaster that he had spoken against them? But we are doing great evil against ourselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''softened/entreated the face of the LORD,'' an idiom for seeking his favor or pleading with him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD changed his mind concerning the disaster.'
    reason: alternative_reading
  - marker: c
    text: Earlier 'disaster' translates Hebrew ra'ah in the sense of calamity/judgment; later 'evil' translates the same Hebrew word in the sense of moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶהָמֵת הֱמִתֻהוּ
  chosen: put him to death
  alternatives:
  - surely kill him
  - execute him
  lexicon: HALOT
  rationale: Infinitive absolute + finite Hiphil of מות intensifies the verbal idea. English idiom is best captured by 'put him to death' rather than a wooden 'did he kill, kill him?' or an overly judicial 'execute him,' since the context is rhetorical and refers broadly to killing a prophet.
- source_word: חִזְקִיָּהוּ
  chosen: Hezekiah
  rationale: Personal name is transliterated by standard English convention, in keeping with the translation philosophy.
- source_word: וְכָל יְהוּדָה
  chosen: and all Judah
  alternatives:
  - and all the people of Judah
  lexicon: HALOT
  rationale: Retains the collective national expression of the Hebrew. 'All Judah' is natural English and preserves the representative scope.
- source_word: הֲלֹא יָרֵא אֶת יְהוָה
  chosen: Did he not fear the LORD
  alternatives:
  - Did he not revere the LORD
  lexicon: HALOT
  rationale: ירא with God commonly denotes reverent fear. 'Fear the LORD' preserves the covenantal and theological resonance of the Hebrew idiom.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיְחַל אֶת־פְּנֵי יְהוָה
  chosen: seek the favor of the LORD
  alternatives:
  - entreat the LORD
  - implore the LORD
  - appease the LORD
  lexicon: HALOT
  rationale: The idiom literally involves softening or appeasing the face/presence of YHWH. 'Seek the favor of the LORD' is clear modern English that preserves the relational sense without awkward literalism.
- source_word: וַיִּנָּחֶם יְהוָה
  chosen: the LORD relented
  alternatives:
  - the LORD changed his mind
  - the LORD was sorry
  lexicon: HALOT
  rationale: נחם in this context refers to relenting from announced judgment. 'Relented' preserves the anthropopathic force without implying error or ignorance in God.
- source_word: אֶל הָרָעָה
  chosen: concerning the disaster
  alternatives:
  - from the harm
  - about the calamity
  lexicon: HALOT
  rationale: רָעָה here denotes threatened calamity/judgment, not moral evil. 'Disaster' best distinguishes it from the moral 'evil' later in the verse.
- source_word: אֲשֶׁר דִּבֶּר עֲלֵיהֶם
  chosen: that he had spoken against them
  alternatives:
  - that he had pronounced against them
  lexicon: HALOT
  rationale: דבר על in prophetic contexts often means to speak a judgment against someone. 'Had spoken against them' is straightforward and faithful.
- source_word: וַאֲנַחְנוּ עֹשִׂים רָעָה גְדוֹלָה
  chosen: But we are doing great evil
  alternatives:
  - And we are doing great wrong
  - while we are bringing great evil
  lexicon: HALOT
  rationale: Here רָעָה is moral evil, in contrast to the earlier judicial 'disaster.' 'But' brings out the rhetorical contrast implied by the discourse.
- source_word: עַל נַפְשׁוֹתֵינוּ
  chosen: against ourselves
  alternatives:
  - against our own lives
  - against our own souls
  lexicon: HALOT
  rationale: נפש can mean life, self, or soul depending on context. Here the idiom points to self-destructive action; 'against ourselves' is the clearest natural rendering.
