id: JER.26.24
reference: Jeremiah 26:24
source:
  edition: WLC
  text: אַ֗ךְ יַ֚ד אֲחִיקָ֣ם בֶּן שָׁפָ֔ן הָיְתָ֖ה אֶֽת יִרְמְיָ֑הוּ לְ/בִלְתִּ֛י
    תֵּת אֹת֥/וֹ בְ/יַד הָ/עָ֖ם לַ/הֲמִיתֽ/וֹ־־־־׃פ
translation:
  text: But the hand of Ahikam son of Shaphan was with Jeremiah, so that he was not
    given into the hand of the people to put him to death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the hand of Ahikam ... was with Jeremiah.'' The expression means
      Ahikam supported and protected Jeremiah.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''into the hand of the people,'' an idiom meaning into their power.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  chosen: But
  alternatives:
  - Surely
  - Nevertheless
  - Only
  lexicon: HALOT
  rationale: Here the particle marks a contrast with the preceding threat against
    Jeremiah; 'But' gives the adversative force naturally in English.
- source_word: יַד
  chosen: the hand
  alternatives:
  - power
  - support
  - protection
  lexicon: HALOT
  rationale: The Hebrew idiom 'the hand of X was with Y' uses 'hand' metaphorically
    for active support or protection. Retaining 'hand' preserves the imagery while
    remaining understandable in context.
- source_word: אֲחִיקָם בֶּן שָׁפָן
  chosen: Ahikam son of Shaphan
  alternatives:
  - Ahikam, the son of Shaphan
  rationale: Personal names are transliterated per project philosophy; 'son of' is
    the standard rendering of בן in genealogical identification.
- source_word: הָיְתָה אֶת יִרְמְיָהוּ
  chosen: was with Jeremiah
  alternatives:
  - was for Jeremiah
  - supported Jeremiah
  lexicon: HALOT
  rationale: The construction literally reads 'was with Jeremiah.' This idiom conveys
    siding with or supporting him. 'Was with Jeremiah' preserves the source wording
    and sense without over-paraphrase.
- source_word: לְבִלְתִּי
  chosen: so that ... not
  alternatives:
  - in order not to
  - to prevent
  lexicon: HALOT
  rationale: This conjunction introduces purpose or result with negation. In smooth
    English with the following infinitive, 'so that he was not...' captures the clause's
    function.
- source_word: תֵּת אֹתוֹ
  chosen: he was not given
  alternatives:
  - they might not give him
  - to give him
  lexicon: HALOT
  rationale: Hebrew infinitive syntax after לבלתי can be rendered idiomatically in
    English with a passive finite clause. The passive avoids introducing an explicit
    subject not stated in Hebrew.
- source_word: בְיַד הָעָם
  chosen: into the hand of the people
  alternatives:
  - into the power of the people
  - over to the people
  lexicon: HALOT
  rationale: '''Into the hand of'' is a common Hebrew idiom for being delivered into
    someone''s power. Retaining ''hand'' preserves the idiom and echoes the earlier
    ''hand of Ahikam,'' creating a deliberate contrast in the verse.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the crowd
  - the populace
  lexicon: HALOT
  rationale: עם here refers to the people as a collective body. 'The people' is the
    most direct and contextually appropriate rendering.
- source_word: לַהֲמִיתוֹ
  chosen: to put him to death
  alternatives:
  - to kill him
  - to execute him
  lexicon: HALOT
  rationale: The Hiphil of מות means 'cause to die,' often in judicial or formal contexts.
    Given the trial-like setting, 'to put him to death' conveys the gravity better
    than the flatter 'kill him' without overstating with 'execute'.
