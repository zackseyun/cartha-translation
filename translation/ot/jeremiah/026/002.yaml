id: JER.26.2
reference: Jeremiah 26:2
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה עֲמֹד֮ בַּ/חֲצַ֣ר בֵּית יְהוָה֒ וְ/דִבַּרְתָּ֞ עַל כָּל עָרֵ֣י יְהוּדָ֗ה הַ/בָּאִים֙ לְ/הִשְׁתַּחֲוֺ֣ת בֵּית יְהוָ֔ה אֵ֚ת כָּל הַ/דְּבָרִ֔ים אֲשֶׁ֥ר צִוִּיתִ֖י/ךָ לְ/דַבֵּ֣ר אֲלֵי/הֶ֑ם אַל תִּגְרַ֖ע דָּבָֽר׀־־־־־־׃
translation:
  text: 'Thus says Yahweh: Stand in the court of the house of Yahweh, and speak to all the cities of Judah that come to worship at the house of Yahweh all the words that I have commanded you to speak to them; do not hold back a word.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'courtyard of the house of the LORD'; Hebrew חָצֵר can mean 'court' or 'courtyard.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to/against all the cities of Judah.' The Hebrew preposition can be understood in more than one way here; the main text takes it as addressing the people from those cities who come to worship.
    reason: lexical_alternative
  - marker: c
    text: Or 'do not omit a word' or 'do not diminish a word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - So says the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal prophetic cadence, while 'the LORD' follows the doctrinal default for YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֲמֹד
  chosen: Stand
  alternatives:
  - Take your stand
  - Stand up
  lexicon: HALOT
  rationale: Imperative of עמד is straightforward here; 'Stand' is natural and sufficiently formal.
- source_word: בַּחֲצַר בֵּית יְהוָה
  chosen: in the court of the house of the LORD
  alternatives:
  - in the courtyard of the house of the LORD
  - in the court of the temple of the LORD
  lexicon: HALOT
  rationale: חצר is 'court/courtyard.' 'House of the LORD' is retained rather than 'temple' to reflect the Hebrew wording, while still being intelligible.
- source_word: וְדִבַּרְתָּ
  chosen: and speak
  alternatives:
  - and you shall speak
  - and proclaim
  lexicon: HALOT
  rationale: Sequential command after the imperative. English present imperative-like coordination is natural in context.
- source_word: עַל כָּל עָרֵי יְהוּדָה
  chosen: to all the cities of Judah
  alternatives:
  - against all the cities of Judah
  - concerning all the cities of Judah
  lexicon: HALOT
  rationale: Though עַל often means 'upon/against/concerning,' with דבר it can mark the audience addressed. Because the following participial phrase identifies people coming from those cities, 'to all the cities of Judah' best captures the sense of addressing their inhabitants without forcing an adversative nuance.
- source_word: הַבָּאִים לְהִשְׁתַּחֲוֺת
  chosen: that come to worship
  alternatives:
  - who are coming to bow down
  - who come to bow in worship
  lexicon: HALOT
  rationale: The participle plus infinitive expresses those coming for worship. 'Worship' communicates השתחוה idiomatically in English; the more literal 'bow down' is possible but less natural here.
- source_word: בֵּית יְהוָה
  chosen: at the house of the LORD
  alternatives:
  - in the house of the LORD
  - at the temple of the LORD
  lexicon: HALOT
  rationale: With the motion verb already expressed, 'at the house of the LORD' fits the destination sense in idiomatic English while preserving 'house' rather than substituting 'temple'.
- source_word: אֵת כָּל הַדְּבָרִים
  chosen: all the words
  alternatives:
  - everything
  - all the things
  lexicon: HALOT
  rationale: Formal enough to preserve the emphasis on the exact content of the message, which is reinforced by the final prohibition against omitting anything.
- source_word: אֲשֶׁר צִוִּיתִיךָ לְדַבֵּר אֲלֵיהֶם
  chosen: that I have commanded you to speak to them
  alternatives:
  - that I commanded you to tell them
  - which I commanded you to speak to them
  lexicon: HALOT
  rationale: The perfect can be rendered naturally in English as 'have commanded' in relation to the present commission. 'Speak to them' keeps the verbal connection with דבר.
- source_word: אַל תִּגְרַע דָּבָר
  chosen: do not hold back a word
  alternatives:
  - do not diminish a word
  - do not omit a word
  - do not take away a word
  lexicon: HALOT
  rationale: גרע means to diminish, reduce, or withhold. In this context of proclamation, 'do not hold back a word' is idiomatic and conveys the prohibition against omitting any part of the message.
