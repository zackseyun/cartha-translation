id: JER.26.18
reference: Jeremiah 26:18
source:
  edition: WLC
  text: מיכיה הַ/מּ֣וֹרַשְׁתִּ֔י הָיָ֣ה נִבָּ֔א בִּ/ימֵ֖י חִזְקִיָּ֣הוּ מֶֽלֶךְ יְהוּדָ֑ה וַ/יֹּ֣אמֶר אֶל כָּל עַם֩ יְהוּדָ֨ה לֵ/אמֹ֜ר כֹּֽה אָמַ֣ר יְהוָ֣ה צְבָא֗וֹת צִיּ֞וֹן שָׂדֶ֤ה תֵֽחָרֵשׁ֙ וִ/ירוּשָׁלַ֨יִם֙ עִיִּ֣ים תִּֽהְיֶ֔ה וְ/הַ֥ר הַ/בַּ֖יִת לְ/בָמ֥וֹת יָֽעַר־־־־׀׃
translation:
  text: 'Micah the Morashtite prophesied in the days of Hezekiah king of Judah, and he said to all the people of Judah, saying, “Thus says Yahweh of Armies: Zion will be plowed like a field, and Jerusalem will become ruins, and the mountain of the house wooded heights.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Thus says the LORD of hosts.”
    reason: lexical_alternative
  - marker: b
    text: That is, the temple mount.
    reason: cultural_note
  - marker: c
    text: Or, “will become forested high places.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מיכיה
  chosen: Micah
  alternatives:
  - Micaiah
  lexicon: HALOT
  rationale: Standard English transliteration of the prophet's name; although the fuller form can overlap with Micaiah, the prophet traditionally identified here is Micah.
- source_word: הַמּוֹרַשְׁתִּי
  chosen: the Morashtite
  alternatives:
  - of Moresheth
  - the man from Moresheth
  lexicon: HALOT
  rationale: Gentilic form indicating origin from Moresheth. 'The Morashtite' preserves the adjectival force and matches the Hebrew form closely.
- source_word: הָיָה נִבָּא
  chosen: was prophesying
  alternatives:
  - prophesied
  - was acting as a prophet
  lexicon: HALOT
  rationale: The construction combines היה with the participle, naturally conveying ongoing or durative past action. 'Was prophesying' reflects that aspect better than the simple past.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during the reign of
  lexicon: HALOT
  rationale: Idiomatic temporal expression in Hebrew. 'In the days of' is both natural and formally close.
- source_word: וַיֹּאמֶר אֶל כָּל עַם יְהוּדָה
  chosen: and he said to all the people of Judah
  alternatives:
  - and he spoke to all the people of Judah
  lexicon: HALOT
  rationale: Directly reflects the speech introduction while keeping readable English. 'People' is preferable to 'folk' or 'nation' here for עַם in this address context.
- source_word: כֹּה אָמַר יְהוָה צְבָאוֹת
  chosen: Thus says the LORD of Armies
  alternatives:
  - Thus says the LORD of hosts
  lexicon: HALOT
  rationale: יְהוָה is rendered 'the LORD' per doctrine. צְבָאוֹת is translated rather than merely traditionalized; 'Armies' preserves the martial/plural sense accessibly, while 'hosts' is preserved as an alternative.
- source_word: צִיּוֹן שָׂדֶה תֵחָרֵשׁ
  chosen: Zion will be plowed as a field
  alternatives:
  - Zion will be plowed like a field
  - Zion will be plowed into a field
  lexicon: HALOT
  rationale: The image is of cultivated land replacing the city/holy site. 'As a field' is concise and faithful to the predicative accusative sense.
- source_word: עִיִּים
  chosen: ruins
  alternatives:
  - heaps of ruins
  - rubble heaps
  lexicon: HALOT
  rationale: The noun denotes ruins or heaps. 'Ruins' is clear modern English; 'heaps of ruins' is possible but slightly more interpretive.
- source_word: וְהַר הַבַּיִת
  chosen: and the mountain of the house
  alternatives:
  - and the temple mount
  - and the mountain of the temple
  lexicon: HALOT
  rationale: Literally 'the mountain of the house,' referring to the temple mount. The more literal rendering preserves the Hebrew expression while remaining intelligible in context.
- source_word: לְבָמוֹת יָעַר
  chosen: will become wooded heights
  alternatives:
  - will become forested high places
  - will be like the high places of a forest
  - will become overgrown wooded hills
  lexicon: HALOT
  rationale: בָּמוֹת commonly means 'high places/heights'; יַעַר means 'forest/woodland.' The phrase depicts the temple mount reduced to wild, overgrown heights. 'Wooded heights' preserves both elements without overexpansion.
