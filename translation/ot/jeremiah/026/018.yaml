theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering צְבָאוֹת in the divine title
  chosen_reading: of Armies
  alternative_readings:
  - of hosts
  rationale: The source term is concrete and martial. 'Armies' communicates the meaning more transparently for modern readers, while the traditional 'hosts' is preserved in a footnote as a lexical alternative.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
