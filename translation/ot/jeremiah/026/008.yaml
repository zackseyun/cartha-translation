id: JER.26.8
reference: Jeremiah 26:8
source:
  edition: WLC
  text: וַ/יְהִ֣י כְּ/כַלּ֣וֹת יִרְמְיָ֗הוּ לְ/דַבֵּר֙ אֵ֣ת כָּל אֲשֶׁר צִוָּ֣ה יְהוָ֔ה לְ/דַבֵּ֖ר אֶל כָּל הָ/עָ֑ם וַ/יִּתְפְּשׂ֨וּ אֹת֜/וֹ הַ/כֹּהֲנִ֧ים וְ/הַ/נְּבִאִ֛ים וְ/כָל הָ/עָ֥ם לֵ/אמֹ֖ר מ֥וֹת תָּמֽוּת׀־־־־־׃
translation:
  text: And it happened, when Yirmeyahu had finished speaking all that Yahweh had commanded him to speak to all the people, that the priests and the prophets and all the people seized him, saying, “You must surely die!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “You shall surely die.” The Hebrew uses an infinitive absolute with a finite verb for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event. 'And it happened' preserves the Hebrew discourse marker without archaic tone.
- source_word: כְּכַלּוֹת
  chosen: when ... had finished
  alternatives:
  - as soon as ... finished
  - after ... finished
  lexicon: HALOT
  rationale: Infinitive construct of כלה with prefixed כ expresses temporal circumstance. 'When ... had finished' is natural English and preserves sequence.
- source_word: יִרְמְיָהוּ
  chosen: Yirmeyahu
  alternatives:
  - Jeremiah
  rationale: Personal names are transliterated by standard conventions per project philosophy. The Hebrew form is represented directly rather than replaced by the traditional English exonym.
- source_word: לְדַבֵּר
  chosen: speaking
  alternatives:
  - to speak
  lexicon: HALOT
  rationale: With כְּכַלּוֹת, the infinitive construct is best rendered in English as 'had finished speaking'.
- source_word: אֵת כָּל אֲשֶׁר
  chosen: all that
  alternatives:
  - everything that
  - all which
  lexicon: HALOT
  rationale: This combination marks the total content of what follows. 'All that' is concise and accurate.
- source_word: צִוָּה יְהוָה
  chosen: the LORD had commanded
  alternatives:
  - the LORD commanded
  lexicon: HALOT
  rationale: 'Pluperfect sense fits the temporal flow: Jeremiah finished speaking what the LORD had previously commanded.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: לְדַבֵּר אֶל כָּל הָעָם
  chosen: to speak to all the people
  alternatives:
  - to declare to all the people
  - to speak to all the populace
  lexicon: HALOT
  rationale: Retains the repetition of דבר and the comprehensiveness of כָּל הָעָם in clear modern English.
- source_word: וַיִּתְפְּשׂוּ אֹתוֹ
  chosen: seized him
  alternatives:
  - took hold of him
  - arrested him
  lexicon: HALOT
  rationale: תפשׂ denotes laying hold of someone. 'Seized him' is forceful and does not over-specify a formal legal arrest.
- source_word: הַכֹּהֲנִים וְהַנְּבִאִים וְכָל הָעָם
  chosen: the priests and the prophets and all the people
  alternatives:
  - the priests, the prophets, and all the people
  lexicon: HALOT
  rationale: The repeated conjunctions can be represented with English coordination. The phrase identifies the coalition opposing Jeremiah.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - declaring
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive, introducing direct speech.
- source_word: מוֹת תָּמוּת
  chosen: You must surely die
  alternatives:
  - You shall surely die
  - You are doomed to die
  lexicon: HALOT
  rationale: Infinitive absolute plus imperfect intensifies the verbal idea. 'You must surely die' conveys emphatic certainty in idiomatic modern English while preserving the judicial threat.
