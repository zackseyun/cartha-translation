theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Name form for the prophet
  chosen_reading: Yirmeyahu
  alternative_readings:
  - Jeremiah
  rationale: The translation philosophy states 'Translate titles; transliterate names.' Therefore the Hebrew personal name is transliterated rather than replaced with the traditional English form.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
