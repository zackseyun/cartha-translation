id: JER.26.17
reference: Jeremiah 26:17
source:
  edition: WLC
  text: וַ/יָּקֻ֣מוּ אֲנָשִׁ֔ים מִ/זִּקְנֵ֖י הָ/אָ֑רֶץ וַ/יֹּ֣אמְר֔וּ אֶל כָּל קְהַ֥ל
    הָ/עָ֖ם לֵ/אמֹֽר־־׃
translation:
  text: Then men from the elders of the land stood up and said to all the assembly
    of the people, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Then some men from the elders of the land arose and spoke to the whole
      assembly of the people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  chosen: stood up
  alternatives:
  - arose
  - got up
  lexicon: HALOT
  rationale: Qal wayyiqtol of קום in narrative commonly marks rising to speak or take
    action. 'Stood up' is natural English and preserves the public, deliberative setting.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - some men
  - people
  lexicon: HALOT
  rationale: The noun explicitly denotes males/adult men, not a generic mixed group
    term. Following the gender-accurate principle, 'men' is preferred.
- source_word: מִזִּקְנֵי הָאָרֶץ
  chosen: from the elders of the land
  alternatives:
  - from the elders of the הארץ
  - from the elders of the country
  lexicon: HALOT
  rationale: The מן construction indicates these men were drawn from the group of
    elders. 'Land' is the most direct rendering of אָרֶץ here; 'country' is possible
    but less consistent with common biblical usage.
- source_word: וַיֹּאמְרוּ
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard rendering of אמר in direct-speech introduction. 'Said' fits
    the following infinitive formula.
- source_word: אֶל כָּל קְהַל הָעָם
  chosen: to all the assembly of the people
  alternatives:
  - to the whole assembly of the people
  - to all the gathered people
  lexicon: HALOT
  rationale: קהל denotes an assembled congregation/community. 'Assembly' preserves
    the formal public gathering sense. כָּל is represented by 'all.'
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'as follows:'
  lexicon: HALOT
  rationale: The infinitive introduces the content of the speech in the next verse.
    Retaining 'saying' keeps the Hebrew discourse structure transparent, even if slightly
    formal in English.
