id: JER.20.2
reference: Jeremiah 20:2
source:
  edition: WLC
  text: וַ/יַּכֶּ֣ה פַשְׁח֔וּר אֵ֖ת יִרְמְיָ֣הוּ הַ/נָּבִ֑יא וַ/יִּתֵּ֨ן אֹת֜/וֹ עַל הַ/מַּהְפֶּ֗כֶת אֲשֶׁ֨ר בְּ/שַׁ֤עַר בִּנְיָמִן֙ הָֽ/עֶלְי֔וֹן אֲשֶׁ֖ר בְּ/בֵ֥ית יְהוָֽה־׃
translation:
  text: Then Pashhur struck Jeremiah the prophet and put him in the stocks that were at the upper Benjamin Gate, which was in the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the rack' or another device of painful restraint; the exact form of the מַהְפֶּכֶת is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכֶּה
  chosen: struck
  alternatives:
  - beat
  - smote
  lexicon: HALOT
  rationale: The verb נכה commonly means to strike or hit. 'Struck' is natural modern English and leaves open whether this was a single blow or a beating, without importing more than the Hebrew explicitly states.
- source_word: פַשְׁחוּר
  chosen: Pashhur
  rationale: Personal names are transliterated by standard convention.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  rationale: Personal name transliterated by standard English convention.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Appositional title identifying Jeremiah's role. Retained explicitly because it is present in the Hebrew and contributes to the gravity of the mistreatment.
- source_word: וַיִּתֵּן אֹתוֹ עַל
  chosen: put him in
  alternatives:
  - set him in
  - placed him in
  lexicon: HALOT
  rationale: The idiom 'gave/put him upon' with the following noun refers to placing Jeremiah into a restraining device. 'Put him in' is idiomatic English for this context.
- source_word: הַמַּהְפֶּכֶת
  chosen: the stocks
  alternatives:
  - the rack
  - the pillory
  lexicon: HALOT
  rationale: This term denotes a device of restraint/twisting used for punishment. 'Stocks' is the most established and broadly understandable rendering in English, while 'rack' may overstate torture specifics and 'pillory' is too narrow. Because the exact apparatus is not fully certain, an alternative is preserved in a footnote.
- source_word: שַׁעַר בִּנְיָמִן
  chosen: Benjamin Gate
  alternatives:
  - gate of Benjamin
  lexicon: HALOT
  rationale: A proper gate name. 'Benjamin Gate' is concise, natural English while preserving the referent.
- source_word: הָעֶלְיוֹן
  chosen: upper
  alternatives:
  - uppermost
  - higher
  lexicon: HALOT
  rationale: The adjective means upper/higher. 'Upper' is the most natural attributive rendering in English for a gate designation.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת with YHWH literally means 'house of the LORD.' This preserves the Hebrew expression while remaining clear; 'temple' is interpretive but possible. The divine name follows the project's default rendering 'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
