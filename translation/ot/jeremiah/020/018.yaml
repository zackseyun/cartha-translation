id: JER.20.18
reference: Jeremiah 20:18
source:
  edition: WLC
  text: לָ֤/מָּה זֶּה֙ מֵ/רֶ֣חֶם יָצָ֔אתִי לִ/רְא֥וֹת עָמָ֖ל וְ/יָג֑וֹן וַ/יִּכְל֥וּ
    בְּ/בֹ֖שֶׁת יָמָֽ/י׃פ
translation:
  text: Why did I come out from the womb to see trouble and sorrow, and to have my
    days end in shame?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toil and grief.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and my days were consumed in shame.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה זֶּה
  chosen: Why did I
  alternatives:
  - Why is it that I
  - Why ever did I
  lexicon: HALOT
  rationale: לָמָּה introduces a direct question, and זֶּה adds emphasis ('why this?/why
    then?'). In idiomatic English, 'Why did I' best captures the force without awkwardness;
    the emphatic nuance is absorbed into the rhetorical tone.
- source_word: מֵרֶחֶם
  chosen: from the womb
  alternatives:
  - from my mother's womb
  lexicon: HALOT
  rationale: The Hebrew literally says 'from the womb' without explicitly stating
    'my mother's.' English commonly understands the idiom, so the shorter rendering
    preserves the source wording while remaining natural.
- source_word: יָצָאתִי
  chosen: come out
  alternatives:
  - go out
  - emerge
  - be born
  lexicon: HALOT
  rationale: The verb is literally 'I went/came out.' In context with 'from the womb,'
    it refers to birth. 'Come out' preserves the concrete imagery better than the
    more interpretive 'be born.'
- source_word: לִרְאוֹת
  chosen: to see
  alternatives:
  - to experience
  - to look on
  lexicon: HALOT
  rationale: The infinitive of ראה is literally 'to see.' In lament contexts it can
    shade toward experiencing, but 'to see' is both faithful and idiomatic here, allowing
    the experiential sense to remain implicit.
- source_word: עָמָל
  chosen: trouble
  alternatives:
  - toil
  - misery
  - affliction
  lexicon: HALOT
  rationale: עָמָל can denote trouble, toil, or misery. Here, paired with יָגוֹן in
    a lament over life's painful outcome, 'trouble' gives a broad, natural English
    equivalent without narrowing the sense to labor alone.
- source_word: יָגוֹן
  chosen: sorrow
  alternatives:
  - grief
  - anguish
  lexicon: HALOT
  rationale: יָגוֹן denotes grief or sorrow. 'Sorrow' pairs well with 'trouble' and
    preserves the emotional dimension of Jeremiah's complaint.
- source_word: וַיִּכְלוּ
  chosen: to have ... end
  alternatives:
  - and they were spent
  - and they came to an end
  - and my days were consumed
  lexicon: HALOT
  rationale: 'The Hebrew form is 3mp (''and they were finished/consumed''), with יָמַי
    (''my days'') following; the sense is that his days are used up or come to an
    end. English naturally front-loads the subject: ''to have my days end.'' This
    preserves the resultative sense while avoiding wooden syntax.'
- source_word: בְּבֹשֶׁת
  chosen: in shame
  alternatives:
  - in disgrace
  - with shame
  lexicon: HALOT
  rationale: בֹּשֶׁת denotes shame/disgrace. 'In shame' is a close formal rendering
    and fits the lament's tone.
- source_word: יָמָי
  chosen: my days
  alternatives:
  - my life
  - the days of my life
  lexicon: HALOT
  rationale: The Hebrew specifically says 'my days,' a common idiom for one's lifetime.
    Retaining 'my days' preserves the poetic concreteness of the source.
