id: JER.20.11
reference: Jeremiah 20:11
source:
  edition: WLC
  text: וַֽ/יהוָ֤ה אוֹתִ/י֙ כְּ/גִבּ֣וֹר עָרִ֔יץ עַל כֵּ֛ן רֹדְפַ֥/י יִכָּשְׁל֖וּ
    וְ/לֹ֣א יֻכָ֑לוּ בֹּ֤שׁוּ מְאֹד֙ כִּֽי לֹ֣א הִשְׂכִּ֔ילוּ כְּלִמַּ֥ת עוֹלָ֖ם לֹ֥א
    תִשָּׁכֵֽחַ־־׃
translation:
  text: But the LORD is with me like a mighty warrior; therefore my persecutors will
    stumble and will not prevail. They will be utterly ashamed, because they have
    not acted wisely; their everlasting disgrace will not be forgotten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''like a mighty, formidable warrior.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'my pursuers.'
    reason: lexical_alternative
  - marker: c
    text: Or 'because they have not understood' / 'because they have not acted with
      insight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  chosen: But the LORD
  alternatives:
  - And the LORD
  - But Yahweh
  lexicon: HALOT
  rationale: YHWH is rendered by the project default 'the LORD' per doctrine. The
    prefixed waw is taken adversatively in context after Jeremiah's lament, so 'But'
    best reflects the discourse turn.
- source_word: אוֹתִי
  chosen: with me
  alternatives:
  - me
  lexicon: HALOT
  rationale: Although the object marker plus pronoun is formally 'me,' the verbless
    clause with implied presence is idiomatically expressed in English as 'is with
    me,' matching the sense of divine support in context.
- source_word: כְגִבּוֹר עָרִיץ
  chosen: like a mighty warrior
  alternatives:
  - like a powerful champion
  - like a dread warrior
  - as a mighty terrible one
  lexicon: HALOT
  rationale: גִּבּוֹר denotes a strong warrior/champion; עָרִיץ adds the sense of
    formidable, awe-inspiring, or overpowering. 'Mighty warrior' is natural English
    and preserves the martial force without archaic awkwardness.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: Standard inferential connective introducing the consequence of the LORD's
    presence.
- source_word: רֹדְפַי
  chosen: my persecutors
  alternatives:
  - my pursuers
  - those who pursue me
  lexicon: HALOT
  rationale: The root רדף can mean pursue/persecute. In Jeremiah's hostile social
    setting, 'persecutors' captures both pursuit and opposition more clearly than
    the more physical 'pursuers.'
- source_word: יִכָּשְׁלוּ
  chosen: will stumble
  alternatives:
  - will falter
  - will be overthrown
  lexicon: HALOT
  rationale: The Niphal of כשל commonly conveys stumbling or faltering. 'Will stumble'
    preserves the metaphor and leaves the extent of defeat to the context.
- source_word: וְלֹא יֻכָלוּ
  chosen: and will not prevail
  alternatives:
  - and will not succeed
  - and will not be able
  lexicon: HALOT
  rationale: יכל literally means 'be able,' but in this adversarial context the idiomatic
    sense is failure to overcome or succeed. 'Prevail' fits the conflict imagery.
- source_word: בֹּשׁוּ מְאֹד
  chosen: They will be utterly ashamed
  alternatives:
  - They will be greatly put to shame
  - They will be deeply ashamed
  lexicon: HALOT
  rationale: בוש denotes shame/disgrace; מְאֹד intensifies it. 'Utterly ashamed' is
    concise, natural, and strong.
- source_word: כִּי לֹא הִשְׂכִּילוּ
  chosen: because they have not acted wisely
  alternatives:
  - because they have not understood
  - because they have not prospered
  - because they have not had insight
  lexicon: HALOT
  rationale: The Hiphil of שׂכל can denote acting with insight or wisdom, not merely
    intellectual understanding. Here it explains their shame as the result of foolish
    action, so 'acted wisely' best fits.
- source_word: כְּלִמַּת עוֹלָם
  chosen: their everlasting disgrace
  alternatives:
  - eternal shame
  - perpetual humiliation
  lexicon: HALOT
  rationale: כְּלִמָּה is disgrace/insult/shame; עוֹלָם here denotes enduring or perpetual
    duration. 'Everlasting disgrace' is weighty and readable.
- source_word: לֹא תִשָּׁכֵחַ
  chosen: will not be forgotten
  alternatives:
  - shall not be forgotten
  lexicon: HALOT
  rationale: Straightforward passive/reflexive sense in English. The feminine singular
    aligns with the preceding noun 'disgrace,' hence 'their everlasting disgrace will
    not be forgotten.'
