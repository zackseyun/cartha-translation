id: JER.20.3
reference: Jeremiah 20:3
source:
  edition: WLC
  text: וַֽ/יְהִי֙ מִֽ/מָּחֳרָ֔ת וַ/יֹּצֵ֥א פַשְׁח֛וּר אֶֽת יִרְמְיָ֖הוּ מִן הַ/מַּהְפָּ֑כֶת וַ/יֹּ֨אמֶר אֵלָ֜י/ו יִרְמְיָ֗הוּ לֹ֤א פַשְׁחוּר֙ קָרָ֤א יְהוָה֙ שְׁמֶ֔/ךָ כִּ֖י אִם מָג֥וֹר מִ/סָּבִֽיב־־־׃פ
translation:
  text: And it happened the next day, when Pashhur brought Jeremiah out of the stocks, that Jeremiah said to him, “Yahweh has not called your name Pashhur, but Terror on Every Side.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Magor-missabib,'' a wordplay meaning ''terror on every side'' or ''terror all around.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִמָּחֳרָת
  chosen: the next day
  alternatives:
  - on the following day
  - the day after
  lexicon: HALOT
  rationale: Temporal expression meaning the following day; 'the next day' is natural modern English and preserves the sequence.
- source_word: וַיֹּצֵא ... אֶת יִרְמְיָהוּ מִן הַמַּהְפָּכֶת
  chosen: when Pashhur let Jeremiah out of the stocks
  alternatives:
  - Pashhur brought Jeremiah out of the stocks
  - Pashhur released Jeremiah from the stocks
  lexicon: HALOT
  rationale: The hiphil of יצא here is causative, 'cause to go out,' hence 'let out' or 'release.' 'Stocks' is the established and contextually fitting rendering of מַהְפָּכֶת, an instrument of restraint/punishment, and is clearer than a more literal but obscure term.
- source_word: הַמַּהְפָּכֶת
  chosen: the stocks
  alternatives:
  - the restraint frame
  - the pillory
  lexicon: HALOT
  rationale: Refers to a device used to confine and contort a prisoner. 'Stocks' is the most idiomatic English equivalent, though not necessarily identical in exact construction.
- source_word: קָרָא ... שְׁמֶךָ
  chosen: has not called your name
  alternatives:
  - has not named you
  - has not called you
  lexicon: HALOT
  rationale: The Hebrew idiom is explicitly about naming. 'Has not called your name' preserves the idiom while remaining understandable; the naming force is important because Jeremiah is pronouncing a divinely given renaming.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: HALOT
  rationale: In this contrastive construction after negation, the sense is 'but rather / instead.' 'But' is concise and natural in English.
- source_word: מָגוֹר מִסָּבִיב
  chosen: Terror on Every Side
  alternatives:
  - terror all around
  - terror from every side
  lexicon: HALOT
  rationale: This is a wordplay renaming formula and a recurring Jeremianic expression. Capitalizing it signals its function as a divinely assigned name/title. 'On Every Side' best captures the idiomatic sense of surrounding terror.
- source_word: פַשְׁחוּר
  chosen: Pashhur
  rationale: Personal names are transliterated by standard convention per translation philosophy.
