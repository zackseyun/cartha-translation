id: JER.20.1
reference: Jeremiah 20:1
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֤ע פַּשְׁחוּר֙ בֶּן אִמֵּ֣ר הַ/כֹּהֵ֔ן וְ/הֽוּא פָקִ֥יד נָגִ֖יד
    בְּ/בֵ֣ית יְהוָ֑ה אֶֽת יִרְמְיָ֔הוּ נִבָּ֖א אֶת הַ/דְּבָרִ֥ים הָ/אֵֽלֶּה־־־־׃
translation:
  text: Now Pashhur son of Immer the priest, who was chief officer in the house of
    the LORD, heard Jeremiah prophesying these words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the temple of the LORD'; literally, 'in the house of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: 'The verb שׁמע in the waw-consecutive narrative form straightforwardly
    introduces the next event: Pashhur heard what Jeremiah was saying. ''Heard'' is
    the most natural narrative rendering; ''listened to'' would suggest more intentional
    attentiveness than the Hebrew requires.'
- source_word: פַּשְׁחוּר בֶּן אִמֵּר
  chosen: Pashhur son of Immer
  alternatives:
  - Pashhur, the son of Immer
  rationale: Personal names are transliterated per project philosophy. 'Son of' preserves
    the Hebrew patronymic construction clearly and naturally.
- source_word: הַכֹּהֵן
  chosen: the priest
  alternatives:
  - a priest
  lexicon: HALOT
  rationale: The article is present in Hebrew. In apposition to Pashhur's name and
    lineage, 'the priest' identifies his recognized office/status rather than introducing
    an indefinite description.
- source_word: וְהוּא פָקִיד נָגִיד
  chosen: who was chief officer
  alternatives:
  - and he was overseer-governor
  - and he was an officer, a chief one
  - and he was chief overseer
  lexicon: HALOT
  rationale: The Hebrew uses two administrative terms together. פקיד denotes an appointed
    officer/overseer, and נגיד adds the sense of leadership or chief rank. In idiomatic
    English, 'chief officer' captures the combined force without awkward redundancy.
    The relative rendering 'who was' fits the appositional explanatory clause.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בַּיִת with YHWH often refers to the temple, but the Hebrew expression
    is literally 'house of YHWH.' Following the project's treatment of יְהוָה, it
    is rendered 'the LORD.' 'House of the LORD' preserves the source wording while
    remaining clear.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per DOCTRINE.md contested terms table, the default rendering of the divine
    name is 'the LORD.'
- source_word: נִבָּא
  chosen: prophesying
  alternatives:
  - as he prophesied
  - speaking as a prophet
  lexicon: HALOT
  rationale: The participle presents Jeremiah in the act of prophetic speech when
    Pashhur heard him. 'Prophesying' preserves the durative/contemporaneous sense
    better than a simple past finite verb.
- source_word: אֶת־הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - this message
  lexicon: HALOT
  rationale: דברים can mean 'words' or 'matters/things.' Here, because Jeremiah is
    speaking prophetically, 'these words' best reflects the verbal content just delivered,
    with a natural English connection to the preceding discourse.
- source_word: וַ
  chosen: Now
  alternatives:
  - And
  - Then
  rationale: The initial waw-consecutive advances the narrative. 'Now' is a natural
    English discourse marker here, smoother than repeated 'And' while still signaling
    continuation.
