theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in the standard temple phrase 'house
    of YHWH.' Per project doctrine, the default English rendering is 'the LORD,' following
    Jewish reverence tradition and longstanding biblical convention.
