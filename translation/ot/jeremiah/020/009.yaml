theological_decisions:
- issue: Referent of third-person pronouns ('him,' 'his')
  chosen_reading: Retain the pronouns without replacing them with 'the LORD' in the
    main text.
  alternative_readings:
  - Explicitly identify the referent as 'the LORD'
  rationale: The immediate context makes the referent clear, but the Hebrew text uses
    pronouns. Preserving them avoids importing words not present while maintaining
    the emotional immediacy of Jeremiah's speech.
  doctrine_reference: Translation philosophy §1, §3
- issue: Implied subject/object of the inward fire
  chosen_reading: Render the clause with impersonal 'it' rather than specifying 'his
    word' in the main text.
  alternative_readings:
  - '''his word is in my heart like a burning fire'''
  - '''it is like a burning fire in my heart'''
  rationale: The Hebrew has a 3ms verb without an explicit noun in this clause; context
    suggests the divine message, but the text leaves it implicit. Using 'it' preserves
    the ambiguity/tension rather than resolving it too explicitly.
  doctrine_reference: Translation philosophy §3
