id: JER.20.9
reference: Jeremiah 20:9
source:
  edition: WLC
  text: וְ/אָמַרְתִּ֣י לֹֽא אֶזְכְּרֶ֗/נּוּ וְ/לֹֽא אֲדַבֵּ֥ר עוֹד֙ בִּ/שְׁמ֔/וֹ וְ/הָיָ֤ה
    בְ/לִבִּ/י֙ כְּ/אֵ֣שׁ בֹּעֶ֔רֶת עָצֻ֖ר בְּ/עַצְמֹתָ֑/י וְ/נִלְאֵ֥יתִי כַּֽלְכֵ֖ל
    וְ/לֹ֥א אוּכָֽל־־׃
translation:
  text: If I say, “I will not mention him, or speak any longer in his name,” then
    in my heart it becomes like a burning fire, shut up in my bones; I grow weary
    of holding it in, and I cannot.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will not remember him.' The Hebrew verb can mean either 'remember'
      or 'mention'; here 'mention' fits the parallel with speaking.
    reason: lexical_alternative
  - marker: b
    text: That is, speak as his representative or under his authority.
    reason: cultural_note
  - marker: c
    text: The Hebrew leaves the subject implicit; the sense is likely the LORD's message
      or the compulsion to speak it.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָמַרְתִּי
  chosen: If I say
  alternatives:
  - And I said
  - Then I said
  lexicon: HALOT
  rationale: Though formally a waw + qatal ('and I said'), in context it introduces
    a repeated or hypothetical resolve rather than simple narrative sequence. 'If
    I say' best captures the sense in English and matches the verse's inner deliberation.
- source_word: אֶזְכְּרֶנּוּ
  chosen: I will not mention him
  alternatives:
  - I will not remember him
  - I will not think of him
  lexicon: HALOT
  rationale: זכר can mean 'remember' or 'mention.' Because it is paired with 'nor
    speak any longer in his name,' the speech-related sense 'mention' fits the parallelism
    better than mere inward remembrance.
- source_word: אֲדַבֵּר עוֹד בִּשְׁמוֹ
  chosen: or speak any longer in his name
  alternatives:
  - or speak again in his name
  - or speak anymore in his name
  lexicon: HALOT
  rationale: דבר + בְּשֵׁם commonly refers to speaking under someone's authority or
    as their representative. 'In his name' preserves the idiom and prophetic commission
    language.
- source_word: וְהָיָה בְלִבִּי
  chosen: then in my heart it becomes
  alternatives:
  - then it is in my heart
  - and it was in my heart
  lexicon: HALOT
  rationale: The 3ms verb likely refers back to the suppressed word/message concerning
    the LORD. 'It becomes' gives natural English while preserving the shift from Jeremiah's
    resolve to the inward consequence.
- source_word: כְּאֵשׁ בֹּעֶרֶת
  chosen: like a burning fire
  alternatives:
  - like fire burning
  - like a fire ablaze
  lexicon: HALOT
  rationale: The simile is vivid and should remain concrete. 'Burning fire' preserves
    both noun and participle without over-literal awkwardness.
- source_word: עָצֻר בְּעַצְמֹתַי
  chosen: shut up in my bones
  alternatives:
  - confined in my bones
  - restrained in my bones
  lexicon: HALOT
  rationale: עצר conveys being restrained or shut in. 'Shut up in my bones' is idiomatic,
    forceful English and preserves the bodily intensity of the Hebrew image.
- source_word: וְנִלְאֵיתִי כַּלְכֵּל
  chosen: I grow weary of holding it in
  alternatives:
  - I am weary with containing it
  - I am exhausted from restraining it
  lexicon: HALOT
  rationale: נלאיתי expresses weariness/exhaustion; כלכל here carries the sense of
    containing or enduring. 'Holding it in' communicates the effort to suppress the
    prophetic word in readable modern English.
- source_word: וְלֹא אוּכָל
  chosen: and I cannot
  alternatives:
  - but I cannot
  - and I am not able
  lexicon: HALOT
  rationale: Simple statement of inability. 'And I cannot' preserves the Hebrew coordination
    while sounding natural in English; the implied object is suppression of the word/message.
