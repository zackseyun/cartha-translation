theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: 'Followed DOCTRINE.md default for YHWH: ''the LORD,'' preserving reverential
    convention and broad Christian usage.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropological imagery in כְלָיוֹת וָלֵב
  chosen_reading: retain the concrete imagery 'the kidneys and the heart' in the main
    text
  alternative_readings:
  - the innermost being and the heart
  - the mind and heart
  rationale: The Hebrew vividly depicts God as seeing the deepest inner person. Preserving
    the bodily imagery maintains the text's metaphorical force and avoids prematurely
    flattening Hebrew anthropology into modern psychological categories; an explanatory
    footnote preserves the idiomatic sense.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy;
    Preserve theological tension rather than resolve it'
