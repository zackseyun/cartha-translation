id: JER.20.12
reference: Jeremiah 20:12
source:
  edition: WLC
  text: וַ/יהוָ֤ה צְבָאוֹת֙ בֹּחֵ֣ן צַדִּ֔יק רֹאֶ֥ה כְלָי֖וֹת וָ/לֵ֑ב אֶרְאֶ֤ה נִקְמָֽתְ/ךָ֙
    מֵ/הֶ֔ם כִּ֥י אֵלֶ֖י/ךָ גִּלִּ֥יתִי אֶת רִיבִֽ/י־׃ס
translation:
  text: But you, O LORD of Armies, who test the righteous, who see the kidneys and
    the heart, let me see your vengeance on them, for to you I have revealed my case.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the kidneys and the heart,' a figure for the deepest thoughts, motives,
      and affections.
    reason: cultural_note
  - marker: b
    text: Or 'my cause' or 'my dispute.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  - O LORD
  lexicon: HALOT
  rationale: Rendered the divine name as 'LORD' per doctrine default for יְהוָה, with
    vocative force supplied by context and the preceding conjunction carried as 'But
    you.'
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  - of heavenly armies
  lexicon: HALOT
  rationale: Translated concretely as 'Armies' rather than traditional 'hosts' for
    modern readability while preserving the military/plural sense of צבאות.
- source_word: בֹּחֵן
  chosen: who test
  alternatives:
  - who examine
  - who try
  - tester of
  lexicon: HALOT
  rationale: Participial form describing the LORD's ongoing action; 'test' is concise
    and idiomatic in English.
- source_word: צַדִּיק
  chosen: the righteous
  alternatives:
  - the righteous person
  - the just
  lexicon: HALOT
  rationale: 'Used substantivally: the one who is righteous / righteous people generically.
    ''The righteous'' preserves the Hebrew''s compactness and representative force.'
- source_word: רֹאֶה
  chosen: who see
  alternatives:
  - who observe
  - who look upon
  lexicon: HALOT
  rationale: Parallel participle with בֹּחֵן; rendered as a relative clause for smooth
    English while retaining ongoing aspect.
- source_word: כְלָיוֹת
  chosen: the kidneys
  alternatives:
  - the innermost being
  - the mind
  - the reins
  lexicon: HALOT
  rationale: Hebrew literally refers to kidneys as the seat of inner motives/emotions.
    Main text keeps the concrete image to preserve source texture; explanatory alternative
    preserved in footnote.
- source_word: וָלֵב
  chosen: and the heart
  alternatives:
  - and the mind
  - and the inner self
  lexicon: HALOT
  rationale: Literal rendering preserves the anthropological pairing 'kidneys and
    heart' as loci of inner life and thought/will.
- source_word: אֶרְאֶה
  chosen: let me see
  alternatives:
  - may I see
  - I will see
  lexicon: HALOT
  rationale: 'Though formally imperfect 1cs, in context it expresses a wish/request
    directed to God: ''let me see'' best captures the volitional nuance.'
- source_word: נִקְמָתְךָ
  chosen: your vengeance
  alternatives:
  - your vindication
  - your avenging
  - your retribution
  lexicon: HALOT
  rationale: The noun denotes vengeance/avenging. 'Your vengeance' is the most direct
    lexical equivalent; 'vindication' would soften the judicial-retaliatory force
    too much.
- source_word: מֵהֶם
  chosen: on them
  alternatives:
  - from them
  - against them
  lexicon: HALOT
  rationale: With verbs/nouns of vengeance, the preposition is idiomatically rendered
    in English as 'on/against them'; 'from them' would be misleading.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the ground for the petition; 'for' fits the elevated but readable
    style.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - before you
  lexicon: HALOT
  rationale: Direct object of disclosure idiomatically rendered 'to you I have revealed'.
- source_word: גִּלִּיתִי
  chosen: I have revealed
  alternatives:
  - I have uncovered
  - I have laid open
  - I have committed
  lexicon: HALOT
  rationale: The verb literally means uncover/reveal. In context of prayer/legal appeal,
    'revealed' preserves the metaphor without overinterpreting.
- source_word: אֶת רִיבִי
  chosen: my case
  alternatives:
  - my cause
  - my dispute
  - my complaint
  lexicon: HALOT
  rationale: רִיב can denote a legal case, dispute, or cause. 'My case' communicates
    the juridical sense clearly in modern English.
