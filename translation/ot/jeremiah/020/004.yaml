id: JER.20.4
reference: Jeremiah 20:4
source:
  edition: WLC
  text: כִּ֣י כֹ֣ה אָמַ֣ר יְהוָ֡ה הִנְ/נִי֩ נֹתֶנְ/ךָ֨ לְ/מָג֜וֹר לְ/ךָ֣ וּ/לְ/כָל
    אֹהֲבֶ֗י/ךָ וְ/נָֽפְל֛וּ בְּ/חֶ֥רֶב אֹיְבֵי/הֶ֖ם וְ/עֵינֶ֣י/ךָ רֹא֑וֹת וְ/אֶת
    כָּל יְהוּדָ֗ה אֶתֵּן֙ בְּ/יַ֣ד מֶֽלֶךְ בָּבֶ֔ל וְ/הִגְלָ֥/ם בָּבֶ֖לָ/ה וְ/הִכָּ֥/ם
    בֶּ/חָֽרֶב־־־־׃
translation:
  text: 'For thus says the LORD: Behold, I am making you a terror to yourself and
    to all your loved ones, and they will fall by the sword of their enemies while
    your eyes look on. And I will give all Judah into the hand of the king of Babylon,
    and he will carry them away to Babylon and strike them with the sword.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew magor, 'terror' or 'dread'; this echoes the name given to Pashhur
      in the surrounding context, often rendered 'Terror on Every Side.'
    reason: cross_reference
  - marker: b
    text: Or 'your friends' for 'your loved ones.' The Hebrew refers to those who
      love you and may include close companions or allies.
    reason: lexical_alternative
  - marker: c
    text: Or 'he will exile them to Babylon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the covenant name in small-caps convention as 'the LORD' rather than transliteration.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic deictic force and solemnity of the Hebrew announcement
    formula. 'Behold' is still readable here and fits the elevated register.
- source_word: נֹתֶנְךָ
  chosen: I am making you
  alternatives:
  - I am giving you
  - I will make you
  lexicon: HALOT
  rationale: Although נתן is literally 'give,' the idiom with לְמָגוֹר is better expressed
    in English as 'make' or 'set as.' The participial form after הִנְנִי conveys imminent
    action, so 'I am making you' captures both idiom and aspect.
- source_word: לְמָגוֹר
  chosen: a terror
  alternatives:
  - an object of terror
  - a horror
  - a dread
  lexicon: HALOT
  rationale: מָגוֹר denotes terror/dread. 'A terror' is concise and preserves the
    wordplay with Pashhur's renamed title in the context ('Magor-missabib') without
    over-paraphrasing.
- source_word: לְךָ
  chosen: to yourself
  alternatives:
  - for yourself
  - to you
  lexicon: HALOT
  rationale: The dative after לְמָגוֹר is most naturally taken as indicating that
    he himself will become a terror to himself, not merely 'to you' in a vague sense.
    'To yourself' preserves the reflexive force.
- source_word: אֹהֲבֶיךָ
  chosen: your loved ones
  alternatives:
  - your friends
  - those who love you
  - your lovers
  lexicon: HALOT
  rationale: The participle from אהב can mean those who love someone, often friends/allies.
    'Loved ones' is broad enough to include intimate associates without implying romance,
    and reads naturally in context.
- source_word: וְנָפְלוּ בְּחֶרֶב אֹיְבֵיהֶם
  chosen: and they will fall by the sword of their enemies
  alternatives:
  - and they will fall by their enemies' sword
  - and they will be slain by the sword of their enemies
  lexicon: HALOT
  rationale: '''Fall by the sword'' is a standard idiomatic English equivalent for
    the Hebrew collocation and preserves the vividness of the source.'
- source_word: וְעֵינֶיךָ רֹאוֹת
  chosen: while your eyes look on
  alternatives:
  - and your eyes will see it
  - with your own eyes seeing
  lexicon: HALOT
  rationale: The clause emphasizes that Pashhur will witness this personally. 'While
    your eyes look on' is idiomatic and keeps the durative, experiential force.
- source_word: אֶתֵּן בְּיַד
  chosen: I will give ... into the hand of
  alternatives:
  - I will hand ... over to
  - I will deliver ... into the power of
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for delivering someone into another's power.
    'Into the hand of' preserves the idiom with acceptable English clarity.
- source_word: וְהִגְלָם בָּבֶלָה
  chosen: and he will carry them away to Babylon
  alternatives:
  - and he will exile them to Babylon
  - and he will deport them to Babylon
  lexicon: HALOT
  rationale: The hiphil of גלה here means to take into exile. 'Carry them away to
    Babylon' is natural English and communicates forced removal; 'exile' remains a
    viable alternative but is slightly more technical.
- source_word: וְהִכָּם בֶּחָרֶב
  chosen: and strike them with the sword
  alternatives:
  - and kill them with the sword
  - and smite them with the sword
  lexicon: HALOT
  rationale: נכה is broader than 'kill' though lethal force is clearly in view. 'Strike
    them with the sword' stays closer to the Hebrew while allowing the context to
    convey the severity.
