theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the
    stated doctrine and translation policy rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of לְמָגוֹר in relation to Pashhur
  chosen_reading: a terror to yourself
  alternative_readings:
  - an object of terror to yourself
  - a terror all around
  rationale: In immediate context the term resonates with Jeremiah's renaming of Pashhur
    as 'Magor-missabib' (terror on every side), but this verse's syntax specifically
    says God is making him 'for terror' to himself and his loved ones. The contextual
    resonance is preserved in a footnote rather than imported into the main text.
