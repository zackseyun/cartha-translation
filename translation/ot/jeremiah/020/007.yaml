theological_decisions:
- issue: Whether to render פתה with an accusation of divine deception in the main
    text
  chosen_reading: Use 'persuaded' in the main text and preserve 'deceived' in a footnote
  alternative_readings:
  - You deceived me, LORD, and I was deceived
  rationale: The verse is a lament and includes intentionally shocking language, but
    the Hebrew verb's semantic range allows 'persuade/entice' as well as 'deceive.'
    To preserve theological tension without overstating one side, the main text uses
    the broader rendering while the sharper accusation is retained in a footnote for
    auditability.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
