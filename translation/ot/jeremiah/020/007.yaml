id: JER.20.7
reference: Jeremiah 20:7
source:
  edition: WLC
  text: פִּתִּיתַ֤/נִי יְהוָה֙ וָֽ/אֶפָּ֔ת חֲזַקְתַּ֖/נִי וַ/תּוּכָ֑ל הָיִ֤יתִי לִ/שְׂחוֹק֙
    כָּל הַ/יּ֔וֹם כֻּלֹּ֖/ה לֹעֵ֥ג לִֽ/י־׃
translation:
  text: You persuaded me, LORD, and I was persuaded; you overpowered me and prevailed.
    I have become a laughingstock all day long; everyone mocks me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You deceived me, LORD, and I was deceived.' The Hebrew verb can carry
      the sense of entice, persuade, or deceive; Jeremiah's lament is intentionally
      forceful.
    reason: alternative_reading
lexical_decisions:
- source_word: פִּתִּיתַנִי
  chosen: You persuaded me
  alternatives:
  - You deceived me
  - You enticed me
  lexicon: HALOT
  rationale: The verb פתה can mean entice, persuade, or deceive depending on context.
    In Jeremiah 20:7 the speaker laments being drawn into a prophetic calling that
    has brought suffering. 'Persuaded' preserves the causative force without making
    God explicitly deceitful in the main text, while the stronger alternative 'deceived'
    is important enough to preserve in a footnote because the lament intentionally
    carries sharp emotional protest.
- source_word: וָאֶפָּת
  chosen: and I was persuaded
  alternatives:
  - and I let myself be persuaded
  - and I was deceived
  lexicon: HALOT
  rationale: 'The Niphal/related passive-reflexive sense naturally follows the previous
    verb: Jeremiah yielded to YHWH''s persuasion. ''I was persuaded'' gives clear
    English parallelism. Because the Hebrew can also be heard more starkly, an alternative
    is preserved in a footnote.'
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: חֲזַקְתַּנִי
  chosen: you overpowered me
  alternatives:
  - you were stronger than I
  - you seized me
  lexicon: HALOT
  rationale: חזק in this context conveys strength exerted over Jeremiah. 'You overpowered
    me' captures the forceful, personal sense better than a flatter 'you were stronger
    than me.'
- source_word: וַתּוּכָל
  chosen: and prevailed
  alternatives:
  - and you won
  - and you overcame
  lexicon: HALOT
  rationale: יכל here expresses successful dominance. 'Prevailed' is idiomatic, dignified,
    and pairs well with 'overpowered me.'
- source_word: הָיִיתִי לִשְׂחוֹק
  chosen: I have become a laughingstock
  alternatives:
  - I have become a joke
  - I am for laughter
  lexicon: HALOT
  rationale: The phrase denotes becoming an object of derision. 'Laughingstock' is
    natural modern English and preserves the public shame.
- source_word: כָּל־הַיּוֹם כֻּלֹּה
  chosen: all day long
  alternatives:
  - the whole day
  - all the day
  lexicon: HALOT
  rationale: The doubled expression intensifies duration. 'All day long' is the most
    natural English equivalent.
- source_word: לֹעֵג לִי
  chosen: everyone mocks me
  alternatives:
  - all of them mock me
  - everyone derides me
  lexicon: HALOT
  rationale: Although the Hebrew participle is singular, it functions distributively
    after the preceding totalizing expression. 'Everyone mocks me' communicates the
    sense clearly in idiomatic English.
