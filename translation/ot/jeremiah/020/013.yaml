theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Per project doctrine, the
    default rendering is 'the LORD,' following Jewish reverence tradition and longstanding
    English convention while preserving distinction through capitalization.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Meaning of נֶפֶשׁ in a deliverance context
  chosen_reading: life
  alternative_readings:
  - soul
  - person
  rationale: The context is rescue from hostile human agents, so נֶפֶשׁ most naturally
    denotes the person's life/self rather than making a technical statement about
    the soul. This preserves the Hebrew sense without importing later doctrinal categories.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
