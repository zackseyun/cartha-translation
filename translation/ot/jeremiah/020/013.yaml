id: JER.20.13
reference: Jeremiah 20:13
source:
  edition: WLC
  text: שִׁ֚ירוּ לַֽ/יהוָ֔ה הַֽלְל֖וּ אֶת יְהוָ֑ה כִּ֥י הִצִּ֛יל אֶת נֶ֥פֶשׁ אֶבְי֖וֹן
    מִ/יַּ֥ד מְרֵעִֽים־־׃ס
translation:
  text: Sing to the LORD; praise the LORD, for he has delivered the life of the poor
    from the hand of evildoers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the soul of the poor'; here 'life' conveys the sense of the person's
      life or self in danger.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the power of evildoers' for the idiom 'from the hand of evildoers.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁירוּ
  chosen: Sing
  alternatives:
  - Sing praise
  lexicon: HALOT
  rationale: Imperative plural of שׁיר, straightforwardly 'sing.' 'Sing praise' is
    possible in context, but the following imperative already supplies explicit praise
    language, so the simpler 'Sing' avoids redundancy.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Preposition ל plus the divine name indicates direction/object of song.
    Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: הַלְלוּ
  chosen: praise
  alternatives:
  - give praise to
  lexicon: HALOT
  rationale: Piel imperative plural of הלל in a worship context. 'Praise' is the natural
    concise English equivalent and pairs well with the preceding imperative.
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Direct object marker plus divine name. Rendered 'the LORD' in keeping
    with the project's default for יְהוָה.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the imperatives. 'For' is idiomatic in elevated
    poetic English and preserves the causal connection.
- source_word: הִצִּיל
  chosen: has delivered
  alternatives:
  - has rescued
  - delivered
  lexicon: HALOT
  rationale: Hiphil perfect of נצל, 'to deliver/rescue.' Present perfect in English
    fits the poetic declaration of completed saving action with present relevance.
    'Delivered' preserves biblical register without becoming archaic.
- source_word: נֶפֶשׁ
  chosen: the life
  alternatives:
  - the soul
  - the person
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the life/self of the needy person in danger, not
    specifically an immaterial soul. 'Life' best fits the rescue context and avoids
    importing later anthropological assumptions.
- source_word: אֶבְיוֹן
  chosen: the poor
  alternatives:
  - the needy
  - the afflicted
  lexicon: HALOT
  rationale: Common term for a poor or needy person. 'The poor' is the most direct
    and idiomatic rendering here, while still allowing representative singular force
    in context.
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  lexicon: HALOT
  rationale: Hebrew idiom for deliverance from someone's power or control. 'From the
    hand of' preserves the vivid metaphor and remains clear in English.
- source_word: מְרֵעִים
  chosen: evildoers
  alternatives:
  - those who do evil
  - wrongdoers
  lexicon: HALOT
  rationale: Participle from רעע functioning substantivally for people doing evil.
    'Evildoers' is concise, natural, and suitably weighty for prophetic poetry.
