id: JER.20.14
reference: Jeremiah 20:14
source:
  edition: WLC
  text: אָר֣וּר הַ/יּ֔וֹם אֲשֶׁ֥ר יֻלַּ֖דְתִּי בּ֑/וֹ י֛וֹם אֲשֶׁר יְלָדַ֥תְ/נִי אִמִּ֖/י
    אַל יְהִ֥י בָרֽוּךְ־־׃
translation:
  text: Cursed be the day on which I was born; the day my mother bore me, let it not
    be blessed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Accursed be the day on which I was born.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'the day my mother gave birth to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed be
  alternatives:
  - Accursed be
  - May the day be cursed
  lexicon: HALOT
  rationale: Predicate adjective from ארר used in an imprecatory sense. 'Cursed be'
    is the most natural and established English equivalent here, preserving the force
    of Jeremiah's lament without unnecessary archaism.
- source_word: הַיּוֹם
  chosen: the day
  lexicon: HALOT
  rationale: Definite noun referring to a specific day, namely the speaker's birth
    day.
- source_word: אֲשֶׁר
  chosen: on which
  alternatives:
  - that
  - when
  lexicon: HALOT
  rationale: Relative particle introducing the clause tied to 'day.' 'On which' fits
    idiomatic English with a temporal noun better than the more wooden 'that'.
- source_word: יֻלַּדְתִּי
  chosen: I was born
  alternatives:
  - I was brought forth
  lexicon: HALOT
  rationale: Passive of ילד. 'I was born' is the plain modern English equivalent;
    'brought forth' is more formal but less natural.
- source_word: בּוֹ
  chosen: on which
  alternatives:
  - in it
  - on it
  lexicon: HALOT
  rationale: The preposition with pronominal suffix refers back to 'the day.' In English
    it is best absorbed into 'on which' rather than translated separately.
- source_word: יוֹם
  chosen: the day
  alternatives:
  - day
  lexicon: HALOT
  rationale: The second occurrence resumes and emphasizes the same referent. Rendering
    with 'the day' in English preserves the parallel structure.
- source_word: יְלָדַתְנִי אִמִּי
  chosen: my mother bore me
  alternatives:
  - my mother gave birth to me
  lexicon: HALOT
  rationale: The clause is concrete and maternal. 'Bore me' is concise, literary,
    and faithful to ילד, while remaining readable in modern English.
- source_word: אַל יְהִי
  chosen: let it not be
  alternatives:
  - may it not be
  lexicon: HALOT
  rationale: Negative jussive expressing a wish. 'Let it not be' clearly conveys the
    volitional force.
- source_word: בָרוּךְ
  chosen: blessed
  alternatives:
  - fortunate
  - favored
  lexicon: HALOT
  rationale: Counterpart to 'cursed' in the verse's antithetical structure. 'Blessed'
    preserves the lexical and rhetorical contrast.
