id: JER.20.15
reference: Jeremiah 20:15
source:
  edition: WLC
  text: אָר֣וּר הָ/אִ֗ישׁ אֲשֶׁ֨ר בִּשַּׂ֤ר אֶת אָבִ/י֙ לֵ/אמֹ֔ר יֻֽלַּד לְ/ךָ֖ בֵּ֣ן
    זָכָ֑ר שַׂמֵּ֖חַ שִׂמֳּחָֽ/הוּ־־׃
translation:
  text: Cursed be the man who brought my father the news, saying, “A son has been
    born to you,” making him very glad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “a son, a male.”
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew expression “making him glad with gladness” uses an infinitive
      absolute with a cognate verb to intensify the sense: “making him very glad”
      or “gladdening him greatly.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed be
  alternatives:
  - Accursed is
  lexicon: HALOT
  rationale: Predicate adjective used in an imprecatory sense. 'Cursed be' preserves
    the force of Jeremiah's denunciation in natural English.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - that man
  lexicon: HALOT
  rationale: Definite singular noun referring to the specific messenger in view. 'The
    man' is the most direct rendering.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative particle introducing the clause describing the man.
- source_word: בִּשַּׂר
  chosen: brought ... the news
  alternatives:
  - announced
  - brought good news
  lexicon: HALOT
  rationale: The verb commonly denotes bringing news, often good news. In this context
    the content is joyful birth news, but 'brought ... the news' is idiomatic English
    and avoids overstating with explicitly theological 'good news' language.
- source_word: אֶת אָבִי
  chosen: my father
  lexicon: HALOT
  rationale: Direct object marker plus noun with 1cs suffix; straightforwardly 'my
    father.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with the words
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the reported message.
- source_word: יֻלַּד לְךָ
  chosen: has been born to you
  alternatives:
  - is born to you
  - was born to you
  lexicon: HALOT
  rationale: Passive of ילד with dative 'to you.' Present perfect in English fits
    the announcement of a completed birth with present relevance.
- source_word: בֵּן זָכָר
  chosen: a son
  alternatives:
  - a male child
  - a male son
  lexicon: HALOT
  rationale: The collocation literally means 'a son, a male.' In English 'a son' already
    carries the male sense, so 'male' would be redundant in the main text. The fuller
    literal nuance is worth preserving in a footnote.
- source_word: שַׂמֵּחַ שִׂמֳּחָהוּ
  chosen: making him very glad
  alternatives:
  - gladdening him greatly
  - making him rejoice with joy
  lexicon: HALOT
  rationale: Infinitive absolute plus finite verb from the same root intensifies the
    action. 'Making him very glad' conveys the emphatic joy in readable modern English.
