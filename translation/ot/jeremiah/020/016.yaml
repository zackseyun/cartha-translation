id: JER.20.16
reference: Jeremiah 20:16
source:
  edition: WLC
  text: וְ/הָיָה֙ הָ/אִ֣ישׁ הַ/ה֔וּא כֶּֽ/עָרִ֛ים אֲשֶׁר הָפַ֥ךְ יְהוָ֖ה וְ/לֹ֣א נִחָ֑ם
    וְ/שָׁמַ֤ע זְעָקָה֙ בַּ/בֹּ֔קֶר וּ/תְרוּעָ֖ה בְּ/עֵ֥ת צָהֳרָֽיִם־׃
translation:
  text: Let that man be like the cities that the LORD overthrew without relenting,
    and let him hear a cry in the morning and a battle shout at the time of noon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an alarm' or 'a trumpet blast' for 'battle shout' (Hebrew teru'ah).
    reason: lexical_alternative
  - marker: b
    text: The wording likely echoes the cities the LORD overthrew in judgment, such
      as Sodom and Gomorrah.
    reason: cross_reference
lexical_decisions:
- source_word: וְהָיָה
  chosen: Let ... be
  alternatives:
  - and he shall be
  - and may he be
  lexicon: HALOT
  rationale: In this curse context, the waw + qatal of היה functions jussively/wish-like
    rather than as a simple future narrative. English idiom is best captured with
    'Let ... be.'
- source_word: הָאִישׁ הַהוּא
  chosen: that man
  alternatives:
  - the man
  - that person
  lexicon: HALOT
  rationale: 'The demonstrative adds specificity and distance: ''that man.'' ''Person''
    would flatten the masculine singular form; gender-accurate rendering is preferred.'
- source_word: כֶּעָרִים
  chosen: like the cities
  alternatives:
  - as the cities
  - like cities
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. With the article implied by the following
    relative clause, 'like the cities' is the most natural English rendering.
- source_word: אֲשֶׁר הָפַךְ יְהוָה
  chosen: that the LORD overthrew
  alternatives:
  - which the LORD overturned
  - that the LORD destroyed
  lexicon: HALOT
  rationale: הפך in judgment contexts commonly refers to catastrophic overthrow, especially
    evoking Sodom/Gomorrah. 'Overthrew' preserves both the force and the likely intertextual
    echo better than the more generic 'destroyed.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: וְלֹא נִחָם
  chosen: without relenting
  alternatives:
  - and did not relent
  - and was not sorry
  - and did not repent
  lexicon: HALOT
  rationale: נחם here denotes relenting/being moved to pity in the context of judgment.
    'Without relenting' fits smoothly with the relative clause in English and avoids
    the misleading modern sense of 'repent' when predicated of God.
- source_word: וְשָׁמַע
  chosen: and let him hear
  alternatives:
  - and he shall hear
  - that he may hear
  lexicon: HALOT
  rationale: Like the opening verb, this continues the imprecatory/jussive force of
    the curse. English expresses this naturally with 'and let him hear.'
- source_word: זְעָקָה
  chosen: a cry
  alternatives:
  - an outcry
  - a scream
  lexicon: HALOT
  rationale: זעקה is a cry of distress. 'Cry' is natural modern English and preserves
    the emotional force without over-specifying.
- source_word: בַּבֹּקֶר
  chosen: in the morning
  alternatives:
  - at morning
  - by morning
  lexicon: HALOT
  rationale: Standard temporal rendering.
- source_word: וּתְרוּעָה
  chosen: a battle shout
  alternatives:
  - an alarm
  - a trumpet blast
  - a shout
  lexicon: HALOT
  rationale: תרועה can denote a loud alarm signal or war cry. In this context paired
    with morning cry and noon disturbance, 'battle shout' best conveys the sense of
    violent upheaval; the alarm nuance is preserved in a footnote.
- source_word: בְּעֵת צָהֳרָיִם
  chosen: at the time of noon
  alternatives:
  - at noon
  - at midday
  lexicon: HALOT
  rationale: The Hebrew is slightly fuller than a bare adverb, literally 'at the time
    of noon.' This is retained in readable English while preserving the temporal emphasis.
