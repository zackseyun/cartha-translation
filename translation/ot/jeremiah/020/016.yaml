theological_decisions:
- issue: Rendering divine judgment language without implying divine moral change
  chosen_reading: without relenting
  alternative_readings:
  - and did not repent
  - and was not sorry
  rationale: The verse speaks of the LORD's irreversible overthrow of judged cities.
    'Without relenting' communicates the judicial finality without importing the misleading
    English sense that God morally repented of wrongdoing.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; contested term default for יְהוָה as ''the LORD'''
