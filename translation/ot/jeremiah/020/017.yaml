id: JER.20.17
reference: Jeremiah 20:17
source:
  edition: WLC
  text: אֲשֶׁ֥ר לֹא מוֹתְתַ֖/נִי מֵ/רָ֑חֶם וַ/תְּהִי לִ֤/י אִמִּ/י֙ קִבְרִ֔/י וְ/רַחְמָ֖/הֿ
    הֲרַ֥ת עוֹלָֽם־־׃
translation:
  text: because he did not put me to death from the womb, so that my mother would
    have been my grave, and her womb forever pregnant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'who did not kill me from the womb.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''my mother my grave,'' a compressed metaphor meaning that had
      he died in the womb, his mother would have served as his grave.'
    reason: cultural_note
  - marker: c
    text: Or 'pregnant forever.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - who
  - that
  - which
  lexicon: HALOT
  rationale: In context this relative particle introduces the reason for the curse
    in vv. 14–18, so a causal rendering fits the discourse better than a bare relative
    'who/that.'
- source_word: מוֹתְתַנִי
  chosen: did not put me to death
  alternatives:
  - did not kill me
  - did not let me die
  lexicon: HALOT
  rationale: From מות in a causative/denominative sense with 1cs suffix, referring
    to the man who announced Jeremiah's birth. 'Put me to death' preserves the transitive
    force more clearly than the less precise 'let me die.'
- source_word: מֵרָחֶם
  chosen: from the womb
  alternatives:
  - in the womb
  - out of the womb
  lexicon: HALOT
  rationale: The preposition מִן is best kept as 'from,' expressing the point of origin.
    English idiom allows 'from the womb' while preserving the Hebrew image.
- source_word: וַתְּהִי לִי
  chosen: so that ... would have been for me
  alternatives:
  - and ... became for me
  - then ... was to me
  lexicon: HALOT
  rationale: 'Following the unreal wish/complaint context, the waw + imperfect is
    rendered in an English counterfactual sense. This brings out Jeremiah''s lament:
    had he been killed in the womb, his mother would have served as his grave.'
- source_word: אִמִּי קִבְרִי
  chosen: my mother would have been my grave
  alternatives:
  - my mother became my grave
  - my mother's womb would have been my grave
  lexicon: HALOT
  rationale: The Hebrew juxtaposes 'my mother' and 'my grave.' The direct rendering
    is vivid and preserves the shocking metaphor; adding 'womb' in the main text would
    over-specify what the Hebrew leaves implicit.
- source_word: וְרַחְמָהּ
  chosen: and her womb
  alternatives:
  - and her uterus
  - and her belly
  lexicon: HALOT
  rationale: Though רחם can denote womb and is related to compassion in other contexts,
    here the anatomical sense is demanded by the parallel with pregnancy and birth.
- source_word: הֲרַת עוֹלָם
  chosen: forever pregnant
  alternatives:
  - pregnant forever
  - with everlasting pregnancy
  lexicon: HALOT
  rationale: The adjective 'pregnant' with עוֹלָם expresses an unending state. 'Forever
    pregnant' is natural modern English and preserves the disturbing force of the
    lament.
