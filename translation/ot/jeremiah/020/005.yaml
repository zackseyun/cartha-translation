id: JER.20.5
reference: Jeremiah 20:5
source:
  edition: WLC
  text: וְ/נָתַתִּ֗י אֶת כָּל חֹ֨סֶן֙ הָ/עִ֣יר הַ/זֹּ֔את וְ/אֶת כָּל יְגִיעָ֖/הּ וְ/אֶת
    כָּל יְקָרָ֑/הּ וְ/אֵ֨ת כָּל אוֹצְר֜וֹת מַלְכֵ֣י יְהוּדָ֗ה אֶתֵּן֙ בְּ/יַ֣ד אֹֽיְבֵי/הֶ֔ם
    וּ/בְזָזוּ/ם֙ וּ/לְקָח֔וּ/ם וֶ/הֱבִיא֖וּ/ם בָּבֶֽלָ/ה־־־־־־־׃
translation:
  text: And I will give all the wealth of this city, all its gains, all its precious
    things, and all the treasures of the kings of Judah into the hand of their enemies.
    They will plunder them, take them, and bring them to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all its labor' or 'all its produce' for 'all its gains.' The Hebrew
      term can refer either to labor itself or to what that labor yields.
    reason: lexical_alternative
  - marker: b
    text: Or 'all its valuables' for 'all its precious things.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'into the hand of,' an idiom meaning into the control or power of.
    reason: cultural_note
lexical_decisions:
- source_word: חֹסֶן
  chosen: wealth
  alternatives:
  - strength
  - riches
  lexicon: HALOT
  rationale: In this context of goods being handed over, plundered, taken, and carried
    away, the noun refers to material resources/wealth rather than abstract strength.
    'Wealth' is natural English and fits the economic sense.
- source_word: יְגִיעָהּ
  chosen: its gains
  alternatives:
  - its labor
  - its produce
  - its earnings
  lexicon: HALOT
  rationale: The term can denote labor or the fruit of labor. Here, since the objects
    are seized as spoil, the result of labor is in view. 'Its gains' captures the
    city's accumulated produce/earnings better than the more abstract 'labor'.
- source_word: יְקָרָהּ
  chosen: its precious things
  alternatives:
  - its valuables
  - its splendor
  - its honor
  lexicon: HALOT
  rationale: The noun can denote preciousness, honor, or costly things. In a list
    of confiscable assets, the concrete sense is most likely. 'Precious things' preserves
    the semantic link to value without over-specifying.
- source_word: אוֹצְרוֹת מַלְכֵי יְהוּדָה
  chosen: the treasures of the kings of Judah
  alternatives:
  - the storehouses of the kings of Judah
  lexicon: HALOT
  rationale: Although the noun can refer to treasuries/storehouses, in this context
    the contents being surrendered are emphasized. 'Treasures' is the more idiomatic
    and contextually fitting rendering.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for delivering someone or something into
    another's control. 'Into the hand of' preserves the idiom while remaining clear
    in English.
- source_word: אֹיְבֵיהֶם
  chosen: their enemies
  alternatives:
  - the enemies of the kings of Judah
  - its enemies
  lexicon: HALOT
  rationale: The plural suffix most naturally refers to the kings of Judah immediately
    preceding, though the enemies are effectively also the city's enemies. 'Their
    enemies' preserves the Hebrew pronoun without over-resolving the antecedent.
- source_word: וּבְזָזוּם
  chosen: They will plunder them
  alternatives:
  - and they will spoil them
  - and they will loot them
  lexicon: HALOT
  rationale: The verb בזז denotes plundering/spoiling. 'Plunder' is clear, contemporary,
    and suits the military context.
- source_word: וּלְקָחוּם
  chosen: take them
  alternatives:
  - seize them
  - carry them off
  lexicon: HALOT
  rationale: A straightforward rendering of לקח. Since the following verb already
    specifies transport to Babylon, 'take them' avoids redundancy while preserving
    the sequence.
- source_word: וֶהֱבִיאוּם בָּבֶלָה
  chosen: bring them to Babylon
  alternatives:
  - carry them to Babylon
  lexicon: HALOT
  rationale: The verb means to bring/cause to come. 'Bring them to Babylon' is idiomatic
    and accurately reflects the directional ending on 'Babylon'.
