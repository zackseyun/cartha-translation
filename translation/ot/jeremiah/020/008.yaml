id: JER.20.8
reference: Jeremiah 20:8
source:
  edition: WLC
  text: כִּֽי מִ/דֵּ֤י אֲדַבֵּר֙ אֶזְעָ֔ק חָמָ֥ס וָ/שֹׁ֖ד אֶקְרָ֑א כִּֽי הָיָ֨ה דְבַר
    יְהוָ֥ה לִ֛/י לְ/חֶרְפָּ֥ה וּ/לְ/קֶ֖לֶס כָּל הַ/יּֽוֹם־־־־׃
translation:
  text: For whenever I speak, I cry out; I call out, “Violence and destruction!” For
    the word of the LORD has become to me a reproach and a derision all day long.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As often as I speak, I cry out; I proclaim, “Violence and devastation!”'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדֵּי
  chosen: whenever
  alternatives:
  - as often as
  - every time
  lexicon: HALOT
  rationale: The idiom מִדֵּי + imperfect expresses repeated occurrence ('as often
    as/whenever'). 'Whenever' is natural modern English and preserves the iterative
    sense.
- source_word: אֲדַבֵּר
  chosen: I speak
  alternatives:
  - I am speaking
  - I would speak
  lexicon: HALOT
  rationale: 'Piel imperfect 1cs of דבר here is best rendered as a habitual present
    within the iterative construction: ''whenever I speak.'''
- source_word: אֶזְעָק
  chosen: I cry out
  alternatives:
  - I cry
  - I shout
  lexicon: HALOT
  rationale: זעק conveys a strong cry or outcry. 'Cry out' preserves the intensity
    better than the simpler 'cry.'
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrong
  - outrage
  lexicon: HALOT
  rationale: חָמָס commonly denotes violence or violent wrongdoing. 'Violence' is
    the most direct and established rendering in prophetic contexts.
- source_word: שֹׁד
  chosen: destruction
  alternatives:
  - ruin
  - devastation
  - plunder
  lexicon: HALOT
  rationale: In prophetic denunciation, שֹׁד often refers to destructive devastation.
    'Destruction' pairs well with 'violence' and fits the cry Jeremiah proclaims.
    'Plunder' is possible but too narrow in this context.
- source_word: אֶקְרָא
  chosen: I call out
  alternatives:
  - I proclaim
  - I call
  lexicon: HALOT
  rationale: קרא here introduces the content of Jeremiah's shouted message. 'Call
    out' distinguishes it slightly from the preceding 'cry out' while preserving the
    force of public utterance.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: This is a standard prophetic expression. 'Word of the LORD' preserves
    the theological and literary resonance of prophetic revelation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: לְחֶרְפָּה
  chosen: a reproach
  alternatives:
  - disgrace
  - scorn
  lexicon: HALOT
  rationale: חרפה denotes reproach, disgrace, or taunt. 'Reproach' preserves both
    the shame and the verbal abuse implied.
- source_word: קֶלֶס
  chosen: a derision
  alternatives:
  - mockery
  - ridicule
  lexicon: HALOT
  rationale: קלס refers to mocking or derisive treatment. 'Derision' pairs well with
    'reproach' and maintains a formal but still readable register.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all the day
  - continually
  lexicon: HALOT
  rationale: The idiom indicates ongoing duration through the day. 'All day long'
    is idiomatic modern English.
