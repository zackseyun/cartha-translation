id: JER.20.10
reference: Jeremiah 20:10
source:
  edition: WLC
  text: כִּ֣י שָׁמַ֜עְתִּי דִּבַּ֣ת רַבִּים֮ מָג֣וֹר מִ/סָּבִיב֒ הַגִּ֨ידוּ֙ וְ/נַגִּידֶ֔/נּוּ
    כֹּ֚ל אֱנ֣וֹשׁ שְׁלוֹמִ֔/י שֹׁמְרֵ֖י צַלְעִ֑/י אוּלַ֤י יְפֻתֶּה֙ וְ/נ֣וּכְלָה
    ל֔/וֹ וְ/נִקְחָ֥ה נִקְמָתֵ֖/נוּ מִמֶּֽ/נּוּ׃
translation:
  text: 'For I have heard the whispering of many: “Terror on every side!” “Report
    him, and we will report him!” All the men at peace with me are watching for my
    stumbling: “Perhaps he will be deceived, and we will prevail against him, and
    we will take our vengeance on him.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Denounce him, and we will denounce him.” The Hebrew verb means “tell,
      report, declare,” but in this hostile context it can carry the sense of denunciation.
    reason: lexical_alternative
  - marker: b
    text: Literally “watching my limp” or “watching my side.” The expression likely
      means watching for a weakness, misstep, or downfall.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבַּת
  chosen: the whispering
  alternatives:
  - the slander
  - the evil report
  - the defaming talk
  lexicon: HALOT
  rationale: The noun denotes report, whispering, or slanderous talk. In this context
    of hostile speech and plotting, 'whispering' captures the furtive, malicious atmosphere
    without over-specifying formal accusation. The hostile sense is reinforced by
    the surrounding threats.
- source_word: רַבִּים
  chosen: of many
  alternatives:
  - of the many
  - of many people
  lexicon: HALOT
  rationale: A straightforward quantitative plural. 'Of many' is idiomatic with 'I
    have heard' and keeps the broad, threatening social scope.
- source_word: מָגוֹר מִסָּבִיב
  chosen: Terror on every side
  alternatives:
  - terror all around
  - terror from every side
  lexicon: HALOT
  rationale: This is a recognizable Jeremianic expression. 'On every side' is natural
    English and preserves the sense of encircling dread. Capitalization is not required,
    but the phrase is set off as a quoted cry.
- source_word: הַגִּידוּ וְנַגִּידֶנּוּ
  chosen: Report him, and we will report him
  alternatives:
  - Denounce him, and we will denounce him
  - Tell it, and we will tell it
  lexicon: HALOT
  rationale: The Hiphil of נגד means to tell, declare, report. In this hostile context,
    'report' can carry accusatory force while remaining close to the lexical core.
    'Denounce' is possible, but slightly more interpretive; preserved in a footnote.
- source_word: כֹּל אֱנוֹשׁ שְׁלוֹמִי
  chosen: All the men at peace with me
  alternatives:
  - Every man of my peace
  - All my friends
  - All those on friendly terms with me
  lexicon: HALOT
  rationale: Literally 'every man of my peace,' an idiom for those who were on peaceful
    or friendly terms with the speaker. 'Men' preserves the masculine singular collective
    force of אֱנוֹשׁ in line with the gender-accurate policy, while the phrase communicates
    former allies or associates.
- source_word: שֹׁמְרֵי צַלְעִי
  chosen: are watching for my stumbling
  alternatives:
  - are watching my limp
  - are watching my side
  - are watching for my fall
  lexicon: HALOT
  rationale: צֶלַע can denote side, rib, or limp/halting. In idiom here it refers
    to vulnerability or a misstep. 'Watching for my stumbling' best conveys hostile
    surveillance for a downfall in clear modern English. A more literal alternative
    is preserved in a footnote because the Hebrew image may evoke limping or weakness.
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - Maybe
  lexicon: HALOT
  rationale: Standard rendering introducing the conspirators' hope.
- source_word: יְפֻתֶּה
  chosen: he will be deceived
  alternatives:
  - he will be enticed
  - he will be persuaded
  - he will be led astray
  lexicon: HALOT
  rationale: From פתה, often 'be enticed/deceived.' 'Deceived' fits the plotting context
    and the conspirators' hope that Jeremiah can be trapped or manipulated. 'Enticed'
    is possible but less natural in this context.
- source_word: וְנּוּכְלָה לוֹ
  chosen: and we will prevail against him
  alternatives:
  - and we will overcome him
  - and we will be able against him
  lexicon: HALOT
  rationale: יכל means to be able, prevail, overcome. With לֹו in context of hostile
    plotting, 'prevail against him' is idiomatic and preserves the adversarial force.
- source_word: וְנִקְחָה נִקְמָתֵנוּ מִמֶּנּוּ
  chosen: and we will take our vengeance on him
  alternatives:
  - and we will take our revenge on him
  - and we will exact vengeance from him
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'take our vengeance from him.' 'Take our
    vengeance on him' is natural English and preserves the retaliatory sense. 'Vengeance'
    is retained rather than softened to 'revenge' because it better matches the formal
    gravity of the line.
