theological_decisions:
- issue: Metaphorical address 'virgin Israel' in a restoration oracle
  chosen_reading: Retain the metaphor directly as 'virgin Israel' rather than interpretively
    expanding it.
  alternative_readings:
  - maiden Israel
  - O virgin Israel
  rationale: The phrase is covenant-restoration imagery, not a doctrinal claim about
    literal virginity. Preserving the metaphor maintains the prophetic texture and
    theological tension of restored identity after judgment.
  doctrine_reference: Translation philosophy §§1, 3, 6
