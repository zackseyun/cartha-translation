id: JER.31.4
reference: Jeremiah 31:4
source:
  edition: WLC
  text: ע֤וֹד אֶבְנֵ/ךְ֙ וְֽ/נִבְנֵ֔ית בְּתוּלַ֖ת יִשְׂרָאֵ֑ל ע֚וֹד תַּעְדִּ֣י תֻפַּ֔יִ/ךְ
    וְ/יָצָ֖את בִּ/מְח֥וֹל מְשַׂחֲקִֽים׃
translation:
  text: Again I will build you, and you will be built, virgin Israel; again you will
    adorn yourself with your tambourines and go out in the dance of those who celebrate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''you will be rebuilt.'' The Hebrew uses the same root twice: ''I will
      build you, and you will be built.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'maiden Israel.' The phrase is a metaphorical address for Israel in restored
      youthful purity and joy.
    reason: lexical_alternative
  - marker: c
    text: Or 'go out in dancing with the merrymakers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹד
  chosen: Again
  alternatives:
  - Still
  - Yet again
  - Once more
  lexicon: HALOT
  rationale: Here עוֹד marks renewed future action after judgment/restoration context.
    'Again' is idiomatic and preserves the repetition at both clauses.
- source_word: אֶבְנֵךְ
  chosen: I will build you
  alternatives:
  - I will rebuild you
  lexicon: HALOT
  rationale: Qal of בנה is literally 'build.' Because the following passive repeats
    the same root, 'build' preserves the wordplay better than using 'rebuild' in only
    one half. The restoration sense is clear from context without adding the re- prefix.
- source_word: וְנִבְנֵית
  chosen: and you will be built
  alternatives:
  - and you will be rebuilt
  lexicon: HALOT
  rationale: The Niphal/passive mirrors the preceding active verb. Rendering both
    with 'build'/'be built' preserves the Hebrew parallelism and emphasizes divine
    restoration without over-paraphrase.
- source_word: בְּתוּלַת יִשְׂרָאֵל
  chosen: virgin Israel
  alternatives:
  - Virgin Israel
  - maiden Israel
  lexicon: HALOT
  rationale: A construct phrase functioning as a vocative/apposition. 'Virgin Israel'
    is traditional and faithful, but lowercasing 'virgin' in running English avoids
    making it sound like a title while preserving the metaphor of restored covenant
    purity and youthful joy. 'Maiden' is possible but less direct.
- source_word: תַּעְדִּי
  chosen: you will adorn yourself
  alternatives:
  - you will put on
  - you will deck yourself
  lexicon: HALOT
  rationale: From עדה in the sense of adorning oneself. 'Adorn yourself' is natural
    modern English and fits festive imagery.
- source_word: תֻפַּיִךְ
  chosen: your tambourines
  alternatives:
  - your timbrels
  - your hand-drums
  lexicon: HALOT
  rationale: Refers to small percussion instruments used in celebratory procession/dance.
    'Tambourines' is the clearest contemporary equivalent; 'timbrels' is archaic.
- source_word: וְיָצָאת
  chosen: and go out
  alternatives:
  - and come out
  - and go forth
  lexicon: HALOT
  rationale: Simple sequential future. 'Go out' is idiomatic and suits public festive
    procession.
- source_word: במחול
  chosen: in the dance
  alternatives:
  - in dancing
  - in the round dance
  lexicon: HALOT
  rationale: מָחוֹל denotes dancing, often communal/celebratory. 'In the dance' preserves
    the concrete image and works well with the following participle phrase.
- source_word: מְשַׂחֲקִים
  chosen: those who celebrate
  alternatives:
  - the merrymakers
  - those who make merry
  - those who play/rejoice
  lexicon: HALOT
  rationale: The participle from שׂחק can denote playful, joyful celebration. 'Those
    who celebrate' communicates the festive sense in accessible English without sounding
    trivial; 'play' in English could mislead.
