id: JER.31.30
reference: Jeremiah 31:30
source:
  edition: WLC
  text: כִּ֛י אִם אִ֥ישׁ בַּ/עֲוֺנ֖/וֹ יָמ֑וּת כָּל הָֽ/אָדָ֛ם הָ/אֹכֵ֥ל הַ/בֹּ֖סֶר
    תִּקְהֶ֥ינָה שִׁנָּֽי/ו־־׃ס
translation:
  text: But each man will die for his own iniquity; every man who eats the sour grapes—his
    teeth will be set on edge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unripe grapes.' The Hebrew בֹּסֶר refers to grapes not yet ripe, hence
      sour.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: But
  alternatives:
  - Rather
  - Instead
  - But rather
  lexicon: HALOT
  rationale: 'In this contrastive context following the repudiated proverb in the
    previous verse, the particle pair introduces an exception/correction: not the
    proverb, but this reality. ''But'' gives natural English while preserving the
    adversative force.'
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each person
  - a man
  lexicon: HALOT
  rationale: The noun is singular and distributive in context. 'Each man' preserves
    the gender-accurate singular force in line with the translation philosophy, while
    conveying individual responsibility.
- source_word: בַּעֲוֺנוֹ
  chosen: for his own iniquity
  alternatives:
  - in his iniquity
  - for his own guilt
  - for his own sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt depending on
    context. Here it refers to the individual's own culpable wrongdoing as the basis
    for death. 'For his own iniquity' preserves the moral sense and the personal suffix.
- source_word: יָמוּת
  chosen: will die
  alternatives:
  - shall die
  lexicon: HALOT
  rationale: Simple future rendering fits the prophetic declaration and standard English
    style.
- source_word: כָּל הָאָדָם
  chosen: every man
  alternatives:
  - everyone
  - every person
  - every human
  lexicon: HALOT
  rationale: אָדָם here refers to a human being generically, but the singular construction
    and following singular suffix favor a distributive singular rendering. 'Every
    man' matches the source's representative singular and the project's gender-accurate
    policy.
- source_word: הָאֹכֵל
  chosen: who eats
  alternatives:
  - eating
  - that eats
  lexicon: HALOT
  rationale: The participle functions substantivally/relatively, describing the person
    in question. 'Who eats' is idiomatic and precise.
- source_word: הַבֹּסֶר
  chosen: the sour grapes
  alternatives:
  - unripe grapes
  - the unripe fruit
  lexicon: HALOT
  rationale: בֹּסֶר refers to unripe or sour grapes in the proverb. 'Sour grapes'
    preserves the established imagery and best fits the idiom echoed from the previous
    verse.
- source_word: תִּקְהֶינָה שִׁנָּיו
  chosen: his teeth will be set on edge
  alternatives:
  - his teeth will become blunt
  - his teeth will grow dull
  lexicon: HALOT
  rationale: This is an idiomatic expression associated with eating sour grapes. 'Set
    on edge' is the standard idiomatic equivalent in English and communicates the
    experiential effect rather than a woodenly literal dental description.
