theological_decisions:
- issue: Individual versus corporate responsibility
  chosen_reading: The verse teaches that each individual dies for his own iniquity,
    overturning the proverb's implication of transgenerational punishment in this
    context.
  alternative_readings:
  - A purely proverbial restatement without theological emphasis on individual responsibility
  rationale: The syntax emphatically contrasts the prior proverb with a principle
    of personal accountability. The translation preserves this without importing broader
    doctrinal claims beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
