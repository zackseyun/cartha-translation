id: JER.31.21
reference: Jeremiah 31:21
source:
  edition: WLC
  text: הַצִּ֧יבִי לָ֣/ךְ צִיֻּנִ֗ים שִׂ֤מִי לָ/ךְ֙ תַּמְרוּרִ֔ים שִׁ֣תִי לִבֵּ֔/ךְ
    לַֽ/מְסִלָּ֖ה דֶּ֣רֶךְ הלכתי שׁ֚וּבִי בְּתוּלַ֣ת יִשְׂרָאֵ֔ל שֻׁ֖בִי אֶל עָרַ֥יִ/ךְ
    אֵֽלֶּה־׃
translation:
  text: Set up road markers for yourself; place guideposts for yourself. Set your
    heart toward the highway, the way you went. Return, virgin Israel; return to these
    your cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'signposts' for 'road markers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'guide markers' for 'guideposts'; the Hebrew term is rare, but in context
      it likely refers to markers along the route.
    reason: lexical_alternative
  - marker: c
    text: '''Return'' can carry both the sense of coming back from exile and of turning
      back in covenant loyalty.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַצִּיבִי
  chosen: Set up
  alternatives:
  - Raise up
  - Erect
  lexicon: HALOT
  rationale: Hiphil imperative 2fs of נצב, calling for the establishment of visible
    markers. 'Set up' is natural English and preserves the imperative force.
- source_word: צִיֻּנִים
  chosen: road markers
  alternatives:
  - signposts
  - waymarks
  lexicon: HALOT
  rationale: The noun refers to markers or signs set along a route. 'Road markers'
    communicates the travel context clearly in modern English; 'waymarks' is traditional
    but less current.
- source_word: שִׂמִי
  chosen: place
  alternatives:
  - set
  - put
  lexicon: HALOT
  rationale: Qal imperative of שׂים. 'Place' fits idiomatic English with the following
    object and parallels the prior imperative without sounding wooden.
- source_word: תַּמְרוּרִים
  chosen: guideposts
  alternatives:
  - guide markers
  - palm-posts
  - bitter things
  lexicon: HALOT
  rationale: In context of travel imagery and parallel to צִיֻּנִים, the word most
    plausibly denotes markers or guideposts. Although the root can be associated elsewhere
    with bitterness, that sense does not fit the immediate context.
- source_word: שִׁתִי לִבֵּךְ
  chosen: Set your heart toward
  alternatives:
  - Direct your mind to
  - Pay close attention to
  lexicon: HALOT
  rationale: Literally 'set your heart.' In Hebrew, 'heart' includes attention, will,
    and inner orientation. The rendering preserves the metaphor while making the directional
    sense explicit with 'toward.'
- source_word: לַמְסִלָּה
  chosen: the highway
  alternatives:
  - the raised road
  - the main road
  lexicon: HALOT
  rationale: מְסִלָּה commonly denotes a built-up road or highway. 'Highway' is the
    standard concise rendering and suits the return-journey imagery.
- source_word: דֶּרֶךְ
  chosen: the way
  alternatives:
  - the road
  - the path
  lexicon: HALOT
  rationale: Used appositionally with 'the highway' and then qualified by the following
    verb. 'The way' preserves the broad Hebrew term while remaining natural.
- source_word: הלכתי
  chosen: you went
  alternatives:
  - you traveled
  - you walked
  lexicon: HALOT
  rationale: Qal perfect 2fs of הלך. The ketiv-like spelling reflects the common verb
    'to go/walk.' 'You went' is the most idiomatic summary in English.
- source_word: שׁוּבִי
  chosen: Return
  alternatives:
  - Turn back
  - Come back
  lexicon: HALOT
  rationale: Imperative of שוב. 'Return' fits both the physical and covenantal-restoration
    context without overinterpreting either dimension.
- source_word: בְּתוּלַת יִשְׂרָאֵל
  chosen: virgin Israel
  alternatives:
  - Virgin Israel
  - maiden Israel
  lexicon: HALOT
  rationale: A prophetic personification for the nation. Lowercase 'virgin' treats
    it as a descriptive metaphor rather than a formal title; 'maiden' is possible
    but less direct.
- source_word: עָרַיִךְ אֵלֶּה
  chosen: these your cities
  alternatives:
  - these cities of yours
  - your cities here
  lexicon: HALOT
  rationale: The demonstrative plus pronominal suffix emphasizes the cities belonging
    to Israel and now in view as destinations of return. 'These your cities' preserves
    the emphasis with acceptable literary English.
