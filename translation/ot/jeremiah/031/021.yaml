theological_decisions:
- issue: Nature of the return commanded by שוב
  chosen_reading: Render as 'Return' without specifying only spiritual repentance
    or only geographic repatriation.
  alternative_readings:
  - Repent
  - Come back from exile
  rationale: The verse's imagery of roads, markers, and cities strongly supports literal
    return from exile, yet in Jeremiah restoration language often carries covenantal
    overtones. The translation preserves this tension by using 'Return' rather than
    narrowing the sense.
  doctrine_reference: Preserve theological tension rather than resolve it.
