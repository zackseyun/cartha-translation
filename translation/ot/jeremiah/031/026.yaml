id: JER.31.26
reference: Jeremiah 31:26
source:
  edition: WLC
  text: עַל זֹ֖את הֱקִיצֹ֣תִי וָ/אֶרְאֶ֑ה וּ/שְׁנָתִ֖/י עָ֥רְבָה לִּֽ/י־׃ס
translation:
  text: At this I awoke and looked, and my sleep was pleasant to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my sleep was sweet to me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל זֹאת
  chosen: At this
  alternatives:
  - Because of this
  - Upon this
  lexicon: HALOT
  rationale: The preposition עַל with the demonstrative זֹאת introduces the occasion
    or stimulus for the speaker's awakening. 'At this' is idiomatic English and preserves
    the deictic force without overinterpreting causation.
- source_word: הֱקִיצֹתִי
  chosen: I awoke
  alternatives:
  - I woke up
  - I was awakened
  lexicon: HALOT
  rationale: From קיץ/יקץ, 'to awake.' The form is first person singular and is best
    rendered actively as 'I awoke.' 'I was awakened' would add a passive nuance not
    explicit in the Hebrew.
- source_word: וָאֶרְאֶה
  chosen: and looked
  alternatives:
  - and saw
  - and I looked
  lexicon: HALOT
  rationale: ראה commonly means 'see,' but in this context immediately after waking,
    English 'looked' better captures the natural sense of becoming aware on waking.
    'Saw' is possible, but 'looked' reads more smoothly while staying within the semantic
    range.
- source_word: וּשְׁנָתִי
  chosen: and my sleep
  alternatives:
  - and my slumber
  lexicon: HALOT
  rationale: שֵׁנָה means 'sleep.' 'Sleep' is the plain, natural rendering in modern
    English.
- source_word: עָרְבָה לִּי
  chosen: was pleasant to me
  alternatives:
  - was sweet to me
  - was agreeable to me
  lexicon: HALOT
  rationale: ערב in this stem conveys pleasantness or sweetness. 'Was pleasant to
    me' is clear modern English; 'was sweet to me' is more literal and worth preserving
    as a lexical alternative.
