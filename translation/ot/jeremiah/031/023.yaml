id: JER.31.23
reference: Jeremiah 31:23
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר יְהוָ֤ה צְבָאוֹת֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל ע֣וֹד יֹאמְר֞וּ אֶת הַ/דָּבָ֣ר הַ/זֶּ֗ה בְּ/אֶ֤רֶץ יְהוּדָה֙ וּ/בְ/עָרָ֔י/ו בְּ/שׁוּבִ֖/י אֶת שְׁבוּתָ֑/ם יְבָרֶכְ/ךָ֧ יְהוָ֛ה נְוֵה צֶ֖דֶק הַ֥ר הַ/קֹּֽדֶשׁ־־־־׃
translation:
  text: 'Thus says Yahweh of hosts, the God of Israel: They will yet say this word in the land of Judah and in its cities, when I restore their fortunes: “May Yahweh bless you, O habitation of righteousness, O holy mountain.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “when I bring back their captives” / “when I restore them from captivity.” The Hebrew idiom can refer specifically to return from exile or more broadly to restoration.
    reason: lexical_alternative
  - marker: b
    text: Or “abode of righteousness” or “pasture of righteousness.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal sense while matching established English Bible convention.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'hosts' is the standard concise rendering that preserves the breadth of heavenly and earthly armies without over-specifying.
- source_word: עוֹד
  chosen: yet
  alternatives:
  - again
  - still
  lexicon: HALOT
  rationale: Here עוֹד marks future repetition/restoration of customary speech. 'Yet' fits the prophetic promise that this saying will once more be heard.
- source_word: יֹאמְרוּ אֶת־הַדָּבָר הַזֶּה
  chosen: they will yet say this word
  alternatives:
  - they will again say this thing
  - they will still speak this saying
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'saying.' 'This word' is slightly formal but natural enough here and keeps close to the Hebrew before the quoted blessing.
- source_word: בְּאֶרֶץ יְהוּדָה וּבְעָרָיו
  chosen: in the land of Judah and in its cities
  alternatives:
  - in the land of Judah and in his cities
  lexicon: HALOT
  rationale: The 3ms suffix on 'cities' refers to Judah as a territorial entity; idiomatic English uses 'its cities' for the land/region.
- source_word: בְּשׁוּבִי אֶת־שְׁבוּתָם
  chosen: when I restore their fortunes
  alternatives:
  - when I bring back their captivity
  - when I restore their restoration
  - when I return their captives
  lexicon: HALOT
  rationale: The idiom שׁוּב שְׁבוּת commonly denotes restoration from exile/disaster. 'Restore their fortunes' is established and idiomatic in English, while capturing the broader reversal of condition; more literal alternatives are less natural and can mislead modern readers.
- source_word: יְבָרֶכְךָ
  chosen: May the LORD bless you
  alternatives:
  - The LORD bless you
  - May the LORD bless thee
  lexicon: HALOT
  rationale: The imperfect here functions jussively within the quoted blessing. 'May the LORD bless you' best conveys the benedictory force.
- source_word: נְוֵה צֶדֶק
  chosen: habitation of righteousness
  alternatives:
  - abode of righteousness
  - pasture of righteousness
  - dwelling place of righteousness
  lexicon: HALOT
  rationale: נָוֶה can denote habitation, abode, or pasture. In parallel with 'holy mountain' as a title for restored Jerusalem/Zion, 'habitation' gives a natural locative sense without narrowing to pastoral imagery.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  lexicon: HALOT
  rationale: In this nominal phrase, 'righteousness' better matches the moral-religious characterization of the restored city. 'Justice' is possible but narrower.
- source_word: הַר הַקֹּדֶשׁ
  chosen: holy mountain
  alternatives:
  - the holy hill
  lexicon: HALOT
  rationale: Standard rendering for Zion as the sacred mountain. 'Mountain' better reflects הַר than 'hill,' even if Jerusalem's topography is modest by modern standards.
