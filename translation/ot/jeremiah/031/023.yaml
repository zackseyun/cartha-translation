theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of שׁוּב שְׁבוּת idiom
  chosen_reading: restore their fortunes
  alternative_readings:
  - bring back their captives
  - restore them from captivity
  rationale: The idiom often includes return from exile but can denote broader restoration. The chosen rendering preserves that wider restorative sense without denying the exilic backdrop.
