id: JER.31.33
reference: Jeremiah 31:33
source:
  edition: WLC
  text: כִּ֣י זֹ֣את הַ/בְּרִ֡ית אֲשֶׁ֣ר אֶכְרֹת֩ אֶת בֵּ֨ית יִשְׂרָאֵ֜ל אַחֲרֵ֨י הַ/יָּמִ֤ים הָ/הֵם֙ נְאֻם יְהוָ֔ה נָתַ֤תִּי אֶת תּֽוֹרָתִ/י֙ בְּ/קִרְבָּ֔/ם וְ/עַל לִבָּ֖/ם אֶכְתֲּבֶ֑/נָּה וְ/הָיִ֤יתִי לָ/הֶם֙ לֵֽ/אלֹהִ֔ים וְ/הֵ֖מָּה יִֽהְיוּ לִ֥/י לְ/עָֽם־־־־־׃
translation:
  text: 'For this is the covenant that I will make with the house of Israel after those days, declares Yahweh: I will put my law within them, and I will write it on their hearts. And I will be their God, and they shall be my people.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my instruction.' The Hebrew torah can mean 'law' or 'instruction'; here 'law' is used to preserve the covenantal sense.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'I will cut' a covenant.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew verb translated 'I will put' is formally perfect ('I have put'), but in this prophetic context it is understood with future force alongside the surrounding promises.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces an explanation of the preceding promise; 'for' best preserves the causal/explanatory force in natural English.
- source_word: הַבְּרִית
  chosen: the covenant
  alternatives:
  - the pact
  - the treaty
  lexicon: HALOT
  rationale: '''Covenant'' is the standard and theologically appropriate rendering for בְּרִית in YHWH''s relationship with Israel; alternatives are too secular or narrow.'
- source_word: אֶכְרֹת
  chosen: I will make
  alternatives:
  - I will cut
  lexicon: HALOT
  rationale: Hebrew idiom literally says 'cut a covenant,' but English idiom is 'make a covenant.' The formal image is preserved in documentation rather than awkwardly in the main text.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  - the people of Israel
  lexicon: HALOT
  rationale: Retains the covenantal corporate expression of the Hebrew rather than flattening it to simply 'Israel.'
- source_word: אַחֲרֵי הַיָּמִים הָהֵם
  chosen: after those days
  alternatives:
  - after those days have passed
  - following those days
  lexicon: HALOT
  rationale: A close and natural rendering of the temporal phrase, preserving its prophetic orientation without over-interpretation.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic, weighty, and consistent with rendering יְהוָה as 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential and covenantal usage in line with DOCTRINE.md.
- source_word: נָתַתִּי ... תּוֹרָתִי בְּקִרְבָּם
  chosen: I will put my law within them
  alternatives:
  - I have put my law within them
  - I will place my instruction in their inward parts
  lexicon: HALOT
  rationale: Although the form is morphologically perfect, in this prophetic covenant context it is best taken with future force in sequence with the surrounding promises. 'Law' is retained as the main rendering of תּוֹרָה here because covenantal norm is in view; 'within them' renders the internal location naturally.
- source_word: תּוֹרָתִי
  chosen: my law
  alternatives:
  - my instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction,' but in this covenant-renewal context 'law' better preserves the covenantal and canonical resonance familiar from Jeremiah while remaining accurate.
- source_word: בְּקִרְבָּם
  chosen: within them
  alternatives:
  - in their inward parts
  - in their midst
  lexicon: HALOT
  rationale: Here the sense is inward/internal rather than merely communal 'in their midst,' especially in parallel with 'on their hearts.'
- source_word: וְעַל לִבָּם אֶכְתֲּבֶנָּה
  chosen: and I will write it on their hearts
  alternatives:
  - and upon their heart I will write it
  - and I will inscribe it on their hearts
  lexicon: HALOT
  rationale: Clear, natural English preserving the singular feminine suffix referring back to 'my law' and the metaphor of internalized covenant obligation.
- source_word: לֵב
  chosen: hearts
  alternatives:
  - mind
  - inner being
  lexicon: HALOT
  rationale: '''Heart'' is the standard biblical anthropological term and should be preserved rather than interpreted away, especially in a well-known covenant text.'
- source_word: וְהָיִיתִי לָהֶם לֵאלֹהִים
  chosen: And I will be their God
  alternatives:
  - And I will become God to them
  lexicon: HALOT
  rationale: Standard covenant formula; idiomatic English preserves the relational force.
- source_word: וְהֵמָּה יִהְיוּ לִי לְעָם
  chosen: and they shall be my people
  alternatives:
  - and they will be a people to me
  lexicon: HALOT
  rationale: Standard covenant formula in natural English; 'my people' best captures the possessive covenant relationship.
