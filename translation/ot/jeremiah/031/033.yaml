theological_decisions:
- issue: Prophetic perfect in נָתַתִּי within a future covenant promise
  chosen_reading: 'Render with future sense: ''I will put my law within them'''
  alternative_readings:
  - 'Render strictly as past/perfect: ''I have put my law within them'''
  rationale: The verse is framed by future covenant language ('this is the covenant that I will make,' 'I will write,' 'I will be,' 'they shall be'). Rendering נָתַתִּי with future force preserves the coherent promise sequence and reflects common prophetic usage without importing extra theology.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve the source''s sense in context.'
- issue: Rendering תּוֹרָה in new-covenant context
  chosen_reading: Translate as 'law' in the main text, preserve 'instruction' as an alternative
  alternative_readings:
  - my instruction
  rationale: The term can denote instruction broadly, but Jeremiah's covenant context strongly evokes God's covenant law. 'Law' preserves intertextual and theological continuity while the footnote records the broader lexical possibility.
  doctrine_reference: 'Translation philosophy: consistency of key terms, or documented exception.'
