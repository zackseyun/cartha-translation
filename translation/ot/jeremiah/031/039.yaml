id: JER.31.39
reference: Jeremiah 31:39
source:
  edition: WLC
  text: וְ/יָצָ֨א ע֜וֹד קוה הַ/מִּדָּה֙ נֶגְדּ֔/וֹ עַ֖ל גִּבְעַ֣ת גָּרֵ֑ב וְ/נָסַ֖ב
    גֹּעָֽתָ/ה׃
translation:
  text: And the measuring line will go out farther, straight ahead to the hill of
    Gareb, and then it will turn toward Goah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''again'': the Hebrew עוֹד can mean ''again'' or ''further/farther'';
      here the spatial sense fits the boundary-expansion context.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in front of it' or 'opposite it'; the exact referent of the suffix
      in נֶגְדּוֹ is contextually inferred from the surrounding boundary description.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  chosen: will go out
  alternatives:
  - will extend
  - will stretch out
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic context is naturally
    rendered as a future in English. 'Go out' preserves the concrete imagery of the
    line extending outward.
- source_word: עוֹד
  chosen: farther
  alternatives:
  - again
  - further
  - still
  lexicon: HALOT
  rationale: In context of the city's boundary being measured beyond its former extent,
    עוֹד modifies the action as additional extension. 'Farther' communicates spatial
    continuation more idiomatically than 'again'.
- source_word: קוה הַמִּדָּה
  chosen: the measuring line
  alternatives:
  - the survey line
  - the measuring cord
  lexicon: HALOT
  rationale: The construct phrase denotes a line/cord used for measuring. 'Measuring
    line' is clear modern English and preserves the surveying image.
- source_word: נֶגְדּוֹ
  chosen: straight ahead
  alternatives:
  - before it
  - opposite it
  - in front of it
  lexicon: HALOT
  rationale: The preposition with pronominal suffix indicates direction 'in front
    of/opposite it.' In English boundary-description style, 'straight ahead' best
    conveys forward extension from the previously described point.
- source_word: עַל
  chosen: to
  alternatives:
  - upon
  - over
  - toward
  lexicon: HALOT
  rationale: With a verb of extension and a topographical destination, English idiom
    prefers 'to the hill of...' rather than the more wooden 'upon.'
- source_word: גִּבְעַת גָּרֵב
  chosen: the hill of Gareb
  alternatives:
  - Gareb Hill
  lexicon: HALOT
  rationale: גִּבְעַת is 'hill of' in construct with the place-name גָּרֵב. The transliterated
    place-name is retained per translation philosophy.
- source_word: וְנָסַב
  chosen: and then it will turn
  alternatives:
  - and it will go around
  - and it will curve
  lexicon: HALOT
  rationale: The verb means to turn, go around, or curve about. In a boundary description,
    'turn' is the most natural concise rendering; 'then' helps show sequence.
- source_word: גֹּעָתָה
  chosen: toward Goah
  alternatives:
  - to Goah
  lexicon: HALOT
  rationale: This is a place-name with directional ending. 'Toward Goah' reflects
    the directional nuance better than a bare transliteration alone.
