theological_decisions:
- issue: Rendering of the proverb's kinship terms
  chosen_reading: Retain 'fathers' and 'sons' in the main text
  alternative_readings:
  - parents and children
  rationale: The verse states a proverb using specifically male kinship terms in Hebrew.
    Following the project's gender-accurate policy, the translation preserves the
    source wording rather than neutralizing it. The proverb's point concerns intergenerational
    consequence, but the lexical forms remain masculine.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
