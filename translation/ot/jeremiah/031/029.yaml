id: JER.31.29
reference: Jeremiah 31:29
source:
  edition: WLC
  text: בַּ/יָּמִ֣ים הָ/הֵ֔ם לֹא יֹאמְר֣וּ ע֔וֹד אָב֖וֹת אָ֣כְלוּ בֹ֑סֶר וְ/שִׁנֵּ֥י
    בָנִ֖ים תִּקְהֶֽינָה־׃
translation:
  text: In those days they will no longer say, ‘The fathers have eaten sour grapes,
    and the sons’ teeth are set on edge.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The fathers ate unripe grapes, and the children's teeth are set on edge.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  chosen: In those days
  alternatives:
  - In those times
  lexicon: HALOT
  rationale: Standard temporal idiom in prophetic discourse. 'In those days' is the
    most natural and established English equivalent without sounding archaic.
- source_word: לֹא יֹאמְרוּ עוֹד
  chosen: they will no longer say
  alternatives:
  - they will not say anymore
  - it will no longer be said
  lexicon: HALOT
  rationale: The Hebrew is active third person plural with עוֹד marking cessation.
    'They will no longer say' preserves the indefinite plural subject and future sense
    better than an impersonal passive.
- source_word: אָבוֹת
  chosen: the fathers
  alternatives:
  - parents
  - ancestors
  lexicon: HALOT
  rationale: The noun is specifically 'fathers,' not a gender-neutral term. Per translation
    philosophy, gender-accurate rendering is preferred. 'Ancestors' would broaden
    the sense beyond the Hebrew wording.
- source_word: אָכְלוּ
  chosen: have eaten
  alternatives:
  - ate
  lexicon: HALOT
  rationale: 'English present perfect fits the proverbial force: a completed action
    with present consequence. Simple past is possible but less idiomatic in this proverb.'
- source_word: בֹסֶר
  chosen: sour grapes
  alternatives:
  - unripe grapes
  lexicon: HALOT
  rationale: In this proverb the term refers to grapes whose sourness causes the unpleasant
    effect. 'Sour grapes' is the clearest idiomatic equivalent in English; 'unripe
    grapes' is more literal but less natural here.
- source_word: וְשִׁנֵּי בָנִים
  chosen: and the sons’ teeth
  alternatives:
  - and the children's teeth
  lexicon: HALOT
  rationale: The construct phrase is literally 'and the teeth of sons.' 'Sons' preserves
    the Hebrew wording; 'children' would smooth the expression but lose the gendered
    lexical form.
- source_word: תִּקְהֶינָה
  chosen: are set on edge
  alternatives:
  - become blunt
  - grow dull
  lexicon: HALOT
  rationale: Within the proverb this verb denotes the unpleasant numbing/dulling sensation
    in the teeth caused by sour fruit. 'Are set on edge' is the standard idiomatic
    English rendering that best communicates the effect.
