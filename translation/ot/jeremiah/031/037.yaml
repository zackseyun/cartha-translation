id: JER.31.37
reference: Jeremiah 31:37
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה אִם יִמַּ֤דּוּ שָׁמַ֨יִם֙ מִ/לְ/מַ֔עְלָ/ה וְ/יֵחָקְר֥וּ מֽוֹסְדֵי אֶ֖רֶץ לְ/מָ֑טָּה גַּם אֲנִ֞י אֶמְאַ֨ס בְּ/כָל זֶ֧רַע יִשְׂרָאֵ֛ל עַֽל כָּל אֲשֶׁ֥ר עָשׂ֖וּ נְאֻם יְהוָֽה׀־־־־־־־׃ס
translation:
  text: 'Thus says Yahweh: If the heavens above can be measured, and the foundations of the earth below can be searched out, then I also will reject all the offspring of Israel for all that they have done, declares Yahweh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cast off all the seed of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name through small-caps convention in English rather than transliteration.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' is concise, natural, and preserves the formal prophetic register.
- source_word: אִם
  chosen: If
  alternatives:
  - Were ... to
  - Should ...
  lexicon: HALOT
  rationale: Introduces a conditional clause. In context it is a rhetorical, effectively impossible condition, but the Hebrew form is straightforwardly conditional and should be preserved.
- source_word: יִמַּדּוּ
  chosen: can be measured
  alternatives:
  - are measured
  - could be measured
  lexicon: HALOT
  rationale: Nifal of מדד, passive sense. 'Can be measured' captures the hypothetical possibility implied by the condition better than a simple present passive.
- source_word: שָׁמַיִם מִלְמַעְלָה
  chosen: the heavens above
  alternatives:
  - heaven above
  - the skies above
  lexicon: HALOT
  rationale: '''Heavens'' is the normal rendering of שָׁמַיִם in cosmological contexts. ''Above'' reflects מִלְמַעְלָה and preserves the vertical cosmic imagery.'
- source_word: וְיֵחָקְרוּ
  chosen: can be searched out
  alternatives:
  - can be explored
  - are searched out
  - can be fathomed
  lexicon: HALOT
  rationale: Nifal of חקר conveys being searched out or investigated thoroughly. 'Searched out' preserves the sense of exhaustive probing better than the more interpretive 'fathomed.'
- source_word: מוֹסְדֵי אֶרֶץ
  chosen: the foundations of the earth
  alternatives:
  - the bases of the earth
  - the foundations of the land
  lexicon: HALOT
  rationale: Cosmological expression for the earth's foundations. 'Earth' fits the universal scope better than 'land' here.
- source_word: לְמָטָּה
  chosen: below
  alternatives:
  - beneath
  lexicon: HALOT
  rationale: Balances 'above' in the first clause and preserves the vertical parallelism.
- source_word: גַּם אֲנִי
  chosen: then I also
  alternatives:
  - I too
  - even I
  lexicon: HALOT
  rationale: 'Marks the apodosis and preserves the emphatic correspondence: only if the impossible condition were met would God likewise act in this way.'
- source_word: אֶמְאַס
  chosen: will reject
  alternatives:
  - will cast off
  - will despise
  - will spurn
  lexicon: HALOT
  rationale: מאס often means reject or cast off. 'Reject' is clear modern English and fits the covenantal context without overstating emotional contempt.
- source_word: בְּכָל זֶרַע יִשְׂרָאֵל
  chosen: all the offspring of Israel
  alternatives:
  - all the seed of Israel
  - all the descendants of Israel
  lexicon: HALOT
  rationale: זֶרַע is collective. 'Offspring' preserves the singular collective force better than 'descendants' while remaining natural English.
- source_word: עַל כָּל אֲשֶׁר עָשׂוּ
  chosen: because of all that they have done
  alternatives:
  - for all that they have done
  - on account of all they did
  lexicon: HALOT
  rationale: עַל here expresses cause or basis. 'Because of' is idiomatic and clear. The perfect is rendered 'have done' to connect Israel's past actions with their present standing in the argument.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic closing formula. 'Declares the LORD' is idiomatic modern English and distinguishes this formula from the opening 'Thus says the LORD.'
