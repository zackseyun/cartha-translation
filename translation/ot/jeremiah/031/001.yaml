id: JER.31.1
reference: Jeremiah 31:1
source:
  edition: WLC
  text: בָּ/עֵ֤ת הַ/הִיא֙ נְאֻם יְהוָ֔ה אֶֽהְיֶה֙ לֵֽ/אלֹהִ֔ים לְ/כֹ֖ל מִשְׁפְּח֣וֹת יִשְׂרָאֵ֑ל וְ/הֵ֖מָּה יִֽהְיוּ לִ֥/י לְ/עָֽם־־׃ס
translation:
  text: At that time, declares Yahweh, I will be God to all the families of Israel, and they will be my people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clans' instead of 'families.' The Hebrew term can denote extended family groups within Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  chosen: At that time
  alternatives:
  - In that time
  - At that season
  lexicon: HALOT
  rationale: Temporal phrase marking a future point or period. 'At that time' is idiomatic modern English and preserves the prophetic temporal reference without unnecessary archaism.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic formula best rendered 'declares' in readable modern English. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶהְיֶה לֵאלֹהִים
  chosen: I will be God
  alternatives:
  - I will be a God
  - I will be as God
  lexicon: HALOT
  rationale: 'This is covenant formula language meaning relational belonging and divine commitment. English omits the article naturally: ''be God to'' is the standard and most faithful idiom here.'
- source_word: לְכֹל מִשְׁפְּחוֹת יִשְׂרָאֵל
  chosen: to all the families of Israel
  alternatives:
  - for all the clans of Israel
  - to every family of Israel
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת can mean 'families' or 'clans.' 'Families' is the more transparent English gloss and fits the plural collective sense; 'clans' is possible but less natural for many readers. The phrase emphasizes the whole covenant people in their constituent groups.
- source_word: וְהֵמָּה יִהְיוּ לִי לְעָם
  chosen: and they will be my people
  alternatives:
  - and they will be a people to me
  - and they will belong to me as a people
  lexicon: HALOT
  rationale: This is the reciprocal covenant formula. 'My people' is the natural English equivalent and preserves the theological force of covenant belonging.
