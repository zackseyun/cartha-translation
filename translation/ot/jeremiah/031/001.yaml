theological_decisions:
- issue: Covenant formula rendering
  chosen_reading: I will be God to all the families of Israel, and they will be my people
  alternative_readings:
  - I will be a God to all the clans of Israel, and they will be a people to me
  rationale: The verse uses standard covenant language found throughout Scripture. The chosen rendering preserves that formula in idiomatic English without weakening its relational and theological force. The absence of the article before 'God' in English better reflects natural usage while still conveying the covenant claim.
