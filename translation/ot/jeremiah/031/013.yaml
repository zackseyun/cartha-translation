theological_decisions:
- issue: Representative singular in בְּתוּלָה
  chosen_reading: Retain the singular 'the virgin' as a collective/representative
    figure within the restored community.
  alternative_readings:
  - Translate idiomatically as plural 'young women'
  rationale: The Hebrew uses a singular noun, likely representative rather than strictly
    individual. Retaining the singular better reflects the source form while still
    fitting the communal restoration scene.
  doctrine_reference: Translation philosophy §5 (consistency/documented exception)
    and §6 (readable modern English).
- issue: Sense of זְקֵנִים
  chosen_reading: Translate as 'old men' rather than 'elders.'
  alternative_readings:
  - elders
  rationale: In parallel with 'young men,' the age contrast is foregrounded, not leadership
    status. This avoids importing institutional meaning the text does not require.
  doctrine_reference: Affirmation against importing doctrinal claims the text does
    not make.
