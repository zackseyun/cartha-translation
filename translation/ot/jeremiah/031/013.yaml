id: JER.31.13
reference: Jeremiah 31:13
source:
  edition: WLC
  text: אָ֣ז תִּשְׂמַ֤ח בְּתוּלָה֙ בְּ/מָח֔וֹל וּ/בַחֻרִ֥ים וּ/זְקֵנִ֖ים יַחְדָּ֑ו
    וְ/הָפַכְתִּ֨י אֶבְלָ֤/ם לְ/שָׂשׂוֹן֙ וְ/נִ֣חַמְתִּ֔י/ם וְ/שִׂמַּחְתִּ֖י/ם מִ/יגוֹנָֽ/ם׃
translation:
  text: Then the virgin will rejoice in the dance, and young men and old men together;
    and I will turn their mourning into gladness, and I will comfort them and make
    them rejoice from their sorrow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the maiden' or 'the young woman.' The Hebrew singular likely functions
      representatively for the young women of the community.
    reason: lexical_alternative
  - marker: b
    text: Or 'elders,' if taken as a social role rather than an age contrast; here
      the parallel with 'young men' favors 'old men.'
    reason: lexical_alternative
  - marker: c
    text: Or 'into joy' for 'into gladness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  chosen: Then
  alternatives:
  - At that time
  lexicon: HALOT
  rationale: Temporal adverb marking the future result of the restoration promises
    in context. 'Then' is concise and natural in English.
- source_word: תִּשְׂמַח
  chosen: will rejoice
  alternatives:
  - will be glad
  lexicon: HALOT
  rationale: Qal imperfect 3fs of שׂמח expresses future joy. 'Rejoice' fits the celebratory
    context and pairs well with later causative forms of the same root.
- source_word: בְּתוּלָה
  chosen: the virgin
  alternatives:
  - the maiden
  - the young woman
  lexicon: HALOT
  rationale: The noun commonly denotes a virgin/maiden. Here it likely represents
    the young women of the restored community. 'Virgin' is the more direct lexical
    equivalent; the singular is retained as in Hebrew rather than pluralizing for
    smoothness.
- source_word: בְּמָחוֹל
  chosen: in the dance
  alternatives:
  - in dancing
  - with dancing
  lexicon: HALOT
  rationale: The preposition ב plus מָחוֹל refers to dancing as the sphere or expression
    of rejoicing. 'In the dance' preserves the concrete image while remaining idiomatic.
- source_word: וּבַחֻרִים
  chosen: young men
  alternatives:
  - young men also
  - the young men
  lexicon: HALOT
  rationale: בחורים denotes young men in the prime of life. The plural is explicit
    and contrasts with 'old men' in the next phrase.
- source_word: וּזְקֵנִים
  chosen: old men
  alternatives:
  - elders
  - the aged
  lexicon: HALOT
  rationale: Though זקנים can mean 'elders,' here the contrast with young men favors
    the age-based sense 'old men' rather than an office.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: Adverb emphasizing shared participation across generations.
- source_word: וְהָפַכְתִּי
  chosen: and I will turn
  alternatives:
  - and I will transform
  - and I will change
  lexicon: HALOT
  rationale: The verb הפך in this idiom means to turn/change one state into another.
    'Turn' preserves the common biblical idiom.
- source_word: אֶבְלָם
  chosen: their mourning
  alternatives:
  - their grief
  lexicon: HALOT
  rationale: אֵבֶל denotes mourning, especially lament associated with loss. 'Mourning'
    best matches the emotional and communal sense.
- source_word: לְשָׂשׂוֹן
  chosen: into gladness
  alternatives:
  - into joy
  - into rejoicing
  lexicon: HALOT
  rationale: שׂשׂון denotes exultant joy/gladness. 'Gladness' gives a natural contrast
    with 'mourning' and avoids overusing 'joy/rejoice' in the verse, while still conveying
    celebratory delight.
- source_word: וְנִחַמְתִּים
  chosen: and I will comfort them
  alternatives:
  - and I will console them
  lexicon: HALOT
  rationale: The piel of נחם here means to comfort or console after distress. 'Comfort'
    is standard and accessible.
- source_word: וְשִׂמַּחְתִּים
  chosen: and make them rejoice
  alternatives:
  - and gladden them
  - and make them glad
  lexicon: HALOT
  rationale: 'Piel causative nuance of שׂמח: God causes them to rejoice. ''Make them
    rejoice'' preserves the verbal connection with the earlier ''will rejoice.'''
- source_word: מִיגוֹנָם
  chosen: from their sorrow
  alternatives:
  - after their sorrow
  - instead of their sorrow
  - out of their grief
  lexicon: HALOT
  rationale: יָגוֹן denotes sorrow/grief. The preposition מִן can mark separation
    or transition away from a prior state. 'From their sorrow' is a close rendering
    that leaves the relation broad enough to cover movement out of sorrow.
