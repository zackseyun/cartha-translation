theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretation of בְּרֹאשׁ הַגּוֹיִם
  chosen_reading: among the chief of the nations
  alternative_readings:
  - at the head of the nations
  - over the chief of the nations
  rationale: The Hebrew is syntactically compressed and can suggest either Israel's prominence among the nations or a call to cry out publicly before them. The chosen rendering preserves the prominence idea without overstating a political supremacy claim. Alternatives are preserved in a footnote to maintain interpretive transparency.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
