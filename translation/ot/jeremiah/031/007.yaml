id: JER.31.7
reference: Jeremiah 31:7
source:
  edition: WLC
  text: כִּי כֹ֣ה אָמַ֣ר יְהוָ֗ה רָנּ֤וּ לְ/יַֽעֲקֹב֙ שִׂמְחָ֔ה וְ/צַהֲל֖וּ בְּ/רֹ֣אשׁ הַ/גּוֹיִ֑ם הַשְׁמִ֤יעוּ הַֽלְלוּ֙ וְ/אִמְר֔וּ הוֹשַׁ֤ע יְהוָה֙ אֶֽת עַמְּ/ךָ֔ אֵ֖ת שְׁאֵרִ֥ית יִשְׂרָאֵֽל־׀־׃
translation:
  text: 'For thus says Yahweh: Sing aloud with gladness for Jacob, and shout at the head of the nations; proclaim, praise, and say, “Save, Yahweh, your people, the remnant of Israel.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at the head of the nations” or “over the chief of the nations.” The Hebrew phrase is difficult and may emphasize Israel’s prominence among the nations or the public setting of the proclamation.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רָנּוּ
  chosen: Sing aloud
  alternatives:
  - Cry out
  - Shout for joy
  lexicon: HALOT
  rationale: The imperative calls for a loud jubilant vocal expression. 'Sing aloud' preserves the celebratory force and works naturally with the following noun 'gladness.'
- source_word: לְיַעֲקֹב
  chosen: for Jacob
  alternatives:
  - to Jacob
  - over Jacob
  lexicon: HALOT
  rationale: The preposition ל can mark direction or relation. In this context of rejoicing over restoration, 'for Jacob' best conveys celebratory concern for the people represented by the patriarchal name.
- source_word: שִׂמְחָה
  chosen: with gladness
  alternatives:
  - for joy
  - with joy
  lexicon: HALOT
  rationale: Used adverbially with the imperative. 'With gladness' is idiomatic and preserves the noun's sense without over-paraphrasing.
- source_word: וְצַהֲלוּ
  chosen: and shout
  alternatives:
  - and cry out
  - and exult
  lexicon: HALOT
  rationale: A second imperative intensifying the call to public rejoicing. 'Shout' is concise and fits the parallelism.
- source_word: בְּרֹאשׁ הַגּוֹיִם
  chosen: among the chief of the nations
  alternatives:
  - at the head of the nations
  - over the chief of the nations
  - because of the foremost of the nations
  lexicon: HALOT
  rationale: The phrase is difficult. Literally it is 'at/in the head of the nations.' Here it likely places Jacob/Israel in relation to the nations as prominent or foremost. 'Among the chief of the nations' preserves the comparative prominence without forcing a more interpretive nationalistic claim.
- source_word: הַשְׁמִיעוּ
  chosen: proclaim
  alternatives:
  - make it heard
  - announce
  lexicon: HALOT
  rationale: Hiphil imperative of שמע here means to cause something to be heard publicly. 'Proclaim' is natural modern English and retains public declaration.
- source_word: הַלְלוּ
  chosen: praise
  alternatives:
  - give praise
  - hallelujah
  lexicon: HALOT
  rationale: Imperative of הלל in a worshipful context. 'Praise' is the straightforward English equivalent.
- source_word: הוֹשַׁע
  chosen: Save
  alternatives:
  - Deliver
  - Grant salvation to
  lexicon: HALOT
  rationale: Imperative addressed to the LORD from ישׁע in the Hiphil. 'Save' is the most direct and theologically transparent rendering.
- source_word: עַמְּךָ
  chosen: your people
  lexicon: HALOT
  rationale: Straightforward covenantal designation; 'your people' preserves the relational force.
- source_word: שְׁאֵרִית יִשְׂרָאֵל
  chosen: the remnant of Israel
  alternatives:
  - the remainder of Israel
  lexicon: HALOT
  rationale: '''Remnant'' is the established and contextually important prophetic term, carrying both lexical and theological significance of a preserved surviving people.'
