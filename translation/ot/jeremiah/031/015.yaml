theological_decisions:
- issue: Referent and number in כִּי אֵינֶנּוּ after the collective 'her children'
  chosen_reading: 'Render idiomatically as plural: ''because they are no more.'''
  alternative_readings:
  - because he is no more
  - because they are gone
  rationale: The Hebrew uses a common idiom of nonexistence/absence with a singular form, but the immediate antecedent is the collective 'her children.' English requires an explicit number choice; plural best reflects the collective lament and avoids implying only one child is in view.
  doctrine_reference: Preserve theological tension rather than resolve it; here the issue is grammatical/poetic rather than doctrinal, so the main text follows the plain contextual sense while preserving alternatives in a footnote.
