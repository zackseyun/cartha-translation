id: JER.31.15
reference: Jeremiah 31:15
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה ק֣וֹל בְּ/רָמָ֤ה נִשְׁמָע֙ נְהִי֙ בְּכִ֣י תַמְרוּרִ֔ים רָחֵ֖ל מְבַכָּ֣ה עַל בָּנֶ֑י/הָ מֵאֲנָ֛ה לְ/הִנָּחֵ֥ם עַל בָּנֶ֖י/הָ כִּ֥י אֵינֶֽ/נּוּ׀־־׃ס
translation:
  text: 'Thus says Yahweh: “A voice is heard in Ramah, lamentation and bitter weeping—Rachel weeping for her children. She refuses to be comforted for her children, because they are no more.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because he is no more'; Hebrew has a singular form in this idiom, though the context speaks of Rachel's children collectively.
    reason: lexical_alternative
  - marker: b
    text: Ramah was a town associated with the territory of Benjamin; Rachel is poetically portrayed as the matriarch mourning her descendants.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in keeping with the DOCTRINE.md contested-terms table.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - So says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' preserves the formal prophetic cadence without becoming archaic beyond normal biblical English.
- source_word: קוֹל
  chosen: A voice
  alternatives:
  - A sound
  - A cry
  lexicon: HALOT
  rationale: קוֹל can denote voice, sound, or cry. 'A voice' fits the personified lament that follows and preserves the Hebrew image.
- source_word: בְּרָמָה
  chosen: in Ramah
  alternatives:
  - at Ramah
  lexicon: HALOT
  rationale: Locative preposition best rendered 'in' here; Ramah is retained as a transliterated place name.
- source_word: נִשְׁמָע
  chosen: is heard
  alternatives:
  - is being heard
  - has been heard
  lexicon: HALOT
  rationale: Passive participial/verbal form naturally rendered as present passive in English within the prophetic announcement.
- source_word: נְהִי
  chosen: lamentation
  alternatives:
  - wailing
  - dirge
  lexicon: HALOT
  rationale: Conveys formal mourning language; paired with the following terms for weeping.
- source_word: בְּכִי תַמְרוּרִים
  chosen: bitter weeping
  alternatives:
  - bitter crying
  - weeping of bitterness
  lexicon: HALOT
  rationale: Construct phrase intensified by plural abstract noun; 'bitter weeping' is idiomatic and preserves the emotional force.
- source_word: רָחֵל
  chosen: Rachel
  lexicon: HALOT
  rationale: Personal name transliterated per project philosophy. The matriarch is personified as mourning her descendants.
- source_word: מְבַכָּה עַל בָּנֶיהָ
  chosen: weeping for her children
  alternatives:
  - crying over her children
  lexicon: HALOT
  rationale: עַל with בכה here is naturally 'for/over.' 'For her children' reads smoothly and preserves the sense of mourning on their behalf.
- source_word: בָּנֶיהָ
  chosen: her children
  alternatives:
  - her sons
  lexicon: HALOT
  rationale: Although בנים can be 'sons,' in this context it functions collectively for descendants/offspring. 'Children' best conveys the representative sense in natural English.
- source_word: מֵאֲנָה
  chosen: She refuses
  alternatives:
  - She has refused
  - She is unwilling
  lexicon: HALOT
  rationale: The verb denotes refusal; present tense suits the vivid poetic scene.
- source_word: לְהִנָּחֵם
  chosen: to be comforted
  alternatives:
  - to accept comfort
  - to be consoled
  lexicon: HALOT
  rationale: Niphal infinitive of נחם here is passive/reflexive in sense; 'to be comforted' is the standard and clear rendering.
- source_word: כִּי אֵינֶנּוּ
  chosen: because they are no more
  alternatives:
  - because he is no more
  - because they are gone
  - for he is not
  lexicon: HALOT
  rationale: Though the pronominal form is morphologically singular, the expression after a collective reference to 'children' is idiomatically rendered in English as plural. 'Are no more' preserves the elegiac tone and the sense of loss/death/exile without over-specifying.
