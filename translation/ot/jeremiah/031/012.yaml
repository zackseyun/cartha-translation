id: JER.31.12
reference: Jeremiah 31:12
source:
  edition: WLC
  text: וּ/בָאוּ֮ וְ/רִנְּנ֣וּ בִ/מְרוֹם צִיּוֹן֒ וְ/נָהֲר֞וּ אֶל ט֣וּב יְהוָ֗ה עַל
    דָּגָן֙ וְ/עַל תִּירֹ֣שׁ וְ/עַל יִצְהָ֔ר וְ/עַל בְּנֵי צֹ֖אן וּ/בָקָ֑ר וְ/הָיְתָ֤ה
    נַפְשָׁ/ם֙ כְּ/גַ֣ן רָוֶ֔ה וְ/לֹא יוֹסִ֥יפוּ לְ/דַאֲבָ֖ה עֽוֹד־־־־־־־־׃
translation:
  text: They will come and shout for joy on the height of Zion, and they will stream
    to the goodness of the LORD—to grain, new wine, fresh oil, and to the young of
    the flock and the herd. Their life will be like a well-watered garden, and they
    will never again waste away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the bounty of the LORD.' The Hebrew 'goodness' here includes the
      good things he provides, as the following list shows.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will flow to the goodness of the LORD.' The Hebrew verb can picture
      a flowing movement toward Zion's blessings.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'their soul.' Here it refers to their life or whole self, not only
      the immaterial aspect of a person.
    reason: lexical_alternative
  - marker: d
    text: Or 'they will sorrow no more' / 'they will no longer languish.' The Hebrew
      expression can denote grief that causes one to pine away.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאוּ
  chosen: They will come
  alternatives:
  - And they will come
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    futurally in context; simple future English best fits the promise sequence.
- source_word: וְרִנְּנוּ
  chosen: shout for joy
  alternatives:
  - sing aloud
  - cry out
  lexicon: HALOT
  rationale: רנן commonly denotes jubilant vocal rejoicing. 'Shout for joy' is natural
    modern English and preserves the exuberant sense better than the more ambiguous
    'cry out.'
- source_word: בִמְרוֹם צִיּוֹן
  chosen: on the height of Zion
  alternatives:
  - in the height of Zion
  - on the heights of Zion
  lexicon: HALOT
  rationale: מָרוֹם is singular here, referring to Zion's elevated place. 'On the
    height of Zion' is a close but readable rendering.
- source_word: וְנָהֲרוּ
  chosen: they will stream
  alternatives:
  - they will flow
  - they will be radiant
  lexicon: HALOT
  rationale: The verb נהר in this stem commonly conveys flowing/streaming toward something;
    in this context of movement toward the LORD's bounty, 'stream' fits better than
    'be radiant.'
- source_word: אֶל טוּב יְהוָה
  chosen: to the goodness of the LORD
  alternatives:
  - to the bounty of the LORD
  - to the good things of the LORD
  lexicon: HALOT
  rationale: טוּב can denote goodness in the sense of bounty or beneficence. 'Goodness
    of the LORD' preserves the theological source of the blessings while allowing
    the following list to explicate that goodness materially.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: עַל דָּגָן וְעַל תִּירֹשׁ וְעַל יִצְהָר
  chosen: to grain, new wine, fresh oil
  alternatives:
  - over grain, new wine, and oil
  - for grain, new wine, and olive oil
  lexicon: HALOT
  rationale: The repeated עַל after נהרוּ is idiomatic and points to the objects of
    the LORD's bounty. 'New wine' is standard for תִּירוֹשׁ; יִצְהָר refers specifically
    to fresh olive oil, but 'fresh oil' keeps the triad concise while preserving the
    produce sense.
- source_word: בְּנֵי צֹאן וּבָקָר
  chosen: the young of the flock and the herd
  alternatives:
  - lambs and calves
  - flocks and herds
  lexicon: HALOT
  rationale: בְּנֵי literally 'sons/young ones of' with flock and cattle points to
    offspring rather than the animals generically. 'Young of the flock and the herd'
    preserves that nuance without over-specifying species.
- source_word: וְהָיְתָה נַפְשָׁם
  chosen: Their life will be
  alternatives:
  - Their soul will be
  - They themselves will be
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the person's animating life/self rather than an
    abstract immaterial soul. 'Their life' communicates the holistic Hebrew sense
    in idiomatic English.
- source_word: כְּגַן רָוֶה
  chosen: like a well-watered garden
  alternatives:
  - like a watered garden
  - like a saturated garden
  lexicon: HALOT
  rationale: רָוֶה denotes being watered fully or abundantly. 'Well-watered garden'
    is idiomatic and evokes flourishing abundance.
- source_word: וְלֹא יוֹסִיפוּ לְדַאֲבָה עוֹד
  chosen: and they will never again waste away
  alternatives:
  - and they will sorrow no more
  - and they will never again languish
  - and they will not continue to grieve anymore
  lexicon: HALOT
  rationale: The construction 'not add again to...' means 'no longer continue' or
    'never again.' דָּאַב conveys pining, languishing, or wasting away from grief.
    'Waste away' captures the embodied misery implied by the agricultural abundance
    contrast.
