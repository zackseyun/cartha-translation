id: JER.31.14
reference: Jeremiah 31:14
source:
  edition: WLC
  text: וְ/רִוֵּיתִ֛י נֶ֥פֶשׁ הַ/כֹּהֲנִ֖ים דָּ֑שֶׁן וְ/עַמִּ֛/י אֶת טוּבִ֥/י יִשְׂבָּ֖עוּ נְאֻם יְהוָֽה־־׃ס
translation:
  text: I will satisfy the priests with abundance, and my people will be filled with my goodness, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the soul/appetite of the priests' with an idiom of full satisfaction.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will satisfy the priests with fatness'—that is, with rich abundance.
    reason: lexical_alternative
  - marker: c
    text: Or 'my people will be satisfied with my bounty' or 'with my good things.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרִוֵּיתִי
  chosen: I will satisfy
  alternatives:
  - I will drench
  - I will saturate
  - I will refresh
  lexicon: HALOT
  rationale: The Piel of רוה conveys causing to drink one's fill or satisfying fully. In English, 'satisfy' best captures the idiomatic sense in context of abundant provision, avoiding an overly literal image ('drench/saturate') that could sound awkward with 'the priests' appetite/life'.
- source_word: נֶפֶשׁ
  chosen: the priests
  alternatives:
  - the life of the priests
  - the appetite of the priests
  - the soul of the priests
  lexicon: HALOT
  rationale: נפש here functions idiomatically for the inner life/appetite/person. English normally does not say 'satisfy the soul of the priests' in this provisioning context. The sense is adequately represented by making 'the priests' the direct object, while the fuller nuance is preserved in alternatives.
- source_word: דָּשֶׁן
  chosen: with abundance
  alternatives:
  - with fatness
  - with rich food
  - with richness
  lexicon: HALOT
  rationale: דשן literally denotes fatness/richness and by extension abundance or rich provision. 'With abundance' communicates the metaphor naturally in modern English without losing the idea of lavish plenty. 'Fatness' is more literal but less idiomatic for contemporary readers.
- source_word: וְעַמִּי
  chosen: and my people
  lexicon: HALOT
  rationale: 'Straightforward covenantal possessive: ''my people.'''
- source_word: אֶת־טוּבִי
  chosen: with my goodness
  alternatives:
  - with my bounty
  - with my good things
  - on my goodness
  lexicon: HALOT
  rationale: טוב can denote goodness, bounty, or good things. Because the verb 'be filled' can take either the abstract source ('goodness') or concrete provision ('good things'), 'my goodness' preserves both divine beneficence and material blessing. The preposition 'with' is supplied idiomatically in English.
- source_word: יִשְׂבָּעוּ
  chosen: will be filled
  alternatives:
  - will be satisfied
  - will have their fill
  lexicon: HALOT
  rationale: The verb means to be sated/satisfied. 'Will be filled' pairs naturally with 'with my goodness' and echoes the abundance motif. 'Will be satisfied' is also possible, but using 'filled' avoids repetition after 'I will satisfy' in the first colon while preserving the semantic field.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. Per doctrine, יְהוָה is rendered 'the LORD.' 'Declares' is a natural English equivalent for נְאֻם in prophetic speech.
