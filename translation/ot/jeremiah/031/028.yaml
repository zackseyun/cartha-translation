id: JER.31.28
reference: Jeremiah 31:28
source:
  edition: WLC
  text: וְ/הָיָ֞ה כַּ/אֲשֶׁ֧ר שָׁקַ֣דְתִּי עֲלֵי/הֶ֗ם לִ/נְת֧וֹשׁ וְ/לִ/נְת֛וֹץ וְ/לַ/הֲרֹ֖ס
    וּ/לְ/הַאֲבִ֣יד וּ/לְ/הָרֵ֑עַ כֵּ֣ן אֶשְׁקֹ֧ד עֲלֵי/הֶ֛ם לִ/בְנ֥וֹת וְ/לִ/נְט֖וֹעַ
    נְאֻם יְהוָֽה־׃
translation:
  text: And it shall be that, just as I watched over them to uproot and to tear down
    and to overthrow and to destroy and to bring harm, so I will watch over them to
    build and to plant, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to bring disaster.' The Hebrew verb can denote causing calamity or harm
      in judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will happen
  - And it shall come to pass
  lexicon: HALOT
  rationale: Uses a natural but still formal future-introductory formula for היה in
    prophetic discourse, preserving the forward-looking transition without archaic
    excess.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Marks the explicit comparison between past judgment and future restoration.
- source_word: שָׁקַדְתִּי / אֶשְׁקֹד
  chosen: watched over / will watch over
  alternatives:
  - was vigilant over / will be vigilant over
  - kept watch over / will keep watch over
  lexicon: HALOT
  rationale: שׁקד here conveys vigilant attentiveness, not mere observation. 'Watch
    over' preserves the deliberate divine oversight in both judgment and restoration
    and echoes Jeremiah's usage elsewhere.
- source_word: עֲלֵיהֶם
  chosen: over them
  alternatives:
  - concerning them
  - against them
  lexicon: HALOT
  rationale: With שׁקד, the preposition naturally yields 'watch over.' In the first
    half the oversight results in judgment; in the second, in restoration. 'Over them'
    preserves the parallelism.
- source_word: לִנְתוֹשׁ
  chosen: to uproot
  alternatives:
  - to pluck up
  lexicon: HALOT
  rationale: A vivid agricultural metaphor common in Jeremiah. 'Uproot' is more idiomatic
    in modern English while preserving the image.
- source_word: וְלִנְתּוֹץ
  chosen: to tear down
  alternatives:
  - to break down
  - to pull down
  lexicon: HALOT
  rationale: Fits the sequence of destructive verbs and is natural modern English.
- source_word: וְלַהֲרֹס
  chosen: to overthrow
  alternatives:
  - to demolish
  - to destroy
  lexicon: HALOT
  rationale: Chosen to preserve distinction from the following הַאֲבִיד, which more
    directly means 'destroy/perish.' 'Overthrow' keeps the cumulative rhetoric without
    collapsing terms.
- source_word: וּלְהַאֲבִיד
  chosen: to destroy
  alternatives:
  - to make perish
  - to cause to perish
  lexicon: HALOT
  rationale: A standard rendering for אבד in the causative stem here; concise and
    clear.
- source_word: וּלְהָרֵעַ
  chosen: to bring harm
  alternatives:
  - to afflict
  - to do evil
  lexicon: HALOT
  rationale: The verb can mean to cause evil/disaster. 'Bring harm' communicates inflicted
    calamity without suggesting moral evil in God; it fits the judgment context and
    readable modern English.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Maintains the direct correspondence between the two halves of the verse.
- source_word: לִבְנוֹת
  chosen: to build
  lexicon: HALOT
  rationale: Standard rendering; preserves the restoration motif paired with planting.
- source_word: וְלִנְטוֹעַ
  chosen: to plant
  lexicon: HALOT
  rationale: Keeps the agricultural restoration imagery and balances 'uproot' earlier
    in the verse.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic, weighty,
    and consistent with rendering יְהוָה as 'the LORD' per doctrine guidance.
