theological_decisions:
- issue: Rendering of the restoration metaphor in a way that does not over-interpret
  chosen_reading: 'Maintain the literal sowing metaphor: ''I will sow the house of Israel and the house of Judah with the seed of man and the seed of beast.'''
  alternative_readings:
  - I will repopulate Israel and Judah with people and animals
  - I will plant Israel and Judah with human and animal offspring
  rationale: The verse uses an agricultural metaphor for restoration and repopulation. A more dynamic rendering would communicate the sense but flatten the imagery and intertextual resonance with sowing/planting language in Jeremiah. The chosen wording preserves both the metaphor and the meaning without importing extra theological claims.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Generic אדם
  chosen_reading: Render אדם as 'man' in the phrase 'seed of man' while preserving its generic sense in a footnote.
  alternative_readings:
  - humankind
  - humanity
  rationale: The doctrine calls for gender-accurate rendering matching the source's intent. Here אדם is generic humanity, not male-specific. 'Man' best preserves the Hebrew collocation and contrast with 'beast,' while a footnote can clarify the generic force for modern readers.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
