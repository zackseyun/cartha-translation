id: JER.31.27
reference: Jeremiah 31:27
source:
  edition: WLC
  text: הִנֵּ֛ה יָמִ֥ים בָּאִ֖ים נְאֻם יְהוָ֑ה וְ/זָרַעְתִּ֗י אֶת בֵּ֤ית יִשְׂרָאֵל֙ וְ/אֶת בֵּ֣ית יְהוּדָ֔ה זֶ֥רַע אָדָ֖ם וְ/זֶ֥רַע בְּהֵמָֽה־־־׃
translation:
  text: Behold, days are coming, declares Yahweh, when I will sow the house of Israel and the house of Judah with the seed of man and the seed of beast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'seed of man,' that is, human offspring or humankind; the phrase is paired with 'seed of beast' to describe repopulation with both people and livestock.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic deictic force introducing an oracle. 'Behold' is slightly formal but still natural in prophetic discourse and preserves the marked attention signal better than a flatter 'Look' or omitted rendering.
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are on the way
  lexicon: HALOT
  rationale: A standard prophetic future formula. Rendered idiomatically in English as 'days are coming' without adding the article, which is not present in Hebrew.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: '''Declares the LORD'' is a clear, contemporary rendering of the prophetic speech formula. YHWH is rendered ''the LORD'' per doctrine.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal reference while aligning with established English convention.
- source_word: וְזָרַעְתִּי
  chosen: I will sow
  alternatives:
  - I will plant
  - I will seed
  lexicon: HALOT
  rationale: The verb זרע literally means 'to sow.' In this restoration context the agricultural metaphor is important and should be preserved rather than generalized to 'plant.'
- source_word: בֵּית יִשְׂרָאֵל ... בֵּית יְהוּדָה
  chosen: the house of Israel and the house of Judah
  alternatives:
  - Israel and Judah
  - the household of Israel and the household of Judah
  lexicon: HALOT
  rationale: Keeps the covenantal-corporate expression 'house of' rather than reducing it to the bare proper names. This preserves the collective sense of the people.
- source_word: זֶרַע אָדָם
  chosen: the seed of man
  alternatives:
  - human seed
  - people
  lexicon: HALOT
  rationale: The Hebrew is literally 'seed of man/humankind.' 'Seed of man' preserves the agricultural metaphor and the lexical pairing with 'seed of beast.' Because אדם here denotes humanity generically, 'man' is used in the representative sense in line with the project's gender-accurate policy.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  lexicon: HALOT
  rationale: Here אדם is generic rather than referring to an individual male. 'Man' preserves the Hebrew's representative singular and the idiomatic pairing with 'beast,' though the generic sense is worth noting.
- source_word: וְזֶרַע בְּהֵמָה
  chosen: and the seed of beast
  alternatives:
  - and animal seed
  - and the seed of animals
  lexicon: HALOT
  rationale: Preserves the parallelism and metaphor of repopulation with both humans and livestock. Singular 'beast' reflects the collective singular in Hebrew.
