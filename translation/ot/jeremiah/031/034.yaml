theological_decisions:
- issue: Nature of 'know' in covenant context
  chosen_reading: Retain 'know' as relational-covenantal knowledge without expanding it to mere cognition or saving knowledge terminology.
  alternative_readings:
  - acknowledge
  - have knowledge of
  - be in saving relationship with
  rationale: The Hebrew ידע in this context carries relational covenant force, but the translation should preserve the theological tension rather than resolve it into a narrower doctrinal formula. 'Know me' is faithful and sufficiently rich.
  doctrine_reference: Translation philosophy §3
- issue: Gendered distributive language
  chosen_reading: Render אִישׁ as 'each man' in both occurrences.
  alternative_readings:
  - each one
  - everyone
  rationale: The source text uses grammatically masculine distributive singular forms. Per doctrine, gender-accurate rendering is preferred where representative/generic force is present, rather than neutralizing the form in the main text.
  doctrine_reference: Translation philosophy §4
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
