id: JER.31.34
reference: Jeremiah 31:34
source:
  edition: WLC
  text: וְ/לֹ֧א יְלַמְּד֣וּ ע֗וֹד אִ֣ישׁ אֶת רֵעֵ֜/הוּ וְ/אִ֤ישׁ אֶת אָחִי/ו֙ לֵ/אמֹ֔ר דְּע֖וּ אֶת יְהוָ֑ה כִּֽי כוּלָּ/ם֩ יֵדְע֨וּ אוֹתִ֜/י לְ/מִ/קְטַנָּ֤/ם וְ/עַד גְּדוֹלָ/ם֙ נְאֻם יְהוָ֔ה כִּ֤י אֶסְלַח֙ לַֽ/עֲוֺנָ֔/ם וּ/לְ/חַטָּאתָ֖/ם לֹ֥א אֶזְכָּר עֽוֹד־־־־־־־׃ס
translation:
  text: And they will no longer teach, each man his neighbor and each man his brother, saying, ‘Know Yahweh,’ for they will all know me, from the least of them to the greatest of them, declares Yahweh. For I will forgive their iniquity, and I will remember their sin no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''each man his neighbor and each man his brother.'' The masculine singular form is used distributively for members of the covenant community.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from the least of them to the greatest of them.'
    reason: lexical_alternative
  - marker: c
    text: '''the LORD'' renders the divine name YHWH; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יְלַמְּדוּ
  chosen: they will ... teach
  alternatives:
  - they shall ... teach
  - they will instruct
  lexicon: HALOT
  rationale: Piel imperfect of למד commonly means 'teach/instruct.' 'Teach' is the most direct and natural English rendering here.
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - again
  - any more
  lexicon: HALOT
  rationale: 'With negation, עוֹד idiomatically means cessation of a prior pattern: ''no longer'' or ''no more.'' ''No longer'' fits the first clause smoothly in modern English.'
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - a man
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular used distributively. Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral language. 'Each man' preserves the form and distributive sense.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his companion
  - his friend
  lexicon: HALOT
  rationale: רֵעַ can denote neighbor, companion, or associate. In this covenant-community context, 'neighbor' best preserves the interpersonal and communal sense without narrowing to friendship.
- source_word: אָחִיו
  chosen: his brother
  alternatives:
  - his kinsman
  - his fellow Israelite
  lexicon: HALOT
  rationale: אָח literally means 'brother' and can extend to covenant kin. 'Brother' preserves the familial/covenantal force and matches the Hebrew wording most closely.
- source_word: דְּעוּ
  chosen: Know
  alternatives:
  - Come to know
  - Acknowledge
  lexicon: HALOT
  rationale: Imperative plural of ידע. 'Know' is the straightforward rendering and preserves the covenantal-relational depth of the verb without overinterpreting it.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יֵדְעוּ אֹתִי
  chosen: they will all know me
  alternatives:
  - they will all acknowledge me
  - they will all know who I am
  lexicon: HALOT
  rationale: ידע with personal object commonly expresses relational knowledge, not mere cognition. 'Know me' preserves this theological depth while remaining literal.
- source_word: לְמִקְטַנָּם וְעַד גְּדוֹלָם
  chosen: from their least to their greatest
  alternatives:
  - from the least of them to the greatest of them
  - from their smallest to their greatest
  lexicon: HALOT
  rationale: The phrase is a merism indicating the whole community across status/age significance. 'From their least to their greatest' is concise and natural while preserving the possessive suffixes.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Declares the LORD' is idiomatic modern English and preserves the solemn prophetic force better than the more technical 'oracle of the LORD.'
- source_word: אֶסְלַח
  chosen: I will forgive
  alternatives:
  - I will pardon
  lexicon: HALOT
  rationale: סלח is the standard verb for divine forgiveness. 'Forgive' is the clearest and most common English equivalent.
- source_word: עֲוֺנָם
  chosen: their iniquity
  alternatives:
  - their guilt
  - their wrongdoing
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt. Here it refers to moral offense before God. 'Iniquity' preserves the weight of the term and distinguishes it from the following חטאת.
- source_word: חַטָּאתָם
  chosen: their sin
  alternatives:
  - their sins
  - their offense
  lexicon: HALOT
  rationale: Though the noun can be singular or collective, the suffix-marked form here functions collectively. 'Their sin' preserves the singular collective sense and parallels 'their iniquity' well.
- source_word: לֹא אֶזְכָּר עוֹד
  chosen: I will remember ... no more
  alternatives:
  - I will no longer remember
  - I will not call to mind again
  lexicon: HALOT
  rationale: זכר with negation and עוֹד expresses decisive non-remembrance. 'I will remember their sin no more' is both faithful and idiomatic, and it preserves the covenantal-forensic force of the promise.
