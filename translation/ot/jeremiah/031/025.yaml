theological_decisions:
- issue: Anthropological sense of נֶפֶשׁ
  chosen_reading: Rendered as 'soul' in both occurrences
  alternative_readings:
  - person
  - self
  - life
  rationale: The verse is poetic and speaks of Yahweh's restoration of the whole inner
    person. 'Soul' preserves the literary and theological resonance without asserting
    a technical doctrine of the soul beyond what the Hebrew warrants.
  doctrine_reference: Translation philosophy §1, §6
- issue: Aspect of the perfect verbs
  chosen_reading: Rendered with English present perfect ('I have satisfied ... I have
    filled')
  alternative_readings:
  - simple past ('I satisfied ... I filled')
  - prophetic future sense in context
  rationale: The Hebrew perfects can express completed action or assured divine action
    in prophetic discourse. The present perfect preserves the form while fitting the
    immediate context of divine promise without over-interpreting the tense.
  doctrine_reference: Translation philosophy §1, §3
