id: JER.31.25
reference: Jeremiah 31:25
source:
  edition: WLC
  text: כִּ֥י הִרְוֵ֖יתִי נֶ֣פֶשׁ עֲיֵפָ֑ה וְ/כָל נֶ֥פֶשׁ דָּאֲבָ֖ה מִלֵּֽאתִי־׃
translation:
  text: For I have satisfied the weary soul, and every languishing soul I have filled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'refreshed' for 'satisfied'; the Hebrew verb literally carries the sense
      of giving drink in abundance.
    reason: lexical_alternative
  - marker: b
    text: Or 'every sorrowful soul' or 'every grieving soul' for 'every languishing
      soul.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the surrounding promise. 'For'
    preserves the connective force naturally in English.
- source_word: הִרְוֵיתִי
  chosen: I have satisfied
  alternatives:
  - I have refreshed
  - I have satiated
  lexicon: HALOT
  rationale: From רוה in the Hiphil, conveying causing to drink one's fill, hence
    satisfying or refreshing abundantly. 'Satisfied' fits the metaphor and pairs well
    with the following 'filled' without becoming overly literal.
- source_word: נֶפֶשׁ
  chosen: soul
  alternatives:
  - person
  - life
  - self
  lexicon: HALOT
  rationale: נֶפֶשׁ here denotes the inner life/person as the object of divine restoration.
    'Soul' preserves the anthropological weight and poetic register better than the
    flatter 'person,' while not requiring a dualistic reading.
- source_word: עֲיֵפָה
  chosen: weary
  alternatives:
  - faint
  - exhausted
  lexicon: HALOT
  rationale: Describes one who is worn out or faint from exhaustion. 'Weary' is idiomatic
    and preserves the emotional and physical breadth of the Hebrew.
- source_word: וְכָל
  chosen: and every
  alternatives:
  - and each
  - even every
  lexicon: HALOT
  rationale: Simple conjunctive plus distributive quantifier. 'And every' is the most
    natural rendering.
- source_word: נֶפֶשׁ
  chosen: soul
  alternatives:
  - person
  - life
  - self
  lexicon: HALOT
  rationale: Repeated for poetic parallelism; rendered consistently as 'soul' to preserve
    the structure and emphasis of the Hebrew.
- source_word: דָּאֲבָה
  chosen: languishing
  alternatives:
  - sorrowful
  - grieving
  - faint
  lexicon: HALOT
  rationale: From דָּאַב, expressing pining, languishing, or being sorrow-stricken.
    'Languishing' best matches the parallel with 'weary' and the restoration imagery,
    while avoiding over-specification to emotional grief alone.
- source_word: מִלֵּאתִי
  chosen: I have filled
  alternatives:
  - I have replenished
  - I have made full
  lexicon: HALOT
  rationale: From מלא in the Piel, 'to fill, make full.' 'Filled' preserves the concrete
    metaphor of abundance and complements 'satisfied' in the first colon.
