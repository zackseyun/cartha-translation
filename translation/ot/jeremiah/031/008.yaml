id: JER.31.8
reference: Jeremiah 31:8
source:
  edition: WLC
  text: הִנְ/נִי֩ מֵבִ֨יא אוֹתָ֜/ם מֵ/אֶ֣רֶץ צָפ֗וֹן וְ/קִבַּצְתִּי/ם֮ מִ/יַּרְכְּתֵי
    אָרֶץ֒ בָּ֚/ם עִוֵּ֣ר וּ/פִסֵּ֔חַ הָרָ֥ה וְ/יֹלֶ֖דֶת יַחְדָּ֑ו קָהָ֥ל גָּד֖וֹל
    יָשׁ֥וּבוּ הֵֽנָּה־׃
translation:
  text: Behold, I am bringing them from the land of the north, and I will gather them
    from the farthest parts of the earth. Among them are the blind and the lame, the
    pregnant woman and the woman in labor, together; a great assembly will return
    here.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the farthest parts of the land'; Hebrew אֶרֶץ can mean either 'earth'
      or 'land' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic attention-getter with elevated but still understandable
    English. 'Behold' best matches the solemn deictic force in prophetic discourse.
- source_word: מֵבִיא
  chosen: I am bringing
  alternatives:
  - I bring
  - I will bring
  lexicon: HALOT
  rationale: The participle with הִנְנִי often conveys imminent or certain action.
    'I am bringing' preserves the vividness better than a simple future while remaining
    natural in English.
- source_word: מֵאֶרֶץ צָפוֹן
  chosen: from the land of the north
  alternatives:
  - from the north country
  - from the northern land
  lexicon: HALOT
  rationale: A relatively formal rendering that preserves the geographic expression
    without overinterpreting whether it is strictly Babylon or a broader northern
    region.
- source_word: וְקִבַּצְתִּים
  chosen: and I will gather them
  alternatives:
  - and gather them
  - and I will collect them
  lexicon: HALOT
  rationale: Common covenant-restoration language in Jeremiah. 'Gather' is the standard
    and theologically resonant rendering for divine regathering.
- source_word: מִיַּרְכְּתֵי אָרֶץ
  chosen: from the farthest parts of the earth
  alternatives:
  - from the remotest parts of the earth
  - from the ends of the earth
  lexicon: HALOT
  rationale: יַרְכְּתֵי denotes remote extremities or recesses. 'Farthest parts' captures
    the idiom clearly. 'Ends of the earth' is possible but can sound more idiomatic
    than the Hebrew's more concrete 'remote parts.'
- source_word: בָּם
  chosen: Among them are
  alternatives:
  - with them are
  - in them are
  lexicon: HALOT
  rationale: Introduces the composition of the returning group. 'Among them are' is
    idiomatic English and reflects inclusion within the gathered people.
- source_word: עִוֵּר וּפִסֵּחַ
  chosen: the blind and the lame
  alternatives:
  - blind and lame people
  lexicon: HALOT
  rationale: Keeps the Hebrew pair concise and recognizable, highlighting that the
    restored community includes the vulnerable.
- source_word: הָרָה וְיֹלֶדֶת
  chosen: the pregnant woman and the woman in labor
  alternatives:
  - the pregnant and the one giving birth
  - the expectant mother and the woman giving birth
  lexicon: HALOT
  rationale: Makes explicit the feminine singular forms as representative members
    of the group. 'Woman in labor' naturally conveys the participial sense of one
    giving birth.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: Preserves the adverb's emphasis on collective return without adding unnecessary
    wording.
- source_word: קָהָל גָּדוֹל
  chosen: a great assembly
  alternatives:
  - a great congregation
  - a great company
  lexicon: HALOT
  rationale: '''Assembly'' is clear modern English and preserves the corporate sense
    without importing later ecclesiastical associations too strongly.'
- source_word: יָשׁוּבוּ הֵנָּה
  chosen: will return here
  alternatives:
  - shall come back here
  - will return hither
  lexicon: HALOT
  rationale: הֵנָּה is directional, 'to here.' 'Will return here' is natural modern
    English and preserves the destination emphasis.
