theological_decisions:
- issue: Representation of the restored remnant as including the vulnerable
  chosen_reading: The verse explicitly includes the blind, the lame, pregnant women,
    and women in labor within the returning people.
  alternative_readings:
  - The list is merely rhetorical for a large crowd
  rationale: The wording presents these groups as genuinely part of the restored community,
    underscoring divine mercy and comprehensiveness without requiring further doctrinal
    expansion.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Scope of 'earth' in מִיַּרְכְּתֵי אָרֶץ
  chosen_reading: 'Rendered as a broad geographic expression: ''the farthest parts
    of the earth.'''
  alternative_readings:
  - the farthest parts of the land
  rationale: Although אֶרֶץ can mean 'land,' the context of worldwide regathering
    language in restoration oracles supports the broader sense here; the alternative
    is preserved in a footnote because the Hebrew term itself can bear either sense
    depending on context.
  doctrine_reference: Original-language primacy over translation tradition
