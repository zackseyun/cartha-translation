id: JER.31.38
reference: Jeremiah 31:38
source:
  edition: WLC
  text: הִנֵּ֛ה יָמִ֥ים נְאֻם יְהוָ֑ה וְ/נִבְנְתָ֤ה הָ/עִיר֙ לַֽ/יהוָ֔ה מִ/מִּגְדַּ֥ל חֲנַנְאֵ֖ל שַׁ֥עַר הַ/פִּנָּֽה־׃
translation:
  text: Behold, days are coming, declares Yahweh, when the city will be rebuilt for Yahweh, from the Tower of Hananel to the Corner Gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be built'; the Hebrew passive can denote either building or rebuilding, though the restoration context favors 'rebuilt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic deictic force introducing an important announcement. 'Behold' is slightly elevated but still natural in prophetic discourse and preserves the solemnity better than 'Look.'
- source_word: יָמִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are on the way
  lexicon: HALOT
  rationale: In combination with הִנֵּה and the prophetic formula, this idiom announces a future time. English requires expansion to a verbal clause for naturalness.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic speech formula. 'Declares' captures the formal, authoritative force of נְאֻם better than the flatter 'says.' 'the LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְנִבְנְתָה
  chosen: will be rebuilt
  alternatives:
  - will be built
  - shall be rebuilt
  lexicon: HALOT
  rationale: The Niphal form is naturally rendered as passive/reflexive. In context of Jerusalem's restoration, 'rebuilt' better conveys restoration rather than first construction.
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - the city of Jerusalem
  lexicon: HALOT
  rationale: The Hebrew says simply 'the city.' Since Jerusalem is contextually obvious but not explicit here, the translation preserves the noun without expansion.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - to the LORD
  - for Yahweh
  lexicon: HALOT
  rationale: 'The lamed here most naturally expresses dedication or belonging: the rebuilt city is for the LORD. ''To the LORD'' is possible, but ''for'' reads more naturally in English while preserving consecratory sense.'
- source_word: מִמִּגְדַּל חֲנַנְאֵל
  chosen: from the Tower of Hananel
  alternatives:
  - from Hananel Tower
  lexicon: HALOT
  rationale: מִן marks the starting point of the city's measured extent. The construct phrase is rendered in standard English order while transliterating the proper name.
- source_word: שַׁעַר הַפִּנָּה
  chosen: to the Corner Gate
  alternatives:
  - to the gate of the corner
  - to the Cornergate
  lexicon: HALOT
  rationale: The phrase names a city gate. Although the preposition 'to' is not repeated in Hebrew, English idiom supplies it to complete the range begun by 'from.' 'Corner Gate' is the conventional and clear rendering of the construct phrase.
