id: JER.31.5
reference: Jeremiah 31:5
source:
  edition: WLC
  text: ע֚וֹד תִּטְּעִ֣י כְרָמִ֔ים בְּ/הָרֵ֖י שֹֽׁמְר֑וֹן נָטְע֥וּ נֹטְעִ֖ים וְ/חִלֵּֽלוּ׃
translation:
  text: Again you will plant vineyards on the mountains of Samaria; planters will
    plant and will enjoy their fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and will make them common,' an idiom referring to using
      or enjoying the vineyard's produce in ordinary use.
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹד
  chosen: Again
  alternatives:
  - Still
  - Yet again
  - Once more
  lexicon: HALOT
  rationale: In this restoration context, עוֹד signals renewed future action. 'Again'
    is concise and idiomatic in English, capturing the sense of resumption.
- source_word: תִּטְּעִי
  chosen: you will plant
  alternatives:
  - you shall plant
  lexicon: HALOT
  rationale: Qal imperfect 2fs indicates future action addressed to a feminine singular
    addressee, likely personified Israel/Zion. English does not preserve the feminine
    form naturally here, so the future sense is carried by 'will plant'.
- source_word: כְרָמִים
  chosen: vineyards
  alternatives:
  - vine plots
  lexicon: HALOT
  rationale: Standard rendering for כרמים; it fits both the agricultural image and
    the restoration theme.
- source_word: בְּהָרֵי שֹׁמְרוֹן
  chosen: on the mountains of Samaria
  alternatives:
  - in the hills of Samaria
  - on the hills of Samaria
  lexicon: HALOT
  rationale: הרים is most basically 'mountains,' though 'hills' is possible idiomatically.
    'Mountains of Samaria' preserves the Hebrew image more formally while remaining
    natural.
- source_word: נָטְעוּ נֹטְעִים
  chosen: planters will plant
  alternatives:
  - those who plant will plant
  - the planters have planted
  lexicon: HALOT
  rationale: The collocation of perfect + participle from the same root is somewhat
    emphatic or vivid. In context it points to the certainty of future restoration
    rather than a past action, so 'planters will plant' preserves the repetition and
    forward-looking sense.
- source_word: וְחִלֵּלוּ
  chosen: and will enjoy their fruit
  alternatives:
  - and will profane
  - and will begin to use
  - and will treat as common
  lexicon: HALOT
  rationale: In vineyard/agricultural context, חלל in the piel can refer to making
    common for ordinary use, i.e., enjoying produce after the period in which it was
    not to be eaten. 'Will enjoy their fruit' communicates the idiomatic sense in
    clear modern English. A more literal rendering like 'profane' would mislead readers
    in this context.
