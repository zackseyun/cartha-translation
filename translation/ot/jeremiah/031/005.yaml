theological_decisions:
- issue: Addressee of the feminine singular verb
  chosen_reading: The verse addresses personified Israel/Zion as a feminine singular,
    rendered simply as 'you' in English.
  alternative_readings:
  - A more explicit rendering naming 'Virgin Israel' from the previous verse as the
    addressee
  rationale: The Hebrew grammar points back to the feminine personification in the
    immediate context, but English style does not require repeating the explicit title
    in this verse. The translation preserves the direct address without over-specifying
    beyond the verse itself.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sense of וְחִלֵּלוּ in agricultural context
  chosen_reading: 'Idiomatic agricultural sense: the planters will enjoy/use the vineyard''s
    produce.'
  alternative_readings:
  - Literal cultic-sounding 'and profane them'
  rationale: The context is restoration and normal agricultural life, not ritual desecration.
    The idiom refers to bringing the produce into ordinary enjoyment/use. This preserves
    the plain sense rather than importing a misleading theological nuance from the
    more common 'profane' gloss.
  doctrine_reference: Translation philosophy §1, §6
