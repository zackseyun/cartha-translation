theological_decisions:
- issue: Meaning of בָּעַלְתִּי בָם in the covenant formula
  chosen_reading: though I was their husband
  alternative_readings:
  - though I was lord over them
  - though I ruled over them
  rationale: The Hebrew Masoretic Text naturally supports a marital metaphor, which
    coheres with prophetic covenant imagery. Because this clause is textually and
    interpretively significant, the dominion-oriented alternative is preserved in
    a footnote rather than resolved silently. This also alerts readers to the well-known
    difference from the wording reflected in Hebrews 8:9.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it); Contested terms table for יְהוָה
