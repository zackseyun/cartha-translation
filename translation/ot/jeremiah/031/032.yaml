id: JER.31.32
reference: Jeremiah 31:32
source:
  edition: WLC
  text: לֹ֣א כַ/בְּרִ֗ית אֲשֶׁ֤ר כָּרַ֨תִּי֙ אֶת אֲבוֹתָ֔/ם בְּ/יוֹם֙ הֶחֱזִיקִ֣/י
    בְ/יָדָ֔/ם לְ/הוֹצִיאָ֖/ם מֵ/אֶ֖רֶץ מִצְרָ֑יִם אֲשֶׁר הֵ֜מָּה הֵפֵ֣רוּ אֶת בְּרִיתִ֗/י
    וְ/אָנֹכִ֛י בָּעַ֥לְתִּי בָ֖/ם נְאֻם יְהוָֽה־־־־׃
translation:
  text: not like the covenant that I made with their fathers on the day I took them
    by the hand to bring them out of the land of Egypt—my covenant that they themselves
    broke, though I was their husband, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'though I was lord over them' or 'though I ruled over them.' The Hebrew
      verb can carry either marital or dominion language; the Greek form quoted in
      Hebrews 8:9 reflects the latter sense.
    reason: alternative_reading
lexical_decisions:
- source_word: לֹא כַבְּרִית
  chosen: not like the covenant
  alternatives:
  - not according to the covenant
  - not as the covenant
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, so the sense is 'not like' rather than
    a simple negation of covenant existence. This yields natural English while preserving
    the comparative force.
- source_word: כָּרַתִּי
  chosen: I made
  alternatives:
  - I cut
  - I established
  lexicon: HALOT
  rationale: Hebrew idiom 'cut a covenant' is commonly rendered 'make a covenant'
    in readable English. 'Cut' would be more formal but less idiomatic here.
- source_word: אֶת אֲבוֹתָם
  chosen: with their fathers
  alternatives:
  - with their ancestors
  lexicon: HALOT
  rationale: Though אֶת marks the direct object of 'I made,' English covenant idiom
    requires 'with.' 'Fathers' preserves the source's familial-historical wording
    more closely than the broader 'ancestors.'
- source_word: בְּיוֹם הֶחֱזִיקִי בְיָדָם
  chosen: on the day I took them by the hand
  alternatives:
  - when I grasped their hand
  - on the day I seized them by their hand
  lexicon: HALOT
  rationale: The Hiphil of חזק with ביד conveys taking hold firmly by the hand. The
    chosen rendering preserves the tender, guiding image in idiomatic English.
- source_word: לְהוֹצִיאָם מֵאֶרֶץ מִצְרָיִם
  chosen: to bring them out of the land of Egypt
  alternatives:
  - to lead them out of the land of Egypt
  lexicon: HALOT
  rationale: '''Bring out'' is the standard rendering of יצא in the Hiphil in exodus
    contexts and keeps the covenant-redemption resonance.'
- source_word: אֲשֶׁר הֵמָּה הֵפֵרוּ
  chosen: that they themselves broke
  alternatives:
  - which they broke
  - that they violated
  lexicon: HALOT
  rationale: The independent pronoun הֵמָּה is emphatic; 'they themselves' preserves
    that emphasis. 'Broke' is the most direct covenantal English equivalent for הפר.
- source_word: בְּרִיתִי
  chosen: my covenant
  lexicon: HALOT
  rationale: Straightforward possessive construction; retained explicitly for covenant
    emphasis.
- source_word: וְאָנֹכִי
  chosen: though I
  alternatives:
  - while I
  - and I
  lexicon: HALOT
  rationale: The conjunction plus emphatic pronoun introduces a contrast with Israel's
    breach. 'Though I' best captures the adversative sense in context.
- source_word: בָּעַלְתִּי בָם
  chosen: was their husband
  alternatives:
  - was lord over them
  - was master over them
  - married them
  lexicon: HALOT
  rationale: 'The verb בעל can denote being husband to someone, and in this covenant
    context the marital metaphor is prominent in Jeremiah. This rendering best fits
    the relational contrast: they broke the covenant though the LORD stood to them
    as husband. The alternative ''was lord/master over them'' is preserved because
    the Hebrew can bear dominion language and Hebrews 8:9 follows a different Greek
    rendering.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is readable
    modern English and follows the doctrine's default rendering of YHWH as 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, YHWH is rendered 'the LORD' in the main text.
