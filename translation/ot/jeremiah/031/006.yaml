theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guideline specifies 'the LORD' as the default rendering
    of YHWH, following Jewish reverence tradition and the Septuagintal pattern. The
    alternative is preserved in a footnote-worthy lexical note rather than adopted
    in the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of נֹצְרִים in context
  chosen_reading: watchmen
  alternative_readings:
  - keepers
  - guards
  rationale: The verse depicts a public summons from Ephraim to ascend to Zion. 'Watchmen'
    best preserves the concrete image while allowing the theological implication of
    restored unity between north and south to emerge from the text rather than being
    imported into the wording.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #3, #5'
