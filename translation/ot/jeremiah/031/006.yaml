id: JER.31.6
reference: Jeremiah 31:6
source:
  edition: WLC
  text: כִּ֣י יֶשׁ י֔וֹם קָרְא֥וּ נֹצְרִ֖ים בְּ/הַ֣ר אֶפְרָ֑יִם ק֚וּמוּ וְ/נַעֲלֶ֣ה
    צִיּ֔וֹן אֶל יְהוָ֖ה אֱלֹהֵֽי/נוּ־־׃פ
translation:
  text: For there will be a day when watchmen will call out in the hill country of
    Ephraim, ‘Rise up, and let us go up to Zion, to the LORD our God.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'watchmen'; alternatively 'keepers' or 'guards.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD'; the divine name is YHWH, traditionally rendered 'the
      LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding promise; 'For' preserves
    the connective force naturally in English.
- source_word: יֶשׁ יֹום
  chosen: there will be a day
  alternatives:
  - there is a day
  - a day is coming
  lexicon: HALOT
  rationale: The existential construction with 'day' points to a future anticipated
    time in context. 'There will be a day' is idiomatic and preserves the prophetic
    forward-looking sense without over-paraphrasing.
- source_word: קָרְאוּ
  chosen: will call out
  alternatives:
  - will cry out
  - have called
  lexicon: HALOT
  rationale: Qal perfect in prophetic discourse can express future certainty. 'Call
    out' fits the public summons being issued.
- source_word: נֹצְרִים
  chosen: watchmen
  alternatives:
  - guards
  - keepers
  lexicon: HALOT
  rationale: The participle from נצר denotes those who keep watch or guard. 'Watchmen'
    best fits the image of sentinels summoning pilgrims, though 'keepers' is lexically
    possible.
- source_word: בְּהַר אֶפְרָיִם
  chosen: in the hill country of Ephraim
  alternatives:
  - on Mount Ephraim
  - in the mountains of Ephraim
  lexicon: HALOT
  rationale: The singular 'mountain/hill country' often functions collectively for
    a mountainous region. 'Hill country of Ephraim' is idiomatic English for the region
    and avoids implying a single peak.
- source_word: קוּמוּ
  chosen: Rise up
  alternatives:
  - Arise
  - Get up
  lexicon: HALOT
  rationale: An imperative plural calling hearers to begin the journey. 'Rise up'
    is natural and retains the elevated tone.
- source_word: וְנַעֲלֶה
  chosen: and let us go up
  alternatives:
  - and we will go up
  - that we may go up
  lexicon: HALOT
  rationale: The cohortative first person plural expresses exhortation including the
    speaker. 'Let us go up' captures the hortatory force; 'go up' preserves the pilgrimage/topographical
    nuance toward Zion.
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Standard transliteration of the place name; also preserves its theological
    resonance as Jerusalem's sacred hill.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD.' The preposition
    marks movement toward worshipful encounter.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward covenantal possessive; 'our God' preserves the communal
    confession.
