theological_decisions:
- issue: Interpretation of the enigmatic clause נְקֵבָה תְּסוֹבֵב גָּבֶר
  chosen_reading: Retain the literal image 'a woman will surround a man' in the main
    text.
  alternative_readings:
  - a woman will court a man
  - the weak will overcome the strong
  - Israel (as daughter/woman) will return to the LORD/man
  - a woman will protect a man
  rationale: The clause is lexically clear at the word level but highly disputed in
    meaning. To preserve theological tension rather than resolve it, the translation
    keeps the straightforward lexical sense in the main text and preserves interpretive
    alternatives in a footnote rather than embedding one theological interpretation
    into the translation.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it); §4 (Gender-accurate over gender-neutral)
- issue: Force of בָרָא in prophetic context
  chosen_reading: Render as 'has created' rather than a future tense.
  alternative_readings:
  - will create
  - creates
  rationale: Although prophetic perfect is possible, the Hebrew form itself is perfect/qatal.
    Rendering it as 'has created' stays closer to the source while allowing readers
    to sense the prophetic certainty without forcing a future tense.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve ambiguity where genuine'
