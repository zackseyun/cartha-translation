id: JER.31.22
reference: Jeremiah 31:22
source:
  edition: WLC
  text: עַד מָתַי֙ תִּתְחַמָּקִ֔י/ן הַ/בַּ֖ת הַ/שּֽׁוֹבֵבָ֑ה כִּֽי בָרָ֨א יְהוָ֤ה
    חֲדָשָׁה֙ בָּ/אָ֔רֶץ נְקֵבָ֖ה תְּס֥וֹבֵֽב גָּֽבֶר־־׃ס
translation:
  text: 'How long will you waver, faithless daughter? For the LORD has created a new
    thing in the land: a woman will surround a man.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'backsliding daughter' or 'wayward daughter.' The Hebrew describes covenantal
      waywardness.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult and much debated. It is rendered literally
      here as 'a woman will surround a man.' Possible interpretations include 'a woman
      will court a man,' 'the weak will overcome the strong,' or a figurative picture
      of restored Israel returning to the LORD.
    reason: alternative_reading
  - marker: c
    text: Or 'in the earth'; here 'the land' likely refers to the land of Israel in
      context.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְחַמָּקִין
  chosen: will you waver
  alternatives:
  - will you turn away
  - will you evade
  - will you be elusive
  lexicon: HALOT
  rationale: The verb חמק conveys turning aside, slipping away, or evasive movement.
    In this context of apostasy/restoration, 'waver' captures the sense of unstable,
    evasive turning without over-specifying a physical motion.
- source_word: הַבַּת הַשּׁוֹבֵבָה
  chosen: faithless daughter
  alternatives:
  - backsliding daughter
  - wayward daughter
  - apostate daughter
  lexicon: HALOT
  rationale: שׁוֹבֵב/שׁוֹבֵבָה in Jeremiah often carries the sense of waywardness
    or backsliding. 'Faithless daughter' is idiomatic modern English and fits Jeremiah's
    covenantal rebuke, while preserving the feminine singular address.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or explanation for the preceding question,
    so 'For' best reflects the discourse connection.
- source_word: בָרָא
  chosen: has created
  alternatives:
  - creates
  - will create
  lexicon: HALOT
  rationale: The qatal form is most naturally rendered as a completed act with present
    relevance. In prophetic discourse it can also have a future-prophetic force, but
    'has created' preserves the Hebrew form while allowing the result to ground the
    statement that follows.
- source_word: חֲדָשָׁה
  chosen: a new thing
  alternatives:
  - something new
  - a new reality
  lexicon: HALOT
  rationale: The adjective functions substantivally in context. 'A new thing' is concise,
    natural, and preserves the open-endedness of the Hebrew.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the earth
  - in the country
  lexicon: HALOT
  rationale: אֶרֶץ can mean earth or land. In Jeremiah's covenantal-national context,
    'the land' is the more likely reference.
- source_word: נְקֵבָה
  chosen: a woman
  alternatives:
  - a female
  lexicon: HALOT
  rationale: נְקֵבָה is literally 'female,' but in English 'a woman' is the natural
    rendering in this human relational context. This follows the gender-accurate principle
    without sounding clinical.
- source_word: תְּסוֹבֵב
  chosen: will surround
  alternatives:
  - will encircle
  - will turn around
  - will court
  lexicon: HALOT
  rationale: The basic sense of סבב is 'go around, surround, encircle.' Because the
    clause is notoriously difficult, the main text keeps the concrete lexical sense
    rather than importing an interpretive paraphrase such as 'court' or 'protect.'
- source_word: גָּבֶר
  chosen: a man
  alternatives:
  - a strong man
  - a warrior
  - a male
  lexicon: HALOT
  rationale: גֶּבֶר often denotes a man, sometimes with connotations of strength.
    Here 'a man' is the most transparent rendering and avoids over-interpretation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the covenant name is rendered 'the LORD.'
