id: JER.31.17
reference: Jeremiah 31:17
source:
  edition: WLC
  text: וְ/יֵשׁ תִּקְוָ֥ה לְ/אַחֲרִיתֵ֖/ךְ נְאֻם יְהוָ֑ה וְ/שָׁ֥בוּ בָנִ֖ים לִ/גְבוּלָֽ/ם־־׃ס
translation:
  text: There is hope for your future, declares the LORD, and your children will return
    to their own border.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “There is hope for your latter end” or “There is hope for your outcome.”
    reason: lexical_alternative
  - marker: b
    text: Or “your sons will return to their territory.” The Hebrew can be rendered
      more literally with “sons” and “border/territory.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵשׁ
  chosen: There is
  alternatives:
  - And there is
  lexicon: HALOT
  rationale: Existential particle introducing the assurance. English omits the conjunction
    in favor of natural style while preserving the sense.
- source_word: תִּקְוָה
  chosen: hope
  alternatives:
  - expectation
  lexicon: HALOT
  rationale: The noun denotes hope or expectation. 'Hope' is the most natural and
    contextually fitting rendering in this promise of restoration.
- source_word: לְאַחֲרִיתֵךְ
  chosen: for your future
  alternatives:
  - for your latter end
  - for your outcome
  lexicon: HALOT
  rationale: אַחֲרִית can mean end, latter end, or future. In this restoration context,
    'future' communicates the forward-looking promise clearly in modern English without
    losing the sense of an ultimate outcome.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic, weighty,
    and preserves the formal force of the utterance. Per doctrine, יְהוָה is rendered
    'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: וְשָׁבוּ
  chosen: will return
  alternatives:
  - shall return
  - will come back
  lexicon: HALOT
  rationale: Qal perfect with vav in prophetic discourse has future sense here. 'Will
    return' is both natural and faithful to the restoration theme.
- source_word: בָנִים
  chosen: your children
  alternatives:
  - sons
  lexicon: HALOT
  rationale: Although the Hebrew noun is formally masculine plural, in context it
    refers to the descendants/exiles of Rachel collectively, not specifically male
    offspring. 'Your children' best reflects the intended referent in English while
    remaining gender-accurate to sense rather than form.
- source_word: לִגְבוּלָם
  chosen: to their own border
  alternatives:
  - to their territory
  - to their homeland
  - to their boundary
  lexicon: HALOT
  rationale: גְּבוּל denotes border, territory, or region. 'Border' preserves the
    concrete territorial sense of return to the land; adding 'own' makes explicit
    the possessive force in idiomatic English.
