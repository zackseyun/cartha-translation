id: JER.31.2
reference: Jeremiah 31:2
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה מָצָ֥א חֵן֙ בַּ/מִּדְבָּ֔ר עַ֖ם שְׂרִ֣ידֵי חָ֑רֶב הָל֥וֹךְ
    לְ/הַרְגִּיע֖/וֹ יִשְׂרָאֵֽל׃
translation:
  text: 'Thus says the LORD: The people who survived the sword found favor in the
    wilderness; when Israel went to find rest for him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'when he went to give Israel rest.' The Hebrew of the final clause is
      difficult and may be understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the covenantal title in standard English small-caps style rather than transliteration.
- source_word: מָצָא חֵן
  chosen: found favor
  alternatives:
  - found grace
  lexicon: HALOT
  rationale: The idiom commonly means to receive favor or grace from someone. 'Found
    favor' is natural English and preserves the idiomatic sense without importing
    later theological nuance.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness or steppe rather than only sandy desert.
    'Wilderness' fits both the exodus resonance and normal biblical English usage.
- source_word: עַם שְׂרִידֵי חָרֶב
  chosen: the people who survived the sword
  alternatives:
  - the people, survivors of the sword
  - the people escaped from the sword
  lexicon: HALOT
  rationale: שְׂרִידֵי חָרֶב is literally 'survivors/remnant of the sword.' The chosen
    rendering is clear modern English while retaining the image of survival from warfare/judgment.
- source_word: הָלוֹךְ
  chosen: went
  alternatives:
  - going
  - as he went
  lexicon: HALOT
  rationale: The infinitive absolute here functions adverbially/verbally in a difficult
    clause. Rendering it as a finite past sense ('went') gives coherent English in
    context while reflecting the movement implied by הלך.
- source_word: לְהַרְגִּיעוֹ
  chosen: to find rest for him
  alternatives:
  - to give him rest
  - to bring him to rest
  lexicon: HALOT
  rationale: The Hiphil of רגע can mean 'give rest' or 'cause to rest.' Because the
    suffix is 3ms ('him') and the clause is syntactically compressed, 'to find rest
    for him' preserves the movement toward rest without over-specifying the agent.
    The alternative 'to give him rest' is preserved in a footnote because many construe
    God as the implied subject giving Israel rest.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard transliteration of the national name. In this verse it likely
    stands in apposition to 'the people' or resumes the subject after the difficult
    infinitival clause.
