theological_decisions:
- issue: Referent and syntax of the final clause הָלוֹךְ לְהַרְגִּיעוֹ יִשְׂרָאֵל
  chosen_reading: Rendered as 'when Israel went to find rest for him,' preserving
    the Hebrew ambiguity rather than resolving it strongly.
  alternative_readings:
  - '''when Israel was going to find rest'''
  - '''as I went to give him/it rest, Israel'''
  - '''when he went to give Israel rest'''
  rationale: The clause is syntactically difficult, especially the infinitive absolute
    הָלוֹךְ, the Hiphil infinitive לְהַרְגִּיעוֹ with 3ms suffix, and the placement
    of יִשְׂרָאֵל. Rather than force a fully smoothed interpretation, the translation
    keeps the sense of movement toward rest and preserves a major alternative in a
    footnote. This follows the doctrine's instruction to preserve theological and
    interpretive tension where the source is genuinely ambiguous.
  doctrine_reference: Translation philosophy §3, 'Preserve theological tension rather
    than resolve it.'
