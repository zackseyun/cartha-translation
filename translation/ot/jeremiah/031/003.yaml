id: JER.31.3
reference: Jeremiah 31:3
source:
  edition: WLC
  text: מֵ/רָח֕וֹק יְהוָ֖ה נִרְאָ֣ה לִ֑/י וְ/אַהֲבַ֤ת עוֹלָם֙ אֲהַבְתִּ֔י/ךְ עַל כֵּ֖ן
    מְשַׁכְתִּ֥י/ךְ חָֽסֶד־׃
translation:
  text: 'From far away the LORD appeared to me: “I have loved you with an everlasting
    love; therefore I have drawn you with steadfast love.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD appeared to him from afar,' depending on whether 'from far
      away' is taken with 'appeared' and whether the pronominal reading is understood
      differently in context.
    reason: alternative_reading
  - marker: b
    text: '''Steadfast love'' translates Hebrew חֶסֶד, a term often associated with
      loyal, covenantal love; alternatively, ''covenant faithfulness'' or ''lovingkindness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵרָחוֹק
  chosen: From far away
  alternatives:
  - From afar
  - From a distance
  lexicon: HALOT
  rationale: The preposition מִן with רָחוֹק denotes spatial distance. 'From far away'
    is natural modern English and preserves the image without sounding archaic like
    'from afar.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name YHWH is rendered 'the LORD' rather than
    transliterated.
- source_word: נִרְאָה לִי
  chosen: appeared to me
  alternatives:
  - was seen by me
  - appeared to me from afar
  lexicon: HALOT
  rationale: The Niphal of ראה commonly means 'appear/be seen.' 'Appeared to me' is
    the most idiomatic rendering. The phrase's syntax is somewhat compressed, and
    some take 'from far away' with the verb; the main text keeps the straightforward
    sense while preserving the ambiguity in a footnote.
- source_word: וְאַהֲבַת עוֹלָם
  chosen: with an everlasting love
  alternatives:
  - with eternal love
  - with ancient love
  lexicon: HALOT
  rationale: The construct phrase literally means 'a love of forever/eternity.' 'Everlasting
    love' is the most natural English equivalent and preserves both duration and covenantal
    weight. 'Ancient love' is possible for עוֹלָם in some contexts but is less fitting
    here.
- source_word: אֲהַבְתִּיךְ
  chosen: I have loved you
  alternatives:
  - I loved you
  lexicon: HALOT
  rationale: The qatal can be rendered as simple past, but in English 'I have loved
    you' better conveys a past action with continuing force in this declaration of
    covenant love.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - therefore
  - for this reason
  - so
  lexicon: HALOT
  rationale: This inferential phrase marks consequence. 'Therefore' is concise and
    preserves the logical connection between divine love and the following action.
- source_word: מְשַׁכְתִּיךְ
  chosen: I have drawn you
  alternatives:
  - I have continued my faithfulness to you
  - I have attracted you
  - I have pulled you
  lexicon: HALOT
  rationale: משך commonly means 'draw, pull.' In this context it likely carries the
    sense of drawing someone toward oneself. Some versions construe the line idiomatically
    as extending kindness, but 'drawn you' stays closer to the Hebrew verb while remaining
    intelligible.
- source_word: חָסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - covenant faithfulness
  - kindness
  lexicon: HALOT
  rationale: חסד is a covenantally rich term denoting loyal, gracious love. 'Steadfast
    love' is a widely accepted English rendering that is readable and theologically
    weighty without excessive jargon.
