theological_decisions:
- issue: Relationship between divine love and חסד in the verse
  chosen_reading: 'Render both אַהֲבָה and חָסֶד with distinct but related English
    expressions: ''love'' and ''steadfast love.'''
  alternative_readings:
  - Use 'love' for both terms
  - Render חסד as 'covenant faithfulness'
  rationale: The Hebrew intentionally uses two related but non-identical covenant
    terms. Distinguishing them preserves the texture of the verse without importing
    a narrower doctrinal system.
  doctrine_reference: Translation philosophy §§3, 5
- issue: Aspect of the perfect verbs
  chosen_reading: Use English present-perfect forms ('have loved,' 'have drawn')
  alternative_readings:
  - Simple past ('loved,' 'drew')
  rationale: The verse presents YHWH's prior action as bearing present significance
    for Israel. The present-perfect in English preserves that theological and rhetorical
    force better than a flat past tense.
  doctrine_reference: Translation philosophy §6
