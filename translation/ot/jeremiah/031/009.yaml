id: JER.31.9
reference: Jeremiah 31:9
source:
  edition: WLC
  text: בִּ/בְכִ֣י יָבֹ֗אוּ וּֽ/בְ/תַחֲנוּנִים֮ אֽוֹבִילֵ/ם֒ אֽוֹלִיכֵ/ם֙ אֶל נַ֣חֲלֵי
    מַ֔יִם בְּ/דֶ֣רֶךְ יָשָׁ֔ר לֹ֥א יִכָּשְׁל֖וּ בָּ֑/הּ כִּֽי הָיִ֤יתִי לְ/יִשְׂרָאֵל֙
    לְ/אָ֔ב וְ/אֶפְרַ֖יִם בְּכֹ֥רִ/י הֽוּא־־׃ס
translation:
  text: With weeping they will come, and with pleas for mercy I will lead them; I
    will guide them to streams of water, on a straight path in which they will not
    stumble, for I have become a father to Israel, and Ephraim is my firstborn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with supplications I will lead them.' The Hebrew term can be rendered
      'supplications' or 'pleas for mercy.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for I am a father to Israel.' The Hebrew perfect may be understood as
      emphasizing a present covenant relationship.
    reason: alternative_reading
lexical_decisions:
- source_word: בִּבְכִי
  chosen: with weeping
  alternatives:
  - in weeping
  - weeping
  lexicon: HALOT
  rationale: The prefixed ב marks accompaniment or manner. 'With weeping' preserves
    the concrete image and avoids overinterpreting whether the tears are penitential,
    sorrowful, or joyful.
- source_word: יָבֹאוּ
  chosen: they will come
  alternatives:
  - they will arrive
  lexicon: HALOT
  rationale: Simple future sense of בוא. 'Come' is the most natural and contextually
    fitting English equivalent.
- source_word: וּבְתַחֲנוּנִים
  chosen: and with pleas for mercy
  alternatives:
  - and with supplications
  - and with consolations
  lexicon: HALOT
  rationale: תחנונים commonly denotes supplications or pleas for favor/mercy. 'Pleas
    for mercy' communicates the relational and prayerful nuance in accessible English.
    An alternative tradition takes the sense differently in context, but the lexical
    core favors supplication.
- source_word: אֹבִילֵם
  chosen: I will lead them
  alternatives:
  - I will bring them along
  lexicon: HALOT
  rationale: Hiphil of יבל conveys leading or conducting. 'Lead' fits both the pastoral
    imagery and the divine-guidance context.
- source_word: אֹלִיכֵם
  chosen: I will guide them
  alternatives:
  - I will cause them to walk
  - I will bring them
  lexicon: HALOT
  rationale: Hiphil of הלך overlaps with 'lead,' so varying the English to 'guide'
    avoids awkward repetition while preserving the causative movement sense. The semantic
    distinction is documented here as a stylistic but source-faithful variation.
- source_word: נַחֲלֵי מַיִם
  chosen: streams of water
  alternatives:
  - watercourses
  - brooks of water
  lexicon: HALOT
  rationale: A construct phrase meaning channels/streams characterized by water. 'Streams
    of water' is idiomatic modern English and preserves the life-giving imagery.
- source_word: בְּדֶרֶךְ יָשָׁר
  chosen: on a straight path
  alternatives:
  - by a level way
  - in a straight way
  lexicon: HALOT
  rationale: The phrase denotes a direct, even, unobstructed route. 'On a straight
    path' is natural English and keeps the metaphor of safe guidance.
- source_word: לֹא יִכָּשְׁלוּ בָּהּ
  chosen: in which they will not stumble
  alternatives:
  - they will not stumble on it
  - they will not be made to stumble in it
  lexicon: HALOT
  rationale: Niphal of כשל means stumble. Rendering the feminine pronominal suffix
    with 'in which' ties it smoothly to 'path' in English while preserving the sense.
- source_word: כִּי הָיִיתִי לְיִשְׂרָאֵל לְאָב
  chosen: for I have become a father to Israel
  alternatives:
  - for I am a father to Israel
  - for I have been a father to Israel
  lexicon: HALOT
  rationale: The qatal can express a present state grounded in established reality.
    'Have become' preserves the verbal form's aspect and the covenantal relational
    emphasis without flattening it to a mere timeless copula.
- source_word: וְאֶפְרַיִם בְּכֹרִי הוּא
  chosen: and Ephraim is my firstborn
  alternatives:
  - and Ephraim—he is my firstborn
  lexicon: HALOT
  rationale: בכור denotes firstborn in status and inheritance significance. The pronoun
    הוּא is naturally represented by standard English predication rather than an emphatic
    separate clause.
