theological_decisions:
- issue: Nature of the people's weeping and supplication
  chosen_reading: The verse is rendered without specifying whether the tears are penitential,
    sorrowful, or joyful.
  alternative_readings:
  - penitential weeping
  - weeping of joy at restoration
  rationale: The Hebrew states the manner of their coming but does not explicitly
    define the emotional or theological cause. Preserving the ambiguity follows the
    instruction not to import doctrinal claims the text does not make.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Force of הָיִיתִי in the fatherhood statement
  chosen_reading: Rendered as 'I have become a father to Israel' rather than a simple
    present.
  alternative_readings:
  - I am a father to Israel
  - I have been a father to Israel
  rationale: The Hebrew perfect can be understood in several ways in prophetic discourse.
    'Have become' preserves the verbal force and the restoration context while not
    denying the broader biblical theme of God's prior fatherly relation to Israel.
  doctrine_reference: Translation philosophy §1 and §3
