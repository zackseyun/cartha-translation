id: JER.31.31
reference: Jeremiah 31:31
source:
  edition: WLC
  text: הִנֵּ֛ה יָמִ֥ים בָּאִ֖ים נְאֻם יְהוָ֑ה וְ/כָרַתִּ֗י אֶת בֵּ֧ית יִשְׂרָאֵ֛ל וְ/אֶת בֵּ֥ית יְהוּדָ֖ה בְּרִ֥ית חֲדָשָֽׁה־־־׃
translation:
  text: Look, days are coming, declares Yahweh, when I will make a new covenant with the house of Israel and the house of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a renewed covenant.' The Hebrew adjective most naturally means 'new,' but some interpreters stress covenant continuity and understand it as 'renewed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces an attention-getting announcement. 'Look' preserves the deictic force in readable modern English better than the archaic 'Behold.'
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are on the way
  lexicon: HALOT
  rationale: A common prophetic idiom announcing a future time. 'Days are coming' is natural English and preserves the Hebrew participial construction's imminence.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic, weighty, and more precise for נְאֻם than the flatter 'says.' 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְכָרַתִּי
  chosen: I will make
  alternatives:
  - I will cut
  - I will establish
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'cut' a covenant, but idiomatic English is 'make a covenant.' 'Establish' would over-interpret beyond the lexical sense.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - the people of Israel
  - Israel
  lexicon: HALOT
  rationale: Retains the covenantal/corporate household language of the Hebrew rather than flattening it to merely 'people' or 'Israel.'
- source_word: בֵּית יְהוּדָה
  chosen: the house of Judah
  alternatives:
  - the people of Judah
  - Judah
  lexicon: HALOT
  rationale: Matches the parallel phrase 'house of Israel' and preserves the corporate identity language in the source text.
- source_word: בְּרִית חֲדָשָׁה
  chosen: a new covenant
  alternatives:
  - a renewed covenant
  - a fresh covenant
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term, and חֲדָשָׁה normally means 'new.' 'Renewed covenant' is an interpretive theological alternative sometimes argued from context, but the plain lexical sense here is 'new,' so that is retained in the main text.
