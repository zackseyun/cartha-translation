theological_decisions:
- issue: Whether חֲדָשָׁה should be rendered 'new' or interpreted as 'renewed' in covenant theology discussions
  chosen_reading: new covenant
  alternative_readings:
  - renewed covenant
  rationale: The adjective חֲדָשָׁה most straightforwardly means 'new.' While some theological traditions emphasize continuity and prefer 'renewed,' that goes beyond the plain lexical value of the word in this verse. The translation preserves the text's wording and leaves broader covenantal synthesis to interpretation.
