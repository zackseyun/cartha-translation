id: JER.31.10
reference: Jeremiah 31:10
source:
  edition: WLC
  text: שִׁמְע֤וּ דְבַר יְהוָה֙ גּוֹיִ֔ם וְ/הַגִּ֥ידוּ בָ/אִיִּ֖ים מִ/מֶּרְחָ֑ק וְ/אִמְר֗וּ
    מְזָרֵ֤ה יִשְׂרָאֵל֙ יְקַבְּצֶ֔/נּוּ וּ/שְׁמָר֖/וֹ כְּ/רֹעֶ֥ה עֶדְרֽ/וֹ־׃
translation:
  text: Hear the word of the LORD, O nations, and declare it in the coastlands far
    away; say, “He who scattered Israel will gather him and will keep him as a shepherd
    keeps his flock.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the distant islands”; the Hebrew term can refer broadly to far-off
      maritime lands or coastlands.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “will gather him … will keep him,” with “him” referring to Israel
      as a collective singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' is the standard concise imperative
    in prophetic address and preserves the covenantal/prophetic force better than
    the slightly more expansive 'listen to.'
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: דבר can mean 'word' or 'message'; 'word' preserves the familiar prophetic
    formula and matches the source closely. יְהוָה is rendered 'the LORD' per doctrine
    guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered according to the project's default contested-term
    policy.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: In prophetic address to non-Israelite collectives, 'nations' is the most
    natural and contextually accurate rendering. 'Gentiles' would import a later Jewish/Christian
    contrast not explicit here.
- source_word: וְהַגִּידוּ
  chosen: declare it
  alternatives:
  - proclaim it
  - announce it
  lexicon: HALOT
  rationale: The Hiphil of נגד here calls for public reporting. 'Declare it' fits
    the imperative sequence and naturally supplies the implied object from 'the word
    of the LORD.'
- source_word: בָאִיִּים מִמֶּרְחָק
  chosen: in the coastlands far away
  alternatives:
  - among the islands far away
  - in the distant coastlands
  lexicon: HALOT
  rationale: איים in prophetic literature often denotes distant maritime lands/coastlands,
    not merely literal islands. 'Coastlands far away' communicates the geographic
    breadth intended.
- source_word: וְאִמְרוּ
  chosen: say
  alternatives:
  - and say
  lexicon: HALOT
  rationale: A straightforward imperative continuing the chain of commands. English
    punctuation can carry the coordination without needing to repeat 'and' before
    the quotation.
- source_word: מְזָרֵה
  chosen: He who scattered
  alternatives:
  - The one scattering
  - The scatterer of
  lexicon: HALOT
  rationale: The participle of זרה functions substantivally. 'He who scattered' gives
    idiomatic English and reflects the completed historical sense in context, even
    though the Hebrew participle is formally ongoing/substantival.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard transliteration of the covenant people/name.
- source_word: יְקַבְּצֶנּוּ
  chosen: will gather him
  alternatives:
  - will gather him back
  - will regather him
  lexicon: HALOT
  rationale: The singular pronominal suffix refers back to collective singular Israel.
    'Will gather him' preserves the Hebrew number and person; 'regather' is interpretively
    acceptable but adds a prefix not explicit in the verb.
- source_word: וּשְׁמָרוֹ
  chosen: and will keep him
  alternatives:
  - and will guard him
  - and will watch over him
  lexicon: HALOT
  rationale: שׁמר can mean keep, guard, or watch over. 'Keep' is concise and pairs
    well with the shepherd simile, while still conveying protective care.
- source_word: כְּרֹעֶה עֶדְרוֹ
  chosen: as a shepherd keeps his flock
  alternatives:
  - like a shepherd his flock
  - as a shepherd guards his herd
  lexicon: HALOT
  rationale: The comparison is explicit with כ. Rendering the verbal idea in the English
    simile ('keeps') makes the clause natural and carries over the force of וּשְׁמָרוֹ.
    'Flock' is the idiomatic term for a shepherd's עדר in this context.
