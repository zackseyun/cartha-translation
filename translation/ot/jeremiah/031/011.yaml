theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Per the doctrine excerpt's
    contested terms table, the default rendering is 'the LORD,' not a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Differentiating פדה and גאל in parallel redemption language
  chosen_reading: 'rendered with two related but distinct English verbs: ''redeemed''
    and ''ransomed'''
  alternative_readings:
  - render both as 'redeemed'
  rationale: The Hebrew uses two near-synonymous redemption verbs in poetic parallelism.
    Using distinct English renderings preserves the texture of the Hebrew without
    importing separate doctrinal categories beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5 (consistency of key terms,
    or documented exception)'
