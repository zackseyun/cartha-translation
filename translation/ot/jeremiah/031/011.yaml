- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Differentiating פדה and גאל in parallel redemption language
  chosen_reading: 'rendered with two related but distinct English verbs: ''redeemed'' and ''ransomed'''
  alternative_readings:
  - render both as 'redeemed'
  rationale: The Hebrew uses two near-synonymous redemption verbs in poetic parallelism. Using distinct English renderings preserves the texture of the Hebrew without importing separate doctrinal categories beyond the text.
