id: JER.31.11
reference: Jeremiah 31:11
source:
  edition: WLC
  text: כִּֽי פָדָ֥ה יְהוָ֖ה אֶֽת יַעֲקֹ֑ב וּ/גְאָל֕/וֹ מִ/יַּ֖ד חָזָ֥ק מִמֶּֽ/נּוּ־־׃
translation:
  text: For the LORD has redeemed Jacob and ransomed him from the hand of one stronger
    than he.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and redeemed him.' The Hebrew verb here is גאל, a term often associated
      with acting as a redeemer on behalf of a relative or reclaiming someone from
      distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the surrounding promise. 'For'
    fits the discourse flow naturally in English.
- source_word: פָדָה
  chosen: has redeemed
  alternatives:
  - redeemed
  - ransomed
  lexicon: HALOT
  rationale: פדה commonly denotes redeeming or ransoming by release from bondage or
    danger. 'Has redeemed' preserves the perfect aspect in a natural English way and
    keeps the covenantal-rescue sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and LXX-influenced English Bible
    practice.
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The text explicitly names Jacob; this should be transliterated rather
    than interpreted as 'Israel' in the main text, though the corporate-national sense
    is understood contextually.
- source_word: וּגְאָלוֹ
  chosen: and ransomed him
  alternatives:
  - and redeemed him
  - and reclaimed him
  lexicon: HALOT
  rationale: גאל overlaps with פדה but often carries the sense of kinship-redemption
    or acting as redeemer. To avoid flattening the Hebrew parallelism into identical
    English, 'ransomed' preserves distinction while retaining the rescue-redemption
    field. The object suffix is represented by 'him.'
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  - out of the hand of
  lexicon: HALOT
  rationale: '''Hand'' is a common Hebrew idiom for power or control. Retaining ''from
    the hand of'' preserves the metaphor while remaining intelligible in English.'
- source_word: חָזָק
  chosen: one stronger than he
  alternatives:
  - the strong one
  - one too strong for him
  - a stronger one
  lexicon: HALOT
  rationale: The adjective is singular masculine and is qualified by מִמֶּנּוּ, indicating
    comparison. 'One stronger than he' makes the comparative force explicit and preserves
    the singular personal reference.
- source_word: מִמֶּנּוּ
  chosen: than he
  alternatives:
  - than him
  - for him
  lexicon: HALOT
  rationale: 'Here the preposition with pronoun marks comparison: stronger than Jacob.
    ''Than he'' is slightly more formal but reads smoothly after ''one stronger than
    he.'''
