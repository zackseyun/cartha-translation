id: JER.31.35
reference: Jeremiah 31:35
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה נֹתֵ֥ן שֶׁ֨מֶשׁ֙ לְ/א֣וֹר יוֹמָ֔ם חֻקֹּ֛ת יָרֵ֥חַ וְ/כוֹכָבִ֖ים לְ/א֣וֹר לָ֑יְלָה רֹגַ֤ע הַ/יָּם֙ וַ/יֶּהֱמ֣וּ גַלָּ֔י/ו יְהוָ֥ה צְבָא֖וֹת שְׁמֽ/וֹ׀׃
translation:
  text: 'Thus says Yahweh, who gives the sun for light by day, the fixed order of the moon and stars for light by night, who stirs up the sea so that its waves roar—Yahweh of hosts is his name:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the ordinances of the moon and stars.' The Hebrew term can denote fixed statutes or established order; here it refers to the regular ordering of the heavenly bodies.
    reason: lexical_alternative
  - marker: b
    text: Or 'who calms the sea.' The Hebrew verb can carry that sense in other contexts, but here the following line, 'its waves roar,' favors 'stirs up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - Thus said the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. יְהוָה is rendered 'the LORD' per doctrine for the divine name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נֹתֵן
  chosen: who gives
  alternatives:
  - giving
  - who sets
  lexicon: HALOT
  rationale: Qal participle used attributively after the divine speech formula, describing the LORD by his ongoing action. 'Who gives' is natural English and preserves the participial force.
- source_word: שֶׁמֶשׁ לְאוֹר יוֹמָם
  chosen: the sun for light by day
  alternatives:
  - the sun as light by day
  - the sun for a light by day
  lexicon: HALOT
  rationale: לְאוֹר expresses purpose/function. 'For light by day' is idiomatic and close to the Hebrew.
- source_word: חֻקֹּת יָרֵחַ וְכוֹכָבִים
  chosen: the fixed order of the moon and stars
  alternatives:
  - the ordinances of the moon and stars
  - the statutes of the moon and stars
  lexicon: HALOT
  rationale: חֻקּוֹת can mean statutes, ordinances, or fixed order. In this cosmic context it refers to the established regularity/order governing heavenly bodies, not legal commands. 'Fixed order' communicates the sense clearly in modern English.
- source_word: לְאוֹר לָיְלָה
  chosen: for light by night
  alternatives:
  - for a light at night
  - to give light at night
  lexicon: HALOT
  rationale: Parallel to the daytime clause; concise and natural English.
- source_word: רֹגַע הַיָּם
  chosen: who stirs up the sea
  alternatives:
  - who calms the sea
  - who stills the sea
  lexicon: HALOT
  rationale: Given the following clause 'so that its waves roar,' the sense here is not calming but acting upon the sea so as to agitate it. The immediate context controls the rendering.
- source_word: וַיֶּהֱמוּ גַלָּיו
  chosen: so that its waves roar
  alternatives:
  - and its waves roar
  - when its waves roar
  lexicon: HALOT
  rationale: The waw + imperfect here is best represented in fluent English as the result of the preceding action. 'Roar' captures the tumultuous sound implied by המה.
- source_word: יְהוָה צְבָאוֹת שְׁמוֹ
  chosen: the LORD of hosts is his name
  alternatives:
  - the LORD of armies is his name
  - the LORD Almighty is his name
  lexicon: HALOT
  rationale: צְבָאוֹת is traditionally and accurately rendered 'hosts' in this divine title, preserving its breadth (heavenly armies/forces) without narrowing it. The verbless clause is naturally rendered with 'is' in English.
