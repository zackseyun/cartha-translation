theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of רֹגַע in relation to the sea
  chosen_reading: who stirs up the sea
  alternative_readings:
  - who calms the sea
  - who stills the sea
  rationale: Although the verb can in some contexts denote quieting or calming, the attached clause about the waves roaring indicates divine mastery over the sea in its agitation here. The translation preserves the poetic depiction without importing a harmonized reading from other passages.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
