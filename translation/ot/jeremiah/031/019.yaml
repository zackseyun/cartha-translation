theological_decisions:
- issue: Penitential language in Ephraim's confession
  chosen_reading: The verse is rendered as a personal confession of repentance following
    restoration and instruction, without importing later doctrinal categories beyond
    the text.
  alternative_readings:
  - The first verb could itself be rendered 'repented,' making both clauses describe
    inner remorse rather than turn-then-repent sequence.
  rationale: 'The Hebrew uses two different verbs, שׁוּב and נחם, which are best preserved
    as related but distinct stages: turning back, then repenting. This maintains the
    text''s theological tension and experiential progression.'
  doctrine_reference: Translation philosophy §3, §5
