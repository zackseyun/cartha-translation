id: JER.31.19
reference: Jeremiah 31:19
source:
  edition: WLC
  text: כִּֽי אַחֲרֵ֤י שׁוּבִ/י֙ נִחַ֔מְתִּי וְ/אַֽחֲרֵי֙ הִוָּ֣דְעִ֔/י סָפַ֖קְתִּי
    עַל יָרֵ֑ךְ בֹּ֚שְׁתִּי וְ/גַם נִכְלַ֔מְתִּי כִּ֥י נָשָׂ֖אתִי חֶרְפַּ֥ת נְעוּרָֽ/י־־־׃
translation:
  text: For after I turned back, I repented; and after I was instructed, I struck
    my thigh. I was ashamed, and also humiliated, because I bore the disgrace of my
    youth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after I returned, I regretted'; the Hebrew distinguishes 'turning back'
      (שׁוּב) from 'repenting/regretting' (נחם).
    reason: lexical_alternative
  - marker: b
    text: '''I struck my thigh'' is a Hebrew gesture of grief, shock, or remorse.'
    reason: cultural_note
  - marker: c
    text: Or 'the reproach of my youth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּבִי
  chosen: I turned back
  alternatives:
  - I returned
  - I repented
  lexicon: HALOT
  rationale: שׁוּב commonly denotes turning/returning. Here, with אַחֲרֵי ('after'),
    it refers to a prior turning back rather than repeating the repentance idea already
    expressed by נִחַמְתִּי. 'Turned back' preserves the concrete metaphor and avoids
    collapsing two distinct verbs into one English term.
- source_word: נִחַמְתִּי
  chosen: I repented
  alternatives:
  - I regretted
  - I was sorry
  lexicon: HALOT
  rationale: In this penitential context, נחם is best rendered 'repented' rather than
    the weaker 'regretted.' The speaker expresses moral contrition following a turning
    back to God.
- source_word: הִוָּדְעִי
  chosen: I was instructed
  alternatives:
  - I came to know
  - I was made known
  - I was taught
  lexicon: HALOT
  rationale: The Niphal infinitive construct of ידע can mean 'being made to know'
    or 'being instructed.' In context, it points to coming under corrective understanding,
    so 'I was instructed' communicates the passive-causative sense naturally in English.
- source_word: סָפַקְתִּי עַל יָרֵךְ
  chosen: I struck my thigh
  alternatives:
  - I slapped my thigh
  - I beat my thigh
  lexicon: HALOT
  rationale: This idiom expresses grief, shock, or remorse through a physical gesture.
    'Struck my thigh' is clear modern English and preserves the embodied sign of lament
    without over-paraphrasing.
- source_word: בֹּשְׁתִּי
  chosen: I was ashamed
  alternatives:
  - I felt shame
  lexicon: HALOT
  rationale: A straightforward rendering of בושׁ in first person perfect. It pairs
    well with the following verb while preserving the emotional force.
- source_word: נִכְלַמְתִּי
  chosen: humiliated
  alternatives:
  - disgraced
  - confounded
  lexicon: HALOT
  rationale: To avoid flattening two near-synonyms into identical English, this verb
    is rendered distinctly from בֹּשְׁתִּי. 'Humiliated' conveys the intensified sense
    of public disgrace or deep mortification.
- source_word: נָשָׂאתִי
  chosen: I bore
  alternatives:
  - I carried
  - I have borne
  lexicon: HALOT
  rationale: נשא here means to bear/carry the burden of reproach. 'I bore' is idiomatic
    and fits the retrospective confession.
- source_word: חֶרְפַּת נְעוּרָי
  chosen: the disgrace of my youth
  alternatives:
  - the reproach of my youth
  - the shame of my youth
  lexicon: HALOT
  rationale: חֶרְפָּה often denotes reproach/disgrace. 'Disgrace' reads naturally
    in modern English and matches the surrounding shame language. 'Of my youth' preserves
    the genitive and the retrospective confession of earlier sin or waywardness.
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: The opening כִּי is taken as explanatory, linking this verse to the preceding
    context of Ephraim's penitence. 'For' preserves the connective force. The final
    כִּי is rendered 'because' to fit English syntax.
