id: JER.31.40
reference: Jeremiah 31:40
source:
  edition: WLC
  text: וְ/כָל הָ/עֵ֣מֶק הַ/פְּגָרִ֣ים וְ/הַ/דֶּ֡שֶׁן וְ/כָֽל ה/שרמות עַד נַ֨חַל קִדְר֜וֹן
    עַד פִּנַּ֨ת שַׁ֤עַר הַ/סּוּסִים֙ מִזְרָ֔חָ/ה קֹ֖דֶשׁ לַֽ/יהוָ֑ה לֹֽא יִנָּתֵ֧שׁ
    וְֽ/לֹא יֵהָרֵ֛ס ע֖וֹד לְ/עוֹלָֽם־׀־־־־־׃ס
translation:
  text: And the whole valley of the corpses and the ashes, and all the terraces as
    far as the Kidron Valley, as far as the corner of the Horse Gate toward the east,
    shall be holy to the LORD. It shall not be uprooted or overthrown again forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fields' or 'slopes' for the difficult Hebrew term traditionally understood
      of the terraced areas around Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: '''Kidron Valley'' could also be rendered ''Kidron Brook,'' since the Hebrew
      term can refer to a wadi or seasonal watercourse as well as its valley.'
    reason: lexical_alternative
  - marker: c
    text: Or 'shall not be plucked up or torn down ever again.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֵמֶק
  chosen: the valley
  alternatives:
  - the lowland
  lexicon: HALOT
  rationale: עֵמֶק commonly denotes a valley or low-lying area. 'Valley' is the most
    natural English rendering here in a topographical description.
- source_word: הַפְּגָרִים
  chosen: the corpses
  alternatives:
  - the dead bodies
  - the carcasses
  lexicon: HALOT
  rationale: פֶּגֶר refers to dead bodies/corpses. 'Corpses' is direct and fits the
    grim imagery of the place formerly associated with defilement.
- source_word: הַדֶּשֶׁן
  chosen: the ashes
  alternatives:
  - the fat ashes
  - the refuse ashes
  lexicon: HALOT
  rationale: In this context, likely referring to the ash-heaps associated with sacrificial
    or refuse disposal areas rather than literal 'fat.' English versions often render
    'ashes,' which best fits the topographical and cultic setting.
- source_word: השרמות
  chosen: the terraces
  alternatives:
  - the fields
  - the slopes
  lexicon: HALOT
  rationale: The consonantal form is difficult and traditionally understood of terraced
    fields/plots on the slopes around Jerusalem. 'Terraces' preserves the likely topographical
    sense without overcommitting to cultivated 'fields.'
- source_word: נַחַל קִדְרוֹן
  chosen: the Kidron Valley
  alternatives:
  - the Kidron Brook
  - the Wadi Kidron
  lexicon: HALOT
  rationale: נחל can denote a wadi, brook, or valley. In English biblical geography,
    'Kidron Valley' is clear and idiomatic in this boundary description.
- source_word: פִּנַּת שַׁעַר הַסּוּסִים
  chosen: the corner of the Horse Gate
  alternatives:
  - the angle of the Horse Gate
  lexicon: HALOT
  rationale: פִּנָּה is 'corner' or 'angle.' 'Corner of the Horse Gate' is straightforward
    in a city-boundary context.
- source_word: מִזְרָחָה
  chosen: toward the east
  alternatives:
  - eastward
  - on the east
  lexicon: HALOT
  rationale: Directional adverb indicating orientation. 'Toward the east' reads naturally
    in modern English while preserving the directional force.
- source_word: קֹדֶשׁ לַיהוָה
  chosen: holy to the LORD
  alternatives:
  - holy for the LORD
  - a holy thing to the LORD
  lexicon: HALOT
  rationale: Standard consecration formula indicating dedication to YHWH. Per doctrine,
    יהוה is rendered 'the LORD.' 'Holy to the LORD' preserves both sanctity and dedication.
- source_word: לַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md, the default rendering of יהוה is 'the LORD,' following
    Jewish reverence tradition and longstanding English convention.
- source_word: לֹא יִנָּתֵשׁ
  chosen: shall not be uprooted
  alternatives:
  - shall not be plucked up
  - shall not be torn down
  lexicon: HALOT
  rationale: נתשׁ in the Niphal commonly means 'be uprooted' or 'be plucked up,' especially
    in Jeremiah's judgment/restoration language. 'Uprooted' preserves the prophetic
    diction and metaphor.
- source_word: וְלֹא יֵהָרֵס
  chosen: or overthrown
  alternatives:
  - or demolished
  - or torn down
  lexicon: HALOT
  rationale: הרס in the Niphal means 'be torn down/demolished.' 'Overthrown' pairs
    well with 'uprooted' and reflects the broader prophetic reversal of destruction.
- source_word: עוֹד לְעוֹלָם
  chosen: again forever
  alternatives:
  - anymore forever
  - ever again
  lexicon: HALOT
  rationale: 'The combination intensifies the negation: never again, permanently.
    ''Again forever'' is slightly wooden but preserves both עוֹד and לְעוֹלָם; in
    the full sentence it communicates enduring permanence.'
