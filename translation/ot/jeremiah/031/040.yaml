theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the covenant name in a consecration formula. Following
    the project's doctrinal standard, the main text renders יהוה as 'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of sanctification in a formerly defiled area
  chosen_reading: The entire described area becomes holy to the LORD
  alternative_readings:
  - Only the rebuilt city proper is holy, while the outlying areas are merely included
    in the boundary
  rationale: The syntax places the whole listed area under the predicate קֹדֶשׁ לַיהוָה.
    The translation preserves the striking theological reversal without narrowing
    the scope.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
