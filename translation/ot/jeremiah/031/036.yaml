id: JER.31.36
reference: Jeremiah 31:36
source:
  edition: WLC
  text: אִם יָמֻ֜שׁוּ הַ/חֻקִּ֥ים הָ/אֵ֛לֶּה מִ/לְּ/פָנַ֖/י נְאֻם יְהוָ֑ה גַּם֩ זֶ֨רַע
    יִשְׂרָאֵ֜ל יִשְׁבְּת֗וּ מִֽ/הְי֥וֹת גּ֛וֹי לְ/פָנַ֖/י כָּל הַ/יָּמִֽים־־־׃ס
translation:
  text: If these fixed ordinances depart from before me, declares the LORD, then the
    offspring of Israel also will cease from being a nation before me all the days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these statutes' or 'these decrees'; the phrase refers in context to
      the fixed order established for creation.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the seed of Israel,' a collective expression meaning Israel's offspring
      or descendants.
    reason: lexical_alternative
  - marker: c
    text: Or 'forever'; Hebrew 'all the days' is a literal idiom for enduring continuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמֻשׁוּ
  chosen: depart
  alternatives:
  - move away
  - vanish
  - be removed
  lexicon: HALOT
  rationale: The verb מוש in this context conveys removal or departure from a set
    position. 'Depart' fits the cosmic-order context and reads naturally in English
    without overstating disappearance.
- source_word: הַחֻקִּים הָאֵלֶּה
  chosen: these fixed ordinances
  alternatives:
  - these statutes
  - these decrees
  - these laws
  lexicon: HALOT
  rationale: In the immediate context the referent is the established order of sun,
    moon, and sea (vv. 35–36), so 'fixed ordinances' better captures creation-order
    regulations than legal 'statutes' directed to human obedience.
- source_word: מִלְּפָנַי
  chosen: from before me
  alternatives:
  - from my presence
  - from before my face
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the spatial-relational idiom
    and matches the repeated לְפָנַי later in the verse.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic, weighty,
    and preserves the force of the divine utterance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md
    contested terms table.
- source_word: זֶרַע יִשְׂרָאֵל
  chosen: the offspring of Israel
  alternatives:
  - the seed of Israel
  - the descendants of Israel
  lexicon: HALOT
  rationale: '''Offspring'' preserves the collective singular sense of זֶרַע while
    remaining natural English. ''Seed'' is more formal but less idiomatic here; ''descendants''
    loses the singular collective nuance.'
- source_word: יִשְׁבְּתוּ
  chosen: will cease
  alternatives:
  - will come to an end
  - will stop
  lexicon: HALOT
  rationale: The verb שבת here means to cease from a state or function. 'Will cease'
    is concise and preserves the solemn conditional force.
- source_word: מֵהְיוֹת גּוֹי
  chosen: from being a nation
  alternatives:
  - from being a people
  - from existing as a nation
  lexicon: HALOT
  rationale: גּוֹי ordinarily means 'nation' here, emphasizing Israel's continued
    corporate national identity rather than merely ethnic peoplehood.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in my presence
  lexicon: HALOT
  rationale: Keeps the repeated covenantal-relational phrase concise and parallel
    with the earlier 'from before me.'
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - forever
  - always
  - all time
  lexicon: HALOT
  rationale: A more literal rendering preserves the Hebrew idiom and avoids prematurely
    collapsing it into the interpretive gloss 'forever,' though the sense is enduring
    continuity.
