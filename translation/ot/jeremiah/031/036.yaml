theological_decisions:
- issue: Whether to render the promise in a way that weakens Israel's enduring corporate
    identity
  chosen_reading: Retain 'the offspring of Israel ... being a nation before me' in
    straightforward terms
  alternative_readings:
  - Paraphrastic renderings that generalize the promise to a non-national or purely
    spiritual continuity
  rationale: The Hebrew explicitly speaks of Israel's offspring ceasing from being
    'a nation' before the LORD only if the fixed cosmic order departs. The translation
    preserves that corporate-national language without importing later theological
    systems or narrowing the referent beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
