theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Implicit subject of וְשָׁבוּ
  chosen_reading: they will return
  alternative_readings:
  - your children will return
  - the exiles will return
  rationale: The Hebrew verb has an implicit third-person plural subject. Supplying
    'they' in the main text preserves the source's terseness and avoids importing
    a fuller subject from the surrounding context, though the referent is contextually
    Rachel's children/exiles.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
