id: JER.31.16
reference: Jeremiah 31:16
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה מִנְעִ֤י קוֹלֵ/ךְ֙ מִ/בֶּ֔כִי וְ/עֵינַ֖יִ/ךְ מִ/דִּמְעָ֑ה
    כִּי֩ יֵ֨שׁ שָׂכָ֤ר לִ/פְעֻלָּתֵ/ךְ֙ נְאֻם יְהוָ֔ה וְ/שָׁ֖בוּ מֵ/אֶ֥רֶץ אוֹיֵֽב׀־׃
translation:
  text: 'Thus says the LORD: Restrain your voice from weeping and your eyes from tears,
    for there is a reward for your work, declares the LORD, and they will return from
    the land of the enemy.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hold back your voice from crying.'
    reason: lexical_alternative
  - marker: b
    text: The implied subject of 'they will return' is Rachel's children, that is,
      the exiles spoken of in the surrounding context.
    reason: cross_reference
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. יְהוָה is rendered 'the LORD' per
    doctrine default for the divine name.
- source_word: מִנְעִי
  chosen: Restrain
  alternatives:
  - Hold back
  - Keep back
  lexicon: HALOT
  rationale: Imperative feminine singular from מנע, addressing Rachel personified.
    'Restrain' fits the direct exhortation and reads naturally in English without
    over-paraphrase.
- source_word: קוֹלֵךְ מִבֶּכִי
  chosen: your voice from weeping
  alternatives:
  - your voice from crying
  - your voice from weeping aloud
  lexicon: HALOT
  rationale: Literally 'your voice from weeping.' Retaining 'voice' preserves the
    Hebrew imagery rather than flattening it to simply 'stop weeping.' 'Weeping' is
    slightly more formal and lament-oriented than 'crying.'
- source_word: וְעֵינַיִךְ מִדִּמְעָה
  chosen: and your eyes from tears
  alternatives:
  - and your eyes from tearfulness
  - and your eyes from shedding tears
  lexicon: HALOT
  rationale: A parallel expression to the previous clause. The concise rendering preserves
    the concrete bodily imagery of the Hebrew.
- source_word: כִּי יֵשׁ שָׂכָר
  chosen: for there is a reward
  alternatives:
  - for there is wages
  - for there is recompense
  lexicon: HALOT
  rationale: שָׂכָר denotes reward, wages, or recompense. 'Reward' is the most natural
    English here and avoids implying merely commercial payment while preserving the
    promise of divine recompense.
- source_word: לִפְעֻלָּתֵךְ
  chosen: for your work
  alternatives:
  - for your labor
  - for your deed
  lexicon: HALOT
  rationale: פְעֻלָּה can mean work, labor, or deed. 'Work' is broad and natural;
    'labor' is possible but slightly narrower and more idiomatic in some traditions.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic affirmation formula. 'Declares the LORD' is idiomatic
    modern English and preserves the solemn force of נְאֻם.
- source_word: וְשָׁבוּ
  chosen: and they will return
  alternatives:
  - and they shall return
  - and they will come back
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functioning
    futurally. The subject is implicit plural, best rendered 'they,' referring to
    the children/exiles in context.
- source_word: מֵאֶרֶץ אוֹיֵב
  chosen: from the land of the enemy
  alternatives:
  - from the enemy's land
  - from a land of enemies
  lexicon: HALOT
  rationale: Singular אוֹיֵב is best taken collectively or generically. 'The land
    of the enemy' preserves the Hebrew construction and the exile context.
