id: JER.19.11
reference: Jeremiah 19:11
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֨ אֲלֵי/הֶ֜ם כֹּה אָמַ֣ר יְהוָ֣ה צְבָא֗וֹת כָּ֣כָה אֶשְׁבֹּ֞ר
    אֶת הָ/עָ֤ם הַ/זֶּה֙ וְ/אֶת הָ/עִ֣יר הַ/זֹּ֔את כַּ/אֲשֶׁ֤ר יִשְׁבֹּר֙ אֶת כְּלִ֣י
    הַ/יּוֹצֵ֔ר אֲשֶׁ֛ר לֹֽא יוּכַ֥ל לְ/הֵרָפֵ֖ה ע֑וֹד וּ/בְ/תֹ֣פֶת יִקְבְּר֔וּ מֵ/אֵ֥ין
    מָק֖וֹם לִ/קְבּֽוֹר־׀־־־־׃
translation:
  text: 'And you shall say to them, ‘Thus says the LORD of hosts: In this way I will
    break this people and this city, as one breaks a potter’s vessel that cannot be
    repaired again; and in Topheth they will bury, because there is no place to bury.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “as one breaks a potter’s jar.” The Hebrew says “potter’s vessel,” a
      broader term than “jar.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “that cannot be healed again”; here the sense is that the broken
      pottery cannot be repaired.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md,
    preserving Jewish reverence convention and established English Bible practice.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: Retains the established title sense in a readable but still formal way.
    'Hosts' preserves the breadth of heavenly/earthly armies better than narrowing
    to merely military forces.
- source_word: כָּכָה
  chosen: In this way
  alternatives:
  - Thus
  - So
  lexicon: HALOT
  rationale: Distinguishes this adverb from the earlier כֹּה introducing the divine
    speech. 'In this way' points to the enacted sign of breaking the vessel.
- source_word: אֶשְׁבֹּר
  chosen: I will break
  alternatives:
  - I will smash
  lexicon: HALOT
  rationale: Keeps the verbal link with יִשְׁבֹּר later in the verse and matches the
    sign-act imagery. 'Smash' is possible but slightly more interpretive.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  lexicon: HALOT
  rationale: '''People'' is the plain sense and fits Jeremiah''s covenantal address.
    ''Nation'' is possible but less direct here.'
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  lexicon: HALOT
  rationale: Direct, literal rendering of the phrase, referring to Jerusalem in context.
- source_word: כְּלִי הַיּוֹצֵר
  chosen: a potter’s vessel
  alternatives:
  - the potter's jar
  - a potter's container
  lexicon: HALOT
  rationale: כְּלִי is a broad term for an article/container/vessel. 'Vessel' preserves
    the generality while fitting the pottery image established in the chapter. 'Jar'
    is too specific for the Hebrew here, though contextually related.
- source_word: לֹא יוּכַל לְהֵרָפֵה עוֹד
  chosen: that cannot be repaired again
  alternatives:
  - that cannot be healed anymore
  - that cannot be made whole again
  lexicon: HALOT
  rationale: The Niphal infinitive of רפא is literally 'to be healed,' but for a broken
    pottery vessel idiomatic English calls for 'repaired.' 'Again' renders עוֹד.
- source_word: וּבְתֹפֶת
  chosen: and in Topheth
  alternatives:
  - and at Topheth
  lexicon: HALOT
  rationale: Topheth is a place name and is transliterated per project policy for
    names. 'In' reflects the prefixed preposition ב in a natural way for burial location.
- source_word: יִקְבְּרוּ
  chosen: they will bury
  alternatives:
  - they will bury the dead
  - they will be buried
  lexicon: HALOT
  rationale: The verb is active 3mp, not passive. The object is left implicit in Hebrew
    and need not be supplied in English, though the burial context makes it clear.
- source_word: מֵאֵין מָקוֹם לִקְבּוֹר
  chosen: because there is no place to bury
  alternatives:
  - for lack of a place to bury
  - since there is no place for burial
  lexicon: HALOT
  rationale: 'This idiom expresses cause: burial will occur in Topheth due to the
    absence of burial space elsewhere. The chosen rendering is natural English while
    preserving the causal force.'
