id: JER.19.3
reference: Jeremiah 19:3
source:
  edition: WLC
  text: וְ/אָֽמַרְתָּ֙ שִׁמְע֣וּ דְבַר יְהוָ֔ה מַלְכֵ֣י יְהוּדָ֔ה וְ/יֹשְׁבֵ֖י יְרֽוּשָׁלִָ֑ם
    כֹּֽה אָמַר֩ יְהוָ֨ה צְבָא֜וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֗ל הִנְ/נִ֨י מֵבִ֤יא רָעָה֙ עַל
    הַ/מָּק֣וֹם הַ/זֶּ֔ה אֲשֶׁ֥ר כָּל שֹׁמְעָ֖/הּ תִּצַּ֥לְנָה אָזְנָֽי/ו־־־־׃
translation:
  text: 'And say, ‘Hear the word of the LORD, O kings of Judah and inhabitants of
    Jerusalem. Thus says the LORD of hosts, the God of Israel: Behold, I am bringing
    disaster on this place, at which everyone who hears of it—his ears will tingle.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calamity'; the Hebrew term can denote harmful judgment rather than moral
      evil.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his ears will tingle,' an idiom for being shocked or horrified by
      what is heard.
    reason: cultural_note
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: And say
  alternatives:
  - Then say
  - And you shall say
  lexicon: HALOT
  rationale: Consecutive form introducing Jeremiah's commanded speech. 'And say' is
    natural and sufficiently formal without over-specifying tense.
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative plural calling for attention to a prophetic proclamation.
    'Hear' preserves the biblical register and covenantal resonance.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula; 'word' preserves the formal and theological
    force of divine speech.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: מַלְכֵי יְהוּדָה
  chosen: O kings of Judah
  alternatives:
  - kings of Judah
  lexicon: HALOT
  rationale: Vocative force is explicit in context; 'O' appropriately marks direct
    address in prophetic speech.
- source_word: וְיֹשְׁבֵי יְרוּשָׁלִָם
  chosen: and inhabitants of Jerusalem
  alternatives:
  - and those who dwell in Jerusalem
  - and residents of Jerusalem
  lexicon: HALOT
  rationale: '''Inhabitants'' is a clear, idiomatic rendering of the participial noun
    and fits prophetic address.'
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; concise and natural in English.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD of armies
  lexicon: HALOT
  rationale: Established rendering that preserves the title's weight and breadth better
    than a more wooden 'armies.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying Israel's covenant God.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  - Here I am
  lexicon: HALOT
  rationale: Introduces a solemn divine announcement. 'Behold' retains prophetic gravity;
    the following clause supplies the action rather than self-identification.
- source_word: מֵבִיא
  chosen: I am bringing
  alternatives:
  - I will bring
  lexicon: HALOT
  rationale: The participle with הִנְנִי often conveys imminent action. 'I am bringing'
    preserves the vividness and immediacy.
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - calamity
  lexicon: HALOT
  rationale: In judgment contexts this noun commonly denotes calamity/disaster rather
    than moral evil. 'Disaster' is clear modern English and avoids theological misunderstanding.
- source_word: עַל הַמָּקוֹם הַזֶּה
  chosen: on this place
  alternatives:
  - against this place
  - upon this place
  lexicon: HALOT
  rationale: '''On this place'' is a natural rendering of עַל with a locale under
    judgment; ''against'' is possible but slightly more interpretive.'
- source_word: אֲשֶׁר כָּל שֹׁמְעָהּ
  chosen: at which everyone who hears of it
  alternatives:
  - which everyone who hears it
  - so that everyone who hears of it
  lexicon: HALOT
  rationale: The relative clause points to the reported disaster affecting the place.
    'Hears of it' makes explicit the object suffix referring back to the announced
    calamity/place event.
- source_word: תִּצַּלְנָה אָזְנָיו
  chosen: his ears will tingle
  alternatives:
  - his ears will ring
  lexicon: HALOT
  rationale: Idiomatic expression for shocking horror, also found elsewhere in Hebrew
    narrative and prophecy. 'Tingle' is the standard English equivalent and preserves
    the metaphor.
