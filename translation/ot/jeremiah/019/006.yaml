id: JER.19.6
reference: Jeremiah 19:6
source:
  edition: WLC
  text: לָ/כֵ֞ן הִנֵּֽה יָמִ֤ים בָּאִים֙ נְאֻם יְהוָ֔ה וְ/לֹא יִקָּרֵא֩ לַ/מָּק֨וֹם הַ/זֶּ֥ה ע֛וֹד הַ/תֹּ֖פֶת וְ/גֵ֣יא בֶן הִנֹּ֑ם כִּ֖י אִם גֵּ֥יא הַ/הֲרֵגָֽה־־־־־׃
translation:
  text: Therefore, behold, days are coming, declares Yahweh, when this place will no longer be called Topheth or the Valley of Ben-hinnom, but the Valley of Slaughter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Topheth: also spelled ''Tophet'' in English.'
    reason: lexical_alternative
  - marker: b
    text: Ben-hinnom is the Hebrew place name traditionally rendered 'the son of Hinnom'; later Jewish and Christian usage associates this valley with 'Gehenna,' but that later term is not used here.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks a consequential transition from the preceding judgment oracle; 'Therefore' preserves the inferential force in natural English.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - indeed
  lexicon: HALOT
  rationale: Introduces an emphatic prophetic announcement. 'Look' is readable modern English and retains the deictic force better than omitting it; 'behold' would sound archaic.
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are about to come
  lexicon: HALOT
  rationale: Standard prophetic idiom announcing an impending future event. The anarthrous Hebrew is well represented by 'days are coming' without forcing the article.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A conventional prophetic formula. 'Declares the LORD' is idiomatic, weighty, and transparent. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in line with the doctrine table.
- source_word: וְלֹא יִקָּרֵא
  chosen: will no longer be called
  alternatives:
  - will not be called anymore
  - will cease to be called
  lexicon: HALOT
  rationale: The Niphal of קרא here is passive ('be called/named'). Combining it with עוֹד yields the natural English 'will no longer be called'.
- source_word: לַמָּקוֹם הַזֶּה
  chosen: this place
  alternatives:
  - the place הזה
  - this site
  lexicon: HALOT
  rationale: Direct and idiomatic rendering of the demonstrative phrase referring to the specific location under judgment.
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - any longer
  - again
  lexicon: HALOT
  rationale: In context with negation, עוֹד indicates cessation of the former designation; 'no longer' is the most natural English expression.
- source_word: הַתֹּפֶת
  chosen: Topheth
  alternatives:
  - Tophet
  lexicon: HALOT
  rationale: A place name, so transliteration is preferred. 'Topheth' closely reflects the Hebrew form; the common English variant 'Tophet' is worth preserving in a footnote.
- source_word: גֵיא בֶן הִנֹּם
  chosen: the Valley of Ben-hinnom
  alternatives:
  - the Valley of the Son of Hinnom
  - Gehenna
  lexicon: HALOT
  rationale: A toponym best rendered transparently from the Hebrew components. 'Ben-hinnom' preserves the name-like quality better than paraphrasing 'son of Hinnom.' 'Gehenna' would import later usage not present in this verse.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - rather
  - except that
  lexicon: HALOT
  rationale: Here the pair introduces a replacement name in contrast to the former one; 'but' is concise and idiomatic.
- source_word: גֵּיא הַהֲרֵגָה
  chosen: the Valley of Slaughter
  alternatives:
  - the Valley of Killing
  - the Valley of the Slaughter
  lexicon: HALOT
  rationale: הֲרֵגָה denotes slaughter/killing. 'Valley of Slaughter' is the established and most natural English rendering, preserving the grim force of the renaming.
