theological_decisions:
- issue: Anthropomorphic expression for God's inner disposition
  chosen_reading: nor did it come up upon my heart
  alternative_readings:
  - nor did it enter my mind
  rationale: The Hebrew uses 'heart,' and the translation preserves that theological
    and anthropomorphic tension rather than resolving it into a purely cognitive English
    idiom. This avoids importing a narrower claim about divine cognition while retaining
    the text's force of abhorrence and non-authorization.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
