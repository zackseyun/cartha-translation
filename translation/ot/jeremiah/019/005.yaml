id: JER.19.5
reference: Jeremiah 19:5
source:
  edition: WLC
  text: וּ/בָנ֞וּ אֶת בָּמ֣וֹת הַ/בַּ֗עַל לִ/שְׂרֹ֧ף אֶת בְּנֵי/הֶ֛ם בָּ/אֵ֖שׁ עֹל֣וֹת
    לַ/בָּ֑עַל אֲשֶׁ֤ר לֹֽא צִוִּ֨יתִי֙ וְ/לֹ֣א דִבַּ֔רְתִּי וְ/לֹ֥א עָלְתָ֖ה עַל
    לִבִּֽ/י־־־־׃פ
translation:
  text: They have built the high places of Baal to burn their sons in the fire as
    burnt offerings to Baal—something I did not command or speak of, nor did it come
    up upon my heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'nor did it enter my mind.' The Hebrew literally says, 'nor did it come
      up upon my heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָנוּ
  chosen: They have built
  alternatives:
  - And they built
  - They built
  lexicon: HALOT
  rationale: Qal perfect 3cp of בנה. In prophetic accusation, the perfect can be rendered
    as English present perfect to convey a completed action with present relevance.
    'They have built' preserves the force of the indictment in context.
- source_word: בָּמוֹת
  chosen: high places
  alternatives:
  - shrines
  - cultic heights
  lexicon: HALOT
  rationale: Standard rendering for בָּמוֹת in idolatrous worship contexts. 'High
    places' preserves the established cultic sense without over-paraphrase.
- source_word: הַבַּעַל / לַבָּעַל
  chosen: Baal
  alternatives:
  - the Baal
  lexicon: HALOT
  rationale: Proper-name usage is most natural in English here. Although the Hebrew
    includes the article in one occurrence, English idiom normally renders the deity's
    name simply as 'Baal.'
- source_word: לִשְׂרֹף
  chosen: to burn
  alternatives:
  - for burning
  lexicon: HALOT
  rationale: 'Infinitive construct expressing purpose: they built the high places
    for the purpose of burning their sons.'
- source_word: בְּנֵיהֶם
  chosen: their sons
  alternatives:
  - their children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'sons,' not the more general 'children.'
    This follows the gender-accurate principle and avoids flattening the lexical specificity.
- source_word: בָּאֵשׁ
  chosen: in the fire
  alternatives:
  - with fire
  lexicon: HALOT
  rationale: The preposition ב here is best rendered locatively/instrumentally as
    'in the fire,' which is also the idiomatic English expression in this sacrificial
    context.
- source_word: עֹלוֹת
  chosen: as burnt offerings
  alternatives:
  - burnt offerings
  - offerings to be burned
  lexicon: HALOT
  rationale: עֹלוֹת is the technical sacrificial term for whole burnt offerings. 'As
    burnt offerings' makes explicit its predicative relation to the sons being burned.
- source_word: אֲשֶׁר לֹא צִוִּיתִי
  chosen: something I did not command
  alternatives:
  - which I did not command
  lexicon: HALOT
  rationale: The relative clause refers back to the practice just described. 'Something
    I did not command' is idiomatic and clear in English.
- source_word: וְלֹא דִבַּרְתִּי
  chosen: or speak of
  alternatives:
  - nor did I speak
  - or mention
  lexicon: HALOT
  rationale: דבר here means to speak/say regarding the matter. 'Speak of' is natural
    English and preserves the sense that God never even articulated such a command.
- source_word: וְלֹא עָלְתָה עַל לִבִּי
  chosen: nor did it come up upon my heart
  alternatives:
  - nor did it enter my mind
  - nor did it arise in my heart
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'did not come up upon my heart.' To preserve
    the anthropomorphic and affective force of לֵב/heart, the main text keeps 'heart'
    rather than replacing it with the more interpretive 'mind.'
