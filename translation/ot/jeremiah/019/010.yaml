id: JER.19.10
reference: Jeremiah 19:10
source:
  edition: WLC
  text: וְ/שָׁבַרְתָּ֖ הַ/בַּקְבֻּ֑ק לְ/עֵינֵי֙ הָֽ/אֲנָשִׁ֔ים הַ/הֹלְכִ֖ים אוֹתָֽ/ךְ׃
translation:
  text: Then you shall break the flask before the eyes of the men who are going with
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in the sight of the men who go with you."
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁבַרְתָּ
  chosen: Then you shall break
  alternatives:
  - And you shall break
  - Then break
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in prophetic instruction context
    functions as a directive in sequence. 'Then you shall break' captures the waw-linked
    action following prior commands and reads naturally in English.
- source_word: הַבַּקְבֻּק
  chosen: the flask
  alternatives:
  - the jar
  - the bottle
  lexicon: HALOT
  rationale: Refers to a narrow-necked earthenware vessel used symbolically in this
    enacted prophecy. 'Flask' best fits the likely shape and preserves the concreteness
    of the sign-act better than the broader 'jar'.
- source_word: לְעֵינֵי
  chosen: before the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: Idiomatic Hebrew meaning in the visible presence of witnesses. 'Before
    the eyes of' is slightly more formal but preserves the vividness of the Hebrew
    expression.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  lexicon: HALOT
  rationale: The noun is specifically 'men,' not a generic term for people. Per gender-accurate
    philosophy, the masculine form is retained unless context clearly broadens it.
- source_word: הַהֹלְכִים אֹתָךְ
  chosen: who are going with you
  alternatives:
  - who go with you
  - accompanying you
  lexicon: HALOT
  rationale: The participle denotes those presently accompanying Jeremiah. 'Who are
    going with you' is a transparent rendering of the Hebrew construction and keeps
    the ongoing sense.
