id: JER.19.12
reference: Jeremiah 19:12
source:
  edition: WLC
  text: כֵּֽן אֶעֱשֶׂ֞ה לַ/מָּק֥וֹם הַ/זֶּ֛ה נְאֻם יְהוָ֖ה וּ/לְ/יֽוֹשְׁבָ֑י/ו וְ/לָ/תֵ֛ת אֶת הָ/עִ֥יר הַ/זֹּ֖את כְּ/תֹֽפֶת־־־׃
translation:
  text: So I will do to this place, declares Yahweh, and to its inhabitants, making this city like Topheth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Topheth was the site in the Valley of Ben Hinnom associated with child sacrifice and later defilement and judgment; the comparison signals that Jerusalem will become a place of horror and uncleanness.
    reason: cultural_note
lexical_decisions:
- source_word: כֵּן
  chosen: So
  alternatives:
  - Thus
  - In this way
  lexicon: HALOT
  rationale: Introduces the consequence/application of the preceding sign-act and oracle. 'So' is natural modern English and preserves the inferential force.
- source_word: אֶעֱשֶׂה
  chosen: I will do
  alternatives:
  - I will act
  - I will do this
  lexicon: HALOT
  rationale: The verb עשה is broad ('do/make/act'). 'I will do' keeps the directness of the Hebrew and allows the following complements to specify the action.
- source_word: לַמָּקוֹם הַזֶּה
  chosen: to this place
  alternatives:
  - against this place
  - for this place
  lexicon: HALOT
  rationale: The preposition ל here marks the object affected by the announced action. 'To this place' is a close rendering; English readers will understand the hostile force from context without over-interpreting it as 'against' in the main text.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic, weighty, and preserves the formal prophetic register.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH per DOCTRINE.md.
- source_word: וּלְיֹשְׁבָיו
  chosen: and to its inhabitants
  alternatives:
  - and to those who dwell in it
  - and against its inhabitants
  lexicon: HALOT
  rationale: יֹשְׁבִים with pronominal suffix refers to the people living in the place/city. 'Its inhabitants' is concise and natural.
- source_word: וְלָתֵת
  chosen: making
  alternatives:
  - and making
  - and to make
  - so as to make
  lexicon: HALOT
  rationale: The infinitive construct with prefixed conjunction continues and specifies the result/purpose of the announced action. Rendering it as 'making' gives smooth English while preserving the connection to the prior clause.
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  alternatives:
  - the city, this one
  lexicon: HALOT
  rationale: Straightforward demonstrative phrase referring specifically to Jerusalem in context.
- source_word: כְּתֹפֶת
  chosen: like Topheth
  alternatives:
  - as Topheth
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Like Topheth' clearly signals that the city will become comparable to Topheth, the defiled place of judgment and burning in the Valley of Ben Hinnom.
