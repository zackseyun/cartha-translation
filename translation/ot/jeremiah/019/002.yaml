id: JER.19.2
reference: Jeremiah 19:2
source:
  edition: WLC
  text: וְ/יָצָ֨אתָ֙ אֶל גֵּ֣יא בֶן הִנֹּ֔ם אֲשֶׁ֕ר פֶּ֖תַח שַׁ֣עַר ה/חרסות וְ/קָרָ֣אתָ
    שָּׁ֔ם אֶת הַ/דְּבָרִ֖ים אֲשֶׁר אֲדַבֵּ֥ר אֵלֶֽי/ךָ־־־־׃
translation:
  text: and go out to the Valley of Ben Hinnom, which is at the entrance of the Potsherd
    Gate, and proclaim there the words that I will speak to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Gate of Potsherds'; the Hebrew gate name is somewhat uncertain,
      and some retain it more formally as 'the Harsith Gate.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְיָצָאתָ
  chosen: and go out
  alternatives:
  - and you shall go out
  - then go out
  lexicon: HALOT
  rationale: Qal perfect with prefixed waw in instruction sequence; in English imperative-like
    force is best conveyed as a command. 'Go out' preserves the directional nuance
    of יצא.
- source_word: גֵּיא בֶן הִנֹּם
  chosen: the Valley of Ben Hinnom
  alternatives:
  - the Valley of the Son of Hinnom
  - Gehenna
  lexicon: HALOT
  rationale: A place name is best preserved by transliteration of the personal element
    'Ben Hinnom.' 'Gehenna' would import later associations not explicit in Jeremiah
    here. 'Valley of the Son of Hinnom' is more literal but less natural in English
    and obscures the toponymic force.
- source_word: אֲשֶׁר פֶּתַח שַׁעַר הַחַרְסוּת
  chosen: which is at the entrance of the Potsherd Gate
  alternatives:
  - which is by the entrance of the Potsherd Gate
  - which is at the entrance of the Gate of Potsherds
  - which is at the entrance of the Harsith Gate
  lexicon: HALOT
  rationale: פֶּתַח שַׁעַר is naturally 'entrance of the gate/gate entrance.' הַחַרְסוּת
    is traditionally understood from חרשׂ/חרס in connection with pottery or potsherds,
    fitting the chapter's pottery imagery. 'Potsherd Gate' gives a transparent English
    rendering while preserving the likely sense. Because the exact gate name is somewhat
    uncertain, alternatives are preserved in a footnote.
- source_word: וְקָרָאתָ
  chosen: and proclaim
  alternatives:
  - and call out
  - and cry out
  - and speak
  lexicon: HALOT
  rationale: קרא in prophetic contexts often means to call out publicly or proclaim.
    'Proclaim' captures the public, declarative force better than the more generic
    'speak.'
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb; 'there' is the direct equivalent.
- source_word: אֶת־הַדְּבָרִים
  chosen: the words
  alternatives:
  - the message
  - these words
  lexicon: HALOT
  rationale: דְּבָרִים is literally 'words.' 'Message' is possible dynamically, but
    'words' better preserves the formal link to divine speech.
- source_word: אֲשֶׁר אֲדַבֵּר אֵלֶיךָ
  chosen: that I will speak to you
  alternatives:
  - that I will tell you
  - which I am about to speak to you
  lexicon: HALOT
  rationale: The relative clause is straightforward future divine speech to Jeremiah.
    'Speak to you' is more formally aligned than 'tell you.'
