id: JER.19.4
reference: Jeremiah 19:4
source:
  edition: WLC
  text: יַ֣עַן אֲשֶׁ֣ר עֲזָבֻ֗/נִי וַֽ/יְנַכְּר֞וּ אֶת הַ/מָּק֤וֹם הַ/זֶּה֙ וַ/יְקַטְּרוּ
    ב/וֹ֙ לֵ/אלֹהִ֣ים אֲחֵרִ֔ים אֲשֶׁ֧ר לֹֽא יְדָע֛וּ/ם הֵ֥מָּה וַ/אֲבֽוֹתֵי/הֶ֖ם
    וּ/מַלְכֵ֣י יְהוּדָ֑ה וּ/מָֽלְא֛וּ אֶת הַ/מָּק֥וֹם הַ/זֶּ֖ה דַּ֥ם נְקִיִּֽם׀־־־־׃
translation:
  text: Because they have forsaken me and made this place foreign, and have burned
    incense in it to other gods whom neither they nor their fathers nor the kings
    of Judah had known, and they have filled this place with the blood of innocents,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'defiled this place' or 'treated this place as foreign.' The Hebrew verb
      carries the sense of making something foreign or estranged.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the blood of innocents'; many English versions render this idiomatically
      as 'innocent blood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Because that
  - Inasmuch as
  lexicon: HALOT
  rationale: Introduces the reason for the coming judgment. 'Because' is natural modern
    English and adequately reflects the causal force of the Hebrew expression.
- source_word: עֲזָבֻנִי
  chosen: they have forsaken me
  alternatives:
  - they have abandoned me
  lexicon: HALOT
  rationale: עזב commonly means 'forsake, abandon.' 'Forsaken' preserves covenantal
    and relational weight in prophetic discourse better than the more colloquial 'abandoned.'
- source_word: וַיְנַכְּרוּ אֶת־הַמָּקוֹם הַזֶּה
  chosen: made this place foreign
  alternatives:
  - alienated this place
  - defiled this place
  - treated this place as foreign
  lexicon: HALOT
  rationale: The piel of נכר here conveys making something foreign/estranged. Rather
    than importing the interpretive gloss 'defiled,' the translation keeps the more
    literal image that they rendered the place alien to its proper dedication to the
    LORD.
- source_word: וַיְקַטְּרוּ בוֹ
  chosen: have burned incense in it
  alternatives:
  - have offered sacrifices in it
  - have made offerings by fire in it
  lexicon: HALOT
  rationale: קטר in this stem commonly refers to burning incense or making smoke offerings.
    'Burned incense' is the most specific and common rendering in Jeremiah for illicit
    worship acts.
- source_word: לֵאלֹהִים אֲחֵרִים
  chosen: to other gods
  alternatives:
  - to foreign gods
  lexicon: HALOT
  rationale: אחרים straightforwardly means 'other.' 'Other gods' is the standard and
    clearest rendering; 'foreign gods' would overlap conceptually with the previous
    verb and add nuance not explicit here.
- source_word: אֲשֶׁר לֹא יְדָעוּם
  chosen: whom ... had known
  alternatives:
  - whom ... knew
  - whom ... had acknowledged
  lexicon: HALOT
  rationale: ידע here denotes acquaintance/recognition in worship history. English
    past perfect ('had known') fits the retrospective sense in the relative clause
    tied to ancestral and royal precedent.
- source_word: הֵמָּה וַאֲבוֹתֵיהֶם וּמַלְכֵי יְהוּדָה
  chosen: neither they nor their fathers nor the kings of Judah
  alternatives:
  - they, their fathers, and the kings of Judah
  lexicon: HALOT
  rationale: The sequence emphasizes that none of these groups had known these gods.
    'Neither ... nor ... nor' makes the negation explicit and natural in English.
- source_word: וּמָלְאוּ אֶת־הַמָּקוֹם הַזֶּה
  chosen: they have filled this place
  alternatives:
  - they filled this place
  lexicon: HALOT
  rationale: The perfect is rendered with present relevance in English ('have filled')
    to match the preceding verbal sequence and the accusatory tone.
- source_word: דַּם נְקִיִּם
  chosen: the blood of innocents
  alternatives:
  - innocent blood
  - the blood of the innocent
  lexicon: HALOT
  rationale: Literally 'blood of innocents.' This preserves the plural adjective's
    personal reference better than the more idiomatic but slightly less explicit 'innocent
    blood.'
