theological_decisions:
- issue: Rendering of נכר in the accusation against 'this place'
  chosen_reading: made this place foreign
  alternative_readings:
  - defiled this place
  - alienated this place
  rationale: The Hebrew verb's core sense concerns making foreign/estranged. 'Defiled'
    is interpretive and common in some translations, but the source text's imagery
    is better preserved by retaining the foreignness motif, which also coheres with
    the following reference to worship of other gods.
  doctrine_reference: Translation philosophy §1, §3, §5
