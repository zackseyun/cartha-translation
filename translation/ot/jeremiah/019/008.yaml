id: JER.19.8
reference: Jeremiah 19:8
source:
  edition: WLC
  text: וְ/שַׂמְתִּי֙ אֶת הָ/עִ֣יר הַ/זֹּ֔את לְ/שַׁמָּ֖ה וְ/לִ/שְׁרֵקָ֑ה כֹּ֚ל עֹבֵ֣ר
    עָלֶ֔י/הָ יִשֹּׁ֥ם וְ/יִשְׁרֹ֖ק עַל כָּל מַכֹּתֶֽ/הָ־־־׃
translation:
  text: And I will make this city a horror and an object of hissing; everyone who
    passes by it will be appalled and will hiss because of all its wounds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a desolation and a hissing.' The Hebrew nouns emphasize both the city's
      ruined state and the scorn it provokes.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be astonished and whistle/hiss.' The Hebrew uses conventional prophetic
      imagery for shocked derision at divine judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  chosen: And I will make
  alternatives:
  - And I will set
  - And I will make into
  lexicon: HALOT
  rationale: The verb שׂים commonly means 'set, place, make.' In this idiom with לְ
    plus result nouns, English 'make' best conveys the resulting state of the city.
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  lexicon: HALOT
  rationale: Straightforward demonstrative construction; 'this city' preserves the
    deictic force.
- source_word: לְשַׁמָּה
  chosen: a horror
  alternatives:
  - a desolation
  - an object of horror
  lexicon: HALOT
  rationale: שַׁמָּה denotes devastation that evokes horror/astonishment. 'A horror'
    captures both the ruined condition and the reaction it provokes in context.
- source_word: וְלִשְׁרֵקָה
  chosen: an object of hissing
  alternatives:
  - a hissing
  - an object of scorn
  lexicon: HALOT
  rationale: The noun from שרק refers to derisive hissing/whistling at a judged ruin.
    'An object of hissing' is idiomatic English and preserves the image better than
    the bare abstract noun.
- source_word: כֹּל עֹבֵר עָלֶיהָ
  chosen: everyone who passes by it
  alternatives:
  - all who pass by it
  - everyone passing over it
  lexicon: HALOT
  rationale: The participial phrase functions generically. 'Everyone who passes by
    it' is natural modern English and keeps the universal force of כֹּל.
- source_word: יִשֹּׁם
  chosen: will be appalled
  alternatives:
  - will be astonished
  - will be desolated
  lexicon: HALOT
  rationale: From שׁמם in this context, the sense is becoming appalled/astonished
    at devastation. 'Will be appalled' fits the judgment context and pairs well with
    the following hissing.
- source_word: וְיִשְׁרֹק
  chosen: will hiss
  alternatives:
  - will whistle
  - will hiss in derision
  lexicon: HALOT
  rationale: The verb שרק can denote whistling/hissing; in prophetic judgment contexts
    it commonly conveys derisive hissing. 'Will hiss' is the more established and
    contextually fitting rendering.
- source_word: עַל כָּל מַכֹּתֶיהָ
  chosen: because of all its wounds
  alternatives:
  - at all its blows
  - because of all its plagues
  lexicon: HALOT
  rationale: מַכָּה can mean blow, wound, plague, or stroke. Here it refers to the
    city's inflicted calamities/judgments. 'Wounds' vividly conveys the city's battered
    condition without narrowing to disease imagery.
