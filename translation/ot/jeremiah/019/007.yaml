theological_decisions:
- issue: Rendering of the divine speech of judgment
  chosen_reading: Retained the first-person sequence ('I will frustrate... I will
    make them fall... I will give') as direct divine action in judgment.
  alternative_readings:
  - More indirect renderings that soften agency, such as 'I will allow them to fall'
  rationale: The Hebrew verbs are explicit first-person divine actions. The translation
    preserves the text's portrayal of God's judicial sovereignty without softening
    or expanding it.
  doctrine_reference: Translation philosophy §1, §3
