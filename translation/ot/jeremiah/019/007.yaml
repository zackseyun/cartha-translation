id: JER.19.7
reference: Jeremiah 19:7
source:
  edition: WLC
  text: וּ֠/בַקֹּתִי אֶת עֲצַ֨ת יְהוּדָ֤ה וִ/ירוּשָׁלִַ֨ם֙ בַּ/מָּק֣וֹם הַ/זֶּ֔ה וְ/הִפַּלְתִּ֤י/ם
    בַּ/חֶ֨רֶב֙ לִ/פְנֵ֣י אֹֽיְבֵי/הֶ֔ם וּ/בְ/יַ֖ד מְבַקְשֵׁ֣י נַפְשָׁ֑/ם וְ/נָתַתִּ֤י
    אֶת נִבְלָתָ/ם֙ לְ/מַֽאֲכָ֔ל לְ/ע֥וֹף הַ/שָּׁמַ֖יִם וּ/לְ/בֶהֱמַ֥ת הָ/אָֽרֶץ־־׃
translation:
  text: And I will frustrate the plan of Judah and Jerusalem in this place, and I
    will make them fall by the sword before their enemies and by the hand of those
    who seek their life, and I will give their corpses as food to the birds of the
    heavens and to the beasts of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the counsel of Judah and Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'those who seek their life,' that is, those who seek to kill them.
    reason: lexical_alternative
  - marker: c
    text: Or 'the birds of the sky.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַקֹּתִי
  chosen: I will frustrate
  alternatives:
  - I will make void
  - I will thwart
  - I will empty out
  lexicon: HALOT
  rationale: From בקק in a causative sense, here idiomatically of rendering counsel
    ineffective or empty. 'Frustrate' communicates the sense naturally in English
    without over-paraphrasing.
- source_word: עֲצַת
  chosen: the plan
  alternatives:
  - the counsel
  - the strategy
  lexicon: HALOT
  rationale: עֵצָה can mean counsel, plan, or strategy. 'Plan' is clear modern English
    and fits the context of Judah and Jerusalem's intended course being nullified.
- source_word: יְהוּדָה וִירוּשָׁלַם
  chosen: Judah and Jerusalem
  rationale: Standard transliteration of the place names, preserving the political-religious
    pairing of kingdom and capital.
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: in this place
  alternatives:
  - at this place
  lexicon: HALOT
  rationale: Straightforward locative phrase; 'in this place' is the most natural
    English rendering and preserves the deictic force.
- source_word: וְהִפַּלְתִּים
  chosen: I will make them fall
  alternatives:
  - I will cause them to fall
  - I will strike them down
  lexicon: HALOT
  rationale: Hiphil of נפל is causative. 'Make them fall' preserves the causative
    force more transparently than the more interpretive 'strike them down.'
- source_word: בַּחֶרֶב
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: HALOT
  rationale: Conventional and accurate instrumental expression for death in battle
    or slaughter.
- source_word: לִפְנֵי אֹיְבֵיהֶם
  chosen: before their enemies
  alternatives:
  - in the presence of their enemies
  lexicon: HALOT
  rationale: Keeps the spatial-relational sense of לִפְנֵי while remaining idiomatic.
- source_word: וּבְיַד מְבַקְשֵׁי נַפְשָׁם
  chosen: and by the hand of those who seek their life
  alternatives:
  - and into the hand of those who seek their life
  - and by those seeking to kill them
  lexicon: HALOT
  rationale: The idiom 'seek their life' is a close and intelligible rendering of
    מבקשי נפשם, preserving the Hebrew expression rather than flattening it entirely
    to 'kill them.' 'By the hand of' reflects the instrumental agency idiom.
- source_word: וְנָתַתִּי
  chosen: and I will give
  alternatives:
  - and I will hand over
  - and I will make
  lexicon: HALOT
  rationale: Common verb נתן; 'give' is sufficiently broad and lets the following
    phrase specify the grim result.
- source_word: נִבְלָתָם
  chosen: their corpses
  alternatives:
  - their carcasses
  - their dead bodies
  lexicon: HALOT
  rationale: נְבֵלָה denotes a carcass/corpse. 'Corpses' is natural for human bodies
    and preserves the dishonorable aftermath.
- source_word: לְמַאֲכָל
  chosen: as food
  alternatives:
  - for food
  lexicon: HALOT
  rationale: Both are possible; 'as food' reads smoothly after 'I will give their
    corpses' and preserves the predicative sense.
- source_word: לְעוֹף הַשָּׁמַיִם
  chosen: to the birds of the heavens
  alternatives:
  - to the birds of the sky
  - to the birds of heaven
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the elevated biblical diction. 'Heavens'
    reflects the Hebrew plural form, though in English it still clearly means the
    sky above.
- source_word: וּלְבֶהֱמַת הָאָרֶץ
  chosen: and to the beasts of the earth
  alternatives:
  - and to the animals of the earth
  - and to the beasts of the land
  lexicon: HALOT
  rationale: בְּהֵמָה here refers broadly to animals, especially scavenging beasts.
    'Beasts of the earth' preserves the solemn, prophetic register.
