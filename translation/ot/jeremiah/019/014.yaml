id: JER.19.14
reference: Jeremiah 19:14
source:
  edition: WLC
  text: וַ/יָּבֹ֤א יִרְמְיָ֨הוּ֙ מֵֽ/הַ/תֹּ֔פֶת אֲשֶׁ֨ר שְׁלָח֧/וֹ יְהוָ֛ה שָׁ֖ם לְ/הִנָּבֵ֑א
    וַֽ/יַּעֲמֹד֙ בַּ/חֲצַ֣ר בֵּית יְהוָ֔ה וַ/יֹּ֖אמֶר אֶל כָּל הָ/עָֽם־־־׃ס
translation:
  text: Then Jeremiah came from Topheth, where the LORD had sent him to prophesy,
    and he stood in the court of the house of the LORD and said to all the people,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Topheth was the site associated with Jeremiah's earlier prophetic sign and
      oracle in this chapter.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - returned
  lexicon: HALOT
  rationale: Qal wayyiqtol of בוא commonly means 'came/went' depending on viewpoint.
    In English narrative from the prior location back to Jerusalem/temple precincts,
    'came' is the most natural rendering.
- source_word: מֵהַתֹּפֶת
  chosen: from Topheth
  alternatives:
  - from the Topheth
  lexicon: HALOT
  rationale: Topheth is a place name, so it is transliterated rather than translated.
    The prefixed article is absorbed into the conventional English place-name form.
- source_word: אֲשֶׁר שְׁלָחוֹ יְהוָה שָׁם
  chosen: where the LORD had sent him
  alternatives:
  - which the LORD had sent him there
  - where the LORD sent him
  lexicon: HALOT
  rationale: The relative clause identifies Topheth as the place to which Jeremiah
    had been sent. English idiom prefers 'where' rather than a more wooden 'which
    ... there.' Pluperfect 'had sent' fits the prior action relative to his coming
    back.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: לְהִנָּבֵא
  chosen: to prophesy
  alternatives:
  - to speak as a prophet
  lexicon: HALOT
  rationale: The Niphal infinitive of נבא is well represented by the standard English
    verb 'to prophesy,' which is both accurate and readable.
- source_word: וַיַּעֲמֹד
  chosen: he stood
  alternatives:
  - he took his stand
  lexicon: HALOT
  rationale: עמד in this narrative setting straightforwardly means 'stood.' The more
    interpretive 'took his stand' adds emphasis not required by the Hebrew.
- source_word: בַּחֲצַר בֵּית יְהוָה
  chosen: in the court of the house of the LORD
  alternatives:
  - in the courtyard of the house of the LORD
  - in the court of the LORD's house
  lexicon: HALOT
  rationale: חצר is 'court/courtyard.' 'Court' is concise and natural here; 'house
    of the LORD' preserves the Hebrew construct chain without over-paraphrase.
- source_word: וַיֹּאמֶר אֶל כָּל הָעָם
  chosen: and said to all the people
  alternatives:
  - and spoke to all the people
  lexicon: HALOT
  rationale: אמר is the standard verb 'said.' 'All the people' preserves כל העם without
    narrowing the audience.
