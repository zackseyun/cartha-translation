theological_decisions:
- issue: Rendering the divine title יְהוָה צְבָאוֹת
  chosen_reading: the LORD of hosts
  alternative_readings:
  - Yahweh of hosts
  - the LORD of armies
  rationale: This follows the doctrinal default for YHWH as 'the LORD' while preserving
    the traditional prophetic title 'of hosts,' which carries covenantal and cosmic
    authority without unnecessary paraphrase.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (יְהוָה YHWH → the LORD)'
