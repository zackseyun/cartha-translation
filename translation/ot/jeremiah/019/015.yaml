id: JER.19.15
reference: Jeremiah 19:15
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר יְהוָ֤ה צְבָאוֹת֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל הִנְ/נִ֨י מבי אֶל הָ/עִ֤יר הַ/זֹּאת֙ וְ/עַל כָּל עָרֶ֔י/הָ אֵ֚ת כָּל הָ֣/רָעָ֔ה אֲשֶׁ֥ר דִּבַּ֖רְתִּי עָלֶ֑י/הָ כִּ֤י הִקְשׁוּ֙ אֶת עָרְפָּ֔/ם לְ/בִלְתִּ֖י שְׁמ֥וֹעַ אֶת דְּבָרָֽ/י־־־־־־־׃
translation:
  text: 'Thus says Yahweh of hosts, the God of Israel: Behold, I am bringing on this city and on all its towns all the disaster that I have spoken against it, because they have stiffened their neck so as not to hear my words.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all its cities.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all the calamity'; Hebrew רָעָה here refers to disaster brought in judgment, not moral evil.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'they have stiffened their neck,' an idiom for stubborn refusal.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'hosts' is the established and semantically broad rendering, preserving the sense of heavenly and earthly armies without over-narrowing.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct phrase rendered straightforwardly and idiomatically, preserving covenantal identification.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: The particle marks solemn immediacy and divine self-presentation. 'Behold' preserves prophetic gravity better than more colloquial alternatives.
- source_word: מבי
  chosen: bringing
  alternatives:
  - about to bring
  - bringing in
  lexicon: HALOT
  rationale: 'From בוא in a causative/bringing sense here: God is causing calamity to come upon the city. ''Bringing'' is natural English and fits the imminent judgment context.'
- source_word: אֶל ... וְעַל
  chosen: on ... and on
  alternatives:
  - against ... and against
  - upon ... and upon
  lexicon: HALOT
  rationale: The prepositions indicate the target of coming judgment. 'On' is idiomatic with 'bringing disaster on' in English; 'against' is possible but less natural with the governing verb chosen.
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  lexicon: HALOT
  rationale: Direct demonstrative reference preserved.
- source_word: כָּל עָרֶיהָ
  chosen: all its towns
  alternatives:
  - all its cities
  lexicon: HALOT
  rationale: עָרִים can mean cities or towns. Since the referent is Jerusalem and its dependent settlements, 'towns' better conveys subordinate surrounding urban places in contemporary English without denying urbanity.
- source_word: כָּל הָרָעָה
  chosen: all the disaster
  alternatives:
  - all the evil
  - all the calamity
  lexicon: HALOT
  rationale: In judgment contexts רָעָה often denotes calamity/disaster rather than moral evil. 'Disaster' communicates the inflicted judgment clearly in modern English.
- source_word: דִּבַּרְתִּי עָלֶיהָ
  chosen: I have spoken against it
  alternatives:
  - I spoke against it
  - I pronounced against it
  lexicon: HALOT
  rationale: The perfect can be rendered naturally in English as present perfect here, linking prior prophetic pronouncement with its now-imminent fulfillment. Singular 'it' refers back to 'city' as the primary antecedent.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for judgment. 'Because' is clearer in modern English than the more formal 'for.'
- source_word: הִקְשׁוּ אֶת עָרְפָּם
  chosen: they have stiffened their neck
  alternatives:
  - they have hardened their neck
  - they have made their neck stiff
  lexicon: HALOT
  rationale: This is a Hebrew idiom for stubborn rebellion. 'Stiffened their neck' preserves the metaphor while remaining understandable. Singular 'neck' reflects the Hebrew collective singular better than pluralizing.
- source_word: לְבִלְתִּי שְׁמֹעַ
  chosen: so as not to hear
  alternatives:
  - refusing to listen to
  - not to obey
  lexicon: HALOT
  rationale: 'The construction expresses purpose/result: they stiffened their neck with the effect/purpose of not hearing. ''Hear'' is retained rather than ''obey'' to preserve the lexical link to hearing God''s words, while still implying refusal.'
- source_word: דְּבָרַי
  chosen: my words
  alternatives:
  - my word
  lexicon: HALOT
  rationale: Plural form preserved. In prophetic context this refers to God's spoken messages collectively.
