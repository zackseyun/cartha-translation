theological_decisions:
- issue: Divine agency in the judgment
  chosen_reading: 'The verse is rendered with God as the direct cause: ''I will make
    them eat,'' preserving the first-person causative verb.'
  alternative_readings:
  - A softened permissive sense such as 'I will let them eat'
  rationale: The Hiphil first-person verb presents YHWH as actively bringing this
    covenant judgment, not merely permitting it. The translation preserves the severity
    of the prophetic announcement without theological softening.
  doctrine_reference: Translation philosophy §1, §3
- issue: Anthropological idiom in נֶפֶשׁ
  chosen_reading: '''seek their life'' is retained as an idiomatic expression.'
  alternative_readings:
  - seek their soul
  - seek to kill them
  rationale: Here נֶפֶשׁ refers to life rather than an abstract immaterial soul. Retaining
    the idiom avoids importing a narrower doctrinal anthropology while still communicating
    the threat of death.
  doctrine_reference: Translation philosophy §1, §3
