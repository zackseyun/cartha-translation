id: JER.19.9
reference: Jeremiah 19:9
source:
  edition: WLC
  text: וְ/הַֽאֲכַלְתִּ֞י/ם אֶת בְּשַׂ֣ר בְּנֵי/הֶ֗ם וְ/אֵת֙ בְּשַׂ֣ר בְּנֹתֵי/הֶ֔ם
    וְ/אִ֥ישׁ בְּשַׂר רֵעֵ֖/הוּ יֹאכֵ֑לוּ בְּ/מָצוֹר֙ וּ/בְ/מָצ֔וֹק אֲשֶׁ֨ר יָצִ֧יקוּ
    לָ/הֶ֛ם אֹיְבֵי/הֶ֖ם וּ/מְבַקְשֵׁ֥י נַפְשָֽׁ/ם־־׃
translation:
  text: And I will make them eat the flesh of their sons and the flesh of their daughters,
    and each man will eat the flesh of his neighbor in the siege and in the distress
    with which their enemies and those who seek their life will afflict them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and those who seek their lives'; the Hebrew idiom means those seeking
      to kill them.
    reason: lexical_alternative
  - marker: b
    text: Or 'during the siege and in the anguish' for 'in the siege and in the distress.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַאֲכַלְתִּים
  chosen: And I will make them eat
  alternatives:
  - And I will feed them
  - And I will cause them to eat
  lexicon: HALOT
  rationale: 'Hiphil of אכל is causative: not merely ''I will feed them'' in a positive
    sense, but ''I will cause/make them eat.'' ''Make them eat'' is idiomatic modern
    English and preserves the force of divine causation in judgment.'
- source_word: בְּשַׂר
  chosen: flesh
  alternatives:
  - meat
  - body
  lexicon: HALOT
  rationale: Literal 'flesh' best matches the Hebrew and preserves the horror of the
    cannibalism judgment. 'Meat' is too softened; 'body' is too broad.
- source_word: בְּנֵיהֶם
  chosen: their sons
  alternatives:
  - their children
  lexicon: HALOT
  rationale: The Hebrew specifically says 'their sons,' not the generic 'children.'
    This follows the gender-accurate principle and preserves the parallel with 'their
    daughters.'
- source_word: בְּנֹתֵיהֶם
  chosen: their daughters
  alternatives:
  - their children
  lexicon: HALOT
  rationale: The Hebrew specifically names daughters. Rendering both terms distinctly
    preserves the source's deliberate pairing.
- source_word: וְאִישׁ
  chosen: and each man
  alternatives:
  - and everyone
  - and each one
  lexicon: HALOT
  rationale: אִישׁ is singular 'man,' here distributive. 'Each man' preserves the
    grammar and the gender-accurate policy, while still conveying distributive force.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his companion
  - his friend
  lexicon: HALOT
  rationale: '''Neighbor'' is the most standard and contextually fitting rendering
    for רֵעַ here, referring to another person in the community. ''Friend'' would
    overstate affection; ''companion'' is possible but less natural.'
- source_word: בְּמָצוֹר
  chosen: in the siege
  alternatives:
  - during the siege
  lexicon: HALOT
  rationale: מָצוֹר denotes siege conditions. 'In the siege' is a close rendering
    of the prepositional phrase and works naturally in English.
- source_word: וּבְמָצוֹק
  chosen: and in the distress
  alternatives:
  - and in the straits
  - and in the anguish
  lexicon: HALOT
  rationale: מָצוֹק denotes distress, straits, or dire pressure. 'Distress' is clear
    modern English and pairs well with 'siege' without becoming archaic.
- source_word: אֲשֶׁר יָצִיקוּ לָהֶם
  chosen: with which ... will afflict them
  alternatives:
  - by which ... will oppress them
  - with which ... will press them hard
  lexicon: HALOT
  rationale: The relative clause modifies the siege/distress as the means by which
    the enemies bring suffering. 'Afflict' captures the severe oppressive force in
    readable English.
- source_word: אֹיְבֵיהֶם
  chosen: their enemies
  alternatives:
  - those hostile to them
  lexicon: HALOT
  rationale: Straightforward rendering of the noun with possessive suffix.
- source_word: וּמְבַקְשֵׁי נַפְשָׁם
  chosen: and those who seek their life
  alternatives:
  - and those who seek to kill them
  - and those seeking their lives
  lexicon: HALOT
  rationale: The idiom 'seek their life' is a standard biblical expression meaning
    to seek their death. It preserves the Hebrew idiom while remaining understandable
    in English.
