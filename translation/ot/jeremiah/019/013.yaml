id: JER.19.13
reference: Jeremiah 19:13
source:
  edition: WLC
  text: וְ/הָי֞וּ בָּתֵּ֣י יְרוּשָׁלִַ֗ם וּ/בָתֵּי֙ מַלְכֵ֣י יְהוּדָ֔ה כִּ/מְק֥וֹם
    הַ/תֹּ֖פֶת הַ/טְּמֵאִ֑ים לְ/כֹ֣ל הַ/בָּתִּ֗ים אֲשֶׁ֨ר קִטְּר֜וּ עַל גַּגֹּֽתֵי/הֶם֙
    לְ/כֹל֙ צְבָ֣א הַ/שָּׁמַ֔יִם וְ/הַסֵּ֥ךְ נְסָכִ֖ים לֵ/אלֹהִ֥ים אֲחֵרִֽים־׃פ
translation:
  text: The houses of Jerusalem and the houses of the kings of Judah will become like
    the unclean place of Topheth—all the houses on whose rooftops they burned incense
    to all the host of heaven and poured out drink offerings to other gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'defiled place of Topheth.'
    reason: lexical_alternative
  - marker: b
    text: '''Host of heaven'' refers to the heavenly bodies worshiped in astral idolatry.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיוּ
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: The verb היה with comparative כ in this context conveys resultant state
    ('become like'), not mere existence. 'Will become' reads naturally in English
    and reflects the judgment transformation announced.
- source_word: בָּתֵּי יְרוּשָׁלִַם
  chosen: the houses of Jerusalem
  alternatives:
  - Jerusalem's houses
  lexicon: HALOT
  rationale: Construct chain is rendered straightforwardly. The definite sense is
    supplied in English from the context.
- source_word: וּבָתֵּי מַלְכֵי יְהוּדָה
  chosen: and the houses of the kings of Judah
  alternatives:
  - and the royal houses of Judah
  lexicon: HALOT
  rationale: Keeps the parallel structure with 'the houses of Jerusalem.' 'Houses
    of the kings' likely refers to their residences/palaces, but the Hebrew uses the
    ordinary noun 'houses,' so that is retained.
- source_word: כִּמְקוֹם הַתֹּפֶת
  chosen: like the ... place of Topheth
  alternatives:
  - like Topheth
  - like the place Topheth
  lexicon: HALOT
  rationale: מָקוֹם is explicit and should not be omitted. Topheth is transliterated
    as a place-name. The comparison is to the defiled site associated with judgment.
- source_word: הַטְּמֵאִים
  chosen: unclean
  alternatives:
  - defiled
  - impure
  lexicon: HALOT
  rationale: The adjective marks ritual/moral defilement. 'Unclean' preserves the
    biblical register and links with impurity language without overinterpreting.
- source_word: לְכֹל הַבָּתִּים אֲשֶׁר
  chosen: all the houses on whose
  alternatives:
  - because of all the houses that
  - namely, all the houses that
  lexicon: HALOT
  rationale: 'The לְ here is best taken as introducing specification/apposition: the
    houses in view are all those where the following acts occurred. English smooths
    this as ''all the houses on whose...'' rather than a wooden ''to all the houses.'''
- source_word: קִטְּרוּ
  chosen: they burned incense
  alternatives:
  - they made offerings of smoke
  - they offered incense
  lexicon: HALOT
  rationale: Standard rendering for the Piel of קטר in cultic contexts. 'Burned incense'
    is idiomatic and precise.
- source_word: עַל גַּגֹּתֵיהֶם
  chosen: on whose rooftops
  alternatives:
  - on their roofs
  lexicon: HALOT
  rationale: Rooftop worship is a known practice in Jeremiah. 'Rooftops' is natural
    modern English and preserves the locative force.
- source_word: לְכֹל צְבָא הַשָּׁמַיִם
  chosen: to all the host of heaven
  alternatives:
  - to the whole host of heaven
  - to all the heavenly host
  lexicon: HALOT
  rationale: צְבָא הַשָּׁמַיִם is a stock expression for the celestial bodies conceived
    as an astral host. 'Host of heaven' preserves the biblical idiom; 'all' reflects
    כֹל.
- source_word: וְהַסֵּךְ נְסָכִים
  chosen: and poured out drink offerings
  alternatives:
  - and poured drink offerings
  - and made libation offerings
  lexicon: HALOT
  rationale: Infinitive absolute/coordinated verbal expression continues the description
    of illicit worship. 'Poured out drink offerings' is the standard cultic rendering.
- source_word: לֵאלֹהִים אֲחֵרִים
  chosen: to other gods
  alternatives:
  - for other gods
  lexicon: HALOT
  rationale: Direct and conventional rendering of the phrase for foreign/deviant deities
    in prophetic polemic.
