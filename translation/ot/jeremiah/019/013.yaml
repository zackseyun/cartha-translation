theological_decisions:
- issue: Rendering of טמא in a judgment context involving Topheth
  chosen_reading: unclean
  alternative_readings:
  - defiled
  rationale: The verse emphasizes the houses becoming like Topheth as a polluted place
    because of idolatrous practices. 'Unclean' preserves the impurity category without
    narrowing it only to physical defilement.
- issue: Reference of 'houses of the kings of Judah'
  chosen_reading: literal 'houses' retained
  alternative_readings:
  - palaces of the kings of Judah
  rationale: Although the referent may functionally be royal residences, the Hebrew
    noun is the common term 'houses.' Retaining it follows optimal equivalence and
    avoids interpretive expansion.
