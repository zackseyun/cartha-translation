id: JER.19.1
reference: Jeremiah 19:1
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה הָל֛וֹךְ וְ/קָנִ֥יתָ בַקְבֻּ֖ק יוֹצֵ֣ר חָ֑רֶשׂ וּ/מִ/זִּקְנֵ֣י
    הָ/עָ֔ם וּ/מִ/זִּקְנֵ֖י הַ/כֹּהֲנִֽים׃
translation:
  text: 'Thus says the LORD: Go and buy a potter’s earthenware flask, and take some
    of the elders of the people and some of the elders of the priests,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a potter’s clay jar' or 'a potter’s bottle.' The Hebrew בַקְבֻּק refers
      to a shaped vessel, likely narrow-necked.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from the elders of the people and from the elders of the priests,'
      indicating that Jeremiah is to take representatives from among both groups.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is how
  - So
  lexicon: HALOT
  rationale: Introduces a prophetic formula. 'Thus' preserves the formal prophetic
    register in natural English.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - said the LORD
  lexicon: HALOT
  rationale: The prophetic messenger formula is idiomatically rendered in English
    as present tense, 'says the LORD,' even with Hebrew qatal, to convey the immediacy
    of divine speech. 'the LORD' follows the doctrine default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name is rendered 'the LORD' rather than transliterated.
- source_word: הָלוֹךְ
  chosen: Go
  alternatives:
  - Go on
  - Walk
  lexicon: HALOT
  rationale: Infinitive absolute used imperativally with following verb; concise English
    imperative best captures the command.
- source_word: וְקָנִיתָ
  chosen: and buy
  alternatives:
  - and acquire
  - and purchase
  lexicon: HALOT
  rationale: Simple command in sequence with 'Go.' 'Buy' is the most natural and direct
    rendering.
- source_word: בַקְבֻּק
  chosen: flask
  alternatives:
  - jar
  - bottle
  lexicon: HALOT
  rationale: Refers to a narrow-necked vessel; 'flask' better captures the shape than
    the broader 'jar.'
- source_word: יוֹצֵר חָרֶשׂ
  chosen: potter’s earthenware
  alternatives:
  - a potter's clay vessel
  - a potter's pottery vessel
  lexicon: HALOT
  rationale: Construct phrase describing the vessel as made by a potter and of fired
    clay/earthenware. Rendering as an attributive phrase in English is natural and
    preserves both elements.
- source_word: וּמִזִּקְנֵי הָעָם
  chosen: and take some of the elders of the people
  alternatives:
  - and from the elders of the people
  - and take elders from the people
  lexicon: HALOT
  rationale: The preposition מן after an implied verb of taking indicates selection
    from among them. 'Some of the elders' makes the partitive sense explicit in English.
- source_word: וּמִזִּקְנֵי הַכֹּהֲנִים
  chosen: and some of the elders of the priests
  alternatives:
  - and some of the priestly elders
  - and from the elders of the priests
  lexicon: HALOT
  rationale: Parallel partitive phrase. 'Elders of the priests' is more formally transparent
    to the Hebrew than the interpretive 'priestly elders,' though the latter is a
    possible stylistic alternative.
