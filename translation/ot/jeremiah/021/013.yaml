id: JER.21.13
reference: Jeremiah 21:13
source:
  edition: WLC
  text: הִנְ/נִ֨י אֵלַ֜יִ/ךְ יֹשֶׁ֧בֶת הָ/עֵ֛מֶק צ֥וּר הַ/מִּישֹׁ֖ר נְאֻם יְהוָ֑ה
    הָ/אֹֽמְרִים֙ מִֽי יֵחַ֣ת עָלֵ֔י/נוּ וּ/מִ֥י יָב֖וֹא בִּ/מְעוֹנוֹתֵֽי/נוּ־־׃
translation:
  text: Behold, I am against you, O inhabitant of the valley, O rock of the plain,
    declares the LORD—you who say, “Who will come down against us, and who will enter
    into our dwellings?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Who will descend against us?' The Hebrew verb in this clause is difficult;
      the sense is that the city considers itself secure from attack.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'dwellings'; possibly with the nuance of secure habitations or strongholds.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - Here I am
  lexicon: HALOT
  rationale: Introduces a solemn divine announcement. 'Behold' preserves the prophetic
    force better than a flatter modern discourse marker.
- source_word: אֵלַיִךְ
  chosen: against you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: 'With הִנְנִי in judgment contexts, the idiom means hostile opposition:
    ''I am against you.'' The 2fs form addresses the city personified as feminine.'
- source_word: יֹשֶׁבֶת
  chosen: inhabitant
  alternatives:
  - dweller
  - you who dwell
  lexicon: HALOT
  rationale: A feminine singular participle modifying the addressed city/personified
    population. 'Inhabitant' is concise and natural in English while preserving the
    vocative sense.
- source_word: הָעֵמֶק
  chosen: the valley
  lexicon: HALOT
  rationale: Straightforward topographical term; retained literally.
- source_word: צוּר
  chosen: rock
  alternatives:
  - cliff
  - stronghold
  lexicon: HALOT
  rationale: The noun literally means 'rock.' In context it likely evokes defensibility,
    but the literal image should be preserved rather than interpreted as 'stronghold'
    in the main text.
- source_word: הַמִּישֹׁר
  chosen: the plain
  alternatives:
  - the level land
  - the plateau
  lexicon: HALOT
  rationale: Standard rendering for מִישׁוֹר. 'Plain' is idiomatic and preserves the
    geographical image.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Conventional prophetic formula. 'The LORD' follows the doctrinal default
    for יְהוָה.
- source_word: הָאֹמְרִים
  chosen: you who say
  alternatives:
  - those who say
  lexicon: HALOT
  rationale: Although morphologically plural, it refers to the inhabitants represented
    by the personified city. 'You who say' keeps the direct address coherent in English.
- source_word: מִי יֵחַת עָלֵינוּ
  chosen: Who will come down against us
  alternatives:
  - Who will descend against us
  - Who will be brought down upon us
  lexicon: HALOT
  rationale: The verb is difficult, but in context it expresses the city's boast that
    no attacker can descend upon it from its elevated/fortified position. 'Come down
    against us' captures the likely military-topographical sense in readable English.
- source_word: יָבֹוא
  chosen: will enter
  alternatives:
  - will come
  lexicon: HALOT
  rationale: With בְּ plus 'dwellings,' 'enter' is the more natural English equivalent.
- source_word: בִּמְעוֹנוֹתֵינוּ
  chosen: into our dwellings
  alternatives:
  - into our habitations
  - into our strongholds
  lexicon: HALOT
  rationale: מָעוֹן can denote dwelling place or habitation. Here 'dwellings' is the
    least interpretive choice; 'strongholds' would overread the defensive nuance.
