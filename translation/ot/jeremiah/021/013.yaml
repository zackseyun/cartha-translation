theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton, preserving
    reverential convention and broad English Bible recognizability.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Direct address to Jerusalem/Zion as feminine singular with plural inhabitants
    speaking
  chosen_reading: Maintain singular city address ('you') while rendering the boast
    as spoken by its inhabitants
  alternative_readings:
  - 'Flatten entirely to plural: ''you inhabitants... who say'''
  - Render entirely as singular personification without noting the plural speech
  rationale: The Hebrew combines personified city address with plural speech. Preserving
    both reflects the text's rhetoric without forcing a smoother but less accurate
    construction.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve tension rather
    than resolve it'
