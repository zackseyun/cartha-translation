theological_decisions:
- issue: Anthropological sense of נֶפֶשׁ in a survival idiom
  chosen_reading: Render נַפְשׁוֹ as 'his life' rather than 'his soul.'
  alternative_readings:
  - his soul
  rationale: The verse concerns physical survival amid siege and surrender. Translating
    'soul' could suggest a theological claim about the immaterial soul that the Hebrew
    idiom does not make here. 'Life' preserves the concrete sense and avoids doctrinal
    overreading.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; do not import doctrinal claims the text does not make.'
