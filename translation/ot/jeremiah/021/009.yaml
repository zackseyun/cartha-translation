id: JER.21.9
reference: Jeremiah 21:9
source:
  edition: WLC
  text: הַ/יֹּשֵׁב֙ בָּ/עִ֣יר הַ/זֹּ֔את יָמ֕וּת בַּ/חֶ֖רֶב וּ/בָ/רָעָ֣ב וּ/בַ/דָּ֑בֶר
    וְ/הַ/יּוֹצֵא֩ וְ/נָפַ֨ל עַל הַ/כַּשְׂדִּ֜ים הַ/צָּרִ֤ים עֲלֵי/כֶם֙ יחיה וְ/הָֽיְתָה
    לּ֥/וֹ נַפְשׁ֖/וֹ לְ/שָׁלָֽל־־׃
translation:
  text: The one who stays in this city will die by the sword, by famine, and by pestilence;
    but the one who goes out and falls over to the Chaldeans who are besieging you
    will live, and his life will be to him as plunder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'defects to the Chaldeans.' The Hebrew idiom 'falls over to' can denote
      going over to the enemy.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'his life will be to him for plunder,' an idiom meaning he will
      escape with only his life.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיֹּשֵׁב
  chosen: the one who stays
  alternatives:
  - the one who sits
  - whoever remains
  - the inhabitant
  lexicon: HALOT
  rationale: The participle of ישב here denotes remaining/dwelling in the city under
    siege, not merely the physical act of sitting. 'The one who stays' is natural
    English and preserves the singular representative force.
- source_word: בָּעִיר הַזֹּאת
  chosen: in this city
  alternatives:
  - within this city
  lexicon: HALOT
  rationale: Straightforward locative phrase; 'in this city' is idiomatic and sufficiently
    formal.
- source_word: יָמוּת
  chosen: will die
  alternatives:
  - shall die
  lexicon: HALOT
  rationale: Simple future sense in context of prophetic warning.
- source_word: בַּחֶרֶב וּבָרָעָב וּבַדָּבֶר
  chosen: by the sword, by famine, and by pestilence
  alternatives:
  - by sword, famine, and plague
  - by war, famine, and pestilence
  lexicon: HALOT
  rationale: This is a standard Jeremiah triad. 'Sword' preserves the concrete Hebrew
    חרב; 'pestilence' is a conventional and accurate rendering of דבר in judgment
    contexts, slightly more precise than 'plague'.
- source_word: וְהַיּוֹצֵא
  chosen: but the one who goes out
  alternatives:
  - and the one who goes out
  - whoever goes out
  lexicon: HALOT
  rationale: The conjunction marks contrast with the previous clause in sense, so
    'but' communicates the adversative force in English.
- source_word: וְנָפַל עַל
  chosen: falls over to
  alternatives:
  - defects to
  - surrenders to
  - falls to
  lexicon: HALOT
  rationale: The idiom נפל על in military-political context can mean to go over to
    or defect to an opposing force. 'Falls over to' keeps the Hebrew imagery while
    remaining understandable. A more interpretive alternative is preserved in a footnote.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew ethnonym is 'Chaldeans.' Although historically referring to
    the Babylonian power, the source text uses the ethnic term, so it is retained
    in the main text.
- source_word: הַצָּרִים עֲלֵיכֶם
  chosen: who are besieging you
  alternatives:
  - who are attacking you
  - who are pressing hard against you
  lexicon: HALOT
  rationale: The participle from צור in this context refers to laying siege. 'Who
    are besieging you' makes the military situation explicit and fits Jeremiah's context.
- source_word: יִחְיֶה
  chosen: will live
  alternatives:
  - will survive
  lexicon: HALOT
  rationale: The verb is the common 'live.' While survival is implied, 'will live'
    preserves the lexical form and leaves the idiomatic explanation to the following
    clause.
- source_word: וְהָיְתָה לּוֹ נַפְשׁוֹ לְשָׁלָל
  chosen: and his life will be to him as plunder
  alternatives:
  - and he will have his life as spoil
  - and his life will become booty for him
  lexicon: HALOT
  rationale: This idiom recurs in Jeremiah and means escaping with one's life as the
    only gain from disaster. 'His life will be to him as plunder' is slightly formal
    but transparent and preserves the metaphor better than a paraphrase.
- source_word: נַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  - his self
  lexicon: HALOT
  rationale: In this context נפש refers to one's life rather than the immaterial soul.
    'Life' best matches the idiom and avoids importing later anthropological distinctions.
