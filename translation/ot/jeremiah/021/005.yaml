id: JER.21.5
reference: Jeremiah 21:5
source:
  edition: WLC
  text: וְ/נִלְחַמְתִּ֤י אֲנִי֙ אִתְּ/כֶ֔ם בְּ/יָ֥ד נְטוּיָ֖ה וּ/בִ/זְר֣וֹעַ חֲזָקָ֑ה
    וּ/בְ/אַ֥ף וּ/בְ/חֵמָ֖ה וּ/בְ/קֶ֥צֶף גָּדֽוֹל׃
translation:
  text: And I myself will fight against you with an outstretched hand and a strong
    arm, and with anger and wrath and great fury.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'with an outstretched hand and a strong arm,' a stock expression
      for decisive divine power, often used in exodus contexts but here turned toward
      judgment.
    reason: cross_reference
  - marker: b
    text: Or 'and great wrath' for 'and great fury.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִלְחַמְתִּי
  chosen: And ... will fight
  alternatives:
  - And ... will wage war
  - And ... will battle
  lexicon: HALOT
  rationale: 'From לחם in the Niphal, here first person singular future sense: ''I
    will fight.'' ''Fight'' is the most natural modern English rendering and preserves
    the hostile divine action without overformal wording.'
- source_word: אֲנִי
  chosen: I myself
  alternatives:
  - I
  - I, even I
  lexicon: HALOT
  rationale: The independent pronoun is emphatic alongside the verbal person marking.
    'I myself' preserves the emphasis that YHWH personally acts against the people.
- source_word: אִתְּכֶם
  chosen: against you
  alternatives:
  - with you
  lexicon: HALOT
  rationale: Although אֵת can mean 'with,' with נלחם the idiom commonly means to fight
    against someone in hostile opposition. Context here is judgment on Jerusalem,
    so 'against you' is required by the sense.
- source_word: בְּיָד נְטוּיָה
  chosen: with an outstretched hand
  alternatives:
  - by an outstretched hand
  - with a stretched-out hand
  lexicon: HALOT
  rationale: A standard Hebrew anthropomorphic expression for powerful divine action.
    'With an outstretched hand' is idiomatic English and preserves the imagery.
- source_word: וּבִזְרֹעַ חֲזָקָה
  chosen: and a strong arm
  alternatives:
  - and a mighty arm
  lexicon: HALOT
  rationale: Parallel to 'outstretched hand.' 'Strong arm' is a direct and clear rendering;
    'mighty arm' is possible but slightly more interpretive/traditional.
- source_word: וּבְאַף
  chosen: and with anger
  alternatives:
  - and with nose
  - and with wrath
  lexicon: HALOT
  rationale: אַף literally means 'nose' but idiomatically denotes anger. Rendering
    the idiomatic sense is necessary in English. 'Anger' distinguishes it from the
    following wrath/fury terms while preserving the piling up of judgment language.
- source_word: וּבְחֵמָה
  chosen: and wrath
  alternatives:
  - and heat
  - and rage
  lexicon: HALOT
  rationale: חֵמָה denotes burning wrath or rage. 'Wrath' fits the elevated prophetic
    register and differentiates it from the simpler 'anger' used for אַף.
- source_word: וּבְקֶצֶף גָּדוֹל
  chosen: and great fury
  alternatives:
  - and great wrath
  - and great indignation
  lexicon: HALOT
  rationale: קֶצֶף is intense wrath/indignation. 'Great fury' preserves the climactic
    force and avoids repeating 'wrath' immediately after חֵמָה, while גָּדוֹל is carried
    by 'great'.
