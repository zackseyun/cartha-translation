theological_decisions:
- issue: Anthropomorphic language for divine action
  chosen_reading: Retain 'outstretched hand' and 'strong arm' as metaphorical bodily
    imagery for God's direct power in judgment.
  alternative_readings:
  - Paraphrase as 'with great power'
  rationale: The Hebrew intentionally uses embodied imagery common in covenantal and
    exodus/judgment contexts. Preserving the metaphor maintains intertextual resonance
    and does not imply corporeality in a crude sense.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
