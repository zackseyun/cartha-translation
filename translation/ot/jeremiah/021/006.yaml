id: JER.21.6
reference: Jeremiah 21:6
source:
  edition: WLC
  text: וְ/הִכֵּיתִ֗י אֶת יֽוֹשְׁבֵי֙ הָ/עִ֣יר הַ/זֹּ֔את וְ/אֶת הָ/אָדָ֖ם וְ/אֶת הַ/בְּהֵמָ֑ה
    בְּ/דֶ֥בֶר גָּד֖וֹל יָמֻֽתוּ־־־׃
translation:
  text: And I will strike the inhabitants of this city, both man and beast; they will
    die by a great pestilence.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהִכֵּיתִי
  chosen: And I will strike
  alternatives:
  - And I will smite
  - And I will strike down
  lexicon: HALOT
  rationale: The Hiphil of נכה commonly means to strike/smite. 'Strike' is clear modern
    English and preserves the direct divine action without archaic tone. 'Strike down'
    was possible, but the following clause already specifies death, so the simpler
    'strike' avoids over-translating.
- source_word: יֹשְׁבֵי הָעִיר הַזֹּאת
  chosen: the inhabitants of this city
  alternatives:
  - those who dwell in this city
  - the residents of this city
  lexicon: HALOT
  rationale: The participial construction from ישב denotes those dwelling in the city.
    'Inhabitants' is idiomatic and suitably formal for prophetic judgment language.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - the people
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here it is paired
    distributively with 'beast' in a judgment formula, so 'man' best preserves the
    human/animal contrast and the gender-accurate singular collective force.
- source_word: הַבְּהֵמָה
  chosen: beast
  alternatives:
  - animal
  - livestock
  lexicon: HALOT
  rationale: In prophetic judgment contexts, בהמה often refers broadly to animals,
    especially domesticated beasts. 'Beast' preserves the traditional human/beast
    pairing and the gravity of the oracle better than the flatter 'animal.' 'Livestock'
    is too narrow.
- source_word: בְּדֶבֶר גָּדוֹל
  chosen: by a great pestilence
  alternatives:
  - by a severe plague
  - with a great pestilence
  lexicon: HALOT
  rationale: דבר in Jeremiah commonly denotes pestilence/plague as a covenantal judgment.
    'Pestilence' preserves the specific epidemic sense and biblical register; 'great'
    reflects גָּדוֹל straightforwardly as intensity/severity.
- source_word: יָמֻתוּ
  chosen: they will die
  alternatives:
  - they shall die
  lexicon: HALOT
  rationale: Simple future 'they will die' is natural modern English and accurately
    renders the Qal imperfect here as the result of the preceding judgment.
- source_word: וְאֶת הָאָדָם וְאֶת הַבְּהֵמָה
  chosen: both man and beast
  alternatives:
  - man and beast
  - both people and animals
  lexicon: HALOT
  rationale: The repeated object markers mark both groups as included in the judgment.
    'Both man and beast' captures the distributive emphasis compactly and idiomatically.
