theological_decisions:
- issue: Rendering of אָדָם in a human/animal judgment pairing
  chosen_reading: man
  alternative_readings:
  - humankind
  - the people
  rationale: The doctrine excerpt specifies 'man / humankind' contextually for אָדָם.
    In this formulaic pairing with 'beast,' 'man' best preserves the source contrast
    and avoids flattening the expression into a generic collective.
