theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of the feminine suffixes in 'her forest' and 'around her'
  chosen_reading: Preserve the feminine pronoun in English ('her') without resolving the metaphor beyond the text
  alternative_readings:
  - Use 'its' for smoother English
  - Interpret explicitly as Jerusalem/Zion/palace complex
  rationale: The Hebrew uses feminine suffixes, naturally referring to the city personified. In keeping with preserving theological and literary tension rather than over-resolving, the translation keeps 'her' and does not specify a more interpretive referent in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve tension rather than resolve it
