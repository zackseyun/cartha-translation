id: JER.21.14
reference: Jeremiah 21:14
source:
  edition: WLC
  text: וּ/פָקַדְתִּ֧י עֲלֵי/כֶ֛ם כִּ/פְרִ֥י מַעַלְלֵי/כֶ֖ם נְאֻם יְהוָ֑ה וְ/הִצַּ֤תִּי אֵשׁ֙ בְּ/יַעְרָ֔/הּ וְ/אָכְלָ֖ה כָּל סְבִיבֶֽי/הָ־־׃ס
translation:
  text: And I will punish you according to the fruit of your deeds, declares Yahweh, and I will kindle a fire in her forest, and it will consume all that is around her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will attend to you' or 'I will visit upon you'; the Hebrew verb can have a broader sense than punitive action, though here it clearly occurs in a judgment context.
    reason: lexical_alternative
  - marker: b
    text: '''Her forest'' likely refers poetically to Jerusalem or her royal/palace complex; some understand ''forest'' metaphorically as a thicket of buildings or defenses.'
    reason: cultural_note
lexical_decisions:
- source_word: וּפָקַדְתִּי
  chosen: I will punish
  alternatives:
  - I will visit
  - I will attend to
  - I will call to account
  lexicon: HALOT
  rationale: פקד has a broad semantic range including visit, attend to, muster, and punish. In this judgment context, with 'according to the fruit of your deeds,' the punitive sense is primary and most natural in English.
- source_word: עֲלֵיכֶם
  chosen: you
  alternatives:
  - upon you
  - against you
  lexicon: HALOT
  rationale: The preposition על with פקד can be represented idiomatically in English by a direct object ('punish you'). 'Upon you' is more formal but less natural.
- source_word: כִּפְרִי
  chosen: according to the fruit of
  alternatives:
  - as the fruit of
  - in proportion to the fruit of
  lexicon: HALOT
  rationale: כ here marks correspondence or measure. 'According to the fruit of' preserves the metaphor and the sense of recompense proportionate to conduct.
- source_word: מַעַלְלֵיכֶם
  chosen: your deeds
  alternatives:
  - your actions
  - your practices
  lexicon: HALOT
  rationale: מעללים refers to acts or doings, often with moral coloring in prophetic judgment contexts. 'Deeds' is concise, natural, and preserves the evaluative force.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This standard prophetic formula is best rendered in clear modern English as 'declares the LORD.' It preserves prophetic authority without archaic stiffness.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְהִצַּתִּי אֵשׁ
  chosen: I will kindle a fire
  alternatives:
  - I will set fire
  - I will ignite a fire
  lexicon: HALOT
  rationale: The Hiphil of יצת means to kindle or set ablaze. 'Kindle a fire' is idiomatic and preserves the causative nuance.
- source_word: בְּיַעְרָהּ
  chosen: in her forest
  alternatives:
  - in its forest
  - in her thicket
  lexicon: HALOT
  rationale: יער means forest/woodland. The 3fs suffix is preserved as 'her,' likely referring poetically to the city/daughter Zion/Jerusalem. 'Forest' is the most straightforward lexical equivalent; some interpreters take it metaphorically of palace or stronghold, but the Hebrew term itself is 'forest.'
- source_word: וְאָכְלָה
  chosen: and it will consume
  alternatives:
  - and it will devour
  - and it will eat up
  lexicon: HALOT
  rationale: With fire as subject, אכל is a common metaphor for consuming by burning. 'Consume' is idiomatic and fitting for modern English.
- source_word: כָּל סְבִיבֶיהָ
  chosen: all that is around her
  alternatives:
  - all her surroundings
  - everything around her
  lexicon: HALOT
  rationale: The phrase denotes everything surrounding the referent. 'All that is around her' is clear and preserves the feminine suffix linkage to the city.
