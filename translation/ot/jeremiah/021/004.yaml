id: JER.21.4
reference: Jeremiah 21:4
source:
  edition: WLC
  text: כֹּֽה אָמַ֨ר יְהוָ֜ה אֱלֹהֵ֣י יִשְׂרָאֵ֗ל הִנְ/נִ֣י מֵסֵב֮ אֶת כְּלֵ֣י הַ/מִּלְחָמָה֮
    אֲשֶׁ֣ר בְּ/יֶדְ/כֶם֒ אֲשֶׁ֨ר אַתֶּ֜ם נִלְחָמִ֣ים בָּ֗/ם אֶת מֶ֤לֶךְ בָּבֶל֙ וְ/אֶת
    הַ/כַּשְׂדִּ֔ים הַ/צָּרִ֣ים עֲלֵי/כֶ֔ם מִ/ח֖וּץ לַֽ/חוֹמָ֑ה וְ/אָסַפְתִּ֣י אוֹתָ֔/ם
    אֶל תּ֖וֹךְ הָ/עִ֥יר הַ/זֹּֽאת־־־־־׃
translation:
  text: 'Thus says the LORD, the God of Israel: Behold, I am turning back the weapons
    of war that are in your hands, with which you are fighting against the king of
    Babylon and against the Chaldeans who are besieging you outside the wall, and
    I will gather them into the midst of this city.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and I will gather them' may refer to the king of Babylon and the Chaldeans,
      meaning that God will bring the enemy forces into the city.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    Jewish reverence tradition and established covenantal usage in English.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  - Here I am
  lexicon: HALOT
  rationale: Introduces a solemn divine declaration. 'Behold' preserves the prophetic
    force better than the more casual 'look' or 'see,' while 'here I am' would sound
    too spatially literal in this context.
- source_word: מֵסֵב
  chosen: am turning back
  alternatives:
  - am turning around
  - am reversing
  - will turn back
  lexicon: HALOT
  rationale: 'The participle conveys imminent or ongoing divine action. ''Turning
    back'' fits the military context: God is causing Judah''s weapons to be turned
    away from the enemy, effectively reversing their use.'
- source_word: כְּלֵי הַמִּלְחָמָה
  chosen: the weapons of war
  alternatives:
  - the weapons
  - the implements of war
  - the war equipment
  lexicon: HALOT
  rationale: A natural English rendering that preserves the military sense of the
    construct phrase without sounding overly technical.
- source_word: בְּיֶדְכֶם
  chosen: that are in your hands
  alternatives:
  - in your possession
  - at hand
  lexicon: HALOT
  rationale: Keeps the concrete Hebrew idiom and emphasizes that these are the defenders'
    currently wielded weapons.
- source_word: נִלְחָמִים בָּם
  chosen: with which you are fighting
  alternatives:
  - with which you fight
  - by which you are waging war
  lexicon: HALOT
  rationale: Makes explicit the instrumental sense of בָּם in idiomatic English while
    preserving the ongoing action of the participle.
- source_word: אֶת מֶלֶךְ בָּבֶל וְאֶת הַכַּשְׂדִּים
  chosen: against the king of Babylon and against the Chaldeans
  alternatives:
  - with the king of Babylon and the Chaldeans
  lexicon: HALOT
  rationale: Although אֵת can mark the object after 'fight,' English requires 'against'
    to express the adversarial relation clearly.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: Retains the ethnic-historical term used in the Hebrew text rather than
    flattening it to the broader political label 'Babylonians.'
- source_word: הַצָּרִים עֲלֵיכֶם
  chosen: who are besieging you
  alternatives:
  - who are pressing hard against you
  - who are attacking you
  lexicon: HALOT
  rationale: In context of a city wall and Babylonian assault, the participle from
    צור is best rendered with siege language rather than a generic 'attack.'
- source_word: מִחוּץ לַחוֹמָה
  chosen: outside the wall
  alternatives:
  - from outside the wall
  - outside the city wall
  lexicon: HALOT
  rationale: A straightforward spatial rendering. 'The wall' is sufficiently clear
    in context as the city's defensive wall.
- source_word: וְאָסַפְתִּי אֹתָם
  chosen: and I will gather them
  alternatives:
  - and I will collect them
  - and I will bring them together
  lexicon: HALOT
  rationale: The pronoun most naturally refers back to the weapons of war. 'Gather'
    preserves the Hebrew verb and the image of God drawing those weapons inward.
- source_word: אֹתָם
  chosen: them
  alternatives:
  - it
  lexicon: HALOT
  rationale: Masculine plural pronoun agrees naturally with 'weapons/implements' (כְּלֵי),
    supporting the reading that God gathers the weapons into the city.
- source_word: אֶל תּוֹךְ הָעִיר הַזֹּאת
  chosen: into the midst of this city
  alternatives:
  - into this city
  - into the interior of this city
  lexicon: HALOT
  rationale: תּוֹךְ adds the sense of interiority or center, not merely entry into
    the city. 'Into the midst of this city' preserves that force in elevated but clear
    English.
