id: JER.21.1
reference: Jeremiah 21:1
source:
  edition: WLC
  text: הַ/דָּבָ֛ר אֲשֶׁר הָיָ֥ה אֶֽל יִרְמְיָ֖הוּ מֵ/אֵ֣ת יְהוָ֑ה בִּ/שְׁלֹ֨חַ אֵלָ֜י/ו הַ/מֶּ֣לֶךְ צִדְקִיָּ֗הוּ אֶת פַּשְׁחוּר֙ בֶּן מַלְכִּיָּ֔ה וְ/אֶת צְפַנְיָ֧ה בֶן מַעֲשֵׂיָ֛ה הַ/כֹּהֵ֖ן לֵ/אמֹֽר־־־־־־׃
translation:
  text: The word that came to Jeremiah from Yahweh when King Zedekiah sent to him Pashhur son of Malchiah and Zephaniah son of Maaseiah the priest, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from Yahweh.'' The main text follows the project’s standard rendering of the divine name as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: הַדָּבָר
  chosen: The word
  alternatives:
  - The message
  - This is the word
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word' or 'message.' In prophetic superscriptions, 'the word that came' is a conventional and transparent rendering that preserves the formulaic force without unnecessary paraphrase.
- source_word: אֲשֶׁר הָיָה אֶל
  chosen: that came to
  alternatives:
  - that was to
  - that happened to
  lexicon: HALOT
  rationale: The idiom 'the word that was/came to [prophet]' is standard prophetic language. 'Came to' is natural English and reflects the sense of divine revelation reaching Jeremiah.
- source_word: מֵאֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition מֵאֵת indicates source, so 'from the LORD' is the clearest rendering.
- source_word: בִּשְׁלֹחַ
  chosen: when ... sent
  alternatives:
  - in the sending of
  - as ... sent
  lexicon: HALOT
  rationale: The infinitive construct with בְּ here gives a temporal sense. 'When ... sent' is idiomatic English and preserves the narrative timing.
- source_word: אֵלָיו
  chosen: to him
  alternatives:
  - to Jeremiah
  lexicon: HALOT
  rationale: The pronoun refers back to Jeremiah. 'To him' preserves the Hebrew cohesion; explicit repetition is unnecessary in English because the referent is clear.
- source_word: הַמֶּלֶךְ צִדְקִיָּהוּ
  chosen: King Zedekiah
  alternatives:
  - Zedekiah the king
  lexicon: HALOT
  rationale: English normally places the title before the name. This preserves the referential force of the Hebrew while sounding natural.
- source_word: פַּשְׁחוּר בֶּן מַלְכִּיָּה
  chosen: Pashhur son of Malchiah
  alternatives:
  - Pashhur the son of Malchiah
  lexicon: HALOT
  rationale: Personal names are transliterated. 'Son of' is the standard transparent rendering of בֶּן in genealogical identification.
- source_word: צְפַנְיָה בֶן מַעֲשֵׂיָה הַכֹּהֵן
  chosen: Zephaniah son of Maaseiah, the priest
  alternatives:
  - Zephaniah the priest, son of Maaseiah
  lexicon: HALOT
  rationale: The appositional 'the priest' most naturally modifies Zephaniah in the immediate syntax. The chosen punctuation preserves that relation clearly in English.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: This is the standard quotative introducing the content of the message in the next verse. 'Saying,' is concise and conventional.
