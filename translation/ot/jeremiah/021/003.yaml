id: JER.21.3
reference: Jeremiah 21:3
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יִרְמְיָ֖הוּ אֲלֵי/הֶ֑ם כֹּ֥ה תֹאמְרֻ֖/ן אֶל צִדְקִיָּֽהוּ־׃
translation:
  text: Jeremiah said to them, “Thus you shall say to Zedekiah:”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - and said
  lexicon: HALOT
  rationale: The waw-consecutive with אמר narrates the next event. English narrative
    style normally omits the repeated conjunction, so 'said' best reflects the sense
    in readable modern English while preserving the speech introduction.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  rationale: Proper personal name; transliterated according to standard English convention,
    consistent with the translation philosophy to transliterate names.
- source_word: אֲלֵיהֶם
  chosen: to them
  alternatives:
  - unto them
  lexicon: HALOT
  rationale: The preposition אֶל with 3mp suffix indicates direction toward the hearers.
    'To them' is the natural modern English rendering.
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  - So
  lexicon: HALOT
  rationale: כֹּה introduces the content of a formal message. 'Thus' preserves the
    concise, prophetic messenger formula without unnecessary paraphrase.
- source_word: תֹאמְרֻן
  chosen: you shall say
  alternatives:
  - you are to say
  - say
  lexicon: HALOT
  rationale: Second person masculine plural imperfect addresses the messengers as
    a group with directive force. 'You shall say' captures the command/future nuance
    in formal prophetic speech.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Simple preposition marking the addressee of the message; 'to' is the
    standard English equivalent.
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  rationale: Proper royal name; transliterated by standard English convention.
