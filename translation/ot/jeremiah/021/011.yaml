id: JER.21.11
reference: Jeremiah 21:11
source:
  edition: WLC
  text: וּ/לְ/בֵית֙ מֶ֣לֶךְ יְהוּדָ֔ה שִׁמְע֖וּ דְּבַר יְהוָֽה־׃
translation:
  text: 'And to the house of the king of Judah: Hear the word of Yahweh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And concerning the house of the king of Judah.' The Hebrew preposition can introduce a new address directed to or concerning the royal house.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/בֵית
  chosen: And to the house of
  alternatives:
  - And concerning the house of
  - Now to the house of
  lexicon: HALOT
  rationale: The prefixed conjunction ו plus preposition ל introduces a new address section and links it to the preceding oracle. 'And to the house of' preserves both the connective force and the directional/addressee sense of ל. 'House of' is retained rather than paraphrased as 'palace' because בית in construct with 'king of Judah' can denote the royal household/dynasty as the addressed entity.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: the king of Judah
  alternatives:
  - Judah's king
  lexicon: HALOT
  rationale: A straightforward construct chain. The more natural English 'the king of Judah' preserves the formal identification without unnecessary compression.
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  - Hearken to
  lexicon: HALOT
  rationale: Imperative plural from שמע. 'Hear' is concise and preserves the covenantal-prophetic force of the command better than the more interpretive 'listen to.' The plural reflects that the address is to the royal house collectively.
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - the message
  lexicon: HALOT
  rationale: דבר in prophetic formula commonly means 'word/message.' 'The word' preserves the established prophetic idiom 'hear the word of the LORD' and keeps the formal resonance of direct divine speech.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
