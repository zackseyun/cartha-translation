id: JER.21.10
reference: Jeremiah 21:10
source:
  edition: WLC
  text: כִּ֣י שַׂ֣מְתִּי פָ֠נַ/י בָּ/עִ֨יר הַ/זֹּ֧את לְ/רָעָ֛ה וְ/לֹ֥א לְ/טוֹבָ֖ה
    נְאֻם יְהוָ֑ה בְּ/יַד מֶ֤לֶךְ בָּבֶל֙ תִּנָּתֵ֔ן וּ/שְׂרָפָ֖/הּ בָּ/אֵֽשׁ־־׃ס
translation:
  text: For I have set my face against this city for harm and not for good, declares
    the LORD. It will be given into the hand of the king of Babylon, and he will burn
    it with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for disaster' or, more literally, 'for evil.' The Hebrew רָעָה here
      refers to calamity or harmful judgment, not moral evil by God.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'into the hand of the king of Babylon,' an idiom meaning into his
      power.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂמְתִּי פָנַי
  chosen: I have set my face against
  alternatives:
  - I have turned my face against
  - I have fixed my face against
  lexicon: HALOT
  rationale: The idiom literally involves 'setting my face' and conveys determined
    opposition or resolve. 'Set my face against' preserves the Hebrew imagery while
    remaining natural English. 'Against' is supplied from context, since the following
    phrase indicates hostile intent toward the city.
- source_word: בָּעִיר הַזֹּאת
  chosen: against this city
  alternatives:
  - upon this city
  - toward this city
  lexicon: HALOT
  rationale: With the idiom 'set my face,' English naturally takes 'against this city.'
    'This city' directly renders the demonstrative phrase.
- source_word: לְרָעָה
  chosen: for harm
  alternatives:
  - for evil
  - for disaster
  lexicon: HALOT
  rationale: רָעָה can denote moral evil or calamity/disaster. Here the sense is adverse
    outcome or injury to the city, not moral evil in God. 'For harm' is concise and
    avoids implying moral wrongdoing by God, while preserving the contrast with 'not
    for good.'
- source_word: וְלֹא לְטוֹבָה
  chosen: and not for good
  alternatives:
  - and not for welfare
  - and not for blessing
  lexicon: HALOT
  rationale: A straightforward rendering of the contrastive phrase. 'Good' preserves
    the broad Hebrew term and echoes the source's stark antithesis.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is idiomatic,
    readable, and preserves prophetic solemnity. Per doctrine, יְהוָה is rendered
    'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving
    the conventional small-caps covenantal rendering in plain text as 'the LORD'.
- source_word: בְּיַד מֶלֶךְ בָּבֶל
  chosen: into the hand of the king of Babylon
  alternatives:
  - into the power of the king of Babylon
  - to the king of Babylon
  lexicon: HALOT
  rationale: The Hebrew idiom 'into the hand of' commonly denotes being handed over
    to someone's power. The more literal rendering is retained in the main text because
    it is clear in English and preserves the biblical idiom.
- source_word: תִּנָּתֵן
  chosen: It will be given
  alternatives:
  - she will be given over
  - it will be handed over
  lexicon: HALOT
  rationale: 'The Niphal imperfect is passive: ''will be given.'' The subject is the
    feminine noun ''city''; English uses ''it'' naturally for a city. ''Given'' keeps
    close to the Hebrew, while the following idiom clarifies the sense of surrender.'
- source_word: וּשְׂרָפָהּ
  chosen: and he will burn it
  alternatives:
  - and it will be burned
  - and he will set it on fire
  lexicon: HALOT
  rationale: 'The form is active with a 3ms subject and 3fs object suffix: ''and he
    will burn her/it.'' The implied subject is the king of Babylon or his forces.
    Rendering it actively best reflects the Hebrew verbal form.'
- source_word: בָּאֵשׁ
  chosen: with fire
  alternatives:
  - in fire
  lexicon: HALOT
  rationale: Standard idiomatic English for the instrumental beth here is 'with fire.'
