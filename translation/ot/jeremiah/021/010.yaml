theological_decisions:
- issue: Rendering divine judgment language in לְרָעָה
  chosen_reading: for harm
  alternative_readings:
  - for evil
  - for disaster
  rationale: The verse speaks of YHWH's determined judgment against Jerusalem. Because
    רָעָה can mean calamity as well as evil, 'for harm' preserves the judicial sense
    without suggesting that God commits moral evil. This reflects the text's meaning
    while avoiding an unnecessary doctrinal misunderstanding not demanded by the Hebrew.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than import doctrinal claims the text does not make.'
