id: JER.21.8
reference: Jeremiah 21:8
source:
  edition: WLC
  text: וְ/אֶל הָ/עָ֤ם הַ/זֶּה֙ תֹּאמַ֔ר כֹּ֖ה אָמַ֣ר יְהוָ֑ה הִנְ/נִ֤י נֹתֵן֙ לִ/פְנֵי/כֶ֔ם
    אֶת דֶּ֥רֶךְ הַ/חַיִּ֖ים וְ/אֶת דֶּ֥רֶךְ הַ/מָּֽוֶת־־־׃
translation:
  text: 'And to this people you shall say, ‘Thus says the LORD: Behold, I am setting
    before you the way of life and the way of death.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I am giving before you”; Hebrew literally uses “giving,” but the idiom
      means “setting before” or “placing before” as an offered alternative.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל
  chosen: And to
  alternatives:
  - To
  - Now to
  lexicon: HALOT
  rationale: The conjunction plus preposition links this statement to the preceding
    context and directs Jeremiah's speech toward the people. 'And to' preserves the
    discourse connection without over-paraphrasing.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: עָם commonly means 'people.' The singular with demonstrative is well
    represented by 'this people.' 'These people' would smooth the English but lose
    the singular collective force of the Hebrew.
- source_word: תֹּאמַר
  chosen: you shall say
  alternatives:
  - you must say
  - you are to say
  lexicon: HALOT
  rationale: The imperfect here functions as an instruction to Jeremiah. 'You shall
    say' is a natural English rendering that preserves the directive force.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - Thus said the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. 'Thus says the LORD'
    preserves both the formal prophetic register and the present force of the quoted
    declaration.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the LXX pattern.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  - Here I am
  lexicon: HALOT
  rationale: The particle marks solemn immediacy and divine self-presentation. 'Behold'
    best preserves the prophetic gravity without adding content. 'Here I am' would
    be too literal in English in this construction.
- source_word: נֹתֵן
  chosen: I am setting
  alternatives:
  - I am giving
  - I set
  lexicon: HALOT
  rationale: נתן literally means 'give,' but with 'before you' and the object 'way,'
    idiomatic English is 'set before.' The participle conveys present/imminent action,
    hence 'I am setting' rather than a simple past or gnomic present.
- source_word: לִפְנֵיכֶם
  chosen: before you
  alternatives:
  - in front of you
  - before your face
  lexicon: HALOT
  rationale: This prepositional phrase commonly means 'before you' in contexts of
    presenting alternatives or choices. The idiomatic English preserves the metaphorical
    sense.
- source_word: דֶּרֶךְ
  chosen: the way
  alternatives:
  - the path
  - the road
  lexicon: HALOT
  rationale: דֶּרֶךְ can mean road/path/way. Here it is metaphorical for a course
    leading to an outcome. 'Way' is the most natural and biblically resonant English
    choice.
- source_word: הַחַיִּים
  chosen: of life
  alternatives:
  - to life
  - of the living
  lexicon: HALOT
  rationale: The plural noun חַיִּים often functions as the abstract 'life.' In construct
    with דֶּרֶךְ, 'the way of life' is the most idiomatic rendering.
- source_word: הַמָּוֶת
  chosen: of death
  alternatives:
  - to death
  lexicon: HALOT
  rationale: Paired antithetically with 'life,' this is best rendered 'the way of
    death.' This preserves the balanced Hebrew parallelism.
