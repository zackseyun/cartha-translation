theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH, preserving reverential
    convention and broad Christian readability.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the judicial command
  chosen_reading: Administer justice in the morning
  alternative_readings:
  - Judge every morning with justice
  - Render judgment in the morning
  rationale: The verse addresses the Davidic house with a concrete royal obligation
    to enact just judgments promptly. This wording preserves both the legal and ethical
    dimensions without narrowing the command to mere courtroom procedure.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source sense over tradition'
