id: JER.21.12
reference: Jeremiah 21:12
source:
  edition: WLC
  text: בֵּ֣ית דָּוִ֗ד כֹּ֚ה אָמַ֣ר יְהוָ֔ה דִּ֤ינוּ לַ/בֹּ֨קֶר֙ מִשְׁפָּ֔ט וְ/הַצִּ֥ילוּ
    גָז֖וּל מִ/יַּ֣ד עוֹשֵׁ֑ק פֶּן תֵּצֵ֨א כָ/אֵ֜שׁ חֲמָתִ֗/י וּ/בָעֲרָה֙ וְ/אֵ֣ין
    מְכַבֶּ֔ה מִ/פְּנֵ֖י רֹ֥עַ מעללי/הם־׃
translation:
  text: 'House of David, thus says the LORD: Administer justice in the morning, and
    deliver the one who has been robbed from the hand of the oppressor, lest my wrath
    go out like fire and burn with no one to quench it, because of the evil of their
    deeds.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Render judgment in the morning' or 'Judge every morning with justice.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the hand of the oppressor,' an idiom for deliverance from someone's
      power or control.
    reason: cultural_note
  - marker: c
    text: Or 'my fury go forth like fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית דָּוִד
  chosen: House of David
  alternatives:
  - household of David
  - royal house of David
  lexicon: HALOT
  rationale: Construct phrase functioning as a vocative address to the Davidic royal
    house. 'House of David' is the standard and sufficiently transparent rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name YHWH is rendered 'the LORD'
    rather than transliterated.
- source_word: דִּינוּ
  chosen: Administer
  alternatives:
  - Judge
  - Give judgment
  - Do justice
  lexicon: HALOT
  rationale: Imperative from דין in a governance/judicial context. 'Administer justice'
    captures the active judicial duty addressed to the royal house better than the
    more wooden 'judge'.
- source_word: לַבֹּקֶר
  chosen: in the morning
  alternatives:
  - every morning
  - by morning
  lexicon: HALOT
  rationale: Temporal phrase indicating the proper time for judicial action. 'In the
    morning' is the plain sense; 'every morning' is interpretive though context may
    imply regularity.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - legal decision
  lexicon: HALOT
  rationale: In collocation with דין, the sense is the administration of justice rather
    than merely pronouncing a verdict. 'Justice' is natural English and preserves
    the ethical-judicial force.
- source_word: וְהַצִּילוּ
  chosen: deliver
  alternatives:
  - rescue
  - save
  lexicon: HALOT
  rationale: Imperative calling for concrete intervention on behalf of the victim.
    'Deliver' fits both legal and covenantal register.
- source_word: גָז֖וּל
  chosen: the one who has been robbed
  alternatives:
  - the robbed person
  - the plundered one
  - the victim of robbery
  lexicon: HALOT
  rationale: Passive participial/adjectival form referring to a person despoiled by
    injustice. Expanded slightly in English for clarity.
- source_word: מִיַּד עוֹשֵׁק
  chosen: from the hand of the oppressor
  alternatives:
  - from the power of the oppressor
  - from the one who extorts
  lexicon: HALOT
  rationale: Idiomatic Hebrew 'from the hand of' denotes power/control. 'Oppressor'
    is the best concise rendering of עֹשֵׁק in this social-justice context.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: Introduces a warning of consequence. 'Lest' is concise and preserves
    the solemn prophetic tone.
- source_word: תֵּצֵא כָאֵשׁ חֲמָתִי
  chosen: my wrath go out like fire
  alternatives:
  - my fury go forth like fire
  - my anger break out like fire
  lexicon: HALOT
  rationale: The verb 'go out' with wrath metaphorically depicts divine anger issuing
    forth. 'Wrath' fits prophetic judgment language; 'like fire' preserves the simile.
- source_word: וּבָעֲרָה
  chosen: and burn
  alternatives:
  - and blaze
  - and consume
  lexicon: HALOT
  rationale: Continues the fire metaphor. 'Burn' is straightforward and leaves the
    image vivid without overinterpreting the extent of destruction.
- source_word: וְאֵין מְכַבֶּה
  chosen: with no one to quench it
  alternatives:
  - and there will be none to quench it
  - and no one can extinguish it
  lexicon: HALOT
  rationale: Expresses the unquenchable character of the judgment once unleashed.
    The supplied object 'it' is required in English and refers to the fire/wrath metaphor.
- source_word: מִפְּנֵי רֹעַ מַעַלְלֵיהֶם
  chosen: because of the evil of their deeds
  alternatives:
  - because of the wickedness of their actions
  - on account of their evil doings
  lexicon: HALOT
  rationale: Causal phrase explaining the reason for judgment. 'Their deeds' follows
    the 3mp suffix; although the immediate addressee is singular collective ('House
    of David'), the plural likely refers to the members/actors within that house or
    the people associated with it, so the plural should be retained.
