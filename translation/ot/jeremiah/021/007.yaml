id: JER.21.7
reference: Jeremiah 21:7
source:
  edition: WLC
  text: וְ/אַחֲרֵי כֵ֣ן נְאֻם יְהוָ֡ה אֶתֵּ֣ן אֶת צִדְקִיָּ֣הוּ מֶֽלֶךְ יְהוּדָ֣ה וְ/אֶת עֲבָדָ֣י/ו וְ/אֶת הָ/עָ֡ם וְ/אֶת הַ/נִּשְׁאָרִים֩ בָּ/עִ֨יר הַ/זֹּ֜את מִן הַ/דֶּ֣בֶר מִן הַ/חֶ֣רֶב וּ/מִן הָ/רָעָ֗ב בְּ/יַד֙ נְבוּכַדְרֶאצַּ֣ר מֶֽלֶךְ בָּבֶ֔ל וּ/בְ/יַד֙ אֹֽיְבֵי/הֶ֔ם וּ/בְ/יַ֖ד מְבַקְשֵׁ֣י נַפְשָׁ֑/ם וְ/הִכָּ֣/ם לְ/פִי חֶ֔רֶב לֹֽא יָח֣וּס עֲלֵי/הֶ֔ם וְ/לֹ֥א יַחְמֹ֖ל וְ/לֹ֥א יְרַחֵֽם־־־־־׀־־־׀־־־־־׃
translation:
  text: And after that, declares Yahweh, I will give Zedekiah king of Judah, his servants, the people, and those left in this city from the plague, from the sword, and from the famine into the hand of Nebuchadnezzar king of Babylon, into the hand of their enemies, and into the hand of those seeking their life; and he will strike them down with the edge of the sword. He will not spare them or have pity or compassion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Nebuchadrezzar''; traditionally rendered ''Nebuchadnezzar'' in English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרֵי כֵן
  chosen: And after that
  alternatives:
  - And afterward
  - Then after that
  lexicon: HALOT
  rationale: Temporal transition marking what follows the prior acts of judgment; 'And after that' is natural and preserves sequence.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' fits modern English while preserving solemn prophetic force. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: אֶתֵּן
  chosen: I will give
  alternatives:
  - I will hand over
  - I will deliver
  lexicon: HALOT
  rationale: Literal sense is 'give'; in this hostile context the following phrase 'into the hand of' conveys the force of handing over, so the simpler verb is retained.
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  rationale: Standard English transliteration of the personal name.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his servants/slaves
  lexicon: HALOT
  rationale: In royal context this commonly refers to court servants/officials. 'Servants' is broad and conventional without over-specifying bureaucratic rank.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: Straightforward rendering for the collective population.
- source_word: הַנִּשְׁאָרִים
  chosen: those left
  alternatives:
  - the remnant
  - the survivors
  - those remaining
  lexicon: HALOT
  rationale: Participle denotes those remaining after prior devastation. 'Those left' is idiomatic and avoids importing theologically loaded 'remnant' language where the context is simply survivors.
- source_word: מִן הַדֶּבֶר מִן הַחֶרֶב וּמִן הָרָעָב
  chosen: from the plague, from the sword, and from the famine
  alternatives:
  - from pestilence, from the sword, and from famine
  lexicon: HALOT
  rationale: Preserves the repeated preposition and the triad of judgments. 'Plague' is more accessible modern English than 'pestilence'.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: HALOT
  rationale: This is a common idiom for being delivered into someone's power. Retaining 'hand' preserves the Hebrew imagery and formal texture.
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  rationale: The Hebrew form here more closely reflects 'Nebuchadrezzar,' but 'Nebuchadnezzar' is the standard English convention and aids readability; the alternative is worth preserving in a footnote.
- source_word: אֹיְבֵיהֶם
  chosen: their enemies
  lexicon: HALOT
  rationale: Direct rendering of the plural participial noun.
- source_word: מְבַקְשֵׁי נַפְשָׁם
  chosen: those seeking their life
  alternatives:
  - those seeking to kill them
  - those who seek their lives
  lexicon: HALOT
  rationale: Hebrew idiom literally involves 'soul/life'; 'seeking their life' preserves the idiom in understandable English.
- source_word: וְהִכָּם
  chosen: and he will strike them down
  alternatives:
  - and he will strike them
  - and he will kill them
  lexicon: HALOT
  rationale: Subject is Nebuchadnezzar by nearest antecedent and singular verb. 'Strike them down' fits the lethal context without redundantly front-loading the sword image before the next phrase.
- source_word: לְפִי חֶרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the mouth of the sword
  - with the sword
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression for death by sword. 'With the edge of the sword' is established English that preserves the metaphor better than the overly literal 'mouth of the sword.'
- source_word: לֹא יָחוּס
  chosen: He will not spare them
  alternatives:
  - he will not look with pity on them
  lexicon: HALOT
  rationale: Conveys withholding mercy in judgment.
- source_word: וְלֹא יַחְמֹל
  chosen: or have pity
  alternatives:
  - or show pity
  - or spare
  lexicon: HALOT
  rationale: Distinguished from the previous verb to preserve the Hebrew piling up of near-synonyms.
- source_word: וְלֹא יְרַחֵם
  chosen: or compassion
  alternatives:
  - or show compassion
  - or have mercy
  lexicon: HALOT
  rationale: Rendered in coordination with 'have pity' as 'or have pity or compassion.' This preserves the climactic triad of unsparing judgment while keeping natural English.
