id: JER.21.2
reference: Jeremiah 21:2
source:
  edition: WLC
  text: דְּרָשׁ נָ֤א בַעֲדֵ֨/נוּ֙ אֶת יְהוָ֔ה כִּ֛י נְבוּכַדְרֶאצַּ֥ר מֶֽלֶךְ בָּבֶ֖ל
    נִלְחָ֣ם עָלֵ֑י/נוּ אוּלַי֩ יַעֲשֶׂ֨ה יְהוָ֤ה אוֹתָ֨/נוּ֙ כְּ/כָל נִפְלְאֹתָ֔י/ו
    וְ/יַעֲלֶ֖ה מֵ/עָלֵֽי/נוּ־־־־׃ס
translation:
  text: Please inquire of the LORD on our behalf, because Nebuchadnezzar king of Babylon
    is fighting against us. Perhaps the LORD will deal with us according to all his
    wondrous acts, so that he will withdraw from us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''according to all his wondrous acts''; that is, according to the
      pattern of the LORD''s extraordinary saving deeds in the past.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Nebuchadrezzar,' reflecting the Hebrew spelling more closely.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'and he will go up from upon us,' an idiom here meaning that
      the attacking king would withdraw from against us.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּרָשׁ נָא
  chosen: Please inquire
  alternatives:
  - Please seek
  - Please consult
  lexicon: HALOT
  rationale: דרש with נא here is a polite imperative requesting prophetic inquiry
    of YHWH. 'Inquire' best captures seeking an answer from God through the prophet,
    more specifically than 'seek' and more idiomatically than 'consult.'
- source_word: בַעֲדֵנוּ
  chosen: on our behalf
  alternatives:
  - for us
  lexicon: HALOT
  rationale: The preposition בעד commonly conveys representation or intercession.
    'On our behalf' makes the intercessory sense explicit and natural in English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the Septuagintal pattern.
- source_word: נִלְחָם עָלֵינוּ
  chosen: is fighting against us
  alternatives:
  - is making war against us
  - has come to fight against us
  lexicon: HALOT
  rationale: The Niphal participle of לחם expresses ongoing hostile action. 'Is fighting
    against us' communicates present military aggression in clear modern English.
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - Maybe
  - It may be that
  lexicon: HALOT
  rationale: '''Perhaps'' preserves the uncertainty and hopefulness of the appeal
    without sounding colloquial.'
- source_word: יַעֲשֶׂה יְהוָה אוֹתָנוּ
  chosen: the LORD will deal with us
  alternatives:
  - the LORD will act for us
  - the LORD will act toward us
  lexicon: HALOT
  rationale: The idiom 'do with us/for us' is awkward if rendered woodenly. In context
    of hoped-for divine intervention, 'deal with us' is broad enough to preserve the
    Hebrew while allowing the following comparison phrase to specify the manner.
- source_word: כְּכָל נִפְלְאֹתָיו
  chosen: according to all his wondrous acts
  alternatives:
  - according to all his wonders
  - like all his wonderful deeds
  lexicon: HALOT
  rationale: נפלאות refers to extraordinary, wonder-working deeds of God, often in
    salvation history. 'Wondrous acts' is natural English and preserves the sense
    of miraculous divine interventions.
- source_word: וְיַעֲלֶה מֵעָלֵינוּ
  chosen: so that he will withdraw from us
  alternatives:
  - and he will go up from us
  - and he will depart from us
  lexicon: HALOT
  rationale: The subject is Nebuchadnezzar by sense, though the Hebrew leaves it implicit.
    עלה with מן/מעל in this military context conveys lifting off or withdrawing from
    siege/attack. 'Withdraw from us' communicates the intended result clearly.
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: A standard English transliteration is preferred for readability. The
    Hebrew form here more closely reflects 'Nebuchadrezzar,' but 'Nebuchadnezzar'
    is the conventional English name and remains identifiable.
