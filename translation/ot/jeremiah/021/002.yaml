theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name twice. Following the project's doctrinal
    standard, it is rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Implicit subject of וְיַעֲלֶה מֵעָלֵינוּ
  chosen_reading: the clause refers to Nebuchadnezzar/Babylon withdrawing from Jerusalem
  alternative_readings:
  - a more literal but ambiguous 'and he may go up from us'
  rationale: The prayer asks for divine intervention against the Babylonian attack;
    the natural sense is that the attacking king would withdraw. English requires
    making the result clause intelligible, so the translation expresses the implied
    military departure rather than preserving a misleading literalism.
