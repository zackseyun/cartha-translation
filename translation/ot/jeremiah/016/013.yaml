id: JER.16.13
reference: Jeremiah 16:13
source:
  edition: WLC
  text: וְ/הֵטַלְתִּ֣י אֶתְ/כֶ֗ם מֵ/עַל֙ הָ/אָ֣רֶץ הַ/זֹּ֔את עַל הָ/אָ֕רֶץ אֲשֶׁר֙
    לֹ֣א יְדַעְתֶּ֔ם אַתֶּ֖ם וַ/אֲבֽוֹתֵי/כֶ֑ם וַ/עֲבַדְתֶּם שָׁ֞ם אֶת אֱלֹהִ֤ים אֲחֵרִים֙
    יוֹמָ֣ם וָ/לַ֔יְלָה אֲשֶׁ֛ר לֹֽא אֶתֵּ֥ן לָ/כֶ֖ם חֲנִינָֽה־־־־׃ס
translation:
  text: So I will hurl you from this land onto a land that neither you nor your fathers
    have known, and there you will serve other gods day and night, for I will show
    you no favor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cast you' or 'throw you.' The Hebrew verb is forceful, describing violent
      expulsion from the land.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''your ancestors.'' Hebrew: ''your fathers.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'worship other gods.' The Hebrew verb commonly means 'serve' and can
      include worshipful service.
    reason: lexical_alternative
  - marker: d
    text: Or 'for I will grant you no grace/mercy.' The Hebrew noun denotes favor
      or graciousness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵטַלְתִּי
  chosen: I will hurl
  alternatives:
  - I will cast
  - I will throw
  lexicon: HALOT
  rationale: The Hiphil form conveys forceful causing to be thrown/cast out. 'Hurl'
    preserves the violent expulsive sense better than the milder 'send' or 'remove.'
- source_word: מֵעַל הָאָרֶץ הַזֹּאת
  chosen: from this land
  alternatives:
  - from upon this land
  - out of this land
  lexicon: HALOT
  rationale: Though literally 'from upon this land,' idiomatic English is 'from this
    land.' 'Land' fits the covenantal-territorial sense better than 'earth' here.
- source_word: עַל הָאָרֶץ
  chosen: onto a land
  alternatives:
  - to a land
  - into a land
  lexicon: HALOT
  rationale: The preposition is literally 'onto/upon.' In English, 'onto a land' is
    slightly marked but preserves the directional contrast with 'from this land.'
- source_word: אֲשֶׁר לֹא יְדַעְתֶּם אַתֶּם וַאֲבוֹתֵיכֶם
  chosen: that neither you nor your fathers have known
  alternatives:
  - which you and your fathers did not know
  - that you and your ancestors have not known
  lexicon: HALOT
  rationale: '''Known'' is the plain sense of ידע. ''Fathers'' is retained rather
    than ''ancestors'' to match the Hebrew and the translation philosophy''s gender-accurate
    principle.'
- source_word: וַעֲבַדְתֶּם שָׁם
  chosen: and there you will serve
  alternatives:
  - and there you will worship
  - and there you will be made to serve
  lexicon: HALOT
  rationale: עבד with gods commonly means serve/worship. 'Serve' is broader and more
    literal, allowing the irony of enforced idolatrous devotion in exile.
- source_word: אֶת אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The standard phrase is 'other gods.' 'Foreign gods' is interpretive and
    less direct.
- source_word: יוֹמָם וָלַיְלָה
  chosen: day and night
  alternatives:
  - continually
  lexicon: HALOT
  rationale: The idiom is retained literally; it communicates unceasing duration without
    paraphrase.
- source_word: אֲשֶׁר לֹא אֶתֵּן לָכֶם חֲנִינָה
  chosen: for I will show you no favor
  alternatives:
  - because I will give you no favor
  - for I will grant you no grace
  - for I will give you no mercy
  lexicon: HALOT
  rationale: חֲנִינָה denotes favor/graciousness. 'Show you no favor' is natural English
    and preserves the judicial withdrawal of divine grace without importing later
    technical theological language. The final אֲשֶׁר is taken in a causal/resultative
    sense in context.
