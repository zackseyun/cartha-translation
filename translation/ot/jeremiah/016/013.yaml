theological_decisions:
- issue: Rendering of וַאֲבוֹתֵיכֶם
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The Hebrew explicitly says 'your fathers.' In keeping with the gender-accurate
    principle, the masculine familial term is preserved rather than neutralized, while
    the broader sense is acknowledged as an alternative.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Nuance of exile and idolatry in וַעֲבַדְתֶּם ... אֱלֹהִים אֲחֵרִים
  chosen_reading: serve other gods
  alternative_readings:
  - worship other gods
  rationale: The text states the exiles will serve other gods in the foreign land.
    'Serve' preserves the lexical range and the theological irony without over-specifying
    whether the service is willing worship, coerced assimilation, or both.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
