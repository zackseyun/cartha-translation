id: JER.16.10
reference: Jeremiah 16:10
source:
  edition: WLC
  text: וְ/הָיָ֗ה כִּ֤י תַגִּיד֙ לָ/עָ֣ם הַ/זֶּ֔ה אֵ֥ת כָּל הַ/דְּבָרִ֖ים הָ/אֵ֑לֶּה וְ/אָמְר֣וּ אֵלֶ֗י/ךָ עַל מֶה֩ דִבֶּ֨ר יְהוָ֤ה עָלֵ֨י/נוּ֙ אֵ֣ת כָּל הָ/רָעָ֤ה הַ/גְּדוֹלָה֙ הַ/זֹּ֔את וּ/מֶ֤ה עֲוֺנֵ֨/נוּ֙ וּ/מֶ֣ה חַטָּאתֵ֔/נוּ אֲשֶׁ֥ר חָטָ֖אנוּ לַֽ/יהוָ֥ה אֱלֹהֵֽי/נוּ־־־׃
translation:
  text: And when you tell this people all these words, and they say to you, ‘Why has Yahweh spoken against us all this great disaster? And what is our iniquity, and what is our sin that we have sinned against Yahweh our God?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all this great calamity.' The Hebrew word can also be rendered 'evil,' but here it refers to disaster or judgment coming upon the people, not moral evil in the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And when
  alternatives:
  - And it shall be, when
  - And it will happen, when
  lexicon: HALOT
  rationale: This idiom introduces a future contingency. 'And when' preserves the temporal force in natural English without unnecessary stiffness.
- source_word: תַגִּיד
  chosen: you tell
  alternatives:
  - you declare
  - you report
  lexicon: HALOT
  rationale: The Hiphil of נגד here means to make known or tell. 'Tell' is clear modern English and fits direct speech introduction.
- source_word: לָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: The singular עָם with demonstrative is best preserved as 'this people,' a common prophetic expression. 'These people' would smooth the number but lose the source's singular collective form.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  - all these matters
  lexicon: HALOT
  rationale: דְּבָרִים often means 'words' in prophetic discourse, referring to the spoken message just delivered. 'Words' preserves the verbal, prophetic character better than 'things.'
- source_word: עַל מֶה
  chosen: Why
  alternatives:
  - For what reason
  - On account of what
  lexicon: HALOT
  rationale: The phrase asks for the reason or basis. 'Why' is the most natural idiomatic English equivalent.
- source_word: דִבֶּר יְהוָה עָלֵינוּ
  chosen: has the LORD spoken against us
  alternatives:
  - has the LORD declared against us
  - has the LORD pronounced against us
  lexicon: HALOT
  rationale: In context of announced judgment, 'spoken against us' captures the adversative sense of עַל with דבר. The perfect is rendered with English present perfect to reflect the completed divine pronouncement now in view.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כָּל הָרָעָה הַגְּדוֹלָה הַזֹּאת
  chosen: all this great disaster
  alternatives:
  - all this great evil
  - all this great calamity
  lexicon: HALOT
  rationale: רָעָה in judgment contexts commonly denotes calamity/disaster rather than moral evil. 'Disaster' communicates imposed catastrophe clearly in modern English, while 'great' and 'this' preserve the Hebrew modifiers.
- source_word: עֲוֺנֵנוּ
  chosen: our iniquity
  alternatives:
  - our guilt
  - our wrongdoing
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity or guilt. 'Iniquity' preserves the moral-theological weight and distinguishes it from the following חַטָּאת.
- source_word: חַטָּאתֵנוּ
  chosen: our sin
  alternatives:
  - our offense
  - our sinful act
  lexicon: HALOT
  rationale: חַטָּאת is the more general term for sin here. Rendering it 'sin' preserves the lexical distinction from עָוֹן as much as English allows.
- source_word: אֲשֶׁר חָטָאנוּ
  chosen: that we have sinned
  alternatives:
  - which we committed
  - that we sinned
  lexicon: HALOT
  rationale: The clause explicates the preceding question. 'Have sinned' reflects the perfect and reads naturally in English.
- source_word: לַיהוָה אֱלֹהֵינוּ
  chosen: against the LORD our God
  alternatives:
  - to the LORD our God
  lexicon: HALOT
  rationale: Although the preposition is לְ, with חטא the idiomatic sense in English is 'sin against.' This conveys the relational offense intended by the Hebrew construction.
