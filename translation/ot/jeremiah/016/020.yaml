id: JER.16.20
reference: Jeremiah 16:20
source:
  edition: WLC
  text: הֲ/יַעֲשֶׂה לּ֥/וֹ אָדָ֖ם אֱלֹהִ֑ים וְ/הֵ֖מָּה לֹ֥א אֱלֹהִֽים־׃
translation:
  text: Can a man make gods for himself? Yet they are not gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Does a man make gods for himself? But they are no gods.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/יַעֲשֶׂה
  chosen: Can ... make
  alternatives:
  - Does ... make
  - Will ... make
  lexicon: HALOT
  rationale: The prefixed interrogative הֲ with the imperfect of עשה forms a rhetorical
    question. English 'Can ... make' best captures the incredulous force in natural
    modern English, rather than a simple present or future.
- source_word: לּוֹ
  chosen: for himself
  alternatives:
  - for him
  lexicon: HALOT
  rationale: 'The preposition ל with 3ms suffix is idiomatically reflexive here in
    context: a human making gods ''for himself.'' This brings out the personal manufacture
    and possession implied by the Hebrew.'
- source_word: אָדָם
  chosen: a man
  alternatives:
  - humankind
  - a human
  lexicon: HALOT
  rationale: Per the doctrine's gender-accurate principle, אָדָם here is singular
    and generic. 'A man' preserves the representative singular used in the Hebrew,
    while still functioning generically in English.
- source_word: אֱלֹהִים
  chosen: gods
  alternatives:
  - a god
  - divine beings
  lexicon: HALOT
  rationale: The plural form here refers to idols/deities fabricated by humans, so
    'gods' is the plain sense. Singular 'a god' would flatten the plural, and 'divine
    beings' is too abstract for the polemical context.
- source_word: וְ/הֵמָּה
  chosen: Yet they
  alternatives:
  - And they
  - But they
  lexicon: HALOT
  rationale: 'The conjunction plus independent pronoun marks a contrastive turn: humans
    may make so-called gods, but those objects are not truly gods. ''Yet they'' captures
    the adversative force clearly.'
- source_word: לֹא אֱלֹהִים
  chosen: are not gods
  alternatives:
  - are no gods
  - are not God
  lexicon: HALOT
  rationale: The predicate denies the true divine status of the manufactured idols.
    'Are not gods' is straightforward and idiomatic. 'Are no gods' is possible but
    slightly more archaic; 'are not God' would wrongly singularize the plural noun.
