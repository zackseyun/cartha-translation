theological_decisions:
- issue: Nature of the polemic against idols
  chosen_reading: The verse denies that human-made deities are truly gods.
  alternative_readings:
  - The verse mocks idol manufacture without making a broader metaphysical claim.
  rationale: 'The final clause לֹא אֱלֹהִים is an explicit ontological denial in the
    rhetoric of prophetic anti-idolatry: what humans make as ''gods'' are not in fact
    gods. The translation preserves that force without adding philosophical terminology
    absent from the text.'
