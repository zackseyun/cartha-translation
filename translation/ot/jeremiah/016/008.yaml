id: JER.16.8
reference: Jeremiah 16:8
source:
  edition: WLC
  text: וּ/בֵית מִשְׁתֶּ֥ה לֹא תָב֖וֹא לָ/שֶׁ֣בֶת אוֹתָ֑/ם לֶ/אֱכֹ֖ל וְ/לִ/שְׁתּֽוֹת־־׃ס
translation:
  text: And you shall not enter a house of feasting to sit with them, to eat and to
    drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a banquet house' or 'a house of celebration.' The Hebrew expression
      refers to a place where people gather for festive eating and drinking.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבֵית מִשְׁתֶּה
  chosen: a house of feasting
  alternatives:
  - the house of feasting
  - a banquet house
  - a house of celebration
  lexicon: HALOT
  rationale: בַּיִת in construct with מִשְׁתֶּה denotes a house characterized by feasting/banqueting.
    'House of feasting' preserves the concrete Hebrew image better than a more interpretive
    'banquet' alone. The prefixed conjunction is rendered 'And' in continuity with
    the surrounding prohibitions.
- source_word: לֹא תָבֹוא
  chosen: you shall not enter
  alternatives:
  - you must not go in
  - do not enter
  lexicon: HALOT
  rationale: The imperfect 2ms in this prophetic instruction functions as a prohibition.
    'You shall not enter' preserves the solemn directive tone appropriate to the context.
- source_word: לָשֶׁבֶת
  chosen: to sit
  alternatives:
  - to sit down
  - to dwell
  lexicon: HALOT
  rationale: From ישׁב, here the infinitive expresses purpose after entering. In a
    meal setting, 'to sit' naturally implies taking one's place with the group; 'dwell'
    would be contextually wrong.
- source_word: אוֹתָם
  chosen: with them
  alternatives:
  - them
  lexicon: HALOT
  rationale: Although formally the direct-object marker with pronominal suffix, in
    this idiom after 'sit' it is best represented in English as associative 'with
    them' ('sit with them'), which conveys the social participation being forbidden.
- source_word: לֶאֱכֹל וְלִשְׁתּוֹת
  chosen: to eat and to drink
  alternatives:
  - to eat and drink
  lexicon: HALOT
  rationale: The paired infinitives state the purpose/result of joining the feast.
    Retaining both infinitives explicitly mirrors the Hebrew rhythm and keeps the
    focus on participation in communal festivity.
