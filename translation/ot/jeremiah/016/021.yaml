id: JER.16.21
reference: Jeremiah 16:21
source:
  edition: WLC
  text: לָ/כֵן֙ הִנְ/נִ֣י מֽוֹדִיעָ֔/ם בַּ/פַּ֣עַם הַ/זֹּ֔את אוֹדִיעֵ֥/ם אֶת יָדִ֖/י וְ/אֶת גְּבֽוּרָתִ֑/י וְ/יָדְע֖וּ כִּֽי שְׁמִ֥/י יְהוָֽה־־־׃ס
translation:
  text: Therefore, behold, I am making them know—this time I will make them know my hand and my might, and they will know that my name is Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am making it known to them ... I will make it known to them.' The Hebrew verb is causative ('make know') and may be rendered either with a personal object ('make them know') or with an impersonal object ('make it known to them').
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my hand,' a common figure for active power.
    reason: cultural_note
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks a consequential conclusion from the preceding context; 'Therefore' is natural and sufficiently formal.
- source_word: הִנְנִי
  chosen: look, I am
  alternatives:
  - behold, I am
  - here I am
  lexicon: HALOT
  rationale: Introduces emphatic divine announcement. 'Look' preserves the deictic force in readable modern English better than archaic 'behold.'
- source_word: מוֹדִיעָם / אוֹדִיעֵם
  chosen: I am making them know ... I will make them know
  alternatives:
  - I am informing them ... I will inform them
  - I am making it known to them ... I will make known to them
  lexicon: HALOT
  rationale: The Hiphil of ידע is causative. Repeating 'make them know' preserves the Hebrew repetition and the personal object suffix ('them'). The first participle plus following finite verb creates an emphatic announcement; English reflects this with a present-progressive introduction followed by future fulfillment.
- source_word: בַּפַּעַם הַזֹּאת
  chosen: this time
  alternatives:
  - at this time
  - on this occasion
  lexicon: HALOT
  rationale: Idiomatic temporal expression; 'this time' is concise and natural while preserving the demonstrative emphasis.
- source_word: יָדִי
  chosen: my hand
  alternatives:
  - my power
  lexicon: HALOT
  rationale: Retained literally because 'hand' is a common Hebrew metaphor for active power, and the following 'my might' clarifies the sense. This avoids flattening the imagery.
- source_word: גְּבוּרָתִי
  chosen: my might
  alternatives:
  - my strength
  - my power
  lexicon: HALOT
  rationale: Denotes strength/might. 'Might' pairs well with literal 'hand' without collapsing both terms into the same English gloss 'power.'
- source_word: וְיָדְעוּ
  chosen: and they will know
  alternatives:
  - then they will know
  lexicon: HALOT
  rationale: Simple future consequence/result. 'And' preserves the Hebrew coordination without overinterpreting.
- source_word: שְׁמִי
  chosen: my name
  lexicon: HALOT
  rationale: Literal rendering preserves the covenantal significance of divine self-identification.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
