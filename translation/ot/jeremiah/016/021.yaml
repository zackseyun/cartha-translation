theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to interpret 'my hand' idiomatically as 'my power' in the main text
  chosen_reading: my hand
  alternative_readings:
  - my power
  rationale: The Hebrew uses distinct terms ('my hand' and 'my might'). Keeping 'hand' preserves the metaphor and the rhetorical force of the pair, while 'my might' supplies the semantic clarification. This avoids importing an interpretive flattening into the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #5'
