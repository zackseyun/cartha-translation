theological_decisions:
- issue: Force of the prohibition to Jeremiah
  chosen_reading: A direct divine prohibition against Jeremiah's marrying and having
    children in the present locale/context
  alternative_readings:
  - A general statement that he will remain unmarried and childless
  - A broader prohibition tied to the whole land rather than specifically 'this place'
  rationale: The second masculine singular forms make this a direct command to Jeremiah.
    The wording is prohibitive rather than merely predictive. 'This place' is retained
    to preserve the local and prophetic force without expanding it interpretively.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; original-language primacy over translation tradition.'
