id: JER.16.2
reference: Jeremiah 16:2
source:
  edition: WLC
  text: לֹֽא תִקַּ֥ח לְ/ךָ֖ אִשָּׁ֑ה וְ/לֹֽא יִהְי֤וּ לְ/ךָ֙ בָּנִ֣ים וּ/בָנ֔וֹת בַּ/מָּק֖וֹם
    הַ/זֶּֽה־־׃
translation:
  text: You shall not take a wife for yourself, nor shall you have sons or daughters
    in this place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'You shall not marry, nor have sons or daughters in
      this place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִקַּח
  chosen: take
  alternatives:
  - marry
  lexicon: HALOT
  rationale: The verb לקח literally means 'take.' In the idiom 'take a wife,' English
    can also say 'marry,' but 'take a wife' preserves the Hebrew wording and solemn
    force while remaining understandable.
- source_word: לְךָ
  chosen: for yourself
  alternatives:
  - for you
  - to yourself
  lexicon: HALOT
  rationale: The preposition with pronominal suffix marks personal reference. 'For
    yourself' brings out the reflexive/personal sense naturally in English and fits
    the prohibition addressed directly to Jeremiah.
- source_word: אִשָּׁה
  chosen: wife
  alternatives:
  - woman
  lexicon: HALOT
  rationale: In the collocation 'take ... a wife,' אִשָּׁה clearly means 'wife,' not
    merely 'woman.' This is the standard marital sense in context.
- source_word: וְלֹא יִהְיוּ לְךָ
  chosen: nor shall you have
  alternatives:
  - and there shall not be to you
  - and you shall not have
  lexicon: HALOT
  rationale: The Hebrew uses היה with לְ to express possession/existence ('there shall
    not be to you'). 'Nor shall you have' is idiomatic English that preserves the
    prohibition's force.
- source_word: בָּנִים וּבָנוֹת
  chosen: sons or daughters
  alternatives:
  - children
  - sons and daughters
  lexicon: HALOT
  rationale: The Hebrew explicitly names both male and female offspring. 'Sons or
    daughters' preserves that specificity better than the more general 'children.'
    'Or' fits the English negative construction after 'nor shall you have' without
    changing the sense.
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: in this place
  alternatives:
  - in this land
  - here
  lexicon: HALOT
  rationale: מָקוֹם is most basically 'place.' 'In this place' preserves the deictic
    force of the Hebrew and avoids over-specifying it as 'land,' which would be broader
    than the source warrants.
