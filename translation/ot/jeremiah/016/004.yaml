id: JER.16.4
reference: Jeremiah 16:4
source:
  edition: WLC
  text: מְמוֹתֵ֨י תַחֲלֻאִ֜ים יָמֻ֗תוּ לֹ֤א יִסָּֽפְדוּ֙ וְ/לֹ֣א יִקָּבֵ֔רוּ לְ/דֹ֛מֶן
    עַל פְּנֵ֥י הָ/אֲדָמָ֖ה יִֽהְי֑וּ וּ/בַ/חֶ֤רֶב וּ/בָֽ/רָעָב֙ יִכְל֔וּ וְ/הָיְתָ֤ה
    נִבְלָתָ/ם֙ לְ/מַאֲכָ֔ל לְ/ע֥וֹף הַ/שָּׁמַ֖יִם וּ/לְ/בֶהֱמַ֥ת הָ/אָֽרֶץ־׃ס
translation:
  text: They will die of deadly diseases. They will not be mourned or buried. They
    will become dung on the surface of the ground. They will be consumed by the sword
    and by famine, and their carcasses will become food for the birds of the heavens
    and for the beasts of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'deaths of diseases'; the phrase means death caused by
      severe disease.
    reason: lexical_alternative
  - marker: b
    text: Or 'upon the face of the ground.'
    reason: lexical_alternative
  - marker: c
    text: Or 'their corpses' instead of 'their carcasses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְמוֹתֵי תַחֲלֻאִים
  chosen: deadly diseases
  alternatives:
  - deaths of sicknesses
  - diseases of death
  - mortal diseases
  lexicon: HALOT
  rationale: The construct phrase is literally 'deaths of diseases/sicknesses,' an
    idiom expressing death caused by severe disease. 'Deadly diseases' conveys the
    Hebrew sense in natural English without over-literal awkwardness.
- source_word: יָמֻתוּ
  chosen: they will die
  lexicon: HALOT
  rationale: Simple qal imperfect of מות, future/predictive in this judgment context.
- source_word: לֹא יִסָּפְדוּ
  chosen: they will not be mourned
  alternatives:
  - they will not be lamented for
  lexicon: HALOT
  rationale: The Niphal of ספד refers to mourning or lamentation rites for the dead.
    'Mourned' is concise and idiomatic.
- source_word: וְלֹא יִקָּבֵרוּ
  chosen: or buried
  alternatives:
  - and they will not be buried
  lexicon: HALOT
  rationale: Continuation of the negated funeral treatment. In English, 'or buried'
    fits the paired structure with 'not be mourned'.
- source_word: לְדֹמֶן
  chosen: dung
  alternatives:
  - manure
  - refuse
  lexicon: HALOT
  rationale: דֹּמֶן denotes dung/manure. 'Dung' preserves the stark, degrading imagery
    better than the softer 'refuse.'
- source_word: עַל פְּנֵי הָאֲדָמָה
  chosen: on the surface of the ground
  alternatives:
  - upon the face of the ground
  - on the face of the earth
  lexicon: HALOT
  rationale: Literally 'on the face of the ground.' 'On the surface of the ground'
    is natural English that preserves the image of exposed, unburied remains.
- source_word: יִהְיוּ
  chosen: they will become
  alternatives:
  - they will be
  lexicon: HALOT
  rationale: Although formally 'they will be,' English idiom after 'dung' is better
    expressed as 'they will become dung,' making the resultative sense explicit.
- source_word: וּבַחֶרֶב וּבָרָעָב יִכְלוּ
  chosen: They will be consumed by the sword and by famine
  alternatives:
  - They will perish by sword and famine
  - The sword and famine will consume them
  lexicon: HALOT
  rationale: כלה here carries the sense of being finished off/consumed. 'Consumed'
    preserves the severity and works well with the instrumental ב prepositions.
- source_word: וְהָיְתָה נִבְלָתָם
  chosen: their carcasses will become
  alternatives:
  - their corpses will be
  - their dead bodies will become
  lexicon: HALOT
  rationale: נְבֵלָה refers to a carcass/corpse, often with emphasis on lifeless remains
    exposed after judgment. 'Carcasses' fits the scavenger context and the degrading
    tone.
- source_word: לְמַאֲכָל
  chosen: food
  alternatives:
  - something to eat
  lexicon: HALOT
  rationale: Straightforward rendering of the noun for food.
- source_word: לְעוֹף הַשָּׁמַיִם
  chosen: for the birds of the heavens
  alternatives:
  - for the birds of the sky
  - for the birds of heaven
  lexicon: HALOT
  rationale: Literally 'for the birds of the heavens.' This keeps the elevated biblical
    phrasing while remaining understandable.
- source_word: וּלְבֶהֱמַת הָאָרֶץ
  chosen: for the beasts of the earth
  alternatives:
  - for the animals of the earth
  - for the beasts of the land
  lexicon: HALOT
  rationale: בְּהֵמָה can mean beast/animal; in this judgment-scavenger context, 'beasts'
    better matches the ominous tone and pairs well with 'birds of the heavens.'
