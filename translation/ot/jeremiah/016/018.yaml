theological_decisions:
- issue: Whether to make explicit that שִׁקּוּצֵיהֶם refers to idols
  chosen_reading: Rendered as 'their detestable idols' in the main text
  alternative_readings:
  - their detestable things
  - their abominations
  rationale: In Jeremiah's polemical context, שִׁקּוּצִים commonly refers to idolatrous
    objects. Making 'idols' explicit helps modern readers grasp the referent without
    adding a new theological claim beyond the prophetic idiom. The more literal alternative
    is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
