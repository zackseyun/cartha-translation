id: JER.16.18
reference: Jeremiah 16:18
source:
  edition: WLC
  text: וְ/שִׁלַּמְתִּ֣י רִֽאשׁוֹנָ֗ה מִשְׁנֵ֤ה עֲוֺנָ/ם֙ וְ/חַטָּאתָ֔/ם עַ֖ל חַלְּלָ֣/ם
    אֶת אַרְצִ֑/י בְּ/נִבְלַ֤ת שִׁקּֽוּצֵי/הֶם֙ וְ/תוֹעֲב֣וֹתֵי/הֶ֔ם מָלְא֖וּ אֶת
    נַחֲלָתִֽ/י־־׃ס
translation:
  text: And first I will repay double their iniquity and their sin, because they have
    defiled my land with the carcasses of their detestable idols and have filled my
    inheritance with their abominations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the carcasses of their detestable things'; the Hebrew term often
      refers to idols in prophetic contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּמְתִּי
  chosen: I will repay
  alternatives:
  - I will recompense
  - I will pay back
  lexicon: HALOT
  rationale: The piel of שלם here carries the sense of repaying or requiting. 'Repay'
    is natural modern English and preserves the judicial sense without sounding archaic.
- source_word: רִאשׁוֹנָה
  chosen: first
  alternatives:
  - formerly
  - in the first place
  lexicon: HALOT
  rationale: 'In context this adverb modifies the act of repayment, indicating priority:
    God will first repay before later restoration. ''First'' is the clearest rendering.'
- source_word: מִשְׁנֵה
  chosen: double
  alternatives:
  - twice as much
  - a double portion
  lexicon: HALOT
  rationale: The noun denotes doubleness or a double amount. 'Double' is the standard
    concise rendering in punitive contexts.
- source_word: עֲוֺנָם
  chosen: their iniquity
  alternatives:
  - their guilt
  - their wrongdoing
  lexicon: HALOT
  rationale: עָוֹן can denote both guilt and iniquity. 'Iniquity' preserves the moral
    and culpable nuance and pairs well with the following 'sin' without collapsing
    the two terms.
- source_word: וְחַטָּאתָם
  chosen: and their sin
  alternatives:
  - and their sins
  - and their offense
  lexicon: HALOT
  rationale: Though singular in form, it can function collectively. Rendering it as
    singular keeps the Hebrew parallelism with 'their iniquity' while still conveying
    collective wrongdoing.
- source_word: עַל
  chosen: because
  alternatives:
  - for
  - on account of
  lexicon: HALOT
  rationale: Here עַל introduces the ground or reason for punishment. 'Because' communicates
    the causal force smoothly in English.
- source_word: חַלְּלָם אֶת־אַרְצִי
  chosen: they have defiled my land
  alternatives:
  - they profaned my land
  lexicon: HALOT
  rationale: The piel participial/verbal idea from חלל in this context is ritual-moral
    desecration. 'Defiled' fits the land-pollution imagery better in contemporary
    English, while 'profaned' remains a viable alternative.
- source_word: בְּנִבְלַת שִׁקּוּצֵיהֶם
  chosen: with the carcasses of their detestable idols
  alternatives:
  - with the carcasses of their abominations
  - with the dead bodies of their disgusting things
  lexicon: HALOT
  rationale: נִבְלָה means carcass/corpse. שִׁקּוּצִים is a common term for detestable
    things, often idols in prophetic polemic. 'Detestable idols' makes explicit the
    likely referent while preserving the revulsion of the Hebrew.
- source_word: וְתוֹעֲבוֹתֵיהֶם
  chosen: their abominations
  alternatives:
  - their detestable things
  lexicon: HALOT
  rationale: The term regularly denotes abhorrent religious practices or objects.
    'Abominations' is established and still understandable in modern English.
- source_word: מָלְאוּ אֶת־נַחֲלָתִי
  chosen: have filled my inheritance
  alternatives:
  - have filled my possession
  - have filled my heritage
  lexicon: HALOT
  rationale: נַחֲלָה here refers to the land as God's allotted possession/inheritance.
    'My inheritance' preserves covenantal resonance and matches prophetic usage.
