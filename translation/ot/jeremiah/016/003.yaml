id: JER.16.3
reference: Jeremiah 16:3
source:
  edition: WLC
  text: כִּי כֹ֣ה אָמַ֣ר יְהוָ֗ה עַל הַ/בָּנִים֙ וְ/עַל הַ/בָּנ֔וֹת הַ/יִּלּוֹדִ֖ים בַּ/מָּק֣וֹם הַ/זֶּ֑ה וְ/עַֽל אִמֹּתָ֞/ם הַ/יֹּלְד֣וֹת אוֹתָ֗/ם וְ/עַל אֲבוֹתָ֛/ם הַ/מּוֹלִדִ֥ים אוֹתָ֖/ם בָּ/אָ֥רֶץ הַ/זֹּֽאת־׀־־־־׃
translation:
  text: 'For thus says Yahweh concerning the sons and the daughters born in this place, and concerning their mothers who bear them, and their fathers who father them in this land:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'sons and daughters,' explicitly naming both males and females rather than using a generic term for children.
    reason: lexical_alternative
  - marker: b
    text: Or 'who give birth to them.'
    reason: lexical_alternative
  - marker: c
    text: Or 'who beget them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the divine explanation flowing from the previous command; 'For' fits the discourse connection naturally in English.
- source_word: כֹה אָמַר יְהוָה
  chosen: thus says the LORD
  alternatives:
  - this is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal prophetic cadence, and יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and alignment with the stated doctrine.
- source_word: עַל
  chosen: concerning
  alternatives:
  - about
  - against
  lexicon: HALOT
  rationale: Here עַל introduces the topic of the oracle rather than hostility alone. 'Concerning' best fits the repeated structure across children, mothers, and fathers.
- source_word: הַבָּנִים וְהַבָּנוֹת
  chosen: the sons and the daughters
  alternatives:
  - the children
  - the boys and the girls
  lexicon: HALOT
  rationale: Gender-accurate rendering preserves the explicit male/female pair in the Hebrew rather than collapsing to the generic 'children.'
- source_word: הַיִּלּוֹדִים
  chosen: born
  alternatives:
  - who are born
  - being born
  lexicon: HALOT
  rationale: The passive/adjectival form modifies 'sons and daughters.' 'Born' is concise and natural in English while preserving the sense.
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: in this place
  alternatives:
  - in this location
  - here
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'In this place' preserves the prophetic tone better than the more colloquial 'here.'
- source_word: אִמֹּתָם
  chosen: their mothers
  lexicon: HALOT
  rationale: Direct possessive rendering of the plural noun with 3mp suffix.
- source_word: הַיֹּלְדוֹת אוֹתָם
  chosen: who bear them
  alternatives:
  - who give birth to them
  lexicon: HALOT
  rationale: The Qal participle from ילד refers to mothers giving birth. 'Bear them' is compact and idiomatic; 'give birth to them' is possible but more cumbersome in this list structure.
- source_word: אֲבוֹתָם
  chosen: their fathers
  lexicon: HALOT
  rationale: Direct possessive rendering parallel to 'their mothers.'
- source_word: הַמּוֹלִדִים אוֹתָם
  chosen: who father them
  alternatives:
  - who beget them
  - who sire them
  lexicon: HALOT
  rationale: The Hiphil participle of ילד with fathers denotes causing to be born, i.e., begetting/fathering. 'Father them' is readable modern English and preserves the paternal role without archaic 'beget' or overly animal-sounding 'sire.'
- source_word: בָּאָרֶץ הַזֹּאת
  chosen: in this land
  alternatives:
  - in this הארץ
  - in this country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the land of Judah/Jerusalem's setting rather than abstract earth. 'Land' is the most contextually appropriate rendering.
