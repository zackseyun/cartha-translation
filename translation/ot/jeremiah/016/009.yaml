id: JER.16.9
reference: Jeremiah 16:9
source:
  edition: WLC
  text: כִּי֩ כֹ֨ה אָמַ֜ר יְהוָ֤ה צְבָאוֹת֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל הִנְ/נִ֨י מַשְׁבִּ֜ית מִן הַ/מָּק֥וֹם הַ/זֶּ֛ה לְ/עֵינֵי/כֶ֖ם וּ/בִֽ/ימֵי/כֶ֑ם ק֤וֹל שָׂשׂוֹן֙ וְ/ק֣וֹל שִׂמְחָ֔ה ק֥וֹל חָתָ֖ן וְ/ק֥וֹל כַּלָּֽה־׃
translation:
  text: 'For thus says Yahweh of Armies, the God of Israel: Behold, I am about to put an end, from this place before your eyes and in your days, to the sound of joy and the sound of gladness, the voice of the bridegroom and the voice of the bride.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the LORD of hosts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name through small-caps convention in English rather than transliteration.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: The title יְהוָה צְבָאוֹת is rendered transparently as 'the LORD of Armies' to communicate the concrete sense of צבאות in readable modern English; 'hosts' is traditional but less immediately clear.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: A straightforward construct rendering; no reason to vary from the plain sense.
- source_word: הִנְנִי
  chosen: Behold, I am about to
  alternatives:
  - Behold, I
  - Look, I am
  lexicon: HALOT
  rationale: הִנְנִי is a deictic announcement formula. Combined with the participle מַשְׁבִּית, it signals imminent divine action. 'Behold, I am about to' preserves both the attention-getting force and the near-future sense in idiomatic English.
- source_word: מַשְׁבִּית
  chosen: put an end
  alternatives:
  - cause to cease
  - make cease
  - silence
  lexicon: HALOT
  rationale: The Hiphil participle of שׁבת means 'cause to cease.' In this context of sounds and festive voices, 'put an end' is natural English that preserves the causative force without awkwardness.
- source_word: מִן הַמָּקוֹם הַזֶּה
  chosen: from this place
  alternatives:
  - out of this place
  lexicon: HALOT
  rationale: A direct rendering of the prepositional phrase, referring to the locale under judgment.
- source_word: לְעֵינֵיכֶם
  chosen: before your eyes
  alternatives:
  - in your sight
  lexicon: HALOT
  rationale: Idiomatic English equivalent that preserves the public, witnessed nature of the coming judgment.
- source_word: וּבִימֵיכֶם
  chosen: and in your days
  alternatives:
  - during your lifetime
  lexicon: HALOT
  rationale: Retains the temporal phrase with a close formal correspondence while remaining natural in English.
- source_word: קוֹל שָׂשׂוֹן
  chosen: the sound of joy
  alternatives:
  - the voice of rejoicing
  - the sound of rejoicing
  lexicon: HALOT
  rationale: קוֹל can denote sound or voice. With abstract nouns of festivity, 'sound of joy' best captures the audible atmosphere being removed.
- source_word: וְקוֹל שִׂמְחָה
  chosen: and the sound of gladness
  alternatives:
  - and the sound of joy
  - and the voice of gladness
  lexicon: HALOT
  rationale: Rendered distinctly from שָׂשׂוֹן to preserve the paired but not identical festive terms; 'gladness' avoids flattening both into the same English word.
- source_word: קוֹל חָתָן
  chosen: the voice of the bridegroom
  alternatives:
  - the sound of the bridegroom
  lexicon: HALOT
  rationale: With personal referents, 'voice' is more natural than 'sound' and preserves the repeated קוֹל pattern in the Hebrew.
- source_word: וְקוֹל כַּלָּה
  chosen: and the voice of the bride
  alternatives:
  - and the sound of the bride
  lexicon: HALOT
  rationale: Matches the preceding phrase and preserves the wedding imagery of communal celebration being cut off.
