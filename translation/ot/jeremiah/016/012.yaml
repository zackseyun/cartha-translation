id: JER.16.12
reference: Jeremiah 16:12
source:
  edition: WLC
  text: וְ/אַתֶּ֛ם הֲרֵעֹתֶ֥ם לַ/עֲשׂ֖וֹת מֵ/אֲבֽוֹתֵי/כֶ֑ם וְ/הִנְּ/כֶ֣ם הֹלְכִ֗ים
    אִ֚ישׁ אַֽחֲרֵי֙ שְׁרִר֣וּת לִבּֽ/וֹ הָ/רָ֔ע לְ/בִלְתִּ֖י שְׁמֹ֥עַ אֵלָֽ/י־׃
translation:
  text: But you have done worse than your fathers, and look, each of you is walking
    after the stubbornness of his evil heart, refusing to listen to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have acted more wickedly than your fathers.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man,' used distributively for the people as a whole.
    reason: lexical_alternative
  - marker: c
    text: Or 'after the stubborn imagination of his evil heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲרֵעֹתֶם
  chosen: have done worse
  alternatives:
  - have acted more wickedly
  - have done evil more than
  lexicon: HALOT
  rationale: Hiphil of רעע here is comparative in force with מֵאֲבוֹתֵיכֶם following;
    'have done worse' captures the comparative sense naturally in English without
    losing the moral dimension.
- source_word: לַעֲשׂוֹת
  chosen: done
  alternatives:
  - acted
  - practiced
  lexicon: HALOT
  rationale: Used idiomatically with הֲרֵעֹתֶם to express doing/acting wickedly. In
    English, folding it into 'have done worse' avoids wooden phrasing.
- source_word: מֵאֲבוֹתֵיכֶם
  chosen: than your fathers
  alternatives:
  - than your ancestors
  lexicon: HALOT
  rationale: אָבוֹת can mean fathers/ancestors. 'Fathers' preserves the Hebrew's gendered
    and familial wording and matches prophetic idiom; the comparison is with prior
    generations.
- source_word: וְהִנְכֶם
  chosen: and look
  alternatives:
  - and behold
  - indeed
  lexicon: HALOT
  rationale: Deictic particle introducing emphatic present evidence. 'And look' is
    readable modern English while retaining the force of attention-directing הנה.
- source_word: הֹלְכִים
  chosen: is walking
  alternatives:
  - walks
  - goes on
  lexicon: HALOT
  rationale: הלך in participial form expresses ongoing conduct. Rendered with progressive
    aspect in English to convey habitual action.
- source_word: אִישׁ
  chosen: each of you
  alternatives:
  - each man
  - everyone
  lexicon: HALOT
  rationale: 'Literally ''man,'' but distributive in context: ''each one.'' This preserves
    the individualizing force without implying only males are addressed. The plural
    audience justifies ''each of you'' as optimal equivalence.'
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - according to
  - following
  lexicon: HALOT
  rationale: Common idiom 'walk after' = follow. Retained with 'walking after' to
    preserve the metaphor of conduct directed by an internal guide.
- source_word: שְׁרִרוּת
  chosen: stubbornness
  alternatives:
  - stubborn imagination
  - hardness
  - willfulness
  lexicon: HALOT
  rationale: In Jeremiah this noun denotes obstinate self-will. 'Stubbornness' is
    idiomatic and accessible; 'imagination' reflects older tradition but is less clear
    in modern English.
- source_word: לִבּוֹ הָרָע
  chosen: his evil heart
  alternatives:
  - his wicked heart
  lexicon: HALOT
  rationale: Straightforward construct phrase. 'Evil heart' preserves the moral evaluation
    and the Hebrew anthropology of the heart as the center of will and thought.
- source_word: לְבִלְתִּי שְׁמֹעַ אֵלַי
  chosen: refusing to listen to me
  alternatives:
  - so as not to listen to me
  - without listening to me
  lexicon: HALOT
  rationale: The infinitive construction expresses result/purpose tied to their stubborn
    course. 'Refusing to listen to me' makes explicit the volitional disobedience
    implied by the context and the construction, while remaining faithful to sense.
