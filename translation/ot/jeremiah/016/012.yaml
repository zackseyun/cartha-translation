theological_decisions:
- issue: Gendered distributive expression אִישׁ in address to the people
  chosen_reading: each of you
  alternative_readings:
  - each man
  - everyone
  rationale: Following the gender-accurate principle, the Hebrew singular masculine
    noun functions distributively for the whole audience, not as a restriction to
    males. 'Each of you' preserves the distributive force in natural English without
    flattening the syntax into an abstract collective.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of ancestral term אָבוֹת
  chosen_reading: fathers
  alternative_readings:
  - ancestors
  rationale: The Hebrew is explicitly masculine plural and commonly refers to forefathers/previous
    generations. 'Fathers' preserves source texture and prophetic diction; no contextual
    necessity requires neutralization.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
