id: JER.16.1
reference: Jeremiah 16:1
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Now ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive form of היה functions here as standard narrative/sequential introduction. In English, rendering it woodenly as 'and it happened' is possible but less natural; the sense is carried idiomatically by 'And ... came' with the following predicate. This preserves the discourse flow without unnecessary archaism.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: In the prophetic formula דְבַר יְהוָה, 'the word' is the standard and sufficiently transparent rendering, preserving the formal prophetic idiom better than the more interpretive 'message.' The construct relation with the divine name yields 'the word of the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition אֶל with 1cs suffix straightforwardly means 'to me.' 'Unto me' is unnecessarily archaic for the project's modern-English aim.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'thus:'
  - 'and said:'
  lexicon: HALOT
  rationale: The infinitive construct לֵאמֹר regularly introduces direct speech in prophetic formulas. 'Saying,' is the most direct and conventional rendering, signaling that the following verse(s) contain the speech content.
