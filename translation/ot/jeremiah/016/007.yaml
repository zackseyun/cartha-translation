id: JER.16.7
reference: Jeremiah 16:7
source:
  edition: WLC
  text: וְ/לֹֽא יִפְרְס֥וּ לָ/הֶ֛ם עַל אֵ֖בֶל לְ/נַחֲמ֣/וֹ עַל מֵ֑ת וְ/לֹֽא יַשְׁק֤וּ
    אוֹתָ/ם֙ כּ֣וֹס תַּנְחוּמִ֔ים עַל אָבִ֖י/ו וְ/עַל אִמּֽ/וֹ־־־־־־׃
translation:
  text: No one will break bread for them in mourning, to comfort him for the dead,
    and no one will give them the cup of consolation to drink for his father or for
    his mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'share food with them in mourning.' The Hebrew verb literally means 'break/divide'
      and likely refers to the customary mourning meal.
    reason: lexical_alternative
  - marker: b
    text: '''The cup of consolation'' likely refers to a customary drink offered to
      comfort mourners after a death.'
    reason: cultural_note
lexical_decisions:
- source_word: יִפְרְסוּ
  chosen: will break bread
  alternatives:
  - will divide
  - will spread out
  - will share food
  lexicon: HALOT
  rationale: The verb פרס literally means 'to divide/break.' In this mourning context
    with no explicit object, the idiom is widely understood as breaking bread or sharing
    a funeral meal. 'Break bread' preserves the concrete Hebrew image while remaining
    intelligible in English better than the overly vague 'divide.'
- source_word: עַל אֵבֶל
  chosen: in mourning
  alternatives:
  - for mourning
  - because of mourning
  - over mourning
  lexicon: HALOT
  rationale: The preposition עַל with אֵבֶל marks the circumstance or occasion of
    mourning. 'In mourning' gives natural English while preserving the funerary setting.
- source_word: לְנַחֲמוֹ
  chosen: to comfort him
  alternatives:
  - to console him
  lexicon: HALOT
  rationale: From נחם in the Piel, the sense is to comfort or console. 'Comfort' is
    the more natural modern English equivalent and matches the noun תַּנְחוּמִים later
    in the verse.
- source_word: עַל מֵת
  chosen: for the dead
  alternatives:
  - because of the dead
  - over the dead
  lexicon: HALOT
  rationale: The phrase indicates the occasion of bereavement, namely a death. 'For
    the dead' is concise and idiomatic in English funeral language.
- source_word: יַשְׁקוּ אוֹתָם
  chosen: will give them ... to drink
  alternatives:
  - will make them drink
  - will offer them to drink
  lexicon: HALOT
  rationale: 'The Hiphil of שקה means to cause to drink or give drink. Because the
    object is persons followed by ''cup of consolation,'' English requires an expanded
    rendering: ''give them ... to drink.'' This preserves the causative sense without
    sounding unnatural.'
- source_word: כּוֹס תַּנְחוּמִים
  chosen: the cup of consolation
  alternatives:
  - the cup of comfort
  - the consoling cup
  lexicon: HALOT
  rationale: This appears to denote a customary mourning cup offered to comfort the
    bereaved. 'Cup of consolation' is transparent, formal enough to preserve the cultural
    expression, and coheres with 'to comfort' earlier in the verse.
- source_word: עַל אָבִיו וְעַל אִמּוֹ
  chosen: for his father or for his mother
  alternatives:
  - because of his father or his mother
  - for his father and for his mother
  lexicon: HALOT
  rationale: 'The repeated עַל marks the cause of mourning. English idiom prefers
    ''for.'' ''Or'' reflects the distributive sense in context: even in the case of
    mourning for either parent, these customary consolations will not occur.'
