id: JER.16.5
reference: Jeremiah 16:5
source:
  edition: WLC
  text: כִּֽי כֹ֣ה אָמַ֣ר יְהוָ֗ה אַל תָּבוֹא֙ בֵּ֣ית מַרְזֵ֔חַ וְ/אַל תֵּלֵ֣ךְ לִ/סְפּ֔וֹד וְ/אַל תָּנֹ֖ד לָ/הֶ֑ם כִּֽי אָסַ֨פְתִּי אֶת שְׁלוֹמִ֜/י מֵ/אֵ֨ת הָ/עָ֤ם הַ/זֶּה֙ נְאֻם יְהוָ֔ה אֶת הַ/חֶ֖סֶד וְ/אֶת הָֽ/רַחֲמִֽים־׀־־־־־־־־־׃
translation:
  text: 'For thus says Yahweh: Do not enter a house of mourning, and do not go to mourn or show sympathy for them, for I have taken away my peace from this people, declares Yahweh—steadfast love and compassion.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a house of feasting.' The Hebrew term מַרְזֵחַ can denote a banquet setting in some contexts, but here the surrounding references to lamenting and showing sympathy favor 'house of mourning.'
    reason: lexical_alternative
  - marker: b
    text: Or 'console them.' The Hebrew verb can refer to making gestures of condolence or sympathy in mourning.
    reason: lexical_alternative
  - marker: c
    text: '''Peace'' here likely includes well-being, wholeness, and welfare, not merely the absence of conflict.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving the traditional small-caps covenantal substitute in English.
- source_word: בֵּית מַרְזֵחַ
  chosen: a house of mourning
  alternatives:
  - a house of feasting
  - a mourning house
  lexicon: HALOT
  rationale: מַרְזֵחַ can denote a mourning gathering/house, though in some contexts it can refer to a feast or revelry. Here the immediate context is death, lamentation, and sympathy, so 'house of mourning' best fits the discourse.
- source_word: לִסְפּוֹד
  chosen: to lament
  alternatives:
  - to mourn
  - to wail
  lexicon: HALOT
  rationale: The infinitive refers specifically to mourning/lamenting for the dead. 'Lament' is natural English and preserves the funeral context.
- source_word: תָּנֹד לָהֶם
  chosen: show sympathy for them
  alternatives:
  - bemoan them
  - console them
  - shake your head for them
  lexicon: HALOT
  rationale: The verb נוד in this context refers to gestures or expressions of condolence/sympathy toward mourners. 'Show sympathy' communicates the social act clearly in modern English.
- source_word: אָסַפְתִּי אֶת שְׁלוֹמִי
  chosen: I have taken away my peace
  alternatives:
  - I have withdrawn my peace
  - I have removed my well-being
  lexicon: HALOT
  rationale: Although אָסַף literally means 'gather/remove,' in this idiom God is withdrawing שָׁלוֹם from the people. 'Taken away' is idiomatic and clear; 'peace' preserves the key covenant term without overexpanding it.
- source_word: שְׁלוֹמִי
  chosen: my peace
  alternatives:
  - my well-being
  - my favor
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, welfare, and wholeness. 'Peace' is the most direct rendering and allows the broader covenantal sense to remain implicit.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is readable modern English and preserves the solemn prophetic force.
- source_word: הַחֶסֶד
  chosen: steadfast love
  alternatives:
  - covenant loyalty
  - lovingkindness
  - mercy
  lexicon: HALOT
  rationale: חֶסֶד is a covenantally rich term. 'Steadfast love' is a well-established English rendering that preserves both affection and loyalty without archaic diction.
- source_word: הָרַחֲמִים
  chosen: compassion
  alternatives:
  - mercies
  - tender mercies
  - pity
  lexicon: HALOT
  rationale: Plural רַחֲמִים often functions as an abstract plural for compassion/mercy. 'Compassion' is natural in English and pairs well with 'steadfast love'.
