theological_decisions:
- issue: Rendering the withdrawal of divine benefits in the final clause
  chosen_reading: The final accusatives ('steadfast love and compassion') are taken as appositional to 'my peace,' specifying what God has withdrawn.
  alternative_readings:
  - 'The clause could be rendered with an implied repeated verb: ''I have taken away ... steadfast love and compassion.'''
  rationale: Hebrew places אֶת before 'my peace' and again before 'the steadfast love' and 'the compassion,' which can be read as explicating the content of what has been removed. An em dash in English preserves the force without adding too much interpretation.
