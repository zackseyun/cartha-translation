id: JER.16.11
reference: Jeremiah 16:11
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֗ם עַל֩ אֲשֶׁר עָזְב֨וּ אֲבוֹתֵי/כֶ֤ם אוֹתִ/י֙ נְאֻם יְהוָ֔ה וַ/יֵּלְכ֗וּ אַֽחֲרֵי֙ אֱלֹהִ֣ים אֲחֵרִ֔ים וַ/יַּעַבְד֖וּ/ם וַ/יִּשְׁתַּחֲו֣וּ לָ/הֶ֑ם וְ/אֹתִ֣/י עָזָ֔בוּ וְ/אֶת תּוֹרָתִ֖/י לֹ֥א שָׁמָֽרוּ־־־׃
translation:
  text: Then you shall say to them, ‘Because your fathers abandoned me,’ declares Yahweh, ‘and went after other gods, and served them, and bowed down to them; but me they abandoned, and my law they did not keep.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your ancestors.' The Hebrew is literally 'your fathers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my instruction.' Hebrew torah can mean 'law' or 'instruction,' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: Then you shall say
  alternatives:
  - And you shall say
  lexicon: HALOT
  rationale: The conjunction plus perfect with directive force in context is naturally rendered as a sequential instruction, 'Then you shall say,' in readable English while preserving the command-like force.
- source_word: עַל אֲשֶׁר
  chosen: Because
  alternatives:
  - For this reason that
  - On account of which
  lexicon: HALOT
  rationale: The phrase introduces the reason for the coming judgment in the surrounding context. 'Because' is the most natural causal rendering in English.
- source_word: עָזְבוּ
  chosen: abandoned
  alternatives:
  - forsook
  - left
  lexicon: HALOT
  rationale: The verb denotes covenantal abandonment. 'Abandoned' is modern and weighty without sounding archaic like 'forsook.'
- source_word: אֲבוֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine/plural and refers to forefathers. Per gender-accurate policy, 'your fathers' best matches the source; 'ancestors' is possible but less literal.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is idiomatic, solemn, and preserves the force of divine pronouncement. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֵּלְכוּ אַחֲרֵי
  chosen: went after
  alternatives:
  - followed after
  - walked after
  lexicon: HALOT
  rationale: This idiom means to follow in allegiance or pursuit. 'Went after' is clear and preserves the metaphor without over-literal awkwardness.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The phrase straightforwardly denotes deities other than the LORD. 'Other gods' is the standard and most direct rendering.
- source_word: וַיַּעַבְדוּם
  chosen: served them
  alternatives:
  - worshiped them
  lexicon: HALOT
  rationale: עבד in this context can overlap with worship, but since the next verb explicitly denotes prostration/worship, 'served them' preserves the distinction between the two verbs.
- source_word: וַיִּשְׁתַּחֲווּ לָהֶם
  chosen: bowed down to them
  alternatives:
  - worshiped them
  - prostrated themselves before them
  lexicon: HALOT
  rationale: The verb literally denotes bowing/prostration. 'Bowed down to them' preserves the physical and cultic sense and avoids collapsing it into the previous 'served.'
- source_word: וְאֹתִי
  chosen: But me
  alternatives:
  - And me
  - Yet me
  lexicon: HALOT
  rationale: The fronted object is emphatic. 'But me' brings out the contrast in English between devotion to other gods and rejection of the LORD.
- source_word: תּוֹרָתִי
  chosen: my law
  alternatives:
  - my instruction
  lexicon: HALOT
  rationale: תורה can mean instruction broadly, but in covenantal prophetic context 'my law' is the most recognizable and fitting rendering, referring to the LORD's binding teaching.
- source_word: לֹא שָׁמָרוּ
  chosen: they did not keep
  alternatives:
  - they did not observe
  - they did not guard
  lexicon: HALOT
  rationale: שׁמר with תורה commonly means to keep/observe. 'Did not keep' is concise and idiomatic.
