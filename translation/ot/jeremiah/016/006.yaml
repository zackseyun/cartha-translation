id: JER.16.6
reference: Jeremiah 16:6
source:
  edition: WLC
  text: וּ/מֵ֨תוּ גְדֹלִ֧ים וּ/קְטַנִּ֛ים בָּ/אָ֥רֶץ הַ/זֹּ֖את לֹ֣א יִקָּבֵ֑רוּ וְ/לֹֽא
    יִסְפְּד֣וּ לָ/הֶ֔ם וְ/לֹ֣א יִתְגֹּדַ֔ד וְ/לֹ֥א יִקָּרֵ֖חַ לָ/הֶֽם־׃
translation:
  text: Both great and small will die in this land. They will not be buried, and no
    one will mourn for them, or cut himself, or shave himself bald for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, customary mourning practices such as self-laceration and shaving
      the head bald will not be performed for the dead.
    reason: cultural_note
  - marker: b
    text: Or 'they will not lament for them.' The Hebrew uses an indefinite plural
      verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֵתוּ
  chosen: will die
  alternatives:
  - will perish
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in prophetic context functions
    futurally: announcing what will happen. ''Die'' is the plain sense of מות and
    avoids interpretive expansion.'
- source_word: גְדֹלִים וּקְטַנִּים
  chosen: both great and small
  alternatives:
  - great and small
  - the great and the small
  lexicon: HALOT
  rationale: A merism referring to all social ranks/ages. 'Both great and small' communicates
    the inclusive pair naturally in English.
- source_word: בָּאָרֶץ הַזֹּאת
  chosen: in this land
  alternatives:
  - in this הארץ
  - in this country
  lexicon: HALOT
  rationale: '''Land'' is the normal rendering of אֶרֶץ here, fitting Jeremiah''s
    covenantal/geographical setting better than the more modern ''country.'''
- source_word: לֹא יִקָּבֵרוּ
  chosen: will not be buried
  alternatives:
  - will not be interred
  lexicon: HALOT
  rationale: Niphal imperfect of קבר is straightforward passive. 'Buried' is clear,
    idiomatic, and sufficiently formal.
- source_word: וְלֹא יִסְפְּדוּ לָהֶם
  chosen: and no one will mourn for them
  alternatives:
  - and they will not lament for them
  - and they will not hold a mourning rite for them
  lexicon: HALOT
  rationale: 'The Hebrew has an indefinite 3mp verb (''they will not mourn for them'').
    English commonly expresses this with an indefinite subject: ''no one will mourn
    for them.'' This preserves the sense that customary public mourning will be absent.'
- source_word: וְלֹא יִתְגֹּדַד
  chosen: or cut himself
  alternatives:
  - or gash himself
  - or make cuts on himself
  lexicon: HALOT
  rationale: The hitgoded reflexive form refers to self-laceration as a mourning practice.
    'Cut himself' is concise and understandable; the reflexive is preserved.
- source_word: וְלֹא יִקָּרֵחַ לָהֶם
  chosen: or shave himself bald for them
  alternatives:
  - or make himself bald for them
  - or shave his head for them
  lexicon: HALOT
  rationale: The Niphal/denominative form from קרח refers to making oneself bald as
    a mourning sign. 'Shave himself bald' makes the idiom explicit for modern readers
    while retaining the mourning context signaled by 'for them.'
