theological_decisions:
- issue: Rendering the mourning customs without softening their cultural specificity
  chosen_reading: Explicitly name the acts as self-cutting and shaving bald in the
    main text
  alternative_readings:
  - Use broader language such as 'perform mourning rites'
  rationale: The verse lists concrete prohibited/absent mourning practices, not merely
    generic grief. Preserving the physical acts maintains the force of the judgment
    oracle and avoids paraphrase.
  doctrine_reference: Translation philosophy §§1, 6
