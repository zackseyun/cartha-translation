id: JER.16.17
reference: Jeremiah 16:17
source:
  edition: WLC
  text: כִּ֤י עֵינַ/י֙ עַל כָּל דַּרְכֵי/הֶ֔ם לֹ֥א נִסְתְּר֖וּ מִ/לְּ/פָנָ֑/י וְ/לֹֽא
    נִצְפַּ֥ן עֲוֺנָ֖/ם מִ/נֶּ֥גֶד עֵינָֽ/י־־־׃
translation:
  text: For my eyes are on all their ways; they are not hidden from before me, and
    their iniquity is not concealed from before my eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because my eyes are on all their ways.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their ways'—that is, their conduct or manner of life.
    reason: lexical_alternative
  - marker: c
    text: Or 'their guilt' for 'their iniquity.' The Hebrew עָוֹן can denote wrongdoing
      or the guilt associated with it.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding statement. 'For' preserves the
    explanatory force in natural English and fits prophetic discourse well.
- source_word: עֵינַי
  chosen: my eyes
  lexicon: HALOT
  rationale: A literal rendering preserves the anthropomorphic imagery of divine omniscience
    rather than abstracting to 'I see' or 'I know.'
- source_word: עַל
  chosen: are on
  alternatives:
  - are upon
  - watch
  lexicon: HALOT
  rationale: With 'my eyes,' the preposition conveys directed attention. 'Are on'
    is idiomatic modern English while retaining the image of watchful observation.
- source_word: כָּל דַּרְכֵיהֶם
  chosen: all their ways
  alternatives:
  - all their paths
  - everything they do
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly means 'way/path' and by extension conduct. 'Ways' preserves
    the Hebrew metaphor and moral sense without over-paraphrasing to 'everything they
    do.'
- source_word: לֹא נִסְתְּרוּ
  chosen: they are not hidden
  alternatives:
  - they have not been hidden
  - they are not concealed
  lexicon: HALOT
  rationale: The Niphal plural matches 'their ways.' 'Are not hidden' is clear and
    preserves the passive sense.
- source_word: מִלְּפָנַי
  chosen: from before me
  alternatives:
  - from my presence
  - from me
  lexicon: HALOT
  rationale: Literally 'from before my face/presence.' 'From before me' keeps the
    spatial-personal idiom and parallels the second clause. 'From my presence' is
    possible but slightly more interpretive.
- source_word: וְלֹא נִצְפַּן
  chosen: is not concealed
  alternatives:
  - is not hidden
  - has not been hidden
  lexicon: HALOT
  rationale: The singular verb agrees with the singular noun עֲוֺנָם ('their iniquity').
    'Concealed' provides slight variation while preserving the same semantic field
    of hiddenness.
- source_word: עֲוֺנָם
  chosen: their iniquity
  alternatives:
  - their guilt
  - their wrongdoing
  - their sin
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt depending on
    context. Here it refers to their culpable wrongdoing before God. 'Iniquity' best
    preserves the moral-theological weight without collapsing it into the broader
    'sin.'
- source_word: מִנֶּגֶד עֵינַי
  chosen: from before my eyes
  alternatives:
  - from my sight
  - from in front of my eyes
  lexicon: HALOT
  rationale: Literally 'from opposite/in front of my eyes.' 'From before my eyes'
    is a formal but still intelligible rendering that preserves the vivid image and
    parallels the prior phrase.
