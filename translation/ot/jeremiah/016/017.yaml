theological_decisions:
- issue: Anthropomorphic language for divine knowledge
  chosen_reading: Preserve the concrete imagery of God's eyes being on their ways
    and their iniquity not being hidden from before his eyes.
  alternative_readings:
  - Paraphrase as 'I see everything they do' or 'nothing escapes my notice'
  rationale: The Hebrew uses embodied imagery to express divine omniscience and moral
    scrutiny. Preserving that imagery maintains the rhetoric of the prophetic text
    without importing a more abstract theological formulation.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering עָוֹן
  chosen_reading: their iniquity
  alternative_readings:
  - their guilt
  - their sin
  rationale: The verse emphasizes moral offense standing exposed before God. 'Iniquity'
    retains the gravity and covenantal-moral nuance of עָוֹן better than the broader
    'sin,' while not forcing the narrower sense 'guilt' alone.
  doctrine_reference: Translation philosophy §5
