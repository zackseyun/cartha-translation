theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metaphorical force of fishermen and hunters
  chosen_reading: Retain the concrete imagery without specifying the target's identity beyond 'them.'
  alternative_readings:
  - Interpret explicitly as enemy invaders
  - Interpret explicitly as agents gathering exiles
  rationale: The verse uses vivid metaphors for agents sent by God to seize people from every hiding place. The immediate context determines whether the action is punitive or restorative, but the verse itself does not require the translation to resolve that interpretive question. Preserving 'them' and the hunting/fishing imagery maintains the text's tension.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
