id: JER.16.16
reference: Jeremiah 16:16
source:
  edition: WLC
  text: הִנְ/נִ֨י שֹׁלֵ֜חַ ל/דוגים רַבִּ֛ים נְאֻם יְהוָ֖ה וְ/דִיג֑וּ/ם וְ/אַֽחֲרֵי כֵ֗ן אֶשְׁלַח֙ לְ/רַבִּ֣ים צַיָּדִ֔ים וְ/צָד֞וּ/ם מֵ/עַ֤ל כָּל הַר֙ וּ/מֵ/עַ֣ל כָּל גִּבְעָ֔ה וּ/מִ/נְּקִיקֵ֖י הַ/סְּלָעִֽים־־־־׃
translation:
  text: Look, I am sending for many fishermen, declares Yahweh, and they will catch them; and after that I will send for many hunters, and they will hunt them from every mountain and from every hill and from the clefts of the rocks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many fishers.'
    reason: lexical_alternative
  - marker: b
    text: The imagery of fishermen and hunters portrays people being sought out and seized from every hiding place; the verse itself does not explicitly identify the agents beyond those sent by the LORD.
    reason: cultural_note
lexical_decisions:
- source_word: הִנְנִי
  chosen: Look, I
  alternatives:
  - Behold, I
  - Here I am, I
  lexicon: HALOT
  rationale: Introduces a solemn divine announcement. 'Look' preserves the deictic force in readable modern English better than archaic 'Behold.'
- source_word: שֹׁלֵחַ
  chosen: am sending
  alternatives:
  - send
  - am about to send
  lexicon: HALOT
  rationale: The participle with הִנְנִי conveys imminent or ongoing action; 'am sending' captures the vividness better than a simple future.
- source_word: לְדוגים רַבִּים
  chosen: for many fishermen
  alternatives:
  - many fishers
  - many fishing men
  lexicon: HALOT
  rationale: The preposition with the noun indicates summoning or dispatching agents. 'Fishermen' is idiomatic modern English and fits the occupational sense.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is both natural and weighty. 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: וְדִיגוּם
  chosen: and they will catch them
  alternatives:
  - and they will fish them up
  - and they will fish for them
  lexicon: HALOT
  rationale: The verb from דוג in context means to catch by fishing. 'Catch them' is idiomatic and avoids awkward literalism while preserving the object suffix 'them.'
- source_word: וְאַחֲרֵי כֵן
  chosen: and after that
  alternatives:
  - and afterward
  - and after this
  lexicon: HALOT
  rationale: Marks sequence between the two waves of agents; 'after that' is straightforward modern English.
- source_word: אֶשְׁלַח
  chosen: I will send for
  alternatives:
  - I will send
  - I will dispatch
  lexicon: HALOT
  rationale: Future verb parallels the earlier sending and again likely carries the sense of summoning agents.
- source_word: לְרַבִּים צַיָּדִים
  chosen: for many hunters
  alternatives:
  - many trappers
  - many pursuers
  lexicon: HALOT
  rationale: צַיָּדִים are hunters. 'Hunters' preserves the concrete image that complements 'fishermen.'
- source_word: וְצָדוּם
  chosen: and they will hunt them
  alternatives:
  - and they will capture them
  - and they will chase them down
  lexicon: HALOT
  rationale: Keeps the hunting metaphor explicit and mirrors the Hebrew verb-object structure.
- source_word: מֵעַל כָּל הַר וּמֵעַל כָּל גִּבְעָה
  chosen: from every mountain and from every hill
  alternatives:
  - off every mountain and off every hill
  - from upon every mountain and from upon every hill
  lexicon: HALOT
  rationale: The repeated preposition emphasizes exhaustive reach. 'From every mountain and from every hill' is natural and preserves the repetition.
- source_word: וּמִנְּקִיקֵי הַסְּלָעִים
  chosen: and from the clefts of the rocks
  alternatives:
  - and from the fissures of the crags
  - and from the crevices of the rocks
  lexicon: HALOT
  rationale: נְקִיקִים refers to clefts, crevices, or fissures. 'Clefts of the rocks' is vivid, idiomatic, and suitably concrete.
