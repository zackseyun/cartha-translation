id: JER.16.14
reference: Jeremiah 16:14
source:
  edition: WLC
  text: לָ/כֵ֛ן הִנֵּֽה יָמִ֥ים בָּאִ֖ים נְאֻם יְהוָ֑ה וְ/לֹֽא יֵאָמֵ֥ר עוֹד֙ חַי
    יְהוָ֔ה אֲשֶׁ֧ר הֶעֱלָ֛ה אֶת בְּנֵ֥י יִשְׂרָאֵ֖ל מֵ/אֶ֥רֶץ מִצְרָֽיִם־־־־־׃
translation:
  text: Therefore, behold, days are coming, declares the LORD, when it will no longer
    be said, ‘As the LORD lives, who brought up the sons of Israel from the land of
    Egypt,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “the Israelites” or “the people of Israel.” The
      Hebrew reads “the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: “Who brought up” may also be rendered “who brought out,” referring to the
      exodus from Egypt.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks an inferential transition from the preceding context; 'Therefore'
    preserves the logical connection with suitable prophetic register.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Retains the deictic, attention-calling force common in prophetic discourse.
    Though somewhat elevated, it remains readable and preserves the source emphasis
    better than omitting it.
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are on the way
  lexicon: HALOT
  rationale: Standard prophetic idiom announcing a future divine act. The anarthrous
    Hebrew is naturally rendered without 'the' in English here.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A conventional prophetic formula. 'Declares the LORD' is idiomatic modern
    English and preserves the solemnity of the divine utterance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and broad English Bible recognizability.
- source_word: וְלֹא יֵאָמֵר עוֹד
  chosen: it will no longer be said
  alternatives:
  - it will not be said anymore
  - people will no longer say
  lexicon: HALOT
  rationale: The Hebrew uses an impersonal passive; English likewise naturally renders
    it impersonally. 'No longer' captures עוֹד in this negated future construction.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is a fixed oath formula in Hebrew. 'As the LORD lives' best conveys
    its idiomatic force in English.
- source_word: אֲשֶׁר הֶעֱלָה
  chosen: who brought up
  alternatives:
  - who brought out
  - who caused to come up
  lexicon: HALOT
  rationale: עלה in the Hiphil here refers to the exodus deliverance. 'Brought up'
    is a close rendering of the Hebrew verb and preserves the traditional exodus idiom,
    though 'brought out' is also possible.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: The Hebrew is explicitly filial and masculine plural construct. Per the
    project's gender-accurate principle, 'sons of Israel' preserves the source form;
    more idiomatic collective alternatives are possible but less formally precise.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  - from Egypt
  lexicon: HALOT
  rationale: Preserves both the preposition and the noun 'land,' echoing the exodus
    formula without unnecessary expansion.
