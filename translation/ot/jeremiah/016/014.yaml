theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This follows the stated doctrine
    and aligns with longstanding English convention while signaling the covenant name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered expression בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the Israelites
  - the people of Israel
  rationale: The Hebrew explicitly says 'sons.' The project's philosophy prefers gender-accurate
    renderings over flattening to gender-neutral language unless context clearly demands
    otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
