id: JER.16.19
reference: Jeremiah 16:19
source:
  edition: WLC
  text: יְהוָ֞ה עֻזִּ֧/י וּ/מָעֻזִּ֛/י וּ/מְנוּסִ֖/י בְּ/י֣וֹם צָרָ֑ה אֵלֶ֗י/ךָ גּוֹיִ֤ם יָבֹ֨אוּ֙ מֵֽ/אַפְסֵי אָ֔רֶץ וְ/יֹאמְר֗וּ אַךְ שֶׁ֨קֶר֙ נָחֲל֣וּ אֲבוֹתֵ֔י/נוּ הֶ֖בֶל וְ/אֵֽין בָּ֥/ם מוֹעִֽיל־־־׃
translation:
  text: O Yahweh, my strength and my stronghold, my refuge in the day of distress, to you the nations will come from the ends of the earth and say, “Surely our fathers inherited only lies, worthless things in which there is no profit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “our ancestors inherited only falsehood, vanity, and things with no benefit.”
    reason: lexical_alternative
  - marker: b
    text: “Worthless things” translates Hebrew hebel, often “vanity,” “emptiness,” or, by implication in some contexts, futile idols.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as “LORD” per doctrine default for the divine name, following established English convention that signals YHWH without transliteration.
- source_word: עֻזִּי
  chosen: my strength
  alternatives:
  - my might
  lexicon: HALOT
  rationale: The noun denotes strength or might. “My strength” is the most natural English expression in direct address and fits the parallel confessional language.
- source_word: מָעֻזִּי
  chosen: my stronghold
  alternatives:
  - my fortress
  - my place of safety
  lexicon: HALOT
  rationale: This noun commonly refers to a place of refuge or fortification. “Stronghold” preserves the defensive nuance while avoiding redundancy with the following “refuge.”
- source_word: מְנוּסִי
  chosen: my refuge
  alternatives:
  - my escape
  - my shelter
  lexicon: HALOT
  rationale: The term denotes a place fled to for safety. “Refuge” is idiomatic and preserves the metaphor of fleeing for protection.
- source_word: בְּיוֹם צָרָה
  chosen: in the day of distress
  alternatives:
  - in the day of trouble
  - in the day of adversity
  lexicon: HALOT
  rationale: A temporal phrase meaning a time of trouble. “Distress” is clear modern English and retains the gravity of the Hebrew.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - unto you
  lexicon: HALOT
  rationale: Simple directional preposition in direct address; “to you” is the natural modern rendering.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: “Nations” is the standard rendering and best fits the international scope of the verse. “Gentiles” would foreground Israel/Gentile contrast more than the immediate context requires.
- source_word: מֵאַפְסֵי אָרֶץ
  chosen: from the ends of the earth
  alternatives:
  - from the farthest parts of the earth
  - from earth's extremities
  lexicon: HALOT
  rationale: An idiom for the remotest regions. “From the ends of the earth” is both accurate and idiomatic in English.
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Only
  - Indeed
  lexicon: HALOT
  rationale: Here the particle introduces emphatic acknowledgment. “Surely” captures the confessional force better than the more restrictive “only.”
- source_word: שֶׁקֶר
  chosen: lies
  alternatives:
  - falsehood
  - deception
  lexicon: HALOT
  rationale: Although singular in Hebrew, it functions collectively. The plural “lies” is more idiomatic in English after “inherited” and conveys the substance of what the fathers received.
- source_word: נָחֲלוּ
  chosen: inherited
  alternatives:
  - received as an inheritance
  - possessed
  lexicon: HALOT
  rationale: The verb specifically denotes receiving an inheritance. “Inherited” preserves both lexical meaning and the irony of ancestral religious tradition.
- source_word: אֲבוֹתֵינוּ
  chosen: our fathers
  alternatives:
  - our ancestors
  lexicon: HALOT
  rationale: Rendered gender-accurately as “our fathers,” matching the Hebrew form and the project's stated philosophy. “Ancestors” is possible interpretively but less formally aligned.
- source_word: הֶבֶל
  chosen: worthless things
  alternatives:
  - vanity
  - emptiness
  - idols
  lexicon: HALOT
  rationale: The noun often denotes emptiness or vanity and can describe idols as futile. “Worthless things” communicates the evaluative sense clearly without importing “idols” explicitly where the text leaves it broader.
- source_word: וְאֵין בָּם מוֹעִיל
  chosen: in which there is no profit
  alternatives:
  - and there is nothing useful in them
  - and none of them profits
  lexicon: HALOT
  rationale: The clause states that these inherited falsehoods provide no benefit. “In which there is no profit” is natural English and preserves the singular participial idea of usefulness/benefit.
