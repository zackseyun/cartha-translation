theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make הֶבֶל explicitly refer to idols
  chosen_reading: worthless things
  alternative_readings:
  - idols
  - vanity
  rationale: The context concerns inherited false religion, so “idols” is a plausible interpretive gloss. However, the Hebrew term itself denotes emptiness/futility more broadly. To avoid importing a narrower doctrinal claim than the text states, the main text keeps the broader rendering.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy; Never import doctrinal claims the text does not make.'
