theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the covenant name as 'the LORD,' following
    the doctrine file's contested terms guidance and preserving continuity with Jewish
    reverence tradition and LXX-influenced English usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered covenantal term לַאֲבוֹתָם
  chosen_reading: their fathers
  alternative_readings:
  - their ancestors
  rationale: The Hebrew specifically says 'their fathers.' Per translation philosophy,
    gender-accurate renderings are preferred over neutralizing language unless context
    requires otherwise. Here the covenantal reference to the patriarchs is significant.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
