id: JER.16.15
reference: Jeremiah 16:15
source:
  edition: WLC
  text: כִּ֣י אִם חַי יְהוָ֗ה אֲשֶׁ֨ר הֶעֱלָ֜ה אֶת בְּנֵ֤י יִשְׂרָאֵל֙ מֵ/אֶ֣רֶץ צָפ֔וֹן
    וּ/מִ/כֹּל֙ הָֽ/אֲרָצ֔וֹת אֲשֶׁ֥ר הִדִּיחָ֖/ם שָׁ֑מָּ/ה וַ/הֲשִֽׁבֹתִי/ם֙ עַל
    אַדְמָתָ֔/ם אֲשֶׁ֥ר נָתַ֖תִּי לַ/אֲבוֹתָֽ/ם־־־־׃ס
translation:
  text: but, ‘As the LORD lives, who brought up the children of Israel from the land
    of the north and from all the lands where he had driven them,’ for I will bring
    them back to their own land that I gave to their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rather' / 'but rather' at the start of the verse; the Hebrew idiom marks
      contrast with the preceding statement in v. 14.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their fathers'; alternatively 'their ancestors.' The main text keeps
      the masculine covenantal wording of the source.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - rather
  - but rather
  - instead
  lexicon: HALOT
  rationale: In context this idiom contrasts with the preceding formula in v. 14 ('no
    longer ... but ...'). A simple 'but' is natural English and preserves the adversative
    force without overloading the line.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is the standard Hebrew oath formula. 'As the LORD lives' preserves
    the idiomatic force in English. Per doctrine, יְהוָה is rendered 'the LORD,' not
    transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance
    with DOCTRINE.md contested terms table.
- source_word: הֶעֱלָה
  chosen: brought up
  alternatives:
  - brought out
  - caused to go up
  lexicon: HALOT
  rationale: The Hiphil of עלה here echoes exodus/restoration language. 'Brought up'
    is a conventional and sufficiently literal rendering that preserves the verbal
    link.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the children of Israel
  alternatives:
  - the people of Israel
  - the sons of Israel
  lexicon: HALOT
  rationale: '''Children of Israel'' is a transparent rendering of the Hebrew construct
    and remains natural enough in English. ''Sons'' would be overly narrow; ''people''
    is interpretive.'
- source_word: מֵאֶרֶץ צָפוֹן
  chosen: from the land of the north
  alternatives:
  - from the north country
  - from the northern land
  lexicon: HALOT
  rationale: A formally close rendering that preserves the geographic expression without
    importing a specific modern referent.
- source_word: וּמִכֹּל הָאֲרָצוֹת
  chosen: and from all the lands
  alternatives:
  - and from all the countries
  lexicon: HALOT
  rationale: אֲרָצוֹת can mean lands/countries. 'Lands' keeps the broader, less nation-state-specific
    sense suitable to the ancient context.
- source_word: הִדִּיחָם
  chosen: he had driven them
  alternatives:
  - he had banished them
  - he had scattered them
  lexicon: HALOT
  rationale: The verb conveys forceful expulsion/dispersal. 'Driven' preserves divine
    agency and the severity of exile better than the softer 'scattered' here.
- source_word: שָׁמָּה
  chosen: where he had driven them
  alternatives:
  - there
  - to there
  lexicon: HALOT
  rationale: Hebrew explicitly includes 'there,' but idiomatic English absorbs the
    sense into 'where he had driven them.' This avoids awkwardness while preserving
    meaning.
- source_word: וַהֲשִׁבֹתִים
  chosen: for I will bring them back
  alternatives:
  - and I will return them
  - and I will restore them
  lexicon: HALOT
  rationale: The verb means to cause to return. 'Bring them back' is idiomatic and
    clear. 'For' introduces the explanatory ground in English for why this oath formula
    will replace the exodus formula.
- source_word: עַל אַדְמָתָם
  chosen: to their own land
  alternatives:
  - upon their soil
  - onto their land
  lexicon: HALOT
  rationale: אַדָמָה is literally ground/soil/land. 'To their own land' communicates
    possession and restoration naturally in English; 'soil' would sound overly physical
    here.
- source_word: אֲשֶׁר נָתַתִּי לַאֲבוֹתָם
  chosen: that I gave to their fathers
  alternatives:
  - which I gave to their ancestors
  lexicon: HALOT
  rationale: '''Fathers'' is retained because the Hebrew is explicitly paternal and
    covenantal; this follows the project''s gender-accurate principle. ''Ancestors''
    is possible but less formally precise.'
