id: JER.7.27
reference: Jeremiah 7:27
source:
  edition: WLC
  text: וְ/דִבַּרְתָּ֤ אֲלֵי/הֶם֙ אֶת כָּל הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה וְ/לֹ֥א יִשְׁמְע֖וּ
    אֵלֶ֑י/ךָ וְ/קָרָ֥אתָ אֲלֵי/הֶ֖ם וְ/לֹ֥א יַעֲנֽוּ/כָה־־׃
translation:
  text: You shall speak all these words to them, but they will not listen to you;
    you shall call to them, but they will not answer you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will not hear you' / 'they will not obey you.' The Hebrew verb
      שׁמע can denote hearing, listening, or heeding depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדִבַּרְתָּ
  chosen: You shall speak
  alternatives:
  - And you shall speak
  - You must speak
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in prophetic instruction functions
    as a future/injunctive statement. 'You shall speak' preserves the directive force
    in natural English without over-paraphrasing.
- source_word: אֲלֵיהֶם
  chosen: to them
  alternatives:
  - against them
  lexicon: HALOT
  rationale: The preposition אֶל commonly means direction toward someone, here introducing
    the audience of Jeremiah's speech. 'To them' fits the immediate discourse context
    better than adversative 'against them.'
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  - all these matters
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words' or 'matters.' In a context of prophetic proclamation,
    'words' best preserves the verbal content being delivered.
- source_word: וְלֹא יִשְׁמְעוּ אֵלֶיךָ
  chosen: but they will not listen to you
  alternatives:
  - and they will not hear you
  - but they will not obey you
  lexicon: HALOT
  rationale: שׁמע with אֶל often carries the sense 'listen to' and can imply heed/obey.
    Here 'listen to you' preserves the direct auditory sense while allowing the implied
    refusal to heed. 'But' brings out the adversative force naturally in English,
    though Hebrew uses simple waw.
- source_word: וְקָרָאתָ
  chosen: you shall call
  alternatives:
  - you shall proclaim
  - you shall cry out
  lexicon: HALOT
  rationale: קרא in this construction means to call out to someone. 'Call' is the
    most direct rendering and avoids specifying volume or formal proclamation beyond
    the Hebrew.
- source_word: וְלֹא יַעֲנוּכָה
  chosen: but they will not answer you
  alternatives:
  - and they will not respond to you
  lexicon: HALOT
  rationale: ענה in Qal commonly means 'answer, respond.' 'Answer you' is concise
    and idiomatic. The pronominal suffix is retained explicitly with 'you.'
