id: JER.7.10
reference: Jeremiah 7:10
source:
  edition: WLC
  text: וּ/בָאתֶ֞ם וַ/עֲמַדְתֶּ֣ם לְ/פָנַ֗/י בַּ/בַּ֤יִת הַ/זֶּה֙ אֲשֶׁ֣ר נִקְרָא
    שְׁמִ֣/י עָלָ֔י/ו וַ/אֲמַרְתֶּ֖ם נִצַּ֑לְנוּ לְמַ֣עַן עֲשׂ֔וֹת אֵ֥ת כָּל הַ/תּוֹעֵב֖וֹת
    הָ/אֵֽלֶּה־־׃
translation:
  text: Then you come and stand before me in this house, which is called by my name,
    and say, ‘We are delivered!’—so that you may go on doing all these abominations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''this temple.'' Hebrew: ''this house.'''
    reason: lexical_alternative
  - marker: b
    text: Or, 'We are saved!' or 'We are safe!'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאתֶם
  chosen: Then you come
  alternatives:
  - And you come
  - Then you enter
  lexicon: HALOT
  rationale: Qal wayyiqtol 2mp of בוא in a prophetic accusation sequence. English
    present 'you come' fits the rhetorical vividness of the context better than a
    simple past, while 'then' captures the sequential force of the waw.
- source_word: וַעֲמַדְתֶּם לְפָנַי
  chosen: and stand before me
  alternatives:
  - and present yourselves before me
  - and stand in my presence
  lexicon: HALOT
  rationale: עמד + לפני commonly denotes appearing/standing in someone's presence,
    especially before God. 'Stand before me' is the most direct and idiomatic rendering.
- source_word: בַּבַּיִת הַזֶּה
  chosen: in this house
  alternatives:
  - in this temple
  - in this house here
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In Jeremiah's temple sermon the referent
    is the temple, but 'house' preserves the Hebrew wording and the covenantal/theological
    resonance of God's house.
- source_word: אֲשֶׁר נִקְרָא שְׁמִי עָלָיו
  chosen: which is called by my name
  alternatives:
  - over which my name is called
  - which bears my name
  lexicon: HALOT
  rationale: This is the standard idiom for belonging to or being identified with
    someone by name. 'Which is called by my name' preserves the biblical idiom in
    understandable English.
- source_word: וַאֲמַרְתֶּם
  chosen: and say
  alternatives:
  - and you say
  - and then say
  lexicon: HALOT
  rationale: Continuing the prophetic present sequence, 'and say' keeps the accusation
    immediate and connected to the preceding verbs.
- source_word: נִצַּלְנוּ
  chosen: We are delivered!
  alternatives:
  - We are saved!
  - We have been rescued!
  - We are safe!
  lexicon: HALOT
  rationale: Nifal perfect 1cp of נצל denotes being delivered/rescued. 'Delivered'
    avoids importing fuller soteriological overtones that 'saved' may carry in English,
    while still expressing their presumed security.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - for the purpose of
  lexicon: HALOT
  rationale: 'למען here introduces purpose/result with biting irony: they claim deliverance
    in order to continue sinning. ''So that'' is natural and preserves that force.'
- source_word: עֲשׂוֹת
  chosen: you may go on doing
  alternatives:
  - to do
  - to keep doing
  lexicon: HALOT
  rationale: The infinitive construct with לְמַעַן expresses intended action. 'Go
    on doing' brings out the ongoing, habitual sense implied by the context of repeated
    abominations, without over-paraphrasing.
- source_word: כָּל הַתּוֹעֵבוֹת הָאֵלֶּה
  chosen: all these abominations
  alternatives:
  - all these detestable things
  - all these abhorrent acts
  lexicon: HALOT
  rationale: תועבות is a strong covenantal term for abhorrent, especially idolatrous
    or morally repugnant acts. 'Abominations' preserves the gravity and established
    biblical force of the term.
