theological_decisions:
- issue: Rendering of temple terminology
  chosen_reading: house
  alternative_readings:
  - temple
  rationale: The immediate referent is the Jerusalem temple, but the Hebrew says 'house.'
    Retaining 'house' preserves the source wording and its theological resonance as
    the house bearing God's name, while remaining clear in context.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of נִצַּלְנוּ
  chosen_reading: We are delivered!
  alternative_readings:
  - We are saved!
  - We are safe!
  rationale: The speakers presume that temple presence grants them rescue/security
    despite ongoing sin. 'Delivered' best conveys the claim without importing later
    doctrinal language beyond the text.
  doctrine_reference: Translation philosophy §1, §3
