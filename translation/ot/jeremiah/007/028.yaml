id: JER.7.28
reference: Jeremiah 7:28
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֗ם זֶ֤ה הַ/גּוֹי֙ אֲשֶׁ֣ר לֽוֹא שָׁמְע֗וּ בְּ/קוֹל֙
    יְהוָ֣ה אֱלֹהָ֔י/ו וְ/לֹ֥א לָקְח֖וּ מוּסָ֑ר אָֽבְדָה֙ הָֽ/אֱמוּנָ֔ה וְ/נִכְרְתָ֖ה
    מִ/פִּי/הֶֽם־׃ס
translation:
  text: Then you shall say to them, ‘This is the nation that did not listen to the
    voice of the LORD its God and did not accept correction. Faithfulness has perished;
    it has been cut off from their mouth.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Truth has perished.' The Hebrew אֱמוּנָה can mean 'faithfulness,' 'reliability,'
      or 'truth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: Then you shall say
  alternatives:
  - And you shall say
  lexicon: HALOT
  rationale: The waw + perfect with second masculine singular in prophetic discourse
    carries sequential force. 'Then' brings out the discourse progression naturally
    in English while preserving the command.
- source_word: זֶה הַגּוֹי
  chosen: This is the nation
  alternatives:
  - This is the people
  - This nation
  lexicon: HALOT
  rationale: גּוֹי can mean 'nation' or 'people.' 'Nation' best matches the singular
    collective noun and the prophetic denunciation formula. Retaining 'This is' reflects
    the demonstrative construction.
- source_word: לֹא שָׁמְעוּ בְּקוֹל
  chosen: did not listen to the voice
  alternatives:
  - did not obey the voice
  - did not hear the voice
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל often carries the sense of listening/obeying. 'Listen
    to' preserves the auditory idiom without over-interpreting, while still allowing
    the implied disobedience to be heard in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהָיו
  chosen: its God
  alternatives:
  - their God
  - his God
  lexicon: HALOT
  rationale: The suffix is 3ms, agreeing grammatically with the singular collective
    גּוֹי. In English, 'its God' best reflects the singular collective antecedent,
    though 'their God' is a possible sense-based rendering.
- source_word: לֹא לָקְחוּ מוּסָר
  chosen: did not accept correction
  alternatives:
  - did not receive discipline
  - did not take instruction
  lexicon: HALOT
  rationale: מוּסָר includes discipline, correction, and instruction. 'Accept correction'
    fits the rebuke context and idiomatic English. 'Receive discipline' is possible
    but sounds less natural here.
- source_word: אָבְדָה הָאֱמוּנָה
  chosen: Faithfulness has perished
  alternatives:
  - Truth has perished
  - Fidelity has perished
  lexicon: HALOT
  rationale: אֱמוּנָה can denote faithfulness, steadfastness, reliability, or truth.
    In Jeremiah's covenantal context, 'faithfulness' best captures the moral and relational
    dimension of what has been lost. 'Truth' is a viable alternative and worth preserving
    in a footnote because some English traditions render it that way.
- source_word: וְנִכְרְתָה מִפִּיהֶם
  chosen: it has been cut off from their mouth
  alternatives:
  - it has vanished from their mouth
  - it has been cut off from their lips
  lexicon: HALOT
  rationale: כרת in the Niphal means 'be cut off.' Retaining 'cut off' preserves the
    vivid metaphor and possible covenantal resonance. 'From their mouth' is a literal
    rendering of the idiom; 'from their lips' is smoother but less exact.
