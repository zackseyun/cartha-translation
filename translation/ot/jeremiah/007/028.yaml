theological_decisions:
- issue: Rendering of אֱמוּנָה in a covenant-rebuke context
  chosen_reading: Faithfulness
  alternative_readings:
  - Truth
  rationale: The term can denote truth/reliability as well as faithfulness. Here the
    verse indicts the people's covenantal response to the LORD, so 'faithfulness'
    better preserves the relational and ethical force without excluding truthfulness.
    Because 'truth' is a longstanding and plausible rendering, it is preserved in
    a footnote rather than excluded.
  doctrine_reference: Translation philosophy §3, §5
