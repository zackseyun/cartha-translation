theological_decisions:
- issue: Degree of interpretive force in שׁמע
  chosen_reading: listen to me
  alternative_readings:
  - obey me
  rationale: The verse emphasizes refusal to heed YHWH's message. 'Listen' preserves
    the lexical sense and leaves the implied disobedience to emerge from context rather
    than importing a stronger gloss into the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of אָבוֹת
  chosen_reading: fathers
  alternative_readings:
  - ancestors
  rationale: No doctrinal issue is at stake, but the choice affects how directly the
    verse compares the current generation to prior ones. 'Fathers' is more formally
    aligned with the Hebrew while still understandable in modern English.
  doctrine_reference: Translation philosophy §5
