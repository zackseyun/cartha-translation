id: JER.7.26
reference: Jeremiah 7:26
source:
  edition: WLC
  text: וְ/ל֤וֹא שָׁמְעוּ֙ אֵלַ֔/י וְ/לֹ֥א הִטּ֖וּ אֶת אָזְנָ֑/ם וַ/יַּקְשׁוּ֙ אֶת
    עָרְפָּ֔/ם הֵרֵ֖עוּ מֵ/אֲבוֹתָֽ/ם־־׃
translation:
  text: Yet they did not listen to me, and they did not incline their ear, but they
    stiffened their neck; they acted more wickedly than their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their ancestors.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'incline their ear,' an idiom for paying careful attention.
    reason: cultural_note
lexical_decisions:
- source_word: שָׁמְעוּ אֵלַי
  chosen: did not listen to me
  alternatives:
  - did not hear me
  - did not obey me
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly carries the sense of listening/heeding rather
    than mere auditory hearing. 'Listen to me' preserves the relational and volitional
    force without over-specifying 'obey,' though obedience is implicated.
- source_word: הִטּוּ אֶת אָזְנָם
  chosen: did not incline their ear
  alternatives:
  - did not pay attention
  - did not turn their ear
  lexicon: HALOT
  rationale: The idiom literally means to bend/extend the ear in attentive listening.
    'Incline their ear' keeps the Hebrew image in readable English and avoids flattening
    the parallelism with the previous clause.
- source_word: וַיַּקְשׁוּ אֶת עָרְפָּם
  chosen: they stiffened their neck
  alternatives:
  - they hardened their neck
  - they made their neck stubborn
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom for obstinacy. 'Stiffened their neck'
    is natural English and preserves the metaphor better than a more interpretive
    rendering.
- source_word: הֵרֵעוּ
  chosen: they acted more wickedly
  alternatives:
  - they did evil more
  - they became worse
  lexicon: HALOT
  rationale: 'The Hiphil of רעע here expresses doing evil/acting wickedly. Because
    it is followed by מֵאֲבוֹתָם, the comparative sense is explicit: they acted more
    wickedly than their fathers.'
- source_word: מֵאֲבוֹתָם
  chosen: than their fathers
  alternatives:
  - than their ancestors
  lexicon: HALOT
  rationale: אָבוֹת can mean fathers or ancestors. Here either is possible, but 'fathers'
    preserves the Hebrew wording and the likely comparison with prior generations
    in Israel's history. The broader ancestral sense is preserved as an alternative.
- source_word: וְלֹא ... וְלֹא ... וַ
  chosen: Yet ... and ... but ...
  alternatives:
  - And ... and ... and ...
  - But ... and ... and ...
  lexicon: Hebrew syntax
  rationale: The sequence of conjunctions marks continued narration with adversative
    force in context. Rendering the first waw as 'Yet' and the third as 'but' communicates
    the rhetorical contrast after the preceding verse while preserving the clause
    flow.
