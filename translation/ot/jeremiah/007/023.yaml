theological_decisions:
- issue: Covenant formula rendering
  chosen_reading: Render the reciprocal formula relationally as 'I will be your God,
    and you shall be my people.'
  alternative_readings:
  - I will be God to you, and you will be a people to me
  rationale: The Hebrew expresses covenant relationship rather than abstract ontology.
    The chosen rendering preserves the established biblical covenant formula in clear
    English without adding doctrinal content beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Obedience nuance in שִׁמְעוּ בְקוֹלִי
  chosen_reading: Use 'Listen to my voice' in the main text.
  alternative_readings:
  - Obey my voice
  rationale: The phrase often carries obedient force, but the Hebrew lexeme is 'hear/listen.'
    To preserve theological tension and avoid importing an interpretive expansion
    into the main text, the more transparent rendering is chosen; the obedience nuance
    is contextually evident from the covenant setting.
  doctrine_reference: Translation philosophy §§1, 3, 6
