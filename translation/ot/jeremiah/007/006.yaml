id: JER.7.6
reference: Jeremiah 7:6
source:
  edition: WLC
  text: גֵּ֣ר יָת֤וֹם וְ/אַלְמָנָה֙ לֹ֣א תַֽעֲשֹׁ֔קוּ וְ/דָ֣ם נָקִ֔י אַֽל תִּשְׁפְּכ֖וּ
    בַּ/מָּק֣וֹם הַ/זֶּ֑ה וְ/אַחֲרֵ֨י אֱלֹהִ֧ים אֲחֵרִ֛ים לֹ֥א תֵלְכ֖וּ לְ/רַ֥ע לָ/כֶֽם־׃
translation:
  text: Do not oppress the foreigner, the fatherless, and the widow; do not shed innocent
    blood in this place; and do not go after other gods to your own harm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sojourner' or 'the resident alien' for 'the foreigner.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the orphan' for 'the fatherless.'
    reason: lexical_alternative
  - marker: c
    text: Or 'do not follow other gods.' The Hebrew literally says 'do not go after
      other gods.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גֵּר
  chosen: the foreigner
  alternatives:
  - the sojourner
  - the resident alien
  lexicon: HALOT
  rationale: גֵּר denotes a non-native residing among Israel with vulnerable social
    status. 'Foreigner' is clear modern English and fits the social-ethical context;
    alternatives are more formal or technical.
- source_word: יָתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: יָתוֹם literally refers to one deprived of a father. 'Fatherless' preserves
    the Hebrew social category often paired with widow and foreigner; 'orphan' is
    possible but slightly less formally aligned.
- source_word: אַלְמָנָה
  chosen: the widow
  lexicon: HALOT
  rationale: Standard and precise rendering of the vulnerable social class named in
    the Hebrew.
- source_word: תַעֲשֹׁקוּ
  chosen: oppress
  alternatives:
  - wrong
  - exploit
  lexicon: HALOT
  rationale: The verb עָשַׁק commonly carries the sense of oppression or exploitation,
    especially of the vulnerable. 'Oppress' is the most established and contextually
    fitting English equivalent.
- source_word: דָם נָקִי
  chosen: innocent blood
  alternatives:
  - the blood of the innocent
  lexicon: HALOT
  rationale: This is a fixed Hebrew expression for unjust killing. 'Innocent blood'
    is idiomatic English and preserves the legal-moral force.
- source_word: תִּשְׁפְּכוּ
  chosen: shed
  alternatives:
  - pour out
  lexicon: HALOT
  rationale: With דָם, the idiomatic sense is 'shed blood,' not the more literal 'pour
    out.'
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: in this place
  alternatives:
  - in this המקום
  - here
  lexicon: HALOT
  rationale: A direct rendering that preserves the deictic force of Jeremiah's temple-sermon
    setting. 'Here' would be smoother but less explicit.
- source_word: אַחֲרֵי ... לֹא תֵלְכ֖וּ
  chosen: do not go after
  alternatives:
  - do not follow
  lexicon: HALOT
  rationale: The Hebrew idiom 'walk/go after' often denotes allegiance or pursuit.
    'Go after' preserves the metaphor while remaining natural English.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The standard rendering of this common Hebrew phrase. 'Other gods' is
    more literal than 'foreign gods' and avoids adding an ethnic nuance not explicit
    here.
- source_word: לְרַע לָכֶם
  chosen: to your own harm
  alternatives:
  - for your harm
  - to your hurt
  lexicon: HALOT
  rationale: The phrase indicates detrimental consequence to the hearers themselves.
    'To your own harm' makes the reflexive implication clear in natural English.
