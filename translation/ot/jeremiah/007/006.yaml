theological_decisions:
- issue: Ethical triad naming vulnerable groups
  chosen_reading: the foreigner, the fatherless, and the widow
  alternative_readings:
  - the sojourner, the orphan, and the widow
  - the resident alien, the orphan, and the widow
  rationale: The translation preserves the covenantal social categories without flattening
    them into generic 'the vulnerable.' This avoids paraphrase while keeping readable
    modern English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; consistency of
    key terms, or documented exception.'
