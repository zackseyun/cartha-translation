id: JER.7.17
reference: Jeremiah 7:17
source:
  edition: WLC
  text: הַֽ/אֵינְ/ךָ֣ רֹאֶ֔ה מָ֛ה הֵ֥מָּה עֹשִׂ֖ים בְּ/עָרֵ֣י יְהוּדָ֑ה וּ/בְ/חֻצ֖וֹת
    יְרוּשָׁלִָֽם׃
translation:
  text: Do you not see what they are doing in the cities of Judah and in the streets
    of Jerusalem?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'squares' or 'open places' of Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֵינְךָ
  chosen: Do you not
  alternatives:
  - Do you not indeed
  - Do you not yourself
  lexicon: HALOT
  rationale: Renders the interrogative particle with negation plus 2ms suffix as a
    rhetorical question addressed directly to Jeremiah. English idiom requires auxiliary
    'do' and places the negation naturally in the question.
- source_word: רֹאֶה
  chosen: see
  alternatives:
  - look at
  - observe
  lexicon: HALOT
  rationale: Common verb for seeing/perceiving. 'See' is the most natural and sufficiently
    broad English equivalent, preserving both visual and perceptive force.
- source_word: מָה
  chosen: what
  alternatives:
  - that which
  lexicon: HALOT
  rationale: Introduces the content of what is seen; simple interrogative/relative
    sense is best rendered 'what' in English.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - these people
  - they themselves
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis, but standard English can convey this
    adequately with 'they' without overtranslating. The emphasis is retained by the
    rhetorical question structure.
- source_word: עֹשִׂים
  chosen: are doing
  alternatives:
  - do
  - are making
  lexicon: HALOT
  rationale: 'The participle expresses ongoing action; English present progressive
    best captures the sense in context: their current practices are in view.'
- source_word: בְּעָרֵי יְהוּדָה
  chosen: in the cities of Judah
  alternatives:
  - throughout the cities of Judah
  - in Judah's cities
  lexicon: HALOT
  rationale: Straightforward locative phrase. 'Cities of Judah' preserves the construct
    relationship and geographic specificity.
- source_word: וּבְחֻצוֹת יְרוּשָׁלִָם
  chosen: and in the streets of Jerusalem
  alternatives:
  - and in the squares of Jerusalem
  - and in the open places of Jerusalem
  lexicon: HALOT
  rationale: חֻצוֹת can denote streets, squares, or open places within a city. 'Streets'
    is the most idiomatic modern English rendering here, while still fitting the urban
    setting of Jerusalem.
