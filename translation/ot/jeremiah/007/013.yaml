theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in a prophetic declaration formula.
    Following the project's doctrinal standard, it is rendered 'the LORD' rather than
    transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to paraphrase the idiom הַשְׁכֵּם וְדַבֵּר
  chosen_reading: Preserve the idiom in the main text as 'rising early and speaking'
  alternative_readings:
  - speaking persistently
  - speaking again and again
  rationale: The idiom communicates God's earnest, repeated initiative. Preserving
    it in the main text maintains source-language texture and avoids over-resolving
    the metaphor, while a footnote can preserve the more interpretive sense.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    preserve theological tension rather than resolve it'
