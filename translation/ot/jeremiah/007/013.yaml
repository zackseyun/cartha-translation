id: JER.7.13
reference: Jeremiah 7:13
source:
  edition: WLC
  text: וְ/עַתָּ֗ה יַ֧עַן עֲשׂוֹתְ/כֶ֛ם אֶת כָּל הַ/מַּֽעֲשִׂ֥ים הָ/אֵ֖לֶּה נְאֻם
    יְהוָ֑ה וָ/אֲדַבֵּ֨ר אֲלֵי/כֶ֜ם הַשְׁכֵּ֤ם וְ/דַבֵּר֙ וְ/לֹ֣א שְׁמַעְתֶּ֔ם וָ/אֶקְרָ֥א
    אֶתְ/כֶ֖ם וְ/לֹ֥א עֲנִיתֶֽם־־־׃
translation:
  text: And now, because you have done all these deeds, declares the LORD, and though
    I spoke to you, rising early and speaking, you did not listen, and though I called
    you, you did not answer,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''rising early and speaking,'' expressing persistent or eager
      repeated address.'
    reason: cultural_note
  - marker: b
    text: Or 'speaking persistently.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Carries the discourse forward with an inferential/transition sense. 'And
    now' preserves the connective force better than a bare 'Now.'
- source_word: יַעַן
  chosen: because
  alternatives:
  - since
  - on account of
  lexicon: HALOT
  rationale: Introduces the causal ground for the coming judgment. 'Because' is the
    most natural modern English equivalent.
- source_word: עֲשׂוֹתְכֶם אֶת כָּל הַמַּעֲשִׂים הָאֵלֶּה
  chosen: you have done all these deeds
  alternatives:
  - your doing all these things
  - you did all these acts
  lexicon: HALOT
  rationale: The infinitive construct with suffix functions causally after יַעַן.
    'Deeds' fits מַעֲשִׂים well in a moral/prophetic context and avoids awkward literalism.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' captures the solemn utterance
    force of נְאֻם. 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and LXX-influenced convention.
- source_word: וָאֲדַבֵּר אֲלֵיכֶם
  chosen: I spoke to you
  alternatives:
  - I have spoken to you
  lexicon: HALOT
  rationale: The wayyiqtol advances the narrative of repeated divine address. Simple
    past is the clearest English rendering here.
- source_word: הַשְׁכֵּם וְדַבֵּר
  chosen: rising early and speaking
  alternatives:
  - rising early to speak
  - persistently speaking
  lexicon: HALOT
  rationale: This Hebrew idiom literally means 'rising early and speaking' and conveys
    eagerness or persistence. The main text preserves the idiom rather than paraphrasing
    it away; its force can be clarified in a footnote.
- source_word: וְלֹא שְׁמַעְתֶּם
  chosen: you did not listen
  alternatives:
  - you did not hear
  - you did not obey
  lexicon: HALOT
  rationale: שׁמע can imply hearing or obeying, but in this prophetic rebuke 'listen'
    best preserves the auditory metaphor while allowing the moral implication to remain.
- source_word: וָאֶקְרָא אֶתְכֶם
  chosen: I called you
  alternatives:
  - I summoned you
  - I called out to you
  lexicon: HALOT
  rationale: קרא here denotes direct divine appeal or summons. 'I called you' is concise
    and natural.
- source_word: וְלֹא עֲנִיתֶם
  chosen: you did not answer
  alternatives:
  - you did not respond
  lexicon: HALOT
  rationale: ענה in this context is a response to God's call. 'Answer' preserves the
    dialogical imagery more directly than 'respond.'
- source_word: וְ ... וְלֹא ... וָ... וְלֹא
  chosen: and though ... you did not ... and though ... you did not ...
  alternatives:
  - and ... but you did not ... and ... but you did not ...
  lexicon: HALOT
  rationale: 'English idiom benefits from making the concessive force explicit: despite
    God''s repeated speaking and calling, the people refused. This is an optimal-equivalence
    adjustment that clarifies the rhetoric without adding new content.'
