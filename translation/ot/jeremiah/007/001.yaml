id: JER.7.1
reference: Jeremiah 7:1
source:
  edition: WLC
  text: הַ/דָּבָר֙ אֲשֶׁ֣ר הָיָ֣ה אֶֽל יִרְמְיָ֔הוּ מֵ/אֵ֥ת יְהוָ֖ה לֵ/אמֹֽר־׃
translation:
  text: 'The word that came to Yirmeyahu from the LORD, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively, 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַדָּבָר
  chosen: The word
  alternatives:
  - The message
  - This word
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word' or 'matter/message.' In prophetic superscriptions,
    'the word' is the standard and sufficiently natural English rendering, preserving
    the formulaic sense of divine revelation without over-interpreting it as only
    'message.'
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: The relative particle is best rendered by English 'that' in smooth modern
    prose.
- source_word: הָיָה
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: Although the verb is literally 'was,' the idiom 'the word that was to
    X from the LORD' in prophetic headings is conventionally and accurately rendered
    'came to X from the LORD' in English to express reception of revelation.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural modern equivalent.
- source_word: יִרְמְיָהוּ
  chosen: Yirmeyahu
  alternatives:
  - Jeremiah
  rationale: Per project philosophy, personal names are transliterated rather than
    translated through traditional English forms. 'Yirmeyahu' directly reflects the
    Hebrew name.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from the presence of
  - from with
  lexicon: HALOT
  rationale: The compound preposition marks source/origin. In this prophetic formula,
    'from' clearly conveys divine origin without awkwardness.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern. Alternatives
    are preserved in a footnote only if worth noting.
- source_word: לֵאמֹר
  chosen: 'saying:'
  alternatives:
  - ':'
  lexicon: HALOT
  rationale: This infinitive introduces the ensuing divine speech. 'Saying:' preserves
    the Hebrew discourse marker and signals continuation into the next verse.
