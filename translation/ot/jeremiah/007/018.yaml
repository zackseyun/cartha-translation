id: JER.7.18
reference: Jeremiah 7:18
source:
  edition: WLC
  text: הַ/בָּנִ֞ים מְלַקְּטִ֣ים עֵצִ֗ים וְ/הָֽ/אָבוֹת֙ מְבַעֲרִ֣ים אֶת הָ/אֵ֔שׁ וְ/הַ/נָּשִׁ֖ים
    לָשׁ֣וֹת בָּצֵ֑ק לַ/עֲשׂ֨וֹת כַּוָּנִ֜ים לִ/מְלֶ֣כֶת הַ/שָּׁמַ֗יִם וְ/הַסֵּ֤ךְ
    נְסָכִים֙ לֵ/אלֹהִ֣ים אֲחֵרִ֔ים לְמַ֖עַן הַכְעִסֵֽ/נִי־׃
translation:
  text: The children gather wood, the fathers kindle the fire, and the women knead
    dough to make cakes for the Queen of Heaven and to pour out drink offerings to
    other gods, so as to provoke me to anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew מְלֶכֶת הַשָּׁמַיִם is traditionally understood as 'the Queen of
      Heaven,' likely a title for a goddess worshiped by Judah. Some have proposed
      'the work of heaven,' but the context here favors a personal deity receiving
      offerings.
    reason: alternative_reading
lexical_decisions:
- source_word: מְלַקְּטִים
  chosen: gather
  alternatives:
  - collect
  lexicon: HALOT
  rationale: The participle denotes collecting or gathering. 'Gather' is natural modern
    English and fits the object 'wood' well.
- source_word: עֵצִים
  chosen: wood
  alternatives:
  - sticks
  - firewood
  lexicon: HALOT
  rationale: Although literally 'trees/woods/wood pieces,' in this domestic sacrificial
    context 'wood' is the most idiomatic English object of 'gather.' 'Firewood' is
    interpretive; 'sticks' is too narrow.
- source_word: מְבַעֲרִים אֶת הָאֵשׁ
  chosen: kindle the fire
  alternatives:
  - light the fire
  - burn the fire
  lexicon: HALOT
  rationale: The verb means to burn/kindle. With 'the fire' as object, 'kindle the
    fire' is the most idiomatic and suitably formal rendering.
- source_word: לָשׁוֹת בָּצֵק
  chosen: knead dough
  alternatives:
  - mix dough
  lexicon: HALOT
  rationale: The verb specifically refers to kneading, not merely mixing. This preserves
    the concrete domestic action.
- source_word: כַּוָּנִים
  chosen: cakes
  alternatives:
  - sacrificial cakes
  lexicon: HALOT
  rationale: The noun refers to shaped cakes used in cultic practice. 'Cakes' is sufficient
    in the main text; the cultic sense is clear from the surrounding phrase and can
    be elaborated in a footnote if needed.
- source_word: מְלֶכֶת הַשָּׁמַיִם
  chosen: the Queen of Heaven
  alternatives:
  - the work of heaven
  lexicon: HALOT
  rationale: The traditional and contextually dominant reading takes the form as 'queen'
    rather than 'work/occupation.' In Jeremiah's repeated polemic against a female
    astral deity, 'Queen of Heaven' best fits the syntax and context. The alternative
    is preserved in a footnote because the consonantal form has been discussed.
- source_word: וְהַסֵּךְ נְסָכִים
  chosen: and to pour out drink offerings
  alternatives:
  - and to pour drink offerings
  lexicon: HALOT
  rationale: The infinitive-like construction expresses purpose alongside 'to make
    cakes.' 'Pour out drink offerings' is the standard idiomatic rendering of the
    cultic act.
- source_word: נְסָכִים
  chosen: drink offerings
  alternatives:
  - libations
  lexicon: HALOT
  rationale: '''Drink offerings'' is clear modern English; ''libations'' is accurate
    but less accessible.'
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The adjective means 'other.' 'Foreign gods' is interpretive and less
    direct here.
- source_word: לְמַעַן הַכְעִסֵנִי
  chosen: so as to provoke me to anger
  alternatives:
  - in order to anger me
  - to provoke me
  lexicon: HALOT
  rationale: The construction expresses result/purpose. 'Provoke me to anger' preserves
    the causative force of the verb and the personal offense against God.
