theological_decisions:
- issue: Identification of מְלֶכֶת הַשָּׁמַיִם
  chosen_reading: the Queen of Heaven
  alternative_readings:
  - the work of heaven
  rationale: The immediate context concerns idolatrous household rites directed to
    a personal deity, and Jeremiah elsewhere repeats this expression in that sense.
    Rendering it as a divine title preserves the polemic against a rival goddess without
    importing later Marian associations. Because the Hebrew form has been debated,
    the alternative is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §1, §3
