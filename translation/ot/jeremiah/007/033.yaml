id: JER.7.33
reference: Jeremiah 7:33
source:
  edition: WLC
  text: וְֽ/הָ֨יְתָ֜ה נִבְלַ֨ת הָ/עָ֤ם הַ/זֶּה֙ לְ/מַֽאֲכָ֔ל לְ/ע֥וֹף הַ/שָּׁמַ֖יִם
    וּ/לְ/בֶהֱמַ֣ת הָ/אָ֑רֶץ וְ/אֵ֖ין מַחֲרִֽיד׃
translation:
  text: The corpse of this people will become food for the birds of the heavens and
    for the beasts of the earth, with no one to frighten them away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the carcass of this people ... and none will frighten them.' The Hebrew
      singular 'corpse/carcass' can function collectively, and the final clause leaves
      the object implied.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction in prophetic discourse is naturally
    rendered as a future result. 'Will become' fits the predicate construction with
    לְמַאֲכָל ('for food') more idiomatically than the more wooden 'will be.'
- source_word: נִבְלַת
  chosen: the corpse
  alternatives:
  - the carcass
  - the dead body
  lexicon: HALOT
  rationale: נְבֵלָה denotes a corpse/carcass. 'Corpse' is the most natural English
    choice for human remains and preserves the disgrace implied by the image.
- source_word: הָעָם הַזֶּה
  chosen: of this people
  alternatives:
  - of this nation
  lexicon: HALOT
  rationale: עַם commonly means 'people.' In Jeremiah this often refers to Judah as
    a covenant people; 'people' is more direct and less politically loaded than 'nation'
    here.
- source_word: לְמַאֲכָל
  chosen: food
  alternatives:
  - something to eat
  - prey
  lexicon: HALOT
  rationale: The noun means food/provision for eating. 'Food' is concise and preserves
    the starkness of the judgment image.
- source_word: לְעוֹף הַשָּׁמַיִם
  chosen: for the birds of the heavens
  alternatives:
  - for the birds of the sky
  - for the birds of heaven
  lexicon: HALOT
  rationale: עוֹף is a collective for flying creatures, often rendered 'birds' in
    this collocation. 'Of the heavens' closely reflects the Hebrew while remaining
    understandable.
- source_word: וּלְבֶהֱמַת הָאָרֶץ
  chosen: and for the beasts of the earth
  alternatives:
  - and for the animals of the land
  - and for the beasts of the land
  lexicon: HALOT
  rationale: בְּהֵמָה here functions collectively for land animals/scavenging beasts.
    'Beasts of the earth' preserves the elevated prophetic diction and parallels 'birds
    of the heavens.'
- source_word: וְאֵין מַחֲרִיד
  chosen: with no one to frighten them away
  alternatives:
  - and none will frighten them
  - with no one to drive them away
  lexicon: HALOT
  rationale: 'The participle from חרד in the causative sense here refers to causing
    the scavengers to tremble or flee. English idiom favors making the implied object
    explicit: no one will scare the birds and beasts away from the corpses.'
