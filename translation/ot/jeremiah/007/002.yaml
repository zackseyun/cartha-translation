theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    יְהוָה, following Jewish reverence tradition and the Septuagintal pattern. This
    verse contains covenant-name usage but no contextual factor requiring deviation.
