id: JER.7.2
reference: Jeremiah 7:2
source:
  edition: WLC
  text: עֲמֹ֗ד בְּ/שַׁ֨עַר֙ בֵּ֣ית יְהוָ֔ה וְ/קָרָ֣אתָ שָּׁ֔ם אֶת הַ/דָּבָ֖ר הַ/זֶּ֑ה וְ/אָמַרְתָּ֞ שִׁמְע֣וּ דְבַר יְהוָ֗ה כָּל יְהוּדָה֙ הַ/בָּאִים֙ בַּ/שְּׁעָרִ֣ים הָ/אֵ֔לֶּה לְ/הִֽשְׁתַּחֲוֺ֖ת לַ/יהוָֽה־־־׃ס
translation:
  text: Stand in the gate of the house of Yahweh, and proclaim there this word, and say, “Hear the word of Yahweh, all Judah, who enter through these gates to worship Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to bow down to the LORD.' The Hebrew verb can denote the physical act of bowing down, especially in worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲמֹד
  chosen: Stand
  alternatives:
  - Take your stand
  lexicon: HALOT
  rationale: Imperative of עמד, calling Jeremiah to station himself at a specific location. 'Stand' is the plain, natural English imperative; 'take your stand' is possible but slightly more interpretive.
- source_word: בְּשַׁעַר
  chosen: in the gate
  alternatives:
  - at the gate
  - by the gate
  lexicon: HALOT
  rationale: The preposition ב plus שַׁעַר can be rendered 'in/at the gate.' 'In the gate' preserves the Hebrew more closely and fits the sense of standing at the temple entrance area.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the LORD's house
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'The house of the LORD' preserves the Hebrew expression while remaining clear. 'Temple' is contextually correct but less formally transparent.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְקָרָאתָ
  chosen: proclaim
  alternatives:
  - call out
  - cry out
  lexicon: HALOT
  rationale: קרא in this prophetic context means to announce publicly. 'Proclaim' captures the formal public declaration better than the more generic 'call out.'
- source_word: שָׁם
  chosen: there
  lexicon: HALOT
  rationale: Simple locative adverb referring to the gate location.
- source_word: אֶת־הַדָּבָר הַזֶּה
  chosen: this word
  alternatives:
  - this message
  - these words
  lexicon: HALOT
  rationale: דבר can mean 'word' or 'message.' 'This word' preserves the singular Hebrew and prophetic idiom. 'This message' is possible but slightly more dynamic.
- source_word: וְאָמַרְתָּ
  chosen: and say
  alternatives:
  - and declare
  lexicon: HALOT
  rationale: A straightforward speech introducer following the command to proclaim. 'And say' keeps the sequence of imperatives transparent.
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Standard imperative of שמע. 'Hear' preserves the biblical summons formula 'Hear the word of the LORD.'
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Common prophetic formula. 'Word' is the established and accurate rendering here.
- source_word: כָּל יְהוּדָה
  chosen: all Judah
  alternatives:
  - all you of Judah
  - all the people of Judah
  lexicon: HALOT
  rationale: Collective address to Judah as a people. 'All Judah' is concise and faithful to the Hebrew collective singular.
- source_word: הַבָּאִים
  chosen: you who enter
  alternatives:
  - who come in
  - who are entering
  lexicon: HALOT
  rationale: The participle identifies the addressed group. Rendering it as 'you who enter' makes the direct address explicit in natural English.
- source_word: בַּשְּׁעָרִים הָאֵלֶּה
  chosen: through these gates
  alternatives:
  - by these gates
  - into these gates
  lexicon: HALOT
  rationale: Plural 'gates' likely refers to the temple gates. 'Through these gates' is idiomatic English for entering by means of gates.
- source_word: לְהִשְׁתַּחֲוֺת
  chosen: to worship
  alternatives:
  - to bow down
  - to prostrate yourselves
  lexicon: HALOT
  rationale: The verb literally denotes bowing down, often in worship. In this temple context, 'to worship' communicates the intended religious act in clear modern English, while the more physical alternatives are possible lexical nuances.
