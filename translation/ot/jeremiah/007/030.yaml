id: JER.7.30
reference: Jeremiah 7:30
source:
  edition: WLC
  text: כִּֽי עָשׂ֨וּ בְנֵי יְהוּדָ֥ה הָ/רַ֛ע בְּ/עֵינַ֖/י נְאֻום יְהוָ֑ה שָׂ֣מוּ שִׁקּֽוּצֵי/הֶ֗ם בַּ/בַּ֛יִת אֲשֶׁר נִקְרָא שְׁמִ֥/י עָלָ֖י/ו לְ/טַמְּאֽ/וֹ־־־־־׃
translation:
  text: For the sons of Judah have done what is evil in my sight, declares Yahweh. They have put their abominations in the house that is called by my name, to defile it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “their abominations”; the Hebrew term often refers to abhorrent cult objects, likely including idols here.
    reason: lexical_alternative
  - marker: b
    text: That is, the temple in Jerusalem.
    reason: cultural_note
  - marker: c
    text: Literally, “the house over which my name is called.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding judgment. 'For' preserves the connective force in natural English.
- source_word: עָשׂוּ
  chosen: have done
  alternatives:
  - did
  lexicon: HALOT
  rationale: The qatal reports a completed action; English present perfect fits the prophetic accusation in context and reads naturally with the following declaration.
- source_word: בְנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the people of Judah
  - the children of Judah
  lexicon: HALOT
  rationale: Formally the phrase is 'sons of Judah.' This keeps the Hebrew kinship expression while remaining understandable. 'People of Judah' is smoother but less literal.
- source_word: הָרַע
  chosen: what is evil
  alternatives:
  - evil
  - the evil thing
  lexicon: HALOT
  rationale: The substantivized adjective with article is well represented by 'what is evil,' a natural English equivalent that preserves the moral category.
- source_word: בְּעֵינַי
  chosen: in my sight
  alternatives:
  - in my eyes
  - before me
  lexicon: HALOT
  rationale: A standard Hebrew idiom for divine evaluation. 'In my sight' is idiomatic English and preserves the metaphor.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the common prophetic formula. 'Declares the LORD' is both readable and weighty. 'the LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שָׂמוּ
  chosen: have put
  alternatives:
  - have set
  - placed
  lexicon: HALOT
  rationale: A straightforward rendering of the verb for placing/setting, with present perfect matching the first clause.
- source_word: שִׁקּוּצֵיהֶם
  chosen: their detestable things
  alternatives:
  - their abominations
  - their idols
  lexicon: HALOT
  rationale: The noun often denotes abhorrent cult objects or abominations. 'Detestable things' preserves the broad semantic force without prematurely narrowing to 'idols,' though idols are likely in context. 'Abominations' is traditional but less transparent for modern readers.
- source_word: בַּבַּיִת
  chosen: in the house
  alternatives:
  - in the temple
  lexicon: HALOT
  rationale: Literally 'in the house.' In Jeremiah this refers to the temple, but 'house' preserves the source wording while the following relative clause identifies it clearly.
- source_word: אֲשֶׁר נִקְרָא שְׁמִי עָלָיו
  chosen: that is called by my name
  alternatives:
  - over which my name is called
  - which bears my name
  lexicon: HALOT
  rationale: This is the standard idiom for belonging to or being identified with someone by name. 'That is called by my name' is the most transparent close rendering.
- source_word: לְטַמְּאוֹ
  chosen: to defile it
  alternatives:
  - so as to make it unclean
  - to pollute it
  lexicon: HALOT
  rationale: The infinitive expresses result or purpose. 'To defile it' captures ritual and moral contamination in concise English.
