theological_decisions:
- issue: Rendering of covenantal sanctuary language without importing later doctrinal
    interpretation
  chosen_reading: Retain 'house' and 'place' as distinct terms, with Shiloh comparison
    left implicit in its historical-theological force.
  alternative_readings:
  - Use 'temple' for clarity
  - Use 'sanctuary' for theological specificity
  rationale: The Hebrew intentionally distinguishes the temple building ('house')
    from the broader location ('place'). Preserving both terms maintains the prophetic
    warning's scope without adding interpretive specificity beyond the text.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Rendering of 'your fathers'
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The Hebrew explicitly uses 'fathers.' Per the project's gender-accurate
    principle, the translation should match the source unless context clearly demands
    a generic rendering. Here the covenant-historical reference to the forefathers
    is adequately conveyed by 'fathers.'
  doctrine_reference: Translation philosophy §4
