id: JER.7.14
reference: Jeremiah 7:14
source:
  edition: WLC
  text: וְ/עָשִׂ֜יתִי לַ/בַּ֣יִת אֲשֶׁ֧ר נִֽקְרָא שְׁמִ֣/י עָלָ֗י/ו אֲשֶׁ֤ר אַתֶּם֙
    בֹּטְחִ֣ים בּ֔/וֹ וְ/לַ֨/מָּק֔וֹם אֲשֶׁר נָתַ֥תִּי לָ/כֶ֖ם וְ/לַ/אֲבֽוֹתֵי/כֶ֑ם
    כַּ/אֲשֶׁ֥ר עָשִׂ֖יתִי לְ/שִׁלֽוֹ׀־־׃
translation:
  text: So I will do to the house that is called by my name, in which you trust, and
    to the place that I gave to you and to your fathers, just as I did to Shiloh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'over which my name is called.' This Hebrew idiom means
      that the house belongs to or is identified with the LORD.
    reason: lexical_alternative
  - marker: b
    text: Shiloh was the earlier sanctuary site whose destruction served as a warning
      example; see 1 Samuel 4 and Jeremiah 7:12.
    reason: cross_reference
lexical_decisions:
- source_word: וְעָשִׂיתִי
  chosen: So I will do
  alternatives:
  - And I will do
  - I will do
  lexicon: HALOT
  rationale: The conjunction links this verse to the preceding warning, and English
    'So' captures the inferential force naturally in context. The verb עשה with ל
    marks what YHWH will do to the temple/place; leaving the object implicit mirrors
    the Hebrew's ominous brevity.
- source_word: לַבַּיִת
  chosen: to the house
  alternatives:
  - to the temple
  lexicon: HALOT
  rationale: Literally 'to the house.' In Jeremiah this refers to the temple, but
    'house' preserves the Hebrew wording while remaining intelligible when followed
    by the relative clause about God's name.
- source_word: אֲשֶׁר נִקְרָא שְׁמִי עָלָיו
  chosen: that is called by my name
  alternatives:
  - over which my name is called
  - on which my name is called
  lexicon: HALOT
  rationale: This is the standard covenantal idiom for belonging to or being identified
    with God. 'That is called by my name' is clear modern English and preserves the
    Hebrew sense without over-literal awkwardness.
- source_word: אֲשֶׁר אַתֶּם בֹּטְחִים בּוֹ
  chosen: in which you trust
  alternatives:
  - in which you are trusting
  - which you trust in
  lexicon: HALOT
  rationale: The participle expresses ongoing reliance. English simple present communicates
    the continuing attitude naturally. 'In which' fits the antecedent 'house' and
    keeps the preposition explicit.
- source_word: וְלַמָּקוֹם
  chosen: and to the place
  alternatives:
  - and to this place
  - and to the המקום/land
  lexicon: HALOT
  rationale: מקום here likely refers to Jerusalem/this sacred site more broadly, distinguished
    from 'the house' (the temple building). 'Place' preserves the lexical distinction
    from 'house.' 'This place' is contextually possible but the demonstrative is not
    present in the Hebrew of this verse.
- source_word: אֲשֶׁר נָתַתִּי לָכֶם וְלַאֲבוֹתֵיכֶם
  chosen: that I gave to you and to your fathers
  alternatives:
  - that I gave you and your fathers
  - that I gave to you and your ancestors
  lexicon: HALOT
  rationale: The repeated preposition ל is reflected with 'to.' 'Fathers' is retained
    as the gender-accurate, source-matching term rather than the more interpretive
    'ancestors,' in line with project philosophy.
- source_word: כַּאֲשֶׁר עָשִׂיתִי לְשִׁלֹה
  chosen: just as I did to Shiloh
  alternatives:
  - as I did to Shiloh
  lexicon: HALOT
  rationale: Shiloh is transliterated as a place name. The comparison recalls God's
    prior judgment on the former sanctuary site; 'just as' makes the comparison explicit
    and natural in English.
