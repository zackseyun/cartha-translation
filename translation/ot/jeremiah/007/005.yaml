theological_decisions:
- issue: Gendered representative language in אִישׁ
  chosen_reading: a man
  alternative_readings:
  - a person
  - someone
  rationale: The Hebrew uses the singular masculine noun אִישׁ in a representative
    legal-social formula. Per doctrine, gender-accurate rendering is preferred over
    flattening to gender-neutral language when the source is masculine with generic
    force.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
