id: JER.7.5
reference: Jeremiah 7:5
source:
  edition: WLC
  text: כִּ֤י אִם הֵיטֵיב֙ תֵּיטִ֔יבוּ אֶת דַּרְכֵי/כֶ֖ם וְ/אֶת מַֽעַלְלֵי/כֶ֑ם אִם
    עָשׂ֤וֹ תַֽעֲשׂוּ֙ מִשְׁפָּ֔ט בֵּ֥ין אִ֖ישׁ וּ/בֵ֥ין רֵעֵֽ/הוּ־־־־׃
translation:
  text: For if you truly make your ways and your deeds good, if you truly do justice
    between a man and his neighbor,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if you thoroughly amend your ways and your deeds.' The Hebrew uses an
      infinitive absolute with the finite verb for emphasis in both clauses.
    reason: lexical_alternative
  - marker: b
    text: Or 'if you truly execute justice between one man and another.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: For if
  alternatives:
  - But if
  - Rather, if
  - Only if
  lexicon: HALOT
  rationale: In context this introduces the real condition following the false confidence
    of the previous verse. 'For if' preserves the connective force of כִּי and the
    conditional force of אִם without overinterpreting the discourse contrast.
- source_word: הֵיטֵיב תֵּיטִיבוּ
  chosen: you truly make ... good
  alternatives:
  - you thoroughly amend
  - you indeed do well
  - you surely improve
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of יטב intensifies the action.
    Rendering with 'truly' preserves the emphatic force in natural English. 'Make
    ... good' fits the direct object 'your ways and your deeds'; 'amend' is possible
    but slightly more interpretive.
- source_word: דַּרְכֵיכֶם
  chosen: your ways
  alternatives:
  - your conduct
  - your paths
  lexicon: HALOT
  rationale: '''Ways'' is a standard and transparent metaphor for manner of life in
    Hebrew and remains understandable in modern English. It preserves the concrete
    imagery better than the more abstract ''conduct''.'
- source_word: מַעַלְלֵיכֶם
  chosen: your deeds
  alternatives:
  - your actions
  - your practices
  lexicon: HALOT
  rationale: The noun refers to acts or deeds. 'Deeds' pairs well with 'ways' and
    preserves the moral sense of behavior without unnecessary expansion.
- source_word: אִם עָשׂוֹ תַעֲשׂוּ
  chosen: if you truly do
  alternatives:
  - if you indeed practice
  - if you surely execute
  lexicon: HALOT
  rationale: Again the infinitive absolute plus finite verb intensifies the verb.
    'Truly do' is concise and idiomatic before the object 'justice.'
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - what is just
  lexicon: HALOT
  rationale: Here the sense is not merely legal decision as an event but the practice
    of just judgment in social relations. 'Justice' is the most natural English rendering
    in this context.
- source_word: בֵּין אִישׁ וּבֵין רֵעֵהוּ
  chosen: between a man and his neighbor
  alternatives:
  - between one man and another
  - between a person and his companion
  lexicon: HALOT
  rationale: This formula describes fair judgment between members of the community.
    'A man and his neighbor' is gender-accurate to the Hebrew singular אִישׁ and preserves
    the representative force noted in the translation philosophy.
