id: JER.7.19
reference: Jeremiah 7:19
source:
  edition: WLC
  text: הַ/אֹתִ֛/י הֵ֥ם מַכְעִסִ֖ים נְאֻם יְהוָ֑ה הֲ/ל֣וֹא אֹתָ֔/ם לְמַ֖עַן בֹּ֥שֶׁת
    פְּנֵי/הֶֽם־׃ס
translation:
  text: Is it I whom they are provoking? declares the LORD. Is it not themselves,
    to the shame of their own faces?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'Are they not provoking themselves to their own
      shame?'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאֹתִי
  chosen: Is it I whom
  alternatives:
  - Do they provoke me
  - Am I the one whom
  lexicon: HALOT
  rationale: 'The interrogative particle with the object marker plus 1cs pronoun is
    best represented as an emphatic rhetorical question: ''Is it I whom...?'' This
    preserves the fronted object emphasis more clearly than a flatter declarative
    rendering.'
- source_word: מַכְעִסִים
  chosen: are provoking
  alternatives:
  - are angering
  - provoke to anger
  lexicon: HALOT
  rationale: The Hiphil of כעס commonly means 'to provoke to anger' or 'to vex.' 'Are
    provoking' is natural modern English and preserves the ongoing verbal force without
    over-paraphrasing.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is idiomatic,
    weighty, and consistent with prophetic discourse. Per doctrine, יְהוָה is rendered
    'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Follows the project''s contested-terms policy for the divine name: render
    יְהוָה as ''the LORD.'''
- source_word: הֲלוֹא
  chosen: Is it not
  alternatives:
  - Is it not rather
  - No, rather
  lexicon: HALOT
  rationale: The particle introduces the expected answer in a rhetorical question.
    'Is it not' preserves the form and force of the Hebrew.
- source_word: אֹתָם
  chosen: themselves
  alternatives:
  - them
  - their own selves
  lexicon: HALOT
  rationale: Although formally the object pronoun is 'them,' English idiom in this
    rhetorical contrast is best captured by 'themselves,' making explicit that their
    actions rebound on them rather than on God.
- source_word: לְמַעַן
  chosen: to
  alternatives:
  - for
  - resulting in
  lexicon: HALOT
  rationale: Here לְמַעַן introduces result or purpose. 'To' in the phrase 'to the
    shame...' is concise and idiomatic, preserving the consequential sense without
    overexplaining.
- source_word: בֹּשֶׁת
  chosen: the shame
  alternatives:
  - shame
  - disgrace
  lexicon: HALOT
  rationale: The noun denotes shame/disgrace. 'The shame' works well with the following
    construct phrase and keeps the expression concrete.
- source_word: פְּנֵיהֶם
  chosen: their own faces
  alternatives:
  - their faces
  - themselves
  lexicon: HALOT
  rationale: Hebrew 'face' often functions idiomatically, but here retaining 'faces'
    preserves the vividness of the source expression 'shame of their faces,' i.e.,
    public disgrace. 'Own' reflects the reflexive force of the clause in English.
