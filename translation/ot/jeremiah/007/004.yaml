id: JER.7.4
reference: Jeremiah 7:4
source:
  edition: WLC
  text: אַל תִּבְטְח֣וּ לָ/כֶ֔ם אֶל דִּבְרֵ֥י הַ/שֶּׁ֖קֶר לֵ/אמֹ֑ר הֵיכַ֤ל יְהוָה֙
    הֵיכַ֣ל יְהוָ֔ה הֵיכַ֥ל יְהוָ֖ה הֵֽמָּה־־׃
translation:
  text: Do not trust in deceptive words, saying, “The temple of the LORD, the temple
    of the LORD, the temple of the LORD are these.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in lying words.' The Hebrew can emphasize either the falsity of the
      words or their deceptive effect.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''The temple of the LORD, the temple of the LORD, the temple of
      the LORD are these.'' The threefold repetition is rhetorical, expressing misplaced
      confidence in the temple itself.'
    reason: cultural_note
lexical_decisions:
- source_word: אַל תִּבְטְחוּ
  chosen: Do not trust
  alternatives:
  - Do not put your trust
  - Do not rely
  lexicon: HALOT
  rationale: אַל with the imperfect gives a prohibition. בטח commonly means to trust
    or rely on. 'Do not trust' is concise, natural English and preserves the force
    of the warning.
- source_word: לָכֶם
  chosen: (implicit in English)
  alternatives:
  - for yourselves
  lexicon: HALOT
  rationale: The dative/reflexive nuance is not naturally expressed in English here.
    Rendering it explicitly as 'for yourselves' would sound awkward and adds little
    to the sense; the warning is adequately conveyed by 'Do not trust.'
- source_word: אֶל דִּבְרֵי הַשֶּׁקֶר
  chosen: in deceptive words
  alternatives:
  - in lying words
  - in false words
  lexicon: HALOT
  rationale: The preposition אֶל after בטח functions idiomatically with the object
    of trust. שׁקר can denote falsehood, lie, or deception. 'Deceptive words' captures
    both the falsity and the misleading effect in context, while remaining readable
    modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - by saying
  lexicon: HALOT
  rationale: Standard infinitive construction introducing the content of the deceptive
    words. 'Saying' is the most direct and idiomatic rendering.
- source_word: הֵיכַל יְהוָה
  chosen: the temple of the LORD
  alternatives:
  - the LORD's temple
  lexicon: HALOT
  rationale: הֵיכַל denotes temple/palace; in this context it clearly refers to the
    Jerusalem temple. The divine name follows the project's default rendering 'the
    LORD' for יְהוָה. The construct-like sequence is rendered naturally as 'the temple
    of the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, יְהוָה is rendered 'the LORD' rather than transliterated
    forms.
- source_word: הֵמָּה
  chosen: are these
  alternatives:
  - these are they
  - these they are
  lexicon: HALOT
  rationale: 'The pronoun points demonstratively to the temple(s) being invoked in
    the slogan. ''Are these'' preserves the Hebrew emphasis and yields intelligible
    English after the repeated cry. It reflects the likely sense: ''These are the
    temple of the LORD,'' i.e., this place guarantees safety.'
