theological_decisions:
- issue: Rendering the repeated temple formula
  chosen_reading: 'The repeated phrase is kept verbatim: ''The temple of the LORD,
    the temple of the LORD, the temple of the LORD are these.'''
  alternative_readings:
  - '''This is the temple of the LORD...'''
  - '''The LORD''s temple...'''
  rationale: The Hebrew repeats the phrase three times for rhetorical force, exposing
    Judah's superstitious confidence in the sanctuary. Preserving the repetition maintains
    the prophetic critique without softening it into paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the covenant name is 'the LORD.' This follows
    the stated doctrine and preserves continuity with established English Bible convention
    without making a doctrinal claim beyond the text.
