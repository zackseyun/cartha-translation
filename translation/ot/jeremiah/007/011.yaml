theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Temple imagery as rhetorical question
  chosen_reading: Has this house ... become a den of robbers in your eyes?
  alternative_readings:
  - Is this house ... a den of robbers in your eyes?
  rationale: The Hebrew perfect of היה in this rhetorical setting can be rendered statively or ingressively. 'Become' better conveys Jeremiah's accusation that the temple has been turned into a criminal refuge, without adding theological interpretation beyond the text.
