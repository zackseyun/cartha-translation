id: JER.7.11
reference: Jeremiah 7:11
source:
  edition: WLC
  text: הַ/מְעָרַ֣ת פָּרִצִ֗ים הָיָ֨ה הַ/בַּ֧יִת הַ/זֶּ֛ה אֲשֶׁר נִקְרָֽא שְׁמִ֥/י עָלָ֖י/ו בְּ/עֵינֵי/כֶ֑ם גַּ֧ם אָנֹכִ֛י הִנֵּ֥ה רָאִ֖יתִי נְאֻם יְהוָֽה־־־׃ס
translation:
  text: Has this house, which is called by my name, become a den of robbers in your eyes? Even I myself, look, I have seen it, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a cave of violent men' or 'a den of bandits.' The Hebrew phrase can emphasize violent, lawless people as well as robbers specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעָרַת
  chosen: den
  alternatives:
  - cave
  - hideout
  lexicon: HALOT
  rationale: The noun denotes a cave-like lair or hiding place. 'Den' is idiomatic in English and preserves the prophetic image later echoed in the Gospels.
- source_word: פָּרִצִים
  chosen: robbers
  alternatives:
  - violent men
  - bandits
  lexicon: HALOT
  rationale: The term can denote violent, lawless men, often in the sense of marauders or robbers. 'Robbers' fits the collocation 'den of robbers' and communicates predatory criminality without over-specifying.
- source_word: הָיָה
  chosen: become
  alternatives:
  - been
  - is
  lexicon: HALOT
  rationale: In context the verb asks whether the temple has come to function as such a place. 'Become' captures the resultant sense better than a simple stative 'is' or perfective 'has been.'
- source_word: הַבַּיִת הַזֶּה
  chosen: this house
  alternatives:
  - this temple
  lexicon: HALOT
  rationale: Literally 'this house.' Because the following clause identifies it as the house called by God's name, 'house' preserves the Hebrew wording while still clearly referring to the temple.
- source_word: נִקְרָא שְׁמִי עָלָיו
  chosen: which is called by my name
  alternatives:
  - over which my name is called
  - which bears my name
  lexicon: HALOT
  rationale: This is the standard covenantal/ownership idiom. 'Called by my name' is the most transparent and traditional English equivalent, preserving the biblical formula.
- source_word: בְּעֵינֵיכֶם
  chosen: in your eyes
  alternatives:
  - in your sight
  - to you
  lexicon: HALOT
  rationale: 'A literal but natural rendering of the idiom, preserving the evaluative sense: how the people regard the temple.'
- source_word: גַּם אָנֹכִי
  chosen: Even I myself
  alternatives:
  - I also
  - even I
  lexicon: HALOT
  rationale: 'The combination is emphatic. ''Even I myself'' conveys the force of divine emphasis and contrast: despite their perception, God has also seen.'
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - indeed
  lexicon: HALOT
  rationale: Used here as an attention marker. 'Look' is readable modern English and preserves the deictic force better than archaic 'behold.'
- source_word: רָאִיתִי
  chosen: I have seen it
  alternatives:
  - I have seen
  - I see
  lexicon: HALOT
  rationale: The object is implicit from context; adding 'it' makes the English idiomatic and clarifies that the LORD has seen the temple's misuse.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is a standard prophetic formula. 'Declares the LORD' is idiomatic, weighty, and consistent with modern English prophetic style.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
