id: JER.7.25
reference: Jeremiah 7:25
source:
  edition: WLC
  text: לְ/מִן הַ/יּ֗וֹם אֲשֶׁ֨ר יָצְא֤וּ אֲבֽוֹתֵי/כֶם֙ מֵ/אֶ֣רֶץ מִצְרַ֔יִם עַ֖ד
    הַ/יּ֣וֹם הַ/זֶּ֑ה וָ/אֶשְׁלַ֤ח אֲלֵי/כֶם֙ אֶת כָּל עֲבָדַ֣/י הַ/נְּבִיאִ֔ים י֖וֹם
    הַשְׁכֵּ֥ם וְ/שָׁלֹֽחַ־־־׃
translation:
  text: From the day your fathers came out of the land of Egypt until this day, I
    have sent to you all my servants the prophets, day after day, rising early and
    sending them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your ancestors came out of the land of Egypt.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: ''rising early and sending,'' expressing persistent, eager
      repetition in sending the prophets.'
    reason: cultural_note
lexical_decisions:
- source_word: לְמִן הַיּוֹם אֲשֶׁר
  chosen: From the day ...
  alternatives:
  - Since the day ...
  - From the time when ...
  lexicon: HALOT
  rationale: The compound prepositional expression marks the starting point of a time
    span. 'From the day' is natural English and preserves the temporal force without
    over-paraphrase.
- source_word: יָצְאוּ אֲבוֹתֵיכֶם
  chosen: your fathers came out
  alternatives:
  - your ancestors came out
  lexicon: HALOT
  rationale: אָבוֹת can mean literal fathers or forefathers/ancestors. 'Your fathers'
    preserves the Hebrew idiom and the gender-accurate principle, while in context
    clearly referring to the forefathers of Israel.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: of the land of Egypt
  alternatives:
  - from Egypt
  lexicon: HALOT
  rationale: The fuller phrase is retained because 'land of Egypt' echoes the covenant-history
    formula common in the Hebrew Bible and should not be unnecessarily flattened.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: until this day
  alternatives:
  - to this day
  lexicon: HALOT
  rationale: A standard temporal expression indicating continuity up to the present
    reference point. 'Until this day' is slightly more formal and matches the Hebrew
    sequence.
- source_word: וָאֶשְׁלַח
  chosen: I have sent
  alternatives:
  - I sent
  lexicon: HALOT
  rationale: Although the Hebrew wayyiqtol is formally past, in this context spanning
    from the exodus 'until this day' English present perfect better conveys repeated
    action continuing through the period in view.
- source_word: אֲלֵיכֶם
  chosen: to you
  alternatives:
  - to you all
  lexicon: HALOT
  rationale: Second person plural is represented by standard English 'you'; adding
    'all' here would be unnecessary because plurality is already clear from context.
- source_word: אֶת כָּל עֲבָדַי הַנְּבִיאִים
  chosen: all my servants the prophets
  alternatives:
  - all my servants, the prophets
  - all my prophet-servants
  lexicon: HALOT
  rationale: The appositional construction identifies the prophets as God's servants.
    'Servants' is preferable here over 'slaves' because the emphasis is on commissioned
    service rather than bonded status.
- source_word: יוֹם
  chosen: day after day
  alternatives:
  - daily
  - every day
  lexicon: HALOT
  rationale: The singular noun used adverbially with the following infinitives expresses
    repeated daily action. 'Day after day' preserves the iterative emphasis more vividly
    than a simple 'daily'.
- source_word: הַשְׁכֵּם
  chosen: rising early
  alternatives:
  - early
  - again and again early
  lexicon: HALOT
  rationale: This infinitive absolute in Jeremiah commonly forms the idiom 'rising
    early and sending,' conveying eagerness and persistence. Rendering it verbally
    preserves the idiom's force.
- source_word: וְשָׁלֹחַ
  chosen: and sending them
  alternatives:
  - and sending
  - and I sent
  lexicon: HALOT
  rationale: Paired with הַשְׁכֵּם, this infinitive continues the idiom of persistent
    repeated sending. 'Sending them' makes explicit in English that the prophets are
    the ones sent, though the object is implicit in Hebrew and supplied from context.
