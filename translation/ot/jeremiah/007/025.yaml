theological_decisions:
- issue: Rendering עֲבָדַי for prophets
  chosen_reading: servants
  alternative_readings:
  - slaves
  rationale: The doctrine guidelines allow 'servant / slave' context-dependently.
    Here the term describes the prophets as commissioned agents of God; the bonded-status
    nuance is not foregrounded, so 'servants' best fits the context while remaining
    faithful.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms table
    for δοῦλος by analogy of bonded-status sensitivity
