theological_decisions:
- issue: Whether the verse should be translated in a way that implies God never gave any sacrificial commands at all, creating a contradiction with the Torah.
  chosen_reading: 'Render the Hebrew denial straightforwardly without softening it: ''I did not speak ... or command them ... concerning burnt offering and sacrifice.'''
  alternative_readings:
  - Render idiomatically as relative priority, e.g., 'it was not primarily about burnt offerings and sacrifices'
  - Add interpretive qualifiers such as 'at first' or 'in the first place' in the main text
  rationale: The Hebrew text states the denial starkly, and the translation should preserve that prophetic tension rather than resolve it in the main text. The broader canonical context suggests a rhetorical contrast between covenant obedience and sacrificial ritual, but that interpretive harmonization should not be imported into the translation itself.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
revisions:
- timestamp: '2026-04-21T12:28:42Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/jeremiah/007/022.json
  category: awkward_english
