id: JER.7.22
reference: Jeremiah 7:22
source:
  edition: WLC
  text: כִּ֠י לֹֽא דִבַּ֤רְתִּי אֶת אֲבֽוֹתֵי/כֶם֙ וְ/לֹ֣א צִוִּיתִ֔י/ם בְּ/י֛וֹם הוציא אוֹתָ֖/ם מֵ/אֶ֣רֶץ מִצְרָ֑יִם עַל דִּבְרֵ֥י עוֹלָ֖ה וָ/זָֽבַח־־־׃
translation:
  text: For on the day I brought them out of the land of Egypt, I did not speak to your fathers or command them concerning burnt offering and sacrifice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'about burnt offerings and sacrifice.' The verse likely uses prophetic rhetoric to stress that obedience, not ritual sacrifice, was God's central covenant demand; compare the next verse.
    reason: lexical_alternative
  - marker: b
    text: This is not necessarily a denial that sacrificial laws were ever given, but a forceful contrast in emphasis within the prophetic context.
    reason: cross_reference
  - marker: c
    text: Or 'For I did not speak to your fathers or command them on the day I brought them out of the land of Egypt concerning burnt offering and sacrifice.'.
    reason: previous_rendering
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding rebuke. 'For' fits the argumentative flow in English and preserves the causal force without over-specifying nuance.
- source_word: לֹא דִבַּרְתִּי
  chosen: I did not speak
  alternatives:
  - I did not declare
  - I did not address
  lexicon: HALOT
  rationale: דבר in this construction is the ordinary verb 'speak.' 'Did not speak' is the most direct rendering and keeps the rhetorical force of the denial.
- source_word: אֶת אֲבוֹתֵיכֶם
  chosen: to your fathers
  alternatives:
  - with your fathers
  - to your ancestors
  lexicon: HALOT
  rationale: Although אֵת marks the object, with דבר the sense in English is naturally 'speak to.' 'Fathers' preserves the Hebrew idiom and the gender-accurate historical reference to the forefathers of Israel; 'ancestors' is possible but less literal.
- source_word: וְלֹא צִוִּיתִים
  chosen: or command them
  alternatives:
  - nor did I command them
  - or give them commands
  lexicon: HALOT
  rationale: צוה is the standard verb 'command.' The English coordinates naturally with the previous clause as 'or command them,' preserving the parallel denial.
- source_word: בְּיוֹם הוֹצִיא אוֹתָם מֵאֶרֶץ מִצְרַיִם
  chosen: on the day I brought them out of the land of Egypt
  alternatives:
  - when I brought them out of the land of Egypt
  - in the day I brought them out of the land of Egypt
  lexicon: HALOT
  rationale: The infinitive construct with suffix refers to the exodus event. 'On the day' is a natural formal rendering of ביום and preserves the temporal anchoring to the exodus.
- source_word: עַל דִּבְרֵי
  chosen: concerning
  alternatives:
  - about
  - with regard to
  - on the matter of
  lexicon: HALOT
  rationale: The phrase על דברי introduces the topic under discussion. 'Concerning' is concise and idiomatic in English while preserving the topical sense.
- source_word: עוֹלָה
  chosen: burnt offering
  alternatives:
  - whole burnt offering
  lexicon: HALOT
  rationale: עוֹלָה is the standard sacrificial term for the offering wholly consumed on the altar. 'Burnt offering' is the established and accurate English equivalent.
- source_word: וָזָבַח
  chosen: and sacrifice
  alternatives:
  - and sacrifices
  - and slaughter-offering
  lexicon: HALOT
  rationale: זבח here functions as a collective sacrificial category paired with עולה. Singular 'sacrifice' works well as a category term in English and matches the Hebrew singular form.
