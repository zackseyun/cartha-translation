  from: For I did not speak to your fathers or command them on the day I brought them out of the land of Egypt concerning burnt offering and sacrifice.
  to: For on the day I brought them out of the land of Egypt, I did not speak to your fathers or command them concerning burnt offering and sacrifice.
  rationale: The current rendering is grammatically correct and follows the Hebrew word order, but it results in a slightly clunky English sentence by stacking two long adverbial phrases ('on the day...' and 'concerning...') at the end. Fronting the temporal clause improves readability and natural English flow, making the core negative assertion more cohesive and impactful.
