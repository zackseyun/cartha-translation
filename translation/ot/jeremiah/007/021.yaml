theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves covenantal resonance and aligns with the project's stated
    policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Specificity of זִבְחֵיכֶם in contrast with burnt offerings
  chosen_reading: your sacrifices
  alternative_readings:
  - your peace offerings
  rationale: The verse contrasts burnt offerings, which were wholly burned, with other
    sacrifices from which meat could be eaten. Because זֶבַח can be either general
    or more specific in this setting, the main text keeps the broader term while preserving
    the narrower interpretive option in a footnote, maintaining the text's tension
    rather than over-resolving it.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
