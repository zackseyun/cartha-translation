id: JER.7.21
reference: Jeremiah 7:21
source:
  edition: WLC
  text: כֹּ֥ה אָמַ֛ר יְהוָ֥ה צְבָא֖וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֑ל עֹלוֹתֵי/כֶ֛ם סְפ֥וּ עַל
    זִבְחֵי/כֶ֖ם וְ/אִכְל֥וּ בָשָֽׂר־׃
translation:
  text: 'Thus says the LORD of hosts, the God of Israel: Add your burnt offerings
    to your sacrifices, and eat the meat.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your peace offerings'; the Hebrew term can refer more specifically to
      sacrifices from which the worshiper ate.
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Standard prophetic discourse marker introducing a divine pronouncement.
    'Thus' preserves the formal prophetic tone without sounding archaic in context.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: 'Although morphologically perfect, in prophetic messenger formulas it
    functions performatively/presently in English: ''Thus says...'' is the natural
    equivalent.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding covenantal usage.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the established and sufficiently
    transparent rendering, preserving the breadth of heavenly/earthly armies rather
    than narrowing to merely military forces.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying Israel's covenant God.
- source_word: עֹלוֹתֵיכֶם
  chosen: your burnt offerings
  alternatives:
  - your whole burnt offerings
  lexicon: HALOT
  rationale: עֹלָה denotes the offering wholly consumed on the altar. 'Burnt offerings'
    is the standard concise rendering; 'whole burnt offerings' is more explicit but
    less idiomatic.
- source_word: סְפוּ
  chosen: Add
  alternatives:
  - Heap up
  - Increase
  lexicon: HALOT
  rationale: Imperative from יסף/ספה in this context means to add/increase. 'Add'
    best fits the construction 'add X to Y' and preserves the biting irony of the
    command.
- source_word: עַל
  chosen: to
  alternatives:
  - upon
  - on top of
  lexicon: HALOT
  rationale: With the verb 'add,' English idiom prefers 'to' rather than the more
    literal 'upon/on'.
- source_word: זִבְחֵיכֶם
  chosen: your sacrifices
  alternatives:
  - your peace offerings
  lexicon: HALOT
  rationale: זֶבַח can denote sacrifice generally, though in cultic contrast with
    burnt offerings it may more specifically evoke sacrifices from which worshipers
    ate, especially peace offerings. The broader 'sacrifices' is retained in the main
    text because the Hebrew itself is not explicit; the more specific possibility
    is preserved in a footnote.
- source_word: וְאִכְלוּ
  chosen: and eat
  alternatives:
  - then eat
  lexicon: HALOT
  rationale: 'Simple imperative continuation. The force is likely ironic: since they
    are treating worship corruptly, they may as well consume the meat themselves.'
- source_word: בָשָׂר
  chosen: the meat
  alternatives:
  - flesh
  lexicon: HALOT
  rationale: In sacrificial context, 'meat' communicates edible animal flesh in natural
    modern English better than the more wooden 'flesh'.
