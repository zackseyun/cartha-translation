theological_decisions:
- issue: Divine agency in judgment
  chosen_reading: 'The verse is rendered with explicit first-person divine action:
    ''I will put an end,'' preserving Yahweh''s direct agency in removing joy from
    Judah and Jerusalem.'
  alternative_readings:
  - A more impersonal rendering such as 'joy will cease'
  rationale: The Hebrew first-person Hiphil verb explicitly presents God as the acting
    subject. The translation preserves this theological emphasis rather than softening
    it into an impersonal event.
