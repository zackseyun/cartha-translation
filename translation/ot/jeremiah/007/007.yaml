theological_decisions:
- issue: Whether the promise implies unconditional permanent possession of the land
  chosen_reading: Render the statement as a conditional promise of continued dwelling,
    without importing unconditionality.
  alternative_readings:
  - Render as an absolute grant of the land regardless of covenant obedience
  rationale: In context, verse 7 follows conditional exhortations ('if you truly amend...'),
    so the English should preserve the promise as contingent in discourse rather than
    as an abstract doctrinal statement about land tenure. The verse itself states
    the ancestral gift of the land but does not require the translator to resolve
    broader theological debates about covenant permanence.
  doctrine_reference: Preserve theological tension rather than resolve it.
