id: JER.7.7
reference: Jeremiah 7:7
source:
  edition: WLC
  text: וְ/שִׁכַּנְתִּ֤י אֶתְ/כֶם֙ בַּ/מָּק֣וֹם הַ/זֶּ֔ה בָּ/אָ֕רֶץ אֲשֶׁ֥ר נָתַ֖תִּי
    לַ/אֲבֽוֹתֵי/כֶ֑ם לְ/מִן עוֹלָ֖ם וְ/עַד עוֹלָֽם־־׃
translation:
  text: then I will let you dwell in this place, in the land that I gave to your fathers
    from of old and forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to your ancestors.” The Hebrew reads “to your fathers.”
    reason: lexical_alternative
  - marker: b
    text: Or 'from of old and forever'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְשִׁכַּנְתִּי
  chosen: then I will let you dwell
  alternatives:
  - then I will cause you to dwell
  - then I will make you dwell
  - then I will dwell with you
  lexicon: HALOT
  rationale: 'The Hiphil of שׁכן here is causative: ''cause/let to dwell.'' In context,
    after the conditional in the previous verse, the sense is that God will permit
    or establish their continued residence in the land. ''Let you dwell'' is idiomatic
    modern English while preserving the causative force better than a simple ''you
    will dwell.'' ''Dwell with you'' would misread the object.'
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: in this place
  alternatives:
  - in this המקום
  - here in this place
  lexicon: HALOT
  rationale: מָקוֹם is straightforwardly 'place.' The demonstrative הַזֶּה is retained
    as 'this.' The phrase likely points to Judah/Jerusalem/temple-land contextually,
    but the translation should not over-specify beyond the Hebrew.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ
  - in this land
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the land given to the ancestors, not the earth in
    a global sense. 'Land' is the natural covenantal-geographical rendering.
- source_word: אֲשֶׁר נָתַתִּי
  chosen: that I gave
  alternatives:
  - which I gave
  - that I have given
  lexicon: HALOT
  rationale: The relative clause is simple past in Hebrew narrative-prophetic style.
    'That I gave' is clear and natural.
- source_word: לַאֲבוֹתֵיכֶם
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: אָבוֹת commonly means 'fathers/ancestors.' Per the translation philosophy,
    gender-accurate rendering is preferred where the source is masculine; 'fathers'
    preserves the Hebrew form. 'Ancestors' is possible but less formally aligned,
    so it is preserved in a footnote.
- source_word: לְמִן עוֹלָם וְעַד עוֹלָם
  chosen: from of old and forever
  alternatives:
  - from ancient times and forever
  - from everlasting to everlasting
  - forever and ever
  lexicon: HALOT
  rationale: עוֹלָם can denote remote past or enduring future depending on context.
    With מִן ... וְעַד ..., the phrase spans from ancient time into the indefinite
    future. Because the first member points backward and the second forward, 'from
    of old and forever' best captures the temporal sweep without importing a stronger
    metaphysical sense like 'from everlasting to everlasting.'
