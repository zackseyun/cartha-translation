id: JER.7.20
reference: Jeremiah 7:20
source:
  edition: WLC
  text: לָ/כֵ֞ן כֹּה אָמַ֣ר אֲדֹנָ֣/י יְהֹוִ֗ה הִנֵּ֨ה אַפִּ֤/י וַֽ/חֲמָתִ/י֙ נִתֶּ֨כֶת֙ אֶל הַ/מָּק֣וֹם הַ/זֶּ֔ה עַל הָֽ/אָדָם֙ וְ/עַל הַ/בְּהֵמָ֔ה וְ/עַל עֵ֥ץ הַ/שָּׂדֶ֖ה וְ/עַל פְּרִ֣י הָֽ/אֲדָמָ֑ה וּ/בָעֲרָ֖ה וְ/לֹ֥א תִכְבֶּֽה־׀־־־־־׃ס
translation:
  text: 'Therefore thus says the Lord GOD: Behold, my anger and my wrath are being poured out on this place, on man and on beast, on the trees of the field and on the fruit of the ground; it will burn and will not be quenched.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind' for 'man'; the Hebrew אָדָם is singular with generic force.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks a consequential conclusion from the preceding indictment; 'Therefore' is the most natural formal-modern English equivalent.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; retained in a recognizable but readable form.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD
  lexicon: HALOT
  rationale: Renders the title-plus-divine-name combination conventionally as 'the Lord GOD.' Per doctrine, יְהוָה is rendered 'the LORD'; but in the compound אֲדֹנָי יְהוִה, English convention avoids 'Lord LORD' by using 'Lord GOD,' which preserves the distinction without awkwardness.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Signals solemn divine announcement. 'Behold' preserves the prophetic force better than the more colloquial 'Look' or 'See'.
- source_word: אַפִּי
  chosen: my anger
  alternatives:
  - my nose
  - my wrath
  lexicon: HALOT
  rationale: Though literally related to 'nose,' in this idiom it denotes anger. 'Anger' distinguishes it from the following חֵמָה while keeping the pair intelligible in English.
- source_word: חֲמָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my rage
  lexicon: HALOT
  rationale: Paired with אַף, this intensifies divine displeasure. 'Wrath' preserves the elevated and judicial tone.
- source_word: נִתֶּכֶת
  chosen: are being poured out
  alternatives:
  - is poured out
  - is being poured out
  lexicon: HALOT
  rationale: The feminine singular participle agrees with the compound subject understood collectively. English plural 'are being poured out' matches the dual subject 'my anger and my wrath' and conveys ongoing/imminent outpouring.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  chosen: on this place
  alternatives:
  - upon this place
  - against this place
  - into this place
  lexicon: HALOT
  rationale: Although אֶל often means 'to/into,' with verbs of outpouring in judgment contexts English 'on' best conveys the target of wrath.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - the people
  lexicon: HALOT
  rationale: Per doctrine, אָדָם is rendered according to context. Here it is paired with beast and other created things under judgment, so singular-generic 'man' best reflects the Hebrew and its representative force.
- source_word: הַבְּהֵמָה
  chosen: beast
  alternatives:
  - animal
  - livestock
  lexicon: HALOT
  rationale: '''Beast'' preserves the broad category and the elevated register of judgment language better than ''animal.'' ''Livestock'' would be too narrow.'
- source_word: עֵץ הַשָּׂדֶה
  chosen: the trees of the field
  alternatives:
  - the tree of the field
  - the trees in the countryside
  lexicon: HALOT
  rationale: Though עֵץ is singular in construct, English naturally renders the collective sense as plural. 'Field' is retained rather than paraphrased.
- source_word: פְּרִי הָאֲדָמָה
  chosen: the fruit of the ground
  alternatives:
  - the produce of the land
  - the fruit of the soil
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the agricultural imagery and avoids over-interpreting as economic 'produce' alone.
- source_word: וּבָעֲרָה
  chosen: it will burn
  alternatives:
  - and it will burn
  - and it will blaze
  lexicon: HALOT
  rationale: Feminine singular refers back to the outpoured anger/wrath or the resulting fire of judgment. English singular 'it' is the most natural way to carry the image forward.
- source_word: וְלֹא תִכְבֶּה
  chosen: and will not be quenched
  alternatives:
  - and it will not go out
  - and it will not be extinguished
  lexicon: HALOT
  rationale: Traditional and precise rendering for fire/judgment language; preserves the passive nuance and prophetic resonance.
