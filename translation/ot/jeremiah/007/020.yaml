theological_decisions:
- issue: Rendering of the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - the Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Generic force of הָאָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  rationale: The Hebrew is grammatically singular and generic. Per doctrine, gender-accurate rendering is preferred where representative force is intended. 'Man' here matches the source form and its pairing with 'beast.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table, אָדָם *adam* → man / humankind (context)'
