id: JER.7.29
reference: Jeremiah 7:29
source:
  edition: WLC
  text: גָּזִּ֤י נִזְרֵ/ךְ֙ וְֽ/הַשְׁלִ֔יכִי וּ/שְׂאִ֥י עַל שְׁפָיִ֖ם קִינָ֑ה כִּ֚י מָאַ֣ס יְהוָ֔ה וַ/יִּטֹּ֖שׁ אֶת דּ֥וֹר עֶבְרָתֽ/וֹ־־׃
translation:
  text: Cut off your hair and throw it away, and raise a lament on the bare heights, for Yahweh has rejected and abandoned the generation of his wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your crown.' The Hebrew noun can refer to consecration, a crown/diadem, or hair associated with consecration; here the commands 'cut off' and 'throw it away' favor the sense of consecrated hair.
    reason: lexical_alternative
  - marker: b
    text: Or 'the generation under his wrath.' The Hebrew is literally 'the generation of his wrath.'
    reason: alternative_reading
lexical_decisions:
- source_word: גָּזִּי
  chosen: Cut off
  alternatives:
  - Shear
  - Cut away
  lexicon: HALOT
  rationale: Imperative feminine singular from גזז, calling for an act of cutting/shearing. 'Cut off' is natural English and fits the object 'your consecrated hair.'
- source_word: נִזְרֵךְ
  chosen: your consecrated hair
  alternatives:
  - your crown
  - your Nazirite hair
  - your diadem
  lexicon: HALOT
  rationale: From נזר, which can denote consecration, crown, or the hair associated with consecration. In this context, addressed to personified Jerusalem/Zion and paired with 'cut off' and 'throw it away,' the sense is best taken as hair that signifies consecration. This preserves the symbolic force of lost holiness better than the more generic 'crown,' while acknowledging the lexical overlap.
- source_word: וְהַשְׁלִיכִי
  chosen: and throw it away
  alternatives:
  - and cast it away
  - and fling it away
  lexicon: HALOT
  rationale: Imperative feminine singular from שלך. 'Throw it away' is idiomatic modern English and conveys deliberate disposal.
- source_word: וּשְׂאִי
  chosen: and raise
  alternatives:
  - and lift up
  - and take up
  lexicon: HALOT
  rationale: Imperative from נשׂא. With קִינָה as object, 'raise a lament' is idiomatic English for beginning an audible lamentation.
- source_word: עַל שְׁפָיִם
  chosen: on the bare heights
  alternatives:
  - on the barren heights
  - on the windswept heights
  - on the high places
  lexicon: HALOT
  rationale: שְׁפָיִם refers to bare/barren heights, often exposed hilltops. 'Bare heights' is a common and accurate rendering, avoiding the potentially cultic-specific 'high places' unless context clearly demands that nuance.
- source_word: קִינָה
  chosen: a lament
  alternatives:
  - a dirge
  - lamentation
  lexicon: HALOT
  rationale: Denotes a lament or funeral dirge. 'Lament' is accessible modern English while retaining the mourning sense.
- source_word: כִּי מָאַס
  chosen: for ... has rejected
  alternatives:
  - for ... has despised
  - for ... has refused
  lexicon: HALOT
  rationale: מָאַס conveys rejection/reprobation. 'Rejected' best fits covenantal repudiation in this prophetic context without overstating emotional contempt.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּטֹּשׁ
  chosen: and abandoned
  alternatives:
  - and forsook
  - and cast off
  lexicon: HALOT
  rationale: נטש conveys leaving, forsaking, abandoning. 'Abandoned' is clear modern English and pairs well with 'rejected' without becoming archaic.
- source_word: דּוֹר עֶבְרָתוֹ
  chosen: the generation of his wrath
  alternatives:
  - the generation under his wrath
  - the generation of his fury
  - this generation of his wrath
  lexicon: HALOT
  rationale: דּוֹר is 'generation.' עֶבְרָה denotes overflowing wrath/fury. The construct phrase is retained fairly literally as 'the generation of his wrath' to preserve the Hebrew's starkness; smoother interpretive expansions are possible but less transparent to the source.
