theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of נִזְרֵךְ
  chosen_reading: your consecrated hair
  alternative_readings:
  - your crown
  - your Nazirite hair
  rationale: The verse's imagery of cutting and discarding strongly favors hair rather than a literal crown. Rendering it as 'consecrated hair' preserves the link to נזר as consecration, highlighting the symbolic loss of holiness without importing a technical Nazirite vow where the text does not explicitly specify one.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Retention of the literal phrase 'generation of his wrath'
  chosen_reading: the generation of his wrath
  alternative_readings:
  - the generation under his wrath
  - the generation he is angry with
  rationale: The Hebrew construct is terse and forceful. Keeping it relatively literal preserves the prophetic severity and avoids softening the theological claim of divine judgment into a mere paraphrase.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
