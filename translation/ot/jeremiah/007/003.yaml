theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton and aligns
    with the reverential convention reflected in many English Bibles and the LXX pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of וַאֲשַׁכְּנָה אֶתְכֶם in covenant context
  chosen_reading: and I will let you dwell
  alternative_readings:
  - and I will cause you to dwell
  - and I will let you remain
  rationale: The verse conditions continued residence on repentance. 'Let you dwell'
    preserves the theological tension between God's sovereign action and Israel's
    continued occupancy of the place, without flattening the idiom into either mere
    relocation or simple permanence.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
