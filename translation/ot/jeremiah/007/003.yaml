id: JER.7.3
reference: Jeremiah 7:3
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר יְהוָ֤ה צְבָאוֹת֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל הֵיטִ֥יבוּ דַרְכֵי/כֶ֖ם
    וּ/מַֽעַלְלֵי/כֶ֑ם וַ/אֲשַׁכְּנָ֣ה אֶתְ/כֶ֔ם בַּ/מָּק֥וֹם הַ/זֶּֽה־׃
translation:
  text: 'Thus says the LORD of hosts, the God of Israel: Make your ways and your deeds
    good, and I will let you dwell in this place.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Amend your ways and your deeds.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and I will cause you to dwell in this place,' or 'and I will let you
      remain in this place.'
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal
    prophetic cadence without sounding archaic beyond normal biblical English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD'.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the divine title יְהוָה צְבָאוֹת, 'of hosts' is the established and
    semantically broad rendering, encompassing heavenly armies and sovereign power.
    'Of armies' is possible but narrower.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying Israel's covenant God.
- source_word: הֵיטִיבוּ
  chosen: Make ... good
  alternatives:
  - Amend
  - Improve
  - Make ... better
  lexicon: HALOT
  rationale: Imperative plural from יטב in the Hiphil calls for active reform. 'Make
    ... good' stays close to the Hebrew and avoids importing the more interpretive
    legal nuance of 'amend,' while still reading naturally in English.
- source_word: דַרְכֵיכֶם
  chosen: your ways
  alternatives:
  - your conduct
  - your paths
  lexicon: HALOT
  rationale: '''Ways'' preserves the common Hebrew metaphor for manner of life. ''Conduct''
    is interpretive; ''paths'' is too literal in this moral context.'
- source_word: וּמַעַלְלֵיכֶם
  chosen: and your deeds
  alternatives:
  - and your actions
  - and your practices
  lexicon: HALOT
  rationale: Refers to concrete acts/behavior. 'Deeds' pairs well with 'ways' and
    preserves the moral force.
- source_word: וַאֲשַׁכְּנָה אֶתְכֶם
  chosen: and I will let you dwell
  alternatives:
  - and I will cause you to dwell
  - and I will let you remain
  lexicon: HALOT
  rationale: Hiphil of שכן can mean cause to dwell or allow to dwell/remain. In this
    context of covenant warning about continued residence in the land, 'let you dwell'
    best conveys permitted continuance without over-specifying causation.
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: in this place
  alternatives:
  - in this land
  - at this place
  lexicon: HALOT
  rationale: מקום is 'place.' Given the temple-sermon context, 'this place' preserves
    the deliberate ambiguity that can include Jerusalem/temple precincts and the land
    more broadly. 'Land' would resolve the reference too narrowly.
