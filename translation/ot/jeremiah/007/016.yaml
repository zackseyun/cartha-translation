id: JER.7.16
reference: Jeremiah 7:16
source:
  edition: WLC
  text: וְ/אַתָּ֞ה אַל תִּתְפַּלֵּ֣ל בְּעַד הָ/עָ֣ם הַ/זֶּ֗ה וְ/אַל תִּשָּׂ֧א בַעֲדָ֛/ם
    רִנָּ֥ה וּ/תְפִלָּ֖ה וְ/אַל תִּפְגַּע בִּ֑/י כִּי אֵינֶ֥/נִּי שֹׁמֵ֖עַ אֹתָֽ/ךְ־׀־־־־־׃
translation:
  text: But as for you, do not pray for this people, and do not lift up a cry or prayer
    on their behalf, and do not intercede with me, for I am not listening to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not entreat me' / 'do not press me'; the Hebrew verb can carry the
      sense of urgent pleading or intercession.
    reason: lexical_alternative
  - marker: b
    text: Or 'for I will not hear you.' The Hebrew may be rendered with a future sense,
      though the participial form also supports 'I am not listening to you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  chosen: But as for you
  alternatives:
  - And you
  - But you
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a contrastive address
    to Jeremiah. 'But as for you' brings out the adversative force and the direct
    focus on the prophet more clearly than a bare 'and you.'
- source_word: אַל תִּתְפַּלֵּל
  chosen: do not pray
  alternatives:
  - must not pray
  lexicon: HALOT
  rationale: אַל with the imperfect gives a prohibition. 'Do not pray' is the natural
    English imperative equivalent.
- source_word: בְּעַד הָעָם הַזֶּה
  chosen: for this people
  alternatives:
  - on behalf of this people
  lexicon: HALOT
  rationale: בְּעַד commonly means 'for, on behalf of.' 'For this people' is concise
    and idiomatic, while the representative sense is retained by the following fuller
    phrase 'on their behalf.'
- source_word: וְאַל תִּשָּׂא
  chosen: and do not lift up
  alternatives:
  - and do not raise
  lexicon: HALOT
  rationale: נשא literally means 'lift/carry.' Here it governs the following prayer
    terms, so 'lift up' preserves the Hebrew idiom without obscuring the sense.
- source_word: רִנָּה
  chosen: a cry
  alternatives:
  - a plea
  - a ringing cry
  lexicon: HALOT
  rationale: רִנָּה can denote a ringing cry, often of joy but also a loud supplicatory
    cry depending on context. Since it is paired with 'prayer' in a prohibition of
    intercession, 'a cry' best preserves the vocal, urgent sense without over-specifying
    joy.
- source_word: וּתְפִלָּה
  chosen: or prayer
  alternatives:
  - and prayer
  lexicon: HALOT
  rationale: 'The conjunction joins near-synonymous prayer terms. Rendering it ''or''
    in English fits the prohibitive series idiomatically: neither a cry nor prayer
    of any kind is to be offered. The semantic force remains inclusive.'
- source_word: בַעֲדָם
  chosen: on their behalf
  alternatives:
  - for them
  lexicon: HALOT
  rationale: This repeats בְּעַד with a pronominal suffix. 'On their behalf' makes
    the intercessory sense explicit and avoids awkward repetition of simply 'for.'
- source_word: וְאַל תִּפְגַּע בִּי
  chosen: and do not intercede with me
  alternatives:
  - and do not press me
  - and do not entreat me
  - and do not importune me
  lexicon: HALOT
  rationale: פגע in the Hiphil can mean to encounter, assail, or make entreaty/intercession.
    In this context of forbidden prayer to God, 'intercede with me' best captures
    the sense of pleading to God on behalf of others.
- source_word: כִּי אֵינֶנִּי שֹׁמֵעַ אֹתָךְ
  chosen: for I am not listening to you
  alternatives:
  - for I will not hear you
  - for I do not hear you
  lexicon: HALOT
  rationale: The participle שֹׁמֵעַ with negation expresses ongoing refusal. 'I am
    not listening to you' reflects the durative aspect more naturally than a simple
    future, while preserving the solemn divine rejection of intercession.
