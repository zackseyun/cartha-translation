id: JER.7.32
reference: Jeremiah 7:32
source:
  edition: WLC
  text: לָ/כֵ֞ן הִנֵּֽה יָמִ֤ים בָּאִים֙ נְאֻם יְהוָ֔ה וְ/לֹא יֵאָמֵ֨ר ע֤וֹד הַ/תֹּ֨פֶת֙
    וְ/גֵ֣יא בֶן הִנֹּ֔ם כִּ֖י אִם גֵּ֣יא הַ/הֲרֵגָ֑ה וְ/קָבְר֥וּ בְ/תֹ֖פֶת מֵ/אֵ֥ין
    מָקֽוֹם־־־־־׃
translation:
  text: Therefore, look, days are coming, declares the LORD, when it will no longer
    be called Topheth and the Valley of Ben-hinnom, but the Valley of Slaughter; and
    they will bury in Topheth because there is no place left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Valley of the Son of Hinnom.' The Hebrew name may be translated
      more literally, but 'Ben-hinnom' preserves the place-name form.
    reason: lexical_alternative
  - marker: b
    text: Or 'for lack of space.' The Hebrew literally indicates an absence of place
      for burial.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks the verse as a consequence of the preceding indictment and judgment;
    'Therefore' preserves the inferential force in natural English.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Retains the deictic, attention-calling force without archaic 'behold.'
    Combined with the following clause as 'look, days are coming' to preserve prophetic
    immediacy.
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are on the way
  lexicon: HALOT
  rationale: Standard prophetic idiom announcing an impending future event. Omission
    of the article in English is idiomatic while preserving the Hebrew sense.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A conventional prophetic formula. 'Declares the LORD' is readable modern
    English and preserves the solemn oracular force. 'the LORD' follows the project's
    default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: וְלֹא יֵאָמֵר עוֹד
  chosen: it will no longer be called
  alternatives:
  - it will no more be said
  - people will no longer call it
  lexicon: HALOT
  rationale: The Niphal imperfect of אמר is naturally rendered as a passive in English.
    'Called' fits the naming context better than the more wooden 'said.'
- source_word: הַתֹּפֶת
  chosen: Topheth
  alternatives:
  - Tophet
  lexicon: HALOT
  rationale: A place name, so transliteration is preferred. 'Topheth' reflects a common
    scholarly/English form close to the Hebrew vocalization.
- source_word: גֵיא בֶן הִנֹּם
  chosen: the Valley of Ben-hinnom
  alternatives:
  - the Valley of the Son of Hinnom
  - the Valley of Hinnom
  lexicon: HALOT
  rationale: Preserves the Hebrew proper-name structure with transliteration rather
    than interpretive expansion. 'Ben-hinnom' keeps the toponymic form that later
    underlies Gehenna traditions.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - but rather
  - except that
  lexicon: HALOT
  rationale: In this contrastive renaming formula, 'but' communicates the adversative
    force succinctly and idiomatically.
- source_word: גֵיא הַהֲרֵגָה
  chosen: the Valley of Slaughter
  alternatives:
  - the Valley of Killing
  - the Valley of the Slaughter
  lexicon: HALOT
  rationale: A formal place-name renaming. 'Slaughter' best conveys mass killing and
    matches prophetic judgment diction in English.
- source_word: וְקָבְרוּ
  chosen: and they will bury
  alternatives:
  - and people will bury
  - and they shall bury
  lexicon: HALOT
  rationale: The Hebrew has an indefinite 3rd person plural; English commonly uses
    'they' for such impersonal agency.
- source_word: בְּתֹפֶת
  chosen: in Topheth
  alternatives:
  - at Topheth
  lexicon: HALOT
  rationale: The preposition ב is most straightforwardly rendered 'in' here, referring
    to burial within that location.
- source_word: מֵאֵין מָקוֹם
  chosen: because there is no place left
  alternatives:
  - for lack of space
  - because there is no room
  lexicon: HALOT
  rationale: Expresses the causal sense of burial there due to absence of available
    space. 'No place left' is clear modern English and captures the grim overcrowding
    implied.
