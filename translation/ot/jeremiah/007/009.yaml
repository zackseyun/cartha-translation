theological_decisions:
- issue: Nature of 'knowing' other gods
  chosen_reading: that you have not known
  alternative_readings:
  - whom you have not acknowledged
  - which you have not known before
  rationale: ידע here likely carries more than bare cognition; in covenantal contexts
    it can imply recognition, relationship, or experiential acquaintance. The main
    text keeps the broader and more literal 'known' rather than narrowing to 'acknowledged,'
    preserving the prophetic irony without importing a more specific theological interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
