id: JER.7.9
reference: Jeremiah 7:9
source:
  edition: WLC
  text: הֲ/גָנֹ֤ב רָצֹ֨חַ֙ וְֽ/נָאֹ֔ף וְ/הִשָּׁבֵ֥עַ לַ/שֶּׁ֖קֶר וְ/קַטֵּ֣ר לַ/בָּ֑עַל
    וְ/הָלֹ֗ךְ אַחֲרֵ֛י אֱלֹהִ֥ים אֲחֵרִ֖ים אֲשֶׁ֥ר לֹֽא יְדַעְתֶּֽם׀־׃
translation:
  text: Will you steal, murder, commit adultery, swear falsely, burn incense to Baal,
    and go after other gods that you have not known—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'follow other gods.'
    reason: lexical_alternative
  - marker: b
    text: The clause 'that you have not known' may also be rendered 'whom you have
      not known' or, interpretively, 'whom you have not acknowledged.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/גָנֹב
  chosen: Will you steal
  alternatives:
  - Do you steal
  lexicon: HALOT
  rationale: The interrogative הֲ with the infinitive/verb sequence introduces a rhetorical
    question. 'Will you steal' fits the prophetic rebuke in context and carries the
    forward-driving force into the list of offenses.
- source_word: רָצֹחַ
  chosen: murder
  alternatives:
  - kill
  lexicon: HALOT
  rationale: רצח commonly denotes unlawful killing rather than killing in general.
    'Murder' best preserves the moral and legal force of the accusation.
- source_word: וְנָאֹף
  chosen: commit adultery
  alternatives:
  - be adulterous
  lexicon: HALOT
  rationale: The verb נאף is the standard term for adultery. 'Commit adultery' is
    idiomatic modern English and accurately specific.
- source_word: וְהִשָּׁבֵעַ לַשֶּׁקֶר
  chosen: swear falsely
  alternatives:
  - swear to a lie
  - swear deceitfully
  lexicon: HALOT
  rationale: The idiom means taking an oath falsely or in support of falsehood. 'Swear
    falsely' is concise, natural, and preserves the legal-ethical sense.
- source_word: וְקַטֵּר לַבָּעַל
  chosen: burn incense to Baal
  alternatives:
  - make offerings of incense to Baal
  lexicon: HALOT
  rationale: קטר in cultic contexts refers to burning incense or making smoke offerings.
    'Burn incense' is the most direct and recognizable rendering here.
- source_word: לַבָּעַל
  chosen: Baal
  alternatives:
  - the Baal
  lexicon: HALOT
  rationale: As a proper divine name/title in this context, 'Baal' is the standard
    English transliteration. The article is absorbed in idiomatic English.
- source_word: וְהָלֹךְ אַחֲרֵי
  chosen: go after
  alternatives:
  - follow
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'walk/go after' and often denotes allegiance
    or pursuit. 'Go after' preserves the metaphor while remaining natural English.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The phrase straightforwardly means 'other gods.' 'Foreign gods' is interpretive
    and less direct.
- source_word: אֲשֶׁר לֹא יְדַעְתֶּם
  chosen: that you have not known
  alternatives:
  - whom you have not known
  - that you did not know
  lexicon: HALOT
  rationale: The relative clause modifies 'other gods.' Because the antecedent is
    personal/divine, 'whom' is possible, but 'that' keeps the English smooth without
    denying personhood. The perfect is rendered 'have not known' to reflect prior
    lack of covenantal relationship/recognition.
