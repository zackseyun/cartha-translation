id: JER.7.15
reference: Jeremiah 7:15
source:
  edition: WLC
  text: וְ/הִשְׁלַכְתִּ֥י אֶתְ/כֶ֖ם מֵ/עַ֣ל פָּנָ֑/י כַּ/אֲשֶׁ֤ר הִשְׁלַ֨כְתִּי֙ אֶת
    כָּל אֲחֵי/כֶ֔ם אֵ֖ת כָּל זֶ֥רַע אֶפְרָֽיִם־־־׃ס
translation:
  text: And I will cast you out of my sight, just as I cast out all your brothers,
    all the offspring of Ephraim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from before me' or 'away from my presence.' Literally, 'from upon my
      face.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here refers to Judah''s fellow Israelites, especially those
      of the northern kingdom.'
    reason: cultural_note
  - marker: c
    text: Ephraim here stands for the northern kingdom of Israel.
    reason: cross_reference
lexical_decisions:
- source_word: וְהִשְׁלַכְתִּי
  chosen: And I will cast
  alternatives:
  - And I will throw
  - And I will drive out
  lexicon: HALOT
  rationale: The verb שׁלך in the Hiphil here conveys forceful expulsion/rejection.
    'Cast' preserves the metaphor and judicial force better than the more interpretive
    'drive out,' while remaining natural English.
- source_word: אֶתְכֶם
  chosen: you
  rationale: Direct-object pronoun, second person masculine plural, naturally rendered
    'you' in English.
- source_word: מֵעַל פָּנַי
  chosen: out of my sight
  alternatives:
  - from before me
  - away from my presence
  lexicon: HALOT
  rationale: Literally 'from upon my face.' In this judgment context, the idiom means
    removal from before Yahweh/God. 'Out of my sight' is idiomatic, clear, and preserves
    the relational/judicial sense without over-paraphrase. 'Away from my presence'
    is possible but slightly more interpretive and liturgically loaded.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - like
  rationale: Introduces comparison between the coming judgment on Judah and the prior
    judgment on Ephraim/Israel. 'Just as' clearly marks the analogy.
- source_word: הִשְׁלַכְתִּי
  chosen: I cast out
  alternatives:
  - I cast
  - I drove out
  lexicon: HALOT
  rationale: Repeated verb from earlier in the verse. 'Cast out' slightly clarifies
    the expulsive force in the retrospective clause and reads naturally with the object
    that follows.
- source_word: כָּל אֲחֵיכֶם
  chosen: all your brothers
  alternatives:
  - all your kindred
  - all your kinsmen
  - all your relatives
  lexicon: HALOT
  rationale: אָח often means literal or covenantal/ethnic 'brother(s).' Here it refers
    to fellow Israelites, specifically the northern kingdom. 'Brothers' preserves
    the familial metaphor and matches the Hebrew form. Broader alternatives are possible
    but flatten the rhetoric.
- source_word: אֵת כָּל זֶרַע אֶפְרָיִם
  chosen: all the offspring of Ephraim
  alternatives:
  - all the seed of Ephraim
  - the whole offspring of Ephraim
  lexicon: HALOT
  rationale: זֶרַע can mean 'seed,' 'offspring,' or 'descendants.' 'Offspring' communicates
    collective descendants in natural modern English. 'Ephraim' here stands metonymically
    for the northern kingdom/tribes, but the translation keeps the proper name rather
    than interpreting it in the main text.
