theological_decisions:
- issue: Rendering the divine-rejection idiom מֵעַל פָּנַי
  chosen_reading: out of my sight
  alternative_readings:
  - from before me
  - away from my presence
  rationale: The phrase literally refers to removal from before God's face. In context
    it expresses covenant judgment and expulsion. 'Out of my sight' preserves the
    force of rejection in idiomatic English without importing a developed theology
    of divine omnipresence or exile beyond what the text states.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering אֲחֵיכֶם in a gender-accurate way
  chosen_reading: brothers
  alternative_readings:
  - kindred
  - relatives
  rationale: The Hebrew is grammatically masculine plural and functions as a kinship
    term for fellow Israelites. Per the gender-accurate policy, 'brothers' is retained
    rather than neutralizing the term in the main text; a footnote can clarify the
    broader referent if needed.
  doctrine_reference: Translation philosophy §4
- issue: Interpreting Ephraim
  chosen_reading: Ephraim retained as a proper name
  alternative_readings:
  - the northern kingdom
  - Israel
  rationale: The Hebrew names Ephraim directly. Although it refers corporately to
    the northern kingdom and its people, the translation follows original-language
    primacy by preserving the name in the main text and explaining the metonymy in
    a footnote.
  doctrine_reference: Translation philosophy §1, §2, §5
