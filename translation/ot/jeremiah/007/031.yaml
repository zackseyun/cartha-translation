theological_decisions:
- issue: Divine disavowal of child sacrifice
  chosen_reading: The verse states that this practice was not commanded by God and
    was wholly contrary to his will, without implying ignorance or lack of foreknowledge.
  alternative_readings:
  - The idiom could be over-dynamically rendered 'it never entered my mind,' which
    in English may suggest cognitive limitation.
  rationale: The Hebrew idiom וְלֹא עָלְתָה עַל־לִבִּי expresses strong repudiation.
    Rendering it more literally as 'nor did it come up upon my heart' preserves the
    anthropomorphic idiom and avoids importing a theological claim about divine knowledge
    that the text itself is not making.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
