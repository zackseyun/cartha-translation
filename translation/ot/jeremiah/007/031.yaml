id: JER.7.31
reference: Jeremiah 7:31
source:
  edition: WLC
  text: וּ/בָנ֞וּ בָּמ֣וֹת הַ/תֹּ֗פֶת אֲשֶׁר֙ בְּ/גֵ֣יא בֶן הִנֹּ֔ם לִ/שְׂרֹ֛ף אֶת
    בְּנֵי/הֶ֥ם וְ/אֶת בְּנֹתֵי/הֶ֖ם בָּ/אֵ֑שׁ אֲשֶׁר֙ לֹ֣א צִוִּ֔יתִי וְ/לֹ֥א עָלְתָ֖ה
    עַל לִבִּֽ/י־־־־׃ס
translation:
  text: They have built the high places of Topheth, which is in the Valley of Ben-hinnom,
    to burn their sons and their daughters in the fire—something I did not command,
    nor did it come up upon my heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more dynamically, 'nor did it enter my mind.' The Hebrew literally says,
      'nor did it come up upon my heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָנוּ
  chosen: They have built
  alternatives:
  - And they built
  - They built
  lexicon: HALOT
  rationale: Qal perfect 3cp of בנה. In prophetic discourse the perfect can describe
    a present state resulting from past action; 'have built' captures the completed
    action with present relevance. 'And they built' is possible more formally, but
    English reads more naturally without initial 'and' here.
- source_word: בָּמוֹת
  chosen: the high places
  alternatives:
  - shrines
  - cultic heights
  lexicon: HALOT
  rationale: Standard rendering for בָּמוֹת, referring to elevated cult sites or sanctuaries.
    'High places' preserves the established cultic sense without over-paraphrase.
- source_word: הַתֹּפֶת
  chosen: Topheth
  alternatives:
  - the Topheth
  lexicon: HALOT
  rationale: Proper place name/designation, so transliterated per translation philosophy
    ('translate titles; transliterate names'). Retaining the article in English is
    unnecessary and awkward.
- source_word: בְּגֵיא בֶן־הִנֹּם
  chosen: in the Valley of Ben-hinnom
  alternatives:
  - in the valley of the son of Hinnom
  - in Ben-hinnom Valley
  lexicon: HALOT
  rationale: Proper geographic name. 'Ben-hinnom' is transliterated rather than translated
    literally as 'son of Hinnom' to preserve name function while 'Valley of' translates
    גֵיא.
- source_word: לִשְׂרֹף
  chosen: to burn
  alternatives:
  - for burning
  lexicon: HALOT
  rationale: Infinitive construct with ל expressing purpose. 'To burn' is the most
    direct English equivalent.
- source_word: אֶת־בְּנֵיהֶם וְאֶת־בְּנֹתֵיהֶם
  chosen: their sons and their daughters
  alternatives:
  - their children
  lexicon: HALOT
  rationale: The Hebrew explicitly distinguishes sons and daughters; the translation
    preserves that specificity rather than collapsing to the generic 'children'.
- source_word: בָּאֵשׁ
  chosen: in the fire
  alternatives:
  - with fire
  lexicon: HALOT
  rationale: The preposition ב here is best rendered locatively/instrumentally as
    'in the fire,' the conventional and natural English expression for this sacrificial
    burning context.
- source_word: אֲשֶׁר לֹא צִוִּיתִי
  chosen: something I did not command
  alternatives:
  - which I did not command
  lexicon: HALOT
  rationale: The relative clause refers back to the child-burning practice just described.
    'Something I did not command' makes the referent explicit in idiomatic English
    while remaining faithful to the syntax.
- source_word: וְלֹא עָלְתָה עַל־לִבִּי
  chosen: nor did it come up upon my heart
  alternatives:
  - nor did it enter my mind
  - nor did it arise in my heart
  lexicon: HALOT
  rationale: The idiom literally speaks of something not coming up upon the heart.
    'Come up upon my heart' preserves the Hebrew imagery more closely than the common
    dynamic rendering 'enter my mind,' while remaining intelligible in English.
