theological_decisions:
- issue: Rendering of divine presence language in שִׁכַּנְתִּי שְׁמִי שָׁם
  chosen_reading: where I made my name dwell
  alternative_readings:
  - where I set my name
  - where I caused my name to dwell
  rationale: The verse speaks of God's covenantal association of his name with Shiloh,
    not a crude localization of the divine essence. 'Made my name dwell' preserves
    the Hebrew imagery of indwelling while remaining readable and theologically careful.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Temporal sense of Shiloh clause
  chosen_reading: that was in Shiloh
  alternative_readings:
  - that is in Shiloh
  rationale: The historical argument points to Shiloh as a former sanctuary whose
    fate Jerusalem should consider. Using past tense in English clarifies the discourse
    without adding doctrine beyond the context.
  doctrine_reference: Translation philosophy §§1, 6
