id: JER.7.12
reference: Jeremiah 7:12
source:
  edition: WLC
  text: כִּ֣י לְכוּ נָ֗א אֶל מְקוֹמִ/י֙ אֲשֶׁ֣ר בְּ/שִׁיל֔וֹ אֲשֶׁ֨ר שִׁכַּ֧נְתִּֽי
    שְׁמִ֛/י שָׁ֖ם בָּ/רִֽאשׁוֹנָ֑ה וּ/רְאוּ֙ אֵ֣ת אֲשֶׁר עָשִׂ֣יתִי ל֔/וֹ מִ/פְּנֵ֕י
    רָעַ֖ת עַמִּ֥/י יִשְׂרָאֵֽל־־־׃
translation:
  text: For go now to my place that was in Shiloh, where I made my name dwell at first,
    and see what I did to it because of the evil of my people Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where I caused my name to dwell' or more traditionally 'where I set
      my name.' The Hebrew preserves the imagery of God's name dwelling there.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - But
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding warning; 'For'
    best preserves the causal force in context.
- source_word: לְכוּ נָא
  chosen: go now
  alternatives:
  - please go
  - go, please
  lexicon: HALOT
  rationale: Imperative plural with particle נָא gives an urgent exhortation rather
    than politeness in English; 'go now' is natural and forceful.
- source_word: מְקוֹמִי
  chosen: my place
  alternatives:
  - my site
  - the place belonging to me
  lexicon: HALOT
  rationale: The noun denotes a place associated with God; 'my place' is the most
    direct and idiomatic rendering here.
- source_word: אֲשֶׁר בְּשִׁלוֹ
  chosen: that was in Shiloh
  alternatives:
  - which is in Shiloh
  - that is at Shiloh
  lexicon: HALOT
  rationale: The relative clause identifies the former sanctuary location. Past sense
    is contextually appropriate because Shiloh serves as a historical example of judgment.
- source_word: שִׁכַּנְתִּי שְׁמִי שָׁם
  chosen: where I made my name dwell
  alternatives:
  - where I caused my name to dwell
  - where I set my name
  lexicon: HALOT
  rationale: The piel of שכן with 'my name' reflects God's placing his name there
    in covenantal presence. 'Made my name dwell' preserves the verbal imagery better
    than the flatter traditional 'set my name'.
- source_word: בָּרִאשׁוֹנָה
  chosen: at first
  alternatives:
  - formerly
  - in the beginning
  lexicon: HALOT
  rationale: Marks Shiloh as the earlier chosen sanctuary. 'At first' is concise and
    natural in modern English.
- source_word: וּרְאוּ
  chosen: and see
  alternatives:
  - and look
  - then see
  lexicon: HALOT
  rationale: Straightforward imperative continuation; 'see' fits the summons to consider
    historical evidence.
- source_word: אֵת אֲשֶׁר עָשִׂיתִי לוֹ
  chosen: what I did to it
  alternatives:
  - what I did to him
  - what I did there
  lexicon: HALOT
  rationale: The pronominal suffix most naturally refers to 'my place' / Shiloh as
    a location-sanctuary, so English neuter 'it' is appropriate.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - on account of
  - due to
  lexicon: HALOT
  rationale: Causal expression indicating the reason for judgment.
- source_word: רָעַת עַמִּי יִשְׂרָאֵל
  chosen: the evil of my people Israel
  alternatives:
  - the wickedness of my people Israel
  - the calamity of my people Israel
  lexicon: HALOT
  rationale: Here רָעָה denotes moral evil/wickedness rather than disaster, since
    it is the cause of God's action against Shiloh. 'Evil' is direct and preserves
    the moral charge.
