id: JER.48.19
reference: Jeremiah 48:19
source:
  edition: WLC
  text: אֶל דֶּ֛רֶךְ עִמְדִ֥י וְ/צַפִּ֖י יוֹשֶׁ֣בֶת עֲרוֹעֵ֑ר שַׁאֲלִי נָ֣ס וְ/נִמְלָ֔טָה
    אִמְרִ֖י מַה נִּֽהְיָֽתָה־־־׃
translation:
  text: Stand by the road and watch, inhabitant of Aroer; ask the man who flees and
    the woman who escapes, “What has happened?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew distinguishes gender in the fugitives addressed: literally, ''ask
      the man who flees and the woman who escapes.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל דֶּרֶךְ
  chosen: by the road
  alternatives:
  - on the road
  - at the road
  lexicon: HALOT
  rationale: The preposition אֶל with דֶּרֶךְ here functions idiomatically in an imperative
    scene of taking position near a route of flight. 'By the road' is natural English
    and fits the command to stand and watch for fugitives.
- source_word: עִמְדִי
  chosen: Stand
  alternatives:
  - Take your stand
  - Stand still
  lexicon: HALOT
  rationale: Qal imperative feminine singular from עמד, addressed to a feminine singular
    addressee. 'Stand' is the straightforward imperative; the positional nuance is
    complemented by 'by the road'.
- source_word: וְצַפִּי
  chosen: and watch
  alternatives:
  - and keep watch
  - and look out
  lexicon: HALOT
  rationale: Imperative from צפה in the sense of watching or keeping lookout. 'Watch'
    is concise and idiomatic in parallel with 'Stand.'
- source_word: יוֹשֶׁבֶת עֲרוֹעֵר
  chosen: inhabitant of Aroer
  alternatives:
  - O inhabitant of Aroer
  - daughter dwelling in Aroer
  - you who dwell in Aroer
  lexicon: HALOT
  rationale: The feminine singular participle 'dwelling' addresses the city personified
    or its population represented as a feminine singular inhabitant. 'Inhabitant of
    Aroer' is idiomatic and preserves the direct address without over-paraphrasing.
- source_word: שַׁאֲלִי
  chosen: ask
  alternatives:
  - inquire of
  lexicon: HALOT
  rationale: Simple imperative feminine singular. 'Ask' is the plain sense.
- source_word: נָס
  chosen: the man who flees
  alternatives:
  - the fugitive
  - him who flees
  lexicon: HALOT
  rationale: Masculine singular participle from נוס, 'flee.' Because it is paired
    with a feminine singular form next, rendering the gender distinction explicitly
    as 'the man who flees' best reflects the Hebrew.
- source_word: וְנִמְלָטָה
  chosen: and the woman who escapes
  alternatives:
  - and the escaped woman
  - and her who has escaped
  lexicon: HALOT
  rationale: Niphal participle feminine singular from מלט, paired with the masculine
    participle before it. Rendering it as 'the woman who escapes' preserves the gendered
    pairing and the ongoing/resultative sense.
- source_word: אִמְרִי
  chosen: What has happened?
  alternatives:
  - say
  - and say
  lexicon: HALOT
  rationale: The imperative 'say' introduces the quoted question. In English, folding
    it into direct discourse as 'ask ... “What has happened?”' is smoother while preserving
    the force of the command.
- source_word: מַה נִּהְיָתָה
  chosen: What has happened?
  alternatives:
  - What has come to pass?
  - What has taken place?
  lexicon: HALOT
  rationale: Interrogative plus perfect of היה asking what event has occurred. 'What
    has happened?' is natural modern English and adequately formal.
