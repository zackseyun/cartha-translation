id: JER.48.36
reference: Jeremiah 48:36
source:
  edition: WLC
  text: עַל כֵּ֞ן לִבִּ֤/י לְ/מוֹאָב֙ כַּ/חֲלִלִ֣ים יֶהֱמֶ֔ה וְ/לִבִּ/י֙ אֶל אַנְשֵׁ֣י
    קִֽיר חֶ֔רֶשׂ כַּ/חֲלִילִ֖ים יֶהֱמֶ֑ה עַל כֵּ֛ן יִתְרַ֥ת עָשָׂ֖ה אָבָֽדוּ־־־־׃
translation:
  text: Therefore my heart moans for Moab like flutes, and my heart moans like flutes
    for the men of Kir-heres, because the abundance he made has perished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “like pipes.” The Hebrew term refers to a wind instrument used especially
      in mourning contexts.
    reason: lexical_alternative
  - marker: b
    text: Kir-heres is traditionally rendered “Kir-hareseth” or “Kir-hereseth.”
    reason: alternative_reading
  - marker: c
    text: Or “because the wealth he acquired has perished.” The Hebrew expression
      may refer to what Moab had made, produced, or amassed.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבִּי
  chosen: my heart
  alternatives:
  - my inner being
  lexicon: HALOT
  rationale: לֵב/לֵבָב commonly denotes the heart as the seat of emotion and inner
    response. In this lament context, 'my heart' is the most natural and transparent
    English rendering.
- source_word: לְמוֹאָב
  chosen: for Moab
  alternatives:
  - over Moab
  - toward Moab
  lexicon: HALOT
  rationale: The preposition ל here marks the object/target of lament. 'For Moab'
    conveys sympathetic mourning more idiomatically than a wooden 'to Moab.'
- source_word: כַּחֲלִלִים
  chosen: like flutes
  alternatives:
  - like pipes
  lexicon: HALOT
  rationale: חָלִיל refers to a pipe or flute, an instrument associated with mournful
    sound in lament settings. 'Flutes' is clear modern English and preserves the simile.
- source_word: יֶהֱמֶה
  chosen: moans
  alternatives:
  - sounds
  - murmurs
  - groans
  lexicon: HALOT
  rationale: The verb הָמָה denotes making a low, resonant, agitated sound. In a funeral-lament
    comparison with flutes, 'moans' best captures the mournful emotional force.
- source_word: אֶל אַנְשֵׁי קִיר חֶרֶשׂ
  chosen: for the men of Kir-heres
  alternatives:
  - toward the men of Kir-heres
  - for the people of Kir-heres
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of,' and the phrase identifies the inhabitants
    of the Moabite city. 'Men of Kir-heres' preserves the Hebrew form without unnecessary
    expansion.
- source_word: קִיר חֶרֶשׂ
  chosen: Kir-heres
  alternatives:
  - Kir-hareseth
  - Kir-hereseth
  lexicon: HALOT
  rationale: This is a place name and should be transliterated. 'Kir-heres' follows
    the consonantal form of the MT here more directly, while traditional English forms
    are preserved in a footnote.
- source_word: יִתְרַת
  chosen: the abundance
  alternatives:
  - the wealth
  - the surplus
  - what was left over
  lexicon: HALOT
  rationale: יִתְרָה denotes abundance, surplus, or wealth. In context of Moab's losses,
    'the abundance' captures the idea of accumulated goods/resources without over-specifying.
- source_word: עָשָׂה
  chosen: he made
  alternatives:
  - he acquired
  - he produced
  lexicon: HALOT
  rationale: The verb עשה is broadly 'do/make.' Here it likely refers to what Moab
    had amassed or produced. 'He made' stays close to the Hebrew while remaining intelligible
    in English.
- source_word: אָבָדוּ
  chosen: has perished
  alternatives:
  - is lost
  - has been destroyed
  lexicon: HALOT
  rationale: אָבַד expresses perishing or being lost. Rendering the collective sense
    with singular English ('the abundance ... has perished') is idiomatic because
    the subject is treated as a mass noun.
