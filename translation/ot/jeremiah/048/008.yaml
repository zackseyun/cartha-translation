id: JER.48.8
reference: Jeremiah 48:8
source:
  edition: WLC
  text: וְ/יָבֹ֨א שֹׁדֵ֜ד אֶל כָּל עִ֗יר וְ/עִיר֙ לֹ֣א תִמָּלֵ֔ט וְ/אָבַ֥ד הָ/עֵ֖מֶק
    וְ/נִשְׁמַ֣ד הַ/מִּישֹׁ֑ר אֲשֶׁ֖ר אָמַ֥ר יְהוָֽה־־׃
translation:
  text: And the destroyer will come against every city, and no city will escape; the
    valley will perish, and the plateau will be destroyed, as the LORD has said.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the plain' or 'the tableland' for 'the plateau.' The Hebrew term refers
      to level land and in Moab may denote the elevated tableland region.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁדֵד
  chosen: the destroyer
  alternatives:
  - the plunderer
  - the devastator
  - the spoiler
  lexicon: HALOT
  rationale: The participial noun denotes one who devastates or plunders. 'Destroyer'
    is natural modern English and fits the judgment context better than the archaic
    'spoiler.'
- source_word: וְיָבֹא
  chosen: will come
  alternatives:
  - comes
  - shall come
  lexicon: HALOT
  rationale: A prefixed imperfect in prophetic discourse is well rendered as future
    in English. 'Will come' preserves the predictive force without archaism.
- source_word: אֶל כָּל עִיר
  chosen: against every city
  alternatives:
  - to every city
  - upon every city
  lexicon: HALOT
  rationale: Although אֶל is literally 'to,' with an invading destroyer the sense
    is hostile movement toward/against. 'Against every city' communicates the military
    threat clearly.
- source_word: וְעִיר לֹא תִמָּלֵט
  chosen: and no city will escape
  alternatives:
  - and a city will not escape
  - and not one city will get away
  lexicon: HALOT
  rationale: The singular noun after a distributive statement has a collective force.
    'No city will escape' is idiomatic English and preserves the totality of the judgment.
- source_word: הָעֵמֶק
  chosen: the valley
  alternatives:
  - the valleyland
  - the lowland valley
  lexicon: HALOT
  rationale: עֵמֶק commonly denotes a valley. The article likely points to the valley
    region of Moab; 'the valley' is sufficiently literal and readable.
- source_word: וְאָבַד
  chosen: will perish
  alternatives:
  - will be lost
  - will vanish
  lexicon: HALOT
  rationale: The verb אבד here expresses ruin or perishing of the region. 'Will perish'
    matches prophetic judgment diction better than weaker alternatives.
- source_word: הַמִּישֹׁר
  chosen: the plateau
  alternatives:
  - the plain
  - the tableland
  - the level land
  lexicon: HALOT
  rationale: מִישׁוֹר can mean level land/plain, and in Moabite geography often refers
    to the elevated tableland. 'Plateau' best distinguishes it from the valley and
    reflects the regional topography.
- source_word: וְנִשְׁמַד
  chosen: will be destroyed
  alternatives:
  - will be annihilated
  - will be wiped out
  lexicon: HALOT
  rationale: The Niphal of שׁמד denotes being destroyed or exterminated. 'Will be
    destroyed' is accurate and avoids overstating beyond the immediate context.
- source_word: אֲשֶׁר אָמַר יְהוָה
  chosen: as the LORD has said
  alternatives:
  - for the LORD has spoken
  - which the LORD said
  lexicon: HALOT
  rationale: This clause grounds the prophecy in divine declaration. 'As the LORD
    has said' is a natural rendering of the relative clause and preserves the authority
    formula. YHWH is rendered 'the LORD' per doctrine guidelines.
