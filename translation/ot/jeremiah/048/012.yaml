id: JER.48.12
reference: Jeremiah 48:12
source:
  edition: WLC
  text: לָ/כֵ֞ן הִנֵּ֖ה יָמִ֤ים בָּאִים֙ נְאֻם יְהוָ֔ה וְ/שִׁלַּחְתִּי ל֥/וֹ צֹעִ֖ים
    וְ/צֵעֻ֑/הוּ וְ/כֵלָ֣י/ו יָרִ֔יקוּ וְ/נִבְלֵי/הֶ֖ם יְנַפֵּֽצוּ־־־׃
translation:
  text: Therefore, behold, days are coming, declares the LORD, when I will send to
    him pourers, and they will pour him out; they will empty his vessels and smash
    their jars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tilters' / 'decanters'; the Hebrew term is rare. The context of pouring,
      emptying vessels, and smashing containers supports the sense of those who pour
      out wine.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will make him wander.' The Hebrew verb can be understood differently,
      but the surrounding wine-vessel imagery favors 'pour him out.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'their jars.' Some interpreters expect 'his jars' by sense, referring
      to Moab; the received text reads 'their.'
    reason: textual_variant
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Standard inferential particle linking this judgment to the preceding
    description of Moab's complacency.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - indeed
  lexicon: HALOT
  rationale: Retained as an attention-getting discourse marker; 'behold' preserves
    prophetic force without paraphrase.
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  lexicon: HALOT
  rationale: Common prophetic formula announcing imminent future action; rendered
    idiomatically but closely.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic speech formula. 'Declares' is natural modern English
    and preserves solemnity.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: וְשִׁלַּחְתִּי לוֹ
  chosen: I will send to him
  alternatives:
  - I will send against him
  - I will send him
  lexicon: HALOT
  rationale: The lamed with pronominal suffix most naturally marks direction toward
    Moab. In context the action is hostile, but 'to him' keeps the Hebrew form while
    allowing the following clause to convey the destructive effect.
- source_word: צֹעִים
  chosen: pourers
  alternatives:
  - tilters
  - decanting men
  - wanderers
  lexicon: HALOT
  rationale: The term is difficult, but in context with 'they will pour him out,'
    'empty his vessels,' and 'smash jars,' it most likely refers metaphorically to
    those who pour out wine from vessel to vessel. This preserves the imagery from
    the previous verse.
- source_word: וְצֵעֻהוּ
  chosen: they will pour him out
  alternatives:
  - they will tip him over
  - they will make him wander
  lexicon: HALOT
  rationale: 'Context strongly favors a verb of pouring/decanting rather than wandering:
    Moab has been compared to wine left undisturbed on its dregs, and the following
    clauses continue vessel imagery.'
- source_word: וְכֵלָיו יָרִיקוּ
  chosen: they will empty his vessels
  alternatives:
  - they will drain his containers
  lexicon: HALOT
  rationale: Hiphil of ריק means to empty out. 'Vessels' fits the wine-storage metaphor
    and is standard English.
- source_word: וְנִבְלֵיהֶם יְנַפֵּצוּ
  chosen: and smash their jars
  alternatives:
  - and shatter their wine-jars
  - and break their skins
  lexicon: HALOT
  rationale: נבל can denote a skin-bottle or jar/container depending on context. Because
    the preceding noun is 'vessels' and the imagery is of storage containers being
    destroyed, 'jars' is a clear modern rendering. The suffix is 3mp ('their'); it
    likely refers to the agents' associated containers or functions collectively within
    the image, so it is preserved rather than harmonized to 'his'.
