id: JER.48.31
reference: Jeremiah 48:31
source:
  edition: WLC
  text: עַל כֵּן֙ עַל מוֹאָ֣ב אֲיֵלִ֔יל וּ/לְ/מוֹאָ֥ב כֻּלֹּ֖/ה אֶזְעָ֑ק אֶל אַנְשֵׁ֥י
    קִֽיר חֶ֖רֶשׂ יֶהְגֶּֽה־־־־׃
translation:
  text: Therefore I will wail over Moab, and I will cry out for all Moab; for the
    men of Kir-heres one moans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the men of Kir-hareseth.' The Hebrew place name here is rendered as
      Kir-heres, while a related fuller form appears in parallel contexts.
    reason: alternative_reading
  - marker: b
    text: The final clause is difficult. It may also be understood, 'for the men of
      Kir-heres I moan' or 'he moans for the men of Kir-heres.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲיֵלִיל
  chosen: I will wail
  alternatives:
  - I howl
  - I lament
  lexicon: HALOT
  rationale: The Hiphil of ילל denotes loud lamentation or wailing. 'Wail' is natural
    modern English and preserves the intensity better than the more archaic 'howl,'
    while remaining closer to the source than a softer 'lament.'
- source_word: אֶזְעָק
  chosen: I will cry out
  alternatives:
  - I cry aloud
  - I will shout
  lexicon: HALOT
  rationale: זעק commonly conveys a loud cry, often in distress. 'Cry out' fits the
    mourning context and pairs well with 'wail' without collapsing the two verbs into
    one English expression.
- source_word: כֻּלֹּה
  chosen: all
  alternatives:
  - the whole of it
  - entire
  lexicon: HALOT
  rationale: With לְמוֹאָב, the phrase means 'for all Moab' or 'for the whole of Moab.'
    'All Moab' is idiomatic English and preserves the collective sense.
- source_word: אֶל
  chosen: for
  alternatives:
  - to
  - over
  - concerning
  lexicon: HALOT
  rationale: Although אֶל normally means 'to,' in this lament context before 'the
    men of Kir-heres' it functions idiomatically with the following verb to indicate
    the object or occasion of mourning. Rendering it as 'for' yields coherent English
    while preserving the sense of lament directed toward them.
- source_word: אַנְשֵׁי קִיר חֶרֶשׂ
  chosen: the men of Kir-heres
  alternatives:
  - the people of Kir-heres
  - the men of Kir-hareseth
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' Per the project's gender-accurate policy,
    'men' is retained rather than neutralizing to 'people.' The place name is transliterated
    from the Hebrew here as 'Kir-heres'; the more familiar 'Kir-hareseth' reflects
    a related form in parallel passages and tradition.
- source_word: יֶהְגֶּה
  chosen: one moans
  alternatives:
  - he moans
  - one murmurs
  - it laments
  lexicon: HALOT
  rationale: הגה can denote low utterance, murmuring, or moaning. In this dirge context,
    'moans' best fits. The subject is syntactically difficult; an impersonal English
    'one moans' preserves the Hebrew's terseness without over-specifying the referent.
