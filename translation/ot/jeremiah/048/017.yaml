id: JER.48.17
reference: Jeremiah 48:17
source:
  edition: WLC
  text: נֻ֤דוּ ל/וֹ֙ כָּל סְבִיבָ֔י/ו וְ/כֹ֖ל יֹדְעֵ֣י שְׁמ֑/וֹ אִמְר֗וּ אֵיכָ֤ה נִשְׁבַּר֙
    מַטֵּה עֹ֔ז מַקֵּ֖ל תִּפְאָרָֽה־־׃
translation:
  text: 'Mourn for him, all you around him, and all who know his name, say: “How the
    mighty scepter is broken, the staff of splendor!”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Shake your heads over him' / 'Lament for him'; the Hebrew verb can denote
      mourning, often with a physical gesture.
    reason: lexical_alternative
  - marker: b
    text: '''Know his name'' may also imply ''know his fame'' or reputation.'
    reason: lexical_alternative
  - marker: c
    text: Both 'scepter' and 'staff/rod' are possible for the Hebrew terms; the imagery
      likely conveys Moab's power and honor now broken.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֻדוּ
  chosen: Mourn
  alternatives:
  - Shake your heads
  - Lament
  - Bemoan
  lexicon: HALOT
  rationale: The verb נוד in the imperative can denote sympathetic mourning or lamentation,
    often expressed by shaking the head. In this context of Moab's downfall, an exhortation
    to lament fits the parallel with 'say' and the dirge-like exclamation that follows.
    'Mourn' is idiomatic and captures the force without over-literalizing the gesture.
- source_word: לּוֹ
  chosen: for him
  alternatives:
  - over him
  - for it
  lexicon: HALOT
  rationale: The pronominal suffix is masculine singular, referring to Moab personified.
    English can render this either 'for him' or 'over him'; 'for him' reads naturally
    with 'mourn.' 'It' would flatten the personification present in the verse.
- source_word: כָּל סְבִיבָיו
  chosen: all you around him
  alternatives:
  - all who are around him
  - all his neighbors
  - all around him
  lexicon: HALOT
  rationale: Literally 'all his surrounding ones/those around him.' The phrase addresses
    surrounding peoples or observers. 'All you around him' preserves the vocative
    force and the personal reference.
- source_word: וְכֹל יֹדְעֵי שְׁמוֹ
  chosen: and all who know his name
  alternatives:
  - and all who know of his fame
  - and all who know him by name
  lexicon: HALOT
  rationale: שֵׁם can mean literal name or reputation/fame. Here either sense works,
    since Moab was widely known. 'Know his name' preserves the Hebrew wording while
    allowing the connotation of renown to remain implicit.
- source_word: אִמְרוּ
  chosen: say
  alternatives:
  - declare
  - cry out
  lexicon: HALOT
  rationale: A straightforward imperative introducing the lament quotation. 'Say'
    is sufficient and does not over-interpret the tone.
- source_word: אֵיכָה
  chosen: How
  alternatives:
  - Alas, how
  - How indeed
  lexicon: HALOT
  rationale: This interjection introduces a lamenting exclamation, common in dirge
    style. 'How' preserves the Hebrew form and literary flavor better than adding
    interpretive particles.
- source_word: נִשְׁבַּר
  chosen: is broken
  alternatives:
  - has been broken
  - was shattered
  lexicon: HALOT
  rationale: The Niphal perfect expresses the state/result of being broken. Present
    perfective English could work, but 'is broken' fits the exclamatory lament and
    reads naturally in English poetry.
- source_word: מַטֵּה עֹז
  chosen: the mighty scepter
  alternatives:
  - the staff of strength
  - the strong rod
  lexicon: HALOT
  rationale: מַטֶּה can mean staff, rod, or scepter; with עֹז ('strength, might')
    in a royal/national downfall context, 'scepter' best conveys symbolic rule and
    power. 'Mighty' renders the attributive force idiomatically.
- source_word: מַקֵּל תִּפְאָרָה
  chosen: the staff of splendor
  alternatives:
  - the rod of glory
  - the staff of beauty
  - the glorious staff
  lexicon: HALOT
  rationale: מַקֵּל overlaps semantically with מַטֶּה ('staff/rod'), and תִּפְאָרָה
    denotes beauty, glory, or splendor. 'Staff of splendor' preserves the poetic parallelism
    and avoids collapsing the two cola into identical English.
