id: JER.48.22
reference: Jeremiah 48:22
source:
  edition: WLC
  text: וְ/עַל דִּיב֣וֹן וְ/עַל נְב֔וֹ וְ/עַל בֵּ֖ית דִּבְלָתָֽיִם־־־׃
translation:
  text: and against Dibon, and against Nebo, and against Beth-diblathaim—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Beth-diblathayim'; the Hebrew place name is transliterated, and some
      English forms preserve the dual ending more explicitly.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  chosen: and against
  alternatives:
  - and on
  - also against
  lexicon: HALOT
  rationale: The repeated preposition עַל with prefixed conjunction continues the
    list of places under judgment from the surrounding context. In English, 'against'
    best conveys hostile movement/judgment here, while preserving the repetitive structure.
- source_word: דִּיבוֹן
  chosen: Dibon
  lexicon: HALOT
  rationale: Proper place name; transliterated according to standard English convention,
    following the translation philosophy to transliterate names.
- source_word: נְב֔וֹ
  chosen: Nebo
  lexicon: HALOT
  rationale: Proper place name; transliterated rather than translated. Although the
    name is associated elsewhere with a deity/mountain, here it functions as a toponym
    in a judgment list.
- source_word: בֵּית דִּבְלָתָֽיִם
  chosen: Beth-diblathaim
  alternatives:
  - Beth-diblathayim
  - House of Diblathaim
  lexicon: HALOT
  rationale: Compound place name. Because it is a proper noun, transliteration is
    preferred over translating בֵּית as 'house of.' The hyphen reflects the construct
    relationship in readable English while preserving the name form.
