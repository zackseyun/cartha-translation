id: JER.48.23
reference: Jeremiah 48:23
source:
  edition: WLC
  text: וְ/עַ֧ל קִרְיָתַ֛יִם וְ/עַל בֵּ֥ית גָּמ֖וּל וְ/עַל בֵּ֥ית מְעֽוֹן־־׃
translation:
  text: and against Kiriathaim, and against Beth-gamul, and against Beth-meon—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew repeats 'and against' before each city name, preserving the rhythm
      of the judgment oracle.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: and against
  alternatives:
  - and upon
  - also against
  lexicon: HALOT
  rationale: The repeated preposition עַל with prefixed conjunction continues the
    judgment list from the surrounding context. In English, 'against' best conveys
    hostile direction in an oracle of judgment, rather than the more spatially literal
    'upon.' Retaining 'and against' each time preserves the Hebrew repetition and
    cadence.
- source_word: קִרְיָתַיִם
  chosen: Kiriathaim
  alternatives:
  - Kiriathaims
  lexicon: HALOT
  rationale: This is a place name and should be transliterated rather than translated,
    per the translation philosophy. Although the form is morphologically dual/plural
    in appearance, it functions as a proper toponym, so standard English transliteration
    is preferred.
- source_word: בֵּית גָּמוּל
  chosen: Beth-gamul
  alternatives:
  - Beth Gamul
  - House of Gamul
  lexicon: HALOT
  rationale: This is a compound place name beginning with 'Beth/Beit' ('house of'),
    but as a settled toponym it is best transliterated rather than translated. The
    hyphenated form is a standard English convention for such Hebrew place names and
    preserves recognizability.
- source_word: בֵּית מְעוֹן
  chosen: Beth-meon
  alternatives:
  - Beth Meon
  - House of Meon
  lexicon: HALOT
  rationale: Like Beth-gamul, this is a proper place name and is transliterated rather
    than translated. The hyphenated form reflects the compound Hebrew name while keeping
    readable modern English.
