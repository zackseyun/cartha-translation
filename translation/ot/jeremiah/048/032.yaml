id: JER.48.32
reference: Jeremiah 48:32
source:
  edition: WLC
  text: מִ/בְּכִ֨י יַעְזֵ֤ר אֶבְכֶּה לָּ/ךְ֙ הַ/גֶּ֣פֶן שִׂבְמָ֔ה נְטִֽישֹׁתַ֨יִ/ךְ֙
    עָ֣בְרוּ יָ֔ם עַ֛ד יָ֥ם יַעְזֵ֖ר נָגָ֑עוּ עַל קֵיצֵ֥/ךְ וְ/עַל בְּצִירֵ֖/ךְ שֹׁדֵ֥ד
    נָפָֽל־־־׃
translation:
  text: With the weeping of Jazer I weep for you, vine of Sibmah; your branches crossed
    the sea; they reached as far as the sea of Jazer. Upon your summer fruit and upon
    your grape harvest the destroyer has fallen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'More than the weeping of Jazer I weep for you'; the opening preposition
      may carry a comparative nuance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your shoots' or 'your tendrils.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew reads 'they reached as far as the sea of Jazer.' Because Jazer
      was inland, some understand this as poetic hyperbole, while others propose a
      textual adjustment such as 'they reached as far as Jazer.'
    reason: textual_variant
lexical_decisions:
- source_word: מִבְּכִי
  chosen: With the weeping of
  alternatives:
  - More than the weeping of
  - From the weeping of
  lexicon: HALOT
  rationale: The prefixed מִ with בְּכִי is idiomatic and difficult. In context it
    introduces comparison/association with Jazer's lament. 'With the weeping of' preserves
    the poetic linkage without overcommitting to a comparative nuance that English
    would make awkward.
- source_word: יַעְזֵר
  chosen: Jazer
  rationale: Proper place name, transliterated per philosophy.
- source_word: אֶבְכֶּה לָּךְ
  chosen: I weep for you
  alternatives:
  - I will weep for you
  - I lament for you
  lexicon: HALOT
  rationale: Imperfect 1cs can be modal/future, but in poetic lament present English
    best conveys the speaker's active mourning. 'For you' reflects לְ with object
    of lament.
- source_word: הַגֶּפֶן שִׂבְמָה
  chosen: vine of Sibmah
  alternatives:
  - O vine of Sibmah
  - the vine of Sibmah
  lexicon: HALOT
  rationale: Appositional/vocative phrase addressing Sibmah metaphorically as a vine.
    English omits the article for natural vocative style while preserving the image.
- source_word: נְטִישֹׁתַיִךְ
  chosen: your branches
  alternatives:
  - your shoots
  - your tendrils
  lexicon: HALOT
  rationale: The noun refers to outgrowths/spreading offshoots of a vine. 'Branches'
    is the clearest natural English in this viticultural metaphor, though 'shoots'
    is possible.
- source_word: עָבְרוּ יָם
  chosen: crossed the sea
  alternatives:
  - crossed over the sea
  - passed beyond the sea
  lexicon: HALOT
  rationale: Qal perfect of עבר with ים gives the image of extension beyond normal
    bounds. 'Crossed the sea' is concise and vivid.
- source_word: עַד יָם יַעְזֵר נָגָעוּ
  chosen: they reached as far as the sea of Jazer
  alternatives:
  - they reached as far as Jazer Sea
  - they touched as far as Jazer
  lexicon: HALOT
  rationale: נגעו means 'reached/touched.' The construct-like sequence is difficult
    because Jazer is inland; many take 'sea' hyperbolically or text-critically. The
    MT can be rendered straightforwardly as 'the sea of Jazer,' preserving the poetic
    geography without emendation.
- source_word: קֵיץ
  chosen: summer fruit
  alternatives:
  - summer produce
  - ripe fruit
  lexicon: HALOT
  rationale: קֵיץ commonly denotes summer fruit, especially ripe seasonal produce.
    'Summer fruit' preserves the lexical image.
- source_word: בָּצִיר
  chosen: grape harvest
  alternatives:
  - vintage
  - harvest
  lexicon: HALOT
  rationale: In vineyard context this specifically denotes grape gathering/vintage.
    'Grape harvest' is clear modern English.
- source_word: שֹׁדֵד
  chosen: the destroyer
  alternatives:
  - the devastator
  - the plunderer
  - the spoiler
  lexicon: HALOT
  rationale: The participle denotes one who devastates/plunders. 'Destroyer' communicates
    the broader ruin in this judgment oracle better than the archaic 'spoiler.'
- source_word: נָפָל
  chosen: has fallen
  alternatives:
  - has come down
  - has descended
  lexicon: HALOT
  rationale: With עַל, the verb pictures sudden calamity descending upon produce and
    harvest. 'Has fallen' preserves the metaphor and the perfect aspect.
