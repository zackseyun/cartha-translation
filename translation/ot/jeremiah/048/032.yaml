theological_decisions:
- issue: Whether to emend or smooth the difficult phrase involving 'sea' and 'Jazer'
  chosen_reading: 'Retain the Masoretic imagery in translation: ''they reached as
    far as the sea of Jazer'''
  alternative_readings:
  - Emend toward 'to Jazer they reached'
  - Render more interpretively as 'they spread as far as Jazer'
  rationale: This is primarily a textual/lexical issue rather than a doctrinal one,
    but preserving the received Hebrew avoids importing a conjectural resolution into
    the main text. The poetic hyperbole of the vine's spread fits the oracle's imagery.
  doctrine_reference: Translation philosophy §1, §3
