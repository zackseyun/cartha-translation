id: JER.48.16
reference: Jeremiah 48:16
source:
  edition: WLC
  text: קָר֥וֹב אֵיד מוֹאָ֖ב לָ/ב֑וֹא וְ/רָ֣עָת֔/וֹ מִהֲרָ֖ה מְאֹֽד־׃
translation:
  text: The disaster of Moab is near to come, and his calamity is hurrying very quickly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its calamity.' The Hebrew suffix is masculine singular, referring to
      Moab personified as a nation.
    reason: lexical_alternative
  - marker: b
    text: Or 'The disaster of Moab is near; his calamity hastens swiftly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרוֹב
  chosen: is near
  alternatives:
  - is close
  - draws near
  lexicon: HALOT
  rationale: Predicate adjective indicating imminence. 'Is near' is natural English
    and preserves the stative sense without over-paraphrasing.
- source_word: אֵיד
  chosen: disaster
  alternatives:
  - ruin
  - calamity
  lexicon: HALOT
  rationale: Refers to destructive misfortune or ruin. 'Disaster' is clear modern
    English and fits prophetic judgment language.
- source_word: מוֹאָב
  chosen: Moab
  rationale: Standard transliteration of the place/nation name.
- source_word: לָבוֹא
  chosen: to come
  alternatives:
  - is coming
  - to arrive
  lexicon: HALOT
  rationale: Infinitive construct with prefixed ל expressing what is imminent. 'Near
    to come' closely reflects the Hebrew structure while remaining intelligible.
- source_word: רָעָתוֹ
  chosen: his calamity
  alternatives:
  - his evil
  - his disaster
  - its calamity
  lexicon: HALOT
  rationale: Here רעה denotes harmful fate or calamity, not moral evil. The 3ms suffix
    is grammatically masculine, referring to Moab as a nation; English may render
    either 'his' or 'its.' 'His calamity' preserves the source's grammatical gender
    more directly.
- source_word: מִהֲרָה
  chosen: is hurrying
  alternatives:
  - comes quickly
  - hastens
  lexicon: HALOT
  rationale: Conveys rapid movement or haste. 'Is hurrying' preserves the verbal force;
    'hastens' is possible but slightly more archaic.
- source_word: מְאֹד
  chosen: very quickly
  alternatives:
  - greatly
  - exceedingly
  - with great speed
  lexicon: HALOT
  rationale: Intensifier modifying the haste. 'Very quickly' communicates the emphatic
    force in readable modern English.
