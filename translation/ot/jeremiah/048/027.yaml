id: JER.48.27
reference: Jeremiah 48:27
source:
  edition: WLC
  text: וְ/אִ֣ם ל֣וֹא הַ/שְּׂחֹ֗ק הָיָ֤ה לְ/ךָ֙ יִשְׂרָאֵ֔ל אִם בְּ/גַנָּבִ֖ים נמצאה
    כִּֽי מִ/דֵּ֧י דְבָרֶ֥י/ךָ בּ֖/וֹ תִּתְנוֹדָֽד׀־־׃
translation:
  text: Was Israel not a laughingstock to you? Was he found among thieves, that whenever
    you spoke of him, you shook your head?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you wagged your head.' The Hebrew verb can denote shaking or tossing
      oneself, here likely a gesture of scorn.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׂחֹק
  chosen: a laughingstock
  alternatives:
  - an object of mockery
  - a joke
  lexicon: HALOT
  rationale: The noun denotes derision/mockery. 'Laughingstock' captures the sense
    of being ridiculed more naturally in modern English than the more literal 'laughter.'
- source_word: הָיָה לְךָ
  chosen: was ... to you
  alternatives:
  - became ... for you
  lexicon: HALOT
  rationale: The idiom expresses what Israel was in Moab's estimation. 'Was ... to
    you' is idiomatic and preserves the relational force of לְ.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name retained by standard transliteration.
- source_word: אִם בְּגַנָּבִים נִמְצָאָה
  chosen: Was he found among thieves
  alternatives:
  - Was he caught among thieves
  - Was he found with thieves
  lexicon: HALOT
  rationale: 'The clause is rhetorical: Israel had not been discovered as though he
    belonged among criminals. The singular pronoun in English reflects the personified
    nation. ''Found among thieves'' stays close to the Hebrew while remaining clear.'
- source_word: כִּי מִדֵּי
  chosen: that whenever
  alternatives:
  - for as often as
  - indeed whenever
  lexicon: HALOT
  rationale: The combination introduces repeated action tied to each instance of speaking.
    'Whenever' conveys the iterative sense naturally.
- source_word: דְבָרֶיךָ בּוֹ
  chosen: you spoke of him
  alternatives:
  - you spoke against him
  - your words were about him
  lexicon: HALOT
  rationale: The Hebrew literally involves 'your speaking/words in him,' an idiom
    meaning speaking about someone; in context it likely carries hostile reference,
    but 'spoke of him' preserves the base sense without over-interpreting.
- source_word: תִּתְנוֹדָד
  chosen: you shook your head
  alternatives:
  - you wagged your head
  - you tossed yourself
  lexicon: HALOT
  rationale: The verb can denote restless movement or wagging/shaking oneself. In
    this taunting context, 'shook your head' best conveys derisive gesturing in idiomatic
    English.
