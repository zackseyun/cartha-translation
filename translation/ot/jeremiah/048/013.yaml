theological_decisions:
- issue: Referent of Bethel
  chosen_reading: Bethel is rendered as the northern cult center in which Israel placed
    confidence, not as a generic 'house of God.'
  alternative_readings:
  - '''house of God'' as a literal common noun phrase'
  rationale: The prophetic comparison is between Moab's trust in Chemosh and Israel's
    trust in the shrine at Bethel. Rendering it literally as 'house of God' would
    blur the polemical historical allusion and could misleadingly suggest trust in
    the true God rather than in an idolatrous cult site.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it only where ambiguity
    is genuine.'
