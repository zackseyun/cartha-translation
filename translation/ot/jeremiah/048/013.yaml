id: JER.48.13
reference: Jeremiah 48:13
source:
  edition: WLC
  text: וּ/בֹ֥שׁ מוֹאָ֖ב מִ/כְּמ֑וֹשׁ כַּ/אֲשֶׁר בֹּ֨שׁוּ֙ בֵּ֣ית יִשְׂרָאֵ֔ל מִ/בֵּ֥ית
    אֵ֖ל מִבְטֶחָֽ/ם־׃
translation:
  text: And Moab will be put to shame because of Chemosh, just as the house of Israel
    was put to shame because of Bethel, their confidence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be ashamed of Chemosh.' The Hebrew can be rendered more literally
      with 'ashamed of/from Chemosh,' but the sense is that Moab's reliance on Chemosh
      will end in disgrace.
    reason: lexical_alternative
  - marker: b
    text: Bethel was the northern Israelite sanctuary associated with calf worship;
      the phrase could be translated more literally, 'from Bethel, their confidence.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבֹשׁ
  chosen: will be put to shame
  alternatives:
  - will be ashamed
  - shall be disappointed
  lexicon: HALOT
  rationale: The verb בוש commonly denotes being ashamed or coming to shame. Given
    the prophetic judgment context and the parallel with Israel's disgrace, the passive-like
    English 'will be put to shame' best conveys resultant public humiliation rather
    than merely an internal feeling.
- source_word: מוֹאָב
  chosen: Moab
  rationale: Standard transliteration of the nation name.
- source_word: מִכְּמוֹשׁ
  chosen: because of Chemosh
  alternatives:
  - by Chemosh
  - from Chemosh
  - with respect to Chemosh
  lexicon: HALOT
  rationale: The preposition מן after בוש can mark the object/source in relation to
    which shame is experienced. Here the sense is that Moab is shamed on account of
    reliance on Chemosh, its god. 'Because of Chemosh' is idiomatic and matches the
    parallel 'because of Bethel.'
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - like when
  rationale: Introduces a comparison between Moab's coming shame and Israel's prior
    shame.
- source_word: בֹּשׁוּ
  chosen: was put to shame
  alternatives:
  - was ashamed
  - came to shame
  lexicon: HALOT
  rationale: Same lexical field as the first verb. Singular English with collective
    subject 'the house of Israel' is natural.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  rationale: Retained formally because the Hebrew expression is a common collective
    designation and carries covenantal-national force beyond the bare proper name.
- source_word: מִבֵּית אֵל
  chosen: because of Bethel
  alternatives:
  - from Bethel
  - because of the house of God
  lexicon: HALOT
  rationale: Although the form could be read literally as 'from Beth-el,' in context
    it refers to the cult center Bethel in which Israel trusted. Transliteration as
    the place name is preferable to the literal 'house of God,' which would obscure
    the historical reference.
- source_word: מִבְטָחָם
  chosen: their confidence
  alternatives:
  - their trust
  - their security
  lexicon: HALOT
  rationale: 'Denotes the object or ground of trust. ''Confidence'' fits the construction
    and keeps the irony: Bethel was what they relied on, yet it failed them.'
