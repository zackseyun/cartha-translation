id: JER.48.34
reference: Jeremiah 48:34
source:
  edition: WLC
  text: מִ/זַּעֲקַ֨ת חֶשְׁבּ֜וֹן עַד אֶלְעָלֵ֗ה עַד יַ֨הַץ֙ נָתְנ֣וּ קוֹלָ֔/ם מִ/צֹּ֨עַר֙
    עַד חֹ֣רֹנַ֔יִם עֶגְלַ֖ת שְׁלִֽשִׁיָּ֑ה כִּ֚י גַּם מֵ֣י נִמְרִ֔ים לִ/מְשַׁמּ֖וֹת
    יִהְיֽוּ־־־־׃
translation:
  text: From the cry of Heshbon to Elealeh, as far as Jahaz, they raise their voice;
    from Zoar to Horonaim, to Eglath-shelishiyah. For even the waters of Nimrim will
    become desolations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'a three-year-old heifer.' The Hebrew phrase עֶגְלַת שְׁלִשִׁיָּה
      may be understood descriptively, but here it is likely a place name in the sequence
      of locations.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/זַּעֲקַת
  chosen: From the cry of
  alternatives:
  - From the outcry of
  - Because of the cry of
  lexicon: HALOT
  rationale: זַעֲקָה denotes a cry, outcry, or shriek of distress. The prefixed מִן
    is spatial/source-oriented here in a geographic sweep, so 'From the cry of' best
    introduces the range over which the lament is heard.
- source_word: עַד
  chosen: to / as far as
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Repeated עַד marks the extent of the cry across named locations. Rendering
    variably as 'to' and 'as far as' keeps the geographic progression natural in English
    while preserving the sense of extent.
- source_word: נָתְנוּ קוֹלָם
  chosen: they raise their voice
  alternatives:
  - they give their voice
  - they lift up their voice
  - their voice is heard
  lexicon: HALOT
  rationale: The idiom literally means 'they gave their voice,' i.e., uttered a cry.
    'They raise their voice' is idiomatic modern English that preserves the active
    sense without over-paraphrase.
- source_word: מִ/צֹּעַר
  chosen: from Zoar
  alternatives:
  - from Zoar onward
  lexicon: HALOT
  rationale: The second geographic span begins at Zoar. 'From Zoar' preserves the
    repeated min-preposition and the poetic mapping of the cry's reach.
- source_word: חֹרֹנַיִם
  chosen: Horonaim
  lexicon: HALOT
  rationale: Proper place name, transliterated according to standard English convention.
- source_word: עֶגְלַת שְׁלִשִׁיָּה
  chosen: Eglath-shelishiyah
  alternatives:
  - a three-year-old heifer
  - Eglath the Third
  lexicon: HALOT
  rationale: The expression is most likely a place name here in apposition within
    the chain of locations, especially in parallel with Isaiah 15:5. Transliteration
    avoids forcing an uncertain etymological interpretation into the main text. A
    lexical alternative is worth preserving in a footnote because the phrase can also
    be understood descriptively.
- source_word: כִּי גַּם
  chosen: For even
  alternatives:
  - Indeed even
  - Because also
  lexicon: HALOT
  rationale: כִּי introduces explanation, and גַּם adds emphasis. 'For even' captures
    both the explanatory and intensifying force in natural English.
- source_word: מֵי נִמְרִים
  chosen: the waters of Nimrim
  alternatives:
  - the waters of Nimrim stream
  - the waters of Nimrim spring
  lexicon: HALOT
  rationale: Construct phrase with a place name; 'waters of Nimrim' is the most straightforward
    rendering.
- source_word: לִ/מְשַׁמּוֹת
  chosen: desolations
  alternatives:
  - waste places
  - a desolation
  - desolate
  lexicon: HALOT
  rationale: The plural noun conveys ruined/desolate conditions. 'Desolations' is
    somewhat literal but preserves the Hebrew plural better than smoothing to a singular
    abstract noun.
- source_word: יִהְיוּ
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: With לְ + noun of result, היה often carries the sense 'become, come to
    be.' 'Will become desolations' better reflects the resulting state than a simple
    stative 'will be.'
