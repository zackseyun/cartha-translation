id: JER.48.1
reference: Jeremiah 48:1
source:
  edition: WLC
  text: לְ/מוֹאָ֡ב כֹּֽה אָמַר֩ יְהוָ֨ה צְבָא֜וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֗ל ה֤וֹי אֶל נְבוֹ֙ כִּ֣י שֻׁדָּ֔דָה הֹבִ֥ישָׁה נִלְכְּדָ֖ה קִרְיָתָ֑יִם הֹבִ֥ישָׁה הַ/מִּשְׂגָּ֖ב וָ/חָֽתָּה־־׃
translation:
  text: 'Concerning Moab: Thus says Yahweh of hosts, the God of Israel: Woe to Nebo, for it is devastated. Kiriathaim is put to shame; it is captured. The stronghold is put to shame and shattered.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Against Moab' at the heading.
    reason: alternative_reading
  - marker: b
    text: Or 'Misgab,' if taken as a place name rather than 'the stronghold.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְמוֹאָב
  chosen: Concerning Moab
  alternatives:
  - Against Moab
  - To Moab
  lexicon: HALOT
  rationale: The prefixed לְ introducing an oracle heading is idiomatically rendered 'concerning' in English prophetic superscriptions. 'Against Moab' is possible given the judgment context, but the Hebrew preposition itself is broader and the heading formula is best preserved without over-interpreting.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: The established but still transparent title 'LORD of hosts' preserves the Hebrew construct and conveys divine sovereignty over heavenly and earthly forces.
- source_word: הוֹי
  chosen: Woe to
  alternatives:
  - Alas for
  - Ah, against
  lexicon: HALOT
  rationale: In prophetic judgment speech, הוֹי introduces lament and denunciation. 'Woe to' best captures the force in natural English.
- source_word: נְבוֹ
  chosen: Nebo
  lexicon: HALOT
  rationale: Place name is transliterated according to the translation philosophy.
- source_word: כִּי שֻׁדָּדָה
  chosen: for it is devastated
  alternatives:
  - for it is destroyed
  - for it is plundered
  lexicon: HALOT
  rationale: The passive of שׁדד denotes violent desolation/devastation, often by plundering. 'Devastated' captures the result without narrowing to either total destruction or mere looting.
- source_word: הֹבִישָׁה
  chosen: is put to shame
  alternatives:
  - is ashamed
  - has been disgraced
  lexicon: HALOT
  rationale: The causative form indicates being brought to shame/disgrace, not merely feeling shame internally. Passive English best reflects the Hebrew stem and context.
- source_word: נִלְכְּדָה
  chosen: it is captured
  alternatives:
  - it has been taken
  lexicon: HALOT
  rationale: The Niphal of לכד in military context means to be captured or taken. 'Captured' is concise and idiomatic.
- source_word: קִרְיָתָיִם
  chosen: Kiriathaim
  lexicon: HALOT
  rationale: Place name is transliterated.
- source_word: הַמִּשְׂגָּב
  chosen: The stronghold
  alternatives:
  - the fortress
  - Misgab
  lexicon: HALOT
  rationale: The noun commonly means 'high place, secure height, stronghold.' Here the article favors a common noun, and translating it preserves sense. Some take it as a place name ('Misgab'), but the lexical sense is more straightforward in context.
- source_word: וָחָתָּה
  chosen: and shattered
  alternatives:
  - and dismayed
  - and broken down
  lexicon: HALOT
  rationale: From חתת, the verb can denote being shattered, broken, or dismayed. In parallel with devastated/captured/put to shame, a concrete judgment result ('shattered') fits the sequence and the feminine singular subject.
