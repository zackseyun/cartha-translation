theological_decisions:
- issue: Rendering the oracle heading preposition לְ in a judgment context
  chosen_reading: Concerning Moab
  alternative_readings:
  - Against Moab
  rationale: Although the chapter is clearly an oracle of judgment, the heading formula itself uses לְ, which is broader than an explicitly adversative preposition. 'Concerning' preserves the source wording while allowing the following content to convey hostility.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether הַמִּשְׂגָּב is a common noun or a place name
  chosen_reading: 'common noun: ''The stronghold'''
  alternative_readings:
  - 'place name: ''Misgab'''
  rationale: The article and common lexical usage support reading it as a descriptive noun. Because some translations preserve it as a toponym, the alternative is retained in a footnote for auditability.
  doctrine_reference: Translation philosophy §3, §5
