id: JER.48.38
reference: Jeremiah 48:38
source:
  edition: WLC
  text: עַ֣ל כָּל גַּגּ֥וֹת מוֹאָ֛ב וּ/בִ/רְחֹבֹתֶ֖י/הָ כֻּלֹּ֣/ה מִסְפֵּ֑ד כִּֽי שָׁבַ֣רְתִּי אֶת מוֹאָ֗ב כִּ/כְלִ֛י אֵֽין חֵ֥פֶץ בּ֖/וֹ נְאֻם יְהוָֽה־־־־־׃
translation:
  text: On all the rooftops of Moab and in her squares, everywhere there is mourning; for I have broken Moab like a vessel in which there is no delight, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'like a vessel that no one wants.' The Hebrew literally says, 'like a vessel in which there is no delight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּגּוֹת
  chosen: rooftops
  alternatives:
  - housetops
  - roofs
  lexicon: HALOT
  rationale: The plural noun refers to the flat roofs of houses, a common public/private space in the ancient Near East. 'Rooftops' is natural modern English and preserves the concrete image.
- source_word: רְחֹבֹתֶיהָ
  chosen: her squares
  alternatives:
  - her streets
  - her open places
  - her plazas
  lexicon: HALOT
  rationale: רְחוֹב often denotes a broad open area or town square rather than a narrow street. 'Squares' best fits the urban public setting and pairs well with rooftops as locations of public lament.
- source_word: כֻּלֹּה מִסְפֵּד
  chosen: everywhere there is mourning
  alternatives:
  - all of it is lamentation
  - every part of it is wailing
  lexicon: HALOT
  rationale: 'The phrase compresses a totalizing statement: all of Moab''s public spaces are filled with lament. ''Everywhere there is mourning'' renders the sense idiomatically while preserving the comprehensiveness.'
- source_word: מִסְפֵּד
  chosen: mourning
  alternatives:
  - lamentation
  - wailing
  lexicon: HALOT
  rationale: The noun can denote lamentation or mourning rites. 'Mourning' captures both grief and its public expression in accessible English.
- source_word: שָׁבַרְתִּי
  chosen: I have broken
  alternatives:
  - I broke
  - I have shattered
  lexicon: HALOT
  rationale: The perfect verb presents YHWH's action as accomplished. 'I have broken' preserves the completed force and the metaphor of an object ruined beyond use.
- source_word: כִּכְלִי
  chosen: like a vessel
  alternatives:
  - like a jar
  - like an article
  - like an object
  lexicon: HALOT
  rationale: כְּלִי is a broad term for vessel, container, or implement. 'Vessel' is suitably general and works well with the following clause about lack of delight or value.
- source_word: אֵין חֵפֶץ בּוֹ
  chosen: in which there is no delight
  alternatives:
  - that no one wants
  - in which there is no pleasure
  - that is of no value
  lexicon: HALOT
  rationale: חֵפֶץ denotes delight, pleasure, or desire. The clause describes a vessel no longer wanted or valued. 'In which there is no delight' stays close to the Hebrew while remaining intelligible; the more idiomatic implication 'that no one wants' is preserved as an alternative.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is conventionally and clearly rendered 'declares the LORD.' It preserves the solemnity of divine speech.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
