id: JER.48.14
reference: Jeremiah 48:14
source:
  edition: WLC
  text: אֵ֚יךְ תֹּֽאמְר֔וּ גִּבּוֹרִ֖ים אֲנָ֑חְנוּ וְ/אַנְשֵׁי חַ֖יִל לַ/מִּלְחָמָֽה־׃
translation:
  text: How can you say, ‘We are warriors, men of valor for battle’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “mighty men” for גִּבּוֹרִים and “valiant men” for אַנְשֵׁי חַיִל.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  chosen: How can
  alternatives:
  - How
  - How is it that
  lexicon: HALOT
  rationale: Introduces an incredulous rhetorical question. 'How can' captures the
    rebuking force in context better than a bare 'How' while remaining close to the
    Hebrew interrogative.
- source_word: תֹּאמְרוּ
  chosen: you say
  alternatives:
  - you can say
  - you keep saying
  lexicon: HALOT
  rationale: Qal imperfect 2mp of אמר in direct discourse. Simple present English
    fits the rhetorical challenge naturally; the modal force is supplied by 'How can'
    rather than built into the verb itself.
- source_word: גִּבּוֹרִים
  chosen: warriors
  alternatives:
  - mighty men
  - heroes
  - strong men
  lexicon: HALOT
  rationale: Refers to fighting men or mighty warriors in military context. 'Warriors'
    is idiomatic modern English and fits the following battle language better than
    the more traditional but less natural 'mighty men.'
- source_word: אֲנָחְנוּ
  chosen: we are
  alternatives:
  - we
  lexicon: HALOT
  rationale: 'The independent pronoun is retained explicitly in English because it
    forms the quoted self-assertion: ''We are warriors.'' Supplying ''are'' is required
    for natural English.'
- source_word: וְ/אַנְשֵׁי חַיִל
  chosen: men of valor
  alternatives:
  - valiant men
  - mighty men
  - able-bodied men
  lexicon: HALOT
  rationale: The construct phrase literally means 'men of valor/strength.' In military
    context, 'men of valor' preserves both the lexical sense of חיל and the martial
    nuance. 'Valiant men' is possible but slightly more interpretive.
- source_word: חַיִל
  chosen: valor
  alternatives:
  - strength
  - might
  - military prowess
  lexicon: HALOT
  rationale: חיל has a broad semantic range including strength, wealth, army, and
    valor. Here, with 'men of' and followed by 'for battle,' the sense is martial
    valor or prowess.
- source_word: לַ/מִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  - in battle
  lexicon: HALOT
  rationale: The prefixed ל marks relation/purpose. 'For battle' is concise and idiomatic,
    preserving the military setting. 'For war' is also possible, but 'battle' better
    suits the immediate boast of combat readiness.
