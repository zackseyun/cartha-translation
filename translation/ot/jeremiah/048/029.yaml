id: JER.48.29
reference: Jeremiah 48:29
source:
  edition: WLC
  text: שָׁמַ֥עְנוּ גְאוֹן מוֹאָ֖ב גֵּאֶ֣ה מְאֹ֑ד גָּבְה֧/וֹ וּ/גְאוֹנ֛/וֹ וְ/גַאֲוָת֖/וֹ
    וְ/רֻ֥ם לִבּֽ/וֹ־׃
translation:
  text: We have heard of the pride of Moab—he is exceedingly proud—of his haughtiness,
    his pride, his arrogance, and the loftiness of his heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'We heard of the pride of Moab—very proud indeed—his loftiness, his pride,
      his arrogance, and his proud heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְנוּ
  chosen: We have heard
  alternatives:
  - We heard
  lexicon: HALOT
  rationale: Qal perfect 1cp of שׁמע. English present perfect conveys a reported,
    established awareness that fits the prophetic denunciation better than a simple
    past, while remaining close to the Hebrew perfect.
- source_word: גְאוֹן
  chosen: pride
  alternatives:
  - majesty
  - exaltation
  lexicon: HALOT
  rationale: In this judgment context concerning Moab, גאון carries the negative sense
    of arrogant pride rather than neutral majesty.
- source_word: מוֹאָב
  chosen: Moab
  rationale: Standard transliteration of the place/name, following the principle to
    transliterate names.
- source_word: גֵּאֶה מְאֹד
  chosen: he is exceedingly proud
  alternatives:
  - very proud
  - exceedingly haughty
  lexicon: HALOT
  rationale: The adjective גאה with מאד intensifies Moab's arrogance. Rendering it
    verbally in English produces natural syntax after 'We have heard of the pride
    of Moab' while preserving the emphatic force.
- source_word: גָּבְהוֹ
  chosen: his haughtiness
  alternatives:
  - his height
  - his loftiness
  lexicon: HALOT
  rationale: Though the noun can denote height/loftiness, in this list of pride terms
    it refers metaphorically to arrogance; 'haughtiness' best captures the moral sense.
- source_word: וּגְאוֹנוֹ
  chosen: his pride
  alternatives:
  - his majesty
  - his exaltation
  lexicon: HALOT
  rationale: Repeated pride vocabulary is retained rather than collapsed, because
    the Hebrew piles up near-synonyms for rhetorical effect.
- source_word: וְגַאֲוָתוֹ
  chosen: his arrogance
  alternatives:
  - his insolence
  - his pride
  lexicon: HALOT
  rationale: A near-synonym in the semantic field of pride. 'Arrogance' provides slight
    variation in English while preserving the cumulative force of the Hebrew list.
- source_word: וְרֻם לִבּוֹ
  chosen: the loftiness of his heart
  alternatives:
  - the pride of his heart
  - his proud heart
  lexicon: HALOT
  rationale: Literally 'the height/loftiness of his heart.' This preserves the Hebrew
    anthropological expression 'heart' and the metaphor of elevation, avoiding over-paraphrase.
