id: JER.48.45
reference: Jeremiah 48:45
source:
  edition: WLC
  text: בְּ/צֵ֥ל חֶשְׁבּ֛וֹן עָמְד֖וּ מִ/כֹּ֣חַ נָסִ֑ים כִּֽי אֵ֞שׁ יָצָ֣א מֵ/חֶשְׁבּ֗וֹן
    וְ/לֶֽהָבָה֙ מִ/בֵּ֣ין סִיח֔וֹן וַ/תֹּ֨אכַל֙ פְּאַ֣ת מוֹאָ֔ב וְ/קָדְקֹ֖ד בְּנֵ֥י
    שָׁאֽוֹן־׃
translation:
  text: In the shadow of Heshbon the fugitives stand without strength, for a fire
    has gone out from Heshbon, and a flame from the midst of Sihon; it has consumed
    the corner of Moab and the crown of the head of the sons of tumult.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stood, lacking strength'; the Hebrew perfect may be rendered as a past
      tense, and the phrase מִכֹּחַ can mean 'for lack of strength.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from between Sihon.' 'Sihon' may stand metonymically for the city or
      realm associated with him.
    reason: lexical_alternative
  - marker: c
    text: Or 'the edge of Moab.' The Hebrew 'corner' is a poetic image for an extremity
      or border.
    reason: lexical_alternative
  - marker: d
    text: Or 'the crown of the head of the noisy ones' / 'the sons of uproar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצֵל
  chosen: in the shadow of
  alternatives:
  - under the shadow of
  - in the shade of
  lexicon: HALOT
  rationale: צֵל literally denotes shadow/shade. 'In the shadow of' preserves the
    concrete image and fits the locative preposition בְּ.
- source_word: חֶשְׁבּוֹן
  chosen: Heshbon
  rationale: Place name; transliterated per translation philosophy.
- source_word: עָמְדוּ
  chosen: stand
  alternatives:
  - stood
  - have halted
  lexicon: HALOT
  rationale: Qal perfect 3cp can be rendered as a present-like vivid perfect in English
    poetry/prophecy. 'Stand' fits the poetic scene of fugitives halted in place.
- source_word: מִכֹּחַ
  chosen: without strength
  alternatives:
  - for lack of strength
  - from exhaustion
  lexicon: HALOT
  rationale: Literally 'from strength/power,' but in context with fugitives it idiomatically
    conveys absence or failure of strength. 'Without strength' is concise and natural.
- source_word: נָסִים
  chosen: the fugitives
  alternatives:
  - those fleeing
  - the refugees
  lexicon: HALOT
  rationale: Participle from נוס, 'flee.' 'Fugitives' captures the status of those
    in flight and suits the judgment context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason the fugitives are powerless; 'for' preserves the
    explanatory connection.
- source_word: אֵשׁ יָצָא מֵחֶשְׁבּוֹן
  chosen: a fire has gone out from Heshbon
  alternatives:
  - fire came out from Heshbon
  - a fire went forth from Heshbon
  lexicon: HALOT
  rationale: Keeps the imagery and verbal force of יצא. Present perfect in English
    suits the prophetic description of a completed destructive outbreak.
- source_word: וְלֶהָבָה
  chosen: and a flame
  alternatives:
  - and a blaze
  lexicon: HALOT
  rationale: לֶהָבָה is a flame/blaze. 'Flame' is the more literal and concise choice.
- source_word: מִבֵּין סִיחוֹן
  chosen: from the midst of Sihon
  alternatives:
  - from between Sihon
  - from Sihon
  lexicon: HALOT
  rationale: מִבֵּין literally means 'from between/from the midst of.' Since Sihon
    can stand metonymically for his city/realm, 'from the midst of Sihon' preserves
    the Hebrew image without over-interpreting.
- source_word: וַתֹּאכַל
  chosen: it has consumed
  alternatives:
  - and it consumed
  - and it devoured
  lexicon: HALOT
  rationale: The feminine verb agrees with 'flame' or the fire imagery collectively.
    'Consumed' is idiomatic for fire and preserves the destructive sense.
- source_word: פְּאַת מוֹאָב
  chosen: the corner of Moab
  alternatives:
  - the edge of Moab
  - the forehead/temple of Moab
  lexicon: HALOT
  rationale: פֵּאָה can denote corner, side, or extremity. Here 'corner of Moab' preserves
    the metaphor and echoes the parallel in the traditional rendering of this poetic
    line.
- source_word: וְקָדְקֹד
  chosen: and the crown of the head
  alternatives:
  - and the scalp
  - and the top of the head
  lexicon: HALOT
  rationale: קָדְקֹד denotes the crown/top of the head. The fuller phrase makes the
    body imagery clear in English.
- source_word: בְּנֵי שָׁאוֹן
  chosen: the sons of tumult
  alternatives:
  - the sons of noise
  - the noisy people
  - the sons of uproar
  lexicon: HALOT
  rationale: שָׁאוֹן denotes tumult, roar, uproar. The construct phrase is retained
    fairly literally as 'sons of tumult' to preserve the poetic idiom and avoid flattening
    it into a mere paraphrase.
