id: JER.48.26
reference: Jeremiah 48:26
source:
  edition: WLC
  text: הַשְׁכִּירֻ֕/הוּ כִּ֥י עַל יְהוָ֖ה הִגְדִּ֑יל וְ/סָפַ֤ק מוֹאָב֙ בְּ/קִיא֔/וֹ וְ/הָיָ֥ה לִ/שְׂחֹ֖ק גַּם הֽוּא־־׃
translation:
  text: Make him drunk, because he has magnified himself against Yahweh; and Moab shall wallow in his vomit, and he too shall become a laughingstock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Moab shall clap/strike with his hands in his vomit.' The Hebrew verb can be understood more literally, but in context the sense 'wallow' best fits the image of drunken disgrace.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְׁכִּירֻהוּ
  chosen: Make him drunk
  alternatives:
  - Get him drunk
  - Make him drunken
  lexicon: HALOT
  rationale: Imperative plural with 3ms object from שׁכר in the causative sense, calling for Moab to be made drunk as an image of judgment. 'Make him drunk' is idiomatic modern English and preserves the force better than the more archaic 'make him drunken'.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'Because' is clearer in modern English than 'for' while preserving the causal sense.
- source_word: עַל יְהוָה
  chosen: against the LORD
  alternatives:
  - against Yahweh
  - over the LORD
  lexicon: HALOT
  rationale: With הגדיל, על marks hostile exaltation directed against YHWH. Following doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrinal default for the divine name.
- source_word: הִגְדִּיל
  chosen: has magnified himself
  alternatives:
  - has exalted himself
  - has acted arrogantly
  - has boasted
  lexicon: HALOT
  rationale: The hiphil of גדל here conveys making oneself great in arrogant opposition. 'Has magnified himself' stays close to the Hebrew while remaining understandable; the reflexive sense is supplied in English from the idiom.
- source_word: וְסָפַק
  chosen: shall wallow
  alternatives:
  - shall clap
  - shall strike
  lexicon: HALOT
  rationale: In this context with 'in his vomit,' the verb is best taken as a gesture of floundering or wallowing rather than literal clapping. This yields coherent imagery of drunken humiliation. The more literal 'clap' is possible lexically but less persuasive in context.
- source_word: בְּקִיאוֹ
  chosen: in his vomit
  alternatives:
  - into his vomit
  lexicon: HALOT
  rationale: Concrete image of degradation resulting from drunken judgment. 'In his vomit' matches the preposition and the scene naturally.
- source_word: וְהָיָה לִשְׂחֹק
  chosen: shall become a laughingstock
  alternatives:
  - shall be for a derision
  - shall become an object of ridicule
  lexicon: HALOT
  rationale: Expresses the result state of public mockery. 'Laughingstock' is natural modern English and preserves the shame motif.
- source_word: גַּם הוּא
  chosen: he too
  alternatives:
  - also he
  - even he
  lexicon: HALOT
  rationale: Adds emphasis that Moab, like others under judgment, will also become an object of mockery. 'He too' is concise and idiomatic.
