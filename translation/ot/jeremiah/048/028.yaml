id: JER.48.28
reference: Jeremiah 48:28
source:
  edition: WLC
  text: עִזְב֤וּ עָרִים֙ וְ/שִׁכְנ֣וּ בַּ/סֶּ֔לַע יֹשְׁבֵ֖י מוֹאָ֑ב וִֽ/הְי֣וּ כְ/יוֹנָ֔ה
    תְּקַנֵּ֖ן בְּ/עֶבְרֵ֥י פִי פָֽחַת־׃
translation:
  text: Leave the cities and dwell in the rock, inhabitants of Moab, and be like a
    dove that nests on the sides of the mouth of a pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a trap-pit' or 'pitfall'; the Hebrew term can carry the sense of a pit
      used as a trap, heightening the image of precarious refuge.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִזְבוּ
  chosen: Leave
  alternatives:
  - Forsake
  - Abandon
  lexicon: HALOT
  rationale: Imperative plural from עזב, calling for departure from the cities. 'Leave'
    is natural modern English and preserves the command force without adding emotional
    intensity beyond the Hebrew.
- source_word: עָרִים
  chosen: the cities
  alternatives:
  - cities
  - towns
  lexicon: HALOT
  rationale: Common plural noun 'cities.' The article is not explicit in Hebrew, but
    English idiom with the imperative favors 'the cities' as the known urban settlements
    of Moab under threat.
- source_word: וְשִׁכְנוּ
  chosen: and dwell
  alternatives:
  - and live
  - and settle
  lexicon: HALOT
  rationale: Imperative plural from שכן. 'Dwell' preserves the sense of taking up
    residence/refuge and fits the elevated prophetic register better than 'live'.
- source_word: בַּסֶּלַע
  chosen: in the rock
  alternatives:
  - in the crag
  - in the cliff
  lexicon: HALOT
  rationale: סלע denotes rock/crag. 'In the rock' is a fairly literal rendering and
    evokes rocky refuge terrain; more specific options like 'crag' are possible but
    less broadly accessible.
- source_word: יֹשְׁבֵי מוֹאָב
  chosen: inhabitants of Moab
  alternatives:
  - those who dwell in Moab
  - dwellers of Moab
  lexicon: HALOT
  rationale: Vocative/appositional address to the people being commanded. 'Inhabitants
    of Moab' is idiomatic and clear.
- source_word: וִהְיוּ
  chosen: and be
  alternatives:
  - and become
  lexicon: HALOT
  rationale: Imperative plural of היה. 'Be' works well with the following simile and
    avoids overreading a process nuance.
- source_word: כְּיוֹנָה
  chosen: like a dove
  alternatives:
  - as a dove
  lexicon: HALOT
  rationale: Straightforward simile. 'Like a dove' is natural contemporary English.
- source_word: תְּקַנֵּן
  chosen: that nests
  alternatives:
  - nesting
  - that makes its nest
  lexicon: HALOT
  rationale: 'Piel imperfect 3fs agreeing with ''dove.'' Rendering as a relative clause
    in English makes the image smooth and explicit: the dove is one that nests.'
- source_word: בְּעֶבְרֵי
  chosen: on the sides of
  alternatives:
  - beyond
  - across
  - on the edges of
  lexicon: HALOT
  rationale: From עבר in a spatial plural construct sense, referring to the sides/regions/edges.
    In this context of nesting near a pit opening, 'on the sides of' best captures
    the physical image.
- source_word: פִּי
  chosen: the mouth of
  alternatives:
  - the opening of
  - the edge of
  lexicon: HALOT
  rationale: Literally 'mouth of,' commonly used for an opening. Retained because
    it is vivid and still understandable in English.
- source_word: פָחַת
  chosen: a pit
  alternatives:
  - a trap-pit
  - a pitfall
  lexicon: HALOT
  rationale: פחת can denote a pit or trap-pit. 'Pit' keeps the image concise in the
    main text; the trapping nuance is worth preserving in a footnote because the term
    can suggest danger, not merely a hole.
