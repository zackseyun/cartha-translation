id: JER.48.15
reference: Jeremiah 48:15
source:
  edition: WLC
  text: שֻׁדַּ֤ד מוֹאָב֙ וְ/עָרֶ֣י/הָ עָלָ֔ה וּ/מִבְחַ֥ר בַּֽחוּרָ֖י/ו יָרְד֣וּ לַ/טָּ֑בַח נְאֻ֨ם הַ/מֶּ֔לֶךְ יְהוָ֥ה צְבָא֖וֹת שְׁמֽ/וֹ־׃
translation:
  text: Moab is devastated, and her cities have gone up; the choicest of her young men have gone down to the slaughter, declares the King, whose name is Yahweh of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and one has gone up against her cities'; the Hebrew is terse and may refer to an attacking force advancing against Moab's cities.
    reason: alternative_reading
  - marker: b
    text: 'Traditional English: ''the LORD of hosts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שֻׁדַּד
  chosen: is devastated
  alternatives:
  - is plundered
  - is destroyed
  lexicon: HALOT
  rationale: The Pual of שׁדד conveys being violently despoiled or devastated. 'Is devastated' communicates the passive result in natural English without narrowing it only to looting.
- source_word: וְעָרֶיהָ עָלָה
  chosen: and her cities have gone up
  alternatives:
  - and one has gone up against her cities
  - and her cities are attacked
  lexicon: HALOT
  rationale: The Hebrew is compressed and somewhat abrupt. Retaining 'have gone up' reflects the verb עלה literally and preserves the likely military idiom of assault/escalation without over-specifying an unstated subject. Because the construction is difficult, an alternative is preserved in a footnote.
- source_word: מִבְחַר
  chosen: the choicest
  alternatives:
  - the best
  - the choice ones
  lexicon: HALOT
  rationale: The noun denotes what is selected or choice. 'The choicest' idiomatically modifies the following phrase and preserves the superlative sense.
- source_word: בַּחוּרָיו
  chosen: her young men
  alternatives:
  - his young men
  lexicon: HALOT
  rationale: The ketiv-like morphology points to a 3ms suffix, but in context Moab is also personified as a land/city, and English naturally aligns the possessive with the immediately preceding feminine 'her cities.' Rendering 'her young men' preserves the personified-national sense in context.
- source_word: יָרְדוּ לַטָּבַח
  chosen: have gone down to the slaughter
  alternatives:
  - have gone down for slaughter
  - have descended to the slaughter
  lexicon: HALOT
  rationale: ירד is kept as 'gone down,' preserving the vivid movement metaphor, while לַטָּבַח is rendered 'to the slaughter' as the destination/result of their fate.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' is clear modern English and fits optimal equivalence.
- source_word: הַמֶּלֶךְ
  chosen: the King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: With the following divine name and title, this functions as a divine title rather than a generic royal reference, so capitalization helps signal titular force in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: '''Armies'' is more transparent modern English than ''hosts'' while preserving the martial/cosmic force of the title יְהוָה צְבָאוֹת.'
- source_word: שְׁמוֹ
  chosen: whose name is
  alternatives:
  - is his name
  lexicon: HALOT
  rationale: English idiom requires smoothing the nominal clause. 'Whose name is' preserves the appositional force attached to 'the King'.
