id: JER.48.10
reference: Jeremiah 48:10
source:
  edition: WLC
  text: אָר֗וּר עֹשֶׂ֛ה מְלֶ֥אכֶת יְהוָ֖ה רְמִיָּ֑ה וְ/אָר֕וּר מֹנֵ֥עַ חַרְבּ֖/וֹ מִ/דָּֽם׃
translation:
  text: Cursed is the one who does the work of Yahweh negligently, and cursed is the one who holds back his sword from blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deceitfully.' The Hebrew רְמִיָּה can denote deceit or treachery, but in this context it likely carries the sense of slackness or negligent performance.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: HALOT
  rationale: Predicate adjective introducing an imprecation/judgment formula. 'Cursed' is standard, natural English and preserves the force without archaic excess.
- source_word: עֹשֶׂה
  chosen: is the one who does
  alternatives:
  - does
  - the one doing
  lexicon: HALOT
  rationale: The participle functions substantivally/generically. Rendering with 'the one who does' makes the generic subject clear in idiomatic English while preserving the ongoing/characterizing sense.
- source_word: מְלֶאכֶת יְהוָה
  chosen: the work of the LORD
  alternatives:
  - the task of the LORD
  - the service of the LORD
  lexicon: HALOT
  rationale: מְלָאכָה commonly denotes work/task. In this judgment context, 'the work of the LORD' best preserves the idiom that the action of judgment against Moab is understood as YHWH's commissioned work.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רְמִיָּה
  chosen: negligently
  alternatives:
  - deceitfully
  - slackly
  - with a slack hand
  lexicon: HALOT
  rationale: In this context the sense is not primarily verbal deception but lax, careless, or slack performance of the divinely appointed task. 'Negligently' communicates the adverbial force in clear modern English. The alternative 'deceitfully' is lexically possible and worth preserving in a footnote because the noun can denote deceit/treachery in other contexts.
- source_word: מֹנֵעַ
  chosen: holds back
  alternatives:
  - withholds
  - restrains
  lexicon: HALOT
  rationale: The participle denotes preventing or withholding. 'Holds back' is vivid and idiomatic with 'his sword,' matching the image of refusing to carry out judgment fully.
- source_word: חַרְבּוֹ
  chosen: his sword
  lexicon: HALOT
  rationale: Straightforward literal rendering of the singular noun with 3ms suffix.
- source_word: מִדָּם
  chosen: from blood
  alternatives:
  - from bloodshed
  lexicon: HALOT
  rationale: 'The preposition מן with דָּם is most literally ''from blood.'' This preserves the starkness of the Hebrew image: withholding the sword from shedding blood in battle/judgment. ''From bloodshed'' is interpretive and smoother, but slightly less direct.'
