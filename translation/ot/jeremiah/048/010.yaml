theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to soften the violence of the judgment image
  chosen_reading: retain the explicit language 'his sword from blood'
  alternative_readings:
  - his sword from bloodshed
  - his sword from killing
  rationale: The verse speaks of divinely commissioned judgment in stark terms. The translation should not mute the severity by paraphrase; preserving the concrete imagery maintains the text's theological and rhetorical force without adding justification beyond the text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; never paraphrase beyond what the source text warrants'
