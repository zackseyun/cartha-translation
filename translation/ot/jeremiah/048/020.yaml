id: JER.48.20
reference: Jeremiah 48:20
source:
  edition: WLC
  text: הֹבִ֥ישׁ מוֹאָ֛ב כִּֽי חַ֖תָּה הילילי ו/זעקי הַגִּ֣ידוּ בְ/אַרְנ֔וֹן כִּ֥י
    שֻׁדַּ֖ד מוֹאָֽב־׀׃
translation:
  text: 'Moab is put to shame, for she is shattered. Wail and cry out! Declare it
    by the Arnon: Moab is devastated.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Howl and cry out!'
    reason: lexical_alternative
  - marker: b
    text: Or 'at the Arnon' or 'in Arnon.'
    reason: lexical_alternative
  - marker: c
    text: Or 'Moab is plundered' / 'laid waste.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹבִישׁ
  chosen: is put to shame
  alternatives:
  - is ashamed
  - has been disgraced
  lexicon: HALOT
  rationale: 'The Hiphil of בוש here is best taken as causative/resultative: Moab
    has been brought to shame or disgraced. ''Is put to shame'' preserves the passive-result
    sense in natural English better than the less idiomatic ''is ashamed.'''
- source_word: מוֹאָב
  chosen: Moab
  lexicon: HALOT
  rationale: Standard transliteration of the nation/place name, following the philosophy
    of transliterating names.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for Moab's shame. 'For' fits the elevated prophetic
    style while remaining readable.
- source_word: חַתָּה
  chosen: is shattered
  alternatives:
  - is dismayed
  - is broken down
  lexicon: HALOT
  rationale: From חתת, conveying being broken, shattered, or dismayed. In this judgment
    context, 'is shattered' best matches the parallel with devastation later in the
    verse and the concrete collapse of Moab.
- source_word: הילילי
  chosen: Wail
  alternatives:
  - Howl
  - Lament
  lexicon: HALOT
  rationale: Imperative feminine singular. 'Wail' is vivid, idiomatic, and suitable
    for prophetic lament language; 'howl' is possible but can sound overly animalistic
    in contemporary English.
- source_word: ו/זעקי
  chosen: and cry out
  alternatives:
  - and scream
  - and call out
  lexicon: HALOT
  rationale: Pairs naturally with 'wail' and reflects זעק as a loud cry of distress.
- source_word: הַגִּידוּ
  chosen: Declare it
  alternatives:
  - Tell it
  - Announce it
  - Report it
  lexicon: HALOT
  rationale: Imperative plural. The object is implicit from context, namely the news
    of Moab's downfall. 'Declare it' preserves the public, proclamatory force.
- source_word: בְ/אַרְנֹון
  chosen: by the Arnon
  alternatives:
  - in Arnon
  - at the Arnon
  - by Arnon
  lexicon: HALOT
  rationale: The preposition ב can be rendered flexibly by context. Since Arnon is
    the well-known river/gorge boundary, 'by the Arnon' is the most natural geographic
    English rendering.
- source_word: שֻׁדַּד
  chosen: is devastated
  alternatives:
  - is destroyed
  - is plundered
  - is laid waste
  lexicon: HALOT
  rationale: The Pual of שדד denotes being devastated, ravaged, or plundered. 'Is
    devastated' captures the broad effect of ruin without narrowing it only to looting.
