id: JER.48.9
reference: Jeremiah 48:9
source:
  edition: WLC
  text: תְּנוּ צִ֣יץ לְ/מוֹאָ֔ב כִּ֥י נָצֹ֖א תֵּצֵ֑א וְ/עָרֶ֨י/הָ֙ לְ/שַׁמָּ֣ה תִֽהְיֶ֔ינָה
    מֵ/אֵ֥ין יוֹשֵׁ֖ב בָּ/הֵֽן־׃
translation:
  text: Give wings to Moab, for she will surely fly away; and her cities will become
    a desolation, with no inhabitant in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Give a blossom/rosette to Moab'; the Hebrew noun צִיץ more commonly
      has senses related to a blossom or ornament, but the immediate context favors
      'wings' because the next clause speaks of Moab flying away.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''going out she will go out,'' an intensified form meaning ''she
      will surely depart'' or, in context, ''she will surely fly away.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנוּ
  chosen: Give
  alternatives:
  - Set
  - Put
  lexicon: HALOT
  rationale: 'Imperative plural of נתן, here a summons or taunt: ''give'' is the most
    direct English equivalent and works idiomatically with the following object.'
- source_word: צִיץ
  chosen: wings
  alternatives:
  - blossom
  - plate
  - tuft
  lexicon: HALOT
  rationale: Although צִיץ often means 'blossom' or related senses elsewhere, in this
    context the clause 'for she will surely go out/fly away' strongly supports the
    sense 'wings' or something enabling flight. 'Wings' best captures the image and
    the likely wordplay with the following verb.
- source_word: לְמוֹאָב
  chosen: to Moab
  alternatives:
  - for Moab
  lexicon: HALOT
  rationale: The preposition ל can be rendered 'to' or 'for' here. English idiom with
    'give wings' favors 'to Moab,' while still conveying the dative sense.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the imperative. 'For' is concise and natural
    in prophetic poetry.
- source_word: נָצֹא תֵּצֵא
  chosen: she will surely fly away
  alternatives:
  - she will surely go out
  - she will certainly depart
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. Because
    of the preceding imagery of wings, rendering the verbal idea as 'fly away' preserves
    the poetic coherence better than the more wooden 'go out,' while still expressing
    departure/exile.
- source_word: וְעָרֶיהָ
  chosen: and her cities
  lexicon: HALOT
  rationale: Straightforward construct with pronominal suffix referring to Moab as
    a feminine entity.
- source_word: לְשַׁמָּה
  chosen: a desolation
  alternatives:
  - waste
  - horror
  lexicon: HALOT
  rationale: שַׁמָּה commonly denotes devastation/desolation. 'A desolation' is idiomatic
    and preserves the prophetic judgment tone.
- source_word: תִהְיֶינָה
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: With לְשַׁמָּה, English reads more naturally as a resultative 'will become
    a desolation,' though 'will be' is possible.
- source_word: מֵאֵין יוֹשֵׁב בָּהֵן
  chosen: with no inhabitant in them
  alternatives:
  - without anyone dwelling in them
  - from there being no inhabitant in them
  lexicon: HALOT
  rationale: This idiom expresses total depopulation. 'With no inhabitant in them'
    is clear, formal enough for prophetic diction, and avoids awkward literalism.
