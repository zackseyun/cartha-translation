id: JER.48.3
reference: Jeremiah 48:3
source:
  edition: WLC
  text: ק֥וֹל צְעָקָ֖ה מֵ/חֹֽרוֹנָ֑יִם שֹׁ֖ד וָ/שֶׁ֥בֶר גָּדֽוֹל׃
translation:
  text: 'A sound of a cry from Horonaim: devastation and great destruction.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A voice of crying from Horonaim.'
    reason: lexical_alternative
  - marker: b
    text: '''Devastation'' could also be rendered ''plunder'' or ''ruin''; the Hebrew
      term can denote violent despoiling as well as the resulting destruction.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֥וֹל
  chosen: A sound
  alternatives:
  - A voice
  - The sound
  lexicon: HALOT
  rationale: קוֹל commonly denotes 'sound' or 'voice.' Here it introduces an auditory
    report of distress rather than a speaking person, so 'A sound' best fits the construction
    with the following noun 'cry.' The indefinite English expression reflects the
    verbless exclamatory Hebrew.
- source_word: צְעָקָ֖ה
  chosen: of a cry
  alternatives:
  - of crying
  - of an outcry
  lexicon: HALOT
  rationale: צְעָקָה denotes a cry, outcry, or scream of distress. 'Cry' is concise
    and natural in English; 'outcry' is possible but can sound more formal or juridical
    than the immediate lament context suggests.
- source_word: מֵ/חֹֽרוֹנָ֑יִם
  chosen: from Horonaim
  rationale: 'The preposition מִן marks source: the cry comes ''from Horonaim.'' The
    place name is transliterated in keeping with the translation philosophy for personal
    and place names.'
- source_word: שֹׁ֖ד
  chosen: devastation
  alternatives:
  - plunder
  - desolation
  - ruin
  lexicon: HALOT
  rationale: שֹׁד can denote violent destruction, devastation, or plunder. In parallel
    with שֶׁבֶר גָּדוֹל, the emphasis is on catastrophic ruin rather than the act
    of looting, so 'devastation' best captures the sense.
- source_word: וָ/שֶׁ֥בֶר
  chosen: and great destruction
  alternatives:
  - and great brokenness
  - and great ruin
  - and a great crash
  lexicon: HALOT
  rationale: שֶׁבֶר literally involves breaking or fracture, but in prophetic judgment
    contexts it often signifies collapse, ruin, or destruction. Because גָּדוֹל modifies
    it directly, the phrase is rendered together as 'great destruction' for natural
    English while preserving the parallel intensification.
- source_word: גָּדֽוֹל
  chosen: great
  alternatives:
  - mighty
  - severe
  lexicon: HALOT
  rationale: גָּדוֹל is the standard adjective 'great.' Here it intensifies the scale
    of the destruction; 'great' is the most direct and idiomatic rendering.
