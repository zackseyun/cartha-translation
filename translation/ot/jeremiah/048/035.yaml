theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrine specifies 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of what is ended in Moab
  chosen_reading: the one who goes up to the high place and burns incense to his god
  alternative_readings:
  - high-place worship in general
  - the act of offering on the high place
  rationale: The Hebrew uses masculine singular participles, naturally read as a representative
    worshiper rather than abstract worship. English preserves this singular representative
    form rather than flattening it into an abstract noun.
  doctrine_reference: DOCTRINE.md Translation philosophy §§3, 4, 5
