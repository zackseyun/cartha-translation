id: JER.48.35
reference: Jeremiah 48:35
source:
  edition: WLC
  text: וְ/הִשְׁבַּתִּ֥י לְ/מוֹאָ֖ב נְאֻם יְהוָ֑ה מַעֲלֶ֣ה בָמָ֔ה וּ/מַקְטִ֖יר לֵ/אלֹהָֽי/ו־׃
translation:
  text: And I will put an end in Moab—oracle of the LORD—to the one who goes up to
    the high place and burns incense to his god.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And I will cause high-place worship to cease in Moab …' The Hebrew
      uses singular participles ('the one who goes up … and burns incense'), which
      may represent worshipers generically.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִשְׁבַּתִּי
  chosen: I will put an end
  alternatives:
  - I will cause to cease
  - I will stop
  lexicon: HALOT
  rationale: 'Hiphil of שׁבת here is causative: YHWH will cause a practice/person
    to cease. ''Put an end'' is idiomatic modern English that preserves the force
    without awkwardness.'
- source_word: לְמוֹאָב
  chosen: in Moab
  alternatives:
  - for Moab
  - from Moab
  lexicon: HALOT
  rationale: The preposition ל with a place/name after a verb of causing cessation
    can indicate sphere or reference. 'In Moab' best fits the sense that this cultic
    activity will be ended within Moab.
- source_word: נְאֻם יְהוָה
  chosen: oracle of the LORD
  alternatives:
  - declares the LORD
  - utterance of the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic formula. 'Oracle of the LORD' preserves the nominal
    force and solemn prophetic register. YHWH is rendered 'the LORD' per doctrine
    guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, יְהוָה is rendered 'the LORD'.
- source_word: מַעֲלֶה
  chosen: the one who goes up
  alternatives:
  - him who offers up
  - the offerer
  lexicon: HALOT
  rationale: The participle of עלה literally means 'going up.' In context with בָּמָה
    it refers to ascending to a high place for worship. Rendering it verbally preserves
    the imagery and avoids importing 'offer' from context alone.
- source_word: בָמָה
  chosen: the high place
  alternatives:
  - a high place
  - shrine
  lexicon: HALOT
  rationale: בָּמָה commonly denotes a cultic high place. The singular here is likely
    representative. 'High place' is the standard and sufficiently transparent rendering.
- source_word: וּמַקְטִיר
  chosen: and burns incense
  alternatives:
  - and makes offerings smoke
  - and offers up smoke
  lexicon: HALOT
  rationale: The Hiphil participle of קטר in cultic contexts commonly refers to burning
    incense or making sacrificial smoke ascend. With לֵאלֹהָיו and parallelism, 'burns
    incense' is the clearest concise rendering.
- source_word: לֵאלֹהָיו
  chosen: to his god
  alternatives:
  - to his gods
  - to his deity
  lexicon: HALOT
  rationale: Though אֱלֹהִים is morphologically plural, with 3ms suffix and in this
    context it functions as a singular referent, 'his god.' This avoids misleading
    English plurality where the Hebrew likely intends a singular deity.
