id: JER.48.4
reference: Jeremiah 48:4
source:
  edition: WLC
  text: נִשְׁבְּרָ֖ה מוֹאָ֑ב הִשְׁמִ֥יעוּ זְּעָקָ֖ה צעורי/ה׃
translation:
  text: Moab is shattered; her little ones have made a cry heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew צעוריה is difficult. It may mean 'her little ones' or 'her young
      ones'; some understand it differently, including as a reference to towns or,
      less likely here, to Zoar.
    reason: alternative_reading
lexical_decisions:
- source_word: נִשְׁבְּרָה
  chosen: is shattered
  alternatives:
  - is broken
  - has been broken
  lexicon: HALOT
  rationale: Niphal of שבר conveys being broken/shattered. 'Is shattered' gives vivid
    result-state English and fits prophetic judgment language better than the flatter
    'is broken.'
- source_word: מוֹאָב
  chosen: Moab
  rationale: Standard transliteration of the place/nation name.
- source_word: הִשְׁמִיעוּ
  chosen: have made ... heard
  alternatives:
  - have caused ... to be heard
  - have sounded
  lexicon: HALOT
  rationale: Hiphil of שמע means to cause to hear, announce, or make heard. Here with
    זעקה as object, the idiom is best represented by 'have made a cry heard,' preserving
    the causative force.
- source_word: זְּעָקָה
  chosen: a cry
  alternatives:
  - an outcry
  - a cry of distress
  lexicon: HALOT
  rationale: The noun denotes a cry/outcry, often of distress. 'A cry' is concise
    and natural; the distress sense is already implied by the context of devastation.
- source_word: צעוריה
  chosen: her little ones
  alternatives:
  - her young ones
  - her towns
  - Zoar as a place name
  lexicon: HALOT
  rationale: The ketiv/qere-like form is difficult, but from צעור/צעיר with 3fs suffix
    it most naturally yields 'her little ones' or 'her young ones,' referring to Moab's
    dependent population. This reading fits the feminine suffix back to Moab. Because
    some understand the form differently, alternatives are preserved in a footnote.
