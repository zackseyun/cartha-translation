id: JER.48.24
reference: Jeremiah 48:24
source:
  edition: WLC
  text: וְ/עַל קְרִיּ֖וֹת וְ/עַל בָּצְרָ֑ה וְ/עַ֗ל כָּל עָרֵי֙ אֶ֣רֶץ מוֹאָ֔ב הָ/רְחֹק֖וֹת
    וְ/הַ/קְּרֹבֽוֹת־־־׃
translation:
  text: and against Kerioth, and against Bozrah, and against all the cities of the
    land of Moab, the far and the near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the distant and the nearby,' referring to all the cities of Moab without
      exception.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: and against
  alternatives:
  - and upon
  - also against
  lexicon: HALOT
  rationale: The repeated preposition עַל with conjunction ו introduces successive
    objects of judgment in the larger oracle context; 'against' best conveys hostile
    direction in natural English.
- source_word: קְרִיּוֹת
  chosen: Kerioth
  alternatives:
  - Kerioths
  lexicon: HALOT
  rationale: Proper place name, so transliterated per project philosophy. Although
    the form is morphologically plural and related to 'towns/cities,' here it functions
    as a toponym.
- source_word: בָּצְרָה
  chosen: Bozrah
  lexicon: HALOT
  rationale: Proper place name, transliterated. This is the Moabite Bozrah in context,
    not translated as a common noun.
- source_word: כָּל עָרֵי אֶרֶץ מוֹאָב
  chosen: all the cities of the land of Moab
  alternatives:
  - all the cities in the land of Moab
  - every city of the land of Moab
  lexicon: HALOT
  rationale: A straightforward construct chain. 'Cities of the land of Moab' preserves
    the Hebrew structure while remaining idiomatic English.
- source_word: הָרְחֹקוֹת וְהַקְּרֹבוֹת
  chosen: the far and the near
  alternatives:
  - those far and near
  - the distant and the nearby
  lexicon: HALOT
  rationale: The feminine plural adjectives agree with 'cities.' The article on both
    adjectives supports a substantival adjectival expression. 'The far and the near'
    is concise and preserves the merism of totality; English readers understand the
    implied noun from the preceding phrase.
