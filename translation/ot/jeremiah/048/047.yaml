theological_decisions:
- issue: Scope of promised restoration for Moab
  chosen_reading: Render the text as a genuine future restoration oracle without specifying the mechanism or theological implications beyond the verse.
  alternative_readings:
  - A purely political reversal of national fortunes
  - An eschatological inclusion of the nations in God's mercy
  rationale: The Hebrew plainly promises future restoration for Moab, but the verse itself does not define whether this is immediate-historical, eschatological, or typological. The translation preserves the promise and the temporal phrase 'in the latter days' without importing a fuller doctrinal scheme.
  doctrine_reference: Preserve theological tension rather than resolve it.
