id: JER.48.47
reference: Jeremiah 48:47
source:
  edition: WLC
  text: וְ/שַׁבְתִּ֧י שְׁבוּת מוֹאָ֛ב בְּ/אַחֲרִ֥ית הַ/יָּמִ֖ים נְאֻם יְהוָ֑ה עַד הֵ֖נָּה מִשְׁפַּ֥ט מוֹאָֽב־־־׃ס
translation:
  text: Yet I will restore the fortunes of Moab in the latter days, declares Yahweh. Thus far is the judgment of Moab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bring back the captivity of Moab'; the Hebrew idiom can denote restoration from captivity or, more broadly, the restoring of fortunes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁבְתִּי
  chosen: Yet I will restore
  alternatives:
  - And I will restore
  - But I will restore
  - And I will bring back
  lexicon: HALOT
  rationale: The form from שוב in this idiom introduces a reversal after judgment. English 'restore' best captures the idiomatic sense with שְׁבוּת. 'Yet' reflects the adversative force in context after the oracles of doom, while still staying within the conjunction's range.
- source_word: שְׁבוּת
  chosen: the fortunes
  alternatives:
  - the captivity
  - the exiles
  - the state of captivity
  lexicon: HALOT
  rationale: In the collocation שוב שׁבות, the phrase commonly means 'restore the fortunes' or 'reverse the captivity.' For Moab as a nation, 'fortunes' is the most natural English idiom and avoids implying only literal return from exile where the phrase can denote broader restoration.
- source_word: מוֹאָב
  chosen: Moab
  rationale: Standard transliteration of the national name.
- source_word: בְּאַחֲרִית הַיָּמִים
  chosen: in the latter days
  alternatives:
  - in the days to come
  - in the end of days
  lexicon: HALOT
  rationale: This phrase often points to a future time from the speaker's perspective and can carry eschatological weight. 'In the latter days' preserves that biblical resonance better than a flatter paraphrase.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Declares the LORD' is idiomatic modern English and preserves the solemn prophetic force. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Required by the doctrine's contested-terms table for the divine name.
- source_word: עַד הֵנָּה
  chosen: Thus far
  alternatives:
  - Until here
  - Up to this point
  lexicon: HALOT
  rationale: This idiom marks the conclusion of the oracle section. 'Thus far' is concise and natural in English.
- source_word: מִשְׁפַּט
  chosen: the judgment
  alternatives:
  - the justice
  - the sentence
  lexicon: HALOT
  rationale: Here the noun refers to the judicial pronouncement/oracle against Moab rather than abstract justice. 'Judgment' best fits the context and standard prophetic usage.
