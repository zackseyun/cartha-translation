id: JER.48.5
reference: Jeremiah 48:5
source:
  edition: WLC
  text: כִּ֚י מַעֲלֵ֣ה ה/לחות בִּ/בְכִ֖י יַֽעֲלֶה בֶּ֑כִי כִּ֚י בְּ/מוֹרַ֣ד חוֹרֹנַ֔יִם
    צָרֵ֥י צַֽעֲקַת שֶׁ֖בֶר שָׁמֵֽעוּ־־׃
translation:
  text: For on the ascent of Luhith they go up weeping; for on the descent of Horonaim
    they have heard the distressing cry of destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew repeats the noun ''weeping'' in this line for emphasis: literally,
      ''with weeping he/one goes up—weeping.'''
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of the second line is difficult. Some understand it more literally
      as 'the enemies have heard a cry of destruction,' while others construe it as
      a 'distressing cry of destruction.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַעֲלֵה
  chosen: ascent
  alternatives:
  - slope
  - way up
  lexicon: HALOT
  rationale: Noun from עלה referring to an uphill approach or ascent. 'Ascent' preserves
    the topographical sense and pairs naturally with the following 'descent'.
- source_word: הַלֻּחוֹת
  chosen: Luhith
  alternatives:
  - the tablets (if read as common noun, unlikely here)
  lexicon: HALOT
  rationale: Proper place name in context, traditionally identified as Luhith. Transliteration
    follows the philosophy of transliterating names rather than translating them.
- source_word: בִּבְכִי ... בֶּכִי
  chosen: weeping
  alternatives:
  - with weeping
  - crying
  lexicon: HALOT
  rationale: The repeated noun בכי emphasizes lament. Rendering the first phrase adverbially
    ('weeping') and the second verbally within the clause avoids awkward English while
    preserving the repetition's force.
- source_word: יַעֲלֶה
  chosen: they go up
  alternatives:
  - one goes up
  - he goes up
  lexicon: HALOT
  rationale: Although morphologically 3ms, the verb functions impersonally/collectively
    in context, describing the fleeing people of Moab. English plural best conveys
    the sense.
- source_word: בְּמוֹרַד
  chosen: on the descent
  alternatives:
  - on the slope down
  - in the downhill pass
  lexicon: HALOT
  rationale: Topographical noun meaning descent/downward slope, intentionally contrasted
    with 'ascent' in the first colon.
- source_word: חוֹרֹנַיִם
  chosen: Horonaim
  lexicon: HALOT
  rationale: Place name; transliterated per translation philosophy.
- source_word: צָרֵי
  chosen: distressing
  alternatives:
  - adversaries of
  - narrow/anguished
  lexicon: HALOT
  rationale: The form is difficult. In context with 'cry of destruction' and the parallel
    in Isaiah 15:5, it is best taken adjectivally/adverbially to qualify the cry as
    one of distress rather than introducing a separate subject such as 'enemies.'
- source_word: צַעֲקַת
  chosen: cry
  alternatives:
  - outcry
  - shout
  lexicon: HALOT
  rationale: Standard rendering for a loud cry or outcry. 'Cry' is concise and natural
    in English.
- source_word: שֶׁבֶר
  chosen: destruction
  alternatives:
  - breaking
  - ruin
  - crash
  lexicon: HALOT
  rationale: In prophetic judgment context, the noun denotes ruin or collapse. 'Destruction'
    communicates the disaster clearly in modern English.
- source_word: שָׁמֵעוּ
  chosen: they have heard
  alternatives:
  - they hear
  - is heard
  lexicon: HALOT
  rationale: Qal perfect 3cp. The plural is retained, with an indefinite collective
    subject implied by context. Perfect rendered as English present perfect to fit
    the vivid report style.
