id: JER.48.43
reference: Jeremiah 48:43
source:
  edition: WLC
  text: פַּ֥חַד וָ/פַ֖חַת וָ/פָ֑ח עָלֶ֛י/ךָ יוֹשֵׁ֥ב מוֹאָ֖ב נְאֻם יְהוָֽה־׃
translation:
  text: Terror and the pit and the snare are upon you, inhabitant of Moab, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Fear and the pit and the snare are upon you.'
    reason: lexical_alternative
  - marker: b
    text: 'This triad echoes Isaiah 24:17: ''terror, pit, and snare.'''
    reason: cross_reference
lexical_decisions:
- source_word: פַּחַד
  chosen: Terror
  alternatives:
  - Fear
  - Dread
  lexicon: HALOT
  rationale: The noun denotes fear/dread in the sense of overwhelming terror. 'Terror' fits the prophetic judgment context and preserves the force of the triad.
- source_word: פַחַת
  chosen: the pit
  alternatives:
  - pitfall
  lexicon: HALOT
  rationale: In the fixed judgment formula 'fear, pit, and snare,' this term refers to a pit/trap into which one falls. 'The pit' is the most natural English rendering and matches the parallel expression in Isaiah 24:17.
- source_word: פָח
  chosen: the snare
  alternatives:
  - trap
  - net
  lexicon: HALOT
  rationale: The noun denotes a snare or trap, especially one used for catching. 'Snare' preserves the traditional triadic cadence and distinguishes it from 'pit'.
- source_word: עָלֶיךָ
  chosen: are upon you
  alternatives:
  - are against you
  - come upon you
  lexicon: HALOT
  rationale: The preposition עַל with 2ms suffix is most directly 'upon you.' Supplying 'are' yields idiomatic English while retaining the sense of impending judgment resting on or coming over the addressee.
- source_word: יוֹשֵׁב מוֹאָב
  chosen: inhabitant of Moab
  alternatives:
  - you who dwell in Moab
  - dweller in Moab
  lexicon: HALOT
  rationale: The singular participle with the place name functions vocatively, addressing Moab's resident population representatively. 'Inhabitant of Moab' is concise, natural, and preserves the singular representative form.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is idiomatic modern English and preserves the solemnity. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
