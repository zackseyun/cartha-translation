id: JER.48.25
reference: Jeremiah 48:25
source:
  edition: WLC
  text: נִגְדְּעָה֙ קֶ֣רֶן מוֹאָ֔ב וּ/זְרֹע֖/וֹ נִשְׁבָּ֑רָה נְאֻ֖ם יְהוָֽה׃
translation:
  text: The horn of Moab is cut off, and his arm is broken, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'horn' and 'arm' are metaphors for strength and power.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִגְדְּעָה
  chosen: is cut off
  alternatives:
  - has been cut down
  - is hewn off
  lexicon: HALOT
  rationale: The Niphal of גדע conveys being cut off or cut down. 'Is cut off' is
    idiomatic in English and fits the metaphor of power being removed.
- source_word: קֶרֶן
  chosen: horn
  alternatives:
  - strength
  - might
  lexicon: HALOT
  rationale: Literally 'horn.' In prophetic poetry it commonly symbolizes strength
    or power, but the metaphor is clear enough to preserve in the main text rather
    than flatten to an interpretation.
- source_word: מוֹאָב
  chosen: Moab
  rationale: Standard transliteration of the place/nation name.
- source_word: וּזְרֹעוֹ
  chosen: and his arm
  alternatives:
  - and its arm
  lexicon: HALOT
  rationale: זְרוֹעַ literally means 'arm' and often metaphorically denotes strength
    or military power. The 3ms suffix is naturally rendered 'his' for the personified
    nation Moab in English prophetic style.
- source_word: נִשְׁבָּרָה
  chosen: is broken
  alternatives:
  - has been broken
  - is shattered
  lexicon: HALOT
  rationale: The Niphal of שבר denotes being broken. 'Is broken' matches the parallel
    passive structure with 'is cut off' and preserves the poetic imagery.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is well rendered as 'declares the LORD' in readable
    modern English while preserving its solemn force. Per doctrine, יְהוָה is rendered
    'the LORD'.
