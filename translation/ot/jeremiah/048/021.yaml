id: JER.48.21
reference: Jeremiah 48:21
source:
  edition: WLC
  text: וּ/מִשְׁפָּ֥ט בָּ֖א אֶל אֶ֣רֶץ הַ/מִּישֹׁ֑ר אֶל חֹל֥וֹן וְ/אֶל יַ֖הְצָ/ה וְ/עַל
    מופעת־־־־׃
translation:
  text: And judgment has come upon the land of the plateau—upon Holon, and upon Jahzah,
    and upon Mephaath—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land of the plain' or 'the tableland.' The Hebrew term refers to
      level upland country.
    reason: lexical_alternative
  - marker: b
    text: Jahzah is also rendered 'Jahaz' in some English translations.
    reason: alternative_reading
lexical_decisions:
- source_word: וּמִשְׁפָּט
  chosen: And judgment
  alternatives:
  - And justice
  - And punishment
  lexicon: HALOT
  rationale: מִשְׁפָּט commonly means 'judgment/justice.' In this oracle of doom against
    Moab, the sense is not abstract justice but an enacted judicial sentence, so 'judgment'
    best preserves both the legal nuance and the context of coming calamity.
- source_word: בָּא
  chosen: has come
  alternatives:
  - came
  - is coming
  lexicon: HALOT
  rationale: The qatal form can be rendered as a completed action, and in prophetic
    discourse it often has a 'prophetic perfect' force. 'Has come' preserves the vivid
    certainty of the announced judgment without over-interpreting tense.
- source_word: אֶל אֶרֶץ הַמִּישֹׁר
  chosen: upon the land of the plateau
  alternatives:
  - to the land of the plain
  - against the tableland
  lexicon: HALOT
  rationale: מִּישׁוֹר denotes level country, tableland, or plateau. 'Plateau' is
    natural modern English and fits the Transjordanian topography better than the
    more traditional but potentially flatter 'plain.' The preposition אֶל after בוא
    in judgment contexts is idiomatically rendered 'upon' in English.
- source_word: חֹלֹן
  chosen: Holon
  alternatives:
  - Holon (city name)
  lexicon: HALOT
  rationale: This is a place name, so it is transliterated according to the translation
    philosophy rather than translated.
- source_word: יַהְצָה
  chosen: Jahzah
  alternatives:
  - Jahaz
  - Jahazah
  lexicon: HALOT
  rationale: The Hebrew form here supports 'Jahzah.' 'Jahaz' is a common English conventional
    form, but 'Jahzah' more closely reflects the consonantal form in this verse while
    remaining recognizable.
- source_word: מופעת
  chosen: Mephaath
  alternatives:
  - Mophaath
  lexicon: HALOT
  rationale: This is another place name and is therefore transliterated. 'Mephaath'
    is the standard English transliteration for this Moabite town.
- source_word: וְעַל
  chosen: and upon
  alternatives:
  - and against
  lexicon: HALOT
  rationale: The shift from אֶל to עַל is slight in this list context; 'and upon'
    keeps the repeated cadence of judgment falling on successive locations. 'Against'
    is possible but less consistent with the verse's rhythmic structure.
