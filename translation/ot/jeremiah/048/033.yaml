id: JER.48.33
reference: Jeremiah 48:33
source:
  edition: WLC
  text: וְ/נֶאֶסְפָ֨ה שִׂמְחָ֥ה וָ/גִ֛יל מִ/כַּרְמֶ֖ל וּ/מֵ/אֶ֣רֶץ מוֹאָ֑ב וְ/יַ֨יִן֙
    מִ/יקָבִ֣ים הִשְׁבַּ֔תִּי לֹֽא יִדְרֹ֣ךְ הֵידָ֔ד הֵידָ֖ד לֹ֥א הֵידָֽד־׃
translation:
  text: Joy and gladness have been gathered from the orchard land and from the land
    of Moab; I have made wine cease from the winepresses. No one will tread with a
    shout; the shout is no shout.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fruitful field.' The Hebrew karmel here refers to fertile, cultivated
      land, not the proper name Carmel.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shout here is the cry associated with grape-treading or harvest
      celebration.
    reason: cultural_note
  - marker: c
    text: 'The final clause is elliptical in Hebrew: literally, ''shout, shout—not
      shout,'' meaning the expected joyful vintage cry has ceased.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶאֶסְפָה
  chosen: have been gathered
  alternatives:
  - are taken away
  - have been removed
  lexicon: HALOT
  rationale: Niphal of אסף can denote being gathered in or removed. In context of
    joy and gladness disappearing, English 'have been gathered' preserves the metaphor
    while implying removal without over-paraphrasing.
- source_word: שִׂמְחָה
  chosen: joy
  alternatives:
  - gladness
  - mirth
  lexicon: HALOT
  rationale: Common term for joy/rejoicing. Paired with גיל, 'joy' here allows the
    second noun to be rendered distinctly.
- source_word: גִיל
  chosen: gladness
  alternatives:
  - rejoicing
  - exultation
  lexicon: HALOT
  rationale: Used alongside שִׂמְחָה as a near-synonym. 'Gladness' gives natural English
    variation while preserving the celebratory sense.
- source_word: כַּרְמֶל
  chosen: orchard land
  alternatives:
  - fruitful field
  - garden land
  lexicon: HALOT
  rationale: Here not Mount Carmel but common noun כרמל, denoting fertile or cultivated
    land. 'Orchard land' fits the agricultural and wine-producing context better than
    the more generic 'fruitful field.'
- source_word: אֶרֶץ מוֹאָב
  chosen: the land of Moab
  alternatives:
  - Moab
  lexicon: HALOT
  rationale: The construct explicitly includes 'land'; retaining it preserves the
    geographic scope of judgment.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering.
- source_word: יְקָבִים
  chosen: winepresses
  alternatives:
  - vats
  lexicon: HALOT
  rationale: Refers to receptacles/installations associated with pressing grapes.
    'Winepresses' is the most transparent and idiomatic rendering in this context.
- source_word: הִשְׁבַּתִּי
  chosen: I have made ... cease
  alternatives:
  - I have stopped
  - I have put an end to
  lexicon: HALOT
  rationale: Hiphil of שבת means to cause to cease. The first-person singular reflects
    the divine speaker in the oracle; 'made ... cease' is both accurate and readable.
- source_word: יִדְרֹךְ
  chosen: will tread
  alternatives:
  - will tread grapes
  - will press
  lexicon: HALOT
  rationale: The verb דרך in this setting refers to treading grapes. The object is
    implicit from context, so 'will tread' keeps the Hebrew terseness; the fuller
    sense is clear from 'winepresses.'
- source_word: הֵידָד
  chosen: shout
  alternatives:
  - vintage shout
  - cheering cry
  lexicon: HALOT
  rationale: The noun denotes a loud cry, often the jubilant shout associated with
    harvest or treading grapes. 'Shout' is concise in the main text; the harvest-specific
    nuance is preserved in a footnote.
- source_word: הֵידָד הֵידָד לֹא הֵידָד
  chosen: the shout is no shout
  alternatives:
  - it is a shout, but not a shout of joy
  - the vintage cry is not a vintage cry
  lexicon: HALOT
  rationale: 'The repeated noun with negation is elliptical and rhetorical. This rendering
    preserves the Hebrew''s terse wordplay: what sounds like a shout is not the expected
    joyful harvest cry.'
