theological_decisions:
- issue: Speaker implied by first-person singular הִשְׁבַּתִּי
  chosen_reading: The 'I' is the LORD speaking through the prophetic oracle.
  alternative_readings:
  - An unspecified prophetic/narrative first person
  rationale: Within the surrounding judgment oracle, the first-person singular is
    best understood as divine speech. This is a discourse-level identification, not
    an added doctrinal claim, and it justifies retaining 'I have made ... cease.'
  doctrine_reference: Original-language primacy over translation tradition; preserve
    what the text states without importing more.
