id: JER.48.39
reference: Jeremiah 48:39
source:
  edition: WLC
  text: אֵ֥יךְ חַ֨תָּה֙ הֵילִ֔ילוּ אֵ֛יךְ הִפְנָה עֹ֥רֶף מוֹאָ֖ב בּ֑וֹשׁ וְ/הָיָ֥ה
    מוֹאָ֛ב לִ/שְׂחֹ֥ק וְ/לִ/מְחִתָּ֖ה לְ/כָל סְבִיבָֽי/ו־־׃ס
translation:
  text: How shattered she is! Wail! How Moab has turned her back in shame! So Moab
    has become a laughingstock and a terror to all around her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a horror' or 'an object of dismay' for 'a terror.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'has turned the back/neck'; the Hebrew idiom expresses retreat
      or withdrawal in shame.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  chosen: How
  alternatives:
  - Alas, how
  - How indeed
  lexicon: HALOT
  rationale: Introduces an exclamatory lament, best rendered with English 'How' to
    preserve the poetic cry rather than smoothing into a mere statement.
- source_word: חַתָּה
  chosen: shattered
  alternatives:
  - broken down
  - dismayed
  lexicon: HALOT
  rationale: From חתת, conveying being broken or shattered. 'Shattered' fits the image
    of national collapse better than the more psychological 'dismayed' in this context.
- source_word: הֵילִילוּ
  chosen: Wail
  alternatives:
  - Howl
  - Lament
  lexicon: HALOT
  rationale: Imperative/plural call to mourn. 'Wail' is natural modern English and
    preserves the intensity without sounding overly archaic.
- source_word: הִפְנָה עֹרֶף
  chosen: has turned her back
  alternatives:
  - has turned the neck
  - has turned away
  lexicon: HALOT
  rationale: Hebrew idiom literally 'turned the neck/back of the neck,' meaning to
    turn away in retreat or disgrace. 'Turned her back' preserves the idiom in understandable
    English.
- source_word: מוֹאָב
  chosen: Moab
  rationale: Proper name transliterated according to the translation philosophy.
- source_word: בּוֹשׁ
  chosen: in shame
  alternatives:
  - ashamed
  - put to shame
  lexicon: HALOT
  rationale: 'The form functions adverbially/predicatively after the idiom: Moab has
    turned back in a state of shame. ''In shame'' reads smoothly in English while
    preserving the disgrace motif.'
- source_word: וְהָיָה
  chosen: has become
  alternatives:
  - will become
  - became
  lexicon: HALOT
  rationale: Though formally a qatal, in prophetic discourse it can summarize the
    resulting state. 'Has become' fits the lament's vivid portrayal of the judgment
    as realized.
- source_word: לִשְׂחֹק
  chosen: a laughingstock
  alternatives:
  - mockery
  - derision
  lexicon: HALOT
  rationale: Conveys the sense of being an object of ridicule. 'Laughingstock' is
    idiomatic and vivid in modern English.
- source_word: לִמְחִתָּה
  chosen: a terror
  alternatives:
  - a horror
  - an object of dismay
  lexicon: HALOT
  rationale: The noun can denote ruin, terror, or an object causing dismay. In parallel
    with 'laughingstock' and in context of surrounding nations' reaction, 'a terror'
    captures the shocking, cautionary effect.
- source_word: לְכָל סְבִיבָיו
  chosen: to all around her
  alternatives:
  - to all her neighbors
  - to all those around him
  lexicon: HALOT
  rationale: Literally 'to all around him/it.' Since Moab is personified as feminine
    in the verse ('she,' 'her back'), 'around her' preserves the personification and
    avoids over-specifying 'neighbors' where the Hebrew is broader.
