id: JER.48.30
reference: Jeremiah 48:30
source:
  edition: WLC
  text: אֲנִ֤י יָדַ֨עְתִּי֙ נְאֻם יְהוָ֔ה עֶבְרָת֖/וֹ וְ/לֹא כֵ֑ן בַּדָּ֖י/ו לֹא כֵ֥ן
    עָשֽׂוּ־־־׃
translation:
  text: I know his fury, declares the LORD, and it is not so; his boasts have accomplished
    nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'his lies are false; they have not done so,' or 'his empty talk has
      accomplished nothing.' The Hebrew of the final clause is difficult and compressed.
    reason: alternative_reading
lexical_decisions:
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I know well
  lexicon: HALOT
  rationale: 'Qal perfect 1cs can be rendered as a present state in prophetic declaration:
    YHWH''s settled knowledge of Moab is in view, not merely a past act of knowing.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic modern English
    and preserves the solemn prophetic force. YHWH is rendered 'the LORD' per doctrine
    guidance.
- source_word: עֶבְרָתוֹ
  chosen: his fury
  alternatives:
  - his wrath
  - his arrogance
  lexicon: HALOT
  rationale: The noun from עברה commonly denotes overflowing anger/wrath. In this
    context of judgment on Moab, 'fury' captures hostile rage. Some interpreters connect
    the line more broadly with Moab's pride, but the lexical core is anger/wrath.
- source_word: וְלֹא כֵן
  chosen: and it is not so
  alternatives:
  - but not so
  - and not so
  lexicon: HALOT
  rationale: כֵן here means 'thus/so.' The clause denies the validity of what follows
    or of Moab's self-assessment. 'It is not so' is clear English and preserves the
    terse rebuttal.
- source_word: בַּדָּיו
  chosen: his boasts
  alternatives:
  - his lies
  - his empty talk
  - his boastings
  lexicon: HALOT
  rationale: The noun בדים can mean empty talk, falsehoods, or boastful claims. In
    the immediate context of Moab's pride (vv. 29–30), 'his boasts' best fits the
    rhetorical flow while retaining the sense of emptiness.
- source_word: לֹא כֵן עָשׂוּ
  chosen: have accomplished nothing
  alternatives:
  - have not done so
  - have done nothing right
  - it has not been so done
  lexicon: HALOT
  rationale: Literally, 'they have not done so,' but the Hebrew is elliptical and
    difficult. Given the object 'his boasts/empty words,' the sense is that Moab's
    claims have not produced the reality claimed. 'Have accomplished nothing' conveys
    the idiomatic force in readable English.
