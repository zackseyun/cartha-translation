theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton and standard
    English Bible convention while preserving covenantal force.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpreting the difficult phrase בַּדָּיו לֹא כֵן עָשׂוּ
  chosen_reading: his boasts have accomplished nothing
  alternative_readings:
  - his lies are false; they have done nothing
  - his boastings are untrue; they have not done so
  rationale: The Hebrew is compressed and somewhat opaque. In context, the verse exposes
    the emptiness of Moab's proud claims. The chosen rendering preserves that sense
    without over-paraphrasing, while alternatives are preserved in a footnote.
