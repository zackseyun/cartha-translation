id: JER.48.18
reference: Jeremiah 48:18
source:
  edition: WLC
  text: רְדִ֤י מִ/כָּבוֹד֙ ישבי בַ/צָּמָ֔א יֹשֶׁ֖בֶת בַּת דִּיב֑וֹן כִּֽי שֹׁדֵ֤ד
    מוֹאָב֙ עָ֣לָה בָ֔/ךְ שִׁחֵ֖ת מִבְצָרָֽיִ/ךְ־־׃
translation:
  text: Come down from your glory and sit in thirst, inhabitant, daughter of Dibon,
    for the destroyer of Moab has come up against you; he has ruined your fortresses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sit in a thirsty place' / 'dwell in parched ground.' The Hebrew phrase
      may describe either thirst itself or the dry condition/location to which Dibon
      is reduced.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'daughter of Dibon,' a common prophetic personification of a city
      and its population as a woman.
    reason: cultural_note
lexical_decisions:
- source_word: רְדִי
  chosen: Come down
  alternatives:
  - Go down
  - Descend
  lexicon: HALOT
  rationale: Imperative feminine singular from ירד, addressed to the personified city.
    'Come down' is idiomatic English for a direct summons while preserving the downward
    movement.
- source_word: מִכָּבוֹד
  chosen: from your glory
  alternatives:
  - from glory
  - from honor
  lexicon: HALOT
  rationale: כָּבוֹד can denote glory, honor, or splendor. Here it refers to Dibon's
    exalted or comfortable status. 'Your glory' makes explicit in English the direct
    address to the city and preserves the image of being brought low.
- source_word: ישבי
  chosen: inhabitant
  alternatives:
  - you who dwell
  - dweller
  lexicon: HALOT
  rationale: Though morphologically unusual in the supplied table, in context this
    functions vocatively with the following feminine participle and appositional phrase.
    'Inhabitant' gives a natural singular address to the personified city.
- source_word: בַצָּמָא
  chosen: in thirst
  alternatives:
  - in thirstiness
  - in a thirsty place
  - in parched ground
  lexicon: HALOT
  rationale: צָמָא denotes thirst/dryness. The phrase contrasts with prior glory and
    likely depicts deprivation after judgment. 'In thirst' is concise and preserves
    the metaphor without over-interpreting the locale.
- source_word: יֹשֶׁבֶת בַּת דִּיבוֹן
  chosen: daughter of Dibon
  alternatives:
  - O daughter Dibon
  - inhabitant daughter of Dibon
  lexicon: HALOT
  rationale: The feminine participle plus 'daughter of Dibon' personifies the city.
    In English, 'daughter of Dibon' sufficiently carries the vocative city-personification;
    the separate participle is represented through 'inhabitant' earlier to avoid redundancy.
- source_word: שֹׁדֵד
  chosen: the destroyer
  alternatives:
  - the plunderer
  - the devastator
  - the spoiler
  lexicon: HALOT
  rationale: The participle denotes one who devastates or plunders. 'Destroyer' fits
    the military-judgment context and pairs well with the following ruin of fortresses.
- source_word: עָלָה בָךְ
  chosen: has come up against you
  alternatives:
  - has come up upon you
  - has attacked you
  lexicon: HALOT
  rationale: עלה with ב can describe an advancing attacker. 'Has come up against you'
    preserves the directional military idiom more closely than the more interpretive
    'has attacked you.'
- source_word: שִׁחֵת
  chosen: has ruined
  alternatives:
  - has destroyed
  - has laid waste
  lexicon: HALOT
  rationale: The verb means to ruin, destroy, corrupt. 'Has ruined' avoids unnecessary
    repetition with 'destroyer' while still conveying decisive devastation.
- source_word: מִבְצָרָיִךְ
  chosen: your fortresses
  alternatives:
  - your strongholds
  - your fortified places
  lexicon: HALOT
  rationale: מִבְצָר denotes a fortified place or stronghold. 'Fortresses' is clear
    modern English and suits the military setting.
