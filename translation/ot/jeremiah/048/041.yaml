id: JER.48.41
reference: Jeremiah 48:41
source:
  edition: WLC
  text: נִלְכְּדָה֙ הַ/קְּרִיּ֔וֹת וְ/הַ/מְּצָד֖וֹת נִתְפָּ֑שָׂה וְֽ֠/הָיָה לֵ֞ב גִּבּוֹרֵ֤י
    מוֹאָב֙ בַּ/יּ֣וֹם הַ/ה֔וּא כְּ/לֵ֖ב אִשָּׁ֥ה מְצֵרָֽה׃
translation:
  text: Kerioth has been captured, and the strongholds have been seized; and the heart
    of Moab’s warriors will be on that day like the heart of a woman in labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, “The cities have been captured,” if הַקְּרִיּוֹת is taken as
      a common noun rather than the place name Kerioth.
    reason: alternative_reading
lexical_decisions:
- source_word: הַקְּרִיּוֹת
  chosen: Kerioth
  alternatives:
  - the cities
  lexicon: HALOT
  rationale: Although the form can be understood appellatively as 'the cities,' in
    Jeremiah 48 it is best taken as the place name Kerioth, a known Moabite city,
    matching the oracle’s pattern of naming specific towns. The article likely belongs
    to the proper-name form in this context rather than requiring a generic rendering.
- source_word: נִלְכְּדָה
  chosen: has been captured
  alternatives:
  - is captured
  - was captured
  - has been taken
  lexicon: HALOT
  rationale: Niphal of לכד denotes being captured/taken. English present perfect conveys
    the prophetic announcement of a completed defeat in natural modern English while
    preserving the passive sense.
- source_word: הַמְּצָדוֹת
  chosen: the strongholds
  alternatives:
  - the fortresses
  - the mountain strongholds
  lexicon: HALOT
  rationale: The noun refers to fortified places or strongholds. 'Strongholds' is
    concise and natural, preserving the military sense without over-specifying topography.
- source_word: נִתְפָּשָׂה
  chosen: have been seized
  alternatives:
  - have been taken
  - have been captured
  lexicon: HALOT
  rationale: The passive of תפשׂ conveys being seized or taken. 'Seized' provides
    a slight distinction from the previous verb while retaining the parallel military
    imagery.
- source_word: לֵב
  chosen: the heart
  alternatives:
  - the courage
  - the inner resolve
  lexicon: HALOT
  rationale: Hebrew 'heart' commonly denotes inner disposition, courage, or resolve.
    The literal rendering 'heart' preserves the Hebrew image, while the simile clarifies
    the emotional force.
- source_word: גִּבּוֹרֵי מוֹאָב
  chosen: Moab’s warriors
  alternatives:
  - the mighty men of Moab
  - Moab’s mighty men
  lexicon: HALOT
  rationale: גִּבּוֹרִים in military contexts refers to warriors or mighty fighting
    men. 'Moab’s warriors' is natural modern English and preserves the martial sense
    better than the more archaic 'mighty men.'
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal idiom in prophetic literature. 'On that day' is idiomatic
    contemporary English and preserves the prophetic time marker.
- source_word: כְּלֵב אִשָּׁה מְצֵרָה
  chosen: like the heart of a woman in labor
  alternatives:
  - like the heart of a woman in childbirth
  - like the heart of a woman in anguish
  lexicon: HALOT
  rationale: The participle from צרר/צור in this form refers to a woman in labor or
    travail. 'In labor' is clear modern English and preserves the simile of intense
    fear and distress without paraphrasing it away.
