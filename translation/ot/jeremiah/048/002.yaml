id: JER.48.2
reference: Jeremiah 48:2
source:
  edition: WLC
  text: אֵ֣ין עוֹד֮ תְּהִלַּ֣ת מוֹאָב֒ בְּ/חֶשְׁבּ֗וֹן חָשְׁב֤וּ עָלֶ֨י/הָ֙ רָעָ֔ה
    לְכ֖וּ וְ/נַכְרִיתֶ֣/נָּה מִ/גּ֑וֹי גַּם מַדְמֵ֣ן תִּדֹּ֔מִּי אַחֲרַ֖יִ/ךְ תֵּ֥לֶךְ
    חָֽרֶב־׃
translation:
  text: 'There is no more praise for Moab. In Heshbon they have devised disaster against
    her: ‘Come, let us cut her off from being a nation.’ You too, Madmen, will be
    silenced; the sword will go after you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Heshbon and 'they have devised' echo one another in Hebrew, creating a wordplay
      between the city name and the verb for planning.
    reason: lexical_alternative
  - marker: b
    text: Madmen is likely a place-name. The Hebrew also sounds like 'be silent' or
      'be brought to silence,' reinforcing the judgment through wordplay.
    reason: cultural_note
lexical_decisions:
- source_word: תְּהִלַּת
  chosen: praise
  alternatives:
  - glory
  - renown
  - boasting
  lexicon: HALOT
  rationale: The noun denotes praise or renown. In this judgment context, 'There is
    no more praise for Moab' communicates the loss of Moab's celebrated status. 'Glory'
    is possible, but 'praise' stays closer to the lexical form while remaining natural
    English.
- source_word: בְּחֶשְׁבּוֹן
  chosen: In Heshbon
  alternatives:
  - Against Heshbon
  - At Heshbon
  lexicon: HALOT
  rationale: 'The preposition ב is best taken locatively here: the plotting occurs
    in Heshbon. This also preserves the likely wordplay between Heshbon and the following
    verb חָשְׁבוּ (''they have devised/planned'').'
- source_word: חָשְׁבוּ
  chosen: they have devised
  alternatives:
  - they have planned
  - they have thought up
  lexicon: HALOT
  rationale: The verb חשׁב commonly means to think, plan, or devise. 'Devised' fits
    hostile plotting and echoes the wordplay with Heshbon better than a flatter 'thought.'
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - harm
  - calamity
  lexicon: HALOT
  rationale: In prophetic judgment contexts, רָעָה often refers to calamity or disaster
    rather than moral evil. 'Disaster' best conveys intended destructive action against
    Moab.
- source_word: לְכוּ וְנַכְרִיתֶנָּה מִגּוֹי
  chosen: Come, let us cut her off from being a nation
  alternatives:
  - Go, and let us destroy her from being a nation
  - Come, let us wipe her out as a nation
  lexicon: HALOT
  rationale: The imperative plus cohortative gives quoted hostile speech. כרת in the
    Hiphil commonly means 'cut off.' The phrase מִגּוֹי is idiomatically rendered
    'from being a nation,' expressing national extinction rather than mere separation
    from a nation.
- source_word: מַדְמֵן
  chosen: Madmen
  alternatives:
  - Madmann
  - Dunghill (if taken as wordplay rather than place-name)
  lexicon: HALOT
  rationale: Best taken as a place-name in the oracle against Moab. The sound-play
    with the following verb is likely intentional, but the main text should preserve
    the toponym; the wordplay can be noted in a footnote.
- source_word: תִּדֹּמִּי
  chosen: will be silenced
  alternatives:
  - will be destroyed
  - will be still
  - will be brought to silence
  lexicon: HALOT
  rationale: From דמם, 'be silent, be still.' In judgment context it can imply stunned
    silence or destruction. 'Will be silenced' preserves the lexical sense while allowing
    the ominous force of the oracle.
- source_word: אַחֲרַיִךְ תֵּלֶךְ חָרֶב
  chosen: the sword will go after you
  alternatives:
  - the sword will pursue you
  - a sword will come behind you
  lexicon: HALOT
  rationale: A vivid personification of military destruction. 'The sword will go after
    you' is close to the Hebrew syntax and idiom; 'pursue you' is interpretive but
    possible.
- source_word: אֵין עוֹד
  chosen: There is no more
  alternatives:
  - No longer is there
  - There is nothing left of
  lexicon: HALOT
  rationale: This idiom marks cessation. 'There is no more' is concise and natural,
    introducing the end of Moab's renown.
