id: JER.48.6
reference: Jeremiah 48:6
source:
  edition: WLC
  text: נֻ֖סוּ מַלְּט֣וּ נַפְשְׁ/כֶ֑ם וְ/תִֽהְיֶ֕ינָה כַּ/עֲרוֹעֵ֖ר בַּ/מִּדְבָּֽר׃
translation:
  text: Flee! Escape with your lives, and be like a juniper in the wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'and be like Aroer in the wilderness.' The Hebrew עֲרוֹעֵר
      can be taken either as a place-name or as the name of a desert shrub; the simile
      with 'in the wilderness' favors the plant image here.
    reason: alternative_reading
  - marker: b
    text: The exact plant denoted by עֲרוֹעֵר is uncertain; possible renderings include
      'juniper,' 'tamarisk,' or more generally 'desert shrub.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֻסוּ
  chosen: Flee!
  alternatives:
  - Run!
  - Take flight!
  lexicon: HALOT
  rationale: Imperative plural from נוס, a direct command to flee. 'Flee' is concise,
    idiomatic, and preserves the urgency of the Hebrew imperative.
- source_word: מַלְּטוּ
  chosen: Escape
  alternatives:
  - Save
  - Deliver
  lexicon: HALOT
  rationale: Piel imperative plural from מלט, here functioning with נַפְשְׁכֶם to
    mean 'save/escape with your lives.' 'Escape' fits the flight context and avoids
    an awkwardly literal 'deliver your souls.'
- source_word: נַפְשְׁכֶם
  chosen: your lives
  alternatives:
  - yourselves
  - your souls
  lexicon: HALOT
  rationale: נֶפֶשׁ in survival contexts commonly means 'life' or 'self.' Here, with
    flight imperatives, 'your lives' is the most natural English rendering and best
    conveys the sense of preserving life.
- source_word: וְתִהְיֶינָה
  chosen: and be
  alternatives:
  - and become
  lexicon: HALOT
  rationale: Qal imperfect 2fp of היה used jussively/imperativally after the preceding
    commands. English idiom favors continuing the command sequence with 'and be.'
    The feminine plural form likely agrees with the addressees as a collective/city
    population rather than requiring a marked English distinction.
- source_word: כַּעֲרוֹעֵר
  chosen: like a juniper
  alternatives:
  - like Aroer
  - like a desert shrub
  - like a tamarisk
  lexicon: HALOT
  rationale: The noun is traditionally understood here as a plant/shrub rather than
    the place-name Aroer. In context with 'in the wilderness,' a solitary desert shrub
    image fits the simile. 'Juniper' is a conventional and readable rendering, though
    the exact species is uncertain.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness/desert land. 'Wilderness' preserves the biblical
    register while remaining natural English.
