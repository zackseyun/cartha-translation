id: JER.48.37
reference: Jeremiah 48:37
source:
  edition: WLC
  text: כִּ֤י כָל רֹאשׁ֙ קָרְחָ֔ה וְ/כָל זָקָ֖ן גְּרֻעָ֑ה עַ֤ל כָּל יָדַ֨יִם֙ גְּדֻדֹ֔ת
    וְ/עַל מָתְנַ֖יִם שָֽׂק־־־־׃
translation:
  text: For every head is bald, and every beard is cut off; on all the hands are gashes,
    and on the waist is sackcloth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on every hand are cuts.' The Hebrew idiom may refer broadly to the hands/arms
      marked by mourning gashes.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'loins'; rendered 'waist' for readable modern English while preserving
      the sense of sackcloth worn around the midsection.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the lament context; 'for' best
    preserves the causal/explanatory force in natural English.
- source_word: כָל רֹאשׁ קָרְחָה
  chosen: every head is bald
  alternatives:
  - every head has baldness
  - every head is shaven
  lexicon: HALOT
  rationale: קָרְחָה denotes baldness/shaving of the head, a mourning sign in context.
    'Is bald' is idiomatic English and preserves the resultative sense without over-specifying
    agency.
- source_word: וְכָל זָקָן גְּרֻעָה
  chosen: every beard is cut off
  alternatives:
  - every beard is clipped
  - every beard is shorn
  lexicon: HALOT
  rationale: גְּרֻעָה from גרע conveys being diminished/removed. In parallel with
    mourning practices, 'cut off' clearly communicates the beard's removal or trimming
    as a sign of grief.
- source_word: עַל כָּל יָדַיִם גְּדֻדֹת
  chosen: on all the hands are gashes
  alternatives:
  - on every hand are cuts
  - on all the hands are slash marks
  lexicon: HALOT
  rationale: גְּדֻדֹת refers to cuttings/incisions associated with mourning. 'Gashes'
    is vivid but still natural English; 'hands' follows the Hebrew literally, though
    it may idiomatically include forearms.
- source_word: וְעַל מָתְנַיִם שָׂק
  chosen: on the waist is sackcloth
  alternatives:
  - around the loins is sackcloth
  - on the hips is sackcloth
  lexicon: HALOT
  rationale: מָתְנַיִם refers to the loins/waist area. 'Waist' is more accessible
    modern English than 'loins' while preserving the image of sackcloth worn around
    the midsection in mourning.
