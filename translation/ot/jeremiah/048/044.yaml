theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of פְּקֻדָּה in a judgment oracle
  chosen_reading: punishment
  alternative_readings:
  - visitation
  - reckoning
  rationale: The immediate context is unavoidable disaster for Moab; therefore the term is best understood as punitive visitation. The alternative 'visitation' is preserved in a footnote because it is a common, more formal rendering that retains the broader semantic range.
