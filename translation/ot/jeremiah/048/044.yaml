id: JER.48.44
reference: Jeremiah 48:44
source:
  edition: WLC
  text: ה/ניס מִ/פְּנֵ֤י הַ/פַּ֨חַד֙ יִפֹּ֣ל אֶל הַ/פַּ֔חַת וְ/הָֽ/עֹלֶה֙ מִן הַ/פַּ֔חַת יִלָּכֵ֖ד בַּ/פָּ֑ח כִּֽי אָבִ֨יא אֵלֶ֧י/הָ אֶל מוֹאָ֛ב שְׁנַ֥ת פְּקֻדָּתָ֖/ם נְאֻם יְהוָֽה־־־־־׃
translation:
  text: He who flees from the terror will fall into the pit, and he who comes up from the pit will be caught in the snare; for I will bring upon her, upon Moab, the year of their punishment, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the year of their visitation' or 'the year of their reckoning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הניס
  chosen: he who flees
  alternatives:
  - the one fleeing
  - whoever flees
  lexicon: HALOT
  rationale: The participle functions substantivally, referring generically to any person fleeing. 'He who flees' preserves the singular masculine form and the proverbial style.
- source_word: הפחד
  chosen: the terror
  alternatives:
  - the dread
  - the fear
  lexicon: HALOT
  rationale: פַּחַד denotes dread/terror rather than mere subjective fear. 'Terror' best fits the context of inescapable judgment and preserves the wordplay with pit and snare.
- source_word: הפחת
  chosen: the pit
  alternatives:
  - the ditch
  lexicon: HALOT
  rationale: פַּחַת is a pit or trap-pit. 'Pit' is the standard concise rendering and maintains the triad terror/pit/snare.
- source_word: והעלה
  chosen: he who comes up
  alternatives:
  - the one who climbs out
  - he who escapes upward
  lexicon: HALOT
  rationale: The participle with article is again substantival. 'Comes up' is a natural rendering of עלה from the pit without overinterpreting the manner of escape.
- source_word: ילכד בפח
  chosen: will be caught in the snare
  alternatives:
  - will be captured in the trap
  - will be taken in the snare
  lexicon: HALOT
  rationale: פַּח commonly denotes a snare/trap. 'Snare' distinguishes it from the previous 'pit' and preserves the escalating trap imagery.
- source_word: כי אביא אליה
  chosen: for I will bring upon her
  alternatives:
  - for I will bring against her
  - for I will bring on her
  lexicon: HALOT
  rationale: The idiom with בוא + אל can mean to bring something upon someone. The feminine suffix refers to the land/entity of Moab. 'Upon her' is idiomatic in English and preserves the feminine pronominal reference.
- source_word: אל מואב
  chosen: upon Moab
  alternatives:
  - against Moab
  - to Moab
  lexicon: HALOT
  rationale: Though literally 'to Moab,' in context it specifies the target of the coming judgment. 'Upon Moab' fits the judgment idiom and aligns with the preceding 'upon her' as apposition.
- source_word: שנת פקדתם
  chosen: the year of their punishment
  alternatives:
  - the year of their visitation
  - the year of their reckoning
  lexicon: HALOT
  rationale: פְּקֻדָּה can mean visitation, oversight, or punishment in judgment contexts. Here the context is clearly punitive, so 'punishment' makes the sense plain. 'Year' is retained literally to preserve the temporal marker of appointed judgment.
- source_word: נאם יהוה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is readable modern English while preserving solemn prophetic force. YHWH is rendered 'the LORD' per doctrine guidelines.
