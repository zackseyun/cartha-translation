id: JER.48.40
reference: Jeremiah 48:40
source:
  edition: WLC
  text: כִּי כֹה֙ אָמַ֣ר יְהוָ֔ה הִנֵּ֥ה כַ/נֶּ֖שֶׁר יִדְאֶ֑ה וּ/פָרַ֥שׂ כְּנָפָ֖י/ו אֶל מוֹאָֽב־־׃
translation:
  text: 'For thus says Yahweh: Behold, like an eagle he swoops down and spreads his wings over Moab.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a vulture'; the Hebrew נֶשֶׁר can refer more broadly to a large bird of prey.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding statement; 'For' is the most natural discourse connector here.
- source_word: כֹה אָמַר יְהוָה
  chosen: thus says the LORD
  alternatives:
  - this is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal prophetic cadence, and יְהוָה is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Marks vivid attention to the coming image. 'Look' is readable modern English and preserves the deictic force without archaic tone.
- source_word: כַנֶּשֶׁר
  chosen: like an eagle
  alternatives:
  - like a vulture
  lexicon: HALOT
  rationale: נֶשֶׁר traditionally denotes a large bird of prey, often rendered 'eagle' in English Bible tradition and fitting the imagery of swift imperial attack. Because the zoological identification can also be 'vulture,' the alternative is preserved in a footnote.
- source_word: יִדְאֶה
  chosen: he swoops down
  alternatives:
  - he flies
  - he darts
  lexicon: HALOT
  rationale: The verb conveys airborne movement in a predatory, descending context. 'Swoops down' captures the force of the simile better than the flatter 'flies'.
- source_word: וּפָרַשׂ
  chosen: and spreads
  alternatives:
  - and stretches out
  lexicon: HALOT
  rationale: Describes extending the wings. Present tense in English works naturally in the vivid prophetic image alongside 'swoops down'.
- source_word: כְּנָפָיו
  chosen: his wings
  lexicon: HALOT
  rationale: Straightforward possessive plural; singular subject governs the pronoun.
- source_word: אֶל מוֹאָב
  chosen: over Moab
  alternatives:
  - against Moab
  - toward Moab
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to/toward,' with the image of wings being spread, English idiom favors 'over Moab.' This also conveys the threatening overshadowing implied by the simile.
