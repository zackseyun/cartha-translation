id: JER.48.11
reference: Jeremiah 48:11
source:
  edition: WLC
  text: שַׁאֲנַ֨ן מוֹאָ֜ב מִ/נְּעוּרָ֗י/ו וְ/שֹׁקֵ֥ט הוּא֙ אֶל שְׁמָרָ֔י/ו וְ/לֹֽא
    הוּרַ֤ק מִ/כְּלִי֙ אֶל כֶּ֔לִי וּ/בַ/גּוֹלָ֖ה לֹ֣א הָלָ֑ךְ עַל כֵּ֗ן עָמַ֤ד טַעְמ/וֹ֙
    בּ֔/וֹ וְ/רֵיח֖/וֹ לֹ֥א נָמָֽר־־־־׃ס
translation:
  text: Moab has been at ease from his youth, and he has been undisturbed on his dregs;
    he has not been poured from vessel to vessel, and he has not gone into exile.
    Therefore his taste has remained in him, and his scent has not changed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''on his lees.'' The Hebrew uses a wine-making image: wine left sitting
      on its sediment without being poured off.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁאֲנַן
  chosen: has been at ease
  alternatives:
  - has been complacent
  - has been secure
  - has been undisturbed
  lexicon: HALOT
  rationale: Conveys settled ease/security rather than merely emotional calm. 'At
    ease' fits the prophetic critique of Moab's long undisturbed condition and reads
    naturally in English.
- source_word: מִנְּעוּרָיו
  chosen: from his youth
  alternatives:
  - since his youth
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'From his youth' preserves the
    Hebrew idiom and the personification of Moab as masculine singular.
- source_word: שֹׁקֵט
  chosen: has been undisturbed
  alternatives:
  - is quiet
  - is at rest
  - is settled
  lexicon: HALOT
  rationale: Used predicatively of Moab's condition. 'Undisturbed' captures the idea
    of uninterrupted tranquility in context, complementing the wine metaphor that
    follows.
- source_word: אֶל שְׁמָרָיו
  chosen: on his dregs
  alternatives:
  - on his lees
  lexicon: HALOT
  rationale: The phrase refers to wine left sitting on its sediment. 'Dregs' is more
    accessible modern English than the traditional 'lees' while preserving the metaphor.
- source_word: הוּרַק
  chosen: has not been poured
  alternatives:
  - has not been emptied
  - has not been decanted
  lexicon: HALOT
  rationale: In the wine-making metaphor, the point is transfer from one container
    to another. 'Poured' is clear and idiomatic; 'decanted' is possible but too specialized.
- source_word: מִכְּלִי אֶל כֶּלִי
  chosen: from vessel to vessel
  alternatives:
  - from jar to jar
  - from container to container
  lexicon: HALOT
  rationale: Retains the concrete imagery with a dignified but understandable term.
    'Vessel' suits prophetic style better than 'container.'
- source_word: וּבַגּוֹלָה
  chosen: into exile
  alternatives:
  - into captivity
  lexicon: HALOT
  rationale: The noun denotes exile/deportation. 'Exile' is the standard modern rendering
    and fits Jeremiah's historical context.
- source_word: טַעְמוֹ
  chosen: his taste
  alternatives:
  - his flavor
  lexicon: HALOT
  rationale: Within the wine metaphor, the word refers to the wine's taste/flavor.
    'Taste' is slightly more literal and preserves the metaphor's sensory language.
- source_word: עָמַד ... בּוֹ
  chosen: has remained in him
  alternatives:
  - has stood in him
  - has stayed unchanged in him
  lexicon: HALOT
  rationale: The idiom expresses persistence or remaining unchanged. 'Has remained
    in him' communicates the result clearly while preserving the personified image.
- source_word: רֵיחוֹ
  chosen: his scent
  alternatives:
  - his aroma
  - his smell
  lexicon: HALOT
  rationale: Refers to odor/aroma in the wine metaphor. 'Scent' is neutral and natural
    English; 'aroma' may sound overly positive, while 'smell' can sound negative.
- source_word: נָמָר
  chosen: has not changed
  alternatives:
  - has not turned
  - has not been altered
  lexicon: HALOT
  rationale: The verb here means to change/alter. 'Has not changed' is the clearest
    rendering in contemporary English and fits the parallel with taste remaining the
    same.
