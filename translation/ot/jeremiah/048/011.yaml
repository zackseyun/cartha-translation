theological_decisions:
- issue: Personification of Moab with masculine singular pronouns
  chosen_reading: Retain masculine singular ('his youth,' 'his dregs,' 'his taste,'
    'his scent')
  alternative_readings:
  - Use neuter or plural forms for the nation
  rationale: The Hebrew consistently personifies Moab as a singular masculine entity.
    Retaining this preserves the literary force and matches the source text's grammar
    without importing additional interpretation.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
