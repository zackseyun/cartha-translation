id: JER.48.46
reference: Jeremiah 48:46
source:
  edition: WLC
  text: אוֹי לְ/ךָ֣ מוֹאָ֔ב אָבַ֖ד עַם כְּמ֑וֹשׁ כִּֽי לֻקְּח֤וּ בָנֶ֨י/ךָ֙ בַּ/שֶּׁ֔בִי
    וּ/בְנֹתֶ֖י/ךָ בַּ/שִּׁבְיָֽה־־־׃
translation:
  text: Woe to you, Moab! The people of Chemosh have perished, for your sons have
    been taken into captivity, and your daughters into exile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into captivity' for 'into exile'; the two Hebrew terms are near-synonyms
      and form a poetic parallel.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹי
  chosen: Woe
  alternatives:
  - Alas
  lexicon: HALOT
  rationale: An interjection of lament/judgment. 'Woe' preserves the prophetic tone
    and conventional force better than the softer 'Alas.'
- source_word: לְךָ מוֹאָב
  chosen: to you, Moab
  alternatives:
  - for you, Moab
  lexicon: HALOT
  rationale: 'The preposition ל marks the object of lament: ''Woe to you.'' ''Moab''
    is transliterated as a proper name per translation philosophy.'
- source_word: אָבַד
  chosen: have perished
  alternatives:
  - is destroyed
  - has perished
  lexicon: HALOT
  rationale: The verb denotes perishing/destruction. English present perfect 'have
    perished' works naturally with the collective subject 'people' and conveys completed
    ruin without over-specifying passive agency.
- source_word: עַם כְּמוֹשׁ
  chosen: the people of Chemosh
  alternatives:
  - the people of Kemosh
  - Chemosh's people
  lexicon: HALOT
  rationale: Construct chain meaning 'the people of Chemosh.' 'Chemosh' is the standard
    English transliteration of the Moabite deity's name. The phrase likely identifies
    Moab as the people belonging to or devoted to Chemosh.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here it introduces the ground/explanation for the lament. 'For' is concise
    and natural in English prophetic style.
- source_word: לֻקְּחוּ
  chosen: have been taken
  alternatives:
  - were taken
  - have been captured
  lexicon: HALOT
  rationale: Passive of לקח, 'to take.' 'Have been taken' preserves the passive and
    matches the resultative sense in context.
- source_word: בָנֶיךָ
  chosen: your sons
  alternatives:
  - your children (male)
  lexicon: HALOT
  rationale: Gender-accurate rendering of the masculine plural noun with 2ms suffix.
    The verse contrasts sons and daughters, so 'sons' should be retained.
- source_word: בַּשֶּׁבִי
  chosen: into captivity
  alternatives:
  - as captives
  - into the captivity
  lexicon: HALOT
  rationale: This noun commonly denotes captivity/captive state. 'Into captivity'
    is idiomatic English and preserves the sense of deportation.
- source_word: וּבְנֹתֶיךָ
  chosen: and your daughters
  alternatives:
  - and your female children
  lexicon: HALOT
  rationale: Gender-accurate rendering of the feminine plural noun with 2ms suffix,
    preserving the sons/daughters parallelism.
- source_word: בַּשִּׁבְיָה
  chosen: into exile
  alternatives:
  - into captivity
  - as exiles
  lexicon: HALOT
  rationale: Though closely related to the previous captivity term, this form can
    be rendered distinctly as 'exile' to preserve the poetic parallelism without flattening
    the line into exact repetition. The sense remains deportation/captivity.
