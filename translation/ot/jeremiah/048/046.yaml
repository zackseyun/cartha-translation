theological_decisions:
- issue: Reference to Chemosh in relation to Moab
  chosen_reading: the people of Chemosh
  alternative_readings:
  - Chemosh's people
  rationale: The Hebrew construct naturally links Moab's people with their national
    god Chemosh. The translation preserves the text's polemical-theological point
    without adding interpretation beyond the construct relationship.
  doctrine_reference: Preserve theological tension rather than resolve it; translate
    names by standard transliteration.
