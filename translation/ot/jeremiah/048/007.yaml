theological_decisions:
- issue: Referent and status of Chemosh
  chosen_reading: Chemosh is rendered as the named Moabite deity who is depicted as
    going into exile with his priests and officials.
  alternative_readings:
  - Chemosh as a place-name or dynastic title
  rationale: The plain sense in context is the Moabite god, personified in defeat.
    Translating the proper name directly preserves the polemical force of the prophecy
    without importing further theological commentary.
