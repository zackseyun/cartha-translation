id: JER.48.7
reference: Jeremiah 48:7
source:
  edition: WLC
  text: כִּ֠י יַ֣עַן בִּטְחֵ֤/ךְ בְּ/מַעֲשַׂ֨יִ/ךְ֙ וּ/בְ/א֣וֹצְרוֹתַ֔יִ/ךְ גַּם אַ֖תְּ
    תִּלָּכֵ֑דִי וְ/יָצָ֤א כמיש בַּ/גּוֹלָ֔ה כֹּהֲנָ֥י/ו וְ/שָׂרָ֖י/ו יחד־׃
translation:
  text: For because you trusted in your works and in your treasures, you also will
    be captured; and Chemosh will go out into exile, his priests and his officials
    together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your deeds.' The Hebrew word can refer broadly to works, acts, or
      what one has made.
    reason: lexical_alternative
  - marker: b
    text: Or 'in your wealth' or 'in your storehouses.'
    reason: lexical_alternative
  - marker: c
    text: Chemosh was the national god of Moab.
    reason: cultural_note
  - marker: d
    text: Or 'into captivity.'
    reason: lexical_alternative
  - marker: e
    text: Or 'his princes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי יַעַן
  chosen: For because
  alternatives:
  - Because
  - For on account of this that
  lexicon: HALOT
  rationale: The combination intensifies the causal force. 'For because' preserves
    the emphatic explanatory linkage better than reducing it to a single conjunction.
- source_word: בִּטְחֵךְ
  chosen: you trusted
  alternatives:
  - you have trusted
  - your trust was
  lexicon: HALOT
  rationale: Qal perfect 2fs of בטח denotes completed/reason-giving reliance. Simple
    past reads naturally in English while preserving the causal basis for judgment.
- source_word: בְּמַעֲשַׂיִךְ
  chosen: in your works
  alternatives:
  - in your deeds
  - in what you have made
  lexicon: HALOT
  rationale: מַעֲשֶׂה commonly means 'work, deed, act.' 'Works' is broad enough to
    include Moab's achievements or productions without over-specifying military or
    cultic activity.
- source_word: וּבְאֹצְרוֹתַיִךְ
  chosen: and in your treasures
  alternatives:
  - and in your storehouses
  - and in your wealth
  lexicon: HALOT
  rationale: אֹצָר can denote treasure, treasury, or storehouse. In parallel with
    misplaced trust, 'treasures' best conveys accumulated wealth/resources as the
    object of confidence.
- source_word: גַּם אַתְּ
  chosen: you also
  alternatives:
  - even you
  - you too
  lexicon: HALOT
  rationale: Marks emphatic inclusion of Moab in the coming judgment. 'You also' is
    natural and preserves the force.
- source_word: תִּלָּכֵדִי
  chosen: will be captured
  alternatives:
  - will be taken
  - will be seized
  lexicon: HALOT
  rationale: Niphal imperfect of לכד is passive/reflexive in sense. 'Will be captured'
    is the most direct military/judicial rendering.
- source_word: וְיָצָא
  chosen: and ... will go out
  alternatives:
  - and ... shall go forth
  - and ... will depart
  lexicon: HALOT
  rationale: Though morphologically a qatal form, in this prophetic sequence it functions
    futurally after the preceding imperfect. 'Will go out' fits the judgment context
    and English sequence.
- source_word: כמיש
  chosen: Chemosh
  alternatives:
  - Kemosh
  lexicon: HALOT
  rationale: This is the proper name of Moab's national god and should be transliterated
    per translation philosophy.
- source_word: בַּגּוֹלָה
  chosen: into exile
  alternatives:
  - into captivity
  - in exile
  lexicon: HALOT
  rationale: The phrase denotes deportation/exilic removal. 'Into exile' is idiomatic
    modern English and avoids archaic 'captivity' while preserving the sense.
- source_word: כֹּהֲנָיו
  chosen: his priests
  alternatives:
  - its priests
  lexicon: HALOT
  rationale: With Chemosh as the antecedent, the 3ms suffix is best rendered personally
    as 'his,' reflecting the personified deity in the text.
- source_word: וְשָׂרָיו
  chosen: and his officials
  alternatives:
  - and his princes
  - and his rulers
  lexicon: HALOT
  rationale: שַׂר can mean prince, official, ruler, commander. In parallel with priests
    attached to Chemosh's cult/state apparatus, 'officials' is broad and clear in
    modern English.
- source_word: יַחַד
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: Adverb summarizing the joint deportation of Chemosh, priests, and officials.
