id: JER.48.42
reference: Jeremiah 48:42
source:
  edition: WLC
  text: וְ/נִשְׁמַ֥ד מוֹאָ֖ב מֵ/עָ֑ם כִּ֥י עַל יְהוָ֖ה הִגְדִּֽיל־׃
translation:
  text: And Moab will be destroyed as a people, because he magnified himself against Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because he made himself great against the LORD,' that is, he exalted himself arrogantly against him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִשְׁמַד
  chosen: will be destroyed
  alternatives:
  - shall be destroyed
  - will be annihilated
  - will perish
  lexicon: HALOT
  rationale: Niphal perfect of שׁמד in prophetic discourse commonly has a future/resultative sense. 'Will be destroyed' is natural modern English and preserves the passive force without overstating total metaphysical annihilation.
- source_word: מוֹאָב
  chosen: Moab
  rationale: Standard transliteration of the nation/name.
- source_word: מֵעָם
  chosen: as a people
  alternatives:
  - from being a people
  - from among the peoples
  lexicon: HALOT
  rationale: The preposition מִן with עַם here expresses removal from the status/category of being a people. 'As a people' communicates that Moab ceases to exist as a distinct national entity. 'From among the peoples' is less likely because עַם is singular and indefinite here.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for judgment. 'Because' is clearer in contemporary English than 'for' while preserving the causal sense.
- source_word: עַל
  chosen: against
  alternatives:
  - over
  - toward
  lexicon: HALOT
  rationale: With הִגְדִּיל in this hostile context, עַל conveys opposition or arrogant exaltation directed against the LORD. 'Against' best captures the adversative force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הִגְדִּיל
  chosen: magnified himself
  alternatives:
  - made himself great
  - boasted
  - acted arrogantly
  lexicon: HALOT
  rationale: Hiphil of גדל here denotes self-exaltation/arrogance. 'Magnified himself' stays close to the Hebrew idiom while remaining understandable; the reflexive sense is supplied in English from the context of pride against the LORD.
