id: JER.43.5
reference: Jeremiah 43:5
source:
  edition: WLC
  text: וַ/יִּקַּ֞ח יוֹחָנָ֤ן בֶּן קָרֵ֨חַ֙ וְ/כָל שָׂרֵ֣י הַ/חֲיָלִ֔ים אֵ֖ת כָּל
    שְׁאֵרִ֣ית יְהוּדָ֑ה אֲשֶׁר שָׁ֗בוּ מִ/כָּל הַ/גּוֹיִם֙ אֲשֶׁ֣ר נִדְּחוּ שָׁ֔ם
    לָ/ג֖וּר בְּ/אֶ֥רֶץ יְהוּדָֽה־־־־־־׃
translation:
  text: Then Johanan son of Kareah, and all the commanders of the forces, took all
    the remnant of Judah who had returned from all the nations where they had been
    driven, to dwell in the land of Judah—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where they had been scattered.' The Hebrew verb can denote being driven
      away, banished, or dispersed.
    reason: lexical_alternative
  - marker: b
    text: Or 'to sojourn in the land of Judah.' The Hebrew verb often carries the
      nuance of residing as a temporary or dependent resident.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: Then ... took
  alternatives:
  - and ... took
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... took' gives natural
    English narrative sequence while preserving the action of לקח, 'take.'
- source_word: יוֹחָנָן בֶּן־קָרֵחַ
  chosen: Johanan son of Kareah
  alternatives:
  - Johanan the son of Kareah
  rationale: Personal names are transliterated by standard conventions per project
    philosophy. 'Son of' is retained as the normal Hebrew patronymic.
- source_word: שָׂרֵי הַחֲיָלִים
  chosen: the commanders of the forces
  alternatives:
  - the captains of the armies
  - the officers of the troops
  lexicon: HALOT
  rationale: שָׂרִים are leaders/commanders; חַיִל in this plural context refers to
    military forces. 'Commanders of the forces' is clear modern English and suitably
    military without sounding archaic.
- source_word: כָּל שְׁאֵרִית יְהוּדָה
  chosen: all the remnant of Judah
  alternatives:
  - all the rest of Judah
  - all the survivors of Judah
  lexicon: HALOT
  rationale: שְׁאֵרִית often carries the sense 'remnant,' especially in Jeremiah,
    and can bear both numerical and covenant-historical resonance. 'Remnant' preserves
    that lexical and thematic weight.
- source_word: אֲשֶׁר שָׁבוּ
  chosen: who had returned
  alternatives:
  - who returned
  lexicon: HALOT
  rationale: 'A past perfect in English best reflects the relative clause''s prior
    action in relation to the main verb: these are the people already returned before
    Johanan took them.'
- source_word: מִכָּל הַגּוֹיִם
  chosen: from all the nations
  alternatives:
  - from among all the nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers to foreign nations among which the Judeans had been
    scattered. 'From all the nations' is straightforward and idiomatic.
- source_word: אֲשֶׁר נִדְּחוּ שָׁם
  chosen: where they had been driven
  alternatives:
  - where they had been banished
  - where they had been scattered
  lexicon: HALOT
  rationale: נדח in the Niphal denotes being driven away/dispersed. 'Driven' preserves
    the force of compulsion better than the softer 'scattered,' while fitting the
    context of displacement.
- source_word: לָגוּר
  chosen: to dwell
  alternatives:
  - to sojourn
  - to live as resident aliens
  lexicon: HALOT
  rationale: גור often means to reside as a sojourner, but here the destination is
    their own land, so an overly technical 'sojourn' may mislead. 'To dwell' preserves
    the infinitive of purpose in natural English.
- source_word: בְּאֶרֶץ יְהוּדָה
  chosen: in the land of Judah
  alternatives:
  - in the land of Judea
  lexicon: HALOT
  rationale: אֶרֶץ יְהוּדָה is the territorial designation 'land of Judah.' 'Judah'
    is preferable to 'Judea' in this Hebrew Bible context.
