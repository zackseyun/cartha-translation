id: JER.43.11
reference: Jeremiah 43:11
source:
  edition: WLC
  text: ו/בא/ה וְ/הִכָּ֖ה אֶת אֶ֣רֶץ מִצְרָ֑יִם אֲשֶׁ֧ר לַ/מָּ֣וֶת לַ/מָּ֗וֶת וַ/אֲשֶׁ֤ר
    לַ/שְּׁבִי֙ לַ/שֶּׁ֔בִי וַ/אֲשֶׁ֥ר לַ/חֶ֖רֶב לֶ/חָֽרֶב־׃
translation:
  text: 'He will come and strike the land of Egypt: those for death, to death; those
    for captivity, to captivity; and those for the sword, to the sword.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whoever is for death, to death; whoever is for captivity, to captivity;
      and whoever is for the sword, to the sword.' The Hebrew uses a terse repeated
      judgment formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאָה
  chosen: He will come
  alternatives:
  - And he will come
  - Then he will come
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic sequence functions
    futurally after the prior context about the king of Babylon. English future best
    conveys the sense. The prefixed conjunction is not separately represented because
    English reads naturally without initial 'and' here.
- source_word: וְהִכָּה
  chosen: and strike
  alternatives:
  - and attack
  - and strike down
  lexicon: HALOT
  rationale: נכה commonly means 'strike, smite.' 'Strike' preserves the broad force
    without over-specifying the manner of attack. Combined with the previous verb,
    English idiom is 'will come and strike.'
- source_word: אֶת־אֶרֶץ מִצְרַיִם
  chosen: the land of Egypt
  alternatives:
  - the land Egypt
  - Egypt
  lexicon: HALOT
  rationale: Formal object marker is untranslated. 'Land of Egypt' preserves אֶרֶץ
    rather than reducing to simply 'Egypt,' since the phrase emphasizes the territory
    as the object of invasion/judgment.
- source_word: אֲשֶׁר לַמָּוֶת לַמָּוֶת
  chosen: those for death, to death
  alternatives:
  - whoever is for death, to death
  - those destined for death, to death
  lexicon: HALOT
  rationale: This terse distributive formula is intentionally repetitive and judicial.
    Retaining the repetition reflects the Hebrew cadence and severity. 'Those for
    death' is slightly more literal than 'destined for death,' while still intelligible
    in context.
- source_word: וַאֲשֶׁר לַשְּׁבִי לַשֶּׁבִי
  chosen: those for captivity, to captivity
  alternatives:
  - whoever is for captivity, to captivity
  - those for exile, to exile
  lexicon: HALOT
  rationale: שְׁבִי denotes captivity/captives. 'Captivity' fits the judgment formula
    and parallels the repeated structure. 'Exile' is possible but less exact here
    because the term emphasizes being taken captive.
- source_word: וַאֲשֶׁר לַחֶרֶב לֶחָרֶב
  chosen: those for the sword, to the sword
  alternatives:
  - whoever is for the sword, to the sword
  - those for war, to the sword
  lexicon: HALOT
  rationale: חֶרֶב is literally 'sword' and often metonymic for violent death in war.
    The literal rendering preserves the Hebrew idiom and the triadic parallelism.
