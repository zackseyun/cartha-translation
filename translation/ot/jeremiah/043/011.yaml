theological_decisions:
- issue: Referent of the singular subject
  chosen_reading: The subject is rendered as 'He,' referring in context to the king
    of Babylon as the agent of divine judgment.
  alternative_readings:
  - An impersonal rendering such as 'it will come'
  - An explicit rendering 'Nebuchadnezzar will come'
  rationale: The Hebrew verbal forms are singular masculine, and the immediate context
    identifies Nebuchadnezzar as the instrument. The translation keeps the pronoun
    rather than importing the proper name into the verse, preserving the source text
    while remaining clear from context.
