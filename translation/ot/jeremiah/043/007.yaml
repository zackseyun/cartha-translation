id: JER.43.7
reference: Jeremiah 43:7
source:
  edition: WLC
  text: וַ/יָּבֹ֨אוּ֙ אֶ֣רֶץ מִצְרַ֔יִם כִּ֛י לֹ֥א שָׁמְע֖וּ בְּ/ק֣וֹל יְהוָ֑ה וַ/יָּבֹ֖אוּ עַד תַּחְפַּנְחֵֽס־׃ס
translation:
  text: So they entered the land of Egypt, for they did not listen to the voice of Yahweh, and they came as far as Tahpanhes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not obey the voice of the LORD.' The Hebrew idiom 'did not listen to the voice of' can carry the sense of refusing obedience.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: entered
  alternatives:
  - came
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come' or 'enter.' With 'the land of Egypt' as its object, 'entered' is more idiomatic in English and reflects movement into a territory.
- source_word: אֶרֶץ מִצְרַיִם
  chosen: the land of Egypt
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'land of Egypt.' Retaining 'land of' preserves the territorial sense and the formal shape of the clause without sounding unnatural.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for their action. 'For' fits the explanatory function and reads naturally in a narrative context.
- source_word: לֹא שָׁמְעוּ בְּקוֹל
  chosen: did not listen to the voice of
  alternatives:
  - did not obey
  - did not heed the voice of
  lexicon: HALOT
  rationale: The idiom שׁמע בקול literally means 'listen to the voice of' and often carries the sense of obedience. The chosen rendering preserves the Hebrew imagery while allowing the implied disobedience to remain evident from context rather than being over-interpreted.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיָּבֹאוּ עַד
  chosen: they came as far as
  alternatives:
  - they came to
  - they reached
  lexicon: HALOT
  rationale: The combination of בוא with עַד marks extent or destination up to a point. 'Came as far as' best reflects the nuance of reaching that location.
- source_word: תַּחְפַּנְחֵס
  chosen: Tahpanhes
  alternatives:
  - Tahpanhes (Daphnae)
  lexicon: HALOT
  rationale: This is a place name, so transliteration is preferred. 'Tahpanhes' is the standard English form based on the Hebrew.
