id: JER.43.12
reference: Jeremiah 43:12
source:
  edition: WLC
  text: וְ/הִצַּ֣תִּי אֵ֗שׁ בְּ/בָתֵּי֙ אֱלֹהֵ֣י מִצְרַ֔יִם וּ/שְׂרָפָ֖/ם וְ/שָׁבָ֑/ם
    וְ/עָטָה֩ אֶת אֶ֨רֶץ מִצְרַ֜יִם כַּ/אֲשֶׁר יַעְטֶ֤ה הָֽ/רֹעֶה֙ אֶת בִּגְד֔/וֹ
    וְ/יָצָ֥א מִ/שָּׁ֖ם בְּ/שָׁלֽוֹם־־־׃
translation:
  text: And he will set fire to the temples of the gods of Egypt, and he will burn
    them and carry them away. He will wrap himself in the land of Egypt as a shepherd
    wraps himself in his garment, and he will go out from there in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And I will set fire to the temples of the gods of Egypt.'' The
      main text follows the surrounding context, where the king of Babylon is the
      acting subject.'
    reason: alternative_reading
  - marker: b
    text: Or 'take them captive.' The Hebrew may refer to carrying off the gods, their
      images, or temple treasures.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִצַּתִּי
  chosen: And he will set fire
  alternatives:
  - And I will kindle a fire
  - And he will kindle fire
  lexicon: HALOT
  rationale: 'The ketiv/qere-like issue in context points to Nebuchadnezzar as the
    acting subject in the sequence of 3ms verbs that follow, so English is rendered
    with a 3rd person subject for coherence: ''he will set fire.'' ''Set fire'' is
    idiomatic modern English and preserves the causative sense of יצת.'
- source_word: בְּבָתֵּי אֱלֹהֵי מִצְרַיִם
  chosen: to the temples of the gods of Egypt
  alternatives:
  - in the houses of the gods of Egypt
  - in the temples of Egypt's gods
  lexicon: HALOT
  rationale: בָּתֵּי literally means 'houses,' but in context of deities it refers
    to temple-shrines. 'Temples' communicates the referent clearly in natural English
    without undue paraphrase.
- source_word: וּשְׂרָפָם
  chosen: and he will burn them
  alternatives:
  - and burn them up
  lexicon: HALOT
  rationale: The suffix most naturally refers to the temples/idols associated with
    the gods of Egypt. 'Burn them' preserves the straightforward destructive action
    without adding intensity not explicit in the verb.
- source_word: וְשָׁבָם
  chosen: and carry them away
  alternatives:
  - and take them captive
  - and plunder them
  lexicon: HALOT
  rationale: The verb שבה in the Qal commonly means 'take captive/carry off.' Here,
    after burning the Egyptian sanctuaries, the likely sense is carrying off the gods/images
    or treasures. 'Carry them away' is broad enough to preserve the object ambiguity
    while fitting the context.
- source_word: וְעָטָה אֶת אֶרֶץ מִצְרַיִם
  chosen: He will wrap himself in the land of Egypt
  alternatives:
  - He will wrap the land of Egypt around himself
  - He will clothe himself with the land of Egypt
  lexicon: HALOT
  rationale: The idiom compares Egypt to a garment. Rendering with reflexive English
    ('wrap himself in') best captures the simile and the implied ease of possession/control.
- source_word: כַּאֲשֶׁר יַעְטֶה הָרֹעֶה אֶת בִּגְדוֹ
  chosen: as a shepherd wraps himself in his garment
  alternatives:
  - as a shepherd puts on his cloak
  - as a shepherd wraps his cloak around himself
  lexicon: HALOT
  rationale: The comparison explains the previous clause. 'Garment' is a sufficiently
    general equivalent for בגד while preserving the clothing metaphor. 'Wraps himself
    in' mirrors the same Hebrew verb for consistency.
- source_word: וְיָצָא מִשָּׁם בְּשָׁלוֹם
  chosen: and he will go out from there in peace
  alternatives:
  - and depart from there safely
  - and leave there unscathed
  lexicon: HALOT
  rationale: בְּשָׁלוֹם can denote peace, safety, or unharmed departure. 'In peace'
    is the more literal and biblically resonant rendering, while still implying secure
    departure in context.
