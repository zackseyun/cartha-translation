theological_decisions:
- issue: Subject of the opening verb וְהִצַּתִּי ('and I will set/kindle') versus
    the surrounding third-person sequence
  chosen_reading: 'Render the clause with Nebuchadnezzar as the continuing subject:
    ''And he will set fire...,'' while preserving the first-person alternative in
    a footnote.'
  alternative_readings:
  - And I will set fire to the temples of the gods of Egypt...
  rationale: The Masoretic consonantal/vocalized form is first person singular, but
    the immediate context and subsequent verbs are third person singular referring
    to the king of Babylon as the instrument of judgment. Many interpreters understand
    the sense as the LORD speaking of what Nebuchadnezzar will do. To preserve readability
    and discourse coherence in the main text, the translation follows the contextual
    subject, while documenting the more formal first-person possibility in a footnote.
  doctrine_reference: 'Translation philosophy #1, #3, #5'
