id: JER.43.13
reference: Jeremiah 43:13
source:
  edition: WLC
  text: וְ/שִׁבַּ֗ר אֶֽת מַצְּבוֹת֙ בֵּ֣ית שֶׁ֔מֶשׁ אֲשֶׁ֖ר בְּ/אֶ֣רֶץ מִצְרָ֑יִם
    וְ/אֶת בָּתֵּ֥י אֱלֹהֵֽי מִצְרַ֖יִם יִשְׂרֹ֥ף בָּ/אֵֽשׁ־־־׃ס
translation:
  text: He will shatter the pillars of Beth-shemesh that is in the land of Egypt,
    and he will burn the temples of the gods of Egypt with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sacred pillars' or 'standing stones.' The Hebrew term refers to cultic
      stone pillars.
    reason: lexical_alternative
  - marker: b
    text: Beth-shemesh means 'House of the Sun' and likely refers to the Egyptian
      city known in Greek as Heliopolis.
    reason: cultural_note
lexical_decisions:
- source_word: וְשִׁבַּר
  chosen: he will shatter
  alternatives:
  - and he will break
  - and he will smash
  lexicon: HALOT
  rationale: The verb שׁבר denotes breaking/shattering. 'Shatter' conveys decisive
    destruction in idiomatic modern English and fits the prophetic judgment context
    better than the flatter 'break.' The prefixed conjunction is naturally absorbed
    into English clause flow.
- source_word: מַצְּבוֹת
  chosen: pillars
  alternatives:
  - sacred pillars
  - standing stones
  lexicon: HALOT
  rationale: מַצֵּבָה commonly refers to cultic standing stones or pillars. 'Pillars'
    is concise and readable; the cultic sense is supplied by context (Beth-shemesh
    in Egypt, followed by temples of Egyptian gods). 'Sacred pillars' is possible
    but slightly interpretive, so preserved in a footnote.
- source_word: בֵּית שֶׁמֶשׁ
  chosen: Beth-shemesh
  alternatives:
  - House of the Sun
  lexicon: HALOT
  rationale: Per translation philosophy, personal/place names are transliterated by
    standard conventions. Although the name is semantically transparent ('House of
    the Sun'), a transliteration better preserves it as a toponym. The likely identification
    with Heliopolis can be noted in a footnote rather than imported into the main
    text.
- source_word: אֲשֶׁר בְּאֶרֶץ מִצְרָיִם
  chosen: that is in the land of Egypt
  alternatives:
  - which is in the land of Egypt
  - in the land of Egypt
  lexicon: HALOT
  rationale: This relative clause most naturally modifies Beth-shemesh, specifying
    the Egyptian location. 'That is in the land of Egypt' is clear modern English
    and preserves the syntax without overcompression.
- source_word: בָּתֵּי אֱלֹהֵי מִצְרַיִם
  chosen: the temples of the gods of Egypt
  alternatives:
  - the houses of the gods of Egypt
  - the shrines of the gods of Egypt
  lexicon: HALOT
  rationale: While בָּתִּים literally means 'houses,' in cultic context 'temples'
    best communicates the referent in natural English. 'Shrines' is possible but may
    suggest smaller structures than intended.
- source_word: יִשְׂרֹף בָּאֵשׁ
  chosen: he will burn ... with fire
  alternatives:
  - he will burn up
  - he will set ... on fire
  lexicon: HALOT
  rationale: The Hebrew explicitly includes both the verb 'burn' and the noun 'fire.'
    'Burn ... with fire' preserves the emphatic Hebrew expression without sounding
    overly archaic.
