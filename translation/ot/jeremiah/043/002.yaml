id: JER.43.2
reference: Jeremiah 43:2
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר עֲזַרְיָ֤ה בֶן הוֹשַֽׁעְיָה֙ וְ/יוֹחָנָ֣ן בֶּן קָרֵ֔חַ וְ/כָל הָ/אֲנָשִׁ֖ים הַ/זֵּדִ֑ים אֹמְרִ֣ים אֶֽל יִרְמְיָ֗הוּ שֶׁ֚קֶר אַתָּ֣ה מְדַבֵּ֔ר לֹ֣א שְׁלָחֲ/ךָ֞ יְהוָ֤ה אֱלֹהֵ֨י/נוּ֙ לֵ/אמֹ֔ר לֹֽא תָבֹ֥אוּ מִצְרַ֖יִם לָ/ג֥וּר שָֽׁם־־־־־׃
translation:
  text: Azariah son of Hoshaiah, Johanan son of Kareah, and all the arrogant men said to Jeremiah, “You are speaking falsely. Yahweh our God has not sent you to say, ‘Do not go to Egypt to sojourn there.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “You are speaking falsely” / “You are telling lies.” Hebrew literally, “A lie you are speaking.”
    reason: lexical_alternative
  - marker: b
    text: Or “insolent” or “presumptuous men.”
    reason: lexical_alternative
  - marker: c
    text: Or “to dwell there as foreigners.” The verb carries the sense of residing as a sojourner or foreigner.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר introducing direct speech; English 'said' is the natural equivalent.
- source_word: עֲזַרְיָה ... וְיוֹחָנָן ... וְכָל הָאֲנָשִׁים
  chosen: Azariah ... Johanan ... and all the ... men
  alternatives:
  - Azariah ... and Johanan ... and all the people
  lexicon: HALOT
  rationale: Proper names are transliterated per project philosophy. אֲנָשִׁים specifically means 'men,' not the broader 'people,' so the gendered term is retained.
- source_word: הַזֵּדִים
  chosen: arrogant
  alternatives:
  - insolent
  - presumptuous
  - proud
  lexicon: HALOT
  rationale: From זיד/זדד semantic field of acting proudly or presumptuously. 'Arrogant' is clear modern English and fits the hostile defiance in context.
- source_word: אֹמְרִים אֶל
  chosen: said to
  alternatives:
  - were saying to
  lexicon: HALOT
  rationale: The participle after the singular narrative verb functions collectively with the compound subject. English smooths this as a simple past, 'said to,' rather than a more awkward progressive.
- source_word: שֶׁקֶר אַתָּה מְדַבֵּר
  chosen: You are speaking a lie
  alternatives:
  - You are speaking falsely
  - It is a lie that you are speaking
  - You are telling lies
  lexicon: HALOT
  rationale: The Hebrew is literally 'a lie you are speaking.' 'You are speaking a lie' preserves the singular noun שקר and the direct accusation, while remaining idiomatic enough in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward construct with pronominal suffix; rendered naturally with covenantal force intact.
- source_word: שְׁלָחֲךָ
  chosen: has not sent you
  alternatives:
  - did not send you
  lexicon: HALOT
  rationale: Perfect verb in direct accusation can be rendered with English present perfect to stress the asserted fact with present relevance. 'Has not sent you' reads naturally in the speech context.
- source_word: לֵאמֹר
  chosen: to say
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Infinitive introducing quoted content; 'to say' is the most transparent English equivalent here.
- source_word: לֹא תָבֹאוּ
  chosen: You must not go
  alternatives:
  - Do not go
  - You shall not go
  lexicon: HALOT
  rationale: Second person plural imperfect after 'to say' conveys prohibition in reported speech. 'You must not go' communicates the force clearly in contemporary English without sounding archaic.
- source_word: מִצְרַיִם
  chosen: to Egypt
  lexicon: HALOT
  rationale: Standard place-name rendering.
- source_word: לָגוּר שָׁם
  chosen: to sojourn there
  alternatives:
  - to dwell there as foreigners
  - to reside there
  - to stay there
  lexicon: HALOT
  rationale: גור often denotes residing as an alien/sojourner rather than permanent settlement. 'Sojourn there' preserves that nuance better than the flatter 'stay there,' though a more explanatory alternative is possible.
