id: JER.43.4
reference: Jeremiah 43:4
source:
  edition: WLC
  text: וְ/לֹֽא שָׁמַע֩ יוֹחָנָ֨ן בֶּן קָרֵ֜חַ וְ/כָל שָׂרֵ֧י הַ/חֲיָלִ֛ים וְ/כָל
    הָ/עָ֖ם בְּ/ק֣וֹל יְהוָ֑ה לָ/שֶׁ֖בֶת בְּ/אֶ֥רֶץ יְהוּדָֽה־־־־׃
translation:
  text: But Johanan son of Kareah, and all the commanders of the forces, and all the
    people, did not listen to the voice of the LORD to remain in the land of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to the voice of the LORD''; the phrase can also carry the sense
      ''obey the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: But ... did not
  alternatives:
  - And ... did not
  - So ... did not
  lexicon: HALOT
  rationale: The conjunction plus negation continues the narrative with contrast to
    the preceding command; 'But' captures the adversative force in context better
    than a bare 'And,' while preserving the negation.
- source_word: שָׁמַע
  chosen: listen to
  alternatives:
  - obey
  - hear
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל often carries the sense of heeding or listening to
    a voice. 'Listen to' preserves the auditory idiom and leaves the implied disobedience
    clear from context without over-interpreting as 'obey' in the main text.
- source_word: יוֹחָנָן בֶּן־קָרֵחַ
  chosen: Johanan son of Kareah
  alternatives:
  - Johanan the son of Kareah
  rationale: Personal names are transliterated by standard conventions per translation
    philosophy. 'Son of' is the natural English rendering of the patronymic.
- source_word: שָׂרֵי הַחֲיָלִים
  chosen: the commanders of the forces
  alternatives:
  - the captains of the forces
  - the officers of the army
  - the commanders of the troops
  lexicon: HALOT
  rationale: שׂרים are leaders/officials; in military context 'commanders' is clear
    modern English. חֲיָלִים refers to military forces/troops. 'Forces' preserves
    the plural and avoids narrowing to a single formal 'army' if multiple units are
    in view.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - all the populace
  lexicon: HALOT
  rationale: A straightforward rendering of the collective noun with כָל. 'People'
    is natural and sufficiently broad.
- source_word: בְּקוֹל יְהוָה
  chosen: to the voice of the LORD
  alternatives:
  - to the LORD's voice
  - to the word of the LORD
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'to/at the voice of YHWH.' 'To the voice
    of the LORD' preserves the concrete imagery. 'Word of the LORD' would be interpretive
    rather than lexical here.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD.'
- source_word: לָשֶׁבֶת
  chosen: to remain
  alternatives:
  - to dwell
  - to live
  - to stay
  lexicon: HALOT
  rationale: The infinitive of ישׁב here expresses the commanded action of continuing
    residence in Judah. 'Remain' fits the context of not departing, more precisely
    than the broader 'dwell' or 'live.'
- source_word: בְּאֶרֶץ יְהוּדָה
  chosen: in the land of Judah
  alternatives:
  - in the land of Judea
  - in Judah
  lexicon: HALOT
  rationale: אֶרֶץ with Judah is best rendered 'the land of Judah,' preserving the
    territorial sense. 'Judea' would be anachronistic in this context.
