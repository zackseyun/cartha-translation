id: JER.43.6
reference: Jeremiah 43:6
source:
  edition: WLC
  text: אֶֽת הַ֠/גְּבָרִים וְ/אֶת הַ/נָּשִׁ֣ים וְ/אֶת הַ/טַּף֮ וְ/אֶת בְּנ֣וֹת הַ/מֶּלֶךְ֒
    וְ/אֵ֣ת כָּל הַ/נֶּ֗פֶשׁ אֲשֶׁ֤ר הִנִּ֨יחַ֙ נְבוּזַרְאֲדָ֣ן רַב טַבָּחִ֔ים אֶת
    גְּדַלְיָ֖הוּ בֶּן אֲחִיקָ֣ם בֶּן שָׁפָ֑ן וְ/אֵת֙ יִרְמְיָ֣הוּ הַ/נָּבִ֔יא וְ/אֶת
    בָּר֖וּךְ בֶּן נֵרִיָּֽהוּ־־־־־־־־־־־׃
translation:
  text: the men, the women, the little children, the king’s daughters, and every person
    whom Nebuzaradan the captain of the guard had left with Gedaliah son of Ahikam,
    son of Shaphan, and Jeremiah the prophet, and Baruch son of Neriah—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children'; Hebrew טַף can denote little ones or dependent children
      more broadly.
    reason: lexical_alternative
  - marker: b
    text: Or 'every soul.' Here 'soul' is a Hebrew way of referring to a person.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'chief of the slaughterers/executioners,' a title commonly rendered
      'captain of the guard.'
    reason: cultural_note
lexical_decisions:
- source_word: הַגְּבָרִים
  chosen: the men
  alternatives:
  - the soldiers
  - the males
  lexicon: HALOT
  rationale: גְּבָרִים commonly denotes men/males. In this list paired with women
    and children, 'the men' is the most natural and accurate social category.
- source_word: הַנָּשִׁים
  chosen: the women
  alternatives:
  - the wives
  lexicon: HALOT
  rationale: Straightforward rendering of נשים as 'women.' 'Wives' is too specific
    here and not demanded by the context.
- source_word: הַטַּף
  chosen: the little children
  alternatives:
  - the children
  - the dependents
  lexicon: HALOT
  rationale: טַף refers to small children or dependents. 'The little children' preserves
    the sense of young dependents in a family-group list.
- source_word: בְּנוֹת הַמֶּלֶךְ
  chosen: the king’s daughters
  alternatives:
  - the princesses
  lexicon: HALOT
  rationale: A literal rendering is preferable. 'Princesses' is possible but slightly
    interpretive; the Hebrew explicitly says 'daughters of the king.'
- source_word: כָּל הַנֶּפֶשׁ
  chosen: every person
  alternatives:
  - everyone
  - every soul
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to persons/lives rather than the immaterial soul.
    'Every person' is idiomatic English while preserving the distributive force of
    כָּל.
- source_word: הִנִּיחַ
  chosen: had left
  alternatives:
  - had entrusted
  - had placed
  lexicon: HALOT
  rationale: In context, the verb means Nebuzaradan left these people in Gedaliah's
    charge. 'Had left' is the plainest contextual rendering.
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - the chief of the executioners
  - the chief butcher
  lexicon: HALOT
  rationale: This title is an established Neo-Babylonian court/military office. 'Captain
    of the guard' best conveys the official role in readable English; more literal
    options are possible but misleading in modern usage.
- source_word: אֶת גְּדַלְיָהוּ...
  chosen: with Gedaliah son of Ahikam, son of Shaphan
  alternatives:
  - under Gedaliah son of Ahikam, son of Shaphan
  - in the care of Gedaliah son of Ahikam, son of Shaphan
  lexicon: HALOT
  rationale: The object marker plus context after הִנִּיחַ indicates the people were
    left in relation to Gedaliah's oversight. 'With Gedaliah' is concise and natural,
    while the broader sentence context supplies the custodial sense.
- source_word: יִרְמְיָהוּ הַנָּבִיא
  chosen: Jeremiah the prophet
  lexicon: HALOT
  rationale: Standard rendering of the proper name plus title; the title is retained
    because it is explicit in the Hebrew.
- source_word: בָּרוּךְ בֶּן נֵרִיָּהוּ
  chosen: Baruch son of Neriah
  alternatives:
  - Baruch the son of Neriah
  lexicon: HALOT
  rationale: Personal names are transliterated, and 'son of' is retained as the normal
    Hebrew patronymic.
