theological_decisions:
- issue: Nebuchadnezzar as עַבְדִּי
  chosen_reading: Rendered "my servant" as an instrument used by God for judgment, without implying covenant faithfulness or moral approval.
  alternative_readings:
  - '"my slave" to stress subordination'
  - interpretive paraphrases such as "my agent"
  rationale: 'The text presents a pagan king as under God''s sovereign use. "My servant" preserves the theological tension: Nebuchadnezzar is truly God''s instrument, yet the wording does not endorse him spiritually. This avoids importing doctrinal claims beyond the text.'
  doctrine_reference: Preserve theological tension rather than resolve it.
