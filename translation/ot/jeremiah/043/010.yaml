id: JER.43.10
reference: Jeremiah 43:10
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֡ם כֹּֽה אָמַר֩ יְהוָ֨ה צְבָא֜וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֗ל הִנְ/נִ֤י שֹׁלֵ֨חַ֙ וְ֠/לָקַחְתִּי אֶת נְבוּכַדְרֶאצַּ֤ר מֶֽלֶךְ בָּבֶל֙ עַבְדִּ֔/י וְ/שַׂמְתִּ֣י כִסְא֔/וֹ מִ/מַּ֛עַל לָ/אֲבָנִ֥ים הָ/אֵ֖לֶּה אֲשֶׁ֣ר טָמָ֑נְתִּי וְ/נָטָ֥ה אֶת שפרור/ו עֲלֵי/הֶֽם־־־־׃
translation:
  text: 'And say to them, ‘Thus says Yahweh of hosts, the God of Israel: Behold, I am sending and will take Nebuchadnezzar king of Babylon, my servant, and I will set his throne above these stones that I have hidden, and he will spread his canopy over them.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "his pavilion," "his royal tent," or possibly another term for a covering spread by a king."
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: '"Hosts" is the established and still comprehensible rendering in the title יְהוָה צְבָאוֹת; "armies" is possible but narrower and less idiomatic in this divine title.'
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic force and solemnity of the deictic announcement without sounding archaic beyond recognition.
- source_word: שֹׁלֵחַ
  chosen: I am sending
  alternatives:
  - I send
  - I am about to send
  lexicon: HALOT
  rationale: The participle after הִנְנִי conveys imminent or vivid present-future action; "I am sending" captures that aspect naturally in English.
- source_word: וְלָקַחְתִּי
  chosen: and will take
  alternatives:
  - and I will bring
  - and I will fetch
  lexicon: HALOT
  rationale: The verb literally means "take"; in context it refers to summoning or bringing Nebuchadnezzar for God's purpose, but "take" best preserves the source wording.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although the term can denote a slave, here it identifies Nebuchadnezzar as an instrument in God's service rather than emphasizing bonded status; "servant" is the more contextually fitting English gloss.
- source_word: כִסְאוֹ
  chosen: his throne
  alternatives:
  - his seat
  lexicon: HALOT
  rationale: In royal context כִּסֵּא clearly refers to a throne, not merely a seat.
- source_word: מִמַּעַל לָאֲבָנִים הָאֵלֶּה
  chosen: above these stones
  alternatives:
  - over these stones
  - upon these stones
  lexicon: HALOT
  rationale: The phrase indicates position over the stones Jeremiah had hidden; "above" is a natural rendering that preserves the spatial sense.
- source_word: טָמָנְתִּי
  chosen: I have hidden
  alternatives:
  - I buried
  - I concealed
  lexicon: HALOT
  rationale: The verb denotes hiding or concealing; "hidden" fits the immediate narrative of Jeremiah concealing stones.
- source_word: שפרורו
  chosen: his canopy
  alternatives:
  - his pavilion
  - his royal tent
  - his spread
  lexicon: HALOT
  rationale: This rare word likely refers to a covering, canopy, or pavilion spread by a king. "Canopy" is clear modern English and fits the image of royal occupation. Because the term is rare and somewhat uncertain, alternatives are preserved in a footnote.
- source_word: וְנָטָה
  chosen: and he will spread
  alternatives:
  - and he will stretch out
  - and he will pitch
  lexicon: HALOT
  rationale: The verb means to stretch out or spread. With a covering object, "spread" is the most idiomatic English choice.
