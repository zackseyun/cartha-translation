id: JER.43.8
reference: Jeremiah 43:8
source:
  edition: WLC
  text: וַ/יְהִ֤י דְבַר יְהוָה֙ אֶֽל יִרְמְיָ֔הוּ בְּ/תַחְפַּנְחֵ֖ס לֵ/אמֹֽר־־׃
translation:
  text: Then the word of the LORD came to Jeremiah in Tahpanhes, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And it happened, the word of the LORD came ...'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a new narrative event. In English,
    'Then ... came' naturally conveys the transition without archaic phrasing like
    'it came to pass.'
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Word' preserves the formal and
    theological resonance of divine speech better than the more interpretive 'message.'
    'YHWH' is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The divine name is rendered 'the LORD' in keeping with the project's
    stated default for יְהוָה.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks the recipient of the divine word; 'to' is the natural
    English equivalent here.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: בְּתַחְפַּנְחֵס
  chosen: in Tahpanhes
  alternatives:
  - at Tahpanhes
  lexicon: HALOT
  rationale: The prefixed ב marks location. 'In Tahpanhes' is the most straightforward
    rendering for the place where the word came to Jeremiah.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thus saying
  lexicon: HALOT
  rationale: This infinitive introduces the content of the divine speech in the following
    verse. 'Saying' is concise and standard in English prophetic narrative.
