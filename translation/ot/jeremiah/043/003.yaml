id: JER.43.3
reference: Jeremiah 43:3
source:
  edition: WLC
  text: כִּ֗י בָּרוּךְ֙ בֶּן נֵ֣רִיָּ֔ה מַסִּ֥ית אֹתְ/ךָ֖ בָּ֑/נוּ לְמַעַן֩ תֵּ֨ת
    אֹתָ֤/נוּ בְ/יַֽד הַ/כַּשְׂדִּים֙ לְ/הָמִ֣ית אֹתָ֔/נוּ וּ/לְ/הַגְל֥וֹת אֹתָ֖/נוּ
    בָּבֶֽל־־׃
translation:
  text: For Baruch son of Neriah is inciting you against us, in order to hand us over
    into the hand of the Chaldeans, to put us to death and to carry us away into exile
    to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'is stirring you up against us' / 'is instigating you against us.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''into the hand of the Chaldeans,'' an idiom for being delivered
      into their power.'
    reason: cultural_note
  - marker: c
    text: Or 'to exile us to Babylon' or 'to deport us to Babylon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the accusation made in context. 'For' fits
    the explanatory force in English and preserves the connection to the preceding
    refusal.
- source_word: בָּרוּךְ בֶּן נֵרִיָּה
  chosen: Baruch son of Neriah
  alternatives:
  - Baruch the son of Neriah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per translation
    philosophy. 'Son of' is the natural English rendering of the patronymic.
- source_word: מַסִּית
  chosen: is inciting
  alternatives:
  - is stirring up
  - is instigating
  - is persuading
  lexicon: HALOT
  rationale: The Hiphil participle of סות carries the sense of inciting or instigating
    someone against another. 'Is inciting' preserves the hostile, manipulative nuance
    better than the softer 'persuading'.
- source_word: אֹתְךָ בָּנוּ
  chosen: you against us
  alternatives:
  - you concerning us
  - you against us all
  lexicon: HALOT
  rationale: 'The construction conveys hostile direction: Baruch is alleged to be
    turning Jeremiah against the speakers. ''Against us'' is the idiomatic and contextual
    sense.'
- source_word: לְמַעַן
  chosen: in order to
  alternatives:
  - so that
  - for the purpose of
  lexicon: HALOT
  rationale: Marks purpose. 'In order to' is clear modern English and preserves the
    intentional force.
- source_word: תֵּת אֹתָנוּ
  chosen: hand us over
  alternatives:
  - give us over
  - deliver us
  lexicon: HALOT
  rationale: With the following phrase 'into the hand of,' the idiom means to surrender
    or hand over. 'Hand us over' is idiomatic and preserves the legal/hostile sense.
- source_word: בְיַד הַכַּשְׂדִּים
  chosen: into the hand of the Chaldeans
  alternatives:
  - into the power of the Chaldeans
  - to the Chaldeans
  lexicon: HALOT
  rationale: The Hebrew idiom 'into the hand of' is common and significant; retaining
    'hand' preserves the source texture while remaining understandable. 'Chaldeans'
    is the standard rendering of כַּשְׂדִּים in Jeremiah.
- source_word: לְהָמִית אֹתָנוּ
  chosen: to put us to death
  alternatives:
  - to kill us
  - to cause us to die
  lexicon: HALOT
  rationale: The Hiphil infinitive of מות means to cause death. 'Put us to death'
    is slightly more formal than 'kill us' and fits the judicial/hostile context of
    being handed over.
- source_word: וּלְהַגְלוֹת אֹתָנוּ
  chosen: to carry us away into exile
  alternatives:
  - to exile us
  - to deport us
  lexicon: HALOT
  rationale: The Hiphil of גלה in this context refers to forced removal into exile.
    'Carry us away into exile' preserves both the motion and the exile concept more
    fully than the shorter 'exile us.'
- source_word: בָּבֶל
  chosen: to Babylon
  alternatives:
  - into Babylon
  lexicon: HALOT
  rationale: Destination after the exile verb is naturally rendered 'to Babylon' in
    English.
