id: JER.43.9
reference: Jeremiah 43:9
source:
  edition: WLC
  text: קַ֣ח בְּ/יָדְ/ךָ֞ אֲבָנִ֣ים גְּדֹל֗וֹת וּ/טְמַנְתָּ֤/ם בַּ/מֶּ֨לֶט֙ בַּ/מַּלְבֵּ֔ן
    אֲשֶׁ֛ר בְּ/פֶ֥תַח בֵּית פַּרְעֹ֖ה בְּ/תַחְפַּנְחֵ֑ס לְ/עֵינֵ֖י אֲנָשִׁ֥ים יְהוּדִֽים־׃
translation:
  text: Take large stones in your hand and hide them in the mortar, in the brick pavement
    that is at the entrance of Pharaoh’s house in Tahpanhes, before the eyes of the
    Jewish men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bury them' for 'hide them'; the Hebrew verb can denote concealing by
      placing something in the ground or structure.
    reason: lexical_alternative
  - marker: b
    text: Or 'brickwork,' 'brick terrace,' or possibly 'brick kiln' for 'brick pavement';
      the Hebrew term is rare and its precise architectural sense is uncertain.
    reason: lexical_alternative
  - marker: c
    text: Or 'Judean men.' The Hebrew adjective can refer either to Jews/Judahites
      ethnically or to people of Judah more specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַח
  chosen: Take
  alternatives:
  - Pick up
  lexicon: HALOT
  rationale: Imperative of לקח, straightforward command to take or pick up. 'Take'
    is the natural, concise English imperative.
- source_word: בְּיָדְךָ
  chosen: in your hand
  alternatives:
  - with your hand
  - in your hands
  lexicon: HALOT
  rationale: Singular 'hand' matches the Hebrew form. English idiom allows singular
    here; it conveys personal agency and physical possession.
- source_word: אֲבָנִים גְּדֹלוֹת
  chosen: large stones
  alternatives:
  - great stones
  - big stones
  lexicon: HALOT
  rationale: '''Large stones'' is clear modern English and preserves the physical
    size emphasis without sounding archaic.'
- source_word: וּטְמַנְתָּם
  chosen: hide them
  alternatives:
  - bury them
  - embed them
  lexicon: HALOT
  rationale: The verb טמן commonly means to hide or conceal by placing out of sight,
    often in the ground. 'Hide them' preserves the broader sense; 'bury' is possible
    but slightly more specific than the verb itself.
- source_word: בַּמֶּלֶט
  chosen: in the mortar
  alternatives:
  - in the clay
  - in the cement
  lexicon: HALOT
  rationale: מלט here most naturally refers to mortar or plaster-like building material.
    'Mortar' best fits the construction context and avoids anachronistic 'cement'.
- source_word: בַּמַּלְבֵּן
  chosen: in the brick pavement
  alternatives:
  - in the brickwork
  - in the brick terrace
  - in the brick kiln
  lexicon: HALOT
  rationale: מַלְבֵּן is difficult and has been rendered variously. In this context
    at the entrance of Pharaoh's house, a built brick structure or paved area is more
    likely than a kiln. 'Brick pavement' fits the location and the action of concealing
    stones in mortar there, while preserving the architectural sense.
- source_word: אֲשֶׁר בְּפֶתַח בֵּית פַּרְעֹה
  chosen: that is at the entrance of Pharaoh’s house
  alternatives:
  - which is at the doorway of Pharaoh’s palace
  lexicon: HALOT
  rationale: '''Entrance'' is natural for פתח. ''House of Pharaoh'' can be rendered
    literally, but in English ''Pharaoh’s house'' is clear and idiomatic; ''palace''
    is interpretive, so the more literal ''house'' is retained.'
- source_word: בְּתַחְפַּנְחֵס
  chosen: in Tahpanhes
  lexicon: HALOT
  rationale: Standard transliteration of the place name, following the philosophy
    of transliterating names.
- source_word: לְעֵינֵי
  chosen: before the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This idiom emphasizes visible public action. 'Before the eyes of' preserves
    the vividness of the Hebrew better than the flatter 'before'.
- source_word: אֲנָשִׁים יְהוּדִים
  chosen: the Jewish men
  alternatives:
  - the men of Judah
  - the Judean men
  - the Jews
  lexicon: HALOT
  rationale: The phrase is literally 'Jewish/Judean men.' Since the setting concerns
    the community of Judahites in Egypt, either ethnic ('Jewish') or geographic-historical
    ('Judean') is possible. 'Jewish men' is clear modern English and preserves the
    explicit masculine noun אֲנָשִׁים in line with the gender-accurate policy.
