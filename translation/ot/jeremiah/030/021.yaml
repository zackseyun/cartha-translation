id: JER.30.21
reference: Jeremiah 30:21
source:
  edition: WLC
  text: וְ/הָיָ֨ה אַדִּיר֜/וֹ מִמֶּ֗/נּוּ וּ/מֹֽשְׁל/וֹ֙ מִ/קִּרְבּ֣/וֹ יֵצֵ֔א וְ/הִקְרַבְתִּ֖י/ו וְ/נִגַּ֣שׁ אֵלָ֑/י כִּי֩ מִ֨י הוּא זֶ֜ה עָרַ֧ב אֶת לִבּ֛/וֹ לָ/גֶ֥שֶׁת אֵלַ֖/י נְאֻם יְהוָֽה־־־׃
translation:
  text: His ruler will be one of them, and his governor will come out from his midst. I will bring him near, and he will approach me, for who is this who has pledged his heart to approach me? declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his noble one'; the Hebrew term can denote a prominent, mighty, or noble leader.
    reason: lexical_alternative
  - marker: b
    text: Or 'from among them' for 'one of them'; the Hebrew expression indicates that the leader arises from the people themselves.
    reason: lexical_alternative
  - marker: c
    text: Or 'who has dared in his heart to approach me?' The Hebrew idiom literally speaks of pledging or staking one's heart.
    reason: alternative_reading
lexical_decisions:
- source_word: אַדִּירוֹ
  chosen: his ruler
  alternatives:
  - his noble one
  - his majestic one
  - his leader
  lexicon: HALOT
  rationale: אַדִּיר can denote a noble, mighty, or prominent person. In parallel with וּמֹשְׁלוֹ ('his governor/ruler'), a leadership sense fits best here rather than a purely adjectival 'majestic one.' 'Ruler' keeps the political sense while remaining natural English.
- source_word: מִמֶּנּוּ
  chosen: one of them
  alternatives:
  - from him
  - from among them
  - from themselves
  lexicon: HALOT
  rationale: The form is idiomatically understood in context as indicating origin from the people themselves. Since the surrounding context concerns Jacob/Israel collectively, English 'one of them' conveys the sense more clearly than the more literal but ambiguous 'from him.'
- source_word: מֹשְׁלוֹ
  chosen: his governor
  alternatives:
  - his ruler
  - his one who rules
  - his prince
  lexicon: HALOT
  rationale: The participial form from משל denotes one who rules. Because אַדִּירוֹ was already rendered 'ruler,' 'governor' preserves the parallelism without needless repetition and reflects a civil leadership role.
- source_word: מִקִּרְבּוֹ
  chosen: from his midst
  alternatives:
  - from among him
  - from among them
  - from his own people
  lexicon: HALOT
  rationale: קֶרֶב means midst/inner part. 'From his midst' is a relatively formal rendering that preserves the Hebrew imagery of arising from within the community.
- source_word: וְהִקְרַבְתִּיו
  chosen: I will bring him near
  alternatives:
  - I will cause him to come near
  - I will draw him near
  lexicon: HALOT
  rationale: 'The Hiphil of קרב is causative: YHWH causes this leader to come near. ''Bring him near'' is concise and preserves the divine initiative.'
- source_word: וְנִגַּשׁ אֵלַי
  chosen: and he will approach me
  alternatives:
  - and he will come near to me
  lexicon: HALOT
  rationale: נגשׁ commonly means approach/draw near, often with cultic or courtly overtones. 'Approach me' is natural English and preserves the solemnity.
- source_word: עָרַב אֶת־לִבּוֹ
  chosen: has pledged his heart
  alternatives:
  - has dared in his heart
  - has given his heart as surety
  - has committed himself
  lexicon: HALOT
  rationale: ערב in this stem can mean to pledge or stand surety. With 'his heart' as object, the idiom expresses bold self-commitment or staking oneself. 'Has pledged his heart' preserves the metaphor and the seriousness of the act better than the interpretive 'has dared.'
- source_word: לָגֶשֶׁת אֵלַי
  chosen: to approach me
  alternatives:
  - to come near to me
  lexicon: HALOT
  rationale: The infinitive of נגשׁ repeats the earlier verb and should be rendered consistently. 'Approach me' preserves the repetition and possible priestly/court-access nuance.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is idiomatically rendered 'declares the LORD' in readable modern English. Per doctrine, יְהוָה is rendered 'the LORD.'
