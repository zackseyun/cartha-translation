theological_decisions:
- issue: Nature of the leader's access to God
  chosen_reading: The verse presents a leader from among the people whom the LORD himself brings near, with language that may evoke privileged or cultic access without explicitly identifying the figure as priestly or messianic.
  alternative_readings:
  - A specifically messianic ruler is in view
  - A post-exilic political governor is in view
  - A priest-king figure is implied
  rationale: The Hebrew emphasizes internal origin ('from among them') and divinely granted approach to YHWH. Because the text itself does not explicitly name the figure as Messiah or priest, the translation preserves the elevated access language without importing a narrower doctrinal identification.
  doctrine_reference: Preserve theological tension rather than resolve it.
