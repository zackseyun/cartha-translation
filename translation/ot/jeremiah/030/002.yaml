id: JER.30.2
reference: Jeremiah 30:2
source:
  edition: WLC
  text: כֹּֽה אָמַ֧ר יְהוָ֛ה אֱלֹהֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר כְּתָב לְ/ךָ֗ אֵ֧ת כָּל הַ/דְּבָרִ֛ים אֲשֶׁר דִּבַּ֥רְתִּי אֵלֶ֖י/ךָ אֶל סֵֽפֶר־־־־־׃
translation:
  text: 'Thus says Yahweh, the God of Israel: Write for yourself in a scroll all the words that I have spoken to you.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into a book'; the Hebrew סֵפֶר refers to a written document, often a scroll in this setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Introduces a prophetic formula. 'Thus' preserves the formal prophetic cadence in natural English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: Although morphologically perfect, in the fixed prophetic messenger formula כֹּה אָמַר it is idiomatically rendered as present in English ('Thus says...') to convey ongoing authoritative proclamation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md, preserving reverential convention and broad English Bible recognizability.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: Construct phrase identifying YHWH covenantally; 'the God of Israel' is the standard, clear rendering.
- source_word: לֵאמֹר
  chosen: ':'
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Functions here as an introductory quotative after the messenger formula. English punctuation communicates the same function more naturally than retaining 'saying.'
- source_word: כְּתָב
  chosen: Write
  alternatives:
  - Record
  - Write down
  lexicon: HALOT
  rationale: Imperative addressed to Jeremiah. 'Write' is the most direct equivalent; 'write down' is possible but slightly more expansive than the Hebrew.
- source_word: לְךָ
  chosen: for yourself
  alternatives:
  - for you
  - for your own use
  lexicon: HALOT
  rationale: 'The dative is best taken as ethical/personal interest: Jeremiah is to write the message for his own commission and custody. ''For yourself'' preserves the nuance without overexplaining.'
- source_word: כָּל הַדְּבָרִים
  chosen: all the words
  alternatives:
  - all the things
  - everything
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words' or 'matters,' but in a context of divine speech and writing, 'words' best preserves the verbal specificity.
- source_word: אֲשֶׁר דִּבַּרְתִּי אֵלֶיךָ
  chosen: that I have spoken to you
  alternatives:
  - that I spoke to you
  lexicon: HALOT
  rationale: English present perfect appropriately links prior divine speech with its present relevance for inscription. 'Spoken to you' is the natural rendering of דִּבַּר אֶל.
- source_word: אֶל־סֵפֶר
  chosen: in a scroll
  alternatives:
  - in a book
  - into a scroll
  lexicon: HALOT
  rationale: סֵפֶר in this historical setting refers to a written document, commonly a scroll rather than a modern codex. 'In a scroll' reflects the medium and the preposition אֶל idiomatically in English.
