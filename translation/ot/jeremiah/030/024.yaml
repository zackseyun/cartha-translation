id: JER.30.24
reference: Jeremiah 30:24
source:
  edition: WLC
  text: לֹ֣א יָשׁ֗וּב חֲרוֹן֙ אַף יְהוָ֔ה עַד עֲשֹׂת֥/וֹ וְ/עַד הֲקִימ֖/וֹ מְזִמּ֣וֹת לִבּ֑/וֹ בְּ/אַחֲרִ֥ית הַ/יָּמִ֖ים תִּתְבּ֥וֹנְנוּ בָֽ/הּ־־־׃
translation:
  text: The burning anger of Yahweh will not turn back until he has done it, and until he has established the purposes of his heart. In the latter days you will understand it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In the last days' or 'In days to come.' The Hebrew expression can denote the future culmination of God's purposes without specifying the exact timing.
    reason: alternative_reading
lexical_decisions:
- source_word: חֲרוֹן אַף
  chosen: burning anger
  alternatives:
  - fierce anger
  - wrath
  lexicon: HALOT
  rationale: The collocation literally evokes the heat/burning of anger. 'Burning anger' preserves the vivid Hebrew imagery better than the flatter 'wrath,' while remaining natural English.
- source_word: יָשׁוּב
  chosen: will not turn back
  alternatives:
  - will not relent
  - will not return
  lexicon: HALOT
  rationale: שׁוּב commonly means 'turn/return.' In this context of divine anger continuing until its purpose is accomplished, 'turn back' best captures cessation/reversal without overinterpreting as emotional relenting.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עַד עֲשֹׂתוֹ
  chosen: until he has done it
  alternatives:
  - until he has acted
  - until he has accomplished it
  lexicon: HALOT
  rationale: The suffix on the infinitive points to God's completing the action in view. 'Done it' is concise and leaves the object implicit as in Hebrew.
- source_word: הֲקִימוֹ
  chosen: he has established
  alternatives:
  - he has fulfilled
  - he has carried out
  lexicon: HALOT
  rationale: קום in the Hiphil often means to establish or bring into effect. 'Established' fits the object 'purposes' and preserves the sense of making firm/effective.
- source_word: מְזִמּוֹת לִבּוֹ
  chosen: the purposes of his heart
  alternatives:
  - the plans of his heart
  - the intentions of his heart
  lexicon: HALOT
  rationale: מְזִמּוֹת can denote plans, purposes, or intentions. 'Purposes' conveys deliberate resolve and suits the prophetic context of God's settled design.
- source_word: בְּאַחֲרִית הַיָּמִים
  chosen: In the latter days
  alternatives:
  - In the last days
  - In days to come
  lexicon: HALOT
  rationale: This is a recognized prophetic expression. 'Latter days' preserves its eschatological-prophetic resonance without forcing a narrower end-times scheme.
- source_word: תִּתְבּוֹנְנוּ בָהּ
  chosen: you will understand it
  alternatives:
  - you will consider it
  - you will understand this
  - you will perceive it
  lexicon: HALOT
  rationale: בין in the Hitpolel/related reflexive form conveys attentive understanding or discernment. 'Understand it' communicates the result of reflection in idiomatic English. The feminine suffix likely refers back to the matter/word just spoken, naturally rendered 'it.'
