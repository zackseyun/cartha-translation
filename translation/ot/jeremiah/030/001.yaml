id: JER.30.1
reference: Jeremiah 30:1
source:
  edition: WLC
  text: הַ/דָּבָר֙ אֲשֶׁ֣ר הָיָ֣ה אֶֽל יִרְמְיָ֔הוּ מֵ/אֵ֥ת יְהוָ֖ה לֵ/אמֹֽר־׃
translation:
  text: The word that came to Jeremiah from Yahweh, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD'' in English translations.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַדָּבָר
  chosen: The word
  alternatives:
  - The message
  - This is the word
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word' or 'matter/message.' In prophetic superscriptions, 'the word' is a standard and natural English rendering that preserves the formulaic introduction without unnecessary paraphrase.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Relative particle introducing the clause modifying 'word.' 'That' is idiomatic modern English.
- source_word: הָיָה
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: Although the verb is literally 'was,' in the prophetic formula 'the word that was to X from the LORD' English idiom is best represented by 'came to,' which reflects the sense of prophetic reception and is standard without over-paraphrasing.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Simple preposition marking Jeremiah as recipient of the word.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  rationale: Personal name transliterated by standard English convention, in keeping with the translation philosophy to transliterate names.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from the presence of
  - from with
  lexicon: HALOT
  rationale: The compound preposition marks source/origin. 'From' clearly conveys that the word originates with the LORD.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: Standard introductory infinitive for direct speech that follows in the next verse. Retaining 'saying' preserves the discourse linkage across the verse boundary.
