theological_decisions:
- issue: Rendering of the restoration idiom וְשַׁבְתִּי אֶת־שְׁבוּת
  chosen_reading: I will restore the fortunes
  alternative_readings:
  - I will restore the captivity
  - I will bring back the captives
  rationale: The Hebrew idiom often signifies comprehensive restoration from calamity, not only release from exile. Because the next clause explicitly mentions return to the land, rendering the idiom more broadly avoids redundancy while preserving the restoration theme. The more literal alternatives are preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §3, §5
- issue: Rendering לַאֲבוֹתָם as 'their fathers'
  chosen_reading: their fathers
  alternative_readings:
  - their ancestors
  rationale: The Hebrew is explicitly masculine plural and refers to the forefathers/patriarchs. Per the project's gender-accurate policy, the masculine form is retained rather than neutralized.
  doctrine_reference: Translation philosophy §4
- issue: Rendering of יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
