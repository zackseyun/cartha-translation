id: JER.30.3
reference: Jeremiah 30:3
source:
  edition: WLC
  text: כִּ֠י הִנֵּ֨ה יָמִ֤ים בָּאִים֙ נְאֻם יְהוָ֔ה וְ֠/שַׁבְתִּי אֶת שְׁב֨וּת עַמִּ֧/י יִשְׂרָאֵ֛ל וִֽ/יהוּדָ֖ה אָמַ֣ר יְהוָ֑ה וַ/הֲשִׁבֹתִ֗י/ם אֶל הָ/אָ֛רֶץ אֲשֶׁר נָתַ֥תִּי לַ/אֲבוֹתָ֖/ם וִֽ/ירֵשֽׁוּ/הָ־־־־׃פ
translation:
  text: For behold, days are coming, declares Yahweh, when I will restore the fortunes of my people Israel and Judah, says Yahweh, and I will bring them back to the land that I gave to their fathers, and they will possess it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I will restore the captivity' or 'I will bring back the captives' of my people Israel and Judah. The Hebrew idiom can denote both return from exile and broader restoration from distress.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding command to write these words. 'For' preserves the connective force better than an exclamatory rendering alone.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: Marks attention and imminence. 'Look' is readable modern English and preserves the deictic force without archaic tone.
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are about to come
  lexicon: HALOT
  rationale: A common prophetic formula indicating future divine action. 'Days are coming' is idiomatic and close to the Hebrew.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Declares the LORD' conveys solemn divine utterance more precisely than a simple 'says' in this slot.
- source_word: וְשַׁבְתִּי אֶת שְׁבוּת
  chosen: I will restore the fortunes
  alternatives:
  - I will restore the captivity
  - I will bring back the captives
  lexicon: HALOT
  rationale: The idiom שׁוּב שְׁבוּת/שְׁבִית can denote reversal of plight and restoration, not merely the physical return of captives. 'Restore the fortunes' best captures the idiomatic sense in contemporary English, while the following clause explicitly states the return to the land.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward covenantal designation; preserves possessive force.
- source_word: יִשְׂרָאֵל וִיהוּדָה
  chosen: Israel and Judah
  lexicon: HALOT
  rationale: Retains the explicit naming of both kingdoms/peoples, important in the restoration context.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - declares the LORD
  lexicon: HALOT
  rationale: A second divine speech formula occurs in the verse. Rendering it slightly differently avoids awkward repetition while preserving meaning; the first formula already carries the more formal 'declares'.
- source_word: וַהֲשִׁבֹתִים
  chosen: I will bring them back
  alternatives:
  - I will return them
  - I will restore them
  lexicon: HALOT
  rationale: Hiphil of שוב here is causative and takes the people as object with the land as destination. 'Bring them back' is natural English and fits the movement sense.
- source_word: אֶל הָאָרֶץ
  chosen: to the land
  alternatives:
  - to the הארץ/land
  - to the country
  lexicon: HALOT
  rationale: '''Land'' is the standard covenantal and territorial term in this context, preferable to ''country''.'
- source_word: אֲשֶׁר נָתַתִּי לַאֲבוֹתָם
  chosen: that I gave to their fathers
  alternatives:
  - which I gave to their ancestors
  lexicon: HALOT
  rationale: Maintains the covenantal link to the patriarchs. 'Fathers' is gender-accurate to the Hebrew and aligns with project policy.
- source_word: וִירֵשׁוּהָ
  chosen: they will possess it
  alternatives:
  - they will inherit it
  - they will take possession of it
  lexicon: HALOT
  rationale: ירשׁ can mean inherit/possess/dispossess depending on context. Here the focus is settled possession of the promised land. 'Possess it' is concise and faithful; 'inherit' is possible but can sound less concrete in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's required default for the divine name YHWH.
