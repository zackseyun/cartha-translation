id: JER.30.12
reference: Jeremiah 30:12
source:
  edition: WLC
  text: כִּ֣י כֹ֥ה אָמַ֛ר יְהוָ֖ה אָנ֣וּשׁ לְ/שִׁבְרֵ֑/ךְ נַחְלָ֖ה מַכָּתֵֽ/ךְ׃
translation:
  text: 'For thus says Yahweh: Your fracture is incurable; your wound is grievous.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Your injury is incurable; your wound is severe.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the divine explanation or declaration flowing from the context. 'For' fits the discourse connection naturally in English.
- source_word: כֹה אָמַר יְהוָה
  chosen: thus says the LORD
  alternatives:
  - this is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal prophetic cadence, and יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and broad English Bible usage.
- source_word: אָנושׁ
  chosen: incurable
  alternatives:
  - desperate
  - serious
  - beyond healing
  lexicon: HALOT
  rationale: The adjective conveys something sick, frail, or incurable. In context with שבר ('fracture') and מַכָּה ('wound'), 'incurable' best captures the medical metaphor and the severity of the condition.
- source_word: לשברך
  chosen: your fracture
  alternatives:
  - your brokenness
  - your injury
  - your hurt
  lexicon: HALOT
  rationale: שבר commonly denotes a breaking, fracture, or collapse. Given the adjacent wound imagery, 'fracture' preserves the bodily/medical metaphor more concretely than the more abstract 'brokenness'.
- source_word: נחלה
  chosen: is grievous
  alternatives:
  - is severe
  - is sickening
  - is incurable
  lexicon: HALOT
  rationale: The form functions predicatively describing the wound as severe or grievous. Rendering it 'is grievous' avoids awkward repetition of 'incurable' while preserving the sense of serious affliction.
- source_word: מכתך
  chosen: your wound
  alternatives:
  - your blow
  - your injury
  - your plague
  lexicon: HALOT
  rationale: In this context of bodily harm imagery, 'wound' is the most natural English equivalent and pairs well with 'fracture'.
