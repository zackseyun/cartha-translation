id: JER.30.8
reference: Jeremiah 30:8
source:
  edition: WLC
  text: וְ/הָיָה֩ בַ/יּ֨וֹם הַ/ה֜וּא נְאֻ֣ם יְהוָ֣ה צְבָא֗וֹת אֶשְׁבֹּ֤ר עֻלּ/וֹ֙
    מֵ/עַ֣ל צַוָּארֶ֔/ךָ וּ/מוֹסְרוֹתֶ֖י/ךָ אֲנַתֵּ֑ק וְ/לֹא יַעַבְדוּ ב֥/וֹ ע֖וֹד
    זָרִֽים׀־־׃
translation:
  text: And it shall happen in that day, declares the LORD of Armies, that I will
    break his yoke from off your neck, and I will tear off your bonds, and foreigners
    shall no longer make him their slave.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'foreigners shall no longer enslave him.' The Hebrew final clause is
      syntactically compressed; the sense is that Israel/Jacob will no longer be subjected
      to foreign bondage.
    reason: alternative_reading
  - marker: b
    text: Traditionally 'the LORD of Hosts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall happen
  alternatives:
  - And it will be
  - And it shall come to pass
  lexicon: HALOT
  rationale: Introduces a future event formula. 'It shall happen' is natural modern
    English while preserving the prophetic future sense more clearly than the archaic
    'come to pass.'
- source_word: בַיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'In that day' preserves the idiomatic
    eschatological-prophetic resonance.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of Armies
  alternatives:
  - oracle of the LORD of Hosts
  - declares the LORD of Hosts
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula, best rendered 'declares.' Per
    doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than transliterated;
    'of Armies' is more transparent to modern readers than 'of Hosts,' while retaining
    the martial-cosmic sense.
- source_word: אֶשְׁבֹּר
  chosen: I will break
  alternatives:
  - I will shatter
  lexicon: HALOT
  rationale: Straightforward future of שבר. 'Break' fits the yoke imagery naturally.
- source_word: עֻלּוֹ
  chosen: his yoke
  alternatives:
  - its yoke
  lexicon: HALOT
  rationale: The 3ms suffix is retained as 'his.' The referent is the foreign oppressor/yoke-bearer
    implied by context. Keeping the masculine singular preserves the Hebrew form better
    than smoothing to 'their yoke.'
- source_word: מֵעַל צַוָּארֶךָ
  chosen: from off your neck
  alternatives:
  - from your neck
  - off your neck
  lexicon: HALOT
  rationale: מֵעַל literally means 'from upon/off of.' 'From off your neck' preserves
    the vivid physical image of removing a yoke.
- source_word: וּמוֹסְרוֹתֶיךָ
  chosen: your bonds
  alternatives:
  - your straps
  - your fetters
  - your bands
  lexicon: HALOT
  rationale: מוֹסְרוֹת refers to restraints/bands associated with bondage imagery.
    'Bonds' is idiomatic and broad enough to cover the metaphorical and physical sense.
- source_word: אֲנַתֵּק
  chosen: I will tear off
  alternatives:
  - I will snap
  - I will break apart
  lexicon: HALOT
  rationale: The verb conveys pulling apart or snapping loose. 'Tear off' works well
    with restraints removed from a person and complements 'break' without mere repetition.
- source_word: וְלֹא יַעַבְדוּ בוֹ עוֹד זָרִים
  chosen: and foreigners shall no longer make him their slave
  alternatives:
  - and strangers shall no longer enslave him
  - and foreigners shall no longer serve themselves with him
  - and strangers shall no longer make use of him as a servant
  lexicon: HALOT
  rationale: The clause is syntactically difficult. With בּוֹ referring back to the
    singular 'yoke' owner/oppressor or to Jacob/Israel by sense, the most coherent
    contextual meaning is that foreigners will no longer subject him to servitude.
    'Make him their slave' brings out the coercive force of עבד in this liberation
    context.
