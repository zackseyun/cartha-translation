theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton, aligning
    with Jewish reverence tradition and longstanding English Bible practice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Rendering of צְבָאוֹת
  chosen_reading: of Armies
  alternative_readings:
  - of Hosts
  rationale: The term denotes armies/hosts, often heavenly and earthly. 'Of Armies'
    is more transparent in contemporary English while preserving the title's force.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
- issue: Force of עבד in the final clause
  chosen_reading: make him their slave
  alternative_readings:
  - enslave him
  - serve him no more
  rationale: In context of yoke and bonds, the bondage sense is salient. This avoids
    a weaker reading such as mere 'serve,' which could obscure the liberation theme.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
