id: JER.30.23
reference: Jeremiah 30:23
source:
  edition: WLC
  text: הִנֵּ֣ה סַעֲרַ֣ת יְהוָ֗ה חֵמָה֙ יָֽצְאָ֔ה סַ֖עַר מִתְגּוֹרֵ֑ר עַ֛ל רֹ֥אשׁ רְשָׁעִ֖ים יָחֽוּל׀׃
translation:
  text: Look, Yahweh’s storm of wrath has gone out, a sweeping tempest; it will whirl down on the head of the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a storm of the LORD, wrath has gone forth; a churning tempest.' The Hebrew piles up storm terms for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'it will fall on the head of the wicked.' The final verb is difficult; the translation 'will whirl down' keeps the storm imagery prominent.
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the announcement with vivid immediacy. 'Look' is natural modern English while preserving the deictic force better than the more archaic 'Behold.'
- source_word: סַעֲרַת יְהוָה
  chosen: the LORD’s storm
  alternatives:
  - the storm of the LORD
  - the tempest of the LORD
  lexicon: HALOT
  rationale: Construct phrase indicating a storm belonging to or sent by YHWH. 'the LORD’s storm' is idiomatic English and preserves the covenant name per doctrine default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and consistency with the LXX/English Bible tradition as specified in DOCTRINE.md.
- source_word: חֵמָה
  chosen: wrath
  alternatives:
  - fury
  - anger
  - venom
  lexicon: HALOT
  rationale: Here the noun qualifies the storm as an expression of divine anger. 'Wrath' best conveys intense judicial anger in prophetic context without sounding merely emotional.
- source_word: יָצְאָה
  chosen: has gone out
  alternatives:
  - has gone forth
  - has gone out
  lexicon: HALOT
  rationale: Perfect verb presented as a vivid prophetic declaration of action already set in motion. 'Has gone out' is clear modern English and preserves the movement imagery.
- source_word: סַעַר
  chosen: tempest
  alternatives:
  - storm
  - whirlwind
  lexicon: HALOT
  rationale: Used appositionally/intensively after the first storm term. Rendering it as 'tempest' avoids awkward repetition while preserving the meteorological violence.
- source_word: מִתְגּוֹרֵר
  chosen: whirling
  alternatives:
  - sweeping
  - stirring itself up
  - gathering itself
  lexicon: HALOT
  rationale: The participle depicts storm motion in active, turbulent development. 'Whirling' fits the storm imagery and pairs naturally with 'tempest.'
- source_word: עַל רֹאשׁ
  chosen: on the head of
  alternatives:
  - upon the head of
  - against the head of
  lexicon: HALOT
  rationale: Retains the concrete Hebrew idiom of judgment descending on someone's head, a significant image that should not be flattened into a generic 'upon the wicked'.
- source_word: רְשָׁעִים
  chosen: the wicked
  alternatives:
  - wicked ones
  - the guilty
  lexicon: HALOT
  rationale: Standard rendering for the plural adjective/substantive in wisdom and prophetic literature; it denotes morally evil people generally, not merely legally guilty persons.
- source_word: יָחֽוּל
  chosen: it will whirl down
  alternatives:
  - it will fall
  - it will come down
  - it will writhe upon
  lexicon: HALOT
  rationale: In context of storm imagery, the verb likely conveys violent coming/downward movement or swirling impact. 'It will whirl down' preserves the connection with the preceding storm language better than the flatter 'fall,' while still expressing impending judgment.
