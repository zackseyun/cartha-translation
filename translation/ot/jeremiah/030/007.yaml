id: JER.30.7
reference: Jeremiah 30:7
source:
  edition: WLC
  text: ה֗וֹי כִּ֥י גָד֛וֹל הַ/יּ֥וֹם הַ/ה֖וּא מֵ/אַ֣יִן כָּמֹ֑/הוּ וְ/עֵֽת צָרָ֥ה
    הִיא֙ לְ/יַֽעֲקֹ֔ב וּ/מִמֶּ֖/נָּה יִוָּשֵֽׁעַ־׃
translation:
  text: Alas! For that day is great; there is none like it. It is a time of distress
    for Jacob, yet he will be saved out of it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Woe!'; the opening interjection expresses alarm or lament.
    reason: lexical_alternative
  - marker: b
    text: Or 'a time of trouble for Jacob.'
    reason: lexical_alternative
  - marker: c
    text: Or 'yet he will be delivered from it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Alas!
  alternatives:
  - Woe!
  - Ah!
  lexicon: HALOT
  rationale: An interjection of lament or alarm. 'Alas!' fits the exclamatory tone
    here without implying a formal curse as strongly as 'Woe!' might.
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason for the lament/exclamation. 'For' preserves the
    explanatory force in natural English.
- source_word: גָדוֹל
  chosen: great
  alternatives:
  - terrible
  - momentous
  lexicon: HALOT
  rationale: The adjective means 'great' in magnitude. Although the context is ominous,
    the Hebrew does not itself specify 'terrible'; the severity is conveyed by the
    surrounding clauses.
- source_word: הַיּוֹם הַהוּא
  chosen: that day
  alternatives:
  - the day, that one
  - that particular day
  lexicon: HALOT
  rationale: Standard prophetic expression referring to a specific future day or period.
    'That day' is idiomatic and preserves the demonstrative emphasis.
- source_word: מֵאַיִן כָּמֹהוּ
  chosen: there is none like it
  alternatives:
  - from nothing is like it
  - none is comparable to it
  lexicon: HALOT
  rationale: Idiomatic Hebrew expressing incomparability. 'There is none like it'
    is clear, natural, and close to the source sense.
- source_word: וְעֵת צָרָה
  chosen: It is a time of distress
  alternatives:
  - and a time of trouble
  - and a season of anguish
  lexicon: HALOT
  rationale: עֵת marks a time/season, and צָרָה denotes distress, trouble, or affliction.
    'Distress' is accessible modern English and preserves the gravity without overinterpreting.
- source_word: לְיַעֲקֹב
  chosen: for Jacob
  alternatives:
  - for Yaakov
  - for Israel
  lexicon: HALOT
  rationale: The proper name should be transliterated rather than interpreted. 'Jacob'
    is the conventional English form and here likely stands metonymically for the
    covenant people, but the translation preserves the name itself.
- source_word: וּמִמֶּנָּה
  chosen: out of it
  alternatives:
  - from it
  - out of her
  lexicon: HALOT
  rationale: The preposition plus feminine suffix refers back to the feminine noun
    phrase 'time of distress.' English idiom prefers 'out of it' with the following
    passive verb to express deliverance from the distress.
- source_word: יִוָּשֵׁעַ
  chosen: he will be saved
  alternatives:
  - he will be delivered
  - he will be rescued
  lexicon: HALOT
  rationale: Niphal of ישׁע conveys being saved/delivered. 'Saved' preserves the lexical
    connection to a major biblical salvation term, while the context makes clear that
    deliverance from distress is in view.
