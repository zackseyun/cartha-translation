theological_decisions:
- issue: Referent of 'Jacob'
  chosen_reading: Jacob is retained in the main text as the covenant people personified,
    without replacing it with an interpretive gloss such as 'Israel.'
  alternative_readings:
  - Israel
  - the descendants of Jacob
  - God's people
  rationale: The Hebrew text names 'Jacob.' Retaining the name preserves the prophetic
    and covenantal texture while avoiding interpretive expansion in the main text.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    Original-language primacy over translation tradition.'
- issue: Force of יִוָּשֵׁעַ in context
  chosen_reading: Rendered 'he will be saved' rather than the more narrowly situational
    'he will escape,' with contextual clarification supplied by 'out of it.'
  alternative_readings:
  - he will be delivered
  - he will escape
  rationale: The verb belongs to the broader biblical salvation vocabulary. Using
    'saved' preserves that lexical-theological resonance without importing a specifically
    eternal-salvation meaning, since the immediate context defines the salvation as
    deliverance from distress.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Readable modern English, not archaic or academic.'
