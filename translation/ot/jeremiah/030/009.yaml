theological_decisions:
- issue: Identity of 'David their king'
  chosen_reading: Retain the literal name 'David' in the main text without interpretive expansion.
  alternative_readings:
  - a future Davidic king
  - the Messiah
  rationale: The Hebrew text says 'David their king.' In context this is widely understood as a prophetic reference to a future Davidic ruler, and within Christian reading ultimately to the Messiah, but the translation should not import that interpretation into the main text where the source preserves the name. The theological tension is preserved by translating literally and noting the interpretive alternative in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it; translate titles, transliterate names.
