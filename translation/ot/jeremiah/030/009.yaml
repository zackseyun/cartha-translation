id: JER.30.9
reference: Jeremiah 30:9
source:
  edition: WLC
  text: וְ/עָ֣בְד֔וּ אֵ֖ת יְהוָ֣ה אֱלֹֽהֵי/הֶ֑ם וְ/אֵת֙ דָּוִ֣ד מַלְכָּ֔/ם אֲשֶׁ֥ר אָקִ֖ים לָ/הֶֽם׃ס
translation:
  text: They will serve Yahweh their God and David their king, whom I will raise up for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a future Davidic king'; many interpreters understand 'David' here as a prophetic reference to the Messiah rather than to David personally.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָבְדוּ
  chosen: They will serve
  alternatives:
  - and they will serve
  - they will worship
  lexicon: HALOT
  rationale: The verb עבד commonly means 'serve' and in covenantal contexts can include worshipful service. 'Serve' best preserves the broader sense without narrowing it to cultic worship alone. The prefixed conjunction is naturally absorbed into English syntax at the start of the clause.
- source_word: אֵת
  chosen: '[direct object marker, untranslated]'
  lexicon: HALOT
  rationale: The particle marks the definite direct object in Hebrew and is not represented by a standalone English word.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  lexicon: HALOT
  rationale: 'The construct with pronominal suffix is straightforwardly possessive: ''their God.'' This preserves the covenant relationship expressed in the Hebrew.'
- source_word: וְאֵת
  chosen: and
  alternatives:
  - also
  lexicon: HALOT
  rationale: The conjunction links a second direct object, 'David their king,' to the verb 'serve.' English expresses this naturally with 'and' while leaving the object marker untranslated.
- source_word: דָּוִד
  chosen: David
  lexicon: HALOT
  rationale: Personal names are transliterated. The Hebrew uses 'David,' which may refer typologically or messianically to a future Davidic ruler, but the translation preserves the name itself.
- source_word: מַלְכָּם
  chosen: their king
  alternatives:
  - their ruler
  lexicon: HALOT
  rationale: מלך is most naturally 'king.' 'Ruler' is possible but weakens the royal and Davidic specificity of the promise.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  lexicon: HALOT
  rationale: A personal relative pronoun fits the antecedent 'David their king' in idiomatic English.
- source_word: אָקִים
  chosen: I will raise up
  alternatives:
  - I will establish
  - I will appoint
  lexicon: HALOT
  rationale: The Hiphil of קום can mean 'raise up,' 'establish,' or 'appoint.' 'Raise up' is the most transparent and preserves the idiom often used for God appointing or bringing forth a leader, especially in Davidic contexts.
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - for their benefit
  - to them
  lexicon: HALOT
  rationale: The preposition with suffix is best rendered 'for them,' indicating that this king is raised up on behalf of the people.
