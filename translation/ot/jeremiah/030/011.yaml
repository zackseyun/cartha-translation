id: JER.30.11
reference: Jeremiah 30:11
source:
  edition: WLC
  text: כִּֽי אִתְּ/ךָ֥ אֲנִ֛י נְאֻם יְהוָ֖ה לְ/הֽוֹשִׁיעֶ֑/ךָ כִּי֩ אֶעֱשֶׂ֨ה כָלָ֜ה בְּ/כָֽל הַ/גּוֹיִ֣ם אֲשֶׁ֧ר הֲפִצוֹתִ֣י/ךָ שָּׁ֗ם אַ֤ךְ אֹֽתְ/ךָ֙ לֹֽא אֶעֱשֶׂ֣ה כָלָ֔ה וְ/יִסַּרְתִּ֨י/ךָ֙ לַ/מִּשְׁפָּ֔ט וְ/נַקֵּ֖ה לֹ֥א אֲנַקֶּֽ/ךָּ־־־׀־׃פ
translation:
  text: For I am with you—oracle of Yahweh—to save you. For I will make a full end of all the nations where I have scattered you, but of you I will not make a full end. I will discipline you with justice, and I will by no means leave you unpunished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'declares the LORD.' The Hebrew prophetic formula נְאֻם יְהוָה is traditionally rendered this way.
    reason: lexical_alternative
  - marker: b
    text: Or, 'I will certainly not acquit you.' The Hebrew literally intensifies the verb 'clear/acquit' with a negation.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal sense while matching established English Bible convention.
- source_word: נְאֻם יְהוָה
  chosen: oracle of the LORD
  alternatives:
  - declares the LORD
  - says the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic formula meaning an utterance/oracle. 'Oracle of the LORD' preserves the formal prophetic register more transparently than the smoother 'declares the LORD.'
- source_word: לְהוֹשִׁיעֶךָ
  chosen: to save you
  alternatives:
  - to deliver you
  lexicon: HALOT
  rationale: The Hiphil of ישׁע commonly means 'save/deliver.' 'Save you' is concise and preserves the broader semantic range, including rescue from danger.
- source_word: כָלָה
  chosen: a full end
  alternatives:
  - complete destruction
  - an end
  lexicon: HALOT
  rationale: The noun denotes complete consumption or annihilating end. 'A full end' preserves the repeated Hebrew expression and its rhetorical force in this verse better than flattening to simply 'an end.'
- source_word: הֲפִצוֹתִיךָ
  chosen: I have scattered you
  alternatives:
  - I dispersed you
  lexicon: HALOT
  rationale: The Hiphil of פוץ conveys scattering/dispersion among nations. 'Scattered' is the most natural and common English equivalent in exile contexts.
- source_word: אַךְ
  chosen: but
  alternatives:
  - only
  - nevertheless
  - yet
  lexicon: HALOT
  rationale: Here the particle marks contrast between God's treatment of the nations and of Israel/Judah. 'But' best captures the adversative force in context.
- source_word: וְיִסַּרְתִּיךָ
  chosen: I will discipline you
  alternatives:
  - I will chasten you
  - I will correct you
  lexicon: HALOT
  rationale: יסר in this context refers to corrective discipline rather than mere punishment. 'Discipline' communicates both severity and restorative intent without archaic tone.
- source_word: לַמִּשְׁפָּט
  chosen: with justice
  alternatives:
  - in justice
  - according to justice
  - with judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט here indicates measured, just order in God's disciplinary action. 'With justice' is idiomatic modern English and preserves the sense of proportionate judgment.
- source_word: וְנַקֵּה לֹא אֲנַקֶּךָּ
  chosen: I will by no means leave you unpunished
  alternatives:
  - I will certainly not acquit you
  - I will not leave you altogether unpunished
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the negation. The idiom means God will not simply clear or acquit them. 'By no means leave you unpunished' captures both the emphasis and the disciplinary context more naturally than the more forensic 'acquit,' while preserving the warning.
