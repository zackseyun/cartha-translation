theological_decisions:
- issue: Whether the final clause should sound purely forensic ('not acquit') or disciplinary ('not leave unpunished')
  chosen_reading: 'disciplinary wording in the main text: ''I will by no means leave you unpunished'''
  alternative_readings:
  - I will certainly not acquit you
  rationale: 'The verse balances salvation and preservation with just discipline. Because the immediate context is corrective chastening (וְיִסַּרְתִּיךָ לַמִּשְׁפָּט), rendering the final clause in disciplinary terms preserves the theological tension: God will save his people and not destroy them utterly, yet he will not exempt them from deserved judgment.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
