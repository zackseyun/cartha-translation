theological_decisions:
- issue: Referent of the singular possessive suffixes ('his children,' 'his congregation,'
    'his oppressors')
  chosen_reading: Retain the singular pronouns without interpretive expansion.
  alternative_readings:
  - Interpret the singular as collective for Jacob/Israel and render 'their children'
    or 'their congregation'
  rationale: The Hebrew text uses singular suffixes, likely personifying the restored
    people as a corporate singular (Jacob/Israel). Preserving 'his' keeps closer to
    the source and avoids resolving the referent beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
