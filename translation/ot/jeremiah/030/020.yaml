id: JER.30.20
reference: Jeremiah 30:20
source:
  edition: WLC
  text: וְ/הָי֤וּ בָנָי/ו֙ כְּ/קֶ֔דֶם וַ/עֲדָת֖/וֹ לְ/פָנַ֣/י תִּכּ֑וֹן וּ/פָ֣קַדְתִּ֔י
    עַ֖ל כָּל לֹחֲצָֽי/ו־׃
translation:
  text: His children will be as in former times, and his congregation will be established
    before me; and I will punish all his oppressors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'his sons'; here rendered 'his children' in a collective sense for
      descendants.
    reason: lexical_alternative
  - marker: b
    text: Or 'as of old' / 'as before.'
    reason: lexical_alternative
  - marker: c
    text: Or 'assembly' or 'community.'
    reason: lexical_alternative
  - marker: d
    text: The singular 'his' likely personifies Jacob/Israel as a corporate whole.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיוּ
  chosen: will be
  alternatives:
  - shall be
  - will become
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    futurally here, continuing the restoration promises in context.
- source_word: בָנָיו
  chosen: his children
  alternatives:
  - his sons
  lexicon: HALOT
  rationale: Though literally 'his sons,' בנים can denote descendants/children more
    broadly. 'Children' fits the collective restoration sense and natural English
    without overstating male specificity.
- source_word: כְּקֶדֶם
  chosen: as in former times
  alternatives:
  - as before
  - as of old
  lexicon: HALOT
  rationale: The phrase points to an earlier, former state. 'As in former times' is
    idiomatic modern English and preserves the comparative sense.
- source_word: וַעֲדָתוֹ
  chosen: his congregation
  alternatives:
  - his community
  - his assembly
  lexicon: HALOT
  rationale: עֵדָה commonly denotes an assembled community. 'Congregation' preserves
    the corporate covenantal nuance better than the more generic 'community,' while
    remaining understandable.
- source_word: לְפָנַי
  chosen: before me
  alternatives:
  - in my presence
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase, preserving the
    relational and covenantal sense of standing before God.
- source_word: תִּכּוֹן
  chosen: will be established
  alternatives:
  - will stand firm
  - will be made secure
  lexicon: HALOT
  rationale: Niphal of כון conveys being established, set firm, or made secure. 'Will
    be established' best matches the passive/resultative nuance.
- source_word: וּפָקַדְתִּי
  chosen: I will punish
  alternatives:
  - I will attend to
  - I will visit judgment on
  lexicon: HALOT
  rationale: פקד has a broad semantic range, but with עַל plus hostile agents in this
    judgment context it carries punitive force. 'Punish' makes the sense clear in
    contemporary English.
- source_word: עַל כָּל לֹחֲצָיו
  chosen: all his oppressors
  alternatives:
  - all who oppress him
  - all his tormentors
  lexicon: HALOT
  rationale: לחץ denotes oppression or pressing hard. The participial form with suffix
    refers to those oppressing him. 'Oppressors' is concise and contextually apt.
