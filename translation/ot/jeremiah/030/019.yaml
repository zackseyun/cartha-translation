theological_decisions:
- issue: Nature of the promised restoration blessings
  chosen_reading: Render the verse as describing concrete communal restoration expressed
    in praise, increase, and honor, without importing later ecclesiological or eschatological
    specifics.
  alternative_readings:
  - Read primarily as spiritualized blessing
  - Read exclusively as national-political exaltation
  rationale: The Hebrew text itself speaks of thanksgiving, rejoicing, multiplication,
    and honor for the restored people. The translation preserves these covenant-restoration
    themes without narrowing them to a later doctrinal system or flattening them into
    merely inward spirituality.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
