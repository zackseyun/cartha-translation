id: JER.30.19
reference: Jeremiah 30:19
source:
  edition: WLC
  text: וְ/יָצָ֥א מֵ/הֶ֛ם תּוֹדָ֖ה וְ/ק֣וֹל מְשַׂחֲקִ֑ים וְ/הִרְבִּתִי/ם֙ וְ/לֹ֣א
    יִמְעָ֔טוּ וְ/הִכְבַּדְתִּ֖י/ם וְ/לֹ֥א יִצְעָֽרוּ׃
translation:
  text: From them will come thanksgiving and the sound of those who rejoice; I will
    multiply them, and they will not be few; I will honor them, and they will not
    be insignificant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the sound of those who celebrate/play,' since the Hebrew participle
      can denote festive laughter, play, or merrymaking.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will make them honored, and they will not be small.' The Hebrew uses
      terms that can refer both to social honor and to smallness/insignificance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  chosen: will come
  alternatives:
  - will go out
  - will proceed
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    futuristically. 'Will come' is idiomatic in English with the following מֵהֶם ('from
    them'), expressing emergence from the restored community.
- source_word: מֵהֶם
  chosen: from them
  alternatives:
  - out of them
  - from among them
  lexicon: HALOT
  rationale: Marks source/origin. 'From them' is the most natural concise rendering
    and fits the image of praise arising from the people.
- source_word: תּוֹדָה
  chosen: thanksgiving
  alternatives:
  - praise
  - thank offering
  lexicon: HALOT
  rationale: In this context the noun denotes thankful praise rather than a specific
    sacrificial offering. 'Thanksgiving' preserves the verbal sense of grateful praise
    emerging from the restored people.
- source_word: וְקוֹל
  chosen: and the sound of
  alternatives:
  - and the voice of
  - and the noise of
  lexicon: HALOT
  rationale: קוֹל is broad, but with a participle of rejoicing it refers to audible
    festive expression. 'The sound of' is natural English and avoids overpersonalizing
    with 'voice'.
- source_word: מְשַׂחֲקִים
  chosen: those who rejoice
  alternatives:
  - those who celebrate
  - those who play
  - those who make merry
  lexicon: HALOT
  rationale: The participle from שׂחק can denote laughter, play, or festive merriment.
    In parallel with 'thanksgiving' and in a restoration context, 'those who rejoice'
    best captures communal celebration without narrowing to literal play.
- source_word: וְהִרְבִּתִים
  chosen: I will multiply them
  alternatives:
  - I will make them many
  - I will increase them
  lexicon: HALOT
  rationale: Hiphil of רבה with 3mp suffix indicates causing them to become numerous.
    'Multiply' is a standard and clear rendering in covenant/restoration contexts.
- source_word: וְלֹא יִמְעָטוּ
  chosen: and they will not be few
  alternatives:
  - and they will not diminish
  - and they will not decrease
  lexicon: HALOT
  rationale: The verb מעט can mean become small/few. Given the preceding promise of
    multiplication, the result clause is best rendered numerically as 'they will not
    be few' rather than merely 'not diminish'.
- source_word: וְהִכְבַּדְתִּים
  chosen: I will honor them
  alternatives:
  - I will make them honored
  - I will glorify them
  - I will make them weighty
  lexicon: HALOT
  rationale: Hiphil of כבד can mean make heavy, honor, or make weighty/important.
    In parallel with multiplication and the following negated verb, the sense is social
    elevation and dignity. 'I will honor them' is the clearest idiomatic English.
- source_word: וְלֹא יִצְעָרוּ
  chosen: and they will not be insignificant
  alternatives:
  - and they will not be small
  - and they will not be few
  - and they will not be diminished
  lexicon: HALOT
  rationale: From צער, 'be small/insignificant.' In parallel with 'I will honor them,'
    the focus is status rather than size alone. 'They will not be insignificant' brings
    out the antithetical relation to honor while remaining faithful to the semantic
    range.
