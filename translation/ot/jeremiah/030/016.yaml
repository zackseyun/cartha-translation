id: JER.30.16
reference: Jeremiah 30:16
source:
  edition: WLC
  text: לָ/כֵ֞ן כָּל אֹכְלַ֨יִ/ךְ֙ יֵאָכֵ֔לוּ וְ/כָל צָרַ֥יִ/ךְ כֻּלָּ֖/ם בַּ/שְּׁבִ֣י
    יֵלֵ֑כוּ וְ/הָי֤וּ שֹׁאסַ֨יִ/ךְ֙ לִ/מְשִׁסָּ֔ה וְ/כָל בֹּזְזַ֖יִ/ךְ אֶתֵּ֥ן לָ/בַֽז־־־׃
translation:
  text: Therefore all who devour you will be devoured, and all your adversaries, every
    one of them, will go into captivity; those who plunder you will become plunder,
    and all who prey on you I will give up to prey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all who plunder you I will give for plunder.' The Hebrew uses closely
      related terms for looting/spoil in the final clause.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks a consequential transition from the preceding promises/judgment
    logic. 'Therefore' best preserves the inferential force in natural English.
- source_word: אֹכְלַיִךְ / יֵאָכֵלוּ
  chosen: all who devour you will be devoured
  alternatives:
  - all who eat you will be eaten
  - all who consume you will be consumed
  lexicon: HALOT
  rationale: The verb אכל literally means 'eat,' but in prophetic judgment language
    it commonly functions metaphorically for destructive consumption by enemies. 'Devour'
    preserves the vivid metaphor without sounding wooden.
- source_word: צָרַיִךְ
  chosen: your adversaries
  alternatives:
  - your enemies
  - your foes
  lexicon: HALOT
  rationale: The noun denotes those in hostility/distress against Zion/Israel. 'Adversaries'
    is slightly broader and fits the formal prophetic register while remaining readable.
- source_word: כֻּלָּם
  chosen: every one of them
  alternatives:
  - all of them
  lexicon: HALOT
  rationale: Adds emphatic distributive force after 'all your adversaries.' 'Every
    one of them' reflects the Hebrew emphasis more clearly than a simple repetition
    of 'all.'
- source_word: בַּשְּׁבִי יֵלֵכוּ
  chosen: will go into captivity
  alternatives:
  - will go into exile
  - will go as captives
  lexicon: HALOT
  rationale: שְׁבִי refers specifically to captivity/captive status rather than general
    exile. 'Go into captivity' is idiomatic and preserves the reversal-of-fortune
    theme.
- source_word: שֹׁאסַיִךְ
  chosen: those who plunder you
  alternatives:
  - your spoilers
  - those who ravage you
  lexicon: HALOT
  rationale: From שׁאס, to plunder/spoil. 'Those who plunder you' is clear modern
    English and keeps the economic/violent sense.
- source_word: לִמְשִׁסָּה
  chosen: will become plunder
  alternatives:
  - will become spoil
  lexicon: HALOT
  rationale: The noun denotes spoil/plunder taken in war. 'Plunder' is more accessible
    than 'spoil' in contemporary English while preserving the military-looting sense.
- source_word: בֹּזְזַיִךְ
  chosen: all who prey on you
  alternatives:
  - all who despoil you
  - all who rob you
  - all who plunder you
  lexicon: HALOT
  rationale: Though related semantically to plundering, using 'prey on' avoids awkward
    repetition with the previous clause and captures the exploitative force. The variance
    from a more literal 'plunder' is documented here.
- source_word: אֶתֵּן לָבַז
  chosen: I will give up to prey
  alternatives:
  - I will give for plunder
  - I will make into spoil
  lexicon: HALOT
  rationale: The idiom נתן + ל + בז means to hand over as spoil/plunder. 'Give up
    to prey' preserves the idiomatic force and pairs naturally with 'prey on you,'
    while still conveying judicial reversal.
