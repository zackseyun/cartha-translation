theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of Jacob/Israel language
  chosen_reading: Retain both 'Jacob' and 'Israel' as parallel covenant names in the main text
  alternative_readings:
  - Collapse to a single referent such as 'Israel' throughout
  rationale: The Hebrew intentionally uses both names in poetic parallelism. Preserving both avoids erasing covenantal and literary texture.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
