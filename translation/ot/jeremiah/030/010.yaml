id: JER.30.10
reference: Jeremiah 30:10
source:
  edition: WLC
  text: וְ/אַתָּ֡ה אַל תִּירָא֩ עַבְדִּ֨/י יַעֲקֹ֤ב נְאֻם יְהֹוָה֙ וְ/אַל תֵּחַ֣ת יִשְׂרָאֵ֔ל כִּ֠י הִנְ/נִ֤י מוֹשִֽׁיעֲ/ךָ֙ מֵֽ/רָח֔וֹק וְ/אֶֽת זַרְעֲ/ךָ֖ מֵ/אֶ֣רֶץ שִׁבְיָ֑/ם וְ/שָׁ֧ב יַעֲקֹ֛ב וְ/שָׁקַ֥ט וְ/שַׁאֲנַ֖ן וְ/אֵ֥ין מַחֲרִֽיד־־־־׃
translation:
  text: But as for you, do not fear, my servant Jacob, declares Yahweh, and do not be dismayed, Israel; for behold, I am saving you from far away, and your offspring from the land of their captivity. Jacob will return and be quiet and at ease, with no one to make him afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will save you.' The Hebrew participial form with 'behold, I' can express imminent or certain future action.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the land where they are captives'; more broadly, 'from the land of exile.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and none shall make him afraid.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  chosen: But as for you
  alternatives:
  - And you
  - But you
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a contrastive or emphatic transition. 'But as for you' preserves the discourse shift more clearly than a bare 'and you'.
- source_word: אַל תִּירָא
  chosen: do not fear
  alternatives:
  - do not be afraid
  lexicon: HALOT
  rationale: A standard prohibition with ירא. 'Do not fear' is concise and idiomatic, and it pairs well with the following distinct verb for dismay.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, here it functions as an honorific covenantal designation for Jacob/Israel rather than emphasizing bonded status. 'My servant' best fits the prophetic register and context.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is natural modern English and preserves the solemn prophetic force. YHWH is rendered 'the LORD' per doctrine.
- source_word: וְאַל תֵּחַת
  chosen: do not be dismayed
  alternatives:
  - do not be shattered
  - do not be terrified
  lexicon: HALOT
  rationale: חתת in the Niphal commonly conveys being broken down, dismayed, or terrified. 'Do not be dismayed' distinguishes it from the previous 'do not fear' while remaining idiomatic.
- source_word: הִנְנִי
  chosen: behold, I am
  alternatives:
  - indeed I am
  - look, I am
  lexicon: HALOT
  rationale: The particle adds emphatic immediacy. 'Behold' preserves the elevated prophetic tone without paraphrasing away the marker.
- source_word: מוֹשִׁיעֲךָ
  chosen: I am saving you
  alternatives:
  - I will save you
  - I am about to save you
  lexicon: HALOT
  rationale: The participle with הִנְנִי presents imminent or certain action. 'I am saving you' preserves the participial aspect and divine immediacy better than a simple future, while still fitting English usage.
- source_word: מֵרָחוֹק
  chosen: from far away
  alternatives:
  - from afar
  - from a distant place
  lexicon: HALOT
  rationale: The phrase denotes spatial distance. 'From far away' is clear modern English; 'from afar' is possible but slightly more literary.
- source_word: זַרְעֲךָ
  chosen: your offspring
  alternatives:
  - your seed
  - your descendants
  lexicon: HALOT
  rationale: '''Offspring'' preserves the collective singular sense of זרע in accessible English. ''Seed'' is more formal but less natural here; ''descendants'' is interpretive but acceptable.'
- source_word: מֵאֶרֶץ שִׁבְיָם
  chosen: from the land of their captivity
  alternatives:
  - from the land where they are captives
  - from the land of exile
  lexicon: HALOT
  rationale: שבי denotes captivity/captives. 'The land of their captivity' closely follows the Hebrew construction and avoids flattening it into the broader concept 'exile' without warrant.
- source_word: וְשָׁב
  chosen: will return
  alternatives:
  - shall return
  - will come back
  lexicon: HALOT
  rationale: שוב here refers to restoration by return. 'Will return' is the most direct and natural rendering.
- source_word: וְשָׁקַט
  chosen: be quiet
  alternatives:
  - be at peace
  - be undisturbed
  - have rest
  lexicon: HALOT
  rationale: The verb conveys quietness or undisturbed rest. 'Be quiet' keeps the lexical sense, though in context it implies settled peace.
- source_word: וְשַׁאֲנַן
  chosen: at ease
  alternatives:
  - secure
  - tranquil
  lexicon: HALOT
  rationale: This term denotes ease, security, or tranquility. 'At ease' pairs naturally with 'be quiet' and preserves the sense of settled safety.
- source_word: וְאֵין מַחֲרִיד
  chosen: with no one to make him afraid
  alternatives:
  - and none shall make him afraid
  - with no one to terrify him
  lexicon: HALOT
  rationale: The idiom expresses complete security from threat. 'With no one to make him afraid' is idiomatic and preserves the causative nuance of the participle.
