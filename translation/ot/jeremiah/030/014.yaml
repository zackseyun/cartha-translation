theological_decisions:
- issue: Rendering the cause clauses for divine judgment
  chosen_reading: The verse states that God himself has struck Zion/Judah in judgment
    because of her iniquity and multiplied sins.
  alternative_readings:
  - The language could be softened to emphasize only enemy action or mere consequence.
  rationale: The Hebrew explicitly says 'I have struck you' and grounds this in the
    people's iniquity and sins. The translation preserves the theological tension
    of divine agency in judgment without softening or expanding it beyond the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
