id: JER.30.14
reference: Jeremiah 30:14
source:
  edition: WLC
  text: כָּל מְאַהֲבַ֣יִ/ךְ שְׁכֵח֔וּ/ךְ אוֹתָ֖/ךְ לֹ֣א יִדְרֹ֑שׁוּ כִּי֩ מַכַּ֨ת
    אוֹיֵ֤ב הִכִּיתִי/ךְ֙ מוּסַ֣ר אַכְזָרִ֔י עַ֚ל רֹ֣ב עֲוֺנֵ֔/ךְ עָצְמ֖וּ חַטֹּאתָֽיִ/ךְ־׃
translation:
  text: All your lovers have forgotten you; they do not seek you. For I have struck
    you with the wound of an enemy, with cruel discipline, because of the greatness
    of your iniquity; your sins have become many.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your allies.' The Hebrew literally says 'your lovers,' preserving Jeremiah's
      recurring metaphor of illicit political and spiritual attachments.
    reason: lexical_alternative
  - marker: b
    text: Or 'with harsh correction' or 'with cruel chastisement.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְאַהֲבַיִךְ
  chosen: your lovers
  alternatives:
  - those who love you
  - your allies
  lexicon: HALOT
  rationale: The noun from אהב literally denotes lovers/beloved ones. In Jeremiah's
    covenantal and political imagery it can refer to foreign allies pursued like illicit
    lovers. 'Your lovers' preserves the metaphor and the prophetic tone better than
    flattening to 'allies,' while that political sense remains available contextually.
- source_word: שְׁכֵחוּךְ
  chosen: have forgotten you
  alternatives:
  - forgot you
  - have abandoned you
  lexicon: HALOT
  rationale: The verb שכח means 'forget.' The perfect is rendered with present relevance
    in English ('have forgotten'). 'Abandoned' is interpretive and stronger than the
    lexical sense, so it is left as an alternative nuance rather than the main rendering.
- source_word: יִדְרֹשׁוּ
  chosen: seek
  alternatives:
  - inquire after
  - care for
  lexicon: HALOT
  rationale: דרש commonly means seek, inquire after. Here the sense is that none of
    the former lovers/allies comes looking for or caring about Zion. 'Seek' is concise
    and preserves the lexical core.
- source_word: מַכַּת אוֹיֵב
  chosen: the wound of an enemy
  alternatives:
  - an enemy's blow
  - the striking of an enemy
  lexicon: HALOT
  rationale: מכה can denote blow, wound, plague. In this context of inflicted judgment,
    'wound' fits naturally with 'I have struck you' and preserves the injury imagery.
    The construct with אויב is best rendered 'of an enemy' rather than paraphrased
    away.
- source_word: הִכִּיתִיךְ
  chosen: I have struck you
  alternatives:
  - I struck you
  - I have wounded you
  lexicon: HALOT
  rationale: נכה is the standard verb 'strike/smite.' 'I have struck you' keeps the
    verbal link with the preceding noun for wound/blow and reflects the perfect aspect
    naturally in English.
- source_word: מוּסַר אַכְזָרִי
  chosen: with cruel discipline
  alternatives:
  - with cruel chastisement
  - with harsh correction
  lexicon: HALOT
  rationale: מוּסָר denotes discipline, correction, chastening; אַכְזָרִי means cruel,
    harsh, merciless. 'Cruel discipline' is direct modern English and preserves the
    severity without importing later theological jargon. The preposition is supplied
    idiomatically in English parallel to the previous phrase.
- source_word: עַל רֹב עֲוֺנֵךְ
  chosen: because of the greatness of your iniquity
  alternatives:
  - for the multitude of your iniquity
  - because your guilt is great
  lexicon: HALOT
  rationale: רֹב conveys abundance/greatness; עָוֹן can mean iniquity, guilt, or punishment-for-iniquity
    depending on context. Here it refers to Judah's moral perversity as the reason
    for judgment. 'The greatness of your iniquity' preserves both quantity and moral
    weight.
- source_word: עָצְמוּ חַטֹּאתַיִךְ
  chosen: your sins have become many
  alternatives:
  - your sins are numerous
  - your sins have grown strong/mighty
  lexicon: HALOT
  rationale: עצם can mean be mighty/strong or become numerous/intense depending on
    context. With 'your sins' and in parallel with 'the greatness of your iniquity,'
    the idiomatic sense is increase in number or magnitude. 'Have become many' communicates
    that escalation clearly in modern English.
