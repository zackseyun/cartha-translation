id: JER.30.6
reference: Jeremiah 30:6
source:
  edition: WLC
  text: שַׁאֲלוּ נָ֣א וּ/רְא֔וּ אִם יֹלֵ֖ד זָכָ֑ר מַדּוּעַ֩ רָאִ֨יתִי כָל גֶּ֜בֶר
    יָדָ֤י/ו עַל חֲלָצָי/ו֙ כַּ/יּ֣וֹלֵדָ֔ה וְ/נֶהֶפְכ֥וּ כָל פָּנִ֖ים לְ/יֵרָקֽוֹן־־־־־׃
translation:
  text: 'Ask now, and see: does a male give birth? Why then do I see every man with
    his hands on his loins like a woman in labor, and every face turned pale?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “turned to a greenish pallor.” The Hebrew term suggests a sickly pale
      color.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁאֲלוּ נָא
  chosen: Ask now
  alternatives:
  - Ask, please
  - Inquire now
  lexicon: HALOT
  rationale: Imperative plural with particle of entreaty/exhortation. 'Ask now' is
    natural modern English and preserves the urgent summons without sounding overly
    formal.
- source_word: וּרְאוּ
  chosen: and see
  alternatives:
  - and look
  - and observe
  lexicon: HALOT
  rationale: Common imperative of ראה. 'See' fits the rhetorical invitation to verify
    the absurdity of the image.
- source_word: אִם יֹלֵד זָכָר
  chosen: does a male give birth?
  alternatives:
  - whether a man gives birth
  - does a man bear a child?
  lexicon: HALOT
  rationale: The clause is rhetorical. זָכָר is specifically 'male,' while יֹלֵד is
    'beget/give birth' in this context framed as impossible for a male. 'Male' preserves
    the biological contrast more sharply than 'man,' though 'man' is possible.
- source_word: מַדּוּעַ
  chosen: Why then
  alternatives:
  - Why
  - Why is it that
  lexicon: HALOT
  rationale: Introduces the rhetorical inference from the impossible image. 'Then'
    brings out the argumentative flow in idiomatic English.
- source_word: רָאִיתִי
  chosen: do I see
  alternatives:
  - have I seen
  - I see
  lexicon: HALOT
  rationale: Hebrew perfect can function as present in vivid discourse. English present
    best matches the immediate visionary description.
- source_word: כָל גֶּבֶר
  chosen: every man
  alternatives:
  - every warrior
  - every strong man
  - every male
  lexicon: HALOT
  rationale: גבר often denotes a man in his strength or manliness. Here the point
    is the shocking reversal of masculine strength into labor-like anguish. 'Every
    man' is the most natural and sufficiently preserves the contrast.
- source_word: יָדָיו עַל חֲלָצָיו
  chosen: with his hands on his loins
  alternatives:
  - with his hands on his waist
  - with his hands on his hips
  lexicon: HALOT
  rationale: חֲלָצַיִם refers to loins/waist, often the seat of strength and pain.
    'Loins' preserves the bodily and somewhat visceral force of the Hebrew better
    than the more casual 'hips.'
- source_word: כַּיּוֹלֵדָה
  chosen: like a woman in labor
  alternatives:
  - like a woman giving birth
  - like one in childbirth
  lexicon: HALOT
  rationale: The feminine participle clearly evokes a laboring woman. 'A woman in
    labor' is idiomatic and vivid.
- source_word: וְנֶהֶפְכוּ
  chosen: turned
  alternatives:
  - changed
  - were transformed
  lexicon: HALOT
  rationale: The verb means to be turned/changed. 'Turned' works naturally with facial
    color in English.
- source_word: כָל פָּנִים
  chosen: every face
  alternatives:
  - all faces
  - every countenance
  lexicon: HALOT
  rationale: Collective singular in English is idiomatic here and keeps the distributive
    force.
- source_word: לְיֵרָקוֹן
  chosen: pale
  alternatives:
  - to paleness
  - greenish pallor
  lexicon: HALOT
  rationale: The noun denotes pallor, literally a greenish/yellowish paleness. 'Pale'
    communicates the sense clearly in modern English; the more literal color nuance
    is worth preserving in a footnote.
