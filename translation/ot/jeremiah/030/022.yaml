id: JER.30.22
reference: Jeremiah 30:22
source:
  edition: WLC
  text: וִ/הְיִ֥יתֶם לִ֖/י לְ/עָ֑ם וְ/אָ֣נֹכִ֔י אֶהְיֶ֥ה לָ/כֶ֖ם לֵ/אלֹהִֽים׃ס
translation:
  text: And you will be my people, and I will be your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew more literally, 'you will be to me for a people, and I will be to
      you for God,' a covenant formula expressing mutual belonging.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִהְיִיתֶם
  chosen: you will be
  alternatives:
  - you shall be
  - and you became
  lexicon: HALOT
  rationale: From היה in a qatal form with prefixed conjunction, functioning here
    in prophetic/future sense within a covenant formula. 'You will be' gives clear
    modern English while preserving the future force better than archaic 'you shall
    be.'
- source_word: לִי
  chosen: my
  alternatives:
  - to me
  - for me
  lexicon: HALOT
  rationale: 'The preposition plus first-person suffix is idiomatically rendered possessively
    in English within the covenant formula: ''be my people,'' not the less natural
    ''be to me a people.'''
- source_word: לְעָם
  chosen: people
  alternatives:
  - a people
  lexicon: HALOT
  rationale: Though the Hebrew includes the preposition ל and anarthrous עָם, English
    covenantal style normally renders this idiom as 'my people.' The article is not
    required in English, and omitting 'a' yields the standard, natural expression
    without loss of meaning.
- source_word: וְאָנֹכִי
  chosen: and I
  alternatives:
  - and as for me, I
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis, but standard English can convey
    this adequately with 'and I' in this balanced covenant statement. A more marked
    rendering would sound overly stiff here.
- source_word: אֶהְיֶה
  chosen: I will be
  alternatives:
  - I shall be
  lexicon: HALOT
  rationale: Imperfect of היה with future sense. 'I will be' is the natural modern
    equivalent and preserves the verbal symmetry with 'you will be.'
- source_word: לָכֶם
  chosen: your
  alternatives:
  - to you
  - for you
  lexicon: HALOT
  rationale: 'As with לִי, the preposition plus pronominal suffix is idiomatically
    possessive in this covenant formula: ''your God,'' not ''God to you.'''
- source_word: לֵאלֹהִים
  chosen: God
  alternatives:
  - a god
  - God for you
  lexicon: HALOT
  rationale: In this covenant context, אֱלֹהִים clearly refers to the God of Israel,
    so 'God' is the appropriate English rendering. The idiom 'be your God' is the
    established and accurate equivalent of the Hebrew construction.
