theological_decisions:
- issue: Covenant-formula rendering
  chosen_reading: And you will be my people, and I will be your God.
  alternative_readings:
  - And you shall be my people, and I will be your God.
  - And you will be a people to me, and I will be God to you.
  rationale: This verse uses the classic covenant formula found throughout the Hebrew
    Bible. The chosen rendering preserves the reciprocal covenant relationship without
    importing additional theological claims. It balances formal fidelity with natural
    English, retaining the future orientation and mutual belonging central to the
    text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological
    tension rather than resolve it'
