id: JER.30.5
reference: Jeremiah 30:5
source:
  edition: WLC
  text: כִּי כֹה֙ אָמַ֣ר יְהוָ֔ה ק֥וֹל חֲרָדָ֖ה שָׁמָ֑עְנוּ פַּ֖חַד וְ/אֵ֥ין שָׁלֽוֹם־׃
translation:
  text: 'For thus says the LORD: “We have heard a sound of trembling, of fear, and
    there is no peace.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a voice of trembling'; Hebrew qol can mean 'sound,' 'noise,' or 'voice'
      depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'terror' for 'trembling' and 'dread' for 'fear'; the Hebrew pairs closely
      related terms to intensify the sense of distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the divine declaration by grounding what follows in the LORD's
    speech. 'For' is a natural discourse connector here and preserves the explanatory
    force without over-specifying causation.
- source_word: כֹה אָמַר
  chosen: thus says
  alternatives:
  - thus said
  - this is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Present-tense 'says' is idiomatic
    in English for prophetic citation and reflects the conventional force of the Hebrew
    formula.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and alignment with the stated doctrine guidance.
- source_word: קוֹל
  chosen: a sound
  alternatives:
  - a voice
  - a noise
  lexicon: HALOT
  rationale: Here קוֹל refers not to articulated speech but to an audible report/noise.
    'A sound' best fits the context of hearing distress.
- source_word: חֲרָדָה
  chosen: trembling
  alternatives:
  - terror
  - shaking
  - anxiety
  lexicon: HALOT
  rationale: The noun denotes trembling or quaking brought on by fear. 'Trembling'
    preserves the concrete, experiential sense and pairs well with the following noun
    for fear.
- source_word: שָׁמָעְנוּ
  chosen: We have heard
  alternatives:
  - We hear
  - We heard
  lexicon: HALOT
  rationale: The perfect can be rendered as a present perfect in English to convey
    a reported, presently relevant perception. 'We have heard' is natural and preserves
    the first-person plural of the Hebrew.
- source_word: פַּחַד
  chosen: fear
  alternatives:
  - terror
  - dread
  lexicon: HALOT
  rationale: A broad term for fear or dread. 'Fear' is the most direct rendering and
    avoids overstating the intensity beyond what the Hebrew requires.
- source_word: וְאֵין
  chosen: and there is no
  alternatives:
  - but there is no
  - with no
  lexicon: HALOT
  rationale: The conjunction plus existential negation is straightforwardly rendered
    'and there is no.' This preserves the Hebrew coordination without importing a
    stronger adversative than necessary.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: While שָׁלוֹם can include well-being and wholeness, 'peace' is the most
    idiomatic and contextually fitting rendering in a line contrasting fear and the
    absence of calm or safety.
