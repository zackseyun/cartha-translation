id: JER.30.15
reference: Jeremiah 30:15
source:
  edition: WLC
  text: מַה תִּזְעַק֙ עַל שִׁבְרֵ֔/ךְ אָנ֖וּשׁ מַכְאֹבֵ֑/ךְ עַ֣ל רֹ֣ב עֲוֺנֵ֗/ךְ עָֽצְמוּ֙
    חַטֹּאתַ֔יִ/ךְ עָשִׂ֥יתִי אֵ֖לֶּה לָֽ/ךְ־־׀׃
translation:
  text: Why do you cry out over your injury? Your pain is incurable. Because your
    iniquity is great, because your sins are many, I have done these things to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your wound' for 'your injury.' The Hebrew term can denote a breaking,
      fracture, or wound.
    reason: lexical_alternative
  - marker: b
    text: Or 'your pain is desperate/grievous.' The Hebrew adjective can mean severely
      sick or beyond healing; 'incurable' brings out the likely sense here.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: Why
  alternatives:
  - What
  lexicon: HALOT
  rationale: In interrogative use before an imperfect verb, מַה can introduce a rhetorical
    'why?' question rather than a simple 'what?'. English 'Why do you cry out...?'
    best fits the discourse and parallels common prophetic rebuke.
- source_word: תִּזְעַק
  chosen: do you cry out
  alternatives:
  - do you cry
  - do you call out
  lexicon: HALOT
  rationale: זעק denotes crying out loudly, often in distress. 'Cry out' preserves
    the intensity better than simple 'cry.' The English auxiliary 'do' is supplied
    for natural modern English in an interrogative.
- source_word: עַל
  chosen: over
  alternatives:
  - because of
  - concerning
  lexicon: HALOT
  rationale: 'With the object of lament, עַל is naturally rendered ''over'' in English:
    ''cry out over your injury.'' This keeps the image of lament rather than making
    it purely causal.'
- source_word: שִׁבְרֵךְ
  chosen: your injury
  alternatives:
  - your wound
  - your fracture
  - your brokenness
  lexicon: HALOT
  rationale: שבר can denote a breaking, fracture, collapse, or wound. In this context
    of national devastation and parallel with pain, 'injury' is broad and natural.
    'Wound' is possible, but the next colon already speaks of pain, and 'injury' avoids
    over-narrowing the metaphor.
- source_word: אָנושׁ
  chosen: incurable
  alternatives:
  - desperate
  - grievous
  - sick beyond healing
  lexicon: HALOT
  rationale: The adjective commonly conveys something sick, weak, or beyond remedy.
    In context modifying the pain, 'incurable' captures the sense of hopeless severity.
- source_word: מַכְאֹבֵךְ
  chosen: your pain
  alternatives:
  - your suffering
  - your wound
  lexicon: HALOT
  rationale: מכאוב refers to pain or suffering. 'Your pain' is the most direct lexical
    equivalent and fits the predicate 'is incurable.'
- source_word: עַל רֹב עֲוֺנֵךְ
  chosen: Because your iniquity is great
  alternatives:
  - For the greatness of your iniquity
  - Because of the abundance of your guilt
  lexicon: HALOT
  rationale: The preposition עַל here introduces the reason for the judgment. רֹב
    conveys abundance/greatness. עָוֹן can mean iniquity, guilt, or punishment-for-iniquity;
    here moral wrongdoing is primary, so 'iniquity' is retained.
- source_word: עָצְמוּ חַטֹּאתַיִךְ
  chosen: your sins are many
  alternatives:
  - your sins are mighty
  - your sins have become numerous
  - your sins are great
  lexicon: HALOT
  rationale: 'The verb עצם can mean to be strong, mighty, or numerous. With plural
    ''sins'' in a causal parallel to ''the greatness of your iniquity,'' the idiomatic
    English sense is quantitative/intensive: ''your sins are many.'''
- source_word: עָשִׂיתִי אֵלֶּה לָךְ
  chosen: I have done these things to you
  alternatives:
  - I did these things to you
  - I have done this to you
  lexicon: HALOT
  rationale: The perfect verb presents YHWH's action as accomplished. 'These things'
    reflects the plural demonstrative אֵלֶּה more precisely than singular 'this.'
    'To you' is the natural English rendering of לָךְ in this construction.
