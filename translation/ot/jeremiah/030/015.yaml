theological_decisions:
- issue: Agency of the judgment
  chosen_reading: The speaker, implicitly the LORD from the surrounding context, directly
    states, 'I have done these things to you.'
  alternative_readings:
  - A softer rendering such as 'these things have happened to you'
  rationale: The Hebrew explicitly uses first person singular עָשִׂיתִי ('I have done').
    The translation preserves divine agency in judgment rather than softening it into
    impersonal circumstance.
  doctrine_reference: Translation philosophy §1, §3
