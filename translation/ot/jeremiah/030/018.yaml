theological_decisions:
- issue: Scope of restoration in שָׁב שְׁבוּת
  chosen_reading: A broad restoration of Jacob's condition/fortunes, not restricted to literal release from captivity.
  alternative_readings:
  - Literal return of captives
  - Restoration from exile/captivity with broader implications
  rationale: The idiom can include return from captivity, but in prophetic usage it often widens to comprehensive reversal and restoration. The verse's references to tents, dwellings, city, and palace support a holistic restoration reading. The captivity-oriented nuance is preserved in a footnote rather than made exclusive in the main text.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
