id: JER.30.18
reference: Jeremiah 30:18
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה הִנְ/נִי שָׁב֙ שְׁבוּת֙ אָהֳלֵ֣י יַֽעֲק֔וֹב וּ/מִשְׁכְּנֹתָ֖י/ו אֲרַחֵ֑ם וְ/נִבְנְתָ֥ה עִיר֙ עַל תִּלָּ֔/הּ וְ/אַרְמ֖וֹן עַל מִשְׁפָּט֥/וֹ יֵשֵֽׁב׀־־־׃
translation:
  text: 'Thus says Yahweh: Behold, I am restoring the fortunes of the tents of Jacob, and I will have compassion on his dwellings. The city will be rebuilt on its mound, and the palace will stand in its proper place.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I am bringing back the captives of the tents of Jacob,' or 'I am restoring Jacob from captivity.' The Hebrew idiom can refer specifically to return from captivity or more broadly to restored fortunes.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name, preserving covenantal sense while matching established English convention.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: Retains the deictic and emphatic force of the Hebrew particle plus pronoun. 'Behold' is slightly formal but still readable and preserves prophetic solemnity.
- source_word: שָׁב שְׁבוּת
  chosen: am restoring the fortunes
  alternatives:
  - will restore the fortunes
  - am bringing back the captives
  - am restoring from captivity
  lexicon: HALOT
  rationale: This idiom often denotes reversal of distress and restoration, not only literal return of captives. 'Restoring the fortunes' best captures the broader idiomatic sense here, while the captivity-oriented alternative is preserved in a footnote because the phrase can carry that nuance.
- source_word: אָהֳלֵי יַעֲקֹב
  chosen: the tents of Jacob
  alternatives:
  - Jacob's tents
  lexicon: HALOT
  rationale: A fairly direct rendering that preserves the metaphorical/corporate image for the people of Jacob without over-interpreting it.
- source_word: מִשְׁכְּנֹתָיו
  chosen: his dwellings
  alternatives:
  - his habitations
  - his tabernacles
  - his homes
  lexicon: HALOT
  rationale: '''Dwellings'' is natural modern English and keeps the concrete habitation imagery. ''Homes'' is possible but slightly more interpretive and domestic in tone.'
- source_word: אֲרַחֵם
  chosen: I will have compassion
  alternatives:
  - I will show mercy
  - I will pity
  lexicon: HALOT
  rationale: Conveys covenantal mercy/compassion in accessible English. 'Have compassion' is idiomatic and avoids the narrower or potentially misleading connotations of 'pity'.
- source_word: וְנִבְנְתָה עִיר
  chosen: The city will be rebuilt
  alternatives:
  - A city will be rebuilt
  - The city shall be built
  lexicon: HALOT
  rationale: Although the noun lacks the article, the context points to the restored city of Zion/Jerusalem rather than an indefinite city. 'Will be rebuilt' captures the passive/resultative sense naturally.
- source_word: עַל תִּלָּהּ
  chosen: on its mound
  alternatives:
  - on its ruin mound
  - on its hill
  lexicon: HALOT
  rationale: תֵּל commonly refers to a mound, often a ruin-heap or archaeological tell. 'On its mound' is concise and accurate; 'hill' is too generic, while 'ruin mound' may over-specify beyond what the immediate context requires.
- source_word: אַרְמוֹן
  chosen: the palace
  alternatives:
  - the citadel
  - the fortress
  - the mansion
  lexicon: HALOT
  rationale: In this restoration context, 'palace' is the most straightforward rendering for a prominent royal or noble structure. 'Citadel' would stress military function more than the Hebrew necessarily does.
- source_word: עַל מִשְׁפָּטוֹ יֵשֵׁב
  chosen: will stand in its proper place
  alternatives:
  - will sit according to its ordinance
  - will remain in its rightful place
  - will be inhabited according to its custom
  lexicon: HALOT
  rationale: The Hebrew is somewhat idiomatic. מִשְׁפָּט here likely denotes proper order, prescribed arrangement, or rightful place. 'Will stand in its proper place' communicates the sense of ordered restoration in clear English. 'Sit according to its ordinance' is too wooden and obscure in English.
