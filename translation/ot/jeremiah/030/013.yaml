id: JER.30.13
reference: Jeremiah 30:13
source:
  edition: WLC
  text: אֵֽין דָּ֥ן דִּינֵ֖/ךְ לְ/מָז֑וֹר רְפֻא֥וֹת תְּעָלָ֖ה אֵ֥ין לָֽ/ךְ־׃
translation:
  text: There is no one to plead your case for your wound; there is no healing for
    you, no remedy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There is no one to judge your case concerning your wound.' The Hebrew
      legal imagery can be rendered either as advocacy ('plead your case') or adjudication
      ('judge your case').
    reason: lexical_alternative
  - marker: b
    text: The final phrase may also be understood more concretely as 'no bandage for
      you' or 'no new flesh for you,' reflecting the rare Hebrew term translated 'remedy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  chosen: There is no / there is no one
  alternatives:
  - none
  - there is not
  lexicon: HALOT
  rationale: The existential negative introduces both clauses. In English, the first
    instance is best expanded to 'There is no one' because it governs the participle
    דָּן ('one who judges/pleads'), while the second is naturally rendered 'there
    is no' before the prepositional phrase 'for you.'
- source_word: דָּן
  chosen: to plead
  alternatives:
  - judging
  - to judge
  - to defend
  lexicon: HALOT
  rationale: From דין in the sense of conducting or deciding a legal case. In context
    with דִּינֵךְ ('your case'), the idiom points to legal advocacy rather than abstract
    judging, so 'to plead' captures the forensic nuance in natural English.
- source_word: דִּינֵךְ
  chosen: your case
  alternatives:
  - your cause
  - your legal claim
  - your lawsuit
  lexicon: HALOT
  rationale: The noun דין commonly denotes a legal case or cause. 'Your case' is concise,
    readable modern English and preserves the juridical sense.
- source_word: לְמָזוֹר
  chosen: for your wound
  alternatives:
  - for healing
  - for your sore
  - for your injury
  lexicon: HALOT
  rationale: 'מָזוֹר denotes a wound, sore, or injury. The prefixed ל is taken with
    the legal idiom: no one pleads your case ''for'' or ''concerning'' your wound.
    ''Wound'' fits the broader sickness/injury imagery in the verse.'
- source_word: רְפֻאוֹת
  chosen: healing
  alternatives:
  - healings
  - remedies
  lexicon: HALOT
  rationale: Although formally plural, the noun can function collectively. Singular
    'healing' is more idiomatic in English in this clause, while still conveying the
    absence of any curative possibility.
- source_word: תְּעָלָה
  chosen: remedy
  alternatives:
  - bandage
  - new flesh
  - healing skin
  lexicon: HALOT
  rationale: This rare noun is difficult and has been understood as a healing bandage,
    the growth of new flesh over a wound, or a remedy. Given the immediate medical
    context and the need for readable English, 'remedy' communicates the practical
    sense without overcommitting to a more technical image; an alternative is preserved
    in a footnote.
- source_word: אֵין לָךְ
  chosen: for you
  alternatives:
  - you have none
  - belongs to you
  lexicon: HALOT
  rationale: The phrase expresses nonexistence with reference to the addressee. In
    English, 'there is no healing for you, no remedy' is smoother than repeating 'you
    have no...' while preserving the sense.
