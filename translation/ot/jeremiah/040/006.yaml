theological_decisions:
- issue: Potential theological overreading of הַנִּשְׁאָרִים as 'the remnant'
  chosen_reading: who were left
  alternative_readings:
  - the remnant
  - who remained
  rationale: Although 'remnant' can be a valid contextual/theological concept in Jeremiah,
    this verse uses a participial descriptor rather than an explicit technical remnant
    term. Rendering it descriptively preserves the text's immediate sense without
    importing extra theological freight.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
