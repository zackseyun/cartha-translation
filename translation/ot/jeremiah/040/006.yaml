id: JER.40.6
reference: Jeremiah 40:6
source:
  edition: WLC
  text: וַ/יָּבֹ֧א יִרְמְיָ֛הוּ אֶל גְּדַלְיָ֥ה בֶן אֲחִיקָ֖ם הַ/מִּצְפָּ֑תָ/ה וַ/יֵּ֤שֶׁב
    אִתּ/וֹ֙ בְּ/ת֣וֹךְ הָ/עָ֔ם הַ/נִּשְׁאָרִ֖ים בָּ/אָֽרֶץ־־׃ס
translation:
  text: So Jeremiah went to Gedaliah son of Ahikam at Mizpah, and he lived with him
    among the people who were left in the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who remained'; literally 'the ones left/remaining in the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: went
  alternatives:
  - came
  lexicon: HALOT
  rationale: The verb בוא in narrative can be rendered either 'came' or 'went' depending
    on English deictic perspective. 'Went' reads naturally in English from the narrator's
    standpoint and fits Jeremiah's movement to Gedaliah.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is the natural modern English
    equivalent.
- source_word: גְּדַלְיָה בֶן אֲחִיקָם
  chosen: Gedaliah son of Ahikam
  alternatives:
  - Gedaliah the son of Ahikam
  rationale: Personal names are transliterated per project philosophy. 'Son of' is
    retained as the normal Hebrew patronymic construction.
- source_word: הַמִּצְפָּתָה
  chosen: at Mizpah
  alternatives:
  - to Mizpah
  lexicon: HALOT
  rationale: 'The directional/locative ending on the place name indicates movement
    toward the place, but in English after ''went to Gedaliah'' the phrase is best
    understood appositionally/locatively as identifying where Gedaliah was: ''at Mizpah.''
    This avoids awkward double ''to'' phrasing while preserving the sense.'
- source_word: וַיֵּשֶׁב
  chosen: lived
  alternatives:
  - dwelt
  - stayed
  - sat
  lexicon: HALOT
  rationale: ישב often means 'dwell, live, stay' in settlement contexts. 'Lived' best
    conveys ongoing residence here, more idiomatically than the overly literal 'sat'
    and more durably than merely temporary 'stayed'.
- source_word: אִתּוֹ
  chosen: with him
  lexicon: HALOT
  rationale: Straightforward comitative phrase referring to Gedaliah.
- source_word: בְּתוֹךְ
  chosen: among
  alternatives:
  - in the midst of
  lexicon: HALOT
  rationale: '''Among'' gives the social sense naturally in English; ''in the midst
    of'' is more formal but not necessary here.'
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the population
  lexicon: HALOT
  rationale: עם commonly denotes 'people' in a collective sense. 'The people' is the
    most natural rendering in context.
- source_word: הַנִּשְׁאָרִים
  chosen: who were left
  alternatives:
  - who remained
  - the remnant
  lexicon: HALOT
  rationale: The Niphal participle from שׁאר means those left/remaining. 'Who were
    left' is clear and avoids importing the more theologically loaded noun 'remnant'
    where the text uses a participial description.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ/land of Judah
  - in the country
  lexicon: HALOT
  rationale: '''In the land'' preserves the Hebrew wording without over-specifying
    beyond the immediate context. The referent is the land of Judah, but the verse
    itself simply says ''the land.'''
