id: JER.40.11
reference: Jeremiah 40:11
source:
  edition: WLC
  text: וְ/גַ֣ם כָּֽל הַ/יְּהוּדִ֡ים אֲשֶׁר בְּ/מוֹאָ֣ב וּ/בִ/בְנֵֽי עַמּ֨וֹן וּ/בֶ/אֱד֜וֹם
    וַ/אֲשֶׁ֤ר בְּ/כָל הָֽ/אֲרָצוֹת֙ שָֽׁמְע֔וּ כִּֽי נָתַ֧ן מֶֽלֶךְ בָּבֶ֛ל שְׁאֵרִ֖ית
    לִֽ/יהוּדָ֑ה וְ/כִי֙ הִפְקִ֣יד עֲלֵי/הֶ֔ם אֶת גְּדַלְיָ֖הוּ בֶּן אֲחִיקָ֥ם בֶּן
    שָׁפָֽן־־׀־־־־־־־׃
translation:
  text: Also, all the Judeans who were in Moab, among the Ammonites, in Edom, and
    in all the other lands heard that the king of Babylon had left a remnant for Judah
    and had appointed Gedaliah son of Ahikam, son of Shaphan, over them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'survivors for Judah.' The Hebrew term can refer more generally to those
      left alive after disaster.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: Also
  alternatives:
  - And also
  - Moreover
  lexicon: HALOT
  rationale: Connective-plus-additive particle continuing the narrative and adding
    another group to the report. 'Also' is natural modern English and preserves the
    additive force without overloading the sentence with conjunctions.
- source_word: כָּל הַיְּהוּדִים
  chosen: all the Judeans
  alternatives:
  - all the Jews
  lexicon: HALOT
  rationale: In this exilic/territorial context, 'Judeans' better reflects people
    identified with Judah rather than later broader ethnic-religious 'Jews.' 'All'
    preserves the comprehensiveness of כָּל.
- source_word: אֲשֶׁר בְּמוֹאָב וּבִבְנֵי עַמּוֹן וּבֶאֱדוֹם
  chosen: who were in Moab, among the Ammonites, in Edom
  alternatives:
  - who were in Moab, in Ammon, in Edom
  - who were in Moab, among the sons of Ammon, in Edom
  lexicon: HALOT
  rationale: The prepositional phrases identify the dispersed Judeans' locations.
    בְּנֵי עַמּוֹן is rendered idiomatically as 'the Ammonites' rather than the more
    wooden 'sons of Ammon.' 'Among the Ammonites' reflects the people-group sense
    naturally in English.
- source_word: וַאֲשֶׁר בְּכָל הָאֲרָצוֹת
  chosen: and in all the other lands
  alternatives:
  - and who were in all the lands
  - and in all the countries
  lexicon: HALOT
  rationale: The phrase broadens beyond the named neighboring regions to additional
    places of dispersion. 'Other lands' makes explicit the contrast with the previously
    named places and reads naturally in English; 'lands' is preferred over 'countries'
    for the ancient setting.
- source_word: שָׁמְעוּ
  chosen: heard
  alternatives:
  - came to hear
  - learned
  lexicon: HALOT
  rationale: Simple narrative verb of receiving news. 'Heard' is the plain sense and
    fits the following content clause.
- source_word: כִּי נָתַן מֶלֶךְ בָּבֶל שְׁאֵרִית לִיהוּדָה
  chosen: that the king of Babylon had left a remnant for Judah
  alternatives:
  - that the king of Babylon had given a remnant to Judah
  - that the king of Babylon had left survivors for Judah
  lexicon: HALOT
  rationale: נָתַן literally 'gave,' but in context of post-destruction survival it
    idiomatically means the king had allowed/left a surviving group. שְׁאֵרִית is
    a significant term often rendered 'remnant'; that rendering preserves both lexical
    continuity and possible theological resonance without overstating it.
- source_word: וְכִי הִפְקִיד עֲלֵיהֶם
  chosen: and had appointed ... over them
  alternatives:
  - and had set ... over them
  - and had entrusted them to
  lexicon: HALOT
  rationale: הִפְקִיד in the Hiphil here denotes placing someone in charge. 'Appointed
    ... over them' clearly expresses administrative authority in idiomatic English.
- source_word: אֶת גְּדַלְיָהוּ בֶּן אֲחִיקָם בֶּן שָׁפָן
  chosen: Gedaliah son of Ahikam, son of Shaphan
  alternatives:
  - Gedaliah the son of Ahikam, the son of Shaphan
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. The filial
    chain is preserved straightforwardly; omission of repeated articles keeps the
    English readable while retaining the genealogy.
