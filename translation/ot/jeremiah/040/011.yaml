theological_decisions:
- issue: Rendering שְׁאֵרִית
  chosen_reading: remnant
  alternative_readings:
  - survivors
  rationale: The Hebrew term can denote those left after catastrophe. 'Remnant' preserves
    the lexical and canonical resonance common in prophetic literature while still
    fitting the immediate historical context. Because the verse itself does not explicitly
    develop a theological remnant motif, the translation avoids adding interpretive
    weight beyond the word's normal sense.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
