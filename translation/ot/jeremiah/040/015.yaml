id: JER.40.15
reference: Jeremiah 40:15
source:
  edition: WLC
  text: וְ/יוֹחָנָ֣ן בֶּן קָרֵ֡חַ אָמַ֣ר אֶל גְּדַלְיָהוּ֩ בַ/סֵּ֨תֶר בַּ/מִּצְפָּ֜ה
    לֵ/אמֹ֗ר אֵ֤לְכָה נָּא֙ וְ/אַכֶּה֙ אֶת יִשְׁמָעֵ֣אל בֶּן נְתַנְיָ֔ה וְ/אִ֖ישׁ
    לֹ֣א יֵדָ֑ע לָ֧/מָּה יַכֶּ֣/כָּה נֶּ֗פֶשׁ וְ/נָפֹ֨צוּ֙ כָּל יְהוּדָ֔ה הַ/נִּקְבָּצִ֣ים
    אֵלֶ֔י/ךָ וְ/אָבְדָ֖ה שְׁאֵרִ֥ית יְהוּדָֽה־־־־־׃
translation:
  text: Then Johanan son of Kareah said privately to Gedaliah at Mizpah, saying, “Please
    let me go and strike down Ishmael son of Nethaniah, and no man will know. Why
    should he take your life, so that all the Judahites who are gathered to you would
    be scattered, and the remnant of Judah would perish?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in secret' / 'secretly.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew ''no man will know''; the sense is generic: ''no one will know.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'Why should he kill you?' Literally, 'Why should he strike you—life?'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַסֵּתֶר
  chosen: privately
  alternatives:
  - in secret
  - secretly
  lexicon: HALOT
  rationale: 'The noun means ''secret, hiding place.'' With the preposition and in
    this conversational context, an adverbial English rendering is most natural: Johanan
    spoke to Gedaliah privately.'
- source_word: בַמִּצְפָּה
  chosen: at Mizpah
  alternatives:
  - in Mizpah
  lexicon: HALOT
  rationale: The place name is transliterated per philosophy. 'At Mizpah' is idiomatic
    for a location where the conversation occurred.
- source_word: אֵלְכָה נָּא
  chosen: Please let me go
  alternatives:
  - Let me go, please
  - Please, I will go
  lexicon: HALOT
  rationale: The cohortative with נָא expresses a polite request or urgent proposal.
    'Please let me go' captures both the volitional force and the politeness.
- source_word: וְאַכֶּה
  chosen: and strike down
  alternatives:
  - and kill
  - and attack
  lexicon: HALOT
  rationale: נכה literally means 'strike/smite,' but here the intended result is assassination.
    'Strike down' preserves the violent literal sense without over-paraphrasing; 'kill'
    is possible but slightly more interpretive.
- source_word: וְאִישׁ לֹא יֵדָע
  chosen: and no man will know
  alternatives:
  - and no one will know
  lexicon: HALOT
  rationale: The Hebrew uses אִישׁ, literally 'man.' Following the gender-accurate
    principle, 'no man' is retained in the main text, though the sense is generic.
- source_word: לָמָּה יַכֶּכָּה נֶפֶשׁ
  chosen: Why should he take your life
  alternatives:
  - Why should he strike you down
  - Why should he kill you
  lexicon: HALOT
  rationale: 'The clause is idiomatic and somewhat compressed: literally, ''Why should
    he strike you, life?'' The noun נֶפֶשׁ here refers to the person''s life. ''Take
    your life'' conveys the idiomatic sense clearly while preserving the threat of
    murder.'
- source_word: וְנָפֹצוּ
  chosen: would be scattered
  alternatives:
  - will be scattered
  - would be dispersed
  lexicon: HALOT
  rationale: The verb denotes being scattered/dispersed. In English, after 'Why should
    he... so that,' the modal 'would be scattered' best reflects the projected consequence.
- source_word: כָּל יְהוּדָה
  chosen: all the Judahites
  alternatives:
  - all Judah
  - all the Jews
  lexicon: HALOT
  rationale: Here the reference is to the people, not merely the territory. 'Judahites'
    best captures the ethnopolitical group in this historical setting and avoids anachronistic
    associations of 'Jews' for some readers.
- source_word: הַנִּקְבָּצִים אֵלֶיךָ
  chosen: who are gathered to you
  alternatives:
  - who have gathered to you
  - who are assembling around you
  lexicon: HALOT
  rationale: The participle describes the Judeans presently assembled under Gedaliah's
    leadership. 'Gathered to you' preserves the directional nuance אֵלֶיךָ.
- source_word: שְׁאֵרִית יְהוּדָה
  chosen: the remnant of Judah
  alternatives:
  - the remainder of Judah
  - the surviving remnant of Judah
  lexicon: HALOT
  rationale: '''Remnant'' is the standard and theologically resonant rendering for
    שְׁאֵרִית, and here it refers to the surviving community of Judah after catastrophe.'
- source_word: וְאָבְדָה
  chosen: would perish
  alternatives:
  - would be destroyed
  - would be lost
  lexicon: HALOT
  rationale: אבד can mean perish, be destroyed, or be lost. 'Would perish' fits the
    context of communal ruin and pairs naturally with 'would be scattered.'
