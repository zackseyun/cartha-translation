id: JER.40.13
reference: Jeremiah 40:13
source:
  edition: WLC
  text: וְ/יֽוֹחָנָן֙ בֶּן קָרֵ֔חַ וְ/כָל שָׂרֵ֥י הַ/חֲיָלִ֖ים אֲשֶׁ֣ר בַּ/שָּׂדֶ֑ה
    בָּ֥אוּ אֶל גְּדַלְיָ֖הוּ הַ/מִּצְפָּֽתָ/ה־־־׃
translation:
  text: And Johanan son of Kareah, and all the commanders of the forces who were in
    the open country, came to Gedaliah at Mizpah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who were in the field.' The Hebrew expression can refer more literally
      to the field/fields, or more broadly to the open country/countryside.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יֽוֹחָנָן
  chosen: And Johanan
  alternatives:
  - Now Johanan
  - Then Johanan
  lexicon: HALOT
  rationale: The conjunction וְ is rendered simply as 'And' to preserve the narrative
    flow without overinterpreting discourse nuance. The personal name is transliterated
    per translation philosophy.
- source_word: בֶּן קָרֵחַ
  chosen: son of Kareah
  alternatives:
  - the son of Kareah
  lexicon: HALOT
  rationale: Standard Hebrew patronymic construction; 'son of' is the natural English
    equivalent. The father's name is transliterated.
- source_word: וְ/כָל
  chosen: and all
  alternatives:
  - with all
  lexicon: HALOT
  rationale: Coordinates Johanan with the larger group. 'And all' best reflects the
    simple conjunction plus totalizing noun.
- source_word: שָׂרֵי הַ/חֲיָלִים
  chosen: the commanders of the forces
  alternatives:
  - the captains of the armies
  - the officers of the troops
  - the commanders of the soldiers
  lexicon: HALOT
  rationale: שָׂרִים are leaders/commanders, and חַיִל in this context refers to military
    forces. 'Commanders of the forces' is clear modern English and fits the military
    setting better than the more archaic 'captains.'
- source_word: אֲשֶׁר בַּ/שָּׂדֶה
  chosen: who were in the open country
  alternatives:
  - who were in the field
  - who were in the countryside
  lexicon: HALOT
  rationale: The phrase distinguishes these military leaders as being outside the
    city, in the rural area. 'Open country' conveys the geographic sense idiomatically
    while preserving the contrast implied by 'field.'
- source_word: בָּ֥אוּ
  chosen: came
  alternatives:
  - went
  lexicon: HALOT
  rationale: The verb בוא commonly means 'come' or 'go' depending on viewpoint. Since
    the destination is specified from the narrator's perspective, 'came' is the most
    natural English rendering.
- source_word: אֶל גְּדַלְיָהוּ
  chosen: to Gedaliah
  alternatives:
  - unto Gedaliah
  lexicon: HALOT
  rationale: אֶל marks movement toward a person; 'to Gedaliah' is the standard modern
    rendering.
- source_word: הַ/מִּצְפָּתָ/ה
  chosen: at Mizpah
  alternatives:
  - to Mizpah
  lexicon: HALOT
  rationale: 'The directional he on the place name can indicate motion toward Mizpah,
    but in English the clause naturally expresses the meeting with Gedaliah located
    there: ''came to Gedaliah at Mizpah.'' This avoids awkward double ''to'' phrasing
    while preserving the destination sense.'
