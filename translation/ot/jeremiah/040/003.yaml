theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH and preserves continuity
    with Jewish reverence practice and longstanding English Bible convention without
    obscuring that the covenant God is in view.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to make שׁמע בקולו explicitly 'obey'
  chosen_reading: did not listen to his voice
  alternative_readings:
  - did not obey his voice
  - did not obey him
  rationale: The Hebrew idiom includes obedience, but the more literal 'listen to
    his voice' preserves the wording and lets the context convey the covenantal disobedience
    without over-resolving the nuance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
