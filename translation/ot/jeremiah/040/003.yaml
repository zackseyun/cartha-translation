id: JER.40.3
reference: Jeremiah 40:3
source:
  edition: WLC
  text: וַ/יָּבֵ֥א וַ/יַּ֛עַשׂ יְהוָ֖ה כַּ/אֲשֶׁ֣ר דִּבֵּ֑ר כִּֽי חֲטָאתֶ֤ם לַֽ/יהוָה֙
    וְ/לֹֽא שְׁמַעְתֶּ֣ם בְּ/קוֹל֔/וֹ וְ/הָיָ֥ה לָ/כֶ֖ם דבר הַ/זֶּֽה־־׃
translation:
  text: And the LORD has brought it about and has done just as he said, because you
    sinned against the LORD and did not listen to his voice; so this thing has happened
    to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'did not obey his voice.' The Hebrew idiom 'listen to his voice' often
      carries the sense of obedience.
    reason: lexical_alternative
  - marker: b
    text: Or, 'this disaster has come upon you.' Hebrew 'this thing' can refer more
      specifically to the calamity just described.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  chosen: has brought it about
  alternatives:
  - has brought
  - has caused it to come
  - brought about
  lexicon: HALOT
  rationale: From בוא in a causative sense here, referring to the calamity/event coming
    upon the people. English needs an object implied by context; 'it' refers to the
    disaster just mentioned. 'Brought it about' captures the idiomatic causative force
    better than a bare 'brought.'
- source_word: וַיַּעַשׂ
  chosen: has done
  alternatives:
  - has acted
  - has carried out
  lexicon: HALOT
  rationale: עשה commonly means 'do/make.' In parallel with 'has brought it about'
    and followed by 'just as he said,' 'has done' preserves the Hebrew simplicity
    while conveying fulfillment of declared judgment.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: כַּאֲשֶׁר דִּבֵּר
  chosen: just as he said
  alternatives:
  - as he spoke
  - according to what he said
  lexicon: HALOT
  rationale: This clause links the event to the LORD's prior prophetic word. 'Just
    as he said' is natural modern English and preserves the fulfillment emphasis.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the judgment in this context; 'because' is
    clearer than the more formal 'for.'
- source_word: חֲטָאתֶם לַיהוָה
  chosen: you sinned against the LORD
  alternatives:
  - you sinned to the LORD
  lexicon: HALOT
  rationale: English idiom requires 'against' with 'sin' in this context; it expresses
    offense committed against the LORD.
- source_word: וְלֹא שְׁמַעְתֶּם בְּקוֹלוֹ
  chosen: and did not listen to his voice
  alternatives:
  - and did not obey his voice
  - and did not listen to him
  lexicon: HALOT
  rationale: שׁמע בקול often carries the sense of heeding/obeying. 'Listen to his
    voice' keeps the Hebrew imagery while still implying refusal to heed. 'Obey' is
    possible but slightly more interpretive.
- source_word: וְהָיָה לָכֶם
  chosen: so this thing has happened to you
  alternatives:
  - and this thing came to be for you
  - and this has come upon you
  lexicon: HALOT
  rationale: The Hebrew idiom means that this state of affairs has come upon them.
    Rendering the clause together with דבר הזה yields natural English while preserving
    the resultative sense.
- source_word: דבר הזה
  chosen: this thing
  alternatives:
  - this matter
  - this event
  - this disaster
  lexicon: HALOT
  rationale: דבר can mean 'thing/matter/event.' 'This thing' is formally close and
    leaves the referent broad, matching the Hebrew. 'Disaster' is contextually plausible
    but more interpretive than the source wording.
