id: JER.40.16
reference: Jeremiah 40:16
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר גְּדַלְיָ֤הוּ בֶן אֲחִיקָם֙ אֶל יוֹחָנָ֣ן בֶּן קָרֵ֔חַ אַֽל תעש
    אֶת הַ/דָּבָ֣ר הַ/זֶּ֑ה כִּֽי שֶׁ֛קֶר אַתָּ֥ה דֹבֵ֖ר אֶל יִשְׁמָעֵֽאל־־־־־־־׃ס
translation:
  text: But Gedaliah son of Ahikam said to Johanan son of Kareah, “Do not do this
    thing, for you are speaking a lie about Ishmael.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “you are speaking falsely about Ishmael”; the Hebrew literally says “you
      are speaking a lie about/concerning Ishmael.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: But ... said
  alternatives:
  - And ... said
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. English 'But' captures the
    adversative sense in context, since Gedaliah's response rejects Johanan's prior
    claim and proposal. 'Said' is the standard rendering of אמר.
- source_word: גְּדַלְיָהוּ בֶן אֲחִיקָם
  chosen: Gedaliah son of Ahikam
  rationale: Personal names are transliterated per project philosophy. 'Ben' is rendered
    'son of' in normal English genealogical style.
- source_word: אֶל יוֹחָנָן בֶּן קָרֵחַ
  chosen: to Johanan son of Kareah
  rationale: אֶל after אמר is naturally 'to.' Names are transliterated; patronymic
    rendered idiomatically.
- source_word: אַל תעש
  chosen: Do not do
  alternatives:
  - Do not carry out
  - You must not do
  lexicon: HALOT
  rationale: אַל with the imperfect gives a prohibition. 'Do not do' is the most direct
    and sufficiently natural rendering, preserving the verbal force without over-interpreting
    the action as specifically 'carry out' or 'attempt.'
- source_word: אֶת הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this matter
  - this plan
  lexicon: HALOT
  rationale: דבר can mean 'word, matter, thing.' Here it refers to the proposed act
    against Ishmael. 'This thing' is formally close and idiomatic enough; 'this matter'
    is possible, while 'this plan' is more interpretive than the Hebrew requires.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition. 'For' is concise and natural
    in direct speech.
- source_word: שֶׁקֶר
  chosen: a lie
  alternatives:
  - falsely
  - lies
  - falsehood
  lexicon: HALOT
  rationale: 'With דבר (''speak''), the noun functions adverbially/objectively: ''speak
    a lie'' or ''speak falsely.'' ''A lie'' preserves the nominal form and the directness
    of the accusation.'
- source_word: אַתָּה דֹבֵר
  chosen: you are speaking
  alternatives:
  - you speak
  - you are saying
  lexicon: HALOT
  rationale: The participle דֹבֵר with the pronoun can be rendered as present progressive
    or simple present. 'You are speaking' fits the immediate dialogue and keeps the
    ongoing force.
- source_word: אֶל יִשְׁמָעֵאל
  chosen: about Ishmael
  alternatives:
  - concerning Ishmael
  - against Ishmael
  - to Ishmael
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to,' after verbs of speaking it can mark
    the person spoken about/against in context. Here Gedaliah is rejecting Johanan's
    accusation regarding Ishmael, not saying Johanan is speaking to Ishmael. 'About
    Ishmael' best fits the discourse context; 'against Ishmael' is possible but slightly
    more interpretive.
