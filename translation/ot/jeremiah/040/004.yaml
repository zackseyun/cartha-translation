id: JER.40.4
reference: Jeremiah 40:4
source:
  edition: WLC
  text: וְ/עַתָּ֞ה הִנֵּ֧ה פִתַּחְתִּ֣י/ךָ הַ/יּ֗וֹם מִֽן הָ/אזִקִּים֮ אֲשֶׁ֣ר עַל
    יָדֶ/ךָ֒ אִם ט֨וֹב בְּ/עֵינֶ֜י/ךָ לָ/ב֧וֹא אִתִּ֣/י בָבֶ֗ל בֹּ֚א וְ/אָשִׂ֤ים אֶת
    עֵינִ/י֙ עָלֶ֔י/ךָ וְ/אִם רַ֧ע בְּ/עֵינֶ֛י/ךָ לָ/בֽוֹא אִתִּ֥/י בָבֶ֖ל חֲדָ֑ל
    רְאֵה֙ כָּל הָ/אָ֣רֶץ לְ/פָנֶ֔י/ךָ אֶל ט֨וֹב וְ/אֶל הַ/יָּשָׁ֧ר בְּ/עֵינֶ֛י/ךָ
    לָ/לֶ֥כֶת שָׁ֖מָּ/ה לֵֽךְ־־־־־־־־־׃
translation:
  text: And now, look, I have freed you today from the chains that were on your hands.
    If it is good in your eyes to come with me to Babylon, come, and I will look after
    you. But if it is bad in your eyes to come with me to Babylon, then do not. See,
    the whole land is before you; go wherever it is good and right in your eyes to
    go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'I will set my eye on you,' an idiom here expressing favorable
      care or protection.
    reason: lexical_alternative
  - marker: b
    text: Or, more literally, 'If it is good in your eyes ... if it is bad in your
      eyes.' This Hebrew idiom means 'if it seems good/right to you ... if it seems
      bad/wrong to you.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'go there, go' at the end of the verse, a Hebrew way of giving
      emphatic permission.
    reason: lexical_alternative
lexical_decisions:
- source_word: פִתַּחְתִּיךָ
  chosen: I have freed you
  alternatives:
  - I have opened you
  - I have released you
  lexicon: HALOT
  rationale: The verb פתח literally means 'open,' but with a person as object and
    followed by 'from the chains,' the idiomatic sense is release/liberation from
    restraint. 'Freed you' is natural English and fits the immediate context of removing
    bonds.
- source_word: הָאזִקִּים
  chosen: the chains
  alternatives:
  - the fetters
  - the shackles
  lexicon: HALOT
  rationale: The noun refers to restraints placed on a prisoner. 'Chains' is clear
    modern English; 'fetters' is more formal/archaic, and 'shackles' is possible but
    slightly more specific than the Hebrew requires.
- source_word: אֲשֶׁר עַל יָדֶךָ
  chosen: that were on your hands
  alternatives:
  - that were on your wrists
  - that were on your arms
  lexicon: HALOT
  rationale: Hebrew יָד can include hand/arm, but in the context of restraints, 'hands'
    is a straightforward rendering that preserves the Hebrew wording without over-specifying
    anatomy.
- source_word: אִם טוֹב בְּעֵינֶיךָ
  chosen: If it is good in your eyes
  alternatives:
  - If it seems good to you
  - If you think it best
  lexicon: HALOT
  rationale: This preserves the common Hebrew idiom while remaining understandable
    in English. It is slightly more formal than a fully dynamic rendering, but suitable
    in optimal equivalence.
- source_word: וְאָשִׂים אֶת־עֵינִי עָלֶיךָ
  chosen: I will look after you
  alternatives:
  - I will set my eye on you
  - I will keep my eye on you
  - I will care for you
  lexicon: HALOT
  rationale: Literally 'I will set my eye upon you.' In this context from the Babylonian
    official to Jeremiah, the sense is favorable oversight/protection, not hostile
    surveillance. 'Look after you' communicates benevolent care clearly.
- source_word: וְאִם רַע בְּעֵינֶיךָ
  chosen: if it is bad in your eyes
  alternatives:
  - if it seems wrong to you
  - if it is displeasing to you
  lexicon: HALOT
  rationale: This mirrors the earlier idiom with טוֹב and preserves the Hebrew contrast.
    'Bad in your eyes' is somewhat literal but still intelligible; it keeps the rhetorical
    symmetry of the verse.
- source_word: חֲדָל
  chosen: then do not
  alternatives:
  - refrain
  - forbear
  - stop
  lexicon: HALOT
  rationale: Here the imperative means to desist from the proposed action, i.e., not
    to come to Babylon. 'Then do not' makes the implied object explicit in natural
    English.
- source_word: רְאֵה
  chosen: See
  alternatives:
  - Look
  - Behold
  lexicon: HALOT
  rationale: '''See'' works well as a discourse marker introducing the option set
    before Jeremiah. ''Behold'' is too archaic; ''Look'' is also possible.'
- source_word: כָּל־הָאָרֶץ לְפָנֶיךָ
  chosen: the whole land is before you
  alternatives:
  - all the land is before you
  - the entire land lies before you
  lexicon: HALOT
  rationale: A fairly direct rendering that conveys freedom of movement and choice.
    'Whole land' is idiomatic and readable.
- source_word: אֶל־טוֹב וְאֶל־הַיָּשָׁר בְּעֵינֶיךָ
  chosen: wherever it is good and right in your eyes
  alternatives:
  - to what is good and upright in your eyes
  - where it seems good and right to you
  lexicon: HALOT
  rationale: The Hebrew combines destination language with evaluative adjectives.
    English expresses the sense more naturally with 'wherever it is good and right
    in your eyes,' preserving both terms rather than collapsing them into a single
    idea.
- source_word: לָלֶכֶת שָׁמָּה לֵךְ
  chosen: to go
  alternatives:
  - to go there, go
  - to go there
  lexicon: HALOT
  rationale: 'The Hebrew ends with an infinitive plus adverb plus imperative for emphasis:
    ''to go there, go.'' In English, this is best represented by a smooth imperative
    clause, already captured in ''go wherever... to go.'' The final imperative force
    is preserved in the main sentence rather than reproduced woodenly.'
