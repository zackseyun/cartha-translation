theological_decisions:
- issue: Rendering of divine judgment term רָעָה in relation to the LORD
  chosen_reading: this disaster
  alternative_readings:
  - this evil
  - this calamity
  rationale: To preserve orthodox theological clarity and the contextual sense of covenant judgment, רָעָה here is rendered as harmful calamity/disaster rather than moral evil. The text states that the LORD announced and brought judgment on the city, not that he performed moral evil.
  doctrine_reference: 'Translation philosophy: preserve source sense without importing doctrinal claims; readable modern English'
