id: JER.40.2
reference: Jeremiah 40:2
source:
  edition: WLC
  text: וַ/יִּקַּ֥ח רַב טַבָּחִ֖ים לְ/יִרְמְיָ֑הוּ וַ/יֹּ֣אמֶר אֵלָ֔י/ו יְהוָ֣ה אֱלֹהֶ֗י/ךָ דִּבֶּר֙ אֶת הָ/רָעָ֣ה הַ/זֹּ֔את אֶל הַ/מָּק֖וֹם הַ/זֶּֽה־־־׃
translation:
  text: Then the captain of the guard took Jeremiah and said to him, “Yahweh your God spoke this disaster against this place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “this calamity”; Hebrew רָעָה can mean evil, harm, or disaster depending on context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'captain of the slaughterers/executioners,' a title commonly understood as the captain of the guard.
    reason: cultural_note
lexical_decisions:
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - the chief of the executioners
  - the captain of the bodyguard
  lexicon: HALOT
  rationale: The expression is an established Babylonian court/military title. While the literal sense of טַבָּחִים relates to slaughterers/executioners, in context it denotes the official commonly rendered 'captain of the guard' (Nebuzaradan). This balances lexical transparency with idiomatic English.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - took hold of
  - received
  lexicon: HALOT
  rationale: The basic sense of לקח is 'take.' In this context it introduces Nebuzaradan's taking Jeremiah into his custody or presence. 'Took' is sufficiently broad and natural in English without overinterpreting the action.
- source_word: לְיִרְמְיָהוּ
  chosen: Jeremiah
  rationale: Personal names are transliterated by standard convention per translation philosophy.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'The 2ms suffix directly addresses Jeremiah: ''your God.'' This preserves the personal address and the theological force of the speaker acknowledging Jeremiah''s God.'
- source_word: דִּבֶּר
  chosen: spoke
  alternatives:
  - declared
  - pronounced
  lexicon: HALOT
  rationale: The verb דבר in this construction naturally means 'spoke' or 'declared.' 'Spoke' keeps the wording close to the Hebrew while remaining idiomatic.
- source_word: הָרָעָה הַזֹּאת
  chosen: this disaster
  alternatives:
  - this evil
  - this calamity
  lexicon: HALOT
  rationale: רָעָה can denote moral evil or harmful calamity/disaster depending on context. Here it refers to the judgment that has come upon Jerusalem, so 'disaster' best communicates the sense without implying that the LORD committed moral evil.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  chosen: against this place
  alternatives:
  - upon this place
  - concerning this place
  lexicon: HALOT
  rationale: Although אֶל is often 'to,' with דבר plus a judgment object it can be rendered idiomatically as 'against' to reflect hostile/judicial direction. 'This place' refers to Jerusalem in context.
