id: JER.40.1
reference: Jeremiah 40:1
source:
  edition: WLC
  text: הַ/דָּבָ֞ר אֲשֶׁר הָיָ֤ה אֶֽל יִרְמְיָ֨הוּ֙ מֵ/אֵ֣ת יְהוָ֔ה אַחַ֣ר שַׁלַּ֣ח
    אֹת֗/וֹ נְבוּזַרְאֲדָ֛ן רַב טַבָּחִ֖ים מִן הָֽ/רָמָ֑ה בְּ/קַחְתּ֣/וֹ אֹת֗/וֹ וְ/הֽוּא
    אָס֤וּר בָּֽ/אזִקִּים֙ בְּ/ת֨וֹךְ כָּל גָּל֤וּת יְרוּשָׁלִַ֨ם֙ וִֽ/יהוּדָ֔ה הַ/מֻּגְלִ֖ים
    בָּבֶֽלָ/ה־־׀־־־־׃
translation:
  text: 'The word that came to Jeremiah from the LORD after Nebuzaradan, the captain
    of the guard, had sent him away from Ramah, when he took him while he was bound
    in chains among all the exiles of Jerusalem and Judah who were being exiled to
    Babylon:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chief of the executioners'; the Hebrew title literally refers to
      the chief over the slaughterers, likely a royal guard official with execution
      duties.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  chosen: The word
  alternatives:
  - The message
  - This is the word
  lexicon: HALOT
  rationale: דבר in prophetic superscriptions commonly introduces a divine message.
    'The word' preserves the formulaic prophetic style more formally than 'message.'
- source_word: הָיָה אֶל
  chosen: came to
  alternatives:
  - was to
  - happened to
  lexicon: HALOT
  rationale: The idiom 'the word ... was/came to' is standard in prophetic literature.
    'Came to' is natural English while preserving the sense of divine revelation reaching
    Jeremiah.
- source_word: מֵאֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'From' accurately reflects
    the source preposition and prophetic origin formula.
- source_word: אַחַר שַׁלַּח אֹתוֹ
  chosen: after ... had sent him away
  alternatives:
  - after ... had released him
  - after ... had let him go
  lexicon: HALOT
  rationale: שׁלח here refers to dismissing/releasing Jeremiah from custody. 'Sent
    him away' stays close to the Hebrew and fits the following 'from Ramah.' 'Released'
    is possible but slightly more interpretive.
- source_word: נְבוּזַרְאֲדָן
  chosen: Nebuzaradan
  rationale: Personal name transliterated by standard English convention.
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - the chief of the executioners
  - the captain of the bodyguard
  lexicon: HALOT
  rationale: The title literally involves 'chief of the slaughterers/butchers,' but
    in Neo-Babylonian court usage it denotes a high official over the royal guard,
    often with execution duties. 'Captain of the guard' is the clearest idiomatic
    rendering; the more literal alternative is preserved in a footnote.
- source_word: מִן הָרָמָה
  chosen: from Ramah
  lexicon: HALOT
  rationale: Simple geographic source; transliterated place name with standard English
    spelling.
- source_word: בְּקַחְתּוֹ אֹתוֹ
  chosen: when he took him
  alternatives:
  - when he had taken him
  lexicon: HALOT
  rationale: The infinitive construct with prefixed ב marks attendant circumstance/temporal
    sense. 'When he took him' is natural and sufficiently close.
- source_word: וְהוּא אָסוּר
  chosen: while he was bound
  alternatives:
  - and he was bound
  - with him being bound
  lexicon: HALOT
  rationale: The clause gives Jeremiah's condition at the time. 'While he was bound'
    expresses the circumstantial force smoothly in English.
- source_word: בָּאזִקִּים
  chosen: in chains
  alternatives:
  - with fetters
  - in shackles
  lexicon: HALOT
  rationale: The noun denotes restraints/fetters. 'Chains' is clear modern English
    and fits the scene.
- source_word: בְּתוֹךְ כָּל גָּלוּת
  chosen: among all the exiles
  alternatives:
  - in the midst of all the exile
  - among the whole body of exiles
  lexicon: HALOT
  rationale: Though גָּלוּת can denote 'exile' collectively, here it refers to the
    deported community. 'Among all the exiles' best captures the collective-human
    sense in idiomatic English.
- source_word: יְרוּשָׁלִַם וִיהוּדָה
  chosen: of Jerusalem and Judah
  alternatives:
  - from Jerusalem and Judah
  lexicon: HALOT
  rationale: Attached to 'exiles,' the phrase identifies the population group. 'Of
    Jerusalem and Judah' is slightly more literal; 'from' would also be acceptable
    but is not required.
- source_word: הַמֻּגְלִים בָּבֶלָה
  chosen: who were being exiled to Babylon
  alternatives:
  - who were being carried away to Babylon
  - who had been exiled to Babylon
  lexicon: HALOT
  rationale: The passive participle of גלה denotes those being deported. 'Being exiled'
    preserves the verbal force and ongoing scene better than the more static 'had
    been exiled.' 'To Babylon' reflects the directional ending.
