id: JER.40.7
reference: Jeremiah 40:7
source:
  edition: WLC
  text: וַ/יִּשְׁמְעוּ֩ כָל שָׂרֵ֨י הַ/חֲיָלִ֜ים אֲשֶׁ֣ר בַּ/שָּׂדֶ֗ה הֵ֚מָּה וְ/אַנְשֵׁי/הֶ֔ם
    כִּֽי הִפְקִ֧יד מֶֽלֶךְ בָּבֶ֛ל אֶת גְּדַלְיָ֥הוּ בֶן אֲחִיקָ֖ם בָּ/אָ֑רֶץ וְ/כִ֣י
    הִפְקִ֣יד אִתּ֗/וֹ אֲנָשִׁ֤ים וְ/נָשִׁים֙ וָ/טָ֔ף וּ/מִ/דַּלַּ֣ת הָ/אָ֔רֶץ מֵ/אֲשֶׁ֥ר
    לֹֽא הָגְל֖וּ בָּבֶֽלָ/ה־־־־־׀־׃
translation:
  text: Now when all the commanders of the forces who were in the open country, they
    and their men, heard that the king of Babylon had appointed Gedaliah son of Ahikam
    over the land, and that he had entrusted to him men, women, children, and some
    of the poorest of the land, from those who had not been exiled to Babylon,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the field' for 'in the open country.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the lowly/poor of the land' for 'some of the poorest of the land.'
    reason: lexical_alternative
  - marker: c
    text: Or 'who had not been deported to Babylon.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי הַחֲיָלִים
  chosen: the commanders of the forces
  alternatives:
  - the captains of the armies
  - the officers of the troops
  lexicon: HALOT
  rationale: שָׂרִים denotes leaders/officials, and חֲיָלִים here refers to military
    forces. 'Commanders of the forces' is natural modern English and preserves the
    military sense without over-specifying rank.
- source_word: בַּשָּׂדֶה
  chosen: in the open country
  alternatives:
  - in the field
  - in the countryside
  lexicon: HALOT
  rationale: Literally 'in the field,' but in this narrative setting it refers to
    being outside settled urban control. 'Open country' captures the idiom clearly
    in English.
- source_word: וְאַנְשֵׁיהֶם
  chosen: and their men
  alternatives:
  - and their soldiers
  - and the men with them
  lexicon: HALOT
  rationale: אַנְשֵׁי with pronominal suffix is literally 'their men.' Since the context
    is military, 'their men' is both accurate and idiomatic.
- source_word: הִפְקִיד
  chosen: had appointed
  alternatives:
  - had set over
  - had placed in charge
  lexicon: HALOT
  rationale: In the first occurrence, the verb denotes official appointment to authority.
    'Had appointed' best fits the administrative context.
- source_word: בָּאָרֶץ
  chosen: over the land
  alternatives:
  - in the land
  lexicon: HALOT
  rationale: With הִפְקִיד in this context, the phrase indicates jurisdiction. 'Over
    the land' makes the sense of delegated governance explicit without adding content.
- source_word: הִפְקִיד אִתּוֹ
  chosen: had entrusted to him
  alternatives:
  - had placed with him
  - had put under his charge
  lexicon: HALOT
  rationale: The second occurrence of הִפְקִיד shifts from appointment to entrusting
    people into Gedaliah's care. 'Had entrusted to him' reflects that nuance better
    than repeating 'appointed.'
- source_word: אֲנָשִׁים וְנָשִׁים וָטָף
  chosen: men, women, children
  alternatives:
  - men, women, and little ones
  - men, women, and dependents
  lexicon: HALOT
  rationale: טָף refers to children/little ones. 'Children' is the clearest contemporary
    rendering.
- source_word: מִדַּלַּת הָאָרֶץ
  chosen: some of the poorest of the land
  alternatives:
  - the lowly of the land
  - the poor of the land
  - the weakest of the land
  lexicon: HALOT
  rationale: The phrase refers to the socially/economically lowly remnant left behind.
    'Some of the poorest of the land' communicates both the partitive sense and social
    status.
- source_word: מֵאֲשֶׁר לֹא הָגְלוּ בָּבֶלָה
  chosen: from those who had not been exiled to Babylon
  alternatives:
  - from those whom they had not carried away to Babylon
  - who had not been deported to Babylon
  lexicon: HALOT
  rationale: The passive sense is natural in English though the Hebrew verb is active
    plural with unspecified agents. 'Had not been exiled to Babylon' is concise and
    faithful to the sense.
- source_word: וַיִּשְׁמְעוּ
  chosen: Now when ... heard
  alternatives:
  - And ... heard
  - Then ... heard
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. Rendering with 'Now when'
    prepares for the continuation into the next verse while preserving the temporal
    flow.
