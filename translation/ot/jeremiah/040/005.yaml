id: JER.40.5
reference: Jeremiah 40:5
source:
  edition: WLC
  text: וְ/עוֹדֶ֣/נּוּ לֹֽא יָשׁ֗וּב וְ/שֻׁ֡בָ/ה אֶל גְּדַלְיָ֣ה בֶן אֲחִיקָ֣ם בֶּן
    שָׁפָ֡ן אֲשֶׁר֩ הִפְקִ֨יד מֶֽלֶךְ בָּבֶ֜ל בְּ/עָרֵ֣י יְהוּדָ֗ה וְ/שֵׁ֤ב אִתּ/וֹ֙
    בְּ/ת֣וֹךְ הָ/עָ֔ם א֠וֹ אֶל כָּל הַ/יָּשָׁ֧ר בְּ/עֵינֶ֛י/ךָ לָ/לֶ֖כֶת לֵ֑ךְ וַ/יִּתֶּן
    ל֧/וֹ רַב טַבָּחִ֛ים אֲרֻחָ֥ה וּ/מַשְׂאֵ֖ת וַֽ/יְשַׁלְּחֵֽ/הוּ־־־־־־־־־׃
translation:
  text: But since he still had not gone back, he said, “Go back to Gedaliah son of
    Ahikam, son of Shaphan, whom the king of Babylon has appointed over the cities
    of Judah, and live with him among the people; or go wherever it seems right in
    your eyes to go.” Then the captain of the guard gave him provisions and a gift
    and sent him away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew is difficult at the start of the verse; it may also be understood,
      “While he had not yet returned, ‘Return to Gedaliah…’”
    reason: alternative_reading
  - marker: b
    text: Or “rations” for “provisions.”
    reason: lexical_alternative
  - marker: c
    text: Or “a present,” “an allowance,” or “a portion” for “a gift.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעוֹדֶנּוּ לֹא יָשׁוּב
  chosen: But since he still had not gone back
  alternatives:
  - While he had not yet returned
  - And he was still not going back
  lexicon: HALOT
  rationale: The clause is syntactically difficult and elliptical. עוֹדֶנּוּ with
    לֹא יָשׁוּב most naturally conveys that Jeremiah had not yet returned or gone
    back. Rendering with pluperfect English smooths the narrative transition while
    preserving the sense that a return had not yet occurred.
- source_word: וְשֻׁבָה
  chosen: Go back
  alternatives:
  - Return
  lexicon: HALOT
  rationale: Imperative of שוב. 'Go back' is idiomatic modern English and fits the
    movement implied by the context.
- source_word: אֶל גְּדַלְיָה בֶן אֲחִיקָם בֶּן שָׁפָן
  chosen: to Gedaliah son of Ahikam, son of Shaphan
  alternatives:
  - to Gedaliah the son of Ahikam, the son of Shaphan
  rationale: Names are transliterated per project philosophy; filial relations are
    rendered in standard readable English.
- source_word: אֲשֶׁר הִפְקִיד מֶלֶךְ בָּבֶל בְּעָרֵי יְהוּדָה
  chosen: whom the king of Babylon has appointed over the cities of Judah
  alternatives:
  - whom the king of Babylon appointed in the cities of Judah
  - whom the king of Babylon set over the towns of Judah
  lexicon: HALOT
  rationale: הִפְקִיד in Hiphil here means appoint/put in charge. 'Over the cities
    of Judah' best captures the administrative sense of authority, not merely location.
- source_word: וְשֵׁב אִתּוֹ בְּתוֹךְ הָעָם
  chosen: and live with him among the people
  alternatives:
  - and dwell with him in the midst of the people
  - and stay with him among the people
  lexicon: HALOT
  rationale: ישב commonly means sit, remain, dwell, or live depending on context.
    Here 'live with him among the people' communicates settled residence in natural
    English.
- source_word: אוֹ אֶל כָּל הַיָּשָׁר בְּעֵינֶיךָ לָלֶכֶת לֵךְ
  chosen: or go wherever it seems right in your eyes to go
  alternatives:
  - or go to anywhere that is right in your eyes to go
  - or go wherever you think best
  lexicon: HALOT
  rationale: The idiom יָשָׁר בְּעֵינֶיךָ means what seems right/good to you. 'In
    your eyes' is retained to preserve the Hebrew idiom while making the line readable.
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - the chief of the executioners
  - the commander of the bodyguard
  lexicon: HALOT
  rationale: This title refers to Nebuzaradan's official position. 'Captain of the
    guard' is the established and contextually accurate rendering in Jeremiah.
- source_word: אֲרֻחָה
  chosen: provisions
  alternatives:
  - food allowance
  - rations
  lexicon: HALOT
  rationale: The noun denotes a provision or ration for a journey or ongoing support.
    'Provisions' fits the immediate context of release and departure.
- source_word: וּמַשְׂאֵת
  chosen: a gift
  alternatives:
  - a present
  - an allowance
  - a portion
  lexicon: HALOT
  rationale: The noun can denote something carried, a portion, or a gift. In this
    context, alongside provisions, 'a gift' best captures an additional grant given
    upon release.
- source_word: וַיְשַׁלְּחֵהוּ
  chosen: and sent him away
  alternatives:
  - and let him go
  - and dismissed him
  lexicon: HALOT
  rationale: The verb means send away/release. 'Sent him away' preserves the narrative
    action without overinterpreting the legal nuance.
