id: JER.40.12
reference: Jeremiah 40:12
source:
  edition: WLC
  text: וַ/יָּשֻׁ֣בוּ כָל הַ/יְּהוּדִ֗ים מִ/כָּל הַ/מְּקֹמוֹת֙ אֲשֶׁ֣ר נִדְּחוּ שָׁ֔ם
    וַ/יָּבֹ֧אוּ אֶֽרֶץ יְהוּדָ֛ה אֶל גְּדַלְיָ֖הוּ הַ/מִּצְפָּ֑תָ/ה וַ/יַּאַסְפ֛וּ
    יַ֥יִן וָ/קַ֖יִץ הַרְבֵּ֥ה מְאֹֽד־־־־־׃פ
translation:
  text: Then all the Judeans returned from all the places where they had been driven,
    and they came to the land of Judah, to Gedaliah at Mizpah, and gathered a great
    abundance of wine and summer fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the Jews.' The Hebrew term can denote the people of Judah and, by
      extension, Jews; here 'Judeans' highlights the historical setting in the land
      of Judah.
    reason: lexical_alternative
  - marker: b
    text: Or 'where they had been banished' or 'where they had been scattered.'
    reason: lexical_alternative
  - marker: c
    text: '''Summer fruit'' refers to seasonal produce gathered in late summer or
      at harvest time.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  chosen: returned
  alternatives:
  - came back
  - turned back
  lexicon: HALOT
  rationale: From שוב, here in narrative sequence with a clear sense of physical return
    to a prior place rather than abstract turning.
- source_word: כָל הַיְּהוּדִים
  chosen: all the Judeans
  alternatives:
  - all the Jews
  lexicon: HALOT
  rationale: In this exilic/post-destruction setting, the term denotes people of Judah
    geographically/ethnically. 'Judeans' preserves the historical sense better than
    the more anachronistic-sounding 'Jews.'
- source_word: מִכָּל הַמְּקֹמוֹת
  chosen: from all the places
  alternatives:
  - out of all the places
  lexicon: HALOT
  rationale: Straightforward locative phrase; 'from all the places' is natural and
    sufficiently formal.
- source_word: אֲשֶׁר נִדְּחוּ שָׁם
  chosen: where they had been driven
  alternatives:
  - where they had been banished
  - where they had been scattered
  lexicon: HALOT
  rationale: נדח in the Niphal commonly conveys being driven away or banished. 'Driven'
    best matches the passive force and the context of displacement after conquest.
    The adverb שָׁם is absorbed idiomatically into English relative clause syntax.
- source_word: וַיָּבֹאוּ אֶרֶץ יְהוּדָה
  chosen: they came to the land of Judah
  alternatives:
  - they came into the land of Judah
  - they entered the land of Judah
  lexicon: HALOT
  rationale: בוא + direct object 'land of Judah' can be rendered idiomatically in
    English with 'came to' to avoid stiffness while preserving movement into the territory.
- source_word: אֶל גְּדַלְיָהוּ הַמִּצְפָּתָה
  chosen: to Gedaliah at Mizpah
  alternatives:
  - to Gedaliah, to Mizpah
  - to Gedaliah in Mizpah
  lexicon: HALOT
  rationale: The phrase identifies Gedaliah's location. 'At Mizpah' is the clearest
    English rendering of the directional/locative ending on הַמִּצְפָּתָה in context.
- source_word: וַיַּאַסְפוּ
  chosen: gathered
  alternatives:
  - collected
  - harvested
  lexicon: HALOT
  rationale: אסף broadly means gather/collect. 'Gathered' is the most neutral choice;
    'harvested' would be interpretive, though contextually related.
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering for יין.
- source_word: וָקַיִץ
  chosen: summer fruit
  alternatives:
  - summer produce
  - ripe fruit
  lexicon: HALOT
  rationale: קיץ refers to summer fruit/produce, especially seasonal fruit harvest.
    'Summer fruit' is the most direct and idiomatic rendering.
- source_word: הַרְבֵּה מְאֹד
  chosen: a great abundance
  alternatives:
  - very much
  - in great quantity
  - exceedingly much
  lexicon: HALOT
  rationale: The combination intensifies quantity. 'A great abundance' renders the
    idiom naturally in English while preserving the emphasis.
