id: JER.40.8
reference: Jeremiah 40:8
source:
  edition: WLC
  text: וַ/יָּבֹ֥אוּ אֶל גְּדַלְיָ֖ה הַ/מִּצְפָּ֑תָ/ה וְ/יִשְׁמָעֵ֣אל בֶּן נְתַנְיָ֡הוּ
    וְ/יוֹחָנָ֣ן וְ/יוֹנָתָ֣ן בְּנֵֽי קָ֠רֵחַ וּ/שְׂרָיָ֨ה בֶן תַּנְחֻ֜מֶת וּ/בְנֵ֣י
    עופי הַ/נְּטֹפָתִ֗י וִֽ/יזַנְיָ֨הוּ֙ בֶּן הַ/מַּ֣עֲכָתִ֔י הֵ֖מָּה וְ/אַנְשֵׁי/הֶֽם־־־־׀־׃
translation:
  text: Then Ishmael son of Nethaniah, and Johanan and Jonathan the sons of Kareah,
    and Seraiah son of Tanhumeth, and the sons of Ephai the Netophathite, and Jezaniah
    son of the Maacathite—they and their men—came to Gedaliah at Mizpah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'the sons of Ophi'; the Hebrew personal name is textually/translationally
      uncertain in English representation.
    reason: lexical_alternative
  - marker: b
    text: Jezaniah may also be rendered 'Jezaniahu'; some relate the name to forms
      elsewhere translated 'Jaazaniah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: HALOT
  rationale: The wayyiqtol of בוא advances the narrative with simple past action.
    'Came' fits the deictic perspective toward Gedaliah and is standard idiomatic
    English here.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Marks motion toward a person. In English, 'came to Gedaliah' is natural
    and accurate.
- source_word: הַמִּצְפָּתָה
  chosen: at Mizpah
  alternatives:
  - to Mizpah
  lexicon: HALOT
  rationale: 'The directional ending indicates movement toward Mizpah, but in English
    the phrase is best attached to Gedaliah''s location: ''Gedaliah at Mizpah.'' This
    preserves the sense without awkwardness.'
- source_word: יִשְׁמָעֵאל
  chosen: Ishmael
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: בֶּן נְתַנְיָהוּ
  chosen: son of Nethaniah
  lexicon: HALOT
  rationale: Standard filial construction; 'son of' is retained rather than reduced
    to a genitive for transparency to the Hebrew.
- source_word: יוֹחָנָן
  chosen: Johanan
  rationale: Personal name transliterated by standard convention.
- source_word: יוֹנָתָן
  chosen: Jonathan
  alternatives:
  - Johanan's brother Jonathan
  rationale: Personal name transliterated. The appositional relation is conveyed by
    the following plural 'the sons of Kareah,' applying to both Johanan and Jonathan.
- source_word: בְּנֵי קָרֵחַ
  chosen: the sons of Kareah
  alternatives:
  - sons of Kareah
  lexicon: HALOT
  rationale: The plural construct clearly modifies both preceding names. 'The sons
    of Kareah' is explicit and natural.
- source_word: שְׂרָיָה
  chosen: Seraiah
  rationale: Personal name transliterated by standard convention.
- source_word: בֶן תַּנְחֻמֶת
  chosen: son of Tanhumeth
  lexicon: HALOT
  rationale: Standard patronymic construction retained formally.
- source_word: בְנֵי עופי
  chosen: the sons of Ephai
  alternatives:
  - the sons of Ophi
  lexicon: HALOT
  rationale: The proper name is commonly represented as 'Ephai' in English translations
    of this verse. Because the Hebrew spelling is somewhat unusual in transmission,
    an alternative transliteration is worth preserving in a footnote.
- source_word: הַנְּטֹפָתִי
  chosen: the Netophathite
  alternatives:
  - from Netophah
  lexicon: HALOT
  rationale: The gentilic is best rendered with the English ethnic/geographic adjective
    'Netophathite,' preserving the Hebrew form more closely than a paraphrase.
- source_word: וִיזַנְיָהוּ
  chosen: Jezaniah
  alternatives:
  - Jezaniahu
  - Jaazaniah
  rationale: Personal name transliterated. English tradition often gives 'Jezaniah'
    here; because of orthographic variation and possible relation to forms rendered
    'Jaazaniah' elsewhere, alternatives are preserved in a footnote.
- source_word: בֶּן הַמַּעֲכָתִי
  chosen: son of the Maacathite
  alternatives:
  - son of a Maacathite
  lexicon: HALOT
  rationale: The gentilic with article likely identifies his father by ethnic/geographic
    affiliation. Retaining 'the Maacathite' mirrors the Hebrew form.
- source_word: הֵמָּה וְאַנְשֵׁיהֶם
  chosen: they and their men
  alternatives:
  - they and the men with them
  lexicon: HALOT
  rationale: The pronoun adds emphasis or summation after the list. 'They and their
    men' is concise and preserves the likely sense of each leader accompanied by his
    followers.
