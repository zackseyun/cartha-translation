id: JER.40.9
reference: Jeremiah 40:9
source:
  edition: WLC
  text: וַ/יִּשָּׁבַ֨ע לָ/הֶ֜ם גְּדַלְיָ֨הוּ בֶן אֲחִיקָ֤ם בֶּן שָׁפָן֙ וּ/לְ/אַנְשֵׁי/הֶ֣ם
    לֵ/אמֹ֔ר אַל תִּֽירְא֖וּ מֵ/עֲב֣וֹד הַ/כַּשְׂדִּ֑ים שְׁב֣וּ בָ/אָ֗רֶץ וְ/עִבְד֛וּ
    אֶת מֶ֥לֶךְ בָּבֶ֖ל וְ/יִיטַ֥ב לָ/כֶֽם־־־־׃
translation:
  text: Gedaliah son of Ahikam, son of Shaphan, swore to them and to their men, saying,
    “Do not be afraid of serving the Chaldeans. Live in the land and serve the king
    of Babylon, and it will go well for you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Babylonians.' The Hebrew reads 'the Chaldeans,' a term often used
      for the Babylonian ruling power.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע
  chosen: swore
  alternatives:
  - took an oath
  - swore an oath
  lexicon: HALOT
  rationale: The Niphal of שׁבע here means to swear or take an oath. 'Swore' is concise
    and natural English while preserving the formal force of an oath.
- source_word: לָהֶם ... וּלְאַנְשֵׁיהֶם
  chosen: to them and to their men
  alternatives:
  - to them and to their soldiers
  - to them and to their people
  lexicon: HALOT
  rationale: אַנְשֵׁי can mean 'men' in the sense of associated males or retainers.
    In this military-political context, 'their men' best preserves the Hebrew without
    over-interpreting as specifically 'soldiers,' though that nuance may be present.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive, preserving the formal
    introduction to direct speech.
- source_word: אַל תִּירְאוּ
  chosen: Do not be afraid
  alternatives:
  - Do not fear
  lexicon: HALOT
  rationale: This gives clear modern English while preserving the prohibition against
    fear.
- source_word: מֵעֲבֹד הַכַּשְׂדִּים
  chosen: of serving the Chaldeans
  alternatives:
  - to serve the Chaldeans
  - because of serving the Chaldeans
  lexicon: HALOT
  rationale: The preposition מִן after 'fear' naturally yields 'be afraid of.' The
    infinitive construct of עבד is best rendered 'serving.' 'Chaldeans' follows the
    Hebrew ethnic-political term rather than replacing it with the interpretive 'Babylonians'
    in the main text.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew specifically says 'Chaldeans.' Since this is a historical-ethnic
    designation often referring to the Babylonian ruling power, the more literal term
    is retained in the main text, with the common equivalent suitable for a footnote.
- source_word: שְׁבוּ בָאָרֶץ
  chosen: Live in the land
  alternatives:
  - Dwell in the land
  - Remain in the land
  lexicon: HALOT
  rationale: ישׁב commonly means sit, dwell, remain, or live. 'Live in the land' is
    idiomatic modern English and fits the exhortation to settle peaceably under Babylonian
    rule.
- source_word: וְעִבְדוּ אֶת מֶלֶךְ בָּבֶל
  chosen: and serve the king of Babylon
  alternatives:
  - and work for the king of Babylon
  lexicon: HALOT
  rationale: עבד in this political context means to serve in subjection to a ruler.
    'Serve' preserves the political sense without paraphrase.
- source_word: וְיִיטַב לָכֶם
  chosen: and it will go well for you
  alternatives:
  - and it will be well with you
  - and it will be good for you
  lexicon: HALOT
  rationale: This idiom expresses favorable outcome or well-being. 'It will go well
    for you' is natural modern English while preserving the resultative sense.
