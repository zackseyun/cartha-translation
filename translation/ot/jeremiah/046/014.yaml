id: JER.46.14
reference: Jeremiah 46:14
source:
  edition: WLC
  text: הַגִּ֤ידוּ בְ/מִצְרַ֨יִם֙ וְ/הַשְׁמִ֣יעוּ בְ/מִגְדּ֔וֹל וְ/הַשְׁמִ֥יעוּ בְ/נֹ֖ף
    וּ/בְ/תַחְפַּנְחֵ֑ס אִמְר֗וּ הִתְיַצֵּב֙ וְ/הָכֵ֣ן לָ֔/ךְ כִּֽי אָכְלָ֥ה חֶ֖רֶב
    סְבִיבֶֽי/ךָ־׃
translation:
  text: Declare it in Egypt, and proclaim it in Migdol; proclaim it in Noph and in
    Tahpanhes. Say, ‘Take your stand and prepare yourself, for the sword has devoured
    all around you.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Noph is the Hebrew name for Memphis.
    reason: alternative_reading
lexical_decisions:
- source_word: הַגִּידוּ
  chosen: Declare it
  alternatives:
  - Tell
  - Announce
  lexicon: HALOT
  rationale: Hiphil imperative plural of נגד calls for making something known publicly.
    'Declare' fits the heraldic tone better than the more conversational 'tell.' 'It'
    is supplied naturally in English from the context of proclamation.
- source_word: וְהַשְׁמִיעוּ
  chosen: proclaim
  alternatives:
  - cause to hear
  - announce
  lexicon: HALOT
  rationale: Hiphil imperative of שמע here means to make a message heard publicly.
    'Proclaim' gives idiomatic English while preserving the formal public-announcement
    sense. Repeated consistently for both occurrences.
- source_word: בְמִצְרַיִם
  chosen: in Egypt
  alternatives:
  - throughout Egypt
  lexicon: HALOT
  rationale: The preposition ב is locative here. 'In Egypt' is the most direct rendering.
- source_word: בְמִגְדּוֹל
  chosen: in Migdol
  lexicon: HALOT
  rationale: 'Place name transliterated per translation philosophy: translate titles,
    transliterate names.'
- source_word: בְנֹף
  chosen: in Noph
  alternatives:
  - in Memphis
  lexicon: HALOT
  rationale: The Hebrew text has the place name Noph. Since personal and place names
    are normally transliterated, 'Noph' is retained in the main text; 'Memphis' is
    a recognizable historical equivalent worth preserving in a footnote.
- source_word: וּבְתַחְפַּנְחֵס
  chosen: and in Tahpanhes
  alternatives:
  - and in Daphne
  lexicon: HALOT
  rationale: Place name transliterated from the Hebrew. The Greek-associated form
    'Daphne' is secondary and better suited for a footnote if needed.
- source_word: אִמְרוּ
  chosen: Say
  alternatives:
  - say this
  - declare
  lexicon: HALOT
  rationale: Simple imperative introducing the quoted command. 'Say' is sufficient
    and natural.
- source_word: הִתְיַצֵּב
  chosen: Take your stand
  alternatives:
  - Stand firm
  - Present yourself
  lexicon: HALOT
  rationale: Hitpael imperative of יצב conveys taking one's position or standing ready.
    'Take your stand' preserves the reflexive/volitional nuance better than the flatter
    'stand firm.'
- source_word: וְהָכֵן לָךְ
  chosen: prepare yourself
  alternatives:
  - get ready
  - make yourself ready
  lexicon: HALOT
  rationale: Imperative of כון with reflexive sense from לָךְ. 'Prepare yourself'
    is clear modern English and preserves the personal readiness commanded.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'For' fits the explanatory force
    in elevated but readable English.
- source_word: אָכְלָה חֶרֶב
  chosen: the sword has devoured
  alternatives:
  - the sword has consumed
  - the sword will devour
  lexicon: HALOT
  rationale: The perfect verb with 'sword' personified depicts destructive military
    action as already underway or certain. 'Has devoured' preserves the vivid metaphor
    better than the more abstract 'consumed.'
- source_word: סְבִיבֶיךָ
  chosen: all around you
  alternatives:
  - around you
  - those around you
  lexicon: HALOT
  rationale: The noun/prepositional expression denotes surrounding area. 'All around
    you' communicates the comprehensive encirclement/destruction idiomatically.
