theological_decisions:
- issue: Addressee gender/number shift in the quoted command
  chosen_reading: 'Render the singular imperatives and pronouns as addressing Egypt
    personified in the singular: ''Take your stand and prepare yourself ... around
    you.'''
  alternative_readings:
  - Treat the singular as addressing an individual city or military unit within Egypt
  - Smooth to plural English to match the earlier plural imperatives
  rationale: The verse moves from plural commands to proclaim in various Egyptian
    cities to a singular address in the quotation. Preserving the singular maintains
    the rhetorical force of personified Egypt without flattening the Hebrew grammar.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 3 and 4
- issue: Aspect of אָכְלָה
  chosen_reading: 'Translate as present-result perfect: ''has devoured'''
  alternative_readings:
  - 'Simple past: ''devoured'''
  - 'Predictive future: ''will devour'''
  rationale: The Hebrew perfect in prophetic discourse can express either completed
    action or imminent certainty. Here the English present perfect best preserves
    the force of a disaster already breaking in, without over-resolving into a mere
    future prediction.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 3
