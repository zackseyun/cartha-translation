id: JER.46.2
reference: Jeremiah 46:2
source:
  edition: WLC
  text: לְ/מִצְרַ֗יִם עַל חֵ֨יל פַּרְעֹ֤ה נְכוֹ֙ מֶ֣לֶךְ מִצְרַ֔יִם אֲשֶׁר הָיָ֥ה
    עַל נְהַר פְּרָ֖ת בְּ/כַרְכְּמִ֑שׁ אֲשֶׁ֣ר הִכָּ֗ה נְבֽוּכַדְרֶאצַּר֙ מֶ֣לֶךְ
    בָּבֶ֔ל בִּ/שְׁנַת֙ הָֽ/רְבִיעִ֔ית לִ/יהוֹיָקִ֥ים בֶּן יֹאשִׁיָּ֖הוּ מֶ֥לֶךְ יְהוּדָֽה־־־־־׃
translation:
  text: 'Concerning Egypt: concerning the army of Pharaoh Neco king of Egypt, which
    was by the Euphrates River at Carchemish, which Nebuchadnezzar king of Babylon
    struck down in the fourth year of Jehoiakim son of Josiah, king of Judah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew could also be rendered 'Against Egypt' at the heading; here 'Concerning
      Egypt' is chosen because the verse functions as a superscription introducing
      the subject of the oracle.
    reason: alternative_reading
  - marker: b
    text: The Hebrew name form here is closer to 'Nebuchadrezzar'; English tradition
      commonly uses 'Nebuchadnezzar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמִצְרַיִם
  chosen: Concerning Egypt
  alternatives:
  - To Egypt
  - Against Egypt
  lexicon: HALOT
  rationale: 'The prefixed ל with a nation heading in prophetic superscriptions commonly
    introduces the subject matter: ''concerning Egypt.'' ''Against Egypt'' is possible
    in oracle headings, but here the verse immediately specifies the historical referent
    of the oracle rather than directly stating hostility, so ''concerning'' best preserves
    the broader heading sense.'
- source_word: עַל
  chosen: concerning
  alternatives:
  - against
  - upon
  lexicon: HALOT
  rationale: The preposition introduces the topic of the oracle in apposition to the
    heading. 'Concerning' fits the discourse function better than a more literal 'upon'
    and is less interpretively loaded than 'against' at this point.
- source_word: חֵיל
  chosen: army
  alternatives:
  - force
  - host
  lexicon: HALOT
  rationale: חֵיל here refers to military forces, not wealth or strength in the abstract.
    'Army' is the clearest modern English equivalent.
- source_word: פַּרְעֹה נְכוֹ
  chosen: Pharaoh Neco
  alternatives:
  - Pharaoh Necho
  lexicon: HALOT
  rationale: Standard English transliteration varies between 'Neco' and 'Necho.' 'Neco'
    closely reflects the Hebrew vocalization and is a recognized English form.
- source_word: אֲשֶׁר הָיָה עַל נְהַר פְּרָת
  chosen: which was by the Euphrates River
  alternatives:
  - which was at the Euphrates River
  - which was on the Euphrates River
  lexicon: HALOT
  rationale: עַל with היה in a locative setting indicates position by or at a place.
    'By the Euphrates River' is natural English and preserves the geographic sense.
- source_word: נְהַר פְּרָת
  chosen: the Euphrates River
  alternatives:
  - the river Euphrates
  - the Euphrates
  lexicon: HALOT
  rationale: English idiom prefers 'the Euphrates River' or simply 'the Euphrates.'
    Including 'River' reflects the Hebrew construct explicitly and aids readability.
- source_word: בְּכַרְכְּמִשׁ
  chosen: at Carchemish
  alternatives:
  - in Carchemish
  lexicon: HALOT
  rationale: The preposition marks location. 'At Carchemish' is idiomatic for a battle
    site and fits the historical reference.
- source_word: הִכָּה
  chosen: struck down
  alternatives:
  - defeated
  - struck
  - smote
  lexicon: HALOT
  rationale: נכה often means to strike, smite, or defeat. 'Struck down' preserves
    the verbal force while fitting the military context. 'Defeated' is possible but
    slightly more interpretive.
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: The Hebrew form here corresponds more closely to 'Nebuchadrezzar,' but
    'Nebuchadnezzar' is the standard English biblical form and remains a transparent
    transliteration choice for modern readers.
- source_word: בִּשְׁנַת הָרְבִיעִית
  chosen: in the fourth year
  alternatives:
  - in the fourth year of the reign
  lexicon: HALOT
  rationale: The Hebrew states the year number without repeating 'reign'; English
    naturally supplies 'year' and leaves the regnal reference to the following proper
    name.
- source_word: לִיהוֹיָקִים
  chosen: of Jehoiakim
  alternatives:
  - belonging to Jehoiakim
  - in Jehoiakim's
  lexicon: HALOT
  rationale: 'The prefixed ל marks the regnal reference: the fourth year ''of Jehoiakim.''
    This is standard English rendering for dating formulas.'
