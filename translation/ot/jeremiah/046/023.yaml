id: JER.46.23
reference: Jeremiah 46:23
source:
  edition: WLC
  text: כָּרְת֤וּ יַעְרָ/הּ֙ נְאֻם יְהוָ֔ה כִּ֖י לֹ֣א יֵֽחָקֵ֑ר כִּ֤י רַבּוּ֙ מֵֽ/אַרְבֶּ֔ה
    וְ/אֵ֥ין לָ/הֶ֖ם מִסְפָּֽר־׃
translation:
  text: They have cut down her forest, declares the LORD, though it cannot be searched
    out, because they are more numerous than locusts, and they are without number.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for it cannot be searched out.' The Hebrew conjunction can be read causally
      ('for/because') or concessively ('though'); the main text adopts the concessive
      sense as the better fit in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּרְתוּ
  chosen: They have cut down
  alternatives:
  - They cut down
  - They will cut down
  - They have felled
  lexicon: HALOT
  rationale: Qal perfect 3cp of כרת, here describing the invaders' action against
    Egypt metaphorically as a completed or certain act. 'Cut down' is the most natural
    English rendering for felling a forest; 'have cut down' preserves the perfect
    aspect without overcommitting to a simple past.
- source_word: יַעְרָהּ
  chosen: her forest
  alternatives:
  - its forest
  - her thicket
  - her woodland
  lexicon: HALOT
  rationale: יַעַר means 'forest/woodland.' The 3fs suffix refers to Egypt, commonly
    personified as feminine in the context, so 'her forest' preserves the metaphor
    and the Hebrew pronominal gender. 'Forest' is clearer and more idiomatic than
    'thicket' here.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic modern English
    and preserves the solemn prophetic force. Per doctrine, יְהוָה is rendered 'the
    LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  - the Lord
  lexicon: HALOT
  rationale: 'The divine name follows the project''s contested-terms policy: default
    rendering ''the LORD.'' Small-caps convention is represented here in plain text
    as ''LORD''.'
- source_word: כִּי לֹא יֵחָקֵר
  chosen: though it cannot be searched out
  alternatives:
  - for it cannot be explored
  - for it is impenetrable
  - though it cannot be measured
  lexicon: HALOT
  rationale: Niphal imperfect of חקר conveys being searched out, explored, or fathomed.
    The clause likely refers to the forest's density or unsearchable extent. 'Though
    it cannot be searched out' preserves the passive nuance and fits the concessive
    sense in context better than a strictly causal 'for.'
- source_word: כִּי
  chosen: though
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: 'The first כִּי after the divine formula is contextually concessive rather
    than simply causal: despite the forest being unsearchable, it is still cut down.
    English ''though'' best captures this discourse function.'
- source_word: רַבּוּ
  chosen: they are more numerous
  alternatives:
  - they have multiplied
  - they are many
  - they are too many
  lexicon: HALOT
  rationale: Qal perfect of רבה here describes the overwhelming number of the attackers.
    'Are more numerous' prepares naturally for the comparison with locusts and communicates
    comparative abundance.
- source_word: מֵאַרְבֶּה
  chosen: than locusts
  alternatives:
  - than the locust
  - than grasshoppers
  lexicon: HALOT
  rationale: אַרְבֶּה commonly denotes locust(s), a standard biblical image for innumerable
    swarms. 'Locusts' is preferable to 'grasshoppers' because it better preserves
    the destructive military imagery.
- source_word: וְאֵין לָהֶם מִסְפָּר
  chosen: and they are without number
  alternatives:
  - and there is no number to them
  - and they cannot be counted
  - and they are innumerable
  lexicon: HALOT
  rationale: Literally, 'and there is no number for them.' 'They are without number'
    is a close, readable rendering that preserves the idiom of innumerability. It
    also avoids redundancy while echoing the locust comparison.
