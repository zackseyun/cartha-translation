id: JER.46.21
reference: Jeremiah 46:21
source:
  edition: WLC
  text: גַּם שְׂכִרֶ֤י/הָ בְ/קִרְבָּ/הּ֙ כְּ/עֶגְלֵ֣י מַרְבֵּ֔ק כִּֽי גַם הֵ֧מָּה
    הִפְנ֛וּ נָ֥סוּ יַחְדָּ֖יו לֹ֣א עָמָ֑דוּ כִּ֣י י֥וֹם אֵידָ֛/ם בָּ֥א עֲלֵי/הֶ֖ם
    עֵ֥ת פְּקֻדָּתָֽ/ם־־־׃
translation:
  text: Even her hired soldiers in her midst are like fattened calves; for even they
    have turned and fled together; they did not stand, for the day of their disaster
    has come upon them, the time of their punishment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the time of their visitation' or 'the time of their reckoning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂכִרֶיהָ
  chosen: her hired soldiers
  alternatives:
  - her mercenaries
  - her hired men
  lexicon: HALOT
  rationale: The noun from שָׂכִיר denotes hired persons; in this military oracle
    against Egypt, the referent is hired troops/mercenaries rather than generic laborers.
    'Hired soldiers' is clear modern English and slightly more accessible than 'mercenaries,'
    while preserving the military sense.
- source_word: בְקִרְבָּהּ
  chosen: in her midst
  alternatives:
  - within her
  - in the midst of her
  lexicon: HALOT
  rationale: Literally 'in her midst/within her,' referring to those stationed inside
    Egypt. 'In her midst' preserves the metaphorical-spatial sense with readable English.
- source_word: כְּעֶגְלֵי מַרְבֵּק
  chosen: like fattened calves
  alternatives:
  - like stall-fed calves
  - like calves from the stall
  lexicon: HALOT
  rationale: The phrase refers to calves raised in a stall for fattening. 'Fattened
    calves' communicates both the imagery of pampered strength and vulnerability better
    than a more wooden rendering.
- source_word: הִפְנוּ
  chosen: have turned
  alternatives:
  - turned back
  - turned away
  lexicon: HALOT
  rationale: The verb means to turn. In context it introduces retreat before the following
    'fled.' 'Have turned' keeps the Hebrew sequence without over-interpreting the
    direction.
- source_word: נָסוּ
  chosen: fled
  alternatives:
  - have fled
  - run away
  lexicon: HALOT
  rationale: Standard military-flight sense. Simple past/present perfect nuance in
    English is flexible here; paired with 'have turned' it conveys completed retreat.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: Direct and natural rendering of the adverb.
- source_word: לֹא עָמָדוּ
  chosen: they did not stand
  alternatives:
  - they could not stand
  - they did not hold their ground
  lexicon: HALOT
  rationale: The Hebrew states simply that they did not stand. 'Hold their ground'
    is interpretive; the more literal wording preserves the image and allows readers
    to infer military collapse.
- source_word: יוֹם אֵידָם
  chosen: the day of their disaster
  alternatives:
  - the day of their calamity
  - the day of their ruin
  lexicon: HALOT
  rationale: אֵיד denotes disaster/calamity. 'Disaster' is idiomatic modern English
    and fits prophetic judgment language.
- source_word: עֵת פְּקֻדָּתָם
  chosen: the time of their punishment
  alternatives:
  - the time of their visitation
  - the time of their reckoning
  lexicon: HALOT
  rationale: פְּקֻדָּה can mean visitation, oversight, or punishment in judgment contexts.
    Here, in parallel with 'the day of their disaster,' the punitive sense is primary.
    'Punishment' makes the judgment force explicit in contemporary English; 'visitation'
    is preserved in a footnote because it is a traditional and semantically possible
    rendering.
