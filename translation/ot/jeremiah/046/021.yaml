theological_decisions:
- issue: Rendering judgment term פְּקֻדָּה in a prophetic oracle
  chosen_reading: the time of their punishment
  alternative_readings:
  - the time of their visitation
  - the time of their reckoning
  rationale: The verse is a judgment oracle, and the immediate context of disaster
    favors a punitive nuance rather than a neutral 'visitation.' This is a lexical-contextual
    decision, not a doctrinally disputed one, but it affects how explicitly divine
    judgment is heard in English.
  doctrine_reference: Translation philosophy §1, §5
