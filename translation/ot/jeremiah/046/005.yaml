id: JER.46.5
reference: Jeremiah 46:5
source:
  edition: WLC
  text: מַדּ֣וּעַ רָאִ֗יתִי הֵ֣מָּה חַתִּים֮ נְסֹגִ֣ים אָחוֹר֒ וְ/גִבּוֹרֵי/הֶ֣ם יֻכַּ֔תּוּ וּ/מָנ֥וֹס נָ֖סוּ וְ/לֹ֣א הִפְנ֑וּ מָג֥וֹר מִ/סָּבִ֖יב נְאֻם יְהוָֽה־׃
translation:
  text: Why have I seen this? They are terrified, turning back; their warriors are crushed, and they have fled hastily and have not turned back. Terror is on every side, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their mighty men are beaten down.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'fled in flight,' an emphatic expression for complete rout.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - Why?
  - Why is it that
  lexicon: HALOT
  rationale: Interrogative adverb introducing the prophet's startled question.
- source_word: רָאִיתִי
  chosen: have I seen
  alternatives:
  - did I see
  - do I see
  lexicon: HALOT
  rationale: Rendered as present perfect in English to convey the vivid, immediate force of the Hebrew perfect in prophetic vision discourse.
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - these
  - those
  lexicon: HALOT
  rationale: Independent pronoun used for emphasis; English keeps the pronoun without overtranslating the emphasis.
- source_word: חַתִּים
  chosen: terrified
  alternatives:
  - dismayed
  - shattered
  lexicon: HALOT
  rationale: From חתת, expressing being broken in spirit or dismayed; 'terrified' fits the military panic context naturally in modern English.
- source_word: נְסֹגִים אָחוֹר
  chosen: turning back
  alternatives:
  - retreating backward
  - driven back
  lexicon: HALOT
  rationale: Participial phrase describing active retreat. 'Turning back' is idiomatic and preserves the reversal movement.
- source_word: גִבּוֹרֵיהֶם
  chosen: their warriors
  alternatives:
  - their mighty men
  - their heroes
  lexicon: HALOT
  rationale: In military context גבורים refers to fighting men or champions. 'Warriors' is clearer for modern readers than the traditional 'mighty men.'
- source_word: יֻכַּתּוּ
  chosen: are crushed
  alternatives:
  - are beaten down
  - are struck down
  lexicon: HALOT
  rationale: Passive form from a verb of smiting/defeat. 'Are crushed' conveys decisive military collapse, not merely a single blow.
- source_word: וּמָנוֹס נָסוּ
  chosen: and they have fled in flight
  alternatives:
  - and they have fled headlong
  - and they have surely fled
  lexicon: HALOT
  rationale: Cognate accusative intensifies the verb. The rendering preserves the emphatic sense without paraphrasing away the Hebrew construction.
- source_word: וְלֹא הִפְנוּ
  chosen: and have not turned back
  alternatives:
  - and did not look back
  - and did not turn around
  lexicon: HALOT
  rationale: The verb means to turn or face. In context of rout, 'have not turned back' conveys that they do not stop to re-form or face the enemy.
- source_word: מָגוֹר מִסָּבִיב
  chosen: Terror is on every side
  alternatives:
  - Panic all around
  - Terror from every side
  lexicon: HALOT
  rationale: A recurring Jeremiah expression. 'On every side' is the most idiomatic English equivalent and preserves the formulaic force.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is natural English and suitably weighty.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
