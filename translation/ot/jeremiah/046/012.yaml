id: JER.46.12
reference: Jeremiah 46:12
source:
  edition: WLC
  text: שָׁמְע֤וּ גוֹיִם֙ קְלוֹנֵ֔/ךְ וְ/צִוְחָתֵ֖/ךְ מָלְאָ֣ה הָ/אָ֑רֶץ כִּֽי גִבּ֤וֹר
    בְּ/גִבּוֹר֙ כָּשָׁ֔לוּ יַחְדָּ֖יו נָפְל֥וּ שְׁנֵי/הֶֽם־׃פ
translation:
  text: The nations have heard of your shame, and your cry has filled the earth; for
    warrior has stumbled against warrior; together both of them have fallen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has filled the land.' The Hebrew אֶרֶץ can mean either 'earth' or 'land';
      'earth' is preferred here because the previous clause speaks of 'the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְעוּ
  chosen: have heard
  alternatives:
  - heard
  lexicon: HALOT
  rationale: 'Qal perfect 3cp of שׁמע, here best rendered as a completed action with
    present relevance in English: the report of Egypt''s disgrace has already spread.'
- source_word: גוֹיִם
  chosen: the nations
  alternatives:
  - nations
  - peoples
  lexicon: HALOT
  rationale: Common plural noun for nations/peoples. With no article in Hebrew, English
    idiom still favors 'the nations' in a generic collective sense.
- source_word: קְלוֹנֵךְ
  chosen: your shame
  alternatives:
  - your disgrace
  - your dishonor
  lexicon: HALOT
  rationale: קלון denotes shame/disgrace. 'Shame' is concise and preserves both public
    humiliation and dishonor directed at the feminine singular addressee, here Egypt.
- source_word: וְצִוְחָתֵךְ
  chosen: and your cry
  alternatives:
  - and your outcry
  - and your scream
  lexicon: HALOT
  rationale: צוחה refers to a cry of distress. 'Cry' is natural modern English and
    fits the context of military collapse without over-specifying emotional tone.
- source_word: מָלְאָה הָאָרֶץ
  chosen: has filled the earth
  alternatives:
  - has filled the land
  lexicon: HALOT
  rationale: The idiom is literally 'has filled the earth/land.' 'Earth' is retained
    because the preceding 'nations' suggests broad international scope, not merely
    local territory.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the widespread report and cry. 'For' preserves
    the explanatory connection in a literary register suitable to prophecy.
- source_word: גִבּוֹר
  chosen: warrior
  alternatives:
  - mighty man
  - hero
  - strong man
  lexicon: HALOT
  rationale: גבור in military context refers to a fighting man or warrior. 'Warrior'
    is clearer in modern English than the traditional 'mighty man' and fits the battle
    scene.
- source_word: בְּגִבּוֹר
  chosen: against warrior
  alternatives:
  - into warrior
  - over warrior
  lexicon: HALOT
  rationale: The preposition ב with כשל here conveys collision or stumbling against
    another. 'Against warrior' captures the sense of one combatant crashing into another
    amid rout.
- source_word: כָּשָׁלוּ
  chosen: has stumbled
  alternatives:
  - stumbled
  - has fallen
  lexicon: HALOT
  rationale: The verb means to stumble or totter, distinct from the following נָפְלוּ
    ('have fallen'). English singular 'has stumbled' follows the distributive sense
    of 'warrior ... against warrior' better than a plural rendering.
- source_word: יַחְדָּיו
  chosen: together
  alternatives:
  - all together
  lexicon: HALOT
  rationale: Adverb indicating simultaneous action; 'together' is sufficient and idiomatic.
- source_word: נָפְלוּ
  chosen: have fallen
  alternatives:
  - fell
  lexicon: HALOT
  rationale: Basic sense 'fall.' Rendered as present perfect for coherence with the
    preceding perfects and to convey the completed defeat.
- source_word: שְׁנֵיהֶם
  chosen: both of them
  alternatives:
  - the two of them
  - both
  lexicon: HALOT
  rationale: Explicit dual expression emphasizing mutual collapse. 'Both of them'
    preserves the emphasis that each combatant fell.
