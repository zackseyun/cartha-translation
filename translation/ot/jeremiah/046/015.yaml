theological_decisions:
- issue: Referent of אַבִּירֶיךָ in Egypt oracle
  chosen_reading: Rendered generically as 'your mighty one' in the main text
  alternative_readings:
  - '''your mighty ones'''
  - '''your bull'' (possibly a reference to the Egyptian deity Apis)'
  rationale: The Hebrew lexeme denotes strength/might and can be used for a strong one or bull. Because the immediate syntax uses singular verbs and suffixes, the main text adopts the singular. Since the historical context may point to Apis, that interpretive possibility is preserved in a footnote rather than made explicit in the translation, avoiding importation of a claim the text does not unambiguously state.
  doctrine_reference: Translation philosophy §§1, 3, 5
