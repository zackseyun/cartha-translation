id: JER.46.15
reference: Jeremiah 46:15
source:
  edition: WLC
  text: מַדּ֖וּעַ נִסְחַ֣ף אַבִּירֶ֑י/ךָ לֹ֣א עָמַ֔ד כִּ֥י יְהוָ֖ה הֲדָפֽ/וֹ׃
translation:
  text: Why has your mighty one been swept away? He did not stand, for Yahweh drove him away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your mighty ones'; the Hebrew form may also be understood as 'your bull,' possibly referring to Apis, Egypt's sacred bull.
    reason: alternative_reading
lexical_decisions:
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - Why?
  - For what reason
  lexicon: HALOT
  rationale: Interrogative adverb introducing a rhetorical question; 'Why' is the natural modern English equivalent.
- source_word: נִסְחַף
  chosen: has ... been swept away
  alternatives:
  - was swept away
  - has been carried off
  - has been driven away
  lexicon: HALOT
  rationale: The verb conveys being swept/carried away, likely in defeat imagery. 'Been swept away' preserves the passive sense and vividness. Present perfect in English fits the rhetorical question naturally.
- source_word: אַבִּירֶיךָ
  chosen: your mighty one
  alternatives:
  - your strong ones
  - your bull
  - your mighty men
  lexicon: HALOT
  rationale: The consonantal form can be read as plural 'your mighty ones,' but the following singular verbs ('did not stand,' 'drove him away') favor a singular sense in context. In Jeremiah 46, this likely alludes to Egypt's chief strength, possibly Apis, but the Hebrew term itself means 'mighty one' rather than explicitly 'bull,' so the main text keeps the lexical sense while preserving the more specific alternative in a footnote.
- source_word: לֹא עָמַד
  chosen: He did not stand
  alternatives:
  - he could not stand
  - it did not stand
  - he did not remain standing
  lexicon: HALOT
  rationale: A straightforward rendering of the negated perfect. 'Did not stand' preserves the idiom of failing to hold one's ground in battle without over-interpreting.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here it introduces the reason for the defeat. 'For' is concise and fits English biblical style without sounding archaic in this context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֲדָפוֹ
  chosen: drove him away
  alternatives:
  - thrust him down
  - pushed him back
  - repelled him
  lexicon: HALOT
  rationale: The verb denotes pushing, thrusting, or driving away. 'Drove him away' matches the defeat context and aligns with the singular object implied by the suffix.
