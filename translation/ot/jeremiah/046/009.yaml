id: JER.46.9
reference: Jeremiah 46:9
source:
  edition: WLC
  text: עֲל֤וּ הַ/סּוּסִים֙ וְ/הִתְהֹלְל֣וּ הָ/רֶ֔כֶב וְ/יֵצְא֖וּ הַ/גִּבּוֹרִ֑ים
    כּ֤וּשׁ וּ/פוּט֙ תֹּפְשֵׂ֣י מָגֵ֔ן וְ/לוּדִ֕ים תֹּפְשֵׂ֖י דֹּ֥רְכֵי קָֽשֶׁת׃
translation:
  text: Go up, O horses, and rage, O chariots; let the warriors go out—Cush and Put,
    who grasp the shield, and the Ludim, who grasp and bend the bow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rush madly' for 'rage'; the Hebrew verb can convey exultant or frenzied
      movement in battle.
    reason: lexical_alternative
  - marker: b
    text: '''Ludim'' is traditionally identified by some as ''Lydians.'''
    reason: alternative_reading
lexical_decisions:
- source_word: עֲלוּ
  chosen: Go up
  alternatives:
  - Advance
  - Charge
  lexicon: HALOT
  rationale: עלה literally means 'go up/ascend,' but in military context it functions
    as a battle summons. 'Go up' preserves the Hebrew idiom while remaining intelligible
    in English.
- source_word: הַסּוּסִים
  chosen: O horses
  alternatives:
  - the horses
  lexicon: HALOT
  rationale: 'With the imperative preceding, the noun is best taken vocatively in
    a summons: ''O horses.'' This reflects the direct address in the poetic war oracle.'
- source_word: וְהִתְהֹלְלוּ
  chosen: rage
  alternatives:
  - boast yourselves
  - rush madly
  - drive wildly
  lexicon: HALOT
  rationale: The hitpolel of הלל here is not praise but exultant, frenzied self-display
    in battle. 'Rage' captures the tumultuous martial sense better than the more literal
    but misleading 'boast yourselves.'
- source_word: הָרֶכֶב
  chosen: O chariots
  alternatives:
  - the chariotry
  - the chariots
  lexicon: HALOT
  rationale: Though formally singular collective, רכב commonly denotes chariot forces.
    Vocative 'O chariots' fits the parallelism with 'O horses' and keeps the vivid
    summons.
- source_word: וְיֵצְאוּ
  chosen: let ... go out
  alternatives:
  - and ... shall go out
  - march out
  lexicon: HALOT
  rationale: The imperfect following imperatives is jussive in force in this sequence.
    'Let the warriors go out' preserves the exhortational tone.
- source_word: הַגִּבּוֹרִים
  chosen: the warriors
  alternatives:
  - the mighty men
  - the heroes
  lexicon: HALOT
  rationale: גבורים in military contexts refers to fighting men or warriors. 'Warriors'
    is natural modern English and retains the martial sense.
- source_word: כּוּשׁ
  chosen: Cush
  alternatives:
  - Ethiopia
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than translated.
    'Cush' avoids importing later geographic assumptions tied to 'Ethiopia.'
- source_word: פוּט
  chosen: Put
  alternatives:
  - Libya
  lexicon: HALOT
  rationale: This is a people/place name and is therefore transliterated. 'Libya'
    is interpretive and anachronistically specific.
- source_word: תֹּפְשֵׂי מָגֵן
  chosen: who grasp the shield
  alternatives:
  - shield-bearers
  - handling shields
  lexicon: HALOT
  rationale: The participial phrase literally describes those taking hold of the shield.
    'Who grasp the shield' preserves the concrete imagery and syntax.
- source_word: לוּדִים
  chosen: the Ludim
  alternatives:
  - Lydians
  lexicon: HALOT
  rationale: As with other ethnonyms, transliteration is preferred. 'Lydians' is a
    traditional identification but more interpretive than the Hebrew form itself.
- source_word: תֹּפְשֵׂי דֹּרְכֵי קָשֶׁת
  chosen: who grasp and bend the bow
  alternatives:
  - who handle and string the bow
  - who seize, treading the bow
  lexicon: HALOT
  rationale: The Hebrew combines participles from 'grasp' and 'tread/bend' with 'bow,'
    describing archers preparing/using bows. 'Who grasp and bend the bow' renders
    the action idiomatically while preserving the two verbal ideas.
