theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering of
    the divine name, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered personification of Egypt in תִּשְׁכֹּן
  chosen_reading: she will dwell
  alternative_readings:
  - it will dwell
  - it will be inhabited
  rationale: The feminine singular verb likely personifies Egypt as a feminine entity.
    Following the project's gender-accurate principle, the translation preserves this
    rather than neutralizing it.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
