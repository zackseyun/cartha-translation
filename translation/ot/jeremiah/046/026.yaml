id: JER.46.26
reference: Jeremiah 46:26
source:
  edition: WLC
  text: וּ/נְתַתִּ֗י/ם בְּ/יַד֙ מְבַקְשֵׁ֣י נַפְשָׁ֔/ם וּ/בְ/יַ֛ד נְבֽוּכַדְרֶאצַּ֥ר
    מֶֽלֶךְ בָּבֶ֖ל וּ/בְ/יַד עֲבָדָ֑י/ו וְ/אַחֲרֵי כֵ֛ן תִּשְׁכֹּ֥ן כִּֽ/ימֵי קֶ֖דֶם
    נְאֻם יְהוָֽה־־־־־׃ס
translation:
  text: And I will give them into the hand of those who seek their life, and into
    the hand of Nebuchadnezzar king of Babylon and into the hand of his servants.
    But afterward she will dwell as in days of old, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Nebuchadrezzar''; conventionally rendered ''Nebuchadnezzar''
      in English.'
    reason: lexical_alternative
  - marker: b
    text: Or 'those who seek to kill them'; Hebrew literally, 'those who seek their
      life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתַתִּים
  chosen: And I will give them
  alternatives:
  - And I will hand them over
  lexicon: HALOT
  rationale: נתן with object suffix commonly means 'give' or 'hand over.' 'Give them'
    is kept in the main text as a transparent rendering, while the hostile context
    is clarified by the following phrase 'into the hand of.'
- source_word: בְיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  lexicon: HALOT
  rationale: The idiom 'into the hand of' is preserved because it is a standard Hebrew
    expression for being delivered into someone's power. This keeps the formal imagery
    while remaining understandable in English.
- source_word: מְבַקְשֵׁי נַפְשָׁם
  chosen: those who seek their life
  alternatives:
  - those who seek to kill them
  - their pursuers
  lexicon: HALOT
  rationale: The Hebrew idiom literally speaks of seeking someone's life. The main
    text preserves that idiom in natural English; a more explicit paraphrase like
    'seek to kill them' is possible but less formally transparent.
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: A standard English transliteration is used for readability and consistency
    with common biblical usage, even though the Hebrew spelling here more closely
    reflects 'Nebuchadrezzar.' The alternative is worth preserving in a footnote.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his officials
  - his slaves
  lexicon: HALOT
  rationale: In this royal-military context, 'servants' is the broad and idiomatic
    rendering for the king's subordinates. 'Officials' is interpretive, and 'slaves'
    would over-specify bonded status not required by the context.
- source_word: וְאַחֲרֵי כֵן
  chosen: But afterward
  alternatives:
  - And after that
  - Afterward
  lexicon: HALOT
  rationale: The phrase marks a temporal turn from judgment to restoration. 'But afterward'
    brings out the contrast implied by context while remaining faithful to the Hebrew
    sequence.
- source_word: תִּשְׁכֹּן
  chosen: she will dwell
  alternatives:
  - it will dwell
  - it will be inhabited
  - she will settle
  lexicon: HALOT
  rationale: The verb is feminine singular, referring back to Egypt as a feminine
    entity/country. 'She will dwell' preserves the grammatical gender-accurate personification
    of the Hebrew better than the flattening 'it will be inhabited.'
- source_word: כִּימֵי קֶדֶם
  chosen: as in days of old
  alternatives:
  - as in former days
  - as in ancient days
  lexicon: HALOT
  rationale: The phrase denotes a return to an earlier condition. 'As in days of old'
    is idiomatic, readable, and close to the Hebrew imagery.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is both natural
    English and suitably weighty. Per doctrine, יְהוָה is rendered 'the LORD.'
