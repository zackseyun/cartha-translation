id: JER.46.17
reference: Jeremiah 46:17
source:
  edition: WLC
  text: קָרְא֖וּ שָׁ֑ם פַּרְעֹ֤ה מֶֽלֶךְ מִצְרַ֨יִם֙ שָׁא֔וֹן הֶעֱבִ֖יר הַ/מּוֹעֵֽד־׃
translation:
  text: There they cry, ‘Pharaoh king of Egypt is only a noise; he has let the appointed
    time pass by.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Pharaoh king of Egypt is a noise; he has missed the appointed moment.”
      The Hebrew is terse and taunting, and שָׁאוֹן may also be understood as “tumult”
      or “empty bluster.”
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְאוּ
  chosen: they cry
  alternatives:
  - they called
  - call
  lexicon: HALOT
  rationale: Qal perfect 3cp of קרא, used here as a report of what people say/proclaim.
    Present English 'they cry' captures the vivid exclamatory force better than a
    flat past tense while remaining close to the Hebrew.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Adverbial particle indicating location; straightforwardly rendered 'there'.
- source_word: פַּרְעֹה מֶלֶךְ מִצְרַיִם
  chosen: Pharaoh king of Egypt
  alternatives:
  - Pharaoh, king of Egypt
  lexicon: HALOT
  rationale: Proper name plus appositional royal title. Kept in natural English order
    without adding interpretive material.
- source_word: שָׁאוֹן
  chosen: only a noise
  alternatives:
  - a noise
  - a tumult
  - a crash
  - a boastful noise
  lexicon: HALOT
  rationale: שָׁאוֹן commonly denotes noise, tumult, or uproar. In this taunt context
    it characterizes Pharaoh as all bluster without effect. 'Only a noise' brings
    out the derisive force while staying within the lexical range.
- source_word: הֶעֱבִיר
  chosen: has let ... pass by
  alternatives:
  - has passed over
  - has caused ... to pass
  - has missed
  lexicon: HALOT
  rationale: Hiphil of עבר means to cause to pass or let pass. With הַמּוֹעֵד, the
    sense is that Pharaoh allowed the critical moment to slip by; 'has let ... pass
    by' preserves the causative nuance.
- source_word: הַמּוֹעֵד
  chosen: the appointed time
  alternatives:
  - the appointed moment
  - the fixed time
  - the festival time
  lexicon: HALOT
  rationale: מוֹעֵד can mean appointed time, meeting, or festival. In this military-political
    oracle, 'appointed time' best fits the context of a decisive opportunity or set
    moment rather than a cultic feast.
