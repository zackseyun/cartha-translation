theological_decisions:
- issue: Referent of 'Jacob'/'Israel'
  chosen_reading: Corporate personification of the covenant people, addressed through
    the patriarchal name.
  alternative_readings:
  - The patriarch Jacob individually as a symbolic figure
  rationale: In this prophetic context, 'Jacob' and 'Israel' function as parallel
    covenant names for the people in exile/restoration. The English keeps the proper
    names rather than replacing them with an interpretive gloss like 'Israelites,'
    preserving the prophetic personification.
