id: JER.46.27
reference: Jeremiah 46:27
source:
  edition: WLC
  text: וְ֠/אַתָּה אַל תִּירָ֞א עַבְדִּ֤/י יַֽעֲקֹב֙ וְ/אַל תֵּחַ֣ת יִשְׂרָאֵ֔ל כִּ֠י
    הִנְ/נִ֤י מוֹשִֽׁעֲ/ךָ֙ מֵֽ/רָח֔וֹק וְ/אֶֽת זַרְעֲ/ךָ֖ מֵ/אֶ֣רֶץ שִׁבְיָ֑/ם וְ/שָׁ֧ב
    יַעֲק֛וֹב וְ/שָׁקַ֥ט וְ/שַׁאֲנַ֖ן וְ/אֵ֥ין מַחֲרִֽיד־־־׃ס
translation:
  text: But as for you, do not fear, my servant Jacob, and do not be dismayed, Israel;
    for behold, I am saving you from far away, and your offspring from the land of
    their captivity. Jacob will return and be quiet and at ease, with no one to make
    him afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will save you.' The Hebrew uses a participle ('I am saving you'),
      which can emphasize imminent or certain action.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the land where they are captives.'
    reason: lexical_alternative
  - marker: c
    text: '''Jacob'' and ''Israel'' here personify the covenant people.'
    reason: cultural_note
lexical_decisions:
- source_word: וְאַתָּה
  chosen: But as for you
  alternatives:
  - And you
  - But you
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a contrastive/emphatic
    shift. 'But as for you' brings out the discourse contrast with the surrounding
    judgment context better than a bare 'and you.'
- source_word: אַל תִּירָא
  chosen: do not fear
  alternatives:
  - do not be afraid
  lexicon: HALOT
  rationale: Standard rendering of ירא in the prohibition. 'Do not fear' is concise
    and natural, while preserving the direct imperative force.
- source_word: עַבְדִּי יַעֲקֹב
  chosen: my servant Jacob
  alternatives:
  - Jacob my servant
  lexicon: HALOT
  rationale: Retains the covenantal designation עבד with the possessive suffix. 'Servant'
    is appropriate here; the bonded/slave nuance is not foregrounded in this prophetic
    title formula.
- source_word: וְאַל תֵּחַת
  chosen: and do not be dismayed
  alternatives:
  - and do not be shattered
  - and do not be terrified
  lexicon: HALOT
  rationale: חתת in Niphal commonly conveys being dismayed or broken in spirit. 'Dismayed'
    fits the parallel with 'do not fear' and is idiomatic in English prophetic reassurance.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name retained by standard transliteration. In parallel with 'Jacob,'
    it refers to the covenant people personified.
- source_word: כִּי הִנְנִי
  chosen: for behold
  alternatives:
  - for look
  - for indeed
  lexicon: HALOT
  rationale: This combination introduces the ground for reassurance with divine emphasis.
    'For behold' preserves both the causal link and the deictic force.
- source_word: מוֹשִׁיעֲךָ
  chosen: I am saving you
  alternatives:
  - I will save you
  - I am about to save you
  lexicon: HALOT
  rationale: The participial form with הִנְנִי presents imminent or certain divine
    action. 'I am saving you' preserves the participial aspect better than a simple
    future, while still sounding natural.
- source_word: מֵרָחוֹק
  chosen: from far away
  alternatives:
  - from afar
  - from a distant place
  lexicon: HALOT
  rationale: A straightforward spatial rendering. 'From far away' is clear modern
    English and avoids archaic tone.
- source_word: וְאֶת זַרְעֲךָ
  chosen: and your offspring
  alternatives:
  - and your seed
  - and your descendants
  lexicon: HALOT
  rationale: זֶרַע can denote descendants collectively. 'Offspring' preserves the
    collective singular sense better than 'descendants' while remaining readable;
    'seed' would sound overly literal in modern English.
- source_word: מֵאֶרֶץ שִׁבְיָם
  chosen: from the land of their captivity
  alternatives:
  - from the land where they are captives
  - from the land of exile
  lexicon: HALOT
  rationale: The suffix on 'captivity' is plural ('their'), referring to the offspring.
    'Land of their captivity' closely follows the Hebrew while remaining intelligible.
    'Exile' is possible but less directly tied to the noun שבי.
- source_word: וְשָׁב יַעֲקֹב
  chosen: Jacob will return
  alternatives:
  - Jacob shall return
  - Jacob will turn back
  lexicon: HALOT
  rationale: שׁוּב here denotes return from displacement. 'Will return' is the most
    natural contextual rendering.
- source_word: וְשָׁקַט
  chosen: and be quiet
  alternatives:
  - and be undisturbed
  - and be at rest
  lexicon: HALOT
  rationale: שקט conveys quietness/rest after turmoil. 'Be quiet' preserves the lexical
    sense, though the following phrase clarifies that this is settled peace, not mere
    silence.
- source_word: וְשַׁאֲנַן
  chosen: and at ease
  alternatives:
  - and secure
  - and tranquil
  lexicon: HALOT
  rationale: This term denotes ease, security, or tranquility. 'At ease' pairs naturally
    with 'be quiet' and preserves the calm-security nuance.
- source_word: וְאֵין מַחֲרִיד
  chosen: with no one to make him afraid
  alternatives:
  - and none will make him tremble
  - with no one to terrify him
  lexicon: HALOT
  rationale: The idiom expresses complete security from threat. 'With no one to make
    him afraid' is a standard, clear English rendering that captures the causative
    nuance of חרד in this stem.
