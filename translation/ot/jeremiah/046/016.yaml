id: JER.46.16
reference: Jeremiah 46:16
source:
  edition: WLC
  text: הִרְבָּ֖ה כּוֹשֵׁ֑ל גַּם נָפַ֞ל אִ֣ישׁ אֶל רֵעֵ֗/הוּ וַ/יֹּֽאמְרוּ֙ ק֣וּמָ/ה
    וְ/נָשֻׁ֣בָה אֶל עַמֵּ֗/נוּ וְ/אֶל אֶ֨רֶץ֙ מֽוֹלַדְתֵּ֔/נוּ מִ/פְּנֵ֖י חֶ֥רֶב
    הַ/יּוֹנָֽה־־׀־־׃
translation:
  text: He has multiplied the stumbling; indeed, each man falls against his companion,
    and they say, “Come, and let us return to our people and to the land of our birth,
    away from the sword of the oppressor.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the sword of the dove.” The Hebrew word can be read this way literally,
      but in context it is commonly understood to mean “the oppressor” or “the violent
      one.”
    reason: alternative_reading
lexical_decisions:
- source_word: הִרְבָּה
  chosen: He has multiplied
  alternatives:
  - He made many
  - He increased
  lexicon: HALOT
  rationale: From רבה in Hiphil, with God as the implied subject from context. The
    causative sense 'multiply/increase' is retained rather than paraphrasing more
    loosely.
- source_word: כּוֹשֵׁל
  chosen: the stumbling
  alternatives:
  - those who stumble
  - stumbling
  lexicon: HALOT
  rationale: The participle from כשל denotes stumbling/faltering. Rendering it substantivally
    as 'the stumbling' preserves the Hebrew's compressed expression while remaining
    intelligible in English.
- source_word: גַּם
  chosen: indeed
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: Here גַּם intensifies the statement rather than simply adding another
    item; 'indeed' fits the rhetorical force in context.
- source_word: נָפַל אִישׁ אֶל רֵעֵהוּ
  chosen: each man falls against his companion
  alternatives:
  - one falls over another
  - a man falls against his neighbor
  lexicon: HALOT
  rationale: The singular distributive אישׁ is represented by 'each man.' The phrase
    conveys chaotic collapse in battle, with one person falling against another.
- source_word: קוּמָה
  chosen: Come
  alternatives:
  - Arise
  - Get up
  lexicon: HALOT
  rationale: Although literally 'Arise,' in this collective exhortation idiomatic
    English is better served by 'Come,' introducing the appeal to depart.
- source_word: וְנָשֻׁבָה
  chosen: let us return
  alternatives:
  - let us go back
  lexicon: HALOT
  rationale: Cohortative of שוב, expressing resolve to go back to one's own place.
    'Return' preserves the directional nuance.
- source_word: עַמֵּנוּ
  chosen: our people
  alternatives:
  - our nation
  lexicon: HALOT
  rationale: עם commonly means 'people' in the ethnic/national sense. 'Our people'
    fits mercenary troops or foreign allies seeking to go home.
- source_word: אֶרֶץ מוֹלַדְתֵּנוּ
  chosen: the land of our birth
  alternatives:
  - our native land
  - the land of our kindred
  lexicon: HALOT
  rationale: This phrase refers to homeland/native country. 'The land of our birth'
    is a transparent rendering of the Hebrew construct.
- source_word: מִפְּנֵי
  chosen: away from
  alternatives:
  - because of
  - from before
  lexicon: HALOT
  rationale: Literally 'from the face/presence of,' but in this context it expresses
    fleeing before a threat. 'Away from' communicates the motion and motive naturally.
- source_word: חֶרֶב
  chosen: the sword
  alternatives:
  - the blade
  lexicon: HALOT
  rationale: Standard rendering for חרב, retaining the concrete martial image.
- source_word: הַיּוֹנָה
  chosen: the oppressor
  alternatives:
  - the dove
  - the violent one
  lexicon: HALOT
  rationale: Although the form can literally mean 'dove,' in this context and in Jeremiah
    usage it is widely understood from the root ינה ('oppress, mistreat') or as a
    wordplay indicating the oppressing sword. 'The oppressor' best fits the military
    context and the sense of fleeing a hostile sword.
