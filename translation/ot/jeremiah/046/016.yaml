theological_decisions:
- issue: Interpretation of הַיּוֹנָה in the closing phrase
  chosen_reading: the oppressor
  alternative_readings:
  - the dove
  rationale: This is not a doctrinally charged issue but a significant interpretive
    one. In context of battle and retreat, 'the sword of the oppressor' makes coherent
    sense, whereas 'sword of the dove' is obscure unless taken as irony or wordplay.
    The alternative is preserved in a footnote for auditability.
