id: JER.46.4
reference: Jeremiah 46:4
source:
  edition: WLC
  text: אִסְר֣וּ הַ/סּוּסִ֗ים וַֽ/עֲלוּ֙ הַ/פָּ֣רָשִׁ֔ים וְ/הִֽתְיַצְּב֖וּ בְּ/כ֥וֹבָעִ֑ים
    מִרְקוּ֙ הָֽ/רְמָחִ֔ים לִבְשׁ֖וּ הַ/סִּרְיֹנֹֽת׃
translation:
  text: Harness the horses; mount up, you horsemen; take your stand with helmets on.
    Polish the spears; put on the armor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burnish the spears.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'siryonot' refers to body armor, possibly coats of mail or breastplates.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִסְרוּ
  chosen: Harness
  alternatives:
  - Bind
  - Tether
  lexicon: HALOT
  rationale: Imperative plural from אסר in a military context with horses; 'harness'
    best conveys preparing horses for battle rather than merely tying them.
- source_word: הַסּוּסִים
  chosen: the horses
  lexicon: HALOT
  rationale: Straightforward rendering of the definite plural noun סוּסִים.
- source_word: וַעֲלוּ
  chosen: mount up
  alternatives:
  - mount
  - go up
  lexicon: HALOT
  rationale: עלה literally means 'go up,' but with horsemen in context it idiomatically
    means mounting their horses; 'mount up' preserves the martial urgency.
- source_word: הַפָּרָשִׁים
  chosen: you horsemen
  alternatives:
  - the horsemen
  - the cavalrymen
  lexicon: HALOT
  rationale: Addressed as an imperative to the riders themselves; 'you horsemen' makes
    the vocative force clear in English.
- source_word: וְהִתְיַצְּבוּ
  chosen: take your stand
  alternatives:
  - stand forth
  - station yourselves
  lexicon: HALOT
  rationale: Hitpael imperative of יצב in military formation language; 'take your
    stand' is natural English and preserves the command to assume position.
- source_word: בְּכֹובָעִים
  chosen: with helmets on
  alternatives:
  - in helmets
  - with headgear
  lexicon: HALOT
  rationale: כּוֹבָעִים refers to helmets or military headgear. 'With helmets on'
    expresses the preposition and reads naturally in English.
- source_word: מִרְקוּ
  chosen: Polish
  alternatives:
  - burnish
  - clean
  lexicon: HALOT
  rationale: The verb denotes making bright/smooth; with spears, 'polish' is clear
    modern English, while 'burnish' is possible but less accessible.
- source_word: הָרְמָחִים
  chosen: the spears
  alternatives:
  - the lances
  lexicon: HALOT
  rationale: רְמָחִים are spears/lances; 'spears' is the more common and accessible
    military term.
- source_word: לִבְשׁוּ
  chosen: put on
  alternatives:
  - wear
  lexicon: HALOT
  rationale: Common imperative of לבשׁ; 'put on' fits the sequence of battle preparations.
- source_word: הַסִּרְיֹנֹת
  chosen: the armor
  alternatives:
  - the coats of mail
  - the breastplates
  lexicon: HALOT
  rationale: סִרְיֹן denotes body armor, often scale armor or coat of mail. 'Armor'
    is broad but accurate and readable; more specific options are possible but less
    certain in this context.
