theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrine specifies 'the LORD' as the default rendering
    for the Tetragrammaton. This verse is a prophetic superscription, and the conventional
    small-caps equivalent communicates the covenant name without introducing a denominationally
    loaded preference.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of עַל הַגּוֹיִם in the superscription
  chosen_reading: concerning the nations
  alternative_readings:
  - against the nations
  rationale: The Hebrew preposition עַל in headings can introduce subject matter generally,
    while the ensuing chapters contain oracles of judgment. To preserve the heading's
    broadness and avoid front-loading the interpretive force of judgment into this
    verse alone, the main text uses 'concerning,' with 'against' preserved in a footnote
    as a viable contextual alternative.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
