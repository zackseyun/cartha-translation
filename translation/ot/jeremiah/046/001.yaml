id: JER.46.1
reference: Jeremiah 46:1
source:
  edition: WLC
  text: אֲשֶׁ֨ר הָיָ֧ה דְבַר יְהוָ֛ה אֶל יִרְמְיָ֥הוּ הַ/נָּבִ֖יא עַל הַ/גּוֹיִֽם־־־׃
translation:
  text: 'The word of the LORD that came to Jeremiah the prophet concerning the nations:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against the nations.' The Hebrew preposition can introduce the subject
      matter generally or, in context, hostile oracles directed against them.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: Introduces the relative clause linking this superscription to the following
    oracles. 'That' is more natural in modern English than 'which' here while preserving
    the clause structure.
- source_word: הָיָה
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: Although literally 'was,' in the idiom דְבַר־יְהוָה הָיָה אֶל־... the
    natural English rendering is 'the word of the LORD came to ...'. This preserves
    the standard prophetic formula without wooden English.
- source_word: דְבַר יְהוָה
  chosen: The word of the LORD
  alternatives:
  - The message of the LORD
  lexicon: HALOT
  rationale: Standard prophetic expression. 'Word' preserves the formal and theological
    weight of divine revelation better than the more interpretive 'message.' 'LORD'
    follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, יְהוָה is rendered 'the LORD' in keeping with Jewish
    reverence tradition and longstanding English Bible convention.
- source_word: אֶל
  chosen: to
  alternatives:
  - for
  lexicon: HALOT
  rationale: Marks Jeremiah as the recipient of the divine word; 'to' is the straightforward
    relational rendering.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  lexicon: HALOT
  rationale: Standard English transliteration of the prophet's name, consistent with
    conventional usage and the project's policy to transliterate personal names.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Appositional title identifying Jeremiah's office. Retained explicitly
    because it is present in the Hebrew and contributes to the superscription's formal
    tone.
- source_word: עַל
  chosen: concerning
  alternatives:
  - against
  - about
  lexicon: HALOT
  rationale: In this superscription introducing the foreign-nation oracles, עַל can
    mean 'concerning' or, contextually in some passages, 'against.' Here 'concerning'
    is broader and fits the heading nature of the verse, while later verses specify
    judgment. The alternative 'against' is worth preserving in a footnote because
    many translations adopt it in light of the hostile content of the section.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  lexicon: HALOT
  rationale: In Jeremiah 46–51 the referent is the foreign nations as political entities.
    'Nations' is the clearest contextual rendering; 'Gentiles' would sound ethnoreligious
    in English and is less fitting here.
