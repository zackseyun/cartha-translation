id: JER.46.19
reference: Jeremiah 46:19
source:
  edition: WLC
  text: כְּלֵ֤י גוֹלָה֙ עֲשִׂ֣י לָ֔/ךְ יוֹשֶׁ֖בֶת בַּת מִצְרָ֑יִם כִּֽי נֹף֙ לְ/שַׁמָּ֣ה
    תִֽהְיֶ֔ה וְ/נִצְּתָ֖ה מֵ/אֵ֥ין יוֹשֵֽׁב־־׃ס
translation:
  text: Prepare your baggage for exile, O daughter dwelling in Egypt, for Noph will
    become a desolation, laid waste, without inhabitant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Noph is the Hebrew name for the Egyptian city later known as Memphis.
    reason: cross_reference
  - marker: b
    text: Or 'articles of exile' or 'gear for captivity'; the Hebrew image is of preparing
      belongings for deportation.
    reason: lexical_alternative
  - marker: c
    text: Or 'burned down' if the verb is taken with stronger fire imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּלֵי גוֹלָה
  chosen: baggage for exile
  alternatives:
  - articles of exile
  - gear for captivity
  - vessels of exile
  lexicon: HALOT
  rationale: כְּלֵי literally means 'vessels/objects/gear,' but in the collocation
    with גוֹלָה it idiomatically refers to what one prepares for deportation. 'Baggage
    for exile' is natural modern English while preserving the concrete image of preparing
    belongings for forced removal.
- source_word: עֲשִׂי לָךְ
  chosen: Prepare your
  alternatives:
  - make for yourself
  - get ready for yourself
  lexicon: HALOT
  rationale: The imperative plus reflexive pronoun calls the addressee to make ready
    something for herself. 'Prepare your' conveys the idiomatic force in English without
    unnecessary literal awkwardness.
- source_word: יוֹשֶׁבֶת בַּת מִצְרַיִם
  chosen: O daughter dwelling in Egypt
  alternatives:
  - O inhabitress, daughter of Egypt
  - O daughter of Egypt who dwells there
  - O inhabitant daughter Egypt
  lexicon: HALOT
  rationale: The feminine singular participle addresses Egypt personified as a woman.
    'Daughter dwelling in Egypt' keeps the feminine personification and the participial
    sense. I avoided flattening it to simply 'Egypt' so the prophetic address remains
    vivid.
- source_word: נֹף
  chosen: Noph
  alternatives:
  - Memphis
  lexicon: HALOT
  rationale: Per translation philosophy, names are transliterated rather than translated.
    נֹף is the Hebrew form of the Egyptian city commonly identified with Memphis;
    the historical identification is worth preserving in a footnote rather than replacing
    the name in the main text.
- source_word: לְשַׁמָּה
  chosen: a desolation
  alternatives:
  - an object of horror
  - a waste
  - a ruin
  lexicon: HALOT
  rationale: שַׁמָּה often denotes devastation/desolation and can carry the nuance
    of appalling ruin. 'A desolation' is the clearest core sense here and fits the
    judgment context.
- source_word: וְנִצְּתָה
  chosen: laid waste
  alternatives:
  - burned down
  - destroyed
  - torn down
  lexicon: HALOT
  rationale: The verb from נצה/יצת in this context denotes being devastated, often
    with the sense of being burned or ruined. 'Laid waste' captures the result clearly
    without overcommitting to fire imagery that is possible but not explicit enough
    to require in English.
- source_word: מֵאֵין יוֹשֵׁב
  chosen: without inhabitant
  alternatives:
  - with no one dwelling there
  - without anyone living there
  - uninhabited
  lexicon: HALOT
  rationale: This idiom means there will be no resident left. 'Without inhabitant'
    is slightly formal but concise and close to the Hebrew structure; it preserves
    the starkness of the oracle.
