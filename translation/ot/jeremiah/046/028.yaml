id: JER.46.28
reference: Jeremiah 46:28
source:
  edition: WLC
  text: אַ֠תָּה אַל תִּירָ֞א עַבְדִּ֤/י יַֽעֲקֹב֙ נְאֻם יְהוָ֔ה כִּ֥י אִתְּ/ךָ֖ אָ֑נִי
    כִּי֩ אֶעֱשֶׂ֨ה כָלָ֜ה בְּ/כָֽל הַ/גּוֹיִ֣ם אֲשֶׁ֧ר הִדַּחְתִּ֣י/ךָ שָׁ֗מָּ/ה
    וְ/אֹֽתְ/ךָ֙ לֹא אֶעֱשֶׂ֣ה כָלָ֔ה וְ/יִסַּרְתִּ֨י/ךָ֙ לַ/מִּשְׁפָּ֔ט וְ/נַקֵּ֖ה
    לֹ֥א אֲנַקֶּֽ/ךָּ־־־׀־׃ס
translation:
  text: But you, do not fear, my servant Jacob, declares the LORD, for I am with you.
    For I will make a full end of all the nations where I have driven you, but of
    you I will not make a full end. Yet I will discipline you with justice, and I
    will by no means leave you unpunished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will not completely destroy you.' The Hebrew repeats 'make a full
      end' for rhetorical contrast between the nations and Jacob.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will certainly not acquit you.' The Hebrew can carry the forensic
      sense 'declare innocent,' though here it also implies not leaving Jacob without
      due punishment.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּירָא
  chosen: do not fear
  alternatives:
  - do not be afraid
  lexicon: HALOT
  rationale: The prohibition plus qal imperfect of ירא is naturally rendered as a
    direct command against fear. 'Do not fear' is concise and idiomatic, while preserving
    the covenantal reassurance tone common in prophetic speech.
- source_word: עַבְדִּי יַעֲקֹב
  chosen: my servant Jacob
  alternatives:
  - my servant, Jacob
  lexicon: HALOT
  rationale: Retains the covenant title 'my servant' and the personal/national name
    'Jacob.' No need to paraphrase as 'Israel' since the Hebrew explicitly says Jacob.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Declares the LORD' is readable modern
    English and preserves the solemn force. Per doctrine, יְהוָה is rendered 'the
    LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance
    with DOCTRINE.md.
- source_word: כִּי אִתְּךָ אָנִי
  chosen: for I am with you
  alternatives:
  - for I am with you indeed
  lexicon: HALOT
  rationale: This is the natural English equivalent of the reassurance formula. It
    preserves both the causal conjunction and the emphatic divine presence.
- source_word: אֶעֱשֶׂה כָלָה
  chosen: I will make a full end
  alternatives:
  - I will bring complete destruction
  - I will make an end
  lexicon: HALOT
  rationale: כָּלָה in this collocation often denotes complete destruction or full
    end. 'Make a full end' preserves the repeated Hebrew phrasing in this verse and
    keeps the rhetorical contrast with Israel's non-annihilation.
- source_word: בְּכָל הַגּוֹיִם
  chosen: of all the nations
  alternatives:
  - among all the nations
  lexicon: HALOT
  rationale: With אעשה כלה, English idiom prefers 'of all the nations' to express
    the object of total destruction. This best communicates the sense of judgment
    falling on those nations.
- source_word: אֲשֶׁר הִדַּחְתִּיךָ שָׁמָּה
  chosen: where I have driven you
  alternatives:
  - to which I have banished you
  - where I have scattered you
  lexicon: HALOT
  rationale: נדח in the hiphil here conveys forceful dispersal/driving away. 'Driven
    you' is more direct than 'scattered' and matches the exile context without overinterpreting.
- source_word: וְאֹתְךָ לֹא אֶעֱשֶׂה כָלָה
  chosen: but of you I will not make a full end
  alternatives:
  - but I will not make a full end of you
  - but I will not completely destroy you
  lexicon: HALOT
  rationale: This mirrors the earlier clause closely, preserving the deliberate contrast
    between the nations and Jacob. The slightly formal wording reflects the Hebrew
    repetition.
- source_word: וְיִסַּרְתִּיךָ
  chosen: Yet I will discipline you
  alternatives:
  - but I will chasten you
  - I will correct you
  lexicon: HALOT
  rationale: יסר carries the sense of corrective discipline rather than mere punishment.
    'Discipline' preserves that nuance in accessible English.
- source_word: לַמִּשְׁפָּט
  chosen: with justice
  alternatives:
  - in just measure
  - according to justice
  - with judgment
  lexicon: HALOT
  rationale: The phrase indicates that the discipline is measured and just, not arbitrary.
    'With justice' is concise and clear, while 'with judgment' could sound merely
    condemnatory in modern English.
- source_word: וְנַקֵּה לֹא אֲנַקֶּךָּ
  chosen: and I will by no means leave you unpunished
  alternatives:
  - and I will certainly not acquit you
  - and I will not leave you entirely unpunished
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the negation. Because
    נקה can mean 'hold innocent, acquit, leave unpunished,' this rendering communicates
    that Jacob will not be exempt from corrective consequences. 'Acquit' is possible
    but sounds overly forensic in this context.
