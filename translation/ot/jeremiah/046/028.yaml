theological_decisions:
- issue: Divine judgment on Jacob versus the nations
  chosen_reading: God promises preservation of Jacob from annihilation while still
    subjecting him to just discipline.
  alternative_readings:
  - God will not destroy Jacob at all in any sense
  - God's discipline is purely punitive rather than corrective
  rationale: The verse explicitly contrasts 'a full end' for the nations with 'not
    a full end' for Jacob, followed by disciplinary language. The translation preserves
    both mercy and judgment without collapsing one into the other.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
