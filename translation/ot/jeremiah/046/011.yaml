id: JER.46.11
reference: Jeremiah 46:11
source:
  edition: WLC
  text: עֲלִ֤י גִלְעָד֙ וּ/קְחִ֣י צֳרִ֔י בְּתוּלַ֖ת בַּת מִצְרָ֑יִם לַ/שָּׁוְא֙ הרביתי
    רְפֻא֔וֹת תְּעָלָ֖ה אֵ֥ין לָֽ/ךְ־׃
translation:
  text: Go up to Gilead and get balm, virgin daughter of Egypt. In vain you have multiplied
    remedies; there is no healing for you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''To no avail you have used many remedies.'' The Hebrew verb form in
      ''you have multiplied'' is textually and morphologically difficult in the consonantal
      text, but the sense in context is clear: Egypt''s many treatments are futile.'
    reason: textual_variant
  - marker: b
    text: Gilead was known for its medicinal balm; the command is ironic, since even
      the best-known remedy will not heal Egypt.
    reason: cultural_note
lexical_decisions:
- source_word: עֲלִי
  chosen: Go up
  alternatives:
  - Ascend
  lexicon: HALOT
  rationale: Qal imperative 2fs of עלה, a common directional command meaning 'go up/ascend.'
    'Go up' is idiomatic modern English and preserves the imperative force.
- source_word: גִלְעָד
  chosen: Gilead
  lexicon: HALOT
  rationale: Proper place name, transliterated per translation philosophy. Gilead
    was associated with medicinal balm, which supports the verse's imagery.
- source_word: וּקְחִי
  chosen: and get
  alternatives:
  - and take
  lexicon: HALOT
  rationale: Qal imperative 2fs of לקח. 'Get' fits the idiom 'get balm' in contemporary
    English, while still reflecting the acquisition sense of the verb. 'Take' is possible
    but slightly less natural here.
- source_word: צֳרִי
  chosen: balm
  alternatives:
  - resin
  - medicine
  lexicon: HALOT
  rationale: Refers to the famed balsam/resin of Gilead used medicinally. 'Balm' preserves
    the established biblical image and is understandable in modern English.
- source_word: בְּתוּלַת בַּת מִצְרַיִם
  chosen: virgin daughter of Egypt
  alternatives:
  - virgin daughter Egypt
  - maiden daughter of Egypt
  lexicon: HALOT
  rationale: A prophetic personification formula. 'Virgin daughter of Egypt' is the
    most natural English rendering while preserving both the metaphorical femininity
    and the appositional/genitival structure.
- source_word: לַשָּׁוְא
  chosen: In vain
  alternatives:
  - For nothing
  - To no avail
  lexicon: HALOT
  rationale: The prepositional phrase marks futility. 'In vain' is concise, idiomatic,
    and suits prophetic diction.
- source_word: הִרְבֵּיתִי
  chosen: you have multiplied
  alternatives:
  - you have used many
  - you have increased
  lexicon: HALOT
  rationale: The ketiv-like consonantal form here is commonly understood in context
    as 2fs ('you have multiplied'), matching the feminine addressee Egypt. This yields
    coherent sense with the following plural noun 'remedies.'
- source_word: רְפֻאוֹת
  chosen: remedies
  alternatives:
  - medicines
  - healings
  lexicon: HALOT
  rationale: Plural noun from the healing root רפא. In this context of seeking balm,
    'remedies' best captures attempted medical treatments rather than the abstract
    concept of healing.
- source_word: תְּעָלָה
  chosen: healing
  alternatives:
  - recovery
  - cure
  lexicon: HALOT
  rationale: Denotes restoration/recovery from injury or illness. 'Healing' is broad
    and natural, and pairs well with 'there is no healing for you.' 'Cure' is possible
    but slightly narrower.
- source_word: אֵין לָךְ
  chosen: there is no ... for you
  alternatives:
  - you have no ...
  - none is available to you
  lexicon: HALOT
  rationale: Existential negation plus preposition/pronominal suffix. Rendering as
    'there is no healing for you' is idiomatic and preserves the Hebrew syntax's force.
