id: JER.46.10
reference: Jeremiah 46:10
source:
  edition: WLC
  text: וְֽ/הַ/יּ֨וֹם הַ/ה֜וּא לַ/אדֹנָ֧/י יְהוִ֣ה צְבָא֗וֹת י֤וֹם נְקָמָה֙ לְ/הִנָּקֵ֣ם מִ/צָּרָ֔י/ו וְ/אָכְלָ֥ה חֶ֨רֶב֙ וְ/שָׂ֣בְעָ֔ה וְ/רָוְתָ֖ה מִ/דָּמָ֑/ם כִּ֣י זֶ֠בַח לַ/אדֹנָ֨/י יְהוִ֧ה צְבָא֛וֹת בְּ/אֶ֥רֶץ צָפ֖וֹן אֶל נְהַר פְּרָֽת־־׃
translation:
  text: That day belongs to the Lord GOD of Armies, a day of vengeance, to avenge himself on his foes. The sword will devour and be satisfied and drink its fill of their blood, for the Lord GOD of Armies has a sacrifice in the land of the north, by the Euphrates River.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for there is a sacrifice for the Lord GOD of Armies.' The Hebrew can be taken as an existential clause rather than the more idiomatic 'has a sacrifice.'
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'LORD of hosts' for 'Lord GOD of Armies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַיּוֹם הַהוּא
  chosen: That day
  alternatives:
  - And that day
  - But that day
  lexicon: HALOT
  rationale: Temporal deictic phrase introducing the event. English omits the conjunction for natural style while preserving the demonstrative force with 'that day'.
- source_word: לַאדֹנָי יְהוִה צְבָאוֹת
  chosen: belongs to the Lord GOD of Armies
  alternatives:
  - is for the Lord GOD of Armies
  - belongs to the Lord Yahweh of hosts
  lexicon: HALOT
  rationale: 'The prefixed ל marks possession or relation: the day is the Lord''s. ''Lord GOD'' renders אֲדֹנָי יְהוִה in standard English convention, and ''of Armies'' translates צְבָאוֹת rather than preserving the traditional but less transparent ''of hosts.'''
- source_word: יְהוִה
  chosen: GOD
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: In the compound title אֲדֹנָי יְהוִה, English convention uses 'Lord GOD' to avoid 'Lord LORD.' This still reflects the divine name while aligning with the project's default treatment of YHWH.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: A transparent rendering of the title emphasizing military forces; more accessible to modern readers than 'hosts' while preserving the martial sense in this judgment context.
- source_word: יוֹם נְקָמָה
  chosen: a day of vengeance
  alternatives:
  - a day of avenging
  - a day of retribution
  lexicon: HALOT
  rationale: נְקָמָה denotes vengeance or vindicatory retribution. 'Vengeance' best matches the noun and the following infinitive.
- source_word: לְהִנָּקֵם מִצָּרָיו
  chosen: to avenge himself on his foes
  alternatives:
  - to take vengeance on his adversaries
  - to avenge himself against his enemies
  lexicon: HALOT
  rationale: 'The Niphal infinitive of נקם here is reflexive/passive in form but active in sense in context: YHWH acts in vengeance against his opponents. ''Foes'' is a natural rendering of צָרִים in military/judgment context.'
- source_word: וְאָכְלָה חֶרֶב
  chosen: The sword will devour
  alternatives:
  - And the sword shall devour
  - The sword will consume
  lexicon: HALOT
  rationale: Personified feminine verb agrees with חֶרֶב. 'Devour' preserves the vivid metaphor of the sword as consuming.
- source_word: וְשָׂבְעָה
  chosen: and be satisfied
  alternatives:
  - and be sated
  - and have its fill
  lexicon: HALOT
  rationale: Continues the personification of the sword. 'Be satisfied' is idiomatic and preserves the satiation imagery.
- source_word: וְרָוְתָה מִדָּמָם
  chosen: and drink its fill of their blood
  alternatives:
  - and be drenched with their blood
  - and be drunk with their blood
  lexicon: HALOT
  rationale: The verb רוה conveys being saturated or drinking one's fill. Because the subject is the personified sword, 'drink its fill' best carries the metaphor without flattening it into a mere passive state.
- source_word: כִּי זֶבַח
  chosen: for ... has a sacrifice
  alternatives:
  - for there is a sacrifice
  - for it is a sacrifice
  lexicon: HALOT
  rationale: כִּי gives the reason for the sword's satiation. זֶבַח evokes sacrificial slaughter imagery; 'has a sacrifice' reflects the implied possession with לַאדֹנָי and keeps the metaphor explicit.
- source_word: בְּאֶרֶץ צָפוֹן
  chosen: in the land of the north
  alternatives:
  - in the north country
  - in the northern land
  lexicon: HALOT
  rationale: A geographic designation. 'Land of the north' is formally close and readable.
- source_word: אֶל נְהַר פְּרָת
  chosen: by the Euphrates River
  alternatives:
  - at the Euphrates River
  - near the river Euphrates
  lexicon: HALOT
  rationale: The preposition אֶל can indicate direction toward or proximity in context. Since the battle setting is located at Carchemish by the Euphrates, 'by' communicates the locative sense naturally in English.
