theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: Lord GOD
  alternative_readings:
  - Lord Yahweh
  - the Lord GOD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering צְבָאוֹת
  chosen_reading: of Armies
  alternative_readings:
  - of hosts
  rationale: The title is translated rather than transliterated/traditionally preserved, in keeping with the project's preference for transparent meaning in modern English. In this war oracle, the military nuance is especially salient.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
