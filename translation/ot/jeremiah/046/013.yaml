id: JER.46.13
reference: Jeremiah 46:13
source:
  edition: WLC
  text: הַ/דָּבָר֙ אֲשֶׁ֣ר דִּבֶּ֣ר יְהוָ֔ה אֶֽל יִרְמְיָ֖הוּ הַ/נָּבִ֑יא לָ/ב֗וֹא נְבֽוּכַדְרֶאצַּר֙ מֶ֣לֶךְ בָּבֶ֔ל לְ/הַכּ֖וֹת אֶת אֶ֥רֶץ מִצְרָֽיִם־־׃
translation:
  text: 'The word that Yahweh spoke to Jeremiah the prophet about the coming of Nebuchadnezzar king of Babylon to strike the land of Egypt:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew spelling: ''Nebuchadrezzar''; traditionally rendered ''Nebuchadnezzar'' in English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  chosen: The word
  alternatives:
  - The message
  - The matter
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word, matter, message.' In prophetic superscriptions, 'the word' is a standard and suitably formal rendering that preserves the idiom without over-paraphrasing.
- source_word: דִּבֶּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: With יְהוָה as subject and אֶל marking the addressee, 'spoke' is the natural English equivalent in prophetic formulae and preserves the elevated register.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Appositional title identifying Jeremiah's office; straightforwardly rendered 'the prophet.'
- source_word: לָבוֹא
  chosen: about the coming of
  alternatives:
  - when ... came
  - concerning the coming of
  lexicon: HALOT
  rationale: 'The infinitive construct of בוא with prefixed ל here introduces the subject matter of the word: Nebuchadnezzar''s coming. ''About the coming of'' is idiomatic English and preserves the prospective sense better than a finite past-tense paraphrase.'
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: Standard English transliteration is 'Nebuchadnezzar.' The Hebrew spelling here more closely reflects 'Nebuchadrezzar,' but the conventional English form is widely recognized and acceptable for readability; the alternative is preserved in a footnote.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: Construct chain rendered directly and naturally in English.
- source_word: לְהַכּוֹת
  chosen: to strike
  alternatives:
  - to attack
  - to strike down
  lexicon: HALOT
  rationale: נכה has a broad range including 'strike, smite, attack, defeat.' Here, with 'the land of Egypt' as object, 'to strike' preserves the military/judicial force without over-specifying the outcome.
- source_word: אֶרֶץ מִצְרַיִם
  chosen: the land of Egypt
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: The Hebrew explicitly includes אֶרֶץ, so 'the land of Egypt' is retained rather than reduced to simply 'Egypt.' This preserves the territorial focus of the coming blow.
