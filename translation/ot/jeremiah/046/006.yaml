id: JER.46.6
reference: Jeremiah 46:6
source:
  edition: WLC
  text: אַל יָנ֣וּס הַ/קַּ֔ל וְ/אַל יִמָּלֵ֖ט הַ/גִּבּ֑וֹר צָפ֨וֹנָ/ה֙ עַל יַ֣ד נְהַר
    פְּרָ֔ת כָּשְׁל֖וּ וְ/נָפָֽלוּ־־־־׃
translation:
  text: Let not the swift flee, and let not the mighty man escape; in the north, by
    the bank of the Euphrates River, they have stumbled and fallen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'northward' or 'to the north.' The Hebrew form צָפוֹנָה can be understood
      directionally as well as locationally.
    reason: lexical_alternative
  - marker: b
    text: Literally 'by the hand of the Euphrates River,' a Hebrew idiom meaning 'beside'
      or 'along the side of' the river.
    reason: lexical_alternative
  - marker: c
    text: Or 'the warrior' for 'the mighty man.' The Hebrew גִּבּוֹר often refers
      to a strong or valiant fighter.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Let not
  alternatives:
  - Do not
  lexicon: HALOT
  rationale: Used with the imperfect to express prohibition/jussive force. 'Let not'
    preserves the elevated prophetic tone and the third-person prohibitive sense better
    than a direct second-person 'do not.'
- source_word: יָנוּס
  chosen: flee
  alternatives:
  - escape
  - run away
  lexicon: HALOT
  rationale: The verb means 'to flee.' 'Flee' fits the military-defeat context and
    pairs well with the following prohibition.
- source_word: הַקַּל
  chosen: the swift
  alternatives:
  - the swift one
  - the light-armed
  lexicon: HALOT
  rationale: Literally 'the light/swift one.' In context it likely refers to the fast
    runner or agile soldier. 'The swift' is concise and natural English while preserving
    the adjectival force.
- source_word: יִמָּלֵט
  chosen: escape
  alternatives:
  - be delivered
  - get away
  lexicon: HALOT
  rationale: Nifal of מלט commonly means 'escape' or 'be delivered.' In this battle
    context, 'escape' is the clearest idiomatic rendering.
- source_word: הַגִּבּוֹר
  chosen: the mighty man
  alternatives:
  - the warrior
  - the strong man
  - the mighty one
  lexicon: HALOT
  rationale: גִּבּוֹר can denote a mighty man, strong man, or warrior. 'Mighty man'
    preserves the lexical form and the masculine singular, while still fitting the
    military setting.
- source_word: צָפוֹנָה
  chosen: in the north
  alternatives:
  - northward
  - to the north
  lexicon: HALOT
  rationale: The directional form indicates location/direction toward the north. Given
    the following geographic specification, 'in the north' reads most naturally in
    English and conveys the setting of the defeat.
- source_word: עַל יַד
  chosen: by the bank of
  alternatives:
  - beside
  - at the side of
  - by
  lexicon: HALOT
  rationale: The idiom literally means 'by the hand/side of' and in geographic contexts
    means 'beside' or 'alongside.' 'By the bank of' makes the river setting explicit
    and idiomatic in English.
- source_word: נְהַר פְּרָת
  chosen: the Euphrates River
  alternatives:
  - the river Euphrates
  - the Euphrates
  lexicon: HALOT
  rationale: English normally places the proper name before 'River.' Including 'River'
    reflects the Hebrew construct while remaining natural.
- source_word: כָּשְׁלוּ
  chosen: they have stumbled
  alternatives:
  - they stumbled
  - they have faltered
  lexicon: HALOT
  rationale: The perfect reports the outcome vividly. 'Have stumbled' preserves the
    completed action with present relevance in English narrative-prophetic style.
- source_word: וְנָפָלוּ
  chosen: and fallen
  alternatives:
  - and they have fallen
  - and collapsed
  lexicon: HALOT
  rationale: Paired with 'stumbled,' 'fallen' preserves the terse poetic sequence
    of defeat. Omitting the repeated subject in English keeps the line smooth without
    loss of meaning.
