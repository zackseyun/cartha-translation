id: JER.46.8
reference: Jeremiah 46:8
source:
  edition: WLC
  text: מִצְרַ֨יִם֙ כַּ/יְאֹ֣ר יַֽעֲלֶ֔ה וְ/כַ/נְּהָר֖וֹת יִתְגֹּ֣עֲשׁוּ מָ֑יִם וַ/יֹּ֗אמֶר
    אַֽעֲלֶה֙ אֲכַסֶּה אֶ֔רֶץ אֹבִ֥ידָה עִ֖יר וְ/יֹ֥שְׁבֵי בָֽ/הּ־׃
translation:
  text: Egypt rises like the Nile, and its waters surge like rivers. It says, ‘I will
    rise, I will cover the earth; I will destroy the city and those who dwell in it.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will cover the land.' The Hebrew אֶרֶץ can mean either 'earth' or
      'land'; the main text preserves the sweeping, hyperbolic force of Egypt's boast.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִצְרַיִם
  chosen: Egypt
  alternatives:
  - Mizraim
  lexicon: HALOT
  rationale: Standard English name for the nation; context is the geopolitical power
    personified.
- source_word: כַּיְאֹר
  chosen: like the Nile
  alternatives:
  - like a river
  - like the Nile River
  lexicon: HALOT
  rationale: יְאֹר in Hebrew often refers specifically to the Nile in Egyptian contexts.
    Since Egypt is in view, 'the Nile' is more precise than the generic 'river'.
- source_word: יַעֲלֶה
  chosen: rises
  alternatives:
  - comes up
  - ascends
  lexicon: HALOT
  rationale: The imperfect depicts Egypt's swelling advance in vivid present-like
    imagery. 'Rises' fits both flood imagery and military movement.
- source_word: וְכַנְּהָרוֹת יִתְגֹּעֲשׁוּ מָיִם
  chosen: and its waters surge like rivers
  alternatives:
  - and like rivers the waters toss
  - and its waters heave like streams
  lexicon: HALOT
  rationale: The clause compares Egypt's movement to multiple rushing waterways. Supplying
    'its waters' makes the English natural while preserving the flood metaphor. 'Surge'
    captures the turbulent force of יתגעשו.
- source_word: וַיֹּאמֶר
  chosen: It says
  alternatives:
  - and he said
  - and it said
  lexicon: HALOT
  rationale: Egypt is grammatically singular and personified as speaking. English
    present 'says' maintains the vivid poetic sequence better than a simple past.
- source_word: אַעֲלֶה
  chosen: I will rise
  alternatives:
  - I will go up
  - I will come up
  lexicon: HALOT
  rationale: Keeps the verbal echo with the earlier 'rises' and suits the boastful
    flood/military imagery.
- source_word: אֲכַסֶּה אֶרֶץ
  chosen: I will cover the earth
  alternatives:
  - I will cover the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' Here the boast is expansive and hyperbolic,
    so 'earth' best conveys the rhetoric, though 'land' is possible.
- source_word: אֹבִידָה
  chosen: I will destroy
  alternatives:
  - I will wipe out
  - I will make perish
  lexicon: HALOT
  rationale: Straightforward rendering of the Hiphil of אבד in a military threat context.
- source_word: עִיר וְיֹשְׁבֵי בָהּ
  chosen: the city and those who dwell in it
  alternatives:
  - the city and its inhabitants
  - cities and those who dwell in them
  lexicon: HALOT
  rationale: The Hebrew is singular, so 'the city' is retained rather than pluralizing.
    'Those who dwell in it' is slightly more formal but transparent and close to the
    source.
