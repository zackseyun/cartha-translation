theological_decisions:
- issue: Whether to make explicit the historical identity of the northern people
  chosen_reading: Leave the phrase generic as 'a people from the north'
  alternative_readings:
  - Identify it in translation as Babylon
  - Render more interpretively as 'the northern army'
  rationale: The Hebrew text itself says only 'a people from the north.' The translation
    should preserve the prophetic wording and not import a historical identification
    into the main text beyond what the verse states.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
