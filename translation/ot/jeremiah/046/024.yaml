id: JER.46.24
reference: Jeremiah 46:24
source:
  edition: WLC
  text: הֹבִ֖ישָׁה בַּת מִצְרָ֑יִם נִתְּנָ֖ה בְּ/יַ֥ד עַם צָפֽוֹן־־׃
translation:
  text: The daughter of Egypt is put to shame; she is given into the hand of a people
    from the north.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''into the hand of,'' an idiom meaning ''into the power of.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹבִישָׁה
  chosen: is put to shame
  alternatives:
  - has been put to shame
  - is ashamed
  - is disgraced
  lexicon: HALOT
  rationale: Hiphil of בוש commonly conveys causing shame or being put to shame/disgraced.
    The passive-like English 'is put to shame' matches the feminine singular form
    referring to 'daughter' and preserves the prophetic/judgment tone better than
    the more internal 'is ashamed'.
- source_word: בַּת מִצְרַיִם
  chosen: the daughter of Egypt
  alternatives:
  - daughter Egypt
  - Fair Egypt
  - Egypt
  lexicon: HALOT
  rationale: A standard prophetic personification for a nation/city. 'The daughter
    of Egypt' preserves the metaphor and feminine agreement in the verse. Rendering
    simply 'Egypt' would lose the personified imagery.
- source_word: נִתְּנָה
  chosen: she is given
  alternatives:
  - has been given
  - is delivered over
  - is handed over
  lexicon: HALOT
  rationale: Niphal of נתן here is passive, indicating Egypt's surrender into another's
    power. 'Is given' is formally close and idiomatic in English; the following phrase
    'into the hand of' clarifies the hostile transfer of power.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - to the hand of
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for being delivered into someone's power.
    Retaining 'hand' in the main text preserves the biblical idiom while remaining
    understandable in English.
- source_word: עַם צָפוֹן
  chosen: a people from the north
  alternatives:
  - the people of the north
  - a northern people
  - the northern people
  lexicon: HALOT
  rationale: Literally 'people of north.' 'A people from the north' is natural English
    and preserves the indefinite collective sense. It likely refers to the Babylonian
    invader without importing that identification into the translation itself.
