id: JER.46.3
reference: Jeremiah 46:3
source:
  edition: WLC
  text: עִרְכ֤וּ מָגֵן֙ וְ/צִנָּ֔ה וּ/גְשׁ֖וּ לַ/מִּלְחָמָֽה׃
translation:
  text: Prepare buckler and shield, and advance to battle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Prepare small shield and large shield, and draw near for battle.”
    reason: lexical_alternative
lexical_decisions:
- source_word: עִרְכוּ
  chosen: Prepare
  alternatives:
  - Set in order
  - Arrange
  - Ready
  lexicon: HALOT
  rationale: The imperative from ערך commonly means to arrange or set in order. In
    a military summons with weapons as the object, 'Prepare' gives the natural English
    sense of making arms ready without over-paraphrasing.
- source_word: מָגֵן
  chosen: buckler
  alternatives:
  - small shield
  - shield
  lexicon: HALOT
  rationale: מָגֵן often denotes a smaller defensive shield, distinguished here from
    צִנָּה. Rendering it as 'buckler' preserves the lexical contrast between the two
    pieces of armor better than using 'shield' for both.
- source_word: צִנָּה
  chosen: shield
  alternatives:
  - large shield
  lexicon: HALOT
  rationale: צִנָּה commonly refers to a larger shield. Translating it as 'shield'
    alongside 'buckler' for מָגֵן preserves the paired military equipment while keeping
    the English readable.
- source_word: וּגְשׁוּ
  chosen: advance
  alternatives:
  - draw near
  - approach
  - come forward
  lexicon: HALOT
  rationale: The verb נגשׁ means to approach or draw near. In this martial context,
    'advance' captures the military movement toward engagement more idiomatically
    than the more wooden 'draw near.'
- source_word: לַמִּלְחָמָה
  chosen: to battle
  alternatives:
  - for battle
  - to the battle
  - to war
  lexicon: HALOT
  rationale: The phrase marks movement toward combat. 'To battle' is concise, natural
    English and fits the imperative call to engage in warfare.
