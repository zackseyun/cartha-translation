id: JER.46.20
reference: Jeremiah 46:20
source:
  edition: WLC
  text: עֶגְלָ֥ה יְפֵֽה פִיָּ֖ה מִצְרָ֑יִם קֶ֥רֶץ מִ/צָּפ֖וֹן בָּ֥א בָֽא־׃
translation:
  text: Egypt is a beautiful heifer; a biting fly from the north has come, it has
    come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a gadfly from the north'; the Hebrew noun is rare and some take it more
      broadly as 'destruction from the north.'
    reason: alternative_reading
lexical_decisions:
- source_word: עֶגְלָה
  chosen: heifer
  alternatives:
  - young cow
  - calf
  lexicon: HALOT
  rationale: The noun denotes a young female bovine. 'Heifer' is the most precise
    English equivalent and preserves the feminine imagery used for Egypt.
- source_word: יְפֵה פִיָּה
  chosen: beautiful
  alternatives:
  - fair of form
  - beautiful in appearance
  lexicon: HALOT
  rationale: The paired adjectives intensify Egypt's attractiveness/beauty. Rendering
    the phrase simply as 'beautiful' gives natural English while preserving the image;
    the more literal 'fair of form' is possible but less idiomatic.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard rendering of the place name/personified nation. Here Egypt is
    personified as the feminine heifer.
- source_word: קֶרֶץ
  chosen: biting fly
  alternatives:
  - gadfly
  - stinging insect
  - destruction
  lexicon: HALOT
  rationale: 'The noun is difficult and relatively rare. In this context, following
    the common lexical sense of a stinging or biting insect fits the animal metaphor:
    a beautiful heifer is attacked by a gadfly from the north. Some versions take
    it more abstractly as ''destruction,'' but the concrete insect image better explains
    the metaphorical coherence of the verse.'
- source_word: מִצָּפוֹן
  chosen: from the north
  alternatives:
  - out of the north
  lexicon: HALOT
  rationale: Standard directional phrase. In Jeremiah, 'from the north' often signals
    the direction of invading judgment.
- source_word: בָּא בָא
  chosen: has come, it has come
  alternatives:
  - comes, it comes
  - is coming, is coming
  lexicon: HALOT
  rationale: The repetition is emphatic. Rendering both verbs preserves the Hebrew
    insistence and urgency. Perfect aspect in prophetic discourse can be rendered
    as present or future, but 'has come' reflects the Hebrew form while conveying
    the certainty of the threat.
