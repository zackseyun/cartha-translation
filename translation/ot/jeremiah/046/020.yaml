theological_decisions:
- issue: Interpretation of קֶרֶץ in a metaphorical judgment oracle
  chosen_reading: Concrete insect image ('biting fly') within the heifer metaphor
  alternative_readings:
  - abstract 'destruction' or 'calamity' from the north
  rationale: This verse is poetic and metaphorical rather than doctrinally contested.
    Retaining the animal/insect imagery best matches the immediate context and avoids
    flattening the poetry into an abstract statement. The alternative is preserved
    in a footnote because the Hebrew term is uncertain and some translations adopt
    a non-concrete sense.
