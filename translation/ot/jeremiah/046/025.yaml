id: JER.46.25
reference: Jeremiah 46:25
source:
  edition: WLC
  text: אָמַר֩ יְהוָ֨ה צְבָא֜וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֗ל הִנְ/נִ֤י פוֹקֵד֙ אֶל אָמ֣וֹן מִ/נֹּ֔א וְ/עַל פַּרְעֹה֙ וְ/עַל מִצְרַ֔יִם וְ/עַל אֱלֹהֶ֖י/הָ וְ/עַל מְלָכֶ֑י/הָ וְ/עַ֨ל פַּרְעֹ֔ה וְ/עַ֥ל הַ/בֹּטְחִ֖ים בּֽ/וֹ־־־־־־׃
translation:
  text: 'Yahweh of hosts, the God of Israel, says: Behold, I am about to punish Amon of No, and Pharaoh, and Egypt, and her gods, and her kings, and Pharaoh, and those who trust in him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Amon of Thebes.' 'No' is the Hebrew name for the Egyptian city often identified with Thebes.
    reason: cultural_note
  - marker: b
    text: Or 'those who trust in it,' if the pronoun is taken to refer to Egypt rather than Pharaoh.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name with small-caps convention in English.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering of the divine title; it preserves the breadth of heavenly and earthly forces implied, not merely military troops.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct rendering identifying Israel's God.
- source_word: הִנְנִי
  chosen: Behold, I am about to
  alternatives:
  - Behold, I
  - Look, I am about to
  lexicon: HALOT
  rationale: The particle plus pronoun marks solemn immediacy. 'Behold' preserves prophetic force, while 'I am about to' brings out the imminent sense in context.
- source_word: פוֹקֵד
  chosen: punish
  alternatives:
  - visit
  - attend to
  - bring judgment on
  lexicon: HALOT
  rationale: In judgment contexts פקד commonly means to call to account or punish. 'Punish' communicates the judicial sense more clearly than the archaic 'visit'.
- source_word: אֶל
  chosen: Amon of No
  alternatives:
  - against Amon of No
  lexicon: HALOT
  rationale: With פקד in this context, the preposition introduces the object of judgment. English expresses this naturally without a separate preposition after 'punish'.
- source_word: אָמ֣וֹן מִנֹּא
  chosen: Amon of No
  alternatives:
  - Amon from No
  - Amon of Thebes
  lexicon: HALOT
  rationale: The Hebrew most naturally reads the deity/place-name expression 'Amon of No.' 'No' is retained as a transliterated place-name; identifying it as Thebes is interpretive and better suited to a note.
- source_word: וְעַל
  chosen: and
  alternatives:
  - and upon
  - against
  lexicon: HALOT
  rationale: Repeated עַל after פקד continues the list of those under judgment. English idiom smooths the repetition with 'and' while preserving the accumulation.
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Standard English transliteration of the royal title/name.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard place-name rendering.
- source_word: אֱלֹהֶיהָ
  chosen: her gods
  alternatives:
  - its gods
  lexicon: HALOT
  rationale: The feminine singular suffix refers grammatically to Egypt. 'Her' preserves the Hebrew grammatical form; 'its' would be possible in English but less source-transparent.
- source_word: מְלָכֶיהָ
  chosen: her kings
  alternatives:
  - its kings
  lexicon: HALOT
  rationale: As with 'her gods,' the feminine suffix is preserved. The plural 'kings' likely refers to Egypt's rulers or dependent rulers collectively.
- source_word: הַבֹּטְחִים בּוֹ
  chosen: those who trust in him
  alternatives:
  - those who trust in it
  - those who rely on him
  lexicon: HALOT
  rationale: The singular masculine suffix most naturally refers back to Pharaoh, the nearest masculine singular antecedent, especially since Pharaoh is repeated immediately before this phrase. 'Trust in him' preserves the personal object of misplaced reliance.
