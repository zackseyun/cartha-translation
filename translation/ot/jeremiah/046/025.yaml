theological_decisions:
- issue: Referent of the pronoun in בּוֹ ('in him/it')
  chosen_reading: 'The pronoun refers to Pharaoh: ''those who trust in him.'''
  alternative_readings:
  - 'The pronoun refers more broadly to Egypt: ''those who trust in it.'''
  rationale: The nearest antecedent is the repeated masculine singular 'Pharaoh,' and the syntax highlights him immediately before the phrase. This also fits the prophetic theme of condemning reliance on human rulers. The alternative is possible because Egypt is in the larger context, but the Hebrew morphology favors Pharaoh.
