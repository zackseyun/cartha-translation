id: JER.46.22
reference: Jeremiah 46:22
source:
  edition: WLC
  text: קוֹלָ֖/הּ כַּ/נָּחָ֣שׁ יֵלֵ֑ךְ כִּֽי בְ/חַ֣יִל יֵלֵ֔כוּ וּ/בְ/קַרְדֻּמּוֹת֙
    בָּ֣אוּ לָ֔/הּ כְּ/חֹטְבֵ֖י עֵצִֽים־׃
translation:
  text: Her sound goes like a serpent, for they march with an army and come against
    her with axes, like woodcutters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Her voice goes like a serpent'; the Hebrew noun can mean 'voice,' 'sound,'
      or 'noise.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for they go in force'; the Hebrew חַיִל can denote military force, strength,
      or an army.
    reason: lexical_alternative
  - marker: c
    text: 'Literally ''come to her''; in context the sense is hostile: ''come against
      her.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹלָהּ
  chosen: her sound
  alternatives:
  - her voice
  - her noise
  lexicon: HALOT
  rationale: קוֹל can denote voice, sound, or noise. Here Egypt is personified as
    feminine, and the image is auditory rather than spoken discourse, so 'her sound'
    best preserves the metaphor without over-specifying speech.
- source_word: כַּנָּחָשׁ
  chosen: like a serpent
  alternatives:
  - like a snake
  lexicon: HALOT
  rationale: נָחָשׁ is 'serpent/snake.' 'Serpent' better fits the elevated prophetic
    style while remaining clear in modern English.
- source_word: יֵלֵךְ
  chosen: goes
  alternatives:
  - moves
  - glides
  lexicon: HALOT
  rationale: הלך literally means 'go/walk.' In this simile the subject is 'her sound,'
    so 'goes' is a close rendering that preserves the Hebrew idiom. More interpretive
    options like 'glides' are possible but go beyond the lexical core.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: כִּי introduces the explanation for the serpent-like sound. 'For' preserves
    the causal connection in concise English.
- source_word: בְחַיִל
  chosen: with an army
  alternatives:
  - in force
  - with might
  lexicon: HALOT
  rationale: חַיִל can mean strength, wealth, or army/host. In context of invaders
    approaching with axes, the military sense is most natural, hence 'with an army.'
- source_word: יֵלֵכוּ
  chosen: they march
  alternatives:
  - they go
  - they advance
  lexicon: HALOT
  rationale: הלך again means 'go,' but with a military subject and בְחַיִל, 'march'
    brings out the contextual force without excessive paraphrase.
- source_word: וּבְקַרְדֻּמּוֹת
  chosen: with axes
  alternatives:
  - with hatchets
  lexicon: HALOT
  rationale: קַרְדֹּם denotes an axe. The plural instrumentally describes the attackers'
    equipment. 'Axes' is the standard, natural rendering.
- source_word: בָּאוּ לָהּ
  chosen: come against her
  alternatives:
  - come to her
  - enter her
  lexicon: HALOT
  rationale: בוא plus ל can mean come to/toward, but in this hostile military context
    it carries adversative force. 'Come against her' makes the implied hostility explicit
    from context.
- source_word: כְּחֹטְבֵי עֵצִים
  chosen: like woodcutters
  alternatives:
  - like hewers of wood
  - like cutters of trees
  lexicon: HALOT
  rationale: The participial phrase literally means 'like cutters of wood/trees.'
    'Woodcutters' is idiomatic modern English and preserves the image of felling a
    forest.
