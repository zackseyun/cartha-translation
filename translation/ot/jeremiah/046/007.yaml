id: JER.46.7
reference: Jeremiah 46:7
source:
  edition: WLC
  text: מִי זֶ֖ה כַּ/יְאֹ֣ר יַֽעֲלֶ֑ה כַּ/נְּהָר֕וֹת יִֽתְגָּעֲשׁ֖וּ מֵימָֽי/ו־׃
translation:
  text: Who is this, rising like the Nile, like rivers whose waters surge?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew יְאֹר can mean 'river,' but in this Egyptian context it likely refers
      specifically to the Nile.
    reason: lexical_alternative
  - marker: b
    text: Or 'whose waters roar' / 'whose waters heave.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי זֶה
  chosen: Who is this
  alternatives:
  - Who is this one
  lexicon: HALOT
  rationale: Interrogative מִי with demonstrative זֶה forms a vivid rhetorical question
    introducing the figure to be identified. 'Who is this' is natural English and
    preserves the force.
- source_word: כַּיְאֹר
  chosen: like the Nile
  alternatives:
  - like the river
  - like the Nile River
  lexicon: HALOT
  rationale: יְאֹר in Jeremiah, especially in an Egypt oracle, naturally refers to
    the Nile rather than a generic river. Rendering it 'the Nile' makes the Egyptian
    allusion explicit from the Hebrew context.
- source_word: יַעֲלֶה
  chosen: rising
  alternatives:
  - comes up
  - ascends
  - rises
  lexicon: HALOT
  rationale: עלה means 'go up, rise.' The participial sense in English ('rising')
    fits the poetic present and flows well after the rhetorical question, while preserving
    the image of swelling upward.
- source_word: כַּנְּהָרוֹת
  chosen: like rivers
  alternatives:
  - like streams
  - like the rivers
  lexicon: HALOT
  rationale: נְהָרוֹת is plural and denotes rivers/streams. 'Like rivers' preserves
    the plural comparison without over-specifying.
- source_word: יִתְגָּעֲשׁוּ
  chosen: surge
  alternatives:
  - roar
  - heave
  - toss themselves
  lexicon: HALOT
  rationale: The hitpael of געש conveys turbulent, swelling, surging motion. 'Surge'
    captures the water imagery clearly in modern English; 'roar' is possible but foregrounds
    sound more than motion.
- source_word: מֵימָיו
  chosen: whose waters
  alternatives:
  - its waters
  - his waters
  lexicon: HALOT
  rationale: Literally 'his/its waters.' In English, 'whose waters' smoothly links
    the plural 'rivers' with the following verb. Because the imagery is personified
    and collective, 'whose' is idiomatic and preserves the poetic effect.
