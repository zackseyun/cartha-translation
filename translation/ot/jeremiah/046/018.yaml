id: JER.46.18
reference: Jeremiah 46:18
source:
  edition: WLC
  text: חַי אָ֨נִי֙ נְאֻם הַ/מֶּ֔לֶךְ יְהוָ֥ה צְבָא֖וֹת שְׁמ֑/וֹ כִּ֚י כְּ/תָב֣וֹר בֶּֽ/הָרִ֔ים וּ/כְ/כַרְמֶ֖ל בַּ/יָּ֥ם יָבֽוֹא־־׃
translation:
  text: As I live, declares the King, whose name is Yahweh of Armies, surely as Tabor among the mountains and as Carmel by the sea, so he will come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the LORD of Hosts.'
    reason: lexical_alternative
  - marker: b
    text: The implied subject of 'will come' is not stated in Hebrew; context points to the coming conqueror announced in the surrounding verses.
    reason: cross_reference
lexical_decisions:
- source_word: חַי אָ֨נִי
  chosen: As I live
  alternatives:
  - Surely as I live
  - By my life
  lexicon: HALOT
  rationale: Idiomatic oath formula introducing a solemn divine declaration. 'As I live' is natural English and preserves the force of the self-oath.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: Standard prophetic speech marker. 'Declares' is readable modern English and fits optimal equivalence better than the more wooden 'oracle of'.
- source_word: הַמֶּלֶךְ
  chosen: the King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: With the article and in apposition to the divine name, the title is best rendered as a formal title, capitalized in English because it refers to God.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than transliterated; 'of Armies' preserves the martial sense more transparently for modern readers than traditional 'of Hosts'.
- source_word: שְׁמוֹ
  chosen: whose name is
  alternatives:
  - is his name
  lexicon: HALOT
  rationale: 'English relative construction is smoother while preserving the identificational force: the King is the one whose name is the LORD of Armies.'
- source_word: כִּי
  chosen: surely
  alternatives:
  - for
  - indeed
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of the oath with asseverative force rather than a causal clause. 'Surely' best conveys the emphatic certainty.
- source_word: כְּתָבוֹר
  chosen: like Tabor
  alternatives:
  - as Tabor
  lexicon: HALOT
  rationale: 'Proper name of Mount Tabor, transliterated per philosophy for names. The prefixed כ is comparative: ''like Tabor.'''
- source_word: בֶּהָרִים
  chosen: among the mountains
  alternatives:
  - in the mountains
  - among the hills
  lexicon: HALOT
  rationale: The phrase highlights Tabor's prominence within the mountain landscape. 'Among the mountains' communicates comparative setting clearly.
- source_word: וּכְכַרְמֶל בַּיָּם
  chosen: and like Carmel by the sea
  alternatives:
  - and like Carmel at the sea
  - and like Carmel by the Sea
  lexicon: HALOT
  rationale: Reference is to Mount Carmel near the Mediterranean. 'By the sea' is idiomatic and preserves the geographical image.
- source_word: יָבֹוא
  chosen: one will come
  alternatives:
  - he will come
  - it will come
  lexicon: HALOT
  rationale: The Hebrew verb is 3ms with an implicit subject. In context (judgment on Egypt via an invader, likely the king of Babylon from the previous verse), English needs an explicit but non-overly specific subject. 'One will come' preserves the indefiniteness better than supplying 'he' without antecedent in the verse itself.
