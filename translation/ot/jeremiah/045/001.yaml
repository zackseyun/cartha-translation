id: JER.45.1
reference: Jeremiah 45:1
source:
  edition: WLC
  text: הַ/דָּבָ֗ר אֲשֶׁ֤ר דִּבֶּר֙ יִרְמְיָ֣הוּ הַ/נָּבִ֔יא אֶל בָּר֖וּךְ בֶּֽן נֵֽרִיָּ֑ה
    בְּ/כָתְב/וֹ֩ אֶת הַ/דְּבָרִ֨ים הָ/אֵ֤לֶּה עַל סֵ֨פֶר֙ מִ/פִּ֣י יִרְמְיָ֔הוּ בַּ/שָּׁנָה֙
    הָֽ/רְבִעִ֔ית לִ/יהוֹיָקִ֧ים בֶּן יֹאשִׁיָּ֛הוּ מֶ֥לֶךְ יְהוּדָ֖ה לֵ/אמֹֽר־־־־־׃ס
translation:
  text: 'The word that Jeremiah the prophet spoke to Baruch son of Neriah, when he
    wrote these words in a scroll from the mouth of Jeremiah, in the fourth year of
    Jehoiakim son of Josiah, king of Judah, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'at Jeremiah’s dictation'; literally, 'from the mouth of Jeremiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  chosen: The word
  alternatives:
  - The message
  - This is the word
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word, matter, message.' In prophetic superscriptions,
    'the word' is a standard and natural rendering that preserves the formal prophetic
    register without unnecessary paraphrase.
- source_word: דִּבֶּר
  chosen: spoke
  alternatives:
  - said
  lexicon: HALOT
  rationale: The verb דבר is the ordinary verb 'to speak.' 'Spoke' fits the narrative
    introduction and pairs naturally with the following indirect object.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: A straightforward title identifying Jeremiah's office; translated rather
    than transliterated in keeping with the philosophy of translating titles.
- source_word: בְּכָתְבוֹ
  chosen: when he wrote
  alternatives:
  - in his writing
  - as he wrote
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct with pronominal suffix is
    temporal here. 'When he wrote' gives clear English sense while preserving the
    temporal relation. The subject of the suffix is Baruch from context.
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - these messages
  lexicon: HALOT
  rationale: Although דְּבָרִים can mean 'things' or 'matters,' in the immediate context
    of dictation and writing, 'words' best reflects the textual/literary sense.
- source_word: עַל־סֵפֶר
  chosen: in a scroll
  alternatives:
  - on a scroll
  - in a book
  lexicon: HALOT
  rationale: סֵפֶר here denotes a written document, likely a scroll. English idiom
    prefers 'in a scroll' for content written within such a document, though 'on a
    scroll' is possible. 'Book' would be anachronistically misleading for many readers.
- source_word: מִפִּי יִרְמְיָהוּ
  chosen: from the mouth of Jeremiah
  alternatives:
  - at Jeremiah's dictation
  - from Jeremiah
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'from the mouth of Jeremiah,' indicating
    oral dictation. Retaining the idiom in the main text preserves the source texture;
    a footnote can clarify the sense as dictation.
- source_word: בַּשָּׁנָה הָרְבִעִית
  chosen: in the fourth year
  lexicon: HALOT
  rationale: Standard temporal dating formula; translated directly.
- source_word: לִיהוֹיָקִים
  chosen: of Jehoiakim
  lexicon: HALOT
  rationale: The prefixed ל in regnal dating formulas marks the reigning king; idiomatic
    English renders this as 'of Jehoiakim.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard introductory formula to the following speech. 'Saying' preserves
    the formal structure and anticipates the quoted oracle in the next verse.
