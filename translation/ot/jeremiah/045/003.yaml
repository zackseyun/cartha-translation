id: JER.45.3
reference: Jeremiah 45:3
source:
  edition: WLC
  text: אָמַ֨רְתָּ֙ אֽוֹי נָ֣א לִ֔/י כִּֽי יָסַ֧ף יְהוָ֛ה יָג֖וֹן עַל מַכְאֹבִ֑/י יָגַ֨עְתִּי֙ בְּ/אַנְחָתִ֔/י וּ/מְנוּחָ֖ה לֹ֥א מָצָֽאתִי־־־׃ס
translation:
  text: You said, ‘Woe is me now, for Yahweh has added sorrow to my pain. I am weary with my groaning, and I have found no rest.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Alas for me now'; the Hebrew cry expresses lament and distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַרְתָּ
  chosen: You said
  alternatives:
  - You have said
  lexicon: HALOT
  rationale: Qal perfect 2ms of אמר, introducing Baruch's reported complaint. Simple past fits the narrative context naturally in English.
- source_word: אֽוֹי נָא לִי
  chosen: Woe is me now
  alternatives:
  - Woe to me, please
  - Alas for me now
  lexicon: HALOT
  rationale: אוי is an interjection of lament ('woe/alas'). נָא here intensifies the cry rather than functioning as a polite 'please'; 'now' captures its emotive force idiomatically. לִי gives the personal lament, rendered 'is me' for natural English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the lament; 'for' preserves the explanatory connection concisely.
- source_word: יָסַף
  chosen: has added
  alternatives:
  - has increased
  - added
  lexicon: HALOT
  rationale: Qal perfect of יסף means 'add, increase.' 'Has added' preserves the concrete sense with the resulting burden placed on prior suffering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יָגוֹן
  chosen: sorrow
  alternatives:
  - grief
  - affliction
  lexicon: HALOT
  rationale: Denotes grief/sorrow. 'Sorrow' pairs well with the following 'pain' while preserving the emotional dimension distinct from physical suffering.
- source_word: עַל מַכְאֹבִי
  chosen: to my pain
  alternatives:
  - upon my pain
  - to my suffering
  lexicon: HALOT
  rationale: עַל after יסף conveys addition to an existing condition. 'To my pain' is idiomatic English and preserves the sense of sorrow being added onto prior pain.
- source_word: יָגַעְתִּי
  chosen: I am weary
  alternatives:
  - I have grown weary
  - I am exhausted
  lexicon: HALOT
  rationale: Though formally perfect, the clause expresses Baruch's present state resulting from ongoing distress. 'I am weary' is natural and reflects the stative/resultative sense in context.
- source_word: בְּאַנְחָתִי
  chosen: with my groaning
  alternatives:
  - from my groaning
  - in my sighing
  lexicon: HALOT
  rationale: אַנְחָה denotes groaning/sighing. The preposition ב can be rendered instrumentally or with attendant circumstance; 'with my groaning' communicates weariness accompanied by continual lament.
- source_word: וּמְנוּחָה לֹא מָצָאתִי
  chosen: and I have found no rest
  alternatives:
  - and rest I have not found
  - and I found no relief
  lexicon: HALOT
  rationale: מְנוּחָה is rest/repose. 'Found no rest' is the most direct and idiomatic rendering, preserving the experiential sense of lacking relief.
