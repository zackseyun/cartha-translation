id: JER.45.2
reference: Jeremiah 45:2
source:
  edition: WLC
  text: כֹּֽה אָמַ֥ר יְהוָ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל עָלֶ֖י/ךָ בָּרֽוּךְ־׃
translation:
  text: 'Thus says the LORD, the God of Israel, concerning you, Baruch:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about you'; less likely, 'against you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  - So
  lexicon: HALOT
  rationale: Introduces a prophetic speech formula. 'Thus' preserves the formal prophetic
    register in natural English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: In the standard prophetic messenger formula כֹּה אָמַר, English idiom
    commonly uses the present tense 'Thus says' even though the Hebrew form is qatal,
    because it functions performatively in introducing the oracle.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name YHWH is rendered 'the LORD'
    rather than transliterated.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly; this is the standard covenantal
    title and is best preserved in full.
- source_word: עָלֶיךָ
  chosen: concerning you
  alternatives:
  - about you
  - against you
  - to you
  lexicon: HALOT
  rationale: With אמר introducing a message directed with על + person, 'concerning
    you' best reflects the preposition without overcommitting to hostility ('against
    you') or direct address ('to you').
- source_word: בָּרוּךְ
  chosen: Baruch
  lexicon: HALOT
  rationale: Proper name transliterated according to the translation philosophy.
