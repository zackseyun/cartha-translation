id: JER.45.5
reference: Jeremiah 45:5
source:
  edition: WLC
  text: וְ/אַתָּ֛ה תְּבַקֶּשׁ לְ/ךָ֥ גְדֹל֖וֹת אַל תְּבַקֵּ֑שׁ כִּ֡י הִנְ/נִי֩ מֵבִ֨יא
    רָעָ֤ה עַל כָּל בָּשָׂר֙ נְאֻם יְהוָ֔ה וְ/נָתַתִּ֨י לְ/ךָ֤ אֶֽת נַפְשְׁ/ךָ֙ לְ/שָׁלָ֔ל
    עַ֥ל כָּל הַ/מְּקֹמ֖וֹת אֲשֶׁ֥ר תֵּֽלֶךְ שָֽׁם־־־־־־־־׃ס
translation:
  text: And you—are you seeking great things for yourself? Do not seek them, for behold,
    I am bringing disaster on all flesh, declares the LORD. But I will give you your
    life as plunder in every place where you go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all humanity.' The Hebrew literally says 'all flesh,' a biblical idiom
      for all people or all living mortals in view.
    reason: lexical_alternative
  - marker: b
    text: Literally 'I will give you your life as plunder'—an idiom meaning he will
      escape with his life, though losing everything else.
    reason: cultural_note
lexical_decisions:
- source_word: גְדֹלוֹת
  chosen: great things
  alternatives:
  - big things
  - important things
  lexicon: HALOT
  rationale: The feminine plural adjective used substantivally refers broadly to things
    of greatness, status, or ambition. 'Great things' preserves the open-endedness
    and rhetorical force without over-interpreting it as only status or success.
- source_word: אַל תְּבַקֵּשׁ
  chosen: Do not seek them
  alternatives:
  - Do not seek
  - Do not keep seeking
  lexicon: HALOT
  rationale: The prohibition repeats the earlier verb for emphasis. Adding 'them'
    makes the English natural and clearly refers back to 'great things' while preserving
    the imperative force.
- source_word: הִנְנִי מֵבִיא
  chosen: behold, I am bringing
  alternatives:
  - look, I am bringing
  - indeed, I am bringing
  lexicon: HALOT
  rationale: This construction marks imminent divine action. 'Behold' preserves the
    prophetic register and solemnity better than a flatter modern equivalent.
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - calamity
  lexicon: HALOT
  rationale: In this judgment context the term refers to calamity brought in punishment,
    not moral evil in God. 'Disaster' communicates the sense clearly in modern English.
- source_word: כָּל בָּשָׂר
  chosen: all flesh
  alternatives:
  - all humanity
  - everyone
  lexicon: HALOT
  rationale: The Hebrew idiom literally means 'all flesh.' Retaining it preserves
    the biblical texture and the universal scope of the judgment, while remaining
    understandable in English.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is a standard prophetic formula. 'Declares the LORD' is idiomatic,
    solemn, and consistent with English prophetic style. 'the LORD' follows the project's
    default rendering for יְהוָה.
- source_word: נַפְשְׁךָ
  chosen: your life
  alternatives:
  - your soul
  - your self
  lexicon: HALOT
  rationale: Here נֶפֶשׁ refers to Baruch's life being spared, not specifically the
    immaterial soul. 'Your life' best fits the idiom in context.
- source_word: לְשָׁלָל
  chosen: as plunder
  alternatives:
  - for booty
  - as spoil
  lexicon: HALOT
  rationale: The idiom 'to have one's life as plunder' means escaping with life alone,
    like a survivor carrying off only that. 'As plunder' preserves the metaphor more
    transparently than paraphrasing it away.
- source_word: עַל כָּל הַמְּקֹמוֹת אֲשֶׁר תֵּלֶךְ שָׁם
  chosen: in every place where you go
  alternatives:
  - wherever you go
  - in all the places to which you go
  lexicon: HALOT
  rationale: This expresses comprehensive geographic scope. 'In every place where
    you go' is natural English and preserves the distributive sense better than the
    more idiomatic but slightly looser 'wherever you go'.
- source_word: וְאַתָּה
  chosen: And you—are you seeking
  alternatives:
  - But you, are you seeking
  - And as for you, are you seeking
  lexicon: HALOT
  rationale: The pronoun is fronted for contrast and emphasis. The dash helps convey
    the rhetorical turn toward Baruch personally without adding content not in the
    Hebrew.
