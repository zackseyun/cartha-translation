theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for the Tetragrammaton is 'the LORD,' following the
    doctrine guidelines and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to preserve the idiom 'all flesh' literally
  chosen_reading: all flesh
  alternative_readings:
  - all humanity
  - everyone
  rationale: The phrase is not a doctrinally contested term in the table, but preserving
    the literal idiom maintains the universal scope and biblical diction without obscuring
    meaning.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    preserve theological tension rather than resolve it'
