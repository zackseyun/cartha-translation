  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Scope of הָאָרֶץ
  chosen_reading: the whole land
  alternative_readings:
  - the whole earth
  rationale: Although אֶרֶץ can mean either 'land' or 'earth,' Jeremiah's immediate prophetic context often concerns the land of Judah under judgment. 'Land' better preserves likely contextual scope without making a universal claim the verse does not require.
