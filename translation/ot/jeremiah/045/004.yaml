id: JER.45.4
reference: Jeremiah 45:4
source:
  edition: WLC
  text: כֹּ֣ה תֹּאמַ֣ר אֵלָ֗י/ו כֹּ֚ה אָמַ֣ר יְהוָ֔ה הִנֵּ֤ה אֲשֶׁר בָּנִ֨יתִי֙ אֲנִ֣י הֹרֵ֔ס וְ/אֵ֥ת אֲשֶׁר נָטַ֖עְתִּי אֲנִ֣י נֹתֵ֑שׁ וְ/אֶת כָּל הָ/אָ֖רֶץ הִֽיא׀־־־־׃
translation:
  text: 'This is what you shall say to him: ‘This is what Yahweh says: Behold, what I have built I am tearing down, and what I have planted I am uprooting, that is, the whole land.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole earth.' Hebrew אֶרֶץ can mean either 'land' or 'earth'; here 'land' is preferred because of Jeremiah's immediate context of judgment on Judah.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה תֹּאמַר אֵלָיו
  chosen: This is what you shall say to him
  alternatives:
  - Thus you shall say to him
  - You shall say this to him
  lexicon: HALOT
  rationale: כֹּה introduces direct speech ('thus/this is what'), and the imperfect תֹּאמַר in prophetic instruction is naturally rendered with English future-like obligation, 'shall say.' 'To him' reflects אֵלָיו.
- source_word: כֹּה אָמַר יְהוָה
  chosen: This is what the LORD says
  alternatives:
  - Thus says the LORD
  - This is what the LORD has said
  lexicon: HALOT
  rationale: Prophetic messenger formula. Although אָמַר is formally perfect, English idiom commonly uses present 'says' for an ongoing authoritative declaration. יְהוָה follows the doctrinal default 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: הִנֵּה marks attention and solemn emphasis. 'Behold' preserves the prophetic weight better than the more colloquial 'look' or 'see,' while remaining intelligible in modern English.
- source_word: אֲשֶׁר בָּנִיתִי אֲנִי הֹרֵס
  chosen: what I have built I am tearing down
  alternatives:
  - what I built I am breaking down
  - that which I built I am demolishing
  lexicon: HALOT
  rationale: The relative clause אֲשֶׁר בָּנִיתִי is best rendered idiomatically as 'what I have built.' The participle הֹרֵס conveys present/imminent action, hence 'I am tearing down.' 'Tearing down' fits the building metaphor more naturally than 'destroying' in English.
- source_word: וְאֵת אֲשֶׁר נָטַעְתִּי אֲנִי נֹתֵשׁ
  chosen: and what I have planted I am uprooting
  alternatives:
  - and what I planted I am pulling up
  - and what I have planted I am tearing out
  lexicon: HALOT
  rationale: נָטַע evokes planting imagery; נֹתֵשׁ commonly means to pull up/uproot, especially in Jeremiah's recurring build/plant vs. tear down/uproot motif. 'Uprooting' preserves the agricultural metaphor and intertextual consistency.
- source_word: וְאֶת כָּל הָאָרֶץ הִיא
  chosen: —that is, the whole land
  alternatives:
  - even the whole land
  - and this means the whole land
  - namely, the whole earth
  lexicon: HALOT
  rationale: The clause is elliptical in Hebrew. הִיא likely serves an appositional/emphatic function clarifying the scope of the preceding actions. 'That is, the whole land' makes the ellipsis intelligible in English without over-paraphrasing. הָאָרֶץ in Jeremiah here most naturally refers to the land (likely Judah/the land under judgment) rather than the entire globe, though 'earth' is lexically possible.
