id: JER.3.11
reference: Jeremiah 3:11
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֵלַ֔/י צִדְּקָ֥ה נַפְשָׁ֖/הּ מְשֻׁבָ֣ה יִשְׂרָאֵ֑ל מִ/בֹּגֵדָ֖ה יְהוּדָֽה׃
translation:
  text: And Yahweh said to me, “Faithless Israel has shown herself more righteous than treacherous Judah.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Backsliding Israel has shown herself more righteous than treacherous Judah.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name while matching established English convention.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - declared
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol of אמר is best rendered simply as 'said' in this prose context.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Direct object of speech with first-person suffix; 'to me' is natural modern English.
- source_word: צִדְּקָה נַפְשָׁהּ
  chosen: has shown herself more righteous
  alternatives:
  - has justified herself
  - is more in the right
  lexicon: HALOT
  rationale: 'The idiom literally involves ''her soul/self has been righteous.'' In context of comparison between Israel and Judah, the sense is not absolute moral righteousness but relative vindication: Israel appears more righteous than Judah. ''Has shown herself more righteous'' preserves the reflexive nuance and comparative force in idiomatic English.'
- source_word: מְשֻׁבָה
  chosen: Faithless
  alternatives:
  - Backsliding
  - Apostate
  - Turning-away
  lexicon: HALOT
  rationale: As a substantive/adjectival label for Israel, the term denotes turning away or apostasy. 'Faithless' is readable modern English and fits the relational covenant context better than the archaic 'backsliding,' while still conveying disloyal defection.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard transliteration of the national name/personified kingdom.
- source_word: מִבֹּגֵדָה
  chosen: than treacherous
  alternatives:
  - than unfaithful
  - than traitorous
  lexicon: HALOT
  rationale: With comparative מן, the phrase means 'more righteous than ...'. בגד conveys betrayal/treachery in covenant relationship. 'Treacherous' captures the active betrayal more sharply than the broader 'unfaithful.'
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard transliteration of the southern kingdom, personified as a woman in context.
