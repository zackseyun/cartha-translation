theological_decisions:
- issue: Relative righteousness of Israel versus Judah
  chosen_reading: 'The verse states a comparative judgment: Israel is more righteous relative to Judah, not absolutely righteous.'
  alternative_readings:
  - Israel has justified herself in comparison with Judah
  - Israel is declared righteous over against Judah
  rationale: The Hebrew uses צדק in a comparative setting, contrasting two guilty covenant communities. The translation should preserve the rhetorical shock without implying Israel is morally innocent before God.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
