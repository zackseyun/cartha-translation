id: JER.3.5
reference: Jeremiah 3:5
source:
  edition: WLC
  text: הֲ/יִנְטֹ֣ר לְ/עוֹלָ֔ם אִם יִשְׁמֹ֖ר לָ/נֶ֑צַח הִנֵּ֥ה דברתי וַ/תַּעֲשִׂ֥י
    הָ/רָע֖וֹת וַ/תּוּכָֽל־׃פ
translation:
  text: Will he be angry forever? Will he keep it to the end? Look, you have spoken,
    but you have done the evil things, and you have prevailed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Will he keep anger forever? Will he guard it perpetually?'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew consonants of 'you have spoken' can also be read 'I have spoken';
      the context favors addressing Judah's own words.
    reason: textual_variant
  - marker: c
    text: Or 'and you were able,' with the sense that Judah persisted successfully
      in doing evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיִנְטֹר
  chosen: Will he be angry
  alternatives:
  - Will he keep anger
  - Will he bear a grudge
  lexicon: HALOT
  rationale: נטר in this context refers to retaining anger or resentment. 'Be angry'
    is idiomatic modern English and fits the rhetorical question, while the alternatives
    preserve the more literal imagery of keeping or bearing a grudge.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - perpetually
  lexicon: HALOT
  rationale: עוֹלָם here denotes an indefinite enduring duration. 'Forever' is natural
    modern English and matches the rhetorical force.
- source_word: אִם
  chosen: Will
  alternatives:
  - Or will
  - whether
  lexicon: HALOT
  rationale: In this paired rhetorical structure, אִם introduces the second question.
    English idiom can render it simply with a second 'Will,' though 'Or will' is also
    possible.
- source_word: יִשְׁמֹר
  chosen: keep it
  alternatives:
  - keep anger
  - keep watch
  lexicon: HALOT
  rationale: שׁמר literally means 'keep/guard.' In parallel with נטר and with the
    implied object of anger or resentment, 'keep it' avoids overloading the line while
    preserving the implied object from context.
- source_word: לָנֶצַח
  chosen: to the end
  alternatives:
  - forever
  - perpetually
  lexicon: HALOT
  rationale: נֶצַח can denote enduring continuance. Rendering it as 'to the end' preserves
    the parallelism with 'forever' while avoiding an overly repetitive English line.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention. 'Look' is readable modern
    English without archaic tone.
- source_word: דברתי
  chosen: you have spoken
  alternatives:
  - you said
  - I have spoken
  lexicon: HALOT
  rationale: 'The consonantal form could suggest ''I spoke,'' but the context strongly
    favors the common understanding that Judah is being addressed: ''you said/spoke''—namely,
    the presumptuous words of the previous verse. The chosen rendering follows the
    sense required by the discourse, while the alternative is preserved as a textual/interpretive
    possibility.'
- source_word: וַתַּעֲשִׂי
  chosen: but you have done
  alternatives:
  - and you did
  - then you did
  lexicon: HALOT
  rationale: 'The waw-consecutive advances the accusation. ''But'' brings out the
    adversative sense in context: despite the words spoken, the actions were evil.'
- source_word: הָרָעוֹת
  chosen: the evil things
  alternatives:
  - evil
  - wicked deeds
  lexicon: HALOT
  rationale: The plural noun with article points to concrete acts of evil. 'The evil
    things' is transparent and preserves the plural.
- source_word: וַתּוּכָל
  chosen: and you have prevailed
  alternatives:
  - and you were able
  - and you persisted successfully
  lexicon: HALOT
  rationale: יכל means 'be able, prevail.' In this context it conveys successful persistence
    in evil. 'Have prevailed' captures the force without excessive paraphrase.
