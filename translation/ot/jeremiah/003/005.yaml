theological_decisions:
- issue: Speaker/addressee flow in the accusation clause
  chosen_reading: 'The final clause addresses Judah directly: ''you have spoken ...
    you have done ... you have prevailed.'''
  alternative_readings:
  - Reading דברתי as 'I have spoken' and adjusting the clause accordingly
  rationale: The surrounding context features Judah's speech and YHWH's response.
    The accusatory sequence works best as direct address to Judah, preserving the
    rhetorical contrast between pious words and evil deeds. This is an interpretive-textual
    decision rather than a doctrinal one.
