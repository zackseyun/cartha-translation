id: JER.3.16
reference: Jeremiah 3:16
source:
  edition: WLC
  text: וְ/הָיָ֡ה כִּ֣י תִרְבּוּ֩ וּ/פְרִיתֶ֨ם בָּ/אָ֜רֶץ בַּ/יָּמִ֤ים הָ/הֵ֨מָּה֙
    נְאֻם יְהוָ֔ה לֹא יֹ֣אמְרוּ ע֗וֹד אֲרוֹן֙ בְּרִית יְהוָ֔ה וְ/לֹ֥א יַעֲלֶ֖ה עַל
    לֵ֑ב וְ/לֹ֤א יִזְכְּרוּ ב/וֹ֙ וְ/לֹ֣א יִפְקֹ֔דוּ וְ/לֹ֥א יֵעָשֶׂ֖ה עֽוֹד־־־־־׃
translation:
  text: And it shall be, when you have multiplied and been fruitful in the land in
    those days, declares the LORD, they will no longer say, ‘The ark of the covenant
    of the LORD.’ It will not come to mind, and they will not remember it or miss
    it, nor will it be made again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'or attend to it,' 'or seek it out.' The Hebrew verb can carry several
      related senses; here it likely means they will no longer feel the need for the
      ark or note its absence.
    reason: lexical_alternative
  - marker: b
    text: Or, 'nor will another one be made.' The Hebrew is passive and leaves the
      object implicit; the sense is that no replacement ark will be constructed.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will happen
  - And it will come to pass
  lexicon: HALOT
  rationale: Introduces a future circumstance with prophetic discourse formula. 'And
    it shall be' preserves the formal prophetic cadence without sounding overly archaic.
- source_word: כִּי
  chosen: when
  alternatives:
  - that
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces a temporal clause tied to the following verbs, best
    rendered 'when' in English.
- source_word: תִרְבּוּ
  chosen: you have multiplied
  alternatives:
  - you multiply
  - you become many
  lexicon: HALOT
  rationale: The verb רבה denotes becoming numerous. Rendering with English present
    perfect after 'when' gives natural future-temporal sense in context.
- source_word: וּפְרִיתֶם
  chosen: and been fruitful
  alternatives:
  - and increased
  - and borne fruit
  lexicon: HALOT
  rationale: From פרה, commonly used in the collocation 'be fruitful and multiply.'
    'Been fruitful' preserves the lexical echo and covenantal resonance.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the earth
  - in the country
  lexicon: HALOT
  rationale: In Jeremiah this most naturally refers to the land of Israel/Judah rather
    than the whole earth.
- source_word: בַּיָּמִים הָהֵמָּה
  chosen: in those days
  alternatives:
  - in those times
  lexicon: HALOT
  rationale: Standard prophetic temporal expression; 'in those days' is idiomatic
    and recognizable.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A standard prophetic speech formula. 'Declares the LORD' is clear modern
    English and preserves solemnity.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the doctrinal default for the divine name.
- source_word: לֹא יֹאמְרוּ עוֹד
  chosen: they will no longer say
  alternatives:
  - they will not say anymore
  lexicon: HALOT
  rationale: 'Captures the future negation with עוֹד as cessation: this expression
    will cease to be used.'
- source_word: אֲרוֹן בְּרִית יְהוָה
  chosen: The ark of the covenant of the LORD
  alternatives:
  - The ark of the LORD's covenant
  - The covenant ark of the LORD
  lexicon: HALOT
  rationale: A transparent rendering of the construct chain. Kept as a quoted expression
    because the Hebrew says they will no longer say this phrase.
- source_word: וְלֹא יַעֲלֶה עַל לֵב
  chosen: It will not come to mind
  alternatives:
  - It will not come upon the heart
  - It will not enter the heart
  lexicon: HALOT
  rationale: Hebrew idiom literally 'go up upon the heart,' meaning to come to mind
    or be thought of. Idiomatic English is preferable here.
- source_word: וְלֹא יִזְכְּרוּ בוֹ
  chosen: and they will not remember it
  alternatives:
  - and they will not call it to mind
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the ark. 'Remember it' is the straightforward
    sense.
- source_word: וְלֹא יִפְקֹדוּ
  chosen: or miss it
  alternatives:
  - or attend to it
  - or visit it
  - or care for it
  lexicon: HALOT
  rationale: פקד has a broad semantic range. In this sequence of no longer saying,
    thinking of, or remembering the ark, the sense is best taken as feeling its absence
    / seeking it out, hence 'miss it.' This fits the context of the ark's diminished
    centrality in the promised future.
- source_word: וְלֹא יֵעָשֶׂה עוֹד
  chosen: nor will it be made again
  alternatives:
  - nor will another be made
  - nor will it be done anymore
  lexicon: HALOT
  rationale: 'The Niphal of עשה is passive/reflexive. Given the context of the ark,
    the implied subject is best understood as the ark: no replacement ark will be
    made again.'
