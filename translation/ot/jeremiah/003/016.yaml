theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of the ark's future status
  chosen_reading: The verse states that the ark will no longer function as the focal
    symbol of covenant life, without implying any denial of God's covenant faithfulness.
  alternative_readings:
  - The verse predicts only the ark's physical loss
  - The verse abolishes all prior covenant significance
  rationale: The text lists a series of negations concerning mention, remembrance,
    and remaking of the ark. The translation preserves that concrete emphasis without
    importing a broader theological system beyond what the verse itself states.
