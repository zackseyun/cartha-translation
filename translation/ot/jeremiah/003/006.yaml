theological_decisions:
- issue: Prophetic metaphor of sexual unfaithfulness for idolatry
  chosen_reading: Retain the sexualized metaphor explicitly with 'she prostituted
    herself' rather than flattening it to 'committed idolatry.'
  alternative_readings:
  - there she committed idolatry
  - there she was unfaithful
  rationale: Jeremiah intentionally uses the metaphor of prostitution/adultery to
    portray covenant breach. Preserving the metaphor maintains the theological force
    and literary texture without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §1, §3, §6
