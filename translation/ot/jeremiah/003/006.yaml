id: JER.3.6
reference: Jeremiah 3:6
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר יְהוָ֜ה אֵלַ֗/י בִּ/ימֵי֙ יֹאשִׁיָּ֣הוּ הַ/מֶּ֔לֶךְ הֲֽ/רָאִ֔יתָ
    אֲשֶׁ֥ר עָשְׂתָ֖ה מְשֻׁבָ֣ה יִשְׂרָאֵ֑ל הֹלְכָ֨ה הִ֜יא עַל כָּל הַ֣ר גָּבֹ֗הַּ
    וְ/אֶל תַּ֛חַת כָּל עֵ֥ץ רַעֲנָ֖ן וַ/תִּזְנִי שָֽׁם־־־־־׃
translation:
  text: And the LORD said to me in the days of King Josiah, “Have you seen what faithless
    Israel has done? She went up on every high hill and under every green tree, and
    there she prostituted herself.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'apostate Israel' or 'backsliding Israel.' The Hebrew term denotes turning
      away or covenant unfaithfulness.
    reason: lexical_alternative
  - marker: b
    text: The phrases 'on every high hill' and 'under every green tree' are stock
      descriptions of places associated with illicit worship.
    reason: cultural_note
  - marker: c
    text: Or 'she played the whore there.' The Hebrew uses sexual infidelity as a
      metaphor for Israel's idolatry and covenant unfaithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagint pattern.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during
  lexicon: HALOT
  rationale: The construct phrase with 'days' is a standard temporal expression. 'In
    the days of' preserves the Hebrew idiom while remaining natural English.
- source_word: יֹאשִׁיָּהוּ הַמֶּלֶךְ
  chosen: King Josiah
  alternatives:
  - Josiah the king
  lexicon: HALOT
  rationale: English idiom normally places the royal title before the name. This is
    a stylistic adjustment without loss of meaning.
- source_word: הֲרָאִיתָ
  chosen: Have you seen
  alternatives:
  - Did you see
  - Have you looked at
  lexicon: HALOT
  rationale: The interrogative with the perfect naturally works as a present-relevant
    question in English. 'Have you seen' fits the prophetic discourse context.
- source_word: מְשֻׁבָה יִשְׂרָאֵל
  chosen: faithless Israel
  alternatives:
  - apostate Israel
  - backsliding Israel
  - turning-away Israel
  lexicon: HALOT
  rationale: מְשֻׁבָה denotes turning away, apostasy, or faithlessness. 'Faithless'
    is clear modern English and captures covenant disloyalty without archaic tone.
    'Apostate' is viable but less accessible; 'backsliding' is traditional but ecclesiastical.
- source_word: עָשְׂתָה
  chosen: has done
  alternatives:
  - did
  lexicon: HALOT
  rationale: A present-perfect English form works well after 'Have you seen,' preserving
    the rhetorical force of reviewing Israel's conduct.
- source_word: הֹלְכָה הִיא
  chosen: She went up
  alternatives:
  - She goes
  - She went
  lexicon: HALOT
  rationale: The construction introduces her habitual action in narrative-prophetic
    style. 'Went up' reflects movement to cultic high places and fits the following
    'on every high hill.'
- source_word: עַל כָּל הַר גָּבֹהַּ
  chosen: on every high hill
  alternatives:
  - upon every high mountain
  - to every high hill
  lexicon: HALOT
  rationale: This is a stock expression for illicit worship sites. 'High hill' is
    more natural than 'high mountain' here and preserves the cultic topography.
- source_word: וְאֶל תַּחַת כָּל עֵץ רַעֲנָן
  chosen: and under every green tree
  alternatives:
  - and beneath every leafy tree
  - and under every luxuriant tree
  lexicon: HALOT
  rationale: The phrase is another stock description of idolatrous worship locations.
    'Green tree' is a conventional and sufficiently transparent rendering of רַעֲנָן
    in this context.
- source_word: וַתִּזְנִי
  chosen: she prostituted herself
  alternatives:
  - she played the whore
  - she committed prostitution
  - she committed harlotry
  lexicon: HALOT
  rationale: The verb זנה is the standard prophetic metaphor for covenant unfaithfulness
    expressed as sexual immorality. 'Prostituted herself' communicates the metaphor
    clearly in modern English without archaic phrasing. 'Played the whore' is more
    literal but less suitable for the target register.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in those places
  lexicon: HALOT
  rationale: A simple adverb preserves the Hebrew and points back to the high places
    and trees just mentioned.
