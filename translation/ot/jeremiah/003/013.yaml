id: JER.3.13
reference: Jeremiah 3:13
source:
  edition: WLC
  text: אַ֚ךְ דְּעִ֣י עֲוֺנֵ֔/ךְ כִּ֛י בַּ/יהוָ֥ה אֱלֹהַ֖יִ/ךְ פָּשָׁ֑עַתְּ וַ/תְּפַזְּרִ֨י אֶת דְּרָכַ֜יִ/ךְ לַ/זָּרִ֗ים תַּ֚חַת כָּל עֵ֣ץ רַעֲנָ֔ן וּ/בְ/קוֹלִ֥/י לֹא שְׁמַעְתֶּ֖ם נְאֻם יְהֹוָֽה־־־־׃
translation:
  text: Only acknowledge your guilt, that you have rebelled against Yahweh your God and scattered your ways among strangers under every green tree, and you have not obeyed my voice, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spread your ways to strange gods.' The Hebrew says 'to strangers,' likely within the metaphor of adultery and idolatry, but does not explicitly supply 'gods.'
    reason: alternative_reading
  - marker: b
    text: '''Under every green tree'' is a recurring expression for places of illicit worship.'
    reason: cultural_note
lexical_decisions:
- source_word: אַךְ
  chosen: Only
  alternatives:
  - Surely
  - Only this
  - Indeed
  lexicon: HALOT
  rationale: 'Introduces a limiting or focusing particle. ''Only'' best captures the sense ''just/merely this is required'' in context: the call is to acknowledge guilt.'
- source_word: דְּעִי
  chosen: acknowledge
  alternatives:
  - know
  - recognize
  - admit
  lexicon: HALOT
  rationale: Although the verb is literally 'know,' in this imperative with 'your guilt' it carries the sense of recognizing/admitting guilt. 'Acknowledge' is idiomatic and preserves the confessional force without over-paraphrase.
- source_word: עֲוֺנֵךְ
  chosen: your guilt
  alternatives:
  - your iniquity
  - your wrongdoing
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or guilt-bearing consequence. Here the immediate call is confession, so 'guilt' fits better than the more archaic 'iniquity' while retaining moral weight.
- source_word: פָּשָׁעַתְּ
  chosen: you have rebelled
  alternatives:
  - you transgressed
  - you have been unfaithful
  lexicon: HALOT
  rationale: פשע commonly denotes rebellion or transgression, especially against rightful authority. 'Rebelled' best reflects covenantal defiance against the LORD.
- source_word: בַּיהוָה אֱלֹהַיִךְ
  chosen: against the LORD your God
  alternatives:
  - against Yahweh your God
  lexicon: HALOT
  rationale: The preposition with פשע is adversative here, 'rebel against.' Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: וַתְּפַזְּרִי
  chosen: scattered
  alternatives:
  - spread out
  - dispersed
  - lavished
  lexicon: HALOT
  rationale: The verb literally means to scatter/disperse. In this metaphorical context of illicit religious/sexual wandering, 'scattered' preserves the Hebrew image rather than interpreting too specifically.
- source_word: אֶת דְּרָכַיִךְ
  chosen: your ways
  alternatives:
  - your path
  - your conduct
  lexicon: HALOT
  rationale: '''Ways'' is a common Hebrew idiom for conduct or courses of action. Retaining ''ways'' preserves the metaphor and allows the following phrase to explain its direction.'
- source_word: לַזָּרִים
  chosen: to strangers
  alternatives:
  - to foreigners
  - to strange gods
  lexicon: HALOT
  rationale: The adjective/noun means strangers/foreigners. In context it likely participates in the adultery/idolatry metaphor, but the Hebrew does not explicitly say 'gods,' so 'strangers' preserves the text's imagery without importing an interpretive expansion.
- source_word: תַּחַת כָּל עֵץ רַעֲנָן
  chosen: under every green tree
  alternatives:
  - under every leafy tree
  - beneath every luxuriant tree
  lexicon: HALOT
  rationale: This is a stock expression for illicit worship sites. 'Green tree' is natural enough in English and preserves the recurring prophetic phrase.
- source_word: וּבְקוֹלִי לֹא שְׁמַעְתֶּם
  chosen: and you have not obeyed my voice
  alternatives:
  - and you did not listen to my voice
  - and you have not listened to me
  lexicon: HALOT
  rationale: Hebrew 'hear/listen to a voice' often means obey. 'Obeyed my voice' keeps the covenantal idiom while making the force clear. The shift to 2mp in שְׁמַעְתֶּם is retained by singular/plural-neutral English 'you'.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Declares the LORD' is clear modern English and suitably weighty.
