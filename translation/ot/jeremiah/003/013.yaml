theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make the idolatry reference explicit in לַזָּרִים
  chosen_reading: to strangers
  alternative_readings:
  - to strange gods
  - to foreigners
  rationale: The broader context concerns covenant infidelity and illicit worship, but the Hebrew here says 'strangers,' not explicitly 'gods.' To preserve theological tension and avoid importing a stronger claim than the text states, the main text keeps the metaphorical wording; an explanatory alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
