id: JER.3.25
reference: Jeremiah 3:25
source:
  edition: WLC
  text: נִשְׁכְּבָ֣ה בְּ/בָשְׁתֵּ֗/נוּ וּֽ/תְכַסֵּ/נוּ֮ כְּלִמָּתֵ/נוּ֒ כִּי֩ לַ/יהוָ֨ה אֱלֹהֵ֜י/נוּ חָטָ֗אנוּ אֲנַ֨חְנוּ֙ וַ/אֲבוֹתֵ֔י/נוּ מִ/נְּעוּרֵ֖י/נוּ וְ/עַד הַ/יּ֣וֹם הַ/זֶּ֑ה וְ/לֹ֣א שָׁמַ֔עְנוּ בְּ/ק֖וֹל יְהֹוָ֥ה אֱלֹהֵֽי/נוּ־׃ס
translation:
  text: Let us lie down in our shame, and let our disgrace cover us, for we have sinned against Yahweh our God—we and our fathers—from our youth even to this day, and we have not obeyed the voice of Yahweh our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we and our ancestors.' The Hebrew reads 'we and our fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁכְּבָה
  chosen: Let us lie down
  alternatives:
  - We lie down
  - Let us be laid low
  lexicon: HALOT
  rationale: Qal cohortative 1cp of שׁכב expresses a volitional/jussive sense in this penitential context. 'Let us lie down' preserves the cohortative force and the image of prostration in shame.
- source_word: בְּבָשְׁתֵּנוּ
  chosen: in our shame
  alternatives:
  - in our disgrace
  lexicon: HALOT
  rationale: ב + בֹּשֶׁת denotes the sphere or condition in which they lie down. 'Shame' is the most direct and idiomatic rendering.
- source_word: וּתְכַסֵּנוּ
  chosen: and let ... cover us
  alternatives:
  - and ... covers us
  - and may ... cover us
  lexicon: HALOT
  rationale: Imperfect 3fs with 1cp suffix, with feminine singular subject following ('our disgrace'). In parallel with the preceding cohortative, an English jussive-like 'let ... cover us' best reflects the volitional lament.
- source_word: כְּלִמָּתֵנוּ
  chosen: our disgrace
  alternatives:
  - our humiliation
  - our shame
  lexicon: HALOT
  rationale: כְּלִמָּה overlaps with בֹּשֶׁת but is not identical; 'disgrace' preserves the parallelism without flattening both nouns into the same English word.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the ground for the confession. 'For' fits the formal penitential style and connects naturally to the preceding clauses.
- source_word: לַיהוָה
  chosen: against the LORD
  alternatives:
  - to the LORD
  lexicon: HALOT
  rationale: With חטא, the preposition ל can mark the one against whom the sin is committed. In English, 'sinned against the LORD' expresses the relational offense clearly.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Standard covenantal expression; straightforward possessive rendering.
- source_word: חָטָאנוּ
  chosen: we have sinned
  alternatives:
  - we sinned
  lexicon: HALOT
  rationale: Perfect 1cp in a confessional context is well represented by English present perfect, emphasizing continuing relevance of past guilt.
- source_word: אֲנַחְנוּ וַאֲבוֹתֵינוּ
  chosen: we and our fathers
  alternatives:
  - we and our ancestors
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'fathers.' Per gender-accurate policy, the masculine familial term should be preserved unless context clearly demands a broader rendering.
- source_word: מִנְּעוּרֵינוּ
  chosen: from our youth
  alternatives:
  - since our youth
  lexicon: HALOT
  rationale: Temporal expression indicating the long duration of rebellion beginning in early national life. 'From our youth' is idiomatic and close to the Hebrew.
- source_word: וְעַד הַיּוֹם הַזֶּה
  chosen: even to this day
  alternatives:
  - and until this day
  - to this very day
  lexicon: HALOT
  rationale: Marks continuation up to the present. 'Even to this day' is natural English and preserves the emphatic continuity.
- source_word: וְלֹא שָׁמַעְנוּ בְּקוֹל
  chosen: and we have not obeyed the voice of
  alternatives:
  - and we have not listened to
  - and we have not heeded
  lexicon: HALOT
  rationale: The idiom שׁמע בקול often means more than auditory hearing; it denotes obedient listening. 'Obeyed the voice of' preserves both the idiom and the covenantal nuance.
