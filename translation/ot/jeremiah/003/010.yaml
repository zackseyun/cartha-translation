theological_decisions:
- issue: Covenantal nuance of Judah's 'return'
  chosen_reading: Rendered שׁוּב as 'return to me' with implicit repentance/covenant-restoration
    sense
  alternative_readings:
  - turn back to me
  rationale: The verse concerns Judah's response to divine warning and judgment. 'Return'
    preserves the covenant-relational dimension without importing a fuller doctrinal
    formulation than the text states.
  doctrine_reference: Translation philosophy §1, §3
- issue: Prophetic metaphor of Judah as sister
  chosen_reading: Retained feminine familial imagery explicitly
  alternative_readings:
  - Smoothing away the metaphor into a generic national reference
  rationale: The source text personifies Judah as the sister of the northern kingdom
    in the surrounding context. Preserving the metaphor maintains the prophetic rhetoric
    and theological force of covenant infidelity.
  doctrine_reference: Translation philosophy §5
