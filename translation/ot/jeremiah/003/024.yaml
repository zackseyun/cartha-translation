id: JER.3.24
reference: Jeremiah 3:24
source:
  edition: WLC
  text: וְ/הַ/בֹּ֗שֶׁת אָֽכְלָ֛ה אֶת יְגִ֥יעַ אֲבוֹתֵ֖י/נוּ מִ/נְּעוּרֵ֑י/נוּ אֶת
    צֹאנָ/ם֙ וְ/אֶת בְּקָרָ֔/ם אֶת בְּנֵי/הֶ֖ם וְ/אֶת בְּנוֹתֵי/הֶֽם־־־־־׃
translation:
  text: But shame has devoured the labor of our fathers from our youth—their flocks
    and their herds, their sons and their daughters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the shameful thing," likely a contemptuous reference to Baal or to idolatry.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהַבֹּשֶׁת
  chosen: But shame
  alternatives:
  - And the shame
  - the shameful thing
  lexicon: HALOT
  rationale: The conjunction is rendered adversatively as "But" in context, continuing
    the confession with contrastive force. הַבֹּשֶׁת literally means "the shame,"
    but in Jeremiah it can function as a metonymy for the shameful idol/Baal. Here
    "shame" preserves the Hebrew expression while allowing the personified subject
    of the following verb. The article is not carried over because English idiom prefers
    the abstract noun without it in this construction.
- source_word: אָכְלָה
  chosen: has devoured
  alternatives:
  - has consumed
  - ate up
  lexicon: HALOT
  rationale: The verb אכל is literally "eat," but with possessions as object it idiomatically
    means consume/devour. "Has devoured" preserves the vivid metaphor and fits the
    perfect as a present state resulting from past action in this confessional context.
- source_word: יְגִיעַ
  chosen: the labor
  alternatives:
  - the produce
  - the gain
  - the fruit of the labor
  lexicon: HALOT
  rationale: יְגִיעַ denotes the product or gain of toil. "The labor" is concise and
    natural in English while still allowing the following appositional list to specify
    what that labor produced. "Produce" would narrow the sense too much to crops,
    whereas the list includes livestock and children.
- source_word: אֲבוֹתֵינוּ
  chosen: of our fathers
  alternatives:
  - of our ancestors
  lexicon: HALOT
  rationale: '"Fathers" matches the Hebrew directly and follows the gender-accurate
    policy. "Ancestors" is possible interpretively, but the source is specifically
    masculine plural and need not be neutralized.'
- source_word: מִנְּעוּרֵינוּ
  chosen: from our youth
  alternatives:
  - since our youth
  lexicon: HALOT
  rationale: This temporal phrase indicates duration from early days onward. "From
    our youth" is a close and idiomatic rendering; "since our youth" is also possible,
    but the chosen wording stays nearer the Hebrew preposition.
- source_word: צֹאנָם
  chosen: their flocks
  alternatives:
  - their sheep and goats
  lexicon: HALOT
  rationale: צֹאן is a collective for small livestock, especially sheep and goats.
    "Flocks" is the standard concise rendering and pairs well with "herds" for בקר.
- source_word: בְּקָרָם
  chosen: their herds
  alternatives:
  - their cattle
  lexicon: HALOT
  rationale: בקר refers to larger bovine livestock. "Herds" is natural in parallel
    with "flocks" and avoids sounding overly technical.
- source_word: בְּנֵיהֶם
  chosen: their sons
  alternatives:
  - their children
  lexicon: HALOT
  rationale: The Hebrew specifically says "sons," and the next term adds "daughters."
    Rendering as "children" here would blur the deliberate pair.
- source_word: בְּנוֹתֵיהֶם
  chosen: their daughters
  lexicon: HALOT
  rationale: Direct, specific rendering of the feminine plural counterpart to "sons,"
    preserving the full scope of loss named in the verse.
