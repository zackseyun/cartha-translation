theological_decisions:
- issue: Possible metonymic use of "the shame" for Baal or idolatry
  chosen_reading: Rendered as "shame" in the main text, preserving the Hebrew's personified
    abstraction.
  alternative_readings:
  - Rendered as "the shameful thing" or explicitly "Baal" interpretively
  rationale: Jeremiah elsewhere uses "the shame" as a contemptuous substitute for
    Baal. Here the verse can be understood either as personified shame or as a metonym
    for idolatry/Baal that consumed Israel's wealth. The main text keeps the more
    transparent Hebrew wording without importing the referent into the translation;
    the alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
