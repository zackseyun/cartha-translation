theological_decisions:
- issue: Restoration imagery of Judah and Israel
  chosen_reading: The verse is rendered to emphasize reunification of the divided
    people rather than conquest of one house by the other.
  alternative_readings:
  - 'A more literal but potentially misleading reading: ''the house of Judah will
    go to/upon the house of Israel'''
  rationale: Given the context of restoration in Jeremiah 3 and the following clause
    'they will come together,' the preposition עַל is best understood in a joining/association
    sense. This preserves the prophetic hope of reunited covenant people without importing
    antagonism.
- issue: Gender rendering of אֲבוֹתֵיכֶם
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The source text is grammatically masculine and refers to the patriarchal
    forefathers. Following the translation philosophy's gender-accurate principle,
    the masculine form is retained in the main text, while the broader English alternative
    is preserved in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
