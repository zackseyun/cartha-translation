id: JER.3.18
reference: Jeremiah 3:18
source:
  edition: WLC
  text: בַּ/יָּמִ֣ים הָ/הֵ֔מָּה יֵלְכ֥וּ בֵית יְהוּדָ֖ה עַל בֵּ֣ית יִשְׂרָאֵ֑ל וְ/יָבֹ֤אוּ
    יַחְדָּו֙ מֵ/אֶ֣רֶץ צָפ֔וֹן עַל הָ/אָ֕רֶץ אֲשֶׁ֥ר הִנְחַ֖לְתִּי אֶת אֲבוֹתֵי/כֶֽם־־־־׃
translation:
  text: In those days the house of Judah will walk with the house of Israel, and they
    will come together from the land of the north to the land that I gave as an inheritance
    to your fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the house of Judah will go to the house of Israel.' The Hebrew preposition
      can be rendered more literally, but here likely expresses Judah joining Israel
      in restored unity.
    reason: alternative_reading
  - marker: b
    text: Or 'your ancestors.' The Hebrew reads 'your fathers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵמָּה
  chosen: In those days
  alternatives:
  - In those times
  lexicon: HALOT
  rationale: Standard temporal idiom introducing a future restoration period; 'In
    those days' is natural and preserves prophetic register.
- source_word: יֵלְכוּ
  chosen: will walk with
  alternatives:
  - will go to
  - will go along with
  lexicon: HALOT
  rationale: הלך commonly means 'go/walk.' With עַל before 'the house of Israel,'
    the sense is relational movement/alignment. 'Walk with' best captures the idiomatic
    sense of Judah joining Israel without implying hostility or mere destination.
- source_word: בֵית יְהוּדָה
  chosen: the house of Judah
  alternatives:
  - Judah
  lexicon: HALOT
  rationale: Retains the corporate covenantal expression 'house of,' which is significant
    in prophetic discourse.
- source_word: עַל בֵּית יִשְׂרָאֵל
  chosen: with the house of Israel
  alternatives:
  - to the house of Israel
  - alongside the house of Israel
  lexicon: HALOT
  rationale: Although עַל often means 'upon/on/to,' in this context of reunification
    it likely conveys joining or association. Rendering 'with' communicates the restoration
    of unity between Judah and Israel more clearly in English.
- source_word: וְיָבֹאוּ יַחְדָּו
  chosen: and they will come together
  alternatives:
  - and they will come jointly
  - and they will come as one
  lexicon: HALOT
  rationale: יבואו is straightforward future 'they will come'; יחדו adds the sense
    of togetherness. 'Come together' is idiomatic and preserves both elements.
- source_word: מֵאֶרֶץ צָפוֹן
  chosen: from the land of the north
  alternatives:
  - from the north country
  - from the northern land
  lexicon: HALOT
  rationale: Literal enough to preserve the geographic-prophetic motif of return from
    exile, while remaining readable.
- source_word: עַל הָאָרֶץ
  chosen: to the land
  alternatives:
  - upon the land
  - into the land
  lexicon: HALOT
  rationale: Here עַל marks movement toward/onto the destination. English 'to the
    land' is the most natural equivalent.
- source_word: אֲשֶׁר הִנְחַלְתִּי
  chosen: that I gave as an inheritance
  alternatives:
  - that I caused to be inherited
  - that I allotted
  lexicon: HALOT
  rationale: The Hiphil of נחל carries the sense of causing to inherit/allotting as
    a possession. 'Gave as an inheritance' expresses both gift and inheritance dimensions
    clearly.
- source_word: אֶת אֲבוֹתֵיכֶם
  chosen: to your fathers
  alternatives:
  - to your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'your fathers.' Per gender-accurate
    philosophy, the main text preserves this form; a more inclusive alternative is
    worth noting in a footnote because the referent is the forefathers/ancestors of
    the people.
