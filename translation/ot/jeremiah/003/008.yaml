theological_decisions:
- issue: Retention of the marriage/adultery metaphor for covenant unfaithfulness
  chosen_reading: 'Preserve the full marital and legal imagery: adultery, sent away,
    certificate of divorce, prostituted herself'
  alternative_readings:
  - Soften to generalized unfaithfulness or idolatry
  rationale: The Hebrew explicitly uses marital and sexual imagery to depict covenant
    breach. Softening it would reduce the force of the prophetic accusation and obscure
    the legal-divorce metaphor in the verse.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Differentiation between מְשֻׁבָה and בֹּגֵדָה
  chosen_reading: Render them distinctly as 'backsliding' and 'treacherous'
  alternative_readings:
  - Use the same English term such as 'faithless' for both
  rationale: Jeremiah uses different descriptors for Israel and Judah. Preserving
    that distinction respects the source text's rhetoric and avoids flattening the
    contrast.
  doctrine_reference: Translation philosophy §5
