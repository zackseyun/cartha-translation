id: JER.3.8
reference: Jeremiah 3:8
source:
  edition: WLC
  text: וָ/אֵ֗רֶא כִּ֤י עַל כָּל אֹדוֹת֙ אֲשֶׁ֤ר נִֽאֲפָה֙ מְשֻׁבָ֣ה יִשְׂרָאֵ֔ל שִׁלַּחְתִּ֕י/הָ
    וָ/אֶתֵּ֛ן אֶת סֵ֥פֶר כְּרִיתֻתֶ֖י/הָ אֵלֶ֑י/הָ וְ/לֹ֨א יָֽרְאָ֜ה בֹּֽגֵדָ֤ה יְהוּדָה֙
    אֲחוֹתָ֔/הּ וַ/תֵּ֖לֶךְ וַ/תִּ֥זֶן גַּם הִֽיא־־־־׃
translation:
  text: And I saw that because backsliding Israel had committed adultery on every
    such account, I had sent her away and given her a certificate of divorce. Yet
    her treacherous sister Judah did not fear, but she too went and prostituted herself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithless Israel' for 'backsliding Israel.' The Hebrew term emphasizes
      turning away or apostasy.
    reason: lexical_alternative
  - marker: b
    text: Or 'a bill of divorce.' The Hebrew refers to the formal legal document of
      divorce.
    reason: lexical_alternative
  - marker: c
    text: Or 'went and played the prostitute.' The phrase continues the chapter's
      metaphor of covenant unfaithfulness as sexual infidelity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֶא
  chosen: And I saw
  alternatives:
  - And I observed
  - Then I saw
  lexicon: HALOT
  rationale: Straightforward first-person narrative verb from ראה. 'And I saw' preserves
    the prophetic report style and the waw-consecutive sequence.
- source_word: כִּי
  chosen: that because
  alternatives:
  - that
  - because
  lexicon: HALOT
  rationale: 'The clause is syntactically compressed. Rendering with both ''that''
    and ''because'' reflects that the prophet saw the fact and its causal basis together:
    he saw that it was on account of Israel''s adultery that God sent her away.'
- source_word: עַל כָּל אֹדוֹת אֲשֶׁר
  chosen: because ... on every such account
  alternatives:
  - for all the reasons that
  - on account of all that
  - because of all the occasions on which
  lexicon: HALOT
  rationale: אֹדוֹת with עַל is an idiom meaning 'on account of, because of.' The
    following relative clause specifies the grounds. To avoid awkward English while
    preserving the cumulative force of כָּל, the translation expresses both causation
    and comprehensiveness.
- source_word: נִאֲפָה
  chosen: had committed adultery
  alternatives:
  - committed adultery
  - was adulterous
  lexicon: HALOT
  rationale: The marital metaphor is central in Jeremiah 3, so 'committed adultery'
    is preferable to a more generalized 'was unfaithful.' The pluperfect sense fits
    the larger clause in English.
- source_word: מְשֻׁבָה יִשְׂרָאֵל
  chosen: backsliding Israel
  alternatives:
  - faithless Israel
  - apostate Israel
  - turning-away Israel
  lexicon: HALOT
  rationale: מְשֻׁבָה denotes turning away/backsliding. 'Backsliding Israel' preserves
    the metaphor of turning away and matches the prophetic idiom, while remaining
    intelligible in modern English. 'Faithless' is possible but loses the lexical
    link to turning/returning in the chapter.
- source_word: שִׁלַּחְתִּיהָ
  chosen: I had sent her away
  alternatives:
  - I sent her away
  - I dismissed her
  lexicon: HALOT
  rationale: In the marriage-divorce context, 'sent her away' is the standard idiomatic
    rendering and pairs naturally with 'certificate of divorce.'
- source_word: סֵפֶר כְּרִיתֻתֶיהָ
  chosen: a certificate of divorce
  alternatives:
  - a bill of divorce
  - a writ of divorce
  lexicon: HALOT
  rationale: This is the formal divorce document. 'Certificate of divorce' is clear
    modern English and preserves the legal sense without archaic phrasing.
- source_word: אֵלֶיהָ
  chosen: given her
  alternatives:
  - given it to her
  - given to her
  lexicon: HALOT
  rationale: 'The prepositional pronoun is absorbed idiomatically into English verbal
    phrasing: ''given her a certificate of divorce.'''
- source_word: וְלֹא יָרְאָה
  chosen: did not fear
  alternatives:
  - was not afraid
  - did not take warning
  lexicon: HALOT
  rationale: ירא is literally 'fear.' While the sense includes failing to be warned,
    the more literal 'did not fear' preserves the theological and moral weight of
    the verb.
- source_word: בֹּגֵדָה יְהוּדָה
  chosen: treacherous ... Judah
  alternatives:
  - faithless Judah
  - unfaithful Judah
  lexicon: HALOT
  rationale: בגד conveys treachery/dealing deceitfully. 'Treacherous Judah' distinguishes
    this term from מְשֻׁבָה and preserves Jeremiah's deliberate variation in accusation.
- source_word: אֲחוֹתָהּ
  chosen: her ... sister
  alternatives:
  - her sister
  lexicon: HALOT
  rationale: The kinship metaphor is retained because Israel and Judah are personified
    sisters in the prophetic allegory.
- source_word: וַתֵּלֶךְ וַתִּזֶן
  chosen: went and prostituted herself
  alternatives:
  - went and played the prostitute
  - went and committed prostitution
  - went and committed whoredom
  lexicon: HALOT
  rationale: זנה in this prophetic metaphor refers to sexual immorality/idolatrous
    infidelity. 'Prostituted herself' is strong but readable modern English; it preserves
    the sexual metaphor without archaic 'played the whore.'
- source_word: גַּם הִיא
  chosen: she too
  alternatives:
  - also she
  - even she
  lexicon: HALOT
  rationale: 'This compactly conveys the emphatic addition: Judah followed the same
    pattern as Israel.'
