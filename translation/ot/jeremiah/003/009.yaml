theological_decisions:
- issue: Prophetic sexual metaphor for idolatry
  chosen_reading: Retain the adultery/prostitution imagery in the main text as a metaphor
    for covenant unfaithfulness and idolatry.
  alternative_readings:
  - Soften to general unfaithfulness or apostasy without sexual terminology
  rationale: Jeremiah intentionally uses marital and sexual language to portray Judah's
    breach of covenant with the LORD. Softening the imagery would reduce the theological
    force of the passage and go beyond the source text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Implicit reference of 'stone and wood'
  chosen_reading: Leave the materials explicit without inserting 'idols' into the
    main text.
  alternative_readings:
  - with idols of stone and wood
  rationale: The Hebrew names the materials, expecting the reader to infer idols.
    Preserving the metonymy keeps closer to the source while remaining understandable;
    the implication can be noted in a footnote.
  doctrine_reference: Translation philosophy §§1, 5
