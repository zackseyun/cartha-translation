id: JER.3.9
reference: Jeremiah 3:9
source:
  edition: WLC
  text: וְ/הָיָה֙ מִ/קֹּ֣ל זְנוּתָ֔/הּ וַ/תֶּחֱנַ֖ף אֶת הָ/אָ֑רֶץ וַ/תִּנְאַ֥ף אֶת
    הָ/אֶ֖בֶן וְ/אֶת הָ/עֵֽץ־־־׃
translation:
  text: And because her prostitution was taken lightly, she polluted the land and
    committed adultery with stone and wood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of the noise/report of her prostitution.' The Hebrew idiom is
      difficult; the sense may be that her prostitution became so notorious—or so
      trivialized—that it led to the land's defilement.
    reason: lexical_alternative
  - marker: b
    text: '''Stone and wood'' refers to idols made from such materials.'
    reason: cultural_note
lexical_decisions:
- source_word: מִקּוֹל
  chosen: because ... was taken lightly
  alternatives:
  - from the sound of
  - through the report of
  - because of the fame/noise of
  lexicon: HALOT
  rationale: קוֹל literally means 'voice, sound, noise, report.' In the idiom מִקּוֹל
    זְנוּתָהּ, a wooden 'from the sound of her prostitution' is awkward in English.
    The context points to the notoriety or trivialization of her harlotry leading
    to the next actions. 'Because her prostitution was taken lightly' captures the
    causal force in readable English while reflecting a common understanding of the
    idiom.
- source_word: זְנוּתָהּ
  chosen: her prostitution
  alternatives:
  - her whoredom
  - her harlotry
  - her promiscuity
  lexicon: HALOT
  rationale: The noun denotes sexual immorality and, in prophetic usage, covenantal
    unfaithfulness through idolatry. 'Prostitution' is clear modern English and preserves
    the metaphor's force without archaic tone.
- source_word: וַתֶּחֱנַף
  chosen: she polluted
  alternatives:
  - she defiled
  - she profaned
  - she made godless
  lexicon: HALOT
  rationale: The verb חנף can carry senses of being polluted, profane, or godless.
    With 'the land' as object, 'polluted' best fits the concrete result of idolatrous
    unfaithfulness in Jeremiah's land theology.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  lexicon: HALOT
  rationale: In Jeremiah, הארץ commonly refers to the land of Judah/Israel in covenant
    context rather than the whole earth. 'The land' preserves that likely reference.
- source_word: וַתִּנְאַף
  chosen: committed adultery
  alternatives:
  - played the adulteress
  - was adulterous
  lexicon: HALOT
  rationale: The verb נאף is the standard term for adultery. 'Committed adultery'
    is direct and preserves the marital-covenantal metaphor.
- source_word: אֶת־הָאֶבֶן וְאֶת־הָעֵץ
  chosen: with stone and wood
  alternatives:
  - with stone and tree
  - with idols of stone and wood
  lexicon: HALOT
  rationale: Literally 'with the stone and with the wood.' These materials stand metonymically
    for idols. The bare 'stone and wood' preserves the prophetic sharpness and avoids
    adding 'idols' where the Hebrew leaves it implicit.
