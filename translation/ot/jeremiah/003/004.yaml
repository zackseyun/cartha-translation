id: JER.3.4
reference: Jeremiah 3:4
source:
  edition: WLC
  text: הֲ/ל֣וֹא מֵ/עַ֔תָּה קראתי לִ֖/י אָבִ֑/י אַלּ֥וּף נְעֻרַ֖/י אָֽתָּה׃
translation:
  text: Have you not just now called to me, ‘My Father, you are the companion of my
    youth’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'guide of my youth.' The Hebrew אַלּוּף can denote a close associate,
      companion, or leader depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'from now on.' Here the phrase is taken to mean a recent appeal ('just
      now') rather than a future-oriented sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  chosen: Have you not
  alternatives:
  - Did you not
  - Have you not indeed
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Have
    you not' preserves the interrogative force and natural English idiom.
- source_word: מֵעַתָּה
  chosen: just now
  alternatives:
  - from now on
  - now
  - lately
  lexicon: HALOT
  rationale: In this context the phrase points to the recentness of Judah's appeal
    rather than a future sense ('from now on'). 'Just now' captures the temporal nuance
    of a newly made plea.
- source_word: קראתי
  chosen: called
  alternatives:
  - cried
  - proclaimed
  lexicon: HALOT
  rationale: The Qal perfect 2fs here is best understood as 'you called' in direct
    address to personified Judah/Israel. 'Called' fits the idiom with לִי ('to me').
- source_word: לִי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Marks the indirect object of the appeal; straightforwardly rendered 'to
    me' in modern English.
- source_word: אָבִי
  chosen: My Father
  alternatives:
  - Father of me
  - my father
  lexicon: HALOT
  rationale: A direct form of address to God. Capitalization reflects divine address
    in English style, not a change in meaning.
- source_word: אַלּוּף
  chosen: companion
  alternatives:
  - friend
  - intimate companion
  - guide
  - chief
  lexicon: HALOT
  rationale: In this relational context with 'of my youth,' the term denotes a close
    associate bound from earlier life. 'Companion' best preserves the personal relational
    sense without over-specifying authority. 'Guide' is possible but less likely here.
- source_word: נְעֻרַי
  chosen: of my youth
  alternatives:
  - from my youth
  - of my young years
  lexicon: HALOT
  rationale: Construct phrase modifying אַלּוּף. 'Of my youth' is idiomatic and preserves
    the genitival relation.
- source_word: אָתָּה
  chosen: you are
  alternatives:
  - you
  lexicon: HALOT
  rationale: The independent pronoun is naturally expressed in English as the copular
    clause 'you are' in this verbless predication.
