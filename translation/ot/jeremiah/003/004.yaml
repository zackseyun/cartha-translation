theological_decisions:
- issue: Speaker and addressee in the rhetorical question
  chosen_reading: The verse addresses personified Judah/Israel as a woman and quotes
    her recent appeal to the LORD.
  alternative_readings:
  - The verse could be read less as a sincere prayer and more as an ironic exposure
    of superficial repentance.
  rationale: The feminine verbal form and the surrounding context in Jeremiah 3 support
    personified Judah as the addressee. The translation preserves the quoted appeal
    without deciding whether it is sincere beyond what the context implies.
  doctrine_reference: Preserve theological tension rather than resolve it.
