theological_decisions:
- issue: Prophetic sexual metaphor for idolatry
  chosen_reading: Retain the sexualized imagery in the main text rather than flattening
    it into explicit 'idolatry' language.
  alternative_readings:
  - Interpret the verse directly as idolatry without sexual terminology
  rationale: The Hebrew intentionally uses shocking sexual imagery to portray Judah's
    covenant unfaithfulness. Preserving the metaphor maintains the prophetic rhetoric
    and avoids importing an explanatory gloss into the translation.
  doctrine_reference: Translation philosophy §§1, 3, 6
