id: JER.3.2
reference: Jeremiah 3:2
source:
  edition: WLC
  text: שְׂאִֽי עֵינַ֨יִ/ךְ עַל שְׁפָיִ֜ם וּ/רְאִ֗י אֵיפֹה֙ לֹ֣א שגלת עַל דְּרָכִים֙
    יָשַׁ֣בְתְּ לָ/הֶ֔ם כַּ/עֲרָבִ֖י בַּ/מִּדְבָּ֑ר וַ/תַּחֲנִ֣יפִי אֶ֔רֶץ בִּ/זְנוּתַ֖יִ/ךְ
    וּ/בְ/רָעָתֵֽ/ךְ־־־׃
translation:
  text: 'Lift up your eyes to the bare heights and see: where have you not been violated?
    By the roads you sat waiting for them, like an Arab in the wilderness, and you
    have polluted the land with your prostitution and with your wickedness.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “where have you not been lain with?” The Hebrew uses
      a blunt sexual verb in a metaphor for covenant unfaithfulness.
    reason: lexical_alternative
  - marker: b
    text: “Like an Arab in the wilderness” likely evokes someone lying in wait along
      desert routes, highlighting deliberate, public pursuit rather than ethnicity
      as such.
    reason: cultural_note
lexical_decisions:
- source_word: שְׂאִי
  chosen: Lift up
  alternatives:
  - Raise
  lexicon: HALOT
  rationale: Imperative feminine singular of נשׂא, here idiomatically with 'eyes'
    meaning to raise one's gaze.
- source_word: עֵינַיִךְ
  chosen: your eyes
  lexicon: HALOT
  rationale: Direct object of the imperative; literal body-part expression retained
    in English.
- source_word: שְׁפָיִם
  chosen: the bare heights
  alternatives:
  - the high places
  - the barren heights
  lexicon: HALOT
  rationale: Refers to treeless/bare hilltops, often associated with illicit worship
    in prophetic literature. 'Bare heights' preserves both topography and the allusive
    setting better than the more interpretive 'high places.'
- source_word: וּרְאִי
  chosen: and see
  alternatives:
  - and look
  lexicon: HALOT
  rationale: Simple imperative of ראה; 'see' fits the rhetorical challenge.
- source_word: אֵיפֹה
  chosen: where
  alternatives:
  - in what place
  lexicon: HALOT
  rationale: Interrogative adverb introducing the rhetorical question.
- source_word: שגלת
  chosen: been violated
  alternatives:
  - been lain with
  - been ravished
  - committed fornication
  lexicon: HALOT
  rationale: The verb שׁגל is a coarse sexual term. In this prophetic metaphor it
    depicts sexual defilement in shocking language. 'Been violated' preserves the
    degrading force without sounding either clinical or euphemistic. Because the context
    is metaphorical for idolatrous unfaithfulness, a more literal sexual alternative
    is preserved in a footnote.
- source_word: עַל דְּרָכִים
  chosen: By the roads
  alternatives:
  - Along the roads
  - At the roadsides
  lexicon: HALOT
  rationale: Preposition plus plural noun indicates location beside travel routes,
    evoking public solicitation.
- source_word: יָשַׁבְתְּ לָהֶם
  chosen: you sat waiting for them
  alternatives:
  - you sat for them
  - you sat down for them
  lexicon: HALOT
  rationale: The dative pronoun indicates waiting for or presenting oneself to them;
    English requires the implied sense to be made explicit.
- source_word: כַּעֲרָבִי בַּמִּדְבָּר
  chosen: like an Arab in the wilderness
  alternatives:
  - like a nomad in the desert
  lexicon: HALOT
  rationale: ערבי most naturally refers to an Arab/desert-dweller. The simile likely
    evokes an ambusher or watchful waylayer in the desert. 'Arab' is the plain lexical
    sense; the cultural nuance is clarified in a footnote rather than replaced in
    the main text.
- source_word: וַתַּחֲנִיפִי אֶרֶץ
  chosen: and you have polluted the land
  alternatives:
  - and you have profaned the land
  - and you have defiled the land
  lexicon: HALOT
  rationale: חנף in the Hiphil can mean to pollute/profane morally. 'Polluted' fits
    the prophetic theme of land defilement through covenant unfaithfulness.
- source_word: בִּזְנוּתַיִךְ
  chosen: with your prostitution
  alternatives:
  - with your whoredom
  - with your fornications
  lexicon: HALOT
  rationale: זנות often functions literally and metaphorically for sexual immorality/idolatry.
    'Prostitution' is vivid, contemporary, and preserves the metaphor's force.
- source_word: וּבְרָעָתֵךְ
  chosen: and with your wickedness
  alternatives:
  - and with your evil
  lexicon: HALOT
  rationale: רעה here is broad moral evil accompanying the prostitution metaphor;
    'wickedness' gives suitable moral weight.
