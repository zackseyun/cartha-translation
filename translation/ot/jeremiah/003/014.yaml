theological_decisions:
- issue: Whether to foreground the marital nuance of בָּעַלְתִּי in the main text
  chosen_reading: Render as 'I am your master' in the main text and preserve 'I am your husband / I have married you' in a footnote
  alternative_readings:
  - I am your husband
  - I have married you
  rationale: The Hebrew verb intentionally carries overlapped senses of lordship and marriage. Because the immediate address is 'sons,' the marital image is less natural if made explicit in English main text, while the broader chapter does use marriage imagery for Israel/Judah. To preserve theological tension rather than over-resolve it, the authority sense is used in the text and the marital sense is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Gender-accurate over gender-neutral'
