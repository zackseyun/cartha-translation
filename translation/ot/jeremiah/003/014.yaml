id: JER.3.14
reference: Jeremiah 3:14
source:
  edition: WLC
  text: שׁ֣וּבוּ בָנִ֤ים שׁוֹבָבִים֙ נְאֻם יְהוָ֔ה כִּ֥י אָנֹכִ֖י בָּעַ֣לְתִּי בָ/כֶ֑ם וְ/לָקַחְתִּ֨י אֶתְ/כֶ֜ם אֶחָ֣ד מֵ/עִ֗יר וּ/שְׁנַ֨יִם֙ מִ/מִּשְׁפָּחָ֔ה וְ/הֵבֵאתִ֥י אֶתְ/כֶ֖ם צִיּֽוֹן־׃
translation:
  text: Return, O faithless children, declares Yahweh, for I am your master; and I will take you, one from a city and two from a clan, and I will bring you to Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for I am your husband,' or 'for I have married you.' The Hebrew verb can express both lordship and marital relationship.
    reason: alternative_reading
lexical_decisions:
- source_word: שׁוּבוּ
  chosen: Return
  alternatives:
  - Turn back
  - Repent
  lexicon: HALOT
  rationale: Qal imperative plural of שוב, here a summons to come back to the LORD/covenant relationship. 'Return' preserves the relational and spatial metaphor better than the more interpretive 'repent.'
- source_word: בָנִים שׁוֹבָבִים
  chosen: faithless sons
  alternatives:
  - backsliding children
  - wayward sons
  - apostate sons
  lexicon: HALOT
  rationale: בָנִים is literally 'sons,' and the doctrine calls for gender-accurate rendering rather than flattening to 'children.' שׁוֹבָבִים denotes turning away, waywardness, or faithlessness. 'Faithless sons' is idiomatic and preserves the covenantal disloyalty in context.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is natural modern English and preserves the solemn prophetic force. יְהוָה follows the doctrinal default 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כִּי אָנֹכִי בָּעַלְתִּי בָכֶם
  chosen: for I am your master
  alternatives:
  - for I have married you
  - for I am your husband
  - for I am lord over you
  lexicon: HALOT
  rationale: The verb בעל can denote being lord/master over someone and can also carry marital nuance ('marry,' 'be husband to'). In this context, where the addressees are masculine plural 'sons,' a strictly marital rendering in the main text can sound awkward in English. 'I am your master' preserves the covenantal authority claim and the wordplay with בעל, while a marital alternative is important enough to preserve in a footnote.
- source_word: וְלָקַחְתִּי אֶתְכֶם
  chosen: and I will take you
  alternatives:
  - and I will receive you
  lexicon: HALOT
  rationale: Simple future/consecutive sense of לקח. 'Take you' fits the gathering/restoration imagery that follows.
- source_word: אֶחָד מֵעִיר וּשְׁנַיִם מִמִּשְׁפָּחָה
  chosen: one from a city and two from a clan
  alternatives:
  - one from a town and two from a family
  - one from each city and two from each family
  lexicon: HALOT
  rationale: The phrase is distributive but not explicitly marked with 'each.' 'City' is straightforward for עִיר. מִשְׁפָּחָה in Jeremiah often means a kinship group or clan rather than a nuclear family, so 'clan' better captures the social unit.
- source_word: וְהֵבֵאתִי אֶתְכֶם צִיּוֹן
  chosen: and I will bring you to Zion
  alternatives:
  - and I will bring you into Zion
  lexicon: HALOT
  rationale: ביא with object plus destination is naturally 'bring ... to.' 'Zion' is retained as the established place-name with theological resonance.
