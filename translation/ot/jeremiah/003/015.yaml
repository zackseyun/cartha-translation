id: JER.3.15
reference: Jeremiah 3:15
source:
  edition: WLC
  text: וְ/נָתַתִּ֥י לָ/כֶ֛ם רֹעִ֖ים כְּ/לִבִּ֑/י וְ/רָע֥וּ אֶתְ/כֶ֖ם דֵּעָ֥ה וְ/הַשְׂכֵּֽיל׃
translation:
  text: And I will give you shepherds after my own heart, and they will shepherd you
    with knowledge and understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'according to my heart.' The Hebrew expression means in accord with God's
      own will or desire.
    reason: lexical_alternative
  - marker: b
    text: '''Shepherds'' may also be rendered ''pastors,'' but the Hebrew image is
      the broader metaphor of those who tend God''s people.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with knowledge and insight.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will give
  alternatives:
  - And I shall give
  - Then I will give
  lexicon: HALOT
  rationale: Qal perfect 1cs with prefixed conjunction in prophetic discourse functions
    as a future promise. 'And I will give' preserves the simple verbal force and the
    connective.
- source_word: לָכֶם
  chosen: you
  alternatives:
  - to you
  - for you
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object. In idiomatic English, 'give
    you' naturally incorporates 'to you'.
- source_word: רֹעִים
  chosen: shepherds
  alternatives:
  - pastors
  - leaders
  lexicon: HALOT
  rationale: The participial noun from רעה literally means 'shepherds.' 'Pastors'
    is possible by later ecclesial extension, but 'shepherds' better preserves the
    Hebrew metaphor without importing church-office terminology.
- source_word: כְּלִבִּי
  chosen: after my own heart
  alternatives:
  - according to my heart
  - like my heart
  lexicon: HALOT
  rationale: The phrase denotes conformity to God's will/desire. 'After my own heart'
    is a natural English rendering that preserves the relational and evaluative sense
    better than the more wooden 'according to my heart.'
- source_word: וְרָעוּ
  chosen: and they will shepherd
  alternatives:
  - and they will feed
  - and they will tend
  lexicon: HALOT
  rationale: From רעה, the verb can mean shepherd, tend, or feed. Because the subject
    is already 'shepherds,' rendering the verb as 'shepherd' preserves the metaphor
    consistently; 'feed' would narrow the image to one aspect of shepherding.
- source_word: אֶתְכֶם
  chosen: you
  lexicon: HALOT
  rationale: Direct-object marker with 2mp suffix; straightforwardly rendered as 'you.'
- source_word: דֵּעָה
  chosen: knowledge
  alternatives:
  - understanding
  - discernment
  lexicon: HALOT
  rationale: The noun commonly denotes knowledge. Keeping it distinct from the following
    term avoids collapsing the paired concepts.
- source_word: וְהַשְׂכֵּיל
  chosen: and understanding
  alternatives:
  - and insight
  - and skill
  lexicon: HALOT
  rationale: This form expresses the idea of insight/prudent understanding. 'Understanding'
    is clear modern English and pairs well with 'knowledge,' preserving the twofold
    description of wise pastoral care.
