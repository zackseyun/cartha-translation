theological_decisions:
- issue: Nature of the promised leaders
  chosen_reading: shepherds refers to human leaders appointed by God, expressed with
    the shepherd metaphor
  alternative_readings:
  - pastors in a specifically ecclesial sense
  - kings/rulers more narrowly
  rationale: In Jeremiah's context, the promise concerns restored covenant leadership
    generally. Rendering with the literal metaphor avoids importing later church structures
    while leaving the theological image intact.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Force of 'after my own heart'
  chosen_reading: leaders aligned with God's own will and character
  alternative_readings:
  - leaders emotionally beloved by God
  rationale: The Hebrew idiom points to conformity with God's heart/mind rather than
    merely divine affection. The chosen English preserves the idiom while allowing
    readers to infer covenantal alignment.
  doctrine_reference: Translation philosophy §3
