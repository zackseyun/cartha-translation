id: JER.3.3
reference: Jeremiah 3:3
source:
  edition: WLC
  text: וַ/יִּמָּנְע֣וּ רְבִבִ֔ים וּ/מַלְק֖וֹשׁ ל֣וֹא הָיָ֑ה וּ/מֵ֨צַח אִשָּׁ֤ה זוֹנָה֙
    הָ֣יָה לָ֔/ךְ מֵאַ֖נְתְּ הִכָּלֵֽם׃
translation:
  text: Therefore the showers were withheld, and there was no spring rain; yet you
    had the forehead of a prostitute—you refused to be ashamed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the latter rain.' The Hebrew term refers to the late seasonal rain,
      here rendered 'spring rain' for clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמָּנְעוּ
  chosen: were withheld
  alternatives:
  - were restrained
  - were held back
  lexicon: HALOT
  rationale: The Niphal form of מנע here is passive/reflexive, describing the rains
    as being withheld. 'Were withheld' is idiomatic English and fits the judgment
    context.
- source_word: רְבִבִים
  chosen: showers
  alternatives:
  - rain showers
  - abundant rains
  lexicon: HALOT
  rationale: The noun refers to rain showers, likely the heavier rains generally.
    'Showers' is concise and natural in English.
- source_word: מַלְקוֹשׁ
  chosen: spring rain
  alternatives:
  - latter rain
  - late rain
  lexicon: HALOT
  rationale: While 'latter rain' is traditional, 'spring rain' communicates the agricultural-season
    reference more clearly to modern readers without losing meaning.
- source_word: מֵצַח
  chosen: forehead
  alternatives:
  - brow
  lexicon: HALOT
  rationale: The noun literally denotes the forehead. Retaining the concrete image
    preserves the metaphor of shamelessness.
- source_word: אִשָּׁה זוֹנָה
  chosen: a prostitute
  alternatives:
  - a harlot
  - a whore
  lexicon: HALOT
  rationale: The phrase literally means 'a woman, a prostitute.' In English, 'a prostitute'
    is the most natural and readable rendering; 'harlot' is archaic and 'whore' is
    more vulgar than the context requires.
- source_word: הָיָה לָךְ
  chosen: you had
  alternatives:
  - was yours
  - belonged to you
  lexicon: HALOT
  rationale: 'This idiom expresses possession: ''you had the forehead of a prostitute.'''
- source_word: מֵאַנְתְּ
  chosen: you refused
  alternatives:
  - you were unwilling
  lexicon: HALOT
  rationale: The verb מאן regularly conveys refusal or unwillingness. 'You refused'
    is direct and forceful.
- source_word: הִכָּלֵם
  chosen: to be ashamed
  alternatives:
  - to feel shame
  - to be humiliated
  lexicon: HALOT
  rationale: The infinitive of כלם here denotes experiencing shame. 'To be ashamed'
    is the clearest idiomatic rendering in context.
