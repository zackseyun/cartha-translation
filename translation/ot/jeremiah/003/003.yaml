theological_decisions:
- issue: Metaphor of sexual immorality for covenant unfaithfulness
  chosen_reading: Retain the sexualized metaphor directly ('forehead of a prostitute')
    rather than soften it into a generalized statement about stubbornness.
  alternative_readings:
  - You were shameless
  - You were brazen
  rationale: Jeremiah intentionally uses the imagery of prostitution to depict Judah's
    covenant infidelity. Preserving the metaphor maintains the prophetic force and
    theological connection between idolatry and adultery, while still using readable
    modern English.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it.'
