theological_decisions:
- issue: Rendering of the covenant name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gender rendering of בָּנִים
  chosen_reading: sons
  alternative_readings:
  - children
  rationale: The Hebrew is grammatically masculine plural. Per the gender-accurate policy, the translation retains the masculine form rather than flattening it to a neutral term, while recognizing the corporate address to the covenant people.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
