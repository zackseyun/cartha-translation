id: JER.3.22
reference: Jeremiah 3:22
source:
  edition: WLC
  text: שׁ֚וּבוּ בָּנִ֣ים שׁוֹבָבִ֔ים אֶרְפָּ֖ה מְשׁוּבֹֽתֵי/כֶ֑ם הִנְ/נוּ֙ אָתָ֣נוּ לָ֔/ךְ כִּ֥י אַתָּ֖ה יְהֹוָ֥ה אֱלֹהֵֽי/נוּ׃
translation:
  text: Return, O backsliding children; I will heal your backslidings. Behold, we come to you, for you are Yahweh our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'wayward sons' or 'faithless children.' The Hebrew repeats the root idea of turning away and returning.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will heal your apostasies' or 'your turning away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּבוּ
  chosen: Return
  alternatives:
  - Turn back
  - Repent
  lexicon: HALOT
  rationale: Imperative plural of שוב, here a summons to come back to YHWH. 'Return' preserves the covenant-relational sense without narrowing it to inward repentance alone.
- source_word: בָּנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: Masculine plural noun meaning 'sons.' In line with gender-accurate policy, the masculine form is retained rather than neutralized, while still functioning corporately for the people addressed.
- source_word: שׁוֹבָבִים
  chosen: backsliding
  alternatives:
  - faithless
  - wayward
  - apostate
  lexicon: HALOT
  rationale: Adjectival participial form describing those who have turned away. 'Backsliding' keeps the lexical connection with the following noun מְשׁוּבוֹת and preserves the repeated return/turning motif in the verse.
- source_word: אֶרְפָּה
  chosen: I will heal
  alternatives:
  - I will cure
  lexicon: HALOT
  rationale: From רפא, commonly 'heal.' The metaphor is moral-spiritual restoration, but 'heal' preserves the concrete imagery used by the Hebrew.
- source_word: מְשׁוּבֹתֵיכֶם
  chosen: your backslidings
  alternatives:
  - your apostasies
  - your faithlessness
  - your turning away
  lexicon: HALOT
  rationale: Noun from the same root family as שוב/שובב, denoting acts or condition of turning away. 'Backslidings' preserves the wordplay and the plurality in Hebrew.
- source_word: הִנְנוּ
  chosen: Behold
  alternatives:
  - Look
  - Here we are
  lexicon: HALOT
  rationale: Deictic particle with 1cp suffix, introducing the people's response. 'Behold' is slightly elevated but concise and fitting in prophetic discourse; the following clause supplies the content of their response.
- source_word: אָתָנוּ
  chosen: we come
  alternatives:
  - we have come
  lexicon: HALOT
  rationale: Qal perfect 1cp of אתה/אתה in the sense 'to come.' In this responsive context, English present 'we come' is natural and conveys immediate movement toward God.
- source_word: לָךְ
  chosen: to you
  alternatives:
  - unto you
  lexicon: HALOT
  rationale: Preposition plus 2nd person suffix indicating direction toward YHWH.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Construct plural form with 1cp suffix, standard covenantal expression 'our God.'
