theological_decisions:
- issue: Relational metaphor in the comparison clause
  chosen_reading: The verse compares Israel's covenant treachery to a woman's betrayal
    of her companion without explicitly specifying 'husband' in the main text.
  alternative_readings:
  - as a wife betrays her husband
  rationale: Jeremiah 3 uses marital imagery for covenant unfaithfulness, so a marital
    rendering is contextually attractive. However, the Hebrew here uses אִשָּׁה and
    רֵעַ rather than an explicit term for husband. To avoid importing a stronger specification
    than the wording warrants, the main text keeps the broader relational language,
    while preserving the marital alternative in a footnote.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
