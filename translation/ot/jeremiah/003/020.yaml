id: JER.3.20
reference: Jeremiah 3:20
source:
  edition: WLC
  text: אָכֵ֛ן בָּגְדָ֥ה אִשָּׁ֖ה מֵ/רֵעָ֑/הּ כֵּ֣ן בְּגַדְתֶּ֥ם בִּ֛/י בֵּ֥ית יִשְׂרָאֵ֖ל
    נְאֻם יְהוָֽה־׃
translation:
  text: Surely, as a woman betrays her companion, so you have betrayed me, house of
    Israel, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'as a wife betrays her husband.' The Hebrew says literally 'a woman'
      and 'her companion,' but the broader context uses marital imagery for Israel's
      unfaithfulness.
    reason: alternative_reading
lexical_decisions:
- source_word: אָכֵן
  chosen: Surely
  alternatives:
  - Indeed
  - Truly
  lexicon: HALOT
  rationale: Introduces an emphatic assertion. 'Surely' preserves the solemn, emphatic
    force in natural English.
- source_word: בָּגְדָה / בְּגַדְתֶּם
  chosen: betrays / have betrayed
  alternatives:
  - has been unfaithful
  - dealt treacherously
  lexicon: HALOT
  rationale: The verb בגד commonly denotes acting treacherously or unfaithfully, often
    in covenantal or relational contexts. 'Betrays / have betrayed' communicates both
    relational rupture and moral treachery in accessible English. The present in the
    comparison clause gives a proverbial sense, while the perfect addressed to Israel
    is rendered 'have betrayed' to reflect completed action with present relevance.
- source_word: אִשָּׁה
  chosen: a woman
  alternatives:
  - a wife
  lexicon: HALOT
  rationale: The noun can mean either 'woman' or 'wife.' Here the comparison is relational
    but the text does not explicitly mark marital status by a possessive such as 'her
    husband.' 'A woman' is the more textually restrained choice, while the context
    of covenant infidelity allows the relational force to remain clear.
- source_word: מֵרֵעָהּ
  chosen: her companion
  alternatives:
  - her friend
  - her husband
  - her lover
  lexicon: HALOT
  rationale: רֵעַ broadly denotes companion, associate, or friend. 'Her companion'
    preserves the lexical breadth without over-specifying the relationship. 'Her husband'
    would sharpen the marriage metaphor beyond the explicit wording, though that nuance
    is contextually possible.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Marks the comparison between the simile and Israel's conduct. 'So' is
    concise and idiomatic.
- source_word: בִּי
  chosen: me
  alternatives:
  - against me
  lexicon: HALOT
  rationale: With בגד, the preposition can indicate the party against whom treachery
    is committed. English idiom prefers 'betrayed me,' which naturally conveys the
    adversative sense without adding a preposition.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: Retains the covenantal and collective designation of the Hebrew rather
    than flattening it to simply 'Israel.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Declares the LORD' is natural modern English
    and preserves prophetic solemnity. Per doctrine, יְהוָה is rendered 'the LORD'.
