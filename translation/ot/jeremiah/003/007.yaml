id: JER.3.7
reference: Jeremiah 3:7
source:
  edition: WLC
  text: וָ/אֹמַ֗ר אַחֲרֵ֨י עֲשׂוֹתָ֧/הּ אֶת כָּל אֵ֛לֶּה אֵלַ֥/י תָּשׁ֖וּב וְ/לֹא
    שָׁ֑בָה ו/תראה בָּגוֹדָ֥ה אֲחוֹתָ֖/הּ יְהוּדָֽה־־־׃
translation:
  text: And I said, ‘After she had done all these things, she will return to me,’
    but she did not return; and her treacherous sister Judah saw it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “she would return to me.” The Hebrew imperfect can express expected future
      from a past point of view.
    reason: lexical_alternative
  - marker: b
    text: “Return” can also be rendered “turn back” or, in covenant context, “repent.”
    reason: lexical_alternative
  - marker: c
    text: Or “faithless sister Judah.” The Hebrew adjective can emphasize faithlessness
      or treachery.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: And I said
  alternatives:
  - Then I said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the LORD's speech/report in past narrative
    sequence. 'And I said' preserves the simple narrative flow without overinterpreting
    temporal nuance.
- source_word: אַחֲרֵי עֲשׂוֹתָהּ אֶת כָּל אֵלֶּה
  chosen: After she had done all these things
  alternatives:
  - After her doing all these things
  - After she did all these things
  lexicon: HALOT
  rationale: The preposition אַחֲרֵי with infinitive construct + suffix is naturally
    rendered as a temporal clause. English pluperfect ('had done') fits the sequence
    relative to the following expectation.
- source_word: אֵלַי תָּשׁוּב
  chosen: she will return to me
  alternatives:
  - she would return to me
  - she should return to me
  - return to me
  lexicon: HALOT
  rationale: שׁוּב here denotes turning/returning, in context covenantal return to
    the LORD. The imperfect after 'I said' expresses expected future from the speaker's
    past standpoint; 'will return' is idiomatic and preserves the expectation without
    adding explicit repentance language not present in the clause itself.
- source_word: וְלֹא שָׁבָה
  chosen: but she did not return
  alternatives:
  - yet she did not return
  - but she did not turn back
  lexicon: HALOT
  rationale: The contrastive sense is clear in context. Repeating 'return' maintains
    lexical consistency with תָּשׁוּב / שָׁבָה and preserves the covenantal motif
    of return.
- source_word: וַתֵּרֶא
  chosen: and ... saw it
  alternatives:
  - and ... saw
  - and ... looked on
  lexicon: HALOT
  rationale: The verb ראה is straightforwardly 'see.' English supplies 'it' for naturalness
    because the object is implicit from the preceding events; this does not add new
    content but clarifies the referent.
- source_word: בָּגוֹדָה
  chosen: treacherous
  alternatives:
  - faithless
  - unfaithful
  lexicon: HALOT
  rationale: As an adjectival description from בגד, the term conveys betrayal/treachery,
    especially covenantal infidelity. 'Treacherous' better preserves the betrayal
    nuance than the softer 'faithless,' though that remains a viable alternative.
- source_word: אֲחוֹתָהּ יְהוּדָה
  chosen: her ... sister Judah
  alternatives:
  - Judah her sister
  lexicon: HALOT
  rationale: The construct phrase identifies Judah metaphorically as Israel's sister.
    Rendering the kinship term explicitly preserves the prophetic family metaphor.
