theological_decisions:
- issue: Covenantal sense of שׁוּב
  chosen_reading: return
  alternative_readings:
  - turn back
  - repent
  rationale: In Jeremiah, שׁוּב often carries both spatial and covenantal/repentant
    force. 'Return' preserves that theological tension without collapsing it into
    the more interpretive 'repent.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
- issue: Characterization of Judah as בָּגוֹדָה
  chosen_reading: treacherous sister Judah
  alternative_readings:
  - faithless sister Judah
  - unfaithful sister Judah
  rationale: The verse contrasts Israel's failure to return with Judah's observing
    it; the adjective marks covenant betrayal. 'Treacherous' retains the sharper moral-theological
    force of betrayal while remaining natural English.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
