theological_decisions:
- issue: Eschatological portrayal of Jerusalem as 'the throne of the LORD'
  chosen_reading: Retain the imagery directly without interpreting it as merely symbolic, ecclesial, or millennial in the translation itself.
  alternative_readings:
  - A symbolic description of God's rule centered in Jerusalem
  - A literal future enthronement scene
  rationale: The verse presents Jerusalem as the place identified with the LORD's throne in a restoration context. The translation preserves the image and leaves broader eschatological systematization to interpretation, in keeping with the instruction not to import doctrinal claims the text does not make.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of the nations' movement toward Jerusalem
  chosen_reading: Translate as physical/corporate gathering toward Jerusalem without specifying whether this is pilgrimage, conversion, or political submission.
  alternative_readings:
  - Pilgrimage for worship
  - Metaphorical turning of the nations to the LORD
  rationale: The Hebrew supports movement toward Jerusalem in honor of the LORD's name, but does not require a narrower theological explanation. The translation therefore stays at the level of the text.
  doctrine_reference: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.
