id: JER.3.17
reference: Jeremiah 3:17
source:
  edition: WLC
  text: בָּ/עֵ֣ת הַ/הִ֗יא יִקְרְא֤וּ לִ/ירוּשָׁלִַ֨ם֙ כִּסֵּ֣א יְהוָ֔ה וְ/נִקְוּ֨וּ אֵלֶ֧י/הָ כָֽל הַ/גּוֹיִ֛ם לְ/שֵׁ֥ם יְהוָ֖ה לִ/ירוּשָׁלִָ֑ם וְ/לֹא יֵלְכ֣וּ ע֔וֹד אַחֲרֵ֕י שְׁרִר֖וּת לִבָּ֥/ם הָ/רָֽע־־׃ס
translation:
  text: At that time they will call Jerusalem ‘the throne of Yahweh,’ and all the nations will gather to it, to Jerusalem, for the name of Yahweh. They will no longer walk after the stubbornness of their evil heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be gathered to her' or 'will stream to her.' The Hebrew verb here is difficult; in context it describes the nations assembling toward Jerusalem.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the throne of the LORD.' The image identifies Jerusalem as the place of the LORD's royal rule.
    reason: cultural_note
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  chosen: At that time
  alternatives:
  - In that time
  - At that season
  lexicon: HALOT
  rationale: A standard temporal expression introducing a future restoration scene. 'At that time' is idiomatic modern English and preserves the prophetic temporal marker.
- source_word: יִקְרְאוּ לִירוּשָׁלַם כִּסֵּא יְהוָה
  chosen: they will call Jerusalem ‘the throne of the LORD,’
  alternatives:
  - Jerusalem will be called ‘the throne of the LORD’
  - they will proclaim Jerusalem to be the throne of the LORD
  lexicon: HALOT
  rationale: The Hebrew uses an active plural verb ('they will call') with Jerusalem as object. This is retained rather than converting to passive. כִּסֵּא is literally 'throne,' and יְהוָה follows the project default 'the LORD' for the divine name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְנִקְוּוּ אֵלֶיהָ
  chosen: and all the nations will gather to her
  alternatives:
  - and all the nations will be gathered to her
  - and all the nations will stream to her
  lexicon: HALOT
  rationale: The Niphal of קוה here is commonly understood in context as assembling/gathering toward Jerusalem rather than the more common sense 'hope.' 'Gather to her' best fits the parallel with the nations coming to Jerusalem in worship. 'To her' preserves the feminine pronominal reference to Jerusalem.
- source_word: כָל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the Gentiles
  lexicon: HALOT
  rationale: In prophetic literature גּוֹיִם here refers to the nations broadly, not specifically 'Gentiles' in contrast to Jews. 'All the nations' is the natural contextual rendering.
- source_word: לְשֵׁם יְהוָה
  chosen: for the name of the LORD
  alternatives:
  - to the name of the LORD
  - because of the name of the LORD
  lexicon: HALOT
  rationale: The phrase indicates orientation toward or in honor of the LORD's name. 'For the name of the LORD' is concise and preserves the Hebrew preposition without over-interpreting.
- source_word: לִירוּשָׁלָם
  chosen: to Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: The second mention of Jerusalem is retained explicitly in English for clarity and fidelity to the Hebrew repetition.
- source_word: וְלֹא יֵלְכוּ עוֹד אַחֲרֵי
  chosen: They will no longer walk after
  alternatives:
  - They will no longer follow
  - They will no longer go after
  lexicon: HALOT
  rationale: הלך אחרי is a common idiom for following a course or allegiance. 'Walk after' preserves the metaphor; 'no longer' renders עוֹד naturally.
- source_word: שְׁרִרוּת לִבָּם הָרָע
  chosen: the stubbornness of their evil heart
  alternatives:
  - the stubbornness of their wicked heart
  - the hardness of their evil heart
  - the dictates of their evil heart
  lexicon: HALOT
  rationale: שְׁרִרוּת denotes stubbornness or obstinacy. The singular 'heart' is retained because the Hebrew has singular לֵב with plural suffix, a collective idiom. 'Evil' is a straightforward rendering of הָרָע.
