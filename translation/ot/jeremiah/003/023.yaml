id: JER.3.23
reference: Jeremiah 3:23
source:
  edition: WLC
  text: אָכֵ֥ן לַ/שֶּׁ֛קֶר מִ/גְּבָע֖וֹת הָמ֣וֹן הָרִ֑ים אָכֵן֙ בַּ/יהֹוָ֣ה אֱלֹהֵ֔י/נוּ
    תְּשׁוּעַ֖ת יִשְׂרָאֵֽל׃
translation:
  text: Surely, from the hills comes only deception, the tumult on the mountains;
    surely in the LORD our God is the salvation of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the noise on the mountains'; Hebrew 'the tumult of the mountains.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָכֵן
  chosen: Surely
  alternatives:
  - Indeed
  - Truly
  lexicon: HALOT
  rationale: Discourse particle marking emphatic affirmation; 'Surely' fits both occurrences
    and preserves the confessional force of the verse.
- source_word: לַשֶּׁקֶר
  chosen: only deception
  alternatives:
  - for falsehood
  - a lie
  - deceptively
  lexicon: HALOT
  rationale: שֶׁקֶר denotes falsehood/deception. With prefixed ל and the elliptical
    syntax, the phrase expresses that the hoped-for help from the hills proves false.
    'Only deception' makes the predicative sense clear in natural English without
    over-paraphrasing.
- source_word: מִגְּבָעוֹת
  chosen: from the hills
  alternatives:
  - from the high hills
  lexicon: HALOT
  rationale: גְּבָעוֹת are hills/heights, often associated with illicit worship sites
    in Jeremiah. 'From the hills' preserves the source image and the implied source
    of false hope.
- source_word: הָמוֹן הָרִים
  chosen: the tumult on the mountains
  alternatives:
  - the noise on the mountains
  - the throng on the mountains
  - the multitude of mountains
  lexicon: HALOT
  rationale: הָמוֹן commonly means noise, tumult, roar, or crowd. In this context
    of cultic high places, it likely refers to the noisy commotion associated with
    mountain worship rather than simply 'multitude.' 'The tumult on the mountains'
    best captures the likely sense while respecting the compressed Hebrew syntax.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - with the LORD
  - from the LORD
  lexicon: HALOT
  rationale: The preposition ב here expresses location/source of true salvation in
    contrast to the false help from the hills. 'In the LORD' is idiomatic and preserves
    the contrastive structure.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name is rendered 'the LORD' rather
    than transliterated.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward covenantal designation; retained to preserve the confessional
    turn of the verse.
- source_word: תְּשׁוּעַת יִשְׂרָאֵל
  chosen: the salvation of Israel
  alternatives:
  - Israel's salvation
  - deliverance for Israel
  lexicon: HALOT
  rationale: Construct phrase indicating the salvation belonging to or intended for
    Israel. 'The salvation of Israel' is formally close and clear in English.
