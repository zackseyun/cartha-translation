theological_decisions:
- issue: Implied contrast between idolatrous high places and the LORD as the true
    source of deliverance
  chosen_reading: The verse is rendered as a confession that the hills/mountains associated
    with false worship offer only deception, while true salvation is found in the
    LORD.
  alternative_readings:
  - The phrase about the mountains could be taken more woodenly as 'the multitude
    of mountains' without explicit reference to cultic tumult.
  rationale: Jeremiah's broader context repeatedly links hills and mountains with
    apostate worship. The translation preserves that contrast without adding explicit
    interpretive material such as 'idols' or 'high places' not present in the verse
    itself.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension rather than resolve it unnecessarily.'
