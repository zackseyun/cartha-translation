id: JER.3.21
reference: Jeremiah 3:21
source:
  edition: WLC
  text: ק֚וֹל עַל שְׁפָיִ֣ים נִשְׁמָ֔ע בְּכִ֥י תַחֲנוּנֵ֖י בְּנֵ֣י יִשְׂרָאֵ֑ל כִּ֤י הֶעֱוּוּ֙ אֶת דַּרְכָּ֔/ם שָׁכְח֖וּ אֶת יְהֹוָ֥ה אֱלֹהֵי/הֶֽם־־־׃
translation:
  text: A voice is heard on the bare heights, weeping and pleas for mercy from the sons of Israel, because they have made their way crooked; they have forgotten Yahweh their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of Israel' or 'the people of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'have perverted their way' or 'have twisted their path.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'YHWH'; traditionally rendered 'the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: ק֚וֹל
  chosen: A voice
  alternatives:
  - A sound
  - A cry
  lexicon: HALOT
  rationale: קול commonly denotes 'voice' or 'sound.' Here, with the following passive 'is heard' and the content identified as weeping and pleas, 'A voice' preserves the vivid personified introduction better than the flatter 'A sound.'
- source_word: עַל שְׁפָיִים
  chosen: on the bare heights
  alternatives:
  - on the high places
  - upon the barren heights
  lexicon: HALOT
  rationale: שׁפיים refers to bare, treeless heights or hilltops. 'Bare heights' captures both elevation and exposed barrenness. 'High places' could misleadingly evoke cultic sites as a technical term, though that association may be present in context; 'bare heights' stays closer to the lexical sense.
- source_word: נִשְׁמָע
  chosen: is heard
  alternatives:
  - is being heard
  - is audible
  lexicon: HALOT
  rationale: The Niphal of שמע is naturally rendered as a passive, 'is heard.' This is straightforward and idiomatic in English.
- source_word: בְּכִי
  chosen: the weeping
  alternatives:
  - weeping
  - crying
  lexicon: HALOT
  rationale: 'בכי is a noun, ''weeping.'' Adding the article in English helps appositionally identify what the ''voice'' consists of: ''the weeping and pleas for mercy.'''
- source_word: תַחֲנוּנֵי
  chosen: pleas for mercy
  alternatives:
  - supplications
  - pleadings
  lexicon: HALOT
  rationale: תחנונים denotes earnest entreaties for favor or mercy. 'Pleas for mercy' is more accessible than 'supplications' while preserving the penitential force.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the people of Israel
  lexicon: HALOT
  rationale: Per gender-accurate policy, the masculine plural construct is retained as 'sons of Israel.' 'Children of Israel' is traditional and broader, but the source is specifically masculine plural. A footnote preserves the more idiomatic collective alternative.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Here כי introduces the reason for the lament. 'Because' makes the causal force explicit in modern English.
- source_word: הֶעֱוּוּ
  chosen: have made ... crooked
  alternatives:
  - have perverted
  - have twisted
  lexicon: HALOT
  rationale: The Hiphil of עוה conveys making something crooked, twisted, or perverted. Rendering it verbally with the object 'their way' preserves the concrete metaphor. 'Perverted' is possible but can sound more abstract or sexualized in modern English.
- source_word: אֶת דַּרְכָּם
  chosen: their way
  alternatives:
  - their path
  - their conduct
  lexicon: HALOT
  rationale: דרך can mean literal way/path or figurative course of life. 'Their way' preserves the Hebrew metaphor and allows moral sense to emerge from context.
- source_word: שָׁכְחוּ
  chosen: have forgotten
  alternatives:
  - forgot
  lexicon: HALOT
  rationale: The perfect is well represented by English present perfect here, linking past covenantal neglect with present lament.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, YHWH is rendered 'the LORD.' This follows the project's stated default and preserves covenantal resonance in standard English Bible style.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  lexicon: HALOT
  rationale: Straightforward construct with pronominal suffix; 'their God' preserves the covenant relationship that heightens the tragedy of forgetting him.
