- issue: Rendering of the divine name יְהֹוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Gender rendering of בְּנֵי יִשְׂרָאֵל
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the people of Israel
  rationale: The source is grammatically masculine plural. Per the project's gender-accurate policy, the translation retains the masculine form rather than neutralizing it in the main text, while preserving a more idiomatic collective alternative in a footnote.
