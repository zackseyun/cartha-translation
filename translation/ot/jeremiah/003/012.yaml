id: JER.3.12
reference: Jeremiah 3:12
source:
  edition: WLC
  text: הָלֹ֡ךְ וְ/קָֽרָאתָ֩ אֶת הַ/דְּבָרִ֨ים הָ/אֵ֜לֶּה צָפ֗וֹנָ/ה וְ֠/אָמַרְתָּ
    שׁ֣וּבָ/ה מְשֻׁבָ֤ה יִשְׂרָאֵל֙ נְאֻם יְהוָ֔ה לֽוֹא אַפִּ֥יל פָּנַ֖/י בָּ/כֶ֑ם
    כִּֽי חָסִ֤יד אֲנִי֙ נְאֻם יְהוָ֔ה לֹ֥א אֶטּ֖וֹר לְ/עוֹלָֽם־־־־־׃
translation:
  text: 'Go and proclaim these words toward the north, and say: Return, faithless
    Israel, declares the LORD. I will not look on you in anger, for I am faithful,
    declares the LORD; I will not stay angry forever.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'merciful.' The Hebrew term can denote covenant loyalty, kindness, or
      mercy.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלֹךְ
  chosen: Go
  alternatives:
  - Go your way
  - Walk on
  lexicon: HALOT
  rationale: Qal infinitive absolute used imperativally before the finite verb gives
    an urgent command. 'Go' is the most natural concise English rendering.
- source_word: וְקָרָאתָ
  chosen: and proclaim
  alternatives:
  - and call out
  - and cry out
  lexicon: HALOT
  rationale: קרא in prophetic contexts often means to proclaim publicly rather than
    merely to call. 'Proclaim' fits the commissioning tone.
- source_word: אֶת־הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - this message
  - these things
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the concrete wording of the Hebrew
    while remaining natural English.
- source_word: צָפוֹנָה
  chosen: toward the north
  alternatives:
  - northward
  - to the north
  lexicon: HALOT
  rationale: Directional adverb with he locale. 'Toward the north' preserves the directional
    force, likely pointing toward the region of exiled Israel.
- source_word: שׁוּבָה
  chosen: Return
  alternatives:
  - Turn back
  - Come back
  lexicon: HALOT
  rationale: שוב in covenantal/prophetic summons commonly carries the sense of returning
    to the LORD. 'Return' preserves both spatial and relational resonance.
- source_word: מְשֻׁבָה
  chosen: faithless
  alternatives:
  - backsliding
  - apostate
  - wayward
  lexicon: HALOT
  rationale: The noun denotes apostasy/backsliding. In direct address modifying Israel,
    'faithless' is idiomatic modern English and captures covenant disloyalty better
    than the archaic-sounding 'backsliding.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is natural English and
    preserves the solemn prophetic force. 'the LORD' follows the doctrinal default
    for YHWH.
- source_word: לֹא אַפִּיל פָּנַי בָּכֶם
  chosen: I will not look on you in anger
  alternatives:
  - I will not let my face fall against you
  - I will not set my face against you
  - I will not frown on you
  lexicon: HALOT
  rationale: Literally 'I will not cause my face to fall upon/against you.' The idiom
    conveys an angry or hostile countenance. 'Look on you in anger' communicates the
    sense clearly in modern English without over-literal obscurity.
- source_word: חָסִיד אֲנִי
  chosen: for I am faithful
  alternatives:
  - for I am merciful
  - for I am loyal
  - for I am kind
  lexicon: HALOT
  rationale: חסיד here describes the LORD's covenant character. 'Faithful' foregrounds
    covenant loyalty; 'merciful' is possible but less directly tied to חסד-cognate
    semantics of loyal love.
- source_word: לֹא אֶטּוֹר לְעוֹלָם
  chosen: I will not stay angry forever
  alternatives:
  - I will not keep watch forever
  - I will not bear a grudge forever
  - I will not be wrathful forever
  lexicon: HALOT
  rationale: נטר in this idiom means to keep anger/resentment, as in 'keep wrath'
    or 'bear a grudge.' 'Stay angry forever' is clear, idiomatic, and contextually
    precise.
