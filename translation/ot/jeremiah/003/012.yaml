theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Nuance of חָסִיד applied to the LORD
  chosen_reading: faithful
  alternative_readings:
  - merciful
  - steadfast in love
  - loyal
  rationale: The verse grounds Israel's return in the LORD's covenant character. 'Faithful'
    best preserves the sense of covenant loyalty without importing a narrower emotional
    nuance. Because 'merciful' is a viable alternative in context, it is preserved
    in a footnote.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve
    it
