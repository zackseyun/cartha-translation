id: JER.3.19
reference: Jeremiah 3:19
source:
  edition: WLC
  text: וְ/אָנֹכִ֣י אָמַ֗רְתִּי אֵ֚יךְ אֲשִׁיתֵ֣/ךְ בַּ/בָּנִ֔ים וְ/אֶתֶּן לָ/ךְ֙
    אֶ֣רֶץ חֶמְדָּ֔ה נַחֲלַ֥ת צְבִ֖י צִבְא֣וֹת גּוֹיִ֑ם וָ/אֹמַ֗ר אָבִ/י֙ תקראו לִ֔/י
    וּ/מֵ/אַחֲרַ֖/י לֹ֥א תשובו־־׃
translation:
  text: And I said, ‘How I would set you among the sons and give you a desirable land,
    the most beautiful inheritance of the nations’ armies.’ And I said, ‘You will
    call me, “My Father,” and you will not turn away from following me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more broadly, 'among the children'; Hebrew literally 'among the sons.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew phrase here is difficult; it may mean 'the most splendid heritage
      of the nations' or 'a glorious inheritance among the nations.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֵיךְ
  chosen: How I would
  alternatives:
  - How could I
  - How should I
  lexicon: HALOT
  rationale: Introduces a deliberative/exclamatory question or reflection. In context,
    God is recalling his intention for Israel, so 'How I would...' captures the reflective
    force without making it purely rhetorical.
- source_word: אֲשִׁיתֵךְ בַּבָּנִים
  chosen: set you among the sons
  alternatives:
  - place you among the children
  - make you as sons
  - set you among my children
  lexicon: HALOT
  rationale: The verb שׁית means 'set/place.' The phrase literally places the addressee
    'among the sons.' Because the suffix on the verb is feminine singular while the
    following noun is masculine plural, the image is of faithless Israel/Judah being
    granted filial standing. 'Sons' preserves the gendered Hebrew form per the gender-accurate
    policy; 'children' is possible but less precise.
- source_word: אֶרֶץ חֶמְדָּה
  chosen: a desirable land
  alternatives:
  - a pleasant land
  - a delightful land
  - a beautiful land
  lexicon: HALOT
  rationale: חמדה denotes desirability, delight, preciousness. 'Desirable land' is
    slightly more formal but preserves the semantic range and echoes covenant-land
    language.
- source_word: נַחֲלַת צְבִי צִבְאוֹת גּוֹיִם
  chosen: the most beautiful inheritance of the nations’ armies
  alternatives:
  - a glorious inheritance among the nations
  - the most splendid heritage of the nations
  - the beauty of the hosts of nations
  lexicon: HALOT
  rationale: This compressed phrase is difficult. נַחֲלַת is 'inheritance/heritage';
    צְבִי often means 'beauty, glory, splendor'; צִבְאוֹת can mean 'hosts/armies';
    גּוֹיִם is 'nations.' The chosen rendering stays close to the lexical components,
    though the Hebrew likely functions idiomatically to describe an exceptionally
    glorious inheritance among the nations. Because the phrase is textually and syntactically
    difficult, an alternative is preserved in a footnote.
- source_word: אָבִי תקראו לי
  chosen: You will call me, “My Father,”
  alternatives:
  - You shall call me, 'My Father,'
  - You will call to me, 'My Father,'
  lexicon: HALOT
  rationale: 'קרא with ל can mean ''call to'' or ''call.'' In this filial context,
    direct address is most natural: Israel is expected to address God as Father. Future
    ''will'' fits the sequence of divine intention.'
- source_word: וּמֵאַחֲרַי לֹא תשובו
  chosen: and you will not turn away from following me
  alternatives:
  - and you will not turn back from me
  - and from after me you will not turn
  lexicon: HALOT
  rationale: The idiom 'from after me' means ceasing to follow. 'Turn away from following
    me' expresses the covenantal sense in natural English while preserving the directional
    metaphor.
