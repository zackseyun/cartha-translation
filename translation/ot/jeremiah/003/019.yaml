theological_decisions:
- issue: Gendered filial language in בַּבָּנִים
  chosen_reading: among the sons
  alternative_readings:
  - among the children
  rationale: The Hebrew uses the masculine plural 'sons.' Per doctrine, gender-accurate
    renderings are preferred where the source is gendered. Here the filial/adoption
    imagery is important, so the masculine form is retained in the main text, with
    a footnote noting the broader familial sense.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Interpretation of the difficult phrase נַחֲלַת צְבִי צִבְאוֹת גּוֹיִם
  chosen_reading: the most beautiful inheritance of the nations’ armies
  alternative_readings:
  - the most splendid heritage of the nations
  - a glorious inheritance among the nations
  rationale: The Hebrew is syntactically compressed and debated. The main text keeps
    the lexical elements visible for auditability, while a smoother idiomatic alternative
    is preserved in a footnote rather than resolving the ambiguity too strongly.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
