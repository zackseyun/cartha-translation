theological_decisions:
- issue: Whether וְשׁוֹב אֵלַי is an imperative invitation ('yet return to me') or a rhetorical question ('would you return to me?')
  chosen_reading: rhetorical question
  alternative_readings:
  - imperative invitation
  rationale: The immediate context is a chain of rhetorical questions built on Deuteronomic divorce logic. Reading the final clause as a question preserves the tension and sharpness of the accusation. The alternative is important because some translations take it as a surprising gracious summons; that possibility is preserved in a footnote rather than resolved silently.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
