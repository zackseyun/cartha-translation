id: JER.3.1
reference: Jeremiah 3:1
source:
  edition: WLC
  text: לֵ/אמֹ֡ר הֵ֣ן יְשַׁלַּ֣ח אִ֣ישׁ אֶת אִשְׁתּ/וֹ֩ וְ/הָלְכָ֨ה מֵ/אִתּ֜/וֹ וְ/הָיְתָ֣ה לְ/אִישׁ אַחֵ֗ר הֲ/יָשׁ֤וּב אֵלֶ֨י/הָ֙ ע֔וֹד הֲ/ל֛וֹא חָנ֥וֹף תֶּחֱנַ֖ף הָ/אָ֣רֶץ הַ/הִ֑יא וְ/אַ֗תְּ זָנִית֙ רֵעִ֣ים רַבִּ֔ים וְ/שׁ֥וֹב אֵלַ֖/י נְאֻם יְהֹוָֽה־־־׃
translation:
  text: It is said, ‘If a man sends away his wife, and she goes from him and becomes another man’s, will he return to her again? Would not that land be utterly polluted? But you have prostituted yourself with many lovers, and would you return to me?’ declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and yet return to me,' taking the final clause as an imperative invitation rather than a rhetorical question.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'becomes another man's,' that is, becomes another man's wife.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵאמֹר
  chosen: It is said
  alternatives:
  - Saying
  - If one says
  lexicon: HALOT
  rationale: The infinitive construct of אמר here functions idiomatically as an introductory formula. English 'It is said' captures the impersonal citation-like force better than a bare 'saying.'
- source_word: הֵן
  chosen: If
  alternatives:
  - Behold
  - Suppose
  lexicon: HALOT
  rationale: In this legal-hypothetical setup, הֵן introduces a supposition. 'If' is the most natural English equivalent in context.
- source_word: יְשַׁלַּח ... אֶת אִשְׁתּוֹ
  chosen: sends away his wife
  alternatives:
  - divorces his wife
  - dismisses his wife
  lexicon: HALOT
  rationale: שׁלח in this marital context refers to sending away a wife, i.e., divorce. 'Sends away' stays closer to the Hebrew while allowing the legal allusion to remain visible.
- source_word: וְהָלְכָה מֵאִתּוֹ
  chosen: and she goes from him
  alternatives:
  - and she leaves him
  - and departs from him
  lexicon: HALOT
  rationale: A straightforward rendering of the sequence; 'goes from him' preserves the Hebrew movement language.
- source_word: וְהָיְתָה לְאִישׁ אַחֵר
  chosen: and becomes another man’s
  alternatives:
  - and becomes another man's wife
  - and belongs to another man
  lexicon: HALOT
  rationale: 'The Hebrew is elliptical: literally ''becomes to another man.'' ''Becomes another man''s'' is concise and idiomatic while preserving the marital sense without overfilling the text.'
- source_word: הֲיָשׁוּב אֵלֶיהָ עוֹד
  chosen: will he return to her again?
  alternatives:
  - would he go back to her again?
  - will he come back to her anymore?
  lexicon: HALOT
  rationale: שׁוב is 'return.' The question is rhetorical and legal in tone; 'return to her again' preserves that force.
- source_word: הֲלוֹא חָנוֹף תֶּחֱנַף הָאָרֶץ הַהִיא
  chosen: Would not that land be utterly polluted?
  alternatives:
  - Would not that land be profaned?
  - Would not that land be greatly defiled?
  lexicon: HALOT
  rationale: The infinitive absolute + finite verb intensifies the verb חנף. 'Utterly polluted' conveys the emphatic defilement/profanation sense in natural English.
- source_word: וְאַתְּ זָנִית
  chosen: But you have prostituted yourself
  alternatives:
  - But you have played the whore
  - But you have committed prostitution
  lexicon: HALOT
  rationale: זנה is the standard prophetic metaphor for covenantal unfaithfulness expressed as sexual infidelity. 'Prostituted yourself' is strong, clear modern English without archaic idiom.
- source_word: רֵעִים רַבִּים
  chosen: with many lovers
  alternatives:
  - with many companions
  - with many paramours
  lexicon: HALOT
  rationale: Though רֵעִים often means 'friends/companions,' in this sexualized metaphorical context 'lovers' best conveys the intended sense.
- source_word: וְשׁוֹב אֵלַי
  chosen: and would you return to me?
  alternatives:
  - yet return to me
  - and return to me
  lexicon: HALOT
  rationale: The form can be read as an imperative or, more likely in context, as a shocked rhetorical question continuing the legal analogy. Rendering it as a question best fits the flow from the preceding rhetorical questions.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. Per doctrine, יְהוָה is rendered 'the LORD.' 'Declares' suits the solemn prophetic register.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name as specified in DOCTRINE.md.
