id: JER.44.11
reference: Jeremiah 44:11
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּֽה אָמַ֞ר יְהוָ֤ה צְבָאוֹת֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל הִנְ/נִ֨י שָׂ֥ם פָּנַ֛/י בָּ/כֶ֖ם לְ/רָעָ֑ה וּ/לְ/הַכְרִ֖ית אֶת כָּל יְהוּדָֽה־־־׃
translation:
  text: 'Therefore, this is what Yahweh of Armies, the God of Israel, says: Behold, I am setting my face against you for harm, to cut off all Judah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the LORD of Hosts.'
    reason: lexical_alternative
  - marker: b
    text: '''For harm'' refers to calamity or disaster in judgment, not to moral evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks a conclusion drawn from the preceding indictment; 'Therefore' preserves the inferential force in natural English.
- source_word: כֹּה אָמַר
  chosen: this is what ... says
  alternatives:
  - thus says
  - this is what ... has said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'This is what ... says' is slightly more natural contemporary English than 'Thus says' while preserving the formal prophetic tone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of Hosts
  - of Heaven's Armies
  lexicon: HALOT
  rationale: The title denotes command over heavenly and earthly forces. 'Of Armies' translates the Hebrew meaning more transparently than the traditional but less immediately clear 'of Hosts.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying Israel's covenant God.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - Indeed, I am
  lexicon: HALOT
  rationale: Introduces solemn divine resolve. 'Behold' preserves the elevated prophetic register and the deictic force.
- source_word: שָׂם פָּנַי בָּכֶם
  chosen: setting my face against you
  alternatives:
  - turning my face against you
  - fixing my face against you
  lexicon: HALOT
  rationale: This is an idiom for determined opposition or judgment. 'Setting my face against you' is a well-established and accurate English equivalent that preserves the metaphor.
- source_word: לְרָעָה
  chosen: for harm
  alternatives:
  - for evil
  - for disaster
  lexicon: HALOT
  rationale: Here רָעָה refers to calamity/judgment rather than moral evil. 'For harm' is concise and avoids suggesting moral evil in God, while still conveying punitive intent.
- source_word: וּלְהַכְרִית
  chosen: to cut off
  alternatives:
  - to destroy
  - to wipe out
  lexicon: HALOT
  rationale: The Hiphil of כרת commonly means to cut off, often in judgment contexts. 'To cut off' preserves the Hebrew idiom and its severity.
- source_word: כָּל יְהוּדָה
  chosen: all Judah
  alternatives:
  - all the people of Judah
  - the whole of Judah
  lexicon: HALOT
  rationale: The phrase can denote the people/group identified as Judah rather than merely the territory. 'All Judah' preserves the compact Hebrew expression and leaves the collective sense intact.
