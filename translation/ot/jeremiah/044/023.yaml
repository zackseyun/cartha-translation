id: JER.44.23
reference: Jeremiah 44:23
source:
  edition: WLC
  text: מִ/פְּנֵי֩ אֲשֶׁ֨ר קִטַּרְתֶּ֜ם וַ/אֲשֶׁ֧ר חֲטָאתֶ֣ם לַ/יהוָ֗ה וְ/לֹ֤א שְׁמַעְתֶּם֙ בְּ/ק֣וֹל יְהוָ֔ה וּ/בְ/תֹרָת֧/וֹ וּ/בְ/חֻקֹּתָ֛י/ו וּ/בְ/עֵדְוֺתָ֖י/ו לֹ֣א הֲלַכְתֶּ֑ם עַל כֵּ֞ן קָרָ֥את אֶתְ/כֶ֛ם הָ/רָעָ֥ה הַ/זֹּ֖את כַּ/יּ֥וֹם הַ/זֶּֽה־׃ס
translation:
  text: Because you burned incense and sinned against Yahweh, and have not listened to the voice of Yahweh or walked in his law, his statutes, and his testimonies, therefore this disaster has come upon you, as it is this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you offered incense.' The Hebrew verb refers to making sacrificial smoke/incense offerings.
    reason: lexical_alternative
  - marker: b
    text: Or 'did not obey the LORD.' Literally, 'did not listen to the voice of the LORD.'
    reason: lexical_alternative
  - marker: c
    text: '''Law'' may also be rendered ''instruction'' (Hebrew torah).'
    reason: lexical_alternative
  - marker: d
    text: Or 'this calamity has befallen you.' The Hebrew word can mean 'evil' or, in contexts like this, 'disaster/calamity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפְּנֵי אֲשֶׁר
  chosen: Because
  alternatives:
  - Because of the fact that
  - Since
  lexicon: HALOT
  rationale: Introduces the causal ground for the judgment. 'Because' is natural modern English and preserves the causal force without unnecessary heaviness.
- source_word: קִטַּרְתֶּם
  chosen: you burned incense
  alternatives:
  - you made offerings of incense
  - you offered incense
  lexicon: HALOT
  rationale: The verb קטר in this stem commonly refers to making sacrificial smoke/incense offerings. 'Burned incense' is the most direct and idiomatic rendering here, matching the idolatrous cultic context of Jeremiah 44.
- source_word: חֲטָאתֶם לַיהוָה
  chosen: sinned against the LORD
  alternatives:
  - sinned against Yahweh
  - offended the LORD
  lexicon: HALOT
  rationale: The preposition ל with חטא here is well represented by 'against' in English. 'The LORD' follows the project's default rendering for YHWH.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שְׁמַעְתֶּם בְּקוֹל יְהוָה
  chosen: did not listen to the voice of the LORD
  alternatives:
  - did not obey the LORD
  - did not listen to the LORD's voice
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'listen to the voice of.' Retaining 'voice' preserves the Hebrew expression and keeps the progression with the following covenantal terms. 'Obey' is interpretive and therefore left as an alternative.
- source_word: וּבְתוֹרָתוֹ
  chosen: his law
  alternatives:
  - his instruction
  - his Torah
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction' broadly, but in this covenantal legal triad 'law' is the clearest concise English rendering. 'Instruction' is a valid lexical alternative but less idiomatic in this list.
- source_word: וּבְחֻקֹּתָיו
  chosen: his statutes
  alternatives:
  - his decrees
  - his ordinances
  lexicon: HALOT
  rationale: '''Statutes'' is a standard and precise rendering for חֻקִּים in legal/covenantal contexts.'
- source_word: וּבְעֵדְוֹתָיו
  chosen: his testimonies
  alternatives:
  - his covenant stipulations
  - his decrees
  lexicon: HALOT
  rationale: Though somewhat formal, 'testimonies' best preserves the lexical distinctiveness of עֵדוֹת from both תּוֹרָה and חֻקִּים. Flattening it to another legal synonym would obscure the threefold expression.
- source_word: לֹא הֲלַכְתֶּם
  chosen: or walk in
  alternatives:
  - or live by
  - or follow
  lexicon: HALOT
  rationale: הלך with ב in covenantal contexts is idiomatically 'walk in,' preserving the metaphor of conduct. The English infinitive-like coordination after 'did not listen' is smoothed as 'or walk in' for readability.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: '''Therefore'' clearly marks the consequence of the preceding offenses.'
- source_word: קָרָאת אֶתְכֶם הָרָעָה הַזֹּאת
  chosen: this disaster has come upon you
  alternatives:
  - this evil has happened to you
  - this calamity has befallen you
  lexicon: HALOT
  rationale: The Hebrew literally says 'this evil called/reached you,' with רָעָה here denoting calamity/disaster rather than moral evil. 'Has come upon you' is idiomatic English that captures the eventive force.
- source_word: כַּיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as is evident today
  - as at this day
  lexicon: HALOT
  rationale: This common idiom points to the present, observable state resulting from judgment. 'As it is this day' is readable while preserving the demonstrative force.
