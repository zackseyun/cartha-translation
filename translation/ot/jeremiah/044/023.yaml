theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of רָעָה in a judgment context
  chosen_reading: disaster
  alternative_readings:
  - evil
  - calamity
  rationale: The verse speaks of punitive calamity coming upon the people, not moral evil in God. 'Disaster' communicates the judgment event without implying moral wrongdoing by God.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source sense without importing doctrinal claims'
