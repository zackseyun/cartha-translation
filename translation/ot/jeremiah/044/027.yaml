id: JER.44.27
reference: Jeremiah 44:27
source:
  edition: WLC
  text: הִנְ/נִ֨י שֹׁקֵ֧ד עֲלֵי/הֶ֛ם לְ/רָעָ֖ה וְ/לֹ֣א לְ/טוֹבָ֑ה וְ/תַמּוּ֩ כָל אִ֨ישׁ
    יְהוּדָ֜ה אֲשֶׁ֧ר בְּ/אֶֽרֶץ מִצְרַ֛יִם בַּ/חֶ֥רֶב וּ/בָ/רָעָ֖ב עַד כְּלוֹתָֽ/ם־־־׃
translation:
  text: Behold, I am watching over them for harm and not for good, and every man of
    Judah who is in the land of Egypt will come to an end by the sword and by famine,
    until they are finished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for disaster' or 'for calamity'; the Hebrew term denotes harmful judgment,
      not moral evil.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'every man of Judah,' a masculine singular expression used distributively.
    reason: lexical_alternative
  - marker: c
    text: Or 'until they are consumed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  - Here I am
  lexicon: HALOT
  rationale: Introduces a solemn divine declaration with attention-getting force.
    'Behold' preserves the prophetic register better than flatter modern options.
- source_word: שֹׁקֵד
  chosen: watching over
  alternatives:
  - keeping watch over
  - being vigilant over
  lexicon: HALOT
  rationale: The participle of שׁקד conveys wakeful attentiveness or vigilant watching.
    'Watching over' preserves the active, ongoing sense and echoes the same verb's
    use elsewhere in Jeremiah for YHWH's purposeful oversight.
- source_word: עֲלֵיהֶם
  chosen: over them
  alternatives:
  - concerning them
  - against them
  lexicon: HALOT
  rationale: With שׁקד, the preposition naturally yields 'watching over them.' Although
    the context is hostile, the hostility is carried by the following phrase 'for
    harm,' so 'over them' is sufficient and closer to the Hebrew.
- source_word: לְרָעָה
  chosen: for harm
  alternatives:
  - for evil
  - for disaster
  - for calamity
  lexicon: HALOT
  rationale: רָעָה here denotes injurious outcome or disaster rather than moral evil.
    'Harm' is concise, natural English and pairs well antithetically with 'good.'
- source_word: וְלֹא לְטוֹבָה
  chosen: and not for good
  alternatives:
  - and not for welfare
  - and not for well-being
  lexicon: HALOT
  rationale: Preserves the direct contrast with 'for harm.' 'Good' is the plain lexical
    counterpart and avoids over-interpretation.
- source_word: וְתַמּוּ
  chosen: will come to an end
  alternatives:
  - will be consumed
  - will perish
  - will be finished
  lexicon: HALOT
  rationale: The verb from תמם indicates being finished or brought to an end. 'Will
    come to an end' is idiomatic English that preserves the result without overstating
    the mechanism.
- source_word: כָל אִישׁ יְהוּדָה
  chosen: every man of Judah
  alternatives:
  - every Judean man
  - every person of Judah
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular with distributive force.
    Per the gender-accurate policy, 'every man of Judah' best matches the source form
    and representative sense.
- source_word: אֲשֶׁר בְּאֶרֶץ מִצְרַיִם
  chosen: who is in the land of Egypt
  alternatives:
  - who are in the land of Egypt
  - who is in Egypt
  lexicon: HALOT
  rationale: Retains the singular distributive syntax after 'every man' and preserves
    the fuller geographic phrase 'land of Egypt.'
- source_word: בַּחֶרֶב וּבָרָעָב
  chosen: by the sword and by famine
  alternatives:
  - by sword and by famine
  - through the sword and through famine
  lexicon: HALOT
  rationale: This is a standard judgment formula in Jeremiah. 'By the sword and by
    famine' is clear, idiomatic, and preserves the instrumental sense.
- source_word: עַד כְּלוֹתָם
  chosen: until they are finished
  alternatives:
  - until they are consumed
  - until they are completely gone
  - until their end is complete
  lexicon: HALOT
  rationale: The infinitive construct of כלה with suffix expresses completion/consumption
    of the group. 'Until they are finished' preserves the stark finality and links
    naturally with the prior clause.
