theological_decisions:
- issue: Rendering of divine judgment language without implying moral evil in God
  chosen_reading: for harm
  alternative_readings:
  - for evil
  - for disaster
  - for calamity
  rationale: The Hebrew רָעָה in judgment contexts often denotes calamity or harmful
    outcome rather than moral evil. 'For harm' preserves the severity of divine judgment
    while avoiding a misleading implication that God is acting with moral evil.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the source''s plain sense without importing doctrinal claims.'
- issue: Gendered representative language in כָל אִישׁ יְהוּדָה
  chosen_reading: every man of Judah
  alternative_readings:
  - every person of Judah
  - all the men of Judah
  rationale: The source uses grammatically masculine singular with distributive force.
    Following the gender-accurate policy, the translation keeps the masculine form
    rather than neutralizing it, while understanding it representatively for the Judean
    population in view.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
