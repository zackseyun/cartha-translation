theological_decisions:
- issue: Rendering of idolatrous service language
  chosen_reading: to serve other gods
  alternative_readings:
  - to worship other gods
  rationale: The Hebrew עבד is broader than explicit cultic worship and often denotes
    service/devotion rendered to a deity. 'Serve' preserves the lexical form while
    still conveying religious allegiance.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Gendered kinship term in וַאֲבֹתֵיכֶם
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The source is grammatically masculine and refers specifically to forefathers.
    Per the doctrine's gender-accurate principle, the masculine form is retained rather
    than neutralized.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
