id: JER.44.3
reference: Jeremiah 44:3
source:
  edition: WLC
  text: מִ/פְּנֵ֣י רָעָתָ֗/ם אֲשֶׁ֤ר עָשׂוּ֙ לְ/הַכְעִסֵ֔/נִי לָ/לֶ֣כֶת לְ/קַטֵּ֔ר
    לַ/עֲבֹ֖ד לֵ/אלֹהִ֣ים אֲחֵרִ֑ים אֲשֶׁר֙ לֹ֣א יְדָע֔וּ/ם הֵ֖מָּה אַתֶּ֥ם וַ/אֲבֹתֵי/כֶֽם׃
translation:
  text: because of their evil that they did to provoke me to anger, by going to burn
    incense and to serve other gods, whom they had not known—they, you, and your fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to worship other gods.' The Hebrew verb can denote religious service
      or worship.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''whom neither they nor you nor your fathers had known.'' The Hebrew
      closes with an emphatic listing: ''they, you, and your fathers.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - on account of
  - from before
  lexicon: HALOT
  rationale: In context this preposition with פָּנִים functions causally, introducing
    the reason for the devastation described in the previous verse. 'Because of' is
    idiomatic and accurate.
- source_word: רָעָתָם
  chosen: their evil
  alternatives:
  - their wickedness
  - their disaster
  lexicon: HALOT
  rationale: רָעָה here refers to moral evil rather than calamity, since it is qualified
    by 'that they did' and further defined by idolatrous acts. 'Evil' preserves the
    broad moral sense.
- source_word: אֲשֶׁר עָשׂוּ
  chosen: that they did
  alternatives:
  - which they committed
  lexicon: HALOT
  rationale: A straightforward relative clause. 'Did' keeps the Hebrew verbal simplicity
    and avoids over-interpretation.
- source_word: לְהַכְעִסֵנִי
  chosen: to provoke me to anger
  alternatives:
  - to anger me
  - to provoke me
  lexicon: HALOT
  rationale: The Hiphil of כעס commonly means 'provoke to anger.' This fuller rendering
    preserves both causative force and divine response.
- source_word: לָלֶכֶת
  chosen: by going
  alternatives:
  - to go
  - in going
  lexicon: HALOT
  rationale: This infinitive introduces the manner/means by which they provoked God,
    followed by further infinitives. 'By going' makes the syntactic relationship clear
    in natural English.
- source_word: לְקַטֵּר
  chosen: to burn incense
  alternatives:
  - to make offerings of incense
  lexicon: HALOT
  rationale: The Piel of קטר in idolatry contexts commonly refers to burning incense.
    This is the standard and clearest English equivalent.
- source_word: לַעֲבֹד
  chosen: to serve
  alternatives:
  - to worship
  lexicon: HALOT
  rationale: עבד with gods often includes worshipful service, but 'serve' is the more
    direct lexical equivalent and preserves the broader covenantal sense of rendered
    devotion.
- source_word: לֵאלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The phrase regularly denotes deities other than the LORD. 'Other gods'
    is the most literal and conventional rendering.
- source_word: אֲשֶׁר לֹא יְדָעוּם
  chosen: whom they had not known
  alternatives:
  - which they did not know
  - whom they had not acknowledged
  lexicon: HALOT
  rationale: With personal object suffix and reference to gods, 'whom' is appropriate
    in English. 'Known' preserves the covenantal-relational nuance of ידע without
    importing a stronger interpretive gloss such as 'acknowledged.'
- source_word: הֵמָּה אַתֶּם וַאֲבֹתֵיכֶם
  chosen: they, you, and your fathers
  alternatives:
  - neither they nor you nor your fathers knew
  - they themselves, you, and your fathers
  lexicon: HALOT
  rationale: The pronouns are emphatic and appositional, specifying the subject of
    'had not known.' Retaining the triad directly mirrors the Hebrew emphasis. 'Fathers'
    is kept rather than 'ancestors' to remain gender-accurate and closer to the source.
