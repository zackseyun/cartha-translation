id: JER.44.16
reference: Jeremiah 44:16
source:
  edition: WLC
  text: הַ/דָּבָ֛ר אֲשֶׁר דִּבַּ֥רְתָּ אֵלֵ֖י/נוּ בְּ/שֵׁ֣ם יְהוָ֑ה אֵינֶ֥/נּוּ שֹׁמְעִ֖ים
    אֵלֶֽי/ךָ־׃
translation:
  text: As for the word that you have spoken to us in the name of the LORD, we will
    not listen to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we will not obey you.' The Hebrew verb can imply both hearing and heeding;
      the main text keeps the more direct lexical sense, while the context clearly
      includes refusal to obey.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the matter
  - the message
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' Here it refers to Jeremiah's
    spoken prophetic utterance, so 'the word' preserves the directness of the Hebrew
    while remaining natural in English.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: A simple relative pronoun is required. 'That' is more natural in contemporary
    English than 'which' in this restrictive clause.
- source_word: דִּבַּרְתָּ
  chosen: you have spoken
  alternatives:
  - you spoke
  - you said
  lexicon: HALOT
  rationale: The perfect verb refers to Jeremiah's completed speech. 'You have spoken'
    fits idiomatic English after 'the word that' and preserves the completed action
    with present relevance.
- source_word: אֵלֵינוּ
  chosen: to us
  alternatives:
  - against us
  lexicon: HALOT
  rationale: The preposition אֶל normally means 'to/toward.' In context the people
    are responding to Jeremiah's address, so 'to us' is the straightforward rendering.
- source_word: בְּשֵׁם יְהוָה
  chosen: in the name of the LORD
  alternatives:
  - by the authority of the LORD
  - on behalf of the LORD
  lexicon: HALOT
  rationale: This idiom indicates speaking under divine authority/representation.
    'In the name of the LORD' is both accurate and standard. Per doctrine, יְהוָה
    is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The doctrine excerpt specifies the default rendering of the divine name
    as 'the LORD,' following Jewish reverence tradition and the Septuagintal pattern.
- source_word: אֵינֶנּוּ שֹׁמְעִים
  chosen: we will not listen
  alternatives:
  - we are not listening
  - we do not listen
  - we will not obey
  lexicon: HALOT
  rationale: The negative existential with participle expresses a firm refusal. In
    English, 'we will not listen' best captures the volitional force in this direct
    reply. 'Obey' is interpretive and stronger than the lexical sense of שׁמע here,
    though obedience is implied.
- source_word: אֵלֶיךָ
  chosen: to you
  alternatives:
  - you
  lexicon: HALOT
  rationale: 'The preposition should be retained: the people refuse to listen ''to
    you.'' Keeping it preserves the Hebrew syntax and the personal directness of the
    rejection.'
