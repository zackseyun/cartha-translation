theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. The project doctrine explicitly
    sets the default English rendering as 'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of שׁמע in a prophetic rejection context
  chosen_reading: listen
  alternative_readings:
  - obey
  rationale: While שׁמע can carry the sense of obedience in covenantal contexts, the
    immediate wording is a refusal to heed Jeremiah's spoken message. 'Listen' preserves
    the lexical form and leaves the implied disobedience to context rather than importing
    it into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
