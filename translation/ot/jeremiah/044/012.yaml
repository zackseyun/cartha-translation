theological_decisions:
- issue: Rendering of divine judgment formulas without softening
  chosen_reading: Retained the repeated language of ending, falling, dying, and becoming
    a byword of judgment in direct terms.
  alternative_readings:
  - Smoother English that reduces repetition
  - More interpretive renderings such as 'be destroyed utterly'
  rationale: The verse is rhetorically heavy with repeated judgment terms. Preserving
    that force reflects the prophetic warning without importing extra theological
    claims.
  doctrine_reference: Translation philosophy §1, §5
- issue: Distinction between אָלָה and קְלָלָה
  chosen_reading: Rendered them separately as 'an oath' and 'a curse,' with explanatory
    footnote.
  alternative_readings:
  - Render both as 'curse'
  - Render אָלָה as 'curse-oath' in the main text
  rationale: The Hebrew uses two related but distinct terms. Preserving the distinction
    in the main text best fits transparency and auditable lexical consistency, while
    the footnote preserves the curse-oath nuance.
  doctrine_reference: Translation philosophy §5
