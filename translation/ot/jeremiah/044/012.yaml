id: JER.44.12
reference: Jeremiah 44:12
source:
  edition: WLC
  text: וְ/לָקַחְתִּ֞י אֶת שְׁאֵרִ֣ית יְהוּדָ֗ה אֲשֶׁר שָׂ֨מוּ פְנֵי/הֶ֜ם לָ/ב֣וֹא
    אֶֽרֶץ מִצְרַיִם֮ לָ/ג֣וּר שָׁם֒ וְ/תַ֨מּוּ כֹ֜ל בְּ/אֶ֧רֶץ מִצְרַ֣יִם יִפֹּ֗לוּ
    בַּ/חֶ֤רֶב בָּֽ/רָעָב֙ יִתַּ֔מּוּ מִ/קָּטֹן֙ וְ/עַד גָּד֔וֹל בַּ/חֶ֥רֶב וּ/בָ/רָעָ֖ב
    יָמֻ֑תוּ וְ/הָיוּ֙ לְ/אָלָ֣ה לְ/שַׁמָּ֔ה וְ/לִ/קְלָלָ֖ה וּ/לְ/חֶרְפָּֽה־־־־׃
translation:
  text: And I will take the remnant of Judah who have set their faces to enter the
    land of Egypt to sojourn there, and they will all come to an end in the land of
    Egypt. They will fall by the sword and by famine; from the least even to the greatest,
    they will come to an end. By the sword and by famine they will die, and they will
    become an oath, a horror, a curse, and a reproach.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an oath of cursing' / 'a curse-formula.' The Hebrew אָלָה often refers
      to an oath that invokes a curse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתִּי
  chosen: And I will take
  alternatives:
  - And I will seize
  - And I will take away
  lexicon: HALOT
  rationale: The verb לקח in first person singular with direct object naturally means
    'take.' In this judgment context it can imply taking in hand for punishment, but
    'take' preserves the Hebrew without over-interpreting.
- source_word: שְׁאֵרִית יְהוּדָה
  chosen: the remnant of Judah
  alternatives:
  - the remainder of Judah
  lexicon: HALOT
  rationale: שְׁאֵרִית commonly denotes what remains after catastrophe; 'remnant'
    is the established and semantically precise rendering here.
- source_word: אֲשֶׁר שָׂמוּ פְנֵיהֶם
  chosen: who have set their faces
  alternatives:
  - who have determined
  - who have resolved
  lexicon: HALOT
  rationale: The idiom שׂים פנים means to set oneself resolutely toward an action.
    'Set their faces' preserves the Hebrew imagery and prophetic tone better than
    a flattened dynamic equivalent.
- source_word: לָבוֹא אֶרֶץ מִצְרַיִם
  chosen: to enter the land of Egypt
  alternatives:
  - to go into the land of Egypt
  lexicon: HALOT
  rationale: בוא with ארץ is straightforwardly 'enter/go into the land.' 'Enter' is
    slightly more formal and fits the directional sense.
- source_word: לָגוּר שָׁם
  chosen: to sojourn there
  alternatives:
  - to dwell there as foreigners
  - to reside there
  lexicon: HALOT
  rationale: גור often carries the nuance of residing as an alien or temporary resident.
    'Sojourn' preserves that nuance better than simply 'live' or 'reside.'
- source_word: וְתַמּוּ כֹל
  chosen: and they will all come to an end
  alternatives:
  - and all of them will be consumed
  - and they will all perish
  lexicon: HALOT
  rationale: תם in this context denotes being finished/consumed. Because the verse
    later repeats the same root, 'come to an end' preserves lexical consistency while
    remaining natural English.
- source_word: יִפֹּלוּ
  chosen: They will fall
  alternatives:
  - They will perish
  - They will be struck down
  lexicon: HALOT
  rationale: נפל with instruments of judgment ('by the sword and by famine') is idiomatically
    'fall.' This keeps the concrete force of the Hebrew.
- source_word: בַּחֶרֶב בָּרָעָב
  chosen: by the sword and by famine
  alternatives:
  - by sword and by famine
  lexicon: HALOT
  rationale: The paired judgment formula is common in Jeremiah. Including 'the' is
    idiomatic in English, while preserving the instrumental sense of ב.
- source_word: יִתַּמּוּ
  chosen: they will come to an end
  alternatives:
  - they will be consumed
  - they will perish
  lexicon: HALOT
  rationale: Same root as earlier וְתַמּוּ; repeated rendering reflects the Hebrew
    repetition and rhetorical emphasis.
- source_word: מִקָּטֹן וְעַד גָּדוֹל
  chosen: from the least even to the greatest
  alternatives:
  - from small to great
  - from the smallest to the greatest
  lexicon: HALOT
  rationale: This idiom expresses totality across social or age range. 'From the least
    even to the greatest' is natural and preserves the merism.
- source_word: יָמֻתוּ
  chosen: they will die
  alternatives:
  - they will perish
  lexicon: HALOT
  rationale: מות is the ordinary verb 'die'; no stronger or more interpretive rendering
    is needed.
- source_word: וְהָיוּ לְאָלָה
  chosen: and they will become an oath
  alternatives:
  - and they will become a curse-formula
  - and they will become an object of cursing
  lexicon: HALOT
  rationale: אָלָה can denote an oath, often specifically an oath involving a curse.
    Because the following noun is already 'curse,' rendering this as 'oath' preserves
    the lexical distinction, though the curse nuance is significant and worth noting.
- source_word: לְשַׁמָּה
  chosen: a horror
  alternatives:
  - an object of horror
  - a desolation
  - an astonishment
  lexicon: HALOT
  rationale: שַׁמָּה often denotes appalling desolation or horror. Since the people
    themselves are in view as a byword of judgment, 'a horror' fits better than the
    more land-oriented 'desolation.'
- source_word: לִקְלָלָה
  chosen: a curse
  alternatives:
  - an object of cursing
  lexicon: HALOT
  rationale: קללה straightforwardly means 'curse.' This is distinct from אָלָה and
    should not be collapsed into the same English term without note.
- source_word: וּלְחֶרְפָּה
  chosen: and a reproach
  alternatives:
  - and a disgrace
  - and a taunt
  lexicon: HALOT
  rationale: חרפה denotes reproach, disgrace, or public shame. 'Reproach' preserves
    the relational and honor-shame dimension common in prophetic judgment language.
