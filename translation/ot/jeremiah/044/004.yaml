theological_decisions:
- issue: Rendering divine displeasure toward idolatrous practice without softening
    or over-expanding
  chosen_reading: that I hate
  alternative_readings:
  - that I detest
  - which I hated
  rationale: The Hebrew states God's direct hatred of the abominable practice. The
    translation preserves the force of divine moral opposition without importing later
    doctrinal categories beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
