id: JER.44.4
reference: Jeremiah 44:4
source:
  edition: WLC
  text: וָ/אֶשְׁלַ֤ח אֲלֵי/כֶם֙ אֶת כָּל עֲבָדַ֣/י הַ/נְּבִיאִ֔ים הַשְׁכֵּ֥ים וְ/שָׁלֹ֖חַ
    לֵ/אמֹ֑ר אַל נָ֣א תַעֲשׂ֗וּ אֵ֛ת דְּבַֽר הַ/תֹּעֵבָ֥ה הַ/זֹּ֖את אֲשֶׁ֥ר שָׂנֵֽאתִי־־־־׃
translation:
  text: Yet I sent to you all my servants the prophets, rising early and sending them,
    saying, 'Please do not do this abominable thing that I hate.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'rising early and sending,' an idiom for persistent, earnest
      repetition.
    reason: cultural_note
  - marker: b
    text: Or 'this detestable thing' / 'this abomination.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶשְׁלַח
  chosen: Yet I sent
  alternatives:
  - And I sent
  - So I sent
  lexicon: HALOT
  rationale: The waw-consecutive advances the discourse, but in context it carries
    a mildly adversative force after the people's refusal; 'Yet' captures the sense
    that despite prior warnings, God still sent prophets. 'Sent' is the plain sense
    of שלח.
- source_word: אֲלֵיכֶם
  chosen: to you
  alternatives:
  - unto you
  lexicon: HALOT
  rationale: Standard directional sense with second person plural object.
- source_word: כָּל עֲבָדַי הַנְּבִיאִים
  chosen: all my servants the prophets
  alternatives:
  - all my servants, the prophets
  - all my prophet-servants
  lexicon: HALOT
  rationale: Keeps both appositional nouns explicit. 'Servants' is preferable here
    over 'slaves' because the bonded-status nuance is not the focus; the phrase is
    a recognized prophetic designation emphasizing divine commission.
- source_word: הַשְׁכֵּים וְשָׁלֹחַ
  chosen: rising early and sending them
  alternatives:
  - persistently sending
  - sending again and again
  - rising early to send
  lexicon: HALOT
  rationale: This Hebrew idiom literally means 'rising early and sending' and conveys
    repeated, earnest action. The translation preserves the imagery while remaining
    natural English. 'Them' is supplied in English because the object is understood
    from context ('the prophets').
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering introducing the content of the message.
- source_word: אַל נָא תַעֲשׂוּ
  chosen: Please do not do
  alternatives:
  - Do not, please, do
  - Please, do not commit
  lexicon: HALOT
  rationale: אַל marks prohibition; נָא adds entreaty or urgency. 'Please do not do'
    preserves both the prohibition and the pleading tone.
- source_word: דְּבַר הַתּוֹעֵבָה הַזֹּאת
  chosen: this abominable thing
  alternatives:
  - this detestable thing
  - this abomination
  lexicon: HALOT
  rationale: דבר here functions idiomatically as 'thing/matter.' תועבה denotes something
    abhorrent or detestable, often especially in relation to idolatry. 'Abominable
    thing' preserves the strong moral-religious force without sounding overly technical.
- source_word: אֲשֶׁר שָׂנֵאתִי
  chosen: that I hate
  alternatives:
  - which I hated
  - that I detest
  lexicon: HALOT
  rationale: The perfect verb expresses God's settled stance toward the practice.
    Present English 'I hate' best communicates the ongoing evaluative force in context.
