id: JER.44.1
reference: Jeremiah 44:1
source:
  edition: WLC
  text: הַ/דָּבָר֙ אֲשֶׁ֣ר הָיָ֣ה אֶֽל יִרְמְיָ֔הוּ אֶ֚ל כָּל הַ/יְּהוּדִ֔ים הַ/יֹּשְׁבִ֖ים
    בְּ/אֶ֣רֶץ מִצְרָ֑יִם הַ/יֹּשְׁבִ֤ים בְּ/מִגְדֹּל֙ וּ/בְ/תַחְפַּנְחֵ֣ס וּ/בְ/נֹ֔ף
    וּ/בְ/אֶ֥רֶץ פַּתְר֖וֹס לֵ/אמֹֽר־־׃ס
translation:
  text: The word that came to Jeremiah concerning all the Judeans living in the land
    of Egypt, those living in Migdol and in Tahpanhes and in Noph and in the land
    of Pathros, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Noph is the Hebrew name for the Egyptian city more commonly known as Memphis.
    reason: cross_reference
lexical_decisions:
- source_word: הַדָּבָר
  chosen: The word
  alternatives:
  - The message
  lexicon: HALOT
  rationale: דבר in prophetic superscriptions commonly introduces a divine communication.
    'The word' preserves the formulaic prophetic register more closely than the more
    interpretive 'message'.
- source_word: אֲשֶׁר הָיָה אֶל
  chosen: that came to
  alternatives:
  - that was to
  - that came upon
  lexicon: HALOT
  rationale: The idiom 'the word that came to [prophet]' is standard in English for
    היה אל in prophetic headings and reflects the Hebrew construction naturally.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  rationale: Personal name transliterated by standard English convention, per translation
    philosophy.
- source_word: אֶל כָּל הַיְּהוּדִים
  chosen: concerning all the Judeans
  alternatives:
  - to all the Jews
  - to all the Judeans
  lexicon: HALOT
  rationale: The second אֶל is best taken in context as marking the addressees/content
    sphere of the word. 'Judeans' is preferred over 'Jews' because in Jeremiah this
    often denotes people from Judah ethnogeographically, and it avoids anachronistic
    flattening. 'Concerning' reads naturally with the English clause structure.
- source_word: הַיֹּשְׁבִים בְּאֶרֶץ מִצְרַיִם
  chosen: living in the land of Egypt
  alternatives:
  - dwelling in the land of Egypt
  - who lived in the land of Egypt
  lexicon: HALOT
  rationale: The participle denotes those residing there. 'Living' is readable modern
    English while retaining the durative sense.
- source_word: הַיֹּשְׁבִים
  chosen: those living
  alternatives:
  - those dwelling
  - namely those living
  lexicon: HALOT
  rationale: The repeated participle introduces a more specific apposition listing
    settlement locations. 'Those living' preserves the repetition without sounding
    wooden.
- source_word: מִגְדֹּל
  chosen: Migdol
  rationale: Place name transliterated rather than translated.
- source_word: תַחְפַּנְחֵס
  chosen: Tahpanhes
  alternatives:
  - Tahpanhes/Taphanhes
  rationale: Standard English transliteration of the place name.
- source_word: נֹף
  chosen: Noph
  alternatives:
  - Memphis
  lexicon: HALOT
  rationale: The Hebrew text has the name Noph. Following the philosophy of transliterating
    names, the main text keeps 'Noph'; the more familiar historical identification
    'Memphis' is preserved in a footnote.
- source_word: אֶרֶץ פַּתְרוֹס
  chosen: the land of Pathros
  alternatives:
  - Pathros
  lexicon: HALOT
  rationale: Retains the explicit noun 'land' present in Hebrew rather than reducing
    it to the bare place name.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - thus saying,
  lexicon: HALOT
  rationale: Standard introductory formula for the following speech, which begins
    in the next verse; retained here because it is present in the Hebrew verse.
