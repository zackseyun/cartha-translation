id: JER.44.8
reference: Jeremiah 44:8
source:
  edition: WLC
  text: לְ/הַכְעִסֵ֨/נִי֙ בְּ/מַעֲשֵׂ֣י יְדֵי/כֶ֔ם לְ/קַטֵּ֞ר לֵ/אלֹהִ֤ים אֲחֵרִים֙
    בְּ/אֶ֣רֶץ מִצְרַ֔יִם אֲשֶׁר אַתֶּ֥ם בָּאִ֖ים לָ/ג֣וּר שָׁ֑ם לְמַ֨עַן֙ הַכְרִ֣ית
    לָ/כֶ֔ם וּ/לְמַ֤עַן הֱיֽוֹתְ/כֶם֙ לִ/קְלָלָ֣ה וּ/לְ/חֶרְפָּ֔ה בְּ/כֹ֖ל גּוֹיֵ֥י
    הָ/אָֽרֶץ־׃
translation:
  text: provoking me to anger by the works of your hands, by burning incense to other
    gods in the land of Egypt, where you are going to reside, so that you may cut
    yourselves off and so that you may become a curse and a reproach among all the
    nations of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where you are going to sojourn'; the Hebrew verb can emphasize residing
      as a foreigner.
    reason: lexical_alternative
  - marker: b
    text: Or 'so that you may destroy yourselves' or, by implication in context, 'so
      that you may be cut off.'
    reason: alternative_reading
  - marker: c
    text: '''A curse'' may also mean ''an object of cursing,'' that is, a people invoked
      in curse formulas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַכְעִסֵנִי
  chosen: provoking me to anger
  alternatives:
  - to provoke me
  - to anger me
  lexicon: HALOT
  rationale: Hiphil infinitive of כעס with 1cs suffix expresses causing anger. 'Provoking
    me to anger' preserves both the causative force and the ongoing/resultative sense
    in context.
- source_word: בְּמַעֲשֵׂי יְדֵיכֶם
  chosen: by the works of your hands
  alternatives:
  - with the work of your hands
  - through what your hands have made
  lexicon: HALOT
  rationale: A common Hebrew idiom for deeds or manufactured idols. Here the following
    infinitive 'to burn incense to other gods' suggests cultic acts and likely idol-related
    practice; 'works of your hands' preserves the idiom without over-specifying.
- source_word: לְקַטֵּר
  chosen: by burning incense
  alternatives:
  - to burn incense
  - by making offerings smoke
  lexicon: HALOT
  rationale: The piel infinitive of קטר in cultic contexts commonly refers to burning
    incense or sacrificial smoke. 'Burning incense' is the most natural and contextually
    fitting English rendering here.
- source_word: לֵאלֹהִים אֲחֵרִים
  chosen: to other gods
  alternatives:
  - to foreign gods
  lexicon: HALOT
  rationale: אֲחֵרִים means 'other'; while 'foreign gods' is interpretive and sometimes
    contextually apt, 'other gods' is the more direct rendering.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: Retains אֶרֶץ explicitly as 'land,' which is natural English and preserves
    the locative emphasis.
- source_word: אֲשֶׁר אַתֶּם בָּאִים לָגוּר שָׁם
  chosen: where you are going to reside
  alternatives:
  - where you are going to sojourn
  - where you are entering to dwell as foreigners
  lexicon: HALOT
  rationale: גור often carries the sense of residing as a foreigner/sojourner. 'Reside'
    is readable modern English; the foreign-resident nuance is real but not essential
    to make explicit in the main text here.
- source_word: לְמַעַן הַכְרִית לָכֶם
  chosen: so that you may cut yourselves off
  alternatives:
  - so that you may destroy yourselves
  - so that he may cut you off
  lexicon: HALOT
  rationale: The infinitive construct of כרת after לְמַעַן expresses result/purpose.
    With לָכֶם, the phrase is reflexive/for-your-own-harm in force. 'Cut yourselves
    off' preserves the Hebrew idiom and avoids importing an explicit divine subject
    not stated in this clause.
- source_word: וּלְמַעַן הֱיוֹתְכֶם
  chosen: and so that you may become
  alternatives:
  - and in order for you to be
  lexicon: HALOT
  rationale: Infinitive of היה with suffix after וּלְמַעַן gives a result/purpose
    clause. 'Become' fits the movement into a state signaled by the context.
- source_word: לִקְלָלָה
  chosen: a curse
  alternatives:
  - an object of cursing
  lexicon: HALOT
  rationale: The noun can denote either the curse itself or an object used in cursing
    formulas. 'A curse' is concise and idiomatic; the fuller nuance is preserved by
    context and footnote-worthy alternative.
- source_word: וּלְחֶרְפָּה
  chosen: a reproach
  alternatives:
  - a disgrace
  - an object of scorn
  lexicon: HALOT
  rationale: חרפה denotes reproach, disgrace, or taunt. 'Reproach' is a standard,
    sufficiently transparent rendering that preserves the covenantal-shame register.
- source_word: בְּכֹל גּוֹיֵי הָאָרֶץ
  chosen: among all the nations of the earth
  alternatives:
  - among all the nations of the land
  lexicon: HALOT
  rationale: הָאָרֶץ here is best taken in the broad sense 'earth/world' given the
    plural 'all the nations.' 'Among' renders the social sphere naturally in English.
