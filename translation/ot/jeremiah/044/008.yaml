theological_decisions:
- issue: Agency in לְמַעַן הַכְרִית לָכֶם
  chosen_reading: 'reflexive/resultative: ''so that you may cut yourselves off'''
  alternative_readings:
  - 'divine agency implied: ''so that I may cut you off'''
  - 'passive/resultative: ''so that you may be cut off'''
  rationale: The Hebrew clause lacks an explicit new subject and follows directly
    from the people's idolatrous actions. Rendering it reflexively preserves the syntax
    and emphasizes their culpability without excluding divine judgment as the larger
    context. This avoids importing a subject not overtly present in the clause.
