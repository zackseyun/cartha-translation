id: JER.44.5
reference: Jeremiah 44:5
source:
  edition: WLC
  text: וְ/לֹ֤א שָֽׁמְעוּ֙ וְ/לֹא הִטּ֣וּ אֶת אָזְנָ֔/ם לָ/שׁ֖וּב מֵ/רָֽעָתָ֑/ם לְ/בִלְתִּ֥י
    קַטֵּ֖ר לֵ/אלֹהִ֥ים אֲחֵרִֽים־־׃
translation:
  text: But they did not listen or incline their ear to turn from their evil and to
    stop making offerings to other gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'to stop burning incense to other gods.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְעוּ
  chosen: did not listen
  alternatives:
  - did not hear
  - did not obey
  lexicon: HALOT
  rationale: שׁמע commonly ranges from hearing to heeding/obeying. In this prophetic
    rebuke, the sense is not mere auditory reception but refusal to heed the prophetic
    message. 'Listen' preserves that force without over-specifying 'obey.'
- source_word: הִטּוּ אֶת אָזְנָם
  chosen: incline their ear
  alternatives:
  - turn their ear
  - pay attention
  lexicon: HALOT
  rationale: The idiom literally means 'bend/turn their ear' and conveys attentive
    receptivity. 'Incline their ear' is a natural English rendering that preserves
    the metaphor and solemn register.
- source_word: לָשׁוּב
  chosen: to turn
  alternatives:
  - to return
  - to repent
  lexicon: HALOT
  rationale: שׁוב here governs the phrase 'from their evil' and denotes turning away
    from wrongdoing. 'Turn' is broad enough to preserve the Hebrew without importing
    the fuller theological term 'repent' into the main text.
- source_word: מֵרָעָתָם
  chosen: from their evil
  alternatives:
  - from their wickedness
  - from their evil deeds
  lexicon: HALOT
  rationale: רָעָה can denote evil, wickedness, or harmful conduct. 'Their evil' is
    concise and sufficiently comprehensive, covering both disposition and conduct
    in context.
- source_word: לְבִלְתִּי קַטֵּר
  chosen: to stop making offerings
  alternatives:
  - so as not to burn incense
  - to cease offering sacrifices
  lexicon: HALOT
  rationale: קטר in this cultic context often refers specifically to burning incense
    or making smoke offerings. Because English readers may take 'burn incense' too
    narrowly and the object is worship to other gods, 'making offerings' communicates
    the cultic act clearly. The more literal alternative is preserved in a footnote.
- source_word: לֵאלֹהִים אֲחֵרִים
  chosen: to other gods
  alternatives:
  - for other gods
  lexicon: HALOT
  rationale: The preposition ל marks direction or dedication in worship. 'To other
    gods' is idiomatic in English and accurately conveys idolatrous devotion.
