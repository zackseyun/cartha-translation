theological_decisions:
- issue: Rendering of cultic verb קטר in an idolatry context
  chosen_reading: to stop making offerings to other gods
  alternative_readings:
  - to stop burning incense to other gods
  rationale: The Hebrew verb can be rendered more literally as 'burn incense,' but
    in prophetic denunciations it can function as a broader cultic shorthand. The
    chosen rendering aims for optimal equivalence and readability while preserving
    the idolatrous worship sense; the more literal rendering is preserved in a footnote
    for auditability.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve alternatives
    in footnotes where ambiguity is genuine.'
