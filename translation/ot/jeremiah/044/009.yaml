theological_decisions:
- issue: Moral sense of רָעוֹת
  chosen_reading: Rendered concretely as 'evil deeds' rather than abstract 'evils.'
  alternative_readings:
  - evils
  - wicked acts
  rationale: The verse catalogs culpable actions by various groups and then qualifies
    them with 'which they did,' favoring an action-oriented rendering. This avoids
    flattening the accusation into mere abstract evil.
- issue: Gendered kinship term אֲבוֹתֵיכֶם
  chosen_reading: Translated 'your fathers.'
  alternative_readings:
  - your ancestors
  rationale: Following the gender-accurate principle, the masculine familial term
    is preserved rather than neutralized. In context it refers to forefathers specifically
    within Judah's generational guilt.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Collective reference of נָשָׁיו after 'kings of Judah'
  chosen_reading: Translated 'their wives.'
  alternative_readings:
  - his wives
  rationale: English requires agreement with the collective plural antecedent 'kings.'
    This is a grammatical smoothing, not a theological alteration, and best represents
    the distributive sense intended in context.
