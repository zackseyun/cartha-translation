id: JER.44.9
reference: Jeremiah 44:9
source:
  edition: WLC
  text: הַֽ/שְׁכַחְתֶּם֩ אֶת רָע֨וֹת אֲבוֹתֵי/כֶ֜ם וְ/אֶת רָע֣וֹת מַלְכֵ֣י יְהוּדָ֗ה
    וְ/אֵת֙ רָע֣וֹת נָשָׁ֔י/ו וְ/אֵת֙ רָעֹ֣תֵ/כֶ֔ם וְ/אֵ֖ת רָעֹ֣ת נְשֵׁי/כֶ֑ם אֲשֶׁ֤ר
    עָשׂוּ֙ בְּ/אֶ֣רֶץ יְהוּדָ֔ה וּ/בְ/חֻצ֖וֹת יְרוּשָׁלִָֽם־־׀׃
translation:
  text: Have you forgotten the evil deeds of your fathers, the evil deeds of the kings
    of Judah, the evil deeds of their wives, your own evil deeds, and the evil deeds
    of your wives, which they did in the land of Judah and in the streets of Jerusalem?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally 'his wives'; the singular suffix likely functions collectively
      after 'the kings of Judah,' hence 'their wives.'
    reason: lexical_alternative
  - marker: b
    text: Or 'evils' / 'evil things'; the translation renders the term as 'evil deeds'
      because the verse speaks of acts 'which they did.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְׁכַחְתֶּם
  chosen: Have you forgotten
  alternatives:
  - Did you forget
  - Have you forgotten about
  lexicon: HALOT
  rationale: Rendered as a present-result English perfect in an interrogative to reflect
    the Hebrew rhetorical question about a past action with present moral significance.
    'Have you forgotten' is idiomatic and preserves the rebuke.
- source_word: רָעוֹת
  chosen: evil deeds
  alternatives:
  - evils
  - wickednesses
  - evil things
  lexicon: HALOT
  rationale: The plural noun here refers concretely to acts committed, not merely
    abstract evil. 'Evil deeds' makes explicit the behavioral sense, especially since
    the clause later says 'which they did.'
- source_word: אֲבוֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: Kept the more literal 'fathers' to match the Hebrew and preserve the
    familial/generational force. 'Ancestors' is possible but less direct.
- source_word: מַלְכֵי יְהוּדָה
  chosen: the kings of Judah
  lexicon: HALOT
  rationale: Straightforward genitival rendering.
- source_word: נָשָׁיו
  chosen: their wives
  alternatives:
  - his wives
  lexicon: HALOT
  rationale: Although the suffix is morphologically singular ('his wives'), in context
    it follows the plural 'kings of Judah' and functions collectively. English 'their
    wives' communicates the collective reference naturally. The singular form likely
    reflects a collective or distributive construction.
- source_word: רָעֹתֵיכֶם
  chosen: your own evil deeds
  alternatives:
  - your evil deeds
  lexicon: HALOT
  rationale: Added 'own' for natural emphasis corresponding to the direct address
    and contrast with prior generations and rulers; this does not add new content
    but clarifies the rhetorical progression.
- source_word: נְשֵׁיכֶם
  chosen: your wives
  lexicon: HALOT
  rationale: Literal rendering.
- source_word: אֲשֶׁר עָשׂוּ
  chosen: which they did
  alternatives:
  - which they committed
  lexicon: HALOT
  rationale: Retains the common Hebrew verb עשה with a natural English equivalent.
    'Committed' would fit the moral context, but 'did' stays closer to the source
    while remaining clear.
- source_word: בְּאֶרֶץ יְהוּדָה
  chosen: in the land of Judah
  alternatives:
  - in the territory of Judah
  lexicon: HALOT
  rationale: '''Land'' is the standard rendering for אֶרֶץ here and preserves the
    geographic-covenantal resonance.'
- source_word: בְּחֻצוֹת יְרוּשָׁלִָם
  chosen: in the streets of Jerusalem
  alternatives:
  - in the squares of Jerusalem
  - in the open places of Jerusalem
  lexicon: HALOT
  rationale: חֻצוֹת commonly denotes streets or public places within a city. 'Streets'
    is the most natural modern English rendering, while still covering the public
    urban setting.
