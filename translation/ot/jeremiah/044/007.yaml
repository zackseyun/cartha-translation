theological_decisions:
- issue: Rendering of שְׁאֵרִית
  chosen_reading: remnant
  alternative_readings:
  - survivor group
  - remainder
  rationale: Although 'remainder' is possible lexically, 'remnant' preserves the prophetic
    resonance of the term in Jeremiah without importing extra theology beyond the
    text. The immediate context is judgment on Judah's surviving population.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
