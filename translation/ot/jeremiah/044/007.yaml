id: JER.44.7
reference: Jeremiah 44:7
source:
  edition: WLC
  text: וְ/עַתָּ֡ה כֹּֽה אָמַ֣ר יְהוָה֩ אֱלֹהֵ֨י צְבָא֜וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֗ל לָ/מָה֩
    אַתֶּ֨ם עֹשִׂ֜ים רָעָ֤ה גְדוֹלָה֙ אֶל נַפְשֹׁ֣תֵ/כֶ֔ם לְ/הַכְרִ֨ית לָ/כֶ֧ם אִישׁ
    וְ/אִשָּׁ֛ה עוֹלֵ֥ל וְ/יוֹנֵ֖ק מִ/תּ֣וֹךְ יְהוּדָ֑ה לְ/בִלְתִּ֛י הוֹתִ֥יר לָ/כֶ֖ם
    שְׁאֵרִֽית־־־׃
translation:
  text: 'And now, thus says the LORD, the God of hosts, the God of Israel: Why are
    you doing great harm to yourselves, to cut off from among Judah man and woman,
    child and infant, leaving yourselves no remnant?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are you doing this great evil to yourselves?' The Hebrew רָעָה can mean
      either moral evil or harmful disaster; both ideas are closely related here.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD.' This
    also fits established English Bible convention while reflecting the covenant name
    without transliteration in the main text.
- source_word: אֱלֹהֵי צְבָאוֹת
  chosen: the God of hosts
  alternatives:
  - God of armies
  - God of heavenly armies
  lexicon: HALOT
  rationale: Rendered formally as 'the God of hosts' to preserve the title's traditional
    and lexical force. 'Hosts' can denote armies/heavenly forces, but the more literal
    title is preferable here.
- source_word: לָמָה
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Simple interrogative preserved directly.
- source_word: עֹשִׂים רָעָה גְדוֹלָה אֶל נַפְשֹׁתֵכֶם
  chosen: are you doing great harm to yourselves
  alternatives:
  - are you doing great evil against yourselves
  - are you doing this great evil to yourselves
  lexicon: HALOT
  rationale: רָעָה can mean evil, harm, or disaster depending on context. Because
    the phrase is reflexive and followed by the result clause of self-destruction,
    'great harm to yourselves' best captures the practical sense without denying the
    moral dimension. 'Yourselves' reflects נַפְשֹׁתֵכֶם idiomatically rather than
    woodenly as 'your souls/lives.'
- source_word: נַפְשֹׁתֵכֶם
  chosen: yourselves
  alternatives:
  - your lives
  - your souls
  lexicon: HALOT
  rationale: נֶפֶשׁ in Hebrew often refers to the person or life, not merely the immaterial
    soul. In this idiom, English 'yourselves' is the most natural and accurate rendering.
- source_word: לְהַכְרִית
  chosen: to cut off
  alternatives:
  - to destroy
  - to wipe out
  lexicon: HALOT
  rationale: The Hiphil of כרת commonly means 'cut off' in covenantal/judgment contexts.
    This preserves the Hebrew metaphor and the severity of the action.
- source_word: אִישׁ וְאִשָּׁה
  chosen: man and woman
  alternatives:
  - male and female
  - men and women
  lexicon: HALOT
  rationale: Singular distributive forms are best represented by the singular pair
    'man and woman,' preserving the Hebrew wording while conveying comprehensiveness.
- source_word: עוֹלֵל וְיוֹנֵק
  chosen: child and infant
  alternatives:
  - little one and nursing baby
  - children and infants
  lexicon: HALOT
  rationale: עוֹלֵל denotes a small child; יוֹנֵק is literally one who suckles, hence
    an infant/nursing baby. 'Child and infant' is natural modern English and preserves
    the age range.
- source_word: מִתּוֹךְ יְהוּדָה
  chosen: from among Judah
  alternatives:
  - from the midst of Judah
  - out of Judah
  lexicon: HALOT
  rationale: מִתּוֹךְ conveys removal from the midst of a people/place. 'From among
    Judah' communicates that the population of Judah is being eradicated from within.
- source_word: לְבִלְתִּי הוֹתִיר לָכֶם שְׁאֵרִית
  chosen: leaving yourselves no remnant
  alternatives:
  - so as to leave yourselves no remnant
  - without leaving yourselves a remnant
  lexicon: HALOT
  rationale: This infinitival/result construction expresses the outcome of their actions.
    'No remnant' preserves the important prophetic term שְׁאֵרִית, which carries both
    literal and theological significance in Jeremiah.
