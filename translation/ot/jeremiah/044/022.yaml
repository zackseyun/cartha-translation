id: JER.44.22
reference: Jeremiah 44:22
source:
  edition: WLC
  text: וְ/לֹֽא יוּכַל֩ יְהוָ֨ה ע֜וֹד לָ/שֵׂ֗את מִ/פְּנֵי֙ רֹ֣עַ מַעַלְלֵי/כֶ֔ם מִ/פְּנֵ֥י הַ/תּוֹעֵבֹ֖ת אֲשֶׁ֣ר עֲשִׂיתֶ֑ם וַ/תְּהִ֣י אַ֠רְצְ/כֶם לְ/חָרְבָּ֨ה וּ/לְ/שַׁמָּ֧ה וְ/לִ/קְלָלָ֛ה מֵ/אֵ֥ין יוֹשֵׁ֖ב כְּ/הַ/יּ֥וֹם הַ/זֶּֽה־׃
translation:
  text: And Yahweh could no longer bear it because of the evil of your deeds, because of the abominations that you committed. So your land became a ruin, a desolation, and a curse, without inhabitant, as it is this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'could no longer endure.' The Hebrew literally says 'could no longer bear,' expressing that the LORD's forbearance had reached its limit because of their evil deeds and abominations.
    reason: lexical_alternative
  - marker: b
    text: '''A desolation'' may also carry the sense of ''an object of horror/astonishment.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'an object of cursing,' that is, something invoked as a formula of curse.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name while following established English convention.
- source_word: יוּכַל ... לָשֵׂאת
  chosen: could ... bear it
  alternatives:
  - was able ... to endure
  - could ... carry
  lexicon: HALOT
  rationale: The idiom 'be able to bear/endure' best fits the context of divine forbearance reaching its limit. 'It' is supplied in English because the Hebrew infinitive 'to bear' is used absolutely after 'could no longer,' with the cause specified by the following phrases.
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - any longer
  - still
  lexicon: HALOT
  rationale: With the negation and modal verb, עוֹד naturally yields 'no longer/any longer,' expressing the end of continued tolerance.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - on account of
  lexicon: HALOT
  rationale: In this causal construction, the phrase indicates reason rather than spatial sense.
- source_word: רֹעַ מַעַלְלֵיכֶם
  chosen: the evil of your deeds
  alternatives:
  - the wickedness of your actions
  - your evil practices
  lexicon: HALOT
  rationale: 'Retains the genitival structure and moral force: not merely unfortunate acts, but evil deeds.'
- source_word: הַתּוֹעֵבוֹת
  chosen: the abominations
  alternatives:
  - the detestable things
  - the abhorrent practices
  lexicon: HALOT
  rationale: '''Abominations'' preserves the strong covenantal and cultic offense conveyed by תועבות, especially in Jeremiah.'
- source_word: עֲשִׂיתֶם
  chosen: you committed
  alternatives:
  - you did
  - you performed
  lexicon: HALOT
  rationale: With 'abominations,' English idiom prefers 'committed,' which also preserves the moral gravity.
- source_word: וַתְּהִי אַרְצְכֶם
  chosen: So your land became
  alternatives:
  - and your land became
  - therefore your land became
  lexicon: HALOT
  rationale: The waw-consecutive advances the result of the prior clause. 'So' makes the consequential sense clear in natural English.
- source_word: לְחָרְבָּה
  chosen: a ruin
  alternatives:
  - waste
  - ruins
  lexicon: HALOT
  rationale: Conveys devastation of the land in a concise, natural singular predicate.
- source_word: וּלְשַׁמָּה
  chosen: a desolation
  alternatives:
  - an object of horror
  - astonishment
  lexicon: HALOT
  rationale: The noun can carry the sense of desolation and appalled astonishment; here the land's devastated state is primary, so 'desolation' is chosen, with the broader nuance preserved as an alternative.
- source_word: וְלִקְלָלָה
  chosen: a curse
  alternatives:
  - an object of cursing
  lexicon: HALOT
  rationale: The land has become something invoked in curses or marked by curse; 'a curse' is the most compact English rendering, with the idiomatic nuance noted as an alternative.
- source_word: מֵאֵין יוֹשֵׁב
  chosen: without inhabitant
  alternatives:
  - with no one living there
  - without anyone dwelling there
  lexicon: HALOT
  rationale: This compact rendering closely reflects the Hebrew idiom of total depopulation while remaining intelligible in English.
- source_word: כְּהַיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as at this day
  - as is the case today
  lexicon: HALOT
  rationale: A standard Hebrew temporal comparison meaning the condition remains evident at the present time. 'As it is this day' preserves the biblical force without archaic excess.
