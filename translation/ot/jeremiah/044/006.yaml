id: JER.44.6
reference: Jeremiah 44:6
source:
  edition: WLC
  text: וַ/תִּתַּ֤ךְ חֲמָתִ/י֙ וְ/אַפִּ֔/י וַ/תִּבְעַר֙ בְּ/עָרֵ֣י יְהוּדָ֔ה וּ/בְ/חֻצ֖וֹת
    יְרֽוּשָׁלִָ֑ם וַ/תִּהְיֶ֛ינָה לְ/חָרְבָּ֥ה לִ/שְׁמָמָ֖ה כַּ/יּ֥וֹם הַ/זֶּֽה׃ס
translation:
  text: So my wrath and my anger were poured out and burned in the cities of Judah
    and in the streets of Jerusalem, and they became a ruin and a desolation, as they
    are this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'squares' or 'open places' of Jerusalem.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתַּךְ
  chosen: were poured out
  alternatives:
  - was poured out
  - was unleashed
  lexicon: HALOT
  rationale: From נתך in the Niphal/Qal-like wayyiqtol context meaning to be poured
    out. English plural agreement is used because the compound subject 'my wrath and
    my anger' follows. 'Poured out' preserves the metaphor of divine fury being discharged
    rather than flattening it to a generic 'came.'
- source_word: חֲמָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my heat
  lexicon: HALOT
  rationale: חֵמָה commonly denotes burning wrath/fury. 'Wrath' fits prophetic judgment
    diction in clear modern English and pairs well with the following אַף without
    unnecessary redundancy.
- source_word: וְאַפִּי
  chosen: and my anger
  alternatives:
  - and my nose
  - and my fury
  lexicon: HALOT
  rationale: אַף literally means 'nose' and idiomatically 'anger.' The idiomatic sense
    is required here. Rendering it as 'anger' preserves the Hebrew parallelism with
    חֵמָה while remaining natural English.
- source_word: וַתִּבְעַר
  chosen: burned
  alternatives:
  - blazed
  - kindled
  lexicon: HALOT
  rationale: בער means to burn or blaze. 'Burned' is the most direct and idiomatic
    continuation of the metaphor after 'were poured out,' indicating the active effect
    of divine anger in judgment.
- source_word: בְּעָרֵי יְהוּדָה
  chosen: in the cities of Judah
  alternatives:
  - against the cities of Judah
  lexicon: HALOT
  rationale: The preposition ב normally means 'in' here, locating where the burning
    judgment took effect. 'Cities of Judah' is the straightforward construct rendering.
- source_word: וּבְחֻצוֹת יְרוּשָׁלִָם
  chosen: and in the streets of Jerusalem
  alternatives:
  - and in the squares of Jerusalem
  - and in the open places of Jerusalem
  lexicon: HALOT
  rationale: חֻצוֹת can denote streets, squares, or open places. 'Streets' is the
    most natural English in this judgment context, though 'squares' is lexically possible
    and worth preserving as an alternative.
- source_word: וַתִּהְיֶינָה
  chosen: and they became
  alternatives:
  - and they were
  lexicon: HALOT
  rationale: The feminine plural verb refers back to the cities/streets as affected
    places. 'Became' better captures the resulting state after judgment than a simple
    stative 'were.'
- source_word: לְחָרְבָּה
  chosen: a ruin
  alternatives:
  - waste
  - ruins
  lexicon: HALOT
  rationale: חָרְבָּה denotes a ruined or wasted condition. Singular 'a ruin' works
    idiomatically with the following paired noun and reflects the resultant state.
- source_word: לִשְׁמָמָה
  chosen: and a desolation
  alternatives:
  - and a waste
  - and an object of horror
  lexicon: HALOT
  rationale: שְׁמָמָה often denotes desolation, devastation, or appalled ruin. 'Desolation'
    is the standard clear rendering and preserves the prophetic register.
- source_word: כַּיּוֹם הַזֶּה
  chosen: as they are this day
  alternatives:
  - as at this day
  - as it is today
  lexicon: HALOT
  rationale: This idiom points to the present observable condition as confirmation
    of the judgment. 'As they are this day' keeps the plural reference to the devastated
    places explicit and sounds natural in modern English.
