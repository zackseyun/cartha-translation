theological_decisions:
- issue: Rendering of divine judgment language
  chosen_reading: Retained the concrete metaphors 'wrath,' 'anger,' 'poured out,'
    and 'burned' without softening them.
  alternative_readings:
  - Used more interpretive language such as 'punishment came' or 'judgment fell'
  rationale: The Hebrew emphasizes God's personal, active judgment through vivid metaphors.
    Preserving that language maintains the theological force of the text without importing
    additional doctrinal explanation.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Reference of the final plural verb and pronoun
  chosen_reading: Applied 'they became' / 'as they are this day' to the judged locations
    collectively.
  alternative_readings:
  - 'Impersonal singular: ''it became ... as it is today'''
  rationale: The Hebrew feminine plural verb naturally points to the plural local
    referents in view. This keeps the syntax transparent and avoids collapsing the
    imagery into an abstract singular state.
  doctrine_reference: Translation philosophy §1
