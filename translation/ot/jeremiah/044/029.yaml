theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the doctrinal translation
    policy and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether לְרָעָה should be rendered with 'evil' language
  chosen_reading: for harm
  alternative_readings:
  - for evil
  - for disaster
  - for calamity
  rationale: In this context the phrase describes punitive outcome, not moral evil
    in God. 'For harm' preserves the sense of adverse judgment while avoiding a misleading
    implication about God's moral character.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
