id: JER.44.29
reference: Jeremiah 44:29
source:
  edition: WLC
  text: וְ/זֹאת לָ/כֶ֤ם הָ/אוֹת֙ נְאֻם יְהוָ֔ה כִּֽי פֹקֵ֥ד אֲנִ֛י עֲלֵי/כֶ֖ם בַּ/מָּק֣וֹם
    הַ/זֶּ֑ה לְמַ֨עַן֙ תֵּֽדְע֔וּ כִּי֩ ק֨וֹם יָק֧וּמוּ דְבָרַ֛/י עֲלֵי/כֶ֖ם לְ/רָעָֽה־־־׃ס
translation:
  text: And this will be the sign for you, declares the LORD, that I am punishing
    you in this place, so that you may know that my words will surely stand against
    you for harm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my words will surely come to pass against you for disaster.' The Hebrew
      literally says 'my words will surely stand against you for harm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזֹאת
  chosen: And this
  alternatives:
  - And this is
  - Now this
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces the sign statement. 'And
    this' preserves the discourse linkage without over-translating an implied verb.
- source_word: הָאוֹת
  chosen: the sign
  alternatives:
  - the token
  - the proof
  lexicon: HALOT
  rationale: אוֹת commonly means 'sign' in prophetic contexts, indicating a confirming
    marker of divine action.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This standard prophetic formula is best rendered idiomatically as 'declares
    the LORD.' Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's contested-terms policy for the divine name.
- source_word: כִּי פֹקֵד אֲנִי עֲלֵיכֶם
  chosen: that I am punishing you
  alternatives:
  - that I am visiting you
  - that I am attending to you
  - that I am bringing judgment on you
  lexicon: HALOT
  rationale: פקד has a broad semantic range including 'visit/attend/punish.' In this
    judgment context, with the outcome specified as 'for harm,' 'punishing' makes
    the negative sense explicit in natural English.
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: in this place
  alternatives:
  - at this place
  - in this location
  lexicon: HALOT
  rationale: A straightforward locative phrase; 'in this place' is idiomatic and preserves
    the deictic force.
- source_word: לְמַעַן תֵּדְעוּ
  chosen: so that you may know
  alternatives:
  - in order that you may know
  - so that you will know
  lexicon: HALOT
  rationale: לְמַעַן marks purpose. 'So that you may know' preserves the purposive
    nuance without sounding wooden.
- source_word: כִּי קוֹם יָקוּמוּ
  chosen: will surely stand
  alternatives:
  - will certainly stand
  - will indeed be established
  - will surely come to pass
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies certainty. Since
    the subject is 'my words,' 'stand' preserves the underlying verb קום more closely
    than the more interpretive 'come to pass.'
- source_word: דְבָרַי
  chosen: my words
  alternatives:
  - my word
  - my pronouncements
  lexicon: HALOT
  rationale: The plural is explicit in Hebrew and should be retained.
- source_word: עֲלֵיכֶם
  chosen: against you
  alternatives:
  - over you
  - upon you
  lexicon: HALOT
  rationale: With hostile/judicial force in context, 'against you' communicates the
    adversative sense more clearly than a literal 'upon you.'
- source_word: לְרָעָה
  chosen: for harm
  alternatives:
  - for evil
  - for disaster
  - for calamity
  lexicon: HALOT
  rationale: רָעָה in judgment contexts often denotes calamity/disaster rather than
    moral evil. 'For harm' is concise, natural, and preserves the negative result
    without implying moral evil in God.
