id: JER.44.14
reference: Jeremiah 44:14
source:
  edition: WLC
  text: וְ/לֹ֨א יִהְיֶ֜ה פָּלִ֤יט וְ/שָׂרִיד֙ לִ/שְׁאֵרִ֣ית יְהוּדָ֔ה הַ/בָּאִ֥ים
    לָ/גֽוּר שָׁ֖ם בְּ/אֶ֣רֶץ מִצְרָ֑יִם וְ/לָ/שׁ֣וּב אֶ֣רֶץ יְהוּדָ֗ה אֲשֶׁר הֵ֜מָּה
    מְנַשְּׂאִ֤ים אֶת נַפְשָׁ/ם֙ לָ/שׁוּב֙ לָ/שֶׁ֣בֶת שָׁ֔ם כִּ֥י לֹֽא יָשׁ֖וּבוּ
    כִּ֥י אִם פְּלֵטִֽים־׀־־־־׃ס
translation:
  text: So there will be no fugitive or survivor for the remnant of Judah who are
    coming to sojourn there in the land of Egypt and then to return to the land of
    Judah, to which they are lifting up their soul to return and dwell there; for
    they will not return, except for fugitives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''lifting up their soul''—that is, longing or setting their
      desire to return.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּלִיט
  chosen: fugitive
  alternatives:
  - escapee
  - one who escapes
  lexicon: HALOT
  rationale: The noun denotes one who has escaped or gotten away. 'Fugitive' fits
    the disaster context and pairs naturally with שָׂרִיד. It also matches the later
    plural פְּלֵטִים in the exception clause.
- source_word: שָׂרִיד
  chosen: survivor
  alternatives:
  - remnant one
  - survivor left alive
  lexicon: HALOT
  rationale: This term commonly refers to one left remaining after judgment or catastrophe.
    'Survivor' is idiomatic and preserves the distinction from פָּלִיט without unnecessary
    woodenness.
- source_word: שְׁאֵרִית יְהוּדָה
  chosen: the remnant of Judah
  alternatives:
  - the remainder of Judah
  lexicon: HALOT
  rationale: '''Remnant'' is the standard and contextually appropriate rendering for
    the surviving group of Judah. Here it is descriptive rather than necessarily carrying
    a positive theological remnant motif.'
- source_word: הַבָּאִים לָגוּר שָׁם
  chosen: who are coming to sojourn there
  alternatives:
  - who have come to reside there
  - who are entering to live there as aliens
  lexicon: HALOT
  rationale: גור often means to reside as a sojourner or temporary resident. 'Sojourn'
    preserves the nuance better than the flatter 'live,' while remaining readable.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: The fuller phrase is retained because אֶרֶץ is explicit in the Hebrew
    and contributes to the formal solemnity of the judgment oracle.
- source_word: וְלָשׁוּב אֶרֶץ יְהוּדָה
  chosen: and then to return to the land of Judah
  alternatives:
  - and to return to the land of Judah
  lexicon: HALOT
  rationale: The prefixed infinitive continues the description of their purpose. 'Then'
    lightly clarifies sequence in English without adding content.
- source_word: אֲשֶׁר הֵמָּה מְנַשְּׂאִים אֶת נַפְשָׁם
  chosen: to which they are lifting up their soul
  alternatives:
  - for which they long
  - to which they set their desire
  - to which they direct their whole being
  lexicon: HALOT
  rationale: Literally the idiom is 'lift up their soul.' I preserved the metaphor
    in the main text because it is transparent enough in context and avoids over-paraphrasing
    the Hebrew expression of desire or aspiration.
- source_word: נֶפֶשׁ
  chosen: soul
  alternatives:
  - life
  - self
  - whole being
  lexicon: HALOT
  rationale: Within the idiom נשׂא את־נפשׁ, 'soul' preserves the Hebrew imagery. A
    more interpretive rendering such as 'desire' is captured in a footnote rather
    than replacing the metaphor in the text.
- source_word: לָשׁוּב לָשֶׁבֶת שָׁם
  chosen: to return and dwell there
  alternatives:
  - to go back and live there
  - to return to settle there
  lexicon: HALOT
  rationale: The paired infinitives express the hoped-for outcome. 'Dwell' is slightly
    more formal than 'live' and suits prophetic style.
- source_word: כִּי לֹא יָשׁוּבוּ
  chosen: for they will not return
  alternatives:
  - because they will not return
  lexicon: HALOT
  rationale: כִּי here introduces the reason for the preceding statement. 'For' is
    concise and natural in English prophetic discourse.
- source_word: כִּי אִם פְּלֵטִים
  chosen: except for fugitives
  alternatives:
  - except a few escapees
  - except those who escape
  lexicon: HALOT
  rationale: 'The phrase marks an exception: none will return except escaped ones.
    ''Fugitives'' keeps lexical consistency with פָּלִיט earlier in the verse, though
    the plural is used here.'
