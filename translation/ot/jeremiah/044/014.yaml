theological_decisions:
- issue: Whether 'remnant of Judah' should be rendered with a positive theological
    sense
  chosen_reading: Rendered as 'the remnant of Judah' in a descriptive-historical sense
    without implying a faithful remnant theology.
  alternative_readings:
  - A more theologically loaded 'faithful remnant of Judah'
  rationale: In this context the phrase refers to the surviving Judeans in Egypt under
    judgment, not to a positively marked covenant remnant. The translation preserves
    the lexical term without importing theological approval.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make.'
