id: JER.44.17
reference: Jeremiah 44:17
source:
  edition: WLC
  text: כִּ֩י עָשֹׂ֨ה נַעֲשֶׂ֜ה אֶֽת כָּל הַ/דָּבָ֣ר אֲשֶׁר יָצָ֣א מִ/פִּ֗י/נוּ לְ/קַטֵּ֞ר
    לִ/מְלֶ֣כֶת הַ/שָּׁמַיִם֮ וְ/הַסֵּֽיךְ לָ֣/הּ נְסָכִים֒ כַּ/אֲשֶׁ֨ר עָשִׂ֜ינוּ
    אֲנַ֤חְנוּ וַ/אֲבֹתֵ֨י/נוּ֙ מְלָכֵ֣י/נוּ וְ/שָׂרֵ֔י/נוּ בְּ/עָרֵ֣י יְהוּדָ֔ה וּ/בְ/חֻצ֖וֹת
    יְרוּשָׁלִָ֑ם וַ/נִּֽשְׂבַּֽע לֶ֨חֶם֙ וַ/נִּֽהְיֶ֣ה טוֹבִ֔ים וְ/רָעָ֖ה לֹ֥א רָאִֽינוּ־־׀־־־׃
translation:
  text: 'But we will certainly do every word that has gone out from our mouth: to
    burn incense to the Queen of Heaven and to pour out drink offerings to her, just
    as we and our fathers, our kings and our officials, did in the cities of Judah
    and in the streets of Jerusalem; then we had plenty of bread, prospered, and saw
    no disaster.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we were satisfied with bread' (literally, 'we were filled with bread').
    reason: lexical_alternative
  - marker: b
    text: Or 'fared well' for 'prospered.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: But
  alternatives:
  - Indeed
  - For
  lexicon: HALOT
  rationale: In context this introduces a defiant contrast to Jeremiah's command in
    the previous verse, so adversative 'But' best captures the discourse force in
    English, even though the particle can also mean 'for' or serve as an emphatic
    marker.
- source_word: עָשֹׂה נַעֲשֶׂה
  chosen: we will certainly do
  alternatives:
  - we will surely do
  - doing we will do
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. English
    expresses this naturally with 'will certainly do' rather than a wooden repetition.
- source_word: כָּל הַדָּבָר אֲשֶׁר יָצָא מִפִּינוּ
  chosen: every word that has gone out from our mouth
  alternatives:
  - everything that has gone out of our own mouth
  - every matter that came from our mouth
  lexicon: HALOT
  rationale: דבר can mean 'word' or 'matter'; here the idiom refers to what they themselves
    have vowed or declared. 'Every word' preserves the concrete Hebrew expression
    while remaining idiomatic enough in English.
- source_word: לְקַטֵּר
  chosen: to burn incense
  alternatives:
  - to make offerings of incense
  lexicon: HALOT
  rationale: The verb specifically denotes making smoke/incense offerings in cultic
    context. 'Burn incense' is the standard clear rendering.
- source_word: לִמְלֶכֶת הַשָּׁמַיִם
  chosen: to the Queen of Heaven
  alternatives:
  - to the queen of the heavens
  lexicon: HALOT
  rationale: This is the well-known title of the goddess venerated by the speakers.
    'Queen of Heaven' is the natural English equivalent and preserves the polemical
    force of the title.
- source_word: וְהַסֵּיךְ לָהּ נְסָכִים
  chosen: and to pour out drink offerings to her
  alternatives:
  - and to pour libations to her
  lexicon: HALOT
  rationale: נסך with נסכים is a standard sacrificial expression. 'Drink offerings'
    is more accessible than 'libations' while remaining accurate.
- source_word: כַּאֲשֶׁר עָשִׂינוּ
  chosen: just as ... did
  alternatives:
  - as ... have done
  lexicon: HALOT
  rationale: The comparison looks back to customary past practice. English past tense
    fits the following historical recollection.
- source_word: אֲנַחְנוּ וַאֲבֹתֵינוּ מְלָכֵינוּ וְשָׂרֵינוּ
  chosen: we and our fathers, our kings and our officials
  alternatives:
  - we and our ancestors, our kings and our princes
  lexicon: HALOT
  rationale: אבותינו here refers to forefathers/ancestors, but 'fathers' preserves
    the Hebrew familial rhetoric. שרים can be 'princes,' 'officials,' or 'leaders';
    'officials' best fits the governmental setting in contemporary English.
- source_word: בְּעָרֵי יְהוּדָה וּבְחֻצוֹת יְרוּשָׁלִָם
  chosen: in the cities of Judah and in the streets of Jerusalem
  alternatives:
  - in the towns of Judah and in the squares of Jerusalem
  lexicon: HALOT
  rationale: חוצות can denote open places/streets. 'Streets' is the most natural broad
    rendering here, though 'squares' is possible.
- source_word: וַנִּשְׂבַּע לֶחֶם
  chosen: then we had plenty of bread
  alternatives:
  - and we were satisfied with bread
  - and we had our fill of food
  lexicon: HALOT
  rationale: The idiom literally means 'we were satisfied with bread.' In English,
    'had plenty of bread' conveys material sufficiency while preserving the bread
    imagery.
- source_word: וַנִּהְיֶה טוֹבִים
  chosen: prospered
  alternatives:
  - were well
  - were happy
  - fared well
  lexicon: HALOT
  rationale: The Hebrew literally says 'we were good/well.' In context of claimed
    material well-being, 'prospered' communicates the sense succinctly, though 'fared
    well' is also possible.
- source_word: וְרָעָה לֹא רָאִינוּ
  chosen: and saw no disaster
  alternatives:
  - and experienced no evil
  - and saw no calamity
  lexicon: HALOT
  rationale: רעה here refers to calamity/disaster rather than moral evil. 'Disaster'
    is clear modern English and fits the context of national well-being.
