theological_decisions:
- issue: Rendering of an idolatrous divine title
  chosen_reading: Queen of Heaven
  alternative_readings:
  - queen of the heavens
  rationale: The Hebrew title is rendered straightforwardly as the object of illicit
    worship without softening or importing later theological associations. This is
    a lexical-cultural title, not an endorsement.
