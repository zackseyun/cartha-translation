id: JER.44.2
reference: Jeremiah 44:2
source:
  edition: WLC
  text: כֹּה אָמַ֞ר יְהוָ֤ה צְבָאוֹת֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל אַתֶּ֣ם רְאִיתֶ֗ם אֵ֤ת כָּל הָֽ/רָעָה֙ אֲשֶׁ֤ר הֵבֵ֨אתִי֙ עַל יְר֣וּשָׁלִַ֔ם וְ/עַ֖ל כָּל עָרֵ֣י יְהוּדָ֑ה וְ/הִנָּ֤/ם חָרְבָּה֙ הַ/יּ֣וֹם הַ/זֶּ֔ה וְ/אֵ֥ין בָּ/הֶ֖ם יוֹשֵֽׁב־־־־׃
translation:
  text: 'Thus says Yahweh of hosts, the God of Israel: You yourselves have seen all the disaster that I brought on Jerusalem and on all the cities of Judah. And behold, they are a ruin this day, and there is no one living in them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the calamity'; Hebrew רָעָה here refers to destructive judgment, not moral evil.
    reason: lexical_alternative
  - marker: b
    text: Or 'they are in ruins this day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal prophetic cadence without sounding archaic beyond normal biblical English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the established and semantically broad rendering, encompassing heavenly and earthly armies. 'Of armies' is possible but narrower.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain; translated literally.
- source_word: אַתֶּם
  chosen: You yourselves
  alternatives:
  - You
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis beyond the verbal ending in רְאִיתֶם. 'You yourselves' preserves that emphasis in natural English.
- source_word: רְאִיתֶם
  chosen: have seen
  alternatives:
  - saw
  lexicon: HALOT
  rationale: Perfect verb referring to what the audience has personally witnessed with present relevance. English present perfect fits well.
- source_word: כָּל הָרָעָה
  chosen: all the disaster
  alternatives:
  - all the evil
  - all the calamity
  lexicon: HALOT
  rationale: רָעָה here refers to calamity/judgment brought upon Jerusalem, not moral evil committed by God. 'Disaster' communicates punitive catastrophe clearly in modern English.
- source_word: הֵבֵאתִי עַל
  chosen: I brought on
  alternatives:
  - I brought upon
  lexicon: HALOT
  rationale: Idiomatic English rendering of the causative verb with עַל. 'On' is slightly more natural than 'upon' while preserving the sense.
- source_word: עָרֵי יְהוּדָה
  chosen: the cities of Judah
  alternatives:
  - the towns of Judah
  lexicon: HALOT
  rationale: עִיר can denote city or town, but 'cities' is the conventional and sufficiently accurate rendering here.
- source_word: וְהִנָּם
  chosen: And look, they
  alternatives:
  - Behold, they
  - And behold, they
  lexicon: HALOT
  rationale: הִנֵּה/הִנָּם is a deictic particle drawing attention. 'And look' preserves the discourse force in readable modern English; the plural pronominal suffix is reflected by 'they'.
- source_word: חָרְבָּה
  chosen: are a ruin
  alternatives:
  - are desolate
  - are in ruins
  lexicon: HALOT
  rationale: The noun denotes waste/desolation/ruin. With the plural referent ('Jerusalem and all the cities of Judah'), English supplies a plural sense. 'Are a ruin' keeps the nominal force while sounding natural enough; the broader clause clarifies collective reference.
- source_word: הַיּוֹם הַזֶּה
  chosen: this day
  alternatives:
  - today
  - to this day
  lexicon: HALOT
  rationale: Literally 'this day.' 'To this day' would overstate durative force not explicit in the Hebrew; 'this day' preserves the demonstrative emphasis.
- source_word: וְאֵין בָּהֶם יוֹשֵׁב
  chosen: and there is no one living in them
  alternatives:
  - and no one dwells in them
  - and there is no inhabitant in them
  lexicon: HALOT
  rationale: The construction expresses absence of inhabitants. 'No one living in them' is natural modern English while preserving the participial sense of ongoing habitation.
