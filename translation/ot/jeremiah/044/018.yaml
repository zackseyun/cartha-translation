id: JER.44.18
reference: Jeremiah 44:18
source:
  edition: WLC
  text: וּ/מִן אָ֡ז חָדַ֜לְנוּ לְ/קַטֵּ֨ר לִ/מְלֶ֧כֶת הַ/שָּׁמַ֛יִם וְ/הַסֵּֽךְ לָ֥/הּ
    נְסָכִ֖ים חָסַ֣רְנוּ כֹ֑ל וּ/בַ/חֶ֥רֶב וּ/בָ/רָעָ֖ב תָּֽמְנוּ־־׃
translation:
  text: But from the time we stopped burning incense to the Queen of Heaven and pouring
    out drink offerings to her, we have lacked everything, and we have been consumed
    by the sword and by famine.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'since we stopped.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Queen of Heaven,' a title for the goddess worshiped by the people
      here.
    reason: cultural_note
  - marker: c
    text: Or 'we have perished' / 'we have come to an end.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן אָז
  chosen: But from the time
  alternatives:
  - And since then
  - But since
  lexicon: HALOT
  rationale: The conjunction plus preposition/adverb marks a temporal starting point
    with discourse continuation. 'But from the time' preserves both the adversative
    flow in context and the temporal sense more explicitly than the shorter 'since.'
- source_word: חָדַלְנוּ
  chosen: we stopped
  alternatives:
  - we ceased
  lexicon: HALOT
  rationale: The verb means to cease/stop. 'Stopped' is more natural modern English
    while remaining faithful to the verbal sense.
- source_word: לְקַטֵּר
  chosen: burning incense
  alternatives:
  - making offerings smoke
  - offering incense
  lexicon: HALOT
  rationale: In cultic contexts קטר commonly refers to burning incense or making a
    smoke offering. Here 'burning incense' is the clearest idiomatic English rendering.
- source_word: לִמְלֶכֶת הַשָּׁמַיִם
  chosen: to the Queen of Heaven
  alternatives:
  - to the queen of the heavens
  lexicon: HALOT
  rationale: The phrase is a title for the goddess in view. 'Queen of Heaven' is the
    established and accurate English equivalent; singular 'Heaven' is idiomatic in
    English for this title.
- source_word: וְהַסֵּךְ לָהּ נְסָכִים
  chosen: and pouring out drink offerings to her
  alternatives:
  - and libating drink offerings to her
  - and pouring drink offerings to her
  lexicon: HALOT
  rationale: The infinitive/verb plus object denotes the ritual act of pouring libations.
    'Pouring out drink offerings' is clear, natural, and preserves the cultic action.
- source_word: חָסַרְנוּ כֹל
  chosen: we have lacked everything
  alternatives:
  - we have been in want of everything
  - we have lacked all things
  lexicon: HALOT
  rationale: The verb means to lack/be without, and כֹל intensifies the extent. 'Lacked
    everything' is idiomatic and conveys comprehensive deprivation.
- source_word: וּבַחֶרֶב וּבָרָעָב
  chosen: by the sword and by famine
  alternatives:
  - through sword and famine
  - with the sword and with famine
  lexicon: HALOT
  rationale: The beth preposition here marks means/instrument or circumstance of destruction.
    'By the sword and by famine' is a standard and clear rendering in prophetic judgment
    contexts.
- source_word: תָּמְנוּ
  chosen: we have been consumed
  alternatives:
  - we have perished
  - we have come to an end
  lexicon: HALOT
  rationale: The verb תמם in this form conveys being finished/consumed/completed.
    'Have been consumed' fits the parallel with sword and famine and preserves the
    sense of being brought to ruin, while 'perished' is possible but less closely
    tied to the lexical image.
