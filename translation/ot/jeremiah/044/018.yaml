theological_decisions:
- issue: Rendering the idolatrous title מְלֶכֶת הַשָּׁמַיִם
  chosen_reading: Queen of Heaven
  alternative_readings:
  - queen of the heavens
  rationale: This is not a Marian or Christian theological title here but the title
    of the goddess worshiped by the speakers. The translation preserves the Hebrew
    title straightforwardly without importing later theological associations.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the text''s plain sense without importing doctrinal claims the text does not make.'
