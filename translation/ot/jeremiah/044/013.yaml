id: JER.44.13
reference: Jeremiah 44:13
source:
  edition: WLC
  text: וּ/פָקַדְתִּ֗י עַ֤ל הַ/יּֽוֹשְׁבִים֙ בְּ/אֶ֣רֶץ מִצְרַ֔יִם כַּ/אֲשֶׁ֥ר פָּקַ֖דְתִּי
    עַל יְרֽוּשָׁלִָ֑ם בַּ/חֶ֥רֶב בָּ/רָעָ֖ב וּ/בַ/דָּֽבֶר־׃
translation:
  text: And I will punish those who dwell in the land of Egypt, just as I punished
    Jerusalem, with the sword, with famine, and with pestilence.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will visit judgment on those who dwell in the land of Egypt ... as
      I visited Jerusalem.' The Hebrew verb פקד can mean 'attend to,' 'visit,' or,
      in judgment contexts like this one, 'punish.'
    reason: lexical_alternative
  - marker: b
    text: '''Pestilence'' may also be rendered ''plague.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָקַדְתִּי
  chosen: And I will punish
  alternatives:
  - And I will visit upon
  - And I will attend to
  - And I will bring judgment on
  lexicon: HALOT
  rationale: The verb פקד has a broad semantic range including attend to, visit, muster,
    and punish. In this judgment context, with the comparison to Jerusalem's devastation
    by sword, famine, and pestilence, the punitive sense is primary. 'Punish' communicates
    the plain sense in natural English better than the more opaque 'visit upon.'
- source_word: עַל
  chosen: those who
  alternatives:
  - upon
  - against
  lexicon: HALOT
  rationale: With פקד in a punitive sense, עַל marks the object of judgment. In idiomatic
    English this is best absorbed into the clause 'punish those who...' rather than
    rendered woodenly as 'upon.'
- source_word: הַיֹּשְׁבִים
  chosen: those who dwell
  alternatives:
  - the inhabitants
  - those living
  lexicon: HALOT
  rationale: The participle from ישב denotes those dwelling or residing. 'Those who
    dwell' preserves the participial force and remains readable; 'inhabitants' is
    possible but slightly more interpretive and nominalized.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: Retaining 'land of Egypt' reflects the Hebrew wording more closely than
    the shorter 'in Egypt' while remaining natural English.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - in the same way that
  lexicon: HALOT
  rationale: '''Just as'' clearly marks the comparison between the coming punishment
    in Egypt and the prior punishment of Jerusalem.'
- source_word: פָּקַדְתִּי
  chosen: I punished
  alternatives:
  - I visited judgment on
  - I brought punishment on
  lexicon: HALOT
  rationale: For consistency with the first occurrence of פקד in the same verse and
    because the context is explicitly punitive, 'I punished' is the clearest rendering.
- source_word: עַל יְרוּשָׁלִָם
  chosen: Jerusalem
  alternatives:
  - upon Jerusalem
  - against Jerusalem
  lexicon: HALOT
  rationale: English idiom prefers 'I punished Jerusalem' rather than preserving the
    preposition explicitly.
- source_word: בַּחֶרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: The beth here marks means or instrument. 'With the sword' is a standard
    and clear rendering in judgment formulas.
- source_word: בָּרָעָב
  chosen: with famine
  alternatives:
  - by famine
  lexicon: HALOT
  rationale: Parallel to 'with the sword'; preserves the triadic judgment formula
    in consistent English.
- source_word: וּבַדָּבֶר
  chosen: and with pestilence
  alternatives:
  - and with plague
  lexicon: HALOT
  rationale: דבר in prophetic judgment contexts commonly denotes pestilence or epidemic
    disease. 'Pestilence' fits the established sword-famine-pestilence triad and avoids
    narrowing the term to a single outbreak.
