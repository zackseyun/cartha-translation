theological_decisions:
- issue: Rendering of divine judgment language in פקד
  chosen_reading: 'Explicit punitive sense: ''punish'''
  alternative_readings:
  - More formal 'visit upon'
  rationale: The verse describes covenantal judgment by sword, famine, and pestilence.
    Using 'punish' makes the judicial force explicit without adding doctrinal content
    beyond the text. A more formal rendering is possible but less transparent in contemporary
    English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
