id: JER.44.26
reference: Jeremiah 44:26
source:
  edition: WLC
  text: לָ/כֵן֙ שִׁמְע֣וּ דְבַר יְהוָ֔ה כָּל יְהוּדָ֕ה הַ/יֹּשְׁבִ֖ים בְּ/אֶ֣רֶץ מִצְרָ֑יִם הִנְ/נִ֨י נִשְׁבַּ֜עְתִּי בִּ/שְׁמִ֤/י הַ/גָּדוֹל֙ אָמַ֣ר יְהוָ֔ה אִם יִהְיֶה֩ ע֨וֹד שְׁמִ֜/י נִקְרָ֣א בְּ/פִ֣י כָּל אִ֣ישׁ יְהוּדָ֗ה אֹמֵ֛ר חַי אֲדֹנָ֥/י יְהוִ֖ה בְּ/כָל אֶ֥רֶץ מִצְרָֽיִם־־־׀׀־־־׃
translation:
  text: 'Therefore hear the word of Yahweh, all Judah who dwell in the land of Egypt: Behold, I have sworn by my great name, says Yahweh, that my name shall no longer be called upon by the mouth of any man of Judah in all the land of Egypt, saying, ‘As the Lord GOD lives.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'my name shall no longer be on the lips of any man of Judah.' The Hebrew idiom literally speaks of God's name being 'called in the mouth' of someone, referring here to invoking it in an oath.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding judgment speech; 'Therefore' preserves the formal logical connection.
- source_word: שִׁמְעוּ
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: Imperative plural introducing a prophetic proclamation; 'hear' is the standard concise rendering in this register.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Conventional prophetic formula. 'Word' preserves the formal idiom and theological weight of divine speech. YHWH is rendered 'the LORD' per doctrine.
- source_word: כָּל יְהוּדָה
  chosen: all Judah
  alternatives:
  - all you of Judah
  - all the Judeans
  lexicon: HALOT
  rationale: Collective address to the Judahite community. 'All Judah' is natural English while preserving the collective force.
- source_word: הַיֹּשְׁבִים בְּאֶרֶץ מִצְרַיִם
  chosen: who dwell in the land of Egypt
  alternatives:
  - who live in the land of Egypt
  - who are living in Egypt
  lexicon: HALOT
  rationale: '''Dwell'' fits prophetic diction and the participial sense of settled residence; ''land of Egypt'' preserves אֶרֶץ.'
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces a solemn divine declaration. 'Behold' retains the elevated prophetic tone without adding content.
- source_word: נִשְׁבַּעְתִּי בִּשְׁמִי הַגָּדוֹל
  chosen: I have sworn by my great name
  alternatives:
  - I swear by my great name
  - I have taken an oath by my great name
  lexicon: HALOT
  rationale: Perfect verb rendered as present-resultative English ('have sworn') in a solemn oath context. 'Great name' preserves the covenantal and honor-laden expression.
- source_word: אִם יִהְיֶה עוֹד
  chosen: shall no longer be
  alternatives:
  - will ever again be
  - shall be anymore
  lexicon: HALOT
  rationale: 'After an oath formula, אִם introduces the content with emphatic negation in context. English idiom requires making the negative force explicit: ''shall no longer be.'''
- source_word: שְׁמִי נִקְרָא בְּפִי
  chosen: my name shall no longer be invoked by the mouth of
  alternatives:
  - my name shall no longer be called upon by
  - my name shall no longer be on the lips of
  lexicon: HALOT
  rationale: The passive of קרא with 'in/by the mouth' refers to uttering or invoking the divine name in oath speech. 'Invoked by the mouth of' preserves both the verbal and oral imagery more closely than a looser paraphrase.
- source_word: כָּל אִישׁ יְהוּדָה
  chosen: any man of Judah
  alternatives:
  - any Judahite man
  - any Judean
  - anyone of Judah
  lexicon: HALOT
  rationale: אִישׁ is singular masculine with distributive force. Per doctrine, gender-accurate rendering is preferred; 'any man of Judah' preserves the source form and representative sense.
- source_word: אֹמֵר
  chosen: saying
  alternatives:
  - who says
  lexicon: HALOT
  rationale: Participle introduces the content of the oath formula uttered by the speaker; 'saying' is the most direct formal equivalent.
- source_word: חַי אֲדֹנָי יְהוִה
  chosen: As the Lord GOD lives
  alternatives:
  - As the Lord GOD is alive
  - By the life of the Lord GOD
  lexicon: HALOT
  rationale: Standard Hebrew oath formula. 'As ... lives' is the established and accurate English equivalent. אֲדֹנָי יְהוִה is rendered 'the Lord GOD' to distinguish the title plus divine name conventionally represented as GOD.
- source_word: בְּכָל אֶרֶץ מִצְרָיִם
  chosen: in all the land of Egypt
  alternatives:
  - throughout the land of Egypt
  - anywhere in the land of Egypt
  lexicon: HALOT
  rationale: Preserves the comprehensive geographic scope expressed by בְּכָל and אֶרֶץ.
