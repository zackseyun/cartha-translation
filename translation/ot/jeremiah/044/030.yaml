id: JER.44.30
reference: Jeremiah 44:30
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה הִנְ/נִ֣י נֹ֠תֵן אֶת פַּרְעֹ֨ה חָפְרַ֤ע מֶֽלֶךְ מִצְרַ֨יִם֙
    בְּ/יַ֣ד אֹֽיְבָ֔י/ו וּ/בְ/יַ֖ד מְבַקְשֵׁ֣י נַפְשׁ֑/וֹ כַּ/אֲשֶׁ֨ר נָתַ֜תִּי אֶת
    צִדְקִיָּ֣הוּ מֶֽלֶךְ יְהוּדָ֗ה בְּ/יַ֨ד נְבוּכַדְרֶאצַּ֧ר מֶֽלֶךְ בָּבֶ֛ל אֹיְב֖/וֹ
    וּ/מְבַקֵּ֥שׁ נַפְשֽׁ/וֹ׀־־־־־׃ס
translation:
  text: 'Thus says the LORD: Behold, I am giving Pharaoh Hophra king of Egypt into
    the hand of his enemies and into the hand of those seeking his life, just as I
    gave Zedekiah king of Judah into the hand of Nebuchadnezzar king of Babylon, his
    enemy and the one seeking his life.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Nebuchadrezzar''; conventionally rendered ''Nebuchadnezzar''
      in English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. יְהוָה is rendered 'the LORD' per
    doctrine for the divine name.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  - Indeed
  lexicon: HALOT
  rationale: Retains the deictic and solemn force of the Hebrew announcement formula
    without paraphrasing it away.
- source_word: נֹתֵן
  chosen: I am giving
  alternatives:
  - I give
  - I will give
  lexicon: HALOT
  rationale: The participle with הִנְנִי often has imminent/futuristic force. 'I am
    giving' preserves the vividness and certainty of the action while remaining natural
    English.
- source_word: פַּרְעֹה חָפְרַע
  chosen: Pharaoh Hophra
  alternatives:
  - Pharaoh Apries
  lexicon: HALOT
  rationale: Uses the Hebrew-form personal name by standard transliteration practice
    rather than the Greek historical equivalent 'Apries'.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: HALOT
  rationale: A common Hebrew idiom for being delivered into another's control. The
    more formal 'into the hand of' is preserved here because it is clear in English
    and echoes the repeated structure of the verse.
- source_word: אֹיְבָיו
  chosen: his enemies
  alternatives:
  - those hostile to him
  lexicon: HALOT
  rationale: Straightforward plural rendering of the noun with suffix.
- source_word: מְבַקְשֵׁי נַפְשׁוֹ
  chosen: those seeking his life
  alternatives:
  - those who seek to kill him
  lexicon: HALOT
  rationale: This idiom literally involves seeking someone's life; the chosen rendering
    preserves the idiomatic sense and the lexical imagery.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - in the same way that
  lexicon: HALOT
  rationale: Marks the comparison between Hophra's fate and Zedekiah's prior handing
    over.
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  lexicon: HALOT
  rationale: Standard English transliteration of the Judean king's name.
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: The Hebrew form here corresponds more closely to 'Nebuchadrezzar,' but
    'Nebuchadnezzar' is the standard English conventional form and remains identifiable
    and readable. The alternative is worth preserving in a footnote.
- source_word: אֹיְבוֹ וּמְבַקֵּשׁ נַפְשׁוֹ
  chosen: his enemy and the one seeking his life
  alternatives:
  - his enemy, the one seeking his life
  lexicon: HALOT
  rationale: The singular forms refer to Nebuchadnezzar in relation to Zedekiah. Rendering
    both elements explicitly preserves the Hebrew appositional emphasis.
