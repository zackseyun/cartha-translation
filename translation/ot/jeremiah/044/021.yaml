id: JER.44.21
reference: Jeremiah 44:21
source:
  edition: WLC
  text: הֲ/ל֣וֹא אֶת הַ/קִּטֵּ֗ר אֲשֶׁ֨ר קִטַּרְתֶּ֜ם בְּ/עָרֵ֤י יְהוּדָה֙ וּ/בְ/חֻצ֣וֹת
    יְרוּשָׁלִַ֔ם אַתֶּ֧ם וַ/אֲבֽוֹתֵי/כֶ֛ם מַלְכֵי/כֶ֥ם וְ/שָׂרֵי/כֶ֖ם וְ/עַ֣ם הָ/אָ֑רֶץ
    אֹתָ/ם֙ זָכַ֣ר יְהוָ֔ה וַֽ/תַּעֲלֶ֖ה עַל לִבּֽ/וֹ־־׃
translation:
  text: Was it not the incense that you burned in the cities of Judah and in the streets
    of Jerusalem—you and your fathers, your kings and your officials, and the people
    of the land—that the LORD remembered and brought up upon his heart?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''and it came up upon his heart,'' an idiom expressing that the
      matter came before the LORD''s inner regard or remembrance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  chosen: Was it not
  alternatives:
  - Did not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Was it not' is
    idiomatic English and preserves the interrogative force.
- source_word: הַקִּטֵּר
  chosen: the incense
  alternatives:
  - the burning of incense
  - the smoke offering
  lexicon: HALOT
  rationale: As a noun from the incense-burning root, it most naturally refers to
    the incense/offering itself in this context. 'The incense' is concise and readable,
    while the following verb 'you burned' makes the action explicit.
- source_word: קִטַּרְתֶּם
  chosen: you burned
  alternatives:
  - you burned incense
  - you made offerings by smoke
  lexicon: HALOT
  rationale: The verb specifically denotes making an offering by burning, often incense.
    Because the object is already rendered 'the incense,' 'you burned' avoids redundancy
    while preserving the cultic action.
- source_word: בְּעָרֵי יְהוּדָה
  chosen: in the cities of Judah
  lexicon: HALOT
  rationale: Straightforward locative phrase; 'cities' is the normal rendering of
    עָרִים.
- source_word: וּבְחֻצוֹת יְרוּשָׁלִַם
  chosen: and in the streets of Jerusalem
  alternatives:
  - and in the squares of Jerusalem
  lexicon: HALOT
  rationale: חֻצוֹת can denote streets or open squares. 'Streets' is the more natural
    English in this context, while still covering public urban spaces.
- source_word: אַתֶּם וַאֲבוֹתֵיכֶם מַלְכֵיכֶם וְשָׂרֵיכֶם וְעַם הָאָרֶץ
  chosen: you and your fathers, your kings and your officials, and the people of the
    land
  alternatives:
  - you and your ancestors, your kings and your princes, and the people of the land
  lexicon: HALOT
  rationale: Retains the full list of participants. 'Fathers' is kept rather than
    'ancestors' for closer formal correspondence; 'officials' is a readable rendering
    of שָׂרִים without implying only royal offspring as 'princes' might.
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the common people
  - the people of the country
  lexicon: HALOT
  rationale: This phrase can be sociologically loaded, but here a transparent rendering
    is preferable. 'The people of the land' preserves the Hebrew expression without
    over-interpreting it as a class term.
- source_word: זָכַר יְהוָה
  chosen: the LORD remembered
  alternatives:
  - the LORD called to mind
  lexicon: HALOT
  rationale: זכר commonly means 'remember.' The subject is יְהוָה, which per doctrine
    is rendered 'the LORD' rather than 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default for the divine name.
- source_word: וַתַּעֲלֶה עַל לִבּוֹ
  chosen: and brought up upon his heart
  alternatives:
  - and it came up upon his heart
  - and it came to his mind
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'it came up upon his heart.' To preserve
    the anthropomorphic and idiomatic force without becoming opaque, the translation
    keeps the imagery in a slightly smoothed English form. The singular feminine verb
    likely refers back collectively to the incense-burning as an event/practice.
