theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropomorphic idiom עַל לִבּוֹ
  chosen_reading: brought up upon his heart
  alternative_readings:
  - came to his mind
  - took to heart
  rationale: The verse uses anthropomorphic language for divine remembrance. The translation
    preserves the metaphorical tension rather than flattening it into a purely cognitive
    paraphrase, while still making sense in English.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension
    rather than resolve it
