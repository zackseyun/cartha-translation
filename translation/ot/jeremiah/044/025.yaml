id: JER.44.25
reference: Jeremiah 44:25
source:
  edition: WLC
  text: כֹּֽה אָמַ֣ר יְהוָֽה צְבָאוֹת֩ אֱלֹהֵ֨י יִשְׂרָאֵ֜ל לֵ/אמֹ֗ר אַתֶּ֨ם וּ/נְשֵׁי/כֶ֜ם וַ/תְּדַבֵּ֣רְנָה בְּ/פִי/כֶם֮ וּ/בִ/ידֵי/כֶ֣ם מִלֵּאתֶ֣ם לֵ/אמֹר֒ עָשֹׂ֨ה נַעֲשֶׂ֜ה אֶת נְדָרֵ֗י/נוּ אֲשֶׁ֤ר נָדַ֨רְנוּ֙ לְ/קַטֵּר֙ לִ/מְלֶ֣כֶת הַ/שָּׁמַ֔יִם וּ/לְ/הַסֵּ֥ךְ לָ֖/הּ נְסָכִ֑ים הָקֵ֤ים תָּקִ֨ימְנָה֙ אֶת נִדְרֵי/כֶ֔ם וְ/עָשֹׂ֥ה תַעֲשֶׂ֖ינָה אֶת נִדְרֵי/כֶֽם־־׀־־־׃פ
translation:
  text: 'Thus says Yahweh of hosts, the God of Israel: You and your wives have spoken with your mouths and fulfilled it with your hands, saying, ‘We will surely perform our vows that we have vowed, to burn incense to the Queen of Heaven and to pour out drink offerings to her.’ Go ahead, confirm your vows and perform your vows.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Surely establish your vows and surely perform your vows.' The Hebrew uses infinitive absolute + finite verb twice for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering of the divine title; 'hosts' preserves the breadth of heavenly/earthly armies better than narrowing to 'armies'.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct rendering identifying YHWH covenantally.
- source_word: אַתֶּם וּנְשֵׁיכֶם
  chosen: You and your wives
  alternatives:
  - You and your women
  lexicon: HALOT
  rationale: נָשִׁים here clearly means wives in the domestic and vow-making context, not women in general.
- source_word: וַתְּדַבֵּרְנָה בְּפִיכֶם
  chosen: have spoken with your mouths
  alternatives:
  - have spoken with your mouth
  lexicon: HALOT
  rationale: Retains the concrete Hebrew idiom. The plural suffix on 'your mouths' reflects the addressed group and their wives together.
- source_word: וּבִידֵיכֶם מִלֵּאתֶם
  chosen: fulfilled it with your hands
  alternatives:
  - carried it out with your hands
  - made it full with your hands
  lexicon: HALOT
  rationale: The idiom means to complete or carry out what was spoken. 'Fulfilled it' captures the sense while preserving the hand/mouth contrast. The object is implicit from context—the spoken vow/word.
- source_word: עָשֹׂה נַעֲשֶׂה
  chosen: We will surely carry out
  alternatives:
  - We will indeed do
  - Doing, we will do
  lexicon: HALOT
  rationale: Infinitive absolute plus finite verb intensifies the action. 'Surely carry out' conveys emphatic resolve in natural English.
- source_word: נְדָרֵינוּ אֲשֶׁר נָדַרְנוּ
  chosen: our vows that we have vowed
  alternatives:
  - the vows we made
  - our vowed vows
  lexicon: HALOT
  rationale: Keeps the cognate emphasis of noun plus verb without becoming wooden. 'That we have vowed' preserves the Hebrew repetition.
- source_word: לְקַטֵּר
  chosen: to burn incense
  alternatives:
  - to make offerings by smoke
  lexicon: HALOT
  rationale: Standard cultic rendering for the Hiphil/Piel usage in this context.
- source_word: לִמְלֶכֶת הַשָּׁמַיִם
  chosen: to the Queen of Heaven
  alternatives:
  - to the queen of the heavens
  lexicon: HALOT
  rationale: This is the established sense of the title in Jeremiah. 'Queen of Heaven' is idiomatic English and reflects the singular pagan goddess title.
- source_word: וּלְהַסֵּךְ לָהּ נְסָכִים
  chosen: and to pour out drink offerings to her
  alternatives:
  - and to pour libations to her
  lexicon: HALOT
  rationale: '''Drink offerings'' is clearer for modern readers than ''libations'' while remaining accurate to cultic terminology.'
- source_word: הָקֵים תָּקִימְנָה
  chosen: Go ahead, confirm
  alternatives:
  - Surely establish
  - Indeed fulfill
  lexicon: HALOT
  rationale: 'Infinitive absolute plus finite verb gives emphatic force. In context this is an ironic/judicial imperative conceding their stated intent: ''Go ahead, confirm...'' rather than a sincere approval.'
- source_word: וְעָשֹׂה תַעֲשֶׂינָה
  chosen: and carry out
  alternatives:
  - and surely do
  - and perform
  lexicon: HALOT
  rationale: Again an infinitive absolute plus finite verb. 'Carry out' fits the context of vows and avoids awkward repetition of 'do' in English while preserving the emphatic command.
- source_word: נִדְרֵיכֶם
  chosen: your vows
  lexicon: HALOT
  rationale: Consistent rendering of נדרים throughout the verse.
