id: JER.44.10
reference: Jeremiah 44:10
source:
  edition: WLC
  text: לֹ֣א דֻכְּא֔וּ עַ֖ד הַ/יּ֣וֹם הַ/זֶּ֑ה וְ/לֹ֣א יָרְא֗וּ וְ/לֹֽא הָלְכ֤וּ בְ/תֽוֹרָתִ/י֙
    וּ/בְ/חֻקֹּתַ֔/י אֲשֶׁר נָתַ֥תִּי לִ/פְנֵי/כֶ֖ם וְ/לִ/פְנֵ֥י אֲבוֹתֵי/כֶֽם־־׃ס
translation:
  text: They have not been humbled to this day, and they have not feared, and they
    have not walked in my law and in my statutes that I set before you and before
    your fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have not been crushed,' 'have not become contrite,' or interpretively,
      'have not repented.'
    reason: lexical_alternative
  - marker: b
    text: '''Your fathers'' refers to the earlier generations to whom the same law
      and statutes were given; alternatively, ''your ancestors.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: דֻכְּאוּ
  chosen: have not been humbled
  alternatives:
  - have not been crushed
  - have not been contrite
  - have not been brought low
  lexicon: HALOT
  rationale: The passive form from דכא can denote being crushed or humbled. In this
    context of ongoing refusal to repent, 'have not been humbled' best captures the
    moral-spiritual sense without overparaphrasing into an interpretive term like
    'repented.'
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: This is a standard temporal idiom. 'To this day' is natural modern English
    and preserves the continuing force.
- source_word: יָרְאוּ
  chosen: have not feared
  alternatives:
  - have not been afraid
  - have not revered
  lexicon: HALOT
  rationale: ירא here likely carries covenantal fear of God rather than mere terror.
    'Feared' preserves the lexical connection and theological weight better than 'revered,'
    while avoiding reduction to simple fright.
- source_word: הָלְכוּ
  chosen: have not walked
  alternatives:
  - have not lived
  - have not followed
  lexicon: HALOT
  rationale: הלך with ב plus Torah language is a common covenant idiom. 'Walked' preserves
    the Hebrew metaphor and remains understandable in English.
- source_word: בְּתוֹרָתִי
  chosen: in my law
  alternatives:
  - according to my instruction
  - in my instruction
  lexicon: HALOT
  rationale: תורה can mean instruction, but in parallel with 'my statutes' and in
    covenantal-legal context, 'my law' is the most natural concise rendering. The
    possessive is retained.
- source_word: וּבְחֻקֹּתַי
  chosen: and in my statutes
  alternatives:
  - and in my decrees
  - and in my ordinances
  lexicon: HALOT
  rationale: חקים often refers to prescribed statutes. 'Statutes' keeps the legal-covenantal
    register and pairs well with 'law.'
- source_word: אֲשֶׁר נָתַתִּי לִפְנֵיכֶם
  chosen: that I set before you
  alternatives:
  - that I gave before you
  - that I placed before you
  lexicon: HALOT
  rationale: Although נתן is literally 'gave,' the idiom with לפני is better rendered
    'set before' in English, conveying presentation and obligation without wooden
    phrasing.
- source_word: וְלִפְנֵי אֲבוֹתֵיכֶם
  chosen: and before your fathers
  alternatives:
  - and before your ancestors
  lexicon: HALOT
  rationale: אבותיכם is literally 'your fathers.' Per the gender-accurate policy,
    the masculine form is retained rather than neutralized to 'ancestors,' though
    the latter is a plausible contextual alternative.
