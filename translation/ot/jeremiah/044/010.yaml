theological_decisions:
- issue: Whether דֻכְּאוּ should be rendered as explicit repentance language
  chosen_reading: They have not been humbled
  alternative_readings:
  - They have not repented
  - They have not become contrite
  rationale: The verse describes failure to respond rightly to judgment, but the Hebrew
    verb itself does not explicitly say 'repent.' Rendering it as 'humbled' preserves
    the text's wording and leaves the theological implication intact without importing
    a stronger doctrinal formulation than the source states.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
- issue: How to render אֲבוֹתֵיכֶם in contemporary English
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The Hebrew is explicitly masculine plural and refers to prior generations
    of Israel/Judah. Following the gender-accurate policy, 'fathers' is retained in
    the main text, while the broader sense can be noted as an alternative.
  doctrine_reference: 'Translation philosophy: Gender-accurate over gender-neutral.'
