id: JER.44.28
reference: Jeremiah 44:28
source:
  edition: WLC
  text: וּ/פְלִיטֵ֨י חֶ֜רֶב יְשֻׁב֨וּ/ן מִן אֶ֧רֶץ מִצְרַ֛יִם אֶ֥רֶץ יְהוּדָ֖ה מְתֵ֣י
    מִסְפָּ֑ר וְֽ/יָדְע֞וּ כָּל שְׁאֵרִ֣ית יְהוּדָ֗ה הַ/בָּאִ֤ים לְ/אֶֽרֶץ מִצְרַ֨יִם֙
    לָ/ג֣וּר שָׁ֔ם דְּבַר מִ֥י יָק֖וּם מִמֶּ֥/נִּי וּ/מֵ/הֶֽם־־־־׃
translation:
  text: And a few survivors of the sword will return from the land of Egypt to the
    land of Judah, and all the remnant of Judah who came to the land of Egypt to sojourn
    there will know whose word will stand, mine or theirs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''survivors of the sword ... few in number.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'whose word will come to pass, mine or theirs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפְלִיטֵי חֶרֶב
  chosen: a few survivors of the sword
  alternatives:
  - survivors from the sword
  - those who escape the sword
  lexicon: HALOT
  rationale: פְלִיטֵי denotes escapees/survivors; חֶרֶב is idiomatically 'sword' for
    violent judgment/warfare. Rendering 'survivors of the sword' preserves the Hebrew
    imagery. 'A few' is supplied from the following מְתֵי מִסְפָּר and brought forward
    for natural English.
- source_word: יְשֻׁבוּן
  chosen: will return
  alternatives:
  - shall return back
  lexicon: HALOT
  rationale: Qal of שוב commonly means 'return.' Simple future English fits the predictive
    context.
- source_word: מִן אֶרֶץ מִצְרַיִם אֶרֶץ יְהוּדָה
  chosen: from the land of Egypt to the land of Judah
  alternatives:
  - out of Egypt to Judah
  lexicon: HALOT
  rationale: Retains the repeated 'land' wording of the Hebrew while remaining readable.
- source_word: מְתֵי מִסְפָּר
  chosen: a few
  alternatives:
  - men of number
  - few in number
  lexicon: HALOT
  rationale: This idiom means a small, countable number. 'A few' is idiomatic modern
    English; 'few in number' is possible but more cumbersome here.
- source_word: וְיָדְעוּ
  chosen: will know
  alternatives:
  - shall know
  - will come to know
  lexicon: HALOT
  rationale: Straightforward future sense following the judgment outcome.
- source_word: כָּל שְׁאֵרִית יְהוּדָה
  chosen: all the remnant of Judah
  alternatives:
  - all the remainder of Judah
  lexicon: HALOT
  rationale: '''Remnant'' is the standard and contextually appropriate rendering for
    שְׁאֵרִית, especially in prophetic literature.'
- source_word: הַבָּאִים לְאֶרֶץ מִצְרַיִם לָגוּר שָׁם
  chosen: who came to the land of Egypt to sojourn there
  alternatives:
  - who went to the land of Egypt to live there
  - who came into Egypt to reside there as foreigners
  lexicon: HALOT
  rationale: בוא is rendered 'came' in line with the Hebrew form; גור means to reside
    as a sojourner/temporary resident. 'Sojourn' preserves that nuance better than
    simply 'live.'
- source_word: דְּבַר מִי יָקוּם
  chosen: whose word will stand
  alternatives:
  - whose word will be established
  - whose word will come to pass
  lexicon: HALOT
  rationale: The idiom 'word ... stand' conveys validation/fulfillment. 'Will stand'
    preserves the metaphor and the forensic contrast between competing claims.
- source_word: מִמֶּנִּי וּמֵהֶם
  chosen: mine or theirs
  alternatives:
  - from me or from them
  - my word or their word
  lexicon: HALOT
  rationale: The pronouns refer back to 'word.' English requires an explicit contrast;
    'mine or theirs' is concise and natural, with the antecedent supplied by context.
