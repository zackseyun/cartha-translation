theological_decisions:
- issue: Prophetic vindication formula
  chosen_reading: whose word will stand, mine or theirs
  alternative_readings:
  - whose word will come to pass, mine or theirs
  rationale: The verse contrasts the LORD's announced judgment with the contrary expectations
    of the Judean refugees. Rendering יָקוּם as 'will stand' preserves the Hebrew
    metaphor without importing extra theological interpretation beyond prophetic fulfillment.
