id: JER.44.19
reference: Jeremiah 44:19
source:
  edition: WLC
  text: וְ/כִֽי אֲנַ֤חְנוּ מְקַטְּרִים֙ לִ/מְלֶ֣כֶת הַ/שָּׁמַ֔יִם וּ/לְ/הַסֵּ֥ךְ לָ֖/הּ
    נְסָכִ֑ים הֲ/מִֽ/בַּלְעֲדֵ֣י אֲנָשֵׁ֗י/נוּ עָשִׂ֨ינוּ לָ֤/הּ כַּוָּנִים֙ לְ/הַ֣עֲצִבָ֔/ה
    וְ/הַסֵּ֥ךְ לָ֖/הּ נְסָכִֽים־׃פ
translation:
  text: And when we burned incense to the Queen of Heaven and poured out drink offerings
    to her, was it apart from our husbands that we made cakes for her, to depict her,
    and poured out drink offerings to her?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to represent her' or 'to make her image.' The Hebrew likely refers to
      cakes shaped in the goddess's likeness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And when
  alternatives:
  - And indeed
  - And if
  - For when
  lexicon: HALOT
  rationale: In context this continues the women's defense from the previous verse
    and introduces a circumstance rather than a condition. 'And when' best captures
    the conjunction plus explanatory force without sounding overly wooden.
- source_word: מְקַטְּרִים
  chosen: burned incense
  alternatives:
  - made offerings by fire
  - offered smoke
  lexicon: HALOT
  rationale: The piel of קטר in cultic contexts commonly refers to burning incense
    or making a smoke offering. Here, paired with drink offerings to the Queen of
    Heaven, 'burned incense' is the most natural and specific English rendering.
- source_word: לִמְלֶכֶת הַשָּׁמַיִם
  chosen: to the Queen of Heaven
  alternatives:
  - to the queen of the heavens
  lexicon: HALOT
  rationale: This is the established sense of the title in Jeremiah 7 and 44. 'Queen
    of Heaven' is idiomatic English and preserves the cultic title without interpretive
    expansion.
- source_word: וּלְהַסֵּךְ לָהּ נְסָכִים
  chosen: and poured out drink offerings to her
  alternatives:
  - and to pour out libations to her
  lexicon: HALOT
  rationale: נסכים are drink offerings/libations; 'poured out drink offerings' is
    clear modern English and preserves the ritual action expressed by the infinitive
    plus object.
- source_word: הֲמִבַּלְעֲדֵי אֲנָשֵׁינוּ
  chosen: was it apart from our husbands
  alternatives:
  - was it without our men
  - was it without our husbands' involvement
  lexicon: HALOT
  rationale: The phrase asks whether they acted independently of their men. Given
    the speakers are women, 'our husbands' is the most contextually precise rendering
    of אֲנָשֵׁינוּ here, better than the more generic 'our men.'
- source_word: עָשִׂינוּ לָהּ כַּוָּנִים
  chosen: that we made cakes for her
  alternatives:
  - that we made sacrificial cakes for her
  - that we prepared cakes for her
  lexicon: HALOT
  rationale: כַּוָּנִים refers to shaped cakes used in this cultic practice. 'Made
    cakes for her' is accurate and readable; the cultic nuance is reinforced by the
    surrounding ritual language.
- source_word: לְהַעֲצִבָהּ
  chosen: to depict her
  alternatives:
  - to make her image
  - to shape them in her likeness
  - to represent her
  lexicon: HALOT
  rationale: 'The infinitive with suffix most naturally indicates purpose: the cakes
    were made so as to represent or depict the goddess. ''To depict her'' is concise
    and avoids overcommitting to whether a full image or symbolic likeness is meant.'
- source_word: וְהַסֵּךְ לָהּ נְסָכִים
  chosen: and poured out drink offerings to her
  alternatives:
  - and to pour out libations to her
  lexicon: HALOT
  rationale: The repeated phrase is rendered consistently with the earlier occurrence
    in the verse.
