theological_decisions:
- issue: Identity and rendering of the pagan title מְלֶכֶת הַשָּׁמַיִם
  chosen_reading: Queen of Heaven
  alternative_readings:
  - queen of the heavens
  rationale: This is a pagan divine title in Jeremiah, not a positive theological
    designation. The translation preserves the title as used by the speakers without
    importing later associations or commentary.
