id: JER.49.22
reference: Jeremiah 49:22
source:
  edition: WLC
  text: הִנֵּ֤ה כַ/נֶּ֨שֶׁר֙ יַעֲלֶ֣ה וְ/יִדְאֶ֔ה וְ/יִפְרֹ֥שׂ כְּנָפָ֖י/ו עַל בָּצְרָ֑ה
    וְֽ֠/הָיָה לֵ֞ב גִּבּוֹרֵ֤י אֱדוֹם֙ בַּ/יּ֣וֹם הַ/ה֔וּא כְּ/לֵ֖ב אִשָּׁ֥ה מְצֵרָֽה־׃ס
translation:
  text: Behold, like an eagle he will rise up and swoop down and spread his wings
    over Bozrah, and the heart of Edom’s warriors on that day will become like the
    heart of a woman in labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a vulture'; the Hebrew word can refer more broadly to a large bird
      of prey, though 'eagle' is the conventional rendering here.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic attention-getter with elevated but still intelligible
    English. 'Behold' fits the solemn oracle style better than the more colloquial
    'look' or 'see'.
- source_word: כַנֶּשֶׁר
  chosen: like an eagle
  alternatives:
  - like a vulture
  lexicon: HALOT
  rationale: נֶשֶׁר can denote a large bird of prey, sometimes argued as 'vulture,'
    but 'eagle' is the standard and best-supported rendering in prophetic simile contexts
    in English Bible tradition and remains natural here. The comparison emphasizes
    swift, threatening aerial attack.
- source_word: יַעֲלֶה
  chosen: he will rise up
  alternatives:
  - he will ascend
  - it will come up
  lexicon: HALOT
  rationale: עלה in this context conveys upward movement preparatory to attack. 'Rise
    up' is idiomatic and preserves the vivid motion without over-literal stiffness.
- source_word: וְיִדְאֶה
  chosen: and swoop down
  alternatives:
  - and fly
  - and dart
  lexicon: HALOT
  rationale: The verb denotes flying swiftly. Given the eagle imagery and military
    threat, 'swoop down' captures the predatory force implied by the simile better
    than the flatter 'fly,' while remaining within the semantic range.
- source_word: וְיִפְרֹשׂ כְּנָפָיו
  chosen: and spread his wings
  alternatives:
  - and stretch out his wings
  lexicon: HALOT
  rationale: A straightforward rendering of the idiom. 'Spread his wings' is natural
    English and preserves the image of looming dominance over the city.
- source_word: עַל בָּצְרָה
  chosen: over Bozrah
  alternatives:
  - against Bozrah
  lexicon: HALOT
  rationale: עַל with the wing-spreading image is best rendered 'over.' Bozrah is
    transliterated as a place name in keeping with the translation philosophy for
    names.
- source_word: לֵב גִּבּוֹרֵי אֱדוֹם
  chosen: the heart of Edom’s warriors
  alternatives:
  - the heart of the mighty men of Edom
  - the courage of Edom’s heroes
  lexicon: HALOT
  rationale: גִּבּוֹרִים refers to mighty men/warriors. 'Warriors' is clear modern
    English and preserves the military sense. 'Heart' is retained rather than interpreted
    as 'courage' to preserve the Hebrew anthropological expression.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal rendering in contemporary English; preserves prophetic
    deixis.
- source_word: וְהָיָה
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: Though formally 'will be,' in context the clause describes a resulting
    state under judgment. 'Will become' makes the transition explicit and reads naturally
    in English.
- source_word: כְּלֵב אִשָּׁה מְצֵרָה
  chosen: like the heart of a woman in labor
  alternatives:
  - like the heart of a woman in childbirth
  - like the heart of a woman in anguish
  lexicon: HALOT
  rationale: מְצֵרָה here refers to a woman experiencing labor pangs/distress. 'In
    labor' is concise, natural, and preserves the image of intense fear and pain without
    paraphrastic expansion.
