theological_decisions:
- issue: Referent of the eagle-like attacker
  chosen_reading: Rendered with the Hebrew singular pronoun 'he' without identifying
    the referent in translation.
  alternative_readings:
  - Nebuchadnezzar/the king of Babylon
  - YHWH as the one directing judgment
  - an unspecified invading power
  rationale: The immediate context points to the Babylonian invader, but the verse
    itself leaves the subject implicit in the prophetic imagery. The translation preserves
    that literary and theological openness rather than specifying beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
