theological_decisions:
- issue: Identity of the speaker in the first-person declarations
  chosen_reading: The first-person 'I/me' is rendered as God speaking without adding
    'the LORD' in the verse.
  rationale: The Hebrew context presents a divine oracle, but this verse itself uses
    first-person rhetoric without the divine name. The translation preserves the text's
    own presentation and does not import an explicit subject into the line.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; never import doctrinal claims the text does not make.'
