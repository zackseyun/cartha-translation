id: JER.49.19
reference: Jeremiah 49:19
source:
  edition: WLC
  text: הִ֠נֵּה כְּ/אַרְיֵ֞ה יַעֲלֶ֨ה מִ/גְּא֣וֹן הַ/יַּרְדֵּן֮ אֶל נְוֵ֣ה אֵיתָן֒
    כִּֽי אַרְגִּ֤יעָה אֲרִיצֶ֨/נּוּ מֵֽ/עָלֶ֔י/הָ וּ/מִ֥י בָח֖וּר אֵלֶ֣י/הָ אֶפְקֹ֑ד
    כִּ֣י מִ֤י כָמ֨וֹ/נִי֙ וּ/מִ֣י יֹעִידֶ֔/נִּי וּ/מִי זֶ֣ה רֹעֶ֔ה אֲשֶׁ֥ר יַעֲמֹ֖ד
    לְ/פָנָֽ/י־־־׃ס
translation:
  text: Look, like a lion he will come up from the thicket of the Jordan against a
    secure pasture; for in an instant I will make him run from it, and I will appoint
    over it whomever is chosen. For who is like me, and who will summon me? And who
    is the shepherd who can stand before me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the pride/majesty of the Jordan,' a Hebrew idiom likely referring
      to the dense growth along the Jordan.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''who will appoint a time for me?'' with a possible legal sense: ''who
      will summon/arraign me?'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the announcement with vivid immediacy. 'Look' is readable
    modern English while preserving the deictic force better than omitting it.
- source_word: כְּאַרְיֵה
  chosen: like a lion
  lexicon: HALOT
  rationale: Straightforward simile marker plus noun; retained formally.
- source_word: יַעֲלֶה
  chosen: he will come up
  alternatives:
  - he will ascend
  - he will rise
  lexicon: HALOT
  rationale: Common motion verb עלה. 'Come up' fits idiomatic English for an advancing
    predator and preserves the directional imagery.
- source_word: מִגְּאוֹן הַיַּרְדֵּן
  chosen: from the thicket of the Jordan
  alternatives:
  - from the pride of the Jordan
  - from the majesty of the Jordan
  lexicon: HALOT
  rationale: Though גאון often means 'pride/majesty,' in this recurring Jeremiah idiom
    it refers to the luxuriant growth along the Jordan where lions lurk. 'Thicket'
    conveys the concrete sense in context; the more literal alternative is preserved
    in a footnote.
- source_word: נְוֵה אֵיתָן
  chosen: a secure pasture
  alternatives:
  - an enduring habitation
  - a permanent pasture
  lexicon: HALOT
  rationale: נוה denotes pasture/dwelling place; איתן conveys enduring firmness or
    security. 'Secure pasture' captures both the pastoral image and the sense of safety.
- source_word: כִּי אַרְגִּיעָה
  chosen: for in an instant
  alternatives:
  - for suddenly
  - for I will suddenly
  lexicon: HALOT
  rationale: The Hiphil of רגע here carries the adverbial sense 'in a moment/suddenly.'
    Rendering it adverbially makes the clause natural in English while preserving
    the suddenness.
- source_word: אֲרִיצֶנּוּ מֵעָלֶיהָ
  chosen: I will make him run from it
  alternatives:
  - I will drive him away from it
  - I will cause him to rush off from it
  lexicon: HALOT
  rationale: The verb conveys causing to run or hasten away. The pronoun likely refers
    to the lion/attacker, and the feminine suffix to the pasture/land. 'Make him run
    from it' preserves the causative force without overinterpreting.
- source_word: וּמִי בָחוּר אֵלֶיהָ אֶפְקֹד
  chosen: and I will appoint over it whomever is chosen
  alternatives:
  - and who is chosen, that I may appoint him over it?
  - and I will appoint over it the chosen one
  lexicon: HALOT
  rationale: The Hebrew is compressed. בָחוּר denotes one chosen/select, and פקד in
    this context means appoint/set over. This rendering makes explicit the divine
    appointment while preserving the passive notion of being chosen.
- source_word: מִי כָמוֹנִי
  chosen: who is like me
  lexicon: HALOT
  rationale: Formula of incomparability; translated directly.
- source_word: וּמִי יוֹעִידֶנִּי
  chosen: who will summon me
  alternatives:
  - who will appoint me a time
  - who will arraign me
  lexicon: HALOT
  rationale: יעד in Hiphil can mean appoint/summon, especially to a meeting or legal
    confrontation. In context of divine challenge, 'summon me' best captures the rhetorical
    force. Legal nuance is preserved in a footnote.
- source_word: רֹעֶה
  chosen: the shepherd
  alternatives:
  - the ruler
  - the leader
  lexicon: HALOT
  rationale: Literally 'shepherd.' Though metaphorically it can denote a ruler, the
    pastoral metaphor is important in the verse and should be retained.
- source_word: יַעֲמֹד לְפָנַי
  chosen: can stand before me
  alternatives:
  - will stand before me
  lexicon: HALOT
  rationale: The rhetorical question implies ability rather than simple futurity.
    'Can stand before me' communicates the challenge idiomatically.
