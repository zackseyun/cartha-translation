id: JER.49.2
reference: Jeremiah 49:2
source:
  edition: WLC
  text: לָ/כֵ֡ן הִנֵּה֩ יָמִ֨ים בָּאִ֜ים נְאֻם יְהוָ֗ה וְ֠/הִשְׁמַעְתִּי אֶל רַבַּ֨ת בְּנֵי עַמּ֜וֹן תְּרוּעַ֣ת מִלְחָמָ֗ה וְ/הָֽיְתָה֙ לְ/תֵ֣ל שְׁמָמָ֔ה וּ/בְנֹתֶ֖י/הָ בָּ/אֵ֣שׁ תִּצַּ֑תְנָה וְ/יָרַ֧שׁ יִשְׂרָאֵ֛ל אֶת יֹרְשָׁ֖י/ו אָמַ֥ר יְהוָֽה־־־־׃
translation:
  text: Therefore, behold, days are coming, declares Yahweh, when I will cause the battle cry to be heard against Rabbah of the Ammonites, and it will become a desolate mound, and its daughter towns will be set on fire. Then Israel will dispossess those who dispossessed him, says Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the shout of war' or 'the alarm of war.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'its daughters,' an idiom for the smaller towns or villages dependent on a main city.
    reason: cultural_note
  - marker: c
    text: 'The Hebrew uses a wordplay on the same verb: Israel will ''dispossess'' those who had ''dispossessed'' him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks an inferential transition from the preceding accusation/judgment; 'Therefore' preserves the prophetic logic.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Retains the prophetic deictic force and solemnity. Though somewhat elevated, it remains readable and signals emphasis better than omitting it.
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  lexicon: HALOT
  rationale: Standard prophetic idiom announcing an impending future act of God; rendered transparently.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A conventional prophetic formula. 'Declares the LORD' is idiomatic modern English and preserves the formal prophetic register.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and consistency with the LXX/English tradition noted in DOCTRINE.md.
- source_word: וְהִשְׁמַעְתִּי
  chosen: I will cause ... to be heard
  alternatives:
  - I will make ... heard
  - I will sound
  lexicon: HALOT
  rationale: The Hiphil of שׁמע is causative. 'Cause to be heard' preserves the causative sense more precisely than the simpler 'sound'.
- source_word: אֶל
  chosen: against
  alternatives:
  - to
  - toward
  - over
  lexicon: HALOT
  rationale: Although the preposition is literally 'to/toward,' in this military judgment context English idiom prefers 'against' for the hostile direction of the battle cry.
- source_word: רַבַּת בְּנֵי עַמּוֹן
  chosen: Rabbah of the Ammonites
  alternatives:
  - Rabbah of the sons of Ammon
  - Rabbah of the people of Ammon
  lexicon: HALOT
  rationale: Rabbah is the Ammonite capital. 'Of the Ammonites' is natural English while preserving the gentilic sense of the construct phrase.
- source_word: תְּרוּעַת מִלְחָמָה
  chosen: the battle cry
  alternatives:
  - the shout of war
  - the alarm of war
  lexicon: HALOT
  rationale: Conveys the loud martial signal or war shout in clear modern English. 'Battle cry' is concise and contextually apt.
- source_word: וְהָיְתָה לְתֵל שְׁמָמָה
  chosen: it will become a desolate mound
  alternatives:
  - it will become a heap of desolation
  - it will be a desolate ruin-mound
  lexicon: HALOT
  rationale: תֵל refers to a mound/ruin-heap, often an archaeological tell. 'Desolate mound' preserves the image without overly technical wording.
- source_word: וּבְנֹתֶיהָ
  chosen: its daughter towns
  alternatives:
  - its daughters
  - its dependent towns
  - its villages
  lexicon: HALOT
  rationale: The idiom refers to surrounding settlements dependent on the main city. 'Daughter towns' preserves the metaphor while making the referent explicit.
- source_word: בָּאֵשׁ תִּצַּתְנָה
  chosen: will be set on fire
  alternatives:
  - will burn in the fire
  - will be kindled with fire
  lexicon: HALOT
  rationale: Passive-like English best conveys the likely resultative sense in context of conquest and destruction.
- source_word: וְיָרַשׁ
  chosen: will dispossess
  alternatives:
  - will inherit
  - will take possession of
  lexicon: HALOT
  rationale: Though ירש can mean 'inherit/possess,' here the object is 'those who dispossessed him,' so the adversarial sense 'dispossess' best captures the reversal of fortunes.
- source_word: אֶת יֹרְשָׁיו
  chosen: those who dispossessed him
  alternatives:
  - his possessors
  - those who took possession of him
  - his heirs
  lexicon: HALOT
  rationale: 'The participle from the same root creates a wordplay: Israel will ירש those who ירש him. Rendering both with ''dispossess'' preserves the reversal better than ''inherit his inheritors.'' The singular suffix is retained as ''him,'' referring to Israel as a corporate singular.'
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - declares the LORD
  lexicon: HALOT
  rationale: A closing divine speech formula. 'Says the LORD' is natural and avoids overloading the verse with repeated 'declares,' while preserving the authority of the utterance.
