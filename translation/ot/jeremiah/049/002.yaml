theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Corporate singular suffix on יֹרְשָׁיו
  chosen_reading: him
  alternative_readings:
  - them
  rationale: The Hebrew suffix is singular, with Israel treated as a collective singular entity. Rendering 'him' preserves the source grammar and the project's gender-accurate principle rather than flattening to a plural.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
