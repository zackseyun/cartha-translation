id: JER.49.34
reference: Jeremiah 49:34
source:
  edition: WLC
  text: אֲשֶׁ֨ר הָיָ֧ה דְבַר יְהוָ֛ה אֶל יִרְמְיָ֥הוּ הַ/נָּבִ֖יא אֶל עֵילָ֑ם בְּ/רֵאשִׁ֗ית מַלְכ֛וּת צִדְקִיָּ֥ה מֶֽלֶךְ יְהוּדָ֖ה לֵ/אמֹֽר־־־־׃
translation:
  text: 'The word of Yahweh that came to Jeremiah the prophet concerning Elam, at the beginning of the reign of Zedekiah king of Judah, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against Elam.' The Hebrew preposition can introduce an oracle directed toward a nation and may be rendered either 'concerning' or 'against' depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: דְבַר יְהוָה
  chosen: The word of the LORD
  alternatives:
  - The message of the LORD
  - The word of Yahweh
  lexicon: HALOT
  rationale: דָּבָר in prophetic superscriptions commonly introduces an oracle as the 'word' or 'message' from God. 'Word' preserves the established prophetic formula and its weight. Per doctrine, יְהוָה is rendered 'the LORD' rather than a transliteration.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הָיָה
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: Although literally 'was,' in the formula אֲשֶׁר הָיָה דְבַר־יְהוָה English idiom is best represented by 'that came,' which is the natural equivalent for prophetic revelation formulas.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: A simple relative marker introducing the superscription; 'that' is idiomatic modern English.
- source_word: אֶל יִרְמְיָהוּ הַנָּבִיא
  chosen: to Jeremiah the prophet
  alternatives:
  - to Jeremiah the prophet himself
  lexicon: HALOT
  rationale: אֶל marks the recipient of the divine word. The appositional title הַנָּבִיא is retained explicitly as 'the prophet' to match the Hebrew.
- source_word: אֶל עֵילָם
  chosen: concerning Elam
  alternatives:
  - against Elam
  - to Elam
  lexicon: HALOT
  rationale: In prophetic headings, אֶל with a nation often functions as 'concerning' or 'against.' Since the heading introduces an oracle about Elam before the judgment content unfolds, 'concerning' is the more neutral and textually cautious choice; 'against' is possible but slightly interpretive.
- source_word: עֵילָם
  chosen: Elam
  lexicon: HALOT
  rationale: Standard transliteration of the place name, in keeping with the policy to transliterate names.
- source_word: בְּרֵאשִׁית
  chosen: at the beginning of
  alternatives:
  - in the beginning of
  - at the start of
  lexicon: HALOT
  rationale: This temporal phrase marks the early period of Zedekiah's reign. 'At the beginning of' is natural and sufficiently formal.
- source_word: מַלְכוּת
  chosen: the reign of
  alternatives:
  - the kingship of
  - the kingdom of
  lexicon: HALOT
  rationale: Here the noun refers to the period of royal rule, not the realm itself. 'Reign' best fits the temporal construction.
- source_word: צִדְקִיָּה מֶלֶךְ יְהוּדָה
  chosen: Zedekiah king of Judah
  alternatives:
  - Zedekiah, the king of Judah
  lexicon: HALOT
  rationale: Standard rendering of the royal identification; the appositional structure is preserved in smooth English.
- source_word: לֵאמֹר
  chosen: 'saying:'
  alternatives:
  - 'thus:'
  - 'as follows:'
  lexicon: HALOT
  rationale: This infinitive introduces the following oracle. 'Saying:' is the standard and transparent rendering, especially appropriate because the next verse begins the divine speech.
