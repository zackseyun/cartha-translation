id: JER.49.35
reference: Jeremiah 49:35
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת הִנְ/נִ֥י שֹׁבֵ֖ר אֶת קֶ֣שֶׁת עֵילָ֑ם רֵאשִׁ֖ית
    גְּבוּרָתָֽ/ם־׃
translation:
  text: 'Thus says the LORD of hosts: Behold, I am breaking the bow of Elam, the foremost
    of their might.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chief part of their strength' or 'the mainstay of their might.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  - So
  lexicon: HALOT
  rationale: Standard prophetic discourse marker introducing a divine oracle. 'Thus'
    preserves the formal tone and familiar prophetic cadence without adding content.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and matching the translation's stated
    policy.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - of heavenly armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the conventional and sufficiently
    transparent rendering. 'Armies' is possible, but 'hosts' preserves the breadth
    of the term, which can include heavenly and earthly forces.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: The particle-plus-pronominal form marks emphatic divine self-involvement
    and imminence. 'Behold, I am' preserves both the attention signal and the verbal
    force carried into the following participle.
- source_word: שֹׁבֵר
  chosen: breaking
  alternatives:
  - about to break
  - shattering
  lexicon: HALOT
  rationale: The participle with הִנְנִי expresses imminent or certain action. 'I
    am breaking' is a natural English way to preserve the aspectual force without
    overinterpreting it as merely future or as more violent than the Hebrew requires.
- source_word: קֶשֶׁת
  chosen: the bow
  alternatives:
  - the battle bow
  lexicon: HALOT
  rationale: The singular 'bow' is literal and likely represents Elam's military power,
    especially given Elam's association with archery. 'Battle bow' would make the
    implication explicit, but the Hebrew itself simply says 'bow.'
- source_word: עֵילָם
  chosen: Elam
  lexicon: HALOT
  rationale: Standard transliteration of the place/nation name.
- source_word: רֵאשִׁית
  chosen: the foremost
  alternatives:
  - the chief part
  - the beginning
  - the mainstay
  lexicon: HALOT
  rationale: Here רֵאשִׁית functions appositionally to explain the bow as the leading
    or principal element of Elam's strength. 'The foremost' is concise and idiomatic
    in English.
- source_word: גְּבוּרָתָם
  chosen: of their might
  alternatives:
  - of their strength
  - of their power
  lexicon: HALOT
  rationale: גְּבוּרָה denotes strength, might, or military prowess. 'Might' fits
    the martial context and pairs well with the image of the bow as Elam's principal
    strength.
