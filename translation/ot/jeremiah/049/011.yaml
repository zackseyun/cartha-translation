id: JER.49.11
reference: Jeremiah 49:11
source:
  edition: WLC
  text: עָזְבָ֥/ה יְתֹמֶ֖י/ךָ אֲנִ֣י אֲחַיֶּ֑ה וְ/אַלְמְנֹתֶ֖י/ךָ עָלַ֥/י תִּבְטָֽחוּ׃ס
translation:
  text: Leave your fatherless children; I will keep them alive. And let your widows
    trust in me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your orphans.' The Hebrew term specifically denotes the fatherless.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָזְבָה
  chosen: Leave
  alternatives:
  - Forsake
  - Abandon
  lexicon: HALOT
  rationale: 'Qal imperative 2ms from עזב, functioning as a direct address: ''leave''
    or ''entrust/leave behind.'' ''Leave'' is the most natural English imperative
    here and avoids overstating the harshness with ''abandon,'' while still preserving
    the command-like force.'
- source_word: יְתֹמֶיךָ
  chosen: your fatherless children
  alternatives:
  - your orphans
  - your fatherless ones
  lexicon: HALOT
  rationale: יָתוֹם denotes an orphan/fatherless child. 'Fatherless children' preserves
    the Hebrew social category and is idiomatic in English; 'orphans' is possible
    but can imply loss of both parents, whereas the Hebrew term specifically highlights
    fatherlessness.
- source_word: אֲנִי
  chosen: I
  lexicon: HALOT
  rationale: 'Explicit independent pronoun adds emphasis: ''I'' myself will act. Retained
    in English for emphasis and clarity.'
- source_word: אֲחַיֶּה
  chosen: will keep them alive
  alternatives:
  - will preserve them alive
  - will let them live
  - will sustain them
  lexicon: HALOT
  rationale: Piel imperfect 1cs of חיה conveys causing to live/preserving life. 'Will
    keep them alive' best captures the causative nuance in natural English.
- source_word: וְאַלְמְנֹתֶיךָ
  chosen: And let your widows
  alternatives:
  - and your widows
  - and as for your widows
  lexicon: HALOT
  rationale: 'אַלְמָנָה means widow. The conjunction plus following jussive/imperfect
    naturally yields an exhortation: ''and let your widows...''.'
- source_word: עָלַי
  chosen: in me
  alternatives:
  - on me
  - upon me
  lexicon: HALOT
  rationale: With בטח, על marks the object of trust. English idiom prefers 'trust
    in me,' though 'trust me' or 'trust on me' would be less precise or less natural.
- source_word: תִּבְטָחוּ
  chosen: trust
  alternatives:
  - put their trust
  - rely
  lexicon: HALOT
  rationale: 'Qal imperfect/jussive 3fp from בטח agrees with ''widows'' and expresses
    exhortation or assurance: ''let ... trust.'' ''Trust'' is concise and preserves
    the relational sense.'
