id: JER.49.26
reference: Jeremiah 49:26
source:
  edition: WLC
  text: לָ/כֵ֛ן יִפְּל֥וּ בַחוּרֶ֖י/הָ בִּ/רְחֹבֹתֶ֑י/הָ וְ/כָל אַנְשֵׁ֨י הַ/מִּלְחָמָ֤ה
    יִדַּ֨מּוּ֙ בַּ/יּ֣וֹם הַ/ה֔וּא נְאֻ֖ם יְהוָ֥ה צְבָאֽוֹת־׃
translation:
  text: Therefore her young men will fall in her streets, and all the men of war will
    be silenced on that day, declares the LORD of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in her squares' or 'in her open places.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will perish' or 'will be cut off.' The Hebrew verb can denote being
      silenced, stilled, or brought to ruin.
    reason: lexical_alternative
  - marker: c
    text: 'Traditional rendering: ''the LORD of hosts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Standard inferential particle introducing the consequence of the preceding
    judgment oracle; 'Therefore' is natural and suitably formal.
- source_word: יִפְּלוּ
  chosen: will fall
  alternatives:
  - shall fall
  lexicon: HALOT
  rationale: Qal imperfect of נפל in a military-judgment context commonly denotes
    falling in battle, often implying death. 'Will fall' preserves the Hebrew idiom
    without over-specifying 'be killed'.
- source_word: בַחוּרֶיהָ
  chosen: her young men
  alternatives:
  - her chosen men
  - her youths
  lexicon: HALOT
  rationale: בָּחוּר commonly refers to young men in the prime of life, especially
    those fit for battle. 'Young men' is the most natural English rendering here.
- source_word: בִּרְחֹבֹתֶיהָ
  chosen: in her streets
  alternatives:
  - in her squares
  - in her open places
  lexicon: HALOT
  rationale: רְחוֹב can denote a broad street, plaza, or public square. 'Streets'
    is idiomatic in English and fits an urban battle scene, while a footnote preserves
    the more specific alternative 'squares'.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: Simple conjunctive plus totalizing quantifier; 'and all' is the most
    straightforward rendering.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  chosen: the men of war
  alternatives:
  - the warriors
  - the fighting men
  lexicon: HALOT
  rationale: A conventional Hebrew expression for combatants. 'Men of war' preserves
    the idiom and the masculine reference of the source; 'warriors' is possible but
    less formally transparent.
- source_word: יִדַּמּוּ
  chosen: will be silenced
  alternatives:
  - will perish
  - will be cut off
  - will be destroyed
  lexicon: HALOT
  rationale: Nifal of דמם/דמה in judgment contexts can mean to be silenced, stilled,
    or brought to ruin. 'Will be silenced' preserves the core image and leaves the
    result implicit, while a footnote preserves the stronger contextual alternative
    'will perish'.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal expression in prophetic discourse; 'on that day' is
    idiomatic modern English.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: Prophetic formula introducing divine speech authentication. 'Declares'
    is clear, readable, and standard in modern English Bible translation.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: The title יְהוָה צְבָאוֹת is rendered transparently as 'the LORD of Armies'
    rather than the traditional but less immediately clear 'LORD of hosts.' This preserves
    the martial force of the title in a war-judgment context.
