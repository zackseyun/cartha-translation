id: JER.49.6
reference: Jeremiah 49:6
source:
  edition: WLC
  text: וְ/אַחֲרֵי כֵ֗ן אָשִׁ֛יב אֶת שְׁב֥וּת בְּנֵֽי עַמּ֖וֹן נְאֻם יְהוָֽה־־־־׃ס
translation:
  text: But afterward I will restore the fortunes of the people of Ammon, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'restore the captivity of the people of Ammon.' The Hebrew idiom can refer to reversal of captivity or, more broadly, restoration of fortunes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַחֲרֵי כֵן
  chosen: But afterward
  alternatives:
  - And after that
  - Afterward
  lexicon: HALOT
  rationale: אַחֲרֵי כֵן is a temporal expression meaning 'after this/afterward.' The prefixed conjunction is rendered 'But' to reflect the discourse turn from judgment to restoration in context, while still preserving the temporal sequence.
- source_word: אָשִׁיב
  chosen: I will restore
  alternatives:
  - I will bring back
  - I will return
  lexicon: HALOT
  rationale: Hiphil of שוב commonly means 'bring back/restore.' In this restoration formula, 'restore' is the most natural English rendering and fits the object שְׁבוּת idiomatically.
- source_word: אֶת שְׁבוּת
  chosen: the fortunes
  alternatives:
  - the captivity
  - the exiles
  - what was taken captive
  lexicon: HALOT
  rationale: The idiom שׁוּב/הֵשִׁיב אֶת־שְׁבוּת often functions as a restoration formula broader than literal return from captivity, so 'restore the fortunes' best captures the idiomatic sense in contemporary English. Because 'captivity' is a traditional and possible more formal rendering, it is preserved in a footnote.
- source_word: בְּנֵי עַמּוֹן
  chosen: the people of Ammon
  alternatives:
  - the sons of Ammon
  - the Ammonites
  lexicon: HALOT
  rationale: Literally 'sons of Ammon.' 'The people of Ammon' preserves the collective ethnic/national sense in clear modern English without unnecessary literalism. 'The Ammonites' is also possible, but the construct phrase is slightly better reflected by 'people of Ammon.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. 'Declares the LORD' is idiomatic, dignified, and transparent. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
