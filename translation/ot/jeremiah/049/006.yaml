theological_decisions:
- issue: Restoration promise to Ammon after judgment
  chosen_reading: Render the verse as a genuine future restoration oracle without narrowing its scope beyond the text.
  alternative_readings:
  - A strictly political restoration only
  - A spiritualized restoration detached from the national referent
  rationale: The Hebrew states a future act of restoration for the people of Ammon but does not specify the full mode or extent of that restoration. The translation preserves that theological tension rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
