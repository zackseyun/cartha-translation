theological_decisions:
- issue: Prophetic/eschatological force of בְּאַחֲרִית הַיָּמִים
  chosen_reading: Rendered as 'in the latter days' without specifying a detailed eschatological scheme.
  alternative_readings:
  - in the last days as a more explicitly eschatological phrase
  - in days to come as a less theologically loaded temporal phrase
  rationale: The Hebrew idiom can bear eschatological significance, but the verse itself does not define the timing in a way that justifies importing a specific doctrinal framework. The chosen rendering preserves the tension and prophetic weight.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of the restoration formula אשוב את שבית עילם
  chosen_reading: Understood as a broad restoration of Elam's fortunes.
  alternative_readings:
  - a narrower restoration from captivity/exile
  - return of Elam's captives
  rationale: The Hebrew restoration formula is idiomatic and may include return from exile, reversal of judgment, and renewed well-being. 'Restore the fortunes' preserves this breadth without over-specifying the mechanism.
  doctrine_reference: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.
