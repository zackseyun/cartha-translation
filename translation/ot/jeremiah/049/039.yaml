id: JER.49.39
reference: Jeremiah 49:39
source:
  edition: WLC
  text: וְ/הָיָ֣ה בְּ/אַחֲרִ֣ית הַ/יָּמִ֗ים אשוב אֶת שבית עֵילָ֖ם נְאֻם יְהוָֽה׀־־׃ס
translation:
  text: But in the latter days I will restore the fortunes of Elam, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will bring back the captivity/captives of Elam.' The Hebrew restoration formula can refer specifically to return from captivity or more broadly to restored fortunes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הָיָה
  chosen: But it will happen / But
  alternatives:
  - And it will happen
  - And
  lexicon: HALOT
  rationale: The clause introduces a future reversal after the preceding judgment oracle. In English, a simple adversative/discourse-transition 'But' best captures the prophetic turn without woodenly retaining 'it will happen.'
- source_word: בְּ/אַחֲרִית הַ/יָּמִים
  chosen: in the latter days
  alternatives:
  - in the last days
  - in days to come
  lexicon: HALOT
  rationale: A standard prophetic idiom for a future time, often with eschatological overtones. 'Latter days' preserves the idiomatic and potentially theological weight better than the flatter 'days to come.'
- source_word: אשוב
  chosen: I will restore
  alternatives:
  - I will bring back
  - I will return
  lexicon: HALOT
  rationale: Although the verb שׁוּב commonly means 'return/turn back,' with the object phrase 'the fortunes/captivity' it forms an idiom meaning to restore a people's condition. 'Restore' communicates the idiomatic sense in natural English.
- source_word: אֶת שבית
  chosen: the fortunes
  alternatives:
  - the captivity
  - the captives
  lexicon: HALOT
  rationale: The phrase שְׁבוּת/שבית in restoration formulas can denote captivity, captives, or more broadly fortunes. Here 'restore the fortunes' is the most idiomatic English rendering of the whole expression and avoids implying only physical return from exile when the text may indicate broader reversal. The alternative is preserved in a footnote.
- source_word: עֵילָם
  chosen: Elam
  lexicon: HALOT
  rationale: Proper name of the nation/region; per translation philosophy, names are transliterated rather than translated.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Declares the LORD' is clear modern English and preserves the solemn prophetic force. 'the LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
