id: JER.49.14
reference: Jeremiah 49:14
source:
  edition: WLC
  text: שְׁמוּעָ֤ה שָׁמַ֨עְתִּי֙ מֵ/אֵ֣ת יְהוָ֔ה וְ/צִ֖יר בַּ/גּוֹיִ֣ם שָׁל֑וּחַ הִֽתְקַבְּצוּ֙
    וּ/בֹ֣אוּ עָלֶ֔י/הָ וְ/ק֖וּמוּ לַ/מִּלְחָמָֽה׃
translation:
  text: 'I have heard a report from the LORD, and a messenger has been sent among
    the nations: “Gather yourselves, and come against her, and rise up for battle.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an envoy' or 'an ambassador has been sent among the nations.'
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'her' refers to Edom, personified as a woman in the surrounding
      context.
    reason: cross_reference
lexical_decisions:
- source_word: שְׁמוּעָה
  chosen: a report
  alternatives:
  - news
  - tidings
  - a message
  lexicon: HALOT
  rationale: The noun denotes something heard, i.e., a report or piece of news. 'Report'
    is natural modern English and fits the prophetic announcement context better than
    the archaic 'tidings.'
- source_word: שָׁמַעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: HALOT
  rationale: The perfect can be rendered as simple past or present perfect in English.
    'I have heard' preserves the immediacy of the prophet's reception of the message
    and reads naturally in context.
- source_word: מֵאֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: מֵאֵת marks source/origin. Per doctrine, יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: צִיר
  chosen: a messenger
  alternatives:
  - an envoy
  - an ambassador
  lexicon: HALOT
  rationale: The term can denote an envoy or messenger. 'Messenger' is broad and clear;
    'ambassador' may sound overly formal or diplomatic in English, though that nuance
    is possible and worth preserving in a footnote.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the Gentiles
  - to the nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the surrounding peoples/nations, not specifically
    'Gentiles' in a later theological sense. 'Among the nations' best matches the
    preposition and prophetic war-summons setting.
- source_word: שָׁלוּחַ
  chosen: has been sent
  alternatives:
  - is sent
  - was sent
  lexicon: HALOT
  rationale: The passive participle describes the messenger as dispatched. 'Has been
    sent' gives good English aspect and links the sending with the summons that follows.
- source_word: הִתְקַבְּצוּ
  chosen: Gather yourselves
  alternatives:
  - Assemble yourselves
  - Gather together
  lexicon: HALOT
  rationale: A reflexive/plural imperative-like summons. 'Gather yourselves' is direct
    and readable while preserving the collective call.
- source_word: וּבֹאוּ עָלֶיהָ
  chosen: and come against her
  alternatives:
  - and come upon her
  - and advance against her
  lexicon: HALOT
  rationale: עַל with בוא in military context conveys hostile movement against a target.
    'Come against her' is idiomatic English for attack. The feminine singular pronoun
    refers to Edom/Bozrah as a personified entity.
- source_word: וְקוּמוּ לַמִּלְחָמָה
  chosen: and rise up for battle
  alternatives:
  - and rise up for war
  - and prepare for battle
  lexicon: HALOT
  rationale: The idiom is a martial call to take action. 'Rise up for battle' preserves
    the verbal force of קום and uses accessible modern English; 'war' is possible
    but 'battle' fits the immediate summons.
