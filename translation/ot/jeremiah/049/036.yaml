id: JER.49.36
reference: Jeremiah 49:36
source:
  edition: WLC
  text: וְ/הֵבֵאתִ֨י אֶל עֵילָ֜ם אַרְבַּ֣ע רוּח֗וֹת מֵֽ/אַרְבַּע֙ קְצ֣וֹת הַ/שָּׁמַ֔יִם
    וְ/זֵ֣רִתִ֔י/ם לְ/כֹ֖ל הָ/רֻח֣וֹת הָ/אֵ֑לֶּה וְ/לֹֽא יִהְיֶ֣ה הַ/גּ֔וֹי אֲשֶׁ֛ר
    לֹֽא יָב֥וֹא שָׁ֖ם נִדְּחֵ֥י עולם־־־׃
translation:
  text: I will bring against Elam the four winds from the four ends of the heavens,
    and I will scatter them to all these winds. There will be no nation where the
    outcasts of Elam will not go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the four corners of heaven.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the dispersed of Elam' or 'the banished of Elam.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבֵאתִי
  chosen: I will bring against
  alternatives:
  - I will bring to
  - I will bring upon
  lexicon: HALOT
  rationale: The hiphil of בוא with אֶל can mean 'bring to/against.' In this judgment
    context, English 'bring against Elam' best conveys hostile action while remaining
    natural.
- source_word: עֵילָם
  chosen: Elam
  lexicon: HALOT
  rationale: Proper place/nation name; transliterated per translation philosophy.
- source_word: אַרְבַּע רוּחוֹת
  chosen: the four winds
  alternatives:
  - four winds
  - four spirits
  lexicon: HALOT
  rationale: רוּחוֹת here refers to directional winds, reinforced by 'from the four
    ends of the heavens.' 'Spirits' is possible lexically but context strongly favors
    meteorological/cardinal winds.
- source_word: מֵאַרְבַּע קְצוֹת הַשָּׁמַיִם
  chosen: from the four ends of the heavens
  alternatives:
  - from the four corners of heaven
  - from the four extremities of the sky
  lexicon: HALOT
  rationale: קצות denotes extremities/ends. 'Ends of the heavens' is a clear, fairly
    literal rendering; 'corners' is idiomatic but less textually precise.
- source_word: וְזֵרִתִים
  chosen: and I will scatter them
  alternatives:
  - and I will winnow them
  - and I will disperse them
  lexicon: HALOT
  rationale: זרה in judgment contexts commonly conveys scattering/dispersing like
    winnowing. 'Scatter' is the most natural English here and preserves the image
    adequately.
- source_word: לְכֹל הָרֻחוֹת הָאֵלֶּה
  chosen: to all these winds
  alternatives:
  - to every one of these winds
  - to all these directions
  lexicon: HALOT
  rationale: Maintains the wind/directional imagery established earlier. 'Directions'
    interprets the metaphor; 'winds' better preserves the Hebrew wording.
- source_word: וְלֹא יִהְיֶה הַגּוֹי אֲשֶׁר לֹא יָבוֹא שָׁם
  chosen: There will be no nation where ... will not go
  alternatives:
  - There will be no nation to which ... will not come
  - No nation will fail to receive ...
  lexicon: HALOT
  rationale: This clause expresses totality of dispersion. Rendering with 'There will
    be no nation where' gives idiomatic English while preserving the double-negative
    force.
- source_word: נִדְּחֵי עֵילָם
  chosen: the outcasts of Elam
  alternatives:
  - the banished of Elam
  - the dispersed of Elam
  - the fugitives of Elam
  lexicon: HALOT
  rationale: נדחי denotes those driven away/scattered. 'Outcasts' is a standard and
    suitably forceful rendering in prophetic judgment contexts.
