id: JER.49.13
reference: Jeremiah 49:13
source:
  edition: WLC
  text: כִּ֣י בִ֤/י נִשְׁבַּ֨עְתִּי֙ נְאֻם יְהוָ֔ה כִּֽי לְ/שַׁמָּ֧ה לְ/חֶרְפָּ֛ה
    לְ/חֹ֥רֶב וְ/לִ/קְלָלָ֖ה תִּֽהְיֶ֣ה בָצְרָ֑ה וְ/כָל עָרֶ֥י/הָ תִהְיֶ֖ינָה לְ/חָרְב֥וֹת
    עוֹלָֽם־־־׃
translation:
  text: For I have sworn by myself, declares the LORD, that Bozrah will become a horror,
    a reproach, a ruin, and a curse, and all her cities will become everlasting ruins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an astonishment' for 'a horror.' The Hebrew term denotes something so
      devastated that it causes appalled astonishment.
    reason: lexical_alternative
  - marker: b
    text: Or 'an object of cursing' for 'a curse.' The Hebrew may emphasize that Bozrah
      becomes a byword invoked in curses.
    reason: lexical_alternative
  - marker: c
    text: Or 'perpetual ruins' for 'everlasting ruins.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִי
  chosen: by myself
  alternatives:
  - by me
  lexicon: HALOT
  rationale: With נשבעתי ('I have sworn'), the preposition ב plus 1cs suffix forms
    the idiom 'swear by oneself.' 'By myself' is the natural English equivalent and
    preserves the solemn self-imprecation formula.
- source_word: נִשְׁבַּעְתִּי
  chosen: I have sworn
  alternatives:
  - I swore
  lexicon: HALOT
  rationale: The perfect verb presents a completed divine oath with present force
    in context. 'I have sworn' conveys the solemnity and ongoing force of the oath
    better than simple past.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is idiomatic
    modern English and preserves prophetic authority. Per doctrine, יְהוָה is rendered
    'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance
    with DOCTRINE.md.
- source_word: לְשַׁמָּה
  chosen: a horror
  alternatives:
  - an astonishment
  - a desolation
  lexicon: HALOT
  rationale: The noun denotes an object of appalled astonishment. 'A horror' communicates
    both devastation and the reaction it provokes in readable modern English.
- source_word: לְחֶרְפָּה
  chosen: a reproach
  alternatives:
  - a disgrace
  - an object of scorn
  lexicon: HALOT
  rationale: חרפה commonly denotes reproach, disgrace, or public shame. 'A reproach'
    preserves the covenant-judgment register and pairs well with the surrounding nouns.
- source_word: לְחֹרֶב
  chosen: a ruin
  alternatives:
  - a waste
  - desolation
  lexicon: HALOT
  rationale: The term refers to waste/desolation resulting from destruction. 'A ruin'
    is concise and natural in the sequence of judgment terms.
- source_word: וְלִקְלָלָה
  chosen: and a curse
  alternatives:
  - and an object of cursing
  lexicon: HALOT
  rationale: קללה can denote both 'curse' and something used as a formula of cursing.
    'A curse' is the most direct rendering; the idiomatic nuance is preserved by the
    context of judgment.
- source_word: תִּהְיֶה בָצְרָה
  chosen: Bozrah will become
  alternatives:
  - Bozrah will be
  lexicon: HALOT
  rationale: With היה plus ל-prefixed predicate nouns, English often reads more naturally
    as 'become,' highlighting the transition into a judged state.
- source_word: בָצְרָה
  chosen: Bozrah
  lexicon: HALOT
  rationale: Proper place name; transliterated according to project policy for names.
- source_word: וְכָל עָרֶיהָ
  chosen: and all her cities
  alternatives:
  - and all its cities
  lexicon: HALOT
  rationale: Hebrew uses a feminine suffix referring back to the city Bozrah. English
    commonly personifies cities as feminine in such contexts; 'her cities' preserves
    the grammatical and literary linkage.
- source_word: לְחָרְבוֹת עוֹלָם
  chosen: everlasting ruins
  alternatives:
  - perpetual ruins
  - ancient ruins
  lexicon: HALOT
  rationale: The phrase denotes ruins enduring indefinitely. 'Everlasting ruins' preserves
    the force of עולם in a judgment oracle without weakening it to merely 'long-lasting.'
