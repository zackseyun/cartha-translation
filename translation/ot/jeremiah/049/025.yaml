id: JER.49.25
reference: Jeremiah 49:25
source:
  edition: WLC
  text: אֵ֥יךְ לֹֽא עֻזְּבָ֖ה עִ֣יר תהלה קִרְיַ֖ת מְשׂוֹשִֽׂ/י־׃
translation:
  text: How has the city of praise not been abandoned, the city of my joy?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How is the city of praise not abandoned, the city of my delight?'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the city of my joy'; the first-person suffix is retained, though
      interpreters differ on whose voice is represented in the lament.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  chosen: How
  alternatives:
  - How is it that
  - Why
  lexicon: HALOT
  rationale: Interrogative/exclamatory particle introducing astonishment or lament.
    'How' preserves the rhetorical force without over-interpreting it as strictly
    causal ('why').
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Simple negation modifying the passive verb; retained directly in English.
- source_word: עֻזְּבָה
  chosen: been abandoned
  alternatives:
  - been forsaken
  - been left
  lexicon: HALOT
  rationale: Qal passive/perfect feminine singular from עזב, agreeing with 'city.'
    'Abandoned' is natural modern English and conveys desertion more clearly than
    the more archaic 'forsaken.' The English perfect ('has ... been') fits the rhetorical
    present perspective.
- source_word: עִיר
  chosen: city
  alternatives:
  - town
  lexicon: HALOT
  rationale: Standard rendering for עיר; 'city' is the normal gloss and fits the prophetic
    oracle context.
- source_word: תהלה
  chosen: of praise
  alternatives:
  - of renown
  - of glory
  lexicon: HALOT
  rationale: The noun תהלה commonly denotes praise. In context it likely characterizes
    Damascus as a celebrated city. 'Of praise' stays close to the Hebrew while allowing
    the idiomatic sense of a praised/renowned city.
- source_word: קִרְיַת
  chosen: the city of
  alternatives:
  - the town of
  lexicon: HALOT
  rationale: Construct form parallel to עִיר. Rendering it again as 'the city of'
    preserves the poetic apposition rather than collapsing the two phrases into one
    descriptor.
- source_word: מְשׂוֹשִׂי
  chosen: my joy
  alternatives:
  - my delight
  - my rejoicing
  lexicon: HALOT
  rationale: Noun meaning joy/gladness with 1cs suffix. 'My joy' is the most direct
    rendering. The speaker is best taken as personified Damascus or the lamenting
    voice within the poem; the translation preserves the first-person suffix rather
    than resolving the ambiguity.
