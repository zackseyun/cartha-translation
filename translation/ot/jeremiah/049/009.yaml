id: JER.49.9
reference: Jeremiah 49:9
source:
  edition: WLC
  text: אִם בֹּֽצְרִים֙ בָּ֣אוּ לָ֔/ךְ לֹ֥א יַשְׁאִ֖רוּ עֽוֹלֵל֑וֹת אִם גַּנָּבִ֥ים
    בַּ/לַּ֖יְלָה הִשְׁחִ֥יתוּ דַיָּֽ/ם־־׃
translation:
  text: If grape gatherers came to you, would they not leave gleanings? If thieves
    came by night, they would destroy only enough for themselves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If thieves came by night, would they not steal only until they had
      enough?' The Hebrew phrase at the end is idiomatic, literally 'their enough.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a hypothetical comparison in each clause. 'If' preserves the
    conditional/rhetorical force better than a temporal 'when' in this taunt-like
    saying.
- source_word: בֹּצְרִים
  chosen: grape gatherers
  alternatives:
  - grape pickers
  - harvesters
  - vintagers
  lexicon: HALOT
  rationale: Refers specifically to those gathering grapes, not generic reapers. 'Grape
    gatherers' is natural modern English and preserves the vineyard imagery.
- source_word: בָּאוּ לָךְ
  chosen: came to you
  alternatives:
  - came against you
  - came upon you
  lexicon: HALOT
  rationale: The preposition plus pronoun can mean coming to or upon Edom. 'Came to
    you' keeps the Hebrew wording while allowing the hostile context to be inferred
    from the comparison.
- source_word: לֹא יַשְׁאִירוּ
  chosen: would they not leave
  alternatives:
  - would they not spare
  - would they not leave behind
  lexicon: HALOT
  rationale: The verb means 'leave remaining.' The rhetorical question in English
    is supplied to reflect the expected-answer force of the Hebrew comparison.
- source_word: עֹלֵלוֹת
  chosen: gleanings
  alternatives:
  - leftover grapes
  - remnants
  lexicon: HALOT
  rationale: A technical agricultural term for what remains after harvesting, especially
    grapes left for gleaning. 'Gleanings' is concise and biblically precise.
- source_word: גַּנָּבִים
  chosen: thieves
  alternatives:
  - robbers
  lexicon: HALOT
  rationale: The noun denotes thieves rather than violent bandits in particular. 'Thieves'
    fits the contrast with grape gatherers.
- source_word: בַּלַּיְלָה
  chosen: by night
  alternatives:
  - in the night
  - at night
  lexicon: HALOT
  rationale: '''By night'' is idiomatic and preserves the stealthy nuance of nocturnal
    theft.'
- source_word: הִשְׁחִיתוּ
  chosen: they would destroy
  alternatives:
  - they would ruin
  - they would plunder
  lexicon: HALOT
  rationale: The Hiphil of שׁחת commonly conveys ruining or destroying. Here it describes
    the extent of thieves' damage in the comparison; 'destroy' keeps the stronger
    force.
- source_word: דַיָּם
  chosen: only enough for themselves
  alternatives:
  - their sufficiency
  - until they had enough
  - what was sufficient for them
  lexicon: HALOT
  rationale: The noun דַּי means sufficiency/enough, with the suffix referring to
    the thieves. The sense is that thieves take only what suffices for them, unlike
    the total devastation being announced. 'Only enough for themselves' makes the
    idiom clear in modern English.
