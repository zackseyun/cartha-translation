theological_decisions:
- issue: Referent of 'Esau' in an oracle against Edom
  chosen_reading: Translate the personal name 'Esau' while allowing the national referent
    to remain implicit.
  alternative_readings:
  - Translate interpretively as 'Edom'
  rationale: The source text explicitly says 'Esau,' and the translation philosophy
    prioritizes original-language primacy and transliteration of names. The prophetic
    use of Esau for Edom is clear from context, so no doctrinal resolution is required
    beyond preserving the Hebrew wording.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Translate titles; transliterate names.'
