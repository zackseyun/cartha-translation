id: JER.49.10
reference: Jeremiah 49:10
source:
  edition: WLC
  text: כִּֽי אֲנִ֞י חָשַׂ֣פְתִּי אֶת עֵשָׂ֗ו גִּלֵּ֨יתִי֙ אֶת מִסְתָּרָ֔י/ו וְ/נֶחְבָּ֖ה
    לֹ֣א יוּכָ֑ל שֻׁדַּ֥ד זַרְע֛/וֹ וְ/אֶחָ֥י/ו וּ/שְׁכֵנָ֖י/ו וְ/אֵינֶֽ/נּוּ־־־׃
translation:
  text: For I have stripped Esau bare; I have uncovered his hiding places, and he
    will not be able to hide himself. His offspring is destroyed, and his brothers
    and his neighbors—and he is no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Esau,' used here for the nation descended from Esau, that is, Edom.
    reason: cross_reference
  - marker: b
    text: Or 'is plundered' / 'is devastated' for 'is destroyed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָשַׂפְתִּי
  chosen: have stripped ... bare
  alternatives:
  - have laid bare
  - have made bare
  lexicon: HALOT
  rationale: The verb conveys exposing by stripping away covering. 'Stripped ... bare'
    gives the force of complete exposure in natural English and pairs well with the
    following clause about uncovering hiding places.
- source_word: עֵשָׂו
  chosen: Esau
  alternatives:
  - Edom
  lexicon: HALOT
  rationale: The Hebrew text reads the personal name 'Esau.' In this oracle the name
    stands metonymically for Edom, but the translation preserves the source wording
    by transliterating the name.
- source_word: גִּלֵּיתִי
  chosen: have uncovered
  alternatives:
  - have revealed
  - have laid open
  lexicon: HALOT
  rationale: This verb commonly means to uncover or reveal. 'Have uncovered' preserves
    the concrete imagery and matches the exposure theme of the verse.
- source_word: מִסְתָּרָיו
  chosen: his hiding places
  alternatives:
  - his secret places
  - his places of concealment
  lexicon: HALOT
  rationale: The noun refers to places of concealment rather than abstract secrets.
    'Hiding places' is idiomatic and keeps the spatial sense.
- source_word: וְנֶחְבָּה לֹא יוּכָל
  chosen: he will not be able to hide himself
  alternatives:
  - he cannot conceal himself
  - it cannot remain hidden
  lexicon: HALOT
  rationale: The Niphal of חבא with יכל expresses inability to hide oneself. Rendering
    the subject personally ('he') fits the singular masculine forms referring back
    to Esau/Edom.
- source_word: שֻׁדַּד
  chosen: is destroyed
  alternatives:
  - is plundered
  - is devastated
  - is laid waste
  lexicon: HALOT
  rationale: The verb can denote violent despoiling or devastation. In this context,
    with offspring, brothers, and neighbors all ruined, 'is destroyed' communicates
    the totality of the judgment more clearly than the narrower 'plundered.'
- source_word: זַרְעוֹ
  chosen: his offspring
  alternatives:
  - his seed
  - his descendants
  lexicon: HALOT
  rationale: '''Offspring'' is natural modern English and preserves the collective
    sense of the singular noun.'
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his kinsmen
  lexicon: HALOT
  rationale: The literal familial term is retained. In context it may extend to allied
    kin-groups, but 'brothers' best matches the Hebrew.
- source_word: שְׁכֵנָיו
  chosen: his neighbors
  alternatives:
  - those dwelling near him
  - his surrounding peoples
  lexicon: HALOT
  rationale: Though the form derives from 'neighbor,' in an oracle against a nation
    it can include surrounding associates or nearby peoples. 'Neighbors' keeps the
    lexical value while remaining readable.
- source_word: וְאֵינֶנּוּ
  chosen: and he is no more
  alternatives:
  - and he is gone
  - and there is nothing left of him
  lexicon: HALOT
  rationale: This idiom expresses disappearance or annihilation. 'He is no more' is
    concise, idiomatic, and preserves the solemn finality.
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Here the conjunction introduces the reason or explanation for the announced
    judgment. 'For' fits the discourse flow.
