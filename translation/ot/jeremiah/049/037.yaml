id: JER.49.37
reference: Jeremiah 49:37
source:
  edition: WLC
  text: וְ/הַחְתַּתִּ֣י אֶת עֵ֠ילָם לִ/פְנֵ֨י אֹיְבֵי/הֶ֜ם וְ/לִ/פְנֵ֣י מְבַקְשֵׁ֣י
    נַפְשָׁ֗/ם וְ/הֵבֵאתִ֨י עֲלֵי/הֶ֧ם רָעָ֛ה אֶת חֲר֥וֹן אַפִּ֖/י נְאֻם יְהוָ֑ה וְ/שִׁלַּחְתִּ֤י
    אַֽחֲרֵי/הֶם֙ אֶת הַ/חֶ֔רֶב עַ֥ד כַּלּוֹתִ֖/י אוֹתָֽ/ם־׀׀־־־׃
translation:
  text: I will shatter Elam before their enemies and before those who seek their life.
    I will bring disaster on them, my burning anger, declares the LORD, and I will
    send the sword after them until I have consumed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I will terrify Elam” or “I will dismay Elam”; the Hebrew verb can emphasize
      causing panic or causing collapse.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “those who seek their life,” an idiom for those seeking to kill them.
    reason: lexical_alternative
  - marker: c
    text: Or “calamity”; Hebrew רָעָה here refers to disaster/judgment, not moral
      evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַחְתַּתִּי
  chosen: I will shatter
  alternatives:
  - I will terrify
  - I will dismay
  - I will break
  lexicon: HALOT
  rationale: From חתת in the Hiphil, conveying causing to be shattered, dismayed,
    or broken. In this judgment context with military defeat 'shatter' captures both
    psychological collapse and national breaking without reducing it merely to emotion.
- source_word: עֵילָם
  chosen: Elam
  rationale: Proper name; transliterated per translation philosophy.
- source_word: לִפְנֵי אֹיְבֵיהֶם
  chosen: before their enemies
  alternatives:
  - in the presence of their enemies
  - before the face of their enemies
  lexicon: HALOT
  rationale: לִפְנֵי is idiomatically 'before/in the presence of.' 'Before their enemies'
    is natural English and preserves the sense of exposure to hostile power.
- source_word: מְבַקְשֵׁי נַפְשָׁם
  chosen: those who seek their life
  alternatives:
  - those who seek their lives
  - those who seek to kill them
  lexicon: HALOT
  rationale: Hebrew idiom literally 'seek their soul/life.' Singular 'life' works
    idiomatically in English for life as existence; it preserves the Hebrew expression
    without over-paraphrasing to 'kill them,' though that is the implied sense.
- source_word: וְהֵבֵאתִי עֲלֵיהֶם רָעָה
  chosen: I will bring disaster on them
  alternatives:
  - I will bring evil upon them
  - I will bring calamity on them
  lexicon: HALOT
  rationale: רָעָה in prophetic judgment contexts commonly denotes calamity/disaster
    rather than moral evil. 'Disaster' avoids implying that God commits moral evil
    while preserving the announced judgment.
- source_word: אֶת חֲרוֹן אַפִּי
  chosen: my burning anger
  alternatives:
  - the fierceness of my anger
  - my fierce anger
  - my wrath
  lexicon: HALOT
  rationale: The phrase literally refers to the burning/fierce heat of anger. 'My
    burning anger' preserves the metaphor of heat more directly than the more traditional
    but flatter 'my fierce anger.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is clear modern English
    and preserves the solemn prophetic force. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Required by doctrine excerpt's contested terms table for the divine name.
- source_word: וְשִׁלַּחְתִּי אַחֲרֵיהֶם אֶת־הַחֶרֶב
  chosen: I will send the sword after them
  alternatives:
  - I will send the sword against them
  - I will pursue them with the sword
  lexicon: HALOT
  rationale: Retains the vivid personified image of the sword being sent after them
    in pursuit. 'After them' reflects אַחֲרֵיהֶם more closely than simply 'against
    them.'
- source_word: עַד כַּלּוֹתִי אוֹתָם
  chosen: until I have consumed them
  alternatives:
  - until I have finished them
  - until I have made an end of them
  - until I have destroyed them
  lexicon: HALOT
  rationale: כלה here means to complete, finish, or consume in judgment. 'Consumed
    them' preserves the totalizing force and fits the sword/judgment imagery better
    than the colloquial 'finished them.'
