theological_decisions:
- issue: Rendering רָעָה with reference to divine action
  chosen_reading: disaster
  alternative_readings:
  - evil
  - calamity
  rationale: In prophetic judgment language, the term denotes inflicted calamity rather
    than moral evil. This avoids importing a doctrinally misleading claim that God
    does moral evil while staying faithful to the Hebrew context.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH, with alternatives preserved only as noted.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
