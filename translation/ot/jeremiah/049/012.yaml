theological_decisions:
- issue: Metaphorical force of 'the cup'
  chosen_reading: Retain 'the cup' as a metaphor for divinely imposed judgment rather
    than explicating it as 'the cup of wrath' in the main text.
  alternative_readings:
  - the cup of wrath
  - the cup of judgment
  rationale: The immediate Hebrew text says only 'the cup.' The broader prophetic
    context supports the judgment metaphor, but adding 'wrath' in the main text would
    import an interpretive expansion not explicitly present in this verse.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
