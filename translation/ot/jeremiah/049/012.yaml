id: JER.49.12
reference: Jeremiah 49:12
source:
  edition: WLC
  text: כִּי כֹ֣ה אָמַ֣ר יְהוָ֗ה הִ֠נֵּה אֲשֶׁר אֵ֨ין מִשְׁפָּטָ֜/ם לִ/שְׁתּ֤וֹת הַ/כּוֹס֙
    שָׁת֣וֹ יִשְׁתּ֔וּ וְ/אַתָּ֣ה ה֔וּא נָקֹ֖ה תִּנָּקֶ֑ה לֹ֣א תִנָּקֶ֔ה כִּ֥י שָׁתֹ֖ה
    תִּשְׁתֶּֽה־׀־׃
translation:
  text: 'For thus says the LORD: Behold, those who were not sentenced to drink the
    cup will surely drink it, and are you the one who will go unpunished? You will
    not go unpunished, for you will surely drink.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'those for whom it was not their due to drink the cup.' The Hebrew phrase
      uses משפט ('judgment,' 'justice,' 'legal due').
    reason: lexical_alternative
  - marker: b
    text: '''The cup'' is a prophetic image for the judgment God gives nations to
      drink.'
    reason: cross_reference
  - marker: c
    text: Or, 'shall you indeed be acquitted? You shall not be acquitted.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional small-caps covenantal title rather than transliteration.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic deictic force and solemnity. 'Behold' is slightly
    more formal, but still natural in this judgment oracle.
- source_word: אֲשֶׁר אֵין מִשְׁפָּטָם לִשְׁתּוֹת הַכּוֹס
  chosen: those who were not sentenced to drink the cup
  alternatives:
  - those for whom it was not justice to drink the cup
  - those who had no right/obligation to drink the cup
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, legal due, or sentence. In this
    context of punitive imagery, the sense is that these people were not the ones
    judicially destined or obligated to drink the cup of wrath. 'Sentenced' communicates
    the forensic nuance in idiomatic English.
- source_word: הַכּוֹס
  chosen: the cup
  lexicon: HALOT
  rationale: Kept literally because 'the cup' is a standard prophetic metaphor for
    divinely given judgment/wrath; the metaphor should be preserved rather than paraphrased.
- source_word: שָׁתוֹ יִשְׁתּוּ
  chosen: will surely drink
  alternatives:
  - have indeed drunk
  - must certainly drink
  lexicon: HALOT
  rationale: 'The infinitive absolute plus finite verb intensifies the action. In
    context, an emphatic future is the best English equivalent: ''will surely drink.'''
- source_word: וְאַתָּה הוּא
  chosen: and are you the one
  alternatives:
  - and you—are you he
  - and you yourself
  lexicon: HALOT
  rationale: Preserves the emphatic, confrontational address to Edom while rendering
    the Hebrew pronoun construction in natural English.
- source_word: נָקֹה תִּנָּקֶה ... לֹא תִנָּקֶה
  chosen: who will go unpunished? You will not go unpunished
  alternatives:
  - shall you indeed be acquitted? You shall not be acquitted
  - shall you be left unpunished? You shall not be left unpunished
  lexicon: HALOT
  rationale: The root נקה in the Niphal commonly carries the sense 'be cleared, acquitted,
    go unpunished.' Here the rhetorical question followed by negation is best rendered
    with the judicial-punitive idiom 'go unpunished,' which fits the context of judgment.
- source_word: כִּי שָׁתֹה תִּשְׁתֶּה
  chosen: for you will surely drink
  alternatives:
  - for drinking you shall drink
  - for you must certainly drink
  lexicon: HALOT
  rationale: Again, the infinitive absolute with finite verb marks certainty/intensity.
    'Will surely drink' preserves the emphatic inevitability of the judgment.
