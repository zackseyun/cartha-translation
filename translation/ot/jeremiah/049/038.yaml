id: JER.49.38
reference: Jeremiah 49:38
source:
  edition: WLC
  text: וְ/שַׂמְתִּ֥י כִסְאִ֖/י בְּ/עֵילָ֑ם וְ/הַאֲבַדְתִּ֥י מִ/שָּׁ֛ם מֶ֥לֶךְ וְ/שָׂרִ֖ים נְאֻם יְהוָֽה־׃
translation:
  text: And I will set my throne in Elam, and I will destroy from there king and officials, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will place my throne in Elam.' The Hebrew verb can mean 'set,' 'place,' or 'establish.'
    reason: lexical_alternative
  - marker: b
    text: Or 'king and princes.' The Hebrew term for 'officials' can also refer to rulers or nobles.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  chosen: And I will set
  alternatives:
  - And I will place
  - And I will establish
  lexicon: HALOT
  rationale: שׂוּם commonly means 'set, place, put.' 'Set' is natural English and preserves the direct, forceful action without overinterpreting it as permanent enthronement, though the object 'my throne' implies royal establishment.
- source_word: כִסְאִי
  chosen: my throne
  alternatives:
  - my seat
  lexicon: HALOT
  rationale: כִּסֵּא most often denotes a throne in royal/judicial contexts. Given the divine speaker and the judgment context, 'my throne' best preserves the imagery of sovereign rule and judgment.
- source_word: בְּעֵילָם
  chosen: in Elam
  alternatives:
  - against Elam
  lexicon: HALOT
  rationale: The preposition ב normally means 'in.' Here it locates the setting of YHWH's throne within Elam. 'Against Elam' would import adversative force not present in the preposition itself.
- source_word: וְהַאֲבַדְתִּי
  chosen: and I will destroy
  alternatives:
  - and I will wipe out
  - and I will cause to perish
  lexicon: HALOT
  rationale: The Hiphil of אבד conveys causing to perish or destroying. 'Destroy' is clear, weighty, and idiomatic in English prophetic judgment language.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - out of there
  lexicon: HALOT
  rationale: 'The adverb with prefixed preposition is straightforwardly locative: removal from that place. ''From there'' is the most natural equivalent.'
- source_word: מֶלֶךְ
  chosen: king
  alternatives:
  - the king
  lexicon: HALOT
  rationale: 'The noun is anarthrous in Hebrew. English can naturally omit the article here in a class-representative sense: the ruler of Elam will be removed. ''The king'' is possible but slightly more specific than the Hebrew requires.'
- source_word: וְשָׂרִים
  chosen: officials
  alternatives:
  - princes
  - rulers
  lexicon: HALOT
  rationale: שָׂרִים refers to high-ranking leaders or officials. 'Officials' communicates governing elites in accessible modern English without the archaic feel of 'princes.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is a standard prophetic formula. 'Declares the LORD' is idiomatic, solemn, and consistent with modern English Bible style. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
