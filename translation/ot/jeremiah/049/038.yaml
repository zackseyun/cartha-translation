theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of 'my throne' in prophetic judgment context
  chosen_reading: retain the concrete royal image 'my throne' without interpretive expansion
  alternative_readings:
  - my rule
  - my judgment seat
  rationale: The verse presents YHWH's sovereignty and judgment over Elam through throne imagery. The translation preserves the metaphor rather than resolving it into a paraphrase, in keeping with optimal equivalence and the principle of preserving theological tension where possible.
