id: JER.49.28
reference: Jeremiah 49:28
source:
  edition: WLC
  text: לְ/קֵדָ֣ר וּֽ/לְ/מַמְלְכ֣וֹת חָצ֗וֹר אֲשֶׁ֤ר הִכָּה֙ נבוכדראצור מֶֽלֶךְ בָּבֶ֔ל
    כֹּ֖ה אָמַ֣ר יְהוָ֑ה ק֚וּמוּ עֲל֣וּ אֶל קֵדָ֔ר וְ/שָׁדְד֖וּ אֶת בְּנֵי קֶֽדֶם׀־־־־׃
translation:
  text: 'Concerning Kedar and the kingdoms of Hazor, which Nebuchadnezzar king of
    Babylon struck down: Thus says the LORD: Rise up, go up against Kedar, and plunder
    the people of the east.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''sons of the east,'' an idiom for eastern desert peoples.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew spelling here is closer to 'Nebuchadrezzar'; English convention usually
      writes 'Nebuchadnezzar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְקֵדָר
  chosen: Concerning Kedar
  alternatives:
  - Against Kedar
  - To Kedar
  lexicon: HALOT
  rationale: The prefixed ל in prophetic headings commonly introduces the subject
    of an oracle ('concerning/regarding'). 'Concerning' fits the superscription-like
    opening better than a directional 'to'.
- source_word: וּלְמַמְלְכוֹת חָצוֹר
  chosen: and the kingdoms of Hazor
  alternatives:
  - and against the kingdoms of Hazor
  lexicon: HALOT
  rationale: מַמְלָכוֹת is plural, so 'kingdoms' should be preserved. Hazor here likely
    refers not to the Canaanite city alone but to associated desert polities/clans;
    the construct is best rendered straightforwardly as 'kingdoms of Hazor'.
- source_word: אֲשֶׁר הִכָּה
  chosen: which ... struck down
  alternatives:
  - which ... attacked
  - which ... defeated
  lexicon: HALOT
  rationale: נכה often denotes striking/smiting in military contexts. 'Struck down'
    preserves the force while reading naturally in English.
- source_word: נבוכדראצור
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: Standard English transliteration is 'Nebuchadnezzar,' even though the
    Hebrew spelling here more closely reflects 'Nebuchadrezzar.' Readability and established
    English naming convention favor 'Nebuchadnezzar.'
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. Per doctrine, יְהוָה
    is rendered 'the LORD'.
- source_word: קוּמוּ
  chosen: Rise up
  alternatives:
  - Arise
  - Get up
  lexicon: HALOT
  rationale: '''Rise up'' preserves the imperative force in contemporary but dignified
    English.'
- source_word: עֲלוּ אֶל קֵדָר
  chosen: go up against Kedar
  alternatives:
  - go up to Kedar
  - advance against Kedar
  lexicon: HALOT
  rationale: עלה plus אֶל in military contexts can mean to march up against. Because
    the following imperative is hostile ('plunder'), 'against' makes the military
    sense explicit without overtranslation.
- source_word: וְשָׁדְדוּ
  chosen: and plunder
  alternatives:
  - and devastate
  - and despoil
  lexicon: HALOT
  rationale: שׁדד in warfare commonly means to plunder/spoil. 'Plunder' is clear modern
    English and matches the military command.
- source_word: בְּנֵי קֶדֶם
  chosen: the people of the east
  alternatives:
  - the sons of the east
  - the easterners
  lexicon: HALOT
  rationale: Literally 'sons of the east,' an idiom for eastern desert peoples. 'People
    of the east' communicates the sense in natural English while preserving the ethnogeographic
    reference.
