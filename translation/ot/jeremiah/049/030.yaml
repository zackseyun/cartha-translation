theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and established English convention while signaling the covenant name through small-caps
    style in publication.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Pronoun shift at the end of the verse
  chosen_reading: Preserve the Masoretic shift from 'you' to 'them' in English
  alternative_readings:
  - Harmonize to 'you' for smoother English
  rationale: The Hebrew text addresses the inhabitants directly and then refers to
    them in the third person. Because the source text contains this tension, the translation
    preserves it rather than resolving it for stylistic smoothness.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
