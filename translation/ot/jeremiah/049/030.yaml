id: JER.49.30
reference: Jeremiah 49:30
source:
  edition: WLC
  text: נֻסוּ֩ נֻּ֨דוּ מְאֹ֜ד הֶעְמִ֧יקוּ לָ/שֶׁ֛בֶת יֹשְׁבֵ֥י חָצ֖וֹר נְאֻם יְהוָ֑ה
    כִּֽי יָעַ֨ץ עֲלֵי/כֶ֜ם נְבוּכַדְרֶאצַּ֤ר מֶֽלֶךְ בָּבֶל֙ עֵצָ֔ה וְ/חָשַׁ֥ב עלי/הם
    מַחֲשָׁבָֽה־־־׃
translation:
  text: Flee! Wander far away! Dwell deep, inhabitants of Hazor, declares the LORD,
    for Nebuchadnezzar king of Babylon has taken counsel against you and devised a
    plan against them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''dwell deep,'' an idiom for retreating to remote or hidden places.'
    reason: cultural_note
  - marker: b
    text: The Hebrew shifts from 'against you' to 'against them' at the end of the
      verse; the translation preserves this change.
    reason: textual_variant
lexical_decisions:
- source_word: נֻסוּ
  chosen: Flee!
  alternatives:
  - Take flight!
  - Run away!
  lexicon: HALOT
  rationale: Qal imperative plural from נוס, a direct command to escape. 'Flee' is
    concise and idiomatic in prophetic warning contexts.
- source_word: נֻּדוּ
  chosen: Wander far away!
  alternatives:
  - Move away!
  - Flee far away!
  lexicon: HALOT
  rationale: Imperative plural from נוד, conveying movement away or roaming. Combined
    with מְאֹד it intensifies the call to put great distance between themselves and
    danger. 'Wander far away' preserves the distinct verb rather than collapsing it
    into the previous imperative.
- source_word: מְאֹד
  chosen: far
  alternatives:
  - greatly
  - very much
  lexicon: HALOT
  rationale: Though often an adverb of degree ('greatly'), in this imperative sequence
    it naturally intensifies the command to withdraw to a great extent. Rendering
    it with 'far' gives natural English while preserving the force.
- source_word: הֶעְמִיקוּ לָשֶׁבֶת
  chosen: Dwell deep
  alternatives:
  - Go deep to dwell
  - Hide yourselves in deep places
  lexicon: HALOT
  rationale: Hiphil imperative of עמק plus infinitive of ישב literally suggests making
    dwelling deep, i.e., settling in remote or hidden depths. 'Dwell deep' is compact
    and preserves the metaphor of retreating to inaccessible places.
- source_word: יֹשְׁבֵי חָצוֹר
  chosen: inhabitants of Hazor
  alternatives:
  - those who dwell in Hazor
  lexicon: HALOT
  rationale: Construct participle plus place name is idiomatically rendered 'inhabitants
    of Hazor.' Hazor here refers to the Arabian settlement/region in context, but
    the transliterated name should be retained.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is natural modern English
    and preserves the solemn prophetic authority. 'the LORD' follows the doctrinal
    default for YHWH.
- source_word: יָעַץ ... עֵצָה
  chosen: has taken counsel
  alternatives:
  - has planned
  - has counseled a counsel
  lexicon: HALOT
  rationale: The verb-noun pairing intensifies deliberate planning. 'Has taken counsel'
    preserves the counsel/planning semantic field without awkward literal repetition.
- source_word: עֲלֵיכֶם
  chosen: against you
  alternatives:
  - concerning you
  - over you
  lexicon: HALOT
  rationale: In this hostile military context, על with יעץ is best rendered adversatively
    as 'against you.'
- source_word: וְחָשַׁב ... מַחֲשָׁבָה
  chosen: and devised a plan
  alternatives:
  - and thought a thought
  - and formed a scheme
  lexicon: HALOT
  rationale: The cognate verb-noun construction again stresses intentional plotting.
    'Devised a plan' is idiomatic and preserves the deliberative sense.
- source_word: עליהם
  chosen: against them
  alternatives:
  - against you
  lexicon: HALOT
  rationale: The Masoretic text shifts from second person ('against you') to third
    person ('against them'). The translation preserves this shift rather than harmonizing
    it, since it is the received Hebrew wording and may reflect a rhetorical turn.
