theological_decisions:
- issue: Gendered human-reference language in the judgment formula
  chosen_reading: Retain 'man' and 'son of man' in the main text
  alternative_readings:
  - no one ... no human being
  rationale: The Hebrew uses masculine singular terms אִישׁ and בֶּן אָדָם in a representative/generic
    way. The project's doctrine specifies gender-accurate over gender-neutral renderings
    where the source uses masculine forms with generic force, with annotation where
    relevant.
