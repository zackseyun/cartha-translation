id: JER.49.33
reference: Jeremiah 49:33
source:
  edition: WLC
  text: וְ/הָיְתָ֨ה חָצ֜וֹר לִ/מְע֥וֹן תַּנִּ֛ים שְׁמָמָ֖ה עַד עוֹלָ֑ם לֹֽא יֵשֵׁ֥ב
    שָׁם֙ אִ֔ישׁ וְ/לֹֽא יָג֥וּר בָּ֖/הּ בֶּן אָדָֽם־־־־׃ס
translation:
  text: Hazor will become a haunt of jackals, a desolation forever; no man will dwell
    there, and no son of man will sojourn in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a dwelling for jackals.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'no man ... no son of man'; that is, no human being will live there.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: 'The qatal with prefixed conjunction in prophetic discourse is naturally
    rendered as a future result. ''Become'' brings out the change-of-state sense in
    context: Hazor is being turned into something else.'
- source_word: חָצוֹר
  chosen: Hazor
  rationale: Proper place name; transliterated per project philosophy.
- source_word: לִמְעוֹן
  chosen: a haunt of
  alternatives:
  - a dwelling for
  - a den of
  - a habitation of
  lexicon: HALOT
  rationale: מָעוֹן denotes a dwelling place or habitation. In context of wild animals
    occupying a ruined city, 'haunt of' is idiomatic modern English that preserves
    the image without sounding wooden.
- source_word: תַּנִּים
  chosen: jackals
  alternatives:
  - dragons
  - wild dogs
  lexicon: HALOT
  rationale: In prophetic ruin formulas this term commonly refers to jackals rather
    than mythic 'dragons.' 'Jackals' best fits the zoological and desolation imagery
    in modern English.
- source_word: שְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate waste
  - wasteland
  lexicon: HALOT
  rationale: The noun expresses devastation/desolation. 'A desolation' preserves the
    nominal force and the prophetic ruin formula.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for all time
  - perpetually
  lexicon: HALOT
  rationale: Standard idiomatic rendering for enduring duration in judgment language.
- source_word: לֹא יֵשֵׁב שָׁם אִישׁ
  chosen: no man will dwell there
  alternatives:
  - no one will dwell there
  - no person will live there
  lexicon: HALOT
  rationale: יָשַׁב is 'dwell/sit/live.' 'Dwell' fits the habitation context. אִישׁ
    is singular 'man'; per gender-accurate policy, 'man' is retained rather than neutralized.
- source_word: וְלֹא יָגוּר בָּהּ
  chosen: and no son of man will sojourn in it
  alternatives:
  - and no human being will reside in it
  - and no one will stay in it
  lexicon: HALOT
  rationale: גוּר often means to sojourn or reside as an outsider. 'Sojourn' preserves
    the nuance distinct from the previous 'dwell.' The preposition with feminine suffix
    refers back to the city, hence 'in it.'
- source_word: בֶּן אָדָם
  chosen: son of man
  alternatives:
  - human being
  - mortal
  lexicon: HALOT
  rationale: Literally 'son of man.' Here it is an idiomatic parallel to אִישׁ emphasizing
    human inhabitant. Per gender-accurate policy and original-language primacy, the
    literal form is retained in the main text, with a footnote preserving the idiomatic
    alternative.
