id: JER.49.21
reference: Jeremiah 49:21
source:
  edition: WLC
  text: מִ/קּ֣וֹל נִפְלָ֔/ם רָעֲשָׁ֖ה הָ/אָ֑רֶץ צְעָקָ֕ה בְּ/יַם ס֖וּף נִשְׁמַ֥ע קוֹלָֽ/הּ־׃
translation:
  text: At the sound of their fall the earth quakes; their cry is heard at the Red
    Sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Sea of Reeds.'' Traditionally rendered ''Red Sea.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקּוֹל
  chosen: At the sound of
  alternatives:
  - From the sound of
  - Because of the sound of
  lexicon: HALOT
  rationale: The preposition מִן with קוֹל can mark source or occasion. In English,
    'At the sound of' naturally conveys the causal/occasional sense here without over-literal
    awkwardness.
- source_word: נִפְלָם
  chosen: their fall
  alternatives:
  - their downfall
  - their falling
  lexicon: HALOT
  rationale: From נפל ('to fall'). In this judgment context, 'fall' is concise and
    preserves the metaphor of collapse; 'downfall' is possible but slightly more interpretive.
- source_word: רָעֲשָׁה
  chosen: quakes
  alternatives:
  - shakes
  - trembles
  lexicon: HALOT
  rationale: The verb רעשׁ denotes shaking or quaking, often in response to catastrophic
    or divine events. 'Quakes' best matches the force of the image with natural English.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Although אֶרֶץ can mean 'land,' the cosmic-sounding judgment formula
    with quaking favors 'the earth' rather than a merely local territory.
- source_word: צְעָקָה
  chosen: their cry
  alternatives:
  - a cry
  - the cry
  lexicon: HALOT
  rationale: The noun means 'cry/outcry.' Supplying 'their' in English links it clearly
    to the preceding 3mp suffix in נִפְלָם and to the following 3fs suffix on קוֹלָהּ,
    whose antecedent is the cry.
- source_word: בְּיַם סוּף
  chosen: at the Red Sea
  alternatives:
  - by the Red Sea
  - at the Sea of Reeds
  lexicon: HALOT
  rationale: יַם סוּף is the conventional biblical place-name usually rendered 'Red
    Sea' in English. 'At' fits the idiom of audibility reaching that location. 'Sea
    of Reeds' is lexically defensible and preserved in a footnote because it reflects
    the Hebrew more transparently.
- source_word: נִשְׁמַע
  chosen: is heard
  alternatives:
  - is audible
  - is heard of
  lexicon: HALOT
  rationale: The Niphal of שׁמע here is best rendered as passive 'is heard,' expressing
    that the cry carries to a distant place.
- source_word: קוֹלָהּ
  chosen: their cry
  alternatives:
  - its sound
  - its voice
  lexicon: HALOT
  rationale: The suffix is feminine singular, most naturally referring back to צְעָקָה
    ('cry'). English smooths the repetition by rendering the clause as 'their cry
    is heard,' preserving the sense without wooden duplication.
