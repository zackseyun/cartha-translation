id: JER.49.31
reference: Jeremiah 49:31
source:
  edition: WLC
  text: ק֣וּמוּ עֲל֗וּ אֶל גּ֥וֹי שְׁלֵ֛יו יוֹשֵׁ֥ב לָ/בֶ֖טַח נְאֻם יְהוָ֑ה לֹא דְלָתַ֧יִם
    וְ/לֹֽא בְרִ֛יחַ ל֖/וֹ בָּדָ֥ד יִשְׁכֹּֽנוּ־־־־׃
translation:
  text: Rise up, go up against a nation at ease, dwelling securely, declares the LORD,
    a nation that has no doors or bars; they dwell alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tranquil' or 'complacent' for 'at ease.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'no doors and no bar to it'; the sense is that they are unfortified
      and feel secure.
    reason: cultural_note
lexical_decisions:
- source_word: ק֣וּמוּ
  chosen: Rise up
  alternatives:
  - Arise
  - Get up
  lexicon: HALOT
  rationale: Imperative plural from קום. 'Rise up' preserves the military summons
    without sounding archaic.
- source_word: עֲל֗וּ
  chosen: go up against
  alternatives:
  - go up
  - advance against
  - attack
  lexicon: HALOT
  rationale: עלה with אֶל in a war oracle commonly carries the sense of advancing
    against an אויב/target. 'Go up against' keeps the idiomatic military force while
    remaining close to the Hebrew.
- source_word: גּ֥וֹי
  chosen: nation
  alternatives:
  - people
  lexicon: HALOT
  rationale: Standard rendering for גוי in this context; 'nation' fits the geopolitical
    target of the oracle.
- source_word: שְׁלֵ֛יו
  chosen: at ease
  alternatives:
  - complacent
  - tranquil
  lexicon: HALOT
  rationale: The adjective conveys quiet ease or complacent security. 'At ease' is
    natural English and pairs well with the following participle.
- source_word: יוֹשֵׁ֥ב לָ/בֶ֖טַח
  chosen: dwelling securely
  alternatives:
  - living in security
  - dwelling in safety
  lexicon: HALOT
  rationale: Participle + prepositional phrase describes settled, secure habitation.
    'Dwelling securely' preserves the participial feel and the sense of safety.
- source_word: נְאֻם יְהוָ֑ה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Conventional prophetic formula. Per doctrine, יְהוָה is rendered 'the
    LORD.' 'Declares' is idiomatic and suitably weighty.
- source_word: יְהוָ֑ה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: לֹא דְלָתַ֧יִם וְ/לֹֽא בְרִ֛יחַ ל֖/וֹ
  chosen: a nation that has no doors or bars
  alternatives:
  - having neither gates nor bars
  - with no doors and no bar
  lexicon: HALOT
  rationale: The Hebrew literally says 'no doors and no bar to it/him.' In context
    this describes an unwalled, unfortified people. 'Doors or bars' stays close to
    the wording while reading naturally in English; adding 'a nation that has' clarifies
    the syntax.
- source_word: בָּדָ֥ד
  chosen: alone
  alternatives:
  - by itself
  - in isolation
  lexicon: HALOT
  rationale: Conveys separateness/solitariness. 'Alone' is concise and idiomatic.
- source_word: יִשְׁכֹּֽנוּ
  chosen: they dwell
  alternatives:
  - they live
  - they reside
  lexicon: HALOT
  rationale: Imperfect plural from שכן. 'Dwell' matches the habitation motif already
    present and preserves the elevated tone.
