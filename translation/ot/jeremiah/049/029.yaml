id: JER.49.29
reference: Jeremiah 49:29
source:
  edition: WLC
  text: אָהֳלֵי/הֶ֤ם וְ/צֹאנָ/ם֙ יִקָּ֔חוּ יְרִיעוֹתֵי/הֶ֧ם וְ/כָל כְּלֵי/הֶ֛ם וּ/גְמַלֵּי/הֶ֖ם
    יִשְׂא֣וּ לָ/הֶ֑ם וְ/קָרְא֧וּ עֲלֵי/הֶ֛ם מָג֖וֹר מִ/סָּבִֽיב־׃
translation:
  text: They will take their tents and their flocks; they will carry off their tent
    curtains and all their goods and their camels for themselves, and they will cry
    over them, “Terror on every side!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “they will call out against them, ‘Terror on every side!’” The Hebrew
      construction can be understood as a cry directed over, concerning, or against
      them.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָהֳלֵיהֶם
  chosen: their tents
  alternatives:
  - their tabernacles
  lexicon: HALOT
  rationale: אֹהֶל commonly denotes a tent or dwelling of nomadic peoples. In this
    context of Kedar/Hazor nomads, 'tents' is the natural modern English rendering.
- source_word: צֹאנָם
  chosen: their flocks
  alternatives:
  - their sheep
  lexicon: HALOT
  rationale: צֹאן can refer specifically to small livestock such as sheep and goats,
    but 'flocks' best captures the collective pastoral sense here.
- source_word: יִקָּחוּ
  chosen: they will take
  alternatives:
  - they will seize
  lexicon: HALOT
  rationale: לקח in the qal commonly means 'take.' Given the military-plundering context,
    'seize' is possible, but 'take' keeps the Hebrew's basic sense while the context
    supplies the hostile nuance.
- source_word: יְרִיעוֹתֵיהֶם
  chosen: their tent curtains
  alternatives:
  - their curtains
  - their tent coverings
  lexicon: HALOT
  rationale: יְרִיעָה refers to a curtain or tent panel/covering. Because the surrounding
    imagery is nomadic property, 'tent curtains' makes the referent clear in English.
- source_word: כָּל־כְּלֵיהֶם
  chosen: all their goods
  alternatives:
  - all their vessels
  - all their belongings
  - all their equipment
  lexicon: HALOT
  rationale: כְּלִי has a broad range including vessel, implement, article, or equipment.
    In a plunder list, 'goods' communicates the collective sense naturally without
    narrowing to containers only.
- source_word: גְּמַלֵּיהֶם
  chosen: their camels
  lexicon: HALOT
  rationale: Direct rendering of גָּמָל in the plural construct with suffix.
- source_word: יִשְׂאוּ לָהֶם
  chosen: they will carry off ... for themselves
  alternatives:
  - they will bear away
  - they will take away for themselves
  lexicon: HALOT
  rationale: נשא with לָהֶם here conveys carrying away as spoil to their own possession/benefit.
    'Carry off ... for themselves' reflects both motion and advantage.
- source_word: וְקָרְאוּ עֲלֵיהֶם
  chosen: they will cry over them
  alternatives:
  - they will call out against them
  - they will proclaim concerning them
  lexicon: HALOT
  rationale: קרא על can mean call out concerning/against someone. Here it introduces
    the shouted slogan 'Terror on every side!' likely uttered over the victims or
    against them. 'Cry over them' preserves the public exclamation without over-specifying
    hostility.
- source_word: מָגוֹר מִסָּבִיב
  chosen: Terror on every side!
  alternatives:
  - Fear all around!
  - Terror all around!
  lexicon: HALOT
  rationale: This recurring Jeremianic phrase denotes surrounding terror/dread. 'Terror
    on every side' is idiomatic, forceful, and preserves the formulaic character of
    the expression.
