id: JER.49.18
reference: Jeremiah 49:18
source:
  edition: WLC
  text: כְּֽ/מַהְפֵּכַ֞ת סְדֹ֧ם וַ/עֲמֹרָ֛ה וּ/שְׁכֵנֶ֖י/הָ אָמַ֣ר יְהוָ֑ה לֹֽא יֵשֵׁ֥ב
    שָׁם֙ אִ֔ישׁ וְ/לֹֽא יָג֥וּר בָּ֖/הּ בֶּן אָדָֽם־־־׃
translation:
  text: As when Sodom and Gomorrah and their neighboring towns were overthrown, says
    the LORD, no man will live there, and no son of man will sojourn in her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Like the overthrow of Sodom and Gomorrah and the towns around them.'
    reason: lexical_alternative
  - marker: b
    text: '''Son of man'' here is a Hebrew idiom meaning a human being or mortal,
      not a messianic title.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמַהְפֵּכַת
  chosen: As when ... were overthrown
  alternatives:
  - Like the overthrow of ...
  - As in the overthrow of ...
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('like/as'), and מַהְפֵּכָה denotes an
    overthrow or catastrophic overturning. Rendering with a temporal-comparative clause
    ('As when ... were overthrown') gives natural English while preserving the simile.
- source_word: סְדֹם וַעֲמֹרָה וּשְׁכֵנֶיהָ
  chosen: Sodom and Gomorrah and their neighboring towns
  alternatives:
  - Sodom and Gomorrah and her neighbors
  - Sodom and Gomorrah and the towns around them
  lexicon: HALOT
  rationale: The phrase names Sodom and Gomorrah plus their surrounding settlements.
    Although the suffix on 'neighbors' is singular feminine in form, English idiom
    is best served by the collective sense 'their neighboring towns,' referring to
    the cities associated with them.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - declares the LORD
  - said the LORD
  lexicon: HALOT
  rationale: Prophetic formula is commonly rendered in present tense in English for
    immediacy. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: יֵשֵׁב
  chosen: will live
  alternatives:
  - will dwell
  - will sit
  lexicon: HALOT
  rationale: ישב in habitation contexts means to dwell or live. 'Will live' is idiomatic
    modern English and fits the desolation oracle.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - anyone
  - a man
  lexicon: HALOT
  rationale: The noun is singular masculine and here functions generically. Per gender-accurate
    philosophy and the doctrine note on אָדָם/anthropological terms, 'man' preserves
    the source's form and representative force better than the more neutral 'anyone'.
- source_word: יָגוּר
  chosen: will sojourn
  alternatives:
  - will reside
  - will stay as an alien
  lexicon: HALOT
  rationale: גור often carries the nuance of residing as a temporary settler or sojourner,
    not merely generic dwelling. 'Sojourn' preserves that nuance better than 'live,'
    avoiding flattening the parallelism with יֵשֵׁב.
- source_word: בָּהּ
  chosen: in her
  alternatives:
  - in it
  - there
  lexicon: HALOT
  rationale: The pronominal suffix is feminine singular, referring to the land/city.
    'In her' preserves the grammatical gender and prophetic personification more closely
    than 'in it,' though English could also use 'there' idiomatically.
- source_word: בֶּן אָדָם
  chosen: son of man
  alternatives:
  - human being
  - mortal
  lexicon: HALOT
  rationale: The Hebrew idiom literally reads 'son of man.' In this non-messianic
    context it means a human being or mortal, but the literal rendering is transparent
    and preserves the Hebrew parallelism with אִישׁ. The idiomatic alternative is
    worth preserving in a footnote.
