theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD' in continuity with Jewish reverence tradition and the Septuagintal
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropological language in the desolation formula
  chosen_reading: no man ... no son of man
  alternative_readings:
  - no one ... no human being
  rationale: The source uses masculine singular nouns with representative force. Per
    the translation philosophy, gender-accurate renderings are preferred over flattening
    to gender-neutral English unless context demands otherwise.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם
    → man / humankind (context)'
