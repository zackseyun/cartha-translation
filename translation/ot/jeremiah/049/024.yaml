id: JER.49.24
reference: Jeremiah 49:24
source:
  edition: WLC
  text: רָפְתָ֥ה דַמֶּ֛שֶׂק הִפְנְתָ֥ה לָ/נ֖וּס וְ/רֶ֣טֶט הֶחֱזִ֑יקָה צָרָ֧ה וַ/חֲבָלִ֛ים
    אֲחָזַ֖תָּ/ה כַּ/יּוֹלֵדָֽה׀׃
translation:
  text: Damascus has become feeble; she has turned to flee, and trembling has seized
    her. Distress and labor pains have taken hold of her, like a woman giving birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has grown weak' / 'has become fainthearted' for 'has become feeble.'
      The Hebrew verb can denote weakening or loss of courage.
    reason: lexical_alternative
  - marker: b
    text: Or 'terror has seized her' for 'trembling has seized her.' The noun more
      literally denotes trembling or quaking, likely from fear.
    reason: lexical_alternative
  - marker: c
    text: Or 'pangs' / 'birth pains' for 'labor pains.' The context of childbirth
      in the next phrase supports the obstetric sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָפְתָה
  chosen: has become feeble
  alternatives:
  - has grown weak
  - has become fainthearted
  - has melted
  lexicon: HALOT
  rationale: From רפה, conveying slackening, weakening, or loss of strength/courage.
    'Has become feeble' preserves the metaphorical sense of collapse without over-paraphrasing.
- source_word: דַמֶּשֶׂק
  chosen: Damascus
  rationale: Standard English transliteration of the place name.
- source_word: הִפְנְתָה לָנוּס
  chosen: has turned to flee
  alternatives:
  - has turned to run away
  - has turned to flight
  lexicon: HALOT
  rationale: הפנה literally 'turned' with infinitive לָנוּס 'to flee.' The idiom suggests
    a movement toward escape; 'has turned to flee' is natural and close to the Hebrew.
- source_word: וְרֶטֶט
  chosen: and trembling
  alternatives:
  - and terror
  - and shaking
  lexicon: HALOT
  rationale: רטט denotes trembling or quaking, often from fear. 'Trembling' keeps
    the bodily image and avoids importing a more interpretive gloss like 'terror'
    into the main text.
- source_word: הֶחֱזִיקָה
  chosen: has seized
  alternatives:
  - has gripped
  - has taken hold of
  lexicon: HALOT
  rationale: חזק in the hiphil here means to take hold firmly. 'Has seized' is vivid
    and idiomatic in English with פחד-like subjects such as trembling.
- source_word: צָרָה
  chosen: Distress
  alternatives:
  - anguish
  - trouble
  lexicon: HALOT
  rationale: צָרָה commonly denotes distress, trouble, or anguish. 'Distress' fits
    the parallelism with labor pains and preserves the broad sense.
- source_word: וַחֲבָלִים
  chosen: and labor pains
  alternatives:
  - and pangs
  - and birth pains
  lexicon: HALOT
  rationale: חבלים can denote cords, pangs, or birth pains depending on context. Because
    of the following simile 'like a woman giving birth,' 'labor pains' best captures
    the intended image.
- source_word: אֲחָזַתָּה
  chosen: have taken hold of her
  alternatives:
  - have seized her
  - have gripped her
  lexicon: HALOT
  rationale: אחז means to grasp or seize. With feminine suffix referring to Damascus,
    'have taken hold of her' is a natural rendering and preserves the personification.
- source_word: כַּיּוֹלֵדָה
  chosen: like a woman giving birth
  alternatives:
  - like a woman in labor
  - like one bearing a child
  lexicon: HALOT
  rationale: The participial form from ילד refers to a woman in the act of childbirth.
    'Like a woman giving birth' is clear modern English and preserves the simile.
