id: JER.49.20
reference: Jeremiah 49:20
source:
  edition: WLC
  text: לָ/כֵ֞ן שִׁמְע֣וּ עֲצַת יְהוָ֗ה אֲשֶׁ֤ר יָעַץ֙ אֶל אֱד֔וֹם וּ/מַ֨חְשְׁבוֹתָ֔י/ו אֲשֶׁ֥ר חָשַׁ֖ב אֶל יֹשְׁבֵ֣י תֵימָ֑ן אִם לֹ֤א יִסְחָבוּ/ם֙ צְעִירֵ֣י הַ/צֹּ֔אן אִם לֹ֥א יַשִּׁ֛ים עֲלֵי/הֶ֖ם נְוֵ/הֶֽם־־־־־׃
translation:
  text: 'Therefore hear the counsel of Yahweh that he has planned against Edom, and his thoughts that he has devised against the inhabitants of Teman: Surely the little ones of the flock will drag them away; surely he will make their pasture desolate over them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the youngest of the flock' or 'the least of the flock.' The phrase likely functions metaphorically for the weakest or least significant attackers, but the flock imagery is retained in the main text.
    reason: lexical_alternative
  - marker: b
    text: Or 'their habitation' or 'their fold' for 'their pasture.' The Hebrew noun can refer to a dwelling place or pastureland; the main text preserves the flock imagery of the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - Therefore then
  lexicon: HALOT
  rationale: Standard inferential particle introducing the consequence of the preceding oracle.
- source_word: שִׁמְעוּ
  chosen: hear
  alternatives:
  - listen to
  lexicon: HALOT
  rationale: Imperative plural of שׁמע; 'hear' preserves the prophetic summons and is idiomatic in English.
- source_word: עֲצַת יְהוָה
  chosen: the counsel of the LORD
  alternatives:
  - the plan of the LORD
  - the purpose of the LORD
  lexicon: HALOT
  rationale: עֵצָה can mean counsel, plan, or purpose. 'Counsel' keeps the formal link with divine deliberation while remaining natural. יְהוָה follows the doctrinal default 'the LORD'.
- source_word: יָעַץ אֶל אֱדוֹם
  chosen: has planned against Edom
  alternatives:
  - has counseled against Edom
  - has purposed concerning Edom
  lexicon: HALOT
  rationale: With אֶל in this hostile context, English 'against' best conveys the adversative force. 'Planned' fits the verbal idea in context better than the less idiomatic 'counseled against'.
- source_word: מַחְשְׁבוֹתָיו
  chosen: his thoughts
  alternatives:
  - his plans
  - his designs
  lexicon: HALOT
  rationale: The noun denotes thoughts, plans, or intentions. 'Thoughts' preserves the lexical distinction from עֲצָה while still allowing the following verb to specify deliberate intent.
- source_word: חָשַׁב
  chosen: has devised
  alternatives:
  - has planned
  - has intended
  lexicon: HALOT
  rationale: Used here for deliberate calculation. 'Devised' gives a natural English pairing with 'thoughts' and preserves intentionality.
- source_word: יֹשְׁבֵי תֵימָן
  chosen: the inhabitants of Teman
  alternatives:
  - those who dwell in Teman
  - the people of Teman
  lexicon: HALOT
  rationale: A straightforward rendering of the construct phrase; 'inhabitants' is concise and formal enough for prophetic discourse.
- source_word: אִם לֹא
  chosen: Surely
  alternatives:
  - If not
  - Indeed
  lexicon: HALOT
  rationale: In oath-like prophetic rhetoric, אִם לֹא functions idiomatically as a strong asseveration rather than a literal conditional. 'Surely' communicates the force in idiomatic English.
- source_word: יִסְחָבוּם
  chosen: will drag them away
  alternatives:
  - will drag them off
  - will pull them away
  lexicon: HALOT
  rationale: The verb סחב conveys dragging or hauling. 'Drag them away' preserves the vivid, forceful image.
- source_word: צְעִירֵי הַצֹּאן
  chosen: the little ones of the flock
  alternatives:
  - the youngest of the flock
  - the least of the flock
  lexicon: HALOT
  rationale: Literally 'the small/young ones of the flock.' In context it is likely metaphorical for the weakest attackers or most insignificant agents, but the image should be preserved in the main text rather than interpreted away.
- source_word: יַשִּׁים
  chosen: he will make
  alternatives:
  - he will set
  - he will lay
  lexicon: HALOT
  rationale: Hiphil of שׂים often means 'make' in resultative constructions; this is more idiomatic than 'set' here.
- source_word: נְוֵהֶם
  chosen: their pasture
  alternatives:
  - their habitation
  - their fold
  - their dwelling place
  lexicon: HALOT
  rationale: נָוֶה can denote pastureland, abode, or fold. Given the surrounding flock imagery, 'pasture' best preserves the metaphorical coherence, though 'habitation' is possible.
- source_word: עֲלֵיהֶם
  chosen: because of them
  alternatives:
  - over them
  - upon them
  lexicon: HALOT
  rationale: 'The preposition על in this idiom is difficult. A literal ''over them'' is awkward in English and obscures the sense. ''Because of them'' captures the likely resultative/adversative force in context: their coming brings desolation upon Edom''s pasture.'
