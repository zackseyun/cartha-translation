theological_decisions:
- issue: Personification of Ammon as feminine singular
  chosen_reading: Retain the feminine singular imagery as 'daughter' and 'her' rather
    than neutralizing to the nation abstractly.
  alternative_readings:
  - Translate more interpretively as 'O rebellious people'
  rationale: The Hebrew directly personifies the addressed entity as a daughter. Preserving
    the metaphor maintains the prophetic rhetoric and matches the source's gendered
    imagery.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
