id: JER.49.4
reference: Jeremiah 49:4
source:
  edition: WLC
  text: מַה תִּתְהַֽלְלִי֙ בָּֽ/עֲמָקִ֔ים זָ֣ב עִמְקֵ֔/ךְ הַ/בַּ֖ת הַ/שּֽׁוֹבֵבָ֑ה
    הַ/בֹּֽטְחָה֙ בְּ/אֹ֣צְרֹתֶ֔י/הָ מִ֖י יָב֥וֹא אֵלָֽ/י־׃
translation:
  text: Why do you boast in the valleys, your valley flowing away, O backsliding daughter,
    who trusts in her treasures, saying, ‘Who will come against me?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your valley flowing with water,' 'your overflowing valley,' or 'your
      fertile valley.' The Hebrew phrase is difficult and may refer to the natural
      richness or defensibility of the valley.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּתְהַֽלְלִי
  chosen: do you boast
  alternatives:
  - do you glory
  - do you praise yourself
  lexicon: HALOT
  rationale: Hitpael of הלל here is reflexive/middle, expressing self-exaltation.
    'Boast' is natural modern English and preserves the rebuking tone.
- source_word: בָּעֲמָקִים
  chosen: in the valleys
  alternatives:
  - in the vales
  lexicon: HALOT
  rationale: Plural of עֵמֶק, literally 'valleys.' Retained concretely rather than
    abstracting to strength or defenses, since the geography is part of the taunt.
- source_word: זָב עִמְקֵךְ
  chosen: your valley flowing away
  alternatives:
  - your valley flowing with water
  - your valley overflowing
  - your valley is fertile
  lexicon: HALOT
  rationale: זָב ('flowing') with עִמְקֵךְ is difficult. The immediate context is
    judgment against Ammon and likely alludes to a well-watered or flowing valley
    system that gave a sense of security. 'Flowing away' preserves the participial
    image while fitting the taunt context better than a simple commendation of fertility.
    Because the phrase is debated, alternatives are preserved in a footnote.
- source_word: הַבַּת הַשּׁוֹבֵבָה
  chosen: O backsliding daughter
  alternatives:
  - O faithless daughter
  - O rebellious daughter
  - O apostate daughter
  lexicon: HALOT
  rationale: The phrase personifies the nation/city as a daughter characterized by
    שׁוֹבֵבָה. 'Backsliding' preserves the covenantal/rebellious nuance without overinterpreting
    as full apostasy.
- source_word: הַבֹּטְחָה בְּאֹצְרֹתֶיהָ
  chosen: who trusts in her treasures
  alternatives:
  - who trusts in her storehouses
  - who relies on her wealth
  lexicon: HALOT
  rationale: אֹצָר can denote treasure, treasury, or storehouse. In this context of
    false security, 'treasures' best captures stored wealth as the object of trust.
- source_word: מִי יָבֹוא אֵלַי
  chosen: Who will come against me?
  alternatives:
  - Who will come to me?
  - Who will attack me?
  lexicon: HALOT
  rationale: 'Although אֶל normally means ''to/toward,'' in hostile contexts the idiomatic
    sense is adversative: ''come against.'' This best fits the boast of invulnerability.'
