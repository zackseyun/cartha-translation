id: JER.49.7
reference: Jeremiah 49:7
source:
  edition: WLC
  text: לֶ/אֱד֗וֹם כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת הַ/אֵ֥ין ע֛וֹד חָכְמָ֖ה בְּ/תֵימָ֑ן
    אָבְדָ֤ה עֵצָה֙ מִ/בָּנִ֔ים נִסְרְחָ֖ה חָכְמָתָֽ/ם׃
translation:
  text: 'Concerning Edom: Thus says the LORD of hosts: Is there no longer wisdom in
    Teman? Has counsel perished from the prudent? Has their wisdom become spoiled?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from those with understanding'; the Hebrew term refers to discerning
      people, not biological 'sons.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Has their wisdom become corrupt?' The Hebrew verb suggests something
      spoiled, tainted, or gone bad.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶאֱדוֹם
  chosen: Concerning Edom
  alternatives:
  - To Edom
  - Against Edom
  lexicon: HALOT
  rationale: The prefixed ל with a nation heading introduces the oracle's subject.
    'Concerning Edom' is a natural English superscription-like rendering that avoids
    overcommitting to 'against' while fitting prophetic style.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - Thus said
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; present-tense English suits the
    formulaic introduction.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD Almighty
  - Yahweh of hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Hosts' preserves the military/cosmic
    imagery of צְבָאוֹת more transparently than 'Almighty.'
- source_word: הַאֵין עוֹד
  chosen: Is there no longer
  alternatives:
  - Is there not still
  - Is there no more
  lexicon: HALOT
  rationale: The interrogative with עוֹד asks whether something remains any longer.
    'No longer' captures the sense of cessation.
- source_word: חָכְמָה
  chosen: wisdom
  alternatives:
  - skill
  - wise counsel
  lexicon: HALOT
  rationale: The noun broadly denotes wisdom; here it is the reputed wisdom of Edom/Teman.
- source_word: בְּתֵימָן
  chosen: in Teman
  alternatives:
  - among Teman
  - at Teman
  lexicon: HALOT
  rationale: Teman is a place name within Edom associated with wisdom; 'in Teman'
    is the most direct locative rendering.
- source_word: אָבְדָה עֵצָה
  chosen: Has counsel perished
  alternatives:
  - Has advice vanished
  - Has counsel been lost
  lexicon: HALOT
  rationale: אָבַד commonly means perish/be lost. 'Counsel' fits the wisdom context
    and pairs well with the following clause.
- source_word: מִבָּנִים
  chosen: from the prudent
  alternatives:
  - from sons
  - from those with understanding
  lexicon: HALOT
  rationale: Though formally from בין ('to understand') in participial/plural form
    rather than בנים ('sons'), the sense is 'those who understand, the discerning.'
    'The prudent' is concise, idiomatic, and contextually apt.
- source_word: נִסְרְחָה
  chosen: Has their wisdom become spoiled
  alternatives:
  - Has their wisdom gone bad
  - Has their wisdom become corrupt
  - Has their wisdom turned rotten
  lexicon: HALOT
  rationale: The verb conveys becoming spoiled, rancid, or corrupted. 'Become spoiled'
    preserves the metaphor without sounding overly colloquial; it communicates deterioration
    rather than mere disappearance.
- source_word: חָכְמָתָם
  chosen: their wisdom
  lexicon: HALOT
  rationale: Straightforward possessive noun referring to Edom's reputed wisdom.
