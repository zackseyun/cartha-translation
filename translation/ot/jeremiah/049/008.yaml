theological_decisions:
- issue: Rendering of פקד in a judgment oracle
  chosen_reading: punish
  alternative_readings:
  - visit
  - attend to
  rationale: In this context the verb clearly refers to punitive divine visitation,
    not a neutral visitation. Rendering it 'punish' communicates the sense without
    importing extra theology.
