id: JER.49.8
reference: Jeremiah 49:8
source:
  edition: WLC
  text: נֻ֤סוּ הָפְנוּ֙ הֶעְמִ֣יקוּ לָ/שֶׁ֔בֶת יֹשְׁבֵ֖י דְּדָ֑ן כִּ֣י אֵ֥יד עֵשָׂ֛ו
    הֵבֵ֥אתִי עָלָ֖י/ו עֵ֥ת פְּקַדְתִּֽי/ו׃
translation:
  text: Flee, turn back, dwell deep, inhabitants of Dedan, for I have brought Esau’s
    disaster upon him, the time when I punish him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hide yourselves deep to dwell'; the Hebrew idiom conveys withdrawing
      to remote or inaccessible places.
    reason: lexical_alternative
  - marker: b
    text: '''Esau'' stands for Edom, Esau’s descendants.'
    reason: cultural_note
  - marker: c
    text: Or 'the time of my visitation upon him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֻסוּ
  chosen: Flee
  alternatives:
  - Run away
  - Take flight
  lexicon: HALOT
  rationale: Imperative plural from נוּסׂ, a direct command to escape. 'Flee' is concise
    and idiomatic in prophetic judgment contexts.
- source_word: הָפְנוּ
  chosen: turn back
  alternatives:
  - turn aside
  - retreat
  lexicon: HALOT
  rationale: Imperative plural from פנה in the sense of turning away/back. In sequence
    with 'Flee,' it conveys withdrawal from danger rather than merely changing direction.
- source_word: הֶעְמִיקוּ לָשֶׁבֶת
  chosen: dwell deep
  alternatives:
  - go down deep to dwell
  - hide yourselves in the depths
  lexicon: HALOT
  rationale: The Hiphil of עמק with infinitive 'to dwell' is an idiom for withdrawing
    to remote or inaccessible places. 'Dwell deep' preserves the compact Hebrew imagery
    better than a fuller paraphrase.
- source_word: יֹשְׁבֵי דְּדָן
  chosen: inhabitants of Dedan
  alternatives:
  - those who live in Dedan
  - people of Dedan
  lexicon: HALOT
  rationale: Construct phrase literally means 'inhabitants of Dedan.' This is the
    most natural formal-equivalent English rendering.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the commands. 'For' fits prophetic style and
    links the warning to the coming judgment.
- source_word: אֵיד עֵשָׂו
  chosen: Esau’s disaster
  alternatives:
  - the calamity of Esau
  - Esau's ruin
  lexicon: HALOT
  rationale: אֵיד denotes disaster/calamity. 'Esau' here stands metonymically for
    Edom, but the text says 'Esau,' so the translation preserves that wording.
- source_word: הֵבֵאתִי עָלָיו
  chosen: I have brought ... upon him
  alternatives:
  - I am bringing ... upon him
  - I brought ... upon him
  lexicon: HALOT
  rationale: Perfect verb in prophetic discourse can function as a prophetic perfect,
    expressing the certainty of the announced judgment. English present perfect preserves
    both completed force and prophetic certainty.
- source_word: עֵת פְּקַדְתִּיו
  chosen: the time when I punish him
  alternatives:
  - the time of my visitation upon him
  - the time when I attend to him
  lexicon: HALOT
  rationale: פקד in judgment contexts commonly means to visit/punish. 'Punish' makes
    the judicial sense explicit in clear modern English, while 'the time when' smoothly
    renders the temporal construction.
