id: JER.49.23
reference: Jeremiah 49:23
source:
  edition: WLC
  text: לְ/דַמֶּ֗שֶׂק בּ֤וֹשָֽׁה חֲמָת֙ וְ/אַרְפָּ֔ד כִּי שְׁמֻעָ֥ה רָעָ֛ה שָׁמְע֖וּ
    נָמֹ֑גוּ בַּ/יָּ֣ם דְּאָגָ֔ה הַשְׁקֵ֖ט לֹ֥א יוּכָֽל־׃
translation:
  text: 'Concerning Damascus: Hamath and Arpad are put to shame, for they have heard
    bad news; they melt away. There is anxiety like the sea; it cannot be quiet.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew is difficult: literally, ''in/like the sea, anxiety; to be quiet
      it cannot.'' The line may mean either that their anxiety is like the restless
      sea, or that there is anxiety at the sea and it cannot be calmed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדַמֶּשֶׂק
  chosen: Concerning Damascus
  alternatives:
  - Against Damascus
  - Of Damascus
  lexicon: HALOT
  rationale: The prefixed לְ introducing an oracle heading is idiomatically rendered
    'concerning' in prophetic superscriptions. 'Against' is possible in judgment contexts,
    but the Hebrew preposition itself is broader; 'concerning' preserves the form
    while fitting English.
- source_word: בּוֹשָׁה
  chosen: are put to shame
  alternatives:
  - is ashamed
  - is confounded
  lexicon: HALOT
  rationale: Though morphologically feminine singular, the verb is used with the compound
    subject 'Hamath and Arpad' in a collective/oracular style. 'Are put to shame'
    captures the sense of public humiliation/disgrace better than the more internal
    'is ashamed.'
- source_word: חֲמָת וְאַרְפָּד
  chosen: Hamath and Arpad
  rationale: These are place names and are therefore transliterated per project philosophy.
- source_word: שְׁמֻעָה רָעָה
  chosen: bad news
  alternatives:
  - evil report
  - disastrous news
  lexicon: HALOT
  rationale: The phrase denotes a report of calamity. 'Bad news' is natural modern
    English and preserves the basic sense without overinterpreting the exact content
    of the report.
- source_word: שָׁמְעוּ
  chosen: they have heard
  alternatives:
  - they heard
  lexicon: HALOT
  rationale: 'English present perfect works well for the resulting state in context:
    having heard the report, they are now in panic.'
- source_word: נָמֹגוּ
  chosen: they melt away
  alternatives:
  - they are dismayed
  - they lose heart
  lexicon: HALOT
  rationale: The verb literally conveys melting/dissolving and metaphorically loss
    of courage. 'Melt away' preserves the vivid image and suits prophetic poetry.
- source_word: בַּיָּם
  chosen: like the sea
  alternatives:
  - in the sea
  - by the sea
  lexicon: HALOT
  rationale: The phrase is difficult, but in context it most plausibly introduces
    a comparison for restless anxiety. Rendering it 'like the sea' makes coherent
    sense with the following clause about inability to be quiet. A strictly locative
    'in the sea' is possible but less intelligible in English and likely misses the
    poetic comparison.
- source_word: דְּאָגָה
  chosen: anxiety
  alternatives:
  - trouble
  - anguish
  lexicon: HALOT
  rationale: The noun denotes anxious care or dread. 'Anxiety' best matches the emotional
    sense in this context.
- source_word: הַשְׁקֵט לֹא יוּכָל
  chosen: it cannot be quiet
  alternatives:
  - it cannot be still
  - one cannot calm down
  lexicon: HALOT
  rationale: The infinitive plus יכול expresses inability to become quiet/still. Using
    'it' refers back to the sea in the simile and yields a clear English line while
    preserving the poetic image of unrest.
