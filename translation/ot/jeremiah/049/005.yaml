theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the Lord GOD of hosts
  alternative_readings:
  - the LORD God of hosts
  - the Lord Yahweh of hosts
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Gendered distributive אִישׁ
  chosen_reading: each man
  alternative_readings:
  - each one
  - everyone
  rationale: The Hebrew is grammatically masculine singular with distributive force. Per the translation philosophy, gender-accurate rendering is preferred over neutralizing the expression unless context clearly demands otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
