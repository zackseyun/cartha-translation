id: JER.49.5
reference: Jeremiah 49:5
source:
  edition: WLC
  text: הִנְ/נִי֩ מֵבִ֨יא עָלַ֜יִ/ךְ פַּ֗חַד נְאֻם אֲדֹנָ֧/י יְהוִ֛ה צְבָא֖וֹת מִ/כָּל סְבִיבָ֑יִ/ךְ וְ/נִדַּחְתֶּם֙ אִ֣ישׁ לְ/פָנָ֔י/ו וְ/אֵ֥ין מְקַבֵּ֖ץ לַ/נֹּדֵֽד־־׃
translation:
  text: Behold, I am bringing terror upon you from all around you, declares the Lord GOD of hosts, and each man will be driven out before him, with no one to gather the fugitive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'each one straight ahead' / 'each man before him.' The Hebrew phrase is terse and may describe panicked flight in which each person rushes on without regard for others.
    reason: lexical_alternative
  - marker: b
    text: Or 'the wanderer' or 'the one fleeing.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Introduces a solemn divine announcement. 'Behold' preserves the prophetic force better than flatter modern options, while remaining intelligible.
- source_word: מֵבִיא
  chosen: I am bringing
  alternatives:
  - I bring
  - I will bring
  lexicon: HALOT
  rationale: The participle with הִנְנִי often conveys imminent action. 'I am bringing' captures the vivid, impending sense without over-paraphrasing.
- source_word: פַּחַד
  chosen: terror
  alternatives:
  - fear
  - dread
  lexicon: HALOT
  rationale: '''Terror'' best fits a divinely inflicted state of panic in judgment. ''Fear'' is possible but weaker in this context.'
- source_word: נְאֻם אֲדֹנָי יְהוִה צְבָאוֹת
  chosen: declares the Lord GOD of hosts
  alternatives:
  - oracle of the Lord GOD of hosts
  - declares the Lord Yahweh of armies
  lexicon: HALOT
  rationale: נְאֻם is well rendered 'declares' in prophetic speech. יְהוָה follows the doctrinal default 'the LORD.' 'Hosts' preserves the traditional sense of צְבָאוֹת without unnecessary paraphrase.
- source_word: מִכָּל סְבִיבַיִךְ
  chosen: from all around you
  alternatives:
  - from every side of you
  - from all your surroundings
  lexicon: HALOT
  rationale: This idiom expresses encircling threat. 'From all around you' is natural English and preserves the image of danger on every side.
- source_word: וְנִדַּחְתֶּם
  chosen: will be driven out
  alternatives:
  - will be scattered
  - will be banished
  lexicon: HALOT
  rationale: The Niphal of נדח conveys being driven away or dispersed. 'Driven out' keeps the force of expulsion while allowing the following distributive phrase to specify individual flight.
- source_word: אִישׁ לְפָנָיו
  chosen: each man before him
  alternatives:
  - each one straight ahead
  - each man before his face
  - each man in front of him
  lexicon: HALOT
  rationale: 'The phrase is difficult, but likely distributive: each person flees onward before himself/him. The English main text smooths this to idiomatic sense while preserving the masculine singular distributive force with ''each man.'''
- source_word: וְאֵין מְקַבֵּץ
  chosen: with no one to gather
  alternatives:
  - and there is no one gathering
  - and none will regather
  lexicon: HALOT
  rationale: Expresses the absence of anyone who would regather the dispersed. 'With no one to gather' reads naturally in English and fits the aftermath of scattering.
- source_word: לַנֹּדֵד
  chosen: the fugitive
  alternatives:
  - the wanderer
  - the one fleeing
  lexicon: HALOT
  rationale: The participle denotes one driven into wandering or flight. 'The fugitive' best captures the judgment context of forced displacement.
