id: JER.49.32
reference: Jeremiah 49:32
source:
  edition: WLC
  text: וְ/הָי֨וּ גְמַלֵּי/הֶ֜ם לָ/בַ֗ז וַ/הֲמ֤וֹן מִקְנֵי/הֶם֙ לְ/שָׁלָ֔ל וְ/זֵרִתִ֥י/ם לְ/כָל ר֖וּחַ קְצוּצֵ֣י פֵאָ֑ה וּ/מִ/כָּל עֲבָרָ֛י/ו אָבִ֥יא אֶת אֵידָ֖/ם נְאֻם יְהוָֽה־־־־׃
translation:
  text: Their camels will become plunder, and their abundance of livestock spoil. I will scatter to every wind those who cut the corners of their hair, and from all sides I will bring their calamity upon them, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those with clipped temples.' The Hebrew expression refers to people who cut the edge/corners of the hair, likely a distinctive grooming practice.
    reason: lexical_alternative
  - marker: b
    text: Or 'from every quarter' or 'from all around them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גְמַלֵּיהֶם
  chosen: their camels
  alternatives:
  - their dromedaries
  lexicon: HALOT
  rationale: The noun plainly denotes camels. 'Camels' is the natural modern English rendering; 'dromedaries' is too specific and less readable.
- source_word: לָבַז
  chosen: plunder
  alternatives:
  - prey
  - booty
  lexicon: HALOT
  rationale: The phrase means becoming subject to seizure by enemies. 'Plunder' is clear modern English and fits the military-judgment context.
- source_word: הֲמוֹן מִקְנֵיהֶם
  chosen: their many livestock
  alternatives:
  - the abundance of their cattle
  - the multitude of their possessions
  lexicon: HALOT
  rationale: הֲמוֹן conveys abundance/multitude, and מִקְנֶה refers to livestock rather than possessions in general here. 'Their many livestock' preserves the sense without sounding wooden.
- source_word: לְשָׁלָל
  chosen: spoil
  alternatives:
  - plunder
  - booty
  lexicon: HALOT
  rationale: Though close in meaning to בַּז, שָׁלָל is a distinct but overlapping term for war spoil. Rendering it as 'spoil' preserves some lexical differentiation while remaining idiomatic.
- source_word: וְזֵרִתִים
  chosen: I will scatter
  alternatives:
  - I will winnow them
  - I will disperse them
  lexicon: HALOT
  rationale: The verb denotes scattering/dispersion. 'Scatter' is the clearest contextual rendering in a judgment oracle.
- source_word: לְכָל רוּחַ
  chosen: to every wind
  alternatives:
  - to every direction
  lexicon: HALOT
  rationale: Literally 'to every wind,' a common idiom for scattering in all directions. The literal image is preserved because it is intelligible in English.
- source_word: קְצוּצֵי פֵאָה
  chosen: those who cut the corners of their hair
  alternatives:
  - those with clipped temples
  - those who clip the edges of the beard
  lexicon: HALOT
  rationale: This expression refers to a distinctive grooming practice, likely the trimming of the hair at the temples/sides. 'Those who cut the corners of their hair' preserves the Hebrew imagery without over-specifying beyond the text.
- source_word: מִכָּל עֲבָרָיו
  chosen: from all sides of them
  alternatives:
  - from every quarter
  - from all around them
  lexicon: HALOT
  rationale: The noun conveys regions/sides/borders. Because the suffix refers back to the people under judgment, 'from all sides of them' closely reflects the Hebrew, though somewhat formal. It communicates disaster coming from every direction.
- source_word: אָבִיא אֶת אֵידָם
  chosen: I will bring their disaster
  alternatives:
  - I will bring their calamity
  - I will bring their ruin
  lexicon: HALOT
  rationale: אֵיד denotes calamity/disaster in judgment contexts. 'Disaster' is accessible modern English and suitably weighty.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. Per doctrine, יְהוָה is rendered 'the LORD.' 'Declares' is idiomatic and appropriately solemn.
