id: JER.49.16
reference: Jeremiah 49:16
source:
  edition: WLC
  text: תִּֽפְלַצְתְּ/ךָ֞ הִשִּׁ֤יא אֹתָ/ךְ֙ זְד֣וֹן לִבֶּ֔/ךָ שֹֽׁכְנִי֙ בְּ/חַגְוֵ֣י הַ/סֶּ֔לַע תֹּפְשִׂ֖י מְר֣וֹם גִּבְעָ֑ה כִּֽי תַגְבִּ֤יהַ כַּ/נֶּ֨שֶׁר֙ קִנֶּ֔/ךָ מִ/שָּׁ֥ם אֽוֹרִידְ/ךָ֖ נְאֻם יְהוָֽה־־׃
translation:
  text: The terror you inspire has deceived you, the arrogance of your heart— you who dwell in the clefts of the rock, who occupy the height of the hill. Though you make your nest as high as the eagle, from there I will bring you down, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your terror' or 'your horror'; the Hebrew may refer either to the terror Edom inspires or to its dreadfulness/reputation.
    reason: lexical_alternative
  - marker: b
    text: Or 'the pride of your heart.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'in the clefts of the rock,' evoking Edom's seemingly impregnable mountain strongholds.
    reason: cultural_note
lexical_decisions:
- source_word: תִּפְלַצְתְּךָ
  chosen: the terror you inspire
  alternatives:
  - your terror
  - your horror
  lexicon: HALOT
  rationale: The noun from פלץ can denote terror/dreadfulness. In context with Edom's intimidating reputation and secure position, the sense is not merely inward fear but the terror it causes in others, which then becomes a source of self-deception. 'The terror you inspire' makes the relational force clear in idiomatic English.
- source_word: הִשִּׁיא אֹתָךְ
  chosen: has deceived you
  alternatives:
  - has misled you
  - has beguiled you
  lexicon: HALOT
  rationale: The Hiphil of נשׁא here carries the sense of deceiving or leading astray. 'Has deceived you' is the most direct and natural rendering in modern English.
- source_word: זְדוֹן לִבֶּךָ
  chosen: the arrogance of your heart
  alternatives:
  - the pride of your heart
  - the presumptuousness of your heart
  lexicon: HALOT
  rationale: זָדוֹן denotes pride, insolence, or presumptuous arrogance. 'Arrogance' captures the moral overconfidence in context; 'of your heart' preserves the Hebrew anthropological expression rather than reducing it to mere attitude.
- source_word: שֹׁכְנִי בְּחַגְוֵי הַסֶּלַע
  chosen: you who dwell in the clefts of the rock
  alternatives:
  - O dweller in the clefts of the rock
  - you who live in the refuges of the crag
  lexicon: HALOT
  rationale: The participial phrase functions vocatively/appositionally, describing Edom's secure habitation. 'Clefts of the rock' is a standard and accurate rendering of חַגְוֵי הַסֶּלַע.
- source_word: תֹּפְשִׂי מְרוֹם גִּבְעָה
  chosen: who seize the height of the hill
  alternatives:
  - who occupy the height of the hill
  - who hold the height of the hill
  lexicon: HALOT
  rationale: תפשׂ literally means seize, grasp, take hold of. In a habitation/fortification context it can mean occupy or hold. 'Seize' preserves the vividness of the Hebrew while remaining intelligible; 'height of the hill' renders the elevated stronghold imagery.
- source_word: כִּי
  chosen: Though
  alternatives:
  - Even if
  - For
  lexicon: HALOT
  rationale: 'Here כִּי introduces a concessive clause: even if Edom exalts its nest like an eagle, YHWH will still bring it down. ''Though'' communicates that concessive force smoothly in English.'
- source_word: תַגְבִּיהַ כַּנֶּשֶׁר קִנֶּךָ
  chosen: you make your nest as high as the eagle
  alternatives:
  - you set your nest on high like the eagle
  - you raise your nest like the eagle
  lexicon: HALOT
  rationale: The Hiphil of גבה means make high/exalt. The simile compares Edom's lofty security to an eagle's nest. 'Make your nest as high as the eagle' is idiomatic while preserving the image.
- source_word: מִשָּׁם אוֹרִידְךָ
  chosen: from there I will bring you down
  alternatives:
  - from there I will bring you down to the ground
  - from there I will cast you down
  lexicon: HALOT
  rationale: The Hiphil of ירד means cause to go down/bring down. 'Bring you down' is the natural English equivalent and preserves the reversal of Edom's self-exaltation.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is well rendered as 'declares the LORD.' Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
