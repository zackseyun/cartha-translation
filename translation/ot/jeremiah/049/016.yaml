theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Understanding Edom's security imagery
  chosen_reading: The verse is rendered as a judgment against arrogant self-security grounded in inaccessible geography, without importing additional theological claims.
  alternative_readings:
  - A purely psychological reading focused only on inward fear
  - An overextended eschatological reading detached from the historical oracle against Edom
  rationale: The imagery of rock clefts, hill heights, and the eagle's nest points to Edom's fortified location and pride. The translation preserves the historical-prophetic force without flattening or over-theologizing it.
