theological_decisions:
- issue: Reading of מַלְכָּם
  chosen_reading: Milcom (the Ammonite deity)
  alternative_readings:
  - their king
  rationale: The Hebrew consonants allow either the proper name of the Ammonite god or the phrase 'their king.' Because the verse concerns territorial possession by Ammon and prophetic polemic often personifies nations through their gods, 'Milcom' is a strong contextual reading. The alternative is preserved in a footnote rather than suppressed.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
