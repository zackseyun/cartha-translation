id: JER.49.1
reference: Jeremiah 49:1
source:
  edition: WLC
  text: לִ/בְנֵ֣י עַמּ֗וֹן כֹּ֚ה אָמַ֣ר יְהוָ֔ה הֲ/בָנִ֥ים אֵין֙ לְ/יִשְׂרָאֵ֔ל אִם יוֹרֵ֖שׁ אֵ֣ין ל֑/וֹ מַדּ֗וּעַ יָרַ֤שׁ מַלְכָּ/ם֙ אֶת גָּ֔ד וְ/עַמּ֖/וֹ בְּ/עָרָ֥י/ו יָשָֽׁב־־׃
translation:
  text: 'Concerning the sons of Ammon, thus says Yahweh: Does Israel have no sons? Does he have no heir? Why then has Milcom taken possession of Gad, and his people settled in its cities?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew Malcam/Milcom can also be read ''their king'': ''Why then has their king taken possession of Gad...?'''
    reason: alternative_reading
lexical_decisions:
- source_word: לִבְנֵי עַמּוֹן
  chosen: Concerning the sons of Ammon
  alternatives:
  - To the sons of Ammon
  - Against the sons of Ammon
  - Concerning the Ammonites
  lexicon: HALOT
  rationale: The prefixed ל can introduce the topic/oracle heading. 'Concerning' fits prophetic superscription style in English. 'Sons of Ammon' is more formally transparent than the smoother ethnic label 'Ammonites,' preserving the Hebrew expression while remaining readable.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֲבָנִים ... לְיִשְׂרָאֵל
  chosen: Does Israel have no sons?
  alternatives:
  - Has Israel no children?
  - Are there no sons for Israel?
  lexicon: HALOT
  rationale: בנים is literally 'sons.' The inheritance argument in the verse depends on male heirs, so 'sons' is preferable to the broader 'children.'
- source_word: אִם יוֹרֵשׁ אֵין לוֹ
  chosen: Does he have no heir?
  alternatives:
  - Or has he no heir?
  - If he has no heir
  lexicon: HALOT
  rationale: אִם here is interrogative/disjunctive in context, continuing the rhetorical question. Singular 'heir' reflects יוֹרֵשׁ and suits the inheritance logic.
- source_word: מַדּוּעַ יָרַשׁ
  chosen: Why then has taken possession of
  alternatives:
  - Why has inherited
  - Why has dispossessed and occupied
  lexicon: HALOT
  rationale: ירש in this context refers to taking possession of territory. 'Taken possession of' is idiomatic English and preserves the land-inheritance nuance better than the potentially misleading 'inherited.'
- source_word: מַלְכָּם
  chosen: Milcom
  alternatives:
  - their king
  - Malcam
  lexicon: HALOT
  rationale: The consonantal form can be read as the Ammonite deity-name Milcom or as 'their king.' In this context, the proper name is widely judged likely and avoids ambiguity with a human ruler; the alternative is preserved in a footnote because the Hebrew form permits it.
- source_word: אֶת גָּד
  chosen: Gad
  alternatives:
  - the territory of Gad
  - the tribe of Gad
  lexicon: HALOT
  rationale: The direct object is simply 'Gad.' In context this refers to the tribal territory/people east of the Jordan, but the concise proper name best matches the Hebrew while allowing the geographic sense to be inferred.
- source_word: וְעַמּוֹ בְּעָרָיו יָשָׁב
  chosen: and his people settled in its cities
  alternatives:
  - and his people dwell in his cities
  - and its people settled in his cities
  lexicon: HALOT
  rationale: The singular suffixes most naturally refer back to Milcom in form, but in English 'its cities' better communicates that the cities belong to Gad/the territory just mentioned, not to Milcom. 'Settled' renders the perfect of ישב naturally in context of occupation.
