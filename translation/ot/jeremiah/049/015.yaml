id: JER.49.15
reference: Jeremiah 49:15
source:
  edition: WLC
  text: כִּֽי הִנֵּ֥ה קָטֹ֛ן נְתַתִּ֖י/ךָ בַּ/גּוֹיִ֑ם בָּז֖וּי בָּ/אָדָֽם־׃
translation:
  text: For look, I have made you small among the nations, despised among men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among humankind.' Hebrew 'among man/humanity' uses אדם as a collective
      term.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement; 'For'
    best preserves the causal/discourse connection in natural English.
- source_word: הִנֵּה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: A deictic particle drawing attention. 'Look' preserves the force in readable
    modern English better than the more archaic 'behold.'
- source_word: קָטֹן
  chosen: small
  alternatives:
  - little
  - insignificant
  lexicon: HALOT
  rationale: Describes reduced status or insignificance. 'Small' is concise and idiomatic
    with 'among the nations'; 'insignificant' is interpretive and stronger.
- source_word: נְתַתִּיךָ
  chosen: I have made you
  alternatives:
  - I have set you
  - I have given you
  lexicon: HALOT
  rationale: Although the verb is literally 'I have given,' in this predicate construction
    with 'small' English idiom is better served by 'I have made you,' expressing resultant
    status without obscuring the Hebrew sense.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the peoples
  - among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם here refers broadly to nations/peoples in an international sense,
    not specifically Gentiles in contrast to Israel. 'Among the nations' is the most
    standard and contextually fitting rendering.
- source_word: בָּזוּי
  chosen: despised
  alternatives:
  - contemptible
  - held in contempt
  lexicon: HALOT
  rationale: Conveys the passive sense of being treated with scorn. 'Despised' is
    direct and natural; 'held in contempt' is accurate but less concise.
- source_word: בָּאָדָם
  chosen: among men
  alternatives:
  - among humankind
  - among mankind
  - by men
  lexicon: HALOT
  rationale: With the preposition ב and collective אדם, the phrase denotes standing
    within humanity generally. Per doctrine, gender-accurate rendering is preferred
    where the source uses adam with representative force; 'among men' preserves the
    Hebrew form and parallelism with 'among the nations.'
