theological_decisions:
- issue: Rendering of אָדָם in a collective/generic sense
  chosen_reading: among men
  alternative_readings:
  - among humankind
  - among mankind
  rationale: The Hebrew uses אדם generically for humanity. Following the stated gender-accurate
    policy, the main text keeps 'men' as the representative term, while a footnote
    preserves the more explicitly inclusive alternative for readers.
