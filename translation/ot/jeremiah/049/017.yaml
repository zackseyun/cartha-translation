id: JER.49.17
reference: Jeremiah 49:17
source:
  edition: WLC
  text: וְ/הָיְתָ֥ה אֱד֖וֹם לְ/שַׁמָּ֑ה כֹּ֚ל עֹבֵ֣ר עָלֶ֔י/הָ יִשֹּׁ֥ם וְ/יִשְׁרֹ֖ק
    עַל כָּל מַכּוֹתֶֽ/הָ־־׃
translation:
  text: Edom will become a horror; everyone who passes by her will be appalled and
    will whistle at all her wounds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a desolation' or 'an object of horror.' The Hebrew term includes both
      ruin and the appalled reaction it evokes.
    reason: lexical_alternative
  - marker: b
    text: Or 'will hiss.' The Hebrew verb denotes a sharp sound of astonishment or
      derision; 'whistle' is used here as the clearer modern English equivalent.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic context functions
    futurally. 'Will become' brings out the resultant state more naturally in English
    than a simple 'will be.'
- source_word: אֱדוֹם
  chosen: Edom
  rationale: Proper name of the nation/land; transliterated per translation philosophy.
- source_word: לְשַׁמָּה
  chosen: a horror
  alternatives:
  - a desolation
  - an object of horror
  - a wasteland
  lexicon: HALOT
  rationale: שַׁמָּה denotes desolation with the nuance of being appalling or horrifying
    to onlookers. 'A horror' captures both devastation and the reaction it provokes,
    fitting the following verbs of astonishment and hissing/whistling.
- source_word: כָּל עֹבֵר עָלֶיהָ
  chosen: everyone who passes by her
  alternatives:
  - all who pass by her
  - everyone passing by it
  lexicon: HALOT
  rationale: Collective singular construction rendered idiomatically as 'everyone
    who passes by her.' Feminine suffix reflects the land/city as feminine in Hebrew;
    retained as 'her' in English.
- source_word: יִשֹּׁם
  chosen: will be appalled
  alternatives:
  - will be astonished
  - will be desolated
  - will be horrified
  lexicon: HALOT
  rationale: From שמם in the sense of being appalled/astonished at devastation. 'Will
    be appalled' best matches the observer's reaction in context.
- source_word: וְיִשְׁרֹק
  chosen: will whistle
  alternatives:
  - will hiss
  lexicon: HALOT
  rationale: The verb literally refers to making a sharp sound, often rendered 'hiss'
    in older English. In contemporary English, 'whistle' is the more transparent lexical
    equivalent, while the derisive or astonished force is supplied by context. Alternative
    preserved in a footnote because 'hiss' is a familiar traditional rendering.
- source_word: עַל כָּל מַכּוֹתֶיהָ
  chosen: at all her wounds
  alternatives:
  - because of all her blows
  - over all her plagues
  - at all her disasters
  lexicon: HALOT
  rationale: מַכּוֹת literally means blows/strikes and by extension wounds or afflictions.
    'Wounds' communicates the visible effects of judgment in a vivid, natural way.
    The preposition עַל here is rendered 'at' to express the reaction directed toward
    the devastation.
