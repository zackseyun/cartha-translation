id: JER.49.3
reference: Jeremiah 49:3
source:
  edition: WLC
  text: הֵילִ֨ילִי חֶשְׁבּ֜וֹן כִּ֣י שֻׁדְּדָה עַ֗י צְעַקְנָה֮ בְּנ֣וֹת רַבָּה֒ חֲגֹ֣רְנָה
    שַׂקִּ֔ים סְפֹ֕דְנָה וְ/הִתְשׁוֹטַ֖טְנָה בַּ/גְּדֵר֑וֹת כִּ֤י מַלְכָּ/ם֙ בַּ/גּוֹלָ֣ה
    יֵלֵ֔ךְ כֹּהֲנָ֥י/ו וְ/שָׂרָ֖י/ו יַחְדָּֽיו־׃
translation:
  text: Wail, Heshbon, for Ai is devastated! Cry out, daughters of Rabbah! Put on
    sackcloth, mourn, and wander about among the walls, for their king will go into
    exile, together with his priests and his officials.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Milcom will go into exile' (also spelled 'Malcam'), taking the Hebrew
      as the name of the Ammonite god rather than 'their king.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֵילִילִי
  chosen: Wail
  alternatives:
  - Howl
  - Lament
  lexicon: HALOT
  rationale: Imperative feminine singular from ילל, a cry of lament/distress. 'Wail'
    is natural modern English and preserves the force better than the somewhat harsher
    'howl.'
- source_word: חֶשְׁבּוֹן
  chosen: Heshbon
  rationale: Place name; transliterated per translation philosophy.
- source_word: שֻׁדְּדָה
  chosen: is devastated
  alternatives:
  - is destroyed
  - is plundered
  lexicon: HALOT
  rationale: Passive of שׁדד can denote violent devastation, often with plundering.
    'Is devastated' captures the result state without narrowing to either total destruction
    or mere looting.
- source_word: עַי
  chosen: Ai
  alternatives:
  - the city Ai
  rationale: Proper place name, transliterated. Though some versions emend or relate
    it to Ar, the MT reads Ai and should be represented in the main text.
- source_word: צְעַקְנָה
  chosen: Cry out
  alternatives:
  - Shriek
  - Call out
  lexicon: HALOT
  rationale: Imperative feminine plural from צעק. 'Cry out' fits a lament context
    and remains idiomatic.
- source_word: בְּנוֹת רַבָּה
  chosen: daughters of Rabbah
  alternatives:
  - women of Rabbah
  - villages of Rabbah
  lexicon: HALOT
  rationale: Hebrew 'daughters of' can denote female inhabitants or dependent towns.
    In this mourning context, the direct address to feminine plurals favors the women/inhabitants
    personified as 'daughters,' preserving the Hebrew imagery.
- source_word: חֲגֹרְנָה שַׂקִּים
  chosen: Put on sackcloth
  alternatives:
  - Gird yourselves with sackcloth
  lexicon: HALOT
  rationale: Idiomatic mourning expression. 'Put on sackcloth' is clear modern English
    while preserving the ritual sense.
- source_word: סְפֹדְנָה
  chosen: mourn
  alternatives:
  - lament
  lexicon: HALOT
  rationale: Imperative from ספד, specifically mourning with lamentation, often for
    disaster or death. 'Mourn' is concise and natural in sequence with sackcloth.
- source_word: וְהִתְשׁוֹטַטְנָה
  chosen: wander about
  alternatives:
  - roam about
  - run to and fro
  lexicon: HALOT
  rationale: Hitpolel/reflexive nuance of שׁוט conveys moving about restlessly. 'Wander
    about' communicates agitated movement in grief without sounding overly wooden.
- source_word: בַּגְּדֵרוֹת
  chosen: among the walls
  alternatives:
  - in the enclosures
  - among the sheepfolds
  - by the fences
  lexicon: HALOT
  rationale: גדרות literally refers to walls/fences/enclosures. In a city-lament context,
    'among the walls' best fits the urban setting and the image of distressed movement
    around defensive structures or enclosed spaces.
- source_word: מַלְכָּם
  chosen: their king
  alternatives:
  - Milcom
  - Malcam
  lexicon: HALOT
  rationale: The consonants can be read as 'their king' or as the Ammonite deity Milcom/Malcam.
    In the MT pointing here it reads 'their king,' which suits the immediate syntax
    with 'his priests and his officials.' The deity reading is significant enough
    to preserve in a footnote.
- source_word: בַּגּוֹלָה יֵלֵךְ
  chosen: will go into exile
  alternatives:
  - will go into captivity
  lexicon: HALOT
  rationale: Standard exile formula. 'Go into exile' is contemporary and accurately
    reflects deportation language.
- source_word: כֹּהֲנָיו
  chosen: his priests
  lexicon: HALOT
  rationale: Straightforward rendering. If מַלְכָּם were read as the deity Milcom,
    these would be cultic priests; with 'their king' they are still retained literally
    as MT presents.
- source_word: וְשָׂרָיו
  chosen: his officials
  alternatives:
  - his princes
  - his commanders
  lexicon: HALOT
  rationale: שׂרים are leaders/officials. 'Officials' is broad enough for civic elites
    and reads naturally in modern English.
- source_word: יַחְדָּיו
  chosen: together with
  alternatives:
  - together
  lexicon: HALOT
  rationale: Adverb indicating joint departure; 'together with' makes the relation
    explicit in English.
