theological_decisions:
- issue: Whether מַלְכָּם refers to a human king ('their king') or the Ammonite deity
    Milcom/Malcam
  chosen_reading: their king
  alternative_readings:
  - Milcom
  - Malcam
  rationale: The Masoretic pointing supports 'their king,' and the parallel possessives
    'his priests and his officials' can be read coherently with that. However, because
    the consonantal text also permits the divine name and many interpreters take it
    that way in this Ammon context, the alternative is preserved in a footnote rather
    than resolved silently.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
