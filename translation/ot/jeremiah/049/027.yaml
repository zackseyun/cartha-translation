id: JER.49.27
reference: Jeremiah 49:27
source:
  edition: WLC
  text: וְ/הִצַּ֥תִּי אֵ֖שׁ בְּ/חוֹמַ֣ת דַּמָּ֑שֶׂק וְ/אָכְלָ֖ה אַרְמְנ֥וֹת בֶּן הֲדָֽד־׃ס
translation:
  text: And I will kindle a fire in the wall of Damascus, and it will consume the
    palaces of Ben-hadad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against the wall of Damascus.' The preposition may be understood with
      slightly different spatial force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִצַּתִּי
  chosen: And I will kindle
  alternatives:
  - And I will set ablaze
  - And I will set on fire
  lexicon: HALOT
  rationale: Hiphil perfect 1cs of יצת with prefixed conjunction; in prophetic judgment
    context it expresses YHWH's direct causation of fire. 'Kindle' is natural modern
    English while preserving the causative sense better than a looser paraphrase.
- source_word: אֵשׁ
  chosen: a fire
  alternatives:
  - fire
  lexicon: HALOT
  rationale: Indefinite singular noun; English idiom commonly uses the article here
    after 'kindle' ('kindle a fire').
- source_word: בְּחוֹמַת
  chosen: in the wall of
  alternatives:
  - against the wall of
  - within the wall of
  lexicon: HALOT
  rationale: The preposition ב with 'wall' is most straightforwardly rendered 'in'
    here, matching the idiom of fire being kindled in a city's fortifications. This
    preserves the Hebrew image without over-interpreting the exact spatial nuance.
- source_word: דַּמָּשֶׂק
  chosen: Damascus
  rationale: Standard English transliteration of the place name.
- source_word: וְאָכְלָה
  chosen: and it will consume
  alternatives:
  - and it will devour
  - and it shall consume
  lexicon: HALOT
  rationale: Qal perfect 3fs with conjunction, the feminine verb agreeing with 'fire.'
    In English, 'it' is required for the fire as subject. 'Consume' fits judgment-fire
    idiom and is slightly more natural than 'devour' while retaining force.
- source_word: אַרְמְנוֹת
  chosen: the palaces
  alternatives:
  - the citadels
  - the fortresses
  lexicon: HALOT
  rationale: אַרְמוֹן commonly denotes palace or fortified royal residence. 'Palaces'
    best fits the likely reference to royal structures associated with Ben-hadad,
    while preserving the grandeur of the target.
- source_word: בֶּן הֲדָד
  chosen: Ben-hadad
  alternatives:
  - Ben Hadad
  rationale: Proper royal name/title conventionally transliterated. Hyphenation reflects
    standard English Bible practice and clarifies the compound name.
