theological_decisions:
- issue: Implicit divine speaker and judgment agency
  chosen_reading: The first-person verb is rendered directly as God's own action without
    adding 'the LORD said' or other explicit identifiers.
  rationale: The verse continues prophetic speech in which YHWH is the speaker. The
    translation preserves the text's directness and does not import additional wording.
