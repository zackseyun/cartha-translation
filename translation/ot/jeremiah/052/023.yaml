id: JER.52.23
reference: Jeremiah 52:23
source:
  edition: WLC
  text: וַ/יִּֽהְיוּ֙ הָֽ/רִמֹּנִ֔ים תִּשְׁעִ֥ים וְ/שִׁשָּׁ֖ה ר֑וּחָ/ה כָּל הָ/רִמּוֹנִ֥ים
    מֵאָ֛ה עַל הַ/שְּׂבָכָ֖ה סָבִֽיב־־׃
translation:
  text: There were ninety-six pomegranates on the visible side; all the pomegranates
    on the lattice all around were one hundred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'toward the outside,' 'in one direction,' or possibly 'windward.' The
      Hebrew term is difficult; the sense is that ninety-six were counted from one
      side, while the total around the lattice was one hundred.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִמֹּנִים
  chosen: pomegranates
  alternatives:
  - ornamental pomegranates
  lexicon: HALOT
  rationale: רִמּוֹנִים literally means 'pomegranates,' here referring to the pomegranate-shaped
    ornaments on the temple pillar work. The plain lexical form is retained rather
    than paraphrasing in the main text.
- source_word: תִּשְׁעִים וְשִׁשָּׁה
  chosen: ninety-six
  lexicon: HALOT
  rationale: Straightforward cardinal number construction.
- source_word: רוּחָה
  chosen: on the visible side
  alternatives:
  - toward the outside
  - windward
  - in one direction
  lexicon: HALOT
  rationale: The noun רוּחַ with directional ending here is idiomatic and difficult.
    In this architectural counting context, it most plausibly indicates the side facing
    outward / in view, explaining why ninety-six are counted though the total is one
    hundred. 'On the visible side' communicates the likely sense in readable English
    while preserving the distinction from the total count.
- source_word: כָּל הָרִמּוֹנִים מֵאָה
  chosen: all the pomegranates ... were one hundred
  alternatives:
  - the total number of pomegranates was one hundred
  lexicon: HALOT
  rationale: כָּל plus the noun and number gives the total count. The translation
    keeps the Hebrew emphasis on 'all the pomegranates' before stating the number.
- source_word: הַשְּׂבָכָה
  chosen: the lattice
  alternatives:
  - the network
  - the latticework
  lexicon: HALOT
  rationale: שְׂבָכָה denotes the network/lattice ornamentation on the pillar capitals.
    'Lattice' is concise and natural; 'latticework' is a viable alternative.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - round about
  - around
  lexicon: HALOT
  rationale: This adverb indicates surrounding circumference. 'All around' is idiomatic
    modern English and preserves the spatial sense.
