id: JER.52.21
reference: Jeremiah 52:21
source:
  edition: WLC
  text: וְ/הָ/עַמּוּדִ֗ים שְׁמֹנֶ֨ה עֶשְׂרֵ֤ה אַמָּה֙ קומה הָ/עַמֻּ֣ד הָ/אֶחָ֔ד וְ/ח֛וּט
    שְׁתֵּים עֶשְׂרֵ֥ה אַמָּ֖ה יְסֻבֶּ֑/נּוּ וְ/עָבְי֛/וֹ אַרְבַּ֥ע אַצְבָּע֖וֹת נָבֽוּב־׃
translation:
  text: As for the pillars, the height of each pillar was eighteen cubits, and a line
    of twelve cubits would go around it; its thickness was four fingers, and it was
    hollow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'four fingerbreadths.' The Hebrew literally reads 'four fingers,' using
      a body-based unit of measure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָעַמּוּדִים
  chosen: As for the pillars
  alternatives:
  - And the pillars
  - The pillars
  lexicon: HALOT
  rationale: Introduces the topic of the two pillars collectively. 'As for' reflects
    the waw plus definite noun in a descriptive inventory context, giving natural
    English discourse flow without adding content.
- source_word: שְׁמֹנֶה עֶשְׂרֵה אַמָּה קֹמָה הָעַמּוּד הָאֶחָד
  chosen: the height of each pillar was eighteen cubits
  alternatives:
  - one pillar was eighteen cubits high
  - the one pillar was eighteen cubits in height
  lexicon: HALOT
  rationale: The Hebrew literally says 'eighteen cubits was the height of the one
    pillar.' In English, 'each pillar' best conveys that the measurement applies individually
    to either pillar in this descriptive context.
- source_word: חוּט
  chosen: line
  alternatives:
  - cord
  - measuring line
  lexicon: HALOT
  rationale: חוּט commonly denotes a cord or line. 'Line' is concise and idiomatic
    here, especially with the surrounding measurement language.
- source_word: שְׁתֵּים עֶשְׂרֵה אַמָּה יְסֻבֶּנּוּ
  chosen: a line of twelve cubits would go around it
  alternatives:
  - a cord of twelve cubits surrounded it
  - it was encircled by a line of twelve cubits
  lexicon: HALOT
  rationale: The verb סבב with pronominal suffix indicates encircling the pillar.
    'Would go around it' expresses the measuring/circumference sense naturally in
    English while preserving the image of a line surrounding it.
- source_word: עָבְיוֹ
  chosen: its thickness
  alternatives:
  - its wall thickness
  - its breadth
  lexicon: HALOT
  rationale: Refers to the thickness of the pillar material, not overall width. 'Its
    thickness' is the most straightforward rendering.
- source_word: אַרְבַּע אַצְבָּעוֹת
  chosen: four fingers
  alternatives:
  - four fingerbreadths
  - four handbreadths
  lexicon: HALOT
  rationale: Literally 'four fingers.' This is a small unit of measure. 'Fingerbreadths'
    is interpretive but possible; 'four fingers' preserves the concrete Hebrew expression
    in readable English.
- source_word: נָבוּב
  chosen: it was hollow
  alternatives:
  - hollow
  - made hollow
  lexicon: HALOT
  rationale: Describes the pillar as hollow. Rendering with an explicit clause completes
    the English sentence naturally and matches the predicate adjective/participle
    sense.
