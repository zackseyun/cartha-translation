id: JER.52.5
reference: Jeremiah 52:5
source:
  edition: WLC
  text: וַ/תָּבֹ֥א הָ/עִ֖יר בַּ/מָּצ֑וֹר עַ֚ד עַשְׁתֵּ֣י עֶשְׂרֵ֣ה שָׁנָ֔ה לַ/מֶּ֖לֶךְ
    צִדְקִיָּֽהוּ׃
translation:
  text: So the city came under siege until the eleventh year of King Zedekiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the city was in siege' or 'the city entered into siege.'
      The Hebrew idiom means that the city remained under blockade.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  chosen: came
  alternatives:
  - was
  - entered
  lexicon: HALOT
  rationale: 'From בוא (''to come/enter''). With the predicate phrase ''under siege,''
    English idiom prefers ''came under'' rather than a more wooden ''entered into.''
    The wayyiqtol continues the narrative sequence: ''So the city came under siege.'''
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Straightforward rendering of עִיר with the article. Contextually this
    is Jerusalem, but the Hebrew says 'the city,' so the translation preserves the
    wording rather than substituting the proper name.
- source_word: בַּמָּצוֹר
  chosen: under siege
  alternatives:
  - in siege
  - in the siege
  - under the siege
  lexicon: HALOT
  rationale: מָצוֹר denotes siege/siegeworks. In English, the natural equivalent with
    ב is 'under siege.' This is an optimal-equivalence rendering that preserves the
    military sense without awkward literalism.
- source_word: עַד
  chosen: until
  alternatives:
  - as far as
  - up to
  lexicon: HALOT
  rationale: Temporal marker introducing the endpoint of the siege.
- source_word: עַשְׁתֵּי עֶשְׂרֵה שָׁנָה
  chosen: the eleventh year
  alternatives:
  - year eleven
  - the eleven year
  lexicon: HALOT
  rationale: The Hebrew cardinal construction with 'year' idiomatically means 'the
    eleventh year' in English. Rendering it as an ordinal communicates the temporal
    reference naturally and accurately.
- source_word: לַמֶּלֶךְ
  chosen: of King
  alternatives:
  - for the king
  - to the king
  lexicon: HALOT
  rationale: 'The preposition ל here marks relation/reference in dating formulae:
    ''in/of the ... year of King ...'' English idiom requires ''of King'' rather than
    a more literal ''to the king.'''
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
