id: JER.52.25
reference: Jeremiah 52:25
source:
  edition: WLC
  text: וּ/מִן הָ/עִ֡יר לָקַח֩ סָרִ֨יס אֶחָ֜ד אֲֽשֶׁר הָיָ֥ה פָקִ֣יד עַל אַנְשֵׁ֣י
    הַ/מִּלְחָמָ֗ה וְ/שִׁבְעָ֨ה אֲנָשִׁ֜ים מֵ/רֹאֵ֤י פְנֵי הַ/מֶּ֨לֶךְ֙ אֲשֶׁ֣ר נִמְצְא֣וּ
    בָ/עִ֔יר וְ/אֵ֗ת סֹפֵר֙ שַׂ֣ר הַ/צָּבָ֔א הַ/מַּצְבִּ֖א אֶת עַ֣ם הָ/אָ֑רֶץ וְ/שִׁשִּׁ֥ים
    אִישׁ֙ מֵ/עַ֣ם הָ/אָ֔רֶץ הַֽ/נִּמְצְאִ֖ים בְּ/ת֥וֹךְ הָ/עִֽיר־־׀־־־׃
translation:
  text: And from the city he took one court official who had been appointed over the
    men of war, and seven men from those who saw the king’s face, who were found in
    the city, and the scribe of the commander of the army, who mustered the people
    of the land, and sixty men from the people of the land who were found within the
    city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'from the king’s personal attendants,' since 'those who saw the king’s
      face' is a court idiom for those with direct access to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: סָרִיס
  chosen: court official
  alternatives:
  - eunuch
  - officer
  lexicon: HALOT
  rationale: The term can denote a eunuch or, more broadly, a royal court official.
    In this administrative/military context, 'court official' best fits without asserting
    physical status the text does not require.
- source_word: פָקִיד
  chosen: appointed over
  alternatives:
  - officer over
  - in charge of
  - overseer of
  lexicon: HALOT
  rationale: The noun denotes one placed in charge or appointed to oversight. Rendering
    with the verbal phrase 'had been appointed over' communicates the role naturally
    in English while preserving the sense of delegated authority.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  chosen: men of war
  alternatives:
  - soldiers
  - fighting men
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the Hebrew idiom and military sense.
    'Soldiers' is possible, but 'men of war' stays closer to the source while remaining
    understandable.
- source_word: מֵרֹאֵי פְנֵי הַמֶּלֶךְ
  chosen: from those who saw the king’s face
  alternatives:
  - from the king's personal attendants
  - from those who had access to the king
  - from the king's advisers
  lexicon: HALOT
  rationale: Literally this refers to those who 'see the face' of the king, an idiom
    for privileged court access. The main text keeps the idiom transparent; an alternative
    explanatory gloss is preserved in a footnote.
- source_word: סֹפֵר שַׂר הַצָּבָא
  chosen: the scribe of the commander of the army
  alternatives:
  - the secretary of the army commander
  - the adjutant of the commander
  lexicon: HALOT
  rationale: The construct chain most naturally means a scribe/secretary attached
    to the army commander. 'Scribe' preserves the lexical form while remaining intelligible
    in context.
- source_word: הַמַּצְבִּא
  chosen: who mustered
  alternatives:
  - who enrolled
  - who conscripted
  lexicon: HALOT
  rationale: The Hiphil participle of צבא here refers to organizing or levying people
    for military service. 'Mustered' fits the military-administrative context well.
- source_word: עַם הָאָרֶץ
  chosen: the people of the land
  alternatives:
  - the common people
  - the people of the country
  lexicon: HALOT
  rationale: This expression can denote the populace of the land, sometimes with a
    socio-political nuance. The more literal 'people of the land' preserves the phrase
    and avoids over-interpreting it as merely 'common people.'
- source_word: בְּתוֹךְ הָעִיר
  chosen: within the city
  alternatives:
  - in the midst of the city
  - inside the city
  lexicon: HALOT
  rationale: '''Within the city'' is natural modern English and preserves the locative
    emphasis of the Hebrew.'
