id: JER.52.8
reference: Jeremiah 52:8
source:
  edition: WLC
  text: וַ/יִּרְדְּפ֤וּ חֵיל כַּשְׂדִּים֙ אַחֲרֵ֣י הַ/מֶּ֔לֶךְ וַ/יַּשִּׂ֥יגוּ אֶת
    צִדְקִיָּ֖הוּ בְּ/עַֽרְבֹ֣ת יְרֵח֑וֹ וְ/כָל חֵיל֔/וֹ נָפֹ֖צוּ מֵ/עָלָֽי/ו־־־׃
translation:
  text: But the army of the Chaldeans pursued the king and overtook Zedekiah in the
    plains of Jericho, and all his army was scattered from him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the steppes of Jericho.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “all his army were scattered from him”; English uses singular “army”
      as a collective noun.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵיל כַּשְׂדִּים
  chosen: the army of the Chaldeans
  alternatives:
  - the forces of the Chaldeans
  - the army of the Babylonians
  lexicon: HALOT
  rationale: חֵיל denotes military force/army here. כַּשְׂדִּים is the ethnic-political
    term 'Chaldeans,' the wording of the Hebrew text; 'Babylonians' is a contextual
    equivalent but less formally aligned.
- source_word: וַיִּרְדְּפוּ
  chosen: pursued
  alternatives:
  - chased
  - went in pursuit of
  lexicon: HALOT
  rationale: The verb רדף in military narrative commonly means 'pursue.' 'Pursued'
    is natural modern English and preserves the hostile chase sense.
- source_word: אַחֲרֵי הַמֶּלֶךְ
  chosen: the king
  alternatives:
  - after the king
  lexicon: HALOT
  rationale: In English the preposition is absorbed into the verbal idea 'pursued
    the king'; this is a standard optimal-equivalence adjustment without loss of meaning.
- source_word: וַיַּשִּׂיגוּ
  chosen: overtook
  alternatives:
  - caught up with
  - reached
  lexicon: HALOT
  rationale: נשׂג in this context means to catch up with in pursuit. 'Overtook' fits
    the military-narrative register and is more precise than merely 'reached.'
- source_word: בְּעַרְבֹת יְרֵחוֹ
  chosen: in the plains of Jericho
  alternatives:
  - in the steppes of Jericho
  - in the desert plains of Jericho
  lexicon: HALOT
  rationale: עֲרָבוֹת refers to steppe/plains region. 'Plains' is the clearest accessible
    rendering in modern English; 'steppes' is more technical and less natural.
- source_word: וְכָל חֵילוֹ
  chosen: and all his army
  alternatives:
  - and all his forces
  - and all his troops
  lexicon: HALOT
  rationale: חֵיל with 3ms suffix refers to Zedekiah's military force. Singular collective
    'army' best matches the Hebrew collective noun.
- source_word: נָפֹצוּ
  chosen: was scattered
  alternatives:
  - were scattered
  - dispersed
  lexicon: HALOT
  rationale: Though morphologically plural, the subject is the collective noun 'army,'
    which idiomatic English often treats as singular. 'Was scattered' preserves the
    sense of disintegration in defeat.
- source_word: מֵעָלָיו
  chosen: from him
  alternatives:
  - away from him
  - from his side
  lexicon: HALOT
  rationale: The phrase indicates separation from Zedekiah personally. 'From him'
    is concise and faithful; 'from his side' is interpretive but possible.
