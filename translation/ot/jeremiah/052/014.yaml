id: JER.52.14
reference: Jeremiah 52:14
source:
  edition: WLC
  text: וְ/אֶת כָּל חֹמ֥וֹת יְרוּשָׁלִַ֖ם סָבִ֑יב נָֽתְצוּ֙ כָּל חֵ֣יל כַּשְׂדִּ֔ים
    אֲשֶׁ֖ר אֶת רַב טַבָּחִֽים־־־־־׃
translation:
  text: And all the walls of Jerusalem all around were broken down by all the army
    of the Chaldeans that was with the captain of the guard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Babylonians' for 'Chaldeans.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the chief of the executioners'; the title likely refers to the commander
      of the royal guard/bodyguard.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹמ֥וֹת
  chosen: walls
  alternatives:
  - wall fortifications
  - city walls
  lexicon: HALOT
  rationale: Plural of חוֹמָה refers to defensive walls; 'walls' is the natural English
    rendering, with Jerusalem supplying the city reference.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - on every side
  lexicon: HALOT
  rationale: Adverbial noun indicating encirclement or surrounding extent. 'All around'
    preserves the distributive force in readable English.
- source_word: נָתְצוּ
  chosen: were broken down
  alternatives:
  - tore down
  - demolished
  lexicon: HALOT
  rationale: The verb נתץ commonly means to pull down or break down structures. Passive
    English is preferred here because the Hebrew fronts the object ('all the walls...')
    before naming the agent, and passive yields natural English while preserving focus.
- source_word: חֵיל
  chosen: army
  alternatives:
  - force
  - troops
  lexicon: HALOT
  rationale: חֵיל here denotes the military force rather than wealth or strength.
    'Army' is the clearest idiomatic rendering in context.
- source_word: כַּשְׂדִּים
  chosen: Chaldeans
  alternatives:
  - Babylonians
  lexicon: HALOT
  rationale: The Hebrew ethnonym is 'Chaldeans.' Although in context it refers to
    the Babylonian imperial forces, the translation follows the source term directly;
    'Babylonians' is a contextual alternative worth preserving.
- source_word: אֲשֶׁר אֶת
  chosen: that was with
  alternatives:
  - who were with
  - which was with
  lexicon: HALOT
  rationale: 'The relative particle plus אֶת marks association: the army was ''with''
    the following official. Because חֵיל is a collective singular, ''that was with''
    fits English agreement.'
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - the chief of the executioners
  - the commander of the bodyguard
  lexicon: HALOT
  rationale: This title refers to a high Babylonian official, elsewhere rendered traditionally
    as 'captain of the guard.' The underlying sense involves oversight of royal guards/executioners;
    the traditional rendering is clear and contextually established, while the more
    literal alternatives are preserved in a footnote.
