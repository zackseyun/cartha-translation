id: JER.52.15
reference: Jeremiah 52:15
source:
  edition: WLC
  text: וּ/מִ/דַּלּ֨וֹת הָ/עָ֜ם וְֽ/אֶת יֶ֥תֶר הָ/עָ֣ם הַ/נִּשְׁאָרִ֣ים בָּ/עִ֗יר
    וְ/אֶת הַ/נֹּֽפְלִים֙ אֲשֶׁ֤ר נָֽפְלוּ֙ אֶל מֶ֣לֶךְ בָּבֶ֔ל וְ/אֵ֖ת יֶ֣תֶר הָֽ/אָמ֑וֹן
    הֶגְלָ֕ה נְבוּזַרְאֲדָ֖ן רַב טַבָּחִֽים־׀־־־׃
translation:
  text: And from the poorest of the people, and the rest of the people who remained
    in the city, and the deserters who had defected to the king of Babylon, and the
    rest of the craftsmen—Nebuzaradan, the captain of the guard, carried into exile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the rest of the multitude.' The Hebrew term here is difficult; many
      understand it in this context to refer to craftsmen or artisans, especially
      in light of the parallel in 2 Kings 25:11.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the ones who fell ... to the king of Babylon,' an idiom for defecting
      or going over to him.
    reason: lexical_alternative
  - marker: c
    text: Compare 2 Kings 25:11, the parallel account of this deportation.
    reason: cross_reference
lexical_decisions:
- source_word: וּמִדַּלּוֹת הָעָם
  chosen: from the poorest of the people
  alternatives:
  - from the lowliest of the people
  - some of the poor of the people
  lexicon: HALOT
  rationale: The phrase combines the preposition מִן with דַּלּוֹת, a plural feminine
    form from the root denoting poverty/lowliness. In context it refers to a subset
    taken from among the poor/common people. 'The poorest of the people' is idiomatic
    and preserves the partitive sense of מִן.
- source_word: יֶתֶר הָעָם הַנִּשְׁאָרִים בָּעִיר
  chosen: the rest of the people who remained in the city
  alternatives:
  - the remnant of the people left in the city
  lexicon: HALOT
  rationale: יֶתֶר means 'remainder/rest'; הַנִּשְׁאָרִים is the participle 'those
    remaining.' 'The rest of the people who remained in the city' is clear modern
    English and keeps the distinction between this group and the poor mentioned first.
- source_word: הַנֹּפְלִים אֲשֶׁר נָפְלוּ אֶל מֶלֶךְ בָּבֶל
  chosen: the deserters who had defected to the king of Babylon
  alternatives:
  - those who had fallen away to the king of Babylon
  - the fugitives who went over to the king of Babylon
  lexicon: HALOT
  rationale: Though literally 'the ones falling/fallen ... to the king of Babylon,'
    נפל in this military-political idiom means to defect or go over to the opposing
    ruler. 'Deserters who had defected' captures both the nominal participle and the
    completed verbal action in natural English.
- source_word: יֶתֶר הָאָמֹון
  chosen: the rest of the craftsmen
  alternatives:
  - the rest of the multitude
  - the rest of the artisans
  lexicon: HALOT
  rationale: אָמֹון here is contextually difficult. In the parallel passage (2 Kgs
    25:11) the corresponding term is often understood as referring to artisans/workers
    rather than simply a 'multitude.' Given the deportation context and common scholarly
    understanding, 'craftsmen' best fits the likely sense, while the broader alternative
    is preserved in a footnote.
- source_word: הֶגְלָה
  chosen: carried into exile
  alternatives:
  - deported
  - took captive
  lexicon: HALOT
  rationale: The Hiphil of גלה commonly means to deport/exile. 'Carried into exile'
    is slightly more formal than 'deported' and fits the solemn historical register.
- source_word: רַב טַבָּחִים
  chosen: captain of the guard
  alternatives:
  - chief of the executioners
  - captain of the bodyguard
  lexicon: HALOT
  rationale: The title literally involves 'chief of the slaughterers/butchers,' but
    in royal context it denotes an official over the guard, often with execution duties.
    'Captain of the guard' is the standard functional rendering in English and best
    communicates the office.
