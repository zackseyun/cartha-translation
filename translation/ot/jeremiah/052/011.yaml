id: JER.52.11
reference: Jeremiah 52:11
source:
  edition: WLC
  text: וְ/אֶת עֵינֵ֥י צִדְקִיָּ֖הוּ עִוֵּ֑ר וַ/יַּאַסְרֵ֣/הוּ בַֽ/נְחֻשְׁתַּ֗יִם
    וַ/יְבִאֵ֤/הוּ מֶֽלֶךְ בָּבֶל֙ בָּבֶ֔לָ/ה וַ/יִּתְּנֵ֥/הוּ ב/בית הַ/פְּקֻדֹּ֖ת
    עַד י֥וֹם מוֹתֽ/וֹ־־־־׃
translation:
  text: Then he blinded Zedekiah’s eyes, bound him with bronze shackles, and the king
    of Babylon brought him to Babylon and put him in the house of custody until the
    day of his death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'put him in prison.' The Hebrew reads more literally, 'put him in the
      house of custody.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵי ... עִוֵּר
  chosen: blinded Zedekiah’s eyes
  alternatives:
  - put out Zedekiah’s eyes
  - blinded Zedekiah
  lexicon: HALOT
  rationale: The Hebrew explicitly mentions 'the eyes of Zedekiah' with the verb 'blind.'
    English can render this either more literally ('blinded his eyes') or idiomatically
    ('blinded Zedekiah'). Retaining 'eyes' preserves the concrete brutality of the
    Hebrew while remaining natural enough in English.
- source_word: וַיַּאַסְרֵהוּ
  chosen: bound him
  alternatives:
  - fettered him
  - imprisoned him
  lexicon: HALOT
  rationale: The verb אסר commonly means 'bind' or 'tie.' 'Bound him' is the most
    straightforward rendering here, with the following phrase specifying the means.
- source_word: בַנְחֻשְׁתַּיִם
  chosen: with bronze shackles
  alternatives:
  - with bronze fetters
  - with bronze chains
  lexicon: HALOT
  rationale: The dual/plural form refers to bronze restraints. 'Shackles' communicates
    physical restraints on a prisoner more clearly in modern English than 'fetters,'
    while preserving the material 'bronze' rather than using the traditional but less
    precise 'brass.'
- source_word: וַיְבִאֵהוּ ... בָּבֶלָה
  chosen: brought him to Babylon
  alternatives:
  - led him to Babylon
  lexicon: HALOT
  rationale: The verb בוא in the causative means 'bring.' 'Brought him to Babylon'
    is direct and idiomatic. The directional ending on 'Babylon' is naturally represented
    by English 'to Babylon.'
- source_word: בֵּית הַפְּקֻדֹּת
  chosen: the house of custody
  alternatives:
  - the prison
  - the house of confinement
  - the house of punishment
  lexicon: HALOT
  rationale: This expression is somewhat specialized and likely denotes a place of
    detention/guard. 'House of custody' preserves the formal structure of the Hebrew
    and avoids over-specifying beyond the lexical evidence. Because 'prison' is a
    plausible smoother rendering, it is preserved in a footnote.
- source_word: עַד יוֹם מוֹתוֹ
  chosen: until the day of his death
  alternatives:
  - until he died
  lexicon: HALOT
  rationale: 'The Hebrew is formally explicit: ''until the day of his death.'' Retaining
    that phrasing preserves the solemn cadence and specificity of the source.'
