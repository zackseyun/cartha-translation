id: JER.52.26
reference: Jeremiah 52:26
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח אוֹתָ֔/ם נְבוּזַרְאֲדָ֖ן רַב טַבָּחִ֑ים וַ/יֹּ֧לֶךְ אוֹתָ֛/ם אֶל
    מֶ֥לֶךְ בָּבֶ֖ל רִבְלָֽתָ/ה־־׃
translation:
  text: Nebuzaradan, the captain of the guard, took them and brought them to the king
    of Babylon at Riblah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'led them to the king of Babylon at Riblah.' The Hebrew verb can be rendered
      'brought' or 'led' in this context.
    reason: lexical_alternative
  - marker: b
    text: Literally 'chief of the slaughterers.' In context this denotes the commander
      of the royal guard, and possibly includes execution duties.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - seized
  - captured
  lexicon: HALOT
  rationale: The verb לקח in the waw-consecutive narrative commonly means 'take.'
    'Took' is the most direct and natural rendering here, without adding the stronger
    nuance of 'seized' unless context requires it.
- source_word: אוֹתָם
  chosen: them
  rationale: Direct object pronoun referring back to the officials named in the previous
    verse; standard rendering is 'them.'
- source_word: נְבוּזַרְאֲדָן
  chosen: Nebuzaradan
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - the chief of the executioners
  - the chief butcher
  lexicon: HALOT
  rationale: This title literally involves 'chief' plus a term associated with slaughterers/bodyguards/executioners.
    In royal contexts it idiomatically denotes the commander of the king's guard.
    'Captain of the guard' is clear modern English and fits the Babylonian court setting
    better than the overly literal but potentially misleading 'chief butcher.' 'Chief
    of the executioners' is possible but too narrow in this context.
- source_word: וַיֹּלֶךְ
  chosen: brought
  alternatives:
  - led
  - took
  lexicon: HALOT
  rationale: Although the underlying verb is הלך ('go/walk') in a causative/narrative
    form, in this construction with object plus destination it is naturally rendered
    'brought' or 'led.' 'Brought' is idiomatic English for transporting prisoners
    to a ruler.
- source_word: אֶל מֶלֶךְ בָּבֶל
  chosen: to the king of Babylon
  alternatives:
  - before the king of Babylon
  rationale: The preposition אֶל straightforwardly means 'to.' 'Before' is interpretive
    and not necessary in the main text.
- source_word: רִבְלָתָה
  chosen: at Riblah
  alternatives:
  - to Riblah
  rationale: 'The directional/locative ending on the place name can indicate motion
    toward the place, but in English the phrase most naturally modifies the king''s
    location: ''the king of Babylon at Riblah.'' This also matches the narrative context
    in which the king is stationed there.'
