id: JER.52.9
reference: Jeremiah 52:9
source:
  edition: WLC
  text: וַֽ/יִּתְפְּשׂוּ֙ אֶת הַ/מֶּ֔לֶךְ וַ/יַּעֲל֨וּ אֹת֜/וֹ אֶל מֶ֧לֶךְ בָּבֶ֛ל
    רִבְלָ֖תָ/ה בְּ/אֶ֣רֶץ חֲמָ֑ת וַ/יְדַבֵּ֥ר אִתּ֖/וֹ מִשְׁפָּטִֽים־־׃
translation:
  text: They captured the king and brought him up to the king of Babylon at Riblah
    in the land of Hamath, and he pronounced judgments on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he passed sentence on him.' The Hebrew literally says, 'and he
      spoke judgments with/to him,' an idiom for issuing judicial decisions.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפְּשׂוּ
  chosen: They captured
  alternatives:
  - They seized
  - They took
  lexicon: HALOT
  rationale: The verb from תפשׂ denotes laying hold of or capturing. 'Captured' fits
    the military context of Zedekiah's apprehension and is natural modern English.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite reference to the Judean king already in context; 'the king'
    preserves the Hebrew wording without adding the proper name.
- source_word: וַיַּעֲלוּ אֹתוֹ אֶל
  chosen: and brought him up to
  alternatives:
  - and took him up to
  - and led him up to
  lexicon: HALOT
  rationale: עלה literally means 'go up/bring up.' Even though Riblah is northward
    rather than topographically higher in an obvious English sense, 'brought him up'
    preserves the Hebrew directional idiom while remaining understandable.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: Standard construct rendering; clear and idiomatic in English.
- source_word: רִבְלָתָה
  chosen: at Riblah
  lexicon: HALOT
  rationale: Place name is transliterated per translation philosophy. The locative
    ending is naturally rendered with 'at.'
- source_word: בְּאֶרֶץ חֲמָת
  chosen: in the land of Hamath
  alternatives:
  - in the territory of Hamath
  lexicon: HALOT
  rationale: אֶרֶץ can mean land/territory. 'Land of Hamath' is the conventional and
    sufficiently transparent rendering for the geographical designation.
- source_word: וַיְדַבֵּר אִתּוֹ מִשְׁפָּטִים
  chosen: and he pronounced judgments on him
  alternatives:
  - and he spoke judgments with him
  - and he passed sentence on him
  - and he gave judgment against him
  lexicon: HALOT
  rationale: Literally 'he spoke judgments with/to him.' In context this refers to
    judicial sentencing by the king of Babylon. 'Pronounced judgments on him' preserves
    the plural מִשְׁפָּטִים and the formal judicial sense without becoming wooden.
    'Passed sentence on him' is possible but compresses the plural nuance.
