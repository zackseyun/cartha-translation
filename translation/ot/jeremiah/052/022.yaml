id: JER.52.22
reference: Jeremiah 52:22
source:
  edition: WLC
  text: וְ/כֹתֶ֨רֶת עָלָ֜י/ו נְחֹ֗שֶׁת וְ/קוֹמַ֨ת הַ/כֹּתֶ֥רֶת הָ/אַחַת֮ חָמֵ֣שׁ אַמּוֹת֒
    וּ/שְׂבָכָ֨ה וְ/רִמּוֹנִ֧ים עַֽל הַ/כּוֹתֶ֛רֶת סָבִ֖יב הַ/כֹּ֣ל נְחֹ֑שֶׁת וְ/כָ/אֵ֛לֶּה
    לַֽ/עַמּ֥וּד הַ/שֵּׁנִ֖י וְ/רִמּוֹנִֽים־׃
translation:
  text: And on it was a bronze capital, and the height of the one capital was five
    cubits, with latticework and pomegranates on the capital all around, all of bronze.
    And the second pillar had the same, with pomegranates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'network' for 'latticework.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'pomegranates'; likely pomegranate-shaped ornaments decorating the
      capital.
    reason: cultural_note
lexical_decisions:
- source_word: כֹתֶרֶת
  chosen: capital
  alternatives:
  - capital top
  - chapiter
  lexicon: HALOT
  rationale: In temple/pillar architecture, כֹתֶרֶת refers to the ornamental top of
    a pillar. 'Capital' is the standard clear English architectural term; 'chapiter'
    is archaic.
- source_word: עָלָיו
  chosen: on it
  alternatives:
  - upon it
  - on top of it
  lexicon: HALOT
  rationale: The preposition עַל with 3ms suffix refers back to the pillar in the
    prior context. 'On it' is natural modern English and preserves the spatial relation.
- source_word: נְחֹשֶׁת
  chosen: bronze
  alternatives:
  - copper
  - brass
  lexicon: HALOT
  rationale: In biblical material culture this term commonly denotes bronze objects;
    'brass' is traditional but historically less precise, and 'copper' is possible
    but less likely for these crafted temple furnishings.
- source_word: קוֹמַת
  chosen: height
  alternatives:
  - stature
  lexicon: HALOT
  rationale: קוֹמָה here denotes the measured vertical extent of the capital. 'Height'
    is the straightforward contextual rendering.
- source_word: הָאַחַת
  chosen: the one
  alternatives:
  - one
  - the first
  lexicon: HALOT
  rationale: The phrase 'the one capital' distinguishes one of the pair without necessarily
    implying sequence. 'The first' would over-interpret.
- source_word: חָמֵשׁ אַמּוֹת
  chosen: five cubits
  alternatives:
  - seven and a half feet
  lexicon: HALOT
  rationale: The source uses the ancient unit directly. Following optimal equivalence,
    the formal unit is retained rather than converted.
- source_word: שְׂבָכָה
  chosen: latticework
  alternatives:
  - network
  - grating
  lexicon: HALOT
  rationale: The term denotes a net-like ornamental structure on the capital. 'Latticework'
    is readable and suitably concrete; 'network' is possible but less vivid.
- source_word: רִמּוֹנִים
  chosen: pomegranates
  lexicon: HALOT
  rationale: The word literally means 'pomegranates' and in this architectural context
    refers to pomegranate-shaped ornaments. The literal rendering is standard and
    sufficient.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - round about
  - surrounding it
  lexicon: HALOT
  rationale: This adverb indicates encircling placement around the capital. 'All around'
    is idiomatic modern English.
- source_word: הַכֹּל נְחֹשֶׁת
  chosen: all of bronze
  alternatives:
  - the whole was bronze
  - all bronze
  lexicon: HALOT
  rationale: This summarizes the material composition of the decorative elements.
    'All of bronze' is concise and natural.
- source_word: וְכָאֵלֶּה
  chosen: the same
  alternatives:
  - like these
  - such as these
  lexicon: HALOT
  rationale: The phrase compares the second pillar's adornment to the first. English
    idiom prefers 'the same' here.
- source_word: לָעַמּוּד הַשֵּׁנִי
  chosen: the second pillar had
  alternatives:
  - for the second pillar
  - belonged to the second pillar
  lexicon: HALOT
  rationale: The Hebrew is elliptical. Supplying 'had' makes the English sentence
    complete while preserving the sense that the second pillar possessed matching
    features.
