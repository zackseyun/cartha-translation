id: JER.52.1
reference: Jeremiah 52:1
source:
  edition: WLC
  text: בֶּן עֶשְׂרִ֨ים וְ/אַחַ֤ת שָׁנָה֙ צִדְקִיָּ֣הוּ בְ/מָלְכ֔/וֹ וְ/אַחַ֤ת עֶשְׂרֵה֙
    שָׁנָ֔ה מָלַ֖ךְ בִּ/ירֽוּשָׁלִָ֑ם וְ/שֵׁ֣ם אִמּ֔/וֹ חמיטל בַּֽת יִרְמְיָ֖הוּ מִ/לִּבְנָֽה־־׃
translation:
  text: Zedekiah was twenty-one years old when he became king, and he reigned eleven
    years in Jerusalem. His mother’s name was Hamutal the daughter of Jeremiah of
    Libnah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “when he began to reign.”
    reason: lexical_alternative
  - marker: b
    text: Or “from Libnah.”
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְאַחַת שָׁנָה
  chosen: was twenty-one years old
  alternatives:
  - was a son of twenty-one years
  lexicon: HALOT
  rationale: This is the standard Hebrew age idiom. A literal rendering ('son of twenty-one
    years') would be unnatural in modern English and obscure the plain sense.
- source_word: בְמָלְכוֹ
  chosen: when he became king
  alternatives:
  - in his reigning
  - when he began to reign
  lexicon: HALOT
  rationale: The preposition ב plus infinitive construct of מלך marks the time of
    accession. 'When he became king' is clear modern English and accurately conveys
    the temporal sense.
- source_word: מָלַךְ
  chosen: he reigned
  alternatives:
  - he was king
  lexicon: HALOT
  rationale: The verb specifically denotes exercising kingship/reigning, not merely
    holding the title. 'He reigned' is the standard and precise rendering.
- source_word: בִּירוּשָׁלִָם
  chosen: in Jerusalem
  lexicon: HALOT
  rationale: Straightforward locative use of the preposition ב with the place name.
- source_word: וְשֵׁם אִמּוֹ
  chosen: His mother’s name was
  alternatives:
  - and the name of his mother was
  lexicon: HALOT
  rationale: This preserves the genealogical notice while using natural English word
    order. The conjunction is carried forward in the sentence flow without requiring
    a wooden 'and' at the start.
- source_word: חמיטל
  chosen: Hamutal
  alternatives:
  - Hamital
  lexicon: HALOT
  rationale: The proper name is transliterated rather than translated, following the
    project’s policy for personal names. 'Hamutal' is a common English transliteration
    for this Hebrew form.
- source_word: בַּת יִרְמְיָהוּ
  chosen: the daughter of Jeremiah
  lexicon: HALOT
  rationale: Standard filial expression. 'Jeremiah' is the conventional English transliteration
    of the personal name יִרְמְיָהוּ.
- source_word: מִלִּבְנָה
  chosen: of Libnah
  alternatives:
  - from Libnah
  lexicon: HALOT
  rationale: The מן phrase identifies Jeremiah by place of origin or association.
    In English genealogical style, 'of Libnah' is more idiomatic than 'from Libnah'
    while preserving the sense.
