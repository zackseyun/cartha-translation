id: JER.52.34
reference: Jeremiah 52:34
source:
  edition: WLC
  text: וַ/אֲרֻחָת֗/וֹ אֲרֻחַת֩ תָּמִ֨יד נִתְּנָה לּ֜/וֹ מֵ/אֵ֧ת מֶֽלֶךְ בָּבֶ֛ל דְּבַר
    י֥וֹם בְּ/יוֹמ֖/וֹ עַד י֣וֹם מוֹת֑/וֹ כֹּ֖ל יְמֵ֥י חַיָּֽי/ו־־־־׃
translation:
  text: And his allowance, a continual allowance, was given to him from the king of
    Babylon, a daily portion day by day, until the day of his death, all the days
    of his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ration,' 'provision,' or 'portion' for 'allowance' (Heb. אֲרֻחָה). The
      term here refers to the king's assigned maintenance for Jehoiachin.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲרֻחָה / אֲרֻחָתוֹ
  chosen: allowance
  alternatives:
  - ration
  - portion
  - provision
  lexicon: HALOT
  rationale: In this context of royal provision for Jehoiachin, the noun refers to
    an allotted provision or maintenance grant rather than a generic 'meal.' 'Allowance'
    fits the administrative sense and reads naturally in English while preserving
    the idea of an assigned provision.
- source_word: תָּמִיד
  chosen: continual
  alternatives:
  - regular
  - continually
  lexicon: HALOT
  rationale: The word marks ongoing regularity. 'Continual' works attributively with
    the repeated noun ('a continual allowance') and preserves the Hebrew emphasis
    on sustained provision.
- source_word: נִתְּנָה
  chosen: was given
  alternatives:
  - was provided
  - was granted
  lexicon: HALOT
  rationale: Passive 'was given' closely reflects the Niphal form of נתן and keeps
    the source-text wording without unnecessary paraphrase.
- source_word: מֵאֵת מֶלֶךְ בָּבֶל
  chosen: from the king of Babylon
  alternatives:
  - by the king of Babylon
  lexicon: HALOT
  rationale: מֵאֵת indicates source/origin. 'From the king of Babylon' preserves that
    sense more directly than the more agentive 'by the king of Babylon,' though both
    are possible in English.
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  chosen: a daily portion day by day
  alternatives:
  - the matter of a day in its day
  - the portion for each day on its day
  - day by day
  lexicon: HALOT
  rationale: This idiom denotes the appointed amount for each day. 'A daily portion
    day by day' preserves both the distributive sense and the Hebrew repetition, avoiding
    over-smoothing while remaining intelligible.
- source_word: עַד יוֹם מוֹתוֹ
  chosen: until the day of his death
  alternatives:
  - until his death
  lexicon: HALOT
  rationale: The fuller phrase mirrors the Hebrew construction and maintains the formal
    cadence of the verse.
- source_word: כֹּל יְמֵי חַיָּיו
  chosen: all the days of his life
  alternatives:
  - all his lifetime
  - throughout his life
  lexicon: HALOT
  rationale: This is a standard Hebrew idiom. 'All the days of his life' is the most
    transparent and formally faithful rendering.
