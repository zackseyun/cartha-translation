id: JER.52.19
reference: Jeremiah 52:19
source:
  edition: WLC
  text: וְ/אֶת הַ֠/סִּפִּים וְ/אֶת הַ/מַּחְתּ֨וֹת וְ/אֶת הַ/מִּזְרָק֜וֹת וְ/אֶת הַ/סִּיר֣וֹת
    וְ/אֶת הַ/מְּנֹר֗וֹת וְ/אֶת הַ/כַּפּוֹת֙ וְ/אֶת הַ/מְּנַקִי֔וֹת אֲשֶׁ֤ר זָהָב֙
    זָהָ֔ב וַ/אֲשֶׁר כֶּ֖סֶף כָּ֑סֶף לָקַ֖ח רַב טַבָּחִֽים־־־־־־־־־׃
translation:
  text: And the bowls, the firepans, the basins, the pots, the lampstands, the cups,
    and the vessels for pouring—whatever was of gold, gold, and whatever was of silver,
    silver—the captain of the guard took.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the cups' for 'the bowls' (הַסִּפִּים); the exact distinction among
      several temple vessel terms in this list is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'the censers' for 'the firepans.'
    reason: lexical_alternative
  - marker: c
    text: 'The Hebrew repeats ''gold, gold'' and ''silver, silver'' for emphasis:
      ''whatever was of gold, gold, and whatever was of silver, silver.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'the chief of the executioners' for 'the captain of the guard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסִּפִּים
  chosen: the bowls
  alternatives:
  - the cups
  - the basins
  lexicon: HALOT
  rationale: The noun likely denotes a temple vessel used as a bowl or cup. 'Bowls'
    fits cultic inventory style and distinguishes it from later כַּפּוֹת, rendered
    'cups.'
- source_word: הַמַּחְתּוֹת
  chosen: the firepans
  alternatives:
  - the censers
  lexicon: HALOT
  rationale: This term commonly refers to pans used for carrying coals/incense in
    sanctuary service. 'Firepans' is concrete and broadly accurate; 'censers' is possible
    but slightly more interpretive.
- source_word: הַמִּזְרָקוֹת
  chosen: the basins
  alternatives:
  - the sprinkling bowls
  lexicon: HALOT
  rationale: These are ritual vessels, often bowls used in sacrificial handling. 'Basins'
    is standard, readable English; the more specific function can be inferred from
    temple context.
- source_word: הַסִּירוֹת
  chosen: the pots
  alternatives:
  - the cooking pots
  lexicon: HALOT
  rationale: The word denotes pots or containers; 'pots' is the plain sense and avoids
    over-specifying their exact use.
- source_word: הַמְּנֹרוֹת
  chosen: the lampstands
  alternatives:
  - the lamps
  lexicon: HALOT
  rationale: מְנוֹרָה normally denotes a lampstand rather than merely a lamp. 'Lampstands'
    preserves the concrete cultic object.
- source_word: הַכַּפּוֹת
  chosen: the cups
  alternatives:
  - the bowls
  - the spoons
  lexicon: HALOT
  rationale: In temple inventories this can denote small vessels such as cups or spoons.
    'Cups' fits the vessel list and avoids confusion with the earlier bowl terms,
    while preserving a likely libation-related object.
- source_word: הַמְּנַקִיּוֹת
  chosen: the vessels for pouring
  alternatives:
  - the flagons
  - the libation vessels
  - the snuffers
  lexicon: HALOT
  rationale: The term is rare and contextually associated with temple utensils. 'Vessels
    for pouring' captures a likely functional sense without relying on archaic 'flagons.'
    'Snuffers' appears in some traditions but fits less well in this inventory context.
- source_word: אֲשֶׁר זָהָב זָהָב וַאֲשֶׁר כֶּסֶף כָּסֶף
  chosen: whatever was of gold, gold, and whatever was of silver, silver
  alternatives:
  - what was gold, in gold, and what was silver, in silver
  - everything made of gold and everything made of silver
  lexicon: HALOT
  rationale: The Hebrew repetition is emphatic and inventory-like. The translation
    preserves the repetition rather than smoothing it away, while still making sense
    in English.
- source_word: לָקַח
  chosen: took
  alternatives:
  - carried off
  lexicon: HALOT
  rationale: The verb simply means 'took.' In context it implies seizure/plunder,
    but 'took' preserves the lexical simplicity of the Hebrew.
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - the chief of the executioners
  - the commander of the bodyguard
  lexicon: HALOT
  rationale: This official title refers to Nebuzaradan's office. 'Captain of the guard'
    is established, readable English and fits the Babylonian military-administrative
    context better than the overly literal 'chief of the executioners.'
