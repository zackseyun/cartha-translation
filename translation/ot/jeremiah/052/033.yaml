id: JER.52.33
reference: Jeremiah 52:33
source:
  edition: WLC
  text: וְ/שִׁנָּ֕ה אֵ֖ת בִּגְדֵ֣י כִלְא֑/וֹ וְ/אָכַ֨ל לֶ֧חֶם לְ/פָנָ֛י/ו תָּמִ֖יד
    כָּל יְמֵ֥י חַיָּֽ/ו־׃
translation:
  text: And he changed out of his prison clothes and ate bread in his presence continually
    all the days of his life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'he changed the garments of his imprisonment.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'ate bread before him'; this likely refers to taking his meals
      in the king's presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁנָּה
  chosen: changed out of
  alternatives:
  - changed
  - changed his clothes
  lexicon: HALOT
  rationale: The verb שׁנה here means to change, with the object supplied by the following
    phrase 'the clothes of his imprisonment.' In English, 'changed out of' naturally
    conveys the idiom that he removed prison garments and put on different clothing.
- source_word: אֵת בִּגְדֵי כִלְאוֹ
  chosen: his prison clothes
  alternatives:
  - the garments of his imprisonment
  - his prison garments
  lexicon: HALOT
  rationale: בִּגְדֵי is 'garments/clothes' and כִלְאוֹ refers to his confinement/imprisonment.
    'Prison clothes' is a clear modern rendering that preserves the sense without
    unnecessary stiffness.
- source_word: וְאָכַל לֶחֶם
  chosen: ate bread
  alternatives:
  - ate food
  - dined
  lexicon: HALOT
  rationale: The Hebrew literally says 'ate bread,' a common idiom for taking a meal.
    Because the phrase is immediately followed by 'in his presence,' retaining 'ate
    bread' preserves the formal texture and table fellowship nuance better than the
    more interpretive 'dined' or generalized 'ate food.'
- source_word: לְפָנָיו
  chosen: in his presence
  alternatives:
  - before him
  - at his table
  lexicon: HALOT
  rationale: Literally 'before his face/before him.' 'In his presence' is idiomatic
    English and preserves the courtly sense. 'At his table' is possible by implication
    but is more interpretive than the Hebrew wording itself.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - regularly
  - always
  lexicon: HALOT
  rationale: תָּמִיד denotes ongoing regularity/continuance. 'Continually' fits the
    royal provision context and pairs naturally with 'all the days of his life.'
- source_word: כָּל יְמֵי חַיָּו
  chosen: all the days of his life
  alternatives:
  - for the rest of his life
  - all his lifetime
  lexicon: HALOT
  rationale: This is a standard Hebrew expression meaning the entirety of the remainder
    of his living days. 'All the days of his life' is both accurate and natural, preserving
    the Hebrew cadence.
