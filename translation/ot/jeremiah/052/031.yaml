id: JER.52.31
reference: Jeremiah 52:31
source:
  edition: WLC
  text: וַ/יְהִי֩ בִ/שְׁלֹשִׁ֨ים וָ/שֶׁ֜בַע שָׁנָ֗ה לְ/גָלוּת֙ יְהוֹיָכִ֣ן מֶֽלֶךְ
    יְהוּדָ֔ה בִּ/שְׁנֵ֤ים עָשָׂר֙ חֹ֔דֶשׁ בְּ/עֶשְׂרִ֥ים וַ/חֲמִשָּׁ֖ה לַ/חֹ֑דֶשׁ
    נָשָׂ֡א אֱוִ֣יל מְרֹדַךְ֩ מֶ֨לֶךְ בָּבֶ֜ל בִּ/שְׁנַ֣ת מַלְכֻת֗/וֹ אֶת רֹאשׁ֙ יְהוֹיָכִ֣ין
    מֶֽלֶךְ יְהוּדָ֔ה וַ/יֹּצֵ֥א אוֹת֖/וֹ מִ/בֵּ֥ית ה/כליא־־־׃
translation:
  text: And it happened in the thirty-seventh year of the exile of Jehoiachin king
    of Judah, in the twelfth month, on the twenty-fifth day of the month, that Evil-merodach
    king of Babylon, in the first year of his reign, lifted up the head of Jehoiachin
    king of Judah and brought him out from the prison.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'showed favor to Jehoiachin king of Judah'; literally,
      'lifted up the head of.'
    reason: lexical_alternative
  - marker: b
    text: Evil-merodach is also known historically as Amel-Marduk.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol introducing a new episode. 'And it happened' preserves
    the Hebrew discourse function without archaic English.
- source_word: לְגָלוּת
  chosen: of the exile
  alternatives:
  - of the captivity
  lexicon: HALOT
  rationale: The noun denotes the state/period of deportation. 'Exile' is the clearest
    modern English equivalent and fits the historical context.
- source_word: יְהוֹיָכִין
  chosen: Jehoiachin
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: בִּשְׁנֵים עָשָׂר חֹדֶשׁ
  chosen: in the twelfth month
  alternatives:
  - in month twelve
  lexicon: HALOT
  rationale: Idiomatic rendering of the Hebrew date formula.
- source_word: בְּעֶשְׂרִים וַחֲמִשָּׁה לַחֹדֶשׁ
  chosen: on the twenty-fifth day of the month
  alternatives:
  - on the twenty-fifth of the month
  lexicon: HALOT
  rationale: English date expression supplied with 'day' for naturalness; the sense
    is explicit in the Hebrew construction.
- source_word: אֱוִיל מְרֹדַךְ
  chosen: Evil-merodach
  alternatives:
  - Amel-Marduk
  rationale: Traditional English transliteration of the royal name matches common
    Bible usage. The historically Akkadian form 'Amel-Marduk' is possible but less
    familiar; preserved in a footnote.
- source_word: בִּשְׁנַת מַלְכֻתוֹ
  chosen: in the first year of his reign
  alternatives:
  - in the year of his becoming king
  lexicon: HALOT
  rationale: Context and comparison with the parallel in 2 Kings 25:27 indicate the
    accession year/first regnal year is intended. English requires the ordinal to
    make the sense explicit.
- source_word: נָשָׂא אֶת־רֹאשׁ
  chosen: lifted up the head of
  alternatives:
  - showed favor to
  - raised up
  lexicon: HALOT
  rationale: This is a Hebrew idiom for elevating someone's status or showing favor.
    The idiom is retained in the main text for transparency to the source, while the
    sense is preserved by the following action and clarified in a footnote.
- source_word: וַיֹּצֵא אֹתוֹ
  chosen: and brought him out
  alternatives:
  - and released him
  - and caused him to come out
  lexicon: HALOT
  rationale: The hiphil of יצא means 'cause to go out/bring out.' 'Brought him out'
    is a direct and natural rendering; 'released him' is interpretive and therefore
    left as an alternative sense.
- source_word: מִבֵּית הַכְּלִיא
  chosen: from the prison
  alternatives:
  - from the house of confinement
  - from the jail
  lexicon: HALOT
  rationale: The phrase literally means 'from the house of confinement/imprisonment.'
    'From the prison' is idiomatic modern English and accurately conveys the referent.
