id: JER.52.28
reference: Jeremiah 52:28
source:
  edition: WLC
  text: זֶ֣ה הָ/עָ֔ם אֲשֶׁ֥ר הֶגְלָ֖ה נְבֽוּכַדְרֶאצַּ֑ר בִּ/שְׁנַת שֶׁ֕בַע יְהוּדִ֕ים
    שְׁלֹ֥שֶׁת אֲלָפִ֖ים וְ/עֶשְׂרִ֥ים וּ/שְׁלֹשָֽׁה־׃
translation:
  text: 'These are the people whom Nebuchadnezzar carried away captive: in the seventh
    year, 3,023 Judeans.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'exiled' or 'deported' for 'carried away captive.'
    reason: lexical_alternative
  - marker: b
    text: '''Judeans'' emphasizes people from the kingdom/province of Judah; traditionally
      ''Jews.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה הָעָם
  chosen: These are the people
  alternatives:
  - This is the people
  - This is the population
  lexicon: HALOT
  rationale: Although singular in form ('this people'), the clause introduces a numerical
    list and is idiomatically rendered in English as a plural summary, 'These are
    the people.' This preserves the referential function while producing natural English.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative pronoun referring to persons; 'whom' is the most precise English
    equivalent in this formal list context.
- source_word: הֶגְלָה
  chosen: carried away captive
  alternatives:
  - exiled
  - deported
  lexicon: HALOT
  rationale: The Hiphil of גלה here denotes causing people to go into exile. 'Carried
    away captive' reflects the forced nature of the action and matches the historical
    context. 'Exiled' or 'deported' are possible, but this wording preserves the concrete
    sense of removal.
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  rationale: Standard English transliteration of the Babylonian king's name.
- source_word: בִּשְׁנַת שֶׁבַע
  chosen: in the seventh year
  alternatives:
  - in year seven
  lexicon: HALOT
  rationale: Construct phrase with cardinal used ordinally in context; standard English
    idiom is 'in the seventh year.'
- source_word: יְהוּדִים
  chosen: Judeans
  alternatives:
  - Jews
  - men of Judah
  lexicon: HALOT
  rationale: In this exilic-historical context, the term denotes people of Judah rather
    than the later, more religion-centered sense often conveyed by 'Jews.' 'Judeans'
    best preserves the geographic-ethnic reference.
- source_word: שְׁלֹשֶׁת אֲלָפִים וְעֶשְׂרִים וּשְׁלֹשָׁה
  chosen: 3,023
  alternatives:
  - three thousand twenty-three
  lexicon: HALOT
  rationale: 'The Hebrew number is straightforwardly additive: three thousand and
    twenty and three. Arabic numerals improve readability in a census-style notice
    without loss of meaning.'
