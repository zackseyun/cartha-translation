id: JER.52.10
reference: Jeremiah 52:10
source:
  edition: WLC
  text: וַ/יִּשְׁחַ֧ט מֶֽלֶךְ בָּבֶ֛ל אֶת בְּנֵ֥י צִדְקִיָּ֖הוּ לְ/עֵינָ֑י/ו וְ/גַ֛ם
    אֶת כָּל שָׂרֵ֥י יְהוּדָ֖ה שָׁחַ֥ט בְּ/רִבְלָֽתָ/ה־־־־׃
translation:
  text: Then the king of Babylon slaughtered the sons of Zedekiah before his eyes,
    and he also slaughtered all the officials of Judah at Riblah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the princes of Judah.' The Hebrew שָׂרֵי can denote high-ranking
      rulers, officials, or princes.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחַט
  chosen: Then ... slaughtered
  alternatives:
  - killed
  - butchered
  - slew
  lexicon: HALOT
  rationale: שׁחט commonly denotes slaughtering/killing, often with a violent or ritual
    nuance. Here it describes brutal execution, so 'slaughtered' preserves the severity
    better than the flatter 'killed.' 'Then' reflects the narrative waw-consecutive
    in smooth English narration.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: A straightforward construct relationship; the standard English rendering
    is clear and natural.
- source_word: בְּנֵי צִדְקִיָּהוּ
  chosen: the sons of Zedekiah
  alternatives:
  - Zedekiah's sons
  - the children of Zedekiah
  lexicon: HALOT
  rationale: בְּנֵי literally means 'sons of.' 'Children' would be less precise than
    the Hebrew.
- source_word: לְעֵינָיו
  chosen: before his eyes
  alternatives:
  - in his sight
  - before him
  lexicon: HALOT
  rationale: The idiom emphasizes that Zedekiah witnessed the execution. 'Before his
    eyes' is vivid, idiomatic, and close to the Hebrew.
- source_word: וְגַם
  chosen: and he also
  alternatives:
  - and also
  - also
  lexicon: HALOT
  rationale: וְגַם adds emphasis and continuation. Including 'also' preserves the
    additive force; repeating the subject with 'he' makes the English sentence read
    naturally.
- source_word: כָּל שָׂרֵי יְהוּדָה
  chosen: all the officials of Judah
  alternatives:
  - all the princes of Judah
  - all the leaders of Judah
  lexicon: HALOT
  rationale: שָׂרִים refers to rulers, officials, or princes. 'Officials' best communicates
    governing elites in accessible modern English without implying hereditary royalty
    as strongly as 'princes' might.
- source_word: שָׁחַט
  chosen: slaughtered
  alternatives:
  - killed
  - slew
  lexicon: HALOT
  rationale: Repeating 'slaughtered' preserves the lexical repetition of the Hebrew
    and the brutality of the act.
- source_word: בְּרִבְלָתָה
  chosen: at Riblah
  alternatives:
  - in Riblah
  lexicon: HALOT
  rationale: Riblah is a place name. 'At Riblah' is a natural locative rendering for
    the setting of the executions.
