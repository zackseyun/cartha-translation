id: JER.52.32
reference: Jeremiah 52:32
source:
  edition: WLC
  text: וַ/יְדַבֵּ֥ר אִתּ֖/וֹ טֹב֑וֹת וַ/יִּתֵּן֙ אֶת כִּסְא֔/וֹ מִ/מַּ֗עַל לְ/כִסֵּ֧א
    מלכים אֲשֶׁ֥ר אִתּ֖/וֹ בְּ/בָבֶֽל־׃
translation:
  text: He spoke kindly to him and set his throne above the thrones of the kings who
    were with him in Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spoke good things to him,' that is, 'spoke favorably/kindly to him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר אִתּוֹ
  chosen: He spoke to him
  alternatives:
  - He said to him
  lexicon: HALOT
  rationale: דבר with אֵת commonly means 'speak to/with.' 'Spoke to him' is the most
    natural English rendering here.
- source_word: טֹבוֹת
  chosen: kindly
  alternatives:
  - good things
  - favorable words
  lexicon: HALOT
  rationale: The feminine plural adjective used adverbially after דבר conveys speaking
    in a favorable or kind manner. English idiom prefers the adverb 'kindly' rather
    than the more wooden 'good things.'
- source_word: וַיִּתֵּן אֶת כִּסְאוֹ
  chosen: set his throne
  alternatives:
  - gave him a throne
  - placed his seat
  lexicon: HALOT
  rationale: נתן plus 'his throne' in this courtly context refers to assigning or
    positioning the royal seat/status. 'Set his throne' preserves the concrete image
    better than a purely abstract rendering.
- source_word: כִּסְאוֹ
  chosen: his throne
  alternatives:
  - his seat
  lexicon: HALOT
  rationale: כִּסֵּא can mean 'seat' or 'throne.' Because the context concerns kings
    and rank, 'throne' best preserves the royal nuance.
- source_word: מִמַּעַל לְכִסֵּא מְלָכִים
  chosen: above the thrones of the kings
  alternatives:
  - higher than the seats of the kings
  - above the seat of the kings
  lexicon: HALOT
  rationale: The phrase expresses elevation in rank or placement over other royal
    seats. Rendering the plural sense with 'the thrones of the kings' fits the comparison
    and the surrounding royal context.
- source_word: אֲשֶׁר אִתּוֹ בְּבָבֶל
  chosen: who were with him in Babylon
  alternatives:
  - who were with him at Babylon
  lexicon: HALOT
  rationale: The relative clause identifies the other kings present with the Babylonian
    ruler in Babylon. 'In Babylon' is standard modern English.
