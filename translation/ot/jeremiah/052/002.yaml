id: JER.52.2
reference: Jeremiah 52:2
source:
  edition: WLC
  text: וַ/יַּ֥עַשׂ הָ/רַ֖ע בְּ/עֵינֵ֣י יְהוָ֑ה כְּ/כֹ֥ל אֲשֶׁר עָשָׂ֖ה יְהוֹיָקִֽים־׃
translation:
  text: And he did what was evil in the eyes of the LORD, according to all that Jehoiakim
    had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in the eyes of the LORD,'' a standard idiom meaning ''in the
      LORD''s sight.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: And he did
  alternatives:
  - He did
  - Then he did
  lexicon: HALOT
  rationale: Wayyiqtol of עשה advances the narrative. 'And he did' preserves the sequential/narrative
    force without overtranslating.
- source_word: הָרַע
  chosen: what was evil
  alternatives:
  - the evil
  - evil
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression עשה הרע is best rendered in English as 'did
    what was evil' rather than the more wooden 'did the evil.'
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: This is a standard Hebrew evaluative idiom. 'In the eyes of' is transparent
    and natural, preserving the metaphor.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name יְהוָה is rendered 'the LORD' to follow
    established reverential convention and the LXX pattern.
- source_word: כְּכֹל
  chosen: according to all that
  alternatives:
  - just as all that
  - like everything that
  lexicon: HALOT
  rationale: כְּכֹל introduces comparison/conformity. 'According to all that' captures
    the sense that his conduct matched the full pattern of Jehoiakim's actions.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  - what
  lexicon: HALOT
  rationale: Relative particle linking the comparison clause; 'that' is the most natural
    English connector here.
- source_word: עָשָׂה
  chosen: had done
  alternatives:
  - did
  lexicon: HALOT
  rationale: English past perfect clarifies that Jehoiakim's actions preceded the
    present subject's conduct, though Hebrew perfect itself does not explicitly mark
    pluperfect.
- source_word: יְהוֹיָקִים
  chosen: Jehoiakim
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention per
    translation philosophy.
