id: JER.52.6
reference: Jeremiah 52:6
source:
  edition: WLC
  text: בַּ/חֹ֤דֶשׁ הָֽ/רְבִיעִי֙ בְּ/תִשְׁעָ֣ה לַ/חֹ֔דֶשׁ וַ/יֶּחֱזַ֥ק הָ/רָעָ֖ב
    בָּ/עִ֑יר וְ/לֹא הָיָ֥ה לֶ֖חֶם לְ/עַ֥ם הָ/אָֽרֶץ־׃
translation:
  text: In the fourth month, on the ninth day of the month, the famine became severe
    in the city, and there was no bread for the people of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the common people.' The Hebrew phrase 'people of the land' can,
      in some contexts, refer more specifically to the populace or common people.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּחֹדֶשׁ הָרְבִיעִי
  chosen: In the fourth month
  alternatives:
  - In the fourth month of the year
  lexicon: HALOT
  rationale: The Hebrew gives a temporal phrase with the definite ordinal, naturally
    rendered as a date marker. 'Of the year' is not explicit and is therefore omitted.
- source_word: בְּתִשְׁעָה לַחֹדֶשׁ
  chosen: on the ninth day of the month
  alternatives:
  - on the ninth of the month
  lexicon: HALOT
  rationale: This is the standard Hebrew dating formula. Supplying 'day' makes the
    English idiomatic while preserving the sense.
- source_word: וַיֶּחֱזַק
  chosen: became severe
  alternatives:
  - grew strong
  - prevailed
  - intensified
  lexicon: HALOT
  rationale: The verb חזק literally means 'be strong/strengthen,' but with 'the famine'
    as subject it idiomatically means that the famine intensified. 'Became severe'
    is clear modern English and fits optimal equivalence.
- source_word: הָרָעָב
  chosen: the famine
  alternatives:
  - the hunger
  lexicon: HALOT
  rationale: In this siege context, רָעָב refers to famine rather than mere hunger.
- source_word: בָּעִיר
  chosen: in the city
  alternatives:
  - within the city
  lexicon: HALOT
  rationale: Simple locative sense; 'the city' refers contextually to Jerusalem without
    needing to restate the name in this verse.
- source_word: וְלֹא הָיָה לֶחֶם
  chosen: and there was no bread
  alternatives:
  - and there was no food
  lexicon: HALOT
  rationale: לֶחֶם is literally 'bread.' While it can sometimes stand more broadly
    for food, the literal rendering is preferable here and communicates the scarcity
    vividly.
- source_word: לְעַם הָאָרֶץ
  chosen: for the people of the land
  alternatives:
  - for the common people
  - for the people of the הארץ
  lexicon: HALOT
  rationale: The phrase literally means 'the people of the land.' In some contexts
    it can denote common people or landed populace, but here the literal rendering
    best preserves the Hebrew wording without over-interpreting the social nuance.
