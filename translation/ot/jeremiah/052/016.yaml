id: JER.52.16
reference: Jeremiah 52:16
source:
  edition: WLC
  text: וּ/מִ/דַּלּ֣וֹת הָ/אָ֔רֶץ הִשְׁאִ֕יר נְבוּזַרְאֲדָ֖ן רַב טַבָּחִ֑ים לְ/כֹרְמִ֖ים
    וּ/לְ/יֹגְבִֽים־׃
translation:
  text: But some of the poorest of the land Nebuzaradan, the captain of the guard,
    left as vinedressers and plowmen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the chief of the executioners'; the Hebrew title is literally 'chief
      of the slaughterers/butchers,' likely an official court or military title.
    reason: lexical_alternative
  - marker: b
    text: Or 'farmers' or 'field workers' for 'plowmen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/דַּלּוֹת
  chosen: But some of the poorest
  alternatives:
  - And from the poor
  - But from the poor people
  - Yet some of the poor
  lexicon: HALOT
  rationale: The construction וּמִדַּלּוֹת literally means 'and/from the poor (fem.
    pl.) of.' In idiomatic English, 'some of the poorest' best captures the partitive
    sense of מן with a plural noun in context. 'But' reflects the contrast with the
    preceding deportation/destruction context.
- source_word: הָ/אָרֶץ
  chosen: of the land
  alternatives:
  - of the הארץ/land
  - of the country
  lexicon: HALOT
  rationale: אָרֶץ here refers to the land/country of Judah rather than the earth
    in general. 'Land' is the most natural and contextually precise rendering.
- source_word: הִשְׁאִיר
  chosen: left
  alternatives:
  - allowed to remain
  - spared and left behind
  lexicon: HALOT
  rationale: The Hiphil of שׁאר means 'to leave, leave remaining.' 'Left' is concise
    and fits the deportation context without overinterpreting motive.
- source_word: נְבוּזַרְאֲדָן
  chosen: Nebuzaradan
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - the chief of the executioners
  - the chief butcher
  lexicon: HALOT
  rationale: Although literally 'chief of the slaughterers/butchers,' this is an established
    Babylonian official title. 'Captain of the guard' communicates the office in readable
    English without wooden literalism. The more literal alternatives are possible
    but less idiomatic and may mislead modern readers.
- source_word: לְכֹרְמִים
  chosen: as vinedressers
  alternatives:
  - for vineyard workers
  - as vine-growers
  lexicon: HALOT
  rationale: The prefixed ל marks assigned function/purpose. כֹּרְמִים are those who
    work vineyards; 'vinedressers' is a standard concise rendering.
- source_word: וּלְיֹגְבִים
  chosen: and plowmen
  alternatives:
  - and farmers
  - and field workers
  - and tillers of the soil
  lexicon: HALOT
  rationale: From יגב/related agricultural usage, the term denotes those who work
    the soil, especially plowing or field labor. 'Plowmen' preserves the agrarian
    specificity better than the broader 'farmers.'
