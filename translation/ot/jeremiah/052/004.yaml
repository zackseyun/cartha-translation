id: JER.52.4
reference: Jeremiah 52:4
source:
  edition: WLC
  text: וַ/יְהִי֩ בַ/שָּׁנָ֨ה הַ/תְּשִׁעִ֜ית לְ/מָלְכ֗/וֹ בַּ/חֹ֣דֶשׁ הָ/עֲשִׂירִי֮
    בֶּ/עָשׂ֣וֹר לַ/חֹדֶשׁ֒ בָּ֠א נְבוּכַדְרֶאצַּ֨ר מֶֽלֶךְ בָּבֶ֜ל ה֤וּא וְ/כָל חֵיל/וֹ֙
    עַל יְר֣וּשָׁלִַ֔ם וַֽ/יַּחֲנ֖וּ עָלֶ֑י/הָ וַ/יִּבְנ֥וּ עָלֶ֛י/הָ דָּיֵ֖ק סָבִֽיב־־־׃
translation:
  text: And in the ninth year of his reign, in the tenth month, on the tenth day of
    the month, Nebuchadnezzar king of Babylon came—he and all his army—against Jerusalem,
    and they encamped against it and built a siege wall around it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew דָּיֵק can also be rendered 'siegeworks' or 'rampart.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew spelling of the king's name here corresponds more closely to
      'Nebuchadrezzar'; English tradition commonly uses 'Nebuchadnezzar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... it happened / And in
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the narrative event. In English,
    a full 'it happened' is often wooden here, so the temporal clause is carried naturally
    by 'And in the...' while preserving the narrative progression.
- source_word: בַשָּׁנָה הַתְּשִׁעִית לְמָלְכוֹ
  chosen: in the ninth year of his reign
  alternatives:
  - in the ninth year of his kingship
  lexicon: HALOT
  rationale: Standard regnal-year formula. 'His reign' is idiomatic modern English
    and accurately reflects the infinitive/verb-based royal formula.
- source_word: בַחֹדֶשׁ הָעֲשִׂירִי
  chosen: in the tenth month
  lexicon: HALOT
  rationale: Straightforward calendrical expression; 'month' is retained rather than
    converting to a named month not present in the Hebrew.
- source_word: בֶּעָשׂוֹר לַחֹדֶשׁ
  chosen: on the tenth day of the month
  alternatives:
  - on the tenth of the month
  lexicon: HALOT
  rationale: The idiom literally means 'on the tenth of the month.' Expanding to 'tenth
    day' makes the sense explicit in natural English without adding content.
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  - advanced
  lexicon: HALOT
  rationale: The basic verb 'came' fits the military movement context and preserves
    the simple narrative force of the Hebrew.
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: A standard English transliteration of the royal name. Although the Hebrew
    spelling here more closely supports 'Nebuchadrezzar,' 'Nebuchadnezzar' is the
    conventional English form and remains a recognizable transliteration rather than
    a translation.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: Direct title-genitive construction.
- source_word: הוּא וְכָל חֵילוֹ
  chosen: he and all his army
  alternatives:
  - he and all his forces
  lexicon: HALOT
  rationale: חַיִל in this context denotes military force. 'Army' is the clearest
    singular collective in English. The pronoun הוּא is retained for emphasis by the
    dash-set apposition.
- source_word: עַל יְרוּשָׁלַםִ
  chosen: against Jerusalem
  alternatives:
  - to Jerusalem
  - upon Jerusalem
  lexicon: HALOT
  rationale: With military movement and siege context, עַל is best rendered 'against'
    rather than the more neutral 'to' or overly literal 'upon.'
- source_word: וַיַּחֲנוּ עָלֶיהָ
  chosen: they encamped against it
  alternatives:
  - they camped against it
  - they laid camp against it
  lexicon: HALOT
  rationale: The plural verb refers to Nebuchadnezzar and his army collectively. 'Encamped'
    is slightly more formal and suits military narrative. 'Against it' reflects hostile
    posture signaled by עַל.
- source_word: וַיִּבְנוּ עָלֶיהָ דָּיֵק
  chosen: built a siege wall against it / around it
  alternatives:
  - built siegeworks against it
  - built a rampart against it
  lexicon: HALOT
  rationale: דָּיֵק refers to siegeworks, often a siege wall or rampart. 'Siege wall'
    gives a concrete, readable rendering. Because the phrase concludes with סָבִיב,
    English naturally expresses the total sense as 'built a siege wall around it.'
- source_word: סָבִיב
  chosen: around it
  alternatives:
  - all around
  - round about
  lexicon: HALOT
  rationale: This adverb marks encirclement. 'Around it' is natural modern English
    and preserves the siege imagery.
