id: JER.52.12
reference: Jeremiah 52:12
source:
  edition: WLC
  text: וּ/בַ/חֹ֤דֶשׁ הַֽ/חֲמִישִׁי֙ בֶּ/עָשׂ֣וֹר לַ/חֹ֔דֶשׁ הִ֗יא שְׁנַת֙ תְּשַֽׁע
    עֶשְׂרֵ֣ה שָׁנָ֔ה לַ/מֶּ֖לֶךְ נְבוּכַדְרֶאצַּ֣ר מֶֽלֶךְ בָּבֶ֑ל בָּ֗א נְבֽוּזַרְאֲדָן֙
    רַב טַבָּחִ֔ים עָמַ֛ד לִ/פְנֵ֥י מֶֽלֶךְ בָּבֶ֖ל בִּ/ירוּשָׁלִָֽם־־־־׃
translation:
  text: Now in the fifth month, on the tenth day of the month—which was the nineteenth
    year of King Nebuchadnezzar, king of Babylon—Nebuzaradan the captain of the guard,
    who stood before the king of Babylon, came to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'chief of the executioners' or 'chief butcher'; the title
      likely refers to a high royal official over the guard.
    reason: lexical_alternative
  - marker: b
    text: '''Stood before the king of Babylon'' is a court expression for serving
      in the king’s presence.'
    reason: cultural_note
  - marker: c
    text: Hebrew has 'in Jerusalem'; English idiom with 'came' normally uses 'to Jerusalem.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/חֹדֶשׁ הַ/חֲמִישִׁי
  chosen: Now in the fifth month
  alternatives:
  - And in the fifth month
  - In the fifth month
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally yields 'and/in the
    fifth month.' English narrative style can naturally render this as 'Now in the
    fifth month' to mark continuation while remaining close to the Hebrew.
- source_word: בֶּעָשׂוֹר לַחֹדֶשׁ
  chosen: on the tenth day of the month
  alternatives:
  - on the tenth of the month
  lexicon: HALOT
  rationale: The idiom 'on the tenth of the month' is made slightly more explicit
    in English with 'day' for clarity, without adding meaning beyond the Hebrew date
    formula.
- source_word: הִיא שְׁנַת תְּשַׁע עֶשְׂרֵה שָׁנָה
  chosen: which was the nineteenth year
  alternatives:
  - it was the nineteenth year
  lexicon: HALOT
  rationale: The feminine pronoun הִיא resumes the date expression ('it/which was').
    In English, embedding it as a parenthetical relative clause is smoother and preserves
    the explanatory force.
- source_word: לַמֶּלֶךְ נְבוּכַדְרֶאצַּר
  chosen: of King Nebuchadnezzar
  alternatives:
  - for King Nebuchadnezzar
  - belonging to King Nebuchadnezzar
  lexicon: HALOT
  rationale: 'The lamed here marks regnal dating: the year is reckoned to the king.
    English idiom expresses this as ''the nineteenth year of King Nebuchadnezzar.'''
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: Standard construct rendering; retained both after Nebuchadnezzar and
    later after 'the king' because both are explicit in Hebrew.
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  lexicon: HALOT
  rationale: Simple narrative verb of motion; 'came' is the most direct equivalent.
- source_word: נְבֻזַרְאֲדָן
  chosen: Nebuzaradan
  rationale: Personal name is transliterated per project philosophy.
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - chief of the executioners
  - chief butcher
  lexicon: HALOT
  rationale: The title literally involves 'chief of the slaughterers/butchers,' but
    in Neo-Babylonian court context it denotes an official over the royal guard/executioners.
    'Captain of the guard' is the clearest idiomatic rendering in English, while the
    more literal alternatives are preserved in a footnote because they reflect the
    lexical base.
- source_word: עָמַד לִפְנֵי מֶלֶךְ בָּבֶל
  chosen: who stood before the king of Babylon
  alternatives:
  - who served the king of Babylon
  - an attendant of the king of Babylon
  lexicon: HALOT
  rationale: Literally 'stood before' often denotes official service in a royal court.
    I retained the more formal literal wording in the main text because it is intelligible
    in English and preserves the courtly nuance; a more interpretive alternative is
    footnoted.
- source_word: בִּירוּשָׁלִָם
  chosen: to Jerusalem
  alternatives:
  - in Jerusalem
  lexicon: HALOT
  rationale: Although the form is prefixed with beth ('in Jerusalem'), with the motion
    verb 'came' English idiom normally uses 'to Jerusalem.' This is a context-driven
    adjustment for natural English.
