id: JER.52.30
reference: Jeremiah 52:30
source:
  edition: WLC
  text: בִּ/שְׁנַ֨ת שָׁלֹ֣שׁ וְ/עֶשְׂרִים֮ לִ/נְבֽוּכַדְרֶאצַּר֒ הֶגְלָ֗ה נְבֽוּזַרְאֲדָן֙
    רַב טַבָּחִ֔ים יְהוּדִ֕ים נֶ֕פֶשׁ שְׁבַ֥ע מֵא֖וֹת אַרְבָּעִ֣ים וַ/חֲמִשָּׁ֑ה כָּל
    נֶ֕פֶשׁ אַרְבַּ֥עַת אֲלָפִ֖ים וְ/שֵׁ֥שׁ מֵאֽוֹת־־׃פ
translation:
  text: In the twenty-third year of Nebuchadnezzar, Nebuzaradan the captain of the
    guard carried away 745 Judeans. All the persons were 4,600.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “took into exile” or “deported.” The Hebrew verb means to cause to go
      into exile.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “souls” (נֶפֶשׁ) in both counts; here it is an idiom for persons.
    reason: lexical_alternative
  - marker: c
    text: The total of 4,600 summarizes the deportees listed in verses 28–30.
    reason: cross_reference
lexical_decisions:
- source_word: בִּשְׁנַת שָׁלֹשׁ וְעֶשְׂרִים
  chosen: In the twenty-third year
  alternatives:
  - In year twenty-three
  - In the third and twentieth year
  lexicon: HALOT
  rationale: Standard English ordinal rendering of the Hebrew date formula; preserves
    temporal sense without woodenly reproducing Hebrew number order.
- source_word: לִנְבוּכַדְרֶאצַּר
  chosen: of Nebuchadnezzar
  alternatives:
  - belonging to Nebuchadnezzar
  lexicon: HALOT
  rationale: 'The preposition marks regnal reckoning: the year is counted with reference
    to Nebuchadnezzar''s reign.'
- source_word: הֶגְלָה
  chosen: carried away
  alternatives:
  - took into exile
  - deported
  lexicon: HALOT
  rationale: The Hiphil of גלה here denotes causing people to go into exile. 'Carried
    away' is idiomatic and fits the historical register; 'deported' is possible but
    more bureaucratic in tone.
- source_word: נְבוּזַרְאֲדָן
  chosen: Nebuzaradan
  rationale: Personal name is transliterated per translation policy.
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - the chief of the executioners
  - the chief butcher
  lexicon: HALOT
  rationale: This established idiomatic rendering best fits the Babylonian official
    title in context. The literal sense involves 'chief of the slaughterers/executioners,'
    but in these narratives it denotes an official court/military post, commonly rendered
    'captain of the guard.'
- source_word: יְהוּדִים
  chosen: Judeans
  alternatives:
  - Jews
  - men of Judah
  lexicon: HALOT
  rationale: In this exilic historical context, the term refers ethnogeographically
    to people of Judah rather than primarily to later religious identity. 'Judeans'
    preserves that nuance better than 'Jews.'
- source_word: נֶפֶשׁ
  chosen: persons
  alternatives:
  - souls
  - people
  lexicon: HALOT
  rationale: In census-like enumeration, נֶפֶשׁ functions as a counting term for persons.
    'Persons' is clear modern English and avoids misleading metaphysical overtones
    of 'souls' in this context.
- source_word: שְׁבַע מֵאוֹת אַרְבָּעִים וַחֲמִשָּׁה
  chosen: '745'
  alternatives:
  - seven hundred forty-five
  rationale: Arabic numerals improve readability while preserving the exact total.
- source_word: כָּל נֶפֶשׁ
  chosen: All the persons
  alternatives:
  - The total number of persons
  - All the people
  lexicon: HALOT
  rationale: Summative formula concluding the deportation totals from the preceding
    verses. 'All the persons' closely reflects the Hebrew while remaining natural
    English.
- source_word: אַרְבַּעַת אֲלָפִים וְשֵׁשׁ מֵאוֹת
  chosen: 4,600
  alternatives:
  - four thousand six hundred
  rationale: Arabic numerals improve readability and preserve the exact figure.
