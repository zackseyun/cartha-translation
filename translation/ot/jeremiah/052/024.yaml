id: JER.52.24
reference: Jeremiah 52:24
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח רַב טַבָּחִ֗ים אֶת שְׂרָיָה֙ כֹּהֵ֣ן הָ/רֹ֔אשׁ וְ/אֶת צְפַנְיָ֖ה
    כֹּהֵ֣ן הַ/מִּשְׁנֶ֑ה וְ/אֶת שְׁלֹ֖שֶׁת שֹׁמְרֵ֥י הַ/סַּֽף־־־־׃
translation:
  text: And the captain of the guard took Seraiah the chief priest, and Zephaniah
    the second priest, and the three keepers of the threshold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the high priest.' The Hebrew title is literally 'the chief/head priest.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the deputy priest' for 'the second priest.'
    reason: lexical_alternative
  - marker: c
    text: Or 'doorkeepers' for 'keepers of the threshold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב טַבָּחִים
  chosen: captain of the guard
  alternatives:
  - chief of the executioners
  - captain of the bodyguard
  lexicon: HALOT
  rationale: The construct phrase literally involves 'chief' + 'slaughterers/butchers,'
    but in Neo-Babylonian royal context it denotes the official commanding the royal
    guard. 'Captain of the guard' is established and contextually accurate English
    without over-literalizing the idiom.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - seized
  lexicon: HALOT
  rationale: The verb לקח normally means 'take.' In this narrative context it refers
    to taking persons into custody, but 'took' is sufficient and leaves the narrative
    force intact without adding interpretive color.
- source_word: שְׂרָיָה
  chosen: Seraiah
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: כֹּהֵן הָרֹאשׁ
  chosen: the chief priest
  alternatives:
  - the high priest
  - the head priest
  lexicon: HALOT
  rationale: Literally 'the priest, the head/chief.' 'Chief priest' closely reflects
    the Hebrew title. 'High priest' is possible and common in parallels, but this
    verse uses ראשׁ rather than a distinct technical term; 'chief priest' preserves
    the wording more transparently.
- source_word: צְפַנְיָה
  chosen: Zephaniah
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: כֹּהֵן הַמִּשְׁנֶה
  chosen: the second priest
  alternatives:
  - the deputy priest
  - the second-ranking priest
  lexicon: HALOT
  rationale: The noun משנה denotes second rank or deputy status. 'Second priest' is
    a natural, fairly literal rendering that preserves the official hierarchy without
    over-expanding the title.
- source_word: שְׁלֹשֶׁת
  chosen: the three
  alternatives:
  - three
  lexicon: HALOT
  rationale: The construct form with the following participle-noun phrase is best
    rendered simply as 'the three' in English before the role designation.
- source_word: שֹׁמְרֵי הַסַּף
  chosen: keepers of the threshold
  alternatives:
  - doorkeepers
  - guards of the entrance
  lexicon: HALOT
  rationale: Literally 'keepers/guards of the threshold.' This likely refers to temple
    gatekeepers or threshold guards. 'Keepers of the threshold' preserves the concrete
    Hebrew image and official function better than the more interpretive 'doorkeepers'.
