id: JER.52.17
reference: Jeremiah 52:17
source:
  edition: WLC
  text: וְ/אֶת עַמּוּדֵ֨י הַ/נְּחֹ֜שֶׁת אֲשֶׁ֣ר לְ/בֵית יְהוָ֗ה וְֽ/אֶת הַ/מְּכֹנ֞וֹת
    וְ/אֶת יָ֧ם הַ/נְּחֹ֛שֶׁת אֲשֶׁ֥ר בְּ/בֵית יְהוָ֖ה שִׁבְּר֣וּ כַשְׂדִּ֑ים וַ/יִּשְׂא֥וּ
    אֶת כָּל נְחֻשְׁתָּ֖/ם בָּבֶֽלָ/ה־־־־־־־׃
translation:
  text: And the Chaldeans broke in pieces the bronze pillars that belonged to the
    house of the LORD, along with the stands and the bronze Sea that were in the house
    of the LORD, and carried all their bronze to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the bases' for 'the stands' (Hebrew מְכֹנוֹת), referring to the temple
      supports described elsewhere.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Chaldeans'; that is, the Babylonian forces.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמּוּדֵי הַנְּחֹשֶׁת
  chosen: the bronze pillars
  alternatives:
  - the pillars of bronze
  - the copper pillars
  lexicon: HALOT
  rationale: עַמּוּדֵי is 'pillars/columns' in construct with הַנְּחֹשֶׁת. 'Bronze'
    is the standard contextual rendering for נְחֹשֶׁת in temple-furnishing contexts,
    though 'copper' is a possible broader material gloss.
- source_word: אֲשֶׁר לְבֵית יְהוָה
  chosen: that belonged to the house of the LORD
  alternatives:
  - that were for the house of the LORD
  - which were in the house of the LORD
  lexicon: HALOT
  rationale: The lamed on בֵית here is best taken as relation/possession ('belonging
    to, pertaining to') rather than strict location, especially since the Sea is later
    described with בְּבֵית יְהוָה ('in the house of the LORD'). This preserves the
    distinction in the Hebrew.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: הַמְּכֹנוֹת
  chosen: the stands
  alternatives:
  - the bases
  lexicon: HALOT
  rationale: מְכֹנוֹת refers to the wheeled stands/bases associated with temple furnishings
    (cf. 1 Kgs 7). 'Stands' is clearer in modern English while remaining concrete;
    'bases' is possible but less immediately intelligible.
- source_word: יָם הַנְּחֹשֶׁת
  chosen: the bronze Sea
  alternatives:
  - the Bronze Sea
  - the sea of bronze
  lexicon: HALOT
  rationale: This is the established designation for the large temple basin. Lowercase
    'bronze' treats the material descriptively; capitalizing 'Sea' preserves its function
    as a recognized object name.
- source_word: אֲשֶׁר בְּבֵית יְהוָה
  chosen: that were in the house of the LORD
  alternatives:
  - which was in the house of the LORD
  lexicon: HALOT
  rationale: Although the relative clause immediately follows 'the bronze Sea,' the
    clause naturally covers the listed temple items as a group in this compressed
    inventory style. English plural 'were' smooths the coordination of pillars, stands,
    and Sea. A more strictly singular rendering is possible but less natural in context.
- source_word: שִׁבְּרוּ
  chosen: broke in pieces
  alternatives:
  - broke up
  - shattered
  lexicon: HALOT
  rationale: The verb שׁבר here conveys breaking up the large bronze objects so the
    metal could be transported. 'Broke in pieces' captures the practical sense better
    than the simpler 'broke.'
- source_word: כַשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew specifically says 'Chaldeans.' While 'Babylonians' would be
    dynamically clear, retaining 'Chaldeans' preserves the source wording and historical
    texture.
- source_word: וַיִּשְׂאוּ
  chosen: carried
  alternatives:
  - bore
  - took away
  lexicon: HALOT
  rationale: נשא in this context means to lift/carry off. 'Carried' is natural modern
    English and fits the transport of plunder.
- source_word: כָּל נְחֻשְׁתָּם
  chosen: all their bronze
  alternatives:
  - all the bronze from them
  - all of their bronze
  lexicon: HALOT
  rationale: The suffix refers back to the listed objects; the sense is that all the
    bronze belonging to those items was taken. 'All their bronze' is concise and faithful.
- source_word: בָּבֶלָה
  chosen: to Babylon
  alternatives:
  - toward Babylon
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Babylon; idiomatic English
    is simply 'to Babylon.'
