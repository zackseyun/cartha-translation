theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name, but doctrine specifies the default
    English rendering 'the LORD' in continuity with Jewish reverence tradition and
    the Septuagintal pattern.
