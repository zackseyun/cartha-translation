id: JER.52.20
reference: Jeremiah 52:20
source:
  edition: WLC
  text: הָ/עַמּוּדִ֣ים שְׁנַ֗יִם הַ/יָּ֤ם אֶחָד֙ וְ/הַ/בָּקָ֞ר שְׁנֵים עָשָׂ֤ר נְחֹ֨שֶׁת֙
    אֲשֶׁר תַּ֣חַת הַ/מְּכֹנ֔וֹת אֲשֶׁ֥ר עָשָׂ֛ה הַ/מֶּ֥לֶךְ שְׁלֹמֹ֖ה לְ/בֵ֣ית יְהוָ֑ה
    לֹא הָיָ֣ה מִשְׁקָ֔ל לִ/נְחֻשְׁתָּ֖/ם כָּל הַ/כֵּלִ֥ים הָ/אֵֽלֶּה׀־־־־׃
translation:
  text: As for the two pillars, the one Sea, and the twelve bronze oxen that were
    under the stands, which King Solomon had made for the house of the LORD—there
    was no weighing the bronze of all these vessels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the twelve oxen of bronze'; 'bulls' is also possible for the animal
      term here.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'there was no weight for their bronze,' that is, the bronze of all
      these vessels was not weighed or was beyond reckoning.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעַמּוּדִים שְׁנַיִם
  chosen: the two pillars
  alternatives:
  - the two columns
  lexicon: HALOT
  rationale: עַמּוּדִים denotes structural pillars/columns. 'Pillars' is the more
    conventional temple-furnishing term in English and fits the cultic context.
- source_word: הַיָּם אֶחָד
  chosen: the one Sea
  alternatives:
  - the one basin called the Sea
  - the Sea, one
  lexicon: HALOT
  rationale: יָּם here is the technical name of the large temple basin, not the common
    noun 'sea' in a generic sense. Capitalizing 'Sea' preserves its status as a named
    temple object while retaining the Hebrew wording. 'One' is kept to reflect the
    inventory style.
- source_word: וְהַבָּקָר שְׁנֵים עָשָׂר נְחֹשֶׁת
  chosen: and the twelve bronze oxen
  alternatives:
  - and the twelve oxen of bronze
  - and the twelve bronze bulls
  lexicon: HALOT
  rationale: בָּקָר can denote cattle/oxen; in this temple-furnishing context, 'oxen'
    is the standard and most natural rendering for the supporting figures. נְחֹשֶׁת
    is rendered 'bronze' rather than 'brass' in line with modern archaeological and
    translation usage.
- source_word: אֲשֶׁר תַּחַת הַמְּכֹנוֹת
  chosen: that were under the stands
  alternatives:
  - that were beneath the stands
  - that were under the bases
  lexicon: HALOT
  rationale: מְכֹנוֹת refers to the wheeled stands/bases associated with temple vessels.
    'Stands' is readable modern English; 'bases' is possible but less specific in
    contemporary usage.
- source_word: אֲשֶׁר עָשָׂה הַמֶּלֶךְ שְׁלֹמֹה
  chosen: which King Solomon had made
  alternatives:
  - which King Solomon made
  lexicon: HALOT
  rationale: The relative clause identifies these objects as Solomon's workmanship.
    English past perfect ('had made') smoothly situates the action prior to the Babylonian
    seizure being described.
- source_word: לְבֵית יְהוָה
  chosen: for the house of the LORD
  alternatives:
  - for the temple of the LORD
  - for the house of Yahweh
  lexicon: HALOT
  rationale: בֵית יְהוָה is literally 'house of YHWH.' 'House of the LORD' preserves
    the Hebrew idiom. Per doctrine, יְהוָה is rendered 'the LORD,' with 'Yahweh' not
    used in the main text.
- source_word: לֹא הָיָה מִשְׁקָל
  chosen: there was no weighing
  alternatives:
  - there was no weight
  - the weight could not be determined
  - it was not weighed
  lexicon: HALOT
  rationale: The Hebrew says literally 'there was no weight,' idiomatically indicating
    that the bronze was not weighed or was beyond reckoning. 'There was no weighing'
    preserves the sense without overstating impossibility.
- source_word: לִנְחֻשְׁתָּם
  chosen: the bronze of them
  alternatives:
  - their bronze
  lexicon: HALOT
  rationale: The suffix refers back to the listed objects. In the final English line
    this is smoothed to 'the bronze of all these vessels' for naturalness while preserving
    the possessive sense.
- source_word: כָּל הַכֵּלִים הָאֵלֶּה
  chosen: all these vessels
  alternatives:
  - all these articles
  - all these objects
  lexicon: HALOT
  rationale: כֵּלִים is a broad term for utensils/articles/vessels. In temple inventory
    context, 'vessels' is the most fitting and traditional English equivalent.
