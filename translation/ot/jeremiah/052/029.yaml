id: JER.52.29
reference: Jeremiah 52:29
source:
  edition: WLC
  text: בִּ/שְׁנַ֛ת שְׁמוֹנֶ֥ה עֶשְׂרֵ֖ה לִ/נְבֽוּכַדְרֶאצַּ֑ר מִ/יר֣וּשָׁלִַ֔ם נֶ֕פֶשׁ
    שְׁמֹנֶ֥ה מֵא֖וֹת שְׁלֹשִׁ֥ים וּ/שְׁנָֽיִם׃
translation:
  text: In the eighteenth year of Nebuchadnezzar, from Jerusalem, 832 persons.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or '832 souls.' The Hebrew uses נֶפֶשׁ, literally 'soul,' as a counting
      term for persons.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנַת
  chosen: In the ... year
  alternatives:
  - In year
  lexicon: HALOT
  rationale: 'The preposition ב plus שְׁנַת introduces a temporal setting. English
    idiom normally supplies the article: ''In the eighteenth year.'''
- source_word: שְׁמוֹנֶה עֶשְׂרֵה
  chosen: eighteenth
  alternatives:
  - eighteen
  lexicon: HALOT
  rationale: The cardinal construction functions ordinally with 'year' in context,
    so English idiom is 'eighteenth year.'
- source_word: לִנְבוּכַדְרֶאצַּר
  chosen: of Nebuchadnezzar
  alternatives:
  - for Nebuchadnezzar
  - belonging to Nebuchadnezzar
  lexicon: HALOT
  rationale: 'The prefixed ל marks reference to the regnal year: ''the eighteenth
    year of Nebuchadnezzar.'' This is the natural English rendering for regnal dating.'
- source_word: מִירוּשָׁלִַם
  chosen: from Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: HALOT
  rationale: The preposition מִן normally means 'from.' In this deportation summary,
    it indicates the place from which the persons were taken.
- source_word: נֶפֶשׁ
  chosen: persons
  alternatives:
  - souls
  - people
  lexicon: HALOT
  rationale: Although literally 'soul,' in census/deportation contexts נֶפֶשׁ is an
    idiom for individual persons. 'Persons' is clear modern English and fits the counting
    formula.
- source_word: שְׁמֹנֶה מֵאוֹת שְׁלֹשִׁים וּשְׁנָיִם
  chosen: '832'
  alternatives:
  - eight hundred thirty-two
  - eight hundred and thirty-two
  lexicon: HALOT
  rationale: 'The Hebrew number is straightforwardly additive: 800 + 30 + 2. Numerals
    are rendered as digits here for readability in a statistical list.'
