id: JER.52.13
reference: Jeremiah 52:13
source:
  edition: WLC
  text: וַ/יִּשְׂרֹ֥ף אֶת בֵּית יְהוָ֖ה וְ/אֶת בֵּ֣ית הַ/מֶּ֑לֶךְ וְ/אֵ֨ת כָּל בָּתֵּ֧י
    יְרוּשָׁלִַ֛ם וְ/אֶת כָּל בֵּ֥ית הַ/גָּד֖וֹל שָׂרַ֥ף בָּ/אֵֽשׁ־־־־־־׃
translation:
  text: He burned the house of the LORD, the house of the king, and all the houses
    of Jerusalem; every great house he burned with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of the LORD.' The Hebrew reads literally 'the house of the
      LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the king’s palace.' The Hebrew reads literally 'the house of the king.'
    reason: lexical_alternative
  - marker: c
    text: Or 'every large/important house.' The Hebrew literally says 'every great
      house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂרֹף
  chosen: He burned
  alternatives:
  - And he burned
  - He set fire to
  lexicon: HALOT
  rationale: Qal wayyiqtol of שׂרף introduces the narrative action. 'He burned' is
    the most direct and natural English rendering; the prefixed conjunction is absorbed
    into normal English narrative style.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  - the house of Yahweh
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression
    while remaining clear in English. Per doctrine, יְהוָה is rendered 'the LORD.'
    'Temple' is interpretive and therefore left as an alternative rather than main
    text.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the house of the king
  alternatives:
  - the king's palace
  - the royal palace
  lexicon: HALOT
  rationale: Literally 'the house of the king.' Although this refers to the palace,
    retaining 'house' mirrors the repeated Hebrew בֵּית pattern in the verse and preserves
    the rhetorical parallelism with 'the house of the LORD.'
- source_word: כָּל בָּתֵּי יְרוּשָׁלִַם
  chosen: all the houses of Jerusalem
  alternatives:
  - all the houses in Jerusalem
  - all the buildings of Jerusalem
  lexicon: HALOT
  rationale: The phrase straightforwardly denotes the houses belonging to or located
    in Jerusalem. 'Houses of Jerusalem' is slightly more formal but preserves the
    Hebrew genitive structure.
- source_word: כָּל בֵּית הַגָּדוֹל
  chosen: every great house
  alternatives:
  - every large house
  - every important house
  - all the great houses
  lexicon: HALOT
  rationale: Singular collective after כָּל can function distributively. 'Every great
    house' best reflects the Hebrew form and likely refers to the prominent or substantial
    houses of the city. 'Important house' is possible semantically, but 'great' keeps
    the lexical link to גָּדוֹל.
- source_word: שָׂרַף בָּאֵשׁ
  chosen: he burned with fire
  alternatives:
  - he burned down
  - he consumed by fire
  lexicon: HALOT
  rationale: The repetition of the burn verb plus 'with fire' is emphatic in Hebrew.
    Rendering it explicitly preserves the force rather than collapsing it into a single
    idiom like 'burned down.'
