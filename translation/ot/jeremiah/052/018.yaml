id: JER.52.18
reference: Jeremiah 52:18
source:
  edition: WLC
  text: וְ/אֶת הַ֠/סִּרוֹת וְ/אֶת הַ/יָּעִ֨ים וְ/אֶת הַֽ/מְזַמְּר֜וֹת וְ/אֶת הַ/מִּזְרָקֹ֣ת
    וְ/אֶת הַ/כַּפּ֗וֹת וְ/אֵ֨ת כָּל כְּלֵ֧י הַ/נְּחֹ֛שֶׁת אֲשֶׁר יְשָׁרְת֥וּ בָ/הֶ֖ם
    לָקָֽחוּ־־־־־־־׃
translation:
  text: They took away the pots, the shovels, the snuffers, the basins, the dishes,
    and all the bronze vessels with which they ministered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the trimming knives" or "the wick trimmers" for "the snuffers."
    reason: lexical_alternative
  - marker: b
    text: Or "the bowls" for "the basins."
    reason: lexical_alternative
  - marker: c
    text: Or "with which they served." The Hebrew verb often refers to ministering
      in cultic service.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסִּרוֹת
  chosen: the pots
  alternatives:
  - the pails
  - the cooking pots
  lexicon: HALOT
  rationale: סִירוֹת commonly denotes pots or cooking vessels. In this temple-inventory
    context, 'pots' is the most natural and sufficiently broad English equivalent
    without over-specifying function.
- source_word: הַיָּעִים
  chosen: the shovels
  alternatives:
  - the scoops
  lexicon: HALOT
  rationale: יָעִים refers to implements for removing ashes or coals; 'shovels' is
    the standard and clear rendering in cultic vessel lists.
- source_word: הַמְזַמְּרוֹת
  chosen: the snuffers
  alternatives:
  - the trimming knives
  - the wick trimmers
  lexicon: HALOT
  rationale: Though the noun can suggest cutting/trimming implements, in temple-furnishing
    lists it is traditionally and contextually understood as lamp-trimming tools.
    'Snuffers' is concise and idiomatic for that function.
- source_word: הַמִּזְרָקֹת
  chosen: the basins
  alternatives:
  - the bowls
  lexicon: HALOT
  rationale: מִזְרָקֹת are vessels used for sprinkling or receiving sacrificial blood/liquid.
    'Basins' better conveys a cultic vessel than the more generic 'bowls,' while remaining
    readable.
- source_word: הַכַּפּוֹת
  chosen: the dishes
  alternatives:
  - the pans
  - the censers
  - the cups
  lexicon: HALOT
  rationale: כַּפּוֹת can denote small bowls, dishes, or spoon-like vessels. Here
    'dishes' preserves the broad vessel sense without forcing a more specific identification
    that the context does not require.
- source_word: כָּל כְּלֵי הַנְּחֹשֶׁת
  chosen: all the bronze vessels
  alternatives:
  - all the bronze articles
  - all the vessels of bronze
  lexicon: HALOT
  rationale: נְחֹשֶׁת in this context is best rendered 'bronze,' the standard material
    term for temple furnishings. 'Vessels' matches כְּלֵי in an inventory list.
- source_word: אֲשֶׁר יְשָׁרְתוּ בָהֶם
  chosen: with which they ministered
  alternatives:
  - with which they served
  - which were used for ministering
  lexicon: HALOT
  rationale: שרת in cultic contexts often denotes ministering in sacred service. 'With
    which they ministered' preserves the liturgical nuance better than the flatter
    'served.' The plural subject is left implicit in English, as in Hebrew.
- source_word: לָקָחוּ
  chosen: They took away
  alternatives:
  - they took
  - they carried off
  lexicon: HALOT
  rationale: The verb simply means 'took,' but in the narrative of temple plundering
    'took away' makes the removal sense explicit in natural English without adding
    unwarranted detail.
