theological_decisions:
- issue: Gendered pronominal suffix on Judah in מֵעַל אַדְמָתוֹ
  chosen_reading: from his land
  alternative_readings:
  - from its land
  rationale: Following the project's gender-accurate principle, the masculine singular
    suffix attached to 'land' is preserved with 'his' because it refers back to the
    grammatically masculine proper noun Judah. This is grammatical rather than doctrinal,
    and retaining it keeps closer to the Hebrew texture.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
