id: JER.52.27
reference: Jeremiah 52:27
source:
  edition: WLC
  text: וַ/יַּכֶּ֣ה אוֹתָ/ם֩ מֶ֨לֶךְ בָּבֶ֧ל וַ/יְמִתֵ֛/ם בְּ/רִבְלָ֖ה בְּ/אֶ֣רֶץ
    חֲמָ֑ת וַ/יִּ֥גֶל יְהוּדָ֖ה מֵ/עַ֥ל אַדְמָתֽ/וֹ׃
translation:
  text: And the king of Babylon struck them down and put them to death at Riblah in
    the land of Hamath. So Judah was taken into exile from his land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was exiled from its land.' The Hebrew literally has 'Judah from upon
      his land,' with a masculine singular suffix matching the proper noun Judah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכֶּה
  chosen: struck them down
  alternatives:
  - struck them
  - smote them
  lexicon: HALOT
  rationale: The Hiphil/waw-consecutive form of נכה here denotes a violent punitive
    action. Because it is immediately followed by וַיְמִתֵם ('and put them to death'),
    'struck them down' fits the sequence without collapsing the two verbs into one
    English expression.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: Standard construct rendering; clear and natural in English while preserving
    the Hebrew genitival relationship.
- source_word: וַיְמִתֵם
  chosen: put them to death
  alternatives:
  - killed them
  - executed them
  lexicon: HALOT
  rationale: מות in the Hiphil means 'cause to die.' 'Put them to death' preserves
    the causative force and judicial/executive sense better than the flatter 'killed
    them.' 'Executed them' is possible, but the Hebrew itself does not explicitly
    specify formal legal procedure.
- source_word: בְּרִבְלָה
  chosen: at Riblah
  alternatives:
  - in Riblah
  lexicon: HALOT
  rationale: With a place name, English idiom favors 'at' for the site of the action;
    this preserves the locative sense naturally.
- source_word: בְּאֶרֶץ חֲמָת
  chosen: in the land of Hamath
  alternatives:
  - in the territory of Hamath
  lexicon: HALOT
  rationale: A straightforward rendering of the geographic phrase, retaining the formal
    biblical wording 'land of Hamath.'
- source_word: וַיִּגֶל
  chosen: was taken into exile
  alternatives:
  - went into exile
  - was exiled
  lexicon: HALOT
  rationale: The verb גלה in this context refers to deportation/exile. Although the
    form is active, English commonly expresses the national result with a passive
    ('was taken into exile'), which better conveys the forced nature of Judah's removal
    by Babylon.
- source_word: יְהוּדָה
  chosen: Judah
  alternatives:
  - the people of Judah
  lexicon: HALOT
  rationale: The proper name can stand metonymically for the kingdom/people. 'Judah'
    preserves the compactness and ambiguity of the Hebrew.
- source_word: מֵעַל אַדְמָתוֹ
  chosen: from his land
  alternatives:
  - from its land
  - from upon his soil
  - from off his land
  lexicon: HALOT
  rationale: אַדָמָה is 'ground/land/soil.' Here 'land' is the most natural national-geographic
    sense. The 3ms suffix agrees with the grammatically masculine proper noun Judah;
    English 'his land' preserves that gender-accurate correspondence better than smoothing
    to 'its land,' though the referent is corporate/national.
