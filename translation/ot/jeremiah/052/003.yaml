id: JER.52.3
reference: Jeremiah 52:3
source:
  edition: WLC
  text: כִּ֣י עַל אַ֣ף יְהוָ֗ה הָֽיְתָה֙ בִּ/ירוּשָׁלִַ֣ם וִֽ/יהוּדָ֔ה עַד הִשְׁלִיכ֥/וֹ
    אוֹתָ֖/ם מֵ/עַ֣ל פָּנָ֑י/ו וַ/יִּמְרֹ֥ד צִדְקִיָּ֖הוּ בְּ/מֶ֥לֶךְ בָּבֶֽל׀־־׃
translation:
  text: For because of the anger of the LORD this came about in Jerusalem and Judah,
    until he cast them out from before his face; and Zedekiah rebelled against the
    king of Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of the wrath of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'from before his face'; that is, from his presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces an explanatory clause linking this verse to the preceding
    context. 'For' preserves the discourse function in readable English.
- source_word: עַל אַף יְהוָה
  chosen: because of the anger of the LORD
  alternatives:
  - on account of the anger of the LORD
  - because of the wrath of the LORD
  lexicon: HALOT
  rationale: The idiom עַל אַף expresses causation grounded in divine anger. 'Anger'
    is more natural modern English than 'nose' or overly formal idiom, while preserving
    the sense of wrath. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default for the divine name.
- source_word: הָיְתָה
  chosen: this came about
  alternatives:
  - it happened
  - it was
  lexicon: HALOT
  rationale: The feminine singular verb lacks an explicit subject in this clause;
    English requires one. 'This came about' idiomatically captures the existential/resultative
    force in context, referring to the situation just described and leading into the
    judgment outcome.
- source_word: בִּירוּשָׁלִַם וִיהוּדָה
  chosen: in Jerusalem and Judah
  lexicon: HALOT
  rationale: Straightforward locative rendering preserving both city and region.
- source_word: עַד הִשְׁלִיכוֹ אֹתָם
  chosen: until he cast them out
  alternatives:
  - until he threw them out
  - until he drove them away
  lexicon: HALOT
  rationale: The Hiphil of שלך conveys forceful expulsion. 'Cast them out' preserves
    the severity and echoes biblical judgment language.
- source_word: מֵעַל פָּנָיו
  chosen: from before his face
  alternatives:
  - from his presence
  - away from before him
  lexicon: HALOT
  rationale: More formally preserves the Hebrew idiom of expulsion from God's presence.
    'From his presence' is a good sense alternative but slightly smooths the imagery.
- source_word: וַיִּמְרֹד
  chosen: and ... rebelled
  alternatives:
  - and ... revolted
  lexicon: HALOT
  rationale: Standard rendering for מרד in political covenant-breaking context.
- source_word: בְּמֶלֶךְ בָּבֶל
  chosen: against the king of Babylon
  alternatives:
  - against Babylon's king
  lexicon: HALOT
  rationale: Although the preposition is ב, with מרד the idiomatic English sense is
    'rebel against.' This is the standard and accurate rendering.
