theological_decisions:
- issue: Rendering divine judgment language without softening or over-interpreting
    the cause-effect relation
  chosen_reading: The verse states that Jerusalem and Judah's fate occurred because
    of the LORD's anger, culminating in expulsion from his presence.
  alternative_readings:
  - The verse merely reports historical events without emphasizing divine causation
  - The verse should be softened to 'displeasure' rather than 'anger'
  rationale: The Hebrew explicitly grounds the events in עַל אַף יְהוָה and describes
    expulsion from before his face. The translation preserves this theological claim
    without adding explanation beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Supplying an English subject for הָיְתָה
  chosen_reading: '''this came about'''
  alternative_readings:
  - '''it happened'''
  - '''it was'''
  rationale: The Hebrew leaves the subject implicit. 'This came about' best connects
    the clause to the surrounding narrative while avoiding a wooden or unclear English
    construction. It does not add new content, only makes the clause intelligible.
  doctrine_reference: Translation philosophy §§1, 6
