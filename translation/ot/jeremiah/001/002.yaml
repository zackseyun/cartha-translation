id: JER.1.2
reference: Jeremiah 1:2
source:
  edition: WLC
  text: אֲשֶׁ֨ר הָיָ֤ה דְבַר יְהוָה֙ אֵלָ֔י/ו בִּ/ימֵ֛י יֹאשִׁיָּ֥הוּ בֶן אָמ֖וֹן
    מֶ֣לֶךְ יְהוּדָ֑ה בִּ/שְׁלֹשׁ עֶשְׂרֵ֥ה שָׁנָ֖ה לְ/מָלְכֽ/וֹ־־־׃
translation:
  text: to whom the word of the LORD came in the days of Josiah son of Amon, king
    of Judah, in the thirteenth year of his reign.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: to whom
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: Introduces the relative clause referring back to Jeremiah in v. 1. Because
    the clause includes אֵלָיו ('to him'), English idiom is best represented by 'to
    whom' rather than a more wooden 'which ... to him' or 'that ... to him.'
- source_word: הָיָה
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: With דְבַר יְהוָה plus אֶל, this is a standard prophetic formula meaning
    'the word of the LORD came.' Rendering simply 'was' would be formally possible
    but unnatural and would obscure the idiomatic force.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Standard prophetic expression. 'Word' preserves the covenantal and revelatory
    weight of דָּבָר better than the more interpretive 'message.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: אֵלָיו
  chosen: to whom
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The preposition and pronoun are incorporated into the relative expression
    'to whom' for natural English while preserving the directional sense of revelation
    coming to Jeremiah.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during the time of
  lexicon: HALOT
  rationale: A conventional temporal expression in Hebrew narrative and prophetic
    superscriptions; 'in the days of' is both accurate and idiomatic.
- source_word: יֹאשִׁיָּהוּ
  chosen: Josiah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name.
- source_word: בֶן אָמוֹן
  chosen: son of Amon
  alternatives:
  - the son of Amon
  lexicon: HALOT
  rationale: Genealogical identification is straightforward; 'son of Amon' is concise
    and natural in English.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Direct rendering of the royal title and realm.
- source_word: בִּשְׁלֹשׁ עֶשְׂרֵה שָׁנָה
  chosen: in the thirteenth year
  alternatives:
  - in year thirteen
  lexicon: HALOT
  rationale: Standard English rendering of the Hebrew ordinal-like construction in
    dating formulas.
- source_word: לְמָלְכוֹ
  chosen: of his reign
  alternatives:
  - of his kingship
  - when he began to reign
  lexicon: HALOT
  rationale: The phrase dates the event by regnal year. 'Of his reign' is the clearest
    idiomatic English equivalent.
