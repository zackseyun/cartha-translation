id: JER.1.16
reference: Jeremiah 1:16
source:
  edition: WLC
  text: וְ/דִבַּרְתִּ֤י מִשְׁפָּטַ/י֙ אוֹתָ֔/ם עַ֖ל כָּל רָעָתָ֑/ם אֲשֶׁ֣ר עֲזָב֗וּ/נִי
    וַֽ/יְקַטְּרוּ֙ לֵ/אלֹהִ֣ים אֲחֵרִ֔ים וַ/יִּֽשְׁתַּחֲו֖וּ לְ/מַעֲשֵׂ֥י יְדֵי/הֶֽם־׃
translation:
  text: And I will pronounce my judgments against them for all their evil, because
    they have forsaken me, burned incense to other gods, and bowed down to the works
    of their own hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will speak my judgments against them concerning all their evil.' The
      Hebrew verb is literally 'speak,' but here likely carries the sense of formally
      pronouncing judgment.
    reason: lexical_alternative
  - marker: b
    text: '''The works of their own hands'' refers to idols they themselves made.'
    reason: cultural_note
lexical_decisions:
- source_word: וְדִבַּרְתִּי
  chosen: I will pronounce
  alternatives:
  - I will speak
  - I will declare
  lexicon: HALOT
  rationale: The verb דבר with מִשְׁפָּטִים in judicial context means more than ordinary
    speech; 'pronounce' captures a formal declaration of sentence while remaining
    natural English.
- source_word: מִשְׁפָּטַי
  chosen: my judgments
  alternatives:
  - my משפטים
  - my sentences
  - my justice
  lexicon: HALOT
  rationale: מִשְׁפָּט commonly denotes judicial decisions or judgments here. 'My
    judgments' preserves the legal sense better than the broader 'justice.'
- source_word: אוֹתָם
  chosen: against them
  alternatives:
  - them
  lexicon: HALOT
  rationale: Although the direct object marker plus pronoun is literally 'them,' English
    idiom with 'pronounce judgments' normally takes 'against them,' and the following
    עַל phrase then specifies the grounds.
- source_word: עַל כָּל רָעָתָם
  chosen: for all their evil
  alternatives:
  - concerning all their evil
  - because of all their wickedness
  - against all their evil
  lexicon: HALOT
  rationale: Here עַל introduces the basis or cause of judgment. 'For all their evil'
    is concise and idiomatic, preserving the causal force. 'Evil' keeps the moral
    category broad; 'wickedness' is possible but slightly more interpretive.
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - that
  - which
  - inasmuch as
  lexicon: HALOT
  rationale: The relative particle introduces the content/grounds of the accusation.
    Rendering it as 'because' makes the causal relationship explicit in natural English.
- source_word: עֲזָבוּנִי
  chosen: they have forsaken me
  alternatives:
  - they abandoned me
  - they left me
  lexicon: HALOT
  rationale: '''Forsaken'' preserves covenantal and relational weight typical of עזב
    in prophetic indictment better than the flatter ''left.'''
- source_word: וַיְקַטְּרוּ
  chosen: burned incense
  alternatives:
  - made offerings by smoke
  - offered incense
  lexicon: HALOT
  rationale: The piel of קטר in idolatry contexts commonly refers to burning incense
    or making smoke offerings. 'Burned incense' is the standard, clear rendering.
- source_word: לֵאלֹהִים אֲחֵרִים
  chosen: to other gods
  alternatives:
  - for other gods
  lexicon: HALOT
  rationale: This is straightforward dative direction toward false deities. 'Other
    gods' preserves the polemical covenantal language.
- source_word: וַיִּשְׁתַּחֲווּ
  chosen: bowed down
  alternatives:
  - worshiped
  - prostrated themselves
  lexicon: HALOT
  rationale: The verb literally denotes bowing/prostration. 'Bowed down' preserves
    the physical act and lets the idolatrous worship sense arise from context; 'worshiped'
    would be slightly more interpretive.
- source_word: לְמַעֲשֵׂי יְדֵיהֶם
  chosen: to the works of their own hands
  alternatives:
  - to what their hands had made
  - to the work of their hands
  lexicon: HALOT
  rationale: This idiom refers to idols they manufactured. 'The works of their own
    hands' preserves the Hebrew imagery and prophetic irony; adding 'own' makes the
    reflexive sense clear in English.
