theological_decisions:
- issue: Nature of the divine action in וְדִבַּרְתִּי מִשְׁפָּטַי
  chosen_reading: God is announcing judicial sentences against Judah, not merely speaking
    generally about justice.
  alternative_readings:
  - God will speak with them about his ordinances
  - God will execute judgments without emphasis on verbal pronouncement
  rationale: The collocation of דבר with משפטים in this prophetic setting is best
    understood as a formal pronouncement of judgment. This preserves the legal-prophetic
    force without importing later doctrinal categories.
- issue: Rendering of idolatrous acts
  chosen_reading: 'The verse lists concrete covenant violations: forsaking the LORD,
    burning incense to other gods, and bowing to handmade idols.'
  alternative_readings:
  - A more generalized rendering such as 'they worshiped idols'
  rationale: The Hebrew specifies distinct acts, and preserving them maintains the
    text's theological indictment without flattening it into summary language.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5
