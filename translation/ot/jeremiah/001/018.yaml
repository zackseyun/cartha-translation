id: JER.1.18
reference: Jeremiah 1:18
source:
  edition: WLC
  text: וַ/אֲנִ֞י הִנֵּ֧ה נְתַתִּ֣י/ךָ הַ/יּ֗וֹם לְ/עִ֨יר מִבְצָ֜ר וּ/לְ/עַמּ֥וּד
    בַּרְזֶ֛ל וּ/לְ/חֹמ֥וֹת נְחֹ֖שֶׁת עַל כָּל הָ/אָ֑רֶץ לְ/מַלְכֵ֤י יְהוּדָה֙ לְ/שָׂרֶ֔י/הָ
    לְ/כֹהֲנֶ֖י/הָ וּ/לְ/עַ֥ם הָ/אָֽרֶץ־־׃
translation:
  text: And I—behold, I have made you today into a fortified city, an iron pillar,
    and bronze walls against the whole land—against the kings of Judah, its officials,
    its priests, and the people of the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I have set you today as a fortified city.' The Hebrew verb literally
      means 'given/set,' but here carries the sense of appointing or making Jeremiah
      into a fortified presence.
    reason: lexical_alternative
  - marker: b
    text: '''The people of the land'' can in some contexts mean the common people
      in contrast to rulers, but here it may also function more broadly for the populace
      as a whole.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: And I
  alternatives:
  - As for me
  - But I
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun gives emphatic contrast or foregrounding.
    'And I' preserves the Hebrew discourse movement without overinterpreting it as
    adversative.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Retains the deictic/emphatic force of the particle. Though somewhat elevated,
    it remains understandable and preserves the solemn prophetic tone.
- source_word: נְתַתִּיךָ
  chosen: I have made you
  alternatives:
  - I have set you
  - I have given you
  lexicon: HALOT
  rationale: נתן literally means 'give/put/set,' but with the following predicative
    ל-phrases it idiomatically means appointing or making Jeremiah into something.
    'Made you' is natural English and fits the metaphorical transformation.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: Straightforward temporal adverb; 'today' is modern English while preserving
    the immediacy of the commissioning.
- source_word: לְעִיר מִבְצָר
  chosen: into a fortified city
  alternatives:
  - as a fortified city
  - for a fortified city
  lexicon: HALOT
  rationale: The ל- marks the result/predicative complement after נתן. 'Into a fortified
    city' communicates the metaphor of being constituted as a defensive stronghold.
- source_word: וּלְעַמּוּד בַּרְזֶל
  chosen: an iron pillar
  alternatives:
  - a pillar of iron
  lexicon: HALOT
  rationale: A direct, idiomatic rendering of the metaphor. 'Iron pillar' is concise
    and natural in English.
- source_word: וּלְחֹמוֹת נְחֹשֶׁת
  chosen: and bronze walls
  alternatives:
  - and walls of bronze
  - and copper walls
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote bronze or copper depending on context; 'bronze' is
    the standard rendering for durable metal imagery in biblical contexts. The plural
    'walls' is preserved.
- source_word: עַל כָּל הָאָרֶץ
  chosen: against the whole land
  alternatives:
  - against all the land
  - over the whole land
  lexicon: HALOT
  rationale: In context עַל introduces opposition rather than mere location, as shown
    by the following list of hostile groups. 'The whole land' likely refers to the
    land of Judah as represented by its leadership and populace, not the entire earth.
- source_word: לְמַלְכֵי יְהוּדָה
  chosen: against the kings of Judah
  alternatives:
  - to the kings of Judah
  lexicon: HALOT
  rationale: Though formally לְ can mean 'to/for,' in apposition to עַל כָּל הָאָרֶץ
    and in this conflict context it specifies the parties against whom Jeremiah is
    fortified. Repeating 'against' in English clarifies the syntax.
- source_word: לְשָׂרֶיהָ
  chosen: its officials
  alternatives:
  - its princes
  - its leaders
  lexicon: HALOT
  rationale: שָׂרִים are ruling officials or princes. 'Officials' is more accessible
    modern English and fits the administrative context.
- source_word: לְכֹהֲנֶיהָ
  chosen: its priests
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֲנִים.
- source_word: וּלְעַם הָאָרֶץ
  chosen: and the people of the land
  alternatives:
  - and the common people
  - and the people of the country
  lexicon: HALOT
  rationale: This phrase can sometimes denote commoners in contrast to elites, but
    here it likely rounds out the whole population alongside kings, officials, and
    priests. 'People of the land' preserves the Hebrew expression without prematurely
    narrowing it sociologically.
