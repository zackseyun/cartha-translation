theological_decisions:
- issue: Scope of 'the land' in Jeremiah's opposition
  chosen_reading: Rendered as 'the whole land' rather than 'the whole earth,' with
    the following groups showing Judah in view.
  alternative_readings:
  - the whole earth
  rationale: Although אֶרֶץ can mean 'earth' or 'land,' the immediate specification
    of Judah's kings, officials, priests, and people indicates the local/national
    sense. This avoids overstating the scope of the commission while preserving the
    totality within Judah.
