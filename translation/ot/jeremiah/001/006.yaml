theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  chosen_reading: Lord GOD
  alternative_readings:
  - Lord Yahweh
  - Lord the LORD
  rationale: The doctrine excerpt sets the default rendering of יְהוָה as 'the LORD.'
    In the fixed compound אֲדֹנָי יְהוִה, English convention commonly uses 'Lord GOD'
    to preserve both title elements without the awkward 'Lord LORD.' This is a translation-form
    decision, not a doctrinal reinterpretation.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, יְהוָה YHWH → ''the LORD'''
