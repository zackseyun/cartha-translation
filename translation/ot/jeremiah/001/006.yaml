id: JER.1.6
reference: Jeremiah 1:6
source:
  edition: WLC
  text: וָ/אֹמַ֗ר אֲהָהּ֙ אֲדֹנָ֣/י יְהֹוִ֔ה הִנֵּ֥ה לֹא יָדַ֖עְתִּי דַּבֵּ֑ר כִּי
    נַ֖עַר אָנֹֽכִי־־׃פ
translation:
  text: Then I said, “Ah, Lord GOD! Look, I do not know how to speak, for I am a youth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Ah, Lord GOD''; the divine title is אֲדֹנָי יְהוִה, traditionally
      rendered ''Lord GOD'' to represent both ''Lord'' and the divine name YHWH. Alternatively,
      ''Lord Yahweh.'''
    reason: alternative_reading
  - marker: b
    text: Or 'I do not know to speak'—a Hebrew idiom meaning 'I do not know how to
      speak.'
    reason: lexical_alternative
  - marker: c
    text: Or 'young man' or 'boy'; Hebrew נַעַר can refer broadly to a youth, from
      childhood to young adulthood depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  chosen: Then I said
  alternatives:
  - And I said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר advances the narrative. 'Then I said' gives natural
    English narrative sequence while preserving the simple verbal sense.
- source_word: אֲהָהּ
  chosen: Ah
  alternatives:
  - Alas
  - Ahah
  lexicon: HALOT
  rationale: An interjection of distress or protest. 'Ah' is natural modern English
    and fits Jeremiah's hesitant objection. 'Alas' is possible but sounds more formal
    and mournful than the immediate protest here.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord Yahweh
  - Lord GOD
  lexicon: HALOT
  rationale: The compound divine title is traditionally rendered 'Lord GOD' in English
    to distinguish אֲדֹנָי + YHWH. Per doctrine, יְהוָה is rendered 'the LORD' by
    default; in this compound, small-caps conventions are often represented as 'Lord
    GOD' to avoid 'Lord LORD.' This preserves both elements of the Hebrew title.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic particle drawing attention to Jeremiah's objection. 'Look' is
    readable modern English and preserves the force better than archaic 'Behold.'
- source_word: לֹא יָדַעְתִּי דַּבֵּר
  chosen: I do not know how to speak
  alternatives:
  - I do not know to speak
  - I am not skilled in speaking
  lexicon: HALOT
  rationale: Hebrew idiom literally 'I do not know speak.' English requires the idiomatic
    expansion 'know how to speak' to communicate inability or inexperience without
    overinterpreting it as total muteness or rhetorical incompetence.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for Jeremiah's claim of inability. 'For' is concise
    and fits the explanatory relation.
- source_word: נַעַר
  chosen: youth
  alternatives:
  - boy
  - young man
  - child
  lexicon: HALOT
  rationale: 'נַעַר can denote a range from child to young man depending on context.
    ''Youth'' best preserves the semantic breadth here: Jeremiah is emphasizing immaturity/inexperience,
    not necessarily childhood. ''Boy'' is too young; ''young man'' is narrower and
    may sound more mature than the objection implies.'
- source_word: אָנֹכִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: Independent pronoun adds emphasis to the clause. English expresses this
    naturally as 'I am' in the predicate construction.
