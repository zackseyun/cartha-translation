theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the Tetragrammaton as 'the LORD,' following
    Jewish reverence tradition and longstanding biblical English usage while signaling
    the covenant name typographically.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered distributive expression אִישׁ ... כִּסְאוֹ
  chosen_reading: each will set his throne
  alternative_readings:
  - each man will set his throne
  - each will set their throne
  rationale: The Hebrew uses a grammatically masculine singular distributive. Per
    the project's gender-accurate policy, the translation avoids flattening the masculine
    form into singular 'their,' while still rendering idiomatically with 'each.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4
