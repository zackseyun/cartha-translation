id: JER.1.15
reference: Jeremiah 1:15
source:
  edition: WLC
  text: כִּ֣י הִנְ/נִ֣י קֹרֵ֗א לְ/כָֽל מִשְׁפְּח֛וֹת מַמְלְכ֥וֹת צָפ֖וֹנָ/ה נְאֻם
    יְהוָ֑ה וּ/בָ֡אוּ וְֽ/נָתְנוּ֩ אִ֨ישׁ כִּסְא֜/וֹ פֶּ֣תַח שַׁעֲרֵ֣י יְרוּשָׁלִַ֗ם
    וְ/עַ֤ל כָּל חוֹמֹתֶ֨י/הָ֙ סָבִ֔יב וְ/עַ֖ל כָּל עָרֵ֥י יְהוּדָֽה׀־־׀־־׃
translation:
  text: For behold, I am calling all the clans of the kingdoms of the north, declares
    the LORD, and they will come, and each will set his throne at the entrance of
    the gates of Jerusalem, and against all her walls all around, and against all
    the cities of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the families of the kingdoms of the north.' The Hebrew term can
      denote extended family groups, clans, or similar social units.
    reason: lexical_alternative
  - marker: b
    text: '''Each will set his throne'' pictures invading rulers taking up positions
      of authority and judgment at Jerusalem''s gates.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding announcement;
    'For' fits the discourse flow better than the more emphatic 'Indeed' or strictly
    causal 'Because' in English.
- source_word: הִנְנִי
  chosen: behold, I am
  alternatives:
  - look, I am
  - here I am
  lexicon: HALOT
  rationale: The particle-plus-pronoun construction is deictic and emphatic. 'Behold,
    I am' preserves both the attention-getting force and the immediacy of the divine
    action.
- source_word: קֹרֵא
  chosen: calling
  alternatives:
  - summoning
  lexicon: HALOT
  rationale: The participle expresses imminent or ongoing action. 'Calling' is a natural
    English rendering; 'summoning' is possible and slightly more formal, but the object
    and context already convey authoritative mustering.
- source_word: לְכָל מִשְׁפְּחוֹת מַמְלְכוֹת צָפוֹנָה
  chosen: all the clans of the kingdoms of the north
  alternatives:
  - all the families of the kingdoms of the north
  - all the tribes of the kingdoms of the north
  lexicon: HALOT
  rationale: מִשְׁפְּחוֹת often denotes kinship groups or clans; 'clans' avoids the
    overly domestic sense of 'families' and the potentially misleading ethnic sense
    of 'tribes.' The plural 'kingdoms' is retained from the Hebrew.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Declares the LORD' is idiomatic modern
    English and preserves prophetic solemnity.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: וּבָאוּ
  chosen: they will come
  alternatives:
  - they shall come
  lexicon: HALOT
  rationale: Simple future in context; 'will come' is readable modern English.
- source_word: וְנָתְנוּ אִישׁ כִּסְאוֹ
  chosen: each will set his throne
  alternatives:
  - each will place his seat
  - each will establish his throne
  lexicon: HALOT
  rationale: The idiom depicts invading rulers taking positions of authority for judgment
    or siege. 'Throne' preserves the royal/judicial imagery better than 'seat.' 'Each'
    renders אִישׁ distributively.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - each man
  lexicon: HALOT
  rationale: Used distributively here rather than to emphasize maleness. 'Each' conveys
    the sense naturally in English while remaining faithful to the syntax.
- source_word: פֶּתַח שַׁעֲרֵי יְרוּשָׁלִַם
  chosen: at the entrance of the gates of Jerusalem
  alternatives:
  - at the opening of the gates of Jerusalem
  - at the gateway of Jerusalem
  lexicon: HALOT
  rationale: פֶּתַח is 'entrance/opening.' Retaining plural 'gates' reflects the Hebrew
    construct phrase and the city's gate-complexes.
- source_word: וְעַל כָּל חוֹמֹתֶיהָ סָבִיב
  chosen: and against all her walls all around
  alternatives:
  - and against all her surrounding walls
  - and over all her walls round about
  lexicon: HALOT
  rationale: In this military context, עַל is best rendered 'against.' סָבִיב adds
    the sense of encirclement; 'all around' keeps that force in natural English.
- source_word: וְעַל כָּל עָרֵי יְהוּדָה
  chosen: and against all the cities of Judah
  alternatives:
  - and against every city of Judah
  lexicon: HALOT
  rationale: Again, עַל is adversative in context. The plural 'cities' matches the
    Hebrew and the broad scope of judgment.
