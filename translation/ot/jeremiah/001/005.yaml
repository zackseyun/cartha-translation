theological_decisions:
- issue: Meaning of 'I knew you' (ידעתיך) in relation to divine foreknowledge/election
  chosen_reading: Retain the broader relational verb 'I knew you' in the main text
    without narrowing it to 'chose you.'
  alternative_readings:
  - I chose you
  - I acknowledged you
  rationale: The Hebrew verb ידע can imply intimate or covenantal knowledge, and some
    readers infer election from the context. However, the text itself uses 'know,'
    and the translation philosophy requires preserving theological tension rather
    than resolving it. Therefore the main text keeps 'I knew you,' allowing readers
    to see the lexical form while the commissioning language in the verse supplies
    the vocational emphasis.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
- issue: Rendering of הקדשתיך
  chosen_reading: Use 'I set you apart' rather than the more technical 'I consecrated
    you.'
  alternative_readings:
  - I consecrated you
  rationale: Both are defensible. 'Set you apart' is more accessible modern English
    and still conveys dedication to a holy purpose. Because 'consecrated' is a meaningful
    theological alternative, it is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §6 Readable modern English, not archaic
    or academic
