id: JER.1.5
reference: Jeremiah 1:5
source:
  edition: WLC
  text: בְּ/טֶ֨רֶם אצור/ך בַ/בֶּ֨טֶן֙ יְדַעְתִּ֔י/ךָ וּ/בְ/טֶ֛רֶם תֵּצֵ֥א מֵ/רֶ֖חֶם
    הִקְדַּשְׁתִּ֑י/ךָ נָבִ֥יא לַ/גּוֹיִ֖ם נְתַתִּֽי/ךָ׃
translation:
  text: Before I formed you in the womb, I knew you, and before you came out from
    the womb, I set you apart; I appointed you as a prophet to the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I consecrated you.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “I knew you” may also carry the sense of personal regard or choosing,
      but the translation preserves the broader wording.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטֶרֶם
  chosen: Before
  alternatives:
  - Before ever
  - Prior to when
  lexicon: HALOT
  rationale: Temporal particle meaning 'before' or 'not yet.' Simple 'Before' is natural
    English and preserves the sequence without adding emphasis not explicit in the
    Hebrew.
- source_word: אצור/ך
  chosen: I formed you
  alternatives:
  - I shaped you
  - I created you
  lexicon: HALOT
  rationale: From יצר, commonly used of forming or shaping, especially with craftsmanship
    or divine formation. 'Formed' preserves the concrete imagery and echoes common
    biblical usage without overstating to 'created.'
- source_word: בַבטן
  chosen: in the womb
  alternatives:
  - in the belly
  lexicon: HALOT
  rationale: בטן can mean belly or womb; in prenatal context 'womb' is clearly intended
    and idiomatic in English.
- source_word: ידעתיך
  chosen: I knew you
  alternatives:
  - I chose you
  - I acknowledged you
  lexicon: HALOT
  rationale: ידע has a broad semantic range including relational knowledge. The primary
    lexical sense is 'know,' and the translation should preserve that theological
    richness rather than narrow it to election language in the main text. Possible
    implications are better handled in theological documentation.
- source_word: וּבְטֶרֶם
  chosen: and before
  alternatives:
  - even before
  - and prior to
  lexicon: HALOT
  rationale: The conjunction plus temporal particle links the second clause closely
    to the first. 'And before' preserves the Hebrew structure and progression.
- source_word: תצא
  chosen: you came out
  alternatives:
  - you were born
  - you came forth
  lexicon: HALOT
  rationale: יצא literally means 'go out/come out.' In context it refers to birth.
    'Came out' keeps the concrete Hebrew imagery; 'were born' is interpretive but
    acceptable. The more literal phrasing was preferred while remaining natural.
- source_word: מרחם
  chosen: from the womb
  alternatives:
  - from the رحم
  - from the uterus
  lexicon: HALOT
  rationale: רחם in this context means womb. 'From the womb' is the standard and natural
    rendering in English.
- source_word: הקדשתיך
  chosen: I set you apart
  alternatives:
  - I consecrated you
  - I made you holy
  lexicon: HALOT
  rationale: קדש in the hiphil commonly means to consecrate or set apart as holy.
    'Set you apart' communicates the dedicatory sense in accessible modern English;
    'consecrated' is a viable, more formal alternative preserved in a footnote.
- source_word: נביא
  chosen: a prophet
  lexicon: HALOT
  rationale: Standard rendering of נביא. No contextual reason to vary.
- source_word: לגוים
  chosen: to the nations
  alternatives:
  - for the nations
  - to the Gentiles
  lexicon: HALOT
  rationale: גוים means nations/peoples. In Jeremiah's calling context, 'to the nations'
    best reflects scope beyond Judah without importing the later NT-specific nuance
    of 'Gentiles.'
- source_word: נתתיך
  chosen: I appointed you
  alternatives:
  - I gave you
  - I made you
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in commissioning contexts it can mean
    appoint or assign. 'I appointed you' best fits the predicate 'as a prophet to
    the nations' in natural English while preserving the sense of divine commissioning.
