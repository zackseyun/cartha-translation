theological_decisions:
- issue: Meaning of הָרָעָה in relation to divine judgment
  chosen_reading: Rendered as 'the disaster' rather than 'the evil.'
  alternative_readings:
  - the evil
  - the calamity
  rationale: The Hebrew term can denote either moral evil or calamity/disaster. In
    this context of announced judgment coming from the north, the sense is punitive
    disaster, not moral evil. This preserves the text's meaning without importing
    a claim that God produces moral evil.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension without importing doctrinal claims the text does not make.'
- issue: Scope of הָאָרֶץ
  chosen_reading: Rendered as 'the land' with local reference.
  alternative_readings:
  - the earth
  rationale: Although אֶרֶץ can mean 'earth' or 'land,' Jeremiah 1:14 concerns an
    invasion/judgment coming on Judah from the north. The local sense best fits the
    literary and historical context.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
