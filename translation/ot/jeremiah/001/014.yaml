id: JER.1.14
reference: Jeremiah 1:14
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוָ֖ה אֵלָ֑/י מִ/צָּפוֹן֙ תִּפָּתַ֣ח הָ/רָעָ֔ה עַ֥ל כָּל יֹשְׁבֵ֖י הָ/אָֽרֶץ־׃
translation:
  text: And Yahweh said to me, “From the north the disaster will break forth against all the inhabitants of the land.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the calamity will break forth' or more literally 'the evil will be opened.'
    reason: lexical_alternative
  - marker: b
    text: '''The land'' likely refers to the land of Judah here; alternatively, ''the earth.'''
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  rationale: The waw-consecutive advances the narrative. 'And ... said' preserves the Hebrew sequencing naturally in English.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  rationale: Standard prepositional sense with first-person singular suffix; 'to me' is clear modern English.
- source_word: מִצָּפוֹן
  chosen: From the north
  alternatives:
  - Out of the north
  - From the northland
  lexicon: HALOT
  rationale: צָפוֹן denotes the north/northern direction or region. 'From the north' is the most direct and idiomatic rendering here, preserving the geographic source of the coming judgment.
- source_word: תִּפָּתַח
  chosen: will be unleashed
  alternatives:
  - will be opened
  - will break forth
  - will be let loose
  lexicon: HALOT
  rationale: Niphal of פתח literally means 'be opened,' but in this context with הָרָעָה it conveys the idea of calamity breaking out or being released. 'Will be unleashed' captures the passive nuance and the vivid force of impending judgment better than the overly literal 'be opened.'
- source_word: הָרָעָה
  chosen: the disaster
  alternatives:
  - the evil
  - the calamity
  lexicon: HALOT
  rationale: רָעָה can mean moral evil or experiential evil/calamity. In this prophetic judgment context, it refers to disaster/calamity coming upon the people, not moral evil as such. 'Disaster' is accessible modern English and avoids theological misunderstanding that God is authoring moral evil.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - over
  rationale: With a verb of hostile outbreak and an object of judgment, 'against' communicates the adversative force more clearly than the more literal 'upon.'
- source_word: כָּל יֹשְׁבֵי הָאָרֶץ
  chosen: all the inhabitants of the land
  alternatives:
  - all who dwell in the land
  - all the inhabitants of the earth
  lexicon: HALOT
  rationale: יֹשְׁבֵי הָאָרֶץ is a common expression for those dwelling in a land. In Jeremiah's immediate context, הָאָרֶץ most naturally refers to the land of Judah rather than the whole earth. 'Inhabitants of the land' preserves the phrase while fitting the local judgment context.
