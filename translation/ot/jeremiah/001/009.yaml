id: JER.1.9
reference: Jeremiah 1:9
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֤ח יְהוָה֙ אֶת יָד֔/וֹ וַ/יַּגַּ֖ע עַל פִּ֑/י וַ/יֹּ֤אמֶר יְהוָה֙
    אֵלַ֔/י הִנֵּ֛ה נָתַ֥תִּי דְבָרַ֖/י בְּ/פִֽי/ךָ־־׃
translation:
  text: Then the LORD stretched out his hand and touched my mouth, and the LORD said
    to me, “Look, I have put my words in your mouth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH'' (traditionally rendered ''the LORD''); alternatively,
      ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: stretched out
  alternatives:
  - sent out
  - reached out
  lexicon: HALOT
  rationale: For שלח with 'hand' as object, English idiom favors 'stretch out [the]
    hand' rather than the more wooden 'send out his hand.' This preserves the concrete
    action in readable English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for YHWH, render as 'the LORD' rather than a transliteration.
- source_word: יָדוֹ
  chosen: his hand
  lexicon: HALOT
  rationale: Straightforward possessive noun; singular retained.
- source_word: וַיַּגַּע עַל־פִּי
  chosen: touched my mouth
  alternatives:
  - touched upon my mouth
  - touched my lips
  lexicon: HALOT
  rationale: נגע with עַל literally means 'touch upon/against,' but idiomatic English
    is simply 'touched.' פֶּה is 'mouth'; 'lips' would be interpretive and better
    suits other prophetic call texts, so 'mouth' is retained here.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - declared
  lexicon: HALOT
  rationale: אמר is the standard verb of speech; 'said' is sufficient and avoids over-interpretation.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Standard prepositional phrase indicating addressee.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה marks attention. 'Look' preserves the deictic force in modern
    readable English better than archaic 'Behold.'
- source_word: נָתַתִּי
  chosen: I have put
  alternatives:
  - I have given
  - I put
  lexicon: HALOT
  rationale: 'With ''my words'' and ''in your mouth,'' English idiom prefers ''put''
    over the more literal ''given.'' The perfect is rendered with present relevance:
    ''I have put.'''
- source_word: דְבָרַי
  chosen: my words
  alternatives:
  - my message
  lexicon: HALOT
  rationale: דבר is rendered concretely as 'words' to preserve the verbal/prophetic
    emphasis; 'message' would be more interpretive.
- source_word: בְּפִיךָ
  chosen: in your mouth
  alternatives:
  - on your lips
  lexicon: HALOT
  rationale: The preposition ב plus פֶּה is retained literally as 'in your mouth,'
    matching the prophetic commissioning imagery and echoing the prior 'my mouth'
    phrase.
