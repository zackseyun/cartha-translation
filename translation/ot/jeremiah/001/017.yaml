theological_decisions:
- issue: Retention of the embodied idiom in a prophetic commissioning context
  chosen_reading: Keep the idiom 'gird up your loins' in the main text
  alternative_readings:
  - prepare yourself
  - get ready for action
  rationale: The verse contains a concrete bodily metaphor that signals readiness,
    courage, and solemn vocation. Preserving it maintains the texture of the Hebrew
    and avoids over-dynamic flattening. A lexical alternative is preserved in a footnote
    for readability.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Original-language
    primacy over translation tradition.'
