id: JER.1.17
reference: Jeremiah 1:17
source:
  edition: WLC
  text: וְ/אַתָּה֙ תֶּאְזֹ֣ר מָתְנֶ֔י/ךָ וְ/קַמְתָּ֙ וְ/דִבַּרְתָּ֣ אֲלֵי/הֶ֔ם אֵ֛ת
    כָּל אֲשֶׁ֥ר אָנֹכִ֖י אֲצַוֶּ֑/ךָּ אַל תֵּחַת֙ מִ/פְּנֵי/הֶ֔ם פֶּֽן אֲחִתְּ/ךָ֖
    לִ/פְנֵי/הֶֽם־־־׃
translation:
  text: But you, gird up your loins, and arise and speak to them all that I command
    you. Do not be dismayed before them, lest I dismay you before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew idiom: ''gird up your loins,'' that is, prepare yourself for action.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּאְזֹר מָתְנֶיךָ
  chosen: gird up your loins
  alternatives:
  - prepare yourself
  - tie up your robes
  lexicon: HALOT
  rationale: The Hebrew idiom literally refers to fastening one's garments around
    the waist for action. The literal rendering preserves the vivid metaphor and prophetic
    solemnity; more dynamic alternatives capture the sense but lose the imagery.
- source_word: וְקַמְתָּ
  chosen: arise
  alternatives:
  - stand up
  - get up
  lexicon: HALOT
  rationale: Qal of קום here functions as a commissioning imperative-like sequence.
    'Arise' preserves the elevated tone and fits the prophetic call context better
    than the more colloquial 'get up.'
- source_word: וְדִבַּרְתָּ אֲלֵיהֶם
  chosen: speak to them
  alternatives:
  - declare to them
  - tell them
  lexicon: HALOT
  rationale: '''Speak to them'' is the most direct and contextually appropriate rendering
    of דבר with אל. ''Declare'' is possible but slightly stronger than the base verb
    requires.'
- source_word: אֵת כָּל אֲשֶׁר אָנֹכִי אֲצַוֶּךָּ
  chosen: all that I command you
  alternatives:
  - everything that I command you
  - all that I will command you
  lexicon: HALOT
  rationale: The phrase emphasizes total fidelity to the divine commission. Present
    'I command' works naturally in English for the Hebrew imperfect in this directive
    context; 'everything' is possible but 'all that' is slightly more formal and compact.
- source_word: אַל תֵּחַת
  chosen: Do not be dismayed
  alternatives:
  - do not be shattered
  - do not be terrified
  - do not be broken down
  lexicon: HALOT
  rationale: חתת in the Niphal commonly conveys being dismayed, shattered, or intimidated.
    'Be dismayed' best matches the parallel warning that follows and preserves the
    wordplay with the Hiphil in the next clause.
- source_word: מִפְּנֵיהֶם
  chosen: before them
  alternatives:
  - because of them
  - in their presence
  lexicon: HALOT
  rationale: Literally 'from before them,' an idiom expressing fear in the face of
    opponents. 'Before them' preserves both the spatial and confrontational nuance
    and matches the repeated phrase in the final clause.
- source_word: פֶּן אֲחִתְּךָ
  chosen: lest I dismay you
  alternatives:
  - or I will dismay you
  - lest I shatter you
  - or I will terrify you
  lexicon: HALOT
  rationale: 'The Hiphil of חתת creates a deliberate wordplay with the previous Niphal:
    if Jeremiah is dismayed before them, God will dismay him. ''Lest I dismay you''
    preserves both the lexical repetition and the warning force. Some English versions
    smooth this to ''or I will terrify you,'' but that weakens the rhetorical echo.'
- source_word: וְאַתָּה
  chosen: But you
  alternatives:
  - And you
  - As for you
  lexicon: HALOT
  rationale: The conjunction plus pronoun marks a strong transition and contrast from
    the preceding reassurance to direct commission. 'But you' captures the discourse
    shift more clearly than simple 'And you.'
