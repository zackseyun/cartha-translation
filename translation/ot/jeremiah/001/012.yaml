theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Potentially interpretive force of דָּבָר in prophetic context
  chosen_reading: my word
  alternative_readings:
  - my promise
  - my message
  rationale: The text does not explicitly narrow דָּבָר to promise alone; 'word' preserves the broader semantic range and avoids importing a more specific doctrinal nuance than the Hebrew states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
