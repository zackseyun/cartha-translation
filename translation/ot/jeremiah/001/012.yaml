theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Per doctrine, the default rendering
    is 'the LORD' rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH | Default English:
    the LORD'
- issue: Potentially interpretive force of דָּבָר in prophetic context
  chosen_reading: my word
  alternative_readings:
  - my promise
  - my message
  rationale: The text does not explicitly narrow דָּבָר to promise alone; 'word' preserves
    the broader semantic range and avoids importing a more specific doctrinal nuance
    than the Hebrew states.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
