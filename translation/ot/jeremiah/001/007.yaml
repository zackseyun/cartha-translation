id: JER.1.7
reference: Jeremiah 1:7
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֵלַ֔/י אַל תֹּאמַ֖ר נַ֣עַר אָנֹ֑כִי כִּ֠י עַֽל כָּל אֲשֶׁ֤ר אֶֽשְׁלָחֲ/ךָ֙ תֵּלֵ֔ךְ וְ/אֵ֛ת כָּל אֲשֶׁ֥ר אֲצַוְּ/ךָ֖ תְּדַבֵּֽר־־־־׃
translation:
  text: But Yahweh said to me, “Do not say, ‘I am a youth,’ for to all to whom I send you, you shall go, and all that I command you, you shall speak.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I am a young man,” “I am a boy.” The Hebrew נַעַר can denote a range of youthfulness or inexperience.
    reason: lexical_alternative
  - marker: b
    text: Or “wherever I send you, you shall go.” The Hebrew expression can be understood more generally of every destination or assignment to which the LORD sends Jeremiah.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional small-caps covenantal substitute in English rather than transliteration.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard narrative rendering of אמר in wayyiqtol. 'Said' fits direct discourse naturally in modern English.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Straightforward prepositional phrase; modern English prefers 'to me'.
- source_word: אַל תֹּאמַר
  chosen: Do not say
  alternatives:
  - Do not keep saying
  - You must not say
  lexicon: HALOT
  rationale: אַל with imperfect/jussive gives a prohibition. 'Do not say' is the most natural and sufficiently precise rendering.
- source_word: נַעַר
  chosen: youth
  alternatives:
  - boy
  - young man
  - child
  lexicon: HALOT
  rationale: נַעַר can cover a range from child to young man. Here Jeremiah's objection concerns his youth/inexperience rather than literal childhood, so 'youth' best captures the sense without overstating age.
- source_word: אָנֹכִי
  chosen: I am
  alternatives:
  - I
  lexicon: HALOT
  rationale: English requires the copula in the quoted self-description; the pronoun is naturally represented as 'I am' in context.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - rather
  lexicon: HALOT
  rationale: Introduces the reason Jeremiah must not object. 'For' preserves the explanatory force and suits the elevated but readable style.
- source_word: עַל כָּל אֲשֶׁר אֶשְׁלָחֲךָ
  chosen: to all to whom I send you
  alternatives:
  - wherever I send you
  - to everyone to whom I send you
  - upon all that I send you to
  lexicon: HALOT
  rationale: The Hebrew literally has 'upon/to all that I send you,' an idiom meaning the full range of those/places to which he is commissioned. 'To all to whom I send you' preserves the object-oriented sense better than the more generalized 'wherever I send you,' though that is a plausible smoothing.
- source_word: תֵּלֵךְ
  chosen: you shall go
  alternatives:
  - you will go
  - go
  lexicon: HALOT
  rationale: Imperfect here expresses the commanded future/result of divine commissioning. 'You shall go' preserves the authoritative tone.
- source_word: וְאֵת כָּל אֲשֶׁר אֲצַוְּךָ
  chosen: and all that I command you
  alternatives:
  - and everything that I command you
  - and whatever I command you
  lexicon: HALOT
  rationale: Retains the comprehensive force of כָּל while keeping the syntax close to the Hebrew. 'Command' is stronger and more accurate than 'tell' or 'instruct' here.
- source_word: תְּדַבֵּר
  chosen: you shall speak
  alternatives:
  - you shall say
  - you must speak
  lexicon: HALOT
  rationale: דבר in the piel commonly means 'speak.' 'You shall speak' mirrors the parallel with 'you shall go' and preserves the solemn commission formula.
- source_word: רצף הדיבור כולו
  chosen: But the LORD said to me, “Do not say, ‘I am only a youth,’ for to all to whom I send you, you shall go, and all that I command you, you shall speak.”
  alternatives:
  - And the LORD said to me, “Do not say, ‘I am a youth’; for wherever I send you, you shall go, and whatever I command you, you shall speak.”
  rationale: Chose 'But' rather than 'And' to reflect the discourse contrast with Jeremiah's objection in the previous verse. Added 'only' to make explicit the dismissive force implied in the objection ('I am merely a youth'), without exceeding the sense of the Hebrew.
