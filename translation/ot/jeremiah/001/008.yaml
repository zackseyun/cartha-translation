id: JER.1.8
reference: Jeremiah 1:8
source:
  edition: WLC
  text: אַל תִּירָ֖א מִ/פְּנֵי/הֶ֑ם כִּֽי אִתְּ/ךָ֥ אֲנִ֛י לְ/הַצִּלֶ֖/ךָ נְאֻם יְהוָֽה־־־׃
translation:
  text: Do not be afraid of them, for I am with you to deliver you, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'from before them'; the idiom means 'of them' or 'because
      of them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to rescue you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Must not
  lexicon: HALOT
  rationale: Negative particle used with the imperfect/jussive to express prohibition.
    Simple English prohibition is most natural here.
- source_word: תִּירָא
  chosen: be afraid
  alternatives:
  - fear
  - be in fear
  lexicon: HALOT
  rationale: From ירא, here a 2ms imperfect/jussive under אַל. 'Be afraid' is idiomatic
    modern English for a prohibition against fear.
- source_word: מִפְּנֵיהֶם
  chosen: of them
  alternatives:
  - before them
  - because of them
  - in their presence
  lexicon: HALOT
  rationale: Literally 'from before their face/presence.' In this idiom with ירא,
    English commonly expresses the object of fear as 'of them.' This preserves the
    sense without awkward literalism.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground for the prohibition. 'For' fits the explanatory
    relationship in smooth English.
- source_word: אִתְּךָ אֲנִי
  chosen: I am with you
  alternatives:
  - I am with you personally
  - I am beside you
  lexicon: HALOT
  rationale: The pronoun order is emphatic in Hebrew, but standard English conveys
    the sense well as 'I am with you.' The reassurance of divine presence is central.
- source_word: לְהַצִּלְךָ
  chosen: to deliver you
  alternatives:
  - to rescue you
  - to save you
  lexicon: HALOT
  rationale: From נצל in the Hiphil, meaning to snatch away, rescue, or deliver. 'Deliver'
    is a strong, established rendering in prophetic contexts and avoids over-narrowing
    to either physical rescue alone ('rescue') or soteriological salvation ('save').
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  - says
  lexicon: HALOT
  rationale: Prophetic formula marking a solemn divine utterance. 'Declares' is readable
    modern English and preserves the formal prophetic tone better than the flatter
    'says.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following Jewish reverence tradition and longstanding English convention.
