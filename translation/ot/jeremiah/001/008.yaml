theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for יְהוָה. This also aligns with the prophetic formula 'declares the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of deliverance in לְהַצִּלְךָ
  chosen_reading: to deliver you
  alternative_readings:
  - to rescue you
  - to save you
  rationale: The verse promises YHWH's protective intervention for Jeremiah in his
    prophetic mission. 'Deliver' preserves the broad sense of divine rescue without
    importing specifically spiritual salvation language not demanded by the immediate
    context.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
