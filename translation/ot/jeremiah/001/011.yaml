id: JER.1.11
reference: Jeremiah 1:11
source:
  edition: WLC
  text: וַ/יְהִ֤י דְבַר יְהוָה֙ אֵלַ֣/י לֵ/אמֹ֔ר מָה אַתָּ֥ה רֹאֶ֖ה יִרְמְיָ֑הוּ וָ/אֹמַ֕ר
    מַקֵּ֥ל שָׁקֵ֖ד אֲנִ֥י רֹאֶֽה־־׃
translation:
  text: And the word of the LORD came to me, saying, “What do you see, Jeremiah?”
    And I said, “I see a branch of an almond tree.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a rod of almond wood.” The Hebrew may denote a staff/rod as well as
      a branch; the vision's wordplay continues in the next verse between “almond”
      (shaqed) and “watching” (shoqed).
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - Now ... came to pass
  lexicon: HALOT
  rationale: The verb introduces a new narrative moment. In English, rendering it
    together with דְבַר יְהוָה as 'And the word of the LORD came' is idiomatic and
    preserves the standard prophetic formula without woodenly retaining 'it happened.'
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic expression for divine revelation. 'Word'
    preserves the formal linkage with prophetic call narratives better than the more
    interpretive 'message.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Simple directional preposition with first-person suffix; 'to me' is clear
    modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: This infinitive introduces the direct speech that follows. 'Saying' is
    concise and preserves the Hebrew discourse structure.
- source_word: מָה אַתָּה רֹאֶה
  chosen: What do you see
  alternatives:
  - What are you seeing
  lexicon: HALOT
  rationale: The Hebrew asks a direct question with the participle רֹאֶה. English
    simple present is the most natural equivalent here.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: וָאֹמַר
  chosen: And I said
  alternatives:
  - Then I said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol. 'And I said' preserves the sequence straightforwardly.
- source_word: מַקֵּל
  chosen: branch
  alternatives:
  - rod
  - staff
  - shoot
  lexicon: HALOT
  rationale: Although מַקֵּל often means 'staff' or 'rod,' in this vision context
    the object is from an almond tree and is best understood as a branch/twig. 'Branch'
    reads naturally and fits the imagery. 'Rod' is possible and traditional, but in
    contemporary English it may suggest a manufactured stick rather than a tree branch.
- source_word: שָׁקֵד
  chosen: an almond tree
  alternatives:
  - almond
  - almond branch
  lexicon: HALOT
  rationale: The noun denotes the almond tree/almond wood. Because English normally
    requires an explicit tree reference when modifying 'branch,' 'a branch of an almond
    tree' is clearer than the more compressed 'an almond branch.' This also prepares
    for the wordplay with שֹׁקֵד in the next verse.
- source_word: אֲנִי רֹאֶה
  chosen: I see
  alternatives:
  - I am seeing
  lexicon: HALOT
  rationale: The explicit pronoun adds emphasis in Hebrew, but English does not need
    to reproduce that emphasis awkwardly. 'I see' is the natural rendering of the
    reply.
