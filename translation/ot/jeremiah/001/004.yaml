id: JER.1.4
reference: Jeremiah 1:4
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: Now the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ... came
  alternatives:
  - And it happened
  - Then ... came
  - Now it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the narrative development. In English,
    a literal 'and it happened' is wooden here; 'Now' carries the discourse-transition
    function, while 'came' is supplied with the following noun phrase to produce natural
    English without losing the eventive sense.
- source_word: דְבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: In the prophetic formula דְבַר יְהוָה, 'the word' is the standard and
    most transparent rendering, preserving the formal link to prophetic revelation.
    'Message' is possible but less textually anchored.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention
    while signaling the covenant name.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition אֶל with 1cs suffix straightforwardly means 'to me.'
    'Unto me' is archaic and less suitable for readable modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - 'thus:'
  - 'as follows:'
  lexicon: HALOT
  rationale: The infinitive construct לֵאמֹר regularly introduces direct speech. 'Saying'
    preserves the Hebrew formula and prepares for the following quotation in the next
    verse.
