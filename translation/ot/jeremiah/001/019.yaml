theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Following the project's contested-terms
    policy, it is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of divine protection promise
  chosen_reading: they will not prevail over you
  alternative_readings:
  - they will not overcome you
  rationale: The text promises that Jeremiah's opponents will fail against him because
    of the LORD's presence and deliverance. 'Prevail over you' preserves the promise
    of effective divine protection without overstating it into absolute absence of
    suffering.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
