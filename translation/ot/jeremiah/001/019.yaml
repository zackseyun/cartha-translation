id: JER.1.19
reference: Jeremiah 1:19
source:
  edition: WLC
  text: וְ/נִלְחֲמ֥וּ אֵלֶ֖י/ךָ וְ/לֹא י֣וּכְלוּ לָ֑/ךְ כִּֽי אִתְּ/ךָ֥ אֲנִ֛י נְאֻם
    יְהוָ֖ה לְ/הַצִּילֶֽ/ךָ־־־׃פ
translation:
  text: They will fight against you, but they will not prevail over you, for I am
    with you, declares the LORD, to deliver you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they will not overcome you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'declares the LORD'; the divine name is YHWH.
    reason: alternative_reading
  - marker: c
    text: Or 'to rescue you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִלְחֲמוּ
  chosen: they will fight
  alternatives:
  - they will wage war
  - they will battle
  lexicon: HALOT
  rationale: The Niphal of לחם here denotes engaging in conflict. 'Fight' is natural
    modern English and preserves the adversarial force without overstating it as full-scale
    war.
- source_word: אֵלֶיךָ
  chosen: against you
  alternatives:
  - to you
  - with you
  lexicon: HALOT
  rationale: With נלחם, the preposition אֶל commonly carries hostile direction; in
    English 'fight against you' best expresses the idiom.
- source_word: וְלֹא יוּכְלוּ לָךְ
  chosen: but they will not prevail over you
  alternatives:
  - but they will not overcome you
  - but they will not be able against you
  lexicon: HALOT
  rationale: יכל plus ל here expresses inability in relation to Jeremiah. 'Prevail
    over you' is idiomatic English that captures failure to succeed against him, not
    mere lack of physical strength.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for their failure. 'For' fits the elevated prophetic
    style while remaining clear.
- source_word: אִתְּךָ אֲנִי
  chosen: I am with you
  alternatives:
  - I am beside you
  lexicon: HALOT
  rationale: This is the standard covenantal assurance formula. 'With you' preserves
    both the literal sense and the theological resonance of divine presence.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - utterance of the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula marking divine speech. 'Declares the LORD'
    is clear, idiomatic, and widely understood. Per doctrine, יְהוָה is rendered 'the
    LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: The doctrine file specifies the default rendering of the divine name
    as 'the LORD' to follow Jewish reverence tradition and the Septuagintal pattern.
- source_word: לְהַצִּילֶךָ
  chosen: to deliver you
  alternatives:
  - to rescue you
  - to save you
  lexicon: HALOT
  rationale: The Hiphil of נצל means to snatch away or rescue from danger. 'Deliver
    you' fits prophetic diction and avoids importing soteriological overtones that
    'save you' might suggest in English.
