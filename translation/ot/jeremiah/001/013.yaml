id: JER.1.13
reference: Jeremiah 1:13
source:
  edition: WLC
  text: וַ/יְהִ֨י דְבַר יְהוָ֤ה אֵלַ/י֙ שֵׁנִ֣ית לֵ/אמֹ֔ר מָ֥ה אַתָּ֖ה רֹאֶ֑ה וָ/אֹמַ֗ר
    סִ֤יר נָפ֨וּחַ֙ אֲנִ֣י רֹאֶ֔ה וּ/פָנָ֖י/ו מִ/פְּנֵ֥י צָפֽוֹנָ/ה־׀׃
translation:
  text: And the word of the LORD came to me a second time, saying, “What do you see?”
    And I said, “I see a boiling pot, and its face is from the direction of the north.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a seething pot”; the Hebrew participle can suggest a pot being blown
      upon or fanned into a boil.
    reason: lexical_alternative
  - marker: b
    text: Literally “its face is from the face of the north.” The expression likely
      refers to the pot’s exposed side or opening being oriented with reference to
      the north.
    reason: alternative_reading
lexical_decisions:
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. יְהוָה is rendered 'the LORD' per doctrine
    guidance; דָּבָר here is best kept as 'word' rather than the more interpretive
    'message' to preserve the formulaic expression.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine table for the divine name.
- source_word: שֵׁנִית
  chosen: a second time
  alternatives:
  - again
  lexicon: HALOT
  rationale: The adverb explicitly marks sequence; 'a second time' is more precise
    than the looser 'again'.
- source_word: מָה אַתָּה רֹאֶה
  chosen: What do you see?
  alternatives:
  - What are you seeing?
  lexicon: HALOT
  rationale: Idiomatic English present fits the Hebrew participle in direct discourse.
- source_word: סִיר
  chosen: pot
  alternatives:
  - cauldron
  - cooking pot
  lexicon: HALOT
  rationale: A general vessel for cooking is intended. 'Pot' is clear modern English;
    'cauldron' may sound overly archaic or stylized.
- source_word: נָפוּחַ
  chosen: boiling
  alternatives:
  - blown upon
  - kindled
  - seething
  lexicon: HALOT
  rationale: The participle literally suggests something blown/fanned, likely by fire
    beneath, yielding the sense of a pot at a boil. 'Boiling' communicates the image
    naturally in English while preserving the vision's force.
- source_word: וּפָנָיו
  chosen: its face
  alternatives:
  - its front
  - its opening
  - its mouth
  lexicon: HALOT
  rationale: פָּנִים literally means 'face.' Here it refers to the exposed/front side
    or opening of the pot. 'Its face' is retained in the main text to stay close to
    the Hebrew imagery, though the idiomatic sense is clarified by the following directional
    phrase.
- source_word: מִפְּנֵי צָפוֹנָה
  chosen: from the direction of the north
  alternatives:
  - away from the north
  - toward the south from the north side
  lexicon: HALOT
  rationale: The phrase is difficult. Literally it is 'from the face of the north.'
    In context, it indicates orientation with reference to the north, the direction
    from which disaster will come in the next verse. 'From the direction of the north'
    preserves that linkage without over-specifying the exact geometry of the pot.
