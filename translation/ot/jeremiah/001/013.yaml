theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH and aligns with the prophetic
    formula's conventional reverential rendering.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of the pot's orientation
  chosen_reading: its face is from the direction of the north
  alternative_readings:
  - its face is away from the north
  - it is tilted from the north
  rationale: The Hebrew is image-rich and somewhat ambiguous. The chosen rendering
    preserves the directional association with the north without prematurely resolving
    the exact mechanics of the vision, which are explained in the following verse.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
