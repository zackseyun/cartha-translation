id: JER.1.1
reference: Jeremiah 1:1
source:
  edition: WLC
  text: דִּבְרֵ֥י יִרְמְיָ֖הוּ בֶּן חִלְקִיָּ֑הוּ מִן הַ/כֹּֽהֲנִים֙ אֲשֶׁ֣ר בַּ/עֲנָת֔וֹת
    בְּ/אֶ֖רֶץ בִּנְיָמִֽן־־׃
translation:
  text: The words of Yirmeyahu son of Hilqiyahu, one of the priests who were in Anathoth,
    in the land of Benjamin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Traditional English versions usually read 'Jeremiah son of Hilkiah.' This
      draft transliterates the Hebrew names more directly as 'Yirmeyahu' and 'Hilqiyahu'
      in keeping with the project's policy for personal names.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  chosen: The words of
  alternatives:
  - The words
  - The matters of
  - The accounts of
  lexicon: HALOT
  rationale: Construct plural of דָּבָר introducing the book heading. 'The words of'
    is the natural English equivalent for a superscription and preserves the broad
    semantic range without overinterpreting it as only spoken oracles.
- source_word: יִרְמְיָהוּ
  chosen: Yirmeyahu
  alternatives:
  - Jeremiah
  lexicon: HALOT
  rationale: Per translation philosophy, personal names are transliterated rather
    than translated according to inherited English tradition. 'Yirmeyahu' reflects
    the Hebrew form more directly.
- source_word: בֶּן
  chosen: son of
  alternatives:
  - the son of
  lexicon: HALOT
  rationale: Standard genealogical linkage. English omits the article naturally.
- source_word: חִלְקִיָּהוּ
  chosen: Hilqiyahu
  alternatives:
  - Hilkiah
  lexicon: HALOT
  rationale: Personal name transliterated from Hebrew in keeping with project policy;
    'Hilqiyahu' more closely reflects the consonantal form than the traditional 'Hilkiah.'
- source_word: מִן הַכֹּהֲנִים
  chosen: one of the priests
  alternatives:
  - from the priests
  - of the priests
  - among the priests
  lexicon: HALOT
  rationale: 'The preposition מִן with a plural group here is partitive: Jeremiah
    is identified as belonging to the priestly group. ''One of the priests'' expresses
    this idiom clearly in modern English.'
- source_word: אֲשֶׁר
  chosen: who were
  alternatives:
  - who were from
  - who were
  lexicon: HALOT
  rationale: Relative pronoun linking 'the priests' to their location. English requires
    an explicit verb in this relative clause; 'were' is supplied idiomatically.
- source_word: בַּעֲנָתוֹת
  chosen: in Anathoth
  alternatives:
  - at Anathoth
  lexicon: HALOT
  rationale: Locative preposition with place name. 'In Anathoth' is the most natural
    English rendering.
- source_word: בְּאֶרֶץ בִּנְיָמִן
  chosen: in the land of Benjamin
  alternatives:
  - in the territory of Benjamin
  - in Benjamin's land
  lexicon: HALOT
  rationale: אֶרֶץ here denotes region/territory rather than the whole earth. 'Land
    of Benjamin' preserves the tribal-territorial sense while remaining readable.
