id: JER.9.17
reference: Jeremiah 9:17
source:
  edition: WLC
  text: וּ/תְמַהֵ֕רְנָה וְ/תִשֶּׂ֥נָה עָלֵ֖י/נוּ נֶ֑הִי וְ/תֵרַ֤דְנָה עֵינֵ֨י/נוּ֙
    דִּמְעָ֔ה וְ/עַפְעַפֵּ֖י/נוּ יִזְּלוּ מָֽיִם־׃
translation:
  text: Let them hurry and raise a lament over us, so that our eyes may run down with
    tears and our eyelids flow with water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'water,' a poetic parallel to 'tears.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּתְמַהֵרְנָה
  chosen: Let them hurry
  alternatives:
  - And let them hasten
  - Let them quickly come
  lexicon: HALOT
  rationale: Imperative/jussive-like 3fp from מהר in context of summoning the mourning
    women; 'Let them hurry' preserves the volitional force and urgency in natural
    English.
- source_word: וְתִשֶּׂנָה עָלֵינוּ נֶהִי
  chosen: and raise a lament over us
  alternatives:
  - and take up a wailing over us
  - and lift up a dirge for us
  lexicon: HALOT
  rationale: נשא with נהי idiomatically means to lift up or raise a lamentation. 'Raise
    a lament' is idiomatic English and preserves the formal image better than a looser
    paraphrase.
- source_word: נֶהִי
  chosen: a lament
  alternatives:
  - wailing
  - dirge
  lexicon: HALOT
  rationale: The noun denotes lamentation or wailing. 'Lament' is broad, dignified,
    and fits the prophetic context; 'dirge' is possible but more specialized.
- source_word: וְתֵרַדְנָה עֵינֵינוּ דִמְעָה
  chosen: so that our eyes may run down with tears
  alternatives:
  - and our eyes may go down in tears
  - and tears may descend from our eyes
  lexicon: HALOT
  rationale: ירד with 'eyes' and 'tear' expresses tears streaming downward. English
    requires a more idiomatic rendering; 'run down with tears' preserves the imagery
    without woodenness.
- source_word: דִמְעָה
  chosen: tears
  alternatives:
  - tear
  lexicon: HALOT
  rationale: Although singular in Hebrew, it is often collective. English idiom prefers
    the plural here.
- source_word: וְעַפְעַפֵּינוּ יִזְּלוּ מָיִם
  chosen: and our eyelids flow with water
  alternatives:
  - and our eyelids stream water
  - and water pours from our eyelids
  lexicon: HALOT
  rationale: זלל/נזל imagery is of flowing or streaming liquid. 'Flow with water'
    keeps the poetic parallelism and avoids overinterpreting 'water' as a mere stylistic
    substitute for tears, though that is clearly the sense.
- source_word: מָיִם
  chosen: water
  alternatives:
  - tears
  lexicon: HALOT
  rationale: The Hebrew says 'water,' likely as poetic parallel to 'tears.' Main text
    preserves the source image; the more explicit interpretive gloss 'tears' is retained
    as an alternative.
