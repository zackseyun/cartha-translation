id: JER.9.12
reference: Jeremiah 9:12
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוָ֔ה עַל עָזְבָ/ם֙ אֶת תּ֣וֹרָתִ֔/י אֲשֶׁ֥ר נָתַ֖תִּי לִ/פְנֵי/הֶ֑ם וְ/לֹא שָׁמְע֥וּ בְ/קוֹלִ֖/י וְ/לֹא הָ֥לְכוּ בָֽ/הּ־־־־׃
translation:
  text: And Yahweh said, "Because they have forsaken my law that I set before them, and have not obeyed my voice or walked in it,"
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "my instruction." The Hebrew torah can denote instruction broadly, though here it carries covenantal force.
    reason: lexical_alternative
  - marker: b
    text: Or "have not obeyed my voice." The Hebrew idiom "listen to my voice" often includes the sense of obedience.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name while following established English convention.
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And ... said' is a natural, sufficiently formal rendering in context.
- source_word: עַל עָזְבָם
  chosen: Because they have forsaken
  alternatives:
  - On account of their forsaking
  - For they abandoned
  lexicon: HALOT
  rationale: עַל here introduces the reason or ground for the judgment; 'because' communicates this clearly. עזב means 'forsake/abandon'; 'forsaken' preserves the covenantal weight better than the flatter 'left.'
- source_word: תּוֹרָתִי
  chosen: my law
  alternatives:
  - my instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction' broadly, but in Jeremiah this often carries covenantal-legal force. 'My law' is the more natural and weighty rendering here, while 'instruction' remains a viable lexical alternative.
- source_word: אֲשֶׁר נָתַתִּי לִפְנֵיהֶם
  chosen: that I set before them
  alternatives:
  - that I gave before them
  - that I placed before them
  lexicon: HALOT
  rationale: Although נתן is commonly 'give,' the idiom 'give/set before' means to place before someone for observance. 'Set before them' is idiomatic English and fits the covenant context.
- source_word: וְלֹא שָׁמְעוּ בְּקוֹלִי
  chosen: and have not listened to my voice
  alternatives:
  - and did not obey my voice
  - and did not listen to my voice
  lexicon: HALOT
  rationale: שמע with בְּקוֹל can mean both hearing and obeying. 'Listened to my voice' preserves the Hebrew imagery and leaves the obedience nuance implicit rather than over-interpreting.
- source_word: וְלֹא הָלְכוּ בָהּ
  chosen: or walked in it
  alternatives:
  - or lived by it
  - or followed it
  lexicon: HALOT
  rationale: הלך ב often functions metaphorically for conduct according to a standard. 'Walked in it' preserves the biblical metaphor and refers back naturally to 'my law' (feminine singular).
