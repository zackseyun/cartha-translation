theological_decisions:
- issue: Rendering of תּוֹרָה in covenant context
  chosen_reading: my law
  alternative_readings:
  - my instruction
  rationale: The verse emphasizes covenant breach and disobedience to what the LORD placed before the people. 'Law' better preserves that juridical-covenantal force, while 'instruction' is preserved as a lexical alternative.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Whether to make שׁמע explicitly 'obey'
  chosen_reading: have not listened to my voice
  alternative_readings:
  - have not obeyed my voice
  rationale: The Hebrew expression includes obedience as a likely implication, but the wording itself is 'listen to my voice.' The translation preserves the theological tension and avoids importing a more interpretive gloss into the main text.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
