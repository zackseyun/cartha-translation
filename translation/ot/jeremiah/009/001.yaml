theological_decisions:
- issue: Whether מְנָאֲפִים should be softened to a purely metaphorical charge of
    covenant unfaithfulness
  chosen_reading: Retain the concrete term 'adulterers' in the main text, allowing
    prophetic metaphorical resonance without replacing the lexical meaning.
  alternative_readings:
  - unfaithful people
  - those who are spiritually adulterous
  rationale: Jeremiah often uses adultery language both literally and metaphorically.
    The translation should preserve that tension rather than resolve it by choosing
    only the metaphorical sense.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
