id: JER.9.1
reference: Jeremiah 9:1
source:
  edition: WLC
  text: מִֽי יִתְּנֵ֣/נִי בַ/מִּדְבָּ֗ר מְלוֹן֙ אֹֽרְחִ֔ים וְ/אֶֽעֶזְבָה֙ אֶת עַמִּ֔/י
    וְ/אֵלְכָ֖ה מֵֽ/אִתָּ֑/ם כִּ֤י כֻלָּ/ם֙ מְנָ֣אֲפִ֔ים עֲצֶ֖רֶת בֹּגְדִֽים־־׃
translation:
  text: Oh, that I had a travelers' lodging place in the wilderness, so that I might
    leave my people and go away from them! For all of them are adulterers, an assembly
    of traitors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew literally, ''Who will give me in the wilderness a lodging place
      of travelers?''—an idiom expressing a wish: ''Oh, that I had...'''
    reason: lexical_alternative
  - marker: b
    text: Or 'adulterous ones'; in prophetic context this may also evoke covenant
      unfaithfulness, not only literal adultery.
    reason: alternative_reading
  - marker: c
    text: Or 'a band/company of traitors.'
    reason: lexical_alternative
  - marker: d
    text: Or "Oh, that I had in the wilderness a travelers' lodging place".
    reason: previous_rendering
lexical_decisions:
- source_word: מִי יִתְּנֵנִי
  chosen: Oh, that I had
  alternatives:
  - Who will give me
  - If only I had
  lexicon: HALOT
  rationale: The idiom literally reads 'Who will give me...?' but in context expresses
    a wish or lament. 'Oh, that I had' conveys the Hebrew idiomatic force in natural
    English without obscuring the optative sense.
- source_word: בַמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: '''Wilderness'' is a standard rendering for מִדְבָּר and fits prophetic
    diction well; ''desert'' is possible but can sound more narrowly geographical
    than the broader uncultivated-region sense.'
- source_word: מְלוֹן אֹרְחִים
  chosen: a travelers' lodging place
  alternatives:
  - a lodging place for travelers
  - a wayfarers' inn
  lexicon: HALOT
  rationale: מְלוֹן denotes a lodging place or night shelter, and אֹרְחִים refers
    to travelers/wayfarers. 'Travelers' lodging place' is clear modern English while
    preserving the image of a roadside shelter rather than a permanent home.
- source_word: וְאֶעֶזְבָה
  chosen: so that I might leave
  alternatives:
  - and I would leave
  - that I may leave
  lexicon: HALOT
  rationale: The cohortative expresses desired consequence or purpose following the
    wish. 'So that I might leave' captures the volitional nuance in idiomatic English.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard and contextually appropriate; the speaker is Jeremiah lamenting
    over Judah, so the covenantal and communal sense of 'my people' should be retained.
- source_word: וְאֵלְכָה מֵאִתָּם
  chosen: and go away from them
  alternatives:
  - and depart from them
  - and go from them
  lexicon: HALOT
  rationale: This preserves the motion verb plus separation phrase in natural English.
    'Go away from them' communicates both departure and relational distancing.
- source_word: כִּי כֻלָּם
  chosen: For all of them
  alternatives:
  - For they all
  - Because all of them
  lexicon: HALOT
  rationale: כִּי here introduces the reason for the wish. 'For all of them' keeps
    the explanatory force and emphasis on totality.
- source_word: מְנָאֲפִים
  chosen: adulterers
  alternatives:
  - those who commit adultery
  - adulterous ones
  lexicon: HALOT
  rationale: The participle from נאף most directly denotes adulterers/adulterous people.
    The term may carry both literal and metaphorical overtones in prophetic literature,
    but the lexical core should remain explicit in the main text.
- source_word: עֲצֶרֶת
  chosen: an assembly of
  alternatives:
  - a band of
  - a company of
  - a gathering of
  lexicon: HALOT
  rationale: Though often used for an assembly or solemn gathering, here it functions
    appositionally with בֹּגְדִים. 'An assembly of' preserves the collective noun
    and the biting irony of a gathered community defined by treachery.
- source_word: בֹּגְדִים
  chosen: traitors
  alternatives:
  - the treacherous
  - faithless men
  - betrayers
  lexicon: HALOT
  rationale: From בגד, the sense is acting treacherously or faithlessly. 'Traitors'
    is concise and forceful in English, fitting the prophetic denunciation.
