theological_decisions:
- issue: Rendering of אֲבוֹתָם
  chosen_reading: their fathers
  alternative_readings:
  - their ancestors
  rationale: The source text is explicitly masculine plural ('fathers'). Following
    the project's gender-accurate principle, the main text retains 'fathers' rather
    than neutralizing to 'ancestors,' while preserving the broader generational sense
    in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
