id: JER.9.13
reference: Jeremiah 9:13
source:
  edition: WLC
  text: וַ/יֵּ֣לְכ֔וּ אַחֲרֵ֖י שְׁרִר֣וּת לִבָּ֑/ם וְ/אַחֲרֵי֙ הַ/בְּעָלִ֔ים אֲשֶׁ֥ר
    לִמְּד֖וּ/ם אֲבוֹתָֽ/ם׃ס
translation:
  text: They went after the stubbornness of their heart and after the Baals, which
    their fathers taught them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their ancestors.' The Hebrew is literally 'their fathers,' referring
      to previous generations.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלְכוּ
  chosen: They went after
  alternatives:
  - They walked after
  - They followed
  lexicon: HALOT
  rationale: הלך literally means 'go/walk,' and with אַחֲרֵי forms the idiom 'go after,
    follow.' 'Went after' preserves the Hebrew imagery while sounding natural in English.
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: The preposition marks pursuit or allegiance. 'After' keeps the repeated
    Hebrew structure in both clauses.
- source_word: שְׁרִרוּת
  chosen: stubbornness
  alternatives:
  - hardness
  - obstinacy
  lexicon: HALOT
  rationale: In Jeremiah this noun denotes self-willed obstinacy or stubbornness.
    'Stubbornness' is the clearest modern English equivalent and fits the moral sense
    of the context.
- source_word: לִבָּם
  chosen: of their heart
  alternatives:
  - of their hearts
  lexicon: HALOT
  rationale: Hebrew often uses the singular 'heart' with a plural possessive to denote
    each person's inner will/disposition collectively. 'Of their heart' preserves
    the singular form of the source while remaining intelligible in English.
- source_word: וְאַחֲרֵי
  chosen: and after
  alternatives:
  - and following
  lexicon: HALOT
  rationale: The conjunction plus repeated preposition intentionally parallels the
    first object of pursuit; preserving 'and after' reflects the Hebrew rhetoric.
- source_word: הַבְּעָלִים
  chosen: the Baals
  alternatives:
  - the Baal idols
  - the lords
  lexicon: HALOT
  rationale: This plural refers to the various local manifestations/images of the
    Canaanite deity Baal, not to generic 'lords.' 'The Baals' is the standard and
    most transparent rendering.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces the relative clause modifying 'the Baals.' 'Which' reads smoothly
    with an impersonal plural referent.
- source_word: לִמְּדוּם
  chosen: taught them
  alternatives:
  - trained them in
  - instructed them in
  lexicon: HALOT
  rationale: The verb למד in the piel means 'teach.' The pronominal suffix gives the
    object 'them.' 'Taught them' is direct and sufficient without adding interpretive
    material.
- source_word: אֲבוֹתָם
  chosen: their fathers
  alternatives:
  - their ancestors
  lexicon: HALOT
  rationale: The Hebrew literally says 'their fathers.' In this context it refers
    to forefathers/previous generations, but the translation philosophy prefers gender-accurate
    renderings matching the source unless context requires otherwise. The broader
    sense can be noted in a footnote.
