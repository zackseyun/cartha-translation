id: JER.9.25
reference: Jeremiah 9:25
source:
  edition: WLC
  text: עַל מִצְרַ֣יִם וְ/עַל יְהוּדָ֗ה וְ/עַל אֱד֞וֹם וְ/עַל בְּנֵ֤י עַמּוֹן֙ וְ/עַל
    מוֹאָ֔ב וְ/עַל֙ כָּל קְצוּצֵ֣י פֵאָ֔ה הַ/יֹּשְׁבִ֖ים בַּ/מִּדְבָּ֑ר כִּ֤י כָל
    הַ/גּוֹיִם֙ עֲרֵלִ֔ים וְ/כָל בֵּ֥ית יִשְׂרָאֵ֖ל עַרְלֵי לֵֽב־־־־־־־־־׃ס
translation:
  text: against Egypt, and against Judah, and against Edom, and against the sons of
    Ammon, and against Moab, and against all those with the corners of their hair
    cut off, who dwell in the wilderness; for all the nations are uncircumcised, and
    all the house of Israel are uncircumcised in heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “all who clip the corners of their hair”; the Hebrew likely refers to
      a distinctive hairstyle of desert peoples.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - concerning
  lexicon: HALOT
  rationale: In this judgment context, עַל introduces the objects of punishment announced
    in the previous verse; 'against' best conveys hostile judicial force in natural
    English.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard transliteration/English name for the nation.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard English form of the tribal/national name.
- source_word: אֱדוֹם
  chosen: Edom
  lexicon: HALOT
  rationale: Standard English form of the nation name.
- source_word: בְּנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the children of Ammon
  lexicon: HALOT
  rationale: A more formally transparent rendering preserves the Hebrew construction
    'sons of Ammon.' 'Ammonites' is idiomatic but less explicit. Gender-accurate policy
    favors retaining the masculine form where it reflects the source wording.
- source_word: מוֹאָב
  chosen: Moab
  lexicon: HALOT
  rationale: Standard English form of the nation name.
- source_word: כָּל קְצוּצֵי פֵאָה
  chosen: all those with the corners of their hair cut off
  alternatives:
  - all who clip the corners of their hair
  - all with shaved temples
  lexicon: HALOT
  rationale: The phrase literally refers to those 'cut at the edge/corner,' likely
    a distinctive hairstyle associated with desert peoples. This rendering preserves
    the concrete image without overcommitting to a specific ethnographic reconstruction.
- source_word: הַיֹּשְׁבִים בַּמִּדְבָּר
  chosen: who dwell in the wilderness
  alternatives:
  - who live in the desert
  lexicon: HALOT
  rationale: '''Dwell in the wilderness'' is slightly more formal and fits prophetic
    style while remaining clear. ''Wilderness'' also preserves the broader semantic
    range of מִדְבָּר beyond sandy desert alone.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the rationale for the judgment list; 'for' is concise and
    natural.
- source_word: כָל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the Gentiles
  lexicon: HALOT
  rationale: In this context the reference is to surrounding peoples/nations, not
    a Jew-Gentile theological contrast; 'nations' is therefore preferable.
- source_word: עֲרֵלִים
  chosen: uncircumcised
  lexicon: HALOT
  rationale: Literal rendering preserves the covenantal and polemical force of the
    Hebrew.
- source_word: כָל בֵּית יִשְׂרָאֵל
  chosen: all the house of Israel
  alternatives:
  - the whole house of Israel
  lexicon: HALOT
  rationale: Traditional but still clear collective expression matching the Hebrew
    idiom.
- source_word: עַרְלֵי לֵב
  chosen: uncircumcised in heart
  alternatives:
  - foreskinned of heart
  - hard-hearted and uncircumcised
  lexicon: HALOT
  rationale: This established idiom preserves the metaphor of covenantal uncleanness/inward
    rebellion without flattening it into mere psychology.
