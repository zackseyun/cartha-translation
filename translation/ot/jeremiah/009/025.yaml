theological_decisions:
- issue: Metaphorical force of Israel's condition
  chosen_reading: uncircumcised in heart
  alternative_readings:
  - spiritually uncircumcised
  - hard-hearted
  rationale: The Hebrew uses covenantal circumcision metaphorically for inward rebellion.
    Retaining the metaphor preserves theological tension between external covenant
    sign and internal condition rather than resolving it into a paraphrase.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering of בְּנֵי עַמּוֹן
  chosen_reading: the sons of Ammon
  alternative_readings:
  - the Ammonites
  rationale: The source is grammatically masculine and ethnically specific. Per the
    gender-accurate policy, the masculine form is retained where it matches source
    intent, while still functioning collectively in English.
  doctrine_reference: Translation philosophy §4
