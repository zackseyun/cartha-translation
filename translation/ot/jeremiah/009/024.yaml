theological_decisions:
- issue: Rendering the paradoxical judgment formula מוּל בְּעָרְלָה
  chosen_reading: everyone circumcised only in foreskin
  alternative_readings:
  - all the circumcised with the uncircumcised
  - everyone who is circumcised yet uncircumcised
  rationale: The Hebrew is terse and rhetorically sharp, condemning merely external
    circumcision. The chosen rendering preserves the paradox without flattening it
    into a broader interpretive paraphrase. This also avoids importing later theological
    formulations while still making the contrast intelligible.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
