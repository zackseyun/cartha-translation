id: JER.9.3
reference: Jeremiah 9:3
source:
  edition: WLC
  text: אִ֤ישׁ מֵ/רֵעֵ֨/הוּ֙ הִשָּׁמֵ֔רוּ וְ/עַל כָּל אָ֖ח אַל תִּבְטָ֑חוּ כִּ֤י כָל
    אָח֙ עָק֣וֹב יַעְקֹ֔ב וְ/כָל רֵ֖עַ רָכִ֥יל יַהֲלֹֽךְ־־־־־׃
translation:
  text: Each man, beware of his neighbor, and do not trust any brother; for every
    brother surely deceives, and every neighbor goes about as a slanderer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every brother is utterly deceitful' or 'every brother supplants.' The
      Hebrew intensifies the root עקב, which can carry the sense of deceitful overreaching.
    reason: lexical_alternative
  - marker: b
    text: '''Brother'' may refer either to a literal brother or more broadly to a
      fellow member of the community.'
    reason: lexical_alternative
  - marker: c
    text: Or 'every neighbor goes about gossiping' or 'as a talebearer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: Each man
  alternatives:
  - A man
  - Everyone
  lexicon: HALOT
  rationale: The singular noun has a distributive force in context, warning each individual.
    'Each man' preserves the masculine/generic form more closely than the gender-neutral
    'everyone,' in keeping with the gender-accurate policy.
- source_word: מֵרֵעֵהוּ
  chosen: of his neighbor
  alternatives:
  - from his friend
  - of his companion
  lexicon: HALOT
  rationale: With הִשָּׁמֵרוּ, the preposition מן marks the person one must be on
    guard against. רֵעַ can mean friend, companion, or neighbor; 'neighbor' fits the
    broader social warning and avoids implying affection that the context undermines.
- source_word: הִשָּׁמֵרוּ
  chosen: beware
  alternatives:
  - be on guard
  - guard yourselves
  lexicon: HALOT
  rationale: The Niphal imperative calls for caution or watchfulness. 'Beware' is
    concise, idiomatic English and naturally takes the following complement.
- source_word: וְעַל כָּל אָח אַל תִּבְטָחוּ
  chosen: and do not trust any brother
  alternatives:
  - and in no brother put your trust
  - and do not rely on any brother
  lexicon: HALOT
  rationale: בָּטַח means to trust or rely on. 'Any brother' captures כָּל in this
    prohibitive context. 'Brother' may denote a literal brother or a fellow member
    of the community; the English preserves that ambiguity.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the warning, so 'for' is the most natural explanatory
    conjunction.
- source_word: עָקוֹב יַעְקֹב
  chosen: surely deceives
  alternatives:
  - is utterly deceitful
  - supplants at every turn
  - deceives deceitfully
  lexicon: HALOT
  rationale: The construction intensifies the verbal idea from the root עקב, associated
    with overreaching, supplanting, or acting deceitfully. Rendering it as 'surely
    deceives' communicates the verbal force in natural English without forcing an
    awkward literal repetition. The possible wordplay with Jacob/supplanting is lexical
    but not explicit enough to reproduce in the main text.
- source_word: רֵעַ
  chosen: neighbor
  alternatives:
  - friend
  - companion
  lexicon: HALOT
  rationale: For consistency within the verse, רֵעַ is rendered the same as earlier.
    'Neighbor' suits the social setting and broadens beyond intimate friendship.
- source_word: רָכִיל
  chosen: a slanderer
  alternatives:
  - a talebearer
  - a gossip
  - one who goes about in slander
  lexicon: HALOT
  rationale: רָכִיל denotes one who traffics in slander or gossip. 'Slanderer' best
    conveys the malicious social harm in contemporary English, while 'talebearer'
    is too archaic.
- source_word: יַהֲלֹךְ
  chosen: goes about
  alternatives:
  - walks about
  - moves about
  lexicon: HALOT
  rationale: הלך here describes habitual conduct. 'Goes about' is idiomatic with 'as
    a slanderer' and conveys ongoing behavior.
