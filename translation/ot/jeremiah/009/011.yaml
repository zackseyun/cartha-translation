id: JER.9.11
reference: Jeremiah 9:11
source:
  edition: WLC
  text: מִֽי הָ/אִ֤ישׁ הֶֽ/חָכָם֙ וְ/יָבֵ֣ן אֶת זֹ֔את וַ/אֲשֶׁ֨ר דִּבֶּ֧ר פִּֽי יְהוָ֛ה אֵלָ֖י/ו וְ/יַגִּדָ֑/הּ עַל מָה֙ אָבְדָ֣ה הָ/אָ֔רֶץ נִצְּתָ֥ה כַ/מִּדְבָּ֖ר מִ/בְּלִ֖י עֹבֵֽר־־־־׃ס
translation:
  text: Who is the wise man who understands this? To whom has the mouth of Yahweh spoken, that he may declare it? Why has the land perished, laid waste like the wilderness, with no one passing through?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the mouth of the LORD,'' a prophetic idiom for the LORD''s direct speech.'
    reason: cultural_note
  - marker: b
    text: Or 'has the land been ruined' for 'has the land perished.'
    reason: lexical_alternative
  - marker: c
    text: Or 'without anyone passing through.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי הָאִישׁ הֶחָכָם
  chosen: Who is the wise man
  alternatives:
  - Who is the wise one
  - Who is the man who is wise
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine singular ('the man, the wise one'). Per the project's gender-accurate policy, 'wise man' preserves the representative masculine form rather than neutralizing it to 'person.'
- source_word: וְיָבֵן אֶת זֹאת
  chosen: who can understand this
  alternatives:
  - and understands this
  - and may understand this
  lexicon: HALOT
  rationale: The yiqtol after the interrogative has modal nuance in context, asking for the one capable of grasping the matter. 'Can understand' communicates ability without over-paraphrasing.
- source_word: וַאֲשֶׁר דִּבֶּר פִּי יְהוָה אֵלָיו
  chosen: And to whom has the mouth of the LORD spoken
  alternatives:
  - And whoever has had the mouth of the LORD speak to him
  - And he to whom the mouth of the LORD has spoken
  lexicon: HALOT
  rationale: The relative construction identifies the qualified person. Retaining 'the mouth of the LORD' preserves the Hebrew idiom and prophetic force rather than flattening it to simply 'the LORD has spoken.' 'The LORD' follows the project's default for יְהוָה.
- source_word: וְיַגִּדָהּ
  chosen: that he may declare it
  alternatives:
  - and let him declare it
  - so that he may tell it
  lexicon: HALOT
  rationale: The Hiphil conveys making known or declaring. 'Declare' fits the prophetic/public sense better than the more casual 'tell.' The suffix refers back to 'this' or the matter under discussion, hence 'it.'
- source_word: עַל מָה
  chosen: Why
  alternatives:
  - For what reason
  - On account of what
  lexicon: HALOT
  rationale: This idiom asks the reason for the devastation. 'Why' is the most natural modern English equivalent.
- source_word: אָבְדָה הָאָרֶץ
  chosen: has the land perished
  alternatives:
  - has the land been ruined
  - has the land been destroyed
  lexicon: HALOT
  rationale: אבד often denotes perishing or being ruined. 'Perished' preserves the verbal force and solemn tone without overstating to total annihilation.
- source_word: נִצְּתָה
  chosen: laid waste
  alternatives:
  - burned up
  - desolated
  lexicon: HALOT
  rationale: The verb denotes being devastated/desolated. 'Laid waste' is idiomatic English that captures the result. 'Burned up' is possible in some contexts but too specific here without explicit fire language.
- source_word: כַמִּדְבָּר
  chosen: like the wilderness
  alternatives:
  - like a desert
  - like the wasteland
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness rather than specifically sandy desert. 'The wilderness' preserves biblical resonance and the comparison's force.
- source_word: מִבְּלִי עֹבֵר
  chosen: with no one passing through
  alternatives:
  - without anyone passing through
  - so that none passes through
  lexicon: HALOT
  rationale: The phrase describes utter desolation by absence of travelers or inhabitants. 'With no one passing through' is natural and keeps the participial sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
