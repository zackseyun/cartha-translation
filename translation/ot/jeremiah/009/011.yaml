theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Retention of anthropomorphic idiom 'mouth of the LORD'
  chosen_reading: Retained in the main text
  alternative_readings:
  - the LORD has spoken to him
  rationale: The Hebrew explicitly uses 'mouth of the LORD,' a prophetic idiom emphasizing direct divine speech. Retaining it preserves the text's imagery and theological weight rather than reducing it to a generic statement.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Gendered expression הָאִישׁ הֶחָכָם
  chosen_reading: wise man
  alternative_readings:
  - wise person
  rationale: The source text is grammatically masculine singular with representative force. Per the project's gender-accurate policy, the masculine form is preserved rather than neutralized.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
