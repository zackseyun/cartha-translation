id: JER.9.10
reference: Jeremiah 9:10
source:
  edition: WLC
  text: וְ/נָתַתִּ֧י אֶת יְרוּשָׁלִַ֛ם לְ/גַלִּ֖ים מְע֣וֹן תַּנִּ֑ים וְ/אֶת עָרֵ֧י
    יְהוּדָ֛ה אֶתֵּ֥ן שְׁמָמָ֖ה מִ/בְּלִ֖י יוֹשֵֽׁב־־׃ס
translation:
  text: And I will make Jerusalem a heap of ruins, a haunt of jackals; and I will
    make the cities of Judah a desolation, without inhabitant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'ruin-heaps.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew tannim; traditionally also rendered 'dragons,' but in this desolation
      context most likely 'jackals.'
    reason: lexical_alternative
  - marker: c
    text: Or 'with no one dwelling there.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will make
  alternatives:
  - And I will give
  - And I will set
  lexicon: HALOT
  rationale: Though the verb is literally 'give/put,' in this judgment context with
    result complements ('Jerusalem' + 'into heaps of ruins') idiomatic English is
    better expressed as 'make.' This preserves the causative-result sense without
    wooden phrasing.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard transliteration of the place name, following the policy to transliterate
    names.
- source_word: לְגַלִּים
  chosen: a heap of ruins
  alternatives:
  - ruin-heaps
  - heaps
  lexicon: HALOT
  rationale: The noun refers to heaps, especially rubble mounds or ruin-heaps. 'A
    heap of ruins' is natural modern English and conveys the image of a city reduced
    to rubble.
- source_word: מְעוֹן
  chosen: a haunt of
  alternatives:
  - a dwelling place of
  - a habitation of
  lexicon: HALOT
  rationale: The term denotes a dwelling or habitation. In context of wild animals
    occupying a destroyed city, 'a haunt of' is idiomatic and vivid while remaining
    faithful.
- source_word: תַּנִּים
  chosen: jackals
  alternatives:
  - serpents
  - dragons
  lexicon: HALOT
  rationale: In prophetic desolation contexts this plural is commonly understood as
    jackals rather than mythic 'dragons' or serpents. 'Jackals' best fits the imagery
    of abandoned ruins inhabited by scavenging wild animals.
- source_word: עָרֵי יְהוּדָה
  chosen: the cities of Judah
  alternatives:
  - Judah's cities
  rationale: A straightforward construct rendering preserving the geographic-political
    reference.
- source_word: אֶתֵּן
  chosen: I will make
  alternatives:
  - I will give
  - I will set
  lexicon: HALOT
  rationale: 'As with the first occurrence of נתן, the idiomatic sense in context
    is causative-resultative: God will render the cities desolate.'
- source_word: שְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate
  - wasteland
  lexicon: HALOT
  rationale: The noun denotes devastation/desolation. The nominal rendering matches
    the Hebrew syntax and pairs well with the following phrase.
- source_word: מִבְּלִי יוֹשֵׁב
  chosen: without inhabitant
  alternatives:
  - without anyone living there
  - with no one dwelling there
  lexicon: HALOT
  rationale: Literally 'from/without inhabitant' or 'without one dwelling.' 'Without
    inhabitant' is concise and formal enough for prophetic diction, while still understandable
    in modern English.
