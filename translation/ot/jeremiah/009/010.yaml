theological_decisions:
- issue: Agency implied by repeated נתן in a judgment oracle
  chosen_reading: Render with 'make' to express divine action causing Jerusalem and
    Judah's cities to become ruins and desolation.
  alternative_readings:
  - Render more formally as 'give' or 'set'
  rationale: The verse depicts the LORD's judicial action, but the English should
    not obscure the resultative force by using an unnatural literalism. 'Make' communicates
    the judgment clearly without adding theological content beyond the Hebrew.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
