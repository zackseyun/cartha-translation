id: JER.9.21
reference: Jeremiah 9:21
source:
  edition: WLC
  text: דַּבֵּ֗ר כֹּ֚ה נְאֻם יְהוָ֔ה וְ/נָֽפְלָה֙ נִבְלַ֣ת הָֽ/אָדָ֔ם כְּ/דֹ֖מֶן עַל
    פְּנֵ֣י הַ/שָּׂדֶ֑ה וּ/כְ/עָמִ֛יר מֵ/אַחֲרֵ֥י הַ/קֹּצֵ֖ר וְ/אֵ֥ין מְאַסֵּֽף־־׃ס
translation:
  text: 'Speak: Thus says the LORD, “The corpse of man will fall like dung on the
    face of the field, and like a sheaf behind the reaper, with no one to gather it.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the corpse of humanity' / 'the human corpse.' The Hebrew has singular
      אָדָם, which can function generically.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  chosen: Speak
  alternatives:
  - Say
  lexicon: HALOT
  rationale: Imperative 2ms introducing the prophetic proclamation. 'Speak' is direct
    and natural in English, preserving the command force.
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - Like this
  - So
  lexicon: HALOT
  rationale: Standard prophetic deictic formula with נְאֻם/quotation language; 'Thus'
    fits idiomatic English prophetic style without unnecessary archaism.
- source_word: נְאֻם יְהוָה
  chosen: says the LORD
  alternatives:
  - declares the LORD
  - oracle of the LORD
  lexicon: HALOT
  rationale: Prophetic messenger formula. 'Says the LORD' is clear modern English.
    The divine name follows the doctrinal default rendering 'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: וְנָפְלָה
  chosen: will fall
  alternatives:
  - shall fall
  - has fallen
  lexicon: HALOT
  rationale: Qal perfect with vav in prophetic discourse is well rendered as future
    in English, expressing the announced judgment.
- source_word: נִבְלַת
  chosen: the corpse
  alternatives:
  - the dead body
  - the carcass
  lexicon: HALOT
  rationale: Construct with הָאָדָם. 'Corpse' is concise, natural, and suitably stark.
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - humanity
  - people
  lexicon: HALOT
  rationale: 'Here the singular generic functions representatively: the human corpse/man
    as a class in judgment imagery. Per doctrine, gender-accurate rendering is preferred
    where the Hebrew uses אָדָם generically; ''man'' preserves the source form better
    than a pluralized paraphrase.'
- source_word: כְּדֹמֶן
  chosen: like dung
  alternatives:
  - like manure
  - like refuse
  lexicon: HALOT
  rationale: The simile is intentionally degrading and agricultural. 'Dung' preserves
    the bluntness and imagery better than softer alternatives.
- source_word: עַל פְּנֵי הַשָּׂדֶה
  chosen: on the face of the field
  alternatives:
  - on the surface of the field
  - upon the open field
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the Hebrew idiom and vividness.
    'Face of the field' is understandable in English and keeps the image of exposed,
    unburied death.
- source_word: וּכְעָמִיר
  chosen: and like a sheaf
  alternatives:
  - and like cut grain
  - and like a heap of grain
  lexicon: HALOT
  rationale: עָמִיר commonly denotes a sheaf or gathered stalks. 'Sheaf' best matches
    the harvest comparison in context.
- source_word: מֵאַחֲרֵי הַקֹּצֵר
  chosen: behind the reaper
  alternatives:
  - after the reaper
  lexicon: HALOT
  rationale: 'Spatial sense fits the harvest image: what lies left behind after/behind
    the one cutting.'
- source_word: וְאֵין מְאַסֵּף
  chosen: with no one to gather it
  alternatives:
  - and there is none gathering
  - and no one gathers
  lexicon: HALOT
  rationale: English idiom requires an explicit subject. 'Gather it' refers back to
    the singular harvest/corpse image and conveys abandonment, especially lack of
    burial or collection.
