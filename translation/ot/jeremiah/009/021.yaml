theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the Tetragrammaton as 'the LORD,' following
    the stated doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering of הָאָדָם
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew is singular and generic. Per the project's gender-accurate
    policy, 'man' is retained rather than neutralizing to a plural or abstract collective,
    while the context clearly speaks representatively of humanity under judgment.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם
    adam → man / humankind (context)'
