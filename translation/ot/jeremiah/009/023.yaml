theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of בָּאָרֶץ
  chosen_reading: in the earth
  alternative_readings:
  - in the land
  rationale: The verse presents a general theological claim about what the LORD delights in, not merely a localized statement about Judah. 'In the earth' better preserves that broader scope while remaining faithful to the Hebrew.
