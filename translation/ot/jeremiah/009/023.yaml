id: JER.9.23
reference: Jeremiah 9:23
source:
  edition: WLC
  text: כִּ֣י אִם בְּ/זֹ֞את יִתְהַלֵּ֣ל הַ/מִּתְהַלֵּ֗ל הַשְׂכֵּל֮ וְ/יָדֹ֣עַ אוֹתִ/י֒ כִּ֚י אֲנִ֣י יְהוָ֔ה עֹ֥שֶׂה חֶ֛סֶד מִשְׁפָּ֥ט וּ/צְדָקָ֖ה בָּ/אָ֑רֶץ כִּֽי בְ/אֵ֥לֶּה חָפַ֖צְתִּי נְאֻם יְהוָֽה־־־׃ס
translation:
  text: 'But let the one who boasts boast in this: that he understands and knows me, that I am Yahweh, who practices steadfast love, justice, and righteousness in the earth; for in these I delight, declares Yahweh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in the land." The Hebrew אֶרֶץ can refer either to the earth generally or to a particular land; the broader sense fits the verse's universal statement about the LORD's character.
    reason: lexical_alternative
  - marker: b
    text: '"Steadfast love" translates Hebrew חֶסֶד, a covenant-rich term that can also be rendered "lovingkindness," "mercy," or "covenant faithfulness" depending on context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: But
  alternatives:
  - Rather
  - But rather
  - Except that
  lexicon: HALOT
  rationale: In this contrastive context following the prohibitions of boasting in wisdom, might, and riches (v. 22 Eng./23 Heb. context), the idiom introduces the positive alternative. 'But' is concise modern English and captures the adversative force without overtranslating.
- source_word: בְּזֹאת
  chosen: in this
  alternatives:
  - in this alone
  - about this
  lexicon: HALOT
  rationale: A straightforward demonstrative phrase pointing forward to the content clause. 'In this' preserves the Hebrew construction and the sense of the proper ground of boasting.
- source_word: יִתְהַלֵּל / הַמִּתְהַלֵּל
  chosen: let the one who boasts boast
  alternatives:
  - let him who boasts boast
  - let the boaster boast
  lexicon: HALOT
  rationale: The repeated הלל in hitpael is intentionally echoed in Hebrew; the English preserves that repetition. 'The one who boasts' avoids unnecessary gender narrowing while still matching the representative singular.
- source_word: הַשְׂכֵּל
  chosen: understands
  alternatives:
  - has insight
  - acts wisely
  lexicon: HALOT
  rationale: 'From שכל in the causative stem, here functioning with וידע אותי. ''Understands'' best fits the paired cognitive-relational sense: true boasting lies in rightly perceiving who the LORD is.'
- source_word: וְיָדֹעַ אֹתִי
  chosen: and knows me
  alternatives:
  - and acknowledges me
  lexicon: HALOT
  rationale: ידע commonly denotes relational knowledge, not mere information. 'Knows me' is the most direct and theologically weighty rendering, preserving the covenantal nuance without paraphrase.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֹשֶׂה
  chosen: who practices
  alternatives:
  - who does
  - who exercises
  - who works
  lexicon: HALOT
  rationale: The participle describes the LORD's characteristic action. 'Who practices' communicates ongoing, habitual exercise of these covenantal qualities in a natural English way.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - lovingkindness
  - covenant faithfulness
  - mercy
  lexicon: HALOT
  rationale: חסד is a rich covenant term. 'Steadfast love' is established, readable English that preserves both affection and loyal constancy better than the narrower 'mercy' or the more interpretive 'covenant faithfulness.'
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - just judgment
  lexicon: HALOT
  rationale: Here the term names the LORD's moral ordering and right governance in parallel with righteousness. 'Justice' is the clearest modern rendering in this triad.
- source_word: וּצְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: צדקה often overlaps with justice, but in this collocation with משפט it is best rendered distinctly as 'righteousness' to preserve the paired but non-identical ethical concepts.
- source_word: בָּאָרֶץ
  chosen: in the earth
  alternatives:
  - in the land
  - on the earth
  lexicon: HALOT
  rationale: Although ארץ can mean 'land,' the scope here is best taken more broadly of the sphere where the LORD acts. 'In the earth' preserves the Hebrew preposition and avoids narrowing the statement to Judah alone.
- source_word: כִּי בְאֵלֶּה חָפַצְתִּי
  chosen: for in these I delight
  alternatives:
  - for these are what I desire
  - for in these I take pleasure
  lexicon: HALOT
  rationale: חפץ expresses pleasure or delight, not mere abstract preference. 'I delight' is concise and preserves the affective force of the divine statement.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic messenger formula is idiomatically rendered 'declares the LORD' in contemporary English, preserving solemnity without archaic stiffness.
