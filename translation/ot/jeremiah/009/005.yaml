theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Number shift within the verse
  chosen_reading: Singular collective address ('Your dwelling') followed by plural
    predicate ('they refuse')
  alternative_readings:
  - Regularize all forms to singular in English
  - Regularize all forms to plural in English
  rationale: The Hebrew itself shifts from singular address to plural verb, a common
    prophetic feature when addressing the people/city collectively and then referring
    to the inhabitants. Preserving the shift is more faithful than smoothing it away.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
