theological_decisions:
- issue: Covenantal nuance of 'know me'
  chosen_reading: they do not know me
  alternative_readings:
  - they do not acknowledge me
  rationale: The Hebrew verb ידע can imply covenantal acknowledgment and relational
    knowledge. The main text preserves the broader, more literal expression without
    narrowing it to mere cognition or explicit covenant confession.
  doctrine_reference: Preserve theological tension rather than resolve it.
