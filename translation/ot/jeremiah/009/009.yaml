id: JER.9.9
reference: Jeremiah 9:9
source:
  edition: WLC
  text: עַל הֶ֨/הָרִ֜ים אֶשָּׂ֧א בְכִ֣י וָ/נֶ֗הִי וְ/עַל נְא֤וֹת מִדְבָּר֙ קִינָ֔ה
    כִּ֤י נִצְּתוּ֙ מִ/בְּלִי אִ֣ישׁ עֹבֵ֔ר וְ/לֹ֥א שָׁמְע֖וּ ק֣וֹל מִקְנֶ֑ה מֵ/ע֤וֹף
    הַ/שָּׁמַ֨יִם֙ וְ/עַד בְּהֵמָ֔ה נָדְד֖וּ הָלָֽכוּ־־־־׃
translation:
  text: Over the mountains I will lift up weeping and wailing, and over the pastures
    of the wilderness a lament, because they are burned up so that no man passes through,
    and they do not hear the sound of livestock. From the birds of the heavens to
    the beasts, they have fled; they are gone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they are laid waste' for 'they are burned up.' The Hebrew passive verb
      can denote devastation more generally, though the imagery of burning is likely
      present.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'no man passes through,' with 'man' used generically for any person.
    reason: lexical_alternative
  - marker: c
    text: Or 'birds of the sky.' Hebrew 'heavens' is a common way to refer to the
      sky.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶשָּׂא
  chosen: I will lift up
  alternatives:
  - I will take up
  - I will raise
  lexicon: HALOT
  rationale: The verb נשׂא literally means 'lift/carry/raise.' In idiom with בְכִי
    and נֶהִי it conveys taking up or raising lamentation. 'Lift up' preserves the
    Hebrew image while remaining natural in English.
- source_word: בְכִי
  chosen: weeping
  alternatives:
  - crying
  lexicon: HALOT
  rationale: A noun for weeping/crying. 'Weeping' fits the elevated lament context
    and pairs well with 'wailing.'
- source_word: נֶהִי
  chosen: wailing
  alternatives:
  - lamentation
  - wailing cry
  lexicon: HALOT
  rationale: Refers to lamentation or wailing, often in mourning contexts. 'Wailing'
    distinguishes it from the later קִינָה ('lament') and preserves the emotional
    force.
- source_word: נְאוֹת מִדְבָּר
  chosen: the pastures of the wilderness
  alternatives:
  - the grazing places of the wilderness
  - the settlements of the wilderness
  lexicon: HALOT
  rationale: נָאוֶה/נָוָה in this plural construct commonly denotes pasture places
    or grazing lands, especially in poetic contexts. 'Pastures of the wilderness'
    best fits the following reference to livestock and desolation.
- source_word: קִינָה
  chosen: a lament
  alternatives:
  - a dirge
  lexicon: HALOT
  rationale: A formal lament or dirge. 'Lament' is more readable modern English; 'dirge'
    is possible but slightly more specialized.
- source_word: נִצְּתוּ
  chosen: they are burned up
  alternatives:
  - they are laid waste
  - they are scorched
  lexicon: HALOT
  rationale: From יצת/נצת in the passive, conveying being set on fire or burned. Given
    the desolation imagery, 'burned up' preserves the concrete force better than the
    more generalized 'laid waste.'
- source_word: מִבְּלִי אִישׁ עֹבֵר
  chosen: so that no man passes through
  alternatives:
  - without anyone passing through
  - with no one passing through
  lexicon: HALOT
  rationale: The phrase expresses total abandonment. 'So that no man passes through'
    is idiomatic and preserves the masculine singular אִישׁ in line with gender-accurate
    policy, here functioning generically.
- source_word: קוֹל מִקְנֶה
  chosen: the sound of livestock
  alternatives:
  - the voice of cattle
  - the sound of herds
  lexicon: HALOT
  rationale: קוֹל is 'sound/voice'; מִקְנֶה denotes livestock or cattle possessions.
    'Sound of livestock' is natural English and broad enough to cover domesticated
    animals generally.
- source_word: מֵעוֹף הַשָּׁמַיִם וְעַד בְּהֵמָה
  chosen: From the birds of the heavens to the beasts
  alternatives:
  - From the birds of the sky to the animals
  - Both birds and beasts
  lexicon: HALOT
  rationale: The construction marks a range from birds to land animals. 'Birds of
    the heavens' preserves the Hebrew cosmological phrasing; 'beasts' here means animals
    generally, not necessarily wild beasts only.
- source_word: נָדְדוּ הָלָכוּ
  chosen: they have fled; they are gone
  alternatives:
  - they have wandered away; they have gone
  - they have fled away
  lexicon: HALOT
  rationale: 'The paired verbs intensify disappearance: they have moved off and gone
    away. Rendering both separately preserves the Hebrew emphasis without awkward
    redundancy.'
