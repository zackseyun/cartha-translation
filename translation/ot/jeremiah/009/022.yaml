id: JER.9.22
reference: Jeremiah 9:22
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה אַל יִתְהַלֵּ֤ל חָכָם֙ בְּ/חָכְמָת֔/וֹ וְ/אַל יִתְהַלֵּ֥ל הַ/גִּבּ֖וֹר בִּ/גְבֽוּרָת֑/וֹ אַל יִתְהַלֵּ֥ל עָשִׁ֖יר בְּ/עָשְׁרֽ/וֹ׀־־־׃
translation:
  text: 'Thus says Yahweh: Let not the wise man boast in his wisdom, and let not the mighty man boast in his might; let not the rich man boast in his riches.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - So
  - This is what
  lexicon: HALOT
  rationale: Introduces a prophetic declaration formula. 'Thus' preserves the formal prophetic cadence in natural English.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - said the LORD
  - declares the LORD
  lexicon: HALOT
  rationale: The prophetic messenger formula is idiomatically rendered in English as present-tense 'says' even with the Hebrew qatal, reflecting ongoing authoritative proclamation. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving established reverential convention and alignment with the LXX/English Bible tradition as specified in DOCTRINE.md.
- source_word: אַל יִתְהַלֵּל
  chosen: Let not ... boast
  alternatives:
  - Do not let ... glory
  - Let ... not praise himself
  lexicon: HALOT
  rationale: The hitpael of הלל here conveys self-exultation or boasting. 'Let not ... boast' is clear, idiomatic, and preserves the jussive prohibition.
- source_word: חָכָם
  chosen: the wise man
  alternatives:
  - the wise
  - a wise man
  lexicon: HALOT
  rationale: The singular masculine adjective functions substantivally. 'The wise man' preserves the representative masculine singular in line with the gender-accurate policy.
- source_word: בְּחָכְמָתוֹ
  chosen: in his wisdom
  alternatives:
  - because of his wisdom
  - about his wisdom
  lexicon: HALOT
  rationale: The preposition ב marks the sphere/ground of boasting. 'In his wisdom' is the most natural and direct rendering.
- source_word: הַגִּבּוֹר
  chosen: the mighty man
  alternatives:
  - the strong man
  - the warrior
  - the hero
  lexicon: HALOT
  rationale: גבור can denote a strong or valiant man, often a warrior. Here, paired with wisdom and riches as human grounds for boasting, 'mighty man' best captures general human strength/power without narrowing to military context.
- source_word: בִּגְבוּרָתוֹ
  chosen: in his might
  alternatives:
  - in his strength
  - in his power
  lexicon: HALOT
  rationale: Cognate with גבור, this denotes strength or might. 'Might' preserves the rhetorical parallelism with 'mighty man' and keeps the elevated style.
- source_word: עָשִׁיר
  chosen: the rich man
  alternatives:
  - the wealthy man
  - the rich
  lexicon: HALOT
  rationale: Substantival adjective in representative masculine singular. 'The rich man' mirrors the structure of the previous two clauses and preserves the source's gendered singular form.
- source_word: בְּעָשְׁרוֹ
  chosen: in his riches
  alternatives:
  - in his wealth
  lexicon: HALOT
  rationale: The noun denotes wealth/riches. 'Riches' better matches the rhetorical cadence and triadic parallelism of wisdom/might/riches.
