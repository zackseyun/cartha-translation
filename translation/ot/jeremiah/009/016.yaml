id: JER.9.16
reference: Jeremiah 9:16
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת הִתְבּֽוֹנְנ֛וּ וְ/קִרְא֥וּ לַ/מְקוֹנְנ֖וֹת
    וּ/תְבוֹאֶ֑ינָה וְ/אֶל הַ/חֲכָמ֥וֹת שִׁלְח֖וּ וְ/תָבֽוֹאנָה־׃
translation:
  text: 'Thus says the LORD of hosts: Consider, and call for the mourning women, that
    they may come; and send for the skillful women, that they may come.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wailing women' or 'the professional mourners.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the wise women'; here likely women skilled in leading lament.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Standard prophetic discourse marker; 'Thus' preserves the formal announcement
    style without sounding archaic beyond normal biblical English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and alignment with the stated doctrine policy.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the established and semantically
    broad rendering, encompassing heavenly armies without over-specifying military
    imagery in this context.
- source_word: הִתְבּוֹנְנוּ
  chosen: Consider
  alternatives:
  - Take note
  - Understand
  lexicon: HALOT
  rationale: The Hitpolel imperative of בין calls for attentive reflection. 'Consider'
    is concise, natural English and fits the summons to deliberate before acting.
- source_word: וְקִרְאוּ
  chosen: and call for
  alternatives:
  - and summon
  - and call
  lexicon: HALOT
  rationale: '''Call for'' best fits the object being professional mourners who are
    to be brought in, not merely addressed.'
- source_word: לַמְקוֹנְנוֹת
  chosen: the mourning women
  alternatives:
  - the wailing women
  - the professional mourners
  lexicon: HALOT
  rationale: The feminine plural participial form refers to women who perform lamentation.
    'Mourning women' is clear and close to the Hebrew; 'professional mourners' is
    interpretive, while 'wailing women' foregrounds sound over function.
- source_word: וּתְבוֹאֶינָה
  chosen: that they may come
  alternatives:
  - and let them come
  - and they will come
  lexicon: HALOT
  rationale: Though formally an imperfect, in this imperative sequence it expresses
    desired/resulting action. 'That they may come' captures the volitional sense smoothly
    in English.
- source_word: הַחֲכָמוֹת
  chosen: the skillful women
  alternatives:
  - the wise women
  - the experienced women
  lexicon: HALOT
  rationale: While חכם often means 'wise,' here the context is trained lamenters.
    'Skillful women' conveys practiced expertise rather than general wisdom, matching
    the parallel with the mourning women.
- source_word: שִׁלְחוּ
  chosen: send for
  alternatives:
  - send
  - dispatch for
  lexicon: HALOT
  rationale: In context the sense is to send messengers to fetch these women. 'Send
    for' expresses that idiom naturally in English.
- source_word: וְתָבֹאנָה
  chosen: that they may come
  alternatives:
  - and let them come
  - and they will come
  lexicon: HALOT
  rationale: Repeated to preserve the Hebrew parallelism and the volitional/result
    sense of the imperfect following an imperative.
