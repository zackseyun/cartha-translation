theological_decisions:
- issue: Rendering the prophetic idiom בַּת עַמִּי
  chosen_reading: the daughter of my people
  alternative_readings:
  - my people
  - my dear people
  rationale: The Hebrew uses a familial/filial idiom common in prophetic literature.
    Preserving it maintains the text's emotional and covenantal texture rather than
    resolving it into a flatter paraphrase. Because the idiom may be unfamiliar in
    English, an explanatory footnote preserves the more idiomatic sense.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Force of the rhetorical question כִּי אֵיךְ אֶעֱשֶׂה
  chosen_reading: for how else can I act
  alternative_readings:
  - for what else can I do
  - for how can I do otherwise
  rationale: The Hebrew presents God's refining judgment as a necessary response to
    the people's corruption. The chosen rendering preserves the rhetorical force without
    importing extra theological explanation about divine necessity beyond the text
    itself.
  doctrine_reference: Translation philosophy §§1, 3
