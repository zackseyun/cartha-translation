theological_decisions:
- issue: Rendering of divine title יְהוָה צְבָאוֹת
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of hosts
  rationale: This follows the doctrinal default for יְהוָה as 'the LORD' and translates
    צְבָאוֹת semantically for clarity. No doctrinal issue is resolved beyond preserving
    the covenantal title in comprehensible English.
  doctrine_reference: 'DOCTRINE.md: Contested terms (יְהוָה YHWH → the LORD); Translation
    philosophy #2'
