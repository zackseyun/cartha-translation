id: JER.9.14
reference: Jeremiah 9:14
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּֽה אָמַ֞ר יְהוָ֤ה צְבָאוֹת֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל הִנְ/נִ֧י מַאֲכִילָ֛/ם
    אֶת הָ/עָ֥ם הַ/זֶּ֖ה לַֽעֲנָ֑ה וְ/הִשְׁקִיתִ֖י/ם מֵי רֹֽאשׁ־־־׃
translation:
  text: 'Therefore, thus says the LORD of Armies, the God of Israel: Behold, I am
    feeding this people wormwood, and I will give them poisonous water to drink.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bitterness'; the Hebrew names a bitter plant, wormwood, often used as
      an image of judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'water of poison' or traditionally 'gall.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the covenant name in small-caps style English convention rather than transliteration.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: Translated rather than retained in traditional ecclesiastical form to
    preserve the concrete sense of military/multitudinous forces in readable modern
    English.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain identifying YHWH covenantally with Israel.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: Preserves the emphatic deictic force of the Hebrew announcement formula
    while remaining natural in prophetic discourse.
- source_word: מַאֲכִילָם
  chosen: I am feeding
  alternatives:
  - I will feed
  lexicon: HALOT
  rationale: The Hiphil participle with pronominal suffix conveys imminent or certain
    action; 'I am feeding' preserves the participial vividness better than a simple
    future, especially paired with הִנְנִי.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - this people here
  lexicon: HALOT
  rationale: Maintains the demonstrative force and common prophetic designation of
    the covenant community under judgment.
- source_word: לַעֲנָה
  chosen: wormwood
  alternatives:
  - bitterness
  - bitter herbs
  lexicon: HALOT
  rationale: The noun denotes wormwood, a bitter plant frequently used metaphorically
    for bitterness/judgment. The concrete image is retained in the main text; a more
    interpretive gloss is preserved in a footnote.
- source_word: וְהִשְׁקִיתִים
  chosen: and I will give them ... to drink
  alternatives:
  - and I will make them drink
  - and I will cause them to drink
  lexicon: HALOT
  rationale: The Hiphil means to cause/give to drink. English idiom favors 'give them
    ... to drink,' which preserves causative sense without awkwardness.
- source_word: מֵי רֹאשׁ
  chosen: poisonous water
  alternatives:
  - water of poison
  - gall-water
  - water of bitterness
  lexicon: HALOT
  rationale: רֹאשׁ in this collocation refers to a poisonous or bitter substance,
    not 'head.' 'Poisonous water' communicates the sense clearly in modern English
    while preserving the judgment imagery. Traditional 'gall' is possible but less
    transparent to modern readers.
