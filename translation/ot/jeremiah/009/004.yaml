id: JER.9.4
reference: Jeremiah 9:4
source:
  edition: WLC
  text: וְ/אִ֤ישׁ בְּ/רֵעֵ֨/הוּ֙ יְהָתֵ֔לּוּ וֶ/אֱמֶ֖ת לֹ֣א יְדַבֵּ֑רוּ לִמְּד֧וּ
    לְשׁוֹנָ֛/ם דַּבֶּר שֶׁ֖קֶר הַעֲוֵ֥ה נִלְאֽוּ־׃
translation:
  text: And each man deceives his neighbor, and they do not speak truth; they have
    taught their tongue to speak falsehood; they weary themselves committing iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mocks his neighbor' or 'deals deceitfully with his neighbor' for 'deceives
      his neighbor.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they exhaust themselves doing wrong.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - everyone
  - each person
  lexicon: HALOT
  rationale: The singular noun with distributive force in context is best rendered
    'each man.' This preserves the Hebrew's gendered singular form while conveying
    the representative sense. It fits the translation philosophy's gender-accurate
    principle better than flattening to a neutral plural.
- source_word: בְּרֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his friend
  - his companion
  lexicon: HALOT
  rationale: רֵעַ can mean friend, companion, or neighbor. Here the social-ethical
    sense of one person dealing treacherously with another is well captured by 'neighbor,'
    which also resonates with broader biblical usage without overstating intimacy.
- source_word: יְהָתֵלּוּ
  chosen: deceives
  alternatives:
  - mocks
  - misleads
  - deals deceitfully with
  lexicon: HALOT
  rationale: The Hiphil of התל in this context carries the sense of deceiving or misleading
    rather than merely mocking. 'Deceives' fits the parallel with refusing to speak
    truth and keeps the moral force of the accusation.
- source_word: אֱמֶת
  chosen: truth
  alternatives:
  - faithfulness
  - what is true
  lexicon: HALOT
  rationale: In parallel with lying speech, אֱמֶת here refers to truthful speech rather
    than covenantal faithfulness in a broader sense. 'Truth' is the most natural and
    precise rendering.
- source_word: לִמְּדוּ לְשׁוֹנָם
  chosen: they have taught their tongue
  alternatives:
  - they train their tongue
  - they have trained their tongue
  lexicon: HALOT
  rationale: The perfect verb indicates a settled, cultivated habit. 'They have taught
    their tongue' preserves the vivid personification of the tongue as something schooled
    in evil speech.
- source_word: דַּבֶּר שֶׁקֶר
  chosen: to speak falsehood
  alternatives:
  - to speak lies
  - to speak deceit
  lexicon: HALOT
  rationale: The infinitive plus object expresses the content of the tongue's training.
    'Falsehood' is slightly broader and more formal than 'lies,' matching the prophetic
    register while remaining readable.
- source_word: הַעֲוֵה
  chosen: committing iniquity
  alternatives:
  - doing wrong
  - acting perversely
  - doing evil
  lexicon: HALOT
  rationale: The form conveys acting perversely or doing wrong. 'Committing iniquity'
    preserves the moral gravity and prophetic tone better than a flatter modern equivalent.
- source_word: נִלְאוּ
  chosen: they weary themselves
  alternatives:
  - they are weary
  - they exhaust themselves
  lexicon: HALOT
  rationale: 'The Niphal here is best taken as reflexive/resultative: they wear themselves
    out. This yields the sense that persistent sin is laboriously cultivated, which
    fits the verse''s escalating portrayal of practiced deceit.'
