id: JER.9.18
reference: Jeremiah 9:18
source:
  edition: WLC
  text: כִּ֣י ק֥וֹל נְהִ֛י נִשְׁמַ֥ע מִ/צִּיּ֖וֹן אֵ֣יךְ שֻׁדָּ֑דְנוּ בֹּ֤שְׁנֽוּ
    מְאֹד֙ כִּֽי עָזַ֣בְנוּ אָ֔רֶץ כִּ֥י הִשְׁלִ֖יכוּ מִשְׁכְּנוֹתֵֽי/נוּ־׃ס
translation:
  text: 'For the sound of wailing is heard from Zion: “How we have been devastated!
    We are utterly ashamed, because we have left the land, because they have cast
    down our dwellings.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “we have been plundered” for “we have been devastated.” The Hebrew verb
      can emphasize either ruin in general or despoiling by an enemy.
    reason: lexical_alternative
  - marker: b
    text: Or “because we have abandoned the land.” The Hebrew may describe either
      forced departure or forsaking the land; the context of lament favors departure
      under judgment.
    reason: lexical_alternative
  - marker: c
    text: Or “our homes” or “our habitations” for “our dwellings.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces the explanation for the summons to mourning in the
    surrounding context; 'For' fits the discourse connection naturally in English.
- source_word: קוֹל נְהִי
  chosen: the sound of wailing
  alternatives:
  - a sound of lamentation
  - the voice of lament
  lexicon: HALOT
  rationale: קוֹל is literally 'sound/voice' and נְהִי denotes lamentation or wailing.
    'The sound of wailing' is idiomatic modern English and preserves the auditory
    emphasis.
- source_word: נִשְׁמַע
  chosen: is heard
  alternatives:
  - has been heard
  - is being heard
  lexicon: HALOT
  rationale: The Niphal conveys passive sense. Present 'is heard' works well in vivid
    prophetic style without over-specifying aspect.
- source_word: מִצִּיּוֹן
  chosen: from Zion
  alternatives:
  - out of Zion
  lexicon: HALOT
  rationale: Standard locative rendering; 'Zion' is retained as the place-name with
    its theological and poetic resonance.
- source_word: אֵיךְ
  chosen: How
  alternatives:
  - Alas, how
  - How greatly
  lexicon: HALOT
  rationale: Introduces the exclamatory lament. Simple 'How' preserves the dirge-like
    force familiar in English lament style.
- source_word: שֻׁדָּדְנוּ
  chosen: we have been devastated
  alternatives:
  - we are ruined
  - we have been plundered
  lexicon: HALOT
  rationale: The passive of שׁדד can denote being devastated, ruined, or plundered.
    'Devastated' best captures broad national destruction rather than only looting.
- source_word: בֹּשְׁנוּ מְאֹד
  chosen: We are utterly ashamed
  alternatives:
  - We are greatly ashamed
  - We are deeply disgraced
  lexicon: HALOT
  rationale: בושׁ expresses shame/disgrace; מְאֹד intensifies it. 'Utterly ashamed'
    is natural and forceful in contemporary English.
- source_word: כִּי עָזַבְנוּ אָרֶץ
  chosen: because we have left the land
  alternatives:
  - because we have abandoned the land
  - because we must leave the land
  lexicon: HALOT
  rationale: The verb עזב commonly means 'leave, forsake, abandon.' In this lament
    context, the sense is that the people have left their land, likely under duress.
    'Have left the land' preserves the wording without importing too much interpretation.
- source_word: אָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In context this refers to the homeland/Judah, not the whole earth. 'The
    land' is the most biblically and contextually appropriate rendering.
- source_word: כִּי הִשְׁלִיכוּ
  chosen: because they have cast down
  alternatives:
  - because they have thrown down
  - because they have cast out
  lexicon: HALOT
  rationale: השליך literally means 'throw/cast.' With dwellings as object, 'cast down'
    conveys violent overthrow or demolition better than a flat 'thrown away.' The
    unspecified third person plural is retained as 'they.'
- source_word: מִשְׁכְּנוֹתֵינוּ
  chosen: our dwellings
  alternatives:
  - our habitations
  - our homes
  - our tents
  lexicon: HALOT
  rationale: מִשְׁכָּן can denote dwelling place or habitation. 'Our dwellings' preserves
    the collective, somewhat formal tone of the lament; 'homes' is possible but slightly
    more domestic and interpretive.
