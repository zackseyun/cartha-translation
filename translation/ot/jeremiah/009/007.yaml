id: JER.9.7
reference: Jeremiah 9:7
source:
  edition: WLC
  text: חֵ֥ץ שוחט לְשׁוֹנָ֖/ם מִרְמָ֣ה דִבֵּ֑ר בְּ/פִ֗י/ו שָׁל֤וֹם אֶת רֵעֵ֨/הוּ֙
    יְדַבֵּ֔ר וּ/בְ/קִרְבּ֖/וֹ יָשִׂ֥ים אָרְבּֽ/וֹ־׃
translation:
  text: Their tongue is a slaughtering arrow; it speaks deceit. With his mouth each
    man speaks peace to his neighbor, but within himself he sets his ambush.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a deadly arrow' or 'a sharpened arrow.' The Hebrew participle from 'slaughter'
      emphasizes lethal intent, not merely sharpness.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'speaks peace to his neighbor'—that is, he speaks in a friendly or
      peaceable way while planning harm inwardly.
    reason: cultural_note
  - marker: c
    text: Or 'within him he sets an ambush' or 'inwardly he lays a snare.' The Hebrew
      leaves the target of the ambush implicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵץ
  chosen: arrow
  alternatives:
  - dart
  lexicon: HALOT
  rationale: The noun denotes an arrow/projectile. 'Arrow' is the natural modern English
    equivalent and preserves the metaphor's sharpness and violence.
- source_word: שוחט
  chosen: slaughtering
  alternatives:
  - slaughtering/sharpened for slaughter
  - deadly
  - killing
  lexicon: HALOT
  rationale: 'As a participial form from שחט (''slaughter, butcher''), it most naturally
    means ''slaughtering'' rather than merely ''sharp.'' This keeps the violent imagery
    explicit: the tongue is not just pointed but lethal.'
- source_word: לשונם
  chosen: their tongue
  alternatives:
  - their tongue(s)
  lexicon: HALOT
  rationale: 'Collective singular in Hebrew is well represented by singular English
    here: ''their tongue.'' This preserves the corporate accusation without awkwardness.'
- source_word: מרמה
  chosen: deceit
  alternatives:
  - treachery
  - deception
  lexicon: HALOT
  rationale: The noun refers to deceitful conduct/speech. 'Deceit' is concise and
    idiomatic in English, fitting the verbal context.
- source_word: דבר
  chosen: it speaks
  alternatives:
  - he speaks
  - has spoken
  lexicon: HALOT
  rationale: Although morphologically 3ms, the verb refers back to the metaphorical
    subject 'tongue/arrow.' English can naturally use 'it speaks' to agree with 'tongue.'
    A present rendering suits the gnomic description in context.
- source_word: בפיו
  chosen: with his mouth
  alternatives:
  - by his mouth
  - from his mouth
  lexicon: HALOT
  rationale: The preposition ב here is instrumental/circumstantial. 'With his mouth'
    is idiomatic and preserves the contrast with inward intent.
- source_word: שלום
  chosen: peace
  alternatives:
  - well-being
  lexicon: HALOT
  rationale: '''Peace'' is the standard rendering of שלום and works well in the idiom
    of speaking peaceably to another.'
- source_word: את רעהו
  chosen: to his neighbor
  alternatives:
  - with his friend
  - to his companion
  lexicon: HALOT
  rationale: The phrase identifies the person addressed. In English, 'speaks peace
    to his neighbor' is more natural than a wooden retention of the object marker.
    'Neighbor' preserves the relational/social sense of רֵעַ.
- source_word: ידבר
  chosen: speaks
  alternatives:
  - will speak
  - is speaking
  lexicon: HALOT
  rationale: The imperfect here expresses customary action. English simple present
    best conveys habitual behavior.
- source_word: ובקרבו
  chosen: within himself
  alternatives:
  - inwardly
  - within him
  lexicon: HALOT
  rationale: The phrase contrasts inner intent with outward speech. 'Within himself'
    makes the inwardness explicit and reads naturally in modern English.
- source_word: ישים
  chosen: he sets
  alternatives:
  - he places
  - he lays
  lexicon: HALOT
  rationale: The verb שים is broad ('put, place, set'). 'Sets' fits the collocation
    with an ambush in English.
- source_word: ארבו
  chosen: his ambush
  alternatives:
  - an ambush for him
  - his snare
  - his plot
  lexicon: HALOT
  rationale: The noun ארב denotes ambush/lying in wait. With the suffix, 'his ambush'
    is the most direct rendering. The object of the ambush is implicit in Hebrew and
    need not be supplied in the main text.
