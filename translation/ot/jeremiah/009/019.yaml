id: JER.9.19
reference: Jeremiah 9:19
source:
  edition: WLC
  text: כִּֽי שְׁמַ֤עְנָה נָשִׁים֙ דְּבַר יְהוָ֔ה וְ/תִקַּ֥ח אָזְנְ/כֶ֖ם דְּבַר פִּ֑י/ו וְ/לַמֵּ֤דְנָה בְנֽוֹתֵי/כֶם֙ נֶ֔הִי וְ/אִשָּׁ֥ה רְעוּתָ֖/הּ קִינָֽה־־־׃
translation:
  text: For hear the word of Yahweh, O women, and let your ear receive the word of his mouth; teach your daughters a lament, and each woman her neighbor a dirge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'listen, women.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'let your ear receive,' an idiom for attentive listening.
    reason: lexical_alternative
  - marker: c
    text: 'The two Hebrew terms for mourning here are related but distinct: ''lament'' and ''dirge'' both refer to formal expressions of grief.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Introduces the reason or urgent ground for the command that follows. 'For' preserves the connective force in context better than a merely emphatic 'indeed.'
- source_word: שְׁמַעְנָה
  chosen: hear
  alternatives:
  - listen
  - hear now
  lexicon: HALOT
  rationale: Imperative feminine plural from שׁמע addressed specifically to women. 'Hear' is concise and preserves the prophetic summons; the direct address 'women' makes the imperative force clear.
- source_word: נָשִׁים
  chosen: women
  alternatives:
  - O women
  lexicon: HALOT
  rationale: Vocative sense in context. 'Women' is the natural English equivalent and preserves the gender-specific address required by the Hebrew.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Standard prophetic expression. 'Word' preserves the formal resonance of divine speech. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: וְתִקַּח אָזְנְכֶם
  chosen: and let your ear receive
  alternatives:
  - and let your ear take in
  - and receive with your ear
  lexicon: HALOT
  rationale: Hebrew uses singular 'ear' with 2mp suffix, likely a collective address. 'Let your ear receive' preserves the idiom of attentive reception without flattening it to mere repetition of 'hear.'
- source_word: דְּבַר פִּיו
  chosen: the word of his mouth
  alternatives:
  - the utterance of his mouth
  - what his mouth says
  lexicon: HALOT
  rationale: Keeps the concrete Hebrew imagery of speech proceeding from God's mouth. 'Word of his mouth' is idiomatic enough in English and preserves the parallelism.
- source_word: וְלַמֵּדְנָה
  chosen: teach
  alternatives:
  - instruct
  lexicon: HALOT
  rationale: Imperative feminine plural. 'Teach' is the straightforward equivalent and fits the communal transmission of mourning practice.
- source_word: בְנוֹתֵיכֶם
  chosen: your daughters
  alternatives:
  - your girls
  lexicon: HALOT
  rationale: Literal familial term; 'daughters' preserves both kinship and the female-specific social setting.
- source_word: נֶהִי
  chosen: a lament
  alternatives:
  - wailing
  - mourning song
  lexicon: HALOT
  rationale: 'Refers to a lamentation or wailing song. ''Lament'' is natural English and suits the instructional context: they are to teach a formal expression of mourning.'
- source_word: וְאִשָּׁה רְעוּתָהּ
  chosen: and each woman her neighbor
  alternatives:
  - and a woman her companion
  - and each woman her friend
  lexicon: HALOT
  rationale: The phrase is elliptical, with the verb understood from the previous clause. 'Each woman her neighbor' makes the distributive sense explicit in English while preserving the social reciprocity.
- source_word: קִינָה
  chosen: a dirge
  alternatives:
  - a lamentation
  - a funeral song
  lexicon: HALOT
  rationale: קִינָה often denotes a formal mourning song, especially a dirge. Using 'dirge' here differentiates it slightly from נֶהִי while preserving the poetic parallelism of two related mourning terms.
