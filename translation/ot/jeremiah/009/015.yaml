theological_decisions:
- issue: Rendering of וַאֲבוֹתָם
  chosen_reading: their fathers
  alternative_readings:
  - their ancestors
  rationale: Per translation philosophy, gender-accurate renderings are preferred
    over gender-neutral ones when the source is grammatically masculine and specifically
    familial. 'Fathers' matches the Hebrew and the covenantal-historical resonance
    of the term in prophetic literature.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Metonymic force of 'the sword'
  chosen_reading: the sword
  alternative_readings:
  - warfare
  - violent judgment
  rationale: The Hebrew likely uses 'sword' as a concrete image for military destruction
    and divine judgment. The main text preserves the image rather than resolving it
    into an abstract interpretation, in keeping with preserving the source text's
    tension and imagery.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
