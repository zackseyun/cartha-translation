id: JER.9.15
reference: Jeremiah 9:15
source:
  edition: WLC
  text: וַ/הֲפִֽצוֹתִי/ם֙ בַּ/גּוֹיִ֔ם אֲשֶׁר֙ לֹ֣א יָֽדְע֔וּ הֵ֖מָּה וַֽ/אֲבוֹתָ֑/ם
    וְ/שִׁלַּחְתִּ֤י אַֽחֲרֵי/הֶם֙ אֶת הַ/חֶ֔רֶב עַ֥ד כַּלּוֹתִ֖/י אוֹתָֽ/ם־׃פ
translation:
  text: And I will scatter them among nations that neither they nor their fathers
    have known, and I will send the sword after them until I have consumed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their ancestors.' The Hebrew reads 'their fathers.'
    reason: lexical_alternative
  - marker: b
    text: '''The sword'' is a common biblical image for warfare or deadly judgment.'
    reason: cultural_note
  - marker: c
    text: Or 'until I have made an end of them' or 'until I have destroyed them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲפִצוֹתִים
  chosen: And I will scatter them
  alternatives:
  - And I will disperse them
  - And I will drive them apart
  lexicon: HALOT
  rationale: From פוץ/הפיץ in the causative sense, meaning to scatter or disperse.
    'Scatter' is the most natural and established English equivalent and fits the
    judgment context without over-paraphrase.
- source_word: בַּגּוֹיִם
  chosen: among nations
  alternatives:
  - among the nations
  - among the Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם means nations/peoples. 'Among nations' is idiomatic and reflects
    the preposition plus plural noun. 'Gentiles' would import a later Jewish/Christian
    contrast not required here.
- source_word: אֲשֶׁר לֹא יָדְעוּ
  chosen: that ... have known
  alternatives:
  - that ... knew not
  - that ... were not acquainted with
  lexicon: HALOT
  rationale: יָדַע here denotes experiential acquaintance/familiarity. 'Have known'
    gives clear modern English and preserves the sense of unfamiliar foreign nations.
- source_word: הֵמָּה וַאֲבוֹתָם
  chosen: neither they nor their fathers
  alternatives:
  - they and their fathers
  - neither they nor their ancestors
  lexicon: HALOT
  rationale: The pronoun plus conjunction with 'their fathers' is best represented
    idiomatically in English as 'neither they nor their fathers,' making explicit
    the negated scope already present in Hebrew. 'Fathers' is retained rather than
    'ancestors' for gender-accurate fidelity to the source.
- source_word: וְשִׁלַּחְתִּי
  chosen: and I will send
  alternatives:
  - and I will dispatch
  - and I will unleash
  lexicon: HALOT
  rationale: שׁלח commonly means send. 'Send' is sufficiently literal; 'unleash' is
    interpretive and stronger than the source warrants.
- source_word: אַחֲרֵיהֶם
  chosen: after them
  alternatives:
  - against them
  - in pursuit of them
  lexicon: HALOT
  rationale: Literally 'after them.' In context it conveys pursuit, but 'after them'
    preserves the Hebrew image while remaining intelligible.
- source_word: אֶת־הַחֶרֶב
  chosen: the sword
  alternatives:
  - the sword of war
  - the blade
  lexicon: HALOT
  rationale: חֶרֶב is literally 'sword' and often metonymic for warfare or violent
    judgment. The plain rendering 'the sword' preserves the biblical idiom.
- source_word: עַד כַּלּוֹתִי אוֹתָם
  chosen: until I have consumed them
  alternatives:
  - until I have finished them off
  - until I have made an end of them
  - until I have destroyed them
  lexicon: HALOT
  rationale: כלה in this construction means to complete, finish, or bring to an end.
    'Consumed' preserves the severe judgment sense and echoes common biblical diction
    without becoming archaic. 'Destroyed' is possible but less closely tied to the
    lexical image of bringing to completion/end.
