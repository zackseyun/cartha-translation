id: JER.9.20
reference: Jeremiah 9:20
source:
  edition: WLC
  text: כִּֽי עָ֤לָה מָ֨וֶת֙ בְּ/חַלּוֹנֵ֔י/נוּ בָּ֖א בְּ/אַרְמְנוֹתֵ֑י/נוּ לְ/הַכְרִ֤ית
    עוֹלָל֙ מִ/ח֔וּץ בַּחוּרִ֖ים מֵ/רְחֹבֽוֹת־׃
translation:
  text: For death has climbed in through our windows; it has entered our palaces,
    to cut off the child from outside, the young men from the streets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the infant' for 'the child.' The Hebrew עוֹלָל can denote a very young
      child.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the squares' for 'from the streets.' The Hebrew term can refer
      to broad public places within a city.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or explanation for the preceding summons to lament.
    'For' preserves the causal/explanatory force in natural English.
- source_word: עָלָה
  chosen: has climbed in
  alternatives:
  - has gone up
  - has ascended
  lexicon: HALOT
  rationale: The verb literally means 'went up/ascended,' but with 'through our windows'
    the idiomatic sense is that death has climbed up and in through the windows. 'Has
    climbed in' preserves the vivid imagery better than a flat 'has come up.'
- source_word: מָוֶת
  chosen: death
  lexicon: HALOT
  rationale: Straightforward rendering of the noun. The verse personifies death as
    an intruder, and English can preserve that personification without capitalization.
- source_word: בְּחַלּוֹנֵינוּ
  chosen: in through our windows
  alternatives:
  - through our windows
  - into our windows
  lexicon: HALOT
  rationale: The preposition with 'windows' indicates entry by way of the windows.
    'In through our windows' communicates the motion naturally in English while retaining
    the concrete image.
- source_word: בָּא
  chosen: has entered
  alternatives:
  - has come
  - has come in
  lexicon: HALOT
  rationale: Paired with the previous verb, this second verb intensifies the image
    of invasion. 'Has entered' is slightly more idiomatic with 'our palaces' than
    repeating 'has come in.'
- source_word: בְּאַרְמְנוֹתֵינוּ
  chosen: our palaces
  alternatives:
  - our citadels
  - our strongholds
  lexicon: HALOT
  rationale: ארמון commonly denotes a palace or fortified residence. 'Palaces' is
    the standard and most transparent rendering here, preserving the sense that even
    elite dwellings are penetrated by death.
- source_word: לְהַכְרִית
  chosen: to cut off
  alternatives:
  - to destroy
  - to wipe out
  lexicon: HALOT
  rationale: The Hiphil of כרת often means 'cut off,' a strong covenantal/judicial
    verb that also works in contexts of destruction. 'Cut off' preserves the lexical
    force and the starkness of the Hebrew.
- source_word: עוֹלָל
  chosen: the child
  alternatives:
  - the infant
  - the little child
  lexicon: HALOT
  rationale: The noun refers to a young child. 'The child' is natural English and
    broad enough to fit the context without over-specifying infancy.
- source_word: מִחוּץ
  chosen: from outside
  alternatives:
  - from outdoors
  - out of the open
  lexicon: HALOT
  rationale: The phrase contrasts with the following 'from the streets' and indicates
    the child being removed from the outdoor space. 'From outside' is the clearest
    idiomatic rendering.
- source_word: בַּחוּרִים
  chosen: the young men
  alternatives:
  - the youths
  - the young warriors
  lexicon: HALOT
  rationale: The noun commonly denotes young men of marriageable or fighting age.
    'Young men' is the most direct and gender-accurate rendering, matching the masculine
    plural form.
- source_word: מֵרְחֹבוֹת
  chosen: from the streets
  alternatives:
  - from the squares
  - from the open plazas
  lexicon: HALOT
  rationale: The noun can denote broad places, squares, or streets in a town. 'Streets'
    is the most natural modern English in this context, while still conveying public
    outdoor spaces.
