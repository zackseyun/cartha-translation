id: JER.9.8
reference: Jeremiah 9:8
source:
  edition: WLC
  text: הַ/עַל אֵ֥לֶּה לֹֽא אֶפְקָד בָּ֖/ם נְאֻם יְהוָ֑ה אִ֚ם בְּ/ג֣וֹי אֲשֶׁר כָּ/זֶ֔ה
    לֹ֥א תִתְנַקֵּ֖ם נַפְשִֽׁ/י־־־־־׃ס
translation:
  text: Shall I not punish them for these things? declares the LORD. Shall my soul
    not avenge itself on a nation such as this?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'my soul,' an anthropopathic expression; alternatively, 'I myself'
      or 'my being.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעַל
  chosen: Shall ... for these things?
  alternatives:
  - Because of these things?
  - For these things?
  lexicon: HALOT
  rationale: The interrogative הַ with עַל introduces a rhetorical question, idiomatically
    'for/on account of these things?' In English this is best carried into the whole
    clause as 'for these things,' preserving the causal force without awkward literalism.
- source_word: אֶפְקָד
  chosen: punish
  alternatives:
  - visit
  - call to account
  lexicon: HALOT
  rationale: פקד has a broad range including 'visit, attend to, punish.' In this judgment
    context with the rhetorical question, 'punish' best conveys the negative judicial
    sense in clear modern English.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Declares the LORD' is natural English
    and preserves the solemn prophetic force. יְהוָה is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms, יְהוָה is rendered 'the LORD' in the
    main text.
- source_word: אִם
  chosen: Shall ... not
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: Here אִם introduces a second rhetorical question parallel to the first,
    not a conditional clause. Rendering it with 'Shall ... not' preserves the parallelism
    and expected affirmative force.
- source_word: בְּגוֹי אֲשֶׁר כָּזֶה
  chosen: on a nation such as this
  alternatives:
  - on such a nation
  - against a nation like this
  lexicon: HALOT
  rationale: The phrase identifies the object of judgment. 'Such as this' preserves
    the demonstrative emphasis while remaining idiomatic.
- source_word: תִתְנַקֵּם
  chosen: avenge itself
  alternatives:
  - take vengeance
  - be avenged
  lexicon: HALOT
  rationale: The Hitpael of נקם is reflexive/middle in force. With נַפְשִׁי as subject,
    'avenge itself' most directly reflects the Hebrew form, while 'take vengeance'
    is possible but less explicit about the reflexive nuance.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I myself
  - my being
  lexicon: HALOT
  rationale: נפש literally means 'soul/self/life.' Retaining 'my soul' preserves the
    vivid anthropopathic expression of divine resolve. A more interpretive 'I myself'
    would flatten the Hebrew imagery.
