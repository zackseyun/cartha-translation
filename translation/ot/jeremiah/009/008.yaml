theological_decisions:
- issue: Rendering the divine self-reference נַפְשִׁי in a judgment context
  chosen_reading: my soul
  alternative_readings:
  - I myself
  - my being
  rationale: The Hebrew uses anthropopathic language for God. Preserving 'my soul'
    maintains the text's rhetorical and emotional force without over-interpreting
    the metaphor. This keeps the theological tension rather than smoothing it out.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
