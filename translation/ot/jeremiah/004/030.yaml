id: JER.4.30
reference: Jeremiah 4:30
source:
  edition: WLC
  text: ו/אתי שָׁד֜וּד מַֽה תַּעֲשִׂ֗י כִּֽי תִלְבְּשִׁ֨י שָׁנִ֜י כִּי תַעְדִּ֣י עֲדִי
    זָהָ֗ב כִּֽי תִקְרְעִ֤י בַ/פּוּךְ֙ עֵינַ֔יִ/ךְ לַ/שָּׁ֖וְא תִּתְיַפִּ֑י מָאֲסוּ
    בָ֥/ךְ עֹגְבִ֖ים נַפְשֵׁ֥/ךְ יְבַקֵּֽשׁוּ־־־־־־׃
translation:
  text: And you, devastated one, what will you do? Though you dress in scarlet, though
    you adorn yourself with ornaments of gold, though you enlarge your eyes with paint,
    you beautify yourself in vain. Your lovers despise you; they seek your life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plundered one' or 'destroyed one.' The Hebrew addresses a feminine singular
      figure, likely Jerusalem/Zion personified.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'though you tear your eyes with pukh.' 'Pukh' refers to dark
      eye cosmetic, often rendered 'kohl' or 'antimony.'
    reason: cultural_note
lexical_decisions:
- source_word: שָׁדוּד
  chosen: devastated one
  alternatives:
  - plundered one
  - destroyed one
  - O devastated woman
  lexicon: HALOT
  rationale: Passive participial/adjectival form from שׁדד, addressing Zion/Jerusalem
    in the feminine context. 'Devastated one' captures the state of ruin without over-specifying
    the agent. 'Plundered one' is possible but narrower; the broader context includes
    destruction as well as pillage.
- source_word: מַה תַּעֲשִׂי
  chosen: what will you do?
  alternatives:
  - what are you doing?
  - what can you do?
  lexicon: HALOT
  rationale: Imperfect 2fs naturally renders as future or modal in this rhetorical
    question. 'What will you do?' fits the prophetic taunt and impending crisis.
- source_word: שָׁנִי
  chosen: scarlet
  alternatives:
  - crimson
  lexicon: HALOT
  rationale: Refers to scarlet-dyed material/color. 'Scarlet' is the standard, clear
    English equivalent.
- source_word: תַעְדִּי עֲדִי זָהָב
  chosen: you adorn yourself with ornaments of gold
  alternatives:
  - you deck yourself with gold jewelry
  - you put on ornaments of gold
  lexicon: HALOT
  rationale: The verb עדה in this stem means to adorn oneself; עֲדִי denotes ornament/jewelry.
    The phrase is idiomatic for self-decoration, so 'adorn yourself with ornaments
    of gold' preserves both verb and object.
- source_word: תִקְרְעִי בַפּוּךְ עֵינַיִךְ
  chosen: you enlarge your eyes with paint
  alternatives:
  - you paint your eyes with kohl
  - you tear open your eyes with antimony
  lexicon: HALOT
  rationale: Literally 'tear/rend your eyes with pukh.' In context this is a cosmetic
    idiom for widening/accentuating the eyes with dark eye-paint (kohl/antimony).
    A too-literal rendering would mislead modern readers, so the idiomatic sense is
    preferred in the main text.
- source_word: פּוּךְ
  chosen: paint
  alternatives:
  - kohl
  - eye paint
  - antimony
  lexicon: HALOT
  rationale: פּוּךְ is a cosmetic substance used around the eyes. 'Paint' is accessible
    in the main text; the more specific cultural term 'kohl' is preserved in a footnote.
- source_word: לַשָּׁוְא
  chosen: in vain
  alternatives:
  - for nothing
  - to no purpose
  lexicon: HALOT
  rationale: Standard idiom meaning the beautification is futile.
- source_word: תִּתְיַפִּי
  chosen: you beautify yourself
  alternatives:
  - you make yourself beautiful
  - you make yourself pretty
  lexicon: HALOT
  rationale: Hitpael/reflexive nuance indicates self-beautification. 'Beautify yourself'
    is natural and retains the reflexive sense.
- source_word: מָאֲסוּ בָךְ עֹגְבִים
  chosen: Your lovers despise you
  alternatives:
  - your paramours reject you
  - those who lust after you despise you
  lexicon: HALOT
  rationale: עֹגְבִים refers to illicit lovers/paramours in prophetic metaphor. 'Lovers'
    is idiomatic and readable, while the negative moral coloring is supplied by the
    context of adulterous alliance imagery.
- source_word: נַפְשֵׁךְ יְבַקֵּשׁוּ
  chosen: they seek your life
  alternatives:
  - they seek your soul
  - they seek to kill you
  lexicon: HALOT
  rationale: נפש with בקש commonly means 'seek one's life,' i.e., seek to take one's
    life. This English idiom preserves the Hebrew expression while remaining clear.
