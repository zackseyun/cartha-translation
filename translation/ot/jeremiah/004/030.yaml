theological_decisions:
- issue: Prophetic personification of Jerusalem/Zion as a woman using second feminine
    singular forms
  chosen_reading: Retain feminine singular address implicitly in English without adding
    interpretive labels into the main text
  alternative_readings:
  - Explicitly supply 'O Jerusalem' or 'daughter Zion' in the main text
  - Neutralize the personification
  rationale: The Hebrew grammar clearly addresses a feminine singular entity, likely
    Jerusalem/Zion/Judah personified. English can preserve this by addressing 'you'
    and using 'devastated one' without importing an explicit identification not present
    in this verse's wording. This preserves the metaphorical force and avoids over-interpretation.
  doctrine_reference: Translation philosophy §1, §3, §6
