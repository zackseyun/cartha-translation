id: JER.4.24
reference: Jeremiah 4:24
source:
  edition: WLC
  text: רָאִ֨יתִי֙ הֶֽ/הָרִ֔ים וְ/הִנֵּ֖ה רֹעֲשִׁ֑ים וְ/כָל הַ/גְּבָע֖וֹת הִתְקַלְקָֽלוּ־׃
translation:
  text: I looked at the mountains, and behold, they were quaking, and all the hills
    were shaking.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I saw the mountains, and behold, they were trembling, and all the hills
      were tottering.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  chosen: I looked
  alternatives:
  - I saw
  lexicon: HALOT
  rationale: Qal perfect 1cs of ראה. In this visionary sequence, English 'I looked'
    fits the repeated observational style naturally, while still conveying direct
    perception. 'I saw' is possible but slightly less vivid in the ongoing scene description.
- source_word: הֶהָרִים
  chosen: the mountains
  alternatives:
  - the hills
  lexicon: HALOT
  rationale: הָרִים normally denotes mountains rather than smaller hills. Retaining
    'mountains' preserves the contrast with the following גבעות ('hills').
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there were
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to what is seen. 'Behold'
    preserves the suddenness and prophetic vividness better than flatter alternatives.
- source_word: רֹעֲשִׁים
  chosen: quaking
  alternatives:
  - shaking
  - trembling
  lexicon: HALOT
  rationale: Participle of רעשׁ, commonly used for seismic shaking. 'Quaking' captures
    the earthquake-like force and avoids repeating the same English term used later
    for stylistic differentiation.
- source_word: וְכָל
  chosen: and all
  alternatives:
  - and every
  lexicon: HALOT
  rationale: כָּל with the plural noun naturally yields a collective sense, 'all,'
    in English.
- source_word: הַגְּבָעוֹת
  chosen: the hills
  alternatives:
  - the high hills
  lexicon: HALOT
  rationale: גבעות refers to hills, distinct from the larger הָרִים. Rendering it
    separately preserves the poetic parallelism and topographical distinction.
- source_word: הִתְקַלְקָלוּ
  chosen: were shaking
  alternatives:
  - were tottering
  - were swaying
  - were thrown into agitation
  lexicon: HALOT
  rationale: The verb here conveys violent disturbance or instability. 'Were shaking'
    is the clearest idiomatic English in context, though more literally it can suggest
    being jolted, tottering, or thrown into disorder. The choice prioritizes readability
    while matching the scene of cosmic upheaval.
