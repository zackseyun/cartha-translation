id: JER.4.3
reference: Jeremiah 4:3
source:
  edition: WLC
  text: כִּי כֹ֣ה אָמַ֣ר יְהֹוָ֗ה לְ/אִ֤ישׁ יְהוּדָה֙ וְ/לִ/יר֣וּשָׁלִַ֔ם נִ֥ירוּ לָ/כֶ֖ם נִ֑יר וְ/אַֽל תִּזְרְע֖וּ אֶל קוֹצִֽים־׀־־׃
translation:
  text: 'For thus says Yahweh to the men of Judah and to Jerusalem: Break up for yourselves unplowed ground, and do not sow among thorns.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fallow ground.' The Hebrew refers to land needing to be broken up before sowing.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Follows the project's default rendering for the divine name YHWH per DOCTRINE.md, preserving Jewish reverence tradition and the longstanding small-caps convention in English.
- source_word: לְאִישׁ יְהוּדָה
  chosen: to the men of Judah
  alternatives:
  - to the man of Judah
  - to the people of Judah
  lexicon: HALOT
  rationale: Although אִישׁ is singular in form, it functions collectively here in address to Judah alongside Jerusalem. 'Men of Judah' preserves the masculine/gender-accurate force better than the more interpretive 'people of Judah,' while avoiding an unnaturally singular English rendering.
- source_word: וְלִירוּשָׁלִַם
  chosen: and to Jerusalem
  alternatives:
  - and to the inhabitants of Jerusalem
  rationale: The Hebrew names the city directly, likely as a metonym for its inhabitants. The direct rendering 'to Jerusalem' is more formally faithful; the metonymical sense is clear in context without expansion.
- source_word: נִירוּ
  chosen: Break up
  alternatives:
  - Plow
  - Till
  lexicon: HALOT
  rationale: The verb from ניר/ניר means to till or break up land. 'Break up' fits the imperative force and pairs naturally with the following noun, conveying the metaphor of preparing uncultivated soil.
- source_word: נִיר
  chosen: unplowed ground
  alternatives:
  - fallow ground
  - fresh ground
  - tilled field
  lexicon: HALOT
  rationale: The noun denotes freshly broken or untilled/fallow soil. 'Unplowed ground' is clear modern English and avoids the somewhat archaic 'fallow ground,' while still preserving the agricultural image. Because the imperative is to prepare land not yet fit for sowing, this rendering best captures the sense.
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for you
  rationale: The dative pronoun adds reflexive emphasis to the command. 'For yourselves' preserves that force more clearly in English.
- source_word: וְאַל תִּזְרְעוּ
  chosen: and do not sow
  alternatives:
  - and do not plant
  lexicon: HALOT
  rationale: זָרַע specifically refers to sowing seed. 'Sow' preserves the agricultural metaphor more precisely than the broader 'plant.'
- source_word: אֶל קוֹצִים
  chosen: among thorns
  alternatives:
  - into thorns
  - toward thorns
  lexicon: HALOT
  rationale: Although אֶל often means 'to' or 'toward,' with sowing and hostile terrain the idiomatic sense is 'among' or 'into the midst of.' 'Among thorns' is natural English and reflects the warning against sowing where thorns remain.
