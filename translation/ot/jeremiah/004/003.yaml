theological_decisions:
- issue: Metaphorical force of the agricultural commands
  chosen_reading: Retain the agricultural imagery directly ('Break up ... unplowed ground ... do not sow among thorns') without explicating repentance in the main text.
  alternative_readings:
  - Paraphrastic rendering making the metaphor explicit, e.g., 'Prepare your hearts and do not plant among sinful obstacles'
  rationale: The verse uses an agricultural metaphor for spiritual preparation and repentance, but the Hebrew itself states the image rather than its interpretation. Preserving the metaphor avoids importing explanatory theology into the main text beyond what the source says.
  doctrine_reference: Translation philosophy items 1 and 3
