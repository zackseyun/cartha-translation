theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH, aligning with Jewish reverence
    tradition and longstanding English Bible practice while preserving covenantal
    reference.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the repeated שוב clauses
  chosen_reading: 'conditional-exhortational: ''If you return ... to me you should
    return'''
  alternative_readings:
  - '''If you return, O Israel ... you will return to me'''
  - '''If you return ... then return to me'''
  rationale: The Hebrew repeats שוב for rhetorical emphasis. The chosen rendering
    preserves both occurrences and conveys the prophetic summons without collapsing
    the repetition into a single English verb.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source-text sense
    over translation tradition; document significant variance'
