id: JER.4.1
reference: Jeremiah 4:1
source:
  edition: WLC
  text: אִם תָּשׁ֨וּב יִשְׂרָאֵ֧ל נְאֻם יְהוָ֛ה אֵלַ֖/י תָּשׁ֑וּב וְ/אִם תָּסִ֧יר
    שִׁקּוּצֶ֛י/ךָ מִ/פָּנַ֖/י וְ/לֹ֥א תָנֽוּד־׀־־׃
translation:
  text: If you return, O Israel, declares the LORD, to me you should return; if you
    remove your detestable things from before me and do not wander about,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If you return, O Israel ... you will return to me,' preserving the
      repeated Hebrew verb more formally.
    reason: alternative_reading
  - marker: b
    text: '''Detestable things'' refers especially to abhorrent idolatrous objects;
      alternatively, ''your abominations'' or more interpretively ''your idols.'''
    reason: lexical_alternative
  - marker: c
    text: Or, 'and do not waver' or 'and do not stray'; the Hebrew verb can suggest
      wandering, instability, or wavering.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - When
  lexicon: HALOT
  rationale: Introduces a conditional clause. 'If' best preserves the explicit conditional
    force in this repentance appeal.
- source_word: תָּשׁוּב
  chosen: you return
  alternatives:
  - you turn back
  - you repent
  lexicon: HALOT
  rationale: From שוב, broadly 'turn/return.' 'Return' preserves the covenantal sense
    of turning back to God without over-interpreting as purely inward repentance.
- source_word: יִשְׂרָאֵל
  chosen: O Israel
  alternatives:
  - Israel
  rationale: Direct address is clear from the vocative-like placement; 'O' reflects
    prophetic address naturally in English without being overly archaic in this context.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic, clear,
    and preserves the solemn prophetic force. 'the LORD' follows the doctrinal default
    for YHWH.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Simple directional phrase; 'to me' is the natural modern English equivalent.
- source_word: תָּשׁוּב
  chosen: you should return
  alternatives:
  - you shall return
  - return
  lexicon: HALOT
  rationale: The repetition of שוב after 'to me' is awkward if rendered identically
    in English ('if you return ... to me you will return'). 'You should return' preserves
    the exhortational force and the rhetorical emphasis of the repetition while remaining
    readable.
- source_word: תָּסִיר
  chosen: you remove
  alternatives:
  - you put away
  - you take away
  lexicon: HALOT
  rationale: Hiphil of סור/סיר here means to remove or put away. 'Remove' is concise
    and fits the context of eliminating idols.
- source_word: שִׁקּוּצֶיךָ
  chosen: your detestable things
  alternatives:
  - your abominations
  - your idols
  lexicon: HALOT
  rationale: The noun often refers to abhorrent cultic objects, especially idols.
    'Detestable things' preserves the lexical disgust of the Hebrew while avoiding
    narrowing the term too quickly; 'idols' is interpretive but contextually likely.
- source_word: מִפָּנַי
  chosen: from before me
  alternatives:
  - out of my sight
  - from my presence
  lexicon: HALOT
  rationale: Literally 'from before my face/presence.' 'From before me' keeps the
    spatial-relational imagery and divine-personal dimension.
- source_word: וְלֹא תָנוּד
  chosen: and do not wander about
  alternatives:
  - and do not waver
  - and you will not be moved
  - and do not stray
  lexicon: HALOT
  rationale: נוד can denote wandering, moving about, or wavering. In this repentance
    context, 'wander about' captures instability and straying without importing a
    more specific metaphor than the Hebrew requires.
