theological_decisions:
- issue: Rendering of personified Zion
  chosen_reading: Daughter Zion as a poetic personification of Jerusalem/Zion speaking
    in lament
  alternative_readings:
  - the daughter of Zion
  rationale: This is not a doctrinally contested term but a significant interpretive-poetic
    choice. The translation preserves the personification without allegorizing beyond
    the text.
- issue: Rendering נֶפֶשׁ in a death-threat context
  chosen_reading: my life
  alternative_readings:
  - my soul
  rationale: To avoid importing later anthropological distinctions the Hebrew does
    not require, the translation uses 'life' in this immediate context of mortal danger.
    This preserves the text's concrete sense and avoids doctrinal over-reading.
  doctrine_reference: Translation philosophy §1, §3
