id: JER.4.31
reference: Jeremiah 4:31
source:
  edition: WLC
  text: כִּי֩ ק֨וֹל כְּ/חוֹלָ֜ה שָׁמַ֗עְתִּי צָרָה֙ כְּ/מַבְכִּירָ֔ה ק֧וֹל בַּת צִיּ֛וֹן
    תִּתְיַפֵּ֖חַ תְּפָרֵ֣שׂ כַּפֶּ֑י/הָ אֽוֹי נָ֣א לִ֔/י כִּֽי עָיְפָ֥ה נַפְשִׁ֖/י
    לְ/הֹרְגִֽים־־־׃פ
translation:
  text: 'For I have heard a sound like a woman in labor, distress like one giving
    birth to her first child— the sound of Daughter Zion gasping for breath, spreading
    out her hands: “Woe is me, for my life is faint before killers.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “voice” or “cry” for the repeated Hebrew קול (“sound/voice”).
    reason: lexical_alternative
  - marker: b
    text: Hebrew “like one giving birth for the first time,” an image of especially
      intense labor pain.
    reason: cultural_note
  - marker: c
    text: Or “my soul is weary before murderers.” Hebrew nephesh can mean “soul,”
      “self,” or “life.”
    reason: lexical_alternative
lexical_decisions:
- source_word: קּוֹל
  chosen: sound
  alternatives:
  - voice
  - cry
  lexicon: HALOT
  rationale: קול can denote sound, voice, or noise. Here the first occurrence introduces
    an auditory impression before the speaker is identified, so 'sound' best preserves
    the simile. The later construct phrase 'the sound of Daughter Zion' keeps the
    repetition while allowing the content to become personal.
- source_word: כְּחוֹלָה
  chosen: like a woman in labor
  alternatives:
  - like a sick woman
  - like one writhing in labor
  lexicon: HALOT
  rationale: From חוּל/חיל in labor-pain imagery; in prophetic contexts it commonly
    evokes labor rather than generic sickness. 'Woman in labor' is idiomatic and fits
    the parallel with giving birth.
- source_word: צָרָה
  chosen: distress
  alternatives:
  - anguish
  - trouble
  lexicon: HALOT
  rationale: The noun here names the painful condition accompanying the labor simile.
    'Distress' is broad enough to cover both emotional and physical anguish without
    flattening the intensity.
- source_word: כְּמַבְכִּירָה
  chosen: like one giving birth to her first child
  alternatives:
  - like a first-time mother in labor
  - like a woman bearing her firstborn
  lexicon: HALOT
  rationale: The Hiphil participial form from בכר points to first birth/firstborn
    status. The phrase intensifies the pain image; 'giving birth to her first child'
    is clear modern English and preserves the comparative force.
- source_word: בַּת צִיּוֹן
  chosen: Daughter Zion
  alternatives:
  - the daughter of Zion
  lexicon: HALOT
  rationale: A conventional prophetic personification. 'Daughter Zion' preserves the
    title-like force and poetic compactness better than the more expanded English
    genitive.
- source_word: תִּתְיַפֵּחַ
  chosen: gasping for breath
  alternatives:
  - panting
  - groaning
  lexicon: HALOT
  rationale: The verb conveys labored breathing or panting. 'Gasping for breath' makes
    the image vivid and natural in English while preserving the bodily distress.
- source_word: תְּפָרֵשׂ כַּפֶּיהָ
  chosen: spreading out her hands
  alternatives:
  - stretching out her palms
  - spreading her hands
  lexicon: HALOT
  rationale: The idiom denotes extending the hands in appeal, desperation, or supplication.
    'Spreading out her hands' is a natural rendering that preserves the gesture without
    over-interpreting it.
- source_word: אוֹי נָא לִי
  chosen: Woe is me
  alternatives:
  - Alas for me
  - Woe to me
  lexicon: HALOT
  rationale: An exclamation of lament. 'Woe is me' is concise, idiomatic, and suitably
    grave; נָא adds urgency/pleading force, which is sufficiently conveyed by the
    exclamatory lament.
- source_word: עָיְפָה נַפְשִׁי
  chosen: my life is faint
  alternatives:
  - my soul is weary
  - my life is exhausted
  lexicon: HALOT
  rationale: נפש can mean soul, self, or life. In a threat-of-death context with killers
    immediately following, 'life' better communicates the endangered self than the
    more potentially misleading 'soul.' 'Is faint' preserves the weakening imagery.
- source_word: לְהֹרְגִים
  chosen: before killers
  alternatives:
  - because of murderers
  - to the killers
  - before those who kill
  lexicon: HALOT
  rationale: The preposition ל with the participle can mark relation toward or in
    the face of. In context Daughter Zion is collapsing in the presence of violent
    attackers; 'before killers' is concise and contextually apt, though the phrase
    also carries the sense of being at the mercy of murderers.
