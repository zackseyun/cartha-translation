theological_decisions:
- issue: Rendering רָעָה with reference to divine action
  chosen_reading: disaster
  alternative_readings:
  - evil
  - calamity
  rationale: The verse depicts the LORD bringing judgment from the north. Rendering
    רָעָה as 'disaster' preserves divine sovereignty in judgment without implying
    that God authors moral evil. This follows contextual usage in prophetic literature.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    theological tension without importing doctrinal claims the text does not make.'
