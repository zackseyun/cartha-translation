id: JER.4.6
reference: Jeremiah 4:6
source:
  edition: WLC
  text: שְׂאוּ נֵ֣ס צִיּ֔וֹנָ/ה הָעִ֖יזוּ אַֽל תַּעֲמֹ֑דוּ כִּ֣י רָעָ֗ה אָנֹכִ֛י מֵבִ֥יא
    מִ/צָּפ֖וֹן וְ/שֶׁ֥בֶר גָּדֽוֹל־־׃
translation:
  text: Raise a signal toward Zion. Flee for safety; do not stand still, for I am
    bringing disaster from the north, and great destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Raise a banner toward Zion.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Take refuge; do not stop.'
    reason: lexical_alternative
  - marker: c
    text: '''Disaster'' here refers to calamity or judgment, not moral evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאוּ
  chosen: Raise
  alternatives:
  - Lift up
  - Carry
  lexicon: HALOT
  rationale: Imperative plural of נשׂא in context with נֵס idiomatically means to
    lift/raise a signal or banner. 'Raise' is concise modern English and fits the
    military-warning context.
- source_word: נֵס
  chosen: signal
  alternatives:
  - banner
  - standard
  lexicon: HALOT
  rationale: נֵס can denote a signal pole/banner used for rallying or warning. 'Signal'
    communicates the function clearly in modern English without implying a decorative
    flag.
- source_word: צִיּוֹנָה
  chosen: toward Zion
  alternatives:
  - to Zion
  - Zionward
  lexicon: HALOT
  rationale: The directional he indicates motion/direction toward Zion rather than
    simple apposition. 'Toward Zion' preserves that directional nuance naturally in
    English.
- source_word: הָעִיזוּ
  chosen: Flee for safety
  alternatives:
  - Take refuge
  - Seek safety quickly
  lexicon: HALOT
  rationale: From עוז in the Hiphil, likely 'take refuge' or 'seek safety.' In this
    urgent prophetic warning, 'Flee for safety' brings out the imperative force and
    movement implied by the surrounding commands.
- source_word: אַל תַּעֲמֹדוּ
  chosen: do not stand still
  alternatives:
  - do not stand
  - do not stop
  lexicon: HALOT
  rationale: The prohibition warns against delay or lingering. 'Do not stand still'
    captures the practical sense in context better than the more wooden 'do not stand.'
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - calamity
  lexicon: HALOT
  rationale: In prophetic judgment contexts רָעָה commonly denotes calamity/disaster
    rather than moral evil. 'Disaster' avoids suggesting that God is bringing moral
    evil.
- source_word: מֵבִיא
  chosen: am bringing
  alternatives:
  - am about to bring
  - bring
  lexicon: HALOT
  rationale: The participle with אָנֹכִי expresses imminent or ongoing action. 'Am
    bringing' preserves the vividness and direct divine agency.
- source_word: מִצָּפוֹן
  chosen: from the north
  alternatives:
  - out of the north
  lexicon: HALOT
  rationale: Standard geographic expression in Jeremiah for the direction from which
    judgment comes.
- source_word: שֶׁבֶר גָּדוֹל
  chosen: great destruction
  alternatives:
  - great ruin
  - a great crash
  lexicon: HALOT
  rationale: שֶׁבֶר here denotes breaking, ruin, or destruction. 'Great destruction'
    is idiomatic and suits the parallel with רָעָה.
