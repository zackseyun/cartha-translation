id: JER.4.8
reference: Jeremiah 4:8
source:
  edition: WLC
  text: עַל זֹ֛את חִגְר֥וּ שַׂקִּ֖ים סִפְד֣וּ וְ/הֵילִ֑ילוּ כִּ֥י לֹא שָׁ֛ב חֲר֥וֹן אַף יְהֹוָ֖ה מִמֶּֽ/נּוּ־־־׃פ
translation:
  text: Because of this, put on sackcloth; mourn and wail, for the burning anger of Yahweh has not turned away from us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gird yourselves with sackcloth.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the fierce anger of the LORD has not turned back from us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל זֹאת
  chosen: Because of this
  alternatives:
  - For this
  - On account of this
  lexicon: HALOT
  rationale: The preposition עַל with the demonstrative זֹאת introduces the reason or occasion for the following imperatives. 'Because of this' is idiomatic modern English and preserves the causal force.
- source_word: חִגְרוּ שַׂקִּים
  chosen: put on sackcloth
  alternatives:
  - gird yourselves with sackcloth
  - tie on sackcloth
  lexicon: HALOT
  rationale: חגר literally means 'gird' or 'bind on,' and with שַׂקִּים refers to donning mourning garments. 'Put on sackcloth' communicates the action naturally in English while preserving the mourning image.
- source_word: סִפְדוּ
  chosen: mourn
  alternatives:
  - lament
  - wail in mourning
  lexicon: HALOT
  rationale: The verb ספד denotes lamenting, especially in mourning contexts. 'Mourn' fits the sequence with the next verb and avoids redundancy while retaining funeral-lament connotations.
- source_word: וְהֵילִילוּ
  chosen: and wail
  alternatives:
  - and howl
  - and lament loudly
  lexicon: HALOT
  rationale: ילל often denotes loud cries of grief or distress. 'Wail' is more natural in contemporary English than 'howl' here, while still conveying audible lament.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: כִּי introduces the ground for the commands. 'For' is concise and fits the explanatory relation.
- source_word: לֹא שָׁב
  chosen: has not turned away
  alternatives:
  - has not relented
  - has not withdrawn
  - did not turn back
  lexicon: HALOT
  rationale: שׁוּב in this construction means 'turn back/away.' 'Has not turned away' preserves the metaphor and matches the perfect aspect in context better than the more interpretive 'has not relented.'
- source_word: חֲרוֹן אַף
  chosen: the burning anger
  alternatives:
  - the fierce anger
  - the heat of anger
  - the wrath
  lexicon: HALOT
  rationale: The idiom literally combines 'burning' and 'nose/anger' to express intense wrath. 'Burning anger' preserves the metaphorical heat and avoids flattening the expression to a generic 'wrath.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִמֶּנּוּ
  chosen: from us
  alternatives:
  - from him
  - from it
  lexicon: HALOT
  rationale: 'The suffix is first person common plural in this verse''s morphology and context: the prophet includes the people under judgment. Therefore ''from us'' is the correct rendering.'
