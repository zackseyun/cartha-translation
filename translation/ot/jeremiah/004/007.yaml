id: JER.4.7
reference: Jeremiah 4:7
source:
  edition: WLC
  text: עָלָ֤ה אַרְיֵה֙ מִֽ/סֻּבְּכ֔/וֹ וּ/מַשְׁחִ֣ית גּוֹיִ֔ם נָסַ֖ע יָצָ֣א מִ/מְּקֹמ֑/וֹ
    לָ/שׂ֤וּם אַרְצֵ/ךְ֙ לְ/שַׁמָּ֔ה עָרַ֥יִ/ךְ תִּצֶּ֖ינָה מֵ/אֵ֥ין יוֹשֵֽׁב׃
translation:
  text: A lion has come up from his thicket, and a destroyer of nations has set out;
    he has gone out from his place to make your land a desolation. Your cities will
    become ruins, without inhabitant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from his lair.' The Hebrew term refers to dense cover or tangled brush
      from which a lion emerges.
    reason: lexical_alternative
  - marker: b
    text: Or 'Your cities will be laid waste, with no one dwelling in them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה
  chosen: has come up
  alternatives:
  - has gone up
  - has arisen
  lexicon: HALOT
  rationale: Qal perfect of עלה commonly means 'go up/come up.' In this invasion context,
    'has come up' is idiomatic in English and preserves the vivid movement toward
    the land.
- source_word: אַרְיֵה
  chosen: lion
  lexicon: HALOT
  rationale: Literal 'lion' is the controlling metaphor for the invader; no need to
    flatten into 'enemy' in the main text.
- source_word: מִסֻּבְּכוֹ
  chosen: from his thicket
  alternatives:
  - from his lair
  - from his covert
  lexicon: HALOT
  rationale: The noun denotes a dense cover or thicket. 'Thicket' best preserves the
    image of a lion emerging from tangled brush; 'lair' is possible but less directly
    tied to the Hebrew image.
- source_word: מַשְׁחִית גּוֹיִם
  chosen: a destroyer of nations
  alternatives:
  - the destroyer of nations
  - one who destroys nations
  lexicon: HALOT
  rationale: The participial construction functions appositionally to 'lion,' identifying
    the invader. The indefinite 'a destroyer of nations' is natural English and preserves
    the descriptive force without over-specifying.
- source_word: נָסַע
  chosen: has set out
  alternatives:
  - has pulled up
  - has broken camp
  - has departed
  lexicon: HALOT
  rationale: The verb often refers to pulling up camp and setting out on a journey.
    In context of military advance, 'has set out' communicates the movement clearly
    in modern English.
- source_word: יָצָא מִמְּקֹמוֹ
  chosen: he has gone out from his place
  alternatives:
  - he has come out from his place
  lexicon: HALOT
  rationale: This clause reinforces the invader's departure from his own base. 'Gone
    out from his place' is slightly more formal but keeps the Hebrew sequence and
    imagery.
- source_word: לָשׂוּם אַרְצֵךְ לְשַׁמָּה
  chosen: to make your land a desolation
  alternatives:
  - to make your land a waste
  - to turn your land into a desolation
  lexicon: HALOT
  rationale: The infinitive plus object and result phrase expresses purpose/result.
    'Desolation' captures the prophetic register of שַׁמָּה better than the flatter
    'waste.'
- source_word: עָרַיִךְ תִּצֶּינָה
  chosen: Your cities will become ruins
  alternatives:
  - Your cities will be laid waste
  - Your cities will be desolated
  lexicon: HALOT
  rationale: The verb here conveys becoming dry, devastated, or ruined. 'Will become
    ruins' gives a clear result in natural English, matching the plural feminine subject.
- source_word: מֵאֵין יוֹשֵׁב
  chosen: without inhabitant
  alternatives:
  - with no one living in them
  - without anyone dwelling there
  lexicon: HALOT
  rationale: The idiom means there is no resident left. 'Without inhabitant' is concise
    and preserves the prophetic tone; the singular collective 'inhabitant' is idiomatic
    in English.
