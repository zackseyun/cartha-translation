theological_decisions:
- issue: Intertextual echo of Genesis 1:2 in a judgment oracle
  chosen_reading: 'Render the verse in a way that preserves cosmic de-creation imagery:
    ''earth ... formless and empty'' and ''the heavens ... had no light.'''
  alternative_readings:
  - A more localized reading emphasizing Judah/the land under devastation
  rationale: The wording תֹהוּ וָבֹהוּ and the earth-heavens pairing strongly evoke
    Genesis 1:2, presenting judgment as a reversal of creation. The translation preserves
    that theological-literary tension without denying that the oracle also concerns
    Judah historically.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
