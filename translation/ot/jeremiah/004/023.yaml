id: JER.4.23
reference: Jeremiah 4:23
source:
  edition: WLC
  text: רָאִ֨יתִי֙ אֶת הָ/אָ֔רֶץ וְ/הִנֵּה תֹ֖הוּ וָ/בֹ֑הוּ וְ/אֶל הַ/שָּׁמַ֖יִם וְ/אֵ֥ין
    אוֹרָֽ/ם־־־׃
translation:
  text: I looked at the earth, and behold, it was formless and empty; and at the heavens,
    and they had no light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew tohu vabohu, traditionally 'without form and void' or 'waste and
      void'; the phrase echoes Genesis 1:2.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  chosen: I looked
  alternatives:
  - I saw
  lexicon: HALOT
  rationale: Qal perfect 1cs of ראה. In prophetic vision context, 'I looked' reads
    naturally in English while preserving the first-person observational force. 'I
    saw' is possible but slightly less vivid with the following repeated scene-setting
    elements.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' Here the paired reference to 'the heavens'
    and the allusion to Genesis 1:2 favor the cosmic sense 'earth' rather than a localized
    'land.'
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there it was
  lexicon: HALOT
  rationale: Retains the deictic, visionary force of הִנֵּה in elevated but still
    intelligible English. This helps preserve the prophetic immediacy of the scene.
- source_word: תֹהוּ וָבֹהוּ
  chosen: formless and empty
  alternatives:
  - waste and void
  - without form and void
  lexicon: HALOT
  rationale: This collocation strongly echoes Genesis 1:2. 'Formless and empty' is
    clear modern English and preserves the sense of desolation and uncreation without
    archaic phrasing. Traditional alternatives are worth preserving because of the
    intertextual resonance.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  - the heavens above
  lexicon: HALOT
  rationale: Hebrew plural שָׁמַיִם is commonly rendered 'heavens.' In parallel with
    'earth' and in a cosmic-judgment context, 'the heavens' is preferable to the more
    limited 'sky.'
- source_word: וְאֵין אוֹרָם
  chosen: and they had no light
  alternatives:
  - and there was no light in them
  - and their light was gone
  lexicon: HALOT
  rationale: The suffix on אוֹרָם refers back to the heavens. 'They had no light'
    is concise and natural, preserving the predication of absent light without overinterpreting
    whether the light was removed or simply absent.
