id: JER.4.19
reference: Jeremiah 4:19
source:
  edition: WLC
  text: מֵעַ֣/י מֵעַ֨/י אחולה קִיר֥וֹת לִבִּ֛/י הֹֽמֶה לִּ֥/י לִבִּ֖/י לֹ֣א אַחֲרִ֑ישׁ
    כִּ֣י ק֤וֹל שׁוֹפָר֙ שמעתי נַפְשִׁ֔/י תְּרוּעַ֖ת מִלְחָמָֽה׀׀־׃
translation:
  text: My inward parts, my inward parts! I writhe in pain! The walls of my heart!
    My heart pounds within me; I cannot keep silent, for you, my soul, have heard
    the sound of the trumpet, the battle cry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my soul has heard'; the Hebrew may be read either as direct self-address
      ('you, my soul') or as an emphatic subject ('my soul').
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the walls of my heart,' a vivid bodily metaphor for inner anguish;
      some render more interpretively as 'the chambers of my heart.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the alarm of war' or 'the shout of battle' for 'the battle cry.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעַי
  chosen: my inward parts
  alternatives:
  - my bowels
  - my belly
  - my innermost being
  lexicon: HALOT
  rationale: מֵעֶה literally refers to internal organs/entrails and in poetic contexts
    conveys deep inner anguish. 'My inward parts' preserves the visceral Hebrew imagery
    better than the archaic 'bowels' while avoiding the over-abstract 'innermost being.'
    The repetition is retained for emotional intensity.
- source_word: אחולה
  chosen: I writhe in pain
  alternatives:
  - I am in anguish
  - I am pained
  - I writhe
  lexicon: HALOT
  rationale: From חול/חיל in a form expressing writhing or travail-like anguish. 'I
    writhe in pain' captures both the bodily and emotional force of the cry more vividly
    than the flatter 'I am in anguish.'
- source_word: קירות לבי
  chosen: The walls of my heart
  alternatives:
  - the chambers of my heart
  - my heart's walls
  lexicon: HALOT
  rationale: קִירוֹת literally means 'walls.' In this idiom it likely refers metaphorically
    to the inner walls/chambers of the heart. The literal image is preserved in English
    to maintain the startling corporeal metaphor, rather than smoothing it into a
    purely interpretive rendering.
- source_word: המה לי לבי
  chosen: My heart pounds within me
  alternatives:
  - my heart is in tumult within me
  - my heart murmurs within me
  - my heart roars within me
  lexicon: HALOT
  rationale: המה denotes tumult, murmur, roar, or agitation. In context of panic and
    bodily distress, 'pounds within me' communicates the agitated internal motion
    naturally in English while staying close to the sense.
- source_word: לא אחריש
  chosen: I cannot keep silent
  alternatives:
  - I will not be silent
  - I cannot be still
  lexicon: HALOT
  rationale: The Hiphil of חרש can mean be silent/keep quiet. Given the immediate
    cause clause and emotional outcry, 'I cannot keep silent' fits the experiential
    force better than a volitional 'I will not be silent.'
- source_word: כי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the speaker's inability to remain silent. 'For'
    is concise and natural in elevated English style.
- source_word: קול שופר
  chosen: the sound of the trumpet
  alternatives:
  - the voice of the trumpet
  - the trumpet blast
  lexicon: HALOT
  rationale: קוֹל is 'sound/voice,' and שׁוֹפָר is a ram's-horn trumpet. 'The sound
    of the trumpet' preserves both elements explicitly. 'Trumpet blast' is possible
    but slightly compresses the Hebrew expression.
- source_word: שמעתי נפשי
  chosen: you, my soul, have heard
  alternatives:
  - my soul has heard
  - I have heard in my soul
  lexicon: HALOT
  rationale: נַפְשִׁי appears after the verb and is best taken as a vocative/exclamatory
    apposition ('O my soul') or emphatic internal address. Rendering it as 'you, my
    soul, have heard' preserves the abruptness and emotional self-address better than
    the smoother 'my soul has heard.'
- source_word: תרועת מלחמה
  chosen: the battle cry
  alternatives:
  - the alarm of war
  - the shout of battle
  - the war cry
  lexicon: HALOT
  rationale: תְּרוּעָה can denote a loud shout, alarm, or signal; with מִלְחָמָה it
    refers to the cry/alarm associated with battle. 'Battle cry' is concise and vivid,
    though 'alarm of war' is a viable more formal alternative.
