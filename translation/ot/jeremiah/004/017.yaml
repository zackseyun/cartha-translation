id: JER.4.17
reference: Jeremiah 4:17
source:
  edition: WLC
  text: כְּ/שֹׁמְרֵ֣י שָׂדַ֔י הָי֥וּ עָלֶ֖י/הָ מִ/סָּבִ֑יב כִּי אֹתִ֥/י מָרָ֖תָה נְאֻם יְהוָֽה־־׃
translation:
  text: Like watchmen of a field, they are against her all around, because she has rebelled against me, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Like guards of the open country' or 'Like keepers of a field.' The image is of watchers surrounding and guarding a field, here applied to enemies encircling the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּשֹׁמְרֵי
  chosen: Like watchmen
  alternatives:
  - Like keepers
  - Like guards
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('like/as'). שׁמר in the participial plural denotes those who keep watch or guard. 'Watchmen' is idiomatic and fits the military/siege imagery better than the more generic 'keepers'.
- source_word: שָׂדַי
  chosen: of a field
  alternatives:
  - of the open country
  - of the countryside
  lexicon: HALOT
  rationale: שׂדה ordinarily means 'field.' In context it likely evokes field-watchers guarding crops, an image for encircling vigilance. Singular 'field' is retained as in the Hebrew form rather than generalized to 'fields.'
- source_word: הָיוּ
  chosen: they are
  alternatives:
  - they have become
  - they were
  lexicon: HALOT
  rationale: Though formally a qatal ('were/have been'), Hebrew often uses the perfect in prophetic discourse for vivid or imminent action. English present 'are' best conveys the immediate encirclement in context without sounding merely past.
- source_word: עָלֶיהָ
  chosen: against her
  alternatives:
  - upon her
  - over her
  lexicon: HALOT
  rationale: With hostile military context, על conveys opposition directed toward the feminine singular referent (Jerusalem/Judah personified). 'Against her' communicates the adversative force more naturally than the more literal 'upon her.'
- source_word: מִסָּבִיב
  chosen: all around
  alternatives:
  - from all around
  - round about
  lexicon: HALOT
  rationale: The phrase indicates surrounding encirclement. 'All around' is natural modern English and captures the siege image. 'From all around' is possible but less smooth in English here.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the judgment. 'Because' is clearer in contemporary English than 'for' while preserving the causal sense.
- source_word: אֹתִי
  chosen: against me
  alternatives:
  - me
  lexicon: HALOT
  rationale: The direct-object marker plus pronoun with מרה yields the sense 'rebel against someone.' English requires the preposition to express the verb's object naturally.
- source_word: מָרָתָה
  chosen: has rebelled
  alternatives:
  - has been rebellious
  - has defied
  lexicon: HALOT
  rationale: מרה commonly denotes rebellion or defiance, especially against God. 'Has rebelled' is the most direct and theologically weighty rendering, preserving covenantal disobedience without paraphrase.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is well rendered as 'declares the LORD' in readable modern English. It preserves the solemn divine utterance. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
