theological_decisions:
- issue: Referent of the feminine singular pronoun
  chosen_reading: Rendered as 'her' without specifying Jerusalem in the main text
  alternative_readings:
  - Jerusalem
  - daughter Zion
  - the land/Judah
  rationale: The Hebrew leaves the antecedent implicit, and the immediate context personifies the judged community/city as feminine. Preserving 'her' maintains the source-text imagery and avoids over-specifying beyond the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
