id: JER.4.9
reference: Jeremiah 4:9
source:
  edition: WLC
  text: וְ/הָיָ֤ה בַ/יּוֹם הַ/הוּא֙ נְאֻם יְהוָ֔ה יֹאבַ֥ד לֵב הַ/מֶּ֖לֶךְ וְ/לֵ֣ב הַ/שָּׂרִ֑ים וְ/נָשַׁ֨מּוּ֙ הַ/כֹּ֣הֲנִ֔ים וְ/הַ/נְּבִיאִ֖ים יִתְמָֽהוּ־־־׃
translation:
  text: And it will happen on that day, declares Yahweh, that the heart of the king and the heart of the officials will perish, and the priests will be appalled, and the prophets will be astonished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the courage of the king and the officials will fail.' The Hebrew says literally, 'the heart of the king and the heart of the officials will perish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall come to pass
  - And it will be
  lexicon: HALOT
  rationale: Introduces a future event formula. 'It will happen' is natural modern English and preserves the predictive force without archaic diction.
- source_word: בַיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal expression; 'on that day' is idiomatic contemporary English and preserves the prophetic register.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A prophetic speech formula. 'Declares the LORD' is concise, idiomatic, and preserves the solemn force. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: יֹאבַד לֵב הַמֶּלֶךְ וְלֵב הַשָּׂרִים
  chosen: the heart of the king and the heart of the officials will perish
  alternatives:
  - the courage of the king and the officials will fail
  - the mind of the king and the officials will be lost
  lexicon: HALOT
  rationale: לֵב literally means 'heart,' often denoting inner resolve, courage, or understanding. Retaining 'heart' preserves the Hebrew imagery; 'will perish' reflects אבד straightforwardly. Repeating 'the heart of' mirrors the Hebrew structure and keeps the parallelism clear. 'Officials' is a natural rendering of שָׂרִים in this governmental context.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Direct rendering of the singular noun.
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the leaders
  lexicon: HALOT
  rationale: שָׂרִים refers to ruling officers or princes. 'Officials' communicates governing status in clear modern English without implying hereditary nobility.
- source_word: וְנָשַׁמּוּ
  chosen: will be appalled
  alternatives:
  - will be desolated
  - will be stunned
  - will be horrified
  lexicon: HALOT
  rationale: From שמם in the nifal, expressing being appalled, stunned, or desolated. In parallel with the prophets' reaction, 'will be appalled' best captures the emotional shock.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Direct rendering.
- source_word: וְהַנְּבִיאִים יִתְמָהוּ
  chosen: and the prophets will be astonished
  alternatives:
  - and the prophets will wonder
  - and the prophets will be stunned
  lexicon: HALOT
  rationale: תמה conveys astonishment or bewilderment. 'Will be astonished' fits the context of shocked dismay and pairs well with 'will be appalled' for the priests.
