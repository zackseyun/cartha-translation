theological_decisions:
- issue: Rendering of divine נחם
  chosen_reading: I have not relented
  alternative_readings:
  - I have not repented
  - I have not changed my mind
  rationale: The verse speaks of God's steadfastness in carrying out announced judgment.
    Rendering נחם as 'repented' in English could wrongly suggest moral fault in God;
    'relented' preserves the semantic value in this context without importing doctrinal
    confusion.
  doctrine_reference: Translation philosophy §1, §3
- issue: Scope of הָאָרֶץ
  chosen_reading: the earth
  alternative_readings:
  - the land
  rationale: The immediate context concerns Judah, but the poetic parallel with 'the
    heavens above' broadens the imagery to cosmic dimensions. 'The earth' preserves
    that tension rather than narrowing the line prematurely.
  doctrine_reference: Translation philosophy §3
