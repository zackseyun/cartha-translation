id: JER.4.28
reference: Jeremiah 4:28
source:
  edition: WLC
  text: עַל זֹאת֙ תֶּאֱבַ֣ל הָ/אָ֔רֶץ וְ/קָדְר֥וּ הַ/שָּׁמַ֖יִם מִ/מָּ֑עַל עַ֤ל כִּי
    דִבַּ֨רְתִּי֙ זַמֹּ֔תִי וְ/לֹ֥א נִחַ֖מְתִּי וְ/לֹא אָשׁ֥וּב מִמֶּֽ/נָּה־־־׃
translation:
  text: Because of this the earth will mourn, and the heavens above will grow dark,
    because I have spoken, I have purposed, and I have not relented, nor will I turn
    back from it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land will mourn.' Hebrew אֶרֶץ can mean either 'earth' or 'land';
      here the parallel with 'the heavens above' favors the broader rendering.
    reason: lexical_alternative
  - marker: b
    text: Or 'I have planned' / 'I have resolved.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I have not changed my mind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל זֹאת
  chosen: Because of this
  alternatives:
  - For this
  - Over this
  - On account of this
  lexicon: HALOT
  rationale: 'The preposition עַל with demonstrative זֹאת here introduces cause/result:
    the coming judgment described in context is the reason for cosmic mourning. ''Because
    of this'' is idiomatic and preserves the causal force better than a more wooden
    ''upon this''.'
- source_word: תֶּאֱבַל
  chosen: will mourn
  alternatives:
  - will lament
  - will dry up in mourning
  lexicon: HALOT
  rationale: אבל commonly denotes mourning or lamentation. 'Will mourn' is the most
    natural English equivalent and fits the personification of the land.
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' Here, paired with 'the heavens above,'
    the broader cosmic scope is foregrounded, so 'the earth' best matches the parallelism,
    though the judgment still centers on Judah.
- source_word: וְקָדְרוּ
  chosen: will grow dark
  alternatives:
  - will be darkened
  - will mourn in blackness
  lexicon: HALOT
  rationale: קדר in this context conveys darkening/gloom. 'Will grow dark' captures
    the inchoative sense in readable English and aligns with the cosmic imagery.
- source_word: הַשָּׁמַיִם מִמָּעַל
  chosen: the heavens above
  alternatives:
  - the skies above
  - the heavens from above
  lexicon: HALOT
  rationale: A natural rendering of the phrase, preserving the elevated register of
    שָׁמַיִם as 'heavens' rather than the more ordinary 'skies.'
- source_word: עַל כִּי
  chosen: because
  alternatives:
  - for
  - because indeed
  lexicon: HALOT
  rationale: The sequence introduces the reason for the mourning and darkening. In
    English, a single 'because' cleanly conveys the causal connection.
- source_word: דִבַּרְתִּי
  chosen: I have spoken
  alternatives:
  - I have said
  - I have declared
  lexicon: HALOT
  rationale: '''I have spoken'' preserves the solemnity of the divine utterance and
    matches prophetic diction.'
- source_word: זַמֹּתִי
  chosen: I have purposed
  alternatives:
  - I have planned
  - I have devised
  - I have resolved
  lexicon: HALOT
  rationale: זמם here refers to deliberate intention or resolve. 'I have purposed'
    conveys settled divine intent with appropriate gravity.
- source_word: נִחַמְתִּי
  chosen: I have not relented
  alternatives:
  - I have not repented
  - I have not changed my mind
  - I have not regretted
  lexicon: HALOT
  rationale: In this context נחם refers not to moral repentance but to relenting from
    announced judgment. 'Relented' is the clearest contextual rendering and avoids
    misleading theological implications of divine sinfulness.
- source_word: וְלֹא אָשׁוּב מִמֶּנָּה
  chosen: nor will I turn back from it
  alternatives:
  - nor will I withdraw from it
  - nor will I turn back from this
  - nor will I reverse it
  lexicon: HALOT
  rationale: שׁוב with מן here expresses turning back from a stated course. The feminine
    suffix most naturally refers to the declared purpose/judgment. 'Turn back from
    it' preserves the metaphor without overinterpreting.
