theological_decisions:
- issue: Referent of the pronoun in 'in him'
  chosen_reading: The pronoun is rendered literally as 'in him' without specifying the referent beyond the Hebrew syntax.
  alternative_readings:
  - in the LORD
  - in Israel/Judah
  rationale: The immediate Hebrew uses a masculine singular pronoun without an explicit noun in this verse. Contextually it may point to Israel/Judah as restored, though some readers may hear an echo of blessing in the LORD. To preserve the text's ambiguity rather than resolve it, the main text keeps the literal pronoun.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
