id: JER.4.2
reference: Jeremiah 4:2
source:
  edition: WLC
  text: וְ/נִשְׁבַּ֨עְתָּ֙ חַי יְהוָ֔ה בֶּ/אֱמֶ֖ת בְּ/מִשְׁפָּ֣ט וּ/בִ/צְדָקָ֑ה וְ/הִתְבָּ֥רְכוּ ב֛/וֹ גּוֹיִ֖ם וּ/ב֥/וֹ יִתְהַלָּֽלוּ־׃ס
translation:
  text: and if you swear, ‘As Yahweh lives,’ in truth, in justice, and in righteousness, then nations will bless themselves in him, and in him they will boast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'then nations will be blessed in him.' The Hebrew verb can be understood reflexively ('bless themselves') or, less likely here, as a passive-like sense.
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'him' is ambiguous in context; it may refer to restored Israel/Judah, though some understand it as referring to the LORD.
    reason: alternative_reading
  - marker: c
    text: 'Hebrew oath formula: ''As the LORD lives.'''
    reason: cultural_note
lexical_decisions:
- source_word: וְנִשְׁבַּעְתָּ
  chosen: and if you swear
  alternatives:
  - and you swear
  - then you shall swear
  lexicon: HALOT
  rationale: The form is a waw + Niphal perfect 2ms of שׁבע in a conditional sequence continuing the prior verse's call to return. In English, 'and if you swear' best captures the contingent sense in context rather than a simple past or bare future.
- source_word: חַי יְהוָה
  chosen: ‘As the LORD lives,’
  alternatives:
  - ‘The LORD lives,’
  - ‘By the life of the LORD,’
  lexicon: HALOT
  rationale: This is the standard oath formula. Because DOCTRINE.md specifies יְהוָה as 'the LORD,' that covenant name is rendered accordingly. 'As the LORD lives' is idiomatic English for the Hebrew oath expression.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בֶּאֱמֶת
  chosen: in truth
  alternatives:
  - truly
  - faithfully
  lexicon: HALOT
  rationale: אֱמֶת here denotes truthfulness or genuineness in oath-taking. 'In truth' preserves the nominal parallelism with the following prepositional phrases.
- source_word: בְּמִשְׁפָּט
  chosen: in justice
  alternatives:
  - with justice
  - rightly
  - in judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, or legal right. In this triad describing proper covenantal conduct, 'in justice' is the clearest modern rendering and parallels 'in truth' and 'in righteousness.'
- source_word: וּבִצְדָקָה
  chosen: and in righteousness
  alternatives:
  - and in justice
  - and in rightness
  lexicon: HALOT
  rationale: צְדָקָה commonly denotes righteousness, uprightness, or justice. Here 'righteousness' preserves the distinct nuance from מִשְׁפָּט while maintaining the triadic ethical cadence.
- source_word: וְהִתְבָּרְכוּ
  chosen: then nations will bless themselves
  alternatives:
  - then nations will be blessed
  - then nations will bless one another
  lexicon: HALOT
  rationale: The Hitpael of ברך often carries a reflexive sense, 'bless themselves,' especially in formulas about the nations finding blessing in someone. This avoids flattening the form into a passive while still allowing the Abrahamic-allusion nuance.
- source_word: בּוֹ
  chosen: in him
  alternatives:
  - by him
  - through him
  lexicon: HALOT
  rationale: The preposition ב with pronominal suffix is most naturally rendered 'in him' here, matching the idiom of taking someone as the sphere or basis of blessing and boasting. The referent is Israel/Judah restored in covenant relation, not explicitly the LORD in this syntax.
- source_word: גּוֹיִם
  chosen: nations
  alternatives:
  - Gentiles
  - peoples
  lexicon: HALOT
  rationale: גּוֹיִם in prophetic literature usually means nations/peoples broadly. 'Nations' is the most standard and contextually fitting rendering.
- source_word: יִתְהַלָּלוּ
  chosen: they will boast
  alternatives:
  - they will glory
  - they will praise themselves
  lexicon: HALOT
  rationale: The Hitpael of הלל here means to boast or glory. 'Boast' is clear modern English; 'glory' is a viable traditional alternative but less transparent for many readers.
