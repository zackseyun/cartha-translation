id: JER.4.22
reference: Jeremiah 4:22
source:
  edition: WLC
  text: כִּ֣י אֱוִ֣יל עַמִּ֗/י אוֹתִ/י֙ לֹ֣א יָדָ֔עוּ בָּנִ֤ים סְכָלִים֙ הֵ֔מָּה וְ/לֹ֥א
    נְבוֹנִ֖ים הֵ֑מָּה חֲכָמִ֥ים הֵ֨מָּה֙ לְ/הָרַ֔ע וּ/לְ/הֵיטִ֖יב לֹ֥א יָדָֽעוּ׀׃
translation:
  text: For my people are foolish; they do not know me. They are stupid children,
    and they have no understanding. They are wise in doing evil, but they do not know
    how to do good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They are foolish sons.' The Hebrew literally says 'sons,' but here it
      functions as a collective for the people.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the explanation for the preceding judgment vision; 'For' fits
    the causal/explanatory force in context.
- source_word: אֱוִיל
  chosen: foolish
  alternatives:
  - stupid
  - senseless
  lexicon: HALOT
  rationale: Describes moral and spiritual folly, not merely low intelligence. 'Foolish'
    preserves the ethical dimension better than a purely colloquial insult.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard covenantal expression; the possessive should be retained because
    it heightens the tragedy of Israel/Judah's condition.
- source_word: אוֹתִי לֹא יָדָעוּ
  chosen: they do not know me
  alternatives:
  - they have not known me
  - they do not acknowledge me
  lexicon: HALOT
  rationale: יָדַע here denotes relational and covenantal knowledge, not mere awareness.
    Present English conveys the ongoing state well in prophetic discourse.
- source_word: בָּנִים
  chosen: children
  alternatives:
  - sons
  lexicon: HALOT
  rationale: Although literally 'sons/children,' the phrase is idiomatic for the people
    as offspring. 'Children' is natural English and avoids over-specifying maleness
    where the collective is intended.
- source_word: סְכָלִים
  chosen: stupid
  alternatives:
  - foolish
  - senseless
  lexicon: HALOT
  rationale: This term is stronger and more blunt than אֱוִיל in the first clause.
    Rendering it 'stupid' preserves the prophetic sharpness and the rhetorical escalation
    in parallelism.
- source_word: וְלֹא נְבוֹנִים
  chosen: they have no understanding
  alternatives:
  - they are not discerning
  - they are without insight
  lexicon: HALOT
  rationale: נבון refers to discernment/understanding. The chosen rendering is idiomatic
    and preserves the contrast with their supposed wisdom in evil.
- source_word: חֲכָמִים הֵמָּה לְהָרַע
  chosen: They are wise in doing evil
  alternatives:
  - They are wise to do evil
  - They are skilled at doing evil
  lexicon: HALOT
  rationale: 'The phrase is ironic: they possess practical skill, but only toward
    evil. ''Wise in doing evil'' keeps the irony while remaining readable.'
- source_word: וּלְהֵיטִיב לֹא יָדָעוּ
  chosen: but they do not know how to do good
  alternatives:
  - but to do good they do not know
  - but they do not know to do good
  lexicon: HALOT
  rationale: The infinitive with יָדַע conveys practical know-how or moral competence.
    'Know how to do good' expresses that nuance clearly in English.
