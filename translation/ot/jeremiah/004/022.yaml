theological_decisions:
- issue: Nature of 'knowing' God
  chosen_reading: Relational/covenantal knowledge is intended, rendered simply as
    'know me.'
  alternative_readings:
  - mere intellectual awareness
  rationale: In prophetic literature, 'know' with God as object commonly carries covenantal
    and moral recognition, not bare cognition. The translation keeps the simple verb
    'know' in the text while the rationale documents the fuller sense without over-translating.
  doctrine_reference: Translation philosophy §1, §3
- issue: Gender rendering of בָּנִים
  chosen_reading: '''children'''
  alternative_readings:
  - sons
  rationale: The masculine plural is collective here for the people, not a statement
    limited to males. Per the gender-accurate policy, English should match the source
    intent rather than preserve grammatical masculinity where it is not semantically
    restrictive.
  doctrine_reference: Translation philosophy §4
