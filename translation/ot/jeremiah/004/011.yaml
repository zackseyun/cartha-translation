theological_decisions:
- issue: Whether to preserve the personified expression בַּת עַמִּי
  chosen_reading: the daughter of my people
  alternative_readings:
  - my people
  - the daughter of my people Israel/Judah
  rationale: The Hebrew personification is poetically and theologically significant
    in Jeremiah's oracles of judgment and compassion. Retaining it preserves the text's
    emotional register rather than flattening it into a mere collective noun.
  doctrine_reference: Translation philosophy §1, §6
- issue: Whether רוּחַ should be rendered 'wind' or 'spirit'
  chosen_reading: wind
  alternative_readings:
  - spirit
  rationale: The immediate context is a destructive desert wind contrasted with winds
    used in winnowing. Rendering it 'spirit' would import ambiguity not warranted
    by the local imagery.
  doctrine_reference: Translation philosophy §1
