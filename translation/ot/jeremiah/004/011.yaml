id: JER.4.11
reference: Jeremiah 4:11
source:
  edition: WLC
  text: בָּ/עֵ֣ת הַ/הִ֗יא יֵאָמֵ֤ר לָֽ/עָם הַ/זֶּה֙ וְ/לִ/יר֣וּשָׁלִַ֔ם ר֣וּחַ צַ֤ח
    שְׁפָיִים֙ בַּ/מִּדְבָּ֔ר דֶּ֖רֶךְ בַּת עַמִּ֑/י ל֥וֹא לִ/זְר֖וֹת וְ/ל֥וֹא לְ/הָבַֽר־־׃
translation:
  text: 'At that time it will be said to this people and to Jerusalem: “A scorching
    wind from the bare heights in the wilderness comes toward the daughter of my people—not
    for winnowing and not for cleansing.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hot wind' or 'searing wind.'
    reason: lexical_alternative
  - marker: b
    text: '''Bare heights'' may also be rendered ''bare hills''; the Hebrew refers
      to exposed, treeless elevations.'
    reason: lexical_alternative
  - marker: c
    text: '''Cleansing'' refers to the cleaning of grain after winnowing, not to moral
      or ritual purification in this immediate context.'
    reason: cultural_note
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  chosen: At that time
  alternatives:
  - In that time
  - At that moment
  lexicon: HALOT
  rationale: Standard temporal expression introducing a prophetic announcement. 'At
    that time' is idiomatic modern English and preserves the deictic force.
- source_word: יֵאָמֵר
  chosen: it will be said
  alternatives:
  - one will say
  - it shall be said
  lexicon: HALOT
  rationale: Niphal imperfect of אמר is naturally rendered as an impersonal passive.
    'It will be said' preserves the Hebrew's indefinite subject without adding an
    agent.
- source_word: לָעָם הַזֶּה וְלִירוּשָׁלִַם
  chosen: to this people and to Jerusalem
  alternatives:
  - concerning this people and Jerusalem
  lexicon: HALOT
  rationale: The preposition ל marks the addressee/recipient of the saying. Keeping
    both objects explicit reflects the Hebrew parallelism.
- source_word: רוּחַ
  chosen: wind
  alternatives:
  - spirit
  - blast
  lexicon: HALOT
  rationale: In this meteorological context, especially with 'bare heights' and the
    following agricultural imagery, 'wind' is the plain sense rather than 'spirit'.
- source_word: צַח
  chosen: scorching
  alternatives:
  - hot
  - searing
  - burning
  lexicon: HALOT
  rationale: The adjective denotes a fierce, glaring, or parching quality. 'Scorching'
    best conveys the destructive heat of the wind in context.
- source_word: שְׁפָיִים
  chosen: bare heights
  alternatives:
  - bare hills
  - high places
  lexicon: HALOT
  rationale: Refers to treeless or exposed heights. 'Bare heights' preserves the topographical
    sense without importing cultic overtones that 'high places' can carry.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  - from the wilderness
  lexicon: HALOT
  rationale: The phrase modifies the source/location of the wind associated with the
    exposed heights. 'Wilderness' is broader and more biblically natural than 'desert,'
    while still fitting the arid setting.
- source_word: דֶּרֶךְ
  chosen: comes toward
  alternatives:
  - by way of
  - on the way to
  - toward
  lexicon: HALOT
  rationale: Here דרך functions directionally, indicating movement toward the object
    that follows. Rendering it verbally in English yields a natural sentence while
    preserving the directional force.
- source_word: בַּת עַמִּי
  chosen: the daughter of my people
  alternatives:
  - my dear people
  - the daughter, my people
  lexicon: HALOT
  rationale: A common prophetic personification for the people of Judah/Jerusalem.
    The formal expression should be retained rather than paraphrased away, since it
    carries literary and emotional force.
- source_word: לֹא לִזְרוֹת
  chosen: not for winnowing
  alternatives:
  - not to winnow
  lexicon: HALOT
  rationale: זָרָה refers to winnowing grain by tossing it into the air. The phrase
    contrasts an ordinary useful wind with a destructive one.
- source_word: וְלֹא לְהָבַר
  chosen: and not for cleansing
  alternatives:
  - and not for purging
  - and not for sifting
  lexicon: HALOT
  rationale: The verb here refers to clearing/purifying grain after winnowing. 'Cleansing'
    communicates the agricultural result in accessible English without overinterpreting
    it theologically.
