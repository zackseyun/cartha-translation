id: JER.4.13
reference: Jeremiah 4:13
source:
  edition: WLC
  text: הִנֵּ֣ה כַּ/עֲנָנִ֣ים יַעֲלֶ֗ה וְ/כַ/סּוּפָה֙ מַרְכְּבוֹתָ֔י/ו קַלּ֥וּ מִ/נְּשָׁרִ֖ים
    סוּסָ֑י/ו א֥וֹי לָ֖/נוּ כִּ֥י שֻׁדָּֽדְנוּ׀׃
translation:
  text: Look, he comes up like clouds, and his chariots are like the whirlwind; his
    horses are swifter than eagles. Woe to us, for we are ruined!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'than vultures'; the Hebrew נְשָׁרִים can refer more broadly to large
      carrion birds or raptors, though 'eagles' is the traditional rendering here.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces an urgent deictic exclamation. 'Look' preserves the immediacy
    in readable modern English better than the more archaic 'Behold.'
- source_word: כַּעֲנָנִים
  chosen: like clouds
  alternatives:
  - as clouds
  - like the clouds
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. The plural 'clouds' is retained to preserve
    the image of a massing, advancing threat rather than reducing it to a singular
    abstraction.
- source_word: יַעֲלֶה
  chosen: he comes up
  alternatives:
  - he rises
  - he advances
  - he goes up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/come up.' Here it depicts the invader's approach.
    'Comes up' keeps the directional force while sounding natural in English.
- source_word: וְכַסּוּפָה
  chosen: and ... like the whirlwind
  alternatives:
  - and like a storm
  - and like the tempest
  lexicon: HALOT
  rationale: סוּפָה denotes a violent storm or whirlwind. 'Whirlwind' best matches
    the vivid military simile and traditional prophetic storm imagery.
- source_word: מַרְכְּבוֹתָיו
  chosen: his chariots
  alternatives:
  - his war chariots
  lexicon: HALOT
  rationale: The noun straightforwardly means 'his chariots.' The military sense is
    already clear from context, so 'war' need not be added.
- source_word: קַלּוּ
  chosen: are swifter
  alternatives:
  - are lighter/faster
  - are swift
  lexicon: HALOT
  rationale: From קלל in the sense of being light/swift. In context of horses compared
    with eagles, the idiomatic sense is speed. 'Are swifter' brings out the comparative
    force with the following מן phrase.
- source_word: מִנְּשָׁרִים
  chosen: than eagles
  alternatives:
  - than vultures
  lexicon: HALOT
  rationale: נשר can denote a large bird of prey, sometimes identified as eagle or
    vulture. 'Eagles' is the conventional and contextually fitting rendering in biblical
    similes of speed and height; the zoological alternative is preserved in a footnote.
- source_word: סוּסָיו
  chosen: his horses
  lexicon: HALOT
  rationale: Direct possessive construction; no reason to depart from the plain sense.
- source_word: אוֹי לָנוּ
  chosen: Woe to us
  alternatives:
  - Alas for us
  lexicon: HALOT
  rationale: A cry of lament and impending disaster. 'Woe to us' preserves the prophetic
    register and emotional force.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - surely
  lexicon: HALOT
  rationale: Here it introduces the reason for the lament. 'For' is concise and natural.
- source_word: שֻׁדָּדְנוּ
  chosen: we are ruined
  alternatives:
  - we are devastated
  - we have been plundered
  - we are destroyed
  lexicon: HALOT
  rationale: The passive of שׁדד conveys being violently despoiled/devastated. 'We
    are ruined' captures the resultative force in idiomatic English without overstating
    to total annihilation.
