id: JER.4.26
reference: Jeremiah 4:26
source:
  edition: WLC
  text: רָאִ֕יתִי וְ/הִנֵּ֥ה הַ/כַּרְמֶ֖ל הַ/מִּדְבָּ֑ר וְ/כָל עָרָ֗י/ו נִתְּצוּ֙
    מִ/פְּנֵ֣י יְהוָ֔ה מִ/פְּנֵ֖י חֲר֥וֹן אַפּֽ/וֹ־׃ס
translation:
  text: I looked, and behold, the fruitful land was a wilderness, and all its cities
    were torn down before the LORD, before his fierce anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Carmel; here likely used in the broader sense of fertile or cultivated
      land rather than the specific region Mount Carmel.
    reason: lexical_alternative
  - marker: b
    text: Or 'because of the LORD, because of his burning anger.' The Hebrew phrase
      literally repeats 'from/before the face of.'
    reason: alternative_reading
lexical_decisions:
- source_word: רָאִיתִי
  chosen: I looked
  alternatives:
  - I saw
  lexicon: HALOT
  rationale: The verb ראה in prophetic vision reports can be rendered 'saw' or 'looked.'
    'I looked' fits the sequence with the repeated visionary formula and sounds natural
    in English while preserving the first-person observation.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and see
  - and there was
  lexicon: HALOT
  rationale: הִנֵּה is a discourse marker drawing attention to what the prophet perceives.
    'Behold' preserves the abrupt vividness of the Hebrew better than flatter alternatives.
- source_word: הַכַּרְמֶל
  chosen: the fruitful land
  alternatives:
  - the Carmel
  - the garden land
  - the orchard land
  lexicon: HALOT
  rationale: 'כַּרְמֶל can denote Carmel specifically or fertile/cultivated land.
    In parallel with ''was a wilderness,'' the common noun sense is most likely here:
    land once fertile has become desolate. ''Fruitful land'' communicates the contrast
    clearly in modern English.'
- source_word: הַמִּדְבָּר
  chosen: a wilderness
  alternatives:
  - the wilderness
  - desert
  lexicon: HALOT
  rationale: מִדְבָּר denotes wilderness/desolate steppe rather than strictly sandy
    desert. Because the clause is predicative ('the fruitful land was a wilderness'),
    the English indefinite article is natural.
- source_word: וְכָל עָרָיו
  chosen: and all its cities
  alternatives:
  - and all his cities
  lexicon: HALOT
  rationale: The 3ms suffix on 'cities' refers back to the land/region just mentioned.
    English idiom prefers 'its' for a land or region rather than 'his.'
- source_word: נִתְּצוּ
  chosen: were torn down
  alternatives:
  - were broken down
  - were demolished
  lexicon: HALOT
  rationale: The Niphal of נתץ conveys being pulled down or demolished, often of structures.
    'Were torn down' is vivid and natural for cities reduced by judgment.
- source_word: מִפְּנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - from before the LORD
  - because of the LORD
  - at the presence of the LORD
  lexicon: HALOT
  rationale: The phrase literally means 'from/before the face of YHWH' and can express
    causation in judgment contexts. 'Before the LORD' preserves the Hebrew wording
    and allows the following parallel phrase to intensify the cause.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: מִפְּנֵי חֲרוֹן אַפּוֹ
  chosen: before his fierce anger
  alternatives:
  - because of his burning anger
  - before the burning of his anger
  - before his wrath
  lexicon: HALOT
  rationale: חֲרוֹן אַף is an idiom for burning/fierce anger. 'Fierce anger' is idiomatic
    modern English and preserves the intensity without awkward literalism.
