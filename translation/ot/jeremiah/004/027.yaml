theological_decisions:
- issue: Scope of הָאָרֶץ
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: Although הָאָרֶץ can mean either 'land' or 'earth,' the immediate context in Jeremiah 4 concerns covenant judgment on Judah and its territory. Rendering it 'land' avoids overstating the scope as a statement about the entire globe while preserving the severity of the oracle. The alternative is preserved in a footnote because the imagery in the surrounding passage is expansive enough that some readers may hear cosmic overtones.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of וְכָלָה לֹא אֶעֱשֶׂה
  chosen_reading: yet I will not make a full end
  alternative_readings:
  - but I will not completely destroy it
  - yet I will not make a complete end
  rationale: 'The clause tempers total devastation with divine restraint. ''Make a full end'' preserves the idiom and theological tension: severe judgment, but not absolute annihilation. This avoids over-paraphrasing while still being intelligible in modern English.'
  doctrine_reference: Translation philosophy §3, §6
