id: JER.4.14
reference: Jeremiah 4:14
source:
  edition: WLC
  text: כַּבְּסִ֨י מֵ/רָעָ֤ה לִבֵּ/ךְ֙ יְר֣וּשָׁלִַ֔ם לְמַ֖עַן תִּוָּשֵׁ֑עִי עַד מָתַ֛י
    תָּלִ֥ין בְּ/קִרְבֵּ֖/ךְ מַחְשְׁב֥וֹת אוֹנֵֽ/ךְ־׃
translation:
  text: Wash your heart clean from evil, Jerusalem, so that you may be saved. How
    long will your wicked thoughts lodge within you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How long will your evil schemes remain within you?'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּבְּסִי
  chosen: Wash ... clean
  alternatives:
  - Wash
  - Cleanse
  lexicon: HALOT
  rationale: The verb literally means 'wash' or 'launder.' In English, 'wash your
    heart' can sound incomplete or overly literal, so 'wash ... clean' preserves the
    concrete metaphor while making the resultative force natural.
- source_word: מֵרָעָה
  chosen: from evil
  alternatives:
  - from wickedness
  - from disaster
  lexicon: HALOT
  rationale: 'With the imperative to wash the heart, the moral sense ''evil/wickedness''
    fits the context better than ''disaster/calamity.'' The preposition marks separation:
    cleansing away moral evil.'
- source_word: לִבֵּךְ
  chosen: your heart
  lexicon: HALOT
  rationale: '''Heart'' in Hebrew commonly denotes the inner person, including thought
    and will. Retaining ''heart'' preserves the Hebrew anthropology and the metaphor
    of inward cleansing.'
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard transliteration of the place name, directly addressing the city
    as a feminine singular entity.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: HALOT
  rationale: Expresses purpose clearly in modern English.
- source_word: תִּוָּשֵׁעִי
  chosen: you may be saved
  alternatives:
  - you may be delivered
  - you may find salvation
  lexicon: HALOT
  rationale: The Niphal of ישׁע can mean 'be saved' or 'be delivered.' 'Be saved'
    is the most direct rendering and preserves both immediate deliverance and broader
    theological resonance without over-specifying.
- source_word: עַד מָתַי
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic English equivalent for the Hebrew temporal lament formula.
- source_word: תָּלִין
  chosen: will ... lodge
  alternatives:
  - will ... remain
  - will ... spend the night
  - will ... dwell
  lexicon: HALOT
  rationale: The verb לון literally involves lodging or spending the night. 'Lodge'
    preserves the vivid metaphor of thoughts taking up residence, more concrete than
    simply 'remain.'
- source_word: בְּקִרְבֵּךְ
  chosen: within you
  alternatives:
  - in your midst
  - inside you
  lexicon: HALOT
  rationale: Because the addressee is personified Jerusalem and the object is 'thoughts,'
    'within you' best conveys inward location in natural English while preserving
    the feminine singular address.
- source_word: מַחְשְׁבוֹת
  chosen: thoughts
  alternatives:
  - plans
  - schemes
  lexicon: HALOT
  rationale: The noun can denote thoughts, plans, or devices. In this context of inward
    moral corruption, 'thoughts' fits naturally and pairs well with 'heart,' while
    still allowing for morally charged intent.
- source_word: אוֹנֵךְ
  chosen: your wicked
  alternatives:
  - your iniquitous
  - your vain
  - your evil
  lexicon: HALOT
  rationale: The noun און can denote wickedness, trouble, or iniquity. Here it qualifies
    the thoughts morally, so 'wicked' is concise, natural, and contextually apt.
