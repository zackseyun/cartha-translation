theological_decisions:
- issue: Scope of תִּוָּשֵׁעִי in prophetic context
  chosen_reading: Rendered as 'you may be saved' without narrowing it to either purely
    temporal deliverance or fully developed soteriological salvation.
  alternative_readings:
  - you may be delivered
  rationale: Jeremiah's context includes impending judgment and the possibility of
    rescue through repentance. 'Saved' preserves the Hebrew's breadth and the theological
    tension between immediate deliverance and the wider biblical theme of salvation.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
