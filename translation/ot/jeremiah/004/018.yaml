theological_decisions:
- issue: Meaning of רָעָה in 'זֹאת רָעָתֵךְ'
  chosen_reading: Rendered as 'your evil' to preserve the moral dimension of Judah's
    culpability while allowing the following bitterness to describe its consequence.
  alternative_readings:
  - your calamity
  - your disaster
  rationale: The verse emphasizes that Judah's own conduct and deeds have produced
    the present judgment. Translating רָעָה as 'calamity' would fit the experiential
    result, but the immediate context of accusation favors retaining the moral sense
    in the main text. The bitterness and heart-penetrating effect then describe the
    outworking of that evil in judgment.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
