id: JER.4.18
reference: Jeremiah 4:18
source:
  edition: WLC
  text: דַּרְכֵּ/ךְ֙ וּ/מַ֣עֲלָלַ֔יִ/ךְ עָשׂ֥וֹ אֵ֖לֶּה לָ֑/ךְ זֹ֤את רָעָתֵ/ךְ֙ כִּ֣י
    מָ֔ר כִּ֥י נָגַ֖ע עַד לִבֵּֽ/ךְ־׃ס
translation:
  text: Your way and your deeds have brought these things upon you. This is your evil—how
    bitter it is! For it has reached your heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'This is your calamity' or 'This is your disaster.' The Hebrew word
      can denote either moral evil or the resulting disaster; here the main text preserves
      the accusatory force of the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּרְכֵּךְ
  chosen: your way
  alternatives:
  - your conduct
  - your path
  lexicon: HALOT
  rationale: דֶּרֶךְ commonly denotes one's way, path, or manner of life. Here, paired
    with 'your deeds,' it refers metaphorically to Judah's course of conduct. 'Your
    way' preserves the Hebrew metaphor while remaining natural English.
- source_word: וּמַעֲלָלַיִךְ
  chosen: and your deeds
  alternatives:
  - and your actions
  - and your practices
  lexicon: HALOT
  rationale: מַעֲלָלִים refers to deeds or actions, often with moral coloring in prophetic
    contexts. 'Deeds' is concise and preserves the evaluative force without over-paraphrasing.
- source_word: עָשׂוּ אֵלֶּה לָךְ
  chosen: have brought these things upon you
  alternatives:
  - have done these things to you
  - have made this happen to you
  lexicon: HALOT
  rationale: The idiom literally says 'have done these to/for you.' In context of
    judgment, English idiom is better captured by 'have brought these things upon
    you,' which conveys causation and consequence without obscuring the Hebrew sense.
- source_word: זֹאת רָעָתֵךְ
  chosen: This is your evil
  alternatives:
  - This is your wickedness
  - This is your calamity
  lexicon: HALOT
  rationale: רָעָה can denote moral evil or disaster/calamity. Here the following
    clauses ('how bitter it is,' 'it has reached your heart') point to the bitter
    consequence of Judah's own evil, and the possessive 'your' naturally links the
    suffering to culpable wrongdoing. 'Your evil' best preserves that moral-causal
    force. 'Calamity' is possible but would mute the accusatory thrust.
- source_word: כִּי מָר
  chosen: how bitter it is
  alternatives:
  - for it is bitter
  - because it is bitter
  lexicon: HALOT
  rationale: כִּי here is best taken as explanatory, and מָר means bitter. English
    exclamatory style ('how bitter it is!') captures the force naturally, though a
    more literal 'for it is bitter' is possible.
- source_word: כִּי נָגַע עַד לִבֵּךְ
  chosen: For it has reached your heart
  alternatives:
  - for it has touched your heart
  - for it has struck to your heart
  lexicon: HALOT
  rationale: נגע means touch, reach, strike. With עַד לֵב, the sense is that the bitter
    evil/judgment has penetrated to the innermost being. 'Reached your heart' is idiomatic
    and preserves the metaphor without over-interpreting.
