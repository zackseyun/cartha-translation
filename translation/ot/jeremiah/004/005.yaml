id: JER.4.5
reference: Jeremiah 4:5
source:
  edition: WLC
  text: הַגִּ֣ידוּ בִֽ/יהוּדָ֗ה וּ/בִ/ירוּשָׁלִַ֨ם֙ הַשְׁמִ֔יעוּ וְ/אִמְר֕וּ ו/תקעו
    שׁוֹפָ֖ר בָּ/אָ֑רֶץ קִרְא֤וּ מַלְאוּ֙ וְ/אִמְר֔וּ הֵאָסְפ֥וּ וְ/נָב֖וֹאָה אֶל
    עָרֵ֥י הַ/מִּבְצָֽר־׃
translation:
  text: 'Declare it in Judah, and proclaim it in Jerusalem, and say: Blow the trumpet
    in the land. Cry aloud, fill the air, and say: Gather yourselves, and let us go
    into the fortified cities.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make it heard in Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Sound the horn in the land'; 'shofar' refers to a ram's horn or trumpet
      used as an alarm signal.
    reason: cultural_note
  - marker: c
    text: The Hebrew behind 'fill the air' is terse and idiomatic; it may mean 'raise
      a full cry' or 'fill the land with the alarm.'
    reason: lexical_alternative
  - marker: d
    text: Or 'to the fortified cities.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּידוּ
  chosen: Declare it
  alternatives:
  - Tell
  - Announce
  lexicon: HALOT
  rationale: Hiphil imperative plural of נגד, calling for public declaration. 'Declare
    it' fits the urgent proclamation context better than the more conversational 'tell.'
    The object is implicit in Hebrew and naturally supplied in English as 'it.'
- source_word: בִּיהוּדָה
  chosen: in Judah
  alternatives:
  - throughout Judah
  lexicon: HALOT
  rationale: The preposition ב marks location/sphere. 'In Judah' is the most direct
    rendering; the broader distributive sense is possible but not necessary in the
    main text.
- source_word: וּבִירוּשָׁלִַם
  chosen: and proclaim it in Jerusalem
  alternatives:
  - and in Jerusalem make it heard
  lexicon: HALOT
  rationale: 'The phrase pairs with the following imperative הַשְׁמִיעוּ. English
    idiom works best by carrying the verb into the phrase: ''proclaim it in Jerusalem.''
    This preserves the parallelism with Judah/Jerusalem.'
- source_word: הַשְׁמִיעוּ
  chosen: proclaim it
  alternatives:
  - make it heard
  - cause it to be heard
  lexicon: HALOT
  rationale: Hiphil imperative of שמע literally means 'make heard.' 'Proclaim it'
    is a natural English equivalent in a public-warning context while retaining the
    causative sense.
- source_word: וְאִמְרוּ
  chosen: and say
  alternatives:
  - saying
  lexicon: HALOT
  rationale: A straightforward imperative introducing the quoted warning. Repeated
    later in the verse and kept consistently.
- source_word: וְתִקְעוּ שׁוֹפָר
  chosen: Blow the trumpet
  alternatives:
  - Sound the horn
  - Blow the ram's horn
  lexicon: HALOT
  rationale: שׁוֹפָר is specifically a horn/trumpet used for alarm. 'Trumpet' is conventional
    and clear in English; the alarm function is evident from context.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - throughout the land
  - in the country
  lexicon: HALOT
  rationale: אָרֶץ here refers to the land of Judah/the country. 'In the land' preserves
    the Hebrew wording and leaves the scope broad.
- source_word: קִרְאוּ
  chosen: Cry aloud
  alternatives:
  - Call out
  - Proclaim
  lexicon: HALOT
  rationale: Imperative of קרא in a warning setting. 'Cry aloud' conveys urgency and
    public volume.
- source_word: מַלְאוּ
  chosen: fill the air
  alternatives:
  - fill it
  - cry fully
  - raise a full cry
  lexicon: HALOT
  rationale: The imperative of מלא is elliptical here. In context it intensifies the
    public cry, likely meaning to fill the land/air with the alarm. 'Fill the air'
    makes the idiom intelligible in English without over-paraphrasing.
- source_word: הֵאָסְפוּ
  chosen: Gather yourselves
  alternatives:
  - Assemble
  - Gather together
  lexicon: HALOT
  rationale: Niphal imperative of אסף, reflexive/passive in form but functioning as
    a summons to assemble. 'Gather yourselves' preserves the reflexive nuance.
- source_word: וְנָבוֹאָה
  chosen: and let us go
  alternatives:
  - and we will go
  - that we may go
  lexicon: HALOT
  rationale: Cohortative 1cp of בוא. 'Let us go' best captures the exhortational force
    of the cohortative.
- source_word: אֶל עָרֵי הַמִּבְצָר
  chosen: into the fortified cities
  alternatives:
  - to the fortified cities
  - into the fortress cities
  lexicon: HALOT
  rationale: The phrase refers to cities made secure by fortification. 'Fortified
    cities' is standard and clear. 'Into' fits the movement toward refuge within them,
    though 'to' is also possible.
