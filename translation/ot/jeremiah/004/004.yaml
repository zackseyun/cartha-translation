id: JER.4.4
reference: Jeremiah 4:4
source:
  edition: WLC
  text: הִמֹּ֣לוּ לַ/יהֹוָ֗ה וְ/הָסִ֨רוּ֙ עָרְל֣וֹת לְבַבְ/כֶ֔ם אִ֥ישׁ יְהוּדָ֖ה וְ/יֹשְׁבֵ֣י
    יְרוּשָׁלִָ֑ם פֶּן תֵּצֵ֨א כָ/אֵ֜שׁ חֲמָתִ֗/י וּ/בָעֲרָה֙ וְ/אֵ֣ין מְכַבֶּ֔ה מִ/פְּנֵ֖י
    רֹ֥עַ מַעַלְלֵי/כֶֽם־׃
translation:
  text: Circumcise yourselves to the LORD, and remove the foreskins of your heart,
    men of Judah and inhabitants of Jerusalem, lest my wrath go out like fire and
    burn with no one to quench it, because of the evil of your deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'remove the foreskins of your heart'—a metaphor for inward
      covenant loyalty and repentance.
    reason: cultural_note
  - marker: b
    text: Or 'my fury break out like fire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִמֹּלוּ
  chosen: Circumcise yourselves
  alternatives:
  - Be circumcised
  - Consecrate yourselves
  lexicon: HALOT
  rationale: Niphal imperative plural of מול. The reflexive sense is idiomatic in
    English and preserves the covenantal metaphor. 'Be circumcised' is more wooden;
    'consecrate yourselves' over-interprets the image.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: The preposition marks direction/dedication. 'To the LORD' preserves the
    covenantal orientation. Per doctrine, יהוה is rendered 'the LORD,' not 'Yahweh'
    in the main text.
- source_word: וְהָסִרוּ
  chosen: and remove
  alternatives:
  - and take away
  - and cut away
  lexicon: HALOT
  rationale: Imperative of סור in the causative sense, calling for active removal.
    'Remove' is clear and fits the metaphorical object that follows.
- source_word: עָרְלוֹת לְבַבְכֶם
  chosen: the foreskins of your heart
  alternatives:
  - the uncircumcision of your heart
  - your hardened hearts
  lexicon: HALOT
  rationale: The Hebrew uses the concrete plural 'foreskins' with 'your heart.' Retaining
    the bodily metaphor preserves the prophetic force and intertextual link to heart-circumcision
    language. 'Hardened hearts' is interpretive and too paraphrastic.
- source_word: אִישׁ יְהוּדָה
  chosen: men of Judah
  alternatives:
  - each man of Judah
  - people of Judah
  lexicon: HALOT
  rationale: Though singular in form, אִישׁ here functions distributively/collectively
    with the following plural addressees. 'Men of Judah' is natural English and remains
    gender-accurate per doctrine; 'people of Judah' would flatten the masculine form.
- source_word: וְיֹשְׁבֵי יְרוּשָׁלִָם
  chosen: and inhabitants of Jerusalem
  alternatives:
  - and those who dwell in Jerusalem
  lexicon: HALOT
  rationale: A participial substantive meaning residents/dwellers. 'Inhabitants' is
    idiomatic and suitably formal without being archaic.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: Introduces a warning of negative consequence. 'Lest' is concise and natural
    in elevated prophetic discourse.
- source_word: תֵּצֵא כָאֵשׁ חֲמָתִי
  chosen: my wrath go out like fire
  alternatives:
  - my fury come forth like fire
  - my anger break out like fire
  lexicon: HALOT
  rationale: חֵמָה denotes wrath/fury; 'wrath' fits prophetic judgment language. 'Go
    out like fire' follows the verb יצא while remaining idiomatic in context.
- source_word: וּבָעֲרָה
  chosen: and burn
  alternatives:
  - and blaze
  - and consume
  lexicon: HALOT
  rationale: Qal perfect/consecutive continuing the fire image. 'Burn' is the broadest
    and least interpretive; 'consume' adds a result not explicit in the verb itself.
- source_word: וְאֵין מְכַבֶּה
  chosen: with no one to quench it
  alternatives:
  - and there will be none to quench it
  - and no one can put it out
  lexicon: HALOT
  rationale: The clause states the absence of any extinguisher. 'With no one to quench
    it' reads smoothly after 'burn' and preserves the image.
- source_word: מִפְּנֵי רֹעַ מַעַלְלֵיכֶם
  chosen: because of the evil of your deeds
  alternatives:
  - from before the evil of your actions
  - because your deeds are evil
  lexicon: HALOT
  rationale: 'מִפְּנֵי here gives cause: ''because of.'' רֹעַ is ''evil,'' and מַעַלְלִים
    are deeds/actions. The chosen rendering preserves both the moral quality and the
    concrete acts.'
