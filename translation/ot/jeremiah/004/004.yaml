theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD' in keeping with Jewish reverence tradition and the LXX pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Retention of circumcision/heart metaphor
  chosen_reading: Keep the literal covenantal metaphor in the main text
  alternative_readings:
  - Interpretive rendering such as 'purify your hearts'
  rationale: The verse's theological force depends on the covenant sign being applied
    metaphorically to the heart. A more interpretive rendering would reduce the prophetic
    and canonical resonance.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    preserve theological tension rather than resolve it'
- issue: Gendered address אִישׁ יְהוּדָה
  chosen_reading: men of Judah
  alternative_readings:
  - people of Judah
  rationale: The Hebrew is grammatically masculine and representative. Per doctrine,
    gender-accurate rendering is preferred over gender-neutral flattening unless context
    clearly demands otherwise.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Gender-accurate over gender-neutral'
