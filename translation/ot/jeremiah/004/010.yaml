id: JER.4.10
reference: Jeremiah 4:10
source:
  edition: WLC
  text: וָ/אֹמַ֞ר אֲהָ֣הּ אֲדֹנָ֣/י יְהוִ֗ה אָכֵן֩ הַשֵּׁ֨א הִשֵּׁ֜אתָ לָ/עָ֤ם הַ/זֶּה֙
    וְ/לִ/ירוּשָׁלִַ֣ם לֵ/אמֹ֔ר שָׁל֖וֹם יִהְיֶ֣ה לָ/כֶ֑ם וְ/נָגְעָ֥ה חֶ֖רֶב עַד הַ/נָּֽפֶשׁ׀־׃
translation:
  text: Then I said, “Ah, Lord GOD, surely you have greatly deceived this people and
    Jerusalem, saying, ‘You will have peace,’ while the sword has reached to the soul.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have utterly deceived' or 'have badly misled.' The Hebrew uses an infinitive
      absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'to the life' or 'to the throat.' Hebrew nephesh here likely refers to
      life itself, expressing that the sword has reached to the point of death.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲהָהּ
  chosen: Ah
  alternatives:
  - Alas
  lexicon: HALOT
  rationale: An interjection of lament or dismay. 'Ah' is natural modern English and
    preserves the abrupt cry; 'Alas' is possible but more archaic.
- source_word: אֲדֹנָי יְהוִה
  chosen: Lord GOD
  alternatives:
  - Lord GOD
  - Lord Yahweh
  lexicon: HALOT
  rationale: The compound divine title is conventionally rendered 'Lord GOD' in English
    to distinguish אֲדֹנָי + YHWH. This also aligns with the doctrine default of rendering
    YHWH as 'the LORD'; in this compound, small-caps conventions are often represented
    as 'GOD' to avoid 'Lord LORD.'
- source_word: הַשֵּׁא הִשֵּׁאתָ
  chosen: have greatly deceived
  alternatives:
  - have utterly deceived
  - have indeed allowed to be deceived
  - have badly misled
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of נשׁא intensifies the verbal
    idea. The plain lexical sense is 'deceive/mislead,' and the doubling is best represented
    by 'surely ... greatly' or similar intensification. I chose 'have greatly deceived'
    to preserve both the force and the directness of the accusation without paraphrase.
- source_word: לָעָם הַזֶּה וְלִירוּשָׁלִַם
  chosen: this people and Jerusalem
  alternatives:
  - this people and to Jerusalem
  lexicon: HALOT
  rationale: The preposition ל governs both objects. English idiom allows omission
    of the repeated 'to' after 'deceived' while preserving the sense. 'Jerusalem'
    is retained as the city personified alongside the people.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - by saying
  lexicon: HALOT
  rationale: Standard rendering introducing the content of the alleged deception.
- source_word: שָׁלוֹם יִהְיֶה לָכֶם
  chosen: You will have peace
  alternatives:
  - Peace will be yours
  - There will be peace for you
  lexicon: HALOT
  rationale: שָׁלוֹם here denotes well-being/security, not merely absence of conflict.
    'You will have peace' is idiomatic and direct.
- source_word: וְנָגְעָה חֶרֶב
  chosen: while the sword has reached
  alternatives:
  - but the sword has touched
  - yet the sword has come
  lexicon: HALOT
  rationale: נגע means 'touch, reach, strike.' In context of impending judgment, 'has
    reached' conveys the sword's arrival upon them more naturally than the overly
    literal 'touched.' The conjunction is rendered 'while' to express the stark contrast
    with the promise of peace.
- source_word: עַד הַנָּפֶשׁ
  chosen: to the soul
  alternatives:
  - to the life
  - to the throat
  - to the very self
  lexicon: HALOT
  rationale: נֶפֶשׁ can denote soul, life, self, or throat depending on context. Here
    the idiom expresses mortal penetration to one's very life. I retained 'soul' in
    the main text because it is a familiar rendering and preserves the depth of the
    idiom, while noting alternatives in a footnote because 'life' may better capture
    the Hebrew sense for some readers.
