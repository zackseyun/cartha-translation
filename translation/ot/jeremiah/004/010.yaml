theological_decisions:
- issue: Whether to soften the statement that God 'deceived' the people
  chosen_reading: Retain the direct accusation 'you have greatly deceived' in the
    main text
  alternative_readings:
  - you have allowed this people to be deceived
  - you have greatly misled
  rationale: The Hebrew verb נשׁא in this construction naturally carries the sense
    of deceiving or misleading. The translation should preserve the theological tension
    rather than resolve it by softening the statement. Jeremiah's lament is reported
    as spoken, without the translator importing a harmonization.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
