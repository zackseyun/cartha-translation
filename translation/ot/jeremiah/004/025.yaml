theological_decisions:
- issue: Rendering of הָאָדָם in a generic singular context
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew uses the singular generic אָדָם with the article. Following
    the doctrine's gender-accurate principle and the contested-terms guidance for
    אָדָם, 'man' is retained in the main text as the most direct match, while an inclusive
    alternative is preserved in a footnote because the sense is representative rather
    than male-exclusive.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms table for אָדָם'
