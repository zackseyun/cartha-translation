id: JER.4.29
reference: Jeremiah 4:29
source:
  edition: WLC
  text: מִ/קּ֨וֹל פָּרָ֜שׁ וְ/רֹ֣מֵה קֶ֗שֶׁת בֹּרַ֨חַת֙ כָּל הָ/עִ֔יר בָּ֚אוּ בֶּ/עָבִ֔ים
    וּ/בַ/כֵּפִ֖ים עָל֑וּ כָּל הָ/עִ֣יר עֲזוּבָ֔ה וְ/אֵין יוֹשֵׁ֥ב בָּ/הֵ֖ן אִֽישׁ־־־׃
translation:
  text: At the sound of the horseman and the archer, every city flees; they go into
    the thickets and climb up among the rocks. Every city is abandoned, and no man
    dwells in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because of the sound of the horseman and the archer.' The Hebrew preposition
      can express either occasion or cause.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'every city flees' may also be understood collectively as 'the whole
      city flees.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term rendered 'thickets' is uncertain; some take it as 'clouds,'
      but the context of hiding places favors dense cover.
    reason: lexical_alternative
  - marker: d
    text: Or 'no one dwells in them.' Hebrew literally says 'no man dwells in them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקּוֹל
  chosen: At the sound of
  alternatives:
  - From the sound of
  - Because of the sound of
  lexicon: HALOT
  rationale: The preposition מִן with קוֹל can mark cause or occasion. 'At the sound
    of' preserves the vivid immediacy of panic without over-interpreting the causal
    nuance.
- source_word: פָּרָשׁ
  chosen: the horseman
  alternatives:
  - the cavalryman
  - the rider
  lexicon: HALOT
  rationale: Singular collective after 'sound of' works naturally in English and matches
    the military sense of mounted attacker.
- source_word: וְרֹמֵה קֶשֶׁת
  chosen: and the archer
  alternatives:
  - and the bowman
  - and one who shoots the bow
  lexicon: HALOT
  rationale: The participial phrase literally means 'one shooting the bow.' 'Archer'
    is the idiomatic military equivalent in modern English.
- source_word: בֹּרַחַת כָּל הָעִיר
  chosen: every city flees
  alternatives:
  - the whole city flees
  - every town flees
  lexicon: HALOT
  rationale: 'Though עִיר is singular, כָּל plus singular can function distributively.
    The following repeated כָּל הָעִיר and plural pronominal reference support a collective/distributive
    sense: each city/town empties out.'
- source_word: בָּאוּ
  chosen: they go
  alternatives:
  - they enter
  - they come
  lexicon: HALOT
  rationale: The verb is literally 'they came/entered,' but in context it describes
    the inhabitants' movement for refuge. 'They go into' is more natural English for
    flight into hiding places.
- source_word: בֶּעָבִים
  chosen: into the thickets
  alternatives:
  - into the clouds
  - into the dense woods
  - into the thickets of trees
  lexicon: HALOT
  rationale: In this context of fleeing and hiding, the noun is best taken as dense
    growth/thickets rather than 'clouds.' The parallel with climbing rocks favors
    terrain features used as refuge.
- source_word: וּבַכֵּפִים עָלוּ
  chosen: and climb up among the rocks
  alternatives:
  - and go up into the crags
  - and ascend on the cliffs
  lexicon: HALOT
  rationale: כֵּפִים denotes rocks/crags. 'Climb up among the rocks' conveys both
    the verb עלה and the sense of seeking inaccessible refuge.
- source_word: עֲזוּבָה
  chosen: is abandoned
  alternatives:
  - is forsaken
  - lies deserted
  lexicon: HALOT
  rationale: The passive/resultative sense is clear. 'Abandoned' is straightforward
    modern English and fits the wartime evacuation scene.
- source_word: וְאֵין יוֹשֵׁב בָּהֵן אִישׁ
  chosen: and no man dwells in them
  alternatives:
  - and no one lives in them
  - and not a man remains in them
  lexicon: HALOT
  rationale: The Hebrew uses masculine singular אִישׁ with a participle, emphasizing
    total depopulation. Per gender-accurate policy, 'no man' is retained rather than
    neutralizing to 'no one,' while still functioning generically in context.
