id: JER.4.20
reference: Jeremiah 4:20
source:
  edition: WLC
  text: שֶׁ֤בֶר עַל שֶׁ֨בֶר֙ נִקְרָ֔א כִּ֥י שֻׁדְּדָ֖ה כָּל הָ/אָ֑רֶץ פִּתְאֹם֙ שֻׁדְּד֣וּ
    אֹהָלַ֔/י רֶ֖גַע יְרִיעֹתָֽ/י־־׃
translation:
  text: Disaster upon disaster is proclaimed, for the whole land is devastated. Suddenly
    my tents are devastated, my curtains in a moment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole earth.' The Hebrew אֶרֶץ can mean either 'land' or 'earth';
      here the context favors the land under judgment.
    reason: alternative_reading
  - marker: b
    text: '''My curtains'' refers to tent-curtains; the line uses the imagery of a
      dwelling suddenly destroyed.'
    reason: cultural_note
lexical_decisions:
- source_word: שֶׁבֶר
  chosen: disaster
  alternatives:
  - breaking
  - destruction
  - ruin
  - crash
  lexicon: HALOT
  rationale: Here שׁבר is used idiomatically in the repeated expression שׁבר על שׁבר
    to denote successive calamity, not a literal 'breaking.' 'Disaster' communicates
    the sense naturally in modern English while preserving the severity.
- source_word: עַל
  chosen: upon
  alternatives:
  - 'on'
  - after
  lexicon: HALOT
  rationale: In the collocation שׁבר על שׁבר, עַל expresses piling one event upon
    another. 'Upon' preserves the idiomatic force better than a flat 'on' and avoids
    over-interpreting as strictly temporal 'after.'
- source_word: נִקְרָא
  chosen: is proclaimed
  alternatives:
  - is called out
  - is announced
  - is reported
  lexicon: HALOT
  rationale: 'The Niphal of קרא here is best taken as an impersonal/passive report:
    disaster is being cried out or announced. ''Is proclaimed'' captures the public,
    heralded sense without awkwardness.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: כִּי introduces the reason for the cry of disaster. 'For' is concise
    and fits the poetic line well.
- source_word: שֻׁדְּדָה
  chosen: is devastated
  alternatives:
  - is ruined
  - is plundered
  - is laid waste
  lexicon: HALOT
  rationale: The passive of שׁדד can denote violent despoiling or devastation. With
    'the whole land' as subject, 'is devastated' best conveys the result in idiomatic
    English without narrowing the image to theft alone.
- source_word: כָּל הָאָרֶץ
  chosen: the whole land
  alternatives:
  - all the land
  - the whole earth
  lexicon: HALOT
  rationale: In Jeremiah this commonly refers to the land of Judah/the land in context
    rather than the entire globe. 'The whole land' preserves the Hebrew while avoiding
    an over-universalized reading.
- source_word: פִּתְאֹם
  chosen: suddenly
  alternatives:
  - all at once
  - abruptly
  lexicon: HALOT
  rationale: Standard adverbial rendering; it emphasizes the abruptness of the devastation.
- source_word: שֻׁדְּדוּ
  chosen: are devastated
  alternatives:
  - are ruined
  - are plundered
  - are laid waste
  lexicon: HALOT
  rationale: The same verb as earlier is rendered consistently. Though tents can be
    literally plundered, the poetic parallel with the land favors the broader 'devastated.'
- source_word: אֹהָלַי
  chosen: my tents
  alternatives:
  - my tent-dwellings
  lexicon: HALOT
  rationale: Literal rendering retained. In prophetic poetry this may function metaphorically
    for habitation or national dwelling, but the text's imagery should stand in the
    main text.
- source_word: רֶגַע
  chosen: in a moment
  alternatives:
  - instantly
  - in an instant
  lexicon: HALOT
  rationale: As an accusative of time, it marks the brevity/suddenness of the event.
    'In a moment' is natural and preserves the temporal force.
- source_word: יְרִיעֹתַי
  chosen: my curtains
  alternatives:
  - my tent curtains
  - my hangings
  lexicon: HALOT
  rationale: The word refers to tent-curtains or drapes. 'My curtains' is concise
    and idiomatic, while the tent imagery is already established by 'my tents.'
