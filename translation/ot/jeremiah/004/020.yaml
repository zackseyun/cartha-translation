theological_decisions:
- issue: Scope of הָאָרֶץ
  chosen_reading: the whole land
  alternative_readings:
  - the whole earth
  rationale: The Hebrew noun can mean 'earth' or 'land.' In Jeremiah 4, the immediate
    context is judgment on Judah/Jerusalem, so 'land' better reflects the likely referent
    while preserving the possibility of broader cosmic overtones in a footnote.
