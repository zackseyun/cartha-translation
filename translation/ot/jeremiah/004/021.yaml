id: JER.4.21
reference: Jeremiah 4:21
source:
  edition: WLC
  text: עַד מָתַ֖י אֶרְאֶה נֵּ֑ס אֶשְׁמְעָ֖ה ק֥וֹל שׁוֹפָֽר־־׃ס
translation:
  text: How long must I see the signal flag and hear the sound of the trumpet?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'banner,' 'standard,' or simply 'signal.' The Hebrew נֵס denotes an elevated
      sign or military signal.
    reason: lexical_alternative
  - marker: b
    text: Hebrew שׁוֹפָר refers to a horn, often a ram's horn, used for warning or
      assembly.
    reason: cultural_note
lexical_decisions:
- source_word: עַד מָתַי
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic temporal lament/question in Hebrew. 'How long' is the natural
    English equivalent and preserves the rhetorical force better than the more wooden
    'until when.'
- source_word: אֶרְאֶה
  chosen: must I see
  alternatives:
  - shall I see
  - will I see
  lexicon: HALOT
  rationale: The imperfect 1cs in this lament context expresses ongoing endured experience
    rather than simple futurity. 'Must I see' brings out the burdened, compelled sense
    in idiomatic English without over-paraphrasing.
- source_word: נֵּס
  chosen: signal flag
  alternatives:
  - banner
  - standard
  - signal
  lexicon: HALOT
  rationale: נֵס commonly denotes a raised signal or banner, often military. 'Signal
    flag' communicates its function as a visible war signal more clearly to modern
    readers than the traditional but potentially vague 'banner.'
- source_word: אֶשְׁמְעָה
  chosen: and hear
  alternatives:
  - must I hear
  - shall I hear
  lexicon: HALOT
  rationale: Linked with the previous verb in the same lament sequence. English reads
    smoothly with a shared modal force carried from 'must I see'; repeating 'must
    I hear' is possible but less natural. The sense of ongoing distress remains intact.
- source_word: קוֹל
  chosen: the sound of
  alternatives:
  - the voice of
  - the noise of
  lexicon: HALOT
  rationale: With שׁוֹפָר, קוֹל refers to audible sound rather than 'voice.' 'The
    sound of the trumpet' is idiomatic and precise.
- source_word: שׁוֹפָר
  chosen: trumpet
  alternatives:
  - ram's horn
  lexicon: HALOT
  rationale: Standard English rendering for the ancient horn used as an alarm signal.
    'Ram's horn' is more concrete but less natural in running text; the military-warning
    function is adequately conveyed by 'trumpet.'
