theological_decisions:
- issue: Dynastic promise to David
  chosen_reading: Retain the concrete dynastic language 'a son reigning on his throne'
    rather than abstracting it to a generalized royal line.
  alternative_readings:
  - a descendant reigning on his throne
  - an heir on his throne
  rationale: The verse echoes the Davidic covenant in specifically filial language.
    Preserving 'son' maintains the textual connection and theological weight without
    importing later messianic interpretation into this verse itself.
  doctrine_reference: Translation philosophy §§1, 4, 5
- issue: Identification of the priestly group
  chosen_reading: Render הַלְוִיִּם הַכֹּהֲנִים as 'the Levitical priests' in the
    main text, while preserving the more formal appositional alternative in a footnote.
  alternative_readings:
  - the Levites, the priests
  - the priests, the Levites
  rationale: The Hebrew can be taken appositionally, but the sense in context is the
    priestly Levitical order. The main text uses readable modern English while the
    footnote preserves the more literal alternative for auditability.
  doctrine_reference: Translation philosophy §§1, 6
