id: JER.33.21
reference: Jeremiah 33:21
source:
  edition: WLC
  text: גַּם בְּרִיתִ֤/י תֻפַר֙ אֶת דָּוִ֣ד עַבְדִּ֔/י מִ/הְיֽוֹת ל֥/וֹ בֵ֖ן מֹלֵ֣ךְ
    עַל כִּסְא֑/וֹ וְ/אֶת הַ/לְוִיִּ֥ם הַ/כֹּהֲנִ֖ים מְשָׁרְתָֽ/י־־־־־׃
translation:
  text: then my covenant with David my servant may also be broken, so that he would
    not have a son reigning on his throne, and with the Levitical priests, my ministers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and with the Levites, the priests, my ministers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: also
  alternatives:
  - then
  - even
  lexicon: HALOT
  rationale: 'In context, גַּם adds correspondence with the prior conditional statement:
    if the fixed order could be broken, then God''s covenant could also be broken.
    ''Also'' preserves the additive force without overinterpreting.'
- source_word: בְּרִיתִי
  chosen: my covenant
  lexicon: HALOT
  rationale: Standard rendering of בְּרִית with 1cs suffix. 'Covenant' preserves the
    theological and legal weight of the Hebrew term.
- source_word: תֻפַר
  chosen: may ... be broken
  alternatives:
  - be annulled
  - be violated
  lexicon: HALOT
  rationale: Hophal of פרר conveys being broken, nullified, or made ineffectual. 'May
    be broken' matches the passive sense and echoes covenant language in the immediate
    context.
- source_word: אֶת דָּוִד עַבְדִּי
  chosen: with David my servant
  alternatives:
  - concerning David my servant
  lexicon: HALOT
  rationale: 'Although אֶת can mark the direct object, with בְּרִית the sense is naturally
    relational: a covenant with David. ''My servant'' is retained as a covenantal
    title and should not be weakened.'
- source_word: מִהְיוֹת לוֹ
  chosen: so that he would not have
  alternatives:
  - from there being for him
  - so as not to be for him
  lexicon: HALOT
  rationale: 'The preposition מִן with infinitive construct after ''broken'' expresses
    result/consequence: the covenant would be broken such that David would no longer
    have a royal descendant. Idiomatic English requires restructuring.'
- source_word: בֵן
  chosen: a son
  alternatives:
  - an heir
  - a descendant
  lexicon: HALOT
  rationale: The Hebrew is specifically 'son.' In royal succession contexts it can
    imply descendant/heir, but the translation philosophy prefers gender-accurate
    rendering where the source is masculine. The dynastic sense is clear from context.
- source_word: מֹלֵךְ
  chosen: reigning
  alternatives:
  - ruling
  - kinging
  lexicon: HALOT
  rationale: Qal participle of מלך denotes exercising kingship. 'Reigning' is natural
    English for ongoing royal rule and fits the participial aspect.
- source_word: עַל כִּסְאוֹ
  chosen: on his throne
  alternatives:
  - over his throne
  lexicon: HALOT
  rationale: Standard idiom for royal rule. 'On his throne' is the natural English
    equivalent of the Hebrew expression.
- source_word: וְאֶת הַלְוִיִּם הַכֹּהֲנִים
  chosen: and with the Levitical priests
  alternatives:
  - and with the Levites, the priests
  - and with the priests, the Levites
  lexicon: HALOT
  rationale: The phrase identifies the priestly group associated with Levi. 'Levitical
    priests' is concise and idiomatic, though the Hebrew apposition could also be
    rendered more formally as 'the Levites, the priests.' A footnote preserves that
    alternative because the exact construal can be discussed.
- source_word: מְשָׁרְתָי
  chosen: my ministers
  alternatives:
  - those who minister to me
  - my servants
  lexicon: HALOT
  rationale: Participle of שרת refers to those performing ministerial service, especially
    cultic service before God. 'My ministers' is concise and preserves the formal
    service sense better than the broader 'servants.'
