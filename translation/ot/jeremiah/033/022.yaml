theological_decisions:
- issue: Relationship between Davidic offspring and Levites in the promise
  chosen_reading: The verse promises a vast multiplication of both the Davidic line
    and the Levites who serve YHWH, without resolving broader theological questions
    about how this promise unfolds.
  alternative_readings:
  - The Levites could be read more narrowly as temple ministers in Jeremiah's historical
    horizon
  - The promise may be read canonically in relation to later messianic fulfillment,
    but that is not made explicit in this verse
  rationale: 'The Hebrew coordinates two direct objects after ''I will multiply'':
    ''the offspring of David my servant'' and ''the Levites who minister to me.''
    The translation preserves that parallel promise and avoids importing a specific
    later doctrinal framework into the main text.'
  doctrine_reference: Preserve theological tension rather than resolve it.
