id: JER.33.22
reference: Jeremiah 33:22
source:
  edition: WLC
  text: אֲשֶׁ֤ר לֹֽא יִסָּפֵר֙ צְבָ֣א הַ/שָּׁמַ֔יִם וְ/לֹ֥א יִמַּ֖ד ח֣וֹל הַ/יָּ֑ם
    כֵּ֣ן אַרְבֶּ֗ה אֶת זֶ֨רַע֙ דָּוִ֣ד עַבְדִּ֔/י וְ/אֶת הַ/לְוִיִּ֖ם מְשָׁרְתֵ֥י
    אֹתִֽ/י־־־׃ס
translation:
  text: As the host of heaven cannot be counted and the sand of the sea cannot be
    measured, so I will multiply the offspring of David my servant and the Levites
    who minister to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cannot be numbered' for 'cannot be counted.'
    reason: lexical_alternative
  - marker: b
    text: '''Host of heaven'' is a Hebrew idiom for the heavenly multitude, often
      including the stars.'
    reason: cultural_note
  - marker: c
    text: Or 'the seed of David' or 'the descendants of David.'
    reason: lexical_alternative
  - marker: d
    text: Or 'who serve me'; the Hebrew can denote ongoing cultic service.
    reason: lexical_alternative
lexical_decisions:
- source_word: צְבָא הַשָּׁמַיִם
  chosen: the host of heaven
  alternatives:
  - the army of heaven
  - the stars of heaven
  lexicon: HALOT
  rationale: צָבָא can denote an army/host; with 'of heaven' it commonly refers to
    the heavenly multitude. 'Host of heaven' preserves the Hebrew idiom without over-specifying
    'stars,' though stars are likely included by context.
- source_word: יִסָּפֵר
  chosen: cannot be counted
  alternatives:
  - cannot be numbered
  lexicon: HALOT
  rationale: 'Niphal of ספר here is passive/reflexive in sense: ''be counted/numbered.''
    ''Counted'' is natural modern English; ''numbered'' is a close traditional alternative.'
- source_word: חוֹל הַיָּם
  chosen: the sand of the sea
  alternatives:
  - the sand by the sea
  lexicon: HALOT
  rationale: This is a standard Hebrew expression for innumerable quantity. 'Sand
    of the sea' is the most direct and recognizable rendering.
- source_word: יִמַּד
  chosen: cannot be measured
  alternatives:
  - cannot be measured out
  lexicon: HALOT
  rationale: Niphal of מדד means 'be measured.' 'Measured' fits the parallel with
    'counted' and preserves the image of immeasurable abundance.
- source_word: כֵּן אַרְבֶּה
  chosen: so I will multiply
  alternatives:
  - so will I increase
  - thus I will make numerous
  lexicon: HALOT
  rationale: The comparative כֵּן links the simile to the divine promise. Hiphil of
    רבה means 'make many/multiply.' 'So I will multiply' is both clear and close to
    the Hebrew.
- source_word: זֶרַע דָּוִד
  chosen: the offspring of David
  alternatives:
  - the seed of David
  - the descendants of David
  lexicon: HALOT
  rationale: זֶרַע can mean seed/offspring/descendants. 'Offspring' preserves the
    collective singular and works well in modern English without sounding overly wooden
    like 'seed' here.
- source_word: עַבְדִּי
  chosen: my servant
  alternatives:
  - my slave
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave/servant, in royal-covenantal reference
    to David the emphasis is on David's status as YHWH's appointed servant rather
    than bonded servitude. 'My servant' best fits English biblical usage and context.
- source_word: הַלְוִיִּם
  chosen: the Levites
  lexicon: HALOT
  rationale: Proper tribal designation; standard English transliteration/translation.
- source_word: מְשָׁרְתֵי אֹתִי
  chosen: who minister to me
  alternatives:
  - who serve me
  lexicon: HALOT
  rationale: The participle denotes ongoing cultic service. 'Minister to me' better
    conveys priestly/temple service than the broader 'serve me,' while remaining readable.
