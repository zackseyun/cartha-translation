theological_decisions:
- issue: Referent of 'the two families'
  chosen_reading: Rendered generically as 'the two families' without specifying Judah/Israel, David/Levi, or other identifications.
  alternative_readings:
  - the two kingdoms of Israel and Judah
  - the two chosen lines of David and Levi
  rationale: The verse itself does not explicitly identify the referents, though the immediate context mentions David and the Levitical priests and some interpreters connect the phrase to Judah and Israel. To avoid importing a disputed interpretation, the translation preserves the Hebrew's general wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of the final clause
  chosen_reading: 'Expressed as the nations'' contemptuous regard: ''no longer regarding them as a nation before them.'''
  alternative_readings:
  - a declaration that Israel objectively ceased to be a nation
  - a wish that they should no longer be a nation
  rationale: The syntax can be rendered more woodenly ('from being still a nation before them'), but English requires interpretation of the infinitive phrase. The chosen wording keeps the focus on the hostile speakers' evaluation rather than making a stronger ontological claim than the text itself states.
  doctrine_reference: Original-language primacy over translation tradition; preserve ambiguity where genuine.
