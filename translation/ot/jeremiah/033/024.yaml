id: JER.33.24
reference: Jeremiah 33:24
source:
  edition: WLC
  text: הֲ/ל֣וֹא רָאִ֗יתָ מָֽה הָ/עָ֤ם הַ/זֶּה֙ דִּבְּר֣וּ לֵ/אמֹ֔ר שְׁתֵּ֣י הַ/מִּשְׁפָּח֗וֹת אֲשֶׁ֨ר בָּחַ֧ר יְהוָ֛ה בָּ/הֶ֖ם וַ/יִּמְאָסֵ֑/ם וְ/אֶת עַמִּ/י֙ יִנְאָצ֔וּ/ן מִֽ/הְי֥וֹת ע֖וֹד גּ֥וֹי לִ/פְנֵי/הֶֽם־־׃ס
translation:
  text: Have you not seen what this people have spoken, saying, ‘The two families that Yahweh chose—he has rejected them’? Thus they despise my people, so that they should no longer be a nation before them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the two clans' or 'the two houses.' The Hebrew does not explicitly identify which two are meant.
    reason: lexical_alternative
  - marker: b
    text: Or 'he rejected them' / 'he cast them off.'
    reason: lexical_alternative
  - marker: c
    text: The final clause is literally 'from being still a nation before them,' likely meaning 'in their sight' or 'in their estimation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  chosen: Have you not
  alternatives:
  - Have you not indeed
  - Do you not
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative response. 'Have you not' preserves the interrogative force and direct address.
- source_word: רָאִיתָ
  chosen: seen
  alternatives:
  - observed
  - noticed
  lexicon: HALOT
  rationale: Common verb of seeing/perceiving. 'Seen' is natural English and fits the rhetorical question.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this people here
  - these people
  lexicon: HALOT
  rationale: Hebrew uses singular 'people' with demonstrative. 'This people' preserves the collective singular and the slightly distancing tone better than 'these people.'
- source_word: דִּבְּרוּ לֵאמֹר
  chosen: have spoken, saying
  alternatives:
  - are saying
  - have said
  lexicon: HALOT
  rationale: The finite verb plus infinitive 'saying' is retained for transparency to the Hebrew discourse structure. Present perfect in English works naturally in the rhetorical setup.
- source_word: שְׁתֵּי הַמִּשְׁפָּחוֹת
  chosen: the two families
  alternatives:
  - the two clans
  - the two houses
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת ordinarily means families/clans. 'Families' is the most direct rendering, while allowing the likely reference to the two royal/priestly lines or the two covenant peoples to remain implicit rather than overinterpreted.
- source_word: אֲשֶׁר בָּחַר יְהוָה בָּהֶם
  chosen: that the LORD chose
  alternatives:
  - which the LORD chose for himself
  - whom the LORD chose
  lexicon: HALOT
  rationale: The phrase literally includes 'in them,' but idiomatic English expresses the sense simply as 'chose.' 'The LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיִּמְאָסֵם
  chosen: he has rejected them
  alternatives:
  - he rejected them
  - he has cast them off
  lexicon: HALOT
  rationale: מָאַס conveys rejection/despising. 'Rejected' is clear and strong without adding interpretive color. Perfective English within the quoted speech is represented well by 'has rejected.'
- source_word: וְאֶת עַמִּי יִנְאָצוּן
  chosen: Thus they despise my people
  alternatives:
  - And they spurn my people
  - And they treat my people with contempt
  lexicon: HALOT
  rationale: נָאַץ denotes despising/showing contempt. 'Thus' makes explicit the consequential force of waw in context, linking their statement to their contemptuous attitude.
- source_word: מִהְיוֹת עוֹד גּוֹי
  chosen: no longer regarding them as a nation
  alternatives:
  - so that they are no longer a nation
  - from being any longer a nation
  lexicon: HALOT
  rationale: The infinitive construction expresses cessation of national status in the speakers' view. English requires some smoothing; 'no longer regarding them as a nation' captures the sense without overstating metaphysical annihilation.
- source_word: לִפְנֵיהֶם
  chosen: before them
  alternatives:
  - in their sight
  - in their view
  lexicon: HALOT
  rationale: Literally 'before them.' In context it likely means in their estimation or presence. The main text keeps the more literal 'before them,' while the broader sense is reflected by the clause's wording.
