id: JER.33.4
reference: Jeremiah 33:4
source:
  edition: WLC
  text: כִּי֩ כֹ֨ה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל עַל בָּתֵּי֙ הָ/עִ֣יר הַ/זֹּ֔את
    וְ/עַל בָּתֵּ֖י מַלְכֵ֣י יְהוּדָ֑ה הַ/נְּתֻצִ֕ים אֶל הַ/סֹּלְל֖וֹת וְ/אֶל הֶ/חָֽרֶב־־־־׃
translation:
  text: 'For thus says the LORD, the God of Israel, concerning the houses of this
    city and the houses of the kings of Judah that are being torn down for the siege
    ramps and for the sword:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the palaces of the kings of Judah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the siege mounds' or 'the siegeworks.'
    reason: lexical_alternative
  - marker: c
    text: '''The sword'' is a Hebrew figure for warfare or slaughter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation of the preceding command/promise context. 'For'
    fits the discourse flow in English and preserves the causal/explanatory force
    without over-specifying.
- source_word: כֹה אָמַר
  chosen: thus says
  alternatives:
  - thus said
  - this is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Present-tense 'says' is idiomatic
    in English for prophetic speech and reflects the formulaic force better than a
    simple past.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal force while matching established reverential convention.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain; retained formally because it is clear
    and idiomatic in English.
- source_word: עַל
  chosen: concerning
  alternatives:
  - about
  - against
  - regarding
  lexicon: HALOT
  rationale: Here עַל introduces the subject matter of the divine utterance rather
    than direct hostility. 'Concerning' best fits prophetic discourse in English.
- source_word: בָּתֵּי הָעִיר הַזֹּאת
  chosen: the houses of this city
  alternatives:
  - the houses in this city
  lexicon: HALOT
  rationale: A close rendering of the construct phrase. 'Of this city' preserves the
    Hebrew structure and likely points specifically to Jerusalem in context.
- source_word: בָּתֵּי מַלְכֵי יְהוּדָה
  chosen: the houses of the kings of Judah
  alternatives:
  - the palaces of the kings of Judah
  lexicon: HALOT
  rationale: בַּיִת can in royal contexts mean 'palace,' but the repeated בָּתֵּי
    links these structures with the city's houses generally. 'Houses' preserves the
    lexical repetition; 'palaces' is a plausible contextual alternative preserved
    in a footnote.
- source_word: הַנְּתֻצִים
  chosen: that are being torn down
  alternatives:
  - which have been broken down
  - that are demolished
  lexicon: HALOT
  rationale: Passive participle from נתץ, describing the houses as in the state/process
    of being pulled down. 'Are being torn down' captures the likely immediate wartime
    action in context.
- source_word: אֶל
  chosen: for
  alternatives:
  - against
  - toward
  - into
  lexicon: HALOT
  rationale: 'Although literally ''to/toward,'' in this construction it expresses
    purpose/use: the houses are torn down to provide material or space for defense
    against siegeworks and sword. ''For'' communicates that function naturally in
    English.'
- source_word: הַסֹּלְלוֹת
  chosen: the siege ramps
  alternatives:
  - the siege mounds
  - the siegeworks
  lexicon: HALOT
  rationale: סֹלְלָה refers to an embankment/ramp built in siege warfare. 'Siege ramps'
    is concrete and accessible modern English; 'siege mounds' is a traditional alternative.
- source_word: הֶחָרֶב
  chosen: the sword
  alternatives:
  - the battle
  - the attacking sword
  lexicon: HALOT
  rationale: Retains the Hebrew military metonymy. 'Sword' can stand for warfare or
    slaughter, and preserving the image is preferable to flattening it to 'battle'
    in the main text.
