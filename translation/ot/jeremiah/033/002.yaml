theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of the feminine suffixes in 'made it / formed it / establish it'
  chosen_reading: Render with impersonal 'it' and leave the referent implicit
  alternative_readings:
  - Render 'her'
  - Specify an interpretive referent such as 'the city' or 'the earth'
  rationale: The Hebrew uses feminine suffixes, but the immediate verse does not explicitly identify the referent. Supplying a specific noun in translation would over-interpret. English 'it' preserves the syntax while avoiding unwarranted specification.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Preserve theological tension rather than resolve it; original-language primacy'
