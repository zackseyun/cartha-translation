theological_decisions:
- issue: Referent shift from singular feminine to plural pronoun
  chosen_reading: The verse addresses the city/community as 'her' and then its people
    as 'them.'
  alternative_readings:
  - Treat both pronouns as referring uniformly to the city in a smoothed English rendering
  rationale: The Hebrew intentionally moves from the personified city (feminine singular)
    to the inhabitants (plural). Preserving the shift maintains the text's imagery
    and avoids flattening the corporate-personal dynamic.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Semantic range of אֱמֶת
  chosen_reading: Render as 'truth' in the main text.
  alternative_readings:
  - faithfulness
  - reliability
  rationale: The source permits more than one nuance. To preserve theological tension
    rather than over-resolve it, the main text uses the common rendering 'truth' and
    a footnote preserves 'faithfulness' as a viable alternative.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
