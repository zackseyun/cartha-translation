id: JER.33.6
reference: Jeremiah 33:6
source:
  edition: WLC
  text: הִנְ/נִ֧י מַעֲלֶה לָּ֛/הּ אֲרֻכָ֥ה וּ/מַרְפֵּ֖א וּ/רְפָאתִ֑י/ם וְ/גִלֵּיתִ֣י
    לָ/הֶ֔ם עֲתֶ֥רֶת שָׁל֖וֹם וֶ/אֱמֶֽת־׃
translation:
  text: Behold, I am bringing her healing and cure, and I will heal them, and I will
    reveal to them an abundance of peace and truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'faithfulness' for 'truth' (אֱמֶת); the term can denote truthfulness,
      reliability, or faithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Deictic particle of solemn announcement. 'Behold' preserves the prophetic
    force and elevated tone better than the more colloquial 'look' or 'see'.
- source_word: מַעֲלֶה
  chosen: I am bringing
  alternatives:
  - I am causing to come up
  - I bring
  lexicon: HALOT
  rationale: Hiphil participle of עלה used idiomatically for causing something to
    arise/come up. In context, 'bringing' communicates imminent divine action in natural
    English while preserving the active causative sense.
- source_word: לָּהּ
  chosen: her
  alternatives:
  - to her
  lexicon: HALOT
  rationale: Refers back to the city/personified community (Jerusalem). English can
    absorb the preposition into the verb phrase ('bringing her') without loss of meaning.
- source_word: אֲרֻכָה
  chosen: healing
  alternatives:
  - restoration
  - new flesh over a wound
  lexicon: HALOT
  rationale: The noun can denote the healing of a wound or restoration of health.
    'Healing' fits the paired medical imagery with מַרְפֵּא and is more idiomatic
    than a highly literal anatomical gloss.
- source_word: מַרְפֵּא
  chosen: cure
  alternatives:
  - health
  - healing
  lexicon: HALOT
  rationale: Paired with אֲרֻכָה, this term denotes remedy/healing. 'Cure' preserves
    the distinction between the two near-synonyms in English rather than repeating
    'healing' twice.
- source_word: וּרְפָאתִים
  chosen: and I will heal them
  alternatives:
  - and I will restore them to health
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functioning
    futurally. The 3mp suffix shifts from the feminine singular city to the plural
    inhabitants/people; this should be preserved in English.
- source_word: וְגִלֵּיתִי
  chosen: and I will reveal
  alternatives:
  - and I will uncover
  - and I will disclose
  lexicon: HALOT
  rationale: From גלה in the sense of uncovering/revealing. 'Reveal' best fits the
    abstract object that follows in readable modern English.
- source_word: עֲתֶרֶת
  chosen: an abundance of
  alternatives:
  - riches of
  - fullness of
  - copiousness of
  lexicon: HALOT
  rationale: The noun denotes abundance/plenty. 'Abundance of' is clear and natural;
    it avoids the likely confusion of rendering it as 'crown,' which belongs to a
    different but similarly spelled noun.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - wholeness
  lexicon: HALOT
  rationale: Default rendering is 'peace,' while acknowledging the broader semantic
    range of welfare/wholeness. Here 'peace' works well in the prophetic promise and
    pairs naturally with 'truth.'
- source_word: וֶאֱמֶת
  chosen: truth
  alternatives:
  - faithfulness
  - reliability
  lexicon: HALOT
  rationale: אמת can mean truth, faithfulness, or reliability. 'Truth' is the most
    straightforward rendering in this collocation, while the alternative nuance of
    'faithfulness' is worth preserving in a footnote.
