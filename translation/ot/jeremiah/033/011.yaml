id: JER.33.11
reference: Jeremiah 33:11
source:
  edition: WLC
  text: ק֣וֹל שָׂשׂ֞וֹן וְ/ק֣וֹל שִׂמְחָ֗ה ק֣וֹל חָתָן֮ וְ/ק֣וֹל כַּלָּה֒ ק֣וֹל אֹמְרִ֡ים
    הוֹדוּ֩ אֶת יְהוָ֨ה צְבָא֜וֹת כִּֽי ט֤וֹב יְהוָה֙ כִּֽי לְ/עוֹלָ֣ם חַסְדּ֔/וֹ
    מְבִאִ֥ים תּוֹדָ֖ה בֵּ֣ית יְהוָ֑ה כִּֽי אָשִׁ֧יב אֶת שְׁבוּת הָ/אָ֛רֶץ כְּ/בָ/רִאשֹׁנָ֖ה
    אָמַ֥ר יְהוָֽה־־־־־־׃ס
translation:
  text: the sound of joy and the sound of gladness, the sound of the bridegroom and
    the sound of the bride, the sound of those saying, ‘Give thanks to the LORD of
    hosts, for the LORD is good, for his steadfast love endures forever,’ of those
    bringing a thank offering into the house of the LORD. For I will restore the fortunes
    of the land as at first, says the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his mercy endures forever' or 'his covenant faithfulness endures forever'
      for 'his steadfast love endures forever.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will restore the captivity of the land'; the Hebrew idiom can refer
      either to the return of captives or more broadly to the restoration of fortunes.
    reason: alternative_reading
lexical_decisions:
- source_word: קוֹל
  chosen: the sound of
  alternatives:
  - the voice of
  - the noise of
  lexicon: HALOT
  rationale: קוֹל can mean 'voice,' 'sound,' or 'noise.' Here it introduces a series
    of heard festive sounds, not merely spoken voice, so 'the sound of' best fits
    the repeated poetic pattern in natural English.
- source_word: שָׂשׂוֹן
  chosen: joy
  alternatives:
  - rejoicing
  - mirth
  lexicon: HALOT
  rationale: A common term for exultant joy. 'Joy' is concise and idiomatic; 'rejoicing'
    is possible but less parallel with the following שִׂמְחָה.
- source_word: שִׂמְחָה
  chosen: gladness
  alternatives:
  - joy
  - rejoicing
  lexicon: HALOT
  rationale: Rendered 'gladness' to preserve the poetic distinction from שָׂשׂוֹן
    while keeping the pair natural in English ('joy and gladness').
- source_word: חָתָן
  chosen: bridegroom
  alternatives:
  - groom
  lexicon: HALOT
  rationale: The formal pair 'bridegroom ... bride' reflects the Hebrew wedding formula
    and suits the elevated prophetic style.
- source_word: כַּלָּה
  chosen: bride
  lexicon: HALOT
  rationale: Standard equivalent in the wedding pair with חָתָן.
- source_word: אֹמְרִים
  chosen: those saying
  alternatives:
  - those who say
  - saying
  lexicon: HALOT
  rationale: The participle functions substantivally. 'Those saying' preserves the
    Hebrew structure and links with the repeated 'the sound of' formula.
- source_word: הוֹדוּ
  chosen: Give thanks
  alternatives:
  - Praise
  - Confess thanks
  lexicon: HALOT
  rationale: In this liturgical context ידה in the Hiphil means giving thanks or praise.
    'Give thanks' best matches the thanksgiving formula that follows and the related
    noun תּוֹדָה later in the verse.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD Almighty
  - Yahweh of hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Of hosts' preserves the
    Hebrew title's imagery more directly than 'Almighty.'
- source_word: טוֹב
  chosen: good
  alternatives:
  - kind
  - beneficent
  lexicon: HALOT
  rationale: 'Standard covenantal liturgical formula: ''for the LORD is good.'''
- source_word: לְעוֹלָם חַסְדּוֹ
  chosen: his steadfast love endures forever
  alternatives:
  - his lovingkindness is forever
  - his covenant faithfulness is forever
  - his mercy endures forever
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty and mercy. 'Steadfast love' is a widely
    recognized and theologically weighty rendering. 'Endures' is supplied naturally
    in English for the verbless clause and reflects the idiom.
- source_word: מְבִאִים
  chosen: those bringing
  alternatives:
  - bringing
  - who bring
  lexicon: HALOT
  rationale: The participle likely continues the description of the heard voices/people
    in restored worship. 'Those bringing' makes the implied subject explicit in English.
- source_word: תּוֹדָה
  chosen: a thank offering
  alternatives:
  - thanksgiving
  - praise offering
  lexicon: HALOT
  rationale: Here the object is brought into the temple, so the sacrificial sense
    is more specific than mere verbal thanksgiving. 'Thank offering' captures the
    cultic nuance.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of the LORD.' This preserves the Hebrew wording while
    still being clear to modern readers.
- source_word: אָשִׁיב
  chosen: I will restore
  alternatives:
  - I will bring back
  - I will return
  lexicon: HALOT
  rationale: In context of reversal and renewal, the Hiphil of שוב is well rendered
    'restore.'
- source_word: שְׁבוּת
  chosen: the fortunes
  alternatives:
  - the captivity
  - the exiles
  lexicon: HALOT
  rationale: The idiom שׁוּב שְׁבוּת/שְׁבִית often means 'restore the fortunes' broadly,
    not only a literal return from captivity. Here the land's overall restoration
    is in view.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In Jeremiah this commonly refers to the land of Judah/Israel rather than
    the whole earth.
- source_word: כְּבָרִאשֹׁנָה
  chosen: as at first
  alternatives:
  - as formerly
  - as before
  lexicon: HALOT
  rationale: Expresses restoration to an earlier condition. 'As at first' is concise
    and slightly elevated, fitting prophetic diction.
