theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Meaning of שְׁבוּת in the restoration formula
  chosen_reading: restore the fortunes of the land
  alternative_readings:
  - restore the captivity of the land
  - bring back the captives of the land
  rationale: 'The phrase is a recognized restoration idiom and here encompasses the
    broader renewal described in the verse: repopulation, weddings, thanksgiving,
    and temple worship. The broader idiomatic rendering avoids narrowing the promise
    to captivity alone while preserving the restoration theme.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
