theological_decisions:
- issue: Nature of the nations' reaction to God's restoration
  chosen_reading: awed fear in response to divine blessing
  alternative_readings:
  - terror
  - political agitation
  rationale: The paired verbs can denote fear and trembling broadly, but in this context
    the cause is God's abundant good and peace for Jerusalem. The translation avoids
    importing either purely hostile terror or a flattened secular reaction, preserving
    the prophetic sense of astonished awe.
  doctrine_reference: Preserve theological tension rather than resolve it
