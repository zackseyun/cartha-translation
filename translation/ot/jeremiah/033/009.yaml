id: JER.33.9
reference: Jeremiah 33:9
source:
  edition: WLC
  text: וְ/הָ֣יְתָה לִּ֗/י לְ/שֵׁ֤ם שָׂשׂוֹן֙ לִ/תְהִלָּ֣ה וּ/לְ/תִפְאֶ֔רֶת לְ/כֹ֖ל
    גּוֹיֵ֣י הָ/אָ֑רֶץ אֲשֶׁ֨ר יִשְׁמְע֜וּ אֶת כָּל הַ/טּוֹבָ֗ה אֲשֶׁ֤ר אָֽנֹכִי֙
    עֹשֶׂ֣ה אֹתָ֔/ם וּ/פָחֲד֣וּ וְ/רָֽגְז֗וּ עַ֤ל כָּל הַ/טּוֹבָה֙ וְ/עַ֣ל כָּל הַ/שָּׁל֔וֹם
    אֲשֶׁ֥ר אָֽנֹכִ֖י עֹ֥שֶׂה לָּֽ/הּ־־־־׃ס
translation:
  text: And she will be to me a name of joy, a praise and a glory before all the nations
    of the earth, who will hear of all the good that I am doing for them. And they
    will fear and tremble because of all the good and because of all the peace that
    I am bringing to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the prosperity' or 'all the well-being'; Hebrew shalom includes
      peace, welfare, and wholeness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה לִּי
  chosen: And she will be to me
  alternatives:
  - And it will be to me
  - And it shall become for me
  lexicon: HALOT
  rationale: The verb is 3fs, and the final pronoun לָּהּ ('to her') confirms a feminine
    singular referent, most naturally the city/Jerusalem from context. 'She' preserves
    the feminine personification better than impersonal 'it.'
- source_word: לְשֵׁם שָׂשׂוֹן
  chosen: a name of joy
  alternatives:
  - a joyful name
  - a name for rejoicing
  lexicon: HALOT
  rationale: שֵׁם with a following noun often denotes reputation or renown. Retaining
    'name of joy' keeps the Hebrew image while remaining intelligible in English.
- source_word: לִתְהִלָּה וּלְתִפְאֶרֶת
  chosen: a praise and a glory
  alternatives:
  - praise and honor
  - renown and splendor
  lexicon: HALOT
  rationale: Both nouns describe public esteem. 'Praise' fits תְהִלָּה directly; תִפְאֶרֶת
    can be 'beauty/glory/splendor.' 'Glory' best matches the elevated prophetic tone
    and public honor sense.
- source_word: לְכֹל גּוֹיֵי הָאָרֶץ
  chosen: before all the nations of the earth
  alternatives:
  - to all the nations of the earth
  - for all the nations of the earth
  lexicon: HALOT
  rationale: The preposition ל can indicate relation or reference. 'Before all the
    nations' captures the idea of public reputation in the sight of the nations.
- source_word: אֲשֶׁר יִשְׁמְעוּ
  chosen: who will hear of
  alternatives:
  - who will hear
  - when they hear
  lexicon: HALOT
  rationale: English idiom prefers 'hear of' with a report about God's acts. The relative
    clause modifies the nations.
- source_word: אֶת כָּל הַטּוֹבָה אֲשֶׁר אָנֹכִי עֹשֶׂה אֹתָם
  chosen: all the good that I am doing for them
  alternatives:
  - all the good that I am doing to them
  - all the goodness that I am showing them
  lexicon: HALOT
  rationale: The idiom עשה + direct object pronoun here means to do good for someone,
    not harm to them. 'For them' is the natural English sense. 'Good' rather than
    'goodness' better reflects the concrete benefits in context.
- source_word: וּפָחֲדוּ וְרָגְזוּ
  chosen: And they will fear and tremble
  alternatives:
  - and they will fear and quake
  - and they will be afraid and agitated
  lexicon: HALOT
  rationale: פחד denotes fear; רגז can mean quake, tremble, or be disturbed. In this
    context of awed reaction to divine blessing, 'fear and tremble' conveys reverent
    astonishment without implying hostility.
- source_word: עַל כָּל הַטּוֹבָה
  chosen: because of all the good
  alternatives:
  - over all the good
  - at all the good
  lexicon: HALOT
  rationale: 'עַל here is causal in effect: their reaction arises on account of the
    good God gives.'
- source_word: וְעַל כָּל הַשָּׁלוֹם
  chosen: because of all the peace
  alternatives:
  - because of all the prosperity
  - because of all the well-being
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, welfare, and wholeness. 'Peace' is the default
    rendering and preserves the theological breadth; the wider sense is worth preserving
    in a footnote.
- source_word: אֲשֶׁר אָנֹכִי עֹשֶׂה לָּהּ
  chosen: that I am bringing to her
  alternatives:
  - that I am doing for her
  - that I am making for her
  lexicon: HALOT
  rationale: Although literally 'doing for her,' English is smoother with 'bringing
    to her' when the object is 'peace.' This is a modest dynamic adjustment within
    optimal equivalence.
