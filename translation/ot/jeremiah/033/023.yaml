id: JER.33.23
reference: Jeremiah 33:23
source:
  edition: WLC
  text: וַֽ/יְהִי֙ דְּבַר יְהוָ֔ה אֶֽל יִרְמְיָ֖הוּ לֵ/אמֹֽר־־׃
translation:
  text: And the word of Yahweh came to Jeremiah, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; alternatively rendered ''Yahweh'' or ''Jehovah.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - And it came to pass
  - Now ... came
  lexicon: HALOT
  rationale: The waw-consecutive of היה here functions as standard narrative/sequential introduction. In English, the idiomatic sense is best carried by folding the verb into the clause 'the word ... came' rather than the wooden 'it happened.' This preserves the discourse flow without archaic phrasing.
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - the message
  - the matter
  lexicon: HALOT
  rationale: In the prophetic formula דְּבַר יְהוָה, 'word' is the standard and most transparent rendering, preserving the revelatory weight of divine speech. 'Message' is possible but slightly more interpretive.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition simply marks direction/recipient; 'to' is the natural modern English equivalent.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive construct introduces the following divine speech. 'Saying' is the standard idiomatic English rendering in prophetic narrative formulas.
