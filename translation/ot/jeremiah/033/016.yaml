theological_decisions:
- issue: Rendering the divine name יְהוָה in a titular naming formula
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of the naming formula in relation to Jeremiah 23:6
  chosen_reading: The name is applied here to Jerusalem ('she will be called')
  alternative_readings:
  - The phrase echoes the royal/messianic title in Jer 23:6 and may intentionally associate the city with the king's righteousness
  rationale: The feminine suffix לָהּ points grammatically to Jerusalem in this verse, so the main text should reflect that. The intertextual echo with Jeremiah 23:6 is significant but should not override the grammar; it is best preserved in a footnote rather than resolved dogmatically in translation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
