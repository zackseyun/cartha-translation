id: JER.33.16
reference: Jeremiah 33:16
source:
  edition: WLC
  text: בַּ/יָּמִ֤ים הָ/הֵם֙ תִּוָּשַׁ֣ע יְהוּדָ֔ה וִ/ירוּשָׁלִַ֖ם תִּשְׁכּ֣וֹן לָ/בֶ֑טַח וְ/זֶ֥ה אֲשֶׁר יִקְרָא לָ֖/הּ יְהוָ֥ה צִדְקֵֽ/נוּ־־׀׃ס
translation:
  text: 'In those days Judah will be saved, and Jerusalem will dwell securely; and this is what she will be called: ‘Yahweh is our righteousness.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'and this is the name by which she will be called.'
    reason: lexical_alternative
  - marker: b
    text: Jeremiah 23:6 applies the closely related title 'The LORD is our righteousness' to the coming Davidic king; here the grammar applies it to Jerusalem, likely echoing that earlier promise.
    reason: cross_reference
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  chosen: In those days
  alternatives:
  - In those days then
  lexicon: HALOT
  rationale: Standard temporal idiom introducing the promised future restoration period. 'In those days' is natural English and preserves the prophetic formula.
- source_word: תִּוָּשַׁע
  chosen: will be saved
  alternatives:
  - will be delivered
  lexicon: HALOT
  rationale: Niphal of ישׁע commonly denotes being saved/delivered. 'Will be saved' preserves both the passive form and the theological resonance of divine rescue; 'delivered' is possible but narrower.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Proper name of the people/kingdom; standard transliteration.
- source_word: וִירוּשָׁלִַם
  chosen: and Jerusalem
  rationale: Proper name of the city; standard transliteration. The conjunction is retained.
- source_word: תִּשְׁכּוֹן לָבֶטַח
  chosen: will dwell securely
  alternatives:
  - will live in safety
  - will dwell in safety
  lexicon: HALOT
  rationale: שׁכן means dwell/live, and לבטח conveys security/safety. 'Dwell securely' is idiomatic modern English and keeps the settled-residence nuance.
- source_word: וְזֶה אֲשֶׁר
  chosen: and this is what
  alternatives:
  - and this is that which
  - and this is the name by which
  lexicon: HALOT
  rationale: This introduces the designation that follows. English requires some smoothing; 'this is what' is clear while staying close to the Hebrew structure. The fuller sense 'the name by which' is interpretive and can be preserved in a footnote.
- source_word: יִקְרָא לָהּ
  chosen: she will be called
  alternatives:
  - one will call her
  - it will be called for her
  lexicon: HALOT
  rationale: Hebrew uses a 3ms singular verb with a 3fs pronominal suffix, an idiom for naming/designation. Because the referent is Jerusalem (feminine city), 'she will be called' is the most natural English rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צִדְקֵנוּ
  chosen: is our righteousness
  alternatives:
  - our righteousness
  - our justice
  lexicon: HALOT
  rationale: 'The construct with first person plural suffix means ''our righteousness.'' In English, because this is a naming formula, supplying ''is'' clarifies the predicative sense: ''The LORD is our righteousness.'' ''Justice'' is possible semantically but ''righteousness'' better matches the covenantal/theological usage here and aligns with the project''s default for cognate terms.'
