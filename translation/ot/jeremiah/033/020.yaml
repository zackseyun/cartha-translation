theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the conditional אִם תָּפֵרוּ in a rhetorical context
  chosen_reading: If you can break
  alternative_readings:
  - If you break
  - If you were to break
  rationale: The broader context uses an impossible condition to underscore the certainty of God's promise. Adding 'can' makes the rhetorical force natural in English while remaining faithful to the Hebrew argument.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense without paraphrase'
