id: JER.33.20
reference: Jeremiah 33:20
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה אִם תָּפֵ֨רוּ֙ אֶת בְּרִיתִ֣/י הַ/יּ֔וֹם וְ/אֶת בְּרִיתִ֖/י הַ/לָּ֑יְלָה וּ/לְ/בִלְתִּ֛י הֱי֥וֹת יֽוֹמָם וָ/לַ֖יְלָה בְּ/עִתָּֽ/ם־־־־׃
translation:
  text: 'Thus says Yahweh: If you can break my covenant with the day and my covenant with the night, so that day and night will not be at their appointed time,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'If you break my covenant with the day and my covenant with the night.' The Hebrew conditional can be rendered more formally without 'can'; the main text brings out the rhetorical sense of impossibility in context.
    reason: lexical_alternative
  - marker: b
    text: Or, 'so that there will not be day and night at their appointed time.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. יְהוָה is rendered 'the LORD' per doctrine for the divine name.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the Tetragrammaton, preserving covenantal sense and English Bible convention.
- source_word: אִם תָּפֵרוּ
  chosen: If you can break
  alternatives:
  - If you break
  - If you could break
  lexicon: HALOT
  rationale: הפר in Hiphil means 'break, annul, violate' a covenant. English 'can break' fits the rhetorical conditional in context, implying impossibility without overparaphrasing.
- source_word: בְּרִיתִי
  chosen: my covenant
  alternatives:
  - my pact
  lexicon: HALOT
  rationale: ברית is regularly 'covenant' in biblical and theological contexts; this preserves the formal covenantal language.
- source_word: הַיּוֹם
  chosen: the day
  alternatives:
  - daytime
  lexicon: HALOT
  rationale: Definite noun referring to the ordered cycle of day; 'the day' preserves the parallel with 'the night' and the covenant imagery.
- source_word: הַלָּיְלָה
  chosen: the night
  alternatives:
  - nighttime
  lexicon: HALOT
  rationale: Definite noun paired with 'the day' in a merism for the regular created order.
- source_word: וּלְבִלְתִּי הֱיוֹת
  chosen: so that ... will not come
  alternatives:
  - so that there will not be
  - so that ... may fail to occur
  lexicon: HALOT
  rationale: 'The construction expresses result/purpose: the breaking of the covenant would mean the non-occurrence of day and night in their proper order. ''Will not come'' is idiomatic English that captures the eventive sense in context.'
- source_word: יוֹמָם וָלַיְלָה
  chosen: day and night
  alternatives:
  - by day and by night
  lexicon: HALOT
  rationale: Here the pair denotes the recurring sequence of day and night, not merely adverbial duration. The simple pair is clearest in English.
- source_word: בְּעִתָּם
  chosen: at their appointed time
  alternatives:
  - in their time
  - at the proper time
  - in their appointed season
  lexicon: HALOT
  rationale: עֵת denotes a set or proper time. 'Appointed time' best conveys ordered regularity under divine ordinance.
