theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default for YHWH.
    This also aligns with the covenantal context and established reverential convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the conditional אִם תָּפֵרוּ in a rhetorical context
  chosen_reading: If you can break
  alternative_readings:
  - If you break
  - If you were to break
  rationale: The broader context uses an impossible condition to underscore the certainty
    of God's promise. Adding 'can' makes the rhetorical force natural in English while
    remaining faithful to the Hebrew argument.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    source sense without paraphrase'
