id: JER.33.10
reference: Jeremiah 33:10
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה עוֹד֮ יִשָּׁמַ֣ע בַּ/מָּקוֹם הַ/זֶּה֒ אֲשֶׁר֙ אַתֶּ֣ם אֹֽמְרִ֔ים חָרֵ֣ב ה֔וּא מֵ/אֵ֥ין אָדָ֖ם וּ/מֵ/אֵ֣ין בְּהֵמָ֑ה בְּ/עָרֵ֤י יְהוּדָה֙ וּ/בְ/חֻצ֣וֹת יְרוּשָׁלִַ֔ם הַֽ/נְשַׁמּ֗וֹת מֵ/אֵ֥ין אָדָ֛ם וּ/מֵ/אֵ֥ין יוֹשֵׁ֖ב וּ/מֵ/אֵ֥ין בְּהֵמָֽה׀־׃
translation:
  text: 'Thus says Yahweh: Yet in this place, of which you say, ‘It is desolate, without man or beast,’ in the cities of Judah and in the streets of Jerusalem that are desolate, without man or inhabitant or beast, there shall again be heard'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'desolate' for 'a waste' (חָרֵב); the Hebrew uses a devastation term here and a related desolation term later in the verse.
    reason: lexical_alternative
  - marker: b
    text: '''Without man'' uses אָדָם in a representative sense; alternatively, ''without humankind'' or ''with no people.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'squares' for 'streets' (חֻצוֹת), referring to the public thoroughfares or open places of the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' preserves the formal prophetic cadence without unnecessary paraphrase.
- source_word: עוֹד
  chosen: Yet
  alternatives:
  - Again
  - Still
  lexicon: HALOT
  rationale: Here עוֹד signals a future reversal/restoration in context. 'Yet' fits the sentence flow with the following future passive, while the restoration nuance is reinforced by 'again' later with יִשָּׁמַע.
- source_word: יִשָּׁמַע
  chosen: there shall again be heard
  alternatives:
  - it shall be heard again
  - will be heard again
  lexicon: HALOT
  rationale: Nifal imperfect of שׁמע is naturally rendered as a passive/impersonal hearing formula. 'There shall ... be heard' preserves the Hebrew idiom and anticipates the sounds specified in the next verse. 'Again' is supplied here from the restoration sense of עוֹד for natural English placement.
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: in this place
  alternatives:
  - in this המקום
  - in this land
  lexicon: HALOT
  rationale: Direct and contextually appropriate; 'place' is broad enough to encompass the region later specified as Judah's cities and Jerusalem's streets.
- source_word: אֲשֶׁר אַתֶּם אֹמְרִים
  chosen: of which you say
  alternatives:
  - about which you say
  - that you say is
  lexicon: HALOT
  rationale: This relative construction introduces the people's assessment of the land/city. 'Of which you say' is idiomatic and close to the Hebrew syntax.
- source_word: חָרֵב
  chosen: a waste
  alternatives:
  - desolate
  - ruined
  lexicon: HALOT
  rationale: The adjective denotes devastation/desolation. 'A waste' works well in the quoted speech; later נְשַׁמּוֹת is rendered 'desolate' to avoid flattening two related but distinct terms into identical English in the same verse.
- source_word: מֵאֵין אָדָם
  chosen: without man
  alternatives:
  - without humankind
  - with no people
  lexicon: HALOT
  rationale: Per DOCTRINE.md, אָדָם should be rendered 'man' or 'humankind' by context. In this stock desolation formula paired with beast and later inhabitant, 'man' preserves the Hebrew's gender-accurate representative sense and the formulaic cadence.
- source_word: בְּהֵמָה
  chosen: beast
  alternatives:
  - animal
  - livestock
  lexicon: HALOT
  rationale: In desolation formulas, בְּהֵמָה commonly refers broadly to animals/domestic beasts. 'Beast' preserves the solemn, formulaic register better than the flatter 'animal.'
- source_word: בְּעָרֵי יְהוּדָה
  chosen: in the cities of Judah
  alternatives:
  - among the cities of Judah
  lexicon: HALOT
  rationale: Straightforward locative rendering.
- source_word: וּבְחֻצוֹת יְרוּשָׁלִַם
  chosen: and in the streets of Jerusalem
  alternatives:
  - and in the squares of Jerusalem
  - and in the open places of Jerusalem
  lexicon: HALOT
  rationale: חֻצוֹת can denote streets or public squares. 'Streets' is the most natural modern English here and fits the urban setting.
- source_word: הַנְשַׁמּוֹת
  chosen: that are desolate
  alternatives:
  - which are laid waste
  - being desolated
  lexicon: HALOT
  rationale: Passive participial form describing the current condition of the cities/streets. 'That are desolate' is clear and idiomatic.
- source_word: יוֹשֵׁב
  chosen: inhabitant
  alternatives:
  - one dwelling there
  - resident
  lexicon: HALOT
  rationale: 'The singular participle after ''without'' functions collectively: no one dwelling there. ''Inhabitant'' is concise and preserves the distinction from the broader אָדָם earlier in the verse.'
