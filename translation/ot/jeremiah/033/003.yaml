id: JER.33.3
reference: Jeremiah 33:3
source:
  edition: WLC
  text: קְרָ֥א אֵלַ֖/י וְ/אֶעֱנֶ֑/ךָּ וְ/אַגִּ֧ידָה לְּ/ךָ֛ גְּדֹל֥וֹת וּ/בְצֻר֖וֹת
    לֹ֥א יְדַעְתָּֽ/ם׃ס
translation:
  text: Call to me, and I will answer you, and I will tell you great and hidden things
    that you have not known.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'inaccessible things' or 'fortified things'; the Hebrew term suggests
      matters cut off from ordinary access.
    reason: lexical_alternative
lexical_decisions:
- source_word: קְרָא
  chosen: Call
  alternatives:
  - Cry out
  - Call out
  lexicon: HALOT
  rationale: Qal imperative 2ms of קרא here is a direct summons to address God. 'Call'
    is natural modern English and preserves the imperative force without adding intensity
    not explicit in the verb.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition plus 1cs suffix straightforwardly means 'to me.' 'Unto
    me' is unnecessarily archaic.
- source_word: וְאֶעֱנֶךָ
  chosen: and I will answer you
  alternatives:
  - and I will respond to you
  lexicon: HALOT
  rationale: ענה in this stem and context commonly means 'answer/respond.' 'Answer
    you' is the most idiomatic and direct rendering in English.
- source_word: וְאַגִּידָה
  chosen: and I will tell you
  alternatives:
  - and I will declare to you
  - and I will make known to you
  lexicon: HALOT
  rationale: נגד in the Hiphil means to tell, declare, or make known. 'Tell you' fits
    the parallelism and keeps the promise personal and direct; 'declare' is possible
    but slightly stiffer.
- source_word: גְּדֹלוֹת
  chosen: great things
  alternatives:
  - great matters
  lexicon: HALOT
  rationale: The feminine plural adjective functions substantivally. 'Great things'
    is the most natural English equivalent and preserves the broad scope of what God
    will reveal.
- source_word: וּבְצֻרוֹת
  chosen: hidden things
  alternatives:
  - inaccessible things
  - fortified things
  - mysterious things
  lexicon: HALOT
  rationale: From בצר, the adjective can denote something cut off, inaccessible, or
    fortified. In this revelatory context, the sense is best captured as things beyond
    ordinary access or knowledge. 'Hidden things' communicates that sense clearly
    in modern English, while preserving the idea that these are not readily attainable
    by the hearer.
- source_word: לֹא יְדַעְתָּם
  chosen: that you have not known
  alternatives:
  - that you do not know
  - which you have not known
  lexicon: HALOT
  rationale: The perfect 2ms + 3mp suffix points to things not previously known by
    the addressee. 'Have not known' preserves the completed-yet-relevant force better
    than a simple present.
