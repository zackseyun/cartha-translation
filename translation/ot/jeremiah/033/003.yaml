theological_decisions:
- issue: Semantic force of וּבְצֻרוֹת in a divine-revelation context
  chosen_reading: Render as 'hidden things' in the main text
  alternative_readings:
  - inaccessible things
  - fortified things
  rationale: The verse promises revelation from God in response to prayer. While the
    Hebrew term can carry the sense of 'fortified' or 'inaccessible,' in context the
    emphasis is on truths beyond the prophet's present knowledge. 'Hidden things'
    best balances readability and semantic range, while preserving alternatives in
    a footnote rather than over-resolving the imagery.
  doctrine_reference: Translation philosophy §3, §6
