theological_decisions:
- issue: Dynastic promise to David
  chosen_reading: The verse promises an enduring Davidic royal line without specifying
    here the exact historical or messianic mechanism.
  alternative_readings:
  - A purely immediate historical succession promise
  - An exclusively messianic prediction fulfilled in one final Davidic king
  rationale: The Hebrew states that David will not lack a man sitting on Israel's
    throne. The translation preserves this dynastic formulation and does not force
    either a merely historical or an exclusively messianic interpretation in the main
    text.
  doctrine_reference: Preserve theological tension rather than resolve it.
