id: JER.33.17
reference: Jeremiah 33:17
source:
  edition: WLC
  text: כִּי כֹ֖ה אָמַ֣ר יְהוָ֑ה לֹֽא יִכָּרֵ֣ת לְ/דָוִ֔ד אִ֕ישׁ יֹשֵׁ֖ב עַל כִּסֵּ֥א
    בֵֽית יִשְׂרָאֵֽל־־־־׃
translation:
  text: 'For thus says the LORD: David shall never lack a man to sit on the throne
    of the house of Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'there shall not be cut off for David a man sitting on the throne
      of the house of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or simply, 'on the throne of Israel.' The Hebrew reads 'the house of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the divine declaration as grounding or explaining the preceding
    promise. 'For' is the most natural connective in context.
- source_word: כֹה אָמַר יְהוָה
  chosen: thus says the LORD
  alternatives:
  - this is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. YHWH is rendered 'the LORD' per
    doctrine guidance for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal force while matching established English Bible convention.
- source_word: לֹא יִכָּרֵת
  chosen: shall never lack
  alternatives:
  - shall not be cut off
  - shall never be cut off from
  lexicon: HALOT
  rationale: The Niphal of כרת literally means 'be cut off,' but in this idiom with
    a following dative and 'man' it means that David will not be without a descendant/representative.
    'Shall never lack' communicates the idiomatic sense in clear English while preserving
    the promise's force.
- source_word: לְדָוִד
  chosen: David
  alternatives:
  - for David
  - to David
  lexicon: HALOT
  rationale: The prefixed ל marks relation in the idiom 'not be cut off for David
    a man'; in English the sense is best expressed simply with 'David shall never
    lack...' rather than a wooden prepositional rendering.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - someone
  - a descendant
  lexicon: HALOT
  rationale: The Hebrew is singular masculine 'man.' Per gender-accurate policy, this
    is retained. 'Descendant' is interpretive and narrower than the lexical form,
    though context implies dynastic succession.
- source_word: יֹשֵׁב
  chosen: to sit
  alternatives:
  - sitting
  - who sits
  - to occupy
  lexicon: HALOT
  rationale: 'The participle describes the man''s royal function. English idiom after
    ''lack a man'' is best rendered infinitivally: ''a man to sit on the throne.'''
- source_word: עַל כִּסֵּא
  chosen: on the throne
  alternatives:
  - upon the throne
  - on a throne
  lexicon: HALOT
  rationale: Definite royal throne is intended in context; English naturally uses
    'the throne' for dynastic kingship.
- source_word: בֵית יִשְׂרָאֵל
  chosen: of the house of Israel
  alternatives:
  - of Israel
  - over the house of Israel
  lexicon: HALOT
  rationale: The construct phrase is literally 'house of Israel.' Retaining it preserves
    the covenantal-national expression. Although English might simplify to 'of Israel,'
    the fuller phrase better reflects the Hebrew.
