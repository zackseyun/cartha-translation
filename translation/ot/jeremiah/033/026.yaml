id: JER.33.26
reference: Jeremiah 33:26
source:
  edition: WLC
  text: גַּם זֶ֣רַע יַעֲקוֹב֩ וְ/דָוִ֨ד עַבְדִּ֜/י אֶמְאַ֗ס מִ/קַּ֤חַת מִ/זַּרְע/וֹ֙
    מֹֽשְׁלִ֔ים אֶל זֶ֥רַע אַבְרָהָ֖ם יִשְׂחָ֣ק וְ/יַעֲקֹ֑ב כִּֽי אשוב אֶת שְׁבוּתָ֖/ם
    וְ/רִחַמְתִּֽי/ם־־־־׃ס
translation:
  text: then I would also reject the offspring of Jacob and of David my servant, so
    as not to take from his offspring rulers over the offspring of Abraham, Isaac,
    and Jacob. For I will restore their fortunes and have compassion on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the seed of Jacob' and throughout the verse 'seed' instead of 'offspring.'
      The Hebrew זֶרַע is a collective singular.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will restore their captivity' / 'I will bring back their exiles.'
      The Hebrew idiom can refer specifically to return from exile or more broadly
      to restoration of fortunes.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  chosen: then ... also
  alternatives:
  - also
  - even
  lexicon: HALOT
  rationale: In this conditional apodosis continuing from the previous verse, גַּם
    adds a consequential 'also/then also' sense rather than simple additive 'also'
    alone. English 'then ... also' captures the logic.
- source_word: זֶרַע יַעֲקֹב
  chosen: the offspring of Jacob
  alternatives:
  - the seed of Jacob
  - the descendants of Jacob
  lexicon: HALOT
  rationale: זֶרַע is a collective singular. 'Offspring' preserves the singular collective
    force better than 'descendants' while remaining natural English; 'seed' is more
    formal but less idiomatic here.
- source_word: וְדָוִד עַבְדִּי
  chosen: and of David my servant
  alternatives:
  - and David my servant
  lexicon: HALOT
  rationale: The phrase is coordinated with 'the offspring of Jacob' under the object
    of 'reject.' Supplying 'of' in English clarifies that both Jacob's line and David
    are in view within the rejection formula, while retaining the covenantal title
    'my servant' for David.
- source_word: אֶמְאַס
  chosen: I would ... reject
  alternatives:
  - I will reject
  - I would despise
  lexicon: HALOT
  rationale: Because the verse completes the unreal conditional begun in the prior
    verse ('if ... then'), the imperfect is best rendered as modal 'would reject'
    rather than simple future. 'Reject' fits the covenantal context better than the
    stronger emotional 'despise.'
- source_word: מִקַּחַת
  chosen: so as not to take
  alternatives:
  - from taking
  - from choosing
  lexicon: HALOT
  rationale: 'The infinitive construct of לקח with prefixed מ expresses the result/content
    of rejection: not taking/selecting rulers from David''s seed. ''So as not to take''
    is clear and preserves the verbal idea.'
- source_word: מִזַּרְעוֹ
  chosen: from his offspring
  alternatives:
  - from his seed
  - from David's offspring
  lexicon: HALOT
  rationale: The 3ms suffix most naturally refers to David, the nearest singular antecedent
    and the one from whose line rulers come. 'His offspring' keeps the Hebrew pronoun;
    the referent is clear in context.
- source_word: מֹשְׁלִים
  chosen: rulers
  alternatives:
  - those who rule
  - governors
  lexicon: HALOT
  rationale: The participle denotes persons exercising rule. 'Rulers' is concise,
    natural, and preserves the plural personal sense.
- source_word: אֶל זֶרַע אַבְרָהָם יִשְׂחָק וְיַעֲקֹב
  chosen: over the offspring of Abraham, Isaac, and Jacob
  alternatives:
  - for the offspring of Abraham, Isaac, and Jacob
  - to rule the offspring of Abraham, Isaac, and Jacob
  lexicon: HALOT
  rationale: With משל, אֶל can mark the object/sphere of rule. 'Over' expresses the
    governing relationship idiomatically in English. 'Offspring' again preserves the
    collective singular of זֶרַע.
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  lexicon: HALOT
  rationale: 'Introduces the ground for denying the hypothetical rejection: God will
    in fact restore and show mercy. ''For'' best signals explanation.'
- source_word: אשוב את שבותם
  chosen: I will restore their fortunes
  alternatives:
  - I will restore their captivity
  - I will bring back their exiles
  lexicon: HALOT
  rationale: The idiom שוב את־שבות commonly means restoration of fortunes/restoration
    from exile. 'Restore their fortunes' is the established idiomatic rendering and
    can include the broader reversal of plight, not merely physical return.
- source_word: וְרִחַמְתִּים
  chosen: and have compassion on them
  alternatives:
  - and show them mercy
  - and be merciful to them
  lexicon: HALOT
  rationale: רחם conveys compassionate mercy. 'Have compassion on them' is natural
    English and preserves the affective dimension of divine mercy.
