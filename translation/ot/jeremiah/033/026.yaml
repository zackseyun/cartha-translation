theological_decisions:
- issue: Conditional force carried over from the previous verse
  chosen_reading: Render the main verbs modally ('would reject') as the apodosis of
    an unreal condition.
  alternative_readings:
  - Render as simple future ('I will reject')
  rationale: Verse 26 is syntactically and logically dependent on the conditional
    statement in verse 25. Translating the verbs as simple futures would obscure the
    argument that God is denying the possibility of rejecting Jacob and David if the
    fixed order of creation stands.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referent of 'his offspring'
  chosen_reading: Take the suffix in מִזַּרְעוֹ as referring to David.
  alternative_readings:
  - Take it as referring to Jacob collectively/Israel
  rationale: The nearest singular antecedent is David, and the mention of rulers from
    his line over the patriarchal people aligns with the Davidic covenant theme in
    the context. This avoids flattening the specific Davidic promise into a merely
    general national reference.
  doctrine_reference: Translation philosophy §1, §5
