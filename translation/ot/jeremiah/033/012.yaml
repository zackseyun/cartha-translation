theological_decisions:
- issue: Rendering of אָדָם in a depopulation formula
  chosen_reading: man
  alternative_readings:
  - humankind
  - people
  rationale: The phrase מֵאֵין אָדָם וְעַד בְּהֵמָה is a conventional expression meaning
    absence of human and animal life. Per project policy, masculine/generic language
    is retained where it matches source intent; 'man or beast' is the most direct
    equivalent of the stock phrase.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
