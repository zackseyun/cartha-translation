id: JER.33.12
reference: Jeremiah 33:12
source:
  edition: WLC
  text: כֹּֽה אָמַר֮ יְהוָ֣ה צְבָאוֹת֒ ע֞וֹד יִֽהְיֶ֣ה בַּ/מָּק֣וֹם הַ/זֶּ֗ה הֶ/חָרֵ֛ב
    מֵֽ/אֵין אָדָ֥ם וְ/עַד בְּהֵמָ֖ה וּ/בְ/כָל עָרָ֑י/ו נְוֵ֣ה רֹעִ֔ים מַרְבִּצִ֖ים
    צֹֽאן־׀־־־׃
translation:
  text: 'Thus says the LORD of hosts: Yet again there will be in this place, which
    is desolate, without man or beast, and in all its cities, a pasture for shepherds,
    where they make flocks lie down.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'again' or 'once more' for 'Yet again.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'without man or beast,' a stock expression for total desolation.
    reason: cultural_note
  - marker: c
    text: Or 'a habitation of shepherds' or 'a fold for shepherds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the covenant name with small-caps convention in English.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: Traditional but still transparent rendering of the title יְהוָה צְבָאוֹת;
    'hosts' preserves the breadth of heavenly/earthly armies without over-specifying.
- source_word: עוֹד
  chosen: Yet again
  alternatives:
  - again
  - still
  - once more
  lexicon: HALOT
  rationale: Signals restoration after devastation; 'yet again' captures both futurity
    and reversal in context.
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: in this place
  alternatives:
  - at this place
  lexicon: HALOT
  rationale: Natural English equivalent of the locative phrase, retaining the demonstrative
    emphasis.
- source_word: הֶחָרֵב
  chosen: which is desolate
  alternatives:
  - waste
  - ruined
  lexicon: HALOT
  rationale: Rendered as a descriptive relative phrase in English to connect smoothly
    with 'this place'; 'desolate' fits the prophetic restoration context.
- source_word: מֵאֵין אָדָם וְעַד בְּהֵמָה
  chosen: without man or beast
  alternatives:
  - with neither man nor beast
  - without human or animal
  lexicon: HALOT
  rationale: This idiom expresses total depopulation. 'Man or beast' preserves the
    Hebrew pairing and the project's gender-accurate policy for אָדָם in this stock
    phrase.
- source_word: וּבְכָל עָרָיו
  chosen: and in all its cities
  alternatives:
  - and in all his cities
  lexicon: HALOT
  rationale: The 3ms suffix refers back to 'this place' understood collectively/territorially;
    English idiom prefers 'its cities' for a place/land rather than 'his cities'.
- source_word: נְוֵה
  chosen: a pasture
  alternatives:
  - a habitation
  - a fold
  - a grazing place
  lexicon: HALOT
  rationale: In context with shepherds and flocks lying down, the term denotes a pastoral
    dwelling/grazing place. 'Pasture' is concise and contextually clear.
- source_word: רֹעִים
  chosen: for shepherds
  alternatives:
  - of shepherds
  lexicon: HALOT
  rationale: 'Construct relationship rendered idiomatically in English: a pasture
    belonging to/used by shepherds.'
- source_word: מַרְבִּצִים צֹאן
  chosen: where they make flocks lie down
  alternatives:
  - causing sheep to lie down
  - resting flocks
  lexicon: HALOT
  rationale: 'The Hiphil participle of רבץ is causative: shepherds cause the flock
    to lie down/rest. ''Flocks'' is preferred over singular ''flock'' to reflect the
    collective noun naturally in English.'
- source_word: צֹאן
  chosen: flocks
  alternatives:
  - sheep
  - flock
  lexicon: HALOT
  rationale: Though singular collective in Hebrew, plural 'flocks' reads more naturally
    with the participial clause in English and matches the distributive sense across
    the cities.
