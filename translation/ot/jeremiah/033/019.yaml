id: JER.33.19
reference: Jeremiah 33:19
source:
  edition: WLC
  text: וַֽ/יְהִי֙ דְּבַר יְהוָ֔ה אֶֽל יִרְמְיָ֖הוּ לֵ/אמֽוֹר־־׃
translation:
  text: And the word of the LORD came to Jeremiah, saying,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  chosen: And ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה functions here as standard narrative/sequential
    introduction. In English, the idiomatic sense is best carried by folding it into
    the clause 'And the word ... came' rather than the more wooden 'And it happened'
    or archaic 'And it came to pass.'
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - the message
  - the matter
  lexicon: HALOT
  rationale: In the prophetic formula דְּבַר יְהוָה, 'word' is the standard and most
    transparent rendering, preserving the formulaic force of divine revelation. 'Message'
    is possible but less formally tied to the recurring prophetic expression.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD,'
    following established reverential convention and the stated default for the project.
- source_word: אֶל
  chosen: to
  alternatives:
  - toward
  lexicon: HALOT
  rationale: The preposition marks the recipient of the divine word; 'to' is the natural
    English equivalent in this revelatory formula.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention; 'Jeremiah'
    is the established English form of יִרְמְיָהוּ.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive construct functions as a speech introducer after a revelation
    formula. 'Saying' is idiomatic and preserves the expectation of direct discourse
    in the following verse.
