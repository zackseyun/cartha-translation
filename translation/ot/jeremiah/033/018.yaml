theological_decisions:
- issue: Whether to render כרת idiomatically as 'be lacking' or more literally as 'be cut off' in a promise of perpetual priestly service
  chosen_reading: a man shall not be cut off
  alternative_readings:
  - a man shall not be lacking
  rationale: The immediate context concerns enduring covenant lines, and the literal idiom carries stronger covenantal force. It also parallels the preceding promise about David's line. The translation preserves the Hebrew's theological texture rather than smoothing it into a mere statement of absence.
  doctrine_reference: Translation philosophy §3, §4, §5
- issue: How to render הַכֹּהֲנִים הַלְוִיִּם
  chosen_reading: the Levitical priests
  alternative_readings:
  - the priests, the Levites
  - the Levitical priesthood
  rationale: This rendering preserves the identification of the priests with the Levites without importing a narrower denominational or historical reconstruction. It is idiomatic English and keeps the focus on the priestly line's continuity.
  doctrine_reference: Translation philosophy §1, §6
