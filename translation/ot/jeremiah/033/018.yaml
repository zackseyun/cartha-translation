id: JER.33.18
reference: Jeremiah 33:18
source:
  edition: WLC
  text: וְ/לַ/כֹּהֲנִים֙ הַ/לְוִיִּ֔ם לֹֽא יִכָּרֵ֥ת אִ֖ישׁ מִ/לְּ/פָנָ֑/י מַעֲלֶ֨ה עוֹלָ֜ה וּ/מַקְטִ֥יר מִנְחָ֛ה וְ/עֹ֥שֶׂה זֶּ֖בַח כָּל הַ/יָּמִֽים־־־׃ס
translation:
  text: And for the Levitical priests, a man shall not be cut off from before me who offers up a burnt offering, who burns a grain offering, and who makes sacrifice all the days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'a man shall not be lacking before me.' The Hebrew idiom is literally 'shall not be cut off.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all the days,' that is, continually or perpetually.
    reason: lexical_alternative
  - marker: c
    text: Or 'to offer up a burnt offering, to burn a grain offering, and to make sacrifice'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְלַכֹּהֲנִים הַלְוִיִּם
  chosen: And for the Levitical priests
  alternatives:
  - And as for the Levitical priests
  - And to the Levitical priests
  lexicon: HALOT
  rationale: The phrase is fronted for emphasis. 'Levitical priests' best reflects the appositional relationship of 'the priests, the Levites' in idiomatic English while preserving the identification of the priestly group with Levi.
- source_word: לֹא יִכָּרֵת אִישׁ
  chosen: a man shall not be cut off
  alternatives:
  - there shall not be cut off a man
  - a man will not be lacking
  lexicon: HALOT
  rationale: The Niphal of כרת commonly means 'be cut off.' Retaining this wording preserves covenantal and dynastic resonance in the context of enduring Davidic and priestly lines. 'A man' follows the singular אִישׁ and the project's gender-accurate policy.
- source_word: מִלְּפָנַי
  chosen: from before me
  alternatives:
  - from my presence
  - before me
  lexicon: HALOT
  rationale: Literally 'from before my face/presence.' 'From before me' preserves the Hebrew idiom and the sense of standing in God's presence for priestly service.
- source_word: מַעֲלֶה עוֹלָה
  chosen: to offer up a burnt offering
  alternatives:
  - offering up a burnt offering
  - to present a burnt offering
  lexicon: HALOT
  rationale: The Hiphil participle of עלה with עֹלָה is a standard sacrificial expression. 'Offer up' captures the causative nuance and the conventional sacrificial idiom.
- source_word: וּמַקְטִיר מִנְחָה
  chosen: to burn a grain offering
  alternatives:
  - to burn incense with a grain offering
  - to turn a grain offering into smoke
  lexicon: HALOT
  rationale: הקטיר means to make smoke/burn on the altar. With מִנְחָה, the sense is burning the offering portion of a grain offering. 'Grain offering' is clearer for modern readers than the traditional but less transparent 'meal offering.'
- source_word: וְעֹשֶׂה זֶּבַח
  chosen: and to make sacrifice
  alternatives:
  - and to offer sacrifice
  - and to perform a sacrifice
  lexicon: HALOT
  rationale: The Hebrew literally says 'do/make sacrifice.' This preserves the broad sacrificial category distinct from the preceding specific offerings. Although 'offer sacrifice' is smoother English, 'make sacrifice' stays closer to the source wording.
- source_word: כָּל הַיָּמִים
  chosen: all the days
  alternatives:
  - continually
  - always
  lexicon: HALOT
  rationale: Literally 'all the days.' This preserves the temporal expression and its covenantal sense of ongoing continuity better than a more interpretive adverb like 'continually.'
