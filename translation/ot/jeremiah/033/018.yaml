  from: to offer up a burnt offering, to burn a grain offering, and to make sacrifice
  to: who offers up a burnt offering, who burns a grain offering, and who makes sacrifice
  rationale: The Hebrew uses participles (מַעֲלֶה, וּמַקְטִיר, וְעֹשֶׂה) which function adjectivally, describing the 'man' (אִישׁ). The current 'to + infinitive' construction implies a purpose or result, which is a less direct translation of the participial function here. Rendering them as relative clauses ('who offers...') or present participles ('offering...') better captures the descriptive nature of the priestly activities. This clarifies that the promise is about the perpetual presence of priests performing these functions, rather than the purpose of their not being cut off.
