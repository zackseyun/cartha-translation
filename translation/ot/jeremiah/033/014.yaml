theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This follows the doctrinal
    guidance and standard English Bible convention while signaling the covenant name
    through small-caps style in publication.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render הַדָּבָר הַטּוֹב as 'word' or the more interpretive 'promise'
  chosen_reading: the good word
  alternative_readings:
  - the good promise
  rationale: The Hebrew says 'the good word' and immediately links it to 'which I
    spoke.' Keeping 'word' preserves the lexical texture and avoids over-resolving
    the expression, though the promissory sense is clear from context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    preserve theological tension rather than resolve it'
