id: JER.33.14
reference: Jeremiah 33:14
source:
  edition: WLC
  text: הִנֵּ֛ה יָמִ֥ים בָּאִ֖ים נְאֻם יְהוָ֑ה וַ/הֲקִֽמֹתִי֙ אֶת הַ/דָּבָ֣ר הַ/טּ֔וֹב
    אֲשֶׁ֥ר דִּבַּ֛רְתִּי אֶל בֵּ֥ית יִשְׂרָאֵ֖ל וְ/עַל בֵּ֥ית יְהוּדָֽה־־־־׃
translation:
  text: Look, days are coming, declares the LORD, when I will fulfill the good word
    that I spoke to the house of Israel and the house of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the good promise.' Hebrew literally, 'the good word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces an attention-getting announcement. 'Look' preserves the deictic
    force in readable modern English better than the more archaic 'Behold.'
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are on the way
  lexicon: HALOT
  rationale: A common prophetic formula announcing a future time. 'Days are coming'
    is idiomatic and close to the Hebrew; omission of the article reflects the Hebrew
    form while remaining natural in English.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic speech formula. 'Declares the LORD' is both natural
    and weighty. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and broad English Bible recognizability.
- source_word: וַהֲקִמֹתִי
  chosen: I will fulfill
  alternatives:
  - I will establish
  - I will confirm
  - I will bring about
  lexicon: HALOT
  rationale: From קום in the Hiphil, here with 'the good word' as object, the sense
    is causing a spoken promise to stand or come to pass. 'Fulfill' best captures
    the idiomatic force in English for a promise or word.
- source_word: הַדָּבָר הַטּוֹב
  chosen: the good word
  alternatives:
  - the good promise
  - the good thing
  lexicon: HALOT
  rationale: דבר is broadly 'word/matter/thing.' In this context of something spoken
    by God and then brought to pass, 'word' preserves the lexical link to 'I spoke,'
    while still implying promise. 'Promise' is interpretive and therefore kept as
    an alternative rather than main text.
- source_word: דִּבַּרְתִּי
  chosen: I spoke
  alternatives:
  - I promised
  - I said
  lexicon: HALOT
  rationale: The verb is simply 'spoke.' Retaining 'spoke' avoids importing the more
    interpretive 'promised,' though the context clearly concerns a promise.
- source_word: אֶל בֵּית יִשְׂרָאֵל וְעַל בֵּית יְהוּדָה
  chosen: to the house of Israel and the house of Judah
  alternatives:
  - concerning the house of Israel and the house of Judah
  - to the house of Israel and concerning the house of Judah
  lexicon: HALOT
  rationale: The prepositions differ in Hebrew (אֶל ... וְעַל), but in this formulaic
    context both together indicate the recipients/objects of the divine word. Rendering
    both with 'to' in smooth English avoids awkwardness while preserving the parallel
    reference to both kingdoms. 'House' is retained rather than paraphrased as 'people'
    to preserve the covenantal-national idiom.
