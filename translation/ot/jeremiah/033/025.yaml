id: JER.33.25
reference: Jeremiah 33:25
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה אִם לֹ֥א בְרִיתִ֖/י יוֹמָ֣ם וָ/לָ֑יְלָה חֻקּ֛וֹת שָׁמַ֥יִם
    וָ/אָ֖רֶץ לֹא שָֽׂמְתִּי־־׃
translation:
  text: 'Thus says the LORD: If I have not established my covenant with day and night,
    the fixed order of heaven and earth—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the statutes/ordinances of heaven and earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - So says the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. יְהוָה is rendered 'the LORD' per
    doctrine for the divine name.
- source_word: אִם לֹא
  chosen: If ... not
  alternatives:
  - If not
  - Unless
  lexicon: HALOT
  rationale: In this oath-like construction, אִם לֹא introduces a conditional protasis.
    'If ... not' preserves the Hebrew form and the rhetorical force of the statement
    without over-paraphrasing.
- source_word: בְרִיתִי
  chosen: my covenant
  alternatives:
  - my covenantal order
  - my pact
  lexicon: HALOT
  rationale: בְּרִית normally means 'covenant.' Here it refers to God's established
    ordering of day and night, but 'covenant' should be retained because the surrounding
    context in Jeremiah plays on covenant language.
- source_word: יוֹמָם וָלָיְלָה
  chosen: with day and night
  alternatives:
  - for day and night
  - day and night
  lexicon: HALOT
  rationale: The phrase identifies the parties/sphere of the covenantal arrangement.
    'With day and night' is idiomatic in English and preserves the relational sense
    implied by the Hebrew construction.
- source_word: חֻקּוֹת
  chosen: the fixed order
  alternatives:
  - the statutes
  - the ordinances
  - the decrees
  lexicon: HALOT
  rationale: חֻקּוֹת can mean statutes or fixed ordinances. In this cosmological context,
    'the fixed order' communicates the established regularity of creation more naturally
    than legal-sounding 'statutes,' while remaining faithful to the Hebrew idea of
    prescribed order.
- source_word: שָׁמַיִם וָאָרֶץ
  chosen: of heaven and earth
  alternatives:
  - for heaven and earth
  - of the heavens and the earth
  lexicon: HALOT
  rationale: A standard merism for the cosmos. Singular 'heaven' is idiomatic English
    here.
- source_word: לֹא שַׂמְתִּי
  chosen: I have not established
  alternatives:
  - I did not set
  - I have not appointed
  - I have not ordained
  lexicon: HALOT
  rationale: שׂוּם literally means 'set/place,' but in context refers to instituting
    the cosmic order. 'Established' conveys the sense clearly in modern English while
    staying close to the source.
