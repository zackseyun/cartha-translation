theological_decisions:
- issue: Messianic force of 'Branch'
  chosen_reading: Treat צֶמַח as a messianic royal title and capitalize it as 'Branch.'
  alternative_readings:
  - Read as a non-titular 'branch/shoot' and leave lowercase
  rationale: In Jeremiah, especially in close parallel with 23:5, צמח functions as
    a Davidic royal figure promised by God. Capitalization in English signals probable
    titular force without adding content beyond the text.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #5'
- issue: Temporal sequencing of וְעָשָׂה
  chosen_reading: 'Render with future sense: ''he will carry out.'''
  alternative_readings:
  - Formal past-like 'and he did/has done'
  rationale: Prophetic discourse often uses forms that continue a future promise.
    English future best reflects the sense in context and avoids misleading tense
    implications.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
