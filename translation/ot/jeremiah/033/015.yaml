id: JER.33.15
reference: Jeremiah 33:15
source:
  edition: WLC
  text: בַּ/יָּמִ֤ים הָ/הֵם֙ וּ/בָ/עֵ֣ת הַ/הִ֔יא אַצְמִ֥יחַ לְ/דָוִ֖ד צֶ֣מַח צְדָקָ֑ה
    וְ/עָשָׂ֛ה מִשְׁפָּ֥ט וּ/צְדָקָ֖ה בָּ/אָֽרֶץ׃
translation:
  text: In those days and at that time I will cause a righteous Branch to sprout for
    David, and he will carry out justice and righteousness in the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''a Branch of righteousness''; also possible: ''a just Branch.'''
    reason: lexical_alternative
  - marker: b
    text: '''Branch'' likely echoes the promised Davidic ruler in Jeremiah 23:5.'
    reason: cross_reference
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם
  chosen: In those days
  alternatives:
  - In those days then
  lexicon: HALOT
  rationale: Standard temporal formula; 'in' reflects the prefixed ב and 'those' reflects
    the demonstrative.
- source_word: וּבָעֵת הַהִיא
  chosen: and at that time
  alternatives:
  - even at that time
  - and in that time
  lexicon: HALOT
  rationale: Keeps the paired temporal expression without collapsing it; 'at that
    time' is idiomatic English for בָעֵת הַהִיא.
- source_word: אַצְמִיחַ
  chosen: I will cause ... to sprout
  alternatives:
  - I will make ... grow
  - I will raise up
  lexicon: HALOT
  rationale: Hiphil of צמח is causative; 'cause to sprout' preserves the agricultural
    imagery better than the more interpretive 'raise up.'
- source_word: לְדָוִד
  chosen: for David
  alternatives:
  - for the house of David
  - to David
  lexicon: HALOT
  rationale: The preposition ל is most naturally rendered 'for' here, indicating benefit
    or relation to Davidic lineage/promise without expanding the text to 'house of
    David.'
- source_word: צֶמַח
  chosen: Branch
  alternatives:
  - shoot
  - sprout
  lexicon: HALOT
  rationale: Capitalized 'Branch' preserves the likely titular/messianic force in
    Jeremiah while remaining a direct lexical rendering of the plant metaphor.
- source_word: צְדָקָה
  chosen: righteous
  alternatives:
  - just
  - of righteousness
  lexicon: HALOT
  rationale: As an attributive genitive-like construction with צמח, 'righteous Branch'
    is the most natural English rendering and preserves the moral/theological sense
    of צדקה.
- source_word: וְעָשָׂה
  chosen: and he will carry out
  alternatives:
  - and he will do
  - and he will practice
  lexicon: HALOT
  rationale: Though formally a qatal, in this prophetic context it continues the future
    sense after 'I will cause...'; 'carry out' is idiomatic with the following abstract
    nouns.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In this royal/governing context, 'justice' better communicates the exercise
    of right rule than the narrower English 'judgment.'
- source_word: וּצְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: Rendered 'righteousness' to preserve the common biblical pairing 'justice
    and righteousness' and to distinguish it from מִשְׁפָּט. This also aligns with
    the project's default for cognate δικαιοσύνη as 'righteousness' where applicable.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the earth
  - in the הארץ/land
  lexicon: HALOT
  rationale: '''Land'' is preferable to ''earth'' in Jeremiah''s covenantal-national
    setting, likely referring to the land of Judah/Israel rather than the whole world.'
