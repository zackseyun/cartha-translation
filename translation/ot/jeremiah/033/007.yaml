theological_decisions:
- issue: Scope of שְׁבוּת in a restoration oracle
  chosen_reading: restore the fortunes
  alternative_readings:
  - restore the captivity
  - bring back the captives
  rationale: The verse promises comprehensive national restoration, not merely geographic
    repatriation. Rendering the idiom as 'restore the fortunes' preserves that breadth
    while allowing the exile motif to remain in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
