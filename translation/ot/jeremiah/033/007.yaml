id: JER.33.7
reference: Jeremiah 33:7
source:
  edition: WLC
  text: וַ/הֲשִֽׁבֹתִי֙ אֶת שְׁב֣וּת יְהוּדָ֔ה וְ/אֵ֖ת שְׁב֣וּת יִשְׂרָאֵ֑ל וּ/בְנִתִ֖י/ם
    כְּ/בָ/רִֽאשֹׁנָֽה־׃
translation:
  text: And I will restore the fortunes of Judah and the fortunes of Israel, and I
    will rebuild them as at the first.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'restore the captivity' or 'bring back the captives'
      of Judah and Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲשִׁבֹתִי
  chosen: I will restore
  alternatives:
  - I will bring back
  - I will return
  lexicon: HALOT
  rationale: Hiphil of שוב here has a causative sense, 'cause to return/restore.'
    In this idiom with שְׁבוּת, English 'restore' best captures the sense of reversing
    a state of loss or exile without awkward literalism.
- source_word: שְׁבוּת
  chosen: fortunes
  alternatives:
  - captivity
  - those taken captive
  lexicon: HALOT
  rationale: In the idiom הֵשִׁיב שְׁבוּת, the phrase often means 'restore fortunes'
    broadly, not only a literal return from captivity. Given the paired promise of
    rebuilding, 'fortunes' preserves the wider restoration sense. The more literal
    alternative 'captivity' is worth preserving in a footnote because the exile context
    remains present.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Standard transliteration of the tribal/national name.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Standard transliteration of the national name; in this context paired
    with Judah to indicate the full people.
- source_word: וּבְנִתִים
  chosen: and I will rebuild them
  alternatives:
  - and I will build them
  - and I will build them up
  lexicon: HALOT
  rationale: בנה means 'build' or 'rebuild.' Because the context is restoration after
    devastation, 'rebuild' makes the restorative force explicit in natural English.
    The object suffix is plural ('them'), referring to Judah and Israel collectively.
- source_word: כְּבָרִאשֹׁנָה
  chosen: as at the first
  alternatives:
  - as formerly
  - as before
  lexicon: HALOT
  rationale: The phrase points to an earlier, original condition. 'As at the first'
    is a clear, moderately formal rendering that preserves the comparative force without
    sounding archaic in context.
