theological_decisions:
- issue: Imagery of restoration in shepherding/counting language
  chosen_reading: Retain the concrete pastoral image of flocks passing under the hands of the one who counts them.
  alternative_readings:
  - Interpret more dynamically as flocks being carefully tended or recounted
  rationale: The verse depicts tangible restoration of normal pastoral life in Judah. Preserving the counting imagery avoids importing a more interpretive theological sense while still allowing readers to perceive covenant-restoration overtones from context.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
