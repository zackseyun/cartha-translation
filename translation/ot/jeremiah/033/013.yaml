id: JER.33.13
reference: Jeremiah 33:13
source:
  edition: WLC
  text: בְּ/עָרֵ֨י הָ/הָ֜ר בְּ/עָרֵ֤י הַ/שְּׁפֵלָה֙ וּ/בְ/עָרֵ֣י הַ/נֶּ֔גֶב וּ/בְ/אֶ֧רֶץ בִּנְיָמִ֛ן וּ/בִ/סְבִיבֵ֥י יְרוּשָׁלִַ֖ם וּ/בְ/עָרֵ֣י יְהוּדָ֑ה עֹ֣ד תַּעֲבֹ֧רְנָה הַ/צֹּ֛אן עַל יְדֵ֥י מוֹנֶ֖ה אָמַ֥ר יְהוָֽה־׃ס
translation:
  text: In the cities of the hill country, in the cities of the lowland, and in the cities of the Negeb, and in the land of Benjamin, and around Jerusalem, and in the cities of Judah, the flocks will again pass under the hands of the one who counts them, says Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Shephelah,' the Judean foothill region.
    reason: lexical_alternative
  - marker: b
    text: Or 'the South'; Hebrew 'the Negeb,' a southern region of Judah.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew literally says 'under the hands of the one who counts,' preserving the image of a shepherd counting livestock as they pass by.
    reason: cultural_note
lexical_decisions:
- source_word: בְּעָרֵי הָהָר
  chosen: in the cities of the hill country
  alternatives:
  - in the towns of the mountain region
  - in the cities of the mountains
  lexicon: HALOT
  rationale: עָרִים can be rendered 'cities' or 'towns'; 'cities' is retained for consistency with common prophetic geographic formulas. הָהָר here denotes the hill country/highlands region rather than a single mountain.
- source_word: הַשְּׁפֵלָה
  chosen: the lowland
  alternatives:
  - the Shephelah
  - the foothills
  lexicon: HALOT
  rationale: Refers to the Judean lowland region. 'Lowland' is a clear modern-English rendering; the transliterated regional term 'Shephelah' is possible but less immediately accessible.
- source_word: הַנֶּגֶב
  chosen: the Negeb
  alternatives:
  - the South
  - the southern region
  lexicon: HALOT
  rationale: As a recognized geographic region, 'Negeb' is preferable to the more generic 'South,' preserving the place-name force while remaining standard in English Bible translation.
- source_word: אֶרֶץ בִּנְיָמִן
  chosen: the land of Benjamin
  alternatives:
  - the territory of Benjamin
  lexicon: HALOT
  rationale: אֶרֶץ here denotes territorial land associated with the tribe of Benjamin. 'Land' is straightforward and preserves the Hebrew wording.
- source_word: סְבִיבֵי יְרוּשָׁלִַם
  chosen: around Jerusalem
  alternatives:
  - the environs of Jerusalem
  - the areas surrounding Jerusalem
  lexicon: HALOT
  rationale: The phrase denotes the surrounding districts. 'Around Jerusalem' is natural English and sufficiently precise.
- source_word: עָרֵי יְהוּדָה
  chosen: the cities of Judah
  alternatives:
  - the towns of Judah
  lexicon: HALOT
  rationale: Standard geographic expression; 'cities' retained for consistency with the repeated עָרֵי phrases in the verse.
- source_word: עֹד
  chosen: again
  alternatives:
  - still
  - yet once more
  lexicon: HALOT
  rationale: 'In this restoration context, עֹד signals renewed future occurrence: the activity will happen again after interruption.'
- source_word: תַּעֲבֹרְנָה הַצֹּאן
  chosen: the flocks will again pass
  alternatives:
  - the sheep will again pass
  - the flock will again pass
  lexicon: HALOT
  rationale: צֹאן is a collective for small livestock, often sheep/goats. 'Flocks' best conveys the collective plural sense in English, matching the feminine plural verb.
- source_word: עַל יְדֵי
  chosen: under the hands of
  alternatives:
  - by the hands of
  - before the hands of
  lexicon: HALOT
  rationale: The idiom evokes animals passing under a shepherd's hand/staff for counting or inspection. 'Under the hands of' preserves the concrete imagery better than a flattened paraphrase.
- source_word: מוֹנֶה
  chosen: the one who counts them
  alternatives:
  - the counter
  - the one numbering them
  - the one who counts
  lexicon: HALOT
  rationale: מוֹנֶה is a participle meaning one who counts/numbers. 'The one who counts them' makes the participial sense explicit and clarifies the implied object from context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
