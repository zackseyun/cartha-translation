theological_decisions:
- issue: Interpretation of the proverb's bird image
  chosen_reading: The image describes a bird possessing or brooding over young/eggs
    that are not truly its own, illustrating ill-gotten wealth that does not remain.
  alternative_readings:
  - The bird steals eggs and broods them unsuccessfully
  - The bird gathers chicks it did not hatch
  rationale: 'The exact zoological background is uncertain, but the proverb''s point
    is clear: illegitimate possession is temporary. The translation preserves the
    image without forcing a disputed natural-history claim into the main text.'
