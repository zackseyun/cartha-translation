id: JER.17.11
reference: Jeremiah 17:11
source:
  edition: WLC
  text: קֹרֵ֤א דָגַר֙ וְ/לֹ֣א יָלָ֔ד עֹ֥שֶׂה עֹ֖שֶׁר וְ/לֹ֣א בְ/מִשְׁפָּ֑ט בַּ/חֲצִ֤י
    ימ/ו יַעַזְבֶ֔/נּוּ וּ/בְ/אַחֲרִית֖/וֹ יִהְיֶ֥ה נָבָֽל׃
translation:
  text: 'Like a partridge that gathers a brood it did not hatch, so is one who makes
    wealth unjustly: in the middle of his days it will leave him, and in his end he
    will be a fool.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Like a partridge that sits on eggs it did not lay.' The exact bird behavior
      behind the proverb is uncertain, but the sense is that what is not rightfully
      one's own will not remain.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹרֵא
  chosen: partridge
  alternatives:
  - caller
  - sandgrouse
  lexicon: HALOT
  rationale: In this verse קֹרֵא is traditionally understood as the bird name 'partridge,'
    not the common noun/participle from 'to call.' The pairing with nesting/hatching
    language strongly supports the zoological sense.
- source_word: דָגַר
  chosen: gathers a brood
  alternatives:
  - sits on eggs
  - broods over
  lexicon: HALOT
  rationale: The verb refers to avian brooding/gathering young. 'Gathers a brood'
    fits the proverb's image and works with the following clause about not hatching
    them. It avoids overcommitting to a specific biological action while preserving
    the bird metaphor.
- source_word: וְלֹא יָלָד
  chosen: it did not hatch
  alternatives:
  - but did not give birth to
  - but did not bear
  lexicon: HALOT
  rationale: For a bird image, idiomatic English prefers 'hatch' rather than the more
    literal 'give birth/bear.' This is an optimal-equivalence adjustment preserving
    the sense in natural English.
- source_word: עֹשֶׂה עֹשֶׁר
  chosen: one who makes wealth
  alternatives:
  - one who gets riches
  - one who acquires wealth
  lexicon: HALOT
  rationale: The Hebrew is literally 'making wealth/riches.' 'Makes wealth' preserves
    the active nuance without sounding overly wooden.
- source_word: וְלֹא בְמִשְׁפָּט
  chosen: unjustly
  alternatives:
  - not by justice
  - not rightly
  - without justice
  lexicon: HALOT
  rationale: מִשְׁפָּט here denotes what is just/right. 'Unjustly' gives the adverbial
    force in clear English while preserving the ethical/judicial sense.
- source_word: בַּחֲצִי יָמָיו
  chosen: in the middle of his days
  alternatives:
  - in midlife
  - halfway through his days
  lexicon: HALOT
  rationale: This phrase means before a full lifespan is completed. 'In the middle
    of his days' is close to the Hebrew and readable.
- source_word: יַעַזְבֶנּוּ
  chosen: it will leave him
  alternatives:
  - they will leave him
  - he will leave it
  lexicon: HALOT
  rationale: 'The singular verb with singular pronominal suffix most naturally takes
    ''wealth'' as the subject: the unjustly gained wealth will depart from the man.
    This best fits the proverb''s logic.'
- source_word: וּבְאַחֲרִיתוֹ
  chosen: in his end
  alternatives:
  - at his end
  - in the end
  lexicon: HALOT
  rationale: The suffix is personal ('his end'), not merely abstract 'the end.' The
    chosen rendering preserves that personal reference.
- source_word: נָבָל
  chosen: a fool
  alternatives:
  - senseless
  - base person
  - worthless fool
  lexicon: HALOT
  rationale: נָבָל in wisdom and poetic contexts denotes a morally and spiritually
    foolish person, not merely someone unintelligent. 'A fool' is the most idiomatic
    concise rendering.
