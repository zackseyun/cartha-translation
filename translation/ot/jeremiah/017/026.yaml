id: JER.17.26
reference: Jeremiah 17:26
source:
  edition: WLC
  text: וּ/בָ֣אוּ מֵ/עָרֵֽי יְ֠הוּדָה וּ/מִ/סְּבִיב֨וֹת יְרוּשָׁלִַ֜ם וּ/מֵ/אֶ֣רֶץ בִּנְיָמִ֗ן וּ/מִן הַ/שְּׁפֵלָ֤ה וּ/מִן הָ/הָר֙ וּ/מִן הַ/נֶּ֔גֶב מְבִאִ֛ים עוֹלָ֥ה וְ/זֶ֖בַח וּ/מִנְחָ֣ה וּ/לְבוֹנָ֑ה וּ/מְבִאֵ֥י תוֹדָ֖ה בֵּ֥ית יְהוָֽה־־־־׃
translation:
  text: And they will come from the cities of Judah and from the areas around Jerusalem, and from the land of Benjamin, and from the lowland, and from the hill country, and from the Negeb, bringing burnt offerings and sacrifices, grain offerings and frankincense, and bringing thank offerings to the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Shephelah,' the Judean foothill region.
    reason: lexical_alternative
  - marker: b
    text: Or 'the south'; 'Negeb' is the name of the southern region of Judah.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'house of the LORD,' that is, the temple.
    reason: cultural_note
lexical_decisions:
- source_word: וּבָאוּ
  chosen: And they will come
  alternatives:
  - And they shall come
  - Then they will come
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this prophetic conditional context is naturally rendered as future in English. 'And' preserves the Hebrew coordination with the preceding promise.
- source_word: מֵעָרֵי יְהוּדָה
  chosen: from the cities of Judah
  alternatives:
  - out of the towns of Judah
  lexicon: HALOT
  rationale: עָרִים commonly means cities/towns; 'cities of Judah' is a standard and clear rendering for the regional source.
- source_word: וּמִסְּבִיבוֹת יְרוּשָׁלַם
  chosen: from the areas around Jerusalem
  alternatives:
  - from the environs of Jerusalem
  - from around Jerusalem
  lexicon: HALOT
  rationale: סְבִיבוֹת denotes surrounding regions/areas. 'Areas around Jerusalem' is readable modern English while preserving the geographic sense.
- source_word: וּמֵאֶרֶץ בִּנְיָמִן
  chosen: from the land of Benjamin
  alternatives:
  - from the territory of Benjamin
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the territorial region associated with Benjamin, not the whole earth/land in a broad sense. 'Land of Benjamin' is idiomatic and sufficiently precise.
- source_word: הַשְּׁפֵלָה
  chosen: the lowland
  alternatives:
  - the Shephelah
  - the foothills
  lexicon: HALOT
  rationale: The term denotes the Judean lowland region. 'The lowland' translates the meaning directly; 'Shephelah' is a useful transliteration but less transparent in the main text.
- source_word: הָהָר
  chosen: the hill country
  alternatives:
  - the mountains
  - the hill region
  lexicon: HALOT
  rationale: Though literally 'the mountain,' in regional lists this refers to the hill country of Judah. 'Hill country' best communicates the geographic designation in natural English.
- source_word: הַנֶּגֶב
  chosen: the Negeb
  alternatives:
  - the south
  - the southern region
  lexicon: HALOT
  rationale: As a recognized geographic region, נֶגֶב is best transliterated as 'Negeb' rather than flattened to 'south,' which would lose the toponymic force.
- source_word: מְבִאִים
  chosen: bringing
  alternatives:
  - who bring
  lexicon: HALOT
  rationale: The participle describes the manner/action accompanying their coming. 'Bringing' smoothly links the procession with the offerings listed.
- source_word: עוֹלָה
  chosen: burnt offerings
  alternatives:
  - a burnt offering
  lexicon: HALOT
  rationale: Though singular in Hebrew, it functions collectively in an offering list. English plural fits the distributive sense of many worshipers bringing such offerings.
- source_word: זֶבַח
  chosen: sacrifices
  alternatives:
  - sacrifice
  lexicon: HALOT
  rationale: Like עוֹלָה, the singular is collective in context. 'Sacrifices' communicates the category of slaughter offerings brought by many people.
- source_word: מִנְחָה
  chosen: grain offerings
  alternatives:
  - offering
  - tribute offering
  lexicon: HALOT
  rationale: In cultic lists מִנְחָה commonly denotes the cereal/grain offering. 'Grain offerings' is more specific than the generic 'offering' and fits temple-sacrifice context.
- source_word: לְבוֹנָה
  chosen: frankincense
  alternatives:
  - incense
  lexicon: HALOT
  rationale: לְבוֹנָה specifically refers to frankincense, not incense in general. The more precise term should be retained.
- source_word: וּמְבִאֵי תוֹדָה
  chosen: and bringing thank offerings
  alternatives:
  - and those bringing thanksgiving
  - and bringing offerings of thanksgiving
  lexicon: HALOT
  rationale: The construct phrase literally refers to bringers of thanksgiving/thank offering. In sacrificial context, 'thank offerings' best captures the cultic sense of תודה.
- source_word: בֵּית יְהוָה
  chosen: to the house of the LORD
  alternatives:
  - to the temple of the LORD
  lexicon: HALOT
  rationale: בֵּית יְהוָה is literally 'house of YHWH.' Following doctrine, יְהוָה is rendered 'the LORD.' 'House' preserves the Hebrew expression, while readers can infer temple reference.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
