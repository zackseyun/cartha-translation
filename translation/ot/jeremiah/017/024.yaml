id: JER.17.24
reference: Jeremiah 17:24
source:
  edition: WLC
  text: וְ֠/הָיָה אִם שָׁמֹ֨עַ תִּשְׁמְע֤וּ/ן אֵלַ/י֙ נְאֻם יְהוָ֔ה לְ/בִלְתִּ֣י הָבִ֣יא
    מַשָּׂ֗א בְּ/שַׁעֲרֵ֛י הָ/עִ֥יר הַ/זֹּ֖את בְּ/י֣וֹם הַ/שַּׁבָּ֑ת וּ/לְ/קַדֵּשׁ֙
    אֶת י֣וֹם הַ/שַּׁבָּ֔ת לְ/בִלְתִּ֥י עֲשֽׂוֹת ב/ה כָּל מְלָאכָֽה־־׀־־־׃
translation:
  text: And it shall be, if you truly listen to me, declares the LORD, by not bringing
    a load through the gates of this city on the Sabbath day, and by keeping the Sabbath
    day holy, by not doing any work on it,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if you diligently obey me.' The Hebrew idiom literally repeats 'listen'
      for emphasis and can carry the sense of obedient hearing.
    reason: lexical_alternative
  - marker: b
    text: Or 'a burden.' The Hebrew term can mean a carried load; here it refers to
      loads brought through the city gates on the Sabbath.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it shall be
  alternatives:
  - And it will happen
  - Then it shall come to pass
  lexicon: HALOT
  rationale: Introduces the conditional consequence with a conventional future formula.
    'And it shall be' preserves the Hebrew discourse marker without sounding overly
    archaic.
- source_word: אִם שָׁמֹעַ תִּשְׁמְעוּן
  chosen: if you truly listen
  alternatives:
  - if you diligently listen
  - if you indeed obey
  - if you surely listen
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verb. 'Truly listen'
    preserves the emphasis while keeping the auditory/obediential sense of שׁמע without
    over-specifying it as 'obey' in the main text.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - to me/obey me
  lexicon: HALOT
  rationale: Direct object of listening; retained literally as 'to me' rather than
    folding into 'obey me,' since the Hebrew explicitly says 'listen to me.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' is idiomatic and weighty without
    being wooden.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md
    contested terms table.
- source_word: לְבִלְתִּי הָבִיא
  chosen: by not bringing
  alternatives:
  - so as not to bring
  - not bringing
  lexicon: HALOT
  rationale: The construction expresses the content of the required obedience. 'By
    not bringing' fits the English syntax of the conditional statement and links naturally
    with the following parallel infinitives.
- source_word: מַשָּׂא
  chosen: a load
  alternatives:
  - a burden
  - merchandise
  lexicon: HALOT
  rationale: In this Sabbath context the term refers to a carried load or burden associated
    with commerce/transport. 'Load' is natural modern English and avoids possible
    metaphorical confusion of 'burden.'
- source_word: בְּשַׁעֲרֵי הָעִיר הַזֹּאת
  chosen: through the gates of this city
  alternatives:
  - into the gates of this city
  - at the gates of this city
  lexicon: HALOT
  rationale: The preposition with 'gates' in context concerns transport through the
    city gates. 'Through' best conveys movement of loads via the gates.
- source_word: בְּיוֹם הַשַּׁבָּת
  chosen: on the Sabbath day
  alternatives:
  - on the day of Sabbath
  - on the Sabbath
  lexicon: HALOT
  rationale: Natural English rendering of the temporal phrase while preserving the
    explicit 'day' present in Hebrew.
- source_word: וּלְקַדֵּשׁ
  chosen: and by keeping ... holy
  alternatives:
  - and to sanctify
  - and by consecrating
  lexicon: HALOT
  rationale: קדשׁ here means to treat the Sabbath as holy. 'Keeping ... holy' is idiomatic
    English and preserves the covenantal sense without ecclesiastical jargon.
- source_word: אֶת יוֹם הַשַּׁבָּת
  chosen: the Sabbath day
  alternatives:
  - the Sabbath
  lexicon: HALOT
  rationale: Retains the explicit object and matches the repeated phrase in the Hebrew.
- source_word: לְבִלְתִּי עֲשׂוֹת בּוֹ/בָהּ כָּל מְלָאכָה
  chosen: by not doing any work on it
  alternatives:
  - so as not to do any work on it
  - by doing no work on it
  lexicon: HALOT
  rationale: Expresses the practical meaning of Sabbath sanctification. 'Any work'
    reflects כָּל מְלָאכָה naturally. The pronominal suffix refers to the Sabbath
    day; rendered 'on it.'
