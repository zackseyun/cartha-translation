theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the doctrinal and
    stylistic guidance to preserve reverential convention and broad Christian readability.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether שׁמע should be rendered as 'listen' or 'obey'
  chosen_reading: listen
  alternative_readings:
  - obey
  rationale: The Hebrew verb often carries obediential force, especially in covenant
    contexts, but the text explicitly says 'listen to me.' Rendering it as 'listen'
    preserves the lexical form while allowing the following infinitives to specify
    the obedience required.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
