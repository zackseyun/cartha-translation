id: JER.17.15
reference: Jeremiah 17:15
source:
  edition: WLC
  text: הִנֵּה הֵ֕מָּה אֹמְרִ֖ים אֵלָ֑/י אַיֵּ֥ה דְבַר יְהוָ֖ה יָ֥בוֹא נָֽא־־׃
translation:
  text: Look, they keep saying to me, “Where is the word of the LORD? Let it come
    now!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the message of the LORD.” The Hebrew phrase is the standard prophetic
      expression for a divine word or oracle.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Deictic/interjection drawing attention to the situation. 'Look' preserves
    the force in readable modern English better than the more archaic 'Behold.'
- source_word: הֵמָּה
  chosen: they
  alternatives:
  - these people
  - those people
  lexicon: HALOT
  rationale: Independent 3mp pronoun used for emphasis. English normally does not
    require separate representation beyond 'they,' but the emphasis is carried by
    the clause opening and context.
- source_word: אֹמְרִים
  chosen: keep saying
  alternatives:
  - are saying
  - say
  lexicon: HALOT
  rationale: Qal participle masculine plural conveys ongoing or repeated action in
    context; 'keep saying' captures the iterative/progressive sense more naturally
    than simple present.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - against me
  lexicon: HALOT
  rationale: 'The preposition אֶל with 1cs suffix most straightforwardly means direction
    toward Jeremiah''s speech situation: ''to me.'' Although the tone is hostile,
    ''against me'' would over-interpret the preposition.'
- source_word: אַיֵּה
  chosen: Where is
  alternatives:
  - Where
  lexicon: HALOT
  rationale: Standard interrogative of location/existence. In English idiom with a
    following noun phrase, 'Where is' is the natural rendering.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  - the word from the LORD
  lexicon: HALOT
  rationale: Common prophetic formula. 'The word of the LORD' preserves the established
    prophetic sense of divine utterance/message without flattening it to merely 'message.'
    'the LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: יָבוֹא
  chosen: Let it come
  alternatives:
  - May it come
  - It will come
  lexicon: HALOT
  rationale: 'Qal imperfect 3ms here functions jussively in direct speech, expressing
    a taunting challenge: ''Let it come.'' Rendering it as future (''it will come'')
    misses the mocking demand.'
- source_word: נָא
  chosen: now
  alternatives:
  - please
  - indeed
  lexicon: HALOT
  rationale: Here נָא intensifies the challenge rather than politely requesting; 'now'
    best conveys the impatient, taunting force in context. 'Please' would sound overly
    courteous in English and misrepresent the speakers' tone.
