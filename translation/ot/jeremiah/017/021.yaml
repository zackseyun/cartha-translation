id: JER.17.21
reference: Jeremiah 17:21
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה הִשָּׁמְר֖וּ בְּ/נַפְשֽׁוֹתֵי/כֶ֑ם וְ/אַל תִּשְׂא֤וּ מַשָּׂא֙ בְּ/י֣וֹם הַ/שַּׁבָּ֔ת וַ/הֲבֵאתֶ֖ם בְּ/שַׁעֲרֵ֥י יְרוּשָׁלִָֽם־׃
translation:
  text: 'Thus says Yahweh: Take care for yourselves, and do not carry a load on the Sabbath day or bring it in through the gates of Jerusalem.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Take care for your lives' / 'Take heed to yourselves.' The Hebrew idiom literally involves 'your souls/lives' and expresses careful self-watchfulness.
    reason: lexical_alternative
  - marker: b
    text: Or 'burden' instead of 'load.' Here the sense is likely a physical item being transported on the Sabbath.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' preserves the formal prophetic cadence without unnecessary archaism.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הִשָּׁמְרוּ בְּנַפְשׁוֹתֵיכֶם
  chosen: Guard yourselves
  alternatives:
  - Take care for your lives
  - Take heed to yourselves
  lexicon: HALOT
  rationale: The Niphal imperative of שׁמר with ב + נפשׁ idiomatically means to watch oneself carefully or take care. 'Guard yourselves' is concise, natural English that preserves the reflexive force without over-literalizing 'souls/lives' in a way that could mislead modern readers.
- source_word: וְאַל תִּשְׂאוּ
  chosen: and do not carry
  alternatives:
  - and do not lift
  - and do not bear
  lexicon: HALOT
  rationale: נשא with מַשָּׂא naturally yields 'carry/bear a load.' 'Carry' is the clearest modern English choice in this Sabbath-law context.
- source_word: מַשָּׂא
  chosen: a load
  alternatives:
  - a burden
  lexicon: HALOT
  rationale: In this context of transporting goods on the Sabbath, 'load' is more concrete and contextually precise than the broader 'burden,' which can sound metaphorical in English.
- source_word: בְּיוֹם הַשַּׁבָּת
  chosen: on the Sabbath day
  alternatives:
  - on the day of the Sabbath
  - on the Sabbath
  lexicon: HALOT
  rationale: This rendering is idiomatic and preserves the temporal phrase explicitly. 'Sabbath day' is natural English and keeps the formal weight of the prohibition.
- source_word: וַהֲבֵאתֶם
  chosen: or bring it in
  alternatives:
  - and bring
  - or bring
  lexicon: HALOT
  rationale: Although the Hebrew conjunction is waw, English idiom after a negative prohibition often uses 'or' to coordinate a second prohibited action. 'Bring it in' makes explicit the implied object from 'load' and the directional sense of בוא in context.
- source_word: בְּשַׁעֲרֵי יְרוּשָׁלִָם
  chosen: through the gates of Jerusalem
  alternatives:
  - into the gates of Jerusalem
  - by the gates of Jerusalem
  lexicon: HALOT
  rationale: With the verb 'bring in,' 'through the gates of Jerusalem' best conveys movement into the city via its gates in natural English.
