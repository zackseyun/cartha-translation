id: JER.17.3
reference: Jeremiah 17:3
source:
  edition: WLC
  text: הֲרָרִ/י֙ בַּ/שָּׂדֶ֔ה חֵילְ/ךָ֥ כָל אוֹצְרוֹתֶ֖י/ךָ לָ/בַ֣ז אֶתֵּ֑ן בָּמֹתֶ֕י/ךָ
    בְּ/חַטָּ֖את בְּ/כָל גְּבוּלֶֽי/ךָ־־׃
translation:
  text: My mountain in the field—your wealth, all your treasures, I will give as plunder,
    along with your high places, because of sin throughout all your territory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'O my mountain in the field'; the Hebrew phrase is difficult and may
      refer to Zion/Jerusalem as the LORD's mountain.
    reason: alternative_reading
  - marker: b
    text: '''Your wealth'' could also be rendered ''your strength'' or, less likely
      here, ''your army.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'for sin throughout all your territory' or 'in sin throughout all your
      territory.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲרָרִי
  chosen: My mountain
  alternatives:
  - O my mountain
  - my mountain-land
  lexicon: HALOT
  rationale: The form is best taken as 'my mountain' (har + 1cs suffix). In Jeremiah
    this likely refers to Zion/Jerusalem as the LORD's mountain. I retained the concrete
    image rather than paraphrasing it away. An exclamatory 'O my mountain' is possible
    in some contexts, but here the syntax works better as a direct object/fronted
    element in the judgment oracle.
- source_word: בַּשָּׂדֶה
  chosen: in the field
  alternatives:
  - in the countryside
  - in the open country
  lexicon: HALOT
  rationale: Literally 'in the field.' This may idiomatically indicate the open country/countryside,
    but the more formal rendering preserves the imagery and ambiguity.
- source_word: חֵילְךָ
  chosen: your wealth
  alternatives:
  - your strength
  - your army
  - your resources
  lexicon: HALOT
  rationale: חַיִל can denote strength, wealth, or military force. In parallel with
    'all your treasures' and followed by 'I will give as plunder,' the economic sense
    'wealth' fits best.
- source_word: כָל אוֹצְרוֹתֶיךָ
  chosen: all your treasures
  alternatives:
  - all your storehouses
  - all your treasuries
  lexicon: HALOT
  rationale: The noun can refer either to treasures or storehouses/treasuries. Because
    it is coordinated with 'your wealth' as what will be handed over as spoil, 'treasures'
    is the clearest English rendering.
- source_word: לָבַז
  chosen: as plunder
  alternatives:
  - for spoil
  - for booty
  lexicon: HALOT
  rationale: The phrase אֶתֵּן לָבַז is a standard judgment expression meaning 'I
    will give over as plunder/spoil.' 'Plunder' is natural modern English and preserves
    the force.
- source_word: אֶתֵּן
  chosen: I will give
  alternatives:
  - I give
  - I will hand over
  lexicon: HALOT
  rationale: 'The imperfect in prophetic judgment context is naturally future: ''I
    will give.'' ''Hand over'' is interpretive; ''give'' keeps closer to the Hebrew
    while still clear in context.'
- source_word: בָּמֹתֶיךָ
  chosen: your high places
  alternatives:
  - your cultic high places
  - your shrines on the heights
  lexicon: HALOT
  rationale: בָּמוֹת refers to elevated worship sites, often illicit in prophetic
    critique. 'High places' is the standard concise rendering and preserves the cultic
    connotation without over-paraphrase.
- source_word: בְּחַטָּאת
  chosen: because of sin
  alternatives:
  - in sin
  - with sin
  - for sin
  lexicon: HALOT
  rationale: The preposition ב here is causal or associative in a judgment context.
    'Because of sin' best communicates why the high places and treasures are given
    over. Singular 'sin' works as a collective abstraction.
- source_word: בְּכָל גְּבוּלֶיךָ
  chosen: throughout all your territory
  alternatives:
  - within all your borders
  - in all your territory
  lexicon: HALOT
  rationale: גְּבוּל often means border/territory. In English, 'throughout all your
    territory' communicates the distributive sense of pervasive sin across the whole
    land.
