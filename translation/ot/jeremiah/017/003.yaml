theological_decisions:
- issue: Referent of 'my mountain in the field'
  chosen_reading: A reference to the LORD's mountain/Zion-Jerusalem exposed to judgment
  alternative_readings:
  - A vocative, 'O my mountain in the field'
  - A broader reference to the land's hill-country
  rationale: The phrase is syntactically difficult and debated. Given Jeremiah's Zion
    theology and the possessive 'my,' the most likely sense is the LORD's mountain,
    i.e., Jerusalem/Zion, now subject to judgment. The translation preserves the literal
    phrase rather than resolving the image interpretively in the main text.
