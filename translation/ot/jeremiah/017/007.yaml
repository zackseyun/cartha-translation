id: JER.17.7
reference: Jeremiah 17:7
source:
  edition: WLC
  text: בָּר֣וּךְ הַ/גֶּ֔בֶר אֲשֶׁ֥ר יִבְטַ֖ח בַּֽ/יהוָ֑ה וְ/הָיָ֥ה יְהוָ֖ה מִבְטַחֽ/וֹ׃
translation:
  text: Blessed is the man who trusts in Yahweh, and whose trust is Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Blessed is the man who trusts in Yahweh, and Yahweh is his trust.'' The divine name is rendered ''the LORD'' in the main text by project convention.'
    reason: alternative_reading
  - marker: b
    text: Or 'whose confidence is the LORD.' The Hebrew noun can denote that in which one places confidence.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  chosen: Blessed
  alternatives:
  - Happy
  lexicon: HALOT
  rationale: Passive participial/adjectival form meaning 'blessed.' 'Blessed' preserves the covenantal and theological weight better than the more subjective 'happy.'
- source_word: הַגֶּבֶר
  chosen: the man
  alternatives:
  - the person
  lexicon: HALOT
  rationale: גֶּבֶר is grammatically masculine singular and here functions generically/proverbially. Per doctrine, gender-accurate rendering is preferred over gender-neutral smoothing, so 'the man' is retained.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative particle introducing the defining clause; 'who' is the natural English rendering for a personal antecedent.
- source_word: יִבְטַח
  chosen: trusts
  alternatives:
  - has confidence
  - relies
  lexicon: HALOT
  rationale: Qal imperfect of בטח denotes placing confidence or trust. 'Trusts' is the most direct and idiomatic rendering in this wisdom-like statement.
- source_word: בַּיהוָה
  chosen: in the LORD
  alternatives:
  - in Yahweh
  lexicon: HALOT
  rationale: Preposition ב with YHWH after בטח is naturally rendered 'trust in.' Per doctrine, יְהוָה is rendered 'the LORD' in the main text, with 'Yahweh' preserved as an alternative.
- source_word: וְהָיָה
  chosen: whose ... is
  alternatives:
  - and the LORD will be
  - and the LORD is/becomes
  lexicon: HALOT
  rationale: The clause is verbless in English if rendered smoothly, but Hebrew uses היה with waw-qatal. In this beatitude context, the sense is resultant/state description rather than a sharply future event. Restructuring as 'whose trust is...' best captures the relation in natural English without losing meaning.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Divine name rendered according to project default for יְהוָה.
- source_word: מִבְטַחוֹ
  chosen: his trust
  alternatives:
  - his confidence
  - his refuge
  - the object of his trust
  lexicon: HALOT
  rationale: Noun from בטח with 3ms suffix. In context it denotes that in which he places confidence. 'His trust' preserves the wordplay with יבטח while remaining concise; 'refuge' is possible but less directly tied to the verbal root here.
