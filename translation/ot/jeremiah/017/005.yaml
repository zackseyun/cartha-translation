id: JER.17.5
reference: Jeremiah 17:5
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה אָר֤וּר הַ/גֶּ֨בֶר֙ אֲשֶׁ֣ר יִבְטַ֣ח בָּֽ/אָדָ֔ם וְ/שָׂ֥ם
    בָּשָׂ֖ר זְרֹע֑/וֹ וּ/מִן יְהוָ֖ה יָס֥וּר לִבּֽ/וֹ׀־׃
translation:
  text: 'Thus says the LORD: Cursed is the man who trusts in man and makes flesh his
    strength, whose heart turns away from the LORD.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'makes flesh his arm.' 'Arm' here is an idiom for strength
      or power.
    reason: lexical_alternative
  - marker: b
    text: '''The man'' and ''man'' render Hebrew masculine singular forms used here
      in a representative sense.'
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal
    prophetic cadence, while 'the LORD' follows the project's default rendering for
    יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' reflecting Jewish reverence tradition and the Septuagintal pattern.
- source_word: אָרוּר
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: HALOT
  rationale: '''Cursed'' is the natural English equivalent and preserves the covenantal/judicial
    force without sounding archaic.'
- source_word: הַגֶּבֶר
  chosen: the man
  alternatives:
  - the strong man
  - the person
  lexicon: HALOT
  rationale: גֶּבֶר often denotes a man, sometimes with nuance of strength or vigor.
    Here the representative masculine is best preserved as 'the man' in keeping with
    the project's gender-accurate policy; 'person' would flatten the source's form,
    while 'strong man' would overpress a nuance not required in context.
- source_word: יִבְטַח בָּאָדָם
  chosen: trusts in man
  alternatives:
  - trusts in humankind
  - trusts in a human being
  lexicon: HALOT
  rationale: The phrase contrasts human reliance with reliance on the LORD. 'Man'
    preserves the Hebrew wording and the representative/generic force of אָדָם here.
- source_word: אָדָם
  chosen: man
  alternatives:
  - humankind
  - human being
  lexicon: HALOT
  rationale: Per doctrine table, אָדָם may be rendered 'man' or 'humankind' depending
    on context. Here the singular after בְּ with the relative clause is best represented
    by singular 'man,' matching the proverbial contrast.
- source_word: וְשָׂם בָּשָׂר זְרֹעוֹ
  chosen: and makes flesh his strength
  alternatives:
  - and makes flesh his arm
  - and makes mere flesh his arm
  lexicon: HALOT
  rationale: Literally, 'and sets flesh his arm.' Since 'arm' in Hebrew commonly signifies
    strength or power, 'makes flesh his strength' communicates the idiom in clear
    English. 'Flesh' is retained to preserve the human frailty contrast; 'mere flesh'
    is interpretive and therefore left as an alternative.
- source_word: בָּשָׂר
  chosen: flesh
  alternatives:
  - mere flesh
  - human flesh
  lexicon: HALOT
  rationale: Here בָּשָׂר refers to mortal human frailty, not sinful nature. Retaining
    'flesh' preserves the biblical imagery and allows the contrast with the LORD to
    stand.
- source_word: זְרֹעוֹ
  chosen: his strength
  alternatives:
  - his arm
  lexicon: HALOT
  rationale: Although the literal term is 'arm,' the idiomatic sense is power/strength.
    Rendering it as 'strength' avoids awkward English while preserving meaning.
- source_word: וּמִן יְהוָה יָסוּר לִבּוֹ
  chosen: whose heart turns away from the LORD
  alternatives:
  - and his heart turns away from the LORD
  - while his heart turns aside from the LORD
  lexicon: HALOT
  rationale: The clause explains the inner spiritual reality accompanying misplaced
    trust. English relative wording ('whose heart...') links it smoothly to 'the man'
    while preserving the sense. 'Turns away' is a natural rendering of סוּר in this
    context.
- source_word: לִבּוֹ
  chosen: his heart
  alternatives:
  - his inner self
  - his mind
  lexicon: HALOT
  rationale: '''Heart'' is the standard biblical anthropological term for the inner
    person, including will and allegiance; it should be preserved rather than reduced
    to a narrower modern category.'
