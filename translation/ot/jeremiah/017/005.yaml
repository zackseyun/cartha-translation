theological_decisions:
- issue: Representative masculine language in proverbial warning
  chosen_reading: the man
  alternative_readings:
  - the person
  rationale: The Hebrew uses grammatically masculine singular nouns (גֶּבֶר, אָדָם)
    with generic force. Per translation philosophy, gender-accurate rendering is preferred
    over gender-neutral smoothing unless context demands otherwise.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table
    for אָדָם
- issue: Rendering the idiom זְרֹעוֹ
  chosen_reading: his strength
  alternative_readings:
  - his arm
  rationale: The literal image is 'arm,' but in Hebrew this commonly functions as
    a metaphor for strength or power. The chosen rendering communicates the sense
    in readable modern English without obscuring the contrast between human frailty
    ('flesh') and divine reliance.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
