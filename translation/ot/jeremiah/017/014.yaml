theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD / O LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יְהוָה is 'the LORD,' following the stated doctrine
    and translation policy. Because the verse is a direct address, 'O LORD' is used
    idiomatically in English while still representing the same underlying choice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Scope of 'save me'
  chosen_reading: save me
  alternative_readings:
  - deliver me
  rationale: The Hebrew ישׁע can denote rescue/deliverance broadly. 'Save' is retained
    in the main text because it preserves the lexical connection and theological breadth
    without narrowing the sense to merely temporal deliverance.
