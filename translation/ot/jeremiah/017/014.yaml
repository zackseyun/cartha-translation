id: JER.17.14
reference: Jeremiah 17:14
source:
  edition: WLC
  text: רְפָאֵ֤/נִי יְהוָה֙ וְ/אֵ֣רָפֵ֔א הוֹשִׁיעֵ֖/נִי וְ/אִוָּשֵׁ֑עָה כִּ֥י תְהִלָּתִ֖/י
    אָֽתָּה׃
translation:
  text: Heal me, O LORD, and I will be healed; save me, and I will be saved, for you
    are my praise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deliver me ... and I will be delivered.' The Hebrew verb can denote
      rescue or deliverance as well as salvation in a broader sense.
    reason: lexical_alternative
  - marker: b
    text: Or 'for you are the one I praise.' The Hebrew literally reads 'for you are
      my praise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְפָאֵנִי
  chosen: Heal me
  alternatives:
  - Restore me
  - Cure me
  lexicon: HALOT
  rationale: Imperative of רפא with 1cs suffix. 'Heal me' is the most direct and natural
    rendering, preserving both physical and metaphorical/spiritual resonance without
    over-specifying.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - the LORD
  lexicon: HALOT
  rationale: The divine name YHWH is rendered according to the project's default as
    'the LORD.' In the verse text, 'O LORD' reflects direct address in idiomatic English
    prayer language.
- source_word: וְאֵרָפֵא
  chosen: and I will be healed
  alternatives:
  - that I may be healed
  - and let me be healed
  lexicon: HALOT
  rationale: Niphal imperfect/cohortative-like form following the imperative expresses
    the result/effect of divine action. 'And I will be healed' preserves the straightforward
    consequence without adding interpretive nuance.
- source_word: הוֹשִׁיעֵנִי
  chosen: save me
  alternatives:
  - deliver me
  - give me victory
  lexicon: HALOT
  rationale: Hiphil imperative of ישׁע commonly means 'save' or 'deliver.' 'Save me'
    best preserves the broad theological and existential scope of the Hebrew and matches
    the parallel with 'heal me.'
- source_word: וְאִוָּשֵׁעָה
  chosen: and I will be saved
  alternatives:
  - and I will be delivered
  - that I may be saved
  lexicon: HALOT
  rationale: Niphal imperfect/cohortative-like form corresponding to 'save me.' 'And
    I will be saved' keeps the parallelism and allows both immediate deliverance and
    broader salvific overtones.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the ground for the petition/confession. 'For' is
    concise and fits the poetic-prayer context.
- source_word: תְהִלָּתִי
  chosen: my praise
  alternatives:
  - the one I praise
  - my boast
  - my song of praise
  lexicon: HALOT
  rationale: The noun תְהִלָּה normally means 'praise.' 'My praise' is the most literal
    rendering and preserves the compact Hebrew expression. Alternatives like 'my boast'
    are interpretive and less direct.
- source_word: אָתָּה
  chosen: you are
  alternatives:
  - you alone are
  lexicon: HALOT
  rationale: 'Independent pronoun gives emphasis: ''you.'' English requires a copular
    expression here, so ''you are'' communicates the predication naturally while retaining
    the emphasis in context.'
