theological_decisions:
- issue: Imprecatory petition for judgment
  chosen_reading: Render the verse as Jeremiah's direct prayer for divine judgment
    on his enemies without softening its force.
  alternative_readings:
  - Tone down the imprecation into a general wish for vindication
  rationale: The Hebrew uses direct jussives and imperatives addressed to God. The
    translation should preserve the theological tension of prophetic prayer that seeks
    both personal vindication and divine justice, rather than muting the severity.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
