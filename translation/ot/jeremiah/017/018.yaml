id: JER.17.18
reference: Jeremiah 17:18
source:
  edition: WLC
  text: יֵבֹ֤שׁוּ רֹדְפַ/י֙ וְ/אַל אֵבֹ֣שָׁה אָ֔נִי יֵחַ֣תּוּ הֵ֔מָּה וְ/אַל אֵחַ֖תָּה
    אָ֑נִי הָבִ֤יא עֲלֵי/הֶם֙ י֣וֹם רָעָ֔ה וּ/מִשְׁנֶ֥ה שִׁבָּר֖וֹן שָׁבְרֵֽ/ם־־׃ס
translation:
  text: Let my pursuers be put to shame, but let me not be put to shame; let them
    be dismayed, but let me not be dismayed. Bring upon them a day of disaster, and
    shatter them with double destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my persecutors.' The Hebrew literally means 'those who pursue me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a day of calamity.' The phrase refers to a day of judgment or ruin,
      not moral evil.
    reason: lexical_alternative
  - marker: c
    text: Literally 'break them with a double breaking.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵבֹשׁוּ / אֵבֹשָׁה
  chosen: be put to shame
  alternatives:
  - be ashamed
  - be disgraced
  lexicon: HALOT
  rationale: בושׁ can denote experiencing shame, disgrace, or disappointment. In this
    imprecatory prayer, the passive-like English 'be put to shame' captures the sense
    of being publicly shamed or confounded better than the more inward 'be ashamed,'
    while preserving the parallel with the speaker's plea.
- source_word: רֹדְפַי
  chosen: my pursuers
  alternatives:
  - my persecutors
  - those who pursue me
  lexicon: HALOT
  rationale: From רדף, literally 'to pursue.' 'My pursuers' keeps the concrete verbal
    imagery and avoids importing the more specialized religious nuance of 'persecutors,'
    though that is contextually related.
- source_word: יֵחַתּוּ / אֵחַתָּה
  chosen: be dismayed
  alternatives:
  - be shattered
  - be terrified
  lexicon: HALOT
  rationale: חתת in the Niphal commonly conveys being broken down, dismayed, or terrified.
    Here, in parallel with 'be put to shame,' 'be dismayed' best fits the emotional-collapse
    sense without overphysicalizing the clause.
- source_word: הָבִיא
  chosen: Bring upon them
  alternatives:
  - Bring against them
  - Cause to come upon them
  lexicon: HALOT
  rationale: The Hiphil imperative of בוא with עַל expresses causing something to
    come upon someone. 'Bring upon them' is idiomatic and preserves the direct petition
    to God.
- source_word: יוֹם רָעָה
  chosen: a day of disaster
  alternatives:
  - a day of evil
  - a day of calamity
  lexicon: HALOT
  rationale: רָעָה here refers to calamity or disaster rather than moral evil. 'A
    day of disaster' communicates a day marked by judgment and ruin in natural English.
- source_word: מִשְׁנֶה
  chosen: double
  alternatives:
  - a double portion of
  - twice
  lexicon: HALOT
  rationale: מִשְׁנֶה denotes doubleness or a second/double amount. Here it intensifies
    the following noun, so 'double' is the most concise and natural rendering.
- source_word: שִׁבָּרוֹן
  chosen: destruction
  alternatives:
  - breaking
  - crash
  - ruin
  lexicon: HALOT
  rationale: This noun denotes breaking, fracture, or ruin. In context of divine judgment,
    'destruction' conveys the result in idiomatic English better than the more literal
    but awkward 'breaking.'
- source_word: שָׁבְרֵם
  chosen: shatter them
  alternatives:
  - break them
  - destroy them
  lexicon: HALOT
  rationale: The imperative of שׁבר is literally 'break them.' 'Shatter them' preserves
    the violent metaphor and matches the cognate noun שִׁבָּרוֹן, while sounding more
    forceful and natural in English.
