theological_decisions:
- issue: Whether רָעָה should be rendered with moral language ('evil') or calamity
    language
  chosen_reading: disaster
  alternative_readings:
  - evil
  - calamity
  - trouble
  rationale: In context Jeremiah speaks of a day of distress/judgment from which the
    LORD is his refuge. The term here denotes adverse circumstance, not moral evil.
    Rendering it 'disaster' preserves that distinction and avoids implying that God
    is refuge only in a day of moral evil.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English, not archaic or academic.'
