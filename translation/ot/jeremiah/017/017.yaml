id: JER.17.17
reference: Jeremiah 17:17
source:
  edition: WLC
  text: אַל תִּֽהְיֵה לִ֖/י לִ/מְחִתָּ֑ה מַֽחֲסִ/י אַ֖תָּה בְּ/י֥וֹם רָעָֽה־־־׃
translation:
  text: Do not be a terror to me; you are my refuge in the day of disaster.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a cause of dismay,' 'a ruin,' or 'an object of dread.'
    reason: lexical_alternative
  - marker: b
    text: '''Disaster'' here means calamity or trouble, not moral evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not let yourself be
  - May you not be
  lexicon: HALOT
  rationale: Negative particle used with the following imperfect/jussive-like verb
    to express a plea or prohibition. 'Do not' is natural English and preserves the
    prayerful force.
- source_word: תִּהְיֵה
  chosen: be
  alternatives:
  - become
  lexicon: HALOT
  rationale: 'Qal imperfect of היה, here functioning in a negative petition: ''do
    not be.'' ''Become'' is possible in some contexts, but here the stative sense
    fits best.'
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The preposition ל with first person singular suffix marks relation or
    effect. In English, 'to me' works idiomatically with 'be a terror,' though the
    sense overlaps with 'for me.'
- source_word: לִמְחִתָּה
  chosen: a terror
  alternatives:
  - a ruin
  - a cause of dismay
  - an object of dread
  lexicon: HALOT
  rationale: The noun מְחִתָּה carries the sense of terror, dismay, or shattering
    ruin. In this prayer context, Jeremiah asks that God not become to him a source
    of dread. 'A terror' is concise and idiomatic, while preserving the emotional
    force better than the more abstract 'ruin.'
- source_word: מַחֲסִי
  chosen: my refuge
  alternatives:
  - my shelter
  lexicon: HALOT
  rationale: From מחסה, denoting a place of refuge or shelter. 'My refuge' is the
    standard and most theologically resonant rendering in prayer language.
- source_word: אַתָּה
  chosen: you are
  alternatives:
  - you
  lexicon: HALOT
  rationale: The independent pronoun is emphatic. English normally supplies the copula,
    so 'you are' best conveys the clause naturally while retaining the emphasis of
    direct address.
- source_word: בְּיוֹם
  chosen: in the day of
  alternatives:
  - on the day of
  - in a day of
  lexicon: HALOT
  rationale: The preposition ב with 'day' can be rendered 'in' or 'on.' 'In the day
    of' is a natural biblical-English expression for a time characterized by what
    follows.
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - calamity
  - trouble
  lexicon: HALOT
  rationale: Here רָעָה refers to adversity or calamity rather than moral evil. 'Disaster'
    clearly communicates the sense for modern readers without importing moral ambiguity.
