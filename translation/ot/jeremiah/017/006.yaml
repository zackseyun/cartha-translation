id: JER.17.6
reference: Jeremiah 17:6
source:
  edition: WLC
  text: וְ/הָיָה֙ כְּ/עַרְעָ֣ר בָּֽ/עֲרָבָ֔ה וְ/לֹ֥א יִרְאֶ֖ה כִּי יָב֣וֹא ט֑וֹב וְ/שָׁכַ֤ן
    חֲרֵרִים֙ בַּ/מִּדְבָּ֔ר אֶ֥רֶץ מְלֵחָ֖ה וְ/לֹ֥א תֵשֵֽׁב־׃ס
translation:
  text: He will be like a shrub in the desert, and he will not see when good comes.
    He will dwell in parched places in the wilderness, in a salt land that is not
    inhabited.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a juniper,' 'like a tamarisk,' or 'like a barren bush'; the exact
      plant named by the Hebrew is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will not perceive when prosperity comes.' The Hebrew says literally,
      'he will not see when good comes.'
    reason: lexical_alternative
  - marker: c
    text: Or 'in the Arabah' if taken as the specific geographic region rather than
      desert land generally.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּעַרְעָר
  chosen: like a shrub
  alternatives:
  - like a juniper
  - like a tamarisk
  - like a barren bush
  lexicon: HALOT
  rationale: עַרְעָר names a desert plant/shrub, but the exact species is uncertain.
    'Shrub' preserves the image without overcommitting to a debated botanical identification.
    Alternatives are worth preserving because English versions vary widely.
- source_word: בָּעֲרָבָה
  chosen: in the desert
  alternatives:
  - in the Arabah
  - in the wasteland
  lexicon: HALOT
  rationale: עֲרָבָה can denote the Arabah region specifically or arid steppe/desert
    more generally. In this poetic comparison, the broader environmental sense fits
    best in readable English.
- source_word: וְלֹא יִרְאֶה כִּי יָבוֹא טוֹב
  chosen: and he will not see when good comes
  alternatives:
  - and he will not see that good has come
  - and he will not perceive when prosperity comes
  lexicon: HALOT
  rationale: The clause is idiomatic. 'See when good comes' keeps the Hebrew imagery
    while communicating failure to perceive or benefit from coming good. 'Good' is
    retained rather than narrowed to 'prosperity,' though that nuance is possible
    from context.
- source_word: וְשָׁכַן
  chosen: He will dwell
  alternatives:
  - He will live
  - He will settle
  lexicon: HALOT
  rationale: שׁכן commonly means dwell/live. 'Dwell' fits the prophetic-poetic register
    and pairs naturally with the following locative phrases.
- source_word: חֲרֵרִים
  chosen: in parched places
  alternatives:
  - in scorched places
  - in barren places
  - in the stony wastes
  lexicon: HALOT
  rationale: The noun refers to dry, burned, or barren places. 'Parched places' best
    conveys the arid desolation in natural English without overinterpreting the exact
    terrain.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness/desert land. Since 'desert' already
    renders עֲרָבָה earlier in the verse, 'wilderness' provides stylistic variety
    while preserving the same general semantic field.
- source_word: אֶרֶץ מְלֵחָה
  chosen: in a salt land
  alternatives:
  - in a salty land
  - in a salt-encrusted land
  lexicon: HALOT
  rationale: The phrase denotes land marked by salinity and thus sterility. 'Salt
    land' is concise and vivid in English.
- source_word: וְלֹא תֵשֵׁב
  chosen: that is not inhabited
  alternatives:
  - where no one lives
  - and it is uninhabited
  lexicon: HALOT
  rationale: The feminine singular verb agrees with 'land.' Rendering it as a relative
    clause in English makes the syntax natural while preserving the sense that the
    land is uninhabited.
