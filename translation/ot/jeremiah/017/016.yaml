id: JER.17.16
reference: Jeremiah 17:16
source:
  edition: WLC
  text: וַ/אֲנִ֞י לֹא אַ֣צְתִּי מֵ/רֹעֶ֣ה אַחֲרֶ֗י/ךָ וְ/י֥וֹם אָנ֛וּשׁ לֹ֥א הִתְאַוֵּ֖יתִי
    אַתָּ֣ה יָדָ֑עְתָּ מוֹצָ֣א שְׂפָתַ֔/י נֹ֥כַח פָּנֶ֖י/ךָ הָיָֽה־׀׃
translation:
  text: But as for me, I did not hurry away from being a shepherd after you, and I
    did not desire the day of sickness; you know. What came from my lips was before
    your face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the day of calamity' or 'the woeful day.' The Hebrew expression literally
      refers to a grievous or sick day, likely meaning the day of disaster/judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַצְתִּי
  chosen: did not hurry away
  alternatives:
  - did not press
  - did not hasten
  lexicon: HALOT
  rationale: The verb from אוץ can mean to hurry or press on. In this context with
    מִן + participle ('from being a shepherd') it most naturally conveys not shrinking
    back or hastening away from the prophetic/shepherding role. 'Hurry away' preserves
    the motion implied without overinterpreting.
- source_word: מֵרֹעֶה אַחֲרֶיךָ
  chosen: from being a shepherd after you
  alternatives:
  - from following you as a shepherd
  - from being a shepherd in your train
  lexicon: HALOT
  rationale: רֹעֶה literally means 'shepherd,' often metaphorically for one who guides
    or tends. אַחֲרֶיךָ is literally 'after you,' indicating following the LORD. Retaining
    'shepherd' preserves the metaphor rather than flattening it to 'pastor' or 'leader.'
- source_word: יוֹם אָנושׁ
  chosen: the day of sickness
  alternatives:
  - the day of disaster
  - the day of calamity
  - the woeful day
  lexicon: HALOT
  rationale: אָנושׁ carries the sense of being incurable, grievous, sick, or desperately
    ill, and by extension grievous calamity. Here Jeremiah denies longing for the
    people's day of judgment. 'Day of sickness' keeps the lexical image, though the
    context is calamitous judgment; the alternative is preserved in a footnote because
    English readers may hear the idiom differently.
- source_word: הִתְאַוֵּיתִי
  chosen: did not desire
  alternatives:
  - did not long for
  - did not crave
  lexicon: HALOT
  rationale: The hitpael of אוה expresses desire or longing. 'Did not desire' is straightforward
    modern English and fits the denial that Jeremiah wished for the coming judgment.
- source_word: מוֹצָא שְׂפָתַי
  chosen: what came from my lips
  alternatives:
  - the utterance of my lips
  - the outgoing of my lips
  lexicon: HALOT
  rationale: מוֹצָא is literally 'going out' or 'that which goes out.' Combined with
    'my lips,' it refers to Jeremiah's spoken words. The chosen rendering is idiomatic
    while preserving the concrete imagery.
- source_word: נֹכַח פָּנֶיךָ
  chosen: before your face
  alternatives:
  - before you
  - in your presence
  lexicon: HALOT
  rationale: The phrase is literally 'in front of your face/presence.' 'Before your
    face' preserves the Hebrew vividness; 'before you' would be smoother but less
    transparent.
- source_word: הָיָה
  chosen: was
  alternatives:
  - has been
  lexicon: HALOT
  rationale: The qatal here summarizes the state of Jeremiah's speech before God.
    Simple past 'was' works naturally in English.
- source_word: אַתָּה יָדָעְתָּ
  chosen: you know
  alternatives:
  - you have known
  - you yourself know
  lexicon: HALOT
  rationale: Though formally perfect, in direct address it functions well as a present-state
    assertion. 'You know' is natural English and preserves the appeal to God's knowledge.
