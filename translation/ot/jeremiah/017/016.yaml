theological_decisions:
- issue: Metaphorical force of רֹעֶה in Jeremiah's self-description
  chosen_reading: Retain 'shepherd' as Jeremiah's metaphorical role under God rather
    than interpretively replacing it with 'prophet' or 'pastor.'
  alternative_readings:
  - I did not shrink from following you as a shepherd
  - I did not turn aside from being a prophet after you
  rationale: The Hebrew uses shepherd imagery, likely for Jeremiah's role in guiding/warning
    the people under divine commission. Preserving the metaphor avoids importing a
    narrower office-term not explicit in the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve source imagery unless context demands otherwise.'
