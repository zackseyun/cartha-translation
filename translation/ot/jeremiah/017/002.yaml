theological_decisions:
- issue: Rendering of אֲשֵׁרִים in an idolatry context
  chosen_reading: their Asherim
  alternative_readings:
  - their Asherah poles
  - their sacred poles
  rationale: The Hebrew term can denote cultic objects associated with the goddess
    Asherah, often wooden poles or trees. Because the exact nuance in a given verse
    can be debated, the main text preserves the Hebrew-derived term to avoid importing
    a more specific reconstruction than the text itself requires; an explanatory alternative
    is given in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
