id: JER.17.2
reference: Jeremiah 17:2
source:
  edition: WLC
  text: כִּ/זְכֹּ֤ר בְּנֵי/הֶם֙ מִזְבְּחוֹתָ֔/ם וַ/אֲשֵׁרֵי/הֶ֖ם עַל עֵ֣ץ רַֽעֲנָ֑ן
    עַ֖ל גְּבָע֥וֹת הַ/גְּבֹהֽוֹת־׃
translation:
  text: As their children remember their altars and their Asherim beside every green
    tree, on the high hills,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their Asherah poles' or 'their sacred poles.' The Hebrew term refers
      to cult objects associated with Asherah.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: As
  alternatives:
  - For
  - Indeed
  - When
  lexicon: HALOT
  rationale: Here כִּי introduces an explanatory or circumstantial clause linked to
    the previous verse. 'As' fits the sense of a continuing circumstance ('while/as
    their children remember...') better than a strongly causal 'for' in English, while
    preserving the connection.
- source_word: זְכֹּר
  chosen: remember
  alternatives:
  - think of
  - call to mind
  lexicon: HALOT
  rationale: From זכר, the sense is mental recollection. 'Remember' is the most direct
    and natural rendering. The form functions verbally here with the following subject
    'their children.'
- source_word: בְּנֵיהֶם
  chosen: their children
  alternatives:
  - their sons
  lexicon: HALOT
  rationale: בנים can mean 'sons' specifically or 'children' more generally. In this
    context the reference is to descendants participating in inherited idolatrous
    memory/practice, so 'children' best conveys the representative sense without unnecessary
    narrowing.
- source_word: מִזְבְּחוֹתָם
  chosen: their altars
  lexicon: HALOT
  rationale: מזבחות straightforwardly denotes cultic altars. 'Their altars' preserves
    the possessive and the idolatrous-cult context.
- source_word: וַאֲשֵׁרֵיהֶם
  chosen: their Asherim
  alternatives:
  - their Asherah poles
  - their sacred poles
  lexicon: HALOT
  rationale: אֲשֵׁרִים may refer to cultic objects associated with Asherah. Translating
    as 'Asherim' preserves the Hebrew term's ambiguity between named cult-symbols
    and wooden poles, while avoiding over-interpretation in the main text. An explanatory
    lexical alternative is preserved in a footnote.
- source_word: עַל
  chosen: beside
  alternatives:
  - upon
  - by
  - under/at
  lexicon: HALOT
  rationale: Although עַל often means 'on/upon,' in this cultic-location context with
    trees and hills it can denote proximity/location. 'Beside' gives idiomatic English
    for the placement of altars/Asherim in relation to the trees without forcing a
    physically atop reading.
- source_word: עֵץ רַעֲנָן
  chosen: every green tree
  alternatives:
  - every leafy tree
  - every flourishing tree
  lexicon: HALOT
  rationale: The singular after a preposition is often collective. English idiom in
    this recurring biblical phrase is 'every green tree,' referring to lush trees
    associated with illicit worship sites. 'Green' preserves the established imagery
    and plain sense of רַעֲנָן ('fresh, luxuriant').
- source_word: עַל גְּבָעוֹת הַגְּבֹהוֹת
  chosen: on the high hills
  alternatives:
  - upon the lofty hills
  - on the elevated hills
  lexicon: HALOT
  rationale: This is a standard expression for elevated cult sites. 'On the high hills'
    is natural modern English and preserves the topographical and polemical force
    of the Hebrew.
