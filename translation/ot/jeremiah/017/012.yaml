id: JER.17.12
reference: Jeremiah 17:12
source:
  edition: WLC
  text: כִּסֵּ֣א כָב֔וֹד מָר֖וֹם מֵֽ/רִאשׁ֑וֹן מְק֖וֹם מִקְדָּשֵֽׁ/נוּ׃
translation:
  text: A throne of glory, exalted from the beginning, is the place of our sanctuary.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'A glorious throne on high from the beginning is the place of our sanctuary,'
      or possibly, 'O throne of glory, exalted from the beginning, place of our sanctuary.'
      The Hebrew is highly compressed and allows more than one syntactical construal.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּסֵּא
  chosen: throne
  alternatives:
  - seat
  lexicon: HALOT
  rationale: The noun commonly denotes a royal throne or seat of rule. 'Throne' preserves
    the regal and theological force of the image better than the more generic 'seat'.
- source_word: כָב֔וֹד
  chosen: of glory
  alternatives:
  - glorious
  - honor
  lexicon: HALOT
  rationale: Rendered as the genitival phrase 'of glory' to reflect the Hebrew noun
    construction כִּסֵּא כָבוֹד. This preserves the elevated, doxological sense without
    flattening it into a mere adjective.
- source_word: מָרוֹם
  chosen: exalted
  alternatives:
  - height
  - high
  lexicon: HALOT
  rationale: Although literally related to height or high place, here it functions
    predicatively with the throne image. 'Exalted' communicates both elevation and
    majesty in natural English.
- source_word: מֵרִאשׁוֹן
  chosen: from the beginning
  alternatives:
  - from the first
  - from of old
  lexicon: HALOT
  rationale: The phrase indicates primordial priority or antiquity. 'From the beginning'
    is idiomatic modern English and preserves the temporal force.
- source_word: מְקוֹם
  chosen: place
  alternatives:
  - site
  - dwelling place
  lexicon: HALOT
  rationale: The basic sense is 'place.' While 'dwelling place' is interpretively
    possible in context, the Hebrew here simply says 'place,' so the more direct rendering
    is preferred.
- source_word: מִקְדָּשֵׁנוּ
  chosen: our sanctuary
  alternatives:
  - our holy place
  - our holy sanctuary
  lexicon: HALOT
  rationale: The noun refers to a holy place/sanctuary. 'Our sanctuary' is concise,
    natural, and preserves the cultic sense. The 1cp suffix is represented by 'our'.
