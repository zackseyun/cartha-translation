theological_decisions:
- issue: Syntactical relation of the verbless clauses
  chosen_reading: The verse is rendered as a nominal statement identifying the glorious,
    exalted throne with 'the place of our sanctuary.'
  alternative_readings:
  - A throne of glory, exalted from the beginning—our sanctuary is its place.
  - O throne of glory on high from the beginning, place of our sanctuary.
  rationale: The Hebrew is compressed and verbless, allowing multiple construals.
    The chosen reading follows a common understanding that the verse identifies the
    true sanctuary with God's glorious throne, fitting the immediate context and preserving
    the elevated theological imagery without over-paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it
