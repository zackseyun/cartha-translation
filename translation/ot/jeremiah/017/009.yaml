theological_decisions:
- issue: Anthropological force of 'heart'
  chosen_reading: Retain 'heart' as the seat of the inner person rather than narrowing
    it to emotions alone.
  alternative_readings:
  - the mind
  - the inner self
  rationale: The verse speaks of the core of human interiority in Hebrew thought.
    Keeping 'heart' preserves biblical anthropology and avoids reducing the term to
    modern emotional usage, while the surrounding wording clarifies its moral and
    cognitive scope.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of אָנֻשׁ
  chosen_reading: Translate as severe inner sickness rather than explicit moral category
    'wicked.'
  alternative_readings:
  - desperately wicked
  - incurable
  rationale: The Hebrew image is pathological before it is abstractly moral. 'Desperately
    sick' preserves the metaphorical tension of moral corruption described as disease,
    rather than resolving it into a flatter doctrinal label.
  doctrine_reference: Translation philosophy §3
