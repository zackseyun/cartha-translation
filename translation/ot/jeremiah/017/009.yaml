id: JER.17.9
reference: Jeremiah 17:9
source:
  edition: WLC
  text: עָקֹ֥ב הַ/לֵּ֛ב מִ/כֹּ֖ל וְ/אָנֻ֣שׁ ה֑וּא מִ֖י יֵדָעֶֽ/נּוּ׃
translation:
  text: The heart is more deceitful than anything else, and desperately sick—who can
    know it?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The heart is deceitful above all things.'
    reason: lexical_alternative
  - marker: b
    text: Or 'incurable.' The Hebrew term describes something grievously sick or beyond
      remedy.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'heart' refers to the inner person, including thought, will, and
      desire, not merely emotions.
    reason: cultural_note
lexical_decisions:
- source_word: עָקֹב
  chosen: deceitful
  alternatives:
  - crooked
  - devious
  - insidious
  lexicon: HALOT
  rationale: The adjective from עקב conveys deceitfulness/crookedness rather than
    mere complexity. 'Deceitful' best fits the moral sense in context and is idiomatic
    in English.
- source_word: הַלֵּב
  chosen: the heart
  alternatives:
  - the mind
  - the inner self
  lexicon: HALOT
  rationale: In Hebrew anthropology לֵב refers to the inner person, including thought
    and will, but 'heart' is the standard and theologically resonant English rendering.
    The broader sense is carried by context rather than replacing the term.
- source_word: מִכֹּל
  chosen: more deceitful than anything else
  alternatives:
  - above all things
  - beyond everything
  lexicon: HALOT
  rationale: The comparative use of מן with כֹּל is naturally rendered in English
    as 'more ... than anything else.' This avoids the traditional but less transparent
    'above all things' while preserving the superlative force.
- source_word: וְאָנֻשׁ
  chosen: desperately sick
  alternatives:
  - incurable
  - desperately wicked
  - very sick
  lexicon: HALOT
  rationale: אָנֻשׁ commonly denotes being sick, weak, or incurable. 'Desperately
    sick' preserves the metaphor of severe inner corruption without importing 'wicked,'
    which is interpretive rather than lexical here. 'Incurable' is possible, but 'desperately
    sick' is more natural and keeps the emotive force.
- source_word: הוּא
  chosen: and desperately sick
  alternatives:
  - it is desperately sick
  - and it is desperately sick
  lexicon: HALOT
  rationale: The pronoun is represented in natural English without requiring a separate
    explicit 'it' after the subject 'the heart.' The predication is fully preserved.
- source_word: מִי
  chosen: who
  alternatives:
  - who is it that
  lexicon: HALOT
  rationale: Simple interrogative 'who' best matches the Hebrew and keeps the rhetorical
    force concise.
- source_word: יֵדָעֶנּוּ
  chosen: can know it
  alternatives:
  - can understand it
  - can discern it
  lexicon: HALOT
  rationale: ידע fundamentally means 'know.' 'Understand' is a plausible contextual
    expansion, but 'know' is closer to the Hebrew and still communicates the rhetorical
    question about penetrating the heart's true condition.
