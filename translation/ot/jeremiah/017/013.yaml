id: JER.17.13
reference: Jeremiah 17:13
source:
  edition: WLC
  text: מִקְוֵ֤ה יִשְׂרָאֵל֙ יְהוָ֔ה כָּל עֹזְבֶ֖י/ךָ יֵבֹ֑שׁוּ יסור/י בָּ/אָ֣רֶץ יִכָּתֵ֔בוּ כִּ֥י עָזְב֛וּ מְק֥וֹר מַֽיִם חַיִּ֖ים אֶת יְהוָֽה־־־׃ס
translation:
  text: O Yahweh, the hope of Israel, all who forsake you will be put to shame; those who turn away from you will be written in the earth, because they have forsaken Yahweh, the fountain of living waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who turn away from you.' The Hebrew here is textually difficult; the main text follows the Masoretic first-person reading.
    reason: textual_variant
  - marker: b
    text: Or 'written in the land.' The phrase may suggest a fleeting inscription in the soil, in contrast to enduring remembrance.
    reason: lexical_alternative
  - marker: c
    text: '''Living water'' refers to fresh, flowing water from a spring, not stagnant water.'
    reason: cultural_note
lexical_decisions:
- source_word: מִקְוֵה
  chosen: hope
  alternatives:
  - gathering
  - reservoir
  - object of hope
  lexicon: HALOT
  rationale: In this context with 'Israel' and as a title for YHWH, the noun is best taken in the figurative sense 'hope' or 'object of hope,' not its concrete sense related to a gathering/place of water. 'Hope of Israel' is idiomatic and fits the vocative opening.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֹזְבֶיךָ
  chosen: those who forsake you
  alternatives:
  - those who abandon you
  - your forsakers
  lexicon: HALOT
  rationale: The participial form denotes ongoing or characteristic action. 'Those who forsake you' is natural English and preserves the covenantal force of עזב.
- source_word: יֵבֹשׁוּ
  chosen: will be put to shame
  alternatives:
  - will be ashamed
  - will be disgraced
  lexicon: HALOT
  rationale: The verb often carries the sense of being shamed or disappointed. 'Will be put to shame' captures the resultative force in judgment context better than the weaker 'will be ashamed.'
- source_word: יסורי
  chosen: those who turn away from me
  alternatives:
  - my apostates
  - those departing from me
  - those who turn aside from me
  lexicon: HALOT
  rationale: The ketiv/qere issue yields an expression commonly understood as 'those who turn away from me.' This reading fits the parallel with 'those who forsake you' and the first-person perspective of the prophet speaking on behalf of God or as recipient of rejection. The more literal but awkward 'my turners-away' is not idiomatic English.
- source_word: בארץ
  chosen: in the earth
  alternatives:
  - in the land
  - on the ground
  - in the dust
  lexicon: HALOT
  rationale: The image is of names inscribed in the earth as transient and doomed to vanish, contrasting with enduring remembrance. 'In the earth' preserves the metaphor more directly than 'in the land,' which could sound geopolitical.
- source_word: יִכָּתֵבוּ
  chosen: will be written
  alternatives:
  - will be recorded
  - will be inscribed
  lexicon: HALOT
  rationale: The Niphal is straightforwardly passive. 'Will be written' keeps the metaphor transparent; the location phrase supplies the ominous nuance.
- source_word: מְקוֹר מַיִם חַיִּים
  chosen: the fountain of living water
  alternatives:
  - the spring of living water
  - the source of living waters
  lexicon: HALOT
  rationale: מָקוֹר denotes a spring/fountain/source. 'Fountain of living water' is established, vivid English and preserves the metaphor of YHWH as the life-giving source. Singular 'water' is idiomatic in English though Hebrew is formally plural.
- source_word: חַיִּים
  chosen: living
  alternatives:
  - fresh
  - flowing
  lexicon: HALOT
  rationale: The adjective literally means 'living' and in water imagery refers to fresh, flowing water. The literal rendering should be retained in the main text because of its theological resonance and intertextual significance.
