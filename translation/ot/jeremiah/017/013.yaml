theological_decisions:
- issue: Speaker reference in 'those who turn away from me'
  chosen_reading: Retain first-person 'from me' in the main text
  alternative_readings:
  - those who turn away from you
  rationale: The consonantal text/marginal tradition is difficult, but the MT-supported first-person reading is preserved. It may reflect Jeremiah speaking as God's representative or YHWH speaking directly. The translation preserves the textual tension rather than harmonizing it to the preceding second person.
  doctrine_reference: Preserve theological tension rather than resolve it.
