id: JER.17.27
reference: Jeremiah 17:27
source:
  edition: WLC
  text: וְ/אִם לֹ֨א תִשְׁמְע֜וּ אֵלַ֗/י לְ/קַדֵּשׁ֙ אֶת י֣וֹם הַ/שַּׁבָּ֔ת וּ/לְ/בִלְתִּ֣י
    שְׂאֵ֣ת מַשָּׂ֗א וּ/בֹ֛א בְּ/שַׁעֲרֵ֥י יְרוּשָׁלִַ֖ם בְּ/י֣וֹם הַ/שַּׁבָּ֑ת וְ/הִצַּ֧תִּי
    אֵ֣שׁ בִּ/שְׁעָרֶ֗י/הָ וְ/אָֽכְלָ֛ה אַרְמְנ֥וֹת יְרוּשָׁלִַ֖ם וְ/לֹ֥א תִכְבֶּֽה־־׀׃פ
translation:
  text: But if you do not listen to me, to keep the Sabbath day holy, and not to carry
    a load and bring it in through the gates of Jerusalem on the Sabbath day, then
    I will kindle a fire in its gates, and it will consume the palaces of Jerusalem,
    and it will not be quenched.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'carry a burden.' The Hebrew expression literally refers to lifting or
      bearing a load.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in her gates'; the city Jerusalem is grammatically feminine.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׁמְעוּ אֵלַי
  chosen: listen to me
  alternatives:
  - obey me
  - hear me
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means to listen/heed. 'Listen to me' preserves
    the auditory idiom while allowing the implied obedience to remain contextually
    present without over-interpreting.
- source_word: לְקַדֵּשׁ אֶת יוֹם הַשַּׁבָּת
  chosen: to keep the Sabbath day holy
  alternatives:
  - to sanctify the Sabbath day
  - to treat the Sabbath day as holy
  lexicon: HALOT
  rationale: קדשׁ in the piel means to set apart as holy. 'Keep ... holy' is idiomatic
    modern English and fits the infinitive of purpose after 'listen to me,' while
    preserving the holiness emphasis.
- source_word: וּלְבִלְתִּי שְׂאֵת מַשָּׂא
  chosen: and not to carry a load
  alternatives:
  - and not to bear a burden
  - and not to carry a burden
  lexicon: HALOT
  rationale: נשא + מַשָּׂא literally means 'lift/carry a burden/load.' 'Load' avoids
    repetitive use of 'burden' in English while still conveying transported goods
    in the Sabbath context.
- source_word: וּבֹא בְּשַׁעֲרֵי יְרוּשָׁלִַם
  chosen: and bring it in through the gates of Jerusalem
  alternatives:
  - and enter the gates of Jerusalem with it
  - and bring a load through the gates of Jerusalem
  lexicon: HALOT
  rationale: The infinitive בוא coordinates with carrying the load; the implied object
    is the load just mentioned. Supplying 'it' in English makes the syntax natural
    and preserves the sense of bringing merchandise into the city.
- source_word: וְהִצַּתִּי אֵשׁ
  chosen: then I will kindle a fire
  alternatives:
  - and I will set fire
  - and I will ignite a fire
  lexicon: HALOT
  rationale: יצת in the hiphil means to kindle/set on fire. 'Then' brings out the
    consequence implied by the conditional structure.
- source_word: בִּשְׁעָרֶיהָ
  chosen: in its gates
  alternatives:
  - in her gates
  lexicon: HALOT
  rationale: Jerusalem is grammatically feminine in Hebrew, but English commonly refers
    to a city as 'its.' This avoids archaic personification while retaining the locative
    sense.
- source_word: וְאָכְלָה אַרְמְנוֹת יְרוּשָׁלִַם
  chosen: and it will consume the palaces of Jerusalem
  alternatives:
  - and it will devour the citadels of Jerusalem
  - and it will consume the strongholds of Jerusalem
  lexicon: HALOT
  rationale: The feminine verb refers back to 'fire.' אַרְמְנוֹת can denote palaces/fortified
    residences. 'Palaces' is the most straightforward rendering in this judgment oracle.
- source_word: וְלֹא תִכְבֶּה
  chosen: and it will not be quenched
  alternatives:
  - and it will not go out
  - and no one will quench it
  lexicon: HALOT
  rationale: כבה in the qal means be quenched/go out. The passive-style English 'will
    not be quenched' best matches the Hebrew and preserves the solemn prophetic formula.
