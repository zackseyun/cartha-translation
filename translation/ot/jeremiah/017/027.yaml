theological_decisions:
- issue: Rendering of Sabbath terminology
  chosen_reading: Sabbath day
  alternative_readings:
  - the Sabbath
  rationale: The Hebrew explicitly includes 'day' (יוֹם). Retaining 'Sabbath day'
    reflects the source text more fully without adding doctrinal interpretation.
  doctrine_reference: Translation philosophy §1, §5
- issue: Conditional judgment structure
  chosen_reading: Explicit consequence with 'then I will kindle a fire'
  alternative_readings:
  - Simple coordination 'and I will kindle a fire'
  rationale: The Hebrew uses waw + conditional sequence. Adding 'then' in English
    clarifies the apodosis without changing meaning, fitting optimal equivalence.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
