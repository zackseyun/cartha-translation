id: JER.17.10
reference: Jeremiah 17:10
source:
  edition: WLC
  text: אֲנִ֧י יְהוָ֛ה חֹקֵ֥ר לֵ֖ב בֹּחֵ֣ן כְּלָי֑וֹת וְ/לָ/תֵ֤ת לְ/אִישׁ֙ כ/דרכ/ו כִּ/פְרִ֖י מַעֲלָלָֽי/ו׃ס
translation:
  text: I, Yahweh, search the heart, testing the kidneys, to give to each man according to his way, according to the fruit of his deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'kidneys,' an idiom for the innermost thoughts and affections.
    reason: cultural_note
  - marker: b
    text: Or 'to each person'; Hebrew 'to each man' uses a masculine singular form with representative force.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: חֹקֵר
  chosen: search
  alternatives:
  - examine
  - probe
  lexicon: HALOT
  rationale: The participle conveys ongoing, penetrating investigation. 'Search' is idiomatic in English and preserves the metaphor of inward scrutiny.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: '''Heart'' is the standard biblical anthropological term for the inner person, including thought and will; it should be preserved rather than flattened to a modern psychological term.'
- source_word: בֹּחֵן
  chosen: testing
  alternatives:
  - examining
  - proving
  lexicon: HALOT
  rationale: Paired with 'search,' this participle emphasizes evaluative examination. 'Testing' gives a natural English parallel while retaining the sense of assessment.
- source_word: כְּלָיוֹת
  chosen: kidneys
  alternatives:
  - reins
  - innermost being
  - mind
  lexicon: HALOT
  rationale: The Hebrew literally refers to the kidneys, an ancient idiom for the deepest inner life or affections. To maintain transparency to the source, the literal term is kept in the main text rather than replaced with an interpretive gloss.
- source_word: וְלָתֵת
  chosen: to give
  alternatives:
  - and to give
  - so as to give
  lexicon: HALOT
  rationale: The infinitive expresses purpose/result connected to the LORD's searching and testing. 'To give' is sufficiently literal and readable in English.
- source_word: לְאִישׁ
  chosen: to each man
  alternatives:
  - to each person
  - to a man
  lexicon: HALOT
  rationale: The singular noun is grammatically masculine with representative force. Per the gender-accurate policy, 'man' is retained rather than neutralized, while 'each' clarifies distributive sense.
- source_word: כִּדְרָכוֹ
  chosen: according to his way
  alternatives:
  - according to his ways
  - according to his conduct
  lexicon: HALOT
  rationale: The singular with suffix is best rendered literally as 'his way,' a common Hebrew expression for one's course of life or conduct.
- source_word: כִּפְרִי
  chosen: according to the fruit of
  alternatives:
  - according to
  - in keeping with the fruit of
  lexicon: HALOT
  rationale: The metaphor 'fruit' is important and should be preserved, since it expresses deeds as the produce or outcome of one's life.
- source_word: מַעֲלָלָיו
  chosen: his deeds
  alternatives:
  - his actions
  - his practices
  lexicon: HALOT
  rationale: The noun denotes acts or doings, often with moral weight. 'Deeds' is concise, natural, and preserves evaluative force.
