theological_decisions:
- issue: Anthropological idiom in divine judgment
  chosen_reading: Retain the concrete body-part language 'heart' and 'kidneys' rather than interpret both abstractly.
  alternative_readings:
  - '''heart'' and ''mind'''
  - '''inner self'' and ''affections'''
  rationale: The verse depicts the LORD's exhaustive knowledge of the human inner life using Hebrew anthropological imagery. Preserving the imagery avoids importing a modern psychology and keeps the text auditable to the Hebrew, while a footnote can clarify the idiom.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable modern English without flattening theological weight.'
- issue: Gender rendering of לְאִישׁ
  chosen_reading: Use 'each man' in the main text.
  alternative_readings:
  - each person
  - everyone
  rationale: The source is grammatically masculine singular with representative force. DOCTRINE.md directs gender-accurate rather than gender-neutral rendering, with annotation where inclusivity is contextually relevant.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
