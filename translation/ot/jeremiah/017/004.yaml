theological_decisions:
- issue: Shift from second person singular to second person plural in the accusation
  chosen_reading: Retain singular address in the first clauses and plural in 'you
    have kindled' without smoothing the shift away.
  alternative_readings:
  - Regularize to singular throughout
  - Interpret the plural as an impersonal or scribal irregularity
  rationale: The Hebrew text intentionally shifts from singular ('you' as Judah/personified
    nation) to plural ('you all' as the people collectively). Preserving the shift
    maintains the prophetic rhetoric and avoids importing a harmonization not demanded
    by the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of עַד עוֹלָם in judgment language
  chosen_reading: Render as 'forever' in the main text.
  alternative_readings:
  - for a long age
  - continually
  rationale: The phrase most naturally conveys enduring, open-ended judgment language
    here. 'Forever' is the clearest English equivalent, while the lexical elasticity
    of עוֹלָם is noted in the lexical decision rather than softened in the main text.
