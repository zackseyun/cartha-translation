id: JER.17.4
reference: Jeremiah 17:4
source:
  edition: WLC
  text: וְ/שָׁמַטְתָּ֗ה וּ/בְ/ךָ֙ מִ/נַּחֲלָֽתְ/ךָ֙ אֲשֶׁ֣ר נָתַ֣תִּי לָ֔/ךְ וְ/הַעֲבַדְתִּ֨י/ךָ֙
    אֶת אֹ֣יְבֶ֔י/ךָ בָּ/אָ֖רֶץ אֲשֶׁ֣ר לֹֽא יָדָ֑עְתָּ כִּֽי אֵ֛שׁ קְדַחְתֶּ֥ם בְּ/אַפִּ֖/י
    עַד עוֹלָ֥ם תּוּקָֽד־־־־׃ס
translation:
  text: And you yourself will let go of your inheritance that I gave you, and I will
    make you serve your enemies in a land that you have not known; for you have kindled
    a fire in my anger—it will burn forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will release/let drop your inheritance'; the Hebrew verb carries
      the image of letting go or relinquishing.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shifts from singular ('you') to plural ('you all') in 'you have
      kindled,' likely moving from Judah personified to the people collectively.
    reason: alternative_reading
  - marker: c
    text: Or 'in my wrath.' Literally, 'in my nose/nostril,' a Hebrew idiom for anger.
    reason: lexical_alternative
  - marker: d
    text: Or 'for an age' / 'perpetually'; the Hebrew עוֹלָם can denote enduring or
      indefinite duration depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁמַטְתָּה
  chosen: you yourself will let go
  alternatives:
  - you will release
  - you will lose hold of
  - you will drop
  lexicon: HALOT
  rationale: שׁמט has the sense of letting drop, release, or let go. In this judgment
    context, the idea is that Judah will forfeit or be made to relinquish the inheritance.
    'Let go' preserves the concrete verbal image without over-paraphrasing to 'lose'
    alone. 'You yourself' reflects the emphatic form and keeps the direct address.
- source_word: וּבְךָ
  chosen: you yourself
  alternatives:
  - by yourself
  - through yourself
  lexicon: HALOT
  rationale: The phrase is difficult and idiomatic. Here it most naturally adds emphasis
    to the second-person address rather than introducing instrumentality. Rendering
    it as 'you yourself' preserves the stress without forcing an awkward literalism.
- source_word: מִנַּחֲלָתְךָ
  chosen: of your inheritance
  alternatives:
  - from your inheritance
  - your heritage
  - your allotted possession
  lexicon: HALOT
  rationale: נחלה commonly denotes inheritance or hereditary possession, especially
    the land given by God. 'Inheritance' best preserves both the covenantal and territorial
    sense.
- source_word: אֲשֶׁר נָתַתִּי לָךְ
  chosen: that I gave you
  alternatives:
  - which I assigned to you
  - that I granted you
  lexicon: HALOT
  rationale: A straightforward relative clause. 'Gave' is simple, natural, and faithful
    to נתן.
- source_word: וְהַעֲבַדְתִּיךָ
  chosen: I will make you serve
  alternatives:
  - I will enslave you to serve
  - I will cause you to work for
  lexicon: HALOT
  rationale: 'The Hiphil of עבד is causative: ''cause to serve.'' ''Make you serve''
    is the clearest English equivalent and fits the exile/judgment context.'
- source_word: אֶת אֹיְבֶיךָ
  chosen: your enemies
  alternatives:
  - the enemies of yours
  lexicon: HALOT
  rationale: 'Direct object of the causative verb: Judah will be made to serve its
    enemies.'
- source_word: בָּאָרֶץ אֲשֶׁר לֹא יָדָעְתָּ
  chosen: in a land that you have not known
  alternatives:
  - in a land you do not know
  - in a land unfamiliar to you
  lexicon: HALOT
  rationale: ידע here means experiential knowledge/familiarity. The perfect in English
    is natural and preserves the sense of an unknown foreign land.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the coming judgment. 'For' fits the prophetic
    style and links the sentence smoothly.
- source_word: אֵשׁ קְדַחְתֶּם
  chosen: you have kindled a fire
  alternatives:
  - you have ignited a fire
  - a fire has been kindled by you
  lexicon: HALOT
  rationale: קדח means kindle/burn. The second person plural shifts from singular
    address to plural accusation, likely broadening from the individual addressee
    to the people. 'You have kindled a fire' preserves the metaphor and the plural
    subject.
- source_word: בְּאַפִּי
  chosen: in my anger
  alternatives:
  - in my nostril
  - in my wrath
  lexicon: HALOT
  rationale: אַף literally refers to nose/nostril but idiomatically means anger/wrath.
    'In my anger' is idiomatic modern English and preserves the anthropopathic expression's
    force.
- source_word: עַד עוֹלָם
  chosen: forever
  alternatives:
  - for an age
  - perpetually
  - for ever
  lexicon: HALOT
  rationale: עוֹלָם can denote an indefinite or enduring duration. In prophetic judgment
    language, 'forever' is the most natural English rendering, while recognizing that
    the term can be contextually elastic.
- source_word: תּוּקָד
  chosen: it will burn
  alternatives:
  - it will be kindled
  - it will keep burning
  lexicon: HALOT
  rationale: Passive/imperfect from יקד, referring back to the fire. 'It will burn'
    is idiomatic and captures the continuing result of the kindled fire.
