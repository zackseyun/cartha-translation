id: JER.17.23
reference: Jeremiah 17:23
source:
  edition: WLC
  text: וְ/לֹ֣א שָֽׁמְע֔וּ וְ/לֹ֥א הִטּ֖וּ אֶת אָזְנָ֑/ם וַ/יַּקְשׁוּ֙ אֶת עָרְפָּ֔/ם
    לְ/בִלְתִּ֣י שומע וּ/לְ/בִלְתִּ֖י קַ֥חַת מוּסָֽר־־׃
translation:
  text: But they did not listen, and they did not incline their ear, but stiffened
    their neck, so as not to hear and not to accept discipline.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not hear.' The Hebrew verb can mean hear, listen, or obey depending
      on context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'stiffened their neck,' an idiom for stubborn resistance.
    reason: cultural_note
  - marker: c
    text: Or 'receive instruction' or 'take correction' for 'accept discipline.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְעוּ
  chosen: did not listen
  alternatives:
  - did not hear
  - did not obey
  lexicon: HALOT
  rationale: שׁמע can denote hearing, listening, or obeying depending on context.
    Here, paired with 'did not incline their ear' and followed by refusal to accept
    discipline, 'listen' best captures attentive hearing with implied responsiveness
    without overtranslating to full obedience.
- source_word: הִטּוּ אֶת אָזְנָם
  chosen: did not incline their ear
  alternatives:
  - did not bend their ear
  - did not pay attention
  lexicon: HALOT
  rationale: The idiom literally means to turn or incline the ear in order to listen
    attentively. 'Incline their ear' preserves the Hebrew image while remaining understandable
    in English.
- source_word: וַיַּקְשׁוּ אֶת עָרְפָּם
  chosen: but stiffened their neck
  alternatives:
  - made their neck stiff
  - hardened their neck
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for stubbornness and resistance. 'Stiffened
    their neck' preserves the metaphor and matches established biblical usage without
    becoming archaic.
- source_word: לְבִלְתִּי שֹׁמֵעַ
  chosen: so as not to hear
  alternatives:
  - so as not to listen
  - in order not to hear
  lexicon: HALOT
  rationale: לבלתי expresses purpose or result, here tied to their stiffening their
    neck. 'So as not to hear' is concise and reflects the infinitival force. Although
    English could repeat 'listen,' varying with 'hear' avoids awkward repetition while
    preserving sense.
- source_word: וּלְבִלְתִּי קַחַת מוּסָר
  chosen: and not to accept discipline
  alternatives:
  - and not to receive instruction
  - and not to take correction
  lexicon: HALOT
  rationale: מוּסָר can mean discipline, correction, or instruction, often with moral-formative
    force. 'Accept discipline' communicates receiving corrective instruction and fits
    Jeremiah's covenantal rebuke context better than the flatter 'instruction' alone.
- source_word: מוּסָר
  chosen: discipline
  alternatives:
  - instruction
  - correction
  lexicon: HALOT
  rationale: The term includes both corrective and pedagogical dimensions. 'Discipline'
    best preserves the weight of covenant correction in prophetic literature.
