theological_decisions:
- issue: Rendering of obstinacy idiom
  chosen_reading: Preserved the bodily metaphor 'stiffened their neck' rather than
    replacing it with an interpretive gloss like 'became stubborn.'
  alternative_readings:
  - became stubborn
  - were obstinate
  rationale: The Hebrew idiom is transparent enough in English and carries prophetic-theological
    resonance of covenant rebellion. Preserving the metaphor maintains intertextual
    continuity without obscuring meaning.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Force of שׁמע in prophetic rebuke
  chosen_reading: Rendered as 'listen' in the first clause and 'hear' in the purpose
    clause.
  alternative_readings:
  - hear ... hear
  - obey ... obey
  rationale: This preserves the semantic range of שׁמע without importing a stronger
    doctrinal claim of explicit obedience where the immediate wording emphasizes refusal
    to attend and receive correction. The variation is stylistic but documented for
    consistency.
  doctrine_reference: Translation philosophy §§1, 5
