id: JER.17.8
reference: Jeremiah 17:8
source:
  edition: WLC
  text: וְ/הָיָ֞ה כְּ/עֵ֣ץ שָׁת֣וּל עַל מַ֗יִם וְ/עַל יוּבַל֙ יְשַׁלַּ֣ח שָֽׁרָשָׁ֔י/ו
    וְ/לֹ֤א ירא כִּֽי יָבֹ֣א חֹ֔ם וְ/הָיָ֥ה עָלֵ֖/הוּ רַֽעֲנָ֑ן וּ/בִ/שְׁנַ֤ת בַּצֹּ֨רֶת֙
    לֹ֣א יִדְאָ֔ג וְ/לֹ֥א יָמִ֖ישׁ מֵ/עֲשׂ֥וֹת פֶּֽרִי׀־־־׃
translation:
  text: He will be like a tree planted by water, that sends out its roots by a stream;
    it does not fear when heat comes, and its leaf remains green. In a year of drought
    it is not anxious, and it does not cease from bearing fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by a watercourse' or 'by a canal' for 'by a stream.'
    reason: lexical_alternative
  - marker: b
    text: Or 'its leaf is fresh/luxuriant'; the Hebrew adjective includes the sense
      of freshness as well as greenness.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּעֵץ
  chosen: like a tree
  alternatives:
  - as a tree
  lexicon: HALOT
  rationale: Standard comparative כְּ with עֵץ. 'Like a tree' is idiomatic modern
    English and preserves the simile.
- source_word: שָׁתוּל
  chosen: planted
  alternatives:
  - transplanted
  - set
  lexicon: HALOT
  rationale: Passive participle describing a deliberately placed tree. 'Planted' is
    the natural English equivalent and fits the imagery of intentional establishment.
- source_word: עַל מַיִם
  chosen: by water
  alternatives:
  - upon waters
  - beside waters
  lexicon: HALOT
  rationale: Though עַל is literally 'on/upon,' in this spatial context English 'by'
    best conveys proximity to a water source without awkwardness.
- source_word: יוּבַל
  chosen: a stream
  alternatives:
  - a watercourse
  - a canal
  - a brook
  lexicon: HALOT
  rationale: יוּבַל denotes a channel or flowing watercourse. 'Stream' is readable
    modern English; 'canal' may sound overly artificial, though the Hebrew can include
    a channel.
- source_word: יְשַׁלַּח שָׁרָשָׁיו
  chosen: sends out its roots
  alternatives:
  - stretches out its roots
  - lets its roots go out
  lexicon: HALOT
  rationale: The Piel of שׁלח with 'roots' gives the sense of extending outward. 'Sends
    out its roots' is vivid and close to the Hebrew image.
- source_word: לֹא יִרָא
  chosen: it does not fear
  alternatives:
  - it is not afraid
  lexicon: HALOT
  rationale: Keeps the personified tree imagery and preserves the lexical force of
    ירא. 'Does not fear' is slightly more formal and matches the Hebrew verb directly.
- source_word: כִּי יָבֹא חֹם
  chosen: when heat comes
  alternatives:
  - when heat arrives
  - for heat comes
  lexicon: HALOT
  rationale: כִּי here is temporal in context. 'When heat comes' is concise and natural.
- source_word: עָלֵהוּ רַעֲנָן
  chosen: its leaf remains green
  alternatives:
  - its leaf is luxuriant
  - its foliage is fresh
  - its leaf is green
  lexicon: HALOT
  rationale: רַעֲנָן conveys freshness, luxuriance, and greenness. 'Remains green'
    brings out the continuing state in context after the arrival of heat.
- source_word: וּבִשְׁנַת בַּצֹּרֶת
  chosen: In a year of drought
  alternatives:
  - In the year of drought
  - during a year of drought
  lexicon: HALOT
  rationale: The construct phrase is naturally rendered in English without over-literalness.
    The indefinite 'a year of drought' works proverbially in the simile.
- source_word: לֹא יִדְאָג
  chosen: it is not anxious
  alternatives:
  - it does not worry
  - it is not concerned
  lexicon: HALOT
  rationale: דאג denotes anxious concern. 'Is not anxious' preserves the emotional
    nuance and pairs well with the prior 'does not fear.'
- source_word: לֹא יָמִישׁ מֵעֲשׂוֹת פֶּרִי
  chosen: it does not cease from bearing fruit
  alternatives:
  - it does not turn aside from producing fruit
  - it never stops yielding fruit
  lexicon: HALOT
  rationale: מוּשׁ with מן + infinitive conveys not departing from or ceasing an activity.
    'Does not cease from bearing fruit' is faithful and idiomatic, avoiding an overinterpretive
    'never stops' while preserving durative force.
