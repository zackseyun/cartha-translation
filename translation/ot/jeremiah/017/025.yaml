id: JER.17.25
reference: Jeremiah 17:25
source:
  edition: WLC
  text: וּ/בָ֣אוּ בְ/שַׁעֲרֵ֣י הָ/עִ֣יר הַ/זֹּ֡את מְלָכִ֣ים וְ/שָׂרִ֡ים יֹשְׁבִים֩
    עַל כִּסֵּ֨א דָוִ֜ד רֹכְבִ֣ים בָּ/רֶ֣כֶב וּ/בַ/סּוּסִ֗ים הֵ֚מָּה וְ/שָׂ֣רֵי/הֶ֔ם
    אִ֥ישׁ יְהוּדָ֖ה וְ/יֹשְׁבֵ֣י יְרוּשָׁלִָ֑ם וְ/יָשְׁבָ֥ה הָֽ/עִיר הַ/זֹּ֖את לְ/עוֹלָֽם׀־׀־׃
translation:
  text: then kings and officials will enter through the gates of this city, sitting
    on the throne of David, riding in chariots and on horses—they and their officials,
    the men of Judah and the inhabitants of Jerusalem—and this city will be inhabited
    forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people of Judah.' The Hebrew is literally 'man of Judah,' used collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאוּ
  chosen: then ... will enter
  alternatives:
  - and they will come
  - and they will enter
  lexicon: HALOT
  rationale: The prefixed conjunction continues the conditional consequence from the
    previous verse; in English, 'then' makes the apodosis explicit and natural. 'Enter'
    fits the following phrase 'through the gates' better than the broader 'come'.
- source_word: בְּשַׁעֲרֵי הָעִיר הַזֹּאת
  chosen: through the gates of this city
  alternatives:
  - into the gates of this city
  - at the gates of this city
  lexicon: HALOT
  rationale: With בוא plus ב, the sense is movement through/into the city gates. 'Through
    the gates' is idiomatic English and preserves the image of formal entry.
- source_word: מְלָכִים וְשָׂרִים
  chosen: kings and officials
  alternatives:
  - kings and princes
  - kings and rulers
  lexicon: HALOT
  rationale: שָׂרִים denotes leaders/officials/court officers. 'Officials' is broad
    and readable modern English without implying hereditary nobility as strongly as
    'princes'.
- source_word: יֹשְׁבִים עַל כִּסֵּא דָוִד
  chosen: sitting on the throne of David
  alternatives:
  - who sit on David's throne
  - enthroned on the throne of David
  lexicon: HALOT
  rationale: The participle describes the kings' royal status. 'Sitting on the throne
    of David' preserves the Hebrew imagery and dynastic reference.
- source_word: רֹכְבִים בָּרֶכֶב וּבַסּוּסִים
  chosen: riding in chariots and on horses
  alternatives:
  - riding in the chariot and on the horses
  - riding in chariots and horses
  lexicon: HALOT
  rationale: Hebrew uses singular collective 'chariot' and plural 'horses'; idiomatic
    English pluralizes 'chariots.' 'In chariots and on horses' reflects the distinct
    prepositions implied by English usage.
- source_word: הֵמָּה וְשָׂרֵיהֶם
  chosen: they and their officials
  alternatives:
  - they and their princes
  - they and their leaders
  lexicon: HALOT
  rationale: The pronoun is emphatic/resumptive, gathering the royal party before
    adding their attendants. Repeating 'officials' maintains consistency for שרים.
- source_word: אִישׁ יְהוּדָה
  chosen: the men of Judah
  alternatives:
  - the people of Judah
  - each man of Judah
  lexicon: HALOT
  rationale: Literally 'man of Judah,' but as a collective it refers to Judah's male
    populace/people. Per gender-accurate policy, 'men of Judah' preserves the masculine
    form better than the neutral 'people of Judah'.
- source_word: וְיֹשְׁבֵי יְרוּשָׁלָ͏ִם
  chosen: and the inhabitants of Jerusalem
  alternatives:
  - and those who dwell in Jerusalem
  - and the residents of Jerusalem
  lexicon: HALOT
  rationale: A standard collective expression for the city's population. 'Inhabitants'
    is natural and suitably formal.
- source_word: וְיָשְׁבָה הָעִיר הַזֹּאת
  chosen: and this city will be inhabited
  alternatives:
  - and this city will dwell
  - and this city will remain inhabited
  lexicon: HALOT
  rationale: The verb ישב with a city as subject means to be inhabited/remain settled,
    not that the city itself 'dwells.' Passive-like English best conveys the sense.
- source_word: לְעוֹלָם
  chosen: forever
  alternatives:
  - for ever
  - for all time
  - perpetually
  lexicon: HALOT
  rationale: '''Forever'' is the standard, readable rendering for לעולם here, expressing
    enduring continuance in covenant-blessing idiom.'
