theological_decisions:
- issue: Dynastic reference in 'the throne of David'
  chosen_reading: Retain the explicit Davidic throne language without paraphrasing
    it into a generalized idea of legitimate rule.
  alternative_readings:
  - David's royal throne
  - the Davidic throne
  rationale: The phrase carries covenantal and royal significance in Jeremiah and
    should remain transparent in translation. No christological expansion is imported;
    the text speaks directly of Davidic kingship in Jerusalem.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gender in אִישׁ יְהוּדָה
  chosen_reading: Render as 'the men of Judah' in the main text.
  alternative_readings:
  - the people of Judah
  rationale: The Hebrew is grammatically masculine singular used collectively. Per
    the gender-accurate policy, the masculine form should be preserved rather than
    flattened to a gender-neutral collective, while the collective sense is still
    clear from context.
  doctrine_reference: Translation philosophy §4
