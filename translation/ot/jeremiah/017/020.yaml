id: JER.17.20
reference: Jeremiah 17:20
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֣ אֲ֠לֵי/הֶם שִׁמְע֨וּ דְבַר יְהוָ֜ה מַלְכֵ֤י יְהוּדָה֙ וְ/כָל יְהוּדָ֔ה וְ/כֹ֖ל יֹשְׁבֵ֣י יְרוּשָׁלִָ֑ם הַ/בָּאִ֖ים בַּ/שְּׁעָרִ֥ים הָ/אֵֽלֶּה־־׃ס
translation:
  text: And say to them, “Hear the word of Yahweh, you kings of Judah, and all Judah, and all the inhabitants of Jerusalem who enter through these gates.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: And say
  alternatives:
  - Then say
  - And you shall say
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic instruction functions as sequential command following the prior imperative context; 'And say' preserves the linkage without overformalizing.
- source_word: אֲלֵיהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Standard prepositional phrase indicating the audience addressed by Jeremiah.
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Imperative plural. 'Hear' is concise and preserves the covenantal-prophetic force common in Hebrew proclamation formulas.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Established prophetic formula. 'Word' preserves the formal and theological weight of divine speech better than the more interpretive 'message.' 'the LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מַלְכֵי יְהוּדָה
  chosen: O kings of Judah
  alternatives:
  - kings of Judah
  lexicon: HALOT
  rationale: Vocative address after the imperative. 'O' naturally marks direct address in English and reflects the summons directed to the royal class.
- source_word: וְכָל יְהוּדָה
  chosen: and all Judah
  alternatives:
  - and all the people of Judah
  - and all of Judah
  lexicon: HALOT
  rationale: The proper noun likely stands metonymically for the people of the kingdom. 'All Judah' preserves the Hebrew compactness without adding 'people' unnecessarily.
- source_word: וְכֹל יֹשְׁבֵי יְרוּשָׁלִָם
  chosen: and all the inhabitants of Jerusalem
  alternatives:
  - and all who dwell in Jerusalem
  - and all the residents of Jerusalem
  lexicon: HALOT
  rationale: Participle-based expression denotes those living in the city. 'Inhabitants' is natural, accurate, and suitably formal for prophetic address.
- source_word: הַבָּאִים
  chosen: who enter
  alternatives:
  - who come in
  - entering
  lexicon: HALOT
  rationale: The participle modifies the inhabitants in context, specifying those coming through the city gates. 'Who enter' is idiomatic and clear.
- source_word: בַּשְּׁעָרִים הָאֵלֶּה
  chosen: through these gates
  alternatives:
  - by these gates
  - into these gates
  lexicon: HALOT
  rationale: With ב and a motion verb, English idiom favors 'through' for passage via gates. 'These gates' reflects the demonstrative and likely points to the gates near which Jeremiah is stationed.
