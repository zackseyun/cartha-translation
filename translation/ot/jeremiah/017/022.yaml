theological_decisions:
- issue: Rendering of Sabbath sanctification language
  chosen_reading: keep the Sabbath day holy
  alternative_readings:
  - sanctify the Sabbath day
  - treat the Sabbath day as holy
  rationale: The Hebrew command concerns setting apart the Sabbath in obedience to
    God's prior command. 'Keep ... holy' is idiomatic English that preserves the theological
    idea of consecration without archaic diction.
  doctrine_reference: Translation philosophy §§5-6
- issue: Gendered ancestral term
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The source text uses a grammatically masculine kinship term. Following
    the gender-accurate policy, the translation retains the masculine form rather
    than flattening it to a neutral collective.
  doctrine_reference: Translation philosophy §4
