id: JER.17.22
reference: Jeremiah 17:22
source:
  edition: WLC
  text: וְ/לֹא תוֹצִ֨יאוּ מַשָּׂ֤א מִ/בָּֽתֵּי/כֶם֙ בְּ/י֣וֹם הַ/שַּׁבָּ֔ת וְ/כָל
    מְלָאכָ֖ה לֹ֣א תַֽעֲשׂ֑וּ וְ/קִדַּשְׁתֶּם֙ אֶת י֣וֹם הַ/שַּׁבָּ֔ת כַּ/אֲשֶׁ֥ר
    צִוִּ֖יתִי אֶת אֲבוֹתֵי/כֶֽם־־־־׃
translation:
  text: Do not carry a load out of your houses on the Sabbath day, and do not do any
    work, but keep the Sabbath day holy, just as I commanded your fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bring a burden out of your houses.'
    reason: lexical_alternative
  - marker: b
    text: '''Your fathers'' refers to the earlier generations of Israel to whom God
      gave this command.'
    reason: cultural_note
lexical_decisions:
- source_word: תוֹצִיאוּ
  chosen: carry ... out
  alternatives:
  - bring out
  - take out
  lexicon: HALOT
  rationale: Hiphil of יצא means to cause to go out, hence 'bring/take out.' In idiomatic
    English with מַשָּׂא ('load'), 'carry ... out' best conveys the physical act in
    this Sabbath-law context.
- source_word: מַשָּׂא
  chosen: a load
  alternatives:
  - a burden
  - cargo
  lexicon: HALOT
  rationale: The noun denotes something borne or carried. 'Load' fits the concrete
    commercial/transport sense in context better than the more abstract 'burden.'
- source_word: מִבָּתֵּיכֶם
  chosen: out of your houses
  alternatives:
  - from your houses
  lexicon: HALOT
  rationale: The preposition מן with 'houses' marks source/origin. 'Out of your houses'
    is the most natural English expression with the preceding verb of carrying out.
- source_word: בְּיוֹם הַשַּׁבָּת
  chosen: on the Sabbath day
  alternatives:
  - on the day of the Sabbath
  - on the Sabbath
  lexicon: HALOT
  rationale: This is a temporal phrase. 'On the Sabbath day' is clear modern English
    and preserves the explicit mention of 'day' in Hebrew.
- source_word: מְלָאכָה
  chosen: work
  alternatives:
  - labor
  - occupation
  lexicon: HALOT
  rationale: In Sabbath legislation מְלָאכָה regularly refers to work/labor prohibited
    on the holy day. 'Work' is the standard and clearest rendering.
- source_word: וְקִדַּשְׁתֶּם
  chosen: keep ... holy
  alternatives:
  - sanctify
  - treat as holy
  - consecrate
  lexicon: HALOT
  rationale: The piel of קדש means to set apart as holy. In idiomatic English for
    Sabbath observance, 'keep the Sabbath day holy' best captures both consecration
    and ongoing observance.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - according as
  lexicon: HALOT
  rationale: Introduces comparison with prior divine command. 'Just as' gives the
    comparative force naturally.
- source_word: צִוִּיתִי
  chosen: I commanded
  alternatives:
  - I gave command to
  lexicon: HALOT
  rationale: Straightforward rendering of the verb צוה in first person singular.
- source_word: אֲבוֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly 'your fathers.' Per gender-accurate policy,
    the masculine form is retained rather than neutralized to 'ancestors,' though
    the referent is the forefathers/generations before them.
