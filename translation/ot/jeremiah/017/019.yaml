id: JER.17.19
reference: Jeremiah 17:19
source:
  edition: WLC
  text: כֹּה אָמַ֨ר יְהוָ֜ה אֵלַ֗/י הָלֹ֤ךְ וְ/עָֽמַדְתָּ֙ בְּ/שַׁ֣עַר בְּנֵֽי עם אֲשֶׁ֨ר יָבֹ֤אוּ ב/וֹ֙ מַלְכֵ֣י יְהוּדָ֔ה וַ/אֲשֶׁ֖ר יֵ֣צְאוּ ב֑/וֹ וּ/בְ/כֹ֖ל שַׁעֲרֵ֥י יְרוּשָׁלִָֽם־־׃
translation:
  text: 'Thus Yahweh said to me: Go and stand in the gate of the people, by which the kings of Judah enter and by which they go out, and in all the gates of Jerusalem.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the gate of the sons of the people''; possibly a specific gate name, often understood as ''the People''s Gate.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Introduces a divine speech formula. 'Thus' preserves the prophetic register concisely and naturally in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - concerning me
  lexicon: HALOT
  rationale: 'In this speech-introduction context, the preposition clearly marks the addressee of the divine word: ''said to me.'''
- source_word: הָלֹךְ וְעָמַדְתָּ
  chosen: Go and stand
  alternatives:
  - Go, and take your stand
  - Walk and stand
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb gives an imperative force. 'Go and stand' is clear, direct, and preserves the command sequence.
- source_word: בְּשַׁעַר
  chosen: in the gate
  alternatives:
  - at the gate
  - by the gate
  lexicon: HALOT
  rationale: The preposition ב can be rendered variously in English depending on idiom. 'In the gate' reflects the Hebrew and the ancient city-gate setting, where one could stand within the gate complex.
- source_word: בְּנֵי עָם
  chosen: the sons of the people
  alternatives:
  - the people's gate
  - the gate of the common people
  - the gate of the sons of the people
  lexicon: HALOT
  rationale: The Hebrew construct chain is difficult and somewhat idiomatic. A more interpretive rendering like 'People's Gate' is possible, but the Hebrew literally reads 'gate of the sons of the people.' This draft preserves the source wording as much as possible while remaining intelligible.
- source_word: אֲשֶׁר יָבֹאוּ בוֹ ... וַאֲשֶׁר יֵצְאוּ בוֹ
  chosen: by which the kings of Judah enter and by which they go out
  alternatives:
  - through which the kings of Judah enter and through which they go out
  - where the kings of Judah enter and leave
  lexicon: HALOT
  rationale: The relative clauses describe the gate as the route of royal ingress and egress. 'By which' is idiomatic and preserves the repeated Hebrew structure.
- source_word: מַלְכֵי יְהוּדָה
  chosen: the kings of Judah
  alternatives:
  - Judah's kings
  lexicon: HALOT
  rationale: Standard formal rendering of the construct phrase.
- source_word: וּבְכֹל שַׁעֲרֵי יְרוּשָׁלִָם
  chosen: and in all the gates of Jerusalem
  alternatives:
  - and at all the gates of Jerusalem
  lexicon: HALOT
  rationale: Extends the command beyond the named gate to the city's gates generally. 'In all the gates' keeps the Hebrew preposition and the public-setting nuance.
