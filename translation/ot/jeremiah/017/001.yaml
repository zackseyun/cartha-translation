theological_decisions:
- issue: Shift in pronominal reference from third person to second person
  chosen_reading: 'Retain the Hebrew shift: ''their heart'' ... ''your altars'''
  alternative_readings:
  - Regularize to 'their altars' for smoother English
  rationale: The Masoretic text intentionally shifts from speaking about Judah to
    directly addressing the audience. Preserving the shift maintains the prophetic
    force and avoids smoothing away a significant discourse feature.
