id: JER.17.1
reference: Jeremiah 17:1
source:
  edition: WLC
  text: חַטַּ֣את יְהוּדָ֗ה כְּתוּבָ֛ה בְּ/עֵ֥ט בַּרְזֶ֖ל בְּ/צִפֹּ֣רֶן שָׁמִ֑יר חֲרוּשָׁה֙
    עַל ל֣וּחַ לִבָּ֔/ם וּ/לְ/קַרְנ֖וֹת מִזְבְּחוֹתֵי/כֶֽם־׃
translation:
  text: The sin of Judah is written with an iron stylus; with a diamond point it is
    engraved on the tablet of their heart and on the horns of your altars.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with an adamant point'; the exact identity of שָׁמִיר is uncertain,
      referring generally to an extremely hard substance used for engraving.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַטַּאת
  chosen: sin
  alternatives:
  - sin-offering
  - guilt
  lexicon: HALOT
  rationale: In prophetic indictment contexts, the noun commonly denotes moral sin
    rather than a sacrificial offering. The verse describes Judah's culpability as
    permanently inscribed, so 'sin' best fits the context.
- source_word: כְּתוּבָה
  chosen: is written
  alternatives:
  - stands written
  lexicon: HALOT
  rationale: Passive participial sense describing an existing state. 'Is written'
    is natural English and preserves the durative/resultative force.
- source_word: עֵט
  chosen: stylus
  alternatives:
  - pen
  - engraving tool
  lexicon: HALOT
  rationale: Given the parallel with iron and engraving imagery, 'stylus' better conveys
    a hard writing/inscribing instrument than the modern-sounding 'pen'.
- source_word: בַּרְזֶל
  chosen: iron
  lexicon: HALOT
  rationale: Straightforward material term; retained literally to preserve the harsh
    permanence of the image.
- source_word: צִפֹּרֶן
  chosen: point
  alternatives:
  - claw
  - nail
  lexicon: HALOT
  rationale: Here it refers to the tip of an engraving instrument rather than a fingernail.
    'Point' communicates the functional sense in idiomatic English.
- source_word: שָׁמִיר
  chosen: diamond
  alternatives:
  - adamant
  - emery
  - flint
  lexicon: HALOT
  rationale: The term denotes an extremely hard substance used for engraving. 'Diamond'
    is the clearest modern equivalent, though the exact mineral identification is
    uncertain; alternatives are preserved in a footnote.
- source_word: חֲרוּשָׁה
  chosen: it is engraved
  alternatives:
  - cut
  - incised
  lexicon: HALOT
  rationale: This passive participle intensifies the inscription imagery beyond ordinary
    writing. Rendering it as 'it is engraved' preserves the force and links naturally
    with the hard-point imagery.
- source_word: ל֣וּחַ לִבָּם
  chosen: the tablet of their heart
  alternatives:
  - the tablet of their mind
  - their heart's tablet
  lexicon: HALOT
  rationale: '''Tablet'' preserves the inscription metaphor. Singular ''heart'' with
    plural suffix is idiomatically rendered ''their heart'' in collective sense, matching
    the Hebrew while sounding natural in English.'
- source_word: קַרְנוֹת
  chosen: horns
  alternatives:
  - projections
  - corners
  lexicon: HALOT
  rationale: The altar's 'horns' are a standard cultic feature in the Hebrew Bible;
    the literal term should be preserved.
- source_word: מִזְבְּחוֹתֵיכֶם
  chosen: your altars
  lexicon: HALOT
  rationale: Second person plural suffix is retained as 'your,' matching the Hebrew
    shift from third person ('their heart') to direct prophetic address ('your altars').
