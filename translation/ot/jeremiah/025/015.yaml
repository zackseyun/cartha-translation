theological_decisions:
- issue: Rendering of divine judgment term חֵמָה
  chosen_reading: wrath
  alternative_readings:
  - fury
  rationale: The verse depicts the nations drinking the cup as a metaphor for the
    LORD's judicial anger. 'Wrath' preserves the theological weight of divine judgment
    without overstating emotional volatility. 'Fury' is possible but less measured
    in English.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it; readable modern English.'
