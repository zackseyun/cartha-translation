id: JER.25.15
reference: Jeremiah 25:15
source:
  edition: WLC
  text: כִּ֣י כֹה֩ אָמַ֨ר יְהוָ֜ה אֱלֹהֵ֤י יִשְׂרָאֵל֙ אֵלַ֔/י קַ֠ח אֶת כּ֨וֹס הַ/יַּ֧יִן
    הַ/חֵמָ֛ה הַ/זֹּ֖את מִ/יָּדִ֑/י וְ/הִשְׁקִיתָ֤ה אֹת/וֹ֙ אֶת כָּל הַ/גּוֹיִ֔ם אֲשֶׁ֧ר
    אָנֹכִ֛י שֹׁלֵ֥חַ אוֹתְ/ךָ֖ אֲלֵי/הֶֽם־־־׃
translation:
  text: 'For this is what the LORD, the God of Israel, said to me: “Take from my hand
    this cup of the wine of wrath, and make all the nations to whom I am sending you
    drink it.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the wine of fury.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the covenant name with small-caps convention in English.
- source_word: כִּי כֹה אָמַר
  chosen: For this is what ... said
  alternatives:
  - For thus said
  - Because thus says
  lexicon: HALOT
  rationale: Introduces the divine speech with natural modern English while retaining
    the causal/discourse-linking force of כִּי and the demonstrative force of כֹה.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct rendering; no reason to paraphrase.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: Direct and idiomatic rendering of the preposition plus 1cs suffix.
- source_word: קַח
  chosen: Take
  alternatives:
  - Receive
  - Take up
  lexicon: HALOT
  rationale: Simple imperative matching the Qal imperative force.
- source_word: כּוֹס
  chosen: cup
  lexicon: HALOT
  rationale: Concrete image should be preserved literally.
- source_word: הַיַּיִן הַחֵמָה
  chosen: the wine of wrath
  alternatives:
  - the cup of wine, namely wrath
  - the wine of fury
  lexicon: HALOT
  rationale: The construct-like sequence is best represented as 'the wine of wrath,'
    preserving the metaphor of intoxicating divine judgment. 'Wrath' fits prophetic
    judgment language well.
- source_word: הַזֹּאת
  chosen: this
  lexicon: HALOT
  rationale: Retains the demonstrative emphasis on the specific cup.
- source_word: מִיָּדִי
  chosen: from my hand
  alternatives:
  - out of my hand
  lexicon: HALOT
  rationale: Literal rendering preserves the imagery of Jeremiah receiving the cup
    from God himself.
- source_word: וְהִשְׁקִיתָה
  chosen: make ... drink
  alternatives:
  - give ... to drink
  - cause ... to drink
  lexicon: HALOT
  rationale: Hiphil causative of שׁקה is best conveyed by 'make ... drink' in clear
    modern English.
- source_word: כָּל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the peoples
  - all the Gentiles
  lexicon: HALOT
  rationale: In Jeremiah's international judgment context, גּוֹיִם refers to nations,
    not specifically Gentiles in a later Jewish/Christian sense.
- source_word: אֲשֶׁר אָנֹכִי שֹׁלֵחַ אוֹתְךָ אֲלֵיהֶם
  chosen: to whom I am sending you
  alternatives:
  - whom I am sending you to
  - to which I send you
  lexicon: HALOT
  rationale: Smooth English relative clause preserving the participial/imperfective
    sense of ongoing commission.
- source_word: אֹתוֹ
  chosen: it
  lexicon: HALOT
  rationale: Refers back to the cup/wine image; English uses neuter pronoun naturally.
