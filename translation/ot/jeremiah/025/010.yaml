id: JER.25.10
reference: Jeremiah 25:10
source:
  edition: WLC
  text: וְ/הַאֲבַדְתִּ֣י מֵ/הֶ֗ם ק֤וֹל שָׂשׂוֹן֙ וְ/ק֣וֹל שִׂמְחָ֔ה ק֥וֹל חָתָ֖ן וְ/ק֣וֹל
    כַּלָּ֑ה ק֥וֹל רֵחַ֖יִם וְ/א֥וֹר נֵֽר׃
translation:
  text: And I will make disappear from among them the sound of joy and the sound of
    gladness, the voice of the bridegroom and the voice of the bride, the sound of
    the millstones and the light of the lamp.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''I will put an end to from among them.'' The Hebrew verb is causative:
      ''cause to perish/disappear.'''
    reason: lexical_alternative
  - marker: b
    text: '''The voice of the bridegroom and the voice of the bride'' refers to wedding
      celebration, a stock image of normal communal life.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהַאֲבַדְתִּי
  chosen: I will make disappear
  alternatives:
  - I will destroy
  - I will cause to perish
  - I will put an end to
  lexicon: HALOT
  rationale: 'Hiphil of אבד is causative: ''cause to perish/disappear.'' In this context
    the object is not persons but sounds and signs of ordinary life, so ''make disappear''
    preserves the causative force without sounding awkward or overly concrete.'
- source_word: מֵהֶם
  chosen: from among them
  alternatives:
  - from them
  lexicon: HALOT
  rationale: The preposition מן with pronoun indicates removal out of their midst.
    'From among them' makes explicit that these sounds will cease within the community.
- source_word: קוֹל
  chosen: sound
  alternatives:
  - voice
  - noise
  lexicon: HALOT
  rationale: קוֹל can mean either 'sound' or 'voice.' For joy, gladness, and millstones,
    'sound' is the most natural English rendering. The repeated noun structures the
    list rhetorically.
- source_word: שָׂשׂוֹן
  chosen: joy
  alternatives:
  - mirth
  - rejoicing
  lexicon: HALOT
  rationale: A common term for exultant joy. 'Joy' is clear modern English and pairs
    well with the following שִׂמְחָה.
- source_word: שִׂמְחָה
  chosen: gladness
  alternatives:
  - joy
  - mirth
  lexicon: HALOT
  rationale: Rendered 'gladness' to preserve the distinction from שָׂשׂוֹן while keeping
    the paired celebratory sense.
- source_word: קוֹל חָתָן
  chosen: the voice of the bridegroom
  alternatives:
  - the sound of the bridegroom
  lexicon: HALOT
  rationale: Here קוֹל naturally refers to human vocal presence in wedding celebration,
    so 'voice' is preferable to 'sound.' 'Bridegroom' is more precise than 'groom'
    and matches the formal register of prophetic judgment language.
- source_word: וְקוֹל כַּלָּה
  chosen: the voice of the bride
  alternatives:
  - the sound of the bride
  lexicon: HALOT
  rationale: Parallel to 'voice of the bridegroom'; preserves the wedding imagery
    of communal life being removed.
- source_word: קוֹל רֵחַיִם
  chosen: the sound of the millstones
  alternatives:
  - the sound of the hand mill
  - the sound of grinding
  lexicon: HALOT
  rationale: רֵחַיִם is a dual form referring to a pair of millstones. 'Millstones'
    is the most direct and idiomatic rendering, evoking ordinary domestic activity.
- source_word: אוֹר נֵר
  chosen: the light of the lamp
  alternatives:
  - lamp-light
  - the light of a lamp
  lexicon: HALOT
  rationale: A simple construct phrase. 'The light of the lamp' is natural English
    and preserves the image of inhabited homes and normal life.
