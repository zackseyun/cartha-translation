theological_decisions:
- issue: Prophetic judgment imagery
  chosen_reading: The verse is rendered as the removal of ordinary communal and domestic
    signs of life under judgment, without expanding the imagery into interpretive
    paraphrase.
  alternative_readings:
  - A more idiomatic paraphrase such as 'I will silence every joyful sound'
  rationale: The Hebrew lists concrete sounds and sights whose cessation signifies
    devastation. Optimal equivalence preserves the imagery rather than collapsing
    it into abstract summary.
  doctrine_reference: Translation philosophy §§1, 3, 6
