id: JER.25.26
reference: Jeremiah 25:26
source:
  edition: WLC
  text: וְ/אֵ֣ת כָּל מַלְכֵ֣י הַ/צָּפ֗וֹן הַ/קְּרֹבִ֤ים וְ/הָֽ/רְחֹקִים֙ אִ֣ישׁ אֶל
    אָחִ֔י/ו וְ/אֵת֙ כָּל הַ/מַּמְלְכ֣וֹת הָ/אָ֔רֶץ אֲשֶׁ֖ר עַל פְּנֵ֣י הָ/אֲדָמָ֑ה
    וּ/מֶ֥לֶךְ שֵׁשַׁ֖ךְ יִשְׁתֶּ֥ה אַחֲרֵי/הֶֽם׀־־־־׃
translation:
  text: and all the kings of the north, near and far, one after another, and all the
    kingdoms of the earth that are on the face of the ground. And the king of Sheshach
    will drink after them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Sheshach is widely understood as a cryptic name for Babylon, likely using
      an atbash-style cipher.
    reason: alternative_reading
lexical_decisions:
- source_word: מַלְכֵי הַצָּפוֹן
  chosen: the kings of the north
  alternatives:
  - the northern kings
  lexicon: HALOT
  rationale: A straightforward genitive construction. 'Kings of the north' preserves
    the Hebrew structure and the geopolitical sense without over-interpreting a specific
    region.
- source_word: הַקְּרֹבִים וְהָרְחֹקִים
  chosen: near and far
  alternatives:
  - the near ones and the far ones
  - those nearby and those far away
  lexicon: HALOT
  rationale: This paired adjective expression is idiomatic for comprehensiveness.
    'Near and far' is natural English and preserves the merism.
- source_word: אִישׁ אֶל אָחִיו
  chosen: one after another
  alternatives:
  - each with his brother
  - each one next to the other
  lexicon: HALOT
  rationale: In this context the idiom does not primarily denote kinship but succession
    or adjacency among the listed kings. 'One after another' best fits the sequence
    of nations compelled to drink the cup.
- source_word: כָּל הַמַּמְלְכוֹת הָאָרֶץ
  chosen: all the kingdoms of the earth
  alternatives:
  - all the kingdoms of the land
  lexicon: HALOT
  rationale: '''Earth'' is preferable here because the following phrase ''on the face
    of the ground'' universalizes the scope beyond a single land.'
- source_word: אֲשֶׁר עַל פְּנֵי הָאֲדָמָה
  chosen: that are on the face of the ground
  alternatives:
  - that are on the face of the earth
  - that are upon the surface of the ground
  lexicon: HALOT
  rationale: The phrase is a stock Hebrew expression for worldwide extent. I retained
    'ground' to reflect אֲדָמָה distinctly from the previous אֶרֶץ, while keeping
    the idiom intelligible.
- source_word: שֵׁשַׁךְ
  chosen: Sheshach
  alternatives:
  - Babylon
  lexicon: HALOT
  rationale: This is a proper name and should be transliterated in the main text per
    translation philosophy. The likely identification with Babylon is important but
    interpretive, so it is preserved in a footnote rather than substituted into the
    text.
- source_word: יִשְׁתֶּה אַחֲרֵיהֶם
  chosen: will drink after them
  alternatives:
  - will drink after them from the cup
  - will drink last after them
  lexicon: HALOT
  rationale: The verb 'drink' continues the cup-of-wrath imagery from the surrounding
    context. 'After them' preserves the temporal sequence without adding words not
    present in the verse.
