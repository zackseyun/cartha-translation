theological_decisions:
- issue: Identity of 'Sheshach'
  chosen_reading: Retain 'Sheshach' in the main text as a transliterated proper name,
    with Babylon noted in a footnote as the likely cryptographic reference.
  alternative_readings:
  - Translate directly as 'Babylon' in the main text
  rationale: The Hebrew text reads שֵׁשַׁךְ, not בָּבֶל. Since names are to be transliterated
    and the source text has chosen an opaque form, the main text should preserve that
    form. The probable identification with Babylon is significant for readers and
    should be documented in a footnote rather than replacing the source expression.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names.
    Preserve theological tension rather than resolve it.'
