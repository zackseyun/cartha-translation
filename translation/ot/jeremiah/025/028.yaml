id: JER.25.28
reference: Jeremiah 25:28
source:
  edition: WLC
  text: וְ/הָיָ֗ה כִּ֧י יְמָאֲנ֛וּ לָ/קַֽחַת הַ/כּ֥וֹס מִ/יָּדְ/ךָ֖ לִ/שְׁתּ֑וֹת וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֗ם כֹּ֥ה אָמַ֛ר יְהוָ֥ה צְבָא֖וֹת שָׁת֥וֹ תִשְׁתּֽוּ־׃
translation:
  text: 'And if they refuse to take the cup from your hand to drink, then you shall say to them, ‘Thus says Yahweh of hosts: You shall surely drink.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You shall certainly drink.' The Hebrew uses an infinitive absolute with a finite verb for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And if
  alternatives:
  - And it shall be that if
  - And when
  lexicon: HALOT
  rationale: This idiom introduces a contingent future situation. 'And if' gives natural English while preserving the conditional force better than a wooden 'and it shall be that if.'
- source_word: יְמָאֲנוּ
  chosen: they refuse
  alternatives:
  - they are unwilling
  - they decline
  lexicon: HALOT
  rationale: The piel of מאן conveys refusal or unwillingness. 'Refuse' best captures active resistance in context.
- source_word: לָקַחַת
  chosen: to take
  alternatives:
  - to receive
  lexicon: HALOT
  rationale: The infinitive means 'to take.' Although 'receive' is possible in context, 'take' more directly reflects the Hebrew wording.
- source_word: הַכּוֹס
  chosen: the cup
  lexicon: HALOT
  rationale: Straightforward lexical rendering. In context the cup symbolizes divine wrath, but the metaphor should remain in the text rather than be interpreted away.
- source_word: מִיָּדְךָ
  chosen: from your hand
  alternatives:
  - from your hands
  lexicon: HALOT
  rationale: Singular suffix in Hebrew; 'from your hand' is the natural and accurate rendering.
- source_word: לִשְׁתּוֹת
  chosen: to drink
  lexicon: HALOT
  rationale: Direct infinitive complement to 'take the cup,' preserving the purpose/result sense.
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  chosen: then you shall say to them
  alternatives:
  - you must say to them
  - you are to say to them
  lexicon: HALOT
  rationale: The qatal with vav in this instruction sequence carries future directive force. 'Then you shall say' fits the prophetic commission context.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' is both accurate and idiomatic.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD Almighty
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Hosts' preserves the Hebrew title צבאות more transparently than the interpretive 'Almighty.'
- source_word: שָׁתוֹ תִשְׁתּוּ
  chosen: You must surely drink
  alternatives:
  - Drink, you shall drink
  - You shall certainly drink
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the command/certainty. 'You must surely drink' preserves both the forceful imperative context and the emphatic certainty.
