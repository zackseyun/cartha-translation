theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to explicate the cup as divine wrath in the main text
  chosen_reading: Retain 'the cup' without interpretive expansion
  alternative_readings:
  - the cup of wrath
  - the cup of my wrath
  rationale: Although the broader context identifies the cup with divine wrath, this verse itself says only 'the cup.' Optimal equivalence preserves the metaphor rather than importing explanatory wording not present here.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
