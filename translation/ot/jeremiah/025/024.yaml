id: JER.25.24
reference: Jeremiah 25:24
source:
  edition: WLC
  text: וְ/אֵ֖ת כָּל מַלְכֵ֣י עֲרָ֑ב וְ/אֵת֙ כָּל מַלְכֵ֣י הָ/עֶ֔רֶב הַ/שֹּׁכְנִ֖ים
    בַּ/מִּדְבָּֽר־־׃
translation:
  text: and all the kings of Arabia, and all the kings of the mixed peoples who dwell
    in the wilderness;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the kings of the mixed company' or 'mixed multitude.' The Hebrew
      distinguishes this group from 'Arabia' in the previous phrase.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the desert.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכֵי
  chosen: kings of
  alternatives:
  - kings
  lexicon: HALOT
  rationale: Construct plural of מֶלֶךְ governing the following group names; 'kings
    of' is the natural English expression.
- source_word: עֲרָב
  chosen: Arabia
  alternatives:
  - the Arabs
  - Arab
  lexicon: HALOT
  rationale: Proper noun referring to the Arabian region/peoples. 'Arabia' fits the
    geopolitical list of nations in context better than the ethnonym alone.
- source_word: הָעֶרֶב
  chosen: the mixed peoples
  alternatives:
  - the mixed company
  - the mixed multitude
  - the desert tribes
  lexicon: HALOT
  rationale: The noun עֶרֶב here is distinct from עֲרָב and most naturally denotes
    a mixed population/group. Rendering it 'the mixed peoples' preserves the lexical
    distinction between the two adjacent terms and fits the following participial
    qualifier.
- source_word: הַשֹּׁכְנִים
  chosen: who dwell
  alternatives:
  - living
  - inhabiting
  lexicon: HALOT
  rationale: Qal participle plural of ישׁב functioning attributively for הָעֶרֶב.
    'Who dwell' is clear, natural, and slightly more formal in a prophetic nation
    list.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: HALOT
  rationale: מִדְבָּר commonly denotes wilderness/desert land. 'Wilderness' preserves
    biblical register while remaining readable; 'desert' is a viable alternative.
- source_word: וְאֵת ... וְאֵת
  chosen: and ... and
  alternatives:
  - also ... and
  lexicon: HALOT
  rationale: The repeated object marker with conjunction continues the list from the
    previous verse. English omits the object marker itself and preserves the additive
    force with repeated 'and'.
