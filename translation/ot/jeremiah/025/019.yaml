id: JER.25.19
reference: Jeremiah 25:19
source:
  edition: WLC
  text: אֶת פַּרְעֹ֧ה מֶֽלֶךְ מִצְרַ֛יִם וְ/אֶת עֲבָדָ֥י/ו וְ/אֶת שָׂרָ֖י/ו וְ/אֶת
    כָּל עַמּֽ/וֹ־־־־־־׃
translation:
  text: Pharaoh king of Egypt, his servants, his officials, and all his people;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פַּרְעֹה
  chosen: Pharaoh
  lexicon: HALOT
  rationale: Proper royal name/title conventionally transliterated in English. This
    follows the philosophy of transliterating personal names/titles used as names
    rather than translating them.
- source_word: מֶלֶךְ מִצְרַיִם
  chosen: king of Egypt
  alternatives:
  - the king of Egypt
  lexicon: HALOT
  rationale: Construct chain plainly identifies Pharaoh as the ruler of Egypt. English
    apposition 'Pharaoh king of Egypt' is natural and close to the Hebrew. The article
    is not required in English in this appositional listing context.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his slaves
  - his courtiers
  lexicon: HALOT
  rationale: עֶבֶד can denote servant, slave, or royal attendant depending on context.
    In a court list attached to Pharaoh, 'servants' best captures the broad sense
    of those in his service without overstating chattel status, which is not the focus
    here.
- source_word: שָׂרָיו
  chosen: his officials
  alternatives:
  - his princes
  - his commanders
  - his leaders
  lexicon: HALOT
  rationale: שַׂר refers to rulers, officials, princes, or commanders. In this political
    judgment-oracle list, 'officials' is a clear modern rendering broad enough to
    include court and state leaders without implying only royal sons.
- source_word: כָּל עַמּוֹ
  chosen: all his people
  alternatives:
  - all his nation
  lexicon: HALOT
  rationale: עַם commonly means people in the collective national sense. 'All his
    people' is the most direct and idiomatic rendering here, preserving the comprehensiveness
    marked by כָּל.
- source_word: אֶת ... וְאֶת ... וְאֶת ... וְאֶת
  chosen: simple English coordination in a list
  alternatives:
  - repeating 'and' before each element more mechanically
  rationale: The repeated object marker אֶת structures a list of those made to drink
    in the larger sentence. English does not normally reproduce the object marker,
    so the list is rendered with coordinated noun phrases while preserving each constituent.
