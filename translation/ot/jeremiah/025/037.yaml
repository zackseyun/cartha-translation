id: JER.25.37
reference: Jeremiah 25:37
source:
  edition: WLC
  text: וְ/נָדַ֖מּוּ נְא֣וֹת הַ/שָּׁל֑וֹם מִ/פְּנֵ֖י חֲר֥וֹן אַף יְהוָֽה־׃
translation:
  text: And the peaceful pastures are laid waste because of the burning anger of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the pastures of peace'; the Hebrew phrase is more literally 'pastures of peace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָדַמּוּ
  chosen: are laid waste
  alternatives:
  - are silenced
  - are destroyed
  - are cut off
  lexicon: HALOT
  rationale: The Niphal of דמם here describes devastation resulting from divine judgment. While the root can denote silence or stillness, in this context with pastures and the causal phrase 'because of the burning anger of the LORD,' an English rendering expressing desolation best conveys the result. 'Are laid waste' captures the passive/resultative force without over-paraphrasing.
- source_word: נְאוֹת
  chosen: pastures
  alternatives:
  - meadows
  - grazing places
  - habitations
  lexicon: HALOT
  rationale: In Jeremiah and pastoral imagery, נָאוֶה/נְאוֹת commonly refers to pasturelands or grazing places rather than generic dwellings. 'Pastures' is the most natural and contextually fitting English choice.
- source_word: הַשָּׁלוֹם
  chosen: peaceful
  alternatives:
  - of peace
  - safe
  - tranquil
  lexicon: HALOT
  rationale: The construct phrase literally means 'pastures of peace.' In idiomatic English, 'peaceful pastures' preserves the Hebrew sense of undisturbed safety and prosperity. This is preferable to the wooden 'pastures of peace' in the main text, while the more formal alternative is preserved in a footnote.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - on account of
  lexicon: HALOT
  rationale: Here the preposition introduces cause rather than spatial relation. 'Because of' communicates the causal force clearly in modern English.
- source_word: חֲרוֹן אַף
  chosen: burning anger
  alternatives:
  - fierce anger
  - heat of anger
  - wrath
  lexicon: HALOT
  rationale: The Hebrew idiom combines 'burning' and 'nose/anger' to express intense wrath. 'Burning anger' preserves the metaphorical heat imagery better than the more generalized 'wrath.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
