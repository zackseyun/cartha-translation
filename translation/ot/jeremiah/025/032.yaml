id: JER.25.32
reference: Jeremiah 25:32
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת הִנֵּ֥ה רָעָ֛ה יֹצֵ֖את מִ/גּ֣וֹי אֶל גּ֑וֹי וְ/סַ֣עַר גָּד֔וֹל יֵע֖וֹר מִ/יַּרְכְּתֵי אָֽרֶץ־־׃
translation:
  text: 'Thus says Yahweh of hosts: Behold, disaster is going out from nation to nation, and a great storm is being stirred up from the farthest parts of the earth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calamity.' The Hebrew term can mean 'evil' or 'disaster'; here it refers to destructive judgment, not moral evil.
    reason: lexical_alternative
  - marker: b
    text: Or 'from one nation to another.'
    reason: alternative_reading
  - marker: c
    text: Or 'from the remotest parts of the earth' or 'from the ends of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal prophetic cadence without sounding archaic beyond normal biblical English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: '''Hosts'' is the established and semantically broad rendering, encompassing heavenly and earthly armies. ''Armies'' is possible but narrower and less idiomatic in this title.'
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the deictic force and prophetic urgency. Though slightly elevated, it remains readable and suits the solemn tone.
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - calamity
  lexicon: HALOT
  rationale: In this judgment context the term refers to destructive calamity sent in judgment, not moral evil. 'Disaster' is clear modern English; 'calamity' is also possible but slightly less common.
- source_word: יֹצֵאת
  chosen: is going out
  alternatives:
  - goes out
  - is coming forth
  lexicon: HALOT
  rationale: The participle conveys action in progress or imminent unfolding. 'Is going out' captures the vividness of the Hebrew participle.
- source_word: מִגּוֹי אֶל גּוֹי
  chosen: from nation to nation
  alternatives:
  - from one nation to another
  - from nation against nation
  lexicon: HALOT
  rationale: The phrase marks spread across successive nations. 'From nation to nation' is concise and natural. 'Against nation' would overinterpret hostility not explicit in the prepositions.
- source_word: סַעַר גָּדוֹל
  chosen: a great storm
  alternatives:
  - a great tempest
  - a mighty stormwind
  lexicon: HALOT
  rationale: The image is of a violent storm associated with divine judgment. 'Great storm' is clear and forceful in modern English.
- source_word: יֵעוֹר
  chosen: is being stirred up
  alternatives:
  - will be stirred up
  - is roused
  - will awake
  lexicon: HALOT
  rationale: The Niphal form here conveys being aroused or stirred up. Rendering it as a present progressive fits the prophetic vividness after the initial 'Behold,' though a future sense is also possible.
- source_word: מִיַּרְכְּתֵי אָרֶץ
  chosen: from the farthest parts of the earth
  alternatives:
  - from the remotest parts of the earth
  - from the ends of the earth
  lexicon: HALOT
  rationale: The expression denotes remote extremities. 'Farthest parts of the earth' preserves the superlative sense of distant reaches without flattening it to the more idiomatic but less precise 'ends of the earth.'
