theological_decisions:
- issue: Nature of רָעָה in divine judgment speech
  chosen_reading: Rendered as 'disaster' rather than 'evil'
  alternative_readings:
  - evil
  - calamity
  rationale: The verse speaks of YHWH's judgment moving among nations. Rendering רָעָה as 'evil' in English could imply moral evil in God, which the Hebrew term does not require here; it commonly denotes calamity/disaster in judgment contexts. 'Disaster' preserves the text's meaning without importing a doctrinal problem the verse itself is not asserting.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve what the text says without importing doctrinal claims.'
