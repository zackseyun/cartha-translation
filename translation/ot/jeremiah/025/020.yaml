id: JER.25.20
reference: Jeremiah 25:20
source:
  edition: WLC
  text: וְ/אֵת֙ כָּל הָ/עֶ֔רֶב וְ/אֵ֕ת כָּל מַלְכֵ֖י אֶ֣רֶץ הָ/ע֑וּץ וְ/אֵ֗ת כָּל
    מַלְכֵי֙ אֶ֣רֶץ פְּלִשְׁתִּ֔ים וְ/אֶת אַשְׁקְל֤וֹן וְ/אֶת עַזָּה֙ וְ/אֶת עֶקְר֔וֹן
    וְ/אֵ֖ת שְׁאֵרִ֥ית אַשְׁדּֽוֹד־־־־־־׃
translation:
  text: and all the mixed people, and all the kings of the land of Uz, and all the
    kings of the land of the Philistines—Ashkelon, Gaza, Ekron, and the remnant of
    Ashdod;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mixed multitude'; possibly a mixed foreign population rather than
      a specific ethnic group.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the land of the Philistines'; traditionally 'Philistia.'
    reason: lexical_alternative
  - marker: c
    text: Or 'what remains of Ashdod' or 'the survivors of Ashdod.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֶרֶב
  chosen: the mixed people
  alternatives:
  - the mixed multitude
  - the foreign population
  - the Arabians
  lexicon: HALOT
  rationale: הָעֶרֶב here most naturally refers to a mixed population group rather
    than a specific city or single ethnicity. In Jeremiah 25:24 the same term appears
    in a similar judgment list and is often rendered 'mixed people' or 'mixed multitude.'
    'Arabians' is possible in some contexts, but here the broader sense fits the sequence
    of peoples and kingdoms better.
- source_word: מַלְכֵי אֶרֶץ הָעוּץ
  chosen: the kings of the land of Uz
  alternatives:
  - the kings of the country of Uz
  lexicon: HALOT
  rationale: אֶרֶץ commonly means 'land' in geopolitical lists. 'Uz' is a proper place
    name and should be transliterated rather than translated.
- source_word: מַלְכֵי אֶרֶץ פְּלִשְׁתִּים
  chosen: the kings of the land of the Philistines
  alternatives:
  - the kings of Philistia
  - the kings of the Philistines
  lexicon: HALOT
  rationale: The Hebrew is literally 'the kings of the land of the Philistines.' This
    preserves the ethnic-geographical expression. 'Philistia' is smoother English
    and historically accurate, but the more transparent rendering better reflects
    the source wording while remaining readable.
- source_word: אַשְׁקְלוֹן
  chosen: Ashkelon
  alternatives:
  - Ascalon
  lexicon: HALOT
  rationale: Standard modern transliteration of the Philistine city name.
- source_word: עַזָּה
  chosen: Gaza
  lexicon: HALOT
  rationale: Standard English form of the place name.
- source_word: עֶקְרוֹן
  chosen: Ekron
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: שְׁאֵרִית אַשְׁדּוֹד
  chosen: the remnant of Ashdod
  alternatives:
  - what remains of Ashdod
  - the survivors of Ashdod
  lexicon: HALOT
  rationale: שְׁאֵרִית denotes a remainder or remnant. In this judgment context it
    likely refers to what is left of Ashdod after devastation, whether population
    or city-state. 'Remnant' preserves the lexical link and prophetic register without
    over-specifying.
