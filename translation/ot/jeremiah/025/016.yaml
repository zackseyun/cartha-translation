theological_decisions:
- issue: Nature of the judgment imagery
  chosen_reading: Retain the concrete imagery of drinking, staggering, and madness
    as effects of divine judgment through war.
  alternative_readings:
  - Interpret the language more abstractly as general terror or political collapse
  rationale: The verse is part of the cup-of-wrath oracle and explicitly links the
    nations' condition to 'the sword' sent by God. The translation preserves the vivid
    prophetic imagery without flattening it into abstraction.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not paraphrase beyond what the source warrants.'
