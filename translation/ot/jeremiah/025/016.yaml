id: JER.25.16
reference: Jeremiah 25:16
source:
  edition: WLC
  text: וְ/שָׁת֕וּ וְ/הִֽתְגֹּֽעֲשׁ֖וּ וְ/הִתְהֹלָ֑לוּ מִ/פְּנֵ֣י הַ/חֶ֔רֶב אֲשֶׁ֛ר
    אָנֹכִ֥י שֹׁלֵ֖חַ בֵּינֹתָֽ/ם׃
translation:
  text: They will drink, and stagger, and act like madmen because of the sword that
    I am sending among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'go mad.' The Hebrew verb can denote behaving irrationally or becoming
      crazed.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשָׁתוּ
  chosen: They will drink
  alternatives:
  - and they shall drink
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in this prophetic sequence functions
    futuristically after the preceding command to make the nations drink. 'They will
    drink' is natural English while preserving the concrete image.
- source_word: וְהִתְגֹּעֲשׁוּ
  chosen: stagger
  alternatives:
  - quake
  - reel
  - be convulsed
  lexicon: HALOT
  rationale: The verb conveys violent agitation or reeling. In the context of drinking
    the cup of wrath, 'stagger' best captures the image of destabilized movement in
    idiomatic English, while also fitting the parallel sequence.
- source_word: וְהִתְהֹלָלוּ
  chosen: act like madmen
  alternatives:
  - go mad
  - behave insanely
  - be crazed
  lexicon: HALOT
  rationale: From הלל in the hitpolel/hithpael sense of acting madly or irrationally.
    'Act like madmen' preserves the behavioral nuance better than the more abstract
    'go mad,' though the latter is a viable alternative.
- source_word: מִפְּנֵי הַחֶרֶב
  chosen: because of the sword
  alternatives:
  - before the sword
  - from the presence of the sword
  lexicon: HALOT
  rationale: מִפְּנֵי often means 'because of' or 'on account of' in causal contexts.
    Here the nations' staggering and madness are caused by the sword YHWH sends, so
    a causal rendering is preferable to a strictly spatial one.
- source_word: הַחֶרֶב
  chosen: the sword
  alternatives:
  - the warfare
  - the slaughter
  lexicon: HALOT
  rationale: '''Sword'' is the direct lexical sense and preserves the prophetic metaphor
    for war and judgment without over-interpreting it.'
- source_word: אֲשֶׁר אָנֹכִי שֹׁלֵחַ
  chosen: that I am sending
  alternatives:
  - which I send
  - that I will send
  lexicon: HALOT
  rationale: The participle שֹׁלֵחַ with אָנֹכִי expresses imminent or ongoing divine
    action. 'I am sending' reflects the participial force naturally in English.
- source_word: בֵּינֹתָם
  chosen: among them
  alternatives:
  - between them
  - into their midst
  lexicon: HALOT
  rationale: The preposition here denotes movement into the midst of the nations collectively.
    'Among them' is idiomatic and contextually accurate.
