id: JER.25.25
reference: Jeremiah 25:25
source:
  edition: WLC
  text: וְ/אֵ֣ת כָּל מַלְכֵ֣י זִמְרִ֗י וְ/אֵת֙ כָּל מַלְכֵ֣י עֵילָ֔ם וְ/אֵ֖ת כָּל
    מַלְכֵ֥י מָדָֽי׀־־־׃
translation:
  text: and all the kings of Zimri, and all the kings of Elam, and all the kings of
    Media;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'the Medes.' The Hebrew מָדָי can denote the land Media or the
      Median people.
    reason: lexical_alternative
  - marker: b
    text: The identity of Zimri is uncertain; it may refer to a people or region otherwise
      not clearly identified.
    reason: cultural_note
lexical_decisions:
- source_word: וְאֵת
  chosen: and
  alternatives:
  - also
  - and [object marker omitted in English]
  lexicon: HALOT
  rationale: The conjunction ו is carried into English as 'and.' The object marker
    אֵת has no direct English equivalent and is not translated separately; its accusative
    function is reflected by listing these nations as further objects in the sequence
    from the previous verse.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: כָּל before a plural construct is most naturally rendered 'all,' indicating
    totality of the group rather than distributive 'every' in idiomatic English.
- source_word: מַלְכֵי
  chosen: the kings of
  alternatives:
  - kings of
  lexicon: HALOT
  rationale: Construct plural of מֶלֶךְ, 'kings of.' The English definite article
    is supplied idiomatically because the Hebrew construct phrase with כָּל refers
    to the full set of rulers belonging to each named people or region.
- source_word: זִמְרִי
  chosen: Zimri
  alternatives:
  - Zimry
  lexicon: HALOT
  rationale: A proper name/toponym transliterated rather than translated, following
    the project's policy to transliterate names. The referent is uncertain, but the
    Hebrew form is best preserved as 'Zimri' in the main text.
- source_word: עֵילָם
  chosen: Elam
  lexicon: HALOT
  rationale: Standard English transliteration of the place name עֵילָם.
- source_word: מָדָי
  chosen: Media
  alternatives:
  - the Medes
  lexicon: HALOT
  rationale: מָדָי is the place/people name commonly rendered 'Media.' Because the
    Hebrew parallels other territorial names in this list and uses 'kings of,' 'Media'
    is the most natural English rendering here; 'the Medes' is a viable alternative
    but less consistent with the verse's geographic sequence.
