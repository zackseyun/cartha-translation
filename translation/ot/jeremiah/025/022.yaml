id: JER.25.22
reference: Jeremiah 25:22
source:
  edition: WLC
  text: וְ/אֵת֙ כָּל מַלְכֵי צֹ֔ר וְ/אֵ֖ת כָּל מַלְכֵ֣י צִיד֑וֹן וְ/אֵת֙ מַלְכֵ֣י
    הָ/אִ֔י אֲשֶׁ֖ר בְּ/עֵ֥בֶר הַ/יָּֽם־־־׃
translation:
  text: and all the kings of Tyre, and all the kings of Sidon, and the kings of the
    coastland across the sea;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the island across the sea.' The Hebrew אִי can mean 'island,' but in
      prophetic usage it often refers more broadly to a coastland or maritime region.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Retained as 'all' to reflect the comprehensive scope of judgment on the
    listed rulers. 'Every' is possible but less natural in this list structure.
- source_word: מַלְכֵי
  chosen: kings of
  alternatives:
  - the kings of
  - rulers of
  lexicon: HALOT
  rationale: The construct plural plainly means 'kings of.' 'Rulers' would be more
    interpretive and less formally tied to the Hebrew noun מלך.
- source_word: צֹר
  chosen: Tyre
  lexicon: HALOT
  rationale: Standard English transliteration of the place name צור.
- source_word: צִידוֹן
  chosen: Sidon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name צידון.
- source_word: הָאִי
  chosen: the coastland
  alternatives:
  - the island
  - the coast
  - the maritime land
  lexicon: HALOT
  rationale: Although אִי can denote 'island,' in prophetic geography it often refers
    more broadly to coastlands or maritime regions. Here the singular with following
    relative clause likely functions collectively for the seaboard region beyond the
    sea, so 'the coastland' best captures the Hebrew sense in readable English while
    avoiding an overly narrow insular meaning.
- source_word: אֲשֶׁר בְּעֵבֶר הַיָּם
  chosen: across the sea
  alternatives:
  - beyond the sea
  - on the other side of the sea
  lexicon: HALOT
  rationale: A natural rendering of the relative clause that preserves the spatial
    sense of בעבר. 'Beyond the sea' is also possible and slightly more formal; 'across
    the sea' is clearer in contemporary English.
- source_word: וְאֵת ... וְאֵת ... וְאֵת
  chosen: and ... and ... and
  alternatives:
  - also ... also ... also
  lexicon: HALOT
  rationale: The repeated conjunction plus object marker continues the list from the
    previous verse. English does not represent the object marker directly, so the
    coordination is carried by repeated 'and'.
