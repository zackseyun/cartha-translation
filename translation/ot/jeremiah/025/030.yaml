id: JER.25.30
reference: Jeremiah 25:30
source:
  edition: WLC
  text: וְ/אַתָּה֙ תִּנָּבֵ֣א אֲלֵי/הֶ֔ם אֵ֥ת כָּל הַ/דְּבָרִ֖ים הָ/אֵ֑לֶּה וְ/אָמַרְתָּ֣
    אֲלֵי/הֶ֗ם יְהוָ֞ה מִ/מָּר֤וֹם יִשְׁאָג֙ וּ/מִ/מְּע֤וֹן קָדְשׁ/וֹ֙ יִתֵּ֣ן קוֹל֔/וֹ
    שָׁאֹ֤ג יִשְׁאַג֙ עַל נָוֵ֔/הוּ הֵידָד֙ כְּ/דֹרְכִ֣ים יַֽעֲנֶ֔ה אֶ֥ל כָּל יֹשְׁבֵ֖י
    הָ/אָֽרֶץ־־־׃
translation:
  text: 'And you, you shall prophesy all these words against them, and you shall say
    to them: The LORD will roar from on high, and from his holy dwelling he will give
    his voice; he will surely roar against his pasture. He will answer with a shout
    like those who tread grapes, against all the inhabitants of the earth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'over his habitation.' The Hebrew נָוֶה can mean 'pasture,' 'abode,'
      or 'habitation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he will cry out.' The verb is literally 'answer,' likely describing
      a responsive shout like that of grape-treaders.
    reason: lexical_alternative
  - marker: c
    text: Or 'to all the inhabitants of the earth.' The preposition can be read more
      neutrally as 'to,' though the context of judgment supports 'against.'
    reason: alternative_reading
lexical_decisions:
- source_word: תִּנָּבֵא
  chosen: you shall prophesy
  alternatives:
  - you shall speak as a prophet
  - you shall proclaim
  lexicon: HALOT
  rationale: The Niphal of נבא is the standard verb for prophesying. 'Prophesy' preserves
    the prophetic register better than the more generic 'proclaim.'
- source_word: אֲלֵיהֶם ... אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words against them
  alternatives:
  - to them all these words
  - all these things against them
  lexicon: HALOT
  rationale: Although אֲלֵיהֶם can be rendered 'to them,' in this judgment context
    the sense is adversative/directional toward the nations under judgment; 'against
    them' fits the discourse and avoids awkward English while retaining the object
    'all these words.'
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: מִמָּרוֹם
  chosen: from on high
  alternatives:
  - from heaven
  - from the height
  lexicon: HALOT
  rationale: '''On high'' preserves the elevated spatial imagery without over-specifying
    ''heaven,'' which is not the lexical form used here.'
- source_word: יִשְׁאָג
  chosen: will roar
  alternatives:
  - will cry out
  lexicon: HALOT
  rationale: The verb שׁאג evokes the roar of a lion; 'roar' preserves the forceful
    animal imagery used for divine judgment.
- source_word: מִמְּעוֹן קָדְשׁוֹ
  chosen: from his holy dwelling
  alternatives:
  - from his holy habitation
  - from his holy abode
  lexicon: HALOT
  rationale: מָעוֹן denotes a dwelling place or habitation. 'Holy dwelling' is natural
    modern English and preserves the sacred locale.
- source_word: יִתֵּן קוֹלוֹ
  chosen: he will give his voice
  alternatives:
  - he will raise his voice
  - he will utter his voice
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'give his voice.' Retaining it in slightly
    smoothed English preserves the solemn poetic force better than a fully idiomatic
    paraphrase.
- source_word: שָׁאֹג יִשְׁאַג
  chosen: he will surely roar
  alternatives:
  - roaring, he will roar
  - he will roar loudly
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Will
    surely roar' is a standard English way to reflect that emphasis.
- source_word: עַל נָוֵהוּ
  chosen: against his pasture
  alternatives:
  - over his habitation
  - against his fold
  lexicon: HALOT
  rationale: נָוֶה can denote pasture, abode, or habitation. In combination with the
    lion-roar imagery, 'pasture' coheres with the flock/shepherd setting and the broader
    judgment context. 'Against' reflects עַל in an adversative sense here.
- source_word: הֵידָד
  chosen: a shout
  alternatives:
  - a battle cry
  - a vintage shout
  lexicon: HALOT
  rationale: הֵידָד is a loud cry or shout, often associated with harvest or battle.
    'Shout' is broad enough for the simile that follows while remaining vivid.
- source_word: כְּדֹרְכִים
  chosen: like those who tread grapes
  alternatives:
  - like grape-treaders
  - like those who trample
  lexicon: HALOT
  rationale: The participle refers specifically to those treading grapes in a winepress.
    Making 'grapes' explicit clarifies the cultural image for modern readers.
- source_word: יַעֲנֶה
  chosen: he will answer
  alternatives:
  - he will respond
  - he will cry out
  lexicon: HALOT
  rationale: ענה commonly means 'answer/respond.' In context it likely means answering
    with a shout antiphonally, so 'answer' preserves the lexical sense and poetic
    texture.
- source_word: אֶל כָּל יֹשְׁבֵי הָאָרֶץ
  chosen: against all the inhabitants of the earth
  alternatives:
  - to all the inhabitants of the earth
  - against all who dwell on the earth
  lexicon: HALOT
  rationale: Although אֶל is often 'to,' in this judgment oracle the force is directed
    against the world's inhabitants. 'Inhabitants of the earth' is a standard rendering
    of the phrase and fits the universal scope.
