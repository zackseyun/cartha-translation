theological_decisions:
- issue: Rendering of implied consequence in the final clause
  chosen_reading: and I will do you no harm
  alternative_readings:
  - so that I may not harm you
  - and I will not bring disaster on you
  rationale: The Hebrew uses a simple conjunction with negation and first-person Hiphil
    of רעע. In context, it functions as a divine assurance attached to the prohibition.
    The chosen rendering preserves the straightforward verbal form without over-specifying
    purpose, while communicating the covenantal consequence clearly.
