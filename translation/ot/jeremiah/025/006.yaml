id: JER.25.6
reference: Jeremiah 25:6
source:
  edition: WLC
  text: וְ/אַל תֵּלְכ֗וּ אַֽחֲרֵי֙ אֱלֹהִ֣ים אֲחֵרִ֔ים לְ/עָבְדָ֖/ם וּ/לְ/הִשְׁתַּחֲוֺ֣ת
    לָ/הֶ֑ם וְ/לֹֽא תַכְעִ֤יסוּ אוֹתִ/י֙ בְּ/מַעֲשֵׂ֣ה יְדֵי/כֶ֔ם וְ/לֹ֥א אָרַ֖ע לָ/כֶֽם־־׃
translation:
  text: And do not go after other gods to serve them and to bow down to them, and
    do not provoke me to anger by the work of your hands, and I will do you no harm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'follow other gods.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'and I will not bring disaster on you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּלְכוּ אַחֲרֵי
  chosen: go after
  alternatives:
  - follow
  lexicon: HALOT
  rationale: The idiom הלך אחרי literally means 'go/walk after' and commonly conveys
    following in allegiance. 'Go after' preserves the Hebrew imagery while remaining
    natural English; 'follow' is possible but slightly smooths the metaphor.
- source_word: אֱלֹהִים אֲחֵרִים
  chosen: other gods
  alternatives:
  - foreign gods
  lexicon: HALOT
  rationale: The phrase straightforwardly denotes deities other than YHWH. 'Other
    gods' is the most direct rendering; 'foreign gods' adds a nuance not explicit
    in אֲחֵרִים.
- source_word: לְעָבְדָם
  chosen: to serve them
  alternatives:
  - to worship them
  lexicon: HALOT
  rationale: עבד in relation to deities often includes worshipful service, but 'serve'
    is the core lexical sense and preserves the distinction from the following verb
    for bowing down.
- source_word: וּלְהִשְׁתַּחֲוֺת לָהֶם
  chosen: and to bow down to them
  alternatives:
  - and to worship them
  lexicon: HALOT
  rationale: השתחוה literally refers to prostration/bowing down in reverence. Rendering
    it distinctly as 'bow down' preserves the physical act and avoids collapsing it
    into the previous 'serve'.
- source_word: תַכְעִיסוּ אֹתִי
  chosen: provoke me to anger
  alternatives:
  - provoke me
  - make me angry
  lexicon: HALOT
  rationale: The Hiphil of כעס means to vex or provoke to anger. 'Provoke me to anger'
    makes the causative force explicit and matches prophetic diction.
- source_word: בְּמַעֲשֵׂה יְדֵיכֶם
  chosen: by the work of your hands
  alternatives:
  - with the work of your hands
  - by what your hands have made
  lexicon: HALOT
  rationale: The singular construct phrase is idiomatic for human-made objects, especially
    idols in context. 'By the work of your hands' is a transparent rendering that
    preserves the Hebrew expression; the idiomatic sense is clear from context.
- source_word: וְלֹא אָרַע לָכֶם
  chosen: and I will do you no harm
  alternatives:
  - and I will not harm you
  - and I will do evil to you
  lexicon: HALOT
  rationale: The verb רעע in Hiphil can mean 'do harm/bring disaster.' In this immediate
    exhortational context, the sense is that YHWH would not bring calamity upon them
    if they obeyed. 'Do you no harm' is idiomatic English and avoids the misleading
    moral sense of 'do evil.'
