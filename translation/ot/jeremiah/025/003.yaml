id: JER.25.3
reference: Jeremiah 25:3
source:
  edition: WLC
  text: מִן שְׁלֹ֣שׁ עֶשְׂרֵ֣ה שָׁנָ֡ה לְ/יֹאשִׁיָּ֣הוּ בֶן אָמוֹן֩ מֶ֨לֶךְ יְהוּדָ֜ה
    וְ/עַ֣ד הַ/יּ֣וֹם הַ/זֶּ֗ה זֶ֚ה שָׁלֹ֤שׁ וְ/עֶשְׂרִים֙ שָׁנָ֔ה הָיָ֥ה דְבַר יְהוָ֖ה
    אֵלָ֑/י וָ/אֲדַבֵּ֧ר אֲלֵי/כֶ֛ם אַשְׁכֵּ֥ים וְ/דַבֵּ֖ר וְ/לֹ֥א שְׁמַעְתֶּֽם־־׀־׃
translation:
  text: From the thirteenth year of Josiah son of Amon, king of Judah, even to this
    day, these twenty-three years, the word of the LORD has come to me, and I have
    spoken to you again and again, but you have not listened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'rising early and speaking,' a Hebrew idiom for persistent, repeated
      action.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִן ... וְעַד
  chosen: From ... even to
  alternatives:
  - From ... until
  - Since ... until
  lexicon: HALOT
  rationale: Renders the temporal span explicitly from a starting point to the present
    reference point. 'Even to' preserves the emphatic extension to 'this day' in readable
    English.
- source_word: שְׁלֹשׁ עֶשְׂרֵה שָׁנָה
  chosen: the thirteenth year
  alternatives:
  - year thirteen
  - thirteen years
  lexicon: HALOT
  rationale: The construction refers to a regnal year, not a duration of thirteen
    years. English idiom requires the ordinal expression.
- source_word: לְיֹאשִׁיָּהוּ בֶן אָמוֹן מֶלֶךְ יְהוּדָה
  chosen: of Josiah son of Amon, king of Judah
  alternatives:
  - of Josiah the son of Amon, king of Judah
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. 'Son of' is
    retained rather than flattened to preserve the genealogical formula.
- source_word: הַיּוֹם הַזֶּה
  chosen: this day
  alternatives:
  - today
  - this very day
  lexicon: HALOT
  rationale: '''This day'' preserves the prophetic/deictic tone better than the more
    colloquial ''today.'''
- source_word: זֶה שָׁלֹשׁ וְעֶשְׂרִים שָׁנָה
  chosen: these twenty-three years
  alternatives:
  - for twenty-three years
  - it has been twenty-three years
  lexicon: HALOT
  rationale: This appositional summary of the elapsed period is naturally rendered
    'these twenty-three years.' It keeps the demonstrative force of זֶה while remaining
    idiomatic.
- source_word: הָיָה דְבַר יְהוָה אֵלַי
  chosen: the word of the LORD has come to me
  alternatives:
  - the word of the LORD came to me
  - the word of the LORD was to me
  lexicon: HALOT
  rationale: Although the Hebrew verb is qatal ('was/came'), in this context of duration
    from past to present, English present perfect best conveys an action/state continuing
    through the stated period. 'The LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's contested-terms policy for the divine name, preserving
    Jewish reverence tradition and longstanding English convention.
- source_word: וָאֲדַבֵּר אֲלֵיכֶם
  chosen: and I have spoken to you
  alternatives:
  - and I spoke to you
  lexicon: HALOT
  rationale: The wayyiqtol in a context extending to the present is well represented
    by English present perfect, matching the ongoing timeframe established in the
    first clause.
- source_word: אַשְׁכֵּים וְדַבֵּר
  chosen: again and again
  alternatives:
  - rising early and speaking
  - persistently speaking
  - speaking diligently
  lexicon: HALOT
  rationale: The idiom literally means 'rising early and speaking' and conveys repeated,
    eager persistence rather than the time of day as the main point. 'Again and again'
    communicates the iterative force in natural English; the more literal idiom is
    preserved in a footnote for auditability.
- source_word: וְלֹא שְׁמַעְתֶּם
  chosen: but you have not listened
  alternatives:
  - but you did not listen
  - but you have not obeyed
  lexicon: HALOT
  rationale: '''Listened'' preserves the auditory metaphor of שׁמע without over-interpreting
    it as ''obeyed,'' though disobedience is implicated. Present perfect fits the
    continuing timeframe and contrast.'
