theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Handling the prophetic idiom אַשְׁכֵּים וְדַבֵּר
  chosen_reading: again and again
  alternative_readings:
  - rising early and speaking
  rationale: The idiom emphasizes Jeremiah's repeated, earnest proclamation. Rendering only the literal imagery in the main text may obscure the intended force for modern readers, so the idiomatic sense is used in the text and the literal form is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve significant lexical decisions'
