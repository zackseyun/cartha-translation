theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project specifies 'the LORD' as the default rendering for YHWH. This
    verse does not require deviation from that policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Handling the prophetic idiom אַשְׁכֵּים וְדַבֵּר
  chosen_reading: again and again
  alternative_readings:
  - rising early and speaking
  rationale: The idiom emphasizes Jeremiah's repeated, earnest proclamation. Rendering
    only the literal imagery in the main text may obscure the intended force for modern
    readers, so the idiomatic sense is used in the text and the literal form is preserved
    in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    significant lexical decisions'
