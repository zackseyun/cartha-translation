theological_decisions:
- issue: Force of עַל in relation to 'all the people of Judah'
  chosen_reading: concerning all the people of Judah
  alternative_readings:
  - against all the people of Judah
  rationale: Although the chapter contains judgment, the superscription itself can
    introduce a word with reference to a people without yet specifying whether it
    is for or against them. 'Concerning' preserves that broader semantic range and
    avoids importing the oracle's tone too early.
  doctrine_reference: Preserve theological tension rather than resolve it.
