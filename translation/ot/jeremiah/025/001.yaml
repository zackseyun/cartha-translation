id: JER.25.1
reference: Jeremiah 25:1
source:
  edition: WLC
  text: הַ/דָּבָ֞ר אֲשֶׁר הָיָ֤ה עַֽל יִרְמְיָ֨הוּ֙ עַל כָּל עַ֣ם יְהוּדָ֔ה בַּ/שָּׁנָה֙
    הָֽ/רְבִעִ֔ית לִ/יהוֹיָקִ֥ים בֶּן יֹאשִׁיָּ֖הוּ מֶ֣לֶךְ יְהוּדָ֑ה הִ֗יא הַ/שָּׁנָה֙
    הָ/רִ֣אשֹׁנִ֔ית לִ/נְבֽוּכַדְרֶאצַּ֖ר מֶ֥לֶךְ בָּבֶֽל־־־־־׃
translation:
  text: The word that came to Yirmeyahu concerning all the people of Judah in the
    fourth year of Jehoiakim son of Josiah, king of Judah—it was the first year of
    Nebuchadnezzar king of Babylon—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against all the people of Judah.' The Hebrew preposition can carry either
      sense in prophetic contexts.
    reason: alternative_reading
lexical_decisions:
- source_word: הַדָּבָר
  chosen: The word
  alternatives:
  - The message
  - The matter
  lexicon: HALOT
  rationale: דבר in prophetic superscriptions commonly introduces a divine communication.
    'The word' preserves the conventional prophetic idiom without over-paraphrasing.
- source_word: אֲשֶׁר הָיָה עַל
  chosen: that came to
  alternatives:
  - that was to
  - that came upon
  lexicon: HALOT
  rationale: The idiom היה על with a prophet often means a word 'came to/upon' someone.
    'Came to' is natural English and fits prophetic formula usage while avoiding an
    overly literal but awkward 'was upon.'
- source_word: יִרְמְיָהוּ
  chosen: Yirmeyahu
  alternatives:
  - Jeremiah
  rationale: Per philosophy, personal names are transliterated rather than translated
    by tradition. 'Yirmeyahu' reflects the Hebrew name more directly.
- source_word: עַל כָּל עַם יְהוּדָה
  chosen: concerning all the people of Judah
  alternatives:
  - against all the people of Judah
  - about all the people of Judah
  lexicon: HALOT
  rationale: The preposition על can mean 'concerning' or 'against' depending on context.
    Here the verse introduces the scope of the oracle rather than yet stating its
    hostile force, so 'concerning' is the broadest and least interpretively loaded
    rendering.
- source_word: בַּשָּׁנָה הָרְבִעִית
  chosen: in the fourth year
  lexicon: HALOT
  rationale: Straightforward temporal dating formula.
- source_word: לִיהוֹיָקִים
  chosen: of Jehoiakim
  alternatives:
  - belonging to Jehoiakim
  rationale: 'The prefixed ל in regnal dating is idiomatically rendered ''of'' in
    English: ''the fourth year of Jehoiakim.'''
- source_word: בֶּן יֹאשִׁיָּהוּ
  chosen: son of Josiah
  rationale: Standard genealogical expression.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  rationale: Standard royal title.
- source_word: הִיא
  chosen: it was
  alternatives:
  - that was
  - which was
  lexicon: HALOT
  rationale: The pronoun resumes and identifies the previously mentioned year. 'It
    was' is idiomatic English.
- source_word: הַשָּׁנָה הָרִאשֹׁנִית
  chosen: the first year
  lexicon: HALOT
  rationale: Simple chronological identification.
- source_word: לִנְבוּכַדְרֶאצַּר
  chosen: of Nebuchadnezzar
  alternatives:
  - for Nebuchadnezzar
  rationale: As with Jehoiakim, the ל marks regnal dating and is best rendered idiomatically
    as 'of.' The conventional English form 'Nebuchadnezzar' is used for recognizability.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  rationale: Standard royal title.
