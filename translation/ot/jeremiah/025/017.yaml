id: JER.25.17
reference: Jeremiah 25:17
source:
  edition: WLC
  text: וָ/אֶקַּ֥ח אֶת הַ/כּ֖וֹס מִ/יַּ֣ד יְהוָ֑ה וָֽ/אַשְׁקֶה֙ אֶת כָּל הַ/גּוֹיִ֔ם אֲשֶׁר שְׁלָחַ֥/נִי יְהוָ֖ה אֲלֵי/הֶֽם־־־־׃
translation:
  text: So I took the cup from the hand of Yahweh and made all the nations to whom Yahweh had sent me drink.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the hand of the LORD,'' an idiom expressing direct receipt from him.'
    reason: cultural_note
  - marker: b
    text: 'Or ''and gave all the nations to drink''; the Hebrew verb is causative: ''made/caused to drink.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶקַּח
  chosen: So I took
  alternatives:
  - Then I took
  - And I took
  lexicon: HALOT
  rationale: Qal wayyiqtol of לקח, narrating the next action in sequence. 'So I took' gives natural English narrative flow while preserving the consecutive force.
- source_word: הַכּוֹס
  chosen: the cup
  lexicon: HALOT
  rationale: Straightforward rendering of כּוֹס. The definite article is retained. In context this is the cup of wrath from the previous verse, but that should not be imported here beyond 'the cup'.
- source_word: מִיַּד יְהוָה
  chosen: from the hand of the LORD
  alternatives:
  - from the LORD
  lexicon: HALOT
  rationale: The idiom literally includes 'hand,' and retaining it preserves the vivid source-language imagery. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וָאַשְׁקֶה
  chosen: and made ... drink
  alternatives:
  - and gave ... to drink
  - and caused ... to drink
  lexicon: HALOT
  rationale: Hiphil of שׁקה is causative. 'Made ... drink' is concise, natural English that preserves the causative sense better than a simple 'gave to drink.'
- source_word: כָּל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the foreign nations addressed in the oracle sequence, so 'nations' is the most contextually precise rendering.
- source_word: אֲשֶׁר שְׁלָחַנִי יְהוָה אֲלֵיהֶם
  chosen: to whom the LORD had sent me
  alternatives:
  - whom the LORD sent me to
  - to which the LORD had sent me
  lexicon: HALOT
  rationale: 'This relative clause modifies ''all the nations.'' English idiom is smoother with fronted preposition: ''to whom the LORD had sent me.'' The past perfect helps show the sending as prior to the making-drink action, though simple past would also be possible.'
