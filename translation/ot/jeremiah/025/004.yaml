id: JER.25.4
reference: Jeremiah 25:4
source:
  edition: WLC
  text: וְ/שָׁלַח֩ יְהוָ֨ה אֲלֵי/כֶ֜ם אֶֽת כָּל עֲבָדָ֧י/ו הַ/נְּבִאִ֛ים הַשְׁכֵּ֥ם וְ/שָׁלֹ֖חַ וְ/לֹ֣א שְׁמַעְתֶּ֑ם וְ/לֹֽא הִטִּיתֶ֥ם אֶֽת אָזְנְ/כֶ֖ם לִ/שְׁמֹֽעַ־־־־׃
translation:
  text: And Yahweh sent to you all his servants the prophets, rising early and sending them, but you did not listen, nor did you incline your ear to hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''rising early and sending'' — an idiom expressing repeated, earnest sending of the prophets.'
    reason: cultural_note
lexical_decisions:
- source_word: וְשָׁלַח
  chosen: And ... sent
  alternatives:
  - has sent
  - had sent
  lexicon: HALOT
  rationale: Qal perfect 3ms with prefixed conjunction; in prophetic narrative this is best rendered as a simple past, coordinated with the following clause.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for the divine name, following established English convention and reverential substitution.
- source_word: אֲלֵיכֶם
  chosen: to you
  alternatives:
  - unto you
  lexicon: HALOT
  rationale: Directional preposition with 2mp suffix; idiomatic modern English is 'to you'.
- source_word: כָּל עֲבָדָיו
  chosen: all his servants
  alternatives:
  - all his slaves
  lexicon: HALOT
  rationale: Although עבד can denote slave/servant, in the idiom 'my/his servants the prophets' it functions as an honorific designation for commissioned agents of God rather than emphasizing bonded status; 'servants' is the most natural and contextually accurate rendering.
- source_word: הַנְּבִאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Appositional to 'his servants,' specifying who those servants are.
- source_word: הַשְׁכֵּם וְשָׁלֹחַ
  chosen: rising early and sending them
  alternatives:
  - persistently sending
  - sending again and again
  - rising early to send
  lexicon: HALOT
  rationale: This Hebrew idiom combines the Hiphil infinitive absolute of שׁכם with a Qal infinitive absolute of שלח to express repeated, eager action. 'Rising early and sending them' preserves the imagery and the idiomatic force. 'Them' is supplied in English because the object 'the prophets' is already stated and the sending action clearly refers to them.
- source_word: וְלֹא שְׁמַעְתֶּם
  chosen: but you did not listen
  alternatives:
  - and you did not hear
  - yet you did not listen
  lexicon: HALOT
  rationale: שׁמע in this context means responsive hearing/obedience rather than mere auditory perception. 'Listen' best fits the prophetic rebuke. 'But' brings out the adversative force in English.
- source_word: וְלֹא הִטִּיתֶם אֶת אָזְנְכֶם
  chosen: nor did you incline your ear
  alternatives:
  - nor did you pay attention
  - nor did you turn your ear
  lexicon: HALOT
  rationale: A Hebrew idiom for attentive listening. 'Incline your ear' preserves the metaphor while remaining understandable in modern English.
- source_word: לִשְׁמֹעַ
  chosen: to hear
  alternatives:
  - to listen
  - to obey
  lexicon: HALOT
  rationale: Following the idiom 'incline the ear to hear,' 'to hear' is the most literal and natural completion in English, while the broader sense of heedfulness remains implicit.
