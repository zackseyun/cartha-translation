theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse names Israel's covenant God as the agent of judgment. Following
    the project's stated policy for יְהוָה, the main text uses 'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to interpret shepherd/flock language explicitly as political rulers
    and people
  chosen_reading: Preserve the metaphor in the main text ('shepherds,' 'leaders of
    the flock,' 'pasture')
  alternative_readings:
  - Render interpretively as 'rulers' and 'their people/land'
  rationale: Jeremiah often uses shepherd imagery for leaders, but the Hebrew here
    is fully metaphorical and coherent as written. Preserving the imagery maintains
    the prophetic texture and avoids importing an interpretive gloss into the main
    text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy;
    Preserve theological tension rather than resolve it'
