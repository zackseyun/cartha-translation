id: JER.25.36
reference: Jeremiah 25:36
source:
  edition: WLC
  text: ק֚וֹל צַעֲקַ֣ת הָֽ/רֹעִ֔ים וִֽ/ילְלַ֖ת אַדִּירֵ֣י הַ/צֹּ֑אן כִּֽי שֹׁדֵ֥ד
    יְהוָ֖ה אֶת מַרְעִיתָֽ/ם־־׃
translation:
  text: The sound of the cry of the shepherds, and the wailing of the leaders of the
    flock, for the LORD is devastating their pasture.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the mighty ones of the flock' or 'the nobles of the flock.'
    reason: lexical_alternative
  - marker: b
    text: The shepherd/flock imagery likely refers metaphorically to rulers and those
      under their care.
    reason: cultural_note
lexical_decisions:
- source_word: ק֚וֹל
  chosen: The sound of
  alternatives:
  - A sound of
  - The voice of
  lexicon: HALOT
  rationale: קוֹל commonly denotes sound, voice, or noise. Here it introduces the
    audible phenomenon that follows ('cry' and 'wailing'), so 'The sound of' is natural
    English while preserving the sensory emphasis.
- source_word: צַעֲקַ֣ת
  chosen: the cry
  alternatives:
  - the outcry
  - the shouting
  lexicon: HALOT
  rationale: From צעק, denoting a cry or outcry, often in distress. 'Cry' best fits
    the lament context and pairs well with 'wailing' in the next phrase.
- source_word: הָרֹעִים
  chosen: the shepherds
  alternatives:
  - the pastors
  - the herdsmen
  lexicon: HALOT
  rationale: Though metaphorical for rulers in context, the Hebrew image is 'shepherds.'
    Retaining 'shepherds' preserves the prophetic metaphor rather than flattening
    it into an interpretation.
- source_word: וִילְלַת
  chosen: and the wailing
  alternatives:
  - and the howling
  - and the lament
  lexicon: HALOT
  rationale: From ילל, a term for lamenting or howling in grief. 'Wailing' communicates
    intense mourning in idiomatic modern English without sounding animalistic.
- source_word: אַדִּירֵי הַצֹּאן
  chosen: the leaders of the flock
  alternatives:
  - the mighty ones of the flock
  - the nobles of the flock
  lexicon: HALOT
  rationale: אַדִּירִים means mighty ones, nobles, or leaders. In this shepherd/flock
    metaphor, 'leaders of the flock' conveys status and function clearly in English
    while preserving the flock imagery.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the cry and wailing. 'For' is concise and fits
    prophetic style.
- source_word: שֹׁדֵד
  chosen: is devastating
  alternatives:
  - is laying waste to
  - is plundering
  - has devastated
  lexicon: HALOT
  rationale: The participle of שׁדד conveys violent ruining, ravaging, or laying waste.
    'Is devastating' captures the ongoing force of the participle in readable modern
    English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: מַרְעִיתָם
  chosen: their pasture
  alternatives:
  - their grazing place
  - their pastureland
  lexicon: HALOT
  rationale: מַרְעִית denotes pasture or grazing place. 'Their pasture' preserves
    the shepherd/flock imagery and likely refers metaphorically to the realm or place
    in which they fed the flock.
