theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD,' following the stated doctrine
    and translation policy. This also matches the prophetic formula 'declares the
    LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether בְּמַעֲשֵׂה יְדֵיכֶם should be made explicit as idolatry
  chosen_reading: by the work of your hands
  alternative_readings:
  - by the idols your hands made
  - by what your hands have made
  rationale: Although the idiom often refers to idols in Jeremiah, this verse does
    not explicitly name idols. To avoid importing a doctrinally or interpretively
    sharpened claim beyond the wording, the translation keeps the broader idiom in
    the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Never import doctrinal
    claims the text does not make; original-language primacy'
