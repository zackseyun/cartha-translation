id: JER.25.7
reference: Jeremiah 25:7
source:
  edition: WLC
  text: וְ/לֹֽא שְׁמַעְתֶּ֥ם אֵלַ֖/י נְאֻם יְהוָ֑ה לְמַ֧עַן הכעסו/ני בְּ/מַעֲשֵׂ֥ה
    יְדֵי/כֶ֖ם לְ/רַ֥ע לָ/כֶֽם־־׃ס
translation:
  text: Yet you did not listen to me, declares the LORD, so as to provoke me to anger
    by the work of your hands, to your own harm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the works of your hands'; the phrase often refers to idols or idolatrous
      works in Jeremiah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: Yet ... not
  alternatives:
  - And ... not
  - But ... not
  lexicon: HALOT
  rationale: The conjunction plus negation continues the indictment with adversative
    force in context. 'Yet' captures the contrast with the repeated prophetic appeals
    in the surrounding passage better than a simple 'and not,' while remaining close
    to the Hebrew.
- source_word: שְׁמַעְתֶּם
  chosen: you did not listen
  alternatives:
  - you did not hear
  - you did not obey
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey. Here the object is 'to me,' referring
    to prophetic speech from God. 'Listen' preserves the auditory/receptive sense
    without over-interpreting as full obedience, though disobedience is implied.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - to me/my voice
  lexicon: HALOT
  rationale: Directly renders the preposition plus first-person suffix. 'To me' is
    the plain sense.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - utterance of the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Declares the LORD' is idiomatic modern
    English and preserves the solemn prophetic force. Per doctrine, יְהוָה is rendered
    'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance
    with DOCTRINE.md.
- source_word: לְמַעַן
  chosen: so as to
  alternatives:
  - in order to
  - with the result that
  lexicon: HALOT
  rationale: למען can mark purpose or result. In this rebuke it likely expresses resultant
    tendency from their refusal, but 'so as to' preserves the Hebrew linkage without
    forcing a strict philosophical distinction between purpose and result.
- source_word: הַכְעִסוּנִי
  chosen: provoke me to anger
  alternatives:
  - anger me
  - provoke me
  lexicon: HALOT
  rationale: From כעס in the causative stem, meaning to vex or provoke to anger. 'Provoke
    me to anger' makes the causative nuance explicit and fits prophetic diction.
- source_word: בְּמַעֲשֵׂה יְדֵיכֶם
  chosen: by the work of your hands
  alternatives:
  - by the works of your hands
  - with what your hands have made
  lexicon: HALOT
  rationale: A common idiom for human-made objects or deeds, often especially idols.
    Singular 'work' reflects the Hebrew construct singular, while still functioning
    collectively in English. The phrase is left somewhat literal to preserve the idiom's
    resonance.
- source_word: לְרַע לָכֶם
  chosen: to your own harm
  alternatives:
  - for your harm
  - to your hurt
  - for evil to yourselves
  lexicon: HALOT
  rationale: The phrase indicates detrimental consequence falling back on the people
    themselves. 'To your own harm' is natural English and preserves the reflexive
    sense that their actions injure themselves.
