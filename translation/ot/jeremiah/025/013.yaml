id: JER.25.13
reference: Jeremiah 25:13
source:
  edition: WLC
  text: ו/הבאיתי עַל הָ/אָ֣רֶץ הַ/הִ֔יא אֶת כָּל דְּבָרַ֖/י אֲשֶׁר דִּבַּ֣רְתִּי עָלֶ֑י/הָ
    אֵ֤ת כָּל הַ/כָּתוּב֙ בַּ/סֵּ֣פֶר הַ/זֶּ֔ה אֲשֶׁר נִבָּ֥א יִרְמְיָ֖הוּ עַל כָּל
    הַ/גּוֹיִֽם־־־־־־־־׃
translation:
  text: And I will bring upon that land all my words that I have spoken against it—all
    that is written in this book, which Jeremiah prophesied against all the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'concerning all the nations.' The Hebrew preposition can be rendered
      more broadly, though here the context favors 'against.'
    reason: alternative_reading
  - marker: b
    text: Or 'in this scroll.' The Hebrew word can refer to a written scroll or book.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבֵאתִי
  chosen: And I will bring
  alternatives:
  - And I will bring about
  - And I will bring upon
  lexicon: HALOT
  rationale: 'Hiphil of בוא with future sense in context: YHWH will cause the announced
    judgments to come. ''Bring'' is natural English; the following prepositional phrase
    ''upon that land'' carries the force of what is brought.'
- source_word: עַל הָאָרֶץ הַהִיא
  chosen: upon that land
  alternatives:
  - against that land
  - on that land
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the territorial entity under judgment, best rendered
    'land' rather than 'earth.' עַל with verbs of bringing judgment is idiomatically
    'upon.'
- source_word: אֶת כָּל דְּבָרַי
  chosen: all my words
  alternatives:
  - all my sayings
  - all my declarations
  lexicon: HALOT
  rationale: דְּבָרַי is retained as 'words' to preserve the link between divine speech
    and its fulfillment. In prophetic context this includes announced judgments, but
    'words' is the more textually transparent rendering.
- source_word: אֲשֶׁר דִּבַּרְתִּי עָלֶיהָ
  chosen: that I have spoken against it
  alternatives:
  - that I spoke against it
  - which I declared against it
  lexicon: HALOT
  rationale: The perfect can be rendered with English present perfect to connect prior
    prophetic speech with impending fulfillment. 'Against it' reflects עַל in a hostile/judicial
    sense.
- source_word: אֵת כָּל הַכָּתוּב
  chosen: all that is written
  alternatives:
  - everything written
  - the whole of what is written
  lexicon: HALOT
  rationale: The construction points to the totality of the written content. 'All
    that is written' is idiomatic and preserves the comprehensiveness of the judgment
    record.
- source_word: בַּסֵּפֶר הַזֶּה
  chosen: in this book
  alternatives:
  - in this scroll
  lexicon: HALOT
  rationale: סֵפֶר can denote a scroll/book. 'Book' is acceptable modern English and
    readable; 'scroll' is possible historically, but the verse's sense does not depend
    on the writing medium.
- source_word: אֲשֶׁר נִבָּא יִרְמְיָהוּ
  chosen: which Jeremiah prophesied
  alternatives:
  - which Jeremiah spoke as a prophet
  - which was prophesied by Jeremiah
  lexicon: HALOT
  rationale: נבא in the Niphal commonly means 'to prophesy.' Rendering actively with
    Jeremiah as subject is straightforward and natural in English.
- source_word: עַל כָּל הַגּוֹיִם
  chosen: against all the nations
  alternatives:
  - concerning all the nations
  - about all the nations
  lexicon: HALOT
  rationale: עַל with נבא can mean 'concerning,' but in this judgment context 'against'
    better captures the adversative force of the oracles in Jeremiah 46–51 and the
    immediate context of announced punishment.
