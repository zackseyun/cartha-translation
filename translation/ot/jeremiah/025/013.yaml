theological_decisions:
- issue: Scope of prophetic oracles in the closing clause
  chosen_reading: against all the nations
  alternative_readings:
  - concerning all the nations
  rationale: The Hebrew preposition עַל with נבא can be broader than adversative,
    but the literary context is one of judgment oracles and announced punishment.
    Rendering 'against' preserves the judicial force without adding doctrinal content
    beyond the text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
