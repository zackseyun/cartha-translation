id: JER.25.29
reference: Jeremiah 25:29
source:
  edition: WLC
  text: כִּי֩ הִנֵּ֨ה בָ/עִ֜יר אֲשֶׁ֧ר נִֽקְרָא שְׁמִ֣/י עָלֶ֗י/הָ אָֽנֹכִי֙ מֵחֵ֣ל לְ/הָרַ֔ע וְ/אַתֶּ֖ם הִנָּקֵ֣ה תִנָּק֑וּ לֹ֣א תִנָּק֔וּ כִּ֣י חֶ֗רֶב אֲנִ֤י קֹרֵא֙ עַל כָּל יֹשְׁבֵ֣י הָ/אָ֔רֶץ נְאֻ֖ם יְהוָ֥ה צְבָאֽוֹת־־־׃
translation:
  text: For behold, in the city over which my name is called, I am beginning to bring harm, and shall you indeed go unpunished? You shall not go unpunished, for I am calling for a sword against all the inhabitants of the earth, declares Yahweh of hosts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the city that is called by my name.' The Hebrew idiom is literally 'the city over which my name is called.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all the inhabitants of the land.' Hebrew אֶרֶץ can mean either 'land' or 'earth'; here 'earth' is taken as the broader sense in context.
    reason: alternative_reading
lexical_decisions:
- source_word: בָעִיר אֲשֶׁר נִקְרָא שְׁמִי עָלֶיהָ
  chosen: in the city over which my name is called
  alternatives:
  - in the city that is called by my name
  - in the city upon which my name is called
  lexicon: HALOT
  rationale: The idiom נִקְרָא שֵׁם עַל commonly means that a name is invoked over or attached to someone/something as a mark of belonging. 'Over which my name is called' preserves the Hebrew imagery more closely than the smoother English idiom 'called by my name,' while remaining intelligible.
- source_word: מֵחֵל לְהָרַע
  chosen: am beginning to bring harm
  alternatives:
  - beginning to do evil
  - beginning to bring disaster
  lexicon: HALOT
  rationale: 'The infinitive/participle construction marks inception: ''beginning.'' The verb רעה in the Hiphil here refers not to moral evil by God but to calamity/harm brought in judgment. ''Bring harm'' avoids implying moral wrongdoing while staying closer than the more interpretive ''bring disaster.'''
- source_word: הִנָּקֵה תִנָּקוּ
  chosen: shall you indeed go unpunished?
  alternatives:
  - will you surely be acquitted?
  - shall you completely escape punishment?
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the question. נקה in the Niphal in judgment contexts means to be left unpunished/acquitted. 'Go unpunished' best fits the forensic-judicial sense in natural English.
- source_word: לֹא תִנָּקוּ
  chosen: You shall not go unpunished
  alternatives:
  - You will not be acquitted
  - You shall certainly not escape punishment
  lexicon: HALOT
  rationale: This directly negates the prior rhetorical question and keeps the same English gloss for consistency with נקה in the preceding clause.
- source_word: חֶרֶב אֲנִי קֹרֵא
  chosen: I am calling for a sword
  alternatives:
  - I am summoning a sword
  - I call the sword
  lexicon: HALOT
  rationale: קרא with 'sword' personifies the sword as an agent of judgment being summoned. 'Calling for a sword' preserves the vivid idiom while remaining readable. 'Sword' is retained rather than generalized to 'war' to preserve the concrete metaphor.
- source_word: כָּל יֹשְׁבֵי הָאָרֶץ
  chosen: all the inhabitants of the earth
  alternatives:
  - all the inhabitants of the land
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth.' In this context of judgment extending beyond Jerusalem to the nations in the surrounding oracle, 'earth' better captures the universal scope. The alternative 'land' is worth preserving because Hebrew usage can be regional in some contexts.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  chosen: declares the LORD of hosts
  alternatives:
  - oracle of the LORD of hosts
  - declares Yahweh of hosts
  lexicon: HALOT
  rationale: נְאֻם is a prophetic declaration formula well rendered by 'declares.' Per doctrine, יְהוָה is rendered 'the LORD.' 'Of hosts' preserves the traditional and semantically rich title צְבָאוֹת without flattening it to 'armies.'
