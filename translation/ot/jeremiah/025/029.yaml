theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether לְהָרַע attributes moral evil to God
  chosen_reading: bring harm
  alternative_readings:
  - do evil
  - bring disaster
  rationale: The Hebrew verb can denote calamity in judgment contexts. Rendering it as 'bring harm' preserves divine judgment without implying that God commits moral evil, which would overread English connotations rather than the Hebrew judicial sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
