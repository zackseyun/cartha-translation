id: JER.25.8
reference: Jeremiah 25:8
source:
  edition: WLC
  text: לָ/כֵ֕ן כֹּ֥ה אָמַ֖ר יְהוָ֣ה צְבָא֑וֹת יַ֕עַן אֲשֶׁ֥ר לֹֽא שְׁמַעְתֶּ֖ם אֶת
    דְּבָרָֽ/י־־׃
translation:
  text: 'Therefore, thus says the LORD of hosts: Because you have not listened to
    my words,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH of hosts.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'have not obeyed my words.' The Hebrew verb can carry the sense of hearing
      with obedient response.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks a consequential transition from the preceding indictment; 'Therefore'
    is a natural and sufficiently formal English equivalent.
- source_word: כֹּה
  chosen: thus
  alternatives:
  - this is what
  lexicon: HALOT
  rationale: In the prophetic messenger formula כֹּה אָמַר, 'thus' preserves the formal
    prophetic cadence without becoming archaic in this context.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: Although morphologically perfect, in prophetic speech formulas English
    idiom commonly uses the present 'says' to introduce a solemn divine declaration.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD' in keeping with Jewish reverence tradition and the Septuagintal pattern.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: The title יְהוָה צְבָאוֹת is conventionally and accurately rendered 'the
    LORD of hosts'; 'hosts' preserves the breadth of heavenly and earthly forces better
    than the narrower 'armies'.
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Because that
  - Inasmuch as
  lexicon: HALOT
  rationale: The paired conjunction introduces the reason for the announced judgment;
    'Because' is concise, natural English that captures the causal force.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Straightforward negation.
- source_word: שְׁמַעְתֶּם
  chosen: have not listened
  alternatives:
  - did not listen
  - have not obeyed
  lexicon: HALOT
  rationale: שׁמע can mean hear/listen/obey. Here 'listened' best matches the direct
    object 'my words' while still allowing the implied disobedience to be felt. Present
    perfect fits the causal relation to the current pronouncement.
- source_word: אֶת דְּבָרַי
  chosen: to my words
  alternatives:
  - my words
  - what I said
  lexicon: HALOT
  rationale: With שׁמע, English idiom normally uses 'listen to.' 'My words' stays
    close to the Hebrew דְּבָרַי and avoids unnecessary paraphrase.
