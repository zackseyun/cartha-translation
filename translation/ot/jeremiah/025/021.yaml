id: JER.25.21
reference: Jeremiah 25:21
source:
  edition: WLC
  text: אֶת אֱד֥וֹם וְ/אֶת מוֹאָ֖ב וְ/אֶת בְּנֵ֥י עַמּֽוֹן־־־׃
translation:
  text: Edom, Moab, and the sons of Ammon;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Ammonites” (literally, “the sons of Ammon”).
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱדוֹם
  chosen: Edom
  alternatives:
  - Edomites
  lexicon: HALOT
  rationale: Proper national/place name; transliterated rather than converted to a
    people-term. In this judgment-oracle list, the object is the nation identified
    by its standard name.
- source_word: מוֹאָב
  chosen: Moab
  alternatives:
  - Moabites
  lexicon: HALOT
  rationale: Proper national/place name; transliterated in keeping with the philosophy
    of transliterating names. 'Moabites' would shift from the named polity/land to
    the people and is less direct here.
- source_word: בְּנֵי עַמּוֹן
  chosen: the sons of Ammon
  alternatives:
  - the Ammonites
  - the children of Ammon
  lexicon: HALOT
  rationale: Literally 'sons of Ammon.' Because the Hebrew uses the kinship expression
    rather than the simple ethnicon, the draft preserves that form. 'Ammonites' is
    idiomatic English and a viable alternative, but the more formal rendering better
    reflects the source wording while remaining understandable.
- source_word: אֶת ... וְאֶת ... וְאֶת
  chosen: '[direct objects carried into English as simple list items]'
  lexicon: Hebrew grammar
  rationale: The repeated object marker אֶת has no direct English equivalent and is
    naturally omitted. The conjunctions are represented by 'and' in the final item
    of the list, which is standard English style for a series.
