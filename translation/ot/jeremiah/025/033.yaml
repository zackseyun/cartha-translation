id: JER.25.33
reference: Jeremiah 25:33
source:
  edition: WLC
  text: וְ/הָי֞וּ חַֽלְלֵ֤י יְהוָה֙ בַּ/יּ֣וֹם הַ/ה֔וּא מִ/קְצֵ֥ה הָ/אָ֖רֶץ וְ/עַד קְצֵ֣ה הָ/אָ֑רֶץ לֹ֣א יִסָּפְד֗וּ וְ/לֹ֤א יֵאָֽסְפוּ֙ וְ/לֹ֣א יִקָּבֵ֔רוּ לְ/דֹ֛מֶן עַל פְּנֵ֥י הָ/אֲדָמָ֖ה יִֽהְיֽוּ־־׃
translation:
  text: And the slain of Yahweh on that day will be from one end of the earth to the other end of the earth. They will not be mourned, or gathered, or buried; they will be like dung on the surface of the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those slain by the LORD.' The Hebrew phrase can make the LORD’s agency in the slaughter more explicit.
    reason: alternative_reading
  - marker: b
    text: Or 'from one end of the land to the other end of the land.' Hebrew אֶרֶץ can mean 'land' or 'earth'; here 'earth' is preferred because of the oracle’s broad scope.
    reason: lexical_alternative
  - marker: c
    text: Literally 'on the face of the ground.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַלְלֵי יְהוָה
  chosen: the slain of the LORD
  alternatives:
  - those slain by the LORD
  - the LORD’s slain
  lexicon: HALOT
  rationale: חַֽלְלֵי is the plural construct of 'slain' or 'pierced/killed ones.' In construct with יְהוָה, the phrase most naturally means those belonging to the LORD in the sense of being slain under his judgment, not people devoted to him. 'The slain of the LORD' preserves the Hebrew compactness and the judicial force without over-paraphrasing.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal rendering; 'on that day' is idiomatic modern English and preserves prophetic register.
- source_word: מִקְצֵה הָאָרֶץ וְעַד קְצֵה הָאָרֶץ
  chosen: from one end of the earth even to the other end of the earth
  alternatives:
  - from one end of the land to the other end of the land
  - from one end of the earth to the other
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' Here the universal scope of judgment in context supports 'earth' rather than a local 'land.' 'Even to the other end' reflects the emphatic merism and keeps the solemn cadence.
- source_word: לֹא יִסָּפְדוּ
  chosen: they will not be mourned
  alternatives:
  - they will not be lamented for
  lexicon: HALOT
  rationale: The Niphal of ספד denotes receiving mourning or lamentation. 'Mourned' is natural English and sufficiently formal.
- source_word: וְלֹא יֵאָסְפוּ
  chosen: or gathered
  alternatives:
  - or collected
  - or taken away
  lexicon: HALOT
  rationale: The passive/reflexive sense here refers to corpses being gathered up after battle or disaster. 'Gathered' is concise and fits the burial sequence.
- source_word: וְלֹא יִקָּבֵרוּ
  chosen: or buried
  lexicon: HALOT
  rationale: Straightforward passive of קבר; 'buried' is the natural equivalent.
- source_word: לְדֹמֶן
  chosen: dung
  alternatives:
  - manure
  - refuse
  lexicon: HALOT
  rationale: דֹמֶן denotes dung/manure. 'Dung' best preserves the shock and degradation of the image in prophetic judgment language.
- source_word: עַל־פְּנֵי הָאֲדָמָה
  chosen: on the surface of the ground
  alternatives:
  - on the face of the ground
  - upon the ground
  lexicon: HALOT
  rationale: Literally 'on the face of the ground.' 'On the surface of the ground' preserves the concrete imagery while sounding natural in modern English.
- source_word: יִהְיוּ
  chosen: they will become
  alternatives:
  - they will be
  lexicon: HALOT
  rationale: Although היה often simply means 'be,' in this resultative clause after לְדֹמֶן, English idiom is better served by 'become dung,' expressing the outcome of remaining unburied without implying a metaphysical transformation.
