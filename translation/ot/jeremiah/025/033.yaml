theological_decisions:
- issue: Scope of אֶרֶץ
  chosen_reading: earth
  alternative_readings:
  - land
  rationale: The verse depicts sweeping divine judgment 'from one end ... to the other,' and the broader oracle addresses the nations, so 'earth' better conveys the intended breadth. 'Land' remains lexically possible but is less likely in this context.
- issue: Force of construct phrase חַלְלֵי יְהוָה
  chosen_reading: the slain of Yahweh
  alternative_readings:
  - those slain by the LORD
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
