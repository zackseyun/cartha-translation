theological_decisions:
- issue: Divine judgment language in juridical imagery
  chosen_reading: The verse is rendered with explicit legal/judicial language ('has
    a case,' 'entering into judgment') rather than softened general conflict language.
  alternative_readings:
  - The LORD has a controversy with the nations
  - The LORD is judging the nations
  rationale: The Hebrew combines ריב and נשפט, both of which strongly suggest a forensic
    setting. Preserving that tension reflects the text's portrayal of God as both
    plaintiff and judge without importing a narrower systematic-theological scheme.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Scope of כָל־בָּשָׂר
  chosen_reading: Rendered 'all flesh' in the main text.
  alternative_readings:
  - all humanity
  - everyone
  rationale: This preserves the biblical idiom and universal scope of judgment while
    avoiding unnecessary interpretive narrowing. A lexical alternative is preserved
    in a footnote for accessibility.
  doctrine_reference: Translation philosophy §§3, 6
