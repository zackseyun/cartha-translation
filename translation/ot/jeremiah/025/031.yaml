id: JER.25.31
reference: Jeremiah 25:31
source:
  edition: WLC
  text: בָּ֤א שָׁאוֹן֙ עַד קְצֵ֣ה הָ/אָ֔רֶץ כִּ֣י רִ֤יב לַֽ/יהוָה֙ בַּ/גּוֹיִ֔ם נִשְׁפָּ֥ט
    ה֖וּא לְ/כָל בָּשָׂ֑ר הָ/רְשָׁעִ֛ים נְתָנָ֥/ם לַ/חֶ֖רֶב נְאֻם יְהוָֽה־־־׃ס
translation:
  text: An uproar has come to the ends of the earth, for the LORD has a case against
    the nations; he is entering into judgment with all flesh. He has given the wicked
    to the sword, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tumult' or 'roar' for 'uproar.'
    reason: lexical_alternative
  - marker: b
    text: '''Has a case against'' renders a Hebrew legal term that can also be translated
      ''has a controversy with'' or ''has a lawsuit against.'''
    reason: lexical_alternative
  - marker: c
    text: '''All flesh'' is a Hebrew idiom meaning all humanity.'
    reason: lexical_alternative
  - marker: d
    text: Or 'has handed them over to the sword.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁאוֹן
  chosen: uproar
  alternatives:
  - tumult
  - noise
  - roar
  lexicon: HALOT
  rationale: Conveys a loud, chaotic commotion in a judgment context. 'Uproar' is
    natural English and preserves the sense better than the vaguer 'noise.'
- source_word: בָּא
  chosen: has come
  alternatives:
  - comes
  - is coming
  lexicon: HALOT
  rationale: The qatal form is rendered as a completed action in prophetic discourse.
    English present perfect communicates the vivid, imminent certainty of the event
    without flattening it into a simple past.
- source_word: עַד קְצֵה הָאָרֶץ
  chosen: to the ends of the earth
  alternatives:
  - to the end of the earth
  - to the farthest part of the earth
  lexicon: HALOT
  rationale: Idiomatic English for the Hebrew expression meaning the earth's extremities
    or full extent.
- source_word: רִיב
  chosen: a case
  alternatives:
  - a dispute
  - a controversy
  - a lawsuit
  lexicon: HALOT
  rationale: In prophetic/juridical contexts ריב often carries covenant-lawsuit or
    legal-dispute force. 'A case' preserves the legal sense in clear modern English
    without sounding overly technical.
- source_word: בַּגּוֹיִם
  chosen: against the nations
  alternatives:
  - with the nations
  - among the nations
  lexicon: HALOT
  rationale: Although the preposition is 'in/among,' English legal idiom with 'has
    a case' naturally takes 'against.' This best communicates the adversative force
    of the context.
- source_word: נִשְׁפָּט הוּא
  chosen: he is entering into judgment
  alternatives:
  - he is judging
  - he contends in judgment
  - he will plead in judgment
  lexicon: HALOT
  rationale: The Niphal of שפט here is somewhat flexible in a juridical setting. 'Entering
    into judgment' preserves the formal legal nuance and avoids reducing the phrase
    to a bare act of sentencing.
- source_word: לְכָל בָּשָׂר
  chosen: with all flesh
  alternatives:
  - with all humanity
  - with everyone
  lexicon: HALOT
  rationale: '''All flesh'' is a transparent biblical idiom for all living people.
    It preserves the source imagery and solemnity better than a flattened paraphrase.'
- source_word: הָרְשָׁעִים
  chosen: the wicked
  alternatives:
  - the guilty
  - evil people
  lexicon: HALOT
  rationale: Standard rendering for the substantival adjective, preserving the moral
    category emphasized in the verse.
- source_word: נְתָנָם לַחֶרֶב
  chosen: has given the wicked to the sword
  alternatives:
  - has handed them over to the sword
  - has delivered them to the sword
  lexicon: HALOT
  rationale: This idiom means consigning people to death by warfare. 'Given ... to
    the sword' is concise, faithful, and idiomatic in English biblical style.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in many
    English translations.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Declares the LORD' is readable modern
    English while retaining prophetic authority.
