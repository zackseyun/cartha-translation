id: JER.25.12
reference: Jeremiah 25:12
source:
  edition: WLC
  text: וְ/הָיָ֣ה כִ/מְלֹ֣אות שִׁבְעִ֣ים שָׁנָ֡ה אֶפְקֹ֣ד עַל מֶֽלֶךְ בָּבֶל֩ וְ/עַל הַ/גּ֨וֹי הַ/ה֧וּא נְאֻם יְהוָ֛ה אֶת עֲוֺנָ֖/ם וְ/עַל אֶ֣רֶץ כַּשְׂדִּ֑ים וְ/שַׂמְתִּ֥י אֹת֖/וֹ לְ/שִֽׁמְמ֥וֹת עוֹלָֽם־־־־־־׃
translation:
  text: And when seventy years are completed, I will punish the king of Babylon and that nation—oracle of Yahweh—for their iniquity, and the land of the Chaldeans, and I will make it an everlasting desolation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'declares the LORD' for 'oracle of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'desolations forever'; the English singular 'desolation' renders the Hebrew plural idiomatically.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ...
  alternatives:
  - And it shall happen
  - And it will be
  lexicon: HALOT
  rationale: Introduces a future circumstance. In English, the idiom is best carried by a temporal clause rather than a wooden 'and it shall happen.'
- source_word: כִמְלֹאות
  chosen: when ... are completed
  alternatives:
  - when ... are fulfilled
  - at the completion of
  lexicon: HALOT
  rationale: The infinitive construct of מלא with כ expresses the point at which the seventy years have run their course. 'Are completed' is natural modern English and preserves the temporal force.
- source_word: שִׁבְעִים שָׁנָה
  chosen: seventy years
  lexicon: HALOT
  rationale: Straightforward numeral + noun phrase.
- source_word: אֶפְקֹד עַל
  chosen: I will punish
  alternatives:
  - I will visit upon
  - I will attend to
  - I will call to account
  lexicon: HALOT
  rationale: פקד with עַל in judgment contexts commonly means to punish or call to account. 'Punish' is the clearest idiomatic rendering here and fits the object 'their iniquity.'
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  lexicon: HALOT
  rationale: Standard construct rendering.
- source_word: הַגּוֹי הַהוּא
  chosen: that nation
  alternatives:
  - that people
  lexicon: HALOT
  rationale: גוי here refers to Babylon as a political nation. 'Nation' better fits the geopolitical context than 'people.'
- source_word: נְאֻם יְהוָה
  chosen: oracle of the LORD
  alternatives:
  - declares the LORD
  lexicon: HALOT
  rationale: נאם יהוה is a prophetic formula. 'Oracle of the LORD' preserves its formal prophetic character; 'declares the LORD' is possible but slightly more interpretive of function than form.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name.
- source_word: אֶת עֲוֺנָם
  chosen: for their iniquity
  alternatives:
  - their guilt
  - their punishment for guilt
  lexicon: HALOT
  rationale: עון denotes iniquity/guilt and, in some contexts, its consequence. Here the most direct sense is the moral offense for which Babylon is punished. The preposition 'for' is supplied idiomatically in English after 'punish.'
- source_word: אֶרֶץ כַּשְׂדִּים
  chosen: the land of the Chaldeans
  alternatives:
  - the land of the Babylonians
  lexicon: HALOT
  rationale: Keeps the ethnic-historical term 'Chaldeans' rather than flattening it to 'Babylonians,' while remaining understandable in context.
- source_word: וְשַׂמְתִּי אֹתוֹ
  chosen: and I will make it
  alternatives:
  - and I will set it
  - and I will make them
  lexicon: HALOT
  rationale: שׂים with object + ל expresses making/appointing into a state. The singular pronoun most naturally refers to the land as the nearest singular antecedent, hence 'it.'
- source_word: לְשִׁמְמוֹת עוֹלָם
  chosen: an everlasting desolation
  alternatives:
  - everlasting desolations
  - perpetual ruins
  lexicon: HALOT
  rationale: The Hebrew plural 'desolations' is often an abstract/intensive plural in English. Singular 'desolation' is more idiomatic while preserving the sense of enduring ruin; 'everlasting' renders עולם in prophetic judgment language.
