theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of the singular pronoun אֹתוֹ in 'I will make it'
  chosen_reading: The pronoun refers primarily to 'the land of the Chaldeans.'
  alternative_readings:
  - The pronoun summarizes Babylon's king, nation, and land collectively as a single judged entity.
  rationale: 'The nearest explicit antecedent is the singular noun ''land,'' and the resulting sense is coherent: the land becomes an everlasting desolation. A collective sense is possible, but the singular land-reference is the most textually grounded in English.'
