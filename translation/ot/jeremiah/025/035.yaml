theological_decisions:
- issue: Metaphorical rendering of political leaders as shepherds and prominent flock-members
  chosen_reading: Preserve the pastoral metaphor in the main text ('shepherds' ...
    'lords of the flock')
  alternative_readings:
  - Interpret explicitly as political rulers/leaders in the main text
  rationale: The Hebrew uses sustained shepherd/flock imagery in the surrounding context
    for Judah's leaders. Preserving the metaphor follows original-language primacy
    and avoids importing an interpretive gloss into the main text.
  doctrine_reference: Translation philosophy §1, §6
