id: JER.25.35
reference: Jeremiah 25:35
source:
  edition: WLC
  text: וְ/אָבַ֥ד מָנ֖וֹס מִן הָֽ/רֹעִ֑ים וּ/פְלֵיטָ֖ה מֵ/אַדִּירֵ֥י הַ/צֹּֽאן־׃
translation:
  text: Escape has perished from the shepherds, and deliverance from the lords of
    the flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and escape from the mighty ones of the flock.'
    reason: lexical_alternative
  - marker: b
    text: '''Shepherds'' and ''flock'' are prophetic metaphors for the people''s leaders
      and the people under them.'
    reason: cultural_note
lexical_decisions:
- source_word: וְאָבַד
  chosen: has perished
  alternatives:
  - is lost
  - has vanished
  lexicon: HALOT
  rationale: Qal perfect 3ms of אבד conveys destruction/disappearance. English present
    perfect captures the prophetic announcement of a completed loss in vivid style.
    'Has perished' preserves the force better than a weaker 'is gone.'
- source_word: מָנוֹס
  chosen: escape
  alternatives:
  - refuge
  - flight
  lexicon: HALOT
  rationale: 'The noun denotes a place or possibility of fleeing/escape. ''Escape''
    is the most natural English rendering here in parallel with the following noun
    and fits the judgment context: the shepherds have no way out.'
- source_word: מִן הָרֹעִים
  chosen: from the shepherds
  alternatives:
  - for the shepherds
  - away from the shepherds
  lexicon: HALOT
  rationale: 'מן marks separation/source: escape is removed from the shepherds. ''From
    the shepherds'' is the most direct rendering. In context ''shepherds'' is metaphorical
    for leaders, but the image should be preserved in translation.'
- source_word: וּפְלֵיטָה
  chosen: deliverance
  alternatives:
  - escape
  - survivor's escape
  - way of escape
  lexicon: HALOT
  rationale: The noun can denote escape, deliverance, or remnant/survivors depending
    on context. Here it is parallel to מָנוֹס and refers to the possibility of getting
    away alive. 'Deliverance' provides slight variation while preserving the sense
    of no means of rescue.
- source_word: מֵאַדִּירֵי הַצֹּאן
  chosen: from the lords of the flock
  alternatives:
  - from the leaders of the flock
  - from the mighty ones of the flock
  - from the nobles of the flock
  lexicon: HALOT
  rationale: אַדִּירִים are majestic, mighty, or noble ones. In this prophetic metaphor
    for rulers among the people, 'lords of the flock' preserves both status and the
    flock imagery. 'Leaders' is possible but flattens the metaphor; 'mighty ones'
    is more literal but less idiomatic in English.
