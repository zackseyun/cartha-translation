id: JER.25.27
reference: Jeremiah 25:27
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֡ם כֹּֽה אָמַר֩ יְהוָ֨ה צְבָא֜וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֗ל
    שְׁת֤וּ וְ/שִׁכְרוּ֙ וּ/קְי֔וּ וְ/נִפְל֖וּ וְ/לֹ֣א תָק֑וּמוּ מִ/פְּנֵ֣י הַ/חֶ֔רֶב
    אֲשֶׁ֛ר אָנֹכִ֥י שֹׁלֵ֖חַ בֵּינֵי/כֶֽםס־׃
translation:
  text: 'You shall say to them, ‘Thus says the LORD of hosts, the God of Israel: Drink,
    and become drunk, and vomit, and fall, and do not rise, because of the sword that
    I am sending among you.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and spew' for 'and vomit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  chosen: You shall say to them
  alternatives:
  - And you shall say to them
  - You are to say to them
  lexicon: HALOT
  rationale: The waw + perfect with directive force in prophetic discourse is naturally
    rendered as a future-like command in English. 'You shall say' preserves the commissioning
    tone without sounding overly archaic.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Present-tense 'says' is idiomatic
    in English for the Hebrew formula and preserves the immediacy of divine speech.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: '''Hosts'' is the established rendering in the title יְהוָה צְבָאוֹת
    and preserves the breadth of heavenly and earthly forces under God''s command.
    ''Armies'' is possible but narrower.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase; no reason to depart from the standard
    rendering.
- source_word: שְׁתוּ
  chosen: Drink
  lexicon: HALOT
  rationale: Imperative plural; direct and literal.
- source_word: וְשִׁכְרוּ
  chosen: and become drunk
  alternatives:
  - and be drunk
  - and get drunk
  lexicon: HALOT
  rationale: The verb denotes becoming intoxicated. 'Become drunk' is slightly more
    formal and fits the sequence of imperatives without colloquial tone.
- source_word: וּקְיוּ
  chosen: and vomit
  alternatives:
  - and spew
  lexicon: HALOT
  rationale: The rare verb refers to vomiting. 'Vomit' is the clearest modern English
    equivalent; 'spew' is possible but less precise and more stylistically marked.
- source_word: וְנִפְלוּ
  chosen: and fall
  alternatives:
  - and collapse
  lexicon: HALOT
  rationale: Literal rendering fits both the drunken imagery and the judgment context.
    'Collapse' interprets more than necessary.
- source_word: וְלֹא תָקוּמוּ
  chosen: and do not rise
  alternatives:
  - and not rise again
  - and never get up
  lexicon: HALOT
  rationale: The Hebrew is simply 'and do not rise.' The context implies irreversible
    downfall, but the translation should not overstate beyond the wording.
- source_word: מִפְּנֵי הַחֶרֶב
  chosen: because of the sword
  alternatives:
  - before the sword
  - from before the sword
  lexicon: HALOT
  rationale: 'The preposition with ''face/presence'' idiomatically indicates causation
    or occasion here: their failure to rise is due to the sword. ''Because of the
    sword'' communicates the sense clearly in English.'
- source_word: אֲשֶׁר אָנֹכִי שֹׁלֵחַ בֵּינֵיכֶם
  chosen: that I am sending among you
  alternatives:
  - which I am sending in your midst
  - that I am sending against you
  lexicon: HALOT
  rationale: בֵּין with pronominal suffix is literally 'among/in the midst of you.'
    'Among you' preserves the imagery of the sword moving through the nations. 'Against
    you' captures implication but loses the spatial nuance.
