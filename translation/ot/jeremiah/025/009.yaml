theological_decisions:
- issue: Meaning of 'my servant' for Nebuchadnezzar
  chosen_reading: Nebuchadnezzar is called 'my servant' as an instrument used by the
    LORD to execute judgment.
  alternative_readings:
  - Nebuchadnezzar is called 'my servant' in a sense implying personal piety or covenant
    faithfulness.
  rationale: The immediate context is divine sovereignty over nations and the use
    of Babylon as an agent of judgment. The title should be translated literally without
    importing approval beyond the text.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Rendering of חרם
  chosen_reading: 'Translate with the technical sense preserved: ''devote them to
    destruction.'''
  alternative_readings:
  - Render simply 'destroy them completely'.
  rationale: This keeps the theological and cultic weight of the Hebrew term without
    resorting to unexplained jargon like 'put under the ban.'
  doctrine_reference: Translation philosophy §§1, 6
