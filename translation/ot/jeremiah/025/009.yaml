id: JER.25.9
reference: Jeremiah 25:9
source:
  edition: WLC
  text: הִנְ/נִ֣י שֹׁלֵ֡חַ וְ/לָקַחְתִּי֩ אֶת כָּל מִשְׁפְּח֨וֹת צָפ֜וֹן נְאֻם יְהוָ֗ה
    וְ/אֶל נְבֽוּכַדְרֶאצַּ֣ר מֶֽלֶךְ בָּבֶל֮ עַבְדִּ/י֒ וַ/הֲבִ֨אֹתִ֜י/ם עַל הָ/אָ֤רֶץ
    הַ/זֹּאת֙ וְ/עַל יֹ֣שְׁבֶ֔י/הָ וְ/עַ֛ל כָּל הַ/גּוֹיִ֥ם הָ/אֵ֖לֶּה סָבִ֑יב וְ/הַ֣חֲרַמְתִּ֔י/ם
    וְ/שַׂמְתִּי/ם֙ לְ/שַׁמָּ֣ה וְ/לִ/שְׁרֵקָ֔ה וּ/לְ/חָרְב֖וֹת עוֹלָֽם־־־־־־־־׃
translation:
  text: Look, I am sending for and taking all the clans of the north, declares the
    LORD, and for Nebuchadnezzar king of Babylon, my servant, and I will bring them
    against this land and against its inhabitants and against all these surrounding
    nations. I will devote them to destruction and make them a horror, a hissing,
    and everlasting ruins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will utterly destroy them'; the Hebrew verb can denote putting people
      or things under the ban, that is, devoting them to destruction.
    reason: lexical_alternative
  - marker: b
    text: '''My servant'' here identifies Nebuchadnezzar as an instrument of the LORD''s
      purpose, not necessarily as a faithful worshiper.'
    reason: cultural_note
  - marker: c
    text: Or 'a desolation' for 'a horror.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Look
  alternatives:
  - Behold
  - Here I am
  lexicon: HALOT
  rationale: Introduces a solemn divine announcement. 'Look' preserves the deictic
    force in readable modern English better than archaic 'Behold,' while 'Here I am'
    would sound self-identificational rather than attention-getting in this context.
- source_word: שֹׁלֵחַ וְלָקַחְתִּי
  chosen: I am sending for and taking
  alternatives:
  - I am sending and taking
  - I will send for and take
  lexicon: HALOT
  rationale: The participle plus perfect in prophetic speech conveys imminent, certain
    action. 'Sending for and taking' reflects the idiom of summoning/gathering peoples.
    Using present-progressive plus coordinated verb preserves the vividness without
    flattening it into a simple future.
- source_word: מִשְׁפְּחוֹת צָפוֹן
  chosen: the clans of the north
  alternatives:
  - the families of the north
  - the tribes of the north
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת often denotes kinship groups or peoples larger than nuclear
    families. 'Clans' best fits military-political groupings from northern regions;
    'families' is too domestic, and 'tribes' may imply a more technical ethnic structure
    not required here.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic, weighty,
    and transparent. 'the LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by doctrine table for the divine name, following Jewish reverence
    tradition and longstanding English convention.
- source_word: וְאֶל נְבוּכַדְרֶאצַּר מֶלֶךְ בָּבֶל עַבְדִּי
  chosen: and for Nebuchadnezzar king of Babylon, my servant
  alternatives:
  - even Nebuchadnezzar king of Babylon, my servant
  - and to Nebuchadnezzar king of Babylon, my servant
  lexicon: HALOT
  rationale: 'The preposition אֶל after ''sending for and taking'' is awkward if rendered
    woodenly. Here it marks inclusion/apposition in the summoned force. ''And for
    Nebuchadnezzar...'' preserves the syntax while making sense in English. ''My servant''
    is retained literally because it is theologically and rhetorically significant:
    Nebuchadnezzar is an instrument of the LORD''s purpose, not necessarily a faithful
    worshiper.'
- source_word: וַהֲבִאֹתִים
  chosen: I will bring them
  alternatives:
  - and I have brought them
  - then I will bring them
  lexicon: HALOT
  rationale: In context the form functions as a prophetic future/consecutive result.
    English future best communicates the sequence of divine action.
- source_word: עַל הָאָרֶץ הַזֹּאת
  chosen: against this land
  alternatives:
  - upon this land
  - to this land
  lexicon: HALOT
  rationale: With hostile military movement, עַל is best rendered 'against' rather
    than merely spatial 'upon' or directional 'to'.
- source_word: יֹשְׁבֶיהָ
  chosen: its inhabitants
  alternatives:
  - those who dwell in it
  - its residents
  lexicon: HALOT
  rationale: A natural rendering of the participial noun with suffix. 'Inhabitants'
    is slightly more formal and suits prophetic judgment style.
- source_word: כָּל הַגּוֹיִם הָאֵלֶּה סָבִיב
  chosen: all these surrounding nations
  alternatives:
  - all these nations around
  - all these neighboring nations
  lexicon: HALOT
  rationale: Captures both the demonstrative 'these' and the adverbial sense of סָבִיב.
    'Surrounding nations' is concise and idiomatic.
- source_word: וְהַחֲרַמְתִּים
  chosen: I will devote them to destruction
  alternatives:
  - I will utterly destroy them
  - I will put them under the ban
  lexicon: HALOT
  rationale: חרם in the Hiphil carries the sense of placing under the ban, devoting
    to destruction. 'Devote them to destruction' preserves the technical theological
    nuance better than the flatter 'utterly destroy,' while avoiding opaque jargon
    in the main text.
- source_word: לְשַׁמָּה
  chosen: a horror
  alternatives:
  - a desolation
  - an object of horror
  lexicon: HALOT
  rationale: In this collocation with hissing and ruins, the term denotes a devastated
    condition that evokes horror. 'A horror' communicates both devastation and its
    effect on observers more naturally than the abstract 'desolation' here.
- source_word: לִשְׁרֵקָה
  chosen: a hissing
  alternatives:
  - an object of hissing
  - a whistle
  lexicon: HALOT
  rationale: The noun refers to the derisive reaction of onlookers. 'A hissing' is
    the conventional concise rendering; 'object of hissing' is interpretive and longer,
    though conceptually similar.
- source_word: לְחָרְבוֹת עוֹלָם
  chosen: everlasting ruins
  alternatives:
  - perpetual ruins
  - ancient ruins
  lexicon: HALOT
  rationale: עוֹלָם here denotes enduring/perpetual duration in judgment rhetoric.
    'Everlasting ruins' is idiomatic and forceful; 'perpetual ruins' is possible but
    less natural in contemporary English.
