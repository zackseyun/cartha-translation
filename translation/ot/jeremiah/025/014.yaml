theological_decisions:
- issue: Referent of 'them' in the judgment reversal
  chosen_reading: '''them'' refers to Babylon/the Chaldeans, who will themselves be
    subjugated by many nations and great kings'
  alternative_readings:
  - '''they served them'' as a past reference to prior domination'
  - more neutral 'many nations and great kings served them'
  rationale: The immediate context (Jer 25:12-14) announces judgment on the king of
    Babylon and that land. The verse explains that Babylon too will be made to serve
    others. This contextual reading avoids a misleading past-tense sense that would
    weaken the reversal motif.
