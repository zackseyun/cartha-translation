id: JER.25.14
reference: Jeremiah 25:14
source:
  edition: WLC
  text: כִּ֣י עָֽבְדוּ בָ֤/ם גַּם הֵ֨מָּה֙ גּוֹיִ֣ם רַבִּ֔ים וּ/מְלָכִ֖ים גְּדוֹלִ֑ים
    וְ/שִׁלַּמְתִּ֥י לָ/הֶ֛ם כְּ/פָעֳלָ֖/ם וּ/כְ/מַעֲשֵׂ֥ה יְדֵי/הֶֽם־־׃ס
translation:
  text: For many nations and great kings will make even them serve, and I will repay
    them according to their work and according to the deed of their hands.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'for many nations and great kings have served/served
      themselves with them.' The Hebrew wording is compressed; in context it most
      likely means that Babylon will itself be made to serve many nations and great
      kings.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding statement; 'for'
    preserves the explanatory force in natural English.
- source_word: עָבְדוּ בָם
  chosen: will make even them serve
  alternatives:
  - have served them
  - have enslaved them
  - will serve themselves with them
  lexicon: HALOT
  rationale: The verb עבד with ב can mean 'work/serve with, by, on,' but in this context
    the sense is that many nations and kings will impose service on 'them' (the Babylonians/Chaldeans),
    reversing their domination. English 'make ... serve' best captures the causative
    sense implied by the context, even though the Hebrew form itself is Qal. This
    follows the broader context of judgment on Babylon.
- source_word: גַּם הֵמָּה
  chosen: even them
  alternatives:
  - they also
  - even they
  lexicon: HALOT
  rationale: 'Emphatic pronoun with גם highlights reversal: those who had subjugated
    others will themselves be subjugated. ''Even them'' brings the emphasis forward
    in idiomatic English.'
- source_word: גּוֹיִם רַבִּים
  chosen: many nations
  alternatives:
  - many peoples
  lexicon: HALOT
  rationale: גּוֹיִם ordinarily means 'nations' in geopolitical contexts; here it
    refers to multiple foreign nations rising against Babylon.
- source_word: וּמְלָכִים גְּדוֹלִים
  chosen: and great kings
  alternatives:
  - and mighty kings
  - and powerful kings
  lexicon: HALOT
  rationale: גדולים literally means 'great'; in context it denotes rulers of significant
    power. 'Great kings' is both literal and idiomatic.
- source_word: וְשִׁלַּמְתִּי לָהֶם
  chosen: and I will repay them
  alternatives:
  - and I will recompense them
  - and I will pay them back
  lexicon: HALOT
  rationale: שׁלם in the Piel commonly means to repay or recompense. 'Repay' is clear
    modern English and preserves the judicial sense.
- source_word: כְּפָעֳלָם
  chosen: according to their work
  alternatives:
  - according to their deeds
  - according to what they have done
  lexicon: HALOT
  rationale: פעל denotes work, act, or deed. 'According to their work' preserves the
    lexical distinction from the following מעשה while remaining understandable.
- source_word: וּכְמַעֲשֵׂה יְדֵיהֶם
  chosen: and according to the deed of their hands
  alternatives:
  - and according to the work of their hands
  - and according to what their hands have done
  lexicon: HALOT
  rationale: The idiom 'work/deed of their hands' often emphasizes concrete actions
    or manufactured outcomes. Rendering מעשה here as 'deed' helps preserve some distinction
    from פעל while keeping the Hebrew imagery of 'their hands' intact.
