id: JER.25.5
reference: Jeremiah 25:5
source:
  edition: WLC
  text: לֵ/אמֹ֗ר שֽׁוּבוּ נָ֞א אִ֣ישׁ מִ/דַּרְכּ֤/וֹ הָֽ/רָעָה֙ וּ/מֵ/רֹ֣עַ מַעַלְלֵי/כֶ֔ם
    וּ/שְׁבוּ֙ עַל הָ֣/אֲדָמָ֔ה אֲשֶׁ֨ר נָתַ֧ן יְהוָ֛ה לָ/כֶ֖ם וְ/לַ/אֲבֽוֹתֵי/כֶ֑ם
    לְ/מִן עוֹלָ֖ם וְ/עַד עוֹלָֽם־־־־׃
translation:
  text: saying, ‘Please turn back, each man from his evil way and from the evil of
    your deeds, and dwell on the land that the LORD gave to you and to your fathers
    from of old and forever.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Return, please, each one from his evil way and from your evil deeds.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from of old and forever,' an idiom expressing the LORD's gift of
      the land across past and future time.
    reason: cultural_note
lexical_decisions:
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Introduces the content of the prophetic message. 'Saying' is idiomatic
    in English narrative/report style while remaining close to the Hebrew infinitive
    construct usage.
- source_word: שׁוּבוּ נָא
  chosen: Please turn back
  alternatives:
  - Return, please
  - Turn back now
  lexicon: HALOT
  rationale: שׁוּב commonly means 'turn back/return' in repentance contexts. נָא adds
    entreaty rather than temporal force, so 'please' best reflects the appeal.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: The singular distributive אִישׁ after a plural imperative means 'each
    man/each one.' Following the gender-accurate policy, 'each man' preserves the
    masculine representative form rather than flattening it to a neutral collective.
- source_word: מִדַּרְכּוֹ הָרָעָה
  chosen: from his evil way
  alternatives:
  - from his wicked way
  - from his evil path
  lexicon: HALOT
  rationale: דֶּרֶךְ in prophetic moral contexts often denotes one's course of life
    or conduct. 'Way' preserves the biblical metaphor; 'evil' is a straightforward
    rendering of רָעָה.
- source_word: וּמֵרֹעַ מַעַלְלֵיכֶם
  chosen: and from the evil of your deeds
  alternatives:
  - and from your evil deeds
  - and from the wickedness of your actions
  lexicon: HALOT
  rationale: The construct phrase is literally 'from the evil of your deeds.' Retaining
    'evil' plus 'deeds' preserves both the abstract quality and the concrete acts.
    The shift from singular 'his' to plural 'your' reflects the Hebrew as addressed
    to the people collectively after the distributive singular.
- source_word: וּשְׁבוּ
  chosen: and dwell
  alternatives:
  - and live
  - and remain
  - and stay
  lexicon: HALOT
  rationale: From יָשַׁב, 'sit/dwell/live.' In land-settlement contexts 'dwell' best
    captures settled habitation without overinterpreting as mere temporary staying.
- source_word: עַל הָאֲדָמָה
  chosen: on the land
  alternatives:
  - in the land
  - upon the ground
  lexicon: HALOT
  rationale: אֲדָמָה here refers to the land given by the LORD, i.e., the covenant
    land. 'On the land' is formally close to עַל, though 'in the land' is possible
    idiomatic English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: לָכֶם וְלַאֲבוֹתֵיכֶם
  chosen: to you and to your fathers
  alternatives:
  - to you and your fathers
  - to you and your ancestors
  lexicon: HALOT
  rationale: The repeated preposition is naturally represented in English. 'Fathers'
    preserves the familial/covenantal wording more closely than the more interpretive
    'ancestors.'
- source_word: לְמִן עוֹלָם וְעַד עוֹלָם
  chosen: from of old and forever
  alternatives:
  - from ancient times and forever
  - from everlasting to everlasting
  - long ago and forever
  lexicon: HALOT
  rationale: This idiom marks enduring grant across past and future horizons. Because
    the first phrase points backward ('from of old') and the second forward ('forever'),
    this rendering preserves the temporal asymmetry better than the more formulaic
    'from everlasting to everlasting.'
