theological_decisions:
- issue: Metaphorical reference of 'shepherds' and 'lords of the flock'
  chosen_reading: Retain the pastoral metaphor in the main text rather than interpret
    it as 'rulers' or 'leaders.'
  alternative_readings:
  - Render explicitly as political leaders or rulers
  rationale: Jeremiah uses shepherd imagery for national leaders, but the Hebrew text
    itself presents the metaphor. Preserving the image aligns with original-language
    primacy and avoids importing interpretation into the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of the slaughter language
  chosen_reading: Keep 'slaughter' in the main text.
  alternative_readings:
  - Soften to 'destruction' or 'death'
  rationale: The Hebrew לטבוח is vivid and violent. Softening it would under-translate
    the judgment imagery.
  doctrine_reference: Translation philosophy §1, §6
