id: JER.25.34
reference: Jeremiah 25:34
source:
  edition: WLC
  text: הֵילִ֨ילוּ הָ/רֹעִ֜ים וְ/זַעֲק֗וּ וְ/הִֽתְפַּלְּשׁוּ֙ אַדִּירֵ֣י הַ/צֹּ֔אן
    כִּֽי מָלְא֥וּ יְמֵי/כֶ֖ם לִ/טְב֑וֹחַ וּ/תְפוֹצ֣וֹתִי/כֶ֔ם וּ/נְפַלְתֶּ֖ם כִּ/כְלִ֥י
    חֶמְדָּֽה־׃
translation:
  text: Wail, you shepherds, and cry out; roll in the dust, you lords of the flock,
    for your days for slaughter are full, and your dispersions have come, and you
    will fall like a precious vessel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Howl, shepherds.' The Hebrew verb denotes loud lamentation.
    reason: lexical_alternative
  - marker: b
    text: Or 'wallow yourselves'; the Hebrew likely refers to a mourning gesture of
      rolling in dust or ashes.
    reason: cultural_note
  - marker: c
    text: Or 'leaders/nobles of the flock' for 'lords of the flock.'
    reason: lexical_alternative
  - marker: d
    text: The Hebrew of 'your dispersions have come' is difficult; it may refer to
      your being scattered.
    reason: alternative_reading
  - marker: e
    text: Or 'like a desirable/choice vessel.' The image is of something valued yet
      liable to be shattered.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵילִילוּ
  chosen: Wail
  alternatives:
  - Howl
  - Lament
  lexicon: HALOT
  rationale: Imperative plural from ילל, denoting loud mourning or howling. 'Wail'
    is natural modern English and preserves the force without sounding animalistic
    in this context.
- source_word: הָרֹעִים
  chosen: you shepherds
  alternatives:
  - the shepherds
  - you pastors
  lexicon: HALOT
  rationale: Literally 'the shepherds,' but direct address in English is clearer with
    'you shepherds.' In Jeremiah this is a common metaphor for rulers/leaders, but
    the image should be preserved rather than interpreted in the main text.
- source_word: וְזַעֲקוּ
  chosen: and cry out
  alternatives:
  - and shout
  - and scream
  lexicon: HALOT
  rationale: זעק conveys a loud cry, often in distress. 'Cry out' fits the lament/judgment
    context and reads naturally alongside 'wail.'
- source_word: וְהִתְפַּלְּשׁוּ
  chosen: roll in the dust
  alternatives:
  - wallow yourselves
  - roll yourselves about
  lexicon: HALOT
  rationale: The hitpael of פלשׁ here is an idiom of mourning/humiliation, commonly
    understood as rolling in dust or ashes. Supplying 'in the dust' makes the idiom
    intelligible in English without over-paraphrasing.
- source_word: אַדִּירֵי הַצֹּאן
  chosen: you lords of the flock
  alternatives:
  - you leaders of the flock
  - you nobles of the flock
  - you mighty ones of the flock
  lexicon: HALOT
  rationale: אַדִּירֵי denotes majestic, noble, or powerful ones. 'Lords' best conveys
    status and authority here while preserving the flock metaphor. 'Leaders' is possible
    but flattens the elevated register.
- source_word: כִּי מָלְאוּ יְמֵיכֶם לִטְבוֹחַ
  chosen: for your days for slaughter are full
  alternatives:
  - for the days of your slaughter are fulfilled
  - for your time to be slaughtered has come
  lexicon: HALOT
  rationale: The Hebrew is compact and somewhat formal. This rendering stays close
    to the syntax while remaining intelligible. The sense is that the appointed time
    for their slaughter has reached its fullness.
- source_word: וּתְפוֹצוֹתִיכֶם
  chosen: and your dispersions have come
  alternatives:
  - and your scatterings have come
  - and I will scatter you
  - and your broken pieces
  lexicon: HALOT
  rationale: From תפוצה, a noun meaning dispersion/scattering. The form is difficult,
    and some understand a different nuance, but the nominal sense 'your dispersions/scatterings'
    best matches the morphology provided. 'Have come' is supplied from the parallel
    sense after 'your days... are full.'
- source_word: וּנְפַלְתֶּם
  chosen: and you will fall
  alternatives:
  - and you shall fall
  - and you will collapse
  lexicon: HALOT
  rationale: Simple waw + qatal with future/result sense in context of judgment. 'You
    will fall' is straightforward and idiomatic.
- source_word: כִּכְלִי חֶמְדָּה
  chosen: like a precious vessel
  alternatives:
  - like a desirable vessel
  - like a fine vessel
  - like a cherished jar
  lexicon: HALOT
  rationale: כְּלִי is a vessel/object; חֶמְדָּה denotes desirability, preciousness,
    delight. 'Precious vessel' preserves the simile's sense of something valued yet
    breakable.
