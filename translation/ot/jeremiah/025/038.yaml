id: JER.25.38
reference: Jeremiah 25:38
source:
  edition: WLC
  text: עָזַ֥ב כַּ/כְּפִ֖יר סֻכּ֑/וֹ כִּֽי הָיְתָ֤ה אַרְצָ/ם֙ לְ/שַׁמָּ֔ה מִ/פְּנֵי֙
    חֲר֣וֹן הַ/יּוֹנָ֔ה וּ/מִ/פְּנֵ֖י חֲר֥וֹן אַפּֽ/וֹ־׃פ
translation:
  text: Like a young lion, he has left his den, for their land has become a desolation
    because of the burning anger of the oppressor, and because of his burning anger.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of the burning anger of the dove.' The Hebrew written form can
      be read that way, but the context strongly favors a sense like 'the oppressor.'
    reason: alternative_reading
  - marker: b
    text: The final 'his' likely refers to the LORD in the surrounding context, though
      some understand it to refer to the oppressor mentioned in the previous phrase.
    reason: alternative_reading
lexical_decisions:
- source_word: עָזַב
  chosen: has left
  alternatives:
  - left
  - has abandoned
  lexicon: HALOT
  rationale: Qal perfect 3ms of עזב, here describing completed action. 'Has left'
    gives natural English while preserving the perfect aspect better than a simple
    present. 'Abandoned' is possible but stronger than the context requires.
- source_word: כַּכְּפִיר
  chosen: Like a young lion
  alternatives:
  - Like a lion cub
  - Like a fierce lion
  lexicon: HALOT
  rationale: כפיר commonly denotes a young lion, often one vigorous and dangerous
    rather than merely juvenile. 'Young lion' is the most standard and transparent
    rendering.
- source_word: סֻכּוֹ
  chosen: his den
  alternatives:
  - his lair
  - his shelter
  - his thicket
  lexicon: HALOT
  rationale: סֻכָּה literally refers to a booth/shelter, but in lion imagery it idiomatically
    refers to the animal's dwelling place. 'Den' fits the metaphor naturally in English
    without over-literal awkwardness.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding image. 'For' preserves the explanatory
    connection in a slightly more formal but still readable way.
- source_word: הָיְתָה אַרְצָם לְשַׁמָּה
  chosen: their land has become a desolation
  alternatives:
  - their land became a waste
  - their land has become desolate
  lexicon: HALOT
  rationale: The clause states resultant devastation. 'Has become a desolation' preserves
    the noun שַׁמָּה ('desolation, waste') more closely than the adjectival 'desolate.'
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - on account of
  lexicon: HALOT
  rationale: In this causal construction, 'because of' best conveys the idiomatic
    force in English.
- source_word: חֲרוֹן
  chosen: burning anger
  alternatives:
  - fierce anger
  - wrath
  lexicon: HALOT
  rationale: חרון denotes burning heat as a metaphor for anger. 'Burning anger' preserves
    the imagery better than the more traditional but less transparent 'wrath.'
- source_word: הַיּוֹנָה
  chosen: the oppressor
  alternatives:
  - the dove
  lexicon: HALOT
  rationale: Although the consonants can suggest 'dove,' in this context and by longstanding
    lexical understanding the form is taken from ינה/יון in the sense of oppression,
    yielding 'the oppressor' or 'the one who oppresses.' This best fits the context
    of devastation by hostile fury. The alternative is preserved in a footnote because
    the written form can be read as 'the dove' and some translations reflect a different
    textual understanding.
- source_word: וּמִפְּנֵי חֲרוֹן אַפּוֹ
  chosen: and because of his burning anger
  alternatives:
  - and because of his fierce anger
  - and because of the burning of his nose/anger
  lexicon: HALOT
  rationale: אַפּוֹ is the common idiom for anger ('his nose' > 'his anger'). Rendering
    the phrase as 'his burning anger' communicates the Hebrew idiom naturally while
    retaining the parallelism with the previous phrase.
