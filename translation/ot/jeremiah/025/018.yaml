id: JER.25.18
reference: Jeremiah 25:18
source:
  edition: WLC
  text: אֶת יְרוּשָׁלִַ֨ם֙ וְ/אֶת עָרֵ֣י יְהוּדָ֔ה וְ/אֶת מְלָכֶ֖י/הָ אֶת שָׂרֶ֑י/הָ
    לָ/תֵ֨ת אֹתָ֜/ם לְ/חָרְבָּ֧ה לְ/שַׁמָּ֛ה לִ/שְׁרֵקָ֥ה וְ/לִ/קְלָלָ֖ה כַּ/יּ֥וֹם
    הַ/זֶּֽה־־־־׃
translation:
  text: Jerusalem, the cities of Judah, her kings, and her officials—to make them
    a ruin, a horror, a hissing, and a curse, as it is this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an astonishment' for 'a horror.' The Hebrew term can emphasize the appalled
      reaction provoked by devastation.
    reason: lexical_alternative
  - marker: b
    text: Or 'a whistling.' The Hebrew refers to the derisive sound made by onlookers
      at a ruined place.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard transliteration of the place name, following the policy to transliterate
    names rather than translate them.
- source_word: עָרֵי יְהוּדָה
  chosen: the cities of Judah
  alternatives:
  - Judah's cities
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English. 'The cities of Judah'
    is clear and preserves the genitival relationship.
- source_word: מְלָכֶיהָ
  chosen: her kings
  alternatives:
  - its kings
  lexicon: HALOT
  rationale: 3fs suffix refers back to Judah/Jerusalem as a collective feminine entity.
    'Her kings' preserves the Hebrew personification more naturally than 'its kings'
    in this prophetic context.
- source_word: שָׂרֶיהָ
  chosen: her officials
  alternatives:
  - her princes
  - her leaders
  lexicon: HALOT
  rationale: שָׂרִים can denote princes, officials, rulers, or commanders. 'Officials'
    best fits the civic-political list here alongside kings and avoids implying only
    royal sons, while remaining accessible modern English.
- source_word: לָתֵת אֹתָם
  chosen: to make them
  alternatives:
  - to give them over
  - to set them
  lexicon: HALOT
  rationale: 'The infinitive of נתן with a sequence of לְ-nouns expresses result/destination:
    causing them to become an object of devastation and derision. ''To make them''
    is idiomatic English that captures the force better than a wooden ''to give them''.'
- source_word: לְחָרְבָּה
  chosen: a ruin
  alternatives:
  - desolation
  - waste
  lexicon: HALOT
  rationale: Conveys devastation in a concrete, readable way. 'Desolation' is possible,
    but 'ruin' fits the sequence smoothly in modern English.
- source_word: לְשַׁמָּה
  chosen: a horror
  alternatives:
  - an astonishment
  - an object of horror
  lexicon: HALOT
  rationale: This noun often denotes appalling devastation that evokes stunned horror.
    'A horror' communicates the effect more naturally than the traditional but less
    transparent 'an astonishment.'
- source_word: לִשְׁרֵקָה
  chosen: a hissing
  alternatives:
  - a whistling
  - an object of scorn
  lexicon: HALOT
  rationale: The term refers to the derisive hissing/whistling of onlookers at a devastated
    place. 'A hissing' preserves the concrete image and prophetic idiom.
- source_word: וְלִקְלָלָה
  chosen: a curse
  alternatives:
  - an object of cursing
  lexicon: HALOT
  rationale: Keeps the compact Hebrew expression while allowing the sense that the
    place becomes proverbial in imprecation.
- source_word: כַּיּוֹם הַזֶּה
  chosen: as it is this day
  alternatives:
  - as at this day
  - as it is today
  lexicon: HALOT
  rationale: This idiom points to the present state as evidence of fulfillment. 'As
    it is this day' is natural modern English while preserving the demonstrative force.
