id: JER.25.23
reference: Jeremiah 25:23
source:
  edition: WLC
  text: וְ/אֶת דְּדָ֤ן וְ/אֶת תֵּימָא֙ וְ/אֶת בּ֔וּז וְ/אֵ֖ת כָּל קְצוּצֵ֥י פֵאָֽה־־־־׃
translation:
  text: and Dedan, and Tema, and Buz, and all who clip the corners of their hair,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'all the cutters of the corner.' The phrase likely refers
      to those who shave or clip the hair at the sides; some understand it specifically
      of the beard.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּדָן
  chosen: Dedan
  lexicon: HALOT
  rationale: Proper place/people name; transliterated per translation philosophy rather
    than translated.
- source_word: תֵּימָא
  chosen: Tema
  alternatives:
  - Tema/Teima
  lexicon: HALOT
  rationale: Proper name, likely the Arabian oasis/tribal group Tema; standard English
    transliteration retained.
- source_word: בּוּז
  chosen: Buz
  lexicon: HALOT
  rationale: Proper name of a people/region; transliterated directly.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: Inclusive quantifier; 'all' is the most natural rendering in a list of
    nations/peoples.
- source_word: קְצוּצֵי
  chosen: who clip
  alternatives:
  - cut off
  - trimmed
  lexicon: HALOT
  rationale: From קצץ, 'to cut/clip.' Rendered as a participial expression modifying
    the people group. 'Clip' fits the idiom with hair and preserves the concrete action.
- source_word: פֵאָה
  chosen: the corners of their hair
  alternatives:
  - the corners of the beard
  - the side-locks
  - the edges of the hair
  lexicon: HALOT
  rationale: Literally 'corner/edge.' In this ethnographic idiom it refers to the
    hair at the sides/corners of the head or beard. Because English 'corners' alone
    is unclear, 'of their hair' is supplied for intelligibility. The broader context
    in Jeremiah 25:23 and 49:32 uses this expression for a distinctive grooming practice
    among desert peoples.
