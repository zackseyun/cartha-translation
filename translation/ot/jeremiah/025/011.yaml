theological_decisions:
- issue: Scope of 'the land' in the judgment oracle
  chosen_reading: '''land'' refers to the regional land under judgment, not the whole
    earth'
  alternative_readings:
  - the whole earth/land in a broader hyperbolic sense
  rationale: The immediate context concerns Judah and surrounding nations under Babylonian
    domination. Rendering אֶרֶץ as 'land' avoids overstating the scope while preserving
    the prophetic judgment setting.
