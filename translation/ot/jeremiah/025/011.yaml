id: JER.25.11
reference: Jeremiah 25:11
source:
  edition: WLC
  text: וְ/הָֽיְתָה֙ כָּל הָ/אָ֣רֶץ הַ/זֹּ֔את לְ/חָרְבָּ֖ה לְ/שַׁמָּ֑ה וְ/עָ֨בְד֜וּ
    הַ/גּוֹיִ֥ם הָ/אֵ֛לֶּה אֶת מֶ֥לֶךְ בָּבֶ֖ל שִׁבְעִ֥ים שָׁנָֽה־־׃
translation:
  text: And all this land will become a ruin and a horror, and these nations will
    serve the king of Babylon for seventy years.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an object of horror,' highlighting the appalled reaction provoked by
      the land's devastation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: And ... will become
  alternatives:
  - And ... shall be
  - And ... will be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    futurally; 'will become' brings out the resultant state more naturally in English
    than the more static 'will be.'
- source_word: כָּל הָאָרֶץ הַזֹּאת
  chosen: all this land
  alternatives:
  - the whole land
  - all this הארץ/earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land'; in Jeremiah's historical judgment context
    it refers to the land under discussion, not the entire globe. 'All this land'
    preserves both כָּל and the demonstrative הַזֹּאת.
- source_word: לְחָרְבָּה
  chosen: a ruin
  alternatives:
  - waste
  - desolation
  lexicon: HALOT
  rationale: The noun denotes devastation/ruin. 'A ruin' is idiomatic and concrete
    in English, while still conveying the state of devastation.
- source_word: לְשַׁמָּה
  chosen: a horror
  alternatives:
  - an object of horror
  - a desolation
  - an astonishment
  lexicon: HALOT
  rationale: שַׁמָּה often carries the sense of appalled astonishment at devastation.
    'A horror' is concise and readable; the fuller nuance 'object of horror' is preserved
    as an alternative.
- source_word: וְעָבְדוּ
  chosen: will serve
  alternatives:
  - will be subject to
  - will labor for
  lexicon: HALOT
  rationale: The verb עבד with a direct object here means to serve a ruler. 'Will
    serve' is the most direct rendering and preserves the political subjugation without
    over-paraphrase.
- source_word: הַגּוֹיִם הָאֵלֶּה
  chosen: these nations
  alternatives:
  - these peoples
  - these Gentile nations
  lexicon: HALOT
  rationale: גּוֹיִם in this context refers to political nations/peoples. 'These nations'
    is the most natural and contextually precise rendering.
- source_word: אֶת מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: Straightforward construct phrase; the standard English form is clear
    and formal enough for prophetic discourse.
- source_word: שִׁבְעִים שָׁנָה
  chosen: for seventy years
  alternatives:
  - seventy years
  lexicon: HALOT
  rationale: English idiom normally supplies 'for' with a duration of time after 'serve.'
    The numeral-noun phrase is rendered directly.
