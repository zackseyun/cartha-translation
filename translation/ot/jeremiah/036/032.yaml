id: JER.36.32
reference: Jeremiah 36:32
source:
  edition: WLC
  text: וְ/יִרְמְיָ֜הוּ לָקַ֣ח מְגִלָּ֣ה אַחֶ֗רֶת וַֽ/יִּתְּנָ/הּ֮ אֶל בָּר֣וּךְ בֶּן
    נֵרִיָּהוּ֮ הַ/סֹּפֵר֒ וַ/יִּכְתֹּ֤ב עָלֶ֨י/הָ֙ מִ/פִּ֣י יִרְמְיָ֔הוּ אֵ֚ת כָּל
    דִּבְרֵ֣י הַ/סֵּ֔פֶר אֲשֶׁ֥ר שָׂרַ֛ף יְהוֹיָקִ֥ים מֶֽלֶךְ יְהוּדָ֖ה בָּ/אֵ֑שׁ
    וְ/ע֨וֹד נוֹסַ֧ף עֲלֵי/הֶ֛ם דְּבָרִ֥ים רַבִּ֖ים כָּ/הֵֽמָּה׀־־־־׃ס
translation:
  text: Then Jeremiah took another scroll and gave it to Baruch son of Neriah, the
    scribe, and he wrote on it from the mouth of Jeremiah all the words of the scroll
    that Jehoiakim king of Judah had burned in the fire; and many words like them
    were added to them besides.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'at Jeremiah’s dictation.' Literally, 'from the mouth of Jeremiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְגִלָּה אַחֶרֶת
  chosen: another scroll
  alternatives:
  - another roll
  lexicon: HALOT
  rationale: מְגִלָּה denotes a written scroll/roll. 'Scroll' is clearer in modern
    English while remaining concrete and historically appropriate; אַחֶרֶת adds 'another.'
- source_word: וַיִּתְּנָהּ אֶל בָּרוּךְ
  chosen: gave it to Baruch
  alternatives:
  - handed it to Baruch
  lexicon: HALOT
  rationale: נתן with אֶל straightforwardly means 'gave to.' 'Handed' is possible
    but less neutral.
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  lexicon: HALOT
  rationale: סֹפֵר can denote a professional writer/official secretary. 'Scribe' preserves
    the historical office and literary context; 'secretary' is a viable contextual
    alternative but sounds more modern-bureaucratic.
- source_word: וַיִּכְתֹּב עָלֶיהָ
  chosen: and he wrote on it
  alternatives:
  - and he wrote on it down
  - and he wrote in it
  lexicon: HALOT
  rationale: The subject is Baruch, the nearest antecedent after Jeremiah gave him
    the scroll. עַל with a writing surface naturally yields 'write on it.'
- source_word: מִפִּי יִרְמְיָהוּ
  chosen: from the mouth of Jeremiah
  alternatives:
  - at Jeremiah's dictation
  - from Jeremiah's mouth
  lexicon: HALOT
  rationale: Literally 'from the mouth of Jeremiah,' an idiom for oral dictation.
    The main text keeps the vivid Hebrew expression while remaining intelligible;
    a footnote preserves the smoother idiomatic alternative.
- source_word: אֵת כָּל דִּבְרֵי הַסֵּפֶר
  chosen: all the words of the scroll
  alternatives:
  - all the words of the book
  lexicon: HALOT
  rationale: Though סֵפֶר often means 'book,' here the immediate context is a physical
    scroll that had been burned and replaced. Rendering both מְגִלָּה and סֵפֶר with
    'scroll' reflects the concrete referent in context.
- source_word: אֲשֶׁר שָׂרַף ... בָּאֵשׁ
  chosen: that ... had burned in the fire
  alternatives:
  - that ... burned with fire
  lexicon: HALOT
  rationale: The relative clause refers to the prior scroll. 'In the fire' is natural
    English for בָּאֵשׁ and preserves the definite article's specificity without awkwardness.
- source_word: וְעוֹד נוֹסַף עֲלֵיהֶם
  chosen: and ... were added to them besides
  alternatives:
  - and more was added to them
  - and besides, there were added to them
  lexicon: HALOT
  rationale: 'The Niphal of יסף here is passive: additional material was added. ''Besides''
    captures וְעוֹד idiomatically.'
- source_word: דְּבָרִים רַבִּים כָּהֵמָּה
  chosen: many words like them
  alternatives:
  - many similar words
  - many words such as these
  lexicon: HALOT
  rationale: כָהֵמָּה means 'like them/such as they.' 'Many words like them' is a
    close and natural rendering.
