id: JER.36.1
reference: Jeremiah 36:1
source:
  edition: WLC
  text: וַֽ/יְהִי֙ בַּ/שָּׁנָ֣ה הָ/רְבִיעִ֔ת לִ/יהוֹיָקִ֥ים בֶּן יֹאשִׁיָּ֖הוּ מֶ֣לֶךְ
    יְהוּדָ֑ה הָיָ֞ה הַ/דָּבָ֤ר הַ/זֶּה֙ אֶֽל יִרְמְיָ֔הוּ מֵ/אֵ֥ת יְהוָ֖ה לֵ/אמֹֽר־־׃
translation:
  text: Now in the fourth year of Jehoiakim son of Josiah, king of Judah, this word
    came to Jeremiah from the LORD, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from Yahweh.'' The divine name יְהוָה is rendered ''the LORD''
      in keeping with the project''s stated convention.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: Now ...
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces a new narrative setting. 'Now'
    preserves the discourse function in natural modern English without the archaic
    feel of 'it came to pass.'
- source_word: בַּשָּׁנָה הָרְבִיעִת
  chosen: in the fourth year
  alternatives:
  - during the fourth year
  lexicon: HALOT
  rationale: A straightforward temporal expression; 'in the fourth year' is the most
    natural and sufficiently formal rendering.
- source_word: לִיהוֹיָקִים בֶּן יֹאשִׁיָּהוּ
  chosen: of Jehoiakim son of Josiah
  alternatives:
  - of Jehoiakim, the son of Josiah
  lexicon: HALOT
  rationale: Personal names are transliterated by standard convention. The construct
    relationship is naturally rendered in English without adding unnecessary words.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Standard royal title; no contextual pressure for variation.
- source_word: הָיָה הַדָּבָר הַזֶּה אֶל יִרְמְיָהוּ
  chosen: this word came to Jeremiah
  alternatives:
  - this matter came to Jeremiah
  - this message came to Jeremiah
  lexicon: HALOT
  rationale: דבר can mean 'word,' 'matter,' or 'message.' In prophetic formulae, 'word'
    best preserves the idiom and theological resonance of divine revelation, while
    'came to Jeremiah' is the natural English equivalent of היה ... אל.
- source_word: מֵאֵת יְהוָה
  chosen: from the LORD
  alternatives:
  - from Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'From' accurately conveys
    source/origin.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'thus:'
  - 'as follows:'
  lexicon: HALOT
  rationale: Standard introduction to direct speech. Retaining 'saying' keeps the
    prophetic formula visible and prepares for the following quotation in the next
    verse.
