id: JER.36.24
reference: Jeremiah 36:24
source:
  edition: WLC
  text: וְ/לֹ֣א פָחֲד֔וּ וְ/לֹ֥א קָרְע֖וּ אֶת בִּגְדֵי/הֶ֑ם הַ/מֶּ֨לֶךְ֙ וְ/כָל עֲבָדָ֔י/ו
    הַ/שֹּׁ֣מְעִ֔ים אֵ֥ת כָּל הַ/דְּבָרִ֖ים הָ/אֵֽלֶּה־־־׃
translation:
  text: Yet neither the king nor any of his servants who heard all these words were
    afraid, nor did they tear their garments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tearing one's garments was a customary sign of grief, horror, or repentance
      in the ancient Near East.
    reason: cultural_note
  - marker: b
    text: Or 'tear their clothes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  chosen: Yet neither ... nor
  alternatives:
  - and not
  - but not
  lexicon: HALOT
  rationale: The conjunction plus negation continues the narrative with adversative
    force in English. 'Yet neither ... nor' captures both the continuation and the
    emphatic double negation across the clause.
- source_word: פָחֲדוּ
  chosen: were afraid
  alternatives:
  - feared
  - were in dread
  lexicon: HALOT
  rationale: The verb פחד denotes fear or dread. 'Were afraid' is natural modern English
    and fits the narrative context without overstating the intensity.
- source_word: קָרְעוּ אֶת־בִּגְדֵיהֶם
  chosen: tear their garments
  alternatives:
  - rend their clothes
  - tear their clothes
  lexicon: HALOT
  rationale: The idiom refers to tearing one's clothing as a sign of grief, horror,
    or repentance. 'Tear their garments' preserves the cultural-literary register
    better than the more colloquial 'clothes,' while remaining readable.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun.
- source_word: וְכָל־עֲבָדָיו
  chosen: nor any of his servants
  alternatives:
  - and all his servants
  - nor any of his attendants
  lexicon: HALOT
  rationale: With the preceding negation, English idiom prefers 'nor any of his servants'
    rather than a wooden 'and all his servants ... not.' 'Servants' is the most contextually
    appropriate rendering for royal officials here; the bonded nuance of 'slave' is
    not foregrounded in this court setting.
- source_word: הַשֹּׁמְעִים
  chosen: who heard
  alternatives:
  - who were listening to
  - the ones hearing
  lexicon: HALOT
  rationale: The participle functions attributively, identifying the servants as those
    who heard the reading. 'Who heard' is concise and natural.
- source_word: אֵת כָּל־הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  - all these matters
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words' or 'matters.' In context of a scroll being
    read, 'words' best preserves the textual emphasis.
