id: JER.36.25
reference: Jeremiah 36:25
source:
  edition: WLC
  text: וְ/גַם֩ אֶלְנָתָ֨ן וּ/דְלָיָ֤הוּ וּ/גְמַרְיָ֨הוּ֙ הִפְגִּ֣עוּ בַ/מֶּ֔לֶךְ
    לְ/בִלְתִּ֥י שְׂרֹ֖ף אֶת הַ/מְּגִלָּ֑ה וְ/לֹ֥א שָׁמַ֖ע אֲלֵי/הֶֽם־׃
translation:
  text: Yet even Elnathan, Delaiah, and Gemariah urged the king not to burn the scroll,
    but he did not listen to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pleaded with the king not to burn the scroll.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: Yet even
  alternatives:
  - And also
  - Moreover even
  lexicon: HALOT
  rationale: 'Combines the conjunctive וְ with גַם in a way that marks addition with
    mild contrast in context: despite prior hostility, these officials also intervened.
    ''Yet even'' is natural English and preserves the emphatic additive sense.'
- source_word: הִפְגִּעוּ
  chosen: urged
  alternatives:
  - pleaded with
  - interceded with
  - entreated
  lexicon: HALOT
  rationale: The Hiphil of פגע here conveys earnest entreaty directed to the king.
    'Urged' is concise and idiomatic; 'pleaded with' is possible, but 'urged' better
    fits the construction with the following infinitive clause in modern English.
- source_word: בַמֶּלֶךְ
  chosen: the king
  alternatives:
  - with the king
  - to the king
  lexicon: HALOT
  rationale: The preposition ב with פגע can indicate the person appealed to. In English,
    the object is most naturally rendered directly as 'the king' after 'urged,' rather
    than preserving the preposition woodenly.
- source_word: לְבִלְתִּי שְׂרֹף
  chosen: not to burn
  alternatives:
  - so as not to burn
  - that he should not burn
  lexicon: HALOT
  rationale: This construction expresses prevention or entreaty that an action not
    be done. 'Not to burn' is the most natural English complement after 'urged the
    king.'
- source_word: הַמְּגִלָּה
  chosen: the scroll
  alternatives:
  - the scroll-roll
  - the document
  lexicon: HALOT
  rationale: מְגִלָּה denotes a written scroll. 'Scroll' is the standard and accurate
    rendering in this narrative context.
- source_word: וְלֹא שָׁמַע אֲלֵיהֶם
  chosen: but he did not listen to them
  alternatives:
  - and he did not listen to them
  - but he would not listen to them
  - but he did not heed them
  lexicon: HALOT
  rationale: The clause reports the king's refusal. Rendering וְ as 'but' brings out
    the adversative sense in context. 'Listen to them' is clear modern English; 'heed'
    is slightly more formal but less natural.
