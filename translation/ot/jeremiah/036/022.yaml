id: JER.36.22
reference: Jeremiah 36:22
source:
  edition: WLC
  text: וְ/הַ/מֶּ֗לֶךְ יוֹשֵׁב֙ בֵּ֣ית הַ/חֹ֔רֶף בַּ/חֹ֖דֶשׁ הַ/תְּשִׁיעִ֑י וְ/אֶת
    הָ/אָ֖ח לְ/פָנָ֥י/ו מְבֹעָֽרֶת־׃
translation:
  text: Now the king was sitting in the winter house in the ninth month, with the
    brazier burning before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fire pot'; the Hebrew term refers to a container for coals or fire
      used for warmth.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמֶּלֶךְ
  chosen: Now the king
  alternatives:
  - And the king
  lexicon: HALOT
  rationale: The conjunction ו can be rendered simply 'and,' but in narrative English
    'now' smoothly marks scene-setting without adding content. 'The king' is definite
    in Hebrew.
- source_word: יוֹשֵׁב
  chosen: was sitting
  alternatives:
  - sat
  - was dwelling
  lexicon: HALOT
  rationale: The participle gives a durative/imperfective sense in context, best represented
    by 'was sitting' as the narrative setting.
- source_word: בֵּית הַחֹרֶף
  chosen: the winter house
  alternatives:
  - the winter palace
  - the winter residence
  lexicon: HALOT
  rationale: Literally 'house of winter,' an idiom for a seasonal residence. 'Winter
    house' preserves the Hebrew expression more closely than 'palace,' which could
    over-specify.
- source_word: בַּחֹדֶשׁ הַתְּשִׁיעִי
  chosen: in the ninth month
  alternatives:
  - during the ninth month
  lexicon: HALOT
  rationale: A straightforward temporal phrase; 'in the ninth month' is natural and
    formally close.
- source_word: וְאֶת
  chosen: with
  alternatives:
  - and
  - while
  lexicon: HALOT
  rationale: 'Here אֶת introduces the accompanying circumstance rather than a direct
    object in English style. Rendering it with ''with'' makes the verbless circumstantial
    clause idiomatic: the brazier was before him and burning.'
- source_word: הָאָח
  chosen: the brazier
  alternatives:
  - the fire pot
  - the hearth
  lexicon: HALOT
  rationale: The term refers to a portable fire container used for warmth. 'Brazier'
    is the most precise concise English equivalent; 'hearth' would suggest a fixed
    fireplace.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in front of him
  lexicon: HALOT
  rationale: Standard spatial rendering; 'before him' fits the register and context.
- source_word: מְבֹעָרֶת
  chosen: burning
  alternatives:
  - kindled
  - aflame
  lexicon: HALOT
  rationale: The passive participle from בער describes the brazier/fire as burning.
    'Burning' is the clearest idiomatic English in this circumstantial clause.
