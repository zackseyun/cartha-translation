id: JER.36.20
reference: Jeremiah 36:20
source:
  edition: WLC
  text: וַ/יָּבֹ֤אוּ אֶל הַ/מֶּ֨לֶךְ֙ חָצֵ֔רָ/ה וְ/אֶת הַ/מְּגִלָּ֣ה הִפְקִ֔דוּ בְּ/לִשְׁכַּ֖ת
    אֱלִישָׁמָ֣ע הַ/סֹּפֵ֑ר וַ/יַּגִּ֨ידוּ֙ בְּ/אָזְנֵ֣י הַ/מֶּ֔לֶךְ אֵ֖ת כָּל הַ/דְּבָרִֽים־־־׃
translation:
  text: Then they went to the king in the court, after depositing the scroll in the
    chamber of Elishama the scribe, and they reported all the words in the hearing
    of the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they left the scroll in safekeeping in the chamber of Elishama the scribe.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''in the ears of the king,'' an idiom meaning ''in the hearing
      of the king.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: Then they went
  alternatives:
  - And they came
  - So they went
  lexicon: HALOT
  rationale: Wayyiqtol of בוא advances the narrative. 'Went' fits the movement toward
    the king from their prior location; 'Then' captures the sequential force naturally
    in English.
- source_word: חָצֵרָה
  chosen: in the court
  alternatives:
  - to the court
  - into the court
  - courtyard-ward
  lexicon: HALOT
  rationale: The noun חָצֵר with directional he indicates movement toward the court
    area. In English, because it follows 'to the king,' 'in the court' best conveys
    the king's location without awkward double destination phrasing. The directional
    nuance is absorbed into the clause as a whole.
- source_word: הַמְּגִלָּה
  chosen: the scroll
  alternatives:
  - the roll
  lexicon: HALOT
  rationale: מְגִלָּה denotes a written scroll. 'Scroll' is standard modern English
    and clearer than the older 'roll.'
- source_word: הִפְקִדוּ
  chosen: after depositing
  alternatives:
  - they deposited
  - they left in safekeeping
  - they entrusted
  lexicon: HALOT
  rationale: Hiphil of פקד here means to place/entrust for keeping. Rendering it as
    'after depositing' makes clear the action is prior to their report to the king
    and connects smoothly with the English sentence structure.
- source_word: בְּלִשְׁכַּת
  chosen: in the chamber of
  alternatives:
  - in the room of
  - in the office of
  lexicon: HALOT
  rationale: לִשְׁכָּה is a chamber or room, often an official chamber in a palace/temple
    complex. 'Chamber' preserves the formal setting better than 'room' or 'office.'
- source_word: אֱלִישָׁמָע
  chosen: Elishama
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  lexicon: HALOT
  rationale: סֹפֵר can denote a royal official/secretary, but 'scribe' is the more
    direct and traditional rendering and fits the court context. 'Secretary' is possible
    but more interpretive.
- source_word: וַיַּגִּידוּ
  chosen: they reported
  alternatives:
  - they told
  - they declared
  lexicon: HALOT
  rationale: נגד in Hiphil commonly means to tell or report. 'Reported' suits the
    formal court setting and the content being relayed to the king.
- source_word: בְּאָזְנֵי הַמֶּלֶךְ
  chosen: in the hearing of the king
  alternatives:
  - to the king
  - before the king
  lexicon: HALOT
  rationale: Literally 'in the ears of the king.' 'In the hearing of the king' preserves
    the idiom's force in natural English better than the flatter 'to the king.'
- source_word: אֵת כָּל הַדְּבָרִים
  chosen: all the words
  alternatives:
  - all these words
  - everything
  - all the matters
  lexicon: HALOT
  rationale: דְּבָרִים here most naturally refers to the contents just read from the
    scroll. 'All the words' preserves the textual/verbal emphasis better than the
    more idiomatic but less precise 'everything.'
