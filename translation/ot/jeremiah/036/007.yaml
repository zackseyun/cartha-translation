id: JER.36.7
reference: Jeremiah 36:7
source:
  edition: WLC
  text: אוּלַ֞י תִּפֹּ֤ל תְּחִנָּתָ/ם֙ לִ/פְנֵ֣י יְהוָ֔ה וְ/יָשֻׁ֕בוּ אִ֖ישׁ מִ/דַּרְכּ֣/וֹ הָ/רָעָ֑ה כִּֽי גָד֤וֹל הָ/אַף֙ וְ/הַ֣/חֵמָ֔ה אֲשֶׁר דִּבֶּ֥ר יְהוָ֖ה אֶל הָ/עָ֥ם הַ/זֶּֽה־־־׃
translation:
  text: Perhaps their plea will fall before Yahweh, and each man will turn from his evil way, for great is the anger and the wrath that Yahweh has spoken against this people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their supplication will come before the LORD' or 'their petition will be presented before the LORD.' The Hebrew literally says 'their plea will fall before the LORD,' an idiom for an appeal being laid before him.
    reason: lexical_alternative
  - marker: b
    text: Or 'each one will turn.' The Hebrew reads 'each man,' using a masculine singular distributive form.
    reason: lexical_alternative
  - marker: c
    text: Or 'the LORD has spoken to this people.' The translation 'against this people' brings out the judgment context of the statement.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּלַי
  chosen: Perhaps
  alternatives:
  - It may be
  - Maybe
  lexicon: HALOT
  rationale: Introduces possibility or hope rather than certainty. 'Perhaps' is concise and natural in English while preserving the tentative force.
- source_word: תִּפֹּל תְּחִנָּתָם לִפְנֵי יְהוָה
  chosen: their plea will fall before the LORD
  alternatives:
  - their supplication will come before the LORD
  - their petition will be presented before the LORD
  lexicon: HALOT
  rationale: The Hebrew idiom literally uses 'fall' with 'plea/supplication' before YHWH. Retaining 'fall before' preserves the vivid Hebrew image while remaining intelligible. 'Plea' is more readable than 'supplication' for modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְיָשֻׁבוּ
  chosen: and ... will turn
  alternatives:
  - and ... will return
  - and ... will repent
  lexicon: HALOT
  rationale: שׁוּב commonly denotes turning/returning, especially in repentance contexts. 'Turn' preserves the metaphor and avoids over-interpreting with the more theological 'repent'.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - everyone
  - each one
  lexicon: HALOT
  rationale: The singular distributive 'each man' reflects the Hebrew gender and number accurately. This follows the gender-accurate policy and preserves the individualizing force.
- source_word: מִדַּרְכּוֹ הָרָעָה
  chosen: from his evil way
  alternatives:
  - from his wicked way
  - from his evil path
  lexicon: HALOT
  rationale: '''Way'' is a standard and important biblical metaphor for conduct; ''evil'' is a straightforward rendering of רָעָה. ''Wicked'' is possible but slightly more interpretive in tone.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Here כִּי gives the reason for turning: divine anger is great. ''For'' is concise and fits the discourse flow.'
- source_word: גָדוֹל הָאַף וְהַחֵמָה
  chosen: great is the anger and the wrath
  alternatives:
  - great are the anger and the fury
  - great is the nose/anger and the heat
  lexicon: HALOT
  rationale: אַף and חֵמָה are overlapping terms for divine anger/wrath. Rendering both preserves the Hebrew intensification. 'Wrath' is a natural elevated equivalent for חֵמָה.
- source_word: אֲשֶׁר דִּבֶּר יְהוָה אֶל הָעָם הַזֶּה
  chosen: that the LORD has spoken against this people
  alternatives:
  - that the LORD has spoken to this people
  - that the LORD declared concerning this people
  lexicon: HALOT
  rationale: Although אֶל is formally 'to,' in context the content spoken is a judgment oracle directed against the people. English idiom prefers 'spoken against this people' to make the adversative sense clear without paraphrasing beyond context.
