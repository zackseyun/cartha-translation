id: JER.36.15
reference: Jeremiah 36:15
source:
  edition: WLC
  text: וַ/יֹּאמְר֣וּ אֵלָ֔י/ו שֵׁ֣ב נָ֔א וּ/קְרָאֶ֖/נָּה בְּ/אָזְנֵ֑י/נוּ וַ/יִּקְרָ֥א
    בָר֖וּךְ בְּ/אָזְנֵי/הֶֽם׃
translation:
  text: And they said to him, “Please sit down and read it in our hearing.” So Baruch
    read it in their hearing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'in our ears' ... 'in their ears,' a Hebrew idiom meaning 'so
      as to be heard by us/them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ אֵלָיו
  chosen: And they said to him
  alternatives:
  - Then they said to him
  - So they said to him
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And they said to him' is
    a natural, sufficiently formal rendering that preserves the sequence without overinterpreting
    the conjunction.
- source_word: שֵׁב נָא
  chosen: Please sit down
  alternatives:
  - Sit down, please
  - Please sit
  lexicon: HALOT
  rationale: שֵׁב is the imperative 'sit/dwell/remain'; in this immediate conversational
    context 'sit down' is idiomatic English. נָא adds politeness or entreaty, best
    conveyed by 'please.'
- source_word: וּקְרָאֶנָּה
  chosen: and read it
  alternatives:
  - and read this
  - and proclaim it
  lexicon: HALOT
  rationale: קרא commonly means 'read' when taking a written object in context. The
    3fs suffix refers back to the scroll/document previously mentioned; English idiom
    uses 'it' rather than 'her.' 'Proclaim' would overstate the setting.
- source_word: בְּאָזְנֵינוּ
  chosen: in our hearing
  alternatives:
  - in our ears
  - for us to hear
  lexicon: HALOT
  rationale: Literally 'in our ears,' a Hebrew idiom for audible reception. 'In our
    hearing' preserves the idiom's force in clear modern English better than the more
    wooden 'in our ears.'
- source_word: וַיִּקְרָא בָרוּךְ
  chosen: So Baruch read
  alternatives:
  - And Baruch read
  - Then Baruch read
  lexicon: HALOT
  rationale: The clause reports Baruch's compliance. 'So' smoothly conveys result
    or response to their request while remaining close to the narrative flow.
- source_word: בְּאָזְנֵיהֶם
  chosen: in their hearing
  alternatives:
  - in their ears
  - for them to hear
  lexicon: HALOT
  rationale: Same idiom as earlier in the verse. Rendering it consistently as 'in
    their hearing' preserves both the Hebrew expression and English readability.
