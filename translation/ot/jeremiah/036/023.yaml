id: JER.36.23
reference: Jeremiah 36:23
source:
  edition: WLC
  text: וַ/יְהִ֣י כִּ/קְר֣וֹא יְהוּדִ֗י שָׁלֹ֣שׁ דְּלָתוֹת֮ וְ/אַרְבָּעָה֒ יִֽקְרָעֶ֨/הָ֙
    בְּ/תַ֣עַר הַ/סֹּפֵ֔ר וְ/הַשְׁלֵ֕ךְ אֶל הָ/אֵ֖שׁ אֲשֶׁ֣ר אֶל הָ/אָ֑ח עַד תֹּם֙
    כָּל הַ/מְּגִלָּ֔ה עַל הָ/אֵ֖שׁ אֲשֶׁ֥ר עַל הָ/אָֽח׀־־־־־־׃
translation:
  text: And whenever Yehudi had read three or four columns, the king would cut it
    off with the scribe’s knife and throw it into the fire that was in the brazier,
    until the entire scroll was consumed in the fire that was in the brazier.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'three or four doors'; here the term refers to divisions of the scroll,
      likely its columns or panels.
    reason: lexical_alternative
  - marker: b
    text: Or 'firepot' or 'hearth' for 'brazier.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּקְרֹא
  chosen: whenever ... had read
  alternatives:
  - as ... read
  - when ... read
  lexicon: HALOT
  rationale: 'The infinitive construct with כ plus the following narrative context
    gives a repeated temporal sense in this episode: each time Yehudi read a section,
    the king acted. ''Whenever ... had read'' captures the iterative force better
    than a simple one-time ''when.'''
- source_word: יְהוּדִי
  chosen: Yehudi
  alternatives:
  - Jehudi
  lexicon: HALOT
  rationale: Personal names are transliterated rather than translated, per project
    philosophy. 'Yehudi' more directly reflects the Hebrew form.
- source_word: שָׁלֹשׁ דְּלָתוֹת וְאַרְבָּעָה
  chosen: three or four columns
  alternatives:
  - three or four leaves
  - three or four sections
  - three or four doors
  lexicon: HALOT
  rationale: דְּלָתוֹת literally means 'doors,' but in the context of a scroll being
    read and cut, it refers to panel-like sections or columns of the scroll. 'Columns'
    is the clearest idiomatic rendering for the written divisions being read successively.
- source_word: יִקְרָעֶהָ
  chosen: would cut it off
  alternatives:
  - cut it up
  - tear it
  lexicon: HALOT
  rationale: The verb קרע commonly means 'tear,' but here the instrument 'with the
    scribe’s knife' indicates cutting rather than tearing by hand. 'Would cut it off'
    reflects the repeated action and the physical removal of each read portion.
- source_word: בְּתַעַר הַסֹּפֵר
  chosen: with the scribe’s knife
  alternatives:
  - with a scribe’s razor
  - with the secretary’s knife
  lexicon: HALOT
  rationale: תער is a cutting blade or razor; in this context, 'knife' is more natural
    English for the implement used to cut a scroll. סֹפֵר can mean scribe/secretary;
    'scribe' preserves the literary-administrative setting.
- source_word: וְהַשְׁלֵךְ
  chosen: and throw it
  alternatives:
  - and cast it
  - and toss it
  lexicon: HALOT
  rationale: The form continues the sequence of repeated actions. 'Throw it' is natural
    modern English and preserves the force of discarding the cut piece into the fire.
- source_word: הָאָח
  chosen: the brazier
  alternatives:
  - the firepot
  - the hearth
  lexicon: HALOT
  rationale: אָח denotes a portable or indoor fire container/hearth. 'Brazier' best
    fits the winter-house setting in the surrounding context and explains how a fire
    could be 'in' or 'on' it.
- source_word: עַד תֹּם כָּל הַמְּגִלָּה
  chosen: until the entire scroll was consumed
  alternatives:
  - until all the scroll was finished
  - until the whole scroll came to an end
  lexicon: HALOT
  rationale: The phrase marks the endpoint of the destruction process. 'Was consumed'
    makes explicit the result in idiomatic English, which is implied by the repeated
    cutting and burning.
- source_word: הַמְּגִלָּה
  chosen: scroll
  alternatives:
  - roll
  lexicon: HALOT
  rationale: מְגִלָּה is the standard term for a written scroll. 'Scroll' is the normal
    modern equivalent.
- source_word: עַל הָאֵשׁ אֲשֶׁר עַל הָאָח / אֶל הָאֵשׁ אֲשֶׁר אֶל הָאָח
  chosen: in the fire that was in the brazier
  alternatives:
  - on the fire that was on the brazier
  - into the fire that was in the firepot
  lexicon: HALOT
  rationale: 'The paired prepositions vary slightly in Hebrew, but the sense is straightforward:
    the pieces were thrown into the fire associated with the brazier. English idiom
    prefers ''in the fire that was in the brazier'' rather than preserving the prepositional
    variation woodenly.'
