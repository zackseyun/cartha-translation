id: JER.36.31
reference: Jeremiah 36:31
source:
  edition: WLC
  text: וּ/פָקַדְתִּ֨י עָלָ֧י/ו וְ/עַל זַרְע֛/וֹ וְ/עַל עֲבָדָ֖י/ו אֶת עֲוֺנָ֑/ם וְ/הֵבֵאתִ֣י
    עֲ֠לֵי/הֶם וְ/עַל יֹשְׁבֵ֨י יְרוּשָׁלִַ֜ם וְ/אֶל אִ֣ישׁ יְהוּדָ֗ה אֵ֧ת כָּל הָ/רָעָ֛ה
    אֲשֶׁר דִּבַּ֥רְתִּי אֲלֵי/הֶ֖ם וְ/לֹ֥א שָׁמֵֽעוּ־־־־־־־׃ס
translation:
  text: And I will punish him and his offspring and his servants for their iniquity,
    and I will bring on them, on the inhabitants of Jerusalem, and on each man of
    Judah all the disaster that I spoke against them, but they did not listen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'each man of Judah.' The phrase is distributive singular and masculine
      in form; some translations generalize it as 'everyone in Judah' or 'the people
      of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָקַדְתִּי
  chosen: I will punish
  alternatives:
  - I will visit
  - I will call to account
  lexicon: HALOT
  rationale: פָּקַד in this context of judgment with עַל and object of guilt denotes
    punitive visitation or punishment rather than a neutral 'visit.' 'Punish' gives
    the plain sense in modern English.
- source_word: עָלָיו
  chosen: him
  alternatives:
  - against him
  - upon him
  lexicon: HALOT
  rationale: With פקד in a punitive sense, the preposition marks the person targeted
    by judgment. English expresses this naturally as the direct object 'him' rather
    than retaining the prepositional form.
- source_word: זַרְעוֹ
  chosen: his offspring
  alternatives:
  - his seed
  - his descendants
  lexicon: HALOT
  rationale: זֶרַע can mean seed or descendants. Here it refers to posterity; 'offspring'
    is natural and preserves the collective sense without archaic wording.
- source_word: עֲבָדָיו
  chosen: his servants
  alternatives:
  - his slaves
  lexicon: HALOT
  rationale: Although עֶבֶד can denote slave or servant, in this royal court context
    'servants' is the most idiomatic rendering for officials/attendants under the
    king, unless bonded status is specifically salient.
- source_word: אֶת עֲוֺנָם
  chosen: for their iniquity
  alternatives:
  - for their guilt
  - their punishment for sin
  lexicon: HALOT
  rationale: עָוֹן denotes iniquity/guilt and sometimes its consequence. Here it is
    best taken as the culpable wrongdoing for which punishment comes. 'Iniquity' preserves
    the moral weight.
- source_word: וְהֵבֵאתִי עֲלֵיהֶם
  chosen: and I will bring on them
  alternatives:
  - and I will bring upon them
  - and I will bring against them
  lexicon: HALOT
  rationale: הביא על is a standard idiom for bringing judgment/disaster upon someone.
    'Bring on them' is readable modern English while remaining close to the Hebrew.
- source_word: יֹשְׁבֵי יְרוּשָׁלִַם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - those dwelling in Jerusalem
  - the residents of Jerusalem
  lexicon: HALOT
  rationale: The participial construction means those who dwell/live in Jerusalem.
    'Inhabitants' is concise and standard in prophetic judgment contexts.
- source_word: אֶל אִישׁ יְהוּדָה
  chosen: on each man of Judah
  alternatives:
  - on the men of Judah
  - against every man of Judah
  lexicon: HALOT
  rationale: Though אֶל often means 'to,' in parallel with the repeated עַל and with
    הֵבֵאתִי it functions as the target of the coming disaster. אִישׁ is distributive
    singular, so 'each man of Judah' preserves the Hebrew's gender-accurate and distributive
    force.
- source_word: כָּל הָרָעָה
  chosen: all the disaster
  alternatives:
  - all the evil
  - all the calamity
  lexicon: HALOT
  rationale: In prophetic judgment contexts רָעָה commonly refers to calamity/disaster
    rather than moral evil. 'Disaster' best communicates divinely announced judgment
    in contemporary English.
- source_word: אֲשֶׁר דִּבַּרְתִּי אֲלֵיהֶם
  chosen: that I spoke against them
  alternatives:
  - that I declared to them
  - that I pronounced against them
  lexicon: HALOT
  rationale: Although the preposition can be rendered 'to them,' the content is threatened
    judgment; English 'spoke against them' makes explicit the hostile/judicial force
    already implied by context.
- source_word: וְלֹא שָׁמֵעוּ
  chosen: but they did not listen
  alternatives:
  - and they did not listen
  - but they did not obey
  lexicon: HALOT
  rationale: שׁמע can mean hear/listen/obey. Here the refusal to heed prophetic warning
    is in view. 'Did not listen' is the more direct rendering, while 'but' captures
    the adversative sense in context.
