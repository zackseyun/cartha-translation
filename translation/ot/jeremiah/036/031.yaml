theological_decisions:
- issue: Rendering of אִישׁ יְהוּדָה
  chosen_reading: each man of Judah
  alternative_readings:
  - the people of Judah
  - everyone in Judah
  rationale: Per the translation philosophy, gender-accurate renderings are preferred
    where the source is grammatically masculine and representative. The distributive
    singular אִישׁ is preserved as 'each man,' with the understanding that it refers
    broadly to the male members of Judah in the judgment oracle rather than being
    flattened to a gender-neutral collective.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
