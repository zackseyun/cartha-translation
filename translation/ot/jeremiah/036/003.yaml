theological_decisions:
- issue: Rendering of רָעָה for threatened divine judgment
  chosen_reading: disaster
  alternative_readings:
  - evil
  - calamity
  rationale: Because the verse speaks of what God plans to do to Judah in judgment,
    the noun denotes calamity/disaster rather than moral evil. This avoids implying
    that God commits moral evil while preserving the text's statement of threatened
    judgment.
- issue: Representative masculine אִישׁ
  chosen_reading: each man
  alternative_readings:
  - each one
  - everyone
  rationale: Per the translation philosophy's gender-accurate guideline, the masculine
    singular representative form is preserved in English rather than neutralized.
    The phrase is corporate in scope but grammatically singular masculine in Hebrew.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
