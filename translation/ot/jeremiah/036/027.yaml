id: JER.36.27
reference: Jeremiah 36:27
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֶֽל יִרְמְיָ֑הוּ אַחֲרֵ֣י שְׂרֹ֣ף הַ/מֶּ֗לֶךְ אֶת
    הַ/מְּגִלָּה֙ וְ/אֶת הַ/דְּבָרִ֔ים אֲשֶׁ֨ר כָּתַ֥ב בָּר֛וּךְ מִ/פִּ֥י יִרְמְיָ֖הוּ
    לֵ/אמֹֽר־־׀־־׃
translation:
  text: Then the word of the LORD came to Jeremiah, after the king had burned the
    scroll and the words that Baruch had written from the mouth of Jeremiah, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at Jeremiah’s dictation'; literally, 'from the mouth of Jeremiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - Now ... came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence.
    'Then' preserves the progression naturally in modern English without the wooden
    'and it happened.'
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Word' preserves the covenantal
    and revelatory force better than the more interpretive 'message.' 'LORD' follows
    the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: אַחֲרֵי שְׂרֹף
  chosen: after ... had burned
  alternatives:
  - after the burning of
  - after ... burned
  lexicon: HALOT
  rationale: The preposition plus infinitive construct marks a temporal clause. English
    past perfect ('had burned') clearly situates the action prior to the coming of
    the word.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to the king already in context; simple definite
    rendering is sufficient.
- source_word: הַמְּגִלָּה
  chosen: the scroll
  alternatives:
  - the scroll-roll
  - the book scroll
  lexicon: HALOT
  rationale: מְגִלָּה denotes a rolled written document. 'Scroll' is the clear and
    standard English equivalent.
- source_word: וְאֶת הַדְּבָרִים
  chosen: and the words
  alternatives:
  - and the contents
  - and the things written
  lexicon: HALOT
  rationale: The text distinguishes the physical scroll from the words written on
    it. 'Words' preserves that distinction and the emphasis on the prophetic utterances
    themselves.
- source_word: אֲשֶׁר כָּתַב בָּרוּךְ
  chosen: that Baruch had written
  alternatives:
  - which Baruch wrote
  lexicon: HALOT
  rationale: Relative clause identifying the words. Past perfect fits the temporal
    relation to the king's burning.
- source_word: מִפִּי יִרְמְיָהוּ
  chosen: from the mouth of Jeremiah
  alternatives:
  - at Jeremiah's dictation
  - from Jeremiah
  lexicon: HALOT
  rationale: Literally 'from the mouth of Jeremiah.' This idiom indicates dictation/oral
    source. The more literal rendering is retained because it is clear in English
    and preserves the oral-prophetic texture; a smoother alternative is worth noting.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'thus:'
  - 'these words:'
  lexicon: HALOT
  rationale: Standard speech introducer. 'Saying,' naturally leads into the following
    divine speech in the next verse.
