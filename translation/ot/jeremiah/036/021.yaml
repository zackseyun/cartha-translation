id: JER.36.21
reference: Jeremiah 36:21
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֨ח הַ/מֶּ֜לֶךְ אֶת יְהוּדִ֗י לָ/קַ֨חַת֙ אֶת הַ/מְּגִלָּ֔ה וַ/יִּ֨קָּחֶ֔/הָ
    מִ/לִּשְׁכַּ֖ת אֱלִישָׁמָ֣ע הַ/סֹּפֵ֑ר וַ/יִּקְרָאֶ֤/הָ יְהוּדִי֙ בְּ/אָזְנֵ֣י
    הַ/מֶּ֔לֶךְ וּ/בְ/אָזְנֵי֙ כָּל הַ/שָּׂרִ֔ים הָ/עֹמְדִ֖ים מֵ/עַ֥ל הַ/מֶּֽלֶךְ־־־׃
translation:
  text: Then the king sent Jehudi to get the scroll, and he took it from the chamber
    of Elishama the scribe. And Jehudi read it in the hearing of the king and in the
    hearing of all the officials standing beside the king.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to take the scroll.'
    reason: lexical_alternative
  - marker: b
    text: '''The scribe'' could also be rendered ''the secretary'' in a royal administrative
      context.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'in the ears of.'
    reason: lexical_alternative
  - marker: d
    text: Literally 'standing over the king,' likely meaning those attending or standing
      beside him.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard wayyiqtol of שׁלח in narrative; 'sent' is the natural English
    narrative equivalent.
- source_word: יְהוּדִי
  chosen: Jehudi
  rationale: Personal name, so transliterated per translation philosophy rather than
    translated.
- source_word: לָקַחַת
  chosen: to get
  alternatives:
  - to take
  lexicon: HALOT
  rationale: Infinitive of purpose after 'sent.' 'Get' is slightly more idiomatic
    in English here while still accurately reflecting the act of fetching the scroll.
- source_word: הַמְּגִלָּה
  chosen: the scroll
  alternatives:
  - the roll
  lexicon: HALOT
  rationale: מְגִלָּה refers to a written scroll; 'scroll' is the clear modern equivalent.
- source_word: וַיִּקָּחֶהָ
  chosen: he took it
  alternatives:
  - he fetched it
  lexicon: HALOT
  rationale: Direct continuation of the command; English pronoun 'it' naturally represents
    the feminine singular suffix referring to the scroll.
- source_word: מִלִּשְׁכַּת
  chosen: from the chamber of
  alternatives:
  - from the room of
  - from the office of
  lexicon: HALOT
  rationale: לִשְׁכָּה commonly denotes a chamber/room, often an official room in
    a palace or temple complex. 'Chamber' preserves the formal setting without sounding
    archaic in context.
- source_word: אֱלִישָׁמָע
  chosen: Elishama
  rationale: Personal name, transliterated.
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  lexicon: HALOT
  rationale: סֹפֵר can denote a royal secretary or scribe. 'Scribe' preserves the
    lexical form and fits the court context; 'secretary' is possible but less transparent
    to the Hebrew term.
- source_word: וַיִּקְרָאֶהָ
  chosen: read it
  alternatives:
  - proclaimed it
  - read it aloud
  lexicon: HALOT
  rationale: קרא with a written object commonly means 'read.' The public setting implies
    oral reading, but 'read it' already conveys that sufficiently in English.
- source_word: בְּאָזְנֵי
  chosen: in the hearing of
  alternatives:
  - before
  - in the ears of
  lexicon: HALOT
  rationale: Idiomatic Hebrew expression meaning in someone's hearing/presence. 'In
    the hearing of' preserves the auditory emphasis better than simply 'before.'
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the commanders
  lexicon: HALOT
  rationale: שָׂרִים in this royal court context refers to high officials. 'Officials'
    is accurate and accessible modern English; 'princes' could mislead readers toward
    royal sons.
- source_word: הָעֹמְדִים מֵעַל הַמֶּלֶךְ
  chosen: standing beside the king
  alternatives:
  - standing over the king
  - standing by the king
  lexicon: HALOT
  rationale: Literally 'standing from/upon/over the king,' an idiom for attendants
    or courtiers positioned near him. 'Standing beside the king' best conveys the
    spatial and courtly sense in natural English without implying superiority.
