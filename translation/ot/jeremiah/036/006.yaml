id: JER.36.6
reference: Jeremiah 36:6
source:
  edition: WLC
  text: וּ/בָאתָ֣ אַתָּ֡ה וְ/קָרָ֣אתָ בַ/מְּגִלָּ֣ה אֲשֶׁר כָּתַֽבְתָּ מִ/פִּ/י֩ אֶת
    דִּבְרֵ֨י יְהוָ֜ה בְּ/אָזְנֵ֥י הָ/עָ֛ם בֵּ֥ית יְהוָ֖ה בְּ/י֣וֹם צ֑וֹם וְ/גַ֨ם
    בְּ/אָזְנֵ֧י כָל יְהוּדָ֛ה הַ/בָּאִ֥ים מֵ/עָרֵי/הֶ֖ם תִּקְרָאֵֽ/ם־־־־׃
translation:
  text: So you yourself must go and read from the scroll that you wrote from my mouth—the
    words of the LORD—in the hearing of the people in the house of the LORD on a day
    of fasting; and you must also read them in the hearing of all Judah who come from
    their cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that you wrote at my dictation'; literally, 'that you wrote from my
      mouth.'
    reason: lexical_alternative
  - marker: b
    text: '''The house of the LORD'' refers to the temple.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבָאתָ אַתָּה
  chosen: So you yourself must go
  alternatives:
  - And you shall come, you
  - Then you are to go
  lexicon: HALOT
  rationale: The waw plus qatal continues Jeremiah's instruction with an imperative-like
    force in context. אַתָּה is emphatic, so 'you yourself' preserves the emphasis.
    'Go' is more natural English than 'come' because the command is directed toward
    Baruch's movement to the temple from Jeremiah's location.
- source_word: וְקָרָאתָ
  chosen: and read
  alternatives:
  - and proclaim
  - and call out
  lexicon: HALOT
  rationale: קרא with a written object regularly means 'read' or 'read aloud.' Because
    the object is a scroll, 'read' is the most precise gloss; the public setting implies
    oral delivery without needing to paraphrase as 'proclaim.'
- source_word: בַמְּגִלָּה
  chosen: from the scroll
  alternatives:
  - in the scroll
  - the scroll
  lexicon: HALOT
  rationale: The preposition ב with 'read' can indicate reading from a written document.
    'From the scroll' is idiomatic English and reflects the instrumental/documentary
    sense.
- source_word: אֲשֶׁר כָּתַבְתָּ מִפִּי
  chosen: that you wrote from my mouth
  alternatives:
  - that you wrote at my dictation
  - that you wrote from my lips
  lexicon: HALOT
  rationale: The idiom literally means Baruch wrote what came from Jeremiah's spoken
    words. 'From my mouth' keeps the vivid Hebrew expression while remaining understandable;
    the more interpretive 'at my dictation' is possible but less transparent to the
    source.
- source_word: אֶת דִּבְרֵי יְהוָה
  chosen: the words of the LORD
  alternatives:
  - the words from the LORD
  lexicon: HALOT
  rationale: This is the direct object of what was written/read. 'The words of the
    LORD' is the standard and natural rendering. YHWH is rendered 'the LORD' per doctrine
    guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md contested terms table, יְהוָה is rendered 'the LORD'
    in the main text.
- source_word: בְּאָזְנֵי הָעָם
  chosen: in the hearing of the people
  alternatives:
  - in the ears of the people
  - before the people
  lexicon: HALOT
  rationale: The idiom literally refers to hearing and means public oral delivery.
    'In the hearing of' preserves the auditory emphasis better than the looser 'before.'
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of the LORD.' While this refers to the temple, retaining
    'house' preserves the Hebrew expression and remains clear in context.
- source_word: בְּיוֹם צוֹם
  chosen: on a day of fasting
  alternatives:
  - on the fast day
  - on a day of fast
  lexicon: HALOT
  rationale: The phrase denotes the occasion of a public fast. 'On a day of fasting'
    is natural English and avoids implying a specifically named festival unless context
    establishes it.
- source_word: וְגַם
  chosen: and also
  alternatives:
  - also
  - and furthermore
  lexicon: HALOT
  rationale: Adds a second audience beyond the temple crowd. 'And also' preserves
    the additive force.
- source_word: בְּאָזְנֵי כָל יְהוּדָה
  chosen: in the hearing of all Judah
  alternatives:
  - before all Judah
  - to all Judah
  lexicon: HALOT
  rationale: Again the auditory idiom is best preserved. 'All Judah' here means the
    people of Judah collectively, not merely the territory.
- source_word: הַבָּאִים מֵעָרֵיהֶם
  chosen: who come from their cities
  alternatives:
  - who are coming from their towns
  - coming from their cities
  lexicon: HALOT
  rationale: The participle describes those arriving from Judah's various cities.
    'Cities' is a straightforward rendering of עָרִים.
- source_word: תִּקְרָאֵם
  chosen: you must also read them
  alternatives:
  - you shall read them
  - you must read them aloud to them
  lexicon: HALOT
  rationale: The suffix refers back to 'the words of the LORD.' Repeating 'read' maintains
    lexical consistency with the earlier קרא and keeps the command force in context.
