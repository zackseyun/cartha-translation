  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project's doctrinal and translation guidance specifies 'the LORD'
    as the default rendering for YHWH, following Jewish reverence tradition and the
    Septuagintal pattern.
