id: JER.36.5
reference: Jeremiah 36:5
source:
  edition: WLC
  text: וַ/יְצַוֶּ֣ה יִרְמְיָ֔הוּ אֶת בָּר֖וּךְ לֵ/אמֹ֑ר אֲנִ֣י עָצ֔וּר לֹ֣א אוּכַ֔ל לָ/ב֖וֹא בֵּ֥ית יְהוָֽה־׃
translation:
  text: Then Jeremiah commanded Baruch, saying, “I am restrained; I cannot go into the house of Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I am confined,” “I am shut up,” or “I am prevented.” The Hebrew is ambiguous about the exact nature of Jeremiah’s restriction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַוֶּה
  chosen: commanded
  alternatives:
  - instructed
  - charged
  lexicon: HALOT
  rationale: The piel of צוה commonly denotes giving a command or charge. 'Commanded' preserves the directive force better than the softer 'instructed.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thus
  - as follows
  lexicon: HALOT
  rationale: Standard speech introducer; 'saying' is natural and sufficiently formal without adding content.
- source_word: עָצוּר
  chosen: restrained
  alternatives:
  - confined
  - shut up
  - detained
  - prevented
  lexicon: HALOT
  rationale: The passive adjective from עצר indicates being held back or prevented. 'Restrained' preserves the ambiguity of whether Jeremiah is under official restriction, ritual limitation, or some other hindrance, whereas 'imprisoned' would over-specify and 'shut up' is archaic in modern English.
- source_word: לֹא אוּכַל
  chosen: I cannot
  alternatives:
  - I am not able to
  lexicon: HALOT
  rationale: This is the plain idiomatic rendering of the negated יכול form, expressing inability.
- source_word: לָבוֹא
  chosen: go into
  alternatives:
  - enter
  - come into
  lexicon: HALOT
  rationale: With בית יהוה, the sense is entering the temple precincts/building. 'Go into' fits the speaker's perspective and reads naturally in English.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  - the house of Yahweh
  lexicon: HALOT
  rationale: בית יהוה is literally 'house of YHWH.' 'House of the LORD' preserves the Hebrew expression while remaining clear. Per doctrine, יְהוָה is rendered 'the LORD,' not 'Yahweh' in the main text.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving the conventional small-caps covenantal rendering in English.
