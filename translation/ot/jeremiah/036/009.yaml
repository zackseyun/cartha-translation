  from: And it happened in the fifth year of Jehoiakim son of Josiah, king of Judah, in the ninth month, that all the people in Jerusalem and all the people coming from the cities of Judah into Jerusalem proclaimed a fast before the LORD.
  to: And it happened in the fifth year of Jehoiakim son of Josiah, king of Judah, in the ninth month, that they proclaimed a fast before the LORD for all the people in Jerusalem and all the people coming from the cities of Judah into Jerusalem.
  rationale: Changed the subject of 'proclaimed' from the people to an indefinite 'they,' reflecting the Hebrew verb without making the gathered people the ones issuing the proclamation. Also rendered לְפְנֵי יְהוָה with 'before the LORD' and kept both groups of people as the beneficiaries/participants of the proclaimed fast.
