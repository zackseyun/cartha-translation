id: JER.36.9
reference: Jeremiah 36:9
source:
  edition: WLC
  text: וַ/יְהִ֣י בַ/שָּׁנָ֣ה הַ֠/חֲמִשִׁית לִ/יהוֹיָקִ֨ים בֶּן יֹאשִׁיָּ֤הוּ מֶֽלֶךְ יְהוּדָה֙ בַּ/חֹ֣דֶשׁ הַ/תְּשִׁעִ֔י קָרְא֨וּ צ֜וֹם לִ/פְנֵ֧י יְהוָ֛ה כָּל הָ/עָ֖ם בִּ/ירֽוּשָׁלִָ֑ם וְ/כָל הָ/עָ֗ם הַ/בָּאִ֛ים מֵ/עָרֵ֥י יְהוּדָ֖ה בִּ/ירוּשָׁלִָֽם־־־־׃
translation:
  text: And it happened in the fifth year of Jehoiakim son of Josiah, king of Judah, in the ninth month, that they proclaimed a fast before Yahweh for all the people in Jerusalem and all the people coming from the cities of Judah into Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''before Yahweh.'' The main text follows the project''s default rendering of the divine name as ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new event. 'And it happened' preserves the Hebrew discourse function without archaic English.
- source_word: בַשָּׁנָה הַחֲמִשִׁית
  chosen: in the fifth year
  alternatives:
  - during the fifth year
  lexicon: HALOT
  rationale: Standard temporal construction with beth + 'year' + ordinal, best rendered straightforwardly as a date formula.
- source_word: לִיהוֹיָקִים בֶּן יֹאשִׁיָּהוּ מֶלֶךְ יְהוּדָה
  chosen: of Jehoiakim son of Josiah, king of Judah
  alternatives:
  - belonging to Jehoiakim son of Josiah, the king of Judah
  lexicon: HALOT
  rationale: The lamed with the royal name in dating formulas is naturally rendered 'of Jehoiakim.' Personal names are transliterated per project philosophy.
- source_word: בַּחֹדֶשׁ הַתְּשִׁעִי
  chosen: in the ninth month
  alternatives:
  - in the ninth month of the year
  lexicon: HALOT
  rationale: Simple calendrical notation; no need to expand beyond the Hebrew.
- source_word: קָרְאוּ
  chosen: proclaimed
  alternatives:
  - called
  - announced
  lexicon: HALOT
  rationale: קרא with צום idiomatically means to proclaim or call a fast. 'Proclaimed' is idiomatic in English and fits the public nature of the action.
- source_word: צוֹם
  chosen: a fast
  alternatives:
  - fasting
  lexicon: HALOT
  rationale: Concrete noun referring to the observance itself, not merely the act of abstaining.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - before Yahweh
  - in the presence of the LORD
  lexicon: HALOT
  rationale: לִפְנֵי denotes orientation before or in the presence of God. The divine name יְהוָה is rendered 'the LORD' per doctrine.
- source_word: כָּל הָעָם בִּירוּשָׁלָם
  chosen: all the people in Jerusalem
  alternatives:
  - all the people of Jerusalem
  lexicon: HALOT
  rationale: The phrase identifies the population located in Jerusalem. 'In Jerusalem' matches the preposition and avoids implying only native residents.
- source_word: וְכָל הָעָם הַבָּאִים מֵעָרֵי יְהוּדָה בִּירוּשָׁלָם
  chosen: and all the people coming from the cities of Judah into Jerusalem
  alternatives:
  - and all the people who came from the cities of Judah to Jerusalem
  - and all the people arriving from the towns of Judah in Jerusalem
  lexicon: HALOT
  rationale: The participle הַבָּאִים is best represented with an English participial or relative clause. 'Cities' is the normal rendering of עָרִים here; 'into Jerusalem' reflects motion toward the city.
