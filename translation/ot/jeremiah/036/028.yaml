id: JER.36.28
reference: Jeremiah 36:28
source:
  edition: WLC
  text: שׁ֥וּב קַח לְ/ךָ֖ מְגִלָּ֣ה אַחֶ֑רֶת וּ/כְתֹ֣ב עָלֶ֗י/הָ אֵ֤ת כָּל הַ/דְּבָרִים֙
    הָ/רִ֣אשֹׁנִ֔ים אֲשֶׁ֣ר הָי֗וּ עַל הַ/מְּגִלָּה֙ הָ/רִ֣אשֹׁנָ֔ה אֲשֶׁ֥ר שָׂרַ֖ף
    יְהוֹיָקִ֥ים מֶֽלֶךְ יְהוּדָֽה־־־־׃
translation:
  text: Take another scroll for yourself and write on it all the former words that
    were on the first scroll, which Jehoiakim king of Judah burned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Take again for yourself another scroll.' The Hebrew opens with an imperative
      meaning 'return/again,' which functions idiomatically with 'take.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּב
  chosen: Take
  alternatives:
  - Again
  - Return
  lexicon: HALOT
  rationale: Though literally 'return/turn back/again,' in the sequence שׁוּב קַח
    it functions adverbially with the following imperative, yielding the idiomatic
    sense 'take again' or 'take another time.' English expresses this naturally by
    folding the repetition into 'another' and the imperative 'Take.'
- source_word: קַח לְךָ
  chosen: Take another scroll for yourself
  alternatives:
  - Take for yourself another scroll
  - Get yourself another scroll
  lexicon: HALOT
  rationale: קַח is the main imperative 'take.' The dative לְךָ is retained with 'for
    yourself' rather than omitted, since it is present in the Hebrew and adds personal
    direction to the command.
- source_word: מְגִלָּה אַחֶרֶת
  chosen: another scroll
  alternatives:
  - another roll
  - another book-scroll
  lexicon: HALOT
  rationale: מְגִלָּה refers to a written scroll. 'Scroll' is the clearest modern
    equivalent; 'roll' is archaic here. אַחֶרֶת is straightforwardly 'another.'
- source_word: וּכְתֹב עָלֶיהָ
  chosen: and write on it
  alternatives:
  - and write upon it
  lexicon: HALOT
  rationale: A direct imperative continuation. 'On it' is natural modern English for
    עָלֶיהָ in the context of writing on a scroll.
- source_word: אֵת כָּל הַדְּבָרִים הָרִאשֹׁנִים
  chosen: all the former words
  alternatives:
  - all the first words
  - all the previous words
  lexicon: HALOT
  rationale: דְּבָרִים here means the contents/words of the prophetic scroll. הָרִאשֹׁנִים
    can be 'first' or 'former'; 'former' best fits the contrast with the replacement
    scroll and sounds natural in English.
- source_word: אֲשֶׁר הָיוּ עַל הַמְּגִלָּה הָרִאשֹׁנָה
  chosen: that were on the first scroll
  alternatives:
  - which were on the former scroll
  lexicon: HALOT
  rationale: This relative clause identifies the words as those previously written
    on the original scroll. 'First scroll' is a natural rendering of הָרִאשֹׁנָה here.
- source_word: אֲשֶׁר שָׂרַף
  chosen: which ... burned
  alternatives:
  - that ... burned up
  lexicon: HALOT
  rationale: 'שָׂרַף means ''burn.'' English places the subject before the verb in
    the relative clause: ''which Jehoiakim ... burned.'' ''Burned'' is sufficient
    without adding ''up,'' which would slightly intensify beyond the Hebrew.'
- source_word: יְהוֹיָקִים מֶלֶךְ יְהוּדָה
  chosen: Jehoiakim king of Judah
  alternatives:
  - Jehoiakim, the king of Judah
  lexicon: HALOT
  rationale: Personal name is transliterated per project policy. The royal title is
    rendered directly and kept appositional in a compact biblical style.
