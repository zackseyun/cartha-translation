id: JER.36.12
reference: Jeremiah 36:12
source:
  edition: WLC
  text: וַ/יֵּ֤רֶד בֵּית הַ/מֶּ֨לֶךְ֙ עַל לִשְׁכַּ֣ת הַ/סֹּפֵ֔ר וְ/הִ֨נֵּה שָׁ֔ם כָּל
    הַ/שָּׂרִ֖ים יֽוֹשְׁבִ֑ים אֱלִישָׁמָ֣ע הַ/סֹּפֵ֡ר וּ/דְלָיָ֣הוּ בֶן שְׁ֠מַעְיָהוּ
    וְ/אֶלְנָתָ֨ן בֶּן עַכְבּ֜וֹר וּ/גְמַרְיָ֧הוּ בֶן שָׁפָ֛ן וְ/צִדְקִיָּ֥הוּ בֶן
    חֲנַנְיָ֖הוּ וְ/כָל הַ/שָּׂרִֽים־־־־־־־־־׃
translation:
  text: 'he went down to the king''s house, to the scribe''s chamber, and behold,
    all the officials were sitting there: Elishama the scribe, Delaiah son of Shemaiah,
    Elnathan son of Achbor, Gemariah son of Shaphan, Zedekiah son of Hananiah, and
    all the officials.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the royal palace' for 'the king's house.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the scribe's room' or 'the secretary's chamber.'
    reason: lexical_alternative
  - marker: c
    text: '''Officials'' renders a Hebrew term often translated ''princes,'' referring
      here to court leaders or royal officers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  chosen: he went down
  alternatives:
  - he descended
  - he went
  lexicon: HALOT
  rationale: ירד commonly means 'go down/descend.' 'Went down' preserves the directional
    nuance without sounding overly formal.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king's house
  alternatives:
  - the royal palace
  - the house of the king
  lexicon: HALOT
  rationale: Literally 'house of the king.' 'The king's house' is a natural English
    rendering that preserves the concrete Hebrew expression; 'palace' is possible
    but slightly more interpretive.
- source_word: עַל
  chosen: to
  alternatives:
  - into
  - up to
  lexicon: HALOT
  rationale: Although על often means 'on/upon,' in this movement expression with ירד
    and destination it functions idiomatically for movement toward a place. 'To' gives
    the sense clearly in English.
- source_word: לִשְׁכַּת הַסֹּפֵר
  chosen: the scribe's chamber
  alternatives:
  - the secretary's chamber
  - the scribe's room
  lexicon: HALOT
  rationale: לשכה denotes a chamber/room, often an official room in a larger complex.
    'Chamber' fits the administrative setting and remains readable. 'Scribe' is retained
    for ספר here because it denotes an official scribal office, not merely generic
    literacy.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - now
  lexicon: HALOT
  rationale: הנה is a discourse marker drawing attention to what follows. 'And behold'
    preserves the vividness and narrative force better than a flattened omission.
- source_word: כָּל הַשָּׂרִים
  chosen: all the officials
  alternatives:
  - all the princes
  - all the commanders
  lexicon: HALOT
  rationale: שׂרים in this court context refers to royal officials/court officers.
    'Officials' communicates the administrative sense in modern English better than
    the traditional but potentially misleading 'princes.'
- source_word: יֹשְׁבִים
  chosen: were sitting
  alternatives:
  - sat
  - were seated
  lexicon: HALOT
  rationale: The participle depicts an ongoing state. 'Were sitting' preserves the
    scene-setting aspect more transparently than the simple past 'sat.'
- source_word: אֱלִישָׁמָע הַסֹּפֵר
  chosen: Elishama the scribe
  alternatives:
  - Elishama the secretary
  lexicon: HALOT
  rationale: The title identifies Elishama's office. 'Scribe' is retained for consistency
    with the earlier occurrence and because it can denote an official court scribe.
- source_word: דְלָיָהוּ בֶן שְׁמַעְיָהוּ
  chosen: Delaiah son of Shemaiah
  lexicon: HALOT
  rationale: Personal names are transliterated, and בן is rendered 'son of' in keeping
    with the source and the project's name policy.
- source_word: אֶלְנָתָן בֶּן עַכְבּוֹר
  chosen: Elnathan son of Achbor
  lexicon: HALOT
  rationale: Standard transliteration of names; 'son of' preserves the genealogical
    notation.
- source_word: גְמַרְיָהוּ בֶן שָׁפָן
  chosen: Gemariah son of Shaphan
  lexicon: HALOT
  rationale: Standard transliteration of names; 'son of' preserves the genealogical
    notation.
- source_word: צִדְקִיָּהוּ בֶן חֲנַנְיָהוּ
  chosen: Zedekiah son of Hananiah
  lexicon: HALOT
  rationale: Standard transliteration of names; 'son of' preserves the genealogical
    notation.
- source_word: וְכָל הַשָּׂרִים
  chosen: and all the officials
  alternatives:
  - and all the other officials
  lexicon: HALOT
  rationale: The phrase rounds out the list beyond the named individuals. 'And all
    the officials' is formally accurate; 'other' is implied but not explicit in the
    Hebrew, so it is not added to the main text.
