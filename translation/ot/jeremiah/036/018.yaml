id: JER.36.18
reference: Jeremiah 36:18
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר לָ/הֶם֙ בָּר֔וּךְ מִ/פִּי/ו֙ יִקְרָ֣א אֵלַ֔/י אֵ֥ת כָּל הַ/דְּבָרִ֖ים
    הָ/אֵ֑לֶּה וַ/אֲנִ֛י כֹּתֵ֥ב עַל הַ/סֵּ֖פֶר בַּ/דְּיֽוֹ־־׃פ
translation:
  text: Then Baruch said to them, “He would dictate to me all these words with his
    mouth, and I was writing them on the scroll with ink.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “He would read to me all these words from his mouth, and I wrote them
      on the scroll in ink.” The Hebrew verb often means “read,” but here the context
      favors the sense of dictation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    English narrative flow while preserving sequence.
- source_word: בָּרוּךְ
  chosen: Baruch
  rationale: Personal name is transliterated per translation philosophy.
- source_word: מִפִּיו
  chosen: with his mouth
  alternatives:
  - from his mouth
  - by dictation
  lexicon: HALOT
  rationale: Literally 'from his mouth.' In context it describes oral dictation. 'With
    his mouth' preserves the concrete Hebrew image while remaining intelligible in
    English; the dictation sense is reinforced by the verb choice.
- source_word: יִקְרָא
  chosen: would dictate
  alternatives:
  - would read
  - was calling out
  - would proclaim
  lexicon: HALOT
  rationale: Although קרא commonly means 'read/call,' in this context Jeremiah is
    orally giving words for Baruch to write. English 'dictate' best captures the functional
    sense without unnecessary awkwardness.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Straightforward prepositional pronoun indicating Baruch as recipient
    of the spoken words.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  lexicon: HALOT
  rationale: דברים here refers to the spoken/written prophetic words, so 'words' is
    the most precise rendering.
- source_word: וַאֲנִי כֹּתֵב
  chosen: and I was writing
  alternatives:
  - and I wrote
  - while I wrote
  lexicon: HALOT
  rationale: The clause presents Baruch's concurrent action in response to Jeremiah's
    dictation. 'I was writing' conveys the ongoing/imperfective sense naturally in
    English.
- source_word: עַל הַסֵּפֶר
  chosen: on the scroll
  alternatives:
  - in the book
  - on the document
  lexicon: HALOT
  rationale: סֵפֶר in Jeremiah 36 refers to a written scroll, not a bound modern 'book.'
    'Scroll' is historically and contextually accurate.
- source_word: בַּדְּיוֹ
  chosen: with ink
  alternatives:
  - in ink
  lexicon: HALOT
  rationale: The beth preposition here is instrumental/material. 'With ink' is the
    most natural English rendering.
