theological_decisions:
- issue: Force of עַל in the list of recipients/subjects of Jeremiah's words
  chosen_reading: concerning Israel and concerning Judah and concerning all the nations
  alternative_readings:
  - against Israel and against Judah and against all the nations
  rationale: The verse summarizes the totality of divine words spoken to Jeremiah
    over time. Because those words include more than judgment alone, rendering עַל
    as 'concerning' avoids importing a narrower theological emphasis than the text
    explicitly states, while still allowing readers to understand that many such words
    were indeed oracles against these groups.
  doctrine_reference: Translation philosophy §1, §3
