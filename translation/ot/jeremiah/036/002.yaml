id: JER.36.2
reference: Jeremiah 36:2
source:
  edition: WLC
  text: קַח לְ/ךָ֮ מְגִלַּת סֵפֶר֒ וְ/כָתַבְתָּ֣ אֵלֶ֗י/הָ אֵ֣ת כָּל הַ/דְּבָרִ֞ים
    אֲשֶׁר דִּבַּ֧רְתִּי אֵלֶ֛י/ךָ עַל יִשְׂרָאֵ֥ל וְ/עַל יְהוּדָ֖ה וְ/עַל כָּל הַ/גּוֹיִ֑ם
    מִ/יּ֞וֹם דִּבַּ֤רְתִּי אֵלֶ֨י/ךָ֙ מִ/ימֵ֣י יֹאשִׁיָּ֔הוּ וְ/עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־־־־־־־־׃
translation:
  text: Take for yourself a scroll, and write on it all the words that I have spoken
    to you concerning Israel and concerning Judah and concerning all the nations,
    from the day I spoke to you, from the days of Josiah until this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'against Israel and against Judah and against all the nations.' The
      Hebrew preposition can carry either sense in prophetic contexts.
    reason: alternative_reading
lexical_decisions:
- source_word: קַח לְךָ
  chosen: Take for yourself
  alternatives:
  - Take
  - Get yourself
  lexicon: HALOT
  rationale: Imperative of לקח with ethical dative לְךָ adds personal involvement.
    'Take for yourself' preserves the nuance better than a bare 'Take,' while remaining
    natural English.
- source_word: מְגִלַּת סֵפֶר
  chosen: a scroll
  alternatives:
  - a scroll of a book
  - a book scroll
  lexicon: HALOT
  rationale: The construct phrase literally denotes a written roll/scroll. In English,
    'scroll' is the natural equivalent; 'scroll of a book' is overly wooden and potentially
    confusing.
- source_word: וְכָתַבְתָּ אֵלֶיהָ
  chosen: and write on it
  alternatives:
  - and you shall write on it
  - and write into it
  lexicon: HALOT
  rationale: The conjunction plus perfect functions imperativally in sequence after
    the initial command. 'Write on it' is idiomatic for inscribing a scroll and preserves
    the feminine singular pronominal suffix referring to the scroll.
- source_word: אֵת כָּל הַדְּבָרִים
  chosen: all the words
  alternatives:
  - all the things
  - everything
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words' or 'matters,' but in prophetic dictation context
    'words' best preserves the verbal revelation emphasis.
- source_word: אֲשֶׁר דִּבַּרְתִּי אֵלֶיךָ
  chosen: that I have spoken to you
  alternatives:
  - that I spoke to you
  - which I have said to you
  lexicon: HALOT
  rationale: English present perfect captures prior speech with continuing relevance
    to the present command. 'Spoken' fits prophetic discourse better than the more
    generic 'said.'
- source_word: עַל יִשְׂרָאֵל וְעַל יְהוּדָה וְעַל כָּל הַגּוֹיִם
  chosen: concerning Israel and concerning Judah and concerning all the nations
  alternatives:
  - against Israel and against Judah and against all the nations
  - about Israel and Judah and all the nations
  lexicon: HALOT
  rationale: עַל with דבר can mean 'concerning' or, in judgment contexts, 'against.'
    Since the verse refers broadly to all the words spoken, not only oracles of judgment,
    'concerning' is the least interpretively loaded and preserves the scope. Repeating
    'concerning' reflects the Hebrew rhythm and structure.
- source_word: כָּל הַגּוֹיִם
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - all the peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers to foreign nations collectively, not specifically
    'Gentiles' in a later Jewish-Christian contrast. 'Nations' is the standard contextual
    rendering.
- source_word: מִיּוֹם דִּבַּרְתִּי אֵלֶיךָ
  chosen: from the day I spoke to you
  alternatives:
  - since the day I spoke to you
  lexicon: HALOT
  rationale: מִן marks the starting point of the time span. 'From the day' is formally
    closer and works smoothly with the following temporal phrase.
- source_word: מִימֵי יֹאשִׁיָּהוּ
  chosen: from the days of Josiah
  alternatives:
  - since the days of Josiah
  - in the days of Josiah
  lexicon: HALOT
  rationale: The phrase specifies the historical beginning of Jeremiah's prophetic
    reception. 'From the days of Josiah' preserves the temporal range and matches
    the preceding 'from the day.'
- source_word: וְעַד הַיּוֹם הַזֶּה
  chosen: until this day
  alternatives:
  - to this day
  - up to this day
  lexicon: HALOT
  rationale: עַד naturally means 'until/up to.' 'Until this day' preserves the endpoint
    of the dictated material in a clear, idiomatic way.
