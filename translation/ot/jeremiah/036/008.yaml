id: JER.36.8
reference: Jeremiah 36:8
source:
  edition: WLC
  text: וַ/יַּ֗עַשׂ בָּרוּךְ֙ בֶּן נֵ֣רִיָּ֔ה כְּ/כֹ֥ל אֲשֶׁר צִוָּ֖/הוּ יִרְמְיָ֣הוּ הַ/נָּבִ֑יא לִ/קְרֹ֥א בַ/סֵּ֛פֶר דִּבְרֵ֥י יְהוָ֖ה בֵּ֥ית יְהֹוָֽה־־׃ס
translation:
  text: And Baruch son of Neriah did according to all that Jeremiah the prophet had commanded him, reading from the scroll the words of Yahweh in the house of Yahweh.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: HALOT
  rationale: The verb עשה here introduces Baruch's compliance with Jeremiah's command. 'Did' is simple and idiomatic in English, especially with the following 'according to all that...' construction.
- source_word: בָּרוּךְ בֶּן נֵרִיָּה
  chosen: Baruch son of Neriah
  alternatives:
  - Baruch the son of Neriah
  rationale: Personal names are transliterated. 'Son of' is the natural English rendering of the patronymic construct.
- source_word: כְּכֹל אֲשֶׁר
  chosen: according to all that
  alternatives:
  - just as everything that
  - in accordance with all that
  lexicon: HALOT
  rationale: This preserves the formal sense of full conformity to the command while remaining readable.
- source_word: צִוָּהוּ
  chosen: had commanded him
  alternatives:
  - commanded him
  - instructed him
  lexicon: HALOT
  rationale: 'The verb צוה commonly means ''command.'' The pluperfect-like English ''had commanded'' fits the sequence: Jeremiah''s prior command is now being carried out.'
- source_word: יִרְמְיָהוּ הַנָּבִיא
  chosen: Jeremiah the prophet
  alternatives:
  - the prophet Jeremiah
  rationale: Both are possible; this order follows the Hebrew apposition closely while remaining natural English.
- source_word: לִקְרֹא
  chosen: to read
  alternatives:
  - to proclaim
  - to call out
  lexicon: HALOT
  rationale: In this context of reading a written scroll publicly, 'read' best matches the action. 'Proclaim' is interpretive and broader than the immediate wording.
- source_word: בַסֵּפֶר
  chosen: from the scroll
  alternatives:
  - in the scroll
  - from the book
  lexicon: HALOT
  rationale: סֵפֶר can mean book, document, or scroll. In Jeremiah's historical setting, 'scroll' is the most concrete and contextually appropriate rendering. The preposition is rendered 'from' in English because one reads from a scroll idiomatically, even though Hebrew has 'in'.
- source_word: דִּבְרֵי יְהוָה
  chosen: the words of the LORD
  alternatives:
  - the words of Yahweh
  lexicon: HALOT
  rationale: דִּבְרֵי is the construct plural 'words of.' Per doctrine, יְהוָה is rendered 'the LORD' rather than a transliteration.
- source_word: בֵּית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: The literal phrase is 'house of the LORD.' While it refers to the temple, retaining 'house' preserves the Hebrew expression and avoids over-interpreting the register.
