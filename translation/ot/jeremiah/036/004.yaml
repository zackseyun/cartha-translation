id: JER.36.4
reference: Jeremiah 36:4
source:
  edition: WLC
  text: וַ/יִּקְרָ֣א יִרְמְיָ֔הוּ אֶת בָּר֖וּךְ בֶּן נֵֽרִיָּ֑ה וַ/יִּכְתֹּ֨ב בָּר֜וּךְ מִ/פִּ֣י יִרְמְיָ֗הוּ אֵ֣ת כָּל דִּבְרֵ֧י יְהוָ֛ה אֲשֶׁר דִּבֶּ֥ר אֵלָ֖י/ו עַל מְגִלַּת סֵֽפֶר־־־־־־׃
translation:
  text: So Jeremiah called Baruch son of Neriah, and Baruch wrote on a scroll all the words of Yahweh from Jeremiah’s mouth, which he had spoken to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from the mouth of Jeremiah,'' that is, as Jeremiah dictated.'
    reason: lexical_alternative
  - marker: b
    text: Or more literally, 'on a scroll of a book.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb קרא in this context means to call for or summon someone. 'Called' is natural modern English and sufficiently formal; 'summoned' is possible but slightly stronger than the context requires.
- source_word: בָּרוּךְ בֶּן נֵרִיָּה
  chosen: Baruch son of Neriah
  alternatives:
  - Baruch the son of Neriah
  rationale: Personal names are transliterated. 'Son of Neriah' is the standard concise genealogical rendering in English.
- source_word: וַיִּכְתֹּב
  chosen: wrote
  alternatives:
  - wrote down
  lexicon: HALOT
  rationale: The basic sense is 'wrote.' 'Wrote down' is interpretive and slightly more expansive than the Hebrew, so 'wrote' is preferred.
- source_word: מִפִּי יִרְמְיָהוּ
  chosen: from Jeremiah’s mouth
  alternatives:
  - at Jeremiah’s dictation
  - from the mouth of Jeremiah
  lexicon: HALOT
  rationale: Literally 'from the mouth of Jeremiah.' This idiom indicates oral dictation. The chosen rendering preserves the Hebrew imagery while remaining understandable. 'At Jeremiah’s dictation' is a good idiomatic alternative but is less formally transparent to the source.
- source_word: כָּל דִּבְרֵי יְהוָה
  chosen: all the words of the LORD
  alternatives:
  - all the words from the LORD
  - everything the LORD had said
  lexicon: HALOT
  rationale: דִּבְרֵי is best rendered 'words' here, preserving the concrete wording of the prophetic message. YHWH is rendered 'the LORD' per doctrine guidelines.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר דִּבֶּר אֵלָיו
  chosen: that he had spoken to him
  alternatives:
  - which he had spoken to him
  - that he had spoken through him
  lexicon: HALOT
  rationale: The relative clause most naturally refers to the LORD speaking to Jeremiah, with the pronouns rendered as 'he' and 'him.' 'Spoken through him' would overinterpret the preposition and alter the syntax.
- source_word: עַל מְגִלַּת סֵפֶר
  chosen: on a scroll
  alternatives:
  - on a scroll of a book
  - on a book scroll
  lexicon: HALOT
  rationale: The phrase denotes a written scroll/document. 'On a scroll' is clear modern English and captures the material sense without awkward literalism. The fuller phrase can be preserved in a footnote as a lexical alternative.
