theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This follows the doctrine
    excerpt's contested-terms guidance and matches the prophetic formula's established
    English representation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering אָדָם in the devastation formula אָדָם וּבְהֵמָה
  chosen_reading: man and beast
  alternative_readings:
  - humankind and beast
  - people and animals
  rationale: The phrase is a stock Hebrew expression denoting comprehensive desolation.
    'Man and beast' preserves the source's gender-accurate representative wording
    and the formulaic prophetic cadence; more inclusive alternatives are possible
    but less faithful to the idiom.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4; Contested terms: אָדָם
    → man / humankind (context)'
