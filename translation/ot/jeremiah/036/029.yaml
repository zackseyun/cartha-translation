id: JER.36.29
reference: Jeremiah 36:29
source:
  edition: WLC
  text: וְ/עַל יְהוֹיָקִ֤ים מֶֽלֶךְ יְהוּדָה֙ תֹּאמַ֔ר כֹּ֖ה אָמַ֣ר יְהוָ֑ה אַ֠תָּה
    שָׂרַ֜פְתָּ אֶת הַ/מְּגִלָּ֤ה הַ/זֹּאת֙ לֵ/אמֹ֔ר מַדּוּעַ֩ כָּתַ֨בְתָּ עָלֶ֜י/הָ
    לֵ/אמֹ֗ר בֹּֽא יָב֤וֹא מֶֽלֶךְ בָּבֶל֙ וְ/הִשְׁחִית֙ אֶת הָ/אָ֣רֶץ הַ/זֹּ֔את וְ/הִשְׁבִּ֥ית
    מִמֶּ֖/נָּה אָדָ֥ם וּ/בְהֵמָֽה־־־־־־׃ס
translation:
  text: 'And concerning Jehoiakim king of Judah, you shall say, ‘Thus says the LORD:
    You have burned this scroll, saying, “Why have you written on it, saying, ‘The
    king of Babylon will surely come and destroy this land, and cut off from it man
    and beast’?”’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'humankind and animals.' Hebrew 'man and beast' is a stock expression
      for total devastation.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: And concerning
  alternatives:
  - And against
  - Now about
  lexicon: HALOT
  rationale: The preposition עַל with a speech verb here introduces the topic/person
    addressed by the oracle ('concerning Jehoiakim'), not primarily hostile motion
    'against,' though the context is adversarial.
- source_word: תֹּאמַר
  chosen: you shall say
  alternatives:
  - you are to say
  - say
  lexicon: HALOT
  rationale: Imperfect 2ms functions as an instruction to Jeremiah; 'you shall say'
    preserves the directive force in natural English.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. YHWH is rendered 'the LORD' per
    doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal force while aligning with stated doctrine.
- source_word: שָׂרַפְתָּ
  chosen: have burned
  alternatives:
  - burned
  - set fire to
  lexicon: HALOT
  rationale: Perfect 2ms refers to Jehoiakim's completed action. Present perfect in
    English fits the accusation's immediacy.
- source_word: הַמְּגִלָּה הַזֹּאת
  chosen: this scroll
  alternatives:
  - this book scroll
  - this document
  lexicon: HALOT
  rationale: מְגִלָּה denotes a rolled written document; 'scroll' is the natural and
    historically accurate English equivalent.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  - Why is it that
  lexicon: HALOT
  rationale: Direct interrogative preserved simply and idiomatically.
- source_word: כָּתַבְתָּ עָלֶיהָ
  chosen: have you written on it
  alternatives:
  - did you write on it
  - have you written in it
  lexicon: HALOT
  rationale: עַל with כתב can mean 'write on/upon.' 'On it' is the most direct rendering
    for writing on a scroll.
- source_word: בֹּא יָבֹא
  chosen: will surely come
  alternatives:
  - will indeed come
  - is certain to come
  lexicon: HALOT
  rationale: Infinitive absolute plus imperfect intensifies the verb. 'Will surely
    come' preserves the emphatic force without awkwardness.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly.
- source_word: וְהִשְׁחִית
  chosen: and destroy
  alternatives:
  - and ruin
  - and devastate
  lexicon: HALOT
  rationale: Hiphil of שׁחת here denotes destructive action against the land. 'Destroy'
    best matches the severity and common prophetic usage.
- source_word: הָאָרֶץ הַזֹּאת
  chosen: this land
  alternatives:
  - this הארץ/land
  - this country
  lexicon: HALOT
  rationale: In Jeremiah, 'land' is the standard rendering and preserves covenantal/geographical
    resonance better than 'country.'
- source_word: וְהִשְׁבִּית מִמֶּנָּה
  chosen: and cut off from it
  alternatives:
  - and remove from it
  - and put an end to from it
  lexicon: HALOT
  rationale: Hiphil of שׁבת here means to cause to cease/remove from the land. 'Cut
    off from it' captures the force of depopulation more vividly than a bland 'remove.'
- source_word: אָדָם וּבְהֵמָה
  chosen: man and beast
  alternatives:
  - humankind and animals
  - people and animals
  lexicon: HALOT
  rationale: This is a fixed prophetic pairing for total devastation. Per doctrine,
    אָדָם may be rendered 'man' where the source's representative force is retained;
    the collocation 'man and beast' is idiomatic and traditional without obscuring
    meaning.
