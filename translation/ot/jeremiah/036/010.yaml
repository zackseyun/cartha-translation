id: JER.36.10
reference: Jeremiah 36:10
source:
  edition: WLC
  text: וַ/יִּקְרָ֨א בָר֥וּךְ בַּ/סֵּ֛פֶר אֶת דִּבְרֵ֥י יִרְמְיָ֖הוּ בֵּ֣ית יְהוָ֑ה בְּ/לִשְׁכַּ֡ת גְּמַרְיָהוּ֩ בֶן שָׁפָ֨ן הַ/סֹּפֵ֜ר בֶּ/חָצֵ֣ר הָ/עֶלְי֗וֹן פֶּ֣תַח שַׁ֤עַר בֵּית יְהוָה֙ הֶֽ/חָדָ֔שׁ בְּ/אָזְנֵ֖י כָּל הָ/עָֽם־־־־׃
translation:
  text: And Baruch read from the scroll the words of Jeremiah in the house of Yahweh, in the chamber of Gemariah son of Shaphan the scribe, in the upper court, at the entrance of the new gate of the house of Yahweh, in the hearing of all the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple of the LORD' for 'the house of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: read
  alternatives:
  - proclaimed
  - called out
  lexicon: HALOT
  rationale: In context with בַּסֵּפֶר ('from/in the scroll'), קרא clearly means reading aloud from a written document rather than merely calling out. 'Read' is the plain English equivalent and fits the public setting.
- source_word: בַּסֵּפֶר
  chosen: from the scroll
  alternatives:
  - in the scroll
  - from the book
  lexicon: HALOT
  rationale: סֵפֶר can denote a scroll/book/document. In Jeremiah's setting this was a written scroll, so 'scroll' is historically and contextually more precise than 'book.' The preposition ב here is idiomatic with קרא for reading from a written text; English expresses this naturally as 'from the scroll.'
- source_word: דִּבְרֵי יִרְמְיָהוּ
  chosen: the words of Jeremiah
  alternatives:
  - Jeremiah's words
  lexicon: HALOT
  rationale: A straightforward construct chain. 'The words of Jeremiah' preserves the formal relation and echoes prophetic diction.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Literally 'house of YHWH.' Following doctrine, יְהוָה is rendered 'the LORD.' 'House' preserves the Hebrew expression, though it refers to the temple complex.
- source_word: בְּלִשְׁכַּת
  chosen: in the chamber of
  alternatives:
  - in the room of
  - in the cell of
  lexicon: HALOT
  rationale: לִשְׁכָּה refers to a chamber/room, often an official room in the temple precincts. 'Chamber' best fits the architectural and administrative setting.
- source_word: גְּמַרְיָהוּ בֶן שָׁפָן
  chosen: Gemariah son of Shaphan
  alternatives:
  - Gemariah the son of Shaphan
  lexicon: HALOT
  rationale: Personal names are transliterated per philosophy. 'Son of' is retained as the standard Hebrew patronymic rendering.
- source_word: הַסֹּפֵר
  chosen: the scribe
  alternatives:
  - the secretary
  - the official scribe
  lexicon: HALOT
  rationale: סֹפֵר can denote a royal or administrative secretary, but 'scribe' is the standard and sufficiently broad rendering here. It preserves the title without over-specifying the office.
- source_word: בֶּחָצֵר הָעֶלְיוֹן
  chosen: in the upper court
  alternatives:
  - in the upper courtyard
  lexicon: HALOT
  rationale: חָצֵר is a court/courtyard; 'court' is idiomatic in temple architecture. הָעֶלְיוֹן distinguishes this as the upper court.
- source_word: פֶּתַח
  chosen: at the entrance of
  alternatives:
  - at the doorway of
  - at the opening of
  lexicon: HALOT
  rationale: פֶּתַח denotes an opening/entrance. 'At the entrance of' reads naturally with the following gate reference.
- source_word: שַׁעַר ... הֶחָדָשׁ
  chosen: the new gate
  alternatives:
  - the recently built gate
  lexicon: HALOT
  rationale: The adjective חָדָשׁ is simply 'new.' No need to expand beyond the text.
- source_word: בְּאָזְנֵי כָּל הָעָם
  chosen: in the hearing of all the people
  alternatives:
  - before all the people
  - to all the people
  lexicon: HALOT
  rationale: Literally 'in the ears of all the people,' an idiom for public audibility. 'In the hearing of' preserves the idiom's force more closely than the looser 'before.'
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the populace
  - all the assembly
  lexicon: HALOT
  rationale: עָם here refers to the gathered people generally. 'All the people' is the natural and sufficiently broad rendering.
- source_word: בֵּית יְהוָה (second occurrence)
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: Repeated phrase rendered consistently within the verse, in keeping with the translation philosophy's emphasis on consistency of key terms.
