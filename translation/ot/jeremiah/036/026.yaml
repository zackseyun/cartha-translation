theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project’s contested-terms policy specifies 'the LORD' as the default
    for YHWH. This verse does not require deviation from that policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of לָקַחַת in context
  chosen_reading: to seize
  alternative_readings:
  - to take
  - to arrest
  rationale: The narrative context is an attempt to apprehend Baruch and Jeremiah
    at the king’s command. 'Seize' preserves the hostile intent without importing
    a modern legal framework.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
