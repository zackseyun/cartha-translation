id: JER.36.26
reference: Jeremiah 36:26
source:
  edition: WLC
  text: וַ/יְצַוֶּ֣ה הַ֠/מֶּלֶךְ אֶת יְרַחְמְאֵ֨ל בֶּן הַ/מֶּ֜לֶךְ וְ/אֶת שְׂרָיָ֣הוּ
    בֶן עַזְרִיאֵ֗ל וְ/אֶת שֶֽׁלֶמְיָ֨הוּ֙ בֶּֽן עַבְדְּאֵ֔ל לָ/קַ֨חַת֙ אֶת בָּר֣וּךְ
    הַ/סֹּפֵ֔ר וְ/אֵ֖ת יִרְמְיָ֣הוּ הַ/נָּבִ֑יא וַ/יַּסְתִּרֵ֖/ם יְהוָֽה־־־־־־־׃ס
translation:
  text: Then the king commanded Jerahmeel the king’s son, and Seraiah son of Azriel,
    and Shelemiah son of Abdeel, to seize Baruch the scribe and Jeremiah the prophet,
    but the LORD hid them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''to take.'' The sense here is to apprehend or seize them.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Yahweh hid them.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְצַוֶּה
  chosen: commanded
  alternatives:
  - ordered
  lexicon: HALOT
  rationale: The verb צוה in the waw-consecutive narrative form denotes giving an
    authoritative command. 'Commanded' preserves the formal force better than the
    slightly looser 'ordered.'
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward rendering of the definite noun; no reason to substitute
    a more interpretive title.
- source_word: יְרַחְמְאֵל בֶּן הַמֶּלֶךְ
  chosen: Jerahmeel the king’s son
  alternatives:
  - Jerahmeel son of the king
  - Jerahmeel, the prince
  lexicon: HALOT
  rationale: בן המלך is literally 'son of the king.' 'The king’s son' is the most
    direct and natural English rendering. 'Prince' is possible as a functional title
    in some contexts, but the Hebrew here states the filial relation explicitly, so
    that should be preserved.
- source_word: שְׂרָיָהוּ בֶן עַזְרִיאֵל
  chosen: Seraiah son of Azriel
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy; בן is rendered
    'son of' in genealogical identification.
- source_word: שֶׁלֶמְיָהוּ בֶּן עַבְדְּאֵל
  chosen: Shelemiah son of Abdeel
  lexicon: HALOT
  rationale: Personal names are transliterated; the patronymic construction is preserved
    straightforwardly.
- source_word: לָקַחַת
  chosen: to seize
  alternatives:
  - to take
  - to arrest
  lexicon: HALOT
  rationale: לקח literally means 'to take,' but in this context of royal agents sent
    after Baruch and Jeremiah, 'seize' best conveys the intended hostile apprehension
    without over-specifying a formal legal process as 'arrest' would.
- source_word: בָּרוּךְ הַסֹּפֵר
  chosen: Baruch the scribe
  alternatives:
  - Baruch the secretary
  lexicon: HALOT
  rationale: סֹפֵר can denote a scribe/secretary. 'Scribe' is the more established
    and textually transparent rendering here, especially in a prophetic-literary context.
- source_word: יִרְמְיָהוּ הַנָּבִיא
  chosen: Jeremiah the prophet
  lexicon: HALOT
  rationale: Standard rendering of the title נביא; 'prophet' is the direct equivalent
    and preserves Jeremiah's role.
- source_word: וַיַּסְתִּרֵם
  chosen: hid them
  alternatives:
  - concealed them
  lexicon: HALOT
  rationale: The Hiphil of סתר with 3mp suffix means 'caused them to be hidden' or
    'hid them.' 'Hid them' is idiomatic and concise while preserving the divine action.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following the project's stated policy and longstanding reverential convention.
