id: JER.36.16
reference: Jeremiah 36:16
source:
  edition: WLC
  text: וַ/יְהִ֗י כְּ/שָׁמְעָ/ם֙ אֶת כָּל הַ/דְּבָרִ֔ים פָּחֲד֖וּ אִ֣ישׁ אֶל רֵעֵ֑/הוּ
    וַ/יֹּֽאמְרוּ֙ אֶל בָּר֔וּךְ הַגֵּ֤יד נַגִּיד֙ לַ/מֶּ֔לֶךְ אֵ֥ת כָּל הַ/דְּבָרִ֖ים
    הָ/אֵֽלֶּה־־־־־׃
translation:
  text: And when they heard all the words, each man turned in fear to his companion,
    and they said to Baruch, “We must surely tell the king all these words.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “each man looked in fear to his companion.” The Hebrew idiom literally
      reads “they feared, each man to his companion,” expressing a mutual fearful
      reaction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּשָׁמְעָם
  chosen: And when they heard
  alternatives:
  - And it happened, when they heard
  - Now when they heard
  lexicon: HALOT
  rationale: The waw-consecutive with היה introduces the narrative development idiomatically.
    In English, 'And when they heard' preserves the temporal force without woodenly
    retaining 'and it happened.'
- source_word: אֶת כָּל הַדְּבָרִים
  chosen: all the words
  alternatives:
  - all these words
  - all the things
  lexicon: HALOT
  rationale: דְּבָרִים is rendered 'words' rather than the broader 'things' because
    the context is the reading of a written scroll. The demonstrative 'these' appears
    later in the verse and is preserved there.
- source_word: פָּחֲדוּ
  chosen: turned in fear
  alternatives:
  - were afraid
  - became afraid
  - trembled
  lexicon: HALOT
  rationale: The verb denotes fear, but in this clause it is paired with אִישׁ אֶל
    רֵעֵהוּ, suggesting a visible mutual reaction. 'Turned in fear' captures both
    the emotional response and the interpersonal orientation implied by the following
    phrase.
- source_word: אִישׁ אֶל רֵעֵהוּ
  chosen: each man turned ... to his companion
  alternatives:
  - each one to his neighbor
  - one to another
  - each man to his friend
  lexicon: HALOT
  rationale: This distributive idiom marks mutual reaction among the officials. 'Each
    man ... to his companion' is gender-accurate and natural English, while preserving
    the singular distributive force better than the flatter 'to one another.'
- source_word: וַיֹּאמְרוּ אֶל בָּרוּךְ
  chosen: and they said to Baruch
  alternatives:
  - then they said to Baruch
  lexicon: HALOT
  rationale: Straightforward narrative continuation; 'said' is the plain sense.
- source_word: הַגֵּיד נַגִּיד
  chosen: We must surely tell
  alternatives:
  - Tell; we will tell
  - We will certainly report
  - You must tell; we will declare
  lexicon: HALOT
  rationale: This construction combines the infinitive absolute with the imperfect
    of נגד for emphasis. In direct speech, 'We must surely tell' best conveys the
    urgency and resolve in idiomatic English. The 1st person plural morphology of
    נַגִּיד supports 'we will/must tell,' not an imperative addressed to Baruch alone.
- source_word: לַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite reference to the reigning king in context; standard rendering.
- source_word: אֵת כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  lexicon: HALOT
  rationale: Again, 'words' fits the context of the scroll's contents and preserves
    the repetition in Hebrew.
