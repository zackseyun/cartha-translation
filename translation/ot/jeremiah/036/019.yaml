id: JER.36.19
reference: Jeremiah 36:19
source:
  edition: WLC
  text: וַ/יֹּאמְר֤וּ הַ/שָּׂרִים֙ אֶל בָּר֔וּךְ לֵ֥ךְ הִסָּתֵ֖ר אַתָּ֣ה וְ/יִרְמְיָ֑הוּ
    וְ/אִ֥ישׁ אַל יֵדַ֖ע אֵיפֹ֥ה אַתֶּֽם־־׃
translation:
  text: Then the officials said to Baruch, “Go, hide yourself—you and Jeremiah—and
    let no one know where you are.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the leaders
  lexicon: HALOT
  rationale: שָׂרִים refers to ruling officials/court leaders. 'Officials' is clear
    modern English and fits the royal-administrative context better than the more
    archaic 'princes,' while preserving their status.
- source_word: לֵךְ
  chosen: Go
  alternatives:
  - Come, go
  lexicon: HALOT
  rationale: Imperative of הלך. Simple 'Go' is the natural English equivalent in this
    command sequence.
- source_word: הִסָּתֵר
  chosen: hide yourself
  alternatives:
  - conceal yourself
  - go into hiding
  lexicon: HALOT
  rationale: Niphal imperative of סתר carries the reflexive/passive sense of concealing
    oneself. 'Hide yourself' is direct, idiomatic, and preserves the imperative force.
- source_word: אַתָּה וְיִרְמְיָהוּ
  chosen: you and Jeremiah
  alternatives:
  - you, and Jeremiah
  lexicon: HALOT
  rationale: The pronoun is explicit in Hebrew for emphasis. Rendering it as 'you
    and Jeremiah' preserves the addressee-plus-companion structure without awkwardness.
- source_word: וְאִישׁ אַל יֵדַע
  chosen: and let no one know
  alternatives:
  - and do not let anyone know
  - and let not a man know
  lexicon: HALOT
  rationale: אִישׁ with the negative here functions idiomatically as an indefinite,
    'anyone/no one.' 'Let no one know' preserves the jussive prohibition naturally
    in English. 'Man' would be overly literal and misleading in contemporary English.
- source_word: אֵיפֹה אַתֶּם
  chosen: where you are
  alternatives:
  - where you may be
  - your whereabouts
  lexicon: HALOT
  rationale: אֵיפֹה asks location, and the plural pronoun refers to Baruch and Jeremiah
    together. 'Where you are' is the most natural rendering in context.
- source_word: וַיֹּאמְרוּ
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' conveys the sequential
    sense in readable modern English better than mechanically repeating 'And'.
