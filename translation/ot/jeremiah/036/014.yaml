id: JER.36.14
reference: Jeremiah 36:14
source:
  edition: WLC
  text: וַ/יִּשְׁלְח֨וּ כָל הַ/שָּׂרִ֜ים אֶל בָּר֗וּךְ אֶת יְהוּדִ֡י בֶּן נְ֠תַנְיָהוּ
    בֶּן שֶׁלֶמְיָ֣הוּ בֶן כּוּשִׁי֮ לֵ/אמֹר֒ הַ/מְּגִלָּ֗ה אֲשֶׁ֨ר קָרָ֤אתָ בָּ/הּ֙
    בְּ/אָזְנֵ֣י הָ/עָ֔ם קָחֶ֥/נָּה בְ/יָדְ/ךָ֖ וָ/לֵ֑ךְ וַ֠/יִּקַּח בָּר֨וּךְ בֶּן
    נֵרִיָּ֤הוּ אֶת הַ/מְּגִלָּה֙ בְּ/יָד֔/וֹ וַ/יָּבֹ֖א אֲלֵי/הֶֽם־־־־־־־־׃
translation:
  text: Then all the officials sent Jehudi son of Nethaniah, son of Shelemiah, son
    of Cushi, to Baruch, saying, “Take in your hand the scroll from which you read
    in the hearing of the people, and come.” So Baruch son of Neriah took the scroll
    in his hand and came to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and go.' The Hebrew uses 'go,' but English commonly
      says 'come' when someone is summoned to the speaker's location.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the leaders
  lexicon: HALOT
  rationale: שַׂר in this court setting refers to royal/state officials rather than
    literal princes in the narrow dynastic sense. 'Officials' is natural modern English
    and fits the administrative context.
- source_word: אֶת יְהוּדִי ... אֶל בָּרוּךְ
  chosen: sent Jehudi ... to Baruch
  alternatives:
  - sent to Baruch Jehudi
  - dispatched Jehudi to Baruch
  lexicon: HALOT
  rationale: The construction marks Jehudi as the person sent and Baruch as the destination.
    English idiom prefers 'sent Jehudi ... to Baruch.'
- source_word: יְהוּדִי
  chosen: Jehudi
  alternatives:
  - Judahite (as an appellative)
  lexicon: HALOT
  rationale: Here the term is clearly a personal name, confirmed by the patronymic
    chain, so it is transliterated rather than translated.
- source_word: הַמְּגִלָּה
  chosen: the scroll
  alternatives:
  - the roll
  - the document
  lexicon: HALOT
  rationale: מְגִלָּה denotes a rolled written scroll. 'Scroll' is the clearest modern
    equivalent; 'roll' is more traditional but less transparent.
- source_word: קָרָאתָ בָּהּ
  chosen: you read from which
  alternatives:
  - you read in it
  - you proclaimed from which
  lexicon: HALOT
  rationale: The verb קרא with ב can mean read aloud from a written text. In English,
    'read from' is idiomatic when referring to a scroll as the source of the reading.
- source_word: בְּאָזְנֵי הָעָם
  chosen: in the hearing of the people
  alternatives:
  - before the people
  - to the people
  lexicon: HALOT
  rationale: Literally 'in the ears/hearing of the people.' This idiom emphasizes
    public audibility; 'in the hearing of' preserves that nuance better than the flatter
    'before' or 'to.'
- source_word: קָחֶנָּה בְיָדְךָ
  chosen: Take in your hand
  alternatives:
  - Take it in your hand
  - bring it in your hand
  lexicon: HALOT
  rationale: The feminine suffix on קָחֶנָּה refers to the scroll. English can omit
    the explicit object after naming 'the scroll' immediately before, yielding a natural
    imperative while preserving the sense of carrying it personally.
- source_word: וָלֵךְ
  chosen: and come
  alternatives:
  - and go
  lexicon: HALOT
  rationale: Although the verb is literally 'go,' the deictic perspective of the speakers
    inviting Baruch to their location is best represented in English as 'come.' This
    is a context-driven adjustment under optimal equivalence.
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - with him
  - in hand
  lexicon: HALOT
  rationale: The phrase is retained fairly literally to mirror the earlier command
    and to show Baruch's compliance in bringing the scroll personally.
- source_word: וַיָּבֹא אֲלֵיהֶם
  chosen: and came to them
  alternatives:
  - and went to them
  lexicon: HALOT
  rationale: English normally uses 'came' relative to the narrative destination here,
    matching the summons and resulting movement toward the officials.
