id: JER.36.13
reference: Jeremiah 36:13
source:
  edition: WLC
  text: וַ/יַּגֵּ֤ד לָ/הֶם֙ מִכָ֔יְהוּ אֵ֥ת כָּל הַ/דְּבָרִ֖ים אֲשֶׁ֣ר שָׁמֵ֑עַ בִּ/קְרֹ֥א
    בָר֛וּךְ בַּ/סֵּ֖פֶר בְּ/אָזְנֵ֥י הָ/עָֽם־׃
translation:
  text: And Micaiah told them all the words that he had heard when Baruch read from
    the scroll in the hearing of the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all that he had heard when Baruch was reading the scroll before the
      people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֵּד
  chosen: told
  alternatives:
  - reported
  - declared
  lexicon: HALOT
  rationale: The Hifil of נגד here denotes making known or reporting information.
    'Told' is natural modern English and fits the narrative setting without overstating
    the formality of the speech.
- source_word: לָהֶם
  chosen: them
  lexicon: HALOT
  rationale: Straightforward pronominal indirect object referring to the officials
    in context.
- source_word: מִכָיְהוּ
  chosen: Micaiah
  alternatives:
  - Micaiahu
  rationale: Standard English transliteration of the personal name; translation philosophy
    prefers transliterating names.
- source_word: אֵת כָּל הַדְּבָרִים
  chosen: all the words
  alternatives:
  - everything
  - all these things
  lexicon: HALOT
  rationale: דְּבָרִים literally means 'words' and in this context refers to the content
    spoken/read. 'All the words' preserves the Hebrew expression and Jeremiah's recurring
    emphasis on the written/spoken words.
- source_word: אֲשֶׁר שָׁמֵעַ
  chosen: that he had heard
  alternatives:
  - which he heard
  - that he was hearing
  lexicon: HALOT
  rationale: The qatal verb marks completed action from the narrative standpoint.
    English past perfect best conveys that Micaiah's hearing preceded his reporting
    to the officials.
- source_word: בִּקְרֹא
  chosen: when ... read
  alternatives:
  - while ... was reading
  - at the reading of
  lexicon: HALOT
  rationale: The preposition with infinitive construct expresses temporal circumstance.
    'When Baruch read' is idiomatic and accurately conveys the timing.
- source_word: בָרוּךְ
  chosen: Baruch
  rationale: Standard English transliteration of the personal name.
- source_word: בַּסֵּפֶר
  chosen: from the scroll
  alternatives:
  - in the scroll
  - from the book
  lexicon: HALOT
  rationale: סֵפֶר can mean book, document, or scroll. In Jeremiah 36 the object is
    specifically the written scroll dictated by Jeremiah, so 'scroll' is contextually
    precise. 'From the scroll' reflects the sense of reading from a written document.
- source_word: בְּאָזְנֵי הָעָם
  chosen: in the hearing of the people
  alternatives:
  - in the ears of the people
  - before the people
  lexicon: HALOT
  rationale: This Hebrew idiom means publicly within someone's hearing. 'In the hearing
    of the people' preserves the idiom's force in clear English better than the more
    literal but awkward 'in the ears of.'
