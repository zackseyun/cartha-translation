id: JER.36.17
reference: Jeremiah 36:17
source:
  edition: WLC
  text: וְ/אֶ֨ת בָּר֔וּךְ שָׁאֲל֖וּ לֵ/אמֹ֑ר הַגֶּד נָ֣א לָ֔/נוּ אֵ֗יךְ כָּתַ֛בְתָּ
    אֶת כָּל הַ/דְּבָרִ֥ים הָ/אֵ֖לֶּה מִ/פִּֽי/ו־־־־׃
translation:
  text: And they asked Baruch, saying, “Please tell us, how did you write all these
    words—from his mouth?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “from his mouth,” that is, from Jeremiah's oral dictation.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁאֲלוּ
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: HALOT
  rationale: Common verb for asking/inquiring. 'Asked' is the most natural modern
    English equivalent and fits the direct-speech context.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  lexicon: HALOT
  rationale: Standard Hebrew speech-introducer. 'Saying' preserves the formal structure
    without awkwardness.
- source_word: הַגֶּד נָא
  chosen: Please tell
  alternatives:
  - Tell, please
  - Declare to us, please
  lexicon: HALOT
  rationale: Imperative of נגד with particle נָא expressing polite urgency. 'Please
    tell' captures both the command and the courteous/requesting nuance in readable
    English.
- source_word: אֵיךְ
  chosen: how
  alternatives:
  - in what way
  lexicon: HALOT
  rationale: Direct interrogative about manner; 'how' is the plain sense.
- source_word: כָּתַבְתָּ
  chosen: did you write
  alternatives:
  - have you written
  - wrote
  lexicon: HALOT
  rationale: English auxiliary 'did' naturally forms the question. The Hebrew perfect
    here refers to the completed act under discussion.
- source_word: כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  - all these matters
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words' or 'matters,' but in this scribal/prophetic
    dictation context the focus is on the actual spoken/written words, so 'words'
    is preferable.
- source_word: מִפִּיו
  chosen: from his mouth
  alternatives:
  - at his dictation
  - from him
  lexicon: HALOT
  rationale: Literally 'from his mouth.' This idiom indicates oral dictation. The
    main text keeps the vivid Hebrew expression; a lexical alternative is worth preserving
    because English readers may understand it idiomatically as 'at his dictation.'
- source_word: וְאֶת בָּרוּךְ
  chosen: And they asked Baruch
  alternatives:
  - Then they asked Baruch
  - And Baruch they asked
  lexicon: HALOT
  rationale: 'The fronted object marker with Baruch marks him as the one questioned.
    Smooth English places the name after the verb: ''they asked Baruch.'' ''And''
    preserves the narrative sequence.'
