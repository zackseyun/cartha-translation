id: JER.36.11
reference: Jeremiah 36:11
source:
  edition: WLC
  text: וַ֠/יִּשְׁמַ֗ע מִכָ֨יְהוּ בֶן גְּמַרְיָ֧הוּ בֶן שָׁפָ֛ן אֶת כָּל דִּבְרֵ֥י יְהוָ֖ה מֵ/עַ֥ל הַ/סֵּֽפֶר־־־־׃
translation:
  text: And Micaiah son of Gemariah, son of Shaphan, heard all the words of Yahweh from the scroll.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - listened to
  lexicon: HALOT
  rationale: The waw-consecutive imperfect narrates a past event. 'Heard' is the most natural English rendering for שׁמע here, indicating reception of the reading rather than the more durative 'listened to.'
- source_word: מִכָיְהוּ
  chosen: Micaiah
  alternatives:
  - Mikayahu
  rationale: Personal names are transliterated by standard English convention per project philosophy. 'Micaiah' is the established English form.
- source_word: בֶן גְּמַרְיָהוּ בֶן שָׁפָן
  chosen: son of Gemariah, son of Shaphan
  rationale: The Hebrew patronymic chain is preserved straightforwardly in English to maintain the genealogical identification.
- source_word: כָּל
  chosen: all
  alternatives:
  - the whole of
  lexicon: HALOT
  rationale: כָּל intensifies the comprehensiveness of what was heard; 'all' is concise and natural.
- source_word: דִּבְרֵי יְהוָה
  chosen: the words of the LORD
  alternatives:
  - the words of Yahweh
  - everything the LORD had said
  lexicon: HALOT
  rationale: דִּבְרֵי is best rendered 'words' rather than a paraphrase. Per doctrine, יְהוָה is rendered 'the LORD' in the main text rather than 'Yahweh.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מֵעַל הַסֵּפֶר
  chosen: from the scroll
  alternatives:
  - from upon the scroll
  - from the book
  lexicon: HALOT
  rationale: The idiom refers to hearing the words as they were read from a written document. 'Scroll' fits the ancient context better than 'book,' and omitting the overly literal 'upon' yields clear English while preserving the sense of source.
