id: JER.29.14
reference: Jeremiah 29:14
source:
  edition: WLC
  text: וְ/נִמְצֵ֣אתִי לָ/כֶם֮ נְאֻם יְהוָה֒ וְ/שַׁבְתִּ֣י אֶת שבית/כם וְ/קִבַּצְתִּ֣י אֶ֠תְ/כֶם מִֽ/כָּל הַ/גּוֹיִ֞ם וּ/מִ/כָּל הַ/מְּקוֹמ֗וֹת אֲשֶׁ֨ר הִדַּ֧חְתִּי אֶתְ/כֶ֛ם שָׁ֖ם נְאֻם יְהוָ֑ה וַ/הֲשִׁבֹתִ֣י אֶתְ/כֶ֔ם אֶל הַ֨/מָּק֔וֹם אֲשֶׁר הִגְלֵ֥יתִי אֶתְ/כֶ֖ם מִ/שָּֽׁם־־־־־־־׃
translation:
  text: And I will let myself be found by you, declares Yahweh, and I will restore your fortunes and gather you from all the nations and from all the places where I have driven you, declares Yahweh, and I will bring you back to the place from which I sent you into exile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I will restore your captivity' or 'I will bring back your captives.' The Hebrew expression is an idiom for reversing a condition of exile and distress.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִמְצֵאתִי לָכֶם
  chosen: I will let myself be found by you
  alternatives:
  - I will be found by you
  - I will reveal myself to you
  lexicon: HALOT
  rationale: Niphal of מצא commonly means 'be found,' but in English 'let myself be found' better conveys the passive/reflexive nuance in a way that sounds natural while preserving divine initiative. 'Reveal myself' is more interpretive than the Hebrew warrants.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic modern English and preserves the solemn prophetic force. 'the LORD' follows the doctrinal default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְשַׁבְתִּי אֶת שביתכם
  chosen: I will restore your fortunes
  alternatives:
  - I will restore your captivity
  - I will bring back your captives
  lexicon: HALOT
  rationale: The idiom שוב את־שבות/שבית often means restoration from a state of exile/disaster, not merely the return of literal captives. 'Restore your fortunes' is the established idiomatic sense in many contexts and fits the following clauses about gathering and return. Because the Hebrew form can be understood more literally, that alternative is preserved in a footnote.
- source_word: וְקִבַּצְתִּי אֶתְכֶם
  chosen: and gather you
  alternatives:
  - and collect you
  - and assemble you
  lexicon: HALOT
  rationale: קבץ in restoration contexts commonly means gathering dispersed people back together. 'Gather' is the most natural and contextually appropriate English equivalent.
- source_word: מִכָּל הַגּוֹיִם
  chosen: from all the nations
  alternatives:
  - from every nation
  - from all the peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the foreign nations among which Judah was scattered. 'Nations' is the most direct and consistent rendering.
- source_word: וּמִכָּל הַמְּקוֹמוֹת
  chosen: and from all the places
  alternatives:
  - and from every place
  lexicon: HALOT
  rationale: The phrase expands the scope beyond political entities to all locations of dispersion. 'All the places' preserves the Hebrew parallelism.
- source_word: אֲשֶׁר הִדַּחְתִּי אֶתְכֶם שָׁם
  chosen: where I have driven you
  alternatives:
  - where I have banished you
  - where I have scattered you
  lexicon: HALOT
  rationale: נדח in Hiphil conveys driving away or banishing. 'Driven' preserves the force of divine judgment better than the softer 'scattered,' while remaining natural English.
- source_word: וַהֲשִׁבֹתִי אֶתְכֶם
  chosen: and I will bring you back
  alternatives:
  - and I will restore you
  - and I will return you
  lexicon: HALOT
  rationale: 'Hiphil of שוב here is causative: causing the people to return. ''Bring you back'' is clear, idiomatic, and preserves the causative sense.'
- source_word: אֶל הַמָּקוֹם
  chosen: to the place
  alternatives:
  - to the location
  lexicon: HALOT
  rationale: מקום is straightforwardly 'place'; no more specific term is warranted.
- source_word: אֲשֶׁר הִגְלֵיתִי אֶתְכֶם מִשָּׁם
  chosen: from which I sent you into exile
  alternatives:
  - from which I exiled you
  - whence I carried you away
  lexicon: HALOT
  rationale: גלה in Hiphil means to send into exile/deport. 'Sent you into exile' is natural modern English and makes explicit the exilic sense inherent in the verb.
