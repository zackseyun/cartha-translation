theological_decisions:
- issue: Rendering the restoration idiom שׁוּב אֶת־שְׁבוּת/שְׁבִית
  chosen_reading: I will restore your fortunes
  alternative_readings:
  - I will restore your captivity
  - I will bring back your captives
  rationale: The phrase is a recognized Hebrew idiom for reversing a people's condition of judgment and exile. In this context, the subsequent clauses already specify literal regathering and return, so 'restore your fortunes' best captures the idiomatic force without redundancy. Because some readers may prefer a more literal exile-focused rendering, that alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
