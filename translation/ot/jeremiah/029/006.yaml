id: JER.29.6
reference: Jeremiah 29:6
source:
  edition: WLC
  text: קְח֣וּ נָשִׁ֗ים וְ/הוֹלִידוּ֮ בָּנִ֣ים וּ/בָנוֹת֒ וּ/קְח֨וּ לִ/בְנֵי/כֶ֜ם
    נָשִׁ֗ים וְ/אֶת בְּנֽוֹתֵי/כֶם֙ תְּנ֣וּ לַֽ/אֲנָשִׁ֔ים וְ/תֵלַ֖דְנָה בָּנִ֣ים
    וּ/בָנ֑וֹת וּ/רְבוּ שָׁ֖ם וְ/אַל תִּמְעָֽטוּ־־־׃
translation:
  text: Take wives and father sons and daughters; and take wives for your sons, and
    give your daughters to husbands, so that they may bear sons and daughters; multiply
    there, and do not decrease.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'beget sons and daughters.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'give your daughters to men'; in context this means giving them
      in marriage.
    reason: lexical_alternative
  - marker: c
    text: Or 'do not become few.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קְחוּ נָשִׁים
  chosen: Take wives
  alternatives:
  - Marry women
  - Take women as wives
  lexicon: HALOT
  rationale: The idiom לקח נשים means to take women in marriage, not merely to take
    women generally. 'Take wives' is concise, idiomatic, and preserves the imperative
    force.
- source_word: וְהוֹלִידוּ
  chosen: father
  alternatives:
  - beget
  - have
  lexicon: HALOT
  rationale: The Hiphil of ילד with male subjects commonly means 'beget' or 'father.'
    'Father' is readable modern English and preserves the male-subject nuance better
    than the generic 'have.'
- source_word: בָּנִים וּבָנוֹת
  chosen: sons and daughters
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sexes; 'sons and daughters' is more
    accurate than the generalized 'children,' in keeping with gender-accurate translation
    philosophy.
- source_word: וּקְחוּ לִבְנֵיכֶם נָשִׁים
  chosen: and take wives for your sons
  alternatives:
  - and get wives for your sons
  - and find wives for your sons
  lexicon: HALOT
  rationale: Again this is marriage language. 'Take wives for your sons' closely follows
    the Hebrew while remaining natural in English.
- source_word: וְאֶת בְּנוֹתֵיכֶם תְּנוּ לַאֲנָשִׁים
  chosen: and give your daughters to husbands
  alternatives:
  - and give your daughters to men
  - and give your daughters in marriage
  lexicon: HALOT
  rationale: Although אֲנָשִׁים is literally 'men,' in this marriage context the sense
    is prospective husbands. 'To husbands' makes the relational meaning explicit without
    over-paraphrasing.
- source_word: וְתֵלַדְנָה
  chosen: so that they may bear
  alternatives:
  - and they will bear
  - that they may give birth to
  lexicon: HALOT
  rationale: With the preceding imperatives, the imperfect here expresses intended
    result or purpose. 'So that they may bear' captures that nuance better than a
    simple future.
- source_word: וּרְבוּ
  chosen: multiply
  alternatives:
  - increase
  lexicon: HALOT
  rationale: '''Multiply'' is the standard rendering of רבה in contexts of population
    growth and echoes broader biblical usage.'
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: The adverb points to the place of exile just mentioned in context. 'There'
    is the natural direct rendering.
- source_word: וְאַל תִּמְעָטוּ
  chosen: and do not decrease
  alternatives:
  - and do not become few
  - and do not diminish
  lexicon: HALOT
  rationale: מעט here refers to becoming fewer in number. 'Do not decrease' is clear,
    natural, and matches the population-growth contrast with 'multiply.'
