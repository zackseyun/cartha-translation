theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    of YHWH. This also aligns with the prophetic formula נְאֻם יְהוָה in readable
    modern English.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Semantic scope of שָׁלוֹם in a promise context
  chosen_reading: peace
  alternative_readings:
  - welfare
  - well-being
  rationale: The main text keeps the more direct lexical rendering 'peace' rather
    than expanding interpretively to 'welfare.' Because English 'peace' can sound
    narrower than Hebrew שָׁלוֹם, a footnote preserves the broader sense without flattening
    the source in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
