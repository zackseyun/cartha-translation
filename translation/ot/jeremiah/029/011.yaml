id: JER.29.11
reference: Jeremiah 29:11
source:
  edition: WLC
  text: כִּי֩ אָנֹכִ֨י יָדַ֜עְתִּי אֶת הַ/מַּחֲשָׁבֹ֗ת אֲשֶׁ֧ר אָנֹכִ֛י חֹשֵׁ֥ב עֲלֵי/כֶ֖ם
    נְאֻם יְהוָ֑ה מַחְשְׁב֤וֹת שָׁלוֹם֙ וְ/לֹ֣א לְ/רָעָ֔ה לָ/תֵ֥ת לָ/כֶ֖ם אַחֲרִ֥ית
    וְ/תִקְוָֽה־־׃
translation:
  text: For I know the plans that I am planning for you, declares the LORD, plans
    for peace and not for harm, to give you a future and a hope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plans for welfare' or 'plans for well-being'; Hebrew shalom can include
      peace, wholeness, and flourishing.
    reason: lexical_alternative
  - marker: b
    text: Or 'not for disaster' or 'not for calamity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding exhortation/promise.
    'For' preserves the connective force in natural English.
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  lexicon: HALOT
  rationale: The perfect here expresses Yahweh's settled knowledge/intention. Present
    English 'I know' best conveys the stative force.
- source_word: הַמַּחֲשָׁבוֹת
  chosen: the plans
  alternatives:
  - the thoughts
  - the intentions
  lexicon: HALOT
  rationale: מַחֲשָׁבוֹת can mean thoughts, plans, or intentions. In this context
    of divine purpose toward the exiles and the infinitive 'to give you,' 'plans'
    best captures purposeful intent in idiomatic English.
- source_word: חֹשֵׁב
  chosen: I am planning
  alternatives:
  - I am thinking
  - I intend
  lexicon: HALOT
  rationale: Using 'I am planning' preserves the verbal link with מַחֲשָׁבוֹת ('plans')
    and reflects ongoing intentionality. It is slightly more explicit than 'thinking'
    but fits the context of purposeful divine action.
- source_word: עֲלֵיכֶם
  chosen: for you
  alternatives:
  - toward you
  - concerning you
  lexicon: HALOT
  rationale: The preposition with this verb can indicate direction or concern. 'For
    you' communicates benevolent orientation in clear English without overstating.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic, solemn,
    and preserves the force of divine utterance. 'the LORD' follows the doctrinal
    default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: מַחְשְׁבוֹת שָׁלוֹם
  chosen: plans for peace
  alternatives:
  - plans for welfare
  - plans for well-being
  lexicon: HALOT
  rationale: שָׁלוֹם includes peace, wholeness, and well-being. 'Peace' is the more
    direct lexical rendering and preserves the theological richness; broader alternatives
    are worth preserving in a footnote because English readers may hear 'peace' too
    narrowly.
- source_word: לֹא לְרָעָה
  chosen: not for harm
  alternatives:
  - not for evil
  - not for disaster
  - not for calamity
  lexicon: HALOT
  rationale: רָעָה can denote moral evil or experiential harm/disaster. Here the contrast
    with שָׁלוֹם and the context of promised restoration favor 'harm' as a broad,
    non-moral term. 'Disaster' is a plausible contextual alternative and is preserved
    in a footnote.
- source_word: לָתֵת לָכֶם
  chosen: to give you
  alternatives:
  - to grant you
  lexicon: HALOT
  rationale: Straightforward infinitive of purpose. 'To give you' is both accurate
    and natural.
- source_word: אַחֲרִית
  chosen: a future
  alternatives:
  - an end
  - an outcome
  - a latter end
  lexicon: HALOT
  rationale: אַחֲרִית often means end, latter end, or future outcome. In this promise
    context, 'a future' communicates the positive forward-looking sense in idiomatic
    English.
- source_word: תִקְוָה
  chosen: a hope
  alternatives:
  - hope
  lexicon: HALOT
  rationale: Rendered with the article in English for balance with 'a future.' The
    noun denotes hope or expectation; 'a hope' fits the paired expression and preserves
    the concrete sense of a hoped-for prospect.
