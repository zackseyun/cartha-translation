id: JER.29.29
reference: Jeremiah 29:29
source:
  edition: WLC
  text: וַ/יִּקְרָ֛א צְפַנְיָ֥ה הַ/כֹּהֵ֖ן אֶת הַ/סֵּ֣פֶר הַ/זֶּ֑ה בְּ/אָזְנֵ֖י יִרְמְיָ֥הוּ
    הַ/נָּבִֽיא־׃פ
translation:
  text: Then Zephaniah the priest read this letter in the hearing of Jeremiah the
    prophet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'this book/scroll' (סֵפֶר); here rendered 'letter' because the context
      identifies the written document as Shemaiah's letter.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: Then ... read
  alternatives:
  - And ... read
  - proclaimed
  - called
  lexicon: HALOT
  rationale: Qal wayyiqtol of קרא here takes a written object ('this book/letter')
    and means 'read.' 'Then' reflects the narrative sequencing force of the wayyiqtol
    in smooth English.
- source_word: צְפַנְיָה
  chosen: Zephaniah
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: הַכֹּהֵן
  chosen: the priest
  lexicon: HALOT
  rationale: Definite title identifying Zephaniah's office; straightforwardly rendered
    'the priest.'
- source_word: הַסֵּפֶר הַזֶּה
  chosen: this letter
  alternatives:
  - this book
  - this scroll
  - this document
  lexicon: HALOT
  rationale: סֵפֶר can denote a book, scroll, written document, or letter. In the
    immediate context Jeremiah 29 concerns a written communication sent by Shemaiah,
    so 'letter' best captures the referent in idiomatic English while remaining faithful
    to the context.
- source_word: בְּאָזְנֵי
  chosen: in the hearing of
  alternatives:
  - in the ears of
  - before
  lexicon: HALOT
  rationale: This Hebrew idiom literally means 'in the ears of' and denotes something
    being read aloud so that someone hears it. 'In the hearing of' preserves the formal
    sense in natural English.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  rationale: Personal name transliterated by standard English convention.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Definite title appositional to Jeremiah, retained explicitly in English.
