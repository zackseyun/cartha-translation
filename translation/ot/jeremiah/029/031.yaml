id: JER.29.31
reference: Jeremiah 29:31
source:
  edition: WLC
  text: שְׁלַ֤ח עַל כָּל הַ/גּוֹלָה֙ לֵ/אמֹ֔ר כֹּ֚ה אָמַ֣ר יְהוָ֔ה אֶל שְׁמַעְיָ֖ה הַ/נֶּחֱלָמִ֑י יַ֡עַן אֲשֶׁר֩ נִבָּ֨א לָ/כֶ֜ם שְׁמַעְיָ֗ה וַֽ/אֲנִי֙ לֹ֣א שְׁלַחְתִּ֔י/ו וַ/יַּבְטַ֥ח אֶתְ/כֶ֖ם עַל שָֽׁקֶר־־־־׃
translation:
  text: 'Send to all the exiles, saying, ‘Thus says Yahweh concerning Shemaiah the Nehelamite: Because Shemaiah has prophesied to you, though I did not send him, and has made you trust in a lie,’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “Shemaiah the dreamer,” if the title is derived from a word related to dreaming rather than a place-name or clan designation.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלַח
  chosen: Send
  alternatives:
  - Send word
  - Dispatch
  lexicon: HALOT
  rationale: Imperative singular from שלח, addressed to Jeremiah, introducing the message to be transmitted. Simple 'Send' best preserves the direct command.
- source_word: עַל כָּל הַגּוֹלָה
  chosen: to all the exiles
  alternatives:
  - to all the exile community
  - concerning all the exiles
  lexicon: HALOT
  rationale: Though עַל can mean 'concerning,' with שלח in epistolary context it functions idiomatically as direction toward recipients. הַגּוֹלָה refers to the deported community; 'the exiles' is natural modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and say
  - with these words
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of the message.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula. 'the LORD' follows project policy for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל שְׁמַעְיָה הַנֶּחֱלָמִי
  chosen: concerning Shemaiah the Nehelamite
  alternatives:
  - to Shemaiah the Nehelamite
  lexicon: HALOT
  rationale: Here אֶל after the messenger formula introduces the subject matter of the oracle rather than the addressee. 'Concerning' fits the context, since the message is sent to the exiles about Shemaiah.
- source_word: הַנֶּחֱלָמִי
  chosen: the Nehelamite
  alternatives:
  - the dreamer
  - the man from Nehelam
  lexicon: HALOT
  rationale: Likely a gentilicial/title attached to Shemaiah. Because the exact derivation is uncertain, transliterating as 'Nehelamite' is more auditable and less interpretively loaded than 'dreamer.'
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Since
  - For the reason that
  lexicon: HALOT
  rationale: Causal expression introducing the grounds for judgment.
- source_word: נִבָּא לָכֶם
  chosen: has prophesied to you
  alternatives:
  - prophesied among you
  - spoken as a prophet to you
  lexicon: HALOT
  rationale: Niphal of נבא in prophetic context means to prophesy. Present perfect in English fits the completed action with present relevance.
- source_word: וַאֲנִי לֹא שְׁלַחְתִּיו
  chosen: though I did not send him
  alternatives:
  - but I did not send him
  - when I had not sent him
  lexicon: HALOT
  rationale: The conjunction marks contrast with Shemaiah's prophetic claim. 'Though' captures the concessive force naturally in English.
- source_word: וַיַּבְטַח אֶתְכֶם
  chosen: has made you trust
  alternatives:
  - caused you to trust
  - made you feel secure
  lexicon: HALOT
  rationale: 'Hiphil of בטח is causative: he caused the hearers to trust/feel secure. ''Has made you trust'' is clear and preserves the causative sense.'
- source_word: עַל שָׁקֶר
  chosen: in a lie
  alternatives:
  - in falsehood
  - on a lie
  - in what is false
  lexicon: HALOT
  rationale: The preposition with שקר expresses the object/basis of misplaced trust. 'In a lie' is idiomatic and forceful in English.
