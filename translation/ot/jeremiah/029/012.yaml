id: JER.29.12
reference: Jeremiah 29:12
source:
  edition: WLC
  text: וּ/קְרָאתֶ֤ם אֹתִ/י֙ וַֽ/הֲלַכְתֶּ֔ם וְ/הִתְפַּלַּלְתֶּ֖ם אֵלָ֑/י וְ/שָׁמַעְתִּ֖י
    אֲלֵי/כֶֽם׃
translation:
  text: Then you will call on me and come and pray to me, and I will hear you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'go and pray to me'; the Hebrew verb is literally 'go/walk,' but here
      likely means approaching in order to pray.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will listen to you' or 'I will heed you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/קְרָאתֶם
  chosen: you will call on
  alternatives:
  - you will call to
  - you will invoke
  lexicon: HALOT
  rationale: קרא with a personal object commonly means to call to/upon someone. 'Call
    on' is idiomatic English for addressing God in appeal and fits the future-sequence
    sense in context.
- source_word: אֹתִי
  chosen: me
  lexicon: HALOT
  rationale: Direct object suffix referring to God; rendered straightforwardly as
    'me'.
- source_word: וַהֲלַכְתֶּם
  chosen: come
  alternatives:
  - go
  - walk
  lexicon: HALOT
  rationale: הלך literally means 'go/walk,' but in this collocation before 'pray to
    me' it functions idiomatically for approaching in order to pray. 'Come' is more
    natural in English and reflects movement toward God from the speaker's perspective
    better than a wooden 'go.'
- source_word: וְהִתְפַּלַּלְתֶּם
  chosen: pray
  alternatives:
  - intercede
  lexicon: HALOT
  rationale: Hitpael of פלל here denotes prayer directed to God. 'Pray' is the clear,
    standard rendering.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - toward me
  lexicon: HALOT
  rationale: Preposition marks direction of prayer toward God; 'to me' is the natural
    English equivalent.
- source_word: וְשָׁמַעְתִּי
  chosen: I will hear
  alternatives:
  - I will listen to
  - I will heed
  lexicon: HALOT
  rationale: שמע can mean hear/listen/heed. 'Hear' preserves the Hebrew wording while
    allowing the relational sense in context.
- source_word: אֲלֵיכֶם
  chosen: you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: With שמע plus אֶל, the sense is 'hear/listen to.' English normally omits
    the preposition after 'hear,' so 'I will hear you' is idiomatic while preserving
    the meaning.
