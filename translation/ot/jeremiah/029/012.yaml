theological_decisions:
- issue: Divine response to prayer
  chosen_reading: I will hear you
  alternative_readings:
  - I will listen to you
  - I will heed you
  rationale: The Hebrew states that God will hear the exiles when they call and pray.
    'Hear' preserves the text's wording without over-specifying whether the emphasis
    is mere audition or favorable response; the context implies responsiveness, but
    the translation leaves that tension intact.
  doctrine_reference: Preserve theological tension rather than resolve it.
