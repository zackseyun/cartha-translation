id: JER.29.17
reference: Jeremiah 29:17
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת הִנְ/נִי֙ מְשַׁלֵּ֣חַ בָּ֔/ם אֶת הַ/חֶ֖רֶב
    אֶת הָ/רָעָ֣ב וְ/אֶת הַ/דָּ֑בֶר וְ/נָתַתִּ֣י אוֹתָ֗/ם כַּ/תְּאֵנִים֙ הַ/שֹּׁ֣עָרִ֔ים
    אֲשֶׁ֥ר לֹא תֵאָכַ֖לְנָה מֵ/רֹֽעַ־־־־׃
translation:
  text: 'Thus says the LORD of hosts: Behold, I am sending against them the sword,
    the famine, and the pestilence, and I will make them like rotten figs that cannot
    be eaten because they are so bad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bad figs' or 'spoiled figs'; the Hebrew adjective denotes figs so poor
      that they are inedible.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH per
    DOCTRINE.md, preserving the traditional small-caps covenantal form in English.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: The title יְהוָה צְבָאוֹת is conventionally and accurately rendered 'the
    LORD of hosts.' 'Hosts' preserves the breadth of heavenly/earthly armies without
    over-specifying.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic deictic force and solemnity. 'Behold' is slightly
    elevated but still natural in this judgment context.
- source_word: מְשַׁלֵּחַ בָּם
  chosen: I am sending against them
  alternatives:
  - I am sending among them
  - I will send against them
  lexicon: HALOT
  rationale: The participle with הִנְנִי gives imminent or vivid present force ('I
    am sending'). The preposition ב can mean 'against' in hostile contexts; here the
    sword, famine, and pestilence are punitive agents directed at them.
- source_word: הַחֶרֶב
  chosen: the sword
  alternatives:
  - war
  lexicon: HALOT
  rationale: A standard prophetic judgment term. 'The sword' preserves the concrete
    Hebrew image rather than abstracting to 'war,' though warfare is implied.
- source_word: הָרָעָב
  chosen: the famine
  alternatives:
  - hunger
  lexicon: HALOT
  rationale: In the triad of covenant judgments, רָעָב is best rendered 'famine,'
    the established and contextually precise term.
- source_word: הַדָּבֶר
  chosen: the pestilence
  alternatives:
  - plague
  - disease
  lexicon: HALOT
  rationale: In prophetic judgment formulas, דֶּבֶר commonly denotes epidemic affliction.
    'Pestilence' preserves the formal gravity and matches the triadic pattern 'sword,
    famine, and pestilence.'
- source_word: וְנָתַתִּי אוֹתָם
  chosen: I will make them
  alternatives:
  - I will give them over as
  - I will set them as
  lexicon: HALOT
  rationale: 'Here נתן with a comparative phrase functions idiomatically: God will
    render them like something contemptible. ''I will make them like'' is clear modern
    English and fits the syntax.'
- source_word: כַּתְּאֵנִים
  chosen: like figs
  lexicon: HALOT
  rationale: The comparison is explicit and should be retained literally.
- source_word: הַשֹּׁעָרִים
  chosen: rotten
  alternatives:
  - bad
  - spoiled
  - horrid
  lexicon: HALOT
  rationale: The adjective denotes something loathsome or very bad. 'Rotten' communicates
    the concrete food image naturally in English, fitting the following clause about
    being inedible.
- source_word: לֹא תֵאָכַלְנָה
  chosen: cannot be eaten
  alternatives:
  - are not eaten
  - must not be eaten
  lexicon: HALOT
  rationale: 'The Niphal here is best taken as passive/resultative: they are not fit
    to be eaten. ''Cannot be eaten'' captures practical inedibility rather than mere
    custom.'
- source_word: מֵרֹעַ
  chosen: because they are so bad
  alternatives:
  - from badness
  - because of their rottenness
  - because of evil
  lexicon: HALOT
  rationale: 'The phrase explains why the figs are inedible: due to their bad condition.
    Since the referent is figs, a quality sense (''so bad'') is preferable to the
    more moral-sounding ''evil.'''
