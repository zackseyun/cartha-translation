id: JER.29.28
reference: Jeremiah 29:28
source:
  edition: WLC
  text: כִּ֣י עַל כֵּ֞ן שָׁלַ֥ח אֵלֵ֛י/נוּ בָּבֶ֥ל לֵ/אמֹ֖ר אֲרֻכָּ֣ה הִ֑יא בְּנ֤וּ
    בָתִּים֙ וְ/שֵׁ֔בוּ וְ/נִטְע֣וּ גַנּ֔וֹת וְ/אִכְל֖וּ אֶת פְּרִי/הֶֽן־־׃
translation:
  text: For this reason he sent to us in Babylon, saying, ‘It will be a long time.
    Build houses and live in them, and plant gardens and eat their fruit.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'It is long.' The Hebrew is elliptical, with the sense
      that the stay/exile in Babylon will be prolonged.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'and dwell'; rendered 'live in them' because the verb follows 'Build
      houses' and the object is implied in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי עַל כֵּן
  chosen: For this reason
  alternatives:
  - Therefore
  - For this is why
  lexicon: HALOT
  rationale: The combination introduces the reason for the preceding complaint. 'For
    this reason' is natural English and preserves the causal force without over-literal
    awkwardness.
- source_word: שָׁלַח אֵלֵינוּ בָּבֶל
  chosen: he sent to us in Babylon
  alternatives:
  - he sent to us at Babylon
  - he sent word to us in Babylon
  lexicon: HALOT
  rationale: The Hebrew literally says 'he sent to us Babylon,' idiomatically meaning
    he sent a message to the exiles located in Babylon. 'He sent to us in Babylon'
    keeps the syntax close while remaining intelligible. 'Sent word' is interpretive,
    so it is kept as an alternative rather than the main text.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard rendering for the infinitive introducing quoted speech.
- source_word: אֲרֻכָּה הִיא
  chosen: It will be a long time
  alternatives:
  - It is long
  - The exile will be long
  - It will last a long time
  lexicon: HALOT
  rationale: The feminine predicate likely refers elliptically to the exile/stay in
    Babylon. English requires the implied sense to be made explicit enough for readability.
    'It will be a long time' preserves the brevity and force without adding 'exile'
    directly into the text.
- source_word: בְּנוּ בָתִּים
  chosen: Build houses
  alternatives:
  - Build yourselves houses
  lexicon: HALOT
  rationale: Direct imperative plus object. The reflexive nuance is not explicit in
    Hebrew and need not be added.
- source_word: וְשֵׁבוּ
  chosen: and live in them
  alternatives:
  - and dwell
  - and settle down
  lexicon: HALOT
  rationale: The verb means 'sit, remain, dwell.' In context with houses, English
    idiom prefers 'live in them.' The added 'in them' is implied by the collocation
    with houses and clarifies the sense.
- source_word: וְנִטְעוּ גַנּוֹת
  chosen: and plant gardens
  alternatives:
  - and plant orchards
  lexicon: HALOT
  rationale: גַנּוֹת commonly denotes gardens. 'Orchards' is too specific here.
- source_word: וְאִכְלוּ אֶת פְּרִיהֶן
  chosen: and eat their fruit
  alternatives:
  - and eat the fruit of them
  - and eat what they produce
  lexicon: HALOT
  rationale: A straightforward rendering of the imperative plus object. 'Their fruit'
    is idiomatic and preserves the feminine plural antecedent 'gardens'.
