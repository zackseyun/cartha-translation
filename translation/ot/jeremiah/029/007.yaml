id: JER.29.7
reference: Jeremiah 29:7
source:
  edition: WLC
  text: וְ/דִרְשׁ֞וּ אֶת שְׁל֣וֹם הָ/עִ֗יר אֲשֶׁ֨ר הִגְלֵ֤יתִי אֶתְ/כֶם֙ שָׁ֔מָּ/ה
    וְ/הִתְפַּֽלְל֥וּ בַעֲדָ֖/הּ אֶל יְהוָ֑ה כִּ֣י בִ/שְׁלוֹמָ֔/הּ יִהְיֶ֥ה לָ/כֶ֖ם
    שָׁלֽוֹם־־׃פ
translation:
  text: Seek the welfare of the city where I have sent you into exile, and pray to
    the LORD on its behalf, for in its welfare you will have welfare.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'peace' / 'well-being' throughout the verse; the Hebrew word shalom is
      repeated for both the city and the exiles.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִרְשׁוּ
  chosen: Seek
  alternatives:
  - Pursue
  - Work for
  lexicon: HALOT
  rationale: דרשׁ in this context means to seek after or strive for, not merely to
    look for intellectually. 'Seek' preserves the imperative force and broad scope
    without over-paraphrasing into a specific action program.
- source_word: שְׁלוֹם
  chosen: welfare
  alternatives:
  - peace
  - prosperity
  - well-being
  lexicon: HALOT
  rationale: שׁלום here refers to the city's overall well-being, stability, and flourishing,
    not merely absence of conflict. 'Welfare' best captures the civic and comprehensive
    sense in this context and allows the repeated wordplay to remain visible in English.
- source_word: הָעִיר
  chosen: the city
  alternatives:
  - the town
  lexicon: HALOT
  rationale: The definite noun refers to the specific urban center of exile. 'City'
    is the natural and standard rendering.
- source_word: הִגְלֵיתִי
  chosen: have sent you into exile
  alternatives:
  - have carried you away
  - have exiled you
  lexicon: HALOT
  rationale: The hiphil of גלה means to cause to go into exile. 'Have sent you into
    exile' is idiomatic modern English and preserves God's agency. 'Have carried you
    away' is more traditional but less natural in contemporary English.
- source_word: שָׁמָּה
  chosen: where
  alternatives:
  - there
  lexicon: HALOT
  rationale: Although literally 'there,' in English it is smoother and clearer to
    fold the adverb into the relative clause as 'where I have sent you into exile,'
    preserving sense without awkwardness.
- source_word: הִתְפַּלְלוּ
  chosen: pray
  alternatives:
  - intercede
  lexicon: HALOT
  rationale: The hitpael imperative plainly means 'pray.' 'Intercede' is interpretively
    narrower than the Hebrew requires, though the object phrase shows prayer on the
    city's behalf.
- source_word: בַעֲדָהּ
  chosen: on its behalf
  alternatives:
  - for it
  - for its sake
  lexicon: HALOT
  rationale: בעד with a pronominal suffix indicates prayer in favor of or on behalf
    of the city. 'On its behalf' is slightly more explicit than 'for it' while remaining
    natural.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: כּי introduces the reason for the preceding commands. 'For' is concise
    and natural in this explanatory use.
- source_word: בִשְׁלוֹמָהּ ... לָכֶם שָׁלוֹם
  chosen: in its welfare you will have welfare
  alternatives:
  - in its peace you will have peace
  - in its prosperity you will prosper
  lexicon: HALOT
  rationale: 'The verse intentionally repeats שׁלום for the city and the exiles. Rendering
    both with ''welfare'' preserves lexical consistency and the reciprocal logic:
    the city''s well-being is tied to theirs. ''Prosper'' would over-specify economic
    success; ''peace'' would underrepresent the broader social sense.'
