id: JER.29.30
reference: Jeremiah 29:30
source:
  edition: WLC
  text: וַֽ/יְהִי֙ דְּבַר יְהוָ֔ה אֶֽל יִרְמְיָ֖הוּ לֵ/אמֹֽר־־׃
translation:
  text: Then the word of Yahweh came to Jeremiah, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - And it came to pass
  - Then it came about
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next narrative event. In English, the idiom is best carried by 'Then ... came' rather than the wooden 'and it came to pass,' preserving narrative sequence without archaic style.
- source_word: דְּבַר
  chosen: the word
  alternatives:
  - a word
  - the message
  lexicon: HALOT
  rationale: In the prophetic formula דְּבַר יְהוָה, 'the word' is the standard and most transparent rendering, preserving the recognizable formulaic expression. 'Message' is possible but less formally tied to the Hebrew idiom.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition simply marks direction toward Jeremiah; 'to' is the natural modern English equivalent.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  rationale: Personal names are transliterated by standard English convention.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: This infinitive construct regularly introduces direct speech. 'Saying' is the idiomatic English equivalent and signals that the following verse contains the content of the word.
