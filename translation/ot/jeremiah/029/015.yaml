id: JER.29.15
reference: Jeremiah 29:15
source:
  edition: WLC
  text: כִּ֖י אֲמַרְתֶּ֑ם הֵקִ֨ים לָ֧/נוּ יְהוָ֛ה נְבִאִ֖ים בָּבֶֽלָ/ה׃ס
translation:
  text: Because you have said, “Yahweh has raised up prophets for us in Babylon,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “For you said.”
    reason: lexical_alternative
  - marker: b
    text: Or “The LORD has appointed prophets for us in Babylon.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Because
  alternatives:
  - For
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the following divine response in context. 'Because' makes the causal force clear in modern English, while 'For' is possible but less natural.
- source_word: אֲמַרְתֶּם
  chosen: you have said
  alternatives:
  - you said
  lexicon: HALOT
  rationale: The qatal 2mp reports the audience's prior assertion. English present perfect fits the discourse connection well, though simple past would also be possible.
- source_word: הֵקִים
  chosen: has raised up
  alternatives:
  - has established
  - has appointed
  lexicon: HALOT
  rationale: Hiphil of קום commonly means 'raise up' in contexts of appointing or providing leaders/prophets. 'Raised up' is idiomatic and preserves the biblical pattern of God raising up prophets.
- source_word: לָנוּ
  chosen: for us
  alternatives:
  - to us
  lexicon: HALOT
  rationale: The preposition ל with pronoun here is best rendered 'for us,' expressing benefit or provision. 'To us' is possible but less natural in English with 'raised up prophets.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: נְבִאִים
  chosen: prophets
  lexicon: HALOT
  rationale: Straightforward plural of נביא, referring to persons claiming or exercising prophetic status.
- source_word: בָּבֶלָה
  chosen: in Babylon
  alternatives:
  - at Babylon
  lexicon: HALOT
  rationale: The directional/locative ending with Babylon is naturally rendered in English as 'in Babylon' in this context, indicating location.
