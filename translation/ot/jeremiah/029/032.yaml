id: JER.29.32
reference: Jeremiah 29:32
source:
  edition: WLC
  text: לָ/כֵ֞ן כֹּֽה אָמַ֣ר יְהוָ֗ה הִנְ/נִ֨י פֹקֵ֜ד עַל שְׁמַעְיָ֣ה הַ/נֶּחֱלָמִי֮
    וְ/עַל זַרְע/וֹ֒ לֹא יִהְיֶ֨ה ל֜/וֹ אִ֣ישׁ יוֹשֵׁ֣ב בְּ/תוֹךְ הָ/עָ֣ם הַ/זֶּ֗ה
    וְ/לֹֽא יִרְאֶ֥ה בַ/טּ֛וֹב אֲשֶׁר אֲנִ֥י עֹשֶֽׂה לְ/עַמִּ֖/י נְאֻם יְהוָ֑ה כִּֽי
    סָרָ֥ה דִבֶּ֖ר עַל יְהוָֽה־־־־׀׀־־־־־־־׃ס
translation:
  text: 'Therefore thus says the LORD: Behold, I am about to punish Shemaiah the Nehelamite
    and his offspring. He will not have a man dwelling among this people, nor will
    he see the good that I am doing for my people, declares the LORD, because he has
    spoken rebellion against the LORD.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'Shemaiah the dreamer'; the epithet הַנֶּחֱלָמִי may be connected
      with dreaming, but its exact force here is uncertain, so the main text preserves
      it as a proper designation.
    reason: lexical_alternative
  - marker: b
    text: Or 'apostasy' or 'revolt' against the LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential conjunction introducing the divine judgment as a
    consequence of the preceding oracle.
- source_word: כֹּה אָמַר יְהוָה
  chosen: thus says the LORD
  alternatives:
  - this is what the LORD says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula. יְהוָה follows the doctrine
    default as 'the LORD' rather than 'Yahweh'.
- source_word: הִנְנִי פֹקֵד עַל
  chosen: Behold, I am about to punish
  alternatives:
  - Look, I am visiting judgment on
  - Behold, I am attending to
  lexicon: HALOT
  rationale: פקד על in judgment contexts commonly means to punish or call to account.
    'Behold' preserves הִנְנִי's deictic force, while 'am about to punish' communicates
    imminent judicial action in natural English.
- source_word: שְׁמַעְיָה
  chosen: Shemaiah
  rationale: Personal name is transliterated per translation philosophy.
- source_word: הַנֶּחֱלָמִי
  chosen: the Nehelamite
  alternatives:
  - the dreamer
  - the Nehelamite (possibly 'dreamer')
  lexicon: HALOT
  rationale: The form functions as an epithet/gentilic attached to Shemaiah. Because
    its exact derivation is uncertain and it is conventionally treated as a proper
    designation, transliteration is preferred in the main text. The possible sense
    'dreamer' is preserved in a footnote as a lexical alternative.
- source_word: וְעַל זַרְעוֹ
  chosen: and his offspring
  alternatives:
  - and his descendants
  - and his seed
  lexicon: HALOT
  rationale: זֶרַע here refers to posterity. 'Offspring' is natural modern English
    and preserves the collective sense.
- source_word: לֹא יִהְיֶה לוֹ אִישׁ יֹשֵׁב
  chosen: He will not have a man dwelling
  alternatives:
  - He will have no one dwelling
  - No man of his will remain dwelling
  lexicon: HALOT
  rationale: Literally 'there will not be for him a man dwelling.' Retaining 'a man'
    reflects the masculine singular אִישׁ and the idiom of lacking any surviving representative.
    This is gender-accurate to the Hebrew form and context of posterity.
- source_word: בְּתוֹךְ הָעָם הַזֶּה
  chosen: among this people
  alternatives:
  - in the midst of this people
  lexicon: HALOT
  rationale: Idiomatic rendering of spatial/social inclusion within the covenant community.
- source_word: וְלֹא יִרְאֶה בַטּוֹב
  chosen: nor will he see the good
  alternatives:
  - and he will not see the good
  - nor will he experience the good
  lexicon: HALOT
  rationale: A straightforward rendering of the idiom. 'See the good' preserves the
    Hebrew image while remaining understandable in English.
- source_word: אֲשֶׁר אֲנִי עֹשֶׂה לְעַמִּי
  chosen: that I am doing for my people
  alternatives:
  - that I will do for my people
  - that I am bringing about for my people
  lexicon: HALOT
  rationale: The participle עֹשֶׂה can denote present or imminent action. 'Am doing'
    best reflects the Hebrew form while allowing the prophetic present/future nuance.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  lexicon: HALOT
  rationale: Standard prophetic closure in readable modern English.
- source_word: כִּי סָרָה דִבֶּר עַל יְהוָה
  chosen: because he has spoken rebellion against the LORD
  alternatives:
  - because he has spoken apostasy against the LORD
  - because he has preached revolt against the LORD
  lexicon: HALOT
  rationale: סָרָה denotes rebellion, defection, or apostasy; in Jeremiah it often
    describes speech urging covenantal revolt. 'Spoken rebellion against the LORD'
    preserves both the noun's force and the verbal construction without overinterpreting
    the exact mode of rebellion.
