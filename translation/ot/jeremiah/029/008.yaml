id: JER.29.8
reference: Jeremiah 29:8
source:
  edition: WLC
  text: כִּי֩ כֹ֨ה אָמַ֜ר יְהוָ֤ה צְבָאוֹת֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל אַל יַשִּׁ֧יאוּ לָ/כֶ֛ם
    נְבִֽיאֵי/כֶ֥ם אֲשֶׁר בְּ/קִרְבְּ/כֶ֖ם וְ/קֹֽסְמֵי/כֶ֑ם וְ/אַֽל תִּשְׁמְעוּ֙ אֶל
    חֲלֹמֹ֣תֵי/כֶ֔ם אֲשֶׁ֥ר אַתֶּ֖ם מַחְלְמִֽים־־־־׃
translation:
  text: 'For thus says the LORD of hosts, the God of Israel: Do not let your prophets
    who are among you and your diviners deceive you, and do not listen to your dreams
    that you are causing to be dreamed.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the dreams that you dream'; the Hebrew expression is difficult and may
      reflect either dreams the people themselves are dreaming or dreams they are
      in some sense fostering or causing.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH per
    DOCTRINE.md, preserving Jewish reverence tradition and the longstanding small-caps
    convention in English.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'hosts' is the established and sufficiently
    transparent rendering, encompassing heavenly and earthly armies without over-specifying.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct rendering preserving covenantal identification.
- source_word: אַל יַשִּׁיאוּ לָכֶם
  chosen: Do not let ... deceive you
  alternatives:
  - Do not let ... mislead you
  - Do not let ... delude you
  lexicon: HALOT
  rationale: The Hiphil of נשׁא here carries the sense of causing someone to be deceived
    or led astray. 'Deceive' is direct and idiomatic in English.
- source_word: נְבִיאֵיכֶם אֲשֶׁר בְּקִרְבְּכֶם
  chosen: your prophets who are among you
  alternatives:
  - your prophets in your midst
  lexicon: HALOT
  rationale: '''Who are among you'' renders the relational sense naturally in modern
    English while preserving the idea that these prophets are present within the exilic
    community.'
- source_word: קֹסְמֵיכֶם
  chosen: your diviners
  alternatives:
  - your soothsayers
  - those who practice divination among you
  lexicon: HALOT
  rationale: From קסם, referring to practitioners of divination. 'Diviners' is concise,
    accurate, and readable.
- source_word: וְאַל תִּשְׁמְעוּ אֶל
  chosen: and do not listen to
  alternatives:
  - and do not heed
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means to listen to or heed. 'Listen to' is the
    clearest modern equivalent here.
- source_word: חֲלֹמֹתֵיכֶם
  chosen: your dreams
  alternatives:
  - the dreams you dream
  lexicon: HALOT
  rationale: The noun plainly means 'dreams.' The possessive is retained.
- source_word: אֲשֶׁר אַתֶּם מַחְלְמִים
  chosen: that you are causing to be dreamed
  alternatives:
  - that you are dreaming
  - which you dream
  - that you are making others dream
  lexicon: HALOT
  rationale: The form is Hiphil participle of חלם, which is unusual and likely causative/intensive.
    A more literal rendering preserves the awkward force of the Hebrew and avoids
    prematurely smoothing it into the simpler 'you dream.' Because the phrase is difficult,
    alternatives are preserved in a footnote.
