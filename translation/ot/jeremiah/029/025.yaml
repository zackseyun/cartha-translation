id: JER.29.25
reference: Jeremiah 29:25
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר יְהוָ֧ה צְבָא֛וֹת אֱלֹהֵ֥י יִשְׂרָאֵ֖ל לֵ/אמֹ֑ר יַ֡עַן אֲשֶׁ֣ר אַתָּה֩ שָׁלַ֨חְתָּ בְ/שִׁמְ/כָ֜ה סְפָרִ֗ים אֶל כָּל הָ/עָם֙ אֲשֶׁ֣ר בִּ/ירוּשָׁלִַ֔ם וְ/אֶל צְפַנְיָ֤ה בֶן מַֽעֲשֵׂיָה֙ הַ/כֹּהֵ֔ן וְ/אֶ֥ל כָּל הַ/כֹּהֲנִ֖ים לֵ/אמֹֽר־־־־־־׃
translation:
  text: 'Thus says Yahweh of hosts, the God of Israel: Because you have sent letters in your own name to all the people who are in Jerusalem, and to Zephaniah son of Maaseiah the priest, and to all the priests, saying,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your name.' The phrase likely highlights that Shemaiah acted on his own authority rather than by the LORD's authority.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' preserves the formal prophetic tone without unnecessary archaism.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the established and suitably broad rendering, encompassing heavenly and earthly armies without over-specifying.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying Israel's covenant God.
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Forasmuch as
  - Since
  lexicon: HALOT
  rationale: Introduces the reason for the ensuing judgment speech; 'Because' is natural modern English and captures the causal force.
- source_word: שָׁלַחְתָּ
  chosen: you have sent
  alternatives:
  - you sent
  lexicon: HALOT
  rationale: The perfect verb in this context refers to a completed prior action with present relevance; English present perfect communicates that naturally.
- source_word: בְשִׁמְךָ
  chosen: in your own name
  alternatives:
  - in your name
  lexicon: HALOT
  rationale: The phrase indicates unauthorized self-authorization in contrast to speaking in the LORD's name. 'Your own name' makes the contrast explicit from the Hebrew possessive without adding new content.
- source_word: סְפָרִים
  chosen: letters
  alternatives:
  - documents
  - scrolls
  lexicon: HALOT
  rationale: In this context of correspondence sent to named recipients, 'letters' is the most idiomatic and contextually precise rendering.
- source_word: כָּל הָעָם אֲשֶׁר בִּירוּשָׁלִַם
  chosen: all the people who are in Jerusalem
  alternatives:
  - all the people in Jerusalem
  lexicon: HALOT
  rationale: Retains the relative clause's sense while remaining readable; 'people' is the natural rendering of עָם here.
- source_word: צְפַנְיָה בֶן מַעֲשֵׂיָה הַכֹּהֵן
  chosen: Zephaniah son of Maaseiah the priest
  alternatives:
  - Zephaniah the priest, son of Maaseiah
  lexicon: HALOT
  rationale: Transliterates personal names and preserves the appositional identification. The chosen order follows the Hebrew sequence closely.
- source_word: כָּל הַכֹּהֲנִים
  chosen: all the priests
  lexicon: HALOT
  rationale: Direct rendering of the plural noun with the article and quantifier.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: Introduces the content of the letters in the next verse; 'saying' is the standard and natural English equivalent.
