id: JER.29.20
reference: Jeremiah 29:20
source:
  edition: WLC
  text: וְ/אַתֶּ֖ם שִׁמְע֣וּ דְבַר יְהוָ֑ה כָּל הַ֨/גּוֹלָ֔ה אֲשֶׁר שִׁלַּ֥חְתִּי
    מִ/ירוּשָׁלִַ֖ם בָּבֶֽלָ/ה־־־׃ס
translation:
  text: But you, all the exiles whom I sent from Jerusalem to Babylon, hear the word
    of the LORD.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/אַתֶּם
  chosen: But you
  alternatives:
  - And you
  - As for you
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks a contrastive shift
    from the preceding denunciation to the addressed audience. 'But you' captures
    the discourse contrast more naturally than a simple 'And you.'
- source_word: שִׁמְע֣וּ
  chosen: hear
  alternatives:
  - listen to
  - obey
  lexicon: HALOT
  rationale: Imperative of שׁמע commonly means 'hear/listen.' 'Hear' preserves the
    prophetic formula 'hear the word of the LORD' and leaves the obedience implication
    implicit rather than overtranslating it.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Standard prophetic expression. 'Word' preserves the formal and theological
    resonance of divine speech. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Follows the project''s contested-terms policy for the divine name: ''the
    LORD.'''
- source_word: כָּל הַגּוֹלָה
  chosen: all the exiles
  alternatives:
  - the whole exile community
  - all the deportees
  lexicon: HALOT
  rationale: Though singular in form, the collective noun refers to the community
    in exile. 'All the exiles' is natural English and accurately conveys the collective
    sense without awkwardness.
- source_word: אֲשֶׁר שִׁלַּחְתִּי
  chosen: whom I sent
  alternatives:
  - whom I have sent
  - whom I drove out
  lexicon: HALOT
  rationale: The relative clause identifies the exiles as those sent by the LORD.
    'Sent' is the plain sense of שלח here; stronger renderings like 'drove out' import
    nuance not explicit in this form.
- source_word: מִירוּשָׁלִַם
  chosen: from Jerusalem
  lexicon: HALOT
  rationale: Straightforward source marker with the preposition מִן.
- source_word: בָּבֶלָה
  chosen: to Babylon
  alternatives:
  - into Babylon
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Babylon. In idiomatic
    English, 'to Babylon' is the clearest rendering.
