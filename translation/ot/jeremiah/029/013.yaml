id: JER.29.13
reference: Jeremiah 29:13
source:
  edition: WLC
  text: וּ/בִקַּשְׁתֶּ֥ם אֹתִ֖/י וּ/מְצָאתֶ֑ם כִּ֥י תִדְרְשֻׁ֖/נִי בְּ/כָל לְבַבְ/כֶֽם־׃
translation:
  text: You will seek me and find me, when you seek me with all your heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for you will seek me and find me, if you seek me with all your heart.'
      The Hebrew conjunction כי can be understood in several related ways here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִקַּשְׁתֶּם
  chosen: you will seek
  alternatives:
  - you shall seek
  - you will search for
  lexicon: HALOT
  rationale: Piel perfect with prefixed conjunction in this future-oriented promise
    context is best rendered as a simple future. 'Seek' is the most natural and established
    gloss for בקשׁ here, expressing intentional pursuit without over-paraphrase.
- source_word: אֹתִי
  chosen: me
  lexicon: HALOT
  rationale: Direct-object marker with 1cs suffix; straightforwardly rendered 'me.'
- source_word: וּמְצָאתֶם
  chosen: and find me
  alternatives:
  - and you will find me
  lexicon: HALOT
  rationale: Qal perfect with conjunction continues the future result sequence. English
    omits the repeated subject naturally. 'Find me' preserves the personal object
    implied by the preceding and following suffixes and the verse's sense.
- source_word: כִּי
  chosen: when
  alternatives:
  - for
  - because
  - if
  lexicon: HALOT
  rationale: Although כי often means 'for/because,' in this context it introduces
    the condition or circumstance under which finding occurs. 'When' communicates
    the sense idiomatically in English while preserving the logical connection. A
    more literal 'for' is possible but less clear in modern English.
- source_word: תִדְרְשֻׁנִי
  chosen: you seek me
  alternatives:
  - you inquire after me
  - you search for me
  lexicon: HALOT
  rationale: דרשׁ often carries the sense of seeking diligently or inquiring after,
    especially in relation to God. 'Seek me' is the clearest idiomatic rendering here
    and pairs well with the earlier בקשׁ while preserving the intensification through
    context rather than awkward English differentiation.
- source_word: בְּכָל
  chosen: with all
  alternatives:
  - with your whole
  - with the entirety of
  lexicon: HALOT
  rationale: The preposition ב with כל before 'heart' is idiomatically rendered 'with
    all,' expressing totality of inner devotion.
- source_word: לְבַבְכֶם
  chosen: your heart
  alternatives:
  - your whole heart
  - your inner being
  lexicon: HALOT
  rationale: לֵבָב refers to the inner person—mind, will, and affections—but 'heart'
    is the standard and sufficiently rich English equivalent in biblical style. The
    collective singular after a plural pronoun is naturally rendered 'your heart'
    in English in the idiom 'with all your heart.'
