id: JER.29.4
reference: Jeremiah 29:4
source:
  edition: WLC
  text: כֹּ֥ה אָמַ֛ר יְהוָ֥ה צְבָא֖וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֑ל לְ/כָל הַ֨/גּוֹלָ֔ה אֲשֶׁר
    הִגְלֵ֥יתִי מִ/ירוּשָׁלִַ֖ם בָּבֶֽלָ/ה־־׃
translation:
  text: 'Thus says the LORD of hosts, the God of Israel, to all the exiles whom I
    have sent into exile from Jerusalem to Babylon:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''whom I have exiled from Jerusalem to Babylon.'' The Hebrew verb is
      causative: ''cause to go into exile/deport.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  - So
  lexicon: HALOT
  rationale: Introduces a prophetic messenger formula. 'Thus' preserves the formal
    prophetic tone in natural English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: The Hebrew perfect in the messenger formula is idiomatically rendered
    as present tense in English ('Thus says...'), reflecting standard prophetic discourse
    rather than a simple past event.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - Almighty
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the most established and
    sufficiently transparent rendering. 'Of armies' is possible but narrower; 'Almighty'
    is interpretive rather than lexical.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying YHWH covenantally with Israel.
- source_word: לְכָל
  chosen: to all
  alternatives:
  - for all
  lexicon: HALOT
  rationale: The preposition marks the addressee of the message; 'to all' fits the
    speech formula.
- source_word: הַגּוֹלָה
  chosen: the exiles
  alternatives:
  - the exile community
  - the captives
  lexicon: HALOT
  rationale: Though formally a collective singular ('the exile'), in English 'the
    exiles' best communicates the people group addressed. 'Exile community' is possible
    but less direct; 'captives' may overemphasize imprisonment rather than deportation.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - that
  lexicon: HALOT
  rationale: Refers to the people addressed; 'whom' is the natural relative pronoun
    for persons in formal but readable English.
- source_word: הִגְלֵיתִי
  chosen: I have sent into exile
  alternatives:
  - I have exiled
  - I carried away
  lexicon: HALOT
  rationale: The Hiphil of גלה means to cause to go into exile/deport. 'Sent into
    exile' makes the causative force explicit and reads naturally in English. It also
    avoids the ambiguity of English 'exiled' as either banishment or condition.
- source_word: מִירוּשָׁלַם
  chosen: from Jerusalem
  lexicon: HALOT
  rationale: Marks the place from which the deportation occurred.
- source_word: בָּבֶלָה
  chosen: to Babylon
  alternatives:
  - into Babylon
  lexicon: HALOT
  rationale: The directional ending indicates motion toward Babylon. 'To Babylon'
    is idiomatic and sufficient in English.
