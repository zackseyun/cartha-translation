theological_decisions:
- issue: Divine agency in the exile
  chosen_reading: Retain the first-person divine statement 'whom I have sent into
    exile' without softening it.
  alternative_readings:
  - whom I allowed to be taken into exile
  - whom Nebuchadnezzar took into exile
  rationale: The Hebrew explicitly attributes the deportation to the LORD's agency.
    The translation preserves this theological claim rather than diluting it into
    mere permission or shifting agency solely to Babylon.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering the covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the stated doctrinal default for YHWH while preserving the
    covenantal title in standard English Bible style.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
