id: JER.29.19
reference: Jeremiah 29:19
source:
  edition: WLC
  text: תַּ֛חַת אֲשֶֽׁר לֹא שָׁמְע֥וּ אֶל דְּבָרַ֖/י נְאֻם יְהוָ֑ה אֲשֶׁר֩ שָׁלַ֨חְתִּי אֲלֵי/הֶ֜ם אֶת עֲבָדַ֤/י הַ/נְּבִאִים֙ הַשְׁכֵּ֣ם וְ/שָׁלֹ֔חַ וְ/לֹ֥א שְׁמַעְתֶּ֖ם נְאֻם יְהוָֽה־־־־־־׃
translation:
  text: because they did not listen to my words, declares Yahweh, which I sent to them by my servants the prophets, rising early and sending them, and you did not listen, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''rising early and sending them,'' an idiom expressing persistent, eager repetition; alternatively, ''persistently sending them.'''
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shifts from 'they did not listen' to 'you did not listen,' likely for rhetorical effect; the translation preserves this shift.
    reason: alternative_reading
lexical_decisions:
- source_word: תַּחַת אֲשֶׁר
  chosen: because
  alternatives:
  - because of the fact that
  - inasmuch as
  lexicon: HALOT
  rationale: In this causal construction, תַּחַת אֲשֶׁר introduces the reason for the judgment in the previous verse. 'Because' is natural English and preserves the causal force without unnecessary literalism.
- source_word: שָׁמְעוּ / שְׁמַעְתֶּם
  chosen: did not listen / did not listen
  alternatives:
  - did not hear
  - did not obey
  lexicon: HALOT
  rationale: שׁמע with אֶל commonly means 'listen to' in the sense of heeding. 'Listen' preserves the auditory-heeding nuance better than 'obey,' which would over-interpret, while 'hear' is too weak in English for the covenantal refusal implied.
- source_word: אֶל דְּבָרַי
  chosen: to my words
  alternatives:
  - to my word
  - to what I said
  lexicon: HALOT
  rationale: The plural construct with 1cs suffix is best rendered 'my words.' This keeps the concrete plurality of divine utterances rather than flattening to singular 'word.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is idiomatically rendered 'declares the LORD' in contemporary English. It preserves the solemn prophetic register. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שָׁלַחְתִּי אֲלֵיהֶם
  chosen: I sent to them
  alternatives:
  - I sent them
  - I sent against them
  lexicon: HALOT
  rationale: The preposition אֶל indicates direction toward the recipients. 'I sent to them' is slightly more formal but accurately reflects the Hebrew syntax and avoids ambiguity about the object.
- source_word: אֶת עֲבָדַי הַנְּבִיאִים
  chosen: by my servants the prophets
  alternatives:
  - my servants the prophets
  - through my servants the prophets
  lexicon: HALOT
  rationale: English requires some mediation of how the words were sent. 'By my servants the prophets' naturally conveys agency/instrumentality and keeps both appositional nouns. 'Servants' is preferable here over 'slaves' because bonded status is not the salient point; commissioned service is.
- source_word: הַשְׁכֵּם וְשָׁלֹחַ
  chosen: rising early and sending them
  alternatives:
  - rising early and sending
  - persistently sending
  - sending again and again
  lexicon: HALOT
  rationale: This idiom in Jeremiah conveys Yahweh's eager, repeated initiative. A fairly literal rendering, 'rising early and sending them,' preserves the metaphor and rhetorical force better than the more interpretive 'persistently sending,' though that sense is present.
- source_word: וְלֹא שְׁמַעְתֶּם
  chosen: and you did not listen
  alternatives:
  - but you did not listen
  - and you did not obey
  lexicon: HALOT
  rationale: The shift to second person plural is retained because it is present in the Hebrew and rhetorically sharpens the accusation toward the audience. 'And' reflects the conjunction; English readers can still sense the adversative force from context.
