theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Retention of person shift from third person to second person
  chosen_reading: keep 'they did not listen' ... 'you did not listen'
  alternative_readings:
  - harmonize both clauses to third person
  - harmonize both clauses to second person
  rationale: The Masoretic text shifts from speaking about 'they' to directly addressing 'you.' Preserving this tension is preferable to smoothing it out, since the Hebrew likely uses the shift rhetorically to implicate the hearers directly.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
