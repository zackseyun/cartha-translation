id: JER.29.22
reference: Jeremiah 29:22
source:
  edition: WLC
  text: וְ/לֻקַּ֤ח מֵ/הֶם֙ קְלָלָ֔ה לְ/כֹל֙ גָּל֣וּת יְהוּדָ֔ה אֲשֶׁ֥ר בְּ/בָבֶ֖ל לֵ/אמֹ֑ר יְשִֽׂמְ/ךָ֤ יְהוָה֙ כְּ/צִדְקִיָּ֣הוּ וּ/כְ/אֶחָ֔ב אֲשֶׁר קָלָ֥/ם מֶֽלֶךְ בָּבֶ֖ל בָּ/אֵֽשׁ־־׃
translation:
  text: And from them a curse will be taken up by all the exiles of Judah who are in Babylon, saying, “May Yahweh make you like Zedekiah and like Ahab, whom the king of Babylon roasted in the fire.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burned them in the fire.' The Hebrew verb can be rendered more generally as 'burned,' though 'roasted' preserves its vivid force.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֻקַּח
  chosen: will be taken up
  alternatives:
  - will be taken
  - will be used
  lexicon: HALOT
  rationale: Passive of לקח here idiomatically introduces the adoption of a saying or formula. 'Will be taken up' preserves the passive and the sense that a curse-formula is derived from their example.
- source_word: קְלָלָה
  chosen: a curse
  alternatives:
  - a curse formula
  - an imprecation
  lexicon: HALOT
  rationale: The noun denotes a curse; in context it refers specifically to a formula invoked upon others. 'A curse' is natural English, with the formulaic sense clarified by the following quotation.
- source_word: לְכָל גָּלוּת יְהוּדָה אֲשֶׁר בְּבָבֶל
  chosen: by all the exiles of Judah who are in Babylon
  alternatives:
  - for all the exiles of Judah who are in Babylon
  - among all the exiles of Judah who are in Babylon
  lexicon: HALOT
  rationale: The phrase identifies the community that will use the curse. 'By all the exiles' best conveys agency in English, though the Hebrew preposition is לְ. 'Exiles of Judah' is preferable to the more abstract 'captivity of Judah' in modern English.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Standard introduction to direct speech; 'saying' is idiomatic in English biblical narrative.
- source_word: יְשִׂמְךָ יְהוָה
  chosen: May the LORD make you
  alternatives:
  - May the LORD set you
  - The LORD make you
  lexicon: HALOT
  rationale: The jussive-like use expresses a wish or imprecation. 'Make you' fits the curse formula naturally in English better than the more wooden 'set you.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כְּצִדְקִיָּהוּ וּכְאֶחָב
  chosen: like Zedekiah and like Ahab
  alternatives:
  - as Zedekiah and as Ahab
  lexicon: HALOT
  rationale: The repeated כ marks comparison in a curse formula. Retaining 'like ... and like ...' mirrors the Hebrew emphasis.
- source_word: קָלָם
  chosen: roasted them
  alternatives:
  - burned them
  - scorched them
  lexicon: HALOT
  rationale: The verb קלה in the Piel can mean roast/parch. Given the explicit phrase 'in the fire,' 'roasted' preserves the vivid, severe imagery better than the more generic 'burned.'
- source_word: בָּאֵשׁ
  chosen: in the fire
  alternatives:
  - with fire
  lexicon: HALOT
  rationale: The prefixed ב is most naturally rendered 'in' here, describing the means/location of execution.
