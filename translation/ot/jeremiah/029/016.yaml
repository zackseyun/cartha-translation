id: JER.29.16
reference: Jeremiah 29:16
source:
  edition: WLC
  text: כִּי כֹ֣ה אָמַ֣ר יְהוָ֗ה אֶל הַ/מֶּ֨לֶךְ֙ הַ/יּוֹשֵׁב֙ אֶל כִּסֵּ֣א דָוִ֔ד וְ/אֶל כָּל הָ/עָ֔ם הַ/יּוֹשֵׁ֖ב בָּ/עִ֣יר הַ/זֹּ֑את אֲחֵי/כֶ֕ם אֲשֶׁ֛ר לֹֽא יָצְא֥וּ אִתְּ/כֶ֖ם בַּ/גּוֹלָֽה־׀־־־־־׃
translation:
  text: For thus says Yahweh concerning the king who sits on the throne of David, and concerning all the people who dwell in this city—your brothers who did not go out with you into exile—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your kinsmen'; the Hebrew reads 'your brothers,' a masculine plural kinship term that may refer broadly to fellow Judeans.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation or continuation from the previous statement. 'For' fits the discourse flow in English and preserves the causal/explanatory force without over-specifying.
- source_word: כֹה אָמַר
  chosen: this is what ... says
  alternatives:
  - thus says
  - so says
  lexicon: HALOT
  rationale: This prophetic formula is idiomatically rendered in clear modern English as 'this is what ... says.' 'Thus says' is more formal/traditional, but the chosen rendering preserves meaning while improving readability.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: concerning
  alternatives:
  - to
  - about
  lexicon: HALOT
  rationale: Here אֶל introduces the subject matter of the divine declaration rather than direct address. 'Concerning' best captures the sense in English for both the king and the people.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Straightforward nominal rendering with the definite article preserved.
- source_word: הַיּוֹשֵׁב אֶל כִּסֵּא דָוִד
  chosen: who sits on the throne of David
  alternatives:
  - who sits upon David's throne
  - who is seated on the throne of David
  lexicon: HALOT
  rationale: The participle plus prepositional phrase identifies the reigning Davidic king. 'Sits on the throne of David' is natural English and preserves the dynastic reference.
- source_word: וְאֶל כָּל הָעָם
  chosen: and concerning all the people
  alternatives:
  - and to all the people
  lexicon: HALOT
  rationale: 'The repeated אֶל is best carried with the same sense as earlier: the oracle is about these people. ''All the people'' preserves כָּל.'
- source_word: הַיּוֹשֵׁב בָּעִיר הַזֹּאת
  chosen: who live in this city
  alternatives:
  - who dwell in this city
  - who are living in this city
  lexicon: HALOT
  rationale: 'Although the Hebrew participle is singular collective with הָעָם, English naturally renders the sense with plural agreement: ''people who live.'' ''Live'' is a readable equivalent for ''dwell'' without loss of meaning.'
- source_word: אֲחֵיכֶם
  chosen: your brothers
  alternatives:
  - your kinsmen
  - your brothers and sisters
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'your brothers.' Per doctrine, gender-accurate rendering is preferred. In context it refers to fellow Judeans/kinsmen, likely including the broader community, but the main text preserves the source form.
- source_word: אֲשֶׁר לֹא יָצְאוּ אִתְּכֶם
  chosen: who did not go out with you
  alternatives:
  - who did not depart with you
  - who were not taken out with you
  lexicon: HALOT
  rationale: יָצָא literally means 'go out.' In this context it refers to those who did not leave Jerusalem with the deportees. The active wording matches the Hebrew while remaining idiomatic.
- source_word: בַּגּוֹלָה
  chosen: into exile
  alternatives:
  - in the exile
  - into the deportation
  lexicon: HALOT
  rationale: The phrase denotes the state/event of deportation. 'Into exile' is idiomatic English and communicates the historical reality clearly.
