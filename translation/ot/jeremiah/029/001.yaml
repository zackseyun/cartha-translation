id: JER.29.1
reference: Jeremiah 29:1
source:
  edition: WLC
  text: וְ/אֵ֨לֶּה֙ דִּבְרֵ֣י הַ/סֵּ֔פֶר אֲשֶׁ֥ר שָׁלַ֛ח יִרְמְיָ֥ה הַ/נָּבִ֖יא מִ/ירוּשָׁלִָ֑ם
    אֶל יֶ֜תֶר זִקְנֵ֣י הַ/גּוֹלָ֗ה וְ/אֶל הַ/כֹּהֲנִ֤ים וְ/אֶל הַ/נְּבִיאִים֙ וְ/אֶל
    כָּל הָ/עָ֔ם אֲשֶׁ֨ר הֶגְלָ֧ה נְבֽוּכַדְנֶאצַּ֛ר מִ/ירוּשָׁלִַ֖ם בָּבֶֽלָ/ה־־־־־׃
translation:
  text: Now these are the words of the letter that Jeremiah the prophet sent from
    Jerusalem to the remaining elders of the exiles, and to the priests, the prophets,
    and all the people whom Nebuchadnezzar had carried away from Jerusalem to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the words of the scroll.' The Hebrew סֵפֶר can denote a written document
      more broadly; 'letter' is chosen because Jeremiah sent it to specific recipients.
    reason: lexical_alternative
  - marker: b
    text: Or 'the rest of the elders of the exile.' The Hebrew may refer either to
      the remaining elders among the deported community or, more abstractly, to the
      exile community itself.
    reason: lexical_alternative
  - marker: c
    text: Or 'whom Nebuchadnezzar had exiled' / 'had deported.'
    reason: lexical_alternative
  - marker: d
    text: 'Hebrew: ''Nebuchadnezzar''; some English traditions use ''Nebuchadrezzar''
      in Jeremiah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  chosen: Now these are
  alternatives:
  - And these are
  - These are
  lexicon: HALOT
  rationale: The conjunction plus demonstrative introduces a new section while linking
    to what precedes. 'Now these are' gives natural English discourse flow without
    losing the connective force.
- source_word: דִּבְרֵי הַסֵּפֶר
  chosen: the words of the letter
  alternatives:
  - the words of the scroll
  - the words of the book/document
  lexicon: HALOT
  rationale: סֵפֶר can denote a written document, scroll, book, or letter depending
    on context. Because the text immediately says Jeremiah 'sent' it from Jerusalem
    to the exiles, 'letter' best matches the communicative function in context. 'Words
    of the letter' preserves the Hebrew construct expression.
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: Standard rendering for the verb in epistolary context.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: A straightforward title identifying Jeremiah's role; translated rather
    than transliterated per philosophy.
- source_word: מִירוּשָׁלִָם
  chosen: from Jerusalem
  lexicon: HALOT
  rationale: Simple source-location prepositional phrase.
- source_word: יֶתֶר זִקְנֵי הַגּוֹלָה
  chosen: the remaining elders of the exiles
  alternatives:
  - the rest of the elders of the exile
  - the remnant of the elders of the deportation
  lexicon: HALOT
  rationale: יֶתֶר means what remains/rest. הַגּוֹלָה can denote the exile as a state
    or the exiled community. Here the recipients are persons, so 'the exiles' is more
    natural than the abstract 'the exile.' 'Remaining' preserves the sense that some
    elders were left after prior events, without overinterpreting why.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering.
- source_word: הַנְּבִיאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Standard rendering; refers to prophetic figures among the deported community.
- source_word: כָּל הָעָם
  chosen: all the people
  alternatives:
  - all the people of the exile
  - all the populace
  lexicon: HALOT
  rationale: Natural rendering of the collective expression, broadening the recipients
    beyond leaders.
- source_word: אֲשֶׁר הֶגְלָה
  chosen: whom ... had carried away
  alternatives:
  - whom ... had exiled
  - whom ... had deported
  lexicon: HALOT
  rationale: The Hiphil of גלה means to cause to go into exile, deport, or carry away.
    'Had carried away' is idiomatic and vivid in English, while still conveying forced
    removal. 'Had' reflects the prior action relative to the sending of the letter.
- source_word: נְבוּכַדְנֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: Standard English transliteration. The Hebrew form here more closely reflects
    'Nebuchadnezzar,' the conventional English spelling.
- source_word: בָּבֶלָה
  chosen: to Babylon
  lexicon: HALOT
  rationale: Directional ending on the place name indicates motion toward Babylon;
    rendered with 'to Babylon'.
