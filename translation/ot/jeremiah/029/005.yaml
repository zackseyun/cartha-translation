id: JER.29.5
reference: Jeremiah 29:5
source:
  edition: WLC
  text: בְּנ֥וּ בָתִּ֖ים וְ/שֵׁ֑בוּ וְ/נִטְע֣וּ גַנּ֔וֹת וְ/אִכְל֖וּ אֶת פִּרְיָֽ/ן־׃
translation:
  text: Build houses and live in them; plant gardens and eat their fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwell in them.' The Hebrew verb can denote settled residence.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנ֥וּ
  chosen: Build
  alternatives:
  - Build for yourselves
  lexicon: HALOT
  rationale: Qal imperative plural of בנה, a straightforward command to construct.
    English imperative 'Build' best matches the force without adding unnecessary reflexive
    nuance.
- source_word: בָתִּ֖ים
  chosen: houses
  alternatives:
  - homes
  lexicon: HALOT
  rationale: Literal plural of בית. 'Houses' preserves the concrete sense of dwellings;
    'homes' would add a warmer connotation not explicit in the Hebrew.
- source_word: וְשֵׁבוּ
  chosen: live in them
  alternatives:
  - dwell in them
  - settle down in them
  lexicon: HALOT
  rationale: From ישב, which can mean sit, dwell, remain, or live. In context with
    houses, 'live in them' is idiomatic modern English and captures the intended settled
    habitation. 'Dwell' is more formal; 'settle down' is interpretive and slightly
    expands the sense.
- source_word: וְנִטְעוּ
  chosen: plant
  alternatives:
  - set out
  lexicon: HALOT
  rationale: Qal imperative plural of נטע, the normal verb for planting. 'Plant' is
    the direct and natural rendering.
- source_word: גַנּוֹת
  chosen: gardens
  alternatives:
  - orchards
  lexicon: HALOT
  rationale: Plural of גן, commonly 'garden.' Because the next clause speaks of eating
    fruit, some might think of orchards, but the Hebrew term itself is broader; 'gardens'
    keeps the lexical value while allowing fruit-bearing cultivation.
- source_word: וְאִכְלוּ
  chosen: eat
  alternatives:
  - consume
  lexicon: HALOT
  rationale: Qal imperative plural of אכל. 'Eat' is the plain and natural equivalent.
- source_word: אֶת פִּרְיָן
  chosen: their fruit
  alternatives:
  - the fruit of them
  - their produce
  lexicon: HALOT
  rationale: פְּרִי means fruit/produce, with 3fp suffix referring back to the feminine
    plural 'gardens.' 'Their fruit' is the most natural English rendering. 'Produce'
    is possible but broader and less concrete; 'fruit' preserves the agricultural
    imagery.
