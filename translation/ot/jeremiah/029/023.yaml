id: JER.29.23
reference: Jeremiah 29:23
source:
  edition: WLC
  text: יַ֡עַן אֲשֶׁר֩ עָשׂ֨וּ נְבָלָ֜ה בְּ/יִשְׂרָאֵ֗ל וַ/יְנַֽאֲפוּ֙ אֶת נְשֵׁ֣י
    רֵֽעֵי/הֶ֔ם וַ/יְדַבְּר֨וּ דָבָ֤ר בִּ/שְׁמִ/י֙ שֶׁ֔קֶר אֲשֶׁ֖ר ל֣וֹא צִוִּיתִ֑/ם
    וְ/אָנֹכִ֛י הו ידע וָ/עֵ֖ד נְאֻם יְהוָֽה־־׃ס
translation:
  text: because they have committed an outrageous act in Israel, and have committed
    adultery with their neighbors’ wives, and have spoken in my name a lie that I
    did not command them. And I am the one who knows and is a witness, declares the
    LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have done a disgraceful thing' or 'have committed folly.' The Hebrew
      נְבָלָה denotes a morally outrageous, disgraceful act.
    reason: lexical_alternative
  - marker: b
    text: Or 'among Israel.'
    reason: lexical_alternative
  - marker: c
    text: 'Or ''And I know, and I am witness.'' The Hebrew is emphatic: ''And I, I
      am he who knows and is witness.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  chosen: because
  alternatives:
  - for that
  - because that
  lexicon: HALOT
  rationale: The compound introduces the reason for the judgment in the previous verse.
    Simple 'because' is natural English and preserves the causal force.
- source_word: עָשׂוּ נְבָלָה
  chosen: have committed an outrageous act
  alternatives:
  - have done a disgraceful thing
  - have committed folly
  - have committed a vile thing
  lexicon: HALOT
  rationale: נְבָלָה denotes a disgraceful, outrageous, morally scandalous act, often
    with sexual or covenantal offense in view. 'Outrageous act' preserves the moral
    shock better than the weaker 'folly.'
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - among Israel
  lexicon: HALOT
  rationale: The preposition ב is most straightforwardly locative here. 'In Israel'
    is idiomatic and can carry the communal setting without overinterpreting.
- source_word: וַיְנַאֲפוּ
  chosen: have committed adultery
  alternatives:
  - have been adulterous
  lexicon: HALOT
  rationale: The verb נאף specifically denotes adultery. The perfective sense in English
    is well conveyed by 'have committed adultery' in this causal clause.
- source_word: אֶת נְשֵׁי רֵעֵיהֶם
  chosen: with their neighbors’ wives
  alternatives:
  - with the wives of their companions
  - their fellows' wives
  lexicon: HALOT
  rationale: Though אֶת marks the object, English idiom with 'commit adultery' requires
    'with.' רֵעַ here refers to fellow/community member rather than intimate friend
    specifically; 'neighbors' is the clearest natural rendering.
- source_word: וַיְדַבְּרוּ דָבָר
  chosen: have spoken
  alternatives:
  - have said a word
  - have spoken a matter
  lexicon: HALOT
  rationale: The cognate construction intensifies the verbal act but is not naturally
    reproduced in English. 'Have spoken' captures the action without wooden redundancy.
- source_word: בִּשְׁמִי
  chosen: in my name
  alternatives:
  - under my name
  lexicon: HALOT
  rationale: Standard idiom for claiming divine authorization or representation.
- source_word: שֶׁקֶר
  chosen: a lie
  alternatives:
  - falsehood
  lexicon: HALOT
  rationale: Singular 'a lie' works naturally with 'spoken in my name' and preserves
    the concrete accusation of false prophecy.
- source_word: אֲשֶׁר לֹא צִוִּיתִם
  chosen: that I did not command them
  alternatives:
  - which I had not commanded them
  lexicon: HALOT
  rationale: This directly states lack of divine authorization. 'Did not command'
    is clear modern English and preserves the prophetic-commission context.
- source_word: וְאָנֹכִי הוּא יֹדֵעַ וָעֵד
  chosen: And I am the one who knows and is a witness
  alternatives:
  - And I know, and I am witness
  - And I myself know and testify
  lexicon: HALOT
  rationale: The Hebrew emphasizes the subject with אָנֹכִי הוּא and pairs participial/predicative
    expressions of knowledge and witness. 'I am the one who knows and is a witness'
    preserves the emphatic self-identification and forensic tone better than a flattened
    paraphrase.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. Per doctrine, יְהוָה is rendered
    'the LORD.' 'Declares' fits modern readable English while retaining prophetic
    solemnity.
