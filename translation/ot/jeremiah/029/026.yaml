id: JER.29.26
reference: Jeremiah 29:26
source:
  edition: WLC
  text: יְהוָ֞ה נְתָנְ/ךָ֣ כֹהֵ֗ן תַּ֚חַת יְהוֹיָדָ֣ע הַ/כֹּהֵ֔ן לִֽ/הְי֤וֹת פְּקִדִים֙
    בֵּ֣ית יְהוָ֔ה לְ/כָל אִ֥ישׁ מְשֻׁגָּ֖ע וּ/מִתְנַבֵּ֑א וְ/נָתַתָּ֥ה אֹת֛/וֹ אֶל
    הַ/מַּהְפֶּ֖כֶת וְ/אֶל הַ/צִּינֹֽק־־־׃
translation:
  text: The LORD has made you priest in place of Jehoiada the priest, to be overseers
    in the house of the LORD over every man who is mad and acts as a prophet, and
    you should put him into the stocks and the neck iron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be officers' or 'to be supervisors'; the Hebrew has a plural noun
      ('overseers/officers') even though the addressee is singular.
    reason: lexical_alternative
  - marker: b
    text: Or 'prophesies'; the Hebrew participle can be rendered more neutrally, but
      the main text reflects the hostile tone of the speaker.
    reason: alternative_reading
  - marker: c
    text: The exact meaning of 'the neck iron' is uncertain; it likely refers to an
      iron restraint or collar used with the stocks.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH per
    DOCTRINE.md, preserving Jewish reverence tradition and standard English Bible
    convention.
- source_word: נְתָנְךָ
  chosen: has made you
  alternatives:
  - has given you
  - appointed you
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in this construction with a role ('priest')
    it idiomatically means appointing or making someone such. 'Has made you' is natural
    English and preserves the resultative sense.
- source_word: כֹהֵן
  chosen: priest
  lexicon: HALOT
  rationale: Standard rendering of כהן in cultic context.
- source_word: תַּחַת
  chosen: in place of
  alternatives:
  - instead of
  - under
  lexicon: HALOT
  rationale: Here the preposition marks succession/replacement relative to Jehoiada,
    not subordination. 'In place of' best conveys office succession.
- source_word: יְהוֹיָדָע
  chosen: Jehoiada
  rationale: Personal names are transliterated by standard convention per project
    philosophy.
- source_word: לִהְיוֹת פְּקִדִים
  chosen: to be overseers
  alternatives:
  - to be officers
  - to be supervisors
  lexicon: HALOT
  rationale: פקידים is morphologically plural though addressed to a singular 'you.'
    This likely reflects an abstract/collective office function or textual idiom.
    'Overseers' captures supervisory responsibility in the temple context better than
    the more generic 'officers.' The plural is retained in English to reflect the
    Hebrew form, even though it creates slight tension with the singular addressee.
- source_word: בֵּית יְהוָה
  chosen: the house of the LORD
  alternatives:
  - the temple of the LORD
  lexicon: HALOT
  rationale: More formally preserves the Hebrew idiom 'house of the LORD,' while still
    clearly referring to the temple.
- source_word: לְכָל אִישׁ
  chosen: over every man
  alternatives:
  - concerning every man
  - against every man
  lexicon: HALOT
  rationale: The phrase defines the scope of oversight/jurisdiction. 'Every man' preserves
    the singular masculine איש in line with the project's gender-accurate policy.
- source_word: מְשֻׁגָּע
  chosen: is mad
  alternatives:
  - is insane
  - is crazed
  lexicon: HALOT
  rationale: The term is a hostile characterization meaning mad/crazy. 'Is mad' is
    concise, idiomatic, and preserves the insulting force without overmodernizing.
- source_word: וּמִתְנַבֵּא
  chosen: acts as a prophet
  alternatives:
  - prophesies
  - behaves like a prophet
  lexicon: HALOT
  rationale: In context the speaker is hostile toward Jeremiah and similar figures,
    so a more neutral 'prophesies' could sound like endorsement. 'Acts as a prophet'
    preserves the participial sense while reflecting the accusatory tone.
- source_word: וְנָתַתָּה אֹתוֹ
  chosen: and you should put him
  alternatives:
  - and you shall put him
  - and place him
  lexicon: HALOT
  rationale: The qatal with prefixed waw here functions in instruction/result sequence.
    'You should put him' conveys expected official action in contemporary English
    without sounding overly wooden.
- source_word: הַמַּהְפֶּכֶת
  chosen: the stocks
  alternatives:
  - the torture rack
  lexicon: HALOT
  rationale: This term denotes a restraining device used for punishment; 'stocks'
    is the conventional and sufficiently clear rendering. A harsher gloss like 'torture
    rack' is possible in some contexts but is less certain here.
- source_word: הַצִּינֹק
  chosen: the neck iron
  alternatives:
  - the collar
  - the iron collar
  - the pillory
  lexicon: HALOT
  rationale: The exact device is somewhat uncertain, but it likely refers to an iron
    restraint, probably for the neck. 'Neck iron' is transparent and avoids overcommitting
    to a more specific instrument.
