theological_decisions:
- issue: Rendering the hostile description of prophetic behavior
  chosen_reading: acts as a prophet
  alternative_readings:
  - prophesies
  rationale: The verse is part of a hostile letter urging punishment of Jeremiah.
    Rendering מתנבא as 'acts as a prophet' preserves the speaker's dismissive perspective
    without making a theological judgment that Jeremiah was not truly prophesying.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Gender rendering of אִישׁ
  chosen_reading: every man
  alternative_readings:
  - everyone
  - every person
  rationale: The Hebrew uses the masculine singular איש. Per project policy, gender-accurate
    rendering is preferred where it matches the source's intent; here the phrase is
    generic in scope but grammatically masculine, so 'every man' best reflects the
    form.
  doctrine_reference: Gender-accurate over gender-neutral.
