id: JER.29.10
reference: Jeremiah 29:10
source:
  edition: WLC
  text: כִּֽי כֹה֙ אָמַ֣ר יְהוָ֔ה כִּ֠י לְ/פִ֞י מְלֹ֧את לְ/בָבֶ֛ל שִׁבְעִ֥ים שָׁנָ֖ה אֶפְקֹ֣ד אֶתְ/כֶ֑ם וַ/הֲקִמֹתִ֤י עֲלֵי/כֶם֙ אֶת דְּבָרִ֣/י הַ/טּ֔וֹב לְ/הָשִׁ֣יב אֶתְ/כֶ֔ם אֶל הַ/מָּק֖וֹם הַ/זֶּֽה־־־׃
translation:
  text: 'For this is what Yahweh says: When seventy years for Babylon are completed, I will attend to you and fulfill my good word to you, to bring you back to this place.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will visit you.' The Hebrew verb can mean to turn attention toward someone, whether for judgment or for care; here the context is favorable.
    reason: lexical_alternative
  - marker: b
    text: Or 'and confirm/establish my good word to you.' The expression refers to carrying out what the LORD had promised.
    reason: lexical_alternative
  - marker: c
    text: Literally 'when seventy years for Babylon are completed.' This may refer to the period appointed in connection with Babylon.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name while following established English convention.
- source_word: כִּי כֹה אָמַר
  chosen: For this is what ... says
  alternatives:
  - For thus says ...
  - Because this is what ... says
  lexicon: HALOT
  rationale: This idiom introduces a divine declaration. 'This is what ... says' is natural modern English while remaining close to the Hebrew formula.
- source_word: כִּי לְפִי מְלֹאת לְבָבֶל שִׁבְעִים שָׁנָה
  chosen: When seventy years for Babylon are completed
  alternatives:
  - When seventy years are completed for Babylon
  - After seventy years for Babylon are fulfilled
  - When Babylon's seventy years are completed
  lexicon: HALOT
  rationale: לְפִי מְלֹאת conveys the completion/full measure of a period. The phrase most naturally means the completion of seventy years connected with Babylon. 'For Babylon' preserves the Hebrew relation without over-interpreting it as either Babylon's dominance or the exiles' stay, both of which are interpretive expansions.
- source_word: אֶפְקֹד אֶתְכֶם
  chosen: I will attend to you
  alternatives:
  - I will visit you
  - I will come to you
  - I will take note of you
  lexicon: HALOT
  rationale: פקד often carries the sense of turning attention toward someone, whether for blessing or judgment. Here the context is restorative, so 'attend to you' communicates favorable divine intervention more clearly than the archaic-sounding 'visit you,' while avoiding paraphrase.
- source_word: וַהֲקִמֹתִי עֲלֵיכֶם אֶת דְּבָרִי הַטּוֹב
  chosen: and fulfill my good word to you
  alternatives:
  - and establish my good word over you
  - and confirm my good promise to you
  - and carry out my good word for you
  lexicon: HALOT
  rationale: הקים with דבר means to establish or carry out a spoken promise. 'Fulfill' best captures the idiomatic sense in English. 'Good word' is retained rather than replacing it entirely with 'promise,' preserving the Hebrew wording while still reading naturally.
- source_word: לְהָשִׁיב אֶתְכֶם
  chosen: to bring you back
  alternatives:
  - to restore you
  - to return you
  lexicon: HALOT
  rationale: 'The Hiphil of שוב here is causative: causing the people to return. ''Bring you back'' is idiomatic and makes the causative force explicit.'
- source_word: אֶל הַמָּקוֹם הַזֶּה
  chosen: to this place
  alternatives:
  - to this המקום
  - to this land
  lexicon: HALOT
  rationale: מקום is specifically 'place,' not necessarily the broader 'land.' In context it refers to the place from which they were exiled, likely Jerusalem/Judah, but the translation should not narrow beyond the Hebrew term.
