theological_decisions:
- issue: Reference of the seventy years associated with Babylon
  chosen_reading: Rendered neutrally as 'seventy years for Babylon' without specifying whether this means Babylon's period of dominance or the duration of the exile.
  alternative_readings:
  - '''seventy years at Babylon'''
  - '''Babylon''s seventy years'''
  rationale: The Hebrew construction allows association with Babylon but does not require the translator to resolve the historical interpretation in the main text. Preserving the broader phrasing maintains the text's ambiguity rather than importing a specific chronology.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
