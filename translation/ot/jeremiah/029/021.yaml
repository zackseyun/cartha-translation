theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by doctrine's contested terms table for YHWH.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the judgment verb וְהִכָּם
  chosen_reading: and he will strike them down
  alternative_readings:
  - and he will strike them
  - and he will kill them
  rationale: The verse announces divine judgment through Babylon. The Hebrew verb itself does not require an explicit 'kill' gloss, though the context points toward severe, likely fatal punishment. The chosen rendering preserves the gravity without importing more specificity than the verb demands.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; do not import doctrinal claims the text does not make'
