id: JER.29.21
reference: Jeremiah 29:21
source:
  edition: WLC
  text: כֹּֽה אָמַר֩ יְהוָ֨ה צְבָא֜וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֗ל אֶל אַחְאָ֤ב בֶּן קֽוֹלָיָה֙ וְ/אֶל צִדְקִיָּ֣הוּ בֶן מַֽעֲשֵׂיָ֔ה הַֽ/נִּבְּאִ֥ים לָ/כֶ֛ם בִּ/שְׁמִ֖/י שָׁ֑קֶר הִנְ/נִ֣י נֹתֵ֣ן אֹתָ֗/ם בְּ/יַד֙ נְבֽוּכַדְרֶאצַּ֣ר מֶֽלֶךְ בָּבֶ֔ל וְ/הִכָּ֖/ם לְ/עֵינֵי/כֶֽם־־־־־׀־׃
translation:
  text: 'Thus says Yahweh of hosts, the God of Israel, concerning Ahab son of Kolaiah and Zedekiah son of Maaseiah, who are prophesying a lie to you in my name: Behold, I am giving them into the hand of Nebuchadnezzar king of Babylon, and he will strike them down before your eyes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew spelling: ''Nebuchadrezzar''; English convention commonly renders the name as ''Nebuchadnezzar.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'Thus says' preserves the formal prophetic cadence without sounding archaic beyond normal biblical English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the established and sufficiently transparent rendering, preserving the divine warrior/sovereign nuance without over-specifying military imagery.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying Israel's covenant God.
- source_word: אֶל
  chosen: concerning
  alternatives:
  - against
  - to
  lexicon: HALOT
  rationale: Here אֶל introduces the persons about whom the oracle is spoken, not direct address to them. 'Concerning' best fits the syntax and discourse context.
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: Formal genealogical identification is retained.
- source_word: הַנִּבְּאִים
  chosen: who are prophesying
  alternatives:
  - who prophesy
  lexicon: HALOT
  rationale: The participle conveys ongoing activity; English progressive captures the present, continuing force in context.
- source_word: לָכֶם
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: Marks the exilic audience as the recipients of the false prophecy.
- source_word: בִּשְׁמִי
  chosen: in my name
  alternatives:
  - under my name
  lexicon: HALOT
  rationale: Standard idiom for claiming divine authorization.
- source_word: שָׁקֶר
  chosen: a lie
  alternatives:
  - falsely
  - falsehood
  lexicon: HALOT
  rationale: Predicate/object sense after 'prophesying' is best represented by 'a lie'—they are proclaiming falsehood, not merely speaking inaccurately.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - See, I am
  - Indeed, I am
  lexicon: HALOT
  rationale: Preserves the emphatic divine announcement formula. 'Behold' remains natural enough here and signals solemnity.
- source_word: נֹתֵן אֹתָם בְּיַד
  chosen: giving them into the hand of
  alternatives:
  - delivering them into the hand of
  - handing them over to
  lexicon: HALOT
  rationale: This idiom commonly denotes delivering someone into another's power. 'Giving ... into the hand of' preserves the Hebrew image while remaining intelligible.
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: Standard English transliteration is preferred for readability, though the Hebrew spelling here more closely reflects 'Nebuchadrezzar.'
- source_word: וְהִכָּם
  chosen: and he will strike them down
  alternatives:
  - and he will strike them
  - and he will kill them
  lexicon: HALOT
  rationale: נכה can mean strike/smite and in context likely implies lethal judgment. 'Strike them down' communicates the force and probable result without overstating beyond the verb itself.
- source_word: לְעֵינֵיכֶם
  chosen: before your eyes
  alternatives:
  - in your sight
  lexicon: HALOT
  rationale: Idiomatic English equivalent preserving the public, witnessed nature of the judgment.
