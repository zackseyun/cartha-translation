id: JER.29.2
reference: Jeremiah 29:2
source:
  edition: WLC
  text: אַחֲרֵ֣י צֵ֣את יְכָנְיָֽה הַ֠/מֶּלֶךְ וְ/הַ/גְּבִירָ֨ה וְ/הַ/סָּרִיסִ֜ים שָׂרֵ֨י
    יְהוּדָ֧ה וִ/ירוּשָׁלִַ֛ם וְ/הֶ/חָרָ֥שׁ וְ/הַ/מַּסְגֵּ֖ר מִ/ירוּשָׁלִָֽם־׃
translation:
  text: after King Jeconiah, the queen mother, the court officials, the officials
    of Judah and Jerusalem, and the craftsmen and the metalworkers had gone out from
    Jerusalem—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the eunuchs” for “the court officials”; the Hebrew term can refer either
      to eunuchs specifically or more broadly to royal officials.
    reason: lexical_alternative
  - marker: b
    text: Or “the princes of Judah and Jerusalem.”
    reason: lexical_alternative
  - marker: c
    text: Or “the smiths” for “the metalworkers.”
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - following
  lexicon: HALOT
  rationale: Temporal preposition introducing the time reference for the letter mentioned
    in the surrounding context.
- source_word: צֵאת
  chosen: had gone out
  alternatives:
  - went out
  - the departure of
  lexicon: HALOT
  rationale: Infinitive construct of יצא with a following subject list; rendered as
    a finite past perfect in English to fit the temporal clause naturally and reflect
    prior action relative to v.1.
- source_word: יְכָנְיָה
  chosen: Jeconiah
  alternatives:
  - Jechoniah
  - Coniah
  lexicon: HALOT
  rationale: Standard English transliteration of the personal name in this form; preserves
    the Hebrew name rather than harmonizing to another variant used elsewhere.
- source_word: הַמֶּלֶךְ
  chosen: King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: Appositional title to Jeconiah. English idiom normally places the title
    before the name without the article.
- source_word: הַגְּבִירָה
  chosen: the queen mother
  alternatives:
  - the lady
  - the queen
  lexicon: HALOT
  rationale: גבירה in royal context commonly denotes the king's mother as a court
    title, not merely a generic noblewoman. 'Queen mother' best conveys the institutional
    role.
- source_word: הַסָּרִיסִים
  chosen: the court officials
  alternatives:
  - the eunuchs
  - the officials
  lexicon: HALOT
  rationale: While סריסים can denote eunuchs, in many royal-administrative contexts
    it refers more broadly to palace or court officials. Here the administrative sense
    is likely primary, so 'court officials' communicates the function without overcommitting
    to physical status.
- source_word: שָׂרֵי יְהוּדָה וִירוּשָׁלַם
  chosen: the officials of Judah and Jerusalem
  alternatives:
  - the princes of Judah and Jerusalem
  - the leaders of Judah and Jerusalem
  lexicon: HALOT
  rationale: שׂרים are ruling officials/leaders. 'Officials' fits the governmental
    context and avoids the potentially misleading aristocratic nuance of 'princes'
    in modern English.
- source_word: הֶחָרָשׁ
  chosen: the craftsmen
  alternatives:
  - the artisans
  - the smiths
  lexicon: HALOT
  rationale: חרש can denote a craftsman broadly. Because the next term likely narrows
    another skilled trade, a broader rendering here preserves the pair without collapsing
    them into one category.
- source_word: הַמַּסְגֵּר
  chosen: the metalworkers
  alternatives:
  - the smiths
  - the locksmiths
  lexicon: HALOT
  rationale: The term likely refers to smiths or metalworkers, traditionally paired
    with craftsmen in deportation lists. 'Metalworkers' is clear modern English and
    avoids the overly narrow 'locksmiths'.
- source_word: מִירוּשָׁלָם
  chosen: from Jerusalem
  lexicon: HALOT
  rationale: Marks the place from which the listed persons departed/deported.
