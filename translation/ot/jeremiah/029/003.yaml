id: JER.29.3
reference: Jeremiah 29:3
source:
  edition: WLC
  text: בְּ/יַד֙ אֶלְעָשָׂ֣ה בֶן שָׁפָ֔ן וּ/גְמַרְיָ֖ה בֶּן חִלְקִיָּ֑ה אֲשֶׁ֨ר שָׁלַ֜ח
    צִדְקִיָּ֣ה מֶֽלֶךְ יְהוּדָ֗ה אֶל נְבוּכַדְנֶאצַּ֛ר מֶ֥לֶךְ בָּבֶ֖ל בָּבֶ֥לָ/ה
    לֵ/אמֹֽר־־־־׃ס
translation:
  text: 'by the hand of Elasah son of Shaphan and Gemariah son of Hilkiah, whom Zedekiah
    king of Judah sent to Nebuchadnezzar king of Babylon, to Babylon, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'by the hand of,' an idiom meaning 'through' or 'by means of' these
      messengers.
    reason: lexical_alternative
  - marker: b
    text: The name is commonly spelled 'Nebuchadnezzar' in English; a form closer
      to the Hebrew in Jeremiah is 'Nebuchadrezzar.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּיָד
  chosen: by the hand of
  alternatives:
  - by
  - through
  lexicon: HALOT
  rationale: The idiom בְּיַד commonly marks agency or instrumentality, especially
    for a message carried by envoys. 'By the hand of' preserves the Hebrew idiom while
    remaining intelligible in English; simpler 'by' or 'through' are possible but
    less transparent to the source wording.
- source_word: אֶלְעָשָׂה
  chosen: Elasah
  alternatives:
  - Eleasah
  rationale: Personal name transliterated according to standard English convention,
    following the translation philosophy to transliterate names rather than translate
    them.
- source_word: בֶן
  chosen: son of
  lexicon: HALOT
  rationale: Standard genealogical marker; 'son of' is the natural and formally accurate
    rendering in this context.
- source_word: שָׁפָן
  chosen: Shaphan
  rationale: Proper name transliterated.
- source_word: וּגְמַרְיָה
  chosen: and Gemariah
  rationale: Conjunction plus proper name; rendered straightforwardly with transliteration.
- source_word: חִלְקִיָּה
  chosen: Hilkiah
  alternatives:
  - Hilqiah
  rationale: Proper name transliterated by standard English biblical convention.
- source_word: אֲשֶׁר
  chosen: whom
  alternatives:
  - which
  - that
  lexicon: HALOT
  rationale: Relative pronoun referring to the two named messengers. 'Whom' fits the
    personal antecedent and the object function in English.
- source_word: שָׁלַח
  chosen: sent
  alternatives:
  - dispatched
  lexicon: HALOT
  rationale: The common verb for sending. 'Sent' is the plain and sufficient rendering;
    'dispatched' is possible but unnecessarily marked.
- source_word: צִדְקִיָּה
  chosen: Zedekiah
  rationale: Proper name transliterated by standard convention.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Construct chain rendered directly and idiomatically.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition; 'to' is natural modern English.
- source_word: נְבוּכַדְנֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  rationale: The Hebrew form here more closely reflects 'Nebuchadnezzar' in common
    English Bible usage, though 'Nebuchadrezzar' is also defensible in Jeremiah. The
    standard English form aids readability while remaining recognizably tied to the
    source name.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: Construct chain rendered directly.
- source_word: בָּבֶלָה
  chosen: to Babylon
  alternatives:
  - Babylonward
  lexicon: HALOT
  rationale: The directional he on בבל indicates motion toward Babylon. Rendering
    it explicitly as 'to Babylon' preserves the sense. Although this repeats the prior
    'king of Babylon,' the repetition is present in Hebrew and should be retained
    rather than smoothed away.
- source_word: לֵאמֹר
  chosen: 'saying:'
  alternatives:
  - 'thus:'
  - 'with this message:'
  lexicon: HALOT
  rationale: Standard formula introducing the content of the message in the following
    verse. 'Saying:' preserves the formal linkage cleanly.
