id: JER.29.18
reference: Jeremiah 29:18
source:
  edition: WLC
  text: וְ/רָֽדַפְתִּי֙ אַֽחֲרֵי/הֶ֔ם בַּ/חֶ֖רֶב בָּ/רָעָ֣ב וּ/בַ/דָּ֑בֶר וּ/נְתַתִּ֨י/ם
    ל/זועה לְ/כֹ֣ל מַמְלְכ֣וֹת הָ/אָ֗רֶץ לְ/אָלָ֤ה וּ/לְ/שַׁמָּה֙ וְ/לִ/שְׁרֵקָ֣ה
    וּ/לְ/חֶרְפָּ֔ה בְּ/כָל הַ/גּוֹיִ֖ם אֲשֶׁר הִדַּחְתִּ֥י/ם שָֽׁם׀־־׃
translation:
  text: And I will pursue them with the sword, with famine, and with pestilence, and
    I will make them a horror to all the kingdoms of the earth, a curse, a desolation,
    an object of hissing, and a reproach among all the nations where I have driven
    them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a terror.' The Hebrew term can denote horror, terror, or trembling;
      here it describes becoming an object of dread before the kingdoms.
    reason: lexical_alternative
  - marker: b
    text: Or 'a hissing'—that is, an object of derision marked by scornful hissing
      or whistling.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָדַפְתִּי אַחֲרֵיהֶם
  chosen: And I will pursue them
  alternatives:
  - And I will chase after them
  - And I will persecute them
  lexicon: HALOT
  rationale: רדף with אַחֲרֵי commonly means to pursue/chase after. 'Pursue' is idiomatic
    and preserves the active, relentless sense without importing the narrower English
    sense of 'persecute'.
- source_word: בַּחֶרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: חֶרֶב here is part of the standard judgment triad 'sword, famine, pestilence.'
    'With the sword' fits the repeated instrumental ב and keeps the concrete image.
- source_word: בָּרָעָב
  chosen: with famine
  alternatives:
  - by famine
  - with hunger
  lexicon: HALOT
  rationale: רָעָב in prophetic judgment contexts is conventionally 'famine.' This
    is clearer and more idiomatic than 'hunger' for a national calamity.
- source_word: וּבַדָּבֶר
  chosen: and with pestilence
  alternatives:
  - and with plague
  - and with disease
  lexicon: HALOT
  rationale: דֶּבֶר often denotes epidemic disease as covenant judgment. 'Pestilence'
    preserves the formal prophetic register and matches the recurring triad in Jeremiah.
- source_word: וּנְתַתִּים לְזַוֲעָה
  chosen: and I will make them a horror
  alternatives:
  - and I will make them a terror
  - and I will give them over to trembling
  lexicon: HALOT
  rationale: The phrase means to set/make them into an object of horror or terror.
    'A horror' best fits the following list of public disgrace formulas and is common
    in prophetic English.
- source_word: לְכֹל מַמְלְכוֹת הָאָרֶץ
  chosen: to all the kingdoms of the earth
  alternatives:
  - for all the kingdoms of the earth
  - among all the kingdoms of the earth
  lexicon: HALOT
  rationale: 'The lamed marks result/reference: they become an object of horror in
    relation to all the kingdoms. ''To all the kingdoms of the earth'' is a natural
    rendering and preserves the broad scope.'
- source_word: לְאָלָה
  chosen: a curse
  alternatives:
  - an oath-curse
  lexicon: HALOT
  rationale: אָלָה often refers to a curse, sometimes specifically an oath-curse.
    Here in a list of disgrace terms, 'a curse' is the clearest concise rendering;
    the more technical nuance is possible but not required by context.
- source_word: וּלְשַׁמָּה
  chosen: a desolation
  alternatives:
  - an appalling thing
  - a wasteland
  lexicon: HALOT
  rationale: שַׁמָּה can denote desolation or an object of horror. Since לְזַוֲעָה
    already covers horror, 'desolation' preserves lexical distinction within the list.
- source_word: וְלִשְׁרֵקָה
  chosen: an object of hissing
  alternatives:
  - a hissing
  - a whistle
  lexicon: HALOT
  rationale: שְׁרֵקָה refers to the derisive hissing/whistling response of onlookers.
    'An object of hissing' makes explicit that the people become the target of scorn,
    not the agents of the sound.
- source_word: וּלְחֶרְפָּה
  chosen: and a reproach
  alternatives:
  - and a disgrace
  - and an insult
  lexicon: HALOT
  rationale: חֶרְפָּה denotes reproach, disgrace, or taunt. 'Reproach' preserves the
    public-shame dimension and pairs well with the surrounding terms.
- source_word: בְּכָל הַגּוֹיִם
  chosen: among all the nations
  alternatives:
  - in all the nations
  lexicon: HALOT
  rationale: 'ב here is locative/social: their disgrace is experienced among the nations.
    ''Among'' is more idiomatic in English for dispersion among peoples.'
- source_word: אֲשֶׁר הִדַּחְתִּים שָׁם
  chosen: where I have driven them
  alternatives:
  - where I drove them
  - to which I have banished them
  lexicon: HALOT
  rationale: נדח in the hiphil means to drive away/scatter. The perfect can be rendered
    'have driven' in English to connect the prior divine action with the present condition
    in exile. 'Driven' is stronger and more literal than 'banished.'
