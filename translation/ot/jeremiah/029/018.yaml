theological_decisions:
- issue: Divine agency in judgment and exile
  chosen_reading: 'Retain explicit first-person divine actions: ''I will pursue,''
    ''I will make,'' ''I have driven.'''
  alternative_readings:
  - Soften to passive or impersonal formulations
  rationale: The Hebrew explicitly attributes both judgment and scattering to God.
    The translation preserves this theological tension rather than softening the text's
    claim about divine sovereignty in judgment.
  doctrine_reference: Translation philosophy §3
