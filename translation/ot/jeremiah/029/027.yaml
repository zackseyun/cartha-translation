id: JER.29.27
reference: Jeremiah 29:27
source:
  edition: WLC
  text: וְ/עַתָּ֗ה לָ֚/מָּה לֹ֣א גָעַ֔רְתָּ בְּ/יִרְמְיָ֖הוּ הָֽ/עֲנְּתֹתִ֑י הַ/מִּתְנַבֵּ֖א
    לָ/כֶֽם׃
translation:
  text: And now, why have you not rebuked Jeremiah the Anathothite, who is prophesying
    to you?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from Anathoth.' The Hebrew uses a gentilic, literally 'the Anathothite.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Discourse marker introducing the complaint's next point. 'And now' preserves
    the connective ו plus temporal/adversative force of עתה.
- source_word: לָמָּה
  chosen: why
  lexicon: HALOT
  rationale: Direct interrogative asking for the reason.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Standard negation paired with the perfect verb to form 'why have you
    not...'
- source_word: גָעַרְתָּ
  chosen: have you not rebuked
  alternatives:
  - have you not censured
  - have you not reprimanded
  lexicon: HALOT
  rationale: גער commonly means 'rebuke' or 'reprove' sharply. 'Rebuked' is natural
    modern English and fits the confrontational context of an official being faulted
    for failing to discipline Jeremiah.
- source_word: בְּיִרְמְיָהוּ
  chosen: Jeremiah
  lexicon: HALOT
  rationale: Personal name transliterated according to the translation philosophy.
- source_word: הָעֲנְּתֹתִי
  chosen: the Anathothite
  alternatives:
  - from Anathoth
  lexicon: HALOT
  rationale: Gentilic adjective from Anathoth. 'The Anathothite' preserves the Hebrew
    adjectival form more closely than the expanded 'from Anathoth,' while remaining
    clear in English.
- source_word: הַמִּתְנַבֵּא
  chosen: who is prophesying
  alternatives:
  - who prophesies
  - who acts as a prophet
  lexicon: HALOT
  rationale: Participle with article functions attributively, describing Jeremiah
    as one presently engaged in prophetic activity. 'Who is prophesying' preserves
    the ongoing verbal sense.
- source_word: לָכֶם
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: 'The preposition ל here most naturally indicates direction/addressee:
    Jeremiah is prophesying ''to'' them.'
