id: JER.29.9
reference: Jeremiah 29:9
source:
  edition: WLC
  text: כִּ֣י בְ/שֶׁ֔קֶר הֵ֛ם נִבְּאִ֥ים לָ/כֶ֖ם בִּ/שְׁמִ֑/י לֹ֥א שְׁלַחְתִּ֖י/ם
    נְאֻם יְהוָֽה־׃ס
translation:
  text: For they are prophesying to you falsely in my name; I did not send them, declares
    the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''in falsehood'' or ''in a lie''; rendered ''falsely'' for natural
      English.'
    reason: lexical_alternative
  - marker: b
    text: Or 'Because they are prophesying to you falsely in my name.'
    reason: alternative_reading
  - marker: c
    text: Hebrew YHWH, traditionally rendered 'the LORD'; alternatively 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding warning; 'for' fits the discourse
    flow in English while preserving the causal force.
- source_word: בְּשֶׁקֶר
  chosen: falsely
  alternatives:
  - a lie
  - deceitfully
  lexicon: HALOT
  rationale: The prepositional phrase literally means 'in falsehood/lie.' Rendering
    it adverbially as 'falsely' is natural English and preserves the sense that their
    prophesying is characterized by falsehood.
- source_word: נִבְּאִים
  chosen: are prophesying
  alternatives:
  - prophesy
  lexicon: HALOT
  rationale: The participle conveys ongoing or characteristic action. 'Are prophesying'
    reflects that aspect more clearly than a simple present.
- source_word: לָכֶם
  chosen: to you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The lamed here marks the indirect object of their prophetic speech; 'to
    you' is the most straightforward English equivalent.
- source_word: בִּשְׁמִי
  chosen: in my name
  alternatives:
  - under my name
  - claiming my name
  lexicon: HALOT
  rationale: This is the standard idiom for acting or speaking under claimed divine
    authorization. 'In my name' preserves the idiom and its theological weight.
- source_word: לֹא שְׁלַחְתִּים
  chosen: I did not send them
  alternatives:
  - I have not sent them
  lexicon: HALOT
  rationale: The perfect verb with negation states YHWH's denial of authorization.
    Simple past is idiomatic and clear in English.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Declares the LORD' is readable modern
    English and preserves the solemn prophetic force. Per doctrine, יְהוָה is rendered
    'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern.
