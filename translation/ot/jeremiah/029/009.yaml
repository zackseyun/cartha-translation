theological_decisions:
- issue: Divine authorization of prophecy
  chosen_reading: The verse states that the prophets speak falsely while claiming YHWH's authority, and that YHWH explicitly denies having sent them.
  rationale: The Hebrew directly contrasts their claim to speak 'in my name' with YHWH's denial 'I did not send them.' The translation preserves this theological tension without softening either side.
  doctrine_reference: Translation philosophy §3
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
