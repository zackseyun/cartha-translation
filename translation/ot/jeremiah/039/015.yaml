theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets the default rendering of YHWH as
    'the LORD' in continuity with Jewish reverence tradition and the Septuagintal
    pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Prophetic formula דְבַר יְהוָה
  chosen_reading: the word of the LORD had come
  alternative_readings:
  - the word of the LORD came
  - the message of the LORD came
  rationale: This preserves the recognizable prophetic revelation formula without
    reducing it to a merely informational 'message.' The pluperfect reflects the retrospective
    narrative setting in which the revelation is reported after the historical events
    are underway.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5, 6
