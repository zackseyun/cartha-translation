id: JER.39.15
reference: Jeremiah 39:15
source:
  edition: WLC
  text: וְ/אֶֽל יִרְמְיָ֖הוּ הָיָ֣ה דְבַר יְהוָ֑ה בִּֽ/הְיֹת֣/וֹ עָצ֔וּר בַּ/חֲצַ֥ר
    הַ/מַּטָּרָ֖ה לֵ/אמֹֽר־־׃
translation:
  text: Now the word of the LORD had come to Jeremiah while he was confined in the
    court of the guard, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the word of the LORD came to Jeremiah while he was confined in the courtyard
      of the guard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶל
  chosen: Now ... to
  alternatives:
  - And to
  - Moreover, to
  lexicon: HALOT
  rationale: The combination introduces a new narrative notice directed toward Jeremiah.
    English idiom does not naturally begin 'And to Jeremiah the word...,' so 'Now'
    captures the discourse transition while preserving the directional sense with
    'to Jeremiah' embedded in the clause.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  rationale: Standard English transliteration of the prophet's name, following the
    translation philosophy to transliterate personal names.
- source_word: הָיָה
  chosen: had come
  alternatives:
  - came
  - was
  lexicon: HALOT
  rationale: With דְבַר יְהוָה as subject, this is the standard prophetic formula
    indicating reception of divine revelation. The pluperfect 'had come' fits the
    narrative context, since the revelation occurred while Jeremiah was still confined
    and is being reported retrospectively.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: This is the conventional prophetic expression for divine revelation.
    'Word' preserves the formulaic and theological weight better than the more interpretive
    'message.' YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Required by the doctrine excerpt''s contested terms table: יְהוָה is
    rendered ''the LORD.'''
- source_word: בִּֽ/הְיֹת֣/וֹ
  chosen: while he was
  alternatives:
  - when he was
  - in his being
  lexicon: HALOT
  rationale: The infinitive construct with pronominal suffix introduces a temporal
    clause. 'While he was' is natural English and preserves the ongoing circumstance.
- source_word: עָצוּר
  chosen: confined
  alternatives:
  - shut up
  - imprisoned
  - detained
  lexicon: HALOT
  rationale: The participle denotes being restrained or held. 'Confined' fits the
    setting of custody in the guard court without overstating the formality of imprisonment;
    'shut up' is archaic in modern English.
- source_word: בַּ/חֲצַר הַ/מַּטָּרָה
  chosen: in the court of the guard
  alternatives:
  - in the courtyard of the guard
  - in the court of the prison
  - in the guard court
  lexicon: HALOT
  rationale: חָצֵר is 'court/courtyard.' מַטָּרָה in this context refers to the guardhouse/custodial
    area rather than a generic 'prison.' 'Court of the guard' is both idiomatic and
    contextually precise, matching the known location where Jeremiah was held.
- source_word: לֵ/אמֹר
  chosen: saying,
  alternatives:
  - 'thus:'
  - 'as follows:'
  lexicon: HALOT
  rationale: Standard introduction to direct speech. 'Saying,' preserves the formal
    narrative transition into the divine message of the next verse.
