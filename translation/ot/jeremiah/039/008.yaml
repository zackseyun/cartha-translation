id: JER.39.8
reference: Jeremiah 39:8
source:
  edition: WLC
  text: וְ/אֶת בֵּ֤ית הַ/מֶּ֨לֶךְ֙ וְ/אֶת בֵּ֣ית הָ/עָ֔ם שָׂרְפ֥וּ הַ/כַּשְׂדִּ֖ים
    בָּ/אֵ֑שׁ וְ/אֶת חֹמ֥וֹת יְרוּשָׁלִַ֖ם נָתָֽצוּ־־־׃
translation:
  text: The Chaldeans burned the king’s house and the houses of the people with fire,
    and they tore down the walls of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the palace' for 'the king’s house.'
    reason: lexical_alternative
  - marker: b
    text: '''Chaldeans'' refers to the Babylonian forces.'
    reason: cultural_note
lexical_decisions:
- source_word: בֵּית הַמֶּלֶךְ
  chosen: the king’s house
  alternatives:
  - the palace
  - the house of the king
  lexicon: HALOT
  rationale: בַּיִת literally means 'house,' but in royal context can denote the palace.
    'The king’s house' preserves the Hebrew expression transparently while remaining
    natural English; 'palace' is possible but slightly more interpretive.
- source_word: בֵּית הָעָם
  chosen: the houses of the people
  alternatives:
  - the people’s houses
  - the houses of the common people
  lexicon: HALOT
  rationale: The singular construct בֵּית with a collective noun can function distributively.
    In context of city destruction, English plural 'houses of the people' best conveys
    the likely sense of the dwellings belonging to the populace. 'Common people' adds
    a social nuance not explicit in the Hebrew.
- source_word: שָׂרְפוּ
  chosen: burned
  alternatives:
  - set on fire
  - burned up
  lexicon: HALOT
  rationale: The verb means 'burn.' 'Burned' is the straightforward rendering; 'set
    on fire' is possible but less direct, and 'burned up' may overstate total consumption.
- source_word: הַכַּשְׂדִּים
  chosen: The Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: כַּשְׂדִּים is literally 'Chaldeans.' Although it can refer to the Babylonian
    forces, the translation philosophy favors the source-language term unless context
    requires interpretation. 'Babylonians' is a valid contextual equivalent but less
    formally tied to the Hebrew wording.
- source_word: בָּאֵשׁ
  chosen: with fire
  alternatives:
  - in the fire
  - by fire
  lexicon: HALOT
  rationale: The preposition ב plus 'fire' here expresses means or instrument. 'With
    fire' is idiomatic and closely reflects the Hebrew.
- source_word: חֹמוֹת יְרוּשָׁלִַם
  chosen: the walls of Jerusalem
  alternatives:
  - Jerusalem’s walls
  lexicon: HALOT
  rationale: A direct construct relationship. 'The walls of Jerusalem' is clear and
    formal enough for narrative prose.
- source_word: נָתָצוּ
  chosen: they tore down
  alternatives:
  - they broke down
  - they demolished
  lexicon: HALOT
  rationale: The verb denotes pulling down or tearing down structures. 'Tore down'
    is vivid and natural; 'demolished' is somewhat more modern/technical, while 'broke
    down' can sound less deliberate.
