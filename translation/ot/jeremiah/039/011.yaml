id: JER.39.11
reference: Jeremiah 39:11
source:
  edition: WLC
  text: וַ/יְצַ֛ו נְבוּכַדְרֶאצַּ֥ר מֶֽלֶךְ בָּבֶ֖ל עַֽל יִרְמְיָ֑הוּ בְּ/יַ֛ד נְבוּזַרְאֲדָ֥ן
    רַב טַבָּחִ֖ים לֵ/אמֹֽר־־־׃
translation:
  text: Now Nebuchadnezzar king of Babylon gave orders concerning Jeremiah through
    Nebuzaradan, the captain of the guard, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chief of the executioners'; literally, 'chief of the slaughterers/butchers.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  chosen: gave orders
  alternatives:
  - commanded
  - ordered
  lexicon: HALOT
  rationale: The verb צוה denotes commanding or giving an order. 'Gave orders' is
    natural modern English and fits the narrative introduction to the quoted command
    in the following verse.
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  rationale: Standard English transliteration of the royal name. Although the Hebrew
    spelling here more closely reflects 'Nebuchadrezzar,' 'Nebuchadnezzar' is the
    conventional English form and remains readily recognizable.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: Straightforward construct chain identifying Nebuchadnezzar's royal title
    and realm.
- source_word: עַל יִרְמְיָהוּ
  chosen: concerning Jeremiah
  alternatives:
  - about Jeremiah
  - regarding Jeremiah
  - for Jeremiah
  lexicon: HALOT
  rationale: With צוה, עַל can mark the person or matter about which instructions
    are given. 'Concerning Jeremiah' best captures that the command pertains to Jeremiah
    rather than being addressed directly to him.
- source_word: בְּיַד
  chosen: through
  alternatives:
  - by the hand of
  - by means of
  lexicon: HALOT
  rationale: The idiom 'by the hand of' means agency or mediation. 'Through' communicates
    this clearly in contemporary English while preserving the sense of indirect transmission.
- source_word: נְבוּזַרְאֲדָן
  chosen: Nebuzaradan
  rationale: Standard English transliteration of the personal name.
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - chief of the executioners
  - chief butcher
  lexicon: HALOT
  rationale: This title literally involves 'chief of the slaughterers/butchers,' but
    in royal-military context it refers to the official over the king's bodyguard/executioners.
    'Captain of the guard' is the established and contextually accurate rendering
    in readable English; the more literal alternatives are preserved in a footnote
    because they illuminate the title's semantic background.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of the order in
    the next verse. 'Saying' preserves the formal narrative linkage.
