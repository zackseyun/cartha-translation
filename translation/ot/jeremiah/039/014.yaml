id: JER.39.14
reference: Jeremiah 39:14
source:
  edition: WLC
  text: וַ/יִּשְׁלְחוּ֩ וַ/יִּקְח֨וּ אֶֽת יִרְמְיָ֜הוּ מֵ/חֲצַ֣ר הַ/מַּטָּרָ֗ה וַ/יִּתְּנ֤וּ
    אֹת/וֹ֙ אֶל גְּדַלְיָ֨הוּ֙ בֶּן אֲחִיקָ֣ם בֶּן שָׁפָ֔ן לְ/הוֹצִאֵ֖/הוּ אֶל הַ/בָּ֑יִת
    וַ/יֵּ֖שֶׁב בְּ/ת֥וֹךְ הָ/עָֽם־־־־־׃ס
translation:
  text: So they sent and took Jeremiah from the court of the guard, and they entrusted
    him to Gedaliah son of Ahikam, son of Shaphan, to bring him home. So he lived
    among the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to the house." The Hebrew is literally "to the house," which may refer
      to a residence under Gedaliah's care.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלְחוּ
  chosen: they sent
  alternatives:
  - they sent word
  - they dispatched men
  lexicon: HALOT
  rationale: The verb שׁלח in the waw-consecutive narrative sequence is straightforwardly
    'sent.' English leaves the object implicit, as Hebrew does here, with the following
    verb supplying the action taken.
- source_word: וַיִּקְחוּ
  chosen: took
  alternatives:
  - fetched
  - brought out
  lexicon: HALOT
  rationale: לקח commonly means 'take.' In context it refers to removing Jeremiah
    from confinement, but 'took' preserves the source wording without over-specifying.
- source_word: מֵחֲצַר הַמַּטָּרָה
  chosen: from the court of the guard
  alternatives:
  - from the courtyard of the guard
  - from the court of the prison
  lexicon: HALOT
  rationale: חָצֵר is 'court/courtyard.' מַטָּרָה in Jeremiah refers to the guarded
    detention area; 'guard' is preferred over 'prison' because it reflects the lexical
    sense more directly and matches the known setting of Jeremiah's custody.
- source_word: וַיִּתְּנוּ אֹתוֹ אֶל
  chosen: they entrusted him to
  alternatives:
  - they gave him over to
  - they handed him to
  lexicon: HALOT
  rationale: נתן + אֶל literally means 'gave to,' but in this context of transferring
    responsibility for Jeremiah's care, 'entrusted him to' communicates the function
    of the action in natural English without departing far from the source.
- source_word: גְּדַלְיָהוּ בֶּן אֲחִיקָם בֶּן שָׁפָן
  chosen: Gedaliah son of Ahikam, son of Shaphan
  rationale: Personal names are transliterated per project philosophy, and the patronymic
    chain is preserved formally.
- source_word: לְהוֹצִאֵהוּ
  chosen: to bring him
  alternatives:
  - to take him out
  - to lead him out
  lexicon: HALOT
  rationale: The Hiphil of יצא means 'cause to go out/bring out.' Because the destination
    follows, 'to bring him' is idiomatic English and avoids redundancy with 'out'
    when paired with 'home.'
- source_word: אֶל הַבָּיִת
  chosen: home
  alternatives:
  - to the house
  - to his house
  lexicon: HALOT
  rationale: Literally 'to the house.' In this context the phrase likely means to
    a place of residence under Gedaliah's care. 'Home' is idiomatic and readable,
    while a footnote preserves the more formal alternative 'to the house.' 'His house'
    is interpretive because the possessive is not explicit.
- source_word: וַיֵּשֶׁב
  chosen: he lived
  alternatives:
  - he dwelt
  - he stayed
  - he settled
  lexicon: HALOT
  rationale: ישׁב can mean 'sit,' 'dwell,' or 'live.' In context it denotes ongoing
    residence rather than the act of sitting, so 'lived' best conveys the sense in
    contemporary English.
- source_word: בְּתוֹךְ הָעָם
  chosen: among the people
  alternatives:
  - in the midst of the people
  - among the populace
  lexicon: HALOT
  rationale: The phrase indicates Jeremiah's restored presence within the community.
    'Among the people' is a clear, natural rendering that preserves the communal sense
    of עָם.
