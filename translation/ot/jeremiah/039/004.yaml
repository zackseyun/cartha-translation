id: JER.39.4
reference: Jeremiah 39:4
source:
  edition: WLC
  text: וַ/יְהִ֡י כַּ/אֲשֶׁ֣ר רָ֠אָ/ם צִדְקִיָּ֨הוּ מֶֽלֶךְ יְהוּדָ֜ה וְ/כֹ֣ל אַנְשֵׁ֣י
    הַ/מִּלְחָמָ֗ה וַֽ֠/יִּבְרְחוּ וַ/יֵּצְא֨וּ לַ֤יְלָה מִן הָ/עִיר֙ דֶּ֚רֶךְ גַּ֣ן
    הַ/מֶּ֔לֶךְ בְּ/שַׁ֖עַר בֵּ֣ין הַ/חֹמֹתָ֑יִם וַ/יֵּצֵ֖א דֶּ֥רֶךְ הָ/עֲרָבָֽה־׀־׃
translation:
  text: And when Zedekiah king of Judah and all the men of war saw them, they fled
    and went out by night from the city by way of the king’s garden, through the gate
    between the two walls; and he went out by way of the Arabah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has 'he went out' in the final clause, though some translations smooth
      this to 'they went out' to match the earlier plural verbs.
    reason: textual_variant
  - marker: b
    text: Or 'the plain' or 'the Jordan Valley' for 'the Arabah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאָם
  chosen: saw them
  alternatives:
  - saw
  lexicon: HALOT
  rationale: The verb ראה with 3mp suffix most naturally means 'saw them,' referring
    to the Babylonian forces just mentioned in context. English requires the object
    to be explicit for clarity.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  chosen: the men of war
  alternatives:
  - the fighting men
  - the soldiers
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the military sense without over-paraphrase.
    'Men of war' matches the Hebrew construct and remains understandable in modern
    English.
- source_word: וַיִּבְרְחוּ
  chosen: they fled
  alternatives:
  - they ran away
  lexicon: HALOT
  rationale: '''Fled'' is the standard concise rendering for ברח and fits the narrative
    register.'
- source_word: וַיֵּצְאוּ לַיְלָה
  chosen: went out by night
  alternatives:
  - went out at night
  - left during the night
  lexicon: HALOT
  rationale: '''By night'' preserves the compact Hebrew idiom and the narrative tone.'
- source_word: דֶּרֶךְ גַּן הַמֶּלֶךְ
  chosen: by way of the king’s garden
  alternatives:
  - through the king’s garden
  - by the route of the king’s garden
  lexicon: HALOT
  rationale: דֶּרֶךְ here marks route or way. 'By way of' is natural English and keeps
    the directional nuance without over-specifying whether they passed through or
    alongside it.
- source_word: בְּשַׁעַר בֵּין הַחֹמֹתָיִם
  chosen: through the gate between the two walls
  alternatives:
  - by the gate between the two walls
  - through the gate between the walls
  lexicon: HALOT
  rationale: The dual form חֹמֹתַיִם is best represented as 'the two walls.' 'Through
    the gate' fits the movement verb and gives a clear route description.
- source_word: וַיֵּצֵא
  chosen: he went out
  alternatives:
  - he left
  - they went out
  lexicon: HALOT
  rationale: The verb is singular, shifting from the earlier plural. The most straightforward
    translation preserves the Masoretic singular rather than smoothing it to plural.
- source_word: הָעֲרָבָה
  chosen: the Arabah
  alternatives:
  - the plain
  - the Jordan Valley
  lexicon: HALOT
  rationale: As a geographic term, עֲרָבָה is best transliterated here as 'the Arabah'
    rather than generalized as 'the plain.' This preserves the likely regional reference
    and avoids flattening the place-name.
