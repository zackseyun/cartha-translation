id: JER.39.17
reference: Jeremiah 39:17
source:
  edition: WLC
  text: וְ/הִצַּלְתִּ֥י/ךָ בַ/יּוֹם הַ/ה֖וּא נְאֻם יְהוָ֑ה וְ/לֹ֤א תִנָּתֵן֙ בְּ/יַ֣ד הָֽ/אֲנָשִׁ֔ים אֲשֶׁר אַתָּ֥ה יָג֖וֹר מִ/פְּנֵי/הֶֽם־־־׃
translation:
  text: But I will deliver you on that day, declares Yahweh, and you will not be given into the hand of the men of whom you are afraid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rescue you' or 'save you.' The Hebrew verb can carry the sense of delivering someone from danger.
    reason: lexical_alternative
  - marker: b
    text: Literally 'into the hand of the men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִצַּלְתִּיךָ
  chosen: But I will deliver you
  alternatives:
  - And I will rescue you
  - And I will save you
  lexicon: HALOT
  rationale: The Hiphil of נצל means to deliver/rescue from danger. 'Deliver' fits the immediate context of being spared from hostile men and preserves the concrete sense without over-theologizing as 'save.' The prefixed conjunction is rendered 'But' to reflect the adversative force in context, though formally it is simply 'and.'
- source_word: בַיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard temporal expression meaning 'on that day.' 'On' is more natural modern English than the more formal 'in.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is idiomatically rendered 'declares the LORD' in contemporary English. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance with DOCTRINE.md.
- source_word: וְלֹא תִנָּתֵן
  chosen: and you will not be given
  alternatives:
  - and you will not be handed over
  - and you will not be delivered over
  lexicon: HALOT
  rationale: The Niphal of נתן here is a passive 'be given' into someone's power. 'Given' is the most direct rendering; the hostile nuance is supplied by the following phrase 'into the hand of.'
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for being delivered into someone's control. The literal 'hand' is retained because it is clear in English and preserves the source imagery.
- source_word: הָאֲנָשִׁים
  chosen: the men
  alternatives:
  - the people
  lexicon: HALOT
  rationale: The noun is masculine plural and refers to specific male opponents in context, so 'the men' is gender-accurate and preferable to a neutral rendering.
- source_word: אֲשֶׁר אַתָּה יָגוֹר מִפְּנֵיהֶם
  chosen: whom you fear
  alternatives:
  - before whom you are afraid
  - of whom you are in dread
  lexicon: HALOT
  rationale: גור with מן/מפני can denote fearing or dreading someone. 'Whom you fear' is concise, natural English and adequately conveys the sense of dread before these men.
