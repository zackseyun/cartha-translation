id: JER.39.2
reference: Jeremiah 39:2
source:
  edition: WLC
  text: בְּ/עַשְׁתֵּֽי עֶשְׂרֵ֤ה שָׁנָה֙ לְ/צִדְקִיָּ֔הוּ בַּ/חֹ֥דֶשׁ הָ/רְבִיעִ֖י
    בְּ/תִשְׁעָ֣ה לַ/חֹ֑דֶשׁ הָבְקְעָ֖ה הָ/עִֽיר־׃
translation:
  text: In the eleventh year of Zedekiah, in the fourth month, on the ninth day of
    the month, the city was breached.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'on the ninth of the month.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/עַשְׁתֵּי עֶשְׂרֵה שָׁנָה
  chosen: in the eleventh year
  alternatives:
  - during the eleventh year
  lexicon: HALOT
  rationale: The preposition ב plus the numeral phrase and שָׁנָה marks a temporal
    setting. 'In the eleventh year' is the most natural and sufficiently formal English
    rendering.
- source_word: לְ/צִדְקִיָּהוּ
  chosen: of Zedekiah
  alternatives:
  - belonging to Zedekiah
  - of Ṣidqiyyahu
  lexicon: HALOT
  rationale: The ל marks reference to the regnal year, idiomatically 'of Zedekiah.'
    The personal name is transliterated per project policy.
- source_word: בַּ/חֹדֶשׁ הָ/רְבִיעִי
  chosen: in the fourth month
  alternatives:
  - in the fourth month of the year
  lexicon: HALOT
  rationale: A straightforward temporal expression. 'Month' should be retained rather
    than converted to a modern calendar equivalent, since the Hebrew text gives ordinal
    month numbering.
- source_word: בְּ/תִשְׁעָה לַ/חֹדֶשׁ
  chosen: on the ninth day of the month
  alternatives:
  - on the ninth of the month
  lexicon: HALOT
  rationale: This idiom specifies the day within the month. English commonly supplies
    'day' for clarity, though it is implicit in the Hebrew construction.
- source_word: הָבְקְעָה
  chosen: was breached
  alternatives:
  - was broken into
  - was broken through
  - was breached open
  lexicon: HALOT
  rationale: Nifal perfect 3fs of בקע with הָעִיר as subject indicates that the city
    wall/defenses were broken through. 'Was breached' is concise, idiomatic, and preserves
    the military sense better than the more generic 'was broken up.'
- source_word: הָ/עִיר
  chosen: the city
  lexicon: HALOT
  rationale: Definite noun referring to Jerusalem in context, but the Hebrew says
    'the city'; retaining that wording preserves the source text while the referent
    remains clear from context.
