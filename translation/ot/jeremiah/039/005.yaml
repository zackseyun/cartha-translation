id: JER.39.5
reference: Jeremiah 39:5
source:
  edition: WLC
  text: וַ/יִּרְדְּפ֨וּ חֵיל כַּשְׂדִּ֜ים אַחֲרֵי/הֶ֗ם וַ/יַּשִּׂ֣גוּ אֶת צִדְקִיָּהוּ֮
    בְּ/עַֽרְב֣וֹת יְרֵחוֹ֒ וַ/יִּקְח֣וּ אֹת֗/וֹ וַֽ֠/יַּעֲלֻ/הוּ אֶל נְבוּכַדְרֶאצַּ֧ר
    מֶֽלֶךְ בָּבֶ֛ל רִבְלָ֖תָ/ה בְּ/אֶ֣רֶץ חֲמָ֑ת וַ/יְדַבֵּ֥ר אִתּ֖/וֹ מִשְׁפָּטִֽים־־־־׃
translation:
  text: But the army of the Chaldeans pursued them and overtook Zedekiah in the plains
    of Jericho. They seized him and brought him up to Nebuchadnezzar king of Babylon
    at Riblah, in the land of Hamath, and he pronounced judgments on him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Nebuchadrezzar''; the more familiar English form ''Nebuchadnezzar''
      is used in the main text.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֵיל כַּשְׂדִּים
  chosen: the army of the Chaldeans
  alternatives:
  - the forces of the Chaldeans
  - the army of the Babylonians
  lexicon: HALOT
  rationale: חֵיל denotes military force/army. כַּשְׂדִּים is the ethnic-political
    term 'Chaldeans,' often referring to the Babylonian power. 'Chaldeans' preserves
    the source term more directly; 'Babylonians' is a possible contextual equivalent
    but is not chosen for tighter lexical correspondence.
- source_word: וַיִּרְדְּפוּ ... אַחֲרֵיהֶם
  chosen: pursued them
  alternatives:
  - chased after them
  lexicon: HALOT
  rationale: The verb רדף with אַחֲרֵי expresses pursuit. 'Pursued them' is idiomatic
    and sufficiently formal without paraphrase.
- source_word: וַיַּשִּׂגוּ
  chosen: overtook
  alternatives:
  - caught up with
  - reached
  lexicon: HALOT
  rationale: נשׂג in this context means to catch up to or overtake fugitives. 'Overtook'
    fits the military pursuit context and preserves the narrative force.
- source_word: בְּעַרְבוֹת יְרֵחוֹ
  chosen: in the plains of Jericho
  alternatives:
  - in the desert plains of Jericho
  - in the steppes of Jericho
  lexicon: HALOT
  rationale: עֲרָבוֹת commonly refers to steppe/plains, especially the Jordan rift
    plain. 'Plains of Jericho' is standard, clear English; 'steppes' is more technical
    and less natural for the target audience.
- source_word: וַיִּקְחוּ אֹתוֹ
  chosen: They seized him
  alternatives:
  - they took him
  - they captured him
  lexicon: HALOT
  rationale: לקח literally means 'take,' but in arrest context 'seized' communicates
    the force implied by the surrounding military action without overinterpreting.
- source_word: וַיַּעֲלֻהוּ אֶל
  chosen: brought him up to
  alternatives:
  - took him up to
  - brought him to
  lexicon: HALOT
  rationale: עלה in narrative travel often retains the sense 'go up/bring up.' 'Brought
    him up to' preserves the directional nuance better than simply 'brought him to.'
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: A standard English transliteration is used for readability and convention.
    The Hebrew form here more closely reflects 'Nebuchadrezzar,' but 'Nebuchadnezzar'
    is the dominant standard in English Bible usage. The alternative is worth preserving
    in a footnote for auditability.
- source_word: רִבְלָתָה
  chosen: at Riblah
  lexicon: HALOT
  rationale: Proper place name transliterated according to standard convention. The
    locative ending is represented naturally in English by 'at Riblah.'
- source_word: בְּאֶרֶץ חֲמָת
  chosen: in the land of Hamath
  alternatives:
  - in the territory of Hamath
  lexicon: HALOT
  rationale: אֶרֶץ is broadly 'land.' 'In the land of Hamath' is a straightforward
    rendering that preserves the geographic designation.
- source_word: וַיְדַבֵּר אִתּוֹ מִשְׁפָּטִים
  chosen: and he pronounced judgments on him
  alternatives:
  - and he passed sentence on him
  - and he spoke judgments with him
  lexicon: HALOT
  rationale: Literally, 'he spoke judgments with/to him.' In context this idiom refers
    to judicial sentencing by Nebuchadnezzar. 'Pronounced judgments on him' preserves
    the plural מִשְׁפָּטִים and the legal sense without woodenly reproducing an English-unnatural
    idiom. 'Passed sentence on him' is possible but singularizes the expression.
