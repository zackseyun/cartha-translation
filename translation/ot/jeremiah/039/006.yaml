id: JER.39.6
reference: Jeremiah 39:6
source:
  edition: WLC
  text: וַ/יִּשְׁחַט֩ מֶ֨לֶךְ בָּבֶ֜ל אֶת בְּנֵ֧י צִדְקִיָּ֛הוּ בְּ/רִבְלָ֖ה לְ/עֵינָ֑י/ו
    וְ/אֵת֙ כָּל חֹרֵ֣י יְהוּדָ֔ה שָׁחַ֖ט מֶ֥לֶךְ בָּבֶֽל־־׃
translation:
  text: The king of Babylon slaughtered the sons of Zedekiah at Riblah before his
    eyes, and the king of Babylon slaughtered all the nobles of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'officials of Judah' for 'nobles of Judah.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁחַט / שָׁחַט
  chosen: slaughtered
  alternatives:
  - killed
  - slew
  - put to death
  lexicon: HALOT
  rationale: שָׁחַט commonly denotes slaughtering, often with violent or butchering
    force. In this execution context, 'slaughtered' preserves the brutality better
    than the flatter 'killed' or the archaic 'slew'.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: A straightforward genitival rendering. The repeated phrase is retained
    both times, matching the Hebrew repetition rather than replacing the second instance
    with a pronoun.
- source_word: בְּנֵי צִדְקִיָּהוּ
  chosen: the sons of Zedekiah
  alternatives:
  - Zedekiah's sons
  - the children of Zedekiah
  lexicon: HALOT
  rationale: '''Sons'' is the most direct and accurate rendering of בְּנֵי here; ''children''
    would weaken the male-specific reference.'
- source_word: בְּרִבְלָה
  chosen: at Riblah
  alternatives:
  - in Riblah
  lexicon: HALOT
  rationale: For a place name with בְּ, English idiom naturally uses 'at' for the
    location of the execution scene.
- source_word: לְעֵינָיו
  chosen: before his eyes
  alternatives:
  - in his sight
  - before him
  lexicon: HALOT
  rationale: This idiom conveys that Zedekiah witnessed the event. 'Before his eyes'
    is both natural and vivid, preserving the horror of the scene.
- source_word: כָּל
  chosen: all
  alternatives:
  - every
  lexicon: HALOT
  rationale: '''All'' fits the collective object ''the nobles of Judah'' more naturally
    than ''every.'''
- source_word: חֹרֵי יְהוּדָה
  chosen: the nobles of Judah
  alternatives:
  - the officials of Judah
  - the freemen of Judah
  lexicon: HALOT
  rationale: חֹרִים in this context refers to high-ranking persons or nobles. 'Nobles'
    best fits the social-political sense in the narrative; 'officials' is possible
    but narrower and less socially marked.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard transliteration of the territorial/political name.
