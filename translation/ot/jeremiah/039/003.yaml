id: JER.39.3
reference: Jeremiah 39:3
source:
  edition: WLC
  text: וַ/יָּבֹ֗אוּ כֹּ֚ל שָׂרֵ֣י מֶֽלֶךְ בָּבֶ֔ל וַ/יֵּשְׁב֖וּ בְּ/שַׁ֣עַר הַ/תָּ֑וֶךְ
    נֵרְגַ֣ל שַׂר אֶ֠צֶר סַֽמְגַּר נְב֞וּ שַׂר סְכִ֣ים רַב סָרִ֗יס נֵרְגַ֤ל שַׂר אֶ֨צֶר֙
    רַב מָ֔ג וְ/כָל שְׁאֵרִ֔ית שָׂרֵ֖י מֶ֥לֶךְ בָּבֶֽל־־־־־־־־׃
translation:
  text: 'Then all the officials of the king of Babylon came in and sat in the Middle
    Gate: Nergal-sharezer, Samgar-nebu, Sarsechim the Rab-saris, Nergal-sharezer the
    Rab-mag, and all the rest of the officials of the king of Babylon.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the Middle Gate.' The Hebrew preposition can be rendered either way
      in this setting.
    reason: lexical_alternative
  - marker: b
    text: The sequence 'Samgar-nebu, Sarsechim the Rab-saris' is difficult. Some interpreters
      divide the names and titles differently, such as reading 'Samgar' as a title
      or 'Sarsechim' as an office rather than a personal name.
    reason: alternative_reading
  - marker: c
    text: '''Rab-saris'' is a Babylonian title, traditionally understood as something
      like ''chief eunuch'' or ''chief court official.'''
    reason: cultural_note
  - marker: d
    text: '''Rab-mag'' is a Babylonian title, possibly meaning ''chief magus'' or
      a high-ranking ritual official.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: came in
  alternatives:
  - entered
  - came
  lexicon: HALOT
  rationale: Wayyiqtol of בוא in the narrative context of the Babylonians breaching
    Jerusalem naturally conveys entry into the city. 'Came in' is idiomatic and preserves
    the movement into a place better than bare 'came'.
- source_word: כֹּל שָׂרֵי מֶלֶךְ בָּבֶל
  chosen: all the officials of the king of Babylon
  alternatives:
  - all the princes of the king of Babylon
  - all the commanders of the king of Babylon
  lexicon: HALOT
  rationale: שָׂרִים denotes rulers, officers, or high officials. 'Officials' fits
    the court-military setting without implying only royal sons ('princes') or only
    military rank ('commanders').
- source_word: וַיֵּשְׁבוּ
  chosen: sat
  alternatives:
  - took their seats
  - settled
  lexicon: HALOT
  rationale: The verb ישׁב literally means 'sat' or 'dwelt.' Here it describes the
    occupying officials taking position in a gate area after entering the city. 'Sat'
    is concise and faithful; the contextual force of assuming authority is left implicit
    rather than paraphrased.
- source_word: בְּשַׁעַר הַתָּוֶךְ
  chosen: in the Middle Gate
  alternatives:
  - at the Middle Gate
  - in the central gate
  lexicon: HALOT
  rationale: שַׁעַר is 'gate'; תָּוֶךְ is 'middle, midst.' The phrase is best taken
    as a specific gate name or designation within Jerusalem. Capitalizing 'Middle
    Gate' reflects this likely proper-place usage. 'In' follows the Hebrew preposition
    and can describe occupying the gate complex.
- source_word: נֵרְגַל שַׂר אֶצֶר
  chosen: Nergal-sharezer
  alternatives:
  - Nergal-sar-ezer
  lexicon: HALOT
  rationale: This is a Babylonian personal name, so transliteration is preferred per
    translation philosophy. The conventional English form 'Nergal-sharezer' is readable
    and standard.
- source_word: סַמְגַּר נְבוּ
  chosen: Samgar-nebu
  alternatives:
  - Samgar-Nebo
  lexicon: HALOT
  rationale: The consonantal text presents a name-form best transliterated rather
    than translated. 'Samgar-nebu' follows the Hebrew vocalization closely. Because
    the exact parsing of the name/title sequence is debated, the alternative is preserved
    in a footnote.
- source_word: שַׂר סְכִים
  chosen: Sarsechim
  alternatives:
  - chief officer
  - Sar-sechim
  lexicon: HALOT
  rationale: Although some have taken this as a title, the Masoretic pointing supports
    reading it as part of a proper name in apposition within the list. Transliteration
    avoids overconfident reinterpretation. The title-like alternative is worth preserving
    in a footnote because of historical discussion.
- source_word: רַב סָרִיס
  chosen: the Rab-saris
  alternatives:
  - the chief eunuch
  - the chief official
  lexicon: HALOT
  rationale: This is an Akkadian loan title. Transliteration preserves the ancient
    office without forcing a potentially misleading modern equivalent. 'Chief eunuch'
    is a common interpretation, but in imperial contexts the office may extend beyond
    literal castration; thus the transliterated title is preferable in the main text.
- source_word: רַב מָג
  chosen: the Rab-mag
  alternatives:
  - the chief magus
  - the chief of the magi
  lexicon: HALOT
  rationale: Another Babylonian title, likely denoting a high-ranking ritual or scholarly
    official. Transliteration preserves the title while avoiding importing later associations
    of 'magi' too strongly into the main text.
- source_word: וְכָל שְׁאֵרִית שָׂרֵי מֶלֶךְ בָּבֶל
  chosen: and all the rest of the officials of the king of Babylon
  alternatives:
  - and all the remaining officials of the king of Babylon
  lexicon: HALOT
  rationale: שְׁאֵרִית means 'remainder, remnant.' In this administrative list, 'the
    rest' is natural modern English and accurately conveys those not individually
    named.
