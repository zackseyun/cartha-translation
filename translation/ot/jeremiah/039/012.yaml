id: JER.39.12
reference: Jeremiah 39:12
source:
  edition: WLC
  text: קָחֶ֗/נּוּ וְ/עֵינֶ֨י/ךָ֙ שִׂ֣ים עָלָ֔י/ו וְ/אַל תַּ֥עַשׂ ל֖/וֹ מְא֣וּמָה
    רָּ֑ע כִּ֗י אם כַּֽ/אֲשֶׁר֙ יְדַבֵּ֣ר אֵלֶ֔י/ךָ כֵּ֖ן עֲשֵׂ֥ה עִמּֽ/וֹ־׃
translation:
  text: Take him, keep your eyes on him, and do him no harm; rather, do with him just
    as he speaks to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'set your eyes on him,' that is, 'watch over him' or 'look after him.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'do not do to him anything bad/evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָחֶנּוּ
  chosen: Take him
  alternatives:
  - Bring him
  - Receive him
  lexicon: HALOT
  rationale: Qal imperative of לקח with 3ms suffix; the straightforward command is
    to take custody of Jeremiah. 'Take him' is the most natural and direct English
    equivalent in context.
- source_word: וְעֵינֶיךָ שִׂים עָלָיו
  chosen: keep your eyes on him
  alternatives:
  - set your eyes on him
  - look after him
  - watch over him
  lexicon: HALOT
  rationale: Literally 'set your eyes upon him.' In this context of protective custody,
    the idiom conveys attentive oversight rather than mere visual attention. 'Keep
    your eyes on him' preserves the imagery while sounding natural in English.
- source_word: וְאַל תַּעַשׂ לוֹ מְאוּמָה רָע
  chosen: do him no harm
  alternatives:
  - do nothing bad to him
  - do him no evil
  lexicon: HALOT
  rationale: מְאוּמָה with רָע yields 'anything bad/evil.' English idiom favors 'do
    him no harm' in a command about treatment of a prisoner; it captures the prohibition
    against mistreatment without over-paraphrasing.
- source_word: כִּי אִם
  chosen: rather
  alternatives:
  - but
  - except that
  lexicon: HALOT
  rationale: 'Here כִּי אִם introduces a contrast after a negative command: not X,
    but instead Y. ''Rather'' best marks the adversative force in smooth English.'
- source_word: כַּאֲשֶׁר יְדַבֵּר אֵלֶיךָ
  chosen: just as he speaks to you
  alternatives:
  - according to what he says to you
  - as he tells you
  lexicon: HALOT
  rationale: 'The clause is comparative/instructional: treatment is to accord with
    Jeremiah''s own request or instruction. ''Just as he speaks to you'' stays close
    to the Hebrew while remaining readable.'
- source_word: כֵּן עֲשֵׂה עִמּוֹ
  chosen: do with him
  alternatives:
  - deal with him
  - act toward him
  lexicon: HALOT
  rationale: עשה עם commonly means 'deal/do with.' 'Do with him' keeps the verbal
    link with the prior command and fits the following comparative clause.
