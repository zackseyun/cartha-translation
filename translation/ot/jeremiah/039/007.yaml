id: JER.39.7
reference: Jeremiah 39:7
source:
  edition: WLC
  text: וְ/אֶת עֵינֵ֥י צִדְקִיָּ֖הוּ עִוֵּ֑ר וַ/יַּאַסְרֵ֨/הוּ֙ בַּֽ/נְחֻשְׁתַּ֔יִם
    לָ/בִ֥יא אֹת֖/וֹ בָּבֶֽלָ/ה־׃
translation:
  text: He blinded Zedekiah’s eyes and bound him with bronze shackles to bring him
    to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with bronze chains' or 'with bronze fetters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵי צִדְקִיָּהוּ
  chosen: Zedekiah’s eyes
  alternatives:
  - the eyes of Zedekiah
  lexicon: HALOT
  rationale: Construct chain with proper name; the possessive form is the most natural
    modern English rendering while preserving the concrete object of the verb.
- source_word: עִוֵּר
  chosen: blinded
  alternatives:
  - put out
  - made blind
  lexicon: HALOT
  rationale: The verb means to blind. 'Blinded' is direct and idiomatic English. 'Put
    out' is possible as an interpretive expression for eyes, but it is more paraphrastic
    than the Hebrew requires.
- source_word: וַיַּאַסְרֵהוּ
  chosen: bound him
  alternatives:
  - imprisoned him
  - fettered him
  lexicon: HALOT
  rationale: From אסר, 'to bind, tie, imprison.' In this context, with the following
    instrumental phrase, 'bound him' best matches the physical action described.
- source_word: בַּנְחֻשְׁתַּיִם
  chosen: with bronze shackles
  alternatives:
  - with bronze chains
  - with bronze fetters
  lexicon: HALOT
  rationale: The noun refers to bronze restraints. 'Shackles' communicates the concrete
    restraint clearly in modern English; 'chains' is broader, and 'fetters' is accurate
    but less accessible.
- source_word: לָבִיא אֹתוֹ
  chosen: to bring him
  alternatives:
  - in order to bring him
  - to take him
  lexicon: HALOT
  rationale: Infinitive of purpose from בוא. 'To bring him' is the straightforward
    rendering; 'in order to' is unnecessarily heavy in English.
- source_word: בָּבֶלָה
  chosen: to Babylon
  alternatives:
  - Babylonward
  - into Babylon
  lexicon: HALOT
  rationale: The directional he indicates motion toward Babylon. Standard English
    expresses this naturally as 'to Babylon'.
