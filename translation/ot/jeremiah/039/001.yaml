id: JER.39.1
reference: Jeremiah 39:1
source:
  edition: WLC
  text: בַּ/שָּׁנָ֣ה הַ֠/תְּשִׁעִית לְ/צִדְקִיָּ֨הוּ מֶלֶךְ יְהוּדָ֜ה בַּ/חֹ֣דֶשׁ
    הָ/עֲשִׂרִ֗י בָּ֠א נְבוּכַדְרֶאצַּ֨ר מֶֽלֶךְ בָּבֶ֤ל וְ/כָל חֵיל/וֹ֙ אֶל יְר֣וּשָׁלִַ֔ם
    וַ/יָּצֻ֖רוּ עָלֶֽי/הָ־־־־׃ס
translation:
  text: In the ninth year of Zedekiah king of Judah, in the tenth month, Nebuchadnezzar
    king of Babylon came to Jerusalem with all his army, and they laid siege to it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Nebuchadrezzar''; traditionally rendered ''Nebuchadnezzar'' in
      English.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּשָּׁנָה הַתְּשִׁעִית
  chosen: In the ninth year
  alternatives:
  - In year nine
  lexicon: HALOT
  rationale: Temporal prepositional phrase marking the date. Standard idiomatic English
    is 'in the ninth year.'
- source_word: לְצִדְקִיָּהוּ
  chosen: of Zedekiah
  lexicon: HALOT
  rationale: Personal name is transliterated by standard English convention per translation
    philosophy.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  alternatives:
  - Judah's king
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly as a royal title.
- source_word: בַּחֹדֶשׁ הָעֲשִׂרִי
  chosen: in the tenth month
  alternatives:
  - in month ten
  lexicon: HALOT
  rationale: A second temporal phrase specifying the month; 'tenth month' is the natural
    formal equivalent.
- source_word: בָּא
  chosen: came
  alternatives:
  - arrived
  - marched
  lexicon: HALOT
  rationale: Qal perfect of בוא normally means 'came.' Although military movement
    is in view, 'came' best preserves the base verb without over-specifying manner.
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: The Hebrew form here corresponds more closely to 'Nebuchadrezzar,' but
    'Nebuchadnezzar' is the dominant standard English transliteration and is readily
    recognizable. The alternative is preserved in a footnote for auditability.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: Construct chain rendered as a royal title.
- source_word: וְכָל חֵילוֹ
  chosen: with all his army
  alternatives:
  - and all his army
  - with all his forces
  lexicon: HALOT
  rationale: חַיִל in military context denotes armed force/army. Rendering the conjunction
    plus following phrase as 'with all his army' makes clear accompaniment in idiomatic
    English while preserving the military sense.
- source_word: אֶל יְרוּשָׁלִַם
  chosen: to Jerusalem
  alternatives:
  - against Jerusalem
  lexicon: HALOT
  rationale: אֶל most basically means 'to/toward.' Since the next clause states the
    hostile action explicitly, 'to Jerusalem' avoids importing hostility into this
    preposition itself.
- source_word: וַיָּצֻרוּ עָלֶיהָ
  chosen: and they laid siege to it
  alternatives:
  - and they besieged it
  - and they encamped against it
  lexicon: HALOT
  rationale: The verb צור in this stem and context means to besiege/lay siege. 'They'
    naturally refers to Nebuchadnezzar's forces. 'Laid siege to it' is clear modern
    English and preserves the military action.
