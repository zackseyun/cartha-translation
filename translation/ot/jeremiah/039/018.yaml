id: JER.39.18
reference: Jeremiah 39:18
source:
  edition: WLC
  text: כִּ֤י מַלֵּט֙ אֲמַלֶּטְ/ךָ֔ וּ/בַ/חֶ֖רֶב לֹ֣א תִפֹּ֑ל וְ/הָיְתָ֨ה לְ/ךָ֤ נַפְשְׁ/ךָ֙ לְ/שָׁלָ֔ל כִּֽי בָטַ֥חְתָּ בִּ֖/י נְאֻם יְהוָֽה־־׃ס
translation:
  text: For I will surely rescue you, and you will not fall by the sword. Your life will be yours as plunder, because you have trusted in me, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''your life will be yours as plunder,'' a wartime idiom meaning you will escape with your life.'
    reason: cultural_note
  - marker: b
    text: Or 'I will certainly deliver you.' The Hebrew uses an infinitive absolute with a finite verb for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלֵּט אֲמַלֶּטְךָ
  chosen: I will surely rescue you
  alternatives:
  - I will certainly deliver you
  - I will indeed save you
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the promise. 'Surely rescue' preserves the emphatic force in natural English. 'Rescue' fits the immediate context of physical deliverance from danger better than the more theologically loaded 'save.'
- source_word: וּבַחֶרֶב לֹא תִפֹּל
  chosen: and you will not fall by the sword
  alternatives:
  - and you will not die by the sword
  - and you will not fall to the sword
  lexicon: HALOT
  rationale: נפל literally means 'fall'; in warfare contexts it commonly refers to being struck down. 'Fall by the sword' preserves the Hebrew idiom while remaining clear in English.
- source_word: וְהָיְתָה לְךָ נַפְשְׁךָ לְשָׁלָל
  chosen: Your life will be yours as plunder
  alternatives:
  - you will have your life as spoil
  - your life will be to you for booty
  lexicon: HALOT
  rationale: This is a recurring Jeremiah idiom meaning one escapes with life alone, as if it were war plunder. 'Your life will be yours as plunder' preserves the metaphor and reads naturally. 'Life' is preferable to the more wooden 'soul' here because נֶפֶשׁ in this context denotes one's life.
- source_word: נַפְשְׁךָ
  chosen: your life
  alternatives:
  - your soul
  - yourself
  lexicon: HALOT
  rationale: In this survival context, נֶפֶשׁ refers to life rather than the immaterial soul. Rendering it 'life' avoids importing a narrower anthropological claim not demanded by the text.
- source_word: לְשָׁלָל
  chosen: as plunder
  alternatives:
  - as spoil
  - as booty
  lexicon: HALOT
  rationale: '''Plunder'' is contemporary and preserves the wartime metaphor. ''Spoil'' is possible but less idiomatic in modern singular usage; ''booty'' is semantically accurate but stylistically distracting in contemporary English.'
- source_word: כִּי בָטַחְתָּ בִּי
  chosen: because you have trusted in me
  alternatives:
  - because you have put your trust in me
  - because you trusted me
  lexicon: HALOT
  rationale: בטח conveys reliance or trust. 'Trusted in me' is idiomatic biblical English and preserves the relational object marked by ב. The perfect is rendered 'have trusted' to reflect the completed stance that grounds the promise.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic formula best rendered 'declares.' Per doctrine, יְהוָה is rendered 'the LORD,' not transliterated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving the convention of small-caps LORD in English representation.
