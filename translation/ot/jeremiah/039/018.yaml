- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of נֶפֶשׁ in the idiom 'your נפש as plunder'
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: The verse promises physical deliverance in wartime, so נֶפֶשׁ refers to one's life rather than making a technical statement about the soul. This preserves the text's immediate sense without importing doctrinal anthropology.
