id: JER.39.10
reference: Jeremiah 39:10
source:
  edition: WLC
  text: וּ/מִן הָ/עָ֣ם הַ/דַּלִּ֗ים אֲשֶׁ֤ר אֵין לָ/הֶם֙ מְא֔וּמָה הִשְׁאִ֛יר נְבוּזַרְאֲדָ֥ן
    רַב טַבָּחִ֖ים בְּ/אֶ֣רֶץ יְהוּדָ֑ה וַ/יִּתֵּ֥ן לָ/הֶ֛ם כְּרָמִ֥ים וִֽ/יגֵבִ֖ים
    בַּ/יּ֥וֹם הַ/הֽוּא־־־׃
translation:
  text: But some of the poorest of the people, who had nothing, Nebuzaradan the captain
    of the guard left in the land of Judah, and on that day he gave them vineyards
    and fields.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'cisterns' or 'winepresses' for the final term; the Hebrew word
      is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  chosen: But some of
  alternatives:
  - And from
  - But from
  lexicon: HALOT
  rationale: 'The conjunction plus preposition literally means ''and/from'' or ''but/from.''
    In English, the sense is partitive: Nebuzaradan left some from among the people.
    ''But some of'' captures both the contrast with the preceding context and the
    partitive force naturally.'
- source_word: הָעָם הַדַּלִּים
  chosen: the poorest of the people
  alternatives:
  - the poor of the people
  - the lowly people
  lexicon: HALOT
  rationale: The phrase denotes the poor among the population. 'The poorest of the
    people' renders the social-economic sense idiomatically in English and reflects
    the partitive construction.
- source_word: אֲשֶׁר אֵין לָהֶם מְאוּמָה
  chosen: who had nothing
  alternatives:
  - who had nothing at all
  - who had not anything
  lexicon: HALOT
  rationale: This relative clause emphasizes complete lack of possessions. 'Who had
    nothing' is clear modern English and preserves the absolute sense.
- source_word: הִשְׁאִיר
  chosen: left
  alternatives:
  - allowed to remain
  - left behind
  lexicon: HALOT
  rationale: The Hiphil of שׁאר here means to leave/remain. 'Left' is concise and
    fits the military-administrative context.
- source_word: נְבוּזַרְאֲדָן
  chosen: Nebuzaradan
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - the chief of the executioners
  - the chief butcher
  lexicon: HALOT
  rationale: This Babylonian official title is traditionally rendered 'captain of
    the guard.' Although the underlying noun can relate to slaughterers/bodyguards/executioners,
    in context it denotes Nebuzaradan's official role. The more literal alternatives
    are possible but less idiomatic and may over-specify.
- source_word: בְּאֶרֶץ יְהוּדָה
  chosen: in the land of Judah
  alternatives:
  - in the land of Yehudah
  - in Judah
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'Land of Judah' preserves the territorial
    sense better than simply 'in Judah.'
- source_word: וַיִּתֵּן לָהֶם
  chosen: he gave them
  alternatives:
  - and gave to them
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol. English omits the repeated subject naturally
    but retains it here for clarity.
- source_word: כְּרָמִים
  chosen: vineyards
  alternatives:
  - vineyards for cultivation
  lexicon: HALOT
  rationale: The noun plainly refers to vineyards.
- source_word: וִיגֵבִים
  chosen: fields
  alternatives:
  - cisterns
  - winepresses
  lexicon: HALOT
  rationale: The term is difficult and has been understood variously. In this context,
    paired with 'vineyards' and describing what was allotted to the poor, 'fields'
    best fits the likely sense of landed agricultural property. Because alternatives
    exist in the tradition, they are preserved in a footnote.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - that same day
  - in that day
  lexicon: HALOT
  rationale: Standard temporal expression. 'On that day' is the most natural modern
    rendering.
