id: JER.39.13
reference: Jeremiah 39:13
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֞ח נְבֽוּזַרְאֲדָ֣ן רַב טַבָּחִ֗ים וּ/נְבֽוּשַׁזְבָּ רַב סָרִ֔יס
    וְ/נֵרְגַ֥ל שַׂר אֶ֖צֶר רַב מָ֑ג וְ/כֹ֖ל רַבֵּ֥י מֶֽלֶךְ בָּבֶֽל־־־־־׃
translation:
  text: Nebuzaradan the captain of the guard, Nebushazban the chief officer, Nergal-sharezer
    the chief magus, and all the chief officials of the king of Babylon sent word.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, 'sent.' The Hebrew verb is elliptical here, and the following
      verse continues the action they initiated.
    reason: lexical_alternative
  - marker: b
    text: '''Chief officer'' translates a title that can also be rendered ''chief
      eunuch'' or ''chief court official.'''
    reason: lexical_alternative
  - marker: c
    text: '''Chief magus'' renders a Babylonian court title; traditionally some English
      versions leave it untranslated as ''Rab-mag.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent word
  alternatives:
  - sent
  - dispatched
  lexicon: HALOT
  rationale: The verb שׁלח is simply 'send.' In English, because the direct object
    is an implied delegation/message and the next verse continues the action, 'sent
    word' makes the elliptical usage read naturally without over-specifying what was
    sent. 'Sent' alone is possible but sounds abrupt in English.
- source_word: רַב טַבָּחִים
  chosen: captain of the guard
  alternatives:
  - chief of the executioners
  - chief butcher
  lexicon: HALOT
  rationale: This Akkadian-influenced court title is conventionally understood as
    the commander of the royal guard, not literally a culinary role. 'Captain of the
    guard' best conveys the office in readable English.
- source_word: רַב סָרִיס
  chosen: chief officer
  alternatives:
  - chief eunuch
  - chief court official
  lexicon: HALOT
  rationale: סָרִיס can denote a eunuch or, more broadly, a high court official. In
    Neo-Babylonian court context the official sense is likely, and English readers
    might over-literalize 'eunuch.' 'Chief officer' preserves rank without making
    an uncertain physiological claim.
- source_word: נְבֽוּשַׁזְבָּ
  chosen: Nebushazban
  rationale: Personal name transliterated per project policy to transliterate names
    rather than translate them.
- source_word: וְנֵרְגַל שַׂר אֶצֶר
  chosen: Nergal-sharezer
  alternatives:
  - Nergal-sar-ezer
  rationale: The sequence is a personal name, commonly rendered 'Nergal-sharezer'
    in English. This standard transliteration reflects the likely underlying Akkadian
    name more clearly than a hyper-literal segmentation.
- source_word: רַב מָג
  chosen: chief magus
  alternatives:
  - chief of the magi
  - Rab-mag
  lexicon: HALOT
  rationale: This is a Babylonian title. Rather than leave it untranslated as 'Rab-mag,'
    the translation renders the title's sense. 'Chief magus' is concise and preserves
    the foreign court setting; 'chief of the magi' is also possible.
- source_word: וְכֹל רַבֵּי מֶלֶךְ בָּבֶל
  chosen: and all the chief officials of the king of Babylon
  alternatives:
  - and all the princes of the king of Babylon
  - and all the officials of the king of Babylon
  lexicon: HALOT
  rationale: רַבֵּי here denotes leading officials/courtiers. 'Chief officials' communicates
    status better than the archaic or potentially misleading 'princes.'
