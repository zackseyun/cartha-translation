id: JER.39.9
reference: Jeremiah 39:9
source:
  edition: WLC
  text: וְ/אֵת֩ יֶ֨תֶר הָ/עָ֜ם הַ/נִּשְׁאָרִ֣ים בָּ/עִ֗יר וְ/אֶת הַ/נֹּֽפְלִים֙ אֲשֶׁ֣ר
    נָפְל֣וּ עָלָ֔י/ו וְ/אֵ֛ת יֶ֥תֶר הָ/עָ֖ם הַ/נִּשְׁאָרִ֑ים הֶגְלָ֛ה נְבֽוּזַר אֲדָ֥ן
    רַב טַבָּחִ֖ים בָּבֶֽל־־־׃
translation:
  text: As for the rest of the people who remained in the city, and the deserters
    who had gone over to him, together with the rest of the people who remained, Nebuzaradan,
    the captain of the guard, carried them away to Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who had defected to him.' The Hebrew idiom literally says 'those
      who had fallen to him,' a military expression for going over to the opposing
      side.
    reason: lexical_alternative
  - marker: b
    text: Hebrew repeats 'the rest of the people who remained.' The repetition has
      been preserved rather than smoothed out.
    reason: lexical_alternative
  - marker: c
    text: '''Captain of the guard'' renders a title literally related to ''chief of
      the slaughterers,'' an official Babylonian royal/military post.'
    reason: cultural_note
lexical_decisions:
- source_word: יֶתֶר
  chosen: the rest of
  alternatives:
  - the remainder of
  - those left of
  lexicon: HALOT
  rationale: יֶתֶר denotes what is left over or remaining. 'The rest of' is natural
    modern English and preserves the sense of remainder.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: Common collective term for the people. 'The people' is the most straightforward
    rendering in context.
- source_word: הַנִּשְׁאָרִים
  chosen: who remained
  alternatives:
  - who were left
  - the survivors
  lexicon: HALOT
  rationale: Niphal participle of שׁאר, indicating those left behind or remaining.
    'Who remained' fits the syntax and avoids overinterpreting as specifically 'survivors,'
    though that idea is implicit.
- source_word: בָּעִיר
  chosen: in the city
  alternatives:
  - within the city
  lexicon: HALOT
  rationale: Simple locative phrase; 'in the city' is idiomatic and precise.
- source_word: הַנֹּפְלִים אֲשֶׁר נָפְלוּ עָלָיו
  chosen: the deserters who had gone over to him
  alternatives:
  - those who had defected to him
  - the ones who fell away to him
  lexicon: HALOT
  rationale: The idiom נפל על/אל in military-political contexts means to defect or
    go over to a ruler or army. 'Deserters who had gone over to him' makes the idiom
    clear in English while preserving the hostile-war context. 'To him' most naturally
    refers to the Babylonian king/commander in the immediate narrative setting.
- source_word: וְאֵת יֶתֶר הָעָם הַנִּשְׁאָרִים
  chosen: together with the rest of the people who remained
  alternatives:
  - and the rest of the people who remained
  lexicon: HALOT
  rationale: The phrase repeats after the mention of deserters. The repetition is
    retained rather than collapsed, since it is present in the Hebrew. 'Together with'
    helps the English flow while preserving the additive force.
- source_word: הֶגְלָה
  chosen: carried them away
  alternatives:
  - took into exile
  - deported
  lexicon: HALOT
  rationale: Hiphil of גלה means to lead away into exile. 'Carried them away' is a
    readable rendering that preserves the forced movement; 'to Babylon' completes
    the exile sense. 'Deported' is possible but sounds more bureaucratic and modern.
- source_word: נְבוּזַר אֲדָן
  chosen: Nebuzaradan
  lexicon: HALOT
  rationale: Personal name is transliterated per translation philosophy.
- source_word: רַב טַבָּחִים
  chosen: the captain of the guard
  alternatives:
  - the chief of the executioners
  - the chief butcher
  lexicon: HALOT
  rationale: This official title literally relates to slaughterers/bodyguards, but
    in royal and military contexts it denotes the captain of the guard. This is the
    established sense in context and avoids a misleadingly wooden rendering.
- source_word: בָּבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Standard English form of the place name.
