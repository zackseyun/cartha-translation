theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for YHWH, following Jewish reverence tradition and the Septuagintal pattern. No contextual factor here compels deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
revisions:
- timestamp: '2026-04-21T12:32:23Z'
  adjudicator: auto_apply_tier1
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/ot/jeremiah/042/011.json
  category: awkward_english
  tier: 1
  from: whom you are fearing
  to: whom you fear
  rationale: The current rendering accurately attempts to capture the continuous aspect of the Hebrew participle (יְרֵאִים). However, the phrase 'whom you are fearing' is slightly unnatural in English. While grammatically possible, it can sound stilted. The more common and idiomatic 'whom you fear' conveys the same essential meaning within the context, as the ongoing nature of their fear is already established. The gain in English fluency may outweigh the loss of the explicit continuous marker, which is often implied in such constructions.
