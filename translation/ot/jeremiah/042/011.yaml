id: JER.42.11
reference: Jeremiah 42:11
source:
  edition: WLC
  text: אַל תִּֽירְא֗וּ מִ/פְּנֵי֙ מֶ֣לֶךְ בָּבֶ֔ל אֲשֶׁר אַתֶּ֥ם יְרֵאִ֖ים מִ/פָּנָ֑י/ו אַל תִּֽירְא֤וּ מִמֶּ֨/נּוּ֙ נְאֻם יְהוָ֔ה כִּֽי אִתְּ/כֶ֣ם אָ֔נִי לְ/הוֹשִׁ֧יעַ אֶתְ/כֶ֛ם וּ/לְ/הַצִּ֥יל אֶתְ/כֶ֖ם מִ/יָּדֽ/וֹ־־־־־׃
translation:
  text: Do not fear the king of Babylon, whom you fear. Do not fear him, declares the LORD, for I am with you to save you and to deliver you from his hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Yahweh.'' The main text follows the project''s standard rendering ''the LORD'' for the divine name יְהוָה.'
    reason: alternative_reading
  - marker: b
    text: Or 'whom you are fearing'.
    reason: previous_rendering
lexical_decisions:
- source_word: תִּירְאוּ / יְרֵאִים
  chosen: fear / are fearing
  alternatives:
  - be afraid of / are afraid of
  lexicon: HALOT
  rationale: The repeated forms from ירא emphasize fear as an ongoing response. Rendering the first imperative as 'Do not fear' and the participial clause as 'whom you are fearing' preserves the lexical repetition and the present sense of the participle better than smoothing both to 'be afraid.'
- source_word: מִפְּנֵי ... מִפָּנָיו
  chosen: the king of Babylon, whom you are fearing
  alternatives:
  - before the king of Babylon
  - because of the king of Babylon
  lexicon: HALOT
  rationale: The idiom with מִן + פָּנִים after ירא means fearing someone, literally 'from before the face of.' Natural English drops the facial idiom while retaining the object of fear.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: This is the standard construct rendering and is the clearest natural English equivalent.
- source_word: מִמֶּנּוּ
  chosen: him
  alternatives:
  - from him
  lexicon: HALOT
  rationale: After ירא, the preposition is idiomatic and not normally carried into English. 'Do not fear him' is the natural rendering.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: '''Declares the LORD'' is a clear modern English rendering of the prophetic formula. Per doctrine, יְהוָה is rendered ''the LORD'' rather than transliterated.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's contested-terms policy for the divine name, preserving the traditional reverential rendering in the main text.
- source_word: כִּי אִתְּכֶם אָנִי
  chosen: for I am with you
  alternatives:
  - because I am with you
  lexicon: HALOT
  rationale: This clause grounds the command not to fear. 'For I am with you' is both natural and close to the Hebrew word order and emphasis.
- source_word: לְהוֹשִׁיעַ
  chosen: to save you
  alternatives:
  - to bring you salvation
  - to rescue you
  lexicon: HALOT
  rationale: The Hiphil of ישׁע commonly means 'save' or 'deliver.' Here 'save' pairs well with the following distinct verb and preserves a useful lexical distinction.
- source_word: וּלְהַצִּיל
  chosen: and to deliver you
  alternatives:
  - and to rescue you
  lexicon: HALOT
  rationale: Using 'deliver' for נצל avoids collapsing it into the same English gloss as ישׁע, while still sounding natural in modern English.
- source_word: מִיָּדוֹ
  chosen: from his hand
  alternatives:
  - from his power
  - out of his grasp
  lexicon: HALOT
  rationale: '''Hand'' is a common Hebrew metaphor for power or control. Retaining ''from his hand'' preserves the biblical idiom and remains understandable in English.'
