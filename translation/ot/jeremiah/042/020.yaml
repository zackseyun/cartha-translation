theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. No contextual factor here requires deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of the accusation התעיתם בנפשותיכם
  chosen_reading: For you deceived yourselves
  alternative_readings:
  - For you have gone astray at the cost of your lives
  - For you have made a fatal mistake
  rationale: The verse can be taken either as self-deception or as self-endangerment.
    The immediate discourse centers on their insincere request for divine guidance
    and refusal to obey, so self-deception is the best main-text rendering. The self-destructive
    nuance is preserved in a footnote.
