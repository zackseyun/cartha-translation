id: JER.42.20
reference: Jeremiah 42:20
source:
  edition: WLC
  text: כִּ֣י התעתי/ם בְּ/נַפְשֽׁוֹתֵי/כֶם֒ כִּֽי אַתֶּ֞ם שְׁלַחְתֶּ֣ם אֹתִ֗/י אֶל
    יְהוָ֤ה אֱלֹֽהֵי/כֶם֙ לֵ/אמֹ֔ר הִתְפַּלֵּ֣ל בַּעֲדֵ֔/נוּ אֶל יְהוָ֖ה אֱלֹהֵ֑י/נוּ
    וּ/כְ/כֹל֩ אֲשֶׁ֨ר יֹאמַ֜ר יְהוָ֧ה אֱלֹהֵ֛י/נוּ כֵּ֥ן הַגֶּד לָ֖/נוּ וְ/עָשִֽׂינוּ־־־־׃
translation:
  text: For you deceived yourselves, because you sent me to the LORD your God, saying,
    ‘Pray for us to the LORD our God, and whatever the LORD our God says, tell us,
    and we will do it.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'you have gone astray at the cost of your lives,' highlighting the self-destructive
      force of the Hebrew expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: התעיתם
  chosen: you deceived yourselves
  alternatives:
  - you went astray at the cost of your lives
  - you made a fatal mistake
  - you erred against yourselves
  lexicon: HALOT
  rationale: The Hiphil of תעה with בְּנַפְשׁוֹתֵיכֶם is difficult. In context Jeremiah
    rebukes them for self-deception in pretending willingness to obey. 'You deceived
    yourselves' best captures the reflexive/resultative sense in idiomatic English
    while preserving the charge of culpable self-misleading. Alternatives reflecting
    danger to life are possible, but the immediate context emphasizes duplicity and
    self-delusion.
- source_word: בְּנַפְשׁוֹתֵיכֶם
  chosen: yourselves
  alternatives:
  - against your own lives
  - at the cost of your lives
  - in your own selves
  lexicon: HALOT
  rationale: נֶפֶשׁ can mean 'life,' 'self,' or 'person.' Here the prepositional phrase
    functions idiomatically with the preceding verb. Rendering it as 'yourselves'
    gives natural English and matches the reflexive force of the accusation. A more
    literal 'against your own lives' is possible and is preserved in a footnote because
    it highlights the self-destructive dimension.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    This follows the stated house style and preserves the covenant-name convention
    in English.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with second person plural suffix. 'Your God'
    preserves Jeremiah's wording when recounting their request.
- source_word: הִתְפַּלֵּל בַּעֲדֵנוּ
  chosen: Pray for us
  alternatives:
  - Intercede for us
  - Pray on our behalf
  lexicon: HALOT
  rationale: The Hitpael of פלל here means to pray/intercede, and בַּעַד marks behalf.
    'Pray for us' is clear modern English; 'intercede' is possible but less accessible.
- source_word: וּכְכֹל אֲשֶׁר יֹאמַר
  chosen: and whatever ... says
  alternatives:
  - and according to all that ... says
  - and everything that ... says
  lexicon: HALOT
  rationale: The phrase literally means 'and according to all that ... says.' In English,
    'whatever ... says' best conveys comprehensive scope without awkwardness.
- source_word: הַגֶּד לָנוּ
  chosen: tell us
  alternatives:
  - declare to us
  - report to us
  lexicon: HALOT
  rationale: The imperative of נגד means to tell, declare, or report. 'Tell us' is
    the most natural equivalent in this quoted request.
- source_word: וְעָשִׂינוּ
  chosen: and we will do it
  alternatives:
  - and we will do
  - and we will act accordingly
  lexicon: HALOT
  rationale: The verb 'do' has an implied object from the preceding message. Supplying
    'it' is natural in English and makes explicit that they promise obedience to the
    word reported.
