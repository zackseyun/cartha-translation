theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by the project's contested-terms policy for YHWH.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Speaker's phrasing 'the LORD your God'
  chosen_reading: your God
  alternative_readings:
  - our God
  rationale: The Hebrew explicitly has second masculine singular suffix addressed
    to Jeremiah. The translation preserves the relational distance implied by the
    speakers' wording and does not harmonize it.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, original-language primacy
    over translation tradition'
