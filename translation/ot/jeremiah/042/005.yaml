id: JER.42.5
reference: Jeremiah 42:5
source:
  edition: WLC
  text: וְ/הֵ֨מָּה֙ אָמְר֣וּ אֶֽל יִרְמְיָ֔הוּ יְהִ֤י יְהוָה֙ בָּ֔/נוּ לְ/עֵ֖ד אֱמֶ֣ת
    וְ/נֶאֱמָ֑ן אִם לֹ֡א כְּֽ/כָל הַ֠/דָּבָר אֲשֶׁ֨ר יִֽשְׁלָחֲ/ךָ֜ יְהוָ֧ה אֱלֹהֶ֛י/ךָ
    אֵלֵ֖י/נוּ כֵּ֥ן נַעֲשֶֽׂה־־־׃
translation:
  text: And they said to Jeremiah, “May the LORD be a true and faithful witness against
    us if we do not do according to every word that the LORD your God sends to us
    through you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'May the LORD be among us a true and faithful witness.' The Hebrew phrase
      can be taken more literally as 'in/among us,' but in this oath context it likely
      carries the sense of witness against the speakers if they fail to obey.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'that the LORD your God sends you to us.' The English 'sends
      to us through you' makes explicit the implied message-bearing sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהִי
  chosen: May ... be
  alternatives:
  - Let ... be
  lexicon: HALOT
  rationale: Jussive of היה expresses a wish or invocation. 'May the LORD be' is natural
    modern English for an oath-like appeal.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering of the divine name יְהוָה as
    'the LORD'.
- source_word: בָּנוּ
  chosen: against us
  alternatives:
  - among us
  - for us
  lexicon: HALOT
  rationale: With לְעֵד in oath contexts, the sense is that YHWH would stand as witness
    against them if they fail to obey. 'Against us' best captures the juridical force
    in context.
- source_word: לְעֵד
  chosen: a witness
  alternatives:
  - as witness
  lexicon: HALOT
  rationale: Keeps the legal/testimonial sense of עֵד in a solemn oath formula.
- source_word: אֱמֶת וְנֶאֱמָן
  chosen: true and faithful
  alternatives:
  - true and trustworthy
  - faithful and reliable
  lexicon: HALOT
  rationale: The pair emphasizes the reliability of the witness invoked. 'True and
    faithful' is concise, natural, and preserves both elements.
- source_word: אִם לֹא
  chosen: if we do not
  alternatives:
  - surely if not
  - unless
  lexicon: HALOT
  rationale: In this oath construction, the phrase introduces the condition under
    which the invoked witness would testify against them. 'If we do not' communicates
    the sense clearly in English.
- source_word: כְּכָל הַדָּבָר
  chosen: according to every word
  alternatives:
  - according to the whole message
  - in keeping with everything said
  lexicon: HALOT
  rationale: דבר here refers to the message/word from the LORD. 'Every word' preserves
    the comprehensiveness and formal tone of the pledge.
- source_word: יִשְׁלָחֲךָ
  chosen: sends to us through you
  alternatives:
  - sends you to us with
  - sends to us by your hand
  lexicon: HALOT
  rationale: Literally 'sends you' with the message implied; in English the idiomatic
    sense is that the LORD sends a word to them through Jeremiah. This makes explicit
    what Hebrew leaves implicit without adding new content.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward construct with pronominal suffix. Retaining 'your God'
    reflects their wording to Jeremiah rather than smoothing it to 'our God.'
- source_word: כֵּן נַעֲשֶׂה
  chosen: we do
  alternatives:
  - we will do so
  - so we will do
  lexicon: HALOT
  rationale: Because the English sentence is framed with 'if we do not do,' the positive
    apodosis is best represented idiomatically within that oath structure rather than
    repeated woodenly. The sense remains their pledge to act accordingly.
