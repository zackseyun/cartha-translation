id: JER.42.19
reference: Jeremiah 42:19
source:
  edition: WLC
  text: דִּבֶּ֨ר יְהוָ֤ה עֲלֵי/כֶם֙ שְׁאֵרִ֣ית יְהוּדָ֔ה אַל תָּבֹ֖אוּ מִצְרָ֑יִם
    יָדֹ֨עַ֙ תֵּֽדְע֔וּ כִּי הַעִידֹ֥תִי בָ/כֶ֖ם הַ/יּֽוֹם־־׃
translation:
  text: 'The LORD has spoken concerning you, remnant of Judah: Do not go to Egypt.
    Know for certain that I have warned you today.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I have solemnly testified against you today.' The Hebrew verb can carry
      the sense of giving formal witness or warning.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבֶּר
  chosen: has spoken
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: The perfect verb reports a completed divine utterance with present relevance.
    'Has spoken' preserves the force in natural English, while 'spoke' is possible
    but slightly less vivid.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the covenant name יְהוָה is rendered 'the LORD' rather
    than transliterated.
- source_word: עֲלֵיכֶם
  chosen: concerning you
  alternatives:
  - against you
  - to you
  lexicon: HALOT
  rationale: עַל with דבר commonly means 'concerning/about' in this construction.
    'Against you' would overstate hostility here; the content is a warning addressed
    to them.
- source_word: שְׁאֵרִית יְהוּדָה
  chosen: remnant of Judah
  alternatives:
  - survivors of Judah
  - rest of Judah
  lexicon: HALOT
  rationale: '''Remnant'' is the standard and theologically resonant rendering for
    שְׁאֵרִית, especially in prophetic literature, while still fitting the immediate
    historical sense.'
- source_word: אַל תָּבֹאוּ
  chosen: Do not go
  alternatives:
  - Do not enter
  - You must not go
  lexicon: HALOT
  rationale: The negative imperative/jussive prohibits the action. 'Go' is the most
    idiomatic English in context of travel to a land; 'enter' is more literal but
    less natural here.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard English place-name rendering.
- source_word: יָדֹעַ תֵּדְעוּ
  chosen: Know for certain
  alternatives:
  - Surely know
  - You must surely know
  - Know well
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the command/assertion.
    'Know for certain' communicates the emphatic force in clear modern English.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Introduces the content of what they are to know. 'That' best fits the
    clause in English.
- source_word: הַעִידֹתִי בָכֶם
  chosen: I have warned you
  alternatives:
  - I have testified against you
  - I have solemnly testified to you
  lexicon: HALOT
  rationale: The Hiphil of עוּד can mean to warn, testify, or solemnly witness. In
    this context Jeremiah is giving a solemn warning. 'Warned you' best captures the
    communicative function, while the more formal 'testified against you' is preserved
    as an alternative because the preposition ב can support an adversative nuance.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is the natural modern English equivalent; ''this day'' is
    more formal but not necessary.'
