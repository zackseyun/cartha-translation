theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: The LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton and aligns
    with the translation's broader convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether שְׁאֵרִית should be rendered with theological resonance
  chosen_reading: remnant of Judah
  alternative_readings:
  - survivors of Judah
  - rest of Judah
  rationale: In Jeremiah, 'remnant' carries both historical and theological weight.
    This rendering preserves that tension without importing extra doctrinal claims.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
