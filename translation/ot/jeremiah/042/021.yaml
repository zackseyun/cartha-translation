id: JER.42.21
reference: Jeremiah 42:21
source:
  edition: WLC
  text: וָ/אַגִּ֥ד לָ/כֶ֖ם הַ/יּ֑וֹם וְ/לֹ֣א שְׁמַעְתֶּ֗ם בְּ/קוֹל֙ יְהוָ֣ה אֱלֹֽהֵי/כֶ֔ם וּ/לְ/כֹ֖ל אֲשֶׁר שְׁלָחַ֥/נִי אֲלֵי/כֶֽם־׃
translation:
  text: I have told you today, but you have not obeyed the voice of Yahweh your God or anything for which he sent me to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I told you today, but you did not listen to the voice of the LORD your God, or to all that he sent me to you with.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַגִּד
  chosen: I have told
  alternatives:
  - I told
  - I declare
  lexicon: HALOT
  rationale: Hiphil of נגד commonly means to tell, declare, or make known. Given the immediate context of Jeremiah reporting the LORD's answer and the present relevance of that report, 'I have told' communicates the completed action with current force in natural English.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: The adverbial accusative means 'today' or 'this day.' 'Today' is the most natural modern English rendering while preserving the temporal emphasis.
- source_word: וְלֹא שְׁמַעְתֶּם
  chosen: but you have not obeyed
  alternatives:
  - and you have not listened
  - and you have not heard
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל regularly carries the sense of listening with obedience, not mere auditory hearing. 'Obeyed' best captures the covenantal force in English.
- source_word: בְּקוֹל
  chosen: the voice of
  alternatives:
  - the sound of
  - the command of
  lexicon: HALOT
  rationale: קוֹל is literally 'voice.' In the idiom 'obey the voice of,' retaining 'voice' preserves the Hebrew expression while remaining intelligible in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: 'Straightforward construct with second person plural suffix: ''your God.'''
- source_word: וּלְכֹל אֲשֶׁר
  chosen: in anything that
  alternatives:
  - or in all that
  - and in everything that
  lexicon: HALOT
  rationale: The phrase links disobedience to the entirety of the message Jeremiah was sent with. English idiom works best as 'in anything that he sent me to you,' expressing failure to obey in the whole matter.
- source_word: שְׁלָחַנִי אֲלֵיכֶם
  chosen: he sent me to you
  alternatives:
  - he sent me to you with
  - he commissioned me to you
  lexicon: HALOT
  rationale: שׁלח with personal object and אֶל marks sending a messenger to a people. 'He sent me to you' is the plain sense; the content of the sending is implied by the broader clause.
