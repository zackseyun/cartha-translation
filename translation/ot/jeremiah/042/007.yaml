id: JER.42.7
reference: Jeremiah 42:7
source:
  edition: WLC
  text: וַ/יְהִ֕י מִ/קֵּ֖ץ עֲשֶׂ֣רֶת יָמִ֑ים וַ/יְהִ֥י דְבַר יְהוָ֖ה אֶֽל יִרְמְיָֽהוּ־־׃
translation:
  text: And it happened, at the end of ten days, that the word of Yahweh came to Jeremiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''after/from the end of ten days''; that is, when ten days had ended.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Now it happened
  lexicon: HALOT
  rationale: The waw-consecutive form of היה introduces the narrative development. 'And it happened' preserves the Hebrew narrative formula in readable modern English without archaic 'came to pass.'
- source_word: מִקֵּץ
  chosen: at the end of
  alternatives:
  - after
  - from the end of
  lexicon: HALOT
  rationale: The preposition מִן with קֵץ marks the completion point of a period. 'At the end of' is the most natural English equivalent while retaining the temporal boundary sense more precisely than the simpler 'after.'
- source_word: עֲשֶׂרֶת יָמִים
  chosen: ten days
  lexicon: HALOT
  rationale: Straightforward cardinal-number-plus-noun construction. 'Ten days' is the natural English rendering.
- source_word: וַיְהִי
  chosen: that ... came
  alternatives:
  - and ... was
  - and there came
  lexicon: HALOT
  rationale: In the clause 'and the word of the LORD came,' English idiom is best expressed by rendering the second ויהי with the following subject-predicate construction rather than repeating 'and it happened' woodenly.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: This is a standard prophetic formula. 'The word of the LORD' preserves the established biblical idiom and the sense of divine revelation more precisely than the more interpretive 'message.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks direction toward Jeremiah; 'to' is the standard modern English equivalent.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  alternatives:
  - Yirmeyahu
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention; 'Jeremiah' is the established and recognizable form.
