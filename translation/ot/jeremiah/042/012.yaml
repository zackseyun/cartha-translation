id: JER.42.12
reference: Jeremiah 42:12
source:
  edition: WLC
  text: וְ/אֶתֵּ֥ן לָ/כֶ֛ם רַחֲמִ֖ים וְ/רִחַ֣ם אֶתְ/כֶ֑ם וְ/הֵשִׁ֥יב אֶתְ/כֶ֖ם אֶל
    אַדְמַתְ/כֶֽם־׃
translation:
  text: And I will grant you compassion, and he will have compassion on you and restore
    you to your own land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And I will give you mercy, and he will show you mercy and bring you
      back to your land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אֶתֵּן
  chosen: And I will grant
  alternatives:
  - And I will give
  lexicon: HALOT
  rationale: נתן literally means 'give.' Here 'grant' is a natural English rendering
    with an abstract object ('compassion') while preserving the first-person divine
    promise.
- source_word: לָ/כֶם
  chosen: you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: The preposition ל marks the indirect object. In English, 'grant you'
    naturally incorporates the sense without requiring 'to.'
- source_word: רַחֲמִים
  chosen: compassion
  alternatives:
  - mercy
  - tender mercies
  - pity
  lexicon: HALOT
  rationale: רַחֲמִים denotes compassion/mercy. 'Compassion' fits modern readable
    English and avoids redundancy with the following cognate verb while preserving
    the emotional sense.
- source_word: וְ/רִחַם
  chosen: and he will have compassion
  alternatives:
  - and he will show mercy
  - and he will be merciful
  lexicon: HALOT
  rationale: The verb רחם is cognate with רַחֲמִים. Rendering it with 'have compassion'
    preserves the lexical connection. The subject is third masculine singular, referring
    in context to the king of Babylon, so it should not be collapsed into another
    first-person divine action.
- source_word: אֶתְ/כֶם
  chosen: on you
  alternatives:
  - you
  lexicon: HALOT
  rationale: With רחם, English idiom normally uses 'have compassion on' rather than
    a bare object, though the Hebrew marks the direct object.
- source_word: וְ/הֵשִׁיב
  chosen: and restore
  alternatives:
  - and bring back
  - and cause to return
  lexicon: HALOT
  rationale: The Hiphil of שוב can mean 'cause to return' or 'restore.' Given the
    destination phrase 'to your land,' 'restore' is concise and idiomatic while retaining
    the causative sense.
- source_word: אֶל
  chosen: to
  alternatives:
  - into
  lexicon: HALOT
  rationale: אֶל marks movement toward a destination; 'to' is the standard rendering
    here.
- source_word: אַדְמַתְ/כֶם
  chosen: your own land
  alternatives:
  - your land
  - your soil
  - your ground
  lexicon: HALOT
  rationale: אדמה is literally 'ground/land.' In this restoration context, 'land'
    is the natural English choice. 'Your own land' brings out the possessive force
    naturally in English without adding new content.
