theological_decisions:
- issue: Subject shift between divine first person and third masculine singular verbs
  chosen_reading: 'Maintain the shift: God says ''I will grant,'' then ''he will have
    compassion ... and restore,'' referring to the Babylonian ruler as the human agent
    moved by God.'
  alternative_readings:
  - 'Smooth all verbs into divine first person: ''I will ... have compassion ... restore'''
  rationale: The Hebrew text explicitly shifts from first person singular אֶתֵּן to
    third masculine singular רִחַם and הֵשִׁיב. Preserving this shift avoids importing
    a harmonization not warranted by the source and fits the immediate context of
    God influencing the king of Babylon to show mercy and allow return.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
