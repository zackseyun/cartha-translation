id: JER.42.14
reference: Jeremiah 42:14
source:
  edition: WLC
  text: לֵ/אמֹ֗ר לֹ֚א כִּ֣י אֶ֤רֶץ מִצְרַ֨יִם֙ נָב֔וֹא אֲשֶׁ֤ר לֹֽא נִרְאֶה֙ מִלְחָמָ֔ה
    וְ/ק֥וֹל שׁוֹפָ֖ר לֹ֣א נִשְׁמָ֑ע וְ/לַ/לֶּ֥חֶם לֹֽא נִרְעָ֖ב וְ/שָׁ֥ם נֵשֵֽׁב־־׃
translation:
  text: saying, ‘No, but we will go into the land of Egypt, where we will not see
    war, and the sound of the trumpet we will not hear, and for bread we will not
    be hungry; and there we will live.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and there we will dwell.' The Hebrew verb can denote settled residence
      as well as simply remaining somewhere.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: Introduces the content of the people's quoted response. English participial
    'saying' is idiomatic and preserves the discourse linkage to the previous verse.
- source_word: לֹא כִּי
  chosen: No, but
  alternatives:
  - No; rather
  - No indeed, for
  lexicon: HALOT
  rationale: This combination functions as a strong rejection followed by a contrary
    resolve. 'No, but' captures the adversative force without over-paraphrasing.
- source_word: אֶרֶץ מִצְרַיִם
  chosen: the land of Egypt
  alternatives:
  - Egypt
  lexicon: HALOT
  rationale: Retains the explicit noun 'land,' which is present in the Hebrew and
    contributes to the formal texture of the statement.
- source_word: נָבֹוא
  chosen: we will go into
  alternatives:
  - we will enter
  - we will go
  lexicon: HALOT
  rationale: The verb בוא with a destination naturally means entering/going into.
    'Go into' is clear modern English and preserves the directional sense.
- source_word: אֲשֶׁר
  chosen: where
  alternatives:
  - which
  - in which
  lexicon: HALOT
  rationale: Here the relative introduces characteristics of the land of Egypt. 'Where'
    is the most natural English equivalent for a place antecedent.
- source_word: לֹא נִרְאֶה מִלְחָמָה
  chosen: we will not see war
  alternatives:
  - we will not experience war
  - we will not look upon war
  lexicon: HALOT
  rationale: The Hebrew literally says 'see war.' This is intelligible in English
    and preserves the concrete imagery better than the more interpretive 'experience
    war.'
- source_word: קוֹל שׁוֹפָר
  chosen: the sound of the trumpet
  alternatives:
  - the sound of the horn
  - the trumpet blast
  lexicon: HALOT
  rationale: שׁוֹפָר is a ram's horn/trumpet used for alarm. 'Trumpet' is the most
    familiar English rendering; 'sound of the trumpet' closely follows the Hebrew
    construct phrase.
- source_word: לֹא נִשְׁמָע
  chosen: we will not hear
  alternatives:
  - it will not be heard by us
  lexicon: HALOT
  rationale: Although the form is passive-like in morphology listing, in context with
    first person plural sense it is best rendered idiomatically as 'we will not hear,'
    matching the sequence of first person plural verbs.
- source_word: וְלַלֶּחֶם לֹא נִרְעָב
  chosen: and for bread we will not be hungry
  alternatives:
  - and we will not hunger for bread
  - and we will not be hungry for food
  lexicon: HALOT
  rationale: The preposition with 'bread' is preserved as 'for bread,' reflecting
    the Hebrew construction and keeping the concrete staple-food imagery. 'Bread'
    is preferable to the broader 'food' because the source text is specific.
- source_word: וְשָׁם נֵשֵׁב
  chosen: and there we will live
  alternatives:
  - and there we will dwell
  - and there we will stay
  lexicon: HALOT
  rationale: ישׁב can mean sit, dwell, remain, or live. In this context of relocating
    to Egypt, 'live' communicates settled residence in natural English; 'dwell' is
    possible but less contemporary.
