id: JER.42.8
reference: Jeremiah 42:8
source:
  edition: WLC
  text: וַ/יִּקְרָ֗א אֶל יֽוֹחָנָן֙ בֶּן קָרֵ֔חַ וְ/אֶ֛ל כָּל שָׂרֵ֥י הַ/חֲיָלִ֖ים
    אֲשֶׁ֣ר אִתּ֑/וֹ וּ/לְ/כָ֨ל הָ/עָ֔ם לְ/מִ/קָּטֹ֥ן וְ/עַד גָּדֽוֹל־־־־־׃
translation:
  text: Then he called Johanan son of Kareah, all the commanders of the forces who
    were with him, and all the people, from the least to the greatest,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: Then he called
  alternatives:
  - And he called
  - Then he summoned
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, so 'Then' captures the sequential
    force in natural English. 'Called' is the plain sense of קרא here; 'summoned'
    is possible but slightly stronger than the context requires.
- source_word: אֶל
  chosen: —
  alternatives:
  - to
  lexicon: HALOT
  rationale: The preposition marks the addressees of the calling ('called to' / 'called').
    In idiomatic English after 'called' the object can be expressed directly without
    repeating 'to' before each group.
- source_word: יוֹחָנָן
  chosen: Johanan
  rationale: Personal names are transliterated by standard English convention.
- source_word: בֶּן־קָרֵחַ
  chosen: son of Kareah
  rationale: A straightforward patronymic; 'son of' is retained rather than reduced
    to a modern surname-like form.
- source_word: כָּל שָׂרֵי הַחֲיָלִים
  chosen: all the commanders of the forces
  alternatives:
  - all the captains of the forces
  - all the commanders of the troops
  lexicon: HALOT
  rationale: שָׂרִים are leaders/officials; in military context 'commanders' is clear
    modern English. חֲיָלִים refers to military forces/troops. 'Forces' preserves
    the collective sense without sounding archaic like 'captains.'
- source_word: אֲשֶׁר אִתּוֹ
  chosen: who were with him
  alternatives:
  - who were with him there
  lexicon: HALOT
  rationale: This relative clause most naturally modifies the military leaders and
    indicates their association with Johanan in the present scene. 'Were' is supplied
    for English syntax.
- source_word: וּלְכָל הָעָם
  chosen: and all the people
  alternatives:
  - and to all the people
  lexicon: HALOT
  rationale: The lamed marks the additional group addressed. English idiom prefers
    simple coordination after 'called.' הָעָם is best rendered 'the people' here,
    referring to the gathered community.
- source_word: לְמִקָּטֹן וְעַד גָּדוֹל
  chosen: from the least to the greatest
  alternatives:
  - from the smallest to the greatest
  - from the least to the greatest of them
  lexicon: HALOT
  rationale: This is a common idiom indicating the full social range of the people.
    'Least' and 'greatest' preserves the idiomatic force better than a more literal
    size-based rendering.
