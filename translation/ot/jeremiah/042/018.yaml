theological_decisions:
- issue: Rendering the paired divine-judgment terms אַף and חֵמָה
  chosen_reading: my anger and my wrath
  alternative_readings:
  - my anger and my fury
  - my nostrils and my wrath
  rationale: The verse stacks near-synonymous terms for divine judgment. Rendering
    both preserves the rhetorical intensity without collapsing them into one English
    word. The anthropomorphic literal sense of אַף is not carried over because the
    idiom clearly means anger here.
