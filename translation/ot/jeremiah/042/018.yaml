id: JER.42.18
reference: Jeremiah 42:18
source:
  edition: WLC
  text: כִּי֩ כֹ֨ה אָמַ֜ר יְהוָ֣ה צְבָאוֹת֮ אֱלֹהֵ֣י יִשְׂרָאֵל֒ כַּ/אֲשֶׁר֩ נִתַּ֨ךְ
    אַפִּ֜/י וַ/חֲמָתִ֗/י עַל יֹֽשְׁבֵי֙ יְר֣וּשָׁלִַ֔ם כֵּ֣ן תִּתַּ֤ךְ חֲמָתִ/י֙
    עֲלֵי/כֶ֔ם בְּ/בֹאֲ/כֶ֖ם מִצְרָ֑יִם וִ/הְיִיתֶ֞ם לְ/אָלָ֤ה וּ/לְ/שַׁמָּה֙ וְ/לִ/קְלָלָ֣ה
    וּ/לְ/חֶרְפָּ֔ה וְ/לֹֽא תִרְא֣וּ ע֔וֹד אֶת הַ/מָּק֖וֹם הַ/זֶּֽה־־־׃
translation:
  text: 'For thus says the LORD of hosts, the God of Israel: Just as my anger and
    my wrath were poured out on the inhabitants of Jerusalem, so my wrath will be
    poured out on you when you enter Egypt, and you will become an oath, a horror,
    a curse, and a reproach, and you will never again see this place.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an object of cursing' or 'a curse-oath'; the Hebrew term can refer to
      an oath that invokes a curse.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional small-caps covenantal substitute in English rather than transliteration.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'hosts' is the established and still comprehensible
    rendering that preserves the breadth of heavenly and earthly armies, not merely
    human military forces.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct rendering identifying Israel's covenant God.
- source_word: נִתַּךְ ... תִּתַּךְ
  chosen: were poured out ... will be poured out
  alternatives:
  - were poured forth ... will be poured forth
  - were unleashed ... will be unleashed
  lexicon: HALOT
  rationale: The verb conveys something being poured out or emptied. 'Poured out'
    preserves the metaphor of wrath as a liquid being discharged and matches the parallel
    past/future forms.
- source_word: אַפִּי
  chosen: my anger
  alternatives:
  - my nose
  - my wrath
  lexicon: HALOT
  rationale: Though literally related to 'nose,' in this idiom it denotes anger. 'Anger'
    distinguishes it from the following חֵמָה/חֲמָה, allowing both terms to be represented.
- source_word: חֲמָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my heat
  lexicon: HALOT
  rationale: Chosen to pair naturally with 'anger' while preserving the intensified
    sense of divine indignation.
- source_word: יֹשְׁבֵי יְרוּשָׁלִַם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - those dwelling in Jerusalem
  - the residents of Jerusalem
  lexicon: HALOT
  rationale: Idiomatic English rendering of the participial expression for those living
    in the city.
- source_word: בְּבֹאֲכֶם מִצְרָיִם
  chosen: when you enter Egypt
  alternatives:
  - when you go into Egypt
  - in your coming to Egypt
  lexicon: HALOT
  rationale: Temporal use of ב with infinitive construct is best rendered 'when.'
    'Enter Egypt' is natural English and fits the warning context.
- source_word: לְאָלָה
  chosen: an oath
  alternatives:
  - a curse-formula
  - an object of cursing
  lexicon: HALOT
  rationale: אָלָה often denotes an oath, especially one invoking a curse. Here it
    refers to becoming a byword in imprecations. 'An oath' is retained in the main
    text as the more direct lexical equivalent, with the curse nuance reflected by
    the surrounding terms and footnote.
- source_word: לְשַׁמָּה
  chosen: a horror
  alternatives:
  - an astonishment
  - a desolation
  lexicon: HALOT
  rationale: The noun can denote appalled astonishment at devastation. 'Horror' communicates
    the reaction/result in readable modern English better than the archaic-sounding
    'astonishment.'
- source_word: לִקְלָלָה
  chosen: a curse
  alternatives:
  - an object of cursing
  lexicon: HALOT
  rationale: Direct rendering of the noun; in context it means they will serve as
    a formula or example in cursing.
- source_word: לְחֶרְפָּה
  chosen: a reproach
  alternatives:
  - a disgrace
  - a taunt
  lexicon: HALOT
  rationale: '''Reproach'' preserves the sense of public shame and scorn without overnarrowing
    to verbal mockery alone.'
- source_word: וְלֹא תִרְאוּ עוֹד אֶת־הַמָּקוֹם הַזֶּה
  chosen: and you will never again see this place
  alternatives:
  - and you will not see this place again
  lexicon: HALOT
  rationale: Adds 'never' for natural English emphasis corresponding to לֹא ... עוֹד,
    while preserving the force of permanent loss.
