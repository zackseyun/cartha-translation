theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of שׁמע בְקול in covenantal context
  chosen_reading: obey the voice of the LORD your God
  alternative_readings:
  - listen to the voice of the LORD your God
  - hear the voice of the LORD your God
  rationale: The phrase in prophetic covenant contexts regularly implies obedience,
    not mere auditory reception. Retaining 'voice' while rendering שׁמע as 'obey'
    preserves both the idiomatic force and the imagery of divine address.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
