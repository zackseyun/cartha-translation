id: JER.42.13
reference: Jeremiah 42:13
source:
  edition: WLC
  text: וְ/אִם אֹמְרִ֣ים אַתֶּ֔ם לֹ֥א נֵשֵׁ֖ב בָּ/אָ֣רֶץ הַ/זֹּ֑את לְ/בִלְתִּ֣י שְׁמֹ֔עַ
    בְּ/ק֖וֹל יְהוָ֥ה אֱלֹהֵי/כֶֽם־׃
translation:
  text: But if you say, ‘We will not stay in this land,’ so as not to obey the voice
    of the LORD your God—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'listen to the voice of the LORD your God.' The Hebrew idiom 'hear/listen
      to the voice' often means responsive obedience.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: HALOT
  rationale: The conjunction plus conditional particle introduces a contrastive condition
    following the previous assurance/warning. 'But if' captures the adversative force
    in context better than a simple 'and if.'
- source_word: אֹמְרִים אַתֶּם
  chosen: you say
  alternatives:
  - you are saying
  - you say, saying
  lexicon: HALOT
  rationale: Although the Hebrew uses a participle with an explicit pronoun, idiomatic
    English in this conditional construction is 'if you say.' The pronoun is naturally
    carried in the English subject 'you.'
- source_word: לֹא נֵשֵׁב
  chosen: We will not stay
  alternatives:
  - We will not dwell
  - We will not live
  - We will not remain
  lexicon: HALOT
  rationale: יָשַׁב in this context refers to settling or remaining in the land. 'Stay'
    is natural modern English and fits the immediate decision whether to remain in
    Judah. 'Dwell' is more formal; 'remain' is possible but slightly less concrete.
- source_word: בָּאָרֶץ הַזֹּאת
  chosen: in this land
  alternatives:
  - in this country
  - in this הארץ
  lexicon: HALOT
  rationale: '''Land'' is the standard rendering for אֶרֶץ here and preserves the
    covenantal/geographical resonance better than ''country.'''
- source_word: לְבִלְתִּי
  chosen: so as not to
  alternatives:
  - in order not to
  - so that we may not
  lexicon: HALOT
  rationale: This construction expresses purpose or intended result. 'So as not to'
    is clear, natural, and preserves the infinitival force.
- source_word: שְׁמֹעַ
  chosen: obey
  alternatives:
  - listen to
  - hear
  lexicon: HALOT
  rationale: While שׁמע literally means 'hear/listen,' in the covenantal phrase 'hear
    the voice of' it commonly carries the sense of responsive obedience. 'Obey' best
    communicates the idiomatic meaning in English without flattening the force.
- source_word: בְּקוֹל
  chosen: the voice of
  alternatives:
  - the sound of
  - the command of
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'in/to the voice of.' Retaining 'the voice
    of' preserves the biblical expression and keeps the relational dimension of divine
    speech, even though 'obey' already conveys the practical sense.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Standard possessive construction; 'your God' preserves the covenantal
    address to the audience.
