theological_decisions:
- issue: Rendering of divine נחם with God as subject
  chosen_reading: I relent concerning the harm that I did to you
  alternative_readings:
  - I repent of the evil that I have done to you
  - I am sorry for the disaster I brought on you
  rationale: The Hebrew speaks of God changing course regarding prior judgment. In
    English, 'repent' can imply moral fault, which the context does not require. 'Harm'
    or 'disaster' reflects רָעָה as calamity rather than moral evil. This preserves
    the text's anthropopathic language without importing doctrinal error.
  doctrine_reference: Translation philosophy §3; original-language primacy and preserving
    theological tension
