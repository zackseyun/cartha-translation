id: JER.42.10
reference: Jeremiah 42:10
source:
  edition: WLC
  text: אִם שׁ֤וֹב תֵּֽשְׁבוּ֙ בָּ/אָ֣רֶץ הַ/זֹּ֔את וּ/בָנִ֤יתִי אֶתְ/כֶם֙ וְ/לֹ֣א
    אֶהֱרֹ֔ס וְ/נָטַעְתִּ֥י אֶתְ/כֶ֖ם וְ/לֹ֣א אֶתּ֑וֹשׁ כִּ֤י נִחַ֨מְתִּי֙ אֶל הָ֣/רָעָ֔ה
    אֲשֶׁ֥ר עָשִׂ֖יתִי לָ/כֶֽם־־׃
translation:
  text: If you will indeed remain in this land, then I will build you up and not tear
    you down, and I will plant you and not uproot you; for I relent concerning the
    harm that I did to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If you truly stay in this land.' The Hebrew uses an infinitive absolute
      before the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will plant you and not pluck you up.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'I relent concerning the harm/disaster.' Older English versions
      often have 'repent of the evil,' where 'evil' means calamity, not moral wrongdoing.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: If
  alternatives:
  - if indeed
  lexicon: HALOT
  rationale: Introduces the conditional clause. The following infinitive absolute
    plus finite verb supplies the emphasis, so the simple 'If' is sufficient in English
    while the emphasis is carried by 'indeed' later.
- source_word: שׁוֹב תֵּשְׁבוּ
  chosen: you will indeed remain
  alternatives:
  - you truly stay
  - you surely dwell
  - you return and dwell
  lexicon: HALOT
  rationale: 'The infinitive absolute שׁוֹב before תֵּשְׁבוּ intensifies the verbal
    idea. Since the finite verb is from ישׁב (''sit, dwell, remain''), the sense is
    emphatic continuance in the land: ''indeed remain.'' ''Return and dwell'' is less
    likely here because the paired verb is not שוב but ישׁב, and the context concerns
    staying in Judah rather than departing to Egypt.'
- source_word: בָּאָרֶץ הַזֹּאת
  chosen: in this land
  alternatives:
  - in this הארץ
  - in this country
  lexicon: HALOT
  rationale: '''Land'' is the standard rendering and preserves covenantal/geographical
    resonance better than ''country.'''
- source_word: וּבָנִיתִי אֶתְכֶם
  chosen: I will build you up
  alternatives:
  - I will build you
  - I will rebuild you
  lexicon: HALOT
  rationale: Though literally 'I will build you,' English idiom and the metaphorical
    object require 'build you up.' This also matches the prophetic restoration formula
    without over-specifying 'rebuild.'
- source_word: וְלֹא אֶהֱרֹס
  chosen: and not tear you down
  alternatives:
  - and not demolish
  - and not overthrow
  lexicon: HALOT
  rationale: Pairs naturally with 'build you up' in a restoration/judgment contrast.
    'Tear down' is idiomatic and preserves the metaphor.
- source_word: וְנָטַעְתִּי אֶתְכֶם
  chosen: and I will plant you
  alternatives:
  - and I will establish you
  lexicon: HALOT
  rationale: Keeps the agricultural metaphor common in Jeremiah. 'Establish' would
    flatten the imagery.
- source_word: וְלֹא אֶתּוֹשׁ
  chosen: and not uproot you
  alternatives:
  - and not pluck you up
  lexicon: HALOT
  rationale: The verb נטשׁ in this prophetic collocation contrasts with 'plant.' 'Uproot'
    is clear modern English; 'pluck up' is more traditional but less natural for contemporary
    readers.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the promised restoration. 'For' fits the formal
    flow of the sentence.
- source_word: נִחַמְתִּי
  chosen: I relent
  alternatives:
  - I have relented
  - I am sorry
  - I repent
  lexicon: HALOT
  rationale: With God as subject, נחם here expresses relenting or changing course
    regarding announced disaster, not moral repentance. Present-tense English 'I relent'
    communicates the divine turning from further harm in context. 'Repent' would mislead
    theologically in English.
- source_word: אֶל הָרָעָה
  chosen: concerning the harm
  alternatives:
  - concerning the disaster
  - from the evil
  lexicon: HALOT
  rationale: רָעָה here denotes calamity/disaster brought in judgment, not moral evil.
    'Harm' is accessible and avoids implying moral evil in God; 'disaster' is also
    possible, but 'harm' fits the direct object relation with 'did to you.'
- source_word: אֲשֶׁר עָשִׂיתִי לָכֶם
  chosen: that I did to you
  alternatives:
  - that I brought upon you
  - that I inflicted on you
  lexicon: HALOT
  rationale: A straightforward rendering of the clause. 'Brought upon you' is interpretive;
    'did to you' stays closer to the Hebrew while remaining natural.
