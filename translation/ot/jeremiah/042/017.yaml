id: JER.42.17
reference: Jeremiah 42:17
source:
  edition: WLC
  text: וְ/יִֽהְי֣וּ כָל הָ/אֲנָשִׁ֗ים אֲשֶׁר שָׂ֨מוּ אֶת פְּנֵי/הֶ֜ם לָ/ב֤וֹא מִצְרַ֨יִם֙
    לָ/ג֣וּר שָׁ֔ם יָמ֕וּתוּ בַּ/חֶ֖רֶב בָּ/רָעָ֣ב וּ/בַ/דָּ֑בֶר וְ/לֹֽא יִהְיֶ֤ה
    לָ/הֶם֙ שָׂרִ֣יד וּ/פָלִ֔יט מִ/פְּנֵי֙ הָֽ/רָעָ֔ה אֲשֶׁ֥ר אֲנִ֖י מֵבִ֥יא עֲלֵי/הֶֽם־־־־׃ס
translation:
  text: Then all the men who have set their faces to go to Egypt to live there shall
    die by the sword, by famine, and by pestilence. None of them shall have a survivor
    or an escapee from the disaster that I am bringing on them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to sojourn there.' The Hebrew verb can emphasize residing as a foreigner.
    reason: lexical_alternative
  - marker: b
    text: Or 'remnant or fugitive.' The Hebrew pair stresses that none will remain
      alive and none will escape.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִהְיוּ
  chosen: Then ... shall
  alternatives:
  - And ... will be
  lexicon: HALOT
  rationale: Introduces the consequence/result of the prior warning. A strictly literal
    'and they shall be' is awkward in English; the clause is carried into 'Then all
    the men ... shall die' to preserve the Hebrew predictive force naturally.
- source_word: כָל הָאֲנָשִׁים
  chosen: all the men
  alternatives:
  - all the people
  - all the menfolk
  lexicon: HALOT
  rationale: אֲנָשִׁים is the masculine plural of 'men' and here refers specifically
    to the group under discussion. Per gender-accurate policy, 'men' is preferred
    over a neutral collective unless context clearly broadens it.
- source_word: אֲשֶׁר שָׂמוּ אֶת־פְּנֵיהֶם
  chosen: who have set their faces
  alternatives:
  - who have determined
  - who have resolved
  lexicon: HALOT
  rationale: This Hebrew idiom literally means to set one's face toward something,
    conveying firm resolve. The idiom is preserved in English because it is understandable
    and retains the prophetic tone.
- source_word: לָבוֹא מִצְרַיִם
  chosen: to go to Egypt
  alternatives:
  - to enter Egypt
  lexicon: HALOT
  rationale: בוא commonly means 'come/go/enter' depending on viewpoint. In English
    narrative perspective, 'go to Egypt' is the most natural rendering.
- source_word: לָגוּר שָׁם
  chosen: to live there
  alternatives:
  - to sojourn there
  - to reside there
  lexicon: HALOT
  rationale: גור often denotes residing as a foreigner/sojourner. 'Live there' is
    clearer modern English in this context, while the foreign-resident nuance is not
    central to the warning.
- source_word: יָמוּתוּ
  chosen: shall die
  alternatives:
  - will die
  lexicon: HALOT
  rationale: Simple future prediction/judgment. 'Shall' fits the solemn prophetic
    register.
- source_word: בַּחֶרֶב בָּרָעָב וּבַדָּבֶר
  chosen: by the sword, by famine, and by pestilence
  alternatives:
  - by sword, famine, and plague
  - by war, hunger, and pestilence
  lexicon: HALOT
  rationale: This is a standard Jeremiah judgment triad. 'Sword' preserves the concrete
    Hebrew image for violent death; 'famine' is standard for רָעָב; 'pestilence' is
    the conventional and accurate rendering of דֶּבֶר in prophetic judgment contexts.
- source_word: וְלֹא יִהְיֶה לָהֶם
  chosen: None of them shall have
  alternatives:
  - there shall not be for them
  - they shall not have
  lexicon: HALOT
  rationale: The Hebrew existential construction is rendered idiomatically in English
    while preserving the distributive sense over the group.
- source_word: שָׂרִיד וּפָלִיט
  chosen: a survivor or an escapee
  alternatives:
  - remnant or fugitive
  - survivor or refugee
  lexicon: HALOT
  rationale: 'The pair emphasizes totality of judgment: no one left alive and no one
    escaping. ''Survivor'' and ''escapee'' communicate the distinction clearly in
    modern English. ''Remnant'' could import theological overtones not intended here.'
- source_word: מִפְּנֵי הָרָעָה
  chosen: from the disaster
  alternatives:
  - from the evil
  - from the calamity
  lexicon: HALOT
  rationale: רָעָה in judgment contexts commonly means calamity/disaster rather than
    moral evil. 'Disaster' is clear and forceful.
- source_word: אֲשֶׁר אֲנִי מֵבִיא עֲלֵיהֶם
  chosen: that I am bringing on them
  alternatives:
  - which I am bringing upon them
  - that I will bring on them
  lexicon: HALOT
  rationale: The participle מֵבִיא conveys imminent or ongoing action. 'I am bringing
    on them' preserves that aspect better than a simple future.
