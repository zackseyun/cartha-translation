theological_decisions:
- issue: Rendering of judgment language without softening divine agency
  chosen_reading: the disaster that I am bringing on them
  alternative_readings:
  - the calamity that I will bring upon them
  rationale: The Hebrew explicitly attributes the coming calamity to God's action.
    The translation preserves this direct agency without paraphrase or mitigation.
  doctrine_reference: Translation philosophy §1, §3
