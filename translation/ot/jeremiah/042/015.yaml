id: JER.42.15
reference: Jeremiah 42:15
source:
  edition: WLC
  text: וְ/עַתָּ֕ה לָ/כֵ֛ן שִׁמְע֥וּ דְבַר יְהוָ֖ה שְׁאֵרִ֣ית יְהוּדָ֑ה כֹּֽה אָמַר֩ יְהוָ֨ה צְבָא֜וֹת אֱלֹהֵ֣י יִשְׂרָאֵ֗ל אִם אַ֠תֶּם שׂ֣וֹם תְּשִׂמ֤וּ/ן פְּנֵי/כֶם֙ לָ/בֹ֣א מִצְרַ֔יִם וּ/בָאתֶ֖ם לָ/ג֥וּר שָֽׁם־־־׃
translation:
  text: 'Now therefore hear the word of Yahweh, O remnant of Judah. Thus says Yahweh of hosts, the God of Israel: If you are determined to go to Egypt and to go to sojourn there,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''if you indeed set your faces to go to Egypt''—an idiom expressing firm resolve.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה לָכֵן
  chosen: Now therefore
  alternatives:
  - And now, therefore
  - So now
  lexicon: HALOT
  rationale: The paired discourse markers introduce a solemn inference from the preceding context. 'Now therefore' preserves both the temporal and inferential force in natural English.
- source_word: שִׁמְעוּ דְבַר יְהוָה
  chosen: hear the word of the LORD
  alternatives:
  - listen to the word of the LORD
  lexicon: HALOT
  rationale: '''Hear'' is the standard rendering of שׁמע in prophetic summonses and preserves the covenantal weight better than the more colloquial ''listen.'' ''The word of the LORD'' is a fixed prophetic formula.'
- source_word: שְׁאֵרִית יְהוּדָה
  chosen: O remnant of Judah
  alternatives:
  - remnant of Judah
  lexicon: HALOT
  rationale: The vocative force is explicit in context, addressing the surviving community directly. 'Remnant' is the established and semantically accurate rendering for שְׁאֵרִית.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - Thus said
  - This is what ... says
  lexicon: HALOT
  rationale: This is the standard prophetic messenger formula. Present tense in English reflects the performative force of the prophetic declaration.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD of armies
  lexicon: HALOT
  rationale: This is the conventional and accurate rendering of the divine title, preserving both its military and cosmic connotations without over-paraphrase.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: A straightforward construct phrase; no expansion is warranted.
- source_word: אִם אַתֶּם שׂוֹם תְּשִׂמוּן פְּנֵיכֶם
  chosen: If you are determined
  alternatives:
  - If you indeed set your faces
  - If you firmly set your faces
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action, and 'set your faces' is an idiom for firm resolve. 'Are determined' communicates the force clearly in modern English, while the idiomatic alternative is preserved in a footnote.
- source_word: לָבֹא מִצְרַיִם
  chosen: to go to Egypt
  alternatives:
  - to enter Egypt
  lexicon: HALOT
  rationale: With a destination, בוא commonly means 'go/come to.' In English narrative perspective here, 'go to Egypt' is the most natural rendering.
- source_word: וּבָאתֶם
  chosen: and you go
  alternatives:
  - and you come
  - and you enter
  lexicon: HALOT
  rationale: The waw + perfect continues the conditional sequence. Rendering it as 'and you go' keeps the flow natural in English within the if-clause.
- source_word: לָגוּר שָׁם
  chosen: to sojourn there
  alternatives:
  - to reside there as foreigners
  - to stay there
  lexicon: HALOT
  rationale: גור denotes residing as an alien/temporary resident. 'Sojourn' preserves that nuance better than the flatter 'stay,' while remaining understandable in context.
