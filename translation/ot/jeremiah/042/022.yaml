id: JER.42.22
reference: Jeremiah 42:22
source:
  edition: WLC
  text: וְ/עַתָּה֙ יָדֹ֣עַ תֵּֽדְע֔וּ כִּ֗י בַּ/חֶ֛רֶב בָּ/רָעָ֥ב וּ/בַ/דֶּ֖בֶר תָּמ֑וּתוּ
    בַּ/מָּקוֹם֙ אֲשֶׁ֣ר חֲפַצְתֶּ֔ם לָ/ב֖וֹא לָ/ג֥וּר שָֽׁם׃ס
translation:
  text: Now therefore, know for certain that you will die by the sword, by famine,
    and by pestilence in the place where you desired to go to sojourn there.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and by plague.' The Hebrew term can denote epidemic disease more generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: Now therefore
  alternatives:
  - And now
  - Now
  lexicon: HALOT
  rationale: Marks a consequential transition from the preceding warning; 'therefore'
    brings out the inferential force in context without over-paraphrasing.
- source_word: יָדֹעַ תֵּדְעוּ
  chosen: know for certain
  alternatives:
  - surely know
  - know indeed
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the command/prediction.
    'Know for certain' is idiomatic modern English that preserves the emphatic force.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - indeed that
  lexicon: HALOT
  rationale: Introduces the content of what they are to know; 'that' is the most natural
    English complementizer here.
- source_word: בַּחֶרֶב
  chosen: by the sword
  alternatives:
  - by sword
  - through the sword
  lexicon: HALOT
  rationale: Standard idiomatic rendering for death through warfare/violence; the
    article is naturally absorbed in English idiom.
- source_word: בָּרָעָב
  chosen: by famine
  alternatives:
  - through famine
  lexicon: HALOT
  rationale: Keeps the triad of covenant-judgment terms concise and parallel.
- source_word: וּבַדֶּבֶר
  chosen: and by pestilence
  alternatives:
  - and by plague
  - and by disease
  lexicon: HALOT
  rationale: דבר in this judgment formula commonly denotes epidemic disease. 'Pestilence'
    preserves the formal prophetic register and matches the established sword-famine-pestilence
    triad.
- source_word: תָּמ֑וּתוּ
  chosen: you will die
  alternatives:
  - you shall die
  lexicon: HALOT
  rationale: Simple future fits the predictive warning. 'Will' is readable modern
    English while retaining solemnity.
- source_word: בַּמָּקוֹם
  chosen: in the place
  alternatives:
  - in the very place
  - at the place
  lexicon: HALOT
  rationale: Straightforward locative rendering; no need to heighten emphasis beyond
    the Hebrew.
- source_word: אֲשֶׁר חֲפַצְתֶּם
  chosen: where you desired
  alternatives:
  - which you wanted
  - where you took pleasure in
  lexicon: HALOT
  rationale: חפץ conveys desire/will. 'Desired' preserves the volitional nuance and
    the irony of their chosen destination.
- source_word: לָבוֹא
  chosen: to go
  alternatives:
  - to enter
  - to come
  lexicon: HALOT
  rationale: From Jeremiah's deictic standpoint they are going to that place; 'go'
    is more natural than 'come' in English here.
- source_word: לָגוּר
  chosen: to sojourn
  alternatives:
  - to reside as foreigners
  - to stay
  - to dwell temporarily
  lexicon: HALOT
  rationale: גור often denotes residing as an alien or temporary resident. 'Sojourn'
    preserves that nuance better than the flatter 'stay' or 'live'.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Retains the final locative adverb and completes the clause naturally
    in English.
