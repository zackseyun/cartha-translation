theological_decisions:
- issue: Rendering of the judgment triad חרב / רעב / דבר
  chosen_reading: by the sword, by famine, and by pestilence
  alternative_readings:
  - by the sword, famine, and plague
  rationale: This is a recurring prophetic judgment formula. The chosen rendering
    preserves the recognizable triad and its covenant-judgment weight without importing
    extra theological interpretation.
