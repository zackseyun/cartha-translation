theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name. Per DOCTRINE.md contested terms
    table, the default rendering is 'the LORD,' while alternatives may be preserved
    in documentation rather than the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Retention of 'remnant' language
  chosen_reading: remnant
  alternative_readings:
  - survivors
  - those left
  rationale: Although 'survivors' is possible, 'remnant' preserves Jeremiah's recurring
    theological vocabulary without importing extra interpretation. The term is both
    lexical and theologically resonant in prophetic literature.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms)
