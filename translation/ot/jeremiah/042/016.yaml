theological_decisions:
- issue: Nature of the judgment terms 'sword' and 'famine'
  chosen_reading: Retain the concrete images 'sword' and 'famine' rather than interpret
    them abstractly.
  alternative_readings:
  - violent death and starvation
  - war and hunger
  rationale: The Hebrew uses standard covenant-judgment terms with vivid prophetic
    concreteness. Preserving the literal imagery avoids paraphrase and lets the theological
    force of divine judgment stand as expressed in the text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
