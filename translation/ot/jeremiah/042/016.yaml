id: JER.42.16
reference: Jeremiah 42:16
source:
  edition: WLC
  text: וְ/הָיְתָ֣ה הַ/חֶ֗רֶב אֲשֶׁ֤ר אַתֶּם֙ יְרֵאִ֣ים מִמֶּ֔/נָּה שָׁ֛ם תַּשִּׂ֥יג
    אֶתְ/כֶ֖ם בְּ/אֶ֣רֶץ מִצְרָ֑יִם וְ/הָ/רָעָ֞ב אֲשֶׁר אַתֶּ֣ם דֹּאֲגִ֣ים מִמֶּ֗/נּוּ
    שָׁ֣ם יִדְבַּ֧ק אַחֲרֵי/כֶ֛ם מִצְרַ֖יִם וְ/שָׁ֥ם תָּמֻֽתוּ־׀׃
translation:
  text: Then the sword that you fear will overtake you there in the land of Egypt,
    and the famine that you dread will cling close behind you there in Egypt, and
    there you will die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you are anxious about' for 'you dread' (Hebrew דֹּאֲגִים).
    reason: lexical_alternative
  - marker: b
    text: Literally 'will cling behind you,' an image of relentless pursuit.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: Then ... will
  alternatives:
  - and it will happen that
  - and it shall be
  lexicon: HALOT
  rationale: Introduces the consequence of the preceding warning. In English, an explicit
    existential 'it will be' is awkward here, so the conjunction plus future consequence
    is conveyed idiomatically as 'Then ... will' while preserving the predictive force.
- source_word: הַחֶרֶב
  chosen: the sword
  alternatives:
  - the war
  - the blade
  lexicon: HALOT
  rationale: Standard literal rendering for חֶרֶב; in prophetic judgment contexts
    it commonly stands metonymically for violent death by war, but 'the sword' preserves
    the Hebrew image and traditional prophetic diction.
- source_word: יְרֵאִים מִמֶּנָּה
  chosen: you fear
  alternatives:
  - you are afraid of
  - you dread
  lexicon: HALOT
  rationale: A direct and natural rendering of ירא with מן. 'Fear' is concise and
    matches the semantic range without over-intensifying.
- source_word: תַּשִּׂיג אֶתְכֶם
  chosen: will overtake you
  alternatives:
  - will catch up with you
  - will reach you
  lexicon: HALOT
  rationale: נשׂג in the Hiphil often means to overtake or catch up with. 'Will overtake
    you' fits the threatening context and preserves the image of inescapable pursuit.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: there in the land of Egypt
  alternatives:
  - in the land of Egypt there
  - there in Egypt
  lexicon: HALOT
  rationale: Retains both שָׁם ('there') and the fuller geographical phrase 'the land
    of Egypt.' The order is adjusted for natural English while preserving emphasis
    on the very place they seek for safety.
- source_word: הָרָעָב
  chosen: the famine
  alternatives:
  - the hunger
  lexicon: HALOT
  rationale: רָעָב in this context denotes famine rather than mere personal hunger.
    'The famine' matches the covenant-judgment register of the passage.
- source_word: דֹּאֲגִים מִמֶּנּוּ
  chosen: you dread
  alternatives:
  - you are anxious about
  - you worry about
  lexicon: HALOT
  rationale: דאג conveys anxious concern or worry. In parallel with 'the sword that
    you fear,' 'you dread' gives a suitably weighty English equivalent for the threat
    context, though 'are anxious about' is lexically possible.
- source_word: יִדְבַּק אַחֲרֵיכֶם
  chosen: will cling close behind you
  alternatives:
  - will follow hard after you
  - will stick to you
  lexicon: HALOT
  rationale: דבק literally means cling/stick. With אַחֲרֵי ('behind/after'), the image
    is of relentless pursuit that stays attached. 'Will cling close behind you' preserves
    both the literal force and the pursuit imagery.
- source_word: מִצְרַיִם
  chosen: there in Egypt
  alternatives:
  - in Egypt
  - Egypt
  lexicon: HALOT
  rationale: The verse repeats the location for emphasis. Rendering it explicitly
    maintains the rhetorical stress that Egypt itself will be the place of judgment.
- source_word: וְשָׁם תָּמֻתוּ
  chosen: and there you will die
  alternatives:
  - and there you shall die
  lexicon: HALOT
  rationale: A straightforward future statement. 'Will die' is modern English; 'shall
    die' is possible but more archaic. The repeated 'there' is retained for emphasis.
