id: JER.42.1
reference: Jeremiah 42:1
source:
  edition: WLC
  text: וַֽ/יִּגְּשׁוּ֙ כָּל שָׂרֵ֣י הַ/חֲיָלִ֔ים וְ/יֽוֹחָנָן֙ בֶּן קָרֵ֔חַ וִֽ/יזַנְיָ֖ה
    בֶּן הוֹשַֽׁעְיָ֑ה וְ/כָל הָ/עָ֖ם מִ/קָּטֹ֥ן וְ/עַד גָּדֽוֹל־־־־־׃
translation:
  text: Then all the commanders of the forces approached, along with Yohanan son of
    Kareah and Yizaniah son of Hoshaiah, and all the people from the least to the
    greatest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the captains of the forces' or 'all the officers of the army.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from the least to the greatest,' an idiom meaning everyone across
      the whole community.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּגְּשׁוּ
  chosen: approached
  alternatives:
  - came near
  - drew near
  lexicon: HALOT
  rationale: The verb נגשׁ in the wayyiqtol narrative form commonly means to come
    near or approach. 'Approached' is natural modern English and preserves the movement
    toward Jeremiah implied by the context without over-specifying.
- source_word: כָּל שָׂרֵי הַחֲיָלִים
  chosen: all the commanders of the forces
  alternatives:
  - all the captains of the forces
  - all the officers of the army
  lexicon: HALOT
  rationale: שָׂרֵי denotes leaders/officials/commanders, and חֲיָלִים refers to military
    forces or troops. 'Commanders of the forces' preserves the military sense while
    avoiding the archaic feel of 'captains.'
- source_word: וְיוֹחָנָן בֶּן־קָרֵחַ
  chosen: along with Yohanan son of Kareah
  alternatives:
  - and Johanan son of Kareah
  lexicon: HALOT
  rationale: Personal names are transliterated per project philosophy. 'Yohanan' more
    directly reflects the Hebrew form than the traditional 'Johanan.' 'Son of' is
    retained as the standard genealogical expression.
- source_word: וִיזַנְיָה בֶּן־הוֹשַׁעְיָה
  chosen: Yizaniah son of Hoshaiah
  alternatives:
  - Jezaniah son of Hoshaiah
  - Yezaniah son of Hoshaiah
  lexicon: HALOT
  rationale: The Hebrew spelling supports a transliteration like 'Yizaniah.' Traditional
    English versions often have 'Jezaniah,' but the project prioritizes closer transliteration
    of personal names from Hebrew.
- source_word: וְכָל הָעָם
  chosen: and all the people
  alternatives:
  - and all the populace
  lexicon: HALOT
  rationale: הָעָם is the ordinary term for 'the people.' The simple rendering is
    best here and fits the collective sense.
- source_word: מִקָּטֹן וְעַד־גָּדוֹל
  chosen: from the least to the greatest
  alternatives:
  - from small to great
  - from the smallest to the greatest
  - from the lowliest to the highest
  lexicon: HALOT
  rationale: This idiom expresses the full social range of the people. 'From the least
    to the greatest' is idiomatic English, preserves the merism, and avoids flattening
    it into a mere statement of age or size.
