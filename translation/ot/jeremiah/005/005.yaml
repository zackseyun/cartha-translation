theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH,
    preserving Jewish reverence tradition and established translation practice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of the yoke/bonds imagery
  chosen_reading: Retain the metaphor of breaking the yoke and tearing off the bonds
  alternative_readings:
  - Interpret metaphorically as rejecting God's law
  - Interpret politically as rejecting social restraint
  rationale: The Hebrew uses concrete imagery that can carry covenantal and moral
    implications, but the verse itself does not specify a narrower doctrinal interpretation.
    Preserving the metaphor maintains the text's theological tension without overexplaining.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
