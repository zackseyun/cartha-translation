id: JER.5.5
reference: Jeremiah 5:5
source:
  edition: WLC
  text: אֵֽלֲכָה לִּ֤/י אֶל הַ/גְּדֹלִים֙ וַ/אֲדַבְּרָ֣ה אוֹתָ֔/ם כִּ֣י הֵ֗מָּה יָדְעוּ֙
    דֶּ֣רֶךְ יְהוָ֔ה מִשְׁפַּ֖ט אֱלֹהֵי/הֶ֑ם אַ֣ךְ הֵ֤מָּה יַחְדָּו֙ שָׁ֣בְרוּ עֹ֔ל
    נִתְּק֖וּ מוֹסֵרֽוֹת־־׃
translation:
  text: I will go to the great men and speak to them, for they know the way of the
    LORD, the justice of their God. But they too, all together, have broken the yoke;
    they have torn off the bonds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the judgment of their God' or 'the ordinance of their God.' The Hebrew
      word can refer to justice, judgment, or legal requirement.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֲכָה לִּי
  chosen: I will go
  alternatives:
  - Let me go
  - I will go for myself
  lexicon: HALOT
  rationale: Cohortative 1cs of הלך with ethical dative לִּי expresses resolve/intention.
    In English, simple future 'I will go' best captures the speaker's determined decision
    without awkwardly preserving the dative.
- source_word: הַגְּדֹלִים
  chosen: the great men
  alternatives:
  - the great ones
  - the prominent men
  - the leaders
  lexicon: HALOT
  rationale: Refers to socially important or powerful people in contrast to the poor
    in the preceding context. 'Great men' preserves the concrete social class and
    the masculine plural form better than the more interpretive 'leaders'.
- source_word: וַאֲדַבְּרָה אוֹתָם
  chosen: and speak to them
  alternatives:
  - and talk with them
  - and address them
  lexicon: HALOT
  rationale: The cohortative of דבר here expresses Jeremiah's intention to speak directly
    to them. 'Speak to them' is straightforward and sufficiently formal.
- source_word: דֶּרֶךְ יְהוָה
  chosen: the way of the LORD
  alternatives:
  - the הדרך of the LORD
  - the path of the LORD
  lexicon: HALOT
  rationale: A common Hebrew idiom for the LORD's way, will, or covenantal path. 'Way'
    is the standard and most transparent rendering.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    in keeping with established reverential convention and LXX/English Bible pattern.
- source_word: מִשְׁפַּט אֱלֹהֵיהֶם
  chosen: the justice of their God
  alternatives:
  - the judgment of their God
  - the ordinance of their God
  - the requirement of their God
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote justice, judgment, legal right, or ordinance. Here,
    paired with 'the way of the LORD,' it points to God's just order/claim rather
    than a single judicial act. 'Justice of their God' is natural English and preserves
    the ethical-legal sense.
- source_word: אַךְ
  chosen: But
  alternatives:
  - Surely
  - Yet
  - Only
  lexicon: HALOT
  rationale: Here אַךְ marks a sharp adversative contrast between expectation and
    reality. 'But' best fits the discourse flow.
- source_word: יַחְדָּו
  chosen: all together
  alternatives:
  - together
  - as one
  lexicon: HALOT
  rationale: Emphasizes collective action. 'All together' makes the totalizing force
    explicit in idiomatic English.
- source_word: שָׁבְרוּ עֹל
  chosen: have broken the yoke
  alternatives:
  - have shattered the yoke
  - have broken the yoke apart
  lexicon: HALOT
  rationale: The yoke is a metaphor for restraint, obligation, or covenantal submission.
    'Broken the yoke' preserves the vivid metaphor without overinterpreting it.
- source_word: נִתְּקוּ מוֹסֵרוֹת
  chosen: have torn off the bonds
  alternatives:
  - have snapped the bonds
  - have burst the restraints
  - have torn apart the fetters
  lexicon: HALOT
  rationale: מוֹסֵרוֹת are bands/bonds/fetters, parallel to 'yoke.' 'Torn off the
    bonds' conveys violent rejection of restraint and reads naturally in English.
