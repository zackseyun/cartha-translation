theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Required by project doctrine for YHWH; preserves reverential convention and aligns with established English Bible practice without obscuring that the covenant God is speaking.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of the second-person pronoun in 'in your mouth'
  chosen_reading: singular, referring to Jeremiah personally
  alternative_readings:
  - collective/plural audience
  rationale: The Hebrew suffix is singular, contrasting with the preceding plural 'you speak.' This likely shifts from addressing the people/plural speakers to addressing Jeremiah as the prophet whose words will become the instrument of judgment.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #5'
