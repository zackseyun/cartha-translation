id: JER.5.14
reference: Jeremiah 5:14
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י צְבָא֔וֹת יַ֚עַן דַּבֶּרְ/כֶ֔ם אֶת הַ/דָּבָ֖ר הַ/זֶּ֑ה הִנְ/נִ֣י נֹתֵן֩ דְּבָרַ֨/י בְּ/פִ֜י/ךָ לְ/אֵ֗שׁ וְ/הָ/עָ֥ם הַ/זֶּ֛ה עֵצִ֖ים וַ/אֲכָלָֽתַ/ם־־׃
translation:
  text: 'Therefore thus says Yahweh, the God of hosts: Because you speak this word, behold, I am making my words in your mouth fire, and this people wood, and it will consume them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because you have spoken this word.' The Hebrew participle may be understood with present or recent-past force.
    reason: lexical_alternative
  - marker: b
    text: Or 'I am giving my words in your mouth as fire.' The Hebrew verb is literally 'giving,' but the sense is that God causes Jeremiah's words to function like fire.
    reason: lexical_alternative
  - marker: c
    text: Or 'this people [as] wood' or 'firewood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - Therefore
  lexicon: HALOT
  rationale: Standard inferential conjunction linking this judgment oracle to the preceding context.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - thus said
  - this is what ... says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula; present-tense English is natural in prophetic speech.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: אֱלֹהֵי צְבָאוֹת
  chosen: the God of hosts
  alternatives:
  - God of armies
  - God of heavenly hosts
  lexicon: HALOT
  rationale: Traditional but still transparent rendering of the construct phrase; preserves the military/cosmic force of צְבָאוֹת without over-specifying earthly or heavenly referent.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - Inasmuch as
  lexicon: HALOT
  rationale: Causal conjunction introducing the reason for the announced action.
- source_word: דַּבֶּרְכֶם אֶת־הַדָּבָר הַזֶּה
  chosen: you speak this word
  alternatives:
  - you speak this thing
  - you have spoken this word
  lexicon: HALOT
  rationale: The participial form with 2mp suffix can be rendered as present/generic in context. 'Word' preserves the lexical link with God's 'words' later in the verse.
- source_word: הִנְנִי
  chosen: behold
  alternatives:
  - look
  - see, I am
  lexicon: HALOT
  rationale: Retains the prophetic immediacy and solemnity of the announcement formula.
- source_word: נֹתֵן
  chosen: I am making
  alternatives:
  - I am giving
  - I set
  lexicon: HALOT
  rationale: Although the verb is literally 'giving,' English idiom with the predicate accusative ('my words ... fire') is clearer as 'making,' which conveys the transformation/metaphor intended.
- source_word: דְּבָרַי
  chosen: my words
  alternatives:
  - my word
  - what I say
  lexicon: HALOT
  rationale: Plural is explicit in Hebrew and should be preserved.
- source_word: בְּפִיךָ
  chosen: in your mouth
  alternatives:
  - upon your lips
  - in your speech
  lexicon: HALOT
  rationale: Concrete bodily imagery is retained; singular suffix likely addresses Jeremiah personally.
- source_word: לְאֵשׁ
  chosen: fire
  alternatives:
  - as fire
  - into fire
  lexicon: HALOT
  rationale: 'Predicate complement in the metaphor: God''s words become destructive fire.'
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: Singular collective noun in Hebrew is best preserved as 'this people'; it also matches the prophetic tone.
- source_word: עֵצִים
  chosen: wood
  alternatives:
  - firewood
  - sticks
  lexicon: HALOT
  rationale: English 'wood' works naturally as the material consumed by fire; plural Hebrew reflects pieces of wood/firewood, but singular mass noun is idiomatic in English.
- source_word: וַאֲכָלָתַם
  chosen: and it will consume them
  alternatives:
  - and it shall devour them
  - and she/it will eat them up
  lexicon: HALOT
  rationale: Verb from אכל ('eat, consume') in context of fire naturally means 'consume.' The feminine singular verb agrees with 'fire' as the active metaphorical subject.
