id: JER.5.6
reference: Jeremiah 5:6
source:
  edition: WLC
  text: עַל כֵּן֩ הִכָּ֨/ם אַרְיֵ֜ה מִ/יַּ֗עַר זְאֵ֤ב עֲרָבוֹת֙ יְשָׁדְדֵ֔/ם נָמֵ֤ר
    שֹׁקֵד֙ עַל עָ֣רֵי/הֶ֔ם כָּל הַ/יּוֹצֵ֥א מֵ/הֵ֖נָּה יִטָּרֵ֑ף כִּ֤י רַבּוּ֙ פִּשְׁעֵי/הֶ֔ם
    עָצְמ֖וּ משבותי/הם־־־׃
translation:
  text: Therefore a lion from the forest strikes them down; a wolf of the deserts
    devastates them; a leopard keeps watch over their cities. Everyone who goes out
    from them will be torn apart, because their transgressions are many; their apostasies
    have grown strong.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a wolf of the evenings.' The Hebrew phrase זְאֵב עֲרָבוֹת has also been
      understood in connection with evening-time predation, but here it is rendered
      'a wolf of the deserts' following the more straightforward sense of the noun
      as desert plains/steppe regions.
    reason: lexical_alternative
  - marker: b
    text: Or 'their backslidings.' The Hebrew term refers to repeated turnings away
      from covenant faithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכָּם
  chosen: strikes them down
  alternatives:
  - has struck them
  - beats them
  - attacks them
  lexicon: HALOT
  rationale: From נכה, a violent blow/strike. Present English in a prophetic/judgment
    context reads naturally in the sequence with the following yiqtol/participle forms,
    while preserving the force of lethal attack better than the weaker 'attacks.'
- source_word: אַרְיֵה מִיַּעַר
  chosen: a lion from the forest
  alternatives:
  - a lion out of the forest
  lexicon: HALOT
  rationale: Keeps the concrete animal image and source location. 'From the forest'
    is idiomatic and preserves the predatory threat imagery.
- source_word: זְאֵב עֲרָבוֹת
  chosen: a wolf of the deserts
  alternatives:
  - a wolf of the evenings
  - a desert wolf
  lexicon: HALOT
  rationale: עֲרָבוֹת can denote desert plains/steppe regions. Although some translations
    render by association as 'evening wolf/wolves,' the Hebrew form here most naturally
    points to arid regions. The construct 'of the deserts' preserves the Hebrew imagery
    and avoids importing a different lexical tradition without necessity.
- source_word: יְשָׁדְדֵם
  chosen: devastates them
  alternatives:
  - plunders them
  - ravages them
  - destroys them
  lexicon: HALOT
  rationale: From שדד, conveying violent despoiling/devastation. 'Devastates' fits
    predatory judgment imagery and avoids the overly economic nuance of 'plunders.'
- source_word: נָמֵר
  chosen: a leopard
  alternatives:
  - a panther
  lexicon: HALOT
  rationale: Standard rendering for the animal term in biblical English; recognizable
    and suitably vivid.
- source_word: שֹׁקֵד עַל
  chosen: keeps watch over
  alternatives:
  - lies in wait by
  - watches over
  lexicon: HALOT
  rationale: The participle from שקד conveys wakeful vigilance. In this hostile-animal
    context it implies predatory watching, but 'keeps watch over' preserves the lexical
    sense without overparaphrasing. The predatory implication is supplied by context.
- source_word: עָרֵיהֶם
  chosen: their cities
  alternatives:
  - their towns
  lexicon: HALOT
  rationale: עיר commonly means city/town; 'cities' is the standard rendering and
    fits the national judgment setting.
- source_word: כָּל הַיּוֹצֵא מֵהֵנָּה
  chosen: Everyone who goes out from them
  alternatives:
  - Whoever goes out from them
  - Everyone going out from them
  lexicon: HALOT
  rationale: Captures the distributive force of כָּל with the participle. 'Everyone
    who goes out' is natural English and preserves the general warning.
- source_word: יִטָּרֵף
  chosen: will be torn apart
  alternatives:
  - will be torn to pieces
  - will be preyed upon
  lexicon: HALOT
  rationale: From טרף in the niphal, evoking being torn by a beast. 'Torn apart' is
    vivid and natural without sounding archaic.
- source_word: פִּשְׁעֵיהֶם
  chosen: their transgressions
  alternatives:
  - their rebellions
  - their offenses
  lexicon: HALOT
  rationale: פשע often carries the sense of rebellion/transgression against rightful
    authority. 'Transgressions' is a clear, established rendering; the rebellious
    nuance is reinforced by the parallel term that follows.
- source_word: רַבּוּ
  chosen: are many
  alternatives:
  - have multiplied
  - have become many
  lexicon: HALOT
  rationale: A stative/resultative rendering is natural in English and fits the explanatory
    clause. It preserves the idea of abundance without awkwardness.
- source_word: עָצְמוּ
  chosen: have grown strong
  alternatives:
  - have become mighty
  - have increased
  lexicon: HALOT
  rationale: From עצם, conveying strength/intensification. Here it describes the entrenched,
    intensified character of the people's unfaithfulness, not merely numerical increase.
- source_word: משבותיהם
  chosen: their apostasies
  alternatives:
  - their backslidings
  - their turnings away
  lexicon: HALOT
  rationale: The ketiv/qere tradition points to a noun from שוב in the sense of turning
    away/backsliding. 'Apostasies' communicates repeated acts of covenantal defection
    with stronger theological precision than the somewhat dated 'backslidings,' while
    remaining readable.
