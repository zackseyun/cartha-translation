theological_decisions:
- issue: Rendering covenantal infidelity in משבותיהם
  chosen_reading: their apostasies
  alternative_readings:
  - their backslidings
  - their turnings away
  rationale: The verse explains divine judgment in terms of repeated covenant breach.
    'Apostasies' best conveys serious religious/moral defection without softening
    the charge. 'Backslidings' is traditional and worth preserving in a footnote because
    it reflects common English Bible usage and the underlying idea of turning back/away.
  doctrine_reference: Translation philosophy §§1, 5, 6
