id: JER.5.8
reference: Jeremiah 5:8
source:
  edition: WLC
  text: סוּסִ֥ים מְיֻזָּנִ֖ים מַשְׁכִּ֣ים הָי֑וּ אִ֛ישׁ אֶל אֵ֥שֶׁת רֵעֵ֖/הוּ יִצְהָֽלוּ־׃
translation:
  text: They were well-fed, lusty stallions; each one neighing after his neighbor’s
    wife.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'horses, well-fed and rising early'; the Hebrew term translated
      'lusty' is difficult and may carry the sense of eager early roaming.
    reason: lexical_alternative
lexical_decisions:
- source_word: סוּסִים
  chosen: stallions
  alternatives:
  - horses
  lexicon: HALOT
  rationale: The base noun means 'horses,' but in this sexualized simile the male
    sense is foregrounded by context. 'Stallions' brings out the image of sexually
    driven male horses more clearly in natural English.
- source_word: מְיֻזָּנִים
  chosen: well-fed
  alternatives:
  - fed
  - well-nourished
  lexicon: HALOT
  rationale: The passive participle describes animals made sleek/fed. 'Well-fed' fits
    the image of pampered, vigorous animals and pairs naturally with the following
    term.
- source_word: מַשְׁכִּים
  chosen: lusty
  alternatives:
  - roving early
  - eager in the morning
  - wandering
  lexicon: HALOT
  rationale: This form is difficult and has been understood in several ways. In context,
    the verse depicts sexual eagerness, so 'lusty' captures the force of the simile
    in idiomatic English. The more literal possibility relating to 'rising early'
    is preserved in a footnote.
- source_word: אִישׁ
  chosen: each one
  alternatives:
  - a man
  - each man
  lexicon: HALOT
  rationale: Distributive singular in context. 'Each one' communicates the individualizing
    force smoothly in English while keeping the masculine reference implied by the
    context.
- source_word: אֶל אֵשֶׁת רֵעֵהוּ
  chosen: after his neighbor’s wife
  alternatives:
  - to his neighbor’s wife
  - toward the wife of his companion
  lexicon: HALOT
  rationale: With the following verb of animal cry, English idiom prefers 'neighing
    after' to express lustful pursuit. 'Neighbor’s wife' preserves the adultery context
    clearly.
- source_word: יִצְהָלוּ
  chosen: neighing
  alternatives:
  - they neigh
  - they whinny
  lexicon: HALOT
  rationale: The verb denotes the cry of a horse. Rendering it as a participial phrase
    after the semicolon gives vivid, natural English while preserving the metaphor.
