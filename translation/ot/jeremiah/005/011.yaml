theological_decisions:
- issue: Rendering the covenant-breach verb בגד
  chosen_reading: unfaithful
  alternative_readings:
  - dealt treacherously
  - betrayed
  rationale: The context is covenantal and relational, so 'unfaithful' better conveys
    the theological weight of Israel and Judah's breach against the LORD than the
    more generic 'dealt treacherously.' The stronger alternatives are preserved as
    lexical possibilities but are not required in the main text.
  doctrine_reference: 'Translation philosophy: preserve source sense without importing
    extra doctrinal claims; optimal equivalence.'
