id: JER.5.11
reference: Jeremiah 5:11
source:
  edition: WLC
  text: כִּי֩ בָג֨וֹד בָּגְד֜וּ בִּ֗/י בֵּ֧ית יִשְׂרָאֵ֛ל וּ/בֵ֥ית יְהוּדָ֖ה נְאֻם
    יְהוָֽה־׃
translation:
  text: For the house of Israel and the house of Judah have been utterly unfaithful
    to me, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'have surely dealt treacherously against me' or 'have utterly betrayed
      me.' The Hebrew uses an infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the grounds for the preceding accusation/judgment. 'For' best
    preserves the explanatory force in context.
- source_word: בָגֹוד בָּגְדוּ
  chosen: have been utterly unfaithful
  alternatives:
  - have surely dealt treacherously
  - have utterly betrayed
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea
    of בגד ('act treacherously, deal faithlessly'). 'Have been utterly unfaithful'
    communicates both the covenantal breach and the emphatic construction in natural
    English.
- source_word: בִּי
  chosen: to me
  alternatives:
  - against me
  lexicon: HALOT
  rationale: With בגד plus preposition, the sense is covenantal faithlessness directed
    toward the speaker. 'To me' is idiomatic with 'unfaithful' in English, while preserving
    the personal object of the offense.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: Retains the collective covenantal expression rather than flattening it
    to the simple proper name.
- source_word: וּבֵית יְהוּדָה
  chosen: and the house of Judah
  alternatives:
  - and Judah
  lexicon: HALOT
  rationale: Matches the parallel structure of the Hebrew and preserves the distinction
    between the two covenant communities.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is clear modern English
    and preserves the solemn prophetic force. 'the LORD' follows the project's default
    rendering for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering for the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
