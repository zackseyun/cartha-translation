id: JER.5.10
reference: Jeremiah 5:10
source:
  edition: WLC
  text: עֲל֤וּ בְ/שָׁרוֹתֶ֨י/הָ֙ וְ/שַׁחֵ֔תוּ וְ/כָלָ֖ה אַֽל תַּעֲשׂ֑וּ הָסִ֨ירוּ֙
    נְטִ֣ישׁוֹתֶ֔י/הָ כִּ֛י ל֥וֹא לַ/יהוָ֖ה הֵֽמָּה־׃
translation:
  text: Go up through her vine-rows and destroy, but do not make a full end. Remove
    her branches, for they are not the LORD’s.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Go up upon her walls and destroy.' The Hebrew term in 'through her vine-rows'
      is difficult, and some understand the image architecturally rather than agriculturally.
    reason: alternative_reading
  - marker: b
    text: Or 'Remove her shoots/tendrils.' The Hebrew may continue the vineyard metaphor.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲלוּ
  chosen: Go up
  alternatives:
  - Go up against
  - Climb up
  lexicon: HALOT
  rationale: Imperative plural of עלה, here a command to attackers. 'Go up' preserves
    the military movement sense without over-specifying 'against,' which is supplied
    by context.
- source_word: בְּשָׁרוֹתֶיהָ
  chosen: through her vine-rows
  alternatives:
  - upon her walls
  - into her terraces
  lexicon: HALOT
  rationale: The noun שׁוּר/שָׁרָה in this form is difficult and contextually debated.
    In parallel with 'remove her branches' and the vineyard imagery common in Jeremiah,
    'vine-rows' best fits the immediate metaphor. The preposition ב can be rendered
    'through' in this context.
- source_word: וְשַׁחֵתוּ
  chosen: and destroy
  alternatives:
  - and ruin
  - and lay waste
  lexicon: HALOT
  rationale: Imperative plural from שׁחת, a strong verb of destruction. 'Destroy'
    is direct and natural English.
- source_word: וְכָלָה אַל תַּעֲשׂוּ
  chosen: but do not make a full end
  alternatives:
  - but do not finish her off completely
  - but do not make complete destruction
  lexicon: HALOT
  rationale: כלה with עשה forms an idiom for bringing to complete end. The prohibition
    tempers the command to destroy, preserving the remnant theme in Jeremiah.
- source_word: הָסִירוּ
  chosen: Remove
  alternatives:
  - Take away
  - Strip off
  lexicon: HALOT
  rationale: Imperative plural from סור/הסיר, here commanding removal. 'Remove' is
    concise and fits either agricultural or architectural imagery.
- source_word: נְטִישׁוֹתֶיהָ
  chosen: her branches
  alternatives:
  - her shoots
  - her tendrils
  lexicon: HALOT
  rationale: Given the likely vineyard metaphor in the verse, 'branches' is the most
    intelligible rendering. More specific options like 'tendrils' are possible but
    less natural in English main text.
- source_word: כִּי לֹא לַיהוָה הֵמָּה
  chosen: for they are not the LORD’s
  alternatives:
  - for they do not belong to the LORD
  - for they are not for the LORD
  lexicon: HALOT
  rationale: The predicate with ל marks belonging/relationship. Per doctrine, יהוה
    is rendered 'the LORD.' The plural pronoun most naturally refers to the branches/shoots
    just mentioned.
