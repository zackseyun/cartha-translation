id: JER.5.29
reference: Jeremiah 5:29
source:
  edition: WLC
  text: הַֽ/עַל אֵ֥לֶּה לֹֽא אֶפְקֹ֖ד נְאֻם יְהֹוָ֑ה אִ֚ם בְּ/ג֣וֹי אֲשֶׁר כָּ/זֶ֔ה
    לֹ֥א תִתְנַקֵּ֖ם נַפְשִֽׁ/י־־־־׃ס
translation:
  text: Shall I not punish for these things? declares the LORD. Shall my soul not
    avenge itself on a nation such as this?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Shall I not call these things to account?' The Hebrew verb can mean
      'visit' in the sense of judicial intervention or punishment.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Shall my soul not avenge itself...?' 'My soul' is a Hebrew idiom
      expressing the LORD's own personal resolve; some translations render more idiomatically,
      'Shall I not avenge myself...?'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעַל
  chosen: Shall ... not
  alternatives:
  - Because of ... shall ... not
  - For these things ... shall ... not
  lexicon: HALOT
  rationale: The interrogative הֲ with עַל introduces a rhetorical question, idiomatically
    'Shall I not ... for/because of these things?' English requires restructuring
    rather than a wooden 'upon these.'
- source_word: אֵלֶּה
  chosen: these things
  alternatives:
  - these
  lexicon: HALOT
  rationale: The demonstrative points back to the preceding offenses; 'these things'
    makes the referent explicit in natural English.
- source_word: אֶפְקֹד
  chosen: punish
  alternatives:
  - visit
  - attend to
  - call to account
  lexicon: HALOT
  rationale: פקד in judgment contexts commonly means to visit with punishment or call
    to account. 'Punish' best conveys the judicial force here in clear modern English.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is idiomatic,
    preserves prophetic solemnity, and follows the project's default rendering of
    יְהוָה as 'the LORD'.
- source_word: אִם
  chosen: Shall ... not
  alternatives:
  - surely
  - indeed
  lexicon: HALOT
  rationale: 'In this parallel rhetorical question, אִם functions idiomatically in
    an oath-like interrogative: ''Shall ... not ...?'' rather than a simple conditional
    ''if.'''
- source_word: בְּגוֹי
  chosen: on a nation
  alternatives:
  - against a nation
  - upon a nation
  lexicon: HALOT
  rationale: With נקם, the preposition marks the object against which vengeance is
    directed. 'On a nation' is natural and preserves the force of judgment.
- source_word: אֲשֶׁר כָּזֶה
  chosen: such as this
  alternatives:
  - like this
  - such a one
  lexicon: HALOT
  rationale: This phrase qualifies the nation as being of this sort. 'Such as this'
    is idiomatic and suitably emphatic.
- source_word: תִתְנַקֵּם
  chosen: avenge itself
  alternatives:
  - take vengeance
  - be avenged
  lexicon: HALOT
  rationale: The Hitpael of נקם is reflexive/middle in force. Because the subject
    is נַפְשִׁי ('my soul'), 'avenge itself' reflects the grammar more closely than
    a simple active 'take vengeance,' while still sounding natural enough in context.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I myself
  - my being
  lexicon: HALOT
  rationale: נפש literally means 'soul/self/life.' Here it intensifies the speaker's
    personal involvement in vengeance. 'My soul' preserves the Hebrew expression;
    alternatives smooth the idiom but lose the lexical texture.
