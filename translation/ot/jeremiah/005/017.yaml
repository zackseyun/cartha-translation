theological_decisions:
- issue: Referent of the singular and plural verbs in the judgment sequence
  chosen_reading: The subject is the invading nation/foe previously introduced, rendered
    with English singular 'he' for the singular verbs and 'they' where the Hebrew
    shifts to plural.
  alternative_readings:
  - A collective singular could be rendered consistently as 'it' or the whole sequence
    could be smoothed to plural 'they' in English.
  rationale: The Hebrew alternates between singular and plural verbal forms. Rather
    than flattening the variation, the translation preserves it as much as readable
    English allows, reflecting the collective enemy as both a unit and its members
    in action.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve
    it
