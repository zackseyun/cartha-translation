id: JER.5.17
reference: Jeremiah 5:17
source:
  edition: WLC
  text: וְ/אָכַ֨ל קְצִֽירְ/ךָ֜ וְ/לַחְמֶ֗/ךָ יֹאכְלוּ֙ בָּנֶ֣י/ךָ וּ/בְנוֹתֶ֔י/ךָ
    יֹאכַ֤ל צֹאנְ/ךָ֙ וּ/בְקָרֶ֔/ךָ יֹאכַ֥ל גַּפְנְ/ךָ֖ וּ/תְאֵנָתֶ֑/ךָ יְרֹשֵׁ֞שׁ
    עָרֵ֣י מִבְצָרֶ֗י/ךָ אֲשֶׁ֥ר אַתָּ֛ה בּוֹטֵ֥חַ בָּ/הֵ֖נָּה בֶּ/חָֽרֶב׃
translation:
  text: And he will consume your harvest and your bread; they will consume your sons
    and your daughters; he will consume your flock and your herd; he will consume
    your vine and your fig tree; he will lay waste your fortified cities, in which
    you trust, with the sword.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'devour' for the repeated verb 'eat/consume' throughout the verse.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shifts between singular and plural verbs for the invader(s),
      likely treating the attacking nation both as a collective whole and as its individual
      forces.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָכַל / יֹאכְלוּ / יֹאכַל
  chosen: will consume / will consume
  alternatives:
  - eat
  - devour
  lexicon: HALOT
  rationale: אָכַל literally means 'eat,' but in this judgment context it extends
    to consuming produce, people, livestock, and agricultural resources. 'Consume'
    preserves the repeated verbal pattern while sounding natural in English across
    all objects. 'Devour' is possible but slightly more vivid than the Hebrew requires
    in every clause.
- source_word: קְצִירְךָ
  chosen: your harvest
  alternatives:
  - your crop
  - your reaping
  lexicon: HALOT
  rationale: קָצִיר commonly denotes harvested produce or harvest time. 'Your harvest'
    best fits the possessive and the context of national devastation.
- source_word: לַחְמֶךָ
  chosen: your bread
  alternatives:
  - your food
  lexicon: HALOT
  rationale: לֶחֶם is literally 'bread' and often can stand more broadly for food.
    Here 'bread' is retained for concreteness and because it naturally pairs with
    'harvest' in a covenant-judgment setting.
- source_word: בָּנֶיךָ וּבְנוֹתֶיךָ
  chosen: your sons and your daughters
  alternatives:
  - your children
  lexicon: HALOT
  rationale: The Hebrew explicitly names both sons and daughters. Following the gender-accurate
    principle, the translation preserves the paired terms rather than collapsing them
    into the generic 'children.'
- source_word: צֹאנְךָ וּבְקָרֶךָ
  chosen: your flock and your herd
  alternatives:
  - your sheep and your cattle
  - your small livestock and your cattle
  lexicon: HALOT
  rationale: צֹאן refers collectively to small livestock, especially sheep/goats,
    while בָּקָר refers to cattle. 'Flock and herd' is idiomatic and preserves the
    distinction without over-specifying species.
- source_word: גַּפְנְךָ וּתְאֵנָתֶךָ
  chosen: your vine and your fig tree
  alternatives:
  - your vineyard and your fig tree
  lexicon: HALOT
  rationale: The singular nouns point to vine and fig tree as representative agricultural
    assets. 'Vine and fig tree' preserves the familiar agrarian pairing and avoids
    shifting to a collective like 'vineyard' without textual warrant.
- source_word: יְרֹשֵׁשׁ
  chosen: will lay waste
  alternatives:
  - will impoverish
  - will destroy
  - will ravage
  lexicon: HALOT
  rationale: This rare verb carries the sense of reducing to ruin, despoiling, or
    laying waste. 'Lay waste' fits the object 'fortified cities' and the military
    context better than the more economic nuance 'impoverish.'
- source_word: עָרֵי מִבְצָרֶיךָ
  chosen: your fortified cities
  alternatives:
  - your strong cities
  - your fortress cities
  lexicon: HALOT
  rationale: The construct phrase denotes cities characterized by fortification. 'Fortified
    cities' is the clearest modern English rendering.
- source_word: אֲשֶׁר אַתָּה בּוֹטֵחַ בָּהֵנָּה
  chosen: in which you trust
  alternatives:
  - which you trust in
  - in which you are trusting
  lexicon: HALOT
  rationale: בָּטַח means to trust, rely on, feel secure in. The phrase modifies the
    fortified cities as the object of Judah's misplaced confidence. 'In which you
    trust' is idiomatic and preserves the relational force of the preposition.
- source_word: בֶּחָרֶב
  chosen: with the sword
  alternatives:
  - by the sword
  lexicon: HALOT
  rationale: The phrase marks means or instrument in a military judgment context.
    'With the sword' is a standard and natural rendering, though 'by the sword' would
    also be acceptable.
