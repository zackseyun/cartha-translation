id: JER.5.12
reference: Jeremiah 5:12
source:
  edition: WLC
  text: כִּֽחֲשׁוּ֙ בַּ/יהוָ֔ה וַ/יֹּאמְר֖וּ לֹא ה֑וּא וְ/לֹא תָב֤וֹא עָלֵ֨י/נוּ֙
    רָעָ֔ה וְ/חֶ֥רֶב וְ/רָעָ֖ב ל֥וֹא נִרְאֶֽה־־׃
translation:
  text: They have denied the LORD and said, “He is not there, and no disaster will
    come upon us; we will not see sword or famine.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “He will do nothing,” or “It is not he.” The Hebrew is brief and elliptical.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּחֲשׁוּ
  chosen: have denied
  alternatives:
  - have lied
  - have dealt falsely
  - have disowned
  lexicon: HALOT
  rationale: The verb כחשׁ with ב can mean to deny or act falsely toward someone.
    In this context, followed by speech rejecting the LORD's action, 'have denied'
    best captures repudiation of the LORD rather than mere falsehood.
- source_word: בַּיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD' in keeping with the project's
    default for the divine name.
- source_word: לֹא הוּא
  chosen: He is not there
  alternatives:
  - It is not he
  - He is nothing
  - He will do nothing
  lexicon: HALOT
  rationale: The Hebrew is terse and somewhat elliptical. In context it expresses
    denial of the LORD's active reality or intervention. 'He is not there' preserves
    the personal subject and the practical atheism implied by the following denial
    of judgment, while avoiding over-interpretive expansion.
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - harm
  - calamity
  lexicon: HALOT
  rationale: In prophetic judgment contexts רָעָה commonly denotes calamity/disaster
    rather than moral evil. 'Disaster' is clear modern English and fits the announced
    covenant judgment.
- source_word: חֶרֶב
  chosen: sword
  alternatives:
  - war
  lexicon: HALOT
  rationale: A literal rendering is preferable here; 'sword' preserves the concrete
    imagery of violent judgment.
- source_word: רָעָב
  chosen: famine
  alternatives:
  - hunger
  lexicon: HALOT
  rationale: In judgment formulas רָעָב refers to famine as a covenant curse, not
    merely personal hunger.
- source_word: לֹא נִרְאֶה
  chosen: we will not see
  alternatives:
  - we will not experience
  - it will not be seen by us
  lexicon: HALOT
  rationale: The first person plural verb from ראה is naturally rendered 'we will
    not see.' This keeps the Hebrew idiom while clearly conveying that they expect
    not to experience these judgments.
