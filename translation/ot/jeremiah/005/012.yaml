theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is 'the LORD' for YHWH, following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Interpretation of the elliptical phrase לֹא הוּא
  chosen_reading: He is not there
  alternative_readings:
  - He is nothing
  - He will do nothing
  - Not he
  rationale: The phrase is ambiguous and could be taken as denial of the LORD's existence,
    presence, or effective action. Because the immediate context is their claim that
    no judgment will come, the translation preserves the personal denial without collapsing
    it into a more interpretive paraphrase like 'He will do nothing.' An alternative
    is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological
    tension rather than resolve it'
