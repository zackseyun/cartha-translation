id: JER.5.3
reference: Jeremiah 5:3
source:
  edition: WLC
  text: יְהֹוָ֗ה עֵינֶי/ךָ֮ הֲ/ל֣וֹא לֶ/אֱמוּנָה֒ הִכִּ֤יתָה אֹתָ/ם֙ וְֽ/לֹא חָ֔לוּ
    כִּלִּיתָ֕/ם מֵאֲנ֖וּ קַ֣חַת מוּסָ֑ר חִזְּק֤וּ פְנֵי/הֶם֙ מִ/סֶּ֔לַע מֵאֲנ֖וּ
    לָ/שֽׁוּב־׃
translation:
  text: O LORD, are not your eyes on faithfulness? You struck them, but they did not
    writhe; you consumed them, but they refused to accept discipline. They made their
    faces harder than rock; they refused to return.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they did not weaken,' 'they did not become sick,' or 'they did not feel
      pain.'
    reason: lexical_alternative
  - marker: b
    text: Or 'they refused to repent.' The Hebrew literally says 'to return,' a common
      prophetic expression for turning back to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהֹוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  - O Jehovah
  lexicon: HALOT
  rationale: Rendered as 'LORD' per doctrine default for YHWH, with vocative 'O' reflecting
    direct address.
- source_word: עֵינֶיךָ
  chosen: your eyes
  lexicon: HALOT
  rationale: Kept the concrete anthropomorphic expression rather than abstracting
    to 'you look' in order to preserve the Hebrew imagery.
- source_word: הֲלוֹא לֶאֱמוּנָה
  chosen: are not your eyes on faithfulness?
  alternatives:
  - are not your eyes toward faithfulness?
  - do not your eyes seek faithfulness?
  - are not your eyes on truth?
  lexicon: HALOT
  rationale: אֱמוּנָה commonly denotes firmness, faithfulness, reliability, or fidelity.
    'Faithfulness' best fits the moral context of Jeremiah's accusation. 'On' expresses
    the idiomatic sense of divine regard directed toward covenant fidelity.
- source_word: הִכִּיתָה אֹתָם
  chosen: You struck them
  alternatives:
  - You smote them
  - You struck down on them
  lexicon: HALOT
  rationale: Straightforward rendering of נכה in context of divine judgment; 'struck'
    is natural modern English without losing force.
- source_word: וְלֹא חָלוּ
  chosen: but they did not writhe
  alternatives:
  - but they did not weaken
  - but they did not become sick
  - but they felt no pain
  lexicon: HALOT
  rationale: The verb חלה can denote becoming weak, sick, or pained. In this judgment
    context after being struck, 'did not writhe' captures the expected reaction to
    blows and preserves the vividness of the Hebrew better than the flatter 'were
    not grieved.'
- source_word: כִּלִּיתָם
  chosen: you consumed them
  alternatives:
  - you finished them
  - you destroyed them
  - you made an end of them
  lexicon: HALOT
  rationale: כלה in the Piel often means to complete, consume, or bring to an end.
    'Consumed' fits escalating judgment language while avoiding overstatement if the
    sense is severe chastisement rather than total annihilation.
- source_word: מֵאֲנוּ קַחַת מוּסָר
  chosen: they refused to accept discipline
  alternatives:
  - they refused to receive correction
  - they refused to take instruction
  - they refused to accept chastening
  lexicon: HALOT
  rationale: מוּסָר includes discipline, correction, and instruction. 'Accept discipline'
    communicates both punitive and formative aspects in readable English.
- source_word: חִזְּקוּ פְנֵיהֶם מִסֶּלַע
  chosen: They made their faces harder than rock
  alternatives:
  - They hardened their faces more than rock
  - They made their faces stronger than stone
  lexicon: HALOT
  rationale: The idiom expresses stubbornness and shameless resistance. 'Harder than
    rock' makes the comparative force clear in idiomatic English.
- source_word: מֵאֲנוּ לָשׁוּב
  chosen: they refused to return
  alternatives:
  - they refused to turn back
  - they refused to repent
  lexicon: HALOT
  rationale: שׁוּב literally means 'return/turn back' and often carries repentant
    force in prophetic literature. Main text keeps the more literal 'return' while
    preserving 'repent' as an interpretive alternative.
