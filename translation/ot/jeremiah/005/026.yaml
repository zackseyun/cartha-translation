id: JER.5.26
reference: Jeremiah 5:26
source:
  edition: WLC
  text: כִּי נִמְצְא֥וּ בְ/עַמִּ֖/י רְשָׁעִ֑ים יָשׁוּר֙ כְּ/שַׁ֣ךְ יְקוּשִׁ֔ים הִצִּ֥יבוּ
    מַשְׁחִ֖ית אֲנָשִׁ֥ים יִלְכֹּֽדוּ־׃
translation:
  text: For wicked men are found among my people; they lie in wait like fowlers crouching.
    They set a trap; they catch men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like bird-catchers lurking' / 'like the crouching of fowlers.' The Hebrew
      phrase is difficult, but the sense is of concealed hunters waiting to ensnare
      prey.
    reason: lexical_alternative
  - marker: b
    text: Or 'a snare.' The Hebrew noun denotes something destructive; in context
      it refers to a device laid to capture people.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation for the preceding indictment; 'for' best preserves
    the causal/explanatory force in context.
- source_word: נִמְצְאוּ
  chosen: are found
  alternatives:
  - are to be found
  - are discovered
  lexicon: HALOT
  rationale: 'Niphal of מצא here is passive/resultative: wicked persons are present
    within the people. ''Are found'' is natural and close to the Hebrew.'
- source_word: בְעַמִּי
  chosen: among my people
  alternatives:
  - in my people
  lexicon: HALOT
  rationale: The preposition ב with 'my people' is idiomatically rendered 'among my
    people' in English to express presence within the community.
- source_word: רְשָׁעִים
  chosen: wicked men
  alternatives:
  - wicked ones
  - wicked people
  lexicon: HALOT
  rationale: The masculine plural denotes wicked persons; 'wicked men' preserves the
    gendered form in line with the project's gender-accurate policy, while still functioning
    representatively.
- source_word: יָשׁוּר
  chosen: they lie in wait
  alternatives:
  - he watches
  - he lurks
  lexicon: HALOT
  rationale: Although morphologically singular, the verb follows a plural subject
    in a distributive/collective sense. The context of multiple wicked persons setting
    traps supports an English plural. 'Lie in wait' captures the predatory nuance
    better than the more neutral 'watch'.
- source_word: כְּשַׁךְ יְקוּשִׁים
  chosen: like fowlers crouching
  alternatives:
  - like the crouching of bird-catchers
  - like bird-trappers lurking
  lexicon: HALOT
  rationale: This difficult phrase compares the wicked to bird-catchers/fowlers in
    a crouched, concealed posture. 'Like fowlers crouching' gives a clear English
    image while preserving the simile and hunting context.
- source_word: הִצִּיבוּ
  chosen: They set
  alternatives:
  - They place
  - They station
  lexicon: HALOT
  rationale: In context of trapping, 'set' is the natural English verb for placing
    a snare or destructive device.
- source_word: מַשְׁחִית
  chosen: a trap
  alternatives:
  - a snare
  - a destructive thing
  lexicon: HALOT
  rationale: Though the noun can denote something destructive, in this immediate hunting
    metaphor it refers to a device laid to ruin/capture victims. 'Trap' is the clearest
    contextual rendering; 'snare' is possible but slightly narrower and more archaic
    in modern English.
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  - persons
  lexicon: HALOT
  rationale: The Hebrew specifically says 'men.' Per gender-accurate policy, the masculine
    form is retained rather than neutralized, while the sense remains representative
    of human victims.
- source_word: יִלְכֹּדוּ
  chosen: they catch
  alternatives:
  - they capture
  - they seize
  lexicon: HALOT
  rationale: Qal of לכד in a trapping context is well rendered 'catch.' It matches
    the hunting metaphor and reads naturally in English.
