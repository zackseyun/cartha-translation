id: JER.5.20
reference: Jeremiah 5:20
source:
  edition: WLC
  text: הַגִּ֥ידוּ זֹ֖את בְּ/בֵ֣ית יַעֲקֹ֑ב וְ/הַשְׁמִיע֥וּ/הָ בִ/יהוּדָ֖ה לֵ/אמֹֽר׃
translation:
  text: 'Declare this in the house of Jacob, and proclaim it in Judah, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make it heard in Judah.' The Hebrew verb literally means 'cause it to
      be heard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּידוּ
  chosen: Declare
  alternatives:
  - Tell
  - Announce
  lexicon: HALOT
  rationale: Imperative plural of נגד, calling for public verbal declaration. 'Declare'
    preserves the formal, herald-like force better than the more casual 'tell.'
- source_word: זֹאת
  chosen: this
  lexicon: HALOT
  rationale: Straightforward feminine singular demonstrative referring forward to
    the message that follows.
- source_word: בְּבֵית יַעֲקֹב
  chosen: in the house of Jacob
  alternatives:
  - among the house of Jacob
  - to the house of Jacob
  lexicon: HALOT
  rationale: בית יעקב is a common collective designation for the people descended
    from Jacob/Israel. 'In the house of Jacob' is a natural rendering of the preposition
    and preserves the covenantal, corporate sense.
- source_word: וְהַשְׁמִיעוּהָ
  chosen: and proclaim it
  alternatives:
  - and make it heard
  - and announce it
  lexicon: HALOT
  rationale: Hiphil imperative of שמע with 3fs suffix means to cause something to
    be heard. 'Proclaim it' captures the causative-public sense in idiomatic English,
    while retaining the object suffix with 'it.'
- source_word: בִיהוּדָה
  chosen: in Judah
  alternatives:
  - throughout Judah
  - to Judah
  lexicon: HALOT
  rationale: The preposition ב is most simply rendered 'in.' Because the command concerns
    public dissemination within the region/people of Judah, 'in Judah' is both accurate
    and readable.
- source_word: לֵאמֹר
  chosen: 'saying:'
  alternatives:
  - 'thus:'
  - 'as follows:'
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of the proclamation
    in the following verse; 'saying:' is the most transparent rendering.
