id: JER.5.7
reference: Jeremiah 5:7
source:
  edition: WLC
  text: אֵ֤י לָ/זֹאת֙ אסלוח לָ֔/ךְ בָּנַ֣יִ/ךְ עֲזָב֔וּ/נִי וַ/יִּשָּׁבְע֖וּ בְּ/לֹ֣א
    אֱלֹהִ֑ים וָ/אַשְׂבִּ֤עַ אוֹתָ/ם֙ וַ/יִּנְאָ֔פוּ וּ/בֵ֥ית זוֹנָ֖ה יִתְגֹּדָֽדוּ־׃
translation:
  text: How can I forgive you for this? Your children have forsaken me and have sworn
    by those that are not gods. Even when I satisfied them, they committed adultery
    and crowded into a prostitute’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I fed them to the full.' The Hebrew verb can denote causing to be full
      or satisfied; some have also connected it with oath language, but 'satisfied'
      best fits the context of divine provision followed by unfaithfulness.
    reason: lexical_alternative
  - marker: b
    text: Or 'they thronged to a prostitute’s house' / 'they gathered in bands at
      a prostitute’s house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵי
  chosen: How can
  alternatives:
  - Why
  - How
  lexicon: HALOT
  rationale: Interrogative particle expressing incredulity or rhetorical impossibility.
    'How can' best captures the force in context rather than a simple 'why.'
- source_word: לָזֹאת
  chosen: for this
  alternatives:
  - because of this
  - for this reason
  lexicon: HALOT
  rationale: The preposition with demonstrative points to the grounds of the question.
    'For this' is concise and natural in English.
- source_word: אסלוח לָךְ
  chosen: I forgive you
  alternatives:
  - I pardon you
  lexicon: HALOT
  rationale: סלח means to forgive/pardon. 'Forgive' is the standard, accessible rendering.
    The 2fs suffix is retained with singular 'you,' addressing Jerusalem/Judah as
    a corporate feminine singular.
- source_word: בָּנַיִךְ
  chosen: Your children
  alternatives:
  - your sons
  lexicon: HALOT
  rationale: Though literally 'sons/children,' in context it refers to the people
    belonging to the addressed city/nation. 'Children' better conveys the collective
    sense without over-specifying males.
- source_word: עֲזָבוּנִי
  chosen: have forsaken me
  alternatives:
  - have abandoned me
  - left me
  lexicon: HALOT
  rationale: עזב in covenantal contexts often carries the weight of apostasy or abandonment.
    'Forsaken' preserves that gravity.
- source_word: וַיִּשָּׁבְעוּ בְּלֹא אֱלֹהִים
  chosen: have sworn by those that are not gods
  alternatives:
  - swore by no-gods
  - swore by what are not gods
  lexicon: HALOT
  rationale: The phrase denotes oath-taking by false deities. Rendering with 'those
    that are not gods' makes explicit the implied referent while preserving the polemical
    force.
- source_word: וָאַשְׂבִּעַ אוֹתָם
  chosen: Even when I satisfied them
  alternatives:
  - I fed them to the full
  - I filled them
  - I made them swear
  lexicon: HALOT
  rationale: The verb from שבע here is best taken as 'satisfy/fill' rather than a
    causative of 'swear,' especially in parallel with the people's unfaithfulness
    despite divine provision. 'Even when I satisfied them' brings out the concessive
    sense in context.
- source_word: וַיִּנְאָפוּ
  chosen: they committed adultery
  alternatives:
  - they adulterized
  - they were adulterous
  lexicon: HALOT
  rationale: נאף is the standard verb for committing adultery, here likely carrying
    both literal and metaphorical force. The straightforward English rendering preserves
    that ambiguity.
- source_word: וּבֵית זוֹנָה
  chosen: a prostitute’s house
  alternatives:
  - the house of a prostitute
  - a harlot's house
  lexicon: HALOT
  rationale: זוֹנָה denotes a prostitute. 'Prostitute’s house' is modern and clear,
    avoiding archaic 'harlot.' The singular may function collectively or represent
    a typical brothel.
- source_word: יִתְגֹּדָדוּ
  chosen: crowded into
  alternatives:
  - thronged to
  - gathered themselves in troops at
  - banded together in
  lexicon: HALOT
  rationale: The hitpolel of גדד here conveys assembling in bands/crowds. 'Crowded
    into' fits the image of men pressing into a brothel and reads naturally in English.
