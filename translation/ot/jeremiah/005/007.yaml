theological_decisions:
- issue: Literal vs metaphorical adultery
  chosen_reading: Retain 'committed adultery' without specifying whether the reference
    is sexual sin, idolatry, or both.
  alternative_readings:
  - Render explicitly as 'played the whore' to foreground idolatry
  - Interpret only literally as sexual immorality
  rationale: Jeremiah often blends sexual and covenantal imagery. A plain rendering
    preserves the prophetic tension rather than collapsing it into one interpretive
    option.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Addressee number and identity
  chosen_reading: Use singular 'you' for the addressed entity while pluralizing 'children'
    for its inhabitants.
  alternative_readings:
  - Use 'you all' throughout
  - Specify 'Jerusalem' or 'Judah' in the text
  rationale: The Hebrew addresses a corporate feminine singular entity and then refers
    to its people in the plural. English can preserve this with singular 'you' and
    plural 'children' without importing an explicit identification not present in
    the verse.
