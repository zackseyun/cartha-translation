id: JER.5.16
reference: Jeremiah 5:16
source:
  edition: WLC
  text: אַשְׁפָּת֖/וֹ כְּ/קֶ֣בֶר פָּת֑וּחַ כֻּלָּ֖/ם גִּבּוֹרִֽים׃
translation:
  text: Their quiver is like an open grave; all of them are mighty men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his quiver,' taking the singular suffix more strictly; the Hebrew uses
      a singular suffix with a collective referent.
    reason: lexical_alternative
  - marker: b
    text: Or 'all of them are warriors.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁפָּתוֹ
  chosen: their quiver
  alternatives:
  - his quiver
  - their arrow case
  lexicon: HALOT
  rationale: The noun means a quiver or arrow case. Although the suffix is morphologically
    3ms ('his'), in context Jeremiah is describing the invading nation collectively,
    so English idiom is better served by the distributive/collective 'their quiver'
    rather than the awkward singular. 'Arrow case' is possible but less natural in
    modern English.
- source_word: כְּקֶבֶר
  chosen: is like an open grave
  alternatives:
  - is like an open tomb
  lexicon: HALOT
  rationale: The preposition כְ marks comparison, 'like/as.' קבר is the ordinary word
    for grave/tomb. 'Grave' is preferred here as the more vivid and common English
    term in this simile.
- source_word: פָּתוּחַ
  chosen: open
  alternatives:
  - opened
  lexicon: HALOT
  rationale: The adjective/passive participial form describes the grave as standing
    open. English idiom prefers the attributive adjective 'open' in this construction.
- source_word: כֻּלָּם
  chosen: all of them
  alternatives:
  - all of them together
  - all
  lexicon: HALOT
  rationale: The term emphasizes the totality of the group. 'All of them' preserves
    the collective force clearly in natural English.
- source_word: גִּבּוֹרִים
  chosen: mighty men
  alternatives:
  - warriors
  - mighty ones
  - heroes
  lexicon: HALOT
  rationale: גִּבּוֹרִים commonly denotes strong, valiant fighting men. 'Mighty men'
    preserves the lexical sense and the masculine plural form. 'Warriors' is contextually
    apt but slightly more interpretive; 'heroes' can sound laudatory in a way not
    required by the text.
