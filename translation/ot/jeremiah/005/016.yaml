theological_decisions:
- issue: Masculine plural גִּבּוֹרִים
  chosen_reading: mighty men
  alternative_readings:
  - warriors
  - mighty ones
  rationale: Following the translation philosophy's gender-accurate principle, the
    masculine plural is retained as 'men' rather than neutralized, since the term
    refers to fighting males in the invading force.
