id: JER.5.19
reference: Jeremiah 5:19
source:
  edition: WLC
  text: וְ/הָיָה֙ כִּ֣י תֹאמְר֔וּ תַּ֣חַת מֶ֗ה עָשָׂ֨ה יְהֹוָ֧ה אֱלֹהֵ֛י/נוּ לָ֖/נוּ אֶת כָּל אֵ֑לֶּה וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֗ם כַּ/אֲשֶׁ֨ר עֲזַבְתֶּ֤ם אוֹתִ/י֙ וַ/תַּעַבְד֞וּ אֱלֹהֵ֤י נֵכָר֙ בְּ/אַרְצְ/כֶ֔ם כֵּ֚ן תַּעַבְד֣וּ זָרִ֔ים בְּ/אֶ֖רֶץ לֹ֥א לָ/כֶֽם־־׃ס
translation:
  text: And when you say, ‘Why has Yahweh our God done all these things to us?’ then you shall say to them, ‘Just as you have forsaken me and served foreign gods in your land, so you shall serve foreigners in a land not yours.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'served strangers' / 'served aliens'; the Hebrew זָרִים denotes foreign people here, in contrast to 'foreign gods' earlier in the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  chosen: And when
  alternatives:
  - And it shall be, when
  - And it will happen, when
  lexicon: HALOT
  rationale: This idiom introduces a future contingency. 'And when' gives natural English while preserving the temporal force without woodenly reproducing the Hebrew formula.
- source_word: תַּחַת מֶה
  chosen: Why
  alternatives:
  - For what reason
  - On account of what
  lexicon: HALOT
  rationale: The phrase literally means 'under/for what?' and idiomatically asks the reason or cause. 'Why' is the most natural equivalent in context.
- source_word: עָשָׂה ... אֶת כָּל אֵלֶּה
  chosen: done all these things
  alternatives:
  - done all this
  - done all these
  lexicon: HALOT
  rationale: The verb plus object marker and demonstrative plural points to concrete acts of judgment just mentioned. 'All these things' preserves the plural demonstrative and reads naturally.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Straightforward construct with first person plural suffix; retained in full to preserve covenantal relationship language.
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  chosen: then you shall say to them
  alternatives:
  - and you shall say to them
  - you must say to them
  lexicon: HALOT
  rationale: The waw plus perfect here continues the instruction to the prophet. 'Then you shall say' captures the sequence in clear English.
- source_word: כַּאֲשֶׁר
  chosen: Just as
  alternatives:
  - As
  - In the same way that
  lexicon: HALOT
  rationale: Introduces a comparison that is answered by כֵּן later in the verse. 'Just as ... so' best preserves the rhetorical symmetry.
- source_word: עֲזַבְתֶּם אוֹתִי
  chosen: you have forsaken me
  alternatives:
  - you abandoned me
  - you left me
  lexicon: HALOT
  rationale: עזב in covenant contexts often carries the force of apostasy or abandonment. 'Forsaken' preserves that gravity better than the flatter 'left.'
- source_word: וַתַּעַבְדוּ
  chosen: served
  alternatives:
  - worshiped
  - became slaves to
  lexicon: HALOT
  rationale: עבד with divine objects can mean serve/worship. 'Served' is broader and allows the parallel with later service to foreigners to remain explicit.
- source_word: אֱלֹהֵי נֵכָר
  chosen: foreign gods
  alternatives:
  - strange gods
  - gods of foreigners
  lexicon: HALOT
  rationale: The construct denotes gods belonging to what is foreign/alien. 'Foreign gods' is standard and clear.
- source_word: בְּאַרְצְכֶם
  chosen: in your land
  alternatives:
  - in your own land
  - in your country
  lexicon: HALOT
  rationale: Simple locative phrase. 'In your land' preserves the covenant-land resonance without adding 'own,' though that sense is implicit.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Completes the comparison begun by כַּאֲשֶׁר. 'So' is concise and idiomatic in English.
- source_word: תַּעַבְדוּ זָרִים
  chosen: you shall serve foreigners
  alternatives:
  - you shall serve strangers
  - you shall serve aliens
  lexicon: HALOT
  rationale: זָרִים here refers to foreign people, not gods, because it is contrasted with 'foreign gods' and followed by 'in a land not yours.' 'Foreigners' makes the shift in object clear.
- source_word: בְּאֶרֶץ לֹא לָכֶם
  chosen: in a land not yours
  alternatives:
  - in a land that is not yours
  - in a land belonging to others
  lexicon: HALOT
  rationale: 'This compact rendering preserves the terseness and the exile motif: they will be displaced from their own land into one that does not belong to them.'
