theological_decisions:
- issue: Referent of the feminine suffix in לְאַחֲרִיתָהּ
  chosen_reading: The suffix refers to the corrupt state of affairs just described,
    rendered impersonally as 'its end.'
  alternative_readings:
  - The suffix refers more generally to the land/city, yielding 'her end'
  - The suffix is left more formally as 'the end of it/her'
  rationale: The verse climaxes in a warning about the outcome of the present prophetic-priestly
    corruption loved by the people. Rendering the suffix as 'its' avoids importing
    a specific feminine antecedent not explicit in English while preserving the rhetorical
    warning.
