id: JER.5.31
reference: Jeremiah 5:31
source:
  edition: WLC
  text: הַ/נְּבִיאִ֞ים נִבְּא֣וּ בַ/שֶּׁ֗קֶר וְ/הַ/כֹּהֲנִים֙ יִרְדּ֣וּ עַל יְדֵי/הֶ֔ם
    וְ/עַמִּ֖/י אָ֣הֲבוּ כֵ֑ן וּ/מַֽה תַּעֲשׂ֖וּ לְ/אַחֲרִיתָֽ/הּ־־־׃
translation:
  text: The prophets prophesy falsely, and the priests rule by their authority, and
    my people love it so. But what will you do when its end comes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the priests rule at their direction' or 'the priests rule by their hands.'
      The Hebrew phrase is difficult.
    reason: alternative_reading
  - marker: b
    text: Or 'what will you do at her end?' The Hebrew suffix is feminine and may
      refer to the situation, the land, or the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְּאוּ בַשֶּׁקֶר
  chosen: prophesy falsely
  alternatives:
  - prophesy lies
  - prophesy by falsehood
  lexicon: HALOT
  rationale: The idiom combines the verb 'prophesy' with 'in/with falsehood.' 'Prophesy
    falsely' is natural English and preserves the accusation of deceptive prophecy
    without over-paraphrasing.
- source_word: יִרְדּוּ
  chosen: rule
  alternatives:
  - have dominion
  - lead
  - direct
  lexicon: HALOT
  rationale: The verb from רדה commonly carries the sense of ruling or exercising
    dominion. 'Rule' best fits the context of priestly exercise of power.
- source_word: עַל יְדֵיהֶם
  chosen: by their authority
  alternatives:
  - at their hands
  - under their direction
  - according to them
  lexicon: HALOT
  rationale: This phrase is difficult, but in context it most plausibly means that
    the priests exercise rule in dependence on or under the influence of the prophets.
    'By their authority' communicates mediated control in idiomatic English while
    preserving the relational force of the Hebrew.
- source_word: כֵן
  chosen: so
  alternatives:
  - thus
  - like this
  lexicon: HALOT
  rationale: A simple adverbial rendering fits the clause 'my people love it so,'
    expressing approval of this state of affairs.
- source_word: לְאַחֲרִיתָהּ
  chosen: when its end comes
  alternatives:
  - at its end
  - in the end of it
  - for her latter end
  lexicon: HALOT
  rationale: אַחֲרִית denotes the end, outcome, or latter end. The 3fs suffix likely
    refers to the present corrupt situation/order. 'When its end comes' is readable
    modern English and preserves the warning of impending outcome.
- source_word: וּמַה תַּעֲשׂוּ
  chosen: But what will you do
  alternatives:
  - And what will you do
  - What then will you do
  lexicon: HALOT
  rationale: The conjunction here is adversative in sense, marking a sharp rhetorical
    turn from description to warning. 'But' captures that force well in English.
