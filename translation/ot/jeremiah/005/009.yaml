theological_decisions:
- issue: Anthropopathic expression for divine judgment in נַפְשִׁי
  chosen_reading: retain 'my soul' in the main text
  alternative_readings:
  - I myself
  - my being
  rationale: The Hebrew uses an anthropopathic self-reference for God. Preserving
    'my soul' maintains the source-text imagery and theological tension rather than
    flattening it into an interpretive paraphrase. A footnote can clarify that it
    denotes the LORD himself, not a statement about divine composition.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for the Tetragrammaton.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD'
