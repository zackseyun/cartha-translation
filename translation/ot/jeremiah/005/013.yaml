id: JER.5.13
reference: Jeremiah 5:13
source:
  edition: WLC
  text: וְ/הַ/נְּבִיאִים֙ יִֽהְי֣וּ לְ/ר֔וּחַ וְ/הַ/דִּבֵּ֖ר אֵ֣ין בָּ/הֶ֑ם כֹּ֥ה
    יֵעָשֶׂ֖ה לָ/הֶֽם׃ס
translation:
  text: And the prophets will become wind, and the word is not in them; thus it will
    be done to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spirit' or 'breath' for 'wind.' The Hebrew word רוּחַ can carry any
      of these senses; here it likely means the prophets are empty or insubstantial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַנְּבִיאִים
  chosen: And the prophets
  alternatives:
  - And the prophets themselves
  lexicon: HALOT
  rationale: Definite plural noun with conjunction. Standard rendering 'the prophets'
    fits the referent in context without adding emphasis not explicit in the Hebrew.
- source_word: יִהְיוּ
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: The verb היה with לְ often carries a sense of becoming or turning into,
    not merely existing. 'Will become' best reflects the predicative force with לְרוּחַ.
- source_word: לְרוּחַ
  chosen: wind
  alternatives:
  - spirit
  - breath
  lexicon: HALOT
  rationale: רוּחַ can mean wind, spirit, or breath. Here the sense is that the prophets
    are empty, insubstantial, or their speech is mere air; 'wind' is the most natural
    English rendering in this polemical context. The alternatives are worth preserving
    because of the word's semantic range.
- source_word: וְהַדִּבֵּר
  chosen: and the word
  alternatives:
  - and the speaking
  - and the message
  lexicon: HALOT
  rationale: The nominal form from דבר here most naturally refers to the spoken word/message.
    'The word' preserves the terseness of the Hebrew and fits the following clause
    'is not in them.'
- source_word: אֵין בָּהֶם
  chosen: is not in them
  alternatives:
  - is absent from them
  - they do not have
  lexicon: HALOT
  rationale: The existential negative plus preposition is rendered straightforwardly.
    'Is not in them' preserves the Hebrew idiom and leaves open whether this means
    they lack the true word of the LORD or any substantive message.
- source_word: כֹּה
  chosen: thus
  alternatives:
  - so
  lexicon: HALOT
  rationale: 'כֹּה introduces the consequence or quoted sentiment: ''thus/so.'' ''Thus''
    better matches the solemn prophetic register.'
- source_word: יֵעָשֶׂה לָהֶם
  chosen: it will be done to them
  alternatives:
  - so shall it be done to them
  - this will happen to them
  lexicon: HALOT
  rationale: Nifal of עשה here is impersonal/passive. 'It will be done to them' is
    a close and natural rendering, preserving the ominous passive without specifying
    the agent.
