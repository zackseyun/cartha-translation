theological_decisions:
- issue: Meaning of רוּחַ in a denunciation of prophets
  chosen_reading: wind
  alternative_readings:
  - spirit
  - breath
  rationale: The verse mocks the prophets as empty and unsubstantial, and pairs this
    with 'the word is not in them.' Rendering רוּחַ as 'wind' preserves the rebuke
    without implying the Holy Spirit is in view. Because the Hebrew term is semantically
    broad, alternatives are preserved in a footnote rather than forced into the main
    text.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
