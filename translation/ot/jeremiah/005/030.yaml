id: JER.5.30
reference: Jeremiah 5:30
source:
  edition: WLC
  text: שַׁמָּה֙ וְ/שַׁ֣עֲרוּרָ֔ה נִהְיְתָ֖ה בָּ/אָֽרֶץ׃
translation:
  text: 'An appalling and horrible thing has happened in the land:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A horror and a shocking thing has happened in the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁמָּה
  chosen: appalling thing
  alternatives:
  - horror
  - astonishment
  - desolation
  lexicon: HALOT
  rationale: The noun denotes something causing horror or appalled astonishment. In
    this collocation with שַׁעֲרוּרָה, an adjectival-like English expression is more
    natural than a bare abstract noun. 'Appalling thing' preserves the sense of shocking
    outrage without over-specifying 'desolation,' which fits other contexts better.
- source_word: וְשַׁעֲרוּרָה
  chosen: and horrible thing
  alternatives:
  - and dreadful thing
  - and shocking thing
  lexicon: HALOT
  rationale: This noun refers to something horrible, monstrous, or shocking. Paired
    with שַׁמָּה, it forms a hendiadys-like intensification. 'Horrible thing' keeps
    the concrete force and avoids archaic 'horrid' or overly interpretive renderings.
- source_word: נִהְיְתָה
  chosen: has happened
  alternatives:
  - has come to pass
  - has occurred
  - has come about
  lexicon: HALOT
  rationale: From היה, here indicating that such a state/event has come into being
    in the land. English idiom favors 'has happened' for a shocking occurrence. This
    is more natural than the wooden 'has come to pass' while preserving the perfective
    sense.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the הארץ
  - in the country
  lexicon: HALOT
  rationale: '''The land'' is the standard rendering for הארץ in prophetic literature,
    often referring to the land of Judah/Israel in covenantal context. ''Country''
    is possible but weaker biblically; ''earth'' would be too broad here.'
