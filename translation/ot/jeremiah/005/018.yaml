id: JER.5.18
reference: Jeremiah 5:18
source:
  edition: WLC
  text: וְ/גַ֛ם בַּ/יָּמִ֥ים הָ/הֵ֖מָּה נְאֻם יְהֹוָ֑ה לֹֽא אֶעֱשֶׂ֥ה אִתְּ/כֶ֖ם כָּלָֽה־־׃
translation:
  text: Yet even in those days, declares Yahweh, I will not make a full end of you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will not completely destroy you.' The Hebrew says literally, 'I will not make a full end of you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  chosen: Yet even
  alternatives:
  - And also
  - But even
  lexicon: HALOT
  rationale: The conjunction plus additive particle marks continuation with emphasis. 'Yet even' captures both the connective force and the concessive nuance in context after severe judgment announcements.
- source_word: בַּיָּמִים הָהֵמָּה
  chosen: in those days
  alternatives:
  - in those times
  lexicon: HALOT
  rationale: A standard temporal expression referring to the period under discussion. 'In those days' is idiomatic and preserves the prophetic register.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is well rendered as 'declares the LORD' in contemporary English. It preserves the solemnity of the utterance without sounding archaic. Per doctrine, יְהוָה is rendered 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא אֶעֱשֶׂה
  chosen: I will not make
  alternatives:
  - I will not do
  - I will not bring about
  lexicon: HALOT
  rationale: עשה with כָּלָה forms the idiom 'make/do a full end.' 'I will not make' preserves the Hebrew construction more closely while remaining natural in English.
- source_word: אִתְּכֶם
  chosen: of you
  alternatives:
  - with you
  lexicon: HALOT
  rationale: Although the preposition is literally 'with,' English idiom with 'make a full end' normally takes 'of.' This reflects the sense of the Hebrew expression rather than a wooden prepositional match.
- source_word: כָּלָה
  chosen: a full end
  alternatives:
  - a complete destruction
  - an end
  lexicon: HALOT
  rationale: כָּלָה here denotes complete annihilation or total destruction. 'A full end' preserves the recurring prophetic idiom in Jeremiah, while signaling that judgment will be severe but not utterly exterminating.
