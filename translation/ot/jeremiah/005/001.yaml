id: JER.5.1
reference: Jeremiah 5:1
source:
  edition: WLC
  text: שׁוֹטְט֞וּ בְּ/חוּצ֣וֹת יְרוּשָׁלִַ֗ם וּ/רְאוּ נָ֤א וּ/דְעוּ֙ וּ/בַקְשׁ֣וּ
    בִ/רְחוֹבוֹתֶ֔י/הָ אִם תִּמְצְא֣וּ אִ֔ישׁ אִם יֵ֛שׁ עֹשֶׂ֥ה מִשְׁפָּ֖ט מְבַקֵּ֣שׁ
    אֱמוּנָ֑ה וְ/אֶסְלַ֖ח לָֽ/הּ־־־׃
translation:
  text: Roam through the streets of Jerusalem, and please look and know, and search
    in her squares, whether you can find a man, whether there is one who does justice,
    who seeks faithfulness, and I will forgive her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'truth' for 'faithfulness.' The Hebrew אֱמוּנָה can denote faithfulness,
      reliability, or truthfulness.
    reason: lexical_alternative
  - marker: b
    text: '''A man'' renders the singular masculine Hebrew אִישׁ; the sense is that
      even one such person could not be found.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹטְטוּ
  chosen: Roam through
  alternatives:
  - Go to and fro
  - Rove about
  lexicon: HALOT
  rationale: The imperative calls for moving about extensively through the city, not
    merely walking once through it. 'Roam through' is natural modern English and preserves
    the sense of searching movement.
- source_word: בְּחוּצוֹת
  chosen: through the streets
  alternatives:
  - in the streets
  - through the open places
  lexicon: HALOT
  rationale: חוּצוֹת commonly refers to streets or outside places in a city. 'Through
    the streets' fits the motion of שׁוֹטְטוּ and reads naturally in English.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: וּרְאוּ נָא
  chosen: and please look
  alternatives:
  - and see, please
  - and look now
  lexicon: HALOT
  rationale: נָא softens or urges the command. 'Please look' preserves the particle's
    force better than omitting it, while remaining idiomatic.
- source_word: וּדְעוּ
  chosen: and know
  alternatives:
  - and take note
  - and observe
  lexicon: HALOT
  rationale: The verb is literally 'know.' In context it means to ascertain or recognize
    what is actually the case. 'Know' keeps the formal force and pairs well with the
    surrounding imperatives.
- source_word: וּבַקְשׁוּ
  chosen: and search
  alternatives:
  - and seek
  - and look for
  lexicon: HALOT
  rationale: The verb intensifies the investigative sequence. 'Search' better conveys
    deliberate examination than the broader 'seek.'
- source_word: בִּרְחוֹבוֹתֶיהָ
  chosen: in her squares
  alternatives:
  - in her plazas
  - in her broad places
  lexicon: HALOT
  rationale: רְחֹבוֹת refers to broad public spaces or squares within a city. 'Squares'
    is concise and idiomatic, while 'her' preserves the feminine personification of
    Jerusalem.
- source_word: אִם תִּמְצְאוּ אִישׁ
  chosen: whether you can find a man
  alternatives:
  - if you find a man
  - whether you can find anyone
  lexicon: HALOT
  rationale: The construction introduces the object of the search. 'A man' preserves
    the singular masculine אִישׁ in keeping with the project's gender-accurate policy;
    the sense is representative, but the Hebrew is not gender-neutral.
- source_word: אִם יֵשׁ
  chosen: whether there is one
  alternatives:
  - if there is
  - whether there is anyone
  lexicon: HALOT
  rationale: This restates and sharpens the search criterion. 'Whether there is one'
    preserves the rhetorical force of looking for even a single qualifying person.
- source_word: עֹשֶׂה מִשְׁפָּט
  chosen: who does justice
  alternatives:
  - who practices justice
  - who executes justice
  lexicon: HALOT
  rationale: מִשְׁפָּט here refers to justice in conduct. 'Does justice' is compact
    and faithful to the Hebrew verbal expression.
- source_word: מְבַקֵּשׁ אֱמוּנָה
  chosen: who seeks faithfulness
  alternatives:
  - who seeks truth
  - who seeks honesty
  - who seeks fidelity
  lexicon: HALOT
  rationale: אֱמוּנָה can denote faithfulness, reliability, or truthfulness. 'Faithfulness'
    best captures covenantal and ethical steadfastness here, though 'truth' is a viable
    contextual alternative and is preserved in a footnote.
- source_word: וְאֶסְלַח לָהּ
  chosen: and I will forgive her
  alternatives:
  - then I will pardon her
  - and I will spare her
  lexicon: HALOT
  rationale: The verb means forgive/pardon. 'Forgive her' is the most direct rendering;
    'her' refers to Jerusalem/city personified in the feminine.
