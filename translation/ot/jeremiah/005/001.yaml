theological_decisions:
- issue: Representative singular אִישׁ
  chosen_reading: a man
  alternative_readings:
  - anyone
  rationale: The Hebrew uses the singular masculine noun אִישׁ. Following the project's
    gender-accurate policy, the main text preserves 'man' rather than neutralizing
    it to 'anyone,' while the representative sense is noted as an alternative.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Meaning of אֱמוּנָה in ethical context
  chosen_reading: faithfulness
  alternative_readings:
  - truth
  - honesty
  rationale: The term can overlap with truthfulness and reliability. In Jeremiah's
    covenantal setting, 'faithfulness' best preserves the moral and relational dimension
    without reducing it to mere factual truth. Because the ambiguity is genuine, an
    alternative is preserved in a footnote.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3
