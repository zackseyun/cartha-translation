id: JER.5.27
reference: Jeremiah 5:27
source:
  edition: WLC
  text: כִּ/כְלוּב֙ מָ֣לֵא ע֔וֹף כֵּ֥ן בָּתֵּי/הֶ֖ם מְלֵאִ֣ים מִרְמָ֑ה עַל כֵּ֥ן גָּדְל֖וּ
    וַֽ/יַּעֲשִֽׁירוּ־׃
translation:
  text: Like a cage full of birds, so their houses are full of deceit; therefore they
    have become great and grown rich.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'basket' or 'coop' for the container imagery behind 'cage.'
    reason: lexical_alternative
  - marker: b
    text: '''Deceit'' can also be rendered ''treachery'' or ''fraud''; the Hebrew
      term covers dishonest and exploitative conduct broadly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְלוּב
  chosen: cage
  alternatives:
  - basket
  - coop
  lexicon: HALOT
  rationale: The noun denotes a container for keeping birds. In this context, with
    'full of birds,' 'cage' is the most natural modern English rendering and preserves
    the image of trapped birds gathered for exploitation.
- source_word: מָלֵא עוֹף
  chosen: full of birds
  alternatives:
  - filled with birds
  - full of fowl
  lexicon: HALOT
  rationale: עוף is a broad term for flying creatures/birds. 'Birds' is the clearest
    idiomatic English choice here; 'fowl' is too archaic or specialized.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: 'The particle marks comparison: as the cage is full of birds, so their
    houses are full of deceit. ''So'' is concise and natural.'
- source_word: בָּתֵּיהֶם
  chosen: their houses
  alternatives:
  - their homes
  lexicon: HALOT
  rationale: The plural noun literally means 'their houses.' 'Houses' preserves the
    concrete social image of households enriched by wrongdoing.
- source_word: מְלֵאִים מִרְמָה
  chosen: are full of deceit
  alternatives:
  - are full of treachery
  - are full of fraud
  lexicon: HALOT
  rationale: מִרְמָה commonly denotes deceit, treachery, or fraud. 'Deceit' best captures
    the broad moral corruption in context without narrowing it merely to financial
    fraud, though exploitative gain is implied.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: The phrase introduces the result of their deceit-filled houses. 'Therefore'
    clearly marks consequence in English.
- source_word: גָּדְלוּ
  chosen: have become great
  alternatives:
  - have grown great
  - have become powerful
  lexicon: HALOT
  rationale: The verb means 'to become great/grow.' In context it refers to social
    elevation and prominence resulting from corruption. 'Have become great' preserves
    the metaphor while remaining idiomatic.
- source_word: וַיַּעֲשִׁירוּ
  chosen: and grown rich
  alternatives:
  - and become wealthy
  - and enriched themselves
  lexicon: HALOT
  rationale: From עשׁר, 'to become rich.' 'Grown rich' is natural alongside 'have
    become great.' 'Enriched themselves' is interpretively stronger than the Hebrew
    form requires, though the context implies unjust gain.
