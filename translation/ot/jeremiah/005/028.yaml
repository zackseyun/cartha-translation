id: JER.5.28
reference: Jeremiah 5:28
source:
  edition: WLC
  text: שָׁמְנ֣וּ עָשְׁת֗וּ גַּ֚ם עָֽבְר֣וּ דִבְרֵי רָ֔ע דִּ֣ין לֹא דָ֔נוּ דִּ֥ין
    יָת֖וֹם וְ/יַצְלִ֑יחוּ וּ/מִשְׁפַּ֥ט אֶבְיוֹנִ֖ים לֹ֥א שָׁפָֽטוּ־־׃
translation:
  text: 'They have grown fat; they shine. They also have gone beyond evil words: they
    do not judge the case— the case of the fatherless—so that they might prosper,
    and they do not uphold the justice of the poor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They have even surpassed evil matters/deeds'; Hebrew literally, 'they
      have gone beyond words of evil.'
    reason: lexical_alternative
  - marker: b
    text: The clause 'so that they might prosper' is difficult. It may also be understood
      as 'yet they prosper' or 'though they prosper.'
    reason: alternative_reading
  - marker: c
    text: '''Fatherless'' may also be rendered ''orphan.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמְנוּ
  chosen: have grown fat
  alternatives:
  - are fat
  - have become sleek
  lexicon: HALOT
  rationale: Qal perfect of שׁמן here is metaphorical for becoming prosperous/self-indulgent,
    but 'grown fat' preserves the concrete Hebrew image and prophetic critique.
- source_word: עָשְׁתוּ
  chosen: shine
  alternatives:
  - are sleek
  - glisten
  lexicon: HALOT
  rationale: The verb is rare and contextually paired with 'grown fat,' describing
    outward well-fed appearance. 'Shine' keeps the vivid image while allowing the
    sense of sleek prosperity.
- source_word: גַּם עָבְרוּ
  chosen: They also have gone beyond
  alternatives:
  - they have even surpassed
  - they have transgressed
  lexicon: HALOT
  rationale: עבר with דברי רע conveys exceeding all bounds in evil. 'Gone beyond'
    preserves the metaphor of crossing a limit without overinterpreting.
- source_word: דִבְרֵי רָע
  chosen: evil words
  alternatives:
  - evil matters
  - evil deeds
  lexicon: HALOT
  rationale: דבר can mean word/matter/thing. Here the phrase likely means evil matters
    or practices, but the Hebrew literally says 'words of evil.' I retained the literal
    form in the draft for auditability, while noting alternatives.
- source_word: דִּין לֹא דָנוּ
  chosen: they do not judge the case
  alternatives:
  - they do not plead justice
  - they do not render judgment
  lexicon: HALOT
  rationale: The cognate noun + verb construction emphasizes legal adjudication. 'Judge
    the case' is natural English and preserves the juridical force.
- source_word: דִּין יָתוֹם
  chosen: the case of the fatherless
  alternatives:
  - the cause of the orphan
  - the legal claim of the fatherless
  lexicon: HALOT
  rationale: יָתוֹם is conventionally 'fatherless' in prophetic legal contexts. This
    preserves the covenantal concern for vulnerable children without flattening the
    legal nuance.
- source_word: וְיַצְלִיחוּ
  chosen: so that they might prosper
  alternatives:
  - yet they prosper
  - and they succeed
  lexicon: HALOT
  rationale: The form can be read as a result/purpose nuance after the neglected orphan's
    case. The sense is that by failing to defend the orphan, they still manage to
    prosper. 'So that they might prosper' reflects the Hebrew sequence, though the
    syntax is difficult.
- source_word: וּמִשְׁפַּט אֶבְיוֹנִים לֹא שָׁפָטוּ
  chosen: they do not uphold the justice of the poor
  alternatives:
  - they do not judge the case of the needy
  - they do not give justice to the poor
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote justice, legal right, or case. 'Uphold the justice
    of the poor' captures both the legal and ethical dimensions in idiomatic English.
