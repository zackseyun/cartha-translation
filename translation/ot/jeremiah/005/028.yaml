theological_decisions:
- issue: Rendering of יָתוֹם
  chosen_reading: fatherless
  alternative_readings:
  - orphan
  rationale: The Hebrew specifically denotes one deprived of a father; 'fatherless'
    preserves the source image and prophetic legal diction, while 'orphan' is a valid
    smoother alternative.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4, gender-accurate over
    gender-neutral
- issue: Interpretation of the difficult clause וְיַצְלִיחוּ
  chosen_reading: linked with the neglected case of the fatherless as a result/purpose
    clause ('so that they might prosper')
  alternative_readings:
  - taken concessively/resultatively as 'yet they prosper'
  - taken with the preceding clause as 'they do not judge the case of the fatherless,
    though they prosper'
  rationale: The syntax is compressed and debated. The chosen rendering preserves
    the Hebrew sequence and tension without smoothing away the ambiguity; alternatives
    are preserved in a footnote.
  doctrine_reference: DOCTRINE.md § Translation philosophy 3, preserve theological
    tension rather than resolve it
