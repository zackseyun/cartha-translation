id: JER.5.4
reference: Jeremiah 5:4
source:
  edition: WLC
  text: וַ/אֲנִ֣י אָמַ֔רְתִּי אַךְ דַּלִּ֖ים הֵ֑ם נוֹאֲל֕וּ כִּ֣י לֹ֤א יָדְעוּ֙ דֶּ֣רֶךְ
    יְהוָ֔ה מִשְׁפַּ֖ט אֱלֹהֵי/הֶֽם־׃
translation:
  text: But I said, “Surely these are only the poor; they are foolish, for they do
    not know the way of the LORD, the justice of their God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the judgment of their God” or “the ordinance of their God.” The Hebrew
      word can refer to justice, judgment, or a legal requirement.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: But I
  alternatives:
  - And I
  - As for me, I
  lexicon: HALOT
  rationale: The conjunction with the pronoun marks a shift to Jeremiah's own reflection
    in contrast to the preceding search. 'But I' captures the mild adversative sense
    in context better than a simple 'And I.'
- source_word: אָמַרְתִּי
  chosen: said
  alternatives:
  - thought
  lexicon: HALOT
  rationale: The verb normally means 'say.' In English, 'I said' can naturally introduce
    internal speech as here, without needing to paraphrase as 'I thought.'
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Only
  - Indeed
  - Surely only
  lexicon: HALOT
  rationale: The particle adds an asseverative/restrictive nuance. 'Surely' preserves
    the speaker's assumption, while the following 'only' is supplied by context in
    'only the poor' to reflect the restrictive force.
- source_word: דַּלִּים
  chosen: the poor
  alternatives:
  - the weak
  - the lowly
  lexicon: HALOT
  rationale: The adjective refers to those who are poor or socially insignificant.
    'The poor' is the most natural and contextually fitting rendering here.
- source_word: הֵם
  chosen: these are
  alternatives:
  - they are
  lexicon: HALOT
  rationale: The pronoun is explicit for emphasis. 'These are only the poor' brings
    out the deictic/emphatic force in idiomatic English.
- source_word: נוֹאֲלוּ
  chosen: they are foolish
  alternatives:
  - they have acted foolishly
  - they are senseless
  lexicon: HALOT
  rationale: From יאל/נועל in the Niphal, the sense is to be foolish or act foolishly.
    The stative English 'they are foolish' fits the explanatory clause that follows.
- source_word: כִּי לֹא יָדְעוּ
  chosen: for they do not know
  alternatives:
  - because they do not know
  lexicon: HALOT
  rationale: The clause gives the reason for calling them foolish. 'For' is concise
    and natural in English.
- source_word: דֶּרֶךְ יְהוָה
  chosen: the way of the LORD
  alternatives:
  - the LORD's way
  - the path of the LORD
  lexicon: HALOT
  rationale: A common biblical expression for the LORD's manner, will, or covenantal
    path. 'The way of the LORD' preserves the idiom. Per doctrine, יְהוָה is rendered
    'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies 'the LORD' as the default rendering for the divine
    name, following Jewish reverence tradition and the Septuagint pattern.
- source_word: מִשְׁפַּט אֱלֹהֵיהֶם
  chosen: the justice of their God
  alternatives:
  - the judgment of their God
  - the ordinance of their God
  - the rule of their God
  lexicon: HALOT
  rationale: מִשְׁפָּט can denote justice, judgment, legal claim, or ordinance. Here,
    paired with 'the way of the LORD,' it refers to God's just order/requirements.
    'Justice of their God' is clear modern English and preserves the ethical-judicial
    sense without over-specifying a legal code.
