id: JER.5.22
reference: Jeremiah 5:22
source:
  edition: WLC
  text: הַ/אוֹתִ֨/י לֹא תִירָ֜אוּ נְאֻם יְהֹוָ֗ה אִ֤ם מִ/פָּנַ/י֙ לֹ֣א תָחִ֔ילוּ אֲשֶׁר
    שַׂ֤מְתִּי חוֹל֙ גְּב֣וּל לַ/יָּ֔ם חָק עוֹלָ֖ם וְ/לֹ֣א יַעַבְרֶ֑/נְהוּ וַ/יִּֽתְגָּעֲשׁוּ֙
    וְ/לֹ֣א יוּכָ֔לוּ וְ/הָמ֥וּ גַלָּ֖י/ו וְ/לֹ֥א יַעַבְרֻֽ/נְהוּ־־־־׃
translation:
  text: Do you not fear me? declares the LORD. Do you not tremble before me—he who
    set the sand as a boundary for the sea, an everlasting decree that it cannot cross?
    Though its waves toss, they cannot prevail; though they roar, they cannot cross
    it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I who set the sand as a boundary for the sea.' The Hebrew relative
      clause can be rendered more directly in the first person.
    reason: lexical_alternative
  - marker: b
    text: Or, 'Though they rage, they cannot prevail.' The Hebrew verb can emphasize
      surging or raging.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַאוֹתִי
  chosen: Do you not fear me?
  alternatives:
  - Will you not fear me?
  - Do you not fear me
  lexicon: HALOT
  rationale: Interrogative particle with direct-object marker and 1cs pronoun introduces
    a rhetorical question. English idiom requires fronting as 'Do you not fear me?'
    rather than a more wooden 'Me will you not fear?'.
- source_word: תִירָאוּ
  chosen: fear
  alternatives:
  - be afraid of
  - revere
  lexicon: HALOT
  rationale: ירא commonly denotes fear/reverence. In this rebuke context, 'fear' preserves
    both dread and reverential submission without narrowing to mere terror or softening
    to 'revere'.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' is natural modern English and
    preserves the solemn prophetic force. יְהוָה follows doctrine default as 'the
    LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the covenant name is rendered 'the LORD' rather than
    transliterated.
- source_word: אִם מִפָּנַי לֹא תָחִילוּ
  chosen: Do you not tremble before me
  alternatives:
  - Will you not writhe before me
  - Do you not be in anguish before me
  lexicon: HALOT
  rationale: חיל in this stem can denote trembling, writhing, or being in anguish.
    In parallel with 'fear me' and with מִפָּנַי ('before me/from before my face'),
    'tremble before me' best captures the reverential-shudder sense in idiomatic English.
- source_word: אֲשֶׁר שַׂמְתִּי
  chosen: he who set
  alternatives:
  - I who set
  - who set
  lexicon: HALOT
  rationale: The relative clause refers back to the speaker ('before me—he who set...').
    English can render this either first person or relative apposition. 'He who set'
    preserves the rhetorical self-reference after 'before me' and matches the shift
    into description of God's act.
- source_word: חוֹל גְּבוּל לַיָּם
  chosen: the sand as a boundary for the sea
  alternatives:
  - sand for a boundary of the sea
  - the sand as the border of the sea
  lexicon: HALOT
  rationale: שׂים + double accusative yields 'set X as Y.' 'Boundary' is the clearest
    modern rendering of גְּבוּל here.
- source_word: חָק עוֹלָם
  chosen: an everlasting decree
  alternatives:
  - a perpetual statute
  - an eternal boundary
  lexicon: HALOT
  rationale: חָק is a fixed statute/decree; with עוֹלָם it denotes enduring permanence.
    'Everlasting decree' communicates both fixity and duration better than the more
    legalistic 'statute' in this cosmological context.
- source_word: וְלֹא יַעַבְרֶנְהוּ
  chosen: that it cannot cross
  alternatives:
  - and it does not cross it
  - and it will not pass over it
  lexicon: HALOT
  rationale: 'The 3ms verb with 3ms suffix refers to the sea not crossing the fixed
    boundary/decree. English smooths the clause after ''an everlasting decree'' as
    a result clause: ''that it cannot cross.'''
- source_word: וַיִּתְגָּעֲשׁוּ
  chosen: Though its waves toss
  alternatives:
  - Though they rage
  - Though they surge
  lexicon: HALOT
  rationale: 'The verb denotes tossing, storming, or raging. Because the following
    clause explicitly names ''its waves,'' English anticipates the subject for clarity:
    ''Though its waves toss.'''
- source_word: וְלֹא יוּכָלוּ
  chosen: they cannot prevail
  alternatives:
  - they cannot
  - they are not able
  lexicon: HALOT
  rationale: יכל by itself means 'be able,' but in context of assaulting the boundary,
    'prevail' makes explicit the implied failure to overcome without adding a new
    idea.
- source_word: וְהָמוּ גַּלָּיו
  chosen: though they roar
  alternatives:
  - and its waves roar
  - though its waves roar
  lexicon: HALOT
  rationale: המה denotes roaring/noising. The subject is the sea's waves. 'Though
    they roar' keeps the parallel concessive rhythm with the prior clause while avoiding
    repetition of 'waves' already supplied.
- source_word: וְלֹא יַעַבְרֻנְהוּ
  chosen: they cannot cross it
  alternatives:
  - they do not cross it
  - they cannot pass over it
  lexicon: HALOT
  rationale: Plural subject now naturally refers to the waves. 'Cross it' matches
    the earlier clause and keeps the image of the sea unable to overstep the divinely
    set limit.
