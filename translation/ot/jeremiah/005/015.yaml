id: JER.5.15
reference: Jeremiah 5:15
source:
  edition: WLC
  text: הִנְ/נִ֣י מֵבִיא֩ עֲלֵי/כֶ֨ם גּ֧וֹי מִ/מֶּרְחָ֛ק בֵּ֥ית יִשְׂרָאֵ֖ל נְאֻם יְהֹוָ֑ה גּ֣וֹי אֵיתָ֣ן ה֗וּא גּ֤וֹי מֵ/עוֹלָם֙ ה֔וּא גּ֚וֹי לֹא תֵדַ֣ע לְשֹׁנ֔/וֹ וְ/לֹ֥א תִשְׁמַ֖ע מַה יְדַבֵּֽר־׀־־׃
translation:
  text: Look, I am bringing against you a nation from far away, O house of Israel, declares Yahweh. It is a mighty nation; it is an ancient nation, a nation whose language you do not know, and whose speech you do not understand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a strong nation' or 'an enduring nation' for 'a mighty nation.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a nation from of old' for 'an ancient nation.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'whose tongue you do not know, and you do not understand what it speaks.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Look, I
  alternatives:
  - Behold, I
  - Here I am, I
  lexicon: HALOT
  rationale: Introduces a solemn divine announcement. 'Look' preserves the deictic force in readable modern English better than archaic 'Behold.'
- source_word: מֵבִיא עֲלֵיכֶם
  chosen: am bringing against you
  alternatives:
  - bring upon you
  - am bringing upon you
  lexicon: HALOT
  rationale: The participle with preposition conveys imminent action in progress. 'Against you' makes the hostile sense explicit from עַל in judgment context.
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  lexicon: HALOT
  rationale: Standard rendering for a political/ethnic entity; repeated throughout the verse for rhetorical emphasis.
- source_word: מִמֶּרְחָק
  chosen: from far away
  alternatives:
  - from afar
  - from a distant place
  lexicon: HALOT
  rationale: Natural modern English that preserves the spatial distance and threat.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: O house of Israel
  alternatives:
  - house of Israel
  lexicon: HALOT
  rationale: Vocative force is contextually appropriate here, addressing the covenant people directly.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Conventional prophetic formula. 'The LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: 'Per doctrine, the Tetragrammaton יְהוָה is rendered ''Yahweh'' — the transliteration of the divine name — rather than the traditional ''the LORD'' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.'
- source_word: גּוֹי אֵיתָן
  chosen: a mighty nation
  alternatives:
  - a strong nation
  - an enduring nation
  lexicon: HALOT
  rationale: אֵיתָן can denote strength, firmness, or enduring stability. In this invasion context, 'mighty' best conveys formidable power while remaining idiomatic.
- source_word: גּוֹי מֵעוֹלָם
  chosen: an ancient nation
  alternatives:
  - a nation from of old
  - an age-old nation
  lexicon: HALOT
  rationale: מֵעוֹלָם here most naturally points to antiquity or long-standing existence, not eternity. 'Ancient nation' is concise and clear.
- source_word: לֹא תֵדַע לְשֹׁנוֹ
  chosen: whose language you do not know
  alternatives:
  - whose tongue you do not know
  - you do not know its language
  lexicon: HALOT
  rationale: Shifts to a relative clause in English for natural flow while preserving the sense of incomprehensibility.
- source_word: וְלֹא תִשְׁמַע מַה יְדַבֵּר
  chosen: and whose speech you do not understand
  alternatives:
  - and you will not understand what it speaks
  - and you will not hear what it says
  lexicon: HALOT
  rationale: שׁמע in context carries the sense of hearing with comprehension. 'Understand' communicates the intended result, not mere auditory perception.
