id: JER.5.2
reference: Jeremiah 5:2
source:
  edition: WLC
  text: וְ/אִ֥ם חַי יְהֹוָ֖ה יֹאמֵ֑רוּ לָ/כֵ֥ן לַ/שֶּׁ֖קֶר יִשָּׁבֵֽעוּ־׃
translation:
  text: And if they say, “As Yahweh lives,” surely they swear falsely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew oath formula: ''As the LORD lives.'''
    reason: cultural_note
  - marker: b
    text: Or 'they swear to a lie' / 'they swear falsely.' The Hebrew phrase expresses false or insincere oath-taking.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: And if
  alternatives:
  - Though
  - Even if
  lexicon: HALOT
  rationale: The conjunction plus particle introduces a concessive/conditional sense tied to the previous context. 'And if' preserves the Hebrew form while allowing the implied concessive force to emerge from the clause as a whole.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: 'This is the standard Hebrew oath formula. ''As the LORD lives'' is idiomatic English for an oath and preserves the covenant name according to doctrine: יְהוָה rendered ''the LORD,'' not transliterated.'
- source_word: יֹאמֵרוּ
  chosen: they say
  alternatives:
  - they say solemnly
  - they declare
  lexicon: HALOT
  rationale: Simple rendering of אמר in the imperfect plural. The solemnity is already conveyed by the oath formula, so no expansion is needed.
- source_word: לָכֵן
  chosen: even so
  alternatives:
  - surely
  - indeed
  - therefore
  lexicon: HALOT
  rationale: 'Here לָכֵן functions adverbially to intensify the contrast: despite invoking the LORD, they still swear falsely. ''Even so'' captures that adversative-intensifying force better than the more common inferential ''therefore.'''
- source_word: לַשֶּׁקֶר
  chosen: falsely
  alternatives:
  - to a lie
  - deceptively
  - for falsehood
  lexicon: HALOT
  rationale: The prepositional phrase with שקר modifies the oath-taking idiomatically. English adverbial 'falsely' is the most natural equivalent and preserves the sense of swearing an untrue or insincere oath.
- source_word: יִשָּׁבֵעוּ
  chosen: they swear
  alternatives:
  - they take an oath
  - they swear an oath
  lexicon: HALOT
  rationale: Nifal of שבע in oath contexts means 'swear' or 'take an oath.' 'They swear' is concise and idiomatic, with the object supplied by 'falsely.'
