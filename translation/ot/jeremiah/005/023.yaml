id: JER.5.23
reference: Jeremiah 5:23
source:
  edition: WLC
  text: וְ/לָ/עָ֤ם הַ/זֶּה֙ הָיָ֔ה לֵ֖ב סוֹרֵ֣ר וּ/מוֹרֶ֑ה סָ֖רוּ וַ/יֵּלֵֽכוּ׃
translation:
  text: But this people has had a stubborn and rebellious heart; they have turned
    aside and gone away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they have turned away and gone on.' The Hebrew uses two verbs in sequence
      to stress both deviation and continued departure.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָעָם הַזֶּה
  chosen: But this people
  alternatives:
  - But for this people
  - And this people
  lexicon: HALOT
  rationale: The prefixed conjunction with ל marks contrast with the preceding verse's
    obedient sea; 'But this people' captures the adversative force naturally in English
    while retaining the demonstrative emphasis of 'this people.'
- source_word: הָיָה
  chosen: has had
  alternatives:
  - had
  - came to have
  lexicon: HALOT
  rationale: The qatal states a settled condition. Present perfect in English conveys
    an existing state rooted in the past, fitting the prophetic accusation better
    than a simple past.
- source_word: לֵב
  chosen: heart
  alternatives:
  - mind
  - inner self
  lexicon: HALOT
  rationale: In Hebrew anthropology לֵב commonly denotes the inner will and disposition.
    'Heart' is the standard and most transparent rendering in English.
- source_word: סוֹרֵר
  chosen: stubborn
  alternatives:
  - stubbornly wayward
  - recalcitrant
  - rebellious
  lexicon: HALOT
  rationale: סוֹרֵר denotes being stubbornly resistant or wayward. 'Stubborn' pairs
    well with the following term and preserves the nuance of obstinate refusal.
- source_word: וּמוֹרֶה
  chosen: rebellious
  alternatives:
  - defiant
  - disobedient
  lexicon: HALOT
  rationale: מוֹרֶה here describes active resistance. 'Rebellious' is idiomatic with
    'heart' and preserves the intensification alongside סוֹרֵר.
- source_word: סָרוּ
  chosen: have turned aside
  alternatives:
  - turned away
  - departed
  lexicon: HALOT
  rationale: The verb סור often means to turn aside or deviate from the proper path.
    'Have turned aside' preserves the metaphor of deviation without overinterpreting
    the object.
- source_word: וַיֵּלֵכוּ
  chosen: and gone away
  alternatives:
  - and gone
  - and walked on
  lexicon: HALOT
  rationale: 'הלך following סרוּ intensifies the idea: they not only turned aside
    but continued off. ''Gone away'' makes the progression clear in natural English.'
