theological_decisions:
- issue: Anthropological idiom of לֵב
  chosen_reading: without understanding
  alternative_readings:
  - without a heart
  - without sense
  rationale: The verse rebukes covenant people for spiritual and moral insensibility.
    Rendering לֵב idiomatically as 'understanding' preserves the Hebrew conception
    of the heart as the center of discernment, without importing later psychological
    notions.
  doctrine_reference: Translation philosophy §1, §6
- issue: Collective singular עַם
  chosen_reading: foolish people
  alternative_readings:
  - foolish nation
  rationale: The address is to Judah as a collective body. 'People' is more natural
    in English and avoids over-specifying a political sense that is not required by
    the immediate context.
  doctrine_reference: Translation philosophy §6
