id: JER.5.21
reference: Jeremiah 5:21
source:
  edition: WLC
  text: שִׁמְעוּ נָ֣א זֹ֔את עַ֥ם סָכָ֖ל וְ/אֵ֣ין לֵ֑ב עֵינַ֤יִם לָ/הֶם֙ וְ/לֹ֣א יִרְא֔וּ
    אָזְנַ֥יִם לָ/הֶ֖ם וְ/לֹ֥א יִשְׁמָֽעוּ־׃
translation:
  text: Hear this now, foolish people without understanding, who have eyes but do
    not see, who have ears but do not hear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'a foolish people and without heart.' Here 'heart' refers to
      understanding or discernment.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' preserves the prophetic summons and
    allows the following object 'this' to remain direct and forceful.
- source_word: נָא
  chosen: now
  alternatives:
  - please
  lexicon: HALOT
  rationale: In prophetic address נָא often adds urgency or entreaty rather than politeness.
    'Now' fits idiomatic modern English and preserves the exhortational force.
- source_word: זֹאת
  chosen: this
  alternatives:
  - this message
  - this thing
  lexicon: HALOT
  rationale: The demonstrative points to the immediately following prophetic word.
    'This' is sufficiently direct without adding interpretive material.
- source_word: עַם
  chosen: people
  alternatives:
  - nation
  lexicon: HALOT
  rationale: Although singular in Hebrew, עַם here is collective. 'People' is natural
    English for a collective addressed by the prophet.
- source_word: סָכָל
  chosen: foolish
  alternatives:
  - senseless
  - stupid
  lexicon: HALOT
  rationale: The term denotes moral and spiritual folly, not merely low intelligence.
    'Foolish' preserves that biblical nuance better than harsher or flatter alternatives.
- source_word: וְאֵין לֵב
  chosen: without understanding
  alternatives:
  - and without a heart
  - and having no sense
  lexicon: HALOT
  rationale: Hebrew לֵב commonly denotes the inner faculty of understanding, discernment,
    and will, not merely emotion. 'Without understanding' communicates the idiomatic
    sense in clear English while avoiding a misleadingly literal 'without heart.'
- source_word: עֵינַיִם לָהֶם וְלֹא יִרְאוּ
  chosen: who have eyes but do not see
  alternatives:
  - they have eyes, but they do not see
  lexicon: HALOT
  rationale: This clause is idiomatic and contrasts physical possession with spiritual
    incapacity. The relative construction integrates smoothly into English while preserving
    the Hebrew sense.
- source_word: אָזְנַיִם לָהֶם וְלֹא יִשְׁמָעוּ
  chosen: who have ears but do not hear
  alternatives:
  - they have ears, but they do not hear
  lexicon: HALOT
  rationale: Parallel to the previous clause. 'Hear' rather than 'listen' keeps the
    verbal echo with the opening imperative and preserves the prophetic irony.
