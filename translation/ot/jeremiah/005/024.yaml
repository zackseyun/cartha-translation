id: JER.5.24
reference: Jeremiah 5:24
source:
  edition: WLC
  text: וְ/לֹֽא אָמְר֣וּ בִ/לְבָבָ֗/ם נִ֤ירָא נָא֙ אֶת יְהוָ֣ה אֱלֹהֵ֔י/נוּ הַ/נֹּתֵ֗ן גֶּ֛שֶׁם ו/ירה וּ/מַלְק֖וֹשׁ בְּ/עִתּ֑/וֹ שְׁבֻע֛וֹת חֻקּ֥וֹת קָצִ֖יר יִשְׁמָר לָֽ/נוּ־־־׃
translation:
  text: They did not say in their heart, ‘Let us now fear Yahweh our God, who gives rain in its season, both the early rain and the latter rain, who keeps for us the appointed weeks of the harvest.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the autumn rain and the spring rain.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא אָמְרוּ
  chosen: They did not say
  alternatives:
  - And they did not say
  lexicon: HALOT
  rationale: The conjunction plus negation and qatal verb straightforwardly introduces the accusation. English omits the initial 'and' for natural style without loss of meaning.
- source_word: בִלְבָבָם
  chosen: in their heart
  alternatives:
  - to themselves
  - in their hearts
  lexicon: HALOT
  rationale: Hebrew singular 'heart' after a plural subject often functions collectively or distributively. 'In their heart' preserves the Hebrew idiom more closely than the more interpretive 'to themselves.'
- source_word: נִירָא נָא
  chosen: Let us now fear
  alternatives:
  - Let us fear, please
  - We should now fear
  lexicon: HALOT
  rationale: Cohortative plural with particle נָא expresses an exhortation. In this context 'now' is the most natural English rendering, conveying urgency without the awkward politeness of 'please.'
- source_word: אֶת יְהוָה אֱלֹהֵינוּ
  chosen: the LORD our God
  alternatives:
  - Yahweh our God
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The object marker is not translated. The covenantal phrase is preserved directly.
- source_word: הַנֹּתֵן
  chosen: who gives
  alternatives:
  - the one who gives
  lexicon: HALOT
  rationale: The participle functions attributively of the LORD, describing his ongoing action. Relative clause English is most natural.
- source_word: גֶּשֶׁם
  chosen: rain
  alternatives:
  - rainfall
  lexicon: HALOT
  rationale: General term for rain; 'rain' is the plain and natural gloss.
- source_word: יוֹרֶה
  chosen: the early rain
  alternatives:
  - autumn rain
  lexicon: HALOT
  rationale: In agricultural contexts יוֹרֶה denotes the early seasonal rain. 'Early rain' is the standard transparent rendering; 'autumn rain' is a contextual alternative worth preserving.
- source_word: מַלְקוֹשׁ
  chosen: the latter rain
  alternatives:
  - spring rain
  lexicon: HALOT
  rationale: This term denotes the later seasonal rain. 'Latter rain' preserves the lexical pairing with יוֹרֶה; 'spring rain' is a contextual alternative worth preserving.
- source_word: בְּעִתּוֹ
  chosen: in its season
  alternatives:
  - at its appointed time
  lexicon: HALOT
  rationale: The singular suffix most naturally refers to the rain as a collective provision. 'In its season' is idiomatic and preserves the temporal sense.
- source_word: שְׁבֻעוֹת חֻקּוֹת קָצִיר
  chosen: the appointed weeks of the harvest
  alternatives:
  - the fixed weeks of harvest
  - the weeks decreed for harvest
  lexicon: HALOT
  rationale: The construct-like sequence refers to the set or prescribed weeks associated with harvest. 'Appointed weeks of the harvest' is clear modern English and preserves the sense of divinely fixed order in the agricultural cycle.
- source_word: יִשְׁמָר לָנוּ
  chosen: who keeps for us
  alternatives:
  - he preserves for us
  - he observes for us
  lexicon: HALOT
  rationale: The verb שמר here means to keep/preserve in the sense of maintaining or reserving. Repeating 'who' in English clarifies that this clause continues to describe the LORD.
