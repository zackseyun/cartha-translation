id: JER.11.2
reference: Jeremiah 11:2
source:
  edition: WLC
  text: שִׁמְע֕וּ אֶת דִּבְרֵ֖י הַ/בְּרִ֣ית הַ/זֹּ֑את וְ/דִבַּרְתָּ/ם֙ אֶל אִ֣ישׁ
    יְהוּדָ֔ה וְ/עַל יֹשְׁבֵ֖י יְרוּשָׁלִָֽם־־־׃
translation:
  text: Hear the words of this covenant, and speak them to the men of Judah and to
    the inhabitants of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'each man of Judah'; the phrase is a collective/distributive expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  - Obey
  lexicon: HALOT
  rationale: Qal imperative plural of שׁמע. In context it introduces reception of
    the covenant words. 'Hear' preserves the Hebrew imperative and can carry the covenantal
    nuance of attentive hearing without over-interpreting it as full 'obey' in the
    main text.
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the matters of
  - the terms of
  lexicon: HALOT
  rationale: Construct plural of דבר. 'Words of' is the most direct and natural rendering
    here, fitting covenant speech.
- source_word: הַבְּרִית הַזֹּאת
  chosen: this covenant
  alternatives:
  - this treaty
  - this pact
  lexicon: HALOT
  rationale: בְּרִית is standardly 'covenant' in biblical theological contexts. The
    demonstrative is retained as 'this'.
- source_word: וְדִבַּרְתָּם
  chosen: and speak them
  alternatives:
  - and declare them
  - and speak
  lexicon: HALOT
  rationale: Piel perfect 2ms with 3mp suffix, functioning as an imperative/sequential
    command in context. The 3mp suffix refers back to 'the words,' so 'speak them'
    makes the object explicit in English.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition introducing the addressee.
- source_word: אִישׁ יְהוּדָה
  chosen: the men of Judah
  alternatives:
  - each man of Judah
  - the people of Judah
  lexicon: HALOT
  rationale: Although singular אִישׁ can be distributive ('each man of Judah'), idiomatic
    English here is collective. Per gender-accurate policy, 'men of Judah' best reflects
    the masculine singular used representatively, while avoiding flattening to the
    more generic 'people' in the main text.
- source_word: וְעַל
  chosen: and to
  alternatives:
  - and against
  - and concerning
  lexicon: HALOT
  rationale: While על often means 'on/upon' and can extend to 'against' or 'concerning,'
    with verbs of speaking it can mark the audience addressed. Here parallelism with
    אֶל favors an addressee sense, rendered idiomatically as 'and to' in English.
- source_word: יֹשְׁבֵי יְרוּשָׁלִָם
  chosen: the inhabitants of Jerusalem
  alternatives:
  - those who dwell in Jerusalem
  - the residents of Jerusalem
  lexicon: HALOT
  rationale: Participle of ישׁב used substantivally. 'Inhabitants' is concise and
    natural while preserving the sense of those dwelling in the city.
