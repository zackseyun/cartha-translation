theological_decisions:
- issue: Gendered collective language in אִישׁ יְהוּדָה
  chosen_reading: the men of Judah
  alternative_readings:
  - each man of Judah
  - the people of Judah
  rationale: The Hebrew uses grammatically masculine singular אִישׁ in a collective/distributive
    sense. Following the doctrine's gender-accurate policy, the main text preserves
    masculine reference with natural English. A more inclusive collective like 'people
    of Judah' would smooth over the source form.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
