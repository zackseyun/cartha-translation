theological_decisions:
- issue: Covenant sanction language in 'all the words of this covenant'
  chosen_reading: Retain the literal 'words' rather than interpretively narrowing
    to curses alone.
  alternative_readings:
  - all the curses of this covenant
  - all the stipulations of this covenant
  rationale: In context, the phrase likely includes the covenant's announced sanctions
    now falling on the people, but the Hebrew says 'words.' Keeping 'words' preserves
    the textual breadth and avoids importing a narrower doctrinal or interpretive
    conclusion than the verse itself states.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Gender rendering of אִישׁ
  chosen_reading: Render distributively as 'each one' rather than 'each man.'
  alternative_readings:
  - each man
  rationale: Although אִישׁ is grammatically masculine, here it functions distributively
    for the members of the people as a whole. This follows the gender-accurate principle
    by matching the source intent rather than forcing an English masculine where the
    referent is collective.
  doctrine_reference: Translation philosophy item 4
