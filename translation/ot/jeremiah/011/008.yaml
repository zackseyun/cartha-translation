id: JER.11.8
reference: Jeremiah 11:8
source:
  edition: WLC
  text: וְ/לֹ֤א שָֽׁמְעוּ֙ וְ/לֹֽא הִטּ֣וּ אֶת אָזְנָ֔/ם וַ/יֵּ֣לְכ֔וּ אִ֕ישׁ בִּ/שְׁרִיר֖וּת
    לִבָּ֣/ם הָ/רָ֑ע וָ/אָבִ֨יא עֲלֵי/הֶ֜ם אֶֽת כָּל דִּבְרֵ֧י הַ/בְּרִית הַ/זֹּ֛את
    אֲשֶׁר צִוִּ֥יתִי לַ/עֲשׂ֖וֹת וְ/לֹ֥א עָשֽׂוּ־־־־־־׃ס
translation:
  text: Yet they did not listen or incline their ear, but each one walked in the stubbornness
    of their evil heart; so I brought upon them all the words of this covenant, which
    I commanded them to do, but they did not do them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not hear'; in context the phrase also carries the sense of refusing
      to obey.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'all the words of this covenant'; this may include the covenant's
      threatened judgments, not only its commands.
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁמְעוּ
  chosen: did not listen
  alternatives:
  - did not hear
  - did not obey
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. Here, paired
    with 'did not incline their ear,' the emphasis is on refusing attentive hearing,
    though covenantal disobedience is also implied. 'Listen' preserves both the auditory
    and responsive sense without over-interpreting as full 'obey' in the main text.
- source_word: הִטּוּ אֶת אָזְנָם
  chosen: incline their ear
  alternatives:
  - turn their ear
  - pay attention
  lexicon: HALOT
  rationale: This is a common Hebrew idiom for attentive listening. 'Incline their
    ear' keeps the metaphor and remains understandable in modern English.
- source_word: וַיֵּלְכוּ אִישׁ
  chosen: each one walked
  alternatives:
  - each man went
  - they each walked
  lexicon: HALOT
  rationale: אִישׁ distributively means 'each one' here rather than specifically adult
    males. 'Walked' preserves the Hebrew metaphor for conduct.
- source_word: בִּשְׁרִירוּת
  chosen: in the stubbornness
  alternatives:
  - in the stubborn will
  - in the hardness
  lexicon: HALOT
  rationale: שׁרירות denotes stubbornness or obstinacy, especially self-willed persistence.
    'Stubbornness' is the most natural covenantal-context rendering.
- source_word: לִבָּם הָרָע
  chosen: of their evil heart
  alternatives:
  - of their evil hearts
  - of their wicked heart
  lexicon: HALOT
  rationale: The Hebrew has singular 'heart' with a plural suffix, a collective/distributive
    idiom. 'Their evil heart' reflects the singular form while still applying to the
    people individually. 'Evil' is a straightforward rendering of רַע.
- source_word: וָאָבִיא עֲלֵיהֶם
  chosen: so I brought upon them
  alternatives:
  - and I brought on them
  - therefore I brought upon them
  lexicon: HALOT
  rationale: The waw here advances the consequence of their rebellion. 'So I brought
    upon them' communicates the resulting divine action in natural English.
- source_word: כָּל דִּבְרֵי הַבְּרִית הַזֹּאת
  chosen: all the words of this covenant
  alternatives:
  - all the terms of this covenant
  - all the stipulations of this covenant
  lexicon: HALOT
  rationale: Literally 'all the words of this covenant.' In covenant context this
    can imply stipulations and sanctions, but 'words' preserves the Hebrew wording
    and allows the context to supply the covenantal force.
- source_word: אֲשֶׁר צִוִּיתִי לַעֲשׂוֹת
  chosen: which I commanded them to do
  alternatives:
  - which I commanded to be done
  - which I commanded them to keep
  lexicon: HALOT
  rationale: The infinitive 'to do' is best represented directly. Supplying 'them'
    is required in English from context.
- source_word: וְלֹא עָשׂוּ
  chosen: but they did not do them
  alternatives:
  - but they did not do it
  - and they did not do them
  - but they did not obey
  lexicon: HALOT
  rationale: The object is implicit from the preceding covenant 'words.' 'Do them'
    makes the implied plural object explicit and preserves the Hebrew emphasis on
    failure to carry out the covenant commands.
