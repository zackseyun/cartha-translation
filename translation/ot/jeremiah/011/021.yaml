id: JER.11.21
reference: Jeremiah 11:21
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּֽה אָמַ֤ר יְהוָה֙ עַל אַנְשֵׁ֣י עֲנָת֔וֹת הַֽ/מְבַקְשִׁ֥ים אֶֽת
    נַפְשְׁ/ךָ֖ לֵ/אמֹ֑ר לֹ֤א תִנָּבֵא֙ בְּ/שֵׁ֣ם יְהוָ֔ה וְ/לֹ֥א תָמ֖וּת בְּ/יָדֵֽ/נוּ־־־׃ס
translation:
  text: Therefore, this is what the LORD says concerning the men of Anathoth who are
    seeking your life, saying, “Do not prophesy in the name of the LORD, or you will
    die by our hand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Thus says the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'who are seeking your life,' an idiom meaning they are trying to
      kill you.
    reason: lexical_alternative
  - marker: c
    text: Or, 'lest you die by our hand.' The Hebrew wording is literally negative,
      but in context it functions as a threat.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding context; 'Therefore'
    preserves the logical connection in natural English.
- source_word: כֹּה אָמַר יְהוָה
  chosen: this is what the LORD says
  alternatives:
  - thus says the LORD
  lexicon: HALOT
  rationale: A standard prophetic messenger formula. 'This is what ... says' is slightly
    more natural contemporary English while preserving the formal force. YHWH is rendered
    'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and alignment with the stated doctrine.
- source_word: עַל
  chosen: concerning
  alternatives:
  - against
  - about
  lexicon: HALOT
  rationale: Here introduces the object of the divine pronouncement. 'Concerning'
    fits the sense of an oracle directed with reference to the men of Anathoth; 'against'
    is possible contextually, but the preposition itself is broader.
- source_word: אַנְשֵׁי עֲנָתוֹת
  chosen: the men of Anathoth
  alternatives:
  - the people of Anathoth
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural construct, 'men of Anathoth,'
    not the more general 'people.' This follows the gender-accurate principle.
- source_word: הַמְבַקְשִׁים אֶת־נַפְשְׁךָ
  chosen: who are seeking your life
  alternatives:
  - who seek your life
  - who are trying to kill you
  lexicon: HALOT
  rationale: This idiom means to seek someone's life, i.e., to kill him. The chosen
    rendering preserves the Hebrew idiom in clear English without over-paraphrasing.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - who say
  - as they say
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing direct speech; 'saying' keeps
    the syntax transparent.
- source_word: לֹא תִנָּבֵא
  chosen: Do not prophesy
  alternatives:
  - You must not prophesy
  lexicon: HALOT
  rationale: The imperfect in direct speech functions as a prohibition. 'Do not prophesy'
    is the most direct and idiomatic English equivalent.
- source_word: בְּשֵׁם יְהוָה
  chosen: in the name of the LORD
  alternatives:
  - by the name of the LORD
  lexicon: HALOT
  rationale: Standard expression for speaking under divine authority. 'In the name
    of the LORD' is the established and accurate rendering.
- source_word: וְלֹא תָמוּת בְּיָדֵנוּ
  chosen: or you will die by our hand
  alternatives:
  - lest you die by our hand
  - and you will not die by our hand
  lexicon: HALOT
  rationale: Although formally 'and not you will die by our hand,' in context this
    is a threat attached to the prohibition. English expresses the force naturally
    as 'or you will die by our hand.' A more wooden negative rendering would obscure
    the intended menace.
