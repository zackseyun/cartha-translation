theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH. This verse contains the name twice, both rendered accordingly.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered reference in אַנְשֵׁי עֲנָתוֹת
  chosen_reading: the men of Anathoth
  alternative_readings:
  - the people of Anathoth
  rationale: The source text is grammatically masculine plural and likely refers specifically
    to the male townsmen involved in the plot. Per doctrine, gender-accurate rendering
    is preferred over neutralization.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
