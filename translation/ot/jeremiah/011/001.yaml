id: JER.11.1
reference: Jeremiah 11:1
source:
  edition: WLC
  text: הַ/דָּבָר֙ אֲשֶׁ֣ר הָיָ֣ה אֶֽל יִרְמְיָ֔הוּ מֵ/אֵ֥ת יְהוָ֖ה לֵ/אמֹֽר־׃
translation:
  text: The word that came to Jeremiah from the LORD, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The message that came to Jeremiah from the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  chosen: The word
  alternatives:
  - The message
  - This word
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word' or 'matter/message.' In prophetic superscriptions,
    'the word' is a standard and transparent rendering that preserves the formulaic
    introduction without over-interpreting it as merely a 'message.'
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: The relative particle is naturally rendered 'that' in contemporary English;
    'which' would be more formal but less natural here.
- source_word: הָיָה
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: Although the verb is literally 'was,' the idiom 'the word that came to'
    is the standard English equivalent for היה אל in prophetic call/report formulas
    and best reflects the Hebrew sense in context.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks direction toward Jeremiah; 'to' is the natural
    modern English rendering.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from the presence of
  - from with
  lexicon: HALOT
  rationale: In this construction, מֵאֵת marks source/origin. 'From' clearly communicates
    that the word originates with the LORD.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name יְהוָה
    is 'the LORD,' following longstanding reverential convention and the Septuagintal
    pattern.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - to say
  lexicon: HALOT
  rationale: The infinitive introduces the following divine speech. 'Saying' preserves
    the Hebrew discourse marker and signals continuation into the next verse.
