id: JER.11.9
reference: Jeremiah 11:9
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יְהוָ֖ה אֵלָ֑/י נִֽמְצָא קֶ֨שֶׁר֙ בְּ/אִ֣ישׁ יְהוּדָ֔ה וּ/בְ/יֹשְׁבֵ֖י
    יְרוּשָׁלִָֽם־׃
translation:
  text: And the LORD said to me, “A conspiracy has been found among the men of Judah
    and among the inhabitants of Jerusalem.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A plot has been uncovered' or 'A treasonous conspiracy has been found.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'among the men of Judah'; the singular 'man' functions collectively
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  - So ... said
  lexicon: HALOT
  rationale: Wayyiqtol of אמר introduces the next event in narrative sequence. 'And
    ... said' preserves the Hebrew narrative flow without overinterpreting the conjunction.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name YHWH is rendered 'the LORD'
    rather than transliterated forms.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Standard preposition plus 1cs suffix; direct and idiomatic English rendering.
- source_word: נִמְצָא
  chosen: has been found
  alternatives:
  - is found
  - was found
  lexicon: HALOT
  rationale: Niphal perfect of מצא here reports a discovered state or fact. Present
    perfect in English conveys a discovered condition with current relevance better
    than a simple past.
- source_word: קֶשֶׁר
  chosen: a conspiracy
  alternatives:
  - treason
  - plot
  - conspiracy
  lexicon: HALOT
  rationale: קשר in prophetic and royal contexts commonly denotes a conspiracy or
    treasonous plot. 'Conspiracy' is the most transparent and contextually fitting
    choice here.
- source_word: בְּאִישׁ יְהוּדָה
  chosen: among the men of Judah
  alternatives:
  - in the man of Judah
  - among the people of Judah
  - in Judah
  lexicon: HALOT
  rationale: Though איש is singular in form, it functions collectively here after
    נמצא קשר, indicating the population/group in Judah. 'Among the men of Judah' preserves
    the masculine/gender-accurate force of the Hebrew while conveying the collective
    sense.
- source_word: וּבְיֹשְׁבֵי יְרוּשָׁלִָם
  chosen: and among the inhabitants of Jerusalem
  alternatives:
  - and among those dwelling in Jerusalem
  - and among the residents of Jerusalem
  lexicon: HALOT
  rationale: Participle of ישב used substantivally denotes those who live in a place.
    'Inhabitants' is natural English and preserves the collective sense.
