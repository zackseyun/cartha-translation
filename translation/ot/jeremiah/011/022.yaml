theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of the judgment expression הִנְנִי פֹקֵד עֲלֵיהֶם
  chosen_reading: Behold, I am about to punish them
  alternative_readings:
  - Behold, I am visiting them
  - Behold, I am bringing judgment on them
  rationale: The Hebrew expresses imminent divine judicial action. The chosen rendering preserves the warning force without importing a more technical theological term than the text requires.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: readable modern English; preserve source plain sense'
