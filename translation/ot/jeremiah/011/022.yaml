id: JER.11.22
reference: Jeremiah 11:22
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת הִנְ/נִ֥י פֹקֵ֖ד עֲלֵי/הֶ֑ם הַ/בַּֽחוּרִים֙ יָמֻ֣תוּ בַ/חֶ֔רֶב בְּנֵי/הֶם֙ וּ/בְנ֣וֹתֵי/הֶ֔ם יָמֻ֖תוּ בָּ/רָעָֽב׃
translation:
  text: 'Therefore thus says Yahweh of hosts: Behold, I am about to punish them. The young men will die by the sword; their sons and their daughters will die by famine.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I am bringing judgment on them.' The Hebrew literally says, 'I am visiting upon them,' using a verb that often denotes calling someone to account in judgment contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding context; 'Therefore' is the most natural formal English connector here.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  - so says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; 'thus says' preserves the formal prophetic cadence without archaic excess.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the established and sufficiently transparent rendering, preserving the breadth of heavenly/earthly armies rather than narrowing to merely human forces.
- source_word: הִנְנִי
  chosen: Behold, I am about to
  alternatives:
  - Behold, I am
  - Look, I am
  lexicon: HALOT
  rationale: The particle introduces emphatic divine imminence. Because the following participle conveys impending action, 'I am about to' makes the force clear in idiomatic English while retaining 'Behold' for solemnity.
- source_word: פֹקֵד עֲלֵיהֶם
  chosen: punish them
  alternatives:
  - visit them
  - attend to them
  - bring judgment on them
  lexicon: HALOT
  rationale: פקד with עַל in judgment contexts means to call to account or punish. 'Punish them' communicates the judicial sense clearly; 'visit them' would be opaque in modern English.
- source_word: הַבַּחוּרִים
  chosen: The young men
  alternatives:
  - the chosen men
  - the youths
  lexicon: HALOT
  rationale: Refers to young adult males, likely those of fighting age. 'Young men' is the most natural and contextually fitting rendering, especially with death by the sword following.
- source_word: יָמֻתוּ בַחֶרֶב
  chosen: will die by the sword
  alternatives:
  - will die in battle
  - will be killed with the sword
  lexicon: HALOT
  rationale: A common judgment formula. 'By the sword' preserves the idiom and its association with violent death in warfare or attack.
- source_word: בְּנֵיהֶם וּבְנוֹתֵיהֶם
  chosen: their sons and their daughters
  alternatives:
  - their children
  lexicon: HALOT
  rationale: The Hebrew explicitly distinguishes male and female offspring; the translation preserves that specificity rather than collapsing it into the generic 'children.'
- source_word: יָמֻתוּ בָּרָעָב
  chosen: will die by famine
  alternatives:
  - will die of hunger
  - will perish in famine
  lexicon: HALOT
  rationale: רָעָב denotes famine rather than mere personal hunger. 'By famine' matches the parallel 'by the sword' and preserves the judgment formula.
