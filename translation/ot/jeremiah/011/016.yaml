id: JER.11.16
reference: Jeremiah 11:16
source:
  edition: WLC
  text: זַ֤יִת רַֽעֲנָן֙ יְפֵ֣ה פְרִי תֹ֔אַר קָרָ֥א יְהוָ֖ה שְׁמֵ֑/ךְ לְ/ק֣וֹל הֲמוּלָּ֣ה
    גְדֹלָ֗ה הִצִּ֥ית אֵשׁ֙ עָלֶ֔י/הָ וְ/רָע֖וּ דָּלִיּוֹתָֽי/ו־׀׃
translation:
  text: The LORD called your name, ‘A green olive tree, beautiful with good fruit.’
    At the sound of a great roar he set fire to it, and its branches are ruined.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a flourishing olive tree, beautiful in fruit and form.'
    reason: lexical_alternative
  - marker: b
    text: Or 'At the sound of a great tumult.'
    reason: lexical_alternative
  - marker: c
    text: Or 'its branches are broken/damaged.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זַיִת רַעֲנָן
  chosen: a green olive tree
  alternatives:
  - a flourishing olive tree
  - a luxuriant olive tree
  lexicon: HALOT
  rationale: זַיִת is 'olive tree.' רַעֲנָן denotes freshness/luxuriance/greenness.
    'Green' is natural English and preserves the image of vitality without over-paraphrase.
- source_word: יְפֵה פְרִי תֹאַר
  chosen: beautiful with good fruit
  alternatives:
  - fair in fruit and form
  - beautiful in fruit and shape
  lexicon: HALOT
  rationale: 'The phrase stacks terms of attractiveness and produce: יְפֵה (''beautiful/fair''),
    פְרִי (''fruit''), תֹאַר (''form/appearance''). English smooths the apposition.
    ''Beautiful with good fruit'' preserves both aesthetic and productive qualities,
    though תֹאַר is absorbed into the overall description rather than rendered woodenly.'
- source_word: קָרָא יְהוָה שְׁמֵךְ
  chosen: The LORD called your name
  alternatives:
  - The LORD named you
  - The LORD gave you the name
  lexicon: HALOT
  rationale: The idiom means to name/designate. 'Called your name' stays close to
    the Hebrew while remaining intelligible; the following quoted designation clarifies
    the sense.
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: לְקוֹל הֲמוּלָּה גְדוֹלָה
  chosen: At the sound of a great roar
  alternatives:
  - At the sound of a great tumult
  - With the noise of a great uproar
  lexicon: HALOT
  rationale: קוֹל is 'sound/noise'; הֲמוּלָּה is tumult, roar, commotion. In context
    of destructive judgment on a tree, 'great roar' vividly fits the storm/fire imagery
    while remaining lexically grounded.
- source_word: הִצִּית אֵשׁ עָלֶיהָ
  chosen: he set fire to it
  alternatives:
  - he kindled fire upon it
  - he ignited a fire against it
  lexicon: HALOT
  rationale: The Hiphil of יצת means to kindle/set on fire. 'Set fire to it' is idiomatic
    modern English and accurately conveys the action.
- source_word: וְרָעוּ
  chosen: are ruined
  alternatives:
  - are broken
  - are damaged
  - have become worthless
  lexicon: HALOT
  rationale: From רעע/רוע in the Qal plural, the sense is that the branches are harmed/broken/ruined.
    'Are ruined' captures the resulting devastation without forcing a narrower physical
    image than the Hebrew requires.
- source_word: דָּלִיּוֹתָיו
  chosen: its branches
  alternatives:
  - its boughs
  lexicon: HALOT
  rationale: The noun refers to hanging branches/boughs. 'Branches' is clear modern
    English; the 3ms suffix refers back to the olive tree image and is naturally rendered
    as 'its' in English.
