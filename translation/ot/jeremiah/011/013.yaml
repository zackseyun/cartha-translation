theological_decisions:
- issue: Rendering of יְהוּדָה as vocative singular while later verb is 2mp
  chosen_reading: Address Judah as a collective entity ('Judah') while retaining the
    plural 'you have set up' for the people collectively.
  alternative_readings:
  - Treat all forms as singular in smoother English
  - Treat the verse as shifting awkwardly between singular and plural without explanation
  rationale: The Hebrew personifies Judah in the singular ('your cities... your gods,
    Judah') and then addresses the inhabitants collectively in the plural ('you have
    set up'). Preserving the shift reflects the source text rather than smoothing
    it away.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Interpretation of לַבֹּשֶׁת
  chosen_reading: Render as 'Shame' in the main text, with likely reference to Baal
    preserved in a footnote.
  alternative_readings:
  - Render directly as 'Baal'
  - Render as 'the shameful thing'
  rationale: The Hebrew uses a polemical substitute meaning 'shame' rather than naming
    the deity directly. Translating the term preserves the prophetic denunciation;
    the probable identification with Baal is documented in a footnote.
  doctrine_reference: Translation philosophy §1, §3, §5
