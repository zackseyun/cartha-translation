id: JER.11.13
reference: Jeremiah 11:13
source:
  edition: WLC
  text: כִּ֚י מִסְפַּ֣ר עָרֶ֔י/ךָ הָי֥וּ אֱלֹהֶ֖י/ךָ יְהוּדָ֑ה וּ/מִסְפַּ֞ר חֻצ֣וֹת
    יְרוּשָׁלִַ֗ם שַׂמְתֶּ֤ם מִזְבְּחוֹת֙ לַ/בֹּ֔שֶׁת מִזְבְּח֖וֹת לְ/קַטֵּ֥ר לַ/בָּֽעַל׃ס
translation:
  text: For your gods, Judah, have become as numerous as your cities; and as numerous
    as the streets of Jerusalem you have set up altars to Shame, altars to make offerings
    to Baal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'to Shame,' a contemptuous substitute for a pagan deity, likely referring
      to Baal.
    reason: lexical_alternative
  - marker: b
    text: Or 'to burn incense to Baal.' The Hebrew verb often refers specifically
      to making a smoke offering.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding prohibition/judgment. 'For' fits
    the explanatory force in context.
- source_word: מִסְפַּר
  chosen: as numerous as
  alternatives:
  - according to the number of
  - equal in number to
  lexicon: HALOT
  rationale: The idiom מִסְפַּר + noun expresses numerical correspondence. 'As numerous
    as' is natural English while preserving the comparison.
- source_word: עָרֶיךָ
  chosen: your cities
  alternatives:
  - your towns
  lexicon: HALOT
  rationale: Standard rendering of עִיר in the plural with 2ms suffix, addressed to
    Judah personified.
- source_word: הָיוּ אֱלֹהֶיךָ יְהוּדָה
  chosen: your gods, Judah, have become
  alternatives:
  - Judah, your gods were
  - your gods were, O Judah
  lexicon: HALOT
  rationale: 'Vocative ''Judah'' is best brought into English with commas. Perfect
    of היה here states the resulting state: Judah''s gods have come to match the number
    of its cities. ''Have become'' captures that force better than a flat ''were''.'
- source_word: חֻצוֹת
  chosen: the streets
  alternatives:
  - the squares
  - the open places
  lexicon: HALOT
  rationale: Refers to city streets/public thoroughfares. 'Streets' is the most accessible
    modern equivalent, though 'squares' is possible in some contexts.
- source_word: שַׂמְתֶּם
  chosen: you have set up
  alternatives:
  - you placed
  - you made
  lexicon: HALOT
  rationale: The verb שׂים with altars means to place/establish them. 'Set up' is
    idiomatic for erecting cultic installations.
- source_word: מִזְבְּחוֹת
  chosen: altars
  lexicon: HALOT
  rationale: Standard rendering of the plural noun for sacrificial/incense altars.
- source_word: לַבֹּשֶׁת
  chosen: to Shame
  alternatives:
  - to the shameful thing
  - to Bosheth
  lexicon: HALOT
  rationale: בֹּשֶׁת literally means 'shame' and is used as a contemptuous substitute
    for the name of a pagan deity, likely Baal. Capitalizing 'Shame' preserves its
    quasi-titular use while retaining the Hebrew polemic. The more interpretive identification
    with a proper name is preserved in a footnote.
- source_word: לְקַטֵּר
  chosen: to make offerings
  alternatives:
  - to burn incense
  - to offer up smoke
  lexicon: HALOT
  rationale: The verb commonly refers to making a smoke offering, often incense. Because
    the object is omitted in Hebrew and the action is cultic, 'to make offerings'
    is readable and broad enough, while a more specific alternative is worth preserving
    in a footnote.
- source_word: לַבָּעַל
  chosen: to Baal
  alternatives:
  - for Baal
  lexicon: HALOT
  rationale: Standard rendering of the deity name with the preposition indicating
    direction/dedication of worship.
