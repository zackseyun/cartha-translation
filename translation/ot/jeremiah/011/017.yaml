id: JER.11.17
reference: Jeremiah 11:17
source:
  edition: WLC
  text: וַ/יהוָ֤ה צְבָאוֹת֙ הַ/נּוֹטֵ֣עַ אוֹתָ֔/ךְ דִּבֶּ֥ר עָלַ֖יִ/ךְ רָעָ֑ה בִּ֠/גְלַל
    רָעַ֨ת בֵּֽית יִשְׂרָאֵ֜ל וּ/בֵ֣ית יְהוּדָ֗ה אֲשֶׁ֨ר עָשׂ֥וּ לָ/הֶ֛ם לְ/הַכְעִסֵ֖/נִי
    לְ/קַטֵּ֥ר לַ/בָּֽעַל־׃ס
translation:
  text: And the LORD of Armies, who planted you, has spoken disaster against you,
    because of the evil of the house of Israel and the house of Judah, which they
    have done to themselves, provoking me to anger by making offerings to Baal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by burning incense to Baal.' The Hebrew verb refers specifically to
      producing smoke in ritual offering, often incense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine default for YHWH, render as 'the LORD' rather than transliterating
    the divine name.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: The title denotes military/multitudinous forces under YHWH's command.
    'Of Armies' is more transparent in modern English than traditional 'of hosts'
    while preserving the title's force.
- source_word: הַנּוֹטֵעַ אֹתָךְ
  chosen: who planted you
  alternatives:
  - your planter
  - who planted you as a tree/vine
  lexicon: HALOT
  rationale: The participle with object suffix recalls the olive-tree imagery in the
    immediate context (v. 16). Relative-clause English is natural and preserves the
    metaphor.
- source_word: דִּבֶּר עָלַיִךְ רָעָה
  chosen: has spoken disaster against you
  alternatives:
  - has declared evil against you
  - has pronounced calamity upon you
  lexicon: HALOT
  rationale: רָעָה here refers to calamity/disaster rather than moral evil. 'Has spoken
    disaster against you' keeps the verbal idea of דִּבֶּר while expressing the announced
    judgment.
- source_word: בִּגְלַל
  chosen: because of
  alternatives:
  - on account of
  lexicon: HALOT
  rationale: Standard causal rendering.
- source_word: רָעַת בֵּית יִשְׂרָאֵל וּבֵית יְהוּדָה
  chosen: the evil of the house of Israel and the house of Judah
  alternatives:
  - the wickedness of the house of Israel and the house of Judah
  lexicon: HALOT
  rationale: Here רָעַת denotes moral evil/wickedness, in contrast to the earlier
    judgment-disaster sense of רָעָה. 'House of' preserves the corporate/familial
    covenantal expression.
- source_word: אֲשֶׁר עָשׂוּ לָהֶם
  chosen: which they have done to themselves
  alternatives:
  - which they did
  - which they committed for themselves
  lexicon: HALOT
  rationale: The לָהֶם is best retained rather than omitted; it likely indicates action
    done for their own interest/result. 'To themselves' communicates their self-incriminating,
    self-harming conduct in idiomatic English.
- source_word: לְהַכְעִסֵנִי
  chosen: provoking me to anger
  alternatives:
  - to provoke me
  - to anger me
  lexicon: HALOT
  rationale: The Hiphil conveys causing anger/provocation. 'Provoking me to anger'
    is explicit and natural.
- source_word: לְקַטֵּר לַבָּעַל
  chosen: by making offerings to Baal
  alternatives:
  - by burning incense to Baal
  - by making smoke offerings to Baal
  lexicon: HALOT
  rationale: קטר often refers specifically to burning incense or smoke offerings in
    worship. 'Making offerings' is slightly broader but idiomatic; the cultic sense
    is preserved, with the more specific alternative worth noting in a footnote.
