theological_decisions:
- issue: Rendering the divine title יהוה צבאות
  chosen_reading: the LORD of Armies
  alternative_readings:
  - the LORD of hosts
  rationale: This preserves the covenant name per doctrine while translating the title
    into clear modern English. It avoids archaic 'hosts' without reducing the martial/cosmic
    scope of the title.
  doctrine_reference: 'DOCTRINE.md: YHWH default rendering; translate titles, transliterate
    names'
- issue: Sense of רָעָה / רָעַת in two occurrences
  chosen_reading: first as 'disaster,' second as 'evil'
  alternative_readings:
  - '''evil'' in both places'
  - '''calamity'' and ''wickedness'''
  rationale: 'The verse intentionally uses the same Hebrew root in two different senses:
    announced judgment from God and moral evil by Israel/Judah. Distinguishing them
    in English preserves the sense without implying God commits moral evil.'
  doctrine_reference: 'DOCTRINE.md: original-language primacy; preserve theological
    tension without importing claims'
