theological_decisions:
- issue: Meaning of רָעָה when God is the subject of bringing it
  chosen_reading: Rendered as 'disaster' rather than 'evil'
  alternative_readings:
  - evil
  - calamity
  rationale: The context is divine judgment on Anathoth. Rendering רָעָה as 'disaster'
    preserves the sense of inflicted calamity without suggesting moral evil in God.
    This is a lexical-theological decision driven by context, not by importing doctrine
    beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import
    doctrinal claims the text does not make.'
- issue: Scope of אַנְשֵׁי עֲנָתוֹת
  chosen_reading: Rendered specifically as 'the men of Anathoth'
  alternative_readings:
  - the people of Anathoth
  rationale: The Hebrew is explicitly masculine plural and the surrounding context
    identifies the conspirators as the men of Anathoth. Following the gender-accurate
    principle, the translation does not neutralize the term to 'people.'
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
