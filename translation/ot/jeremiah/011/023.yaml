id: JER.11.23
reference: Jeremiah 11:23
source:
  edition: WLC
  text: וּ/שְׁאֵרִ֕ית לֹ֥א תִֽהְיֶ֖ה לָ/הֶ֑ם כִּֽי אָבִ֥יא רָעָ֛ה אֶל אַנְשֵׁ֥י עֲנָת֖וֹת
    שְׁנַ֥ת פְּקֻדָּתָֽ/ם־־׃ס
translation:
  text: And no remnant will remain for them, for I will bring disaster on the men
    of Anathoth in the year of their punishment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the year of their visitation.' The Hebrew term can mean 'visitation'
      in a neutral sense, but here it refers to punitive visitation, hence 'punishment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁאֵרִית
  chosen: And no remnant will remain
  alternatives:
  - And there will be no remnant
  - And no survivor will remain
  lexicon: HALOT
  rationale: שְׁאֵרִית commonly denotes what is left over, a remnant or surviving
    remainder. 'Remnant' preserves the lexical link and prophetic resonance better
    than the more interpretive 'survivor,' while the English clause is smoothed with
    'will remain' to reflect the idiom with היה.
- source_word: לֹא תִהְיֶה לָהֶם
  chosen: will remain for them
  alternatives:
  - will be for them
  - will be left to them
  lexicon: HALOT
  rationale: The Hebrew literally says 'will not be for them.' In English, with שְׁאֵרִית,
    'will remain for them' or 'will be left to them' best conveys the sense of no
    surviving remainder.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the preceding judgment statement.
    'For' is concise and natural in prophetic discourse.
- source_word: אָבִיא
  chosen: I will bring
  alternatives:
  - I am bringing
  - I will bring upon
  lexicon: HALOT
  rationale: Hiphil of בוא here means to cause to come, hence 'bring.' Future sense
    fits the judgment announcement.
- source_word: רָעָה
  chosen: disaster
  alternatives:
  - evil
  - calamity
  lexicon: HALOT
  rationale: In judgment contexts רָעָה refers to harmful calamity rather than moral
    evil. 'Disaster' is clear modern English and avoids implying that God commits
    moral evil.
- source_word: אֶל אַנְשֵׁי עֲנָתוֹת
  chosen: on the men of Anathoth
  alternatives:
  - against the men of Anathoth
  - upon the people of Anathoth
  lexicon: HALOT
  rationale: אַנְשֵׁי is literally 'men of.' Per translation philosophy, gender-accurate
    rendering is preferred unless context clearly broadens. The immediate context
    concerns the men of Jeremiah's hometown plotting against him, so 'men of Anathoth'
    is retained rather than the broader 'people.' 'On' idiomatically fits 'bring disaster
    on.'
- source_word: שְׁנַת פְּקֻדָּתָם
  chosen: in the year of their punishment
  alternatives:
  - in the year of their visitation
  - at the time of their punishment
  lexicon: HALOT
  rationale: פְּקֻדָּה can mean visitation, oversight, or punishment depending on
    context. In this judgment oracle, 'punishment' best communicates the negative
    sense. 'Year of their punishment' preserves the temporal noun שְׁנַת more closely
    than a looser paraphrase.
