theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Followed the project's default rendering for the Tetragrammaton, preserving
    covenantal reference while aligning with established reverential English usage.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Anthropological idiom 'kidneys and heart'
  chosen_reading: retain the concrete Hebrew imagery in the main text
  alternative_readings:
  - render idiomatically as 'mind and heart'
  - render idiomatically as 'innermost being and heart'
  rationale: The verse depicts God testing the inner person. To maintain transparency
    to the Hebrew while preserving readability, the literal terms are kept in the
    text and the idiomatic sense is explained in a footnote rather than being resolved
    away.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    preserve theological tension rather than resolve it'
