id: JER.11.20
reference: Jeremiah 11:20
source:
  edition: WLC
  text: וַֽ/יהוָ֤ה צְבָאוֹת֙ שֹׁפֵ֣ט צֶ֔דֶק בֹּחֵ֥ן כְּלָי֖וֹת וָ/לֵ֑ב אֶרְאֶ֤ה נִקְמָֽתְ/ךָ֙
    מֵ/הֶ֔ם כִּ֥י אֵלֶ֖י/ךָ גִּלִּ֥יתִי אֶת רִיבִֽ/י־׃ס
translation:
  text: But you, O LORD of hosts, who judge righteously, who test the kidneys and
    the heart, let me see your vengeance on them, for to you I have revealed my case.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the kidneys and the heart,' a figure for the deepest thoughts and
      motives.
    reason: cultural_note
  - marker: b
    text: Or 'your avenging' or 'your vindication.'
    reason: lexical_alternative
  - marker: c
    text: Or 'my dispute' or 'my cause.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  chosen: O LORD
  alternatives:
  - O Yahweh
  - LORD
  lexicon: HALOT
  rationale: Rendered the divine name as 'LORD' per doctrine default for יְהוָה, with
    vocative force reflected by 'O' in context of direct address. The prefixed conjunction
    is adversative here in discourse flow, hence 'But' in the full clause.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: Traditional but still transparent rendering for the divine title יְהוָה
    צְבָאוֹת. 'Hosts' preserves the breadth of heavenly/earthly armies better than
    narrowing to merely military 'armies'.
- source_word: שֹׁפֵט צֶדֶק
  chosen: who judge righteously
  alternatives:
  - righteous judge
  - who judge justly
  lexicon: HALOT
  rationale: The participial construction describes the LORD's ongoing character/action.
    Rendering as a relative clause fits English syntax while preserving the verbal
    force. 'Righteously' captures צֶדֶק as the manner/quality of judging.
- source_word: בֹּחֵן
  chosen: who test
  alternatives:
  - who examine
  - who try
  lexicon: HALOT
  rationale: Another participle parallel to 'who judge'; 'test' conveys probing examination,
    especially of inner personhood.
- source_word: כְּלָיוֹת
  chosen: the kidneys
  alternatives:
  - the reins
  - the innermost being
  lexicon: HALOT
  rationale: Hebrew literally says 'kidneys,' an idiom for inner motives/affections.
    Main text keeps the concrete anthropological term for transparency to the source;
    a footnote preserves the idiomatic sense for readers.
- source_word: וָלֵב
  chosen: and the heart
  alternatives:
  - and the mind
  lexicon: HALOT
  rationale: Rendered literally. In Hebrew anthropology 'heart' includes thought and
    will, but the concrete term should be preserved in the main text.
- source_word: אֶרְאֶה
  chosen: let me see
  alternatives:
  - may I see
  - I will see
  lexicon: HALOT
  rationale: 'Although formally imperfect 1cs, in this prayer context it functions
    naturally as a jussive-like petition: Jeremiah asks to witness God''s action.
    ''Let me see'' best reflects the volitional nuance in English.'
- source_word: נִקְמָתְךָ
  chosen: your vengeance
  alternatives:
  - your vindication
  - your avenging
  lexicon: HALOT
  rationale: The noun from נקם denotes vengeance/avenging. 'Vengeance' is the most
    direct lexical equivalent here, referring to God's just retribution against Jeremiah's
    opponents.
- source_word: מֵהֶם
  chosen: on them
  alternatives:
  - against them
  - from them
  lexicon: HALOT
  rationale: With the noun 'vengeance,' English idiom prefers 'on them' or 'against
    them.' 'On them' is concise and natural.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: 'Introduces the ground for the petition: Jeremiah has entrusted his dispute
    to the LORD.'
- source_word: אֵלֶיךָ גִּלִּיתִי
  chosen: to you I have revealed
  alternatives:
  - to you I have uncovered
  - to you I have committed
  lexicon: HALOT
  rationale: The verb גלּה literally means 'uncover/reveal.' 'Revealed' preserves
    the metaphor while remaining natural in English. Fronting 'to you' reflects the
    Hebrew emphasis.
- source_word: אֶת רִיבִי
  chosen: my case
  alternatives:
  - my dispute
  - my cause
  - my complaint
  lexicon: HALOT
  rationale: רִיב can denote a legal dispute or cause. 'My case' communicates the
    juridical nuance clearly in modern English without sounding archaic.
