theological_decisions:
- issue: Gendered ancestral language
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The Hebrew explicitly says 'your fathers.' In keeping with the translation's
    gender-accurate policy, the masculine form is retained in the main text rather
    than neutralized, though the broader referent is the prior generations of Israel.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Obedience nuance in שִׁמְעוּ בְקוֹלִי
  chosen_reading: Listen to my voice
  alternative_readings:
  - Obey my voice
  rationale: The phrase often implies obedience, but the verse immediately adds 'and
    do them,' making the obedience demand explicit. Rendering the verb as 'Listen'
    preserves the Hebrew imagery and avoids importing the full obedience sense into
    the verb alone.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
