id: JER.11.4
reference: Jeremiah 11:4
source:
  edition: WLC
  text: אֲשֶׁ֣ר צִוִּ֣יתִי אֶת אֲבֽוֹתֵי/כֶ֡ם בְּ/י֣וֹם הוֹצִיאִֽ/י אוֹתָ֣/ם מֵ/אֶֽרֶץ
    מִצְרַיִם֩ מִ/כּ֨וּר הַ/בַּרְזֶ֜ל לֵ/אמֹ֗ר שִׁמְע֤וּ בְ/קוֹלִ/י֙ וַ/עֲשִׂיתֶ֣ם
    אוֹתָ֔/ם כְּ/כֹ֥ל אֲשֶׁר אֲצַוֶּ֖ה אֶתְ/כֶ֑ם וִ/הְיִ֤יתֶם לִ/י֙ לְ/עָ֔ם וְ/אָ֣נֹכִ֔י
    אֶהְיֶ֥ה לָ/כֶ֖ם לֵ/אלֹהִֽים־־־־׃
translation:
  text: which I commanded your fathers on the day I brought them out from the land
    of Egypt, from the iron furnace, saying, ‘Listen to my voice and do them, according
    to all that I command you; and you shall be my people, and I will be your God,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your ancestors.' The Hebrew reads 'your fathers.'
    reason: lexical_alternative
  - marker: b
    text: '''Listen to my voice'' can also be rendered ''Obey my voice,'' since the
      Hebrew expression often includes the sense of obedient hearing.'
    reason: lexical_alternative
  - marker: c
    text: '''The iron furnace'' is a metaphor for Egypt as a place of harsh oppression
      and affliction.'
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: Introduces the relative clause referring back to the covenant in the
    previous verse. 'Which' fits the antecedent naturally in English.
- source_word: צִוִּיתִי
  chosen: I commanded
  alternatives:
  - I charged
  lexicon: HALOT
  rationale: צוה commonly denotes authoritative command. 'Commanded' preserves covenantal
    authority better than softer alternatives.
- source_word: אֲבֽוֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'fathers.' Per gender-accurate
    policy, the main text preserves this form rather than neutralizing to 'ancestors.'
- source_word: בְּיוֹם הוֹצִיאִי
  chosen: on the day I brought
  alternatives:
  - in the day I brought out
  - when I brought
  lexicon: HALOT
  rationale: A temporal expression marking the exodus event. 'On the day I brought'
    is idiomatic and retains the concrete temporal framing.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: out from the land of Egypt
  alternatives:
  - from the land of Egypt
  - out of Egypt
  lexicon: HALOT
  rationale: Keeps both the preposition and the formal phrase 'land of Egypt,' echoing
    covenant/exodus language.
- source_word: מִכּוּר הַבַּרְזֶל
  chosen: from the iron furnace
  alternatives:
  - from the furnace of iron
  - from the iron-smelting furnace
  lexicon: HALOT
  rationale: A fixed metaphor for Egypt as a place of severe oppression and refining
    affliction. 'Iron furnace' is the most natural and recognizable English rendering
    while preserving the metaphor.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - as follows
  lexicon: HALOT
  rationale: Standard rendering introducing the content of the command.
- source_word: שִׁמְעוּ בְקוֹלִי
  chosen: Listen to my voice
  alternatives:
  - Obey my voice
  - Hear my voice
  lexicon: HALOT
  rationale: שׁמע with בְּקוֹל often carries the sense of obedient hearing. 'Listen
    to my voice' preserves the auditory metaphor in the main text without over-paraphrasing;
    the obedience nuance is carried by the following command to do.
- source_word: וַעֲשִׂיתֶם אֹתָם
  chosen: and do them
  alternatives:
  - and do it
  - and carry them out
  lexicon: HALOT
  rationale: The plural object most naturally refers to the commanded words/stipulations.
    'Do them' is slightly formal but preserves the plural object rather than smoothing
    it away.
- source_word: כְּכֹל אֲשֶׁר אֲצַוֶּה אֶתְכֶם
  chosen: according to all that I command you
  alternatives:
  - just as I command you in everything
  - in accordance with all that I command you
  lexicon: HALOT
  rationale: Expresses comprehensive conformity to divine command. 'According to all
    that I command you' is both accurate and readable.
- source_word: וִהְיִיתֶם לִי לְעָם
  chosen: and you shall be my people
  alternatives:
  - and you will become a people for me
  lexicon: HALOT
  rationale: Standard covenant formula. 'My people' is the established and accurate
    English equivalent.
- source_word: וְאָנֹכִי אֶהְיֶה לָכֶם לֵאלֹהִים
  chosen: and I will be your God
  alternatives:
  - and I will be God to you
  lexicon: HALOT
  rationale: Completes the covenant formula in idiomatic English while preserving
    the relational force.
