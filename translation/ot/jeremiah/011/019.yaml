id: JER.11.19
reference: Jeremiah 11:19
source:
  edition: WLC
  text: וַ/אֲנִ֕י כְּ/כֶ֥בֶשׂ אַלּ֖וּף יוּבַ֣ל לִ/טְב֑וֹחַ וְ/לֹֽא יָדַ֜עְתִּי כִּֽי
    עָלַ֣/י חָשְׁב֣וּ מַחֲשָׁב֗וֹת נַשְׁחִ֨יתָה עֵ֤ץ בְּ/לַחְמ/וֹ֙ וְ/נִכְרְתֶ֨/נּוּ֙
    מֵ/אֶ֣רֶץ חַיִּ֔ים וּ/שְׁמ֖/וֹ לֹֽא יִזָּכֵ֥ר עֽוֹד־־׀־׃
translation:
  text: 'But I was like a gentle lamb led to the slaughter, and I did not know that
    they had devised plans against me: ‘Let us destroy the tree with its fruit, and
    let us cut him off from the land of the living, so that his name will be remembered
    no more.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a tame lamb' or 'like a lamb familiar with humans'; the Hebrew
      adjective is difficult.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew obscure: ''Let us destroy the tree with its bread/food.'' Many understand
      the sense as total destruction of the tree together with its produce.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכֶבֶשׂ אַלּוּף
  chosen: like a gentle lamb
  alternatives:
  - like a tame lamb
  - like a lamb familiar with humans
  - like an ox/lamb that is trained
  lexicon: HALOT
  rationale: כֶּבֶשׂ is 'lamb.' אַלּוּף here is difficult; in this context it most
    plausibly describes a domesticated, docile, or unsuspecting animal rather than
    a 'chief.' 'Gentle lamb' communicates the vulnerability and lack of suspicion
    in readable English. A lexical alternative is preserved in a footnote because
    the adjective is debated.
- source_word: יוּבַל לִטְבוֹחַ
  chosen: led to the slaughter
  alternatives:
  - brought to slaughter
  - carried to be slaughtered
  lexicon: HALOT
  rationale: The passive/imperfect of יבל with infinitive טבח naturally yields 'led/brought
    to slaughter.' 'Led to the slaughter' is idiomatic English and preserves the sacrificial/slaughter
    imagery.
- source_word: וְלֹא יָדַעְתִּי
  chosen: and I did not know
  alternatives:
  - but I did not know
  - and I was unaware
  lexicon: HALOT
  rationale: A straightforward rendering of the perfect 1cs. 'Did not know' keeps
    the directness of the Hebrew.
- source_word: חָשְׁבוּ מַחֲשָׁבוֹת
  chosen: they had devised plans
  alternatives:
  - they had planned schemes
  - they had plotted plots
  - they had thought thoughts
  lexicon: HALOT
  rationale: The verb-noun cognate intensifies deliberate plotting. English avoids
    the wooden 'thought thoughts'; 'devised plans' captures hostile intentionality
    naturally.
- source_word: נַשְׁחִיתָה
  chosen: Let us destroy
  alternatives:
  - Let us ruin
  - Let us corrupt
  lexicon: HALOT
  rationale: Cohortative 1cp introducing the conspirators' speech. 'Destroy' best
    fits the murderous context.
- source_word: עֵץ בְּלַחְמוֹ
  chosen: the tree with its fruit
  alternatives:
  - the tree with its bread
  - the wood in its bread
  - the tree in its sap/food
  lexicon: HALOT
  rationale: This phrase is notoriously obscure. לֶחֶם normally means 'bread/food,'
    but in this idiom many understand the sense to be the tree together with what
    nourishes or belongs to it, i.e., its fruit/produce, yielding a coherent image
    of total destruction. Because the Hebrew is difficult, the more literal alternative
    is preserved in a footnote.
- source_word: וְנִכְרְתֶנּוּ
  chosen: and let us cut him off
  alternatives:
  - and let us destroy him
  - and let us cut it off
  lexicon: HALOT
  rationale: From כרת, 'cut off.' The suffix is masculine singular and in context
    refers to Jeremiah, not merely the tree, as the following clauses ('from the land
    of the living,' 'his name') show. 'Cut him off' preserves both the metaphor and
    the personal target.
- source_word: מֵאֶרֶץ חַיִּים
  chosen: from the land of the living
  alternatives:
  - from the land of life
  lexicon: HALOT
  rationale: A standard Hebrew idiom for the realm of the living; this established
    English rendering is both accurate and clear.
- source_word: וּשְׁמוֹ לֹא יִזָּכֵר עוֹד
  chosen: so that his name will be remembered no more
  alternatives:
  - and his name will no longer be remembered
  - so that his name may not be mentioned again
  lexicon: HALOT
  rationale: The Niphal of זכר can mean 'be remembered' or 'be mentioned.' In context
    of erasing a person's legacy, 'be remembered no more' best conveys the intended
    obliteration of memory.
