theological_decisions:
- issue: Rendering the violent metaphor in the conspirators' speech
  chosen_reading: Translate the imagery as a plot against Jeremiah's life without
    allegorizing it messianically in the main text.
  alternative_readings:
  - Read the verse primarily as typological prophecy of Christ's passion
  rationale: The immediate context is Jeremiah's own testimony about a murder plot.
    While later Christian readers may see typological resonance, the translation should
    not import that theological layer into the main text beyond what the Hebrew states.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
