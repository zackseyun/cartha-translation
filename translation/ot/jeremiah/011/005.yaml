theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render לַאֲבוֹתֵיכֶם generically
  chosen_reading: your fathers
  alternative_readings:
  - your ancestors
  rationale: The Hebrew is explicitly masculine plural and in Jeremiah's covenantal context likely evokes the patriarchal forefathers. Per the translation philosophy, gender-accurate rendering is preferred over neutralization unless context clearly demands otherwise.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
