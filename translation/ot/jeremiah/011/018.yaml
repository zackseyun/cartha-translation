theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Shift from third-person reference to second-person address for God
  chosen_reading: 'Retain the shift: ''the LORD ... then you showed me'''
  alternative_readings:
  - 'Smooth to third person throughout: ''the LORD ... then he showed me'''
  rationale: The Hebrew text itself shifts from third-person naming of YHWH to second-person address. Preserving this reflects the immediacy of Jeremiah's speech and avoids flattening the source text's rhetorical texture.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
