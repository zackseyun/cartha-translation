id: JER.11.18
reference: Jeremiah 11:18
source:
  edition: WLC
  text: וַֽ/יהוָ֥ה הֽוֹדִיעַ֖/נִי וָֽ/אֵדָ֑עָ/ה אָ֖ז הִרְאִיתַ֥/נִי מַעַלְלֵי/הֶֽם׃
translation:
  text: And Yahweh made it known to me, and I knew; then you showed me their deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shifts from third person ('the LORD') to second person ('you showed me'), likely reflecting direct address to the LORD; some translations smooth this to 'he showed me.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיהוָה
  chosen: And the LORD
  alternatives:
  - And Yahweh
  lexicon: HALOT
  rationale: The conjunction waw is carried forward as 'And.' The divine name יְהוָה is rendered 'the LORD' per the doctrine's default for YHWH, following established English convention that reflects Jewish reverence practice.
- source_word: הוֹדִיעַנִי
  chosen: made it known to me
  alternatives:
  - informed me
  - caused me to know
  lexicon: HALOT
  rationale: Hiphil of ידע means to cause someone to know or make known. 'Made it known to me' preserves the causative force more clearly than the flatter 'told me' or 'informed me.' The implied object is left general in Hebrew and is naturally represented by 'it' in English.
- source_word: וָאֵדָעָה
  chosen: so I knew
  alternatives:
  - and I knew
  - then I knew
  lexicon: HALOT
  rationale: This form continues the result of the previous clause. 'So I knew' captures the consequential sense in readable English while preserving the first-person acquisition of knowledge. 'And I knew' is possible but less natural in English here.
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: אָז is a temporal adverb meaning 'then' or 'at that time.' 'Then' is concise and natural, fitting the sequence of revelation in the verse.
- source_word: הִרְאִיתַנִי
  chosen: you showed me
  alternatives:
  - you caused me to see
  - you let me see
  lexicon: HALOT
  rationale: Hiphil of ראה is causative, 'show' or 'cause to see.' Because the verb is second masculine singular, the subject is best understood as the LORD addressed directly after the initial third-person reference. 'You showed me' is idiomatic and preserves the causative sense.
- source_word: מַעַלְלֵיהֶם
  chosen: their deeds
  alternatives:
  - their actions
  - their practices
  lexicon: HALOT
  rationale: מַעֲלָל often denotes deeds or actions, frequently with moral coloring in prophetic contexts. 'Their deeds' is concise, natural, and leaves the negative evaluation to the broader context rather than overtranslating with 'evil deeds' here.
