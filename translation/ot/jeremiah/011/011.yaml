id: JER.11.11
reference: Jeremiah 11:11
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֚ה אָמַ֣ר יְהוָ֔ה הִנְ/נִ֨י מֵבִ֤יא אֲלֵי/הֶם֙ רָעָ֔ה אֲשֶׁ֥ר לֹֽא יוּכְל֖וּ לָ/צֵ֣את מִמֶּ֑/נָּה וְ/זָעֲק֣וּ אֵלַ֔/י וְ/לֹ֥א אֶשְׁמַ֖ע אֲלֵי/הֶֽם־׃
translation:
  text: 'Therefore thus says Yahweh: Behold, I am bringing on them a disaster from which they will not be able to escape; and they will cry out to me, but I will not listen to them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calamity'; Hebrew רָעָה here refers to destructive judgment, not moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks the statement as a consequence of the preceding indictment; 'therefore' preserves the formal inferential force in natural English.
- source_word: כֹּה אָמַר יְהוָה
  chosen: thus says the LORD
  alternatives:
  - this is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the prophetic register, and יְהוָה follows the doctrinal default 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See
  - Indeed
  lexicon: HALOT
  rationale: Introduces solemn divine announcement with heightened immediacy. 'Behold' best preserves the prophetic gravity without adding content.
- source_word: מֵבִיא
  chosen: I am bringing
  alternatives:
  - I am about to bring
  - I bring
  lexicon: HALOT
  rationale: The participle with הִנְנִי conveys imminent or certain action. 'I am bringing' preserves the aspect and urgency without overinterpreting as strictly future.
- source_word: אֲלֵיהֶם
  chosen: on them
  alternatives:
  - upon them
  - against them
  lexicon: HALOT
  rationale: With verbs of bringing calamity, English idiom prefers 'bring on them'; it communicates directed judgment naturally.
- source_word: רָעָה
  chosen: a disaster
  alternatives:
  - evil
  - calamity
  lexicon: HALOT
  rationale: In judgment contexts רָעָה commonly denotes calamity/disaster rather than moral evil. 'Disaster' is clear modern English and avoids implying God commits moral evil.
- source_word: אֲשֶׁר לֹא יוּכְלוּ לָצֵאת מִמֶּנָּה
  chosen: from which they will not be able to escape
  alternatives:
  - which they will not be able to get out of
  - from which they cannot come out
  lexicon: HALOT
  rationale: The idiom 'go out from it' refers to being unable to extricate themselves from the coming calamity. 'Escape' expresses the sense idiomatically in English.
- source_word: וְזָעֲקוּ אֵלַי
  chosen: and they will cry out to me
  alternatives:
  - and they will call to me
  - and they will cry to me
  lexicon: HALOT
  rationale: זעק conveys an urgent cry for help, often in distress. 'Cry out' preserves the intensity better than the more neutral 'call'.
- source_word: וְלֹא אֶשְׁמַע אֲלֵיהֶם
  chosen: but I will not listen to them
  alternatives:
  - but I will not hear them
  - and I will not listen to them
  lexicon: HALOT
  rationale: שׁמע can mean hear or listen/respond. In this context of rejected pleas, 'listen to' communicates not merely auditory hearing but refusal to heed. 'But' brings out the adversative sense naturally in English.
