theological_decisions:
- issue: Rendering of divine judgment term רָעָה
  chosen_reading: a disaster
  alternative_readings:
  - evil
  - calamity
  rationale: The context is covenant judgment announced by the LORD. Rendering רָעָה as 'disaster' preserves the sense of punitive calamity while avoiding the theological misunderstanding that God is said here to bring moral evil upon the people.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable modern English, not archaic or academic.'
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
