theological_decisions:
- issue: Covenantal force of שִׁמְעוּ בְּקוֹלִי
  chosen_reading: Listen to my voice
  alternative_readings:
  - Obey my voice
  rationale: The phrase often carries obedience in covenant contexts, but the Hebrew
    wording is literally auditory. To preserve theological tension rather than resolve
    it, the main text keeps 'Listen,' while the obedience nuance is preserved in a
    footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
