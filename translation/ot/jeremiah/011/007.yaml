id: JER.11.7
reference: Jeremiah 11:7
source:
  edition: WLC
  text: כִּי֩ הָעֵ֨ד הַעִדֹ֜תִי בַּ/אֲבֽוֹתֵי/כֶ֗ם בְּ/יוֹם֩ הַעֲלוֹתִ֨/י אוֹתָ֜/ם
    מֵ/אֶ֤רֶץ מִצְרַ֨יִם֙ וְ/עַד הַ/יּ֣וֹם הַ/זֶּ֔ה הַשְׁכֵּ֥ם וְ/הָעֵ֖ד לֵ/אמֹ֑ר
    שִׁמְע֖וּ בְּ/קוֹלִֽ/י־׃
translation:
  text: For I solemnly warned your fathers in the day I brought them up from the land
    of Egypt, and to this day, rising early and warning them, saying, ‘Listen to my
    voice.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Obey my voice.' The Hebrew expression can carry the sense of listening
      with obedience, especially in covenant contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding charge; 'For'
    fits the discourse connection naturally in English.
- source_word: הָעֵד הַעִדֹתִי
  chosen: I solemnly warned
  alternatives:
  - I earnestly testified
  - I surely warned
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of עוּד intensifies the verbal
    idea. In context, the sense is covenantal warning/testimony rather than mere courtroom
    testimony. 'Solemnly warned' captures both the intensity and the admonitory force
    in readable English.
- source_word: בַּאֲבוֹתֵיכֶם
  chosen: your fathers
  alternatives:
  - your ancestors
  lexicon: HALOT
  rationale: The Hebrew literally says 'your fathers.' Per gender-accurate philosophy,
    the masculine familial term is retained. 'Ancestors' is possible dynamically,
    but 'fathers' better preserves the covenant-historical wording.
- source_word: בְּיוֹם הַעֲלוֹתִי אוֹתָם מֵאֶרֶץ מִצְרַיִם
  chosen: in the day I brought them up from the land of Egypt
  alternatives:
  - when I brought them up from the land of Egypt
  lexicon: HALOT
  rationale: עלה in the Hiphil is the standard exodus idiom 'bring up.' 'In the day'
    is somewhat formal but idiomatic enough and preserves the Hebrew temporal expression.
- source_word: וְעַד הַיּוֹם הַזֶּה
  chosen: and to this day
  alternatives:
  - even to this day
  - until this day
  lexicon: HALOT
  rationale: A standard idiom indicating continuing action from the exodus until the
    present prophetic moment.
- source_word: הַשְׁכֵּם וְהָעֵד
  chosen: rising early and warning them
  alternatives:
  - persistently warning
  - rising early and testifying
  lexicon: HALOT
  rationale: The idiom השכם + verb conveys repeated, diligent action, often rendered
    'rising early and...' in Jeremiah. Retaining 'rising early' preserves the Hebrew
    imagery; 'warning' continues the sense of עוּד in context. 'Them' is supplied
    in English from the object implied by the earlier clause and the ongoing reference
    to the fathers/people.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - declaring
  lexicon: HALOT
  rationale: Standard quotative introducing the content of the warning.
- source_word: שִׁמְעוּ בְּקוֹלִי
  chosen: Listen to my voice
  alternatives:
  - Obey my voice
  - Hear my voice
  lexicon: HALOT
  rationale: שׁמע בְּקוֹל can mean both hearing and obeying. 'Listen to my voice'
    preserves the lexical form and leaves the obedience nuance implicit, avoiding
    over-interpretation while still sounding natural. The stronger covenantal sense
    is worth preserving in a footnote.
