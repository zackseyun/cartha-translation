id: JER.11.14
reference: Jeremiah 11:14
source:
  edition: WLC
  text: וְ/אַתָּ֗ה אַל תִּתְפַּלֵּל֙ בְּעַד הָ/עָ֣ם הַ/זֶּ֔ה וְ/אַל תִּשָּׂ֥א בַעֲדָ֖/ם
    רִנָּ֣ה וּ/תְפִלָּ֑ה כִּ֣י אֵינֶ֣/נִּי שֹׁמֵ֗עַ בְּ/עֵ֛ת קָרְאָ֥/ם אֵלַ֖/י בְּעַ֥ד
    רָעָתָֽ/ם־־־׃ס
translation:
  text: But as for you, do not pray for this people, and do not lift up a cry or prayer
    on their behalf, for I am not listening when they call to me because of their
    disaster.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of their calamity.' The Hebrew word can also mean 'evil' in
      other contexts, but here it refers to the disaster that has come upon them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתָּה
  chosen: But as for you
  alternatives:
  - And you
  - But you
  lexicon: HALOT
  rationale: The conjunction plus independent pronoun marks a contrastive address
    to Jeremiah. 'But as for you' brings out the emphatic shift more clearly than
    a simple 'and you.'
- source_word: אַל תִּתְפַּלֵּל
  chosen: do not pray
  alternatives:
  - must not pray
  - do not intercede
  lexicon: HALOT
  rationale: The negative particle with the imperfect/jussive gives a prohibition.
    'Pray' is the plain sense of התפלל here; 'intercede' is possible in context but
    narrower than the verb itself.
- source_word: בְּעַד הָעָם הַזֶּה
  chosen: for this people
  alternatives:
  - on behalf of this people
  lexicon: HALOT
  rationale: בעד indicates representation or benefit. 'For this people' is natural
    English and preserves the intercessory sense.
- source_word: וְאַל תִּשָּׂא
  chosen: and do not lift up
  alternatives:
  - and do not raise
  - and do not offer up
  lexicon: HALOT
  rationale: נשא literally means 'lift/carry.' In prayer contexts 'lift up' is a common
    and transparent idiom that preserves the Hebrew imagery.
- source_word: בַעֲדָם
  chosen: on their behalf
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The preposition again signals intercession for others. 'On their behalf'
    makes the representative sense explicit.
- source_word: רִנָּה
  chosen: a cry
  alternatives:
  - a plea
  - a ringing cry
  lexicon: HALOT
  rationale: רנה can denote a loud cry, sometimes joyful, but here in parallel with
    prayer it refers to an urgent vocal appeal. 'Cry' fits the context better than
    'song' or 'shout.'
- source_word: וּתְפִלָּה
  chosen: or prayer
  alternatives:
  - and prayer
  lexicon: HALOT
  rationale: Although the conjunction is formally 'and,' English idiom after a repeated
    prohibition often uses 'or' in a paired expression ('do not lift up a cry or prayer').
    This preserves the sense without woodenness.
- source_word: כִּי אֵינֶנִּי שֹׁמֵעַ
  chosen: for I am not listening
  alternatives:
  - for I will not hear
  - for I am not hearing
  lexicon: HALOT
  rationale: The participle with the negative expresses Yahweh's present refusal to
    heed. 'I am not listening' conveys active non-response in contemporary English.
    'I will not hear' is possible but slightly more interpretive toward future force.
- source_word: בְּעֵת קָרְאָם
  chosen: when they call
  alternatives:
  - at the time of their calling
  - in the time when they call
  lexicon: HALOT
  rationale: בעת plus infinitive-like verbal idea is naturally rendered temporally.
    'When they call' is idiomatic and accurate.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - out to me
  lexicon: HALOT
  rationale: The preposition simply marks direction toward the speaker; 'to me' is
    sufficient.
- source_word: בְּעַד רָעָתָם
  chosen: because of their disaster
  alternatives:
  - on account of their calamity
  - because of their evil
  lexicon: HALOT
  rationale: רעה can mean moral evil or calamity/disaster depending on context. Here
    the sense is the distress that prompts their cry, not their wickedness itself.
    'Disaster' best fits the immediate context of calling for relief.
