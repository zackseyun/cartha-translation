theological_decisions:
- issue: Sense of רָעָה in the final clause
  chosen_reading: calamity/disaster rather than moral evil
  alternative_readings:
  - evil
  - wickedness
  rationale: The people are described as calling to Yahweh in a time of trouble; the
    clause explains the occasion of their cry, not the moral content of their prayer.
    Rendering רעה as 'disaster' preserves the prophetic theme of judgment falling
    on them without implying that they are calling to God 'for their evil.'
