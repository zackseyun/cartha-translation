theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt explicitly sets 'the LORD' as the default rendering
    for YHWH. This preserves covenantal resonance and aligns with the translation's
    stated policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered representative singular in הָאִישׁ
  chosen_reading: the man
  alternative_readings:
  - the person
  - the one
  rationale: The source is grammatically masculine singular with representative force.
    Per the translation philosophy, gender-accurate rendering is preferred over gender-neutral
    smoothing unless context demands otherwise.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
