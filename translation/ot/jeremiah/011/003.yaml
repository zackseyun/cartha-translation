id: JER.11.3
reference: Jeremiah 11:3
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֔ם כֹּֽה אָמַ֥ר יְהוָ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל אָר֣וּר
    הָ/אִ֔ישׁ אֲשֶׁר֙ לֹ֣א יִשְׁמַ֔ע אֶת דִּבְרֵ֖י הַ/בְּרִ֥ית הַ/זֹּֽאת־־׃
translation:
  text: 'And you shall say to them, ‘Thus says the LORD, the God of Israel: Cursed
    is the man who does not listen to the words of this covenant,’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who does not obey the words of this covenant.' The Hebrew verb can carry
      the sense of hearing with obedient response.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: And you shall say
  alternatives:
  - And say
  - Then you shall say
  lexicon: HALOT
  rationale: The waw + perfect in prophetic instruction functions as a directive to
    Jeremiah. 'And you shall say' preserves the sequential force and the direct commission
    without over-paraphrasing.
- source_word: אֲלֵיהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating the audience of Jeremiah's
    speech.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' is both accurate and
    natural in English, preserving the solemn prophetic register.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding covenantal usage.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct chain rendered naturally in English, identifying YHWH covenantally
    as Israel's God.
- source_word: אָרוּר
  chosen: Cursed
  alternatives:
  - Accursed
  lexicon: HALOT
  rationale: Predicate adjective introducing covenant-sanction language. 'Cursed'
    is the clearest modern English equivalent and preserves the judicial-covenantal
    force.
- source_word: הָאִישׁ
  chosen: the man
  alternatives:
  - the person
  - the one
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular. In keeping with the gender-accurate
    policy, 'the man' is retained rather than neutralizing to 'the person,' while
    the sense is representative/generic in context.
- source_word: אֲשֶׁר לֹא יִשְׁמַע
  chosen: who does not listen
  alternatives:
  - who does not hear
  - who will not obey
  lexicon: HALOT
  rationale: שׁמע can mean hear/listen/obey depending on context. Here the direct
    object is 'the words of this covenant'; 'listen' preserves the auditory verb while
    allowing the covenantal implication of heed/obedience without importing a stronger
    gloss into the main text.
- source_word: אֶת דִּבְרֵי
  chosen: to the words
  alternatives:
  - the words of
  - the terms of
  lexicon: HALOT
  rationale: In English, 'listen' normally takes 'to'; this is a natural restructuring
    of the Hebrew object marker plus noun. 'Words' is preferred over 'terms' to stay
    closer to the Hebrew while still fitting covenant language.
- source_word: הַבְּרִית הַזֹּאת
  chosen: this covenant
  alternatives:
  - this pact
  lexicon: HALOT
  rationale: בְּרִית is a major theological term and is best rendered consistently
    as 'covenant.' The demonstrative is naturally placed before the noun in English.
