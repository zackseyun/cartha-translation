theological_decisions:
- issue: Referent of אֱלֹהִים
  chosen_reading: false gods/idols worshiped by Judah and Jerusalem
  alternative_readings:
  - a generic 'god'
  rationale: The immediate relative clause 'to whom they burn incense' and the broader
    context of Jeremiah's polemic against idolatry make the plural referent explicit.
    Rendering 'gods' avoids ambiguity and does not import extra theology beyond the
    context.
