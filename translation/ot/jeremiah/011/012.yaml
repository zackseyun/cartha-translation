id: JER.11.12
reference: Jeremiah 11:12
source:
  edition: WLC
  text: וְ/הָֽלְכ֞וּ עָרֵ֣י יְהוּדָ֗ה וְ/יֹשְׁבֵי֙ יְר֣וּשָׁלִַ֔ם וְ/זָֽעֲקוּ֙ אֶל
    הָ֣/אֱלֹהִ֔ים אֲשֶׁ֛ר הֵ֥ם מְקַטְּרִ֖ים לָ/הֶ֑ם וְ/הוֹשֵׁ֛עַ לֹֽא יוֹשִׁ֥יעוּ
    לָ/הֶ֖ם בְּ/עֵ֥ת רָעָתָֽ/ם־־׃
translation:
  text: Then the cities of Judah and the inhabitants of Jerusalem will go and cry
    out to the gods to whom they burn incense, but they will certainly not save them
    in the time of their trouble.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the time of their calamity' or 'in the time of their disaster.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָלְכוּ
  chosen: Then ... will go
  alternatives:
  - and they will go
  - so they will go
  lexicon: HALOT
  rationale: Qal perfect with prefixed waw in prophetic sequence is rendered as a
    future-like action in context. 'Then' brings out the consequential force from
    the preceding context without over-paraphrasing.
- source_word: עָרֵי יְהוּדָה
  chosen: the cities of Judah
  alternatives:
  - Judah's cities
  lexicon: HALOT
  rationale: A straightforward construct chain; the more explicit form is preferred
    for readability.
- source_word: וְיֹשְׁבֵי יְרוּשָׁלִַם
  chosen: and the inhabitants of Jerusalem
  alternatives:
  - and those who dwell in Jerusalem
  lexicon: HALOT
  rationale: The participial form denotes the resident population. 'Inhabitants' is
    idiomatic modern English and preserves the collective sense.
- source_word: וְזָעֲקוּ אֶל
  chosen: and cry out to
  alternatives:
  - and call out to
  lexicon: HALOT
  rationale: זעק conveys a desperate cry for help. 'Cry out to' best fits the context
    of appeal in distress.
- source_word: הָאֱלֹהִים
  chosen: the gods
  alternatives:
  - the god(s)
  lexicon: HALOT
  rationale: In this context the referent is the false deities to whom incense is
    offered, so the plural 'gods' is required by sense and context.
- source_word: אֲשֶׁר הֵם מְקַטְּרִים לָהֶם
  chosen: to whom they burn incense
  alternatives:
  - for whom they make offerings of incense
  - to whom they offer incense
  lexicon: HALOT
  rationale: The relative clause identifies the gods by the cultic act performed toward
    them. 'Burn incense' is the standard and sufficiently transparent rendering of
    קטר in this stem/context.
- source_word: וְהוֹשֵׁעַ לֹא יוֹשִׁיעוּ לָהֶם
  chosen: but they will certainly not save them
  alternatives:
  - but they will not save them at all
  - and saving, they will not save them
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of ישׁע intensifies the negation.
    'Certainly not save' captures the emphatic force in natural English.
- source_word: בְּעֵת רָעָתָם
  chosen: in the time of their trouble
  alternatives:
  - at the time of their disaster
  - in the time of their calamity
  - in the time of their evil
  lexicon: HALOT
  rationale: רָעָה here denotes experienced calamity/distress rather than moral evil.
    'Trouble' is natural English; 'disaster' or 'calamity' are possible but slightly
    heavier. The phrase refers to the crisis that prompts their appeal.
