theological_decisions:
- issue: Covenantal continuity between present generation and ancestors
  chosen_reading: The verse is rendered to show that the present people have reverted
    to the sins of earlier generations and have broken the covenant God made with
    those earlier generations.
  alternative_readings:
  - A looser rendering that treats the covenant as only historically descriptive without
    present covenantal implication
  rationale: The Hebrew explicitly ties current disobedience to ancestral rebellion
    and to the covenant made with 'their fathers.' The translation preserves this
    covenantal continuity without importing later theological systems.
  doctrine_reference: Translation philosophy §§1, 3, 5
