id: JER.11.10
reference: Jeremiah 11:10
source:
  edition: WLC
  text: שָׁ֩בוּ֩ עַל עֲוֺנֹ֨ת אֲבוֹתָ֜/ם הָ/רִֽאשֹׁנִ֗ים אֲשֶׁ֤ר מֵֽאֲנוּ֙ לִ/שְׁמ֣וֹעַ
    אֶת דְּבָרַ֔/י וְ/הֵ֣מָּה הָלְכ֗וּ אַחֲרֵ֛י אֱלֹהִ֥ים אֲחֵרִ֖ים לְ/עָבְדָ֑/ם הֵפֵ֤רוּ
    בֵֽית יִשְׂרָאֵל֙ וּ/בֵ֣ית יְהוּדָ֔ה אֶת בְּרִיתִ֕/י אֲשֶׁ֥ר כָּרַ֖תִּי אֶת אֲבוֹתָֽ/ם־־־־־׃ס
translation:
  text: They have returned to the iniquities of their first fathers, who refused to
    hear my words, and they themselves have gone after other gods to serve them. The
    house of Israel and the house of Judah have broken my covenant that I made with
    their fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their former fathers' or 'their forefathers.' The Hebrew literally says
      'their first fathers,' referring to earlier generations.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'to hear my words'; in context this can also carry the sense 'to
      listen/obey.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'cut' my covenant.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁבוּ
  chosen: have returned
  alternatives:
  - have turned back
  - have gone back
  lexicon: HALOT
  rationale: Qal perfect 3cp of שוב here denotes a return to a prior pattern of behavior.
    'Have returned' is idiomatic and preserves the sense of reverting to former sins.
- source_word: עַל עֲוֺנֹת
  chosen: to the iniquities
  alternatives:
  - upon the iniquities
  - to the sins
  - to the guilt
  lexicon: HALOT
  rationale: The idiom שוב על can mean returning to or reverting to something. עָוֹן
    carries the sense of iniquity/guilt rather than a generic term for sin; 'iniquities'
    preserves the moral weight.
- source_word: אֲבוֹתָם הָרִאשֹׁנִים
  chosen: their first fathers
  alternatives:
  - their former fathers
  - their ancestors of old
  - their forefathers
  lexicon: HALOT
  rationale: Literally 'their first/former fathers.' I retained the somewhat formal
    'first fathers' to reflect the Hebrew emphasis on the earlier generations, while
    keeping the phrase intelligible in English.
- source_word: מֵאֲנוּ לִשְׁמֹעַ אֶת דְּבָרַי
  chosen: refused to hear my words
  alternatives:
  - refused to listen to my words
  - were unwilling to obey my words
  lexicon: HALOT
  rationale: מָאֵן means 'refuse.' שׁמע with 'words' can imply hearing with responsiveness,
    but 'hear my words' keeps the Hebrew wording without over-interpreting it as obedience.
- source_word: וְהֵמָּה
  chosen: they themselves
  alternatives:
  - and they
  - they too
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis. 'They themselves' brings out the
    emphatic force in natural English.
- source_word: הָלְכוּ אַחֲרֵי אֱלֹהִים אֲחֵרִים
  chosen: have gone after other gods
  alternatives:
  - walked after other gods
  - followed other gods
  lexicon: HALOT
  rationale: הלך אחרי is a common idiom for following after in allegiance/worship.
    'Gone after' is a clear, natural rendering that preserves the metaphor.
- source_word: לְעָבְדָם
  chosen: to serve them
  alternatives:
  - to worship them
  lexicon: HALOT
  rationale: עבד in relation to deities often includes worshipful service. 'Serve
    them' is the more direct lexical equivalent and lets the broader cultic sense
    remain implicit.
- source_word: הֵפֵרוּ
  chosen: have broken
  alternatives:
  - have violated
  - have annulled
  lexicon: HALOT
  rationale: The Hiphil of פרר in covenant contexts means to break or violate. 'Have
    broken' is the clearest covenantal English equivalent.
- source_word: בֵּית יִשְׂרָאֵל וּבֵית יְהוּדָה
  chosen: The house of Israel and the house of Judah
  alternatives:
  - Israel and Judah
  lexicon: HALOT
  rationale: The repeated 'house of' is significant covenantal language and should
    be preserved rather than reduced to the bare national names.
- source_word: בְּרִיתִי
  chosen: my covenant
  alternatives:
  - my pact
  - my treaty
  lexicon: HALOT
  rationale: בְּרִית is standardly 'covenant' in biblical theological contexts; this
    preserves the established covenantal sense.
- source_word: כָּרַתִּי
  chosen: made
  alternatives:
  - cut
  lexicon: HALOT
  rationale: Although the Hebrew idiom is literally 'cut a covenant,' standard English
    uses 'made a covenant.' The literal idiom is not necessary in the main text.
- source_word: אֶת אֲבוֹתָם
  chosen: with their fathers
  alternatives:
  - with their ancestors
  lexicon: HALOT
  rationale: The preposition אֵת here marks accompaniment ('with'), not direct object.
    'With their fathers' is the straightforward rendering and links the current generation
    to the covenant made with prior generations.
