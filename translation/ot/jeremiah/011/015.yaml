theological_decisions:
- issue: Identity of 'my beloved'
  chosen_reading: Judah/Jerusalem is addressed ironically as the LORD's beloved covenant
    people.
  alternative_readings:
  - A generic worshiper
  - The temple community without ironic force
  rationale: The feminine verbal and pronominal forms point to a feminine collective
    referent such as Judah/Jerusalem. The term 'my beloved' is retained rather than
    flattened, because the irony depends on covenant intimacy violated by wickedness.
- issue: Function of sacrificial language
  chosen_reading: The verse denies that participation in holy sacrificial meat can
    remove Judah's moral guilt.
  alternative_readings:
  - The phrase refers more generally to temple ritual
  - The line is too corrupt to state the point with certainty
  rationale: The juxtaposition of 'holy flesh' with 'your evil' strongly suggests
    a polemic against ritual as a cover for persistent wickedness. The translation
    makes this implicit logic explicit enough for English readers while staying close
    to the Hebrew imagery.
