id: JER.11.15
reference: Jeremiah 11:15
source:
  edition: WLC
  text: מֶ֣ה לִֽ/ידִידִ֞/י בְּ/בֵיתִ֗/י עֲשׂוֹתָ֤/הּ הַֽ/מְזִמָּ֨תָ/ה֙ הָֽ/רַבִּ֔ים
    וּ/בְשַׂר קֹ֖דֶשׁ יַעַבְר֣וּ מֵֽ/עָלָ֑יִ/ךְ כִּ֥י רָעָתֵ֖/כִי אָ֥ז תַּעֲלֹֽזִי־׃
translation:
  text: What right has my beloved in my house, when she has done her many wicked schemes?
    Can holy flesh remove your evil from you? Then you rejoice!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'What business has my beloved in my house...?'
    reason: lexical_alternative
  - marker: b
    text: '''Holy flesh'' likely refers to meat from sacrifices; the sense is that
      sacred ritual cannot take away their wickedness.'
    reason: cultural_note
  - marker: c
    text: Hebrew is difficult; literally, 'and holy flesh will pass from upon you,
      for your evil—then you rejoice.'
    reason: alternative_reading
lexical_decisions:
- source_word: מֶה
  chosen: What right
  alternatives:
  - What
  - Why
  - What business
  lexicon: HALOT
  rationale: In the idiom מֶה לְ... בְּ..., the sense is not merely interrogative
    'what' but 'what right/what business has ... in ...?' This brings out the rhetorical
    force in natural English.
- source_word: לִידִידִי
  chosen: my beloved
  alternatives:
  - my loved one
  - my dear one
  lexicon: HALOT
  rationale: יְדִיד can mean beloved/dear one. 'My beloved' preserves the covenantal
    and relational tone, even though the address is ironic in context.
- source_word: בְּבֵיתִי
  chosen: in my house
  alternatives:
  - in my temple
  lexicon: HALOT
  rationale: Literally 'in my house.' In Jeremiah this refers to the LORD's house,
    i.e., the temple, but the text itself says 'house,' so the more literal rendering
    is retained.
- source_word: עֲשׂוֹתָהּ
  chosen: when she has done
  alternatives:
  - in doing
  - to do
  lexicon: HALOT
  rationale: The infinitive construct with suffix is syntactically difficult here.
    Rendering it temporally ('when she has done') fits the rhetorical question and
    the following accusation.
- source_word: הַמְזִמָּתָה הָרַבִּים
  chosen: her many wicked schemes
  alternatives:
  - the many schemes
  - her many plans
  - her many lewd acts
  lexicon: HALOT
  rationale: מְזִמָּה can denote plan/device and in prophetic contexts often carries
    a negative moral sense. 'Wicked schemes' makes the pejorative force explicit;
    the suffix is represented by 'her.' The plural adjective רַבִּים gives 'many.'
- source_word: וּבְשַׂר קֹדֶשׁ
  chosen: holy flesh
  alternatives:
  - sacred meat
  - consecrated flesh
  lexicon: HALOT
  rationale: This likely refers to sacrificial meat from holy offerings. 'Holy flesh'
    is a transparent, fairly literal rendering, with the cultic sense preserved.
- source_word: יַעַבְרוּ מֵעָלַיִךְ
  chosen: remove your evil from you
  alternatives:
  - pass away from you
  - pass over you
  lexicon: HALOT
  rationale: The verb עבר normally means 'pass over/by,' but in this context with
    sacrificial meat the sense is whether ritual participation can cause guilt/evil
    to depart. The object 'your evil' is supplied from the following clause to make
    the difficult Hebrew intelligible in English.
- source_word: כִּי רָעָתֵכִי
  chosen: your evil
  alternatives:
  - your wickedness
  - your calamity
  lexicon: HALOT
  rationale: רָעָה here is moral evil/wickedness rather than merely disaster, since
    the verse concerns Judah's guilt and false reliance on ritual.
- source_word: אָז
  chosen: Then
  alternatives:
  - at that time
  lexicon: HALOT
  rationale: אָז marks the resulting or climactic moment in the accusation; 'Then'
    is concise and natural.
- source_word: תַּעֲלֹזִי
  chosen: you rejoice
  alternatives:
  - you exult
  - you celebrate
  lexicon: HALOT
  rationale: The verb denotes exultant rejoicing. 'You rejoice' is readable modern
    English; the exclamatory punctuation helps preserve the biting irony.
