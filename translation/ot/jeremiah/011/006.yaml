id: JER.11.6
reference: Jeremiah 11:6
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֵלַ֔/י קְרָ֨א אֶת כָּל הַ/דְּבָרִ֤ים הָ/אֵ֨לֶּה֙ בְּ/עָרֵ֣י
    יְהוּדָ֔ה וּ/בְ/חֻצ֥וֹת יְרוּשָׁלִַ֖ם לֵ/אמֹ֑ר שִׁמְע֗וּ אֶת דִּבְרֵי֙ הַ/בְּרִ֣ית
    הַ/זֹּ֔את וַ/עֲשִׂיתֶ֖ם אוֹתָֽ/ם־־־׃
translation:
  text: 'And the LORD said to me, “Proclaim all these words in the cities of Judah
    and in the streets of Jerusalem, saying: Hear the words of this covenant and do
    them.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the squares of Jerusalem'; the Hebrew refers to public open places
      within the city.
    reason: lexical_alternative
  - marker: b
    text: '''Hear'' could also be rendered ''listen to.'' Some translations interpret
      it as ''obey,'' but the next clause already states the call to action explicitly:
      ''and do them.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of the divine name YHWH as
    'the LORD,' following Jewish reverence tradition and the LXX pattern.
- source_word: קְרָא
  chosen: Proclaim
  alternatives:
  - Call out
  - Cry out
  - Announce
  lexicon: HALOT
  rationale: The imperative of קרא here directs Jeremiah to publicly declare the message.
    'Proclaim' captures the formal public-speaking force better than the more literal
    but less idiomatic 'call out.'
- source_word: כָּל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  - all these matters
  lexicon: HALOT
  rationale: דברים commonly means 'words' in prophetic speech contexts, and the following
    direct quotation supports a verbal/message sense rather than a broader 'matters'
    sense.
- source_word: בְּעָרֵי יְהוּדָה
  chosen: in the cities of Judah
  alternatives:
  - throughout the towns of Judah
  lexicon: HALOT
  rationale: A straightforward locative rendering preserves the Hebrew phrasing and
    geographic specificity.
- source_word: וּבְחֻצוֹת יְרוּשָׁלִַם
  chosen: and in the streets of Jerusalem
  alternatives:
  - and in the squares of Jerusalem
  - and in the open places of Jerusalem
  lexicon: HALOT
  rationale: חֻצוֹת refers to public outdoor urban spaces. 'Streets' is natural modern
    English and fits the public proclamation setting, though 'squares' is also possible.
- source_word: לֵאמֹר
  chosen: 'saying:'
  alternatives:
  - to say,
  lexicon: HALOT
  rationale: Standard rendering introducing the content of the proclamation.
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  - Obey
  lexicon: HALOT
  rationale: The basic sense is 'hear/listen.' Although שמע can imply obedient hearing,
    the following clause 'and do them' separately expresses obedience, so 'Hear' best
    preserves the two-step structure.
- source_word: דִּבְרֵי הַבְּרִית הַזֹּאת
  chosen: the words of this covenant
  alternatives:
  - the terms of this covenant
  - the words of the covenant, this one
  lexicon: HALOT
  rationale: A formal rendering preserves both the lexical link to 'words' earlier
    in the verse and the covenantal framing. 'Terms' is interpretive and therefore
    not preferred in the main text.
- source_word: וַעֲשִׂיתֶם אוֹתָם
  chosen: and do them
  alternatives:
  - and carry them out
  - and obey them
  lexicon: HALOT
  rationale: עשה with the object referring back to covenant words means to put them
    into practice. 'Do them' is slightly formal but transparent and preserves the
    concrete Hebrew expression.
