theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: This follows the project's stated default for YHWH and avoids introducing
    a denominationally loaded preference while preserving the covenantal force of
    the divine name.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether שִׁמְעוּ should be rendered as 'hear' or interpreted as 'obey'
  chosen_reading: Hear ... and do them
  alternative_readings:
  - Obey the words of this covenant
  rationale: The Hebrew text itself distinguishes hearing from doing. Rendering שמע
    here as 'obey' would collapse that rhetorical and theological sequence and import
    obedience into the first verb when the second verb already states it explicitly.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
