id: JER.22.12
reference: Jeremiah 22:12
source:
  edition: WLC
  text: כִּ֗י בִּ/מְק֛וֹם אֲשֶׁר הִגְל֥וּ אֹת֖/וֹ שָׁ֣ם יָמ֑וּת וְ/אֶת הָ/אָ֥רֶץ הַ/זֹּ֖את
    לֹֽא יִרְאֶ֥ה עֽוֹד־־־׃ס
translation:
  text: For in the place where they have exiled him, there he will die, and he will
    never see this land again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they have carried him away' / 'they have led him into exile.' The Hebrew
      verb specifically denotes causing someone to go into exile.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding command not to weep for the departed
    king but for the one going away. 'For' fits the explanatory force in context better
    than the more ambiguous 'indeed.'
- source_word: בִּמְקוֹם אֲשֶׁר
  chosen: in the place where
  alternatives:
  - to the place where
  - in the place to which
  lexicon: HALOT
  rationale: A straightforward locative construction. 'In the place where' preserves
    the Hebrew syntax naturally in English.
- source_word: הִגְלוּ אֹתוֹ
  chosen: they have exiled him
  alternatives:
  - they carried him away
  - they led him into exile
  - he was taken captive
  lexicon: HALOT
  rationale: The Hiphil of גלה commonly denotes causing someone to go into exile.
    'Exiled' best captures the political-forced-removal sense in this royal context.
    The plural subject is left indefinite as in Hebrew ('they').
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: 'Retained for emphasis, matching the Hebrew repetition of location: the
    very place of exile is where death will occur.'
- source_word: יָמוּת
  chosen: he will die
  alternatives:
  - he shall die
  lexicon: HALOT
  rationale: Simple future rendering of the imperfect. 'Will die' is clear modern
    English without unnecessary archaism.
- source_word: וְאֶת־הָאָרֶץ הַזֹּאת
  chosen: and ... this land
  alternatives:
  - and ... this הארץ/country
  - and ... this הארץ
  lexicon: HALOT
  rationale: אָרֶץ here refers specifically to the land of Judah/Jerusalem's homeland,
    not merely generic 'earth.' 'Land' is the most contextually accurate and idiomatic
    rendering.
- source_word: לֹא יִרְאֶה עוֹד
  chosen: he will never see ... again
  alternatives:
  - he will not see ... anymore
  - he will no longer see
  lexicon: HALOT
  rationale: Combines the negation with עוֹד idiomatically in English. 'Never ...
    again' conveys the finality of permanent exile more naturally than a wooden 'not
    ... anymore.'
