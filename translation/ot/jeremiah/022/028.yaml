id: JER.22.28
reference: Jeremiah 22:28
source:
  edition: WLC
  text: הַ/עֶ֨צֶב נִבְזֶ֜ה נָפ֗וּץ הָ/אִ֤ישׁ הַ/זֶּה֙ כָּנְיָ֔הוּ אִ֨ם כְּלִ֔י אֵ֥ין
    חֵ֖פֶץ בּ֑/וֹ מַדּ֤וּעַ הֽוּטֲלוּ֙ ה֣וּא וְ/זַרְע֔/וֹ וְ/הֻ֨שְׁלְכ֔וּ עַל הָ/אָ֖רֶץ
    אֲשֶׁ֥ר לֹא יָדָֽעוּ־־־׃
translation:
  text: Is this man Coniah a despised, shattered pot, or a vessel in which there is
    no delight? Why have he and his offspring been hurled out and cast into a land
    that they did not know?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a despised, shattered idol/image.' The Hebrew עֶצֶב can denote a fashioned
      object, including an idol or image; the main text renders it as 'pot' because
      the parallel with 'vessel' favors pottery imagery here.
    reason: lexical_alternative
  - marker: b
    text: Coniah is the shortened Hebrew form of the king also known as Jeconiah (cf.
      Jer 24:1; 27:20).
    reason: cross_reference
lexical_decisions:
- source_word: הָעֶצֶב
  chosen: pot
  alternatives:
  - idol
  - image
  - vessel
  lexicon: HALOT
  rationale: The noun can denote an object fashioned by human hands, including an
    idol or image, but in this context the following comparison with כְּלִי ('vessel')
    and the adjectives 'despised' and 'shattered' favor an earthenware object/pottery
    image. 'Pot' gives a concrete, intelligible image in English while preserving
    the metaphor of something discarded and broken.
- source_word: נִבְזֶה
  chosen: despised
  alternatives:
  - contemptible
  - scorned
  lexicon: HALOT
  rationale: '''Despised'' preserves the passive sense and the social shame attached
    to Coniah''s rejection.'
- source_word: נָפוּץ
  chosen: shattered
  alternatives:
  - broken
  - smashed
  - scattered
  lexicon: HALOT
  rationale: In parallel with the pottery/vessel imagery, 'shattered' best conveys
    an object broken apart. 'Scattered' is possible more generally, but here the material
    metaphor points to breakage.
- source_word: הָאִישׁ הַזֶּה
  chosen: this man
  alternatives:
  - this האיש/person
  lexicon: HALOT
  rationale: A straightforward rendering of the demonstrative phrase; 'man' is gender-accurate
    and fits the specific male referent, Coniah.
- source_word: כָּנְיָהוּ
  chosen: Coniah
  alternatives:
  - Jeconiah
  rationale: The Hebrew form here is Coniah, a shortened form of the king's name.
    Transliteration should reflect the form actually present in this verse.
- source_word: אִם
  chosen: or
  alternatives:
  - if
  - whether
  lexicon: HALOT
  rationale: 'In this rhetorical question, אִם introduces an alternative comparison:
    ''Is this man ... or ... ?'' This reads naturally in English and matches the interrogative
    force.'
- source_word: כְּלִי אֵין חֵפֶץ בּוֹ
  chosen: a vessel in which there is no delight
  alternatives:
  - an unwanted vessel
  - a vessel no one wants
  - a vessel in which there is no pleasure
  lexicon: HALOT
  rationale: This phrase describes an object in which no pleasure/desire is taken.
    The chosen rendering stays close to the Hebrew while remaining readable. It avoids
    over-paraphrasing to 'worthless vessel,' which adds evaluative force not explicit
    in חֵפֶץ.
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Standard interrogative adverb.
- source_word: הוּטֲלוּ
  chosen: have been hurled out
  alternatives:
  - have been thrown down
  - have been cast out
  lexicon: HALOT
  rationale: The Hophal passive conveys forcible throwing. 'Hurled out' captures the
    violence and expulsion.
- source_word: הוּא וְזַרְעוֹ
  chosen: he and his offspring
  alternatives:
  - he and his seed
  - he and his descendants
  lexicon: HALOT
  rationale: זֶרַע often means 'seed,' but 'offspring' is natural modern English and
    preserves the familial line in view.
- source_word: וְהֻשְׁלְכוּ
  chosen: and cast
  alternatives:
  - and thrown
  - and flung
  lexicon: HALOT
  rationale: A second passive verb reinforces the expulsion. 'Cast' is concise and
    idiomatic alongside 'hurled out.'
- source_word: עַל הָאָרֶץ
  chosen: into a land
  alternatives:
  - onto the land
  - upon the earth
  lexicon: HALOT
  rationale: Although עַל commonly means 'upon/on,' with the passive of throwing and
    the following relative clause it idiomatically points to banishment to a land.
    'Into a land' communicates the destination naturally in English.
- source_word: אֲשֶׁר לֹא יָדָעוּ
  chosen: that they did not know
  alternatives:
  - which they had not known
  - that they were unfamiliar with
  lexicon: HALOT
  rationale: The plural verb matches 'he and his offspring.' 'Did not know' preserves
    the Hebrew idiom for unfamiliarity with a foreign land.
