id: JER.22.1
reference: Jeremiah 22:1
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה רֵ֖ד בֵּֽית מֶ֣לֶךְ יְהוּדָ֑ה וְ/דִבַּרְתָּ֣ שָׁ֔ם אֶת
    הַ/דָּבָ֖ר הַ/זֶּֽה־־׃
translation:
  text: 'Thus says the LORD: Go down to the house of the king of Judah, and speak
    there this word,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This is what the LORD says.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the house of the king of Judah'; this likely refers to the royal
      palace.
    reason: cultural_note
  - marker: c
    text: Or 'this message.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Introduces a prophetic messenger formula. 'Thus' preserves the formal
    prophetic cadence without becoming archaic in context.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - said the LORD
  lexicon: HALOT
  rationale: The Hebrew prophetic formula is conventionally rendered with the English
    present 'says' even though the verb form is perfect, because it functions as an
    immediate speech introduction. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal force while aligning with established reverential convention.
- source_word: רֵד
  chosen: Go down
  alternatives:
  - Descend
  lexicon: HALOT
  rationale: Imperative of ירד. 'Go down' is natural modern English and preserves
    the directional sense, likely from the temple/prophet's location to the royal
    palace.
- source_word: בֵּית מֶלֶךְ יְהוּדָה
  chosen: to the house of the king of Judah
  alternatives:
  - to the palace of the king of Judah
  - to the royal house of Judah
  lexicon: HALOT
  rationale: Literally 'house of the king of Judah.' 'House' is retained rather than
    'palace' to stay close to the Hebrew; while it likely refers to the royal palace,
    the literal wording is clear and auditable.
- source_word: וְדִבַּרְתָּ שָׁם
  chosen: and speak there
  alternatives:
  - and you shall speak there
  - and proclaim there
  lexicon: HALOT
  rationale: Sequential perfect with imperative force in context. 'Speak there' best
    reflects the straightforward command without adding the stronger nuance of 'proclaim.'
- source_word: אֶת־הַדָּבָר הַזֶּה
  chosen: this word
  alternatives:
  - this message
  - these words
  lexicon: HALOT
  rationale: דבר here refers to the specific prophetic utterance to follow. 'This
    word' preserves the singular and the common prophetic idiom; 'message' is possible
    but slightly more interpretive.
