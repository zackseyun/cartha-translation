id: JER.22.8
reference: Jeremiah 22:8
source:
  edition: WLC
  text: וְ/עָֽבְרוּ֙ גּוֹיִ֣ם רַבִּ֔ים עַ֖ל הָ/עִ֣יר הַ/זֹּ֑את וְ/אָֽמְרוּ֙ אִ֣ישׁ אֶל רֵעֵ֔/הוּ עַל מֶ֨ה עָשָׂ֤ה יְהוָה֙ כָּ֔כָה לָ/עִ֥יר הַ/גְּדוֹלָ֖ה הַ/זֹּֽאת־־׃
translation:
  text: And many nations will pass by this city, and each man will say to his neighbor, ‘Why has Yahweh done thus to this great city?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''each man to his neighbor,'' a distributive idiom meaning individuals speaking to one another.'
    reason: lexical_alternative
  - marker: b
    text: Or 'pass by this city' / 'pass past this city.' The Hebrew preposition can suggest movement past the city rather than through it.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבְרוּ
  chosen: will pass by
  alternatives:
  - will pass through
  - passed by
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions naturally as a future in English. With עַל plus 'this city,' the sense is movement past/alongside the city rather than simple transit through it.
- source_word: גּוֹיִם רַבִּים
  chosen: many nations
  alternatives:
  - many peoples
  - many Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם commonly means 'nations' in Jeremiah, especially in international/judgment contexts. 'Many nations' preserves the political-collective sense better than 'peoples.' 'Gentiles' would import a later Jewish/Christian contrast not explicit here.
- source_word: עַל הָעִיר הַזֹּאת
  chosen: by this city
  alternatives:
  - over this city
  - past this city
  lexicon: HALOT
  rationale: The preposition עַל after עבר can indicate movement by or past a place. English 'by this city' is idiomatic and fits the image of passersby observing its condition. 'Over' would be misleading in English.
- source_word: וְאָמְרוּ
  chosen: will say
  alternatives:
  - and they will ask
  - and they will say
  lexicon: HALOT
  rationale: Simple speech verb introducing the quoted question. Future rendering matches the prophetic sequence.
- source_word: אִישׁ אֶל רֵעֵהוּ
  chosen: each man will say to his neighbor
  alternatives:
  - a man to his companion
  - one to another
  lexicon: HALOT
  rationale: This distributive idiom is best represented by 'each man ... to his neighbor.' It preserves the masculine singular אִישׁ in line with the project's gender-accurate policy while conveying reciprocal conversation.
- source_word: עַל מֶה
  chosen: Why
  alternatives:
  - For what reason
  - On account of what
  lexicon: HALOT
  rationale: Idiomatic English interrogative for causal inquiry. It captures the force of the Hebrew without wooden literalism.
- source_word: עָשָׂה יְהוָה כָּכָה
  chosen: has the LORD done thus
  alternatives:
  - has the LORD done this way
  - did the LORD do so
  lexicon: HALOT
  rationale: Retains the formal, weighty tone of כָּכָה with 'thus.' Present perfect in English works naturally in the quoted question about an observed result.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's mandated default for the divine name, preserving the covenant name through the traditional small-caps equivalent.
- source_word: לָעִיר הַגְּדוֹלָה הַזֹּאת
  chosen: to this great city
  alternatives:
  - to this large city
  - to this mighty city
  lexicon: HALOT
  rationale: גָּדוֹל here denotes prominence/significance, not merely size. 'Great city' is the most natural and established English equivalent and fits the lamenting tone.
