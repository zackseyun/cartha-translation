theological_decisions:
- issue: Rendering of צְדָקָה in the pair מִשְׁפָּט וּצְדָקָה
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: The doctrine excerpt lists 'righteousness' as the default rendering for
    δικαιοσύνη in Greek, and the same covenantal-theological concern applies here
    to Hebrew צְדָקָה. In this prophetic formula paired with מִשְׁפָּט, rendering
    צְדָקָה as 'righteousness' preserves the moral and covenantal dimension without
    collapsing it into a second synonym for justice. The alternative 'justice' is
    worth preserving because some English versions render the pair more dynamically.
  doctrine_reference: 'DOCTRINE.md: Contested terms principle on preserving theological
    tension; consistency of key terms, or documented exception.'
