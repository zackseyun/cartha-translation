id: JER.22.15
reference: Jeremiah 22:15
source:
  edition: WLC
  text: הֲ/תִֽמְלֹ֔ךְ כִּ֥י אַתָּ֖ה מְתַחֲרֶ֣ה בָ/אָ֑רֶז אָבִ֜י/ךָ הֲ/ל֧וֹא אָכַ֣ל
    וְ/שָׁתָ֗ה וְ/עָשָׂ֤ה מִשְׁפָּט֙ וּ/צְדָקָ֔ה אָ֖ז ט֥וֹב לֽ/וֹ׃
translation:
  text: Do you reign because you compete in cedar? Did not your father eat and drink
    and do justice and righteousness? Then it was well with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vie for cedar' or 'are eager about cedar.' The Hebrew expression is
      rare and likely refers to royal rivalry expressed through cedar-paneled building.
    reason: lexical_alternative
  - marker: b
    text: '''Justice and righteousness'' may also be rendered ''justice and what is
      right.'''
    reason: alternative_reading
lexical_decisions:
- source_word: הֲתִמְלֹךְ
  chosen: Do you reign
  alternatives:
  - Will you reign
  - Do you become king
  lexicon: HALOT
  rationale: Qal imperfect 2ms of מלך in an interrogative clause. In context it challenges
    the legitimacy or basis of kingship, so present English 'Do you reign' best fits
    the rhetorical force.
- source_word: כִּי
  chosen: because
  alternatives:
  - that
  - for
  lexicon: HALOT
  rationale: 'Here כִּי introduces the supposed ground for reigning: ''because you…''.
    ''Because'' makes the logic of the rebuke clear.'
- source_word: מְתַחֲרֶה
  chosen: compete
  alternatives:
  - vie
  - strive eagerly
  - are excited
  lexicon: HALOT
  rationale: The rare Hitpael/denominative form likely conveys rivalry or self-assertive
    striving. 'Compete' is concise modern English and fits the critique of royal ambition
    and display.
- source_word: בָאָרֶז
  chosen: in cedar
  alternatives:
  - with cedar
  - for cedar
  lexicon: HALOT
  rationale: The preposition ב plus 'cedar' is somewhat idiomatic in this context
    of palace-building and luxury. 'In cedar' preserves the Hebrew form and evokes
    cedar-paneled royal construction without over-paraphrasing.
- source_word: אָבִיךָ
  chosen: your father
  lexicon: HALOT
  rationale: Straightforward filial reference, likely to Josiah in context.
- source_word: הֲלוֹא
  chosen: Did not
  alternatives:
  - Was it not that
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Did not' is natural
    and preserves the argumentative force.
- source_word: אָכַל וְשָׁתָה
  chosen: eat and drink
  alternatives:
  - ate and drank
  - enjoy food and drink
  lexicon: HALOT
  rationale: 'A common idiom for ordinary royal living. Infinitive-style English after
    ''Did not your father'' reads naturally: ''eat and drink.'' It should not be moralized
    into indulgence; the point is that ordinary enjoyment coexisted with justice.'
- source_word: וְעָשָׂה מִשְׁפָּט וּצְדָקָה
  chosen: do justice and righteousness
  alternatives:
  - administer justice and righteousness
  - do justice and what is right
  lexicon: HALOT
  rationale: This is a key covenantal pair. 'Justice and righteousness' preserves
    the established semantic range and theological resonance better than flattening
    both into 'what is right.'
- source_word: אָז טוֹב לוֹ
  chosen: Then it was well with him
  alternatives:
  - Then it went well for him
  - So it was good for him
  lexicon: HALOT
  rationale: 'The adverb אָז marks result: because he practiced justice and righteousness,
    matters went well for him. ''It was well with him'' is idiomatic and preserves
    the evaluative/resultative sense.'
