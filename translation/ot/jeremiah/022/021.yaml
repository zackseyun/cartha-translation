id: JER.22.21
reference: Jeremiah 22:21
source:
  edition: WLC
  text: דִּבַּ֤רְתִּי אֵלַ֨יִ/ךְ֙ בְּ/שַׁלְוֺתַ֔יִ/ךְ אָמַ֖רְתְּ לֹ֣א אֶשְׁמָ֑ע זֶ֤ה
    דַרְכֵּ/ךְ֙ מִ/נְּעוּרַ֔יִ/ךְ כִּ֥י לֹֽא שָׁמַ֖עַתְּ בְּ/קוֹלִֽ/י־׃
translation:
  text: I spoke to you in your prosperity, but you said, ‘I will not listen.’ This
    has been your way from your youth, for you have not listened to my voice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in your ease' or 'in your security.' The Hebrew term can denote quiet
      ease, security, or prosperity.
    reason: lexical_alternative
  - marker: b
    text: '''Listen'' may also be rendered ''obey'' here and later in the verse; the
      Hebrew verb often carries both senses in covenant contexts.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבַּרְתִּי
  chosen: I spoke
  alternatives:
  - I spoke out
  - I addressed
  lexicon: HALOT
  rationale: Qal/Piel perfect 1cs of דבר here introduces YHWH's prior address to Jerusalem/Judah.
    'I spoke' is the most direct and idiomatic rendering.
- source_word: אֵלַיִךְ
  chosen: to you
  alternatives:
  - with you
  lexicon: HALOT
  rationale: Preposition אֶל with 2fs suffix normally means direction toward the addressee,
    so 'to you' fits best.
- source_word: בְּשַׁלְוֺתַיִךְ
  chosen: in your prosperity
  alternatives:
  - in your ease
  - in your security
  - in your complacency
  lexicon: HALOT
  rationale: שַׁלְוָה denotes ease, quietness, prosperity, or secure well-being. In
    Jeremiah's rebuke of royal self-assurance, 'prosperity' captures the material/security
    context while remaining natural English. Alternatives like 'ease' or 'complacency'
    are possible, but 'complacency' imports an interpretive moral nuance more strongly
    than the noun itself.
- source_word: אָמַרְתְּ
  chosen: you said
  alternatives:
  - you replied
  lexicon: HALOT
  rationale: Simple past speech verb addressed to a feminine singular entity (Jerusalem/Judah
    personified). 'You said' preserves the directness.
- source_word: לֹא אֶשְׁמָע
  chosen: I will not listen
  alternatives:
  - I will not obey
  - I will not hear
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. In direct speech
    responding to divine address, 'listen' preserves the auditory metaphor and leaves
    the obedience implication intact without over-specifying.
- source_word: זֶה דַרְכֵּךְ
  chosen: This has been your way
  alternatives:
  - This is your way
  - Such is your way
  lexicon: HALOT
  rationale: The verbless clause points to characteristic conduct. English idiom benefits
    from supplying 'has been' to express enduring pattern, especially with the following
    'from your youth.'
- source_word: מִנְּעוּרַיִךְ
  chosen: from your youth
  alternatives:
  - since your youth
  - from your early days
  lexicon: HALOT
  rationale: A standard idiom for long-standing behavior. 'From your youth' is concise
    and faithful.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי gives the reason or explanation for the preceding assessment.
    'For' fits the explanatory force in elevated but readable English.
- source_word: לֹא שָׁמַעַתְּ
  chosen: you have not listened
  alternatives:
  - you have not obeyed
  - you did not listen
  lexicon: HALOT
  rationale: Again שׁמע carries both hearing and obedience. 'Have not listened' matches
    the earlier direct speech and preserves the repeated wordplay. Present perfect
    in English conveys persistent pattern up to the present.
- source_word: בְּקוֹלִי
  chosen: to my voice
  alternatives:
  - to my sound
  - to me
  lexicon: HALOT
  rationale: The idiom שׁמע בקול means 'listen to/obey the voice of.' Rendering 'to
    my voice' preserves the Hebrew imagery and avoids flattening to merely 'obey me.'
