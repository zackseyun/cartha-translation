theological_decisions:
- issue: Personified feminine addressee
  chosen_reading: Retain second-person singular 'you' without specifying 'Jerusalem'
    or 'Judah' in the main text
  alternative_readings:
  - Explicitly identify the addressee as Jerusalem
  - Explicitly identify the addressee as Judah/royal house
  rationale: The Hebrew uses feminine singular forms, reflecting the personified city/nation
    in context. English 'you' preserves the direct address without importing an interpretive
    identification into the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
