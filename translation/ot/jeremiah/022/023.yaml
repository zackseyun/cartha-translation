id: JER.22.23
reference: Jeremiah 22:23
source:
  edition: WLC
  text: ישבתי בַּ/לְּבָנ֔וֹן מקננתי בָּֽ/אֲרָזִ֑ים מַה נֵּחַנְתְּ֙ בְּ/בֹא לָ֣/ךְ
    חֲבָלִ֔ים חִ֖יל כַּ/יֹּלֵדָֽה־־׃
translation:
  text: You who dwell in Lebanon, who nest in the cedars, how you will groan when
    pangs come upon you, pain like that of a woman giving birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'how you will be pitied when pangs come upon you.' The Hebrew verb rendered
      'you will groan' is difficult, and some take it in the sense of receiving pity
      rather than uttering groans.
    reason: lexical_alternative
  - marker: b
    text: Lebanon and the cedars likely evoke the royal palace built with cedar from
      Lebanon, portraying Judah's rulers as dwelling in lofty security.
    reason: cultural_note
lexical_decisions:
- source_word: ישבתי
  chosen: you who dwell
  alternatives:
  - inhabiting
  - sitting
  lexicon: HALOT
  rationale: Although the form is morphologically 1cs in the table, the verse context
    and the following feminine singular forms indicate an address to personified Jerusalem/Judah.
    The sense of ישב here is residence/dwelling, not literal sitting, so 'you who
    dwell' best captures the participial force in English.
- source_word: בַּלְּבָנוֹן
  chosen: in Lebanon
  alternatives:
  - on Lebanon
  lexicon: HALOT
  rationale: The phrase is locative. 'Lebanon' likely evokes the royal house built
    with Lebanon cedar and/or lofty security imagery; the straightforward locative
    should be retained in the main text.
- source_word: מקננתי
  chosen: who nest
  alternatives:
  - making your nest
  - nesting
  lexicon: HALOT
  rationale: From קנן, used metaphorically for making a nest or dwelling securely.
    'Who nest' preserves the vivid metaphor and matches the feminine singular addressee.
- source_word: בארזים
  chosen: in the cedars
  alternatives:
  - among the cedars
  - in cedarwood
  lexicon: HALOT
  rationale: The plural 'cedars' is retained. It may refer either to literal cedar
    structures or metaphorical lofty dwelling; 'in the cedars' preserves the image
    without over-interpreting.
- source_word: מַה
  chosen: how
  alternatives:
  - what
  - how greatly
  lexicon: HALOT
  rationale: In exclamatory usage before the following verb, מַה is best rendered
    'how,' introducing an exclamation rather than a question.
- source_word: נֵּחַנְתְּ
  chosen: you will groan
  alternatives:
  - you will sigh
  - you will be pitied
  lexicon: HALOT
  rationale: The verb is difficult and has been understood in more than one way. In
    context with labor pains immediately following, a sense like 'groan' or 'moan'
    fits best. This avoids the less likely passive sense 'be pitied' in this context.
- source_word: בְּבֹא לָךְ
  chosen: when ... come upon you
  alternatives:
  - when there come to you
  - at the coming to you of
  lexicon: HALOT
  rationale: This infinitive construct with preposition marks temporal circumstance.
    'When ... come upon you' is idiomatic English and preserves the onset of suffering.
- source_word: חֲבָלִים
  chosen: pangs
  alternatives:
  - birth pains
  - cords
  - writhings
  lexicon: HALOT
  rationale: In this context, especially with the childbirth simile, the noun refers
    to pangs or labor pains rather than cords. 'Pangs' keeps the metaphor concise,
    while the following clause specifies childbirth pain.
- source_word: חִיל
  chosen: pain
  alternatives:
  - anguish
  - writhing
  lexicon: HALOT
  rationale: The noun denotes trembling/writhing anguish. 'Pain' is natural in English
    here and works appositionally with 'pangs,' clarified by the childbirth comparison.
- source_word: כַּיֹּלֵדָה
  chosen: like that of a woman giving birth
  alternatives:
  - like a woman in labor
  - as a woman bearing a child
  lexicon: HALOT
  rationale: The simile explicitly compares the coming anguish to childbirth. 'A woman
    giving birth' is clear modern English and preserves the force of the image.
