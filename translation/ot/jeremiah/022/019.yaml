theological_decisions:
- issue: Nature of the comparison in the burial image
  chosen_reading: A shameful disposal comparable to that of a donkey, not an honorable
    human burial.
  alternative_readings:
  - A literal statement only about manner of burial without emphasis on disgrace
  rationale: The lexical sequence 'burial of a donkey,' followed by 'dragged away
    and thrown beyond the gates,' strongly signals dishonor and exclusion from proper
    burial rites. This is a contextual interpretive decision, not a doctrinally contested
    term.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing extra doctrinal claims.'
