id: JER.22.19
reference: Jeremiah 22:19
source:
  edition: WLC
  text: קְבוּרַ֥ת חֲמ֖וֹר יִקָּבֵ֑ר סָח֣וֹב וְ/הַשְׁלֵ֔ךְ מֵ/הָ֖לְאָה לְ/שַׁעֲרֵ֥י
    יְרוּשָׁלִָֽם׃ס
translation:
  text: He will be buried with the burial of a donkey—dragged away and thrown beyond
    the gates of Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'He will be buried with a donkey's burial' or 'with a burial like that
      of a donkey.'
    reason: lexical_alternative
  - marker: b
    text: The imagery conveys a disgraceful disposal of the body outside the city
      rather than an honorable burial.
    reason: cultural_note
lexical_decisions:
- source_word: קְבוּרַת
  chosen: the burial of
  alternatives:
  - a burial like that of
  lexicon: HALOT
  rationale: 'Construct form of ''burial'' introducing a comparison: ''the burial
    of a donkey.'' English keeps the construct sense naturally with ''the burial of.'''
- source_word: חֲמוֹר
  chosen: donkey
  alternatives:
  - ass
  lexicon: HALOT
  rationale: '''Donkey'' is the clear modern English equivalent; ''ass'' is archaic
    or potentially distracting in contemporary English.'
- source_word: יִקָּבֵר
  chosen: he will be buried
  alternatives:
  - he shall be buried
  lexicon: HALOT
  rationale: Nifal imperfect of קבר, passive/reflexive sense. Future passive is the
    most natural rendering in context.
- source_word: סָחוֹב
  chosen: dragged away
  alternatives:
  - dragged
  - being dragged away
  lexicon: HALOT
  rationale: Infinitive absolute functioning adverbially/intensively with the following
    verb sequence, depicting disgraceful treatment of the corpse. 'Dragged away' captures
    the motion and indignity.
- source_word: וְהַשְׁלֵךְ
  chosen: and thrown
  alternatives:
  - and cast out
  - and flung
  lexicon: HALOT
  rationale: Hifil infinitive/verb from שלך, 'throw/cast.' 'Thrown' is idiomatic with
    the preceding passive idea and preserves the violent disposal imagery.
- source_word: מֵהָלְאָה
  chosen: beyond
  alternatives:
  - far from
  - outside
  lexicon: HALOT
  rationale: Adverbial expression meaning 'further on, beyond, away from there.' With
    the following phrase it indicates disposal outside/beyond the city gates.
- source_word: לְשַׁעֲרֵי
  chosen: the gates of
  alternatives:
  - the city gates of
  - the gates to
  lexicon: HALOT
  rationale: With the preceding מֵהָלְאָה, the sense is spatial relative to the gates.
    'Beyond the gates of' is the most natural English expression.
- source_word: יְרוּשָׁלִָם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
