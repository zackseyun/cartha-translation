id: JER.22.25
reference: Jeremiah 22:25
source:
  edition: WLC
  text: וּ/נְתַתִּ֗י/ךָ בְּ/יַד֙ מְבַקְשֵׁ֣י נַפְשֶׁ֔/ךָ וּ/בְ/יַ֛ד אֲשֶׁר אַתָּ֥ה
    יָג֖וֹר מִ/פְּנֵי/הֶ֑ם וּ/בְ/יַ֛ד נְבוּכַדְרֶאצַּ֥ר מֶֽלֶךְ בָּבֶ֖ל וּ/בְ/יַ֥ד
    הַ/כַּשְׂדִּֽים־־׃
translation:
  text: And I will give you into the hand of those who seek your life, into the hand
    of those before whom you are afraid, into the hand of Nebuchadnezzar king of Babylon,
    and into the hand of the Chaldeans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Nebuchadrezzar,' reflecting the Hebrew form of the name more closely.
    reason: lexical_alternative
  - marker: b
    text: '''The Chaldeans'' may also be rendered ''the Babylonians'' in context,
      since the term can refer to Babylonian forces more broadly.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתַתִּיךָ
  chosen: And I will give you
  alternatives:
  - And I will deliver you
  - And I will hand you over
  lexicon: HALOT
  rationale: נתן with a personal object and the following phrase 'into the hand of'
    is a standard idiom for handing someone over to another's power. 'Give you' preserves
    the Hebrew wording while remaining natural in English.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - over to
  lexicon: HALOT
  rationale: The repeated idiom בְּיַד marks transfer into another's control. 'Into
    the hand of' keeps the concrete Hebrew image and the rhetorical repetition of
    the verse.
- source_word: מְבַקְשֵׁי נַפְשֶׁךָ
  chosen: those who seek your life
  alternatives:
  - those who seek your soul
  - those who want to kill you
  lexicon: HALOT
  rationale: נפש in this hostile context refers to life rather than the immaterial
    soul. 'Seek your life' is a clear and idiomatic English equivalent that preserves
    the Hebrew expression.
- source_word: אֲשֶׁר אַתָּה יָגוֹר מִפְּנֵיהֶם
  chosen: those before whom you are afraid
  alternatives:
  - those whom you dread
  - those you fear
  lexicon: HALOT
  rationale: יגור here conveys fear or dread. 'Before whom you are afraid' closely
    reflects the Hebrew construction with מִפְּנֵי while remaining understandable.
    The relative sense is carried by supplying 'those' in English.
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  lexicon: HALOT
  rationale: A standard English transliteration is used for readability, even though
    the Hebrew spelling here more closely reflects 'Nebuchadrezzar.' Personal names
    are transliterated by standard conventions.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  lexicon: HALOT
  rationale: A straightforward construct chain; translated formally and naturally.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: כשדים can denote the Chaldeans ethnically or the Babylonian imperial
    forces more broadly. 'The Chaldeans' preserves the source term more directly;
    'Babylonians' is a contextual alternative worth noting.
