id: JER.22.18
reference: Jeremiah 22:18
source:
  edition: WLC
  text: לָ/כֵ֞ן כֹּֽה אָמַ֣ר יְהוָ֗ה אֶל יְהוֹיָקִ֤ים בֶּן יֹאשִׁיָּ֨הוּ֙ מֶ֣לֶךְ
    יְהוּדָ֔ה לֹא יִסְפְּד֣וּ ל֔/וֹ ה֥וֹי אָחִ֖/י וְ/ה֣וֹי אָח֑וֹת לֹא יִסְפְּד֣וּ
    ל֔/וֹ ה֥וֹי אָד֖וֹן וְ/ה֥וֹי הֹדֹֽ/ה־־־־־׃
translation:
  text: 'Therefore thus says the LORD concerning Jehoiakim son of Josiah, king of
    Judah: They will not lament for him, saying, “Alas, my brother!” or “Alas, sister!”
    They will not lament for him, saying, “Alas, master!” or “Alas, his majesty!”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “They will not mourn for him.” The Hebrew verb refers especially to formal
      funeral lamentation.
    reason: lexical_alternative
  - marker: b
    text: “Alas, sister!” The Hebrew lacks the explicit “my” found in “my brother,”
      though some English renderings supply it for parallelism.
    reason: lexical_alternative
  - marker: c
    text: Or “Alas, lord!” for “Alas, master!” The Hebrew title can denote a superior,
      owner, or ruler.
    reason: lexical_alternative
  - marker: d
    text: Or “Alas, his splendor!” The Hebrew expression refers to royal majesty or
      splendor.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding oracle; 'Therefore'
    preserves the prophetic argumentative flow.
- source_word: כֹּה אָמַר יְהוָה
  chosen: thus says the LORD
  alternatives:
  - this is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. YHWH is rendered 'the LORD' per
    doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: אֶל
  chosen: concerning
  alternatives:
  - to
  - against
  lexicon: HALOT
  rationale: In this prophetic judgment context, אֶל introduces the subject of the
    oracle rather than direct address alone; 'concerning' reads naturally in English
    and fits the sense.
- source_word: יְהוֹיָקִים בֶּן יֹאשִׁיָּהוּ מֶלֶךְ יְהוּדָה
  chosen: Jehoiakim son of Josiah, king of Judah
  alternatives:
  - Jehoiakim the son of Josiah, king of Judah
  lexicon: HALOT
  rationale: Personal names are transliterated; the royal identification is kept fully
    explicit.
- source_word: לֹא יִסְפְּדוּ לוֹ
  chosen: They will not lament for him
  alternatives:
  - They will not mourn for him
  - They will not wail for him
  lexicon: HALOT
  rationale: ספד commonly denotes formal mourning or lamentation, especially funeral
    lament. 'Lament' preserves the public funerary nuance better than the broader
    'mourn'.
- source_word: הוֹי
  chosen: Alas
  alternatives:
  - Ah
  - Woe
  lexicon: HALOT
  rationale: An interjection of lament in funeral speech. 'Alas' best fits the mourning
    context in idiomatic English.
- source_word: אָחִי
  chosen: my brother
  alternatives:
  - brother
  lexicon: HALOT
  rationale: The 1cs suffix is explicit; retaining 'my' reflects the direct cry of
    lament.
- source_word: אָחוֹת
  chosen: sister
  alternatives:
  - my sister
  lexicon: HALOT
  rationale: The Hebrew form here lacks an explicit 1cs suffix, unlike 'my brother.'
    English keeps the parallel lament naturally as 'sister.' A more symmetrical 'my
    sister' is possible by sense, but the main text follows the form more closely.
- source_word: הוֹי אָדוֹן
  chosen: Alas, master!
  alternatives:
  - Alas, lord!
  - Alas, my lord!
  lexicon: HALOT
  rationale: אָדוֹן here is a title used in lament over a superior or ruler. 'Master'
    avoids confusion with the divine title 'Lord' already used for YHWH, while preserving
    status language.
- source_word: הוֹי הֹדֹה
  chosen: Alas, his majesty!
  alternatives:
  - Alas, his splendor!
  - Alas, glory!
  lexicon: HALOT
  rationale: הוֹד denotes majesty, splendor, or glory; with the suffix it refers to
    the deceased king's royal magnificence. 'His majesty' captures the courtly lament
    idiom in natural English.
