theological_decisions:
- issue: Rendering the ethical pair צֶדֶק / מִשְׁפָּט
  chosen_reading: without righteousness ... without justice
  alternative_readings:
  - without justice ... without fairness
  - unrighteously ... unjustly
  rationale: The verse condemns exploitative royal building practices. Preserving
    two related but distinct English terms reflects the Hebrew pair rather than collapsing
    them into one concept. This is a lexical-ethical decision, not a doctrinally loaded
    one, but it preserves the prophetic moral texture.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
