id: JER.22.13
reference: Jeremiah 22:13
source:
  edition: WLC
  text: ה֣וֹי בֹּנֶ֤ה בֵית/וֹ֙ בְּֽ/לֹא צֶ֔דֶק וַ/עֲלִיּוֹתָ֖י/ו בְּ/לֹ֣א מִשְׁפָּ֑ט
    בְּ/רֵעֵ֨/הוּ֙ יַעֲבֹ֣ד חִנָּ֔ם וּ/פֹעֲל֖/וֹ לֹ֥א יִתֶּן לֽ/וֹ־־׃
translation:
  text: Woe to him who builds his house without righteousness, and his upper rooms
    without justice, who makes his neighbor work for nothing and does not give him
    his wages.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'without justice' for 'without righteousness'; the Hebrew pair צֶדֶק
      and מִשְׁפָּט are closely related and can overlap in meaning.
    reason: lexical_alternative
  - marker: b
    text: '''Upper rooms'' may also be rendered ''upper chambers'' or ''upper stories,''
      referring to the upper part of a substantial house.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'his work'; in context this means the laborer's due pay or wages.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: Introduces a prophetic denunciation or lament. 'Woe' is the standard
    concise English equivalent in judgment contexts and preserves the force of the
    oracle.
- source_word: בֹּנֶה
  chosen: builds
  alternatives:
  - is building
  - buildeth
  lexicon: HALOT
  rationale: 'Qal participle functioning substantivally/descriptively: ''the one who
    builds.'' English finite ''builds'' reads naturally after ''Woe to him who...''
    while preserving the ongoing characteristic action.'
- source_word: בֵיתוֹ
  chosen: his house
  alternatives:
  - his palace
  - his household
  lexicon: HALOT
  rationale: The base sense is 'house.' In context of royal construction this may
    imply a palace, but 'house' preserves the Hebrew wording while allowing the broader
    connotation to be inferred from context.
- source_word: בְּלֹא צֶדֶק
  chosen: without righteousness
  alternatives:
  - unrighteously
  - without justice
  lexicon: HALOT
  rationale: צֶדֶק commonly denotes righteousness/right order. Here it describes morally
    wrong construction practices. 'Without righteousness' is more textually direct
    than an adverbial paraphrase. 'Without justice' is possible, but מִשְׁפָּט in
    the next colon is better rendered 'justice' to preserve the distinction between
    the paired terms.
- source_word: וַעֲלִיּוֹתָיו
  chosen: and his upper rooms
  alternatives:
  - and his upper chambers
  - and his upper stories
  lexicon: HALOT
  rationale: Refers to upper rooms/chambers of a large house. 'Upper rooms' is clear
    modern English and preserves the architectural image without over-specifying.
- source_word: בְּלֹא מִשְׁפָּט
  chosen: without justice
  alternatives:
  - without judgment
  - unjustly
  lexicon: HALOT
  rationale: מִשְׁפָּט often means justice or legal right. In this social-ethical
    context 'without justice' best conveys the denial of what is due.
- source_word: בְּרֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his fellow
  - his companion
  lexicon: HALOT
  rationale: The term denotes another person in social relation. 'Neighbor' is the
    most established and natural English equivalent in biblical ethical contexts.
- source_word: יַעֲבֹד
  chosen: makes ... work
  alternatives:
  - uses ... as a worker
  - works ...
  lexicon: HALOT
  rationale: 'Although the verb is ''serve/work,'' the syntax with בְּרֵעֵהוּ indicates
    causative sense in English: he has his neighbor labor for him. ''Makes his neighbor
    work'' communicates the exploitation clearly.'
- source_word: חִנָּם
  chosen: for nothing
  alternatives:
  - without pay
  - gratis
  lexicon: HALOT
  rationale: Means gratuitously, for no compensation. 'For nothing' is idiomatic and
    pairs well with the following explicit mention of wages.
- source_word: וּפֹעֲלוֹ
  chosen: his wages
  alternatives:
  - his pay
  - his compensation
  - his work
  lexicon: HALOT
  rationale: Though the noun can denote work or wages, in this context with 'does
    not give him' it refers to the laborer's due payment. 'Wages' is the clearest
    contextual rendering.
- source_word: לֹא יִתֶּן לוֹ
  chosen: does not give him
  alternatives:
  - will not give him
  - does not pay him
  lexicon: HALOT
  rationale: Simple negated imperfect describing characteristic conduct. 'Does not
    give him' stays close to the Hebrew; the object 'his wages' makes the payment
    sense explicit.
