theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD.' This verse does not require
    deviation from that policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Name form for כָּנְיָהוּ
  chosen_reading: Coniah
  alternative_readings:
  - Jeconiah
  rationale: The translation preserves the Hebrew form actually present in this verse
    rather than substituting a more familiar canonical name form. This also fits the
    rhetorical sharpness of Jeremiah's shortened naming in context.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §2: Translate titles; transliterate
    names'
