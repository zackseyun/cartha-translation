id: JER.22.24
reference: Jeremiah 22:24
source:
  edition: WLC
  text: חַי אָנִי֮ נְאֻם יְהוָה֒ כִּ֣י אִם יִהְיֶ֞ה כָּנְיָ֤הוּ בֶן יְהֽוֹיָקִים֙
    מֶ֣לֶךְ יְהוּדָ֔ה חוֹתָ֖ם עַל יַ֣ד יְמִינִ֑/י כִּ֥י מִ/שָּׁ֖ם אֶתְּקֶֽ/נְךָּ־־־־־׃
translation:
  text: As I live, declares the LORD, even if Coniah son of Jehoiakim, king of Judah,
    were a signet ring on my right hand, even from there I would tear you off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Coniah; elsewhere the king is also called Jeconiah.
    reason: alternative_reading
  - marker: b
    text: Or 'seal' or 'signet.' The image is of a royal seal worn on the hand as
      a symbol of authority and preciousness.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַי אָנִי
  chosen: As I live
  alternatives:
  - By my life
  - I live
  lexicon: HALOT
  rationale: Idiomatic oath formula introducing a solemn divine declaration. 'As I
    live' is natural modern English and preserves the force of the self-oath.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is readable and suitably
    weighty. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal usage and established reverential convention.
- source_word: כִּי אִם
  chosen: even if
  alternatives:
  - surely if
  - though
  lexicon: HALOT
  rationale: 'Here the particle pair introduces a strong concessive hypothetical:
    even granting the stated condition, the following judgment still stands.'
- source_word: כָּנְיָהוּ
  chosen: Coniah
  alternatives:
  - Coniahu
  - Jeconiah
  lexicon: HALOT
  rationale: The Hebrew form in this verse is כָּנְיָהוּ, conventionally represented
    as 'Coniah.' This preserves the specific form used here rather than harmonizing
    to the fuller name Jeconiah found elsewhere.
- source_word: חוֹתָם
  chosen: signet ring
  alternatives:
  - seal
  - signet
  lexicon: HALOT
  rationale: Refers to a seal used as a mark of authority, commonly worn on the hand.
    'Signet ring' communicates both the object and its symbolic royal significance
    more clearly than bare 'seal'.
- source_word: עַל יַד יְמִינִי
  chosen: on my right hand
  alternatives:
  - on the hand of my right hand
  - upon my right hand
  lexicon: HALOT
  rationale: Natural English rendering of the idiom, preserving the image of closeness,
    honor, and authority.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - from there indeed
  - even from there
  lexicon: HALOT
  rationale: Locative adverb referring back to the hypothetical position on the right
    hand. In English the emphasis is best carried with the larger clause 'even from
    there.'
- source_word: אֶתְּקֶנְךָּ
  chosen: I would tear you off
  alternatives:
  - I would pull you off
  - I would pluck you off
  lexicon: HALOT
  rationale: From נתק, 'to pull away, tear away.' 'Tear you off' best conveys the
    forceful removal implied by the judgment image.
