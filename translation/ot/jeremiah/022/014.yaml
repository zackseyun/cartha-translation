id: JER.22.14
reference: Jeremiah 22:14
source:
  edition: WLC
  text: הָ/אֹמֵ֗ר אֶבְנֶה לִּ/י֙ בֵּ֣ית מִדּ֔וֹת וַ/עֲלִיּ֖וֹת מְרֻוָּחִ֑ים וְ/קָ֤רַֽע
    ל/וֹ֙ חַלּוֹנָ֔/י וְ/סָפ֣וּן בָּ/אָ֔רֶז וּ/מָשׁ֖וֹחַ בַּ/שָּׁשַֽׁר־׃
translation:
  text: who says, ‘I will build myself a spacious house with roomy upper chambers,’
    and cuts out windows for it, paneling it with cedar and painting it bright red.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “painting it with vermilion” (possibly cinnabar), referring to a costly
      red pigment.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֹמֵר
  chosen: who says
  alternatives:
  - the one who says
  - saying
  lexicon: HALOT
  rationale: Articular participle functioning substantivally and continuing the woe-oracle
    description from the previous verse; 'who says' is natural English and preserves
    the ongoing characterization.
- source_word: אֶבְנֶה לִּי
  chosen: I will build myself
  alternatives:
  - I will build for myself
  - I will build me
  lexicon: HALOT
  rationale: The lamed with 1cs pronoun marks personal benefit; 'build myself' conveys
    self-serving intent idiomatically.
- source_word: בֵּית מִדּוֹת
  chosen: a spacious house
  alternatives:
  - a large house
  - a house of measures
  - a mansion
  lexicon: HALOT
  rationale: The phrase denotes impressive dimensions rather than literal 'measurements.'
    'Spacious house' captures the sense without over-paraphrasing into 'mansion.'
- source_word: וַעֲלִיּוֹת מְרֻוָּחִים
  chosen: with roomy upper chambers
  alternatives:
  - and spacious upper rooms
  - and airy upper chambers
  lexicon: HALOT
  rationale: עֲלִיּוֹת refers to upper rooms/chambers; מְרֻוָּחִים conveys spaciousness
    or airiness. 'Roomy upper chambers' is clear modern English and fits the luxury
    context.
- source_word: וְקָרַע לוֹ חַלּוֹנָי
  chosen: and cuts out windows for it
  alternatives:
  - and tears out windows for himself
  - and opens windows for it
  lexicon: HALOT
  rationale: קָרַע literally 'tear/split open' is used here for making/opening window
    spaces. The suffix likely refers to the house; 'cuts out windows for it' preserves
    the vivid building image in idiomatic English.
- source_word: וְסָפוּן בָּאָרֶז
  chosen: paneling it with cedar
  alternatives:
  - ceiled with cedar
  - covered with cedar
  - lined with cedar
  lexicon: HALOT
  rationale: סָפוּן denotes being covered or paneled; in architectural context 'paneling
    it with cedar' is more transparent to modern readers than archaic 'ceiled with
    cedar.'
- source_word: וּמָשׁוֹחַ בַּשָּׁשַׁר
  chosen: painting it bright red
  alternatives:
  - painted with vermilion
  - anointing it with red paint
  - coating it with cinnabar
  lexicon: HALOT
  rationale: שָׁשַׁר denotes a red pigment, often understood as vermilion/cinnabar.
    Because the exact ancient pigment term may be obscure to modern readers, 'bright
    red' communicates the sense in the main text, while the more specific alternative
    is preserved in a footnote.
