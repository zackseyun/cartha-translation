id: JER.22.4
reference: Jeremiah 22:4
source:
  edition: WLC
  text: כִּ֤י אִם עָשׂוֹ֙ תַּֽעֲשׂ֔וּ אֶת הַ/דָּבָ֖ר הַ/זֶּ֑ה וּ/בָ֣אוּ בְ/שַׁעֲרֵ֣י
    הַ/בַּ֣יִת הַ/זֶּ֡ה מְלָכִים֩ יֹשְׁבִ֨ים לְ/דָוִ֜ד עַל כִּסְא֗/וֹ רֹֽכְבִים֙ בָּ/רֶ֣כֶב
    וּ/בַ/סּוּסִ֔ים ה֥וּא ו/עבד/ו וְ/עַמּֽ/וֹ־־־׃
translation:
  text: For if you truly do this thing, then kings sitting on David’s throne will
    enter through the gates of this house, riding in chariots and on horses—they,
    their servants, and their people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this matter' or 'this word.' The Hebrew דָּבָר can refer to a word,
      matter, or thing.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'he, his servants, and his people,' with singular pronouns used distributively
      after 'kings.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: For if
  alternatives:
  - For only if
  - Indeed if
  lexicon: HALOT
  rationale: Introduces a conditional assurance tied to the preceding command. 'For
    if' preserves the logical connection and conditional force without overcomplicating
    the idiom.
- source_word: עָשׂוֹ תַּעֲשׂוּ
  chosen: you truly do
  alternatives:
  - you indeed do
  - you surely do
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. 'Truly
    do' conveys emphasis in natural English while preserving the Hebrew strengthening.
- source_word: הַדָּבָר הַזֶּה
  chosen: this thing
  alternatives:
  - this word
  - this matter
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' Here it refers back to
    the commanded course of action, so 'this thing' is idiomatic and broad enough
    to include the required conduct.
- source_word: וּבָאוּ
  chosen: will enter
  alternatives:
  - will come
  - shall come in
  lexicon: HALOT
  rationale: In context with 'through the gates of this house,' the verb denotes entering
    the palace precincts. 'Will enter' makes the motion explicit in English.
- source_word: בְּשַׁעֲרֵי הַבַּיִת הַזֶּה
  chosen: through the gates of this house
  alternatives:
  - into the gates of this house
  - through the gates of this palace
  lexicon: HALOT
  rationale: '''This house'' most directly reflects the Hebrew and likely refers to
    the royal house/palace in context. ''Through the gates'' is the natural English
    expression for movement via gates.'
- source_word: מְלָכִים יֹשְׁבִים לְדָוִד עַל כִּסְאוֹ
  chosen: kings sitting on David’s throne
  alternatives:
  - kings who sit for David on his throne
  - kings seated on the throne of David
  lexicon: HALOT
  rationale: This idiom refers to Davidic successors reigning on the royal throne.
    'David’s throne' is the clearest English rendering of the dynastic expression.
- source_word: רֹכְבִים בָּרֶכֶב וּבַסּוּסִים
  chosen: riding in chariots and on horses
  alternatives:
  - riding in the chariot and on the horses
  - mounted in chariots and on horses
  lexicon: HALOT
  rationale: The participle describes royal procession. English idiom prefers 'in
    chariots and on horses'; the singular 'chariot' in Hebrew is collective/generic
    here.
- source_word: הוּא וַעֲבָדָיו וְעַמּוֹ
  chosen: they, their servants, and their people
  alternatives:
  - he, his servants, and his people
  lexicon: HALOT
  rationale: Although הוּא is singular, it follows the plural 'kings' distributively,
    referring to each king with his attendants and people. English smooths the number
    agreement with 'they, their servants, and their people' while preserving the distributive
    sense.
