theological_decisions:
- issue: Dynastic promise language in 'kings sitting on David’s throne'
  chosen_reading: Render as a promise of continuing Davidic succession without importing
    later messianic interpretation into the verse itself.
  alternative_readings:
  - Render with more explicit dynastic wording such as 'kings from David’s line'
  - Read as directly messianic
  rationale: The immediate context concerns the continuation of the Davidic monarchy
    conditioned on covenantal obedience. The translation preserves that historical-dynastic
    sense and does not force a direct messianic reading not explicit in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
