id: JER.22.5
reference: Jeremiah 22:5
source:
  edition: WLC
  text: וְ/אִם֙ לֹ֣א תִשְׁמְע֔וּ אֶת הַ/דְּבָרִ֖ים הָ/אֵ֑לֶּה בִּ֤/י נִשְׁבַּ֨עְתִּי֙
    נְאֻם יְהוָ֔ה כִּי לְ/חָרְבָּ֥ה יִֽהְיֶ֖ה הַ/בַּ֥יִת הַ/זֶּֽה־־־׃ס
translation:
  text: But if you do not listen to these words, I swear by myself, declares the LORD,
    that this house will become a ruin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this palace'; in context 'this house' likely refers to the royal house/palace
      of the king of Judah.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the preceding promises/warnings.
    'But if' captures the adversative force in context better than a bare 'if,' while
    remaining natural English.
- source_word: תִשְׁמְעוּ
  chosen: you do not listen
  alternatives:
  - you do not hear
  - you do not obey
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. Here the object
    is 'these words,' and the warning concerns heeding prophetic instruction. 'Listen'
    preserves the auditory sense while implying responsive attention without over-interpreting
    as explicit obedience.
- source_word: הַדְּבָרִים הָאֵלֶּה
  chosen: these words
  alternatives:
  - these things
  - these matters
  lexicon: HALOT
  rationale: A straightforward rendering of the demonstrative phrase; 'words' best
    matches the prophetic speech context.
- source_word: בִּי
  chosen: by myself
  alternatives:
  - by me
  lexicon: HALOT
  rationale: In oath formulae, the preposition with first-person suffix idiomatically
    means 'by myself.' This is the natural English equivalent and preserves the solemn
    self-imprecation of the divine oath.
- source_word: נִשְׁבַּעְתִּי
  chosen: I swear
  alternatives:
  - I have sworn
  - I swear an oath
  lexicon: HALOT
  rationale: The perfect can be rendered present in direct divine speech as a performative
    oath. 'I swear' is idiomatic and forceful in English; 'I have sworn' is possible
    but sounds less immediate.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is clear, contemporary,
    and preserves the formal prophetic register.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: לְחָרְבָּה
  chosen: a ruin
  alternatives:
  - desolation
  - waste
  lexicon: HALOT
  rationale: The noun denotes devastation/desolation. 'A ruin' is natural with 'become'
    in English and communicates the result clearly. 'Desolation' is possible but less
    idiomatic here.
- source_word: יִהְיֶה הַבַּיִת הַזֶּה
  chosen: this house will become
  alternatives:
  - this house will be
  - this house shall become
  lexicon: HALOT
  rationale: Although the Hebrew verb is simply 'will be,' English commonly uses 'become'
    with result nouns like 'a ruin.' 'House' likely refers specifically to the royal
    palace in context, but the Hebrew says 'house,' so the translation retains that
    term.
