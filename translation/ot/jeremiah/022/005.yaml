theological_decisions:
- issue: Rendering the divine oath formula
  chosen_reading: I swear by myself
  alternative_readings:
  - I have sworn by myself
  rationale: The Hebrew perfect in divine oath speech can function performatively.
    Rendering it as present preserves the immediacy and solemnity of the warning without
    altering the meaning.
- issue: Referent of 'this house'
  chosen_reading: this house
  alternative_readings:
  - this palace
  rationale: In Jeremiah 22 the immediate context addresses the house of the king
    of Judah, so 'house' may denote the royal palace. However, the Hebrew text uses
    'house,' and the translation philosophy favors retaining the source term unless
    context plainly demands interpretive substitution. The contextual specificity
    can be preserved in a footnote.
