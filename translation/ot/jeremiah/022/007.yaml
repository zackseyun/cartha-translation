id: JER.22.7
reference: Jeremiah 22:7
source:
  edition: WLC
  text: וְ/קִדַּשְׁתִּ֥י עָלֶ֛י/ךָ מַשְׁחִתִ֖ים אִ֣ישׁ וְ/כֵלָ֑י/ו וְ/כָֽרְתוּ֙ מִבְחַ֣ר
    אֲרָזֶ֔י/ךָ וְ/הִפִּ֖ילוּ עַל הָ/אֵֽשׁ־׃
translation:
  text: And I will set apart destroyers against you, each with his weapons; they will
    cut down the choicest of your cedars and throw them into the fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will consecrate destroyers against you.' The Hebrew uses the verb
      often translated 'consecrate' or 'make holy,' here in the sense of setting agents
      apart for judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'each man with his tools/implements.' The Hebrew word can refer broadly
      to articles or equipment; in this context it likely means weapons or instruments
      of destruction.
    reason: lexical_alternative
  - marker: c
    text: Literally 'on the fire.' English 'into the fire' expresses the intended
      sense more naturally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקִדַּשְׁתִּי
  chosen: I will set apart
  alternatives:
  - I will consecrate
  - I will appoint
  - I will prepare
  lexicon: HALOT
  rationale: The verb קדשׁ literally means 'to make holy/consecrate,' but in judgment
    contexts it can mean to designate or set apart persons for a task. 'Set apart'
    preserves the underlying sanctification language without misleadingly implying
    moral holiness in the destroyers. 'Appoint' is possible but loses the cultic nuance.
- source_word: מַשְׁחִתִים
  chosen: destroyers
  alternatives:
  - those who destroy
  - wreckers
  lexicon: HALOT
  rationale: The participial noun from שׁחת denotes agents of destruction. 'Destroyers'
    is concise and natural English, fitting the military/judgment context.
- source_word: עָלֶיךָ
  chosen: against you
  alternatives:
  - over you
  - upon you
  lexicon: HALOT
  rationale: With hostile action, על commonly carries the sense 'against.' This best
    reflects the adversative force in context.
- source_word: אִישׁ וְכֵלָיו
  chosen: each with his weapons
  alternatives:
  - a man and his weapons
  - each man with his tools
  - each with his implements
  lexicon: HALOT
  rationale: The distributive sense of איש after a plural noun is well represented
    by 'each.' כלי can mean vessels, implements, or weapons; in a destruction/woodcutting
    and military judgment context, 'weapons' best captures the likely sense while
    remaining broad enough to include instruments of destruction.
- source_word: וְכָרְתוּ
  chosen: they will cut down
  alternatives:
  - they will cut off
  - they will fell
  lexicon: HALOT
  rationale: כרת in reference to trees means to cut down/fell. 'Cut down' is idiomatic
    and clear.
- source_word: מִבְחַר
  chosen: the choicest of
  alternatives:
  - the best of
  - the choice of
  lexicon: HALOT
  rationale: מבחר denotes what is selected or best. 'The choicest of' preserves the
    elevated tone and superlative sense.
- source_word: אֲרָזֶיךָ
  chosen: your cedars
  alternatives:
  - your cedar trees
  lexicon: HALOT
  rationale: The plural construct with suffix is straightforwardly 'your cedars.'
    In Jeremiah's imagery this may refer literally to cedar timbers/palace grandeur,
    but the lexical rendering should remain concrete.
- source_word: וְהִפִּילוּ עַל הָאֵשׁ
  chosen: and throw them into the fire
  alternatives:
  - and cast them on the fire
  - and make them fall upon the fire
  lexicon: HALOT
  rationale: The idiom of causing felled wood to fall onto/into the fire is best rendered
    naturally in English as 'throw them into the fire.' 'On the fire' is more literal,
    but 'into the fire' communicates the intended result more idiomatically.
