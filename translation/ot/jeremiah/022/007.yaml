theological_decisions:
- issue: Retention of sanctification language in a judgment oracle
  chosen_reading: Render וְקִדַּשְׁתִּי as 'I will set apart' rather than a purely
    secular 'I will appoint.'
  alternative_readings:
  - I will appoint destroyers against you
  - I will consecrate destroyers against you
  rationale: The Hebrew uses sanctification language for YHWH's designation of agents
    of judgment. 'Set apart' preserves this theological texture without suggesting
    the destroyers are morally holy. This maintains the text's tension rather than
    flattening it.
  doctrine_reference: Translation philosophy §3, §5
