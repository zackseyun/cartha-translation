id: JER.22.11
reference: Jeremiah 22:11
source:
  edition: WLC
  text: כִּ֣י כֹ֣ה אָֽמַר יְ֠הוָה אֶל שַׁלֻּ֨ם בֶּן יֹאשִׁיָּ֜הוּ מֶ֣לֶךְ יְהוּדָ֗ה
    הַ/מֹּלֵךְ֙ תַּ֚חַת יֹאשִׁיָּ֣הוּ אָבִ֔י/ו אֲשֶׁ֥ר יָצָ֖א מִן הַ/מָּק֣וֹם הַ/זֶּ֑ה
    לֹֽא יָשׁ֥וּב שָׁ֖ם עֽוֹד־־־־־׃
translation:
  text: 'For thus says the LORD concerning Shallum son of Josiah, king of Judah, who
    reigned in place of Josiah his father, and who went out from this place: He shall
    never return there again.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Shallum'; the Hebrew preposition can be read more literally as direct
      address, but here it likely introduces the subject of the oracle.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי כֹה אָמַר
  chosen: For thus says
  alternatives:
  - For this is what ... says
  - Because thus said
  lexicon: HALOT
  rationale: כִּי here introduces the explanation for the preceding statement, well
    rendered 'For.' כֹה אָמַר is the standard prophetic messenger formula; present-tense
    'says' is idiomatic in English for prophetic discourse.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in many
    English translations.
- source_word: אֶל
  chosen: concerning
  alternatives:
  - to
  - about
  lexicon: HALOT
  rationale: Although אֶל commonly means 'to,' after 'thus says the LORD' and before
    a named subject of an oracle, English idiom is better served by 'concerning,'
    indicating the oracle's subject rather than direct address.
- source_word: שַׁלֻּם
  chosen: Shallum
  lexicon: HALOT
  rationale: Personal name is transliterated according to the translation philosophy.
- source_word: בֶּן יֹאשִׁיָּהוּ
  chosen: son of Josiah
  lexicon: HALOT
  rationale: Straightforward filial designation; retained formally.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: king of Judah
  lexicon: HALOT
  rationale: Standard royal title; no reason to paraphrase.
- source_word: הַמֹּלֵךְ תַּחַת
  chosen: who reigned in place of
  alternatives:
  - who became king after
  - who was reigning instead of
  lexicon: HALOT
  rationale: The participle with תַּחַת indicates succession to rule in another's
    place. 'Reigned in place of' preserves the royal nuance more precisely than the
    looser 'became king after.'
- source_word: אָבִיו
  chosen: his father
  lexicon: HALOT
  rationale: Simple possessive retained.
- source_word: אֲשֶׁר יָצָא מִן הַמָּקוֹם הַזֶּה
  chosen: and who went out from this place
  alternatives:
  - who departed from this place
  - who left this place
  lexicon: HALOT
  rationale: יָצָא is literally 'went out.' 'From this place' likely refers to Jerusalem/Judah
    from the speaker's vantage point. The wording is kept close to the Hebrew while
    remaining natural.
- source_word: לֹא יָשׁוּב שָׁם עוֹד
  chosen: He shall never return there again
  alternatives:
  - he will not return there anymore
  - he shall not return there again
  lexicon: HALOT
  rationale: The negated imperfect with עוֹד expresses permanent non-return. 'Never
    return there again' communicates the force naturally in modern English.
