id: JER.22.10
reference: Jeremiah 22:10
source:
  edition: WLC
  text: אַל תִּבְכּ֣וּ לְ/מֵ֔ת וְ/אַל תָּנֻ֖דוּ ל֑/וֹ בְּכ֤וּ בָכוֹ֙ לַֽ/הֹלֵ֔ךְ כִּ֣י
    לֹ֤א יָשׁוּב֙ ע֔וֹד וְ/רָאָ֖ה אֶת אֶ֥רֶץ מוֹלַדְתּֽ/וֹ־־־׃ס
translation:
  text: Do not weep for the dead, and do not mourn for him. Weep bitterly for the
    one going away, for he will never return again or see the land of his birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'weep, weep'—the Hebrew uses an imperative with an infinitive absolute
      for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''The one going away'' refers contextually to the ruler being taken away
      into exile.'
    reason: cultural_note
lexical_decisions:
- source_word: תִּבְכּוּ
  chosen: weep
  alternatives:
  - cry
  lexicon: HALOT
  rationale: The verb בכה commonly means 'to weep/cry.' 'Weep' better fits the solemn
    lament context and pairs naturally with the following imperative repetition.
- source_word: לְמֵת
  chosen: for the dead
  alternatives:
  - for the one who is dead
  - for the deceased
  lexicon: HALOT
  rationale: The singular participial/adjectival form functions generically or as
    a specific dead person. 'The dead' is idiomatic English and preserves the Hebrew's
    concise expression.
- source_word: תָּנֻדוּ לוֹ
  chosen: mourn for him
  alternatives:
  - bemoan him
  - shake your heads for him
  - show sympathy for him
  lexicon: HALOT
  rationale: The verb נוד in lament contexts can denote mourning, condoling, or expressive
    gestures of grief. 'Mourn for him' communicates the sense clearly in modern English
    without over-specifying the gesture.
- source_word: בְּכוּ בָכוֹ
  chosen: weep bitterly
  alternatives:
  - weep, yes weep
  - weep continually
  - weep intensely
  lexicon: HALOT
  rationale: The imperative plus infinitive absolute intensifies the command. 'Weep
    bitterly' is a natural English way to convey emphatic intensity rather than wooden
    repetition.
- source_word: לַהֹלֵךְ
  chosen: for the one going away
  alternatives:
  - for the one who goes away
  - for the exile
  - for the one departing
  lexicon: HALOT
  rationale: הלך literally means 'the one going.' In context it refers to the king
    being taken away/exiled. 'The one going away' preserves the verbal image without
    importing 'exile' directly into the main text.
- source_word: לֹא יָשׁוּב עוֹד
  chosen: he will never return again
  alternatives:
  - he will not return anymore
  - he will return no more
  lexicon: HALOT
  rationale: The phrase expresses permanent non-return. 'Never return again' is idiomatic
    and preserves the force of עוֹד.
- source_word: וְרָאָה
  chosen: or see
  alternatives:
  - and see
  lexicon: HALOT
  rationale: 'After a negated future clause, the prefixed waw can be rendered in English
    as a second coordinated negative idea: ''nor/or see.'' English idiom prefers ''or
    see'' here to avoid awkwardness while preserving the sense that he will not see
    his homeland again.'
- source_word: אֶרֶץ מוֹלַדְתּוֹ
  chosen: the land of his birth
  alternatives:
  - his native land
  - the land where he was born
  - his birthplace
  lexicon: HALOT
  rationale: מוֹלֶדֶת denotes birthplace/native land. 'The land of his birth' is transparent
    and retains the concrete geographic sense of אֶרֶץ.
