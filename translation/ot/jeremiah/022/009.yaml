id: JER.22.9
reference: Jeremiah 22:9
source:
  edition: WLC
  text: וְ/אָ֣מְר֔וּ עַ֚ל אֲשֶׁ֣ר עָֽזְב֔וּ אֶת בְּרִ֥ית יְהוָ֖ה אֱלֹֽהֵי/הֶ֑ם וַ/יִּֽשְׁתַּחֲו֛וּ לֵ/אלֹהִ֥ים אֲחֵרִ֖ים וַ/יַּעַבְדֽוּ/ם־׃ס
translation:
  text: And they will say, ‘Because they abandoned the covenant of Yahweh their God and bowed down to other gods and served them.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'forsook' for 'abandoned.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'bowed down to other gods and served them'; the two verbs together describe idolatrous worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  chosen: And they will say
  alternatives:
  - Then they will say
  - And they shall say
  lexicon: HALOT
  rationale: Qal wayyiqtol/converted form continues the future-oriented report from the previous verse; 'will say' is natural modern English. 'And' preserves the Hebrew narrative linkage.
- source_word: עַל אֲשֶׁר
  chosen: Because
  alternatives:
  - On account of which
  - For that
  lexicon: HALOT
  rationale: The preposition עַל with אֲשֶׁר introduces the reason for the judgment. 'Because' best captures the causal force idiomatically in English.
- source_word: עָזְבוּ
  chosen: they abandoned
  alternatives:
  - they forsook
  - they left
  lexicon: HALOT
  rationale: '''Abandoned'' communicates covenantal disloyalty in clear modern English. ''Forsook'' is traditional but more archaic.'
- source_word: בְּרִית
  chosen: the covenant
  alternatives:
  - the treaty
  - the pact
  lexicon: HALOT
  rationale: בְּרִית in this context is the covenant relationship between the LORD and his people; 'covenant' is the standard and theologically appropriate rendering.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  alternatives:
  - their gods
  lexicon: HALOT
  rationale: 'Though morphologically plural in form, אֱלֹהֵי with pronominal suffix here refers to Israel''s singular God in covenant formula language: ''the LORD their God.'''
- source_word: וַיִּשְׁתַּחֲווּ
  chosen: and bowed down
  alternatives:
  - and worshiped
  - and prostrated themselves
  lexicon: HALOT
  rationale: The verb literally denotes bowing/prostration. 'Bowed down' preserves the physical act and leaves the worship sense to be reinforced by the object and following verb.
- source_word: לֵאלֹהִים אֲחֵרִים
  chosen: to other gods
  alternatives:
  - before other gods
  lexicon: HALOT
  rationale: The lamed after השתחוה marks the object of obeisance. 'To other gods' is standard and clear.
- source_word: וַיַּעַבְדוּם
  chosen: and served them
  alternatives:
  - and worshiped them
  lexicon: HALOT
  rationale: עבד with divine objects often carries the sense of religious service/worship. 'Served them' preserves the lexical distinction from the previous verb while still conveying idolatrous devotion.
