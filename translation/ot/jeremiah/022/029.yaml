id: JER.22.29
reference: Jeremiah 22:29
source:
  edition: WLC
  text: אֶ֥רֶץ אֶ֖רֶץ אָ֑רֶץ שִׁמְעִ֖י דְּבַר יְהוָֽה־׃ס
translation:
  text: Land, land, land, hear the word of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Earth, earth, earth"; Hebrew אֶרֶץ can mean either "land" or "earth."
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ / אָרֶץ
  chosen: Land
  alternatives:
  - earth
  lexicon: HALOT
  rationale: The noun can mean 'land' or 'earth.' Here the triple vocative functions
    as an address, likely to the land of Judah/the land as witness, not primarily
    the globe in a cosmological sense. 'Land' preserves the prophetic force and local
    covenantal setting, while the repeated form is retained for emphasis.
- source_word: שִׁמְעִי
  chosen: hear
  alternatives:
  - listen
  - obey
  lexicon: HALOT
  rationale: Imperative feminine singular from שׁמע. 'Hear' is the most direct rendering
    and preserves the biblical resonance of attentive reception. 'Listen' is possible,
    and 'obey' can be an implicational extension in some contexts, but here the immediate
    sense is to heed the prophetic proclamation.
- source_word: דְּבַר
  chosen: word
  alternatives:
  - message
  lexicon: HALOT
  rationale: Construct form 'word of YHWH.' 'Word' is the standard and suitably weighty
    prophetic formula in English. 'Message' is possible but slightly more interpretive
    and less consistent with common prophetic diction.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention
    while signaling the covenant name.
