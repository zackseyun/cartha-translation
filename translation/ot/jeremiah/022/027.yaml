id: JER.22.27
reference: Jeremiah 22:27
source:
  edition: WLC
  text: וְ/עַל הָ/אָ֗רֶץ אֲשֶׁר הֵ֛ם מְנַשְּׂאִ֥ים אֶת נַפְשָׁ֖/ם לָ/שׁ֣וּב שָׁ֑ם
    שָׁ֖מָּ/ה לֹ֥א יָשֽׁוּבוּ־־־׃ס
translation:
  text: But as for the land to which they long to return, there they will not return.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the land to which they lift up their soul to return there.'
      The Hebrew idiom 'lift up the soul' expresses strong desire or longing.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  chosen: But as for
  alternatives:
  - And concerning
  - But to
  lexicon: HALOT
  rationale: The conjunction plus preposition introduces a contrastive topical phrase
    linked to the previous verse. 'But as for' captures the adversative flow in natural
    English better than a bare 'and upon/concerning.'
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the country
  - the earth
  lexicon: HALOT
  rationale: In this exile/return context, אֶרֶץ refers to a specific territory or
    homeland, not the whole earth. 'Land' is the most natural and biblically consistent
    rendering.
- source_word: אֲשֶׁר
  chosen: to which
  alternatives:
  - which
  - where
  lexicon: HALOT
  rationale: The relative particle introduces the clause modifying 'the land.' Because
    the infinitive לָשׁוּב governs motion back to a place, English idiom is best expressed
    as 'to which ... return.'
- source_word: הֵם
  chosen: they
  lexicon: HALOT
  rationale: Explicit pronoun retained in translation as the subject of the relative
    clause.
- source_word: מְנַשְּׂאִים אֶת־נַפְשָׁם
  chosen: long
  alternatives:
  - lift up their soul
  - set their heart
  - desire
  lexicon: HALOT
  rationale: Literally 'lift up their soul' is a Hebrew idiom for strong desire or
    longing. 'Long' conveys the idiomatic sense in readable modern English without
    wooden obscurity. 'Set their heart' is possible but less directly tied to the
    נפש idiom here.
- source_word: נַפְשָׁם
  chosen: implicit within 'long'
  alternatives:
  - their soul
  - their life
  - their desire
  lexicon: HALOT
  rationale: נֶפֶשׁ in this idiom does not require a separate English gloss; the sense
    is absorbed into the verbal expression 'long.' This avoids unnatural English while
    preserving meaning.
- source_word: לָשׁוּב
  chosen: to return
  alternatives:
  - to go back
  - to come back
  lexicon: HALOT
  rationale: שׁוּב is the standard verb 'return.' 'Return' preserves the lexical repetition
    with the final יָשׁוּבוּ.
- source_word: שָׁם
  chosen: return
  alternatives:
  - there
  lexicon: HALOT
  rationale: The adverb is semantically included in the English phrase 'return' with
    the relative 'to which.' Rendering both explicitly ('return there') would be clumsy
    in English.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to there
  - to that place
  lexicon: HALOT
  rationale: 'This directional adverb is kept explicitly in the main clause for emphasis:
    ''there they will not return.'' It mirrors the Hebrew''s emphatic restatement
    of destination.'
- source_word: לֹא יָשׁוּבוּ
  chosen: they will not return
  alternatives:
  - they shall not return
  - they will never return
  lexicon: HALOT
  rationale: Simple future negation best fits the context. 'Never' would overstate
    the Hebrew, and 'shall' is more archaic than desired.
