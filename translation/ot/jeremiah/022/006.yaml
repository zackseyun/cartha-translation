theological_decisions:
- issue: Metaphorical commendation followed by judgment
  chosen_reading: The verse first acknowledges the royal house as precious/exalted
    ('Gilead... summit of Lebanon') and then announces certain devastation.
  alternative_readings:
  - The place names could be taken more strictly as references to cedar-rich regions
    associated with the palace rather than general praise.
  rationale: The Hebrew juxtaposes honorific geographic imagery with an emphatic judgment
    formula. The translation preserves the tension without over-interpreting the metaphor.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
