id: JER.22.6
reference: Jeremiah 22:6
source:
  edition: WLC
  text: כִּֽי כֹ֣ה אָמַ֣ר יְהוָ֗ה עַל בֵּית֙ מֶ֣לֶךְ יְהוּדָ֔ה גִּלְעָ֥ד אַתָּ֛ה לִ֖/י
    רֹ֣אשׁ הַ/לְּבָנ֑וֹן אִם לֹ֤א אֲשִֽׁיתְ/ךָ֙ מִדְבָּ֔ר עָרִ֖ים לֹ֥א נושבה־׀־־׃
translation:
  text: 'For thus says the LORD concerning the house of the king of Judah: You are
    Gilead to me, the summit of Lebanon; yet surely I will make you a wilderness,
    cities not inhabited.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the head/top of Lebanon.' The Hebrew says 'head of Lebanon,' an idiom
      for its height or prominence.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'surely I will make you' renders an emphatic Hebrew oath-like
      expression (literally, 'if not I make you').
    reason: lexical_alternative
  - marker: c
    text: 'Or ''uninhabited cities.'' The Hebrew may describe the result of judgment:
      cities left without inhabitants.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the covenant name with small-caps convention in English.
- source_word: עַל
  chosen: concerning
  alternatives:
  - about
  - against
  lexicon: HALOT
  rationale: In prophetic speech introducing an oracle directed toward a subject,
    'concerning' is the most natural English equivalent and avoids prematurely specifying
    hostility in the preposition itself.
- source_word: בֵּית מֶלֶךְ יְהוּדָה
  chosen: the house of the king of Judah
  alternatives:
  - the palace of the king of Judah
  - the royal house of Judah
  lexicon: HALOT
  rationale: Formally this is 'house of the king of Judah.' It may imply palace or
    dynasty, but the immediate context addresses the royal establishment; the more
    literal 'house' preserves that breadth.
- source_word: גִּלְעָד
  chosen: Gilead
  lexicon: HALOT
  rationale: Proper place name retained by transliteration. Here it functions metaphorically/comparatively
    for something prized or majestic.
- source_word: רֹאשׁ הַלְּבָנוֹן
  chosen: the summit of Lebanon
  alternatives:
  - the head of Lebanon
  - the top of Lebanon
  lexicon: HALOT
  rationale: רֹאשׁ literally means 'head,' but in geographic imagery 'summit' communicates
    the sense idiomatically in modern English while preserving the elevated imagery.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  - in my eyes
  lexicon: HALOT
  rationale: 'The dative marks relation or valuation: the royal house is like Gilead/Lebanon
    ''to me.'' ''To me'' is sufficiently literal and readable.'
- source_word: אִם לֹא
  chosen: yet surely
  alternatives:
  - surely
  - indeed
  - if not
  lexicon: HALOT
  rationale: In oath-like divine declarations, אִם לֹא functions idiomatically as
    a strong asseveration rather than a conditional. 'Yet surely' captures both the
    contrast with the preceding praise and the emphatic certainty of judgment.
- source_word: אֲשִׁיתְךָ
  chosen: I will make you
  alternatives:
  - I will set you
  - I will turn you into
  lexicon: HALOT
  rationale: From שׂים, 'set/place/make.' In this construction with predicate nouns,
    'make you' is the most natural English rendering.
- source_word: מִדְבָּר
  chosen: a wilderness
  alternatives:
  - a desert
  - wasteland
  lexicon: HALOT
  rationale: '''Wilderness'' preserves the biblical register and need not imply sandy
    desert specifically; it denotes desolation.'
- source_word: עָרִים לֹא נוֹשָׁבָה
  chosen: cities not inhabited
  alternatives:
  - uninhabited cities
  - cities with no inhabitants
  lexicon: HALOT
  rationale: The Hebrew is somewhat appositional after 'wilderness.' 'Cities not inhabited'
    stays close to the form while remaining intelligible; it likely means cities reduced
    to desolation and left without inhabitants.
