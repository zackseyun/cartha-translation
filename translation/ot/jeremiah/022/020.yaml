id: JER.22.20
reference: Jeremiah 22:20
source:
  edition: WLC
  text: עֲלִ֤י הַ/לְּבָנוֹן֙ וּֽ/צְעָ֔קִי וּ/בַ/בָּשָׁ֖ן תְּנִ֣י קוֹלֵ֑/ךְ וְ/צַֽעֲקִי֙
    מֵֽ/עֲבָרִ֔ים כִּ֥י נִשְׁבְּר֖וּ כָּל מְאַהֲבָֽיִ/ךְ־׃
translation:
  text: Go up to Lebanon and cry out; raise your voice in Bashan; cry out from Abarim,
    for all your lovers are broken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the crossings' or 'from the regions beyond'; the Hebrew may be
      understood more literally, but here it likely refers to Abarim as a place name
      alongside Lebanon and Bashan.
    reason: lexical_alternative
  - marker: b
    text: '''Your lovers'' is a prophetic metaphor for Judah''s foreign allies or
      political partners.'
    reason: cultural_note
lexical_decisions:
- source_word: עֲלִי
  chosen: Go up
  alternatives:
  - Ascend
  - Climb up
  lexicon: HALOT
  rationale: Qal imperative feminine singular of עלה, a direct summons to ascend.
    'Go up' is natural modern English and preserves the directional force without
    sounding overly formal.
- source_word: הַלְּבָנוֹן
  chosen: Lebanon
  lexicon: HALOT
  rationale: Proper place name, transliterated by standard English convention per
    translation philosophy.
- source_word: וּצְעָקִי
  chosen: and cry out
  alternatives:
  - and shout
  - and wail
  lexicon: HALOT
  rationale: Imperative of צעק, denoting a loud cry. 'Cry out' best preserves the
    urgency and lament-like force without over-specifying the emotional tone.
- source_word: וּבַבָּשָׁן
  chosen: in Bashan
  lexicon: HALOT
  rationale: Place name with preposition. 'In Bashan' is the straightforward locative
    rendering.
- source_word: תְּנִי קוֹלֵךְ
  chosen: raise your voice
  alternatives:
  - lift up your voice
  - give your voice
  lexicon: HALOT
  rationale: Hebrew idiom literally 'give your voice.' 'Raise your voice' is a clear
    English equivalent that preserves the sense of vocal outcry. 'Lift up your voice'
    is possible but slightly more traditional/archaic.
- source_word: וְצַעֲקִי
  chosen: cry out
  alternatives:
  - shout
  - wail
  lexicon: HALOT
  rationale: Repeated imperative of צעק. Repeating 'cry out' preserves the rhetorical
    parallelism and urgency of the Hebrew.
- source_word: מֵעֲבָרִים
  chosen: from Abarim
  alternatives:
  - from the crossings
  - from the regions beyond
  lexicon: HALOT
  rationale: Likely a toponym referring to the Abarim range/region east of the Jordan.
    Because the form can be understood as a place name in this context alongside Lebanon
    and Bashan, 'Abarim' best preserves the geographical triad. The more literal common-noun
    sense is preserved in a footnote.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the lament. 'For' fits the poetic explanatory
    force well.
- source_word: נִשְׁבְּרוּ
  chosen: are broken
  alternatives:
  - have been broken
  - are shattered
  - are destroyed
  lexicon: HALOT
  rationale: Niphal perfect plural of שבר. In context it likely refers metaphorically
    to the ruin of Judah's allies/lovers. 'Are broken' preserves the metaphor and
    avoids over-interpreting with 'destroyed,' while still sounding natural in English
    poetry.
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: Straightforward quantifier; no reason to soften the totalizing force.
- source_word: מְאַהֲבָיִךְ
  chosen: your lovers
  alternatives:
  - your allies
  - those who love you
  lexicon: HALOT
  rationale: The noun from אהב in prophetic literature often refers metaphorically
    to illicit lovers, especially foreign political allies. 'Your lovers' preserves
    the prophetic metaphor and rhetorical sting better than the interpretive gloss
    'allies.' The political sense is worth noting in a footnote rather than replacing
    the metaphor in the main text.
