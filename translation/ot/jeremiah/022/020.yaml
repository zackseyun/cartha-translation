theological_decisions:
- issue: Metaphorical reference of 'your lovers'
  chosen_reading: Retain the metaphor 'your lovers' in the main text, understood as
    Judah/Jerusalem's foreign allies in context.
  alternative_readings:
  - Translate interpretively as 'your allies'
  rationale: The verse belongs to prophetic covenantal rhetoric in which political
    alliances are portrayed as adulterous loves. Preserving the metaphor maintains
    the theological and literary force without importing a narrower interpretation
    into the main text.
  doctrine_reference: 'Translation philosophy #3 and #5'
