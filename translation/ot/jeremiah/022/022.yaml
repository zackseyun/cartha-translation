id: JER.22.22
reference: Jeremiah 22:22
source:
  edition: WLC
  text: כָּל רֹעַ֨יִ/ךְ֙ תִּרְעֶה ר֔וּחַ וּֽ/מְאַהֲבַ֖יִ/ךְ בַּ/שְּׁבִ֣י יֵלֵ֑כוּ
    כִּ֣י אָ֤ז תֵּבֹ֨שִׁי֙ וְ/נִכְלַ֔מְתְּ מִ/כֹּ֖ל רָעָתֵֽ/ךְ־־׃
translation:
  text: All your shepherds the wind will shepherd away, and your lovers will go into
    captivity; then you will surely be ashamed and humiliated because of all your
    evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'All your leaders the wind will scatter.' The Hebrew uses the same shepherding
      root for 'your shepherds' and 'the wind will shepherd [them],' creating an ironic
      wordplay.
    reason: lexical_alternative
  - marker: b
    text: '''Your lovers'' is a prophetic metaphor for Judah''s illicit political
      allies and attachments.'
    reason: cultural_note
lexical_decisions:
- source_word: רֹעַיִךְ
  chosen: your shepherds
  alternatives:
  - your rulers
  - your leaders
  - those who pasture you
  lexicon: HALOT
  rationale: From רעה in the participial form, literally 'your shepherds.' In Jeremiah
    this commonly functions metaphorically for rulers/leaders, but 'shepherds' preserves
    the prophetic image while allowing the political referent to remain implicit.
- source_word: תִּרְעֶה רוּחַ
  chosen: the wind will shepherd away
  alternatives:
  - the wind will pasture
  - the wind will consume
  - the wind will scatter
  lexicon: HALOT
  rationale: 'The verb repeats רעה, creating a wordplay: the ''shepherds'' are themselves
    ''shepherded'' by the wind. A wooden ''pasture'' is awkward in English, while
    ''scatter'' captures effect but loses the lexical echo. ''Shepherd away'' preserves
    the irony and the repeated root as much as possible in readable English.'
- source_word: מְאַהֲבַיִךְ
  chosen: your lovers
  alternatives:
  - your allies
  - those who love you
  lexicon: HALOT
  rationale: Jeremiah often uses 'lovers' metaphorically for political allies and
    illicit attachments. 'Lovers' preserves the prophetic metaphor and its moral force
    better than the flatter 'allies.'
- source_word: בַּשְּׁבִי יֵלֵכוּ
  chosen: will go into captivity
  alternatives:
  - will go into exile
  - will be taken captive
  lexicon: HALOT
  rationale: The phrase literally means 'will go into captivity.' This is idiomatic
    and clear in English. 'Be taken captive' is interpretive; 'go into exile' is possible
    but less exact than the captivity language of שבי.
- source_word: כִּי אָז
  chosen: then
  alternatives:
  - for then
  - because then
  lexicon: HALOT
  rationale: Here כִּי introduces the consequence/result that follows the judgment.
    'Then' gives natural English flow; the causal nuance is not strong enough to require
    'for then' in the main text.
- source_word: תֵּבֹשִׁי
  chosen: you will surely be ashamed
  alternatives:
  - you will be ashamed
  - you will be put to shame
  lexicon: HALOT
  rationale: בוש denotes shame/disgrace. 'Surely' reflects the emphatic force of the
    context after אָז, though the core sense remains simple future shame.
- source_word: וְנִכְלַמְתְּ
  chosen: and humiliated
  alternatives:
  - and disgraced
  - and confounded
  lexicon: HALOT
  rationale: נכלם overlaps with בוש but adds the sense of humiliation/disgrace. Rendering
    it distinctly avoids flattening the Hebrew pair into a single English idea.
- source_word: מִכֹּל רָעָתֵךְ
  chosen: because of all your evil
  alternatives:
  - because of all your wickedness
  - from all your evil
  lexicon: HALOT
  rationale: 'The preposition marks cause/source in context: the shame comes because
    of her evil. ''Evil'' is broad and faithful; ''wickedness'' is possible but slightly
    more interpretive.'
