theological_decisions:
- issue: Metaphorical language for Judah's political and spiritual infidelity
  chosen_reading: Retain 'shepherds' and 'lovers' in the main text rather than replacing
    them with explanatory terms like 'leaders' and 'allies.'
  alternative_readings:
  - All your leaders the wind will scatter, and your allies will go into captivity
  rationale: The verse uses prophetic metaphor to indict Judah's rulers and foreign
    attachments. Preserving the imagery maintains the theological and rhetorical force
    without obscuring the likely referents.
  doctrine_reference: Translation philosophy §§1, 3, 5
