id: JER.22.30
reference: Jeremiah 22:30
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה כִּתְב֞וּ אֶת הָ/אִ֤ישׁ הַ/זֶּה֙ עֲרִירִ֔י גֶּ֖בֶר לֹא
    יִצְלַ֣ח בְּ/יָמָ֑י/ו כִּי֩ לֹ֨א יִצְלַ֜ח מִ/זַּרְע֗/וֹ אִ֚ישׁ יֹשֵׁב֙ עַל כִּסֵּ֣א
    דָוִ֔ד וּ/מֹשֵׁ֥ל ע֖וֹד בִּ/יהוּדָֽה׀־־־׃
translation:
  text: 'Thus says the LORD: Write this man down as childless, a man who will not
    prosper in his days; for none of his offspring will prosper to sit on the throne
    of David and rule again in Judah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''record this man as without an heir.'' The Hebrew says ''childless,''
      but the following clause shows the focus is dynastic succession: none of his
      offspring will succeed on David''s throne.'
    reason: lexical_alternative
  - marker: b
    text: That is, no descendant of Jeconiah would successfully reign as Davidic king
      in Judah.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    the traditional small-caps covenantal substitute in English.
- source_word: כִּתְבוּ
  chosen: Write ... down
  alternatives:
  - Record
  - Write
  lexicon: HALOT
  rationale: The imperative is plural and calls for official inscription or registration.
    'Write ... down' captures the administrative force more naturally than bare 'write'
    while remaining close to the Hebrew.
- source_word: הָאִישׁ הַזֶּה
  chosen: this man
  alternatives:
  - this האיש/person
  lexicon: HALOT
  rationale: Straightforward demonstrative phrase; 'man' preserves the masculine singular
    reference.
- source_word: עֲרִירִי
  chosen: childless
  alternatives:
  - bereft of children
  - stripped
  lexicon: HALOT
  rationale: 'Although Jeconiah apparently had descendants, in context the term functions
    juridically/dynastically: he is to be reckoned as one without a succeeding heir
    to the throne. ''Childless'' is the standard concise rendering and fits the following
    explanation.'
- source_word: גֶּבֶר
  chosen: a man
  alternatives:
  - a strong man
  - a male
  lexicon: HALOT
  rationale: Used appositionally after 'childless' to characterize him. 'A man' is
    idiomatic in English and avoids overreading any nuance of strength.
- source_word: לֹא יִצְלַח בְּיָמָיו
  chosen: who will not prosper in his days
  alternatives:
  - who will not succeed in his lifetime
  - who will not thrive in his days
  lexicon: HALOT
  rationale: צלח here denotes success/prospering. 'In his days' is retained rather
    than paraphrased away, while 'will not prosper' gives natural English.
- source_word: מִזַּרְעוֹ
  chosen: of his offspring
  alternatives:
  - of his seed
  - of his descendants
  lexicon: HALOT
  rationale: '''Offspring'' preserves the collective singular sense of זרע in clear
    modern English; ''seed'' would be more formal but less natural here.'
- source_word: אִישׁ יֹשֵׁב עַל כִּסֵּא דָוִד
  chosen: none of his offspring will prosper to sit on the throne of David
  alternatives:
  - not a man of his offspring sitting on David's throne will prosper
  - no man from his offspring will sit on the throne of David
  lexicon: HALOT
  rationale: The Hebrew can be represented woodenly as 'for not will prosper from
    his offspring a man sitting on the throne of David.' In context, the sense is
    that no descendant of his will succeed as Davidic king. Rendering with 'to sit'
    makes the infinitival/resultative sense explicit in idiomatic English while preserving
    the throne imagery.
- source_word: וּמֹשֵׁל עוֹד בִּיהוּדָה
  chosen: and rule again in Judah
  alternatives:
  - and ruling any longer in Judah
  - and rule still in Judah
  lexicon: HALOT
  rationale: עוֹד here conveys continuation/further occurrence. 'Again' best captures
    that no future descendant will resume Davidic rule in Judah after the exile crisis.
    'Any longer' is possible but less smooth after 'sit on the throne of David.'
