theological_decisions:
- issue: Meaning of the judgment 'childless' for Jeconiah/Coniah despite known descendants
  chosen_reading: Render עֲרִירִי as 'childless' in the main text, understanding it
    as dynastic/political childlessness rather than a denial of biological descendants.
  alternative_readings:
  - Render more interpretively as 'without an heir'
  - Treat as hyperbolic curse language
  rationale: 'The immediate clause explains the judgment in royal terms: none of his
    offspring will prosper sitting on David''s throne and ruling in Judah. Therefore
    the text''s burden is succession, not necessarily literal absence of children.
    The main text keeps the lexical force ''childless'' and lets the following clause
    interpret it.'
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Force of the final clause regarding Davidic kingship
  chosen_reading: Translate as a denial that any of his descendants will successfully
    occupy David's throne and rule in Judah.
  alternative_readings:
  - 'Translate as two separate statements: no descendant will sit, and no descendant
    will rule'
  - Read the clause as limited only to his own lifetime
  rationale: The syntax links prospering with the royal role described by the participles.
    The verse announces the end of Jeconiah's successful dynastic rule in Judah, not
    necessarily the extinction of all descendants in every sense.
  doctrine_reference: Translation philosophy §§1, 3
