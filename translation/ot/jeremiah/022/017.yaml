id: JER.22.17
reference: Jeremiah 22:17
source:
  edition: WLC
  text: כִּ֣י אֵ֤ין עֵינֶ֨י/ךָ֙ וְ/לִבְּ/ךָ֔ כִּ֖י אִם עַל בִּצְעֶ֑/ךָ וְ/עַ֤ל דַּֽם
    הַ/נָּקִי֙ לִ/שְׁפּ֔וֹךְ וְ/עַל הָ/עֹ֥שֶׁק וְ/עַל הַ/מְּרוּצָ֖ה לַ/עֲשֽׂוֹת־־־־־׃ס
translation:
  text: But your eyes and your heart are set on nothing except your dishonest gain,
    on shedding innocent blood, and on practicing oppression and extortion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and on doing oppression and violence.' The Hebrew term rendered 'extortion'
      is rare and may more broadly denote violent or ruthless wrongdoing.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין ... כִּי אִם
  chosen: are set on nothing except
  alternatives:
  - are on nothing but
  - are only for
  lexicon: HALOT
  rationale: The construction 'there is not ... except' idiomatically means exclusive
    focus or concern. Rendering it as 'are set on nothing except' makes the idiom
    natural in English while preserving the force that his eyes and heart are exclusively
    directed toward these evils.
- source_word: עֵינֶיךָ
  chosen: your eyes
  lexicon: HALOT
  rationale: Retained literally. In Hebrew, 'eyes' often denotes attention, desire,
    or aim; keeping 'eyes' preserves the metaphor present in the source.
- source_word: לִבְּךָ
  chosen: your heart
  lexicon: HALOT
  rationale: Retained literally. In Hebrew anthropology, 'heart' is the center of
    will and intention, not merely emotion; the literal rendering preserves that breadth.
- source_word: בִּצְעֶךָ
  chosen: your dishonest gain
  alternatives:
  - your gain
  - your unjust profit
  - your greed
  lexicon: HALOT
  rationale: בצע commonly denotes gain acquired by unjust means, often greed or profit
    through exploitation. 'Dishonest gain' captures both the profit element and its
    moral corruption better than the broader 'gain' or the more internal 'greed'.
- source_word: דַּם הַנָּקִי
  chosen: innocent blood
  alternatives:
  - the blood of the innocent
  lexicon: HALOT
  rationale: This is a standard Hebrew expression for the blood of those not guilty
    of wrongdoing. 'Innocent blood' is concise, idiomatic, and preserves the established
    biblical phrase.
- source_word: לִשְׁפּוֹךְ
  chosen: shedding
  alternatives:
  - to shed
  - to pour out
  lexicon: HALOT
  rationale: 'An English gerund works smoothly in the series governed by ''on'': ''on
    shedding innocent blood.'' ''Pour out'' would be too literal and less idiomatic
    in this context of violence.'
- source_word: הָעֹשֶׁק
  chosen: oppression
  alternatives:
  - extortion
  - fraud
  - wrongdoing
  lexicon: HALOT
  rationale: The noun denotes oppression, exploitation, or defrauding of others. 'Oppression'
    best captures the broad social injustice in prophetic usage.
- source_word: הַמְּרוּצָה
  chosen: extortion
  alternatives:
  - violence
  - running after gain
  - ruthless pursuit
  lexicon: HALOT
  rationale: This rare noun is commonly understood in context as violent or ruthless
    wrongdoing associated with oppressive gain. 'Extortion' pairs well with 'oppression'
    and fits the verse's focus on unjust enrichment and abuse. Because the term is
    difficult and can be rendered more broadly, an alternative is preserved in a footnote.
- source_word: לַעֲשׂוֹת
  chosen: practicing
  alternatives:
  - doing
  - to do
  lexicon: HALOT
  rationale: The infinitive concludes the list with the sense of carrying out these
    acts. 'Practicing' gives natural English and conveys ongoing conduct rather than
    a single act.
