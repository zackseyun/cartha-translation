id: JER.22.2
reference: Jeremiah 22:2
source:
  edition: WLC
  text: וְ/אָֽמַרְתָּ֙ שְׁמַ֣ע דְּבַר יְהוָ֔ה מֶ֣לֶךְ יְהוּדָ֔ה הַ/יֹּשֵׁ֖ב עַל כִּסֵּ֣א
    דָוִ֑ד אַתָּ֤ה וַ/עֲבָדֶ֨י/ךָ֙ וְ/עַמְּ/ךָ֔ הַ/בָּאִ֖ים בַּ/שְּׁעָרִ֥ים הָ/אֵֽלֶּה־־׃ס
translation:
  text: and say, ‘Hear the word of the LORD, O king of Judah, who sits on the throne
    of David—you, your servants, and your people who enter through these gates.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your officials,' for 'your servants.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: and say
  alternatives:
  - then say
  - you shall say
  lexicon: HALOT
  rationale: Consecutive perfect with direct-speech introduction; in English, 'and
    say' naturally carries the instruction forward from the previous verse without
    overformalizing.
- source_word: שְׁמַע
  chosen: Hear
  alternatives:
  - Listen to
  - Obey
  lexicon: HALOT
  rationale: Imperative of שׁמע here introduces a prophetic summons to receive a message.
    'Hear' preserves the formal force and biblical register better than 'listen to,'
    while not narrowing it to obedience alone.
- source_word: דְּבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Word' preserves the covenantal and revelatory
    weight of דָּבָר in this context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and alignment with the doctrine guidelines.
- source_word: מֶלֶךְ יְהוּדָה
  chosen: O king of Judah
  alternatives:
  - king of Judah
  lexicon: HALOT
  rationale: Vocative sense is clear in direct address. Adding 'O' communicates the
    address naturally in English without archaizing the whole sentence.
- source_word: הַיֹּשֵׁב עַל כִּסֵּא דָוִד
  chosen: who sits on the throne of David
  alternatives:
  - who sit on David's throne
  - who are sitting on the throne of David
  lexicon: HALOT
  rationale: The singular participle modifies 'king of Judah.' 'Sits on the throne
    of David' preserves dynastic and covenantal resonance better than a flatter paraphrase.
- source_word: אַתָּה וַעֲבָדֶיךָ וְעַמְּךָ
  chosen: you, your servants, and your people
  alternatives:
  - you and your officials and your people
  lexicon: HALOT
  rationale: The pronoun adds emphasis after the vocative, broadening the address
    beyond the king alone. עֲבָדִים in a royal court context is best rendered 'servants'
    rather than 'officials,' since the Hebrew term is broader and does not strictly
    denote officeholders.
- source_word: הַבָּאִים
  chosen: who enter
  alternatives:
  - who come in
  - who are entering
  lexicon: HALOT
  rationale: Participle describing the people as those entering the palace/city complex.
    'Enter' is concise and idiomatic.
- source_word: בַּשְּׁעָרִים הָאֵלֶּה
  chosen: through these gates
  alternatives:
  - in these gates
  - by these gates
  lexicon: HALOT
  rationale: English idiom prefers 'through these gates' for motion into a place.
    This captures the local sense of the Hebrew preposition with the participle of
    coming/entering.
