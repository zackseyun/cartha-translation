theological_decisions:
- issue: Meaning of 'knowing' the LORD in context
  chosen_reading: Relational-covenantal knowledge evidenced by doing justice for the
    poor and needy
  alternative_readings:
  - Primarily intellectual knowledge about God
  - A reduction of knowing God to social ethics alone
  rationale: The verse identifies just treatment of the poor and needy as the concrete
    expression of truly knowing the LORD. The translation preserves this without reducing
    'know me' to mere cognition or importing a claim that social action exhausts all
    covenant knowledge of God.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
