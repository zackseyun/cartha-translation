id: JER.22.16
reference: Jeremiah 22:16
source:
  edition: WLC
  text: דָּ֛ן דִּין עָנִ֥י וְ/אֶבְי֖וֹן אָ֣ז ט֑וֹב הֲ/לוֹא הִ֛יא הַ/דַּ֥עַת אֹתִ֖/י נְאֻם יְהוָֽה־־־׃
translation:
  text: He judged the cause of the poor and needy; then it was well. Is not that to know me? declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He judged the case of the poor and needy'; the Hebrew idiom is forensic, referring to upholding their legal cause.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'Is not that the knowledge of me?'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּן
  chosen: defended
  alternatives:
  - judged
  - upheld
  - administered justice for
  lexicon: HALOT
  rationale: The verb דּוּן/דִּין here, paired with the cognate noun דִּין, forms the idiom 'judge/judge the case of.' In English, 'defended the cause of' or 'upheld the cause of' best conveys judicial advocacy for the vulnerable, not mere mental evaluation.
- source_word: דִּין
  chosen: the cause of
  alternatives:
  - justice
  - case
  - legal claim
  lexicon: HALOT
  rationale: As the cognate noun after דָּן, דִּין refers to the legal case or cause being adjudicated. 'The cause of' is idiomatic English and preserves the forensic sense.
- source_word: עָנִי
  chosen: the poor
  alternatives:
  - the afflicted
  - the humble
  lexicon: HALOT
  rationale: In this social-justice context, עָנִי denotes the poor/oppressed person. 'The poor' is the clearest natural rendering here.
- source_word: אֶבְיוֹן
  chosen: needy
  alternatives:
  - poor
  - destitute
  lexicon: HALOT
  rationale: Paired with עָנִי, this term intensifies material vulnerability. 'Needy' preserves the distinction without awkward redundancy.
- source_word: אָז
  chosen: then
  alternatives:
  - at that time
  - so
  lexicon: HALOT
  rationale: 'אָז marks the resulting state: after such just action, ''then'' it was well. This keeps the temporal-resultative force.'
- source_word: טוֹב
  chosen: it was well
  alternatives:
  - it was good
  - all was well
  lexicon: HALOT
  rationale: The adjective functions predicatively and summarizes the favorable outcome. 'It was well' is concise and natural; 'all was well' is possible but slightly more expansive than the Hebrew.
- source_word: הֲלוֹא
  chosen: Is not that
  alternatives:
  - Was that not
  - Surely that is
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting agreement. 'Is not that' fits the English flow into the following clause.
- source_word: הִיא הַדַּעַת אֹתִי
  chosen: what it means to know me
  alternatives:
  - knowing me
  - the knowledge of me
  - to know me
  lexicon: HALOT
  rationale: Literally, 'is that not the knowing of me?' The chosen rendering expresses the abstract noun naturally in English while preserving the covenantal-relational sense of knowing God.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is readable modern English and preserves prophetic solemnity. 'the LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
