id: JER.22.26
reference: Jeremiah 22:26
source:
  edition: WLC
  text: וְ/הֵֽטַלְתִּ֣י אֹתְ/ךָ֗ וְ/אֶֽת אִמְּ/ךָ֙ אֲשֶׁ֣ר יְלָדַ֔תְ/ךָ עַ֚ל הָ/אָ֣רֶץ
    אַחֶ֔רֶת אֲשֶׁ֥ר לֹֽא יֻלַּדְתֶּ֖ם שָׁ֑ם וְ/שָׁ֖ם תָּמֽוּתוּ־־׃
translation:
  text: And I will hurl you and your mother who gave birth to you into another land,
    where you were not born, and there you will die.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shifts from singular ('you') to plural verbs ('you were born,' 'you
      will die'), addressing the king together with his mother.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵטַלְתִּי
  chosen: I will hurl
  alternatives:
  - I will cast
  - I will throw
  lexicon: HALOT
  rationale: The Hiphil form conveys forceful causing to be thrown/cast. 'Hurl' best
    preserves the violent, judgment-laden sense in readable modern English.
- source_word: אֹתְךָ וְאֶת אִמְּךָ
  chosen: you and your mother
  lexicon: HALOT
  rationale: Directly renders the coordinated objects without expansion. The singular
    'you' is then followed by a plural verb later because the statement addresses
    both together.
- source_word: אֲשֶׁר יְלָדַתְךָ
  chosen: who gave birth to you
  alternatives:
  - who bore you
  lexicon: HALOT
  rationale: This relative clause modifies 'your mother.' 'Gave birth to you' is explicit
    and natural contemporary English; 'bore you' is possible but slightly less transparent
    for modern readers.
- source_word: עַל הָאָרֶץ אַחֶרֶת
  chosen: into another land
  alternatives:
  - onto another land
  - to another country
  lexicon: HALOT
  rationale: Although עַל commonly means 'on/upon,' with verbs of throwing it can
    indicate movement onto/into a place. In idiomatic English with exile context,
    'into another land' best conveys forced relocation. 'Land' is preferred over 'country'
    to preserve biblical territorial resonance.
- source_word: אֲשֶׁר לֹא יֻלַּדְתֶּם שָׁם
  chosen: where you were not born
  alternatives:
  - in which you were not born there
  lexicon: HALOT
  rationale: The passive plural verb refers to the addressed pair collectively. English
    naturally expresses this as 'where you were not born,' with 'you' understood corporately/plurally.
- source_word: וְשָׁם תָּמֽוּתוּ
  chosen: and there you will die
  alternatives:
  - and there you shall die
  lexicon: HALOT
  rationale: The plural verb continues the address to both the king and his mother.
    'Will die' is natural modern English and preserves the prophetic certainty.
