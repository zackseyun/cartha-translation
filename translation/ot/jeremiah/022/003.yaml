id: JER.22.3
reference: Jeremiah 22:3
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה עֲשׂ֤וּ מִשְׁפָּט֙ וּ/צְדָקָ֔ה וְ/הַצִּ֥ילוּ גָז֖וּל מִ/יַּ֣ד עָשׁ֑וֹק וְ/גֵר֩ יָת֨וֹם וְ/אַלְמָנָ֤ה אַל תֹּנוּ֙ אַל תַּחְמֹ֔סוּ וְ/דָ֣ם נָקִ֔י אַֽל תִּשְׁפְּכ֖וּ בַּ/מָּק֥וֹם הַ/זֶּֽה׀־־־׃
translation:
  text: 'Thus says Yahweh: Do justice and righteousness, and deliver the robbed person from the hand of the oppressor. Do not oppress the resident foreigner, the fatherless, or the widow, and do not do violence, and do not shed innocent blood in this place.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do what is just and right.' The Hebrew uses two terms, 'justice' and 'righteousness,' which together express faithful public and moral conduct.
    reason: lexical_alternative
  - marker: b
    text: '''Resident foreigner'' translates a term for a non-native living among Israel, often socially vulnerable; traditionally ''sojourner.'''
    reason: cultural_note
  - marker: c
    text: Or 'Do not wrong or do violence to' the resident foreigner, the fatherless, and the widow.
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - So says the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. יְהוָה is rendered 'the LORD' per doctrine for the divine name.
- source_word: עֲשׂוּ
  chosen: Do
  alternatives:
  - Practice
  - Carry out
  lexicon: HALOT
  rationale: Imperative plural of עשה. 'Do' is concise and idiomatic with the following abstract nouns.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In this ethical/governing context, מִשְׁפָּט refers to just legal and social practice rather than a judicial verdict alone.
- source_word: וּצְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: Paired with מִשְׁפָּט, צְדָקָה carries the sense of uprightness/right order. 'Righteousness' preserves the lexical distinction while remaining natural in English.
- source_word: וְהַצִּילוּ
  chosen: deliver
  alternatives:
  - rescue
  - save
  lexicon: HALOT
  rationale: Hiphil imperative of נצל, calling for active intervention on behalf of the victim. 'Deliver' fits both legal and social contexts.
- source_word: גָזוּל
  chosen: the robbed person
  alternatives:
  - the one who has been robbed
  - the plundered one
  lexicon: HALOT
  rationale: Passive participial/adjectival form referring to a person despoiled by others. 'The robbed person' is clear modern English and preserves the victim focus.
- source_word: מִיַּד עָשׁוֹק
  chosen: from the hand of the oppressor
  alternatives:
  - from the power of the oppressor
  - from the one who exploits him
  lexicon: HALOT
  rationale: '''Hand'' is retained as a vivid Hebrew idiom for power/control, and עָשׁוֹק is rendered ''oppressor'' to match the social injustice context.'
- source_word: גֵר
  chosen: resident foreigner
  alternatives:
  - sojourner
  - alien
  - foreigner
  lexicon: HALOT
  rationale: גֵר denotes a non-native residing among Israel with vulnerable social status. 'Resident foreigner' is more precise and accessible than archaic 'sojourner' or potentially misleading 'alien'.
- source_word: יָתוֹם
  chosen: the fatherless
  alternatives:
  - the orphan
  lexicon: HALOT
  rationale: Traditional covenantal triad often uses 'fatherless'; it reflects the Hebrew term's focus on paternal loss and social vulnerability.
- source_word: אַלְמָנָה
  chosen: the widow
  lexicon: HALOT
  rationale: Straightforward rendering of the vulnerable social category.
- source_word: אַל תֹּנוּ
  chosen: Do not oppress
  alternatives:
  - Do not mistreat
  lexicon: HALOT
  rationale: From ינה in the causative/imperfect jussive prohibition sense, referring to exploitative mistreatment. 'Oppress' best matches the legal-social force.
- source_word: אַל תַּחְמֹסוּ
  chosen: or do violence to
  alternatives:
  - or wrong
  - or treat violently
  - or rob
  lexicon: HALOT
  rationale: חמס often denotes violent wrongdoing or ruthless injustice. Because 'Do not oppress' already renders the previous verb, 'do violence to' preserves the intensification and avoids flattening the pair into a single idea.
- source_word: דָם נָקִי
  chosen: innocent blood
  alternatives:
  - the blood of the innocent
  lexicon: HALOT
  rationale: Established idiom for unjust killing; concise and natural in English.
- source_word: אַל תִּשְׁפְּכוּ
  chosen: do not shed
  alternatives:
  - do not pour out
  lexicon: HALOT
  rationale: Standard idiomatic rendering with 'blood' in English and Hebrew alike.
- source_word: בַּמָּקוֹם הַזֶּה
  chosen: in this place
  alternatives:
  - in this המקום
  - here
  lexicon: HALOT
  rationale: Retains the deictic force of Jeremiah's temple/palace setting without over-specifying beyond the text.
