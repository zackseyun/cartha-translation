theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to collapse מִשְׁפָּט וּצְדָקָה into a single English concept
  chosen_reading: Do justice and righteousness
  alternative_readings:
  - Do what is just and right
  rationale: The Hebrew uses two coordinated ethical terms. Preserving both maintains the prophetic emphasis and avoids reducing the pair to a smoother but less transparent idiom.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5'
- issue: How to represent the paired prohibitions אַל תֹּנוּ אַל תַּחְמֹסוּ
  chosen_reading: Do not oppress or do violence to
  alternative_readings:
  - Do no wrong or violence to
  - Do not mistreat or exploit
  rationale: The two verbs overlap but are not identical; the translation preserves the rhetorical intensification rather than merging them into one generalized prohibition.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
