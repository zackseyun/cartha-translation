theological_decisions:
- issue: Anthropological metaphor in כִּלְיוֹתֵיהֶם
  chosen_reading: Translate idiomatically as 'their innermost being' rather than anatomically
    as 'their kidneys.'
  alternative_readings:
  - their kidneys
  - their hearts
  - their inward parts
  rationale: The verse contrasts outward speech with inward reality before God. In
    Hebrew, 'kidneys' can represent the hidden inner person. Rendering the metaphor
    dynamically here best serves optimal equivalence and readability while preserving
    the contrast; a literal alternative is worth noting for auditability.
  doctrine_reference: Translation philosophy §6; §1 original-language primacy; §5
    consistency with documented exception
