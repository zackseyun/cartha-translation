id: JER.12.2
reference: Jeremiah 12:2
source:
  edition: WLC
  text: נְטַעְתָּ/ם֙ גַּם שֹׁרָ֔שׁוּ יֵלְכ֖וּ גַּם עָ֣שׂוּ פֶ֑רִי קָר֤וֹב אַתָּה֙
    בְּ/פִי/הֶ֔ם וְ/רָח֖וֹק מִ/כִּלְיוֹתֵי/הֶֽם־־׃
translation:
  text: You planted them; they have even taken root. They go on; they even produce
    fruit. You are near in their mouth, but far from their innermost being.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'far from their kidneys,' a Hebrew expression for the
      inner self or hidden motives.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְטַעְתָּם
  chosen: You planted them
  alternatives:
  - You have planted them
  lexicon: HALOT
  rationale: Qal perfect 2ms with 3mp suffix from נטע, addressing God directly. Simple
    past fits the poetic complaint in English while preserving the direct divine agency.
- source_word: שֹׁרָשׁוּ
  chosen: have even taken root
  alternatives:
  - have rooted themselves
  - have struck root
  lexicon: HALOT
  rationale: From שׁרשׁ, 'to take root.' The adverb גַּם adds emphasis ('even/also').
    'Taken root' is idiomatic English and matches the agricultural metaphor.
- source_word: יֵלְכוּ
  chosen: They go on
  alternatives:
  - they advance
  - they continue
  - they prosper
  lexicon: HALOT
  rationale: הלך literally means 'go/walk.' In this context after 'taken root' and
    before 'produce fruit,' it likely conveys continued progress or thriving. 'They
    go on' preserves the verbal image without overinterpreting as explicit prosperity.
- source_word: עָשׂוּ פֶרִי
  chosen: they even produce fruit
  alternatives:
  - they bear fruit
  - they have produced fruit
  lexicon: HALOT
  rationale: עשה with פֶרִי is literally 'make/do fruit,' idiomatically 'produce/bear
    fruit.' 'Produce fruit' is natural modern English; גַּם again is represented by
    'even.'
- source_word: קָרוֹב אַתָּה בְּפִיהֶם
  chosen: You are near in their mouth
  alternatives:
  - You are near on their lips
  - You are close in their speech
  lexicon: HALOT
  rationale: The phrase contrasts verbal profession with inward reality. 'In their
    mouth' is slightly more formal/literal than 'on their lips' and preserves the
    Hebrew imagery.
- source_word: רָחוֹק מִכִּלְיוֹתֵיהֶם
  chosen: far from their innermost being
  alternatives:
  - far from their kidneys
  - far from their hearts
  - far from their inward parts
  lexicon: HALOT
  rationale: כִּלְיָה literally means 'kidney,' but in Hebrew anthropology it denotes
    the inner self, especially hidden motives/affections. 'Innermost being' communicates
    the sense in readable modern English without flattening the anthropological metaphor.
    A more literal alternative is preserved in a footnote.
