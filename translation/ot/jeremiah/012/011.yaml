theological_decisions:
- issue: Referent of אֶרֶץ
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: The verse speaks of the devastation of Judah/YHWH's heritage in the immediate
    literary context, so 'land' best reflects the local-national referent without
    universalizing the judgment.
  doctrine_reference: Translation philosophy §1, §5
- issue: Generic masculine אִישׁ
  chosen_reading: no man
  alternative_readings:
  - no one
  - no person
  rationale: The Hebrew uses a grammatically masculine singular with generic force.
    Following the project's gender-accurate-over-gender-neutral policy, the translation
    preserves 'man' rather than flattening to an ungendered abstraction.
  doctrine_reference: Translation philosophy §4
