id: JER.12.11
reference: Jeremiah 12:11
source:
  edition: WLC
  text: שָׂמָ/הּ֙ לִ/שְׁמָמָ֔ה אָבְלָ֥ה עָלַ֖/י שְׁמֵמָ֑ה נָשַׁ֨מָּה֙ כָּל הָ/אָ֔רֶץ
    כִּ֛י אֵ֥ין אִ֖ישׁ שָׂ֥ם עַל לֵֽב־־׃
translation:
  text: They have made it a desolation; it mourns before me, desolate. The whole land
    is laid waste, because no man takes it to heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He has made it a desolation,' preserving the Hebrew singular verb; the
      English plural 'They have made it' reflects the likely contextual subject from
      the preceding lines.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'no man sets it upon the heart,' an idiom meaning 'no one takes it
      seriously' or 'no one takes it to heart.'
    reason: lexical_alternative
  - marker: c
    text: '''Land'' could also be rendered ''earth,'' but here likely refers specifically
      to the devastated land of Judah.'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׂמָהּ
  chosen: They have made it
  alternatives:
  - He has made it
  - One has made it
  lexicon: HALOT
  rationale: From שׂוּם, 'to set/place/make.' The 3ms verb with 3fs suffix literally
    reads 'he has made/set her/it,' but in context the subject is best understood
    as the previously mentioned destroyers/plunderers, so English plural 'they' makes
    the discourse sense explicit while preserving the active causation.
- source_word: לִשְׁמָמָה
  chosen: a desolation
  alternatives:
  - into a wasteland
  - for desolation
  lexicon: HALOT
  rationale: שְׁמָמָה denotes devastation/desolation. 'A desolation' preserves the
    nominal force and the prophetic register better than a more interpretive paraphrase.
- source_word: אָבְלָה
  chosen: it mourns
  alternatives:
  - she mourns
  - it lies in mourning
  lexicon: HALOT
  rationale: The verb אבל means 'to mourn.' English 'it' is used because the referent
    is the land/heritage, grammatically feminine in Hebrew but naturally rendered
    as an inanimate referent in English.
- source_word: עָלַי
  chosen: before me
  alternatives:
  - over me
  - to me
  lexicon: HALOT
  rationale: 'Though עַל commonly means ''upon/over,'' with verbs of lament in divine
    speech it can convey the sense of being before or in the presence of the speaker.
    ''Before me'' gives the most natural English sense here: the land lies mourning
    in God''s sight.'
- source_word: שְׁמֵמָה
  chosen: desolate
  alternatives:
  - appallingly desolate
  - devastated
  lexicon: HALOT
  rationale: Adjectival form meaning 'desolate/devastated.' Rendering it as a predicate
    adjective after 'it mourns' preserves the terse Hebrew apposition.
- source_word: נָשַׁמָּה
  chosen: is laid waste
  alternatives:
  - is desolated
  - is devastated
  lexicon: HALOT
  rationale: From a verb related to becoming desolate. 'Is laid waste' is idiomatic
    modern English and matches the passive/resultative sense.
- source_word: כָּל הָאָרֶץ
  chosen: The whole land
  alternatives:
  - All the land
  - The whole הארץ/earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In Jeremiah's immediate context of
    Judah's devastation, 'land' is more contextually precise than the cosmic 'earth.'
- source_word: כִּי אֵין אִישׁ
  chosen: because no man
  alternatives:
  - for there is no one
  - because no person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine generic. Per the project's gender-accurate
    policy, 'no man' preserves the source form and representative force better than
    an abstract neutralization.
- source_word: שָׂם עַל לֵב
  chosen: takes it to heart
  alternatives:
  - sets it upon his heart
  - pays attention
  lexicon: HALOT
  rationale: This Hebrew idiom means to take something seriously, inwardly consider
    it. 'Takes it to heart' is a natural English equivalent that preserves the heart-language
    of the original.
