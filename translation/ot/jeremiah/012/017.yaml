id: JER.12.17
reference: Jeremiah 12:17
source:
  edition: WLC
  text: וְ/אִ֖ם לֹ֣א יִשְׁמָ֑עוּ וְ/נָ֨תַשְׁתִּ֜י אֶת הַ/גּ֥וֹי הַ/ה֛וּא נָת֥וֹשׁ
    וְ/אַבֵּ֖ד נְאֻם יְהוָֽה־־׃ס
translation:
  text: But if they do not listen, then I will utterly uproot and destroy that nation,
    declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'But if they do not obey.' The Hebrew verb can mean both 'listen' and
      'obey' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the previous verse. 'But if' captures
    the adversative force in context better than a simple 'and if.'
- source_word: לֹא יִשְׁמָעוּ
  chosen: they do not listen
  alternatives:
  - they do not obey
  - they will not listen
  lexicon: HALOT
  rationale: שׁמע commonly means 'hear/listen' and by extension 'obey.' In this context
    of responding to the LORD's instruction, 'listen' preserves the Hebrew wording
    while allowing the obedience nuance to remain implicit. Present English in the
    protasis is natural for a future condition.
- source_word: וְנָתַשְׁתִּי
  chosen: then I will ... uproot
  alternatives:
  - I will pluck up
  - I will tear out
  lexicon: HALOT
  rationale: נתשׁ is a key Jeremiah verb for pulling up by the roots, often used in
    judgment or reversal of planting imagery. 'Uproot' is vivid, natural English and
    preserves the agricultural metaphor better than 'destroy' alone.
- source_word: הַגּוֹי הַהוּא
  chosen: that nation
  alternatives:
  - that people
  - that Gentile nation
  lexicon: HALOT
  rationale: גּוֹי here refers to a national entity among the surrounding peoples.
    'Nation' is the most straightforward rendering in context.
- source_word: נָתוֹשׁ
  chosen: utterly uproot
  alternatives:
  - surely uproot
  - uprooting uproot
  lexicon: HALOT
  rationale: The infinitive absolute of נתשׁ intensifies the finite verb. English
    cannot mirror the form directly, so 'utterly uproot' conveys the emphatic force.
- source_word: וְאַבֵּד
  chosen: and destroy
  alternatives:
  - and make perish
  - and wipe out
  lexicon: HALOT
  rationale: אבד in the causative sense expresses causing to perish or destroying.
    'Destroy' is idiomatic and suitably forceful alongside 'uproot.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is well represented by 'declares the LORD.' It
    preserves the solemnity of the utterance. 'the LORD' follows the project's default
    rendering for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
