id: JER.12.6
reference: Jeremiah 12:6
source:
  edition: WLC
  text: כִּ֧י גַם אַחֶ֣י/ךָ וּ/בֵית אָבִ֗י/ךָ גַּם הֵ֨מָּה֙ בָּ֣גְדוּ בָ֔/ךְ גַּם
    הֵ֛מָּה קָרְא֥וּ אַחֲרֶ֖י/ךָ מָלֵ֑א אַל תַּאֲמֵ֣ן בָּ֔/ם כִּֽי יְדַבְּר֥וּ אֵלֶ֖י/ךָ
    טוֹבֽוֹת־־־־־־׃ס
translation:
  text: For even your brothers and your father’s house—even they have dealt treacherously
    with you; even they have cried out loudly after you. Do not trust them, though
    they speak good things to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have called after you at full voice,' possibly implying a hostile public
      outcry or pursuit.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your brothers' is grammatically masculine; in context it refers
      to Jeremiah’s close male kin, alongside 'your father’s house' for the wider
      household.
    reason: cultural_note
lexical_decisions:
- source_word: אַחֶיךָ
  chosen: your brothers
  alternatives:
  - your kin
  - your brothers and sisters
  lexicon: HALOT
  rationale: Literal familial term from אָח in masculine plural construct with 2ms
    suffix. 'Brothers' preserves the source's gendered form per the gender-accurate
    policy; broader kinship senses are possible but less direct here.
- source_word: וּבֵית אָבִיךָ
  chosen: and your father’s house
  alternatives:
  - and your family
  - and your paternal household
  lexicon: HALOT
  rationale: Formal household/clan expression. 'Father’s house' preserves the idiom
    and its social force better than the flatter 'family,' while remaining understandable
    in English.
- source_word: בָּגְדוּ בָךְ
  chosen: have dealt treacherously with you
  alternatives:
  - have betrayed you
  - have been faithless to you
  lexicon: HALOT
  rationale: בגד commonly denotes treachery, betrayal, or faithlessness. 'Dealt treacherously'
    best captures the moral weight and common prophetic usage without narrowing it
    to a single act.
- source_word: קָרְאוּ אַחֲרֶיךָ מָלֵא
  chosen: have cried out loudly after you
  alternatives:
  - have called after you at full voice
  - have raised a full cry behind you
  - have shouted after you
  lexicon: HALOT
  rationale: קרא with אַחֲרֵי can mean calling out after someone; מָלֵא adverbially
    intensifies the action ('fully,' 'with full voice'). The phrase likely conveys
    hostile public outcry or pursuit. 'Cried out loudly after you' preserves the imagery
    while remaining natural English.
- source_word: אַל תַּאֲמֵן בָּם
  chosen: Do not trust them
  alternatives:
  - Do not believe them
  - Do not put confidence in them
  lexicon: HALOT
  rationale: אמן in the Hiphil often means to trust or believe. Given the personal
    context and warning about deceptive speech, 'trust' is the best fit.
- source_word: כִּי יְדַבְּרוּ אֵלֶיךָ טוֹבוֹת
  chosen: though they speak good things to you
  alternatives:
  - for they speak kindly to you
  - even if they speak pleasant words to you
  lexicon: HALOT
  rationale: טוֹבוֹת here refers to favorable or pleasant speech. 'Good things' stays
    close to the Hebrew while signaling outwardly benevolent words. Rendering כִּי
    as 'though' captures the concessive force in context after the prohibition.
