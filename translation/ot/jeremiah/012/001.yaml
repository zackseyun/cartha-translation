theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tone of Jeremiah's address to God in כִּי אָרִיב אֵלֶיךָ
  chosen_reading: legal complaint framed reverently ('when I bring a case before you')
  alternative_readings:
  - direct contention ('though I contend with you')
  rationale: The verse combines an affirmation of God's righteousness with a bold challenge about justice. The chosen rendering preserves that tension without making Jeremiah sound irreverent or softening the legal imagery away.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
