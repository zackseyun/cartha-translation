id: JER.12.1
reference: Jeremiah 12:1
source:
  edition: WLC
  text: צַדִּ֤יק אַתָּה֙ יְהוָ֔ה כִּ֥י אָרִ֖יב אֵלֶ֑י/ךָ אַ֤ךְ מִשְׁפָּטִים֙ אֲדַבֵּ֣ר אוֹתָ֔/ךְ מַדּ֗וּעַ דֶּ֤רֶךְ רְשָׁעִים֙ צָלֵ֔חָה שָׁל֖וּ כָּל בֹּ֥גְדֵי בָֽגֶד־׃
translation:
  text: 'You are righteous, O Yahweh, when I bring a case before you; yet I would speak with you about matters of justice: Why does the way of the wicked prosper? Why are all who deal treacherously at ease?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'though I contend with you'; the Hebrew verb can carry the sense of contending or pleading a legal case.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'judgments' or 'justice'; the plural likely refers to matters or cases concerning justice.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'all the treacherous of treachery,' an intensified expression for those who act very treacherously.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: Predicate adjective describing the LORD's moral rightness. 'Righteous' preserves the covenantal and theological weight better than the more juridical-only 'just,' though the legal setting remains present in the verse.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Rendered 'LORD' per project doctrine for the divine name יְהוָה, following established reverential convention and the stated default.
- source_word: כִּי אָרִיב אֵלֶיךָ
  chosen: when I bring a case before you
  alternatives:
  - though I contend with you
  - if I plead with you
  lexicon: HALOT
  rationale: ריב in the Qal can denote contending, pleading, or conducting a legal case. In context with מִשְׁפָּטִים ('matters of justice/judgments'), the legal nuance is prominent. 'When I bring a case before you' preserves Jeremiah's bold but reverent legal complaint without implying hostile rebellion.
- source_word: אַךְ
  chosen: yet
  alternatives:
  - nevertheless
  - surely
  - only
  lexicon: HALOT
  rationale: 'Here אַךְ marks a concessive transition: despite affirming God''s righteousness, the speaker proceeds to raise a complaint. ''Yet'' is concise and natural in English.'
- source_word: מִשְׁפָּטִים
  chosen: matters of justice
  alternatives:
  - judgments
  - justice
  - legal matters
  lexicon: HALOT
  rationale: Plural מִשְׁפָּטִים likely refers to issues or cases pertaining to justice rather than discrete 'judgments' only. 'Matters of justice' captures both the legal and moral dimensions in readable English.
- source_word: אֲדַבֵּר אוֹתָךְ
  chosen: I would speak with you
  alternatives:
  - I will speak with you
  - I would speak to you
  - I would reason with you
  lexicon: HALOT
  rationale: The idiom conveys addressing God in discourse. 'With you' fits the dialogical force of the complaint. 'Would speak' reflects the volitional nuance in context better than a simple future.
- source_word: מַדּוּעַ
  chosen: Why
  lexicon: HALOT
  rationale: Direct interrogative introducing the complaint.
- source_word: דֶּרֶךְ רְשָׁעִים
  chosen: the way of the wicked
  alternatives:
  - the path of the wicked
  lexicon: HALOT
  rationale: A common Hebrew idiom for course of life or manner of conduct. 'Way' is the most idiomatic and biblically resonant English rendering.
- source_word: צָלֵחָה
  chosen: prosper
  alternatives:
  - succeeds
  - thrives
  lexicon: HALOT
  rationale: The verb denotes succeeding or prospering. 'Prosper' best matches the traditional problem of the apparent success of the wicked.
- source_word: שָׁלוּ
  chosen: are at ease
  alternatives:
  - are secure
  - have peace
  - are undisturbed
  lexicon: HALOT
  rationale: From שלה, conveying quietness, ease, or security. 'Are at ease' fits the complaint context and avoids overstating covenantal 'peace' language.
- source_word: בֹּגְדֵי בָגֶד
  chosen: who deal treacherously
  alternatives:
  - the treacherous
  - who are utterly faithless
  - traitors
  lexicon: HALOT
  rationale: The participle plus cognate noun intensifies the idea of treachery. 'Who deal treacherously' preserves the verbal force and the Hebrew emphasis without becoming wooden.
