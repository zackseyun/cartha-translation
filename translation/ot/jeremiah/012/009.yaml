theological_decisions:
- issue: Referent of 'my inheritance'
  chosen_reading: Rendered generically as 'my inheritance' without specifying Judah,
    Jerusalem, the land, or the people in the translation itself.
  alternative_readings:
  - Judah
  - Jerusalem
  - the land
  - the covenant people
  rationale: The Hebrew leaves the referent implicit in the immediate wording, though
    context points to YHWH's people/land under judgment. The translation preserves
    that textual openness rather than importing a narrower interpretive identification
    into the verse itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
