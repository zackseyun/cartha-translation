id: JER.12.9
reference: Jeremiah 12:9
source:
  edition: WLC
  text: הַ/עַ֨יִט צָב֤וּעַ נַחֲלָתִ/י֙ לִ֔/י הַ/עַ֖יִט סָבִ֣יב עָלֶ֑י/הָ לְכ֗וּ אִסְפ֛וּ
    כָּל חַיַּ֥ת הַ/שָּׂדֶ֖ה הֵתָ֥יוּ לְ/אָכְלָֽה־׃
translation:
  text: Is my inheritance to me a speckled bird of prey? Are the birds of prey all
    around her? Go, gather all the beasts of the field; bring them to devour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hyena.' Some interpreters take the repeated Hebrew word עַיִט here in
      connection with a predator such as a hyena, yielding a sense like 'Is my inheritance
      to me like a speckled hyena?' The main text follows the more common sense 'bird
      of prey.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'Is my inheritance to me a speckled bird of prey? the
      bird of prey around her.' The singular 'bird of prey' may function collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעַיִט
  chosen: bird of prey
  alternatives:
  - hyena
  lexicon: HALOT
  rationale: The noun עַיִט commonly denotes a bird of prey or carrion bird in biblical
    usage. Although some have proposed 'hyena' in this verse, the parallel with 'all
    the beasts of the field' being summoned against it fits better if the first image
    is avian. Rendering it 'bird of prey' preserves the zoological imagery without
    over-specifying species.
- source_word: צָבוּעַ
  chosen: speckled
  alternatives:
  - colored
  - striped
  - hyena-like
  lexicon: HALOT
  rationale: The adjective conveys variegated or marked coloration. 'Speckled' is
    idiomatic in English and preserves the sense of something unusually marked, which
    explains the hostility of surrounding predators.
- source_word: נַחֲלָתִי
  chosen: my inheritance
  alternatives:
  - my heritage
  - my possession
  lexicon: HALOT
  rationale: נַחֲלָה often refers to an inherited possession or heritage. 'My inheritance'
    is a transparent rendering and preserves covenantal overtones of YHWH's people/land
    as his allotted possession.
- source_word: לִי
  chosen: to me
  alternatives:
  - for me
  lexicon: HALOT
  rationale: 'The dative is retained in English as ''to me'' to preserve the rhetorical
    force: ''Is my inheritance to me like...?'' This slightly formal phrasing reflects
    the Hebrew structure better than smoothing it away entirely.'
- source_word: הַעַיִט סָבִיב עָלֶיהָ
  chosen: the birds of prey all around her
  alternatives:
  - the bird of prey is all around her
  - the birds circle around her
  lexicon: HALOT
  rationale: 'Although עַיִט is singular in form, the phrase is best taken collectively:
    predatory birds surrounding her. English pluralizes for natural sense while preserving
    the image of hostile scavengers encircling the inheritance.'
- source_word: לְכוּ אִסְפוּ
  chosen: Go, gather
  alternatives:
  - Come, assemble
  - Go, collect
  lexicon: HALOT
  rationale: The two imperatives form a summons. 'Go, gather' is direct and natural,
    preserving the prophetic call to assemble attackers.
- source_word: כָּל חַיַּת הַשָּׂדֶה
  chosen: all the beasts of the field
  alternatives:
  - all the wild animals of the field
  - all the animals of the countryside
  lexicon: HALOT
  rationale: This is a common biblical expression for wild animals. 'Beasts of the
    field' preserves the register and intertextual resonance while remaining understandable.
- source_word: הֵתָיוּ לְאָכְלָה
  chosen: bring them to devour
  alternatives:
  - bring them for food
  - cause them to come for devouring
  - lead them to the feast
  lexicon: HALOT
  rationale: The imperative plus infinitive/noun of eating expresses bringing the
    beasts for the purpose of consuming prey. 'Bring them to devour' captures the
    predatory force more clearly than the more wooden 'bring them for food.'
