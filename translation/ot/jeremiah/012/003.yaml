theological_decisions:
- issue: Imprecatory petition against the wicked
  chosen_reading: Render the petition directly as a plea for divine judgment without softening the violence into mere metaphor.
  alternative_readings:
  - Interpret as figurative exposure rather than execution
  - Soften to 'prepare them for judgment' without slaughter imagery
  rationale: The Hebrew explicitly uses slaughter/killing imagery. Optimal equivalence requires preserving the severity of Jeremiah's appeal while not importing extra theological justification beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
