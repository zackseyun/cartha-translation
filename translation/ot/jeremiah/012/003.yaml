id: JER.12.3
reference: Jeremiah 12:3
source:
  edition: WLC
  text: וְ/אַתָּ֤ה יְהוָה֙ יְדַעְתָּ֔/נִי תִּרְאֵ֕/נִי וּ/בָחַנְתָּ֥ לִבִּ֖/י אִתָּ֑/ךְ הַתִּקֵ/ם֙ כְּ/צֹ֣אן לְ/טִבְחָ֔ה וְ/הַקְדִּשֵׁ֖/ם לְ/י֥וֹם הֲרֵגָֽה׃ס
translation:
  text: But you, O Yahweh, know me; you see me, and you test my heart toward you. Pull them out like sheep for slaughter, and set them apart for the day of killing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my heart is with you.' The Hebrew phrase is compact and may express Jeremiah's inward orientation or loyalty in relation to the LORD.
    reason: alternative_reading
  - marker: b
    text: Or 'consecrate them'—literally 'set them apart,' here for judgment rather than blessing.
    reason: lexical_alternative
  - marker: c
    text: Or 'for the day of slaughter.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: יְדַעְתָּנִי
  chosen: know me
  alternatives:
  - have known me
  lexicon: HALOT
  rationale: The perfect can be rendered as present-resultative in English here. In context Jeremiah contrasts God's true knowledge of him with the wicked; simple present 'know me' is the most natural and faithful English.
- source_word: תִּרְאֵנִי
  chosen: you see me
  alternatives:
  - you look at me
  lexicon: HALOT
  rationale: ראָה here carries the sense of perceptive seeing, not merely physical sight. 'You see me' is idiomatic and fits the parallel with 'know me' and 'test.'
- source_word: וּבָחַנְתָּ לִבִּי
  chosen: you test my heart
  alternatives:
  - you examine my heart
  - you have tested my heart
  lexicon: HALOT
  rationale: בחן commonly denotes testing or examining, especially inward character. 'Test my heart' preserves the metaphor and keeps the triad concise.
- source_word: אִתָּךְ
  chosen: toward you
  alternatives:
  - with you
  - before you
  lexicon: HALOT
  rationale: The phrase after 'my heart' is syntactically difficult. 'Toward you' best conveys relational orientation of Jeremiah's inner life in context. 'With you' is more literal but less clear in English; the alternative is preserved in a footnote because the phrase is genuinely debatable.
- source_word: הַתִּקֵם
  chosen: Drag them away
  alternatives:
  - Pull them out
  - Tear them away
  - Move them
  lexicon: HALOT
  rationale: From נתק in the Hiphil, the sense is to pull/drag away. In this imprecatory context, 'Drag them away' vividly fits the comparison to sheep being led to slaughter.
- source_word: כְּצֹאן לְטִבְחָה
  chosen: like sheep for slaughter
  alternatives:
  - like a flock for slaughter
  lexicon: HALOT
  rationale: A standard sacrificial/slaughter image. 'Sheep for slaughter' is idiomatic English and preserves the simile's force.
- source_word: וְהַקְדִּשֵׁם
  chosen: set them apart
  alternatives:
  - consecrate them
  - prepare them
  lexicon: HALOT
  rationale: קדש in Hiphil literally means to set apart/consecrate. Because the object is the wicked marked out for judgment, 'set them apart' preserves the lexical sense without implying positive holiness. 'Consecrate' is possible but may sound misleadingly positive; preserved in a footnote as a lexical alternative.
- source_word: לְיוֹם הֲרֵגָה
  chosen: for the day of killing
  alternatives:
  - for the day of slaughter
  - for the day of slaughtering
  lexicon: HALOT
  rationale: הרגה denotes killing/slaughter. 'Day of killing' is direct and natural, while retaining the grim judicial tone. 'Day of slaughter' is also possible and is preserved in a footnote as a lexical alternative.
