theological_decisions:
- issue: Divine attitude expressed by שְׂנֵאתִיהָ
  chosen_reading: Render the verb directly as 'I hate her' without softening.
  alternative_readings:
  - I have rejected her
  - I have come to hate her
  rationale: The verse depicts YHWH speaking of his inheritance in stark covenant-judgment
    language. The translation should preserve the severity and rhetorical shock of
    the Hebrew rather than dilute it into a merely administrative rejection. This
    preserves theological tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
