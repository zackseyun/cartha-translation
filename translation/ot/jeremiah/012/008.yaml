id: JER.12.8
reference: Jeremiah 12:8
source:
  edition: WLC
  text: הָיְתָה לִּ֥/י נַחֲלָתִ֖/י כְּ/אַרְיֵ֣ה בַ/יָּ֑עַר נָתְנָ֥ה עָלַ֛/י בְּ/קוֹלָ֖/הּ
    עַל כֵּ֥ן שְׂנֵאתִֽי/הָ־־׃
translation:
  text: My inheritance has become to me like a lion in the forest; she has raised
    her voice against me; therefore I hate her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'she has roared against me.' The Hebrew literally says 'she has given
      her voice against me,' an idiom for hostile outcry; the lion imagery makes 'roared'
      a plausible contextual alternative.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'she/her,' referring to 'my inheritance,' a grammatically feminine
      noun and here personified.
    reason: cultural_note
  - marker: c
    text: Or 'I have hated her.' The Hebrew verb form can be rendered as a past or
      present perfective in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחֲלָתִי
  chosen: My inheritance
  alternatives:
  - My heritage
  - My possession
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes an inheritance, heritage, or allotted possession.
    'Inheritance' preserves the covenantal and relational nuance of what belongs to
    YHWH while remaining natural English.
- source_word: כְּאַרְיֵה
  chosen: like a lion
  alternatives:
  - like a lioness
  lexicon: HALOT
  rationale: אַרְיֵה is the standard masculine form 'lion.' The comparison is simile,
    introduced by כְּ. Although the surrounding pronominal forms are feminine because
    נַחֲלָה is grammatically feminine, the animal image itself is best rendered 'lion'
    from the lexical form.
- source_word: בַיָּעַר
  chosen: in the forest
  alternatives:
  - in the thicket
  - in the woodland
  lexicon: HALOT
  rationale: יַעַר denotes forest/woodland. 'Forest' is the most straightforward and
    idiomatic rendering here.
- source_word: נָתְנָה עָלַי בְּקוֹלָהּ
  chosen: she has raised her voice against me
  alternatives:
  - she has uttered her voice against me
  - she has roared against me
  lexicon: HALOT
  rationale: Literally, 'she has given against me with her voice.' In context of the
    lion simile and hostile action, the idiom means to lift or set one's voice against
    someone. 'Raised her voice against me' preserves the hostility without over-specifying
    the metaphor. 'Roared against me' is contextually attractive but less directly
    tied to the Hebrew idiom.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: Standard inferential expression introducing the consequence of the prior
    hostility.
- source_word: שְׂנֵאתִיהָ
  chosen: I hate her
  alternatives:
  - I have hated her
  - I reject her
  lexicon: HALOT
  rationale: The qatal 1cs of שׂנא straightforwardly means 'I hated/hate.' In English,
    present 'I hate her' best fits the immediate consequence signaled by עַל כֵּן
    and avoids importing a more interpretive sense like 'reject,' though rejection
    is implicated.
- source_word: -הּ feminine pronominal suffixes
  chosen: she / her
  alternatives:
  - it
  lexicon: Hebrew grammar
  rationale: The referent 'my inheritance' (נַחֲלָה) is grammatically feminine in
    Hebrew. Rendering with 'she/her' preserves the personified portrayal in this verse
    better than impersonal 'it,' especially given the active hostility described.
