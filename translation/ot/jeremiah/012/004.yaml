id: JER.12.4
reference: Jeremiah 12:4
source:
  edition: WLC
  text: עַד מָתַי֙ תֶּאֱבַ֣ל הָ/אָ֔רֶץ וְ/עֵ֥שֶׂב כָּל הַ/שָּׂדֶ֖ה יִיבָ֑שׁ מֵ/רָעַ֣ת
    יֹֽשְׁבֵי בָ֗/הּ סָפְתָ֤ה בְהֵמוֹת֙ וָ/ע֔וֹף כִּ֣י אָמְר֔וּ לֹ֥א יִרְאֶ֖ה אֶת
    אַחֲרִיתֵֽ/נוּ־־־־׃
translation:
  text: How long will the land mourn, and the grass of every field dry up? Because
    of the evil of those who dwell in it, beasts and birds are swept away, for they
    say, “He will not see our end.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “He will not see our latter end,” or “he will not see what becomes of
      us.” The Hebrew leaves the subject implicit and the phrase 'our end' can also
      mean 'our future' or 'our outcome.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תֶּאֱבַ֣ל
  chosen: will ... mourn
  alternatives:
  - will lament
  - will wither in grief
  lexicon: HALOT
  rationale: The verb אבל commonly denotes mourning or lamenting. With 'the land'
    as subject, 'mourn' preserves the personification without over-paraphrasing.
- source_word: הָ/אָ֔רֶץ
  chosen: the land
  alternatives:
  - the earth
  - the country
  lexicon: HALOT
  rationale: In Jeremiah this often refers to the land/territory affected by covenant
    judgment rather than the whole globe. 'Land' best fits the immediate agricultural
    context.
- source_word: וְ/עֵ֥שֶׂב כָּל הַ/שָּׂדֶ֖ה
  chosen: the grass of every field
  alternatives:
  - the vegetation of every field
  - every field's grass
  lexicon: HALOT
  rationale: עֵשֶׂב is general herbage/grass. 'Grass of every field' is natural English
    and keeps the concrete agricultural imagery.
- source_word: יִיבָ֑שׁ
  chosen: dry up
  alternatives:
  - wither
  - be dried up
  lexicon: HALOT
  rationale: The verb יבש means to dry up/be dried. 'Dry up' is idiomatic and fits
    vegetation.
- source_word: מֵ/רָעַ֣ת יֹֽשְׁבֵי בָ֗/הּ
  chosen: Because of the evil of those who dwell in it
  alternatives:
  - From the wickedness of those who live in it
  - Because of the wickedness of its inhabitants
  lexicon: HALOT
  rationale: מִן here marks cause. רָעָה can mean evil/wickedness. 'Those who dwell
    in it' closely reflects the participial construction while remaining readable.
- source_word: סָפְתָ֤ה
  chosen: are swept away
  alternatives:
  - have perished
  - are consumed
  - are snatched away
  lexicon: HALOT
  rationale: From ספה, meaning to come to an end, be swept away, or be consumed. 'Are
    swept away' captures the passive/resultative sense and the judgment context.
- source_word: בְהֵמוֹת֙ וָ/ע֔וֹף
  chosen: beasts and birds
  alternatives:
  - animals and birds
  - livestock and birds
  lexicon: HALOT
  rationale: בְּהֵמוֹת here likely refers broadly to animals/beasts rather than specifically
    domesticated cattle. 'Beasts and birds' is concise and traditional without being
    archaic.
- source_word: כִּ֣י אָמְר֔וּ
  chosen: for they say
  alternatives:
  - because they say
  - for they have said
  lexicon: HALOT
  rationale: כִּי introduces the reason, and the perfect can be rendered as present
    in English where it expresses the content of the inhabitants' ongoing attitude.
- source_word: לֹ֥א יִרְאֶ֖ה
  chosen: He will not see
  alternatives:
  - he does not see
  - He will not look upon
  lexicon: HALOT
  rationale: The 3ms subject is implicit. In context it most naturally refers to God,
    but the Hebrew leaves the subject unstated. Capitalization in English signals
    the likely referent while preserving the singular pronoun.
- source_word: אַחֲרִיתֵֽ/נוּ
  chosen: our end
  alternatives:
  - our latter end
  - our future
  - what becomes of us
  lexicon: HALOT
  rationale: אַחֲרִית often means end, outcome, or latter end. 'Our end' is the most
    direct rendering and preserves the ambiguity between final outcome and future
    destiny.
