theological_decisions:
- issue: Implicit subject of יִרְאֶה
  chosen_reading: 'The pronoun refers to God: ''He will not see our end.'''
  alternative_readings:
  - '''he will not see our end'' with an unspecified subject'
  - '''He will not see our latter end/future'''
  rationale: The context concerns the speech of the wicked denying divine notice or
    judgment. English normally requires some indication of the referent; capitalization
    marks the probable divine reference without adding a noun absent from the Hebrew.
