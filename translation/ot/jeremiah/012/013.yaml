theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Understanding וּבֹשׁוּ as direct address
  chosen_reading: 'imperative addressed to the people: ''Be ashamed'''
  alternative_readings:
  - predictive/jussive-like 'you will be ashamed'
  - continuation of third person 'and they were ashamed'
  rationale: The 2mp form aligns naturally with the 2mp suffix in 'your produce' and creates a rhetorically sharp shift from description to direct denunciation, common in prophetic discourse. The ambiguity is lexical/grammatical rather than doctrinal, so the alternative is preserved in a footnote.
