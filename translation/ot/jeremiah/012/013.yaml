id: JER.12.13
reference: Jeremiah 12:13
source:
  edition: WLC
  text: זָרְע֤וּ חִטִּים֙ וְ/קֹצִ֣ים קָצָ֔רוּ נֶחְל֖וּ לֹ֣א יוֹעִ֑לוּ וּ/בֹ֨שׁוּ֙ מִ/תְּבוּאֹ֣תֵי/כֶ֔ם מֵ/חֲר֖וֹן אַף יְהוָֽה־׃ס
translation:
  text: They have sown wheat, but they have reaped thorns; they have exhausted themselves, but they profit nothing. Be ashamed of your produce because of the burning anger of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and you will be ashamed of your harvests,' if וּבֹשׁוּ is taken as predictive rather than imperative.
    reason: alternative_reading
lexical_decisions:
- source_word: זָרְעוּ
  chosen: they have sown
  alternatives:
  - they sowed
  lexicon: HALOT
  rationale: Qal perfect 3cp of זרע, straightforwardly 'sow.' English present perfect fits the prophetic description of completed action with present consequence.
- source_word: חִטִּים
  chosen: wheat
  alternatives:
  - grain
  lexicon: HALOT
  rationale: Specific crop term; 'wheat' is the plain lexical sense and preserves the contrast with the worthless harvest.
- source_word: וְקֹצִים
  chosen: but ... thorns
  alternatives:
  - and thorns
  - briers
  lexicon: HALOT
  rationale: קֹצִים means 'thorns.' Although waw is formally 'and,' English idiom and the antithetical sense of the line are better conveyed by 'but.'
- source_word: קָצָרוּ
  chosen: they have reaped
  alternatives:
  - they harvested
  lexicon: HALOT
  rationale: Qal perfect of קצר in the harvesting sense. 'Reaped' preserves the agricultural parallelism with 'sown.'
- source_word: נֶחְלוּ
  chosen: they have worn themselves out
  alternatives:
  - they are exhausted
  - they have become sick
  - they have inherited
  lexicon: HALOT
  rationale: From חלה in the Niphal, here best understood as becoming weak/exhausted from toil. 'Inherited' would derive from נחל and does not fit the syntax or context. The sense is labor expended to no benefit.
- source_word: לֹא יוֹעִלוּ
  chosen: they profit nothing
  alternatives:
  - they do not benefit
  - it does not avail
  lexicon: HALOT
  rationale: Hiphil of יעל means to profit/benefit. English singular or plural could work; 'they profit nothing' matches the plural subject carried through the verse.
- source_word: וּבֹשׁוּ
  chosen: Be ashamed
  alternatives:
  - and be ashamed
  - you will be ashamed
  - they are ashamed
  lexicon: HALOT
  rationale: Form is best taken as imperative masculine plural in context, shifting from third-person description to direct address. This yields a forceful prophetic exhortation/judgment. Because the form can be discussed, an alternative is preserved in a footnote.
- source_word: מִתְּבוּאֹתֵיכֶם
  chosen: of your produce
  alternatives:
  - because of your harvests
  - from your crops
  lexicon: HALOT
  rationale: תְּבוּאָה denotes produce/yield/harvest. 'Produce' is natural modern English and broad enough for the plural construct with 2mp suffix.
- source_word: מֵחֲרוֹן אַף
  chosen: because of the burning anger
  alternatives:
  - from the fierce anger
  - because of the heat of anger
  - because of the wrath
  lexicon: HALOT
  rationale: The idiom חֲרוֹן אַף conveys burning/fierce anger. 'Burning anger' preserves the metaphor more transparently than simply 'wrath.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
