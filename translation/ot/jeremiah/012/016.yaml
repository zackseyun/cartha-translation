theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in an oath formula. Per project
    doctrine, the default rendering is 'the LORD,' following Jewish reverence tradition
    and longstanding translation practice while preserving the distinction through
    capitalization.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Meaning of וְנִבְנוּ בְּתוֹךְ עַמִּי
  chosen_reading: incorporation/establishment within God's people
  alternative_readings:
  - physical rebuilding among my people
  - prospering among my people
  rationale: 'The immediate context concerns foreign nations who formerly led Judah
    astray but may now learn true allegiance to the LORD. The passive ''be built up''
    is retained to preserve the metaphor and theological openness: it suggests establishment
    within the covenant community without over-specifying ethnicity, conversion mechanics,
    or merely material prosperity.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
