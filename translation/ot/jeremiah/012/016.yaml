id: JER.12.16
reference: Jeremiah 12:16
source:
  edition: WLC
  text: וְ/הָיָ֡ה אִם לָמֹ֣ד יִלְמְדוּ֩ אֶת דַּֽרְכֵ֨י עַמִּ֜/י לְ/הִשָּׁבֵ֤עַ בִּ/שְׁמִ/י֙
    חַי יְהוָ֔ה כַּ/אֲשֶׁ֤ר לִמְּדוּ֙ אֶת עַמִּ֔/י לְ/הִשָּׁבֵ֖עַ בַּ/בָּ֑עַל וְ/נִבְנ֖וּ
    בְּ/ת֥וֹךְ עַמִּֽ/י־־־־׃
translation:
  text: And it will happen that if they diligently learn the ways of my people, to
    swear by my name, ‘As the LORD lives,’ just as they taught my people to swear
    by Baal, then they will be built up in the midst of my people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'surely learn' or 'fully learn'; the Hebrew uses an infinitive absolute
      with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew oath formula: ''As the LORD lives.'' Also rendered, ''The LORD lives.'''
    reason: lexical_alternative
  - marker: c
    text: Or, 'they will be established among my people.' The Hebrew literally says
      'they will be built up in the midst of my people.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall come to pass
  - And it will be
  lexicon: HALOT
  rationale: Introduces a future-result clause idiomatically. 'It shall come to pass'
    is traditional but archaic; 'it will happen' preserves the discourse function
    in readable modern English.
- source_word: אִם
  chosen: if
  lexicon: HALOT
  rationale: Standard conditional particle introducing the protasis.
- source_word: לָמֹד יִלְמְדוּ
  chosen: diligently learn
  alternatives:
  - surely learn
  - indeed learn
  - fully learn
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. 'Diligently
    learn' captures the emphatic force in natural English without awkward literalism.
- source_word: דַּרְכֵי עַמִּי
  chosen: the ways of my people
  alternatives:
  - the practices of my people
  - the customs of my people
  lexicon: HALOT
  rationale: '''Ways'' is the most direct rendering of דֶּרֶךְ in this plural idiomatic
    sense and preserves the moral-religious nuance of conduct and worship.'
- source_word: לְהִשָּׁבֵעַ בִּשְׁמִי
  chosen: to swear by my name
  alternatives:
  - to take an oath by my name
  lexicon: HALOT
  rationale: Directly reflects the infinitive construction and covenantal/oath language.
    'Swear by my name' is concise and idiomatic.
- source_word: חַי יְהוָה
  chosen: ‘As the LORD lives,’
  alternatives:
  - ‘The LORD lives,’
  lexicon: HALOT
  rationale: This is the standard oath formula. English idiom commonly renders it
    'As the LORD lives,' preserving its performative oath force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - in the same way that
  lexicon: HALOT
  rationale: Marks comparison between their former corrupting influence and their
    hoped-for reformation.
- source_word: לִמְּדוּ אֶת עַמִּי
  chosen: they taught my people
  alternatives:
  - they trained my people
  lexicon: HALOT
  rationale: Simple past reference to the nations' prior influence leading Judah into
    idolatrous oath-taking.
- source_word: לְהִשָּׁבֵעַ בַּבָּעַל
  chosen: to swear by Baal
  alternatives:
  - to swear allegiance by Baal
  lexicon: HALOT
  rationale: Keeps the parallel with 'swear by my name' and preserves the idolatrous
    contrast.
- source_word: וְנִבְנוּ
  chosen: then they will be built up
  alternatives:
  - then they will be established
  - then they will be rebuilt
  lexicon: HALOT
  rationale: Passive of בנה here is metaphorical for being established/restored within
    the covenant community. 'Built up' preserves the building metaphor and allows
    the communal sense to remain visible.
- source_word: בְּתוֹךְ עַמִּי
  chosen: in the midst of my people
  alternatives:
  - among my people
  lexicon: HALOT
  rationale: '''In the midst of'' is slightly more formal but accurately reflects
    בתוך and the imagery of incorporation within the community.'
