theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of אֶרֶץ
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: The verse could be read universally, but in Jeremiah 12 the judgment focus is the devastated land of Judah. 'Land' preserves contextual specificity without denying broader theological implications.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation tradition
