id: JER.12.12
reference: Jeremiah 12:12
source:
  edition: WLC
  text: עַֽל כָּל שְׁפָיִ֣ם בַּ/מִּדְבָּ֗ר בָּ֚אוּ שֹֽׁדְדִ֔ים כִּ֣י חֶ֤רֶב לַֽ/יהוָה֙ אֹֽכְלָ֔ה מִ/קְצֵה אֶ֖רֶץ וְ/עַד קְצֵ֣ה הָ/אָ֑רֶץ אֵ֥ין שָׁל֖וֹם לְ/כָל בָּשָֽׂר־־־־־׃ס
translation:
  text: Upon all the bare heights in the wilderness destroyers have come, for the sword of Yahweh is devouring from one end of the land to the other end of the land; there is no peace for any flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bare hills' or 'treeless heights.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from one end of the earth to the other end of the earth.' Hebrew אֶרֶץ can mean 'land' or 'earth.'
    reason: alternative_reading
  - marker: c
    text: Hebrew 'for any flesh,' an idiom for all living people or creatures.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁפָיִם
  chosen: bare heights
  alternatives:
  - bare hills
  - treeless heights
  lexicon: HALOT
  rationale: The noun refers to exposed, denuded high places. 'Bare heights' is idiomatic modern English and preserves the image of vulnerable elevated terrain better than the more generic 'high places,' which can suggest cultic sites not explicit here.
- source_word: בַּמִּדְבָּר
  chosen: in the wilderness
  alternatives:
  - in the desert
  - in the pastureland
  lexicon: HALOT
  rationale: מִדְבָּר can denote wilderness, steppe, or desert. Here 'wilderness' best fits the broader poetic landscape without over-specifying aridity.
- source_word: שֹׁדְדִים
  chosen: destroyers
  alternatives:
  - plunderers
  - spoilers
  lexicon: HALOT
  rationale: The participle denotes violent ravagers. 'Destroyers' captures both military devastation and plundering activity in accessible English.
- source_word: חֶרֶב לַיהוָה
  chosen: the sword of the LORD
  alternatives:
  - a sword of the LORD
  - the LORD's sword
  lexicon: HALOT
  rationale: 'The construct-like phrase is best rendered as possession/source: the sword belonging to or wielded by the LORD. Per doctrine, יהוה is rendered ''the LORD.'' The definite English phrase suits the personified judgment image.'
- source_word: אֹכְלָה
  chosen: is devouring
  alternatives:
  - devours
  - consumes
  lexicon: HALOT
  rationale: The feminine singular participial/finite form agrees with 'sword' and portrays ongoing action. 'Is devouring' preserves the vivid personification and progressive force.
- source_word: מִקְצֵה אֶרֶץ וְעַד קְצֵה הָאָרֶץ
  chosen: from one end of the land to the other end of the land
  alternatives:
  - from one end of the earth to the other end of the earth
  - from one end of the הארץ to the other
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth.' In Jeremiah's immediate context of Judah's devastation, 'land' is more likely than the whole globe. The repetition is retained rather than smoothed out, reflecting Hebrew emphasis.
- source_word: אֵין שָׁלוֹם
  chosen: there is no peace
  alternatives:
  - there is no well-being
  - there is no wholeness
  lexicon: HALOT
  rationale: שָׁלוֹם includes well-being and safety, but 'peace' is the standard and sufficiently broad rendering here, especially in a war-judgment context.
- source_word: לְכָל בָּשָׂר
  chosen: for any flesh
  alternatives:
  - for all flesh
  - for anyone
  - for any living being
  lexicon: HALOT
  rationale: בָּשָׂר literally means 'flesh' and in this idiom refers to living creatures/humanity broadly. 'Any flesh' preserves the Hebrew idiom and the totalizing force of the negation better than a flattened paraphrase.
- source_word: עַל כָּל
  chosen: Upon all
  alternatives:
  - On all
  - Over all
  lexicon: HALOT
  rationale: '''Upon all'' fits the elevated topographical image and keeps the formal poetic tone without becoming archaic.'
