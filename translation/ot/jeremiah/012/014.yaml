theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton, aligning
    with Jewish reverence tradition and longstanding English Bible practice while
    preserving covenantal force.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of the participle נֹתְשָׁם after הִנְנִי
  chosen_reading: I am about to uproot them
  alternative_readings:
  - I will uproot them
  - I am uprooting them
  rationale: The הִנְנִי + participle construction often signals imminent divine action.
    'I am about to uproot' captures that aspect better than a simple future, while
    the second clause uses the finite verb naturally as future.
