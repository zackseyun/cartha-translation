id: JER.12.14
reference: Jeremiah 12:14
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה עַל כָּל שְׁכֵנַ/י֙ הָֽ/רָעִ֔ים הַ/נֹּֽגְעִים֙ בַּֽ/נַּחֲלָ֔ה
    אֲשֶׁר הִנְחַ֥לְתִּי אֶת עַמִּ֖/י אֶת יִשְׂרָאֵ֑ל הִנְ/נִ֤י נֹֽתְשָׁ/ם֙ מֵ/עַ֣ל
    אַדְמָתָ֔/ם וְ/אֶת בֵּ֥ית יְהוּדָ֖ה אֶתּ֥וֹשׁ מִ/תּוֹכָֽ/ם׀־־־־־־׃
translation:
  text: 'Thus says the LORD concerning all my evil neighbors who touch the inheritance
    that I caused my people Israel to inherit: behold, I am about to uproot them from
    upon their land, and I will uproot the house of Judah from among them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who encroach on the inheritance'—the Hebrew literally says 'who touch
      the inheritance,' with hostile interference implied by context.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will pluck them up.' The Hebrew verb is a recurring Jeremiah image
      for uprooting in judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  - So says the LORD
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Rendered idiomatically but closely.
    יְהוָה follows doctrine default as 'the LORD,' not 'Yahweh'.
- source_word: שְׁכֵנַי הָרָעִים
  chosen: my evil neighbors
  alternatives:
  - my wicked neighbors
  - my bad neighbors
  lexicon: HALOT
  rationale: שׁכן denotes neighboring peoples; the 1cs suffix requires 'my neighbors.'
    רָעִים here is moral hostility, so 'evil' is stronger and more fitting than merely
    'bad.'
- source_word: הַנֹּגְעִים
  chosen: who touch
  alternatives:
  - who strike against
  - who encroach on
  lexicon: HALOT
  rationale: נגע literally means 'touch.' In context it implies hostile interference
    with territory, but the more literal 'touch' preserves the metaphor and allows
    the context to carry the aggression.
- source_word: בַּנַּחֲלָה
  chosen: the inheritance
  alternatives:
  - the possession
  - the allotted inheritance
  lexicon: HALOT
  rationale: נחלה in covenant-land contexts commonly means inherited possession. 'Inheritance'
    preserves both land and covenantal overtones.
- source_word: אֲשֶׁר הִנְחַלְתִּי אֶת עַמִּי אֶת יִשְׂרָאֵל
  chosen: that I caused my people Israel to inherit
  alternatives:
  - that I gave as an inheritance to my people Israel
  - which I allotted to my people Israel
  lexicon: HALOT
  rationale: 'The Hiphil of נחל is causative: ''cause to inherit'' or ''give as inheritance.''
    The chosen rendering keeps the verbal connection with נחלה (''inheritance'') visible
    in English.'
- source_word: הִנְנִי
  chosen: behold
  alternatives:
  - look
  - see
  - indeed
  lexicon: HALOT
  rationale: A discourse marker introducing emphatic divine action. 'Behold' is slightly
    elevated but still readable and preserves prophetic force.
- source_word: נֹתְשָׁם
  chosen: I am about to uproot them
  alternatives:
  - I will pluck them up
  - I will uproot them
  lexicon: HALOT
  rationale: נתש is a key Jeremiah verb for tearing up or uprooting, often with agricultural/judgment
    imagery. The participle with הִנְנִי conveys imminent action, hence 'I am about
    to uproot them.'
- source_word: מֵעַל אַדְמָתָם
  chosen: from upon their land
  alternatives:
  - from their land
  - off their soil
  lexicon: HALOT
  rationale: אַדָמָה is land/ground/soil. 'From upon their land' is slightly more
    formal but reflects מֵעַל more closely than simple 'from,' while remaining intelligible.
- source_word: וְאֶת בֵּית יְהוּדָה
  chosen: and the house of Judah
  alternatives:
  - and Judah
  - and the household of Judah
  lexicon: HALOT
  rationale: בֵּית יְהוּדָה is a collective national designation. 'House of Judah'
    preserves the covenantal-national idiom better than reducing it to simply 'Judah.'
- source_word: אֶתּוֹשׁ מִתּוֹכָם
  chosen: I will uproot ... from among them
  alternatives:
  - I will pluck ... out from among them
  - I will uproot ... out of their midst
  lexicon: HALOT
  rationale: The finite verb resumes the same נתש imagery for Judah. מִתּוֹכָם means
    'from among them/from their midst,' indicating removal of Judah from the surrounding
    hostile nations.
