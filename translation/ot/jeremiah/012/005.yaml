id: JER.12.5
reference: Jeremiah 12:5
source:
  edition: WLC
  text: כִּ֣י אֶת רַגְלִ֥ים רַ֨צְתָּה֙ וַ/יַּלְא֔וּ/ךָ וְ/אֵ֥יךְ תְּתַֽחֲרֶ֖ה אֶת
    הַ/סּוּסִ֑ים וּ/בְ/אֶ֤רֶץ שָׁלוֹם֙ אַתָּ֣ה בוֹטֵ֔חַ וְ/אֵ֥יךְ תַּעֲשֶׂ֖ה בִּ/גְא֥וֹן
    הַ/יַּרְדֵּֽן־׀־׃
translation:
  text: If you have run with footmen and they have worn you out, then how will you
    compete with horses? And if in a land of peace you feel secure, then what will
    you do in the thicket of the Jordan?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the pride of the Jordan' or 'the swelling of the Jordan.' The Hebrew
      expression גְּאוֹן הַיַּרְדֵּן is debated; it may refer to the dense growth
      along the Jordan or, more literally, to its 'pride/majesty.'
    reason: alternative_reading
lexical_decisions:
- source_word: רַגְלִים
  chosen: footmen
  alternatives:
  - men on foot
  - infantry
  lexicon: HALOT
  rationale: Literally 'feet/foot-soldiers'; in this comparison it refers to runners
    or men on foot contrasted with horses. 'Footmen' is concise and preserves the
    military/racing contrast better than the overly literal 'feet'.
- source_word: רַצְתָּה
  chosen: have run
  alternatives:
  - ran
  lexicon: HALOT
  rationale: The verb means 'to run.' English present perfect after 'if' idiomatically
    conveys the completed protasis leading into the rhetorical question.
- source_word: וַיַּלְאוּךָ
  chosen: have worn you out
  alternatives:
  - have wearied you
  - have exhausted you
  lexicon: HALOT
  rationale: From לאה, 'to be weary, exhaust.' 'Worn you out' is natural modern English
    while preserving the sense of being fatigued by the contest.
- source_word: תְּתַחֲרֶה
  chosen: will you compete
  alternatives:
  - contend
  - race
  lexicon: HALOT
  rationale: The verb conveys engaging in contest or rivalry. 'Compete' fits the running
    imagery and remains broad enough not to over-specify a legal or military contest.
- source_word: הַסּוּסִים
  chosen: horses
  lexicon: HALOT
  rationale: Straightforward lexical rendering; the contrast with footmen intensifies
    the rhetorical force.
- source_word: בְאֶרֶץ שָׁלוֹם
  chosen: in a land of peace
  alternatives:
  - in a peaceful land
  - in peaceful country
  lexicon: HALOT
  rationale: Keeps the concrete noun 'land' and the abstract 'peace,' preserving the
    Hebrew idiom for a safe, undisturbed setting.
- source_word: בּוֹטֵחַ
  chosen: you feel secure
  alternatives:
  - you trust
  - you are secure
  lexicon: HALOT
  rationale: בטח can mean trust or be secure. In this context the sense is not primarily
    theological trust in God but being at ease/safe in favorable conditions. 'Feel
    secure' communicates that situational sense in readable English.
- source_word: תַּעֲשֶׂה
  chosen: will you do
  alternatives:
  - will you act
  - will you fare
  lexicon: HALOT
  rationale: עשה is semantically broad. 'What will you do' is the most direct rendering
    and works idiomatically in the rhetorical question.
- source_word: גְּאוֹן הַיַּרְדֵּן
  chosen: the thicket of the Jordan
  alternatives:
  - the pride of the Jordan
  - the swelling of the Jordan
  lexicon: HALOT
  rationale: גאון can mean pride, majesty, or swelling. In Jeremiah this phrase commonly
    refers to the luxuriant growth/jungle along the Jordan associated with danger.
    'Thicket of the Jordan' best communicates the likely referent in contemporary
    English, while preserving alternatives in a footnote because the phrase is debated.
