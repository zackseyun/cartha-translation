theological_decisions:
- issue: Sense of בּוֹטֵחַ in context
  chosen_reading: situational security rather than explicit trust in God
  alternative_readings:
  - trusting
  rationale: The verse contrasts manageable hardship with greater danger. The point
    is security in peaceful conditions, not a doctrinal statement about faith. Rendering
    with 'feel secure' preserves the rhetorical force without importing a theological
    claim the text does not make.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Interpretation of גְּאוֹן הַיַּרְדֵּן
  chosen_reading: a dangerous Jordan thicket/brushland
  alternative_readings:
  - the pride of the Jordan
  - the swelling/floodplain of the Jordan
  rationale: The Hebrew expression is debated. The main text uses the contextual sense
    most intelligible in English, while preserving more literal alternatives in a
    footnote to maintain transparency and avoid over-resolving the ambiguity.
  doctrine_reference: Translation philosophy §§1, 3, 6
