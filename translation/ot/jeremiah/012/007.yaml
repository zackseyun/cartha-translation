id: JER.12.7
reference: Jeremiah 12:7
source:
  edition: WLC
  text: עָזַ֨בְתִּי֙ אֶת בֵּיתִ֔/י נָטַ֖שְׁתִּי אֶת נַחֲלָתִ֑/י נָתַ֛תִּי אֶת יְדִד֥וּת
    נַפְשִׁ֖/י בְּ/כַ֥ף אֹיְבֶֽי/הָ־־־׃
translation:
  text: I have forsaken my house; I have abandoned my inheritance; I have given the
    beloved of my soul into the hand of her enemies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my soul’s beloved,' 'the one my soul loves,' or 'my dearly loved one.'
      The Hebrew expression is an intimate phrase of affection.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'into the palm/hand of her enemies,' an idiom meaning into their
      power or control.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew uses a feminine suffix, 'her enemies.' The referent may be understood
      as the inheritance, Judah/Jerusalem personified, or the beloved one; the text
      does not specify more precisely.
    reason: alternative_reading
lexical_decisions:
- source_word: עָזַבְתִּי
  chosen: I have forsaken
  alternatives:
  - I have left
  - I have abandoned
  lexicon: HALOT
  rationale: Qal perfect 1cs of עזב, expressing completed action from the speaker's
    perspective. 'Forsaken' preserves the solemn covenantal tone better than the flatter
    'left.'
- source_word: בֵּיתִי
  chosen: my house
  alternatives:
  - my household
  - my temple
  lexicon: HALOT
  rationale: בַּיִת commonly means 'house.' In Jeremiah this can evoke the temple
    or covenant household, but the Hebrew is not more specific here, so 'my house'
    preserves the metaphor and allows the contextual resonance.
- source_word: נָטַשְׁתִּי
  chosen: I have abandoned
  alternatives:
  - I have rejected
  - I have cast off
  lexicon: HALOT
  rationale: נָטַשׁ overlaps with עזב but is not identical; rendering it as 'abandoned'
    preserves the parallelism while avoiding unnecessary repetition in English.
- source_word: נַחֲלָתִי
  chosen: my inheritance
  alternatives:
  - my heritage
  - my possession
  lexicon: HALOT
  rationale: נַחֲלָה often denotes an inherited possession, especially covenant land/people
    language. 'Inheritance' is the most transparent and theologically resonant rendering.
- source_word: נָתַתִּי
  chosen: I have given
  alternatives:
  - I have handed over
  - I have delivered
  lexicon: HALOT
  rationale: נתן is the standard verb 'give.' 'Given' keeps the wording close to the
    Hebrew; the hostile implication is supplied by the following phrase 'into the
    hand of her enemies.'
- source_word: יְדִדוּת נַפְשִׁי
  chosen: the beloved of my soul
  alternatives:
  - my soul's beloved
  - the one my soul loves
  - my dearly loved one
  lexicon: HALOT
  rationale: The construct phrase is intimate and emotive. 'The beloved of my soul'
    is a natural but still formally transparent rendering that preserves the depth
    of affection without over-paraphrasing.
- source_word: בְּכַף
  chosen: into the hand of
  alternatives:
  - into the palm of
  - into the power of
  lexicon: HALOT
  rationale: The idiom 'into the hand of' is standard biblical English for transfer
    into another's control. Although כַּף literally means 'palm,' the idiomatic sense
    here is best preserved by 'hand.'
- source_word: אֹיְבֶיהָ
  chosen: her enemies
  alternatives:
  - its enemies
  lexicon: HALOT
  rationale: The 3fs suffix agrees naturally with the feminine antecedents such as
    'inheritance' or the feminine expression for the beloved one. English personalizes
    the referent with 'her,' matching the Hebrew grammar more closely than impersonal
    'its.'
