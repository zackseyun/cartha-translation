theological_decisions:
- issue: Referent of the feminine suffix in 'her enemies'
  chosen_reading: Retain the feminine-personified rendering 'her enemies' without
    specifying whether the referent is Judah, Jerusalem, the inheritance, or the beloved
    one.
  alternative_readings:
  - its enemies
  - the enemies of Judah
  - the enemies of Jerusalem
  rationale: The Hebrew leaves the precise antecedent implicit while using feminine
    grammar. The translation preserves that poetic-theological ambiguity rather than
    resolving it interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
