id: JER.12.15
reference: Jeremiah 12:15
source:
  edition: WLC
  text: וְ/הָיָ֗ה אַֽחֲרֵי֙ נָתְשִׁ֣/י אוֹתָ֔/ם אָשׁ֖וּב וְ/רִֽחַמְתִּ֑י/ם וַ/הֲשִׁבֹתִ֛י/ם
    אִ֥ישׁ לְ/נַחֲלָת֖/וֹ וְ/אִ֥ישׁ לְ/אַרְצֽ/וֹ׃
translation:
  text: And it will happen, after I have uprooted them, that I will return and have
    compassion on them, and I will bring them back, each man to his inheritance and
    each man to his land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plucked them up.' The Hebrew verb carries the image of pulling up by
      the roots, a common Jeremiah judgment metaphor.
    reason: lexical_alternative
  - marker: b
    text: Or 'show mercy to them.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'each man ... and each man'; the singular masculine form is distributive,
      referring to each individual among the restored peoples.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall come to pass
  - And it will be
  lexicon: HALOT
  rationale: Introduces a future circumstance with idiomatic but still transparent
    English. 'And it shall come to pass' is traditional but archaic; 'And it will
    happen' preserves the discourse function in readable modern English.
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - afterward
  lexicon: HALOT
  rationale: Temporal preposition marking sequence; 'after' fits the following infinitive
    construct naturally in English.
- source_word: נָתְשִׁי
  chosen: I have uprooted
  alternatives:
  - I have plucked up
  - I uproot
  lexicon: HALOT
  rationale: נתש in Jeremiah often carries the image of pulling up by the roots in
    judgment. 'Uprooted' communicates the metaphor clearly in modern English. 'Plucked
    up' is possible and traditional, but less natural today.
- source_word: אוֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct-object pronoun referring to the nations/peoples previously mentioned.
- source_word: אָשׁוּב
  chosen: I will return
  alternatives:
  - I will turn back
  - I will again
  lexicon: HALOT
  rationale: שׁוב here is best taken intransitively of God's turning again toward
    the peoples. Rendering it explicitly as 'I will return' preserves the verbal link
    with the following restoration verb from the same root family.
- source_word: וְרִחַמְתִּים
  chosen: and have compassion on them
  alternatives:
  - and show them mercy
  - and have mercy on them
  lexicon: HALOT
  rationale: רחם denotes compassion/mercy arising from pity. 'Have compassion on them'
    is natural English and preserves the affective nuance.
- source_word: וַהֲשִׁבֹתִים
  chosen: and I will bring them back
  alternatives:
  - and I will restore them
  - and I will cause them to return
  lexicon: HALOT
  rationale: 'Hiphil of שׁוב is causative: God causes their return. ''Bring them back''
    is clearer than the more abstract ''restore them'' while preserving the movement
    imagery.'
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: The Hebrew is singular masculine distributive. Per translation philosophy,
    a gender-accurate rendering is preferred. Here 'each man' preserves the distributive
    force of אִישׁ ... וְאִישׁ, though the referent is corporate.
- source_word: לְנַחֲלָתוֹ
  chosen: to his inheritance
  alternatives:
  - to his heritage
  - to his allotted possession
  lexicon: HALOT
  rationale: נחלה commonly denotes inherited possession or patrimony. 'Inheritance'
    preserves covenant-land resonance better than the more generic 'property' or 'homeland'.
- source_word: לְאַרְצוֹ
  chosen: to his land
  alternatives:
  - to his country
  - to his earth
  lexicon: HALOT
  rationale: אֶרֶץ here refers to territorial land/country. 'Land' is the most direct
    and contextually appropriate rendering.
