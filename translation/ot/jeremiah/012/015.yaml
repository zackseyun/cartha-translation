theological_decisions:
- issue: Nature of promised restoration after judgment
  chosen_reading: The verse promises that after uprooting in judgment, God will again
    show compassion and return the displaced peoples to their own inherited lands.
  alternative_readings:
  - A more generalized spiritual restoration without emphasis on geographic return
  rationale: The concrete terms 'inheritance' and 'land' require a territorial restoration
    sense in the main text. The translation avoids reducing the promise to a merely
    spiritual idea while not expanding beyond what the verse states.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal claims the text does not make.'
