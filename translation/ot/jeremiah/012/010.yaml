theological_decisions:
- issue: Whether to interpret 'shepherds' explicitly as political or spiritual leaders
    in the main text
  chosen_reading: Retain the metaphor 'shepherds'
  alternative_readings:
  - rulers
  - leaders
  - pastors
  rationale: The Hebrew uses the metaphor directly. Preserving it maintains the prophetic
    imagery and avoids importing a narrower interpretive conclusion than the text
    itself states. Readers may infer leaders from context without the translation
    collapsing the metaphor.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Whether to render the land imagery literally or explain it as referring to
    Judah/Israel
  chosen_reading: Keep 'vineyard' and 'portion' as literal-metaphorical imagery
  alternative_readings:
  - my land
  - my inheritance
  rationale: The verse speaks in layered land imagery. Translating the metaphors directly
    preserves theological and literary tension rather than resolving them into a single
    explanatory gloss.
  doctrine_reference: Translation philosophy §§1, 3, 6
