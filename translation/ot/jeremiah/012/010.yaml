id: JER.12.10
reference: Jeremiah 12:10
source:
  edition: WLC
  text: רֹעִ֤ים רַבִּים֙ שִֽׁחֲת֣וּ כַרְמִ֔/י בֹּסְס֖וּ אֶת חֶלְקָתִ֑/י נָֽתְנ֛וּ
    אֶת חֶלְקַ֥ת חֶמְדָּתִ֖/י לְ/מִדְבַּ֥ר שְׁמָמָֽה־־׃
translation:
  text: Many shepherds have ruined my vineyard; they have trampled my portion; they
    have made my delightful portion a desolate wilderness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Many rulers' or 'Many leaders'; Hebrew 'shepherds,' a common prophetic
      metaphor for those who govern or oversee.
    reason: lexical_alternative
  - marker: b
    text: Or 'they have turned my delightful portion into a desolate wilderness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹעִים רַבִּים
  chosen: Many shepherds
  alternatives:
  - Many pastors
  - Many rulers
  lexicon: HALOT
  rationale: רֹעִים literally means 'shepherds.' In prophetic literature it can metaphorically
    refer to leaders, rulers, or those responsible for the people/land, but the main
    text preserves the metaphor rather than interpreting it away. 'Many' straightforwardly
    renders רַבִּים.
- source_word: שִׁחֲתוּ
  chosen: have ruined
  alternatives:
  - have destroyed
  - have corrupted
  lexicon: HALOT
  rationale: The verb from שׁחת conveys spoiling, ruining, or destroying. 'Have ruined'
    fits the agricultural metaphor with 'vineyard' and avoids overstating to total
    annihilation while still conveying serious devastation.
- source_word: כַרְמִי
  chosen: my vineyard
  lexicon: HALOT
  rationale: A direct rendering of the noun with first-person suffix. The vineyard
    image is a common prophetic metaphor for the LORD's land/people, and should be
    preserved in translation.
- source_word: בֹּסְסוּ
  chosen: have trampled
  alternatives:
  - have trodden down
  - have profaned
  lexicon: HALOT
  rationale: The verb denotes trampling underfoot. 'Have trampled' is idiomatic modern
    English and preserves the physical image of desecration/devastation.
- source_word: חֶלְקָתִי
  chosen: my portion
  alternatives:
  - my plot
  - my inheritance
  lexicon: HALOT
  rationale: חלקה can denote a tract, portion, or parcel of land. 'My portion' preserves
    the broader semantic range and allows the metaphorical/theological sense of what
    belongs to the speaker without over-specifying 'inheritance.'
- source_word: נָתְנוּ
  chosen: they have made
  alternatives:
  - they have turned
  - they have set
  lexicon: HALOT
  rationale: Although the basic sense is 'gave/put,' in this construction with לְ
    plus result it idiomatically means 'made' or 'turned into.' 'They have made' is
    natural English and accurately reflects the resultative force.
- source_word: חֶלְקַת חֶמְדָּתִי
  chosen: my delightful portion
  alternatives:
  - my precious portion
  - my pleasant portion
  - the portion I delight in
  lexicon: HALOT
  rationale: חמדה conveys desirability, delight, preciousness. 'My delightful portion'
    keeps the possessive structure and expresses that this portion is cherished/desirable.
    It also echoes the emotional value of the land to the speaker.
- source_word: לְמִדְבַּר שְׁמָמָה
  chosen: a desolate wilderness
  alternatives:
  - into a desolate wilderness
  - a wilderness of desolation
  - a wasteland
  lexicon: HALOT
  rationale: מִדְבָּר is 'wilderness' and שְׁמָמָה is 'desolation/desolate waste.'
    The phrase denotes a devastated wasteland. 'A desolate wilderness' is concise
    and natural; the resultative sense is already carried by 'have made.'
