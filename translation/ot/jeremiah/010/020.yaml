id: JER.10.20
reference: Jeremiah 10:20
source:
  edition: WLC
  text: אָהֳלִ֣/י שֻׁדָּ֔ד וְ/כָל מֵיתָרַ֖/י נִתָּ֑קוּ בָּנַ֤/י יְצָאֻ֨/נִי֙ וְ/אֵינָ֔/ם
    אֵין נֹטֶ֥ה עוֹד֙ אָהֳלִ֔/י וּ/מֵקִ֖ים יְרִיעוֹתָֽ/י־־׃
translation:
  text: My tent is destroyed, and all my ropes are torn away. My sons have gone from
    me, and they are no more. There is no one left to stretch out my tent again and
    set up my curtains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plundered' or 'devastated' for 'destroyed.' The Hebrew verb can emphasize
      violent desolation as well as ruin.
    reason: lexical_alternative
  - marker: b
    text: Or 'cords' for 'ropes.'
    reason: lexical_alternative
  - marker: c
    text: '''My sons'' may refer literally to children or figuratively to the people/inhabitants
      who have departed.'
    reason: cultural_note
  - marker: d
    text: Or 'There is no one anymore to pitch my tent and raise my tent curtains.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָהֳלִי
  chosen: my tent
  alternatives:
  - my tabernacle
  - my dwelling
  lexicon: HALOT
  rationale: The literal image is a tent/dwelling. 'Tent' preserves the metaphor of
    Jerusalem/Judah as a tented habitation and fits the following references to ropes
    and curtains.
- source_word: שֻׁדָּד
  chosen: is destroyed
  alternatives:
  - is plundered
  - is devastated
  lexicon: HALOT
  rationale: The passive form can denote being violently ruined or despoiled. In context
    with ropes torn away and no one to re-erect the tent, 'is destroyed' best captures
    the resulting state in natural English.
- source_word: מֵיתָרַי
  chosen: my ropes
  alternatives:
  - my cords
  lexicon: HALOT
  rationale: Refers to tent cords/ropes. 'Ropes' is more immediately understandable
    in modern English while preserving the tent imagery.
- source_word: נִתָּקוּ
  chosen: are torn away
  alternatives:
  - are broken
  - are pulled out
  - are snapped
  lexicon: HALOT
  rationale: The verb conveys being pulled loose, torn off, or broken apart. 'Are
    torn away' fits the passive sense and the image of tent ropes detached from their
    place.
- source_word: בָּנַי
  chosen: my sons
  alternatives:
  - my children
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural, not a gender-neutral term.
    In this poetic context it likely personifies the people/inhabitants, but the translation
    keeps the gendered form per the source.
- source_word: יְצָאֻנִי
  chosen: have gone from me
  alternatives:
  - have gone out from me
  - have departed from me
  lexicon: HALOT
  rationale: The idiom indicates departure from the speaker. 'Have gone from me' is
    idiomatic English and preserves the sense of loss/exile.
- source_word: וְאֵינָם
  chosen: and they are no more
  alternatives:
  - and they are gone
  - and they are not
  lexicon: HALOT
  rationale: The phrase expresses absence/nonexistence in the speaker's present situation.
    'They are no more' is a natural English rendering that preserves the lament tone
    without over-specifying death.
- source_word: אֵין נֹטֶה עוֹד אָהֳלִי
  chosen: There is no one left to stretch out my tent again
  alternatives:
  - There is no one to pitch my tent anymore
  - There is no one to spread out my tent again
  lexicon: HALOT
  rationale: נֹטֶה with tent language means to stretch out/pitch a tent. Adding 'left'
    and 'again' brings out the lament context and the force of עוֹד in idiomatic English
    without adding new content.
- source_word: יְרִיעוֹתַי
  chosen: my curtains
  alternatives:
  - my tent curtains
  - my hangings
  lexicon: HALOT
  rationale: Refers to tent cloths/curtains. 'Curtains' is concise and natural; the
    tent context is already established by 'my tent'.
- source_word: וּמֵקִים
  chosen: and set up
  alternatives:
  - and raise
  - and erect
  lexicon: HALOT
  rationale: The participle denotes causing something to stand, here the tent curtains.
    'Set up' is natural modern English for erecting tent coverings.
