id: JER.10.19
reference: Jeremiah 10:19
source:
  edition: WLC
  text: א֥וֹי לִ/י֙ עַל שִׁבְרִ֔/י נַחְלָ֖ה מַכָּתִ֑/י וַ/אֲנִ֣י אָמַ֔רְתִּי אַ֛ךְ
    זֶ֥ה חֳלִ֖י וְ/אֶשָּׂאֶֽ/נּוּ־׃
translation:
  text: Woe is me because of my brokenness; my wound is grievous. But I said, “Surely
    this is my sickness, and I must bear it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for my hurt' / 'because of my injury.' The Hebrew שבר can refer to a
      fracture, breaking, or ruin.
    reason: lexical_alternative
  - marker: b
    text: Or 'my wound is severe' or 'my wound is sick.' The Hebrew verb נַחְלָה conveys
      being weak, sick, or grievous.
    reason: lexical_alternative
  - marker: c
    text: Or 'this is my illness, and I will bear it.' The final clause can be heard
      either as resignation ('I must bear it') or simple future ('I will bear it').
    reason: lexical_alternative
lexical_decisions:
- source_word: א֥וֹי
  chosen: Woe is me
  alternatives:
  - Alas for me
  - Woe to me
  lexicon: HALOT
  rationale: Interjection of lament. 'Woe is me' preserves the forceful cry of distress
    in idiomatic but still transparent English.
- source_word: עַל שִׁבְרִי
  chosen: because of my brokenness
  alternatives:
  - for my hurt
  - over my fracture
  - because of my injury
  lexicon: HALOT
  rationale: שבר can denote breaking, fracture, collapse, or ruin. 'Brokenness' captures
    both bodily-injury imagery and the broader devastation in Jeremiah's lament. The
    preposition עַל here is rendered causally as 'because of' in context.
- source_word: נַחְלָה
  chosen: is grievous
  alternatives:
  - is incurable
  - has become sick
  - is severe
  lexicon: HALOT
  rationale: The Niphal feminine singular from חלה agrees with מַכָּתִי ('my wound')
    and conveys being sick/weak/serious. In context of a wound, 'is grievous' communicates
    severity without overcommitting to 'incurable,' which is interpretive.
- source_word: מַכָּתִי
  chosen: my wound
  alternatives:
  - my blow
  - my injury
  - my affliction
  lexicon: HALOT
  rationale: מכה commonly denotes a blow, wound, or plague. 'My wound' fits the immediate
    metaphorical-medical context and reads naturally with נַחְלָה.
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Only
  - Indeed
  - Yet
  lexicon: HALOT
  rationale: אַךְ here introduces the speaker's resigned assessment. 'Surely' best
    conveys the asseverative nuance in English.
- source_word: חֳלִי
  chosen: my sickness
  alternatives:
  - my illness
  - my grief
  - my affliction
  lexicon: HALOT
  rationale: חלי denotes sickness or illness, often literally but also metaphorically
    for suffering. 'My sickness' preserves the medical metaphor already present in
    the verse.
- source_word: וְאֶשָּׂאֶנּוּ
  chosen: and I must bear it
  alternatives:
  - and I will bear it
  - and I shall carry it
  lexicon: HALOT
  rationale: 'נשא means to bear/carry. The imperfect here in context expresses resolve
    or necessity following the lament: ''I must bear it.'' This communicates resignation
    more naturally than a simple future while staying close to the Hebrew.'
