id: JER.10.1
reference: Jeremiah 10:1
source:
  edition: WLC
  text: שִׁמְע֣וּ אֶת הַ/דָּבָ֗ר אֲשֶׁ֨ר דִּבֶּ֧ר יְהוָ֛ה עֲלֵי/כֶ֖ם בֵּ֥ית יִשְׂרָאֵֽל־׃
translation:
  text: Hear the word that Yahweh has spoken concerning you, O house of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the LORD''; the divine name is YHWH, traditionally rendered ''the LORD'' in English translations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen to
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' preserves the prophetic summons and the covenantal nuance of attentive reception better than the more colloquial 'listen to.' English singular imperative is idiomatic despite the plural addressees being specified later.
- source_word: הַדָּבָר
  chosen: the word
  alternatives:
  - the message
  - this word
  lexicon: HALOT
  rationale: דבר commonly means 'word' or 'message.' 'The word' is the standard prophetic idiom and fits the following relative clause. 'Message' is possible but slightly more interpretive.
- source_word: אֲשֶׁר דִּבֶּר
  chosen: that ... has spoken
  alternatives:
  - that ... spoke
  - which ... spoke
  lexicon: HALOT
  rationale: The relative clause is rendered naturally in English as 'that the LORD has spoken.' The perfect can be translated as simple past, but present perfect works well in English to introduce the immediately relevant divine utterance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֲלֵיכֶם
  chosen: concerning you
  alternatives:
  - against you
  - to you
  - about you
  lexicon: HALOT
  rationale: The preposition על with דבר can mean speech directed toward or concerning someone. Here 'concerning you' best fits the context and avoids prematurely importing the adversative sense 'against you,' since the verse itself is an introductory summons rather than yet the content of judgment.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: O house of Israel
  alternatives:
  - house of Israel
  - people of Israel
  lexicon: HALOT
  rationale: This is a standard prophetic address formula. 'O house of Israel' preserves the vocative force and the corporate covenant identity. 'People of Israel' is more dynamic but loses the established biblical idiom.
