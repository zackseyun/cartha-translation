theological_decisions:
- issue: Scope of הָאָרֶץ
  chosen_reading: land
  alternative_readings:
  - earth
  rationale: The verse occurs in an oracle of judgment against Judah's people, so
    rendering אֶרֶץ as 'land' avoids implying an explicitly universal judgment not
    demanded by the context.
  doctrine_reference: Translation philosophy §1, §5
- issue: Ambiguity of לְמַעַן יִמְצָאוּ
  chosen_reading: so that they may be found
  alternative_readings:
  - so that they may find
  - so that they may feel it
  rationale: The clause is textually and interpretively difficult. The translation
    preserves the lexical ambiguity rather than resolving it into a more paraphrastic
    sense. An alternative is preserved in a footnote in keeping with the project's
    commitment to preserve tension where the source is genuinely ambiguous.
  doctrine_reference: Translation philosophy §3
