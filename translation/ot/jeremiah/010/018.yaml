id: JER.10.18
reference: Jeremiah 10:18
source:
  edition: WLC
  text: כִּֽי כֹה֙ אָמַ֣ר יְהוָ֔ה הִנְ/נִ֥י קוֹלֵ֛עַ אֶת יוֹשְׁבֵ֥י הָ/אָ֖רֶץ בַּ/פַּ֣עַם
    הַ/זֹּ֑את וַ/הֲצֵר֥וֹתִי לָ/הֶ֖ם לְמַ֥עַן יִמְצָֽאוּ־־׃ס
translation:
  text: 'For thus says the LORD: Behold, I am slinging out the inhabitants of the
    land at this time, and I will press them hard so that they may be found.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'casting out' or 'hurling out'; the Hebrew verb evokes the action of
      a sling.
    reason: lexical_alternative
  - marker: b
    text: Or 'the inhabitants of the earth,' if the phrase is taken more broadly.
    reason: alternative_reading
  - marker: c
    text: The final clause is difficult. Or 'so that they may feel it' or 'so that
      they may find themselves caught.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    covenantal reference while matching established English Bible convention.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: The particle plus pronoun marks emphatic immediacy. 'Behold' preserves
    the prophetic force without adding content; pairing it with 'I am' reflects the
    present participial construction that follows.
- source_word: קוֹלֵעַ
  chosen: slinging out
  alternatives:
  - casting out
  - hurling out
  - flinging out
  lexicon: HALOT
  rationale: The verb literally evokes slinging or hurling, not merely generic removal.
    'Slinging out' preserves the vivid metaphor of forceful expulsion better than
    the traditional but flatter 'cast out'.
- source_word: יוֹשְׁבֵי הָאָרֶץ
  chosen: the inhabitants of the land
  alternatives:
  - those who dwell in the land
  - the inhabitants of the earth
  lexicon: HALOT
  rationale: In Jeremiah's immediate context the reference is to the people of Judah/Jerusalem
    facing judgment, so 'land' is more contextually precise than the broader 'earth,'
    while still formally reflecting אֶרֶץ.
- source_word: בַּפַּעַם הַזֹּאת
  chosen: at this time
  alternatives:
  - this time
  - at this stroke
  lexicon: HALOT
  rationale: The phrase indicates the present occasion of judgment. 'At this time'
    is natural English and preserves the temporal force. 'At this stroke' is possible
    but less clear in modern English.
- source_word: וַהֲצֵרוֹתִי
  chosen: I will press them hard
  alternatives:
  - I will distress them
  - I will hem them in
  - I will afflict them
  lexicon: HALOT
  rationale: From צור in the Hiphil, the sense is causing distress/constriction. 'Press
    them hard' captures both pressure and affliction and fits the imagery of siege-like
    compression without over-specifying military action.
- source_word: לָהֶם
  chosen: them
  alternatives:
  - for them
  - against them
  lexicon: HALOT
  rationale: The preposition is retained idiomatically in English through the object
    pronoun with the causative verb. A more literal 'for them' would be misleading
    in English here.
- source_word: לְמַעַן יִמְצָאוּ
  chosen: so that they may be found
  alternatives:
  - so that they may find
  - so that they may feel it
  - so that they may be discovered
  lexicon: HALOT
  rationale: The Hebrew is terse and difficult. The most straightforward formal sense
    of מצא is 'find/be found.' Given the lack of an explicit object, 'be found' best
    preserves the ambiguity and the likely sense that the distress will overtake them
    so they are exposed/caught. More interpretive renderings such as 'feel it' are
    possible but go beyond the plain lexical value.
