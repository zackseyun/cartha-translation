id: JER.10.3
reference: Jeremiah 10:3
source:
  edition: WLC
  text: כִּֽי חֻקּ֥וֹת הָֽ/עַמִּ֖ים הֶ֣בֶל ה֑וּא כִּֽי עֵץ֙ מִ/יַּ֣עַר כְּרָת֔/וֹ
    מַעֲשֵׂ֥ה יְדֵ֥י חָרָ֖שׁ בַּֽ/מַּעֲצָֽד־־־׃
translation:
  text: 'For the customs of the peoples are vanity: a tree is cut from the forest,
    the work of a craftsman''s hands with an axe.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with an adze'; the Hebrew term refers to a wood-cutting/shaping tool,
      and the exact implement is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֻקּוֹת
  chosen: customs
  alternatives:
  - statutes
  - ordinances
  - practices
  lexicon: HALOT
  rationale: In this context of idolatrous religious practice among the nations, the
    term refers to customary rites/usages rather than formal legal statutes. 'Customs'
    is idiomatic and fits the polemical context.
- source_word: הָעַמִּים
  chosen: the peoples
  alternatives:
  - the nations
  lexicon: HALOT
  rationale: עַמִּים commonly means 'peoples' or 'nations.' 'Peoples' preserves the
    plural ethnic sense and avoids overloading 'nations' with modern political connotations,
    though 'nations' remains a viable alternative.
- source_word: הֶבֶל
  chosen: vanity
  alternatives:
  - worthlessness
  - emptiness
  - a mere breath
  lexicon: HALOT
  rationale: הֶבֶל often denotes vapor/breath metaphorically extended to emptiness
    or futility. Here, in an anti-idolatry context, 'vanity' captures the traditional
    sense of emptiness/worthlessness without over-paraphrasing.
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: The first כִּי introduces the reason for the preceding exhortation, so
    'For' is the most natural discourse marker in English.
- source_word: עֵץ
  chosen: a tree
  alternatives:
  - wood
  lexicon: HALOT
  rationale: The singular noun refers concretely to the material/object taken from
    the forest before being fashioned into an idol. 'A tree' preserves the vivid image
    better than the more abstract 'wood.'
- source_word: מִיַּעַר
  chosen: from the forest
  alternatives:
  - out of the forest
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition plus noun; 'from the forest'
    is natural modern English.
- source_word: כְּרָתוֹ
  chosen: is cut
  alternatives:
  - one cuts it
  - he cuts it
  lexicon: HALOT
  rationale: The form is a Qal perfect with 3ms suffix ('he/one cut it'). English
    passive 'is cut' best conveys the action in context and matches the focus on the
    object being fashioned, not the unnamed cutter.
- source_word: מַעֲשֵׂה יְדֵי חָרָשׁ
  chosen: the work of a craftsman's hands
  alternatives:
  - a craftsman's handiwork
  - the work of the hands of a craftsman
  lexicon: HALOT
  rationale: This construct chain emphasizes human manufacture. 'The work of a craftsman's
    hands' preserves both the concrete imagery and the polemical stress that the idol
    is man-made.
- source_word: חָרָשׁ
  chosen: craftsman
  alternatives:
  - artisan
  - woodworker
  lexicon: HALOT
  rationale: חָרָשׁ is a general term for a skilled worker/artisan. 'Craftsman' is
    broad enough for the context and idiomatic in English.
- source_word: בַּמַּעֲצָד
  chosen: with an axe
  alternatives:
  - with an adze
  - with a tool
  lexicon: HALOT
  rationale: The exact implement may be an adze or cutting tool, but 'axe' is a clear,
    natural rendering for modern readers in this wood-cutting context. Because the
    precise tool is somewhat uncertain, the more specific alternative is preserved
    in a footnote.
