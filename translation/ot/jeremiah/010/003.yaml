theological_decisions:
- issue: Rendering the anti-idolatry statement without importing later theological
    terminology
  chosen_reading: For the customs of the peoples are vanity
  alternative_readings:
  - For the statutes of the nations are worthless
  - For the practices of the peoples are empty
  rationale: The verse condemns the emptiness of pagan cultic practice and the man-made
    nature of idols. The translation preserves the polemic of the Hebrew text without
    adding doctrinal language not present in the verse itself.
  doctrine_reference: Translation philosophy §§1, 3, 6
