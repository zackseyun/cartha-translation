id: JER.10.10
reference: Jeremiah 10:10
source:
  edition: WLC
  text: וַֽ/יהוָ֤ה אֱלֹהִים֙ אֱמֶ֔ת הֽוּא אֱלֹהִ֥ים חַיִּ֖ים וּ/מֶ֣לֶךְ עוֹלָ֑ם מִ/קִּצְפּ/וֹ֙
    תִּרְעַ֣שׁ הָ/אָ֔רֶץ וְ/לֹֽא יָכִ֥לוּ גוֹיִ֖ם זַעְמֽ/וֹ־־׃ס
translation:
  text: But the LORD is the true God; he is the living God and the everlasting King.
    At his wrath the earth quakes, and the nations cannot endure his indignation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And the LORD''; the conjunction may also be read simply as connective,
      but here it likely carries a contrast with the idols described in the surrounding
      context.'
    reason: alternative_reading
  - marker: b
    text: Or 'God of truth.' The phrase likely means 'the true God' in contrast to
      false gods.
    reason: lexical_alternative
  - marker: c
    text: Or 'the eternal King.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיהוָה
  chosen: But the LORD
  alternatives:
  - And the LORD
  - But Yahweh
  lexicon: HALOT
  rationale: Rendered the divine name as 'the LORD' per doctrine default for יְהוָה.
    The prefixed conjunction can be simply connective ('and') or mildly adversative
    in context; here 'But' best reflects the contrast with the idols in the preceding
    context.
- source_word: אֱלֹהִים אֱמֶת
  chosen: the true God
  alternatives:
  - God of truth
  - a true God
  lexicon: HALOT
  rationale: 'The construction is best taken attributively/predicatively: YHWH is
    ''the true God,'' in contrast to false gods. ''God of truth'' is possible lexically
    for אֱמֶת but is less natural here and weakens the polemical contrast.'
- source_word: הוּא
  chosen: he is
  alternatives:
  - he
  lexicon: HALOT
  rationale: Expressed explicitly in English to preserve the Hebrew predication and
    emphasis.
- source_word: אֱלֹהִים חַיִּים
  chosen: the living God
  alternatives:
  - a living God
  - God who lives
  lexicon: HALOT
  rationale: Standard and natural rendering of the phrase, preserving the contrast
    between the living God and lifeless idols.
- source_word: וּמֶלֶךְ עוֹלָם
  chosen: and the everlasting King
  alternatives:
  - and the eternal King
  - and King forever
  lexicon: HALOT
  rationale: עוֹלָם here denotes enduring perpetuity. 'Everlasting' is idiomatic and
    preserves regal permanence; 'eternal' is possible but slightly more abstract.
- source_word: מִקִּצְפּוֹ
  chosen: At his wrath
  alternatives:
  - From his wrath
  - Because of his wrath
  - At his anger
  lexicon: HALOT
  rationale: The preposition מִן with an emotional noun can indicate source/cause.
    'At his wrath' is concise and idiomatic in English for the causal sense in parallel
    with the following clause.
- source_word: תִּרְעַשׁ הָאָרֶץ
  chosen: the earth quakes
  alternatives:
  - the earth trembles
  - the land quakes
  lexicon: HALOT
  rationale: רעש denotes shaking/quaking. 'Earth' fits the cosmic scope better than
    'land' in this context of universal divine kingship.
- source_word: וְלֹא יָכִלוּ גוֹיִם
  chosen: and the nations cannot endure
  alternatives:
  - and the nations are not able to bear
  - and nations cannot withstand
  lexicon: HALOT
  rationale: יכל plus object conveys inability; in context 'endure' captures the sense
    of bearing up under divine anger. 'Nations' reflects גוֹיִם in its ordinary collective-political
    sense.
- source_word: זַעְמוֹ
  chosen: his indignation
  alternatives:
  - his fury
  - his anger
  - his rage
  lexicon: HALOT
  rationale: זַעַם often denotes intense anger, especially divine wrath. 'Indignation'
    preserves solemnity and judicial nuance without sounding overly colloquial; 'fury'
    is stronger but can sound more emotive than judicial.
