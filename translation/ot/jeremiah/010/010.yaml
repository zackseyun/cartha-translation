theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for יְהוָה, aligning with Jewish
    reverence tradition and longstanding English Bible practice while preserving covenantal
    force.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Conjunction at verse opening
  chosen_reading: But the LORD
  alternative_readings:
  - And the LORD
  rationale: The immediate literary context contrasts YHWH with idols; rendering the
    conjunction adversatively preserves that theological and rhetorical contrast without
    adding content beyond the discourse flow.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
