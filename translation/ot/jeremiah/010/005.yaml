id: JER.10.5
reference: Jeremiah 10:5
source:
  edition: WLC
  text: כְּ/תֹ֨מֶר מִקְשָׁ֥ה הֵ֨מָּה֙ וְ/לֹ֣א יְדַבֵּ֔רוּ נָשׂ֥וֹא יִנָּשׂ֖וּא כִּ֣י
    לֹ֣א יִצְעָ֑דוּ אַל תִּֽירְא֤וּ מֵ/הֶם֙ כִּי לֹ֣א יָרֵ֔עוּ וְ/גַם הֵיטֵ֖יב אֵ֥ין
    אוֹתָֽ/ם־־־׃ס
translation:
  text: They are like a scarecrow in a cucumber field, and they cannot speak; they
    must be carried, because they cannot walk. Do not fear them, for they cannot do
    harm, nor is it in them to do good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'like a post in a melon field.' The Hebrew image is difficult; many
      understand it as a field-scarecrow or upright post set in a vegetable garden.
    reason: lexical_alternative
  - marker: b
    text: Or simply, 'nor can they do good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּתֹמֶר מִקְשָׁה
  chosen: like a scarecrow in a cucumber field
  alternatives:
  - like a palm tree of a cucumber field
  - like a post in a melon field
  lexicon: HALOT
  rationale: The phrase is idiomatic and difficult. תֹמֶר can denote a palm-like form,
    pillar, or upright object; in this context of lifeless idols that must be carried
    and cannot speak, the sense is best captured by an upright scarecrow/post set
    in a cultivated field. מִקְשָׁה refers to a cucumber/melon patch or garden. 'Scarecrow
    in a cucumber field' communicates the image naturally in English while preserving
    the comparison's force.
- source_word: וְלֹא יְדַבֵּרוּ
  chosen: and they cannot speak
  alternatives:
  - and they do not speak
  lexicon: HALOT
  rationale: The imperfect with negation states incapacity in context, not merely
    present action. Since the verse emphasizes the impotence of idols, 'cannot speak'
    is preferable to the flatter 'do not speak.'
- source_word: נָשׂוֹא יִנָּשׂוּא
  chosen: they must be carried
  alternatives:
  - they are surely carried
  - one must carry them
  lexicon: HALOT
  rationale: 'The infinitive absolute plus finite verb intensifies the passive idea:
    the idols certainly/necessarily have to be carried. ''They must be carried'' is
    concise and idiomatic.'
- source_word: כִּי לֹא יִצְעָדוּ
  chosen: because they cannot walk
  alternatives:
  - for they do not step
  - for they cannot march
  lexicon: HALOT
  rationale: The verb צעד means to step or walk. In context of idols needing transport,
    'cannot walk' best conveys the intended impotence.
- source_word: אַל תִּירְאוּ מֵהֶם
  chosen: Do not fear them
  alternatives:
  - Do not be afraid of them
  lexicon: HALOT
  rationale: A direct imperative fits the prophetic warning. 'Fear' is slightly more
    concise while preserving the force of the Hebrew.
- source_word: כִּי לֹא יָרֵעוּ
  chosen: for they cannot do harm
  alternatives:
  - for they will not do evil
  - for they cannot act badly
  lexicon: HALOT
  rationale: The Hiphil of רעע here concerns causing harm or doing evil. In this polemic
    against idols, the point is inability to injure, so 'cannot do harm' is the clearest
    contextual rendering.
- source_word: וְגַם הֵיטֵיב אֵין אוֹתָם
  chosen: nor is it in them to do good
  alternatives:
  - and also they cannot do good
  - nor can they do good
  lexicon: HALOT
  rationale: The clause literally denies there being 'in them' any doing-good. 'Nor
    is it in them to do good' preserves the Hebrew nuance of inherent incapacity while
    remaining readable. A simpler alternative is preserved in a footnote.
