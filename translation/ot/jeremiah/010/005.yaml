theological_decisions:
- issue: Nature of the idol polemic
  chosen_reading: 'Render the verse as emphasizing the total impotence of idols: they
    cannot speak, walk, harm, or do good.'
  alternative_readings:
  - Render more woodenly as simple negated actions without explicit incapacity
  rationale: The surrounding context mocks idols as lifeless human-made objects. English
    'cannot' best communicates the theological point of impotence embedded in the
    Hebrew clauses.
  doctrine_reference: Translation philosophy §1, §3
