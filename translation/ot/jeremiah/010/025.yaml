theological_decisions:
- issue: Imprecatory petition against foreign peoples
  chosen_reading: Retain the direct prayer for divine wrath without softening it
  alternative_readings:
  - Paraphrasing as a mere statement of judgment
  - Reducing 'wrath' to general displeasure
  rationale: The verse is an explicit prayer asking God to judge nations and clans
    because of their violence against Jacob. The translation should preserve this
    theological tension and not mute the force of the petition.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
