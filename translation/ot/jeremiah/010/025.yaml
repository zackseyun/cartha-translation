id: JER.10.25
reference: Jeremiah 10:25
source:
  edition: WLC
  text: שְׁפֹ֣ךְ חֲמָתְ/ךָ֗ עַל הַ/גּוֹיִם֙ אֲשֶׁ֣ר לֹֽא יְדָע֔וּ/ךָ וְ/עַל֙ מִשְׁפָּח֔וֹת
    אֲשֶׁ֥ר בְּ/שִׁמְ/ךָ֖ לֹ֣א קָרָ֑אוּ כִּֽי אָכְל֣וּ אֶֽת יַעֲקֹ֗ב וַ/אֲכָלֻ֨/הוּ֙
    וַ/יְכַלֻּ֔/הוּ וְ/אֶת נָוֵ֖/הוּ הֵשַֽׁמּוּ־־־־־׃פ
translation:
  text: Pour out your wrath on the nations that do not know you, and on the clans
    that do not call on your name; for they have devoured Jacob, they have devoured
    him and consumed him, and they have laid waste his pasture.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his habitation' or 'his dwelling place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁפֹךְ
  chosen: Pour out
  alternatives:
  - Pour forth
  - Spill out
  lexicon: HALOT
  rationale: Imperative of שפך in prayer language commonly denotes the forceful outpouring
    of wrath. 'Pour out' is idiomatic and preserves the metaphor.
- source_word: חֲמָתְךָ
  chosen: your wrath
  alternatives:
  - your fury
  - your anger
  lexicon: HALOT
  rationale: חֵמָה often denotes burning anger or wrath. 'Wrath' best matches the
    judicial and covenantal force in this imprecatory prayer.
- source_word: הַגּוֹיִם
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: HALOT
  rationale: גּוֹיִם here refers to foreign nations hostile to Israel/Judah, not specifically
    'Gentiles' in a later technical sense. 'Nations' is the most natural and contextually
    accurate rendering.
- source_word: אֲשֶׁר לֹא יְדָעוּךָ
  chosen: that do not know you
  alternatives:
  - that have not known you
  - who do not acknowledge you
  lexicon: HALOT
  rationale: יָדַע with God as object can imply relational knowledge and acknowledgment.
    'Know you' preserves the Hebrew's directness without over-interpreting.
- source_word: מִשְׁפָּחוֹת
  chosen: the clans
  alternatives:
  - the families
  - the peoples
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת denotes kinship groups or family groupings. In parallel
    with 'nations,' 'clans' preserves the social-unit sense better than the more domestic-sounding
    'families'.
- source_word: בְּשִׁמְךָ לֹא קָרָאוּ
  chosen: that do not call on your name
  alternatives:
  - that do not invoke your name
  - that have not called on your name
  lexicon: HALOT
  rationale: קרא בשם is a standard idiom for invocation/worship. 'Call on your name'
    is the established and transparent English equivalent.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the ground for the petition. 'For' fits the elevated prayer
    style and clearly links the reason.
- source_word: אָכְלוּ אֶת יַעֲקֹב
  chosen: they have devoured Jacob
  alternatives:
  - they have eaten up Jacob
  - they have consumed Jacob
  lexicon: HALOT
  rationale: אָכַל is used metaphorically for destructive consumption by enemies.
    'Devoured' conveys violent predation better than the more literal 'eaten.'
- source_word: וַאֲכָלֻהוּ
  chosen: they have devoured him
  alternatives:
  - they have consumed him
  - they have eaten him up
  lexicon: HALOT
  rationale: The repeated verb intensifies the image. Rendering it again as 'devoured'
    preserves the rhetorical repetition rather than smoothing it away.
- source_word: וַיְכַלֻּהוּ
  chosen: and consumed him
  alternatives:
  - and finished him off
  - and destroyed him completely
  lexicon: HALOT
  rationale: כלה adds the sense of bringing to an end or consuming completely. 'Consumed
    him' keeps the parallelism while marking escalation from the previous verb.
- source_word: נָוֵהוּ
  chosen: his pasture
  alternatives:
  - his habitation
  - his dwelling place
  - his fold
  lexicon: HALOT
  rationale: נָוֶה can denote pastureland, abode, or habitation. In this context of
    Jacob as a flock-like people ravaged by nations, 'pasture' preserves the concrete
    imagery and aligns with the destructive metaphor. Because 'habitation' is also
    plausible, it is preserved in a footnote.
- source_word: הֵשַׁמּוּ
  chosen: they have laid waste
  alternatives:
  - they have desolated
  - they have made desolate
  lexicon: HALOT
  rationale: The hiphil of שׁמם means to make desolate. 'Laid waste' is idiomatic
    modern English and retains the severity of devastation.
