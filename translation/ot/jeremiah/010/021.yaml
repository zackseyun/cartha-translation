id: JER.10.21
reference: Jeremiah 10:21
source:
  edition: WLC
  text: כִּ֤י נִבְעֲרוּ֙ הָֽ/רֹעִ֔ים וְ/אֶת יְהוָ֖ה לֹ֣א דָרָ֑שׁוּ עַל כֵּן֙ לֹ֣א
    הִשְׂכִּ֔ילוּ וְ/כָל מַרְעִיתָ֖/ם נָפֽוֹצָה־־־׃ס
translation:
  text: For the shepherds have become stupid, and they have not sought the LORD; therefore
    they have not prospered in understanding, and all their flock is scattered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have become brutish' or 'have become senseless.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew 'shepherds' likely refers metaphorically to the people's leaders.
    reason: cultural_note
  - marker: c
    text: Or 'have not acted wisely' or 'have not prospered.' The Hebrew verb can
      carry both the sense of wisdom and resulting success.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְעֲרוּ
  chosen: have become stupid
  alternatives:
  - have become brutish
  - have become senseless
  - have acted foolishly
  lexicon: HALOT
  rationale: From בער in the Niphal, conveying a brutish or senseless state rather
    than mere lack of information. 'Have become stupid' is strong, natural English
    that preserves the prophetic rebuke. 'Brutish' is traditional but less accessible
    in modern English.
- source_word: הָרֹעִים
  chosen: the shepherds
  alternatives:
  - the pastors
  - the leaders
  lexicon: HALOT
  rationale: Literal 'shepherds' is retained. In Jeremiah this often refers metaphorically
    to rulers or leaders, but the metaphor should be preserved in the main text rather
    than interpreted away.
- source_word: וְאֶת־יְהוָה
  chosen: and ... the LORD
  alternatives:
  - and ... Yahweh
  lexicon: HALOT
  rationale: The direct-object marker with YHWH yields 'and they have not sought the
    LORD.' Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: דָרָשׁוּ
  chosen: have not sought
  alternatives:
  - have not inquired of
  - have not consulted
  lexicon: HALOT
  rationale: דרש with God commonly means to seek him, inquire of him, or consult him.
    'Sought' is the broadest and most idiomatic rendering here, preserving both relational
    and guidance-seeking force.
- source_word: עַל־כֵּן
  chosen: therefore
  alternatives:
  - for that reason
  - so
  lexicon: HALOT
  rationale: A standard inferential expression linking the shepherds' failure to the
    resulting judgment.
- source_word: הִשְׂכִּילוּ
  chosen: have not prospered in understanding
  alternatives:
  - have not acted wisely
  - have not had success
  - have not prospered
  lexicon: HALOT
  rationale: Hiphil of שכל can denote acting wisely or having success/prospering through
    insight. Because the root carries both wisdom and success, the rendering combines
    them to preserve the semantic overlap without flattening either side.
- source_word: מַרְעִיתָם
  chosen: their flock
  alternatives:
  - their pasture
  - those they shepherd
  lexicon: HALOT
  rationale: Though the noun can denote pasture or pasturage, in context with 'shepherds'
    and a feminine singular verb, it refers collectively to what belongs to their
    shepherding care. 'Their flock' communicates the intended sense in natural English.
- source_word: נָפוֹצָה
  chosen: is scattered
  alternatives:
  - has been scattered
  - was scattered
  lexicon: HALOT
  rationale: From פוץ, to scatter. The singular verb agrees with the collective noun
    'flock.' Present 'is scattered' fits the prophetic description of the current
    result.
