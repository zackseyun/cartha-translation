theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies יְהוָה should be rendered 'the LORD' following
    Jewish reverence tradition and LXX pattern. In direct address, English idiom naturally
    omits the article.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of מִשְׁפָּט in a plea for chastening
  chosen_reading: with justice
  alternative_readings:
  - with judgment
  - according to justice
  rationale: The verse asks for divine correction that is measured and right rather
    than wrathful. 'With justice' preserves that theological tension without softening
    discipline into mere gentleness or hardening it into punitive condemnation.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension
    rather than resolve it
