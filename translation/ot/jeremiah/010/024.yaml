id: JER.10.24
reference: Jeremiah 10:24
source:
  edition: WLC
  text: יַסְּרֵ֥/נִי יְהוָ֖ה אַךְ בְּ/מִשְׁפָּ֑ט אַל בְּ/אַפְּ/ךָ֖ פֶּן תַּמְעִטֵֽ/נִי־־־׃
translation:
  text: Discipline me, Yahweh, but with justice, not in your anger, lest you diminish me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Correct me, LORD,' or 'Chasten me, LORD.'
    reason: lexical_alternative
  - marker: b
    text: Or 'with judgment' or 'according to justice.' The Hebrew term can denote judgment, justice, or proper measure.
    reason: lexical_alternative
  - marker: c
    text: Or 'lest you diminish me' or 'lest you make me small.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַסְּרֵנִי
  chosen: Discipline me
  alternatives:
  - Correct me
  - Chasten me
  lexicon: HALOT
  rationale: From יסר in the Piel, addressing YHWH with a request for corrective action. 'Discipline' preserves the sense of corrective chastening without archaic tone; 'correct' is possible but slightly narrower, and 'chasten' is traditional but less natural in modern English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - the LORD
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אַךְ
  chosen: but
  alternatives:
  - only
  - surely
  - nevertheless
  lexicon: HALOT
  rationale: 'Here אַךְ limits and qualifies the request: the speaker asks for discipline, but only in a certain manner. ''But'' communicates the adversative/limiting force smoothly in English; the restrictive nuance is also reflected by the following phrase.'
- source_word: בְּמִשְׁפָּט
  chosen: with justice
  alternatives:
  - with judgment
  - according to justice
  - with due measure
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean judgment, justice, or proper order. In this plea it contrasts with destructive wrath, so 'with justice' conveys measured, right dealing better than the potentially harsher 'with judgment.'
- source_word: אַל
  chosen: not
  alternatives:
  - do not
  lexicon: HALOT
  rationale: Used with the following prepositional phrase to negate the manner of discipline. Simple 'not' fits the English construction 'but with justice, not in your anger.'
- source_word: בְּאַפְּךָ
  chosen: in your anger
  alternatives:
  - in your wrath
  - with your anger
  lexicon: HALOT
  rationale: אַף literally relates to nose/anger and commonly denotes anger or wrath. 'Anger' is more accessible modern English; 'wrath' is a viable stronger alternative but not required by the context.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - so that not
  lexicon: HALOT
  rationale: Introduces the feared result of untempered anger. 'Lest' is concise and still readily understandable in modern Bible English.
- source_word: תַּמְעִיטֵנִי
  chosen: you reduce me to nothing
  alternatives:
  - you diminish me
  - you make me small
  - you bring me to little
  lexicon: HALOT
  rationale: From מעט in the Hiphil, 'make small/diminish.' In context the sense is not mere slight reduction but severe humbling to near-destruction. 'Reduce me to nothing' captures the force idiomatically while preserving the warning against overwhelming judgment.
