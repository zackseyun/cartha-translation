id: JER.10.4
reference: Jeremiah 10:4
source:
  edition: WLC
  text: בְּ/כֶ֥סֶף וּ/בְ/זָהָ֖ב יְיַפֵּ֑/הוּ בְּ/מַסְמְר֧וֹת וּ/בְ/מַקָּב֛וֹת יְחַזְּק֖וּ/ם
    וְ/ל֥וֹא יָפִֽיק׃
translation:
  text: They decorate it with silver and with gold; they fasten them with nails and
    with hammers so that it will not totter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they adorn it with silver and gold.'
    reason: lexical_alternative
  - marker: b
    text: Or 'so that it will not move' or 'so that it will not be shaken.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכֶסֶף
  chosen: with silver
  alternatives:
  - in silver
  - by silver
  lexicon: HALOT
  rationale: 'The preposition ב here is instrumental/material: the idol is adorned
    using silver. ''With silver'' is natural English and preserves the sense.'
- source_word: וּבְזָהָב
  chosen: and with gold
  alternatives:
  - and in gold
  - and by gold
  lexicon: HALOT
  rationale: Parallel to 'with silver'; instrumental/material use of ב. Keeping both
    metals explicit preserves the poetic pairing.
- source_word: יְיַפֵּהוּ
  chosen: they decorate it
  alternatives:
  - they beautify it
  - they adorn it
  lexicon: HALOT
  rationale: From יפה in the Piel, meaning to make beautiful/adorn. 'Decorate' is
    readable modern English; 'adorn' is possible but slightly more formal. Singular
    object 'it' fits the idol/tree image treated as a single object.
- source_word: בְּמַסְמְרוֹת
  chosen: with nails
  alternatives:
  - with pegs
  lexicon: HALOT
  rationale: מסמרות refers to nails or pegs used for fastening. 'Nails' is the clearest
    modern equivalent in this crafting context.
- source_word: וּבְמַקָּבוֹת
  chosen: and with hammers
  alternatives:
  - and with mallets
  lexicon: HALOT
  rationale: מקבות denotes hammers or mallets. 'Hammers' is the most straightforward
    modern rendering and suits the image of securing an idol.
- source_word: יְחַזְּקוּם
  chosen: they fasten them
  alternatives:
  - they strengthen them
  - they secure them
  lexicon: HALOT
  rationale: From חזק in the Piel, here meaning to make firm/secure. The plural suffix
    likely refers to the fastening elements or the idol structure as handled in Hebrew
    idiom. English smooths this to 'they fasten them' while retaining the plural object
    reflected in the Hebrew.
- source_word: וְלֹא
  chosen: so that not
  alternatives:
  - and not
  lexicon: HALOT
  rationale: 'Though literally ''and not,'' in context it introduces purpose/result
    after fastening: they secure it so that it will not move. English idiom prefers
    ''so that ... not''.'
- source_word: יָפִיק
  chosen: it will not totter
  alternatives:
  - it will not move
  - it will not be shaken
  lexicon: HALOT
  rationale: 'In context of an idol being nailed down, the verb conveys wavering,
    tottering, or being unstable rather than general motion. ''Totter'' vividly captures
    the satire: the idol must be stabilized so it does not wobble.'
