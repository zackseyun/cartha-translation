theological_decisions:
- issue: Referent and satire of the idol image
  chosen_reading: The verse is rendered to emphasize the mockery of idols as man-made
    objects that must be decorated and physically secured.
  alternative_readings:
  - A more neutral description of cult-statue manufacture without foregrounding the
    satirical force
  rationale: The immediate context (Jer 10:3-5) mocks idols as crafted objects lacking
    life and agency. The translation choices 'decorate' and 'fasten ... so that it
    will not totter' preserve that polemical force without adding doctrinal claims
    beyond the text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    the text''s plain sense without importing extra doctrinal claims.'
