id: JER.10.17
reference: Jeremiah 10:17
source:
  edition: WLC
  text: אִסְפִּ֥י מֵ/אֶ֖רֶץ כִּנְעָתֵ֑/ךְ ישבתי בַּ/מָּצֽוֹר׃ס
translation:
  text: Gather up your bundle from the ground, you who dwell under siege.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Gather up your goods from the land, O inhabitant of the siege.' The
      Hebrew allows renderings such as 'goods,' 'wares,' or 'bundle' for כִּנְעָתֵךְ,
      and the addressee may be expressed more literally as 'inhabitant' or 'one dwelling.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִסְפִּי
  chosen: Gather up
  alternatives:
  - Collect
  - Gather in
  lexicon: HALOT
  rationale: Imperative feminine singular from אסף, addressing a feminine singular
    addressee (likely personified daughter/inhabitant of Zion/Jerusalem). 'Gather
    up' is natural English for collecting belongings in preparation for departure.
- source_word: מֵאֶרֶץ
  chosen: from the ground
  alternatives:
  - from the land
  - from the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean land/earth/ground. Here, with the command to gather one's
    possessions, 'from the ground' best fits the immediate image of picking up belongings
    lying on the ground, while still reflecting the Hebrew concretely.
- source_word: כִּנְעָתֵךְ
  chosen: your bundle
  alternatives:
  - your goods
  - your wares
  - your baggage
  lexicon: HALOT
  rationale: The noun refers to possessions or packed goods. 'Bundle' captures the
    likely sense of belongings gathered for exile or flight and fits the singular
    form with second feminine singular suffix.
- source_word: יֹשַׁבְתִּי/ישבתי
  chosen: you who dwell
  alternatives:
  - O inhabitant
  - you who sit
  - inhabitress
  lexicon: HALOT
  rationale: 'Though the consonantal form is written ישבתי, the sense in context is
    vocative/participle-like: ''O inhabitant (fem.)''. English idiom prefers an explicit
    address: ''you who dwell.'' This preserves the feminine singular addressee without
    awkward archaism.'
- source_word: בַּמָּצוֹר
  chosen: under siege
  alternatives:
  - in the siege
  - in the besieged place
  - in distress
  lexicon: HALOT
  rationale: מָצוֹר denotes siege/siege-works or a besieged condition. 'Under siege'
    is the most idiomatic English rendering for the state of the addressee and communicates
    the military pressure clearly.
