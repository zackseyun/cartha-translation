id: JER.10.22
reference: Jeremiah 10:22
source:
  edition: WLC
  text: ק֤וֹל שְׁמוּעָה֙ הִנֵּ֣ה בָאָ֔ה וְ/רַ֥עַשׁ גָּד֖וֹל מֵ/אֶ֣רֶץ צָפ֑וֹן לָ/שׂ֞וּם
    אֶת עָרֵ֧י יְהוּדָ֛ה שְׁמָמָ֖ה מְע֥וֹן תַּנִּֽים־׃ס
translation:
  text: The sound of a report—look, it is coming!—a great commotion from the land
    of the north, to make the cities of Judah a desolation, a haunt of jackals.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a great shaking' or 'a great tumult.' The Hebrew term can denote shaking,
      noise, or upheaval.
    reason: lexical_alternative
  - marker: b
    text: Or 'a dwelling place of jackals.'
    reason: lexical_alternative
  - marker: c
    text: Traditionally 'dragons' in older English versions; the Hebrew likely refers
      to jackals in this desolation context.
    reason: alternative_reading
lexical_decisions:
- source_word: ק֤וֹל
  chosen: The sound of
  alternatives:
  - A voice of
  - The noise of
  lexicon: HALOT
  rationale: קוֹל commonly denotes sound, noise, or voice. In construct with שְׁמוּעָה,
    'the sound of a report' best captures the idiom without over-personifying it as
    a speaking voice.
- source_word: שְׁמוּעָה֙
  chosen: a report
  alternatives:
  - news
  - tidings
  - rumor
  lexicon: HALOT
  rationale: שְׁמוּעָה refers to something heard, often a report or news. 'Report'
    fits the ominous military context and is more neutral than 'rumor,' which could
    imply uncertainty not required by the text.
- source_word: הִנֵּ֣ה
  chosen: look
  alternatives:
  - behold
  - see
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' preserves the
    immediacy in readable modern English better than archaic 'behold.'
- source_word: בָאָ֔ה
  chosen: it is coming
  alternatives:
  - has come
  - comes
  lexicon: HALOT
  rationale: The perfect after הִנֵּה often has present/imminent force in English.
    'It is coming' conveys the vividness and urgency of the approaching threat.
- source_word: וְ/רַ֥עַשׁ גָּד֖וֹל
  chosen: a great commotion
  alternatives:
  - and a great shaking
  - and a great noise
  - and a great tumult
  lexicon: HALOT
  rationale: רַעַשׁ can denote shaking, quake, noise, or tumult. In context of an
    invading force from the north, 'commotion' captures both audible uproar and destabilizing
    disturbance without narrowing it to an earthquake.
- source_word: מֵ/אֶ֣רֶץ צָפ֑וֹן
  chosen: from the land of the north
  alternatives:
  - from the north country
  - from a northern land
  lexicon: HALOT
  rationale: Literally 'from the land of north.' 'The land of the north' preserves
    the Hebrew construction and the prophetic motif of invasion from the north.
- source_word: לָ/שׂ֞וּם
  chosen: to make
  alternatives:
  - to set
  - to turn
  lexicon: HALOT
  rationale: שׂוּם literally means 'to put/set,' but with the object-complement construction
    it idiomatically means 'to make' or 'to turn into.' 'To make' is the clearest
    English equivalent here.
- source_word: עָרֵ֧י יְהוּדָ֛ה
  chosen: the cities of Judah
  alternatives:
  - Judah's cities
  lexicon: HALOT
  rationale: A straightforward construct chain; 'the cities of Judah' is natural and
    transparent.
- source_word: שְׁמָמָ֖ה
  chosen: a desolation
  alternatives:
  - desolate
  - waste
  - ruin
  lexicon: HALOT
  rationale: The noun denotes desolation or wasteland. 'A desolation' preserves the
    nominal force and the prophetic register better than the adjective 'desolate.'
- source_word: מְע֥וֹן
  chosen: a haunt of
  alternatives:
  - a dwelling place of
  - a den of
  - a habitation of
  lexicon: HALOT
  rationale: מָעוֹן denotes a dwelling or habitation. In a judgment context describing
    ruined cities inhabited by wild creatures, 'a haunt of' is idiomatic and evocative
    without adding content.
- source_word: תַּנִּֽים
  chosen: jackals
  alternatives:
  - dragons
  - serpents
  - wild dogs
  lexicon: HALOT
  rationale: In prophetic desolation formulas, תַּנִּים is commonly understood as
    jackals. 'Dragons' reflects older tradition but is not the plain zoological sense
    in modern English.
