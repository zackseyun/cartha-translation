id: JER.10.8
reference: Jeremiah 10:8
source:
  edition: WLC
  text: וּ/בְ/אַחַ֖ת יִבְעֲר֣וּ וְ/יִכְסָ֑לוּ מוּסַ֥ר הֲבָלִ֖ים עֵ֥ץ הֽוּא׃
translation:
  text: But together they are stupid and foolish; the instruction of idols is wood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'And as one they are brutish and foolish'; the opening phrase is idiomatic
      and may mean 'together,' 'all alike,' or 'in one thing.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'vanities'; in this context, a common prophetic term for idols or
      worthless things.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְאַחַת
  chosen: But together
  alternatives:
  - And as one
  - But in one thing
  - Together alike
  lexicon: HALOT
  rationale: The phrase is idiomatic and difficult. Given the plural verbs that follow,
    it most naturally conveys collective sameness or joint action/state ('together,'
    'all alike'). 'But' fits the discourse contrast with the preceding verse better
    than a simple 'and.'
- source_word: יִבְעֲרוּ
  chosen: they are stupid
  alternatives:
  - they are brutish
  - they become senseless
  - they burn
  lexicon: HALOT
  rationale: From בער in the sense 'to be brutish, senseless' rather than the homonym
    'to burn.' In context of idolaters/idols and paired with יכסלו, an intellectual-moral
    sense is required. 'Stupid' is clear modern English; 'brutish' is possible but
    less natural.
- source_word: וְיִכְסָלוּ
  chosen: and foolish
  alternatives:
  - and they are foolish
  - and they act foolishly
  - and they are dull
  lexicon: HALOT
  rationale: From כסל 'to be foolish.' In English, after 'they are stupid,' a predicate
    adjective sequence ('and foolish') is natural and preserves the parallelism without
    over-translating the verbal form.
- source_word: מוּסַר
  chosen: instruction
  alternatives:
  - discipline
  - correction
  - training
  lexicon: HALOT
  rationale: מוּסָר commonly denotes instruction/discipline. Here it refers to what
    idols teach or the lesson associated with them. 'Instruction' is the broadest
    and most idiomatic in this context.
- source_word: הֲבָלִים
  chosen: idols
  alternatives:
  - vanities
  - worthless things
  - vapors
  lexicon: HALOT
  rationale: Though literally related to 'vanities' or 'breaths,' in prophetic polemic
    הבלים commonly refers to idols as worthless nonentities. 'Idols' makes the referent
    explicit in context and matches the surrounding anti-idol discourse.
- source_word: עֵץ הוּא
  chosen: is wood
  alternatives:
  - is a piece of wood
  - it is wood
  - is mere wood
  lexicon: HALOT
  rationale: A terse verbless clause emphasizing the material reality of the idol/instruction.
    'Is wood' preserves the blunt force of the Hebrew better than a more expanded
    paraphrase.
