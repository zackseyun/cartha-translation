theological_decisions:
- issue: Referent and force of the final clause in an anti-idol polemic
  chosen_reading: The verse declares that the supposed instruction associated with
    idols amounts to nothing more than wood.
  alternative_readings:
  - The wooden idol itself is the teacher/instructor
  - The whole line means 'their instruction is wooden,' i.e., lifeless
  rationale: The Hebrew is compressed and somewhat awkward. In context (Jer 10:1–9),
    the prophet mocks idols as crafted wooden objects. Rendering הבלים as 'idols'
    and עץ הוא as 'is wood' preserves the anti-idol thrust without importing a more
    developed theological claim.
