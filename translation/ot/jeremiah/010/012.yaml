id: JER.10.12
reference: Jeremiah 10:12
source:
  edition: WLC
  text: עֹשֵׂ֥ה אֶ֨רֶץ֙ בְּ/כֹח֔/וֹ מֵכִ֥ין תֵּבֵ֖ל בְּ/חָכְמָת֑/וֹ וּ/בִ/תְבוּנָת֖/וֹ
    נָטָ֥ה שָׁמָֽיִם׃
translation:
  text: He made the earth by his power; he established the world by his wisdom, and
    by his understanding he stretched out the heavens.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He makes the earth by his power'; the Hebrew opens with a participle
      ('making/maker of'), which can be rendered with a present-like force, but here
      it is expressed as a past finite verb for natural English parallelism.
    reason: lexical_alternative
  - marker: b
    text: '''World'' translates Hebrew tevel, often referring to the inhabited or
      ordered world.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֵׂה
  chosen: made
  alternatives:
  - makes
  - maker of
  lexicon: HALOT
  rationale: The participle of עשה can be rendered more formally as 'making' or 'maker
    of,' but in this poetic context with the following finite verbs, English reads
    most naturally by converting it to a finite past verb, yielding a balanced optimal-equivalence
    rendering.
- source_word: אֶרֶץ
  chosen: earth
  alternatives:
  - land
  lexicon: HALOT
  rationale: Here the cosmic creation context favors 'earth' rather than 'land,' since
    the verse contrasts earth/world with heavens.
- source_word: בְּכֹחוֹ
  chosen: by his power
  alternatives:
  - with his power
  lexicon: HALOT
  rationale: The preposition ב in instrumental sense is well represented by 'by.'
    'Power' is the standard rendering of כֹּחַ in this context of divine creative
    might.
- source_word: מֵכִין
  chosen: established
  alternatives:
  - prepared
  - set firm
  lexicon: HALOT
  rationale: כון in the Hiphil commonly conveys establishing or setting firm. 'Established'
    fits the creation/cosmic-order context better than 'prepared' and is idiomatic
    in English.
- source_word: תֵּבֵל
  chosen: world
  alternatives:
  - inhabited world
  lexicon: HALOT
  rationale: תבל often denotes the world as the inhabited, ordered earth. 'World'
    is concise and natural; 'inhabited world' is possible but unnecessarily cumbersome
    here.
- source_word: בְּחָכְמָתוֹ
  chosen: by his wisdom
  alternatives:
  - with his wisdom
  lexicon: HALOT
  rationale: Instrumental ב is again best rendered 'by.' 'Wisdom' preserves the creation-by-wisdom
    theme common in Hebrew poetry and theology.
- source_word: וּבִתְבוּנָתוֹ
  chosen: and by his understanding
  alternatives:
  - and by his insight
  - and by his discernment
  lexicon: HALOT
  rationale: תבונה overlaps with wisdom language but is distinct enough to preserve
    as 'understanding' rather than flattening it into another occurrence of 'wisdom.'
- source_word: נָטָה
  chosen: stretched out
  alternatives:
  - spread out
  - extended
  lexicon: HALOT
  rationale: נטה in creation contexts is conventionally and accurately rendered 'stretched
    out,' especially with 'the heavens.' This preserves the vivid spatial imagery.
- source_word: שָׁמַיִם
  chosen: the heavens
  alternatives:
  - heaven
  - the sky
  lexicon: HALOT
  rationale: The Hebrew plural is best reflected by 'the heavens' in cosmic contexts.
    'Sky' would be too narrow, and singular 'heaven' would underrepresent the Hebrew
    form and register.
