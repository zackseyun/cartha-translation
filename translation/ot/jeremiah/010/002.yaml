theological_decisions:
- issue: Rendering of גּוֹיִם in a prophetic denunciation of pagan practice
  chosen_reading: nations
  alternative_readings:
  - Gentiles
  rationale: The Hebrew term broadly denotes the peoples/nations other than Israel.
    'Nations' is the more contextually neutral and source-near rendering in Jeremiah,
    whereas 'Gentiles' can sound more like later Jewish/Christian insider terminology.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English'
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default specifies 'the LORD' for YHWH, following Jewish reverence
    tradition and longstanding English Bible convention while documenting alternatives.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH → the LORD'
