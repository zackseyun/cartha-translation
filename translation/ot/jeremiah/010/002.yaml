id: JER.10.2
reference: Jeremiah 10:2
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה אֶל דֶּ֤רֶךְ הַ/גּוֹיִם֙ אַל תִּלְמָ֔דוּ וּ/מֵ/אֹת֥וֹת
    הַ/שָּׁמַ֖יִם אַל תֵּחָ֑תּוּ כִּֽי יֵחַ֥תּוּ הַ/גּוֹיִ֖ם מֵ/הֵֽמָּה׀־־־־׃
translation:
  text: 'Thus says the LORD: Do not learn the way of the nations, and do not be terrified
    by the signs of the heavens, because the nations are terrified by them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not be dismayed by the signs of the heavens ... for the nations are
      dismayed by them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered according to the project's default for the divine name, preserving
    the traditional English convention for YHWH rather than transliteration.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - So says
  lexicon: HALOT
  rationale: Standard prophetic formula; 'Thus says' preserves the formal prophetic
    register in natural English.
- source_word: דֶּרֶךְ הַגּוֹיִם
  chosen: the way of the nations
  alternatives:
  - the way of the Gentiles
  - the path of the nations
  lexicon: HALOT
  rationale: דֶּרֶךְ here denotes manner, practice, or course of life, not merely
    a literal road. 'Nations' is preferred over 'Gentiles' in this Hebrew prophetic
    context to avoid importing later NT associations.
- source_word: אַל תִּלְמָדוּ
  chosen: Do not learn
  alternatives:
  - Do not adopt
  - Do not imitate
  lexicon: HALOT
  rationale: The verb is literally 'learn.' In context it implies adopting pagan practices,
    but the more direct rendering best preserves the source wording without over-paraphrase.
- source_word: מֵאֹתוֹת הַשָּׁמַיִם
  chosen: by the signs of the heavens
  alternatives:
  - at the signs of the heavens
  - by the signs in the sky
  - by heavenly signs
  lexicon: HALOT
  rationale: אוֹתוֹת means signs/omens; הַשָּׁמַיִם is literally 'the heavens.' 'By'
    fits the following verb in English ('terrified by'). 'Heavens' preserves the elevated
    biblical diction better than 'sky,' while remaining understandable.
- source_word: תֵּחָתּוּ / יֵחַתּוּ
  chosen: be terrified / are terrified
  alternatives:
  - be dismayed / are dismayed
  - be shattered / are shattered
  lexicon: HALOT
  rationale: חתת carries the sense of being broken down in fear, dismayed, or terrified.
    In this context of ominous celestial signs, 'terrified' communicates the emotional
    force more clearly for modern readers than the somewhat broader 'dismayed.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition. 'Because' is the clearest
    modern English connective here.
- source_word: מֵהֵמָּה
  chosen: by them
  alternatives:
  - at them
  - because of them
  lexicon: HALOT
  rationale: The pronoun refers back to the signs of the heavens. 'By them' is idiomatic
    with 'terrified' and preserves the causal force of the preposition.
