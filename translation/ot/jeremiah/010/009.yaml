theological_decisions:
- issue: Gendered rendering of חֲכָמִים
  chosen_reading: skilled men
  alternative_readings:
  - skilled workers
  - artisans
  rationale: The Hebrew is grammatically masculine plural. Per the project's gender-accurate
    policy, the translation preserves the masculine form rather than neutralizing
    it, while the context clearly refers to craftsmen.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
