id: JER.10.9
reference: Jeremiah 10:9
source:
  edition: WLC
  text: כֶּ֣סֶף מְרֻקָּ֞ע מִ/תַּרְשִׁ֣ישׁ יוּבָ֗א וְ/זָהָב֙ מֵֽ/אוּפָ֔ז מַעֲשֵׂ֥ה
    חָרָ֖שׁ וִ/ידֵ֣י צוֹרֵ֑ף תְּכֵ֤לֶת וְ/אַרְגָּמָן֙ לְבוּשָׁ֔/ם מַעֲשֵׂ֥ה חֲכָמִ֖ים
    כֻּלָּֽ/ם׃
translation:
  text: Beaten silver is brought from Tarshish, and gold from Uphaz, the work of a
    craftsman and of the hands of a goldsmith. Blue and purple are their clothing;
    all of them are the work of skilled men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Uphaz'; some understand this as a variant of 'Ophir.'
    reason: alternative_reading
lexical_decisions:
- source_word: כֶּסֶף
  chosen: silver
  alternatives:
  - silver metal
  - silver plating
  lexicon: HALOT
  rationale: The noun denotes silver as a material. In context it describes the precious
    metal used in idol manufacture, not money.
- source_word: מְרֻקָּע
  chosen: beaten
  alternatives:
  - hammered
  - spread out
  lexicon: HALOT
  rationale: The passive participle from רקע refers to metal that has been beaten
    out into thin sheets. 'Beaten' is concise and natural; 'hammered' is possible,
    while 'spread out' is more literal but less idiomatic in English for metalwork.
- source_word: מִתַּרְשִׁישׁ
  chosen: from Tarshish
  lexicon: HALOT
  rationale: Tarshish is a place name and should be transliterated rather than translated,
    per project philosophy on names.
- source_word: יוּבָא
  chosen: is brought
  alternatives:
  - is imported
  - comes
  lexicon: HALOT
  rationale: 'The Hophal form of בוא is passive/causative: ''is brought.'' ''Imported''
    captures the trade sense but is slightly more interpretive; ''is brought'' stays
    closer to the Hebrew.'
- source_word: וְזָהָב מֵאוּפָז
  chosen: and gold from Uphaz
  alternatives:
  - and gold from Ophir
  lexicon: HALOT
  rationale: The MT reads אוּפָז, best represented as the place name 'Uphaz.' Some
    take it as a variant of Ophir, but the consonantal text supports Uphaz in the
    main text.
- source_word: מַעֲשֵׂה חָרָשׁ
  chosen: the work of a craftsman
  alternatives:
  - the work of an artisan
  - the workmanship of a craftsman
  lexicon: HALOT
  rationale: מַעֲשֵׂה indicates manufactured work or workmanship, and חָרָשׁ is a
    skilled worker/craftsman. 'The work of a craftsman' is clear and idiomatic.
- source_word: וִידֵי צוֹרֵף
  chosen: and of the hands of a goldsmith
  alternatives:
  - and by the hands of a refiner
  - and by a metalworker's hands
  lexicon: HALOT
  rationale: The idiom 'hands of' emphasizes human manufacture. צוֹרֵף commonly refers
    to a smelter/refiner or goldsmith; in this context of precious-metal idol decoration,
    'goldsmith' best fits.
- source_word: תְּכֵלֶת וְאַרְגָּמָן
  chosen: Blue and purple
  alternatives:
  - blue and red-purple
  - violet and purple
  lexicon: HALOT
  rationale: These are costly dyed textiles/colors associated with luxury. 'Blue and
    purple' is the standard, accessible rendering.
- source_word: לְבוּשָׁם
  chosen: are their clothing
  alternatives:
  - is their clothing
  - their garment
  lexicon: HALOT
  rationale: 'The singular noun with plural suffix functions collectively: these fabrics
    constitute the idols'' clothing. English plural predicate ''are their clothing''
    reads naturally with the paired subjects ''blue and purple.'''
- source_word: מַעֲשֵׂה חֲכָמִים כֻּלָּם
  chosen: all of them are the work of skilled men
  alternatives:
  - all of them are the work of wise men
  - all of them are expertly made
  lexicon: HALOT
  rationale: חֲכָמִים here refers to skilled artisans rather than sages in a moral
    or philosophical sense. 'Skilled men' preserves the masculine form and the craft
    context better than 'wise men.'
