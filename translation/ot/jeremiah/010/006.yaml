id: JER.10.6
reference: Jeremiah 10:6
source:
  edition: WLC
  text: מֵ/אֵ֥ין כָּמ֖וֹ/ךָ יְהוָ֑ה גָּד֥וֹל אַתָּ֛ה וְ/גָד֥וֹל שִׁמְ/ךָ֖ בִּ/גְבוּרָֽה׃
translation:
  text: There is none like you, O LORD; you are great, and your name is great in might.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH'' (the divine name), traditionally rendered ''the LORD'';
      alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: מֵאֵין
  chosen: There is none
  alternatives:
  - From nothing/no one
  - There is no one
  lexicon: HALOT
  rationale: The idiom with כָּמוֹךָ expresses nonexistence of any comparable being.
    English existential phrasing is the most natural and accurate rendering here.
- source_word: כָּמוֹךָ
  chosen: like you
  alternatives:
  - comparable to you
  lexicon: HALOT
  rationale: Standard comparison phrase; 'like you' is clear, direct, and preserves
    the personal address.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding covenantal usage in English.
- source_word: גָּדוֹל אַתָּה
  chosen: you are great
  alternatives:
  - great are you
  lexicon: HALOT
  rationale: Predicate adjective plus pronoun emphasizes YHWH's greatness. 'You are
    great' gives natural modern English while retaining the assertion.
- source_word: וְגָדוֹל שִׁמְךָ
  chosen: and your name is great
  alternatives:
  - and great is your name
  lexicon: HALOT
  rationale: Keeps the parallel structure with the previous clause while using idiomatic
    English syntax. 'Name' here carries reputation/renown, but the literal term should
    be preserved in the main text.
- source_word: בִּגְבוּרָה
  chosen: in might
  alternatives:
  - in power
  - through mighty deeds
  lexicon: HALOT
  rationale: 'ב plus גְּבוּרָה most naturally expresses sphere or manifestation: God''s
    name is great in might/power. ''In might'' preserves the compactness and poetic
    force of the Hebrew better than an expanded paraphrase.'
