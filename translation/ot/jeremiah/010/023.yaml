id: JER.10.23
reference: Jeremiah 10:23
source:
  edition: WLC
  text: יָדַ֣עְתִּי יְהוָ֔ה כִּ֛י לֹ֥א לָ/אָדָ֖ם דַּרְכּ֑/וֹ לֹֽא לְ/אִ֣ישׁ הֹלֵ֔ךְ
    וְ/הָכִ֖ין אֶֽת צַעֲדֽ/וֹ־־׃
translation:
  text: I know, O LORD, that a man's way is not his own; it is not for a man who walks
    to direct his steps.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more formally, 'the way of man is not in himself.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to establish his steps.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָדַעְתִּי
  chosen: I know
  alternatives:
  - I have known
  - I knew
  lexicon: HALOT
  rationale: Qal perfect 1cs of ידע expresses the speaker's settled recognition or
    acknowledgment. In English, present 'I know' best conveys the gnomic, confessional
    force here.
- source_word: יְהוָה
  chosen: LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the divine name is rendered 'the LORD' in keeping with
    established reverential convention and the pattern reflected in many English translations.
- source_word: לָאָדָם
  chosen: a man's
  alternatives:
  - man's
  - humankind's
  - a human's
  lexicon: HALOT
  rationale: אָדָם here refers generically to human beings, but the parallel with
    אִישׁ and the doctrine's gender-accurate principle support 'man' rather than an
    artificially neutral rendering. The possessive sense is carried idiomatically
    in English as 'a man's way.'
- source_word: דַּרְכּוֹ
  chosen: way
  alternatives:
  - path
  - course
  lexicon: HALOT
  rationale: '''Way'' is the standard rendering for דרך and naturally conveys one''s
    course of life or direction here.'
- source_word: לֹא לָאָדָם דַּרְכּוֹ
  chosen: a man's way is not his own
  alternatives:
  - man's way is not in himself
  - the way of man is not his own
  lexicon: HALOT
  rationale: The Hebrew is elliptical, literally 'not to man his way.' The sense is
    that a person's course does not belong to him to determine autonomously. 'Is not
    his own' expresses the idiom in clear modern English without over-paraphrasing.
- source_word: לְאִישׁ הֹלֵךְ
  chosen: for a man who walks
  alternatives:
  - for a walking man
  - for the man walking
  - for man as he walks
  lexicon: HALOT
  rationale: The participle הֹלֵךְ modifies אִישׁ, describing a person in the act/course
    of going through life. 'A man who walks' preserves the participial nuance in natural
    English.
- source_word: וְהָכִין
  chosen: to direct
  alternatives:
  - to establish
  - to make firm
  - to prepare
  lexicon: HALOT
  rationale: Hiphil of כון can mean establish, prepare, or direct. With 'steps' as
    object, the contextual sense is ordering or directing one's course. 'Direct' is
    idiomatic and fits the parallelism.
- source_word: אֶת צַעֲדוֹ
  chosen: his steps
  alternatives:
  - his step
  - his footsteps
  lexicon: HALOT
  rationale: צעד commonly denotes step/stride; in English the plural 'steps' is idiomatic
    for one's course of movement or life-direction.
