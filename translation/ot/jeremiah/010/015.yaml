id: JER.10.15
reference: Jeremiah 10:15
source:
  edition: WLC
  text: הֶ֣בֶל הֵ֔מָּה מַעֲשֵׂ֖ה תַּעְתֻּעִ֑ים בְּ/עֵ֥ת פְּקֻדָּתָ֖/ם יֹאבֵֽדוּ׃
translation:
  text: They are vanity, a work of mockery; at the time of their punishment they will
    perish.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a work of delusion.'
    reason: lexical_alternative
  - marker: b
    text: Or 'at the time of their visitation,' that is, when judgment comes upon
      them.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶבֶל
  chosen: vanity
  alternatives:
  - worthlessness
  - breath
  - emptiness
  lexicon: HALOT
  rationale: In prophetic polemic against idols, הֶבֶל commonly denotes emptiness
    or worthlessness rather than literal vapor. 'Vanity' preserves the traditional
    prophetic sense of something futile and insubstantial without over-paraphrasing.
- source_word: הֵמָּה
  chosen: they are
  lexicon: HALOT
  rationale: 'The independent pronoun is emphatic and functions predicatively with
    הֶבֶל. English requires the copula: ''They are vanity.'' The referent is the idols
    described in context.'
- source_word: מַעֲשֵׂה
  chosen: a work
  alternatives:
  - the work
  - work
  lexicon: HALOT
  rationale: Construct with the following plural noun yields 'a work of ...' or 'work
    of ...'. 'A work' is idiomatic and preserves the singular collective sense.
- source_word: תַּעְתֻּעִים
  chosen: mockery
  alternatives:
  - delusion
  - deception
  - derision
  lexicon: HALOT
  rationale: The noun can denote mockery or delusive trickery. In this context of
    idol manufacture and exposure, 'mockery' best captures that the idols are objects
    fit for ridicule and a fraudulent product. The alternative 'delusion' is plausible
    and worth preserving.
- source_word: בְּעֵת
  chosen: at the time of
  alternatives:
  - in the time of
  - when
  lexicon: HALOT
  rationale: A straightforward temporal prepositional phrase. 'At the time of' is
    natural English and keeps the formal temporal force.
- source_word: פְּקֻדָּתָם
  chosen: their punishment
  alternatives:
  - their visitation
  - their reckoning
  lexicon: HALOT
  rationale: פְּקֻדָּה can mean visitation, oversight, or punishment. In judgment
    contexts it often refers to punitive visitation. 'Their punishment' makes the
    sense clear in modern English while preserving the judicial force. The more formal
    'visitation' is preserved in a footnote because it is a common literal alternative.
- source_word: יֹאבֵדוּ
  chosen: they will perish
  alternatives:
  - they will be destroyed
  lexicon: HALOT
  rationale: Qal imperfect of אבד expresses perishing or coming to ruin. 'They will
    perish' is a direct and idiomatic future rendering.
