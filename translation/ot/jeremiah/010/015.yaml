theological_decisions:
- issue: Nature of the idols in prophetic polemic
  chosen_reading: The verse describes idols as empty and doomed objects, without importing
    additional metaphysical claims beyond the text.
  alternative_readings:
  - Rendering the language more interpretively as 'false gods' or 'frauds' throughout
  rationale: The Hebrew focuses on vanity, manufactured character, and coming destruction.
    The translation preserves that polemical force without expanding into doctrinal
    paraphrase.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
