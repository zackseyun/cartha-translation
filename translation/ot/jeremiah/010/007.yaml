theological_decisions:
- issue: Divine kingship over the nations
  chosen_reading: King of the nations
  alternative_readings:
  - king over the nations
  rationale: The Hebrew directly addresses God as universal king. The translation
    preserves this theological claim without expanding it beyond the text.
- issue: Meaning of fearing God
  chosen_reading: fear you
  alternative_readings:
  - revere you
  rationale: The verse speaks of the proper response to God in terms of fear/awe.
    'Fear' preserves the stronger biblical category and lets readers retain the theological
    tension of dread and reverence rather than resolving it into mere respect.
  doctrine_reference: Translation philosophy §3
