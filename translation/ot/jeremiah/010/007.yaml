id: JER.10.7
reference: Jeremiah 10:7
source:
  edition: WLC
  text: מִ֣י לֹ֤א יִֽרָאֲ/ךָ֙ מֶ֣לֶךְ הַ/גּוֹיִ֔ם כִּ֥י לְ/ךָ֖ יָאָ֑תָה כִּ֣י בְ/כָל
    חַכְמֵ֧י הַ/גּוֹיִ֛ם וּ/בְ/כָל מַלְכוּתָ֖/ם מֵ/אֵ֥ין כָּמֽוֹ/ךָ־־׃
translation:
  text: Who would not fear you, King of the nations? For it is fitting for you; for
    among all the wise men of the nations and in all their kingdoms, there is none
    like you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Who should not fear you ... ?' The Hebrew rhetorical question can express
      either what would happen or what is proper.
    reason: lexical_alternative
  - marker: b
    text: Or 'it is due to you' / 'it befits you.' The sense is that such fear rightly
      belongs to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרָאֲךָ
  chosen: would not fear you
  alternatives:
  - will not fear you
  - should not fear you
  - revere you
  lexicon: HALOT
  rationale: The idiom מִי לֹא + imperfect is a rhetorical question meaning 'who would
    not...?' or 'who should not...?' The verb ירא commonly means 'fear' and can include
    reverential awe in relation to God. 'Fear you' preserves the lexical force better
    than weakening it to 'revere you,' while the rhetorical English 'would not' fits
    the sense naturally.
- source_word: מֶלֶךְ הַגּוֹיִם
  chosen: King of the nations
  alternatives:
  - King of the peoples
  - king over the nations
  lexicon: HALOT
  rationale: A construct phrase with definite noun 'the nations.' 'King of the nations'
    is the most direct and idiomatic rendering and preserves the royal title addressed
    to God.
- source_word: יָאָתָה
  chosen: it is fitting for you
  alternatives:
  - it is due to you
  - it belongs to you
  - it befits you
  lexicon: HALOT
  rationale: 'The verb conveys what is suitable, proper, or due. Because the Hebrew
    has an impersonal feminine singular form, English naturally supplies an impersonal
    subject: ''it is fitting.'' This captures the sense that fear belongs rightly
    to God.'
- source_word: חַכְמֵי הַגּוֹיִם
  chosen: the wise men of the nations
  alternatives:
  - the wise of the nations
  - the sages of the nations
  lexicon: HALOT
  rationale: חכמים refers to wise persons, often sages or counselors. 'Wise men' is
    a natural rendering and reflects the masculine plural form without unnecessary
    paraphrase.
- source_word: מַלְכוּתָם
  chosen: their kingdoms
  alternatives:
  - their royal realms
  - their kingship
  lexicon: HALOT
  rationale: The noun normally denotes kingdom or reign. In this plural possessive
    context, 'their kingdoms' is the clearest rendering and pairs well with the preceding
    reference to the nations.
- source_word: מֵאֵין כָּמוֹךָ
  chosen: there is none like you
  alternatives:
  - none is like you
  - from nothing is there like you
  lexicon: HALOT
  rationale: This is an idiomatic expression of incomparability. 'There is none like
    you' is standard, clear English that preserves the absolute comparison.
- source_word: כִּי ... כִּי
  chosen: For ... for ...
  alternatives:
  - Because ... because ...
  - Indeed ... for ...
  lexicon: HALOT
  rationale: 'The verse uses two כי clauses. Rendering both as ''for'' preserves the
    argumentative flow: first the propriety of fearing God, then the reason grounded
    in his incomparability among all nations and kingdoms.'
