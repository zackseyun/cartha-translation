theological_decisions:
- issue: Scope of judgment on idols/gods
  chosen_reading: The verse declares the destruction/perishing of false gods because
    they are not creators of the cosmos.
  alternative_readings:
  - The verse speaks metonymically of idols rather than spiritual beings
  rationale: The Aramaic text uses 'the gods' and contrasts them with the true Creator
    by their failure to make heaven and earth. The translation preserves the text's
    polemical force without resolving whether 'gods' refers strictly to idols, supposed
    deities, or both.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it.'
