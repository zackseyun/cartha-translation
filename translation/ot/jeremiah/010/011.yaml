id: JER.10.11
reference: Jeremiah 10:11
source:
  edition: WLC
  text: כִּ/דְנָה֙ תֵּאמְר֣וּן לְ/ה֔וֹם אֱלָ֣הַיָּ֔/א דִּֽי שְׁמַיָּ֥/א וְ/אַרְקָ֖/א
    לָ֣א עֲבַ֑דוּ יֵאבַ֧דוּ מֵֽ/אַרְעָ֛/א וּ/מִן תְּח֥וֹת שְׁמַיָּ֖/א אֵֽלֶּה־־׃ס
translation:
  text: 'Thus you shall say to them: “The gods that did not make the heavens and the
    earth will perish from the earth and from under these heavens.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “will be destroyed” or “will vanish.” The Aramaic verb can denote perishing
      or being wiped out.
    reason: lexical_alternative
  - marker: b
    text: “The gods” may refer to idols, supposed deities, or both; the text leaves
      the polemical reference broad.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּדְנָה
  chosen: Thus
  alternatives:
  - Like this
  - In this way
  lexicon: HALOT
  rationale: Aramaic demonstrative adverb introducing the exact formula to be spoken.
    'Thus' is idiomatic in prophetic speech and preserves the deictic force.
- source_word: תֵּאמְרוּן
  chosen: you shall say
  alternatives:
  - you will say
  - say
  lexicon: HALOT
  rationale: Imperfect 2mp in direct instruction. 'You shall say' fits the prophetic/jussive
    force in English better than a bare future.
- source_word: לְהוֹם
  chosen: to them
  alternatives:
  - to those people
  lexicon: HALOT
  rationale: Aramaic preposition plus 3mp pronoun; straightforward indirect object.
- source_word: אֱלָהַיָּא
  chosen: the gods
  alternatives:
  - gods
  lexicon: HALOT
  rationale: Determined plural noun in Aramaic. English naturally uses 'the gods'
    for the class being denounced.
- source_word: דִּי
  chosen: that
  alternatives:
  - which
  - who
  lexicon: HALOT
  rationale: Relative particle linking 'the gods' with the defining clause.
- source_word: שְׁמַיָּא וְאַרְקָא
  chosen: the heavens and the earth
  alternatives:
  - heaven and earth
  - the sky and the earth
  lexicon: HALOT
  rationale: Standard merism for the created universe. 'The heavens and the earth'
    preserves the familiar biblical creation-language and the Aramaic plurale tantum
    for 'heavens'.
- source_word: לָא עֲבַדוּ
  chosen: did not make
  alternatives:
  - have not made
  - did not fashion
  lexicon: HALOT
  rationale: Negated perfect describing what these gods failed to do. 'Make' is the
    most direct and idiomatic rendering in this creation context.
- source_word: יֵאבַדוּ
  chosen: will perish
  alternatives:
  - shall perish
  - will be destroyed
  - will vanish
  lexicon: HALOT
  rationale: Imperfect of אבד. 'Will perish' preserves the intransitive sense and
    the irony that non-creator gods themselves pass away.
- source_word: מֵאַרְעָא
  chosen: from the earth
  alternatives:
  - out of the earth
  - from the land
  lexicon: HALOT
  rationale: Given the preceding cosmic pair 'heavens and earth,' 'earth' is preferable
    to 'land' here.
- source_word: וּמִן תְּחוֹת שְׁמַיָּא אֵלֶּה
  chosen: and from under these heavens
  alternatives:
  - and from beneath these heavens
  - and from under heaven
  lexicon: HALOT
  rationale: תְּחוֹת means 'under/beneath.' Retaining 'these heavens' reflects the
    demonstrative אֵלֶּה and the concrete cosmic scope of the judgment.
