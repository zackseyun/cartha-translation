theological_decisions:
- issue: Referent of 'Portion of Jacob'
  chosen_reading: The phrase refers to the LORD as Jacob/Israel's allotted God, contrasted with idols.
  alternative_readings:
  - The phrase could be rendered more abstractly as 'Jacob's share' without explicit titular nuance.
  rationale: The immediate context contrasts idols with the living God. Rendering the phrase as 'the Portion of Jacob' preserves this covenantal contrast without adding explanatory material to the main text.
