id: JER.10.16
reference: Jeremiah 10:16
source:
  edition: WLC
  text: לֹֽא כְ/אֵ֜לֶּה חֵ֣לֶק יַעֲקֹ֗ב כִּֽי יוֹצֵ֤ר הַ/כֹּל֙ ה֔וּא וְ/יִ֨שְׂרָאֵ֔ל שֵׁ֖בֶט נַֽחֲלָת֑/וֹ יְהוָ֥ה צְבָא֖וֹת שְׁמֽ/וֹ־־׃ס
translation:
  text: Not like these is the Portion of Jacob, for he is the Former of all things, and Israel is the tribe of his inheritance; Yahweh of hosts is his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jacob’s portion.' The Hebrew phrase can be rendered either way; the sense is that the God of Israel is not like the idols just described.
    reason: lexical_alternative
  - marker: b
    text: Or 'Israel is the scepter/rod of his inheritance.' The Hebrew word can mean 'tribe,' 'rod,' or 'scepter'; 'tribe' best fits the reference to Israel as the people belonging to the LORD.
    reason: alternative_reading
lexical_decisions:
- source_word: חֵלֶק יַעֲקֹב
  chosen: the Portion of Jacob
  alternatives:
  - the portion of Jacob
  - Jacob's portion
  lexicon: HALOT
  rationale: חֵלֶק commonly means 'portion, share.' Here it refers to Israel/Jacob's allotted God in contrast to idols. Capitalizing 'Portion' preserves its quasi-titular force without over-paraphrasing.
- source_word: כְאֵלֶּה
  chosen: like these
  alternatives:
  - like these things
  - like these idols
  lexicon: HALOT
  rationale: The demonstrative points back to the idols described in the immediate context. 'Like these' is sufficiently literal; 'idols' is interpretive and therefore left implicit.
- source_word: יוֹצֵר
  chosen: Former
  alternatives:
  - Maker
  - Creator
  - one who formed
  lexicon: HALOT
  rationale: יוֹצֵר emphasizes forming/fashioning. 'Former' preserves the verbal imagery and the contrast with man-made idols better than the more generic 'Creator,' while remaining idiomatic in English.
- source_word: הַכֹּל
  chosen: all things
  alternatives:
  - everything
  - the whole
  lexicon: HALOT
  rationale: In this context the phrase denotes the totality of what God has formed. 'All things' is natural English and preserves the comprehensive scope.
- source_word: שֵׁבֶט נַחֲלָתוֹ
  chosen: the tribe of his inheritance
  alternatives:
  - the scepter of his inheritance
  - the rod of his inheritance
  lexicon: HALOT
  rationale: 'שֵׁבֶט can mean ''tribe,'' ''rod,'' or ''scepter.'' With Israel as the subject and נַחֲלָתוֹ (''his inheritance''), ''tribe'' best fits the covenant-people sense: Israel is the people belonging to him. The ''scepter/rod'' sense is less coherent here and likely reflects a different semantic domain.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  - of heavenly armies
  lexicon: HALOT
  rationale: In the fixed title יְהוָה צְבָאוֹת, 'of hosts' is the standard concise rendering and preserves the breadth of the term, which can include heavenly and earthly armies.
- source_word: שְׁמוֹ
  chosen: is his name
  alternatives:
  - his name is
  - that is his name
  lexicon: HALOT
  rationale: A straightforward rendering of the nominal clause, preserving the solemn formula that identifies the God just described.
