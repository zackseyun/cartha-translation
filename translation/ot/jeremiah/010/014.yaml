id: JER.10.14
reference: Jeremiah 10:14
source:
  edition: WLC
  text: נִבְעַ֤ר כָּל אָדָם֙ מִ/דַּ֔עַת הֹבִ֥ישׁ כָּל צוֹרֵ֖ף מִ/פָּ֑סֶל כִּ֛י שֶׁ֥קֶר
    נִסְכּ֖/וֹ וְ/לֹא ר֥וּחַ בָּֽ/ם־־־׃
translation:
  text: Every man is stupid, without knowledge; every metalworker is put to shame
    by his idol, for his cast image is a lie, and there is no breath in them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Every person is brutish for lack of knowledge.' The Hebrew can be rendered
      more formally with 'brutish' and the preposition may be taken causally ('for
      lack of knowledge').
    reason: lexical_alternative
  - marker: b
    text: Or 'his molten image is falsehood.'
    reason: lexical_alternative
  - marker: c
    text: '''Breath'' may also be rendered ''spirit''; the point is that the idols
      have no life in them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְעַר
  chosen: is stupid
  alternatives:
  - is brutish
  - is senseless
  - is stupidly ignorant
  lexicon: HALOT
  rationale: From בער in the Niphal, conveying brutishness or senselessness rather
    than mere lack of information. 'Is stupid' gives the force in clear modern English;
    'brutish' is possible but more archaic.
- source_word: כָּל אָדָם
  chosen: Every man
  alternatives:
  - All humankind
  - Everyone
  lexicon: HALOT
  rationale: אָדָם here is generic for humanity, but the project prefers gender-accurate
    rendering where the source uses masculine representative language. 'Every man'
    preserves the Hebrew form and distributive force of כָּל.
- source_word: מִדַּעַת
  chosen: without knowledge
  alternatives:
  - for lack of knowledge
  - from knowledge
  lexicon: HALOT
  rationale: The preposition מִן with an abstract noun here is privative/causal. 'Without
    knowledge' is concise and idiomatic, capturing the sense that people are rendered
    senseless in relation to knowledge.
- source_word: הֹבִישׁ
  chosen: is put to shame
  alternatives:
  - is shamed
  - is disgraced
  lexicon: HALOT
  rationale: The Hiphil of בוש commonly means to cause shame or put to shame. Passive
    English best fits the clause structure with 'every metalworker' as the one exposed
    and disgraced by the idol.
- source_word: צוֹרֵף
  chosen: metalworker
  alternatives:
  - refiner
  - goldsmith
  - smith
  lexicon: HALOT
  rationale: The participle denotes one who smelts/refines metal and fashions images.
    'Metalworker' is broad enough for the context and more natural than the narrower
    'refiner' or potentially too specific 'goldsmith'.
- source_word: מִפָּסֶל
  chosen: by his idol
  alternatives:
  - by the carved image
  - because of the idol
  lexicon: HALOT
  rationale: פֶּסֶל is an idol-image, often carved, but in context the focus is the
    manufactured cult image generally. 'By his idol' communicates both instrument/cause
    and the possessive relation implied by the artisan's product.
- source_word: שֶׁקֶר
  chosen: a lie
  alternatives:
  - falsehood
  - deception
  lexicon: HALOT
  rationale: The noun denotes falsehood. 'A lie' is vivid and idiomatic in English,
    matching the prophetic polemic against idols as fraudulent objects.
- source_word: נִסְכּוֹ
  chosen: his cast image
  alternatives:
  - his molten image
  - his metal image
  lexicon: HALOT
  rationale: From נסך/related noun usage for a poured or cast metal image. 'Cast image'
    is standard, clear English and fits the artisan context. 'Molten image' is possible
    but less natural in contemporary English.
- source_word: וְלֹא רוּחַ בָּם
  chosen: and there is no breath in them
  alternatives:
  - and there is no spirit in them
  - and there is no wind in them
  lexicon: HALOT
  rationale: רוּחַ can mean breath, spirit, or wind. In idol polemic the point is
    that the images are lifeless, so 'breath' best conveys absence of life. The plural
    suffix 'in them' refers to the idol-images collectively, despite the preceding
    singular forms.
