id: JER.10.13
reference: Jeremiah 10:13
source:
  edition: WLC
  text: לְ/ק֨וֹל תִּתּ֜/וֹ הֲמ֥וֹן מַ֨יִם֙ בַּ/שָּׁמַ֔יִם וַ/יַּעֲלֶ֥ה נְשִׂאִ֖ים
    מִ/קְצֵ֣ה ארץ בְּרָקִ֤ים לַ/מָּטָר֙ עָשָׂ֔ה וַ/יּ֥וֹצֵא ר֖וּחַ מֵ/אֹצְרֹתָֽי/ו׃
translation:
  text: At the sound of his voice, there is a roar of waters in the heavens, and he
    makes clouds rise from the ends of the earth; he makes lightning for the rain,
    and brings out the wind from his storehouses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'clouds' could be rendered 'vapors' or 'mists.'
    reason: lexical_alternative
  - marker: b
    text: Or 'At the voice of his giving, a multitude of waters is in the heavens';
      the Hebrew idiom is compressed and is commonly rendered more idiomatically in
      English.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְקוֹל
  chosen: At the sound of
  alternatives:
  - At the voice of
  - When he thunders
  lexicon: HALOT
  rationale: 'קוֹל commonly means ''sound'' or ''voice.'' With the prefixed ל, the
    phrase is idiomatically temporal/circumstantial: ''at the sound of.'' ''Voice''
    is possible, but ''sound'' fits the immediate meteorological imagery while still
    allowing the anthropomorphic force of divine speech.'
- source_word: תִּתּוֹ
  chosen: his voice
  alternatives:
  - his giving
  - he gives
  lexicon: HALOT
  rationale: 'Although from נתן (''to give''), in this idiom with לְקוֹל the sense
    is elliptical: ''at the giving of his voice,'' i.e., ''at the sound of his voice.''
    English requires smoothing the idiom. This preserves the Hebrew image without
    wooden awkwardness.'
- source_word: הֲמוֹן מַיִם
  chosen: a roar of waters
  alternatives:
  - an abundance of waters
  - the tumult of waters
  lexicon: HALOT
  rationale: הֲמוֹן can denote noise, tumult, or abundance. In this storm context,
    the auditory sense is prominent, so 'a roar of waters' best matches the imagery.
    'Abundance' is possible but underplays the acoustic emphasis created by קוֹל.
- source_word: בַּשָּׁמַיִם
  chosen: in the heavens
  alternatives:
  - in the sky
  - in heaven
  lexicon: HALOT
  rationale: שָׁמַיִם can mean 'heavens' or 'sky.' 'Heavens' preserves the elevated
    register and cosmic scope of the verse; the plural also matches normal Hebrew
    usage better than singular 'heaven.'
- source_word: וַיַּעֲלֶה
  chosen: he makes ... rise
  alternatives:
  - he causes ... to ascend
  - he brings up
  lexicon: HALOT
  rationale: 'The Hiphil of עלה is causative: ''cause to go up.'' In natural English
    with weather imagery, ''makes ... rise'' is clear and faithful.'
- source_word: נְשִׂאִים
  chosen: clouds
  alternatives:
  - vapors
  - mists
  lexicon: HALOT
  rationale: נְשִׂאִים in meteorological contexts refers to clouds or vapor masses.
    Traditional 'vapors' is possible, but 'clouds' is more natural modern English
    and fits the storm sequence of waters, lightning, rain, and wind.
- source_word: מִקְצֵה אֶרֶץ
  chosen: from the ends of the earth
  alternatives:
  - from the edge of the earth
  - from the extremities of the land
  lexicon: HALOT
  rationale: This is a standard idiom for the farthest reaches of the world. 'Ends
    of the earth' is both accurate and idiomatic in English.
- source_word: בְּרָקִים לַמָּטָר עָשָׂה
  chosen: he makes lightning for the rain
  alternatives:
  - he makes lightnings with the rain
  - he makes flashes for the rainstorm
  lexicon: HALOT
  rationale: The Hebrew most naturally expresses lightning in relation to rain/storm.
    'For the rain' preserves the preposition ל and the coordination of storm phenomena
    without overinterpreting the exact meteorological relation.
- source_word: וַיּוֹצֵא רוּחַ
  chosen: and brings out the wind
  alternatives:
  - and brings forth the wind
  - and sends out the wind
  - and brings out the spirit
  lexicon: HALOT
  rationale: רוּחַ can mean 'wind,' 'breath,' or 'spirit.' In this weather context,
    'wind' is clearly intended. 'Brings out' reflects the causative motion from divine
    storehouses.
- source_word: מֵאֹצְרֹתָיו
  chosen: from his storehouses
  alternatives:
  - from his treasuries
  - from his خز?
  lexicon: HALOT
  rationale: אֹצָר denotes a storehouse, treasury, or repository. In weather imagery,
    'storehouses' is the clearest English choice and echoes biblical stock imagery
    of God storing natural forces.
