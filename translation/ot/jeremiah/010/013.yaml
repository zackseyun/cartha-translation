theological_decisions:
- issue: Rendering anthropomorphic storm-theophany language
  chosen_reading: Retain personal divine agency throughout ('his voice,' 'he makes,'
    'brings out')
  alternative_readings:
  - Depersonalized meteorological description
  rationale: The verse attributes weather phenomena directly to God's active rule.
    The translation preserves this theological claim without reducing it to impersonal
    natural process.
