id: JER.6.28
reference: Jeremiah 6:28
source:
  edition: WLC
  text: כֻּלָּ/ם֙ סָרֵ֣י סֽוֹרְרִ֔ים הֹלְכֵ֥י רָכִ֖יל נְחֹ֣שֶׁת וּ/בַרְזֶ֑ל כֻּלָּ֥/ם
    מַשְׁחִיתִ֖ים הֵֽמָּה׃
translation:
  text: All of them are the most stubborn rebels, going about as slanderers; they
    are bronze and iron; all of them are corrupters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'chief rebels'; the Hebrew expression is intensive and may be rendered
      more literally as 'rebels of rebels.'
    reason: lexical_alternative
  - marker: b
    text: Or 'going about with gossip' or 'as talebearers.'
    reason: lexical_alternative
  - marker: c
    text: '''Bronze and iron'' is likely figurative, portraying them as hard, unrefined,
      or base in character.'
    reason: cultural_note
  - marker: d
    text: Or 'destroyers.' The Hebrew can denote those who ruin or corrupt.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּם
  chosen: All of them
  alternatives:
  - They all
  - Every one of them
  lexicon: HALOT
  rationale: Fronted for emphasis in Hebrew; rendered with a natural English plural
    expression that preserves the comprehensive scope.
- source_word: סָרֵי סוֹרְרִים
  chosen: the most stubborn rebels
  alternatives:
  - rebels of rebels
  - utterly stubborn ones
  - chief rebels
  lexicon: HALOT
  rationale: The construction is intensive. סָרֵי from סור/סרר here functions idiomatically
    with סוֹרְרִים to heighten their rebelliousness. 'The most stubborn rebels' communicates
    the superlative/intensive force more clearly than a wooden 'rebels of rebels.'
- source_word: הֹלְכֵי רָכִיל
  chosen: going about as slanderers
  alternatives:
  - going about with gossip
  - walking as talebearers
  - going around spreading slander
  lexicon: HALOT
  rationale: The participial phrase describes habitual conduct. רָכִיל can denote
    gossip, talebearing, or slander; in prophetic denunciation, 'slanderers' best
    captures the morally destructive speech in concise modern English.
- source_word: נְחֹשֶׁת וּבַרְזֶל
  chosen: bronze and iron
  alternatives:
  - copper and iron
  lexicon: HALOT
  rationale: נְחֹשֶׁת often refers broadly to copper/bronze. 'Bronze and iron' is
    the conventional and likely sense in this figurative pairing, conveying hardness/base
    quality in context.
- source_word: מַשְׁחִיתִים
  chosen: corrupters
  alternatives:
  - destroyers
  - those who act corruptly
  - corrupt men
  lexicon: HALOT
  rationale: The Hiphil participle from שׁחת can mean causing ruin/corruption. In
    this context of moral indictment, 'corrupters' preserves both the active participial
    force and the ethical sense better than the more purely physical 'destroyers.'
- source_word: הֵמָּה
  chosen: they are
  alternatives:
  - they themselves are
  lexicon: HALOT
  rationale: Rendered as an explicit pronoun plus copular sense in English to preserve
    the emphatic concluding identification.
