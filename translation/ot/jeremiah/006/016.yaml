theological_decisions:
- issue: Rendering נֶפֶשׁ in a context of promised inner relief
  chosen_reading: for your souls
  alternative_readings:
  - for yourselves
  - for your lives
  rationale: The verse promises deep personal rest in response to walking in the good
    way. 'Souls' preserves the spiritual and anthropological weight of נֶפֶשׁ in this
    context while remaining faithful to the Hebrew. This does not impose a technical
    doctrine of the soul beyond the text.
  doctrine_reference: Translation philosophy §6; Affirmations (preserve historic Christian
    readability without importing extra doctrinal claims)
