id: JER.6.16
reference: Jeremiah 6:16
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֡ה עִמְדוּ֩ עַל דְּרָכִ֨ים וּ/רְא֜וּ וְ/שַׁאֲל֣וּ לִ/נְתִב֣וֹת
    עוֹלָ֗ם אֵי זֶ֨ה דֶ֤רֶךְ הַ/טּוֹב֙ וּ/לְכוּ בָ֔/הּ וּ/מִצְא֥וּ מַרְגּ֖וֹעַ לְ/נַפְשְׁ/כֶ֑ם
    וַ/יֹּאמְר֖וּ לֹ֥א נֵלֵֽךְ־׀־־׃
translation:
  text: 'Thus says the LORD: “Stand by the roads and look, and ask for the ancient
    paths, where the good way is; then walk in it, and find rest for your souls. But
    they said, ‘We will not walk in it.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the paths of old' or 'the everlasting paths.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'for your souls'; נֶפֶשׁ can also mean 'selves' or 'lives' depending
      on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the Septuagintal pattern.
- source_word: עִמְדוּ
  chosen: Stand
  alternatives:
  - Take your stand
  - Stand still
  lexicon: HALOT
  rationale: Imperative plural of עמד here calls for stopping and positioning oneself
    attentively. 'Stand' is concise and natural in English.
- source_word: עַל דְּרָכִים
  chosen: by the roads
  alternatives:
  - at the roads
  - on the roads
  - at the crossroads
  lexicon: HALOT
  rationale: The phrase literally means 'upon/by roads.' In context it evokes stopping
    where routes diverge in order to discern direction. 'By the roads' preserves the
    image without over-specifying 'crossroads,' which is interpretive though contextually
    plausible.
- source_word: וּרְאוּ
  chosen: look
  alternatives:
  - see
  - consider
  lexicon: HALOT
  rationale: The imperative is physical and figurative; 'look' fits the road imagery
    and the call to discernment better than the flatter 'see.'
- source_word: וְשַׁאֲלוּ
  chosen: ask
  alternatives:
  - inquire
  - seek
  lexicon: HALOT
  rationale: The verb means to ask or inquire. 'Ask' is the most direct and idiomatic
    rendering in a sequence of imperatives.
- source_word: לִנְתִבוֹת עוֹלָם
  chosen: for the ancient paths
  alternatives:
  - for the everlasting paths
  - for the paths of old
  lexicon: HALOT
  rationale: נְתִיבוֹת are tracks/paths; עוֹלָם here points to antiquity or long duration.
    'Ancient paths' is idiomatic and contextually apt, referring to long-established
    covenantal ways rather than metaphysical eternity.
- source_word: אֵי זֶה דֶרֶךְ הַטּוֹב
  chosen: where the good way is
  alternatives:
  - which is the good way
  - where this good way is
  lexicon: HALOT
  rationale: אֵי זֶה asks for identification ('where/which'). English idiom favors
    'where the good way is' after 'ask for the ancient paths,' preserving the sense
    of seeking the right route.
- source_word: וּלְכוּ בָהּ
  chosen: then walk in it
  alternatives:
  - and go in it
  - and walk by it
  lexicon: HALOT
  rationale: הלך with ב marks conduct along a path. 'Walk in it' preserves the metaphor
    of manner of life. 'Then' smooths the imperative sequence in English without adding
    meaning beyond the progression already implied.
- source_word: וּמִצְאוּ מַרְגּוֹעַ
  chosen: and find rest
  alternatives:
  - and you will find rest
  - and find repose
  lexicon: HALOT
  rationale: The imperative followed by imperative can express result in context.
    'Find rest' is a natural rendering of מַרְגּוֹעַ and echoes the settled relief
    promised by obedience.
- source_word: לְנַפְשְׁכֶם
  chosen: for your souls
  alternatives:
  - for yourselves
  - for your lives
  lexicon: HALOT
  rationale: נֶפֶשׁ often denotes the self/life, but 'souls' is a well-established
    and contextually fitting rendering here, expressing the inner person without requiring
    a dualistic anthropology. It also preserves the resonance later echoed in Matthew
    11:29.
- source_word: וַיֹּאמְרוּ
  chosen: But they said
  alternatives:
  - And they said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative, but the sense is adversative
    in context because the people's response rejects the divine summons. 'But' makes
    that contrast explicit in idiomatic English.
- source_word: לֹא נֵלֵךְ
  chosen: We will not walk in it
  alternatives:
  - We will not go
  - We will not walk
  lexicon: HALOT
  rationale: The Hebrew says simply 'we will not go/walk.' Supplying 'in it' in English
    clarifies that the refusal is to walk in the good way just mentioned; this is
    an implicit object recoverable from the immediate context, not a paraphrastic
    addition.
