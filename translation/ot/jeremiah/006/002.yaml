id: JER.6.2
reference: Jeremiah 6:2
source:
  edition: WLC
  text: הַ/נָּוָה֙ וְ/הַ/מְּעֻנָּגָ֔ה דָּמִ֖יתִי בַּת צִיּֽוֹן־׃
translation:
  text: I have likened daughter Zion to a lovely and delicate woman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'I will destroy daughter Zion, the lovely and delicate one.'
      The Hebrew verb is difficult here, and some take it in a destructive sense rather
      than 'I have likened.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַנָּוָה
  chosen: lovely
  alternatives:
  - beautiful
  - comely
  - pasture-dwelling
  lexicon: HALOT
  rationale: The adjective נָוָה commonly denotes beauty or loveliness in adjectival
    use. Although the root can be associated elsewhere with habitation/pasture, in
    this poetic context paired with מְעֻנָּגָה it most naturally describes attractiveness.
    'Lovely' is natural modern English and preserves the feminine singular sense.
- source_word: וְהַמְּעֻנָּגָה
  chosen: delicate
  alternatives:
  - pampered
  - luxurious
  - dainty
  lexicon: HALOT
  rationale: From ענג, conveying softness, delicacy, or luxurious refinement. 'Delicate'
    fits the poetic pairing with 'lovely' and avoids overcommitting to a moralizing
    nuance like 'pampered,' while still suggesting sheltered refinement.
- source_word: דָּמִיתִי
  chosen: I have likened
  alternatives:
  - I compare
  - I have destroyed
  - you are like
  lexicon: HALOT
  rationale: The verb דמה in Qal commonly means 'to be like' or in some contexts 'to
    liken/compare.' Here the first person singular form with an object is best rendered
    'I have likened' or 'I compare.' Some have argued for a sense related to destruction/silencing
    from a different nuance/root, but the immediate syntax with the descriptive adjectives
    strongly supports comparison imagery.
- source_word: בַּת צִיּוֹן
  chosen: daughter Zion
  alternatives:
  - the daughter of Zion
  - Daughter Zion
  lexicon: HALOT
  rationale: This is the standard prophetic personification of Zion/Jerusalem as a
    daughter. 'daughter Zion' preserves the Hebrew construct compactly and keeps the
    personified poetic force. Capitalization is not required in running text, though
    the phrase functions as a personification.
- source_word: implicit feminine referent
  chosen: woman
  alternatives:
  - one
  - maiden
  rationale: 'English requires an explicit noun to make the comparison idiomatic:
    ''to a lovely and delicate woman.'' The Hebrew adjectives are feminine singular
    and imply a feminine figure. ''Woman'' is the least interpretively loaded supplement;
    ''maiden'' would add age/youth not explicit in the text.'
