id: JER.6.15
reference: Jeremiah 6:15
source:
  edition: WLC
  text: הֹבִ֕ישׁוּ כִּ֥י תוֹעֵבָ֖ה עָשׂ֑וּ גַּם בּ֣וֹשׁ לֹֽא יֵב֗וֹשׁוּ גַּם הַכְלִים֙ לֹ֣א יָדָ֔עוּ לָ/כֵ֞ן יִפְּל֧וּ בַ/נֹּפְלִ֛ים בְּ/עֵת פְּקַדְתִּ֥י/ם יִכָּשְׁל֖וּ אָמַ֥ר יְהוָֽה־־־־׃ס
translation:
  text: Were they ashamed because they had done an abomination? No, they were not ashamed at all; they did not even know how to blush. Therefore they will fall among the fallen; at the time I punish them, they will stumble, says Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the time I visit them.' The Hebrew verb can mean 'visit' or 'attend to,' but here it carries the sense of punitive visitation.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹבִישׁוּ
  chosen: Were they ashamed
  alternatives:
  - They were put to shame
  - They acted shamefully
  lexicon: HALOT
  rationale: The form is best taken here as an interrogative-perfect in context, introducing the rhetorical question answered immediately by the following clauses. 'Were they ashamed' fits the discourse flow better than a flat indicative and matches the prophet's irony.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: 'Introduces the reason for the rhetorical question: their shame would be expected because they committed something detestable.'
- source_word: תוֹעֵבָה
  chosen: an abomination
  alternatives:
  - a detestable thing
  - something abhorrent
  lexicon: HALOT
  rationale: A strong covenantal-moral term in prophetic literature. 'Abomination' preserves the gravity and familiar biblical force without paraphrase.
- source_word: עָשׂוּ
  chosen: they had done
  alternatives:
  - they did
  - they committed
  lexicon: HALOT
  rationale: Rendered with English past perfect for smooth linkage to the rhetorical question and to reflect completed action prior to the expected shame.
- source_word: גַּם בּוֹשׁ לֹא יֵבֹשׁוּ
  chosen: they were not ashamed at all
  alternatives:
  - they did not at all feel shame
  - they were not even ashamed
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the negation. 'Not ashamed at all' captures the emphatic force in natural English.
- source_word: גַּם
  chosen: at all / even
  alternatives:
  - also
  lexicon: HALOT
  rationale: Here גַּם functions adverbially for emphasis rather than simple addition. It strengthens the denial in both cola.
- source_word: הַכְלִים
  chosen: to blush
  alternatives:
  - to feel humiliation
  - to be humiliated
  lexicon: HALOT
  rationale: In parallel with בושׁ, this verb refers to the experience or display of shame. 'Blush' idiomatically conveys visible shame in English and fits the clause 'did not know how to blush.'
- source_word: לֹא יָדָעוּ
  chosen: they did not even know
  alternatives:
  - they did not know
  - they were ignorant of
  lexicon: HALOT
  rationale: Combined with the previous infinitive construct, the sense is that they had lost even the capacity for shame. 'Even' reflects the emphatic parallelism.
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For that reason
  lexicon: HALOT
  rationale: Marks the judgment consequence flowing from their shamelessness.
- source_word: יִפְּלוּ בַנֹּפְלִים
  chosen: they will fall among the fallen
  alternatives:
  - they will fall with those who fall
  - they will fall among those falling
  lexicon: HALOT
  rationale: The phrase is terse and poetic. 'Among the fallen' preserves the Hebrew wordplay and the image of joining those already struck down.
- source_word: בְּעֵת פְּקַדְתִּים
  chosen: at the time I punish them
  alternatives:
  - when I attend to them
  - at the time I visit them
  lexicon: HALOT
  rationale: פקד can mean visit/attend, but in judgment contexts it commonly denotes punitive visitation. 'Punish' makes the judicial sense explicit in clear English.
- source_word: יִכָּשְׁלוּ
  chosen: they will stumble
  alternatives:
  - they will be overthrown
  - they will totter
  lexicon: HALOT
  rationale: The Niphal here conveys collapse under judgment. 'Stumble' is the direct lexical sense and suits the parallel with 'fall.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
