id: JER.6.3
reference: Jeremiah 6:3
source:
  edition: WLC
  text: אֵלֶ֛י/הָ יָבֹ֥אוּ רֹעִ֖ים וְ/עֶדְרֵי/הֶ֑ם תָּקְע֨וּ עָלֶ֤י/הָ אֹהָלִים֙ סָבִ֔יב
    רָע֖וּ אִ֥ישׁ אֶת יָדֽ/וֹ־׃
translation:
  text: To her shepherds will come with their flocks; they will pitch tents against
    her all around; each will pasture his own portion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'each will pasture his hand.' The expression is idiomatic,
      likely meaning each one will pasture or consume the area allotted to him.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶיהָ
  chosen: To her
  alternatives:
  - Against her
  - Unto her
  lexicon: HALOT
  rationale: The preposition אֶל commonly means 'to, toward.' Here it introduces the
    hostile approach to daughter Zion/Jerusalem. 'To her' preserves the basic directional
    sense, while the hostile nuance is made clearer later by 'against her' with עָלֶיהָ.
- source_word: יָבֹאוּ
  chosen: will come
  alternatives:
  - shall come
  - will arrive
  lexicon: HALOT
  rationale: Simple imperfect of בוא, rendered straightforwardly as future in context.
- source_word: רֹעִים
  chosen: shepherds
  alternatives:
  - pastors
  - herdsmen
  lexicon: HALOT
  rationale: Although metaphorical for invading rulers, the image of 'shepherds' should
    be preserved because the verse sustains a pastoral metaphor through 'flocks' and
    'pasture.' 'Pastors' would be misleading in modern English.
- source_word: וְעֶדְרֵיהֶם
  chosen: with their flocks
  alternatives:
  - and their flocks
  lexicon: HALOT
  rationale: The conjunction plus noun naturally yields accompaniment in English.
    'Flocks' preserves the shepherding imagery and likely refers metaphorically to
    the armies accompanying the leaders.
- source_word: תָּקְעוּ
  chosen: will pitch
  alternatives:
  - will set up
  - will drive in
  lexicon: HALOT
  rationale: With 'tents' as object, the idiom means to pitch or set up tents. 'Pitch'
    is the most natural English collocation.
- source_word: עָלֶיהָ
  chosen: against her
  alternatives:
  - over her
  - upon her
  - by her
  lexicon: HALOT
  rationale: While עַל can mean 'on/upon,' in this military context with encampment
    it carries an adversative sense. 'Against her' makes the siege imagery explicit
    without over-paraphrasing.
- source_word: אֹהָלִים סָבִיב
  chosen: tents ... all around
  alternatives:
  - tents around
  - encampments all around
  lexicon: HALOT
  rationale: The noun plus adverb conveys surrounding encampment. 'All around' captures
    the siege setting clearly.
- source_word: רָעוּ
  chosen: will pasture
  alternatives:
  - will graze
  - will feed
  lexicon: HALOT
  rationale: The verb רעה continues the shepherd metaphor. 'Pasture' preserves the
    image better than the more interpretive 'devour' or the less natural 'graze' for
    human subjects.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - every man
  - each man
  lexicon: HALOT
  rationale: Although literally 'man,' distributive אִישׁ here functions idiomatically
    as 'each.' This is not a gender-neutralizing move but an accurate rendering of
    the distributive sense in English.
- source_word: אֶת יָדוֹ
  chosen: his own portion
  alternatives:
  - what is at his hand
  - his place
  - his area
  lexicon: HALOT
  rationale: The idiom 'pasture each his hand' is difficult literally. In context
    it refers to each shepherd/commander grazing or consuming the area allotted to
    him. 'His own portion' communicates the idiomatic sense in readable English while
    preserving the distributive force.
