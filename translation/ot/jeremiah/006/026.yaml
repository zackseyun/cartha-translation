id: JER.6.26
reference: Jeremiah 6:26
source:
  edition: WLC
  text: בַּת עַמִּ֤/י חִגְרִי שָׂק֙ וְ/הִתְפַּלְּשִׁ֣י בָ/אֵ֔פֶר אֵ֤בֶל יָחִיד֙ עֲשִׂ֣י
    לָ֔/ךְ מִסְפַּ֖ד תַּמְרוּרִ֑ים כִּ֣י פִתְאֹ֔ם יָבֹ֥א הַ/שֹּׁדֵ֖ד עָלֵֽי/נוּ־־׃
translation:
  text: Daughter of my people, put on sackcloth and roll in ashes; make mourning as
    for an only son for yourself, a bitter lamentation, for suddenly the destroyer
    will come upon us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and wallow in ashes' or 'cover yourself with ashes.' The Hebrew verb
      depicts a physical act of mourning in ashes.
    reason: lexical_alternative
  - marker: b
    text: Literally 'mourning of an only one'; idiomatically, mourning as for an only
      son.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew reads 'upon us,' preserving the prophet's identification with
      the people; some translations smooth this to 'upon you.'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּת עַמִּי
  chosen: Daughter of my people
  alternatives:
  - O daughter of my people
  - My dear people
  lexicon: HALOT
  rationale: A direct vocative is preserved. 'Daughter of my people' reflects the
    Hebrew construct and prophetic personification of the people as a daughter. 'O'
    is stylistic rather than lexical; 'My dear people' is too interpretive.
- source_word: חִגְרִי שָׂק
  chosen: put on sackcloth
  alternatives:
  - gird yourself with sackcloth
  - tie on sackcloth
  lexicon: HALOT
  rationale: The verb literally means 'gird' or 'bind on,' but in English 'put on
    sackcloth' communicates the mourning action naturally while staying close to the
    source.
- source_word: וְהִתְפַּלְּשִׁי בָאֵפֶר
  chosen: and roll in ashes
  alternatives:
  - and wallow in ashes
  - and cover yourself with ashes
  lexicon: HALOT
  rationale: The hitpael form conveys throwing oneself about or rolling in dust/ashes
    as a mourning act. 'Roll in ashes' is vivid and idiomatic without over-paraphrasing.
    'Cover yourself with ashes' is possible but less forceful.
- source_word: אֵבֶל יָחִיד
  chosen: mourning as for an only son
  alternatives:
  - mourning for an only child
  - mourning for an only one
  lexicon: HALOT
  rationale: יָחִיד in mourning contexts commonly refers to an only son, an idiom
    for the most intense grief. 'Only son' best matches the conventional force and
    avoids flattening the image.
- source_word: עֲשִׂי לָךְ
  chosen: make ... for yourself
  alternatives:
  - do ... for yourself
  - observe ... for yourself
  lexicon: HALOT
  rationale: The imperative plus reflexive pronoun is retained in sense. In English
    it is most natural to place 'for yourself' after the mourning phrase rather than
    render woodenly.
- source_word: מִסְפַּד תַּמְרוּרִים
  chosen: a bitter lamentation
  alternatives:
  - most bitter wailing
  - a lament of bitterness
  lexicon: HALOT
  rationale: מִסְפַּד denotes lamentation/wailing for the dead; תַּמְרוּרִים intensifies
    with the sense of bitterness. 'A bitter lamentation' is natural and sufficiently
    weighty.
- source_word: כִּי פִתְאֹם
  chosen: for suddenly
  alternatives:
  - because suddenly
  - for all at once
  lexicon: HALOT
  rationale: The conjunction introduces the reason for mourning. 'For suddenly' is
    concise and preserves the causal force.
- source_word: הַשֹּׁדֵד
  chosen: the destroyer
  alternatives:
  - the ravager
  - the plunderer
  - the despoiler
  lexicon: HALOT
  rationale: The participle denotes one who devastates or plunders. 'Destroyer' best
    captures the broader destructive force in context, not merely theft.
- source_word: עָלֵינוּ
  chosen: upon us
  alternatives:
  - against us
  - on us
  lexicon: HALOT
  rationale: The first person plural should be preserved. Jeremiah shifts from addressing
    'daughter of my people' to including himself with the people in the coming disaster;
    'upon us' reflects that movement.
