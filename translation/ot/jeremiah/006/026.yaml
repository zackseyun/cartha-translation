theological_decisions:
- issue: Prophetic shift from second-person feminine address to first-person plural
    conclusion
  chosen_reading: Retain the shift with 'Daughter of my people ... upon us'
  alternative_readings:
  - Smooth the pronouns to 'upon you' for stylistic consistency
  rationale: The Hebrew text intentionally moves from direct address to communal identification.
    Preserving the shift maintains the prophet's solidarity with the people and avoids
    harmonizing the rhetoric.
  doctrine_reference: Translation philosophy §1, §3, §5
