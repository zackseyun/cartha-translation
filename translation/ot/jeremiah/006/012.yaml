id: JER.6.12
reference: Jeremiah 6:12
source:
  edition: WLC
  text: וְ/נָסַ֤בּוּ בָֽתֵּי/הֶם֙ לַ/אֲחֵרִ֔ים שָׂד֥וֹת וְ/נָשִׁ֖ים יַחְדָּ֑ו כִּֽי
    אַטֶּ֧ה אֶת יָדִ֛/י עַל יֹשְׁבֵ֥י הָ/אָ֖רֶץ נְאֻם יְהוָֽה־־־־׃
translation:
  text: Their houses will be turned over to others, together with their fields and
    wives; for I will stretch out my hand against the inhabitants of the land, declares
    the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'women' instead of 'wives.' The Hebrew נָשִׁים can mean either, but in
      this context of household and property loss, 'wives' is likely.
    reason: lexical_alternative
  - marker: b
    text: Or 'the inhabitants of the earth.' Hebrew הָאָרֶץ can mean 'the land' or
      'the earth'; here the local sense is likely in context.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָסַבּוּ
  chosen: will be turned over
  alternatives:
  - will be transferred
  - will pass to
  lexicon: HALOT
  rationale: The Niphal of סבב here conveys a passive/resultative sense of property
    changing hands. 'Will be turned over' is idiomatic modern English and preserves
    the sense of dispossession better than a more wooden 'will be turned around.'
- source_word: בָתֵּיהֶם
  chosen: their houses
  alternatives:
  - their homes
  lexicon: HALOT
  rationale: Literal and straightforward; 'houses' fits the property-loss context
    and pairs naturally with fields and wives.
- source_word: לַאֲחֵרִים
  chosen: to others
  alternatives:
  - to strangers
  - to other people
  lexicon: HALOT
  rationale: אחרים means 'others.' 'Strangers' would add a nuance not required by
    the Hebrew, though it is contextually possible.
- source_word: שָׂדוֹת
  chosen: fields
  alternatives:
  - farmlands
  lexicon: HALOT
  rationale: The ordinary sense is agricultural fields/landed property. 'Fields' is
    concise and natural.
- source_word: וְנָשִׁים
  chosen: wives
  alternatives:
  - women
  lexicon: HALOT
  rationale: In this possession-household context ('houses ... fields ... and women/wives
    together'), 'wives' best reflects the likely sense of family members being taken
    by conquerors. 'Women' is lexically possible but less contextually precise.
- source_word: יַחְדָּו
  chosen: together with
  alternatives:
  - altogether
  - together
  lexicon: HALOT
  rationale: This adverb links the listed losses as a combined judgment. 'Together
    with' makes the coordination explicit in smooth English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the announced judgment. 'For' preserves the
    explanatory force in elevated but readable English.
- source_word: אַטֶּה
  chosen: will stretch out
  alternatives:
  - will extend
  - will turn
  lexicon: HALOT
  rationale: From נטה in Hiphil, a common idiom for extending the hand in action or
    judgment. 'Stretch out' is the standard idiomatic rendering and fits the threat
    formula.
- source_word: אֶת־יָדִי
  chosen: my hand
  lexicon: HALOT
  rationale: Kept literally because 'stretch out my hand' is a transparent biblical
    idiom for active intervention in judgment.
- source_word: עַל
  chosen: against
  alternatives:
  - over
  - upon
  lexicon: HALOT
  rationale: With the idiom of stretching out the hand, English 'against' best conveys
    hostile judicial action.
- source_word: יֹשְׁבֵי הָאָרֶץ
  chosen: the inhabitants of the land
  alternatives:
  - those who dwell in the land
  - the inhabitants of the earth
  lexicon: HALOT
  rationale: יֹשְׁבֵי is 'inhabitants/dwellers.' הָאָרֶץ can mean 'land' or 'earth';
    in Jeremiah's immediate context of Judah's judgment, 'land' is more likely than
    the universal 'earth.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Declares the LORD' is natural modern English
    while preserving the solemnity. Per doctrine, יְהוָה is rendered 'the LORD.'
