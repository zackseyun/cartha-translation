theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Scope of הָאָרֶץ in יֹשְׁבֵי הָאָרֶץ
  chosen_reading: the land
  alternative_readings:
  - the earth
  rationale: Although הָאָרֶץ can denote either 'land' or 'earth,' the immediate context
    is the coming judgment on Judah and its people, so the more local sense is preferred
    without importing a universal scope the verse does not require.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
