id: JER.6.24
reference: Jeremiah 6:24
source:
  edition: WLC
  text: שָׁמַ֥עְנוּ אֶת שָׁמְע֖/וֹ רָפ֣וּ יָדֵ֑י/נוּ צָרָה֙ הֶחֱזִיקַ֔תְ/נוּ חִ֖יל
    כַּ/יּוֹלֵדָֽה־׃
translation:
  text: We have heard the report of him; our hands hang limp. Distress has seized
    us, pain like a woman giving birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the report about him' / 'his report'; the Hebrew can denote either the
      report concerning the enemy or, less likely in context, his own report.
    reason: lexical_alternative
  - marker: b
    text: Literally 'our hands have gone slack,' an idiom for losing strength or courage.
    reason: lexical_alternative
  - marker: c
    text: Or 'pain like a woman in labor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְנוּ
  chosen: We have heard
  alternatives:
  - We heard
  lexicon: HALOT
  rationale: 'Qal perfect 1cp of שׁמע, here naturally rendered as a present-result
    perfect in English: the hearing has occurred and its effect continues into the
    following clauses.'
- source_word: אֶת שָׁמְעוֹ
  chosen: the report of him
  alternatives:
  - his report
  - the news of him
  - the report about him
  lexicon: HALOT
  rationale: שֵׁמַע/שֶׁמַע denotes report, news, or tidings. With 3ms suffix it most
    directly means 'his report' or 'report of him.' In context the sense is news concerning
    the approaching enemy, so idiomatic English is 'the report of him'; the more explicit
    'about him' is preserved as an alternative.
- source_word: רָפוּ יָדֵינוּ
  chosen: our hands hang limp
  alternatives:
  - our hands are feeble
  - our hands have grown weak
  lexicon: HALOT
  rationale: רפה with 'hands' is an idiom for loss of strength or courage. 'Hang limp'
    preserves the bodily image while communicating the idiomatic force in natural
    English.
- source_word: צָרָה
  chosen: Distress
  alternatives:
  - Trouble
  - Anguish
  lexicon: HALOT
  rationale: צָרָה commonly denotes distress, trouble, or anguish. 'Distress' fits
    the emotional and situational pressure described here.
- source_word: הֶחֱזִיקַתְנוּ
  chosen: has seized us
  alternatives:
  - has taken hold of us
  - has gripped us
  lexicon: HALOT
  rationale: Hiphil of חזק can mean to seize, grasp, or take hold of. With distress
    as subject, 'has seized us' is vivid and idiomatic.
- source_word: חִיל
  chosen: pain
  alternatives:
  - writhing
  - anguish
  - trembling
  lexicon: HALOT
  rationale: חִיל can denote writhing, labor pain, or anguish. Because it is immediately
    compared to a woman giving birth, 'pain' best prepares for the childbirth simile
    without overtranslating.
- source_word: כַּיּוֹלֵדָה
  chosen: like a woman giving birth
  alternatives:
  - like a woman in labor
  - like a woman bearing a child
  lexicon: HALOT
  rationale: The participial form from ילד with prefixed כ expresses comparison to
    a woman in the act of childbirth. 'Giving birth' is clear modern English and preserves
    the image.
