id: JER.6.14
reference: Jeremiah 6:14
source:
  edition: WLC
  text: וַֽ/יְרַפְּא֞וּ אֶת שֶׁ֤בֶר עַמִּ/י֙ עַל נְקַלָּ֔ה לֵ/אמֹ֖ר שָׁל֣וֹם שָׁל֑וֹם
    וְ/אֵ֖ין שָׁלֽוֹם־־׀׃
translation:
  text: They have treated the wound of my people lightly, saying, ‘Peace, peace,’
    when there is no peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They have healed the brokenness of my people superficially.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְרַפְּאוּ
  chosen: have treated
  alternatives:
  - have healed
  - have bandaged
  lexicon: HALOT
  rationale: The verb רפא literally means 'heal,' but in this prophetic accusation
    the point is their attempted remedy or handling of the people's condition, not
    an actual successful healing. 'Have treated' preserves the medical metaphor while
    fitting the ironic context better than the overly positive 'healed.'
- source_word: שֶׁבֶר
  chosen: wound
  alternatives:
  - brokenness
  - fracture
  - hurt
  lexicon: HALOT
  rationale: שׁבר can denote a fracture, breach, or injury. 'Wound' is idiomatic in
    English with the healing metaphor and conveys serious damage without sounding
    overly technical.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward possessive construction; preserves the covenantal and
    prophetic force of YHWH speaking of Israel as 'my people.'
- source_word: עַל נְקַלָּה
  chosen: lightly
  alternatives:
  - superficially
  - as though it were trivial
  - for a trifle
  lexicon: HALOT
  rationale: The phrase conveys treating a grave matter as insignificant or slight.
    'Lightly' is concise, natural English and preserves the rebuke. 'Superficially'
    is possible, but 'lightly' better captures the moral minimization rather than
    merely shallow method.
- source_word: לֵאמֹר
  chosen: saying
  lexicon: HALOT
  rationale: Standard rendering of the infinitive introducing quoted speech.
- source_word: שָׁלוֹם שָׁלוֹם
  chosen: Peace, peace
  alternatives:
  - All is well, all is well
  - Peace
  lexicon: HALOT
  rationale: The repetition should be preserved because it conveys insistence and
    false reassurance. 'Peace' retains the key Hebrew term and its broad sense of
    well-being and security.
- source_word: וְאֵין שָׁלוֹם
  chosen: when there is no peace
  alternatives:
  - but there is no peace
  - though there is no peace
  lexicon: HALOT
  rationale: The clause states the reality contradicting the false proclamation. 'When
    there is no peace' is a natural rendering in English and preserves the contrast
    without overinterpreting the conjunction.
