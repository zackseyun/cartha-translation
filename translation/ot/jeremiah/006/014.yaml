theological_decisions:
- issue: Prophetic accusation against false reassurance
  chosen_reading: The verse condemns leaders/prophets for minimizing the people's
    serious condition and proclaiming well-being that does not exist.
  alternative_readings:
  - The verse could be rendered more literally with 'healed' and 'slightness,' but
    that may imply actual restoration rather than ironic pretense.
  rationale: No major doctrinal controversy is present, but the translation must preserve
    the prophetic irony and moral indictment rather than soften it into a neutral
    medical statement.
  doctrine_reference: Translation philosophy §§1, 3, 6
