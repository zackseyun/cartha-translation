id: JER.6.6
reference: Jeremiah 6:6
source:
  edition: WLC
  text: כִּ֣י כֹ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת כִּרְת֣וּ עֵצָ֔ה וְ/שִׁפְכ֥וּ עַל יְרוּשָׁלִַ֖ם סֹלְלָ֑ה הִ֚יא הָ/עִ֣יר הָפְקַ֔ד כֻּלָּ֖/הּ עֹ֥שֶׁק בְּ/קִרְבָּֽ/הּ־׃
translation:
  text: 'For thus says Yahweh of hosts: “Cut down trees, and heap up a siege ramp against Jerusalem. This is the city to be punished; all of it is oppression within her.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “cast up a siege mound/embankment against Jerusalem.” The Hebrew literally says “pour out a siege ramp,” an idiom for building siege works.
    reason: lexical_alternative
  - marker: b
    text: Or “This is the city to be visited,” with “visited” meaning called to account in judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the covenant name through small-caps convention in English.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: Traditional but still intelligible rendering of the title יְהוָה צְבָאוֹת; 'hosts' preserves the breadth of heavenly/earthly armies better than narrowing to merely human 'armies'.
- source_word: כִּרְתוּ עֵצָה
  chosen: Cut down trees
  alternatives:
  - Cut down timber
  - Fell trees
  lexicon: HALOT
  rationale: The singular עֵצָה functions collectively here in a military context. 'Cut down trees' is natural English and fits the siege imagery.
- source_word: וְשִׁפְכוּ ... סֹלְלָה
  chosen: heap up a siege ramp
  alternatives:
  - pour out a siege mound
  - cast up a siege embankment
  lexicon: HALOT
  rationale: The verb literally means 'pour out,' but with סֹלְלָה in siege context it idiomatically refers to piling up earthworks. 'Heap up a siege ramp' communicates the military action clearly in modern English.
- source_word: עַל יְרוּשָׁלִַם
  chosen: against Jerusalem
  alternatives:
  - over Jerusalem
  - toward Jerusalem
  lexicon: HALOT
  rationale: With siege works, עַל is best rendered 'against,' expressing hostile military action rather than mere spatial relation.
- source_word: הִיא הָעִיר
  chosen: This is the city
  alternatives:
  - She is the city
  - It is the city
  lexicon: HALOT
  rationale: The pronoun gives emphasis. 'This is the city' brings out the demonstrative force naturally in English.
- source_word: הָפְקַד
  chosen: must be punished
  alternatives:
  - is to be visited
  - is appointed for punishment
  - is to be called to account
  lexicon: HALOT
  rationale: The verb פקד in this context carries the sense of punitive visitation. 'Must be punished' makes the judicial force explicit and readable, while avoiding the archaic ambiguity of 'visited.'
- source_word: כֻּלָּהּ עֹשֶׁק
  chosen: there is nothing but oppression
  alternatives:
  - all of her is oppression
  - she is wholly oppression
  - all within her is extortion
  lexicon: HALOT
  rationale: The Hebrew is terse and forceful, describing the city's total character. 'There is nothing but oppression' captures the totalizing sense in idiomatic English.
- source_word: בְּקִרְבָּהּ
  chosen: within her
  alternatives:
  - in her midst
  - inside her
  lexicon: HALOT
  rationale: Retains the feminine personification of the city while using natural English.
