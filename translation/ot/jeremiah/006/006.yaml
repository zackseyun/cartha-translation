- issue: Nature of divine judgment expressed by הָפְקַד
  chosen_reading: 'Render as punitive judgment: ''must be punished.'''
  alternative_readings:
  - '''is to be visited'''
  - '''is appointed for visitation'''
  rationale: In this prophetic siege context, the visitation is not neutral inspection but judicial punishment. The chosen rendering makes the judgment sense clear without adding extra theological content.
