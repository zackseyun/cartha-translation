theological_decisions:
- issue: Rendering the personified city expression בַּת צִיּוֹן
  chosen_reading: daughter Zion
  alternative_readings:
  - daughter of Zion
  rationale: The phrase is a poetic personification of Zion/Jerusalem, not a doctrinally
    loaded title. The construct is rendered transparently as 'daughter Zion' while
    preserving the prophetic imagery and direct address.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §5 (consistency
    of key terms, documented exception)
