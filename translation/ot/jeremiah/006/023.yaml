id: JER.6.23
reference: Jeremiah 6:23
source:
  edition: WLC
  text: קֶ֣שֶׁת וְ/כִיד֞וֹן יַחֲזִ֗יקוּ אַכְזָרִ֥י הוּא֙ וְ/לֹ֣א יְרַחֵ֔מוּ קוֹלָ/ם֙
    כַּ/יָּ֣ם יֶהֱמֶ֔ה וְ/עַל סוּסִ֖ים יִרְכָּ֑בוּ עָר֗וּךְ כְּ/אִישׁ֙ לַ/מִּלְחָמָ֔ה
    עָלַ֖יִ/ךְ בַּת צִיּֽוֹן־־׃
translation:
  text: They seize bow and javelin; they are cruel and show no mercy. Their sound
    roars like the sea, and they ride on horses, arrayed like a man for battle against
    you, daughter Zion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'arrayed like one man for battle.' The singular כְאִישׁ can be understood
      either as a warrior-like comparison ('like a man') or as emphasizing unified
      formation ('like one man').
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶשֶׁת
  chosen: bow
  alternatives:
  - bows
  lexicon: HALOT
  rationale: Singular collective/instrumental usage in a military description is naturally
    rendered 'bow' in English alongside the following weapon term.
- source_word: כִידוֹן
  chosen: javelin
  alternatives:
  - spear
  - lance
  lexicon: HALOT
  rationale: כידון denotes a thrusting/thrown weapon; 'javelin' preserves the distinct
    weapon sense without flattening it into the broader 'spear.'
- source_word: יַחֲזִיקוּ
  chosen: seize
  alternatives:
  - hold
  - grasp
  - wield
  lexicon: HALOT
  rationale: Hiphil of חזק here describes taking up/holding weapons. 'Seize' gives
    a vivid military sense in context; 'wield' is possible but slightly more interpretive.
- source_word: אַכְזָרִי הוּא
  chosen: they are cruel
  alternatives:
  - it is cruel
  - he is cruel
  lexicon: HALOT
  rationale: 'Though אַכזרי is morphologically singular with הוּא, the clause refers
    collectively to the invading people just described by plural verbs. English idiom
    prefers plural agreement: ''they are cruel.'''
- source_word: וְלֹא יְרַחֵמוּ
  chosen: and show no mercy
  alternatives:
  - and they will not have compassion
  - and they will not spare
  lexicon: HALOT
  rationale: Piel of רחם conveys compassion/mercy. 'Show no mercy' is idiomatic, forceful,
    and faithful in a war oracle.
- source_word: קוֹלָם
  chosen: their sound
  alternatives:
  - their voice
  - their noise
  lexicon: HALOT
  rationale: קול can mean voice, sound, or noise. In connection with roaring like
    the sea, 'sound' best captures the collective auditory effect of the army.
- source_word: כַיָּם יֶהֱמֶה
  chosen: roars like the sea
  alternatives:
  - makes a noise like the sea
  - rumbles like the sea
  lexicon: HALOT
  rationale: המה denotes roaring, murmuring, or tumultuous sounding. 'Roars like the
    sea' is vivid and conventional for overwhelming martial noise.
- source_word: וְעַל סוּסִים יִרְכָּבוּ
  chosen: and they ride on horses
  alternatives:
  - and on horses they ride
  - and they mount horses
  lexicon: HALOT
  rationale: A straightforward rendering of the prepositional phrase plus verb; English
    word order is smoothed while preserving the image of mounted attackers.
- source_word: עָרוּךְ
  chosen: arrayed
  alternatives:
  - set in order
  - drawn up
  - prepared
  lexicon: HALOT
  rationale: ערוך in military context suggests being arranged or drawn up for combat.
    'Arrayed' preserves the formal battle-order nuance.
- source_word: כְאִישׁ
  chosen: like a man
  alternatives:
  - like one man
  - like a warrior
  lexicon: HALOT
  rationale: The Hebrew is singular 'like a man.' In context it may suggest unified
    formation or warrior-like readiness. Main text keeps the formal singular; an alternative
    is worth preserving in a footnote because 'like one man' is a common contextual
    interpretation.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  lexicon: HALOT
  rationale: '''For battle'' is natural modern English and fits the immediate military
    scene.'
- source_word: עָלַיִךְ בַּת צִיּוֹן
  chosen: against you, daughter Zion
  alternatives:
  - against you, O daughter of Zion
  - against you, Daughter Zion
  lexicon: HALOT
  rationale: Retains the direct address and prophetic personification of Zion as a
    daughter/city. 'Daughter Zion' is a transparent rendering of the Hebrew construct.
