id: JER.6.19
reference: Jeremiah 6:19
source:
  edition: WLC
  text: שִׁמְעִ֣י הָ/אָ֔רֶץ הִנֵּ֨ה אָנֹכִ֜י מֵבִ֥יא רָעָ֛ה אֶל הָ/עָ֥ם הַ/זֶּ֖ה פְּרִ֣י
    מַחְשְׁבוֹתָ֑/ם כִּ֤י עַל דְּבָרַ/י֙ לֹ֣א הִקְשִׁ֔יבוּ וְ/תוֹרָתִ֖/י וַ/יִּמְאֲסוּ
    בָֽ/הּ־־־׃
translation:
  text: 'Hear, O earth: behold, I am bringing disaster on this people, the fruit of
    their thoughts, because they have not listened to my words, and they have rejected
    my law.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fruit of their schemes' or 'the outcome of their plans.'
    reason: lexical_alternative
  - marker: b
    text: Or 'my instruction.' Hebrew torah can mean 'law' or 'instruction'; here
      'law' was chosen to preserve the covenantal force of the charge.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעִי
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative feminine singular addressing 'earth' as a personified witness.
    'Hear' preserves the prophetic summons and intertextual resonance of covenant-witness
    language better than the more colloquial 'listen.'
- source_word: הָאָרֶץ
  chosen: O earth
  alternatives:
  - land
  lexicon: HALOT
  rationale: With the vocative-like address after the imperative, 'earth' is preferable
    to 'land'; the scope is cosmic/witness-bearing rather than merely territorial
    Judah.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Introduces a solemn divine announcement. 'Behold' retains the elevated
    prophetic force without adding content.
- source_word: מֵבִיא רָעָה
  chosen: I am bringing disaster
  alternatives:
  - I am bringing evil
  - I am bringing calamity
  lexicon: HALOT
  rationale: רָעָה here denotes harmful judgment, not moral evil. 'Disaster' communicates
    punitive calamity clearly in modern English. Progressive 'am bringing' reflects
    the participial construction with אָנֹכִי.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  - these people
  lexicon: HALOT
  rationale: Singular עָם with demonstrative is naturally 'this people.' It preserves
    the prophetic tone of distance and indictment better than 'these people.'
- source_word: פְּרִי מַחְשְׁבוֹתָם
  chosen: the fruit of their thoughts
  alternatives:
  - the fruit of their schemes
  - the outcome of their plans
  lexicon: HALOT
  rationale: 'A fairly literal rendering preserves the metaphor of consequence: judgment
    corresponds to what their own thinking has produced. ''Thoughts'' is broader and
    less interpretively loaded than ''schemes,'' though the context is negative.'
- source_word: עַל דְּבָרַי לֹא הִקְשִׁיבוּ
  chosen: they have not listened to my words
  alternatives:
  - they did not pay attention to my words
  - they have not obeyed my words
  lexicon: HALOT
  rationale: הקשיב על means to pay attention/listen attentively. 'Listened to' is
    the most direct rendering; 'obeyed' would over-interpret the verb, though disobedience
    is implied by context.
- source_word: וְתוֹרָתִי
  chosen: my law
  alternatives:
  - my instruction
  lexicon: HALOT
  rationale: תּוֹרָה can mean 'instruction,' but in prophetic covenant context 'law'
    best conveys Yahweh's binding revealed teaching. The possessive keeps the personal
    divine source explicit.
- source_word: וַיִּמְאֲסוּ בָהּ
  chosen: they have rejected
  alternatives:
  - they spurned it
  - they despised it
  lexicon: HALOT
  rationale: The verb מאס conveys repudiation/contempt. 'Rejected' is clear, strong,
    and idiomatic with the preceding object 'my law'; the pronoun בָהּ is absorbed
    naturally into English style.
