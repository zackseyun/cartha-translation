theological_decisions:
- issue: Rendering of תּוֹרָה in covenantal prophetic context
  chosen_reading: my law
  alternative_readings:
  - my instruction
  rationale: The verse indicts the people for refusing Yahweh's revealed covenant
    standard. 'Law' preserves the juridical and covenantal weight of the accusation,
    while 'instruction' remains a viable lexical alternative preserved in a footnote.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
