theological_decisions:
- issue: Gendered tribal address
  chosen_reading: sons of Benjamin
  alternative_readings:
  - people of Benjamin
  - Benjaminites
  rationale: Following the translation philosophy's gender-accurate principle, the
    masculine plural filial expression is preserved rather than neutralized, while
    still understood corporately as the tribe/clan group addressed.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of impending judgment language
  chosen_reading: disaster ... great destruction
  alternative_readings:
  - evil ... great ruin
  rationale: The verse speaks of covenantal judgment arriving from the north, but
    the Hebrew terms here describe calamity rather than making a doctrinal statement
    about moral evil. The rendering avoids importing theological claims beyond the
    text's immediate sense.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
