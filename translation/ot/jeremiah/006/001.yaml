id: JER.6.1
reference: Jeremiah 6:1
source:
  edition: WLC
  text: הָעִ֣זוּ בְּנֵ֣י בִניָמִ֗ן מִ/קֶּ֨רֶב֙ יְר֣וּשָׁלִַ֔ם וּ/בִ/תְק֨וֹעַ֙ תִּקְע֣וּ
    שׁוֹפָ֔ר וְ/עַל בֵּ֥ית הַכֶּ֖רֶם שְׂא֣וּ מַשְׂאֵ֑ת כִּ֥י רָעָ֛ה נִשְׁקְפָ֥ה מִ/צָּפ֖וֹן
    וְ/שֶׁ֥בֶר גָּדֽוֹל׀־׃
translation:
  text: Take cover, sons of Benjamin, from the midst of Jerusalem! Blow the trumpet
    in Tekoa, and raise a signal over Beth-haccherem, for disaster is looking down
    from the north, and great destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Flee for safety' or 'Gather yourselves to flee.' The Hebrew imperative
      is difficult and may carry the sense of urgently seeking safety.
    reason: lexical_alternative
  - marker: b
    text: Beth-haccherem is a place name, likely a high point used for warning signals
      between Jerusalem and Tekoa.
    reason: cultural_note
  - marker: c
    text: Or 'raise a beacon' or 'lift up a signal fire.'
    reason: lexical_alternative
  - marker: d
    text: The Hebrew literally says 'disaster has looked down from the north,' personifying
      the coming calamity.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעִזוּ
  chosen: Take cover
  alternatives:
  - Flee for safety
  - Be strong
  - Gather yourselves to flee
  lexicon: HALOT
  rationale: The Hiphil imperative of עזז/עוז in this context is idiomatic and difficult.
    Given the following alarm signals and imminent invasion, the sense is best taken
    as an urgent call to seek safety rather than a simple exhortation to strength.
    'Take cover' is concise modern English that fits the military-emergency context.
- source_word: בְּנֵי בִנְיָמִן
  chosen: sons of Benjamin
  alternatives:
  - people of Benjamin
  - Benjaminites
  lexicon: HALOT
  rationale: A formally close rendering preserves the Hebrew filial expression and
    the tribal identity. 'Sons of Benjamin' is gender-accurate to the source while
    functioning corporately.
- source_word: מִקֶּרֶב יְרוּשָׁלִַם
  chosen: from the midst of Jerusalem
  alternatives:
  - out of Jerusalem
  - from within Jerusalem
  lexicon: HALOT
  rationale: קֶרֶב denotes the inner part or midst. 'From the midst of Jerusalem'
    preserves the vividness of leaving the city's interior, though the imperative
    implies movement out for safety.
- source_word: וּבִתְקוֹעַ תִּקְעוּ שׁוֹפָר
  chosen: Blow the trumpet in Tekoa
  alternatives:
  - Sound the ram's horn in Tekoa
  - Blow the horn in Tekoa
  lexicon: HALOT
  rationale: שׁוֹפָר is specifically a horn, often a ram's horn, but 'trumpet' is
    idiomatic and readily understood in English for an alarm signal. Tekoa is transliterated
    as a place name.
- source_word: וְעַל בֵּית הַכֶּרֶם
  chosen: over Beth-haccherem
  alternatives:
  - at Beth-haccherem
  - on Beth-haccherem
  lexicon: HALOT
  rationale: The preposition עַל naturally means 'on/over.' Since the phrase refers
    to elevating a warning signal at a high point associated with Beth-haccherem,
    'over' communicates the elevated beacon-like sense in idiomatic English while
    preserving the place name by transliteration.
- source_word: שְׂאוּ מַשְׂאֵת
  chosen: raise a signal
  alternatives:
  - lift up a signal fire
  - raise a beacon
  - lift up a standard
  lexicon: HALOT
  rationale: מַשְׂאֵת can denote something lifted up, here likely a signal or beacon
    used for warning. 'Raise a signal' keeps the action broad enough not to over-specify
    fire, while fitting the military-alert context.
- source_word: כִּי רָעָה
  chosen: for disaster
  alternatives:
  - for evil
  - for calamity
  lexicon: HALOT
  rationale: רָעָה in prophetic judgment contexts commonly denotes calamity/disaster
    rather than moral evil. 'Disaster' is clear modern English and avoids misunderstanding.
- source_word: נִשְׁקְפָה
  chosen: is looking down
  alternatives:
  - appears
  - looms
  - is seen
  lexicon: HALOT
  rationale: The Niphal of שׁקף carries the sense of looking out/down from a height.
    Here it personifies the coming calamity as visible from the north. 'Is looking
    down' preserves the imagery more closely than the flatter 'appears' or the more
    interpretive 'looms.'
- source_word: מִצָּפוֹן
  chosen: from the north
  alternatives:
  - out of the north
  lexicon: HALOT
  rationale: A straightforward directional phrase; in Jeremiah it often signals the
    direction from which invading judgment comes.
- source_word: וְשֶׁבֶר גָּדוֹל
  chosen: and great destruction
  alternatives:
  - and a great crash
  - and great ruin
  - and a great breaking
  lexicon: HALOT
  rationale: שֶׁבֶר literally involves breaking, but in prophetic context it denotes
    ruin or destruction. 'Great destruction' is natural English and matches the parallel
    with 'disaster.'
