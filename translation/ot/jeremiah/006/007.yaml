theological_decisions:
- issue: Personification of Jerusalem/Zion as feminine
  chosen_reading: Retain feminine reference with 'she' and 'her'
  alternative_readings:
  - use 'it' for the city
  rationale: The Hebrew feminine suffixes naturally personify the city. Preserving
    'she/her' maintains the prophetic rhetoric and covenantal-personal tone without
    adding doctrine.
  doctrine_reference: Translation philosophy §1, §6
- issue: Nature of חֳלִי וּמַכָּה
  chosen_reading: Render as concrete 'sickness and wounds' while allowing metaphorical
    force
  alternative_readings:
  - render more abstractly as 'affliction and blows'
  rationale: The verse likely uses bodily imagery for the city's moral and social
    corruption. The translation preserves the concrete terms rather than resolving
    whether they are purely literal or metaphorical.
  doctrine_reference: Translation philosophy §3
