id: JER.6.7
reference: Jeremiah 6:7
source:
  edition: WLC
  text: כְּ/הָקִ֥יר בור מֵימֶ֔י/הָ כֵּ֖ן הֵקֵ֣רָה רָעָתָ֑/הּ חָמָ֣ס וָ֠/שֹׁד יִשָּׁ֨מַע
    בָּ֧/הּ עַל פָּנַ֛/י תָּמִ֖יד חֳלִ֥י וּ/מַכָּֽה־׃
translation:
  text: As a well keeps its waters fresh, so she keeps her evil fresh. Violence and
    destruction are heard in her; before me continually are sickness and wounds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As a cistern keeps its water cool, so she keeps her wickedness cool/fresh.'
      The Hebrew verb is difficult, and some understand the image as a well or cistern
      continually producing or preserving water.
    reason: lexical_alternative
  - marker: b
    text: Or 'violence and devastation' or 'violence and plunder.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'before my face continually, sickness and wound'; the wording may
      be literal or metaphorical for the city's condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּהָקִיר
  chosen: keeps ... fresh
  alternatives:
  - cools
  - makes cold
  - lets flow forth
  lexicon: HALOT
  rationale: The verb from קור/קרר in this form is difficult and contextually paired
    with a well and its waters. In Jeremiah 6:7 the image is of a well continually
    producing/maintaining water, paralleled by Jerusalem continually producing evil.
    'Keeps ... fresh' captures the ongoing, vivid force in readable English better
    than a wooden 'makes cold,' while preserving the simile's sense of constant supply.
- source_word: בּוֹר
  chosen: well
  alternatives:
  - cistern
  - pit
  lexicon: HALOT
  rationale: Though בור can mean 'pit' or 'cistern,' the immediate association with
    water being kept/issued favors 'well' as the most natural English image here.
    'Cistern' is possible, but 'well' reads more idiomatically in the simile.
- source_word: מֵימֶיהָ
  chosen: its waters
  alternatives:
  - its water
  lexicon: HALOT
  rationale: The plural form is retained as 'waters,' a common English rendering for
    Hebrew מים, and matches the possessive relation to the well.
- source_word: כֵּן
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: HALOT
  rationale: Standard comparative marker in the simile.
- source_word: הֵקֵרָה
  chosen: keeps ... fresh
  alternatives:
  - cools
  - makes cold
  - pours out
  lexicon: HALOT
  rationale: 'Rendered to match the opening simile and preserve the parallelism: as
    the well does with its waters, so Jerusalem does with her evil. The English repeats
    the same verbal idea for rhetorical effect.'
- source_word: רָעָתָהּ
  chosen: her evil
  alternatives:
  - her wickedness
  - her calamity
  lexicon: HALOT
  rationale: In this context the moral sense fits best, since the city is being condemned
    for violence and devastation. 'Evil' is concise and preserves the broad semantic
    range.
- source_word: חָמָס
  chosen: violence
  alternatives:
  - wrongdoing
  - oppression
  lexicon: HALOT
  rationale: A standard rendering that fits prophetic denunciation of social brutality.
- source_word: וָשֹׁד
  chosen: and destruction
  alternatives:
  - and ruin
  - and devastation
  - and plunder
  lexicon: HALOT
  rationale: שֹׁד often denotes devastation or violent ruin. 'Destruction' pairs naturally
    with 'violence' and suits what is heard in the city.
- source_word: יִשָּׁמַע בָּהּ
  chosen: are heard in her
  alternatives:
  - is heard in her
  - is heard in it
  lexicon: HALOT
  rationale: The passive/imperfect conveys what is continually heard within the city.
    Plural English agrees naturally with the compound subject 'violence and destruction.'
    'Her' preserves the feminine personification of the city.
- source_word: עַל־פָּנַי
  chosen: before me
  alternatives:
  - in my presence
  - before my face
  lexicon: HALOT
  rationale: Idiomatic English for the Hebrew expression while retaining the direct
    divine perspective.
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: HALOT
  rationale: Conveys the unceasing nature of what lies before God.
- source_word: חֳלִי
  chosen: sickness
  alternatives:
  - disease
  - grief
  lexicon: HALOT
  rationale: The noun can denote sickness or affliction. Here, paired with 'wounds,'
    the bodily-injury metaphor is prominent; 'sickness' preserves that imagery.
- source_word: וּמַכָּה
  chosen: and wounds
  alternatives:
  - and blows
  - and injury
  - and plague
  lexicon: HALOT
  rationale: In context this likely denotes striking injury or wounds. The plural
    in English is natural with 'sickness' as a summary of the city's condition before
    God.
