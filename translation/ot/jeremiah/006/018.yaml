id: JER.6.18
reference: Jeremiah 6:18
source:
  edition: WLC
  text: לָ/כֵ֖ן שִׁמְע֣וּ הַ/גּוֹיִ֑ם וּ/דְעִ֥י עֵדָ֖ה אֶת אֲשֶׁר בָּֽ/ם־־׃
translation:
  text: Therefore hear, O nations, and know, O congregation, what is among them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembly' or 'community' for 'congregation.' The Hebrew עֵדָה is a collective
      term and its precise referent here is debated.
    reason: lexical_alternative
  - marker: b
    text: Or 'what is in them.' The Hebrew expression is concise and may refer to
      what is found within them or among them.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Discourse marker introducing the consequence of the preceding indictment/judgment.
    'Therefore' is the most natural formal English equivalent.
- source_word: שִׁמְעוּ
  chosen: hear
  alternatives:
  - listen
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. 'Hear' preserves the prophetic summons and
    can include the sense of attentive listening without over-paraphrasing.
- source_word: הַגּוֹיִם
  chosen: nations
  alternatives:
  - peoples
  - Gentiles
  lexicon: HALOT
  rationale: גּוֹיִם commonly denotes nations/peoples. 'Nations' fits prophetic address
    best; 'Gentiles' would import a more specifically Israel-vs.-non-Israel nuance
    than the context requires.
- source_word: וּדְעִי
  chosen: and know
  alternatives:
  - and understand
  - and take note
  lexicon: HALOT
  rationale: Imperative feminine singular of ידע. The basic sense is 'know.' In context
    it functions as a summons to recognize or take cognizance, but 'know' stays closest
    to the Hebrew.
- source_word: עֵדָה
  chosen: congregation
  alternatives:
  - assembly
  - community
  lexicon: HALOT
  rationale: The noun can mean assembly or congregation. 'Congregation' preserves
    the collective singular addressee and traditional prophetic/judicial flavor. Because
    the exact referent is debated, a lexical-alternative footnote preserves 'assembly'
    and 'community.'
- source_word: אֶת אֲשֶׁר בָּם
  chosen: what is among them
  alternatives:
  - what is in them
  - that which is among them
  lexicon: HALOT
  rationale: The phrase is elliptical but naturally rendered as 'what is among them'
    or 'what is in them.' Given the surrounding context of Judah's condition and coming
    judgment, 'what is among them' is idiomatic and sufficiently broad without specifying
    more than the Hebrew does.
