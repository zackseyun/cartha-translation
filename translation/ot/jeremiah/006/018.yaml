theological_decisions:
- issue: Referent of עֵדָה in the second imperative clause
  chosen_reading: Treat עֵדָה as a vocative singular collective ('O congregation')
    addressed alongside the nations.
  alternative_readings:
  - Take עֵדָה appositionally with the nations ('and know, O assembly of nations')
  - Emend or interpret the line differently due to its difficulty
  rationale: The Masoretic pointing supports a feminine singular imperative followed
    by a singular collective noun. Rendering it as a direct address preserves the
    Hebrew form and the verse's rhetorical force without importing a speculative emendation.
