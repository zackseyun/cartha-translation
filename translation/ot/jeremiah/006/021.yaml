id: JER.6.21
reference: Jeremiah 6:21
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֚ה אָמַ֣ר יְהוָ֔ה הִנְ/נִ֥י נֹתֵ֛ן אֶל הָ/עָ֥ם הַ/זֶּ֖ה מִכְשֹׁלִ֑ים וְ/כָ֣שְׁלוּ בָ֠/ם אָב֨וֹת וּ/בָנִ֥ים יַחְדָּ֛ו שָׁכֵ֥ן וְ/רֵע֖/וֹ יאבדו־׃פ
translation:
  text: 'Therefore, thus says Yahweh: Behold, I am setting stumbling blocks before this people, and they will stumble over them—fathers and sons together; neighbor and his friend will perish.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I am placing obstacles in the way of this people.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'fathers and sons together; neighbor and his friend.' The verse emphasizes that judgment will overtake all levels of society and family life.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential conjunction introducing the consequence of the preceding indictment/judgment.
- source_word: כֹּה אָמַר יְהוָה
  chosen: thus says the LORD
  alternatives:
  - this is what the LORD says
  lexicon: HALOT
  rationale: Conventional prophetic messenger formula. YHWH rendered as 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הִנְנִי
  chosen: Behold
  alternatives:
  - Look
  - See, I am
  lexicon: HALOT
  rationale: Retains the prophetic deictic force and solemnity. Slightly formal, but still intelligible in modern English and fitting for judgment speech.
- source_word: נֹתֵן
  chosen: I am setting
  alternatives:
  - I am placing
  - I give
  lexicon: HALOT
  rationale: Participial form with imminent action; 'setting' fits the image of placing obstacles in someone's path better than the more generic 'give'.
- source_word: אֶל הָעָם הַזֶּה
  chosen: before this people
  alternatives:
  - against this people
  - for this people
  lexicon: HALOT
  rationale: With the imagery of stumbling blocks, English idiom prefers 'before' or 'in the way of.' This conveys placement in their path without overinterpreting the preposition as hostile 'against,' though the context is judgment.
- source_word: מִכְשֹׁלִים
  chosen: stumbling blocks
  alternatives:
  - obstacles
  - things to stumble over
  lexicon: HALOT
  rationale: Concrete metaphor of impediments causing downfall; 'stumbling blocks' preserves the prophetic imagery and lexical connection to the following verb 'stumble.'
- source_word: וְכָשְׁלוּ בָם
  chosen: and they will stumble over them
  alternatives:
  - and they will fall by them
  - and they will stumble on them
  lexicon: HALOT
  rationale: Keeps the wordplay between מִכְשֹׁלִים and כשל. 'Over them' is natural English for encountering obstacles.
- source_word: אָבוֹת וּבָנִים יַחְדָּו
  chosen: fathers and sons together
  alternatives:
  - parents and children together
  lexicon: HALOT
  rationale: Gender-accurate rendering preserves the masculine terms actually used in Hebrew and the representative familial pairing.
- source_word: שָׁכֵן וְרֵעוֹ
  chosen: neighbor and his friend
  alternatives:
  - the one who dwells nearby and his companion
  - neighbor and companion
  lexicon: HALOT
  rationale: שָׁכֵן denotes a neighbor/dweller nearby; רֵעַ often means friend, companion, or associate. 'Neighbor and his friend' preserves the two related but distinct social terms.
- source_word: יֹאבֵדוּ
  chosen: will perish
  alternatives:
  - will be destroyed
  - will come to ruin
  lexicon: HALOT
  rationale: Conveys the severe result of divine judgment without specifying a narrower mode of destruction than the Hebrew requires.
