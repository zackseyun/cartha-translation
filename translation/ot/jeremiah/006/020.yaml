id: JER.6.20
reference: Jeremiah 6:20
source:
  edition: WLC
  text: לָ/מָּה זֶּ֨ה לִ֤/י לְבוֹנָה֙ מִ/שְּׁבָ֣א תָב֔וֹא וְ/קָנֶ֥ה הַ/טּ֖וֹב מֵ/אֶ֣רֶץ
    מֶרְחָ֑ק עֹלֽוֹתֵי/כֶם֙ לֹ֣א לְ/רָצ֔וֹן וְ/זִבְחֵי/כֶ֖ם לֹא עָ֥רְבוּ לִֽ/י־־׃ס
translation:
  text: 'Why is this to me: frankincense comes from Sheba, and sweet cane from a distant
    land? Your burnt offerings are not acceptable, and your sacrifices do not please
    me.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''What use is this to me: frankincense from Sheba, and sweet cane from
      a distant land?'''
    reason: lexical_alternative
  - marker: b
    text: '''Sweet cane'' may also be rendered ''aromatic cane'' or ''sweet calamus.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה זֶּה לִי
  chosen: Why is this to me
  alternatives:
  - Why this to me?
  - What use is this to me?
  lexicon: HALOT
  rationale: Retains the rhetorical question and the dative לִי ('to me/for me').
    'Why is this to me' is slightly formal but transparent; the idiomatic sense 'What
    use is this to me?' is possible, but the main text preserves more of the Hebrew
    structure.
- source_word: לְבוֹנָה
  chosen: frankincense
  alternatives:
  - incense
  lexicon: HALOT
  rationale: לבונה specifically denotes frankincense, not incense in general. The
    more precise term fits the trade-item context.
- source_word: מִשְּׁבָא
  chosen: from Sheba
  lexicon: HALOT
  rationale: Proper name of the region/person traditionally rendered Sheba; transliterated
    per translation philosophy.
- source_word: תָבֹוא
  chosen: comes
  alternatives:
  - should come
  - may come
  lexicon: HALOT
  rationale: Qal imperfect here functions naturally as a present in the rhetorical
    question about imported cultic goods. 'Comes' reads idiomatically in English while
    preserving the sense.
- source_word: קָנֶה הַטּוֹב
  chosen: sweet cane
  alternatives:
  - good cane
  - sweet calamus
  - aromatic cane
  lexicon: HALOT
  rationale: קנה is 'cane/reed'; with הטוב it denotes a valued aromatic cane. 'Sweet
    cane' is established and understandable modern English. 'Calamus' is more technical
    and less accessible.
- source_word: מֵאֶרֶץ מֶרְחָק
  chosen: from a distant land
  alternatives:
  - from a far country
  - from a remote land
  lexicon: HALOT
  rationale: מרחק denotes distance/remoteness. 'Distant land' is natural modern English
    and preserves the geographic emphasis.
- source_word: עֹלוֹתֵיכֶם
  chosen: your burnt offerings
  lexicon: HALOT
  rationale: עלה in sacrificial context is the standard 'burnt offering'; this is
    a significant cultic term and should be rendered explicitly.
- source_word: לֹא לְרָצוֹן
  chosen: are not acceptable
  alternatives:
  - are not for acceptance
  - are not pleasing
  lexicon: HALOT
  rationale: The phrase expresses lack of acceptability/favor before God. 'Are not
    acceptable' conveys the sacrificial idiom clearly in English.
- source_word: זִבְחֵיכֶם
  chosen: your sacrifices
  alternatives:
  - your slaughter offerings
  lexicon: HALOT
  rationale: זבח is the broad sacrificial term. 'Sacrifices' is the standard and clear
    rendering.
- source_word: לֹא עָרְבוּ לִי
  chosen: do not please me
  alternatives:
  - are not pleasing to me
  - are not sweet to me
  lexicon: HALOT
  rationale: ערב in this context means to be pleasing/agreeable. 'Do not please me'
    is idiomatic and captures the divine rejection of the offerings.
