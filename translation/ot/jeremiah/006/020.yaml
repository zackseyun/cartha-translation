theological_decisions:
- issue: Rendering of divine speech about rejected worship
  chosen_reading: The verse is translated as a rhetorical rejection of costly imported
    ritual goods and sacrifices that lack acceptability before God.
  alternative_readings:
  - A more wooden rendering could emphasize only the material items without the implied
    critique of hypocritical worship.
  rationale: The Hebrew directly rejects the value of these offerings to God. The
    translation preserves the rhetorical force without importing a fuller theological
    explanation from the surrounding context.
  doctrine_reference: Translation philosophy §1, §3
