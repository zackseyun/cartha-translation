theological_decisions:
- issue: Anthropopathic expression of divine נפש
  chosen_reading: my soul turn away from you
  alternative_readings:
  - I turn away from you
  - my being departs from you
  rationale: The Hebrew explicitly uses 'my soul,' an anthropopathic expression for
    Yahweh's personal revulsion or withdrawal. Preserving it maintains the text's
    theological tension and literary force rather than smoothing it into a less vivid
    paraphrase.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
