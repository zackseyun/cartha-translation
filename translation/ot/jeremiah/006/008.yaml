id: JER.6.8
reference: Jeremiah 6:8
source:
  edition: WLC
  text: הִוָּסְרִי֙ יְר֣וּשָׁלִַ֔ם פֶּן תֵּקַ֥ע נַפְשִׁ֖/י מִמֵּ֑/ךְ פֶּן אֲשִׂימֵ֣/ךְ
    שְׁמָמָ֔ה אֶ֖רֶץ ל֥וֹא נוֹשָֽׁבָה־־׃פ
translation:
  text: Be warned, O Jerusalem, lest my soul turn away from you, lest I make you a
    desolation, a land not inhabited.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Be instructed' or 'Accept correction.' The Hebrew verb can denote receiving
      discipline or correction, not merely being informed.
    reason: lexical_alternative
  - marker: b
    text: Literally 'lest my soul be torn away from you' or 'be alienated from you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִוָּסְרִי
  chosen: Be warned
  alternatives:
  - Be instructed
  - Accept correction
  - Be chastened
  lexicon: HALOT
  rationale: 'Niphal imperative feminine singular from יסר addressed to Jerusalem.
    The sense is passive/reflexive: receive discipline or correction. ''Be warned''
    is idiomatic modern English that preserves the admonitory force without over-paraphrasing;
    ''be instructed'' is possible but can sound merely educational rather than corrective.'
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard transliteration of the place name, directly addressed in vocative
    function.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - otherwise
  lexicon: HALOT
  rationale: Introduces a negative purpose/result warning. 'Lest' is concise and natural
    in solemn prophetic discourse.
- source_word: תֵּקַע
  chosen: turn away
  alternatives:
  - be torn away
  - be alienated
  - be dislodged
  lexicon: HALOT
  rationale: From יקע/יקע in the sense of being estranged or torn loose. With נֶפֶשׁ
    as subject and מִן marking separation, the clause expresses Yahweh's inner being
    withdrawing from Jerusalem. 'Turn away' communicates the relational rupture clearly
    in English.
- source_word: נַפְשִׁי
  chosen: my soul
  alternatives:
  - I myself
  - my being
  lexicon: HALOT
  rationale: נפש here denotes the inner self or person. 'My soul' preserves the Hebrew
    imagery and solemnity; alternatives flatten the anthropopathic expression.
- source_word: מִמֵּךְ
  chosen: from you
  lexicon: HALOT
  rationale: Second feminine singular prepositional suffix referring to Jerusalem.
- source_word: אֲשִׂימֵךְ
  chosen: I make you
  alternatives:
  - I set you
  - I turn you into
  lexicon: HALOT
  rationale: Qal imperfect/cohortative-like future sense from שׂים with object suffix.
    In context it means appointing or rendering Jerusalem into a state of desolation.
    'Make you' is the most natural English equivalent.
- source_word: שְׁמָמָה
  chosen: a desolation
  alternatives:
  - desolate
  - a wasteland
  lexicon: HALOT
  rationale: Noun denoting devastation/desolation. The nominal rendering fits the
    syntax after 'make you'.
- source_word: אֶרֶץ לֹא נוֹשָׁבָה
  chosen: a land not inhabited
  alternatives:
  - an uninhabited land
  - a land with no inhabitant
  lexicon: HALOT
  rationale: Predicate/appositional phrase intensifying the judgment. 'A land not
    inhabited' stays close to the Hebrew while remaining readable.
