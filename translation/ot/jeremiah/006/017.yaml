id: JER.6.17
reference: Jeremiah 6:17
source:
  edition: WLC
  text: וַ/הֲקִמֹתִ֤י עֲלֵי/כֶם֙ צֹפִ֔ים הַקְשִׁ֖יבוּ לְ/ק֣וֹל שׁוֹפָ֑ר וַ/יֹּאמְר֖וּ
    לֹ֥א נַקְשִֽׁיב׃
translation:
  text: 'I set watchmen over you: ‘Listen to the sound of the trumpet!’ But they said,
    ‘We will not listen.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I appointed watchmen over you.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew shofar, a horn used as an alarm signal; traditionally 'trumpet.'
    reason: cultural_note
lexical_decisions:
- source_word: וַהֲקִמֹתִי
  chosen: I set
  alternatives:
  - I appointed
  - I raised up
  lexicon: HALOT
  rationale: From קום in the Hiphil, meaning to cause to stand or appoint. 'I set'
    is concise, natural English and fits the context of stationing watchmen. 'Appointed'
    is possible, but 'set' better preserves the concrete force of placing them over
    the people.
- source_word: עֲלֵיכֶם
  chosen: over you
  alternatives:
  - against you
  - for you
  lexicon: HALOT
  rationale: The preposition עַל with 2mp suffix here indicates placement over the
    people in a supervisory sense. 'Over you' best matches the image of watchmen stationed
    in relation to the people. 'Against you' would overstate hostility; the immediate
    function is warning, not direct opposition.
- source_word: צֹפִים
  chosen: watchmen
  alternatives:
  - lookouts
  - sentinels
  lexicon: HALOT
  rationale: The participle from צפה denotes those who keep watch and warn. 'Watchmen'
    is the standard and most transparent rendering in prophetic contexts, preserving
    both vigilance and warning function.
- source_word: הַקְשִׁיבוּ
  chosen: Listen
  alternatives:
  - Pay attention
  - Give heed
  lexicon: HALOT
  rationale: Imperative of קשב, calling for attentive hearing. 'Listen' is clear modern
    English and suits the urgent warning. 'Give heed' is accurate but archaic.
- source_word: לְקוֹל
  chosen: to the sound of
  alternatives:
  - to the voice of
  - to the blast of
  lexicon: HALOT
  rationale: קוֹל can mean sound or voice. With שופר, 'sound of' is the most natural
    collocation in English. 'Blast' is interpretive and slightly narrows the sense.
- source_word: שׁוֹפָר
  chosen: trumpet
  alternatives:
  - ram's horn
  lexicon: HALOT
  rationale: Shofar is the horn used for alarm or summons. 'Trumpet' communicates
    the warning instrument idiomatically in English; 'ram's horn' is more specific
    but less natural in the flow of the verse.
- source_word: וַיֹּאמְרוּ
  chosen: But they said
  alternatives:
  - And they said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. In English, 'But they said'
    appropriately marks the contrast between the warning given and the people's refusal,
    making the discourse relation explicit without adding foreign content.
- source_word: לֹא נַקְשִׁיב
  chosen: We will not listen
  alternatives:
  - We will not pay attention
  - We do not want to listen
  lexicon: HALOT
  rationale: First person plural imperfect of קשב after לֹא expresses refusal. 'We
    will not listen' preserves the volitional force and mirrors the imperative 'Listen'
    earlier in the verse.
