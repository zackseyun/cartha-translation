theological_decisions:
- issue: Identity and function of the watchmen
  chosen_reading: The watchmen are rendered as human or prophetic warners appointed
    by God, without specifying a narrower referent in translation.
  alternative_readings:
  - prophets specifically
  - military sentries metaphorically
  - leaders charged to warn the people
  rationale: The Hebrew image allows a metaphorical warning role and does not require
    the translation to resolve the exact identity. The wording 'watchmen' preserves
    the prophetic metaphor and theological tension without interpretive narrowing.
  doctrine_reference: Preserve theological tension rather than resolve it.
