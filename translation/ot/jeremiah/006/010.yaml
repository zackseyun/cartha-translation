theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Handling the idiom 'uncircumcised ear'
  chosen_reading: Retain the metaphor explicitly as 'their ear is uncircumcised'
  alternative_readings:
  - their ears are closed
  - they are spiritually deaf
  rationale: The Hebrew uses covenantal/body imagery, and preserving it maintains
    the prophetic theological force rather than flattening it into mere paraphrase.
    Any explanatory alternative is better suited to a footnote than the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
