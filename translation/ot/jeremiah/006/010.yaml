id: JER.6.10
reference: Jeremiah 6:10
source:
  edition: WLC
  text: עַל מִ֨י אֲדַבְּרָ֤ה וְ/אָעִ֨ידָה֙ וְ/יִשְׁמָ֔עוּ הִנֵּה֙ עֲרֵלָ֣ה אָזְנָ֔/ם
    וְ/לֹ֥א יוּכְל֖וּ לְ/הַקְשִׁ֑יב הִנֵּ֣ה דְבַר יְהוָ֗ה הָיָ֥ה לָ/הֶ֛ם לְ/חֶרְפָּ֖ה
    לֹ֥א יַחְפְּצוּ בֽ/וֹ־־־׃
translation:
  text: To whom shall I speak and give warning, so that they may hear? Look, their
    ear is uncircumcised, and they are not able to listen. Look, the word of the LORD
    has become a reproach to them; they take no delight in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'their ear is uncircumcised,' a metaphor for being spiritually unresponsive
      or unwilling to heed.
    reason: cultural_note
  - marker: b
    text: Or 'and testify' / 'and bear witness' for 'give warning.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדַבְּרָה
  chosen: shall I speak
  alternatives:
  - am I to speak
  - can I speak
  lexicon: HALOT
  rationale: First-person cohortative/imperfect used in a rhetorical question; 'shall
    I speak' preserves deliberative force in natural English.
- source_word: וְאָעִידָה
  chosen: and give warning
  alternatives:
  - and testify
  - and bear witness
  lexicon: HALOT
  rationale: The Hifil of עוד here carries the sense of solemnly warning or testifying
    against. In prophetic context, 'give warning' best conveys the practical force,
    while 'testify' remains a viable lexical alternative.
- source_word: וְיִשְׁמָעוּ
  chosen: so that they may hear
  alternatives:
  - and let them hear
  - that they might listen
  lexicon: HALOT
  rationale: 'The conjunction plus imperfect after the rhetorical question is rendered
    purposively: Jeremiah asks to whom he can speak in such a way that hearing might
    occur.'
- source_word: עֲרֵלָה אָזְנָם
  chosen: their ear is uncircumcised
  alternatives:
  - their ears are uncircumcised
  lexicon: HALOT
  rationale: This idiom denotes spiritual insensitivity or covenantal unresponsiveness.
    Singular 'ear' follows the Hebrew construct more closely, while still functioning
    collectively in English.
- source_word: לְהַקְשִׁיב
  chosen: to listen
  alternatives:
  - to pay attention
  - to heed
  lexicon: HALOT
  rationale: '''Listen'' is clear modern English and fits the parallel with ''hear'';
    ''heed'' is possible but slightly more interpretive.'
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the word of Yahweh
  lexicon: HALOT
  rationale: Standard prophetic expression. Per doctrine, יְהוָה is rendered 'the
    LORD' rather than transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine's contested-terms table for the divine name.
- source_word: הָיָה לָהֶם לְחֶרְפָּה
  chosen: has become a reproach to them
  alternatives:
  - is a disgrace to them
  - has become an object of scorn to them
  lexicon: HALOT
  rationale: The clause indicates the LORD's word is regarded by them as something
    shameful or scorned. 'Reproach' preserves the biblical register without becoming
    archaic.
- source_word: לֹא יַחְפְּצוּ בוֹ
  chosen: they take no delight in it
  alternatives:
  - they do not desire it
  - they do not delight in it
  lexicon: HALOT
  rationale: חפץ often denotes taking pleasure in or desiring. 'Take no delight in
    it' captures both volitional rejection and affective aversion in idiomatic English.
