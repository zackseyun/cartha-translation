id: JER.6.30
reference: Jeremiah 6:30
source:
  edition: WLC
  text: כֶּ֣סֶף נִמְאָ֔ס קָרְא֖וּ לָ/הֶ֑ם כִּֽי מָאַ֥ס יְהוָ֖ה בָּ/הֶֽם־׃פ
translation:
  text: They are called rejected silver, because the LORD has rejected them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'refuse silver' or 'despised silver.' The Hebrew phrase uses a refining
      metaphor for metal judged worthless after testing.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֶּסֶף
  chosen: silver
  alternatives:
  - silver ore
  - money
  lexicon: HALOT
  rationale: The noun ordinarily means 'silver.' In this refining metaphor, the image
    is metal rather than currency, so 'silver' best preserves the prophetic figure.
- source_word: נִמְאָס
  chosen: rejected
  alternatives:
  - refuse
  - despised
  - reprobate
  lexicon: HALOT
  rationale: Passive participle from מאס, 'to reject/despise.' 'Rejected' is clear
    modern English and matches the repeated verb later in the verse, preserving the
    wordplay and judicial sense.
- source_word: קָרְאוּ לָהֶם
  chosen: they are called
  alternatives:
  - one calls them
  - people call them
  lexicon: HALOT
  rationale: 'The Hebrew uses a 3rd person plural verb with indirect object, an idiom
    for an indefinite subject: ''they call them'' = ''they are called.'' The passive
    is natural English and preserves the sense without adding an explicit unnamed
    subject.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for the designation. 'Because' is slightly clearer
    in contemporary English than 'for' while preserving the causal force.
- source_word: מָאַס
  chosen: has rejected
  alternatives:
  - has despised
  - has refused
  lexicon: HALOT
  rationale: 'Same root as נמאס earlier in the verse. Rendering both with ''reject''
    preserves the deliberate repetition: they are ''rejected silver'' because the
    LORD ''has rejected'' them.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: בָּהֶם
  chosen: them
  alternatives:
  - in them
  lexicon: HALOT
  rationale: With מאס, the preposition marks the object of rejection idiomatically.
    English expresses this simply as 'reject them,' not 'reject in them.'
