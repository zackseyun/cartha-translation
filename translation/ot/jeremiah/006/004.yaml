theological_decisions:
- issue: Military-sacral idiom in קַדְּשׁוּ ... מִלְחָמָה
  chosen_reading: 'Render with explicit consecration language: ''Consecrate war against
    her'''
  alternative_readings:
  - Prepare for war against her
  rationale: The verse depicts invaders speaking in terms of sacralized warfare. Retaining
    'consecrate' preserves the theological texture of holy-war language without implying
    divine approval beyond what the text states.
  doctrine_reference: Translation philosophy §1, §3
