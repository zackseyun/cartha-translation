id: JER.6.9
reference: Jeremiah 6:9
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ יְהֹוָ֣ה צְבָא֔וֹת עוֹלֵ֛ל יְעוֹלְל֥וּ כַ/גֶּ֖פֶן שְׁאֵרִ֣ית
    יִשְׂרָאֵ֑ל הָשֵׁב֙ יָדְ/ךָ֔ כְּ/בוֹצֵ֖ר עַל סַלְסִלּֽוֹת־׃
translation:
  text: 'Thus says the LORD of hosts: They will thoroughly glean the remnant of Israel
    as a vine; put your hand back again like a grape-gatherer over the branches.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly “over the tendrils”; the Hebrew term is rare and its precise
      referent is debated. Some have also understood it as “baskets.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH, preserving
    the covenant name through small-caps convention in English.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: Traditional but still transparent rendering of the title, conveying YHWH's
    sovereignty over heavenly and earthly armies. 'Of armies' is possible but less
    idiomatic in this title formula.
- source_word: עוֹלֵל יְעוֹלְלוּ
  chosen: They will thoroughly glean
  alternatives:
  - They will surely glean clean
  - They will strip bare by gleaning
  lexicon: HALOT
  rationale: The infinitive absolute plus imperfect intensifies the verbal idea. 'Thoroughly
    glean' captures both the agricultural metaphor and the emphatic force without
    overparaphrase.
- source_word: כַגֶּפֶן
  chosen: as a vine
  alternatives:
  - like a vine
  lexicon: HALOT
  rationale: Simple comparative use of כ. 'As a vine' is idiomatic and preserves the
    metaphor of Israel as something repeatedly stripped for fruit.
- source_word: שְׁאֵרִית יִשְׂרָאֵל
  chosen: the remnant of Israel
  alternatives:
  - what remains of Israel
  lexicon: HALOT
  rationale: '''Remnant'' is the standard and theologically resonant rendering of
    שְׁאֵרִית, and here it fits the judgment context of survivors being gleaned.'
- source_word: הָשֵׁב יָדְךָ
  chosen: put your hand back again
  alternatives:
  - return your hand
  - bring back your hand
  lexicon: HALOT
  rationale: An imperative to repeat the harvesting action. 'Put your hand back again'
    makes the idiom natural in English while preserving the image of repeated reaching
    into the vine.
- source_word: כְּבוֹצֵר
  chosen: like a grape-gatherer
  alternatives:
  - like a grape-picker
  - like a vintager
  lexicon: HALOT
  rationale: Refers to one who harvests grapes. 'Grape-gatherer' is clear modern English
    and keeps the agricultural setting.
- source_word: עַל סַלְסִלּוֹת
  chosen: over the branches
  alternatives:
  - over the tendrils
  - over the baskets
  lexicon: HALOT
  rationale: In this viticultural context, the noun most plausibly refers to vine
    shoots/branches rather than baskets. The command is to pass the hand again over
    the vine's branches to strip remaining grapes. Because the term is rare and debated,
    an alternative is preserved in a footnote.
