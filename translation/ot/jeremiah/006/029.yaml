id: JER.6.29
reference: Jeremiah 6:29
source:
  edition: WLC
  text: נָחַ֣ר מַפֻּ֔חַ מ/אשת/ם עֹפָ֑רֶת לַ/שָּׁוְא֙ צָרַ֣ף צָר֔וֹף וְ/רָעִ֖ים לֹ֥א
    נִתָּֽקוּ׃
translation:
  text: The bellows blow fiercely; the lead is consumed by the fire. In vain the refiner
    keeps refining, but the wicked are not separated out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The bellows are scorched/burned up; from their fire the lead is consumed.'
      The Hebrew of this clause is difficult, and translations differ on how the fire
      and lead are related.
    reason: textual_variant
  - marker: b
    text: Or 'the evil ones are not removed' or, in a more metallurgical sense, 'the
      impurities are not drawn off.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָחַר
  chosen: blow fiercely
  alternatives:
  - snort
  - pant
  - burn
  lexicon: HALOT
  rationale: The verb literally denotes snorting or breathing hard. With מַפּוּחַ
    ('bellows') as subject, it idiomatically describes the bellows blowing intensely.
    'Blow fiercely' gives the image in natural English while preserving the force
    of the Hebrew.
- source_word: מַפֻּחַ
  chosen: bellows
  alternatives:
  - blower
  lexicon: HALOT
  rationale: Refers to a smelter's bellows used to intensify the fire. 'Bellows' is
    the standard and clearest English equivalent in this metallurgical context.
- source_word: מֵאִשְׁתָּם
  chosen: by the fire
  alternatives:
  - from their fire
  - from the burning
  lexicon: HALOT
  rationale: The form is difficult, but in context it points to the action of fire
    in the refining process. 'By the fire' communicates the instrumental/contextual
    sense naturally in English without overcommitting to a more speculative reconstruction.
- source_word: עֹפָרֶת
  chosen: the lead
  alternatives:
  - lead
  lexicon: HALOT
  rationale: The noun denotes lead, likely the additive used in refining ore. The
    article is supplied in English for idiomatic sense in the specific smelting scene.
- source_word: לַשָּׁוְא
  chosen: In vain
  alternatives:
  - for nothing
  - to no purpose
  lexicon: HALOT
  rationale: This adverbial phrase marks the refining effort as futile. 'In vain'
    is concise and preserves the prophetic tone.
- source_word: צָרַף ... צָרוֹף
  chosen: the refiner keeps refining
  alternatives:
  - one refines and refines
  - he has refined in vain
  lexicon: HALOT
  rationale: The repetition of the same root (verb + infinitive absolute/related form)
    intensifies the action. Rendering it as 'keeps refining' preserves the iterative
    emphasis in readable English. 'The refiner' is supplied from the verbal context
    of smelting.
- source_word: וְרָעִים
  chosen: the wicked
  alternatives:
  - evil ones
  - bad elements
  lexicon: HALOT
  rationale: Although the smelting metaphor could suggest 'impurities,' the Hebrew
    adjective commonly refers to wicked persons, and the verse applies the refining
    image to morally corrupt people. 'The wicked' best preserves the prophetic accusation.
- source_word: נִתָּקוּ
  chosen: are not separated out
  alternatives:
  - are not drawn off
  - are not removed
  - are not torn away
  lexicon: HALOT
  rationale: In the refining metaphor, the sense is that the bad material/persons
    are not extracted or removed. 'Separated out' communicates the result expected
    from refining and fits the image clearly in English.
