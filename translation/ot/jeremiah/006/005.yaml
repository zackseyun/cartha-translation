id: JER.6.5
reference: Jeremiah 6:5
source:
  edition: WLC
  text: ק֚וּמוּ וְ/נַעֲלֶ֣ה בַ/לָּ֔יְלָה וְ/נַשְׁחִ֖יתָה אַרְמְנוֹתֶֽי/הָ׃ס
translation:
  text: Rise up, and let us go up by night, and let us destroy her palaces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her citadels' or 'her fortresses.' The Hebrew term can denote prominent
      fortified structures as well as palatial buildings.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֚וּמוּ
  chosen: Rise up
  alternatives:
  - Arise
  - Get up
  lexicon: HALOT
  rationale: Imperative masculine plural of קום, a direct call to action. 'Rise up'
    preserves the military urgency and elevated tone better than the more colloquial
    'get up.'
- source_word: וְ/נַעֲלֶ֣ה
  chosen: and let us go up
  alternatives:
  - and we will go up
  - and let us attack
  lexicon: HALOT
  rationale: Cohortative 1cp of עלה with prefixed conjunction. 'Let us go up' reflects
    the exhortative force of the cohortative. 'Go up' is retained rather than interpreted
    as 'attack' to preserve the Hebrew idiom while still fitting siege/military context.
- source_word: בַ/לָּ֔יְלָה
  chosen: by night
  alternatives:
  - in the night
  - at night
  lexicon: HALOT
  rationale: The prepositional phrase marks time. 'By night' is idiomatic English
    that preserves the sense of nighttime action and fits the martial summons.
- source_word: וְ/נַשְׁחִ֖יתָה
  chosen: and let us destroy
  alternatives:
  - and let us ruin
  - and let us lay waste to
  lexicon: HALOT
  rationale: Cohortative 1cp of שׁחת in the causative stem, expressing deliberate
    destructive action. 'Destroy' is the clearest and most natural rendering in context.
- source_word: אַרְמְנוֹתֶֽי/הָ
  chosen: her palaces
  alternatives:
  - her citadels
  - her fortresses
  lexicon: HALOT
  rationale: Plural construct of אַרְמוֹן with 3fs suffix, referring to the prominent
    fortified or royal structures of the city personified as feminine. 'Palaces' is
    the standard rendering and suits Jerusalem as a city under judgment; 'citadels/fortresses'
    are possible but narrower militarily.
