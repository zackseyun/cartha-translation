id: JER.6.13
reference: Jeremiah 6:13
source:
  edition: WLC
  text: כִּ֤י מִ/קְּטַנָּ/ם֙ וְ/עַד גְּדוֹלָ֔/ם כֻּלּ֖/וֹ בּוֹצֵ֣עַ בָּ֑צַע וּ/מִ/נָּבִיא֙
    וְ/עַד כֹּהֵ֔ן כֻּלּ֖/וֹ עֹ֥שֶׂה שָּֽׁקֶר־־׃
translation:
  text: For from their least to their greatest, every one of them is greedy for unjust
    gain; and from prophet to priest, every one of them practices falsehood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the least of them to the greatest of them.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'is greedy for gain'; the expression likely implies dishonest or
      unjust profit.
    reason: lexical_alternative
  - marker: c
    text: Or 'deals falsely' or 'works deceit.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation or ground for the preceding accusation/judgment.
    'For' best preserves the explanatory force in natural English.
- source_word: מִקְּטַנָּם וְעַד גְּדוֹלָם
  chosen: from their least to their greatest
  alternatives:
  - from the least of them to the greatest of them
  - from small to great among them
  lexicon: HALOT
  rationale: The phrase is distributive and inclusive, covering the whole social range.
    'Their least to their greatest' is concise while preserving the possessive suffix
    and the merism.
- source_word: כֻּלּוֹ
  chosen: every one of them
  alternatives:
  - all of them
  - each one
  lexicon: HALOT
  rationale: Though morphologically singular with suffix, it has a collective-distributive
    sense here. 'Every one of them' brings out the individualizing force better than
    the flatter 'all of them.'
- source_word: בּוֹצֵעַ בָּצַע
  chosen: is greedy for unjust gain
  alternatives:
  - seeks gain
  - is covetous for profit
  - is bent on plunder
  lexicon: HALOT
  rationale: The cognate verb+noun construction intensifies the idea of acquisitive
    greed, often with dishonest or violent overtones. 'Greedy for unjust gain' captures
    both the idiomatic force and the moral condemnation better than the more neutral
    'seeks gain.'
- source_word: וּמִנָּבִיא וְעַד כֹּהֵן
  chosen: and from prophet to priest
  alternatives:
  - from prophet even to priest
  lexicon: HALOT
  rationale: A second merism naming religious leadership. 'From prophet to priest'
    is idiomatic English and preserves the scope of corruption across offices.
- source_word: עֹשֶׂה שָּׁקֶר
  chosen: practices falsehood
  alternatives:
  - deals falsely
  - works deceit
  - acts in lies
  lexicon: HALOT
  rationale: The expression denotes habitual conduct characterized by deception, not
    merely speaking a single lie. 'Practices falsehood' communicates ongoing fraudulent
    behavior in readable modern English.
