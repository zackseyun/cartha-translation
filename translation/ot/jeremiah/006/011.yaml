theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Speaker perspective and implied object of 'pour out'
  chosen_reading: The verse is rendered as the prophet speaking of being filled with the LORD's wrath and then calling for that wrath to be poured out.
  alternative_readings:
  - The LORD directly commands, 'Pour it out'
  - The prophet reports his own intention to pour it out
  rationale: The Hebrew sequence is compressed and can be punctuated in more than one way. The chosen rendering preserves the common sense of Jeremiah as overwhelmed with divine wrath and no longer able to contain it, without over-specifying beyond the text.
