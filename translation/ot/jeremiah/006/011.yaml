id: JER.6.11
reference: Jeremiah 6:11
source:
  edition: WLC
  text: וְ/אֵת֩ חֲמַ֨ת יְהוָ֤ה מָלֵ֨אתִי֙ נִלְאֵ֣יתִי הָכִ֔יל שְׁפֹ֤ךְ עַל עוֹלָל֙ בַּ/ח֔וּץ וְ/עַ֛ל ס֥וֹד בַּחוּרִ֖ים יַחְדָּ֑ו כִּֽי גַם אִ֤ישׁ עִם אִשָּׁה֙ יִלָּכֵ֔דוּ זָקֵ֖ן עִם מְלֵ֥א יָמִֽים׀־־־־־׃
translation:
  text: But I am full of the wrath of Yahweh; I am weary of holding it in. Pour it out on the child in the street, and on the company of young men together; for both man and woman will be taken, the old man along with the very aged.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fury of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'full of days,' an idiom meaning very old or advanced in years.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמַת יְהוָה
  chosen: the wrath of the LORD
  alternatives:
  - the fury of the LORD
  - the anger of the LORD
  lexicon: HALOT
  rationale: חֵמָה/חֲמָה denotes burning anger, wrath, or fury. 'Wrath' best preserves the intensity and judicial force in this prophetic judgment context. יְהוָה is rendered 'the LORD' per doctrine guidance.
- source_word: מָלֵאתִי
  chosen: I am full of
  alternatives:
  - I am filled with
  - I have been filled with
  lexicon: HALOT
  rationale: The perfect 1cs expresses the speaker's present state resulting from being filled. 'I am full of' is idiomatic English and fits the immediate continuation.
- source_word: נִלְאֵיתִי
  chosen: I am weary
  alternatives:
  - I am exhausted
  - I am tired
  lexicon: HALOT
  rationale: The verb conveys weariness or exhaustion. 'I am weary' preserves the solemn prophetic tone without sounding colloquial.
- source_word: הָכִיל
  chosen: of holding it in
  alternatives:
  - to contain it
  - to restrain it
  lexicon: HALOT
  rationale: The infinitive/verb here conveys containing or holding back the divine wrath. 'Holding it in' is natural English and matches the image of pent-up judgment.
- source_word: שְׁפֹךְ
  chosen: Pour it out
  alternatives:
  - Pour out
  - Spill it out
  lexicon: HALOT
  rationale: 'The imperative-like form introduces the release of the wrath just mentioned. Supplying ''it'' makes explicit the object understood from context: the LORD''s wrath.'
- source_word: עוֹלָל
  chosen: the child
  alternatives:
  - the little child
  - the infant
  lexicon: HALOT
  rationale: The noun refers to a young child. 'Child' is broad enough for the term here and reads naturally in English.
- source_word: בַּחוּץ
  chosen: in the street
  alternatives:
  - outside
  - in the open square
  lexicon: HALOT
  rationale: The term denotes the outside/public street area. 'In the street' is the most straightforward contextual rendering.
- source_word: סוֹד בַּחוּרִים
  chosen: the gathering of young men
  alternatives:
  - the company of young men
  - the council of young men
  lexicon: HALOT
  rationale: סוֹד can mean council, circle, or intimate gathering. Here it refers to an assembled group of youths rather than a formal council, so 'gathering' best fits.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - altogether
  - as one
  lexicon: HALOT
  rationale: The adverb emphasizes the assembled group and is retained explicitly.
- source_word: יִלָּכֵדוּ
  chosen: will be taken
  alternatives:
  - will be captured
  - will be seized
  lexicon: HALOT
  rationale: The Niphal of לכד commonly means to be captured or taken. 'Will be taken' is concise and suits the broad judgment context, not only military capture.
- source_word: אִישׁ עִם אִשָּׁה
  chosen: both man and woman
  alternatives:
  - man together with woman
  - husband and wife
  lexicon: HALOT
  rationale: The pair is generic, indicating both sexes without implying marriage. 'Both man and woman' makes the inclusive force explicit.
- source_word: זָקֵן
  chosen: the old man
  alternatives:
  - the elder
  - the aged man
  lexicon: HALOT
  rationale: Here the adjective/substantive refers to an old person in age rather than an office-holder. 'Old man' is the most direct rendering.
- source_word: מְלֵא יָמִים
  chosen: the very aged
  alternatives:
  - one full of days
  - one advanced in years
  lexicon: HALOT
  rationale: Literally 'full of days,' an idiom for advanced age. 'The very aged' communicates the idiom's sense in readable modern English while preserving the age distinction.
