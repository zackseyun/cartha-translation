id: JER.6.27
reference: Jeremiah 6:27
source:
  edition: WLC
  text: בָּח֛וֹן נְתַתִּ֥י/ךָ בְ/עַמִּ֖/י מִבְצָ֑ר וְ/תֵדַ֕ע וּ/בָחַנְתָּ֖ אֶת דַּרְכָּֽ/ם־׃
translation:
  text: I have made you a tester among my people, a fortress, so that you may know
    and test their way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an assayer among my people, a fortress'; the Hebrew is compact and somewhat
      difficult. 'Assayer' brings out the metal-testing imagery that fits the surrounding
      context.
    reason: lexical_alternative
  - marker: b
    text: '''Their way'' can also mean ''their conduct'' or ''their manner of life.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּחוֹן
  chosen: a tester
  alternatives:
  - an assayer
  - a watchtower
  lexicon: HALOT
  rationale: The noun from בחן denotes one who tests or examines, especially like
    an assayer of metals in this context of evaluating the people's quality. 'Tester'
    is clear modern English; 'assayer' is more precise but less accessible. Some take
    the term differently in relation to the following noun, but the testing sense
    best fits the immediate verb ובחנת.
- source_word: נְתַתִּיךָ
  chosen: I have made you
  alternatives:
  - I have set you
  - I have given you
  lexicon: HALOT
  rationale: נתן literally means 'give/set,' but in English 'I have made you' naturally
    conveys appointment to a role. This fits the predicative construction with the
    following nouns.
- source_word: בְעַמִּי
  chosen: among my people
  alternatives:
  - in my people
  lexicon: HALOT
  rationale: The preposition ב can be rendered 'in' or 'among'; 'among my people'
    is more idiomatic in English for Jeremiah's placement within the people as an
    examiner.
- source_word: מִבְצָר
  chosen: a fortress
  alternatives:
  - a fortified place
  - strong
  lexicon: HALOT
  rationale: The noun ordinarily means 'fortress/fortified place.' Retaining 'fortress'
    preserves the concrete metaphor. The phrase is difficult, and some construe it
    adverbially or emend conceptually toward 'for testing,' but the MT supports keeping
    the noun. It likely portrays Jeremiah as secure and unyielding in his evaluative
    role.
- source_word: וְתֵדַע
  chosen: so that you may know
  alternatives:
  - and you shall know
  - then you will know
  lexicon: HALOT
  rationale: The conjunction plus imperfect can be rendered sequentially or purposively.
    In context, Jeremiah is appointed in order to discern the people's character,
    so a purposive sense is suitable in English.
- source_word: וּבָחַנְתָּ
  chosen: and test
  alternatives:
  - and examine
  - and assay
  lexicon: HALOT
  rationale: The verb repeats the root בחן and should be rendered consistently with
    the noun. 'Test' is natural and preserves the evaluative metaphor; 'assay' is
    possible but specialized.
- source_word: דַּרְכָּם
  chosen: their way
  alternatives:
  - their conduct
  - their path
  lexicon: HALOT
  rationale: דרך often means 'way' literally or figuratively as conduct. 'Their way'
    keeps the Hebrew metaphor and allows moral sense to be inferred from context;
    'conduct' is interpretive but possible.
