id: JER.6.22
reference: Jeremiah 6:22
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה הִנֵּ֛ה עַ֥ם בָּ֖א מֵ/אֶ֣רֶץ צָפ֑וֹן וְ/ג֣וֹי גָּד֔וֹל יֵע֖וֹר מִ/יַּרְכְּתֵי אָֽרֶץ־׃
translation:
  text: 'Thus says Yahweh: Behold, a people is coming from the land of the north, and a great nation is stirred up from the farthest parts of the earth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the ends of the earth' or 'from the remote parts of the land.' The Hebrew expression refers to the extremities or far reaches.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Introduces a prophetic declaration formula. 'Thus' preserves the formal prophetic tone in natural English when followed by 'says the LORD.'
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - said the LORD
  lexicon: HALOT
  rationale: 'The Hebrew prophetic perfect in messenger formula is idiomatically rendered in English present tense: ''Thus says the LORD.'' YHWH follows the doctrinal default rendering ''the LORD.'''
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Marks vivid attention and prophetic immediacy. 'Behold' retains the solemn force without paraphrase, though slightly elevated.
- source_word: עַם
  chosen: a people
  alternatives:
  - a nation
  lexicon: HALOT
  rationale: עם commonly denotes a people-group. 'A people' is slightly broader and less politically defined than 'nation,' fitting the first member of the parallelism.
- source_word: בָּא
  chosen: is coming
  alternatives:
  - comes
  - has come
  lexicon: HALOT
  rationale: A present-progressive English rendering best conveys the imminent, vivid force in context of prophetic warning.
- source_word: מֵאֶרֶץ צָפוֹן
  chosen: from the land of the north
  alternatives:
  - from the north country
  - from a northern land
  lexicon: HALOT
  rationale: A relatively formal rendering that preserves both 'land' and 'north.' It may denote the region from which the invader approaches, not merely compass direction.
- source_word: וְגוֹי גָּדוֹל
  chosen: and a great nation
  alternatives:
  - and a great people
  lexicon: HALOT
  rationale: גוי often denotes a nation in a broader geopolitical sense. Rendering it 'nation' preserves the distinction from the earlier עם and fits the military context.
- source_word: יֵעוֹר
  chosen: is being stirred up
  alternatives:
  - will be roused
  - is awakened
  - is aroused
  lexicon: HALOT
  rationale: The Niphal of עור here likely has a passive/reflexive sense of being roused for action. 'Is being stirred up' captures mobilization without over-specifying agency.
- source_word: מִיַּרְכְּתֵי אָרֶץ
  chosen: from the farthest parts of the earth
  alternatives:
  - from the remote parts of the earth
  - from the ends of the earth
  - from the uttermost parts of the land
  lexicon: HALOT
  rationale: ירכתי denotes remote extremities or recesses. 'Farthest parts of the earth' communicates distance and scope naturally. 'Earth' is preferred over 'land' because the phrase is idiomatic for distant extremities, though 'land' is lexically possible.
