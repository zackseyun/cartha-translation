id: JER.50.35
reference: Jeremiah 50:35
source:
  edition: WLC
  text: חֶ֥רֶב עַל כַּשְׂדִּ֖ים נְאֻם יְהוָ֑ה וְ/אֶל יֹשְׁבֵ֣י בָבֶ֔ל וְ/אֶל שָׂרֶ֖י/הָ
    וְ/אֶל חֲכָמֶֽי/הָ־־־־־׃
translation:
  text: A sword is against the Chaldeans, declares the LORD, and against the inhabitants
    of Babylon, and against her officials, and against her wise men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Babylonians' for 'the Chaldeans.'
    reason: lexical_alternative
  - marker: b
    text: Or 'her princes' for 'her officials.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶרֶב
  chosen: A sword
  alternatives:
  - The sword
  - Sword
  lexicon: HALOT
  rationale: The noun is anarthrous and functions as a prophetic announcement of judgment.
    'A sword' is natural English and preserves the idiomatic sense of war/judgment
    coming upon Babylon without over-specifying a particular sword.
- source_word: עַל
  chosen: is against
  alternatives:
  - upon
  - against
  lexicon: HALOT
  rationale: With חֶרֶב in judgment oracles, עַל conveys hostile direction. Rendering
    the phrase as 'is against' makes the verbless Hebrew clause idiomatic in English
    while preserving the adversative force.
- source_word: כַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew ethnonym specifically says 'Chaldeans.' Although in context
    it refers to Babylonian power, retaining 'Chaldeans' stays closer to the source
    and preserves the historical-ethnic nuance.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is clear,
    contemporary, and suitably weighty. It also follows the doctrinal default of rendering
    יְהוָה as 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: וְאֶל
  chosen: and against
  alternatives:
  - and to
  - and toward
  lexicon: HALOT
  rationale: Although אֶל often means 'to/toward,' in this parallel judgment list
    after חֶרֶב עַל it carries the same hostile force. 'And against' preserves the
    rhetorical repetition and sense.
- source_word: יֹשְׁבֵי בָבֶל
  chosen: the inhabitants of Babylon
  alternatives:
  - those who dwell in Babylon
  - the dwellers of Babylon
  lexicon: HALOT
  rationale: The participial construct literally means 'those dwelling in Babylon.'
    'The inhabitants of Babylon' is idiomatic modern English and preserves the collective
    reference.
- source_word: שָׂרֶיהָ
  chosen: her officials
  alternatives:
  - her princes
  - her leaders
  lexicon: HALOT
  rationale: שָׂרִים can denote princes, officials, rulers, or commanders depending
    on context. In an oracle against Babylon's governing class, 'officials' communicates
    the administrative-political sense clearly in modern English without implying
    royal sons specifically.
- source_word: חֲכָמֶיהָ
  chosen: her wise men
  alternatives:
  - her sages
  - her counselors
  lexicon: HALOT
  rationale: The term denotes those regarded as wise, likely including Babylon's famed
    counselors and learned class. 'Wise men' is the most direct rendering and preserves
    the cultural resonance.
