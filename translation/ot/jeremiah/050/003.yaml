id: JER.50.3
reference: Jeremiah 50:3
source:
  edition: WLC
  text: כִּ֣י עָלָה֩ עָלֶ֨י/הָ גּ֜וֹי מִ/צָּפ֗וֹן הֽוּא יָשִׁ֤ית אֶת אַרְצָ/הּ֙ לְ/שַׁמָּ֔ה
    וְ/לֹֽא יִהְיֶ֥ה יוֹשֵׁ֖ב בָּ֑/הּ מֵ/אָדָ֥ם וְ/עַד בְּהֵמָ֖ה נָ֥דוּ הָלָֽכוּ־־־־׃
translation:
  text: For a nation has come up against her from the north; it will make her land
    a desolation, and there will be no inhabitant in it. From man to beast, they have
    fled; they are gone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'From human to beast.' The Hebrew idiom means that every living inhabitant,
      human and animal alike, has departed.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  - Indeed
  lexicon: HALOT
  rationale: Introduces the reason for the preceding call to announce Babylon's fall.
    'For' preserves the explanatory force in natural English.
- source_word: עָלָה עָלֶיהָ
  chosen: has come up against her
  alternatives:
  - has gone up against her
  - has advanced against her
  lexicon: HALOT
  rationale: עלה with על commonly denotes military advance against a place. 'Come
    up against' is idiomatic and preserves the hostile sense.
- source_word: גּוֹי
  chosen: nation
  alternatives:
  - people
  lexicon: HALOT
  rationale: In prophetic judgment contexts גוי commonly refers to a political-national
    entity rather than merely an ethnic people. 'Nation' fits the invasion setting.
- source_word: מִצָּפוֹן
  chosen: from the north
  alternatives:
  - out of the north
  lexicon: HALOT
  rationale: Standard directional phrase in Jeremiah for the source of invading judgment.
    'From the north' is the most natural English rendering.
- source_word: הוּא
  chosen: it
  alternatives:
  - he
  lexicon: HALOT
  rationale: The pronoun resumes גוי ('nation'), which is grammatically masculine
    in Hebrew but best rendered with English impersonal 'it' for a collective political
    entity.
- source_word: יָשִׁית
  chosen: will make
  alternatives:
  - will set
  - will turn
  lexicon: HALOT
  rationale: שׂים plus object and result phrase here means to make or render the land
    into a state of desolation. 'Will make' communicates the result clearly.
- source_word: אַרְצָהּ
  chosen: her land
  alternatives:
  - its land
  lexicon: HALOT
  rationale: The suffix refers to Babylon, personified as feminine throughout the
    context. 'Her land' preserves the personification.
- source_word: לְשַׁמָּה
  chosen: a desolation
  alternatives:
  - desolate
  - an object of horror
  lexicon: HALOT
  rationale: The noun denotes devastation/desolation. 'A desolation' is a standard
    and clear rendering; the stronger nuance 'object of horror' is possible in some
    contexts but less direct here.
- source_word: וְלֹא יִהְיֶה יוֹשֵׁב בָּהּ
  chosen: and there will be no inhabitant in it
  alternatives:
  - and no one will dwell in her
  - and there will be no one living in it
  lexicon: HALOT
  rationale: This clause states total depopulation. 'No inhabitant in it' is concise
    and preserves the nominal participle's sense.
- source_word: מֵאָדָם וְעַד בְּהֵמָה
  chosen: From man to beast
  alternatives:
  - From human to animal
  - Both man and beast
  lexicon: HALOT
  rationale: This idiom marks totality of evacuation. Per doctrine, אדם is rendered
    'man' where the source uses the masculine/generic form; the phrase is conventional
    and comprehensible.
- source_word: נָדוּ
  chosen: have fled
  alternatives:
  - have wandered away
  - have moved off
  lexicon: HALOT
  rationale: נוד can mean wander or flee; in a judgment-and-desolation context, 'have
    fled' best captures departure under threat.
- source_word: הָלָכוּ
  chosen: they are gone
  alternatives:
  - they have gone away
  - they have departed
  lexicon: HALOT
  rationale: The second verb intensifies and completes the idea of departure. 'They
    are gone' is idiomatic English that preserves the emphatic finality of the Hebrew
    pair.
