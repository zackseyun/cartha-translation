theological_decisions:
- issue: Rendering of אָדָם in a generic totality expression
  chosen_reading: man
  alternative_readings:
  - humankind
  - human
  rationale: The phrase מֵאָדָם וְעַד בְּהֵמָה is a stock expression meaning the full
    range from humans to animals. Following the doctrine's gender-accurate principle
    and the contested-terms guidance for אָדָם, 'man' is retained in the main text
    rather than neutralizing the idiom.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested
    terms table for אָדָם'
