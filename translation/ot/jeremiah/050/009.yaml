theological_decisions:
- issue: Agency of the invading nations
  chosen_reading: The verse presents the LORD as the one sovereignly stirring up and
    bringing the nations against Babylon.
  alternative_readings:
  - A merely descriptive prediction without emphasis on divine causation
  rationale: The first-person pronoun with two causative participles makes divine
    agency explicit. This is a textual, not doctrinally imported, conclusion.
