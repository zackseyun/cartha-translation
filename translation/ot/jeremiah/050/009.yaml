id: JER.50.9
reference: Jeremiah 50:9
source:
  edition: WLC
  text: כִּ֣י הִנֵּ֣ה אָנֹכִ֡י מֵעִיר֩ וּ/מַעֲלֶ֨ה עַל בָּבֶ֜ל קְהַל גּוֹיִ֤ם גְּדֹלִים֙
    מֵ/אֶ֣רֶץ צָפ֔וֹן וְ/עָ֣רְכוּ לָ֔/הּ מִ/שָּׁ֖ם תִּלָּכֵ֑ד חִצָּי/ו֙ כְּ/גִבּ֣וֹר
    מַשְׁכִּ֔יל לֹ֥א יָשׁ֖וּב רֵיקָֽם־־׃
translation:
  text: For behold, I am stirring up and bringing against Babylon an assembly of great
    nations from the land of the north. They will array themselves against her; from
    there she will be captured. Its arrows are like those of a skilled warrior; none
    returns empty-handed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Its arrows are like a skilled warrior who does not return empty'; the
      Hebrew comparison is compressed, and the exact relation between 'arrows' and
      'skilled warrior' may be rendered more literally.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from there,' likely referring to the place where the attacking nations
      draw up against Babylon.
    reason: cultural_note
lexical_decisions:
- source_word: מֵעִיר
  chosen: stirring up
  alternatives:
  - rousing
  - awakening
  lexicon: HALOT
  rationale: The Hiphil participle of עור here conveys causing nations to arise or
    be roused for action. 'Stirring up' is idiomatic modern English and preserves
    divine causation without over-paraphrase.
- source_word: וּמַעֲלֶה
  chosen: bringing
  alternatives:
  - causing to come up
  - leading up
  lexicon: HALOT
  rationale: The Hiphil of עלה often means to bring up or cause to come against a
    place in military contexts. 'Bringing against Babylon' is natural English and
    keeps the causative force.
- source_word: קְהַל גּוֹיִם גְּדֹלִים
  chosen: an assembly of great nations
  alternatives:
  - a coalition of mighty nations
  - a host of great nations
  lexicon: HALOT
  rationale: קהל is an assembled body; 'assembly' is the most direct rendering. גוים
    גדלים refers to nations that are great in power or size; 'great nations' preserves
    the Hebrew wording better than the more interpretive 'mighty nations.'
- source_word: מֵאֶרֶץ צָפוֹן
  chosen: from the land of the north
  alternatives:
  - from a northern land
  - from the north country
  lexicon: HALOT
  rationale: The phrase is a common prophetic geographic expression. 'The land of
    the north' is formally close and readable.
- source_word: וְעָרְכוּ לָהּ
  chosen: They will array themselves against her
  alternatives:
  - They will draw up against her
  - They will set themselves in battle order against her
  lexicon: HALOT
  rationale: ערך in military contexts means to arrange or draw up for battle. 'Array
    themselves against her' preserves the martial sense without becoming cumbersome.
- source_word: מִשָּׁם
  chosen: from there
  alternatives:
  - thence
  lexicon: HALOT
  rationale: The adverb points to the place from which the attacking formation is
    set. 'From there' is straightforward modern English.
- source_word: תִּלָּכֵד
  chosen: she will be captured
  alternatives:
  - she will be taken
  lexicon: HALOT
  rationale: The Niphal of לכד means to be captured or taken. 'Captured' fits the
    military context and makes the passive sense explicit.
- source_word: חִצָּיו
  chosen: Its arrows
  alternatives:
  - His arrows
  lexicon: HALOT
  rationale: The singular suffix most naturally refers collectively to the attacking
    assembly or enemy force conceived as a unit. English can use 'its' for a collective
    military force. This avoids forcing a personal antecedent not explicit in the
    text.
- source_word: כְּגִבּוֹר מַשְׁכִּיל
  chosen: like those of a skilled warrior
  alternatives:
  - like a skilled warrior
  - like a successful warrior
  - like an expert warrior
  lexicon: HALOT
  rationale: The phrase modifies the arrows by comparison. משכיל can denote skill,
    prudence, or success resulting from insight. In context of arrows that do not
    miss their purpose, 'skilled warrior' best captures the sense. 'Those of' is supplied
    in English to make the comparison intelligible.
- source_word: לֹא יָשׁוּב רֵיקָם
  chosen: none returns empty-handed
  alternatives:
  - it does not return empty
  - he does not return empty
  lexicon: HALOT
  rationale: Literally 'does not return empty.' In context the image is of arrows
    or the warrior's assault not failing of effect. 'None returns empty-handed' communicates
    successful completion in idiomatic English while preserving the metaphor of not
    coming back without result.
