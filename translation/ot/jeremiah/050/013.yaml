id: JER.50.13
reference: Jeremiah 50:13
source:
  edition: WLC
  text: מִ/קֶּ֤צֶף יְהוָה֙ לֹ֣א תֵשֵׁ֔ב וְ/הָיְתָ֥ה שְׁמָמָ֖ה כֻּלָּ֑/הּ כֹּ֚ל עֹבֵ֣ר
    עַל בָּבֶ֔ל יִשֹּׁ֥ם וְ/יִשְׁרֹ֖ק עַל כָּל מַכּוֹתֶֽי/הָ־־־׃
translation:
  text: Because of the wrath of the LORD, it will not be inhabited, but will become
    a complete desolation. Everyone who passes by Babylon will be appalled and will
    hiss over all her wounds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will whistle'; the Hebrew verb can denote either hissing or whistling,
      here likely an expression of scorn at Babylon's ruin.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקֶּצֶף
  chosen: Because of the wrath of
  alternatives:
  - From the wrath of
  - Because of the anger of
  lexicon: HALOT
  rationale: 'The preposition מִן with קֶצֶף here expresses cause/source: Babylon''s
    fate comes about because of divine wrath. ''Wrath'' preserves the force of קֶצֶף
    better than the softer ''anger.'''
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
- source_word: לֹא תֵשֵׁב
  chosen: it will not be inhabited
  alternatives:
  - she will not dwell
  - it will not be settled
  lexicon: HALOT
  rationale: The verb ישׁב in the feminine singular agrees with Babylon/city and in
    this judgment context means 'be inhabited' or 'be settled.' English idiom favors
    the passive 'it will not be inhabited' for a city.
- source_word: וְהָיְתָה שְׁמָמָה
  chosen: but will become a desolation
  alternatives:
  - and it will become a wasteland
  - and it will be a horror
  lexicon: HALOT
  rationale: שְׁמָמָה denotes devastation/desolation. 'Become a desolation' preserves
    the nominal force and prophetic judgment tone.
- source_word: כֻּלָּהּ
  chosen: complete
  alternatives:
  - entire
  - wholly
  lexicon: HALOT
  rationale: 'This intensifies the desolation: not partial ruin but total devastation.
    Rendered adjectivally in English as ''complete'' for natural style.'
- source_word: כֹּל עֹבֵר עַל בָּבֶל
  chosen: Everyone who passes by Babylon
  alternatives:
  - All who pass over Babylon
  - Everyone passing by Babylon
  lexicon: HALOT
  rationale: The idiom refers to passersby encountering the ruined city. 'Passes by
    Babylon' is the most natural English expression.
- source_word: יִשֹּׁם
  chosen: will be appalled
  alternatives:
  - will be astonished
  - will be desolated
  lexicon: HALOT
  rationale: From שׁמם in the qal, the sense here is to be appalled/astonished at
    devastation. 'Be appalled' fits the reaction of observers in judgment oracles.
- source_word: וְיִשְׁרֹק
  chosen: will hiss
  alternatives:
  - will whistle
  - will hiss in scorn
  lexicon: HALOT
  rationale: שרק can denote hissing/whistling; in prophetic judgment contexts it commonly
    signals derision or shocked scorn. 'Hiss' preserves the traditional and likely
    contemptuous nuance.
- source_word: עַל כָּל מַכּוֹתֶיהָ
  chosen: over all her wounds
  alternatives:
  - at all her blows
  - over all her plagues
  lexicon: HALOT
  rationale: מַכָּה can mean blow, wound, or plague. Here the image is of Babylon's
    inflicted devastation, so 'wounds' communicates the result of judgment vividly
    and naturally in English while retaining the feminine personification ('her').
