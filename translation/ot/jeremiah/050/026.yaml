theological_decisions:
- issue: Rendering of החרים in a judgment oracle
  chosen_reading: devote her to destruction
  alternative_readings:
  - utterly destroy her
  - put her under the ban
  rationale: The Hebrew carries covenantal/judicial overtones beyond mere annihilation.
    The chosen rendering preserves that theological nuance while remaining readable
    modern English.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
