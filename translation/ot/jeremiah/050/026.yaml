id: JER.50.26
reference: Jeremiah 50:26
source:
  edition: WLC
  text: בֹּֽאוּ לָ֤/הּ מִ/קֵּץ֙ פִּתְח֣וּ מַאֲבֻסֶ֔י/הָ סָלּ֥וּ/הָ כְמוֹ עֲרֵמִ֖ים
    וְ/הַחֲרִימ֑וּ/הָ אַל תְּהִי לָ֖/הּ שְׁאֵרִֽית־־־־׃
translation:
  text: Come against her from the farthest border; open her storehouses; pile her
    up like heaps, and devote her to destruction; let no remnant remain to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the end' / 'from the extremity.' The Hebrew expression may mean
      from the farthest reaches of the land.
    reason: lexical_alternative
  - marker: b
    text: Or 'granaries' or 'barns.' The Hebrew term can refer literally to feeding
      places or, by extension in this context, storage places for provisions.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'devote her to destruction,' a term associated with putting something
      under the ban for total destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּאוּ
  chosen: Come
  alternatives:
  - Go
  - Enter
  lexicon: HALOT
  rationale: Qal imperative plural of בוא, here a summons to attacking forces. 'Come'
    is the natural English imperative in prophetic address.
- source_word: לָהּ
  chosen: against her
  alternatives:
  - to her
  - upon her
  lexicon: HALOT
  rationale: The preposition ל with verbs of hostile movement can carry adversative
    force in context. Since the verse addresses invaders of Babylon, 'against her'
    makes the military sense explicit without over-paraphrasing.
- source_word: מִקֵּץ
  chosen: from the farthest border
  alternatives:
  - from the end
  - from the extremity
  lexicon: HALOT
  rationale: קֵץ literally means 'end' or 'extremity.' In this military summons it
    most likely means from the extremity of the land/territory, hence 'from the farthest
    border' as idiomatic English.
- source_word: פִּתְחוּ
  chosen: open
  lexicon: HALOT
  rationale: Straightforward Qal imperative plural of פתח.
- source_word: מַאֲבֻסֶיהָ
  chosen: her storehouses
  alternatives:
  - her granaries
  - her barns
  - her stalls
  lexicon: HALOT
  rationale: The noun מאבוס can denote a feeding trough or manger, but in this context
    of plundering Babylon it likely refers metonymically to storage places for grain
    or goods. 'Storehouses' best fits the context while preserving the image of places
    holding provisions.
- source_word: סָלּוּהָ
  chosen: pile her up
  alternatives:
  - heap her up
  - cast her up
  lexicon: HALOT
  rationale: Imperative from סלל, 'heap up' or 'pile up.' The object suffix likely
    refers to Babylon or her contents in the imagery of making heaps after destruction.
    'Pile her up' keeps the vividness and links naturally with the following comparison.
- source_word: כְמוֹ עֲרֵמִים
  chosen: like heaps
  alternatives:
  - like grain heaps
  - like piles
  lexicon: HALOT
  rationale: עֲרֵמִים are heaps or piles, often of produce. The broader term 'heaps'
    preserves the image without specifying beyond the Hebrew.
- source_word: וְהַחֲרִימוּהָ
  chosen: and devote her to destruction
  alternatives:
  - and utterly destroy her
  - and put her under the ban
  lexicon: HALOT
  rationale: חרם in the Hiphil carries the sense of placing under the ban, devoting
    to destruction. 'Devote her to destruction' preserves the technical force better
    than the flatter 'destroy.'
- source_word: אַל תְּהִי לָהּ שְׁאֵרִית
  chosen: let no remnant remain to her
  alternatives:
  - let her have no remnant
  - let there be no survivor for her
  lexicon: HALOT
  rationale: שְׁאֵרִית is 'remnant, remainder, survivor-group.' The clause expresses
    totality of judgment. 'Let no remnant remain to her' is natural English and preserves
    the noun's prophetic resonance.
