id: JER.50.1
reference: Jeremiah 50:1
source:
  edition: WLC
  text: הַ/דָּבָ֗ר אֲשֶׁ֨ר דִּבֶּ֧ר יְהוָ֛ה אֶל בָּבֶ֖ל אֶל אֶ֣רֶץ כַּשְׂדִּ֑ים בְּ/יַ֖ד
    יִרְמְיָ֥הוּ הַ/נָּבִֽיא־־׃
translation:
  text: 'The word that the LORD spoke concerning Babylon, concerning the land of the
    Chaldeans, by the hand of Jeremiah the prophet:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against Babylon, against the land of the Chaldeans.' The Hebrew preposition
      can introduce an oracle directed against a nation, though here it is rendered
      more broadly as 'concerning' in the heading.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'by the hand of Jeremiah,' an idiom meaning 'through Jeremiah' or
      'by Jeremiah as the agent.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדָּבָר
  chosen: The word
  alternatives:
  - The message
  - The matter
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word, matter, message.' In prophetic superscriptions,
    'the word' is a standard and suitably formal rendering that preserves the formulaic
    introduction without over-paraphrasing.
- source_word: אֲשֶׁר
  chosen: that
  alternatives:
  - which
  lexicon: HALOT
  rationale: A simple relative pronoun is required. 'That' is natural modern English
    and fits the restrictive clause.
- source_word: דִּבֶּר
  chosen: spoke
  alternatives:
  - said
  - declared
  lexicon: HALOT
  rationale: The verb דבר in this construction is well rendered 'spoke.' 'Declared'
    is possible in prophetic contexts, but 'spoke' stays closer to the Hebrew while
    remaining idiomatic.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention rooted
    in the LXX pattern.
- source_word: אֶל
  chosen: concerning
  alternatives:
  - against
  - to
  lexicon: HALOT
  rationale: In prophetic headings, אֶל with nations often introduces the subject
    matter of the oracle. 'Concerning' best fits the superscriptional style here.
    'Against' would anticipate the hostile content, but the preposition itself does
    not require that gloss in this heading.
- source_word: בָּבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: אֶרֶץ כַּשְׂדִּים
  chosen: the land of the Chaldeans
  alternatives:
  - the land of Chaldea
  lexicon: HALOT
  rationale: The construct phrase is most directly 'land of the Chaldeans.' This preserves
    the ethnogeographic expression of the Hebrew. 'Chaldea' is smoother but slightly
    more interpretive.
- source_word: בְּיַד
  chosen: by the hand of
  alternatives:
  - through
  - by
  lexicon: HALOT
  rationale: This idiom often marks agency or instrumentality in prophetic mediation.
    'By the hand of' preserves the Hebrew idiom in readable English; the simpler 'through'
    is possible but less transparent to the source.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  lexicon: HALOT
  rationale: Standard English transliteration of the prophet's name.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: A straightforward rendering of the appositional title identifying Jeremiah's
    office.
