theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name of God. Following the project's
    doctrinal and translation policy, it is rendered 'the LORD' rather than transliterated.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of אֶל in the prophetic superscription
  chosen_reading: concerning Babylon, concerning the land of the Chaldeans
  alternative_readings:
  - against Babylon, against the land of the Chaldeans
  rationale: Although the oracle is one of judgment, the superscriptional preposition
    is best left broad as 'concerning' rather than interpreted in advance as 'against.'
    This preserves the source text's wording and avoids importing the oracle's tone
    into the heading itself.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve the source text''s
    plain sense; do not paraphrase beyond what the source warrants'
