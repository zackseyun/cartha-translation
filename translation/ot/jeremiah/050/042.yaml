id: JER.50.42
reference: Jeremiah 50:42
source:
  edition: WLC
  text: קֶ֣שֶׁת וְ/כִידֹ֞ן יַחֲזִ֗יקוּ אַכְזָרִ֥י הֵ֨מָּה֙ וְ/לֹ֣א יְרַחֵ֔מוּ קוֹלָ/ם֙
    כַּ/יָּ֣ם יֶהֱמֶ֔ה וְ/עַל סוּסִ֖ים יִרְכָּ֑בוּ עָר֗וּךְ כְּ/אִישׁ֙ לַ/מִּלְחָמָ֔ה
    עָלַ֖יִ/ךְ בַּת בָּבֶֽל־־׃
translation:
  text: They seize bow and javelin; they are cruel and will show no mercy. Their sound
    roars like the sea, and they ride on horses, arrayed like a man for battle against
    you, daughter Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like one man,' emphasizing the army's unified formation.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶשֶׁת
  chosen: bow
  alternatives:
  - bows
  lexicon: HALOT
  rationale: Singular collective/instrumental noun; English singular fits the idiom
    'seize bow and javelin' while representing the weapon carried by the invading
    force.
- source_word: כִידֹן
  chosen: javelin
  alternatives:
  - spear
  - lance
  lexicon: HALOT
  rationale: Refers to a thrusting or throwing weapon distinct from the bow. 'Javelin'
    preserves the likely sense of a lighter spear-like weapon better than the broader
    'spear.'
- source_word: יַחֲזִיקוּ
  chosen: seize
  alternatives:
  - hold
  - grasp
  - take up
  lexicon: HALOT
  rationale: Hiphil of חזק here conveys taking/holding weapons in readiness. 'Seize'
    gives the vivid military force without overparaphrasing.
- source_word: אַכְזָרִי
  chosen: cruel
  alternatives:
  - fierce
  - merciless
  lexicon: HALOT
  rationale: Describes the invaders' pitiless character. 'Cruel' is the most direct
    lexical equivalent; the following clause explicitly states their lack of mercy.
- source_word: לֹא יְרַחֵמוּ
  chosen: will show no mercy
  alternatives:
  - will not have compassion
  - will not be merciful
  lexicon: HALOT
  rationale: English verbal phrase best captures the idiom and keeps the future-like
    force in context.
- source_word: קוֹלָם
  chosen: their sound
  alternatives:
  - their voice
  - their noise
  lexicon: HALOT
  rationale: The term can mean voice, sound, or noise. In context of an army compared
    to the sea, 'sound' is broad and natural English.
- source_word: כַיָּם יֶהֱמֶה
  chosen: roars like the sea
  alternatives:
  - makes a noise like the sea
  - rumbles like the sea
  lexicon: HALOT
  rationale: The verb denotes roaring, murmuring, or tumultuous sounding. 'Roars like
    the sea' is vivid and idiomatic in English.
- source_word: עַל סוּסִים יִרְכָּבוּ
  chosen: they ride on horses
  alternatives:
  - they mount horses
  - they ride horses
  lexicon: HALOT
  rationale: Straightforward military description. 'Ride on horses' follows the Hebrew
    preposition closely while remaining natural.
- source_word: עָרוּךְ
  chosen: arrayed
  alternatives:
  - drawn up
  - set in order
  - prepared
  lexicon: HALOT
  rationale: Passive participle describing battle formation/readiness. 'Arrayed' conveys
    ordered military preparation in readable English.
- source_word: כְּאִישׁ
  chosen: like a man
  alternatives:
  - like one man
  - like a warrior
  lexicon: HALOT
  rationale: Formally singular 'like a man.' In context it may suggest unified action,
    but the Hebrew wording is singular and should be preserved in the main text; the
    idiomatic alternative is preserved in a footnote.
- source_word: לַמִּלְחָמָה
  chosen: for battle
  alternatives:
  - for war
  lexicon: HALOT
  rationale: '''Battle'' is more idiomatic in this immediate military scene while
    remaining faithful to the noun מלחמה.'
- source_word: בַּת בָּבֶל
  chosen: daughter Babylon
  alternatives:
  - O daughter of Babylon
  - Virgin Daughter Babylon
  lexicon: HALOT
  rationale: Hebrew construct phrase used as a poetic personification of the city/people.
    'Daughter Babylon' preserves the metaphor and direct address without adding words
    not present.
