theological_decisions:
- issue: Gendered singular in martial simile כְּאִישׁ
  chosen_reading: like a man
  alternative_readings:
  - like one man
  - like a warrior
  rationale: Per translation philosophy, gender-accurate renderings are preferred
    where the source is grammatically masculine. Here the phrase is a simile in a
    military context; 'like a man' preserves the Hebrew form and imagery. Because
    many interpreters understand it idiomatically as unified action ('like one man'),
    that alternative is preserved in a footnote rather than replacing the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
