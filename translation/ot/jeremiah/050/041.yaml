id: JER.50.41
reference: Jeremiah 50:41
source:
  edition: WLC
  text: הִנֵּ֛ה עַ֥ם בָּ֖א מִ/צָּפ֑וֹן וְ/ג֤וֹי גָּדוֹל֙ וּ/מְלָכִ֣ים רַבִּ֔ים יֵעֹ֖רוּ
    מִ/יַּרְכְּתֵי אָֽרֶץ־׃
translation:
  text: Behold, a people is coming from the north, and a great nation and many kings
    will be stirred up from the farthest parts of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will be roused' or 'will awake'; the Hebrew verb suggests being aroused
      or mobilized for action.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the remote parts of the earth' or 'from the ends of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Discourse marker drawing attention to what follows. 'Behold' preserves
    the prophetic, elevated tone better than the more colloquial 'Look' or 'See'.
- source_word: עַם
  chosen: a people
  alternatives:
  - a nation
  lexicon: HALOT
  rationale: עַם commonly denotes a people-group. 'A people' is slightly more literal
    and leaves room for the following distinct phrase גּוֹי גָּדוֹל ('a great nation')
    without collapsing the two expressions into one.
- source_word: בָּא
  chosen: is coming
  alternatives:
  - comes
  - has come
  lexicon: HALOT
  rationale: Qal perfect after הִנֵּה often has a present/future-like vivid force
    in prophetic discourse. 'Is coming' captures the imminent, vivid aspect in natural
    English.
- source_word: מִצָּפוֹן
  chosen: from the north
  alternatives:
  - out of the north
  lexicon: HALOT
  rationale: Straightforward directional phrase. 'From the north' is idiomatic and
    sufficiently formal.
- source_word: גּוֹי גָּדוֹל
  chosen: a great nation
  alternatives:
  - a great people
  lexicon: HALOT
  rationale: גּוֹי often refers to a nation as a political entity. Rendering it 'nation'
    also preserves a distinction from the earlier עַם, translated 'people'.
- source_word: וּמְלָכִים רַבִּים
  chosen: and many kings
  alternatives:
  - and numerous kings
  lexicon: HALOT
  rationale: Simple coordinate phrase. 'Many kings' is natural English and preserves
    the multiplicity of rulers involved.
- source_word: יֵעֹרוּ
  chosen: will be stirred up
  alternatives:
  - will be roused
  - will awake
  lexicon: HALOT
  rationale: Nifal of עור here conveys being aroused or mobilized for action, likely
    military. 'Will be stirred up' captures the passive nuance and the sense of being
    incited or mobilized.
- source_word: מִיַּרְכְּתֵי אָרֶץ
  chosen: from the farthest parts of the earth
  alternatives:
  - from the remote parts of the earth
  - from the ends of the earth
  lexicon: HALOT
  rationale: The phrase denotes remote extremities. 'Farthest parts of the earth'
    preserves the superlative sense of distant regions without overcommitting to a
    technical idiom like 'ends of the earth.'
