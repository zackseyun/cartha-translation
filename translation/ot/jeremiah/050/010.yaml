id: JER.50.10
reference: Jeremiah 50:10
source:
  edition: WLC
  text: וְ/הָיְתָ֥ה כַשְׂדִּ֖ים לְ/שָׁלָ֑ל כָּל שֹׁלְלֶ֥י/הָ יִשְׂבָּ֖עוּ נְאֻם יְהוָֽה־־׃
translation:
  text: And Chaldea will become plunder; all who plunder her will have their fill,
    declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Chaldeans'; the Hebrew form is plural, but here it likely stands
      for the land/power of Chaldea, as suggested by the following 'her.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will be satisfied.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  chosen: And ... will become
  alternatives:
  - And ... will be
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse commonly
    carries a future/result sense. 'Will become' better reflects the transformation
    into a state of being spoil than the flatter 'will be.'
- source_word: כַשְׂדִּים
  chosen: Chaldea
  alternatives:
  - the Chaldeans
  - Babylonia
  lexicon: HALOT
  rationale: Although morphologically plural, in context the term denotes the land/polity
    rather than the people, as shown by the following feminine singular suffix on
    'her' and the predicate 'for plunder.' 'Chaldea' is the most natural English rendering
    for the territory.
- source_word: לְשָׁלָל
  chosen: plunder
  alternatives:
  - spoil
  - prey
  lexicon: HALOT
  rationale: '''Plunder'' is clear modern English and fits the military-looting context.
    ''Spoil'' is traditional but less idiomatic today; ''prey'' can sound too zoological
    here.'
- source_word: כָּל
  chosen: all
  alternatives:
  - everyone
  lexicon: HALOT
  rationale: Retains the comprehensive force of the Hebrew quantifier in a straightforward
    way.
- source_word: שֹׁלְלֶיהָ
  chosen: who plunder her
  alternatives:
  - her plunderers
  - those who despoil her
  lexicon: HALOT
  rationale: The participial form denotes the agents engaged in plundering. Rendering
    it as a relative clause is natural English while preserving the active verbal
    sense. The feminine suffix refers back to Chaldea as a land/city entity.
- source_word: יִשְׂבָּעוּ
  chosen: will have their fill
  alternatives:
  - will be satisfied
  - will be sated
  lexicon: HALOT
  rationale: The verb literally means 'be satisfied/full.' In the context of plunder,
    'will have their fill' idiomatically conveys abundance from looting without over-paraphrasing.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - utterance of the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is readable
    modern English and preserves the force of divine pronouncement. Per doctrine,
    יְהוָה is rendered 'the LORD.'
