theological_decisions:
- issue: Personification of Babylon as mother and birth-giver
  chosen_reading: Retain the maternal metaphor directly in the main text
  alternative_readings:
  - Interpret the metaphor as 'mother-city' or 'motherland' in the main text
  rationale: The verse speaks poetically of Babylon's shame through maternal imagery.
    Preserving the metaphor reflects the Hebrew text without importing explanatory
    interpretation into the translation.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of prophetic perfects
  chosen_reading: Render the opening perfect verbs with future sense in English
  alternative_readings:
  - Render as present/resultative ('is ashamed ... is disgraced')
  rationale: In prophetic judgment oracles, Hebrew perfects frequently describe certain
    future outcomes. Future English best communicates the discourse function to modern
    readers.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
