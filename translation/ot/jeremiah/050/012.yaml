id: JER.50.12
reference: Jeremiah 50:12
source:
  edition: WLC
  text: בּ֤וֹשָׁה אִמְּ/כֶם֙ מְאֹ֔ד חָפְרָ֖ה יֽוֹלַדְתְּ/כֶ֑ם הִנֵּה֙ אַחֲרִ֣ית גּוֹיִ֔ם
    מִדְבָּ֖ר צִיָּ֥ה וַ/עֲרָבָֽה׃
translation:
  text: Your mother will be utterly ashamed; she who gave birth to you will be disgraced.
    Behold, she will be the last of the nations, a wilderness, a dry land, and a desert.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the least of the nations.' The Hebrew expression can denote Babylon's
      final, reduced status among the nations.
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹשָׁה
  chosen: will be ... ashamed
  alternatives:
  - is ashamed
  - has become ashamed
  - will be put to shame
  lexicon: HALOT
  rationale: Qal perfect 3fs of בוש in prophetic discourse often functions with a
    future/resultative sense. 'Will be ashamed' fits the oracle context and parallels
    the following verb. 'Put to shame' would suggest an external agent more explicitly
    than the Hebrew states.
- source_word: אִמְּכֶם
  chosen: your mother
  alternatives:
  - your mother-city
  - your motherland
  lexicon: HALOT
  rationale: Literally 'your mother.' In context Babylon is personified as a mother
    of her inhabitants; the plain metaphor should be preserved rather than interpreted
    in the main text.
- source_word: מְאֹד
  chosen: utterly
  alternatives:
  - greatly
  - very much
  lexicon: HALOT
  rationale: Intensifier modifying the shame. 'Utterly' gives natural modern English
    force without sounding wooden.
- source_word: חָפְרָה
  chosen: will be disgraced
  alternatives:
  - is humiliated
  - will be humiliated
  - is confounded
  lexicon: HALOT
  rationale: The verb carries the sense of being abashed or humiliated. 'Disgraced'
    pairs well with 'ashamed' while preserving the distinction between the two Hebrew
    shame terms.
- source_word: יֹלַדְתְּכֶם
  chosen: she who gave birth to you
  alternatives:
  - your parent
  - your mother who bore you
  lexicon: HALOT
  rationale: The feminine singular participial form with 2mp suffix is literally 'the
    one bearing/giving birth to you.' Rendering it explicitly preserves the maternal
    metaphor and the poetic parallelism with 'your mother.'
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - Indeed
  - See
  lexicon: HALOT
  rationale: Marks emphatic attention to the announced outcome. 'Behold' preserves
    prophetic tone; although somewhat elevated, it remains understandable and concise.
- source_word: אַחֲרִית גּוֹיִם
  chosen: the last of the nations
  alternatives:
  - the least of the nations
  - the end of the nations
  - the hindmost of the nations
  lexicon: HALOT
  rationale: אַחֲרִית can denote latter end or final state. Here, with גוים, it most
    naturally expresses Babylon's reduced status among the nations. 'The last of the
    nations' captures both rank and outcome better than the more interpretive 'least,'
    which is worth preserving in a footnote.
- source_word: מִדְבָּר
  chosen: a wilderness
  alternatives:
  - desert
  - pastureland
  lexicon: HALOT
  rationale: In this judgment context the term denotes desolation/wilderness. 'Wilderness'
    avoids collapsing it into the later desert terms and preserves the triadic buildup.
- source_word: צִיָּה
  chosen: a dry land
  alternatives:
  - parched land
  - drought-place
  - wasteland
  lexicon: HALOT
  rationale: The noun denotes dryness/parchedness. 'Dry land' is idiomatic and keeps
    distinction from both 'wilderness' and 'desert.'
- source_word: וַעֲרָבָה
  chosen: and a desert
  alternatives:
  - and an arid plain
  - and a steppe
  lexicon: HALOT
  rationale: Refers to arid desert-like terrain. 'Desert' is the clearest modern equivalent
    here, while 'arid plain/steppe' are possible but less natural in this poetic list.
