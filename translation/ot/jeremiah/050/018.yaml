theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. This preserves covenantal resonance and aligns with the translation's stated
    practice.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of פקד in a judgment oracle
  chosen_reading: punish
  alternative_readings:
  - visit
  - call to account
  rationale: The verse announces divine judgment on Babylon in parallel with Assyria's
    downfall. Rendering פקד as 'punish' preserves the judicial force without importing
    extra theological interpretation.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
