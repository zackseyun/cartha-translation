id: JER.50.18
reference: Jeremiah 50:18
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּֽה אָמַ֞ר יְהוָ֤ה צְבָאוֹת֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל הִנְ/נִ֥י פֹקֵ֛ד
    אֶל מֶ֥לֶךְ בָּבֶ֖ל וְ/אֶל אַרְצ֑/וֹ כַּ/אֲשֶׁ֥ר פָּקַ֖דְתִּי אֶל מֶ֥לֶךְ אַשּֽׁוּר־־־־׃
translation:
  text: 'Therefore thus says the LORD of hosts, the God of Israel: Behold, I am about
    to punish the king of Babylon and his land, just as I punished the king of Assyria.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will visit/call to account the king of Babylon and his land ... as
      I visited/called to account the king of Assyria.' The Hebrew verb פקד can mean
      'visit,' 'attend to,' or 'call to account'; here it carries a punitive sense
      in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding context; 'Therefore'
    is a natural formal-equivalent connective in English.
- source_word: כֹּה אָמַר
  chosen: thus says
  alternatives:
  - this is what ... says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the solemn
    prophetic register without unnecessary paraphrase.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and common English Bible convention.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the established and sufficiently
    transparent rendering, preserving the title's breadth beyond merely human armies.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct phrase identifying YHWH covenantally with Israel.
- source_word: הִנְנִי
  chosen: Behold, I am about to
  alternatives:
  - Behold, I am
  - Look, I am about to
  lexicon: HALOT
  rationale: הִנְנִי introduces imminent divine action. Rendering with 'Behold, I
    am about to' captures both the attention-getting particle and the near-future
    force in context.
- source_word: פֹקֵד
  chosen: punish
  alternatives:
  - visit
  - attend to
  - call to account
  lexicon: HALOT
  rationale: The verb פקד has broad semantic range, but here in judgment context against
    Babylon and in comparison with Assyria it clearly denotes punitive visitation.
    'Punish' communicates the sense plainly in modern English.
- source_word: אֶל
  chosen: against
  alternatives:
  - upon
  - to
  lexicon: HALOT
  rationale: Although the preposition is literally 'to/toward,' with פקד in a judgment
    context English idiom requires 'against' or an equivalent. This is reflected by
    rendering the clause as punitive action directed against the king and land.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  lexicon: HALOT
  rationale: Direct rendering of the construct phrase.
- source_word: אַרְצוֹ
  chosen: his land
  alternatives:
  - his country
  lexicon: HALOT
  rationale: אֶרֶץ here refers to the territory under Babylon's king. 'Land' is the
    more biblically consistent and contextually suitable term.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - in the same way that
  lexicon: HALOT
  rationale: Introduces a comparison between Babylon's coming judgment and Assyria's
    prior judgment; 'just as' makes the comparison explicit and natural.
- source_word: פָּקַדְתִּי
  chosen: I punished
  alternatives:
  - I visited
  - I called to account
  lexicon: HALOT
  rationale: For consistency with the participial פֹקֵד earlier in the verse and because
    the context is clearly punitive, the same English gloss is used here.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  lexicon: HALOT
  rationale: Direct rendering of the construct phrase; refers to the prior imperial
    power judged by God.
