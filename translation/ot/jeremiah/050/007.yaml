id: JER.50.7
reference: Jeremiah 50:7
source:
  edition: WLC
  text: כָּל מוֹצְאֵי/הֶ֣ם אֲכָל֔וּ/ם וְ/צָרֵי/הֶ֥ם אָמְר֖וּ לֹ֣א נֶאְשָׁ֑ם תַּ֗חַת
    אֲשֶׁ֨ר חָטְא֤וּ לַֽ/יהוָה֙ נְוֵה צֶ֔דֶק וּ/מִקְוֵ֥ה אֲבֽוֹתֵי/הֶ֖ם יְהוָֽה־־׃ס
translation:
  text: All who found them devoured them, and their adversaries said, “We are not
    guilty, because they sinned against the LORD, the pasture of righteousness, the
    hope of their fathers—the LORD.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the habitation of righteousness.” The Hebrew נְוֵה can denote a pasture,
      abode, or dwelling place.
    reason: lexical_alternative
  - marker: b
    text: Or “the expectation of their fathers.”
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹצְאֵיהֶם
  chosen: who found them
  alternatives:
  - their finders
  - who came upon them
  lexicon: HALOT
  rationale: The participle from מצא functions substantivally for those who encountered
    Israel/Judah. 'Who found them' is idiomatic modern English and preserves the sense
    without overformal awkwardness.
- source_word: אֲכָלוּם
  chosen: devoured them
  alternatives:
  - ate them
  - consumed them
  lexicon: HALOT
  rationale: Though literally 'ate them,' the verb is commonly used metaphorically
    for destructive conquest. 'Devoured' preserves the predatory image and reads naturally
    in English.
- source_word: צָרֵיהֶם
  chosen: their adversaries
  alternatives:
  - their enemies
  - their oppressors
  lexicon: HALOT
  rationale: The noun denotes hostile foes. 'Adversaries' keeps the formal hostility
    without narrowing to military enemies alone; 'oppressors' would overinterpret.
- source_word: לֹא נֶאְשָׁם
  chosen: We are not guilty
  alternatives:
  - We incur no guilt
  - We are not held guilty
  lexicon: HALOT
  rationale: First person plural imperfect/qi form after 'they said' is best rendered
    as direct speech. 'We are not guilty' is the clearest idiomatic English expression
    of claimed innocence.
- source_word: תַּחַת אֲשֶׁר
  chosen: because
  alternatives:
  - inasmuch as
  - for that
  lexicon: HALOT
  rationale: The construction gives the grounds for the adversaries' claim of innocence.
    'Because' communicates the causal force in natural English.
- source_word: חָטְאוּ לַיהוָה
  chosen: they sinned against the LORD
  alternatives:
  - they sinned to the LORD
  - they offended the LORD
  lexicon: HALOT
  rationale: The idiom with חטא plus ל marks sin directed against the LORD. 'Against
    the LORD' is standard and clear.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: נְוֵה צֶדֶק
  chosen: the pasture of righteousness
  alternatives:
  - the habitation of righteousness
  - the abode of righteousness
  lexicon: HALOT
  rationale: נוה can denote pastureland, abode, or dwelling place. In Jeremiah's shepherd/flock
    context, 'pasture' preserves the pastoral imagery and links naturally with the
    people's relation to the LORD.
- source_word: מִקְוֵה אֲבוֹתֵיהֶם
  chosen: the hope of their fathers
  alternatives:
  - the expectation of their fathers
  - the fountain/gathering of their fathers
  lexicon: HALOT
  rationale: מִקְוֶה can denote hope/expectation, and that sense fits the appositional
    titles for the LORD here. 'Hope of their fathers' is the most contextually coherent
    and idiomatic rendering.
