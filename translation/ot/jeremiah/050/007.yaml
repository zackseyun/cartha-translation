theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render יהוה as 'the LORD,' following the stated
    doctrine and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Understanding the appositional phrases נְוֵה צֶדֶק וּמִקְוֵה אֲבוֹתֵיהֶם
  chosen_reading: 'Both phrases are titles/appositions referring to the LORD: ''the
    pasture of righteousness, the hope of their fathers—the LORD.'''
  alternative_readings:
  - Treat נְוֵה צֶדֶק as referring to Israel's land or fold rather than directly to
    the LORD
  - Render נוה as 'habitation' instead of 'pasture'
  rationale: The syntax places these expressions after 'they sinned against the LORD'
    and climaxes with יהוה, favoring apposition. The pastoral nuance of נוה also suits
    the immediate flock imagery in the context.
