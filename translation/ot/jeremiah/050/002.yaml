id: JER.50.2
reference: Jeremiah 50:2
source:
  edition: WLC
  text: הַגִּ֨ידוּ בַ/גּוֹיִ֤ם וְ/הַשְׁמִ֨יעוּ֙ וּֽ/שְׂאוּ נֵ֔ס הַשְׁמִ֖יעוּ אַל תְּכַחֵ֑דוּ
    אִמְרוּ֩ נִלְכְּדָ֨ה בָבֶ֜ל הֹבִ֥ישׁ בֵּל֙ חַ֣ת מְרֹדָ֔ךְ הֹבִ֣ישׁוּ עֲצַבֶּ֔י/הָ
    חַ֖תּוּ גִּלּוּלֶֽי/הָ־־׃
translation:
  text: Declare it among the nations and proclaim it; lift up a banner. Proclaim it;
    do not hide it. Say, “Babylon is captured; Bel is put to shame; Merodach is shattered.
    Her images are put to shame; her idols are shattered.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Merodach is the Hebrew form of the Babylonian god more commonly known as
      Marduk.
    reason: alternative_reading
  - marker: b
    text: The Hebrew term translated “idols” is strongly pejorative, carrying the
      sense of something filthy or contemptible.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּידוּ
  chosen: Declare it
  alternatives:
  - Tell
  - Announce
  lexicon: HALOT
  rationale: Hiphil imperative of נגד calls for making a message known publicly. 'Declare'
    fits the heraldic tone better than the more casual 'tell'.
- source_word: בַגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the peoples
  - in the nations
  lexicon: HALOT
  rationale: גּוֹיִם here refers to the foreign nations generally, not specifically
    'Gentiles' in a later technical sense. 'Among the nations' is idiomatic and preserves
    the international scope.
- source_word: וְהַשְׁמִיעוּ / הַשְׁמִיעוּ
  chosen: proclaim it
  alternatives:
  - make it heard
  - publish it
  lexicon: HALOT
  rationale: The repeated Hiphil of שמע emphasizes causing the report to be heard.
    'Proclaim it' is natural English and preserves the public-announcement force;
    repetition is retained for rhetorical effect.
- source_word: וּשְׂאוּ נֵס
  chosen: lift up a banner
  alternatives:
  - raise a signal
  - lift up a standard
  lexicon: HALOT
  rationale: נֵס is a signal pole/banner used for public summons or military signaling.
    'Banner' is readable modern English while preserving the image.
- source_word: אַל תְּכַחֵדוּ
  chosen: do not hide it
  alternatives:
  - do not conceal it
  - do not keep it secret
  lexicon: HALOT
  rationale: כחד in the Piel conveys concealment or suppression. 'Do not hide it'
    is concise and fits the sequence of public proclamation.
- source_word: נִלְכְּדָה בָבֶל
  chosen: Babylon is captured
  alternatives:
  - Babylon has been taken
  lexicon: HALOT
  rationale: The Niphal perfect presents Babylon as having been seized. English present
    perfective/report style can be rendered simply as 'is captured' in prophetic announcement
    style.
- source_word: הֹבִישׁ
  chosen: is put to shame
  alternatives:
  - is shamed
  - has been disgraced
  lexicon: HALOT
  rationale: בוש in the Hiphil here denotes being brought into shame or disgrace.
    Passive English best reflects the result on Babylon's gods.
- source_word: בֵּל
  chosen: Bel
  lexicon: HALOT
  rationale: Proper divine name; per translation philosophy, names are transliterated
    rather than translated.
- source_word: חַת
  chosen: is shattered
  alternatives:
  - is dismayed
  - is broken down
  lexicon: HALOT
  rationale: חתת can denote being shattered, broken, or dismayed. In parallel with
    the humiliation of idols and the fall of Babylon's gods, 'is shattered' best captures
    the collapse of the deity's power/image in context.
- source_word: מְרֹדָךְ
  chosen: Merodach
  alternatives:
  - Marduk
  lexicon: HALOT
  rationale: The Hebrew form is מְרֹדָךְ; 'Merodach' follows standard transliteration
    from the Hebrew text. 'Marduk' is the better-known Akkadian form and is worth
    preserving in a footnote.
- source_word: עֲצַבֶּיהָ
  chosen: her images
  alternatives:
  - her idols
  - her carved images
  lexicon: HALOT
  rationale: עֲצַבִּים often refers to fashioned idol-images. Since גִּלּוּלִים also
    appears in the same line, varying the English avoids flattening two distinct Hebrew
    terms while keeping both in the semantic field of idolatry.
- source_word: גִּלּוּלֶיהָ
  chosen: her idols
  alternatives:
  - her dung-idols
  - her foul idols
  lexicon: HALOT
  rationale: גִּלּוּלִים is a strongly pejorative term for idols. 'Her idols' is the
    clearest main-text rendering; the more contemptuous nuance is preserved in a footnote
    as a lexical alternative.
