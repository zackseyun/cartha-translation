theological_decisions:
- issue: Rendering of Babylonian deity names
  chosen_reading: Transliterate the names as 'Bel' and 'Merodach'
  alternative_readings:
  - Translate by identification with broader Mesopotamian deities
  rationale: The translation philosophy directs that personal names be transliterated.
    This avoids importing explanatory identifications into the main text while preserving
    historical specificity.
  doctrine_reference: Translation philosophy §2
- issue: Treatment of pejorative idol terminology
  chosen_reading: Use readable terms in the main text ('images,' 'idols') while preserving
    stronger nuance in a footnote
  alternative_readings:
  - Render גִּלּוּלִים more explicitly as 'dung-idols' in the main text
  rationale: Optimal equivalence favors accessible modern English in the main text,
    but the contemptuous force of the Hebrew should remain auditable and available
    to readers through a footnote.
  doctrine_reference: Translation philosophy §§5–6
