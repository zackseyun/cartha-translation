id: JER.50.8
reference: Jeremiah 50:8
source:
  edition: WLC
  text: נֻ֚דוּ מִ/תּ֣וֹךְ בָּבֶ֔ל וּ/מֵ/אֶ֥רֶץ כַּשְׂדִּ֖ים יצאו וִ/הְי֕וּ כְּ/עַתּוּדִ֖ים
    לִ/פְנֵי צֹֽאן־׃
translation:
  text: Flee from the midst of Babylon, and go out from the land of the Chaldeans;
    be like male goats leading the flock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'be like male goats before the flock.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֻדוּ
  chosen: Flee
  alternatives:
  - Wander away
  - Move away
  - Flee away
  lexicon: HALOT
  rationale: The imperative from נוד in this context is a summons to depart urgently
    from doomed Babylon. 'Flee' best captures the force and urgency in idiomatic English,
    more naturally than the more literal but less contextually apt 'wander away' or
    the flatter 'move away'.
- source_word: מִתּוֹךְ
  chosen: from the midst of
  alternatives:
  - from within
  - out of the middle of
  lexicon: HALOT
  rationale: The phrase emphasizes departure from inside Babylon itself. 'From the
    midst of' preserves the Hebrew image while remaining readable.
- source_word: בָּבֶל
  chosen: Babylon
  rationale: Standard English transliteration of the place name.
- source_word: וּמֵאֶרֶץ כַּשְׂדִּים
  chosen: and go out from the land of the Chaldeans
  alternatives:
  - and leave the land of the Chaldeans
  - and go out from Chaldea
  lexicon: HALOT
  rationale: The verb יצאו is supplied in English as an imperative by context, coordinated
    with the preceding imperative and following imperative. 'Go out from the land
    of the Chaldeans' closely reflects the Hebrew wording while remaining natural.
    'Chaldeans' is retained rather than the regional shorthand 'Chaldea' because the
    Hebrew explicitly says 'land of the Chaldeans.'
- source_word: יצאו
  chosen: go out
  alternatives:
  - come out
  - leave
  lexicon: HALOT
  rationale: Although morphologically parsed as perfect 3cp in the table, in context
    it functions as an imperative-like continuation in a sequence of commands. 'Go
    out' is the most direct contextual rendering.
- source_word: וִהְיוּ
  chosen: be
  alternatives:
  - become
  lexicon: HALOT
  rationale: In this exhortation, 'be like' is the natural English equivalent for
    the comparative construction with כ.
- source_word: כְּעַתּוּדִים
  chosen: like male goats
  alternatives:
  - like he-goats
  - like rams
  lexicon: HALOT
  rationale: עַתּוּדִים refers to male goats, not sheep. 'Male goats' is clearer and
    more contemporary than 'he-goats.' 'Rams' would be inaccurate.
- source_word: לִפְנֵי צֹאן
  chosen: leading the flock
  alternatives:
  - before the flock
  - in front of the flock
  lexicon: HALOT
  rationale: Literally the phrase is 'before the flock,' but in English the idiomatic
    sense here is of goats going ahead of the flock. 'Leading the flock' makes the
    simile intelligible while preserving the image of going before others.
- source_word: צֹאן
  chosen: the flock
  alternatives:
  - the sheep
  - the small livestock
  lexicon: HALOT
  rationale: צֹאן is a collective term for small livestock, often rendered 'flock.'
    In this simile, 'the flock' is the most natural and sufficiently precise rendering.
