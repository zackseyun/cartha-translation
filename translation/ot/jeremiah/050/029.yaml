theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH. No contextual factor here requires deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of פְּלֵטָה in a judgment oracle
  chosen_reading: no escape
  alternative_readings:
  - no survivor
  - no remnant
  rationale: The context is a military summons and encirclement of Babylon. Rendering
    the noun as 'escape' preserves the siege logic without overcommitting to annihilation
    language beyond what the term itself requires.
