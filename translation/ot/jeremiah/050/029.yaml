id: JER.50.29
reference: Jeremiah 50:29
source:
  edition: WLC
  text: הַשְׁמִ֣יעוּ אֶל בָּבֶ֣ל רַ֠בִּים כָּל דֹּ֨רְכֵי קֶ֜שֶׁת חֲנ֧וּ עָלֶ֣י/הָ
    סָבִ֗יב אַל יְהִי פְּלֵטָ֔ה שַׁלְּמוּ לָ֣/הּ כְּ/פָעֳלָ֔/הּ כְּ/כֹ֛ל אֲשֶׁ֥ר עָשְׂתָ֖ה
    עֲשׂוּ לָ֑/הּ כִּ֧י אֶל יְהוָ֛ה זָ֖דָה אֶל קְד֥וֹשׁ יִשְׂרָאֵֽל־׀־־־־־־־׃
translation:
  text: Summon many against Babylon, all who bend the bow; encamp around her on every
    side; let there be no escape. Repay her according to her work; according to all
    that she has done, do to her. For she has acted arrogantly against the LORD, against
    the Holy One of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let there be no survivor' / 'let there be no escaped remnant.' The Hebrew
      פְּלֵטָה can denote escape or those who escape.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְׁמִיעוּ
  chosen: Summon
  alternatives:
  - Make heard
  - Proclaim
  - Call
  lexicon: HALOT
  rationale: The Hiphil imperative of שמע here introduces a call to muster forces
    against Babylon. 'Summon' captures the causative sense in idiomatic military English
    better than the more wooden 'make heard.'
- source_word: רַבִּים
  chosen: many
  alternatives:
  - many men
  - multitudes
  lexicon: HALOT
  rationale: Used substantivally after 'against Babylon,' it refers to many attackers.
    'Many' is concise and natural; 'multitudes' would overstate the term.
- source_word: דֹּרְכֵי קֶשֶׁת
  chosen: all who bend the bow
  alternatives:
  - all archers
  - all who tread the bow
  lexicon: HALOT
  rationale: Literally 'those who tread/bend the bow,' an idiom for archers. Rendering
    the idiom more transparently preserves the martial imagery while remaining readable.
- source_word: חֲנוּ עָלֶיהָ סָבִיב
  chosen: encamp around her on every side
  alternatives:
  - camp against her all around
  - pitch camp around her
  lexicon: HALOT
  rationale: Imperative plural in siege context. 'Encamp around her on every side'
    conveys the military action and the total encirclement implied by סָבִיב.
- source_word: אַל יְהִי פְּלֵטָה
  chosen: let there be no escape
  alternatives:
  - let there be no survivor
  - let there be no remnant that escapes
  lexicon: HALOT
  rationale: פְּלֵטָה can denote escape, deliverance, or escaped remnant. In this
    siege/judgment context, 'no escape' best fits the command to surround the city
    completely; 'no survivor' is possible but slightly more interpretive.
- source_word: שַׁלְּמוּ לָהּ
  chosen: Repay her
  alternatives:
  - Pay her back
  - Recompense her
  lexicon: HALOT
  rationale: The Piel of שלם here has the sense of requital. 'Repay her' is clear
    modern English and preserves the judicial reciprocity of the context.
- source_word: כְּפָעֳלָהּ
  chosen: according to her work
  alternatives:
  - according to her deed
  - according to what she has done
  lexicon: HALOT
  rationale: פֹּעַל denotes deed/work. 'According to her work' keeps the lexical distinction
    before the next clause, which explicitly says 'according to all that she has done.'
- source_word: כְּכֹל אֲשֶׁר עָשְׂתָה עֲשׂוּ לָהּ
  chosen: according to all that she has done, do to her
  alternatives:
  - do to her as she has done
  - according to everything she did, do to her
  lexicon: HALOT
  rationale: This clause intensifies the lex talionis principle. The chosen rendering
    stays close to the Hebrew repetition and imperative force.
- source_word: זָדָה
  chosen: has acted arrogantly
  alternatives:
  - has been proud
  - has behaved presumptuously
  - has acted insolently
  lexicon: HALOT
  rationale: The verb conveys presumptuous, insolent pride. 'Has acted arrogantly'
    communicates both attitude and conduct in accessible English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the LXX pattern.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  alternatives:
  - Israel's Holy One
  lexicon: HALOT
  rationale: This is a fixed prophetic title. 'The Holy One of Israel' preserves its
    recognizable theological and literary form.
