id: JER.50.14
reference: Jeremiah 50:14
source:
  edition: WLC
  text: עִרְכ֨וּ עַל בָּבֶ֤ל סָבִיב֙ כָּל דֹּ֣רְכֵי קֶ֔שֶׁת יְד֣וּ אֵלֶ֔י/הָ אַֽל
    תַּחְמְל֖וּ אֶל חֵ֑ץ כִּ֥י לַֽ/יהוָ֖ה חָטָֽאָה־׀־־־׃
translation:
  text: Draw up against Babylon all around, all you who bend the bow; shoot at her;
    do not spare an arrow, for she has sinned against the LORD.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: עִרְכוּ
  chosen: Draw up
  alternatives:
  - Set yourselves in array
  - Arrange yourselves
  lexicon: HALOT
  rationale: Imperative plural from ערך in a military context, calling forces to take
    battle positions. 'Draw up' is idiomatic modern English for forming battle lines
    without over-paraphrasing.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: In a hostile military context with Babylon as the object, 'against' best
    conveys the adversative force.
- source_word: סָבִיב
  chosen: all around
  alternatives:
  - around
  - on every side
  lexicon: HALOT
  rationale: Adverbial term indicating encirclement. 'All around' preserves the sense
    of surrounding Babylon from every side.
- source_word: כָּל דֹּרְכֵי קֶשֶׁת
  chosen: all you who bend the bow
  alternatives:
  - all archers
  - all who tread the bow
  lexicon: HALOT
  rationale: Literally 'all treaders/benders of the bow,' an idiom for archers. The
    chosen rendering preserves the concrete Hebrew image while remaining natural English.
- source_word: יְדוּ אֵלֶיהָ
  chosen: shoot at her
  alternatives:
  - shoot toward her
  - cast/shoot against her
  lexicon: HALOT
  rationale: ידה in the Hiphil can mean 'shoot' in archery contexts. 'At her' fits
    the military address to Babylon personified as feminine singular.
- source_word: אַל תַּחְמְלוּ אֶל חֵץ
  chosen: do not spare an arrow
  alternatives:
  - do not hold back an arrow
  - do not be sparing with arrows
  lexicon: HALOT
  rationale: The negative imperative with חמל conveys withholding pity or sparing.
    With 'arrow' as object, the sense is not to conserve ammunition. Singular חֵץ
    is taken collectively in idiomatic English as 'an arrow' after the negative, conveying
    'do not spare even one arrow.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the commanded attack. 'For' is concise and
    natural in elevated narrative-prophetic style.
- source_word: לַיהוָה
  chosen: against the LORD
  alternatives:
  - against Yahweh
  lexicon: HALOT
  rationale: The preposition ל with חטא commonly marks the one against whom the sin
    is committed. Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: חָטָאָה
  chosen: she has sinned
  alternatives:
  - she sinned
  - she has offended
  lexicon: HALOT
  rationale: Perfect 3fs referring to Babylon personified as feminine. 'Has sinned'
    preserves the moral-theological force and works well as the stated ground for
    judgment.
