theological_decisions:
- issue: Rendering of the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD.' This also aligns with longstanding English Bible convention while preserving
    reverential function.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Object of Babylon's sin
  chosen_reading: for she has sinned against the LORD
  alternative_readings:
  - for she has sinned to the LORD
  rationale: Although the Hebrew preposition is ל, with חטא this construction idiomatically
    means sinning against someone. Rendering it woodenly as 'to the LORD' would obscure
    the sense. The translation preserves the theological point that Babylon's offense
    is ultimately against Israel's God.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy;
    readable modern English'
