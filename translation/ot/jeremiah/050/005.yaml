id: JER.50.5
reference: Jeremiah 50:5
source:
  edition: WLC
  text: צִיּ֣וֹן יִשְׁאָ֔לוּ דֶּ֖רֶךְ הֵ֣נָּה פְנֵי/הֶ֑ם בֹּ֚אוּ וְ/נִלְו֣וּ אֶל יְהוָ֔ה
    בְּרִ֥ית עוֹלָ֖ם לֹ֥א תִשָּׁכֵֽחַ־׃ס
translation:
  text: 'They will ask the way to Zion, with their faces turned toward it: ‘Come,
    let us join ourselves to the LORD in an everlasting covenant that will not be
    forgotten.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Come, and let us be joined to the LORD'; the Hebrew verb can be rendered
      either with a reflexive nuance ('join ourselves') or more simply as 'be joined.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'an everlasting covenant that will not be forgotten,' emphasizing
      a lasting covenant loyalty in contrast to past unfaithfulness.
    reason: cultural_note
lexical_decisions:
- source_word: צִיּוֹן
  chosen: Zion
  lexicon: HALOT
  rationale: Proper place-name; transliterated per philosophy for names rather than
    translated.
- source_word: יִשְׁאָלוּ
  chosen: they will ask
  alternatives:
  - they ask
  - they will inquire
  lexicon: HALOT
  rationale: Qal imperfect 3mp of שאל commonly means 'ask/inquire.' Future sense fits
    the prophetic context describing what the returning people will do.
- source_word: דֶּרֶךְ
  chosen: the way
  alternatives:
  - the road
  - the path
  lexicon: HALOT
  rationale: Concrete 'way/road' is retained, with implied destination supplied by
    context ('to Zion'). 'Way' also preserves possible figurative resonance without
    over-paraphrasing.
- source_word: הֵנָּה
  chosen: toward it
  alternatives:
  - here
  - thither
  - there
  lexicon: HALOT
  rationale: Directional adverb indicating movement/orientation toward the destination
    just named. In idiomatic English, 'toward it' best conveys the sense with 'their
    faces turned'.
- source_word: פְנֵיהֶם
  chosen: with their faces turned
  alternatives:
  - their faces
  - facing
  lexicon: HALOT
  rationale: Literally 'their faces'; combined with the directional adverb it expresses
    orientation. Expanded slightly for natural English while preserving the image.
- source_word: בֹּאוּ
  chosen: Come
  alternatives:
  - They come
  - Come!
  lexicon: HALOT
  rationale: Qal imperative plural introducing direct speech/exhortation. Rendered
    as an invitation/exhortation in quotation marks.
- source_word: וְנִלְווּ
  chosen: let us join ourselves
  alternatives:
  - let us join
  - let us bind ourselves
  - they will join themselves
  lexicon: HALOT
  rationale: 'From לוה in the Niphal, ''to join oneself/be joined.'' Given its pairing
    with the imperative ''Come,'' it is best taken as a cohortative-like exhortation
    in sense: ''let us join ourselves.'' The reflexive nuance is worth preserving
    because covenant commitment is voluntary and personal.'
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Preposition plus divine name. Per doctrine, יְהוָה is rendered 'the LORD'
    rather than transliterated.
- source_word: בְּרִית עוֹלָם
  chosen: in an everlasting covenant
  alternatives:
  - by an everlasting covenant
  - with an eternal covenant
  lexicon: HALOT
  rationale: בְּרִית is 'covenant'; עוֹלָם here denotes enduring/perpetual duration.
    'Everlasting covenant' is standard and clear. The preposition is not explicit
    before the phrase in Hebrew, so English 'in' expresses the manner/sphere of joining
    themselves to the LORD.
- source_word: לֹא תִשָּׁכֵחַ
  chosen: that will not be forgotten
  alternatives:
  - which will not be forgotten
  - that will not be forsaken
  lexicon: HALOT
  rationale: Niphal imperfect 3fs of שכח, agreeing with feminine 'covenant.' Passive
    sense 'be forgotten' is straightforward. Rendered relative to modify 'covenant'
    naturally in English.
