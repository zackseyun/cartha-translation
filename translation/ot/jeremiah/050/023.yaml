theological_decisions:
- issue: Metaphorical identification of Babylon as 'the hammer of the whole earth'
  chosen_reading: Retain the metaphor directly rather than interpret it as 'destroyer'
    or similar.
  alternative_readings:
  - the destroyer of the whole earth
  - the war hammer of the whole earth
  rationale: 'The Hebrew image is vivid and important to the rhetoric of judgment:
    the very instrument that struck others is itself cut down and broken. Preserving
    the metaphor avoids importing a narrower interpretive gloss.'
  doctrine_reference: Translation philosophy §1, §5
