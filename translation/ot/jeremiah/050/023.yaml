id: JER.50.23
reference: Jeremiah 50:23
source:
  edition: WLC
  text: אֵ֤יךְ נִגְדַּע֙ וַ/יִּשָּׁבֵ֔ר פַּטִּ֖ישׁ כָּל הָ/אָ֑רֶץ אֵ֣יךְ הָיְתָ֧ה
    לְ/שַׁמָּ֛ה בָּבֶ֖ל בַּ/גּוֹיִֽם־׃
translation:
  text: How the hammer of the whole earth has been cut down and broken! How Babylon
    has become a desolation among the nations!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the war hammer of the whole earth.' The Hebrew metaphor presents Babylon
      as the crushing instrument used against the nations.
    reason: lexical_alternative
  - marker: b
    text: Or 'has become an object of horror among the nations.' The Hebrew term can
      emphasize both desolation and appalled astonishment at the ruin.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  chosen: How
  alternatives:
  - How indeed
  - Alas, how
  lexicon: HALOT
  rationale: Introduces an exclamatory lament or astonishment, not a request for information.
    'How' preserves the rhetorical force naturally in English.
- source_word: נִגְדַּע
  chosen: has been cut down
  alternatives:
  - is cut off
  - has been hewn down
  lexicon: HALOT
  rationale: The Niphal of גדע conveys being cut down or cut off. 'Has been cut down'
    fits the passive/resultative sense and the image of a once-powerful instrument
    brought low.
- source_word: וַיִּשָּׁבֵר
  chosen: and broken
  alternatives:
  - and shattered
  - and smashed
  lexicon: HALOT
  rationale: From שבר, passive sense 'be broken.' 'Broken' is the broadest and most
    textually restrained rendering; stronger options like 'shattered' are possible
    but slightly more interpretive.
- source_word: פַּטִּישׁ
  chosen: hammer
  alternatives:
  - war hammer
  - maul
  lexicon: HALOT
  rationale: The noun denotes a hammer or smith's hammer. In context it metaphorically
    describes Babylon as the crushing instrument of the earth. 'Hammer' is the clearest
    and most idiomatic choice.
- source_word: כָּל הָאָרֶץ
  chosen: of the whole earth
  alternatives:
  - of all the earth
  - of the whole land
  lexicon: HALOT
  rationale: '''Earth'' is preferred over ''land'' because the phrase here describes
    Babylon''s international dominance, reinforced by the following ''among the nations.''
    ''Whole earth'' preserves the universal scope.'
- source_word: הָיְתָה לְשַׁמָּה
  chosen: has become a desolation
  alternatives:
  - has become an object of horror
  - has become a wasteland
  lexicon: HALOT
  rationale: לְשַׁמָּה expresses becoming a desolation or appalling ruin. 'Has become
    a desolation' preserves both the state of ruin and the prophetic diction without
    over-paraphrasing.
- source_word: בָּבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: בַּגּוֹיִם
  chosen: among the nations
  alternatives:
  - among the peoples
  - among the Gentiles
  lexicon: HALOT
  rationale: In this geopolitical judgment context, גוים refers to nations/peoples
    generally, not specifically Gentiles in a later theological sense. 'Among the
    nations' is the most natural and contextually precise rendering.
