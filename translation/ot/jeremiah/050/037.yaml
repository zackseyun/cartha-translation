id: JER.50.37
reference: Jeremiah 50:37
source:
  edition: WLC
  text: חֶ֜רֶב אֶל סוּסָ֣י/ו וְ/אֶל רִכְבּ֗/וֹ וְ/אֶל כָּל הָ/עֶ֛רֶב אֲשֶׁ֥ר בְּ/תוֹכָ֖/הּ
    וְ/הָי֣וּ לְ/נָשִׁ֑ים חֶ֥רֶב אֶל אוֹצְרֹתֶ֖י/הָ וּ/בֻזָּֽזוּ־־־־־׃
translation:
  text: A sword against his horses and against his chariots, and against all the mixed
    people in her midst, and they will become women. A sword against her treasuries,
    and they will be plundered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all the foreign mercenaries' or 'all the mixed multitude.' The Hebrew
      likely refers to a mixed population or auxiliary forces within Babylon.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'and they will become women,' an ancient idiom for becoming fearful
      or losing courage in battle.
    reason: cultural_note
lexical_decisions:
- source_word: חֶרֶב
  chosen: A sword against
  alternatives:
  - The sword is against
  - Sword against
  lexicon: HALOT
  rationale: The noun is used elliptically in a prophetic judgment formula, functioning
    as an announcement of hostile attack. English supplies a natural verbal force
    with 'against' while preserving the terse oracle style.
- source_word: סוּסָיו
  chosen: his horses
  alternatives:
  - its horses
  lexicon: HALOT
  rationale: The 3ms suffix refers to Babylon personified in the surrounding context.
    'His' follows the grammatical form here, though English readers may also understand
    the city/empire corporately.
- source_word: רִכְבּוֹ
  chosen: his chariots
  alternatives:
  - its chariotry
  - its chariots
  lexicon: HALOT
  rationale: The singular collective can denote chariot forces; 'chariots' is the
    most natural English rendering for the military sense.
- source_word: כָּל הָעֶרֶב
  chosen: all the mixed people
  alternatives:
  - all the foreign mercenaries
  - all the mixed multitude
  lexicon: HALOT
  rationale: עֶרֶב here likely denotes a mixed population or foreign auxiliaries within
    Babylon. 'Mixed people' preserves the lexical sense without over-specifying mercenary
    status, which is interpretive.
- source_word: בְּתוֹכָהּ
  chosen: in her midst
  alternatives:
  - within her
  - in the midst of her
  lexicon: HALOT
  rationale: The feminine suffix refers to Babylon as a city. 'In her midst' preserves
    the personified-city imagery common in prophetic literature.
- source_word: וְהָיוּ לְנָשִׁים
  chosen: and they will become women
  alternatives:
  - and they will be like women
  - and they will become weak like women
  lexicon: HALOT
  rationale: Formally the text says 'become women.' In context this is an ancient
    idiom for loss of courage in battle, but the translation keeps the source wording
    rather than importing the interpretive expansion into the main text.
- source_word: אוֹצְרֹתֶיהָ
  chosen: her treasuries
  alternatives:
  - her storehouses
  - her treasures
  lexicon: HALOT
  rationale: The plural refers to places or stores of wealth. 'Treasuries' best fits
    the context of Babylon's wealth being seized.
- source_word: וּבֻזָּזוּ
  chosen: and they will be plundered
  alternatives:
  - and they will be looted
  lexicon: HALOT
  rationale: The passive verb refers most naturally to the treasuries being despoiled.
    'Plundered' matches the military-judgment context and keeps the passive sense.
