theological_decisions:
- issue: Rendering of the gendered idiom לְנָשִׁים
  chosen_reading: and they will become women
  alternative_readings:
  - and they will be like women
  - and they will become weak/cowardly
  rationale: Following the gender-accurate principle, the translation preserves the
    explicit gendered wording of the Hebrew rather than neutralizing it. Because the
    phrase is idiomatic in an ancient war context, an explanatory alternative is preserved
    in a footnote rather than inserted into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral) and §3 (Preserve theological tension rather than resolve it)
