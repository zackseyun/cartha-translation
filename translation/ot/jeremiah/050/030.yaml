id: JER.50.30
reference: Jeremiah 50:30
source:
  edition: WLC
  text: לָ/כֵ֛ן יִפְּל֥וּ בַחוּרֶ֖י/הָ בִּ/רְחֹבֹתֶ֑י/הָ וְ/כָל אַנְשֵׁ֨י מִלְחַמְתָּ֥/הּ
    יִדַּ֛מּוּ בַּ/יּ֥וֹם הַ/ה֖וּא נְאֻם יְהוָֽה־־׃ס
translation:
  text: Therefore her young men will fall in her streets, and all her warriors will
    be silenced on that day, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'all her warriors will perish.' The Hebrew verb can mean 'be silenced'
      or, in context, imply being stilled in death.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Standard inferential particle introducing the consequence of the preceding
    judgment oracle. 'Therefore' preserves the formal logical connection.
- source_word: יִפְּלוּ
  chosen: will fall
  alternatives:
  - shall fall
  - will be struck down
  lexicon: HALOT
  rationale: Qal imperfect of נפל, literally 'fall.' In military-judgment context
    it implies death in battle, but 'will fall' preserves the Hebrew imagery without
    over-specifying.
- source_word: בַחוּרֶיהָ
  chosen: her young men
  alternatives:
  - her chosen men
  - her youths
  lexicon: HALOT
  rationale: בחור commonly denotes young men in the prime of life, often with military
    connotations. 'Young men' is the most natural English rendering here; 'chosen
    men' is less likely in this form/context.
- source_word: בִּרְחֹבֹתֶיהָ
  chosen: in her streets
  alternatives:
  - in her squares
  - in her public places
  lexicon: HALOT
  rationale: רחובות refers to broad city streets or plazas. 'Streets' is idiomatic
    and fits the urban judgment scene, while preserving the locative sense.
- source_word: אַנְשֵׁי מִלְחַמְתָּהּ
  chosen: her warriors
  alternatives:
  - the men of her war
  - her fighting men
  - her soldiers
  lexicon: HALOT
  rationale: Literally 'the men of her war.' 'Her warriors' is a concise optimal-equivalence
    rendering that preserves the military sense without awkwardness.
- source_word: יִדַּמּוּ
  chosen: will be silenced
  alternatives:
  - will perish
  - will be cut off
  - will be destroyed
  lexicon: HALOT
  rationale: Nifal of דמם can mean 'be silent, be still,' and in judgment contexts
    can imply being stilled in death. 'Will be silenced' preserves the lexical image
    while allowing the deathly force to be heard from context. Because some translations
    render the result more explicitly ('perish'), that alternative is preserved in
    a footnote.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard prophetic temporal expression. 'On that day' is natural modern
    English.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Prophetic messenger formula. 'Declares the LORD' is a clear, contemporary
    rendering. Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh' in
    the main text.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's stated default for the divine name, preserving
    the convention reflected in Jewish reverence practice and the Septuagintal pattern.
