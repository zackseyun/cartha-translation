theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH. No contextual factor here requires deviation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to make the death sense of יִדַּמּוּ explicit
  chosen_reading: will be silenced
  alternative_readings:
  - will perish
  - will be cut off
  rationale: The Hebrew verb retains the imagery of being stilled/silenced, while
    the context of battle judgment implies death. Preserving the lexical tension fits
    the doctrine's principle of not resolving ambiguity beyond what the source warrants;
    the more explicit death-oriented alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
