id: JER.50.31
reference: Jeremiah 50:31
source:
  edition: WLC
  text: הִנְ/נִ֤י אֵלֶ֨י/ךָ֙ זָד֔וֹן נְאֻם אֲדֹנָ֥/י יְהוִ֖ה צְבָא֑וֹת כִּ֛י בָּ֥א יוֹמְ/ךָ֖ עֵ֥ת פְּקַדְתִּֽי/ךָ־׃
translation:
  text: Behold, I am against you, O arrogant one, declares the Lord GOD of hosts, for your day has come, the time when I will punish you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'O proud one' or 'O insolent one.' The Hebrew זָדוֹן names Babylon by its arrogance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the time I visited you'; here 'visited' carries the sense of calling to account in judgment, hence 'punish you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: Introduces a solemn divine announcement. 'Behold' preserves the prophetic force and gravity better than a flatter modern discourse marker.
- source_word: אֵלֶיךָ
  chosen: against you
  alternatives:
  - to you
  lexicon: HALOT
  rationale: With הִנְנִי in judgment contexts, the idiom means hostile opposition, not mere direction. 'Against you' is the natural English equivalent.
- source_word: זָדוֹן
  chosen: arrogant one
  alternatives:
  - proud one
  - insolent one
  - presumptuous one
  lexicon: HALOT
  rationale: The noun denotes arrogance/presumption and here functions as a vocative for Babylon personified. 'Arrogant one' communicates the moral quality clearly in modern English. 'Proud one' is possible and traditional, but 'arrogant' better captures culpable insolence.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' is idiomatic modern English and preserves the authoritative speech-act without archaic stiffness.
- source_word: אֲדֹנָי יְהוִה צְבָאוֹת
  chosen: the Lord GOD of hosts
  alternatives:
  - the Lord GOD Almighty
  - the Lord, the LORD of hosts
  lexicon: HALOT
  rationale: אֲדֹנָי יְהוִה is conventionally rendered 'Lord GOD' to avoid 'Lord LORD'; צְבָאוֹת is best translated, not transliterated, as 'of hosts.' Per doctrine, יְהוָה is rendered 'the LORD'; in this compound title English convention yields 'GOD' to signal the divine name.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the judgment announcement. 'For' fits the prophetic cadence and links the clauses clearly.
- source_word: בָּא יוֹמְךָ
  chosen: your day has come
  alternatives:
  - your day is coming
  - your day has arrived
  lexicon: HALOT
  rationale: The perfect verb presents the appointed day as having arrived with certainty. 'Has come' preserves the completed aspect and prophetic immediacy.
- source_word: עֵת
  chosen: the time
  alternatives:
  - the appointed time
  - the moment
  lexicon: HALOT
  rationale: Marks the specific occasion of reckoning. 'The time' is concise and natural; the notion of appointment is already implied by context.
- source_word: פְּקַדְתִּיךָ
  chosen: when I will punish you
  alternatives:
  - when I visit you
  - when I attend to you
  - when I call you to account
  lexicon: HALOT
  rationale: פקד in judgment contexts commonly means to punish or call to account. 'Punish you' makes the judicial sense explicit in English. A more literal 'visit you' would be misleading without explanation.
