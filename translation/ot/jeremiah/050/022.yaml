id: JER.50.22
reference: Jeremiah 50:22
source:
  edition: WLC
  text: ק֥וֹל מִלְחָמָ֖ה בָּ/אָ֑רֶץ וְ/שֶׁ֖בֶר גָּדֽוֹל׃
translation:
  text: The sound of war is in the land, and great destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A sound of war in the land, and a great crash.' The Hebrew noun שֶׁבֶר
      can carry the sense of 'breaking,' 'crash,' or 'ruin,' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: קוֹל
  chosen: The sound of
  alternatives:
  - A sound of
  - The noise of
  - The voice of
  lexicon: HALOT
  rationale: קוֹל commonly denotes sound, noise, or voice. In this context of battle,
    'sound of' is the most natural English rendering, conveying an audible report
    without personifying it as 'voice.' The definite article is not explicit in Hebrew,
    but English idiom favors 'The sound of war' in this verbless exclamatory clause.
- source_word: מִלְחָמָה
  chosen: war
  alternatives:
  - battle
  - warfare
  lexicon: HALOT
  rationale: מִלְחָמָה broadly means war or battle. 'War' best matches the general,
    large-scale sense here and pairs naturally with the following devastation.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the earth
  - in the country
  lexicon: HALOT
  rationale: אֶרֶץ can mean land, earth, or country. In Jeremiah's oracle against
    Babylon, the reference is to a territorial realm rather than the whole globe,
    so 'in the land' is the most contextually appropriate and idiomatic rendering.
- source_word: וְשֶׁבֶר
  chosen: and great destruction
  alternatives:
  - and a great crash
  - and great ruin
  - and a great breaking
  lexicon: HALOT
  rationale: שֶׁבֶר literally relates to breaking or fracture, but in prophetic judgment
    contexts it often denotes ruin or destruction. Rendering the phrase as 'and great
    destruction' communicates the result of war in clear modern English while preserving
    the severity of the Hebrew.
- source_word: גָּדוֹל
  chosen: great
  alternatives:
  - mighty
  - vast
  lexicon: HALOT
  rationale: גָּדוֹל straightforwardly means great/large. 'Great' is the most direct
    and idiomatic modifier for 'destruction' here.
