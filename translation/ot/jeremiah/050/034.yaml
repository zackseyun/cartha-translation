id: JER.50.34
reference: Jeremiah 50:34
source:
  edition: WLC
  text: גֹּאֲלָ֣/ם חָזָ֗ק יְהוָ֤ה צְבָאוֹת֙ שְׁמ֔/וֹ רִ֥יב יָרִ֖יב אֶת רִיבָ֑/ם לְמַ֨עַן֙ הִרְגִּ֣יעַ אֶת הָ/אָ֔רֶץ וְ/הִרְגִּ֖יז לְ/יֹשְׁבֵ֥י בָבֶֽל׀־־׃
translation:
  text: Their Redeemer is strong; Yahweh of Armies is his name. He will surely plead their case, so that he may give rest to the earth and bring unrest to the inhabitants of Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their kinsman-redeemer is strong.' The Hebrew term carries familial-legal overtones of one who redeems or vindicates a relative.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''the LORD of Hosts.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'He will surely contend for their cause.' The Hebrew uses a legal-dispute term repeated for emphasis.
    reason: lexical_alternative
  - marker: d
    text: '''The earth'' may also be rendered ''the land.'''
    reason: alternative_reading
lexical_decisions:
- source_word: גֹּאֲלָם
  chosen: their Redeemer
  alternatives:
  - their kinsman-redeemer
  - the one who redeems them
  lexicon: HALOT
  rationale: גאל denotes one who acts as redeemer/deliverer, often with familial-legal overtones. 'Redeemer' is concise and natural in English while preserving the covenantal/legal sense. 'Kinsman-redeemer' is more specific than the immediate context requires, so it is preserved as an alternative rather than used in the main text.
- source_word: חָזָק
  chosen: strong
  alternatives:
  - mighty
  lexicon: HALOT
  rationale: The adjective straightforwardly describes strength or might. 'Strong' is the plain sense and reads naturally with 'Redeemer'; 'mighty' is possible but slightly more elevated and less direct.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of Hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than left in traditional form; 'Armies' communicates the concrete military sense more transparently to modern readers than 'Hosts,' while preserving the divine-warrior title.
- source_word: שְׁמוֹ
  chosen: is his name
  alternatives:
  - is the name by which he is called
  lexicon: HALOT
  rationale: A conventional Hebrew naming formula. 'Is his name' is idiomatic and sufficiently formal without expansion.
- source_word: רִיב יָרִיב אֶת רִיבָם
  chosen: He will surely plead their case
  alternatives:
  - he will surely contend for their cause
  - he will surely prosecute their lawsuit
  lexicon: HALOT
  rationale: 'The infinitive absolute plus finite verb intensifies the action: ''surely'' captures the emphasis. The noun and verb from ריב evoke legal contention. ''Plead their case'' preserves the juridical sense in accessible English; ''contend for their cause'' is also possible but slightly less explicitly forensic.'
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Marks purpose/result. 'So that' is natural modern English and adequately reflects the clause linkage.
- source_word: הִרְגִּיעַ אֶת הָאָרֶץ
  chosen: give rest to the earth
  alternatives:
  - bring quiet to the land
  - give tranquility to the earth
  lexicon: HALOT
  rationale: The Hiphil of רגע here conveys causing quiet/rest. 'Give rest' is idiomatic and preserves the causative sense. הָאָרֶץ can mean 'earth' or 'land'; here the contrast with Babylon's inhabitants suggests a broader scope, so 'earth' is preferred.
- source_word: וְהִרְגִּיז
  chosen: bring agitation
  alternatives:
  - disturb
  - make tremble
  - bring unrest
  lexicon: HALOT
  rationale: The verb means to cause trembling, disturbance, or agitation. Because the previous clause speaks of giving rest, 'bring agitation' preserves the rhetorical contrast. 'Disturb' is possible but weaker; 'make tremble' may over-specify the physical nuance.
- source_word: לְיֹשְׁבֵי בָבֶל
  chosen: to the inhabitants of Babylon
  alternatives:
  - upon those who dwell in Babylon
  - to Babylon's residents
  lexicon: HALOT
  rationale: A standard expression for those living in a place. 'Inhabitants of Babylon' is clear, formal enough for prophetic discourse, and preserves the collective sense.
