theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Scope of הָאָרֶץ
  chosen_reading: the earth
  alternative_readings:
  - the land
  rationale: Both are lexically possible. In this judgment oracle, the contrast between rest for the earth and turmoil for Babylon's inhabitants favors the broader 'earth,' highlighting the universal relief effected by Babylon's downfall without importing claims beyond the text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
