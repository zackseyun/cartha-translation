id: JER.50.4
reference: Jeremiah 50:4
source:
  edition: WLC
  text: בַּ/יָּמִ֨ים הָ/הֵ֜מָּה וּ/בָ/עֵ֤ת הַ/הִיא֙ נְאֻם יְהוָ֔ה יָבֹ֧אוּ בְנֵֽי
    יִשְׂרָאֵ֛ל הֵ֥מָּה וּ/בְנֵֽי יְהוּדָ֖ה יַחְדָּ֑ו הָל֤וֹךְ וּ/בָכוֹ֙ יֵלֵ֔כוּ
    וְ/אֶת יְהוָ֥ה אֱלֹהֵי/הֶ֖ם יְבַקֵּֽשׁוּ־־־־׃
translation:
  text: In those days and at that time, declares the LORD, the children of Israel
    will come, they and the children of Judah together. Going and weeping, they will
    go, and they will seek the LORD their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people of Israel ... and the people of Judah together.' The Hebrew
      literally says 'the children of Israel' and 'the children of Judah.'
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew repeats the idea of going: literally, ''going and weeping, they
      will go,'' expressing ongoing movement accompanied by tears.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵמָּה
  chosen: In those days
  alternatives:
  - In those days then
  lexicon: HALOT
  rationale: Standard prophetic temporal formula; 'In those days' is natural English
    and preserves the eschatological/restorative framing without adding interpretation.
- source_word: וּבָעֵת הַהִיא
  chosen: and at that time
  alternatives:
  - even at that time
  lexicon: HALOT
  rationale: Kept coordinate with the prior phrase to reflect the Hebrew double time
    expression rather than collapsing it into a single English phrase.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Idiomatic prophetic speech formula in modern English. 'The LORD' follows
    the project default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Required by doctrine table: render the divine name as ''the LORD'' rather
    than transliteration.'
- source_word: יָבֹאוּ
  chosen: will come
  alternatives:
  - will arrive
  lexicon: HALOT
  rationale: Simple future sense fits the restoration context. 'Come' is broad enough
    to leave destination implicit, as in the Hebrew.
- source_word: בְנֵי יִשְׂרָאֵל
  chosen: the children of Israel
  alternatives:
  - the people of Israel
  - the sons of Israel
  lexicon: HALOT
  rationale: Retains the familial/corporate idiom of בְנֵי while remaining readable.
    'Sons' would be more formal but less natural here; 'people' would flatten the
    Hebrew imagery.
- source_word: הֵמָּה וּבְנֵי יְהוּדָה
  chosen: they and the children of Judah
  alternatives:
  - they, along with the children of Judah
  - they and the people of Judah
  lexicon: HALOT
  rationale: The pronoun הֵמָּה is emphatic/resumptive; preserving 'they' reflects
    the Hebrew structure and emphasis before adding Judah.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - as one
  lexicon: HALOT
  rationale: Straightforward adverb indicating reunification of Israel and Judah;
    'together' is the clearest rendering.
- source_word: הָלוֹךְ וּבָכוֹ יֵלֵכוּ
  chosen: Going and weeping, they will go
  alternatives:
  - They will go along weeping
  - They will come weeping as they go
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb conveys durative/intensive movement.
    This rendering preserves the Hebrew repetition of 'go' and the accompanying weeping,
    avoiding over-paraphrase.
- source_word: וְאֶת יְהוָה אֱלֹהֵיהֶם יְבַקֵּשׁוּ
  chosen: and they will seek the LORD their God
  alternatives:
  - and they will seek after the LORD their God
  lexicon: HALOT
  rationale: בקשׁ in the Piel commonly means 'seek' in the sense of turning to or
    pursuing. 'Seek' is concise and preserves the covenantal-religious force.
