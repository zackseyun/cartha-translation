theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Corporate restoration of Israel and Judah
  chosen_reading: Preserved explicitly as 'the children of Israel ... and the children
    of Judah together'
  alternative_readings:
  - Generalized as 'all Israel'
  - Interpreted ecclesiologically
  rationale: The verse names both groups distinctly and emphasizes their reunification.
    The translation preserves that historical-covenantal tension without importing
    later theological systems.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
