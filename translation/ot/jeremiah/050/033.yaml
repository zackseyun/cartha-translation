theological_decisions:
- issue: Rendering of the divine name יְהוָה in the prophetic formula
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render YHWH as 'the LORD,' following Jewish
    reverence tradition and longstanding English convention while preserving covenantal
    force.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render בְּנֵי literally or idiomatically
  chosen_reading: The sons of Israel ... and the sons of Judah
  alternative_readings:
  - The people of Israel ... and the people of Judah
  - The Israelites and the Judeans
  rationale: The Hebrew is grammatically masculine plural and refers to the covenant
    people groups. Per the gender-accurate policy, the filial expression is preserved
    rather than neutralized, since it is not merely an abstract national label.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
