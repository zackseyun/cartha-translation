id: JER.50.33
reference: Jeremiah 50:33
source:
  edition: WLC
  text: כֹּ֤ה אָמַר֙ יְהוָ֣ה צְבָא֔וֹת עֲשׁוּקִ֛ים בְּנֵי יִשְׂרָאֵ֥ל וּ/בְנֵי יְהוּדָ֖ה
    יַחְדָּ֑ו וְ/כָל שֹֽׁבֵי/הֶם֙ הֶחֱזִ֣יקוּ בָ֔/ם מֵאֲנ֖וּ שַׁלְּחָֽ/ם־־־׃
translation:
  text: 'Thus says the LORD of hosts: The sons of Israel are oppressed, and the sons
    of Judah together with them; all their captors hold them fast; they refuse to
    let them go.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The Israelites and the people of Judah alike are oppressed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is what
  lexicon: HALOT
  rationale: Standard prophetic discourse marker introducing a divine declaration;
    'Thus' preserves the formal tone without sounding archaic in context.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the established and semantically
    broad rendering, encompassing heavenly and earthly armies.
- source_word: עֲשׁוּקִים
  chosen: are oppressed
  alternatives:
  - are oppressed ones
  - are being oppressed
  lexicon: HALOT
  rationale: Passive participle describing the present condition of Israel and Judah.
    'Are oppressed' is natural English and preserves the stative/passive sense.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: The sons of Israel
  alternatives:
  - The people of Israel
  - The Israelites
  lexicon: HALOT
  rationale: Retains the literal filial expression בְּנֵי in line with the gender-accurate
    policy. 'Israelites' is possible but less transparent to the Hebrew form.
- source_word: וּבְנֵי יְהוּדָה
  chosen: and the sons of Judah
  alternatives:
  - and the people of Judah
  - and Judah
  lexicon: HALOT
  rationale: Matches the parallel structure with 'the sons of Israel' and preserves
    the explicit mention of Judah's people rather than the territory alone.
- source_word: יַחְדָּו
  chosen: together with them
  alternatives:
  - together
  - alike
  lexicon: HALOT
  rationale: The adverb marks the shared condition of Israel and Judah. 'Together
    with them' makes the relation explicit in idiomatic English.
- source_word: שֹׁבֵיהֶם
  chosen: their captors
  alternatives:
  - those who took them captive
  - their conquerors
  lexicon: HALOT
  rationale: Active participial noun from שׁבה refers specifically to those who carried
    them off into captivity. 'Captors' is concise and accurate.
- source_word: הֶחֱזִיקוּ בָם
  chosen: hold them fast
  alternatives:
  - have seized them tightly
  - hold on to them
  lexicon: HALOT
  rationale: The idiom conveys firm retention or restraint, not merely physical touching.
    'Hold them fast' captures the force and remains readable.
- source_word: מֵאֲנוּ
  chosen: they refuse
  alternatives:
  - they have refused
  lexicon: HALOT
  rationale: The perfect can be rendered as a present state in English in this prophetic
    description; 'they refuse' fits the ongoing sense.
- source_word: שַׁלְּחָם
  chosen: to let them go
  alternatives:
  - to send them away
  - to release them
  lexicon: HALOT
  rationale: In captivity context, the idiom means releasing captives. 'Let them go'
    is natural and preserves the sense without over-paraphrase.
