id: JER.50.38
reference: Jeremiah 50:38
source:
  edition: WLC
  text: חֹ֥רֶב אֶל מֵימֶ֖י/הָ וְ/יָבֵ֑שׁוּ כִּ֣י אֶ֤רֶץ פְּסִלִים֙ הִ֔יא וּ/בָ/אֵימִ֖ים
    יִתְהֹלָֽלוּ־׃
translation:
  text: A sword is against her waters, and they will dry up, for it is a land of carved
    idols, and they rave over terrifying things.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'A drought is against her waters, and they will dry up.' The Hebrew
      חֹרֶב can mean 'sword' or 'drought/dryness,' and the verse may intentionally
      echo both ideas.
    reason: alternative_reading
  - marker: b
    text: Or, 'they act mad over terrors' / 'they rave over dreadful idols.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹרֶב
  chosen: A sword
  alternatives:
  - Drought
  - Dryness
  lexicon: HALOT
  rationale: Although חֹרֶב can denote 'drought/dryness,' in prophetic judgment formulas
    it can also function as 'sword.' Here the collocation 'against her waters, and
    they will dry up' creates a wordplay either way. The traditional and contextually
    strong sense in Jeremiah's oracles is 'sword,' while the following verb 'they
    will dry up' preserves the effect on the waters. The ambiguity is worth preserving
    in a footnote.
- source_word: אֶל
  chosen: against
  alternatives:
  - to
  - upon
  lexicon: HALOT
  rationale: With a judgment noun like חֹרֶב, אֶל is best rendered idiomatically as
    'against' in English.
- source_word: מֵימֶיהָ
  chosen: her waters
  alternatives:
  - its waters
  lexicon: HALOT
  rationale: The suffix is feminine singular, agreeing with Babylon/city/land personified
    as feminine. 'Her waters' preserves the personification more closely than 'its
    waters.'
- source_word: וְיָבֵשׁוּ
  chosen: and they will dry up
  alternatives:
  - and they will be dried up
  lexicon: HALOT
  rationale: 'The Qal imperfect is naturally intransitive here with ''waters'' as
    subject: ''they will dry up.'''
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the judgment; 'for' is concise and natural.
- source_word: אֶרֶץ פְּסִלִים
  chosen: a land of carved idols
  alternatives:
  - a land of graven images
  - a land of idols
  lexicon: HALOT
  rationale: פְּסִלִים specifically refers to carved images/idols. 'Carved idols'
    preserves the concrete sense without archaic 'graven images.'
- source_word: הִיא
  chosen: it is
  alternatives:
  - she is
  lexicon: HALOT
  rationale: Although the antecedent is grammatically feminine, English idiom with
    'land' prefers 'it is' in predication.
- source_word: וּבָאֵימִים
  chosen: over terrifying things
  alternatives:
  - over terrors
  - over dreadful idols
  lexicon: HALOT
  rationale: אֵימִים literally means 'terrors/terrifying things.' In context it may
    refer either generally to frightful objects or specifically to fearsome idols.
    'Terrifying things' preserves the lexical sense while leaving the referent somewhat
    open.
- source_word: יִתְהֹלָלוּ
  chosen: they rave
  alternatives:
  - they act mad
  - they boast themselves
  - they are insane
  lexicon: HALOT
  rationale: The Hitpolel/Hitpael form from הלל/הולל here conveys irrational, frenzied
    behavior. 'They rave' is vivid modern English and fits the idolatry context better
    than the more ambiguous 'boast.'
