theological_decisions:
- issue: Interpretation of חֹרֶב in relation to the waters
  chosen_reading: Rendered as 'A sword is against her waters' in the main text, while
    preserving 'drought' as an alternative.
  alternative_readings:
  - A drought is against her waters
  rationale: The Hebrew permits a reading that plays on both 'sword' and 'drought/dryness.'
    Given Jeremiah's repeated judgment formula 'sword against...' and the consonantal
    form, the main text keeps 'sword,' but the immediate mention of waters drying
    up makes 'drought' a meaningful alternative worth preserving.
  doctrine_reference: Translation philosophy §3 (preserve theological/interpretive
    tension where genuine ambiguity exists)
