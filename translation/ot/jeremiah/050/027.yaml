theological_decisions:
- issue: Rendering of judgment term פְּקֻדָּה
  chosen_reading: punishment
  alternative_readings:
  - visitation
  - reckoning
  rationale: The verse announces divine judgment on Babylon. To preserve meaning in
    readable modern English, the punitive nuance is made explicit in the main text.
    This does not add doctrine beyond the context; it clarifies a standard prophetic
    use of the noun.
  doctrine_reference: Translation philosophy §6; Preserve theological tension where
    genuine ambiguity exists, but favor plain contextual sense.
