id: JER.50.27
reference: Jeremiah 50:27
source:
  edition: WLC
  text: חִרְבוּ֙ כָּל פָּרֶ֔י/הָ יֵרְד֖וּ לַ/טָּ֑בַח ה֣וֹי עֲלֵי/הֶ֔ם כִּֽי בָ֥א יוֹמָ֖/ם
    עֵ֥ת פְּקֻדָּתָֽ/ם־־׃ס
translation:
  text: Slay all her bulls; let them go down to the slaughter. Woe to them, for their
    day has come, the time of their punishment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the time of their visitation.' The Hebrew term can denote a visitation
      for judgment, oversight, or reckoning; here it refers to punitive judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: חִרְבוּ
  chosen: Slay
  alternatives:
  - Destroy
  - Put to the sword
  lexicon: HALOT
  rationale: From חרב in the Hiphil/causative verbal form, here functioning as an
    imperative addressed to attackers. In context of judgment and the following 'go
    down to the slaughter,' an explicit violent rendering is warranted. 'Slay' is
    concise and natural English; 'put to the sword' is possible but more interpretive
    and idiomatic.
- source_word: כָּל
  chosen: all
  lexicon: HALOT
  rationale: Standard distributive sense, modifying 'her bulls.'
- source_word: פָּרֶיהָ
  chosen: her bulls
  alternatives:
  - her young bulls
  - her strong ones
  lexicon: HALOT
  rationale: The noun literally denotes young bulls/bullocks. In prophetic metaphor
    for Babylon's warriors or nobles, the animal image should be preserved in translation
    rather than replaced with the interpretation. 'Bulls' is smoother than 'young
    bulls' in English while retaining the metaphor; the figurative sense is left for
    readers or notes.
- source_word: יֵרְדוּ לַטָּבַח
  chosen: let them go down to the slaughter
  alternatives:
  - let them descend to the slaughter
  - they will go down to the slaughter
  lexicon: HALOT
  rationale: 'ירד means ''go down/descend''; טבח is ''slaughter, slaughtering.'' The
    sequence after the opening imperative is best taken as a jussive: ''let them go
    down.'' This preserves the force of the judgment oracle and the vivid movement
    toward death.'
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Alas
  lexicon: HALOT
  rationale: Standard prophetic interjection of lament/judgment. 'Woe' best preserves
    the solemn prophetic register.
- source_word: עֲלֵיהֶם
  chosen: to them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: With הוי, English idiom favors 'woe to them.' 'Upon them' is more literal
    but less natural here.
- source_word: כִּי בָא יוֹמָם
  chosen: for their day has come
  alternatives:
  - for their day is coming
  - for the day belonging to them has come
  lexicon: HALOT
  rationale: The perfect בָא presents the day as arrived. 'Their day' is a common
    idiom for the appointed day of doom/judgment.
- source_word: עֵת פְּקֻדָּתָם
  chosen: the time of their punishment
  alternatives:
  - the time of their visitation
  - the time of their reckoning
  lexicon: HALOT
  rationale: פְּקֻדָּה can mean visitation, oversight, or punishment in judgment contexts.
    Here, in an oracle against Babylon and parallel to 'their day has come,' the punitive
    sense is clearest in contemporary English. 'Visitation' is more formal and traditional
    but potentially opaque, so it is preserved in a footnote.
