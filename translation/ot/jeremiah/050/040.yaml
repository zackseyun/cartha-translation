id: JER.50.40
reference: Jeremiah 50:40
source:
  edition: WLC
  text: כְּ/מַהְפֵּכַ֨ת אֱלֹהִ֜ים אֶת סְדֹ֧ם וְ/אֶת עֲמֹרָ֛ה וְ/אֶת שְׁכֵנֶ֖י/הָ נְאֻם
    יְהוָ֑ה לֹֽא יֵשֵׁ֥ב שָׁם֙ אִ֔ישׁ וְ/לֹֽא יָג֥וּר בָּ֖/הּ בֶּן אָדָֽם־־־־־־־׃
translation:
  text: As when God overthrew Sodom and Gomorrah and their neighboring towns, declares
    the LORD, no man will live there, and no son of man will dwell in her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''her neighbors''; that is, the neighboring towns or settlements
      associated with Sodom and Gomorrah.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''no human being will dwell in her.'' Hebrew: ''no son of man will dwell
      in her.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּ/מַהְפֵּכַת
  chosen: As when ... overthrew
  alternatives:
  - Like the overthrow of
  - As in the overthrow of
  lexicon: HALOT
  rationale: The prefixed כ marks comparison ('as/like'), and מַהְפֵּכָה denotes an
    overthrow/catastrophic overturning. Rendering the phrase idiomatically as 'As
    when ... overthrew' preserves the simile while producing natural English.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here אֱלֹהִים refers to the one true God as the subject of the overthrow
    of Sodom and Gomorrah, so 'God' is the plain and natural rendering.
- source_word: שְׁכֵנֶיהָ
  chosen: their neighboring towns
  alternatives:
  - her neighbors
  - its neighboring places
  lexicon: HALOT
  rationale: The plural construct with 3fs suffix literally means 'her neighbors.'
    In context, with Sodom and Gomorrah as exemplars of a regional judgment, the referent
    is neighboring settlements/cities. 'Their neighboring towns' makes the sense explicit
    in idiomatic English while reflecting the collective reference.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is a standard prophetic formula. 'Declares the LORD' is both idiomatic
    and weighty, and follows the doctrinal default of rendering יְהוָה as 'the LORD'.
- source_word: יֵשֵׁב
  chosen: will live
  alternatives:
  - will sit
  - will dwell
  - will inhabit
  lexicon: HALOT
  rationale: Although the verb basically means 'sit/dwell,' in desolation formulas
    it commonly means to inhabit or live in a place. 'Will live there' is natural
    English and fits the parallel with the following colon.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - anyone
  - a person
  lexicon: HALOT
  rationale: The Hebrew is singular masculine and representative. Per translation
    philosophy, gender-accurate rendering is preferred where the source uses masculine
    generic language; thus 'man' is retained rather than neutralizing to 'anyone.'
- source_word: יָגוּר
  chosen: will dwell
  alternatives:
  - will sojourn
  - will reside
  lexicon: HALOT
  rationale: גור can mean sojourn or reside. In this judgment context, the point is
    that no human will remain or reside there. 'Will dwell' gives a clear English
    parallel to the previous clause without overemphasizing temporary residence.
- source_word: בֶּן אָדָם
  chosen: son of man
  alternatives:
  - human being
  - mortal
  lexicon: HALOT
  rationale: The phrase literally means 'son of man' and here functions as a poetic
    parallel to אִישׁ. Per the gender-accurate policy, the literal form is preserved
    rather than flattened to a neutral expression.
