id: JER.50.36
reference: Jeremiah 50:36
source:
  edition: WLC
  text: חֶ֥רֶב אֶל הַ/בַּדִּ֖ים וְ/נֹאָ֑לוּ חֶ֥רֶב אֶל גִּבּוֹרֶ֖י/הָ וָ/חָֽתּוּ־־׃
translation:
  text: A sword is against the diviners, and they will become fools; a sword is against
    her warriors, and they will be shattered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the liars.' The Hebrew בַּדִּים can refer more broadly to false talkers
      or deceivers; here 'diviners' is chosen because Jeremiah often targets Babylon's
      deceptive prognosticators.
    reason: lexical_alternative
  - marker: b
    text: Or 'they will be dismayed.' The Hebrew verb can denote terror or collapse
      as well as being shattered.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶרֶב
  chosen: A sword is against
  alternatives:
  - The sword is against
  - A sword against
  lexicon: HALOT
  rationale: חרב literally means 'sword.' In prophetic judgment oracles, the noun
    can function elliptically as an announcement of violent judgment ('a sword against...').
    Supplying 'is' yields natural English while preserving the terse force of the
    Hebrew.
- source_word: אֶל
  chosen: against
  alternatives:
  - to
  - upon
  lexicon: HALOT
  rationale: The preposition here marks hostile direction in a judgment formula; 'against'
    best conveys the adversative sense in English.
- source_word: הַבַּדִּים
  chosen: the diviners
  alternatives:
  - the liars
  - the boasters
  - the oracle-priests
  lexicon: HALOT
  rationale: בַּדִּים can denote false talkers/liars, but in Jeremiah it commonly
    refers to deceptive diviners or false prognosticators (cf. Jeremiah's polemic
    against false prophecy/divination). 'Diviners' best fits the Babylon context and
    the parallel denunciation of classes within the city.
- source_word: וְנֹאָלוּ
  chosen: and they will become fools
  alternatives:
  - and they will act foolishly
  - and they will be shown to be fools
  lexicon: HALOT
  rationale: From יאל/נאל in the Niphal, conveying becoming foolish or being made
    foolish. 'Will become fools' preserves the resultative sense and the prophetic
    irony directed at Babylon's wise men.
- source_word: גִּבּוֹרֶיהָ
  chosen: her warriors
  alternatives:
  - her mighty men
  - her heroes
  lexicon: HALOT
  rationale: גִּבּוֹר often means mighty man, warrior, or hero. In this military judgment
    context, 'warriors' is the clearest modern rendering.
- source_word: וָחָתּוּ
  chosen: and they will be shattered
  alternatives:
  - and they will be dismayed
  - and they will be broken down
  lexicon: HALOT
  rationale: חתת can mean to be shattered, broken, or dismayed. Given the sword-judgment
    context and the parallel with military defeat, 'shattered' preserves both psychological
    collapse and destructive force.
