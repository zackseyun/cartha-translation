id: JER.50.16
reference: Jeremiah 50:16
source:
  edition: WLC
  text: כִּרְת֤וּ זוֹרֵ֨עַ֙ מִ/בָּבֶ֔ל וְ/תֹפֵ֥שׂ מַגָּ֖ל בְּ/עֵ֣ת קָצִ֑יר מִ/פְּנֵי֙
    חֶ֣רֶב הַ/יּוֹנָ֔ה אִ֤ישׁ אֶל עַמּ/וֹ֙ יִפְנ֔וּ וְ/אִ֥ישׁ לְ/אַרְצ֖/וֹ יָנֻֽסוּ־׃ס
translation:
  text: Cut off from Babylon the sower, and the one who handles the sickle at the
    time of harvest. Because of the oppressor’s sword, each man will turn to his own
    people, and each will flee to his own land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the sword of the oppressing one.” The Hebrew expression has also been
      taken by some as “the cruel sword,” and less likely, more literally, “the sword
      of the dove.”
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּרְתוּ
  chosen: Cut off
  alternatives:
  - Destroy
  - Cut down
  lexicon: HALOT
  rationale: Qal imperative plural of כרת in a judgment context commonly means to
    cut off/remove. 'Cut off' preserves the force of eliminating persons from Babylon
    without over-specifying the means.
- source_word: זוֹרֵעַ
  chosen: the sower
  alternatives:
  - the one who sows
  - seed-sower
  lexicon: HALOT
  rationale: Participle used substantivally; 'the sower' is natural English and keeps
    the occupational sense.
- source_word: מִבָּבֶל
  chosen: from Babylon
  alternatives:
  - out of Babylon
  lexicon: HALOT
  rationale: The preposition מן with כרת marks removal from Babylon; 'from Babylon'
    is the most direct rendering.
- source_word: וְתֹפֵשׂ מַגָּל
  chosen: the one who handles the sickle
  alternatives:
  - the reaper with the sickle
  - the one who grasps the sickle
  lexicon: HALOT
  rationale: תפשׂ means seize/handle; with sickle and harvest context it refers to
    a reaper. 'Handles the sickle' stays closer to the Hebrew wording while remaining
    clear.
- source_word: בְּעֵת קָצִיר
  chosen: at the time of harvest
  alternatives:
  - in harvest time
  - at harvest
  lexicon: HALOT
  rationale: A straightforward temporal phrase; 'at the time of harvest' is slightly
    fuller and clear in modern English.
- source_word: מִפְּנֵי
  chosen: Because of
  alternatives:
  - From before
  - because of the presence of
  lexicon: HALOT
  rationale: In this causal context, מפני introduces the reason for flight. 'Because
    of' communicates the idiomatic force better than a wooden spatial rendering.
- source_word: חֶרֶב הַיּוֹנָה
  chosen: the oppressor’s sword
  alternatives:
  - the sword of the oppressing one
  - the sword of the dove
  - the cruel sword
  lexicon: HALOT
  rationale: יונה here is best taken from the verbal root ינה/יון in the sense of
    oppressing, not the noun 'dove.' The phrase denotes the sword wielded by the oppressor/invader.
    'Oppressor’s sword' is concise and contextually fitting in an oracle against Babylon.
- source_word: אִישׁ אֶל עַמּוֹ
  chosen: each man will turn to his own people
  alternatives:
  - every man to his people will turn
  - each one will turn to his own people
  lexicon: HALOT
  rationale: איש distributively means each/every man. Per translation philosophy,
    the masculine form is retained as gender-accurate while functioning representatively.
- source_word: יִפְנוּ
  chosen: will turn
  alternatives:
  - will turn back
  - will face
  lexicon: HALOT
  rationale: The verb פנה here indicates turning back toward one's people/homeland
    in retreat.
- source_word: וְאִישׁ לְאַרְצוֹ יָנֻסוּ
  chosen: and each will flee to his own land
  alternatives:
  - and every man will escape to his land
  - and each man will flee to his country
  lexicon: HALOT
  rationale: נוס is flee/escape. 'Land' is preferable to 'country' for biblical territorial
    reference and matches ארץ well.
