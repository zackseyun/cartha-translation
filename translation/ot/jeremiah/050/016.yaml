theological_decisions:
- issue: Rendering of אִישׁ in distributive statements
  chosen_reading: each man
  alternative_readings:
  - each one
  - everyone
  rationale: The Hebrew is grammatically masculine singular used distributively. Following
    the stated gender-accurate philosophy, the translation retains 'man' rather than
    neutralizing it, while the context clearly refers to individuals generally.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
