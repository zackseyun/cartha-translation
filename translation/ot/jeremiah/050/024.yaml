id: JER.50.24
reference: Jeremiah 50:24
source:
  edition: WLC
  text: יָקֹ֨שְׁתִּי לָ֤/ךְ וְ/גַם נִלְכַּדְתְּ֙ בָּבֶ֔ל וְ/אַ֖תְּ לֹ֣א יָדָ֑עַתְּ נִמְצֵאת֙ וְ/גַם נִתְפַּ֔שְׂתְּ כִּ֥י בַֽ/יהוָ֖ה הִתְגָּרִֽית־־׃
translation:
  text: I set a trap for you, and you also were caught, Babylon, and you did not know it; you were found and also seized, because you contended against Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I laid a snare for you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you were found and captured'; the two verbs intensify Babylon's downfall.
    reason: lexical_alternative
  - marker: c
    text: Or 'because you contended against the LORD.'
    reason: alternative_reading
lexical_decisions:
- source_word: יָקֹשְׁתִּי
  chosen: I set a trap
  alternatives:
  - I laid a snare
  - I ensnared
  lexicon: HALOT
  rationale: The verb from יקשׁ refers to laying a snare or trap. 'I set a trap' is natural modern English and preserves the concrete metaphor better than the more interpretive 'I ensnared.'
- source_word: לָךְ
  chosen: for you
  alternatives:
  - against you
  lexicon: HALOT
  rationale: The preposition with second feminine singular marks Babylon as the addressee. In English, 'for you' after 'set a trap' can sound odd, so the sense is carried idiomatically in 'I set a trap for you'; 'against you' is possible but slightly more interpretive.
- source_word: וְגַם
  chosen: and you also
  alternatives:
  - and indeed
  - and even
  lexicon: HALOT
  rationale: The particle גם adds emphasis. 'Also' preserves the additive force without overstating it.
- source_word: נִלְכַּדְתְּ
  chosen: were caught
  alternatives:
  - were captured
  - were trapped
  lexicon: HALOT
  rationale: The Niphal of לכד means to be captured/caught. 'Were caught' fits the trap imagery established by the previous verb and reads smoothly.
- source_word: בָּבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Standard English transliteration of the place/personified city name.
- source_word: לֹא יָדָעַתְּ
  chosen: you did not know it
  alternatives:
  - you did not know
  - you were unaware
  lexicon: HALOT
  rationale: The Hebrew lacks an explicit object, but English idiom benefits from supplying 'it' to refer to the trap/capture. This is a minimal implied object, not an added idea.
- source_word: נִמְצֵאת
  chosen: you were found
  alternatives:
  - you were discovered
  lexicon: HALOT
  rationale: The Niphal of מצא can mean 'be found' or 'be discovered.' 'Found' is slightly more literal; the context implies being located/exposed after not knowing.
- source_word: נִתְפַּשְׂתְּ
  chosen: seized
  alternatives:
  - captured
  - taken
  lexicon: HALOT
  rationale: The verb תפשׂ in the Niphal conveys being seized or taken hold of. 'Seized' gives a forceful progression after 'found' and avoids redundancy with the earlier 'caught.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here the conjunction introduces the reason for Babylon's capture. 'Because' is the clearest contemporary rendering.
- source_word: בַיהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The prefixed preposition is absorbed into the English verbal construction 'challenged the LORD.'
- source_word: הִתְגָּרִית
  chosen: you challenged
  alternatives:
  - you strove against
  - you contended against
  - you provoked
  lexicon: HALOT
  rationale: The Hitpael of גרה conveys stirring oneself up against, contending with, or challenging. 'Challenged' is concise, natural English that preserves the adversarial sense without importing emotional nuance like 'provoked.'
