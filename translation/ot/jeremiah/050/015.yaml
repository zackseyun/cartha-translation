theological_decisions:
- issue: Whether to render נָתְנָה יָדָהּ idiomatically as surrender or more literally
    as given her hand
  chosen_reading: Retain the literal 'she has given her hand' in the main text, with
    surrender as a lexical alternative.
  alternative_readings:
  - she has surrendered
  rationale: The idiom likely conveys capitulation, but the Hebrew expression is vivid
    and not fully transparent. Keeping the literal wording avoids over-resolving the
    image while allowing readers and auditors to see the underlying idiom.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: How to handle the uncertain noun אשויתיה
  chosen_reading: Render as 'buttresses' in the main text and preserve other plausible
    structural terms as alternatives.
  alternative_readings:
  - foundations
  - bulwarks
  - corner towers
  rationale: The term is lexically uncertain. The immediate parallel with 'her walls'
    and the siege setting favor a fortification-related sense. 'Buttresses' is a defensible
    middle option that does not flatten the uncertainty into a more specific architectural
    claim than the evidence warrants.
  doctrine_reference: Translation philosophy §1, §3, §5
