id: JER.50.15
reference: Jeremiah 50:15
source:
  edition: WLC
  text: הָרִ֨יעוּ עָלֶ֤י/הָ סָבִיב֙ נָתְנָ֣ה יָדָ֔/הּ נָֽפְלוּ֙ אשויתי/ה נֶהֶרְס֖וּ
    חֽוֹמוֹתֶ֑י/הָ כִּי֩ נִקְמַ֨ת יְהוָ֥ה הִיא֙ הִנָּ֣קְמוּ בָ֔/הּ כַּ/אֲשֶׁ֥ר עָשְׂתָ֖ה
    עֲשׂוּ לָֽ/הּ־׃
translation:
  text: Raise a shout against her all around; she has given her hand; her buttresses
    have fallen, her walls are torn down. For it is the vengeance of the LORD—take
    vengeance on her; as she has done, do to her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'she has surrendered.' Literally, 'she has given
      her hand.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term may refer to defensive structures such as buttresses, bulwarks,
      or foundations.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִיעוּ
  chosen: Raise a shout
  alternatives:
  - Shout
  - Give a battle cry
  - Raise a war cry
  lexicon: HALOT
  rationale: Hiphil imperative plural of רוע/ריע in a military context commonly denotes
    raising a shout or battle cry. 'Raise a shout' preserves the imperative force
    without over-specifying the exact kind of cry, while the surrounding siege language
    implies hostility.
- source_word: עָלֶיהָ סָבִיב
  chosen: against her all around
  alternatives:
  - over her all around
  - around her
  lexicon: HALOT
  rationale: עַל with hostile shouting in context is best rendered 'against her';
    סָבִיב adds the encircling sense of a siege, hence 'all around.'
- source_word: נָתְנָה יָדָהּ
  chosen: she has given her hand
  alternatives:
  - she has surrendered
  - she has stretched out her hand
  lexicon: HALOT
  rationale: The idiom literally reads 'given her hand.' In context it likely signals
    capitulation or submission, but the literal expression is retained in the main
    text for auditability, with the idiomatic sense preserved as an alternative.
- source_word: אשויתיה
  chosen: her buttresses
  alternatives:
  - her foundations
  - her bulwarks
  - her corner towers
  lexicon: HALOT
  rationale: The noun is difficult and relatively rare/uncertain. In this siege context,
    it most likely refers to structural supports or defensive works. 'Buttresses'
    fits the parallel with walls and fallen fortifications better than the broader
    'foundations,' while acknowledging lexical uncertainty.
- source_word: נֶהֶרְסוּ
  chosen: are torn down
  alternatives:
  - are demolished
  - are broken down
  lexicon: HALOT
  rationale: Niphal of הרס denotes being pulled down or demolished. 'Are torn down'
    is natural English and suits the image of breached city defenses.
- source_word: חוֹמוֹתֶיהָ
  chosen: her walls
  alternatives:
  - her city walls
  lexicon: HALOT
  rationale: Straightforward plural of חומה. 'Walls' is sufficient in context.
- source_word: נִקְמַת יְהוָה הִיא
  chosen: For it is the vengeance of the LORD
  alternatives:
  - For this is the LORD's vengeance
  - For it is the LORD's act of vengeance
  lexicon: HALOT
  rationale: The clause identifies the event as belonging to or constituting YHWH's
    vengeance. Because DOCTRINE specifies יְהוָה as 'the LORD,' that rendering is
    used.
- source_word: הִנָּקְמוּ בָהּ
  chosen: take vengeance on her
  alternatives:
  - avenge yourselves on her
  - exact vengeance on her
  lexicon: HALOT
  rationale: Niphal imperative plural from נקם here functions as a command to execute
    vengeance against Babylon. 'Take vengeance on her' is idiomatic and preserves
    the judicial-retributive sense.
- source_word: כַּאֲשֶׁר עָשְׂתָה עֲשׂוּ לָהּ
  chosen: as she has done, do to her
  alternatives:
  - just as she did, do to her
  - do to her according to what she has done
  lexicon: HALOT
  rationale: This is a concise lex talionis-style formulation. 'As she has done, do
    to her' preserves the terseness and reciprocity of the Hebrew.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per DOCTRINE.md, the default rendering of the divine name is 'the LORD,'
    following the stated house style.
