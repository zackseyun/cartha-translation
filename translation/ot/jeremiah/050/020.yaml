id: JER.50.20
reference: Jeremiah 50:20
source:
  edition: WLC
  text: בַּ/יָּמִ֣ים הָ/הֵם֩ וּ/בָ/עֵ֨ת הַ/הִ֜יא נְאֻם יְהוָ֗ה יְבֻקַּ֞שׁ אֶת עֲוֺ֤ן
    יִשְׂרָאֵל֙ וְ/אֵינֶ֔/נּוּ וְ/אֶת חַטֹּ֥את יְהוּדָ֖ה וְ/לֹ֣א תִמָּצֶ֑אינָה כִּ֥י
    אֶסְלַ֖ח לַ/אֲשֶׁ֥ר אַשְׁאִֽיר־־־׃
translation:
  text: In those days and at that time, declares the LORD, the guilt of Israel will
    be sought, but there will be none, and the sins of Judah, but they will not be
    found; for I will forgive those whom I leave as a remnant.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the iniquity of Israel will be sought, and there will be none.'
    reason: lexical_alternative
  - marker: b
    text: Or 'for I will forgive those whom I leave' or 'those whom I spare.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם וּבָעֵת הַהִיא
  chosen: In those days and at that time
  alternatives:
  - In those days, and in that time
  - In those days and in that season
  lexicon: HALOT
  rationale: A standard prophetic temporal formula. 'At that time' is idiomatic modern
    English and preserves the parallelism without sounding wooden.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: '''Declares the LORD'' is a natural rendering of the prophetic formula
    and preserves its solemn force. YHWH is rendered ''the LORD'' per doctrine guidance.'
- source_word: יְבֻקַּשׁ
  chosen: will be sought
  alternatives:
  - will be searched for
  - will be looked for
  lexicon: HALOT
  rationale: 'The passive sense is important: the iniquity is searched for by an implied
    agent and found absent. ''Sought'' is concise and idiomatic.'
- source_word: עֲוֺן
  chosen: guilt
  alternatives:
  - iniquity
  - punishment for iniquity
  lexicon: HALOT
  rationale: The noun can denote iniquity, guilt, or guilt-liability. Here the point
    is that Israel's culpability is no longer present because of divine forgiveness,
    so 'guilt' best captures the forensic sense in clear English.
- source_word: וְאֵינֶנּוּ
  chosen: but there will be none
  alternatives:
  - and it will not be there
  - and there is none
  lexicon: HALOT
  rationale: This renders the existential negation naturally in future-oriented English,
    matching the prophetic context and the passive 'will be sought.'
- source_word: חַטֹּאת
  chosen: sins
  alternatives:
  - sin
  - sin offerings
  lexicon: HALOT
  rationale: In this context the moral sense is clearly intended, not 'sin offering.'
    The plural sense fits the following feminine plural verb and the parallel with
    Israel's guilt.
- source_word: תִמָּצֶאינָה
  chosen: they will not be found
  alternatives:
  - they will not be discovered
  - they will not be present
  lexicon: HALOT
  rationale: A straightforward passive rendering that mirrors 'will be sought' and
    preserves the judicial/search imagery.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Introduces the reason the guilt and sins cannot be found: divine forgiveness.'
- source_word: אֶסְלַח
  chosen: I will forgive
  alternatives:
  - I will pardon
  lexicon: HALOT
  rationale: '''Forgive'' is the clearest modern equivalent and preserves the covenantal-theological
    force of divine pardon.'
- source_word: לַאֲשֶׁר אַשְׁאִיר
  chosen: those whom I leave as a remnant
  alternatives:
  - those whom I leave
  - the ones I spare
  - those I preserve
  lexicon: HALOT
  rationale: The verb means 'leave over, remain, spare.' In Jeremiah's restoration
    context, the idea of survivors/remnant is strongly present. 'Leave as a remnant'
    makes explicit the idiomatic force without over-paraphrasing.
