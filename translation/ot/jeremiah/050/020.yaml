theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH, aligning with Jewish reverence
    tradition and longstanding English Bible practice while remaining transparent
    in documentation.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to render עֲוֺן and חַטֹּאת with distinct English terms
  chosen_reading: 'Different but related terms: ''guilt'' for עֲוֺן and ''sins'' for
    חַטֹּאת'
  alternative_readings:
  - '''iniquity'' and ''sin'''
  - '''sin'' for both terms'
  rationale: The Hebrew uses two related but non-identical terms. Preserving some
    distinction reflects the source text's texture while keeping the English natural.
    'Guilt' highlights culpability removed by forgiveness; 'sins' names the offenses
    themselves.
- issue: Whether to make remnant theology explicit in the final clause
  chosen_reading: those whom I leave as a remnant
  alternative_readings:
  - those whom I leave
  - those whom I spare
  rationale: The Hebrew verb by itself means 'leave/remain,' but in prophetic restoration
    contexts it commonly carries remnant overtones. Adding 'as a remnant' clarifies
    the sense for modern readers while staying within the semantic range and the verse's
    restoration theme.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve
    theological tension rather than resolve it'
