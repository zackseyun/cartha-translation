theological_decisions:
- issue: Whether to render the judgment language in a softened way
  chosen_reading: Retain the full force of holy-war/judgment terminology with 'put
    them to the sword' and 'devote them to destruction.'
  alternative_readings:
  - Use generalized terms such as 'destroy' or 'defeat'
  rationale: The Hebrew uses strong military and ban terminology. Softening it would
    obscure the severity of the divine judgment oracle. The translation preserves
    the text's theological tension without importing justification beyond what the
    verse states.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering of the symbolic place names
  chosen_reading: Keep Merathaim and Pekod as transliterated names in the main text,
    with explanatory alternatives in footnotes.
  alternative_readings:
  - Translate the names as symbolic labels such as 'Double Rebellion' and 'Punishment'
  rationale: Because these function syntactically as place names, transliteration
    best reflects the source text while preserving the likely wordplay in notes. This
    avoids over-resolving whether Jeremiah intends literal geography, symbolic naming,
    or both.
  doctrine_reference: Translation philosophy §2, §3
