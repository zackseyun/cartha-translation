id: JER.50.21
reference: Jeremiah 50:21
source:
  edition: WLC
  text: עַל הָ/אָ֤רֶץ מְרָתַ֨יִם֙ עֲלֵ֣ה עָלֶ֔י/הָ וְ/אֶל יוֹשְׁבֵ֖י פְּק֑וֹד חֲרֹ֨ב
    וְ/הַחֲרֵ֤ם אַֽחֲרֵי/הֶם֙ נְאֻם יְהוָ֔ה וַ/עֲשֵׂ֕ה כְּ/כֹ֖ל אֲשֶׁ֥ר צִוִּיתִֽי/ךָ־־־׃ס
translation:
  text: Go up against the land of Merathaim, against it, and against the inhabitants
    of Pekod. Put them to the sword and devote them to destruction after them, declares
    the LORD, and do all that I have commanded you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Merathaim is likely a symbolic name for Babylon, sounding like 'double rebellion'
      or possibly 'double bitterness.'
    reason: lexical_alternative
  - marker: b
    text: Pekod is a place or people name; it may also echo the Hebrew root meaning
      'punishment' or 'visitation.'
    reason: lexical_alternative
  - marker: c
    text: Or 'put them under the ban'; the Hebrew refers to devoting something to
      destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְרָתַיִם
  chosen: Merathaim
  alternatives:
  - Double rebellion
  - double bitterness
  lexicon: HALOT
  rationale: Treated as a proper place name and therefore transliterated per project
    philosophy ('translate titles; transliterate names'). The name is likely a symbolic
    or wordplay designation for Babylon, but the main text preserves the Hebrew form
    rather than converting the wordplay into an interpretive translation.
- source_word: עֲלֵה
  chosen: Go up
  alternatives:
  - Advance
  - come up
  lexicon: HALOT
  rationale: עלה in military contexts commonly means 'go up/advance against.' 'Go
    up' preserves the Hebrew idiom while remaining natural in English.
- source_word: יוֹשְׁבֵי
  chosen: inhabitants of
  alternatives:
  - those who dwell in
  - residents of
  lexicon: HALOT
  rationale: The participial form from ישב denotes those dwelling in a place. 'Inhabitants
    of' is concise, idiomatic, and preserves the collective sense.
- source_word: פְּק֑וֹד
  chosen: Pekod
  alternatives:
  - Punishment
  - visitation
  lexicon: HALOT
  rationale: Best taken here as a proper place/group name and transliterated. The
    Hebrew also evokes the root פקד ('visit, punish, appoint'), but the main text
    keeps the name while the lexical ambiguity is preserved in a footnote.
- source_word: חֲרֹב
  chosen: Put them to the sword
  alternatives:
  - Slay
  - destroy
  lexicon: HALOT
  rationale: The imperative from חרב is elliptical and forceful in context, calling
    for violent destruction. 'Put them to the sword' makes the military sense explicit
    and fits the surrounding war oracle better than the more generic 'destroy.'
- source_word: וְהַחֲרֵם
  chosen: devote them to destruction
  alternatives:
  - utterly destroy them
  - put them under the ban
  lexicon: HALOT
  rationale: חרם in the Hiphil carries the sense of placing under the ban, devoting
    to destruction. 'Devote them to destruction' preserves the technical force better
    than simply 'destroy,' while remaining readable modern English.
- source_word: אַחֲרֵיהֶם
  chosen: after them
  alternatives:
  - behind them
  - afterward
  lexicon: HALOT
  rationale: The phrase is difficult. A straightforward rendering 'after them' preserves
    the Hebrew wording and likely conveys pursuit/completion of judgment. Smoother
    paraphrases would risk over-interpreting the syntax.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic, weighty,
    and consistent with modern English prophetic style. 'the LORD' follows the project's
    required rendering for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Required by the doctrine table: יְהוָה is rendered ''the LORD'' rather
    than a transliteration.'
- source_word: וַעֲשֵׂה כְּכֹל אֲשֶׁר צִוִּיתִיךָ
  chosen: do all that I have commanded you
  alternatives:
  - act according to all that I commanded you
  - do according to everything I commanded you
  lexicon: HALOT
  rationale: This clause closes the commission with clear obedience language. 'Do
    all that I have commanded you' is natural English and preserves the comprehensiveness
    of כְּכֹל.
