id: JER.50.17
reference: Jeremiah 50:17
source:
  edition: WLC
  text: שֶׂ֧ה פְזוּרָ֛ה יִשְׂרָאֵ֖ל אֲרָי֣וֹת הִדִּ֑יחוּ הָ/רִאשׁ֤וֹן אֲכָל/וֹ֙ מֶ֣לֶךְ
    אַשּׁ֔וּר וְ/זֶ֤ה הָ/אַחֲרוֹן֙ עִצְּמ֔/וֹ נְבוּכַדְרֶאצַּ֖ר מֶ֥לֶךְ בָּבֶֽל׃ס
translation:
  text: Israel is a scattered sheep; lions have driven him away. The first to devour
    him was the king of Assyria, and this last one—Nebuchadnezzar king of Babylon—has
    gnawed his bones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Nebuchadrezzar,'' a form closer to the Hebrew spelling here;
      English traditionally uses ''Nebuchadnezzar.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'a scattered lamb.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew verb may mean 'has gnawed his bones,' 'has stripped his bones,'
      or more generally 'has crushed him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׂה
  chosen: sheep
  alternatives:
  - lamb
  lexicon: HALOT
  rationale: The noun can denote a small livestock animal, often 'lamb' or 'sheep.'
    In this simile for Israel as vulnerable prey, 'sheep' is more idiomatic in English
    and fits the collective/national image better than 'lamb,' while preserving the
    pastoral vulnerability.
- source_word: פְזוּרָה
  chosen: scattered
  alternatives:
  - dispersed
  - strayed
  lexicon: HALOT
  rationale: The passive participial/adjectival form describes Israel as dispersed
    or scattered. 'Scattered' is natural English and preserves the image of a flock
    broken apart.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Standard transliteration of the national name, as required by the translation
    philosophy to transliterate names.
- source_word: אֲרָיוֹת
  chosen: lions
  lexicon: HALOT
  rationale: Straightforward plural noun. The predatory contrast with 'sheep' is central
    to the verse's imagery.
- source_word: הִדִּיחוּ
  chosen: have driven him away
  alternatives:
  - have scattered him
  - have chased him away
  lexicon: HALOT
  rationale: The Hiphil conveys causing to flee, driving away, or banishing. 'Driven
    him away' best matches the predator image of lions dispersing prey and connects
    with the preceding 'scattered sheep.'
- source_word: הָרִאשׁוֹן
  chosen: the first
  lexicon: HALOT
  rationale: Marks the first oppressor in a sequence, here the king of Assyria.
- source_word: אֲכָלוֹ
  chosen: to devour him
  alternatives:
  - ate him
  - consumed him
  lexicon: HALOT
  rationale: Although literally 'ate him,' 'devour' better carries the metaphorical
    violence of imperial predation in contemporary English.
- source_word: מֶלֶךְ אַשּׁוּר
  chosen: the king of Assyria
  rationale: Construct chain rendered naturally in English with article supplied for
    readability.
- source_word: וְזֶה הָאַחֲרוֹן
  chosen: and this last one
  alternatives:
  - and this latter one
  - and the last of them
  lexicon: HALOT
  rationale: The demonstrative plus adjective points to the later oppressor in contrast
    to 'the first.' 'This last one' preserves the deictic force and sequence.
- source_word: עִצְּמוֹ
  chosen: has gnawed his bones
  alternatives:
  - has crushed his bones
  - has stripped his bones
  - has broken his bones
  lexicon: HALOT
  rationale: From a verb meaning to gnaw or pick bones bare. The image intensifies
    the predatory metaphor beyond mere conquest. 'Has gnawed his bones' preserves
    the vividness better than a flattened 'crushed him.'
- source_word: נְבוּכַדְרֶאצַּר
  chosen: Nebuchadnezzar
  alternatives:
  - Nebuchadrezzar
  rationale: Standard English transliteration favors 'Nebuchadnezzar,' though the
    Hebrew form here more closely reflects 'Nebuchadrezzar.' The common English form
    aids readability; the closer transliteration is preserved in a footnote.
- source_word: מֶלֶךְ בָּבֶל
  chosen: king of Babylon
  rationale: Construct chain rendered directly and idiomatically.
