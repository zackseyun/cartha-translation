theological_decisions:
- issue: Metaphorical portrayal of Israel
  chosen_reading: Israel is personified as a single vulnerable sheep and referred
    to with singular pronouns ('him').
  alternative_readings:
  - Israel as a flock with plural sense
  rationale: The Hebrew presents Israel as a singular collective noun in apposition
    to 'sheep,' and the following suffixes are singular. Retaining the singular preserves
    the prophetic personification and the force of the national image.
