id: JER.50.43
reference: Jeremiah 50:43
source:
  edition: WLC
  text: שָׁמַ֧ע מֶֽלֶךְ בָּבֶ֛ל אֶת שִׁמְעָ֖/ם וְ/רָפ֣וּ יָדָ֑י/ו צָרָה֙ הֶחֱזִיקַ֔תְ/הוּ
    חִ֖יל כַּ/יּוֹלֵדָֽה־־׃
translation:
  text: The king of Babylon has heard the report about them, and his hands have gone
    limp; distress has seized him, anguish like a woman in labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the news concerning them.' The Hebrew phrase can be rendered more literally
      as 'their report,' but in context it refers to the report about the invading
      force.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַע
  chosen: has heard
  alternatives:
  - heard
  lexicon: HALOT
  rationale: 'Qal perfect 3ms of שׁמע, here best rendered as a present perfect in
    English to convey the completed action with present consequence in the narrative:
    the king has received the news and is now reacting.'
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: Construct chain straightforwardly identifies the ruler of Babylon. The
    definite sense is natural in English though Hebrew lacks the article.
- source_word: שִׁמְעָם
  chosen: the report about them
  alternatives:
  - their report
  - the news of them
  - the report of them
  lexicon: HALOT
  rationale: The noun from שׁמע can mean 'report, news, tidings.' With the 3mp suffix,
    the sense is the report concerning the approaching enemy force, not a report originating
    from them. 'About them' makes the referent clear in idiomatic English.
- source_word: וְרָפוּ יָדָיו
  chosen: his hands have gone limp
  alternatives:
  - his hands grew feeble
  - his hands became weak
  lexicon: HALOT
  rationale: The idiom 'hands become weak/limp' expresses loss of strength or courage.
    'Gone limp' preserves the bodily image while remaining natural English.
- source_word: צָרָה
  chosen: distress
  alternatives:
  - trouble
  - anguish
  lexicon: HALOT
  rationale: The noun denotes distress or trouble. 'Distress' fits the emotional and
    situational pressure described in parallel with the following terms.
- source_word: הֶחֱזִיקַתְהוּ
  chosen: has seized him
  alternatives:
  - has taken hold of him
  - gripped him
  lexicon: HALOT
  rationale: Hiphil of חזק here means 'to seize, take hold of' in the sense of overpowering
    someone. 'Has seized him' is vivid and idiomatic.
- source_word: חִיל
  chosen: anguish
  alternatives:
  - writhing
  - trembling
  - labor pains
  lexicon: HALOT
  rationale: In this context חִיל denotes convulsive anguish or writhing, clarified
    by the simile 'like a woman giving birth.' 'Anguish' avoids redundancy with the
    explicit childbirth comparison while preserving the emotional force.
- source_word: כַּיּוֹלֵדָה
  chosen: like a woman in labor
  alternatives:
  - like a woman giving birth
  - like a woman bearing a child
  lexicon: HALOT
  rationale: The feminine participial form with prefixed כ expresses comparison to
    a woman in childbirth. 'In labor' is concise, contemporary, and preserves the
    metaphor of intense pain.
