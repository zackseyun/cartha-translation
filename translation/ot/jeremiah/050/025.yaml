id: JER.50.25
reference: Jeremiah 50:25
source:
  edition: WLC
  text: פָּתַ֤ח יְהוָה֙ אֶת א֣וֹצָר֔/וֹ וַ/יּוֹצֵ֖א אֶת כְּלֵ֣י זַעְמ֑/וֹ כִּי מְלָאכָ֣ה הִ֗יא לַֽ/אדֹנָ֧/י יְהוִ֛ה צְבָא֖וֹת בְּ/אֶ֥רֶץ כַּשְׂדִּֽים־־־׃
translation:
  text: Yahweh has opened his storehouse and brought out the weapons of his wrath, for this is a work of the Lord GOD of Armies in the land of the Chaldeans.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his treasury' or 'his armory' for 'his storehouse.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the implements/instruments of his wrath'; the Hebrew term can refer broadly to articles or equipment, but here likely has a military sense.
    reason: lexical_alternative
  - marker: c
    text: Traditionally 'the Lord GOD of hosts.'
    reason: lexical_alternative
  - marker: d
    text: Or 'in the land of Chaldea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: פָּתַח
  chosen: has opened
  alternatives:
  - opened
  lexicon: HALOT
  rationale: The qatal form presents the action as complete; English present perfect gives vividness in context while preserving completed aspect in prophetic discourse.
- source_word: אֹצָרוֹ
  chosen: his storehouse
  alternatives:
  - his treasury
  - his armory
  lexicon: HALOT
  rationale: אוֹצָר commonly denotes a storehouse or treasury. In this military-judgment context, 'storehouse' preserves the metaphor broadly, while the following clause specifies its contents as instruments of wrath. 'Armory' is interpretive and too narrow for the noun itself.
- source_word: וַיּוֹצֵא
  chosen: and brought out
  alternatives:
  - and has brought out
  - and took out
  lexicon: HALOT
  rationale: The verb means to bring out or lead out. 'Brought out' is idiomatic and fits the image of the LORD opening a storehouse and producing its contents.
- source_word: כְּלֵי
  chosen: the weapons
  alternatives:
  - the vessels
  - the implements
  - the instruments
  lexicon: HALOT
  rationale: Although כְּלִי can mean vessel, utensil, implement, or weapon, in a judgment-oracle with divine wrath and Babylon's downfall, 'weapons' best captures the military sense intended here.
- source_word: זַעְמוֹ
  chosen: his wrath
  alternatives:
  - his indignation
  - his anger
  lexicon: HALOT
  rationale: זַעַם denotes indignation or wrath, often in divine judgment contexts. 'Wrath' preserves the theological and judicial force better than the milder 'anger'.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason or explanation for the preceding action; 'for' is concise and natural in English.
- source_word: מְלָאכָה
  chosen: a work
  alternatives:
  - business
  - task
  - deed
  lexicon: HALOT
  rationale: מְלָאכָה broadly means work, task, or business. 'A work' preserves the solemnity and leaves the nature of the action to be defined by context rather than over-specifying it.
- source_word: לַאדֹנָי יְהוִה צְבָאוֹת
  chosen: of the Lord GOD of Armies
  alternatives:
  - for the Lord GOD of hosts
  - belonging to the Lord GOD of Armies
  lexicon: HALOT
  rationale: אֲדֹנָי יְהוִה is conventionally rendered 'Lord GOD' to avoid 'Lord LORD' in English. צְבָאוֹת is translated 'of Armies' rather than transliterated 'of hosts' for readability and semantic transparency.
- source_word: בְּאֶרֶץ כַּשְׂדִּים
  chosen: in the land of the Chaldeans
  alternatives:
  - in the land of Chaldea
  lexicon: HALOT
  rationale: The Hebrew is literally 'in the land of the Chaldeans.' This preserves the ethnographic expression of the source text; 'Chaldea' is a smoother geographic equivalent but less formally aligned.
