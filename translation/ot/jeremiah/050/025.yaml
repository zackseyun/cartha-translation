theological_decisions:
- issue: Rendering the compound divine title אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - the Lord GOD
  rationale: Because the verse contains both יְהוָה and אֲדֹנָי יְהוִה, rendering the latter as 'the Lord GOD' preserves the distinction in English and avoids the awkward 'Lord LORD.' This is a translational convention, not a theological alteration.
