theological_decisions:
- issue: Referent of the lion imagery and first-person divine speech
  chosen_reading: The verse shifts from third-person lion imagery to first-person
    divine declaration, with the lion image functioning as an instrument or figure
    of the LORD's judgment rather than an independent actor.
  alternative_readings:
  - The lion is the invading ruler alone, with the first-person speech simply interpreting
    the event.
  rationale: The Hebrew itself moves from 'he comes up' to 'I will make... I will
    appoint... who is like me?' Preserving both without over-resolving reflects the
    prophetic style and maintains the theological force of divine sovereignty behind
    the invasion.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
