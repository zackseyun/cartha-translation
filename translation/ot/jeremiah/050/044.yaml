id: JER.50.44
reference: Jeremiah 50:44
source:
  edition: WLC
  text: הִ֠נֵּה כְּ/אַרְיֵ֞ה יַעֲלֶ֨ה מִ/גְּא֣וֹן הַ/יַּרְדֵּן֮ אֶל נְוֵ֣ה אֵיתָן֒
    כִּֽי אַרְגִּ֤עָה ארוצ/ם מֵֽ/עָלֶ֔י/הָ וּ/מִ֥י בָח֖וּר אֵלֶ֣י/הָ אֶפְקֹ֑ד כִּ֣י
    מִ֤י כָמ֨וֹ/נִי֙ וּ/מִ֣י יוֹעִדֶ֔/נִּי וּ/מִֽי זֶ֣ה רֹעֶ֔ה אֲשֶׁ֥ר יַעֲמֹ֖ד לְ/פָנָֽ/י־־־׃
translation:
  text: Look, like a lion he comes up from the thicket of the Jordan against a secure
    pasture; for in an instant I will make them run from it, and I will appoint over
    it whoever is chosen. For who is like me, and who can summon me? What shepherd
    can stand before me?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'from the pride of the Jordan'; the expression likely refers to the
      Jordan's dense, luxuriant thickets.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will chase them away from it.'
    reason: lexical_alternative
  - marker: c
    text: Or 'and who can appoint me a time?' The Hebrew may carry the sense of setting
      a time for meeting or summoning to account.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  lexicon: HALOT
  rationale: Discourse marker introducing a vivid prophetic image. 'Look' preserves
    immediacy in modern English better than the archaic 'Behold.'
- source_word: כְּאַרְיֵה
  chosen: like a lion
  lexicon: HALOT
  rationale: Straightforward simile marker plus noun; retained formally.
- source_word: יַעֲלֶה
  chosen: he comes up
  alternatives:
  - he goes up
  - he ascends
  lexicon: HALOT
  rationale: עלה commonly means 'go up/come up.' Present-tense English gives the prophetic
    vividness naturally in context.
- source_word: מִגְּאוֹן הַיַּרְדֵּן
  chosen: from the thicket of the Jordan
  alternatives:
  - from the pride of the Jordan
  - from the majesty of the Jordan
  lexicon: HALOT
  rationale: גָּאוֹן with the Jordan is an idiom for its luxuriant, overgrown banks/thickets
    rather than abstract 'pride' here. 'Thicket of the Jordan' communicates the concrete
    setting of a lion emerging from dense growth.
- source_word: אֶל נְוֵה אֵיתָן
  chosen: against a secure pasture
  alternatives:
  - to a permanent habitation
  - to a strong fold
  - to an enduring pasture
  lexicon: HALOT
  rationale: נוה denotes pasture/dwelling-place, especially for flocks; אֵיתָן conveys
    enduring, firm, secure. 'Secure pasture' fits the shepherding/lion imagery and
    reads naturally.
- source_word: כִּי אַרְגִּעָה
  chosen: for in an instant
  alternatives:
  - for suddenly
  - for I will suddenly
  lexicon: HALOT
  rationale: The idiom with רגע in Hiphil conveys suddenness/doing something in a
    moment. Rendering adverbially captures the force before the following verbs.
- source_word: ארוצם
  chosen: I will make them run
  alternatives:
  - I will chase them away
  - I will drive them off
  lexicon: HALOT
  rationale: From רוץ, 'run.' Given the causative sense in context, 'make them run'
    preserves the lexical core while fitting the syntax. The 3mp suffix is retained
    as 'them.'
- source_word: מֵעָלֶיהָ
  chosen: from it
  alternatives:
  - from her
  - away from it
  lexicon: HALOT
  rationale: The suffix is feminine singular, referring back to the pasture/dwelling.
    English idiom prefers 'it' for a place.
- source_word: וּמִי בָחוּר אֵלֶיהָ אֶפְקֹד
  chosen: and I will appoint over it whoever is chosen
  alternatives:
  - and who is chosen, that I may appoint him over it
  - and I will set over it the chosen one
  lexicon: HALOT
  rationale: The clause is syntactically compressed. The sense is that God will appoint
    over the place one who is selected/chosen. This rendering preserves the passive
    nuance of בָחוּר and the appointing sense of פקד in context.
- source_word: כִּי מִי כָמוֹנִי
  chosen: For who is like me
  lexicon: HALOT
  rationale: Formal rhetorical question asserting incomparability.
- source_word: וּמִי יוֹעִדֶנִּי
  chosen: and who can summon me
  alternatives:
  - and who will appoint me a time
  - and who can arraign me
  lexicon: HALOT
  rationale: 'יעד in Hiphil can mean appoint/summon/set a meeting. In this rhetorical
    context, ''summon me'' best conveys the challenge: no one can call God to account
    or compel his appearance.'
- source_word: וּמִי זֶה רֹעֶה אֲשֶׁר יַעֲמֹד לְפָנָי
  chosen: What shepherd can stand before me
  alternatives:
  - Who then is the shepherd who can stand before me
  lexicon: HALOT
  rationale: Retains the shepherd imagery and the idiom 'stand before' meaning withstand/face
    successfully.
