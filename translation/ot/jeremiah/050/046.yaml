id: JER.50.46
reference: Jeremiah 50:46
source:
  edition: WLC
  text: מִ/קּוֹל֙ נִתְפְּשָׂ֣ה בָבֶ֔ל נִרְעֲשָׁ֖ה הָ/אָ֑רֶץ וּ/זְעָקָ֖ה בַּ/גּוֹיִ֥ם
    נִשְׁמָֽע׃ס
translation:
  text: At the sound of Babylon being captured, the earth quakes, and a cry is heard
    among the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'At the sound of Babylon's capture.' The Hebrew can be rendered more
      formally with a finite verb ('Babylon is captured/has been taken') or more idiomatically
      as a verbal noun in English.
    reason: lexical_alternative
  - marker: b
    text: '''The earth'' could also be rendered ''the land''; here ''earth'' is preferred
      because the parallel ''among the nations'' suggests a wider, international scope.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/קּוֹל
  chosen: At the sound of
  alternatives:
  - From the sound of
  - At the noise of
  lexicon: HALOT
  rationale: 'קוֹל commonly means ''sound, noise, voice.'' With prefixed מִן it introduces
    the occasion or cause: ''at/from the sound of.'' ''At the sound of'' is idiomatic
    English and preserves the causal-temporal sense without over-paraphrase.'
- source_word: נִתְפְּשָׂה
  chosen: being captured
  alternatives:
  - is taken
  - has been seized
  - is caught
  lexicon: HALOT
  rationale: Niphal of תפשׂ here is best taken as passive/reflexive in the sense 'be
    taken/captured.' Because it follows 'sound of,' English idiom is smoother with
    a participial sense, 'Babylon being captured,' while preserving the event described.
- source_word: בָבֶל
  chosen: Babylon
  rationale: Standard English transliteration of the place name.
- source_word: נִרְעֲשָׁה
  chosen: quakes
  alternatives:
  - is shaken
  - trembles
  lexicon: HALOT
  rationale: Niphal of רעשׁ denotes shaking or quaking. 'Quakes' is vivid, natural
    English for the earth's reaction and fits prophetic judgment language.
- source_word: הָ/אָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'earth' or 'land.' In parallel with 'among the nations'
    and in cosmic judgment rhetoric, 'the earth' better conveys the broad scope of
    the report's impact.
- source_word: וּ/זְעָקָה
  chosen: and a cry
  alternatives:
  - and an outcry
  - and a scream
  lexicon: HALOT
  rationale: זְעָקָה denotes a cry/outcry, often of distress. 'A cry' is concise and
    natural; 'outcry' is possible but slightly more interpretive in English.
- source_word: בַּ/גּוֹיִם
  chosen: among the nations
  alternatives:
  - among the peoples
  - in the nations
  lexicon: HALOT
  rationale: גּוֹיִם usually means 'nations' or 'peoples.' 'Among the nations' best
    fits the idea that the cry/report is heard internationally.
- source_word: נִשְׁמָע
  chosen: is heard
  alternatives:
  - is heard of
  - is proclaimed
  lexicon: HALOT
  rationale: Niphal of שׁמע is straightforwardly passive, 'is heard.' This preserves
    the text's focus on the spread of the cry rather than introducing an active herald
    not present in the Hebrew.
