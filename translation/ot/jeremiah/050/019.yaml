theological_decisions:
- issue: Personification and pronoun number for Israel
  chosen_reading: Use singular pronouns ('his,' 'he') for Israel
  alternative_readings:
  - Use plural pronouns ('their,' 'they') to reflect the people collectively
  rationale: The Hebrew treats Israel as a singular collective/personified entity,
    with singular verbal and pronominal forms. Retaining singular pronouns preserves
    the source-text imagery and grammar rather than smoothing it into English plurality.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering נֶפֶשׁ in a non-anthropological context
  chosen_reading: Translate idiomatically as 'appetite' in the main text
  alternative_readings:
  - Translate more literally as 'soul'
  rationale: The verse uses pastoral and feeding imagery; rendering נֶפֶשׁ as 'appetite'
    avoids importing a narrower later theological sense of 'soul' while preserving
    the Hebrew idiom's force. The literal alternative is preserved in a footnote to
    maintain transparency.
  doctrine_reference: Translation philosophy §1, §3, §6
