id: JER.50.19
reference: Jeremiah 50:19
source:
  edition: WLC
  text: וְ/שֹׁבַבְתִּ֤י אֶת יִשְׂרָאֵל֙ אֶל נָוֵ֔/הוּ וְ/רָעָ֥ה הַ/כַּרְמֶ֖ל וְ/הַ/בָּשָׁ֑ן
    וּ/בְ/הַ֥ר אֶפְרַ֛יִם וְ/הַ/גִּלְעָ֖ד תִּשְׂבַּ֥ע נַפְשֽׁ/וֹ־־׃
translation:
  text: And I will bring Israel back to his pasture, and he will graze on Carmel and
    Bashan; and on the hill country of Ephraim and Gilead his appetite will be satisfied.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'his soul will be satisfied.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֹׁבַבְתִּי
  chosen: I will bring ... back
  alternatives:
  - I will restore
  - I will return
  lexicon: HALOT
  rationale: From שוב in the Hiphil/Qal context of causing return or restoration.
    'Bring back' preserves the concrete movement implied by the following 'to his
    pasture' while also conveying restoration.
- source_word: נָוֵהוּ
  chosen: his pasture
  alternatives:
  - his habitation
  - his fold
  - his grazing place
  lexicon: HALOT
  rationale: נָוֶה can denote a pastureland, abode, or fold. Because the next clause
    uses shepherding imagery ('he will graze'), 'pasture' best preserves the pastoral
    metaphor and coherence of the verse.
- source_word: וְרָעָה
  chosen: and he will graze
  alternatives:
  - and he will feed
  - and he will pasture
  lexicon: HALOT
  rationale: 'רעה here is intransitive/pastoral: Israel, personified as a flock, feeds
    in fertile regions. ''Graze'' is natural modern English and keeps the shepherding
    image.'
- source_word: הַכַּרְמֶל
  chosen: Carmel
  alternatives:
  - the Carmel
  lexicon: HALOT
  rationale: A proper place name, conventionally transliterated. The article is absorbed
    in English idiom rather than rendered woodenly.
- source_word: הַבָּשָׁן
  chosen: Bashan
  alternatives:
  - the Bashan
  lexicon: HALOT
  rationale: Proper regional name; transliteration follows the philosophy of transliterating
    names.
- source_word: וּבְהַר אֶפְרַיִם
  chosen: and on the hill country of Ephraim
  alternatives:
  - and in the mountains of Ephraim
  - and on Mount Ephraim
  lexicon: HALOT
  rationale: הַר can mean mountain/hill country. In reference to a region, 'hill country
    of Ephraim' is idiomatic and geographically appropriate.
- source_word: וְהַגִּלְעָד
  chosen: and Gilead
  alternatives:
  - and the Gilead
  lexicon: HALOT
  rationale: Proper regional name, transliterated in standard English form.
- source_word: תִּשְׂבַּע נַפְשׁוֹ
  chosen: his appetite will be satisfied
  alternatives:
  - his soul will be satisfied
  - he will be satisfied
  lexicon: HALOT
  rationale: Literally 'his soul will be satisfied.' In this feeding/pasture context,
    נֶפֶשׁ refers to the living self/appetite rather than an abstract immaterial soul.
    'His appetite will be satisfied' preserves the concrete sense while remaining
    readable. The more literal alternative is preserved in a footnote because of the
    theological and lexical significance of נֶפֶשׁ.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Proper name for the people, here personified as a singular entity, which
    explains the singular pronouns that follow.
