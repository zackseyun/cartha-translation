theological_decisions:
- issue: Referent and gender of the 2nd feminine singular verbs
  chosen_reading: Addressed to Babylon as a personified feminine entity
  alternative_readings:
  - Addressed more generally to the city's inhabitants collectively
  rationale: The feminine singular verbal forms are best represented by English 'you'
    without forcing a feminine pronoun into the main text. The personification of
    Babylon/city is preserved by context rather than explicit gendering.
