id: JER.50.11
reference: Jeremiah 50:11
source:
  edition: WLC
  text: כִּ֤י תשמחי כִּ֣י תעלזי שֹׁסֵ֖י נַחֲלָתִ֑/י כִּ֤י תפושי כְּ/עֶגְלָ֣ה דָשָׁ֔ה
    ו/תצהלי כָּ/אֲבִּרִֽים׃
translation:
  text: Though you rejoice, though you exult, plunderers of my inheritance, though
    you frisk about like a threshing heifer and neigh like stallions,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Because you rejoice, because you exult.' The Hebrew particle כִּי can
      be read causally, but here it is rendered concessively ('though') to fit the
      taunting flow into the announcement of judgment.
    reason: lexical_alternative
  - marker: b
    text: '''My inheritance'' may also be rendered ''my heritage,'' referring to the
      people and/or land belonging to the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: Though
  alternatives:
  - because
  - for
  lexicon: HALOT
  rationale: Here כִּי introduces concessive clauses repeated for rhetorical force
    in a taunt against Babylon. Rendering it as 'though' best fits the flow into the
    following judgment context, rather than a causal 'because/for.'
- source_word: תשמחי
  chosen: you rejoice
  alternatives:
  - you are glad
  - you celebrate
  lexicon: HALOT
  rationale: From שׂמח, denoting joy/gladness. 'Rejoice' preserves the elevated prophetic
    tone and pairs well with the parallel verb that follows.
- source_word: תעלזי
  chosen: you exult
  alternatives:
  - you are jubilant
  - you triumph
  lexicon: HALOT
  rationale: עלז conveys exuberant joy or exultation. 'Exult' keeps the poetic intensification
    distinct from the previous 'rejoice' while remaining natural English.
- source_word: שֹׁסֵי
  chosen: plunderers
  alternatives:
  - destroyers
  - spoilers
  lexicon: HALOT
  rationale: The participle from שׁסה refers to those who despoil or plunder. 'Plunderers'
    is the clearest modern equivalent and matches the context of Babylon ravaging
    Judah.
- source_word: נַחֲלָתִי
  chosen: my inheritance
  alternatives:
  - my heritage
  - my possession
  lexicon: HALOT
  rationale: נחלה often denotes an inherited possession or heritage. 'My inheritance'
    preserves the covenantal nuance of the land/people belonging to God, while 'heritage'
    remains a viable alternative.
- source_word: תפושי
  chosen: you frisk about
  alternatives:
  - you skip about
  - you romp
  lexicon: HALOT
  rationale: The verb פושׁ in this context suggests lively, unrestrained movement.
    'Frisk about' captures the animal imagery and mocking tone better than a flatter
    'skip.'
- source_word: כְּעֶגְלָה דָשָׁה
  chosen: like a threshing heifer
  alternatives:
  - like a heifer treading grain
  - like a heifer at the threshing floor
  lexicon: HALOT
  rationale: The phrase evokes a young cow engaged in threshing, an image associated
    with energetic movement and indulgence. 'Threshing heifer' is concise and idiomatic
    while preserving the agricultural metaphor.
- source_word: ותצהלי
  chosen: and neigh
  alternatives:
  - and whinny
  - and cry out sharply
  lexicon: HALOT
  rationale: From צהל, here used of the sound associated with horses. 'Neigh' is the
    most direct and vivid English equivalent in this simile.
- source_word: כָּאֲבִּרִים
  chosen: like stallions
  alternatives:
  - like strong horses
  - like steeds
  lexicon: HALOT
  rationale: אַבִּיר can denote the strong or mighty ones; in this context, with 'neigh,'
    it refers metaphorically to powerful horses. 'Stallions' makes the image explicit
    and natural in English.
