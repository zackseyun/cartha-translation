theological_decisions:
- issue: Personification of Babylon in masculine singular language
  chosen_reading: Retain masculine singular reference ('the arrogant one ... him ...
    his cities')
  alternative_readings:
  - Use impersonal/neuter reference for Babylon ('it ... its cities')
  - Render זָדוֹן abstractly as 'pride'
  rationale: The Hebrew grammar consistently uses masculine singular forms, presenting
    Babylon/the proud one as a personified figure. Preserving that imagery is more
    textually transparent than flattening it into an abstract noun or neuter national
    reference.
  doctrine_reference: Translation philosophy items 1 and 5
