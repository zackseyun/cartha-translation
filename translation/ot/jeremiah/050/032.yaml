id: JER.50.32
reference: Jeremiah 50:32
source:
  edition: WLC
  text: וְ/כָשַׁ֤ל זָדוֹן֙ וְ/נָפַ֔ל וְ/אֵ֥ין ל֖/וֹ מֵקִ֑ים וְ/הִצַּ֤תִּי אֵשׁ֙ בְּ/עָרָ֔י/ו
    וְ/אָכְלָ֖ה כָּל סְבִיבֹתָֽי/ו־׃ס
translation:
  text: And the arrogant one will stumble and fall, with no one to raise him up; and
    I will kindle a fire in his cities, and it will consume all around him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pride' or 'insolence'; the Hebrew זָדוֹן is often abstract, but here
      it is rendered personally as 'the arrogant one' because the surrounding verbs
      and pronouns are masculine singular.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'his cities.' The verse personifies Babylon as a singular male figure.
    reason: cultural_note
lexical_decisions:
- source_word: זָדוֹן
  chosen: the arrogant one
  alternatives:
  - pride
  - insolence
  - the presumptuous one
  lexicon: HALOT
  rationale: Though often an abstract noun ('pride,' 'insolence'), here it functions
    as a personified designation in apposition to Babylon/the proud one in context.
    Rendering it as 'the arrogant one' preserves the personal reference required by
    the following masculine singular verbs and pronouns.
- source_word: כָשַׁל
  chosen: will stumble
  alternatives:
  - has stumbled
  - shall totter
  lexicon: HALOT
  rationale: The qatal in prophetic discourse commonly carries a future/resultative
    sense. 'Will stumble' fits the judgment context and pairs naturally with the following
    'fall.'
- source_word: נָפַל
  chosen: and fall
  alternatives:
  - and has fallen
  - and collapse
  lexicon: HALOT
  rationale: Rendered coordinately with 'stumble' to preserve the Hebrew sequence
    and the intensification of downfall.
- source_word: מֵקִים
  chosen: to raise him up
  alternatives:
  - to make him stand
  - to restore him
  lexicon: HALOT
  rationale: The Hiphil participle of קום here denotes causing someone to rise after
    falling. 'Raise him up' is idiomatic and preserves the image without overinterpreting
    it as political restoration.
- source_word: הִצַּתִּי אֵשׁ
  chosen: I will kindle a fire
  alternatives:
  - I have kindled a fire
  - I will set fire
  lexicon: HALOT
  rationale: The idiom means to ignite/judge by fire. 'Kindle a fire' is slightly
    more formal and preserves the explicit noun 'fire' present in Hebrew.
- source_word: בְּעָרָיו
  chosen: in his cities
  alternatives:
  - in its cities
  lexicon: HALOT
  rationale: The Hebrew suffix is masculine singular. English may use 'its' for a
    city/nation, but the surrounding verse personifies Babylon as a masculine singular
    figure, so 'his cities' preserves that personification.
- source_word: וְאָכְלָה
  chosen: and it will consume
  alternatives:
  - and it will devour
  - and it has consumed
  lexicon: HALOT
  rationale: The feminine singular verb agrees with 'fire.' 'Consume' is natural English
    for fire imagery and retains the judgment force.
- source_word: כָּל סְבִיבֹתָיו
  chosen: all around him
  alternatives:
  - all his surroundings
  - everything around him
  lexicon: HALOT
  rationale: This phrase denotes the entirety of what surrounds him. 'All around him'
    is concise, natural, and preserves the masculine singular personification.
