theological_decisions:
- issue: Possible allusion to idolatrous high places in 'mountains' and 'hill'
  chosen_reading: Retain the geographic/pastoral wording without making the idolatry
    implication explicit in the main text.
  alternative_readings:
  - Translate more interpretively to foreground movement over illicit high places
  rationale: Jeremiah often associates mountains and hills with apostasy, but this
    verse's immediate metaphor is of sheep misled by shepherds. Optimal equivalence
    preserves the image and allows the allusion to remain implicit rather than importing
    an interpretive conclusion into the main text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of the difficult word שובבים
  chosen_reading: Understand it contextually as describing errant wandering caused
    by the shepherds, expressed in English as 'have made them wander.'
  alternative_readings:
  - '''rebellious/wayward mountains'''
  - '''turning mountains'''
  rationale: The Hebrew form is syntactically difficult if attached directly to 'mountains.'
    A contextual rendering that communicates induced wandering best fits the parallel
    lines and avoids a wooden but obscure translation. The more literal/formal alternative
    is preserved in a footnote.
  doctrine_reference: Translation philosophy §5
