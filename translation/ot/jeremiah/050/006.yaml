id: JER.50.6
reference: Jeremiah 50:6
source:
  edition: WLC
  text: צֹ֤אן אֹֽבְדוֹת֙ היה עַמִּ֔/י רֹעֵי/הֶ֣ם הִתְע֔וּ/ם הָרִ֖ים שובבים מֵ/הַ֤ר
    אֶל גִּבְעָה֙ הָלָ֔כוּ שָׁכְח֖וּ רִבְצָֽ/ם־׃
translation:
  text: My people have been lost sheep; their shepherds have led them astray on the
    mountains. They have made them wander from mountain to hill; they have forgotten
    their resting place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'their shepherds led them astray; the mountains made
      them wayward,' reflecting the difficult Hebrew word translated 'have made them
      wander.'
    reason: lexical_alternative
  - marker: b
    text: '''From mountain to hill'' may also echo Israel''s movement among the high
      places, a common image of apostasy in Jeremiah.'
    reason: cross_reference
lexical_decisions:
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - flock
  lexicon: HALOT
  rationale: Though literally a collective noun meaning 'flock/small livestock,' in
    this simile the following feminine plural participle and the pastoral imagery
    favor the more concrete 'sheep' in English.
- source_word: אֹבְדוֹת
  chosen: lost
  alternatives:
  - perishing
  - straying
  lexicon: HALOT
  rationale: The participle from אבד can denote being lost, ruined, or perishing.
    In the shepherd/sheep context, 'lost' best captures both the literal image and
    the covenantal sense of being gone astray without overtranslating to final destruction.
- source_word: היה
  chosen: have been
  alternatives:
  - were
  lexicon: HALOT
  rationale: The qatal with predicate construction is rendered idiomatically in English
    as 'have been' to connect the present accusation with an ongoing condition; 'were'
    is possible but sounds more detached from the prophetic indictment.
- source_word: עַמִּי
  chosen: My people
  lexicon: HALOT
  rationale: Standard covenantal expression; capitalized pronoun reflects the speaker
    as God in context without adding content beyond the discourse setting.
- source_word: רֹעֵיהֶם
  chosen: their shepherds
  alternatives:
  - their pastors
  - their leaders
  lexicon: HALOT
  rationale: The literal pastoral term should be preserved because Jeremiah intentionally
    uses shepherd imagery for Israel's leaders. 'Leaders' would flatten the metaphor.
- source_word: הִתְעוּם
  chosen: have led them astray
  alternatives:
  - caused them to wander
  - misled them
  lexicon: HALOT
  rationale: 'The Hiphil of תעה with object suffix is causative: the shepherds caused
    the people to go astray. ''Led them astray'' is natural English and preserves
    culpability.'
- source_word: הָרִים
  chosen: on the mountains
  alternatives:
  - into the mountains
  lexicon: HALOT
  rationale: No preposition is present, so the accusative may be directional or locative.
    'On the mountains' fits the next clause's movement from mountain to hill and preserves
    the image of being scattered over high places.
- source_word: שובבים
  chosen: have made them wander
  alternatives:
  - turning them away
  - leading them back and forth
  lexicon: HALOT
  rationale: 'This adjective/participle is difficult. In context it describes the
    effect of the shepherds'' action on the mountains: making the sheep roam errantly.
    Rendering it verbally in English communicates the sense without forcing an opaque
    adjective such as ''wayward mountains.'''
- source_word: מֵהַר אֶל גִּבְעָה
  chosen: from mountain to hill
  alternatives:
  - from one mountain to another hill
  - from mountain to high place
  lexicon: HALOT
  rationale: A concise rendering preserves the repetitive movement and likely alludes
    to restless wandering, possibly with overtones of illicit high-place religion,
    but the main text should not make that implication explicit beyond the geography.
- source_word: הָלָכוּ
  chosen: they have wandered
  alternatives:
  - they went
  - they walked
  lexicon: HALOT
  rationale: Although the verb simply means 'went/walked,' in this context of lost
    sheep moving from mountain to hill, 'wandered' brings out the contextual force
    in idiomatic English. To preserve transparency, the more literal sense is noted
    as an alternative.
- source_word: שָׁכְחוּ
  chosen: they have forgotten
  lexicon: HALOT
  rationale: Straightforward rendering of the qatal; the subject remains the sheep/people,
    not the shepherds.
- source_word: רִבְצָם
  chosen: their resting place
  alternatives:
  - their fold
  - their lying-down place
  - their pasture
  lexicon: HALOT
  rationale: From רבץ, a place of lying down/resting for animals. 'Resting place'
    is the clearest modern English and preserves the pastoral image. 'Fold' is possible
    but too specific; the Hebrew is broader.
