id: JER.37.7
reference: Jeremiah 37:7
source:
  edition: WLC
  text: כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל כֹּ֤ה תֹֽאמְרוּ֙ אֶל מֶ֣לֶךְ יְהוּדָ֔ה הַ/שֹּׁלֵ֧חַ אֶתְ/כֶ֛ם אֵלַ֖/י לְ/דָרְשֵׁ֑/נִי הִנֵּ֣ה חֵ֣יל פַּרְעֹ֗ה הַ/יֹּצֵ֤א לָ/כֶם֙ לְ/עֶזְרָ֔ה שָׁ֥ב לְ/אַרְצ֖/וֹ מִצְרָֽיִם־־׀׃
translation:
  text: 'Thus says Yahweh, the God of Israel: Thus you shall say to the king of Judah, who sent you to me to inquire of me, ‘Behold, Pharaoh’s army, which came out to help you, has returned to its own land, Egypt.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to seek me” / “to consult me.” The Hebrew verb can denote seeking or inquiring, and here refers to asking for a divine answer through Jeremiah.
    reason: lexical_alternative
  - marker: b
    text: Or “which is coming out to help you.” The Hebrew uses a participle; English renders it as past in light of the narrative situation.
    reason: lexical_alternative
  - marker: c
    text: Or “has turned back to the land of Egypt.”
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula; present-tense English is natural and reflects the formulaic force in context.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain; definite in sense because of the proper name 'Israel'.
- source_word: כֹּה תֹאמְרוּ
  chosen: Thus you shall say
  alternatives:
  - This is what you are to say
  - Thus say
  lexicon: HALOT
  rationale: Retains the formal prophetic instruction while remaining idiomatic modern English.
- source_word: הַשֹּׁלֵחַ אֶתְכֶם אֵלַי
  chosen: who sent you to me
  alternatives:
  - the one sending you to me
  - who is sending you to me
  lexicon: HALOT
  rationale: Although the participle is formally present, in this narrative setting English past tense is the most natural relative-clause rendering referring to the king's completed action.
- source_word: לְדָרְשֵׁנִי
  chosen: to inquire of me
  alternatives:
  - to seek me
  - to consult me
  - to inquire of the LORD through me
  lexicon: HALOT
  rationale: דרשׁ in this diplomatic-prophetic context means seeking an oracle/information from God through the prophet. 'Inquire of me' preserves the first-person wording of the Hebrew while fitting the immediate speech of the LORD.
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - Indeed
  - See
  lexicon: HALOT
  rationale: Marks emphatic attention to the announced reversal. 'Behold' preserves the prophetic tone without paraphrase.
- source_word: חֵיל פַּרְעֹה
  chosen: Pharaoh’s army
  alternatives:
  - the force of Pharaoh
  - Pharaoh's military force
  lexicon: HALOT
  rationale: חֵיל here denotes military force/army, not merely wealth or strength.
- source_word: הַיֹּצֵא לָכֶם לְעֶזְרָה
  chosen: which came out to help you
  alternatives:
  - which is coming out for your help
  - which came out for your assistance
  lexicon: HALOT
  rationale: The participle with context points to the Egyptian force that had set out in Judah's aid; English past tense best communicates the reference. 'Help' is more natural than the more formal 'assistance'.
- source_word: שָׁב
  chosen: has returned
  alternatives:
  - has turned back
  - returned
  lexicon: HALOT
  rationale: Conveys completed reversal with present relevance. 'Has returned' fits the announcement that Egyptian aid has withdrawn.
- source_word: לְאַרְצוֹ מִצְרַיִם
  chosen: to its own land, Egypt
  alternatives:
  - to his land, Egypt
  - to the land of Egypt
  lexicon: HALOT
  rationale: The suffix on 'land' refers back to Pharaoh's army as a collective associated with Egypt. 'Its own land, Egypt' preserves both the pronominal suffix and the appositional proper name.
