id: JER.37.9
reference: Jeremiah 37:9
source:
  edition: WLC
  text: כֹּ֣ה אָמַ֣ר יְהוָ֗ה אַל תַּשִּׁ֤אוּ נַפְשֹֽׁתֵי/כֶם֙ לֵ/אמֹ֔ר הָלֹ֛ךְ יֵלְכ֥וּ מֵ/עָלֵ֖י/נוּ הַ/כַּשְׂדִּ֑ים כִּי לֹ֖א יֵלֵֽכוּ׀־־׃
translation:
  text: 'Thus says Yahweh: Do not deceive yourselves, saying, ‘The Chaldeans will surely go away from us,’ for they will not go away.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not delude yourselves.' The Hebrew idiom literally involves 'your souls,' but here it warns against self-deception or false confidence.
    reason: lexical_alternative
  - marker: b
    text: Or, 'The Chaldeans will certainly depart from us.' The Hebrew uses an infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: c
    text: '''Chaldeans'' refers to the Babylonian forces.'
    reason: cultural_note
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. יְהוָה follows the doctrinal default rendering 'the LORD' rather than a transliteration.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אַל תַּשִּׁיאוּ נַפְשֹׁתֵיכֶם
  chosen: Do not deceive yourselves
  alternatives:
  - Do not delude yourselves
  - Do not lift up your souls
  lexicon: HALOT
  rationale: The idiom with נשׂא plus נפשׁ in this context means self-deception or false hope, not a literal 'lift up your souls.' 'Deceive yourselves' is clear modern English and fits the warning against wishful thinking.
- source_word: לֵאמֹר
  chosen: by saying
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Introduces the content of the self-deception. 'By saying' makes the syntactic relation to the prohibition explicit in natural English.
- source_word: הָלֹךְ יֵלְכוּ
  chosen: will surely go away
  alternatives:
  - will certainly go
  - will indeed depart
  lexicon: HALOT
  rationale: Infinitive absolute plus imperfect intensifies the verb. 'Will surely go away' preserves the emphatic force while sounding natural in English.
- source_word: מֵעָלֵינוּ
  chosen: from us
  alternatives:
  - from against us
  - away from us
  lexicon: HALOT
  rationale: The preposition with על can imply movement away from being over/against Judah. In idiomatic English here, 'from us' communicates the military withdrawal in context.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew specifically says 'Chaldeans.' While 'Babylonians' is contextually understandable, retaining 'Chaldeans' stays closer to the source and preserves the historical designation used in Jeremiah.
- source_word: כִּי לֹא יֵלֵכוּ
  chosen: for they will not go away
  alternatives:
  - for they will not leave
  - for they will not go
  lexicon: HALOT
  rationale: כִּי gives the reason for the prohibition. Repeating 'go away' mirrors the earlier verb and preserves the rhetorical contrast.
