id: JER.37.3
reference: Jeremiah 37:3
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֩ הַ/מֶּ֨לֶךְ צִדְקִיָּ֜הוּ אֶת יְהוּכַ֣ל בֶּן שֶֽׁלֶמְיָ֗ה וְ/אֶת צְפַנְיָ֤הוּ בֶן מַֽעֲשֵׂיָה֙ הַ/כֹּהֵ֔ן אֶל יִרְמְיָ֥הוּ הַ/נָּבִ֖יא לֵ/אמֹ֑ר הִתְפַּלֶּל נָ֣א בַעֲדֵ֔/נוּ אֶל יְהוָ֖ה אֱלֹהֵֽי/נוּ־־־־־־־׃
translation:
  text: Then King Zedekiah sent Jehucal son of Shelemiah and Zephaniah son of Maaseiah the priest to Jeremiah the prophet, saying, “Please pray to Yahweh our God for us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Jehucal; some English versions use the shortened form 'Jucal' in related contexts.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: Then ... sent
  alternatives:
  - And ... sent
  - sent
  lexicon: HALOT
  rationale: Wayyiqtol of שׁלח advances the narrative. 'Then ... sent' gives natural English narrative sequence while preserving the past action.
- source_word: הַמֶּלֶךְ צִדְקִיָּהוּ
  chosen: King Zedekiah
  alternatives:
  - the king, Zedekiah
  lexicon: HALOT
  rationale: English idiom normally places the title before the name. The definite article on 'king' is not separately represented because the proper-title construction is natural in English.
- source_word: יְהוּכַל
  chosen: Jehucal
  alternatives:
  - Jucal
  rationale: Standard transliteration from the Hebrew form יְהוּכַל. 'Jucal' reflects a shortened form known from Jeremiah 38:1 in some English traditions, but this verse's Hebrew form supports 'Jehucal'.
- source_word: בֶּן שֶׁלֶמְיָה
  chosen: son of Shelemiah
  alternatives: []
  rationale: Formal filial expression retained; 'son of' is standard and transparent.
- source_word: צְפַנְיָהוּ בֶן מַעֲשֵׂיָה הַכֹּהֵן
  chosen: Zephaniah son of Maaseiah, the priest
  alternatives:
  - Zephaniah the priest, son of Maaseiah
  lexicon: HALOT
  rationale: The appositional הַכֹּהֵן most naturally modifies Zephaniah in context. Comma placement in English clarifies that 'the priest' identifies Zephaniah.
- source_word: אֶל יִרְמְיָהוּ הַנָּבִיא
  chosen: to Jeremiah the prophet
  alternatives:
  - to the prophet Jeremiah
  lexicon: HALOT
  rationale: Either order is possible; this order stays close to the Hebrew while remaining idiomatic.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - with the message
  - to say
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive, introducing the direct speech without paraphrase.
- source_word: הִתְפַּלֶּל נָא
  chosen: Please pray
  alternatives:
  - Pray, please
  - I beg you, pray
  lexicon: HALOT
  rationale: Hitpael imperative of פלל means 'pray'; נָא adds politeness/entreaty. 'Please pray' is concise, natural, and preserves the request's tone.
- source_word: בַעֲדֵנוּ
  chosen: for us
  alternatives:
  - on our behalf
  lexicon: HALOT
  rationale: The preposition בעד here indicates intercession on behalf of someone. 'For us' is the most natural concise rendering; 'on our behalf' is possible but heavier.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  alternatives: []
  lexicon: HALOT
  rationale: Straightforward construct with first person plural suffix; retained fully because the speakers explicitly identify YHWH as 'our God'.
