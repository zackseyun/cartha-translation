id: JER.37.2
reference: Jeremiah 37:2
source:
  edition: WLC
  text: וְ/לֹ֥א שָׁמַ֛ע ה֥וּא וַ/עֲבָדָ֖י/ו וְ/עַ֣ם הָ/אָ֑רֶץ אֶל דִּבְרֵ֣י יְהוָ֔ה אֲשֶׁ֣ר דִּבֶּ֔ר בְּ/יַ֖ד יִרְמְיָ֥הוּ הַ/נָּבִֽיא־׃
translation:
  text: But he and his servants and the people of the land did not listen to the words of Yahweh that he spoke through Jeremiah the prophet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not obey the words of the LORD.' The Hebrew verb can mean 'hear,' 'listen to,' or, by implication, 'obey.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the people of the land,' an expression that can refer broadly to the populace or common people.
    reason: cultural_note
  - marker: c
    text: Literally 'by the hand of Jeremiah the prophet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֹא
  chosen: But ... did not
  alternatives:
  - And ... did not
  - Yet ... did not
  lexicon: HALOT
  rationale: The conjunction plus negation continues the narrative with contrast to the preceding verse; 'But' brings out the adversative force naturally in English without overstating it.
- source_word: שָׁמַע
  chosen: listen to
  alternatives:
  - hear
  - obey
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. Here the object is 'the words of the LORD,' and the context concerns refusal to heed prophetic warning. 'Listen to' preserves the auditory idiom while implying responsive attention, without making the stronger interpretive move to 'obey' in the main text.
- source_word: הוּא
  chosen: he
  alternatives:
  - he himself
  lexicon: HALOT
  rationale: The independent pronoun is explicit in Hebrew and serves to identify the king personally alongside the other groups. English 'he' is sufficient; adding 'himself' would overemphasize the pronoun.
- source_word: וַ/עֲבָדָיו
  chosen: and his servants
  alternatives:
  - and his officials
  - and his servants/slaves
  lexicon: HALOT
  rationale: In royal court context, עֲבָדִים often refers to royal servants/officials. 'Servants' is the broad, conventional rendering and fits the courtly setting; 'officials' is possible but somewhat interpretive.
- source_word: וְ/עַם הָ/אָרֶץ
  chosen: and the people of the land
  alternatives:
  - and the common people
  - and the people of the country
  lexicon: HALOT
  rationale: The phrase literally means 'people of the land.' While it can idiomatically refer to the populace/common people, the more transparent rendering is retained in the main text to preserve the Hebrew expression.
- source_word: דִּבְרֵי יְהוָה
  chosen: the words of the LORD
  alternatives:
  - the word of the LORD
  - the messages of the LORD
  lexicon: HALOT
  rationale: The plural construct דִּבְרֵי is best represented by 'words.' The divine name follows the project default 'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר דִּבֶּר
  chosen: that he spoke
  alternatives:
  - which he spoke
  - that he had spoken
  lexicon: HALOT
  rationale: The relative clause straightforwardly modifies 'the words of the LORD.' 'That he spoke' is natural modern English and keeps the subject as the LORD from the immediately preceding phrase.
- source_word: בְּ/יַד
  chosen: through
  alternatives:
  - by the hand of
  - by
  lexicon: HALOT
  rationale: The idiom 'by the hand of' means agency/instrumentality in prophetic mediation. 'Through' communicates the sense clearly in contemporary English while remaining faithful to the idiom.
- source_word: יִרְמְיָהוּ הַנָּבִיא
  chosen: Jeremiah the prophet
  alternatives:
  - the prophet Jeremiah
  lexicon: HALOT
  rationale: Both English orders are acceptable. 'Jeremiah the prophet' follows the Hebrew sequence more closely and reads naturally.
