id: JER.37.17
reference: Jeremiah 37:17
source:
  edition: WLC
  text: וַ/יִּשְׁלַח֩ הַ/מֶּ֨לֶךְ צִדְקִיָּ֜הוּ וַ/יִּקָּחֵ֗/הוּ וַ/יִּשְׁאָלֵ֨/הוּ הַ/מֶּ֤לֶךְ בְּ/בֵית/וֹ֙ בַּ/סֵּ֔תֶר וַ/יֹּ֕אמֶר הֲ/יֵ֥שׁ דָּבָ֖ר מֵ/אֵ֣ת יְהוָ֑ה וַ/יֹּ֤אמֶר יִרְמְיָ֨הוּ֙ יֵ֔שׁ וַ/יֹּ֕אמֶר בְּ/יַ֥ד מֶֽלֶךְ בָּבֶ֖ל תִּנָּתֵֽן־׃ס
translation:
  text: Then King Zedekiah sent and had him brought, and the king questioned him privately in his house, and said, “Is there any word from Yahweh?” Jeremiah said, “There is.” Then he said, “You will be given into the hand of the king of Babylon.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in secret.”
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew idiom: “into the hand of,” that is, into the power of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent for
  lexicon: HALOT
  rationale: Basic sense of שלח is 'send.' In context, with the following וַיִּקָּחֵהוּ, the king sends to have Jeremiah brought. 'Sent' keeps the Hebrew sequence transparent; the causative nuance is carried by the next clause.
- source_word: וַיִּקָּחֵהוּ
  chosen: had him brought
  alternatives:
  - took him
  - fetched him
  lexicon: HALOT
  rationale: Literal 'took him' is possible, but in context the king is not personally seizing Jeremiah; he orders his retrieval. 'Had him brought' conveys the idiomatic force in readable English without over-paraphrasing.
- source_word: וַיִּשְׁאָלֵהוּ
  chosen: questioned him
  alternatives:
  - asked him
  - inquired of him
  lexicon: HALOT
  rationale: The verb שאל means 'ask/inquire.' 'Questioned him' fits the royal interrogation setting and the direct speech that follows.
- source_word: בְּבֵיתוֹ
  chosen: in his house
  alternatives:
  - in his palace
  lexicon: HALOT
  rationale: The Hebrew says 'in his house.' Since בית can refer to a royal residence, 'palace' is interpretive; 'house' preserves the source wording while remaining natural.
- source_word: בַּסֵּתֶר
  chosen: privately
  alternatives:
  - in secret
  - secretly
  lexicon: HALOT
  rationale: The noun means 'secret, secrecy, hidden place.' 'Privately' expresses the adverbial force smoothly in English. A more formal alternative is preserved in a footnote.
- source_word: הֲיֵשׁ דָּבָר מֵאֵת יְהוָה
  chosen: Is there any word from the LORD?
  alternatives:
  - Is there a word from the LORD?
  - Is there any message from the LORD?
  lexicon: HALOT
  rationale: דָּבָר can mean 'word' or 'message.' In prophetic contexts, 'word from the LORD' is a standard biblical expression and preserves intertextual resonance. YHWH is rendered 'the LORD' per doctrine.
- source_word: יֵשׁ
  chosen: There is
  alternatives:
  - Yes, there is
  lexicon: HALOT
  rationale: The terse Hebrew reply is simply 'There is.' Keeping it brief preserves the dramatic force before Jeremiah states the content.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - by the hand of
  - into the power of
  lexicon: HALOT
  rationale: The idiom 'into the hand of' is common in Hebrew for being delivered into someone's power. It is transparent enough in English and preserves biblical diction; a more idiomatic alternative is footnoted.
- source_word: תִּנָּתֵן
  chosen: you will be given
  alternatives:
  - you will be delivered
  - you will be handed over
  lexicon: HALOT
  rationale: 'The Niphal of נתן here is passive: ''be given.'' This preserves the lexical link to the Hebrew while fitting the judgment context. ''Delivered'' is possible but slightly more interpretive.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
