theological_decisions:
- issue: Anthropological sense of לֵב
  chosen_reading: heart
  alternative_readings:
  - mind
  - inner being
  rationale: Hebrew לֵב often includes thought, intention, and will. 'Heart' preserves
    the source-language anthropology rather than reducing it to modern cognitive terminology.
  doctrine_reference: DOCTRINE.md Translation philosophy §4, §6
- issue: Whether to compress נִבְּאֵי הַשָּׁקֶר into the traditional label 'false
    prophets'
  chosen_reading: those who prophesy falsehood
  alternative_readings:
  - false prophets
  rationale: The Hebrew emphasizes the act/content of prophesying falsely, not merely
    a categorical title. Preserving the verbal force better reflects the source text
    and avoids importing a more interpretive shorthand.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
