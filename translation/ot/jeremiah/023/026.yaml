id: JER.23.26
reference: Jeremiah 23:26
source:
  edition: WLC
  text: עַד מָתַ֗י הֲ/יֵ֛שׁ בְּ/לֵ֥ב הַ/נְּבִאִ֖ים נִבְּאֵ֣י הַ/שָּׁ֑קֶר וּ/נְבִיאֵ֖י
    תַּרְמִ֥ת לִבָּֽ/ם־׃
translation:
  text: How long will this be in the heart of the prophets, those who prophesy falsehood
    and who prophesy the deceit of their own heart?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'Is there in the heart of the prophets...?' The Hebrew
      is elliptical, and the translation makes the implied sense explicit in English.
    reason: lexical_alternative
  - marker: b
    text: '''Those who prophesy falsehood'' could be rendered more compactly as ''false
      prophets.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד מָתַי
  chosen: How long
  alternatives:
  - Until when
  lexicon: HALOT
  rationale: Idiomatic temporal-interrogative expression introducing divine exasperation;
    'How long' is standard, natural English.
- source_word: הֲיֵשׁ
  chosen: will this be
  alternatives:
  - is there
  - does there remain
  lexicon: HALOT
  rationale: The Hebrew uses the existential particle with an interrogative force
    in context. Because English requires a more explicit predicate, 'will this be'
    supplies the implied situation under discussion from the surrounding denunciation.
    This best captures the sense without woodenly preserving an awkward 'is there
    in the heart...?' construction.
- source_word: בְּלֵב
  chosen: in the heart
  alternatives:
  - in the mind
  - within
  lexicon: HALOT
  rationale: לֵב in Hebrew commonly denotes the inner thought/will center, not merely
    emotion. 'Heart' preserves the biblical anthropology and idiom.
- source_word: הַנְּבִאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun.
- source_word: נִבְּאֵי הַשָּׁקֶר
  chosen: those who prophesy falsehood
  alternatives:
  - the prophets of falsehood
  - false prophets
  lexicon: HALOT
  rationale: 'The participial form is active and verbal: ''those who prophesy falsehood.''
    This is more formally aligned to the Hebrew than the compressed label ''false
    prophets,'' while remaining readable.'
- source_word: וּנְבִיאֵי
  chosen: and who prophesy
  alternatives:
  - and prophets of
  lexicon: HALOT
  rationale: Though pointed like a noun in the consonantal sequence, the parallelism
    with the prior participial expression and the following genitive favors a verbal
    sense in English. Rendering verbally keeps the parallel denunciation clear.
- source_word: תַּרְמִת
  chosen: the deceit
  alternatives:
  - deception
  - delusion
  lexicon: HALOT
  rationale: The noun denotes deceit or treachery. 'Deceit' is concise and fits the
    moral charge of self-generated lying prophecy.
- source_word: לִבָּם
  chosen: of their own heart
  alternatives:
  - of their heart
  - from their own heart
  lexicon: HALOT
  rationale: The possessive is explicit in Hebrew. Adding 'own' clarifies that the
    source of the prophecy is internal to them, matching the polemical force in context.
