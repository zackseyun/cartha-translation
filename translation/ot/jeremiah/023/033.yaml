theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Interpretation of the difficult phrase אֶת מַה מַשָּׂא
  chosen_reading: '''You are the burden'' as a rhetorical reversal'
  alternative_readings:
  - '''What burden?'''
  - '''As for the burden...'''
  rationale: The verse appears to mock the repeated question 'What is the burden of the LORD?' by turning 'burden' back on the questioners. The following clause 'and I will cast you off' coheres naturally with identifying them as the burden. This preserves the prophetic irony without flattening the Hebrew difficulty.
