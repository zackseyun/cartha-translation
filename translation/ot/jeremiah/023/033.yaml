id: JER.23.33
reference: Jeremiah 23:33
source:
  edition: WLC
  text: וְ/כִי יִשְׁאָלְ/ךָ֩ הָ/עָ֨ם הַ/זֶּ֜ה אֽוֹ הַ/נָּבִ֤יא אֽוֹ כֹהֵן֙ לֵ/אמֹ֔ר
    מַה מַשָּׂ֖א יְהוָ֑ה וְ/אָמַרְתָּ֤ אֲלֵי/הֶם֙ אֶת מַה מַשָּׂ֔א וְ/נָטַשְׁתִּ֥י
    אֶתְ/כֶ֖ם נְאֻם יְהוָֽה־־־־־־־׃
translation:
  text: And when this people, or a prophet, or a priest asks you, saying, ‘What is
    the burden of the LORD?’ then you shall say to them, ‘You are the burden, and
    I will cast you off,’ declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew מַשָּׂא (massaʾ) can mean ''burden'' or ''oracle/message.'' The
      verse likely uses deliberate wordplay: those asking for the LORD’s ''burden''
      are themselves called the burden.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'What burden?' The Hebrew of the reply is difficult, and some understand
      it as rejecting the phrase 'the burden of the LORD' rather than saying, 'You
      are the burden.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְכִי
  chosen: And when
  alternatives:
  - And if
  - For when
  lexicon: HALOT
  rationale: In context this introduces a recurring situation rather than a strict
    conditional only. 'And when' fits the discourse flow and the prophetic instruction
    better than a bare 'if,' while preserving the conjunction.
- source_word: יִשְׁאָלְךָ
  chosen: asks you
  alternatives:
  - inquires of you
  - questions you
  lexicon: HALOT
  rationale: The verb שאל commonly means 'ask, inquire.' 'Asks you' is natural modern
    English and sufficient for the direct-speech setting.
- source_word: הָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this people here
  - these people
  lexicon: HALOT
  rationale: Jeremiah frequently uses 'this people' as a marked expression of prophetic
    distance and rebuke. Retaining the singular collective preserves that tone better
    than smoothing to 'these people.'
- source_word: הַנָּבִיא ... כֹהֵן
  chosen: a prophet, or a priest
  alternatives:
  - the prophet, or the priest
  lexicon: HALOT
  rationale: 'Though the prophet has the article, English idiom in this distributive
    sequence is better with indefinite singulars: any member of these groups may ask.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - asking
  - with the words
  lexicon: HALOT
  rationale: Standard rendering of the quotative infinitive, preserving the direct-speech
    introduction.
- source_word: מַה מַשָּׂא יְהוָה
  chosen: What is the burden of the LORD?
  alternatives:
  - What is the oracle of the LORD?
  - What message from the LORD?
  lexicon: HALOT
  rationale: מַשָּׂא can mean 'burden' and by extension a prophetic utterance/oracle.
    Here the passage exploits the double sense polemically, so 'burden' should be
    retained in the main text to preserve the wordplay that is answered in the next
    clause.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  chosen: then you shall say to them
  alternatives:
  - and you shall say to them
  - you must say to them
  lexicon: HALOT
  rationale: This is an instruction to Jeremiah about what to reply. 'Then' makes
    the sequence explicit in English.
- source_word: אֶת מַה מַשָּׂא
  chosen: You are the burden
  alternatives:
  - What burden?
  - The burden is this
  - As for the burden
  lexicon: HALOT
  rationale: The Hebrew is difficult and elliptical. The direct-object marker אֶת
    before מַה likely signals an exclamatory or accusative construction, and the following
    divine response about casting them off strongly supports taking the people themselves
    as the 'burden.' This rendering preserves the rhetorical reversal central to the
    verse.
- source_word: וְנָטַשְׁתִּי אֶתְכֶם
  chosen: and I will cast you off
  alternatives:
  - and I will forsake you
  - and I will abandon you
  lexicon: HALOT
  rationale: נטשׁ means leave, forsake, cast off. 'Cast you off' pairs well with the
    burden imagery and sounds judicial without becoming archaic.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula in readable modern English.
