id: JER.23.29
reference: Jeremiah 23:29
source:
  edition: WLC
  text: הֲ/ל֨וֹא כֹ֧ה דְבָרִ֛/י כָּ/אֵ֖שׁ נְאֻם יְהוָ֑ה וּ/כְ/פַטִּ֖ישׁ יְפֹ֥צֵֽץ
    סָֽלַע־׃ס
translation:
  text: Is not my word like fire—oracle of the LORD—and like a hammer that shatters
    rock?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'declares the LORD.' The Hebrew prophetic formula is literally 'oracle
      of the LORD' or 'utterance of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹוא
  chosen: Is not
  alternatives:
  - Is it not
  - Surely
  lexicon: HALOT
  rationale: Introduces a rhetorical question expecting an affirmative answer. 'Is
    not' preserves the interrogative force more directly than the more interpretive
    'Surely'.
- source_word: כֹה
  chosen: like this / like
  alternatives:
  - thus
  - so
  lexicon: HALOT
  rationale: In this comparative construction with כָּאֵשׁ, the sense is effectively
    'like this' or 'thus,' introducing the comparison. In idiomatic English, the comparison
    is best carried by 'like' in the full clause rather than a wooden 'thus'.
- source_word: דְבָרִי
  chosen: my word
  alternatives:
  - my words
  - what I say
  lexicon: HALOT
  rationale: Although דָּבָר can be collective, the singular 'my word' is natural
    in English and fits the singular predicate imagery ('like fire ... like a hammer').
    It also preserves the prophetic emphasis on the divine utterance as a unified
    force.
- source_word: כָּאֵשׁ
  chosen: like fire
  alternatives:
  - as fire
  lexicon: HALOT
  rationale: Standard comparative use of כ. 'Like fire' is idiomatic modern English
    and preserves the metaphor's vividness.
- source_word: נְאֻם יְהוָה
  chosen: oracle of the LORD
  alternatives:
  - declares the LORD
  - utterance of the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic formula meaning 'utterance/oracle.' 'Oracle of the
    LORD' preserves the nominal force of the Hebrew more transparently than converting
    it into a finite verb ('declares'). The divine name follows doctrine default as
    'the LORD' for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD.'
- source_word: וּכְפַטִּישׁ
  chosen: and like a hammer
  alternatives:
  - and as a hammer
  - and like a sledgehammer
  lexicon: HALOT
  rationale: פַּטִּישׁ denotes a hammer or smith's hammer. 'Hammer' is sufficiently
    strong without over-specifying the tool. The prefixed conjunction and comparative
    are preserved.
- source_word: יְפֹצֵץ
  chosen: that shatters
  alternatives:
  - that breaks in pieces
  - that smashes
  lexicon: HALOT
  rationale: The verb conveys violent breaking or smashing into pieces. 'Shatters'
    is vivid, natural English and matches the metaphorical force without becoming
    colloquial.
- source_word: סָלַע
  chosen: rock
  alternatives:
  - crag
  - cliff
  lexicon: HALOT
  rationale: סֶלַע commonly denotes rock, often a large rock or crag. In this metaphor,
    'rock' is the clearest and most idiomatic English choice.
