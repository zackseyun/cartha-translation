theological_decisions:
- issue: Rendering the prophetic formula נְאֻם יְהוָה
  chosen_reading: oracle of the LORD
  alternative_readings:
  - declares the LORD
  - utterance of the LORD
  rationale: The Hebrew uses a nominal prophetic formula rather than a finite verb.
    'Oracle of the LORD' preserves that form and solemnity while remaining readable.
    The divine name is rendered according to the doctrine default for יְהוָה.
  doctrine_reference: 'Contested terms: יְהוָה YHWH → the LORD; Translation philosophy
    §1, §6'
