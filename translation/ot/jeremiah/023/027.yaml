id: JER.23.27
reference: Jeremiah 23:27
source:
  edition: WLC
  text: הַ/חֹשְׁבִ֗ים לְ/הַשְׁכִּ֤יחַ אֶת עַמִּ/י֙ שְׁמִ֔/י בַּ/חֲל֣וֹמֹתָ֔/ם אֲשֶׁ֥ר
    יְסַפְּר֖וּ אִ֣ישׁ לְ/רֵעֵ֑/הוּ כַּ/אֲשֶׁ֨ר שָׁכְח֧וּ אֲבוֹתָ֛/ם אֶת שְׁמִ֖/י
    בַּ/בָּֽעַל־־׃
translation:
  text: who plan to make my people forget my name by their dreams that they tell,
    each man to his neighbor, just as their fathers forgot my name because of Baal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through their dreams.' The Hebrew preposition can mark means or sphere.
    reason: lexical_alternative
  - marker: b
    text: Or 'for Baal' or 'through Baal.' The Hebrew likely means that devotion to
      Baal led them to forget the LORD's name.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֹשְׁבִים
  chosen: who plan
  alternatives:
  - who think
  - who intend
  lexicon: HALOT
  rationale: The participle from חשׁב here describes deliberate intention rather than
    mere cognition. 'Who plan' captures the active scheming sense in context of false
    prophets.
- source_word: לְהַשְׁכִּיחַ
  chosen: to make ... forget
  alternatives:
  - to cause ... to forget
  lexicon: HALOT
  rationale: Hiphil infinitive of שׁכח is causative. English idiom favors 'make ...
    forget' while preserving the causative force.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard covenantal expression; no reason to flatten to 'the people'
    since the possessive is explicit.
- source_word: שְׁמִי
  chosen: my name
  lexicon: HALOT
  rationale: Retained literally. In prophetic context 'name' carries covenantal identity
    and reputation, but the text itself says 'name,' so the literal rendering preserves
    that theological weight.
- source_word: בַּחֲלֹמוֹתָם
  chosen: by their dreams
  alternatives:
  - through their dreams
  - in their dreams
  lexicon: HALOT
  rationale: 'The preposition marks means/instrument here: the dreams they report
    are the means by which they seek to cause forgetfulness. ''By'' is concise and
    natural.'
- source_word: אֲשֶׁר יְסַפְּרוּ
  chosen: that they tell
  alternatives:
  - which they recount
  - that they relate
  lexicon: HALOT
  rationale: ספר in the piel commonly means recount/tell. 'Tell' is readable modern
    English and fits the oral exchange described.
- source_word: אִישׁ לְרֵעֵהוּ
  chosen: each man to his neighbor
  alternatives:
  - one to another
  - each one to his companion
  lexicon: HALOT
  rationale: This preserves the distributive force of איש and follows the project's
    gender-accurate policy. 'Neighbor' fits רֵעַ in this interpersonal setting.
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - like
  lexicon: HALOT
  rationale: Introduces a comparison with the fathers' prior forgetting; 'just as'
    makes the analogy explicit.
- source_word: שָׁכְחוּ אֲבוֹתָם
  chosen: their fathers forgot
  alternatives:
  - their ancestors forgot
  lexicon: HALOT
  rationale: '''Fathers'' is the more literal rendering of אבות and suits the intergenerational
    comparison. ''Ancestors'' is possible but less direct.'
- source_word: בַּבָּעַל
  chosen: because of Baal
  alternatives:
  - for Baal
  - through Baal
  lexicon: HALOT
  rationale: 'The beth here is best taken as indicating occasion or association: they
    forgot the LORD''s name in connection with devotion to Baal. ''Because of Baal''
    communicates the causal/associative sense clearly in English while preserving
    the proper name.'
