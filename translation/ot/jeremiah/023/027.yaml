theological_decisions:
- issue: Rendering of covenantal 'name' language
  chosen_reading: Kept literal as 'my name' in both occurrences
  alternative_readings:
  - my renown
  - who I am
  rationale: The verse indicts covenantal apostasy and false prophecy. Literal 'my
    name' preserves the biblical theology of God's revealed identity without interpretive
    expansion.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Gendered distributive expression אִישׁ לְרֵעֵהוּ
  chosen_reading: each man to his neighbor
  alternative_readings:
  - each one to another
  rationale: The source uses grammatically masculine singular with representative
    force. Per doctrine, gender-accurate rendering is preferred over neutralizing
    the expression.
  doctrine_reference: Translation philosophy §4
