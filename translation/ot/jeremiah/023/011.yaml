id: JER.23.11
reference: Jeremiah 23:11
source:
  edition: WLC
  text: כִּֽי גַם נָבִ֥יא גַם כֹּהֵ֖ן חָנֵ֑פוּ גַּם בְּ/בֵיתִ֛/י מָצָ֥אתִי רָעָתָ֖/ם נְאֻם יְהוָֽה־־־־־׃
translation:
  text: For both prophet and priest are ungodly; even in my house I have found their evil, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'are profane,' 'are polluted,' or 'are hypocritical.' The Hebrew verb carries the sense of moral-religious corruption or godlessness.
    reason: lexical_alternative
  - marker: b
    text: '''My house'' refers to the temple.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the reason or grounds for the preceding judgment context. 'For' preserves the explanatory force in natural English.
- source_word: גַם ... גַם
  chosen: both ... and
  alternatives:
  - also ... also
  - even ... and
  lexicon: HALOT
  rationale: The repeated גַם before 'prophet' and 'priest' is best represented idiomatically as 'both ... and,' marking that both groups are implicated.
- source_word: נָבִיא
  chosen: prophet
  lexicon: HALOT
  rationale: Standard rendering for נָבִיא; no contextual reason to vary.
- source_word: כֹּהֵן
  chosen: priest
  lexicon: HALOT
  rationale: Standard rendering for כֹּהֵן; fits the temple and cultic context.
- source_word: חָנֵפוּ
  chosen: are ungodly
  alternatives:
  - are polluted
  - are profane
  - are hypocritical
  lexicon: HALOT
  rationale: The verb from חנף conveys being godless, profane, or morally polluted rather than merely insincere. 'Are ungodly' captures the ethical-religious corruption in a clear modern English form. 'Hypocritical' is too narrow, and 'polluted/profane' are possible but less natural here.
- source_word: גַּם
  chosen: even
  alternatives:
  - also
  lexicon: HALOT
  rationale: 'The third גַם heightens the accusation: not only are prophet and priest corrupt, but ''even'' in the LORD''s own house their evil is found.'
- source_word: בְּבֵיתִי
  chosen: in my house
  alternatives:
  - in my temple
  lexicon: HALOT
  rationale: Literally 'in my house.' Since the speaker is the LORD, this refers to the temple, but 'house' preserves the Hebrew expression while remaining understandable.
- source_word: מָצָאתִי
  chosen: I have found
  alternatives:
  - I found
  lexicon: HALOT
  rationale: The perfect can be rendered simply as past, but 'I have found' works well in English to express the LORD's discovered assessment with present relevance.
- source_word: רָעָתָם
  chosen: their evil
  alternatives:
  - their wickedness
  - their wrongdoing
  lexicon: HALOT
  rationale: רָעָה here denotes moral evil or wickedness. 'Their evil' is concise and close to the Hebrew; 'wickedness' is also viable but slightly more interpretive in tone.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic modern English and preserves the solemn prophetic force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance with DOCTRINE.md.
