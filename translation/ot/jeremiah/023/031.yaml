id: JER.23.31
reference: Jeremiah 23:31
source:
  edition: WLC
  text: הִנְ/נִ֥י עַל הַ/נְּבִיאִ֖ם נְאֻם יְהוָ֑ה הַ/לֹּקְחִ֣ים לְשׁוֹנָ֔/ם וַֽ/יִּנְאֲמ֖וּ
    נְאֻֽם־־׃
translation:
  text: Behold, I am against the prophets, declares the LORD, who take their own tongues
    and declare, ‘Declaration!’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “who use their tongues and say, ‘Oracle!’” The Hebrew is terse and likely
      ironic, portraying prophets who manufacture authoritative-sounding speech from
      their own mouths.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: Introduces a solemn divine announcement with emphatic first-person presence.
    'Behold' preserves the prophetic force better than a flatter modern discourse
    marker.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  lexicon: HALOT
  rationale: In the idiom 'I am against X,' עַל conveys opposition/judgment, not mere
    spatial relation.
- source_word: הַנְּבִיאִם
  chosen: the prophets
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun; context identifies them
    as the false prophets denounced in this oracle, but the Hebrew here simply says
    'the prophets.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - utterance of the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic modern English
    and preserves the authoritative speech formula. 'the LORD' follows the doctrinal
    default for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows DOCTRINE.md contested-terms default for the divine name.
- source_word: הַלֹּקְחִים
  chosen: who take
  alternatives:
  - who seize
  - who use
  lexicon: HALOT
  rationale: The participle literally means 'taking.' Here it introduces the characterization
    of these prophets' manipulative speech. A more interpretive gloss like 'use' is
    possible but less transparent to the Hebrew.
- source_word: לְשׁוֹנָם
  chosen: their own tongues
  alternatives:
  - their tongues
  - their own speech
  lexicon: HALOT
  rationale: 'Literally ''their tongue(s).'' ''Their own tongues'' makes explicit
    the contrast with genuine divine speech: they speak from themselves. ''Speech''
    is interpretive and therefore kept as an alternative only.'
- source_word: וַיִּנְאֲמוּ
  chosen: and declare
  alternatives:
  - and utter an oracle
  - and say
  lexicon: HALOT
  rationale: 'From the same root as נְאֻם, creating a wordplay: they ''oracle'' an
    ''oracle.'' ''Declare'' is readable English while still echoing the prophetic
    formula. The more formal ''utter an oracle'' is possible but wooden in the main
    text.'
- source_word: נְאֻם
  chosen: ‘Declaration!’
  alternatives:
  - ‘Oracle!’
  - ‘He declares!’
  lexicon: HALOT
  rationale: The final accusative noun is abrupt and likely mimics the false prophets'
    formulaic claim to authority. Rendering it as a quoted exclamation preserves the
    terseness and irony. 'Oracle!' is a viable alternative, but 'Declaration!' better
    matches the repeated English rendering of the same root in this verse.
