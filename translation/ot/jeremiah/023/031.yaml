theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name in a prophetic judgment formula.
    Per DOCTRINE.md, the default rendering is 'the LORD.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Whether to make explicit that these are false prophets
  chosen_reading: the prophets
  alternative_readings:
  - the false prophets
  rationale: The broader context condemns them as false, but this verse itself says
    only 'the prophets.' To avoid importing an interpretive label not present in the
    Hebrew, the main text retains the literal expression.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
