id: JER.23.37
reference: Jeremiah 23:37
source:
  edition: WLC
  text: כֹּ֥ה תֹאמַ֖ר אֶל הַ/נָּבִ֑יא מֶה עָנָ֣/ךְ יְהוָ֔ה וּ/מַה דִּבֶּ֖ר יְהוָֽה־־־׃
translation:
  text: 'This is what you shall say to the prophet: ‘What has the LORD answered you,
    and what has the LORD spoken?’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''What has Yahweh answered you, and what has Yahweh spoken?'''
    reason: alternative_reading
lexical_decisions:
- source_word: כֹּה
  chosen: This is what
  alternatives:
  - Thus
  - Like this
  lexicon: HALOT
  rationale: Introduces a prescribed formula of speech. 'This is what' is natural
    modern English and preserves the directive force without archaic tone.
- source_word: תֹאמַר
  chosen: you shall say
  alternatives:
  - you will say
  - say
  lexicon: HALOT
  rationale: Second masculine singular imperfect used instructionally; 'shall say'
    fits the prescriptive context better than a simple future.
- source_word: אֶל הַנָּבִיא
  chosen: to the prophet
  alternatives:
  - to the prophet himself
  lexicon: HALOT
  rationale: Direct object of address. Singular is retained because the Hebrew is
    singular.
- source_word: מֶה
  chosen: What
  alternatives:
  - How
  lexicon: HALOT
  rationale: Interrogative pronoun introducing the content of the question; 'what'
    is the plain sense.
- source_word: עָנָךְ
  chosen: has ... answered you
  alternatives:
  - answered you
  - replied to you
  lexicon: HALOT
  rationale: From ענה in the sense 'answer, reply.' The suffix is second feminine
    singular in form, but in English the gender is not marked; 'answered you' best
    captures the verbal sense. The perfect is rendered with English present perfect
    in direct speech for naturalness.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD.'
    This also matches established English Bible convention for the Tetragrammaton.
- source_word: וּמַה
  chosen: and what
  alternatives:
  - and how
  lexicon: HALOT
  rationale: Coordinates a second interrogative clause parallel to the first.
- source_word: דִּבֶּר
  chosen: has ... spoken
  alternatives:
  - said
  - declared
  lexicon: HALOT
  rationale: דבר commonly means 'speak.' 'Has spoken' preserves the verbal parallel
    with 'has answered' and avoids flattening both clauses into the same English verb.
