theological_decisions:
- issue: Rendering the metaphor of shepherds and sheep
  chosen_reading: Keep the pastoral metaphor in the main text rather than replacing it with 'leaders' and 'people.'
  alternative_readings:
  - Woe to the leaders who destroy and scatter my people
  rationale: The Hebrew explicitly uses shepherd/flock imagery, which is theologically and literarily important in Jeremiah 23 and its broader biblical context. Preserving the metaphor avoids interpretive flattening while remaining understandable.
