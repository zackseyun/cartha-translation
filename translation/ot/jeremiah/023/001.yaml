id: JER.23.1
reference: Jeremiah 23:1
source:
  edition: WLC
  text: ה֣וֹי רֹעִ֗ים מְאַבְּדִ֧ים וּ/מְפִצִ֛ים אֶת צֹ֥אן מַרְעִיתִ֖/י נְאֻם יְהוָֽה־־׃
translation:
  text: Woe to the shepherds who are destroying and scattering the sheep of my pasture, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the flock of my pasture.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  chosen: Woe
  alternatives:
  - Ah
  - Alas
  lexicon: HALOT
  rationale: An interjection of denunciation or lament. 'Woe' best preserves the prophetic force of judgment in English.
- source_word: רֹעִים
  chosen: shepherds
  alternatives:
  - pastors
  - leaders
  lexicon: HALOT
  rationale: Literally 'shepherds.' In Jeremiah this is a metaphor for rulers/leaders, but the metaphor should be preserved in the main text rather than interpreted away.
- source_word: מְאַבְּדִים
  chosen: are destroying
  alternatives:
  - destroy
  - are causing to perish
  - are ruining
  lexicon: HALOT
  rationale: The participle conveys ongoing action; 'are destroying' reflects the durative sense and the severity of אבד in context.
- source_word: וּמְפִצִים
  chosen: and scattering
  alternatives:
  - and dispersing
  - and driving away
  lexicon: HALOT
  rationale: The participle parallels the previous one and describes dispersal of the flock. 'Scattering' is the most natural and contextually fitting rendering.
- source_word: אֶת צֹאן
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: HALOT
  rationale: צֹאן is literally small livestock/flock, but with shepherd imagery 'the sheep' keeps the concrete metaphor vivid. 'Flock' is possible but less explicit.
- source_word: מַרְעִיתִי
  chosen: of my pasture
  alternatives:
  - that I pasture
  - under my care
  - my flock's pasture
  lexicon: HALOT
  rationale: The noun means pasture/pasturage, and with the 1cs suffix it is literally 'my pasture.' The genitival English phrase 'the sheep of my pasture' is idiomatic and preserves the imagery of belonging to the LORD's care.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Declares the LORD' is clear modern English and preserves the solemn prophetic register.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
