id: JER.23.21
reference: Jeremiah 23:21
source:
  edition: WLC
  text: לֹא שָׁלַ֥חְתִּי אֶת הַ/נְּבִאִ֖ים וְ/הֵ֣ם רָ֑צוּ לֹא דִבַּ֥רְתִּי אֲלֵי/הֶ֖ם
    וְ/הֵ֥ם נִבָּֽאוּ־־־׃
translation:
  text: I did not send the prophets, yet they ran; I did not speak to them, yet they
    prophesied.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'but they ran.' The Hebrew conjunction can be rendered simply 'and,'
      but here it carries a strong contrast.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלַחְתִּי
  chosen: send
  alternatives:
  - commission
  - dispatch
  lexicon: HALOT
  rationale: The verb שׁלח commonly means 'send.' In prophetic context it can imply
    commissioning, but 'send' is the plain sense and preserves the metaphor of divine
    authorization without over-interpreting.
- source_word: הַנְּבִאִים
  chosen: the prophets
  alternatives:
  - these prophets
  lexicon: HALOT
  rationale: With the article, 'the prophets' is the natural rendering, referring
    to the prophetic figures under indictment in context. 'These prophets' would make
    the deixis more explicit than the Hebrew requires.
- source_word: רָצוּ
  chosen: ran
  alternatives:
  - hurried
  - went running
  lexicon: HALOT
  rationale: רץ literally means 'run.' Here it is metaphorical for acting eagerly
    or rushing into ministry without divine commission. 'Ran' preserves the vivid
    Hebrew image better than a more interpretive gloss.
- source_word: דִבַּרְתִּי אֲלֵיהֶם
  chosen: speak to them
  alternatives:
  - speak with them
  - address them
  lexicon: HALOT
  rationale: The idiom דבר אל means 'speak to.' This wording keeps the directness
    of divine revelation without adding interpretive nuance.
- source_word: נִבָּאוּ
  chosen: prophesied
  alternatives:
  - spoke as prophets
  lexicon: HALOT
  rationale: The Niphal of נבא is the standard verb for prophetic speech, 'prophesy.'
    This is the most direct and idiomatic English equivalent.
- source_word: וְהֵם
  chosen: yet they
  alternatives:
  - and they
  - but they
  lexicon: HALOT
  rationale: 'Although ו can be simply ''and,'' the context is adversative: despite
    God''s not sending or speaking, they acted anyway. ''Yet they'' brings out the
    contrast naturally in English.'
- source_word: לֹא
  chosen: did not
  alternatives:
  - have not
  lexicon: HALOT
  rationale: The Hebrew negation with perfect verbs refers to completed past action
    in this context. English simple past is the best fit.
