theological_decisions:
- issue: Nature of the false prophets' activity
  chosen_reading: The verse states that these prophets acted without divine commission
    or revelation.
  alternative_readings:
  - The verse could be read more weakly as criticizing haste rather than denying all
    commission.
  rationale: The paired clauses 'I did not send' and 'I did not speak' strongly indicate
    lack of divine authorization and revelation. The translation preserves that indictment
    without expanding into broader doctrinal claims about prophecy beyond the verse
    itself.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather
    than resolve it'
