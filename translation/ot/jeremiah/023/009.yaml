id: JER.23.9
reference: Jeremiah 23:9
source:
  edition: WLC
  text: לַ/נְּבִאִ֞ים נִשְׁבַּ֧ר לִבִּ֣/י בְ/קִרְבִּ֗/י רָֽחֲפוּ֙ כָּל עַצְמוֹתַ֔/י הָיִ֨יתִי֙ כְּ/אִ֣ישׁ שִׁכּ֔וֹר וּ/כְ/גֶ֖בֶר עֲבָ֣ר/וֹ יָ֑יִן מִ/פְּנֵ֣י יְהוָ֔ה וּ/מִ/פְּנֵ֖י דִּבְרֵ֥י קָדְשֽׁ/וֹ־׃
translation:
  text: 'Concerning the prophets: my heart is broken within me; all my bones tremble. I have become like a drunken man, like a strong man overcome by wine, because of Yahweh and because of his holy words.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Against the prophets'; the Hebrew preposition can introduce the subject matter of the oracle or, more interpretively, its adversative force.
    reason: alternative_reading
  - marker: b
    text: Or 'all my bones shake' or 'quiver.'
    reason: lexical_alternative
  - marker: c
    text: Or 'before the LORD and before his holy words'; here 'because of' is taken as expressing the cause of the prophet's overwhelmed condition.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַנְּבִאִים
  chosen: Concerning the prophets
  alternatives:
  - Against the prophets
  - As for the prophets
  lexicon: HALOT
  rationale: The prefixed ל here introduces the topic heading of the oracle rather than direct motion. 'Concerning the prophets' best reflects the discourse function in readable English; 'Against the prophets' is interpretive and better left implicit from context.
- source_word: נִשְׁבַּר לִבִּי בְקִרְבִּי
  chosen: my heart is broken within me
  alternatives:
  - my heart has been broken within me
  lexicon: HALOT
  rationale: The Niphal of שבר conveys a broken/shattered state. Present English 'is broken' communicates the resultant condition naturally, while 'within me' preserves בְקִרְבִּי.
- source_word: רָחֲפוּ כָּל עַצְמוֹתַי
  chosen: all my bones tremble
  alternatives:
  - all my bones shake
  - all my bones quiver
  lexicon: HALOT
  rationale: The verb רחף can denote shaking or quivering movement. In this context of prophetic dread, 'tremble' captures bodily agitation idiomatically without over-literal awkwardness.
- source_word: הָיִיתִי כְּאִישׁ שִׁכּוֹר
  chosen: I have become like a drunken man
  alternatives:
  - I was like a drunken man
  - I have been like a drunken man
  lexicon: HALOT
  rationale: The perfect describes Jeremiah's resulting state. 'Have become' expresses transition into that condition. 'Drunken man' preserves the masculine singular comparison in line with gender-accurate policy.
- source_word: וּכְגֶבֶר
  chosen: like a strong man
  alternatives:
  - like a mighty man
  - like a man
  lexicon: HALOT
  rationale: גבר often denotes a strong or vigorous man, not merely a generic male. 'Strong man' preserves the nuance and heightens the force of the simile.
- source_word: עֲבָרוֹ יָיִן
  chosen: overcome by wine
  alternatives:
  - whom wine has overcome
  - passed over by wine
  lexicon: HALOT
  rationale: The idiom with עבר and wine conveys being overtaken or overpowered by wine. 'Overcome by wine' is clear modern English and fits the comparison to drunkenness.
- source_word: מִפְּנֵי יְהוָה
  chosen: because of the LORD
  alternatives:
  - before the LORD
  - from the presence of the LORD
  lexicon: HALOT
  rationale: In this context מִפְּנֵי expresses causation arising from the overwhelming reality/presence of YHWH, not simple spatial location. 'Because of' best conveys the source of Jeremiah's distress.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דִּבְרֵי קָדְשׁוֹ
  chosen: his holy words
  alternatives:
  - the words of his holiness
  - his holy utterances
  lexicon: HALOT
  rationale: The construct phrase most naturally means words characterized by his holiness, i.e., 'his holy words.' This is more idiomatic than a wooden genitive while preserving the possessive suffix.
