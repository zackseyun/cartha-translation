theological_decisions:
- issue: Text-critical/lexical ambiguity in וְנָשִׁיתִי ... נָשֹׂא
  chosen_reading: I will surely lift you up
  alternative_readings:
  - I will utterly forget you
  - I will surely carry you away
  rationale: The MT as given supports a wordplay tied to the surrounding condemnation
    of calling Yahweh's word a 'burden' (מַשָּׂא). Rendering with 'lift you up' preserves
    the נשׂא wordplay and allows the irony to stand, especially when paired with 'cast
    you away.' Because many interpreters and versions understand a different root/sense
    ('forget'), that alternative is preserved in a footnote rather than silently excluded.
  doctrine_reference: Translation philosophy §3 (preserve theological/interpretive
    tension where genuine ambiguity exists)
