id: JER.23.39
reference: Jeremiah 23:39
source:
  edition: WLC
  text: לָ/כֵ֣ן הִנְ/נִ֔י וְ/נָשִׁ֥יתִי אֶתְ/כֶ֖ם נָשֹׁ֑א וְ/נָטַשְׁתִּ֣י אֶתְ/כֶ֗ם
    וְ/אֶת הָ/עִיר֙ אֲשֶׁ֨ר נָתַ֧תִּי לָ/כֶ֛ם וְ/לַ/אֲבוֹתֵי/כֶ֖ם מֵ/עַ֥ל פָּנָֽ/י־׃
translation:
  text: Therefore, behold, I will surely lift you up and cast you away, you and the
    city that I gave to you and to your fathers, from before my face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I will utterly forget you'; the Hebrew here is difficult, and some
      understand a different verbal sense than 'lift/carry away.'
    reason: alternative_reading
  - marker: b
    text: Or, 'out of my presence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Standard inferential conjunction introducing the consequence of the preceding
    denunciation.
- source_word: הִנְנִי
  chosen: behold
  alternatives:
  - look
  - see, I am
  lexicon: HALOT
  rationale: Retains the prophetic deictic force and solemnity. 'Behold' remains natural
    enough in elevated prophetic discourse.
- source_word: וְנָשִׁיתִי ... נָשֹׂא
  chosen: I will surely lift you up
  alternatives:
  - I will utterly forget you
  - I will surely carry you away
  lexicon: HALOT
  rationale: The consonantal form invites a wordplay with the immediately preceding
    oracle on מַשָּׂא ('burden/oracle') and the infinitive absolute נָשֹׂא strengthens
    the finite verb. In context, the sense is not positive exaltation but forceful
    'lifting/carrying off,' which prepares for 'cast you away.' This follows the MT
    as pointed, while acknowledging the well-known alternative reading 'forget' reflected
    in some translations and discussed text-critically.
- source_word: נָשֹׂא
  chosen: surely
  alternatives:
  - indeed lift
  - surely carry away
  lexicon: HALOT
  rationale: Infinitive absolute of נשׂא used for emphasis before/after the finite
    verb; rendered adverbially in English.
- source_word: וְנָטַשְׁתִּי
  chosen: and cast you away
  alternatives:
  - and forsake you
  - and abandon you
  lexicon: HALOT
  rationale: נטשׁ commonly means abandon/leave behind; here, with the following phrase
    'from before my face,' 'cast ... away' best captures the judicial expulsion imagery.
- source_word: הָעִיר
  chosen: the city
  lexicon: HALOT
  rationale: Straightforward reference to Jerusalem in context; kept as 'the city'
    because the Hebrew does not name it explicitly in this verse.
- source_word: אֲשֶׁר נָתַתִּי לָכֶם וְלַאֲבוֹתֵיכֶם
  chosen: that I gave to you and to your fathers
  alternatives:
  - which I gave you and your fathers
  lexicon: HALOT
  rationale: Preserves the covenant-historical reference to the gift of the land/city
    to the present generation and their ancestors.
- source_word: מֵעַל פָּנַי
  chosen: from before my face
  alternatives:
  - out of my presence
  - from my presence
  lexicon: HALOT
  rationale: Literally 'from upon my face.' 'From before my face' preserves the anthropomorphic
    and covenantal presence language; a smoother alternative is preserved in a footnote.
