theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for YHWH and aligns with the verse's
    covenantal context.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Handling the wordplay on מַשָּׂא
  chosen_reading: burden in both occurrences
  alternative_readings:
  - oracle
  - message
  rationale: The verse rebukes misuse of prophetic language by turning the term back
    on the speakers. Preserving the same English word in both instances best maintains
    the rhetorical and theological force of the warning against distorting God's words.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms,
    or documented exception)
