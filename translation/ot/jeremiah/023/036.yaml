id: JER.23.36
reference: Jeremiah 23:36
source:
  edition: WLC
  text: וּ/מַשָּׂ֥א יְהוָ֖ה לֹ֣א תִזְכְּרוּ ע֑וֹד כִּ֣י הַ/מַּשָּׂ֗א יִֽהְיֶה֙ לְ/אִ֣ישׁ
    דְּבָר֔/וֹ וַ/הֲפַכְתֶּ֗ם אֶת דִּבְרֵי֙ אֱלֹהִ֣ים חַיִּ֔ים יְהוָ֥ה צְבָא֖וֹת אֱלֹהֵֽי/נוּ־־׃
translation:
  text: But you shall no longer mention ‘the burden of the LORD,’ for each man’s own
    word will become his burden, and you have twisted the words of the living God,
    the LORD of hosts, our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'oracle of the LORD.' The Hebrew word מַשָּׂא can mean 'burden' or, in
      prophetic contexts, an 'oracle/message'; here the prophet appears to exploit
      both senses.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man’s word will be his burden,' likely meaning that what each
      person says will recoil on him rather than being a true word from the LORD.
    reason: alternative_reading
lexical_decisions:
- source_word: מַשָּׂא
  chosen: burden
  alternatives:
  - oracle
  - message
  lexicon: HALOT, BDB
  rationale: 'מַשָּׂא can denote a load/burden and, in prophetic usage, an oracle.
    In this context Jeremiah is exploiting the double sense polemically: the people
    use ''the burden of the LORD'' as a prophetic catchphrase, and the reply is that
    the ''burden'' will be each person''s own word. ''Burden'' preserves the wordplay
    better than ''oracle'' or ''message''.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT, BDB
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD'
    rather than a transliteration.
- source_word: תִזְכְּרוּ
  chosen: you shall ... mention
  alternatives:
  - remember
  - speak of
  lexicon: HALOT, BDB
  rationale: Though זכר commonly means 'remember,' with a quoted expression as object
    it can naturally mean 'mention' or 'bring up.' 'Mention' fits the prohibition
    against using the formula 'the burden of the LORD'.
- source_word: עוֹד
  chosen: no longer
  alternatives:
  - again
  - anymore
  lexicon: HALOT, BDB
  rationale: Idiomatic English for לֹא ... עוֹד in a prohibition is 'no longer'.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT, BDB
  rationale: Introduces the reason for the prohibition.
- source_word: הַמַּשָּׂא יִהְיֶה לְאִישׁ דְּבָרוֹ
  chosen: each man’s own word will become his burden
  alternatives:
  - the burden will be to each man his word
  - each person's word will be the oracle
  lexicon: HALOT, BDB
  rationale: This clause is syntactically compressed. The sense is that what they
    call a divine 'burden' will in fact be their own utterance turned back on them
    as a burden. 'Become his burden' makes the implied predication clear in English
    while preserving the wordplay with מַשָּׂא.
- source_word: לְאִישׁ
  chosen: each man’s
  alternatives:
  - for each person
  - for each man
  lexicon: HALOT, BDB
  rationale: Gender-accurate rendering of אִישׁ is 'man'; distributive sense is conveyed
    by 'each man.'
- source_word: וַהֲפַכְתֶּם
  chosen: you have twisted
  alternatives:
  - you have perverted
  - you have overturned
  lexicon: HALOT, BDB
  rationale: הפך here refers to distorting or perverting speech. 'Twisted' is readable
    modern English and conveys culpable distortion.
- source_word: דִּבְרֵי אֱלֹהִים חַיִּים
  chosen: the words of the living God
  alternatives:
  - the words of God, the living one
  lexicon: HALOT, BDB
  rationale: Standard construct rendering; 'living God' is a natural English equivalent
    preserving the theological force.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of hosts
  alternatives:
  - the LORD Almighty
  - Yahweh of armies
  lexicon: HALOT, BDB
  rationale: Traditional but still transparent rendering of the divine title; 'hosts'
    preserves the metaphor of heavenly armies/forces better than the interpretive
    'Almighty'.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT, BDB
  rationale: Straightforward pronominal construct rendering.
