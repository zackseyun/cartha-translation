id: JER.23.12
reference: Jeremiah 23:12
source:
  edition: WLC
  text: לָ/כֵן֩ יִֽהְיֶ֨ה דַרְכָּ֜/ם לָ/הֶ֗ם כַּ/חֲלַקְלַקּוֹת֙ בָּֽ/אֲפֵלָ֔ה יִדַּ֖חוּ וְ/נָ֣פְלוּ בָ֑/הּ כִּֽי אָבִ֨יא עֲלֵי/הֶ֥ם רָעָ֛ה שְׁנַ֥ת פְּקֻדָּתָ֖/ם נְאֻם יְהוָֽה־־׃
translation:
  text: Therefore their way will be to them like slippery places in the darkness; they will be driven along and fall in it, for I will bring disaster on them in the year of their punishment, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the year of their visitation.' The Hebrew phrase can mean a time when God visits them for judgment or reckoning.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks a consequential judgment flowing from the preceding indictment; 'therefore' preserves the formal inferential force.
- source_word: יִהְיֶה דַרְכָּם לָהֶם
  chosen: their way will be to them
  alternatives:
  - their path will become for them
  - their way will be for them
  lexicon: HALOT
  rationale: Retains the Hebrew construction with 'way' as a metaphor for course of life or fate. 'To them' is kept rather than smoothed away because it contributes to the sense that their own course turns against them.
- source_word: דֶּרֶךְ
  chosen: way
  alternatives:
  - path
  lexicon: HALOT
  rationale: '''Way'' is the more common biblical metaphor for conduct or course, while still fitting the image of a dangerous road.'
- source_word: כַּחֲלַקְלַקּוֹת
  chosen: like slippery places
  alternatives:
  - like slippery ground
  - like slippery paths
  lexicon: HALOT
  rationale: Plural abstract/concrete image of slick spots or treacherous places. 'Slippery places' preserves the plural and the vivid danger imagery better than a singular smoothing.
- source_word: בָּאֲפֵלָה
  chosen: in the darkness
  alternatives:
  - in gloom
  - in deep darkness
  lexicon: HALOT
  rationale: Conveys the setting of obscurity and danger. 'Darkness' is natural English and preserves the metaphorical and literal force.
- source_word: יִדַּחוּ
  chosen: they will be driven along
  alternatives:
  - they will be thrust down
  - they will be pushed away
  - they will be driven
  lexicon: HALOT
  rationale: The Niphal here suggests being impelled or thrust onward by an outside force. 'Driven along' fits the road imagery and avoids over-specifying downward motion not explicit in the form.
- source_word: וְנָפְלוּ בָהּ
  chosen: and fall in it
  alternatives:
  - and fall there
  - and stumble in it
  lexicon: HALOT
  rationale: The feminine suffix most naturally refers back to the darkness/slippery way as the sphere into which they fall. 'In it' preserves the pronoun without forcing a more interpretive antecedent.
- source_word: כִּי אָבִיא עֲלֵיהֶם רָעָה
  chosen: for I will bring disaster on them
  alternatives:
  - for I will bring evil upon them
  - for I will bring calamity on them
  lexicon: HALOT
  rationale: רָעָה in judgment contexts commonly denotes calamity/disaster rather than moral evil. 'Disaster' is clear modern English and avoids implying God commits moral evil.
- source_word: שְׁנַת פְּקֻדָּתָם
  chosen: in the year of their punishment
  alternatives:
  - in the year of their visitation
  - in the year of their reckoning
  lexicon: HALOT
  rationale: פְּקֻדָּה can mean visitation, oversight, or punishment; in this judgment context 'punishment' best conveys the sense. 'Year of their punishment' is idiomatic and preserves the temporal phrase.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is natural English and preserves solemn prophetic authority. Per doctrine, יְהוָה is rendered 'the LORD'.
