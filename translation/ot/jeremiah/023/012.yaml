theological_decisions:
- issue: Rendering of יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of רָעָה in divine judgment
  chosen_reading: disaster
  alternative_readings:
  - evil
  - calamity
  rationale: In this context the term denotes punitive calamity brought in judgment, not moral evil. This preserves orthodox theological clarity without softening the severity of the text.
