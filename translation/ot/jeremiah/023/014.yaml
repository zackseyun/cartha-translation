theological_decisions:
- issue: Gendered distributive singular אִישׁ
  chosen_reading: no man turns back from his evil
  alternative_readings:
  - no one turns back from evil
  - no person turns back from his evil
  rationale: The Hebrew uses grammatically masculine singular איש distributively.
    Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral
    language, while the representative force can be noted in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Repentance nuance of שוב
  chosen_reading: turns back
  alternative_readings:
  - repents
  - turns
  rationale: The verb often carries repentance overtones, but 'turns back' preserves
    the lexical image without importing a more explicit theological term than the
    Hebrew states in this clause.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
