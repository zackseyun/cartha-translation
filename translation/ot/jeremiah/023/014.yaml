id: JER.23.14
reference: Jeremiah 23:14
source:
  edition: WLC
  text: וּ/בִ/נְבִאֵ֨י יְרוּשָׁלִַ֜ם רָאִ֣יתִי שַׁעֲרוּרָ֗ה נָא֞וֹף וְ/הָלֹ֤ךְ בַּ/שֶּׁ֨קֶר֙
    וְ/חִזְּקוּ֙ יְדֵ֣י מְרֵעִ֔ים לְ/בִ֨לְתִּי שָׁ֔בוּ אִ֖ישׁ מֵ/רָֽעָת֑/וֹ הָֽיוּ
    לִ֤/י כֻלָּ/ם֙ כִּ/סְדֹ֔ם וְ/יֹשְׁבֶ֖י/הָ כַּ/עֲמֹרָֽה־־׃ס
translation:
  text: 'And among the prophets of Jerusalem I have seen a horrible thing: adultery
    and walking in falsehood; they have strengthened the hands of evildoers, so that
    no man turns back from his evil. All of them have become to me like Sodom, and
    her inhabitants like Gomorrah.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'no one turns back from his evil.' The Hebrew has the distributive singular
      'man,' used representatively.
    reason: lexical_alternative
  - marker: b
    text: '''Turns back'' can also be rendered ''repents,'' since the Hebrew verb
      often carries the sense of turning from evil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבִנְבִיאֵי יְרוּשָׁלִַם
  chosen: And among the prophets of Jerusalem
  alternatives:
  - And in the prophets of Jerusalem
  - But among the prophets of Jerusalem
  lexicon: HALOT
  rationale: The prefixed ב marks location/sphere, idiomatically 'among' in English.
    Initial waw is rendered simply as 'And' to maintain discourse flow without overstating
    contrast.
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I saw
  lexicon: HALOT
  rationale: Perfect first person singular can be rendered as present perfect in English
    to convey Yahweh's observed assessment with present relevance.
- source_word: שַׁעֲרוּרָה
  chosen: a horrible thing
  alternatives:
  - a shocking thing
  - an appalling thing
  lexicon: HALOT
  rationale: The noun denotes something horrifying or appalling, often a morally outrageous
    act. 'Horrible thing' is natural modern English and preserves the moral revulsion.
- source_word: נָאוֹף
  chosen: adultery
  alternatives:
  - committing adultery
  lexicon: HALOT
  rationale: The infinitive/verb is rendered as a nominal item in a list after 'I
    have seen a horrible thing:' matching the Hebrew asyndetic catalog style and keeping
    the accusation concise.
- source_word: וְהָלֹךְ בַּשֶּׁקֶר
  chosen: and walking in falsehood
  alternatives:
  - and living a lie
  - and walking in lies
  lexicon: HALOT
  rationale: הלך + ב expresses conduct or manner of life. 'Walking in falsehood' preserves
    the Hebrew metaphor and the singular שקר as the sphere of deceit/falsehood.
- source_word: וְחִזְּקוּ יְדֵי מְרֵעִים
  chosen: they have strengthened the hands of evildoers
  alternatives:
  - they have encouraged evildoers
  - they have made evildoers strong
  lexicon: HALOT
  rationale: The idiom 'strengthen the hands' means to encourage or embolden. Retaining
    the idiom is sufficiently clear in English and preserves the Hebrew imagery.
- source_word: לְבִלְתִּי שָׁבוּ
  chosen: so that no man turns back
  alternatives:
  - so that they do not turn back
  - with the result that no one turns back
  lexicon: HALOT
  rationale: לבלתי introduces negative result/purpose. The following singular איש
    supports 'no man'/'no one' as distributive singular. 'Turns back' preserves the
    repentance nuance of שוב.
- source_word: אִישׁ מֵרָעָתוֹ
  chosen: from his evil
  alternatives:
  - from his wickedness
  - from his evil way
  lexicon: HALOT
  rationale: איש is singular distributive, and per gender-accurate policy 'man' is
    retained in the clause. רעה here is moral evil/wickedness; 'evil' is concise and
    direct.
- source_word: הָיוּ לִי כֻלָּם כִּסְדֹם
  chosen: All of them have become to me like Sodom
  alternatives:
  - They are all to me like Sodom
  - All of them are like Sodom to me
  lexicon: HALOT
  rationale: The perfect of היה can be rendered 'have become' to stress the evaluative
    result. לִי is best kept as 'to me,' marking Yahweh's assessment.
- source_word: וְיֹשְׁבֶיהָ כַּעֲמֹרָה
  chosen: and her inhabitants like Gomorrah
  alternatives:
  - and its inhabitants like Gomorrah
  lexicon: HALOT
  rationale: The suffix refers back to Jerusalem, a grammatically feminine city name,
    so 'her inhabitants' is appropriate and preserves the personified-city imagery.
