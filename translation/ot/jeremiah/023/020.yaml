theological_decisions:
- issue: Rendering the prophetic phrase בְּאַחֲרִית הַיָּמִים
  chosen_reading: In the latter days
  alternative_readings:
  - In days to come
  rationale: The phrase can denote a future time and in prophetic literature often carries eschatological weight. 'In the latter days' preserves that theological tension without forcing a fully technical end-times reading.
  doctrine_reference: Preserve theological tension rather than resolve it.
