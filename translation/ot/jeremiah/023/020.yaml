id: JER.23.20
reference: Jeremiah 23:20
source:
  edition: WLC
  text: לֹ֤א יָשׁוּב֙ אַף יְהוָ֔ה עַד עֲשֹׂת֥/וֹ וְ/עַד הֲקִימ֖/וֹ מְזִמּ֣וֹת לִבּ֑/וֹ בְּ/אַֽחֲרִית֙ הַ/יָּמִ֔ים תִּתְבּ֥וֹנְנוּ בָ֖/הּ בִּינָֽה־־־׃
translation:
  text: The anger of Yahweh will not turn back until he has done it, and until he has established the purposes of his heart. In the latter days you will understand it clearly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will not return'; the Hebrew image is of the LORD's anger not turning back until his purpose is completed.
    reason: lexical_alternative
  - marker: b
    text: Or 'the plans of his heart.'
    reason: lexical_alternative
  - marker: c
    text: Or 'In days to come'; Hebrew 'In the latter days.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַף
  chosen: anger
  alternatives:
  - wrath
  - nose
  lexicon: HALOT
  rationale: In this idiom with YHWH, אַף denotes anger/wrath rather than the literal 'nose.' 'Anger' is clear modern English and fits the prophetic judgment context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא יָשׁוּב
  chosen: will not turn back
  alternatives:
  - will not return
  - will not relent
  lexicon: HALOT
  rationale: שׁוּב commonly means 'turn back/return.' Here the subject is the LORD's anger, so 'will not turn back' preserves the image of judgment not withdrawing. 'Relent' is interpretive and better reserved for other verbs or clearer contexts.
- source_word: עַד עֲשֹׂתוֹ
  chosen: until he has done it
  alternatives:
  - until he has acted
  - until he has accomplished it
  lexicon: HALOT
  rationale: The infinitive construct with suffix indicates completion of the intended action. 'Done it' is concise and preserves the Hebrew's broad wording without over-specifying the object.
- source_word: וְעַד הֲקִימוֹ
  chosen: and until he has established
  alternatives:
  - and until he has carried out
  - and until he has confirmed
  lexicon: HALOT
  rationale: הקים in this causative form can mean establish, set up, or carry out. 'Established' works well with 'purposes' and preserves the sense of bringing intention into firm effect.
- source_word: מְזִמּוֹת לִבּוֹ
  chosen: the purposes of his heart
  alternatives:
  - the plans of his heart
  - the intentions of his heart
  - the schemes of his heart
  lexicon: HALOT
  rationale: מְזִמּוֹת can be positive or negative depending on context; here it refers to the LORD's deliberate intentions, so 'purposes' avoids the negative connotation of 'schemes' while retaining deliberateness. 'Heart' in Hebrew idiom is the seat of intention and will, so it is preserved literally.
- source_word: בְּאַחֲרִית הַיָּמִים
  chosen: In the latter days
  alternatives:
  - In days to come
  - In the end of days
  lexicon: HALOT
  rationale: This is a recognized prophetic temporal expression. 'In the latter days' preserves its eschatological-prophetic resonance better than the flatter 'in days to come.'
- source_word: תִּתְבּוֹנְנוּ בָהּ בִּינָה
  chosen: you will understand it clearly
  alternatives:
  - you will understand it fully
  - you will consider it with understanding
  - you will perceive it distinctly
  lexicon: HALOT
  rationale: The verb בין in the hitpolel/hithbonen nuance conveys attentive understanding or discernment, and the following noun בינה intensifies the idea. 'Understand it clearly' renders the emphatic sense in natural English without awkward literal repetition.
