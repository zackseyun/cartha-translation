id: JER.23.40
reference: Jeremiah 23:40
source:
  edition: WLC
  text: וְ/נָתַתִּ֥י עֲלֵי/כֶ֖ם חֶרְפַּ֣ת עוֹלָ֑ם וּ/כְלִמּ֣וּת עוֹלָ֔ם אֲשֶׁ֖ר לֹ֥א
    תִשָּׁכֵֽחַ׃ס
translation:
  text: And I will put on you everlasting reproach and everlasting disgrace, which
    will not be forgotten.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'perpetual reproach and perpetual disgrace.' The Hebrew עוֹלָם can denote
      enduring or indefinite perpetuity depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  chosen: And I will put
  alternatives:
  - And I will give
  - And I will set
  lexicon: HALOT
  rationale: נתן has a broad semantic range including give, put, and set. With עֲלֵיכֶם
    ('upon/on you') and abstract objects ('reproach,' 'disgrace'), English 'put on
    you' best conveys the idiom of imposing a condition or burden.
- source_word: עֲלֵיכֶם
  chosen: on you
  alternatives:
  - upon you
  - against you
  lexicon: HALOT
  rationale: The preposition עַל with pronominal suffix here marks something laid
    upon the addressees. 'On you' is natural modern English; 'upon you' is possible
    but more formal.
- source_word: חֶרְפַּת
  chosen: reproach
  alternatives:
  - shame
  - taunt
  - disgrace
  lexicon: HALOT
  rationale: חֶרְפָּה commonly denotes reproach, scorn, or public shame. 'Reproach'
    preserves the sense of enduring public dishonor without collapsing it into the
    near-synonym that follows.
- source_word: עוֹלָם
  chosen: everlasting
  alternatives:
  - eternal
  - perpetual
  - age-long
  lexicon: HALOT
  rationale: עוֹלָם in judgment contexts often denotes enduring, indefinite perpetuity
    from the human perspective. 'Everlasting' is idiomatic and weighty in English,
    while avoiding over-technical discussion in the main text.
- source_word: וּכְלִמּוּת
  chosen: and everlasting disgrace
  alternatives:
  - and humiliation
  - and shame
  lexicon: HALOT
  rationale: כְּלִמּוּת denotes disgrace, humiliation, or shame. 'Disgrace' pairs
    well with 'reproach' while maintaining a distinction between the two nouns. The
    conjunction is carried into the full phrase in English for smoothness.
- source_word: אֲשֶׁר
  chosen: which
  alternatives:
  - that
  lexicon: HALOT
  rationale: The relative particle introduces a clause modifying the preceding reproach/disgrace.
    'Which' is a natural English relative pronoun here.
- source_word: לֹא תִשָּׁכֵחַ
  chosen: will not be forgotten
  alternatives:
  - shall not be forgotten
  lexicon: HALOT
  rationale: 'The Niphal imperfect of שׁכח is passive/reflexive in sense: ''be forgotten.''
    The feminine singular agrees with the collective sense of the preceding disgrace/reproach.
    ''Will not be forgotten'' is clear modern English.'
