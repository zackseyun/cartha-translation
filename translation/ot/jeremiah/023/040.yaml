theological_decisions:
- issue: Force of עוֹלָם in a judgment oracle
  chosen_reading: everlasting
  alternative_readings:
  - perpetual
  - age-long
  rationale: The verse announces enduring covenantal shame and disgrace. 'Everlasting'
    best reflects the solemn force of עוֹלָם in this context without softening the
    warning. This is a lexical-contextual decision rather than a doctrinal expansion.
  doctrine_reference: Translation philosophy §1, §5
