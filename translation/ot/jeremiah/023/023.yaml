id: JER.23.23
reference: Jeremiah 23:23
source:
  edition: WLC
  text: הַ/אֱלֹהֵ֧י מִ/קָּרֹ֛ב אָ֖נִי נְאֻם יְהוָ֑ה וְ/לֹ֥א אֱלֹהֵ֖י מֵ/רָחֹֽק־׃
translation:
  text: Am I a God who is near, declares the LORD, and not a God who is far away?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Am I only a nearby God ... and not also a God far away?' The verse
      is a rhetorical question denying that the LORD is limited to what is near.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ/אֱלֹהֵי
  chosen: Am I a God
  alternatives:
  - Am I God
  - Am I only a nearby God
  lexicon: HALOT
  rationale: The prefixed ה on the construct form functions interrogatively in context,
    yielding a rhetorical question. English requires supplying 'Am I' to make the
    verbless Hebrew clause natural. 'A God' preserves the predicate sense better than
    the less idiomatic 'God of near.'
- source_word: מִ/קָּרֹב
  chosen: who is near
  alternatives:
  - nearby
  - from nearby
  lexicon: HALOT
  rationale: Though formally marked with מן, the phrase in this idiom contrasts nearness
    and distance rather than origin. 'Who is near' communicates the predicative sense
    in smooth English and matches the parallel with 'far away.'
- source_word: אָ֖נִי
  chosen: I
  lexicon: HALOT
  rationale: First-person pronoun is retained explicitly in the English question through
    'Am I,' since English needs the copular verb supplied.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is both readable and
    weighty, preserving the formal prophetic register without sounding archaic. 'the
    LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, יְהוָה is rendered 'the LORD' rather than transliterated
    forms.
- source_word: וְ/לֹא
  chosen: and not
  alternatives:
  - and not also
  - rather than
  lexicon: HALOT
  rationale: Simple conjunction plus negation is best preserved directly. The rhetorical
    force is carried by the whole question rather than by expanding the conjunction.
- source_word: אֱלֹהֵי מֵ/רָחֹק
  chosen: a God who is far away
  alternatives:
  - a distant God
  - God from afar
  lexicon: HALOT
  rationale: This mirrors the first half and preserves the near/far contrast. 'Far
    away' is more natural modern English than the bare adjective 'far' and avoids
    implying emotional distance beyond the spatial metaphor.
