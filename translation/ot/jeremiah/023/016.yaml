id: JER.23.16
reference: Jeremiah 23:16
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר יְהוָ֣ה צְבָא֗וֹת אַֽל תִּשְׁמְע֞וּ עַל דִּבְרֵ֤י הַ/נְּבִאִים֙
    הַ/נִּבְּאִ֣ים לָ/כֶ֔ם מַהְבִּלִ֥ים הֵ֖מָּה אֶתְ/כֶ֑ם חֲז֤וֹן לִבָּ/ם֙ יְדַבֵּ֔רוּ
    לֹ֖א מִ/פִּ֥י יְהוָֽה־־־׃
translation:
  text: 'Thus says the LORD of hosts: Do not listen to the words of the prophets who
    prophesy to you; they are filling you with false hope. They speak a vision of
    their own heart, not from the mouth of the LORD.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they are deluding you,' or more formally, 'they make you vain.' The
      Hebrew verb carries the sense of causing emptiness or vanity.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: Traditional but still transparent rendering of the title יְהוָה צְבָאוֹת;
    'hosts' preserves the breadth of heavenly/earthly armies without over-specifying.
- source_word: אַל תִּשְׁמְעוּ עַל
  chosen: Do not listen to
  alternatives:
  - Do not heed
  - Do not listen concerning
  lexicon: HALOT
  rationale: Idiomatic English for the prohibition with שמע plus על in this context;
    conveys refusal to heed the prophets' message.
- source_word: דִּבְרֵי
  chosen: the words of
  alternatives:
  - the message of
  - the sayings of
  lexicon: HALOT
  rationale: A straightforward rendering that preserves the plural noun and avoids
    interpretive narrowing.
- source_word: הַנְּבִאִים הַנִּבְּאִים לָכֶם
  chosen: the prophets who prophesy to you
  alternatives:
  - the prophets who are prophesying to you
  - the prophets who speak to you as prophets
  lexicon: HALOT
  rationale: Keeps the Hebrew wordplay between noun and participle and preserves the
    direct address לָכֶם.
- source_word: מַהְבִּלִים
  chosen: filling you with false hope
  alternatives:
  - making you vain
  - deluding you
  - leading you into emptiness
  lexicon: HALOT
  rationale: The Hiphil of הבל here means causing emptiness/vanity, i.e., misleading
    with empty assurances. 'Filling you with false hope' communicates the prophetic
    context more naturally than the opaque 'making you vain,' while retaining the
    sense of emptiness and deception.
- source_word: חֲזוֹן לִבָּם
  chosen: a vision of their own heart
  alternatives:
  - the vision of their own heart
  - a vision from their own mind
  lexicon: HALOT
  rationale: Retains the singular 'vision' and the anthropological term 'heart,' which
    in Hebrew includes inner thought and desire. 'Their own heart' preserves the source
    imagery better than 'their own minds'.
- source_word: יְדַבֵּרוּ
  chosen: They speak
  alternatives:
  - They are speaking
  - They declare
  lexicon: HALOT
  rationale: Simple present fits the generic characterization of the false prophets'
    activity.
- source_word: לֹא מִפִּי יְהוָה
  chosen: not from the mouth of the LORD
  alternatives:
  - not from the LORD
  - not out of the mouth of the LORD
  lexicon: HALOT
  rationale: Preserves the concrete Hebrew idiom 'from the mouth of' rather than flattening
    it to a mere source statement; the phrase underscores that their message lacks
    divine utterance.
