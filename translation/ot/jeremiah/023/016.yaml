theological_decisions:
- issue: Characterization of the false prophets' effect on the audience
  chosen_reading: they are filling you with false hope
  alternative_readings:
  - they make you vain
  - they delude you
  rationale: The Hebrew verb from הבל denotes causing emptiness or vanity. In this
    prophetic polemic, the emptiness is specifically deceptive assurance not grounded
    in YHWH's word. The chosen rendering communicates that theological force in clear
    English without adding claims beyond the context.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering of anthropological term לֵב/לֵבָב
  chosen_reading: their own heart
  alternative_readings:
  - their own mind
  rationale: The Hebrew 'heart' includes thought and will, but the project prefers
    preserving source-language imagery where intelligible. 'Heart' keeps the contrast
    between self-generated revelation and true speech from the LORD.
  doctrine_reference: Translation philosophy §1, §6
