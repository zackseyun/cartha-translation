theological_decisions:
- issue: Divine omnipresence language
  chosen_reading: Do I not fill heaven and earth?
  alternative_readings:
  - Do I not fully occupy heaven and earth?
  - Am I not present throughout heaven and earth?
  rationale: The Hebrew speaks of YHWH filling heaven and earth, a strong statement of pervasive divine presence. The translation preserves the metaphorical language of 'fill' rather than paraphrasing into a doctrinal abstraction like 'am omnipresent.'
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
