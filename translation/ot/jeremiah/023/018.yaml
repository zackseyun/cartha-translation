theological_decisions:
- issue: Meaning of סוֹד יְהוָה
  chosen_reading: the council of Yahweh
  alternative_readings:
  - the secret of the LORD
  - the intimate counsel of the LORD
  rationale: In this prophetic polemic, the point is access to the divine deliberative assembly that authenticates a true prophet. Rendering it as 'council' preserves that theological image better than the more private 'secret,' while alternatives remain viable lexically.
