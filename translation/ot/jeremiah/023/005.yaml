id: JER.23.5
reference: Jeremiah 23:5
source:
  edition: WLC
  text: הִנֵּ֨ה יָמִ֤ים בָּאִים֙ נְאֻם יְהוָ֔ה וַ/הֲקִמֹתִ֥י לְ/דָוִ֖ד צֶ֣מַח צַדִּ֑יק
    וּ/מָ֤לַךְ מֶ֨לֶךְ֙ וְ/הִשְׂכִּ֔יל וְ/עָשָׂ֛ה מִשְׁפָּ֥ט וּ/צְדָקָ֖ה בָּ/אָֽרֶץ־׃
translation:
  text: Behold, days are coming, declares the LORD, when I will raise up for David
    a righteous Branch, and he will reign as king and act wisely, and he will do justice
    and righteousness in the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a righteous shoot' or 'a righteous sprout.' The Hebrew metaphor denotes
      a Davidic offshoot arising from David's line.
    reason: lexical_alternative
  - marker: b
    text: Or 'deal wisely' or 'prosper.' The Hebrew verb can include both wise action
      and resulting success.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the prophetic deictic force and solemnity of the announcement.
    'Behold' is slightly elevated but still recognizable in modern English and fits
    prophetic discourse better than the more casual 'look' or 'see'.
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are surely coming
  lexicon: HALOT
  rationale: A standard prophetic formula indicating a future divinely appointed time.
    Omission of the article in English keeps the line natural while preserving the
    idiom's force.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: '''Declares the LORD'' is idiomatic modern English for the prophetic
    formula and preserves the authoritative speech-act sense of נְאֻם. YHWH is rendered
    ''the LORD'' per doctrine guidance.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and broad English Bible recognizability.
- source_word: וַהֲקִמֹתִי
  chosen: I will raise up
  alternatives:
  - I will cause to arise
  - I will establish
  lexicon: HALOT
  rationale: In this royal-promissory context, the hiphil of קום naturally means to
    raise up or bring forth a ruler/descendant. 'Raise up' preserves both dynastic
    and providential nuance better than the more abstract 'establish'.
- source_word: לְדָוִד
  chosen: for David
  alternatives:
  - to David
  - for the house of David
  lexicon: HALOT
  rationale: 'The preposition is best represented as ''for David'' in context: a promised
    descendant arising on David''s behalf/in David''s line. ''To David'' is possible
    but less natural in English here; ''for the house of David'' is interpretive expansion
    beyond the explicit text.'
- source_word: צֶמַח
  chosen: Branch
  alternatives:
  - shoot
  - sprout
  - growth
  lexicon: HALOT
  rationale: '''Branch'' is the established and contextually apt metaphor for a Davidic
    royal offshoot. It preserves the messianic and intertextual resonance with other
    prophetic ''Branch'' texts without over-paraphrasing.'
- source_word: צַדִּיק
  chosen: righteous
  alternatives:
  - just
  lexicon: HALOT
  rationale: '''Righteous'' best matches the adjective''s moral and covenantal sense
    and aligns with the following pair ''justice and righteousness.'' ''Just'' is
    possible but narrower and less thematically cohesive.'
- source_word: וּמָלַךְ מֶלֶךְ
  chosen: he will reign as king
  alternatives:
  - a king will reign
  - he will reign, a king
  lexicon: HALOT
  rationale: The Hebrew combines verb and cognate noun for emphatic royal rule. 'He
    will reign as king' preserves the emphasis while producing natural English. It
    also keeps the singular individual in view, linked to the Branch.
- source_word: וְהִשְׂכִּיל
  chosen: act wisely
  alternatives:
  - prosper
  - deal wisely
  - have success
  lexicon: HALOT
  rationale: The verb can denote acting with insight and, by extension, prospering.
    In royal context, 'act wisely' foregrounds prudent, skillful rule, which fits
    the immediate ethical outcome of doing justice and righteousness. The success
    nuance is real but secondary here.
- source_word: וְעָשָׂה
  chosen: he will do
  alternatives:
  - he will execute
  - he will accomplish
  lexicon: HALOT
  rationale: A straightforward rendering that keeps the clause readable. Because the
    objects are משפט and צדקה, English idiom allows 'do justice and righteousness'
    without unnecessary heaviness.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  lexicon: HALOT
  rationale: In this royal-governance context, משפט refers to just rule or justice
    rather than merely judicial verdict. 'Justice' is the clearest modern rendering.
- source_word: וּצְדָקָה
  chosen: righteousness
  alternatives:
  - justice
  - what is right
  lexicon: HALOT
  rationale: Paired with משפט, צדקה commonly denotes righteousness in the sense of
    right order and moral rectitude. Rendering it 'righteousness' preserves the distinction
    between the two paired terms rather than collapsing both into 'justice'.
- source_word: בָּאָרֶץ
  chosen: in the land
  alternatives:
  - in the earth
  - in the הארץ/land of Israel
  lexicon: HALOT
  rationale: '''In the land'' best reflects the Hebrew and likely points to the covenant
    land in Jeremiah''s context, while still allowing the phrase''s broader territorial
    sense. ''Earth'' is too expansive here, and specifying ''Israel'' would over-interpret.'
