theological_decisions:
- issue: Messianic force of the Davidic 'Branch'
  chosen_reading: Retain the dynastic-messianic wording in the main text without inserting
    an explicit christological identifier.
  alternative_readings:
  - Translate in a more generic royal sense without preserving 'Branch' as a title
  - Explicitly capitalize and identify as 'the Messiah' in the text
  rationale: The verse is widely understood in Christian tradition as messianic, and
    the Davidic 'Branch' language supports that reading. However, the Hebrew text
    itself presents the figure through royal-prophetic imagery rather than naming
    'Messiah' explicitly. Capitalizing 'Branch' preserves likely titular/intertextual
    force without importing more than the text states.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for YHWH is 'the LORD'; this preserves continuity
    with Jewish reverence practice and the stated translation policy.
  doctrine_reference: 'Contested terms table: יְהוָה YHWH'
