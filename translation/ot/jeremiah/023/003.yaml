theological_decisions:
- issue: Divine agency in the exile and restoration
  chosen_reading: Retain both God's role in driving them away and his promise to gather
    and return them.
  alternative_readings:
  - Soften divine agency in exile by rendering הִדַּחְתִּי as merely 'they were scattered'
  rationale: The Hebrew explicitly states 'where I have driven them,' so the translation
    should preserve the theological tension of judgment and restoration without softening
    either side.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
