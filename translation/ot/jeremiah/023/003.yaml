id: JER.23.3
reference: Jeremiah 23:3
source:
  edition: WLC
  text: וַ/אֲנִ֗י אֲקַבֵּץ֙ אֶת שְׁאֵרִ֣ית צֹאנִ֔/י מִ/כֹּל֙ הָ/אֲרָצ֔וֹת אֲשֶׁר הִדַּ֥חְתִּי
    אֹתָ֖/ם שָׁ֑ם וַ/הֲשִׁבֹתִ֥י אֶתְ/הֶ֛ן עַל נְוֵ/הֶ֖ן וּ/פָר֥וּ וְ/רָבֽוּ־־־׃
translation:
  text: And I myself will gather the remnant of my flock out of all the lands where
    I have driven them, and I will bring them back to their pasture, and they will
    be fruitful and multiply.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'where I have scattered them.' The Hebrew verb can denote causing to
      be driven away or dispersed; 'driven' was chosen to preserve the force of divine
      judgment.
    reason: lexical_alternative
  - marker: b
    text: Or 'to their fold' or 'to their habitation.' The Hebrew term can refer to
      a pasture, dwelling place, or resting place; 'pasture' fits the flock imagery
      here.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: And I myself
  alternatives:
  - And I
  - But I
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis beyond the verbal person marking;
    'I myself' preserves that emphasis. The prefixed conjunction can be rendered simply
    as 'And' in context.
- source_word: אֲקַבֵּץ
  chosen: will gather
  alternatives:
  - will collect
  - will assemble
  lexicon: HALOT
  rationale: קבץ commonly means 'gather' in restoration contexts, especially for scattered
    people/flocks. 'Will gather' is idiomatic and preserves the future sense.
- source_word: שְׁאֵרִית
  chosen: the remnant
  alternatives:
  - the remainder
  - the survivors
  lexicon: HALOT
  rationale: '''Remnant'' is the established and contextually appropriate rendering
    in prophetic restoration language, carrying both numerical and theological force
    without overinterpreting.'
- source_word: צֹאנִי
  chosen: my flock
  alternatives:
  - my sheep
  lexicon: HALOT
  rationale: צֹאן can denote small livestock collectively, but in shepherd imagery
    'flock' is the most natural collective English rendering and fits the surrounding
    shepherd/sheep context.
- source_word: מִכֹּל הָאֲרָצוֹת
  chosen: out of all the lands
  alternatives:
  - from all the countries
  - from all the earths/lands
  lexicon: HALOT
  rationale: אֲרָצוֹת here refers to various territories/nations of dispersion. 'Lands'
    is slightly more literal than 'countries' and fits prophetic diction well.
- source_word: הִדַּחְתִּי
  chosen: I have driven
  alternatives:
  - I have scattered
  - I have banished
  lexicon: HALOT
  rationale: נדח in the Hiphil conveys causing to be driven away or dispersed. 'Driven'
    preserves divine agency and the force of expulsion more directly than the smoother
    'scattered.'
- source_word: וַהֲשִׁבֹתִי
  chosen: I will bring them back
  alternatives:
  - I will return them
  - I will restore them
  lexicon: HALOT
  rationale: The causative of שוב means to cause to return. 'Bring them back' is natural
    English and preserves the concrete movement implied by the verb.
- source_word: עַל נְוֵיהֶן
  chosen: to their pasture
  alternatives:
  - to their fold
  - to their grazing place
  - to their habitation
  lexicon: HALOT
  rationale: נָוֶה can denote pastureland, abode, or resting place. In the flock metaphor,
    'pasture' best fits the imagery and reads naturally in English. The preposition
    עַל is rendered idiomatically with 'to' rather than woodenly as 'upon.'
- source_word: וּפָרוּ
  chosen: they will be fruitful
  alternatives:
  - they will bear fruit
  - they will increase
  lexicon: HALOT
  rationale: פרה in this context echoes covenantal multiplication language. 'Be fruitful'
    preserves that resonance better than a flatter 'increase.'
- source_word: וְרָבוּ
  chosen: and multiply
  alternatives:
  - and become many
  - and increase greatly
  lexicon: HALOT
  rationale: רבה here pairs naturally with פרה in a familiar biblical collocation.
    'Multiply' preserves the covenant-restoration echo and concise rhythm.
