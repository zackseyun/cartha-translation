id: JER.23.32
reference: Jeremiah 23:32
source:
  edition: WLC
  text: הִ֠נְ/נִי עַֽל נִבְּאֵ֞י חֲלֹמ֥וֹת שֶׁ֨קֶר֙ נְאֻם יְהוָ֔ה וַֽ/יְסַפְּרוּ/ם֙ וַ/יַּתְע֣וּ אֶת עַמִּ֔/י בְּ/שִׁקְרֵי/הֶ֖ם וּ/בְ/פַחֲזוּתָ֑/ם וְ/אָנֹכִ֨י לֹֽא שְׁלַחְתִּ֜י/ם וְ/לֹ֣א צִוִּיתִ֗י/ם וְ/הוֹעֵ֛יל לֹֽא יוֹעִ֥ילוּ לָֽ/עָם הַ/זֶּ֖ה נְאֻם יְהוָֽה־־־־־־־׃
translation:
  text: Behold, I am against those who prophesy lying dreams, declares Yahweh, and who tell them and lead my people astray by their lies and by their recklessness, though I did not send them or command them. They do not profit this people at all, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who prophesy false dreams.' The Hebrew literally has 'lying dreams,' using the noun 'lie/falsehood' attributively.
    reason: lexical_alternative
  - marker: b
    text: Or 'their boastfulness,' 'their rashness,' or 'their frivolity' for 'their recklessness.' The Hebrew term is difficult and conveys irresponsible, presumptuous conduct.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - See, I am
  - Look, I am
  lexicon: HALOT
  rationale: Introduces a solemn divine announcement of opposition. 'Behold' preserves the prophetic force better than a flatter modern discourse marker.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - concerning
  lexicon: HALOT
  rationale: In the idiom הִנְנִי עַל, the sense is hostile opposition or judgment; 'against' is the natural English equivalent.
- source_word: נִבְּאֵי חֲלֹמוֹת שֶׁקֶר
  chosen: those who prophesy lying dreams
  alternatives:
  - the prophets of false dreams
  - those who prophesy false dreams
  lexicon: HALOT
  rationale: The participial construction identifies a class of people by their activity. 'Lying dreams' preserves the noun שֶׁקֶר ('lie/falsehood') more directly than the adjectival 'false dreams,' while remaining idiomatic.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'The LORD' follows the doctrinal default for יְהוָה.
- source_word: וַיְסַפְּרוּם
  chosen: and who tell them
  alternatives:
  - and recount them
  - and relate them
  lexicon: HALOT
  rationale: Refers back to the dreams. 'Tell them' is natural modern English for narrating dreams, while preserving the object suffix.
- source_word: וַיַּתְעוּ
  chosen: lead ... astray
  alternatives:
  - cause ... to wander
  - deceive
  lexicon: HALOT
  rationale: The verb תעה in the Hiphil commonly means to cause to stray. 'Lead astray' captures both deception and misdirection.
- source_word: בְּשִׁקְרֵיהֶם
  chosen: by their lies
  alternatives:
  - with their lies
  - by their falsehoods
  lexicon: HALOT
  rationale: Instrumental beth is well rendered 'by.' The plural noun is naturally expressed as 'lies' in English.
- source_word: וּבְפַחֲזוּתָם
  chosen: and their recklessness
  alternatives:
  - and their boastfulness
  - and their frivolity
  - and their rashness
  lexicon: HALOT
  rationale: פחזות denotes reckless, wanton, or insolent behavior/speech. 'Recklessness' best fits the context of irresponsible prophetic claims without over-specifying arrogance alone.
- source_word: וְאָנֹכִי לֹא שְׁלַחְתִּים וְלֹא צִוִּיתִים
  chosen: though I did not send them or command them
  alternatives:
  - but I did not send them or appoint them
  - yet I did not send them or charge them
  lexicon: HALOT
  rationale: The first-person pronoun is emphatic. 'Command' is the most straightforward rendering of צוה here, referring to divine commissioning. 'Though' brings out the concessive force in context.
- source_word: וְהוֹעֵיל לֹא יוֹעִילוּ
  chosen: So they do not profit ... at all
  alternatives:
  - and they surely do not benefit
  - and they are of no use
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the negation. 'Do not profit ... at all' conveys emphatic uselessness in idiomatic English.
- source_word: לָעָם הַזֶּה
  chosen: this people
  alternatives:
  - this nation
  lexicon: HALOT
  rationale: עָם is 'people' here, referring to Judah as God's people. 'This people' preserves the prophetic diction and slight distancing tone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name in accordance with DOCTRINE.md.
