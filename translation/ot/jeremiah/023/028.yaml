id: JER.23.28
reference: Jeremiah 23:28
source:
  edition: WLC
  text: הַ/נָּבִ֞יא אֲשֶׁר אִתּ֤/וֹ חֲלוֹם֙ יְסַפֵּ֣ר חֲל֔וֹם וַ/אֲשֶׁ֤ר דְּבָרִ/י֙
    אִתּ֔/וֹ יְדַבֵּ֥ר דְּבָרִ֖/י אֱמֶ֑ת מַה לַ/תֶּ֥בֶן אֶת הַ/בָּ֖ר נְאֻם יְהוָֽה־־־־׃
translation:
  text: Let the prophet who has a dream tell the dream, but let the one who has my
    word speak my word faithfully. What is straw to grain? declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'speak my word in truth' or 'speak my true word.' The Hebrew may emphasize
      either the truthful manner of speaking or the truthfulness of the word itself.
    reason: lexical_alternative
  - marker: b
    text: Or, 'What has straw in common with grain?'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנָּבִיא
  chosen: the prophet
  alternatives:
  - a prophet
  lexicon: HALOT
  rationale: Definite article is present; in context it functions generically/class-wise
    ('the prophet who...'), which English can preserve with 'the prophet.'
- source_word: אֲשֶׁר אִתּוֹ חֲלוֹם
  chosen: who has a dream
  alternatives:
  - with whom is a dream
  - who has a dream-message
  lexicon: HALOT
  rationale: The idiom literally reads 'who has with him a dream.' Natural English
    is 'who has a dream,' preserving possession of a claimed revelation without overinterpreting
    it.
- source_word: יְסַפֵּר חֲלוֹם
  chosen: tell the dream
  alternatives:
  - recount the dream
  - declare the dream
  lexicon: HALOT
  rationale: The verb ספר in the piel commonly means recount/tell. 'Tell the dream'
    is idiomatic and concise.
- source_word: וַאֲשֶׁר דְּבָרִי אִתּוֹ
  chosen: but let the one who has my word
  alternatives:
  - and the one with whom my word is
  - and whoever has my word
  lexicon: HALOT
  rationale: The conjunction marks contrast between mere dream-claimants and the true
    bearer of YHWH's word. 'But let the one who has my word' brings out the adversative
    force in context.
- source_word: יְדַבֵּר דְּבָרִי אֱמֶת
  chosen: speak my word faithfully
  alternatives:
  - speak my word in truth
  - speak my true word
  - speak my word truly
  lexicon: HALOT
  rationale: 'אֱמֶת can function adverbially here, qualifying the manner of speaking:
    the true prophet must speak YHWH''s word truthfully/faithfully. ''Faithfully''
    is natural English and avoids implying that only this prophet''s word is true
    in an abstract adjectival sense, while still preserving the ethical force.'
- source_word: מַה לַתֶּבֶן אֶת הַבָּר
  chosen: What is straw to grain?
  alternatives:
  - What has straw in common with grain?
  - What is chaff to wheat?
  lexicon: HALOT
  rationale: The Hebrew idiom contrasts two unlike things. תֶּבֶן is 'straw,' not
    specifically 'chaff'; בָּר is 'grain' or 'clean grain,' not necessarily 'wheat.'
    The concise rendering preserves the metaphor and avoids importing a more specific
    agricultural image than the Hebrew states.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is readable modern English
    and preserves prophetic solemnity.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
