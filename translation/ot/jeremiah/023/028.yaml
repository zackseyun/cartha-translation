theological_decisions:
- issue: Contrast between false dream-based prophecy and true word from YHWH
  chosen_reading: 'Render the verse as an imperative contrast: the dream-claimant
    may recount his dream, but the true prophet must speak YHWH''s word faithfully.'
  alternative_readings:
  - Render both clauses more neutrally without adversative emphasis
  rationale: The broader context opposes deceptive dreams to authentic revelation.
    The Hebrew conjunction plus the final metaphor support a sharp contrast without
    adding doctrinal content beyond the text.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve
    it)
