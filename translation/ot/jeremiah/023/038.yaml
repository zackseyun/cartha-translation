id: JER.23.38
reference: Jeremiah 23:38
source:
  edition: WLC
  text: וְ/אִם מַשָּׂ֣א יְהוָה֮ תֹּאמֵרוּ֒ לָ/כֵ֗ן כֹּ֚ה אָמַ֣ר יְהוָ֔ה יַ֧עַן אֲמָרְ/כֶ֛ם אֶת הַ/דָּבָ֥ר הַ/זֶּ֖ה מַשָּׂ֣א יְהוָ֑ה וָ/אֶשְׁלַ֤ח אֲלֵי/כֶם֙ לֵ/אמֹ֔ר לֹ֥א תֹאמְר֖וּ מַשָּׂ֥א יְהוָֽה־־׃
translation:
  text: 'But if you say, ‘The burden of Yahweh,’ therefore this is what Yahweh says: Because you have said this word, ‘The burden of Yahweh,’ though I sent to you, saying, ‘You shall not say, “The burden of Yahweh,”’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'oracle of the LORD.' Hebrew massa can denote a prophetic utterance, but 'burden' is retained here to preserve the repeated wordplay in this passage.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the preceding prohibition; 'But if' captures both the conjunction and the adversative force in context.
- source_word: מַשָּׂא
  chosen: burden
  alternatives:
  - oracle
  - message
  lexicon: HALOT
  rationale: The noun can mean 'burden,' 'load,' and by extension a prophetic 'oracle.' In this context Jeremiah is polemicizing against the slogan 'massa of the LORD'; retaining 'burden' preserves the wordplay and the irony of the term being misused. 'Oracle' is possible but would mute the rhetorical repetition.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name YHWH per DOCTRINE.md.
- source_word: תֹּאמֵרוּ
  chosen: you say
  alternatives:
  - you speak
  - you declare
  lexicon: HALOT
  rationale: Simple speech verb in 2mp; 'say' is the most direct and natural rendering.
- source_word: לָכֵן
  chosen: therefore
  alternatives:
  - thus
  - for that reason
  lexicon: HALOT
  rationale: Marks the consequent judgment formula; 'therefore' fits the prophetic style and logical connection.
- source_word: כֹּה אָמַר יְהוָה
  chosen: this is what the LORD says
  alternatives:
  - thus says the LORD
  lexicon: HALOT
  rationale: A standard prophetic messenger formula. Rendered in readable modern English while preserving formal force.
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - On account of
  lexicon: HALOT
  rationale: Introduces the reason for judgment; 'Because' is clear and natural.
- source_word: אֲמָרְכֶם אֶת־הַדָּבָר הַזֶּה
  chosen: you have said this word
  alternatives:
  - you have spoken this thing
  - you have said this message
  lexicon: HALOT
  rationale: דבר here refers to the specific utterance/slogan they used. 'Word' preserves the singular demonstrative construction and the pointed reference to the exact phrase.
- source_word: וָאֶשְׁלַח אֲלֵיכֶם לֵאמֹר
  chosen: though I sent to you, saying
  alternatives:
  - and I sent to you, saying
  - when I sent to you, saying
  lexicon: HALOT
  rationale: 'The waw-consecutive can be rendered simply ''and I sent,'' but in context it is concessive: despite God''s prior warning, they still used the phrase. ''Though I sent to you'' brings out that force in idiomatic English without adding content.'
- source_word: לֹא תֹאמְרוּ
  chosen: You shall not say
  alternatives:
  - Do not say
  - You must not say
  lexicon: HALOT
  rationale: The quoted divine prohibition is best rendered with solemn force. 'You shall not say' matches prophetic diction and the directness of the Hebrew imperfect in prohibition.
