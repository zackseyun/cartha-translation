theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering מַשָּׂא in a context of prophetic wordplay
  chosen_reading: burden
  alternative_readings:
  - oracle
  - message
  rationale: Although 'oracle' is a common contextual rendering in prophetic superscriptions, this verse condemns the repeated use of the expression 'massa of the LORD.' Preserving 'burden' in the main text keeps the rhetorical repetition and the irony of the term's misuse. An alternative is preserved in a footnote for auditability.
