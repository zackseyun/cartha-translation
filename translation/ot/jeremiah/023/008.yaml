id: JER.23.8
reference: Jeremiah 23:8
source:
  edition: WLC
  text: כִּ֣י אִם חַי יְהוָ֗ה אֲשֶׁ֣ר הֶעֱלָה֩ וַ/אֲשֶׁ֨ר הֵבִ֜יא אֶת זֶ֨רַע בֵּ֤ית יִשְׂרָאֵל֙ מֵ/אֶ֣רֶץ צָפ֔וֹנָ/ה וּ/מִ/כֹּל֙ הָֽ/אֲרָצ֔וֹת אֲשֶׁ֥ר הִדַּחְתִּ֖י/ם שָׁ֑ם וְ/יָשְׁב֖וּ עַל אַדְמָתָֽ/ם־־־־׃ס
translation:
  text: but, ‘As Yahweh lives, who brought up and who brought in the offspring of the house of Israel from the land of the north and from all the lands where I had driven them,’ and they shall dwell on their own soil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rather, “As the LORD lives …”' The Hebrew idiom marks a replacement of the former oath formula in the previous verse.
    reason: lexical_alternative
  - marker: b
    text: '''The LORD'' renders the divine name YHWH. Alternative: ''Yahweh.'''
    reason: alternative_reading
  - marker: c
    text: Or 'the descendants of the house of Israel.'
    reason: lexical_alternative
  - marker: d
    text: Or 'on their own land.' The Hebrew specifically uses a word meaning 'soil/ground.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - rather
  - but rather
  - instead
  lexicon: HALOT
  rationale: In context following v. 7, the idiom introduces a corrective replacement to the former oath formula. 'But' is concise and natural in English, while still signaling contrast. The fuller sense ('rather') is carried by the quotation structure.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is the standard Hebrew oath formula. 'As the LORD lives' preserves both the idiomatic force and the solemnity. Per doctrine, יְהוָה is rendered 'the LORD,' not transliterated.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: הֶעֱלָה
  chosen: brought up
  alternatives:
  - brought out
  - caused to come up
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly means 'bring up,' especially in exodus/restoration contexts. Here it intentionally echoes the exodus language of the preceding verse, so 'brought up' preserves that resonance.
- source_word: הֵבִיא
  chosen: brought in
  alternatives:
  - brought
  - led in
  lexicon: HALOT
  rationale: 'בוא in the Hiphil means ''bring in/bring.'' Rendering it distinctly from ''brought up'' preserves the Hebrew pairing: not only deliverance out of exile but restoration into the land.'
- source_word: זֶרַע בֵּית יִשְׂרָאֵל
  chosen: the offspring of the house of Israel
  alternatives:
  - the descendants of the house of Israel
  - the seed of the house of Israel
  lexicon: HALOT
  rationale: זֶרַע can mean 'seed, offspring, descendants.' 'Offspring' is readable modern English and preserves the collective sense without sounding overly technical. 'House of Israel' is retained formally as a covenantal-national designation.
- source_word: מֵאֶרֶץ צָפוֹנָה
  chosen: from the land of the north
  alternatives:
  - from the north country
  - from the northern land
  lexicon: HALOT
  rationale: A fairly formal rendering preserves the geographic-theological motif in Jeremiah, where the north is the direction of exile and invasion. 'Land of the north' is transparent and close to the Hebrew.
- source_word: וּמִכֹּל הָאֲרָצוֹת
  chosen: and from all the lands
  alternatives:
  - and from every land
  - and from all the countries
  lexicon: HALOT
  rationale: The plural 'lands' reflects the Hebrew plural and suits the dispersion motif. 'Countries' is possible but slightly more modern-political than the Hebrew requires.
- source_word: אֲשֶׁר הִדַּחְתִּים שָׁם
  chosen: where I had driven them
  alternatives:
  - where I drove them
  - to which I had banished them
  lexicon: HALOT
  rationale: The perfect with relative clause refers to prior divine scattering. English past perfect fits the sequence relative to the future restoration. 'Driven' preserves the force of נדח in Hiphil without overinterpreting as formal exile terminology.
- source_word: וְיָשְׁבוּ
  chosen: and they shall dwell
  alternatives:
  - and they will live
  - and they shall settle
  lexicon: HALOT
  rationale: ישב commonly means 'sit, dwell, live, settle.' 'Dwell' fits restoration-to-land language and maintains the covenantal tone better than the flatter 'live.'
- source_word: עַל אַדְמָתָם
  chosen: on their own soil
  alternatives:
  - on their own land
  - in their own land
  lexicon: HALOT
  rationale: אֲדָמָה is more literally 'ground/soil' than אֶרֶץ. 'Their own soil' preserves the earthy, territorial nuance and avoids flattening the distinction between the earlier plural 'lands' and the final restored homeland.
