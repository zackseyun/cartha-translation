  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Restoration imagery as both exodus and return
  chosen_reading: distinguish 'brought up' and 'brought in'
  alternative_readings:
  - collapse both as 'brought'
  - render more dynamically as 'rescued and returned'
  rationale: 'The Hebrew uses two verbs, preserving a theological pattern: deliverance from dispersion and re-entry into the land. The translation keeps both without expanding into interpretive paraphrase.'
