id: JER.23.6
reference: Jeremiah 23:6
source:
  edition: WLC
  text: בְּ/יָמָי/ו֙ תִּוָּשַׁ֣ע יְהוּדָ֔ה וְ/יִשְׂרָאֵ֖ל יִשְׁכֹּ֣ן לָ/בֶ֑טַח וְ/זֶה
    שְּׁמ֥/וֹ אֲֽשֶׁר יִקְרְא֖/וֹ יְהוָ֥ה צִדְקֵֽ/נוּ־־׀׃ס
translation:
  text: 'In his days Judah will be saved, and Israel will dwell securely; and this
    is the name by which he will be called: The LORD Is Our Righteousness.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The LORD our righteousness.' The Hebrew title may be read as a verbless
      name formula.
    reason: lexical_alternative
  - marker: b
    text: '''Righteousness'' could also be rendered ''justice,'' since the Hebrew
      term can carry both senses.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיָמָיו
  chosen: In his days
  alternatives:
  - In those days
  - During his reign
  lexicon: HALOT
  rationale: The phrase is literally 'in his days,' referring to the time of the coming
    righteous Branch/king in context. 'In his days' preserves the Hebrew idiom while
    remaining clear in English.
- source_word: תִּוָּשַׁע
  chosen: will be saved
  alternatives:
  - will be delivered
  - will be rescued
  lexicon: HALOT
  rationale: Niphal of ישׁע commonly denotes being saved/delivered. 'Will be saved'
    is the most direct and theologically resonant rendering without over-specifying
    military or spiritual dimensions.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Standard transliteration of the tribal/national name.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Standard transliteration of the national name; here paired with Judah
    to indicate reunified covenant people.
- source_word: יִשְׁכֹּן לָבֶטַח
  chosen: will dwell securely
  alternatives:
  - will live in safety
  - will dwell in safety
  lexicon: HALOT
  rationale: שׁכן means 'dwell/live,' and לבטח means 'in security/safety.' 'Dwell
    securely' is idiomatic modern English and preserves the settled-security nuance.
- source_word: וְזֶה שְּׁמוֹ
  chosen: and this is the name
  alternatives:
  - and this is his name
  - and this is what he will be called
  lexicon: HALOT
  rationale: The construction introduces a naming formula. 'And this is the name'
    keeps the formal force of the Hebrew before the relative clause specifies the
    naming.
- source_word: אֲשֶׁר יִקְרְאוֹ
  chosen: by which he will be called
  alternatives:
  - that they will call him
  - which one will call him
  lexicon: HALOT
  rationale: 'The Hebrew has a singular verb with object suffix, but English idiom
    naturally renders the naming formula passively: ''by which he will be called.''
    This avoids forcing an unspecified subject and matches the formulaic sense.'
- source_word: יְהוָה
  chosen: The LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.' Here capitalization marks the covenant name while following established
    reverential convention.
- source_word: צִדְקֵנוּ
  chosen: Is Our Righteousness
  alternatives:
  - our righteousness
  - our justice
  lexicon: HALOT
  rationale: The noun צדק/צדקה semantic field includes righteousness and justice.
    In this titular phrase, 'our righteousness' is the most established and contextually
    fitting rendering, expressing that the LORD is the source/ground of his people's
    righteousness. 'Is' is supplied in English to make the name intelligible as a
    title.
