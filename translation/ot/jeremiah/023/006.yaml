theological_decisions:
- issue: Rendering the royal name formula יְהוָה צִדְקֵנוּ
  chosen_reading: The LORD Is Our Righteousness
  alternative_readings:
  - The LORD our righteousness
  - The LORD is our justice
  rationale: The phrase is a throne/name formula for the promised Davidic ruler in
    context. Rendering it as 'The LORD Is Our Righteousness' preserves the divine
    name per doctrine and the predicative force of the title in readable English.
    'Righteousness' is preferred over 'justice' here because the naming formula emphasizes
    covenant rightness/justification more broadly than judicial equity alone, though
    the semantic overlap is real.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה → the LORD; principle 3
    on preserving tension where ambiguity exists.'
