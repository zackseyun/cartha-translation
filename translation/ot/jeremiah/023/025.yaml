theological_decisions:
- issue: Nature of the false prophets' claim
  chosen_reading: those who prophesy lies in my name
  alternative_readings:
  - those who prophesy falsely in my name
  rationale: The Hebrew permits either an object-like noun ('lies') or an adverbial
    sense ('falsely'). The chosen rendering preserves the concrete force of שקר while
    clearly indicating that they falsely invoke YHWH's authority. No doctrinal tension
    is created or resolved beyond the text.
  doctrine_reference: Translation philosophy §3, §5
