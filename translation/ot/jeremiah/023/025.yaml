id: JER.23.25
reference: Jeremiah 23:25
source:
  edition: WLC
  text: שָׁמַ֗עְתִּי אֵ֤ת אֲשֶׁר אָֽמְרוּ֙ הַ/נְּבִאִ֔ים הַֽ/נִּבְּאִ֥ים בִּ/שְׁמִ֛/י
    שֶׁ֖קֶר לֵ/אמֹ֑ר חָלַ֖מְתִּי חָלָֽמְתִּי־׃
translation:
  text: I have heard what the prophets have said, those who prophesy lies in my name,
    saying, ‘I have dreamed! I have dreamed!’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “those who prophesy falsely in my name.”
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתִּי
  chosen: I have heard
  alternatives:
  - I heard
  lexicon: HALOT
  rationale: Qal perfect 1cs of שׁמע. English present perfect fits the discourse well,
    expressing a completed action with present relevance as YHWH responds to ongoing
    false prophecy.
- source_word: אֵת אֲשֶׁר
  chosen: what
  alternatives:
  - that which
  - the thing that
  lexicon: HALOT
  rationale: The object marker plus relative particle functions idiomatically as 'what'
    in natural English.
- source_word: הַנְּבִאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Standard rendering of נביאים; definite article preserved.
- source_word: הַנִּבְּאִים
  chosen: those who prophesy
  alternatives:
  - who are prophesying
  - who prophesy
  lexicon: HALOT
  rationale: Niphal participle masculine plural used substantivally/appositionally
    to 'the prophets.' Rendered as a relative participial clause for clear English.
- source_word: בִּשְׁמִי
  chosen: in my name
  alternatives:
  - under my name
  - by my name
  lexicon: HALOT
  rationale: Standard idiom for claiming divine authorization or speaking under YHWH's
    authority.
- source_word: שֶׁקֶר
  chosen: lies
  alternatives:
  - falsehood
  - deceitfully
  lexicon: HALOT
  rationale: Here שקר qualifies the content or manner of their prophesying. 'Lies'
    is direct, natural, and matches the accusatory force of the context better than
    the more abstract 'falsehood.'
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - by saying
  lexicon: HALOT
  rationale: Common quotative infinitive introducing the content of speech.
- source_word: חָלַמְתִּי חָלָמְתִּי
  chosen: I have dreamed! I have dreamed!
  alternatives:
  - I dreamed! I dreamed!
  lexicon: HALOT
  rationale: The repeated perfect heightens the prophets' emphatic claim to revelatory
    dreams. Repetition is preserved rather than smoothed out.
