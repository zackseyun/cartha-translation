theological_decisions:
- issue: Nature of the prophets' relation to Baal in הִנַּבְּאוּ בַבַּעַל
  chosen_reading: they prophesied by Baal
  alternative_readings:
  - they prophesied in Baal
  - they prophesied for Baal
  rationale: The verse condemns northern prophets for deriving or claiming prophetic
    authority from Baal rather than from the LORD. 'By Baal' preserves the polemical
    force without importing a more developed theology than the Hebrew states.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering תִפְלָה with moral-religious force
  chosen_reading: something offensive
  alternative_readings:
  - folly
  - an appalling thing
  rationale: The context is prophetic and cultic corruption, not mere intellectual
    foolishness. The chosen rendering communicates moral and religious offensiveness
    in readable modern English while avoiding paraphrase.
  doctrine_reference: Translation philosophy §6
