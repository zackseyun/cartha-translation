id: JER.23.13
reference: Jeremiah 23:13
source:
  edition: WLC
  text: וּ/בִ/נְבִיאֵ֥י שֹׁמְר֖וֹן רָאִ֣יתִי תִפְלָ֑ה הִנַּבְּא֣וּ בַ/בַּ֔עַל וַ/יַּתְע֥וּ
    אֶת עַמִּ֖/י אֶת יִשְׂרָאֵֽל־־׃ס
translation:
  text: 'And among the prophets of Samaria I saw something offensive: they prophesied
    by Baal and led my people Israel astray.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'folly' or 'an appalling thing' for 'something offensive.' The Hebrew
      term conveys something morally or religiously outrageous.
    reason: lexical_alternative
  - marker: b
    text: Or 'they prophesied in/for Baal.' The sense is that their prophetic activity
      was carried out under Baal's authority or in Baal's name.
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בִ/נְבִיאֵי
  chosen: And among the prophets of
  alternatives:
  - And in the prophets of
  - Among the prophets of
  lexicon: HALOT
  rationale: The prefixed conjunction ו plus preposition ב with 'prophets' is most
    naturally rendered idiomatically in English as 'and among the prophets of,' expressing
    the sphere in which the observation is made. A more wooden 'and in the prophets
    of' is less natural.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Standard transliteration/rendering of the place name referring to the
    northern kingdom's capital and, by extension here, its prophetic establishment.
- source_word: רָאִיתִי
  chosen: I saw
  alternatives:
  - I have seen
  lexicon: HALOT
  rationale: 'Qal perfect 1cs. In prophetic discourse English simple past is natural
    here: Jeremiah reports what he observed regarding these prophets.'
- source_word: תִפְלָה
  chosen: something offensive
  alternatives:
  - folly
  - an appalling thing
  - unsavoriness
  lexicon: HALOT
  rationale: תפלה denotes something morally or religiously improper, tasteless, or
    outrageous. 'Something offensive' captures the evaluative force in accessible
    modern English without over-specifying. 'Folly' is possible but can sound merely
    intellectual; the context is religious offense.
- source_word: הִנַּבְּאוּ
  chosen: they prophesied
  alternatives:
  - they acted as prophets
  lexicon: HALOT
  rationale: Hitpael of נבא is the standard verb for prophetic activity. 'They prophesied'
    is the clearest and most direct rendering.
- source_word: בַבַּעַל
  chosen: by Baal
  alternatives:
  - in Baal
  - for Baal
  - by means of Baal
  lexicon: HALOT
  rationale: The preposition ב here marks association/instrumental reference in prophetic
    speech. 'By Baal' best conveys that their prophetic utterance was in Baal's name
    or under his claimed authority, echoing common English biblical usage.
- source_word: וַיַּתְעוּ
  chosen: and led ... astray
  alternatives:
  - and caused ... to wander
  - and deceived
  lexicon: HALOT
  rationale: 'The Hiphil of תעה is causative: ''cause to stray.'' ''Led astray'' preserves
    both the causative sense and the covenantal/moral imagery.'
- source_word: אֶת עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Direct object with 1cs suffix; straightforwardly 'my people,' preserving
    the divine possessive.
- source_word: אֶת יִשְׂרָאֵל
  chosen: Israel
  alternatives:
  - namely, Israel
  lexicon: HALOT
  rationale: The second object marker introduces apposition clarifying 'my people'
    as 'Israel.' In English, simple apposition 'my people Israel' is natural and sufficiently
    clear.
