theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יְהוָה is 'the LORD,' following the stated doctrine
    and common reverential English convention.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Aspect of prophetic perfect יָצְאָה
  chosen_reading: has gone out
  alternative_readings:
  - goes out
  - will go out
  rationale: The Hebrew perfect in prophetic judgment contexts often presents a future
    event as certain. Rendering it as present perfect preserves that rhetorical force
    without flattening it into a simple future.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s
    plain sense and theological tension'
