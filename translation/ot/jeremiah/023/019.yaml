id: JER.23.19
reference: Jeremiah 23:19
source:
  edition: WLC
  text: הִנֵּ֣ה סַעֲרַ֣ת יְהוָ֗ה חֵמָה֙ יָֽצְאָ֔ה וְ/סַ֖עַר מִתְחוֹלֵ֑ל עַ֛ל רֹ֥אשׁ
    רְשָׁעִ֖ים יָחֽוּל׀׃
translation:
  text: Look, the storm of the LORD has gone out in wrath, a whirling tempest; it
    will whirl down on the head of the wicked.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the tempest of the LORD' or 'the whirlwind of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'has gone out' uses a prophetic perfect, expressing a future judgment
      as already set in motion.
    reason: lexical_alternative
  - marker: c
    text: Or 'it will burst upon the head of the wicked.' The final verb may emphasize
      the storm's crashing impact as well as its whirling motion.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces the announcement with vivid immediacy. 'Look' is natural modern
    English while preserving the deictic force better than the more archaic 'Behold.'
- source_word: סַעֲרַת יְהוָה
  chosen: the storm of the LORD
  alternatives:
  - the tempest of the LORD
  - the whirlwind of the LORD
  lexicon: HALOT
  rationale: סַעֲרָה denotes a storm/tempest. 'Storm' is the most accessible modern
    rendering. The construct with יְהוָה indicates the storm belongs to or proceeds
    from the LORD. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving
    covenantal reference in standard English Bible style.
- source_word: חֵמָה
  chosen: in wrath
  alternatives:
  - wrath
  - fury
  - anger
  lexicon: HALOT
  rationale: 'Taken appositionally/adverbially with the preceding clause: the LORD''s
    storm goes out ''in wrath.'' This preserves the noun''s force without producing
    awkward English such as ''the storm of the LORD, wrath, has gone out.'' ''Wrath''
    better matches prophetic judgment diction than the milder ''anger.'''
- source_word: יָצְאָה
  chosen: has gone out
  alternatives:
  - has gone forth
  - has gone out
  lexicon: HALOT
  rationale: 'Perfect verb presented as a vivid prophetic perfect: the judgment is
    so certain it is spoken of as already gone out. ''Has gone out'' is idiomatic
    modern English and preserves the completed aspect.'
- source_word: וְסַעַר
  chosen: a whirling tempest
  alternatives:
  - and a storm
  - and a tempest
  - even a tempest
  lexicon: HALOT
  rationale: The conjunction links a further description of the storm. Rendering with
    an appositional English phrase avoids clumsy repetition while preserving the intensification.
    'Tempest' adds force and variety while remaining close in sense.
- source_word: מִתְחוֹלֵל
  chosen: whirling
  alternatives:
  - swirling
  - twisting itself
  - writhing
  lexicon: HALOT
  rationale: The hitpolel participle from חול conveys violent twisting/whirling motion.
    'Whirling' is concise and fits storm imagery naturally.
- source_word: עַל רֹאשׁ רְשָׁעִים
  chosen: on the head of the wicked
  alternatives:
  - upon the head of the wicked
  - on the heads of the wicked
  lexicon: HALOT
  rationale: The singular 'head' with plural 'wicked' is a common collective idiom
    in Hebrew. English can preserve the singular naturally enough here. 'The wicked'
    captures the substantival plural without over-specifying individuals.
- source_word: יָחוּל
  chosen: it will whirl down
  alternatives:
  - it will fall
  - it will burst
  - it will writhe down
  lexicon: HALOT
  rationale: From the same root as מִתְחוֹלֵל, the verb likely continues the storm's
    violent circling motion as it comes upon the wicked. 'Whirl down' preserves the
    lexical connection and the image better than the more interpretive 'burst.'
