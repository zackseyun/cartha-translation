theological_decisions:
- issue: Referent of the first-person suffix in 'those who despise me'
  chosen_reading: The 'me' refers to the LORD, not Jeremiah.
  alternative_readings:
  - The 'me' refers to Jeremiah as the prophet
  rationale: Within the immediate clause the false prophets invoke 'The LORD has spoken,' and the broader context concerns rejection of the LORD's word. Rendering simply 'me' preserves the Hebrew while understanding the speaker as the LORD in Jeremiah's prophetic discourse.
