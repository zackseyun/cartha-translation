id: JER.23.17
reference: Jeremiah 23:17
source:
  edition: WLC
  text: אֹמְרִ֤ים אָמוֹר֙ לִֽ/מְנַאֲצַ֔/י דִּבֶּ֣ר יְהוָ֔ה שָׁל֖וֹם יִֽהְיֶ֣ה לָ/כֶ֑ם וְ֠/כֹל הֹלֵ֞ךְ בִּ/שְׁרִר֤וּת לִבּ/וֹ֙ אָֽמְר֔וּ לֹֽא תָב֥וֹא עֲלֵי/כֶ֖ם רָעָֽה־׃
translation:
  text: 'They keep saying to those who despise me, ‘Yahweh has spoken: You will have peace’; and to everyone who walks in the stubbornness of his own heart they say, ‘No disaster will come upon you.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to my despisers' or 'to those who spurn me.' The Hebrew has 'those who despise me.'
    reason: lexical_alternative
  - marker: b
    text: '''Peace'' can also carry the sense of well-being or prosperity.'
    reason: lexical_alternative
  - marker: c
    text: Or 'No evil will come upon you'; here 'evil' refers to calamity or disaster, not moral evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹמְרִים אָמוֹר
  chosen: They keep saying
  alternatives:
  - They say continually
  - Saying persistently
  lexicon: HALOT
  rationale: The combination of participle plus infinitive absolute from אמר intensifies and gives iterative force. 'They keep saying' captures the ongoing, emphatic repetition in natural English.
- source_word: לִמְנַאֲצַי
  chosen: to those who despise me
  alternatives:
  - to my despisers
  - to those who spurn me
  lexicon: HALOT
  rationale: The participle of נאץ with 1cs suffix means 'those who despise/spurn me.' The first-person suffix is best taken as referring to the LORD in the quoted prophetic indictment. 'Despise' is clear modern English and preserves the personal offense against God.
- source_word: דִּבֶּר יְהוָה
  chosen: The LORD has spoken
  alternatives:
  - The LORD speaks
  - The LORD said
  lexicon: HALOT
  rationale: Perfect verb with YHWH as subject in a prophetic formula. 'Has spoken' conveys the declarative force in English and fits the false prophets' claim to divine authorization. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שָׁלוֹם
  chosen: peace
  alternatives:
  - well-being
  - prosperity
  lexicon: HALOT
  rationale: שָׁלוֹם can denote wholeness, welfare, or peace. Here the false assurance concerns safety and well-being; 'peace' is the standard concise rendering and retains the prophetic resonance, while broader nuance is possible in context.
- source_word: יִהְיֶה לָכֶם
  chosen: you will have
  alternatives:
  - there will be for you
  - shall be yours
  lexicon: HALOT
  rationale: Idiomatic English turns the existential construction into 'you will have peace' rather than the more wooden 'peace will be to you.'
- source_word: וְכֹל הֹלֵךְ
  chosen: and to everyone who walks
  alternatives:
  - and everyone walking
  - and every one who goes
  lexicon: HALOT
  rationale: The phrase introduces a general class of persons. 'Everyone who walks' is idiomatic and preserves the habitual ethical metaphor of 'walking.'
- source_word: בִּשְׁרִרוּת לִבּוֹ
  chosen: in the stubbornness of his own heart
  alternatives:
  - in the stubbornness of his heart
  - according to the hardness of his heart
  lexicon: HALOT
  rationale: שְׁרִרוּת denotes stubbornness or obstinacy. 'His own heart' brings out the possessive suffix and the self-directed autonomy implied by the phrase.
- source_word: אָמְרוּ
  chosen: they say
  alternatives:
  - they have said
  - they keep saying
  lexicon: HALOT
  rationale: A simple past/perfect form in Hebrew here functions naturally in English as present within the ongoing quoted behavior. Repeating 'they say' keeps the parallelism with the first clause.
- source_word: לֹא תָבוֹא עֲלֵיכֶם רָעָה
  chosen: No disaster will come upon you
  alternatives:
  - No evil will come upon you
  - No harm will come on you
  lexicon: HALOT
  rationale: רָעָה in prophetic judgment contexts commonly means calamity/disaster rather than moral evil. 'Come upon you' reflects the Hebrew idiom עַל with בוא.
