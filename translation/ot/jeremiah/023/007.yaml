id: JER.23.7
reference: Jeremiah 23:7
source:
  edition: WLC
  text: לָ/כֵ֛ן הִנֵּֽה יָמִ֥ים בָּאִ֖ים נְאֻם יְהוָ֑ה וְ/לֹא יֹ֤אמְרוּ עוֹד֙ חַי יְהוָ֔ה אֲשֶׁ֧ר הֶעֱלָ֛ה אֶת בְּנֵ֥י יִשְׂרָאֵ֖ל מֵ/אֶ֥רֶץ מִצְרָֽיִם־־־־־׃
translation:
  text: Therefore, behold, days are coming, declares Yahweh, when they will no longer say, ‘As Yahweh lives, who brought up the sons of Israel from the land of Egypt,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, “the Israelites.”
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks an inferential transition from the preceding context; 'Therefore' preserves the prophetic logical connection.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Retains the prophetic deictic force and solemnity. Though somewhat elevated, it remains readable and signals emphasis better than a colloquial alternative.
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are on the way
  lexicon: HALOT
  rationale: Standard prophetic idiom announcing a future time. The anarthrous Hebrew is naturally rendered in English without forcing the article.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A natural modern rendering of the prophetic messenger formula. 'The LORD' follows the project's default for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְלֹא יֹאמְרוּ עוֹד
  chosen: they will no longer say
  alternatives:
  - they will not say again
  - people will no longer say
  lexicon: HALOT
  rationale: Captures the future negation with עוֹד as cessation ('no longer'). The unspecified 3mp subject is left generic as in Hebrew.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - The LORD lives
  - By the life of the LORD
  lexicon: HALOT
  rationale: This is a fixed oath formula. 'As the LORD lives' is idiomatic English that preserves the force of an oath or solemn affirmation.
- source_word: אֲשֶׁר הֶעֱלָה
  chosen: who brought up
  alternatives:
  - who brought out
  - who caused to come up
  lexicon: HALOT
  rationale: The Hiphil of עלה in exodus contexts commonly refers to bringing a people up/out from a land. 'Brought up' preserves the Hebrew verb and traditional exodus idiom.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the people of Israel
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Following the gender-accurate principle, the formally masculine construct is preserved as 'sons of Israel.' This also maintains lexical transparency to the Hebrew. A more idiomatic alternative is worth preserving in a footnote.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - out of the land of Egypt
  - from Egypt
  lexicon: HALOT
  rationale: A close rendering of the Hebrew phrase that preserves the covenant-historical resonance of 'the land of Egypt' rather than reducing it simply to 'Egypt'.
