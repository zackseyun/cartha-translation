theological_decisions:
- issue: Rendering of מַשָּׂא יְהוָה in Jeremiah's polemic
  chosen_reading: The burden of Yahweh
  alternative_readings:
  - The oracle of the LORD
  - The utterance of the LORD
  rationale: Elsewhere מַשָּׂא may be rendered 'oracle,' but in Jeremiah 23:33–40 the prophet explicitly rejects the people's use of this formula and exploits the literal sense 'burden.' Translating it 'burden' preserves the rhetorical and theological force of the passage rather than smoothing it into a conventional prophetic heading.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering of יְהוָה
