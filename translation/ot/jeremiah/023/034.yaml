id: JER.23.34
reference: Jeremiah 23:34
source:
  edition: WLC
  text: וְ/הַ/נָּבִ֤יא וְ/הַ/כֹּהֵן֙ וְ/הָ/עָ֔ם אֲשֶׁ֥ר יֹאמַ֖ר מַשָּׂ֣א יְהוָ֑ה וּ/פָקַדְתִּ֛י עַל הָ/אִ֥ישׁ הַ/ה֖וּא וְ/עַל בֵּיתֽ/וֹ־־׃
translation:
  text: And as for the prophet, the priest, or the people who say, “The burden of Yahweh,” I will punish that man and his household.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “The oracle of the LORD.” The Hebrew word massa can mean “oracle,” but here Jeremiah appears to exploit its more literal sense, “burden,” as part of his rebuke.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנָּבִיא
  chosen: the prophet
  alternatives:
  - the prophet
  lexicon: HALOT
  rationale: Standard rendering of נָבִיא as 'prophet.' The article is preserved.
- source_word: הַכֹּהֵן
  chosen: the priest
  alternatives:
  - the priest
  lexicon: HALOT
  rationale: Standard rendering of כֹּהֵן as 'priest.' The article is preserved.
- source_word: הָעָם
  chosen: the people
  alternatives:
  - the populace
  lexicon: HALOT
  rationale: עָם commonly means 'people' in a collective sense. 'The people' is natural and sufficiently formal.
- source_word: אֲשֶׁר יֹאמַר
  chosen: who say
  alternatives:
  - who says
  - that says
  lexicon: HALOT
  rationale: Although יֹאמַר is morphologically singular, the relative clause applies distributively to the coordinated singular collectives ('the prophet, the priest, or the people'). English idiom is best served by plural-sense 'who say' after the series, while the following 'that man' narrows the judgment to each offender individually.
- source_word: מַשָּׂא יְהוָה
  chosen: The burden of the LORD
  alternatives:
  - The oracle of the LORD
  - The utterance of the LORD
  lexicon: HALOT
  rationale: מַשָּׂא can denote an 'oracle,' but in Jeremiah 23 the term is used polemically with its literal sense 'burden/load' foregrounded. Rendering it 'burden' preserves the wordplay and the reason for the prohibition in context. Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's contested-terms policy for the divine name.
- source_word: וּפָקַדְתִּי עַל
  chosen: I will punish
  alternatives:
  - I will attend to
  - I will visit judgment on
  - I will call to account
  lexicon: HALOT
  rationale: פָּקַד with עַל in judgment contexts means to visit/punish. 'I will punish' gives the plain sense in clear modern English.
- source_word: הָאִישׁ הַהוּא
  chosen: that man
  alternatives:
  - that person
  - that one
  lexicon: HALOT
  rationale: Gender-accurate rendering is preferred by project policy. Though the referent may be generic, the Hebrew is grammatically masculine singular and points to each individual offender.
- source_word: בֵּיתוֹ
  chosen: his household
  alternatives:
  - his house
  - his family
  lexicon: HALOT
  rationale: בַּיִת in this context refers not merely to a building but to the man's household/family unit. 'Household' best captures the social sense.
