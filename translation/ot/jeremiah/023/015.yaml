theological_decisions:
- issue: Rendering of divine judgment imagery
  chosen_reading: 'Concrete punitive imagery retained: God feeds the false prophets wormwood and gives them poisoned water to drink.'
  alternative_readings:
  - Metaphorical paraphrase such as 'I will make them suffer bitter judgment'
  rationale: The Hebrew uses vivid prophetic judgment imagery. Optimal equivalence here favors preserving the concrete metaphors rather than paraphrasing them away, since they carry theological weight about divine retribution.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological weight without paraphrase.'
