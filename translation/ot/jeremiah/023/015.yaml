id: JER.23.15
reference: Jeremiah 23:15
source:
  edition: WLC
  text: לָ/כֵ֞ן כֹּֽה אָמַ֨ר יְהוָ֤ה צְבָאוֹת֙ עַל הַ/נְּבִאִ֔ים הִנְ/נִ֨י מַאֲכִ֤יל אוֹתָ/ם֙ לַֽעֲנָ֔ה וְ/הִשְׁקִתִ֖י/ם מֵי רֹ֑אשׁ כִּ֗י מֵ/אֵת֙ נְבִיאֵ֣י יְרוּשָׁלִַ֔ם יָצְאָ֥ה חֲנֻפָּ֖ה לְ/כָל הָ/אָֽרֶץ־־־־׃פ
translation:
  text: 'Therefore this is what Yahweh of Armies says concerning the prophets: ‘Look, I am feeding them wormwood and making them drink poisoned water, because from the prophets of Jerusalem ungodliness has gone out into all the land.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'water of gall.' The Hebrew expression is literally 'waters of rosh,' referring to a bitter or poisonous substance.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of Hosts
  lexicon: HALOT
  rationale: Translated the title יְהוָה צְבָאוֹת as 'the LORD of Armies' to preserve the concrete military sense of צבאות in readable modern English; 'of Hosts' is traditional but less transparent to modern readers.
- source_word: עַל הַנְּבִאִים
  chosen: concerning the prophets
  alternatives:
  - against the prophets
  lexicon: HALOT
  rationale: The preposition עַל with a speech formula can mean 'concerning' or 'against.' Here the oracle is clearly condemnatory, but 'concerning' is the broader and more literal fit in English after 'says,' while the content itself conveys the judgment.
- source_word: הִנְנִי
  chosen: Look, I am about to
  alternatives:
  - Behold, I am
  - See, I am
  lexicon: HALOT
  rationale: הִנְנִי is a discourse marker of emphatic divine self-presentation. 'Look, I am about to' captures both the attention-getting force and the imminent action in natural modern English.
- source_word: מַאֲכִיל
  chosen: feed
  alternatives:
  - make eat
  lexicon: HALOT
  rationale: Hiphil of אכל means 'cause to eat/feed.' 'Feed' is idiomatic English and preserves the causative sense.
- source_word: לַעֲנָה
  chosen: wormwood
  alternatives:
  - bitterness
  lexicon: HALOT
  rationale: לענה commonly denotes wormwood, a bitter plant used metaphorically for judgment. Retaining 'wormwood' preserves the prophetic imagery better than flattening it to 'bitterness.'
- source_word: וְהִשְׁקִיתִים
  chosen: give them ... to drink
  alternatives:
  - make them drink
  lexicon: HALOT
  rationale: The Hiphil of שׁקה is causative, 'make/give to drink.' 'Give them ... to drink' is natural English and keeps the causative force.
- source_word: מֵי רֹאשׁ
  chosen: poisoned water
  alternatives:
  - water of gall
  - water of poison
  lexicon: HALOT
  rationale: רֹאשׁ in this collocation refers to a poisonous/bitter substance, not the common noun 'head.' 'Poisoned water' communicates the sense clearly for modern readers; the more literal 'water of gall' is preserved in a footnote as a lexical alternative.
- source_word: חֲנֻפָּה
  chosen: ungodliness
  alternatives:
  - pollution
  - profaneness
  - godlessness
  lexicon: HALOT
  rationale: The noun denotes irreligion, profaneness, or moral pollution. 'Ungodliness' best captures both the religious and ethical corruption in a concise English term.
- source_word: יָצְאָה
  chosen: has gone out
  alternatives:
  - has spread
  - has come forth
  lexicon: HALOT
  rationale: The verb is literally 'has gone out.' This preserves the metaphor of corruption proceeding outward from Jerusalem's prophets, while remaining natural in English.
- source_word: לְכָל הָאָרֶץ
  chosen: into all the land
  alternatives:
  - throughout the whole land
  - into all the earth
  lexicon: HALOT
  rationale: In Jeremiah, הָאָרֶץ here most naturally refers to the land of Judah/the land in view, not the entire globe. 'Into all the land' preserves the scope without overstating it as 'earth.'
