id: JER.23.35
reference: Jeremiah 23:35
source:
  edition: WLC
  text: כֹּ֥ה תֹאמְר֛וּ אִ֥ישׁ עַל רֵעֵ֖/הוּ וְ/אִ֣ישׁ אֶל אָחִ֑י/ו מֶה עָנָ֣ה יְהוָ֔ה וּ/מַה דִּבֶּ֖ר יְהוָֽה־־־־׃
translation:
  text: Thus each man shall say to his neighbor, and each man to his brother, ‘What has Yahweh answered?’ and, ‘What has Yahweh spoken?’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''What has Yahweh answered?'' The divine name is rendered ''the LORD'' in the main text per project style.'
    reason: alternative_reading
  - marker: b
    text: Or 'What has the LORD said?'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - This is how
  - So
  lexicon: HALOT
  rationale: Introduces the prescribed manner of speaking. 'Thus' is concise and natural in prophetic discourse.
- source_word: תֹאמְרוּ
  chosen: shall say
  alternatives:
  - you shall say
  - are to say
  lexicon: HALOT
  rationale: Second masculine plural addresses the audience directly. In English, 'each man shall say' captures the distributive force of the following אִישׁ while preserving the directive sense.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: The noun is grammatically masculine and distributive here. Per gender-accurate policy, 'each man' preserves the source form and representative force better than a neutral paraphrase.
- source_word: עַל רֵעֵהוּ
  chosen: to his neighbor
  alternatives:
  - concerning his companion
  - to his friend
  lexicon: HALOT
  rationale: Though עַל often means 'on/about,' in this idiom with speaking it functions naturally as the person addressed. 'Neighbor' fits רֵעַ well in this interpersonal context.
- source_word: וְאִישׁ אֶל אָחִיו
  chosen: and each man to his brother
  alternatives:
  - and each one to his brother
  - and a man to his brother
  lexicon: HALOT
  rationale: Keeps the parallelism with the first clause and preserves the masculine kinship term אָח as 'brother' rather than flattening it to 'fellow'.
- source_word: מֶה
  chosen: What
  alternatives:
  - How
  - What is it that
  lexicon: HALOT
  rationale: Direct interrogative introducing the quoted question.
- source_word: עָנָה
  chosen: has ... answered
  alternatives:
  - answered
  - responded
  lexicon: HALOT
  rationale: The verb means 'answer/respond.' Present perfect in English suits the inquiry about what response the LORD has given.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וּמַה
  chosen: and, ‘What
  alternatives:
  - and what
  - and, 'What is it that'
  lexicon: HALOT
  rationale: Introduces a second parallel question; punctuation marks the repeated quoted inquiry clearly in English.
- source_word: דִּבֶּר
  chosen: has ... spoken
  alternatives:
  - said
  - declared
  lexicon: HALOT
  rationale: דבר commonly means 'speak/say.' 'Spoken' preserves the verbal connection to divine speech and avoids overinterpreting as formal proclamation.
