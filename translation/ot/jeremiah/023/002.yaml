theological_decisions:
- issue: Rendering the repeated פקד wordplay in neglect and judgment
  chosen_reading: Use 'attended to' in both clauses, with the second clarified by 'for the evil of your deeds.'
  alternative_readings:
  - Use 'cared for' in the first clause and 'punish' in the second
  - Use 'visited' in both clauses
  rationale: 'The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered ''Yahweh'' rather than ''the LORD'', preserving the covenant name God revealed at Sinai.'
  doctrine_reference: Translation philosophy §3, §5
- issue: Metaphorical vs interpretive rendering of shepherds
  chosen_reading: Retain 'shepherds' rather than substituting 'leaders.'
  alternative_readings:
  - leaders
  - rulers
  rationale: The shepherd metaphor is central to the immediate context and to biblical theology of leadership. Rendering it literally preserves the imagery without denying that human rulers are in view.
  doctrine_reference: Translation philosophy §1, §5
