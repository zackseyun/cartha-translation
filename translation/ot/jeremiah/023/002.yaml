id: JER.23.2
reference: Jeremiah 23:2
source:
  edition: WLC
  text: לָ֠/כֵן כֹּֽה אָמַ֨ר יְהוָ֜ה אֱלֹהֵ֣י יִשְׂרָאֵ֗ל עַֽל הָ/רֹעִים֮ הָ/רֹעִ֣ים אֶת עַמִּ/י֒ אַתֶּ֞ם הֲפִצֹתֶ֤ם אֶת צֹאנִ/י֙ וַ/תַּדִּח֔וּ/ם וְ/לֹ֥א פְקַדְתֶּ֖ם אֹתָ֑/ם הִנְ/נִ֨י פֹקֵ֧ד עֲלֵי/כֶ֛ם אֶת רֹ֥עַ מַעַלְלֵי/כֶ֖ם נְאֻם יְהוָֽה־־־־־־׃
translation:
  text: 'Therefore this is what Yahweh, the God of Israel, says concerning the shepherds who shepherd my people: You have scattered my flock and driven them away, and you have not attended to them. Behold, I am about to attend to you for the evil of your deeds, declares Yahweh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against the shepherds'; the preposition can introduce an oracle directed hostilely toward them.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew repeats the verb ''attend to/visit'' in both clauses: ''you have not attended to them ... I am attending to you,'' creating a deliberate reversal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Standard construct rendering; identifies YHWH covenantally in relation to Israel.
- source_word: עַל
  chosen: concerning
  alternatives:
  - against
  - about
  lexicon: HALOT
  rationale: In prophetic speech introductions, עַל can mean 'concerning' or 'against.' Here the following rebuke is indeed hostile, but 'concerning' fits the syntax naturally while the judgment itself is made explicit in the rest of the verse.
- source_word: הָרֹעִים הָרֹעִים אֶת עַמִּי
  chosen: the shepherds who shepherd my people
  alternatives:
  - the shepherds tending my people
  - the leaders who shepherd my people
  lexicon: HALOT
  rationale: Preserves the Hebrew repetition of the participle for rhetorical force. 'Shepherds' is retained rather than interpreted as 'leaders,' since the metaphor is central in Jeremiah 23.
- source_word: הֲפִצֹתֶם
  chosen: have scattered
  alternatives:
  - have dispersed
  lexicon: HALOT
  rationale: A direct and idiomatic rendering of the Hiphil of פוץ in a flock context.
- source_word: צֹאנִי
  chosen: my flock
  alternatives:
  - my sheep
  lexicon: HALOT
  rationale: Though literally 'my sheep/flock,' 'my flock' fits the collective sense in context and reads naturally with the shepherd metaphor.
- source_word: וַתַּדִּחוּם
  chosen: driven them away
  alternatives:
  - banished them
  - thrust them away
  lexicon: HALOT
  rationale: Captures the causative force and the pastoral image of forcing the flock away.
- source_word: וְלֹא פְקַדְתֶּם אֹתָם
  chosen: you have not attended to them
  alternatives:
  - you have not cared for them
  - you have not visited them
  lexicon: HALOT
  rationale: The verb פקד has a broad semantic range including attend, care for, visit, muster, punish. Here it contrasts with the leaders' neglect and sets up the wordplay with the next clause, so 'attended to' preserves both pastoral care and the coming reversal.
- source_word: הִנְנִי
  chosen: Behold, I am about to
  alternatives:
  - Behold, I am
  - See, I am about to
  lexicon: HALOT
  rationale: Introduces imminent divine action. 'Behold' preserves prophetic solemnity; 'about to' makes the impending force natural in English.
- source_word: פֹקֵד עֲלֵיכֶם
  chosen: attend to you
  alternatives:
  - punish you
  - visit you
  lexicon: HALOT
  rationale: Retains the deliberate wordplay with 'you have not attended to them.' Because the object is 'the evil of your deeds,' the punitive sense is clear from context without replacing the repeated verb with a different English word.
- source_word: אֶת רֹעַ מַעַלְלֵיכֶם
  chosen: for the evil of your deeds
  alternatives:
  - for your evil deeds
  - because of the wickedness of your actions
  lexicon: HALOT
  rationale: רֹעַ denotes evil/wickedness, and מַעַלְלִים refers to deeds/actions. 'For the evil of your deeds' preserves the Hebrew construction and clarifies the basis of judgment.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula in clear modern English.
