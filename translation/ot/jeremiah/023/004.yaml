theological_decisions:
- issue: Rendering the shepherd imagery
  chosen_reading: Retain literal 'shepherds' and 'shepherd them' language
  alternative_readings:
  - Render more interpretively as 'leaders' who 'care for' them
  rationale: The verse's theological force depends on the shepherd metaphor in the
    immediate context of failed and restored leadership. Preserving the image avoids
    flattening the prophetic symbolism.
  doctrine_reference: Translation philosophy §1, §5
- issue: Scope of וְלֹא יִפָּקֵדוּ
  chosen_reading: Express the result as 'nor will any be missing'
  alternative_readings:
  - '''nor will they be lacking'''
  - '''nor will any be lost'''
  rationale: The clause emphasizes complete preservation of the flock under God's
    appointed shepherds. 'Missing' best preserves the concrete sense without importing
    later theological language of salvation/lostness beyond the text.
  doctrine_reference: Translation philosophy §1, §3
