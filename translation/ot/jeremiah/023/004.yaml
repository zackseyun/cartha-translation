id: JER.23.4
reference: Jeremiah 23:4
source:
  edition: WLC
  text: וַ/הֲקִמֹתִ֧י עֲלֵי/הֶ֛ם רֹעִ֖ים וְ/רָע֑וּ/ם וְ/לֹא יִֽירְא֨וּ ע֧וֹד וְ/לֹא
    יֵחַ֛תּוּ וְ/לֹ֥א יִפָּקֵ֖דוּ נְאֻם יְהוָֽה־־־׃ס
translation:
  text: And I will raise up over them shepherds who will shepherd them, and they will
    no longer fear, nor be dismayed, nor will any be missing, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nor will they be lacking' / 'nor will any be lost.' The Hebrew likely
      means that none of the flock will be missing or unaccounted for.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲקִמֹתִי
  chosen: I will raise up
  alternatives:
  - I will set up
  - I will appoint
  lexicon: HALOT
  rationale: הקים in this context refers to causing leaders to arise/stand in place
    over the people. 'Raise up' preserves both the idiomatic force and the divine
    initiative without over-specifying the mechanism.
- source_word: עֲלֵיהֶם
  chosen: over them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The preposition עַל with persons and leadership language naturally conveys
    authority/responsibility 'over' them. 'For them' is possible in English sense,
    but 'over them' better reflects the Hebrew construction.
- source_word: רֹעִים
  chosen: shepherds
  alternatives:
  - pastors
  - leaders
  lexicon: HALOT
  rationale: The noun literally means 'shepherds' and continues the shepherd imagery
    of the surrounding context. 'Pastors' would import later ecclesial associations
    not explicit in Jeremiah.
- source_word: וְרָעוּם
  chosen: who will shepherd them
  alternatives:
  - and they will pasture them
  - and they will tend them
  lexicon: HALOT
  rationale: Using the cognate verb 'shepherd' preserves the Hebrew wordplay with
    רֹעִים. 'Pasture' is too narrow; 'tend' is acceptable but loses the explicit shepherd
    metaphor.
- source_word: וְלֹא יִירְאוּ עוֹד
  chosen: and they will no longer fear
  alternatives:
  - and they will not be afraid anymore
  lexicon: HALOT
  rationale: ירא here denotes fear experienced by the flock under bad leadership.
    'No longer fear' is natural modern English and preserves the temporal adverb עוֹד.
- source_word: וְלֹא יֵחַתּוּ
  chosen: nor be dismayed
  alternatives:
  - nor be terrified
  - nor be shattered
  lexicon: HALOT
  rationale: The Niphal of חתת often conveys being broken down, dismayed, or terrified.
    'Be dismayed' fits the pastoral-restoration context and pairs well with 'fear'
    without collapsing the terms into exact synonyms.
- source_word: וְלֹא יִפָּקֵדוּ
  chosen: nor will any be missing
  alternatives:
  - nor will they be lacking
  - nor will any be lost
  lexicon: HALOT
  rationale: The Niphal of פקד here most likely means 'be missing/absent, unaccounted
    for.' Rendering it as 'any be missing' captures the distributive sense of the
    flock with good idiomatic English. 'Lost' is interpretive and could suggest a
    different metaphor.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. Per doctrine, יְהוָה is rendered
    'the LORD.' 'Declares' is a clear modern equivalent for נְאֻם in prophetic speech.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: 'Follows the project''s contested-terms policy for the divine name: ''the
    LORD'' in line with Jewish reverence tradition and the Septuagintal pattern.'
