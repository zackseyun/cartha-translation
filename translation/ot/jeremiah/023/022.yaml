theological_decisions:
- issue: Nature of the divine סוֹד
  chosen_reading: Rendered as 'my council' to reflect the prophetic image of participation
    in the LORD's deliberative assembly.
  alternative_readings:
  - my counsel
  - my secret council
  rationale: The verse contrasts false prophets with true prophetic access to God's
    own deliberative presence. 'Council' preserves that theological image without
    over-specifying beyond the Hebrew.
  doctrine_reference: Translation philosophy §1, §3
