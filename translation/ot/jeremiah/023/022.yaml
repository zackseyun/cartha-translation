id: JER.23.22
reference: Jeremiah 23:22
source:
  edition: WLC
  text: וְ/אִֽם עָמְד֖וּ בְּ/סוֹדִ֑/י וְ/יַשְׁמִ֤עוּ דְבָרַ/י֙ אֶת עַמִּ֔/י וִֽ/ישִׁבוּ/ם֙
    מִ/דַּרְכָּ֣/ם הָ/רָ֔ע וּ/מֵ/רֹ֖עַ מַֽעַלְלֵי/הֶֽם־־׃ס
translation:
  text: But if they had stood in my council, then they would have caused my people
    to hear my words, and they would have turned them from their evil way and from
    the evil of their deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in my secret council' or 'in my counsel.' The Hebrew סוֹד can refer
      to a confidential council, intimate circle, or counsel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: The conjunction links contrastively with the preceding denunciation of
    false prophets; 'But if' brings out the adversative force in context better than
    a simple 'And if.'
- source_word: עָמְדוּ
  chosen: had stood
  alternatives:
  - stood
  lexicon: HALOT
  rationale: The qatal form in this counterfactual setting is well represented by
    the English pluperfect 'had stood,' matching the unreal condition implied by the
    context.
- source_word: בְּסוֹדִי
  chosen: in my council
  alternatives:
  - in my secret council
  - in my assembly
  - in my counsel
  lexicon: HALOT
  rationale: סוֹד can denote an intimate council or confidential assembly. 'Council'
    best fits the prophetic setting of standing in the divine deliberative assembly.
    'Counsel' could suggest advice rather than an assembled body; 'secret council'
    is possible but unnecessarily expands the text.
- source_word: וְיַשְׁמִעוּ
  chosen: they would have caused ... to hear
  alternatives:
  - they would have proclaimed
  - they would have made ... hear
  lexicon: HALOT
  rationale: 'The Hiphil of שׁמע is causative: ''cause to hear'' or ''make hear.''
    This preserves the verbal force more precisely than the more interpretive ''proclaim,''
    while remaining natural enough in English.'
- source_word: דְבָרַי
  chosen: my words
  alternatives:
  - my message
  - my word
  lexicon: HALOT
  rationale: The plural is explicit in Hebrew and should be preserved. 'My message'
    is smoother but less formally tied to the source wording.
- source_word: אֶת־עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard and direct rendering of the object phrase.
- source_word: וִישִׁבוּם
  chosen: they would have turned them
  alternatives:
  - they would have brought them back
  - they would have caused them to return
  lexicon: HALOT
  rationale: The Hiphil of שוב is causative. In this moral context, 'turned them'
    communicates repentance from evil while preserving the causative sense. 'Brought
    them back' is possible but less explicit about turning from evil conduct.
- source_word: מִדַּרְכָּם הָרָע
  chosen: from their evil way
  alternatives:
  - from their evil path
  - from their wicked way
  lexicon: HALOT
  rationale: '''Way'' is a common metaphor for conduct and preserves the Hebrew idiom.
    ''Evil'' matches רַע directly; ''wicked'' is interpretive but possible.'
- source_word: וּמֵרֹעַ מַעַלְלֵיהֶם
  chosen: and from the evil of their deeds
  alternatives:
  - and from their evil deeds
  - and from the wickedness of their actions
  lexicon: HALOT
  rationale: The construct phrase is literally 'from the evil of their deeds.' This
    keeps both the abstract noun 'evil' and the concrete 'deeds,' preserving the Hebrew's
    two-part expression rather than collapsing it into a single adjective-noun phrase.
