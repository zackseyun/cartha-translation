id: JER.23.10
reference: Jeremiah 23:10
source:
  edition: WLC
  text: כִּ֤י מְנָֽאֲפִים֙ מָלְאָ֣ה הָ/אָ֔רֶץ כִּֽי מִ/פְּנֵ֤י אָלָה֙ אָבְלָ֣ה הָ/אָ֔רֶץ
    יָבְשׁ֖וּ נְא֣וֹת מִדְבָּ֑ר וַ/תְּהִ֤י מְרֽוּצָתָ/ם֙ רָעָ֔ה וּ/גְבוּרָתָ֖/ם לֹא
    כֵֽן־־׃
translation:
  text: For the land is full of adulterers; because of the curse the land mourns,
    the pastures of the wilderness are dried up. Their course has become evil, and
    their might is not right.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of the oath'; Hebrew אָלָה can denote an oath, especially one
      invoking a curse.
    reason: lexical_alternative
  - marker: b
    text: Or 'their running' or 'their way'; the Hebrew term is metaphorical for the
      course of their conduct.
    reason: lexical_alternative
  - marker: c
    text: Or 'their might is not so'/'not upright'; the Hebrew is terse and elliptical.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְנָאֲפִים
  chosen: adulterers
  alternatives:
  - those who commit adultery
  lexicon: HALOT
  rationale: The participial plural from נאף denotes people characterized by adultery.
    'Adulterers' is concise and preserves the moral charge. In Jeremiah, the term
    may also carry metaphorical covenant-unfaithfulness overtones, but the lexical
    sense remains adultery.
- source_word: מָלְאָה הָאָרֶץ
  chosen: the land is full
  alternatives:
  - the earth is full
  lexicon: HALOT
  rationale: אֶרֶץ can mean 'land' or 'earth'; in Jeremiah's Judah-focused context,
    'land' is the more natural rendering.
- source_word: מִפְּנֵי אָלָה
  chosen: because of the curse
  alternatives:
  - because of the oath
  - because of the sworn curse
  lexicon: HALOT
  rationale: אָלָה can denote an oath, especially one invoking a curse, and by extension
    the curse itself. Here the following mourning of the land points to covenant judgment,
    so 'curse' best fits the sense in context while remaining idiomatic.
- source_word: אָבְלָה
  chosen: mourns
  alternatives:
  - dries up in grief
  - laments
  lexicon: HALOT
  rationale: The verb אבל commonly denotes mourning. Applied to the land, it is personification;
    'mourns' preserves the imagery without overexplaining.
- source_word: יָבְשׁוּ
  chosen: are dried up
  alternatives:
  - have dried up
  - wither
  lexicon: HALOT
  rationale: A stative/resultative English present perfect or passive could work;
    'are dried up' reads naturally and reflects the resulting condition of the pastures.
- source_word: נְאוֹת מִדְבָּר
  chosen: the pastures of the wilderness
  alternatives:
  - the grazing places of the desert
  - the meadows of the wilderness
  lexicon: HALOT
  rationale: נָוֶה/נְאוֹת refers to pastureland or grazing places. 'Pastures' is clear
    modern English; 'wilderness' fits מִדְבָּר better than 'desert' in many prophetic
    contexts.
- source_word: מְרֻצָתָם
  chosen: their course
  alternatives:
  - their running
  - their way
  lexicon: HALOT
  rationale: The noun derives from running/race and is used metaphorically for conduct
    or course of life. 'Their course' preserves the metaphor while communicating moral
    trajectory.
- source_word: רָעָה
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: HALOT
  rationale: The adjective here qualifies their course morally. 'Evil' best captures
    the ethical force.
- source_word: גְבוּרָתָם
  chosen: their might
  alternatives:
  - their strength
  - their power
  lexicon: HALOT
  rationale: גְבוּרָה denotes strength, power, or might. 'Might' is concise and suits
    the prophetic denunciation.
- source_word: לֹא כֵן
  chosen: is not right
  alternatives:
  - is not so
  - is not upright
  - is not just
  lexicon: HALOT
  rationale: The phrase is terse and somewhat elliptical. A wooden 'not so' is possible
    but unclear in English. 'Is not right' communicates the moral negation without
    overinterpreting the exact nuance.
