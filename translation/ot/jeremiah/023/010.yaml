theological_decisions:
- issue: Whether 'adulterers' should be rendered literally or as a metaphor for covenant
    unfaithfulness
  chosen_reading: Rendered literally as 'adulterers' in the main text, allowing the
    prophetic context to suggest broader covenantal implications.
  alternative_readings:
  - the unfaithful
  rationale: The Hebrew lexeme directly denotes adultery. Since the text does not
    explicitly mark the term as purely metaphorical here, the translation preserves
    the literal wording and lets readers infer the wider prophetic resonance.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of אָלָה in context
  chosen_reading: Rendered as 'the curse'
  alternative_readings:
  - the oath
  - the sworn curse
  rationale: The context of land-mourning and drought-like devastation suggests the
    effect of covenant sanctions rather than merely the act of swearing. 'The curse'
    is therefore the best contextual rendering, while alternatives are preserved in
    a footnote.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    ambiguity where genuine.
