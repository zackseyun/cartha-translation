id: JER.23.30
reference: Jeremiah 23:30
source:
  edition: WLC
  text: לָ/כֵ֛ן הִנְ/נִ֥י עַל הַ/נְּבִאִ֖ים נְאֻם יְהוָ֑ה מְגַנְּבֵ֣י דְבָרַ֔/י אִ֖ישׁ
    מֵ/אֵ֥ת רֵעֵֽ/הוּ־־׃
translation:
  text: Therefore, behold, I am against the prophets, declares the LORD, who steal
    my words, each from his neighbor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'stealing my words, each man from his neighbor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks a consequential transition from the preceding denunciation; 'Therefore'
    preserves the prophetic argumentative flow.
- source_word: הִנְנִי
  chosen: behold, I am
  alternatives:
  - look, I am
  - here I am
  lexicon: HALOT
  rationale: The particle-plus-pronoun construction is an emphatic divine announcement.
    'Behold, I am' preserves both the attention signal and the self-involving emphasis.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - concerning
  lexicon: HALOT
  rationale: In this judgment context with 'I am' and hostile stance toward the prophets,
    'against' best conveys opposition rather than mere reference.
- source_word: הַנְּבִאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Straightforward rendering of the plural noun referring to those claiming
    prophetic speech.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic modern English
    while preserving formal prophetic force. 'the LORD' follows the project's default
    rendering for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering for the divine name is 'the LORD'.
- source_word: מְגַנְּבֵי
  chosen: who steal
  alternatives:
  - stealing
  - who pilfer
  lexicon: HALOT
  rationale: The participle functions substantivally/appositionally describing the
    prophets. Relative-clause English is natural and preserves the ongoing characteristic
    action.
- source_word: דְבָרַי
  chosen: my words
  alternatives:
  - my word
  - my message
  lexicon: HALOT
  rationale: The plural suffix form is best represented as 'my words.' Singular 'word'
    could over-interpret as a collective abstraction; the plural fits the immediate
    accusation of appropriating utterances.
- source_word: אִישׁ
  chosen: each
  alternatives:
  - a man
  - each man
  lexicon: HALOT
  rationale: Although literally 'man,' here it has distributive force in the idiom
    'each from his neighbor.' Rendering 'each' preserves the syntax's sense without
    adding unnecessary awkwardness; the masculine possessive is retained in 'his neighbor'
    in keeping with gender-accurate policy.
- source_word: מֵאֵת
  chosen: from
  alternatives:
  - from with
  - from the possession of
  lexicon: HALOT
  rationale: In English the preposition is naturally reduced to 'from'; the fuller
    Hebrew form does not require expansion here.
- source_word: רֵעֵהוּ
  chosen: his neighbor
  alternatives:
  - his companion
  - his fellow
  lexicon: HALOT
  rationale: '''Neighbor'' is the most standard and transparent rendering for רֵעַ
    in interpersonal contexts, and it fits the accusation that these prophets borrow
    or plagiarize one another''s supposed revelations.'
