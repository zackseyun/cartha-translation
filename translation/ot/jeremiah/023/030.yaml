theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default is to render the covenant name as 'the LORD,' following
    the stated doctrine and preserving continuity with Jewish reverence practice and
    the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered distributive expression אִישׁ ... רֵעֵהוּ
  chosen_reading: each from his neighbor
  alternative_readings:
  - each one from his neighbor
  - a man from his neighbor
  - each from another
  rationale: The Hebrew uses grammatically masculine singular forms distributively.
    The translation preserves the masculine possessive rather than neutralizing it,
    in line with the project's gender-accurate policy, while rendering אִישׁ idiomatically
    as 'each.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over
    gender-neutral'
