id: JER.38.7
reference: Jeremiah 38:7
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֡ע עֶֽבֶד מֶ֨לֶךְ הַ/כּוּשִׁ֜י אִ֣ישׁ סָרִ֗יס וְ/הוּא֙ בְּ/בֵ֣ית
    הַ/מֶּ֔לֶךְ כִּֽי נָתְנ֥וּ אֶֽת יִרְמְיָ֖הוּ אֶל הַ/בּ֑וֹר וְ/הַ/מֶּ֥לֶךְ יוֹשֵׁ֖ב
    בְּ/שַׁ֥עַר בִּנְיָמִֽן־־־־׃
translation:
  text: Now Ebed-melech the Cushite, a court official who was in the king’s house,
    heard that they had put Jeremiah into the cistern while the king was sitting at
    the Benjamin Gate.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "a eunuch." The Hebrew term can refer either to a literal eunuch or more
      broadly to a royal court official.
    reason: lexical_alternative
  - marker: b
    text: Or "the pit." The Hebrew word can denote a pit or cistern; here "cistern"
      fits the immediate context in Jeremiah 38.
    reason: lexical_alternative
  - marker: c
    text: '"The Cushite" refers to a man from Cush; traditional English versions often
      have "the Ethiopian."'
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - learned
  - came to hear
  lexicon: HALOT
  rationale: The verb שׁמע in the waw-consecutive narrative form naturally advances
    the story with 'heard.' 'Learned' is possible but less direct. 'Now' in English
    helps carry the narrative transition signaled by the waw-consecutive.
- source_word: עֶבֶד מֶלֶךְ
  chosen: Ebed-melech
  alternatives:
  - Ebed-Melech
  lexicon: HALOT
  rationale: This is a personal name, not a common noun phrase here. Per translation
    philosophy, personal names are transliterated rather than translated ('servant
    of the king'). Standard English transliteration is retained.
- source_word: הַכּוּשִׁי
  chosen: the Cushite
  alternatives:
  - the Ethiopian
  lexicon: HALOT
  rationale: כּוּשִׁי denotes a person from Cush. 'Cushite' preserves the Hebrew ethnogeographic
    term more precisely than the traditional but potentially anachronistic 'Ethiopian.'
- source_word: אִישׁ סָרִיס
  chosen: a court official
  alternatives:
  - a eunuch
  - an official
  lexicon: HALOT
  rationale: סָרִיס can denote either a literal eunuch or, more broadly, a royal official.
    In this context the administrative role is explicit and the physical sense is
    not necessary to the verse's meaning, so 'court official' best captures the likely
    function in readable English. The more literal alternative 'eunuch' is preserved
    in a footnote because it remains lexically possible.
- source_word: וְהוּא בְּבֵית הַמֶּלֶךְ
  chosen: who was in the king’s house
  alternatives:
  - and he was in the king's house
  - while he was in the king's house
  lexicon: HALOT
  rationale: This clause identifies Ebed-melech's location/status at the time. Rendering
    it as a relative clause produces natural English while preserving the sense. 'King's
    house' here refers to the royal palace complex, but the more literal wording is
    retained in the main text.
- source_word: כִּי
  chosen: that
  alternatives:
  - for
  - because
  lexicon: HALOT
  rationale: Here כִּי introduces the content of what he heard, so 'that' is the most
    natural English complementizer.
- source_word: נָתְנוּ אֶת־יִרְמְיָהוּ אֶל־הַבּוֹר
  chosen: they had put Jeremiah into the cistern
  alternatives:
  - they had put Jeremiah into the pit
  - they put Jeremiah into the cistern
  lexicon: HALOT
  rationale: בּוֹר can mean 'pit,' 'cistern,' or 'dungeon' depending on context. In
    Jeremiah 38 the setting is a water cistern used as a holding place, so 'cistern'
    is more concrete and contextually accurate than the generic 'pit.' The pluperfect-like
    English 'had put' fits the reported prior action.
- source_word: וְהַמֶּלֶךְ יוֹשֵׁב
  chosen: while the king was sitting
  alternatives:
  - and the king was sitting
  - as the king sat
  lexicon: HALOT
  rationale: The clause gives contemporaneous background information. 'While the king
    was sitting' communicates the circumstantial force smoothly in English.
- source_word: בְּשַׁעַר בִּנְיָמִן
  chosen: at the Benjamin Gate
  alternatives:
  - in the Gate of Benjamin
  - at Benjamin Gate
  lexicon: HALOT
  rationale: This is a specific city gate. 'At the Benjamin Gate' is idiomatic English
    for location at a named gate while preserving the proper designation.
