id: JER.38.23
reference: Jeremiah 38:23
source:
  edition: WLC
  text: וְ/אֶת כָּל נָשֶׁ֣י/ךָ וְ/אֶת בָּנֶ֗י/ךָ מֽוֹצִאִים֙ אֶל הַ/כַּשְׂדִּ֔ים וְ/אַתָּ֖ה
    לֹא תִמָּלֵ֣ט מִ/יָּדָ֑/ם כִּ֣י בְ/יַ֤ד מֶֽלֶךְ בָּבֶל֙ תִּתָּפֵ֔שׂ וְ/אֶת הָ/עִ֥יר
    הַ/זֹּ֖את תִּשְׂרֹ֥ף בָּ/אֵֽשׁ־־־־־־־׃פ
translation:
  text: And all your wives and your sons will be brought out to the Chaldeans, and
    you yourself will not escape from their hand, for you will be seized by the hand
    of the king of Babylon, and this city will be burned with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Babylonians' for 'the Chaldeans.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from their hand' and 'by the hand of the king of Babylon' are idioms
      for power or control.
    reason: cultural_note
  - marker: c
    text: The Hebrew verb is feminine singular, agreeing with 'city'; the sense is
      that the city will be burned.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָשֶׁיךָ
  chosen: your wives
  alternatives:
  - your women
  lexicon: HALOT
  rationale: In context addressing the king's household, the plural construct with
    2ms suffix most naturally refers to his wives rather than women generally.
- source_word: בָּנֶיךָ
  chosen: your sons
  alternatives:
  - your children
  lexicon: HALOT
  rationale: The Hebrew term is specifically 'sons,' not the more general 'children';
    gender-accurate rendering follows the stated philosophy.
- source_word: מוֹצִאִים
  chosen: will be brought out
  alternatives:
  - are being brought out
  - will be taken out
  lexicon: HALOT
  rationale: The Hophal participle conveys passive causation, here with future force
    in the prophetic warning context. 'Brought out' is natural English and preserves
    the passive sense.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew ethnonym is 'Chaldeans.' Although it often refers to the Babylonian
    forces, retaining 'Chaldeans' stays closer to the source text.
- source_word: לֹא תִמָּלֵט מִיָּדָם
  chosen: will not escape from their hand
  alternatives:
  - will not escape from them
  - will not be delivered from their hand
  lexicon: HALOT
  rationale: The idiom 'from their hand' preserves the Hebrew image of power/control
    while remaining understandable in English.
- source_word: בְיַד מֶלֶךְ בָּבֶל
  chosen: by the hand of the king of Babylon
  alternatives:
  - into the hand of the king of Babylon
  - by the king of Babylon
  lexicon: HALOT
  rationale: The preposition with 'hand' is idiomatic for agency/instrumentality here.
    'By the hand of' preserves the Hebrew expression better than flattening it to
    simply 'by.'
- source_word: תִּתָּפֵשׂ
  chosen: you will be seized
  alternatives:
  - you will be captured
  - you will be taken
  lexicon: HALOT
  rationale: The Niphal of תפשׂ denotes being caught or captured. 'Seized' fits the
    singular addressee and the immediate context of arrest by the Babylonian king.
- source_word: הָעִיר הַזֹּאת
  chosen: this city
  alternatives:
  - the city, this one
  lexicon: HALOT
  rationale: Standard demonstrative construction; 'this city' is the natural English
    equivalent.
- source_word: תִּשְׂרֹף
  chosen: will be burned
  alternatives:
  - she will burn
  - it will burn
  lexicon: HALOT
  rationale: 'The 3fs verb agrees with ''city'' (a feminine noun). In English, a passive
    rendering best conveys the sense in context: the city is the object that ends
    up burned, not the agent performing the action.'
- source_word: בָּאֵשׁ
  chosen: with fire
  alternatives:
  - in fire
  - by fire
  lexicon: HALOT
  rationale: The phrase is a common Hebrew idiom for destruction by burning. 'With
    fire' is idiomatic and preserves the concrete imagery.
