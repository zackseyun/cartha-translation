id: JER.38.4
reference: Jeremiah 38:4
source:
  edition: WLC
  text: וַ/יֹּאמְר֨וּ הַ/שָּׂרִ֜ים אֶל הַ/מֶּ֗לֶךְ י֣וּמַת נָא֮ אֶת הָ/אִ֣ישׁ הַ/זֶּה֒
    כִּֽי עַל כֵּ֡ן הֽוּא מְרַפֵּ֡א אֶת יְדֵי֩ אַנְשֵׁ֨י הַ/מִּלְחָמָ֜ה הַֽ/נִּשְׁאָרִ֣ים
    בָּ/עִ֣יר הַ/זֹּ֗את וְ/אֵת֙ יְדֵ֣י כָל הָ/עָ֔ם לְ/דַבֵּ֣ר אֲלֵי/הֶ֔ם כַּ/דְּבָרִ֖ים
    הָ/אֵ֑לֶּה כִּ֣י הָ/אִ֣ישׁ הַ/זֶּ֗ה אֵינֶ֨/נּוּ דֹרֵ֧שׁ לְ/שָׁל֛וֹם לָ/עָ֥ם הַ/זֶּ֖ה
    כִּ֥י אִם לְ/רָעָֽה־־־־־־׀־׀־׃
translation:
  text: Then the officials said to the king, “Please let this man be put to death,
    for in this way he is weakening the hands of the men of war who remain in this
    city, and the hands of all the people, by speaking to them words like these. For
    this man is not seeking the welfare of this people, but their harm.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''weakening the hands of.'' This idiom means discouraging or demoralizing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the soldiers' for 'the men of war.'
    reason: lexical_alternative
  - marker: c
    text: Or 'seeking peace' instead of 'seeking the welfare'; Hebrew shalom can include
      peace, well-being, and prosperity.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the commanders
  lexicon: HALOT
  rationale: שָׂרִים refers to ruling officers/court officials. 'Officials' is natural
    modern English and fits the political context better than the more archaic 'princes,'
    while remaining broad enough not to over-specify military rank.
- source_word: יּוּמַת נָא
  chosen: Please let this man be put to death
  alternatives:
  - Let this man be put to death, please
  - May this man be killed
  lexicon: HALOT
  rationale: The hophal/jussive of מות expresses a request that he be executed. נָא
    softens the demand as a petition, hence 'Please let... be put to death.' 'Be put
    to death' captures judicial execution better than the blunter 'be killed.'
- source_word: עַל כֵּן
  chosen: for in this way
  alternatives:
  - for therefore
  - because for this reason
  - for thus
  lexicon: HALOT
  rationale: In context this introduces the grounds for their request. 'For in this
    way' conveys the explanatory force in idiomatic English without sounding wooden.
- source_word: מְרַפֵּא אֶת יְדֵי
  chosen: he is weakening the hands of
  alternatives:
  - he is discouraging
  - he is making slack the hands of
  lexicon: HALOT
  rationale: The idiom 'slacken/weaken the hands' means to demoralize or discourage.
    Retaining 'weakening the hands' preserves the Hebrew imagery while remaining understandable
    in English.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  chosen: the men of war
  alternatives:
  - the soldiers
  - the fighting men
  lexicon: HALOT
  rationale: Literally 'men of the war.' 'Men of war' preserves the masculine and
    military force of the Hebrew; 'soldiers' is possible but slightly more interpretive.
- source_word: הַנִּשְׁאָרִים
  chosen: who remain
  alternatives:
  - who are left
  - who survive
  lexicon: HALOT
  rationale: The participle denotes those left/remnant in the city. 'Who remain' is
    concise and natural.
- source_word: וְאֵת יְדֵי כָל הָעָם
  chosen: and the hands of all the people
  alternatives:
  - and all the people
  - and the morale of all the people
  lexicon: HALOT
  rationale: The phrase repeats the 'hands' idiom from the previous clause. Keeping
    'the hands of all the people' preserves the parallelism; the weakening sense is
    carried over from the first clause.
- source_word: לְדַבֵּר אֲלֵיהֶם כַּדְּבָרִים הָאֵלֶּה
  chosen: by speaking to them words like these
  alternatives:
  - by telling them such things
  - by speaking these words to them
  lexicon: HALOT
  rationale: The infinitive explains the means by which he weakens them. 'Words like
    these' reflects the comparative כַ and avoids implying a verbatim quotation formula.
- source_word: דֹרֵשׁ לְשָׁלוֹם
  chosen: seeking the welfare
  alternatives:
  - seeking peace
  - seeking prosperity
  lexicon: HALOT
  rationale: שָׁלוֹם here is broader than absence of conflict; it denotes well-being/welfare.
    'Seeking the welfare' best fits the accusation that Jeremiah is not acting for
    the people's good.
- source_word: כִּי אִם לְרָעָה
  chosen: but their harm
  alternatives:
  - but evil for them
  - except for disaster
  lexicon: HALOT
  rationale: The contrast is between the people's welfare and their harm. 'Their harm'
    makes the implied object explicit in smooth English and matches the rhetorical
    contrast.
