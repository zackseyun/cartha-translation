id: JER.38.16
reference: Jeremiah 38:16
source:
  edition: WLC
  text: וַ/יִּשָּׁבַ֞ע הַ/מֶּ֧לֶךְ צִדְקִיָּ֛הוּ אֶֽל יִרְמְיָ֖הוּ בַּ/סֵּ֣תֶר לֵ/אמֹ֑ר
    חַי יְהוָ֞ה את אֲשֶׁר֩ עָשָׂה לָ֨/נוּ אֶת הַ/נֶּ֤פֶשׁ הַ/זֹּאת֙ אִם אֲמִיתֶ֔/ךָ
    וְ/אִם אֶתֶּנְ/ךָ֗ בְּ/יַד֙ הָ/אֲנָשִׁ֣ים הָ/אֵ֔לֶּה אֲשֶׁ֥ר מְבַקְשִׁ֖ים אֶת
    נַפְשֶֽׁ/ךָ־־־־־־־׃ס
translation:
  text: Then King Zedekiah swore secretly to Jeremiah, saying, “As the LORD lives,
    who made this life for us, I will not put you to death, nor will I give you into
    the hand of these men who are seeking your life.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “who gave us this life.” The Hebrew more literally says, “who made for
      us this life/soul.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׁבַע
  chosen: swore
  alternatives:
  - took an oath
  - swore an oath
  lexicon: HALOT
  rationale: The verb denotes oath-taking. 'Swore' is concise, natural English and
    preserves the solemnity without unnecessary expansion.
- source_word: בַּסֵּתֶר
  chosen: secretly
  alternatives:
  - in secret
  - privately
  lexicon: HALOT
  rationale: The phrase indicates concealment. 'Secretly' reads naturally in English
    while preserving the adverbial force of the Hebrew.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is the standard Hebrew oath formula. 'As the LORD lives' best captures
    the idiomatic force in English. Per doctrine, יְהוָה is rendered 'the LORD' rather
    than transliterated.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: This follows the project's default rendering for the divine name in accordance
    with DOCTRINE.md.
- source_word: אֵת אֲשֶׁר עָשָׂה לָנוּ אֶת הַנֶּפֶשׁ הַזֹּאת
  chosen: who made this life for us
  alternatives:
  - who gave us this life
  - who made for us this soul
  - who made us this life
  lexicon: HALOT
  rationale: The clause literally refers to the LORD as the one who made 'this nephesh'
    for us. In this context נֶפֶשׁ refers to life rather than the immaterial 'soul.'
    'Who made this life for us' preserves the creation language of עָשָׂה better than
    'gave us this life,' while remaining intelligible.
- source_word: נֶפֶשׁ
  chosen: life
  alternatives:
  - soul
  - self
  lexicon: HALOT
  rationale: Here נֶפֶשׁ occurs in an oath formula about the life God has made and
    later in 'seeking your life.' In both places 'life' is the most contextually fitting
    and idiomatic rendering in English.
- source_word: אִם אֲמִיתֶךָ
  chosen: I will not put you to death
  alternatives:
  - surely I will not kill you
  - if I kill you
  lexicon: HALOT
  rationale: 'Following an oath, אִם introduces the negative force elliptically: ''surely
    not.'' English requires the negation to be made explicit. ''Put you to death''
    is slightly more formal and fits royal speech.'
- source_word: וְאִם אֶתֶּנְךָ בְּיַד
  chosen: nor will I give you into the hand of
  alternatives:
  - nor will I hand you over to
  - nor will I deliver you into the power of
  lexicon: HALOT
  rationale: The idiom 'give into the hand of' is common in Hebrew. This rendering
    preserves the metaphor while remaining readable. 'Nor' reflects the continuation
    of the oath's negated commitments.
- source_word: הָאֲנָשִׁים הָאֵלֶּה
  chosen: these men
  alternatives:
  - these people
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural 'men,' and the context concerns
    identifiable male officials. This follows the gender-accurate policy.
- source_word: מְבַקְשִׁים אֶת נַפְשֶׁךָ
  chosen: are seeking your life
  alternatives:
  - seek your life
  - are trying to kill you
  lexicon: HALOT
  rationale: The idiom means to seek someone's life, i.e., to seek to kill him. The
    more literal idiom is preserved in the main text because it is clear in modern
    English and matches the Hebrew expression.
