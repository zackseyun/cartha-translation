id: JER.38.5
reference: Jeremiah 38:5
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר֙ הַ/מֶּ֣לֶךְ צִדְקִיָּ֔הוּ הִנֵּה ה֖וּא בְּ/יֶדְ/כֶ֑ם כִּֽי אֵ֣ין
    הַ/מֶּ֔לֶךְ יוּכַ֥ל אֶתְ/כֶ֖ם דָּבָֽר־־׃
translation:
  text: Then King Zedekiah said, “Look, he is in your hands, for the king can do nothing
    against you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the king is not able [to do] a thing with respect to
      you.' The sense in context is that he cannot act against or overrule them.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force.
- source_word: הַמֶּלֶךְ צִדְקִיָּהוּ
  chosen: King Zedekiah
  alternatives:
  - the king, Zedekiah
  lexicon: HALOT
  rationale: English idiom naturally renders the title-name construction as 'King
    Zedekiah.' The personal name is transliterated per project philosophy.
- source_word: הִנֵּה
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: הִנֵּה is a deictic particle drawing attention. 'Look' preserves the
    force in readable modern English better than the archaic 'Behold.'
- source_word: הוּא
  chosen: he
  alternatives:
  - him
  lexicon: HALOT
  rationale: 'The independent pronoun refers to Jeremiah and functions as the subject
    of the verbless clause: ''he is in your hands.'''
- source_word: בְּיֶדְכֶם
  chosen: in your hands
  alternatives:
  - in your hand
  - under your control
  - at your disposal
  lexicon: HALOT
  rationale: The idiom literally uses 'hand' for power or control. 'In your hands'
    keeps the Hebrew image and is clear in English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the king's concession. 'For' fits
    the explanatory sense in direct speech.
- source_word: אֵין הַמֶּלֶךְ יוּכַל
  chosen: the king can do nothing
  alternatives:
  - the king is not able to do anything
  - I as king can do nothing
  lexicon: HALOT
  rationale: This expresses inability. Repeating 'the king' rather than switching
    to 'I' preserves the Hebrew's self-reference in the third person, which may reflect
    royal style or rhetorical distancing.
- source_word: אֶתְכֶם דָּבָר
  chosen: against you
  alternatives:
  - with respect to you in any matter
  - anything to you
  - a thing against you
  lexicon: HALOT
  rationale: 'The Hebrew construction is elliptical and idiomatic: literally, ''the
    king is not able [with respect to] you a thing.'' In context, the sense is that
    he cannot oppose or overrule them. ''Against you'' communicates that force naturally
    and succinctly.'
