id: JER.38.18
reference: Jeremiah 38:18
source:
  edition: WLC
  text: וְ/אִ֣ם לֹֽא תֵצֵ֗א אֶל שָׂרֵי֙ מֶ֣לֶךְ בָּבֶ֔ל וְ/נִתְּנָ֞ה הָ/עִ֤יר הַ/זֹּאת֙
    בְּ/יַ֣ד הַ/כַּשְׂדִּ֔ים וּ/שְׂרָפ֖וּ/הָ בָּ/אֵ֑שׁ וְ/אַתָּ֖ה לֹֽא תִמָּלֵ֥ט מִ/יָּדָֽ/ם־־־׃ס
translation:
  text: But if you do not go out to the officials of the king of Babylon, then this
    city will be given into the hand of the Chaldeans, and they will burn it with
    fire, and you will not escape from their hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the princes of the king of Babylon' or 'to the commanders of the
      king of Babylon.' The Hebrew term can refer broadly to high-ranking officials.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'into the hand of the Chaldeans' ... 'from their hand,' an idiom
      for being under another's power.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - If
  lexicon: HALOT
  rationale: Introduces a conditional contrast with the previous statement; 'But if'
    captures both the conjunction and the adversative force in context better than
    a bare 'if.'
- source_word: תֵצֵא
  chosen: you do not go out
  alternatives:
  - you do not surrender
  - you do not go forth
  lexicon: HALOT
  rationale: The verb literally means 'go out.' In context it refers to going out
    to the Babylonian officials, effectively surrendering, but the more literal wording
    preserves the source text while allowing the context to convey the implication.
- source_word: אֶל שָׂרֵי מֶלֶךְ בָּבֶל
  chosen: to the officials of the king of Babylon
  alternatives:
  - to the princes of the king of Babylon
  - to the commanders of the king of Babylon
  lexicon: HALOT
  rationale: שָׂרִים can denote officials, princes, or commanders. 'Officials' is
    broad and natural English, fitting the court/military representatives in view
    without overstating a specifically military rank.
- source_word: וְנִתְּנָה הָעִיר הַזֹּאת
  chosen: then this city will be given
  alternatives:
  - and this city will be given over
  - this city shall be handed over
  lexicon: HALOT
  rationale: The passive of נתן is naturally rendered 'will be given.' Adding 'then'
    clarifies the consequence relation in English.
- source_word: בְּיַד הַכַּשְׂדִּים
  chosen: into the hand of the Chaldeans
  alternatives:
  - into the power of the Chaldeans
  - to the Chaldeans
  lexicon: HALOT
  rationale: The idiom 'into the hand of' is preserved because it is transparent in
    English and retains the concrete force of Hebrew possession/power language. 'Chaldeans'
    reflects the Hebrew ethnic-political term used here.
- source_word: וּשְׂרָפוּהָ בָּאֵשׁ
  chosen: and they will burn it with fire
  alternatives:
  - and they will burn it down
  - and they will set it on fire
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the emphatic Hebrew expression.
    'Burn it with fire' is idiomatic enough in English and reflects the source closely.
- source_word: וְאַתָּה לֹא תִמָּלֵט מִיָּדָם
  chosen: and you will not escape from their hand
  alternatives:
  - and you yourself will not escape from their power
  - and you will not be delivered from their hand
  lexicon: HALOT
  rationale: The Niphal of מלט here means 'escape.' Preserving 'from their hand' maintains
    the Hebrew idiom and parallels the earlier 'into the hand of the Chaldeans.' The
    explicit pronoun is represented by 'you' without adding undue emphasis beyond
    normal English.
