id: JER.38.13
reference: Jeremiah 38:13
source:
  edition: WLC
  text: וַ/יִּמְשְׁכ֤וּ אֶֽת יִרְמְיָ֨הוּ֙ בַּֽ/חֲבָלִ֔ים וַ/יַּעֲל֥וּ אֹת֖/וֹ מִן
    הַ/בּ֑וֹר וַ/יֵּ֣שֶׁב יִרְמְיָ֔הוּ בַּ/חֲצַ֖ר הַ/מַּטָּרָֽה־־׃ס
translation:
  text: So they pulled Jeremiah up with the ropes and brought him up out of the cistern,
    and Jeremiah remained in the court of the guard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'out of the pit.' The Hebrew bor can denote a pit, cistern, or dungeon;
      here 'cistern' fits the narrative setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the courtyard of the guardhouse' or 'in the court of the prison.'
      The Hebrew expression refers to the guarded detention area.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְשְׁכוּ
  chosen: pulled
  alternatives:
  - drew
  - hauled
  lexicon: HALOT
  rationale: The verb משׁך denotes drawing or pulling. 'Pulled' is natural modern
    English and fits the physical action of extracting Jeremiah by ropes.
- source_word: בַּחֲבָלִים
  chosen: with the ropes
  alternatives:
  - by the ropes
  - with cords
  lexicon: HALOT
  rationale: חֲבָלִים refers to ropes/cords. 'With the ropes' best reflects the instrumental
    use of ב and matches the immediately preceding rescue action.
- source_word: וַיַּעֲלוּ אֹתוֹ
  chosen: brought him up
  alternatives:
  - lifted him up
  - raised him up
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly means 'bring up' or 'cause to go up.' Because
    the prior verb already expresses the pulling action, 'brought him up' avoids awkward
    repetition while preserving the causative sense.
- source_word: מִן הַבּוֹר
  chosen: out of the cistern
  alternatives:
  - from the pit
  - out of the pit
  lexicon: HALOT
  rationale: בּוֹר can mean pit, cistern, or dungeon depending on context. In this
    narrative Jeremiah was lowered into a water-storage pit, so 'cistern' is more
    precise than the broader 'pit'.
- source_word: וַיֵּשֶׁב
  chosen: remained
  alternatives:
  - stayed
  - dwelt
  - sat
  lexicon: HALOT
  rationale: ישׁב can mean sit, dwell, or remain. In context it indicates Jeremiah's
    continued location after the rescue, so 'remained' communicates the narrative
    sense better than the more literal but misleading 'sat'.
- source_word: בַּחֲצַר
  chosen: in the court
  alternatives:
  - in the courtyard
  lexicon: HALOT
  rationale: חָצֵר denotes a court or courtyard. 'Court' is concise and idiomatic
    in the established phrase that follows.
- source_word: הַמַּטָּרָה
  chosen: of the guard
  alternatives:
  - of the guardhouse
  - of the prison
  lexicon: HALOT
  rationale: מַטָּרָה in Jeremiah refers to the guarded court or guard-post area where
    Jeremiah was confined. 'Guard' preserves the lexical link to a guarded place without
    over-specifying a building; 'prison' is interpretive and less precise here.
