id: JER.38.26
reference: Jeremiah 38:26
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֣ אֲלֵי/הֶ֔ם מַפִּיל אֲנִ֥י תְחִנָּתִ֖/י לִ/פְנֵ֣י הַ/מֶּ֑לֶךְ
    לְ/בִלְתִּ֧י הֲשִׁיבֵ֛/נִי בֵּ֥ית יְהוֹנָתָ֖ן לָ/מ֥וּת שָֽׁם־׃פ
translation:
  text: Then you shall say to them, ‘I was presenting my plea before the king, that
    he should not send me back to the house of Jonathan to die there.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'I am laying my supplication before the king.' The Hebrew
      idiom is 'causing my plea to fall before' someone, meaning to make an earnest
      request.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: Then you shall say
  alternatives:
  - And you shall say
  lexicon: HALOT
  rationale: The conjunction plus qatal in direct instruction is naturally rendered
    as a sequential future/imperative in English. 'Then' captures the narrative sequence
    and instruction more idiomatically than a bare 'and.'
- source_word: אֲלֵיהֶם
  chosen: to them
  lexicon: HALOT
  rationale: Straightforward prepositional phrase indicating the addressees.
- source_word: מַפִּיל אֲנִי תְחִנָּתִי לִפְנֵי הַמֶּלֶךְ
  chosen: I was presenting my plea before the king
  alternatives:
  - I am presenting my supplication before the king
  - I was laying my petition before the king
  lexicon: HALOT
  rationale: The idiom literally involves 'causing my plea to fall before' the king,
    a conventional expression for making supplication. 'Presenting my plea' preserves
    the formal setting without wooden literalism. The participle מַפִּיל with אֲנִי
    can be represented as progressive/imperfective; in context, Jeremiah is being
    told what to report about the just-concluded audience, so English past progressive
    fits naturally.
- source_word: תְחִנָּתִי
  chosen: my plea
  alternatives:
  - my supplication
  - my petition
  lexicon: HALOT
  rationale: The noun denotes an earnest request for favor or mercy. 'Plea' is accessible
    modern English and preserves the urgency better than the more formal 'supplication.'
- source_word: לִפְנֵי הַמֶּלֶךְ
  chosen: before the king
  alternatives:
  - to the king
  - in the presence of the king
  lexicon: HALOT
  rationale: '''Before the king'' preserves the Hebrew spatial-judicial idiom and
    reads naturally in English.'
- source_word: לְבִלְתִּי הֲשִׁיבֵנִי
  chosen: that he should not send me back
  alternatives:
  - asking that he not return me
  - so as not to send me back
  lexicon: HALOT
  rationale: 'The construction expresses purpose/content of the plea: that the king
    not cause Jeremiah to return. English supplies ''he'' from the context of the
    king as the relevant agent. ''Send me back'' is more idiomatic here than the more
    wooden ''return me.'''
- source_word: בֵּית יְהוֹנָתָן
  chosen: the house of Jonathan
  alternatives:
  - Jonathan's house
  lexicon: HALOT
  rationale: A formal location name; the construct is translated transparently. Retaining
    'house of Jonathan' matches the narrative's repeated designation of the prison
    location.
- source_word: לָמוּת שָׁם
  chosen: to die there
  alternatives:
  - lest I die there
  lexicon: HALOT
  rationale: The infinitive expresses the feared result of being sent back. 'To die
    there' follows the Hebrew closely. An English 'lest I die there' is interpretively
    possible but adds a nuance not explicit in the infinitive construction here.
