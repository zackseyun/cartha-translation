id: JER.38.24
reference: Jeremiah 38:24
source:
  edition: WLC
  text: וַ/יֹּ֨אמֶר צִדְקִיָּ֜הוּ אֶֽל יִרְמְיָ֗הוּ אִ֛ישׁ אַל יֵדַ֥ע בַּ/דְּבָֽרִים
    הָ/אֵ֖לֶּה וְ/לֹ֥א תָמֽוּת־־־׃
translation:
  text: Then Zedekiah said to Jeremiah, “Let no man know about these things, and you
    will not die.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Let no one know of these matters.” The Hebrew uses “man” generically.
    reason: lexical_alternative
  - marker: b
    text: 'The final clause may imply result or purpose: “so that you will not die.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural
    modern English while preserving sequential force.
- source_word: צִדְקִיָּהוּ
  chosen: Zedekiah
  rationale: Personal name is transliterated according to the project's policy to
    transliterate names rather than translate them.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard preposition of indirect address; 'to' is the natural modern
    equivalent.
- source_word: יִרְמְיָהוּ
  chosen: Jeremiah
  rationale: Personal name is transliterated by standard English convention.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - anyone
  - person
  lexicon: HALOT
  rationale: 'The Hebrew is singular masculine ''man'' used generically: ''Let no
    man know.'' This follows the gender-accurate policy and preserves the source form,
    while the sense is generic.'
- source_word: אַל יֵדַע
  chosen: Let no man know
  alternatives:
  - May no man know
  - No man must know
  lexicon: HALOT
  rationale: 'אַל with the jussive expresses prohibition/wish: that no one come to
    know. ''Let no man know'' is idiomatic English and preserves the directive force.'
- source_word: בַּדְּבָרִים הָאֵלֶּה
  chosen: about these things
  alternatives:
  - of these matters
  - about this conversation
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words,' 'matters,' or 'things.' In context it refers
    to the matters just discussed. 'About these things' is clear and sufficiently
    broad without over-specifying.
- source_word: וְלֹא תָמוּת
  chosen: and you will not die
  alternatives:
  - so that you will not die
  - or you will not die
  lexicon: HALOT
  rationale: The clause gives the consequence/assurance attached to secrecy. A simple
    coordinate rendering, 'and you will not die,' preserves the Hebrew wording while
    allowing the implied sense to be understood from context.
