id: JER.38.28
reference: Jeremiah 38:28
source:
  edition: WLC
  text: וַ/יֵּ֤שֶׁב יִרְמְיָ֨הוּ֙ בַּ/חֲצַ֣ר הַ/מַּטָּרָ֔ה עַד י֖וֹם אֲשֶׁר נִלְכְּדָ֣ה
    יְרוּשָׁלִָ֑ם וְ/הָיָ֕ה כַּ/אֲשֶׁ֥ר נִלְכְּדָ֖ה יְרוּשָׁלִָֽם־־ס׃פ
translation:
  text: And Jeremiah remained in the court of the guard until the day Jerusalem was
    captured. And it happened when Jerusalem was captured—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'The Hebrew ends abruptly: ''And it happened when Jerusalem was captured—''
      This likely functions as a transition into the following material rather than
      a complete sentence by itself.'
    reason: textual_variant
  - marker: b
    text: Or 'was taken' for 'was captured.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשֶׁב
  chosen: remained
  alternatives:
  - stayed
  - dwelt
  - sat
  lexicon: HALOT
  rationale: The verb ישׁב literally means 'sit/dwell/remain.' In this custodial context,
    'remained' best conveys continued presence in confinement without implying voluntary
    residence.
- source_word: בַּחֲצַר הַמַּטָּרָה
  chosen: in the court of the guard
  alternatives:
  - in the courtyard of the guard
  - in the court of the prison
  - in the courtyard of the guardhouse
  lexicon: HALOT
  rationale: חָצֵר is 'court/courtyard.' מַטָּרָה here refers to the guard/watch or
    place of detention. 'Court of the guard' is a natural English rendering that preserves
    the likely official custodial setting and matches the immediate context in Jeremiah.
- source_word: עַד יוֹם אֲשֶׁר
  chosen: until the day ... was captured
  alternatives:
  - until the time when
  - until the day when
  lexicon: HALOT
  rationale: This construction marks the endpoint of Jeremiah's confinement. 'Until
    the day ... was captured' is idiomatic and close to the Hebrew syntax.
- source_word: נִלְכְּדָה
  chosen: was captured
  alternatives:
  - was taken
  lexicon: HALOT
  rationale: The Niphal of לכד commonly means 'be captured/taken.' 'Was captured'
    is the more direct passive and fits the military context of a city falling to
    an enemy.
- source_word: יְרוּשָׁלִַם
  chosen: Jerusalem
  rationale: Standard English transliteration of the place name.
- source_word: וְהָיָה
  chosen: And it happened
  alternatives:
  - Now it happened
  - And it came to pass
  - And it was
  lexicon: HALOT
  rationale: The clause is syntactically awkward and transitional, likely linking
    to the next unit. 'And it happened' preserves the narrative seam without archaic
    diction.
- source_word: כַּאֲשֶׁר
  chosen: when
  alternatives:
  - as
  - just as
  - after
  lexicon: HALOT
  rationale: In this temporal construction, 'when' is the clearest modern English
    equivalent.
