id: JER.38.2
reference: Jeremiah 38:2
source:
  edition: WLC
  text: כֹּה֮ אָמַ֣ר יְהוָה֒ הַ/יֹּשֵׁב֙ בָּ/עִ֣יר הַ/זֹּ֔את יָמ֕וּת בַּ/חֶ֖רֶב בָּ/רָעָ֣ב וּ/בַ/דָּ֑בֶר וְ/הַ/יֹּצֵ֤א אֶל הַ/כַּשְׂדִּים֙ יחיה וְ/הָיְתָה לּ֥/וֹ נַפְשׁ֛/וֹ לְ/שָׁלָ֖ל וָ/חָֽי־־׃ס
translation:
  text: 'Thus says Yahweh: He who remains in this city will die by the sword, by famine, and by pestilence; but he who goes out to the Chaldeans will live, and his life will be to him as spoil, and he will live.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'and he will have his life as plunder/booty'—a Hebrew idiom meaning he will escape with his life.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving covenantal reference while matching established English Bible convention.
- source_word: הַיֹּשֵׁב
  chosen: He who stays
  alternatives:
  - the one who sits
  - the one who remains
  - whoever dwells
  lexicon: HALOT
  rationale: The participle from ישׁב here denotes remaining/staying in the city rather than the more literal 'sits.' 'He who stays' is natural English and preserves the singular representative force.
- source_word: בָּעִיר הַזֹּאת
  chosen: in this city
  alternatives:
  - within this city
  lexicon: HALOT
  rationale: Straightforward locative phrase; 'in this city' is idiomatic and sufficiently formal.
- source_word: יָמוּת
  chosen: will die
  alternatives:
  - shall die
  lexicon: HALOT
  rationale: Simple future rendering of the imperfect; 'will' fits readable modern English.
- source_word: בַּחֶרֶב בָּרָעָב וּבַדָּבֶר
  chosen: by the sword, by famine, and by pestilence
  alternatives:
  - by sword, famine, and plague
  - by the sword, famine, and disease
  lexicon: HALOT
  rationale: Retains the triad common in Jeremiah. 'Pestilence' best matches דֶּבֶר in prophetic judgment contexts and preserves the solemn register.
- source_word: וְהַיֹּצֵא אֶל הַכַּשְׂדִּים
  chosen: but he who goes out to the Chaldeans
  alternatives:
  - and he who goes out to the Chaldeans
  - he who surrenders to the Chaldeans
  - he who goes over to the Babylonians
  lexicon: HALOT
  rationale: The participle means 'goes out.' 'To the Chaldeans' is more literal than interpretive 'surrenders,' though surrender is implied by context. 'But' brings out the contrast in English, though the Hebrew conjunction is simply waw. 'Chaldeans' is retained as the source term rather than replacing it with the broader 'Babylonians.'
- source_word: יִחְיֶה
  chosen: will live
  alternatives:
  - will survive
  lexicon: HALOT
  rationale: Keeps the repeated חיים-root language in the verse. 'Survive' is possible but would obscure the lexical repetition.
- source_word: וְהָיְתָה לוֹ נַפְשׁוֹ לְשָׁלָל
  chosen: and his life will be to him as spoil
  alternatives:
  - and he will have his life as plunder
  - and his life will become spoil for him
  - and he will carry off his life as booty
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to life rather than soul in a narrow anthropological sense. The idiom 'his life as spoil/plunder' means escaping with one's life. 'As spoil' preserves the metaphor more transparently than flattening it to 'escape with his life'.
- source_word: נַפְשׁוֹ
  chosen: his life
  alternatives:
  - his soul
  lexicon: HALOT
  rationale: In this context נֶפֶשׁ denotes one's life/self preserved from death, not specifically the immaterial soul. 'Life' avoids theological misunderstanding.
- source_word: לְשָׁלָל
  chosen: as spoil
  alternatives:
  - as plunder
  - as booty
  lexicon: HALOT
  rationale: A conventional war metaphor in Jeremiah. 'Spoil' is concise and preserves the image of life carried away from disaster like captured goods.
- source_word: וָחָי
  chosen: and he will live
  alternatives:
  - and he shall live
  - and he will survive
  lexicon: HALOT
  rationale: Rendered distinctly rather than omitted, since the Hebrew repeats the life motif for emphasis. Keeping the repetition preserves the rhetoric of the source.
