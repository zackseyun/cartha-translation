theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Meaning of נֶפֶשׁ in the idiom נַפְשׁוֹ לְשָׁלָל
  chosen_reading: his life ... as spoil
  alternative_readings:
  - his soul ... as spoil
  rationale: The verse speaks of physical preservation amid siege judgment, so 'life' best reflects the Hebrew idiom without importing a narrower anthropological claim about the soul.
