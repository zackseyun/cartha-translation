id: JER.38.12
reference: Jeremiah 38:12
source:
  edition: WLC
  text: וַ/יֹּ֡אמֶר עֶבֶד מֶ֨לֶךְ הַ/כּוּשִׁ֜י אֶֽל יִרְמְיָ֗הוּ שִׂ֣ים נָ֠א בְּלוֹאֵ֨י
    הַ/סְּחָב֤וֹת וְ/הַ/מְּלָחִים֙ תַּ֚חַת אַצִּל֣וֹת יָדֶ֔י/ךָ מִ/תַּ֖חַת לַ/חֲבָלִ֑ים
    וַ/יַּ֥עַשׂ יִרְמְיָ֖הוּ כֵּֽן־־׃
translation:
  text: Then Ebed-melech the Cushite said to Jeremiah, “Please put these worn-out
    rags and scraps under your armpits, under the ropes.” And Jeremiah did so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ethiopian.' The Hebrew says 'the Cushite,' referring to a man from
      Cush.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew terms for the materials are rare and likely refer to worn-out
      cloth items used as padding between Jeremiah's body and the ropes.
    reason: lexical_alternative
  - marker: c
    text: Literally 'under the joints of your hands/arms'; the sense here is the area
      under the arms where the ropes would press during lifting.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶבֶד מֶלֶךְ
  chosen: Ebed-melech
  alternatives:
  - Ebed-Melech
  rationale: Proper name, so transliterated rather than translated ('servant of the
    king'), in keeping with the philosophy of transliterating personal names.
- source_word: הַכּוּשִׁי
  chosen: the Cushite
  alternatives:
  - the Ethiopian
  lexicon: HALOT
  rationale: כּוּשִׁי denotes a person from Cush. 'Cushite' is more directly tied
    to the Hebrew ethnogeographic term; 'Ethiopian' is a traditional but more interpretive
    historical equivalent.
- source_word: שִׂים נָא
  chosen: Please put
  alternatives:
  - Put, please
  - Place, please
  lexicon: HALOT
  rationale: Imperative plus particle of entreaty. 'Please put' gives natural English
    while preserving the polite/requesting force of נָא.
- source_word: בְּלוֹאֵי
  chosen: worn-out
  alternatives:
  - worn-out pieces of
  - old
  - ragged
  lexicon: HALOT
  rationale: The noun refers to worn-out or ragged things. 'Worn-out' captures the
    state of deterioration without over-specifying the material.
- source_word: הַסְּחָבוֹת
  chosen: rags
  alternatives:
  - cast-off cloths
  - torn clothes
  lexicon: HALOT
  rationale: Likely refers to rag-like cloths or worn garments. 'Rags' is concise,
    idiomatic, and fits the rescue context.
- source_word: וְהַמְּלָחִים
  chosen: and scraps
  alternatives:
  - and worn-out clothes
  - and patches
  - and old cloths
  lexicon: HALOT
  rationale: This rare term is uncertain, but in context it denotes additional soft,
    discarded materials used as padding. 'Scraps' preserves the general sense without
    false precision.
- source_word: תַּחַת אַצִּלוֹת יָדֶיךָ
  chosen: under your armpits
  alternatives:
  - under your arm joints
  - under your elbows
  - under your arms
  lexicon: HALOT
  rationale: אַצִּילוֹת literally relates to the joints/adjacent parts of the arms;
    in this context, where ropes are placed to lift Jeremiah, 'armpits' best conveys
    the intended body location in natural English.
- source_word: מִתַּחַת לַחֲבָלִים
  chosen: under the ropes
  alternatives:
  - beneath the ropes
  lexicon: HALOT
  rationale: Specifies that the cloth padding is to be placed between Jeremiah's body
    and the ropes. 'Under the ropes' is the clearest idiomatic rendering.
- source_word: וַיַּעַשׂ יִרְמְיָהוּ כֵּן
  chosen: And Jeremiah did so
  alternatives:
  - And Jeremiah did thus
  - And Jeremiah did that
  lexicon: HALOT
  rationale: Standard narrative compliance formula. 'Did so' is natural modern English
    and accurately reflects the Hebrew.
