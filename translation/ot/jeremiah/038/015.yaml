id: JER.38.15
reference: Jeremiah 38:15
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יִרְמְיָ֨הוּ֙ אֶל צִדְקִיָּ֔הוּ כִּ֚י אַגִּ֣יד לְ/ךָ֔ הֲ/ל֖וֹא
    הָמֵ֣ת תְּמִיתֵ֑/נִי וְ/כִי֙ אִיעָ֣צְ/ךָ֔ לֹ֥א תִשְׁמַ֖ע אֵלָֽ/י־׃
translation:
  text: Jeremiah said to Zedekiah, “If I tell you, will you not surely put me to death?
    And if I advise you, you will not listen to me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'certainly kill me.' The Hebrew uses an infinitive absolute with a finite
      verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''Listen to me'' may also carry the sense ''heed me'' or ''obey me'' in
      context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: If
  alternatives:
  - For
  - Indeed
  - That
  lexicon: HALOT
  rationale: Here כִּי introduces the content of Jeremiah's conditional protest in
    direct speech. In idiomatic English, rendering it as 'If' best captures the sense
    carried forward by the following rhetorical question.
- source_word: אַגִּיד לְךָ
  chosen: I tell you
  alternatives:
  - I declare to you
  - I report to you
  lexicon: HALOT
  rationale: נגד in Hiphil commonly means to tell, declare, or make known. 'Tell you'
    is natural modern English and fits the conversational setting.
- source_word: הֲלוֹא
  chosen: will you not
  alternatives:
  - surely
  - is it not that
  lexicon: HALOT
  rationale: The particle introduces a rhetorical question expecting an affirmative
    answer. 'Will you not' preserves the interrogative force better than a flat assertion.
- source_word: הָמֵת תְּמִיתֵנִי
  chosen: surely put me to death
  alternatives:
  - certainly kill me
  - indeed cause me to die
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Surely
    put me to death' preserves the emphatic force while using idiomatic English.
- source_word: וְכִי
  chosen: And if
  alternatives:
  - And indeed if
  - Or if
  lexicon: HALOT
  rationale: This introduces the second conditional clause parallel to the first.
    'And if' best reflects the structure and flow of the Hebrew.
- source_word: אִיעָצְךָ
  chosen: I advise you
  alternatives:
  - I counsel you
  - I give you advice
  lexicon: HALOT
  rationale: יעץ in Qal means to advise or counsel. 'Advise you' is concise, readable,
    and appropriate to Jeremiah's offer of counsel to the king.
- source_word: לֹא תִשְׁמַע אֵלַי
  chosen: you will not listen to me
  alternatives:
  - you will not hear me
  - you will not obey me
  lexicon: HALOT
  rationale: שׁמע with אֶל often means to listen to someone, with possible overtones
    of heed/obey. 'Listen to me' preserves the immediate sense without over-interpreting
    toward obedience.
- source_word: יִרְמְיָהוּ / צִדְקִיָּהוּ
  chosen: Jeremiah / Zedekiah
  rationale: Personal names are transliterated by standard English conventions per
    project philosophy.
