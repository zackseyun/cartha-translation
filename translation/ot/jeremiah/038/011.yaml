id: JER.38.11
reference: Jeremiah 38:11
source:
  edition: WLC
  text: וַ/יִּקַּ֣ח עֶֽבֶד מֶ֨לֶךְ אֶת הָ/אֲנָשִׁ֜ים בְּ/יָד֗/וֹ וַ/יָּבֹ֤א בֵית הַ/מֶּ֨לֶךְ֙
    אֶל תַּ֣חַת הָ/אוֹצָ֔ר וַ/יִּקַּ֤ח מִ/שָּׁם֙ בְּלוֹיֵ֣ ה/סחבות וּ/בְלוֹיֵ֖ מְלָחִ֑ים
    וַ/יְשַׁלְּחֵ֧/ם אֶֽל יִרְמְיָ֛הוּ אֶל הַ/בּ֖וֹר בַּ/חֲבָלִֽים׀־־־־־־׃
translation:
  text: So Ebed-melech took the men with him and went into the king’s house, to a
    place below the storeroom, and from there took worn-out rags and worn-out clothes,
    and sent them down by ropes to Jeremiah in the cistern.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the place under the treasury.' The Hebrew אוֹצָר can refer to a treasury
      or a storeroom; the context here favors a storage area.
    reason: lexical_alternative
  - marker: b
    text: Or 'worn-out garments.' The Hebrew term מְלָחִים is rare and its exact sense
      is uncertain, but the context suggests old cloth items used to protect Jeremiah
      from the ropes.
    reason: lexical_alternative
  - marker: c
    text: Or 'pit.' The Hebrew בּוֹר can denote a pit or a cistern; here 'cistern'
      fits the narrative setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶבֶד מֶלֶךְ
  chosen: Ebed-melech
  alternatives:
  - Ebed-Melech
  lexicon: HALOT
  rationale: Proper name, so transliterated rather than translated ('servant of the
    king'), in keeping with the philosophy of transliterating personal names.
- source_word: הָאֲנָשִׁים בְּיָדוֹ
  chosen: the men with him
  alternatives:
  - the men in his charge
  - the men under his hand
  lexicon: HALOT
  rationale: בְּיָדוֹ is idiomatic; here it indicates accompaniment or those under
    his direction. 'With him' is natural English and fits the narrative action without
    over-literal awkwardness.
- source_word: בֵית הַמֶּלֶךְ
  chosen: the king’s house
  alternatives:
  - the palace
  lexicon: HALOT
  rationale: A formally close rendering that preserves the Hebrew expression. 'Palace'
    is possible, but 'the king’s house' keeps the source wording while remaining clear.
- source_word: אֶל תַּחַת הָאוֹצָר
  chosen: to a place below the storeroom
  alternatives:
  - to the place under the treasury
  - to the lower part of the storehouse
  lexicon: HALOT
  rationale: תַּחַת indicates a lower area beneath something; הָאוֹצָר can denote
    a treasury, storehouse, or storeroom. In this practical context of retrieving
    old cloths, 'storeroom' best fits the immediate sense better than the more financial-sounding
    'treasury'.
- source_word: בְּלוֹיֵ הַסְּחָבוֹת
  chosen: worn-out rags
  alternatives:
  - old rags
  - worn-out scraps of cloth
  lexicon: HALOT
  rationale: בְּלוֹיֵ conveys worn-out, shabby items; סחבות refers to rags or scraps.
    'Worn-out rags' captures both elements.
- source_word: וּבְלוֹיֵ מְלָחִים
  chosen: worn-out clothes
  alternatives:
  - worn-out garments
  - old clothes
  lexicon: HALOT
  rationale: מְלָחִים is a difficult term, commonly understood in context as garments
    or cloths. Given the parallel with rags and the use to cushion Jeremiah under
    the ropes in the next verse, 'worn-out clothes' is the clearest contextual rendering.
- source_word: וַיְשַׁלְּחֵם
  chosen: sent them down
  alternatives:
  - lowered them
  - sent them
  lexicon: HALOT
  rationale: The verb is 'sent,' but because the destination is Jeremiah in a cistern
    and the means is by ropes, English naturally requires the downward sense. 'Sent
    them down' preserves the verb while making the action intelligible.
- source_word: אֶל יִרְמְיָהוּ אֶל הַבּוֹר
  chosen: to Jeremiah in the cistern
  alternatives:
  - to Jeremiah, to the pit
  - to Jeremiah in the pit
  lexicon: HALOT
  rationale: בּוֹר can mean pit, cistern, or dungeon depending on context. Here Jeremiah
    is being lifted out with ropes, and the setting is a water cistern used as confinement;
    'cistern' is the most precise contextual choice.
- source_word: בַּחֲבָלִים
  chosen: by ropes
  alternatives:
  - with ropes
  - by means of ropes
  lexicon: HALOT
  rationale: Instrumental beth indicates means. 'By ropes' is concise and natural.
