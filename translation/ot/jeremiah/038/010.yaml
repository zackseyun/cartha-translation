id: JER.38.10
reference: Jeremiah 38:10
source:
  edition: WLC
  text: וַ/יְצַוֶּ֣ה הַ/מֶּ֔לֶךְ אֵ֛ת עֶֽבֶד מֶ֥לֶךְ הַ/כּוּשִׁ֖י לֵ/אמֹ֑ר קַ֣ח בְּ/יָדְ/ךָ֤
    מִ/זֶּה֙ שְׁלֹשִׁ֣ים אֲנָשִׁ֔ים וְֽ/הַעֲלִ֜יתָ אֶֽת יִרְמְיָ֧הוּ הַ/נָּבִ֛יא מִן
    הַ/בּ֖וֹר בְּ/טֶ֥רֶם יָמֽוּת־־־׃
translation:
  text: Then the king commanded Ebed-melech the Cushite, saying, “Take with you from
    here thirty men, and bring up Jeremiah the prophet from the cistern before he
    dies.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Ethiopian.' The Hebrew says 'the Cushite,' referring to a man from
      Cush.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the pit' or, in older English tradition, 'from the dungeon.' The
      Hebrew bor can denote a pit or cistern; here 'cistern' fits the narrative setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַוֶּה
  chosen: commanded
  alternatives:
  - ordered
  - instructed
  lexicon: HALOT
  rationale: The verb צוה in the waw-consecutive narrative form denotes a direct royal
    command. 'Commanded' best preserves the force of the king's authoritative speech
    act.
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Definite noun referring to the known king in context; standard rendering
    is appropriate.
- source_word: עֶבֶד מֶלֶךְ
  chosen: Ebed-melech
  alternatives:
  - Eved-melech
  lexicon: HALOT
  rationale: This is a personal name, not translated as a common noun phrase ('servant
    of the king'), in keeping with the philosophy to transliterate names.
- source_word: הַכּוּשִׁי
  chosen: the Cushite
  alternatives:
  - the Ethiopian
  lexicon: HALOT
  rationale: כּוּשִׁי denotes a person from Cush. 'Cushite' is more directly tied
    to the Hebrew ethnogeographic term than the traditional but less precise 'Ethiopian.'
- source_word: קַח
  chosen: Take
  alternatives:
  - Bring
  - Get
  lexicon: HALOT
  rationale: The imperative לקח commonly means 'take.' It introduces the king's instruction
    to gather men.
- source_word: בְּיָדְךָ
  chosen: with you
  alternatives:
  - in your hand
  - under your charge
  lexicon: HALOT
  rationale: Literally 'in your hand,' but in this idiom it means to take persons
    along under one's direction. 'With you' is the most natural English equivalent
    without obscuring the sense.
- source_word: מִזֶּה
  chosen: from here
  alternatives:
  - from this place
  - from hereabouts
  lexicon: HALOT
  rationale: The demonstrative with preposition points to the immediate location.
    'From here' is concise and natural.
- source_word: שְׁלֹשִׁים אֲנָשִׁים
  chosen: thirty men
  alternatives:
  - thirty people
  lexicon: HALOT
  rationale: The Hebrew is explicitly masculine plural 'men.' Per translation philosophy,
    gender-accurate rendering is preferred where the source is specific.
- source_word: וְהַעֲלִיתָ
  chosen: bring up
  alternatives:
  - lift up
  - pull up
  lexicon: HALOT
  rationale: The Hiphil of עלה means to cause to go up. In context of extracting someone
    from a pit/cistern, 'bring up' is idiomatic and preserves the upward movement.
- source_word: יִרְמְיָהוּ הַנָּבִיא
  chosen: Jeremiah the prophet
  lexicon: HALOT
  rationale: Standard transliteration of the name plus the appositional title. The
    title is retained because it is present in the Hebrew and contextually significant.
- source_word: מִן הַבּוֹר
  chosen: from the cistern
  alternatives:
  - from the pit
  - from the dungeon
  lexicon: HALOT
  rationale: בּוֹר can mean pit, cistern, or dungeon depending on context. In this
    narrative Jeremiah has been lowered into a muddy water-storage pit, so 'cistern'
    is the most contextually precise rendering; alternatives are worth preserving
    because English tradition often uses 'dungeon' or 'pit.'
- source_word: בְּטֶרֶם יָמוּת
  chosen: before he dies
  alternatives:
  - before he should die
  - lest he die
  lexicon: HALOT
  rationale: בטרם introduces a temporal limit, 'before,' and the imperfect expresses
    the impending result if no action is taken. 'Before he dies' is the clearest natural
    rendering.
