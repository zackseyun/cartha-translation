id: JER.38.27
reference: Jeremiah 38:27
source:
  edition: WLC
  text: וַ/יָּבֹ֨אוּ כָל הַ/שָּׂרִ֤ים אֶֽל יִרְמְיָ֨הוּ֙ וַ/יִּשְׁאֲל֣וּ אֹת֔/וֹ וַ/יַּגֵּ֤ד
    לָ/הֶם֙ כְּ/כָל הַ/דְּבָרִ֣ים הָ/אֵ֔לֶּה אֲשֶׁ֥ר צִוָּ֖ה הַ/מֶּ֑לֶךְ וַ/יַּחֲרִ֣שׁוּ
    מִמֶּ֔/נּוּ כִּ֥י לֹֽא נִשְׁמַ֖ע הַ/דָּבָֽר־־־־׃פ
translation:
  text: Then all the officials came to Jeremiah and questioned him, and he told them
    all these words that the king had commanded. So they said no more to him, for
    the matter had not been heard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for the conversation had not been overheard.' The Hebrew literally
      says, 'for the matter had not been heard,' likely explaining why the officials
      accepted Jeremiah's answer and fell silent.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the commanders
  lexicon: HALOT
  rationale: שַׂר commonly denotes officials or leaders in the royal administration.
    'Officials' fits the court context better than the more archaic 'princes' and
    avoids implying specifically military rank.
- source_word: וַיִּשְׁאֲלוּ אֹתוֹ
  chosen: questioned him
  alternatives:
  - asked him
  - inquired of him
  lexicon: HALOT
  rationale: שׁאל here refers to interrogating Jeremiah about the matter, not merely
    asking a casual question. 'Questioned him' captures the investigative tone.
- source_word: וַיַּגֵּד לָהֶם
  chosen: he told them
  alternatives:
  - he reported to them
  - he declared to them
  lexicon: HALOT
  rationale: נגד in the Hifil means to make known or tell. 'Told them' is natural
    modern English and sufficiently precise in this narrative setting.
- source_word: כְּכָל הַדְּבָרִים הָאֵלֶּה
  chosen: all these words
  alternatives:
  - all these things
  - everything
  lexicon: HALOT
  rationale: דְּבָרִים can mean 'words' or 'matters/things.' Because Jeremiah is repeating
    the king's instructed response, 'words' preserves the verbal emphasis of the Hebrew.
- source_word: אֲשֶׁר צִוָּה הַמֶּלֶךְ
  chosen: that the king had commanded
  alternatives:
  - that the king had ordered
  - as the king commanded
  lexicon: HALOT
  rationale: צוה is a command/ordering verb. 'Had commanded' reflects the prior instruction
    from the king and preserves the force of royal authority.
- source_word: וַיַּחֲרִשׁוּ מִמֶּנּוּ
  chosen: they said no more to him
  alternatives:
  - they were silent before him
  - they kept silent about it with him
  lexicon: HALOT
  rationale: חרשׁ in this idiom means to be silent or cease speaking. In context,
    after hearing Jeremiah's answer, the officials stopped pressing him. 'They said
    no more to him' expresses the narrative sense clearly in English.
- source_word: כִּי לֹא נִשְׁמַע הַדָּבָר
  chosen: for the matter had not been heard
  alternatives:
  - for the conversation had not been overheard
  - because the matter was not known
  lexicon: HALOT
  rationale: The passive of שׁמע here indicates that the matter/conversation had not
    been heard by others. 'The matter had not been heard' is a close rendering that
    preserves the Hebrew's passive and leaves the implied subject indefinite.
