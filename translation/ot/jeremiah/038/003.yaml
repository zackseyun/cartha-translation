id: JER.38.3
reference: Jeremiah 38:3
source:
  edition: WLC
  text: כֹּ֖ה אָמַ֣ר יְהוָ֑ה הִנָּתֹ֨ן תִּנָּתֵ֜ן הָ/עִ֣יר הַ/זֹּ֗את בְּ/יַ֛ד חֵ֥יל מֶֽלֶךְ בָּבֶ֖ל וּ/לְכָדָֽ/הּ־׃
translation:
  text: 'Thus says Yahweh: This city will surely be given into the hand of the army of the king of Babylon, and he will capture it.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the power of the army of the king of Babylon.' The Hebrew idiom is literally 'into the hand of.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - So
  - This is what
  lexicon: HALOT
  rationale: Introduces a prophetic declaration formula. 'Thus' preserves the elevated but still natural register of prophetic speech in English.
- source_word: אָמַר יְהוָה
  chosen: says the LORD
  alternatives:
  - said the LORD
  - declares the LORD
  lexicon: HALOT
  rationale: The prophetic messenger formula is idiomatically rendered in English as present-tense 'says' even with the Hebrew qatal, reflecting ongoing authoritative proclamation. YHWH is rendered 'the LORD' per doctrine guidance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and broad ecclesial recognizability.
- source_word: הִנָּתוֹן תִּנָּתֵן
  chosen: will surely be given
  alternatives:
  - will certainly be given
  - is indeed to be given
  - shall surely be given
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the passive verb נתן. 'Will surely be given' captures both the future sense and emphatic certainty without sounding archaic.
- source_word: הָעִיר הַזֹּאת
  chosen: This city
  alternatives:
  - this city here
  lexicon: HALOT
  rationale: Straightforward demonstrative phrase; 'This city' is the natural English equivalent.
- source_word: בְּיַד
  chosen: into the hand of
  alternatives:
  - into the power of
  - to
  lexicon: HALOT
  rationale: The idiom literally means transfer into another's control. 'Into the hand of' preserves the Hebrew metaphor while remaining understandable in English.
- source_word: חֵיל
  chosen: the army
  alternatives:
  - the force
  - the troops
  lexicon: HALOT
  rationale: In this military context חֵיל refers to armed forces rather than wealth or strength. 'Army' is the clearest contextual rendering.
- source_word: מֶלֶךְ בָּבֶל
  chosen: the king of Babylon
  alternatives:
  - Babylon's king
  lexicon: HALOT
  rationale: Standard construct rendering; formal enough for prophetic narrative and fully natural in English.
- source_word: וּלְכָדָהּ
  chosen: and he will capture it
  alternatives:
  - and he will take it
  - and he will seize it
  lexicon: HALOT
  rationale: The verb לכד commonly means capture/seize, especially of a city. Singular 'he' refers grammatically to the king, though the army is the instrument; English preserves the Hebrew shift without over-explaining.
