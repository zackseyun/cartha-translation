id: JER.38.21
reference: Jeremiah 38:21
source:
  edition: WLC
  text: וְ/אִם מָאֵ֥ן אַתָּ֖ה לָ/צֵ֑את זֶ֣ה הַ/דָּבָ֔ר אֲשֶׁ֥ר הִרְאַ֖/נִי יְהוָֽה־׃
translation:
  text: 'But if you refuse to go out, this is the word that Yahweh has shown me:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'this is the matter that the LORD has shown me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: HALOT
  rationale: The conjunction plus conditional particle introduces a contrast with the preceding statement. 'But if' captures the adversative force in context more naturally than a simple 'And if'.
- source_word: מָאֵן
  chosen: refuse
  alternatives:
  - are unwilling
  - decline
  lexicon: HALOT
  rationale: The verb denotes refusal rather than mere inability. 'Refuse' is concise and preserves the volitional sense.
- source_word: לָצֵאת
  chosen: to go out
  alternatives:
  - to go forth
  - to surrender
  lexicon: HALOT
  rationale: The infinitive literally means 'to go out.' In context it refers to going out to the Babylonian officials, but the text itself does not explicitly say 'surrender' here, so the more literal wording is preferred.
- source_word: זֶה הַדָּבָר
  chosen: this is the word
  alternatives:
  - this is the matter
  - this is the thing
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' Because the clause introduces a divine disclosure, 'word' fits prophetic diction well and preserves the revelatory tone.
- source_word: אֲשֶׁר הִרְאַנִי
  chosen: that ... has shown me
  alternatives:
  - that ... revealed to me
  - that ... caused me to see
  lexicon: HALOT
  rationale: The Hiphil of ראה means 'show' or 'cause to see.' 'Has shown me' is natural English and retains the visual-revelatory nuance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
