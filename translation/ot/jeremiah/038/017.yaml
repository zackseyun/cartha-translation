theological_decisions:
- issue: Rendering the divine name
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the covenant name יְהוָה, which the project's doctrine
    specifies should normally be rendered 'the LORD.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH | the LORD'
- issue: Meaning of נֶפֶשׁ in an idiom of survival
  chosen_reading: your life will be spared
  alternative_readings:
  - your soul will live
  rationale: To avoid importing later anthropological assumptions, נֶפֶשׁ is taken
    in its common Hebrew sense of 'life/self' in a context of physical survival.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    Preserve theological tension rather than resolve it'
