id: JER.38.17
reference: Jeremiah 38:17
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יִרְמְיָ֣הוּ אֶל צִדְקִיָּ֡הוּ כֹּֽה אָמַ֣ר יְהוָה֩ אֱלֹהֵ֨י צְבָא֜וֹת
    אֱלֹהֵ֣י יִשְׂרָאֵ֗ל אִם יָצֹ֨א תֵצֵ֜א אֶל שָׂרֵ֤י מֶֽלֶךְ בָּבֶל֙ וְ/חָיְתָ֣ה
    נַפְשֶׁ֔/ךָ וְ/הָ/עִ֣יר הַ/זֹּ֔את לֹ֥א תִשָּׂרֵ֖ף בָּ/אֵ֑שׁ וְ/חָיִ֖תָה אַתָּ֥ה
    וּ/בֵיתֶֽ/ךָ־־־־־׃
translation:
  text: 'Then Jeremiah said to Zedekiah, “Thus says the LORD, the God of hosts, the
    God of Israel: If you indeed go out to the officials of the king of Babylon, your
    life will be spared, and this city will not be burned with fire; and you and your
    household will live.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'If you surely go out.' The Hebrew uses an infinitive
      absolute with a finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'your soul will live.' Here 'soul' refers to your life or self, that
      is, your survival.
    reason: lexical_alternative
  - marker: c
    text: Or 'you and your house will live.' 'Household' conveys the sense of family
      and dependents, not merely the building.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: DOCTRINE.md specifies the default rendering of YHWH as 'the LORD,' following
    Jewish reverence tradition and the LXX pattern.
- source_word: אֱלֹהֵי צְבָאוֹת
  chosen: the God of hosts
  alternatives:
  - God of armies
  - LORD of hosts
  lexicon: HALOT
  rationale: Because אֱלֹהֵי governs צְבָאוֹת here, the phrase is rendered literally
    as 'the God of hosts,' preserving the construct chain rather than smoothing to
    the more traditional title 'LORD of hosts,' which would not match the Hebrew syntax
    in this verse.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain; retained formally for covenantal clarity.
- source_word: אִם יָצֹא תֵצֵא
  chosen: If you indeed go out
  alternatives:
  - If you surely go out
  - If you go out
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    'Indeed go out' preserves the emphasis in readable modern English without awkward
    literalism.
- source_word: אֶל שָׂרֵי מֶלֶךְ בָּבֶל
  chosen: to the officials of the king of Babylon
  alternatives:
  - to the princes of the king of Babylon
  - to the commanders of the king of Babylon
  lexicon: HALOT
  rationale: שָׂרִים can denote officials, princes, or commanders depending on context.
    'Officials' best fits the court/military leadership addressed here without overstating
    a specifically military sense.
- source_word: וְחָיְתָה נַפְשֶׁךָ
  chosen: your life will be spared
  alternatives:
  - your soul will live
  - you will live
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the person's life, not an abstract immaterial soul.
    'Your life will be spared' communicates the idiom naturally and accurately.
- source_word: לֹא תִשָּׂרֵף בָּאֵשׁ
  chosen: will not be burned with fire
  alternatives:
  - will not be burned
  - will not be set on fire
  lexicon: HALOT
  rationale: The Niphal of שׂרף with בָאֵשׁ is rendered transparently. 'With fire'
    preserves the Hebrew expression without sounding unnatural.
- source_word: וְחָיִתָה אַתָּה וּבֵיתֶךָ
  chosen: and you and your household will live
  alternatives:
  - and you and your house will live
  - and you will live, you and your household
  lexicon: HALOT
  rationale: בַּיִת in this context refers to one's household/family establishment,
    not merely the physical house. 'Household' best conveys the sense in contemporary
    English.
- source_word: וַיֹּאמֶר יִרְמְיָהוּ אֶל צִדְקִיָּהוּ
  chosen: Then Jeremiah said to Zedekiah
  alternatives:
  - And Jeremiah said to Zedekiah
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence.
