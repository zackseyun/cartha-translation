id: JER.38.14
reference: Jeremiah 38:14
source:
  edition: WLC
  text: וַ/יִּשְׁלַ֞ח הַ/מֶּ֣לֶךְ צִדְקִיָּ֗הוּ וַ/יִּקַּ֞ח אֶֽת יִרְמְיָ֤הוּ הַ/נָּבִיא֙ אֵלָ֔י/ו אֶל מָבוֹא֙ הַ/שְּׁלִישִׁ֔י אֲשֶׁ֖ר בְּ/בֵ֣ית יְהוָ֑ה וַ/יֹּ֨אמֶר הַ/מֶּ֜לֶךְ אֶֽל יִרְמְיָ֗הוּ שֹׁאֵ֨ל אֲנִ֤י אֹֽתְ/ךָ֙ דָּבָ֔ר אַל תְּכַחֵ֥ד מִמֶּ֖/נִּי דָּבָֽר־־־־׃
translation:
  text: Then King Zedekiah sent and took Jeremiah the prophet to himself, to the third entrance that is in the house of Yahweh, and the king said to Jeremiah, “I am asking you something; do not hide anything from me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the temple of the LORD” for “the house of the LORD.”
    reason: lexical_alternative
  - marker: b
    text: Or “do not conceal a thing from me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  chosen: sent
  alternatives:
  - sent word
  - sent for
  lexicon: HALOT
  rationale: Basic sense of שלח in the wayyiqtol narrative sequence. 'Sent' is retained, with the following verb carrying the action of bringing Jeremiah.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - brought
  - fetched
  lexicon: HALOT
  rationale: Formal sense is 'took.' In context it refers to having Jeremiah brought to him, but 'took' preserves the Hebrew wording without over-paraphrase.
- source_word: אֵלָיו
  chosen: to himself
  alternatives:
  - to him
  lexicon: HALOT
  rationale: The preposition plus pronominal suffix indicates movement toward the king personally. 'To himself' makes the personal force explicit in natural English.
- source_word: מָבוֹא הַשְּׁלִישִׁי
  chosen: the third entrance
  alternatives:
  - the third entryway
  - the third gateway
  lexicon: HALOT
  rationale: מָבוֹא denotes an entrance/entryway/place of access. 'Entrance' is clear modern English and fits the temple setting. 'Third' is retained literally rather than interpreted.
- source_word: בְּבֵית יְהוָה
  chosen: in the house of the LORD
  alternatives:
  - in the temple of the LORD
  lexicon: HALOT
  rationale: בית יהוה is literally 'house of YHWH.' The main text preserves the literal expression; 'temple of the LORD' is a valid contextual alternative but less formally transparent.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: שֹׁאֵל אֲנִי אֹתְךָ דָּבָר
  chosen: I am asking you something
  alternatives:
  - I ask you a thing
  - I am about to ask you a matter
  lexicon: HALOT
  rationale: The participle שֹׁאֵל with pronoun gives an immediate present sense. דָּבָר here is idiomatic for 'something' or 'a matter.' This rendering is natural English while preserving the king's request.
- source_word: אַל תְּכַחֵד מִמֶּנִּי דָּבָר
  chosen: do not hide anything from me
  alternatives:
  - do not conceal a thing from me
  - do not withhold anything from me
  lexicon: HALOT
  rationale: כחד means to hide/conceal. Repeating 'anything' for דָּבָר gives idiomatic English and preserves the totalizing force of the prohibition.
