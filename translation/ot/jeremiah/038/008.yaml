id: JER.38.8
reference: Jeremiah 38:8
source:
  edition: WLC
  text: וַ/יֵּצֵ֥א עֶֽבֶד מֶ֖לֶךְ מִ/בֵּ֣ית הַ/מֶּ֑לֶךְ וַ/יְדַבֵּ֥ר אֶל הַ/מֶּ֖לֶךְ
    לֵ/אמֹֽר־־׃
translation:
  text: Then Ebed-melech went out from the king’s house and spoke to the king, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the palace.' The Hebrew reads literally 'from the king’s house.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: went out
  alternatives:
  - came out
  - left
  lexicon: HALOT
  rationale: The wayyiqtol of יצא normally denotes movement outward. 'Went out' preserves
    the directional sense and narrative sequence better than the more interpretive
    'left.'
- source_word: עֶבֶד מֶלֶךְ
  chosen: Ebed-melech
  alternatives:
  - Ebed-Melech
  lexicon: HALOT
  rationale: This is a personal name, not a common noun phrase here. Per translation
    philosophy, personal names are transliterated rather than translated. Standard
    English convention favors 'Ebed-melech.'
- source_word: מִבֵּית הַמֶּלֶךְ
  chosen: from the king’s house
  alternatives:
  - from the palace
  - from the house of the king
  lexicon: HALOT
  rationale: בַּיִת literally means 'house.' In royal context it can denote the palace,
    but 'the king’s house' preserves the Hebrew expression while remaining natural
    English. 'Palace' is possible but slightly more interpretive.
- source_word: וַיְדַבֵּר אֶל הַמֶּלֶךְ
  chosen: and spoke to the king
  alternatives:
  - and said to the king
  lexicon: HALOT
  rationale: דבר with אֶל commonly means 'speak to.' This also avoids collapsing the
    distinction between וידבר and the following לאמר, which introduces the content
    of speech in the next verse.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said,
  lexicon: HALOT
  rationale: The infinitive construct formula introduces direct speech that continues
    in the following verse. 'Saying,' is the most transparent and formally accurate
    rendering.
