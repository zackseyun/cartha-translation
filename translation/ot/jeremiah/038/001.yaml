id: JER.38.1
reference: Jeremiah 38:1
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֞ע שְׁפַטְיָ֣ה בֶן מַתָּ֗ן וּ/גְדַלְיָ֨הוּ֙ בֶּן פַּשְׁח֔וּר וְ/יוּכַל֙
    בֶּן שֶׁ֣לֶמְיָ֔הוּ וּ/פַשְׁח֖וּר בֶּן מַלְכִּיָּ֑ה אֶ֨ת הַ/דְּבָרִ֔ים אֲשֶׁ֧ר
    יִרְמְיָ֛הוּ מְדַבֵּ֥ר אֶל כָּל הָ/עָ֖ם לֵ/אמֹֽר־־־־־־־׃ס
translation:
  text: Now Shephatiah son of Mattan, Gedaliah son of Pashhur, Jucal son of Shelemiah,
    and Pashhur son of Malchiah heard the words that Jeremiah was speaking to all
    the people, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew יוּכַל is rendered 'Jucal' here; the same figure appears elsewhere
      with the fuller form 'Jehucal' (Jer 37:3).
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - heard about
  - came to hear
  lexicon: HALOT
  rationale: Qal wayyiqtol of שׁמע here straightforwardly introduces the narrative
    event that these officials heard Jeremiah's words. Simple past 'heard' best fits
    the syntax and narrative flow.
- source_word: שְׁפַטְיָה ... גְדַלְיָהוּ ... יוּכַל ... פַשְׁחוּר
  chosen: Shephatiah ... Gedaliah ... Jucal ... Pashhur
  alternatives:
  - Jehucal for יוּכַל
  rationale: Personal names are transliterated rather than translated per project
    philosophy. יוּכַל is commonly represented in English as 'Jucal' in this verse,
    reflecting the consonantal form here; 'Jehucal' reflects the fuller form known
    elsewhere (cf. Jer 37:3) and is worth preserving as an alternative.
- source_word: בֶּן
  chosen: son of
  lexicon: HALOT
  rationale: Standard genealogical marker indicating immediate paternal descent or
    identification. 'Son of' is the normal and transparent rendering.
- source_word: אֶת־הַדְּבָרִים
  chosen: the words
  alternatives:
  - the things
  - the message
  lexicon: HALOT
  rationale: דָּבָר can mean 'word,' 'matter,' or 'thing.' In this context, referring
    to Jeremiah's spoken content, 'the words' is the most direct and natural rendering.
- source_word: אֲשֶׁר יִרְמְיָהוּ מְדַבֵּר
  chosen: that Jeremiah was speaking
  alternatives:
  - that Jeremiah spoke
  - which Jeremiah was saying
  lexicon: HALOT
  rationale: The relative clause with the participle מְדַבֵּר presents Jeremiah's
    speech as ongoing at the time they heard it. English past progressive 'was speaking'
    preserves that imperfective sense better than simple past.
- source_word: אֶל־כָּל־הָעָם
  chosen: to all the people
  alternatives:
  - to all the populace
  - to all the nation
  lexicon: HALOT
  rationale: עָם here refers to the gathered people addressed by Jeremiah, not necessarily
    the nation in an abstract sense. 'All the people' is idiomatic and sufficiently
    broad.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - 'as follows:'
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of speech in the
    following verse. 'Saying,' preserves the formal linkage to the quotation that
    follows.
