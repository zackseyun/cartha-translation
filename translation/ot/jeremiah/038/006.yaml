id: JER.38.6
reference: Jeremiah 38:6
source:
  edition: WLC
  text: וַ/יִּקְח֣וּ אֶֽת יִרְמְיָ֗הוּ וַ/יַּשְׁלִ֨כוּ אֹת֜/וֹ אֶל הַ/בּ֣וֹר מַלְכִּיָּ֣הוּ
    בֶן הַ/מֶּ֗לֶךְ אֲשֶׁר֙ בַּ/חֲצַ֣ר הַ/מַּטָּרָ֔ה וַ/יְשַׁלְּח֥וּ אֶֽת יִרְמְיָ֖הוּ
    בַּ/חֲבָלִ֑ים וּ/בַ/בּ֤וֹר אֵֽין מַ֨יִם֙ כִּ֣י אִם טִ֔יט וַ/יִּטְבַּ֥ע יִרְמְיָ֖הוּ
    בַּ/טִּֽיט־־׀־־־־׃ס
translation:
  text: So they took Jeremiah and threw him into the cistern of Malkijah the king’s
    son, which was in the court of the guard, and they lowered Jeremiah with ropes.
    Now there was no water in the cistern, but only mud, and Jeremiah sank into the
    mud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pit' for 'cistern' (Hebrew bor); the context of there being no water
      but only mud suggests a water cistern specifically.
    reason: lexical_alternative
  - marker: b
    text: Or 'court of the prison.' The Hebrew term likely refers to a guarded detention
      area.
    reason: lexical_alternative
  - marker: c
    text: Or 'mire' for 'mud.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: they took
  alternatives:
  - they seized
  lexicon: HALOT
  rationale: Basic narrative verb לקח, here introducing the officials' action toward
    Jeremiah. 'Took' is the plain sense; 'seized' is possible contextually but slightly
    more interpretive.
- source_word: וַיַּשְׁלִכוּ אֹתוֹ אֶל־הַבּוֹר
  chosen: threw him into the cistern
  alternatives:
  - cast him into the pit
  - threw him into the pit
  lexicon: HALOT
  rationale: השליך conveys forceful throwing/casting. בּוֹר can mean 'pit,' 'cistern,'
    or 'dungeon'; here the later note about no water but mud indicates a water-storage
    pit, so 'cistern' is more precise than the broader 'pit'.
- source_word: הַבּוֹר
  chosen: the cistern
  alternatives:
  - the pit
  lexicon: HALOT
  rationale: Context specifies a waterless muddy holding place, strongly suggesting
    a cistern rather than a generic pit. This preserves the physical setting.
- source_word: מַלְכִּיָּהוּ בֶן־הַמֶּלֶךְ
  chosen: Malkijah the king’s son
  alternatives:
  - Malchiah the son of the king
  - Malkijah son of the king
  lexicon: HALOT
  rationale: Name is transliterated per philosophy. The construct phrase is rendered
    naturally in English as apposition, 'the king’s son,' without implying succession
    to the throne.
- source_word: אֲשֶׁר בַּחֲצַר הַמַּטָּרָה
  chosen: which was in the court of the guard
  alternatives:
  - which was in the courtyard of the guard
  - which was in the court of the prison
  lexicon: HALOT
  rationale: חָצֵר is 'court/courtyard.' מַטָּרָה in Jeremiah refers to a guarded
    detention area; 'guard' fits the usage and avoids over-specifying 'prison' where
    the Hebrew term is not the common word for prison.
- source_word: וַיְשַׁלְּחוּ אֶת־יִרְמְיָהוּ בַּחֲבָלִים
  chosen: they lowered Jeremiah with ropes
  alternatives:
  - they let Jeremiah down with ropes
  - they sent Jeremiah down with ropes
  lexicon: HALOT
  rationale: Although שלח often means 'send,' in this context with ropes and a cistern
    it idiomatically means lowering him down. 'Lowered' communicates the action clearly
    in natural English.
- source_word: בַּחֲבָלִים
  chosen: with ropes
  alternatives:
  - by ropes
  - using ropes
  lexicon: HALOT
  rationale: Straightforward instrumental use of חבלים.
- source_word: וּבַבּוֹר אֵין מַיִם כִּי אִם־טִיט
  chosen: Now there was no water in the cistern, but only mud
  alternatives:
  - and there was no water in the cistern, only mud
  - but the cistern had no water, only mire
  lexicon: HALOT
  rationale: אֵין marks nonexistence; כִּי אִם here is exceptive, 'but only/except.'
    'Mud' is more readable modern English than 'mire,' while preserving the physical
    danger.
- source_word: טִיט
  chosen: mud
  alternatives:
  - mire
  - clay
  lexicon: HALOT
  rationale: טִיט denotes mud/mire. 'Mud' is the clearest modern equivalent; 'mire'
    is possible but more literary/archaic.
- source_word: וַיִּטְבַּע יִרְמְיָהוּ בַּטִּיט
  chosen: Jeremiah sank into the mud
  alternatives:
  - Jeremiah sank in the mud
  - Jeremiah was stuck in the mud
  lexicon: HALOT
  rationale: טבע means sink/submerge. 'Sank into the mud' best reflects movement downward
    and the danger implied by the scene; 'was stuck' weakens the verbal force.
