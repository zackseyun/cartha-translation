theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Meaning of נֶפֶשׁ in a threat-to-life context
  chosen_reading: your life may be spared
  alternative_readings:
  - your soul may live
  rationale: In this context Jeremiah is assuring Zedekiah of physical preservation if he obeys. Rendering נֶפֶשׁ as 'life' avoids importing a narrower anthropological claim about the soul while matching normal Hebrew idiom.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #6'
