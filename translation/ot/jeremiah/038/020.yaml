id: JER.38.20
reference: Jeremiah 38:20
source:
  edition: WLC
  text: וַ/יֹּ֥אמֶר יִרְמְיָ֖הוּ לֹ֣א יִתֵּ֑נוּ שְֽׁמַֽע נָ֣א בְּ/ק֣וֹל יְהוָ֗ה לַ/אֲשֶׁ֤ר אֲנִי֙ דֹּבֵ֣ר אֵלֶ֔י/ךָ וְ/יִ֥יטַב לְ/ךָ֖ וּ/תְחִ֥י נַפְשֶֽׁ/ךָ־׀׃
translation:
  text: Jeremiah said, “They will not hand you over. Please listen to the voice of Yahweh in what I am speaking to you, and it will go well with you, and your life will live.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'They will not give you over.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew, 'listen to the voice of the LORD,' an idiom meaning to heed what the LORD says.
    reason: lexical_alternative
  - marker: c
    text: Hebrew, 'and your soul/life will live.' Here 'life' refers to physical preservation.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא יִתֵּנוּ
  chosen: They will not hand you over
  alternatives:
  - They will not give you over
  - You will not be handed over
  lexicon: HALOT
  rationale: The 3mp verb 'they will give' has an implied object from context (the king being surrendered to the Chaldeans). 'Hand you over' is idiomatic modern English that preserves the sense of being delivered into another's power better than the more wooden 'give you over'.
- source_word: שְׁמַע נָא
  chosen: Please listen
  alternatives:
  - Please hear
  - Listen, please
  lexicon: HALOT
  rationale: Imperative of שׁמע with particle נָא expresses an earnest plea. 'Please listen' captures both the imperative and the politeness/urgency of נָא in natural English.
- source_word: בְּקוֹל יְהוָה
  chosen: to the voice of the LORD
  alternatives:
  - to the LORD's voice
  - to the LORD
  lexicon: HALOT
  rationale: The idiom 'listen to the voice of' is common in Hebrew and should be preserved rather than flattened to merely 'obey,' since the wording emphasizes hearing and heeding divine speech. YHWH is rendered 'the LORD' per doctrine.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לַאֲשֶׁר אֲנִי דֹּבֵר אֵלֶיךָ
  chosen: in what I am speaking to you
  alternatives:
  - according to what I am saying to you
  - as to what I am speaking to you
  lexicon: HALOT
  rationale: The phrase links Jeremiah's speech to the LORD's voice. 'In what I am speaking to you' keeps the close connection without overparaphrasing into a pure command to obey Jeremiah personally.
- source_word: וְיִיטַב לְךָ
  chosen: so that it may go well with you
  alternatives:
  - and it will be well for you
  - that it may be well with you
  lexicon: HALOT
  rationale: This is a standard Hebrew expression for favorable outcome. 'It may go well with you' is clear modern English and preserves the result clause nuance after the imperative.
- source_word: וּתְחִי נַפְשֶׁךָ
  chosen: and your life may be spared
  alternatives:
  - and your soul may live
  - and you may stay alive
  lexicon: HALOT
  rationale: נֶפֶשׁ here refers to the person's life, not specifically the immaterial soul. 'Your life may be spared' communicates the idiom naturally in this life-or-death context while preserving the concrete sense.
