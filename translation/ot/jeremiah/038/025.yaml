id: JER.38.25
reference: Jeremiah 38:25
source:
  edition: WLC
  text: וְ/כִֽי יִשְׁמְע֣וּ הַ/שָּׂרִים֮ כִּֽי דִבַּ֣רְתִּי אִתָּ/ךְ֒ וּ/בָ֣אוּ אֵלֶ֣י/ךָ
    וְֽ/אָמְר֪וּ אֵלֶ֟י/ךָ הַגִּֽידָ/ה נָּ֨א לָ֜/נוּ מַה דִּבַּ֧רְתָּ אֶל הַ/מֶּ֛לֶךְ
    אַל תְּכַחֵ֥ד מִמֶּ֖/נּוּ וְ/לֹ֣א נְמִיתֶ֑/ךָ וּ/מַה דִּבֶּ֥ר אֵלֶ֖י/ךָ הַ/מֶּֽלֶךְ־־־־־־־׃
translation:
  text: But if the officials hear that I have spoken with you, and they come to you
    and say to you, ‘Please tell us what you said to the king; do not hide it from
    us, and we will not put you to death—and what the king said to you,’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the princes,' referring to the royal or governing leaders.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: But if
  alternatives:
  - And if
  - Now if
  lexicon: HALOT
  rationale: The conjunction plus כי introduces a conditional scenario continuing
    the previous instruction. 'But if' captures both continuity and the slight adversative/contingent
    force in context.
- source_word: הַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the commanders
  lexicon: HALOT
  rationale: שָׂרִים refers to ruling officials/court leaders here, not necessarily
    royal sons ('princes'). 'Officials' is clear modern English and fits the Judean
    court context.
- source_word: דִבַּרְתִּי אִתָּךְ
  chosen: I have spoken with you
  alternatives:
  - I spoke with you
  - I talked with you
  lexicon: HALOT
  rationale: The perfect can be rendered with English present perfect in this conditional
    setting to reflect a completed conversation with present relevance.
- source_word: וּבָאוּ אֵלֶיךָ
  chosen: and they come to you
  alternatives:
  - and they will come to you
  lexicon: HALOT
  rationale: Hebrew wayyiqtol in this conditional sequence can be represented naturally
    in English as present/future within the protasis-apodosis flow. 'Come to you'
    is the plain sense.
- source_word: הַגִּידָה נָּא לָנוּ
  chosen: Please tell us
  alternatives:
  - Please declare to us
  - Do tell us
  lexicon: HALOT
  rationale: The imperative of נגד with particle נָא is a polite but urgent request.
    'Please tell us' is natural modern English without losing the request force.
- source_word: מַה דִּבַּרְתָּ אֶל־הַמֶּלֶךְ
  chosen: what you said to the king
  alternatives:
  - what you spoke to the king
  lexicon: HALOT
  rationale: English idiom prefers 'said to' rather than 'spoke to' when introducing
    reported content.
- source_word: אַל־תְּכַחֵד מִמֶּנּוּ
  chosen: do not hide it from us
  alternatives:
  - do not conceal it from us
  - do not withhold it from us
  lexicon: HALOT
  rationale: כחד here means conceal or hide. The object is implied from the prior
    clause, so 'it' is supplied naturally in English.
- source_word: וְלֹא נְמִיתֶךָ
  chosen: and we will not put you to death
  alternatives:
  - and we will not kill you
  lexicon: HALOT
  rationale: The Hiphil of מות is causative, literally 'cause you to die.' 'Put you
    to death' is the most precise and idiomatic rendering in this judicial-threat
    context.
- source_word: וּמַה דִּבֶּר אֵלֶיךָ הַמֶּלֶךְ
  chosen: and what the king said to you
  alternatives:
  - and what the king spoke to you
  lexicon: HALOT
  rationale: This final phrase completes the officials' quoted demand. It is rendered
    as an appended request coordinated with the previous question.
