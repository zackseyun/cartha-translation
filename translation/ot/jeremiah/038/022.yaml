id: JER.38.22
reference: Jeremiah 38:22
source:
  edition: WLC
  text: וְ/הִנֵּ֣ה כָל הַ/נָּשִׁ֗ים אֲשֶׁ֤ר נִשְׁאֲרוּ֙ בְּ/בֵ֣ית מֶֽלֶךְ יְהוּדָ֔ה
    מוּצָא֕וֹת אֶל שָׂרֵ֖י מֶ֣לֶךְ בָּבֶ֑ל וְ/הֵ֣נָּה אֹמְר֗וֹת הִסִּית֜וּ/ךָ וְ/יָכְל֤וּ
    לְ/ךָ֙ אַנְשֵׁ֣י שְׁלֹמֶ֔/ךָ הָטְבְּע֥וּ בַ/בֹּ֛ץ רַגְלֶ֖/ךָ נָסֹ֥גוּ אָחֽוֹר־־־׃
translation:
  text: And behold, all the women who remain in the house of the king of Judah are
    being brought out to the officials of the king of Babylon, and they are saying,
    ‘The men at peace with you have misled you and overcome you; your feet have sunk
    into the mud; they have turned back.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the men of your peace,'' an idiom for those on friendly terms
      with you, that is, your allies or close associates.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your feet have sunk into the mire.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Retains the deictic, attention-directing force of the Hebrew discourse
    marker. 'Behold' is slightly formal but still transparent and preserves the prophetic
    vividness better than omitting it.
- source_word: נִשְׁאֲרוּ
  chosen: remain
  alternatives:
  - are left
  - have been left
  lexicon: HALOT
  rationale: The Niphal of שׁאר denotes those left behind or remaining. Present 'remain'
    works naturally in English within the reported scene while preserving the sense
    of those still in the palace.
- source_word: מוּצָאוֹת
  chosen: are being brought out
  alternatives:
  - are led out
  - will be brought out
  lexicon: HALOT
  rationale: 'Hophal participle of יצא conveys causative passive: the women are being
    caused to go out. ''Are being brought out'' best reflects that passive-causative
    nuance. A future sense is possible in context, but the participial form in this
    vivid report is well represented by the English progressive.'
- source_word: שָׂרֵי מֶלֶךְ בָּבֶל
  chosen: the officials of the king of Babylon
  alternatives:
  - the princes of the king of Babylon
  - the officers of the king of Babylon
  lexicon: HALOT
  rationale: שָׂרִים can mean officials, princes, or officers. 'Officials' is broad
    and idiomatic, fitting court functionaries without over-specifying nobility or
    military rank.
- source_word: הִסִּיתוּךָ
  chosen: have misled you
  alternatives:
  - have incited you
  - have deceived you
  - have enticed you
  lexicon: HALOT
  rationale: The Hiphil of סות carries the sense of instigating, enticing, or misleading
    someone. In this political context, 'have misled you' captures wrongful persuasion
    without narrowing it to rebellion alone.
- source_word: וְיָכְלוּ לְךָ
  chosen: and overcome you
  alternatives:
  - and prevailed against you
  - and have gotten the better of you
  lexicon: HALOT
  rationale: יכל + ל can express prevailing over someone. 'Overcome you' is concise,
    natural English and preserves the adversative force.
- source_word: אַנְשֵׁי שְׁלֹמֶךָ
  chosen: The men at peace with you
  alternatives:
  - your friends
  - your trusted men
  - the men of your peace
  lexicon: HALOT
  rationale: Literally 'men of your peace,' an idiom for allies or close associates.
    The more literal 'men at peace with you' preserves the Hebrew imagery and allows
    readers to sense the idiom; a smoother alternative is preserved in a footnote.
- source_word: הָטְבְּעוּ בַבֹּץ רַגְלֶךָ
  chosen: your feet have sunk into the mud
  alternatives:
  - they have made your feet sink into the mire
  - your feet are sunk in the mire
  lexicon: HALOT
  rationale: The clause is idiomatic and likely poetic within the women's taunt. Rendering
    the image directly preserves the metaphor of helpless entrapment. 'Mud' is more
    accessible than 'mire' in main text.
- source_word: נָסֹגוּ אָחוֹר
  chosen: they have turned back
  alternatives:
  - they have retreated
  - they have drawn back
  lexicon: HALOT
  rationale: Refers to the supposed allies withdrawing after the king is trapped.
    'Turned back' is straightforward and preserves the directional imagery of the
    Hebrew.
