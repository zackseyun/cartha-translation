id: JER.38.19
reference: Jeremiah 38:19
source:
  edition: WLC
  text: וַ/יֹּ֛אמֶר הַ/מֶּ֥לֶךְ צִדְקִיָּ֖הוּ אֶֽל יִרְמְיָ֑הוּ אֲנִ֧י דֹאֵ֣ג אֶת
    הַ/יְּהוּדִ֗ים אֲשֶׁ֤ר נָֽפְלוּ֙ אֶל הַ/כַּשְׂדִּ֔ים פֶּֽן יִתְּנ֥וּ אֹתִ֛/י בְּ/יָדָ֖/ם
    וְ/הִתְעַלְּלוּ בִֽ/י־־־־־׃פ
translation:
  text: Then King Zedekiah said to Jeremiah, “I am afraid of the Judeans who have
    defected to the Chaldeans, lest they hand me over to them and they abuse me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Jews.” The Hebrew term here refers specifically to people of Judah
      in this historical setting, so “Judeans” is used for precision.
    reason: lexical_alternative
  - marker: b
    text: Or “have gone over to” or “have surrendered to.”
    reason: lexical_alternative
  - marker: c
    text: 'Or “the Babylonians.” Hebrew: “the Chaldeans.”'
    reason: lexical_alternative
  - marker: d
    text: Literally “give me into their hand.”
    reason: lexical_alternative
  - marker: e
    text: Or “mistreat me” or “deal cruelly with me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: דֹאֵג
  chosen: am afraid
  alternatives:
  - am anxious
  - am worried
  lexicon: HALOT
  rationale: In context Zedekiah expresses fear about what may happen if he surrenders.
    'Am afraid' communicates the emotional force more naturally in English than the
    more wooden 'am anxious' or 'am worried.'
- source_word: הַיְּהוּדִים
  chosen: the Judeans
  alternatives:
  - the Jews
  lexicon: HALOT
  rationale: In Jeremiah's historical setting, the term refers to people of Judah
    rather than later broader ethnic-religious usage. 'Judeans' is more historically
    precise and avoids anachronistic associations.
- source_word: נָפְלוּ אֶל
  chosen: have defected to
  alternatives:
  - have fallen away to
  - have gone over to
  - have surrendered to
  lexicon: HALOT
  rationale: The idiom 'fall to' in military-political context means to go over to
    the opposing side. 'Have defected to' captures the sense clearly in modern English.
- source_word: הַכַּשְׂדִּים
  chosen: the Chaldeans
  alternatives:
  - the Babylonians
  lexicon: HALOT
  rationale: The Hebrew specifically says 'Chaldeans.' This is the standard biblical
    designation in Jeremiah for the Neo-Babylonian forces, so retaining it preserves
    source-text specificity.
- source_word: פֶּן
  chosen: lest
  alternatives:
  - or else
  - for fear that
  lexicon: HALOT
  rationale: '''Lest'' neatly conveys the purpose/fear nuance introducing the feared
    outcome. It is slightly formal but still clear and concise here.'
- source_word: יִתְּנוּ אֹתִי בְּיָדָם
  chosen: they hand me over to them
  alternatives:
  - they give me into their hand
  - they deliver me into their power
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'give me into their hand.' Since the antecedent
    shifts from the defected Judeans to the Chaldeans, 'hand me over to them' best
    captures the relational sense in natural English.
- source_word: וְהִתְעַלְּלוּ בִי
  chosen: and they abuse me
  alternatives:
  - and they mistreat me
  - and they deal cruelly with me
  - and they make sport of me
  lexicon: HALOT
  rationale: The hitpael of עלל here conveys abusive or cruel treatment. 'Abuse me'
    is concise and strong without over-specifying the form of mistreatment. 'Mock
    me' would be too narrow.
