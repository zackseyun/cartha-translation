id: JER.38.9
reference: Jeremiah 38:9
source:
  edition: WLC
  text: אֲדֹנִ֣/י הַ/מֶּ֗לֶךְ הֵרֵ֜עוּ הָ/אֲנָשִׁ֤ים הָ/אֵ֨לֶּה֙ אֵ֣ת כָּל אֲשֶׁ֤ר
    עָשׂוּ֙ לְ/יִרְמְיָ֣הוּ הַ/נָּבִ֔יא אֵ֥ת אֲשֶׁר הִשְׁלִ֖יכוּ אֶל הַ/בּ֑וֹר וַ/יָּ֤מָת
    תַּחְתָּי/ו֙ מִ/פְּנֵ֣י הָֽ/רָעָ֔ב כִּ֣י אֵ֥ין הַ/לֶּ֛חֶם ע֖וֹד בָּ/עִֽיר־־־׃
translation:
  text: My lord the king, these men have done evil in all that they did to Jeremiah
    the prophet, whom they threw into the cistern, and he will die there because of
    the famine, for there is no bread left in the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'pit.' The Hebrew bor can denote a pit, dungeon, or cistern; here 'cistern'
      fits the immediate context best.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי הַמֶּלֶךְ
  chosen: My lord the king
  alternatives:
  - My lord, O king
  - My master the king
  lexicon: HALOT
  rationale: A respectful court address. 'My lord the king' is natural English and
    preserves both the possessive honorific and the royal title.
- source_word: הֵרֵעוּ
  chosen: have done evil
  alternatives:
  - have acted wickedly
  - have done wrong
  lexicon: HALOT
  rationale: Hiphil of רעע here conveys acting badly/wickedly. 'Have done evil' preserves
    the moral force better than the milder 'have done wrong'.
- source_word: הָאֲנָשִׁים הָאֵלֶּה
  chosen: these men
  alternatives:
  - these people
  lexicon: HALOT
  rationale: The Hebrew is specifically masculine plural 'men,' not a generic 'people.'
    This follows the gender-accurate principle.
- source_word: אֵת כָּל אֲשֶׁר עָשׂוּ לְיִרְמְיָהוּ
  chosen: in all that they did to Jeremiah
  alternatives:
  - by all that they did to Jeremiah
  - in everything they did to Jeremiah
  lexicon: HALOT
  rationale: This construction summarizes the totality of their mistreatment. 'In
    all that they did to Jeremiah' is idiomatic and keeps the comprehensive force
    of כָּל אֲשֶׁר.
- source_word: הַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: A straightforward title identifying Jeremiah's office; retained in translation
    for clarity and emphasis.
- source_word: הִשְׁלִיכוּ אֶל הַבּוֹר
  chosen: threw into the cistern
  alternatives:
  - cast into the pit
  - threw into the pit
  lexicon: HALOT
  rationale: בּוֹר can mean pit, dungeon, or cistern depending on context. Here the
    narrative context is a water-storage pit with mud at the bottom, so 'cistern'
    is the most precise rendering.
- source_word: וַיָּמָת
  chosen: he will die
  alternatives:
  - and he is dying
  - and he died
  lexicon: HALOT
  rationale: 'Though formally a wayyiqtol, in context Ebed-melech is warning of the
    likely outcome if Jeremiah remains there. English future best captures the pragmatic
    sense: he is as good as dead if nothing is done.'
- source_word: תַּחְתָּיו
  chosen: there
  alternatives:
  - in that place
  - where he is
  - under him
  lexicon: HALOT
  rationale: The preposition literally means 'under/beneath him/it,' but in this idiom
    it refers to remaining in the place where he has been put. 'There' gives the intended
    sense in natural English.
- source_word: מִפְּנֵי הָרָעָב
  chosen: because of the famine
  alternatives:
  - from hunger
  - because of hunger
  lexicon: HALOT
  rationale: The phrase points to the famine conditions in the besieged city, not
    merely Jeremiah's personal hunger. 'Because of the famine' preserves the broader
    situational cause.
- source_word: כִּי אֵין הַלֶּחֶם עוֹד בָּעִיר
  chosen: for there is no bread left in the city
  alternatives:
  - for there is no longer any bread in the city
  - because there is no bread anymore in the city
  lexicon: HALOT
  rationale: לֶחֶם is literally 'bread,' which here stands for food supply in general,
    but 'bread' should be retained because the Hebrew uses it concretely. 'Left' naturally
    conveys עוֹד in this context.
