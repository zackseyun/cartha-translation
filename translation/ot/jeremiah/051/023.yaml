id: JER.51.23
reference: Jeremiah 51:23
source:
  edition: WLC
  text: וְ/נִפַּצְתִּ֤י בְ/ךָ֙ רֹעֶ֣ה וְ/עֶדְר֔/וֹ וְ/נִפַּצְתִּ֥י בְ/ךָ֖ אִכָּ֣ר
    וְ/צִמְדּ֑/וֹ וְ/נִפַּצְתִּ֣י בְ/ךָ֔ פַּח֖וֹת וּ/סְגָנִֽים׃
translation:
  text: And with you I shattered the shepherd and his flock; and with you I shattered
    the farmer and his team; and with you I shattered governors and deputies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I broke in pieces' for the repeated verb 'I shattered.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his yoke' or 'his pair' for 'his team,' referring to a yoked pair used
      in farming.
    reason: lexical_alternative
  - marker: c
    text: Or 'officials' for 'deputies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִפַּצְתִּי
  chosen: I shattered
  alternatives:
  - I broke in pieces
  - I smashed
  lexicon: HALOT
  rationale: The verb נָפַץ in this repeated judgment formula conveys violent breaking
    or smashing. 'I shattered' is vivid, natural English and preserves the force without
    sounding archaic. The repetition is retained each time to match the Hebrew cadence.
- source_word: בְּךָ
  chosen: with you
  alternatives:
  - by you
  - through you
  lexicon: HALOT
  rationale: 'The preposition ב here marks instrumentality: Babylon is the instrument
    by which others are shattered in the larger context. ''With you'' is a natural
    rendering that preserves that instrumental sense and matches the repeated structure.'
- source_word: רֹעֶה
  chosen: the shepherd
  alternatives:
  - shepherd
  - pastor
  lexicon: HALOT
  rationale: The ordinary sense is a literal shepherd in this list of social roles
    and pairings. 'Pastor' would import later ecclesial associations not present in
    the Hebrew.
- source_word: עֶדְרוֹ
  chosen: his flock
  alternatives:
  - his herd
  lexicon: HALOT
  rationale: עֵדֶר commonly denotes a flock/herd. With 'shepherd,' 'flock' is the
    most idiomatic and contextually fitting pairing in English.
- source_word: אִכָּר
  chosen: the farmer
  alternatives:
  - the plowman
  - the husbandman
  lexicon: HALOT
  rationale: The noun denotes a cultivator of the soil. 'Farmer' is clear modern English;
    'plowman' is narrower and 'husbandman' archaic.
- source_word: צִמְדּוֹ
  chosen: his team
  alternatives:
  - his yoke
  - his pair
  lexicon: HALOT
  rationale: The noun can refer to a pair/yoke, especially a yoked team of animals.
    'His team' communicates the agricultural pairing naturally in modern English,
    while 'yoke' could be misunderstood as the wooden implement rather than the draft
    pair.
- source_word: פַּחוֹת
  chosen: governors
  alternatives:
  - provincial governors
  - officials
  lexicon: HALOT
  rationale: פַּחָה refers to a governor or provincial ruler. 'Governors' is the standard
    concise rendering and fits the administrative list.
- source_word: סְגָנִים
  chosen: deputies
  alternatives:
  - officials
  - prefects
  - rulers
  lexicon: HALOT
  rationale: The term denotes subordinate officials or deputies. 'Deputies' preserves
    the sense of secondary rank alongside 'governors' without over-specifying an ancient
    office.
