theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of divine judgment in אֵל גְּמֻלוֹת
  chosen_reading: a God of recompense
  alternative_readings:
  - a God of vengeance
  - a God of retributions
  rationale: The phrase presents the LORD as one who repays justly. 'Recompense' preserves the judicial and moral sense of repayment without overstating one theological nuance beyond the Hebrew term itself.
