theological_decisions:
- issue: Concessive vs. causal force of the second כִּי
  chosen_reading: concessive ('though their land is full of guilt')
  alternative_readings:
  - causal ('for their land is full of guilt')
  rationale: 'A causal rendering would suggest that the people''s guilt explains why they are not widowed from God, which is contextually awkward. The verse more naturally contrasts God''s continuing covenant relation with Judah''s real guilt. This preserves the theological tension in the text: divine faithfulness alongside human culpability.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
