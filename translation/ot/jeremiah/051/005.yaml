id: JER.51.5
reference: Jeremiah 51:5
source:
  edition: WLC
  text: כִּ֠י לֹֽא אַלְמָ֨ן יִשְׂרָאֵ֤ל וִֽ/יהוּדָה֙ מֵֽ/אֱלֹהָ֔י/ו מֵֽ/יְהוָ֖ה צְבָא֑וֹת כִּ֤י אַרְצָ/ם֙ מָלְאָ֣ה אָשָׁ֔ם מִ/קְּד֖וֹשׁ יִשְׂרָאֵֽל־׃
translation:
  text: For Israel and Judah are not widowed from their God, from Yahweh of Armies, though their land is full of guilt against the Holy One of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'against the Holy One of Israel.' The Hebrew preposition can be understood in more than one way here.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''the LORD of Hosts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אַלְמָן
  chosen: widowed
  alternatives:
  - bereft
  - a widow
  - forsaken
  lexicon: HALOT
  rationale: The adjective/noun literally denotes being widowed or bereaved of a husband. With Israel and Judah as collective entities, 'are not widowed' preserves the metaphor that they have not been abandoned by their covenant God. 'Forsaken' is interpretive and weakens the marital imagery.
- source_word: מֵאֱלֹהָיו מֵיְהוָה צְבָאוֹת
  chosen: from their God, from the LORD of Armies
  alternatives:
  - by their God, by the LORD of Hosts
  - from his God, from the LORD of Hosts
  lexicon: HALOT
  rationale: 'The repeated מִן after ''widowed'' marks separation: not widowed from God. The suffix on ''his God'' is singular in form, but with the compound subject Israel and Judah, English idiom naturally uses ''their God.'' Per doctrine, YHWH is rendered ''the LORD.'' ''Armies'' translates צבאות accessibly while preserving the martial/cosmic sense better than the more traditional but less transparent ''Hosts.'''
- source_word: כִּי
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: The opening conjunction grounds the preceding call to flee Babylon with a reason. 'For' best preserves the explanatory force.
- source_word: כִּי
  chosen: though
  alternatives:
  - for
  - because
  - indeed
  lexicon: HALOT
  rationale: 'The second כִּי introduces a concessive sense in context: despite Judah''s guilt, Israel/Judah are not abandoned by God. Rendering it ''though'' captures the discourse relationship in natural English.'
- source_word: אַרְצָם
  chosen: their land
  alternatives:
  - their country
  lexicon: HALOT
  rationale: '''Land'' is the standard and biblically resonant rendering for אֶרֶץ here, referring to the territory of Israel/Judah.'
- source_word: מָלְאָה אָשָׁם
  chosen: is full of guilt
  alternatives:
  - is full of guilt-offering
  - is full of trespass
  - is full of punishment
  lexicon: HALOT
  rationale: אָשָׁם can denote guilt, guilt-offering, or liability. Here the abstract sense 'guilt' fits the moral condition of the land. 'Guilt-offering' is contextually unsuitable, and 'punishment' shifts from culpability to consequence.
- source_word: מִקְּדֹשׁ יִשְׂרָאֵל
  chosen: before the Holy One of Israel
  alternatives:
  - against the Holy One of Israel
  - from the Holy One of Israel
  lexicon: HALOT
  rationale: The preposition מִן after מלא can mark relation or reference. In this context the land is full of guilt in relation to the Holy One of Israel. 'Before' communicates accountability in idiomatic English without over-specifying hostility. 'Against' is possible and is preserved in a footnote.
- source_word: קְדוֹשׁ יִשְׂרָאֵל
  chosen: the Holy One of Israel
  lexicon: HALOT
  rationale: This is a fixed prophetic title for God and should be rendered consistently and transparently.
