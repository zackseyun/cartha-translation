id: JER.51.55
reference: Jeremiah 51:55
source:
  edition: WLC
  text: כִּֽי שֹׁדֵ֤ד יְהוָה֙ אֶת בָּבֶ֔ל וְ/אִבַּ֥ד מִמֶּ֖/נָּה ק֣וֹל גָּד֑וֹל וְ/הָמ֤וּ גַלֵּי/הֶם֙ כְּ/מַ֣יִם רַבִּ֔ים נִתַּ֥ן שְׁא֖וֹן קוֹלָֽ/ם־־׃
translation:
  text: For Yahweh is devastating Babylon and destroying from her the great sound. Their waves roar like many waters; the noise of their voice is given.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their waves surge like mighty waters'; the Hebrew imagery may describe the tumult of Babylon's attackers as sea-like waves.
    reason: lexical_alternative
  - marker: b
    text: Or 'the roar of their voice is raised.' The Hebrew literally says 'the noise of their voice is given,' an idiom for a loud sound being produced.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁדֵד
  chosen: is devastating
  alternatives:
  - is plundering
  - is destroying
  - devastates
  lexicon: HALOT
  rationale: The participle conveys ongoing or imminent action. 'Devastating' captures the force of שׁדד in judgment against a city more naturally than the narrower 'plundering,' while preserving the active sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְאִבַּד
  chosen: and destroying
  alternatives:
  - and has destroyed
  - and will destroy
  - and putting an end to
  lexicon: HALOT
  rationale: The perfect following the participle is rendered in coordination with the ongoing judgment scene. 'Destroying' keeps the English flow and reflects the parallel action against Babylon.
- source_word: מִמֶּנָּה
  chosen: from her
  alternatives:
  - from it
  - out of her
  lexicon: HALOT
  rationale: Babylon is grammatically feminine in Hebrew; 'her' preserves the personified-city imagery better than the neuter 'it'.
- source_word: קוֹל גָּדוֹל
  chosen: the great sound
  alternatives:
  - the loud noise
  - the great voice
  - the mighty sound
  lexicon: HALOT
  rationale: קוֹל can mean sound, noise, or voice. Here it refers broadly to Babylon's loud urban tumult, so 'the great sound' preserves the lexical link without over-specifying speech.
- source_word: וְהָמוּ
  chosen: roar
  alternatives:
  - surge
  - pound
  - make a tumult
  lexicon: HALOT
  rationale: The verb denotes loud, tumultuous motion. With 'waves' as subject, 'roar' is idiomatic and preserves the auditory imagery.
- source_word: גַלֵּיהֶם
  chosen: their waves
  alternatives:
  - her waves
  lexicon: HALOT
  rationale: The Hebrew form is plural with 3mp suffix, so 'their waves' follows the consonantal text directly, likely referring to Babylon's attackers or the tumult associated with them. 'Her waves' would smooth the imagery toward Babylon but is less textually direct.
- source_word: כְּמַיִם רַבִּים
  chosen: like many waters
  alternatives:
  - like great waters
  - like abundant waters
  lexicon: HALOT
  rationale: This is a common Hebrew simile for overwhelming, thunderous force. 'Many waters' is a standard and transparent rendering.
- source_word: נִתַּן
  chosen: is given
  alternatives:
  - is raised
  - is set forth
  - goes forth
  lexicon: HALOT
  rationale: The passive of נתן is somewhat idiomatic here. 'Is given' is formally close to the Hebrew, though the sense is that a sound is produced or raised.
- source_word: שְׁאוֹן קוֹלָם
  chosen: the noise of their voice
  alternatives:
  - the roar of their sound
  - the tumult of their voice
  - the din of their noise
  lexicon: HALOT
  rationale: שְׁאוֹן denotes tumult, din, or roar. 'The noise of their voice' preserves the Hebrew collocation and the auditory emphasis, even if slightly taut in English.
