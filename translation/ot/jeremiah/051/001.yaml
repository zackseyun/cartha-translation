id: JER.51.1
reference: Jeremiah 51:1
source:
  edition: WLC
  text: כֹּ֚ה אָמַ֣ר יְהוָ֔ה הִנְ/נִי֙ מֵעִ֣יר עַל בָּבֶ֔ל וְ/אֶל יֹשְׁבֵ֖י לֵ֣ב קָמָ֑י ר֖וּחַ מַשְׁחִֽית־־׃
translation:
  text: 'Thus says Yahweh: Behold, I am stirring up against Babylon, and against the inhabitants of Leb-kamai, a destroying wind.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Leb-kamai is likely a coded name (an atbash cipher) for Chaldea/Babylon; alternatively, the phrase could be understood more literally as 'the heart of my adversaries.'
    reason: alternative_reading
  - marker: b
    text: Or 'a destroying spirit'; the Hebrew word can mean 'wind,' 'spirit,' or 'breath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional small-caps covenantal form rather than transliteration.
- source_word: הִנְנִי
  chosen: Behold, I am
  alternatives:
  - Look, I am
  - See, I am
  lexicon: HALOT
  rationale: The particle-plus-pronominal form is an attention-getting declaration of imminent action. 'Behold' preserves the prophetic register and the force of divine announcement.
- source_word: מֵעִיר
  chosen: stirring up
  alternatives:
  - rousing
  - awakening
  - arousing
  lexicon: HALOT
  rationale: Hiphil participle of עור here conveys inciting or setting in motion. 'Stirring up' is idiomatic in English and fits the context of raising an agent of judgment.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - over
  lexicon: HALOT
  rationale: In this judgment context, the preposition marks hostile direction rather than mere location; 'against' best conveys the adversative force.
- source_word: בָּבֶל
  chosen: Babylon
  lexicon: HALOT
  rationale: Standard English transliteration of the place name.
- source_word: יֹשְׁבֵי
  chosen: the inhabitants of
  alternatives:
  - those who dwell in
  - the dwellers of
  lexicon: HALOT
  rationale: The participial form denotes those dwelling in a place. 'Inhabitants of' is natural English and preserves the collective sense.
- source_word: לֵב קָמָי
  chosen: Leb-kamai
  alternatives:
  - the heart of my adversaries
  lexicon: HALOT
  rationale: This expression is widely understood as an atbash cipher for 'Chaldea' rather than a transparent common-noun phrase. Because the form functions here as a coded place name parallel to Babylon, transliteration best preserves the source-text feature, while the interpretive alternative is preserved in a footnote.
- source_word: רוּחַ
  chosen: wind
  alternatives:
  - spirit
  - breath
  lexicon: HALOT
  rationale: In combination with 'destroying' and in the context of judgment against Babylon, 'wind' best fits the imagery of an agent sent to devastate. The broader semantic range is noted in a footnote because 'spirit' is also lexically possible.
- source_word: מַשְׁחִית
  chosen: destroying
  alternatives:
  - destroyer
  - destructive
  lexicon: HALOT
  rationale: As a Hiphil participle modifying רוּחַ, it describes the wind by its destructive effect. 'Destroying wind' is idiomatic and preserves the active force.
