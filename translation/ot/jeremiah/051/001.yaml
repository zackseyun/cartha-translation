theological_decisions:
- issue: Whether רוּחַ should be rendered with a more personal or spiritual sense
  chosen_reading: wind
  alternative_readings:
  - spirit
  rationale: The verse depicts the LORD raising an instrument of judgment against Babylon. In this immediate context, meteorological/judgment imagery is more natural than a direct reference to a personal spirit-being, so 'wind' is preferred while preserving 'spirit' as a lexical alternative.
  doctrine_reference: Preserve theological tension rather than resolve it; document ambiguity where genuine.
