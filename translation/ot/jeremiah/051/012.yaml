id: JER.51.12
reference: Jeremiah 51:12
source:
  edition: WLC
  text: אֶל חוֹמֹ֨ת בָּבֶ֜ל שְׂאוּ נֵ֗ס הַחֲזִ֨יקוּ֙ הַ/מִּשְׁמָ֔ר הָקִ֨ימוּ֙ שֹֽׁמְרִ֔ים הָכִ֖ינוּ הָ/אֹֽרְבִ֑ים כִּ֚י גַּם זָמַ֣ם יְהוָ֔ה גַּם עָשָׂ֕ה אֵ֥ת אֲשֶׁר דִּבֶּ֖ר אֶל יֹשְׁבֵ֥י בָבֶֽל־־־־־־׃
translation:
  text: Against the walls of Babylon, lift up a signal; strengthen the watch; station watchmen; prepare the ambushes. For Yahweh has both planned and done what he spoke against the inhabitants of Babylon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'raise a banner' or 'lift up a standard.' The Hebrew נֵס denotes a raised military signal.
    reason: lexical_alternative
  - marker: b
    text: Or 'prepare the ambushers.' The Hebrew may refer either to the men lying in wait or to the ambush positions.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'what he spoke to the inhabitants of Babylon'; in context this means a word of judgment spoken against them.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל חוֹמֹת בָּבֶל
  chosen: Against the walls of Babylon
  alternatives:
  - To the walls of Babylon
  - At the walls of Babylon
  lexicon: HALOT
  rationale: אֶל normally means 'to/toward,' but with an imperative in military context it can function directionally with hostile force. 'Against the walls of Babylon' best fits the siege/battle setting and natural English.
- source_word: שְׂאוּ נֵס
  chosen: lift up a signal
  alternatives:
  - raise a banner
  - lift up a standard
  lexicon: HALOT
  rationale: נֵס is a raised signal/banner/standard, often military. 'Signal' is slightly broader and readable modern English, while still preserving the idea of a visible military marker.
- source_word: הַחֲזִיקוּ הַמִּשְׁמָר
  chosen: strengthen the watch
  alternatives:
  - make the guard strong
  - hold the watch firmly
  lexicon: HALOT
  rationale: The Hiphil of חזק here means to strengthen or reinforce; מִשְׁמָר is guard/watch. 'Strengthen the watch' is concise and idiomatic in a military command sequence.
- source_word: הָקִימוּ שֹׁמְרִים
  chosen: station watchmen
  alternatives:
  - set up guards
  - appoint watchers
  lexicon: HALOT
  rationale: קום in Hiphil can mean set up/establish; with שֹׁמְרִים the sense is to post guards. 'Station watchmen' captures the military deployment nuance.
- source_word: הָכִינוּ הָאֹרְבִים
  chosen: prepare the ambushes
  alternatives:
  - set the ambushers
  - prepare the ambushers
  lexicon: HALOT
  rationale: The participial form from ארב can denote those lying in ambush or the ambush positions themselves. English more naturally speaks of preparing ambushes in this command context.
- source_word: כִּי גַּם זָמַם יְהוָה
  chosen: For the LORD has both planned
  alternatives:
  - For the LORD has purposed
  - For the LORD has devised
  lexicon: HALOT
  rationale: זמם denotes planning/purposing, often with deliberate intent. 'Planned' is clear modern English; 'both' anticipates the paired גַּם ... גַּם construction.
- source_word: גַּם עָשָׂה
  chosen: and done
  alternatives:
  - and carried out
  - and accomplished
  lexicon: HALOT
  rationale: עשה is broad ('do/make'). In parallel with 'planned,' 'done' preserves the terse Hebrew while implying execution of the plan.
- source_word: אֵת אֲשֶׁר דִּבֶּר אֶל יֹשְׁבֵי בָבֶל
  chosen: what he spoke against the inhabitants of Babylon
  alternatives:
  - what he said concerning the inhabitants of Babylon
  - what he declared to the inhabitants of Babylon
  lexicon: HALOT
  rationale: Although אֶל often means 'to,' in this judgment context English 'against' better conveys hostile prophetic speech directed toward Babylon's residents. 'Inhabitants' is the natural rendering of יֹשְׁבֵי in this idiom.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
