id: JER.51.50
reference: Jeremiah 51:50
source:
  edition: WLC
  text: פְּלֵטִ֣ים מֵ/חֶ֔רֶב הִלְכ֖וּ אַֽל תַּעֲמֹ֑דוּ זִכְר֤וּ מֵֽ/רָחוֹק֙ אֶת יְהוָ֔ה וִ/ירֽוּשָׁלִַ֖ם תַּעֲלֶ֥ה עַל לְבַבְ/כֶֽם־־־׃
translation:
  text: You who have escaped the sword, go; do not stand still. Remember Yahweh from far away, and let Jerusalem come upon your heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from afar remember the LORD, and let Jerusalem come to mind.' The Hebrew literally says 'let Jerusalem go up upon your heart,' an idiom for inward remembrance or concern.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּלֵטִים
  chosen: You who have escaped
  alternatives:
  - survivors
  - escapees
  - those who have escaped
  lexicon: HALOT
  rationale: Plural passive participial form used vocatively/addressively. Rendering as 'You who have escaped' makes the direct address clear in natural English while preserving the sense of those delivered from danger.
- source_word: מֵחֶרֶב
  chosen: the sword
  alternatives:
  - from the sword
  lexicon: HALOT
  rationale: With the preceding participle it denotes escape from deadly violence/warfare. English idiom prefers 'escaped the sword,' though the underlying preposition is reflected in the sense.
- source_word: הִלְכוּ
  chosen: go
  alternatives:
  - walk on
  - depart
  lexicon: HALOT
  rationale: Imperative plural calling for movement away from danger. 'Go' is concise and idiomatic in context.
- source_word: אַל תַּעֲמֹדוּ
  chosen: do not stand still
  alternatives:
  - do not stand
  - do not stop
  lexicon: HALOT
  rationale: The prohibition likely means not to linger or remain in place. 'Do not stand still' captures the practical force better than the more wooden 'do not stand.'
- source_word: זִכְרוּ
  chosen: remember
  alternatives:
  - call to mind
  lexicon: HALOT
  rationale: Straightforward imperative; 'remember' preserves both cognitive and covenantal resonance.
- source_word: מֵרָחוֹק
  chosen: from far away
  alternatives:
  - from afar
  - in a distant land
  lexicon: HALOT
  rationale: Adverbial phrase indicating geographical distance from Jerusalem/Babylon. 'From far away' is clear modern English; 'from afar' is possible but slightly more literary.
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The direct-object marker is not translated separately in English.
- source_word: וִירוּשָׁלִַם
  chosen: Jerusalem
  lexicon: HALOT
  rationale: Proper name transliterated by standard English convention.
- source_word: תַּעֲלֶה עַל לְבַבְכֶם
  chosen: let Jerusalem come upon your heart
  alternatives:
  - let Jerusalem come to mind
  - let Jerusalem arise in your heart
  - take Jerusalem to heart
  lexicon: HALOT
  rationale: Hebrew idiom literally 'go up upon your heart.' The phrase denotes inward remembrance/concern. 'Come upon your heart' preserves the metaphor more closely than 'come to mind,' while remaining understandable. The volitional nuance is represented with 'let.'
