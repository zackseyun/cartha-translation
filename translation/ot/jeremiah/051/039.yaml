theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of שְׁנַת עוֹלָם in a judgment context
  chosen_reading: an everlasting sleep
  alternative_readings:
  - a perpetual sleep
  - death without waking
  rationale: The phrase is retained metaphorically rather than flattened into 'death' so the prophetic imagery and rhetorical force remain visible. This preserves theological tension and poetic texture without importing a more developed doctrinal claim about the afterlife than the text itself states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 Preserve theological tension rather than resolve it'
