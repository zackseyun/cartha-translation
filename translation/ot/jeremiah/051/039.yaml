id: JER.51.39
reference: Jeremiah 51:39
source:
  edition: WLC
  text: בְּ/חֻמָּ֞/ם אָשִׁ֣ית אֶת מִשְׁתֵּי/הֶ֗ם וְ/הִשְׁכַּרְתִּי/ם֙ לְמַ֣עַן יַעֲלֹ֔זוּ וְ/יָשְׁנ֥וּ שְׁנַת עוֹלָ֖ם וְ/לֹ֣א יָקִ֑יצוּ נְאֻ֖ם יְהוָֽה־־׃
translation:
  text: When they are heated, I will set out their drink and make them drunk, so that they may exult and sleep an everlasting sleep and not wake up, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their feast' or 'their banquet' for 'their drink' (מִשְׁתֵּיהֶם); the Hebrew term can denote a drinking feast.
    reason: lexical_alternative
  - marker: b
    text: '''Everlasting sleep'' is a Hebrew metaphor for irreversible death under judgment; literally, ''sleep of perpetuity.'''
    reason: cultural_note
lexical_decisions:
- source_word: בְּחֻמָּם
  chosen: When they are heated
  alternatives:
  - In their heat
  - While they are inflamed
  lexicon: HALOT
  rationale: The phrase uses the preposition ב plus a noun from חֹם/heat with 3mp suffix, yielding a temporal-circumstantial sense. 'When they are heated' captures the likely sense of being inflamed/excited, probably with passion or drunken revelry in context. It avoids over-specifying 'fever' or purely literal temperature.
- source_word: אָשִׁית
  chosen: I will set out
  alternatives:
  - I will place
  - I will set
  lexicon: HALOT
  rationale: From שׂים, a common verb meaning 'put/place/set.' With 'their drink' as object, 'set out' is idiomatic English for preparing drink before them while remaining close to the Hebrew.
- source_word: מִשְׁתֵּיהֶם
  chosen: their drink
  alternatives:
  - their feast
  - their banquet
  lexicon: HALOT
  rationale: מִשְׁתֶּה can denote a drinking feast/banquet, but in this clause the singular collective sense 'their drink' fits naturally with the following 'make them drunk.' 'Feast' is possible, but 'drink' better preserves the immediate wordplay and action.
- source_word: וְהִשְׁכַּרְתִּים
  chosen: and make them drunk
  alternatives:
  - and intoxicate them
  - and get them drunk
  lexicon: HALOT
  rationale: Hiphil of שׁכר means to cause drunkenness. 'Make them drunk' is direct, natural, and preserves divine agency in judgment without colloquial roughness.
- source_word: לְמַעַן
  chosen: so that
  alternatives:
  - in order that
  lexicon: HALOT
  rationale: Standard purposive conjunction. 'So that' is clear modern English.
- source_word: יַעֲלֹזוּ
  chosen: they may exult
  alternatives:
  - they may rejoice
  - they may revel
  lexicon: HALOT
  rationale: The verb conveys jubilant exultation/rejoicing. 'Exult' preserves the elevated tone and may carry ironic force in context before their downfall. 'Revel' is interpretive and narrower.
- source_word: וְיָשְׁנוּ
  chosen: then sleep
  alternatives:
  - and sleep
  lexicon: HALOT
  rationale: 'The waw links the next result in sequence. ''Then sleep'' brings out the progression in English: exultation followed by sleep.'
- source_word: שְׁנַת עוֹלָם
  chosen: an everlasting sleep
  alternatives:
  - a perpetual sleep
  - an eternal sleep
  lexicon: HALOT
  rationale: This idiom denotes irreversible death/judgment. 'Everlasting sleep' is a transparent rendering of the Hebrew construct while preserving the metaphor. 'Eternal sleep' is possible but can sound more idiomatic than textual.
- source_word: וְלֹא יָקִיצוּ
  chosen: and not wake up
  alternatives:
  - and never awake
  - and not awaken
  lexicon: HALOT
  rationale: From קיץ/awake. 'Not wake up' is natural modern English and keeps the metaphor of sleep. 'Never awake' is slightly more interpretive because 'never' is implied by context rather than separately stated.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic and weighty. Per doctrine, יְהוָה is rendered 'the LORD'.
