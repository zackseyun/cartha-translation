id: JER.51.45
reference: Jeremiah 51:45
source:
  edition: WLC
  text: צְא֤וּ מִ/תּוֹכָ/הּ֙ עַמִּ֔/י וּ/מַלְּט֖וּ אִ֣ישׁ אֶת נַפְשׁ֑/וֹ מֵ/חֲר֖וֹן אַף יְהוָֽה־־׃
translation:
  text: Come out from her midst, my people, and let each man save his life from the burning anger of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Go out from her midst, my people, and let each one save himself from the fierce anger of the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צְאוּ
  chosen: Come out
  alternatives:
  - Go out
  - Get out
  lexicon: HALOT
  rationale: Imperative plural of יצא, calling for departure. 'Come out' is idiomatic in English for an urgent summons to leave, and fits prophetic exhortation better than the flatter 'go out.'
- source_word: מִתּוֹכָהּ
  chosen: from her midst
  alternatives:
  - out of her
  - from the midst of her
  lexicon: HALOT
  rationale: The phrase literally means 'from her midst,' with the feminine suffix referring to Babylon in context. Retaining 'her' preserves the personified-city imagery and is more transparent than replacing it with 'Babylon' in the verse itself.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard covenantal address. 'My people' preserves the possessive and theological force of YHWH's claim on the audience.
- source_word: וּמַלְּטוּ
  chosen: and let each man save
  alternatives:
  - and save
  - and escape
  - and deliver
  lexicon: HALOT
  rationale: 'Piel imperative plural from מלט, here with distributive איש following. The construction is naturally rendered as an exhortation to individual self-preservation: ''let each man save...'' rather than a bare plural ''save.'' ''Escape'' is possible, but the direct object ''his life'' favors ''save''.'
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: The noun is grammatically masculine singular with distributive force. Per the gender-accurate policy, 'each man' best reflects the source form and representative sense; more neutral alternatives are possible but less formally aligned.
- source_word: אֶת נַפְשׁוֹ
  chosen: his life
  alternatives:
  - himself
  - his soul
  lexicon: HALOT
  rationale: נפש in this context refers to one's life/self rather than the immaterial soul. 'His life' is the clearest modern English rendering in an escape-from-judgment context.
- source_word: מֵחֲרוֹן אַף
  chosen: from the burning anger
  alternatives:
  - from fierce anger
  - from the heat of anger
  - from wrath
  lexicon: HALOT
  rationale: The idiom combines חרון ('burning, heat') with אף ('anger'). 'Burning anger' preserves the metaphor of heated wrath more fully than the generalized 'wrath' or 'fierce anger.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
