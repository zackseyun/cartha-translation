id: JER.51.26
reference: Jeremiah 51:26
source:
  edition: WLC
  text: וְ/לֹֽא יִקְח֤וּ מִמְּ/ךָ֙ אֶ֣בֶן לְ/פִנָּ֔ה וְ/אֶ֖בֶן לְ/מֽוֹסָד֑וֹת כִּֽי שִׁמְמ֥וֹת עוֹלָ֛ם תִּֽהְיֶ֖ה נְאֻם יְהוָֽה־־־׃
translation:
  text: And they will not take from you a stone for a corner or a stone for foundations, for you will be everlasting desolations, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a cornerstone'; Hebrew literally 'a stone for a corner.'
    reason: lexical_alternative
  - marker: b
    text: Or 'perpetual desolations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקְחוּ
  chosen: they will take
  alternatives:
  - they shall take
  lexicon: HALOT
  rationale: 'Qal imperfect 3mp of לקח, here with negation and future force: ''they will not take.'' Standard English future best fits the prophetic declaration.'
- source_word: מִמְּךָ
  chosen: from you
  alternatives:
  - from you/it
  lexicon: HALOT
  rationale: Second masculine singular suffix refers to Babylon personified/addressed as a singular entity. 'From you' preserves the direct address of the Hebrew.
- source_word: אֶבֶן לְפִנָּה
  chosen: a stone for a corner
  alternatives:
  - a cornerstone
  - a corner stone
  lexicon: HALOT
  rationale: Literally 'a stone for a corner.' This likely denotes a corner/cornerstone stone in building, but the Hebrew expression is slightly less fixed than the English technical term 'cornerstone.' The chosen rendering stays close to the source while remaining natural.
- source_word: וְאֶבֶן לְמוֹסָדוֹת
  chosen: or a stone for foundations
  alternatives:
  - or a foundation stone
  - or a stone for foundation-work
  lexicon: HALOT
  rationale: מוֹסָדוֹת is plural 'foundations.' The phrase contrasts with the previous building stone image. 'A stone for foundations' preserves the plural and the construction imagery.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: 'Introduces the reason for the preceding statement: no building stone will be taken because Babylon is destined for permanent ruin.'
- source_word: שִׁמְמוֹת עוֹלָם
  chosen: everlasting desolations
  alternatives:
  - perpetual desolations
  - desolations forever
  - an everlasting waste
  lexicon: HALOT
  rationale: Plural noun plus עולם expresses enduring ruin. 'Everlasting desolations' is a natural English rendering that preserves both the plural intensity and the permanence.
- source_word: תִּהְיֶה
  chosen: you will become
  alternatives:
  - you will be
  lexicon: HALOT
  rationale: 'Though היה can be rendered simply ''be,'' in this judgment context ''become'' brings out the resultant state implied by the future: Babylon will come to be a permanent desolation.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic modern English and preserves the solemn force. Per doctrine, יְהוָה is rendered 'the LORD'.
