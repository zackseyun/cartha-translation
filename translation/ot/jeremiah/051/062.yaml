id: JER.51.62
reference: Jeremiah 51:62
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֗ יְהוָה֙ אַתָּ֨ה דִבַּ֜רְתָּ אֶל הַ/מָּק֤וֹם הַ/זֶּה֙ לְ/הַכְרִית֔/וֹ לְ/בִלְתִּ֤י הֱיֽוֹת בּ/וֹ֙ יוֹשֵׁ֔ב לְ/מֵ/אָדָ֖ם וְ/עַד בְּהֵמָ֑ה כִּֽי שִׁמְמ֥וֹת עוֹלָ֖ם תִּֽהְיֶֽה־־־־׃
translation:
  text: and say, ‘O Yahweh, you yourself have spoken concerning this place, to cut it off so that no inhabitant will be in it, from man to beast; for it will become everlasting desolations.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to destroy it.' The Hebrew verb literally means 'to cut off' and in this context refers to decisive destruction.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'from man to beast,' a formula meaning total depopulation of both humans and animals.
    reason: cultural_note
  - marker: c
    text: Or 'perpetual desolations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: and say
  alternatives:
  - then say
  - and you shall say
  lexicon: HALOT
  rationale: Qal perfect 2ms with prefixed conjunction in direct-instruction sequence; English idiom renders it as an imperative-like continuation, 'and say,' fitting the narrative command context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אַתָּה
  chosen: you yourself
  alternatives:
  - you
  - you indeed
  lexicon: HALOT
  rationale: The independent pronoun is emphatic alongside the verb 'have spoken'; 'you yourself' preserves the emphasis.
- source_word: דִבַּרְתָּ אֶל
  chosen: have spoken concerning
  alternatives:
  - spoke to
  - have spoken against
  lexicon: HALOT
  rationale: דבר אל literally means 'speak to,' but with 'this place' as object and in a judgment context, English 'spoken concerning' communicates the sense naturally without overinterpreting as hostile 'against'.
- source_word: הַמָּקוֹם הַזֶּה
  chosen: this place
  alternatives:
  - this site
  lexicon: HALOT
  rationale: Standard rendering of מקום with demonstrative; 'place' is natural and sufficiently broad.
- source_word: לְהַכְרִיתוֹ
  chosen: to cut it off
  alternatives:
  - to destroy it
  - to wipe it out
  lexicon: HALOT
  rationale: The Hiphil of כרת often carries the sense 'cut off/destroy.' 'Cut it off' preserves the lexical imagery while remaining intelligible; destruction is clarified by the following clauses.
- source_word: לְבִלְתִּי הֱיוֹת בּוֹ יֹשֵׁב
  chosen: so that no inhabitant will be in it
  alternatives:
  - so that there may be no one dwelling in it
  - so that none may live in it
  lexicon: HALOT
  rationale: 'The construction expresses purpose/result: ''so as not to be in it an inhabitant.'' ''No inhabitant will be in it'' is concise and preserves the nominal participle sense of יֹשֵׁב.'
- source_word: לְמֵאָדָם וְעַד בְּהֵמָה
  chosen: from man to beast
  alternatives:
  - from human to animal
  - from people to cattle
  lexicon: HALOT
  rationale: This idiom marks total depopulation across humans and animals. 'From man to beast' preserves the Hebrew form and the doctrine's gender-accurate preference for אָדָם as 'man' where the source uses the masculine generic.
- source_word: שִׁמְמוֹת עוֹלָם
  chosen: everlasting desolations
  alternatives:
  - perpetual desolations
  - desolations forever
  lexicon: HALOT
  rationale: Plural 'desolations' reflects the Hebrew plural noun; עוֹלָם here denotes enduring/perpetual duration. 'Everlasting desolations' is a natural, weighty rendering.
- source_word: תִּהְיֶה
  chosen: it will become
  alternatives:
  - it will be
  lexicon: HALOT
  rationale: Though היה can be simply 'be,' in English after a predicate noun phrase of result, 'will become' better conveys the future resultant state of the place.
