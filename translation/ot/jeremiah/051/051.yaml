id: JER.51.51
reference: Jeremiah 51:51
source:
  edition: WLC
  text: בֹּ֚שְׁנוּ כִּֽי שָׁמַ֣עְנוּ חֶרְפָּ֔ה כִּסְּתָ֥ה כְלִמָּ֖ה פָּנֵ֑י/נוּ כִּ֚י בָּ֣אוּ זָרִ֔ים עַֽל מִקְדְּשֵׁ֖י בֵּ֥ית יְהוָֽה־־׃ס
translation:
  text: We are ashamed, for we have heard reproach; disgrace has covered our faces, for foreigners have come into the holy places of the house of Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the sanctuaries of the house of the LORD." The Hebrew noun is plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּשְׁנוּ
  chosen: We are ashamed
  alternatives:
  - We are put to shame
  - We are ashamed of ourselves
  lexicon: HALOT
  rationale: Qal perfect 1cp of בוש expresses a present state resulting from shame. 'We are ashamed' is natural English and preserves the communal first-person lament.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the shame. 'For' fits the lament style and links the clauses smoothly.
- source_word: שָׁמַעְנוּ חֶרְפָּה
  chosen: we have heard reproach
  alternatives:
  - we have heard taunting
  - we have heard disgrace
  lexicon: HALOT
  rationale: The collocation is literally 'we have heard reproach/insult.' 'Reproach' preserves the objective sense of public insult or scorn better than a more interpretive rendering.
- source_word: כִּסְּתָה
  chosen: has covered
  alternatives:
  - covered
  - has overwhelmed
  lexicon: HALOT
  rationale: Perfect 3fs from כסה with feminine subject כְלִמָּה. 'Has covered' keeps the metaphor of shame enveloping the people.
- source_word: כְלִמָּה
  chosen: disgrace
  alternatives:
  - shame
  - humiliation
  lexicon: HALOT
  rationale: Used alongside בוש and חֶרְפָּה, this noun adds a second shame-term. 'Disgrace' provides lexical variety in English while preserving the semantic field of public humiliation.
- source_word: פָּנֵינוּ
  chosen: our faces
  alternatives:
  - our face
  - us
  lexicon: HALOT
  rationale: Hebrew idiom literally says 'our faces.' Retaining 'faces' preserves the embodied image of visible shame rather than flattening it to 'us.'
- source_word: בָּאוּ זָרִים
  chosen: foreigners have come
  alternatives:
  - strangers have come
  - outsiders have entered
  lexicon: HALOT
  rationale: זָרִים denotes those who are foreign/unauthorized. 'Foreigners' is the clearest contextual rendering in relation to temple intrusion.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - into
  - over
  lexicon: HALOT
  rationale: With בוא in this hostile context, עַל conveys movement against or upon. 'Against' captures the invasive, hostile force better than a merely spatial gloss.
- source_word: מִקְדְּשֵׁי בֵּית יְהוָה
  chosen: the holy places of the house of the LORD
  alternatives:
  - the sanctuaries of the house of the LORD
  - the sanctuary of the house of the LORD
  lexicon: HALOT
  rationale: The plural construct מִקְדְּשֵׁי is best represented by 'holy places' or 'sanctuaries.' 'Holy places' is more accessible English while preserving the plural form. 'House of the LORD' is the standard rendering for the temple complex.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
