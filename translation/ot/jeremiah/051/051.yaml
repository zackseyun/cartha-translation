  alternative_readings:
  - the sanctuaries of the house of the LORD
  - the sanctuary of the house of the LORD
  rationale: The Hebrew form is plural, likely referring to the sacred precincts/holy areas of the temple complex. Preserving the plural avoids collapsing the wording into a singular abstraction.
