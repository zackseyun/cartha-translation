theological_decisions:
- issue: Meaning of צִדְקֹתֵינוּ in context
  chosen_reading: our vindication
  alternative_readings:
  - our righteousnesses
  - our righteous acts
  - our justice
  rationale: The verse celebrates the LORD's public action on behalf of his people. Rendering the noun as 'vindication' preserves the forensic-relational sense without implying that Israel's own moral achievements are being showcased. This best fits the immediate context of Babylon's fall and Zion's testimony.
  doctrine_reference: Translation philosophy §3, §5; Contested terms table notes righteousness/justice tension by analogy for δικαιοσύνη, encouraging preservation of lexical tension where relevant.
