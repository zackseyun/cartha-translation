id: JER.51.10
reference: Jeremiah 51:10
source:
  edition: WLC
  text: הוֹצִ֥יא יְהוָ֖ה אֶת צִדְקֹתֵ֑י/נוּ בֹּ֚אוּ וּ/נְסַפְּרָ֣ה בְ/צִיּ֔וֹן אֶֽת מַעֲשֵׂ֖ה יְהוָ֥ה אֱלֹהֵֽי/נוּ־־׃
translation:
  text: Yahweh has brought forth our vindication. Come, and let us recount in Zion the work of Yahweh our God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our righteousnesses,' 'our righteous acts,' or 'our justice.' The Hebrew plural can denote acts of righteousness or the public vindication of a cause.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹצִיא
  chosen: has brought forth
  alternatives:
  - has brought out
  - has produced
  - has made manifest
  lexicon: HALOT
  rationale: Hiphil of יצא commonly means to bring out or bring forth. In this context it refers to the LORD making something publicly evident, so 'has brought forth' preserves the concrete Hebrew image while fitting English idiom.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צִדְקֹתֵינוּ
  chosen: our vindication
  alternatives:
  - our righteousnesses
  - our righteous acts
  - our justice
  lexicon: HALOT
  rationale: The plural of צדקה can denote acts or instances of righteousness/justice, but here in context—Babylon judged and God's people delivered—it most naturally refers to the LORD bringing their rightness or cause to light, hence 'our vindication.' 'Our righteousnesses' is too wooden in English and may suggest moral merits rather than public acquittal.
- source_word: בֹּאוּ
  chosen: Come
  alternatives:
  - Come!
  - Go
  lexicon: HALOT
  rationale: Imperative plural inviting the group to gather. 'Come' is the natural English equivalent in this exhortational setting.
- source_word: וּנְסַפְּרָה
  chosen: and let us recount
  alternatives:
  - and let us declare
  - and let us tell
  - and we will recount
  lexicon: HALOT
  rationale: 'Cohortative 1cp from ספר expresses volition: ''let us recount/tell.'' ''Recount'' fits the sense of narrating or declaring God''s deed with some concreteness.'
- source_word: בְצִיּוֹן
  chosen: in Zion
  alternatives:
  - at Zion
  lexicon: HALOT
  rationale: The preposition ב is straightforwardly locative here. 'In Zion' is idiomatic and preserves the covenantal-geographical reference.
- source_word: מַעֲשֵׂה
  chosen: the work
  alternatives:
  - the deed
  - what he has done
  lexicon: HALOT
  rationale: Singular construct meaning deed/work/action. 'The work' is sufficiently formal and leaves open the broad scope of the LORD's act in judging Babylon and delivering his people.
- source_word: אֱלֹהֵינוּ
  chosen: our God
  lexicon: HALOT
  rationale: Standard possessive rendering; it reinforces covenant relationship without requiring expansion.
