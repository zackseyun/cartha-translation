id: JER.51.57
reference: Jeremiah 51:57
source:
  edition: WLC
  text: וְ֠/הִשְׁכַּרְתִּי שָׂרֶ֨י/הָ וַ/חֲכָמֶ֜י/הָ פַּחוֹתֶ֤י/הָ וּ/סְגָנֶ֨י/הָ֙ וְ/גִבּוֹרֶ֔י/הָ וְ/יָשְׁנ֥וּ שְׁנַת עוֹלָ֖ם וְ/לֹ֣א יָקִ֑יצוּ נְאֻ֨ם הַ/מֶּ֔לֶךְ יְהוָ֥ה צְבָא֖וֹת שְׁמֽ/וֹ־־׃ס
translation:
  text: And I will make her officials drunk—her wise men, her governors, her deputies, and her warriors—and they will sleep an everlasting sleep and not wake up, declares the King, whose name is Yahweh of Armies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'satraps' for 'governors' (פַּחוֹתֶיהָ), though the Hebrew more generally denotes administrative governors.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''the LORD of hosts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁכַּרְתִּי
  chosen: I will make ... drunk
  alternatives:
  - I will intoxicate
  - I will make ... drunken
  lexicon: HALOT
  rationale: 'Hiphil of שׁכר here is causative: not merely ''be drunk'' but ''cause to become drunk.'' ''Make ... drunk'' is idiomatic modern English and preserves the divine action of judgment.'
- source_word: שָׂרֶיהָ
  chosen: her officials
  alternatives:
  - her princes
  - her leaders
  lexicon: HALOT
  rationale: שׂר can denote princes, officials, or leaders. In Babylon-oracle context, 'officials' best captures governing elites without implying royal sons specifically.
- source_word: חֲכָמֶיהָ
  chosen: her wise men
  alternatives:
  - her sages
  lexicon: HALOT
  rationale: The term refers to those reputed for wisdom, likely counselors/advisers. 'Wise men' is the most transparent rendering in English and fits the courtly setting.
- source_word: פַּחוֹתֶיהָ
  chosen: her governors
  alternatives:
  - her provincial governors
  - her satraps
  lexicon: HALOT
  rationale: פּחה denotes an administrative governor. 'Governors' is clear and natural; 'satraps' is possible in imperial context but more specific and culturally loaded than the Hebrew requires.
- source_word: סְגָנֶיהָ
  chosen: her deputies
  alternatives:
  - her prefects
  - her officials
  - her rulers
  lexicon: HALOT
  rationale: סגן refers to subordinate rulers/officials. 'Deputies' preserves the sense of secondary administrative rank and distinguishes the term from the surrounding titles.
- source_word: גִבּוֹרֶיהָ
  chosen: her warriors
  alternatives:
  - her mighty men
  - her soldiers
  lexicon: HALOT
  rationale: גבור often means mighty men or valiant warriors. 'Warriors' communicates military strength in contemporary English without sounding archaic.
- source_word: וְיָשְׁנוּ שְׁנַת עוֹלָם
  chosen: and they will sleep an everlasting sleep
  alternatives:
  - and they will sleep a perpetual sleep
  - and they will sleep forever
  lexicon: HALOT
  rationale: The idiom denotes death under judgment. 'Sleep an everlasting sleep' preserves the metaphor and the force of עוֹלָם better than flattening it to simply 'die.'
- source_word: וְלֹא יָקִיצוּ
  chosen: and not wake up
  alternatives:
  - and never awake
  - and not awaken
  lexicon: HALOT
  rationale: The verb literally means 'awake.' 'Not wake up' is natural modern English and keeps the sleep metaphor intact.
- source_word: נְאֻם
  chosen: declares
  alternatives:
  - oracle of
  - utterance of
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares' is idiomatic and readable while preserving the authoritative speech-act.
- source_word: הַמֶּלֶךְ
  chosen: the King
  alternatives:
  - the king
  lexicon: HALOT
  rationale: With the following divine name and title, this functions as a divine epithet. Capitalizing 'King' signals titular use for God in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of Armies
  alternatives:
  - of hosts
  lexicon: HALOT
  rationale: '''Armies'' communicates the concrete sense of צבאות more clearly for modern readers than the traditional but opaque ''hosts.'''
- source_word: שְׁמוֹ
  chosen: is his name
  alternatives:
  - is his Name
  lexicon: HALOT
  rationale: A literal and natural rendering of the naming formula; no need for capitalization of 'name' in English.
