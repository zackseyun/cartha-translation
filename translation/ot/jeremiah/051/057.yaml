theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of 'everlasting sleep'
  chosen_reading: retain the death-as-sleep metaphor rather than interpretively replacing it with 'die forever'
  alternative_readings:
  - they will die and never rise
  - they will sleep forever
  rationale: The Hebrew uses metaphorical language for irreversible judgment. Preserving the metaphor maintains the text's imagery and theological tension without importing a more specific doctrine of resurrection or annihilation than the verse itself states.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
