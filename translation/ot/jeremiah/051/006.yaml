id: JER.51.6
reference: Jeremiah 51:6
source:
  edition: WLC
  text: נֻ֣סוּ מִ/תּ֣וֹךְ בָּבֶ֗ל וּ/מַלְּטוּ֙ אִ֣ישׁ נַפְשׁ֔/וֹ אַל תִּדַּ֖מּוּ בַּ/עֲוֺנָ֑/הּ כִּי֩ עֵ֨ת נְקָמָ֥ה הִיא֙ לַֽ/יהוָ֔ה גְּמ֕וּל ה֥וּא מְשַׁלֵּ֖ם לָֽ/הּ׀־׃
translation:
  text: Flee from the midst of Babylon, and let each man save his life. Do not perish in her iniquity, for this is the time of Yahweh's vengeance; he is repaying her what she deserves.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not perish in her guilt' or 'Do not be destroyed because of her iniquity.' The Hebrew can express either being caught up in Babylon's sin or in the judgment that comes because of it.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֻסוּ
  chosen: Flee
  alternatives:
  - Escape
  - Run away
  lexicon: HALOT
  rationale: Imperative plural from נוס, a direct command to flee. 'Flee' is concise and urgent.
- source_word: מִתּוֹךְ בָּבֶל
  chosen: from the midst of Babylon
  alternatives:
  - out of Babylon
  - from within Babylon
  lexicon: HALOT
  rationale: תּוֹךְ literally denotes the interior or midst. 'From the midst of Babylon' preserves the vividness of leaving from within the city/system, while remaining natural English.
- source_word: וּמַלְּטוּ אִישׁ נַפְשׁוֹ
  chosen: and let each man save his life
  alternatives:
  - and each man deliver himself
  - and let every man escape with his life
  lexicon: HALOT
  rationale: The idiom literally involves causing one's נפשׁ to escape/delivering it. In context, 'save his life' communicates the sense naturally. 'Each man' preserves the singular אִישׁ and follows the gender-accurate policy for representative masculine language.
- source_word: אַל תִּדַּמּוּ
  chosen: Do not be cut off
  alternatives:
  - Do not perish
  - Do not be destroyed
  - Do not be silenced
  lexicon: HALOT
  rationale: From דמה in the Niphal/jussive-like prohibition, likely 'be destroyed/cut off' in judgment context. 'Be cut off' preserves the passive nuance and covenant-judgment register better than the more generic 'perish.'
- source_word: בַּעֲוֺנָהּ
  chosen: in her iniquity
  alternatives:
  - because of her iniquity
  - for her guilt
  - in her punishment
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt. Here the warning is against sharing Babylon's culpability and consequent judgment. 'In her iniquity' keeps the lexical core while allowing the judgment implication to remain implicit.
- source_word: עֵת נְקָמָה
  chosen: the time of vengeance
  alternatives:
  - a time of vengeance
  - the time for vengeance
  lexicon: HALOT
  rationale: A construct phrase indicating a divinely appointed season of retribution. 'The time of vengeance' is natural and definite in context.
- source_word: לַיהוָה
  chosen: for the LORD
  alternatives:
  - belongs to the LORD
  - of the LORD
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD.' The lamed here is rendered idiomatically as 'for,' expressing that this vengeance pertains to or is appointed for the LORD.
- source_word: גְּמוּל
  chosen: what she deserves
  alternatives:
  - recompense
  - repayment
  - due reward
  lexicon: HALOT
  rationale: גְּמוּל denotes dealing, recompense, or due repayment. In combination with משלם, an idiomatic English rendering avoids awkward repetition while preserving the sense of just retribution.
- source_word: מְשַׁלֵּם לָהּ
  chosen: he is repaying her
  alternatives:
  - he repays her
  - he is paying her back
  lexicon: HALOT
  rationale: The participle conveys ongoing or imminent action. 'He is repaying her' fits the prophetic announcement of certain judgment.
