theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of Babylon's intoxication metaphor
  chosen_reading: Babylon as an instrument in the LORD's hand causing the nations' madness under judgment
  alternative_readings:
  - Babylon merely as a political power causing confusion
  rationale: The verse explicitly places Babylon 'in the hand of the LORD,' so the translation preserves both Babylon's agency and the LORD's sovereignty without adding theological explanation beyond the metaphor present in the text.
