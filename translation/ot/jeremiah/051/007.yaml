id: JER.51.7
reference: Jeremiah 51:7
source:
  edition: WLC
  text: כּוֹס זָהָ֤ב בָּבֶל֙ בְּ/יַד יְהוָ֔ה מְשַׁכֶּ֖רֶת כָּל הָ/אָ֑רֶץ מִ/יֵּינָ/הּ֙ שָׁת֣וּ גוֹיִ֔ם עַל כֵּ֖ן יִתְהֹלְל֥וּ גוֹיִֽם־־־־׃
translation:
  text: Babylon was a golden cup in the hand of Yahweh, making all the earth drunk. Nations drank from her wine; therefore the nations have gone mad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the LORD''; the divine name is YHWH.'
    reason: alternative_reading
  - marker: b
    text: Or 'the nations act like madmen' or 'the nations are driven mad.' The Hebrew verb here likely carries the sense of frenzy or madness in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: כּוֹס זָהָב
  chosen: a golden cup
  alternatives:
  - a cup of gold
  lexicon: HALOT
  rationale: The construct-like apposition is naturally rendered in English as 'a golden cup.' This preserves the metaphor of Babylon as an instrument of intoxicating judgment while using idiomatic English.
- source_word: בָּבֶל
  chosen: Babylon
  rationale: Standard English transliteration of the place-name.
- source_word: בְּיַד יְהוָה
  chosen: in the hand of the LORD
  alternatives:
  - in the LORD's hand
  lexicon: HALOT
  rationale: The idiom denotes possession and use as an instrument. 'The LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מְשַׁכֶּרֶת
  chosen: making ... drunk
  alternatives:
  - intoxicating
  - causing ... to be drunk
  lexicon: HALOT
  rationale: The participle from שׁכר expresses ongoing causation. 'Making all the earth drunk' is clear, vivid, and preserves the metaphorical force.
- source_word: כָּל הָאָרֶץ
  chosen: all the earth
  alternatives:
  - the whole earth
  - all the land
  lexicon: HALOT
  rationale: In this context of international judgment and the following 'nations,' 'earth' is preferable to 'land,' conveying the wider scope. 'All the earth' closely follows the Hebrew.
- source_word: מִיֵּינָהּ
  chosen: from her wine
  alternatives:
  - of her wine
  lexicon: HALOT
  rationale: The preposition מִן is best represented as 'from.' The feminine suffix refers back to Babylon personified as a woman.
- source_word: שָׁתוּ גוֹיִם
  chosen: Nations drank
  alternatives:
  - the nations drank
  lexicon: HALOT
  rationale: Anarthrous גוֹיִם can be rendered without the article in English, though generic. Capitalization follows sentence position, not special status.
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: This gives the causal-consecutive force succinctly and naturally.
- source_word: יִתְהֹלְלוּ
  chosen: have gone mad
  alternatives:
  - act like madmen
  - are driven mad
  - boast themselves
  lexicon: HALOT
  rationale: In this context of intoxication, the Hitpolel of הלל carries the sense of irrational frenzy or madness rather than praise/boasting. 'Have gone mad' communicates the result of Babylon's intoxicating influence in natural English.
- source_word: גוֹיִם
  chosen: the nations
  alternatives:
  - nations
  - peoples
  lexicon: HALOT
  rationale: 'Here the second occurrence is rendered with the article for natural English reference back to the previously mentioned nations: ''therefore the nations have gone mad.'''
