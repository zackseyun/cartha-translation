id: JER.51.29
reference: Jeremiah 51:29
source:
  edition: WLC
  text: וַ/תִּרְעַ֥שׁ הָ/אָ֖רֶץ וַ/תָּחֹ֑ל כִּ֣י קָ֤מָה עַל בָּבֶל֙ מַחְשְׁב֣וֹת יְהוָ֔ה לָ/שׂ֞וּם אֶת אֶ֧רֶץ בָּבֶ֛ל לְ/שַׁמָּ֖ה מֵ/אֵ֥ין יוֹשֵֽׁב־־׃
translation:
  text: And the earth quakes and writhes, for the plans of Yahweh have arisen against Babylon, to make the land of Babylon a desolation, without inhabitant.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתִּרְעַשׁ
  chosen: quakes
  alternatives:
  - shakes
  - trembles
  lexicon: HALOT
  rationale: From רעשׁ, denoting shaking or quaking, often in cosmic/judgment contexts. Present-tense English gives vividness to the Hebrew wayyiqtol sequence in poetic-prophetic narration.
- source_word: וַתָּחֹל
  chosen: writhes
  alternatives:
  - travails
  - is in anguish
  - trembles
  lexicon: HALOT
  rationale: From חול in the sense of writhing or being in labor-like anguish. 'Writhes' preserves the bodily, convulsive imagery better than the more abstract 'trembles.'
- source_word: הָאָרֶץ
  chosen: the earth
  alternatives:
  - the land
  lexicon: HALOT
  rationale: Although ארץ can mean 'land,' here the cosmic reaction language with 'quakes and writhes' favors 'the earth' rather than a merely local territory.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the earth's convulsion; 'for' is concise and natural in English.
- source_word: קָמָה
  chosen: have arisen
  alternatives:
  - has arisen
  - stand up
  - come to pass
  lexicon: HALOT
  rationale: The verb is feminine singular agreeing with the plural subject 'plans/thoughts' as a collective or with the nearest sense; English idiom smooths this as plural 'have arisen.' 'Arisen' preserves the imagery of YHWH's purposes standing up against Babylon.
- source_word: מַחְשְׁבוֹת
  chosen: plans
  alternatives:
  - purposes
  - thoughts
  - devices
  lexicon: HALOT
  rationale: '''Plans'' best conveys deliberate intention in a judgment context. ''Thoughts'' is possible but weaker in English for enacted divine resolve.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לָשׂוּם
  chosen: to make
  alternatives:
  - to set
  - to turn
  lexicon: HALOT
  rationale: In this construction, שׂוּם with object plus predicate noun means to make/turn something into something. 'To make' is the clearest English equivalent.
- source_word: אֶרֶץ בָּבֶל
  chosen: the land of Babylon
  alternatives:
  - Babylon's land
  - the earth of Babylon
  lexicon: HALOT
  rationale: Here ארץ refers specifically to Babylon's territory, so 'the land of Babylon' is more precise than repeating 'earth.'
- source_word: לְשַׁמָּה
  chosen: a desolation
  alternatives:
  - a waste
  - an appalling ruin
  lexicon: HALOT
  rationale: שַׁמָּה commonly denotes desolation/devastation in prophetic judgment language. 'A desolation' is both natural and suitably weighty.
- source_word: מֵאֵין יוֹשֵׁב
  chosen: without inhabitant
  alternatives:
  - with no one living there
  - without anyone dwelling there
  lexicon: HALOT
  rationale: A concise rendering of the idiom 'from there being no inhabitant.' Singular 'inhabitant' is idiomatic in English and preserves the starkness of the Hebrew.
