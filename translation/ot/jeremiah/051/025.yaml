id: JER.51.25
reference: Jeremiah 51:25
source:
  edition: WLC
  text: הִנְ/נִ֨י אֵלֶ֜י/ךָ הַ֤ר הַ/מַּשְׁחִית֙ נְאֻם יְהוָ֔ה הַ/מַּשְׁחִ֖ית אֶת כָּל הָ/אָ֑רֶץ וְ/נָטִ֨יתִי אֶת יָדִ֜/י עָלֶ֗י/ךָ וְ/גִלְגַּלְתִּ֨י/ךָ֙ מִן הַ/סְּלָעִ֔ים וּ/נְתַתִּ֖י/ךָ לְ/הַ֥ר שְׂרֵפָֽה־־־־־׃
translation:
  text: Behold, I am against you, O destroying mountain, declares Yahweh, destroyer of the whole earth. I will stretch out my hand against you, and roll you down from the crags, and make you a burned mountain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the whole land.' Hebrew אֶרֶץ can mean either 'land' or 'earth,' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'make you a mountain of burning' or 'a burnt mountain.' The Hebrew phrase is compact and may emphasize either the process of burning or the resulting burned state.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי אֵלֶיךָ
  chosen: Behold, I am against you
  alternatives:
  - Look, I am against you
  - See, I am against you
  lexicon: HALOT
  rationale: הִנְנִי plus אֶל can introduce direct opposition or confrontation. 'Behold' preserves the prophetic force and solemnity, while 'I am against you' reflects the idiomatic sense clearly.
- source_word: הַר
  chosen: mountain
  alternatives:
  - hill
  lexicon: HALOT
  rationale: The normal sense is 'mountain.' In this oracle it is metaphorical for Babylon, but the image should be preserved rather than interpreted away.
- source_word: הַמַּשְׁחִית
  chosen: destroying
  alternatives:
  - destroyer
  - destructive
  lexicon: HALOT
  rationale: As an attributive participial form modifying 'mountain,' 'destroying' works naturally in English and preserves the active verbal force.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Standard prophetic formula. 'Declares the LORD' is idiomatic modern English and follows the doctrinal default for יְהוָה as 'the LORD.'
- source_word: הַמַּשְׁחִית אֶת כָּל הָאָרֶץ
  chosen: which destroys the whole earth
  alternatives:
  - destroying the whole land
  - that destroys all the earth
  lexicon: HALOT
  rationale: אָרֶץ can mean 'land' or 'earth.' In the rhetoric of Babylon's world-reaching devastation, 'earth' best fits the scope. 'Which destroys' links smoothly back to 'mountain' in English.
- source_word: וְנָטִיתִי אֶת יָדִי עָלֶיךָ
  chosen: I will stretch out my hand against you
  alternatives:
  - I will extend my hand against you
  lexicon: HALOT
  rationale: A common judgment idiom. 'Stretch out my hand' is both literal and idiomatic in English, preserving the biblical imagery of divine action in judgment.
- source_word: וְגִלְגַּלְתִּיךָ
  chosen: roll you down
  alternatives:
  - roll you away
  - tumble you down
  lexicon: HALOT
  rationale: The verb conveys rolling. With the following phrase 'from the crags,' 'roll you down' best captures the motion implied in context.
- source_word: מִן הַסְּלָעִים
  chosen: from the crags
  alternatives:
  - from the rocks
  - from the cliffs
  lexicon: HALOT
  rationale: סֶלַע denotes rock, cliff, or crag. 'Crags' fits the mountain imagery vividly and naturally in English.
- source_word: וּנְתַתִּיךָ לְהַר שְׂרֵפָה
  chosen: make you a burned mountain
  alternatives:
  - make you a mountain of burning
  - make you a burnt mountain
  lexicon: HALOT
  rationale: The phrase is difficult. שְׂרֵפָה denotes burning/burned state. 'Burned mountain' preserves the resultative sense without overinterpreting whether it means perpetually burning or reduced by burning. 'Make you' reflects the causative result of נָתַן with לְ.
