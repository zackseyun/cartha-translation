theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of הָאָרֶץ
  chosen_reading: the whole earth
  alternative_readings:
  - the whole land
  rationale: Although אֶרֶץ can denote either 'land' or 'earth,' the context is an oracle against Babylon as a power devastating nations broadly. 'Earth' better preserves the universal rhetoric without narrowing it to a local territory.
