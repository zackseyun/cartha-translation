id: JER.51.33
reference: Jeremiah 51:33
source:
  edition: WLC
  text: כִּי֩ כֹ֨ה אָמַ֜ר יְהוָ֤ה צְבָאוֹת֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל בַּת בָּבֶ֕ל כְּ/גֹ֖רֶן עֵ֣ת הִדְרִיכָ֑/הּ ע֣וֹד מְעַ֔ט וּ/בָ֥אָה עֵֽת הַ/קָּצִ֖יר לָֽ/הּ־־׃
translation:
  text: 'For thus says Yahweh of hosts, the God of Israel: The daughter of Babylon is like a threshing floor at the time it is trodden; yet a little while, and the time of harvest will come for her.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when one treads her'; the Hebrew verb can be rendered more literally with an unspecified subject.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional small-caps covenantal substitute in English.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'hosts' is the established and sufficiently transparent rendering, encompassing heavenly and earthly armies without over-specifying.
- source_word: בַּת בָּבֶל
  chosen: The daughter of Babylon
  alternatives:
  - Daughter Babylon
  - the daughter Babylon
  lexicon: HALOT
  rationale: Retains the prophetic personification of the city/empire as a daughter, rather than flattening it to simply 'Babylon.' The English article improves readability.
- source_word: כְּגֹרֶן
  chosen: is like a threshing floor
  alternatives:
  - is as a threshing floor
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'Threshing floor' is the concrete agricultural image and should be preserved.
- source_word: עֵת הִדְרִיכָהּ
  chosen: at the time it is trampled
  alternatives:
  - at the time one treads her
  - when it is trodden
  - at the time of treading her
  lexicon: HALOT
  rationale: The Hiphil of דרך here refers to treading/trampling, especially of a threshing floor. Rendering with passive English communicates the sense naturally while preserving the agricultural metaphor. The 3fs suffix refers back to Babylon/threshing floor imagery.
- source_word: עוֹד מְעַט
  chosen: yet a little while
  alternatives:
  - a little while longer
  - still a little
  lexicon: HALOT
  rationale: Idiomatic temporal expression indicating imminence. 'Yet a little while' preserves the prophetic tone and the sense that only a short time remains.
- source_word: וּבָאָה עֵת הַקָּצִיר לָהּ
  chosen: and the time of harvest will come for her
  alternatives:
  - and her harvest time will come
  - and the time of reaping will come for her
  lexicon: HALOT
  rationale: Keeps the harvest metaphor, which in context signals impending judgment. 'Will come for her' preserves the dative pronoun and the sense that Babylon's appointed time is arriving.
