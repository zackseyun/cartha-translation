theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Agency in Babylon's fall
  chosen_reading: The LORD has stirred up the spirit of the kings of Media
  rationale: The verse explicitly attributes the Medes' motivation to the LORD's action. The translation preserves this divine sovereignty without softening it into mere permission.
