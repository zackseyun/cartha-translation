id: JER.51.11
reference: Jeremiah 51:11
source:
  edition: WLC
  text: הָבֵ֣רוּ הַ/חִצִּים֮ מִלְא֣וּ הַ/שְּׁלָטִים֒ הֵעִ֣יר יְהוָ֗ה אֶת ר֨וּחַ֙ מַלְכֵ֣י מָדַ֔י כִּֽי עַל בָּבֶ֥ל מְזִמָּת֖/וֹ לְ/הַשְׁחִיתָ֑/הּ כִּֽי נִקְמַ֤ת יְהוָה֙ הִ֔יא נִקְמַ֖ת הֵיכָלֽ/וֹ־־־־׃
translation:
  text: Sharpen the arrows; fill the shields. Yahweh has stirred up the spirit of the kings of Media, because his plan is against Babylon, to destroy her; for it is the vengeance of Yahweh, vengeance for his temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fill the shields.' The Hebrew term can denote shields, but 'quivers' fits the immediate context of arrows more naturally.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'her,' referring to Babylon as a personified city.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבֵרוּ
  chosen: Sharpen
  alternatives:
  - Polish
  - Make bright
  lexicon: HALOT
  rationale: Imperative plural from עבר in a weapons context; the sense is preparing arrows for battle, likely by sharpening/polishing. 'Sharpen' communicates the military preparation most naturally in English.
- source_word: הַחִצִּים
  chosen: the arrows
  lexicon: HALOT
  rationale: Straightforward rendering of the definite plural noun for arrows.
- source_word: מִלְאוּ
  chosen: fill
  alternatives:
  - take up
  - make full
  lexicon: HALOT
  rationale: Common imperative plural meaning 'fill.' In context it governs the following military equipment.
- source_word: הַשְּׁלָטִים
  chosen: the quivers
  alternatives:
  - the shields
  lexicon: HALOT
  rationale: 'Though sometimes rendered ''shields,'' the immediate collocation with arrows strongly favors ''quivers'' or arrow-cases here. This yields a coherent pair of battle commands: sharpen arrows, fill quivers.'
- source_word: הֵעִיר
  chosen: has stirred up
  alternatives:
  - has roused
  - has awakened
  lexicon: HALOT
  rationale: 'Hiphil perfect of עור, causative: YHWH has aroused or stirred into action.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: רוּחַ
  chosen: the spirit
  alternatives:
  - the mind
  - the impulse
  lexicon: HALOT
  rationale: Here רוח refers to the inner disposition or motivating spirit of the kings. 'Spirit' preserves the Hebrew term while fitting the context of divine stirring.
- source_word: מַלְכֵי מָדַי
  chosen: the kings of Media
  alternatives:
  - the kings of the Medes
  lexicon: HALOT
  rationale: Both are possible; 'Media' is a standard English geographical rendering and reads smoothly with the transliterated proper name.
- source_word: מְזִמָּתוֹ
  chosen: his plan
  alternatives:
  - his purpose
  - his scheme
  lexicon: HALOT
  rationale: Refers to intentional design. 'Plan' is clear modern English without importing a negative nuance stronger than the context itself supplies.
- source_word: לְהַשְׁחִיתָהּ
  chosen: to destroy her
  alternatives:
  - to destroy it
  lexicon: HALOT
  rationale: The suffix refers to Babylon, a grammatically feminine city-name in Hebrew. 'Her' preserves the personified-city idiom.
- source_word: נִקְמַת יְהוָה
  chosen: the vengeance of the LORD
  alternatives:
  - the LORD's vengeance
  - the avenging of the LORD
  lexicon: HALOT
  rationale: Construct phrase indicating vengeance belonging to or executed by the LORD. 'The vengeance of the LORD' preserves the Hebrew structure and solemnity.
- source_word: הִיא
  chosen: it is
  alternatives:
  - she is
  lexicon: HALOT
  rationale: The pronoun is resumptive/emphatic, best rendered idiomatically in English as 'it is' to mark explanation.
- source_word: נִקְמַת הֵיכָלוֹ
  chosen: vengeance for his temple
  alternatives:
  - vengeance of his temple
  - vengeance for his palace-sanctuary
  lexicon: HALOT
  rationale: The construct is best understood as vengeance on account of what was done to his temple. 'Temple' is the standard rendering of היכל in this context.
