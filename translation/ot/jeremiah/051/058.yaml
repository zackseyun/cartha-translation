id: JER.51.58
reference: Jeremiah 51:58
source:
  edition: WLC
  text: כֹּֽה אָמַ֞ר יְהוָ֣ה צְבָא֗וֹת חֹ֠מוֹת בָּבֶ֤ל הָֽ/רְחָבָה֙ עַרְעֵ֣ר תִּתְעַרְעָ֔ר וּ/שְׁעָרֶ֥י/הָ הַ/גְּבֹהִ֖ים בָּ/אֵ֣שׁ יִצַּ֑תּוּ וְ/יִֽגְע֨וּ עַמִּ֧ים בְּ/דֵי רִ֛יק וּ/לְאֻמִּ֥ים בְּ/דֵי אֵ֖שׁ וְ/יָעֵֽפוּ־־־׃ס
translation:
  text: 'Thus says Yahweh of hosts: Babylon’s broad wall shall be utterly razed, and her high gates shall be burned with fire. Peoples labor for emptiness, and nations for the fire, and they grow weary.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Babylon’s broad walls”; the Hebrew uses a plural form, likely as a collective for the city’s fortifications.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “shall be laid utterly bare”; the translation “shall be utterly razed” brings out the sense in the context of city walls.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and established English Bible practice.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'hosts' is the established and semantically broad rendering, encompassing heavenly and earthly armies without over-specifying.
- source_word: חֹמוֹת בָּבֶל הָרְחָבָה
  chosen: Babylon’s broad wall
  alternatives:
  - the broad wall of Babylon
  - Babylon’s wide walls
  lexicon: HALOT
  rationale: Although חֹמוֹת is morphologically plural, the phrase is commonly understood collectively of Babylon's massive fortification system. Singular 'wall' in English conveys the collective sense naturally, while 'broad' reflects הָרְחָבָה directly.
- source_word: עַרְעֵר תִּתְעַרְעָר
  chosen: shall be utterly razed
  alternatives:
  - shall be completely stripped bare
  - shall be laid utterly bare
  - shall be utterly demolished
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. The root conveys being laid bare/stripped down; in context of city walls, 'utterly razed' communicates total destruction in idiomatic English while preserving the intensification.
- source_word: שְׁעָרֶיהָ הַגְּבֹהִים
  chosen: her high gates
  alternatives:
  - her lofty gates
  lexicon: HALOT
  rationale: A straightforward rendering of the noun with 3fs suffix and adjective. 'High' is more natural modern English than 'lofty' here.
- source_word: בָּאֵשׁ יִצַּתּוּ
  chosen: shall be burned with fire
  alternatives:
  - shall be set on fire
  - shall be consumed by fire
  lexicon: HALOT
  rationale: The verb denotes kindling/burning. 'Burned with fire' preserves the Hebrew collocation and solemnity better than the more colloquial 'set on fire.'
- source_word: וְיִגְעוּ
  chosen: labor
  alternatives:
  - toil
  lexicon: HALOT
  rationale: The verb denotes exertion or toil. 'Labor' is clear, contemporary, and fits the proverbial conclusion.
- source_word: עַמִּים
  chosen: Peoples
  alternatives:
  - nations
  - peoples
  lexicon: HALOT
  rationale: Plural 'peoples' preserves the distinction from the following לְאֻמִּים, allowing the paired terms to remain visible in English.
- source_word: בְּדֵי רִיק
  chosen: for what is empty
  alternatives:
  - for emptiness
  - for vanity
  - for nothing
  lexicon: HALOT
  rationale: The phrase means 'for the sake of emptiness/vanity.' 'For what is empty' is readable modern English and preserves the sense of futile outcome.
- source_word: לְאֻמִּים
  chosen: nations
  alternatives:
  - peoples
  lexicon: HALOT
  rationale: Used here as a parallel ethnic-political term distinct from עַמִּים. 'Nations' gives natural variation while preserving the poetic parallelism.
- source_word: בְּדֵי אֵשׁ
  chosen: for the fire
  alternatives:
  - for fire
  - for fuel for the fire
  lexicon: HALOT
  rationale: 'The phrase is elliptical and poetic: their labor ends up only for fire. ''For the fire'' preserves the image and the likely sense that their work becomes fuel for destruction.'
- source_word: וְיָעֵפוּ
  chosen: and they grow weary
  alternatives:
  - and they are exhausted
  - and they weary themselves
  lexicon: HALOT
  rationale: The verb denotes becoming weary. 'Grow weary' is idiomatic and preserves the resultative sense at the close of the verse.
