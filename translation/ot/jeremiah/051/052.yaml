id: JER.51.52
reference: Jeremiah 51:52
source:
  edition: WLC
  text: לָ/כֵ֞ן הִנֵּֽה יָמִ֤ים בָּאִים֙ נְאֻם יְהוָ֔ה וּ/פָקַדְתִּ֖י עַל פְּסִילֶ֑י/הָ וּ/בְ/כָל אַרְצָ֖/הּ יֶאֱנֹ֥ק חָלָֽל־־־־׃
translation:
  text: Therefore, behold, days are coming, declares Yahweh, when I will punish her carved images, and throughout all her land the wounded will groan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'her idols.' The Hebrew term refers specifically to carved cult-images.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding judgment context; 'Therefore' is the most natural formal English connector here.
- source_word: הִנֵּה
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: HALOT
  rationale: Retains the prophetic deictic force and solemnity. Though slightly elevated, 'behold' remains readable and preserves the discourse marker better than omitting it.
- source_word: יָמִים בָּאִים
  chosen: days are coming
  alternatives:
  - the days are coming
  - days are on the way
  lexicon: HALOT
  rationale: Standard prophetic idiom announcing imminent future action. The anarthrous Hebrew is well represented by 'days are coming' without forcing the article.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A conventional prophetic formula. 'Declares the LORD' is idiomatic modern English and preserves the authoritative speech-act sense of נְאֻם.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name per DOCTRINE.md.
- source_word: וּפָקַדְתִּי עַל
  chosen: I will punish
  alternatives:
  - I will attend to
  - I will visit judgment on
  lexicon: HALOT
  rationale: In judgment contexts פקד על commonly carries the sense of calling to account or punishing. 'Punish' makes the judicial force explicit in natural English.
- source_word: פְּסִילֶיהָ
  chosen: her carved images
  alternatives:
  - her idols
  - her graven images
  lexicon: HALOT
  rationale: פסילים are carved cult-images. 'Carved images' preserves the concrete lexical sense better than the more interpretive 'idols,' while still clearly referring to objects of false worship.
- source_word: וּבְכָל אַרְצָהּ
  chosen: throughout all her land
  alternatives:
  - in all her land
  - through all her הארץ
  lexicon: HALOT
  rationale: Expresses the distributive scope of the judgment across Babylon's territory. 'Throughout all her land' is idiomatic and comprehensive.
- source_word: יֶאֱנֹק
  chosen: will groan
  alternatives:
  - will sigh
  - will moan
  lexicon: HALOT
  rationale: The verb denotes groaning or moaning under suffering. 'Will groan' is the clearest natural equivalent.
- source_word: חָלָל
  chosen: the slain
  alternatives:
  - the wounded
  - the pierced
  lexicon: HALOT
  rationale: In prophetic and military contexts חלל commonly denotes one who has been slain. Although singular in form, it functions collectively here, so English plural-collective 'the slain' best fits the sense.
