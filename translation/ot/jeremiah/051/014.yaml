  chosen_reading: Yahweh of hosts has sworn by himself
  alternative_readings:
  - The LORD of hosts has sworn by his life
  rationale: The Hebrew idiom uses 'his nephesh' in an oath formula. 'By himself' communicates divine self-oath clearly in natural English without importing extra doctrinal content, while preserving the force of God's self-attestation.
