id: JER.51.14
reference: Jeremiah 51:14
source:
  edition: WLC
  text: נִשְׁבַּ֛ע יְהוָ֥ה צְבָא֖וֹת בְּ/נַפְשׁ֑/וֹ כִּ֣י אִם מִלֵּאתִ֤י/ךְ אָדָם֙ כַּ/יֶּ֔לֶק וְ/עָנ֥וּ עָלַ֖יִ/ךְ הֵידָֽד־׃ס
translation:
  text: 'Yahweh of hosts has sworn by himself: Surely I will fill you with men, like locusts, and they will raise over you a shout.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by his life.' The Hebrew literally says 'by his nephesh,' an oath formula meaning he swears by his own self.
    reason: lexical_alternative
  - marker: b
    text: Or 'like young locusts' or 'like the locust swarm.'
    reason: lexical_alternative
  - marker: c
    text: The shout is likely a battle cry or victory shout raised against Babylon.
    reason: cultural_note
lexical_decisions:
- source_word: נִשְׁבַּע
  chosen: has sworn
  alternatives:
  - swore
  lexicon: HALOT
  rationale: The Niphal of שׁבע is the standard idiom for taking an oath. Present perfect in English conveys the completed divine oath with present force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: The established title יְהוָה צְבָאוֹת is best rendered 'the LORD of hosts,' preserving both its military and cosmic breadth without over-specifying one domain.
- source_word: בְּנַפְשׁוֹ
  chosen: by himself
  alternatives:
  - by his life
  - by his soul
  lexicon: HALOT
  rationale: The idiom 'swear by one's nephesh' means to swear by oneself or by one's own life. 'By himself' is the most natural English oath formula here and matches the sense of divine self-attestation.
- source_word: כִּי אִם
  chosen: Surely
  alternatives:
  - indeed
  - if not
  lexicon: HALOT
  rationale: In oath contexts כִּי אִם functions asseveratively, introducing the sworn content with emphatic certainty rather than a conditional sense.
- source_word: מִלֵּאתִיךְ
  chosen: I will fill you
  alternatives:
  - I have filled you
  - I will surely fill you
  lexicon: HALOT
  rationale: Address is feminine singular, referring to Babylon/city. The form is used within the oath for a future result; English future best captures the prophetic force.
- source_word: אָדָם
  chosen: men
  alternatives:
  - humankind
  - people
  lexicon: HALOT
  rationale: Here the noun denotes human attackers in contrast to locusts as the simile. 'Men' preserves the singular collective sense and aligns with the doctrine's gender-accurate policy where generic humanity is not the main point.
- source_word: כַּיֶּלֶק
  chosen: like locusts
  alternatives:
  - like the locust
  - like young locusts
  lexicon: HALOT
  rationale: יֶלֶק denotes a locust/cankerworm stage or type. In this military simile, 'like locusts' gives clear modern English and preserves the swarm imagery.
- source_word: וְעָנוּ
  chosen: they will raise
  alternatives:
  - they will answer
  - they will respond
  lexicon: HALOT
  rationale: ענה in this context takes a vocal expression as its object and means to lift up or utter a cry. 'Raise' fits the collocation with 'a shout' in English.
- source_word: הֵידָד
  chosen: a shout
  alternatives:
  - a battle cry
  - a victory shout
  lexicon: HALOT
  rationale: הֵידָד is a loud cry, often associated with battle or harvest shouting. 'A shout' keeps the term broad enough while fitting the immediate military context.
