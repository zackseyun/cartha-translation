theological_decisions:
- issue: Referent of the masculine singular subject in יִפְקֹד
  chosen_reading: left as generic 'he' rather than specifying God, enemy king, or
    ally
  alternative_readings:
  - the LORD appoints over you
  - the enemy king appoints over you
  - he visits/punishes you
  rationale: The Hebrew leaves the subject implicit and contextually could point to
    the LORD's action through foreign powers or to the hostile power itself. To preserve
    the text's ambiguity and avoid importing an interpretive resolution, the translation
    retains 'he.'
  doctrine_reference: Preserve theological tension rather than resolve it.
