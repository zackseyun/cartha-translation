id: JER.13.21
reference: Jeremiah 13:21
source:
  edition: WLC
  text: מַה תֹּֽאמְרִי֙ כִּֽי יִפְקֹ֣ד עָלַ֔יִ/ךְ וְ֠/אַתְּ לִמַּ֨דְתְּ אֹתָ֥/ם עָלַ֛יִ/ךְ
    אַלֻּפִ֖ים לְ/רֹ֑אשׁ הֲ/ל֤וֹא חֲבָלִים֙ יֹאחֱז֔וּ/ךְ כְּמ֖וֹ אֵ֥שֶׁת לֵדָֽה־־׃
translation:
  text: What will you say when he appoints over you those whom you yourself taught
    to be leaders over you? Will not labor pains seize you like a woman giving birth?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when he visits/punishes you'; the Hebrew verb can mean 'attend to, visit,
      punish,' but here likely carries the sense of appointing rulers over Judah.
    reason: lexical_alternative
  - marker: b
    text: Or 'chiefs' or 'close companions.' The Hebrew term can refer to clan leaders
      or familiar associates; in this context it likely points to those Judah had
      cultivated who now become her rulers.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה תֹּאמְרִי
  chosen: What will you say
  alternatives:
  - What can you say
  - What will you say?
  lexicon: HALOT
  rationale: Interrogative מַה with 2fs imperfect of אמר introduces a rhetorical question
    addressed to personified daughter Zion/Judah as feminine singular. Future-like
    English 'will you say' fits the imperfect in context.
- source_word: כִּי יִפְקֹד עָלַיִךְ
  chosen: when he appoints over you
  alternatives:
  - when he visits you
  - when he punishes you
  - when he musters against you
  lexicon: HALOT
  rationale: פקד has a broad semantic range including attend, visit, punish, appoint.
    In this clause, the following complement 'leaders over you' strongly favors an
    administrative sense, 'appoint/set over,' rather than mere visitation. 'When'
    captures כִּי contextually as temporal.
- source_word: וְאַתְּ לִמַּדְתְּ אֹתָם
  chosen: those whom you yourself taught
  alternatives:
  - and you trained them
  - and you accustomed them
  lexicon: HALOT
  rationale: Piel of למד commonly means teach/train. The independent pronoun adds
    emphasis, reflected by 'you yourself.' Object suffix refers to the coming rulers/allies.
- source_word: עָלַיִךְ אַלֻּפִים לְרֹאשׁ
  chosen: to be leaders over you
  alternatives:
  - as chiefs over you
  - as intimate friends as head over you
  - as tribal leaders over you
  lexicon: HALOT
  rationale: אַלֻּפִים can denote chiefs, clan leaders, or close companions/familiars
    depending on context. Here with לְרֹאשׁ ('for head/as head') and repeated עָלַיִךְ,
    the sense is political superiors set over Judah. 'Leaders' is natural modern English
    and preserves the governing role.
- source_word: הֲלוֹא
  chosen: Will not
  alternatives:
  - Surely
  - Is it not the case that
  lexicon: HALOT
  rationale: Introduces an emphatic rhetorical question expecting a positive answer.
- source_word: חֲבָלִים
  chosen: labor pains
  alternatives:
  - pangs
  - birth pains
  - writhing pains
  lexicon: HALOT
  rationale: Though the noun can mean cords/bands in some contexts, the immediate
    comparison to a woman giving birth makes 'labor pains' the clear sense here.
- source_word: יֹאחֱזוּךְ
  chosen: seize you
  alternatives:
  - take hold of you
  - grip you
  lexicon: HALOT
  rationale: אחז in Qal means grasp/seize. 'Seize you' conveys sudden overpowering
    pain.
- source_word: כְּמוֹ אֵשֶׁת לֵדָה
  chosen: like a woman giving birth
  alternatives:
  - like a woman in labor
  - like a woman bearing a child
  lexicon: HALOT
  rationale: Idiomatic comparison to childbirth pain. 'A woman giving birth' is clear
    modern English; 'in labor' is possible but slightly more idiomatic than the Hebrew
    construction.
