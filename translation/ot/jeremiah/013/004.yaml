id: JER.13.4
reference: Jeremiah 13:4
source:
  edition: WLC
  text: קַ֧ח אֶת הָ/אֵז֛וֹר אֲשֶׁ֥ר קָנִ֖יתָ אֲשֶׁ֣ר עַל מָתְנֶ֑י/ךָ וְ/קוּם֙ לֵ֣ךְ
    פְּרָ֔תָ/ה וְ/טָמְנֵ֥/הוּ שָׁ֖ם בִּ/נְקִ֥יק הַ/סָּֽלַע־־׃
translation:
  text: Take the waistband that you bought, which is on your waist, and arise, go
    to Perath, and hide it there in a crevice of the rock.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Perath is traditionally identified with the Euphrates; many translations
      therefore read 'the Euphrates.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֵזוֹר
  chosen: waistband
  alternatives:
  - loincloth
  - belt
  - sash
  lexicon: HALOT
  rationale: אֵזוֹר denotes an item worn around the waist. In this chapter it is a
    linen garment worn close to the body, so 'waistband' preserves the waist-related
    sense without overcommitting to 'belt' (too modern/rigid) or 'loincloth' (possible
    in context but more interpretive).
- source_word: קָנִיתָ
  chosen: you bought
  alternatives:
  - you acquired
  lexicon: HALOT
  rationale: The verb commonly means 'buy/acquire.' Here the immediate narrative context
    of Jeremiah being told earlier to obtain the garment supports the concrete commercial
    sense 'bought.'
- source_word: עַל מָתְנֶיךָ
  chosen: on your waist
  alternatives:
  - on your loins
  - around your waist
  lexicon: HALOT
  rationale: מָתְנַיִם refers to the loins/waist region. 'On your waist' is clear
    modern English and keeps the bodily reference without archaic 'loins.'
- source_word: וְקוּם
  chosen: arise
  alternatives:
  - get up
  - rise
  lexicon: HALOT
  rationale: The imperative introduces the next action with urgency. 'Arise' preserves
    the elevated narrative tone better than the more colloquial 'get up.'
- source_word: פְּרָתָה
  chosen: Perath
  alternatives:
  - the Euphrates
  lexicon: HALOT
  rationale: Per doctrine, names are transliterated. The Hebrew form is פְּרָת/פְּרָתָה,
    traditionally associated with the Euphrates, but the main text preserves the transliterated
    place name. The alternative identification is important enough to preserve in
    a footnote because the location is debated and translation tradition often renders
    it 'Euphrates.'
- source_word: טָמְנֵהוּ
  chosen: hide it
  alternatives:
  - bury it
  - conceal it
  lexicon: HALOT
  rationale: The verb means to hide/conceal, sometimes by burying. 'Hide it' is the
    broadest and least over-specific rendering; 'bury it' would add a manner not explicit
    in the verb itself.
- source_word: נְקִיק
  chosen: crevice
  alternatives:
  - cleft
  - crack
  lexicon: HALOT
  rationale: The noun denotes a fissure or cleft. 'Crevice' is natural modern English
    and fits a rocky hiding place.
- source_word: הַסָּלַע
  chosen: the rock
  alternatives:
  - the crag
  - the cliff
  lexicon: HALOT
  rationale: סֶלַע refers to rock/crag. 'The rock' is the most straightforward rendering
    here and works idiomatically with 'crevice.'
