theological_decisions:
- issue: Identification of פְּרָתָה
  chosen_reading: Render the place name as 'Perath' in the main text
  alternative_readings:
  - the Euphrates
  rationale: This is primarily a geographical/lexical issue rather than a doctrinal
    one, but it affects interpretation. Following the translation philosophy 'translate
    titles; transliterate names,' the Hebrew place name is transliterated in the main
    text. Because many translations render it 'Euphrates' and the identification is
    debated, the alternative is preserved in a footnote rather than resolved in the
    main text.
  doctrine_reference: Translation philosophy §2; §3
