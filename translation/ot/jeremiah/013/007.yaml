id: JER.13.7
reference: Jeremiah 13:7
source:
  edition: WLC
  text: וָ/אֵלֵ֣ךְ פְּרָ֔תָ/ה וָ/אֶחְפֹּ֗ר וָֽ/אֶקַּח֙ אֶת הָ֣/אֵז֔וֹר מִן הַ/מָּק֖וֹם
    אֲשֶׁר טְמַנְתִּ֣י/ו שָׁ֑מָּ/ה וְ/הִנֵּה֙ נִשְׁחַ֣ת הָ/אֵז֔וֹר לֹ֥א יִצְלַ֖ח לַ/כֹּֽל־־־׃פ
translation:
  text: So I went to Perath, and dug, and took the waistband from the place where
    I had hidden it. And behold, the waistband was ruined; it was good for nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Perath may refer to the Euphrates; the Hebrew reads the place name 'Perath.'
    reason: alternative_reading
  - marker: b
    text: Or 'belt,' 'loincloth,' or 'sash.' The Hebrew denotes a garment worn around
      the waist.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּרָתָה
  chosen: Perath
  alternatives:
  - the Euphrates
  lexicon: HALOT
  rationale: The Hebrew form is the place name Perath. Transliteration follows the
    philosophy of transliterating names. Because the identification with the Euphrates
    is possible and traditional, that alternative is preserved in a footnote rather
    than imported into the main text.
- source_word: אֵזוֹר
  chosen: waistband
  alternatives:
  - belt
  - loincloth
  - sash
  lexicon: HALOT
  rationale: אֵזוֹר denotes an item worn around the waist. 'Waistband' preserves the
    concrete object without over-specifying style. 'Loincloth' may be too specific,
    while 'belt' can sound too modern and rigid; 'sash' is possible but less neutral.
- source_word: טְמַנְתִּיו
  chosen: I had hidden it
  alternatives:
  - I buried it
  - I concealed it
  lexicon: HALOT
  rationale: The verb טמן means to hide or conceal, often by burying. Since the verse
    already includes 'dug,' 'hidden it' best captures the broader sense without redundantly
    forcing 'buried' into the verb itself.
- source_word: וְהִנֵּה
  chosen: And behold
  alternatives:
  - and look
  - and see
  lexicon: HALOT
  rationale: This discourse marker heightens attention to the discovered condition
    of the waistband. 'And behold' preserves the rhetorical force in readable modern
    English.
- source_word: נִשְׁחַת
  chosen: was ruined
  alternatives:
  - was spoiled
  - was marred
  - was corrupted
  lexicon: HALOT
  rationale: The Niphal of שׁחת here describes the waistband as having become damaged
    or spoiled. 'Was ruined' is natural English and conveys the extent of deterioration.
- source_word: לֹא יִצְלַח לַכֹּל
  chosen: it was good for nothing
  alternatives:
  - it was profitable for nothing
  - it was useful for nothing
  - it was fit for nothing
  lexicon: HALOT
  rationale: The idiom expresses total uselessness. 'Good for nothing' is idiomatic,
    clear, and faithful to the sense without sounding archaic or wooden.
- source_word: וָאֵלֵךְ ... וָאֶחְפֹּר ... וָאֶקַּח
  chosen: So I went ... and dug, and took
  alternatives:
  - Then I went ... and dug ... and took
  lexicon: HALOT
  rationale: The sequence of wayyiqtol verbs narrates successive actions. 'So I went'
    reads naturally in English while preserving the narrative progression.
