theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project doctrine specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Representative masculine language in מָתְנֵי אִישׁ
  chosen_reading: a man's waist
  alternative_readings:
  - a person's waist
  - human waist
  rationale: The Hebrew uses singular masculine אִישׁ in a generic comparison. Per
    the project's gender-accurate principle, the masculine form is retained rather
    than neutralized, since the image does not require inclusive recasting.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Covenantal purpose clause
  chosen_reading: to be for me a people, a name, a praise, and a glory
  alternative_readings:
  - to be my people, my renown, my praise, and my glory
  rationale: The chosen rendering preserves the Hebrew sequence and avoids importing
    a stronger possessive structure than the text explicitly states, while still conveying
    covenant belonging and vocation.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
