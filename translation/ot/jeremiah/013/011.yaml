id: JER.13.11
reference: Jeremiah 13:11
source:
  edition: WLC
  text: כִּ֡י כַּ/אֲשֶׁר֩ יִדְבַּ֨ק הָ/אֵז֜וֹר אֶל מָתְנֵי אִ֗ישׁ כֵּ֣ן הִדְבַּ֣קְתִּי
    אֵ֠לַ/י אֶת כָּל בֵּ֨ית יִשְׂרָאֵ֜ל וְ/אֶת כָּל בֵּ֤ית יְהוּדָה֙ נְאֻם יְהוָ֔ה
    לִֽ/הְי֥וֹת לִ/י֙ לְ/עָ֔ם וּ/לְ/שֵׁ֥ם וְ/לִ/תְהִלָּ֖ה וּ/לְ/תִפְאָ֑רֶת וְ/לֹ֖א
    שָׁמֵֽעוּ־־־־־־־׃
translation:
  text: For as the waistband clings to a man's waist, so I made the whole house of
    Israel and the whole house of Judah cling to me, declares the LORD, to be for
    me a people, a name, a praise, and a glory—but they did not listen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'belt,' 'sash,' or possibly 'loincloth' for the garment worn around the
      waist.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man's waist'; the singular masculine is used in a representative
      comparison.
    reason: cultural_note
  - marker: c
    text: '''Did not listen'' can also carry the sense ''did not obey.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵזוֹר
  chosen: the waistband
  alternatives:
  - the belt
  - the sash
  - the loincloth
  lexicon: HALOT
  rationale: In Jeremiah 13 the object is worn around the waist/loins. 'Waistband'
    preserves the concrete image and fits the immediate comparison with 'waist' better
    than the broader 'belt.' 'Sash' is possible but can sound ornamental; 'loincloth'
    is too specific here.
- source_word: יִדְבַּק / הִדְבַּקְתִּי
  chosen: clings / made ... cling
  alternatives:
  - sticks / made ... stick
  - is fastened / fastened
  lexicon: HALOT
  rationale: 'The verb דבק commonly conveys close attachment or cleaving. ''Cling''
    preserves both the physical image of the garment and the covenantal-relational
    force in the metaphor. The hiphil is rendered causatively: ''made ... cling.'''
- source_word: מָתְנֵי אִישׁ
  chosen: a man's waist
  alternatives:
  - the loins of a man
  - a man's loins
  lexicon: HALOT
  rationale: מָתְנַיִם often refers to loins/waist. 'Waist' is more natural modern
    English while preserving the bodily image. 'A man's' reflects the singular אִישׁ
    and follows the project's gender-accurate principle for representative masculine
    language.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - to myself
  lexicon: HALOT
  rationale: The preposition with first-person suffix is straightforwardly directional/relational
    here. 'To me' is idiomatic and preserves the covenantal attachment.
- source_word: כָּל בֵּית יִשְׂרָאֵל וְאֶת כָּל בֵּית יְהוּדָה
  chosen: the whole house of Israel and the whole house of Judah
  alternatives:
  - all the house of Israel and all the house of Judah
  - all Israel and all Judah
  lexicon: HALOT
  rationale: Retaining 'house' preserves the corporate/familial covenant language
    of the Hebrew. 'Whole house' communicates כָּל naturally in English without flattening
    the metaphor into mere geographic or political labels.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is natural
    modern English and preserves prophetic solemnity. 'the LORD' follows the project's
    default for יְהוָה.
- source_word: לִהְיוֹת לִי לְעָם
  chosen: to be for me a people
  alternatives:
  - to be my people
  lexicon: HALOT
  rationale: The Hebrew is slightly more formal than the idiomatic English covenant
    phrase 'to be my people.' 'To be for me a people' preserves the syntax and emphasis
    on belonging, while remaining readable.
- source_word: לְשֵׁם
  chosen: a name
  alternatives:
  - for renown
  - for a name
  lexicon: HALOT
  rationale: The noun is literally 'name.' In this context it carries the sense of
    renown/reputation, but the literal rendering keeps the compact poetic sequence
    and allows the reader to feel the Hebrew idiom.
- source_word: לִתְהִלָּה
  chosen: a praise
  alternatives:
  - for praise
  - an object of praise
  lexicon: HALOT
  rationale: The noun denotes praise. 'A praise' preserves the parallel nominal sequence
    with 'a people, a name ... and a glory.'
- source_word: לְתִפְאָרֶת
  chosen: a glory
  alternatives:
  - a beauty
  - an honor
  - a splendor
  lexicon: HALOT
  rationale: תִּפְאֶרֶת can denote beauty, splendor, or glory/honor. 'Glory' best
    fits the elevated covenantal purpose statement and the parallelism with 'name'
    and 'praise.'
- source_word: וְלֹא שָׁמֵעוּ
  chosen: but they did not listen
  alternatives:
  - but they did not obey
  - yet they did not hear
  lexicon: HALOT
  rationale: שׁמע can mean hear/listen/obey. In Jeremiah the refusal is both auditory
    and obedient, but 'did not listen' best captures the immediate prophetic rebuke
    while leaving the implication of disobedience intact. 'But' brings out the contrast
    with God's purpose.
