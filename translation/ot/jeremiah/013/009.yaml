id: JER.13.9
reference: Jeremiah 13:9
source:
  edition: WLC
  text: כֹּ֖ה אָמַ֣ר יְהוָ֑ה כָּ֠כָה אַשְׁחִ֞ית אֶת גְּא֧וֹן יְהוּדָ֛ה וְ/אֶת גְּא֥וֹן
    יְרוּשָׁלִַ֖ם הָ/רָֽב־־׃
translation:
  text: 'Thus says the LORD: In this way I will ruin the pride of Judah and the great
    pride of Jerusalem.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will destroy' or 'I will mar.' The Hebrew verb can denote ruining,
      spoiling, or destroying; 'ruin' best fits the immediate imagery of the spoiled
      waistband in this chapter.
    reason: lexical_alternative
  - marker: b
    text: '''Pride'' may also be understood as ''arrogance'' or, less likely here,
      ''majesty.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Rendered as 'the LORD' per the project's default for the divine name,
    following established English convention and the doctrine table.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - So says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal
    prophetic cadence without sounding archaic beyond normal biblical style.
- source_word: כָּכָה
  chosen: In this way
  alternatives:
  - Thus
  - So
  lexicon: HALOT
  rationale: 'Distinguished from the opening formula to reflect the adverb''s forward-pointing
    force: the manner of the coming action is being specified.'
- source_word: אַשְׁחִית
  chosen: I will ruin
  alternatives:
  - I will destroy
  - I will spoil
  - I will mar
  lexicon: HALOT
  rationale: From שׁחת in Hiphil, here in the context of the ruined waistband sign-act
    (Jer 13). 'Ruin' fits both physical marring and figurative humiliation better
    than the stronger 'destroy,' while remaining natural English.
- source_word: גְּאוֹן
  chosen: pride
  alternatives:
  - arrogance
  - majesty
  - exaltation
  lexicon: HALOT
  rationale: In Jeremiah this term can denote either arrogant pride or exalted status.
    Here the judgment context favors 'pride,' likely with a negative sense, while
    still allowing the wordplay between Judah's self-exaltation and Jerusalem's prominence.
- source_word: גְּאוֹן יְהוּדָה
  chosen: the pride of Judah
  alternatives:
  - Judah's pride
  - the arrogance of Judah
  lexicon: HALOT
  rationale: Construct chain rendered straightforwardly. Retaining 'of Judah' keeps
    the parallelism with the following phrase.
- source_word: גְּאוֹן יְרוּשָׁלִַם הָרָב
  chosen: the great pride of Jerusalem
  alternatives:
  - Jerusalem's great pride
  - the great arrogance of Jerusalem
  lexicon: HALOT
  rationale: הָרָב modifies 'pride' as 'great/much.' 'The great pride of Jerusalem'
    preserves the Hebrew order and the intensifying parallel with Judah.
