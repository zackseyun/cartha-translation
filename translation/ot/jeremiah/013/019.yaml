id: JER.13.19
reference: Jeremiah 13:19
source:
  edition: WLC
  text: עָרֵ֥י הַ/נֶּ֛גֶב סֻגְּר֖וּ וְ/אֵ֣ין פֹּתֵ֑חַ הָגְלָ֧ת יְהוּדָ֛ה כֻּלָּ֖/הּ
    הָגְלָ֥ת שְׁלוֹמִֽים׃ס
translation:
  text: The cities of the Negev are shut up, with no one to open them; all Judah has
    been carried away into exile, wholly carried away into exile.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the cities of the south.' 'Negev' may refer specifically to Judah's
      southern region.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'Judah has been exiled, all of it; it has been exiled completely.'
    reason: lexical_alternative
  - marker: c
    text: Or possibly 'carried away into exile in peace,' though the context more
      likely emphasizes completeness rather than peacefulness.
    reason: alternative_reading
lexical_decisions:
- source_word: עָרֵי הַנֶּגֶב
  chosen: the cities of the Negev
  alternatives:
  - the cities of the south
  - the towns of the Negev
  lexicon: HALOT
  rationale: נֶגֶב can denote the southern region generally or the specific arid southern
    district of Judah. 'Negev' preserves the geographic sense more precisely than
    the generic 'south' while remaining readable.
- source_word: סֻגְּרוּ
  chosen: are shut up
  alternatives:
  - are closed
  - have been shut
  lexicon: HALOT
  rationale: Passive perfect conveys a completed state. 'Are shut up' preserves the
    image of cities closed off/blocked, fitting the military-disaster context.
- source_word: וְאֵין פֹּתֵחַ
  chosen: with no one to open them
  alternatives:
  - and there is no one opening
  - and none opens
  lexicon: HALOT
  rationale: The idiom expresses the absence of anyone able to reverse the closure.
    'With no one to open them' is natural English and preserves the participial force.
- source_word: הָגְלָת
  chosen: has been carried away into exile
  alternatives:
  - has gone into exile
  - has been exiled
  lexicon: HALOT
  rationale: 'The Hophal of גלה is causative/passive: Judah is acted upon, not merely
    departing voluntarily. ''Carried away into exile'' best reflects forced deportation.'
- source_word: יְהוּדָה כֻּלָּהּ
  chosen: all Judah
  alternatives:
  - Judah in its entirety
  - the whole of Judah
  lexicon: HALOT
  rationale: כֻּלָּהּ intensifies totality. 'All Judah' is concise and idiomatic while
    preserving the comprehensive scope.
- source_word: הָגְלָת שְׁלוֹמִים
  chosen: wholly carried away into exile
  alternatives:
  - completely carried away into exile
  - carried away into exile in full
  lexicon: HALOT
  rationale: שְׁלוֹמִים here functions adverbially to stress completeness/fullness,
    not peace. Rendering it as 'wholly' preserves the emphatic repetition without
    introducing a misleading sense of 'peacefully'.
