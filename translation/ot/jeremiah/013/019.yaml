theological_decisions:
- issue: Meaning of שְׁלוֹמִים in the exile formula
  chosen_reading: 'an adverbial expression of completeness: ''wholly/completely'''
  alternative_readings:
  - peacefully
  - in peace
  rationale: Although the noun is related to שלום, in this context the repeated exile
    formula and parallel with כֻּלָּהּ favor an idiom of totality rather than manner.
    Translating 'in peace' would suggest an untroubled deportation, which is contextually
    unlikely and weakens the verse's emphasis on total judgment.
