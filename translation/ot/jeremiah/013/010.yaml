theological_decisions:
- issue: Idolatry language distinction
  chosen_reading: Render עבד as 'serve' and השתחוה as 'bow down'
  alternative_readings:
  - Render both more generically as 'worship'
  rationale: The Hebrew uses two distinct verbs describing different aspects of idolatrous
    devotion. Preserving both maintains the rhetorical fullness of the accusation
    and avoids flattening the text.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
