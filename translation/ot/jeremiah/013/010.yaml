id: JER.13.10
reference: Jeremiah 13:10
source:
  edition: WLC
  text: הָ/עָם֩ הַ/זֶּ֨ה הָ/רָ֜ע הַֽ/מֵּאֲנִ֣ים לִ/שְׁמ֣וֹעַ אֶת דְּבָרַ֗/י הַ/הֹֽלְכִים֙
    בִּ/שְׁרִר֣וּת לִבָּ֔/ם וַ/יֵּלְכ֗וּ אַֽחֲרֵי֙ אֱלֹהִ֣ים אֲחֵרִ֔ים לְ/עָבְדָ֖/ם
    וּ/לְ/הִשְׁתַּחֲוֺ֣ת לָ/הֶ֑ם וִ/יהִי֙ כָּ/אֵז֣וֹר הַ/זֶּ֔ה אֲשֶׁ֥ר לֹא יִצְלַ֖ח
    לַ/כֹּֽל׀־־׃
translation:
  text: This evil people, who refuse to hear my words, who walk in the stubbornness
    of their heart, and who have gone after other gods to serve them and to bow down
    to them, will become like this waistband, which is good for nothing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'belt' or 'sash'; the Hebrew אֵזוֹר refers to a garment worn around the
      waist. In the sign-act context of Jeremiah 13, English versions vary among 'waistband,'
      'belt,' and 'loincloth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעָם הַזֶּה הָרָע
  chosen: This evil people
  alternatives:
  - This wicked people
  - This evil nation
  lexicon: HALOT
  rationale: עָם is best rendered 'people' here for the collective Judah/Jerusalem
    group rather than 'nation.' רַע is rendered 'evil' as a moral characterization,
    preserving prophetic severity.
- source_word: הַמֵּאֲנִים לִשְׁמוֹעַ
  chosen: who refuse to hear
  alternatives:
  - who refuse to listen to
  - who are unwilling to hear
  lexicon: HALOT
  rationale: מָאֵן denotes refusal, not mere failure. 'Hear' preserves the covenantal
    sense of obedient hearing in Hebrew, though English readers may also understand
    'listen.'
- source_word: אֶת־דְּבָרַי
  chosen: my words
  alternatives:
  - my word
  lexicon: HALOT
  rationale: The plural is explicit in Hebrew and should be preserved.
- source_word: הַהֹלְכִים בִּשְׁרִרוּת לִבָּם
  chosen: who walk in the stubbornness of their heart
  alternatives:
  - who follow the stubbornness of their heart
  - who walk in the hardness of their heart
  lexicon: HALOT
  rationale: The participle plus בְּ marks ongoing conduct. שְׁרִרוּת conveys stubbornness/obstinacy
    rather than mere desire. Singular 'heart' is retained as the Hebrew collective
    singular with distributive force.
- source_word: וַיֵּלְכוּ אַחֲרֵי אֱלֹהִים אֲחֵרִים
  chosen: and who have gone after other gods
  alternatives:
  - and who went after other gods
  - and who follow other gods
  lexicon: HALOT
  rationale: The wayyiqtol continues the description of the people’s conduct. In English,
    'have gone after' fits the relative-clause chain naturally and conveys apostasy
    already undertaken.
- source_word: לְעָבְדָם
  chosen: to serve them
  alternatives:
  - to worship them
  lexicon: HALOT
  rationale: עבד in relation to deities is broader than liturgical worship and includes
    service/devotion; 'serve' preserves the lexical distinction from the following
    verb for prostration.
- source_word: וּלְהִשְׁתַּחֲוֺת לָהֶם
  chosen: and to bow down to them
  alternatives:
  - and to worship them
  - and to prostrate themselves before them
  lexicon: HALOT
  rationale: הִשְׁתַּחֲוָה literally denotes bowing/prostration. 'Bow down' keeps
    the concrete imagery and avoids collapsing it into the previous 'serve.'
- source_word: וִיהִי
  chosen: will become
  alternatives:
  - shall be
  - will be
  lexicon: HALOT
  rationale: Given the comparison and resulting state, 'will become' makes explicit
    the transition implied by the prophetic declaration.
- source_word: כָּאֵזוֹר הַזֶּה
  chosen: like this waistband
  alternatives:
  - like this belt
  - like this sash
  lexicon: HALOT
  rationale: אֵזוֹר can denote a belt, sash, or waistband. 'Waistband' fits the immediate
    sign-act context in Jeremiah 13 and avoids overly modern or overly formal connotations.
    An alternative is worth preserving because English tradition often uses 'belt'
    or 'loincloth.'
- source_word: אֲשֶׁר לֹא יִצְלַח לַכֹּל
  chosen: which is good for nothing
  alternatives:
  - which is profitable for nothing
  - which is useful for nothing
  lexicon: HALOT
  rationale: The idiom expresses total uselessness. 'Good for nothing' is natural
    modern English and captures the force without archaic stiffness.
