  from: So I myself also have lifted up
  to: So I myself have also lifted up
  rationale: The word order 'I myself also have...' is slightly stiff in contemporary English. While grammatically possible, reordering the adverb to 'I myself have also...' creates a more natural and fluid sentence structure without losing any of the emphatic force of the Hebrew 'wəgam 'anî'.
