id: JER.13.26
reference: Jeremiah 13:26
source:
  edition: WLC
  text: וְ/גַם אֲנִ֛י חָשַׂ֥פְתִּי שׁוּלַ֖יִ/ךְ עַל פָּנָ֑יִ/ךְ וְ/נִרְאָ֖ה קְלוֹנֵֽ/ךְ־־׃
translation:
  text: So I myself have also lifted up your skirts over your face, and your shame has been seen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have uncovered your skirts over your face.' The Hebrew verb means 'uncover/expose'; 'lifted up' is an idiomatic rendering in this clothing image.
    reason: lexical_alternative
  - marker: b
    text: The image is one of public humiliation through forced exposure, a prophetic metaphor for disgrace under judgment.
    reason: cultural_note
  - marker: c
    text: Or 'So I myself also have lifted up'.
    reason: previous_rendering
lexical_decisions:
- source_word: וְגַם
  chosen: So ... also
  alternatives:
  - And also
  - Even
  lexicon: HALOT
  rationale: The conjunction plus additive particle intensifies and continues the judgment speech. 'So ... also' captures both continuation and emphasis in natural English.
- source_word: אֲנִי
  chosen: I myself
  alternatives:
  - I
  lexicon: HALOT
  rationale: The explicit pronoun is unnecessary for verbal person marking, so it is emphatic. 'I myself' preserves the emphasis that YHWH is personally acting in judgment.
- source_word: חָשַׂפְתִּי
  chosen: have lifted up
  alternatives:
  - have uncovered
  - have stripped back
  lexicon: HALOT
  rationale: The verb means to uncover/expose. With 'skirts' as object, 'lifted up' is the most idiomatic English expression while still preserving the concrete image of forced exposure.
- source_word: שׁוּלַיִךְ
  chosen: your skirts
  alternatives:
  - your train
  - your hems
  lexicon: HALOT
  rationale: The noun refers to the lower edges or skirts of a garment. 'Skirts' best conveys the clothing imagery in this humiliation metaphor.
- source_word: עַל פָּנַיִךְ
  chosen: over your face
  alternatives:
  - upon your face
  - to your face
  lexicon: HALOT
  rationale: The preposition עַל is spatial here. 'Over your face' preserves the vivid image of the garment being pulled up so as to expose and shame.
- source_word: וְנִרְאָה
  chosen: has been seen
  alternatives:
  - was seen
  - is seen
  - has appeared
  lexicon: HALOT
  rationale: 'The Niphal conveys passive/resultative sense: the shame becomes visible. Present perfect English fits the prophetic declaration of accomplished judgment.'
- source_word: קְלוֹנֵךְ
  chosen: your shame
  alternatives:
  - your disgrace
  - your dishonor
  lexicon: HALOT
  rationale: The noun denotes public shame/disgrace. 'Shame' is concise and preserves both the emotional and social dimensions of the exposure imagery.
