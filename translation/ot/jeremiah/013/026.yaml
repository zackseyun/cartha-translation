theological_decisions:
- issue: Metaphor of public exposure in divine judgment
  chosen_reading: Retain the concrete image of lifted skirts and visible shame as a metaphor of humiliating judgment
  alternative_readings:
  - Soften to a less explicit image of disgrace
  rationale: The Hebrew uses stark bodily/clothing imagery to portray Jerusalem's humiliation under judgment. Softening the image would paraphrase beyond the source and mute the force of the prophetic indictment.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; never paraphrase beyond what the source text warrants.'
