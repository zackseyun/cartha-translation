theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metaphorical force of 'drunkenness'
  chosen_reading: Retain 'drunkenness' as the main image
  alternative_readings:
  - stupor
  - confusion
  rationale: The verse uses intoxication imagery as a metaphor for divine judgment and disorientation. Preserving the concrete image maintains the prophetic rhetoric and theological tension rather than resolving it into a purely abstract effect.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
