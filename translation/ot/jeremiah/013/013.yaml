id: JER.13.13
reference: Jeremiah 13:13
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֨ אֲלֵי/הֶ֜ם כֹּֽה אָמַ֣ר יְהוָ֗ה הִנְ/נִ֣י מְמַלֵּ֣א אֶת כָּל יֹשְׁבֵ֣י הָ/אָ֪רֶץ הַ/זֹּ֟את וְ/אֶת הַ/מְּלָכִ֣ים הַ/יֹּשְׁבִים֩ לְ/דָוִ֨ד עַל כִּסְא֜/וֹ וְ/אֶת הַ/כֹּהֲנִ֣ים וְ/אֶת הַ/נְּבִיאִ֗ים וְ/אֵ֛ת כָּל יֹשְׁבֵ֥י יְרוּשָׁלִָ֖ם שִׁכָּרֽוֹן־־־־־־־־׃
translation:
  text: 'Then you shall say to them, ‘Thus says Yahweh: Behold, I am about to fill all the inhabitants of this land—and the kings who sit on David’s throne, and the priests, and the prophets, and all the inhabitants of Jerusalem—with drunkenness.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the kings who sit on David’s throne.” The Hebrew more literally says “the kings who sit for David on his throne,” highlighting their dynastic succession to David.
    reason: lexical_alternative
  - marker: b
    text: “Drunkenness” is likely metaphorical for divinely imposed disorientation and judgment, though the image is intentionally left concrete.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  chosen: Then you shall say to them
  alternatives:
  - And you shall say to them
  - You shall say to them
  lexicon: HALOT
  rationale: The prefixed conjunction naturally advances the discourse from the prior verse; 'Then' captures the sequential force in readable English, while 'shall say' preserves the directive sense of the Hebrew perfect with vav in prophetic instruction.
- source_word: כֹּה אָמַר יְהוָה
  chosen: Thus says the LORD
  alternatives:
  - This is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated.
- source_word: הִנְנִי
  chosen: Behold, I am about to
  alternatives:
  - Behold, I am
  - Look, I am about to
  lexicon: HALOT
  rationale: הִנְנִי marks emphatic divine self-involvement and often introduces imminent action. 'Behold' preserves the prophetic register, while 'am about to' brings out the impending force in context.
- source_word: מְמַלֵּא
  chosen: fill
  alternatives:
  - make full
  - fill up
  lexicon: HALOT
  rationale: The participle of מלא expresses the action of filling. 'Fill' is the most direct and idiomatic rendering, especially with the later complement 'with drunkenness.'
- source_word: כָּל יֹשְׁבֵי הָאָרֶץ הַזֹּאת
  chosen: all the inhabitants of this land
  alternatives:
  - all who dwell in this land
  - all the residents of this land
  lexicon: HALOT
  rationale: יֹשְׁבֵי is a common idiom for inhabitants/dwellers. 'Land' is preferable to 'earth' here because the reference is specifically Judah/Jerusalem in context.
- source_word: הַמְּלָכִים הַיֹּשְׁבִים לְדָוִד עַל כִּסְאוֹ
  chosen: the kings who sit for David on his throne
  alternatives:
  - the kings who sit on David's throne
  - the kings who sit in David's place on his throne
  lexicon: HALOT
  rationale: The Hebrew literally includes לְדָוִד, not merely a genitive construction. 'Who sit for David on his throne' preserves the unusual wording and the dynastic-representative sense better than smoothing it to the traditional 'on David's throne,' though that sense is closely related.
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Straightforward rendering of the cultic office.
- source_word: הַנְּבִיאִים
  chosen: the prophets
  lexicon: HALOT
  rationale: Straightforward rendering; in Jeremiah this likely includes the prophetic establishment broadly, not only true prophets.
- source_word: כָּל יֹשְׁבֵי יְרוּשָׁלִָם
  chosen: all the inhabitants of Jerusalem
  alternatives:
  - all who dwell in Jerusalem
  - all the residents of Jerusalem
  lexicon: HALOT
  rationale: Consistent rendering of יֹשְׁבֵי as 'inhabitants' in this verse.
- source_word: שִׁכָּרוֹן
  chosen: drunkenness
  alternatives:
  - intoxication
  - stupor
  lexicon: HALOT
  rationale: The noun ordinarily denotes drunkenness/intoxication. 'Drunkenness' preserves the metaphor's force and links with the surrounding wineskin imagery in the context. 'Stupor' is interpretive and better left as an alternative nuance rather than the main text.
