id: JER.13.18
reference: Jeremiah 13:18
source:
  edition: WLC
  text: אֱמֹ֥ר לַ/מֶּ֛לֶךְ וְ/לַ/גְּבִירָ֖ה הַשְׁפִּ֣ילוּ שֵׁ֑בוּ כִּ֤י יָרַד֙ מַרְאֲשׁ֣וֹתֵי/כֶ֔ם
    עֲטֶ֖רֶת תִּֽפְאַרְתְּ/כֶֽם׃
translation:
  text: Say to the king and to the queen mother, ‘Humble yourselves; sit down, for
    your glorious crown has come down from your heads.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'the crown of your glory has come down from your heads.'
    reason: lexical_alternative
  - marker: b
    text: '''Queen mother'' renders Hebrew גְּבִירָה, a royal title that can denote
      the king''s mother rather than his wife.'
    reason: cultural_note
lexical_decisions:
- source_word: אֱמֹר
  chosen: Say
  alternatives:
  - Tell
  lexicon: HALOT
  rationale: Imperative singular of אמר, introducing Jeremiah's message to be delivered.
    'Say' is the standard direct-speech introducer and fits the prophetic style.
- source_word: לַמֶּלֶךְ
  chosen: to the king
  lexicon: HALOT
  rationale: Definite singular noun with preposition. Straightforwardly refers to
    the reigning king.
- source_word: וְלַגְּבִירָה
  chosen: and to the queen mother
  alternatives:
  - and to the mistress
  - and to the queen
  lexicon: HALOT
  rationale: גְּבִירָה commonly denotes the queen mother or great lady in royal court
    contexts. 'Queen mother' best captures the likely court office here and is the
    conventional sense in this context, without implying the king's wife if that is
    not intended.
- source_word: הַשְׁפִּילוּ
  chosen: Humble yourselves
  alternatives:
  - Lower yourselves
  - Be humbled
  lexicon: HALOT
  rationale: Hiphil imperative plural of שׁפל, here a command to assume a lowly status.
    'Humble yourselves' captures both the physical lowering and the social humiliation
    implied.
- source_word: שֵׁבוּ
  chosen: sit down
  alternatives:
  - sit
  lexicon: HALOT
  rationale: Imperative plural of ישׁב. 'Sit down' is idiomatic English and suits
    the paired command with 'Humble yourselves,' likely signaling descent from exalted
    status.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'For' preserves the formal explanatory
    force in concise English.
- source_word: יָרַד
  chosen: has come down
  alternatives:
  - has fallen
  - has descended
  lexicon: HALOT
  rationale: Qal perfect of ירד, 'go down/come down.' 'Has come down' preserves the
    verbal imagery without over-specifying whether the crown fell accidentally or
    was removed in judgment.
- source_word: מַרְאֲשׁוֹתֵיכֶם
  chosen: your heads
  alternatives:
  - your headrests
  - your headplaces
  lexicon: HALOT
  rationale: Though the noun can denote a place at the head or headrest in some contexts,
    here with a crown it idiomatically refers to the heads/headplaces on which the
    crown rests. 'Your heads' gives the plain sense in context.
- source_word: עֲטֶרֶת תִּפְאַרְתְּכֶם
  chosen: your glorious crown
  alternatives:
  - the crown of your glory
  - your splendid crown
  lexicon: HALOT
  rationale: Construct chain literally 'the crown of your glory/beauty.' 'Your glorious
    crown' is natural English that preserves both the regal object and its honorific
    quality.
