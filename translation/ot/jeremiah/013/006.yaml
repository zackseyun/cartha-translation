id: JER.13.6
reference: Jeremiah 13:6
source:
  edition: WLC
  text: וַ/יְהִ֕י מִ/קֵּ֖ץ יָמִ֣ים רַבִּ֑ים וַ/יֹּ֨אמֶר יְהוָ֜ה אֵלַ֗/י ק֚וּם לֵ֣ךְ
    פְּרָ֔תָ/ה וְ/קַ֤ח מִ/שָּׁם֙ אֶת הָ֣/אֵז֔וֹר אֲשֶׁ֥ר צִוִּיתִ֖י/ךָ לְ/טָמְנ/וֹ
    שָֽׁם־־׃
translation:
  text: And it happened after many days that the LORD said to me, “Arise, go to Perath,
    and take from there the waistband that I commanded you to hide there.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Perath may refer to the Euphrates; the Hebrew name is transliterated here
      rather than resolved in the main text.
    reason: alternative_reading
  - marker: b
    text: Or 'loincloth,' 'belt,' or 'sash' for 'waistband.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to bury there'; the Hebrew verb can mean to hide or conceal, sometimes
      by burying.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: And it happened
  alternatives:
  - And it came to pass
  - Then it happened
  lexicon: HALOT
  rationale: Narrative wayyiqtol of היה introducing a new episode. 'And it happened'
    preserves the Hebrew discourse function while using readable modern English; 'came
    to pass' is more traditional but archaic.
- source_word: מִקֵּץ יָמִים רַבִּים
  chosen: after many days
  alternatives:
  - at the end of many days
  - after a long time
  lexicon: HALOT
  rationale: Literally 'from the end of many days.' 'After many days' is idiomatic
    English that preserves the temporal sense without unnecessary stiffness. 'After
    a long time' is possible but slightly more interpretive.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint tradition.
- source_word: קוּם לֵךְ
  chosen: Arise, go
  alternatives:
  - Get up, go
  - Rise, go
  lexicon: HALOT
  rationale: The paired imperatives convey urgent movement. 'Arise, go' preserves
    the formal force and cadence of the Hebrew while remaining clear in modern English.
- source_word: פְּרָתָה
  chosen: Perath
  alternatives:
  - the Euphrates
  lexicon: HALOT
  rationale: As a proper name, it is transliterated rather than translated, in keeping
    with the project's policy for names. Because the location may be understood as
    the Euphrates, that alternative is preserved in a footnote rather than resolved
    in the main text.
- source_word: וְקַח מִשָּׁם
  chosen: and take from there
  alternatives:
  - and get from there
  - and retrieve from there
  lexicon: HALOT
  rationale: A straightforward imperative plus adverb. 'Take from there' is the most
    direct rendering; 'retrieve' is contextually apt but more interpretive.
- source_word: הָאֵזוֹר
  chosen: the waistband
  alternatives:
  - the loincloth
  - the belt
  - the sash
  lexicon: HALOT
  rationale: אֵזוֹר denotes an item worn around the waist. 'Waistband' is a balanced
    rendering that fits the immediate context and avoids over-specifying the garment.
    Since 'loincloth' and 'belt/sash' are plausible in context and translation tradition,
    they are preserved in a footnote.
- source_word: אֲשֶׁר צִוִּיתִיךָ
  chosen: that I commanded you
  alternatives:
  - which I commanded you about
  - that I ordered you
  lexicon: HALOT
  rationale: This relative clause refers back to the earlier divine instruction. 'Commanded'
    preserves the authoritative force better than the more colloquial 'ordered.'
- source_word: לְטָמְנוֹ שָׁם
  chosen: to hide there
  alternatives:
  - to bury there
  - to conceal there
  lexicon: HALOT
  rationale: The verb טמן commonly means to hide or conceal, sometimes by burying.
    'Hide there' is broad enough to preserve the lexical sense without forcing the
    more specific image of burial into the main text.
