id: JER.13.1
reference: Jeremiah 13:1
source:
  edition: WLC
  text: כֹּֽה אָמַ֨ר יְהוָ֜ה אֵלַ֗/י הָל֞וֹךְ וְ/קָנִ֤יתָ לְּ/ךָ֙ אֵז֣וֹר פִּשְׁתִּ֔ים וְ/שַׂמְתּ֖/וֹ עַל מָתְנֶ֑י/ךָ וּ/בַ/מַּ֖יִם לֹ֥א תְבִאֵֽ/הוּ־־׃
translation:
  text: 'Thus Yahweh said to me: “Go and buy yourself a linen waistband, and put it on your waist, but do not put it in water.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a linen belt,” “a linen sash,” or possibly “a linen loincloth.” The Hebrew אֵזוֹר refers to a garment worn around the waist.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving the traditional English convention for YHWH.
- source_word: כֹּה אָמַר
  chosen: Thus ... said
  alternatives:
  - This is what ... said
  - So ... said
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Thus ... said' preserves the formal tone while remaining natural in English.
- source_word: אֵלַי
  chosen: to me
  lexicon: HALOT
  rationale: Direct object of divine speech to Jeremiah; straightforward prepositional rendering.
- source_word: הָלוֹךְ
  chosen: Go
  alternatives:
  - Go on
  - Proceed
  lexicon: HALOT
  rationale: The infinitive absolute here functions idiomatically as an urgent command when followed by a finite verb; concise English imperative best captures the force.
- source_word: וְקָנִיתָ לְּךָ
  chosen: buy yourself
  alternatives:
  - get yourself
  - acquire for yourself
  lexicon: HALOT
  rationale: The verb means 'buy/acquire'; 'buy yourself' preserves both the commercial sense and the reflexive nuance of לְךָ.
- source_word: אֵזוֹר
  chosen: waistband
  alternatives:
  - loincloth
  - belt
  - sash
  lexicon: HALOT
  rationale: אֵזוֹר denotes something worn around the waist. 'Waistband' is broad enough to fit the Hebrew without over-specifying the garment. 'Loincloth' is possible in context, but may imply more than the term itself requires.
- source_word: פִּשְׁתִּים
  chosen: linen
  alternatives:
  - flax
  lexicon: HALOT
  rationale: Refers to flax/linen material. 'Linen' is the natural English rendering for a wearable item made from flax.
- source_word: וְשַׂמְתּוֹ עַל מָתְנֶיךָ
  chosen: put it on your waist
  alternatives:
  - put it around your loins
  - place it on your hips
  lexicon: HALOT
  rationale: מָתְנַיִם refers to the loins/waist region. 'On your waist' is readable modern English and fits the garment imagery without archaic diction.
- source_word: וּבַמַּיִם לֹא תְבִאֵהוּ
  chosen: but do not put it in water
  alternatives:
  - but do not dip it in water
  - but do not let it go into water
  lexicon: HALOT
  rationale: The Hiphil of בוא with object and 'in water' conveys causing it to enter water. 'Do not put it in water' is the clearest idiomatic English equivalent.
