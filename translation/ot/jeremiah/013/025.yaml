id: JER.13.25
reference: Jeremiah 13:25
source:
  edition: WLC
  text: זֶ֣ה גוֹרָלֵ֧/ךְ מְנָת מִדַּ֛יִ/ךְ מֵֽ/אִתִּ֖/י נְאֻם יְהוָ֑ה אֲשֶׁר֙ שָׁכַ֣חַתְּ אוֹתִ֔/י וַֽ/תִּבְטְחִ֖י בַּ/שָּֽׁקֶר־־׃
translation:
  text: This is your lot, the portion measured out to you from me, declares Yahweh, because you have forgotten me and trusted in falsehood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your fate' or 'your allotted share.' The Hebrew combines terms for 'lot' and 'portion,' emphasizing what has been assigned to her.
    reason: lexical_alternative
  - marker: b
    text: Or 'trusted in lies.' The Hebrew שֶׁקֶר can mean 'falsehood,' 'lie,' or 'deception.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  chosen: This is
  alternatives:
  - This
  lexicon: HALOT
  rationale: Deictic pronoun introducing the judicial declaration; English supplies 'is' naturally.
- source_word: גוֹרָלֵךְ
  chosen: your lot
  alternatives:
  - your fate
  - your portion
  lexicon: HALOT
  rationale: גוֹרָל commonly denotes lot or allotted fate/portion. 'Lot' preserves the concrete-allotment sense while fitting the judgment context.
- source_word: מְנָת מִדַּיִךְ
  chosen: the portion measured out to you
  alternatives:
  - the portion of your measures
  - your measured portion
  - your allotted share
  lexicon: HALOT
  rationale: The collocation intensifies the idea of an assigned share. Because מִדַּיִךְ derives from a measure-related noun, 'measured out to you' captures the distributive nuance in idiomatic English better than a wooden 'portion of your measures.'
- source_word: מֵאִתִּי
  chosen: from me
  alternatives:
  - from with me
  lexicon: HALOT
  rationale: 'Standard prepositional expression indicating source: the judgment portion comes from the LORD.'
- source_word: נְאֻם יְהוָה
  chosen: oracle of the LORD
  alternatives:
  - declares the LORD
  - utterance of the LORD
  lexicon: HALOT
  rationale: נְאֻם is a prophetic formula. 'Oracle of the LORD' preserves the noun force and solemn prophetic register. YHWH follows doctrine default as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר
  chosen: because
  alternatives:
  - that
  - which
  - for that
  lexicon: HALOT
  rationale: Though formally a relative particle, here it introduces the reason for the announced judgment. 'Because' best reflects the clause function in English.
- source_word: שָׁכַחַתְּ אֹתִי
  chosen: you have forgotten me
  alternatives:
  - you forgot me
  lexicon: HALOT
  rationale: Direct accusation to feminine singular Judah/Jerusalem. Present perfect in English conveys the state resulting from prior action in this prophetic indictment.
- source_word: וַתִּבְטְחִי
  chosen: and trusted
  alternatives:
  - and you trusted
  - and put your trust
  lexicon: HALOT
  rationale: Simple past coordinated with the prior accusation; concise and natural in English.
- source_word: בַּשָּׁקֶר
  chosen: in falsehood
  alternatives:
  - in lies
  - in deception
  - in what is false
  lexicon: HALOT
  rationale: שֶׁקֶר can denote falsehood, lie, or deception. 'Falsehood' is broad enough to include both deceitful worship and unreliable political/security objects without over-specifying.
