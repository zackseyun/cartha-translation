theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Referent of second feminine singular forms
  chosen_reading: Retained as singular 'you' addressed to Judah/Jerusalem collectively
  alternative_readings:
  - Explicitly naming 'Judah' or 'Jerusalem' in the translation
  rationale: The Hebrew addresses the nation/city as a feminine singular entity. English 'you' preserves the direct address without importing an explicit noun not present in the verse.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; do not import claims the text does not make'
