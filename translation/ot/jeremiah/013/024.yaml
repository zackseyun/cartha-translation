id: JER.13.24
reference: Jeremiah 13:24
source:
  edition: WLC
  text: וַ/אֲפִיצֵ֖/ם כְּ/קַשׁ עוֹבֵ֑ר לְ/ר֖וּחַ מִדְבָּֽר־׃
translation:
  text: So I will scatter them like chaff passing away before the desert wind.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like stubble passing before the wilderness wind.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲפִיצֵם
  chosen: So I will scatter them
  alternatives:
  - And I will scatter them
  - Then I scattered them
  lexicon: HALOT
  rationale: From פוץ/פוץ-like root in Hiphil with 1cs subject and 3mp object, meaning
    to disperse/scatter. In context of prophetic judgment, English future 'I will
    scatter them' best reflects the force. 'So' captures the prefixed waw as consequential
    in English style.
- source_word: כקש
  chosen: like chaff
  alternatives:
  - like stubble
  lexicon: HALOT
  rationale: קַשׁ commonly denotes straw, stubble, or chaff-like dry refuse. Here
    the simile with wind-driven dispersal favors 'chaff' as the most natural English
    image for something blown away.
- source_word: עובר
  chosen: passing away
  alternatives:
  - passing
  - driven along
  lexicon: HALOT
  rationale: Qal participle of עבר, literally 'passing over/by.' Modifying the chaff,
    it depicts movement along before the wind. 'Passing away' preserves the participial
    sense and the transient image, though the motion is caused by the wind.
- source_word: לרוח
  chosen: before the ... wind
  alternatives:
  - to the wind
  - by the wind
  lexicon: HALOT
  rationale: The preposition ל with רוּחַ here is idiomatic in the image of something
    given over to or borne before the wind. In English, 'before the wind' best conveys
    wind-driven movement.
- source_word: מדבר
  chosen: desert
  alternatives:
  - wilderness
  lexicon: HALOT
  rationale: מִדְבָּר can mean wilderness or desert. Here, with wind imagery in a
    judgment oracle, 'desert' better evokes the hot, harsh, sweeping wind of an arid
    region.
