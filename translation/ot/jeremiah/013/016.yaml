theological_decisions:
- issue: Divine agency in the coming darkness
  chosen_reading: The verse speaks of the LORD actively bringing darkness as judgment.
  alternative_readings:
  - The darkness simply falls or night comes naturally.
  rationale: The Hiphil verb יחשך is best taken causatively, and the subsequent verbs also have God as subject. This preserves the prophetic warning that judgment is from the LORD, not merely a natural circumstance.
