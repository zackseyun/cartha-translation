id: JER.13.16
reference: Jeremiah 13:16
source:
  edition: WLC
  text: תְּנוּ֩ לַ/יהוָ֨ה אֱלֹהֵי/כֶ֤ם כָּבוֹד֙ בְּ/טֶ֣רֶם יַחְשִׁ֔ךְ וּ/בְ/טֶ֛רֶם יִֽתְנַגְּפ֥וּ רַגְלֵי/כֶ֖ם עַל הָ֣רֵי נָ֑שֶׁף וְ/קִוִּיתֶ֤ם לְ/אוֹר֙ וְ/שָׂמָ֣/הּ לְ/צַלְמָ֔וֶת ישית לַ/עֲרָפֶֽל־׃
translation:
  text: Give glory to Yahweh your God before he brings darkness, and before your feet stumble on the mountains at twilight. Then you will hope for light, but he will make it deep darkness; he will turn it into gloom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'he will make it the shadow of death.' The Hebrew term can denote either deathly darkness or very deep darkness.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּנוּ
  chosen: Give
  alternatives:
  - Ascribe
  - Render
  lexicon: HALOT
  rationale: Imperative plural of נתן used idiomatically with כבוד, meaning to give/ascribe glory. 'Give' is natural English and preserves the imperative force.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יהוה is rendered 'the LORD' rather than transliterated.
- source_word: אֱלֹהֵיכֶם
  chosen: your God
  lexicon: HALOT
  rationale: Construct with second person plural suffix; straightforward covenantal address.
- source_word: כָּבוֹד
  chosen: glory
  alternatives:
  - honor
  lexicon: HALOT
  rationale: In the idiom 'give glory,' 'glory' is the standard and strongest rendering, preserving the weight of honor due to God.
- source_word: בְּטֶרֶם
  chosen: before
  alternatives:
  - ere
  lexicon: HALOT
  rationale: Temporal marker meaning 'before' in modern readable English.
- source_word: יַחְשִׁךְ
  chosen: he brings darkness
  alternatives:
  - it grows dark
  - he darkens
  lexicon: HALOT
  rationale: Hiphil of חשׁך suggests causative force. Rendering with explicit subject 'he' fits the following divine actions and preserves the warning that God is the one bringing judgment.
- source_word: יִתְנַגְּפוּ
  chosen: stumble
  alternatives:
  - strike against
  - trip
  lexicon: HALOT
  rationale: Hitpael of נגף here refers to feet striking/stumbling. 'Stumble' is idiomatic and fits the image of hazardous movement in darkness.
- source_word: הָרֵי נָשֶׁף
  chosen: the mountains at twilight
  alternatives:
  - the twilight mountains
  - the mountains in the dusk
  lexicon: HALOT
  rationale: נשף denotes twilight/dusk. The phrase likely means mountains in failing light rather than a fixed place-name. 'At twilight' communicates the temporal danger clearly.
- source_word: וְקִוִּיתֶם לְאוֹר
  chosen: Then you will hope for light
  alternatives:
  - And you will wait for light
  - And you will look for light
  lexicon: HALOT
  rationale: Qavah can mean hope/wait for. In this judgment context, 'hope for light' captures expectation for relief while remaining natural English. 'Then' brings out the sequence implied by waw.
- source_word: וְשָׂמָהּ לְצַלְמָוֶת
  chosen: but he will make it deep darkness
  alternatives:
  - but he will make it the shadow of death
  - but he will turn it into darkness
  lexicon: HALOT
  rationale: The suffix refers back to 'light.' צלמות can denote very deep darkness; while traditionally rendered 'shadow of death,' in many contexts it means profound gloom. Main text uses the more likely sense; traditional alternative is preserved in a footnote.
- source_word: יָשִׁית לַעֲרָפֶל
  chosen: he will turn it into gloom
  alternatives:
  - he will set it as thick darkness
  - he will make it into clouds
  lexicon: HALOT
  rationale: ערפל denotes thick darkness/gloom. 'Turn it into gloom' avoids awkward repetition while preserving the transformation of hoped-for light into oppressive darkness.
