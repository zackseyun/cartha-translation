id: JER.13.23
reference: Jeremiah 13:23
source:
  edition: WLC
  text: הֲ/יַהֲפֹ֤ךְ כּוּשִׁי֙ עוֹר֔/וֹ וְ/נָמֵ֖ר חֲבַרְבֻּרֹתָ֑י/ו גַּם אַתֶּם֙ תּוּכְל֣וּ
    לְ/הֵיטִ֔יב לִמֻּדֵ֖י הָרֵֽעַ־׃
translation:
  text: Can a Cushite change his skin, or a leopard its spots? Then you also can do
    good—you who are trained in doing evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ethiopian.' The Hebrew says 'Cushite,' referring to a person from Cush.
    reason: lexical_alternative
  - marker: b
    text: Literally 'learned/taught of evil,' that is, habituated or trained in doing
      evil.
    reason: lexical_alternative
lexical_decisions:
- source_word: כּוּשִׁי
  chosen: Cushite
  alternatives:
  - Ethiopian
  lexicon: HALOT
  rationale: Rendered as the ethnonym 'Cushite' rather than the traditional 'Ethiopian'
    to reflect the Hebrew term directly and avoid importing a later geographic label
    not present in the text.
- source_word: הֲיַהֲפֹךְ
  chosen: Can ... change
  alternatives:
  - turn
  - reverse
  lexicon: HALOT
  rationale: In this rhetorical question, 'change' best captures the sense of altering
    one's natural condition in idiomatic English.
- source_word: עוֹרוֹ
  chosen: his skin
  alternatives:
  - his hide
  lexicon: HALOT
  rationale: '''Skin'' is the natural and clear English equivalent in this human comparison.'
- source_word: נָמֵר
  chosen: leopard
  lexicon: HALOT
  rationale: Standard lexical equivalent.
- source_word: חֲבַרְבֻּרֹתָיו
  chosen: its spots
  alternatives:
  - its markings
  - its stripes
  lexicon: HALOT
  rationale: The noun refers to the leopard's characteristic markings; 'spots' is
    the conventional and contextually precise rendering.
- source_word: גַּם אַתֶּם תּוּכְלוּ
  chosen: Then you also can
  alternatives:
  - So you also are able to
  - Likewise you also can
  lexicon: HALOT
  rationale: 'The construction draws an analogy from the rhetorical questions to Judah''s
    moral incapacity. ''Then you also can'' preserves the irony: only if the impossible
    first conditions were possible.'
- source_word: לְהֵיטִיב
  chosen: do good
  alternatives:
  - do what is good
  - act well
  lexicon: HALOT
  rationale: A concise and natural rendering of the infinitive meaning to do good
    or act rightly.
- source_word: לִמֻּדֵי הָרֵעַ
  chosen: trained in doing evil
  alternatives:
  - accustomed to doing evil
  - taught evil
  - learned in evil
  lexicon: HALOT
  rationale: The passive/participial form conveys being habituated or trained by practice.
    'Trained in doing evil' communicates entrenched moral conditioning more clearly
    than the archaic 'accustomed' while remaining faithful to the Hebrew.
