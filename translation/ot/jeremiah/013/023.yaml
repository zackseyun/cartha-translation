theological_decisions:
- issue: Moral inability expressed through rhetorical analogy
  chosen_reading: The verse states Judah's entrenched habituation to evil by means
    of an analogy of impossibility, without making a broader systematic-theology claim
    beyond the immediate context.
  alternative_readings:
  - A universal statement about total human inability in every respect
  - A merely hyperbolic statement with no real claim about moral incapacity
  rationale: The Hebrew compares changing ingrained moral practice to changing fixed
    physical traits. The translation preserves the force of the analogy without expanding
    it into a doctrinal formulation not explicit in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
