id: JER.13.2
reference: Jeremiah 13:2
source:
  edition: WLC
  text: וָ/אֶקְנֶ֥ה אֶת הָ/אֵז֖וֹר כִּ/דְבַ֣ר יְהוָ֑ה וָ/אָשִׂ֖ם עַל מָתְנָֽ/י־־׃ס
translation:
  text: So I bought the loincloth according to the word of the LORD, and put it on
    my waist.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'belt' or 'sash'; the Hebrew refers to a waist garment worn close to
      the body.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָ/אֶקְנֶה
  chosen: So I bought
  alternatives:
  - And I bought
  - Then I bought
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cs of קנה, narrating the next action in sequence. 'Bought'
    is the plain sense. 'So' reflects the narrative continuation from the prior command
    and reads naturally in English.
- source_word: הָ/אֵזוֹר
  chosen: the loincloth
  alternatives:
  - the waistband
  - the belt
  - the sash
  lexicon: HALOT
  rationale: אֵזוֹר denotes a waist garment or belt-like linen article. In this context,
    with the prior instruction to wear it and not wash it, 'loincloth' best captures
    a garment worn close to the body rather than a mere accessory. This also aligns
    with the symbolic force in the surrounding passage.
- source_word: כִּ/דְבַר יְהוָה
  chosen: according to the word of the LORD
  alternatives:
  - as the LORD said
  - according to the LORD's word
  lexicon: HALOT
  rationale: Literally 'according to the word of YHWH.' This idiom indicates conformity
    to the divine command. 'According to the word of the LORD' preserves the formal
    flavor while remaining natural English.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name יְהוָה is 'the
    LORD,' following Jewish reverence tradition and common English Bible convention.
- source_word: וָ/אָשִׂם
  chosen: and put
  alternatives:
  - and placed
  - and set
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cs of שׂים, a common verb meaning 'put, place, set.' 'Put'
    is the most natural English equivalent here for putting on a garment.
- source_word: עַל מָתְנָי
  chosen: on my waist
  alternatives:
  - on my loins
  - around my waist
  - on my hips
  lexicon: HALOT
  rationale: מָתְנַיִם refers to the waist/loins. 'On my waist' is clear modern English
    and fits the clothing context. 'Loins' is more formal/literal but sounds archaic
    in contemporary English.
