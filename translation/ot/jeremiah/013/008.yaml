id: JER.13.8
reference: Jeremiah 13:8
source:
  edition: WLC
  text: וַ/יְהִ֥י דְבַר יְהוָ֖ה אֵלַ֥/י לֵ/אמֹֽר־׃
translation:
  text: Then the word of the LORD came to me, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''And it happened, the word of Yahweh came to me, saying.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: Then ... came
  alternatives:
  - And it happened
  - And it came to pass
  lexicon: HALOT
  rationale: The waw-consecutive of היה introduces the next event in narrative sequence.
    In English, 'Then' naturally conveys progression without the archaic feel of 'it
    came to pass.' The verb is carried idiomatically with 'came' in the standard prophetic
    formula.
- source_word: דְבַר יְהוָה
  chosen: the word of the LORD
  alternatives:
  - the message of the LORD
  lexicon: HALOT
  rationale: This is the common prophetic formula. 'Word' preserves the lexical form
    דבר and its established prophetic force better than the more interpretive 'message.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention
    reflecting the Tetragrammaton.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: The preposition with first-person singular suffix straightforwardly means
    'to me.' 'Unto me' is unnecessarily archaic.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thus
  - as follows
  lexicon: HALOT
  rationale: The infinitive construct introduces the following divine speech. 'Saying'
    is the most direct and conventional rendering, and it prepares for the quotation
    in the next verse.
