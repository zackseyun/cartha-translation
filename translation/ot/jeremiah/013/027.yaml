theological_decisions:
- issue: Sexual language as metaphor for covenant unfaithfulness and idolatry
  chosen_reading: Retain the concrete sexual imagery ('adulteries,' 'lustful neighings,'
    'prostitution') in the main text.
  alternative_readings:
  - Soften to more abstract terms such as 'unfaithfulness' or 'immorality'
  rationale: Jeremiah intentionally uses shocking sexual imagery to portray Judah/Jerusalem's
    covenant infidelity and idolatry. Softening the language would mute the prophetic
    force and import interpretation into translation.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Force of לֹא תִטְהֲרִי
  chosen_reading: 'Render as a rhetorical question: ''Will you not be made clean?'''
  alternative_readings:
  - 'Indicative: ''You will not be made clean'''
  rationale: In context, the exclamation over Jerusalem followed by אַחֲרֵי מָתַי
    עוֹד naturally reads as an anguished rhetorical question rather than a flat prediction.
    This preserves the tension of judgment and appeal without over-resolving it.
  doctrine_reference: Translation philosophy §3
