id: JER.13.27
reference: Jeremiah 13:27
source:
  edition: WLC
  text: נִֽאֻפַ֤יִ/ךְ וּ/מִצְהֲלוֹתַ֨יִ/ךְ֙ זִמַּ֣ת זְנוּתֵ֔/ךְ עַל גְּבָעוֹת֙ בַּ/שָּׂדֶ֔ה
    רָאִ֖יתִי שִׁקּוּצָ֑יִ/ךְ א֥וֹי לָ/ךְ֙ יְר֣וּשָׁלִַ֔ם לֹ֣א תִטְהֲרִ֔י אַחֲרֵ֥י
    מָתַ֖י עֹֽד־׃פ
translation:
  text: Your adulteries, your lustful neighings, the depravity of your prostitution
    on the hills in the field—I have seen your abominations. Woe to you, Jerusalem!
    Will you not be made clean? How long will it still be?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lewdness of your whoredom.' The Hebrew combines terms for depravity/lewdness
      and prostitution.
    reason: lexical_alternative
  - marker: b
    text: '''Lustful neighings'' echoes the horse imagery of sexual craving used elsewhere
      in Jeremiah.'
    reason: cross_reference
  - marker: c
    text: Or 'Will you not become clean?' The Hebrew may also be understood less passively.
    reason: alternative_reading
  - marker: d
    text: 'Hebrew is elliptical: literally, ''after when/still?'' meaning ''How much
      longer?'''
    reason: lexical_alternative
lexical_decisions:
- source_word: נִאֻפַיִךְ
  chosen: your adulteries
  alternatives:
  - your adulterous acts
  lexicon: HALOT
  rationale: Plural noun from נאף refers to acts of adultery. 'Adulteries' preserves
    the plural and the sexual-infidelity metaphor applied to Jerusalem.
- source_word: וּמִצְהֲלוֹתַיִךְ
  chosen: your lustful neighings
  alternatives:
  - your neighings
  - your wanton neighings
  lexicon: HALOT
  rationale: From צהל in this context evokes the horse-neighing sexual image used
    in Jeremiah (cf. 5:8). 'Lustful neighings' makes the metaphor intelligible in
    English without losing the vividness.
- source_word: זִמַּת זְנוּתֵךְ
  chosen: the depravity of your prostitution
  alternatives:
  - the lewdness of your prostitution
  - the scheme of your whoredom
  lexicon: HALOT
  rationale: זִמָּה can denote wickedness, lewdness, or depraved intent; with זְנוּת
    it intensifies sexual/moral corruption. 'Depravity of your prostitution' is natural
    modern English and preserves the moral force without archaic 'whoredom' in the
    main text.
- source_word: עַל גְּבָעוֹת בַּשָּׂדֶה
  chosen: on the hills in the field
  alternatives:
  - on the hills in the open country
  - on the hills out in the field
  lexicon: HALOT
  rationale: Retains the topographical setting associated with illicit/idolatrous
    activity. 'In the field' is formally close, though somewhat idiomatic in English.
- source_word: רָאִיתִי
  chosen: I have seen
  alternatives:
  - I saw
  lexicon: HALOT
  rationale: Perfect can be rendered as simple past or present perfect. 'I have seen'
    fits the accusatory, present-relevance force of the divine declaration.
- source_word: שִׁקּוּצַיִךְ
  chosen: your abominations
  alternatives:
  - your detestable things
  lexicon: HALOT
  rationale: Standard rendering for שִׁקּוּץ, often used for idolatrous abominations.
    'Abominations' preserves the prophetic register and likely cultic overtones.
- source_word: אוֹי לָךְ
  chosen: Woe to you
  alternatives:
  - Alas for you
  lexicon: HALOT
  rationale: Prophetic lament/judgment formula; 'Woe to you' is the most idiomatic
    and recognizable equivalent.
- source_word: לֹא תִטְהֲרִי
  chosen: Will you not be made clean?
  alternatives:
  - Will you not become clean?
  - You will not be clean
  lexicon: HALOT
  rationale: The clause is best taken as a rhetorical question in context, as reflected
    by the following 'How long...?' Niphal/imperfect of טהר can be rendered statively/passively;
    'be made clean' preserves the passive nuance and the moral-ritual sense.
- source_word: אַחֲרֵי מָתַי עוֹד
  chosen: How long will it still be?
  alternatives:
  - How much longer?
  - After how long yet?
  lexicon: HALOT
  rationale: Idiomatic rendering of the temporal lament. The Hebrew is elliptical;
    'How long will it still be?' conveys the sense, though the implied object is Jerusalem's
    uncleanness/refusal to be cleansed.
