id: JER.13.20
reference: Jeremiah 13:20
source:
  edition: WLC
  text: שאי עֵֽינֵי/כֶם֙ ו/ראי הַ/בָּאִ֖ים מִ/צָּפ֑וֹן אַיֵּ֗ה הָ/עֵ֨דֶר֙ נִתַּן לָ֔/ךְ
    צֹ֖אן תִּפְאַרְתֵּֽ/ךְ־׃
translation:
  text: Lift up your eyes and see those who are coming from the north. Where is the
    flock that was given to you, your beautiful sheep?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your glorious sheep.' The Hebrew expression can denote beauty, splendor,
      or glory.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאִי
  chosen: Lift up
  alternatives:
  - Raise
  lexicon: HALOT
  rationale: Imperative feminine singular from נשׂא, here idiomatically used with
    'eyes' to mean lifting or raising one's gaze. 'Lift up' is natural English and
    preserves the concrete imagery.
- source_word: עֵינֵיכֶם
  chosen: your eyes
  lexicon: HALOT
  rationale: Literal rendering of 'your eyes.' Although the suffix is 2mp while the
    surrounding imperatives are feminine singular, the phrase is best carried over
    directly; the mixed forms likely reflect address to Jerusalem/Zion with a collective
    nuance or a textual irregularity, but no emendation is necessary in translation.
- source_word: וּרְאִי
  chosen: and see
  alternatives:
  - look
  lexicon: HALOT
  rationale: Imperative feminine singular from ראה. 'See' preserves the directness
    of the Hebrew; 'look' is possible but slightly more interpretive.
- source_word: הַבָּאִים
  chosen: those who are coming
  alternatives:
  - the ones coming
  - those coming
  lexicon: HALOT
  rationale: Substantival participle plural, referring to approaching invaders or
    arrivals. 'Those who are coming' is clear and preserves the participial force.
- source_word: מִצָּפוֹן
  chosen: from the north
  lexicon: HALOT
  rationale: Straightforward geographical expression. In Jeremiah this often carries
    ominous connotations of invasion, but those are contextually implied rather than
    made explicit in the wording.
- source_word: אַיֵּה
  chosen: Where is
  alternatives:
  - Where then is
  lexicon: HALOT
  rationale: Interrogative of location. Simple 'Where is' best matches the Hebrew.
- source_word: הָעֵדֶר
  chosen: the flock
  alternatives:
  - the herd
  lexicon: HALOT
  rationale: עֵדֶר commonly denotes a flock, especially of sheep. 'Flock' fits the
    following צאן and the pastoral metaphor.
- source_word: נִתַּן לָךְ
  chosen: that was given to you
  alternatives:
  - given to you
  lexicon: HALOT
  rationale: Passive perfect sense from נתן. The relative clause in English makes
    the sentence natural while preserving the passive idea that the flock was entrusted
    to her.
- source_word: צֹאן
  chosen: sheep
  alternatives:
  - flock
  lexicon: HALOT
  rationale: Specific livestock term, often sheep/small livestock. Since 'flock' already
    renders עֵדֶר, 'sheep' avoids redundancy and preserves the appositional force.
- source_word: תִּפְאַרְתֵּךְ
  chosen: your beautiful
  alternatives:
  - your glory
  - your splendid
  lexicon: HALOT
  rationale: From תפארת, denoting beauty, glory, or splendor. Here it modifies the
    flock/sheep as something splendid and prized. 'Your beautiful sheep' is idiomatic
    English; 'your glorious sheep' would sound unnatural, though 'glory' is a viable
    lexical alternative worth preserving.
