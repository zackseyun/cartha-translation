theological_decisions:
- issue: Metaphorical referent of the flock
  chosen_reading: Retain the pastoral metaphor without making the referent explicit
    in the main text.
  alternative_readings:
  - The flock refers to the people of Judah/Jerusalem entrusted to the city or its
    rulers.
  - The flock refers more specifically to royal subjects or the nation under Jerusalem's
    care.
  rationale: The Hebrew presents the image without unpacking it. To preserve the text's
    rhetorical force and avoid importing a narrower interpretation than the verse
    itself states, the translation leaves the metaphor intact.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
