theological_decisions:
- issue: Identification of פְרָת
  chosen_reading: the Euphrates
  alternative_readings:
  - Perath as an untranslated/local toponym
  rationale: The plain lexical value of פְרָת is the Euphrates, and this is the standard
    rendering. However, because some interpreters argue for a nearer site named Perath
    due to geographical considerations in the larger narrative, the alternative is
    preserved in a footnote rather than resolved dogmatically beyond the lexical default.
  doctrine_reference: Translation philosophy §1, §3
