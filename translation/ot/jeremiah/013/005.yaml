id: JER.13.5
reference: Jeremiah 13:5
source:
  edition: WLC
  text: וָ/אֵלֵ֕ךְ וָ/אֶטְמְנֵ֖/הוּ בִּ/פְרָ֑ת כַּ/אֲשֶׁ֛ר צִוָּ֥ה יְהוָ֖ה אוֹתִֽ/י׃
translation:
  text: So I went and hid it by the Euphrates, as the LORD had commanded me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew Perath, usually understood as the Euphrates; some take it as a local
      place-name 'Perath.'
    reason: alternative_reading
lexical_decisions:
- source_word: וָ/אֵלֵךְ
  chosen: So I went
  alternatives:
  - And I went
  - Then I went
  lexicon: HALOT
  rationale: Wayyiqtol of הלך advances the narrative. 'So I went' gives natural English
    narrative progression while preserving the sequential force.
- source_word: וָ/אֶטְמְנֵ֖/הוּ
  chosen: hid it
  alternatives:
  - buried it
  - concealed it
  lexicon: HALOT
  rationale: From טמן, 'hide/conceal,' with 3ms suffix referring to the waistband/sash
    from the prior context. 'Hid it' is the broadest and most contextually fitting
    rendering; 'buried it' would over-specify the manner.
- source_word: בִּ/פְרָ֑ת
  chosen: by the Euphrates
  alternatives:
  - at Perath
  - by Perath
  lexicon: HALOT
  rationale: פְרָת is the proper name traditionally identified as the Euphrates. The
    preposition ב can be rendered flexibly in English here; 'by' fits the action of
    hiding near a location better than a wooden 'in.' Because the identification of
    Perath is discussed by interpreters, the more literal alternative is preserved
    in a footnote.
- source_word: כַּ/אֲשֶׁ֛ר
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: HALOT
  rationale: 'Introduces comparison/manner: Jeremiah acted in accordance with the
    command. ''As'' is concise and natural.'
- source_word: צִוָּ֥ה
  chosen: had commanded
  alternatives:
  - commanded
  lexicon: HALOT
  rationale: English past perfect smoothly reflects the prior command relative to
    Jeremiah's action, though simple past would also be acceptable.
- source_word: יְהוָ֖ה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of יְהוָה is 'the LORD,' following
    established reverential convention and LXX-influenced English Bible practice.
- source_word: אוֹתִֽ/י
  chosen: me
  lexicon: HALOT
  rationale: Direct object marker with 1cs suffix after 'commanded'; idiomatic English
    requires simply 'me.'
