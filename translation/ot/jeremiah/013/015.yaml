id: JER.13.15
reference: Jeremiah 13:15
source:
  edition: WLC
  text: שִׁמְע֥וּ וְ/הַאֲזִ֖ינוּ אַל תִּגְבָּ֑הוּ כִּ֥י יְהוָ֖ה דִּבֵּֽר־׃
translation:
  text: Hear and listen; do not be proud, for Yahweh has spoken.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not be haughty' or 'do not exalt yourselves.' The Hebrew verb can denote being high in the sense of arrogance.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Imperative plural of שׁמע. Rendered 'Hear' to preserve the first command distinctly before the near-synonymous second imperative, allowing the Hebrew rhetorical doubling to stand in English.
- source_word: וְהַאֲזִינוּ
  chosen: and listen
  alternatives:
  - and give ear
  - and pay attention
  lexicon: HALOT
  rationale: Hiphil imperative of אזן carries the sense of giving ear attentively. 'And listen' is natural modern English and preserves the intensification alongside 'Hear.'
- source_word: אַל
  chosen: do not
  alternatives:
  - must not
  lexicon: HALOT
  rationale: Standard negative particle used with a jussive/imperfect for prohibition. 'Do not' best reflects the direct prohibitive force.
- source_word: תִּגְבָּהוּ
  chosen: be proud
  alternatives:
  - be haughty
  - exalt yourselves
  lexicon: HALOT
  rationale: From גבהּ, 'to be high/exalted,' here in a moral sense of arrogance. 'Be proud' is idiomatic and clear in modern English; 'be haughty' is possible but less natural, while 'exalt yourselves' is more interpretive.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition. 'For' is concise and fits the prophetic tone.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: דִּבֵּר
  chosen: has spoken
  alternatives:
  - has said
  - spoke
  lexicon: HALOT
  rationale: Perfect of דבר. 'Has spoken' conveys the completed divine utterance with present relevance in English and suits prophetic proclamation.
