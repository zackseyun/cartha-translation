id: JER.13.17
reference: Jeremiah 13:17
source:
  edition: WLC
  text: וְ/אִם֙ לֹ֣א תִשְׁמָע֔וּ/הָ בְּ/מִסְתָּרִ֥ים תִּבְכֶּֽה נַפְשִׁ֖/י מִ/פְּנֵ֣י
    גֵוָ֑ה וְ/דָמֹ֨עַ תִּדְמַ֜ע וְ/תֵרַ֤ד עֵינִ/י֙ דִּמְעָ֔ה כִּ֥י נִשְׁבָּ֖ה עֵ֥דֶר
    יְהוָֽה־׃ס
translation:
  text: But if you will not listen to it, my soul will weep in secret because of pride;
    my eyes will weep bitterly and run down with tears, because the flock of the LORD
    has been taken captive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hear it' or 'obey it'; the Hebrew verb can carry both the sense of hearing
      and heeding.
    reason: lexical_alternative
  - marker: b
    text: Literally 'in hidden places.'
    reason: lexical_alternative
  - marker: c
    text: Or 'because of arrogance.'
    reason: lexical_alternative
  - marker: d
    text: 'The Hebrew intensifies the verb: ''weeping, it will weep.'''
    reason: lexical_alternative
  - marker: e
    text: Or 'the LORD's flock.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׁמָעוּהָ
  chosen: you will not listen to it
  alternatives:
  - you will not hear it
  - you will not obey it
  lexicon: HALOT
  rationale: שׁמע can mean hear, listen, or obey depending on context. Here Jeremiah
    has just urged the people to give glory to the LORD and heed prophetic warning,
    so 'listen to it' preserves the auditory sense while allowing the implied obedience.
    The 3fs suffix most naturally refers back to the preceding message/word rather
    than a feminine person.
- source_word: בְּמִסְתָּרִים
  chosen: in secret
  alternatives:
  - in hidden places
  - secretly
  lexicon: HALOT
  rationale: The plural noun literally means 'in hidden places,' but idiomatic English
    is better served by 'in secret.' This preserves the sense of concealed mourning
    without over-literal awkwardness.
- source_word: תִּבְכֶּה נַפְשִׁי
  chosen: my soul will weep
  alternatives:
  - I will weep
  - my inner being will weep
  lexicon: HALOT
  rationale: Retaining 'my soul' reflects the Hebrew נפשׁ and preserves the emotional
    depth and personified inner anguish of the prophet, rather than flattening it
    to a simple 'I will weep.'
- source_word: מִפְּנֵי גֵוָה
  chosen: because of pride
  alternatives:
  - because of arrogance
  - before pride
  lexicon: HALOT
  rationale: 'The phrase indicates cause: the prophet weeps on account of the people''s
    pride. ''Pride'' is the most natural rendering of גֵוָה here; ''arrogance'' is
    possible but less direct. ''Before pride'' is too literal and less coherent in
    context.'
- source_word: וְדָמֹעַ תִּדְמַע
  chosen: will weep bitterly
  alternatives:
  - will surely weep
  - will weep and weep
  lexicon: HALOT
  rationale: The infinitive absolute with finite verb intensifies the action. English
    can represent this by an adverbial intensifier. 'Will weep bitterly' captures
    both intensity and lament tone more naturally than a wooden repetition.
- source_word: וְתֵרַד עֵינִי דִּמְעָה
  chosen: my eyes will ... run down with tears
  alternatives:
  - my eye will go down in tears
  - my eye will shed tears
  lexicon: HALOT
  rationale: The singular 'my eye' is a Hebrew collective/poetic singular. English
    idiom prefers 'my eyes.' 'Run down with tears' reflects ירד ('go down') and preserves
    the vivid image of tears streaming.
- source_word: נִשְׁבָּה
  chosen: has been taken captive
  alternatives:
  - has been captured
  - has gone into exile
  lexicon: HALOT
  rationale: The Niphal of שׁבה commonly denotes being taken captive. 'Taken captive'
    is more precise than merely 'captured' and avoids importing the broader exile
    concept beyond the lexical value.
- source_word: עֵדֶר יְהוָה
  chosen: the flock of the LORD
  alternatives:
  - the LORD's flock
  lexicon: HALOT
  rationale: The construct phrase denotes the people belonging to YHWH under a shepherd-flock
    metaphor. 'The flock of the LORD' preserves the imagery clearly and follows the
    project's default rendering of יְהוָה as 'the LORD'.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per project doctrine, the default rendering of the divine name is 'the
    LORD,' following Jewish reverence tradition and longstanding English convention.
