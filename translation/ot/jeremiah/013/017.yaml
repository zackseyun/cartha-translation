theological_decisions:
- issue: Referent of the feminine suffix in תִשְׁמָעוּהָ
  chosen_reading: The suffix refers to the prophetic message/word just spoken
  alternative_readings:
  - The suffix refers more generally to the warning
  - The suffix could be taken as an unusual object marker with little independent
    force
  rationale: The immediate context is Jeremiah's appeal that the people heed the warning
    and humble themselves. Rendering 'listen to it' preserves the feminine pronominal
    object without over-specifying beyond context.
- issue: Voice of the lament
  chosen_reading: The speaker is Jeremiah expressing personal grief over Judah's pride
    and coming captivity
  alternative_readings:
  - The lament may also be heard as reflecting the LORD's own grief through the prophet
  rationale: The first-person language naturally presents the prophet's own lament,
    yet the prophetic role allows divine pathos to resonate through his speech. The
    translation keeps the first-person lament without resolving that theological depth
    beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
