id: JER.13.12
reference: Jeremiah 13:12
source:
  edition: WLC
  text: וְ/אָמַרְתָּ֨ אֲלֵי/הֶ֜ם אֶת הַ/דָּבָ֣ר הַ/זֶּ֗ה כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י
    יִשְׂרָאֵ֔ל כָּל נֵ֖בֶל יִמָּ֣לֵא יָ֑יִן וְ/אָמְר֣וּ אֵלֶ֔י/ךָ הֲ/יָדֹ֨עַ֙ לֹ֣א
    נֵדַ֔ע כִּ֥י כָל נֵ֖בֶל יִמָּ֥לֵא יָֽיִן־ס־־־׃
translation:
  text: 'So you shall say to them this word: Thus says the LORD, the God of Israel,
    ‘Every jar will be filled with wine.’ And they will say to you, ‘Do we not certainly
    know that every jar will be filled with wine?’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Every wineskin will be filled with wine.' The Hebrew נֵבֶל can refer
      to a liquid container such as a skin-bottle or jar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  chosen: So you shall say
  alternatives:
  - And you shall say
  - Then you shall say
  lexicon: HALOT
  rationale: The conjunction plus qatal with directive force in prophetic discourse
    is naturally rendered as a forward-moving instruction. 'So' fits readable modern
    English while preserving the sequence.
- source_word: אֶת־הַדָּבָר הַזֶּה
  chosen: this word
  alternatives:
  - this message
  - these words
  lexicon: HALOT
  rationale: דָּבָר commonly means 'word' or 'message.' Singular with demonstrative
    is best kept as 'this word' to stay close to the Hebrew while remaining idiomatic
    in prophetic speech.
- source_word: כֹּה אָמַר
  chosen: Thus says
  alternatives:
  - This is what ... says
  - Thus has said
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'Thus says' preserves the formal
    prophetic register without archaic excess.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  alternatives:
  - Israel's God
  lexicon: HALOT
  rationale: A straightforward construct phrase; 'the God of Israel' is the most transparent
    and conventional rendering.
- source_word: כָּל נֵבֶל
  chosen: Every jar
  alternatives:
  - Every wineskin
  - Every vessel
  - Every bottle
  lexicon: HALOT
  rationale: נֵבֶל can denote a container for liquids, often a skin-bottle or jar.
    Here the saying functions proverbially and sets up a symbolic action about containers
    being filled. 'Jar' is a clear modern term that avoids over-specifying leather
    wineskins while preserving the image of a storage vessel.
- source_word: יִמָּלֵא יָיִן
  chosen: will be filled with wine
  alternatives:
  - shall be filled with wine
  - will be full of wine
  lexicon: HALOT
  rationale: The Niphal imperfect expresses a future/passive sense. 'Will be filled
    with wine' closely reflects the Hebrew syntax and imagery.
- source_word: הֲיָדֹעַ לֹא נֵדַע
  chosen: Do we not certainly know
  alternatives:
  - Do we not indeed know
  - Surely we know
  - Do we not know
  lexicon: HALOT
  rationale: The interrogative plus infinitive absolute and finite verb intensifies
    the verb ידע. English can reflect this with 'certainly' or 'indeed.' I chose 'Do
    we not certainly know' to preserve both the rhetorical question and the emphatic
    force.
- source_word: וְאָמְרוּ אֵלֶיךָ
  chosen: And they will say to you
  alternatives:
  - And they shall say to you
  lexicon: HALOT
  rationale: Simple narrative continuation; 'will say to you' is natural modern English.
