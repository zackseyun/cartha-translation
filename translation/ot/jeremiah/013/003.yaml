id: JER.13.3
reference: Jeremiah 13:3
source:
  edition: WLC
  text: וַ/יְהִ֧י דְבַר יְהוָ֛ה אֵלַ֖/י שֵׁנִ֥ית לֵ/אמֹֽר־׃
translation:
  text: And the word of Yahweh came to me a second time, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH''; traditionally rendered ''the LORD.'''
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  chosen: came
  alternatives:
  - was
  - happened
  lexicon: HALOT
  rationale: Although the clause literally begins 'and it was,' in the prophetic formula ויהי דבר־יהוה אלי the idiomatic English rendering is 'the word of the LORD came to me.' This preserves the standard Hebrew sense without woodenly reproducing an English unnatural 'and it was.'
- source_word: דְבַר
  chosen: the word
  alternatives:
  - message
  - matter
  lexicon: HALOT
  rationale: In the prophetic expression דְבַר יְהוָה, 'word' is the most direct and established rendering, preserving both lexical form and the sense of divine revelation.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֵלַי
  chosen: to me
  alternatives:
  - unto me
  lexicon: HALOT
  rationale: 'The preposition plus first-person suffix straightforwardly indicates direction toward Jeremiah: ''to me.'' ''Unto me'' is unnecessarily archaic.'
- source_word: שֵׁנִית
  chosen: a second time
  alternatives:
  - again
  - secondly
  lexicon: HALOT
  rationale: The adverb here marks repetition of the divine word. 'A second time' is more explicit than 'again' and closely matches the Hebrew.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - thus saying
  lexicon: HALOT
  rationale: This infinitive introduces the following divine speech in standard Hebrew narrative style. 'Saying' is the natural and sufficiently formal English equivalent.
