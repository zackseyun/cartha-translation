theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies 'the LORD' as the default rendering for
    YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Gendered kinship language
  chosen_reading: man against his brother ... fathers and sons together
  alternative_readings:
  - one against another ... parents and children together
  rationale: The translation follows the gender-accurate policy because the Hebrew
    uses masculine singular and explicitly male kinship terms. The text's shock value
    includes the rupture of named family bonds, so neutralization would lose detail.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
