id: JER.13.14
reference: Jeremiah 13:14
source:
  edition: WLC
  text: וְ/נִפַּצְתִּי/ם֩ אִ֨ישׁ אֶל אָחִ֜י/ו וְ/הָ/אָב֧וֹת וְ/הַ/בָּנִ֛ים יַחְדָּ֖ו
    נְאֻם יְהוָ֑ה לֹֽא אֶחְמ֧וֹל וְ/לֹֽא אָח֛וּס וְ/לֹ֥א אֲרַחֵ֖ם מֵ/הַשְׁחִיתָֽ/ם־־־־׃ס
translation:
  text: And I will smash them against each other, man against his brother, fathers
    and sons together, declares the LORD. I will not spare, nor will I pity, nor will
    I have compassion from destroying them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dash them against each other' or 'shatter them against each other.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'man against his brother,' preserving the masculine singular and
      kinship language.
    reason: cultural_note
lexical_decisions:
- source_word: וְנִפַּצְתִּים
  chosen: And I will smash them
  alternatives:
  - And I will dash them
  - And I will shatter them
  lexicon: HALOT
  rationale: The verb from נפץ conveys violent breaking or smashing. 'Smash' preserves
    the force and concreteness better than the softer 'scatter' and is idiomatic in
    English for persons being driven violently against one another.
- source_word: אִישׁ אֶל אָחִיו
  chosen: man against his brother
  alternatives:
  - each man against his brother
  - one against another
  lexicon: HALOT
  rationale: This is a distributive singular construction. 'Man against his brother'
    preserves the masculine singular wording and the interpersonal violence. It is
    more source-near than the generalized 'one against another.'
- source_word: וְהָאָבוֹת וְהַבָּנִים יַחְדָּו
  chosen: fathers and sons together
  alternatives:
  - both fathers and sons together
  - parents and children together
  lexicon: HALOT
  rationale: The Hebrew explicitly names male family relations, not a gender-neutral
    pair. 'Fathers and sons together' is therefore gender-accurate and preserves the
    intensification that even close kin will be involved.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This prophetic formula is naturally rendered 'declares the LORD' in modern
    English. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: לֹא אֶחְמֹל
  chosen: I will not spare
  alternatives:
  - I will not have pity
  lexicon: HALOT
  rationale: חמל commonly carries the sense of sparing or refraining from destruction
    out of pity. 'Spare' fits the judgment context and avoids redundancy with the
    following compassion terms.
- source_word: וְלֹא אָחוּס
  chosen: nor will I pity
  alternatives:
  - nor will I look with pity
  - nor will I spare
  lexicon: HALOT
  rationale: חוס overlaps with pity/spare, but here a differentiated English rendering
    helps reflect the rhetorical piling up of near-synonyms without collapsing them
    into identical wording.
- source_word: וְלֹא אֲרַחֵם
  chosen: nor will I have compassion
  alternatives:
  - nor will I show mercy
  - nor will I be compassionate
  lexicon: HALOT
  rationale: רחם denotes compassion or mercy at an emotional level. 'Have compassion'
    preserves the lexical connection without importing specifically covenantal overtones
    beyond the text.
- source_word: מֵהַשְׁחִיתָם
  chosen: from destroying them
  alternatives:
  - so as not to destroy them
  - from ruining them
  lexicon: HALOT
  rationale: 'The preposition מִן with the infinitive expresses withholding from an
    action: God will not spare/pity/compassionately refrain from destroying them.
    ''From destroying them'' is a literal and intelligible rendering in English, preserving
    the syntax''s force.'
