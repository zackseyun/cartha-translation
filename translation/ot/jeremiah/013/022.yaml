theological_decisions:
- issue: Prophetic shame imagery and sexualized exposure
  chosen_reading: Retain the metaphor of public humiliation and violation without
    softening it into mere embarrassment or over-specifying a sexual act not explicitly
    stated.
  alternative_readings:
  - Render more euphemistically as 'your nakedness is exposed'
  - Render more explicitly as sexual assault imagery
  rationale: The verse uses severe covenant-judgment imagery directed at Jerusalem/Zion
    as a feminine singular addressee. The translation should preserve the gravity
    and shame of the metaphor while not importing details beyond the Hebrew wording.
  doctrine_reference: Translation philosophy §§1, 3, 6
