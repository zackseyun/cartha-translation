id: JER.13.22
reference: Jeremiah 13:22
source:
  edition: WLC
  text: וְ/כִ֤י תֹאמְרִי֙ בִּ/לְבָבֵ֔/ךְ מַדּ֖וּעַ קְרָאֻ֣/נִי אֵ֑לֶּה בְּ/רֹ֧ב עֲוֺנֵ֛/ךְ
    נִגְל֥וּ שׁוּלַ֖יִ/ךְ נֶחְמְס֥וּ עֲקֵבָֽיִ/ךְ׃
translation:
  text: And if you say in your heart, ‘Why have these things happened to me?’—because
    of the greatness of your iniquity your skirts have been uncovered, your heels
    have been violated.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Why have these things come upon me?'
    reason: lexical_alternative
  - marker: b
    text: '''Your heels have been violated'' continues the imagery of humiliating
      exposure; the Hebrew may also be understood more generally as violent mistreatment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי
  chosen: And if
  alternatives:
  - But if
  - For if
  - And when
  lexicon: HALOT
  rationale: The conjunction plus particle introduces a conditional or anticipated
    objection within the discourse. 'And if' preserves the flow from the previous
    verse and the rhetorical setup without overinterpreting it as strictly temporal
    ('when') or causal ('for').
- source_word: תֹאמְרִי בִּלְבָבֵךְ
  chosen: you say in your heart
  alternatives:
  - you say to yourself
  - you think
  lexicon: HALOT
  rationale: A literal rendering best preserves the Hebrew idiom of inward speech.
    'In your heart' is natural enough in English and retains the biblical register
    better than the more interpretive 'you think.'
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  - Why is it
  lexicon: HALOT
  rationale: Direct interrogative 'Why' is the plain sense and fits the rhetorical
    question naturally.
- source_word: קְרָאֻנִי אֵלֶּה
  chosen: have these things happened to me
  alternatives:
  - have these come upon me
  - have these called me
  lexicon: HALOT
  rationale: Although the verb is from קרא, in this passive/plural construction with
    'these' and first-person suffix, the idiomatic sense is that these calamities
    have come upon the speaker. 'Happened to me' is clear modern English; the more
    formal 'come upon me' is preserved as an alternative.
- source_word: בְּרֹב עֲוֺנֵךְ
  chosen: because of the greatness of your iniquity
  alternatives:
  - because of your great iniquity
  - through the abundance of your guilt
  lexicon: HALOT
  rationale: בְּ with רֹב here expresses cause or basis. 'Greatness' reflects the
    noun רֹב, while 'iniquity' preserves the moral and covenantal weight of עָוֹן
    better than the flatter 'wrongdoing' or the more forensic 'guilt' alone.
- source_word: נִגְלוּ שׁוּלַיִךְ
  chosen: your skirts have been uncovered
  alternatives:
  - your hems have been uncovered
  - your train has been lifted
  lexicon: HALOT
  rationale: שׁוּלַיִם refers to the lower edges or skirts of a garment. In this prophetic
    shame imagery, 'skirts' is the most idiomatic English choice and preserves the
    metaphor of public exposure.
- source_word: נֶחְמְסוּ עֲקֵבָיִךְ
  chosen: your heels have been violated
  alternatives:
  - your heels have been treated violently
  - your heels have been bared
  - your feet have been abused
  lexicon: HALOT
  rationale: The verb חמס in the Niphal conveys being wronged, violated, or treated
    violently. With 'heels,' the line continues the imagery of humiliating exposure.
    'Violated' best captures the force without flattening it to mere physical uncovering,
    while leaving the exact nuance somewhat open as in the Hebrew.
