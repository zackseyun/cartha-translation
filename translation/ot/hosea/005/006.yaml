id: HOS.5.6
reference: Hosea 5:6
source:
  edition: WLC
  text: בְּ/צֹאנָ֣/ם וּ/בִ/בְקָרָ֗/ם יֵֽלְכ֛וּ לְ/בַקֵּ֥שׁ אֶת יְהוָ֖ה וְ/לֹ֣א יִמְצָ֑אוּ
    חָלַ֖ץ מֵ/הֶֽם־׃
translation:
  text: With their flocks and with their herds they will go to seek the LORD, but
    they will not find him; he has withdrawn from them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he has departed from them' or 'he has removed himself from them.'
    reason: lexical_alternative
  - marker: b
    text: The mention of flocks and herds likely implies coming with sacrificial animals
      to seek the LORD.
    reason: cultural_note
lexical_decisions:
- source_word: בְּצֹאנָם
  chosen: with their flocks
  alternatives:
  - by their flocks
  - in/with their sheep
  lexicon: HALOT
  rationale: צֹאן denotes small livestock, especially sheep and goats; 'flocks' is
    the natural collective English rendering. The prefixed ב here is instrumental/accompaniment,
    best rendered 'with.'
- source_word: וּבִבְקָרָם
  chosen: and with their herds
  alternatives:
  - and with their cattle
  lexicon: HALOT
  rationale: בָּקָר refers to cattle/herd animals. 'Herds' pairs idiomatically with
    'flocks' and preserves the distinction between small and large livestock.
- source_word: יֵלְכוּ
  chosen: they will go
  alternatives:
  - they go
  - they shall go
  lexicon: HALOT
  rationale: 'Qal imperfect 3mp here is naturally future in prophetic discourse: the
    people will go in an attempt to seek YHWH.'
- source_word: לְבַקֵּשׁ
  chosen: to seek
  alternatives:
  - to look for
  lexicon: HALOT
  rationale: בקש commonly means 'seek' in religious contexts, especially seeking God.
    'Seek' preserves the covenantal and theological resonance.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding English convention.
- source_word: וְלֹא יִמְצָאוּ
  chosen: but they will not find him
  alternatives:
  - and they will not find
  - but they will not find
  lexicon: HALOT
  rationale: מצא with God as object means to find/access him favorably. English idiom
    prefers explicit object 'him,' though it is implied in Hebrew. 'But' captures
    the adversative force in context.
- source_word: חָלַץ מֵהֶם
  chosen: he has withdrawn from them
  alternatives:
  - he has removed himself from them
  - he has departed from them
  - he has delivered himself from them
  lexicon: HALOT
  rationale: 'חלץ in this context conveys drawing away/removing oneself. ''Withdrawn''
    best fits the relational and judicial sense: YHWH is no longer available to their
    ritual seeking. The perfect is rendered ''has withdrawn'' to express completed
    action with present consequence.'
