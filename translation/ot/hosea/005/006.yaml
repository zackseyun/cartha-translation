theological_decisions:
- issue: Divine name rendering
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the covenant name יְהוָה. Per project doctrine, this is
    rendered 'the LORD' rather than transliterated forms.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nature of Israel's seeking
  chosen_reading: Their sacrificial approach is portrayed as ineffective because the
    LORD has already withdrawn, not because seeking God is inherently futile.
  alternative_readings:
  - The verse could be read more woodenly without making the implied sacrificial context
    explicit.
  rationale: Mention of flocks and herds indicates an approach with sacrificial animals.
    The translation keeps this implicit in the main text while allowing the context
    to explain why they seek with livestock yet fail to find him.
