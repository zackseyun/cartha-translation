theological_decisions:
- issue: Whether to make explicit that Ephraim represents the northern kingdom
  chosen_reading: Retain 'Ephraim' without expansion
  alternative_readings:
  - The northern kingdom/Israel will become a desolation
  rationale: The Hebrew names Ephraim directly. Since the metonymic force is contextually
    available, expanding it in the main text would import interpretation beyond the
    wording. Transparency favors keeping the proper name.
  doctrine_reference: Translation philosophy §1, §5
- issue: How strongly to render תּוֹכֵחָה in a judgment context
  chosen_reading: rebuke
  alternative_readings:
  - punishment
  - judgment
  rationale: Although the context is punitive, the noun itself is more literally 'rebuke/reproof.'
    Preserving that wording maintains lexical fidelity and lets the prophetic context
    supply the judicial weight rather than resolving it interpretively.
  doctrine_reference: Translation philosophy §3
