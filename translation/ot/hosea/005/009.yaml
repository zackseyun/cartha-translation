id: HOS.5.9
reference: Hosea 5:9
source:
  edition: WLC
  text: אֶפְרַ֨יִם֙ לְ/שַׁמָּ֣ה תִֽהְיֶ֔ה בְּ/י֖וֹם תּֽוֹכֵחָ֑ה בְּ/שִׁבְטֵי֙ יִשְׂרָאֵ֔ל
    הוֹדַ֖עְתִּי נֶאֱמָנָֽה׃
translation:
  text: Ephraim will become a desolation in the day of rebuke; among the tribes of
    Israel I have made known what is certain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an object of horror' for 'a desolation.' The Hebrew term can include
      the sense of devastation that causes astonishment.
    reason: lexical_alternative
  - marker: b
    text: Or 'in the day of punishment' or 'in the day of judgment' for 'in the day
      of rebuke.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I have made known what is sure.' The final phrase emphasizes the certainty
      and reliability of the announced judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְרַיִם
  chosen: Ephraim
  lexicon: HALOT
  rationale: Proper name transliterated per translation philosophy. In Hosea this
    often stands metonymically for the northern kingdom, but the name itself is retained
    in the main text rather than expanded interpretively.
- source_word: לְשַׁמָּה
  chosen: a desolation
  alternatives:
  - an object of horror
  - waste
  - ruin
  lexicon: HALOT
  rationale: שַׁמָּה denotes devastation/desolation, often with the sense of something
    laid waste and appalling. 'A desolation' is natural English and preserves the
    prophetic judgment tone without over-paraphrase.
- source_word: תִהְיֶה
  chosen: will become
  alternatives:
  - will be
  lexicon: HALOT
  rationale: The verb היה with לְ can express becoming ('become into/as'). 'Will become'
    better reflects the movement into a state of desolation than the flatter 'will
    be'.
- source_word: בְּיוֹם תּוֹכֵחָה
  chosen: in the day of rebuke
  alternatives:
  - on the day of punishment
  - in the day of reproof
  - in the day of judgment
  lexicon: HALOT
  rationale: תּוֹכֵחָה commonly means rebuke/reproof, though in prophetic context
    it carries punitive force. 'Day of rebuke' stays close to the Hebrew while allowing
    the judicial nuance to be heard from context.
- source_word: בְּשִׁבְטֵי יִשְׂרָאֵל
  chosen: among the tribes of Israel
  alternatives:
  - against the tribes of Israel
  - within the tribes of Israel
  lexicon: HALOT
  rationale: 'The preposition ב here is best taken in a locative/sphere sense: within
    or among the tribes of Israel. ''Among'' is idiomatic and fits the following declaration
    formula.'
- source_word: הוֹדַעְתִּי
  chosen: I have made known
  alternatives:
  - I made known
  - I declare
  lexicon: HALOT
  rationale: Hiphil of ידע means to make known, announce, declare. The perfect can
    be rendered as English present perfect to convey a completed declaration with
    present relevance.
- source_word: נֶאֱמָנָה
  chosen: what is certain
  alternatives:
  - what is sure
  - that which is trustworthy
  - the sure thing
  lexicon: HALOT
  rationale: נֶאֱמָנָה, from אמן, conveys firmness, reliability, certainty. Here it
    functions substantivally as the content of what has been announced. 'What is certain'
    is clear modern English and preserves the sense of a sure, dependable pronouncement.
