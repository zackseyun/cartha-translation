theological_decisions:
- issue: Meaning of 'foreign children'
  chosen_reading: Children marked by covenantal estrangement, likely through idolatrous
    or illicit unions, without specifying ethnicity alone.
  alternative_readings:
  - Literally children from marriages with foreigners
  - Metaphorically a generation alienated from the LORD
  rationale: The phrase carries prophetic covenantal force and should not be reduced
    to a purely ethnic claim. The translation preserves the Hebrew image while allowing
    both familial and spiritual dimensions.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of חֹדֶשׁ in the judgment clause
  chosen_reading: '''the new moon'' as a likely reference to the festal/new-moon cycle
    becoming an occasion of judgment'
  alternative_readings:
  - '''a month'' meaning judgment will come within a month'
  rationale: Both senses are lexically possible. The main text keeps the cultic resonance
    that fits Hosea, while the temporal alternative is preserved in a footnote.
  doctrine_reference: Preserve theological tension rather than resolve it.
