id: HOS.5.7
reference: Hosea 5:7
source:
  edition: WLC
  text: בַּ/יהוָ֣ה בָּגָ֔דוּ כִּֽי בָנִ֥ים זָרִ֖ים יָלָ֑דוּ עַתָּ֛ה יֹאכְלֵ֥/ם חֹ֖דֶשׁ
    אֶת חֶלְקֵי/הֶֽם־־׃ס
translation:
  text: They have dealt faithlessly with the LORD, for they have borne foreign children.
    Now the new moon will devour them along with their portions.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a month will devour them and their portions.' The Hebrew חֹדֶשׁ can
      mean either 'new moon' or 'month.'
    reason: alternative_reading
  - marker: b
    text: '''Foreign children'' may refer to children from covenantally illicit unions
      or, more broadly, to a generation estranged from the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיהוָה
  chosen: with the LORD
  alternatives:
  - against the LORD
  - toward the LORD
  lexicon: HALOT
  rationale: The preposition ב with בג״ד marks the party against whom treachery is
    committed. 'The LORD' follows the project’s default rendering for YHWH.
- source_word: בָּגָדוּ
  chosen: have dealt faithlessly
  alternatives:
  - have acted treacherously
  - have been unfaithful
  lexicon: HALOT
  rationale: בגד denotes treachery or covenantal unfaithfulness. 'Dealt faithlessly'
    preserves the relational and covenantal force without sounding overly archaic.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - that
  lexicon: HALOT
  rationale: Introduces the ground for the accusation; 'for' fits the explanatory
    sense in English.
- source_word: בָנִים זָרִים
  chosen: foreign children
  alternatives:
  - strange children
  - illegitimate children
  - alien sons
  lexicon: HALOT
  rationale: זָרִים means 'foreign/strange.' In context it likely refers to children
    produced through covenantally illicit unions or raised in alien allegiance. 'Foreign
    children' preserves the metaphor and ambiguity better than the more interpretive
    'illegitimate.'
- source_word: יָלָדוּ
  chosen: have borne
  alternatives:
  - have begotten
  - have given birth to
  lexicon: HALOT
  rationale: A general parental verb here. 'Have borne' is idiomatic with 'children'
    and avoids over-specifying maternal or paternal perspective.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - soon
  - at this time
  lexicon: HALOT
  rationale: Signals the imminent consequence. 'Now' is concise and preserves the
    prophetic immediacy.
- source_word: יֹאכְלֵם
  chosen: will devour them
  alternatives:
  - will consume them
  - will eat them
  lexicon: HALOT
  rationale: אכל is literally 'eat,' but with judgment imagery 'devour' communicates
    destructive consumption naturally in English.
- source_word: חֹדֶשׁ
  chosen: the new moon
  alternatives:
  - a month
  - the month
  lexicon: HALOT
  rationale: חֹדֶשׁ can mean 'month' or 'new moon.' In Hosea, festival/new-moon imagery
    is prominent, and the singular here likely evokes the cultic calendar as the agent
    or occasion of judgment. The alternative 'month' is worth preserving because some
    understand a mere short time period.
- source_word: חֶלְקֵיהֶם
  chosen: their portions
  alternatives:
  - their fields
  - their allotments
  - their inheritance
  lexicon: HALOT
  rationale: חלק can denote a share, portion, or allotted property. 'Portions' keeps
    the term broad enough to include landholdings and possessions without narrowing
    prematurely.
