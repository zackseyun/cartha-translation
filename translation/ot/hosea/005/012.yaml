id: HOS.5.12
reference: Hosea 5:12
source:
  edition: WLC
  text: וַ/אֲנִ֥י כָ/עָ֖שׁ לְ/אֶפְרָ֑יִם וְ/כָ/רָקָ֖ב לְ/בֵ֥ית יְהוּדָֽה׃
translation:
  text: So I am like a moth to Ephraim, and like rot to the house of Judah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like decay' or 'like rottenness.' The Hebrew image is of internal corruption
      and wasting away.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: So I
  alternatives:
  - And I
  - But I
  lexicon: HALOT
  rationale: The conjunction with the independent pronoun marks a new divine declaration
    and can be rendered simply 'and I,' but in context it advances the consequence
    of the prior accusations/judgment. 'So I' gives natural English while preserving
    the first-person emphasis.
- source_word: כָעָשׁ
  chosen: like a moth
  alternatives:
  - like moth
  - like a maggot
  lexicon: HALOT
  rationale: The noun commonly denotes a moth, especially as an image of gradual consumption
    or decay. 'Like a moth' preserves the simile and the slow-destructive force of
    the metaphor better than more interpretive renderings.
- source_word: לְאֶפְרָיִם
  chosen: to Ephraim
  alternatives:
  - for Ephraim
  lexicon: HALOT
  rationale: 'The preposition ל here marks the object/target of the comparison: YHWH
    is like a moth with respect to Ephraim. ''To Ephraim'' is slightly more literal;
    in idiomatic English it works naturally after ''like a moth.'' ''Ephraim'' is
    retained as the tribal/northern-kingdom name, not generalized to ''Israel,'' because
    the Hebrew is specific.'
- source_word: וְכָרָקָב
  chosen: and like rot
  alternatives:
  - and like rottenness
  - and like decay
  lexicon: HALOT
  rationale: רָקָב denotes rot/rottenness/decay. 'Rot' is concise, vivid, and natural
    modern English, while preserving the metaphor of internal corruption and disintegration.
    The prefixed conjunction and comparative particle are both represented.
- source_word: לְבֵית יְהוּדָה
  chosen: to the house of Judah
  alternatives:
  - for the house of Judah
  - to Judah
  lexicon: HALOT
  rationale: '''House of Judah'' preserves the Hebrew expression and its corporate
    sense, referring to the southern kingdom/people as a house or dynasty-community.
    This is preferable to flattening it to simply ''Judah.'''
