theological_decisions:
- issue: Divine self-description as destructive agents
  chosen_reading: The verse is rendered as YHWH comparing himself to a moth and to
    rot—images of gradual judgment against Ephraim and Judah.
  alternative_readings:
  - A more dynamic rendering that explicates the effect, e.g., 'I will consume Ephraim
    like a moth and make Judah decay'
  rationale: The Hebrew uses nominal similes rather than explicit verbal explanation.
    Preserving the metaphor maintains the prophetic imagery and avoids importing a
    more paraphrastic statement than the text itself makes.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without paraphrase beyond what it warrants.'
