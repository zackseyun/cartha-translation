id: HOS.5.8
reference: Hosea 5:8
source:
  edition: WLC
  text: תִּקְע֤וּ שׁוֹפָר֙ בַּ/גִּבְעָ֔ה חֲצֹצְרָ֖ה בָּ/רָמָ֑ה הָרִ֨יעוּ֙ בֵּ֣ית אָ֔וֶן
    אַחֲרֶ֖י/ךָ בִּנְיָמִֽין׃
translation:
  text: 'Blow the horn in Gibeah, the trumpet in Ramah; raise the battle cry at Beth-aven:
    “Behind you, Benjamin!”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beth-aven likely functions as a polemical name for Bethel, sounding like
      'house of wickedness' or 'house of vanity.'
    reason: cultural_note
  - marker: b
    text: 'Or ''Sound the alarm at Beth-aven: The enemy is behind you, Benjamin!'''
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּקְעוּ
  chosen: Blow
  alternatives:
  - Sound
  lexicon: HALOT
  rationale: Qal imperative plural of תקע in the context of a horn/trumpet signal;
    'blow' is the most natural English collocation for sounding a horn.
- source_word: שׁוֹפָר
  chosen: horn
  alternatives:
  - ram's horn
  - shofar
  - trumpet
  lexicon: HALOT
  rationale: Refers specifically to the horn instrument, distinct from חֲצֹצְרָה in
    the next phrase. 'Horn' preserves the lexical distinction without unnecessary
    transliteration.
- source_word: בַּגִּבְעָה
  chosen: in Gibeah
  alternatives:
  - at Gibeah
  lexicon: HALOT
  rationale: Proper place name with prefixed preposition. 'In Gibeah' is idiomatic
    for sounding an alarm within the town/region.
- source_word: חֲצֹצְרָה
  chosen: the trumpet
  alternatives:
  - a trumpet
  lexicon: HALOT
  rationale: 'A distinct metal trumpet, not the same instrument as שׁוֹפָר. The verbless
    second clause is elliptical after the first imperative; English supplies the understood
    action by apposition: ''the trumpet in Ramah.'' The article is not explicit in
    Hebrew, but English idiom favors ''the trumpet'' in parallel with ''the horn.'''
- source_word: בָּרָמָה
  chosen: in Ramah
  alternatives:
  - at Ramah
  lexicon: HALOT
  rationale: Proper place name with prefixed preposition; rendered parallel to 'in
    Gibeah.'
- source_word: הָרִיעוּ
  chosen: raise the battle cry
  alternatives:
  - shout
  - sound the alarm
  - cry aloud
  lexicon: HALOT
  rationale: Hiphil imperative plural of רוע/ריע in a military-warning context. 'Raise
    the battle cry' captures the urgent alarm sense better than a generic 'shout.'
- source_word: בֵּית אָוֶן
  chosen: Beth-aven
  alternatives:
  - Beth Aven
  - house of wickedness
  - Bethel
  lexicon: HALOT
  rationale: Rendered as the place name 'Beth-aven' by transliteration, following
    the philosophy of transliterating names. The expression likely alludes polemically
    to Bethel ('house of wickedness/vanity'), but the main text preserves the toponym;
    the interpretive force is noted in a footnote.
- source_word: אַחֲרֶיךָ
  chosen: Behind you
  alternatives:
  - After you
  - At your back
  lexicon: HALOT
  rationale: The preposition with 2ms suffix is abrupt and exclamatory in context,
    likely signaling an enemy at Benjamin's rear. 'Behind you' best conveys the alarmed
    warning.
- source_word: בִּנְיָמִין
  chosen: Benjamin
  lexicon: HALOT
  rationale: Can denote the tribe/territory or the eponymous ancestor; here it addresses
    the tribe/region under threat. Standard transliteration retained.
