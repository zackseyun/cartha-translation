theological_decisions:
- issue: Interpretation of בֵּית אָוֶן as a polemical substitute for Bethel
  chosen_reading: Keep the place name as 'Beth-aven' in the main text and preserve
    the likely meaning/allusion in a footnote.
  alternative_readings:
  - Translate interpretively as 'house of wickedness'
  - Substitute 'Bethel' directly
  rationale: The Hebrew form is a proper name in the text, and the translation philosophy
    prefers transliterating names. Yet Hosea likely uses it polemically against Bethel,
    so that interpretive significance should be preserved without replacing the source
    wording in the main text.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    Preserve theological tension rather than resolve it.'
