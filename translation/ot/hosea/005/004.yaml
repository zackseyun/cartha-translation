id: HOS.5.4
reference: Hosea 5:4
source:
  edition: WLC
  text: לֹ֤א יִתְּנוּ֙ מַ֣עַלְלֵי/הֶ֔ם לָ/שׁ֖וּב אֶל אֱלֹֽהֵי/הֶ֑ם כִּ֣י ר֤וּחַ זְנוּנִים֙ בְּ/קִרְבָּ֔/ם וְ/אֶת יְהוָ֖ה לֹ֥א יָדָֽעוּ־־׃
translation:
  text: Their deeds do not allow them to return to their God, for a spirit of whoredom is within them, and they do not know Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a spirit of prostitution' or 'a spirit of harlotry.' The Hebrew uses sexual-infidelity imagery for covenant unfaithfulness and idolatry.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְּנוּ
  chosen: do not allow
  alternatives:
  - do not permit
  - do not give
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in the idiom 'not give ... to return' the sense is that their actions do not permit or leave room for repentance. 'Do not allow' communicates the Hebrew idiom in natural English without over-paraphrase.
- source_word: מַעַלְלֵיהֶם
  chosen: their deeds
  alternatives:
  - their actions
  - their practices
  lexicon: HALOT
  rationale: The noun refers to acts or doings. 'Deeds' preserves the moral weight of Hosea's accusation and fits prophetic diction.
- source_word: לָשׁוּב
  chosen: to return
  alternatives:
  - to turn back
  - to repent
  lexicon: HALOT
  rationale: שׁוב often carries both physical and covenantal-return senses. 'Return' preserves the Hebrew's theological resonance, including repentance, without narrowing it to an explicitly interpretive gloss.
- source_word: אֶל אֱלֹהֵיהֶם
  chosen: to their God
  alternatives:
  - to their gods
  lexicon: HALOT
  rationale: Although אֱלֹהִים can be singular or plural, the suffix construction here in context points to Israel's covenant God, from whom they have strayed. Singular 'their God' best fits Hosea's covenantal indictment.
- source_word: רוּחַ זְנוּנִים
  chosen: a spirit of whoredom
  alternatives:
  - a spirit of prostitution
  - a spirit of harlotry
  lexicon: HALOT
  rationale: The phrase is a prophetic metaphor for pervasive covenant unfaithfulness expressed through sexual-infidelity imagery. 'Whoredom' is strong but still intelligible and preserves the shocking force of the Hebrew better than the more clinical 'prostitution.'
- source_word: בְּקִרְבָּם
  chosen: is within them
  alternatives:
  - is in their midst
  - is among them
  lexicon: HALOT
  rationale: The phrase can mean 'in their midst' or 'within them.' Here the moral-spiritual corruption is internal to the people, so 'within them' best conveys the sense.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא יָדָעוּ
  chosen: they do not know
  alternatives:
  - they have not known
  - they do not acknowledge
  lexicon: HALOT
  rationale: ידע in covenant contexts includes relational knowledge, not mere cognition. 'Do not know' is the most direct rendering and preserves that theological depth without importing an explanatory gloss into the main text.
