theological_decisions:
- issue: Prophetic sexual-infidelity metaphor
  chosen_reading: Rendered זְנוּנִים with 'whoredom' to preserve the force of covenant unfaithfulness imagery.
  alternative_readings:
  - prostitution
  - harlotry
  rationale: Hosea's theology uses marital and sexual imagery for idolatry and covenant breach. A softened rendering would understate the prophetic shock; a more clinical term would flatten the metaphor.
- issue: Covenantal sense of 'know'
  chosen_reading: Kept 'know the LORD' rather than expanding to 'acknowledge' or 'obey the LORD.'
  alternative_readings:
  - acknowledge the LORD
  - have no relationship with the LORD
  rationale: The Hebrew verb ידע carries relational-covenantal meaning, and the translation preserves that tension rather than resolving it into a single explanatory paraphrase.
  doctrine_reference: Translation philosophy §3
- issue: Referent of אֱלֹהֵיהֶם
  chosen_reading: Singular 'their God.'
  alternative_readings:
  - their gods
  rationale: In Hosea's covenant lawsuit context, the point is that their conduct prevents return to Israel's true covenant God, not merely to any deity. The singular best reflects the discourse context.
