theological_decisions:
- issue: Divine self-description as predator in judgment
  chosen_reading: Retain the lion imagery straightforwardly as a metaphor for the
    LORD's destructive judgment against Ephraim and Judah.
  alternative_readings:
  - Soften the imagery into a more general statement of punishment
  rationale: The Hebrew explicitly compares the speaker to a lion and young lion and
    follows with predatory verbs. Softening would mute the force of the judgment oracle
    and import interpretation beyond the text.
