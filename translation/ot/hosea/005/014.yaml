id: HOS.5.14
reference: Hosea 5:14
source:
  edition: WLC
  text: כִּ֣י אָנֹכִ֤י כַ/שַּׁ֨חַל֙ לְ/אֶפְרַ֔יִם וְ/כַ/כְּפִ֖יר לְ/בֵ֣ית יְהוּדָ֑ה
    אֲנִ֨י אֲנִ֤י אֶטְרֹף֙ וְ/אֵלֵ֔ךְ אֶשָּׂ֖א וְ/אֵ֥ין מַצִּֽיל׃
translation:
  text: For I am like a lion to Ephraim, and like a young lion to the house of Judah;
    I, I myself, will tear and go away; I will carry off, and there is no one to rescue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fierce lion' for the first lion image; the Hebrew term can carry a nuance
      of strength or ferocity.
    reason: lexical_alternative
  - marker: b
    text: Or 'none can deliver.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַּׁחַל
  chosen: lion
  alternatives:
  - fierce lion
  lexicon: HALOT
  rationale: שׁחל denotes a lion, often with emphasis on strength or ferocity. 'Lion'
    is the natural English equivalent; the fierceness is already conveyed by the parallel
    and the following verbs, so 'fierce lion' would over-specify.
- source_word: כְּפִיר
  chosen: young lion
  alternatives:
  - lion cub
  lexicon: HALOT
  rationale: כפיר commonly refers to a young lion. 'Young lion' is idiomatic and preserves
    the poetic parallel with שׁחל better than 'lion cub,' which can sound diminutive
    in English.
- source_word: לְאֶפְרַיִם
  chosen: to Ephraim
  alternatives:
  - for Ephraim
  lexicon: HALOT
  rationale: With the simile, ל marks relation toward the object of judgment. 'To
    Ephraim' is slightly more literal and works idiomatically in English in this construction
    ('like a lion to Ephraim').
- source_word: לְבֵית יְהוּדָה
  chosen: to the house of Judah
  alternatives:
  - for the house of Judah
  lexicon: HALOT
  rationale: The phrase denotes the Judahite kingdom/covenant people as a corporate
    house. 'House of Judah' preserves the Hebrew idiom and parallelism with Ephraim.
- source_word: אֲנִי אֲנִי
  chosen: I, I myself
  alternatives:
  - I, even I
  - I myself
  lexicon: HALOT
  rationale: The doubled pronoun is emphatic. 'I, I myself' preserves the repetition
    and force without sounding archaic.
- source_word: אֶטְרֹף
  chosen: will tear
  alternatives:
  - will tear to pieces
  - will prey upon
  lexicon: HALOT
  rationale: טרף in predatory imagery means to tear/prey upon. 'Will tear' is concise,
    vivid, and leaves the object implicit as in Hebrew.
- source_word: וְאֵלֵךְ
  chosen: and go away
  alternatives:
  - and depart
  - and go
  lexicon: HALOT
  rationale: 'הלך here follows the attack image: after tearing, the predator departs.
    ''Go away'' makes the sense clear in natural English.'
- source_word: אֶשָּׂא
  chosen: I will carry off
  alternatives:
  - I will take away
  - I will bear away
  lexicon: HALOT
  rationale: נשא can mean lift, carry, or take away. In the lion metaphor, 'carry
    off' best fits a predator seizing prey and removing it.
- source_word: וְאֵין מַצִּיל
  chosen: and there is no one to rescue
  alternatives:
  - and none can deliver
  - with no rescuer
  lexicon: HALOT
  rationale: The clause states the absence of any deliverer. 'Rescue' is accessible
    modern English; 'deliver' is possible but can sound more theological than the
    immediate predatory image requires.
