id: HOS.5.10
reference: Hosea 5:10
source:
  edition: WLC
  text: הָיוּ֙ שָׂרֵ֣י יְהוּדָ֔ה כְּ/מַסִּיגֵ֖י גְּב֑וּל עֲלֵי/הֶ֕ם אֶשְׁפּ֥וֹךְ כַּ/מַּ֖יִם
    עֶבְרָתִֽ/י׃
translation:
  text: The princes of Judah have become like those who move a boundary marker; on
    them I will pour out my wrath like water.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like those who remove a boundary line.' The image may refer literally
      to shifting property markers or figuratively to violating limits set by God.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיוּ
  chosen: have become
  alternatives:
  - were
  lexicon: HALOT
  rationale: The qatal of היה can denote a resulting state, not merely simple existence.
    'Have become' captures the sense that Judah's princes have come to be like boundary-movers,
    fitting the prophetic accusation.
- source_word: שָׂרֵי יְהוּדָה
  chosen: the princes of Judah
  alternatives:
  - the leaders of Judah
  - the officials of Judah
  lexicon: HALOT
  rationale: שָׂרִים commonly denotes rulers, princes, or officials. 'Princes' preserves
    the elevated political sense and is a standard, natural rendering in prophetic
    contexts.
- source_word: כְּמַסִּיגֵי גְּבוּל
  chosen: like those who move a boundary marker
  alternatives:
  - like boundary-shifters
  - like those who remove a boundary
  - like those who move a boundary line
  lexicon: HALOT
  rationale: The participial form from נסג with גְּבוּל evokes illicit shifting of
    property boundaries, a known covenantal offense. 'Move a boundary marker' makes
    the concrete image clear in modern English while preserving the legal-land imagery.
- source_word: גְּבוּל
  chosen: boundary marker
  alternatives:
  - boundary
  - boundary line
  lexicon: HALOT
  rationale: Although גְּבוּל can mean border or boundary generally, in this idiom
    it refers to a landmark or property boundary. 'Boundary marker' best communicates
    the concrete object implied by the offense.
- source_word: עֲלֵיהֶם
  chosen: on them
  alternatives:
  - upon them
  lexicon: HALOT
  rationale: A straightforward rendering of the preposition plus pronoun, introducing
    the object of coming judgment.
- source_word: אֶשְׁפּוֹךְ
  chosen: I will pour out
  alternatives:
  - I will pour
  lexicon: HALOT
  rationale: שׁפך in judgment contexts often carries the idiomatic force 'pour out.'
    This is natural English and preserves the vivid metaphor of abundant outpoured
    wrath.
- source_word: כַּמַּיִם
  chosen: like water
  alternatives:
  - as water
  - like a flood
  lexicon: HALOT
  rationale: The text says 'like water,' not explicitly 'like a flood.' The simile
    conveys abundance and force without adding imagery not present in the Hebrew.
- source_word: עֶבְרָתִי
  chosen: my wrath
  alternatives:
  - my fury
  - my overflowing anger
  lexicon: HALOT
  rationale: עֶבְרָה denotes wrath or fury, often intense divine anger. 'Wrath' is
    concise, weighty, and idiomatic in prophetic judgment language.
