theological_decisions:
- issue: Nature of the accusation against Judah's rulers
  chosen_reading: A metaphor of covenantal and social violation is preserved without
    over-specifying whether the 'boundary' is literal land theft, political encroachment,
    or moral transgression.
  alternative_readings:
  - Literal seizure or alteration of property boundaries
  - Figurative transgression of divinely set limits
  - Political encroachment, possibly in relation to inter-tribal borders
  rationale: The Hebrew image intentionally evokes the known offense of moving boundary
    markers, but Hosea may be applying it metaphorically to broader covenant violation.
    The translation keeps the concrete image and leaves the interpretive extension
    to readers rather than resolving it in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
