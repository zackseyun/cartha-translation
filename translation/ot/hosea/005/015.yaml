theological_decisions:
- issue: Sense of divine withdrawal
  chosen_reading: The verse is rendered as God withdrawing from his people until they
    repent, without specifying metaphysical absence beyond the relational/judicial
    imagery of the text.
  alternative_readings:
  - A stronger statement of total abandonment
  - A purely metaphorical change in human perception
  rationale: The paired verbs 'I will go, I will return to my place' depict divine
    withdrawal in covenant-judgment terms. The translation preserves that tension
    without importing a systematic-theological explanation not stated in the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
