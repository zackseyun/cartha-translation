id: HOS.5.15
reference: Hosea 5:15
source:
  edition: WLC
  text: אֵלֵ֤ךְ אָשׁ֨וּבָה֙ אֶל מְקוֹמִ֔/י עַ֥ד אֲשֶֽׁר יֶאְשְׁמ֖וּ וּ/בִקְשׁ֣וּ פָנָ֑/י
    בַּ/צַּ֥ר לָ/הֶ֖ם יְשַׁחֲרֻֽ/נְנִי־־׃
translation:
  text: I will go, I will return to my place until they acknowledge their guilt and
    seek my face; in their distress they will seek me earnestly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'until they bear their guilt' or 'until they are found guilty.' The
      Hebrew verb can denote guilt incurred or guilt acknowledged; the context of
      seeking the LORD favors 'acknowledge their guilt.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'they will seek me early.' The Hebrew idiom likely expresses diligent
      or earnest seeking rather than merely seeking at an early hour.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֵךְ
  chosen: I will go
  alternatives:
  - I will depart
  lexicon: HALOT
  rationale: הלך in Qal 1cs is the straightforward motion verb 'go/walk.' In this
    context, with the following 'I will return,' 'I will go' preserves the Hebrew
    sequence without over-interpreting the departure.
- source_word: אָשׁוּבָה
  chosen: I will return
  alternatives:
  - I will turn back
  lexicon: HALOT
  rationale: שׁוב commonly means 'return/turn back.' 'Return' fits the movement toward
    'my place' and keeps the parallel with the prior verb.
- source_word: מְקוֹמִי
  chosen: my place
  alternatives:
  - my dwelling place
  - my home
  lexicon: HALOT
  rationale: מקום is literally 'place.' 'My place' is natural English and preserves
    the spatial metaphor of God withdrawing, without specifying more than the Hebrew
    does.
- source_word: עַד אֲשֶׁר
  chosen: until
  alternatives:
  - until such time as
  lexicon: HALOT
  rationale: The combination introduces the temporal limit of the withdrawal. Simple
    'until' best reflects the syntax in readable English.
- source_word: יֶאְשְׁמוּ
  chosen: they acknowledge their guilt
  alternatives:
  - they bear guilt
  - they become guilty
  - they are held guilty
  lexicon: HALOT
  rationale: The verb from אשם can denote incurring guilt or recognizing guilt depending
    on context. Here it is followed by repentance-like actions ('seek my face,' 'seek
    me earnestly'), so 'acknowledge their guilt' best captures the sense of coming
    to recognize and own their offense rather than merely being objectively guilty.
- source_word: וּבִקְשׁוּ פָנַי
  chosen: and seek my face
  alternatives:
  - and seek me
  - and seek my favor
  lexicon: HALOT
  rationale: בקשׁ + פנים is a common idiom for seeking someone's presence or favor.
    Retaining 'seek my face' preserves the biblical idiom and theological resonance,
    while remaining intelligible in English.
- source_word: בַּצַּר לָהֶם
  chosen: in their distress
  alternatives:
  - in trouble for them
  - when distress is theirs
  lexicon: HALOT
  rationale: 'The phrase is idiomatic: ב + צר with pronominal complement indicates
    the time/circumstance of distress belonging to them. ''In their distress'' is
    the natural English equivalent.'
- source_word: יְשַׁחֲרֻנְנִי
  chosen: they will seek me earnestly
  alternatives:
  - they will seek me early
  - they will diligently seek me
  lexicon: HALOT
  rationale: שׁחר in the Piel can literally involve seeking early, but idiomatically
    conveys earnest or diligent seeking. In modern English, 'seek me earnestly' communicates
    the force better than the potentially misleading temporal adverb 'early,' while
    preserving the intensity of the verb.
