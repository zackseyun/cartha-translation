id: HOS.5.13
reference: Hosea 5:13
source:
  edition: WLC
  text: וַ/יַּ֨רְא אֶפְרַ֜יִם אֶת חָלְי֗/וֹ וִֽ/יהוּדָה֙ אֶת מְזֹר֔/וֹ וַ/יֵּ֤לֶךְ
    אֶפְרַ֨יִם֙ אֶל אַשּׁ֔וּר וַ/יִּשְׁלַ֖ח אֶל מֶ֣לֶךְ יָרֵ֑ב וְ/ה֗וּא לֹ֤א יוּכַל֙
    לִ/רְפֹּ֣א לָ/כֶ֔ם וְ/לֹֽא יִגְהֶ֥ה מִ/כֶּ֖ם מָזֽוֹר־־־־־׃
translation:
  text: When Ephraim saw his sickness, and Judah his wound, then Ephraim went to Assyria
    and sent to King Jareb; but he is not able to heal you, nor can he remove the
    wound from you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'to the avenging king' or 'to the great king'; the Hebrew 'Jareb'
      may be understood as a title rather than a personal name.
    reason: alternative_reading
lexical_decisions:
- source_word: חָלְיוֹ
  chosen: his sickness
  alternatives:
  - his illness
  - his disease
  lexicon: HALOT
  rationale: חֳלִי commonly denotes sickness/illness, here metaphorical for national
    condition. 'Sickness' preserves the medical metaphor in accessible English.
- source_word: מְזֹרוֹ / מָזוֹר
  chosen: his wound / the wound
  alternatives:
  - his sore / the sore
  - his ulcer / the ulcer
  lexicon: HALOT
  rationale: מָזוֹר refers to a wound, sore, or festering injury. 'Wound' is natural
    modern English and keeps the bodily-injury metaphor without over-specifying the
    pathology.
- source_word: אַשּׁוּר
  chosen: Assyria
  alternatives:
  - Asshur
  lexicon: HALOT
  rationale: As a geopolitical entity in context, the standard English form 'Assyria'
    is clearer than the more transliterated 'Asshur'.
- source_word: מֶלֶךְ יָרֵב
  chosen: King Jareb
  alternatives:
  - the great king
  - the avenging king
  - King Yareb
  lexicon: HALOT
  rationale: The Hebrew is best taken as a proper name/title-like designation. Following
    the philosophy to transliterate names, 'King Jareb' is retained in the main text.
    Because the term may also be understood descriptively ('avenging/contending king'),
    that alternative is preserved in a footnote.
- source_word: לָכֶם
  chosen: you
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition ל with רפא can indicate benefit/object. In idiomatic
    English, 'heal you' communicates the sense more naturally than 'heal for you'.
- source_word: יִגְהֶה מִכֶּם
  chosen: remove ... from you
  alternatives:
  - heal ... from you
  - cure ... from you
  - draw out ... from you
  lexicon: HALOT
  rationale: The verb is rare and contextually paired with healing imagery. 'Remove'
    best captures the sense of taking away the wound/affliction in readable English,
    while avoiding an overly literal but opaque rendering.
- source_word: וְהוּא
  chosen: but he
  alternatives:
  - yet he
  - and he
  lexicon: HALOT
  rationale: 'Though formally ''and he,'' the clause is adversative in context: Ephraim
    appealed to Assyria, but that king cannot help. ''But he'' brings out the discourse
    contrast.'
- source_word: וַיִּשְׁלַח
  chosen: sent to
  alternatives:
  - sent messengers to
  - dispatched to
  lexicon: HALOT
  rationale: The verb by itself means 'sent'; the object is implicit. 'Sent to' is
    concise and faithful without adding 'messengers' explicitly.
