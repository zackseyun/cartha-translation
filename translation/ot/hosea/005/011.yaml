theological_decisions:
- issue: Meaning of צָו in Hosea 5:11
  chosen_reading: A pejorative object of pursuit ('filth') rather than a neutral 'command/precept.'
  alternative_readings:
  - command
  - precept
  - human command
  rationale: The verse explains Ephraim's judgment as the result of willingly pursuing
    something condemned. Rendering צָו as 'filth' reflects a long-recognized interpretive
    option that treats the term as contemptuous, fitting Hosea's anti-idolatry rhetoric.
    Since 'command/precept' is also a major reading, the alternative is preserved
    in a footnote rather than erased.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    contested interpretive questions and preserve alternatives in footnotes.
