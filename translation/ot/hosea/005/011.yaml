id: HOS.5.11
reference: Hosea 5:11
source:
  edition: WLC
  text: עָשׁ֥וּק אֶפְרַ֖יִם רְצ֣וּץ מִשְׁפָּ֑ט כִּ֣י הוֹאִ֔יל הָלַ֖ךְ אַחֲרֵי צָֽו־׃
translation:
  text: Ephraim is oppressed, crushed in judgment, because he was determined to walk
    after filth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after a command' or 'after a human precept.' The Hebrew term צָו is
      difficult and has been understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: עָשׁוּק
  chosen: oppressed
  alternatives:
  - defrauded
  - wronged
  lexicon: HALOT
  rationale: The passive participle from עשק denotes being oppressed or exploited.
    'Oppressed' is the clearest modern English rendering and fits the prophetic accusation
    of social and covenantal consequence.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  rationale: Proper name transliterated per translation philosophy. In Hosea this
    commonly stands for the northern kingdom/Israel, but the name itself is retained
    in the text rather than interpreted.
- source_word: רְצוּץ
  chosen: crushed
  alternatives:
  - broken
  - shattered
  lexicon: HALOT
  rationale: The passive participle conveys being crushed or broken. 'Crushed' pairs
    naturally with 'oppressed' and preserves the force of the image without overinterpreting.
- source_word: מִשְׁפָּט
  chosen: in judgment
  alternatives:
  - by judgment
  - justice
  lexicon: HALOT
  rationale: 'מִשְׁפָּט can mean judgment or justice. Here it most naturally expresses
    the sphere or instrument of the crushing: Ephraim is crushed in/by judicial sentence.
    ''In judgment'' preserves the Hebrew terseness and avoids importing a more abstract
    ''justice'' if the sense is punitive judgment.'
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the reason for Ephraim's condition. 'Because' is straightforward
    modern English.
- source_word: הוֹאִיל
  chosen: was determined
  alternatives:
  - undertook
  - consented
  - was willing
  lexicon: HALOT
  rationale: 'The verb here conveys willingness or resolve. ''Was determined'' best
    captures the volitional nuance in context: Ephraim deliberately chose the path
    that follows.'
- source_word: הָלַךְ אַחֲרֵי
  chosen: to walk after
  alternatives:
  - to follow
  - to go after
  lexicon: HALOT
  rationale: The idiom literally means 'to walk/go after.' 'Walk after' preserves
    the Hebrew metaphor and prophetic style better than the flatter 'follow,' while
    remaining understandable.
- source_word: צָו
  chosen: filth
  alternatives:
  - command
  - vanity
  - human precept
  lexicon: HALOT
  rationale: The noun is notoriously difficult and contested in this verse. In Hosea's
    polemical context, many understand it as a pejorative term for something vile
    or worthless, likely connected with idolatrous practice. 'Filth' preserves the
    prophetic contempt and coheres with the immediate context. Because 'command/precept'
    is a significant alternative, it is preserved in a footnote.
