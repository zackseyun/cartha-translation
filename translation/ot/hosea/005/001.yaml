theological_decisions:
- issue: Referent of the addressed groups and judicial statement
  chosen_reading: The verse addresses priests, Israel, and the royal house as those
    liable to divine judgment.
  alternative_readings:
  - The statement could be heard more neutrally as 'the legal case concerns you' rather
    than explicit condemnation.
  rationale: The immediate context and the following metaphors of trap and net indicate
    culpability and condemnation, not merely a neutral legal proceeding. The translation
    preserves this without adding interpretive detail beyond the verse.
