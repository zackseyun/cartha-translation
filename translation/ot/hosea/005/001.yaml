id: HOS.5.1
reference: Hosea 5:1
source:
  edition: WLC
  text: שִׁמְעוּ זֹ֨את הַ/כֹּהֲנִ֜ים וְ/הַקְשִׁ֣יבוּ בֵּ֣ית יִשְׂרָאֵ֗ל וּ/בֵ֤ית הַ/מֶּ֨לֶךְ֙
    הַאֲזִ֔ינוּ כִּ֥י לָ/כֶ֖ם הַ/מִּשְׁפָּ֑ט כִּֽי פַח֙ הֱיִיתֶ֣ם לְ/מִצְפָּ֔ה וְ/רֶ֖שֶׁת
    פְּרוּשָׂ֥ה עַל תָּבֽוֹר־׀־־׃
translation:
  text: Hear this, O priests; pay attention, house of Israel; and give ear, house
    of the king. For the judgment is for you, because you have been a trap at Mizpah
    and a net spread out upon Tabor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For the judgment is against you.' The Hebrew phrase is compact and may
      mean either that judgment pertains to them or is directed against them.
    reason: alternative_reading
  - marker: b
    text: Mizpah and Tabor are place names, likely evoking well-known sites in Israel
      associated here with entrapment imagery.
    reason: cultural_note
lexical_decisions:
- source_word: שִׁמְעוּ
  chosen: Hear
  alternatives:
  - Listen
  lexicon: HALOT
  rationale: Common imperative of שׁמע. 'Hear' preserves the prophetic summons and
    pairs well with the following attention verbs without over-paraphrasing.
- source_word: הַקְשִׁיבוּ
  chosen: pay attention
  alternatives:
  - listen attentively
  - give heed
  lexicon: HALOT
  rationale: This verb intensifies the call to listen. 'Pay attention' is natural
    modern English and distinguishes it from the first imperative.
- source_word: הַאֲזִינוּ
  chosen: give ear
  alternatives:
  - listen
  - hear
  lexicon: HALOT
  rationale: A third auditory imperative is retained with a distinct English expression
    to reflect the Hebrew rhetorical buildup.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: Formal covenantal expression; retaining 'house of' preserves the collective
    and representative sense of the Hebrew.
- source_word: בֵּית הַמֶּלֶךְ
  chosen: house of the king
  alternatives:
  - royal house
  - king's house
  lexicon: HALOT
  rationale: Literal rendering best preserves the parallelism with 'house of Israel.'
    It likely refers to the royal court or dynasty, but the Hebrew expression itself
    is kept.
- source_word: כִּי לָכֶם הַמִּשְׁפָּט
  chosen: For the judgment is for you
  alternatives:
  - For the judgment is against you
  - For you are the ones under judgment
  lexicon: HALOT
  rationale: The phrase is terse and can mean that judgment pertains to them or is
    directed at them. 'Is for you' preserves the Hebrew structure while allowing the
    context to convey its adverse force.
- source_word: מִּשְׁפָּט
  chosen: judgment
  alternatives:
  - justice
  - sentence
  lexicon: HALOT
  rationale: In this prophetic accusation the sense is judicial condemnation rather
    than abstract justice, so 'judgment' fits best.
- source_word: פַח
  chosen: trap
  alternatives:
  - snare
  lexicon: HALOT
  rationale: A device for catching prey. 'Trap' is clear modern English; 'snare' is
    possible but slightly more archaic.
- source_word: לְמִצְפָּה
  chosen: at Mizpah
  alternatives:
  - for Mizpah
  - to Mizpah
  lexicon: HALOT
  rationale: With place names this construction is idiomatically rendered as location.
    Mizpah is transliterated as a proper name per translation philosophy.
- source_word: רֶשֶׁת פְּרוּשָׂה
  chosen: a net spread out
  alternatives:
  - a spread net
  lexicon: HALOT
  rationale: Keeps the image vivid and close to the Hebrew participial/adjectival
    construction.
- source_word: עַל תָּבוֹר
  chosen: upon Tabor
  alternatives:
  - on Tabor
  - over Tabor
  lexicon: HALOT
  rationale: Retains the elevated/topographical sense with the mountain name transliterated.
    'Upon' suits the poetic register.
