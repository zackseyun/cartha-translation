id: HOS.9.16
reference: Hosea 9:16
source:
  edition: WLC
  text: הֻכָּ֣ה אֶפְרַ֔יִם שָׁרְשָׁ֥/ם יָבֵ֖שׁ פְּרִ֣י בלי יַעֲשׂ֑וּ/ן גַּ֚ם כִּ֣י
    יֵֽלֵד֔וּ/ן וְ/הֵמַתִּ֖י מַחֲמַדֵּ֥י בִטְנָֽ/ם־׃ס
translation:
  text: Ephraim is stricken; their root is dried up; they will bear no fruit. Even
    if they give birth, I will put to death the cherished ones of their womb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its root is dried up.' The Hebrew has a plural suffix ('their root'),
      though 'Ephraim' is a singular collective name.
    reason: lexical_alternative
  - marker: b
    text: Or 'the beloved/precious ones of their womb.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֻכָּה
  chosen: is stricken
  alternatives:
  - is struck
  - has been struck
  - is smitten
  lexicon: HALOT
  rationale: 'Passive of נכה. ''Is stricken'' preserves the stative/resultative force
    in context: Ephraim stands under a blow of judgment. It is more natural in modern
    English than ''is smitten'' while retaining prophetic severity.'
- source_word: אֶפְרַיִם
  chosen: Ephraim
  alternatives:
  - —
  rationale: Proper name retained by transliteration per translation philosophy. Here
    it represents the northern kingdom, but the text names Ephraim specifically.
- source_word: שָׁרְשָׁם
  chosen: their root
  alternatives:
  - its root
  lexicon: HALOT
  rationale: Although Ephraim is singular in form, the pronominal suffix is plural.
    English can render this either by sense ('its root' for the corporate entity)
    or by form ('their root'). I chose 'their root' to reflect the Hebrew suffix and
    the people-group sense of Ephraim.
- source_word: יָבֵשׁ
  chosen: is dried up
  alternatives:
  - has dried up
  - is withered
  lexicon: HALOT
  rationale: Conveys the completed/resultative condition of the root. 'Dried up' fits
    the agricultural metaphor and pairs naturally with fruitlessness.
- source_word: פְּרִי
  chosen: fruit
  alternatives:
  - produce
  - offspring
  lexicon: HALOT
  rationale: '''Fruit'' preserves the metaphor and allows the following childbirth
    clause to intensify it from agricultural barrenness to loss of children. ''Offspring''
    here would collapse the metaphor too early.'
- source_word: בלי יַעֲשׂוּן
  chosen: they will bear no fruit
  alternatives:
  - they will produce no fruit
  - there is no fruit they will make
  lexicon: HALOT
  rationale: בלי plus imperfect expresses negated future/result. 'Bear no fruit' is
    idiomatic English for agricultural productivity and preserves the metaphorical
    force.
- source_word: גַּם כִּי
  chosen: Even if
  alternatives:
  - Indeed, if
  - although
  lexicon: HALOT
  rationale: 'In context this introduces a concessive escalation: even the possibility
    of childbirth will not avert judgment. ''Even if'' best captures that force.'
- source_word: יֵלֵדוּן
  chosen: they give birth
  alternatives:
  - they bear children
  - they beget
  lexicon: HALOT
  rationale: The verb moves from plant imagery to human reproduction. 'Give birth'
    is clear modern English and fits the following reference to the womb.
- source_word: וְהֵמַתִּי
  chosen: I will put to death
  alternatives:
  - I will kill
  - I will cause to die
  lexicon: HALOT
  rationale: Hiphil of מות with first-person subject. 'I will put to death' is direct
    and grave without sounding colloquial; it preserves divine agency in judgment.
- source_word: מַחֲמַדֵּי
  chosen: the cherished ones
  alternatives:
  - the beloved ones
  - the precious ones
  - the darlings
  lexicon: HALOT
  rationale: The noun denotes desirable, precious, or beloved things/persons. In this
    context of children, 'the cherished ones' communicates parental preciousness without
    sounding archaic.
- source_word: בִטְנָם
  chosen: of their womb
  alternatives:
  - from their womb
  - of their belly
  lexicon: HALOT
  rationale: בטן can mean belly/womb; in childbirth context 'womb' is clearly intended.
    The construct phrase is rendered literally enough to preserve the Hebrew image.
