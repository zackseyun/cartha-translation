theological_decisions:
- issue: Divine agency in the judgment clause
  chosen_reading: 'Retain first-person divine action: ''I will put to death'''
  alternative_readings:
  - Soften to an impersonal result such as 'they will die'
  rationale: The Hebrew explicitly uses first-person singular Hiphil, attributing
    the judgment directly to God in prophetic speech. The translation should not mute
    this agency.
