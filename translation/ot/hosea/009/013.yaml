id: HOS.9.13
reference: Hosea 9:13
source:
  edition: WLC
  text: אֶפְרַ֛יִם כַּ/אֲשֶׁר רָאִ֥יתִי לְ/צ֖וֹר שְׁתוּלָ֣ה בְ/נָוֶ֑ה וְ/אֶפְרַ֕יִם
    לְ/הוֹצִ֥יא אֶל הֹרֵ֖ג בָּנָֽי/ו־־׃
translation:
  text: Ephraim, as I have seen, is planted in a pleasant pasture like Tyre; but Ephraim
    must bring out his children to the killer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "as I saw, Ephraim was planted like Tyre in a pleasant place." The Hebrew
      syntax of the comparison is compressed.
    reason: alternative_reading
  - marker: b
    text: Or "to the slayer" or "to slaughter." The Hebrew says literally "to the
      killer/slayer."
    reason: lexical_alternative
  - marker: c
    text: Hebrew "his sons"; translated "his children" here to reflect the likely
      collective sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְרַיִם
  chosen: Ephraim
  lexicon: HALOT
  rationale: Proper name of the northern kingdom/tribe is transliterated per translation
    philosophy.
- source_word: כַּאֲשֶׁר רָאִיתִי
  chosen: as I have seen
  alternatives:
  - just as I saw
  - as I saw
  lexicon: HALOT
  rationale: Keeps the first-person prophetic observation explicit. Present perfect
    in English gives a natural rendering of the Hebrew perfect in this reflective
    comparison.
- source_word: לְצוֹר
  chosen: like Tyre
  alternatives:
  - for Tyre
  - with respect to Tyre
  lexicon: HALOT
  rationale: 'The prefixed ל here is best taken in a comparative sense in context:
    Ephraim is being compared to Tyre. This yields coherent English and matches the
    simile-like structure.'
- source_word: שְׁתוּלָה
  chosen: planted
  alternatives:
  - transplanted
  - set
  lexicon: HALOT
  rationale: Passive participial idea of being planted/set in place. 'Planted' preserves
    the horticultural metaphor.
- source_word: בְנָוֶה
  chosen: in a pleasant pasture
  alternatives:
  - in a meadow
  - in a lovely place
  - in a habitation
  lexicon: HALOT
  rationale: נָוֶה can denote a pleasant abode, pasture, or habitation. Given the
    planting imagery, 'pleasant pasture' best preserves the agricultural metaphor
    and the sense of favorable setting.
- source_word: וְאֶפְרַיִם
  chosen: but Ephraim
  alternatives:
  - and Ephraim
  lexicon: HALOT
  rationale: Although waw is formally 'and,' the clause marks a sharp turn from favorable
    image to grim outcome; 'but' communicates the adversative force naturally in English.
- source_word: לְהוֹצִיא
  chosen: must bring out
  alternatives:
  - will bring out
  - is to bring out
  lexicon: HALOT
  rationale: Infinitive with ל after the subject expresses destined or impending action.
    'Must bring out' conveys grim inevitability without over-paraphrasing.
- source_word: אֶל הֹרֵג
  chosen: to the killer
  alternatives:
  - to the slayer
  - to one who kills
  - to slaughter
  lexicon: HALOT
  rationale: הֹרֵג is an active participle, literally 'one killing' or 'killer/slayer.'
    'To the killer' preserves the personal agent more closely than the abstract 'to
    slaughter.'
- source_word: בָּנָיו
  chosen: his children
  alternatives:
  - his sons
  lexicon: HALOT
  rationale: Though formally 'sons,' Hebrew בנים often functions generically for offspring/children.
    In this judgment context, 'children' is natural English and likely reflects the
    collective sense.
