theological_decisions:
- issue: Whether to preserve the horticultural image or flatten it into a generalized
    statement of prosperity
  chosen_reading: Retain the image of Ephraim as planted in a pleasant place like
    Tyre
  alternative_readings:
  - Render more dynamically as 'I have seen Ephraim flourishing like Tyre'
  rationale: The verse's force depends on the contrast between secure planting and
    the later loss of children. Preserving the metaphor better reflects the Hebrew
    and avoids importing an interpretive summary.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source
    text''s plain sense over translation tradition.'
- issue: Whether בָּנָיו should be rendered 'sons' or 'children'
  chosen_reading: children
  alternative_readings:
  - sons
  rationale: The Hebrew form can denote sons specifically, but also offspring more
    generally. Here the collective family-loss emphasis is primary, so 'children'
    communicates the sense in readable modern English while remaining faithful.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral;
    render according to source intent.'
