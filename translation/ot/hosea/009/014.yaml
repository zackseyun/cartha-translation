id: HOS.9.14
reference: Hosea 9:14
source:
  edition: WLC
  text: תֵּן לָ/הֶ֥ם יְהוָ֖ה מַה תִּתֵּ֑ן תֵּן לָ/הֶם֙ רֶ֣חֶם מַשְׁכִּ֔יל וְ/שָׁדַ֖יִם צֹמְקִֽים־־־׃
translation:
  text: Give them, O Yahweh—what will you give? Give them a miscarrying womb and dry breasts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a bereaving womb.' The Hebrew participle can carry the sense of causing loss of children; 'miscarrying womb' makes the reproductive judgment more explicit in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: תֵּן
  chosen: Give
  alternatives:
  - Grant
  lexicon: HALOT
  rationale: Imperative of נתן used in direct address to God; 'Give' is the plain, forceful English equivalent and preserves the prayer-like appeal.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מַה תִּתֵּן
  chosen: what will you give?
  alternatives:
  - what should you give?
  - what are you to give?
  lexicon: HALOT
  rationale: The interrogative plus imperfect naturally forms a rhetorical question. 'Will you give' fits the immediate prayer context and preserves the speaker's anguished hesitation before specifying the judgment requested.
- source_word: רֶחֶם
  chosen: womb
  alternatives:
  - uterus
  lexicon: HALOT
  rationale: Standard lexical sense is 'womb.' 'Womb' is idiomatic, natural English and preserves the fertility imagery central to the verse.
- source_word: מַשְׁכִּיל
  chosen: miscarrying
  alternatives:
  - causing miscarriage
  - bereaving
  lexicon: HALOT
  rationale: From שכל in a causative/participle form, used here adjectivally with 'womb.' In this context of fertility judgment, 'miscarrying' best conveys a womb that does not bring offspring to term. 'Bereaving' is possible but less precise in English when modifying 'womb.'
- source_word: שָׁדַיִם
  chosen: breasts
  lexicon: HALOT
  rationale: The noun directly denotes breasts; retaining the concrete body term preserves the starkness of the judgment image.
- source_word: צֹמְקִים
  chosen: dry
  alternatives:
  - shriveled
  - withered
  lexicon: HALOT
  rationale: The participle describes breasts lacking nourishment. 'Dry' is concise and idiomatic in English for breasts without milk; 'shriveled' is possible but adds a visual nuance not required by the Hebrew.
