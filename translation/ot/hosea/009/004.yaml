theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The project default for יהוה is 'the LORD,' following the stated doctrine
    and translation policy.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nature of impurity in 'mourners’ bread'
  chosen_reading: ritual/cultic uncleanness associated with mourning and death
  alternative_readings:
  - general sadness
  - morally tainted food
  rationale: The verse concerns sacrificial acceptability and temple exclusion. The
    impurity language is cultic, not merely emotional or metaphorical.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
