id: HOS.9.4
reference: Hosea 9:4
source:
  edition: WLC
  text: לֹא יִסְּכ֨וּ לַ/יהוָ֥ה יַיִן֮ וְ/לֹ֣א יֶֽעֶרְבוּ ל/וֹ֒ זִבְחֵי/הֶ֗ם כְּ/לֶ֤חֶם
    אוֹנִים֙ לָ/הֶ֔ם כָּל אֹכְלָ֖י/ו יִטַמָּ֑אוּ כִּֽי לַחְמָ֣/ם לְ/נַפְשָׁ֔/ם לֹ֥א
    יָב֖וֹא בֵּ֥ית יְהוָֽה־׀־־־׃
translation:
  text: They will not pour out wine offerings to the LORD, and their sacrifices will
    not please him. They will be like mourners’ bread to them; all who eat it will
    become unclean. For their bread will be for themselves alone; it will not enter
    the house of the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like bread of mourners.' The phrase likely refers to food associated
      with mourning and therefore conveying ritual uncleanness.
    reason: lexical_alternative
  - marker: b
    text: Or 'for their appetite' or 'for themselves.' The Hebrew phrase means the
      bread is only for their own use, not fit to be brought into the house of the
      LORD.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִסְּכוּ
  chosen: will not pour out wine offerings
  alternatives:
  - will not pour out wine
  - will not libate wine
  lexicon: HALOT
  rationale: The verb נסך in sacrificial context refers to pouring out a drink offering.
    Because יַיִן follows directly, 'pour out wine offerings' makes the cultic sense
    explicit in natural English without over-paraphrasing.
- source_word: לַיהוָה
  chosen: to the LORD
  alternatives:
  - for the LORD
  lexicon: HALOT
  rationale: Directional ל marks the recipient of the offering. Per doctrine, יהוה
    is rendered 'the LORD' rather than transliterated.
- source_word: יַיִן
  chosen: wine offerings
  alternatives:
  - wine
  lexicon: HALOT
  rationale: Though the noun itself is simply 'wine,' in combination with נסך the
    phrase denotes wine used as a drink offering. The cultic force is best represented
    in English by incorporating 'offerings' with the verb phrase.
- source_word: יֶעֶרְבוּ
  chosen: will not please
  alternatives:
  - will not be acceptable
  - will not be sweet/pleasant
  lexicon: HALOT
  rationale: The verb ערב here carries the sense of being pleasing or acceptable to
    God. 'Will not please him' is idiomatic and captures divine non-acceptance of
    the sacrifices.
- source_word: זִבְחֵיהֶם
  chosen: their sacrifices
  alternatives:
  - their slaughter offerings
  lexicon: HALOT
  rationale: זבח is the standard term for sacrifice. 'Sacrifices' is the clearest
    natural rendering in context.
- source_word: כְּלֶחֶם אוֹנִים
  chosen: like mourners’ bread
  alternatives:
  - like bread of mourners
  - like funeral bread
  lexicon: HALOT
  rationale: The phrase refers to bread associated with mourning and corpse impurity,
    not merely emotional sadness. 'Mourners’ bread' preserves the idiom while remaining
    readable.
- source_word: אוֹנִים
  chosen: mourners’
  alternatives:
  - of mourners
  - of mourning
  lexicon: HALOT
  rationale: The plural noun denotes mourners, likely those made unclean through contact
    with death. The possessive English form is concise and natural.
- source_word: יִטַמָּאוּ
  chosen: will become unclean
  alternatives:
  - will be defiled
  - will become defiled
  lexicon: HALOT
  rationale: טמא in priestly/cultic contexts is best rendered with 'unclean' to preserve
    ritual impurity language rather than a more generalized moral term.
- source_word: לַחְמָם
  chosen: their bread
  alternatives:
  - their food
  lexicon: HALOT
  rationale: לחם literally means 'bread,' and here likely stands for food associated
    with their offerings. 'Bread' preserves the Hebrew imagery.
- source_word: לְנַפְשָׁם
  chosen: for themselves alone
  alternatives:
  - for their appetite
  - for themselves
  - for their own life
  lexicon: HALOT
  rationale: נפש can denote life, self, or appetite. In this context the point is
    that the food is merely for their own consumption and not fit for sacred presentation.
    'For themselves alone' brings out the exclusion from worship.
- source_word: לֹא יָבוֹא בֵּית יְהוָה
  chosen: it will not enter the house of the LORD
  alternatives:
  - it will not come into the house of the LORD
  lexicon: HALOT
  rationale: The singular verb with the preceding bread/food idea indicates that their
    food will not be admissible in the temple. 'Enter' is natural English for cultic
    access.
