id: HOS.9.5
reference: Hosea 9:5
source:
  edition: WLC
  text: מַֽה תַּעֲשׂ֖וּ לְ/י֣וֹם מוֹעֵ֑ד וּ/לְ/י֖וֹם חַג יְהוָֽה־־׃
translation:
  text: What will you do on the day of appointed assembly, and on the day of the feast
    of the LORD?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appointed time' or 'festival' for 'appointed assembly.' The Hebrew מוֹעֵד
      can refer broadly to an appointed time or specifically to a sacred gathering.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה
  chosen: What
  alternatives:
  - How
  lexicon: HALOT
  rationale: Interrogative pronoun introducing a rhetorical question. 'What' is the
    most direct rendering in this context.
- source_word: תַּעֲשׂוּ
  chosen: will you do
  alternatives:
  - shall you do
  lexicon: HALOT
  rationale: Qal imperfect 2mp of עשה. In context it asks what action the people will
    take in the future situation of exile/judgment; English future 'will you do' is
    natural and preserves the force.
- source_word: לְיוֹם
  chosen: on the day of
  alternatives:
  - for the day of
  - at the day of
  lexicon: HALOT
  rationale: The preposition ל with יוֹם here is idiomatic in temporal reference.
    'On the day of' communicates the temporal sense more naturally than a wooden 'for
    the day of.'
- source_word: מוֹעֵד
  chosen: appointed assembly
  alternatives:
  - appointed time
  - appointed feast
  - festival
  lexicon: HALOT
  rationale: מוֹעֵד can denote an appointed time or cultic meeting/festival. Here,
    paired with 'day' and then paralleled by 'feast of the LORD,' it points to a set
    sacred occasion. 'Appointed assembly' preserves the cultic nuance without collapsing
    it into the following חַג.
- source_word: וּלְיוֹם
  chosen: and on the day of
  alternatives:
  - and for the day of
  lexicon: HALOT
  rationale: Same temporal use of ל as earlier in the verse; repeated in English for
    clarity and to reflect the Hebrew parallelism.
- source_word: חַג
  chosen: the feast
  alternatives:
  - festival
  - pilgrimage feast
  lexicon: HALOT
  rationale: חַג commonly refers to a feast/festival, often a pilgrimage feast. 'Feast'
    is concise, idiomatic, and fits the solemn rhetorical tone.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
