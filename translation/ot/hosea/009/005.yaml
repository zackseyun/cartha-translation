theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrinal guidelines specify 'the LORD' as the default rendering
    for YHWH, following Jewish reverence tradition and the Septuagintal pattern.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Nuance of מוֹעֵד in relation to חַג
  chosen_reading: distinguish the two terms as 'appointed assembly' and 'feast'
  alternative_readings:
  - render both broadly as 'festival' language
  rationale: The verse uses two related but not identical cultic terms. Distinguishing
    them preserves the Hebrew parallelism and avoids flattening the rhetorical force
    of Israel's inability to observe sacred occasions.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5: Consistency of key terms,
    or documented exception'
