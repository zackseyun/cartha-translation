theological_decisions:
- issue: Whether 'Egypt' should be rendered literally or interpreted symbolically as a figure for exile
  chosen_reading: Retain the literal place name 'Egypt' in the main text without resolving whether the reference is literal, typological, or rhetorical.
  alternative_readings:
  - Interpret 'Egypt' as a symbolic way of describing exile generally
  - Emend or subordinate 'Egypt' to Assyria as the sole literal destination
  rationale: The Hebrew text explicitly says 'Ephraim will return to Egypt' and then mentions Assyria. Hosea elsewhere can use Egypt with typological force, but the translation should preserve the textual tension rather than harmonize or explain it away. The main text keeps both locations as given.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Cultic force of טָמֵא
  chosen_reading: Render as 'unclean food' to preserve ritual/covenantal impurity rather than a merely hygienic or generic sense.
  alternative_readings:
  - '''defiled food'''
  - '''unclean things'''
  rationale: In context of exile from the LORD's land, the point is covenantal impurity and inability to observe food holiness. 'Unclean food' makes that force clear in natural English without adding interpretation beyond the text.
