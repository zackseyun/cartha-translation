id: HOS.9.3
reference: Hosea 9:3
source:
  edition: WLC
  text: לֹ֥א יֵשְׁב֖וּ בְּ/אֶ֣רֶץ יְהוָ֑ה וְ/שָׁ֤ב אֶפְרַ֨יִם֙ מִצְרַ֔יִם וּ/בְ/אַשּׁ֖וּר טָמֵ֥א יֹאכֵֽלוּ׃
translation:
  text: They will not remain in the land of Yahweh; Ephraim will return to Egypt, and in Assyria they will eat unclean food.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dwell in the land of the LORD.'
    reason: lexical_alternative
  - marker: b
    text: '''Egypt'' may be understood literally or as a typological image of renewed bondage/exile; the Hebrew preserves the tension alongside the reference to Assyria.'
    reason: alternative_reading
  - marker: c
    text: Or 'eat what is unclean.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵשְׁבוּ
  chosen: remain
  alternatives:
  - dwell
  - live
  - sit
  lexicon: HALOT
  rationale: 'Although the verb יָשַׁב often means ''dwell/live,'' in this judgment context with negation and ''in the land of the LORD'' it conveys continued residence: they will no longer stay in the land. ''Remain'' captures the exile implication more naturally in English than the more wooden ''sit'' or the less contextually pointed ''dwell.'''
- source_word: בְּאֶרֶץ יְהוָה
  chosen: in the land of the LORD
  alternatives:
  - in the LORD's land
  - in Yahweh's land
  lexicon: HALOT
  rationale: Construct-like phrase referring to the covenant land belonging to YHWH. Per doctrine, יְהוָה is rendered 'the LORD,' not transliterated. 'The land of the LORD' preserves both ownership and covenantal force.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's stated default for the divine name, preserving reverential convention and standard English Bible practice.
- source_word: וְשָׁב
  chosen: will return
  alternatives:
  - shall return
  - will go back
  lexicon: HALOT
  rationale: The qatal with prefixed conjunction in prophetic discourse functions futurally here. 'Will return' is the most direct rendering of שוב in this exile/judgment context.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The Hebrew explicitly names Ephraim, a common metonym for the northern kingdom. The transliterated proper name should be retained rather than replaced with the interpretive gloss 'Israel.'
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard English rendering of the place name. In Hosea this may carry both literal and typological resonance, but the translation should preserve the place name without over-interpreting it in the main text.
- source_word: וּבְאַשּׁוּר
  chosen: and in Assyria
  alternatives:
  - but in Assyria
  - while in Assyria
  lexicon: HALOT
  rationale: The conjunction is simple waw; 'and' preserves the Hebrew coordination without forcing a stronger adversative nuance. 'In Assyria' is locative and fits the exile setting.
- source_word: טָמֵא
  chosen: unclean food
  alternatives:
  - what is unclean
  - unclean things
  lexicon: HALOT
  rationale: The adjective 'unclean' functions substantivally with the verb 'eat.' Supplying 'food' makes idiomatic English while preserving the cultic sense of defilement associated with prohibited or impure food.
- source_word: יֹאכֵלוּ
  chosen: they will eat
  alternatives:
  - they shall eat
  - they will consume
  lexicon: HALOT
  rationale: 'Straightforward future rendering. Combined with טָמֵא, it communicates the consequence of exile: inability to maintain covenantal food purity.'
