theological_decisions:
- issue: Implicit subject of the judgment verbs
  chosen_reading: The subject of 'will remember' and 'will punish' is God.
  alternative_readings:
  - indefinite/unstated subject carried without explicit identification in translation
  rationale: The Hebrew uses 3ms singular verbs without an expressed subject, but
    in Hosea's prophetic context the one who remembers iniquity and punishes sins
    is plainly God. English can retain 'he' without importing extra doctrinal content,
    while the capitalization is avoided because the Hebrew does not explicitly name
    God in this clause.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
