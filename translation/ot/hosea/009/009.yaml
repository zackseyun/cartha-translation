id: HOS.9.9
reference: Hosea 9:9
source:
  edition: WLC
  text: הֶעְמִֽיקוּ שִׁחֵ֖תוּ כִּ/ימֵ֣י הַ/גִּבְעָ֑ה יִזְכּ֣וֹר עֲוֺנָ֔/ם יִפְק֖וֹד
    חַטֹּאותָֽ/ם־׃ס
translation:
  text: They have gone deep into corruption, as in the days of Gibeah; he will remember
    their iniquity; he will punish their sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gibeah refers to the notorious outrage at Gibeah in Judges 19–21, invoked
      here as a comparison for Israel's corruption.
    reason: cross_reference
  - marker: b
    text: Or, more literally, 'They have gone deep; they have corrupted themselves/as
      in corruption.' The Hebrew is terse and idiomatic.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶעְמִיקוּ
  chosen: have gone deep
  alternatives:
  - have deeply
  - have sunk deep
  - have gone deep down
  lexicon: HALOT
  rationale: Hiphil of עמק literally conveys making deep/going deep. In context it
    functions idiomatically for plunging deeply into wrongdoing. 'Have gone deep'
    preserves the metaphor without over-paraphrasing.
- source_word: שִׁחֵתוּ
  chosen: into corruption
  alternatives:
  - they have corrupted themselves
  - they have acted corruptly
  - they have ruined
  lexicon: HALOT
  rationale: The verb שׁחת in the Piel commonly denotes corrupting/ruining. Combined
    with the preceding verb, the clause is compressed and idiomatic. Rendering the
    pair as 'have gone deep into corruption' reflects the likely sense of deepened
    depravity while keeping both lexical elements represented.
- source_word: כִּימֵי
  chosen: as in the days of
  alternatives:
  - like the days of
  lexicon: HALOT
  rationale: The prefixed כ marks comparison. 'As in the days of' is natural English
    and preserves the historical analogy.
- source_word: הַגִּבְעָה
  chosen: Gibeah
  lexicon: HALOT
  rationale: Proper place name, transliterated per translation philosophy. The phrase
    alludes to the atrocity at Gibeah in Judges 19–21.
- source_word: יִזְכּוֹר
  chosen: he will remember
  alternatives:
  - he remembers
  lexicon: HALOT
  rationale: Qal imperfect 3ms. The subject is implicit and contextually God, continuing
    prophetic judgment language. Future 'will remember' fits the sequence with the
    following imperfect.
- source_word: עֲוֺנָם
  chosen: their iniquity
  alternatives:
  - their guilt
  - their wrongdoing
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt. Here, because
    punishment is expressed separately by יפקוד, 'iniquity' best preserves the moral
    offense as what God remembers.
- source_word: יִפְקֹד
  chosen: he will punish
  alternatives:
  - he will visit
  - he will attend to
  - he will call to account for
  lexicon: HALOT
  rationale: פקד in judgment contexts often means to visit with punishment or call
    to account. 'Punish' makes the judicial sense explicit in clear modern English.
- source_word: חַטֹּאותָם
  chosen: their sins
  alternatives:
  - their sin offerings
  - their offenses
  lexicon: HALOT
  rationale: Although חטאת can in some contexts mean 'sin offering,' here the parallel
    with עון and the judgment context clearly favor 'sins'.
