theological_decisions:
- issue: Divine hatred language
  chosen_reading: Retain the direct wording 'I hated them' without softening.
  alternative_readings:
  - I rejected them
  - I turned against them
  rationale: The Hebrew verb שׂנא plainly expresses hatred/rejection. In keeping with
    original-language primacy and the prohibition against importing doctrinal softening,
    the translation preserves the stark covenant-judgment language while leaving theological
    synthesis to readers and interpreters.
  doctrine_reference: Translation philosophy §1, §3
- issue: Meaning of 'my house'
  chosen_reading: Preserve the metaphor as 'my house' rather than interpret it as
    land, temple, or people in the main text.
  alternative_readings:
  - my land
  - my temple
  - my household
  rationale: The referent may encompass the LORD's covenant domain broadly, but the
    Hebrew image is intentionally compact. Preserving the metaphor maintains theological
    tension and avoids over-specification not demanded by the text.
  doctrine_reference: Translation philosophy §3
