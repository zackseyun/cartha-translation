id: HOS.9.15
reference: Hosea 9:15
source:
  edition: WLC
  text: כָּל רָעָתָ֤/ם בַּ/גִּלְגָּל֙ כִּֽי שָׁ֣ם שְׂנֵאתִ֔י/ם עַ֚ל רֹ֣עַ מַֽעַלְלֵי/הֶ֔ם
    מִ/בֵּיתִ֖/י אֲגָרְשֵׁ֑/ם לֹ֤א אוֹסֵף֙ אַהֲבָתָ֔/ם כָּל שָׂרֵי/הֶ֖ם סֹרְרִֽים־־־׃
translation:
  text: All their evil is at Gilgal; indeed, there I hated them because of the evil
    of their deeds. I will drive them out of my house; I will no longer love them.
    All their princes are rebels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for there I hated them.' The Hebrew conjunction can be read causally
      ('for/because') or with emphatic force ('indeed').
    reason: lexical_alternative
  - marker: b
    text: '''My house'' may refer more specifically to the LORD''s land, sanctuary,
      or covenant household; the Hebrew leaves the image compact.'
    reason: cultural_note
  - marker: c
    text: Or 'All their rulers are rebellious/stubborn.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל רָעָתָם
  chosen: All their evil
  alternatives:
  - All their wickedness
  - Every evil of theirs
  lexicon: HALOT
  rationale: כָּל with the singular abstract noun רָעָה functions collectively, referring
    to the totality of their evil/wickedness. 'Evil' is concise and natural in English
    while preserving the abstract collective sense.
- source_word: בַּגִּלְגָּל
  chosen: at Gilgal
  alternatives:
  - in Gilgal
  lexicon: HALOT
  rationale: The preposition ב here is locative. 'At Gilgal' is idiomatic for a place-name
    and suits the likely reference to the cultic site associated with Israel's apostasy.
- source_word: כִּי שָׁם
  chosen: indeed, there
  alternatives:
  - for there
  - because there
  lexicon: HALOT
  rationale: 'כִּי can be causal or emphatic. Here it introduces an explanation with
    strong emphasis on the location: ''indeed, there.'' This preserves both the connective
    and the rhetorical stress without overloading the English.'
- source_word: שְׂנֵאתִים
  chosen: I hated them
  alternatives:
  - I came to hate them
  lexicon: HALOT
  rationale: The qatal 1cs with 3mp suffix straightforwardly states divine rejection
    in past aspect from the speaker's perspective. 'I hated them' is the plain sense
    and should not be softened.
- source_word: עַל רֹעַ מַעַלְלֵיהֶם
  chosen: because of the evil of their deeds
  alternatives:
  - for the wickedness of their actions
  - on account of their evil deeds
  lexicon: HALOT
  rationale: עַל here gives cause/ground. רֹעַ is 'evil/wickedness' and מַעַלְלִים
    refers to deeds/actions. 'Because of the evil of their deeds' preserves the Hebrew
    structure and moral force.
- source_word: מִבֵּיתִי
  chosen: out of my house
  alternatives:
  - from my house
  lexicon: HALOT
  rationale: With גָּרַשׁ, the מן phrase marks expulsion from a place. 'Out of my
    house' makes the force of removal explicit and reads naturally in English. 'My
    house' likely refers metaphorically to the LORD's covenant household/land/sanctuary
    sphere, but the translation leaves that image intact.
- source_word: אֲגָרְשֵׁם
  chosen: I will drive them out
  alternatives:
  - I will cast them out
  - I will expel them
  lexicon: HALOT
  rationale: גָּרַשׁ commonly denotes driving out or expelling. 'Drive them out' is
    vivid, idiomatic, and preserves the severity of judgment.
- source_word: לֹא אוֹסֵף אַהֲבָתָם
  chosen: I will no longer love them
  alternatives:
  - I will not continue to love them
  - I will add no more to love them
  lexicon: HALOT
  rationale: 'אָסַף in this idiom means ''continue/add again.'' The construction conveys
    cessation: ''I will no longer love them.'' This is the clearest natural English
    equivalent.'
- source_word: כָּל שָׂרֵיהֶם
  chosen: All their princes
  alternatives:
  - All their rulers
  - All their officials
  lexicon: HALOT
  rationale: שָׂרִים are leaders/princes/officials. 'Princes' preserves the elevated
    political nuance common in prophetic literature, though not necessarily implying
    royal sons only.
- source_word: סֹרְרִים
  chosen: are rebels
  alternatives:
  - are stubborn
  - are rebellious
  lexicon: HALOT
  rationale: The participle from סרר denotes stubborn rebellion. 'Are rebels' gives
    a strong predicate in idiomatic English and captures the leaders' settled character.
