theological_decisions:
- issue: Referent of the feminine singular suffix in בָּהּ
  chosen_reading: 'The suffix refers to Israel/Ephraim personified as a feminine singular
    entity: ''her.'''
  alternative_readings:
  - The suffix is taken collectively and smoothed to 'them' in English
  - The suffix refers to the land
  rationale: This is primarily a literary-context decision rather than a doctrinal
    one. Hosea frequently personifies the nation in feminine terms, and preserving
    'her' keeps the prophetic imagery and avoids unnecessary interpretive flattening.
  doctrine_reference: Translation philosophy §3, §5
