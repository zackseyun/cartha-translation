id: HOS.9.2
reference: Hosea 9:2
source:
  edition: WLC
  text: גֹּ֥רֶן וָ/יֶ֖קֶב לֹ֣א יִרְעֵ֑/ם וְ/תִיר֖וֹשׁ יְכַ֥חֶשׁ בָּֽ/הּ׃
translation:
  text: Threshing floor and winepress will not feed them, and new wine will fail her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'new wine will disappoint her' or 'new wine will prove false to her.'
      The Hebrew verb can carry the sense of failing to deliver what was expected.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּרֶן
  chosen: threshing floor
  alternatives:
  - grain floor
  lexicon: HALOT
  rationale: The noun denotes the threshing floor, often standing metonymically for
    grain production or harvest yield. Retaining the concrete image fits Hosea's agricultural
    judgment imagery better than abstracting to 'grain.'
- source_word: יֶקֶב
  chosen: winepress
  alternatives:
  - vat
  lexicon: HALOT
  rationale: The term refers to the place or apparatus for pressing grapes. 'Winepress'
    is the standard clear English equivalent and pairs naturally with 'threshing floor.'
- source_word: יִרְעֵם
  chosen: will not feed them
  alternatives:
  - will not pasture them
  - will not provide for them
  lexicon: HALOT
  rationale: From רעה, 'to pasture/feed.' With threshing floor and winepress as subjects,
    the sense is provision of sustenance, so 'feed them' preserves the metaphor while
    remaining idiomatic. 'Pasture' would sound unnatural with these inanimate subjects.
- source_word: תִּירוֹשׁ
  chosen: new wine
  alternatives:
  - fresh wine
  - wine
  lexicon: HALOT
  rationale: The term commonly denotes fresh/new wine rather than wine in general.
    'New wine' preserves the agricultural and covenantal nuance of produce that should
    have been abundant.
- source_word: יְכַחֶשׁ
  chosen: will fail
  alternatives:
  - will deceive
  - will prove false
  - will disappoint
  lexicon: HALOT
  rationale: The verb כחש can mean to lie, disappoint, or fail. Here with 'new wine'
    as subject, the sense is that it will not yield as expected. 'Will fail' is concise
    and natural in English while preserving the idea of disappointed expectation.
- source_word: בָּהּ
  chosen: her
  alternatives:
  - them
  - it
  lexicon: HALOT
  rationale: The suffix is 3fs singular. In context it most naturally refers back
    to Ephraim/Israel conceived as a feminine singular entity, a common prophetic
    usage. Rendering it 'her' preserves the grammatical and literary personification
    rather than smoothing it into a plural.
