id: HOS.9.6
reference: Hosea 9:6
source:
  edition: WLC
  text: כִּֽי הִנֵּ֤ה הָֽלְכוּ֙ מִ/שֹּׁ֔ד מִצְרַ֥יִם תְּקַבְּצֵ֖/ם מֹ֣ף תְּקַבְּרֵ֑/ם
    מַחְמַ֣ד לְ/כַסְפָּ֗/ם קִמּוֹשׂ֙ יִֽירָשֵׁ֔/ם ח֖וֹחַ בְּ/אָהֳלֵי/הֶֽם־׃
translation:
  text: For behold, they have gone away from destruction; Egypt will gather them,
    Memphis will bury them. Weeds will possess the precious things of their silver;
    thorns will be in their tents.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nettles will inherit their silver treasures.' The Hebrew plant term
      is uncertain and may refer more specifically to nettles or similar overgrowth.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/שֹּׁד
  chosen: from destruction
  alternatives:
  - from devastation
  - because of devastation
  lexicon: HALOT
  rationale: שֹׁד denotes violent ruin, devastation, or destruction. With מִן after
    הָלְכוּ, the sense is that they have gone away in flight from devastation, not
    that they have escaped safely. 'From destruction' is concise and preserves the
    causal/spatial force without overparaphrasing.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard rendering of the place name.
- source_word: תְּקַבְּצֵם
  chosen: will gather them
  alternatives:
  - will collect them
  - will assemble them
  lexicon: HALOT
  rationale: קבץ in the Piel commonly means gather/collect. Here Egypt is personified
    as the place that gathers the refugees into exile. 'Gather' preserves the irony
    of a term often used positively elsewhere.
- source_word: מֹף
  chosen: Memphis
  alternatives:
  - Moph
  lexicon: HALOT
  rationale: מֹף is the Egyptian city Memphis. Translating the known place name aids
    readability while preserving the historical reference.
- source_word: תְּקַבְּרֵם
  chosen: will bury them
  lexicon: HALOT
  rationale: 'קבר straightforwardly means bury. The parallel with ''Egypt will gather
    them'' intensifies the judgment: exile culminates in death.'
- source_word: מַחְמַד לְכַסְפָּם
  chosen: the precious things of their silver
  alternatives:
  - their treasured silver
  - their desirable silver treasures
  lexicon: HALOT
  rationale: מַחְמַד denotes something desirable or precious. The construct-like relation
    with לְכַסְפָּם points to valued silver possessions rather than silver abstractly.
    'The precious things of their silver' stays close to the Hebrew while remaining
    intelligible.
- source_word: קִמּוֹשׂ
  chosen: weeds
  alternatives:
  - nettles
  - thornbush
  - thistles
  lexicon: HALOT
  rationale: The plant term refers broadly to noxious overgrowth in ruined places.
    English identification is uncertain; 'weeds' communicates invasive desolation
    without false botanical precision. A more specific traditional option is preserved
    in a footnote.
- source_word: יִירָשֵׁם
  chosen: will possess
  alternatives:
  - will inherit
  - will take over
  lexicon: HALOT
  rationale: ירשׁ commonly means possess/inherit/dispossess. Here the subject is the
    weed growth taking over abandoned valuables or sites. 'Will possess' preserves
    the ironic reversal and echoes covenantal land language without sounding unnatural.
- source_word: חוֹחַ
  chosen: thorns
  alternatives:
  - briers
  - brambles
  lexicon: HALOT
  rationale: A generic thorny plant is intended. 'Thorns' is the clearest modern English
    equivalent.
- source_word: בְּאָהֳלֵיהֶם
  chosen: in their tents
  alternatives:
  - in their dwellings
  lexicon: HALOT
  rationale: אֹהֶל literally means tent. Even if it can metonymically refer to habitations,
    'tents' preserves the Hebrew image and the poetic parallelism of abandonment.
