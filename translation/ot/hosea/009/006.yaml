theological_decisions:
- issue: Interpretation of the opening clause הָלְכוּ מִשֹּׁד
  chosen_reading: They have gone away in flight from destruction/devastation.
  alternative_readings:
  - They have gone because of destruction.
  - They have escaped from destruction.
  rationale: The context is judgment, exile, and death in Egypt; the verse does not
    present successful escape but futile flight. Rendering the clause as movement
    away from devastation best fits the syntax and the following lines about Egypt
    gathering and Memphis burying them.
