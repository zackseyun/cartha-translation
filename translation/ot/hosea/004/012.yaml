id: HOS.4.12
reference: Hosea 4:12
source:
  edition: WLC
  text: עַמִּ/י֙ בְּ/עֵצ֣/וֹ יִשְׁאָ֔ל וּ/מַקְל֖/וֹ יַגִּ֣יד ל֑/וֹ כִּ֣י ר֤וּחַ זְנוּנִים֙
    הִתְעָ֔ה וַ/יִּזְנ֖וּ מִ/תַּ֥חַת אֱלֹהֵי/הֶֽם׃
translation:
  text: My people consult their piece of wood, and their staff tells them; for a spirit
    of whoredom has led them astray, and they have played the whore, departing from
    under their God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their wood' or, more interpretively, 'their wooden idol.' The Hebrew
      is literally 'his wood,' likely a collective singular referring to a wooden
      cult object used in divination.
    reason: lexical_alternative
  - marker: b
    text: Or 'a spirit of prostitution' or 'a spirit of unfaithfulness.' The Hebrew
      keeps the prostitution metaphor explicit.
    reason: lexical_alternative
  - marker: c
    text: Literally 'from under their God,' an idiom for departing from the proper
      allegiance and authority of their God.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמִּי
  chosen: My people
  alternatives:
  - My nation
  lexicon: HALOT
  rationale: עַם commonly means 'people' in the collective covenantal sense. With
    the 1cs suffix, it is YHWH speaking of Israel as 'my people.' 'Nation' is possible
    in some contexts but is less relational here.
- source_word: בְּעֵצוֹ
  chosen: their piece of wood
  alternatives:
  - their wood
  - their idol of wood
  lexicon: HALOT
  rationale: Literally 'in/with his wood.' In context this refers to a wooden cult
    object consulted for divination. 'Piece of wood' preserves the concrete, mocking
    force of the Hebrew better than the more interpretive 'idol of wood.' The possessive
    is rendered distributively as 'their' to match the plural sense of the people
    addressed in English.
- source_word: יִשְׁאַל
  chosen: consult
  alternatives:
  - asks
  - inquires of
  lexicon: HALOT
  rationale: שׁאל literally means 'ask/inquire.' 'Consult' best fits the divinatory
    context of seeking guidance from an object while remaining idiomatic in English.
- source_word: וּמַקְלוֹ
  chosen: their staff
  alternatives:
  - their stick
  - his staff
  lexicon: HALOT
  rationale: מַקֵּל means 'staff, stick.' 'Staff' is the natural English term in a
    divination context. The Hebrew singular with suffix is rendered distributively
    as 'their staff' because the subject is collective 'my people.'
- source_word: יַגִּיד לוֹ
  chosen: tells them
  alternatives:
  - declares to him
  - announces to him
  lexicon: HALOT
  rationale: נגד in Hiphil means 'tell, declare, make known.' English plural 'them'
    reflects the collective referent of 'my people.' 'Tells' is concise and natural.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here כִּי introduces the reason for the people's absurd behavior and
    apostasy. 'For' fits the explanatory flow.
- source_word: רוּחַ זְנוּנִים
  chosen: a spirit of whoredom
  alternatives:
  - a spirit of prostitution
  - a spirit of harlotry
  - a spirit of unfaithfulness
  lexicon: HALOT
  rationale: The phrase is metaphorical but intentionally sexualized, describing covenant
    infidelity in terms of prostitution. 'Whoredom' preserves the prophetic shock
    and metaphor more directly than the softened 'unfaithfulness.'
- source_word: הִתְעָה
  chosen: has led them astray
  alternatives:
  - has deceived them
  - has caused them to wander
  lexicon: HALOT
  rationale: תעה in Hiphil conveys causing to err or wander. 'Has led them astray'
    captures both deception and deviation from covenant faithfulness.
- source_word: וַיִּזְנוּ
  chosen: they have played the whore
  alternatives:
  - they have committed whoredom
  - they have prostituted themselves
  - they have been unfaithful
  lexicon: HALOT
  rationale: זנה is the key prophetic verb for sexual immorality used metaphorically
    for idolatry. 'Played the whore' preserves the metaphor and rhetorical force better
    than the abstract 'been unfaithful.'
- source_word: מִתַּחַת אֱלֹהֵיהֶם
  chosen: departing from under their God
  alternatives:
  - from under their God
  - away from their God
  lexicon: HALOT
  rationale: The idiom literally means 'from under' and conveys leaving proper covenantal
    allegiance/authority. 'Departing from under their God' preserves the Hebrew image
    while making the relation intelligible in English.
