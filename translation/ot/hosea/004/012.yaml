theological_decisions:
- issue: Prophetic sexual metaphor for idolatry
  chosen_reading: Retain explicit prostitution/whoredom language in the main text
  alternative_readings:
  - Use softened language such as 'unfaithfulness' or 'idolatry'
  rationale: Hosea intentionally uses sexualized covenant language to portray Israel's
    apostasy. Softening the metaphor would reduce the rhetorical and theological force
    of the passage and import interpretation beyond the lexical data.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Collective singulars with pronominal suffixes
  chosen_reading: Render singular Hebrew possessives distributively in English ('their
    piece of wood,' 'their staff,' 'tells them')
  alternative_readings:
  - Preserve singular English forms throughout ('his wood,' 'his staff,' 'tells him')
  rationale: The Hebrew uses collective singular forms for 'my people.' English distributive
    plurals communicate the sense naturally without changing the referent.
  doctrine_reference: Translation philosophy §6
