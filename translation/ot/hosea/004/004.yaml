theological_decisions:
- issue: Interpretation of the final clause 'your people are like those who contend
    with a priest'
  chosen_reading: A simile describing the people's rebellious refusal of correction
    by comparing them to people who dispute priestly authority.
  alternative_readings:
  - A more specific allusion to Deuteronomic law against resisting priestly judgment
  - A textual sense implying the people themselves function like priest-opponents
    in covenant lawsuit imagery
  rationale: The Hebrew plainly presents a comparison, but its force may be either
    general rebellion or a sharper covenant-legal allusion. The translation preserves
    the simile without importing a fuller legal interpretation into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
