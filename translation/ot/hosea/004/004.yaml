id: HOS.4.4
reference: Hosea 4:4
source:
  edition: WLC
  text: אַ֥ךְ אִ֛ישׁ אַל יָרֵ֖ב וְ/אַל יוֹכַ֣ח אִ֑ישׁ וְ/עַמְּ/ךָ֖ כִּ/מְרִיבֵ֥י כֹהֵֽן־־׃
translation:
  text: Yet let no man contend, and let no man reprove, for your people are like those
    who contend with a priest.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rebuke' for 'reprove'; the Hebrew verb can denote correction, rebuke,
      or legal argument.
    reason: lexical_alternative
  - marker: b
    text: The comparison may echo the gravity of resisting priestly judgment in the
      law; compare Deuteronomy 17:12.
    reason: cross_reference
lexical_decisions:
- source_word: אַךְ
  chosen: Yet
  alternatives:
  - Surely
  - Only
  - Nevertheless
  lexicon: HALOT
  rationale: Here אַךְ marks a strong adversative or restrictive transition from the
    preceding accusation. 'Yet' fits the discourse flow better than the more wooden
    'only' and preserves the abrupt turn.
- source_word: אִישׁ
  chosen: man
  alternatives:
  - person
  - anyone
  lexicon: HALOT
  rationale: The noun is singular masculine used generically. Per gender-accurate
    policy, 'man' best reflects the Hebrew form and representative force in this context.
- source_word: אַל יָרֵב
  chosen: let no man contend
  alternatives:
  - let no man accuse
  - let no man bring a case
  - let no man strive
  lexicon: HALOT
  rationale: ריב commonly carries the sense of contending, disputing, or bringing
    a legal complaint. 'Contend' preserves both the interpersonal and quasi-judicial
    nuance without over-specifying a courtroom setting.
- source_word: וְאַל יוֹכַח
  chosen: and let no man reprove
  alternatives:
  - and let no man rebuke
  - and let no man correct
  lexicon: HALOT
  rationale: יכח in the Hiphil often means to reprove, rebuke, or argue a case. 'Reprove'
    pairs well with 'contend' and keeps the moral-corrective sense without sounding
    overly colloquial.
- source_word: וְעַמְּךָ
  chosen: for your people
  alternatives:
  - and your people
  - indeed your people
  lexicon: HALOT
  rationale: The conjunction here is best taken as explanatory in context, introducing
    the reason for the prohibition. 'For your people' makes the logic clear in natural
    English.
- source_word: כִּמְרִיבֵי
  chosen: are like those who contend
  alternatives:
  - are like contenders
  - are like those who bring charges
  - are like men who strive
  lexicon: HALOT
  rationale: The prefixed כ marks comparison, and the participial form from ריב denotes
    people characterized by contention. 'Those who contend' is clear and preserves
    the verbal connection with יָרֵב earlier in the verse.
- source_word: כֹהֵן
  chosen: a priest
  alternatives:
  - the priest
  lexicon: HALOT
  rationale: 'The singular noun here is generic rather than necessarily definite.
    ''A priest'' communicates the class sense: the people are like those who brazenly
    dispute with priestly authority.'
