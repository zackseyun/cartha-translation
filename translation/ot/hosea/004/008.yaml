theological_decisions:
- issue: Interpretation of חַטַּאת in a priestly-corruption context
  chosen_reading: Rendered as 'sin' in the main text, with 'sin offering' preserved
    as an alternative.
  alternative_readings:
  - sin offering
  rationale: The verse condemns priests who profit from the people's wrongdoing. The
    Hebrew permits either the abstract 'sin' or the cultic 'sin offering.' Because
    the immediate parallel speaks of craving 'their iniquity,' the main text keeps
    the moral indictment broad, while the footnote preserves the sacrificial nuance
    that may also be intended.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it
