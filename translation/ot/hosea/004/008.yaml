id: HOS.4.8
reference: Hosea 4:8
source:
  edition: WLC
  text: חַטַּ֥את עַמִּ֖/י יֹאכֵ֑לוּ וְ/אֶל עֲוֺנָ֖/ם יִשְׂא֥וּ נַפְשֽׁ/וֹ־׃
translation:
  text: They feed on the sin of my people, and they set their appetite on their iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'They eat the sin offering of my people.' The Hebrew word can mean either
      'sin' or 'sin offering.'
    reason: alternative_reading
  - marker: b
    text: Literally, 'and to their iniquity he/they lift(s) up his soul'; the Hebrew
      idiom means to desire or crave, and the singular 'his soul' is grammatically
      difficult in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַטַּאת
  chosen: sin
  alternatives:
  - sin offering
  lexicon: HALOT
  rationale: The noun can denote either 'sin' or 'sin offering.' In this context,
    addressed against corrupt priests, both senses are possible because priests literally
    consumed portions of offerings, yet the parallel with 'their iniquity' and the
    accusatory force favor the broader moral sense 'sin' in the main text. The alternative
    is preserved in a footnote because it materially affects interpretation.
- source_word: יֹאכֵלוּ
  chosen: feed on
  alternatives:
  - eat
  lexicon: HALOT
  rationale: The verb literally means 'eat,' but 'feed on' better conveys the figurative
    exploitation in idiomatic modern English while still preserving the consumption
    metaphor.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Straightforward construct with first-person singular suffix; retained
    formally.
- source_word: עֲוֺנָם
  chosen: their iniquity
  alternatives:
  - their guilt
  - their punishment
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or punishment for guilt. Here the moral
    sense fits the parallelism and the priests' desire for the people's continued
    wrongdoing. 'Iniquity' preserves the ethical weight.
- source_word: יִשְׂאוּ נַפְשׁוֹ
  chosen: they set their appetite on
  alternatives:
  - they lift up his soul to
  - they desire
  - their soul longs for
  lexicon: HALOT
  rationale: The idiom involving נשׂא + נפשׁ conveys directed desire or appetite.
    Because the verb is plural and נַפְשׁוֹ is singular, the phrase is somewhat compressed;
    idiomatic English 'set their appetite on' captures the sense of craving without
    wooden obscurity.
- source_word: נַפְשׁוֹ
  chosen: their appetite
  alternatives:
  - their soul
  - his soul
  lexicon: HALOT
  rationale: Although the consonantal form points to 'his soul,' many understand the
    expression idiomatically with collective or distributive force in context. Rendering
    the idiom as 'their appetite' communicates the sense rather than reproducing a
    potentially confusing literal singular. The more literal alternative is preserved
    in a footnote due to the grammatical irregularity.
