theological_decisions:
- issue: Referent of 'their glory'
  chosen_reading: left as 'their glory' without interpretive expansion
  alternative_readings:
  - their priestly honor
  - their wealth/status
  - God himself as their glory
  rationale: 'The Hebrew does not specify the exact referent, and the verse''s force
    works by preserving the ambiguity: what was their honor/exaltation will become
    disgrace. Expanding the phrase in the main text would overinterpret the line.'
  doctrine_reference: Preserve theological tension rather than resolve it.
