id: HOS.4.7
reference: Hosea 4:7
source:
  edition: WLC
  text: כְּ/רֻבָּ֖/ם כֵּ֣ן חָֽטְאוּ לִ֑/י כְּבוֹדָ֖/ם בְּ/קָל֥וֹן אָמִֽיר־׃
translation:
  text: The more they increased, the more they sinned against me; I will change their
    glory into disgrace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As they multiplied, so they sinned against me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will exchange their glory for disgrace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּרֻבָּם
  chosen: The more they increased
  alternatives:
  - As they multiplied
  - According to their abundance
  lexicon: HALOT
  rationale: 'The prefixed כ plus רבה here functions comparatively/temporally: ''as/in
    proportion as they became many.'' English idiom is best captured by ''The more
    they increased,'' which preserves the correlation with כֵּן while remaining natural.'
- source_word: כֵּן
  chosen: the more
  alternatives:
  - so
  - thus
  lexicon: HALOT
  rationale: 'In correlation with כְּרֻבָּם, כֵּן marks the corresponding result:
    ''so/thus.'' In English, ''the more ... the more ...'' best reproduces the paired
    construction.'
- source_word: חָטְאוּ לִי
  chosen: they sinned against me
  alternatives:
  - they sinned to me
  lexicon: HALOT
  rationale: The verb חטא with ל can denote sin directed against someone. 'Against
    me' is the natural English rendering and makes explicit the offense against God
    without adding content.
- source_word: כְּבוֹדָם
  chosen: their glory
  alternatives:
  - their honor
  lexicon: HALOT
  rationale: כָּבוֹד commonly denotes glory, honor, or status. 'Glory' preserves the
    weight and possible irony of what had been their exalted status.
- source_word: בְּקָלוֹן
  chosen: into disgrace
  alternatives:
  - for shame
  - into shame
  - with dishonor
  lexicon: HALOT
  rationale: קָלוֹן denotes shame/disgrace. With the verb אָמִיר ('I will change/exchange'),
    English 'into disgrace' clearly expresses transformation from one state to another.
- source_word: אָמִיר
  chosen: I will change
  alternatives:
  - I will exchange
  - I will turn
  lexicon: HALOT
  rationale: Hiphil of מור/אמר in this form is commonly understood as 'change, exchange.'
    'I will change' is clear modern English; 'exchange' is possible but slightly less
    natural here. The first-person singular subject is retained explicitly.
