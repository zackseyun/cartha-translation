theological_decisions:
- issue: Scope of הָאָרֶץ
  chosen_reading: the land
  alternative_readings:
  - the earth
  rationale: The verse is embedded in an oracle against Israel, so the covenant-land
    sense is more likely than a universal statement about the whole earth. The translation
    preserves the local-prophetic force without denying broader ecological implications.
