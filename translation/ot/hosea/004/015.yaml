theological_decisions:
- issue: Prophetic sexual metaphor for covenant unfaithfulness
  chosen_reading: Retain the metaphor explicitly with 'prostitute yourself' rather than softening it to a generic 'be unfaithful.'
  alternative_readings:
  - be unfaithful
  - commit spiritual adultery
  rationale: Hosea's rhetoric intentionally uses sexualized covenant imagery to expose idolatry. Preserving the metaphor maintains the theological and literary force without adding interpretive language not present in the Hebrew.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: Rendering of the divine name in the oath formula
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
