id: HOS.4.15
reference: Hosea 4:15
source:
  edition: WLC
  text: אִם זֹנֶ֤ה אַתָּה֙ יִשְׂרָאֵ֔ל אַל יֶאְשַׁ֖ם יְהוּדָ֑ה וְ/אַל תָּבֹ֣אוּ הַ/גִּלְגָּ֗ל וְ/אַֽל תַּעֲלוּ֙ בֵּ֣ית אָ֔וֶן וְ/אַל תִּשָּׁבְע֖וּ חַי יְהוָֽה־־־־־־׃
translation:
  text: Though you prostitute yourself, Israel, let not Judah become guilty. And do not go to Gilgal, and do not go up to Beth-aven, and do not swear, ‘As Yahweh lives.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beth-aven means 'house of wickedness' or 'house of iniquity,' likely a polemical name for Bethel.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  chosen: Though
  alternatives:
  - If
  lexicon: HALOT
  rationale: 'Here אִם introduces a concessive sense in context rather than a simple condition: Israel''s unfaithfulness is assumed, and the warning is that Judah must not share in it. ''Though'' communicates that force more naturally in English.'
- source_word: זֹנֶה
  chosen: prostitute yourself
  alternatives:
  - play the prostitute
  - commit whoredom
  - be a harlot
  lexicon: HALOT
  rationale: The participle from זנה is a standard prophetic metaphor for covenant unfaithfulness expressed as sexual immorality. 'Prostitute yourself' preserves the shocking metaphor while remaining readable modern English.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name of the northern kingdom/personified nation; transliterated per translation philosophy.
- source_word: אַל יֶאְשַׁם
  chosen: let not ... become guilty
  alternatives:
  - do not let ... incur guilt
  - let not ... be held guilty
  lexicon: HALOT
  rationale: The verb אשם in the Qal can denote becoming guilty or incurring guilt. 'Let not Judah become guilty' fits the jussive force and warns Judah against participation in Israel's sin.
- source_word: יְהוּדָה
  chosen: Judah
  rationale: Proper name for the southern kingdom; transliterated.
- source_word: תָּבֹאוּ הַגִּלְגָּל
  chosen: go to Gilgal
  alternatives:
  - enter Gilgal
  - come to Gilgal
  lexicon: HALOT
  rationale: בוא commonly means 'come/go/enter.' In English, with a place-name in a prohibition, 'go to Gilgal' is the most natural rendering.
- source_word: הַגִּלְגָּל
  chosen: Gilgal
  rationale: Place-name transliterated. The article is retained in Hebrew idiomatically but not represented in English proper-name usage.
- source_word: תַּעֲלוּ
  chosen: go up
  alternatives:
  - ascend
  lexicon: HALOT
  rationale: עלה literally means 'go up.' Retaining 'go up' preserves the Hebrew idiom for travel to a cultic site without sounding overly formal.
- source_word: בֵּית אָוֶן
  chosen: Beth-aven
  alternatives:
  - House of Wickedness
  - Bethel
  lexicon: HALOT
  rationale: The text deliberately uses the polemical place-name Beth-aven ('house of wickedness/iniquity'), likely in place of Bethel. Transliteration preserves the prophetic wordplay in the main text better than flattening it to 'Bethel,' while the sense can be explained in a footnote.
- source_word: תִּשָּׁבְעוּ
  chosen: swear
  alternatives:
  - take an oath
  lexicon: HALOT
  rationale: The Niphal here functions in the sense of swearing an oath. 'Swear' is concise and idiomatic.
- source_word: חַי יְהוָה
  chosen: As the LORD lives
  alternatives:
  - By the life of the LORD
  - The LORD lives
  lexicon: HALOT
  rationale: This is a standard oath formula. 'As the LORD lives' is the clearest idiomatic English equivalent in this context.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
