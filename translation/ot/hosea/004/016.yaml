id: HOS.4.16
reference: Hosea 4:16
source:
  edition: WLC
  text: כִּ֚י כְּ/פָרָ֣ה סֹֽרֵרָ֔ה סָרַ֖ר יִשְׂרָאֵ֑ל עַתָּה֙ יִרְעֵ֣/ם יְהוָ֔ה כְּ/כֶ֖בֶשׂ בַּ/מֶּרְחָֽב׃
translation:
  text: For Israel is as stubborn as a stubborn heifer; now Yahweh will pasture them like a lamb in a broad place.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a sheep in an open space' or 'in a spacious place.' The Hebrew image may imply either open pasturage or vulnerable exposure under judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Surely
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding accusation/judgment. 'For' best preserves the explanatory force in natural English.
- source_word: כְּפָרָה
  chosen: as a ... heifer
  alternatives:
  - like a cow
  - like a young cow
  lexicon: HALOT
  rationale: פָרָה denotes a cow/heifer. 'Heifer' fits the feminine singular image and preserves the vivid agricultural metaphor more precisely than the generic 'cow'.
- source_word: סֹרֵרָה
  chosen: stubborn
  alternatives:
  - rebellious
  - wayward
  lexicon: HALOT
  rationale: The participle describes obstinate resistance. 'Stubborn' is idiomatic in English with livestock imagery and matches the sense of refusal to submit.
- source_word: סָרַר
  chosen: is
  alternatives:
  - has become
  - has acted rebelliously
  lexicon: HALOT
  rationale: The finite verb repeats the same root as the participle for emphasis. In English, rendering both explicitly as 'is stubborn as a stubborn heifer' preserves the rhetorical repetition better than a more wooden 'has rebelled like a rebellious heifer.'
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Standard transliteration of the proper name.
- source_word: עַתָּה
  chosen: now
  alternatives:
  - so now
  - at this time
  lexicon: HALOT
  rationale: Marks the consequence that follows from Israel's stubbornness; 'now' is concise and natural.
- source_word: יִרְעֵם
  chosen: will pasture them
  alternatives:
  - will feed them
  - will shepherd them
  lexicon: HALOT
  rationale: From רעה, 'to pasture/shepherd/feed.' 'Will pasture them' keeps the livestock imagery and allows the following simile 'like a lamb in a broad place' to remain coherent. 'Shepherd them' could sound too positively pastoral in English, whereas the context is likely ironic or judicial.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: כְּכֶבֶשׂ
  chosen: like a lamb
  alternatives:
  - like a sheep
  - like a ram
  lexicon: HALOT
  rationale: כֶּבֶשׂ commonly denotes a lamb/young sheep. 'Lamb' best matches the singular image and the vulnerability implied in context.
- source_word: בַּמֶּרְחָב
  chosen: in a broad place
  alternatives:
  - in a wide pasture
  - in an open space
  - in a spacious place
  lexicon: HALOT
  rationale: 'מֶרְחָב literally denotes a broad or spacious place. ''Broad place'' preserves the Hebrew image and leaves open the interpretive tension: it may suggest freedom, exposure, or dispersal under judgment.'
