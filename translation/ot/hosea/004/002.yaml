id: HOS.4.2
reference: Hosea 4:2
source:
  edition: WLC
  text: אָלֹ֣ה וְ/כַחֵ֔שׁ וְ/רָצֹ֥חַ וְ/גָנֹ֖ב וְ/נָאֹ֑ף פָּרָ֕צוּ וְ/דָמִ֥ים בְּ/דָמִ֖ים
    נָגָֽעוּ׃
translation:
  text: Cursing, lying, murder, theft, and adultery break out; bloodshed follows bloodshed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'bloods touch bloods,' an idiom meaning that acts of bloodshed
      come one after another.
    reason: lexical_alternative
  - marker: b
    text: '''Cursing'' may also be understood as oath-violation or false swearing
      in this covenant-lawsuit context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָלֹה
  chosen: Cursing
  alternatives:
  - swearing
  - oath-breaking
  lexicon: HALOT
  rationale: The noun/verb form here denotes the utterance of curses or false/sworn
    imprecations in a vice list. 'Cursing' is concise and natural in English. 'Swearing'
    could be misunderstood as profanity generally, and 'oath-breaking' is too narrow
    for the immediate list.
- source_word: כַחֵשׁ
  chosen: lying
  alternatives:
  - deception
  - falsehood
  lexicon: HALOT
  rationale: The verb means to lie or deal falsely. 'Lying' fits the asyndetic vice-list
    style and pairs well with the surrounding infinitive-like items.
- source_word: רָצֹחַ
  chosen: murder
  alternatives:
  - killing
  - slaying
  lexicon: HALOT
  rationale: The verb רצח commonly denotes unlawful killing rather than killing in
    general. 'Murder' best preserves that moral force in this context.
- source_word: גָנֹב
  chosen: theft
  alternatives:
  - stealing
  lexicon: HALOT
  rationale: Rendered as the noun 'theft' to maintain parallelism with the surrounding
    list items in English. 'Stealing' is also possible, but 'theft' gives a tighter
    catalog style.
- source_word: נָאֹף
  chosen: adultery
  alternatives:
  - committing adultery
  lexicon: HALOT
  rationale: The verb refers specifically to adultery. The nominal rendering keeps
    the vice-list compact and balanced.
- source_word: פָּרָצוּ
  chosen: break out
  alternatives:
  - burst forth
  - have broken all bounds
  lexicon: HALOT
  rationale: The verb literally conveys breaking through/bursting out. Here it summarizes
    the eruption of the listed sins. 'Break out' is vivid and idiomatic without overinterpreting.
    Some English versions expand to 'break all bounds,' but that adds an object not
    explicit in the Hebrew.
- source_word: דָמִים
  chosen: bloodshed
  alternatives:
  - bloodguilt
  - blood
  lexicon: HALOT
  rationale: In this context the plural 'bloods' is an idiom for acts of bloodshed
    or bloodguilt. 'Bloodshed' communicates the concrete violence of the verse more
    clearly than the more technical 'bloodguilt'.
- source_word: בְּדָמִים נָגָעוּ
  chosen: follows bloodshed
  alternatives:
  - touches bloodshed
  - bloodshed touches bloodshed
  - one act of bloodshed follows another
  lexicon: HALOT
  rationale: Literally, 'bloods touch bloods.' The idiom expresses unbroken succession
    of violent acts. 'Follows bloodshed' gives clear modern English while preserving
    the sense of one bloody act pressing upon another.
