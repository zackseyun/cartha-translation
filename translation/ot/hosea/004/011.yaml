id: HOS.4.11
reference: Hosea 4:11
source:
  edition: WLC
  text: זְנ֛וּת וְ/יַ֥יִן וְ/תִיר֖וֹשׁ יִֽקַּֽח לֵֽב־׃
translation:
  text: Sexual immorality, wine, and new wine take away the heart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'take away understanding' or 'deprive of sense'; Hebrew 'take away the
      heart.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְנוּת
  chosen: sexual immorality
  alternatives:
  - prostitution
  - whoredom
  - fornication
  lexicon: HALOT
  rationale: The noun denotes illicit sexual behavior broadly, often with overtones
    of prostitution or covenantal unfaithfulness in Hosea. 'Sexual immorality' is
    clear modern English and preserves the moral force without sounding archaic like
    'whoredom.'
- source_word: יַיִן
  chosen: wine
  lexicon: HALOT
  rationale: Standard rendering for fermented wine; no contextual reason to vary.
- source_word: תִּירוֹשׁ
  chosen: new wine
  alternatives:
  - fresh wine
  - sweet wine
  lexicon: HALOT
  rationale: Commonly refers to fresh/new wine, often distinguished from יַיִן. 'New
    wine' preserves the lexical distinction present in the Hebrew.
- source_word: יִקַּח
  chosen: take away
  alternatives:
  - takes
  - seizes
  - takes
  lexicon: HALOT
  rationale: Although the verb literally means 'take,' in this idiom with 'heart'
    it conveys removal or capture of understanding/judgment. 'Take away' communicates
    the effect in natural English while staying close to the Hebrew.
- source_word: לֵב
  chosen: the heart
  alternatives:
  - understanding
  - mind
  lexicon: HALOT
  rationale: Hebrew 'heart' often includes intellect and will, not merely emotion.
    Retaining 'heart' preserves the Hebrew anthropology and the vividness of the idiom;
    the implied sense of judgment/understanding is left for readers rather than paraphrased
    into the main text.
