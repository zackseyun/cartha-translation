theological_decisions:
- issue: Whether to render the final idiom interpretively as loss of understanding
    or more literally as 'heart'
  chosen_reading: Retain the concrete expression 'take away the heart' in the main
    text.
  alternative_readings:
  - take away understanding
  - deprive of sense
  rationale: The verse speaks morally and anthropologically rather than making a technical
    doctrinal claim. Preserving 'heart' maintains the Hebrew idiom and theological
    texture of the inner person, while the more interpretive alternatives are preserved
    as lexical possibilities rather than elevated into the main text.
  doctrine_reference: Translation philosophy §§1, 3, 6
