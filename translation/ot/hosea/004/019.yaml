id: HOS.4.19
reference: Hosea 4:19
source:
  edition: WLC
  text: צָרַ֥ר ר֛וּחַ אוֹתָ֖/הּ בִּ/כְנָפֶ֑י/הָ וְ/יֵבֹ֖שׁוּ מִ/זִּבְחוֹתָֽ/םס
translation:
  text: A wind has wrapped her in its wings, and they will be put to shame because
    of their sacrifices.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A spirit has bound her in its wings.' The Hebrew word רוּחַ can mean
      'wind,' 'breath,' or 'spirit,' and the verb can mean 'bound,' 'enclosed,' or
      'wrapped.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צָרַר
  chosen: has wrapped
  alternatives:
  - has bound
  - has enclosed
  - has swept up
  lexicon: HALOT
  rationale: The verb commonly conveys binding, enclosing, or wrapping up. In this
    poetic context with 'wind' and 'wings,' 'has wrapped' preserves the metaphorical
    force better than a more literal but less idiomatic 'has bound.' The perfect is
    rendered as English present perfect to convey a completed action with present
    consequence.
- source_word: רוּחַ
  chosen: wind
  alternatives:
  - spirit
  - breath
  lexicon: HALOT
  rationale: In context with 'wings' and impending judgment, the natural image of
    a driving wind is most likely. 'Spirit' is lexically possible but less fitting
    in this immediate poetic parallelism.
- source_word: אוֹתָהּ
  chosen: her
  rationale: The feminine singular object refers back to the feminine collective entity,
    likely Ephraim/Israel as personified in the surrounding context.
- source_word: בכנפיה
  chosen: in its wings
  alternatives:
  - in her wings
  - with its wings
  lexicon: HALOT
  rationale: The suffix is feminine singular, agreeing grammatically with רוּחַ, which
    is often feminine in Hebrew usage. English idiom favors 'its wings' for 'wind.'
    The preposition ב is rendered 'in' to preserve the image of being caught up within
    the wind's wings.
- source_word: וְיֵבֹשׁוּ
  chosen: and they will be put to shame
  alternatives:
  - and they will be ashamed
  - and they will be disappointed
  lexicon: HALOT
  rationale: The verb בוש often denotes shame or disgrace. 'Will be put to shame'
    captures both the passive/resultative sense in English and the judgment context.
- source_word: מִזִּבְחוֹתָם
  chosen: because of their sacrifices
  alternatives:
  - from their sacrifices
  - on account of their sacrifices
  lexicon: HALOT
  rationale: 'The preposition מן here is best taken causally: their shame comes because
    of the sacrifices they offered, likely idolatrous ones in context. ''Because of''
    communicates this more clearly than a wooden ''from.'''
