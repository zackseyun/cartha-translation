theological_decisions:
- issue: Referent and imagery of judgment
  chosen_reading: The verse depicts Israel/Ephraim as seized by a destructive wind,
    leading to shame because of idolatrous sacrifices.
  alternative_readings:
  - The verse may refer more generally to exile or calamity overtaking the nation.
  - רוּחַ could be read more abstractly as 'spirit,' though this is less likely here.
  rationale: The immediate context centers on cultic unfaithfulness and shame tied
    to sacrifice. The translation preserves the poetic image without over-specifying
    whether the 'wind' is exile, divine judgment, or calamity, while allowing the
    context to imply judgment.
  doctrine_reference: Preserve theological tension rather than resolve it.
