id: HOS.4.18
reference: Hosea 4:18
source:
  edition: WLC
  text: סָ֖ר סָבְאָ֑/ם הַזְנֵ֣ה הִזְנ֔וּ אָהֲב֥וּ הֵב֛וּ קָל֖וֹן מָגִנֶּֽי/הָ׃
translation:
  text: When their drinking is over, they give themselves to prostitution; her shields
    dearly love shame.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'When their drink has gone sour' or 'When their drunkenness is past.'
      The Hebrew opening is difficult and may refer either to the end of a drinking
      bout or to drink that has turned aside/spoiled.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'her shields'; likely a metaphor for her rulers or protectors.
    reason: lexical_alternative
  - marker: c
    text: 'The clause ''they dearly love shame'' is difficult Hebrew. Some take the
      middle term more literally: ''they love, Give shame!'''
    reason: alternative_reading
lexical_decisions:
- source_word: סָר
  chosen: is over
  alternatives:
  - has turned aside
  - has gone away
  - has become sour
  lexicon: HALOT
  rationale: The verb from סור literally means 'turn aside/depart.' With the following
    noun for drink, the sense is that the drinking bout has passed or ended. Rendering
    it as 'is over' gives the idiomatic force in English without over-paraphrasing.
- source_word: סָבְאָם
  chosen: their drinking
  alternatives:
  - their drink
  - their drunkenness
  - their carouse
  lexicon: HALOT
  rationale: From a noun related to drinking/intoxication with 3mp suffix. 'Their
    drinking' best fits the clause with סָר and preserves the concrete image of a
    drinking bout rather than abstract intoxication.
- source_word: הַזְנֵה הִזְנוּ
  chosen: they give themselves to prostitution
  alternatives:
  - they commit whoredom
  - they have utterly played the prostitute
  - they practice prostitution
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. Because
    the context in Hosea regularly uses prostitution imagery both literally and metaphorically
    for covenant unfaithfulness, 'give themselves to prostitution' preserves the sexual
    metaphor in readable modern English. The stronger traditional 'whoredom' is accurate
    but archaic.
- source_word: אָהֲבוּ
  chosen: dearly love
  alternatives:
  - love
  - have loved
  lexicon: HALOT
  rationale: Qal perfect 3cp, 'they loved/love.' 'Dearly love' reflects the emphatic,
    morally charged attachment in context and pairs naturally with the imperative-like
    following form.
- source_word: הֵבוּ
  chosen: dearly
  alternatives:
  - give!
  - bring!
  - utterly
  - shamelessly
  lexicon: HALOT
  rationale: This form is notoriously difficult. Though formally it can be taken from
    יהב ('give'), in this collocation many understand it adverbially/intensively with
    the sense of strong attachment or eagerness. Rendering the phrase together as
    'dearly love' avoids a wooden and obscure 'love, give shame' while staying close
    to the likely idiomatic force.
- source_word: קָלוֹן
  chosen: shame
  alternatives:
  - disgrace
  - ignominy
  lexicon: HALOT
  rationale: The noun denotes shame/disgrace. 'Shame' is the most direct and natural
    English equivalent.
- source_word: מָגִנֶּיהָ
  chosen: her shields
  alternatives:
  - her rulers
  - her protectors
  lexicon: HALOT
  rationale: Literally 'her shields.' In Hebrew poetry 'shield' can metaphorically
    refer to rulers or nobles as protectors. The main text keeps the metaphor for
    transparency, while a footnote preserves the interpretive alternative.
