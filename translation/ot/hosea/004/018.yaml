theological_decisions:
- issue: Whether Hosea's prostitution language should be softened into a purely metaphorical
    rendering
  chosen_reading: Retain prostitution language in the main text
  alternative_readings:
  - Render more abstractly as 'they are utterly unfaithful'
  rationale: Hosea intentionally uses sexual infidelity imagery to depict Israel's
    covenant unfaithfulness. Preserving the concrete metaphor maintains the prophetic
    force and theological tension rather than resolving it into abstraction.
  doctrine_reference: Translation philosophy §3, §6
- issue: Whether מָגִנֶּיהָ should be interpreted in the text rather than translated
    literally
  chosen_reading: Translate literally as 'her shields' and preserve 'rulers/protectors'
    in a footnote
  alternative_readings:
  - her rulers
  - her protectors
  rationale: The Hebrew image is metaphorical and somewhat ambiguous. Keeping 'shields'
    in the main text preserves the source wording, while the footnote supplies the
    likely referent for readers.
  doctrine_reference: Translation philosophy §3, §5
