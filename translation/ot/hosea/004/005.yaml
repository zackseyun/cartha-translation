theological_decisions:
- issue: Referent of 'your mother'
  chosen_reading: retain the metaphor as 'your mother' without specifying the nation
    or community in the main text
  alternative_readings:
  - interpret explicitly as Israel
  - interpret as the mother-city or land
  rationale: The verse uses familial imagery common in Hosea. To preserve theological
    and literary tension, the translation keeps the metaphor in the text and leaves
    fuller identification to a footnote rather than resolving it interpretively.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
