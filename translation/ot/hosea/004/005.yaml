id: HOS.4.5
reference: Hosea 4:5
source:
  edition: WLC
  text: וְ/כָשַׁלְתָּ֣ הַ/יּ֔וֹם וְ/כָשַׁ֧ל גַּם נָבִ֛יא עִמְּ/ךָ֖ לָ֑יְלָה וְ/דָמִ֖יתִי
    אִמֶּֽ/ךָ־׃
translation:
  text: You will stumble by day, and the prophet also will stumble with you by night;
    and I will destroy your mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a prophet also will stumble with you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will silence' or 'I will cut off'; the Hebrew verb can carry related
      senses in a judgment context.
    reason: lexical_alternative
  - marker: c
    text: '''Your mother'' likely refers metaphorically to the people, nation, or
      covenant community.'
    reason: cultural_note
lexical_decisions:
- source_word: וְכָשַׁלְתָּ
  chosen: you will stumble
  alternatives:
  - you have stumbled
  - you shall fall
  lexicon: HALOT
  rationale: Qal perfect 2ms of כשל in prophetic discourse commonly carries a future/resultative
    sense after the preceding accusation, so an English future fits the context better
    than a simple past. 'Stumble' preserves the metaphor without over-interpreting
    it as total collapse, though 'fall' is a viable alternative.
- source_word: הַיּוֹם
  chosen: by day
  alternatives:
  - today
  - in the daytime
  lexicon: HALOT
  rationale: With the temporal contrast to לילה later in the verse, the sense is not
    'today' but the day/night pair. 'By day' is concise and idiomatic in English.
- source_word: וְכָשַׁל
  chosen: will stumble
  alternatives:
  - has stumbled
  - will fall
  lexicon: HALOT
  rationale: Same verb as the first clause; rendered consistently. Future sense suits
    the prophetic announcement.
- source_word: גַּם
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: HALOT
  rationale: 'Marks addition: not only the addressed party, but the prophet as well.
    ''Also'' is the most natural English connective here.'
- source_word: נָבִיא
  chosen: the prophet
  alternatives:
  - a prophet
  lexicon: HALOT
  rationale: Although anarthrous in Hebrew, English often uses the definite article
    for a representative class member in a denunciation context. 'The prophet' fits
    the likely reference to the prophetic figures associated with the people. The
    indefinite remains possible and is preserved in a footnote.
- source_word: עִמְּךָ
  chosen: with you
  alternatives:
  - along with you
  lexicon: HALOT
  rationale: Direct and natural rendering of the preposition עם with 2ms suffix.
- source_word: לָיְלָה
  chosen: by night
  alternatives:
  - at night
  - in the night
  lexicon: HALOT
  rationale: Chosen to mirror 'by day' and preserve the day/night parallelism.
- source_word: וְדָמִיתִי
  chosen: I will destroy
  alternatives:
  - I will silence
  - I will cut off
  lexicon: HALOT
  rationale: From דמה in a context of judgment, the sense is best taken as bringing
    to ruin/destroying rather than merely becoming silent. This matches the prophetic
    threat and common contextual usage. Because the verb can be understood in related
    ways such as 'silence' or 'cut off,' the alternative is preserved in a footnote.
- source_word: אִמֶּךָ
  chosen: your mother
  alternatives:
  - your people as mother
  - the mother-city/nation
  lexicon: HALOT
  rationale: Literal rendering is 'your mother.' In Hosea's prophetic imagery this
    likely personifies the nation/community as mother, but the metaphor should remain
    in the main text rather than being interpreted away.
