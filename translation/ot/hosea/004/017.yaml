id: HOS.4.17
reference: Hosea 4:17
source:
  edition: WLC
  text: חֲב֧וּר עֲצַבִּ֛ים אֶפְרָ֖יִם הַֽנַּֽח לֽ/וֹ־׃
translation:
  text: Ephraim is joined to idols; leave him alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Ephraim is bound to idols; let him be.' The Hebrew is terse, and the
      final command may express abandoning Ephraim to his chosen idolatry.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲבוּר
  chosen: is joined
  alternatives:
  - is bound
  - is allied
  - is attached
  lexicon: HALOT
  rationale: Passive participle from חבר conveys being joined or bound together. 'Is
    joined' is natural English and preserves the relational sense without overinterpreting
    the exact nature of the bond.
- source_word: עֲצַבִּים
  chosen: idols
  alternatives:
  - images
  lexicon: HALOT
  rationale: Though the noun can denote images, in prophetic polemic it commonly refers
    to idols. 'Idols' best captures the religious object and the denunciatory force
    in context.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  alternatives:
  - the tribe of Ephraim
  - Israel
  rationale: Proper name retained by transliteration per translation philosophy. In
    Hosea it often stands metonymically for the northern kingdom, but the text itself
    names Ephraim and should not be expanded in the main text.
- source_word: הַנַּח
  chosen: leave ... alone
  alternatives:
  - let ... be
  - leave off from him
  - leave him
  lexicon: HALOT
  rationale: Imperative of נוח/הנח in this causative form means to let alone or leave
    undisturbed. 'Leave him alone' is idiomatic modern English and fits the abrupt
    prophetic command.
- source_word: לוֹ
  chosen: him
  alternatives:
  - it
  - to him
  rationale: The pronominal suffix is third masculine singular. In English, with the
    imperative 'leave alone,' the object is best expressed as 'him,' referring back
    to Ephraim as a personified entity.
