theological_decisions:
- issue: Referent of Ephraim
  chosen_reading: Ephraim is retained as the named subject, with no expansion in the
    main text.
  alternative_readings:
  - Ephraim as shorthand for the northern kingdom/Israel
  rationale: The verse personifies Ephraim while likely referring corporately to the
    northern kingdom. Preserving the proper name maintains the prophetic rhetoric
    and avoids importing an interpretive expansion into the translation itself.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    preserve theological tension rather than resolve it.'
- issue: Force of the final imperative
  chosen_reading: 'A command to abandon or cease attempting to restrain Ephraim: ''leave
    him alone.'''
  alternative_readings:
  - An address to Ephraim meaning 'leave him/it'
  - A command to others to separate from Ephraim
  rationale: The most straightforward reading takes the imperative as directed to
    an implied second masculine singular addressee, commanding non-interference with
    Ephraim because of his entrenched idolatry. Alternatives exist because the addressee
    is unstated and the syntax is terse, so they are preserved in a footnote.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather
    than resolve it.'
