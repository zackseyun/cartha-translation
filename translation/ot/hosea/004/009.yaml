id: HOS.4.9
reference: Hosea 4:9
source:
  edition: WLC
  text: וְ/הָיָ֥ה כָ/עָ֖ם כַּ/כֹּהֵ֑ן וּ/פָקַדְתִּ֤י עָלָי/ו֙ דְּרָכָ֔י/ו וּ/מַעֲלָלָ֖י/ו
    אָשִׁ֥יב לֽ/וֹ׃
translation:
  text: 'And it will be: like people, like priest. So I will punish him for his ways,
    and repay him for his deeds.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like the people, like the priest.' The Hebrew is a terse comparison
      meaning that priest and people alike will face the same judgment.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew uses singular pronouns ('him,' 'his'), which may function distributively
      for the group or may narrow the focus to the priest.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will be
  alternatives:
  - And it shall be
  - So it will be
  lexicon: HALOT
  rationale: The qatal of היה with prefixed conjunction introduces the resulting state
    or situation. 'And it will be' preserves the Hebrew idiom without over-paraphrasing;
    the following colon explains what that state is.
- source_word: כָעָם כַּכֹּהֵן
  chosen: like people, like priest
  alternatives:
  - like the people, like the priest
  - as with the people, so with the priest
  lexicon: HALOT
  rationale: This compact comparison is a proverbial formula expressing equivalence
    in judgment between common people and priest. The anarthrous English 'people'
    and 'priest' best reflects the Hebrew construction and keeps the aphoristic force.
- source_word: וּפָקַדְתִּי
  chosen: I will punish
  alternatives:
  - I will visit
  - I will attend to
  lexicon: HALOT
  rationale: פקד with עַל in judgment contexts commonly means to call to account or
    punish. 'Punish' makes the judicial sense explicit in contemporary English.
- source_word: עָלָיו
  chosen: him
  alternatives:
  - upon him
  - on him
  lexicon: HALOT
  rationale: The singular pronominal suffix is retained. Although the preceding comparison
    mentions both people and priest collectively, the singular likely functions distributively
    or corporately; 'him' preserves the Hebrew number rather than smoothing to 'them'.
- source_word: דְּרָכָיו
  chosen: his ways
  alternatives:
  - his conduct
  - his paths
  lexicon: HALOT
  rationale: דֶּרֶךְ in moral contexts often denotes one's manner of life or conduct.
    'Ways' is both literal enough and idiomatic in prophetic judgment language.
- source_word: וּמַעֲלָלָיו
  chosen: his deeds
  alternatives:
  - his actions
  - his practices
  lexicon: HALOT
  rationale: מַעֲלָלִים refers to acts or deeds, often with moral coloring. 'Deeds'
    is concise and preserves the evaluative tone.
- source_word: אָשִׁיב לוֹ
  chosen: repay him
  alternatives:
  - return to him
  - bring back to him
  lexicon: HALOT
  rationale: In judicial contexts, שוב in the Hiphil plus ל often means to requite
    or repay someone according to their actions. 'Repay him' communicates recompense
    clearly in English.
