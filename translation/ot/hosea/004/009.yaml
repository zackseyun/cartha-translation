theological_decisions:
- issue: Referent and number of the singular pronouns in the judgment clause
  chosen_reading: Retain the singular pronouns ('him,' 'his') as in the Hebrew, allowing
    a distributive/corporate sense that applies equally within the 'people/priest'
    comparison.
  alternative_readings:
  - 'Smooth to plural: ''them'' / ''their'' to match the collective sense'
  - Take the singular as referring specifically to the priest
  rationale: The Hebrew text uses singular suffixes after a collective comparison.
    Preserving the singular is more textually transparent and avoids prematurely resolving
    whether the focus narrows to the priest alone or remains distributive over the
    class just mentioned. The immediate context emphasizes priestly guilt, but the
    proverb-like opening broadens the judgment.
  doctrine_reference: Preserve theological tension rather than resolve it.
