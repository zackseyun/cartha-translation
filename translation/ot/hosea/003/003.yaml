id: HOS.3.3
reference: Hosea 3:3
source:
  edition: WLC
  text: וָ/אֹמַ֣ר אֵלֶ֗י/הָ יָמִ֤ים רַבִּים֙ תֵּ֣שְׁבִי לִ֔/י לֹ֣א תִזְנִ֔י וְ/לֹ֥א
    תִֽהְיִ֖י לְ/אִ֑ישׁ וְ/גַם אֲנִ֖י אֵלָֽיִ/ךְ־׃
translation:
  text: And I said to her, “You must remain for me many days; you must not prostitute
    yourself, and you must not belong to a man; and I also will be toward you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you must not be another man's' or 'you must not have a husband'; Hebrew
      literally, 'you must not be for a man.'
    reason: lexical_alternative
  - marker: b
    text: The final clause is elliptical in Hebrew and may also be understood as 'and
      I also will be for you' or, more interpretively, 'and I also will wait for you.'
    reason: alternative_reading
lexical_decisions:
- source_word: תֵּשְׁבִי
  chosen: you must remain
  alternatives:
  - you shall stay
  - you will dwell
  - you shall sit
  lexicon: HALOT
  rationale: The verb ישב literally means 'sit/dwell/remain.' In this context of imposed
    abstention and waiting, 'remain' best captures continued state without implying
    a specific location as strongly as 'dwell' or the overly literal 'sit.' The modal
    'must' reflects the directive force of Hosea's speech in context.
- source_word: לִי
  chosen: for me
  alternatives:
  - with me
  - belonging to me
  lexicon: HALOT
  rationale: The preposition ל with first-person suffix is most literally 'for me/to
    me.' 'For me' preserves the Hebrew wording and leaves the relational nuance somewhat
    open, whereas 'with me' is smoother but less literal and 'belonging to me' over-interprets.
- source_word: יָמִים רַבִּים
  chosen: many days
  alternatives:
  - for many days
  - a long time
  lexicon: HALOT
  rationale: The phrase is literally 'many days.' English idiom may supply 'for,'
    but the main text keeps the phrase close to the Hebrew while remaining natural.
    'A long time' is interpretive and less formally transparent.
- source_word: תִזְנִי
  chosen: prostitute yourself
  alternatives:
  - play the prostitute
  - commit prostitution
  - be sexually immoral
  lexicon: HALOT
  rationale: זנה in Hosea often carries both literal sexual and metaphorical covenantal
    overtones. Here the immediate referent is Hosea's wife, so 'prostitute yourself'
    clearly conveys the sexual sense without flattening the term into the broader
    and vaguer 'be sexually immoral.' 'Play the prostitute' is possible but slightly
    idiomatic.
- source_word: תִהְיִי לְאִישׁ
  chosen: belong to a man
  alternatives:
  - be for a man
  - be with a man
  - be another man's
  lexicon: HALOT
  rationale: The Hebrew is literally 'be to/for a man.' It likely prohibits entering
    sexual or marital relation with any man during the waiting period. 'Belong to
    a man' communicates relational attachment without specifying marriage alone. 'Be
    with a man' may sound merely locative or euphemistic; 'another man's' imports
    'another,' which is not explicit.
- source_word: וְגַם אֲנִי אֵלָיִךְ
  chosen: and I also will be toward you
  alternatives:
  - and I also will be for you
  - and I also will wait for you
  - and so I will be toward you
  lexicon: HALOT
  rationale: This clause is notably elliptical in Hebrew, lacking an explicit verb
    beyond the implied copular sense. 'Will be toward you' preserves the terseness
    and ambiguity of אֶל + suffix better than interpretive expansions like 'wait for
    you.' 'For you' is possible but less directly tied to אֶל.
- source_word: אִישׁ
  chosen: a man
  alternatives:
  - a husband
  lexicon: HALOT
  rationale: The noun can mean 'man' or 'husband.' Here the indefinite form with ל
    suggests a prohibition against relation to any man, not only formal remarriage.
    'A man' preserves that breadth; 'husband' is a plausible narrower interpretation
    preserved in a footnote.
