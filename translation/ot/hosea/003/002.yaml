id: HOS.3.2
reference: Hosea 3:2
source:
  edition: WLC
  text: וָ/אֶכְּרֶ֣/הָ לִּ֔/י בַּ/חֲמִשָּׁ֥ה עָשָׂ֖ר כָּ֑סֶף וְ/חֹ֥מֶר שְׂעֹרִ֖ים
    וְ/לֵ֥תֶךְ שְׂעֹרִֽים׃
translation:
  text: So I bought her for myself for fifteen shekels of silver and a homer of barley
    and a lethech of barley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A lethech was likely a dry measure equal to half a homer.
    reason: cultural_note
  - marker: b
    text: Or 'for fifteen pieces of silver.' The Hebrew literally says 'fifteen silver,'
      with the monetary unit understood from context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶכְּרֶהָ
  chosen: I bought her
  alternatives:
  - I acquired her
  - I purchased her
  lexicon: HALOT
  rationale: The verb כרה in this form/context is commonly understood as acquiring
    by payment. 'Bought' is the most natural English rendering and fits the following
    price statement. 'Acquired' is possible but less specific; 'purchased' is slightly
    more formal.
- source_word: לִּי
  chosen: for myself
  alternatives:
  - for me
  lexicon: HALOT
  rationale: The dative marks personal interest/benefit. 'For myself' brings out the
    reflexive nuance more clearly in English than the flatter 'for me'.
- source_word: בַּחֲמִשָּׁה עָשָׂר כָּסֶף
  chosen: for fifteen shekels of silver
  alternatives:
  - for fifteen pieces of silver
  - for fifteen silver shekels
  lexicon: HALOT
  rationale: The Hebrew literally gives 'for fifteen silver.' In monetary contexts,
    'silver' functions elliptically for silver shekels/pieces. 'Shekels of silver'
    makes the unit explicit for modern readers while staying close to the sense. 'Pieces
    of silver' is traditional but less precise because the unit is not merely generic
    pieces.
- source_word: חֹמֶר
  chosen: a homer
  alternatives:
  - a homer-measure
  lexicon: HALOT
  rationale: This is a dry measure. I transliterated it rather than converting to
    an estimated modern volume, preserving the ancient unit and avoiding false precision.
- source_word: שְׂעֹרִים
  chosen: of barley
  lexicon: HALOT
  rationale: Straightforward lexical rendering of the grain named in the text.
- source_word: לֵתֶךְ
  chosen: a lethech
  alternatives:
  - a half-homer
  lexicon: HALOT
  rationale: This is a specific dry measure, likely equivalent to a half-homer. Because
    the exact equivalence is a lexical/cultural matter and the Hebrew uses the named
    unit itself, transliteration preserves the source term best; the likely equivalence
    is worth preserving in a footnote.
