id: HOS.3.4
reference: Hosea 3:4
source:
  edition: WLC
  text: כִּ֣י יָמִ֣ים רַבִּ֗ים יֵֽשְׁבוּ֙ בְּנֵ֣י יִשְׂרָאֵ֔ל אֵ֥ין מֶ֨לֶךְ֙ וְ/אֵ֣ין
    שָׂ֔ר וְ/אֵ֥ין זֶ֖בַח וְ/אֵ֣ין מַצֵּבָ֑ה וְ/אֵ֥ין אֵפ֖וֹד וּ/תְרָפִֽים׀׃
translation:
  text: For the sons of Israel will dwell many days without king or prince, without
    sacrifice or pillar, and without ephod or household idols.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'standing stone' or 'sacred pillar'; the Hebrew term refers to a cultic
      stone monument.
    reason: lexical_alternative
  - marker: b
    text: Or 'teraphim'; that is, household cult objects or idols.
    reason: lexical_alternative
  - marker: c
    text: '''Ephod'' is a Hebrew cultic term, often referring to a priestly garment
      or associated ritual object.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces an explanation of the enacted sign in the surrounding context;
    'For' fits the predictive-explanatory force here better than a stronger asseverative
    like 'indeed' or a more causal 'because.'
- source_word: יָמִים רַבִּים
  chosen: many days
  alternatives:
  - a long time
  - many years
  lexicon: HALOT
  rationale: A fairly literal rendering that preserves the Hebrew idiom for an extended
    but unspecified duration. 'A long time' is smoother but less formally transparent.
- source_word: יֵשְׁבוּ
  chosen: will dwell
  alternatives:
  - will remain
  - will sit
  lexicon: HALOT
  rationale: The verb ישב commonly means 'sit, dwell, remain.' In this context it
    describes Israel's continuing condition over time, not literal sitting. 'Will
    dwell' preserves the core sense while sounding natural; 'remain' is possible but
    slightly more interpretive.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the people of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Follows the Hebrew expression closely and aligns with the project's gender-accurate
    principle. It refers corporately to Israel. 'The Israelites' is idiomatic but
    less transparent to the source wording.
- source_word: אֵין מֶלֶךְ
  chosen: without king
  alternatives:
  - with no king
  lexicon: HALOT
  rationale: English 'without' efficiently carries the repeated אֵין construction
    in a coordinated list while preserving the deprivation motif.
- source_word: שָׂר
  chosen: prince
  alternatives:
  - leader
  - official
  - commander
  lexicon: HALOT
  rationale: שׂר denotes a ruler or high official. 'Prince' is the traditional and
    concise rendering in this royal-political pairing ('king or prince'), while 'leader'
    is broader and less specific.
- source_word: זֶבַח
  chosen: sacrifice
  alternatives:
  - offering
  lexicon: HALOT
  rationale: The standard sense is sacrificial offering/slaughtered sacrifice. 'Sacrifice'
    is the clearest and most established English equivalent here.
- source_word: מַצֵּבָה
  chosen: pillar
  alternatives:
  - sacred pillar
  - standing stone
  lexicon: HALOT
  rationale: Refers to a cultic standing stone/pillar. 'Pillar' keeps the main text
    concise; the more specific cultic nuance is worth preserving in a footnote because
    the term can be unfamiliar and contextually charged.
- source_word: אֵפוֹד
  chosen: ephod
  alternatives:
  - priestly ephod
  - sacred vestment
  lexicon: HALOT
  rationale: A transliterated technical term is preferable because no single English
    gloss captures the object precisely in all contexts. A footnote can clarify its
    likely cultic/priestly association.
- source_word: תְרָפִים
  chosen: household idols
  alternatives:
  - teraphim
  - household gods
  lexicon: HALOT
  rationale: The term denotes domestic cult objects/idols. 'Household idols' communicates
    meaning in accessible English better than the opaque transliteration 'teraphim,'
    while avoiding the potentially misleading implication of true divinity in 'gods'.
