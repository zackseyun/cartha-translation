theological_decisions:
- issue: Whether the list includes both legitimate and illegitimate cultic institutions
  chosen_reading: 'Render the terms straightforwardly without resolving the interpretive
    tension: Israel is depicted as deprived of political leadership and of cultic
    apparatus, including items associated with both approved and condemned worship.'
  alternative_readings:
  - Interpret the entire cultic list as illegitimate worship only
  - Interpret the entire cultic list as legitimate worship only
  rationale: The verse juxtaposes terms that elsewhere can be associated with proper
    worship (sacrifice, ephod) and improper worship (pillar, teraphim). The translation
    should preserve this tension rather than harmonize it, in keeping with the project's
    philosophy.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
