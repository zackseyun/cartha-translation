theological_decisions:
- issue: Whether כְּנַעַן should be read as a proper name ('Canaan/Canaanite') or
    as an appellative ('merchant')
  chosen_reading: 'appellative: ''merchant'''
  alternative_readings:
  - 'proper name/personification: ''Canaan'''
  - 'ethnic label used pejoratively: ''Canaanite'''
  rationale: The immediate context of dishonest scales strongly favors the commercial
    sense. This avoids unnecessary obscurity in English while preserving the prophetic
    accusation. Because the Hebrew form can also evoke 'Canaan' and thus carry a rhetorical
    identification of Ephraim with Canaanite-like behavior, that alternative is preserved
    in a footnote rather than imported into the main text.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation
    tradition), §3 (preserve theological tension rather than resolve it)
