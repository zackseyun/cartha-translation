id: HOS.12.8
reference: Hosea 12:8
source:
  edition: WLC
  text: כְּנַ֗עַן בְּ/יָד֛/וֹ מֹאזְנֵ֥י מִרְמָ֖ה לַ/עֲשֹׁ֥ק אָהֵֽב׃
translation:
  text: A merchant—with deceptive scales in his hand—loves to oppress.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'Canaan.' The word can also be understood as 'Canaanite' or, by extension,
      'merchant/trader'; the commercial sense fits the context of dishonest scales.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּנַעַן
  chosen: A merchant
  alternatives:
  - Canaan
  - Canaanite
  lexicon: HALOT
  rationale: Although the form is the proper noun 'Canaan,' in prophetic usage it
    can function appellatively for 'merchant/trader' because of the association of
    Canaanites/Phoenicians with trade. In this context, followed by 'deceptive scales
    in his hand,' the common noun sense best fits the immediate syntax and sense.
    The proper-name reading is worth preserving in a footnote because it can also
    personify Ephraim/Israel as 'Canaan.'
- source_word: בְּיָדוֹ
  chosen: in his hand
  alternatives:
  - at hand
  lexicon: HALOT
  rationale: The prepositional phrase is rendered straightforwardly and retained in
    the main text because it contributes the concrete image of holding fraudulent
    scales.
- source_word: מֹאזְנֵי
  chosen: scales
  alternatives:
  - balances
  lexicon: HALOT
  rationale: Refers to weighing instruments. 'Scales' is the most natural modern English
    equivalent; 'balances' is possible but less idiomatic here.
- source_word: מִרְמָה
  chosen: deceptive
  alternatives:
  - 'false'
  - fraudulent
  - of deceit
  lexicon: HALOT
  rationale: The noun means deceit/treachery. As an attributive in English, 'deceptive
    scales' communicates the sense clearly and naturally. 'False scales' is also possible
    and idiomatic, but 'deceptive' better reflects the underlying noun of deceit.
- source_word: לַעֲשֹׁק
  chosen: to oppress
  alternatives:
  - to defraud
  - to extort
  lexicon: HALOT
  rationale: The verb עשׁק commonly denotes oppression, exploitation, or defrauding.
    Given the commercial imagery, 'defraud' is contextually plausible, but 'oppress'
    preserves the broader semantic range and moral force of exploitation.
- source_word: אָהֵב
  chosen: loves
  alternatives:
  - he loves
  lexicon: HALOT
  rationale: The participial/finite verbal form expresses characteristic delight.
    'Loves' is concise and preserves the force of habitual affection for wrongdoing.
