id: HOS.12.15
reference: Hosea 12:15
source:
  edition: WLC
  text: הִכְעִ֥יס אֶפְרַ֖יִם תַּמְרוּרִ֑ים וְ/דָמָי/ו֙ עָלָ֣י/ו יִטּ֔וֹשׁ וְ/חֶ֨רְפָּת֔/וֹ
    יָשִׁ֥יב ל֖/וֹ אֲדֹנָֽי/ו׃
translation:
  text: Ephraim has provoked bitter anger; therefore his bloodguilt will be left on
    him, and his Lord will repay him for his disgrace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his blood' or 'his bloodshed will remain on him.' The Hebrew 'bloods'
      often carries the sense of bloodguilt in judicial contexts.
    reason: lexical_alternative
  - marker: b
    text: Or 'his master will return his reproach to him.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִכְעִיס
  chosen: has provoked
  alternatives:
  - has embittered
  - has provoked to anger
  lexicon: HALOT
  rationale: Hiphil of כעס commonly means to provoke to anger. 'Has provoked' is concise
    English and allows the following object to express the intensity of the provocation.
- source_word: תַּמְרוּרִים
  chosen: bitter anger
  alternatives:
  - bitternesses
  - bitter things
  - bitter provocation
  lexicon: HALOT
  rationale: The plural noun from מרר conveys bitterness/intense bitterness. In context
    after 'has provoked,' it functions adverbially or as an accusative of result/intensity.
    'Bitter anger' communicates the sense idiomatically in English without flattening
    the emotional force.
- source_word: וְדָמָיו
  chosen: his bloodguilt
  alternatives:
  - his blood
  - his bloodshed
  - his bloodguiltiness
  lexicon: HALOT
  rationale: Though literally 'his bloods/blood,' in prophetic/judicial contexts דמים
    often denotes bloodguilt or bloodshed. 'Bloodguilt' best fits the following judicial
    language of guilt remaining on him.
- source_word: עָלָיו יִטּוֹשׁ
  chosen: will be left on him
  alternatives:
  - he will leave upon him
  - will remain on him
  - will be cast upon him
  lexicon: HALOT
  rationale: נטש in this construction conveys leaving something resting on someone
    rather than removing it. Because the subject is implicit and the focus is the
    enduring liability of guilt, passive English ('will be left on him') best captures
    the sense.
- source_word: וְחֶרְפָּתוֹ
  chosen: his disgrace
  alternatives:
  - his reproach
  - his shame
  - his insult
  lexicon: HALOT
  rationale: חרפה denotes reproach/shame/disgrace. 'Disgrace' is natural modern English
    and suits the parallel judicial recompense.
- source_word: יָשִׁיב לוֹ
  chosen: will repay him for
  alternatives:
  - will return to him
  - will bring back on him
  - will requite him for
  lexicon: HALOT
  rationale: שוב in Hiphil with ל often means to return or repay something to someone.
    In context of judgment, 'repay him for' makes the retributive force explicit in
    idiomatic English.
- source_word: אֲדֹנָיו
  chosen: his Lord
  alternatives:
  - his master
  - his lord
  lexicon: HALOT
  rationale: The form is plural in morphology with singular pronominal suffix but
    functions as a singular title here. 'His Lord' preserves the title sense and the
    likely reference to God without importing the covenant name not present in the
    Hebrew.
