theological_decisions:
- issue: Referent of 'his Lord' (אֲדֹנָיו)
  chosen_reading: A divine title referring to God, rendered 'his Lord'
  alternative_readings:
  - his master
  rationale: In Hosea's prophetic context, the one who leaves bloodguilt on Ephraim
    and repays reproach is God. Rendering as 'his Lord' preserves the theological
    force of divine judgment while staying close to the Hebrew title rather than substituting
    'the LORD,' which would imply YHWH is explicitly present.
  doctrine_reference: 'Translation philosophy: translate titles; transliterate names'
