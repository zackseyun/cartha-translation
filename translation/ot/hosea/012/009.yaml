id: HOS.12.9
reference: Hosea 12:9
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֶפְרַ֔יִם אַ֣ךְ עָשַׁ֔רְתִּי מָצָ֥אתִי א֖וֹן לִ֑/י כָּל יְגִיעַ֕/י לֹ֥א יִמְצְאוּ לִ֖/י עָוֺ֥ן אֲשֶׁר חֵֽטְא־־־׃
translation:
  text: And Ephraim said, “Surely I have become rich; I have found wealth for myself. In all my labors they will not find in me iniquity that amounts to sin.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I have found strength for myself”; the Hebrew word can mean strength, wealth, or substance, but here likely refers to material wealth.
    reason: lexical_alternative
  - marker: b
    text: Or “In all my gains they will not find any iniquity in me that would be sin.” The Hebrew of this clause is compressed and allows slightly different construals.
    reason: alternative_reading
  - marker: c
    text: Or 'iniquity that is sin'.
    reason: previous_rendering
lexical_decisions:
- source_word: אַךְ
  chosen: Surely
  alternatives:
  - Indeed
  - Only
  lexicon: HALOT
  rationale: Here the particle introduces Ephraim's self-assured claim. 'Surely' best conveys emphatic confidence in natural English without overcommitting to exclusivity ('only').
- source_word: עָשַׁרְתִּי
  chosen: I have become rich
  alternatives:
  - I am rich
  - I have grown rich
  lexicon: HALOT
  rationale: The perfect verb denotes attained wealth. 'I have become rich' preserves the resultative sense better than the stative-sounding 'I am rich.'
- source_word: אוֹן
  chosen: wealth
  alternatives:
  - strength
  - substance
  - riches
  lexicon: HALOT
  rationale: In this commercial context, Ephraim boasts of acquired material gain. 'Wealth' fits the context better than the broader 'strength' or the more archaic 'substance.'
- source_word: כָּל יְגִיעַי
  chosen: all my labors
  alternatives:
  - all my toil
  - all my gains
  lexicon: HALOT
  rationale: The noun can denote toil or the fruit of labor. Because the next clause concerns scrutiny of his conduct and acquisitions, 'all my labors' preserves the ambiguity between effort and what it produced.
- source_word: יִמְצְאוּ לִי
  chosen: they will not find in me
  alternatives:
  - they will not find against me
  - none will find for me
  lexicon: HALOT
  rationale: The idiom expresses inability to detect culpability in Ephraim. 'In me' is the most straightforward rendering of לִי here, while still allowing the forensic nuance that no guilt can be pinned on him.
- source_word: עָוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - wrongdoing
  lexicon: HALOT
  rationale: The term often carries the sense of culpable wrongdoing or guilt. 'Iniquity' preserves the moral weight and pairs well with the following 'sin,' even though the English may sound slightly formal.
- source_word: אֲשֶׁר חֵטְא
  chosen: that is sin
  alternatives:
  - which is sin
  - as sin
  lexicon: HALOT
  rationale: 'The phrase is terse and somewhat elliptical. ''That is sin'' preserves the appositional force: no iniquity of the kind that counts as sin will be found in him.'
