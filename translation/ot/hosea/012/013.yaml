theological_decisions:
- issue: Retention of the Jacob/Israel name alternation
  chosen_reading: Preserve both names distinctly in the main text
  alternative_readings:
  - Use only 'Jacob' throughout for stylistic smoothness
  - Use only 'Israel' throughout for thematic emphasis
  rationale: The Hebrew deliberately uses both names, likely evoking both the individual
    patriarch and the nation descended from him. Preserving the tension aligns with
    the translation philosophy of not flattening meaningful variation.
  doctrine_reference: Translation philosophy §3, §5
