id: HOS.12.13
reference: Hosea 12:13
source:
  edition: WLC
  text: וַ/יִּבְרַ֥ח יַעֲקֹ֖ב שְׂדֵ֣ה אֲרָ֑ם וַ/יַּעֲבֹ֤ד יִשְׂרָאֵל֙ בְּ/אִשָּׁ֔ה
    וּ/בְ/אִשָּׁ֖ה שָׁמָֽר׃
translation:
  text: Jacob fled to the field of Aram; Israel served for a wife, and for a wife
    he kept watch.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the country of Aram.' The Hebrew literally says 'the field of Aram.'
    reason: lexical_alternative
  - marker: b
    text: Or 'guarded' or 'watched over.' The verb may refer to keeping or tending
      flocks.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְרַח
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: HALOT
  rationale: The verb ברח denotes fleeing or running away. 'Fled' is concise, natural
    English, and preserves the narrative force without overinterpreting motive.
- source_word: שְׂדֵה אֲרָם
  chosen: to the field of Aram
  alternatives:
  - to the country of Aram
  - to the open country of Aram
  lexicon: HALOT
  rationale: שָׂדֶה literally means 'field/open country.' In this idiom it refers
    to the region or countryside of Aram. 'Field of Aram' keeps the Hebrew image while
    remaining intelligible in English.
- source_word: וַיַּעֲבֹד
  chosen: served
  alternatives:
  - worked
  - labored
  lexicon: HALOT
  rationale: עבד commonly means 'serve/work.' 'Served' fits the Jacob narrative (service
    under Laban) and preserves the verbal link to labor rendered as service.
- source_word: בְּאִשָּׁה
  chosen: for a wife
  alternatives:
  - for a woman
  - because of a wife
  lexicon: HALOT
  rationale: 'The preposition ב here is best taken in a purposive or compensatory
    sense in context: Jacob served in order to obtain a wife. ''For a wife'' is the
    standard and contextually clear rendering.'
- source_word: שָׁמָר
  chosen: kept watch
  alternatives:
  - guarded
  - watched over
  - kept
  lexicon: HALOT
  rationale: שׁמר means keep, guard, watch. In the Jacob-Laban context it likely refers
    to tending/guarding flocks. 'Kept watch' preserves the guarding nuance and reads
    naturally in English.
- source_word: וּבְאִשָּׁה
  chosen: and for a wife
  alternatives:
  - and for a woman
  - and because of a wife
  lexicon: HALOT
  rationale: The repetition of the phrase should be preserved rather than smoothed
    away, since the Hebrew uses it rhetorically. Rendering both instances as 'for
    a wife' maintains the parallelism.
- source_word: יַעֲקֹב / יִשְׂרָאֵל
  chosen: Jacob / Israel
  rationale: The verse intentionally alternates the patriarch's names. Preserving
    both names in English retains the poetic and theological identification of Jacob
    with Israel.
