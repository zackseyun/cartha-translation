id: HOS.12.1
reference: Hosea 12:1
source:
  edition: WLC
  text: סְבָבֻ֤/נִי בְ/כַ֨חַשׁ֙ אֶפְרַ֔יִם וּ/בְ/מִרְמָ֖ה בֵּ֣ית יִשְׂרָאֵ֑ל וִֽ/יהוּדָ֗ה
    עֹ֥ד רָד֙ עִם אֵ֔ל וְ/עִם קְדוֹשִׁ֖ים נֶאֱמָֽן־־׃
translation:
  text: Ephraim has surrounded me with lies, and the house of Israel with deceit;
    but Judah still walks with God and is faithful with the Holy One.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Judah is still unruly against God, against the Holy One who is faithful.'
      The Hebrew of this clause is difficult, especially the verb rendered 'walks'
      and whether 'holy ones' refers to God or to heavenly beings.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'with the holy ones'; this may also be understood as 'with the Holy
      One,' referring to God.
    reason: lexical_alternative
lexical_decisions:
- source_word: סְבָבֻנִי
  chosen: has surrounded me
  alternatives:
  - has encircled me
  - has encompassed me
  lexicon: HALOT
  rationale: Qal perfect 3cp + 1cs suffix from סבב, literally 'they have surrounded
    me.' 'Has surrounded me' is natural English and preserves the metaphor of being
    hemmed in by falsehood.
- source_word: בְּכַחַשׁ
  chosen: with lies
  alternatives:
  - with falsehood
  - with denial
  lexicon: HALOT
  rationale: כחש denotes falsehood/deception; 'lies' is the clearest idiomatic rendering
    in this context of covenantal unfaithfulness.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  rationale: Proper name retained by transliteration. In Hosea it often stands metonymically
    for the northern kingdom, but the name should remain in the text rather than be
    interpreted away.
- source_word: וּבְמִרְמָה
  chosen: with deceit
  alternatives:
  - with treachery
  - with fraud
  lexicon: HALOT
  rationale: מרמה commonly denotes deceit or treachery. 'Deceit' pairs well with 'lies'
    while preserving the semantic distinction without overinterpreting.
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  rationale: The construct phrase is preserved formally as 'the house of Israel,'
    which reflects the Hebrew wording and prophetic style.
- source_word: וִיהוּדָה
  chosen: but Judah
  alternatives:
  - and Judah
  - while Judah
  rationale: The conjunction can be rendered simply 'and,' but in context an adversative
    sense best reflects the contrast between Ephraim/Israel and Judah in the Masoretic
    reading.
- source_word: עֹד
  chosen: still
  alternatives:
  - yet
  - still now
  lexicon: HALOT
  rationale: עֹד here marks continuance or persistence. 'Still' is concise and idiomatic.
- source_word: רָד עִם אֵל
  chosen: walks with God
  alternatives:
  - rules with God
  - is restless against God
  - wanders with God
  lexicon: HALOT
  rationale: The verb רוד/רד in this form is notoriously difficult. Given the immediate
    positive predicate 'is faithful' and the contrast with Ephraim's deceit, a favorable
    sense is most coherent in the MT context. 'Walks with God' expresses continued
    relationship without forcing the unusual verb into a hostile sense in the main
    text.
- source_word: אֵל
  chosen: God
  alternatives:
  - El
  lexicon: HALOT
  rationale: Though the Hebrew form is אֵל, in context it functions as the common
    divine title, best rendered 'God' in English.
- source_word: וְעִם קְדוֹשִׁים
  chosen: with the Holy One
  alternatives:
  - with the holy ones
  - with holy ones
  lexicon: HALOT
  rationale: Though morphologically plural, קדושים can function as a plural of majesty/intensity
    for God in poetic-prophetic diction. Because the verse likely continues a positive
    statement about Judah's relation to God, singular 'the Holy One' is adopted in
    the main text, while the plural alternative is preserved in a footnote.
- source_word: נֶאֱמָן
  chosen: is faithful
  alternatives:
  - is trustworthy
  - is steadfast
  lexicon: HALOT
  rationale: The Niphal participle/adjectival form conveys reliability or faithfulness.
    'Is faithful' is the most direct and theologically transparent rendering.
