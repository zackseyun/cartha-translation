theological_decisions:
- issue: Interpretation of Judah clause in a notoriously difficult Hebrew text
  chosen_reading: 'A positive contrast: Judah still walks with God and is faithful
    with the Holy One.'
  alternative_readings:
  - 'A negative reading: Judah is still unruly against God and against the Holy One
    who is faithful.'
  - 'A political reading: Judah still roams/rules with God.'
  rationale: The Masoretic text is syntactically and lexically difficult, especially
    רָד and קדושים. Because נֶאֱמָן naturally predicates faithfulness and the clause
    can be read as contrasting Judah with Ephraim/Israel, the main text preserves
    that tension without importing a stronger doctrinal claim. Significant alternatives
    are preserved in footnotes due to genuine ambiguity.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
