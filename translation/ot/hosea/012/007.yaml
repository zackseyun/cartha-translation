theological_decisions:
- issue: Whether to render the call as explicit repentance
  chosen_reading: return
  alternative_readings:
  - repent
  - turn back
  rationale: The verse issues a covenantal summons, but the Hebrew verb itself is
    broader than explicit penitential terminology. Rendering it 'return' preserves
    the theological summons without narrowing it to one doctrinally loaded expression.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
