id: HOS.12.7
reference: Hosea 12:7
source:
  edition: WLC
  text: וְ/אַתָּ֖ה בֵּ/אלֹהֶ֣י/ךָ תָשׁ֑וּב חֶ֤סֶד וּ/מִשְׁפָּט֙ שְׁמֹ֔ר וְ/קַוֵּ֥ה
    אֶל אֱלֹהֶ֖י/ךָ תָּמִֽיד־׃
translation:
  text: So you, by your God, return; keep steadfast love and justice, and wait continually
    for your God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'return to your God'; the Hebrew literally has 'by/with your God return,'
      an unusual construction that may express means, relation, or direction.
    reason: lexical_alternative
  - marker: b
    text: '''Wait'' can also be rendered ''hope'' or ''look expectantly.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאלֹהֶיךָ
  chosen: by your God
  alternatives:
  - to your God
  - with your God
  lexicon: HALOT
  rationale: The prefixed ב can mark means, relation, or sphere. Here 'by your God'
    best captures the sense that the return is enabled or grounded in relation to
    God, while preserving the unusual Hebrew construction rather than smoothing it
    away. 'To your God' is possible by sense, but less directly reflects the preposition
    used.
- source_word: תָשׁוּב
  chosen: return
  alternatives:
  - turn back
  - repent
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return/turn back.' 'Return' preserves both literal
    and covenantal-restorative force without importing the more interpretive term
    'repent' into the main text.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - mercy
  - covenant loyalty
  - lovingkindness
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty, mercy, and faithful love. 'Steadfast
    love' is readable modern English and preserves the relational covenant nuance
    better than the narrower 'mercy'.
- source_word: מִשְׁפָּט
  chosen: justice
  alternatives:
  - judgment
  - justice and right
  lexicon: HALOT
  rationale: In this ethical imperative context, 'justice' best conveys the practical,
    social, and judicial dimension of מִשְׁפָּט. 'Judgment' would sound too forensic
    or event-focused in English.
- source_word: שְׁמֹר
  chosen: keep
  alternatives:
  - guard
  - observe
  lexicon: HALOT
  rationale: '''Keep'' is idiomatic with abstract ethical objects in English (''keep
    steadfast love and justice'') and reflects the imperative force without sounding
    wooden.'
- source_word: וְקַוֵּה
  chosen: wait
  alternatives:
  - hope
  - look expectantly
  lexicon: HALOT
  rationale: קוה includes waiting with hope or expectation. 'Wait' fits naturally
    with the following adverb 'continually' and retains the posture of dependent expectation;
    the hopeful nuance is preserved by context.
- source_word: אֶל אֱלֹהֶיךָ
  chosen: for your God
  alternatives:
  - for God
  - toward your God
  - in your God
  lexicon: HALOT
  rationale: With קוה, English idiom commonly uses 'wait for.' This slightly shifts
    the preposition from the Hebrew אֶל ('to/toward') but best communicates the verbal
    construction in natural English while preserving the personal object 'your God.'
- source_word: תָּמִיד
  chosen: continually
  alternatives:
  - always
  - constantly
  lexicon: HALOT
  rationale: תָּמִיד denotes ongoing continuity. 'Continually' is natural in exhortation
    and pairs well with 'wait,' avoiding the slightly flatter 'always'.
