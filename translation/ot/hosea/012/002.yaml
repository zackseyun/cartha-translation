theological_decisions:
- issue: Metaphorical political indictment
  chosen_reading: Retain the wind/east wind imagery as metaphor for futile and destructive
    policy rather than paraphrasing it into an interpretive explanation.
  alternative_readings:
  - Ephraim pursues emptiness and destruction all day long
  rationale: The verse criticizes Ephraim's covenant-making with foreign powers. The
    imagery itself is part of the prophetic force and should be preserved rather than
    resolved into commentary in the main text.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Number shift from singular to plural
  chosen_reading: Use singular for Ephraim's actions ('he multiplies') and plural
    for the later verb ('They make a covenant') to reflect the Hebrew shift.
  alternative_readings:
  - Smooth the whole verse into singular
  - Smooth the whole verse into plural
  rationale: The Hebrew text moves from the collective singular Ephraim to a plural
    verb, likely referring to the people or leaders. Preserving the shift is more
    transparent to the source text than flattening it.
  doctrine_reference: Translation philosophy §1, §5
