id: HOS.12.2
reference: Hosea 12:2
source:
  edition: WLC
  text: אֶפְרַ֜יִם רֹעֶ֥ה ר֨וּחַ֙ וְ/רֹדֵ֣ף קָדִ֔ים כָּל הַ/יּ֕וֹם כָּזָ֥ב וָ/שֹׁ֖ד
    יַרְבֶּ֑ה וּ/בְרִית֙ עִם אַשּׁ֣וּר יִכְרֹ֔תוּ וְ/שֶׁ֖מֶן לְ/מִצְרַ֥יִם יוּבָֽל־־׃
translation:
  text: Ephraim feeds on wind and pursues the east wind all day long; he multiplies
    lies and violence. They make a covenant with Assyria, and oil is carried to Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shepherds the wind'; the Hebrew verb is literally 'pastures/feeds/shepherds.'
    reason: lexical_alternative
  - marker: b
    text: The 'east wind' was associated with scorching, destructive force; the phrase
      can suggest both futility and harm.
    reason: cultural_note
  - marker: c
    text: Or 'falsehood and devastation' / 'deceit and destruction.'
    reason: lexical_alternative
  - marker: d
    text: Hebrew 'cut a covenant,' a standard idiom for making a covenant or treaty.
    reason: lexical_alternative
  - marker: e
    text: Probably oil sent as tribute or diplomatic payment to Egypt.
    reason: cultural_note
lexical_decisions:
- source_word: רֹעֶה רוּחַ
  chosen: feeds on wind
  alternatives:
  - shepherds the wind
  - pastures on wind
  lexicon: HALOT
  rationale: רעה literally means 'to pasture/feed/shepherd.' With רוּחַ ('wind'),
    the idiom conveys pursuing what is empty and unsustaining. 'Feeds on wind' preserves
    the metaphor in natural English better than the more wooden 'shepherds the wind.'
- source_word: וְרֹדֵף קָדִים
  chosen: and pursues the east wind
  alternatives:
  - and chases the east wind
  lexicon: HALOT
  rationale: רדף is 'pursue/chase.' קדים is specifically the east wind, a hot destructive
    wind in the region. Retaining 'east wind' preserves the concrete image and likely
    connotation of destructive futility.
- source_word: כָּל הַיּוֹם
  chosen: all day long
  alternatives:
  - all day
  lexicon: HALOT
  rationale: An idiomatic English rendering of the temporal phrase that preserves
    the sense of continual action.
- source_word: כָּזָב וָשֹׁד
  chosen: lies and violence
  alternatives:
  - falsehood and devastation
  - deceit and destruction
  lexicon: HALOT
  rationale: כָּזָב commonly denotes falsehood/lie; שֹׁד denotes violence, devastation,
    or plunder. 'Lies and violence' is concise, natural, and fits the prophetic accusation
    of social and political wrongdoing.
- source_word: יַרְבֶּה
  chosen: he multiplies
  alternatives:
  - he increases
  - it increases
  lexicon: HALOT
  rationale: The Hiphil means 'make many/increase.' The singular verb matches the
    singular subject Ephraim, so 'he multiplies' best reflects the Hebrew syntax,
    even though English could also use a collective sense.
- source_word: וּבְרִית עִם אַשּׁוּר יִכְרֹתוּ
  chosen: They make a covenant with Assyria
  alternatives:
  - and they cut a covenant with Assyria
  - and they make a treaty with Assyria
  lexicon: HALOT
  rationale: כרת ברית is the standard idiom 'cut/make a covenant.' 'Make a covenant'
    is clearer in modern English while preserving the formal political-religious sense.
    The plural verb יכרתו is retained with 'They make,' likely shifting from the collective
    singular Ephraim to the people/leaders represented by Ephraim.
- source_word: וְשֶׁמֶן לְמִצְרַיִם יוּבָל
  chosen: and oil is carried to Egypt
  alternatives:
  - and olive oil is brought to Egypt
  - and oil is conveyed to Egypt
  lexicon: HALOT
  rationale: שׁמן is 'oil,' likely olive oil as tribute or diplomatic gift. 'Carried'
    is a natural passive for יובל ('is brought/carried'). Keeping 'oil' avoids over-specifying
    while preserving the political image.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The Hebrew names Ephraim specifically; in Hosea this often stands metonymically
    for the northern kingdom, but the name itself should be preserved in translation.
