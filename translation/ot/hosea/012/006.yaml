id: HOS.12.6
reference: Hosea 12:6
source:
  edition: WLC
  text: וַֽ/יהוָ֖ה אֱלֹהֵ֣י הַ/צְּבָא֑וֹת יְהוָ֖ה זִכְרֽ/וֹ׃
translation:
  text: And Yahweh, the God of hosts—Yahweh is his memorial name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the LORD is his memorial''; that is, the name by which he is remembered or invoked.'
    reason: lexical_alternative
  - marker: b
    text: YHWH is traditionally rendered 'the LORD'; alternatively, 'Yahweh.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיהוָה
  chosen: And the LORD
  alternatives:
  - And Yahweh
  - But the LORD
  lexicon: HALOT
  rationale: The prefixed conjunction is rendered 'And' in continuity with the preceding context. Per doctrine, יְהוָה is rendered 'the LORD' rather than transliterated. 'But' is possible contextually, but the bare conjunction here does not require an adversative sense.
- source_word: אֱלֹהֵי
  chosen: the God of
  alternatives:
  - God of
  lexicon: HALOT
  rationale: 'Construct plural אֱלֹהֵי with following noun means ''God of.'' The article is supplied naturally in English apposition: ''the LORD, the God of hosts.'''
- source_word: הַצְּבָאוֹת
  chosen: hosts
  alternatives:
  - armies
  lexicon: HALOT
  rationale: In the divine title אֱלֹהֵי הַצְּבָאוֹת, 'hosts' is the established and semantically broad rendering, encompassing heavenly armies and cosmic forces. 'Armies' is possible but narrower and less idiomatic in this title.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: זִכְרוֹ
  chosen: his memorial name
  alternatives:
  - his remembrance
  - his memorial
  lexicon: HALOT
  rationale: זֵכֶר/זִכְרוֹ in reference to the divine name denotes the name by which God is remembered or invoked across generations. 'Memorial name' makes explicit the implied referent in idiomatic English while preserving the covenantal sense better than the less natural 'his memorial' or the more abstract 'his remembrance.'
