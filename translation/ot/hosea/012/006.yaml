theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sense of זִכְרוֹ in relation to the divine name
  chosen_reading: Yahweh is his memorial name
  alternative_readings:
  - the LORD is his memorial
  - the LORD is his name to be remembered
  rationale: The phrase identifies YHWH as the name by which God is to be remembered. Supplying 'name' in English clarifies the idiom without adding foreign theology, and aligns with the covenantal usage of 'memorial' language elsewhere in the Hebrew Bible.
