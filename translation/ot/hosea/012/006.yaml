theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine excerpt specifies the default rendering of YHWH as 'the
    LORD,' following Jewish reverence tradition and the Septuagintal pattern. The
    repeated occurrence is retained to preserve the Hebrew emphasis.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Sense of זִכְרוֹ in relation to the divine name
  chosen_reading: the LORD is his memorial name
  alternative_readings:
  - the LORD is his memorial
  - the LORD is his name to be remembered
  rationale: The phrase identifies YHWH as the name by which God is to be remembered.
    Supplying 'name' in English clarifies the idiom without adding foreign theology,
    and aligns with the covenantal usage of 'memorial' language elsewhere in the Hebrew
    Bible.
