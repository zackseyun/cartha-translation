theological_decisions:
- issue: Pronoun shift in the final clause
  chosen_reading: retain 'with us' in the main text
  alternative_readings:
  - with him
  rationale: The Masoretic Text's first person plural is difficult but theologically
    significant, linking Jacob's encounter to the prophet's audience and preserving
    corporate continuity. Rather than harmonizing to the singular, the translation
    keeps the tension and notes the alternative.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
