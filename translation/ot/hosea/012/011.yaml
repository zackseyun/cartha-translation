id: HOS.12.11
reference: Hosea 12:11
source:
  edition: WLC
  text: וְ/דִבַּ֨רְתִּי֙ עַל הַ/נְּבִיאִ֔ים וְ/אָנֹכִ֖י חָז֣וֹן הִרְבֵּ֑יתִי וּ/בְ/יַ֥ד
    הַ/נְּבִיאִ֖ים אֲדַמֶּֽה־׃
translation:
  text: I spoke through the prophets; I myself multiplied visions, and through the
    hand of the prophets I gave parables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I spoke to the prophets.' The Hebrew preposition can be understood in
      more than one way here, though the parallel lines favor mediated speech through
      the prophets.
    reason: alternative_reading
  - marker: b
    text: Or 'by the hand of the prophets,' a Hebrew idiom for agency.
    reason: lexical_alternative
  - marker: c
    text: Or 'I used similitudes' / 'I spoke in comparisons.' The Hebrew verb is difficult
      and may refer to figurative or parabolic speech.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדִבַּרְתִּי עַל הַנְּבִיאִים
  chosen: I spoke through the prophets
  alternatives:
  - I spoke to the prophets
  - I spoke concerning the prophets
  - I spoke upon the prophets
  lexicon: HALOT
  rationale: The verb דבר with עַל can mean 'speak to/with/concerning,' but in prophetic
    mediation contexts the sense is that God communicated by means of prophets. Rendering
    'through the prophets' fits the parallel instrumental phrase later in the verse
    ('through the hand of the prophets') and the broader context of prophetic revelation.
- source_word: וְאָנֹכִי
  chosen: I myself
  alternatives:
  - and I
  - even I
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis beyond the verbal subject already
    present in the verbs. 'I myself' preserves that emphasis in natural English.
- source_word: חָזוֹן הִרְבֵּיתִי
  chosen: multiplied visions
  alternatives:
  - gave many visions
  - made visions abound
  lexicon: HALOT
  rationale: The Hiphil of רבה means 'make many, multiply.' Keeping 'visions' as the
    direct object preserves the concrete revelatory medium rather than paraphrasing
    it away.
- source_word: וּבְיַד הַנְּבִיאִים
  chosen: through the hand of the prophets
  alternatives:
  - by the hand of the prophets
  - through the prophets
  lexicon: HALOT
  rationale: The Hebrew idiom בְּיַד often denotes agency or instrumentality. The
    main text keeps the idiom in a slightly naturalized form ('through the hand of')
    to preserve the prophetic mediation imagery while remaining readable.
- source_word: אֲדַמֶּה
  chosen: I gave parables
  alternatives:
  - I used similitudes
  - I spoke in comparisons
  - I made myself known in likenesses
  lexicon: HALOT
  rationale: The Piel of דמה here is difficult and traditionally rendered 'use similitudes/parables.'
    In prophetic-revelatory context, the sense is that God communicated by figurative
    comparisons through the prophets. 'I gave parables' is concise, readable modern
    English that preserves the figurative mode without archaic 'similitudes.'
