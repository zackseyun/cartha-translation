theological_decisions:
- issue: Mode of prophetic revelation
  chosen_reading: 'The verse describes God as communicating by means of prophets in
    multiple forms: speech, visions, and figurative sayings.'
  alternative_readings:
  - The verse could be read more narrowly as God speaking to prophets rather than
    through them.
  rationale: The parallel structure favors mediated revelation through prophets rather
    than merely private address to prophets. This is a translation decision about
    syntax and idiom, not a doctrinal expansion.
  doctrine_reference: Translation philosophy §1, §3
