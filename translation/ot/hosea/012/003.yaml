id: HOS.12.3
reference: Hosea 12:3
source:
  edition: WLC
  text: וְ/רִ֥יב לַֽ/יהוָ֖ה עִם יְהוּדָ֑ה וְ/לִ/פְקֹ֤ד עַֽל יַעֲקֹב֙ כִּ/דְרָכָ֔י/ו
    כְּ/מַעֲלָלָ֖י/ו יָשִׁ֥יב לֽ/וֹ־־׃
translation:
  text: The LORD has a charge against Judah, and he will punish Jacob according to
    his ways; according to his deeds he will repay him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The LORD has a case against Judah' or 'The LORD has a controversy with
      Judah.' The Hebrew uses legal-dispute language.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will call Jacob to account.' The Hebrew expression literally means
      'to visit upon,' often in the sense of punishment or judicial reckoning.
    reason: lexical_alternative
lexical_decisions:
- source_word: רִיב
  chosen: has a charge against
  alternatives:
  - has a controversy with
  - has a case against
  - has a dispute with
  lexicon: HALOT
  rationale: The noun רִיב in prophetic/juridical contexts often denotes a legal dispute
    or lawsuit. 'Has a charge against' communicates the covenant-lawsuit sense in
    natural English better than the more wooden 'has a controversy with,' while preserving
    the forensic force.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: עִם יְהוּדָה
  chosen: against Judah
  alternatives:
  - with Judah
  lexicon: HALOT
  rationale: Although עִם commonly means 'with,' after רִיב in a legal setting it
    idiomatically marks the opposing party in a dispute. 'Against Judah' makes the
    adversative/legal sense explicit in idiomatic English.
- source_word: לִפְקֹד עַל
  chosen: will punish
  alternatives:
  - will visit upon
  - will attend to
  - will call to account
  lexicon: HALOT
  rationale: פקד with עַל in judgment contexts commonly means to visit/punish for
    wrongdoing. 'Will punish' is clearer modern English, while still reflecting divine
    judicial action.
- source_word: יַעֲקֹב
  chosen: Jacob
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The Hebrew text reads 'Jacob.' Retaining the name preserves the prophetic
    rhetoric and possible interplay between the patriarch Jacob and the nation descended
    from him.
- source_word: כִּדְרָכָיו
  chosen: according to his ways
  alternatives:
  - according to his conduct
  - according to his paths
  lexicon: HALOT
  rationale: דֶּרֶךְ in plural with pronominal suffix often refers metaphorically
    to conduct or manner of life. 'Ways' preserves the Hebrew metaphor and remains
    understandable.
- source_word: כְּמַעֲלָלָיו
  chosen: according to his deeds
  alternatives:
  - according to his actions
  - according to his practices
  lexicon: HALOT
  rationale: מַעֲלָלִים refers to deeds/actions, often with moral coloring in prophetic
    judgment. 'Deeds' is concise and suitably weighty.
- source_word: יָשִׁיב לוֹ
  chosen: he will repay him
  alternatives:
  - he will return to him
  - he will recompense him
  - he will bring back to him
  lexicon: HALOT
  rationale: In this judicial context, שוב in Hiphil plus ל conveys requital or repayment.
    'Repay him' best captures the sense of measured recompense corresponding to prior
    conduct.
