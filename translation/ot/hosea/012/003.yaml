theological_decisions:
- issue: Judah/Jacob distinction in prophetic judgment
  chosen_reading: Translate both names as given, with Judah as the immediate party
    in the LORD's charge and Jacob as the object of ensuing punishment/recompense.
  alternative_readings:
  - Treat 'Jacob' as a synonym for the whole nation including Judah and Israel without
    distinction
  rationale: The verse names both Judah and Jacob. The translation preserves the textual
    distinction rather than harmonizing it away, while allowing 'Jacob' to retain
    its prophetic corporate resonance.
  doctrine_reference: Preserve theological tension rather than resolve it.
