id: HOS.12.14
reference: Hosea 12:14
source:
  edition: WLC
  text: וּ/בְ/נָבִ֕יא הֶעֱלָ֧ה יְהוָ֛ה אֶת יִשְׂרָאֵ֖ל מִ/מִּצְרָ֑יִם וּ/בְ/נָבִ֖יא נִשְׁמָֽר־׃
translation:
  text: By a prophet Yahweh brought Israel up from Egypt, and by a prophet he was guarded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, likely Moses in the exodus context.
    reason: cross_reference
  - marker: b
    text: Or 'he was guarded' or 'he was preserved.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנָבִיא
  chosen: by a prophet
  alternatives:
  - through a prophet
  lexicon: HALOT
  rationale: The preposition ב with נָבִיא here marks instrumentality/agency. 'By a prophet' is concise and natural, while preserving the repeated parallel structure in both cola.
- source_word: הֶעֱלָה
  chosen: brought ... up
  alternatives:
  - led ... up
  - brought out
  lexicon: HALOT
  rationale: עלה in the Hiphil commonly means 'bring up' and is a standard exodus expression. 'Brought ... up from Egypt' preserves the Hebrew idiom better than flattening to only 'brought out,' while still reading naturally in English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  lexicon: HALOT
  rationale: Standard geographic rendering; no contextual reason to vary.
- source_word: נִשְׁמָר
  chosen: he was kept
  alternatives:
  - he was guarded
  - he was preserved
  lexicon: HALOT
  rationale: The Niphal of שׁמר is passive/reflexive, 'be kept/guarded.' 'He was kept' best preserves the terse Hebrew and leaves the subject as Israel, understood from the previous colon. 'Preserved' is interpretive; 'guarded' is possible but slightly narrower.
