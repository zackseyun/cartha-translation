theological_decisions:
- issue: Implicit identification of the prophet in both cola
  chosen_reading: Leave 'a prophet' indefinite in the main text, allowing the reader to infer Moses from the exodus context.
  alternative_readings:
  - Translate 'by the prophet' to make Moses explicit
  rationale: The Hebrew has no explicit article here, and the verse's rhetoric emphasizes God's use of prophetic mediation rather than naming Moses directly. Keeping the phrase indefinite preserves the source wording and literary parallelism.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
