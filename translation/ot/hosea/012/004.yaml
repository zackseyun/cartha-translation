theological_decisions:
- issue: Referent of אֱלֹהִים in Jacob's struggle
  chosen_reading: God
  alternative_readings:
  - a divine being
  - an angel (in light of the following verse)
  rationale: The Hebrew here says אֱלֹהִים, and the translation should preserve that
    wording in the main text. Hosea 12:5 then identifies the figure as 'the angel,'
    so the passage intentionally preserves a theological tension between divine and
    angelic description. Following the translation philosophy, the main text keeps
    'God' and the alternative is preserved in a footnote rather than harmonized away.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
