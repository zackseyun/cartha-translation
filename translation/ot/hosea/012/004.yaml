id: HOS.12.4
reference: Hosea 12:4
source:
  edition: WLC
  text: בַּ/בֶּ֖טֶן עָקַ֣ב אֶת אָחִ֑י/ו וּ/בְ/אוֹנ֖/וֹ שָׂרָ֥ה אֶת אֱלֹהִֽים־־׃
translation:
  text: In the womb he grasped his brother’s heel, and in his strength he contended
    with God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he took his brother by the heel.' The Hebrew verb evokes Jacob’s birth
      narrative and can carry the extended sense of supplanting.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he strove with a divine being'; the following verse identifies the
      figure as 'the angel,' so Hosea preserves the tension rather than flattening
      it.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּבֶּטֶן
  chosen: In the womb
  alternatives:
  - In the belly
  lexicon: HALOT
  rationale: בטן literally denotes the belly/womb. In this context, referring to Jacob
    before birth, 'womb' is the natural and contextually precise English rendering.
- source_word: עָקַב
  chosen: grasped ... heel
  alternatives:
  - took by the heel
  - supplanted
  - overreached
  lexicon: HALOT
  rationale: The verb is tied to Jacob's birth narrative and the root idea of heel-grasping.
    'Grasped his brother’s heel' preserves the concrete image in Genesis 25:26 better
    than the more interpretive 'supplanted' or 'overreached.'
- source_word: אָחִיו
  chosen: his brother’s
  alternatives:
  - his brother
  lexicon: HALOT
  rationale: Rendered possessively in English to fit the idiom 'grasped his brother’s
    heel' while preserving the familial reference.
- source_word: וּבְאוֹנוֹ
  chosen: in his strength
  alternatives:
  - by his strength
  - in his vigor
  - in his manhood
  lexicon: HALOT
  rationale: און can denote strength, vigor, or potency. 'In his strength' is a clear
    and sufficiently literal rendering that fits the parallel with the preceding clause
    and avoids over-specifying age or sexual vigor.
- source_word: שָׂרָה
  chosen: contended
  alternatives:
  - strove
  - struggled
  - prevailed
  lexicon: HALOT
  rationale: The verb denotes striving or contending, echoing the Jacob narrative
    and the name Israel. 'Contended' preserves the adversarial struggle without importing
    the result. 'Prevailed' would overtranslate, since victory is not explicit in
    this clause.
- source_word: אֶת אֱלֹהִים
  chosen: with God
  alternatives:
  - with gods
  - with a divine being
  - against God
  lexicon: HALOT
  rationale: Although את is formally the object marker here, with verbs of striving
    this construction is idiomatically rendered in English as 'with God.' Given the
    allusion to Jacob's wrestling and the canonical context, 'God' is the best rendering.
    'Against God' is possible in a wooden sense but less idiomatic and potentially
    misleading.
