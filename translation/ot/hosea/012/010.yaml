theological_decisions:
- issue: Whether the verse is primarily promise, threat, or ironic reversal
  chosen_reading: Render the statement straightforwardly without resolving whether the return to tents is restorative or punitive.
  alternative_readings:
  - A promise of renewed exodus fellowship
  - A threat of exile and deprivation
  - An allusion to the wilderness period and/or the Feast of Booths
  rationale: The Hebrew states the action without explicit evaluative markers. The translation should preserve the theological tension rather than force either a positive or negative interpretation into the wording.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
