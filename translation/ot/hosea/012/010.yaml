id: HOS.12.10
reference: Hosea 12:10
source:
  edition: WLC
  text: וְ/אָנֹכִ֛י יְהוָ֥ה אֱלֹהֶ֖י/ךָ מֵ/אֶ֣רֶץ מִצְרָ֑יִם עֹ֛ד אוֹשִֽׁיבְ/ךָ֥ בָ/אֳהָלִ֖ים כִּ/ימֵ֥י מוֹעֵֽד׃
translation:
  text: Yet I am Yahweh your God from the land of Egypt; I will again make you dwell in tents, as in the days of the appointed feast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the appointed time' or 'the festival.' The phrase may allude to the Feast of Booths, when Israel dwelt in temporary shelters.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אָנֹכִי
  chosen: Yet I
  alternatives:
  - And I
  - But I
  lexicon: HALOT
  rationale: אָנֹכִי is the emphatic first-person pronoun, and the prefixed conjunction can be rendered in context as adversative. 'Yet I' preserves the contrastive force with the surrounding rebuke while keeping the emphatic subject explicit.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: Straightforward covenantal designation with second masculine singular suffix.
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - since the land of Egypt
  - out of the land of Egypt
  lexicon: HALOT
  rationale: The phrase recalls the exodus and covenant relationship. 'From the land of Egypt' is a natural rendering of the preposition and preserves the historical reference without overinterpreting temporal nuance.
- source_word: עֹד
  chosen: again
  alternatives:
  - still
  - yet
  lexicon: HALOT
  rationale: 'Here עֹד modifies the future verb and most naturally signals repetition: God will once more cause them to dwell in tents. ''Again'' fits the prophetic threat/promise context better than a simple continuative ''still''.'
- source_word: אוֹשִׁיבְךָ
  chosen: I will make you dwell
  alternatives:
  - I will cause you to live
  - I will settle you
  lexicon: HALOT
  rationale: Hiphil of ישב is causative. 'Make you dwell' preserves the causative sense more clearly than the flatter 'settle you'.
- source_word: בָאֳהָלִים
  chosen: in tents
  alternatives:
  - in tabernacles
  - in shelters
  lexicon: HALOT
  rationale: The noun means literal tents. 'Tabernacles' would import later traditional terminology into the main text; the festival connection can be preserved by context/footnote.
- source_word: כִּימֵי
  chosen: as in the days of
  alternatives:
  - like the days of
  lexicon: HALOT
  rationale: This comparative phrase introduces the historical or cultic analogy and is best rendered explicitly.
- source_word: מוֹעֵד
  chosen: the appointed feast
  alternatives:
  - the appointed time
  - the festival
  - the assembly
  lexicon: HALOT
  rationale: מוֹעֵד can denote an appointed time or feast. In this context, because of the reference to dwelling in tents, the likely allusion is to a festal occasion, especially the Feast of Booths. 'Appointed feast' preserves both the calendrical and cultic sense without naming the feast too specifically in the main text.
