id: HOS.11.10
reference: Hosea 11:10
source:
  edition: WLC
  text: אַחֲרֵ֧י יְהוָ֛ה יֵלְכ֖וּ כְּ/אַרְיֵ֣ה יִשְׁאָ֑ג כִּֽי ה֣וּא יִשְׁאַ֔ג וְ/יֶחֶרְד֥וּ
    בָנִ֖ים מִ/יָּֽם־׃
translation:
  text: They will walk after the LORD; he will roar like a lion. For he himself will
    roar, and sons will come trembling from the west.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'from the sea.' Here 'the sea' likely means 'the west' as a geographical
      direction.
    reason: lexical_alternative
  - marker: b
    text: Or 'children' for 'sons'; the Hebrew is literally masculine plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרֵי
  chosen: after
  alternatives:
  - behind
  - following
  lexicon: HALOT
  rationale: Spatial term used idiomatically for following someone. 'After' preserves
    the Hebrew image of going after the LORD without over-paraphrasing to 'follow,'
    though the sense includes discipleship/return.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD,' following established reverential convention and the LXX/English Bible
    pattern.
- source_word: יֵלְכוּ
  chosen: will walk
  alternatives:
  - will go
  - will follow
  lexicon: HALOT
  rationale: הלך commonly means 'go/walk.' 'Will walk' keeps the concrete Hebrew wording
    and works naturally with אַחֲרֵי ('after'). 'Will follow' is interpretive and
    therefore left as an alternative sense rather than main text.
- source_word: כְּאַרְיֵה
  chosen: like a lion
  alternatives:
  - as a lion
  lexicon: HALOT
  rationale: Straightforward comparative phrase. 'Like a lion' is idiomatic modern
    English.
- source_word: יִשְׁאָג / יִשְׁאַג
  chosen: will roar
  alternatives:
  - will cry out
  lexicon: HALOT
  rationale: The verb שאג is the standard verb for a lion's roaring. Since it occurs
    twice, the same English gloss is retained for consistency and rhetorical force.
- source_word: כִּי הוּא
  chosen: For he himself
  alternatives:
  - for he
  - indeed he
  lexicon: HALOT
  rationale: כִּי here is best taken as explanatory ('for'). The explicit pronoun
    הוּא adds emphasis, which English can reflect with 'he himself' without sounding
    unnatural.
- source_word: וְיֶחֶרְדוּ
  chosen: will come trembling
  alternatives:
  - will tremble
  - will come in trembling
  - will hurry fearfully
  lexicon: HALOT
  rationale: חרד denotes trembling/shuddering in fear or awe. In this context of return
    in response to the divine roar, English often needs a motion nuance supplied by
    context; 'will come trembling' captures both the emotional force and the implied
    movement toward the LORD.
- source_word: בָנִים
  chosen: sons
  alternatives:
  - children
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine plural and literally 'sons.' In
    keeping with the gender-accurate policy, 'sons' is retained in the main text rather
    than neutralizing to 'children,' though the collective sense may include descendants/people.
- source_word: מִיָּם
  chosen: from the west
  alternatives:
  - from the sea
  lexicon: HALOT
  rationale: Literally 'from the sea,' but in Hebrew geographical idiom 'the sea'
    commonly denotes the west, especially from the perspective of the land of Israel
    and in parallel with Hosea 11:11's directional returns. 'From the west' communicates
    the likely sense in clear English; the literal wording is preserved in a footnote.
