theological_decisions:
- issue: Rendering the return imagery in relation to divine summons
  chosen_reading: The verse depicts the people responding to the LORD's lion-like
    roar by returning to him in trembling.
  alternative_readings:
  - The verse could be read more minimally as simple fear without explicit return
    movement.
  rationale: The immediate context (restoration in Hosea 11:8–11) supports a return
    motif. This informs the choice 'will come trembling' rather than a bare 'will
    tremble,' but the translation avoids adding an explicit object such as 'to him'
    that the Hebrew does not state.
  doctrine_reference: Preserve theological tension rather than resolve it.
