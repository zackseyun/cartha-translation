id: HOS.11.2
reference: Hosea 11:2
source:
  edition: WLC
  text: קָרְא֖וּ לָ/הֶ֑ם כֵּ֚ן הָלְכ֣וּ מִ/פְּנֵי/הֶ֔ם לַ/בְּעָלִ֣ים יְזַבֵּ֔חוּ וְ/לַ/פְּסִלִ֖ים
    יְקַטֵּרֽוּ/ן׃
translation:
  text: The more they called to them, the more they went away from them; they kept
    sacrificing to the Baals and burning incense to idols.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As they called them, so they went away from them.' The Hebrew leaves
      the subject of 'called' unspecified.
    reason: alternative_reading
  - marker: b
    text: Or 'to carved images.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרְאוּ לָהֶם
  chosen: they called to them
  alternatives:
  - they were called
  - they called them
  lexicon: HALOT
  rationale: The Qal perfect 3cp of קרא with ל plus pronominal suffix is most naturally
    rendered actively, 'they called to them.' The subject is indefinite/unspecified
    in Hebrew, likely recalling prophetic or divine summons in context. An active
    plural in English preserves the Hebrew form better than converting to a passive.
    Because both subject and referent are somewhat compressed, the ambiguity is retained
    rather than over-specified.
- source_word: כֵּן
  chosen: the more
  alternatives:
  - so
  - thus
  - accordingly
  lexicon: HALOT
  rationale: 'Here כֵּן functions idiomatically in correlation with the preceding
    clause: ''as/according as ... so ...'' In English, ''the more ... the more ...''
    best captures the proportional force in readable modern style.'
- source_word: הָלְכוּ מִפְּנֵיהֶם
  chosen: they went away from them
  alternatives:
  - they walked from before them
  - they departed from them
  - they went from their presence
  lexicon: HALOT
  rationale: הלך + מן + פנים expresses withdrawal or turning away from someone's presence.
    'Went away from them' is idiomatic English and preserves the relational sense
    of rejection.
- source_word: לַבְּעָלִים
  chosen: to the Baals
  alternatives:
  - to Baal-images
  - to the Baalim
  lexicon: HALOT
  rationale: The plural בְּעָלִים refers to the various Baal deities/cults rather
    than a singular proper name here. 'The Baals' is clear modern English and preserves
    the plural.
- source_word: יְזַבֵּחוּ
  chosen: they kept sacrificing
  alternatives:
  - they sacrificed
  - they would sacrifice
  lexicon: HALOT
  rationale: The imperfect in this poetic-prophetic context conveys customary/repeated
    action. 'Kept sacrificing' brings out the iterative sense without excessive paraphrase.
- source_word: לַפְּסִלִים
  chosen: to idols
  alternatives:
  - to carved images
  - to graven images
  lexicon: HALOT
  rationale: פְּסִילִים are carved cult-images. 'Idols' is the most natural English
    equivalent; the more specific 'carved images' is preserved in a footnote because
    the material/form nuance may be worth noting.
- source_word: יְקַטֵּרוּן
  chosen: burning incense
  alternatives:
  - they burned offerings
  - they made smoke offerings
  lexicon: HALOT
  rationale: The Piel of קטר in cultic contexts commonly denotes burning incense or
    making sacrificial smoke. With idols as the indirect object, 'burning incense'
    is the clearest idiomatic rendering in English.
