theological_decisions:
- issue: Unspecified subject of 'they called to them'
  chosen_reading: Retain the Hebrew's indefinite plural without identifying the callers
    explicitly.
  alternative_readings:
  - God called them
  - the prophets called them
  - they were called
  rationale: The verse does not explicitly identify the subject, and the surrounding
    context allows more than one possibility. Preserving the ambiguity avoids importing
    a doctrinal or interpretive claim the text itself does not make.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
