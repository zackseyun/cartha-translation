theological_decisions:
- issue: Interpretation of the difficult final colon יַחַד לֹא יְרוֹמֵם
  chosen_reading: 'The subject is the Most High: despite their calling, he does not
    lift them up.'
  alternative_readings:
  - Together they do not exalt him
  - No one at all exalts him
  rationale: The Hebrew is syntactically compressed and has been taken either as divine
    non-response or as Israel's refusal to exalt God. In context, the concessive contrast
    between calling to the Most High and the absence of rescue favors divine non-response.
    The alternative is preserved because the Hebrew permits it and the translation
    should preserve tension rather than erase it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
