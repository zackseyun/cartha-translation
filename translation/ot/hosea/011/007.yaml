id: HOS.11.7
reference: Hosea 11:7
source:
  edition: WLC
  text: וְ/עַמִּ֥/י תְלוּאִ֖ים לִ/מְשֽׁוּבָתִ֑/י וְ/אֶל עַל֙ יִקְרָאֻ֔/הוּ יַ֖חַד
    לֹ֥א יְרוֹמֵם־׃
translation:
  text: My people are bent on turning away from me; though they call to the Most High,
    together he does not lift them up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Together they do not exalt him,' or 'No one at all exalts him.' The
      Hebrew of the final clause is difficult.
    reason: alternative_reading
  - marker: b
    text: '''Turning away'' renders a Hebrew term often translated ''backsliding''
      or ''apostasy.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמִּי
  chosen: My people
  alternatives:
  - my nation
  lexicon: HALOT
  rationale: עַם commonly denotes a people-group; in Hosea this covenantal sense is
    stronger than the more political 'nation.' The 1cs suffix requires 'my.'
- source_word: תְלוּאִים
  chosen: are bent on
  alternatives:
  - are hanging on
  - are in suspense
  - are dependent
  lexicon: HALOT
  rationale: 'The participle from תלא is difficult and contextually conveys being
    fixed, attached, or hanging toward something. In Hosea 11:7, with לִמְשׁוּבָתִי
    following, the idiom is best represented as a settled inclination: ''are bent
    on.'' This preserves the stubbornness implied by the context better than a wooden
    ''are hanging.'''
- source_word: לִמְשׁוּבָתִי
  chosen: turning away from me
  alternatives:
  - my turning away
  - my apostasy
  - backsliding from me
  lexicon: HALOT
  rationale: מְשׁוּבָה often means apostasy/backsliding. With the 1cs suffix, the
    phrase is syntactically difficult. In context the sense is the people's turning
    away with reference to God, not God's own turning. 'Turning away from me' makes
    the relational force clear in natural English while staying close to the prophetic
    accusation.
- source_word: וְאֶל־עַל
  chosen: though they call to the Most High
  alternatives:
  - and to the Most High they call
  - to God on high they call
  lexicon: HALOT
  rationale: עַל here functions substantivally in the expression אֶל־עַל, conventionally
    understood as 'to the Most High.' The conjunction is rendered concessively ('though')
    because the clause contrasts their calling with the lack of exaltation/help in
    the next colon.
- source_word: יִקְרָאֻהוּ
  chosen: they call to
  alternatives:
  - they call on him
  - one calls him
  lexicon: HALOT
  rationale: The verb is 3mp with 3ms suffix, naturally 'they call him/call on him.'
    Given the preceding אֶל and the likely reference to the Most High, English idiom
    favors 'call to' or 'call on him.' The object is absorbed into the phrase 'call
    to the Most High' for readability.
- source_word: יַחַד
  chosen: together
  alternatives:
  - altogether
  - as one
  lexicon: HALOT
  rationale: יַחַד denotes collective action. 'Together' preserves the adverbial force
    and the corporate nature of the statement.
- source_word: לֹא יְרוֹמֵם
  chosen: he does not lift them up
  alternatives:
  - he does not exalt them
  - none at all exalts him
  - he does not raise them
  lexicon: HALOT
  rationale: רוּם in the polel/related stem can mean exalt, raise, lift up. Given
    the 3ms verb after a plural subject in the previous clause, the most coherent
    sense is that the Most High does not lift them up. This fits the context of withheld
    deliverance. The clause is notoriously difficult, and an alternative understanding
    ('altogether none exalts him') is preserved in a footnote.
