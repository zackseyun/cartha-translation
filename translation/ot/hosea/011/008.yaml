id: HOS.11.8
reference: Hosea 11:8
source:
  edition: WLC
  text: אֵ֞יךְ אֶתֶּנְ/ךָ֣ אֶפְרַ֗יִם אֲמַגֶּנְ/ךָ֙ יִשְׂרָאֵ֔ל אֵ֚יךְ אֶתֶּנְ/ךָ֣
    כְ/אַדְמָ֔ה אֲשִֽׂימְ/ךָ֖ כִּ/צְבֹאיִ֑ם נֶהְפַּ֤ךְ עָלַ/י֙ לִבִּ֔/י יַ֖חַד נִכְמְר֥וּ
    נִחוּמָֽ/י׃
translation:
  text: How can I give you up, Ephraim? How can I hand you over, Israel? How can I
    make you like Admah? How can I set you like Zeboiim? My heart is turned over within
    me; all my compassions are stirred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Admah and Zeboiim were cities associated with the same overthrow as Sodom
      and Gomorrah; the comparison evokes total destruction (see Deuteronomy 29:23).
    reason: cross_reference
  - marker: b
    text: Or 'My heart is changed within me.' The Hebrew image is more literally that
      God's heart is 'turned over,' expressing intense inner upheaval.
    reason: lexical_alternative
  - marker: c
    text: Or 'all my pity is kindled' / 'my compassion grows warm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  chosen: How can
  alternatives:
  - How
  - How could
  lexicon: HALOT
  rationale: Interrogative of astonishment and reluctance, not merely manner. 'How
    can' best conveys the emotional impossibility expressed in the repeated questions.
- source_word: אֶתֶּנְךָ
  chosen: give you up
  alternatives:
  - give you over
  - deliver you
  lexicon: HALOT
  rationale: נתן literally means 'give,' but in this judicial/destructive context
    'give you up' idiomatically conveys surrendering Ephraim to judgment while preserving
    the pathos of the line.
- source_word: אֲמַגֶּנְךָ
  chosen: hand you over
  alternatives:
  - deliver you
  - surrender you
  lexicon: HALOT
  rationale: מגן in the Piel here carries the sense of handing over or delivering
    up. 'Hand you over' is clear modern English and pairs well with 'give you up'
    without collapsing the parallelism into identical wording.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  rationale: Proper name retained by transliteration. In Hosea it often stands for
    the northern kingdom, but the text addresses Ephraim directly as a named entity.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name transliterated. Here parallel to 'Ephraim,' reinforcing that
    the addressee is the northern kingdom/covenant people.
- source_word: כְאַדְמָה
  chosen: like Admah
  alternatives:
  - as Admah
  lexicon: HALOT
  rationale: Admah is one of the cities destroyed with Sodom and Gomorrah (cf. Deut
    29:23). The comparison is to catastrophic judgment, so the proper name should
    be preserved.
- source_word: אֲשִׂימְךָ
  chosen: make you
  alternatives:
  - set you
  - treat you as
  lexicon: HALOT
  rationale: שים literally means 'set/place,' but with the following comparison 'make
    you like Admah' is the most natural English expression for causing Israel to become
    as that judged city.
- source_word: כִּצְבֹאיִם
  chosen: like Zeboiim
  alternatives:
  - as Zeboiim
  lexicon: HALOT
  rationale: Proper name preserved. Zeboiim is paired with Admah in traditions of
    divine overthrow, so the allusion should remain explicit.
- source_word: נֶהְפַּךְ עָלַי לִבִּי
  chosen: My heart is turned over within me
  alternatives:
  - My heart is changed within me
  - My heart turns against me
  lexicon: HALOT
  rationale: The Niphal of הפך conveys overturning/turning. The idiom expresses intense
    inner reversal or upheaval in God’s disposition. 'Turned over within me' preserves
    the visceral metaphor better than flattening it to 'changed.'
- source_word: יַחַד
  chosen: all
  alternatives:
  - together
  - altogether
  lexicon: HALOT
  rationale: 'Though literally ''together,'' in English the adverb here naturally
    modifies the following plural noun/verb as a totality: ''all my compassions.''
    This keeps the sense of collective stirring.'
- source_word: נִכְמְרוּ
  chosen: are stirred
  alternatives:
  - grow warm
  - are kindled
  - are aroused
  lexicon: HALOT
  rationale: The verb can denote being kindled or deeply moved, often of inward emotion.
    'Are stirred' communicates strong emotional movement in contemporary English without
    overinterpreting the exact physiological metaphor.
- source_word: נִחוּמָי
  chosen: my compassions
  alternatives:
  - my compassion
  - my pity
  - my consolations
  lexicon: HALOT
  rationale: From נחם-related noun in the plural with first-person suffix. In context
    it denotes feelings of compassion/mercy rather than 'consolations.' The plural
    is best represented by 'compassions' to preserve the Hebrew emotional fullness.
