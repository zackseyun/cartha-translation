theological_decisions:
- issue: Anthropopathic language for God’s inner emotional movement
  chosen_reading: Retain the vivid language of God's heart being turned and his compassions
    being stirred
  alternative_readings:
  - Paraphrase to a more abstract statement such as 'I have changed my mind'
  rationale: The Hebrew intentionally portrays divine compassion in visceral, relational
    terms. Per translation philosophy, theological tension should be preserved rather
    than resolved into a less embodied abstraction.
  doctrine_reference: Translation philosophy §3
- issue: Reference of Admah and Zeboiim
  chosen_reading: Preserve the place names in the main text
  alternative_readings:
  - Replace with an interpretive phrase such as 'the cities I destroyed'
  rationale: The allusion to cities overthrown in judgment is important, but the source
    text names them directly. Optimal equivalence favors retaining the names and explaining
    them in a footnote rather than paraphrasing.
  doctrine_reference: Translation philosophy §1
