id: HOS.11.3
reference: Hosea 11:3
source:
  edition: WLC
  text: וְ/אָנֹכִ֤י תִרְגַּ֨לְתִּי֙ לְ/אֶפְרַ֔יִם קָחָ֖/ם עַל זְרֽוֹעֹתָ֑י/ו וְ/לֹ֥א
    יָדְע֖וּ כִּ֥י רְפָאתִֽי/ם־׃
translation:
  text: Yet it was I who taught Ephraim to walk, taking them in his arms, but they
    did not know that I healed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''taking them in his arms''; the Masoretic Text has a difficult
      third-person form/suffix in this clause. Many interpreters understand the sense
      as continuing the LORD''s first-person speech: ''I took them in my arms.'''
    reason: textual_variant
lexical_decisions:
- source_word: תִרְגַּלְתִּי
  chosen: taught ... to walk
  alternatives:
  - trained
  - led
  - taught to walk
  lexicon: HALOT
  rationale: The verb from רגל in this stem is idiomatic for teaching or training
    a child to walk. English 'taught ... to walk' best captures the parental image
    and the concrete action.
- source_word: לְאֶפְרַיִם
  chosen: Ephraim
  alternatives:
  - for Ephraim
  lexicon: HALOT
  rationale: Proper name is transliterated per project policy. The prefixed ל is absorbed
    idiomatically with the verb, yielding 'taught Ephraim to walk' rather than a wooden
    'for Ephraim'.
- source_word: קָחָם
  chosen: taking them
  alternatives:
  - I took them
  - he took them
  lexicon: HALOT
  rationale: The consonantal text points to 'he took them,' but in context the verse
    is first-person divine speech throughout, and many understand this as an infinitive/participial-like
    continuation or as a textual irregularity. Rendering 'taking them' preserves the
    flow with the first-person speaker without overloading the English with the Hebrew
    anomaly.
- source_word: עַל זְרֹעֹתָיו
  chosen: in his arms
  alternatives:
  - on his arms
  - in my arms
  lexicon: HALOT
  rationale: Idiomatic English prefers 'in his arms' for carrying a child. The suffix
    is 3ms in the MT ('his arms'), though context might suggest 'my arms'; the main
    text preserves the Masoretic suffix while smoothing the preposition idiomatically.
- source_word: וְלֹא יָדְעוּ
  chosen: but they did not know
  alternatives:
  - and they did not know
  lexicon: HALOT
  rationale: 'The conjunction is rendered ''but'' to reflect the adversative sense
    in context: despite God''s care, they failed to recognize it.'
- source_word: רְפָאתִים
  chosen: I healed them
  alternatives:
  - I was healing them
  - I restored them
  lexicon: HALOT
  rationale: רפא commonly means 'heal.' In Hosea the term can include restoration,
    but 'healed' preserves the concrete metaphor and the covenantal theme of divine
    restoration.
