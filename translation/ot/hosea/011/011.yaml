id: HOS.11.11
reference: Hosea 11:11
source:
  edition: WLC
  text: יֶחֶרְד֤וּ כְ/צִפּוֹר֙ מִ/מִּצְרַ֔יִם וּ/כְ/יוֹנָ֖ה מֵ/אֶ֣רֶץ אַשּׁ֑וּר וְ/הוֹשַׁבְתִּ֥י/ם עַל בָּתֵּי/הֶ֖ם נְאֻם יְהוָֽה־־׃ס
translation:
  text: They will come trembling like a bird from Egypt, and like a dove from the land of Assyria; and I will settle them in their homes, declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They will tremble like a bird from Egypt ... and like a dove from the land of Assyria.' The Hebrew verb can emphasize trembling itself, though in context it likely includes the idea of coming in trembling.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶחֶרְדוּ
  chosen: will come trembling
  alternatives:
  - will tremble
  - will hurry trembling
  - will flutter in fear
  lexicon: HALOT
  rationale: חרד denotes trembling, quaking, or anxious movement. In this context with bird imagery and movement from Egypt/Assyria, the verb likely includes both fear and motion toward YHWH, so 'come trembling' captures the implied approach better than the bare 'tremble.'
- source_word: כְצִפּוֹר
  chosen: like a bird
  alternatives:
  - like a sparrow
  lexicon: HALOT
  rationale: צִפּוֹר is a general term for a small bird, not necessarily a specific species. 'Bird' preserves the generic sense and avoids over-specification.
- source_word: מִמִּצְרַיִם
  chosen: from Egypt
  lexicon: HALOT
  rationale: Straightforward geographic source phrase. 'Egypt' is the standard English name for מִצְרַיִם.
- source_word: וּכְיוֹנָה
  chosen: and like a dove
  alternatives:
  - and like a pigeon
  lexicon: HALOT
  rationale: יוֹנָה commonly denotes 'dove.' 'Dove' fits both standard usage and Hosea's imagery elsewhere.
- source_word: מֵאֶרֶץ אַשּׁוּר
  chosen: from the land of Assyria
  alternatives:
  - from Assyria
  lexicon: HALOT
  rationale: The construct phrase explicitly says 'from the land of Assyria.' Retaining 'land of' reflects the Hebrew wording while remaining natural English.
- source_word: וְהוֹשַׁבְתִּים
  chosen: and I will settle them
  alternatives:
  - and I will cause them to dwell
  - and I will make them live
  lexicon: HALOT
  rationale: 'Hiphil of ישב is causative: ''cause to dwell/settle.'' ''Settle them'' is idiomatic modern English that preserves the causative sense without sounding wooden.'
- source_word: עַל בָּתֵּיהֶם
  chosen: in their homes
  alternatives:
  - upon their houses
  - in their houses
  lexicon: HALOT
  rationale: Although עַל is literally 'upon/on,' with ישב it can function idiomatically for settled dwelling. 'In their homes' communicates the sense of restored habitation more naturally than the overly literal 'upon their houses.'
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: This is the standard prophetic formula. 'Declares the LORD' is clear, natural, and preserves prophetic solemnity. Per doctrine, יְהוָה is rendered 'the LORD' rather than 'Yahweh' in the main text.
