theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of restoration in the final clause
  chosen_reading: I will settle them in their homes
  alternative_readings:
  - I will cause them to dwell in their houses
  - I will return them to their houses
  rationale: The verse depicts return from exile-like dispersion and secure resettlement. The chosen rendering preserves the restoration theme without adding an explicit 'return' not stated by the verb itself.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve what the source text warrants'
