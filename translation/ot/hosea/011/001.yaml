theological_decisions:
- issue: Corporate Israel as 'my son' and later christological reuse
  chosen_reading: Render the Hebrew in its immediate Hoseanic sense as a reference
    to corporate Israel, while leaving later New Testament application to intertextual
    interpretation rather than importing it into the main text.
  alternative_readings:
  - Translate in a way that foregrounds an exclusive messianic prediction
  rationale: In Hosea 11:1 the plain historical-literary referent is Israel in the
    exodus tradition. Because the verse is later cited in Matthew 2:15, the wording
    should remain compatible with that canonical reuse, but the translation should
    not collapse Hosea's immediate sense into a direct messianic paraphrase.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
