id: HOS.11.1
reference: Hosea 11:1
source:
  edition: WLC
  text: כִּ֛י נַ֥עַר יִשְׂרָאֵ֖ל וָ/אֹהֲבֵ֑/הוּ וּ/מִ/מִּצְרַ֖יִם קָרָ֥אתִי לִ/בְנִֽ/י׃
translation:
  text: When Israel was a child, I loved him, and out of Egypt I called my son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'For Israel was a boy, and I loved him.' The Hebrew opening can be read
      causally ('for/because') or temporally ('when'); the temporal sense fits the
      verse's retrospective narration. Also, 'out of Egypt I called my son' is later
      cited in Matthew 2:15.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: When
  alternatives:
  - For
  - Because
  lexicon: HALOT
  rationale: Here כִּי introduces a temporal-circumstantial clause rather than a strict
    causal statement. 'When Israel was a child' reads naturally in English and fits
    the retrospective narrative sense of the verse better than 'For' or 'Because.'
- source_word: נַעַר
  chosen: child
  alternatives:
  - boy
  - youth
  - young man
  lexicon: HALOT
  rationale: נַעַר can denote a boy, youth, or young servant depending on context.
    In this corporate metaphor for Israel's early national life, 'child' best captures
    immaturity and filial relationship without over-specifying age or gender.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name of the nation/personified people; standard transliteration
    is appropriate.
- source_word: וָאֹהֲבֵהוּ
  chosen: I loved him
  alternatives:
  - then I loved him
  - I came to love him
  lexicon: HALOT
  rationale: The verb is first person singular with 3ms suffix, referring to Israel
    personified as a singular son. 'I loved him' preserves both the divine speaker
    and the masculine singular object. English simple past is the most natural rendering.
- source_word: וּמִמִּצְרַיִם
  chosen: and out of Egypt
  alternatives:
  - and from Egypt
  lexicon: HALOT
  rationale: The preposition מִן marks source/origin. 'Out of Egypt' is idiomatic
    English and preserves the exodus resonance more strongly than the flatter 'from
    Egypt.'
- source_word: קָרָאתִי
  chosen: I called
  alternatives:
  - I summoned
  - I called out for
  lexicon: HALOT
  rationale: קרא commonly means 'call' or 'summon.' 'I called' is sufficiently broad
    and preserves the verbal link later echoed in Matthew 2:15 without importing more
    than the Hebrew states.
- source_word: לִבְנִי
  chosen: my son
  alternatives:
  - for my son
  - to my son
  lexicon: HALOT
  rationale: The ל preposition with קרא can mark the one called, yielding the sense
    'called my son.' This is the most idiomatic English rendering here. 'My son' preserves
    the filial metaphor applied corporately to Israel.
