id: HOS.11.6
reference: Hosea 11:6
source:
  edition: WLC
  text: וְ/חָלָ֥ה חֶ֨רֶב֙ בְּ/עָרָ֔י/ו וְ/כִלְּתָ֥ה בַדָּ֖י/ו וְ/אָכָ֑לָה מִֽ/מֹּעֲצ֖וֹתֵי/הֶֽם׃
translation:
  text: A sword will whirl through his cities, and will consume his bars, and devour
    them because of their counsels.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'A sword will fall in his cities' or 'A sword will rage in his cities.'
      The Hebrew verb is difficult and may denote whirling, falling, or writhing/raging
      movement.
    reason: lexical_alternative
  - marker: b
    text: Or 'his gate-bars'; some understand the Hebrew as 'his rulers,' but the
      context of cities under attack favors defensive bars.
    reason: alternative_reading
lexical_decisions:
- source_word: וְחָלָה
  chosen: will whirl through
  alternatives:
  - will fall
  - will dance
  - will rage
  lexicon: HALOT
  rationale: The verb from חול in this form is difficult, but in context with 'sword'
    and 'in his cities' it conveys violent movement or sweeping action rather than
    simple falling. 'Whirl through' captures the image of a sword moving destructively
    through the cities and avoids flattening the poetic force.
- source_word: חֶרֶב
  chosen: sword
  alternatives:
  - war
  - blade
  lexicon: HALOT
  rationale: The concrete singular 'sword' is the natural rendering and can stand
    collectively for warfare, but the Hebrew uses the singular noun.
- source_word: בְּעָרָיו
  chosen: through his cities
  alternatives:
  - in his cities
  - against his cities
  lexicon: HALOT
  rationale: The preposition ב normally means 'in,' but with the preceding verb of
    motion/destructive activity, English idiom is better served by 'through his cities,'
    expressing the sword's movement within the urban centers.
- source_word: וְכִלְּתָה
  chosen: will consume
  alternatives:
  - will finish off
  - will destroy completely
  lexicon: HALOT
  rationale: כלה commonly carries the sense of bringing to an end or consuming. 'Will
    consume' fits the parallelism with the following 'devour' while preserving the
    destructive nuance.
- source_word: בַדָּיו
  chosen: his bars
  alternatives:
  - his gate-bars
  - his rulers
  - his branches
  lexicon: HALOT
  rationale: בדים can denote bars/poles, and in a military judgment context 'bars'
    or 'gate-bars' best fits the imagery of city defenses being destroyed. Some take
    it metaphorically as rulers, but the immediate urban-war setting favors physical
    bars.
- source_word: וְאָכָלָה
  chosen: and devour them
  alternatives:
  - and eat
  - and consume
  lexicon: HALOT
  rationale: אכל is literally 'eat/devour.' 'Devour' is idiomatic in English for destructive
    judgment and maintains the vivid personification. The object 'them' is supplied
    in English from the plural pronominal suffix in the following phrase and the sense
    of the clause.
- source_word: מִמֹּעֲצוֹתֵיהֶם
  chosen: because of their counsels
  alternatives:
  - from their counsels
  - on account of their plans
  - because of their schemes
  lexicon: HALOT
  rationale: 'The prefixed מן here is best taken causally: the destruction comes because
    of their counsels/plans. ''Counsels'' preserves the lexical link to עצה while
    remaining natural English; ''plans'' is possible but slightly less formal than
    the prophetic tone.'
