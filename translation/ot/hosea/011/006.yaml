theological_decisions:
- issue: Referent of the pronominal suffixes ('his cities,' 'his bars' vs. possible
    collective/national reference)
  chosen_reading: Render the singular suffixes straightforwardly as 'his,' while allowing
    the final plural 'their counsels' to stand as in the Hebrew.
  alternative_readings:
  - harmonize all suffixes to a collective 'their cities ... their bars' for smoother
    English
  rationale: The Hebrew text shifts from singular suffixes to a final plural suffix.
    Preserving that tension is preferable to smoothing it away, since the singular
    may personify Israel/Ephraim as a corporate son while the plural points to the
    people's counsels.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
