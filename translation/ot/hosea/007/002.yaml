id: HOS.7.2
reference: Hosea 7:2
source:
  edition: WLC
  text: וּ/בַל יֹֽאמְרוּ֙ לִ/לְבָבָ֔/ם כָּל רָעָתָ֖/ם זָכָ֑רְתִּי עַתָּה֙ סְבָב֣וּ/ם
    מַֽעַלְלֵי/הֶ֔ם נֶ֥גֶד פָּנַ֖/י הָיֽוּ־־׃
translation:
  text: And they do not say in their heart that I remember all their evil. Now their
    deeds surround them; they are before my face.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'say to themselves.' The Hebrew idiom is literally 'say to their heart.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all their wickedness.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'before my face,' an idiom expressing direct exposure to God's
      presence and scrutiny.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַל
  chosen: And they do not
  alternatives:
  - But they do not
  - Yet they do not
  lexicon: HALOT
  rationale: The conjunction plus negative particle introduces a continuing indictment.
    'And they do not' preserves the Hebrew flow without over-interpreting the adversative
    force; 'but/yet' are possible but not required by the particle combination here.
- source_word: יֹאמְרוּ לִלְבָבָם
  chosen: say in their heart
  alternatives:
  - say to themselves
  - think
  lexicon: HALOT
  rationale: Literally 'say to their heart.' The idiom refers to inward reflection.
    'Say in their heart' keeps the Hebrew imagery while remaining natural English;
    'say to themselves' is a viable dynamic alternative.
- source_word: כָּל רָעָתָם
  chosen: all their evil
  alternatives:
  - all their wickedness
  - all their evil deeds
  lexicon: HALOT
  rationale: רָעָה here denotes moral evil/wickedness in the collective. 'All their
    evil' is concise and broad enough to include both disposition and acts; 'wickedness'
    is also possible.
- source_word: זָכַרְתִּי
  chosen: I remember
  alternatives:
  - I have remembered
  - I keep in mind
  lexicon: HALOT
  rationale: The perfect can be rendered as a present in English when expressing a
    standing divine awareness relevant to the present accusation. 'I remember' is
    idiomatic and fits the immediate context of ongoing accountability.
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At this time
  - As it is
  lexicon: HALOT
  rationale: Marks the present consequence of their failure to reckon with God's remembrance.
    'Now' is the most natural discourse marker in English.
- source_word: סְבָבוּם
  chosen: surround them
  alternatives:
  - encircle them
  - close in on them
  lexicon: HALOT
  rationale: The verb means to surround or encircle. The subject is their deeds, pictured
    as hemming them in. 'Surround them' is direct and preserves the metaphor.
- source_word: מַעַלְלֵיהֶם
  chosen: their deeds
  alternatives:
  - their actions
  - their practices
  lexicon: HALOT
  rationale: מַעֲלָל often refers to deeds or actions, frequently with moral coloring
    in prophetic literature. 'Their deeds' is a standard and suitably weighty rendering.
- source_word: נֶגֶד פָּנַי
  chosen: before my face
  alternatives:
  - before me
  - in front of me
  lexicon: HALOT
  rationale: Literally 'in front of my face/presence.' 'Before my face' preserves
    the vivid anthropomorphic expression of divine presence and scrutiny better than
    the flatter 'before me.'
- source_word: הָיוּ
  chosen: they are
  alternatives:
  - they have been
  - they stand
  lexicon: HALOT
  rationale: 'Although formally perfect, in context it describes the present state
    resulting from their deeds: they stand exposed before God. Rendering as present
    English communicates the force naturally in the paired clause with ''Now.'''
