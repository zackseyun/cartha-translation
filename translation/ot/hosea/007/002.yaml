theological_decisions:
- issue: Anthropomorphic expression of divine awareness and judgment
  chosen_reading: before my face
  alternative_readings:
  - before me
  rationale: The Hebrew uses concrete anthropomorphic language for God's immediate
    awareness of Israel's sins. Preserving 'before my face' maintains the prophetic
    force without implying corporeality beyond the text's own idiom.
  doctrine_reference: Translation philosophy §1, §3, §6
