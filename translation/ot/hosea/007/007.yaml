theological_decisions:
- issue: Whether to make the oven imagery explicitly moralized (for example, lust,
    wrath, or conspiracy) in translation
  chosen_reading: Retain the metaphor without specifying the exact inner passion
  alternative_readings:
  - All of them burn with lust like an oven
  - All of them are inflamed like an oven
  rationale: The immediate context uses oven imagery for heated passion and destructive
    plotting, but this verse itself does not explicitly name the passion. Preserving
    the metaphor avoids importing a narrower doctrinal or interpretive claim than
    the Hebrew states.
  doctrine_reference: Translation philosophy §1, §3
- issue: Whether שֹׁפְטֵיהֶם should be rendered narrowly as judicial 'judges' or broadly
    as political 'rulers'
  chosen_reading: Use 'judges' in the main text and preserve 'rulers' in a footnote
  alternative_readings:
  - their rulers
  rationale: The lexical form directly means 'judges,' but in prophetic political
    critique it can extend to governing authorities. The main text follows the source
    more closely; the footnote preserves the broader political nuance.
  doctrine_reference: Translation philosophy §3, §5
