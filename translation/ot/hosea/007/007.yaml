id: HOS.7.7
reference: Hosea 7:7
source:
  edition: WLC
  text: כֻּלָּ֤/ם יֵחַ֨מּוּ֙ כַּ/תַּנּ֔וּר וְ/אָכְל֖וּ אֶת שֹֽׁפְטֵי/הֶ֑ם כָּל מַלְכֵי/הֶ֣ם
    נָפָ֔לוּ אֵין קֹרֵ֥א בָ/הֶ֖ם אֵלָֽ/י־־־׃
translation:
  text: All of them are hot like an oven, and they devour their judges; all their
    kings have fallen. None among them calls to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their rulers.' The Hebrew word can refer more broadly to governing authorities,
      not only judicial officials.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּם
  chosen: All of them
  alternatives:
  - They all
  - All
  lexicon: HALOT
  rationale: The distributive sense is explicit and sets up the totalizing indictment.
    'All of them' is natural English and preserves the comprehensiveness of the Hebrew.
- source_word: יֵחַמּוּ
  chosen: are hot
  alternatives:
  - grow hot
  - are inflamed
  - become heated
  lexicon: HALOT
  rationale: From חָמַם, the sense is being heated or inflamed. In context with 'like
    an oven,' 'are hot' preserves the metaphor without over-interpreting it as specifically
    sexual or emotional, though those connotations may be present from the surrounding
    context.
- source_word: כַּתַּנּוּר
  chosen: like an oven
  alternatives:
  - as an oven
  lexicon: HALOT
  rationale: The simile is straightforward. 'Oven' preserves the recurring image in
    this passage of heated passion and destructive plotting.
- source_word: וְאָכְלוּ
  chosen: and they devour
  alternatives:
  - and they consume
  - and they eat up
  lexicon: HALOT
  rationale: Although the Hebrew perfect can be rendered as past, the verse participates
    in a vivid description of ongoing character and repeated action. 'Devour' captures
    the violent metaphor better than the more literal but less idiomatic 'eat up.'
- source_word: אֶת שֹׁפְטֵיהֶם
  chosen: their judges
  alternatives:
  - their rulers
  lexicon: HALOT
  rationale: שֹׁפְטִים can denote judges or governing leaders. 'Judges' is the more
    direct lexical rendering and fits the political context; the broader sense 'rulers'
    is worth preserving in a footnote because the reference may include governing
    authorities generally, not only judicial officers.
- source_word: כָּל מַלְכֵיהֶם
  chosen: all their kings
  alternatives:
  - every one of their kings
  lexicon: HALOT
  rationale: A direct rendering that preserves the repeated totalizing language and
    the political focus of the accusation.
- source_word: נָפָלוּ
  chosen: have fallen
  alternatives:
  - fell
  - have been brought down
  lexicon: HALOT
  rationale: The perfect summarizes the outcome of the political turmoil. 'Have fallen'
    is idiomatic in English and leaves open whether the fall is by death, overthrow,
    or both.
- source_word: אֵין קֹרֵא בָהֶם אֵלַי
  chosen: None among them calls to me
  alternatives:
  - There is no one among them who calls to me
  - None of them calls on me
  lexicon: HALOT
  rationale: This preserves the existential negation ('there is not') and the covenantal
    language of calling to God. 'Calls to me' is slightly more literal than 'calls
    on me,' while remaining natural English.
