theological_decisions:
- issue: Interpretation of לֹא עָל
  chosen_reading: Render literally as 'but not upward' in the main text
  alternative_readings:
  - but not to the Most High
  rationale: The immediate Hebrew text does not explicitly include 'Most High' in
    this verse, though the previous verse mentions עֶלְיוֹן and many translations
    import that sense here. To avoid resolving the ambiguity beyond what the source
    warrants, the main text keeps the literal directional expression and preserves
    the interpretive alternative in a footnote.
  doctrine_reference: Translation philosophy §§1, 3
