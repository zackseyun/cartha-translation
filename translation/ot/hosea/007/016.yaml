id: HOS.7.16
reference: Hosea 7:16
source:
  edition: WLC
  text: יָשׁ֣וּבוּ לֹ֣א עָ֗ל הָיוּ֙ כְּ/קֶ֣שֶׁת רְמִיָּ֔ה יִפְּל֥וּ בַ/חֶ֛רֶב שָׂרֵי/הֶ֖ם
    מִ/זַּ֣עַם לְשׁוֹנָ֑/ם ז֥וֹ לַעְגָּ֖/ם בְּ/אֶ֥רֶץ מִצְרָֽיִם׀׃
translation:
  text: They turn, but not upward; they are like a deceitful bow. Their princes will
    fall by the sword because of the rage of their tongue. This will be their mockery
    in the land of Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'but not to the Most High.' This reading understands 'upward' as an
      elliptical reference to God, influenced by the wording of the previous verse.
    reason: alternative_reading
  - marker: b
    text: '''A deceitful bow'' may also mean ''a slack,'' ''treacherous,'' or ''faulty''
      bow—that is, a bow that cannot be trusted to shoot true.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשׁוּבוּ
  chosen: They turn
  alternatives:
  - They return
  - They turn back
  lexicon: HALOT
  rationale: שׁוּב commonly means 'turn/return.' Here the context is moral and political
    reversal rather than simple spatial return, so 'They turn' is concise and natural
    while preserving the metaphorical sense.
- source_word: לֹא עָל
  chosen: but not upward
  alternatives:
  - but not to the Most High
  - but not on high
  lexicon: HALOT
  rationale: The Hebrew reads literally 'not up/upward' with עַל/עָל. The phrase is
    difficult and has often been interpreted as an ellipsis for 'to the Most High,'
    influenced by the previous verse's עֶלְיוֹן. Since the source text here does not
    explicitly say 'Most High,' the main text preserves the more literal 'not upward,'
    and the interpretive alternative is preserved in a footnote.
- source_word: הָיוּ
  chosen: they are
  alternatives:
  - they have become
  - they were
  lexicon: HALOT
  rationale: 'Though morphologically perfect, היה here functions in a present/resultative
    comparison: ''they are like.'' Present English best fits the simile in context.'
- source_word: כְּקֶשֶׁת רְמִיָּה
  chosen: like a deceitful bow
  alternatives:
  - like a slack bow
  - like a treacherous bow
  - like a faulty bow
  lexicon: HALOT
  rationale: רְמִיָּה can denote deceit, treachery, or unreliability. For a bow, the
    image is of a weapon that cannot be trusted to aim true. 'Deceitful bow' keeps
    the lexical force and the prophetic metaphor, while alternatives are viable interpretive
    glosses.
- source_word: יִפְּלוּ בַחֶרֶב
  chosen: will fall by the sword
  alternatives:
  - will fall by the blade
  - will be struck down by the sword
  lexicon: HALOT
  rationale: A standard idiom for death in battle or judgment. 'By the sword' is both
    natural and faithful.
- source_word: שָׂרֵיהֶם
  chosen: their princes
  alternatives:
  - their officials
  - their leaders
  lexicon: HALOT
  rationale: שַׂר refers to rulers, princes, or officials. 'Princes' preserves the
    elevated political sense common in prophetic judgment oracles.
- source_word: מִזַּעַם לְשׁוֹנָם
  chosen: because of the rage of their tongue
  alternatives:
  - because of the insolence of their tongue
  - because of the fury of their speech
  lexicon: HALOT
  rationale: זַעַם denotes indignation, rage, or wrath. In connection with 'their
    tongue,' it points to violent, arrogant, or provocative speech. 'Because of the
    rage of their tongue' stays close to the Hebrew while remaining intelligible.
- source_word: זֹו
  chosen: This
  alternatives:
  - That
  lexicon: HALOT
  rationale: The demonstrative points forward or sums up the consequence just stated.
    'This' is the most natural English deictic here.
- source_word: לַעְגָּם
  chosen: their mockery
  alternatives:
  - their derision
  - their object of scorn
  lexicon: HALOT
  rationale: לַעַג denotes mockery or derision. The sense may be either that they
    become a mockery or that this judgment is the occasion for mockery. 'Their mockery'
    is a close rendering, with English allowing the implied resultative sense in context.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: The fuller phrase is retained for formal clarity and prophetic resonance.
    Egypt likely functions as the place where they will be ridiculed or remembered
    with scorn.
