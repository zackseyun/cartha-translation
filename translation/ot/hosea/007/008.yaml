theological_decisions:
- issue: Referent of 'Ephraim'
  chosen_reading: Ephraim is retained as the named referent, implicitly representing
    the northern kingdom of Israel.
  alternative_readings:
  - Israel
  - the northern kingdom
  rationale: The prophetic text uses 'Ephraim' as a covenant-historical designation.
    Replacing it in the main text with an interpretation would reduce transparency
    to the source. The representative sense can be noted in study materials rather
    than imported into the translation.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    Original-language primacy over translation tradition.'
