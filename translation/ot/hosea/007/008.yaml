id: HOS.7.8
reference: Hosea 7:8
source:
  edition: WLC
  text: אֶפְרַ֕יִם בָּ/עַמִּ֖ים ה֣וּא יִתְבּוֹלָ֑ל אֶפְרַ֛יִם הָיָ֥ה עֻגָ֖ה בְּלִ֥י
    הֲפוּכָֽה׃
translation:
  text: Ephraim mixes himself among the peoples; Ephraim has become a cake not turned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mingles himself among the nations.'
    reason: lexical_alternative
  - marker: b
    text: The image is of bread left unturned while baking—burned on one side and
      underdone on the other.
    reason: cultural_note
lexical_decisions:
- source_word: יִתְבּוֹלָל
  chosen: mixes himself
  alternatives:
  - mingles himself
  - is mixed up
  - mixes
  lexicon: HALOT
  rationale: The hitpolel/reflexive form conveys Ephraim's involvement in blending
    or intermingling with others, not merely a passive state. 'Mixes himself' preserves
    the reflexive nuance and the prophetic critique of self-assimilation.
- source_word: בָּעַמִּים
  chosen: among the peoples
  alternatives:
  - with the peoples
  - among the nations
  lexicon: HALOT
  rationale: עַמִּים commonly means 'peoples' or 'nations.' 'Among the peoples' fits
    the preposition and preserves the plural sense of surrounding foreign groups without
    over-specifying geopolitical 'nations'.
- source_word: עֻגָה
  chosen: cake
  alternatives:
  - flatbread
  - bread cake
  - loaf
  lexicon: HALOT
  rationale: The noun refers to a round cake of bread baked on heated stones or coals.
    'Cake' is the most direct and traditional rendering in this metaphor; 'flatbread'
    is possible but more interpretive.
- source_word: בְּלִי הֲפוּכָה
  chosen: not turned
  alternatives:
  - unturned
  - without being turned
  - not flipped over
  lexicon: HALOT
  rationale: The phrase describes bread left unturned in baking, and thus ruined on
    one side and underdone on the other. 'Not turned' is concise, natural, and preserves
    the image without colloquializing it.
- source_word: הָיָה
  chosen: has become
  alternatives:
  - was
  - became
  lexicon: HALOT
  rationale: 'Though formally a qatal, in context it marks resultant state: Ephraim
    has come to be like an unturned cake. ''Has become'' communicates the present
    force of the prophetic metaphor better than simple past ''was''.'
- source_word: אֶפְרַיִם
  chosen: Ephraim
  rationale: Proper name transliterated per translation philosophy. In Hosea it stands
    for the northern kingdom/Israel, but the text names Ephraim directly, so the transliteration
    is retained.
