theological_decisions:
- issue: Prophetic temporal framing of divine healing versus exposed sin
  chosen_reading: The verse presents God's intended or ongoing act of healing Israel
    as the moment when Ephraim's guilt is exposed.
  alternative_readings:
  - The verse refers to a past healing event after which guilt was revealed.
  rationale: The Hebrew permits a temporal sense 'when/as I heal.' In context, Hosea
    emphasizes that divine efforts toward restoration uncover rather than bypass Israel's
    corruption. This is a contextual-exegetical decision, not a doctrinally contested
    term.
