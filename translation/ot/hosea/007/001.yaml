id: HOS.7.1
reference: Hosea 7:1
source:
  edition: WLC
  text: כְּ/רָפְאִ֣/י לְ/יִשְׂרָאֵ֗ל וְ/נִגְלָ֞ה עֲוֺ֤ן אֶפְרַ֨יִם֙ וְ/רָע֣וֹת שֹֽׁמְר֔וֹן
    כִּ֥י פָעֲל֖וּ שָׁ֑קֶר וְ/גַנָּ֣ב יָב֔וֹא פָּשַׁ֥ט גְּד֖וּד בַּ/חֽוּץ׃
translation:
  text: When I would heal Israel, the iniquity of Ephraim is uncovered, and the evil
    deeds of Samaria; for they practice falsehood. A thief comes in; a raiding band
    strips outside.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'When I healed Israel' or 'As I was healing Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'they work deceit.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'a band of robbers plunders outside.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּרָפְאִי
  chosen: When I would heal
  alternatives:
  - When I healed
  - As I was healing
  - When I set out to heal
  lexicon: HALOT
  rationale: 'The prefixed כ with the infinitive/verb form here is temporal, introducing
    the circumstance ''when/as.'' The 1cs suffix marks God as speaker: ''my healing''
    in idiom = ''when I heal/would heal.'' ''Would heal'' best captures the incipient
    or intended action in context, where divine restoration is met by exposed sin.'
- source_word: לְיִשְׂרָאֵל
  chosen: Israel
  lexicon: HALOT
  rationale: Direct object/benefactive of the healing action; standard transliteration
    of the national name.
- source_word: וְנִגְלָה
  chosen: is uncovered
  alternatives:
  - is revealed
  - was uncovered
  lexicon: HALOT
  rationale: Nifal of גלה conveys being exposed or revealed. Present English fits
    the vivid prophetic sequence after the temporal clause. 'Uncovered' preserves
    the metaphor of hidden guilt being laid bare.
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - wickedness
  - sin
  lexicon: HALOT
  rationale: עון can denote guilt, punishment, or iniquity. Here it refers to moral
    perversity exposed in Ephraim. 'Iniquity' preserves the weight of covenantal wrongdoing
    better than the flatter 'sin.'
- source_word: אֶפְרַיִם
  chosen: Ephraim
  lexicon: HALOT
  rationale: Standard transliteration. In Hosea this often stands metonymically for
    the northern kingdom, but the proper name should be retained.
- source_word: וְרָעוֹת
  chosen: the evil deeds
  alternatives:
  - the evils
  - the wicked acts
  - the calamities
  lexicon: HALOT
  rationale: Plural of רעה here refers to morally evil acts rather than disasters
    suffered. 'Evil deeds' makes the ethical sense explicit in natural English.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  lexicon: HALOT
  rationale: Standard transliteration of the capital city, standing for its inhabitants
    and regime.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason the iniquity and evil deeds are exposed.
- source_word: פָעֲלוּ שָׁקֶר
  chosen: they practice falsehood
  alternatives:
  - they work deceit
  - they commit lies
  - they act falsely
  lexicon: HALOT
  rationale: The verb 'do/work' with שקר expresses habitual production of deceit.
    'Practice falsehood' communicates ongoing conduct rather than a single lie.
- source_word: וְגַנָּב יָבֹוא
  chosen: A thief comes in
  alternatives:
  - the thief enters
  - a thief breaks in
  lexicon: HALOT
  rationale: Singular noun used generically. 'Comes in' is the plain sense of בוא;
    'breaks in' is possible by implication but slightly more interpretive.
- source_word: פָּשַׁט גְּדוּד בַּחוּץ
  chosen: a raiding band strips outside
  alternatives:
  - a band of robbers plunders outside
  - a marauding troop raids in the street
  - a raider strips bare outside
  lexicon: HALOT
  rationale: פשט can mean strip off, spread out, or raid; with גדוד it commonly evokes
    marauding bands. 'Raiding band strips outside' preserves the terse Hebrew imagery
    of open violence in contrast to the thief indoors.
