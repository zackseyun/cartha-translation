theological_decisions:
- issue: Sense of God's redemptive statement וְאָנֹכִי אֶפְדֵּם
  chosen_reading: Though I would redeem them
  alternative_readings:
  - Yet I would redeem them
  - But I redeemed them
  rationale: The Hebrew imperfect naturally supports a non-past sense, and the verse's
    rhetoric contrasts God's disposition to redeem with Israel's continued falsehood.
    This preserves theological tension rather than resolving it into either a purely
    past historical redemption or a denied future redemption.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
