id: HOS.7.13
reference: Hosea 7:13
source:
  edition: WLC
  text: א֤וֹי לָ/הֶם֙ כִּֽי נָדְד֣וּ מִמֶּ֔/נִּי שֹׁ֥ד לָ/הֶ֖ם כִּֽי פָ֣שְׁעוּ בִ֑/י
    וְ/אָנֹכִ֣י אֶפְדֵּ֔/ם וְ/הֵ֕מָּה דִּבְּר֥וּ עָלַ֖/י כְּזָבִֽים־־׃
translation:
  text: Woe to them, for they have wandered away from me! Destruction is theirs, for
    they have rebelled against me. Though I would redeem them, they speak lies against
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''Yet I would redeem them''; some take the verb as past: ''But I redeemed
      them.'''
    reason: alternative_reading
lexical_decisions:
- source_word: א֤וֹי
  chosen: Woe
  alternatives:
  - Alas
  lexicon: HALOT
  rationale: An interjection of lament and threat. 'Woe' preserves the prophetic tone
    better than the softer 'alas.'
- source_word: נָדְדוּ מִמֶּנִּי
  chosen: have wandered away from me
  alternatives:
  - have fled from me
  - have strayed from me
  lexicon: HALOT
  rationale: The verb נדד conveys moving away, wandering, or fleeing. 'Wandered away'
    captures both physical and covenantal estrangement without overstating intentional
    flight.
- source_word: שֹׁד לָהֶם
  chosen: Destruction is theirs
  alternatives:
  - Devastation to them
  - Spoiling is for them
  lexicon: HALOT
  rationale: שֹׁד commonly denotes devastation, ruin, or violent destruction. 'Destruction
    is theirs' gives natural English while preserving the announced judgment.
- source_word: פָשְׁעוּ בִי
  chosen: have rebelled against me
  alternatives:
  - have transgressed against me
  - have revolted against me
  lexicon: HALOT
  rationale: פשע is stronger than a generic 'sin'; it denotes rebellion or breach
    of loyalty. 'Rebelled against me' best fits Hosea's covenantal context.
- source_word: וְאָנֹכִי אֶפְדֵּם
  chosen: Though I would redeem them
  alternatives:
  - Yet I would redeem them
  - I myself would redeem them
  - I redeemed them
  lexicon: HALOT
  rationale: The imperfect of פדה here is best taken as expressing God's willing or
    intended redemptive action in contrast with Israel's response. 'Though I would
    redeem them' fits the adversative context and preserves the tension. A past sense
    ('I redeemed them') is possible in some translations, but the form is imperfect,
    not perfect.
- source_word: דִּבְּרוּ עָלַי כְּזָבִים
  chosen: they speak lies against me
  alternatives:
  - they have spoken lies against me
  - they speak falsehood against me
  - they slander me with lies
  lexicon: HALOT
  rationale: The phrase indicates false speech directed against God. 'Speak lies against
    me' is clear, direct, and preserves the hostile orientation of עָלַי.
