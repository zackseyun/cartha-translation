id: HOS.7.3
reference: Hosea 7:3
source:
  edition: WLC
  text: בְּ/רָעָתָ֖/ם יְשַׂמְּחוּ מֶ֑לֶךְ וּ/בְ/כַחֲשֵׁי/הֶ֖ם שָׂרִֽים־׃
translation:
  text: By their evil they make the king glad, and by their lies, the princes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and by their deceit, the officials.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרָעָתָם
  chosen: By their evil
  alternatives:
  - With their evil
  - Through their wickedness
  lexicon: HALOT
  rationale: 'The preposition ב here is instrumental/means: the king is made glad
    by means of the people''s evil. ''Evil'' is concise and natural; ''wickedness''
    is possible but slightly heavier. Singular collective sense in Hebrew is well
    represented by English singular.'
- source_word: יְשַׂמְּחוּ
  chosen: they make ... glad
  alternatives:
  - they gladden
  - they please
  lexicon: HALOT
  rationale: 'Piel of שׂמח is causative/intensive: not merely ''they rejoice'' but
    ''they make glad.'' ''Make glad'' preserves the causative force more transparently
    than the less common English verb ''gladden.'''
- source_word: מֶלֶךְ
  chosen: the king
  alternatives:
  - a king
  lexicon: HALOT
  rationale: Although anarthrous in Hebrew, the referent is definite in context, referring
    to the Israelite monarch. English idiom prefers 'the king' here.
- source_word: וּבְכַחֲשֵׁיהֶם
  chosen: and by their lies
  alternatives:
  - and by their deceit
  - and with their falsehoods
  lexicon: HALOT
  rationale: כחשׁ denotes lying, denial, or deception. In this parallel with 'their
    evil,' 'their lies' is the most direct and readable rendering. The prefixed conjunction
    and preposition are carried over as 'and by.'
- source_word: שָׂרִים
  chosen: the princes
  alternatives:
  - the officials
  - the rulers
  lexicon: HALOT
  rationale: שׂרים commonly refers to high-ranking leaders or princes. 'Princes' preserves
    the courtly-political setting and parallels 'the king' better than the broader
    'officials' or 'rulers'.
