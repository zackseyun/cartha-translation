id: HOS.7.4
reference: Hosea 7:4
source:
  edition: WLC
  text: כֻּלָּ/ם֙ מְנָ֣אֲפִ֔ים כְּמ֣וֹ תַנּ֔וּר בֹּעֵ֖רָה מֵֽ/אֹפֶ֑ה יִשְׁבּ֣וֹת מֵעִ֔יר
    מִ/לּ֥וּשׁ בָּצֵ֖ק עַד חֻמְצָתֽ/וֹ־׃
translation:
  text: All of them are adulterers, like an oven heated by a baker, who stops stirring
    from the kneading of the dough until its leavening.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burning' instead of 'heated.' The Hebrew participle can emphasize the
      oven's active heat.
    reason: lexical_alternative
  - marker: b
    text: Or 'who stops stoking it' or 'who ceases stirring it.' The Hebrew verb is
      difficult in this context and may refer to the baker's pausing his tending of
      the oven.
    reason: lexical_alternative
  - marker: c
    text: Or 'until it rises.' The Hebrew likely refers to the dough's fermenting
      or leavening process.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּם
  chosen: All of them
  alternatives:
  - They all
  - All of them alike
  lexicon: HALOT
  rationale: The phrase is distributive and emphatic, referring comprehensively to
    the group under indictment. 'All of them' preserves the force naturally in English.
- source_word: מְנָאֲפִים
  chosen: adulterers
  alternatives:
  - those committing adultery
  - adulterous
  lexicon: HALOT
  rationale: The participle functions substantivally/plurally. 'Adulterers' is concise
    and preserves the moral charge. In Hosea's context this likely carries both literal
    and metaphorical covenantal overtones, but the lexical sense itself is 'adulterers,'
    not an interpretive expansion.
- source_word: כְּמוֹ
  chosen: like
  alternatives:
  - as
  lexicon: HALOT
  rationale: Standard comparative particle; 'like' is the most natural modern English
    rendering in this simile.
- source_word: תַנּוּר
  chosen: oven
  alternatives:
  - furnace
  lexicon: HALOT
  rationale: The domestic baking image in the immediate context favors 'oven' over
    the more industrial-sounding 'furnace.'
- source_word: בֹּעֵרָה
  chosen: heated
  alternatives:
  - burning
  - aflame
  - kindled
  lexicon: HALOT
  rationale: The participle describes the oven as hot/ignited. 'Heated' fits the baking
    simile and avoids implying visible flames as the main point. 'Burning' is possible,
    but 'heated' better suits the baker image.
- source_word: מֵאֹפֶה
  chosen: by a baker
  alternatives:
  - from a baker
  lexicon: HALOT
  rationale: The prefixed preposition is best taken here in relation to agency/source
    within the simile. 'By a baker' yields idiomatic English and matches the image
    of an oven prepared by the baker.
- source_word: יִשְׁבּוֹת
  chosen: stops
  alternatives:
  - ceases
  - rests
  lexicon: HALOT
  rationale: The verb means to cease/stop. In context it refers to the baker's pausing
    a particular action, not total inactivity. 'Stops' is clear modern English.
- source_word: מֵעִיר
  chosen: stirring
  alternatives:
  - rousing
  - stoking
  - awakening
  lexicon: HALOT
  rationale: The Hiphil participial/root sense here is difficult, but in the oven/baking
    context it most plausibly refers to stirring up or stoking the fire. 'Stirring'
    is broad enough to preserve the image without over-specifying beyond the Hebrew.
- source_word: מִלּוּשׁ
  chosen: from the kneading
  alternatives:
  - after kneading
  - from kneading
  lexicon: HALOT
  rationale: The preposition marks the starting point of the time span. 'From the
    kneading' preserves the Hebrew sequence more formally than 'after kneading,' while
    remaining intelligible.
- source_word: בָּצֵק
  chosen: the dough
  alternatives:
  - dough
  lexicon: HALOT
  rationale: The noun refers to dough prepared for baking. The article is supplied
    idiomatically in English because a specific batch is in view in the simile.
- source_word: עַד
  chosen: until
  alternatives:
  - up to the point of
  lexicon: HALOT
  rationale: Standard temporal marker introducing the endpoint of the process.
- source_word: חֻמְצָתוֹ
  chosen: its leavening
  alternatives:
  - its rising
  - its fermentation
  lexicon: HALOT
  rationale: The noun derives from a root associated with fermentation/leavening.
    'Its leavening' stays close to the Hebrew process and avoids prematurely choosing
    the more interpretive 'rising,' though that is a viable contextual gloss.
