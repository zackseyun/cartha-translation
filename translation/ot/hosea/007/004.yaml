theological_decisions:
- issue: Whether 'adulterers' should be expanded to explicitly include spiritual/covenantal
    adultery
  chosen_reading: Retain 'adulterers' in the main text without expansion
  alternative_readings:
  - adulterers (with implied covenant unfaithfulness)
  - adulterous people
  rationale: Hosea often uses adultery imagery for covenant infidelity, but the verse
    itself uses the plain lexical term. To preserve theological tension and avoid
    importing interpretation into the translation, the main text keeps the concrete
    term while allowing readers to infer the prophetic metaphor from context.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
