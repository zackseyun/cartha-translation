theological_decisions:
- issue: Metaphorical subject and agency in the oven image
  chosen_reading: The verse depicts the conspirators' heart as oven-like, with 'their
    baker' continuing the metaphor for the one tending or inciting their passion/plot.
  alternative_readings:
  - The subject may be the conspirators themselves approaching the king with hearts
    hot as an oven
  - Some construe the line differently due to the difficulty of the Hebrew syntax
  rationale: The Hebrew is syntactically compressed and metaphorical, but no doctrinal
    issue is at stake. The chosen rendering preserves the imagery without forcing
    a more specific interpretation than the text warrants.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve
    it
