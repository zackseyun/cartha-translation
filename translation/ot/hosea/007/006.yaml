id: HOS.7.6
reference: Hosea 7:6
source:
  edition: WLC
  text: כִּֽי קֵרְב֧וּ כַ/תַּנּ֛וּר לִבָּ֖/ם בְּ/אָרְבָּ֑/ם כָּל הַ/לַּ֨יְלָה֙ יָשֵׁ֣ן
    אֹֽפֵ/הֶ֔ם בֹּ֕קֶר ה֥וּא בֹעֵ֖ר כְּ/אֵ֥שׁ לֶהָבָֽה־־׃
translation:
  text: For they draw near with their heart like an oven in their lying in wait; all
    night their baker sleeps, but in the morning it burns like a flaming fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in their ambush' or 'while they lie in wait.' The Hebrew phrase carries
      the sense of plotting or lurking for an attack.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'their baker.' Within the extended oven metaphor, this likely refers
      figuratively to the one tending or stirring up their heated plot.
    reason: cultural_note
lexical_decisions:
- source_word: קֵרְבוּ
  chosen: draw near
  alternatives:
  - come near
  - approach
  lexicon: HALOT
  rationale: Qal perfect 3cp of קרב, here describing the conspirators' inward movement
    toward action. 'Draw near' preserves the verbal imagery and avoids overinterpreting
    the object of approach.
- source_word: כַתַּנּוּר
  chosen: like an oven
  alternatives:
  - as an oven
  lexicon: HALOT
  rationale: The simile is explicit with כ. 'Oven' preserves the recurring metaphor
    in this context of heated passion and conspiracy.
- source_word: לִבָּם
  chosen: their heart
  alternatives:
  - their hearts
  lexicon: HALOT
  rationale: Hebrew singular collective with 3mp suffix. English singular 'their heart'
    best reflects the Hebrew form while still functioning collectively.
- source_word: בְּאָרְבָּם
  chosen: in their lying in wait
  alternatives:
  - in their ambush
  - while they lie in wait
  lexicon: HALOT
  rationale: From ארב, denoting ambush or lurking. The prepositional phrase is rendered
    verbally enough for natural English while preserving the conspiratorial sense.
- source_word: יָשֵׁן
  chosen: sleeps
  alternatives:
  - is asleep
  - lies sleeping
  lexicon: HALOT
  rationale: Predicate adjective/participle-like usage rendered as a finite English
    verb for readability.
- source_word: אֹפֵהֶם
  chosen: their baker
  alternatives:
  - the one who bakes for them
  lexicon: HALOT
  rationale: 'Literally ''their baker.'' Retains the oven metaphor: the one tending
    the fire temporarily rests before the blaze flares again.'
- source_word: בֹעֵר
  chosen: burns
  alternatives:
  - blazes
  - is kindled
  lexicon: HALOT
  rationale: Active participle of בער. 'Burns' is straightforward and lets the following
    simile 'like a flaming fire' intensify the image.
- source_word: כְאֵשׁ לֶהָבָה
  chosen: like a flaming fire
  alternatives:
  - like a blaze of fire
  - like fire in flame
  lexicon: HALOT
  rationale: The phrase intensifies the oven metaphor. 'Flaming fire' is idiomatic
    English that preserves the doubled imagery of fire and flame.
