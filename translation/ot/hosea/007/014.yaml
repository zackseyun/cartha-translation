theological_decisions:
- issue: Interpretation of יִתְגֹּרָרוּ
  chosen_reading: a reflexive act of self-laceration connected with appeals for agricultural
    blessing
  alternative_readings:
  - they gather themselves for grain and new wine
  - they assemble themselves over grain and new wine
  rationale: The Hebrew verb is notoriously difficult. Given Hosea's polemic against
    insincere and idolatrous religious behavior, the reading of ritual self-gashing
    coheres well with the context and explains the contrast between true crying to
    God and merely performative lament. Because the alternative 'assemble themselves'
    has significant support, it is preserved in a footnote rather than erased.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
