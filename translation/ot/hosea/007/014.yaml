id: HOS.7.14
reference: Hosea 7:14
source:
  edition: WLC
  text: וְ/לֹֽא זָעֲק֤וּ אֵלַ/י֙ בְּ/לִבָּ֔/ם כִּ֥י יְיֵלִ֖ילוּ עַל מִשְׁכְּבוֹתָ֑/ם
    עַל דָּגָ֧ן וְ/תִיר֛וֹשׁ יִתְגּוֹרָ֖רוּ יָס֥וּרוּ בִֽ/י־־־׃
translation:
  text: They do not cry out to me from their heart, but they wail on their beds; for
    grain and new wine they gash themselves; they turn away from me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they gather themselves for grain and new wine.' The Hebrew verb here
      is difficult and may refer either to assembling themselves or to gashing/cutting
      themselves in ritual lament.
    reason: alternative_reading
lexical_decisions:
- source_word: זָעֲקוּ
  chosen: cry out
  alternatives:
  - call
  - cry
  lexicon: HALOT
  rationale: זעק commonly denotes a strong cry for help or distress. 'Cry out' preserves
    the intensity and the implied appeal better than the flatter 'call.'
- source_word: אֵלַי בְּלִבָּם
  chosen: to me from their heart
  alternatives:
  - to me with their heart
  - to me sincerely
  lexicon: HALOT
  rationale: The phrase contrasts outward lament with inward sincerity. 'From their
    heart' is idiomatic English that preserves the Hebrew sense of genuine inner disposition
    without over-paraphrasing.
- source_word: כִּי
  chosen: but
  alternatives:
  - for
  - rather
  lexicon: HALOT
  rationale: 'Although כִּי often means ''for,'' here it introduces a contrast explaining
    the previous clause: they do not truly cry to God; instead they merely wail. ''But''
    brings out the adversative force in context.'
- source_word: יְיֵלִילוּ
  chosen: they wail
  alternatives:
  - they howl
  - they lament
  lexicon: HALOT
  rationale: The verb ילל often refers to loud lamentation or howling. 'Wail' is natural
    modern English and conveys grief-noise without the potentially animalistic overtones
    of 'howl,' though that remains a viable alternative.
- source_word: עַל מִשְׁכְּבוֹתָם
  chosen: on their beds
  alternatives:
  - upon their beds
  lexicon: HALOT
  rationale: A straightforward locative phrase. 'On their beds' is idiomatic and preserves
    the image of private, self-focused lament.
- source_word: דָּגָן וְתִירוֹשׁ
  chosen: grain and new wine
  alternatives:
  - grain and wine
  - corn and wine
  lexicon: HALOT
  rationale: דגן is 'grain,' and תירוש commonly refers to fresh wine/new wine rather
    than wine in general. 'New wine' preserves the agricultural and fertility context
    of Hosea.
- source_word: יִתְגֹּרָרוּ
  chosen: they gash themselves
  alternatives:
  - they gather themselves
  - they assemble themselves
  - they cut themselves
  lexicon: HALOT
  rationale: The form is difficult and has been understood in different ways. In context
    with paganized mourning/fertility rites and the parallel concern for grain and
    wine, 'gash themselves' best fits the likely reflexive sense of self-laceration.
    This also aligns with ancient versions and common scholarly interpretation, while
    preserving the verse's critique of ritualized distress.
- source_word: יָסוּרוּ בִי
  chosen: they turn away from me
  alternatives:
  - they rebel against me
  - they depart from me
  lexicon: HALOT
  rationale: סור with ב can express turning aside or away in relation to someone.
    'Turn away from me' captures covenantal defection in clear English without importing
    a stronger interpretive gloss than the Hebrew requires.
