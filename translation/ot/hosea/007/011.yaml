theological_decisions:
- issue: Referent of Ephraim
  chosen_reading: Ephraim is retained as the named entity, implicitly representing
    the northern kingdom.
  alternative_readings:
  - Israel
  - the northern kingdom
  rationale: The verse addresses Ephraim in Hosea's prophetic idiom. Retaining the
    proper name avoids interpretive overreach in the main text while allowing readers
    to recognize the corporate referent from context.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    original-language primacy over translation tradition.'
