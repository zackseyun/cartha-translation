id: HOS.7.11
reference: Hosea 7:11
source:
  edition: WLC
  text: וַ/יְהִ֣י אֶפְרַ֔יִם כְּ/יוֹנָ֥ה פוֹתָ֖ה אֵ֣ין לֵ֑ב מִצְרַ֥יִם קָרָ֖אוּ אַשּׁ֥וּר
    הָלָֽכוּ׃
translation:
  text: Ephraim has become like a silly dove, without sense; they call to Egypt, they
    go to Assyria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'without heart,' an idiom meaning without understanding or sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  chosen: has become
  alternatives:
  - became
  - is become
  lexicon: HALOT
  rationale: The waw-consecutive with היה introduces a resultant state. 'Has become'
    communicates the present relevance of Ephraim's condition in natural English better
    than a simple past while remaining close to the Hebrew.
- source_word: אֶפְרַיִם
  chosen: Ephraim
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The proper name is transliterated per translation philosophy. In Hosea
    it often stands metonymically for the northern kingdom, but the text names Ephraim
    explicitly, so the transliteration is retained rather than interpreting it as
    'Israel' in the main text.
- source_word: כְּיוֹנָה
  chosen: like a dove
  alternatives:
  - like a pigeon
  lexicon: HALOT
  rationale: '''Dove'' is the standard and natural rendering for יוֹנָה in biblical
    English and fits the simile''s imagery.'
- source_word: פוֹתָה
  chosen: silly
  alternatives:
  - simple
  - naive
  - easily deceived
  lexicon: HALOT
  rationale: The adjective conveys gullibility or simplicity. 'Silly' captures the
    prophetic tone of foolish, undiscerning behavior in idiomatic modern English without
    excessive paraphrase.
- source_word: אֵין לֵב
  chosen: without sense
  alternatives:
  - without heart
  - without understanding
  - senseless
  lexicon: HALOT
  rationale: Literally 'there is no heart.' In Hebrew לב commonly denotes understanding
    or judgment, not merely emotion. 'Without sense' expresses the idiomatic meaning
    clearly in English while preserving the accusation of lack of discernment.
- source_word: מִצְרַיִם
  chosen: Egypt
  lexicon: HALOT
  rationale: Standard transliteration of the place name.
- source_word: קָרָאוּ
  chosen: they call to
  alternatives:
  - they call upon
  - they cry out to
  - they summon
  lexicon: HALOT
  rationale: The verb קרא here refers to appealing to or seeking help from Egypt.
    'Call to' is concise and close to the Hebrew; 'call upon' would also fit but can
    sound more overtly religious in English.
- source_word: אַשּׁוּר
  chosen: Assyria
  alternatives:
  - Asshur
  lexicon: HALOT
  rationale: Although the Hebrew form is Asshur, in this geopolitical context standard
    English usage is 'Assyria,' which is clearer for modern readers.
- source_word: הָלָכוּ
  chosen: they go
  alternatives:
  - they have gone
  - they walk
  lexicon: HALOT
  rationale: The verb denotes movement toward Assyria, likely in diplomatic pursuit.
    Present tense in English matches the vivid prophetic description of Ephraim's
    habitual conduct.
