id: HOS.7.5
reference: Hosea 7:5
source:
  edition: WLC
  text: י֣וֹם מַלְכֵּ֔/נוּ הֶחֱל֥וּ שָׂרִ֖ים חֲמַ֣ת מִ/יָּ֑יִן מָשַׁ֥ךְ יָד֖/וֹ אֶת
    לֹצְצִֽים־׃
translation:
  text: On the day of our king, the princes made themselves sick with the heat of
    wine; he stretched out his hand with mockers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'On our king's day'; some understand this as a royal feast day, but 'day
      of our king' is the more literal wording.
    reason: lexical_alternative
  - marker: b
    text: '''The heat of wine'' may also be understood as ''wine''s burning'' or,
      less likely, ''the poison of wine.'''
    reason: lexical_alternative
  - marker: c
    text: That is, he associated himself with scoffers by extending his hand to them.
    reason: cultural_note
lexical_decisions:
- source_word: י֣וֹם מַלְכֵּ֔נוּ
  chosen: On the day of our king
  alternatives:
  - On our king's day
  - On the day of our king's feast
  lexicon: HALOT
  rationale: Construct phrase literally means 'day of our king.' The preposition 'on'
    is supplied naturally in English. A more interpretive expansion such as 'feast
    day' is possible from context but is not explicit in the Hebrew, so the more restrained
    rendering is preferred.
- source_word: הֶחֱל֥וּ
  chosen: made themselves sick
  alternatives:
  - became sick
  - grew weak
  - began
  lexicon: HALOT
  rationale: 'From חלה in the Hiphil, here best taken causatively/reflexively in context:
    the princes rendered themselves ill. Some have proposed a sense related to ''began,''
    but the sickness/weakness sense fits the immediate imagery of drunken excess and
    the following phrase about wine.'
- source_word: שָׂרִ֖ים
  chosen: the princes
  alternatives:
  - officials
  - leaders
  lexicon: HALOT
  rationale: שרים commonly denotes princes, rulers, or officials. 'Princes' preserves
    the courtly setting and matches the royal context of the verse.
- source_word: חֲמַ֣ת מִיָּ֑יִן
  chosen: with the heat of wine
  alternatives:
  - with wine's burning
  - from the heat of wine
  - with the poison of wine
  lexicon: HALOT
  rationale: חמה can denote heat, burning wrath, or venom/poison. In this context
    of intoxication at court, 'heat of wine' preserves the vivid metaphor without
    overinterpreting it as literal poison or shifting it to wrath.
- source_word: מָשַׁ֥ךְ יָד֖וֹ
  chosen: he stretched out his hand
  alternatives:
  - he extended his hand
  - he joined hands
  lexicon: HALOT
  rationale: The idiom literally means 'drew/stretched his hand.' In context it likely
    signals association or fellowship with the following group, but the more literal
    'stretched out his hand' preserves the Hebrew image while allowing the reader
    to infer the social gesture.
- source_word: אֶת לֹצְצִֽים
  chosen: with mockers
  alternatives:
  - to mockers
  - toward scoffers
  - with scoffers
  lexicon: HALOT
  rationale: לצצים are mockers/scoffers. Although את is not the usual preposition
    for 'with,' in this idiom after 'stretch out the hand' it marks the party with
    whom one joins or associates. 'With mockers' best conveys the sense in idiomatic
    English.
