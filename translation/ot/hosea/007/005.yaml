theological_decisions:
- issue: Identification of the subject in 'he stretched out his hand'
  chosen_reading: The singular subject is left as 'he,' most naturally referring to
    the king in the scene.
  alternative_readings:
  - The subject could be understood more generally or impersonally from the courtly
    setting.
  - Some interpreters relate the action to the princes collectively by sense rather
    than strict grammar.
  rationale: The Hebrew verb is singular, so the translation preserves that number
    with 'he.' Given the preceding reference to 'our king,' the king is the most natural
    antecedent, but the text does not explicitly restate the subject, so the translation
    avoids over-specification.
