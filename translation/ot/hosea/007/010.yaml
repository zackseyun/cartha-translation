id: HOS.7.10
reference: Hosea 7:10
source:
  edition: WLC
  text: וְ/עָנָ֥ה גְאֽוֹן יִשְׂרָאֵ֖ל בְּ/פָנָ֑י/ו וְ/לֹֽא שָׁ֨בוּ֙ אֶל יְהוָ֣ה אֱלֹֽהֵי/הֶ֔ם
    וְ/לֹ֥א בִקְשֻׁ֖/הוּ בְּ/כָל זֹֽאת־־־־׃
translation:
  text: The pride of Israel testifies against him, yet they do not return to the LORD
    their God, nor do they seek him in all this.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to his face' or 'before him'; the Hebrew literally reads 'in/against
      his face.'
    reason: lexical_alternative
  - marker: b
    text: Or 'despite all this.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָנָה
  chosen: testifies
  alternatives:
  - answers
  - is humbled
  - bears witness
  lexicon: HALOT
  rationale: In this idiom with גאון ישראל and בפניו, the verb is best taken in the
    sense of giving testimony or bearing witness against someone. 'Testifies' fits
    the prophetic accusation context better than the more wooden 'answers.'
- source_word: גְּאוֹן יִשְׂרָאֵל
  chosen: the pride of Israel
  alternatives:
  - Israel's pride
  - the majesty of Israel
  lexicon: HALOT
  rationale: גאון can denote pride, exaltation, or majesty. In Hosea's rebuking context
    it carries a negative sense, so 'the pride of Israel' is preferable to 'majesty.'
- source_word: בְּפָנָיו
  chosen: against him
  alternatives:
  - to his face
  - before him
  lexicon: HALOT
  rationale: Literally 'in/against his face.' In English, with the forensic sense
    of ענה, 'against him' communicates the adversative testimony idiom naturally.
    The singular suffix is retained as singular rather than shifted to plural.
- source_word: שָׁבוּ אֶל
  chosen: return to
  alternatives:
  - turn back to
  lexicon: HALOT
  rationale: שוב with אל commonly denotes repentance or returning to covenant relationship.
    'Return to' is both idiomatic and theologically appropriate without over-paraphrasing.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: אֱלֹהֵיהֶם
  chosen: their God
  lexicon: HALOT
  rationale: Straightforward covenantal designation; preserving the possessive highlights
    the irony that they refuse to return to the God who is theirs.
- source_word: בִּקְשֻׁהוּ
  chosen: seek him
  alternatives:
  - inquire of him
  - seek after him
  lexicon: HALOT
  rationale: בקש in this context refers to seeking God relationally or in supplication.
    'Seek him' is the most natural and sufficiently broad rendering.
- source_word: בְּכָל זֹאת
  chosen: in all this
  alternatives:
  - despite all this
  - with all this
  lexicon: HALOT
  rationale: The phrase points to the totality of the preceding judgments/circumstances.
    'In all this' is a close rendering; 'despite all this' is interpretive but worth
    preserving as a footnote alternative because it captures the concessive force
    many readers hear in context.
