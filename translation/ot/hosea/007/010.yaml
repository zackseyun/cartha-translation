theological_decisions:
- issue: Referent of the singular suffix in 'before/against him'
  chosen_reading: singular 'him' retained in English
  alternative_readings:
  - pluralized to 'them' for corporate sense
  - understood as 'before him' referring to Israel collectively
  rationale: The Hebrew suffix is singular. Retaining 'him' preserves the grammatical
    form while allowing the collective singular 'Israel' to stand as the referent.
    This avoids smoothing away the text's number shift.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
