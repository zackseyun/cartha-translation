id: HOS.7.9
reference: Hosea 7:9
source:
  edition: WLC
  text: אָכְל֤וּ זָרִים֙ כֹּח֔/וֹ וְ/ה֖וּא לֹ֣א יָדָ֑ע גַּם שֵׂיבָה֙ זָ֣רְקָה בּ֔/וֹ
    וְ/ה֖וּא לֹ֥א יָדָֽע־׃
translation:
  text: Strangers have devoured his strength, but he does not know it; even gray hair
    is sprinkled on him, but he does not know it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Foreigners have consumed his strength.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'gray hair has been sprinkled on him,' an image of decline and
      aging.
    reason: cultural_note
lexical_decisions:
- source_word: אָכְלוּ
  chosen: have devoured
  alternatives:
  - have eaten
  - consume
  lexicon: HALOT
  rationale: Qal perfect 3cp of אכל, used metaphorically for consuming resources or
    strength. 'Have devoured' preserves the vivid metaphor better than the flatter
    'have eaten' while remaining natural English.
- source_word: זָרִים
  chosen: Strangers
  alternatives:
  - foreigners
  - aliens
  lexicon: HALOT
  rationale: Refers to outsiders/foreign powers rather than merely unknown individuals.
    'Strangers' is idiomatic and preserves the prophetic sense of foreign others exploiting
    Israel; 'foreigners' is a viable alternative.
- source_word: כֹּחוֹ
  chosen: his strength
  alternatives:
  - his power
  - his vigor
  lexicon: HALOT
  rationale: כֹּחַ commonly denotes strength, power, or capacity. In context of national
    depletion, 'strength' best captures lost vitality without over-specifying military
    power alone.
- source_word: וְהוּא לֹא יָדָע
  chosen: but he does not know it
  alternatives:
  - and he does not know
  - yet he does not perceive it
  lexicon: HALOT
  rationale: The clause is repeated for emphasis. 'But' brings out the adversative
    force in English discourse, and 'know it' naturally supplies the implied object
    from context.
- source_word: גַּם
  chosen: even
  alternatives:
  - also
  - indeed
  lexicon: HALOT
  rationale: 'Here גַּם intensifies the second image: not only is strength consumed,
    but even signs of aging are present. ''Even'' best conveys that escalation.'
- source_word: שֵׂיבָה
  chosen: gray hair
  alternatives:
  - gray hairs
  - old age
  lexicon: HALOT
  rationale: Literally gray hair/hoariness, often a sign of aging. 'Gray hair' preserves
    the concrete metaphor better than the abstract 'old age.'
- source_word: זָרְקָה
  chosen: is sprinkled
  alternatives:
  - has been scattered
  - is strewn
  lexicon: HALOT
  rationale: The verb conveys scattering/sprinkling. With gray hair as subject, 'is
    sprinkled' gives the idiomatic sense of gray hairs appearing here and there.
- source_word: בּוֹ
  chosen: on him
  alternatives:
  - upon him
  - in him
  lexicon: HALOT
  rationale: With the image of gray hair appearing on a person, 'on him' is the most
    natural English rendering.
