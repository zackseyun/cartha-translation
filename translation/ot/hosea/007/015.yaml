theological_decisions:
- issue: Nature of God's prior action toward Israel in יִסַּרְתִּי
  chosen_reading: beneficent formative action ('I trained') rather than punitive chastisement
    in the main text
  alternative_readings:
  - I disciplined them
  - I chastened them
  rationale: The immediate parallel 'I strengthened their arms' favors a positive,
    equipping sense rather than punishment. This avoids importing a harsher nuance
    not demanded by the context while preserving the semantic range in documentation.
  doctrine_reference: Translation philosophy §1, §3, §5
