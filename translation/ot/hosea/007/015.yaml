id: HOS.7.15
reference: Hosea 7:15
source:
  edition: WLC
  text: וַ/אֲנִ֣י יִסַּ֔רְתִּי חִזַּ֖קְתִּי זְרֽוֹעֹתָ֑/ם וְ/אֵלַ֖/י יְחַשְּׁבוּ רָֽע־׃
translation:
  text: Though I trained and strengthened their arms, yet they devise evil against
    me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I disciplined' or 'I chastened'; the Hebrew verb can carry either corrective
      or formative force.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִסַּרְתִּי
  chosen: I trained
  alternatives:
  - I disciplined
  - I instructed
  - I chastened
  lexicon: HALOT
  rationale: 'The verb יסר can mean discipline, chasten, instruct, or train. In parallel
    with ''I strengthened their arms,'' a formative sense fits best: God equipped
    them rather than merely punished them. ''Trained'' preserves the bodily/martial
    nuance suggested by ''arms'' while remaining natural English.'
- source_word: חִזַּקְתִּי
  chosen: strengthened
  alternatives:
  - made strong
  - fortified
  lexicon: HALOT
  rationale: The piel of חזק commonly means to strengthen or make strong. 'Strengthened'
    is the most direct and idiomatic rendering here.
- source_word: זְרֹעוֹתָם
  chosen: their arms
  alternatives:
  - their strength
  lexicon: HALOT
  rationale: Literally 'their arms.' While 'arm' can metaphorically denote strength,
    the concrete image works well in English and matches the parallel with training.
    Retaining 'arms' preserves the vivid bodily metaphor.
- source_word: וְאֵלַי
  chosen: against me
  alternatives:
  - toward me
  - concerning me
  - to me
  lexicon: HALOT
  rationale: Literally 'and toward me/to me,' but with חשב רע the sense is hostile
    intent directed at God. English idiom requires 'against me' to convey the adversative
    force.
- source_word: יְחַשְּׁבוּ רָע
  chosen: they devise evil
  alternatives:
  - they plan evil
  - they think evil
  - they plot harm
  lexicon: HALOT
  rationale: חשב with רע conveys planning or devising evil, not merely thinking abstractly.
    'Devise evil' is concise, faithful, and preserves the moral weight of רע.
- source_word: וַאֲנִי
  chosen: Though I
  alternatives:
  - And I
  - Yet I
  - But I
  lexicon: HALOT
  rationale: 'The conjunction plus pronoun marks contrast with Israel''s response.
    Rendering it as ''Though I'' brings out the concessive force in context: despite
    God''s beneficence, they respond with evil.'
