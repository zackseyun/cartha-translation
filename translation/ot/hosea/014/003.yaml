id: HOS.14.3
reference: Hosea 14:3
source:
  edition: WLC
  text: קְח֤וּ עִמָּ/כֶם֙ דְּבָרִ֔ים וְ/שׁ֖וּבוּ אֶל יְהוָ֑ה אִמְר֣וּ אֵלָ֗י/ו כָּל תִּשָּׂ֤א עָוֺן֙ וְ/קַח ט֔וֹב וּֽ/נְשַׁלְּמָ֥ה פָרִ֖ים שְׂפָתֵֽי/נוּ־־־׃
translation:
  text: Take words with you and return to Yahweh. Say to him, “Take away all iniquity and receive what is good, and we will repay with the fruit of our lips.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “forgive all guilt” for “take away all iniquity”; the Hebrew idiom literally speaks of bearing away guilt.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “the bulls of our lips,” a metaphor for spoken praise, confession, or vows offered in place of animal sacrifice. Some ancient witnesses and interpreters understand this as “the fruit of our lips.”
    reason: alternative_reading
lexical_decisions:
- source_word: קְחוּ
  chosen: Take
  alternatives:
  - Bring
  lexicon: HALOT
  rationale: Imperative plural of לקח, here naturally rendered 'Take' in the sense of taking along with oneself. 'Bring' is possible in English but 'take ... with you' best matches the Hebrew construction with עִמָּכֶם.
- source_word: עִמָּכֶם
  chosen: with you
  lexicon: HALOT
  rationale: Preposition עם with 2mp suffix; straightforwardly indicates accompaniment.
- source_word: דְּבָרִים
  chosen: words
  alternatives:
  - pleas
  - confession
  lexicon: HALOT
  rationale: The noun literally means 'words.' In context these are words of repentance/prayer, but the literal rendering preserves the prophet's wording without over-interpreting.
- source_word: וְשׁוּבוּ
  chosen: and return
  alternatives:
  - and turn back
  lexicon: HALOT
  rationale: שׁוב commonly carries covenantal repentance language. 'Return' preserves both the literal motion metaphor and the theological sense of repentance.
- source_word: אֶל יְהוָה
  chosen: to the LORD
  alternatives:
  - to Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' The preposition אֶל is naturally 'to' in this context.
- source_word: אִמְרוּ אֵלָיו
  chosen: Say to him
  alternatives:
  - Speak to him
  lexicon: HALOT
  rationale: Simple imperative plus prepositional phrase; 'say to him' is idiomatic and direct.
- source_word: כָּל תִּשָּׂא עָוֺן
  chosen: Take away all iniquity
  alternatives:
  - Forgive all guilt
  - Bear away all sin
  lexicon: HALOT
  rationale: נשא עון is an idiom meaning to bear away, carry off, or forgive iniquity. 'Take away all iniquity' preserves the verbal imagery while clearly conveying forgiveness. 'Iniquity' keeps the moral weight of עָוֺן.
- source_word: וְקַח טוֹב
  chosen: and receive what is good
  alternatives:
  - and accept good
  - and take what is good
  lexicon: HALOT
  rationale: 'The imperative קח with טוב is elliptical and debated. ''Receive what is good'' fits the prayer context: the repentant ask God to accept what is good from them. This avoids importing an object not explicit in the Hebrew while making coherent sense in English.'
- source_word: וּנְשַׁלְּמָה
  chosen: and we will repay
  alternatives:
  - and we will render
  - and we will pay
  lexicon: HALOT
  rationale: Piel cohortative/volitive of שלם conveys rendering or repaying. 'We will repay' keeps the sacrificial-votive nuance without paraphrase.
- source_word: פָרִים שְׂפָתֵינוּ
  chosen: with the bulls of our lips
  alternatives:
  - the fruit of our lips
  - bulls, that is, our lips
  lexicon: HALOT
  rationale: The MT reads 'bulls of our lips,' a vivid metaphor comparing spoken praise/repentance to sacrificial offerings. The literal rendering preserves the Hebrew image. Because many readers know the interpretive rendering 'fruit of our lips' (influenced by ancient versions and Hebrews 13:15), that alternative is preserved in a footnote rather than adopted in the main text.
