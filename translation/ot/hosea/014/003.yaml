theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Repentance language in שׁוּבוּ
  chosen_reading: return
  alternative_readings:
  - turn back
  rationale: The verse summons covenant repentance. 'Return' preserves the theological tension of both physical metaphor and spiritual repentance without narrowing the sense.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
- issue: Metaphorical sacrificial language in פָרִים שְׂפָתֵינוּ
  chosen_reading: the bulls of our lips
  alternative_readings:
  - the fruit of our lips
  rationale: The Masoretic wording is retained in the main text to preserve the sacrificial metaphor. A more interpretive alternative is footnoted because it has historical support and may aid readers, but the main text should not flatten the Hebrew image.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
