id: HOS.14.2
reference: Hosea 14:2
source:
  edition: WLC
  text: שׁ֚וּבָ/ה יִשְׂרָאֵ֔ל עַ֖ד יְהוָ֣ה אֱלֹהֶ֑י/ךָ כִּ֥י כָשַׁ֖לְתָּ בַּ/עֲוֺנֶֽ/ךָ׃
translation:
  text: Return, O Israel, to Yahweh your God, for you have stumbled in your iniquity.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of your iniquity.' The Hebrew preposition can express cause as well as the sphere in which Israel has stumbled.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּבָה
  chosen: Return
  alternatives:
  - Turn back
  - Repent
  lexicon: HALOT
  rationale: Imperative of שוב, commonly meaning 'return/turn back.' 'Return' preserves the directional covenantal sense toward God without narrowing it to the more interpretive 'repent,' though repentance is implied in context.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name; transliterated per translation philosophy.
- source_word: עַד
  chosen: to
  alternatives:
  - unto
  - back to
  lexicon: HALOT
  rationale: With verbs of turning, עד can mark movement toward a goal. 'To' is idiomatic modern English and fits the covenant summons. 'Unto' is archaic; 'back to' is interpretive, since the sense of return is already carried by שוב.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name YHWH.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  lexicon: HALOT
  rationale: 'Construct form with 2ms suffix, directly appositional to YHWH: ''the LORD your God.'' This preserves covenantal relationship language.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the call to return. 'For' is concise and natural in English.
- source_word: כָשַׁלְתָּ
  chosen: have stumbled
  alternatives:
  - have fallen
  - have tottered
  lexicon: HALOT
  rationale: כשל often denotes stumbling or faltering. 'Have stumbled' preserves the metaphor and avoids over-specifying total collapse implied by 'fallen,' while still conveying moral failure.
- source_word: בַּעֲוֺנֶךָ
  chosen: in your iniquity
  alternatives:
  - because of your iniquity
  - through your guilt
  - in your guilt
  lexicon: HALOT
  rationale: The preposition ב can be rendered instrumentally or locatively-like in such contexts. 'In your iniquity' is a close rendering that preserves the Hebrew compactness and the idea that Israel's sin is the sphere/cause of its stumbling. 'Because of your iniquity' is a plausible interpretive alternative preserved in a footnote.
