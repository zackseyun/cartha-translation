theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render שוב as 'return' or the more interpretive 'repent'
  chosen_reading: Return
  alternative_readings:
  - Repent
  - Turn back
  rationale: The Hebrew verb fundamentally denotes turning/returning. In prophetic covenant contexts it carries repentance, but 'Return' better preserves the source image and theological breadth without importing a narrower doctrinal formulation.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
