theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Generic masculine rhetoric in the opening questions
  chosen_reading: Who is wise? Let him understand... Who is discerning? Let him know...
  alternative_readings:
  - Who is wise? Let that person understand...
  - Whoever is wise, let them understand...
  rationale: The Hebrew uses grammatically masculine singular forms in a representative/generic way. Per doctrine, gender-accurate rendering is preferred over flattening to gender-neutral language. The English keeps the singular rhetorical form while remaining idiomatic.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Moral description of יְשָׁרִים דַּרְכֵי יְהוָה
  chosen_reading: the ways of Yahweh are straight
  alternative_readings:
  - the ways of the LORD are right
  - the ways of the LORD are upright
  rationale: 'The verse is built on path imagery: ways, walking, stumbling. ''Straight'' preserves both the moral and metaphorical force better than alternatives that weaken the travel/path contrast.'
