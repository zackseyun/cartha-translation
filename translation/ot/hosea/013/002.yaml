id: HOS.13.2
reference: Hosea 13:2
source:
  edition: WLC
  text: וְ/עַתָּ֣ה יוֹסִ֣פוּ לַ/חֲטֹ֗א וַ/יַּעְשׂ֣וּ לָ/הֶם֩ מַסֵּכָ֨ה מִ/כַּסְפָּ֤/ם
    כִּ/תְבוּנָ/ם֙ עֲצַבִּ֔ים מַעֲשֵׂ֥ה חָרָשִׁ֖ים כֻּלֹּ֑/ה לָ/הֶם֙ הֵ֣ם אֹמְרִ֔ים
    זֹבְחֵ֣י אָדָ֔ם עֲגָלִ֖ים יִשָּׁקֽוּ/ן׀׃
translation:
  text: And now they continue to sin and make for themselves cast images from their
    silver, idols according to their own understanding, all of it the work of craftsmen.
    Of them they say, ‘Let the men who sacrifice kiss calves!’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'those who sacrifice humans kiss calves,' taking 'human' as the object
      of 'sacrifice' rather than as a generic reference to the sacrificers.
    reason: alternative_reading
  - marker: b
    text: That is, calf-idols, likely referring to the cult images associated with
      Bethel and Samaria.
    reason: cultural_note
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Temporal/discourse marker introducing the present continuation of Israel's
    sin; 'And now' preserves the connective force of ו plus עתה.
- source_word: יוֹסִפוּ לַחֲטֹא
  chosen: they continue to sin
  alternatives:
  - they add to sin
  - they keep on sinning
  lexicon: HALOT
  rationale: יסף + infinitive expresses continuation or increase. 'Continue to sin'
    is idiomatic modern English while retaining the sense of ongoing addition to prior
    sin.
- source_word: וַיַּעֲשׂוּ לָהֶם מַסֵּכָה
  chosen: and make for themselves cast images
  alternatives:
  - and made for themselves a molten image
  - and make for themselves an idol of cast metal
  lexicon: HALOT
  rationale: מַסֵּכָה denotes a cast-metal image/idol. The singular may function collectively
    in context, but English plural 'cast images' fits the following plural appositive
    עֲצַבִּים and the general description of idol manufacture.
- source_word: מִכַּסְפָּם
  chosen: from their silver
  alternatives:
  - with their silver
  - out of their silver
  lexicon: HALOT
  rationale: מן marks material/source. 'From their silver' preserves the idea that
    the idols are fashioned out of their own wealth.
- source_word: כִּתְבוּנָם
  chosen: according to their own understanding
  alternatives:
  - by their skill
  - according to their insight
  lexicon: HALOT
  rationale: תבונה can denote understanding/skill. Here it likely points ironically
    to human devising rather than true wisdom, so 'according to their own understanding'
    best preserves the polemical force.
- source_word: עֲצַבִּים
  chosen: idols
  alternatives:
  - images
  lexicon: HALOT
  rationale: Common prophetic term for idols; using 'idols' makes explicit the religious
    referent already implied by מַסֵּכָה.
- source_word: מַעֲשֵׂה חָרָשִׁים כֻּלֹּה
  chosen: all of it the work of craftsmen
  alternatives:
  - all of them are the work of artisans
  - the whole thing is a craftsman's work
  lexicon: HALOT
  rationale: Emphasizes the merely human manufacture of the idols. 'Craftsmen' is
    natural English and preserves the plural חָרָשִׁים.
- source_word: לָהֶם הֵם אֹמְרִים
  chosen: Of them they say
  alternatives:
  - Concerning them they say
  - To them they say
  lexicon: HALOT
  rationale: The phrase introduces a saying about these idols. 'Of them they say'
    is concise and fits the discourse, though the syntax is difficult.
- source_word: זֹבְחֵי אָדָם
  chosen: the men who sacrifice
  alternatives:
  - those who sacrifice humans
  - human sacrificers
  lexicon: HALOT
  rationale: This phrase is syntactically contested. The main text takes אָדָם generically
    ('man/men'), yielding 'the men who sacrifice,' because the following imperative-like
    statement about kissing calves then addresses idol worshipers. The alternative
    'those who sacrifice humans' is preserved in a footnote because the Hebrew can
    also be read as an objective genitive and the context is strongly condemnatory.
- source_word: אָדָם
  chosen: men
  alternatives:
  - humankind
  - humans
  lexicon: HALOT
  rationale: Per doctrine, אדם is rendered according to context. Here a generic masculine
    plural sense is conveyed in English by 'men' within the idiom 'the men who sacrifice,'
    though the phrase is difficult and footnoted.
- source_word: עֲגָלִים יִשָּׁקוּן
  chosen: kiss calves
  alternatives:
  - kiss calf-idols
  - they kiss calves
  lexicon: HALOT
  rationale: נשק means 'kiss.' The object is literally 'calves,' referring to calf-idols
    in Hosea's polemic against northern cultic worship. The bare 'calves' preserves
    the metaphorical sting; 'idol' can be inferred from context.
