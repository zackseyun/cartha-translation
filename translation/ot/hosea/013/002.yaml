theological_decisions:
- issue: Interpretation of זֹבְחֵי אָדָם עֲגָלִים יִשָּׁקוּן
  chosen_reading: 'The saying addresses idol worshipers: ''Let the men who sacrifice
    kiss calves!'''
  alternative_readings:
  - '''Those who sacrifice humans kiss calves.'''
  - '''Human sacrificers kiss calves.'''
  rationale: The Hebrew is notoriously compressed and ambiguous. The chosen reading
    best fits a taunting or condemnatory quotation about worshipers kissing calf-idols,
    while avoiding importing a direct assertion of human sacrifice unless the syntax
    requires it. Because the alternative reading is longstanding and plausible, it
    is preserved in a footnote rather than suppressed.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity and preserve alternatives in footnote.
