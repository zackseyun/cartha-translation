id: HOS.13.6
reference: Hosea 13:6
source:
  edition: WLC
  text: כְּ/מַרְעִיתָ/ם֙ וַ/יִּשְׂבָּ֔עוּ שָׂבְע֖וּ וַ/יָּ֣רָם לִבָּ֑/ם עַל כֵּ֖ן
    שְׁכֵחֽוּ/נִי־׃
translation:
  text: When they had pasture, they became satisfied; once they were satisfied, their
    heart was lifted up; therefore they forgot me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'According to their pasture' or 'As they were pastured.' The Hebrew
      expression is compact and may describe the circumstance of their abundance.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'their heart was lifted up,' an idiom for becoming proud.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּמַרְעִיתָם
  chosen: When they had pasture
  alternatives:
  - According to their pasture
  - As in their pasture
  - When they were pastured
  lexicon: HALOT
  rationale: The prefixed כ here is best taken in a temporal/circumstantial sense
    in context, introducing the condition under which the following actions occurred.
    מַרְעִית can denote pasture/grazing place. 'When they had pasture' communicates
    the sense naturally in English without over-paraphrasing.
- source_word: וַיִּשְׂבָּעוּ
  chosen: they became satisfied
  alternatives:
  - they were filled
  - they ate their fill
  lexicon: HALOT
  rationale: From שבע, the sense is being sated or filled. 'Became satisfied' fits
    the sequence and avoids implying only physical eating while still preserving the
    result of abundance.
- source_word: שָׂבְעוּ
  chosen: once they were satisfied
  alternatives:
  - they were filled
  - having been satisfied
  lexicon: HALOT
  rationale: The repetition of the same root is rhetorically significant, so the English
    preserves it with a second use of 'satisfied.' Rendering it as a temporal clause
    ('once they were satisfied') reflects the participial/perfect-like force in context
    and keeps the progression clear.
- source_word: וַיָּרָם
  chosen: was lifted up
  alternatives:
  - became exalted
  - grew proud
  - was raised
  lexicon: HALOT
  rationale: From רום, here idiomatically with 'heart' it denotes pride/arrogance.
    'Was lifted up' preserves the Hebrew metaphor more formally, while allowing readers
    to infer pride from the idiom.
- source_word: לִבָּם
  chosen: their heart
  alternatives:
  - their mind
  - their inner self
  lexicon: HALOT
  rationale: '''Heart'' is the standard rendering for לֵב/לֵבָב and preserves the
    Hebrew anthropology rather than reducing it to mere intellect.'
- source_word: עַל כֵּן
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: HALOT
  rationale: This inferential phrase marks consequence. 'Therefore' is concise and
    appropriately weighty.
- source_word: שְׁכֵחוּנִי
  chosen: they forgot me
  alternatives:
  - they neglected me
  - they ceased to remember me
  lexicon: HALOT
  rationale: The direct and covenantal force of שכח with God as object is well represented
    by 'forgot me.' Alternatives like 'neglected' are interpretive and weaker than
    the Hebrew wording.
