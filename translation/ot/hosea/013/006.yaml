theological_decisions:
- issue: Idiomatic expression of pride in 'their heart was lifted up'
  chosen_reading: Preserve the Hebrew metaphor rather than interpret it directly as
    'they became proud.'
  alternative_readings:
  - their heart became proud
  - they grew proud
  rationale: The verse describes the spiritual danger of abundance leading to self-exaltation
    and forgetfulness of God. Preserving 'their heart was lifted up' maintains the
    biblical idiom and theological texture without importing more interpretation than
    necessary.
  doctrine_reference: Translation philosophy §§1, 3, 6
