theological_decisions:
- issue: Interpretation of the difficult opening אֱהִי
  chosen_reading: 'Interrogative taunt: ''Where now is your king...?'','' rather than
    a declarative ''I will be/ I would be your king.'''
  alternative_readings:
  - '''I would be your king, where then...?'''
  - '''I will be your king...'''
  rationale: The immediate context is judgment on Israel's misplaced trust in human
    kingship (cf. the surrounding verses about giving and taking away a king). The
    interrogative reading coheres with the rhetorical challenge and is widely reflected
    in translations and ancient interpretation. Rendering it this way avoids importing
    a positive divine-kingship declaration into a context of rebuke, while preserving
    the verse's irony.
