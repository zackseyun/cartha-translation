id: HOS.13.10
reference: Hosea 13:10
source:
  edition: WLC
  text: אֱהִ֤י מַלְכְּ/ךָ֙ אֵפ֔וֹא וְ/יוֹשִֽׁיעֲ/ךָ֖ בְּ/כָל עָרֶ֑י/ךָ וְ/שֹׁ֣פְטֶ֔י/ךָ
    אֲשֶׁ֣ר אָמַ֔רְתָּ תְּנָ/ה לִּ֖/י מֶ֥לֶךְ וְ/שָׂרִֽים־־׃
translation:
  text: Where now is your king, that he may save you in all your cities, and your
    judges, of whom you said, “Give me a king and princes” ?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely, 'I would be your king; where then is anyone who can save
      you...?' The Hebrew opening is difficult.
    reason: alternative_reading
  - marker: b
    text: '''Princes'' may also be rendered ''officials'' or ''rulers.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱהִי
  chosen: Where now is
  alternatives:
  - I would be
  - Where is
  lexicon: HALOT
  rationale: 'The form is difficult and has been understood either as a first-person
    verb (''I would be'') or, with contextual and ancient-version support, as an interrogative
    expression introducing the taunt, ''Where is...?'' In context, the verse challenges
    Israel''s reliance on monarchy, so the interrogative sense best fits the flow:
    ''Where now is your king...?'' The adverb אֵפוֹא strengthens the interrogative
    force.'
- source_word: מַלְכְּךָ
  chosen: your king
  lexicon: HALOT
  rationale: Straightforward possessive noun; singular is retained to match Israel's
    request for monarchy.
- source_word: אֵפוֹא
  chosen: now
  alternatives:
  - then
  - indeed
  lexicon: HALOT
  rationale: 'Used here as an adverb in an interrogative setting, giving the sense
    ''now/then'' in a rhetorical challenge. ''Now'' is idiomatic in English: ''Where
    now is your king...?'''
- source_word: וְיוֹשִׁיעֲךָ
  chosen: that he may save you
  alternatives:
  - and let him save you
  - and he will save you
  lexicon: HALOT
  rationale: 'The verb is Hiphil of ישׁע, ''save/deliver.'' After the rhetorical question,
    English idiom is best served by a purpose/result nuance: ''Where now is your king,
    that he may save you...?'' This preserves the mocking challenge without over-paraphrase.'
- source_word: בְּכָל עָרֶיךָ
  chosen: in all your cities
  alternatives:
  - throughout all your cities
  lexicon: HALOT
  rationale: ב with 'all your cities' is rendered locatively. 'In all your cities'
    is natural and sufficiently formal.
- source_word: וְשֹׁפְטֶיךָ
  chosen: and your judges
  alternatives:
  - and your rulers
  lexicon: HALOT
  rationale: Though שׁפט can denote governing leaders more broadly, 'judges' is the
    lexical sense and fits the political parallel with king and princes. A broader
    rendering is possible but not necessary.
- source_word: אֲשֶׁר אָמַרְתָּ
  chosen: of whom you said
  alternatives:
  - about whom you said
  - to whom you said
  lexicon: HALOT
  rationale: This relative clause refers back to the king and judges/rulers just mentioned.
    'Of whom you said' is idiomatic and preserves the backward reference.
- source_word: תְּנָה לִּי
  chosen: Give me
  alternatives:
  - Appoint for me
  lexicon: HALOT
  rationale: Imperative of נתן with לִי is naturally 'give me.' 'Appoint for me' captures
    the political sense but is less direct than the Hebrew wording.
- source_word: מֶלֶךְ וְשָׂרִים
  chosen: a king and princes
  alternatives:
  - a king and officials
  - a king and rulers
  lexicon: HALOT
  rationale: מֶלֶךְ is 'king.' שָׂרִים commonly means 'princes, officials, rulers.'
    'Princes' preserves the lexical form and the elevated political register, while
    remaining understandable in modern English.
