theological_decisions:
- issue: Metaphorical referent of the birth imagery
  chosen_reading: Retain the metaphor without explicitly naming Ephraim/Israel in
    the translation.
  alternative_readings:
  - Expand the metaphor interpretively to 'Ephraim is like an unwise son...'
  rationale: The Hebrew uses third-person singular masculine pronouns and son imagery
    without an explicit noun in this verse. The broader context identifies the referent,
    but the verse itself should preserve the metaphor rather than import explanatory
    material into the main text.
  doctrine_reference: Translation philosophy §1, §3
