id: HOS.13.13
reference: Hosea 13:13
source:
  edition: WLC
  text: חֶבְלֵ֥י יֽוֹלֵדָ֖ה יָבֹ֣אוּ ל֑/וֹ הוּא בֵן֙ לֹ֣א חָכָ֔ם כִּֽי עֵ֥ת לֹֽא יַעֲמֹ֖ד
    בְּ/מִשְׁבַּ֥ר בָּנִֽים־־־׃
translation:
  text: The labor pains of a woman giving birth come upon him; he is an unwise son,
    for when the time comes, he does not present himself at the opening of the womb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'birth pains.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'he does not stand at the mishbar of sons,' an idiom for failing
      to come forth at birth; some render 'at the mouth/opening of the womb.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶבְלֵי
  chosen: labor pains
  alternatives:
  - birth pains
  - cords
  lexicon: HALOT
  rationale: In this context with יולדה ('woman giving birth'), the noun refers idiomatically
    to birth/labor pains rather than literal cords. 'Labor pains' is natural modern
    English and preserves the metaphor of impending crisis.
- source_word: יֹלֵדָה
  chosen: a woman giving birth
  alternatives:
  - a woman in labor
  - a mother
  lexicon: HALOT
  rationale: The participial form denotes a woman in the act of giving birth. 'A woman
    giving birth' is slightly more explicit than 'woman in labor' and fits the imagery.
- source_word: יָבֹאוּ לוֹ
  chosen: come upon him
  alternatives:
  - come to him
  - overtake him
  lexicon: HALOT
  rationale: The idiom indicates that the pains arrive upon Ephraim/Israel. 'Come
    upon him' preserves the force without overinterpreting as punitive 'overtake.'
- source_word: בֵן לֹא חָכָם
  chosen: an unwise son
  alternatives:
  - a son without wisdom
  - a foolish son
  lexicon: HALOT
  rationale: The phrase is predicative and metaphorical. 'Unwise son' is concise and
    preserves the familial/birth imagery; 'foolish' is possible but slightly stronger
    and more moralized.
- source_word: כִּי עֵת
  chosen: for when the time comes
  alternatives:
  - for at the time
  - for it is time
  lexicon: HALOT
  rationale: The clause introduces the reason and refers to the critical moment of
    birth. 'When the time comes' makes the temporal sense clear in idiomatic English.
- source_word: יַעֲמֹד
  chosen: does not present himself
  alternatives:
  - does not stand
  - does not remain
  - does not take his stand
  lexicon: HALOT
  rationale: Literally 'stand,' but in this obstetric metaphor the sense is that the
    child fails to come forward at the decisive moment. 'Present himself' communicates
    the implied action in readable English while staying close to the image.
- source_word: בְּמִשְׁבַּר בָּנִים
  chosen: at the opening of the womb
  alternatives:
  - at the mouth of the womb
  - at the place of breaking forth of children
  - at childbirth
  lexicon: HALOT
  rationale: This difficult phrase likely refers to the place/moment of birth, literally
    the breaking forth or opening for children. 'Opening of the womb' preserves the
    concrete birth image better than the flatter 'at childbirth.'
