id: HOS.13.15
reference: Hosea 13:15
source:
  edition: WLC
  text: כִּ֣י ה֔וּא בֵּ֥ן אַחִ֖ים יַפְרִ֑יא יָב֣וֹא קָדִים֩ ר֨וּחַ יְהוָ֜ה מִ/מִּדְבָּ֣ר עֹלֶ֗ה וְ/יֵב֤וֹשׁ מְקוֹר/וֹ֙ וְ/יֶחֱרַ֣ב מַעְיָנ֔/וֹ ה֣וּא יִשְׁסֶ֔ה אוֹצַ֖ר כָּל כְּלִ֥י חֶמְדָּֽה־׃
translation:
  text: Though he may flourish among brothers, an east wind will come—the wind of Yahweh, rising from the wilderness—and his spring will dry up, and his fountain will be dried up; it will plunder the treasury of every precious vessel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''For he is fruitful among brothers.'' The Hebrew can be rendered more formally, but the context favors a concessive sense: despite Ephraim''s prosperity, judgment is coming.'
    reason: lexical_alternative
  - marker: b
    text: '''The wind of the LORD'' could also be rendered ''the breath of the LORD,'' but here ''wind'' fits the parallel with ''east wind'' and ''rising from the wilderness.'''
    reason: alternative_reading
  - marker: c
    text: Or 'he will plunder the treasury of every precious object.' The Hebrew subject may be understood as the east wind or, less likely, the personified Ephraim/attacker.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  chosen: Though
  alternatives:
  - For
  - Though indeed
  lexicon: HALOT
  rationale: 'Here כִּי introduces a concessive sense in context: despite Ephraim''s apparent prosperity, judgment is coming. ''Though'' captures the adversative force better than a simple causal ''for'' in English.'
- source_word: בֵּן אַחִים
  chosen: among his brothers
  alternatives:
  - a son among brothers
  - among brothers
  lexicon: HALOT
  rationale: Literally 'a son of brothers,' an idiom likely expressing membership within a brotherhood/tribal kin group. Rendering it idiomatically as 'among his brothers' preserves the familial imagery without awkward English. The masculine form is retained in line with gender-accurate policy and the immediate referent is Ephraim/Israel personified as a son.
- source_word: יַפְרִיא
  chosen: may flourish
  alternatives:
  - is fruitful
  - prospers
  lexicon: HALOT
  rationale: Hiphil of פרה conveys being fruitful/prospering. 'May flourish' fits the concessive setup and natural English while preserving the image of prosperity.
- source_word: קָדִים
  chosen: east wind
  alternatives:
  - east wind from the desert
  lexicon: HALOT
  rationale: Standard rendering for the hot, destructive east wind in prophetic imagery. The desert origin is then expressed explicitly by the following phrase.
- source_word: רוּחַ יְהוָה
  chosen: the wind of the LORD
  alternatives:
  - the breath of the LORD
  - the רוח of the LORD
  lexicon: HALOT
  rationale: רוּחַ can mean wind, breath, or spirit. In this context, paired with 'east wind' and 'rising from the wilderness,' the meteorological sense is primary. 'Of the LORD' preserves divine agency behind the judgment.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name.
- source_word: מִמִּדְבָּר עֹלֶה
  chosen: rising from the wilderness
  alternatives:
  - coming up from the desert
  lexicon: HALOT
  rationale: Keeps the participial vividness and the wilderness/desert setting associated with the east wind.
- source_word: מְקוֹרוֹ
  chosen: his spring
  alternatives:
  - his source
  - his fountainhead
  lexicon: HALOT
  rationale: מָקוֹר commonly denotes a spring/source of water. 'Spring' is concrete and pairs well with the next term.
- source_word: וְיֵבֹשׁ
  chosen: will dry up
  alternatives:
  - will become dry
  lexicon: HALOT
  rationale: Natural English for the drying of a water source.
- source_word: מַעְיָנוֹ
  chosen: his fountain
  alternatives:
  - his wellspring
  lexicon: HALOT
  rationale: Maintains the parallel water-source imagery while varying English naturally from 'spring.'
- source_word: וְיֶחֱרַב
  chosen: will be dried out
  alternatives:
  - will be parched
  - will be laid waste
  lexicon: HALOT
  rationale: In context of water imagery, 'be dried out' best reflects the devastation of the fountain. It avoids overgeneralizing to non-hydrological ruin.
- source_word: יִשְׁסֶה
  chosen: it will plunder
  alternatives:
  - he will plunder
  - it will strip
  lexicon: HALOT
  rationale: 'The verb denotes despoiling/plundering. The subject is best taken as the invading east wind just mentioned, hence ''it.'' This keeps the imagery coherent: the wind dries up and despoils.'
- source_word: אוֹצַר
  chosen: the storehouse
  alternatives:
  - the treasury
  - the treasure
  lexicon: HALOT
  rationale: אוֹצָר can mean treasure or treasury/storehouse. 'Storehouse' fits the following phrase about vessels/articles and the image of plunder.
- source_word: כָּל כְּלִי חֶמְדָּה
  chosen: every precious vessel
  alternatives:
  - every desirable article
  - all precious objects
  lexicon: HALOT
  rationale: Literally 'every vessel/object of desire.' 'Every precious vessel' preserves the concrete noun and the sense of valued possessions.
