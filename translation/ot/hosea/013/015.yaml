theological_decisions:
- issue: Agency of the destructive wind
  chosen_reading: The east wind is presented as the LORD's wind, indicating divine judgment mediated through natural/historical means.
  alternative_readings:
  - '''Spirit of the LORD'' as a more personal divine agent'
  rationale: Because רוּחַ here is governed by the concrete 'east wind' and 'rising from the wilderness,' 'wind of the LORD' is the best contextual reading. This preserves divine sovereignty without importing a distinct pneumatological claim the text does not require.
  doctrine_reference: 'Translation philosophy §3; Contested terms: יְהוָה'
