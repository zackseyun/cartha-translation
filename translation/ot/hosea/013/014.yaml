id: HOS.13.14
reference: Hosea 13:14
source:
  edition: WLC
  text: מִ/יַּ֤ד שְׁאוֹל֙ אֶפְדֵּ֔/ם מִ/מָּ֖וֶת אֶגְאָלֵ֑/ם אֱהִ֨י דְבָרֶי/ךָ֜ מָ֗וֶת
    אֱהִ֤י קָֽטָבְ/ךָ֙ שְׁא֔וֹל נֹ֖חַם יִסָּתֵ֥ר מֵ/עֵינָֽ/י׃
translation:
  text: From the hand of Sheol I will ransom them; from death I will redeem them.
    O Death, where are your plagues? O Sheol, where is your destruction? Compassion
    will be hidden from my eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Shall I ransom them from the hand of Sheol? Shall I redeem them from
      death?'—taking the opening lines as rhetorical questions of judgment rather
      than promises of deliverance.
    reason: alternative_reading
  - marker: b
    text: 'Hebrew אֱהִי may also be understood as ''I will be'' or ''let me be'':
      ''I will be your plagues, O Death; I will be your destruction, O Sheol.'''
    reason: alternative_reading
  - marker: c
    text: 'Traditional rendering influenced by the Greek tradition: ''Where, O Death,
      is your sting? Where, O Sheol, is your victory/sting?'' Compare 1 Corinthians
      15:55.'
    reason: cross_reference
lexical_decisions:
- source_word: מִיַּד
  chosen: from the hand of
  alternatives:
  - from the power of
  lexicon: HALOT
  rationale: Literally 'from the hand of.' In Hebrew this idiom can denote power or
    grasp; retaining 'hand' preserves the concrete metaphor while remaining intelligible
    in English.
- source_word: שְׁאוֹל
  chosen: Sheol
  alternatives:
  - the grave
  - the realm of the dead
  lexicon: HALOT
  rationale: Kept as 'Sheol' rather than flattening to 'grave' because the Hebrew
    term denotes the underworld / realm of the dead more broadly than a burial place.
    Transliteration preserves the Hebrew conceptual world.
- source_word: אֶפְדֵּם
  chosen: I will ransom them
  alternatives:
  - I will redeem them
  lexicon: HALOT
  rationale: פדה commonly carries the sense of ransoming or buying back from bondage
    or danger. 'Ransom' distinguishes it from the following גאל and preserves the
    paired but non-identical redemption vocabulary.
- source_word: מִמָּוֶת
  chosen: from death
  alternatives:
  - out of death
  lexicon: HALOT
  rationale: Straightforward prepositional phrase; 'from death' is natural and preserves
    the parallelism with 'from the hand of Sheol.'
- source_word: אֶגְאָלֵם
  chosen: I will redeem them
  alternatives:
  - I will reclaim them
  - I will act as kinsman-redeemer for them
  lexicon: HALOT
  rationale: גאל is the broader redemption term, often with kinship or covenantal
    overtones. 'Redeem' is the most natural English equivalent here and preserves
    the distinction from 'ransom' in the previous colon.
- source_word: אֱהִי
  chosen: where are
  alternatives:
  - I will be
  - let me be
  lexicon: HALOT
  rationale: This form is famously ambiguous. In this context, especially given the
    apostolic citation in 1 Corinthians 15:55 and the taunting parallelism addressed
    to Death and Sheol, the interrogative force ('where are...?') best fits the poetic
    line. The alternative volitional/future sense is preserved in a footnote because
    the Hebrew consonantal form can support it.
- source_word: דְבָרֶיךָ
  chosen: your plagues
  alternatives:
  - your words
  - your pestilences
  - your stings
  lexicon: HALOT
  rationale: Though formally related to דבר ('word'), in this context the noun is
    widely understood in the sense of pestilences/plagues. 'Plagues' fits the parallel
    with 'destruction' and the address to Death. 'Stings' reflects the Septuagint/Pauline
    trajectory and is preserved in a footnote as a traditional alternative, but it
    is not the plainest rendering of the Hebrew.
- source_word: קָטָבְךָ
  chosen: your destruction
  alternatives:
  - your sting
  - your devastation
  lexicon: HALOT
  rationale: קטב denotes destruction, cutting off, or deadly devastation. 'Destruction'
    is a clear English rendering and pairs well with 'plagues.' 'Sting' is more interpretive
    and reflects later reception rather than the most direct Hebrew sense.
- source_word: נֹחַם
  chosen: Compassion
  alternatives:
  - relenting
  - pity
  - repentance
  lexicon: HALOT
  rationale: The noun can denote regret, relenting, or compassion. Here it signals
    that divine pity will not intervene to stay the announced action. 'Compassion'
    communicates this clearly in modern English.
- source_word: יִסָּתֵר מֵעֵינָי
  chosen: will be hidden from my eyes
  alternatives:
  - is hidden from my eyes
  lexicon: HALOT
  rationale: The Niphal imperfect naturally yields 'will be hidden.' This preserves
    the future-oriented declaration that pity/relenting will not be in view.
