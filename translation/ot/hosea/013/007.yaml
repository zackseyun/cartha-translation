id: HOS.13.7
reference: Hosea 13:7
source:
  edition: WLC
  text: וָ/אֱהִ֥י לָ/הֶ֖ם כְּמוֹ שָׁ֑חַל כְּ/נָמֵ֖ר עַל דֶּ֥רֶךְ אָשֽׁוּר־־׃
translation:
  text: So I became to them like a lion; like a leopard I lurked by the way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like a leopard I watched by the way' or 'like a leopard I lay in wait
      by the road.' The final verb is difficult and may be understood as a first-person
      verb of watching or lurking, rather than the place-name 'Assyria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֱהִי
  chosen: So I became
  alternatives:
  - And I was
  - Then I became
  lexicon: HALOT
  rationale: Qal wayyiqtol 1cs of היה. In this judgment sequence, 'became' captures
    the ingressive sense better than a simple stative 'was.' 'So' reflects the narrative/resultative
    force of the waw in context.
- source_word: לָהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix here marks relation toward Israel;
    'to them' is the most natural English rendering with 'became.'
- source_word: כְּמוֹ
  chosen: like
  alternatives:
  - as
  lexicon: HALOT
  rationale: Introduces comparison. 'Like' is more idiomatic in modern English than
    'as' in this simile.
- source_word: שָׁחַל
  chosen: lion
  alternatives:
  - young lion
  lexicon: HALOT
  rationale: שׁחל denotes a lion, often with emphasis on fierceness. 'Lion' is the
    clearest general rendering; 'young lion' is possible in some contexts but is not
    required here.
- source_word: כְּנָמֵר
  chosen: like a leopard
  alternatives:
  - like a panther
  lexicon: HALOT
  rationale: נָמֵר is the spotted predatory cat conventionally rendered 'leopard.'
    'Panther' is possible in English tradition but less precise for most readers.
- source_word: עַל דֶּרֶךְ
  chosen: by the way
  alternatives:
  - on the path
  - along the road
  lexicon: HALOT
  rationale: The phrase evokes an ambush position along a traveled route. 'By the
    way' preserves the idiom naturally and fits the predatory imagery.
- source_word: אָשׁוּר
  chosen: I lurked
  alternatives:
  - I watched
  - I lay in wait
  lexicon: HALOT
  rationale: Despite the orthographic form matching the common noun/name 'Asshur/Assyria,'
    the morphology and context support a 1cs verbal reading from שׁוּר/אשׁור in the
    sense of watching or lying in wait. Given the paired predator similes, 'I lurked'
    best conveys the ambush imagery. A more formal alternative is preserved in a footnote.
