theological_decisions:
- issue: Anthropomorphic portrayal of God as a predator in judgment
  chosen_reading: Retain the similes directly ('like a lion ... like a leopard I lurked')
    without softening.
  alternative_readings:
  - Use less vivid language such as 'watched over the ճանապարհ/road'
  rationale: The Hebrew presents YHWH in severe judgment imagery. Per translation
    philosophy, the tension and force of the text should be preserved rather than
    mitigated for theological comfort.
  doctrine_reference: Translation philosophy §3
