theological_decisions:
- issue: Nuance of divine 'knowing' toward Israel
  chosen_reading: Relational/covenantal knowledge is left implicit in 'I knew you'
  alternative_readings:
  - I cared for you
  - I acknowledged you
  rationale: The verse likely evokes YHWH's covenantal care for Israel in the exodus
    wilderness, but the Hebrew verb itself is simply 'know.' To preserve theological
    tension and avoid importing more than the text explicitly states, the main text
    keeps 'knew' and preserves interpretive alternatives in a footnote.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
