id: HOS.13.9
reference: Hosea 13:9
source:
  edition: WLC
  text: שִֽׁחֶתְ/ךָ֥ יִשְׂרָאֵ֖ל כִּֽי בִ֥/י בְ/עֶזְרֶֽ/ךָ־׃
translation:
  text: He has destroyed you, Israel, because your help is in me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'You have destroyed yourself, Israel, for in me is your help.' The Hebrew
      of this verse is difficult, and some also understand it more literally as, 'Your
      destruction, Israel…'
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁחֶתְךָ
  chosen: He has destroyed you
  alternatives:
  - You have destroyed yourself
  - Your destruction
  lexicon: HALOT
  rationale: From שׁחת in the Piel/perfect with 2ms suffix, the form is syntactically
    difficult and has been understood either as a verbal clause ('he has destroyed
    you') or, by emendation/ellipsis, reflexively ('you have destroyed yourself')
    or nominally ('your destruction'). The MT pointing most naturally yields a 3ms
    verbal idea with 2ms object suffix, so the draft preserves that rather than importing
    a reflexive object not present in the consonantal text. Because the subject is
    implicit, English supplies 'He'.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name retained by standard transliteration.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - that
  lexicon: HALOT
  rationale: Here כִּי introduces the ground or explanation for the preceding statement,
    so 'because' best conveys the causal force in natural English.
- source_word: בִי
  chosen: in me
  alternatives:
  - against me
  lexicon: HALOT
  rationale: The preposition ב normally means 'in' or 'with.' Some interpreters take
    the sense adversatively in this difficult verse, but the following phrase בְעֶזְרֶךָ
    strongly supports the sense that help is located 'in me,' that is, in God.
- source_word: בְעֶזְרֶךָ
  chosen: your help
  alternatives:
  - your helper
  - your assistance
  lexicon: HALOT
  rationale: עֵזֶר denotes help or assistance. The prepositional phrase is compressed
    Hebrew; rendering it as 'your help' gives clear English while preserving the noun
    rather than converting it to a full verbal paraphrase.
