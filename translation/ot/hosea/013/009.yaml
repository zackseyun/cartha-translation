theological_decisions:
- issue: Interpretation of this notoriously difficult verse
  chosen_reading: The verse is rendered as a statement that Israel has been destroyed,
    with the explanatory clause that Israel's help is in God.
  alternative_readings:
  - You have destroyed yourself, O Israel, for in me is your help.
  - It is your destruction, O Israel, that you are against me, against your help.
  rationale: The Hebrew is textually and syntactically compressed, and English tradition
    often follows a reflexive sense ('you have destroyed yourself'). However, that
    reflexive object is not explicit in the MT as given. To avoid over-resolving the
    difficulty, the main text follows the most straightforward reading of the pointed
    text while preserving major alternatives in a footnote. This maintains the theological
    thrust—that Israel's ruin stands in contrast to God's role as the true source
    of help—without forcing a smoother reading than the Hebrew warrants.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
