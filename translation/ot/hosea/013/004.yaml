theological_decisions:
- issue: Exclusive divine identity and salvation
  chosen_reading: The verse is rendered as an exclusive claim by the LORD that Israel has no God and no savior besides him.
  alternative_readings:
  - The first clause could be heard more temporally as 'I have been the LORD your God since the land of Egypt.'
  - The middle clause could be rendered more imperativally as 'you shall acknowledge no God besides me.'
  rationale: The Hebrew supports a covenantal declaration grounded in the exodus and asserting YHWH's sole deity and saving role. The translation preserves that exclusivity without expanding it into later doctrinal formulations not explicit in the verse.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
