id: HOS.13.4
reference: Hosea 13:4
source:
  edition: WLC
  text: וְ/אָנֹכִ֛י יְהוָ֥ה אֱלֹהֶ֖י/ךָ מֵ/אֶ֣רֶץ מִצְרָ֑יִם וֵ/אלֹהִ֤ים זֽוּלָתִ/י֙ לֹ֣א תֵדָ֔ע וּ/מוֹשִׁ֥יעַ אַ֖יִן בִּלְתִּֽ/י׃
translation:
  text: But I am Yahweh your God from the land of Egypt; you know no God besides me, and there is no savior except me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'since the land of Egypt' or 'out of the land of Egypt.' The Hebrew phrase may emphasize either the LORD's relationship to Israel from the time of the exodus or his saving action in bringing them out.
    reason: lexical_alternative
  - marker: b
    text: Or 'you shall know no God besides me.' The Hebrew verb can be understood with covenantal/prohibitive force as well as declarative force.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָנֹכִי
  chosen: But I
  alternatives:
  - And I
  - Yet I
  lexicon: HALOT
  rationale: The conjunction plus emphatic first-person pronoun marks contrastive emphasis in context; 'But I' brings out the adversative force more naturally in English than a simple 'And I.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֶיךָ
  chosen: your God
  alternatives:
  - your gods
  lexicon: HALOT
  rationale: 'With YHWH and second masculine singular suffix, the sense is singular and covenantal: ''your God.'''
- source_word: מֵאֶרֶץ מִצְרַיִם
  chosen: from the land of Egypt
  alternatives:
  - since the land of Egypt
  - out of the land of Egypt
  lexicon: HALOT
  rationale: The phrase evokes Israel's covenant history beginning with the exodus. 'From the land of Egypt' is a natural rendering of the preposition and preserves the historical reference without overinterpreting temporal nuance.
- source_word: וֵאלֹהִים
  chosen: God
  alternatives:
  - god
  - gods
  lexicon: HALOT
  rationale: 'Although morphologically plural in form, אֱלֹהִים here is an indefinite singular in sense within a negated exclusivity statement: ''you know no God besides me.'' English singular best reflects the meaning.'
- source_word: זוּלָתִי
  chosen: besides me
  alternatives:
  - except me
  - apart from me
  lexicon: HALOT
  rationale: The term expresses exclusion. 'Besides me' is idiomatic in English and pairs well with the preceding object 'God.'
- source_word: לֹא תֵדָע
  chosen: you know no
  alternatives:
  - you shall know no
  - you must acknowledge no
  lexicon: HALOT
  rationale: The imperfect can be read as declarative or prohibitive in this covenantal context. 'You know no' preserves the Hebrew verbal idea without importing an explicit modal not present in English. It can carry both factual and covenantal force.
- source_word: וּמוֹשִׁיעַ
  chosen: and there is no savior
  alternatives:
  - and no savior
  - and no one saves
  lexicon: HALOT
  rationale: The participle denotes one who saves/delivers. Rendering it as the noun 'savior' is idiomatic and fits the existential clause introduced by אַיִן.
- source_word: אַיִן בִּלְתִּי
  chosen: there is no ... except me
  alternatives:
  - none besides me
  - there is not apart from me
  lexicon: HALOT
  rationale: The combination forms a strong exclusivity statement. 'There is no savior except me' communicates the existential negation and exception clearly in modern English.
