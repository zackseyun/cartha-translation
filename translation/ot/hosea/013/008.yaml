theological_decisions:
- issue: Divine self-description through predatory animal imagery
  chosen_reading: Retain the first-person divine speech and violent animal metaphors
    without softening them.
  alternative_readings:
  - Mitigate the imagery into more general judgment language
  rationale: The Hebrew presents God as the direct agent of covenant judgment through
    a sequence of predator images. The translation preserves this theological severity
    rather than resolving the tension by euphemism.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
