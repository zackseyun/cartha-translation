id: HOS.13.8
reference: Hosea 13:8
source:
  edition: WLC
  text: אֶפְגְּשֵׁ/ם֙ כְּ/דֹ֣ב שַׁכּ֔וּל וְ/אֶקְרַ֖ע סְג֣וֹר לִבָּ֑/ם וְ/אֹכְלֵ֥/ם
    שָׁם֙ כְּ/לָבִ֔יא חַיַּ֥ת הַ/שָּׂדֶ֖ה תְּבַקְּעֵֽ/ם׃
translation:
  text: I will attack them like a bear robbed of her cubs, and I will tear open the
    enclosure of their heart; there I will devour them like a lioness; a wild beast
    of the field will rip them apart.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the covering of their heart,' possibly meaning 'their chest' or 'breast.'
      The Hebrew phrase is rare and difficult.
    reason: lexical_alternative
  - marker: b
    text: Or 'like a lion.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶפְגְּשֵׁם
  chosen: I will attack them
  alternatives:
  - I will meet them
  - I will confront them
  lexicon: HALOT
  rationale: The verb פגשׁ can mean 'meet/encounter,' but in a judgment context with
    predatory animal imagery it carries hostile force. 'Attack' makes the threatening
    sense explicit in natural English without over-paraphrasing.
- source_word: כְּדֹב שַׁכּוּל
  chosen: like a bear robbed of her cubs
  alternatives:
  - like a bereaved bear
  - like a bear deprived of offspring
  lexicon: HALOT
  rationale: שַׁכּוּל denotes being bereaved of children/young. The idiom in English
    is well captured by 'a bear robbed of her cubs,' which preserves the maternal
    ferocity implied by the Hebrew image.
- source_word: וְאֶקְרַע
  chosen: and I will tear open
  alternatives:
  - and I will tear
  - and I will rip open
  lexicon: HALOT
  rationale: קרע means 'tear, rend.' 'Tear open' fits the violent anatomical imagery
    that follows and reads naturally in English.
- source_word: סְגוֹר לִבָּם
  chosen: the enclosure of their heart
  alternatives:
  - the covering of their heart
  - their chest
  - the casing of their heart
  lexicon: HALOT
  rationale: סְגוֹר literally refers to something closed up or enclosing. The phrase
    is difficult; many understand it as the breast/chest enclosing the heart. 'Enclosure
    of their heart' stays closer to the Hebrew while remaining intelligible, avoiding
    an interpretive flattening to merely 'chest' in the main text.
- source_word: וְאֹכְלֵם
  chosen: there I will devour them
  alternatives:
  - there I will consume them
  - there I will eat them
  lexicon: HALOT
  rationale: אכל in predatory imagery is best rendered 'devour.' The adverb שָׁם is
    retained as 'there,' emphasizing the immediacy of the attack.
- source_word: כְּלָבִיא
  chosen: like a lioness
  alternatives:
  - like a lion
  lexicon: HALOT
  rationale: לָבִיא commonly denotes a lion/lioness, often with emphasis on a strong
    mature lion. Given the preceding maternal bear image and the likely feminine nuance,
    'lioness' is a defensible and vivid rendering, though 'lion' is also possible.
- source_word: חַיַּת הַשָּׂדֶה
  chosen: a wild beast of the field
  alternatives:
  - the beasts of the field
  - a beast of the open country
  lexicon: HALOT
  rationale: The singular construct with following verb supports a singular sense
    here. 'Wild beast of the field' is a standard, clear rendering that preserves
    the untamed threat.
- source_word: תְּבַקְּעֵם
  chosen: will rip them apart
  alternatives:
  - will tear them open
  - will maul them
  lexicon: HALOT
  rationale: בקע means 'split, cleave open.' With animal imagery, 'rip them apart'
    communicates the violent result in idiomatic English.
