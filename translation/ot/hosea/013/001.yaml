theological_decisions:
- issue: Referent and force of Ephraim's rise and fall
  chosen_reading: The verse speaks of Ephraim/the northern kingdom gaining fearful
    prominence in Israel and then becoming guilty through Baal, resulting in death.
  alternative_readings:
  - The verse speaks of Ephraim being exalted by others in Israel rather than exalting
    himself.
  - '''Died'' may denote corporate-political death rather than immediate literal death
    of an individual.'
  rationale: No doctrinally contested term from DOCTRINE.md is present, but the verse
    is interpretively compressed. The translation preserves the prophetic judgment
    without over-resolving whether the death is metaphorical, corporate, or literal.
    'Ephraim' is left as the proper name rather than expanded to 'the northern kingdom'
    in the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
