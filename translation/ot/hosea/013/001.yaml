id: HOS.13.1
reference: Hosea 13:1
source:
  edition: WLC
  text: כְּ/דַבֵּ֤ר אֶפְרַ֨יִם֙ רְתֵ֔ת נָשָׂ֥א ה֖וּא בְּ/יִשְׂרָאֵ֑ל וַ/יֶּאְשַׁ֥ם
    בַּ/בַּ֖עַל וַ/יָּמֹֽת׃
translation:
  text: When Ephraim spoke, there was trembling; he exalted himself in Israel. But
    he became guilty through Baal and died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he was exalted in Israel' or 'he became prominent in Israel.' The Hebrew
      clause is terse and may be read as either passive/resultative or active-reflexive.
    reason: alternative_reading
  - marker: b
    text: '''Through Baal'' may also be understood as ''through Baal worship'' or
      ''in/with Baal.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּדַבֵּר
  chosen: When ... spoke
  alternatives:
  - As ... spoke
  - At the speaking of
  lexicon: HALOT
  rationale: The prefixed כ plus infinitive construct of דבר functions temporally
    here. 'When Ephraim spoke' gives natural English while preserving the temporal
    sense better than a more wooden 'at the speaking of.'
- source_word: אֶפְרַיִם
  chosen: Ephraim
  alternatives:
  - —
  rationale: Proper name retained by transliteration. In Hosea it can denote the northern
    kingdom representatively, but the name itself should remain 'Ephraim.'
- source_word: רְתֵת
  chosen: trembling
  alternatives:
  - terror
  - shaking
  lexicon: HALOT
  rationale: The noun denotes trembling or quaking. 'Trembling' preserves the vivid
    reaction without over-specifying whether the trembling is fear, awe, or political
    dread.
- source_word: נָשָׂא הוּא בְּיִשְׂרָאֵל
  chosen: he exalted himself in Israel
  alternatives:
  - he was exalted in Israel
  - he was lifted up in Israel
  - he became prominent in Israel
  lexicon: HALOT
  rationale: נשא can mean 'lift up, exalt.' The clause is syntactically compressed
    and could be read either as passive/resultative ('he was exalted') or reflexive/active
    ('he exalted himself'). Given Hosea's polemical tone and the following fall through
    Baal, the active-reflexive sense fits the movement from prominence to guilt. The
    alternative is preserved in a footnote because the Hebrew is terse and genuinely
    allows another construal.
- source_word: וַיֶּאְשַׁם
  chosen: he became guilty
  alternatives:
  - he incurred guilt
  - he offended
  lexicon: HALOT
  rationale: The verb אשם commonly denotes becoming guilty or incurring guilt. 'Became
    guilty' is direct and preserves covenantal/moral force.
- source_word: בַּבַּעַל
  chosen: through Baal
  alternatives:
  - by Baal
  - through the Baal
  - through Baal worship
  lexicon: HALOT
  rationale: 'The preposition ב here is best taken instrumentally or in association:
    Ephraim incurred guilt in relation to Baal. ''Through Baal'' is concise and preserves
    the named deity. ''Through Baal worship'' interprets the phrase correctly but
    adds a noun absent from the text, so it is left as a footnote alternative.'
- source_word: וַיָּמֹת
  chosen: and died
  alternatives:
  - and he died
  lexicon: HALOT
  rationale: Simple narrative preterite. 'And died' is idiomatic and preserves the
    stark consequence, whether understood literally, corporately, or spiritually in
    context.
