id: HOS.13.12
reference: Hosea 13:12
source:
  edition: WLC
  text: צָרוּר֙ עֲוֺ֣ן אֶפְרָ֔יִם צְפוּנָ֖ה חַטָּאתֽ/וֹ׃
translation:
  text: Ephraim’s iniquity is bound up; his sin is stored away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hidden' for 'stored away'; the Hebrew can mean concealed or kept in
      reserve, likely with the sense that Ephraim’s sin is being kept for future reckoning.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָרוּר
  chosen: is bound up
  alternatives:
  - is wrapped up
  - is bundled up
  lexicon: HALOT
  rationale: The passive participle from צרר conveys something tied up, bound, or
    bundled. 'Bound up' is idiomatic English that preserves the metaphor of something
    secured and kept, fitting the parallel with 'stored away.'
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - punishment for iniquity
  lexicon: HALOT
  rationale: עָוֹן can denote iniquity, guilt, or sometimes the punishment resulting
    from guilt. Here the parallel with 'sin' favors the moral offense itself rather
    than its punishment. 'Iniquity' preserves the ethical weight and avoids flattening
    the parallel into a mere synonym.
- source_word: אֶפְרָיִם
  chosen: Ephraim’s
  rationale: 'The proper name is transliterated per translation philosophy. The genitive
    relationship is expressed naturally in English as a possessive: ''Ephraim’s iniquity.'''
- source_word: צְפוּנָה
  chosen: is stored away
  alternatives:
  - is hidden
  - is kept in store
  - is laid up
  lexicon: HALOT
  rationale: The passive participle from צפן means hidden, stored, or treasured up.
    In this judgment context, the sense is not positive concealment but reserved record
    or kept account. 'Stored away' communicates that the sin is kept in reserve, likely
    for future reckoning, while remaining readable modern English.
- source_word: חַטָּאתוֹ
  chosen: his sin
  alternatives:
  - his offense
  lexicon: HALOT
  rationale: The noun denotes sin or sin-offering; here only 'sin' fits the context.
    The 3ms suffix is retained as 'his,' referring back to Ephraim as a corporate
    singular.
