theological_decisions:
- issue: Metaphorical force of the verse
  chosen_reading: The verse depicts Ephraim's guilt as preserved and kept on record
    for coming judgment, without specifying a doctrine beyond the prophetic image.
  alternative_readings:
  - The verse could be read more weakly as merely hidden sin rather than sin reserved
    for judgment.
  rationale: The paired participles ('bound up' / 'stored away') in Hosea's judgment
    context suggest not forgiveness or removal but preservation of guilt for later
    exposure or punishment. The translation preserves the metaphor without over-interpreting
    it in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
