id: HOS.13.3
reference: Hosea 13:3
source:
  edition: WLC
  text: לָ/כֵ֗ן יִֽהְיוּ֙ כַּ/עֲנַן בֹּ֔קֶר וְ/כַ/טַּ֖ל מַשְׁכִּ֣ים הֹלֵ֑ךְ כְּ/מֹץ֙
    יְסֹעֵ֣ר מִ/גֹּ֔רֶן וּ/כְ/עָשָׁ֖ן מֵ/אֲרֻבָּֽה־׃
translation:
  text: Therefore they will be like the morning cloud, and like the dew that goes
    away early, like chaff whirled from the threshing floor, and like smoke from a
    window.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from a lattice.' The Hebrew term can refer to a window opening or latticework.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks the consequence of the preceding indictment and judgment; 'Therefore'
    preserves the inferential force in natural English.
- source_word: יִהְיוּ
  chosen: they will be
  alternatives:
  - they shall be
  lexicon: HALOT
  rationale: Simple future of היה; 'will be' is clear modern English and fits the
    prophetic consequence statement.
- source_word: כַּעֲנַן בֹּקֶר
  chosen: like the morning cloud
  alternatives:
  - like a morning cloud
  lexicon: HALOT
  rationale: The simile evokes something insubstantial and quickly vanishing. 'The
    morning cloud' reads idiomatically as a class image in English.
- source_word: וְכַטַּל מַשְׁכִּים הֹלֵךְ
  chosen: and like the dew that goes away early
  alternatives:
  - and like early dew that disappears
  - and like dew departing in the morning
  lexicon: HALOT
  rationale: מַשְׁכִּים conveys earliness, and הֹלֵךְ here functions idiomatically
    of passing away/departing. The rendering preserves the image of dew that vanishes
    quickly without over-paraphrasing.
- source_word: כְּמֹץ
  chosen: like chaff
  lexicon: HALOT
  rationale: מוֹץ is standardly 'chaff,' the light husk blown away in threshing imagery.
- source_word: יְסֹעֵר
  chosen: whirled
  alternatives:
  - stormed away
  - driven
  - swept away
  lexicon: HALOT
  rationale: The verb conveys being driven in a stormy, swirling manner. 'Whirled'
    captures the vivid motion while fitting the passive sense in English with the
    following source phrase.
- source_word: מִגֹּרֶן
  chosen: from the threshing floor
  alternatives:
  - off the threshing floor
  lexicon: HALOT
  rationale: Retains the agricultural setting of winnowing imagery. 'From' is the
    straightforward sense of the preposition.
- source_word: וּכְעָשָׁן
  chosen: and like smoke
  lexicon: HALOT
  rationale: Keeps the parallel simile structure and the image of something that quickly
    dissipates.
- source_word: מֵאֲרֻבָּה
  chosen: from a window
  alternatives:
  - from a lattice
  - through a window
  lexicon: HALOT
  rationale: אֲרֻבָּה can denote a window opening or lattice. 'Window' is the most
    accessible main-text rendering; the more specific 'lattice' is preserved in a
    footnote because it may better reflect an ancient architectural opening.
