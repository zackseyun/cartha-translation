theological_decisions:
- issue: Verbal tense/aspect in the two first-person imperfects
  chosen_reading: 'Retrospective past sense: ''I gave ... and I took him away'''
  alternative_readings:
  - 'Present/future: ''I give ... and I take/will take away'''
  rationale: The immediate context reflects on Israel's kings as part of divine judgment,
    and many interpreters understand the verse as looking back to God's granting and
    removing kings. Rendering both clauses as past in English best communicates the
    discourse sense without forcing a wooden future/present reading from the morphology
    alone.
- issue: Implicit object of וְאֶקַּח
  chosen_reading: 'Object understood as the king: ''I took him away'''
  alternative_readings:
  - 'Leave object implicit: ''and I took away'''
  rationale: The Hebrew omits the object, but the previous noun 'king' supplies it
    naturally. English ordinarily requires the object for clarity, and the supplied
    pronoun does not add new content beyond the clear contextual referent.
