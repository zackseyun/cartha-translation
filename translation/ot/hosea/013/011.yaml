id: HOS.13.11
reference: Hosea 13:11
source:
  edition: WLC
  text: אֶֽתֶּן לְ/ךָ֥ מֶ֨לֶךְ֙ בְּ/אַפִּ֔/י וְ/אֶקַּ֖ח בְּ/עֶבְרָתִֽ/י־׃ס
translation:
  text: I gave you a king in my anger, and I took him away in my wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'I give you a king in my anger, and I take him away in
      my wrath.' The Hebrew verbal forms are imperfects and can be rendered more literally
      as present/future, but the context supports a retrospective sense.
    reason: alternative_reading
  - marker: b
    text: Hebrew simply says 'and I took'; the object 'him' is implied from 'a king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶתֶּן
  chosen: I gave
  alternatives:
  - I give
  - I will give
  lexicon: HALOT
  rationale: Although the form is a Qal imperfect 1cs ('I give/will give'), in this
    prophetic context it functions naturally as a past/reflexive statement recalling
    what God did for Israel. English past tense best captures the parallel with the
    following verb and the retrospective force of the verse.
- source_word: לְךָ
  chosen: you
  alternatives:
  - to you
  - for you
  lexicon: HALOT
  rationale: The preposition ל with second masculine singular suffix is most naturally
    represented in idiomatic English simply as the indirect object 'you' after 'gave.'
    Singular is retained, addressing Israel corporately as one entity.
- source_word: מֶלֶךְ
  chosen: a king
  alternatives:
  - king
  lexicon: HALOT
  rationale: Anarthrous noun is well represented by the indefinite 'a king,' fitting
    the sense of granting monarchy rather than identifying a specific individual by
    name.
- source_word: בְּאַפִּי
  chosen: in my anger
  alternatives:
  - with my anger
  - by my anger
  lexicon: HALOT
  rationale: אַף in this idiom denotes anger. 'In my anger' is the most natural English
    rendering of ב plus the noun here and preserves the causal-circumstantial force.
- source_word: וְאֶקַּח
  chosen: and I took him away
  alternatives:
  - and I took
  - and I removed
  - and I will take away
  lexicon: HALOT
  rationale: The verb לקח means 'take,' but in context of kingship its sense is removal.
    'Took him away' makes explicit the implied object in idiomatic English while staying
    close to the Hebrew. Past tense matches the retrospective force of the verse.
- source_word: בְּעֶבְרָתִי
  chosen: in my wrath
  alternatives:
  - in my fury
  - in my rage
  lexicon: HALOT
  rationale: עֶבְרָה is stronger than general anger and often denotes overflowing
    wrath. 'Wrath' preserves the elevated prophetic tone and the semantic distinction
    from אַף in the previous colon.
