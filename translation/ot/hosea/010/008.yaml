id: HOS.10.8
reference: Hosea 10:8
source:
  edition: WLC
  text: וְ/נִשְׁמְד֞וּ בָּמ֣וֹת אָ֗וֶן חַטַּאת֙ יִשְׂרָאֵ֔ל ק֣וֹץ וְ/דַרְדַּ֔ר יַעֲלֶ֖ה
    עַל מִזְבְּחוֹתָ֑/ם וְ/אָמְר֤וּ לֶֽ/הָרִים֙ כַּסּ֔וּ/נוּ וְ/לַ/גְּבָע֖וֹת נִפְל֥וּ
    עָלֵֽי/נוּ־׃ס
translation:
  text: The high places of Aven, the sin of Israel, will be destroyed. Thorn and thistle
    will grow up on their altars, and they will say to the mountains, “Cover us!”
    and to the hills, “Fall on us!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the high places of wickedness.' Hebrew aven can function as a place-name
      and also mean 'wickedness' or 'iniquity,' likely with intentional wordplay here.
    reason: alternative_reading
lexical_decisions:
- source_word: בָּמוֹת
  chosen: high places
  alternatives:
  - cultic heights
  - shrines
  lexicon: HALOT
  rationale: Standard rendering for cultic worship sites in the Hebrew Bible; preserves
    the religious sense better than a generic 'heights.'
- source_word: אָוֶן
  chosen: Aven
  alternatives:
  - wickedness
  - iniquity
  - Beth-aven
  lexicon: HALOT
  rationale: Rendered as the place-name 'Aven' here because it stands in construct
    with 'high places' and likely refers to the cult site associated with Israel's
    idolatry. The word also carries connotations of wickedness/vanity, but the immediate
    syntax supports a toponymic force.
- source_word: חַטַּאת יִשְׂרָאֵל
  chosen: the sin of Israel
  alternatives:
  - Israel's sin
  - the sin offering of Israel
  lexicon: HALOT
  rationale: Here חַטַּאת most naturally means 'sin,' appositionally identifying the
    high places as Israel's sin. 'Sin offering' does not fit the context.
- source_word: נִשְׁמְדוּ
  chosen: will be destroyed
  alternatives:
  - shall be annihilated
  - will be laid waste
  lexicon: HALOT
  rationale: The Niphal of שׁמד conveys destruction/being wiped out. 'Will be destroyed'
    is clear modern English and fits the prophetic judgment context.
- source_word: קוֹץ וְדַרְדַּר
  chosen: thorn and thistle
  alternatives:
  - thorns and thistles
  - thornbush and weed
  lexicon: HALOT
  rationale: This pair evokes desolation and curse imagery. Singular collective forms
    in English read naturally as 'thorn and thistle,' though the sense is distributive
    vegetation overrunning abandoned altars.
- source_word: יַעֲלֶה עַל מִזְבְּחוֹתָם
  chosen: will grow up on their altars
  alternatives:
  - will come up over their altars
  - will spring up upon their altars
  lexicon: HALOT
  rationale: עלה with vegetation naturally means 'grow up' or 'spring up.' 'On their
    altars' communicates overgrowth of abandoned cultic sites.
- source_word: כַּסּוּנוּ
  chosen: Cover us
  alternatives:
  - hide us
  - conceal us
  lexicon: HALOT
  rationale: The imperative from כסה is straightforwardly 'cover.' This preserves
    the vivid image later echoed in apocalyptic usage.
- source_word: נִפְלוּ עָלֵינוּ
  chosen: Fall on us
  alternatives:
  - collapse on us
  lexicon: HALOT
  rationale: Direct imperative language is best preserved. The phrase expresses desperate
    desire to be buried or hidden from judgment.
