theological_decisions:
- issue: Whether אָוֶן should be translated as a common noun ('wickedness/iniquity')
    or retained as a place-name
  chosen_reading: Retained as 'Aven' in the main text
  alternative_readings:
  - '''wickedness''/''iniquity'' as a descriptive genitive: ''the high places of wickedness'''
  rationale: The syntax allows either a toponym or a pejorative descriptor, and Hosea
    elsewhere uses wordplay on Beth-aven. Here the main text preserves the likely
    place reference while allowing the pejorative nuance to remain available in a
    footnote.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather
    than resolve it'
