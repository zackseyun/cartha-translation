theological_decisions:
- issue: Shift from 2mp verbs to 2ms suffixes/forms in address
  chosen_reading: Render all as 'you' without marking number shift in English, understanding
    a corporate singular address to Israel within a collective accusation.
  alternative_readings:
  - Attempt to mark the shift with 'you all ... because you [Israel] trusted'
  - Emend or smooth the number shift
  rationale: Hebrew prophetic discourse often shifts between plural and singular when
    addressing the nation collectively. English 'you' can carry both without forcing
    an interpretive paraphrase or textual adjustment.
  doctrine_reference: 'Translation philosophy: preserve the source''s sense without
    paraphrase beyond what the text warrants.'
