id: HOS.10.13
reference: Hosea 10:13
source:
  edition: WLC
  text: חֲרַשְׁתֶּם רֶ֛שַׁע עַוְלָ֥תָ/ה קְצַרְתֶּ֖ם אֲכַלְתֶּ֣ם פְּרִי כָ֑חַשׁ כִּֽי
    בָטַ֥חְתָּ בְ/דַרְכְּ/ךָ֖ בְּ/רֹ֥ב גִּבּוֹרֶֽי/ךָ־־־׃
translation:
  text: You have plowed wickedness; you have reaped injustice; you have eaten the
    fruit of deceit, because you trusted in your way, in the multitude of your warriors.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'falsehood' or 'lies' for 'deceit.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew shifts from plural verbs ('you have plowed/reaped/eaten') to
      singular forms ('you trusted ... your way ... your warriors'), likely addressing
      Israel as a collective singular.
    reason: cultural_note
  - marker: c
    text: Or 'your mighty men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲרַשְׁתֶּם
  chosen: you have plowed
  alternatives:
  - you plowed
  - you have cultivated
  lexicon: HALOT
  rationale: The verb literally denotes plowing. Retaining the agricultural image
    preserves the metaphorical sequence with 'reaped' and 'eaten.' The perfect is
    rendered with English present perfect for vivid accusation in context.
- source_word: רֶשַׁע
  chosen: wickedness
  alternatives:
  - evil
  - guilt
  lexicon: HALOT
  rationale: '''Wickedness'' best captures moral evil as the object metaphorically
    plowed. It is more ethically pointed than the broader ''evil.'''
- source_word: עַוְלָתָה
  chosen: injustice
  alternatives:
  - wrongdoing
  - iniquity
  lexicon: HALOT
  rationale: This noun can denote wrong, injustice, or iniquity. 'Injustice' fits
    the harvest metaphor well and distinguishes it from the prior term for wickedness
    while preserving the moral-social dimension.
- source_word: קְצַרְתֶּם
  chosen: you have reaped
  alternatives:
  - you reaped
  lexicon: HALOT
  rationale: Literal agricultural language should be preserved to match the plowing/harvest
    metaphor.
- source_word: אֲכַלְתֶּם
  chosen: you have eaten
  alternatives:
  - you ate
  - you consumed
  lexicon: HALOT
  rationale: A straightforward rendering that continues the metaphorical progression
    from sowing to harvest to consumption.
- source_word: פְּרִי
  chosen: the fruit of
  alternatives:
  - fruit
  - produce of
  lexicon: HALOT
  rationale: The construct relationship with כָּחַשׁ is naturally rendered 'the fruit
    of ...' in English.
- source_word: כָּחַשׁ
  chosen: deceit
  alternatives:
  - lies
  - falsehood
  lexicon: HALOT
  rationale: The noun can denote deception or falsehood. 'Deceit' fits well as the
    moral product they consume and avoids sounding merely propositional ('lies').
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - indeed
  lexicon: HALOT
  rationale: Here it introduces the reason for the preceding indictment and judgment
    imagery.
- source_word: בָטַחְתָּ
  chosen: you trusted
  alternatives:
  - you relied
  - you put confidence
  lexicon: HALOT
  rationale: The core sense is trust/reliance. 'Trusted' is concise and natural. Although
    the form is 2ms, it addresses Israel corporately; English can preserve the singular
    form without awkwardness by using 'you.'
- source_word: בְדַרְכְּךָ
  chosen: in your way
  alternatives:
  - in your path
  - in your course
  lexicon: HALOT
  rationale: The phrase likely refers to Israel's own course, policy, or chosen conduct.
    'Way' preserves the Hebrew metaphor and its moral resonance.
- source_word: בְּרֹב
  chosen: in the multitude of
  alternatives:
  - in the abundance of
  - because of the many
  lexicon: HALOT
  rationale: 'The preposition with רֹב expresses the object of misplaced confidence:
    numerical abundance.'
- source_word: גִּבּוֹרֶיךָ
  chosen: your warriors
  alternatives:
  - your mighty men
  - your heroes
  lexicon: HALOT
  rationale: Though the term can mean mighty men or heroes, in this context of military
    reliance 'warriors' communicates the sense clearly in modern English.
