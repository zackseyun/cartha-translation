theological_decisions:
- issue: Referent of the pronouns in the verse
  chosen_reading: The suffixes primarily refer to the calf-image/cult center of Beth-aven,
    rendered with 'its' language.
  alternative_readings:
  - The suffixes refer to Beth-aven as a place
  - The suffixes refer to a masculine singular calf-god, rendered 'his'
  rationale: The Hebrew suffixes are masculine singular, but English can naturally
    render the referent as the cult object/shrine with 'its.' This preserves the prophetic
    irony without implying personal divinity in the idol.
  doctrine_reference: Translation philosophy §3, §6
- issue: Sense of יָגִילוּ in context
  chosen_reading: Contextual lament sense rendered as 'wail.'
  alternative_readings:
  - Literal lexical sense 'rejoice/exult' retained as irony
  rationale: The immediate context is fear, mourning, and loss. Rendering the verb
    as 'wail' communicates the likely discourse sense in modern English, while the
    more literal alternative is preserved in a footnote because the Hebrew form ordinarily
    means rejoicing.
  doctrine_reference: Translation philosophy §1, §3, §6
