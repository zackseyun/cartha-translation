id: HOS.10.5
reference: Hosea 10:5
source:
  edition: WLC
  text: לְ/עֶגְלוֹת֙ בֵּ֣ית אָ֔וֶן יָג֖וּרוּ שְׁכַ֣ן שֹֽׁמְר֑וֹן כִּי אָבַ֨ל עָלָ֜י/ו
    עַמּ֗/וֹ וּ/כְמָרָי/ו֙ עָלָ֣י/ו יָגִ֔ילוּ עַל כְּבוֹד֖/וֹ כִּֽי גָלָ֥ה מִמֶּֽ/נּוּ־־־׃
translation:
  text: The inhabitants of Samaria tremble for the calves of Beth-aven, because its
    people mourn over it, and its idolatrous priests wail over it, over its glory,
    because it has departed from it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beth-aven is a prophetic, polemical name for Bethel, meaning something like
      'house of wickedness' or 'house of vanity.'
    reason: cultural_note
  - marker: b
    text: Or 'its priests rejoice over it'; the Hebrew verb ordinarily means 'rejoice/exult,'
      but here many understand it ironically or in a lament context.
    reason: lexical_alternative
  - marker: c
    text: Or 'it has gone into exile from it' / 'it has been carried away from it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֶגְלוֹת
  chosen: for the calves
  alternatives:
  - because of the calves
  - at the calves
  lexicon: HALOT
  rationale: עֶגְלוֹת is the feminine plural of 'calf,' referring to the calf-images
    associated with the northern cult. The prefixed ל is best taken here in the sense
    'for/because of,' expressing the object/cause of dread rather than destination.
- source_word: בֵּית אָוֶן
  chosen: Beth-aven
  alternatives:
  - Beth-aven (House of Wickedness)
  - Bethel
  lexicon: HALOT
  rationale: The prophet intentionally uses Beth-aven as a polemical renaming of Bethel
    ('house of God') to mean something like 'house of wickedness/vanity.' Since this
    is functioning as a place-name in the text, transliteration is preferred in the
    main text, with the connotation preserved in rationale rather than replacing it
    with Bethel.
- source_word: יָגוּרוּ
  chosen: tremble
  alternatives:
  - fear
  - dread
  lexicon: HALOT
  rationale: גור in the Qal can denote fearing or dreading. 'Tremble' captures the
    emotional force in context, where the people are alarmed over the fate of the
    cult image.
- source_word: שְׁכַן שֹׁמְרוֹן
  chosen: the inhabitants of Samaria
  alternatives:
  - the dwellers of Samaria
  - those who dwell in Samaria
  lexicon: HALOT
  rationale: The singular participle שׁכן functions collectively. English idiom prefers
    the plural collective 'the inhabitants of Samaria.'
- source_word: אָבַל
  chosen: mourn
  alternatives:
  - grieve
  - lament
  lexicon: HALOT
  rationale: אבל denotes mourning, often with public lamentation. 'Mourn' fits the
    cultic-national grief over the loss of the idol.
- source_word: עַמּוֹ
  chosen: its people
  alternatives:
  - his people
  lexicon: HALOT
  rationale: The pronominal suffix refers back to the calf-image/cult center as grammatically
    masculine in context. In English, 'its people' best reflects the ironic attachment
    of the people to the idol/cult object rather than to God.
- source_word: כְמָרָיו
  chosen: its idolatrous priests
  alternatives:
  - its priests
  - its Chemarim-priests
  lexicon: HALOT
  rationale: כמרים refers to pagan or illegitimate cultic priests rather than the
    standard priestly term כֹּהֲנִים. 'Idolatrous priests' makes the distinction clear
    in readable English.
- source_word: יָגִילוּ
  chosen: wail
  alternatives:
  - rejoice
  - exult
  lexicon: HALOT
  rationale: Although גיל commonly means 'rejoice/exult,' in this context that sense
    is difficult because the surrounding verbs describe grief over the idol's loss.
    Many understand the usage ironically or emend in sense; 'wail' conveys the contextual
    meaning in smooth English while preserving the lament setting.
- source_word: כְּבוֹדוֹ
  chosen: its glory
  alternatives:
  - his glory
  - its wealth
  - its splendid image
  lexicon: HALOT
  rationale: כבוד here likely refers to the calf-image as the object of boast/pride,
    the 'glory' of the shrine. 'Its glory' preserves the Hebrew term and the irony
    that their glory is an idol.
- source_word: גָלָה מִמֶּנּוּ
  chosen: it has departed from it
  alternatives:
  - it has gone into exile from it
  - it has been carried away from it
  lexicon: HALOT
  rationale: גלה often means 'go into exile' or 'be carried away.' Here the subject
    is most naturally the shrine's 'glory' (or idol), removed from the people/place.
    'Has departed from it' is idiomatic and preserves the loss motif without over-specifying
    the mechanism.
