id: HOS.10.14
reference: Hosea 10:14
source:
  edition: WLC
  text: וְ/קָ֣אם שָׁאוֹן֮ בְּ/עַמֶּ/ךָ֒ וְ/כָל מִבְצָרֶ֣י/ךָ יוּשַּׁ֔ד כְּ/שֹׁ֧ד שַֽׁלְמַ֛ן
    בֵּ֥ית אַֽרְבֵ֖אל בְּ/י֣וֹם מִלְחָמָ֑ה אֵ֥ם עַל בָּנִ֖ים רֻטָּֽשָׁה־־׃
translation:
  text: The tumult will arise among your people, and all your fortresses will be devastated,
    as Shalman devastated Beth-arbel on the day of battle, when mothers were dashed
    to pieces with their children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shalman may refer to Shalmaneser, but the exact historical identification
      is uncertain.
    reason: alternative_reading
  - marker: b
    text: Or more literally, 'a mother was dashed upon children.' The Hebrew expression
      is terse and graphic.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָאם
  chosen: will arise
  alternatives:
  - will stand up
  - will come
  lexicon: HALOT
  rationale: 'Qal perfect with prefixed conjunction in prophetic discourse functions
    futuristically: a coming event is announced. ''Arise'' preserves the imagery of
    something breaking out or coming upon them.'
- source_word: שָׁאוֹן
  chosen: tumult
  alternatives:
  - uproar
  - din
  - roar
  lexicon: HALOT
  rationale: The noun denotes loud commotion, often associated with battle or destruction.
    'Tumult' fits the military context and reads naturally in modern English.
- source_word: בְּעַמֶּךָ
  chosen: among your people
  alternatives:
  - in your people
  lexicon: HALOT
  rationale: The preposition ב here is best rendered idiomatically as 'among' in English,
    indicating the sphere within which the tumult breaks out.
- source_word: מִבְצָרֶיךָ
  chosen: your fortresses
  alternatives:
  - your strongholds
  - your fortified places
  lexicon: HALOT
  rationale: The noun refers to fortified defensive sites. 'Fortresses' is concise
    and natural, while preserving the military sense.
- source_word: יוּשַּׁד
  chosen: will be devastated
  alternatives:
  - will be plundered
  - will be destroyed
  lexicon: HALOT
  rationale: From שׁדד in a passive form, the sense includes violent despoiling and
    ruin. 'Devastated' captures both plunder and destruction in context.
- source_word: כְּשֹׁד
  chosen: as ... devastated
  alternatives:
  - like the devastation of
  - as in the destruction of
  lexicon: HALOT
  rationale: The comparative phrase introduces a historical analogy. Rendering it
    verbally in English ('as Shalman devastated') produces a clear and natural comparison.
- source_word: שַׁלְמַן
  chosen: Shalman
  alternatives:
  - Shalmaneser
  lexicon: HALOT
  rationale: Per translation philosophy, personal names are transliterated rather
    than interpretively expanded. 'Shalman' reflects the Hebrew form directly; the
    possible identification with Shalmaneser is preserved in a footnote.
- source_word: בֵּית אַרְבֵאל
  chosen: Beth-arbel
  alternatives:
  - Beth Arbel
  lexicon: HALOT
  rationale: A place name, transliterated directly from Hebrew. Hyphenation aids readability
    for English readers.
- source_word: בְּיוֹם מִלְחָמָה
  chosen: on the day of battle
  alternatives:
  - in the day of war
  - at the time of battle
  lexicon: HALOT
  rationale: A straightforward temporal phrase. 'Battle' is more idiomatic than 'war'
    here for a specific military event.
- source_word: אֵם
  chosen: mothers
  alternatives:
  - a mother
  - the mother
  lexicon: HALOT
  rationale: Although morphologically singular, the noun is used generically/class-wise
    in a scene of atrocity. English plural communicates the representative force naturally
    in this context.
- source_word: עַל בָּנִים
  chosen: with their children
  alternatives:
  - upon children
  - on sons
  - over children
  lexicon: HALOT
  rationale: The Hebrew preposition עַל literally means 'upon/on,' but in this violent
    idiom the sense is that mothers were dashed together with or over their children.
    'With their children' communicates the event clearly in idiomatic English while
    preserving the horror.
- source_word: רֻטָּשָׁה
  chosen: were dashed to pieces
  alternatives:
  - were dashed
  - were ripped open
  lexicon: HALOT
  rationale: The passive form of רטש denotes brutal smashing/dashing in warfare. 'Dashed
    to pieces' conveys the severity without unnecessary paraphrase. 'Ripped open'
    is possible in some contexts but less likely here with the mother-children construction.
