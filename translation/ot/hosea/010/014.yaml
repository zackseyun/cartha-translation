theological_decisions:
- issue: Identification of שַׁלְמַן
  chosen_reading: Render as the personal name 'Shalman' without specifying identity.
  alternative_readings:
  - Identify him as Shalmaneser III
  - Identify him as Shalmaneser V
  - Treat as an otherwise unknown ruler
  rationale: The Hebrew text gives the name שַׁלְמַן, but the historical identification
    is uncertain. The translation should preserve the source form rather than resolve
    the historical question in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; translate titles, transliterate names.'
- issue: Force of the final atrocity clause
  chosen_reading: Translate the clause as describing mothers dashed to pieces with
    their children.
  alternative_readings:
  - Translate more literally as 'a mother was dashed upon children'
  - Interpret as mothers dashed while clinging to children
  rationale: The Hebrew is terse and graphic. The chosen rendering preserves the violence
    and likely collective/generic force without over-specifying the mechanics of the
    act.
  doctrine_reference: 'Translation philosophy: preserve theological and textual tension
    rather than resolve it beyond what the source warrants.'
