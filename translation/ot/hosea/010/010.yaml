id: HOS.10.10
reference: Hosea 10:10
source:
  edition: WLC
  text: בְּ/אַוָּתִ֖/י וְ/אֶסֳּרֵ֑/ם וְ/אֻסְּפ֤וּ עֲלֵי/הֶם֙ עַמִּ֔ים בְּ/אָסְרָ֖/ם
    לִ/שְׁתֵּ֥י עינת/ם׃
translation:
  text: When I desire, I will discipline them, and peoples will be gathered against
    them when they are bound for their two iniquities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will chasten them.' The verb can denote corrective discipline.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'for their two iniquities'; possibly 'for their double
      guilt.' The consonantal form has also prompted the alternative reading 'for
      their two eyes,' but that sense fits the context less well.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּאַוָּתִי
  chosen: When I desire
  alternatives:
  - At my desire
  - According to my desire
  - When it is my desire
  lexicon: HALOT
  rationale: The preposition ב plus אַוָּה/אַוָה with 1cs suffix expresses God's will
    or desire as the circumstance for the action. 'When I desire' gives natural English
    while preserving the temporal/volitional sense better than a wooden 'in my desire.'
- source_word: וְאֶסֳּרֵם
  chosen: I will discipline them
  alternatives:
  - I will chasten them
  - I will bind them
  lexicon: HALOT
  rationale: From יסר, commonly 'discipline/chasten/instruct.' Although the consonants
    can suggest a binding-related sense to English readers, the lemma and morphology
    point to יסר, not אסר. 'Discipline' is clear modern English and fits the judgment
    context.
- source_word: וְאֻסְּפוּ עֲלֵיהֶם עַמִּים
  chosen: and peoples will be gathered against them
  alternatives:
  - and nations will be assembled against them
  - and peoples will gather against them
  lexicon: HALOT
  rationale: The passive verbal form with עמים indicates hostile nations/peoples being
    assembled. 'Peoples' preserves the plural collective sense of עַמִּים; 'against
    them' reflects עֲלֵיהֶם in this military/judicial context.
- source_word: בְּאָסְרָם
  chosen: when they are bound
  alternatives:
  - when I bind them
  - in their being bound
  lexicon: HALOT
  rationale: From אסר, 'to bind.' The infinitive construct with suffix after ב can
    be rendered temporally. Given the passive sense of the surrounding clause and
    the object suffix, 'when they are bound' is the most idiomatic English, though
    the Hebrew compactly leaves agency implicit.
- source_word: לִשְׁתֵּי עֵינֹתָם
  chosen: for their two iniquities
  alternatives:
  - for their double guilt
  - for their two eyes
  lexicon: HALOT
  rationale: The ketiv-like form עינתם is widely understood in context as related
    to עון ('iniquity/guilt') rather than literal 'eyes.' The phrase likely refers
    to Israel's twofold guilt, often connected contextually with the two transgressions
    or double culpability. 'Two iniquities' stays close to the form while making sense
    in context.
