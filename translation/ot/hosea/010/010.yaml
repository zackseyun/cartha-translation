theological_decisions:
- issue: Meaning of the final phrase לִשְׁתֵּי עינתם
  chosen_reading: for their two iniquities
  alternative_readings:
  - for their double guilt
  - for their two eyes
  rationale: The literal consonantal form could be read in a way resembling 'their
    eyes,' but the context of judgment and the longstanding interpretive tradition
    strongly favor a sense tied to guilt/iniquity. The translation preserves the numerical
    element ('two') rather than smoothing it away entirely, thus retaining the text's
    rhetorical force without importing a specific doctrinal explanation of what the
    two sins are.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
