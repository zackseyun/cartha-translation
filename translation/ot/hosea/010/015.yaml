id: HOS.10.15
reference: Hosea 10:15
source:
  edition: WLC
  text: כָּ֗כָה עָשָׂ֤ה לָ/כֶם֙ בֵּֽית אֵ֔ל מִ/פְּנֵ֖י רָעַ֣ת רָֽעַתְ/כֶ֑ם בַּ/שַּׁ֕חַר
    נִדְמֹ֥ה נִדְמָ֖ה מֶ֥לֶךְ יִשְׂרָאֵֽל־׃
translation:
  text: Thus Bethel has done to you because of your great evil. At dawn the king of
    Israel will be utterly cut off.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew repeats 'evil' ('the evil of your evil') for emphasis; hence 'your
      great evil.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will surely be destroyed' or 'will be completely silenced.' The Hebrew
      uses an infinitive absolute with the verb for emphasis.
    reason: alternative_reading
lexical_decisions:
- source_word: כָּכָה
  chosen: Thus
  alternatives:
  - So
  - In this way
  lexicon: HALOT
  rationale: Deictic adverb introducing the result or manner of judgment. 'Thus' preserves
    the prophetic tone and concise linkage to the preceding context.
- source_word: עָשָׂה לָכֶם
  chosen: has done to you
  alternatives:
  - has dealt with you this way
  - did to you
  lexicon: HALOT
  rationale: The perfect verb with indirect object naturally yields 'has done to you.'
    Present perfect in English fits the prophetic declaration of completed or certain
    judgment better than a simple past in isolation.
- source_word: בֵּית אֵל
  chosen: Bethel
  alternatives:
  - the house of God
  lexicon: HALOT
  rationale: This is the place name Bethel, not a transparent common-noun phrase in
    context. Transliteration follows the policy to transliterate names.
- source_word: מִפְּנֵי
  chosen: because of
  alternatives:
  - from before
  - on account of
  lexicon: HALOT
  rationale: Here the preposition marks cause or reason for judgment, best rendered
    idiomatically as 'because of.'
- source_word: רָעַת רָעַתְכֶם
  chosen: your great evil
  alternatives:
  - the evil of your evil
  - your utter wickedness
  - your evil wickedness
  lexicon: HALOT
  rationale: The repetition intensifies the noun rather than introducing two distinct
    evils. 'Your great evil' communicates the Hebrew emphatic construction in natural
    English without awkward literalism.
- source_word: בַּשַּׁחַר
  chosen: At dawn
  alternatives:
  - In the morning
  - At daybreak
  lexicon: HALOT
  rationale: Temporal phrase indicating the time or suddenness of the coming destruction.
    'At dawn' is vivid and natural.
- source_word: נִדְמֹה נִדְמָה
  chosen: will be utterly cut off
  alternatives:
  - will surely be destroyed
  - will be completely silenced
  - is cut off, cut off
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the verbal idea.
    In this context of royal downfall, 'utterly cut off' best captures decisive removal/destruction.
    The root can carry senses such as be destroyed, cut off, or silenced; 'cut off'
    fits prophetic judgment language well.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: the king of Israel
  lexicon: HALOT
  rationale: Straightforward construct chain. The article is supplied in English for
    naturalness and specificity.
