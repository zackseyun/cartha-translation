theological_decisions:
- issue: Referent of 'Bethel'
  chosen_reading: Bethel is retained as the cultic center/place standing metonymically
    for the idolatrous regime and its judgment.
  alternative_readings:
  - Bethel as shorthand for the calf-idol itself
  - Bethel as a sarcastic use of the place name alone
  rationale: The Hebrew names the place directly. Rendering it 'Bethel' preserves
    the historical and prophetic force without over-interpreting the metonymy in the
    main text.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    Original-language primacy over translation tradition.'
- issue: Force of the doubled רָעַת
  chosen_reading: An intensive expression rendered 'your great evil.'
  alternative_readings:
  - A more literal but awkward 'the evil of your evil'
  - A stronger dynamic rendering such as 'your utter wickedness'
  rationale: The Hebrew repetition is emphatic. The chosen rendering preserves the
    severity while remaining readable modern English.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
- issue: Sense of נִדְמֹה נִדְמָה
  chosen_reading: 'A prediction of total removal/destruction: ''will be utterly cut
    off.'''
  alternative_readings:
  - '''will surely be destroyed'''
  - '''will be completely silenced'''
  rationale: The verb דמה in Niphal can denote being destroyed or cut off; the infinitive
    absolute intensifies the certainty. 'Utterly cut off' preserves both the judgment
    motif and the emphatic form without importing extra theology.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Original-language primacy over translation tradition.'
