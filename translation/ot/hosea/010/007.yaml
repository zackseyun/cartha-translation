id: HOS.10.7
reference: Hosea 10:7
source:
  edition: WLC
  text: נִדְמֶ֥ה שֹׁמְר֖וֹן מַלְכָּ֑/הּ כְּ/קֶ֖צֶף עַל פְּנֵי מָֽיִם־־׃
translation:
  text: Samaria is cut off, with her king like foam on the surface of the waters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Samaria is destroyed'; the Hebrew verb may denote being brought to an
      end, destroyed, or silenced.
    reason: lexical_alternative
  - marker: b
    text: Or 'like a chip on the surface of the waters'; some understand the image
      as a small piece of wood or debris floating helplessly.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִדְמֶה
  chosen: is cut off
  alternatives:
  - is destroyed
  - is silenced
  - has perished
  lexicon: HALOT
  rationale: The Niphal of דמה here most plausibly carries the sense of being brought
    to an end or cut off. In context, the following mention of Samaria's king being
    like foam on water favors political annihilation rather than mere silence. 'Is
    cut off' is concise, idiomatic, and preserves the image of sudden removal.
- source_word: שֹׁמְרוֹן
  chosen: Samaria
  rationale: Standard transliteration of the place name, referring to the capital
    and by extension the northern kingdom.
- source_word: מַלְכָּהּ
  chosen: her king
  alternatives:
  - its king
  rationale: The pronominal suffix is feminine singular, agreeing with the city Samaria
    as a feminine entity. English may render a city with either 'her' or 'its'; 'her
    king' preserves the personified feminine force of the Hebrew.
- source_word: כְּקֶצֶף
  chosen: like foam
  alternatives:
  - like a chip
  - like froth
  lexicon: HALOT
  rationale: קֶצֶף commonly denotes foam or froth. Some interpreters understand a
    small splinter or chip floating on water from contextual comparison, but the lexical
    base supports 'foam' well, and it conveys instability and transience.
- source_word: עַל פְּנֵי מָיִם
  chosen: on the surface of the waters
  alternatives:
  - upon the face of the waters
  - on the water
  lexicon: HALOT
  rationale: The idiom literally means 'on the face of the waters.' 'On the surface
    of the waters' is natural modern English while retaining the image of something
    insubstantial carried away.
