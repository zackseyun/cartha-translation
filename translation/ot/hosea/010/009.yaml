id: HOS.10.9
reference: Hosea 10:9
source:
  edition: WLC
  text: מִ/ימֵי֙ הַ/גִּבְעָ֔ה חָטָ֖אתָ יִשְׂרָאֵ֑ל שָׁ֣ם עָמָ֔דוּ לֹֽא תַשִּׂיגֵ֧/ם
    בַּ/גִּבְעָ֛ה מִלְחָמָ֖ה עַל בְּנֵ֥י עַֽלְוָֽה־־׃
translation:
  text: From the days of Gibeah you have sinned, O Israel; there they have remained.
    Will not war at Gibeah overtake them, against the children of iniquity?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The war against the children of iniquity in Gibeah did not overtake
      them,' or, 'shall not overtake them.' The Hebrew of this clause is difficult.
    reason: alternative_reading
  - marker: b
    text: Gibeah recalls the outrage and civil war in Judges 19–21, which Hosea uses
      as a paradigm of Israel's deep-rooted corruption.
    reason: cross_reference
lexical_decisions:
- source_word: מִימֵי
  chosen: From the days of
  alternatives:
  - Since the days of
  lexicon: HALOT
  rationale: Temporal preposition מן with יָמִים expresses a starting point in time.
    'From the days of' is a natural, fairly formal rendering that preserves the allusion
    to an earlier historical period.
- source_word: הַגִּבְעָה
  chosen: Gibeah
  alternatives:
  - the Gibeah
  lexicon: HALOT
  rationale: Proper place name, transliterated per translation philosophy. The article
    is retained in Hebrew idiomatically with place names and is not normally represented
    in English.
- source_word: חָטָאתָ
  chosen: you have sinned
  alternatives:
  - you sinned
  - you have been sinning
  lexicon: HALOT
  rationale: Qal perfect 2ms of חטא addressed to Israel as a singular corporate entity.
    'You have sinned' preserves the direct accusation and allows the perfect to carry
    present relevance.
- source_word: יִשְׂרָאֵל
  chosen: O Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: Vocative force is clear from the direct address. 'O Israel' reflects
    prophetic style in readable English.
- source_word: שָׁם
  chosen: there
  alternatives:
  - in that place
  lexicon: HALOT
  rationale: Simple locative adverb, likely pointing back to Gibeah and/or the moral
    stance associated with it.
- source_word: עָמָדוּ
  chosen: they have remained
  alternatives:
  - they stood
  - they have stood fast
  - they persisted
  lexicon: HALOT
  rationale: עמד literally means 'stand,' but in context likely conveys continuing
    persistence in the same condition or posture. 'They have remained' preserves the
    durative/resultative sense without over-paraphrasing.
- source_word: לֹא תַשִּׂיגֵם
  chosen: Will not ... overtake them
  alternatives:
  - shall not ... overtake them
  - did not ... overtake them
  lexicon: HALOT
  rationale: 'נשׂג in Hiphil commonly means ''overtake, reach.'' Given the syntax
    and prophetic rhetoric, an interrogative sense fits well: ''Will not war ... overtake
    them?'' This preserves the force of the הלא-type rhetorical expectation even though
    the particle is simply לֹא in the consonantal text; English idiom benefits from
    the rhetorical question.'
- source_word: בַּגִּבְעָה
  chosen: at Gibeah
  alternatives:
  - in Gibeah
  - against Gibeah
  lexicon: HALOT
  rationale: Bet with place name is most naturally locative. 'At Gibeah' works well
    with 'war' in English.
- source_word: מִלְחָמָה
  chosen: war
  alternatives:
  - battle
  lexicon: HALOT
  rationale: The noun denotes warfare/battle. 'War' better matches the broader historical
    allusion to the conflict in Judges 19–21.
- source_word: עַל
  chosen: against
  alternatives:
  - upon
  - concerning
  lexicon: HALOT
  rationale: With מלחמה, על commonly marks the object or target of hostile action.
    'Against' is the clearest English equivalent here.
- source_word: בְּנֵי עַלְוָה
  chosen: the children of iniquity
  alternatives:
  - the sons of wickedness
  - the sons of injustice
  - evildoers
  lexicon: HALOT
  rationale: A construct expression meaning people characterized by moral perversity.
    'Children of iniquity' preserves the Hebrew idiom and prophetic tone better than
    the flatter 'evildoers.'
