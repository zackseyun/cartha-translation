theological_decisions:
- issue: Interpretation of the difficult clause לֹא תַשִּׂיגֵם בַּגִּבְעָה מִלְחָמָה
    עַל בְּנֵי עַלְוָה
  chosen_reading: 'Rendered as a rhetorical question: ''Will not war at Gibeah overtake
    them, against the children of iniquity?'''
  alternative_readings:
  - '''The war against the children of iniquity in Gibeah did not overtake them'''
  - '''War in Gibeah against the children of iniquity shall not overtake them'''
  rationale: 'The Hebrew clause is syntactically difficult and has been understood
    in multiple ways. The chosen reading best fits the prophetic flow: Israel has
    persisted in the sin associated with Gibeah, and therefore judgment will indeed
    catch up with them. This preserves the warning without importing a more specific
    doctrinal claim than the text warrants.'
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather
    than resolve it'
