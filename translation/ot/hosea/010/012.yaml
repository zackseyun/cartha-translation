theological_decisions:
- issue: Meaning of וְיֹרֶה צֶדֶק
  chosen_reading: 'The clause continues the agricultural metaphor: the LORD ''rains
    righteousness'' on his people.'
  alternative_readings:
  - the LORD 'teaches righteousness' to you
  rationale: The immediate context is dominated by sowing, reaping, and breaking up
    ground, making precipitation imagery the most coherent reading. At the same time,
    the verb ירה can mean 'teach/instruct,' so the alternative should be preserved
    in a footnote rather than erased.
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity and preserve alternatives in footnotes.
