id: HOS.10.12
reference: Hosea 10:12
source:
  edition: WLC
  text: זִרְע֨וּ לָ/כֶ֤ם לִ/צְדָקָה֙ קִצְר֣וּ לְ/פִי חֶ֔סֶד נִ֥ירוּ לָ/כֶ֖ם נִ֑יר
    וְ/עֵת֙ לִ/דְר֣וֹשׁ אֶת יְהוָ֔ה עַד יָב֕וֹא וְ/יֹרֶ֥ה צֶ֖דֶק לָ/כֶֽם־־־׃
translation:
  text: Sow for yourselves for righteousness; reap according to steadfast love. Break
    up for yourselves unplowed ground, for it is time to seek the LORD, until he comes
    and rains righteousness on you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fallow ground.'
    reason: lexical_alternative
  - marker: b
    text: Or 'until he comes and teaches you righteousness.' The Hebrew verb can mean
      'teach,' but the farming imagery in this verse favors 'rains.'
    reason: alternative_reading
lexical_decisions:
- source_word: זִרְעוּ
  chosen: Sow
  alternatives:
  - Plant
  lexicon: HALOT
  rationale: Qal imperative plural of זרע, an agricultural metaphor introducing moral
    exhortation. 'Sow' preserves the metaphor more directly than 'plant.'
- source_word: לָכֶם
  chosen: for yourselves
  alternatives:
  - for you
  lexicon: HALOT
  rationale: The preposition with 2mp pronoun has reflexive-benefactive force in this
    sequence of imperatives; 'for yourselves' brings out the personal responsibility
    and benefit.
- source_word: לִצְדָקָה
  chosen: for righteousness
  alternatives:
  - in righteousness
  - for justice
  lexicon: HALOT
  rationale: 'The lamed here is best taken as indicating goal/result: sow with a view
    to righteousness. ''Righteousness'' fits the moral-religious sense and aligns
    with the verse''s closing use of צדק/צדקה language. ''Justice'' is possible but
    less fitting in this agricultural-moral parallelism.'
- source_word: קִצְרוּ
  chosen: reap
  alternatives:
  - harvest
  lexicon: HALOT
  rationale: Qal imperative plural of קצר. 'Reap' keeps the tight agricultural parallel
    with 'sow.'
- source_word: לְפִי חֶסֶד
  chosen: according to steadfast love
  alternatives:
  - according to mercy
  - in proportion to covenant loyalty
  - according to kindness
  lexicon: HALOT
  rationale: לפי means 'according to/in proportion to.' חסד is theologically rich;
    'steadfast love' is the standard English rendering that preserves covenantal warmth
    without flattening it to mere emotion. The phrase likely means the harvest corresponds
    to covenantal mercy/loyal love.
- source_word: נִירוּ
  chosen: Break up
  alternatives:
  - Plow
  lexicon: HALOT
  rationale: Imperative from ניר/נור in the sense of tilling or breaking ground. 'Break
    up' is idiomatic in English for this prophetic metaphor and pairs naturally with
    'unplowed ground.'
- source_word: נִיר
  chosen: unplowed ground
  alternatives:
  - fallow ground
  - new ground
  lexicon: HALOT
  rationale: The noun denotes freshly tilled or untilled/fallow land. 'Unplowed ground'
    is clear modern English; 'fallow ground' is traditional and viable, but slightly
    less transparent for contemporary readers.
- source_word: וְעֵת לִדְרוֹשׁ
  chosen: for it is time to seek
  alternatives:
  - and it is time to seek
  - now is the time to seek
  lexicon: HALOT
  rationale: The conjunction plus noun phrase is idiomatically rendered as an explanatory
    clause in English. 'For it is time' connects the command to its urgency.
- source_word: אֶת יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' 'Seek the LORD' is the standard
    covenantal idiom.
- source_word: עַד יָבֹא
  chosen: until he comes
  alternatives:
  - until he may come
  lexicon: HALOT
  rationale: The clause expresses the duration of seeking up to divine arrival. The
    subject is naturally the LORD from the preceding clause.
- source_word: וְיֹרֶה
  chosen: and rains
  alternatives:
  - and teaches
  - and sends rain
  lexicon: HALOT
  rationale: Though ירה in Hiphil can mean 'teach,' in this agricultural context and
    with the object 'righteousness' the imagery strongly favors 'rain/pour down.'
    This preserves the farming metaphor running through the verse. The alternative
    'teach' is worth preserving in a footnote because of the verb's semantic range
    and some translation history.
- source_word: צֶדֶק
  chosen: righteousness
  alternatives:
  - justice
  lexicon: HALOT
  rationale: The noun here matches the earlier צדקה field and is best rendered 'righteousness'
    in this moral-covenantal context. 'Justice' is possible but less likely as the
    image is of divine bestowal corresponding to covenant restoration.
- source_word: לָכֶם
  chosen: on you
  alternatives:
  - for you
  - upon you
  lexicon: HALOT
  rationale: With the rain metaphor, English idiom prefers 'rains righteousness on
    you.' This is a context-driven adjustment from the more literal 'for you.'
