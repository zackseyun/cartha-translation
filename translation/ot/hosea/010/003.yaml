id: HOS.10.3
reference: Hosea 10:3
source:
  edition: WLC
  text: כִּ֤י עַתָּה֙ יֹֽאמְר֔וּ אֵ֥ין מֶ֖לֶךְ לָ֑/נוּ כִּ֣י לֹ֤א יָרֵ֨אנוּ֙ אֶת יְהֹוָ֔ה וְ/הַ/מֶּ֖לֶךְ מַה יַּֽעֲשֶׂה לָּֽ/נוּ־־־׃
translation:
  text: For now they will say, “We have no king, because we did not fear Yahweh; and the king—what can he do for us?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because we do not fear the LORD' or 'because we have not feared the LORD.' The Hebrew perfect may describe either their settled condition or their culpable past failure.
    reason: lexical_alternative
  - marker: b
    text: Or, 'what will he do for us?' The Hebrew form is formally future; the main text renders the rhetorical sense of inability.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Here the conjunction introduces an explanation of the coming situation, best rendered idiomatically as 'For' at the head of the sentence. The second כִּי later in the verse is rendered 'because' to mark explicit causation.
- source_word: עַתָּה
  chosen: now
  alternatives:
  - at this time
  lexicon: HALOT
  rationale: Temporal adverb indicating the present or imminent situation. 'Now' is concise and natural in English.
- source_word: יֹאמְרוּ
  chosen: they will say
  alternatives:
  - they say
  - they shall say
  lexicon: HALOT
  rationale: 'Imperfect 3mp is best taken here as future/predictive in prophetic discourse: the people will come to this confession.'
- source_word: אֵין מֶלֶךְ לָנוּ
  chosen: We have no king
  alternatives:
  - There is no king for us
  - There is no king over us
  lexicon: HALOT
  rationale: English idiom favors 'We have no king.' This preserves the existential force of אֵין while sounding natural.
- source_word: כִּי לֹא יָרֵאנוּ אֶת יְהוָה
  chosen: because we did not fear the LORD
  alternatives:
  - because we do not fear the LORD
  - because we have not feared the LORD
  lexicon: HALOT
  rationale: The perfect יָרֵאנוּ can be rendered as a completed reality explaining their condition. 'Did not fear' communicates their culpable failure. 'Fear' is retained rather than softened to 'revere' because covenantal awe and obedience are in view.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְהַמֶּלֶךְ
  chosen: and the king
  alternatives:
  - as for the king
  - but the king
  lexicon: HALOT
  rationale: The conjunction plus article introduces a further clause about the king's impotence. 'And the king' is straightforward; the dash in English helps reflect the abrupt rhetorical turn.
- source_word: מַה יַּעֲשֶׂה לָּנוּ
  chosen: what can he do for us?
  alternatives:
  - what will he do for us?
  - what could a king do for us?
  lexicon: HALOT
  rationale: Although the Hebrew imperfect is formally future ('what will he do'), in this rhetorical question the sense is one of ability or practical effect. 'What can he do for us?' best conveys the king's powerlessness in context.
