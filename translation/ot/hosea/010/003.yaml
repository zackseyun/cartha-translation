theological_decisions:
- issue: Meaning of 'fear the LORD'
  chosen_reading: Retain 'fear the LORD' in the main text
  alternative_readings:
  - revere the LORD
  rationale: The Hebrew ירא in covenant contexts includes reverence, awe, and obedient submission, but 'fear' is the more direct and theologically weighty rendering. Softening it to 'revere' would reduce the force of Hosea's indictment.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
