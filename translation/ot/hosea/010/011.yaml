id: HOS.10.11
reference: Hosea 10:11
source:
  edition: WLC
  text: וְ/אֶפְרַ֜יִם עֶגְלָ֤ה מְלֻמָּדָה֙ אֹהַ֣בְתִּי לָ/ד֔וּשׁ וַ/אֲנִ֣י עָבַ֔רְתִּי
    עַל ט֖וּב צַוָּארָ֑/הּ אַרְכִּ֤יב אֶפְרַ֨יִם֙ יַחֲר֣וֹשׁ יְהוּדָ֔ה יְשַׂדֶּד ל֖/וֹ
    יַעֲקֹֽב־־׃
translation:
  text: Ephraim was a trained heifer that loved to thresh; but I spared her fair neck.
    I will put Ephraim to the yoke; Judah will plow; Jacob will harrow for him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'but I passed over her lovely neck.' The Hebrew of this clause is difficult;
      the main text reflects the sense that Ephraim had previously been spared the
      heavier burden.
    reason: alternative_reading
  - marker: b
    text: Or, 'I will harness Ephraim.' Literally, 'I will cause Ephraim to ride,'
      likely an idiom for putting the animal under harness or yoke.
    reason: lexical_alternative
  - marker: c
    text: '''Harrow'' refers to breaking up and smoothing the soil after plowing;
      alternatively, ''break up the clods.'''
    reason: cultural_note
lexical_decisions:
- source_word: עֶגְלָה מְלֻמָּדָה
  chosen: a trained heifer
  alternatives:
  - a taught heifer
  - a broken-in heifer
  lexicon: HALOT
  rationale: The phrase depicts Ephraim as a young cow accustomed to work. 'Trained'
    is natural English and preserves the agricultural image without over-paraphrasing.
- source_word: אֹהַבְתִּי לָדוּשׁ
  chosen: that loved to thresh
  alternatives:
  - loving to thresh
  - fond of threshing
  lexicon: HALOT
  rationale: The participial/adjectival sense with infinitive expresses habitual delight
    in threshing, a comparatively easier task for cattle. 'Loved to thresh' preserves
    both the affection nuance and the activity.
- source_word: וַאֲנִי עָבַרְתִּי עַל טוּב צַוָּארָהּ
  chosen: but I spared her fair neck
  alternatives:
  - and I passed over the goodness of her neck
  - but I passed over her lovely neck
  - but I had regard for the beauty of her neck
  lexicon: HALOT
  rationale: The Hebrew is idiomatic and difficult. In context, the sense is that
    God did not yet place the harder burden on Ephraim's neck. 'Spared her fair neck'
    captures the compassionate restraint implied by עבר על plus the positive description
    טוב צוארה, while remaining concise and readable.
- source_word: אַרְכִּיב אֶפְרַיִם
  chosen: I will put Ephraim to the yoke
  alternatives:
  - I will make Ephraim ride
  - I will harness Ephraim
  - I will mount Ephraim
  lexicon: HALOT
  rationale: The Hiphil of רכב literally involves causing to ride, but in this farming
    context it refers to harnessing for labor. 'Put ... to the yoke' makes the implied
    image explicit in idiomatic English.
- source_word: יַחֲרֹשׁ
  chosen: will plow
  alternatives:
  - shall plow
  lexicon: HALOT
  rationale: Standard agricultural sense; future in context of announced judgment/labor.
- source_word: יְשַׂדֶּד
  chosen: will harrow
  alternatives:
  - will break up the clods
  - will level the ground
  lexicon: HALOT
  rationale: The verb refers to secondary tillage after plowing. 'Harrow' is the most
    precise concise English equivalent, though less common; alternatives are preserved
    in a footnote for readability.
- source_word: לּוֹ יַעֲקֹב
  chosen: Jacob will harrow for him
  alternatives:
  - Jacob will harrow for himself
  - Jacob will break clods for him
  lexicon: HALOT
  rationale: The pronominal suffix likely refers back to Judah, with Jacob functioning
    as a collective parallel to Ephraim/Judah. 'For him' preserves the Hebrew suffix
    without over-resolving the relationship.
