theological_decisions:
- issue: Metaphorical portrayal of Ephraim, Judah, and Jacob in agricultural labor
  chosen_reading: The verse is rendered as an image of God moving Ephraim from easier
    work to harder imposed labor, with Judah and Jacob likewise assigned field work.
  alternative_readings:
  - The verse may be read more softly as a mere description of agricultural roles
    rather than punitive yoking.
  - Some construe the middle clause less as sparing and more as passing over or approaching
    Ephraim's neck.
  rationale: The immediate context in Hosea 10 is judgment and summons to repentance.
    The agricultural metaphors should therefore retain their disciplinary force without
    importing later doctrinal categories.
  doctrine_reference: Preserve theological tension rather than resolve it.
