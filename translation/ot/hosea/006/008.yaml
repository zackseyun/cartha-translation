id: HOS.6.8
reference: Hosea 6:8
source:
  edition: WLC
  text: גִּלְעָ֕ד קִרְיַ֖ת פֹּ֣עֲלֵי אָ֑וֶן עֲקֻבָּ֖ה מִ/דָּֽם׃
translation:
  text: Gilead is a city of evildoers, tracked with blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'stained with blood,' 'marked by blood,' or more literally 'tracked from
      blood.' The Hebrew expression is rare and difficult.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּלְעָד
  chosen: Gilead
  alternatives:
  - Gilad
  lexicon: HALOT
  rationale: Proper place name; transliterated per philosophy rather than translated.
- source_word: קִרְיַת
  chosen: city of
  alternatives:
  - town of
  - city
  lexicon: HALOT
  rationale: Construct form before the following participial phrase; 'city of' is
    the natural English rendering.
- source_word: פֹּעֲלֵי אָוֶן
  chosen: evildoers
  alternatives:
  - workers of iniquity
  - doers of wickedness
  lexicon: HALOT
  rationale: The participle plus אָוֶן denotes those who practice wickedness. 'Evildoers'
    is concise, idiomatic, and preserves the moral force without archaic diction.
- source_word: אָוֶן
  chosen: evil
  alternatives:
  - iniquity
  - wickedness
  lexicon: HALOT
  rationale: Within the compound expression פֹּעֲלֵי אָוֶן, the sense is moral evil/wickedness.
    This is represented in the English collective 'evildoers'.
- source_word: עֲקֻבָּה
  chosen: tracked
  alternatives:
  - stained
  - marked
  - heel-printed
  - devious
  lexicon: HALOT
  rationale: This rare adjective/passive form is difficult. In context with מִדָּם
    ('with blood/from blood'), it most plausibly describes Gilead as bearing bloody
    tracks or marks. 'Tracked' preserves the imagery of footprints/traces better than
    the more interpretive 'stained,' while remaining readable.
- source_word: מִדָּם
  chosen: with blood
  alternatives:
  - from blood
  - by blood
  - bloody
  lexicon: HALOT
  rationale: The preposition מִן after עֲקֻבָּה is idiomatically difficult. 'With
    blood' gives the likely sense of something marked or tracked by blood. A more
    literal 'from blood' is possible but unclear in English.
