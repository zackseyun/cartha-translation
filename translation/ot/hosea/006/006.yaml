theological_decisions:
- issue: Whether the verse rejects sacrifice absolutely or comparatively
  chosen_reading: comparative preference for covenant loyalty and true knowledge of
    God over mere ritual sacrifice
  alternative_readings:
  - absolute rejection of the sacrificial system
  rationale: The Hebrew contrasts desired covenantal realities with sacrificial observance
    using negation and comparative מ. In prophetic idiom this commonly prioritizes
    inward covenant faithfulness over empty ritual rather than denying sacrifices
    in every legitimate sense.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
