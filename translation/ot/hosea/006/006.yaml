id: HOS.6.6
reference: Hosea 6:6
source:
  edition: WLC
  text: כִּ֛י חֶ֥סֶד חָפַ֖צְתִּי וְ/לֹא זָ֑בַח וְ/דַ֥עַת אֱלֹהִ֖ים מֵ/עֹלֽוֹת־׃
translation:
  text: For I desire steadfast love and not sacrifice, and the knowledge of God rather
    than burnt offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'mercy' or 'loyal love' for 'steadfast love' (Hebrew חֶסֶד), a term that
      can include covenant faithfulness as well as mercy.
    reason: lexical_alternative
  - marker: b
    text: 'Literally ''from burnt offerings''; here the Hebrew expresses preference:
      ''rather than burnt offerings'' or ''more than burnt offerings.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces the ground or explanation for the preceding rebuke/promise
    context. 'For' best preserves the explanatory force in natural English.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - mercy
  - loyal love
  - covenant faithfulness
  lexicon: HALOT
  rationale: חֶסֶד carries covenantal loyalty and faithful love, not mere sentiment.
    'Steadfast love' is established, readable English that preserves both affection
    and constancy better than 'mercy' in this context.
- source_word: חָפַצְתִּי
  chosen: I desire
  alternatives:
  - I delight in
  - I take pleasure in
  lexicon: HALOT
  rationale: The verb denotes taking pleasure in or desiring. 'I desire' fits the
    contrast with sacrifice and burnt offerings and sounds idiomatic in direct divine
    speech.
- source_word: זָבַח
  chosen: sacrifice
  alternatives:
  - slaughter offering
  lexicon: HALOT
  rationale: Generic sacrificial term contrasted with the more specific 'burnt offerings'
    in the second colon. 'Sacrifice' preserves the broad cultic sense.
- source_word: דַעַת אֱלֹהִים
  chosen: the knowledge of God
  alternatives:
  - knowledge of God
  - knowing God
  lexicon: HALOT
  rationale: The construct phrase denotes relational and covenantal knowledge, not
    mere information. 'The knowledge of God' preserves the nominal parallelism with
    'steadfast love' and the Hebrew syntax.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: Here the referent is the God of Israel in a generic divine title, not
    the Tetragrammaton; therefore 'God' is correct rather than 'the LORD'.
- source_word: מֵעֹלוֹת
  chosen: rather than burnt offerings
  alternatives:
  - more than burnt offerings
  - instead of burnt offerings
  lexicon: HALOT
  rationale: 'The prefixed מ in this comparative construction expresses preference:
    one thing is desired over another. ''Rather than'' communicates the comparison
    clearly in English without implying absolute abolition of sacrifice.'
- source_word: עֹלוֹת
  chosen: burnt offerings
  alternatives:
  - whole burnt offerings
  lexicon: HALOT
  rationale: Standard cultic term for offerings wholly consumed on the altar. 'Burnt
    offerings' is the clearest conventional rendering.
