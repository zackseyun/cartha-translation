id: HOS.6.11
reference: Hosea 6:11
source:
  edition: WLC
  text: גַּם יְהוּדָ֕ה שָׁ֥ת קָצִ֖יר לָ֑/ךְ בְּ/שׁוּבִ֖/י שְׁב֥וּת עַמִּֽ/י־׃פ
translation:
  text: Also, Judah, a harvest is appointed for you, when I restore the fortunes of
    my people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a harvest has been set for you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'when I return the captivity of my people.' The Hebrew expression can
      also mean 'when I restore the fortunes of my people.'
    reason: alternative_reading
lexical_decisions:
- source_word: גַּם
  chosen: Also
  alternatives:
  - Even
  - Moreover
  lexicon: HALOT
  rationale: Adds Judah to the preceding indictment; 'Also' is natural modern English
    and preserves the additive force.
- source_word: יְהוּדָה
  chosen: Judah
  lexicon: HALOT
  rationale: Proper name for the southern kingdom/people; transliterated as a standard
    English biblical name.
- source_word: שָׁת
  chosen: is appointed
  alternatives:
  - has set
  - has placed
  - has prepared
  lexicon: HALOT
  rationale: From שׁית/שׂים 'to set, place.' With 'harvest' as object and second-person
    suffix following, the sense is that a harvest has been set or fixed for Judah.
    'Is appointed' brings out the idiomatic force in context better than a wooden
    'has set,' while remaining close to the Hebrew.
- source_word: קָצִיר
  chosen: a harvest
  alternatives:
  - harvest
  - reaping
  lexicon: HALOT
  rationale: Basic sense is 'harvest.' The indefinite English article is natural though
    not explicit in Hebrew. The metaphor likely carries judgment overtones in context,
    but the noun itself should remain simply 'harvest' in the main text.
- source_word: לָךְ
  chosen: for you
  alternatives:
  - for yourself
  - to you
  lexicon: HALOT
  rationale: Second feminine singular suffix agrees with Judah as a grammatically
    feminine entity; English idiom uses 'for you.'
- source_word: בְּשׁוּבִי
  chosen: when I restore
  alternatives:
  - when I return
  - in my turning back
  lexicon: HALOT
  rationale: The infinitive construct with first-person suffix from שוב can be rendered
    literally 'in my returning.' In the collocation with 'the fortunes/captivity of
    my people,' idiomatic English is 'when I restore.' This reflects the common restoration
    formula without over-literal awkwardness.
- source_word: שְׁבוּת
  chosen: the fortunes of
  alternatives:
  - the captivity of
  - the restoration of
  lexicon: HALOT
  rationale: In prophetic restoration formulas, שְׁבוּת often functions idiomatically
    for reversal of plight/restoration of fortunes, not only literal captivity. 'Fortunes'
    is the most natural English rendering here, while 'captivity' is preserved in
    a footnote because it remains a traditional and possible formal alternative.
- source_word: עַמִּי
  chosen: my people
  lexicon: HALOT
  rationale: Standard covenantal expression; straightforwardly rendered.
