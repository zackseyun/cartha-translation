theological_decisions:
- issue: Whether 'harvest' should be interpreted positively or negatively in the main
    text
  chosen_reading: Retain the metaphor as 'a harvest' without specifying blessing or
    judgment
  alternative_readings:
  - a harvest of judgment
  - a harvest of blessing/restoration
  rationale: The immediate context in Hosea 6–8 leans strongly toward judgment, so
    many interpreters hear an ominous harvest. However, the following clause about
    restoring the fortunes of God's people introduces restorative language. To preserve
    the text's tension rather than resolve it interpretively, the main text leaves
    the metaphor unqualified.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
