theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse addresses Israel's covenant God by the Tetragrammaton. Per
    project doctrine, the default rendering is 'the LORD,' not a transliteration,
    unless context strongly requires otherwise.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Force of וְיָבֹוא
  chosen_reading: predictive future ('he will come')
  alternative_readings:
  - jussive/prayer-like ('may he come' / 'let him come')
  rationale: 'The sequence presents confident assurance: his going forth is certain
    as dawn, and his coming is like dependable rain. A future indicative best preserves
    that assurance without turning the line into a petition.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological
    tension rather than resolve it'
- issue: Meaning of covenantal ידע
  chosen_reading: know
  alternative_readings:
  - acknowledge
  rationale: The verse calls for relational covenant knowledge of the LORD, not mere
    intellectual awareness. 'Know' preserves the theological depth and leaves the
    relational dimension intact without over-explaining in the main text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #6'
