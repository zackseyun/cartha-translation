id: HOS.6.7
reference: Hosea 6:7
source:
  edition: WLC
  text: וְ/הֵ֕מָּה כְּ/אָדָ֖ם עָבְר֣וּ בְרִ֑ית שָׁ֖ם בָּ֥גְדוּ בִֽ/י׃
translation:
  text: But they, like Adam, transgressed the covenant; there they dealt faithlessly
    with me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'like man' or 'like humankind.' The Hebrew אָדָם can refer either to
      Adam personally or to humanity in general.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהֵמָּה
  chosen: But they
  alternatives:
  - And they
  - Yet they
  lexicon: HALOT
  rationale: The pronoun is emphatic ('they'), and the conjunction can be rendered
    adversatively in context after the preceding positive description, so 'But they'
    best captures the contrast.
- source_word: כְּאָדָם
  chosen: like Adam
  alternatives:
  - like man
  - like humankind
  lexicon: HALOT
  rationale: אָדָם can denote the personal name Adam or humanity/man generically.
    Because the phrase 'transgressed the covenant' naturally evokes the primal covenantal
    breach associated with Adam, the proper-name reading is adopted in the main text.
    The generic alternative is preserved in a footnote due to genuine interpretive
    ambiguity and the doctrine's instruction to preserve tension where the source
    is ambiguous.
- source_word: עָבְרוּ
  chosen: transgressed
  alternatives:
  - crossed over
  - violated
  - broke
  lexicon: HALOT
  rationale: With בְּרִית ('covenant') as object, the verb carries the sense of overstepping
    or violating covenantal bounds. 'Transgressed' preserves both the literal force
    and covenantal/theological weight better than the flatter 'broke'.
- source_word: בְרִית
  chosen: the covenant
  alternatives:
  - a covenant
  lexicon: HALOT
  rationale: Although formally anarthrous in Hebrew, English idiom and the covenantal
    context favor a definite rendering. 'The covenant' communicates a specific covenant
    relationship with God rather than an indefinite agreement.
- source_word: שָׁם
  chosen: there
  alternatives:
  - then
  lexicon: HALOT
  rationale: The adverb normally means 'there.' Some take it temporally ('then') or
    rhetorically, but the locative sense is retained in the main text as the more
    straightforward lexical value; its precise referent remains implicit.
- source_word: בָּגְדוּ
  chosen: dealt faithlessly
  alternatives:
  - acted treacherously
  - were unfaithful
  - betrayed
  lexicon: HALOT
  rationale: The verb denotes treachery or faithless betrayal, often in covenant contexts.
    'Dealt faithlessly' is natural English and preserves the covenantal nuance without
    sounding overly archaic.
- source_word: בִי
  chosen: with me
  alternatives:
  - against me
  lexicon: HALOT
  rationale: With בגד, the preposition can be represented idiomatically in English
    as 'with' ('deal faithlessly with'). 'Against me' is possible, but 'with me' better
    matches the verbal collocation in English while preserving the personal object.
