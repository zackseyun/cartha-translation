theological_decisions:
- issue: Interpretation of כְּאָדָם in a covenant context
  chosen_reading: like Adam
  alternative_readings:
  - like man
  - like humankind
  rationale: The verse is famously debated. Rendering the term as the personal name
    'Adam' preserves a plausible intertextual link to humanity's first covenantal
    breach and fits the singular lexical form without adding words. Because the Hebrew
    can also mean humanity generically, the alternative is preserved in a footnote
    rather than suppressed.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3; Contested terms table
    for אָדָם'
