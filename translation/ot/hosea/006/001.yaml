theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse directly addresses Israel's covenant God by the tetragrammaton.
    Following the project's doctrine, the main text uses 'the LORD' rather than a
    transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Aspect and sequence of divine judgment and restoration
  chosen_reading: Translate the first pair as past injury ('has torn us,' 'has struck
    us') and the second pair as future restoration ('he will heal us,' 'he will bind
    us up')
  alternative_readings:
  - 'All four as future: ''he will tear... he will heal'''
  - More strictly coordinate with 'and' rather than adversative 'but'
  rationale: The verse invites return on the basis that the same God who has inflicted
    covenant judgment is expected to restore. This preserves the theological tension
    of divine wounding and healing without softening either side. English adversative
    'but' clarifies the contrast inherent in the Hebrew parallelism without importing
    extra doctrine.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension
    rather than resolve it
