id: HOS.6.1
reference: Hosea 6:1
source:
  edition: WLC
  text: לְכוּ֙ וְ/נָשׁ֣וּבָה אֶל יְהוָ֔ה כִּ֛י ה֥וּא טָרָ֖ף וְ/יִרְפָּאֵ֑/נוּ יַ֖ךְ
    וְ/יַחְבְּשֵֽׁ/נוּ־׃
translation:
  text: Come, let us return to the LORD, for he has torn us, but he will heal us;
    he has struck us, but he will bind us up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and he will heal us ... and he will bind us up'; the Hebrew conjunction
      is simply 'and,' but English 'but' makes the contrast clearer.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'has torn' evokes the image of an animal tearing prey, underscoring
      the severity of the LORD's judgment.
    reason: cultural_note
lexical_decisions:
- source_word: לְכוּ
  chosen: Come
  alternatives:
  - Go
  - Come on
  lexicon: HALOT
  rationale: Imperative plural of הלך used idiomatically as an exhortation introducing
    a communal appeal. In English, 'Come' naturally carries the hortatory force in
    this construction ('Come, let us...'). 'Go' would be overly literal and less idiomatic
    here.
- source_word: וְנָשׁוּבָה
  chosen: let us return
  alternatives:
  - and let us return
  - let us turn back
  lexicon: HALOT
  rationale: Cohortative first person plural of שוב expresses shared resolve. 'Return'
    fits Hosea's covenantal repentance language and preserves the directional sense
    toward the LORD better than the more interpretive 'repent,' while 'turn back'
    is possible but less idiomatic in this line.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: Standard directional preposition. 'To the LORD' is natural modern English
    and preserves the movement implied by the Hebrew.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following established reverential convention and the pattern reflected in the
    Septuagint tradition.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason for the exhortation. 'For' is concise and fits
    the explanatory logic of the verse.
- source_word: טָרָף
  chosen: has torn us
  alternatives:
  - has torn
  - has mauled us
  lexicon: HALOT
  rationale: The verb commonly denotes tearing, especially as by a wild animal. Supplying
    'us' in English reflects the implied object from the following pronominal suffixes
    and the parallelism of the verse. 'Mauled' is vivid but more interpretive.
- source_word: וְיִרְפָּאֵנוּ
  chosen: but he will heal us
  alternatives:
  - and he will heal us
  lexicon: HALOT
  rationale: 'The yiqtol expresses expected future result. Although waw is formally
    ''and,'' English idiom and the antithetical parallelism favor ''but'' to make
    the contrast clear: the one who wounded is also the one who heals.'
- source_word: יַךְ
  chosen: has struck us
  alternatives:
  - will strike
  - has smitten us
  - has wounded us
  lexicon: HALOT
  rationale: Though morphologically an imperfect/jussive-form verb, in this poetic
    parallelism it is best taken with the preceding perfect as describing what the
    LORD has done, balanced by the future healing/restoration in the second colon.
    'Has struck us' is clear modern English; 'smitten' is archaic. 'Wounded' overlaps
    too much with the following healing imagery.
- source_word: וְיַחְבְּשֵׁנוּ
  chosen: but he will bind us up
  alternatives:
  - and he will bind us up
  - and he will bandage us
  lexicon: HALOT
  rationale: The verb means to bind up a wound. 'Bind us up' preserves the metaphor
    and is idiomatic biblical English without being archaic. 'Bandage us' is possible
    but flatter and less literary. 'But' again brings out the restorative contrast
    in English.
