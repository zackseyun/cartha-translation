id: HOS.6.2
reference: Hosea 6:2
source:
  edition: WLC
  text: יְחַיֵּ֖/נוּ מִ/יֹּמָ֑יִם בַּ/יּוֹם֙ הַ/שְּׁלִישִׁ֔י יְקִמֵ֖/נוּ וְ/נִחְיֶ֥ה
    לְ/פָנָֽי/ו׃
translation:
  text: He will revive us after two days; on the third day he will raise us up, that
    we may live before him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in two days'; the Hebrew temporal expression may denote a short interval
      leading into the third day.
    reason: lexical_alternative
  - marker: b
    text: '''Raise us up'' may also be understood more generally as ''restore us''
      or ''set us on our feet.'''
    reason: lexical_alternative
  - marker: c
    text: Many Christians see the 'third day' wording as typologically anticipating
      the Messiah's resurrection, though the verse directly speaks of the people's
      restoration.
    reason: cross_reference
  - marker: d
    text: Or 'live in his presence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְחַיֵּנוּ
  chosen: he will revive us
  alternatives:
  - he will make us live
  - he will restore our life
  lexicon: HALOT
  rationale: Piel of חיה with 1cp object commonly carries a causative sense, 'make
    alive/revive.' 'Revive us' is natural English and fits the restoration context,
    while preserving the life-giving force of the verb.
- source_word: מִיֹּמָיִם
  chosen: after two days
  alternatives:
  - in two days
  - from two days
  lexicon: HALOT
  rationale: The preposition מ with a temporal expression here is best rendered idiomatically
    as 'after' or possibly 'in/within.' 'After two days' is the most established and
    contextually clear temporal sense in English for this restoration sequence.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  chosen: on the third day
  alternatives:
  - in the third day
  lexicon: HALOT
  rationale: The phrase is a standard temporal expression. 'On the third day' is the
    natural English equivalent and preserves the marked sequence from 'after two days'
    to climactic restoration on day three.
- source_word: יְקִימֵנוּ
  chosen: he will raise us up
  alternatives:
  - he will establish us
  - he will set us up
  lexicon: HALOT
  rationale: Hiphil of קום can mean 'raise up' or 'establish,' but in parallel with
    'revive us' the sense of being raised from a fallen or deathlike state is primary.
    'Raise us up' preserves both restoration imagery and possible resurrection overtones
    without overinterpreting.
- source_word: וְנִחְיֶה
  chosen: that we may live
  alternatives:
  - and we will live
  - so that we will live
  lexicon: HALOT
  rationale: The prefixed conjunction can be read as result/purpose in context following
    the two divine actions. 'That we may live' expresses the intended outcome in smooth
    English while staying close to the Hebrew sequence.
- source_word: לְפָנָיו
  chosen: before him
  alternatives:
  - in his presence
  - before his face
  lexicon: HALOT
  rationale: '''Before him'' is the most direct rendering of לְפָנָיו and is idiomatic
    in English. ''In his presence'' is interpretive but worth preserving as a lexical
    alternative because it captures the relational nuance.'
