theological_decisions:
- issue: Whether the verse should be translated to foreground a direct messianic/resurrection
    prophecy or a corporate restoration statement
  chosen_reading: Main text preserves the corporate first-person restoration language
    without making an explicit christological interpretation.
  alternative_readings:
  - Some Christian readers understand the 'third day' language typologically or prophetically
    in relation to Messiah's resurrection.
  rationale: The Hebrew text directly speaks of 'us' and describes Israel's restoration
    by God. The translation should not import a more specific doctrinal claim than
    the verse itself states, while leaving room for canonical and typological readings.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
