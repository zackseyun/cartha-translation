id: HOS.2.15
reference: Hosea 2:15
source:
  edition: WLC
  text: וּ/פָקַדְתִּ֣י עָלֶ֗י/הָ אֶת יְמֵ֤י הַ/בְּעָלִים֙ אֲשֶׁ֣ר תַּקְטִ֣יר לָ/הֶ֔ם
    וַ/תַּ֤עַד נִזְמָ/הּ֙ וְ/חֶלְיָתָ֔/הּ וַ/תֵּ֖לֶךְ אַחֲרֵ֣י מְאַהֲבֶ֑י/הָ וְ/אֹתִ֥/י
    שָׁכְחָ֖ה נְאֻם יְהוָֽה־־׃פ
translation:
  text: And I will punish her for the days of the Baals, when she burned incense to
    them and adorned herself with her ring and her jewelry, and went after her lovers,
    but forgot me, declares the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly 'her nose ring.' The Hebrew נֶזֶם can refer to a ring, often
      specifically a nose ring or earring.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפָקַדְתִּי עָלֶיהָ
  chosen: I will punish her
  alternatives:
  - I will visit upon her
  - I will attend to her
  lexicon: HALOT
  rationale: פָקַד with עַל in judgment contexts commonly carries the sense of calling
    to account or punishing. 'Punish' makes the judicial force clear in natural English
    better than the more opaque 'visit upon.'
- source_word: יְמֵי הַבְּעָלִים
  chosen: the days of the Baals
  alternatives:
  - the days of the Baal images
  - the festival days of the Baals
  lexicon: HALOT
  rationale: The plural הַבְּעָלִים is best retained as 'the Baals,' referring to
    the various Baal manifestations/idols associated with Israel's apostasy. 'Days
    of' likely refers to the occasions or periods devoted to their worship; the literal
    phrasing preserves that nuance.
- source_word: אֲשֶׁר תַּקְטִיר לָהֶם
  chosen: when she burned incense to them
  alternatives:
  - on which she burned offerings to them
  - when she made offerings smoke to them
  lexicon: HALOT
  rationale: הקטיר in the Hiphil regularly refers to making sacrificial smoke, often
    by burning incense or offerings. 'Burned incense' is idiomatic and fits prophetic
    denunciations of idolatrous worship.
- source_word: וַתַּעַד
  chosen: adorned herself
  alternatives:
  - decked herself
  - put on
  lexicon: HALOT
  rationale: The verb עדה in this form means to adorn or deck oneself. 'Adorned herself'
    is clear modern English and preserves the reflexive sense implied by the context.
- source_word: נִזְמָהּ
  chosen: her ring
  alternatives:
  - her nose ring
  - her ornament
  lexicon: HALOT
  rationale: נזם can denote a ring, often specifically a nose ring or earring. Because
    the precise type is not explicit here, 'ring' is suitably broad, while a footnote
    preserves the more specific possibility.
- source_word: וְחֶלְיָתָהּ
  chosen: her jewelry
  alternatives:
  - her ornaments
  - her necklace
  lexicon: HALOT
  rationale: חֶלְיָה denotes ornamentation or jewelry generally. 'Jewelry' is natural
    English and captures the collective sense better than a singular item.
- source_word: מְאַהֲבֶיהָ
  chosen: her lovers
  alternatives:
  - those who loved her
  lexicon: HALOT
  rationale: In Hosea's marital metaphor, 'lovers' is the established and contextually
    apt rendering for illicit partners, representing the foreign gods/alliances she
    pursued.
- source_word: וְאֹתִי שָׁכְחָה
  chosen: but forgot me
  alternatives:
  - and forgot me
  lexicon: HALOT
  rationale: The conjunction can be rendered simply 'and,' but 'but' brings out the
    adversative force in English between her pursuit of lovers and her neglect of
    the LORD without adding foreign content.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: Following the project's default, יְהוָה is rendered 'the LORD.' 'Declares'
    is a standard, readable rendering of נְאֻם in prophetic speech formulas.
