id: HOS.2.22
reference: Hosea 2:22
source:
  edition: WLC
  text: וְ/אֵרַשְׂתִּ֥י/ךְ לִ֖/י בֶּ/אֱמוּנָ֑ה וְ/יָדַ֖עַתְּ אֶת יְהוָֽה־׃ס
translation:
  text: And I will betroth you to myself in faithfulness, and you shall know the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in fidelity' or, more formally, 'in faith.' The Hebrew term carries
      the sense of reliability and covenant faithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵרַשְׂתִּיךְ
  chosen: And I will betroth you
  alternatives:
  - And I will espouse you
  - And I will engage you
  lexicon: HALOT
  rationale: The verb ארשׂ refers specifically to entering a betrothal relationship,
    not merely generic marriage. 'Betroth' preserves the covenant-marital imagery
    central to the passage more precisely than broader alternatives.
- source_word: לִי
  chosen: to myself
  alternatives:
  - to me
  lexicon: HALOT
  rationale: The preposition plus first-person suffix is literally 'to me.' 'To myself'
    is idiomatic in English and highlights the personal, covenantal force without
    changing the sense.
- source_word: בֶּאֱמוּנָה
  chosen: in faithfulness
  alternatives:
  - in fidelity
  - in steadfastness
  - in faith
  lexicon: HALOT
  rationale: אֱמוּנָה here denotes reliability, fidelity, or faithfulness in covenant
    relationship. 'Faithfulness' best fits the marital-covenantal context. 'Faith'
    is possible formally, but in English it could suggest subjective belief rather
    than covenant fidelity.
- source_word: וְיָדַעַתְּ
  chosen: and you shall know
  alternatives:
  - and you will know
  - and you shall acknowledge
  lexicon: HALOT
  rationale: ידע commonly means 'know,' and in Hosea often carries relational and
    covenantal depth beyond mere cognition. 'Shall know' preserves both the future
    sense and the solemn tone. 'Acknowledge' is interpretive and narrower.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following longstanding reverential convention and the Septuagintal
    pattern, while preserving covenantal significance.
