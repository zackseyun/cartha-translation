theological_decisions:
- issue: Relational force of 'know' in covenant-marital context
  chosen_reading: retain 'know' in the main text without expanding it to 'know intimately'
    or 'acknowledge'
  alternative_readings:
  - acknowledge the LORD
  - know the LORD intimately
  rationale: The Hebrew verb already carries covenantal and relational depth in context.
    Expanding the wording in the main text would over-interpret; retaining 'know'
    preserves the theological richness and tension of the original.
  doctrine_reference: Preserve theological tension rather than resolve it.
