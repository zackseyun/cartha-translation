theological_decisions:
- issue: Metaphorical sexual-shame language in prophetic judgment
  chosen_reading: Retain the concrete imagery of 'uncover her nakedness' in the main
    text.
  alternative_readings:
  - Render more abstractly as 'expose her shame'
  rationale: Hosea's covenant-unfaithfulness metaphor intentionally uses marital and
    sexual-shame imagery. Preserving the concrete language avoids softening the force
    of divine judgment and remains closer to the Hebrew idiom.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Generic force of וְאִישׁ
  chosen_reading: Translate as 'no man' rather than gender-neutral 'no one' in the
    main text.
  alternative_readings:
  - no one
  - nobody
  rationale: The Hebrew explicitly uses אִישׁ ('man'). Per the gender-accurate policy,
    the translation keeps the masculine representative form where it carries generic
    force, while an alternative may be noted for readability.
  doctrine_reference: Translation philosophy §4
