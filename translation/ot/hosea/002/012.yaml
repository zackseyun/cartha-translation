id: HOS.2.12
reference: Hosea 2:12
source:
  edition: WLC
  text: וְ/עַתָּ֛ה אֲגַלֶּ֥ה אֶת נַבְלֻתָ֖/הּ לְ/עֵינֵ֣י מְאַהֲבֶ֑י/הָ וְ/אִ֖ישׁ לֹֽא
    יַצִּילֶ֥/נָּה מִ/יָּדִֽ/י־־׃
translation:
  text: And now I will uncover her nakedness before the eyes of her lovers, and no
    man will rescue her from my hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'expose her shame.' The Hebrew term can denote disgrace associated with
      naked exposure.
    reason: lexical_alternative
  - marker: b
    text: Or, 'no one will rescue her from my hand.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  chosen: And now
  alternatives:
  - Now
  lexicon: HALOT
  rationale: Temporal discourse marker introducing imminent judgment. 'And now' preserves
    the conjunction and the rhetorical transition.
- source_word: אֲגַלֶּה
  chosen: I will uncover
  alternatives:
  - I will reveal
  - I will expose
  lexicon: HALOT
  rationale: From גלה in the piel, here with an object related to shame/nakedness.
    'Uncover' fits the idiom of exposing sexual shame better than the more generic
    'reveal.'
- source_word: נַבְלֻתָהּ
  chosen: her nakedness
  alternatives:
  - her shame
  - her private parts
  lexicon: HALOT
  rationale: The noun denotes disgrace associated with exposed nakedness. 'Her nakedness'
    preserves the concrete metaphor and its covenantal/sexual-shame force; 'shame'
    is possible but less vivid, while 'private parts' is too anatomically narrow here.
- source_word: לְעֵינֵי
  chosen: before the eyes of
  alternatives:
  - in the sight of
  - before
  lexicon: HALOT
  rationale: A standard Hebrew idiom meaning public exposure in someone's sight. 'Before
    the eyes of' is slightly more formal but preserves the imagery.
- source_word: מְאַהֲבֶיהָ
  chosen: her lovers
  alternatives:
  - those who love her
  lexicon: HALOT
  rationale: In Hosea's marriage metaphor this refers to illicit lovers/allied idols
    or nations. 'Her lovers' is the natural idiomatic rendering and preserves the
    adultery imagery.
- source_word: וְאִישׁ
  chosen: no man
  alternatives:
  - no one
  - nobody
  lexicon: HALOT
  rationale: The Hebrew is singular 'man.' Per gender-accurate philosophy, 'no man'
    preserves the source form while still functioning generically in context.
- source_word: יַצִּילֶנָּה
  chosen: will rescue her
  alternatives:
  - will deliver her
  - will snatch her away
  lexicon: HALOT
  rationale: From נצל in the hiphil, meaning to deliver/rescue from danger or power.
    'Rescue' is clear modern English and suits the image of inability to save her
    from judgment.
- source_word: מִיָּדִי
  chosen: from my hand
  alternatives:
  - out of my hand
  - from my power
  lexicon: HALOT
  rationale: A common idiom for power/control. 'From my hand' keeps the metaphor explicit;
    the sense of power is readily understood from context.
