theological_decisions:
- issue: Whether to preserve Hosea's symbolic child-names as transliterations or translate
    their meaning in the main text
  chosen_reading: Translate the names semantically in the main text ('My people' and
    'Shown mercy') and preserve the transliterated forms in a footnote
  alternative_readings:
  - Use 'Ammi' and 'Ruhamah' directly in the main text
  rationale: In Hosea, these names function as meaningful prophetic signs, and their
    semantic force is central to the restoration reversal being announced. Translating
    them in the main text best communicates the Hebrew sense to English readers, while
    footnotes preserve the name-forms and intertextual linkage.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable
    modern English; preserve significant alternatives in footnotes'
