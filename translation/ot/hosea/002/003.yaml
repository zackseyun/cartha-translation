id: HOS.2.3
reference: Hosea 2:3
source:
  edition: WLC
  text: אִמְר֥וּ לַ/אֲחֵי/כֶ֖ם עַמִּ֑/י וְ/לַ/אֲחֽוֹתֵי/כֶ֖ם רֻחָֽמָה׃
translation:
  text: Say to your brothers, “My people,” and to your sisters, “Shown mercy.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''Ammi,'' a symbolic name meaning ''My people.'''
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''Ruhamah,'' a symbolic name meaning ''Shown mercy'' or ''shown
      compassion.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: אִמְרוּ
  chosen: Say
  alternatives:
  - Tell
  - Speak to
  lexicon: HALOT
  rationale: Imperative plural of אמר, introducing direct address. 'Say' is the most
    straightforward English imperative and preserves the speech-act force without
    adding content.
- source_word: לַאֲחֵיכֶם
  chosen: to your brothers
  alternatives:
  - to your brothers and sisters
  - to your kin
  lexicon: HALOT
  rationale: Literally 'to your brothers' with second person masculine plural suffix.
    Following the gender-accurate principle, the masculine plural noun is rendered
    'brothers' rather than a gender-neutral collective. The parallel feminine term
    for sisters follows in the next phrase, so the text itself marks both groups explicitly.
- source_word: עַמִּי
  chosen: My people
  alternatives:
  - People of mine
  - Ammi
  lexicon: HALOT
  rationale: The form means 'my people' and also echoes the symbolic name Ammi from
    Hosea's naming sequence. Because translation philosophy prefers translating meaningful
    titles/terms rather than preserving opaque transliteration, 'My people' is used
    in the main text. The name-echo is worth preserving in a footnote.
- source_word: וְלַאֲחוֹתֵיכֶם
  chosen: and to your sisters
  alternatives:
  - and to your female kin
  lexicon: HALOT
  rationale: Literally 'and to your sisters.' The feminine plural is explicit in Hebrew,
    so 'sisters' should be retained rather than collapsed into a generic term.
- source_word: רֻחָמָה
  chosen: Shown mercy
  alternatives:
  - Pitied
  - Shown compassion
  - Ruhamah
  lexicon: HALOT
  rationale: Passive participial/adjectival form from רחם, 'shown mercy' or 'having
    received compassion.' 'Shown mercy' is idiomatic modern English and preserves
    the passive sense better than the archaic 'pitied.' Because this also echoes the
    symbolic name Ruhamah, the transliterated form is preserved in a footnote.
