theological_decisions:
- issue: Metaphorical judgment imagery against the unfaithful woman/Israel
  chosen_reading: Retain the concrete bodily and wilderness imagery without softening
    it into abstract punishment language.
  alternative_readings:
  - Paraphrase as general humiliation and deprivation
  rationale: The verse's theological force depends on the stark covenant-judgment
    metaphors of exposure, desolation, and thirst. Optimal equivalence here preserves
    the imagery rather than resolving it into interpretation.
  doctrine_reference: Translation philosophy §§1, 3, 6
