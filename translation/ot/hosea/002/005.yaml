id: HOS.2.5
reference: Hosea 2:5
source:
  edition: WLC
  text: פֶּן אַפְשִׁיטֶ֣/נָּה עֲרֻמָּ֔ה וְ/הִ֨צַּגְתִּ֔י/הָ כְּ/י֖וֹם הִוָּֽלְדָ֑/הּ
    וְ/שַׂמְתִּ֣י/הָ כַ/מִּדְבָּ֗ר וְ/שַׁתִּ֨/הָ֙ כְּ/אֶ֣רֶץ צִיָּ֔ה וַ/הֲמִתִּ֖י/הָ
    בַּ/צָּמָֽא־׃
translation:
  text: or else I will strip her naked and expose her as on the day she was born,
    and make her like the wilderness, and make her like a parched land, and let her
    die of thirst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lest I strip her naked.' The Hebrew particle can be rendered more formally
      as 'lest,' introducing the threatened consequence.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''kill her with thirst.'' The Hebrew is more literally causative: ''cause
      her to die by thirst.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  chosen: or else
  alternatives:
  - lest
  - otherwise
  lexicon: HALOT
  rationale: Introduces the threatened consequence following the prior command. 'Or
    else' is idiomatic modern English and preserves the warning force better than
    the more archaic 'lest.'
- source_word: אַפְשִׁיטֶנָּה
  chosen: I will strip her
  alternatives:
  - I will strip her bare
  - I will undress her
  lexicon: HALOT
  rationale: Hiphil of פשט here means to strip off clothing. 'Strip her' is direct
    and preserves the shame/judgment imagery without unnecessary expansion.
- source_word: עֲרֻמָּה
  chosen: naked
  alternatives:
  - bare
  lexicon: HALOT
  rationale: Predicate/result of the stripping. 'Naked' is the standard and strongest
    English equivalent for the exposure imagery.
- source_word: וְהִצַּגְתִּיהָ
  chosen: and expose her
  alternatives:
  - and set her forth
  - and display her
  lexicon: HALOT
  rationale: The verb conveys setting someone in view. 'Expose her' fits the public-shame
    context and pairs naturally with 'strip her naked.'
- source_word: כְּיוֹם הִוָּלְדָהּ
  chosen: as on the day she was born
  alternatives:
  - like the day of her birth
  - as in the day she was born
  lexicon: HALOT
  rationale: This comparison evokes the helpless, uncovered state at birth. 'As on
    the day she was born' is natural English while retaining the simile.
- source_word: וְשַׂמְתִּיהָ כַמִּדְבָּר
  chosen: and make her like the wilderness
  alternatives:
  - and set her like the wilderness
  - and make her like a desert
  lexicon: HALOT
  rationale: מִדְבָּר often denotes wilderness/desert land. 'Wilderness' preserves
    the biblical resonance and avoids flattening the image to mere sand desert.
- source_word: וְשַׁתִּהָ כְּאֶרֶץ צִיָּה
  chosen: and make her like a parched land
  alternatives:
  - and set her like a dry land
  - and make her like an arid land
  lexicon: HALOT
  rationale: צִיָּה denotes dryness, drought, parchedness. 'Parched land' is vivid,
    readable, and preserves the intensification from wilderness to drought-stricken
    terrain.
- source_word: וַהֲמִתִּיהָ בַּצָּמָא
  chosen: and let her die of thirst
  alternatives:
  - and kill her with thirst
  - and put her to death by thirst
  lexicon: HALOT
  rationale: The causative verb with בַּצָּמָא expresses causing death by thirst.
    'Let her die of thirst' is idiomatic English that communicates the result clearly
    without sounding wooden.
