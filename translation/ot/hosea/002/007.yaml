theological_decisions:
- issue: Prophetic marriage metaphor and covenant unfaithfulness
  chosen_reading: Retain the sexualized metaphor explicitly with 'has prostituted
    herself' and 'my lovers.'
  alternative_readings:
  - Soften to 'has been unfaithful' and 'those I love'
  rationale: Hosea intentionally uses marital and sexual imagery to depict Israel's
    idolatrous covenant breach. Preserving that imagery maintains the theological
    force without adding interpretation beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
