id: HOS.2.7
reference: Hosea 2:7
source:
  edition: WLC
  text: כִּ֤י זָֽנְתָה֙ אִמָּ֔/ם הֹבִ֖ישָׁה הֽוֹרָתָ֑/ם כִּ֣י אָמְרָ֗ה אֵלְכָ֞ה אַחֲרֵ֤י
    מְאַהֲבַ/י֙ נֹתְנֵ֤י לַחְמִ/י֙ וּ/מֵימַ֔/י צַמְרִ֣/י וּ/פִשְׁתִּ֔/י שַׁמְנִ֖/י
    וְ/שִׁקּוּיָֽ/י׃
translation:
  text: For their mother has prostituted herself; she who conceived them has acted
    shamefully. For she said, ‘I will go after my lovers, those who give me my bread
    and my water, my wool and my flax, my oil and my drink.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has played the whore'; the Hebrew uses explicit sexual imagery for covenant
      unfaithfulness.
    reason: lexical_alternative
  - marker: b
    text: Or 'has done shamefully' or possibly 'has put them to shame.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'she who conceived them,' echoing 'their mother' in poetic parallelism.
    reason: lexical_alternative
  - marker: d
    text: Or 'my drinks' / 'my drink-supply.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָנְתָה
  chosen: has prostituted herself
  alternatives:
  - has played the whore
  - has been unfaithful
  lexicon: HALOT
  rationale: The verb זנה literally denotes illicit sexual behavior and, in prophetic
    metaphor, covenantal unfaithfulness. 'Has prostituted herself' preserves the sexual
    force and the metaphor better than the softened 'has been unfaithful.'
- source_word: אִמָּם
  chosen: their mother
  alternatives:
  - their mother
  lexicon: HALOT
  rationale: Straightforward construct with 3mp suffix; refers to the mother of the
    children in Hosea's enacted metaphor, representing the corporate people.
- source_word: הֹבִישָׁה
  chosen: has acted shamefully
  alternatives:
  - has put them to shame
  - has done shamefully
  lexicon: HALOT
  rationale: The Hiphil of בוש can mean to cause shame or to act shamefully. In parallel
    with the preceding and following feminine singular verbs about the mother, 'has
    acted shamefully' best fits the subject's conduct rather than the effect on the
    children.
- source_word: הוֹרָתָם
  chosen: she who conceived them
  alternatives:
  - their conceiver
  - the one who became pregnant with them
  - their mother
  lexicon: HALOT
  rationale: From הרה, 'to conceive/be pregnant.' Rendering it verbally as 'she who
    conceived them' preserves the participial/relative sense and avoids flattening
    the poetic parallelism with 'their mother.'
- source_word: אֵלְכָה אַחֲרֵי
  chosen: I will go after
  alternatives:
  - I will follow after
  - I will pursue
  lexicon: HALOT
  rationale: Idiomatic expression for pursuing lovers/idols. 'Go after' is natural
    English and preserves the metaphorical movement toward illicit attachments.
- source_word: מְאַהֲבַי
  chosen: my lovers
  alternatives:
  - those who love me
  - my beloved ones
  lexicon: HALOT
  rationale: In Hosea's marital metaphor this noun refers to illicit partners rather
    than affectionate companions; 'my lovers' is the clearest English equivalent.
- source_word: נֹתְנֵי
  chosen: those who give me
  alternatives:
  - who give me
  - givers of
  lexicon: HALOT
  rationale: The participle functions substantivally, describing the lovers as providers.
    'Those who give me' makes the syntax explicit in English.
- source_word: לַחְמִי וּמֵימַי
  chosen: my bread and my water
  alternatives:
  - my food and my water
  lexicon: HALOT
  rationale: Retains the concrete imagery of staple provisions rather than generalizing
    to 'food.'
- source_word: צַמְרִי וּפִשְׁתִּי
  chosen: my wool and my flax
  alternatives:
  - my wool and my linen
  lexicon: HALOT
  rationale: פשתים refers to flax, the raw material, and 'flax' better matches the
    Hebrew than the more interpretive 'linen.'
- source_word: שַׁמְנִי
  chosen: my oil
  alternatives:
  - my olive oil
  lexicon: HALOT
  rationale: '''Oil'' is the standard rendering and sufficiently clear in context;
    specifying ''olive'' would add detail not explicit in the Hebrew.'
- source_word: שִׁקּוּיָי
  chosen: my drink
  alternatives:
  - my drinks
  - my beverages
  lexicon: HALOT
  rationale: The noun denotes drink or drink-supply. Singular collective 'my drink'
    reads naturally in English while preserving the sense of provision.
