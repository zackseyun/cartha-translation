id: HOS.2.14
reference: Hosea 2:14
source:
  edition: WLC
  text: וַ/הֲשִׁמֹּתִ֗י גַּפְנָ/הּ֙ וּ/תְאֵ֣נָתָ֔/הּ אֲשֶׁ֣ר אָמְרָ֗ה אֶתְנָ֥ה הֵ֨מָּה֙
    לִ֔/י אֲשֶׁ֥ר נָֽתְנוּ לִ֖/י מְאַֽהֲבָ֑/י וְ/שַׂמְתִּ֣י/ם לְ/יַ֔עַר וַ/אֲכָלָ֖תַ/ם
    חַיַּ֥ת הַ/שָּׂדֶֽה־׃
translation:
  text: And I will lay waste her vine and her fig tree, of which she said, ‘These
    are my wages that my lovers gave me.’ I will make them a forest, and the wild
    animals of the field will devour them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hire'; the Hebrew term can carry the sense of a prostitute's wages in
      Hosea's infidelity metaphor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲשִׁמֹּתִי
  chosen: I will lay waste
  alternatives:
  - I will destroy
  - I will make desolate
  lexicon: HALOT
  rationale: The Hiphil of שׁמם here conveys causing devastation/desolation. 'Lay
    waste' preserves the force of judgment while sounding natural in modern English;
    'destroy' is possible but slightly less specific, and 'make desolate' is more
    formal.
- source_word: גַּפְנָהּ
  chosen: her vine
  alternatives:
  - her vineyard
  lexicon: HALOT
  rationale: גֶּפֶן normally means 'vine' rather than 'vineyard.' The singular with
    suffix is retained. In context it likely stands collectively for cultivated produce,
    but the singular image should be preserved.
- source_word: וּתְאֵנָתָהּ
  chosen: and her fig tree
  alternatives:
  - and her fig
  lexicon: HALOT
  rationale: תְּאֵנָה commonly denotes the fig tree. 'Fig tree' is the clearest natural
    English rendering in this agricultural pairing with 'vine.'
- source_word: אֲשֶׁר אָמְרָה
  chosen: of which she said
  alternatives:
  - about which she said
  - for which she said
  lexicon: HALOT
  rationale: This relative clause refers back to the vine and fig tree. 'Of which
    she said' is idiomatic and preserves the connection without overexplaining.
- source_word: אֶתְנָה
  chosen: wages
  alternatives:
  - pay
  - hire
  - reward
  lexicon: HALOT
  rationale: אֶתְנָה often refers to a prostitute's hire/wages. In Hosea's marital-infidelity
    metaphor, the term carries morally charged overtones. 'Wages' keeps the transactional
    sense in readable English; the more explicit 'prostitute's wages' would import
    an explanatory element not stated directly in this clause.
- source_word: הֵמָּה לִי
  chosen: These are my
  alternatives:
  - They are for me
  - These belong to me as
  lexicon: HALOT
  rationale: The pronoun is emphatic. 'These are my' brings that emphasis into natural
    English before 'wages.'
- source_word: מְאַהֲבַי
  chosen: my lovers
  alternatives:
  - those who love me
  - my paramours
  lexicon: HALOT
  rationale: In Hosea this term refers to illicit lovers within the adultery metaphor,
    often representing false gods or foreign alliances. 'My lovers' is the most direct
    and idiomatic rendering.
- source_word: וְשַׂמְתִּים לְיַעַר
  chosen: I will make them a forest
  alternatives:
  - I will turn them into a forest
  - I will make them into woodland
  lexicon: HALOT
  rationale: The idiom indicates cultivated land reverting to wild growth. 'Make them
    a forest' is concise and close to the Hebrew; 'turn them into a forest' is a valid
    dynamic alternative.
- source_word: וַאֲכָלָתַם
  chosen: will devour them
  alternatives:
  - will eat them
  - will consume them
  lexicon: HALOT
  rationale: The verb אכל with animal subject naturally means 'eat/devour.' 'Devour'
    better matches the destructive image of wild animals overrunning abandoned cultivation.
- source_word: חַיַּת הַשָּׂדֶה
  chosen: the wild animals of the field
  alternatives:
  - the beasts of the field
  - the animals of the countryside
  lexicon: HALOT
  rationale: This is a common biblical expression. 'Wild animals of the field' is
    accessible modern English; 'beasts of the field' is traditional but slightly archaic.
