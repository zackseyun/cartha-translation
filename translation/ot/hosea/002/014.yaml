theological_decisions:
- issue: Whether to make explicit the sexualized nuance of אֶתְנָה in the main text
  chosen_reading: Render as 'wages' in the main text, preserving the transactional
    sense without adding 'prostitute's' explicitly.
  alternative_readings:
  - '''hire'''
  - '''prostitute''s wages'''
  rationale: The broader context of Hosea already establishes the adultery/prostitution
    metaphor. Using 'wages' preserves the metaphorical and economic force while avoiding
    interpretive expansion beyond the immediate wording. The stronger nuance is worth
    preserving in a footnote.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve what
    the source warrants without paraphrastic expansion.'
