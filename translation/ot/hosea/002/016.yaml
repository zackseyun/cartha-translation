theological_decisions:
- issue: Relational tone of divine action in פתה within the marriage-restoration metaphor
  chosen_reading: allure her
  alternative_readings:
  - persuade her
  - entice her
  - woo her
  rationale: The context is not coercive temptation but gracious re-engagement after
    judgment. 'Allure' preserves both the affective and persuasive dimensions without
    importing erotic excess or moral negativity. This maintains the prophetic tension
    of judgment followed by covenantal restoration.
  doctrine_reference: Translation philosophy §3, §6
