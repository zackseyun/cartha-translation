id: HOS.2.1
reference: Hosea 2:1
source:
  edition: WLC
  text: וְֽ֠/הָיָה מִסְפַּ֤ר בְּנֵֽי יִשְׂרָאֵל֙ כְּ/ח֣וֹל הַ/יָּ֔ם אֲשֶׁ֥ר לֹֽא יִמַּ֖ד
    וְ/לֹ֣א יִסָּפֵ֑ר וְֽ֠/הָיָה בִּ/מְק֞וֹם אֲשֶׁר יֵאָמֵ֤ר לָ/הֶם֙ לֹֽא עַמִּ֣/י
    אַתֶּ֔ם יֵאָמֵ֥ר לָ/הֶ֖ם בְּנֵ֥י אֵֽל חָֽי־־־־־׃
translation:
  text: Yet the number of the sons of Israel will be like the sand of the sea, which
    cannot be measured or counted; and in the place where it is said to them, “You
    are not my people,” it will be said to them, “Sons of the living God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “children of Israel” and “children of the living God.” The Hebrew has
      “sons” in both phrases.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: Yet ... will be
  alternatives:
  - And ... will be
  - Now ... will be
  lexicon: HALOT
  rationale: The waw + qatal here introduces a sharp turn from the preceding judgment
    context into restoration. 'Yet' captures the adversative discourse force in natural
    English while preserving the future sense of היה.
- source_word: מִסְפַּר
  chosen: the number
  alternatives:
  - the multitude
  lexicon: HALOT
  rationale: A formal rendering best matches the noun's plain sense and preserves
    the connection to the following immeasurable/countless language.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the people of Israel
  lexicon: HALOT
  rationale: Gender-accurate policy favors retaining the masculine form 'sons' where
    the Hebrew has בני. 'Children of Israel' is traditional and broader, but 'sons'
    better reflects the source wording and also matches the later 'sons of the living
    God' in the same verse.
- source_word: כְּחוֹל הַיָּם
  chosen: like the sand of the sea
  alternatives:
  - like the sand by the sea
  lexicon: HALOT
  rationale: This is the standard Hebrew simile for innumerability. 'Of the sea' is
    a natural formal rendering and echoes covenantal promise language.
- source_word: אֲשֶׁר לֹא יִמַּד וְלֹא יִסָּפֵר
  chosen: which cannot be measured or counted
  alternatives:
  - which will not be measured or numbered
  - which cannot be measured and cannot be counted
  lexicon: HALOT
  rationale: The Niphal imperfects express practical impossibility in context, not
    merely future action. 'Measured or counted' is idiomatic and preserves both verbs
    distinctly.
- source_word: בִּמְקוֹם
  chosen: in the place
  alternatives:
  - at the place
  - where
  lexicon: HALOT
  rationale: Retaining 'in the place' preserves the concrete locative expression before
    the relative clause, rather than collapsing it into a simple 'where' too early.
- source_word: יֵאָמֵר ... יֵאָמֵר
  chosen: it is said ... it will be said
  alternatives:
  - they say ... they will say
  - one says ... one will say
  lexicon: HALOT
  rationale: The passive forms are preserved in English to reflect the Hebrew and
    to avoid importing a specific unnamed speaker.
- source_word: לֹא עַמִּי אַתֶּם
  chosen: You are not my people
  alternatives:
  - Not-my-people are you
  - You are not my nation
  lexicon: HALOT
  rationale: This reproduces the covenantal formula naturally in English. 'People'
    is the established and contextually correct sense of עם here.
- source_word: בְּנֵי אֵל חָי
  chosen: Sons of the living God
  alternatives:
  - Children of the living God
  - Sons of the living Mighty One
  lexicon: HALOT
  rationale: '''Sons'' preserves the masculine plural בני in line with the translation''s
    gender-accurate policy and maintains the rhetorical parallel with ''sons of Israel.''
    ''God'' is the normal rendering of אל here, and ''living God'' is a well-established
    biblical expression.'
