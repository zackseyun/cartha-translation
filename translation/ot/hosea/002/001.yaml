theological_decisions:
- issue: Gendered filial language in covenant-restoration formula
  chosen_reading: Retain 'sons' in both 'sons of Israel' and 'Sons of the living God.'
  alternative_readings:
  - children of Israel
  - children of the living God
  rationale: The Hebrew uses masculine plural בני in both places. Per the translation
    philosophy, gender-accurate renderings are preferred over neutralizing language
    unless context clearly demands otherwise. Retaining 'sons' also preserves the
    literary parallelism within the verse.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Discourse force of initial waw
  chosen_reading: Render adversatively with 'Yet' rather than a simple 'And.'
  alternative_readings:
  - And
  - Now
  rationale: Although waw often means 'and,' the immediate literary context turns
    from naming judgment ('Not My People') to a promise of reversal and multiplication.
    'Yet' communicates that theological and rhetorical reversal without adding content
    beyond the context.
  doctrine_reference: DOCTRINE.md §Translation philosophy, optimal equivalence
