theological_decisions:
- issue: Rendering the accusation בְנֵי זְנוּנִים in a context of Hosea's marriage
    metaphor
  chosen_reading: children of whoredom
  alternative_readings:
  - children of prostitution
  - children of unfaithfulness
  rationale: The verse participates in Hosea's enacted metaphor of Israel's covenant
    infidelity. The translation should preserve the severe sexualized imagery rather
    than soften it into a purely abstract theological term. At the same time, it should
    not import a narrower doctrinal claim about the literal parentage of the children
    beyond what the prophetic sign-act states.
  doctrine_reference: Translation philosophy §§1, 3, 6
