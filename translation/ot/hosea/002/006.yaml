id: HOS.2.6
reference: Hosea 2:6
source:
  edition: WLC
  text: וְ/אֶת בָּנֶ֖י/הָ לֹ֣א אֲרַחֵ֑ם כִּֽי בְנֵ֥י זְנוּנִ֖ים הֵֽמָּה־־׃
translation:
  text: And I will not show compassion to her children, for they are children of whoredom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'children of prostitution' or 'children of harlotry.' The Hebrew preserves
      the stark imagery of sexual unfaithfulness that symbolizes covenant infidelity.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  chosen: And
  alternatives:
  - And as for
  - Even
  lexicon: HALOT
  rationale: The conjunction with the object marker introduces the next clause and
    marks the direct object ('her children'). In English, the object marker is not
    translated separately, so the sense is carried by 'And' plus normal word order.
- source_word: בָּנֶיהָ
  chosen: her children
  alternatives:
  - her sons
  lexicon: HALOT
  rationale: Although בנים can mean 'sons,' it also commonly functions generically
    for offspring. 'Children' best fits the likely representative sense here and avoids
    over-specifying male offspring where the Hebrew construct does not require it.
- source_word: לֹא אֲרַחֵם
  chosen: I will not show compassion
  alternatives:
  - I will not have mercy
  - I will not pity
  lexicon: HALOT
  rationale: The piel of רחם expresses showing compassion/mercy. 'Show compassion'
    is clear modern English and preserves the emotional and covenantal force without
    archaic tone. 'Have mercy' is a strong traditional alternative, but 'show compassion'
    is slightly more natural in contemporary English.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Here כִּי gives the reason for the refusal of compassion. 'For' is concise
    and fits the prophetic style well.
- source_word: בְנֵי זְנוּנִים
  chosen: children of whoredom
  alternatives:
  - children of prostitution
  - children of harlotry
  - children of unfaithfulness
  lexicon: HALOT
  rationale: The construct phrase is metaphorically and morally charged. 'Whoredom'
    preserves the stark prophetic diction and the sexual-infidelity imagery central
    to Hosea. 'Prostitution' is possible but sounds more clinical; 'unfaithfulness'
    captures the metaphorical sense but weakens the lexical force of זְנוּנִים.
- source_word: הֵמָּה
  chosen: they are
  alternatives:
  - they themselves are
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis to the predicate. In English, the
    emphasis is adequately represented by the explicit clause 'they are'; a more emphatic
    rendering would be possible but is not necessary in smooth English.
