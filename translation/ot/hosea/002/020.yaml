id: HOS.2.20
reference: Hosea 2:20
source:
  edition: WLC
  text: וְ/כָרַתִּ֨י לָ/הֶ֤ם בְּרִית֙ בַּ/יּ֣וֹם הַ/ה֔וּא עִם חַיַּ֤ת הַ/שָּׂדֶה֙
    וְ/עִם ע֣וֹף הַ/שָּׁמַ֔יִם וְ/רֶ֖מֶשׂ הָֽ/אֲדָמָ֑ה וְ/קֶ֨שֶׁת וְ/חֶ֤רֶב וּ/מִלְחָמָה֙
    אֶשְׁבּ֣וֹר מִן הָ/אָ֔רֶץ וְ/הִשְׁכַּבְתִּ֖י/ם לָ/בֶֽטַח־־־׃
translation:
  text: And on that day I will make for them a covenant with the wild animals of the
    field, with the birds of the heavens, and with the creeping things of the ground;
    and I will break bow and sword and war from the land, and I will make them lie
    down in safety.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'cut a covenant.' Hebrew commonly uses 'cut' as the idiom for
      making a covenant.
    reason: lexical_alternative
  - marker: b
    text: Or 'the birds of the sky.'
    reason: lexical_alternative
  - marker: c
    text: Or 'from the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָרַתִּי
  chosen: I will make
  alternatives:
  - I will cut
  - I will establish
  lexicon: HALOT
  rationale: כרת ברית is the standard Hebrew idiom for covenant-making, literally
    'cut a covenant.' English 'make a covenant' best conveys the idiom naturally while
    preserving the covenantal sense; 'cut' would be overly formal/literal here.
- source_word: לָהֶם
  chosen: for them
  alternatives:
  - with them
  lexicon: HALOT
  rationale: 'The preposition is ל (''for/to them''), not עִם. Since the covenant
    is then said to be ''with'' the animals, rendering לָהֶם as ''for them'' preserves
    the distinction in the Hebrew syntax: the beneficiaries are ''them'' (the people),
    while the covenantal counterpart named is the animal world.'
- source_word: בְּרִית
  chosen: a covenant
  alternatives:
  - treaty
  - agreement
  lexicon: HALOT
  rationale: בְּרִית is the standard covenant term and should be retained for theological
    and lexical consistency.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: A conventional temporal expression. 'On that day' is idiomatic modern
    English and preserves the prophetic time marker.
- source_word: חַיַּת הַשָּׂדֶה
  chosen: the wild animals of the field
  alternatives:
  - the beasts of the field
  - the animals of the countryside
  lexicon: HALOT
  rationale: חַיָּה can mean animal/beast; 'wild animals' communicates untamed land
    animals in accessible modern English. 'Beasts' is traditional but less natural
    for the target register.
- source_word: עוֹף הַשָּׁמַיִם
  chosen: the birds of the heavens
  alternatives:
  - the birds of the sky
  - the fowl of heaven
  lexicon: HALOT
  rationale: עוֹף denotes flying creatures, commonly birds. 'Birds of the heavens'
    stays close to the Hebrew and remains readable; 'sky' is possible but 'heavens'
    preserves biblical diction without sounding archaic.
- source_word: רֶמֶשׂ הָאֲדָמָה
  chosen: the creeping things of the ground
  alternatives:
  - the creeping things of the earth
  - the crawling creatures of the land
  lexicon: HALOT
  rationale: רֶמֶשׂ refers to creeping/crawling creatures. 'Ground' fits אֲדָמָה well
    here and avoids confusion with אֶרֶץ later in the verse, which is rendered 'land.'
- source_word: וְקֶשֶׁת וְחֶרֶב וּמִלְחָמָה
  chosen: bow and sword and war
  alternatives:
  - the bow, the sword, and battle
  - weapons and war
  lexicon: HALOT
  rationale: The three terms are retained distinctly rather than compressed. This
    preserves the poetic accumulation from specific weapons to warfare generally.
- source_word: אֶשְׁבּוֹר
  chosen: I will break
  alternatives:
  - I will shatter
  - I will abolish
  lexicon: HALOT
  rationale: שׁבר commonly means 'break.' It works both literally for weapons and
    figuratively for ending warfare.
- source_word: מִן הָאָרֶץ
  chosen: from the land
  alternatives:
  - from the earth
  - out of the land
  lexicon: HALOT
  rationale: In Hosea's covenant-restoration context, 'land' is more contextually
    precise than the broader 'earth,' though the latter is lexically possible.
- source_word: וְהִשְׁכַּבְתִּים
  chosen: I will make them lie down
  alternatives:
  - I will cause them to lie down
  - I will let them lie down
  lexicon: HALOT
  rationale: The Hiphil of שׁכב is causative. 'Make them lie down' is natural English
    and preserves the causative force.
- source_word: לָבֶטַח
  chosen: in safety
  alternatives:
  - securely
  - in security
  lexicon: HALOT
  rationale: לָבֶטַח expresses secure safety. 'In safety' is clear, natural, and fits
    the pastoral-restoration imagery.
