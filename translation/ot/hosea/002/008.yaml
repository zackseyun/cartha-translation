theological_decisions:
- issue: Pronoun shift in the verse
  chosen_reading: Preserve the Hebrew shift from second person ('your way') to third
    person ('her paths').
  alternative_readings:
  - 'Regularize to all second person: ''your paths'''
  - 'Regularize to all third person: ''her way'''
  rationale: The Hebrew text intentionally moves between direct address to the unfaithful
    woman and third-person description of her. Preserving the shift avoids smoothing
    out the prophetic rhetoric and does not import interpretive certainty beyond the
    text.
  doctrine_reference: Translation philosophy §1, §3, §5
