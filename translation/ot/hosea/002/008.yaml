id: HOS.2.8
reference: Hosea 2:8
source:
  edition: WLC
  text: לָ/כֵ֛ן הִנְ/נִי שָׂ֥ךְ אֶת דַּרְכֵּ֖/ךְ בַּ/סִּירִ֑ים וְ/גָֽדַרְתִּי֙ אֶת
    גְּדֵרָ֔/הּ וּ/נְתִיבוֹתֶ֖י/הָ לֹ֥א תִמְצָֽא־־־׃
translation:
  text: Therefore, behold, I am hedging up your way with thorns, and I will wall in
    her wall, so that she will not find her paths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with briars' or 'with thornbushes.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew shifts from 'your way' to 'her paths'; the translation preserves
      this rhetorical change rather than smoothing it out.
    reason: alternative_reading
  - marker: c
    text: Or 'and I will fence her in with a wall.' The Hebrew phrase is terse and
      may mean that God will erect a barrier around her.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks a consequential transition from the preceding accusation/judgment
    context; 'therefore' preserves the inferential force in natural English.
- source_word: הִנְנִי
  chosen: behold, I am
  alternatives:
  - look, I am
  - see, I am
  lexicon: HALOT
  rationale: The particle-plus-pronoun construction is an emphatic deictic announcement.
    'Behold, I am' preserves both the attention-getting force and the imminent divine
    action.
- source_word: שָׂךְ
  chosen: hedging up
  alternatives:
  - blocking
  - fencing in
  lexicon: HALOT
  rationale: The participial form conveys imminent/ongoing action. The verb denotes
    enclosing or obstructing, and 'hedging up' fits the agricultural/path imagery
    and pairs well with 'with thorns.'
- source_word: דַּרְכֵּךְ
  chosen: your way
  alternatives:
  - your path
  - your road
  lexicon: HALOT
  rationale: Singular with 2fs suffix, addressing the woman directly. 'Way' can denote
    both literal route and figurative course of conduct, preserving Hosea's metaphorical
    richness.
- source_word: בַּסִּירִים
  chosen: with thorns
  alternatives:
  - with briars
  - with thornbushes
  lexicon: HALOT
  rationale: The noun refers to thorny growth used as an obstacle. 'Thorns' is idiomatic
    and vivid in English, matching the image of obstructed pursuit.
- source_word: וְגָדַרְתִּי
  chosen: and I will wall in
  alternatives:
  - and I will fence in
  - and I will build a wall around
  lexicon: HALOT
  rationale: The perfect with prefixed conjunction in prophetic discourse carries
    future force here. 'Wall in' preserves the intensification from hedging to stronger
    enclosure.
- source_word: גְּדֵרָהּ
  chosen: her wall
  alternatives:
  - her barrier
  - a wall for her
  lexicon: HALOT
  rationale: 'The noun is cognate with the preceding verb and likely functions as
    an internal object: ''wall in her wall'' / ''make a wall for her.'' The Hebrew
    is terse and somewhat idiomatic; retaining ''her wall'' keeps the lexical connection
    visible and auditable, though the sense is that God erects a barrier around her.'
- source_word: וּנְתִיבוֹתֶיהָ
  chosen: her paths
  alternatives:
  - her tracks
  - her pathways
  lexicon: HALOT
  rationale: Plural noun with 3fs suffix. The shift from second person ('your way')
    to third person ('her paths') is preserved rather than harmonized, reflecting
    the Hebrew's rhetorical movement between direct address and description.
- source_word: לֹא תִמְצָא
  chosen: so that she will not find
  alternatives:
  - and she will not find
  - she shall not find
  lexicon: HALOT
  rationale: The clause states the result of the obstruction. 'So that she will not
    find' makes the purposive/resultative sense explicit in natural English.
