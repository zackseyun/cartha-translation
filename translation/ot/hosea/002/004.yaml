theological_decisions:
- issue: Marriage metaphor for covenant rupture
  chosen_reading: Retain the literal marital language in the main text while allowing
    the prophetic metaphor of Israel's covenant unfaithfulness to stand without explanatory
    expansion.
  alternative_readings:
  - Paraphrase explicitly as covenant unfaithfulness to God
  rationale: The verse speaks through Hosea's enacted marriage metaphor. Expanding
    the metaphor into interpretation in the main text would import explanation beyond
    the Hebrew wording. Preserving the literal language also maintains the theological
    tension intended by the prophet.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Sexual-infidelity language
  chosen_reading: Use strong terms ('prostitutions,' 'adulteries') rather than softening
    to generic 'unfaithfulness.'
  alternative_readings:
  - unfaithfulness
  - immorality
  rationale: Hosea intentionally uses sexually charged language to depict idolatrous
    covenant breach. Softening the diction would diminish the prophetic force and
    obscure the metaphor's severity.
  doctrine_reference: Translation philosophy items 1 and 6
