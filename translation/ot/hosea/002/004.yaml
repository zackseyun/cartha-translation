id: HOS.2.4
reference: Hosea 2:4
source:
  edition: WLC
  text: רִ֤יבוּ בְ/אִמְּ/כֶם֙ רִ֔יבוּ כִּֽי הִיא֙ לֹ֣א אִשְׁתִּ֔/י וְ/אָנֹכִ֖י לֹ֣א
    אִישָׁ֑/הּ וְ/תָסֵ֤ר זְנוּנֶ֨י/הָ֙ מִ/פָּנֶ֔י/ה וְ/נַאֲפוּפֶ֖י/הָ מִ/בֵּ֥ין שָׁדֶֽי/הָ־׃
translation:
  text: Contend with your mother, contend, for she is not my wife, and I am not her
    husband; let her remove her prostitutions from her face and her adulteries from
    between her breasts.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Bring a case against your mother' / 'Plead against your mother.' The
      Hebrew verb ריב can carry legal-disputational force.
    reason: lexical_alternative
  - marker: b
    text: '''Prostitutions'' renders a Hebrew term often used in Hosea both for literal
      sexual misconduct and, metaphorically, for covenant unfaithfulness through idolatry.'
    reason: cultural_note
lexical_decisions:
- source_word: רִיבוּ
  chosen: Contend
  alternatives:
  - Plead
  - Bring a case against
  - Accuse
  lexicon: HALOT
  rationale: Imperative plural of ריב in a covenant-lawsuit context. 'Contend' preserves
    both the legal/disputational force and the repeated urgency without over-specifying
    courtroom procedure.
- source_word: בְאִמְּכֶם
  chosen: with your mother
  alternatives:
  - against your mother
  lexicon: HALOT
  rationale: The preposition ב with ריב can mean 'contend with' or idiomatically 'bring
    a case against.' 'With your mother' is more formally transparent, while the adversative
    sense is still clear in English from context.
- source_word: כִּי הִיא לֹא אִשְׁתִּי וְאָנֹכִי לֹא אִישָׁהּ
  chosen: for she is not my wife, and I am not her husband
  alternatives:
  - for she is not my woman, and I am not her man
  lexicon: HALOT
  rationale: The Hebrew uses standard marital terms אשה/איש in possessive relationship.
    'Wife' and 'husband' best convey the covenant-marriage metaphor in natural English.
- source_word: וְתָסֵר
  chosen: let her remove
  alternatives:
  - and let her put away
  - that she may remove
  lexicon: HALOT
  rationale: Jussive nuance after the declaration of broken marital relation. 'Let
    her remove' captures the exhortational force in readable English.
- source_word: זְנוּנֶיהָ
  chosen: her prostitutions
  alternatives:
  - her whorings
  - her acts of prostitution
  - her harlotries
  lexicon: HALOT
  rationale: זנונים denotes acts/patterns of sexual unfaithfulness and, in Hosea,
    metaphorical covenant infidelity. 'Prostitutions' is strong, concrete, and modern
    without archaic coloring; 'whorings' is possible but less natural for contemporary
    readers.
- source_word: מִפָּנֶיהָ
  chosen: from her face
  alternatives:
  - from before her
  - from her presence
  lexicon: HALOT
  rationale: The phrase is spatial and vivid. 'From her face' preserves the concrete
    imagery of publicly displayed unfaithfulness rather than abstracting it.
- source_word: וְנַאֲפוּפֶיהָ
  chosen: her adulteries
  alternatives:
  - her adulterous acts
  - her adulteries of passion
  lexicon: HALOT
  rationale: Derived from נאף, referring to acts of adultery. 'Adulteries' keeps the
    plural and the moral/covenantal force.
- source_word: מִבֵּין שָׁדֶיהָ
  chosen: from between her breasts
  alternatives:
  - from between her bosom
  - from her chest
  lexicon: HALOT
  rationale: A concrete bodily image likely referring to seductive adornment or visible
    tokens of sexual availability. 'Breasts' is the most direct and accurate rendering
    of שָׁדַיִם here.
