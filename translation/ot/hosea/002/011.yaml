id: HOS.2.11
reference: Hosea 2:11
source:
  edition: WLC
  text: לָ/כֵ֣ן אָשׁ֔וּב וְ/לָקַחְתִּ֤י דְגָנִ/י֙ בְּ/עִתּ֔/וֹ וְ/תִירוֹשִׁ֖/י בְּ/מֽוֹעֲד֑/וֹ
    וְ/הִצַּלְתִּי֙ צַמְרִ֣/י וּ/פִשְׁתִּ֔/י לְ/כַסּ֖וֹת אֶת עֶרְוָתָֽ/הּ־׃
translation:
  text: Therefore I will return and take back my grain in its time, and my new wine
    in its season; and I will take away my wool and my flax, which were to cover her
    nakedness.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'snatch away' for 'take away' (וְהִצַּלְתִּי), emphasizing sudden removal.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'her nakedness'; the term can also carry the sense of shame through
      exposure.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - So
  - For this reason
  lexicon: HALOT
  rationale: Marks a consequential transition from the preceding accusation/judgment.
    'Therefore' preserves the prophetic logic clearly in English.
- source_word: אָשׁוּב
  chosen: I will return
  alternatives:
  - I will turn back
  - I will go back
  lexicon: HALOT
  rationale: The verb שוב in Qal commonly means 'return/turn back.' Here it introduces
    YHWH's renewed action in judgment. 'Return' is concise and idiomatic.
- source_word: וְלָקַחְתִּי
  chosen: and take back
  alternatives:
  - and take
  - and seize
  lexicon: HALOT
  rationale: Although לקח is basically 'take,' the context is repossession of gifts
    previously given, so 'take back' makes the implied reversal explicit without over-paraphrasing.
- source_word: דְגָנִי
  chosen: my grain
  alternatives:
  - my corn
  - my cereal
  lexicon: HALOT
  rationale: דגן denotes grain produce generally. 'Grain' is standard modern English
    and avoids archaic 'corn'.
- source_word: בְּעִתּוֹ
  chosen: in its time
  alternatives:
  - at its time
  - when it is due
  lexicon: HALOT
  rationale: Retains the temporal specificity of עת with the 3ms suffix referring
    to the grain's proper time/harvest period.
- source_word: וְתִירוֹשִׁי
  chosen: my new wine
  alternatives:
  - my wine
  - my fresh wine
  lexicon: HALOT
  rationale: תירוש commonly refers to fresh/new wine rather than wine in general.
    'New wine' preserves the agricultural nuance.
- source_word: בְּמוֹעֲדוֹ
  chosen: in its season
  alternatives:
  - at its appointed time
  - in its appointed season
  lexicon: HALOT
  rationale: מועד can mean appointed time/season. 'In its season' reads naturally
    while preserving the idea of proper timing parallel to 'in its time.'
- source_word: וְהִצַּלְתִּי
  chosen: and I will take away
  alternatives:
  - and I will snatch away
  - and I will rescue
  lexicon: HALOT
  rationale: The Hiphil of נצל can mean 'snatch away/deliver.' In this context YHWH
    removes materials previously used by Israel, so 'take away' best fits the sense.
    A more literal 'snatch away' is possible but less natural in English.
- source_word: צַמְרִי
  chosen: my wool
  lexicon: HALOT
  rationale: Straightforward possessive noun; refers to wool as a material resource
    given by YHWH.
- source_word: וּפִשְׁתִּי
  chosen: and my flax
  alternatives:
  - and my linen
  lexicon: HALOT
  rationale: פשתה is flax, the raw material; 'linen' would shift to the manufactured
    product. 'Flax' better matches the Hebrew.
- source_word: לְכַסּוֹת
  chosen: which were to cover
  alternatives:
  - to cover
  - for covering
  lexicon: HALOT
  rationale: The infinitive expresses purpose. Rendering it as a relative clause in
    English clarifies that the wool and flax were intended to cover her nakedness.
- source_word: עֶרְוָתָהּ
  chosen: her nakedness
  alternatives:
  - her shame
  - her private parts
  lexicon: HALOT
  rationale: ערוה literally denotes nakedness, often with shame/exposure connotations.
    'Her nakedness' preserves the concrete image and its moral force without reducing
    it to abstraction.
