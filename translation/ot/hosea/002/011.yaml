theological_decisions:
- issue: Whether to make explicit that YHWH is reclaiming gifts previously bestowed
  chosen_reading: Use 'take back' for לקח while keeping the rest of the verse close
    to the Hebrew
  alternative_readings:
  - Use simply 'take' and leave the repossession nuance implicit
  rationale: The context in Hosea emphasizes that Israel attributed YHWH's gifts to
    Baal; this verse announces their removal. 'Take back' reflects that covenantal
    reversal without adding a doctrinal claim beyond the context.
  doctrine_reference: Translation philosophy §1, §5
- issue: Whether to soften the sexual-shame imagery in עֶרְוָתָהּ
  chosen_reading: Retain 'her nakedness' in the main text
  alternative_readings:
  - Render as 'her shame'
  rationale: The prophetic metaphor intentionally uses exposed nakedness imagery.
    Preserving the concrete wording maintains the text's rhetorical and theological
    force rather than resolving it into a safer abstraction.
  doctrine_reference: Translation philosophy §3
