id: HOS.2.9
reference: Hosea 2:9
source:
  edition: WLC
  text: וְ/רִדְּפָ֤ה אֶת מְאַהֲבֶ֨י/הָ֙ וְ/לֹֽא תַשִּׂ֣יג אֹתָ֔/ם וּ/בִקְשָׁ֖תַ/ם
    וְ/לֹ֣א תִמְצָ֑א וְ/אָמְרָ֗ה אֵלְכָ֤ה וְ/אָשׁ֨וּבָה֙ אֶל אִישִׁ֣/י הָֽ/רִאשׁ֔וֹן
    כִּ֣י ט֥וֹב לִ֛/י אָ֖ז מֵ/עָֽתָּה־־־׃
translation:
  text: She will pursue her lovers, but she will not overtake them; she will seek
    them, but she will not find them. Then she will say, ‘I will go and return to
    my first husband, for it was better for me then than now.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'former husband.' The Hebrew reads literally 'my first husband.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרִדְּפָה
  chosen: she will pursue
  alternatives:
  - she pursued
  - she chases
  lexicon: HALOT
  rationale: Qal perfect with prefixed conjunction in prophetic discourse functions
    naturally as a future in English. 'Pursue' preserves the sense of active chasing
    after desired objects/persons.
- source_word: מְאַהֲבֶיהָ
  chosen: her lovers
  alternatives:
  - those who love her
  - her paramours
  lexicon: HALOT
  rationale: In Hosea's marriage metaphor this refers to illicit lovers rather than
    affectionate friends. 'Lovers' is the most direct and natural rendering.
- source_word: תַשִּׂיג
  chosen: she will overtake
  alternatives:
  - she will catch
  - she will reach
  lexicon: HALOT
  rationale: Hiphil of נשׂג after 'pursue' is well rendered 'overtake,' preserving
    the chase imagery and the failure to catch up.
- source_word: וּבִקְשָׁתַם
  chosen: she will seek them
  alternatives:
  - she will search for them
  - she will look for them
  lexicon: HALOT
  rationale: The verb בקש with object suffix denotes intentional seeking. 'Seek' is
    concise and matches the parallelism with 'find.'
- source_word: תִמְצָא
  chosen: she will not find
  alternatives:
  - she will not discover
  - she will not attain
  lexicon: HALOT
  rationale: מצא in this context means finding the sought-after lovers. 'Find' is
    the plain equivalent and preserves the poetic parallel.
- source_word: וְאָמְרָה
  chosen: Then she will say
  alternatives:
  - and she will say
  - so she will say
  lexicon: HALOT
  rationale: The conjunction marks sequence/result after failed pursuit. 'Then' makes
    the narrative progression clear in English without over-paraphrasing.
- source_word: אֵלְכָה וְאָשׁוּבָה
  chosen: I will go and return
  alternatives:
  - I will go back
  - let me go and return
  lexicon: HALOT
  rationale: The cohortative-like first person forms express resolve. 'I will go and
    return' preserves both verbs rather than collapsing them into a single idiom.
- source_word: אֶל אִישִׁי הָרִאשׁוֹן
  chosen: to my first husband
  alternatives:
  - to my former husband
  - to my first man
  lexicon: HALOT
  rationale: אישׁ in marital context means 'husband.' 'First husband' is more literal
    than 'former husband' and fits the marriage metaphor central to Hosea.
- source_word: כִּי טוֹב לִי אָז מֵעָתָּה
  chosen: for it was better for me then than now
  alternatives:
  - for then it was better for me than at present
  - for I was better off then than now
  lexicon: HALOT
  rationale: The clause contrasts her prior condition with her present one. 'It was
    better for me then than now' is idiomatic, faithful, and preserves the temporal
    contrast signaled by אָז and מֵעָתָּה.
