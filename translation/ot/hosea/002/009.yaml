theological_decisions:
- issue: Marriage metaphor for Israel's unfaithfulness
  chosen_reading: Retain 'lovers' and 'husband' language directly in the main text
  alternative_readings:
  - Use softened relational terms such as 'allies' or 'providers'
  rationale: The verse participates in Hosea's sustained covenant-as-marriage metaphor.
    While the lovers may symbolize foreign gods or political alliances, the text itself
    uses marital/sexual imagery and should not be flattened into a purely political
    paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 6
