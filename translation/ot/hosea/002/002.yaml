theological_decisions:
- issue: Meaning of 'one head' in the reunification of Judah and Israel
  chosen_reading: Retain the metaphor 'one head' without specifying the identity of
    the leader.
  alternative_readings:
  - one king
  - one leader, possibly messianic
  - one political ruler
  rationale: The Hebrew text states unified leadership but does not explicitly identify
    the figure here. Preserving 'head' maintains the theological tension and avoids
    importing a more specific messianic or political claim than the verse itself makes.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of 'go up from the land'
  chosen_reading: Translate spatially as 'go up from the land' and leave the exact
    referent open.
  alternative_readings:
  - come up out of the land in an exodus-like restoration
  - go up from the land to battle or to the land of promise
  rationale: The phrase may evoke return from exile, military mustering, or ascent
    to the land under restored unity. The main text should preserve the image without
    narrowing it prematurely.
  doctrine_reference: Preserve theological tension rather than resolve it.
