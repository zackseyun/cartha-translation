id: HOS.2.2
reference: Hosea 2:2
source:
  edition: WLC
  text: וְ֠/נִקְבְּצוּ בְּנֵֽי יְהוּדָ֤ה וּ/בְנֵֽי יִשְׂרָאֵל֙ יַחְדָּ֔ו וְ/שָׂמ֥וּ
    לָ/הֶ֛ם רֹ֥אשׁ אֶחָ֖ד וְ/עָל֣וּ מִן הָ/אָ֑רֶץ כִּ֥י גָד֖וֹל י֥וֹם יִזְרְעֶֽאל־־־׃
translation:
  text: Then the sons of Judah and the sons of Israel will be gathered together, and
    they will appoint for themselves one head, and they will go up from the land,
    for great will be the day of Jezreel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appoint for themselves one leader.' The Hebrew literally says 'one head.'
    reason: lexical_alternative
  - marker: b
    text: '''From the land'' may refer to coming up out of exile or to a restored
      ascent into the land; the Hebrew leaves the exact nuance open.'
    reason: alternative_reading
  - marker: c
    text: Jezreel is both a place name and a theologically charged name in Hosea,
      echoing themes of scattering and sowing.
    reason: cultural_note
lexical_decisions:
- source_word: וְנִקְבְּצוּ
  chosen: will be gathered together
  alternatives:
  - will assemble
  - will be collected together
  lexicon: HALOT
  rationale: Niphal imperfect/converted form of קבץ conveys being gathered or assembling;
    passive/reflexive nuance is best preserved by 'will be gathered together.'
- source_word: בְּנֵי יְהוּדָה
  chosen: the sons of Judah
  alternatives:
  - the people of Judah
  - the children of Judah
  lexicon: HALOT
  rationale: Literally 'sons of Judah.' Kept gender-accurate and formally close per
    translation philosophy; here it denotes the covenant people identified with Judah.
- source_word: וּבְנֵי יִשְׂרָאֵל
  chosen: and the sons of Israel
  alternatives:
  - and the people of Israel
  - and the children of Israel
  lexicon: HALOT
  rationale: Parallel to 'sons of Judah'; retaining 'sons' preserves the Hebrew idiom
    and the symmetry of the reunited groups.
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - as one
  - jointly
  lexicon: HALOT
  rationale: Straightforward adverb indicating united action; 'together' is natural
    and sufficiently formal.
- source_word: וְשָׂמוּ לָהֶם רֹאשׁ אֶחָד
  chosen: they will appoint for themselves one head
  alternatives:
  - they will set over themselves one leader
  - they will place for themselves one chief
  lexicon: HALOT
  rationale: שׂים with ל plus object means to set/appoint; רֹאשׁ literally 'head'
    can metaphorically mean leader. 'Head' preserves the metaphor while remaining
    intelligible.
- source_word: רֹאשׁ אֶחָד
  chosen: one head
  alternatives:
  - one leader
  - a single chief
  lexicon: HALOT
  rationale: The singular emphasizes unified leadership after division. 'Head' is
    retained in the main text to preserve the Hebrew image; 'leader' is a viable interpretive
    alternative.
- source_word: וְעָלוּ
  chosen: they will go up
  alternatives:
  - they will come up
  - they will ascend
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend.' 'Go up' is idiomatic and preserves
    the directional imagery often used for return or movement to a higher place.
- source_word: מִן הָאָרֶץ
  chosen: from the land
  alternatives:
  - out of the land
  - from the earth
  lexicon: HALOT
  rationale: אֶרֶץ can mean land or earth; in Hosea's restoration context 'the land'
    is more likely than the cosmic 'earth.' It may refer to departure from exile or
    emergence into restored status.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Introduces the reason or ground for the preceding statement; 'for' fits
    the prophetic style well.
- source_word: גָדוֹל יֹום
  chosen: great will be the day
  alternatives:
  - the day will be great
  - great is the day
  lexicon: HALOT
  rationale: Predicate adjective before noun gives emphasis. English fronting 'great
    will be the day' preserves the elevated prophetic tone.
- source_word: יִזְרְעֶאל
  chosen: Jezreel
  lexicon: HALOT
  rationale: Proper name transliterated per philosophy. The name also carries wordplay
    associations with sowing/scattering in Hosea, but the proper name should remain
    in the text.
