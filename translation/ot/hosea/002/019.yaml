id: HOS.2.19
reference: Hosea 2:19
source:
  edition: WLC
  text: וַ/הֲסִרֹתִ֛י אֶת שְׁמ֥וֹת הַ/בְּעָלִ֖ים מִ/פִּ֑י/הָ וְ/לֹֽא יִזָּכְר֥וּ ע֖וֹד
    בִּ/שְׁמָֽ/ם־־׃
translation:
  text: And I will remove the names of the Baals from her mouth, and they will no
    longer be remembered by their name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'they will no longer be mentioned again.' The Hebrew verb can denote
      either being remembered or being mentioned, and in context both ideas support
      the end of Baal worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַהֲסִרֹתִי
  chosen: And I will remove
  alternatives:
  - And I will take away
  - And I will turn aside
  lexicon: HALOT
  rationale: Hiphil of סור here has causative force, 'cause to depart/remove.' 'Remove'
    is clear modern English and fits the object 'the names.' The prefixed conjunction
    is rendered simply as 'And' in narrative-prophetic sequence.
- source_word: שְׁמוֹת
  chosen: the names
  alternatives:
  - the name-titles
  lexicon: HALOT
  rationale: Plural construct of שֵׁם, referring to the invoked names/titles of the
    Baals. A straightforward 'the names' preserves the idiom and the polemical force
    against naming these deities.
- source_word: הַבְּעָלִים
  chosen: the Baals
  alternatives:
  - the lords
  - the Baal idols
  lexicon: HALOT
  rationale: Though בעל can mean 'lord/master/owner,' in Hosea this plural clearly
    refers to the Canaanite deities/idols associated with Israel's apostasy. 'The
    Baals' preserves the proper cultic reference rather than flattening it into a
    common noun.
- source_word: מִפִּיהָ
  chosen: from her mouth
  alternatives:
  - from her lips
  lexicon: HALOT
  rationale: Literal rendering preserves the Hebrew idiom of speech/invocation. 'Mouth'
    is natural enough in English and keeps the imagery of spoken names.
- source_word: וְלֹא יִזָּכְרוּ עוֹד
  chosen: and they will no longer be remembered
  alternatives:
  - and they will not be mentioned again
  - and one will no longer remember them
  lexicon: HALOT
  rationale: Niphal of זכר is passive/reflexive, 'be remembered/mentioned.' 'Be remembered'
    is the more direct lexical equivalent; the context implies cessation of cultic
    invocation and recollection.
- source_word: בִּשְׁמָם
  chosen: by their name
  alternatives:
  - by name
  - by their names
  lexicon: HALOT
  rationale: Singular שֵׁם with 3mp suffix functions idiomatically, likely 'by their
    name' = under/in connection with their name. Retaining the singular reflects the
    Hebrew form while remaining intelligible in English. 'By name' is possible but
    less formally transparent.
