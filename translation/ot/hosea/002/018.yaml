theological_decisions:
- issue: Whether to render בַּעְלִי by its common sense ('my master'/'my husband')
    or preserve the likely allusion to Baal worship
  chosen_reading: My Baal
  alternative_readings:
  - my master
  - my lord
  - my husband
  rationale: In context, Hosea contrasts covenant intimacy ('my husband') with terminology
    compromised by association with Baal. Translating בַּעְלִי as 'My Baal' preserves
    the theological tension between marital language and idolatrous misnaming. A footnote
    preserves the lexical alternatives because the Hebrew noun itself can bear those
    senses.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency/documented
    exception.
