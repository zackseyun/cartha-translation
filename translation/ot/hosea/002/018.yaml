id: HOS.2.18
reference: Hosea 2:18
source:
  edition: WLC
  text: וְ/הָיָ֤ה בַ/יּוֹם הַ/הוּא֙ נְאֻם יְהוָ֔ה תִּקְרְאִ֖י אִישִׁ֑/י וְ/לֹֽא תִקְרְאִי
    לִ֥/י ע֖וֹד בַּעְלִֽ/י־־־־׃
translation:
  text: And in that day, declares the LORD, you will call me ‘My husband,’ and you
    will no longer call me ‘My Baal.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew baʿli can mean 'my master,' 'my lord,' or even 'my husband'; here
      it is rendered 'My Baal' to preserve the wordplay and likely allusion to Baal
      worship in Hosea’s context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And in that day
  alternatives:
  - And it shall be
  - And it will happen
  lexicon: HALOT
  rationale: The clause introduces a future circumstance. In English, the temporal
    phrase naturally carries the force of the Hebrew idiom, so the existential verb
    is absorbed into the smoother rendering 'And in that day' rather than left as
    a wooden 'And it shall be.'
- source_word: בַיּוֹם הַהוּא
  chosen: in that day
  alternatives:
  - on that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'In that day' is idiomatic in English
    prophetic discourse and preserves the eschatological/covenantal tone.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A conventional prophetic speech formula. 'Declares the LORD' is natural
    modern English and preserves the solemn prophetic register. 'the LORD' follows
    the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the default rendering of the divine name is 'the LORD,'
    following Jewish reverence tradition and longstanding covenantal usage.
- source_word: תִּקְרְאִי
  chosen: you will call
  alternatives:
  - you will say
  - you will name
  lexicon: HALOT
  rationale: The verb קרא here means to address or call someone by a title. 'You will
    call' best fits both occurrences and preserves the relational naming contrast.
- source_word: אִישִׁי
  chosen: My husband
  alternatives:
  - my man
  - my husband/partner
  lexicon: HALOT
  rationale: Though אִישׁ can mean 'man,' in this marital context 'my husband' is
    the clear sense and highlights the intimate covenant relationship being restored.
- source_word: וְלֹא תִקְרְאִי לִי עוֹד
  chosen: and you will no longer call me
  alternatives:
  - and you will not call me anymore
  lexicon: HALOT
  rationale: '''No longer'' is the most natural English expression for עוֹד with negation
    in a future statement, preserving the sense of decisive discontinuity.'
- source_word: בַּעְלִי
  chosen: My Baal
  alternatives:
  - my master
  - my lord
  - my husband
  lexicon: HALOT
  rationale: The noun בעל can mean 'master,' 'owner,' or even 'husband,' but in Hosea
    the wordplay with the name/title Baal is central. Rendering it as 'My Baal' preserves
    the polemical contrast with 'My husband' and avoids flattening the anti-idolatry
    force. The possessive is retained because the Hebrew has the 1cs suffix.
