theological_decisions:
- issue: Rendering of לַבָּעַל in an idolatry context
  chosen_reading: Baal
  alternative_readings:
  - the Baal
  - the lord
  rationale: Because בַּעַל here refers to the Canaanite deity rather than a generic
    'lord,' the proper-name rendering 'Baal' is required. The prefixed article is
    absorbed in English idiom. This avoids importing a generic title where the text
    indicts specific idol worship.
