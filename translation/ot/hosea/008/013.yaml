theological_decisions:
- issue: Meaning of 'return to Egypt'
  chosen_reading: they will return to Egypt
  alternative_readings:
  - they will go back into bondage like Egypt
  - Egypt functions symbolically for exile and oppression
  rationale: The Hebrew names Egypt directly. The translation keeps the geographic term in the main text and does not resolve whether Hosea intends a literal return, a metaphor for bondage, or a typological reversal of the exodus. This preserves the prophetic tension rather than importing a single interpretive scheme.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
