id: HOS.8.13
reference: Hosea 8:13
source:
  edition: WLC
  text: זִבְחֵ֣י הַבְהָבַ֗/י יִזְבְּח֤וּ בָשָׂר֙ וַ/יֹּאכֵ֔לוּ יְהוָ֖ה לֹ֣א רָצָ֑/ם עַתָּ֞ה יִזְכֹּ֤ר עֲוֺנָ/ם֙ וְ/יִפְקֹ֣ד חַטֹּאותָ֔/ם הֵ֖מָּה מִצְרַ֥יִם יָשֽׁוּבוּ׃
translation:
  text: As for the sacrifices of my offerings, they sacrifice flesh and eat it, but Yahweh does not accept them. Now he will remember their iniquity and punish their sins; they will return to Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has an unusual expression, literally something like 'the sacrifices of my offerings.' It may also be understood as 'my sacrificial gifts' or, less likely, 'my beloved sacrifices.'
    reason: lexical_alternative
  - marker: b
    text: Or 'takes no pleasure in them' / 'is not pleased with them.'
    reason: lexical_alternative
  - marker: c
    text: '''Return to Egypt'' may refer to an actual return, or more broadly to a return to bondage and exile under the image of Egypt.'
    reason: alternative_reading
lexical_decisions:
- source_word: זִבְחֵי הַבְהָבַי
  chosen: the sacrifices of my offerings
  alternatives:
  - my sacrificial gifts
  - the sacrifices of my gift-offerings
  - my beloved sacrifices
  lexicon: HALOT
  rationale: זִבְחֵי is construct plural, 'sacrifices of.' הַבְהָבַי is a difficult form; in context and by common lexical judgment it refers to offerings/gifts presented to God, hence 'my offerings.' The phrase is rendered transparently rather than emended. Because the Hebrew is unusual, an alternative is preserved in a footnote.
- source_word: יִזְבְּחוּ
  chosen: they sacrifice
  alternatives:
  - they offer in sacrifice
  lexicon: HALOT
  rationale: Qal imperfect 3mp from זבח, straightforwardly 'they sacrifice/offer sacrifice.' Present tense in English fits the descriptive force of the clause.
- source_word: בָשָׂר וַיֹּאכֵלוּ
  chosen: flesh and eat it
  alternatives:
  - meat and eat it
  lexicon: HALOT
  rationale: בָשָׂר is literally 'flesh' and in sacrificial context refers to the meat of the offering. 'Flesh' preserves the concrete sacrificial language; 'eat it' makes the object explicit in natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֹא רָצָם
  chosen: does not accept them
  alternatives:
  - takes no pleasure in them
  - is not pleased with them
  lexicon: HALOT
  rationale: רצה with object suffix conveys favorable acceptance of sacrifice. 'Does not accept them' best matches the sacrificial context more specifically than the broader 'is not pleased with them.'
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At this time
  lexicon: HALOT
  rationale: Marks the transition from present cultic action to imminent divine judgment.
- source_word: יִזְכֹּר עֲוֺנָם
  chosen: he will remember their iniquity
  alternatives:
  - he will remember their guilt
  lexicon: HALOT
  rationale: זכר in judgment contexts means to call to account, but 'remember' should be preserved because it is the source-text wording and carries covenantal/judicial force. עָוֹן is well rendered 'iniquity,' with 'guilt' as a possible contextual alternative.
- source_word: וְיִפְקֹד חַטֹּאותָם
  chosen: and punish their sins
  alternatives:
  - and visit their sins upon them
  - and call their sins to account
  lexicon: HALOT
  rationale: פקד in punitive contexts means to attend to for judgment or punish. 'Punish their sins' is idiomatic English that conveys the judicial sense without obscuring the Hebrew parallelism.
- source_word: הֵמָּה מִצְרַיִם יָשׁוּבוּ
  chosen: they will return to Egypt
  alternatives:
  - they themselves will return to Egypt
  lexicon: HALOT
  rationale: The pronoun הֵמָּה is emphatic; English can convey the sense without overloading the line. 'Return to Egypt' may be literal, symbolic of renewed bondage, or both; the translation preserves the wording and leaves the interpretive tension unresolved.
