id: HOS.1.5
reference: Hosea 1:5
source:
  edition: WLC
  text: וְ/הָיָ֖ה בַּ/יּ֣וֹם הַ/ה֑וּא וְ/שָֽׁבַרְתִּי֙ אֶת קֶ֣שֶׁת יִשְׂרָאֵ֔ל בְּ/עֵ֖מֶק
    יִזְרְעֶֽאל־׃
translation:
  text: And on that day I will break the bow of Israel in the Valley of Jezreel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I will shatter the bow of Israel'; the 'bow' represents Israel's military
      strength.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And ... will be
  alternatives:
  - And it shall happen
  - And it will come about
  lexicon: HALOT
  rationale: The clause introduces a future event formula. In idiomatic English, the
    sense is best carried by beginning the sentence with 'And on that day' rather
    than a wooden 'And it shall be.' This preserves the temporal-prophetic force without
    awkwardness.
- source_word: בַּיּוֹם הַהוּא
  chosen: on that day
  alternatives:
  - in that day
  lexicon: HALOT
  rationale: Standard prophetic temporal expression. 'On that day' is natural modern
    English and preserves the eschatological/judgment-oriented timing formula.
- source_word: וְשָׁבַרְתִּי
  chosen: I will break
  alternatives:
  - I will shatter
  lexicon: HALOT
  rationale: The verb שׁבר commonly means 'break' or 'shatter.' 'Break' is the more
    direct and idiomatic rendering here for the destruction of military power.
- source_word: קֶשֶׁת יִשְׂרָאֵל
  chosen: the bow of Israel
  alternatives:
  - Israel's bow
  lexicon: HALOT
  rationale: Literally 'the bow of Israel.' The bow stands metonymically for military
    strength, but the image should be preserved in the main text rather than interpreted
    away.
- source_word: בְּעֵמֶק
  chosen: in the Valley of
  alternatives:
  - in the plain of
  - at the valley of
  lexicon: HALOT
  rationale: עֵמֶק denotes a valley. Capitalizing 'Valley' is appropriate as part
    of the place designation in English.
- source_word: יִזְרְעֶאל
  chosen: Jezreel
  lexicon: HALOT
  rationale: Standard English transliteration of the place name. Names are transliterated
    rather than translated under the project philosophy.
