theological_decisions:
- issue: Whether to render 'bow' literally or interpret it as military power
  chosen_reading: Retain the literal image 'the bow of Israel' in the main text
  alternative_readings:
  - the military power of Israel
  - the strength of Israel
  rationale: The Hebrew uses a concrete military image that also carries symbolic
    force. Preserving the image maintains the prophetic rhetoric and allows readers
    to infer the metonymic sense without importing interpretation into the main text.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source
    text''s plain sense without paraphrase beyond what the text warrants.'
