theological_decisions:
- issue: Rendering the symbolic daughter's name
  chosen_reading: Transliterate as 'Lo-ruhamah' in the main text while expressing
    the meaning through the following clause about withheld compassion.
  alternative_readings:
  - Translate the name directly as 'No Mercy' or 'Not Pitied'
  rationale: The project's philosophy says to transliterate personal names by standard
    conventions. Because the theological force of the sign-name depends on its meaning,
    the semantic connection is preserved by rendering רחם consistently as 'show compassion'
    in the explanation and by adding a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; consistency
    of key terms'
- issue: Interpretation of the difficult final clause כִּי נָשֹׂא אֶשָּׂא לָהֶם
  chosen_reading: 'Render as an emphatic statement of forgiveness withheld: ''that
    I should surely forgive them.'''
  alternative_readings:
  - 'Render as judgment: ''that I should surely take them away'''
  - 'Render more generally: ''that I should surely pardon them'''
  rationale: The clause is textually and syntactically difficult. In the immediate
    context of withheld compassion, the traditional understanding 'forgive/pardon'
    coheres well, especially with נשׂא used in the sense of bearing away guilt. Because
    the Hebrew can be taken differently, the alternative is preserved in a footnote
    rather than hidden.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
