id: HOS.1.6
reference: Hosea 1:6
source:
  edition: WLC
  text: וַ/תַּ֤הַר עוֹד֙ וַ/תֵּ֣לֶד בַּ֔ת וַ/יֹּ֣אמֶר ל֔/וֹ קְרָ֥א שְׁמָ֖/הּ לֹ֣א
    רֻחָ֑מָה כִּי֩ לֹ֨א אוֹסִ֜יף ע֗וֹד אֲרַחֵם֙ אֶת בֵּ֣ית יִשְׂרָאֵ֔ל כִּֽי נָשֹׂ֥א
    אֶשָּׂ֖א לָ/הֶֽם־־׃
translation:
  text: Then she conceived again and gave birth to a daughter. And he said to him,
    “Call her name Lo-ruhamah, for I will no longer again show compassion to the house
    of Israel, that I should surely forgive them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lo-ruhamah sounds like 'not shown compassion' or 'no mercy.'
    reason: lexical_alternative
  - marker: b
    text: Or possibly, 'for I will surely take them away.' The Hebrew of the final
      clause is difficult.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתַּהַר עוֹד
  chosen: Then she conceived again
  alternatives:
  - And she became pregnant again
  - She conceived once more
  lexicon: HALOT
  rationale: וַתַּהַר is the narrative wayyiqtol of הרה, 'conceive/become pregnant.'
    עוֹד adds the sense 'again/still.' 'Then she conceived again' preserves the narrative
    sequence and the repeated conception.
- source_word: וַתֵּלֶד בַּת
  chosen: and gave birth to a daughter
  alternatives:
  - and bore a daughter
  lexicon: HALOT
  rationale: ילד with בַּת straightforwardly means giving birth to a daughter. 'Gave
    birth to' is readable modern English while remaining close to the Hebrew.
- source_word: וַיֹּאמֶר לוֹ
  chosen: And he said to him
  alternatives:
  - Then he said to him
  lexicon: HALOT
  rationale: The Hebrew explicitly has a 3ms indirect object, 'to him,' most naturally
    referring to Hosea. Retaining both pronouns preserves the source-text wording
    rather than smoothing it to 'the LORD said to Hosea,' which would import an explicit
    subject not stated in this verse.
- source_word: קְרָא שְׁמָהּ
  chosen: Call her name
  alternatives:
  - Name her
  - Call her
  lexicon: HALOT
  rationale: This is a standard naming formula. 'Call her name' is slightly more formal
    but preserves the Hebrew idiom and the solemnity of the prophetic naming.
- source_word: לֹא רֻחָמָה
  chosen: Lo-ruhamah
  alternatives:
  - Not-shown-compassion
  - No Mercy
  - Not Pitied
  lexicon: HALOT
  rationale: Per translation philosophy, personal names are transliterated rather
    than translated in the main text. The name is transparently built on רחם ('show
    compassion/have mercy'), so its sense is preserved in the explanatory clause and
    can be clarified in a footnote.
- source_word: לֹא אוֹסִיף עוֹד אֲרַחֵם
  chosen: I will no longer again show compassion
  alternatives:
  - I will no longer have compassion
  - I will not continue to show mercy
  lexicon: HALOT
  rationale: 'The combination of יסף (''add/continue'') with עוֹד and the piel of
    רחם expresses cessation: ''I will no longer continue to show compassion.'' ''Show
    compassion'' matches the root behind the daughter''s name and preserves the lexical
    connection better than switching to a different English term.'
- source_word: בֵּית יִשְׂרָאֵל
  chosen: the house of Israel
  alternatives:
  - Israel
  lexicon: HALOT
  rationale: The Hebrew explicitly says 'house of Israel,' a covenantal-national expression.
    It should not be flattened to simply 'Israel' without need.
- source_word: כִּי נָשֹׂא אֶשָּׂא לָהֶם
  chosen: that I should surely forgive them
  alternatives:
  - for I will surely take them away
  - for I will surely lift them up
  - for I will surely pardon them
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb of נשׂא intensifies the action.
    In context after the denial of compassion, the idiom is commonly understood as
    'forgive/pardon' (i.e., bear away guilt). 'Surely forgive' best fits the clause's
    relation to divine mercy, though the Hebrew is difficult enough to preserve alternatives
    in a footnote.
