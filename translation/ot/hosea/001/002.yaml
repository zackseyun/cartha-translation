id: HOS.1.2
reference: Hosea 1:2
source:
  edition: WLC
  text: תְּחִלַּ֥ת דִּבֶּר יְהוָ֖ה בְּ/הוֹשֵׁ֑עַ וַ/יֹּ֨אמֶר יְהוָ֜ה אֶל הוֹשֵׁ֗עַ לֵ֣ךְ קַח לְ/ךָ֞ אֵ֤שֶׁת זְנוּנִים֙ וְ/יַלְדֵ֣י זְנוּנִ֔ים כִּֽי זָנֹ֤ה תִזְנֶה֙ הָ/אָ֔רֶץ מֵֽ/אַחֲרֵ֖י יְהוָֽה־פ־־־׃
translation:
  text: The beginning of the word of Yahweh through Hosea. And Yahweh said to Hosea, “Go, take for yourself a wife of whoredom and children of whoredom, for the land utterly commits whoredom by turning away from Yahweh.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'When the LORD first spoke through Hosea.' The Hebrew opening can be construed as an incipit or as a temporal clause.
    reason: alternative_reading
  - marker: b
    text: Or 'a wife of prostitution' and 'children of prostitution.' The Hebrew זְנוּנִים can denote sexual immorality broadly or prostitution more specifically.
    reason: lexical_alternative
  - marker: c
    text: Literally 'for the land, committing whoredom, commits whoredom from after the LORD,' an emphatic Hebrew expression for extreme covenant unfaithfulness.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּחִלַּת דִּבֶּר יְהוָה בְּהוֹשֵׁעַ
  chosen: The beginning of the word of the LORD through Hosea
  alternatives:
  - The beginning of the LORD's speaking with Hosea
  - When the LORD first spoke through Hosea
  lexicon: HALOT
  rationale: תְּחִלַּת with the infinitive-like verbal noun sense of דִּבֶּר yields an incipit-like expression. בְּהוֹשֵׁעַ is best taken instrumentally/mediatorially as 'through Hosea' rather than merely 'to Hosea,' especially since the next clause explicitly uses אֶל הוֹשֵׁעַ for 'to Hosea.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: לֵךְ קַח לְךָ
  chosen: Go, take for yourself
  alternatives:
  - Go, marry
  - Go, take
  lexicon: HALOT
  rationale: The two imperatives are preserved. קַח literally means 'take'; 'for yourself' reflects לְךָ. 'Marry' is interpretive and smoother, but 'take' better preserves the Hebrew wording while still implying marriage in context.
- source_word: אֵשֶׁת זְנוּנִים
  chosen: a wife of whoredom
  alternatives:
  - a promiscuous wife
  - a wife of prostitution
  - an adulterous wife
  lexicon: HALOT
  rationale: The construct phrase is stark and metaphorically charged. 'Whoredom' preserves the sexual and covenantal force of זְנוּנִים better than the softer 'promiscuity.' 'Prostitution' is possible, but the broader prophetic metaphor includes sexual unfaithfulness generally, not only commercial sex.
- source_word: יַלְדֵי זְנוּנִים
  chosen: children of whoredom
  alternatives:
  - children of prostitution
  - children of promiscuity
  lexicon: HALOT
  rationale: Maintains the parallelism with 'wife of whoredom' and preserves the metaphorical/covenantal charge of the Hebrew expression.
- source_word: כִּי זָנֹה תִזְנֶה
  chosen: for the land utterly commits whoredom
  alternatives:
  - for the land surely commits whoredom
  - for the land has completely prostituted itself
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Utterly commits whoredom' conveys the emphatic force without overparaphrasing.
- source_word: הָאָרֶץ
  chosen: the land
  alternatives:
  - the הארץ
  - the country
  lexicon: HALOT
  rationale: In Hosea this commonly refers to the land of Israel and its inhabitants in covenant context. 'Land' preserves the Hebrew term and its theological resonance better than 'country.'
- source_word: מֵאַחֲרֵי יְהוָה
  chosen: by turning away from the LORD
  alternatives:
  - from following the LORD
  - away from after the LORD
  lexicon: HALOT
  rationale: The idiom literally means 'from after the LORD,' i.e., from following him. 'By turning away from the LORD' renders the covenantal apostasy clearly in natural English while preserving the causal relation.
