theological_decisions:
- issue: Whether to render the sexual imagery with softened modern language or preserve its prophetic offensiveness
  chosen_reading: Preserve the imagery as 'whoredom' in both phrases
  alternative_readings:
  - promiscuity
  - prostitution
  - adultery
  rationale: Hosea intentionally uses shocking sexual language to depict Israel's covenant unfaithfulness. Softening the diction would reduce the rhetorical and theological force of the prophetic sign-act. 'Whoredom' also allows the metaphor to remain broader than literal prostitution alone.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Whether בְהוֹשֵׁעַ means 'to Hosea' or 'through Hosea' in the opening clause
  chosen_reading: through Hosea
  alternative_readings:
  - with Hosea
  - to Hosea
  rationale: The immediate repetition with אֶל הוֹשֵׁעַ in the next clause distinguishes the opening preposition from direct address. Rendering 'through Hosea' highlights Hosea as prophetic instrument without importing extra doctrine.
  doctrine_reference: Translation philosophy §1
