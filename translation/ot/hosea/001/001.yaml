id: HOS.1.1
reference: Hosea 1:1
source:
  edition: WLC
  text: דְּבַר יְהוָ֣ה אֲשֶׁ֣ר הָיָ֗ה אֶל הוֹשֵׁ֨עַ֙ בֶּן בְּאֵרִ֔י בִּ/ימֵ֨י עֻזִּיָּ֥ה יוֹתָ֛ם אָחָ֥ז יְחִזְקִיָּ֖ה מַלְכֵ֣י יְהוּדָ֑ה וּ/בִ/ימֵ֛י יָרָבְעָ֥ם בֶּן יוֹאָ֖שׁ מֶ֥לֶךְ יִשְׂרָאֵֽל־׀־־־׃
translation:
  text: The word of Yahweh that came to Hosea son of Beeri in the days of Uzziah, Jotham, Ahaz, and Hezekiah, kings of Judah, and in the days of Jeroboam son of Joash, king of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''YHWH.'' Traditionally rendered ''the LORD''; alternatively, ''Yahweh.'''
    reason: alternative_reading
lexical_decisions:
- source_word: דְּבַר
  chosen: The word of
  alternatives:
  - The message of
  - The matter of
  lexicon: HALOT
  rationale: Construct form with יְהוָה; in prophetic superscriptions 'word of YHWH' is the standard idiom for divine revelation. 'Word' preserves the formulaic prophetic register better than the more interpretive 'message'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֲשֶׁר הָיָה אֶל
  chosen: that came to
  alternatives:
  - which was to
  - that was to
  - that happened to
  lexicon: HALOT
  rationale: In prophetic introduction formulas, היה אל commonly means the word 'came to' a prophet. This is idiomatic English and reflects the revelatory sense rather than a wooden 'was to'.
- source_word: הוֹשֵׁעַ
  chosen: Hosea
  lexicon: HALOT
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: בֶּן בְּאֵרִי
  chosen: son of Beeri
  alternatives:
  - the son of Beeri
  lexicon: HALOT
  rationale: Straightforward patronymic construction; 'son of Beeri' is natural English and preserves the genealogical notice.
- source_word: בִּימֵי
  chosen: in the days of
  alternatives:
  - during the reigns of
  - in the time of
  lexicon: HALOT
  rationale: Literal temporal idiom that works naturally in English and preserves the repeated Hebrew framing.
- source_word: עֻזִּיָּה יוֹתָם אָחָז יְחִזְקִיָּה
  chosen: Uzziah, Jotham, Ahaz, and Hezekiah
  lexicon: HALOT
  rationale: Royal names transliterated by standard English forms; 'and' before the final name follows normal English list style.
- source_word: מַלְכֵי יְהוּדָה
  chosen: kings of Judah
  alternatives:
  - the kings of Judah
  lexicon: HALOT
  rationale: Appositional phrase identifying the preceding names. Omission of the article in English keeps the sentence smooth while preserving the sense.
- source_word: וּבִימֵי
  chosen: and in the days of
  alternatives:
  - and during the days of
  lexicon: HALOT
  rationale: The conjunction plus repeated temporal phrase is retained to mirror the Hebrew structure and mark the separate northern-king reference.
- source_word: יָרָבְעָם בֶּן יוֹאָשׁ
  chosen: Jeroboam son of Joash
  alternatives:
  - Jeroboam the son of Joash
  lexicon: HALOT
  rationale: Standard transliteration and patronymic rendering; concise English without loss of meaning.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  chosen: king of Israel
  alternatives:
  - the king of Israel
  lexicon: HALOT
  rationale: Singular apposition to Jeroboam. English idiom favors the anarthrous form here.
