id: HOS.1.8
reference: Hosea 1:8
source:
  edition: WLC
  text: וַ/תִּגְמֹ֖ל אֶת לֹ֣א רֻחָ֑מָה וַ/תַּ֖הַר וַ/תֵּ֥לֶד בֵּֽן־׃
translation:
  text: After she had weaned Lo-ruhamah, she conceived and gave birth to a son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lo-ruhamah means 'Not shown mercy' or 'No mercy.' The name's meaning is
      important in the surrounding context, though the name itself is transliterated
      in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּגְמֹל
  chosen: After she had weaned
  alternatives:
  - And she weaned
  - When she had weaned
  lexicon: HALOT
  rationale: The verb גמל in the Qal can mean 'wean' in this context. The wayyiqtol
    advances the narrative, but in English the temporal sense is best conveyed as
    'After she had weaned' to show the sequence before the next actions.
- source_word: אֶת
  chosen: '[direct object marker, untranslated]'
  lexicon: HALOT
  rationale: This marks the definite direct object in Hebrew and is not represented
    by a separate English word.
- source_word: לֹא רֻחָמָה
  chosen: Lo-ruhamah
  alternatives:
  - Lo-Ruhamah
  lexicon: HALOT
  rationale: This is a personal name and should be transliterated rather than translated,
    per translation philosophy. Hyphenation preserves the Hebrew compound form.
- source_word: וַתַּהַר
  chosen: she conceived
  alternatives:
  - she became pregnant
  lexicon: HALOT
  rationale: '''Conceived'' is a natural and sufficiently formal rendering of הרה
    in narrative birth formulae.'
- source_word: וַתֵּלֶד
  chosen: gave birth
  alternatives:
  - bore
  lexicon: HALOT
  rationale: '''Gave birth'' is clear modern English and fits the narrative formula
    better for contemporary readers than the more traditional ''bore.'''
- source_word: בֵּן
  chosen: a son
  alternatives:
  - son
  lexicon: HALOT
  rationale: The noun means 'son.' The English indefinite article is natural because
    this is the introduction of another child in the narrative.
