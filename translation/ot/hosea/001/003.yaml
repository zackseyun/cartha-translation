id: HOS.1.3
reference: Hosea 1:3
source:
  edition: WLC
  text: וַ/יֵּ֨לֶךְ֙ וַ/יִּקַּ֔ח אֶת גֹּ֖מֶר בַּת דִּבְלָ֑יִם וַ/תַּ֥הַר וַ/תֵּֽלֶד
    ל֖/וֹ בֵּֽן־־־׃
translation:
  text: So he went and took Gomer daughter of Diblaim, and she conceived and bore
    him a son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'married Gomer' / 'took Gomer as his wife.' The Hebrew literally says
      'took,' with the marital sense supplied by the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  chosen: So he went
  alternatives:
  - And he went
  - Then he went
  lexicon: HALOT
  rationale: Wayyiqtol of הלך advances the narrative. 'So he went' gives natural English
    narrative flow while preserving the sequential force of the Hebrew.
- source_word: וַיִּקַּח
  chosen: took
  alternatives:
  - married
  - took as wife
  lexicon: HALOT
  rationale: לקח literally means 'took.' In marriage contexts it can imply taking
    a woman as wife, but the object is simply Gomer and the previous verse already
    commanded Hosea to take a wife. 'Took' preserves the Hebrew wording without over-paraphrasing;
    the marital sense is inferable from context.
- source_word: אֶת גֹּמֶר
  chosen: Gomer
  rationale: Direct-object marker is untranslated in English. The personal name is
    transliterated per translation philosophy.
- source_word: בַּת דִּבְלָיִם
  chosen: daughter of Diblaim
  alternatives:
  - the daughter of Diblaim
  lexicon: HALOT
  rationale: בת plus a proper name is a standard patronymic/genealogical expression.
    'Daughter of Diblaim' is the most direct and natural rendering.
- source_word: וַתַּהַר
  chosen: she conceived
  alternatives:
  - she became pregnant
  lexicon: HALOT
  rationale: הרה means to conceive/become pregnant. 'She conceived' is concise, idiomatic,
    and fits the birth formula that follows.
- source_word: וַתֵּלֶד
  chosen: and bore
  alternatives:
  - and gave birth to
  lexicon: HALOT
  rationale: ילד in this form means 'gave birth/bore.' 'Bore' is slightly more formal
    but remains clear in modern English and pairs naturally with 'conceived.'
- source_word: לוֹ
  chosen: him
  alternatives:
  - to him
  - for him
  lexicon: HALOT
  rationale: The preposition ל with pronominal suffix can be rendered idiomatically
    in English as 'him' in birth formulas ('bore him a son'). This preserves the relational
    sense without awkwardness.
- source_word: בֵּן
  chosen: a son
  alternatives:
  - son
  lexicon: HALOT
  rationale: בן denotes a male child. The indefinite article is natural in English
    because the Hebrew anarthrous noun introduces the child before he is named in
    the next verse.
