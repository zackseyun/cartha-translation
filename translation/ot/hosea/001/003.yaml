theological_decisions:
- issue: Whether to make the marital sense of וַיִּקַּח explicit
  chosen_reading: Retain the more literal 'took' rather than expanding to 'married'
    or 'took as wife.'
  alternative_readings:
  - married
  - took as wife
  rationale: The Hebrew verb can carry marital force in context, but the verse itself
    does not explicitly add 'as wife.' Since the preceding verse already supplies
    the marriage command, a literal rendering here preserves the source wording and
    avoids importing more than this clause states.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source text warrants.'
