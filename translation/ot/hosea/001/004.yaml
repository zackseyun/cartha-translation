id: HOS.1.4
reference: Hosea 1:4
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר יְהוָה֙ אֵלָ֔י/ו קְרָ֥א שְׁמ֖/וֹ יִזְרְעֶ֑אל כִּי ע֣וֹד מְעַ֗ט וּ/פָ֨קַדְתִּ֜י אֶת דְּמֵ֤י יִזְרְעֶאל֙ עַל בֵּ֣ית יֵה֔וּא וְ/הִ֨שְׁבַּתִּ֔י מַמְלְכ֖וּת בֵּ֥ית יִשְׂרָאֵֽל־־־׃
translation:
  text: Then Yahweh said to him, “Call his name Jezreel, for in a little while I will punish the house of Jehu for the bloodshed of Jezreel, and I will put an end to the kingdom of the house of Israel.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “for the blood of Jezreel” or “for the bloodguilt of Jezreel.” The Hebrew idiom literally reads “the bloods of Jezreel.”
    reason: lexical_alternative
  - marker: b
    text: Jezreel is both the child's symbolic name and the name of the place associated with Jehu's violent acts.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: קְרָא שְׁמוֹ
  chosen: Call his name
  alternatives:
  - Name him
  lexicon: HALOT
  rationale: A relatively formal rendering preserves the Hebrew idiom while remaining natural in English. 'Name him' is possible but slightly smooths over the source expression.
- source_word: יִזְרְעֶאל
  chosen: Jezreel
  lexicon: HALOT
  rationale: This is a proper name and is therefore transliterated rather than translated, in keeping with the translation philosophy. The name also intentionally echoes the place Jezreel later in the verse.
- source_word: כִּי עוֹד מְעַט
  chosen: for in a little while
  alternatives:
  - for yet a little while
  - for soon
  lexicon: HALOT
  rationale: This rendering captures both the temporal imminence and the explanatory force of כִּי. 'Soon' is too compressed; 'yet a little while' is more formal but less idiomatic.
- source_word: וּפָקַדְתִּי
  chosen: I will punish
  alternatives:
  - I will visit
  - I will attend to
  - I will call to account
  lexicon: HALOT
  rationale: In this judgment context, פקד carries punitive force rather than mere visitation. 'Punish' communicates the sense clearly in modern English, though the broader semantic range includes 'visit' or 'call to account.'
- source_word: דְּמֵי יִזְרְעֶאל
  chosen: the bloodshed of Jezreel
  alternatives:
  - the blood of Jezreel
  - the bloodguilt of Jezreel
  lexicon: HALOT
  rationale: The plural 'bloods' is an idiom for bloodshed or bloodguilt. 'Bloodshed of Jezreel' best conveys the violent acts associated with Jezreel without implying merely literal blood. The phrase may refer either to blood shed at Jezreel or bloodguilt connected with Jezreel.
- source_word: עַל בֵּית יֵהוּא
  chosen: the house of Jehu
  alternatives:
  - against the house of Jehu
  - upon the house of Jehu
  lexicon: HALOT
  rationale: 'With punitive פקד, English naturally expresses the target as a direct object plus ''for'' phrase: ''punish the house of Jehu for ...'' This reflects the Hebrew sense without woodenly reproducing עַל.'
- source_word: וְהִשְׁבַּתִּי
  chosen: I will put an end to
  alternatives:
  - I will cause to cease
  - I will stop
  lexicon: HALOT
  rationale: The Hiphil of שבת here means to bring to an end or cause to cease. 'Put an end to' is idiomatic and weighty, fitting the oracle of judgment.
- source_word: מַמְלְכוּת בֵּית יִשְׂרָאֵל
  chosen: the kingdom of the house of Israel
  alternatives:
  - the kingship of the house of Israel
  - the kingdom of Israel
  lexicon: HALOT
  rationale: The construct chain is preserved fairly closely. 'The kingdom of Israel' is smoother but omits 'house,' which is present in the Hebrew and may underscore dynastic/national structure.
