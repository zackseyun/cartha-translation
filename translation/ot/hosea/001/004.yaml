theological_decisions:
- issue: Nature of the judgment on Jehu
  chosen_reading: Render the verse as announcing divine punishment on Jehu's house for the bloodshed associated with Jezreel, without resolving the broader historical-theological debate over how this relates to 2 Kings 9–10.
  alternative_readings:
  - Interpret the verse as condemning Jehu's massacre as sinful in itself
  - Interpret the verse as condemning only the later dynasty of Jehu for perpetuating the same violence/idolatry
  rationale: The Hebrew plainly announces coming punishment but does not itself explain in detail how Hosea's evaluation relates to the earlier divine commission given to Jehu. The translation should preserve the judgment statement without importing a harmonizing or polemical interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
