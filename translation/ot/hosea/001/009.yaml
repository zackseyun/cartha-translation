theological_decisions:
- issue: Covenant-formula reversal in the final clause
  chosen_reading: Render the clause without supplying 'God' or 'yours' in the main
    text
  alternative_readings:
  - and I will not be your God
  - and I will not be yours
  rationale: The Hebrew does not explicitly include 'God,' though the clause alludes
    to the covenant formula 'I will be your God, and you will be my people' and to
    the divine self-designation in Exodus 3:14. To avoid importing a doctrinally loaded
    completion not stated in the text, the main text preserves the terse wording and
    the covenantal tension; common fuller interpretations are preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3
