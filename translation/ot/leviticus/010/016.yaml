id: LEV.10.16
reference: Leviticus 10:16
source:
  edition: WLC
  text: וְ/אֵ֣ת שְׂעִ֣יר הַֽ/חַטָּ֗את דָּרֹ֥שׁ דָּרַ֛שׁ מֹשֶׁ֖ה וְ/הִנֵּ֣ה שֹׂרָ֑ף
    וַ֠/יִּקְצֹף עַל אֶלְעָזָ֤ר וְ/עַל אִֽיתָמָר֙ בְּנֵ֣י אַהֲרֹ֔ן הַ/נּוֹתָרִ֖ם לֵ/אמֹֽר׀־־׃
translation:
  text: Now Moses diligently searched for the goat of the sin offering, and behold,
    it had been burned up. So he was angry with Eleazar and with Ithamar, Aaron’s
    remaining sons, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'searched and searched for the goat of the sin offering.' The Hebrew
      uses an infinitive absolute with a finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Or 'it had been completely burned.' The Hebrew indicates the goat was found
      in a burned state.
    reason: lexical_alternative
  - marker: c
    text: '''Aaron’s remaining sons'' refers to Eleazar and Ithamar, the sons left
      after the death of Nadab and Abihu (Lev 10:1–2, 12).'
    reason: cross_reference
lexical_decisions:
- source_word: שְׂעִיר הַחַטָּאת
  chosen: the goat of the sin offering
  alternatives:
  - the goat for the sin offering
  - the sin-offering goat
  lexicon: HALOT
  rationale: שְׂעִיר denotes a male goat. The construct-like relationship with הַחַטָּאת
    is best rendered naturally in English as 'the goat of the sin offering,' preserving
    the sacrificial category without overcompressing the phrase.
- source_word: דָּרֹשׁ דָּרַשׁ
  chosen: diligently searched for
  alternatives:
  - carefully inquired about
  - searched and searched for
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the action. 'Diligently
    searched for' conveys the emphatic force in idiomatic modern English better than
    a wooden repetition, while retaining the sense of active investigation.
- source_word: וְהִנֵּה
  chosen: and behold
  alternatives:
  - and look
  - and there it was
  lexicon: HALOT
  rationale: הִנֵּה marks sudden discovery or attention. 'Behold' preserves the discourse
    force and gravity of the narrative, though slightly elevated; it remains understandable
    in context.
- source_word: שֹׂרָף
  chosen: it had been burned up
  alternatives:
  - it was burned
  - it had been completely burned
  lexicon: HALOT
  rationale: The passive participial form reports the discovered state of the goat.
    'Had been burned up' captures the resultant condition and the likely sense that
    it was wholly consumed, which explains Moses' anger in the following clause.
- source_word: וַיִּקְצֹף
  chosen: he was angry
  alternatives:
  - he became angry
  - he was furious
  lexicon: HALOT
  rationale: The verb denotes anger or wrath. 'He was angry' is a clear, proportionate
    rendering that avoids overstating the intensity beyond what the Hebrew requires.
- source_word: הַנּוֹתָרִם
  chosen: remaining
  alternatives:
  - who were left
  - surviving
  lexicon: HALOT
  rationale: The participle identifies Eleazar and Ithamar as those left after the
    death of Nadab and Abihu. 'Remaining' is concise and contextually accurate; 'surviving'
    is possible but slightly more interpretive.
- source_word: לֵאמֹר
  chosen: saying,
  alternatives:
  - and said
  - asking,
  lexicon: HALOT
  rationale: This standard speech introducer naturally leads into the next verse.
    Rendering it as 'saying,' preserves the syntactic connection without prematurely
    supplying the content of speech.
