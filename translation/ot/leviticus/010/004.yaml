id: LEV.10.4
reference: Leviticus 10:4
source:
  edition: WLC
  text: וַ/יִּקְרָ֣א מֹשֶׁ֗ה אֶל מִֽישָׁאֵל֙ וְ/אֶ֣ל אֶלְצָפָ֔ן בְּנֵ֥י עֻזִּיאֵ֖ל
    דֹּ֣ד אַהֲרֹ֑ן וַ/יֹּ֣אמֶר אֲלֵ/הֶ֗ם קִ֠רְב֞וּ שְׂא֤וּ אֶת אֲחֵי/כֶם֙ מֵ/אֵ֣ת
    פְּנֵי הַ/קֹּ֔דֶשׁ אֶל מִ/ח֖וּץ לַֽ/מַּחֲנֶֽה־־־־׃
translation:
  text: Then Moses called Mishael and Elzaphan, the sons of Uzziel, Aaron’s uncle,
    and said to them, “Come near; carry your brothers away from the front of the sanctuary
    to outside the camp.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'your brothers' can refer more broadly to close male relatives; here
      it refers to Nadab and Abihu, who were their cousins.
    reason: lexical_alternative
  - marker: b
    text: Or 'from before the holy place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  chosen: called
  alternatives:
  - summoned
  lexicon: HALOT
  rationale: The verb קרא in this narrative setting means to call to or summon someone.
    'Called' is natural modern English and preserves the straightforward narrative
    sense.
- source_word: בְּנֵי עֻזִּיאֵל
  chosen: the sons of Uzziel
  alternatives:
  - Uzziel’s sons
  - descendants of Uzziel
  lexicon: HALOT
  rationale: The construct phrase most directly identifies Mishael and Elzaphan as
    Uzziel's sons. 'Descendants' is too broad for this immediate genealogical notice.
- source_word: דֹּד אַהֲרֹן
  chosen: Aaron’s uncle
  alternatives:
  - the uncle of Aaron
  - Aaron’s kinsman
  lexicon: HALOT
  rationale: דּוֹד commonly means 'uncle' in kinship contexts. Here it most naturally
    refers to Uzziel as Aaron's uncle, not to Mishael and Elzaphan as Aaron's cousins
    by a looser term. English expresses the Hebrew apposition smoothly as 'the sons
    of Uzziel, Aaron’s uncle.'
- source_word: קִרְבוּ
  chosen: Come near
  alternatives:
  - Approach
  - Come forward
  lexicon: HALOT
  rationale: The imperative of קרב means to come near or approach. 'Come near' preserves
    the spatial force and fits the solemn context near the sanctuary.
- source_word: שְׂאוּ
  chosen: carry
  alternatives:
  - lift
  - bear
  lexicon: HALOT
  rationale: נשא literally means 'lift, carry, bear.' In context, Moses is commanding
    them to remove the bodies, so 'carry' best conveys the intended action in idiomatic
    English.
- source_word: אֲחֵיכֶם
  chosen: your brothers
  alternatives:
  - your kinsmen
  - your relatives
  lexicon: HALOT
  rationale: Although the referents are cousins rather than literal brothers, Hebrew
    אָח can extend to close male kin. 'Your brothers' keeps the source-text kinship
    language, in line with gender-accurate translation philosophy, while the context
    makes the broader familial sense clear.
- source_word: מֵאֵת פְּנֵי הַקֹּדֶשׁ
  chosen: away from the front of the sanctuary
  alternatives:
  - from before the holy place
  - from the presence of the sanctuary
  lexicon: HALOT
  rationale: פְּנֵי literally means 'face/front/presence.' In this spatial setting,
    'the front of' communicates location more clearly than the more wooden 'before.'
    הַקֹּדֶשׁ here refers to the holy sanctuary area, not abstract holiness.
- source_word: הַקֹּדֶשׁ
  chosen: the sanctuary
  alternatives:
  - the holy place
  - the holy area
  lexicon: HALOT
  rationale: In context this noun denotes the sacred precinct from which Nadab and
    Abihu are to be removed. 'Sanctuary' is clear modern English and suitably weighty.
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  chosen: to outside the camp
  alternatives:
  - outside the camp
  - to the outside of the camp
  lexicon: HALOT
  rationale: The phrase expresses movement toward a location outside the camp. 'To
    outside the camp' preserves the directional force of אֶל while remaining readable;
    adding 'away' earlier in the clause helps the full motion sense.
