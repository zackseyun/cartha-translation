id: LEV.10.20
reference: Leviticus 10:20
source:
  edition: WLC
  text: וַ/יִּשְׁמַ֣ע מֹשֶׁ֔ה וַ/יִּיטַ֖ב בְּ/עֵינָֽי/ו׃פ
translation:
  text: And Moses heard, and it was good in his eyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and it was pleasing in his sight' / 'and he approved.' The Hebrew idiom
      literally reads 'and it was good in his eyes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  chosen: heard
  alternatives:
  - listened
  - understood
  lexicon: HALOT
  rationale: The verb שׁמע in the qal commonly means 'hear.' In context, Moses hears
    Aaron's explanation from the previous verse; 'heard' preserves the narrative sequence
    without over-interpreting the response as full agreement or understanding, though
    those ideas may be implied contextually.
- source_word: מֹשֶׁה
  chosen: Moses
  rationale: Standard English transliteration of the personal name משה, following
    the translation philosophy to transliterate names rather than translate them.
- source_word: וַיִּיטַב
  chosen: it was good
  alternatives:
  - it was pleasing
  - it seemed right
  - he approved
  lexicon: HALOT
  rationale: The verb יטב in the qal means 'be good, be pleasing, go well.' With the
    following idiom 'in his eyes,' the sense is that the matter was acceptable or
    pleasing to Moses. 'It was good' is a relatively formal rendering that preserves
    the Hebrew idiom while remaining natural enough in English.
- source_word: בְּעֵינָיו
  chosen: in his eyes
  alternatives:
  - in his sight
  - to him
  lexicon: HALOT
  rationale: The idiom בעיני literally means 'in the eyes of' and often conveys evaluation
    or approval. Rendering it as 'in his eyes' preserves the Hebrew imagery and allows
    readers to sense the idiomatic basis; 'to him' would be smoother but less transparent.
