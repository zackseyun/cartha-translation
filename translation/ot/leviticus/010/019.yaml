id: LEV.10.19
reference: Leviticus 10:19
source:
  edition: WLC
  text: וַ/יְדַבֵּ֨ר אַהֲרֹ֜ן אֶל מֹשֶׁ֗ה הֵ֣ן הַ֠/יּוֹם הִקְרִ֨יבוּ אֶת חַטָּאתָ֤/ם
    וְ/אֶת עֹֽלָתָ/ם֙ לִ/פְנֵ֣י יְהוָ֔ה וַ/תִּקְרֶ֥אנָה אֹתִ֖/י כָּ/אֵ֑לֶּה וְ/אָכַ֤לְתִּי
    חַטָּאת֙ הַ/יּ֔וֹם הַ/יִּיטַ֖ב בְּ/עֵינֵ֥י יְהוָֽה־־־׃
translation:
  text: And Aaron said to Moses, “Look, today they presented their sin offering and
    their burnt offering before the LORD, and things like these have happened to me.
    If I had eaten the sin offering today, would it have been good in the LORD’s sight?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their purification offering' (for both occurrences of 'sin offering').
      The Hebrew חַטָּאת can denote either 'sin' or the sacrifice associated with
      purification from sin/impurity; in Leviticus, 'sin offering' is the conventional
      rendering.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and such things as these happened to me.' Aaron refers to the
      calamities of that day, especially the death of his sons.
    reason: cultural_note
  - marker: c
    text: Or 'would it have pleased the LORD?'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  - Indeed
  lexicon: HALOT
  rationale: Introduces Aaron’s explanation with an attention-getting particle. 'Look'
    is natural modern English while preserving the force better than the archaic 'Behold.'
- source_word: הִקְרִיבוּ
  chosen: presented
  alternatives:
  - offered
  - brought near
  lexicon: HALOT
  rationale: From קרב in the Hiphil, the standard sacrificial sense is to present/offer.
    'Presented' fits the cultic context and avoids overloading English 'offered' where
    the verse already names the offerings.
- source_word: חַטָּאתָם
  chosen: their sin offering
  alternatives:
  - their purification offering
  lexicon: HALOT
  rationale: In Levitical sacrificial contexts חטאת commonly denotes the sacrifice
    rather than abstract 'sin.' 'Sin offering' is the most transparent conventional
    rendering; 'purification offering' is a defensible contextual alternative but
    less direct here.
- source_word: עֹלָתָם
  chosen: their burnt offering
  alternatives:
  - their whole burnt offering
  lexicon: HALOT
  rationale: עלה in sacrificial usage refers to the burnt offering. 'Burnt offering'
    is standard and clear.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: A standard cultic expression indicating presentation in Yahweh’s presence.
    Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: וַתִּקְרֶאנָה אֹתִי כָּאֵלֶּה
  chosen: things like these have happened to me
  alternatives:
  - such things befell me
  - these things happened to me
  lexicon: HALOT
  rationale: The feminine plural verb with כָּאֵלֶּה refers to the calamities just
    experienced, especially the death of Aaron’s sons. English idiom requires an explicit
    eventive rendering rather than a wooden 'these met me.'
- source_word: וְאָכַלְתִּי
  chosen: If I had eaten
  alternatives:
  - and I ate
  - were I to eat
  lexicon: HALOT
  rationale: 'Though formally a waw + qatal, in context it functions in a rhetorical
    conditional/apodotic sense leading into the question. English expresses the force
    best with a counterfactual conditional: ''If I had eaten...''.'
- source_word: חַטָּאת
  chosen: the sin offering
  alternatives:
  - the purification offering
  lexicon: HALOT
  rationale: Again denotes the sacrificial animal/portion, not abstract sin. Definite
    in sense from context.
- source_word: הַיִּיטַב בְּעֵינֵי יְהוָה
  chosen: would it have been good in the LORD’s sight
  alternatives:
  - would it have pleased the LORD
  - would it have been right in the eyes of the LORD
  lexicon: HALOT
  rationale: A rhetorical question about divine approval. 'Good in the LORD’s sight'
    preserves the Hebrew idiom while remaining readable; 'pleased the LORD' is smoother
    but more interpretive.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Required by the doctrine’s contested-terms table for the divine name.
