id: LEV.10.7
reference: Leviticus 10:7
source:
  edition: WLC
  text: וּ/מִ/פֶּתַח֩ אֹ֨הֶל מוֹעֵ֜ד לֹ֤א תֵֽצְאוּ֙ פֶּן תָּמֻ֔תוּ כִּי שֶׁ֛מֶן מִשְׁחַ֥ת יְהוָ֖ה עֲלֵי/כֶ֑ם וַֽ/יַּעֲשׂ֖וּ כִּ/דְבַ֥ר מֹשֶֽׁה־־׃פ
translation:
  text: And you shall not go out from the entrance of the tent of meeting, lest you die, because the anointing oil of Yahweh is on you.” And they did according to the word of Moses.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/מִ/פֶּתַח
  chosen: And ... from the entrance
  alternatives:
  - And ... from the doorway
  - But from the entrance
  lexicon: HALOT
  rationale: The prefixed conjunction plus preposition literally gives 'and/from the entrance.' In English, the clause is best rendered as a prohibition with 'And you shall not go out from the entrance.' 'Entrance' is a natural rendering of פֶּתַח here; 'doorway' is possible but slightly narrower.
- source_word: אֹהֶל מוֹעֵד
  chosen: the tent of meeting
  alternatives:
  - the meeting tent
  - the tent of appointment
  lexicon: HALOT
  rationale: This is the standard cultic designation for the sanctuary structure. 'Tent of meeting' is the most recognizable and accurate English equivalent.
- source_word: לֹא תֵצְאוּ
  chosen: you shall not go out
  alternatives:
  - do not go out
  - you must not go out
  lexicon: HALOT
  rationale: The imperfect with negation in this legal/instructional context is well represented by 'you shall not go out.' This preserves the formal force of the prohibition without sounding archaic.
- source_word: פֶּן תָּמֻתוּ
  chosen: lest you die
  alternatives:
  - or you will die
  - so that you may not die
  lexicon: HALOT
  rationale: פֶּן introduces a warning of consequence. 'Lest you die' is concise and preserves the solemnity and causal warning of the Hebrew.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  - since
  lexicon: HALOT
  rationale: Here כִּי gives the reason for the prohibition. 'Because' is clear modern English; 'for' is possible but less natural for the target style.
- source_word: שֶׁמֶן מִשְׁחַת יְהוָה
  chosen: the anointing oil of the LORD
  alternatives:
  - the LORD's anointing oil
  - the oil of the LORD's anointing
  lexicon: HALOT
  rationale: The construct chain denotes the sacred oil associated with consecration belonging to or designated by YHWH. 'The anointing oil of the LORD' is both clear and close to the Hebrew.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עֲלֵיכֶם
  chosen: is on you
  alternatives:
  - is upon you
  - rests on you
  lexicon: HALOT
  rationale: The preposition על with pronoun indicates the oil's being upon them as consecrated priests. 'Is on you' is natural modern English; 'upon you' is slightly more formal.
- source_word: וַיַּעֲשׂוּ
  chosen: And they did
  alternatives:
  - So they did
  - And they acted
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'And they did' closely follows the Hebrew and links directly to Moses' command.
- source_word: כִּדְבַר מֹשֶׁה
  chosen: according to the word of Moses
  alternatives:
  - according to Moses' word
  - as Moses had said
  lexicon: HALOT
  rationale: The phrase means conformity to Moses' spoken command. 'According to the word of Moses' is transparent and formally close, while still readable.
