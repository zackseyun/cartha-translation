theological_decisions:
- issue: Rendering of priestly inheritance term חֹק in cultic context
  chosen_reading: portion
  alternative_readings:
  - due
  - allotment
  - statute
  rationale: The verse concerns the priests' assigned share of sacrificial offerings,
    not primarily a legal ordinance in the abstract. 'Portion' best preserves the
    concrete cultic meaning without importing later theological nuance.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Rendering of אִשֵּׁי יְהוָה
  chosen_reading: food offerings of the LORD
  alternative_readings:
  - offerings made by fire to the LORD
  rationale: The Hebrew term historically relates to fire offerings, but in context
    it denotes a recognized sacrificial category from which the priests receive a
    share. 'Food offerings' is a clear modern rendering in line with optimal equivalence,
    while preserving the more literal alternative in a footnote for auditability.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition'
- issue: Referent of 'your sons'
  chosen_reading: your sons
  alternative_readings:
  - your children
  rationale: The Hebrew explicitly says 'sons,' referring to Aaron's male priestly
    descendants. Gender-neutral expansion would obscure the source text's cultic specificity.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
