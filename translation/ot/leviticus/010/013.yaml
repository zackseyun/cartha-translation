id: LEV.10.13
reference: Leviticus 10:13
source:
  edition: WLC
  text: וַ/אֲכַלְתֶּ֤ם אֹתָ/הּ֙ בְּ/מָק֣וֹם קָדֹ֔שׁ כִּ֣י חָקְ/ךָ֤ וְ/חָק בָּנֶ֨י/ךָ֙
    הִ֔וא מֵ/אִשֵּׁ֖י יְהוָ֑ה כִּי כֵ֖ן צֻוֵּֽיתִי־־׃
translation:
  text: You shall eat it in a holy place, because it is your portion and the portion
    of your sons from the food offerings of the LORD, for so I have been commanded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from the offerings made by fire to the LORD.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲכַלְתֶּם
  chosen: You shall eat
  alternatives:
  - and you shall eat
  - you must eat
  lexicon: HALOT
  rationale: The form is a waw-prefixed verb addressed to a masculine plural audience
    in direct instruction. In English legal/instructional style here, 'shall eat'
    best conveys command without sounding overly colloquial. The prefixed waw is not
    separately represented because English does not require 'and' at the start of
    this instruction.
- source_word: אֹתָהּ
  chosen: it
  lexicon: HALOT
  rationale: Feminine singular object pronoun referring back to the offering portion
    under discussion. English naturally uses 'it'.
- source_word: בְּמָקוֹם קָדֹשׁ
  chosen: in a holy place
  alternatives:
  - in the holy place
  - in a sacred place
  lexicon: HALOT
  rationale: The phrase lacks the article in Hebrew, so 'in a holy place' is the most
    straightforward rendering. 'Holy' preserves the cultic register better than 'sacred.'
    'The holy place' could suggest the specific sanctuary chamber, which is more specific
    than the Hebrew here requires.
- source_word: כִּי
  chosen: because
  alternatives:
  - for
  lexicon: HALOT
  rationale: Introduces the rationale for the command. 'Because' is slightly clearer
    in modern English, though 'for' would also be possible.
- source_word: חָקְךָ ... וְחָק בָּנֶיךָ
  chosen: your portion and the portion of your sons
  alternatives:
  - your due and the due of your sons
  - your statute and your sons' statute
  - your allotment and your sons' allotment
  lexicon: HALOT
  rationale: חֹק in priestly contexts often denotes an assigned share or due rather
    than a legal statute in the abstract. 'Portion' communicates the allotted priestly
    share clearly in context. 'Sons' is retained for gender accuracy because the Hebrew
    explicitly refers to Aaron's male descendants serving as priests.
- source_word: הִוא
  chosen: it is
  alternatives:
  - this is
  lexicon: HALOT
  rationale: The feminine pronoun agrees with the offering portion and functions predicatively.
    English idiom requires 'it is'.
- source_word: מֵאִשֵּׁי יְהוָה
  chosen: from the food offerings of the LORD
  alternatives:
  - from the offerings made by fire to the LORD
  - from the LORD's fire offerings
  lexicon: HALOT
  rationale: אִשֵּׁי traditionally refers to offerings by fire, but in many modern
    contexts 'food offerings' communicates the sacrificial category more naturally
    and reflects the cultic sense without implying the entire offering is consumed.
    The divine name follows project policy as 'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine table, the default rendering of the divine name is 'the
    LORD.'
- source_word: כִּי כֵן צֻוֵּיתִי
  chosen: for so I have been commanded
  alternatives:
  - for thus I was commanded
  - because this is what I was commanded
  lexicon: HALOT
  rationale: The passive conveys that Moses is speaking of a command received from
    God. 'I have been commanded' is natural English and preserves the passive sense.
    'For so' keeps the explanatory linkage of כִּי כֵן.
