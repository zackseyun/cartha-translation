id: LEV.10.12
reference: Leviticus 10:12
source:
  edition: WLC
  text: וַ/יְדַבֵּ֨ר מֹשֶׁ֜ה אֶֽל אַהֲרֹ֗ן וְ/אֶ֣ל אֶ֠לְעָזָר וְ/אֶל אִ֨יתָמָ֥ר בָּנָי/ו֮
    הַ/נּֽוֹתָרִים֒ קְח֣וּ אֶת הַ/מִּנְחָ֗ה הַ/נּוֹתֶ֨רֶת֙ מֵ/אִשֵּׁ֣י יְהוָ֔ה וְ/אִכְל֥וּ/הָ
    מַצּ֖וֹת אֵ֣צֶל הַ/מִּזְבֵּ֑חַ כִּ֛י קֹ֥דֶשׁ קָֽדָשִׁ֖ים הִֽוא־־׀־׃
translation:
  text: 'Then Moses spoke to Aaron and to Eleazar and to Ithamar, his remaining sons:
    “Take the grain offering that remains from the food offerings of the LORD, and
    eat it unleavened beside the altar, because it is most holy.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “from the offerings by fire of the LORD.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: Then Moses spoke
  alternatives:
  - And Moses spoke
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English
    narrative flow while preserving sequence without overstating contrast.
- source_word: הַנּוֹתָרִים
  chosen: remaining
  alternatives:
  - who were left
  - surviving
  lexicon: HALOT
  rationale: The participle from יתר/נותר marks Aaron's sons as those left after the
    death of Nadab and Abihu. 'Remaining' is concise and contextually clear; 'surviving'
    is possible but slightly more interpretive.
- source_word: הַמִּנְחָה
  chosen: the grain offering
  alternatives:
  - the tribute offering
  - the offering
  lexicon: HALOT
  rationale: In Levitical sacrificial terminology, מִנְחָה here refers specifically
    to the cereal/grain offering, not a generic gift. 'Grain offering' is the clearest
    established English equivalent.
- source_word: הַנּוֹתֶרֶת
  chosen: that remains
  alternatives:
  - left over
  - remaining
  lexicon: HALOT
  rationale: This feminine participle modifies 'grain offering.' 'That remains' reads
    naturally in English and preserves the sense of the portion left after the LORD's
    share is offered.
- source_word: מֵאִשֵּׁי יְהוָה
  chosen: from the food offerings of the LORD
  alternatives:
  - from the offerings by fire of the LORD
  - from the fire offerings of the LORD
  lexicon: HALOT
  rationale: אִשֵּׁי traditionally denotes offerings made by fire. In contemporary
    English, 'food offerings' communicates sacrificial portions presented to God more
    naturally, while still reflecting cultic terminology. The alternative more formally
    preserves the fire imagery and is worth noting.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD.'
- source_word: וְאִכְלֻהָ מַצּוֹת
  chosen: and eat it unleavened
  alternatives:
  - and eat it as unleavened bread
  - and eat it in the form of unleavened cakes
  lexicon: HALOT
  rationale: The plural מַצּוֹת functions adverbially/predicatively, indicating the
    manner in which the offering is to be eaten. 'Eat it unleavened' is idiomatic
    and sufficiently literal.
- source_word: אֵצֶל הַמִּזְבֵּחַ
  chosen: beside the altar
  alternatives:
  - near the altar
  - at the side of the altar
  lexicon: HALOT
  rationale: אֵצֶל denotes proximity. 'Beside' is natural English and preserves the
    required nearness without implying direct contact.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: most holy
  alternatives:
  - holy of holies
  - a holy thing of holy things
  lexicon: HALOT
  rationale: The Hebrew superlative idiom denotes the highest degree of holiness.
    For the offering itself, 'most holy' is the clearest idiomatic English rendering;
    'holy of holies' in English more often evokes the sanctuary space.
