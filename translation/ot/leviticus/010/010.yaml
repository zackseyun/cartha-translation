theological_decisions:
- issue: Rendering of priestly holiness contrast חֹל versus קֹדֶשׁ
  chosen_reading: the holy and the common
  alternative_readings:
  - the holy and the profane
  - the sacred and the secular
  rationale: The verse concerns priestly discernment among cultic categories. 'Common'
    preserves the non-holy category without importing the stronger moral overtones
    that 'profane' can carry in contemporary English. 'Secular' is too modern and
    potentially anachronistic.
  doctrine_reference: Translation philosophy §1, §6
- issue: Nature of טָמֵא / טָהוֹר categories
  chosen_reading: unclean / clean as ritual categories
  alternative_readings:
  - impure / pure
  rationale: The text addresses priestly instruction in Leviticus, where these terms
    primarily denote ritual status. The translation avoids implying that every instance
    of uncleanness is moral guilt, thereby preserving the text's own categories.
  doctrine_reference: Translation philosophy §1, §3
