id: LEV.10.10
reference: Leviticus 10:10
source:
  edition: WLC
  text: וּֽ/לֲ/הַבְדִּ֔יל בֵּ֥ין הַ/קֹּ֖דֶשׁ וּ/בֵ֣ין הַ/חֹ֑ל וּ/בֵ֥ין הַ/טָּמֵ֖א
    וּ/בֵ֥ין הַ/טָּהֽוֹר׃
translation:
  text: to distinguish between the holy and the common, and between the unclean and
    the clean,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the holy and the profane.' The Hebrew contrast is between what is set
      apart as holy and what is not holy; 'common' is used here to avoid suggesting
      active irreverence.
    reason: lexical_alternative
  - marker: b
    text: That is, between ritually unclean and ritually clean.
    reason: cultural_note
lexical_decisions:
- source_word: וּלֲהַבְדִּיל
  chosen: to distinguish
  alternatives:
  - to separate
  - to make a distinction
  lexicon: HALOT
  rationale: 'The prefixed infinitive construct expresses purpose in continuation
    from the previous verse: the priests are to be able ''to distinguish.'' ''Distinguish''
    is natural modern English and preserves the discernment function better than the
    more spatial ''separate.'''
- source_word: בֵּין
  chosen: between
  alternatives:
  - among
  lexicon: HALOT
  rationale: The preposition marks contrast between paired categories. 'Between' is
    the standard and most precise rendering in this repeated construction.
- source_word: הַקֹּדֶשׁ
  chosen: the holy
  alternatives:
  - the sacred
  - the holy thing
  lexicon: HALOT
  rationale: Here the noun denotes the sphere/category of what is holy, contrasted
    with what is common. 'The holy' preserves the categorical sense without over-specifying
    an object.
- source_word: הַחֹל
  chosen: the common
  alternatives:
  - the profane
  - the ordinary
  lexicon: HALOT
  rationale: In priestly holiness language, this term contrasts with what is holy
    and refers to what is non-sacred rather than necessarily wicked. 'The common'
    best captures that contrast in clear modern English. 'Profane' is traditional
    but can misleadingly suggest irreverence or blasphemy.
- source_word: הַטָּמֵא
  chosen: the unclean
  alternatives:
  - the impure
  lexicon: HALOT
  rationale: In Levitical purity contexts, 'unclean' is the established and accurate
    rendering for ritual impurity. It preserves the cultic category without reducing
    it to moral evil.
- source_word: הַטָּהוֹר
  chosen: the clean
  alternatives:
  - the pure
  lexicon: HALOT
  rationale: Paired with 'unclean,' 'clean' is the most idiomatic and contextually
    precise English term for ritual cleanness in priestly legislation.
