id: LEV.10.8
reference: Leviticus 10:8
source:
  edition: WLC
  text: וַ/יְדַבֵּ֣ר יְהוָ֔ה אֶֽל אַהֲרֹ֖ן לֵ/אמֹֽר־׃
translation:
  text: And the LORD spoke to Aaron, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew YHWH; alternatively rendered 'Yahweh' or 'Jehovah.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: And ... spoke
  alternatives:
  - Then ... spoke
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive with דבר advances the narrative, commonly rendered
    'and' or 'then.' 'Spoke' best matches דבר in this formulaic divine-speech introduction,
    while 'said' is possible but less precise given the following לֵאמֹר.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the divine name יְהוָה is rendered 'the LORD'
    rather than transliterated forms, following established reverential convention
    and the stated default for this contested term.
- source_word: אֶל
  chosen: to
  alternatives:
  - unto
  lexicon: HALOT
  rationale: The preposition marks the indirect object of speech. 'To' is the natural
    modern English equivalent.
- source_word: אַהֲרֹן
  chosen: Aaron
  lexicon: HALOT
  rationale: Personal names are transliterated by standard English convention.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - and said
  - to say
  lexicon: HALOT
  rationale: This infinitive construct introduces the content of speech in standard
    Hebrew narrative style. 'Saying' preserves the formal structure without unnecessary
    paraphrase.
