id: LEV.10.6
reference: Leviticus 10:6
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר מֹשֶׁ֣ה אֶֽל אַהֲרֹ֡ן וּ/לְ/אֶלְעָזָר֩ וּ/לְ/אִֽיתָמָ֨ר בָּנָ֜י/ו רָֽאשֵׁי/כֶ֥ם אַל תִּפְרָ֣עוּ וּ/בִגְדֵי/כֶ֤ם לֹֽא תִפְרֹ֨מוּ֙ וְ/לֹ֣א תָמֻ֔תוּ וְ/עַ֥ל כָּל הָ/עֵדָ֖ה יִקְצֹ֑ף וַ/אֲחֵי/כֶם֙ כָּל בֵּ֣ית יִשְׂרָאֵ֔ל יִבְכּוּ֙ אֶת הַ/שְּׂרֵפָ֔ה אֲשֶׁ֖ר שָׂרַ֥ף יְהוָֽה־׀־׀־־־־׃
translation:
  text: And Moses said to Aaron and to Eleazar and Ithamar his sons, “Do not uncover your heads, and do not tear your garments, lest you die and wrath come upon all the congregation. But your brothers, the whole house of Israel, shall weep for the burning that Yahweh has kindled.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not uncover your heads' or 'Do not leave your hair unkempt.' The Hebrew refers to a mourning sign involving the head/hair.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the burning that the LORD burned'; the translation 'has kindled' is used for natural English with the cognate expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָֽאשֵׁי/כֶם אַל תִּפְרָעוּ
  chosen: Do not let your heads hang loose
  alternatives:
  - Do not uncover your heads
  - Do not leave your hair unkempt
  lexicon: HALOT
  rationale: The verb פרע in this stem refers to letting the hair of the head go loose/unrestrained, a mourning sign. 'Do not let your heads hang loose' communicates the idiom in readable English without importing the later specific practice of removing a head covering. Alternatives are preserved because the phrase has been rendered traditionally as 'uncover your heads,' but the Hebrew more directly concerns the hair/head in disheveled mourning.
- source_word: וּ/בִגְדֵי/כֶם לֹא תִפְרֹמוּ
  chosen: do not tear your garments
  alternatives:
  - do not rend your clothes
  lexicon: HALOT
  rationale: פרם commonly denotes tearing garments, especially as a mourning gesture. 'Tear your garments' is clear modern English and preserves the ritual-mourning force.
- source_word: וְ/לֹא תָמֻתוּ
  chosen: so that you do not die
  alternatives:
  - lest you die
  lexicon: HALOT
  rationale: The sequence of prohibitions followed by this clause expresses consequence. 'So that you do not die' is natural modern English while retaining the warning force.
- source_word: וְ/עַל כָּל הָ/עֵדָה יִקְצֹף
  chosen: and he become angry with all the congregation
  alternatives:
  - and wrath come upon all the congregation
  - and there be anger against all the congregation
  lexicon: HALOT
  rationale: The verb קצף is singular ('he be angry' / 'he become wrathful'). In context the implied subject is the LORD, not an abstract 'wrath.' Rendering the implied subject as 'he' preserves the Hebrew syntax while keeping the warning personal and covenantal. 'Congregation' fits עֵדָה in Israel's assembled covenant community.
- source_word: וַ/אֲחֵי/כֶם
  chosen: your brothers
  alternatives:
  - your kinsmen
  lexicon: HALOT
  rationale: The Hebrew is masculine plural 'your brothers.' Per gender-accurate policy, this is retained rather than neutralized, while the following apposition clarifies the broader national referent.
- source_word: כָּל בֵּית יִשְׂרָאֵל
  chosen: the whole house of Israel
  alternatives:
  - all the house of Israel
  lexicon: HALOT
  rationale: A standard covenantal-national expression. 'The whole house of Israel' is idiomatic and preserves the collective force.
- source_word: יִבְכּוּ אֶת הַ/שְּׂרֵפָה
  chosen: shall weep for the burning
  alternatives:
  - shall bewail the burning
  - shall weep for the blaze
  lexicon: HALOT
  rationale: שׂרפה here refers to the burning/burned destruction inflicted by divine fire on Nadab and Abihu. 'Weep for the burning' preserves the concrete image and avoids overinterpretation such as 'disaster' or 'judgment' in the main text.
- source_word: אֲשֶׁר שָׂרַף יְהוָה
  chosen: that the LORD has kindled
  alternatives:
  - that the LORD burned
  - that the LORD has burned
  lexicon: HALOT
  rationale: Because the object is 'the burning,' English idiom works better with 'has kindled' than 'has burned,' while still attributing the act directly to the LORD. This avoids awkward repetition ('the burning that the LORD burned') without softening divine agency.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
