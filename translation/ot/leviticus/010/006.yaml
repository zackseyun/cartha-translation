theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to make explicit the subject of יִקְצֹף
  chosen_reading: he become angry with all the congregation
  alternative_readings:
  - wrath come upon all the congregation
  rationale: The Hebrew verb is singular with no explicit subject stated in this clause. In immediate context, the implied subject is the LORD, whose judgment has just been manifested. Using 'he' preserves the Hebrew's implicitness better than introducing the abstract noun 'wrath,' while still making the clause intelligible in English.
