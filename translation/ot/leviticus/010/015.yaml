theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The doctrine file specifies 'the LORD' as the default rendering for YHWH.
    This preserves consistency and established reverential convention without making
    a claim about vocalization.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering cultic terminology in accessible but accurate English
  chosen_reading: Retain 'wave offering' while rendering תְּרוּמָה as 'contribution'
    and אִשֵּׁי as 'food offerings'
  alternative_readings:
  - heave offering / wave offering with more traditional sacrificial jargon throughout
  - presentation offering / contribution with less traditional terminology throughout
  rationale: Optimal equivalence here balances precision and readability. 'Wave offering'
    remains useful as a technical term because the verse explicitly pairs noun and
    verb from the same ritual root, while 'contribution' and 'food offerings' avoid
    unnecessary archaism.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5, 6
