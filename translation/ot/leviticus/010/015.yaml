id: LEV.10.15
reference: Leviticus 10:15
source:
  edition: WLC
  text: שׁ֣וֹק הַ/תְּרוּמָ֞ה וַ/חֲזֵ֣ה הַ/תְּנוּפָ֗ה עַ֣ל אִשֵּׁ֤י הַ/חֲלָבִים֙ יָבִ֔יאוּ
    לְ/הָנִ֥יף תְּנוּפָ֖ה לִ/פְנֵ֣י יְהוָ֑ה וְ/הָיָ֨ה לְ/ךָ֜ וּ/לְ/בָנֶ֤י/ךָ אִתְּ/ךָ֙
    לְ/חָק עוֹלָ֔ם כַּ/אֲשֶׁ֖ר צִוָּ֥ה יְהוָֽה־׃
translation:
  text: They shall bring the thigh of the contribution and the breast of the wave
    offering, with the food offerings of the fat portions, to wave as a wave offering
    before the LORD; and it shall be for you and for your sons with you as a permanent
    statute, just as the LORD commanded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leg' for 'thigh.'
    reason: lexical_alternative
  - marker: b
    text: '''Contribution'' traditionally ''heave offering.'''
    reason: lexical_alternative
  - marker: c
    text: '''Wave offering'' refers to a ritual presentation before the LORD; some
      render more generally ''presentation offering.'''
    reason: cultural_note
  - marker: d
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹק
  chosen: thigh
  alternatives:
  - leg
  lexicon: HALOT
  rationale: Refers to the animal's upper hind leg portion assigned to the priest.
    'Thigh' is more precise and traditional for sacrificial anatomy than the broader
    'leg'.
- source_word: תְּרוּמָה
  chosen: contribution
  alternatives:
  - heave offering
  - offering
  lexicon: HALOT
  rationale: The noun denotes a portion lifted up/set apart as a contribution. 'Contribution'
    communicates the dedicated portion without relying on archaic cultic jargon like
    'heave offering.'
- source_word: חָזֶה
  chosen: breast
  alternatives:
  - chest
  lexicon: HALOT
  rationale: Standard anatomical term in sacrificial contexts; 'breast' is the conventional
    and clearest rendering.
- source_word: תְּנוּפָה
  chosen: wave offering
  alternatives:
  - presentation offering
  lexicon: HALOT
  rationale: In priestly sacrificial language this term refers to the ritual presentation/waving
    before YHWH. 'Wave offering' preserves the established cultic sense and matches
    the verbal cognate later in the verse.
- source_word: עַל אִשֵּׁי הַחֲלָבִים
  chosen: with the food offerings of the fat portions
  alternatives:
  - upon the offerings by fire of the fat pieces
  - along with the fire offerings of the fats
  lexicon: HALOT
  rationale: The phrase links these priestly portions with the portions burned to
    God. 'Food offerings' is a readable rendering for אִשִּׁים in Leviticus, and 'fat
    portions' reflects the sacrificial pieces of fat rather than abstract 'fatness.'
    'With' conveys the accompanying sense naturally in English.
- source_word: יָבִיאוּ
  chosen: they shall bring
  alternatives:
  - they are to bring
  lexicon: HALOT
  rationale: Imperfect here carries instructional force in legal material; 'shall
    bring' fits the prescriptive context.
- source_word: לְהָנִיף תְּנוּפָה
  chosen: to wave as a wave offering
  alternatives:
  - to present as a presentation offering
  - to wave a wave offering
  lexicon: HALOT
  rationale: The infinitive plus cognate noun expresses the ritual action emphatically.
    'To wave as a wave offering' preserves both the action and the technical sacrificial
    category while remaining idiomatic.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard covenantal/cultic expression. Per doctrine, יְהוָה is rendered
    'the LORD.'
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving
    reverential convention and consistency with the LXX/English Bible tradition.
- source_word: וְהָיָה לְךָ וּלְבָנֶיךָ אִתְּךָ
  chosen: and it shall be for you and for your sons with you
  alternatives:
  - and it shall belong to you and to your sons with you
  lexicon: HALOT
  rationale: Expresses priestly entitlement to these portions. 'For you and for your
    sons with you' closely follows the Hebrew while remaining clear.
- source_word: לְחָק עוֹלָם
  chosen: as a permanent statute
  alternatives:
  - as a perpetual statute
  - as an everlasting due
  lexicon: HALOT
  rationale: Denotes an enduring prescribed ordinance within Israel's cultic order.
    'Permanent statute' is readable modern English; 'perpetual' is possible but slightly
    more archaic.
- source_word: כַּאֲשֶׁר צִוָּה יְהוָה
  chosen: just as the LORD commanded
  alternatives:
  - as the LORD commanded
  lexicon: HALOT
  rationale: Marks conformity to prior divine instruction; 'just as' brings out the
    comparative force of כַּאֲשֶׁר.
