theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Interpretation of אֵשׁ זָרָה
  chosen_reading: unauthorized fire
  alternative_readings:
  - strange fire
  - foreign fire
  rationale: The phrase denotes fire not permitted by divine command, not merely something odd or unusual. This preserves the legal-cultic force of the offense without importing extra explanation beyond the following clause.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
