id: LEV.10.1
reference: Leviticus 10:1
source:
  edition: WLC
  text: וַ/יִּקְח֣וּ בְנֵֽי אַ֠הֲרֹן נָדָ֨ב וַ/אֲבִיה֜וּא אִ֣ישׁ מַחְתָּת֗/וֹ וַ/יִּתְּנ֤וּ בָ/הֵן֙ אֵ֔שׁ וַ/יָּשִׂ֥ימוּ עָלֶ֖י/הָ קְטֹ֑רֶת וַ/יַּקְרִ֜בוּ לִ/פְנֵ֤י יְהוָה֙ אֵ֣שׁ זָרָ֔ה אֲשֶׁ֧ר לֹ֦א צִוָּ֖ה אֹתָֽ/ם־׃
translation:
  text: Then Nadab and Abihu, Aaron’s sons, each took his firepan, put fire in it, placed incense on it, and presented unauthorized fire before Yahweh, which he had not commanded them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strange fire' or 'foreign fire.' The Hebrew phrase refers to fire that was not authorized by the LORD, as the next clause explains.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְחוּ
  chosen: took
  alternatives:
  - picked up
  lexicon: HALOT
  rationale: Basic narrative verb לקח; 'took' is the natural English equivalent in this sequence.
- source_word: בְנֵי אַהֲרֹן
  chosen: Aaron’s sons
  alternatives:
  - the sons of Aaron
  lexicon: HALOT
  rationale: Construct phrase literally means 'sons of Aaron.' 'Aaron’s sons' is smoother modern English while preserving the familial relationship.
- source_word: נָדָב וַאֲבִיהוּא
  chosen: Nadab and Abihu
  rationale: Personal names are transliterated by standard conventions per translation philosophy.
- source_word: אִישׁ מַחְתָּתוֹ
  chosen: each took his firepan
  alternatives:
  - each his censer
  - each his fire holder
  lexicon: HALOT
  rationale: אִישׁ here has distributive force ('each'), and מַחְתָּה denotes a pan for carrying coals/incense. 'Firepan' is clear modern English; 'censer' is traditional but more ecclesiastical.
- source_word: וַיִּתְּנוּ בָהֵן אֵשׁ
  chosen: put fire in them
  alternatives:
  - placed fire in them
  lexicon: HALOT
  rationale: Straightforward rendering of נתן + ב + pronoun referring to the firepans.
- source_word: וַיָּשִׂימוּ עָלֶיהָ קְטֹרֶת
  chosen: placed incense on it
  alternatives:
  - put incense on them
  - put incense over it
  lexicon: HALOT
  rationale: The suffix is singular feminine ('on it/her'), likely referring distributively to each firepan. English idiom prefers singular distributive after 'each took his firepan.'
- source_word: וַיַּקְרִבוּ
  chosen: presented
  alternatives:
  - offered
  - brought near
  lexicon: HALOT
  rationale: The Hiphil of קרב in sacrificial context means to present/offer. 'Presented' preserves the cultic sense without overloading the line with repeated 'offer' language.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: Standard cultic expression. YHWH is rendered 'the LORD' per doctrine.
- source_word: אֵשׁ זָרָה
  chosen: unauthorized fire
  alternatives:
  - strange fire
  - foreign fire
  lexicon: HALOT
  rationale: זָר in priestly/legal contexts often means unauthorized or illegitimate with respect to sacred boundaries. 'Unauthorized fire' communicates the violation more clearly to modern readers than the traditional but potentially misleading 'strange fire.'
- source_word: אֲשֶׁר לֹא צִוָּה אֹתָם
  chosen: which he had not commanded them
  alternatives:
  - which he had not commanded
  - which he had not commanded for them
  lexicon: HALOT
  rationale: The relative clause explains why the fire was unauthorized. The object suffix 'them' is retained to reflect the Hebrew explicitly.
