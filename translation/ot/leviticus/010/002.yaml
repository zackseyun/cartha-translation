id: LEV.10.2
reference: Leviticus 10:2
source:
  edition: WLC
  text: וַ/תֵּ֥צֵא אֵ֛שׁ מִ/לִּ/פְנֵ֥י יְהוָ֖ה וַ/תֹּ֣אכַל אוֹתָ֑/ם וַ/יָּמֻ֖תוּ לִ/פְנֵ֥י יְהוָֽה׃
translation:
  text: And fire came out from before Yahweh and consumed them, and they died before Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''from before the LORD''; alternatively, ''from the presence of the LORD.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּצֵא
  chosen: came out
  alternatives:
  - went out
  - came forth
  lexicon: HALOT
  rationale: From יצא, the wayyiqtol advances the narrative with a simple past event. 'Came out' is natural English and preserves the directional sense from the divine presence.
- source_word: אֵשׁ
  chosen: fire
  lexicon: HALOT
  rationale: The noun straightforwardly denotes literal fire here, the agent of immediate judgment.
- source_word: מִלִּפְנֵי יְהוָה
  chosen: from before the LORD
  alternatives:
  - from the presence of the LORD
  - from before Yahweh
  lexicon: HALOT
  rationale: Literally 'from before the face/presence of YHWH.' 'From before the LORD' preserves the Hebrew idiom while remaining readable. Per doctrine, יְהוָה is rendered 'the LORD,' not transliterated.
- source_word: וַתֹּאכַל
  chosen: consumed
  alternatives:
  - ate up
  - devoured
  lexicon: HALOT
  rationale: Although אכל literally means 'eat,' with fire as subject English idiom prefers 'consumed.' This preserves the force of total destructive action without awkwardness.
- source_word: אֹתָם
  chosen: them
  lexicon: HALOT
  rationale: Direct object pronoun referring to Nadab and Abihu in the immediate context.
- source_word: וַיָּמֻתוּ
  chosen: they died
  alternatives:
  - and they died
  - so they died
  lexicon: HALOT
  rationale: From מות, simple narrative past. 'They died' states the result without adding interpretive nuance such as 'were killed,' though the context makes the cause evident.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: This repeats the key locative-theological phrase. 'Before the LORD' keeps the solemn repetition and mirrors the Hebrew closely.
