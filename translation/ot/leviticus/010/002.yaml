theological_decisions:
- issue: Rendering of the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Whether to render וַיָּמֻתוּ as passive causation ('were killed') or simple result ('died')
  chosen_reading: they died
  alternative_readings:
  - they were killed
  rationale: The Hebrew verb is active intransitive ('they died'), and the preceding clause already supplies the cause. Retaining the simpler wording avoids importing an interpretive expansion beyond the source text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; never paraphrase beyond what the source text warrants'
