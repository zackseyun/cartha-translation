id: LEV.10.11
reference: Leviticus 10:11
source:
  edition: WLC
  text: וּ/לְ/הוֹרֹ֖ת אֶת בְּנֵ֣י יִשְׂרָאֵ֑ל אֵ֚ת כָּל הַ֣/חֻקִּ֔ים אֲשֶׁ֨ר דִּבֶּ֧ר
    יְהוָ֛ה אֲלֵי/הֶ֖ם בְּ/יַד מֹשֶֽׁה־־־׃פ
translation:
  text: and to teach the sons of Israel all the statutes that the LORD has spoken
    to them by the hand of Moses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "through Moses."'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/הוֹרֹת
  chosen: and to teach
  alternatives:
  - and to instruct
  - so as to teach
  lexicon: HALOT
  rationale: The prefixed conjunction and preposition with the Hiphil infinitive construct
    of ירה here continue the priests' duties from the previous verse. 'Teach' is clear
    modern English and fits the causative sense better than a more wooden 'instruct'
    while remaining close to the Hebrew.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: HALOT
  rationale: Literally 'sons of Israel.' Following the gender-accurate principle,
    the familial expression is preserved rather than flattened to 'Israelites.' 'Children
    of Israel' is traditional, but 'sons' more directly reflects בְּנֵי while still
    functioning corporately for the covenant people.
- source_word: כָּל הַחֻקִּים
  chosen: all the statutes
  alternatives:
  - all the decrees
  - all the ordinances
  lexicon: HALOT
  rationale: חֻקִּים commonly denotes prescribed enactments or statutes. 'Statutes'
    is a standard and sufficiently transparent rendering in legal contexts, preserving
    the formal covenantal register.
- source_word: אֲשֶׁר דִּבֶּר יְהוָה
  chosen: that the LORD has spoken
  alternatives:
  - which the LORD spoke
  - that the LORD spoke
  lexicon: HALOT
  rationale: The relative clause modifies 'statutes.' English present perfect ('has
    spoken') naturally conveys the completed divine speech with present relevance.
    'The LORD' follows the project's default rendering for יְהוָה.
- source_word: יְהוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine guidelines, the default rendering of the divine name is
    'the LORD,' following Jewish reverence tradition and longstanding English convention.
- source_word: אֲלֵיהֶם
  chosen: to them
  alternatives:
  - for them
  lexicon: HALOT
  rationale: The preposition אֶל with pronominal suffix is most naturally rendered
    'to them,' indicating the addressees of the LORD's speech.
- source_word: בְּיַד מֹשֶׁה
  chosen: by the hand of Moses
  alternatives:
  - through Moses
  - by Moses
  lexicon: HALOT
  rationale: The idiom literally means mediation 'by the hand of' someone. Retaining
    the idiom preserves the Hebrew texture and the mediatorial role of Moses. A more
    dynamic alternative is worth preserving in a footnote for readability.
