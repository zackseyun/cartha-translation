theological_decisions:
- issue: Rendering the covenant name יְהוָה
  chosen_reading: the LORD
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse contains the divine name, and the project's doctrinal guidance
    specifies 'the LORD' as the default rendering rather than a transliteration.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD'
- issue: Rendering בְּנֵי יִשְׂרָאֵל with gender-accurate language
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the Israelites
  rationale: The Hebrew is grammatically masculine in a corporate covenant expression.
    Per the translation philosophy, gender-accurate rendering is preferred over neutralizing
    the expression, while recognizing its representative force.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
