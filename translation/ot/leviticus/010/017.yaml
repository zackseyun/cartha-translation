theological_decisions:
- issue: Rendering of חַטָּאת in sacrificial legislation
  chosen_reading: sin offering
  alternative_readings:
  - purification offering
  rationale: The immediate context concerns priestly handling and eating of a sacrificial
    animal, so the offering sense is certain. 'Sin offering' remains the clearest
    established English rendering, while 'purification offering' is preserved as a
    lexical alternative because the rite's cleansing dimension is emphasized by many
    interpreters.
- issue: Subject of נָתַן ('has given')
  chosen_reading: implicit subject rendered as 'he,' referring to God
  alternative_readings:
  - impersonal passive sense, 'it was given to you'
  rationale: The Hebrew uses a 3ms verb without explicit subject; in context Moses
    refers to God's assignment of priestly portions. Rendering 'he has given it to
    you' preserves the likely implied divine subject without adding doctrinal content
    beyond the context.
