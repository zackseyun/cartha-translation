id: LEV.10.17
reference: Leviticus 10:17
source:
  edition: WLC
  text: מַדּ֗וּעַ לֹֽא אֲכַלְתֶּ֤ם אֶת הַֽ/חַטָּאת֙ בִּ/מְק֣וֹם הַ/קֹּ֔דֶשׁ כִּ֛י
    קֹ֥דֶשׁ קָֽדָשִׁ֖ים הִ֑וא וְ/אֹתָ֣/הּ נָתַ֣ן לָ/כֶ֗ם לָ/שֵׂאת֙ אֶת עֲוֺ֣ן הָ/עֵדָ֔ה
    לְ/כַפֵּ֥ר עֲלֵי/הֶ֖ם לִ/פְנֵ֥י יְהוָֽה־־׀־׃
translation:
  text: Why did you not eat the sin offering in the holy place? For it is most holy,
    and he has given it to you to bear the guilt of the congregation, to make atonement
    for them before the LORD.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the purification offering.' The Hebrew term חַטָּאת can denote the offering
      associated with removing impurity as well as addressing sin.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - Why is it that
  lexicon: HALOT
  rationale: Direct interrogative of reason; simple 'Why' is natural and sufficiently
    formal.
- source_word: אֲכַלְתֶּם
  chosen: did you not eat
  alternatives:
  - have you not eaten
  lexicon: HALOT
  rationale: English auxiliary 'did' best conveys the Hebrew perfect in this rebuke
    context.
- source_word: הַחַטָּאת
  chosen: the sin offering
  alternatives:
  - the purification offering
  - the sin sacrifice
  lexicon: HALOT
  rationale: חַטָּאת can denote either 'sin' or the offering for sin/purification.
    In sacrificial context, 'sin offering' is the most recognizable and contextually
    precise main-text rendering; 'purification offering' is a viable alternative preserved
    in a footnote because some emphasize the rite's cleansing function.
- source_word: בִּמְקוֹם הַקֹּדֶשׁ
  chosen: in the holy place
  alternatives:
  - in a holy place
  - in the sanctuary area
  lexicon: HALOT
  rationale: The phrase refers to the designated sacred area for priestly consumption.
    'The holy place' is the conventional and sufficiently precise rendering here.
- source_word: קֹדֶשׁ קָדָשִׁים
  chosen: most holy
  alternatives:
  - holy of holies
  - supremely holy
  lexicon: HALOT
  rationale: Hebrew superlative construction. For the offering's status, 'most holy'
    is idiomatic English; 'holy of holies' would sound overly literal and may be confused
    with the inner sanctuary.
- source_word: נָתַן לָכֶם
  chosen: he has given it to you
  alternatives:
  - it was given to you
  - he gave it to you
  lexicon: HALOT
  rationale: The subject is implicit and contextually God. Retaining 'he' reflects
    the Hebrew verbal form while preserving the theological source of the priestly
    privilege.
- source_word: לָשֵׂאת אֶת עֲוֺן הָעֵדָה
  chosen: to bear the guilt of the congregation
  alternatives:
  - to bear the iniquity of the congregation
  - to carry the punishment of the congregation
  lexicon: HALOT
  rationale: נשא עון can mean bear guilt/iniquity, often in a representative or cultic
    sense. 'Bear the guilt' is clear modern English and fits the priestly mediatorial
    function in context.
- source_word: הָעֵדָה
  chosen: the congregation
  alternatives:
  - the community
  - the assembly
  lexicon: HALOT
  rationale: Standard rendering for Israel assembled as covenant community; 'congregation'
    preserves the formal communal sense.
- source_word: לְכַפֵּר עֲלֵיהֶם
  chosen: to make atonement for them
  alternatives:
  - to atone for them
  - to purge them
  lexicon: HALOT
  rationale: כפר in sacrificial contexts is best rendered with the established phrase
    'make atonement,' which is both accurate and theologically weighty without over-specifying
    mechanism.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  - before Yahweh
  lexicon: HALOT
  rationale: Follows project doctrine for יְהוָה as 'the LORD.' 'Before' preserves
    the cultic/judicial sense of presentation in God's presence.
