id: LEV.10.18
reference: Leviticus 10:18
source:
  edition: WLC
  text: הֵ֚ן לֹא הוּבָ֣א אֶת דָּמָ֔/הּ אֶל הַ/קֹּ֖דֶשׁ פְּנִ֑ימָה אָכ֨וֹל תֹּאכְל֥וּ
    אֹתָ֛/הּ בַּ/קֹּ֖דֶשׁ כַּ/אֲשֶׁ֥ר צִוֵּֽיתִי־־־׃
translation:
  text: Look, its blood was not brought into the sanctuary, inside. You certainly
    should have eaten it in the holy place, as I commanded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into the holy place, inside.' The Hebrew uses a term for the sacred
      area plus 'inside,' emphasizing the interior sanctuary.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew expression ''eating you should eat'' intensifies the command:
      ''you surely should have eaten it.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: HALOT
  rationale: Introduces emphatic attention to the point being made. 'Look' is natural
    modern English while preserving the deictic force better than leaving it untranslated.
- source_word: הוּבָא
  chosen: was brought
  alternatives:
  - was taken in
  - was brought in
  lexicon: HALOT
  rationale: Hophal of בוא is passive/causative passive, indicating the blood was
    not brought. 'Was brought' is the most direct rendering.
- source_word: דָּמָהּ
  chosen: its blood
  alternatives:
  - her blood
  - the blood of it
  lexicon: HALOT
  rationale: The suffix is feminine singular referring to the sin offering animal.
    English idiom uses 'its' for an animal in sacrificial context.
- source_word: אֶל־הַקֹּדֶשׁ פְּנִימָה
  chosen: into the sanctuary, inside
  alternatives:
  - into the holy place, inward
  - into the holy place, inside
  lexicon: HALOT
  rationale: The phrase denotes movement into the sacred interior area. 'Sanctuary'
    communicates the cultic space clearly in modern English; 'inside' preserves פְּנִימָה
    rather than leaving it implicit.
- source_word: אָכוֹל תֹּאכְלוּ
  chosen: you certainly should have eaten
  alternatives:
  - you should surely have eaten
  - you were to eat
  lexicon: HALOT
  rationale: The infinitive absolute with imperfect intensifies the verbal idea. In
    context Moses is rebuking a past failure, so English idiom is best captured by
    'certainly should have eaten' rather than a simple future or imperative.
- source_word: אֹתָהּ
  chosen: it
  alternatives:
  - that offering
  - it
  lexicon: HALOT
  rationale: Direct object pronoun referring to the offering/flesh. 'It' is sufficient
    because the referent is clear from context.
- source_word: בַּקֹּדֶשׁ
  chosen: in the holy place
  alternatives:
  - in the sanctuary
  - in a holy place
  lexicon: HALOT
  rationale: Refers to the designated sacred place where the priests were to eat the
    offering. 'Holy place' preserves the cultic terminology and distinguishes it from
    the prior phrase about bringing blood into the inner sanctuary.
- source_word: כַּאֲשֶׁר צִוֵּיתִי
  chosen: as I commanded
  alternatives:
  - just as I commanded
  - as I had commanded
  lexicon: HALOT
  rationale: Straightforward comparative clause referring to Moses' prior instruction.
    Present perfect nuance is unnecessary in English here.
