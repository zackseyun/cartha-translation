theological_decisions:
- issue: Cultic spatial terminology
  chosen_reading: Differentiate the inner sacred area ('into the sanctuary, inside')
    from the place where the priests were to eat ('in the holy place').
  alternative_readings:
  - Render both simply as 'in the holy place'
  - Render first phrase as 'within the veil'
  rationale: The Hebrew uses related but distinct expressions. The first includes
    inward movement plus פְּנִימָה, indicating the interior sanctuary area; the second
    refers to the sacred place of eating. Distinguishing them preserves the ritual
    logic of the verse without over-specifying beyond the text.
